- type: reading
  id: reading-act-1991
  title: "Первинне джерело: Акт проголошення незалежності"
  source: "Верховна Рада України (1991)"
  text: |
    Виходячи із смертельної небезпеки, яка нависла була над Україною в зв'язку з державним переворотом в СРСР 19 серпня 1991 року,
    продовжуючи тисячолітню традицію державотворення в Україні,
    виходячи з права на самовизначення, передбаченого Статутом ООН та іншими міжнародно-правовими документами...
    Верховна Рада Української Радянської Соціалістичної Республіки урочисто проголошує незалежність України та створення самостійної української держави — УКРАЇНИ.

- type: critical-analysis
  title: "Аналіз політичного документа"
  source_reading: reading-act-1991
  questions:
    - "Як ви розумієте термін смертельна небезпека у контексті подій серпня 1991 року?"
    - "Чому автори документа посилаються на Статут ООН та тисячолітню традицію державотворення?"
  model_answers:
    - "Термін смертельна небезпека вказує на загрозу повернення жорсткої диктатури та політичних репресій після спроби державного перевороту в Москві."
    - "Покликання на Статут ООН забезпечувало міжнародну легітимність рішення, а згадка про традицію державотворення підкреслювала, що Україна не є штучним утворенням, а відновлює свій історичний суверенітет."
  focus_points:
    - "Міжнародне право"
    - "Історична пам'ять"

- type: true-false
  title: "Перевірка фактів: Становлення держави"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "Першим президентом незалежної України став колишній дисидент В'ячеслав Чорновіл."
      correct: false
      explanation: "Першим президентом був обраний Леонід Кравчук, колишній секретар ЦК Компартії України."
    - statement: "Акт проголошення незалежності України був підтриманий на всеукраїнському референдумі понад дев'яноста відсотками виборців."
      correct: true
      explanation: "Так, референдум першого грудня 1991 року показав 90.32% підтримки."
    - statement: "У тексті Будапештського меморандуму США та Велика Британія надали Україні чіткі військові гарантії захисту."
      correct: false
      explanation: "Документ містив лише запевнення, а не дієві військові гарантії захисту."
    - statement: "Термін гіперінфляція описує економічний стан України в 1993 році, коли ціни зростали на десять тисяч відсотків."
      correct: true
      explanation: "Це був світовий антирекорд, який призвів до швидкого знецінення купоно-карбованців."
    - statement: "Конституцію незалежної України було прийнято спокійно і без політичної боротьби."
      correct: false
      explanation: "Її ухвалення супроводжувалося жорсткою боротьбою під час Конституційної ночі."
    - statement: "Олігархічна система в Україні сформувалася значною мірою завдяки приватизації великих заводів червоними директорами."
      correct: true
      explanation: "Колишня радянська номенклатура використала свої зв'язки для захоплення державної власності."
    - statement: "Введення національної валюти гривні у вересні 1996 року допомогло приборкати інфляцію."
      correct: true
      explanation: "Грошова реформа Віктора Ющенка стабілізувала економіку."
    - statement: "Політика багатовекторності означала повну інтеграцію України до Європейського Союзу та розрив із Росією."
      correct: false
      explanation: "Багатовекторність передбачала намагання одночасно співпрацювати із Заходом і Росією."
    - statement: "Касетний скандал розпочався після оприлюднення записів із кабінету президента Леоніда Кучми."
      correct: true
      explanation: "Ці записи засвідчили корупцію на найвищому рівні і стали тригером для політичної кризи."
    - statement: "Акція Україна без Кучми завершилася добровільною відставкою президента і достроковими виборами."
      correct: false
      explanation: "Протести були жорстоко придушені спецпризначенцями дев'ятого березня 2001 року."

- type: comparative-study
  title: "Порівняльний аналіз політичних курсів"
  source_reading: reading-act-1991
  instruction: "Порівняйте політичні підходи двох перших президентів України щодо проведення реформ."
  items_to_compare:
    - "Політика між крапельками Леоніда Кравчука"
    - "Посилення президентської влади Леоніда Кучми"
  criteria:
    - "Ставлення до економічних реформ"
    - "Стиль управління державним апаратом"
  prompt: "Який з цих двох підходів, на вашу думку, мав більш негативні довгострокові наслідки для демократичного розвитку держави? Обґрунтуйте свою відповідь."

- type: essay-response
  title: "Розгорнута відповідь: Ціна незалежності"
  source_reading: reading-act-1991
  instruction: "Напишіть розгорнуте есе, спираючись на історичні факти з уроку."
  prompt: "Чому політична незалежність, здобута у 1991 році, не принесла Україні швидкого економічного добробуту? У своєму есе проаналізуйте вплив радянської спадщини, гіперінфляції та формування олігархічних кланів."
  min_words: 200
  rubric:
    - criteria: "Історична аргументація"
      description: "Використання конкретних фактів про економіку дев'яностих років та приватизацію."
      points: 40
    - criteria: "Деколонізаційний фокус"
      description: "Спростування міфу про життєздатність радянської планової економіки."
      points: 30
    - criteria: "Структура та логіка"
      description: "Чіткий вступ, основна частина з аргументами та обґрунтований висновок."
      points: 30