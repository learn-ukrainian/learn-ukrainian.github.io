- type: reading
  id: reading-primary-sources
  title: 'Первинні джерела: Геродот і Прокопій Кесарійський'
  source: Свідчення античних та візантійських авторів
  text: 'З описів Геродота про скіфів: "Вони не мають ні міст, ні укріплень, але пересувають
    свої житла з собою, і всі вони - кінні стрільці з луків... Вони заманюють ворога
    в глиб своєї країни... і нападають, коли він найменше цього чекає".

    З записів Прокопія Кесарійського про антів та склавинів: "Ці племена, слов''яни
    і анти, не управляються однією людиною, але здавна живуть у народоправстві, і
    тому у них щастя і нещастя в житті вважається справою загальним".

    '
- type: critical-analysis
  title: Аналіз історичних міфів
  source_reading: reading-primary-sources
  instruction: Проаналізуйте наведені джерела у контексті спростування колоніальних
    міфів.
  questions:
  - Як саме свідчення Прокопія Кесарійського спростовують міф про те, що на українських
    землях здавна панувала деспотична форма правління?
  - Яким чином тактика скіфів, описана Геродотом, відображає концепцію асиметричної
    війни та як вона простежується в подальшій історії України?
  focus_points:
  - Демократичні традиції антів
  - Асиметрична війна як стратегія виживання
  - Тяглість волелюбності від скіфів до сучасності
- type: comparative-study
  title: 'Порівняльний аналіз: Кочовий та осілий світи'
  source_reading: reading-primary-sources
  instruction: Порівняйте дві різні моделі організації суспільства на території України.
  items_to_compare:
  - Степові кочівники (скіфи)
  - Осілі землероби (анти)
  criteria:
  - Ставлення до централізованої влади
  - Військова тактика і мобільність
  - Зв'язок із землею та простором
- type: true-false
  title: 'Перевірка фактів: Синтез і витоки'
  items:
  - statement: Трипільська культура стала фундаментом для розвитку кочового способу
      життя на території України.
    correct: false
    explanation: Трипільська культура була спільнотою осілих хліборобів, а не кочівників.
  - statement: Український етногенез відзначається автохтонним характером, розвиваючись
      на своїй корінній землі.
    correct: true
    explanation: Археологічні дані підтверджують безперервність розвитку місцевих
      племен, які нізвідки не приходили.
  - statement: Слова Бог, хмара та собака мають слов'янське походження і виникли на
      території Київської Русі.
    correct: false
    explanation: Ці слова є давніми іранізмами, які ввійшли в українську мову завдяки
      скіфо-сарматському впливу.
  - statement: Офіційна дата заснування Києва, прийнята в українській традиції, практично
      збігається з падінням Західної Римської імперії.
    correct: true
    explanation: Заснування Києва датують 482 роком, а падіння Римської імперії відбулося
      у 476 році.
  - statement: Анти були єдиним народом, яким керував цар, що передавав владу у спадок.
    correct: false
    explanation: Анти жили в умовах народоправства, де ключові рішення приймали загальні
      збори.
  - statement: Степи Північного Причорномор'я до приходу Катерини II були абсолютно
      безлюдною пусткою, відомою як Дике Поле.
    correct: false
    explanation: Степ був зоною активної взаємодії, торгових шляхів і козацького освоєння,
      а міф про пустку створила імперська пропаганда.
  - statement: Звук ф є питомим для української мови і здавна використовувався слов'янами.
    correct: false
    explanation: Звук ф є чужим для нашої давньої артикуляції і трапляється виключно
      в запозичених словах.
  - statement: Скандинавські варяги принесли на українські землі передові концепції
      державного управління та торгівлі.
    correct: true
    explanation: Варяги суттєво вплинули на розбудову держави, що видно з імен перших
      київських князів.
  - statement: Тактика скіфів передбачала зустрічний лобовий бій великих армій у відкритому
      полі.
    correct: false
    explanation: Скіфи уникали лобових зіткнень, застосовуючи тактику асиметричної
      боротьби та заманювання ворога.
  - statement: Концепція плавильного котла в історії України означає здатність місцевої
      культури поглинати зовнішні впливи без втрати власної суті.
    correct: true
    explanation: Українське суспільство інтегрувало скіфські, скандинавські та тюркські
      елементи, створюючи унікальний синтез.
  instruction: Визначте, чи твердження правильне.
- type: essay-response
  title: 'Есе: Демократичні традиції України'
  source_reading: reading-primary-sources
  instruction: Напишіть аналітичне есе обсягом не менше 150 слів.
  prompt: Спираючись на текст модуля та історичні свідчення, аргументуйте, як концепція
    народоправства трансформувалася в українській історії від антських віч до сучасного
    волонтерського руху. Чому горизонтальні зв'язки виявилися ефективнішими за жорстку
    владну вертикаль?
  min_words: 150
  rubric:
  - criteria: Історична аргументація
    description: Використання конкретних прикладів (анти, козаки, Майдан) для доведення
      тези.
    points: 40
  - criteria: Розуміння термінології
    description: Коректне вживання понять народоправство, тяглість та суб'єктність.
    points: 30
  - criteria: Логіка та структура
    description: Послідовний і чіткий виклад думок із вступом, основною частиною та
      висновками.
    points: 30
