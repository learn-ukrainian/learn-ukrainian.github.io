- type: reading
  id: reading-herodotus-scythians
  title: Геродот про невловимість скіфів
  text: |
    Скіфський народ винайшов найрозумніший спосіб захисту від загарбників. Вони не мають ні міст, ні укріплень, які можна було б захопити. Свої житла вони возять із собою на возах. Всі вони — вправні кінні лучники, і живуть не з землеробства, а зі скотарства.

    Коли ворог нападає на них, вони відступають у безмежний степ, засипаючи криниці та знищуючи траву. Ворог, не маючи кого атакувати і де взяти припаси, виснажується і гине. Як же такому народові не бути непереможним і неприступним для будь-якого війська?
  instruction: Прочитайте адаптований текст за мотивами «Історії» Геродота та дайте відповідь на запитання.

- type: essay-response
  title: Стратегія асиметричної війни
  source_reading: reading-herodotus-scythians
  prompt: |
    Проаналізуйте тактику «випаленої землі», яку скіфи застосували проти армії перського царя Дарія I. Чому ця стратегія виявилася ефективною саме в умовах степового ландшафту? Використовуйте текст Геродота та матеріали уроку, щоб пояснити, як географія стала зброєю скіфів.
  min_words: 200
  model_answer: |
    > [!model-answer]
    Скіфська тактика проти Дарія I є класичним прикладом асиметричної війни, де слабша сторона використовує переваги місцевості. Головним фактором перемоги став саме степовий ландшафт. Відсутність міст означала, що персам нічого було захоплювати чи грабувати.

    Відступаючи, скіфи знищували ресурси (воду і траву), перетворюючи простір на пастку. Як зазначає Геродот, їхня мобільність робила їх «неприступними»: вони могли атакувати і зникати миттєво. Перська армія, звикла до генеральних битв, виявилася безпорадною проти ворога, який відмовлявся воювати за чужими правилами.

  rubric:
  - criteria: Аналіз тактики
    description: Пояснено суть тактики «випаленої землі» та її вплив на перську армію.
    points: 40
  - criteria: Використання джерел
    description: Наведено посилання на Геродота або історичний контекст.
    points: 30
  - criteria: Аргументація
    description: Чітко сформульовано причини поразки Дарія.
    points: 30

- type: comparative-study
  title: Еволюція степового війська
  instruction: Порівняйте скіфів та сарматів за наведеними критеріями.
  items_to_compare:
  - Скіфи
  - Сармати
  criteria:
  - Головна військова сила
  - Основна зброя
  - Соціальний статус жінок
  - Вплив на грецькі колонії
  prompt: |
    Як змінилася військова тактика та соціальна структура степових народів з приходом сарматів? Порівняйте скіфів і сарматів, фокусуючись на озброєнні та ролі жінки у суспільстві.
  model_answer: |
    > [!model-answer]
    Головна відмінність полягає у військовій тактиці. Скіфи покладалися на легку кінноту та масований обстріл з луків (дистанційний бій). Сармати ж здійснили революцію, створивши важку кінноту (катафрактаріїв), озброєну довгими списами для таранного удару (ближній бій).

    У соціальному плані сармати відрізнялися значно вищим статусом жінок. Тоді як скіфське суспільство було переважно патріархальним, сарматські жінки («амазонки») брали участь у війнах нарівні з чоловіками — це підтверджується похованнями зі зброєю.

    Вплив на грецькі колонії також суттєво різнився. Скіфи торгували із грецькими містами, постачаючи зерно і хутро в обмін на вино та металеві вироби — саме скіфський хліб годував Афіни. Сармати пішли далі: «сарматизація» Боспорського царства означала, що грецька еліта Пантікапея переймала сарматський одяг, зброю і імена, а сарматські династії безпосередньо приходили до влади у грецьких містах.

- type: critical-analysis
  title: Символізм влади
  source_reading: reading-herodotus-scythians
  instruction: Проаналізуйте символічне значення дарів, які скіфи надіслали Дарію.
  target_text: |
    Скіфські дари — птах, миша, жаба і п'ять стріл — стали прикладом унікальної дипломатії. Замість прямих погроз чи переговорів, скіфи використали мову символів, яку ворог мав розшифрувати. Ця загадка демонструє не лише їхню впевненість у собі, але й глибокий зв'язок із природним світом (небо, земля, вода) та розуміння психології ворога.
  questions:
  - Чому скіфи обрали саме цих тварин для свого послання?
  - Як цей вчинок характеризує скіфське розуміння влади та дипломатії?
  - Чому Дарій спочатку помилився у тлумаченні дарів?
  model_answers:
  - Птах, миша і жаба символізують три стихії (небо, землю, воду), які є домом для скіфів і пасткою для ворога.
  - Це свідчить про те, що для скіфів влада базується не на титулах, а на контролі над простором і природою.
  - Дарій мислив категоріями імперської покори («земля і вода» як знак підданства), недооцінюючи вільний дух кочівників.
  focus_points:
  - Символіка природи
  - Психологічний тиск
  - Відмінність менталітетів (імперія vs кочівники)

- type: true-false
  title: Міфи та реальність
  instruction: Визначте, чи є твердження правильним.
  items:
  - statement: Скіфи були виключно землеробським народом.
    correct: false
    explanation: Скіфи були переважно кочівниками-скотарями, хоча існували й скіфи-орачі.
  - statement: Золоту пектораль знайшов археолог Борис Мозолевський.
    correct: true
    explanation: Це сталося 21 червня 1971 року у кургані Товста Могила.
  - statement: Сарматські жінки не мали права брати до рук зброю.
    correct: false
    explanation: Навпаки, сарматки були воїнами, що породило міфи про амазонок.
  - statement: Дарій I зміг повністю підкорити Скіфію.
    correct: false
    explanation: Дарій зазнав поразки і втік, так і не підкоривши скіфів.
  - statement: Звіриний стиль — це зображення тварин у стані спокою.
    correct: false
    explanation: Звіриний стиль характеризується динамікою, рухом і сценами боротьби.
  - statement: Катафрактарії — це піші воїни з легкими щитами.
    correct: false
    explanation: Це важка кіннота в повному обладунку.
  - statement: Назви річок Дон і Дніпро мають іранське походження.
    correct: true
    explanation: Вони походять від кореня *dānu*, що означає «вода».
  - statement: Греки ніколи не купували скіфське зерно.
    correct: false
    explanation: Скіфія була "житницею" Греції, постачаючи зерно в Афіни.
  - statement: Скіфи використовували тактику партизанської війни.
    correct: true
    explanation: Вони нападали зненацька і швидко відступали.
  - statement: Пектораль має три яруси зображень.
    correct: true
    explanation: Нижній (звірі), середній (квіти) і верхній (люди).
