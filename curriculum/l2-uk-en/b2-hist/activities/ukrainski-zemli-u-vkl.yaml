- type: reading
  id: reading-statut
  title: 'Первинне джерело: Литовський Статут 1566 року'
  source: 'Литовський Статут (Артикул 1, Розділ 4)'
  text: |
    А писар земський маєт по-руску літерами і слови руськими всі листи, виписи і позви писати, а не іншим язиком і слови. І всі справи, як у суді земському, так і в гродському, мають бути судимі і писані мовою руською.
  instruction: 'Прочитайте фрагмент Литовського Статуту та дайте відповіді на запитання.'
  tasks:
    - 'Якою мовою мали писатися всі офіційні документи згідно зі Статутом?'
    - 'Чому цей закон був важливим для української еліти?'
    - 'Як цей документ спростовує міф про ВКЛ як поневолювача русинів?'
    - 'Яке значення мало використання руської мови в судах?'

- type: essay-response
  source_reading: reading-statut
  title: 'Значення руської мови як державної'
  instruction: 'Напишіть коротке есе, спираючись на текст Литовського Статуту.'
  prompt: 'Проаналізуйте значення закріплення руської мови як офіційної мови діловодства у Великому князівстві Литовському. Як це вплинуло на збереження української політичної суб''єктності?'
  min_words: 150
  model_answer: 'Використання староукраїнської (руської) мови як державної мови адміністрації та судочинства у ВКЛ мало фундаментальне значення. Це забезпечило безперервність розвитку української правової термінології ще з часів Київської Русі. Закріплення цієї норми у Литовському Статуті 1566 року (за яким усі листи мали писатися "по-руску літерами і слови руськими") захищало руський культурний простір від іноземного втручання та створювало бар''єр проти асиміляції до епохи Люблінської унії.'
  rubric:
    - criteria: 'Історичний контекст'
      description: 'Здатність пояснити правовий статус мови у ВКЛ'
      points: 10
    - criteria: 'Аналіз наслідків'
      description: 'Розкриття впливу мови на збереження ідентичності'
      points: 10
    - criteria: 'Робота з джерелом'
      description: 'Використання цитати чи ідей з прочитаного джерела'
      points: 5

- type: critical-analysis
  source_reading: reading-statut
  title: 'Аналіз політичних компромісів'
  instruction: 'Проаналізуйте подане твердження та дайте розгорнуті відповіді.'
  target_text: 'Принцип невтручання дозволив зберегти традиційну судову систему, яка спиралася на давньоруські звичаї та прецеденти.'
  questions:
    - 'Як ви розумієте принцип "старовини не рушимо, новини не вводимо"?'
    - 'Чому литовська влада відмовилася від радикальних змін на приєднаних землях?'
    - 'Якими були політичні наслідки скасування цього принципу для Київського князівства у 1471 році?'
  model_answers:
    - 'Цей принцип гарантував збереження давніх прав, релігії та місцевого самоврядування руських еліт.'
    - 'Литовцям бракувало власного адміністративного досвіду, а компроміс забезпечував лояльність місцевого населення та захист від спільних ворогів.'
    - 'Ліквідація Київського князівства знищила довіру між центром і руською елітою, спровокувала бунт киян і послабила обороноздатність регіону.'

- type: critical-analysis
  title: 'Деконструкція імперських міфів про ВКЛ'
  instruction: 'Проаналізуйте наведені питання та розвінчайте популярні історичні міфи.'
  target_text: 'Російська імперська історіографія нав''язувала тезу про ВКЛ як державу литовських феодалів, що поневолили українців.'
  questions:
    - 'На чому базується імперський міф про окупацію руських земель литовцями?'
    - 'Як концепція Литовсько-Руської держави спростовує цей міф?'
    - 'Яку роль відігравала руська шляхта в управлінні ВКЛ?'
    - 'Чому процес приєднання часто називають "оксамитовим проникненням"?'
    - 'Як Люблінська унія змінила статус українських земель порівняно з епохою ВКЛ?'
  model_answers:
    - 'Цей міф створений для виправдання подальшої російської експансії та позбавлення українців політичної суб''єктності.'
    - 'Концепція підкреслює, що держава була федерацією, де руський елемент домінував в економіці та культурі.'
    - 'Руська шляхта мала політичні права, формувала місцеві сеймики, суди та збройні сили регіону.'
    - 'Оскільки литовці пропонували військовий захист в обмін на лояльність, зберігаючи місцеву автономію без кривавих завоювань.'
    - 'Унія 1569 року означала інкорпорацію до Польщі, втрату автономії та початок полонізації і католицької експансії.'

