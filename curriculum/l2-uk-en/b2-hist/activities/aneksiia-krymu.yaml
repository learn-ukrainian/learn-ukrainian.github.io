- type: reading
  id: reading-memorandum
  title: 'Джерело: Будапештський меморандум'
  source: 'Меморандум про гарантії безпеки (1994)'
  instruction: 'Ознайомтеся з текстом перших двох пунктів документа.'
  text: |
    1. Російська Федерація, Сполучене Королівство Великої Британії та Північної Ірландії і Сполучені Штати Америки підтверджують Україні їх зобов'язання згідно з принципами Заключного акта НБСЄ поважати незалежність і суверенітет та існуючі кордони України.
    2. Вони підтверджують їх зобов'язання утримуватися від загрози силою чи її використання проти територіальної цілісності чи політичної незалежності України, і що ніяка їхня зброя ніколи не буде використовуватися проти України.
  tasks:
    - 'Які конкретні зобов''язання взяли на себе держави-гаранти?'
    - 'Як дії Росії в Криму у 2014 році співвідносяться з цими пунктами?'

- type: essay-response
  source_reading: reading-memorandum
  title: 'Есе: Наслідки порушення міжнародного права'
  instruction: 'Напишіть коротке есе на основі тексту Меморандуму та матеріалів уроку.'
  prompt: 'Проаналізуйте, як порушення Росією Будапештського меморандуму вплинуло на систему міжнародної безпеки. Чому це порушення стало глобальною проблемою, а не лише українською?'
  min_words: 150
  rubric:
    - criteria: 'Аргументація'
      description: 'Глибина аналізу наслідків для глобальної безпеки.'
      points: 5
    - criteria: 'Використання термінології'
      description: 'Доречне використання термінів (суверенітет, територіальна цілісність, анексія).'
      points: 3
    - criteria: 'Грамотність'
      description: 'Правильна побудова речень.'
      points: 2
  model_answer: 'Порушення Будапештського меморандуму Росією зруйнувало довіру до міжнародних гарантій безпеки. Оскільки Україна добровільно відмовилася від ядерного арсеналу в обмін на ці гарантії, агресія Росії продемонструвала іншим державам, що відмова від зброї масового знищення робить їх вразливими. Це завдало непоправної шкоди глобальній системі нерозповсюдження ядерної зброї та показало, що агресор не дотримується міжнародного права.'

- type: reading
  id: reading-putin-speech
  title: 'Аналіз риторики: Кримська промова Путіна'
  source: 'Володимир Путін (18 березня 2014)'
  instruction: 'Прочитайте фрагмент промови, виголошеної під час незаконного приєднання Криму.'
  text: |
    Щоб зрозуміти, чому був зроблений саме такий вибір, достатньо знати історію Криму, знати, що означала і означає Росія для Криму і Крим для Росії. У Криму буквально все пронизано нашою спільною історією та гордістю. Тут стародавній Херсонес, де прийняв хрещення святий князь Володимир.
  tasks:
    - 'До яких історичних подій апелює оратор?'
    - 'У чому полягає маніпуляція фактами у цьому уривку?'

- type: critical-analysis
  source_reading: reading-putin-speech
  title: 'Критичний аналіз: Деконструкція міфів'
  instruction: 'Проаналізуйте наведений уривок промови.'
  target_text: 'Тут стародавній Херсонес, де прийняв хрещення святий князь Володимир.'
  questions:
    - 'Як історія Київської Русі використовується для виправдання сучасної агресії?'
    - 'Чому твердження про спільну історію та гордість ігнорує корінний народ півострова?'
  model_answers:
    - 'Російська пропаганда привласнює історію Київської Русі. Князь Володимир правив у Києві задовго до появи Москви, тому хрещення у Херсонесі не має відношення до російської державності.'
    - 'Цей наратив повністю викреслює історію Кримського ханства та корінного народу киримли, для яких Крим є єдиною батьківщиною.'
  focus_points:
    - 'Маніпуляція історичними епохами'
    - 'Ігнорування кримських татар'
    - 'Імперський підхід до спадщини'

- type: true-false
  title: 'Факти та міфи про окупацію Криму'
  instruction: 'Визначте, чи є наведені твердження правдивими.'
  items:
    - statement: 'Військова операція Росії в Криму розпочалася після того, як Віктор Янукович офіційно склав повноваження.'
      correct: false
      explanation: 'Операція почалася 20 лютого, коли Янукович ще перебував у Києві.'
    - statement: 'Російські військові, які захоплювали адміністративні будівлі, не мали розпізнавальних знаків.'
      correct: true
      explanation: 'Так, їх називали зеленими чоловічками, і вони були військовими ГРУ РФ.'
    - statement: 'Мітинг 26 лютого у Сімферополі був організований проросійськими силами.'
      correct: false
      explanation: 'Цей мітинг був організований Меджлісом на підтримку територіальної цілісності України.'
    - statement: 'Під час блокування українських військових частин окупанти використовували цивільне населення як живий щит.'
      correct: true
      explanation: 'Це була свідома злочинна тактика російського командування.'
    - statement: 'Екіпаж тральщика Черкаси перейшов на бік російської армії без опору.'
      correct: false
      explanation: 'Екіпаж чинив героїчний опір і намагався прорвати морську блокаду.'
    - statement: 'За офіційними даними окупантів, явка на референдумі 16 березня була нижчою за 50 відсотків.'
      correct: false
      explanation: 'Вони заявили про явку у 83-89 відсотків, що є статистичною аномалією.'
    - statement: 'Кримські татари масово підтримали незаконний референдум про приєднання до Росії.'
      correct: false
      explanation: 'Меджліс кримськотатарського народу оголосив офіційний бойкот референдуму.'
    - statement: 'Генеральна Асамблея ООН не визнала результатів кримського референдуму.'
      correct: true
      explanation: 'Ухвалена Резолюція 68/262 підтвердила територіальну цілісність України.'
    - statement: 'Передача Криму Україні у 1954 році була зумовлена економічною та логістичною необхідністю.'
      correct: true
      explanation: 'Крим критично залежав від материкової України у постачанні води, електрики та ресурсів для відбудови.'
    - statement: 'Будапештський меморандум гарантував збереження ядерного арсеналу України.'
      correct: false
      explanation: 'Згідно з меморандумом, Україна добровільно відмовилася від ядерної зброї в обмін на гарантії безпеки.'