- type: reading
  id: reading-chornobyl-truth
  title: 'Первинне джерело: Переговори пожежників'
  source: 'Автентичні записи переговорів диспетчерів ЧАЕС (26 квітня 1986)'
  text: |
    — Алло! Це ВПЧ-2?
    — Так.
    — Що у вас там горить?
    — Вибух на головному корпусі! 3-й, 4-й блок, горить дах!
  tasks:
    - 'Чому диспетчери не згадують про радіацію в перші хвилини розмови?'
    - 'Як ця розмова демонструє загальну неготовність системи до масштабної аварії?'

- type: critical-analysis
  title: 'Аналіз: Інформаційна блокада'
  source_reading: reading-chornobyl-truth
  target_text: 'Що у вас там горить? Вибух на головному корпусі!'
  questions:
    - 'Як реальна ситуація на станції контрастує з офіційними повідомленнями радянської влади у перші дні?'
    - 'Якими мотивами керувалося партійне керівництво, приховуючи правду про справжні масштаби катастрофи?'
  model_answers:
    - 'У той час як на станції стався ядерний вибух з величезним викидом радіації, офіційні повідомлення називали це простою аварією або неблагонадійною радіаційною обстановкою.'
    - 'Головним мотивом було збереження престижу радянської системи, уникнення міжнародного скандалу та страх перед панікою серед населення республіки.'
  focus_points:
    - 'Державна цензура'
    - 'Імперський престиж'

- type: comparative-study
  title: 'Порівняння: Офіційний дискурс та реальність'
  source_reading: reading-chornobyl-truth
  items_to_compare:
    - 'Офіційне телевізійне повідомлення влади'
    - 'Документальні спогади очевидців та ліквідаторів'
  criteria:
    - 'Ступінь інформування про реальну небезпеку'
    - 'Рівень емоційної напруги та достовірності'
    - 'Головна мета повідомлення'
  model_answer: 'Офіційні повідомлення були максимально сухими і бюрократичними, їхньою метою було заспокоєння населення та приховування правди. Спогади очевидців, навпаки, сповнені тривоги та описують реальні фізичні наслідки радіації, які цинічно ігнорувала радянська влада.'

- type: essay-response
  title: 'Есе: Еконаціоналізм та шлях до незалежності'
  source_reading: reading-chornobyl-truth
  prompt: 'Проаналізуйте, як Чорнобильська катастрофа та злочинне мовчання влади каталізували екологічний рух, який згодом перетворився на політичну боротьбу за незалежність України. Опираючись на історичні факти, поясніть термін еконаціоналізм.'
  min_words: 150
  model_answer: 'Чорнобильська катастрофа жорстко викрила цинічне ставлення імперського центру до життя та здоров''я українців. Екологічний рух, зокрема впливова організація Зелений світ, став єдиною легальною формою протесту проти дій тоталітарної держави. З часом люди усвідомили, що без досягнення повної політичної незалежності неможливо гарантувати безпеку власної землі від імперських експериментів. Цей закономірний перехід від суто екологічних вимог до масштабної національно-визвольної боротьби і отримав назву еконаціоналізм.'
  rubric:
    - criteria: 'Розуміння терміну'
      description: 'Студент чітко і зрозуміло пояснює концепцію еконаціоналізму.'
      points: 5
    - criteria: 'Аргументація та приклади'
      description: 'Наведено конкретні історичні приклади та продемонстровано вплив катастрофи на суспільство.'
      points: 5

- type: true-false
  title: 'Міфи та факти: Чорнобильська катастрофа'
  instruction: 'Визначте, чи є ці історичні твердження правдивими чи хибними.'
  items:
    - statement: 'Місто Прип''ять мало набагато гірше забезпечення продовольчими товарами, ніж столиця України Київ.'
      correct: false
      explanation: 'Місто мало першу категорію постачання, тому там були доступні дуже дефіцитні товари.'
    - statement: 'Реактори серії РБМК розроблялися вченими винятково для мирних цілей та виробництва електроенергії.'
      correct: false
      explanation: 'Їхній первинний дизайн був прямою еволюцією військових установок для наробітку збройового плутонію.'
    - statement: 'Академік Александров публічно стверджував, що реактор РБМК можна безпечно встановити навіть на Красній площі.'
      correct: true
      explanation: 'Це було яскравим проявом інженерної гордині та державного міфу про абсолютну безпеку радянського атома.'
    - statement: 'Головною технічною причиною вибуху став кінцевий ефект стрижнів аварійного захисту реактора.'
      correct: true
      explanation: 'Графітові наконечники стрижнів під час опускання різко та неконтрольовано розігнали ядерну реакцію.'
    - statement: 'Експлуатаційний персонал електростанції був заздалегідь попереджений про всі конструктивні недоліки реактора.'
      correct: false
      explanation: 'Будь-яка інформація про системні дефекти була суворо засекречена.'
    - statement: 'Масова евакуація жителів міста Прип''ять розпочалася у перші ж години після потужного вибуху.'
      correct: false
      explanation: 'Держава затримала евакуацію на тридцять шість годин, залишаючи населення у смертельній небезпеці.'
    - statement: 'Рудий ліс отримав свою сумну назву через те, що сосни миттєво змінили колір від колосальної дози радіації.'
      correct: true
      explanation: 'Дерева повністю поглинули величезну дозу радіації, тому їхня хвоя стала мертвотно-рудою.'
    - statement: 'Першотравневий святковий парад у Києві негайно скасували, щоб уникнути опромінення тисяч дітей.'
      correct: false
      explanation: 'Парад провели за категоричним наказом з Москви, попри відому радіоактивну загрозу.'
    - statement: 'Ліквідатори очищали дах третього енергоблоку вручну, перебуваючи там максимум дев''яносто секунд.'
      correct: true
      explanation: 'Людей використовували як біороботів після того, як техніка вийшла з ладу через радіацію.'
    - statement: 'Чорнобильська зона відчуження сьогодні назавжди залишається мертвою пусткою без жодних ознак життя.'
      correct: false
      explanation: 'Зараз ця територія поступово перетворилася на величезний природний біосферний заповідник.'