- type: "reading"
  id: "reading-dovbush-song"
  title: "Первинне джерело: Народна пісня про Довбуша"
  source: "Український фольклор"
  instruction: "Прочитайте уривок з народної пісні та проаналізуйте образ ватажка."
  text: |
    Ой попід гай зелененький
    Ходить Довбуш молоденький,
    На ніженьку налягає,
    Топірцем ся підпирає.
  tasks:
    - "Знайдіть у тексті підтвердження фізичної вади Олекси Довбуша."
    - "Поясніть роль топірця (бартки) в цьому уривку."

- type: "critical-analysis"
  source_reading: "reading-dovbush-song"
  title: "Аналіз історичного міфу: Легенди та факти"
  instruction: "Проаналізуйте наведені питання, спираючись на текст модуля та прочитану пісню."
  questions:
    - "Як народна пам'ять трансформувала фізичну ваду Довбуша в його героїчному образі?"
    - "Чому імперська влада використовувала термін latrones, тоді як народ складав пісні про захисників?"
    - "Яку роль відігравав релігійний синкретизм у психологічній стійкості опришків?"
    - "Як археологічні знахідки спростовують міф про незліченні золоті скарби опришків?"
    - "Поясніть значення бартки як статусного та сакрального символу для карпатського воїна."
  focus_points:
    - "Деколонізація імперських міфів."
    - "Роль фольклору у збереженні пам'яті."

- type: "comparative-study"
  title: "Соціальне розбійництво в Європі: Порівняльний аналіз"
  instruction: "Порівняйте опришківський рух з іншими подібними явищами в Європі."
  items_to_compare:
    - "Опришки (Олекса Довбуш, Карпати)"
    - "Робін Гуд (Шервудський ліс, Англія)"
    - "Гайдуки (Балканський півострів)"
  criteria:
    - "Географічні умови та ландшафт"
    - "Соціальна база підтримки"
    - "Легітимізація дій в очах народу"
  prompt: "Спираючись на концепцію Еріка Гобсбаума про соціальне розбійництво, напишіть коротке порівняння цих рухів. Що об'єднує цих героїв у боротьбі за справедливість?"

- type: "essay-response"
  title: "Есе: Жіночий вимір опришківського спротиву"
  instruction: "Напишіть аналітичне есе на запропоновану тему."
  prompt: "Традиційна історіографія часто маргіналізувала роль жінок в опришківському русі. Спираючись на текст модуля, проаналізуйте реальну роль гуцулок (розвідниця, берегиня тилу) в інфраструктурі карпатського спротиву. Як гендерні ролі в горах відрізнялися від рівнинних?"
  min_words: 200
  rubric:
    - criteria: "Історична аргументація"
      description: "Використання фактів з модуля (функції жінок, явочні квартири)."
      points: 10
    - criteria: "Деколонізаційний підхід"
      description: "Критичний погляд на імперські наративи щодо ролі жінок."
      points: 5

- type: "true-false"
  title: "Історичні факти: Правда чи вигадка?"
  instruction: "Визначте, чи є наведені твердження правдивими, чи хибними."
  items:
    - statement: "Олекса Довбуш відрізнявся надзвичайною фізичною силою та велетенським зростом."
      correct: false
      explanation: "Насправді він був невисоким і кульгав; його силою був тактичний розум."
    - statement: "Основним мотивом селян для втечі в гори була втрата людської гідності через фізичні покарання."
      correct: true
      explanation: "Втеча була відчайдушним кроком заради порятунку честі."
    - statement: "Радянська історіографія малювала опришків переконаними атеїстами, що вели класову боротьбу."
      correct: true
      explanation: "Це був радянський міф, щоб вписати рух у марксистську ідеологію."
    - statement: "У лікуванні поранених опришки активно використовували смерекову живицю як природний антисептик."
      correct: true
      explanation: "Живиця має потужні бактерицидні властивості."
    - statement: "Найбільшим скарбом для опришка вважалося накопичене золото, яке він ховав у печерах."
      correct: false
      explanation: "Найбільшим скарбом була зброя, а гроші швидко витрачалися."
    - statement: "Опришківська бартка була не лише зброєю, але й важливим статусно-сакральним символом."
      correct: true
      explanation: "На бартці складали присягу, вона свідчила про статус у ватазі."
    - statement: "Австрійська та польська влада в офіційних документах називала повстанців національними героями."
      correct: false
      explanation: "Їх називали латинським терміном latrones (розбійники)."
    - statement: "Жінки на Гуцульщині не брали жодної участі в інфраструктурі руху опору."
      correct: false
      explanation: "Вони були активними розвідницями та утримувачками безпечних будинків."
    - statement: "Присяга новобранця на вірність братерству традиційно складалася на схрещених топірцях."
      correct: true
      explanation: "Це був священний ритуал вступу до ватаги."
    - statement: "Після смерті Олекси Довбуша його тіло поховали з почестями в рідному селі."
      correct: false
      explanation: "Його тіло показово четвертували для залякування населення."