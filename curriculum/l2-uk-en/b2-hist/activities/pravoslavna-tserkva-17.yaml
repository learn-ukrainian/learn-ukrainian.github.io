- type: reading
  id: reading-boretsky
  title: 'Первинне джерело: Протестація Йова Борецького'
  source: Йов Борецький (1621)
  text: 'А що стосується Війська Запорозького, то це військо славне, лицарське, яке
    не лише Річ Посполиту від ворогів захищає, але й віру православну предківську
    боронить. Вони є спадкоємцями тих лицарів, які за часів князів руських морями
    плавали і славу здобували.

    '
  tasks:
  - Яку історичну паралель проводить автор для легітимізації козаків?
  - Яка головна місія Запорозького Війська, згідно з текстом?
- type: essay-response
  source_reading: reading-boretsky
  title: 'Есе: Козацтво як ктитор церкви'
  prompt: Спираючись на аргументацію Йова Борецького та знання історичного контексту,
    напишіть есе про еволюцію соціального статусу козацтва у першій половині XVII
    століття. Як збройний захист церкви вплинув на політичну вагу Війська Запорозького?
  min_words: 150
  model_answer: У своєму маніфесті Йов Борецький заклав ідеологічний фундамент, перетворивши
    козаків з найманців на спадкоємців лицарства Київської Русі. Це дозволило козацтву
    виступати як легітимний політичний суб'єкт. Взявши під захист православну церкву,
    гетьман Сагайдачний та Військо Запорозьке набули ролі ктиторів. Їхня військова
    міць під час Хотинської та Смоленської війн стала єдиним дієвим аргументом, який
    стримав репресії короля та змусив Варшаву визнати відновлену православну ієрархію
    легальною.
  rubric:
  - criteria: Аналіз первинного джерела
    description: Вміння працювати з текстом Протестації та пояснювати аргументацію
      автора.
    points: 30
  - criteria: Історичний контекст
    description: Розкриття ролі Сагайдачного, наслідків Хотинської війни та статусу
      ктиторства.
    points: 50
  - criteria: Логіка та структура
    description: Послідовний і аргументований виклад думок, дотримання мінімального
      обсягу.
    points: 20
- type: critical-analysis
  source_reading: reading-boretsky
  title: 'Аналіз: Політична риторика у Протестації'
  target_text: Вони є спадкоємцями тих лицарів, які за часів князів руських морями
    плавали і славу здобували.
  questions:
  - З якою політичною метою Йов Борецький називає козаків нащадками лицарів Русі?
  - Як такий підхід впливав на сприйняття козацтва у тогочасній польській державі?
  - Чому доведення історичної тяглості було життєво важливим для захисту від католицьких
    інновацій?
  model_answers:
  - Він прагнув легітимізувати козацтво, прирівнявши їхній статус до шляхетського
    рицарського стану.
  - Це перетворювало їх в очах суспільства з маргінальних найманців на законних оборонців
    вітчизни та віри.
  - У сімнадцятому столітті істина асоціювалася з давниною, тому прив'язка до спадщини
    Київської Русі була найкращим юридичним захистом.
  focus_points:
  - Легітимізація політичного статусу
  - Історичний міф як інструмент боротьби
  - Концепт старожитності у правосвідомості
- type: true-false
  title: 'Верифікація фактів: Церква та суспільство'
  items:
  - statement: Рішення про перехід до Берестейської унії було підтримане абсолютною
      більшістю звичайних парафіян та міщан.
    correct: false
    explanation: Більшість вірян відкинула унію, рішення ухвалювалося виключно вищою
      церковною ієрархією.
  - statement: Відмова від унії означала для православних втрату легального статусу
      та ризик конфіскації храмів.
    correct: true
    explanation: Король визнав уніатів єдиними законними представниками Київської
      митрополії, оголосивши православних бунтівниками.
  - statement: Львівське та Київське братства зосереджувалися лише на зборі коштів
      для ремонту старих храмів.
    correct: false
    explanation: Братства швидко перетворилися на потужні осередки освітнього, культурного
      та політичного опору, відкривали школи і друкарні.
  - statement: Польський уряд таємно сприяв візиту Єрусалимського патріарха Теофана
      III до Києва.
    correct: false
    explanation: Візит відбувся всупереч волі Варшави і став можливим лише завдяки
      збройній охороні тисяч козаків Петра Сагайдачного.
  - statement: Таємне висвячення Йова Борецького та інших єпископів врятувало православну
      церкву від зникнення через відсутність служителів.
    correct: true
    explanation: Без єпископів неможливо було б висвячувати нових священиків, що означало
      б повільну інституційну смерть.
  - statement: Хотинська війна сприяла негайному знищенню нововисвяченої православної
      ієрархії польськими військами.
    correct: false
    explanation: 'Саме загроза Хотинської війни стримала репресії: полякам була конче
      потрібна допомога козаків для відсічі османам.'
  - statement: Пункти заспокоєння руського народу 1632 року скасували існування уніатської
      церкви.
    correct: false
    explanation: 'Цей документ закріпив паралельне існування двох ієрархій: уніатської
      та відновленої православної.'
  - statement: Головним дипломатом, який домігся підписання Пунктів заспокоєння, став
      Іван Вишенський.
    correct: false
    explanation: Архітектором цього компромісу був Петро Могила, який блискуче використав
      свої зв'язки при дворі короля Владислава IV.
  - statement: У творі Тренос Мелетій Смотрицький зобразив православну церкву як багату
      і могутню царицю.
    correct: false
    explanation: Він використав емоційну алегорію бідної, покинутої Матері, рідні
      діти якої зрадили її.
  - statement: Політичний тиск козацтва під час періоду безкоролів'я відіграв ключову
      роль у легалізації православ'я.
    correct: true
    explanation: Козаки та православна шляхта категорично відмовлялися підтримувати
      обрання нового короля без твердих гарантій релігійних прав.
  instruction: Визначте, чи твердження правильне.
- type: comparative-study
  source_reading: reading-boretsky
  title: 'Порівняння підходів: Іван Вишенський та Петро Могила'
  items_to_compare:
  - Іван Вишенський (аскетична критика)
  - Петро Могила (інтелектуальний компроміс)
  criteria:
  - Ставлення до європейської світської освіти
  - Методи боротьби з впливом католицьких інновацій
  - Політична взаємодія з польською державною владою
  prompt: Проаналізуйте та порівняйте стратегії порятунку православної церкви, які
    пропонували Іван Вишенський та Петро Могила. Який шлях виявився більш ефективним
    для виживання церкви в умовах Речі Посполитої?
  model_answer: Іван Вишенський діяв з позицій радикального консерватизму. Він відкидав
    європейську католицьку освіту і закликав до простоти раннього християнства, гостро
    критикуючи багатство владик і відмовляючись від будь-яких компромісів. Натомість
    Петро Могила обрав стратегію модернізації та прагматизму. Він переконав польську
    еліту визнати церкву завдяки дипломатії, створив колегію за західним зразком для
    конкуренції з єзуїтами і досяг легалізації церкви через компроміс у вигляді визнання
    двох паралельних ієрархій.
