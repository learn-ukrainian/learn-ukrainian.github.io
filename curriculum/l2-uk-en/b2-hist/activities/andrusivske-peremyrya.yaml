- type: reading
  id: reading-andrusovo
  title: "Первинне джерело: З Андрусівського договору 1667 року"
  source: "Стаття 3 договору"
  text: |
    А козаки Запорозькі, і ті, що в Січі, і ті, що в Кодаку, і ті, що по інших місцях, мають бути в послушенстві та під захистом обох Великих Державців... І якщо б від них, козаків, виникло якесь свавілля або зрада, то обом Великим Державцям, пославши свої війська, їх гамувати і карати.
  tasks:
    - "Як у договорі називають запорозьких козаків?"
    - "Що означає спільний 'захист' для Січі на практиці?"

- type: true-false
  title: "Перевірка фактів: Андрусівське перемир'я"
  instruction: "Визначте, чи є наступні твердження правдивими."
  items:
    - statement: "Андрусівське перемир'я було укладене для встановлення вічного миру між Польщею та Московією."
      correct: false
      explanation: "Це було тактичне перемир'я на 13,5 років для відновлення сил обох імперій."
    - statement: "Українська делегація брала активну участь в обговоренні умов поділу по Дніпру."
      correct: false
      explanation: "Українських послів навіть не допустили до шатра переговорів."
    - statement: "Головним архітектором примирення з московського боку був Афанасій Ордин-Нащокін."
      correct: true
      explanation: "Він очолював переговори і був готовий пожертвувати Правобережжям заради миру з Польщею."
    - statement: "Афанасій Ордин-Нащокін вважав утримання всієї України стратегічно необхідним для Москви."
      correct: false
      explanation: "Він прагнув союзу з Польщею проти Швеції для виходу до Балтійського моря."
    - statement: "Згідно з договором, Київ мав залишитися під владою Москви назавжди."
      correct: false
      explanation: "Київ передавався Москві лише тимчасово, на два роки, але Москва його так і не повернула."
    - statement: "Запорозька Січ, за умовами перемир'я, переходила під спільне управління обох монархів."
      correct: true
      explanation: "Було встановлено унікальний статус подвійного підпорядкування (кондомініуму)."
    - statement: "Гетьман Іван Брюховецький повністю підтримав Андрусівську угоду."
      correct: false
      explanation: "Він відчув себе зрадженим і очолив масштабне антимосковське повстання у 1668 році."
    - statement: "Петро Дорошенко уклав союз з Османською імперією після Андрусівського перемир'я."
      correct: true
      explanation: "Це було прагматичне рішення для порятунку України від тотального знищення двома християнськими імперіями."
    - statement: "Події, що відбулися після Андрусівського перемир'я на Правобережжі, отримали назву 'Великий згін'."
      correct: true
      explanation: "Це був драматичний процес масового примусового переселення та втечі людей на Лівобережжя."
    - statement: "Європейські країни активно втрутилися в конфлікт, щоб захистити українську державність."
      correct: false
      explanation: "Західна Європа була зайнята власними війнами і розглядала Україну лише як провінцію Польщі."

- type: critical-analysis
  title: "Аналіз: Статус Запорозької Січі"
  source_reading: reading-andrusovo
  instruction: "Проаналізуйте уривок з договору щодо політичного статусу козацтва."
  target_text: "обом Великим Державцям, пославши свої війська, їх гамувати і карати"
  questions:
    - "Як ця фраза розкриває справжнє ставлення імперій до українського козацтва?"
    - "Чому козаки були визначені як об'єкт можливого спільного покарання?"
  model_answers:
    - "Ця фраза доводить, що імперії сприймали Січ не як незалежний політичний суб'єкт, а як загрозу та буферну зону, яку треба жорстко контролювати силою."
    - "Бо козаки прагнули незалежності, що загрожувало стабільності обох імперій, тому їхня природна волелюбність розцінювалася як зрада."
  focus_points:
    - "Колоніальний погляд на козацтво"
    - "Втрата політичної суб'єктності"

- type: comparative-study
  title: "Порівняння: Реакція на перемир'я"
  source_reading: reading-andrusovo
  instruction: "Порівняйте реакцію лівобережного та правобережного гетьманів на Андрусівську угоду."
  items_to_compare:
    - "Іван Брюховецький (Лівобережжя)"
    - "Петро Дорошенко (Правобережжя)"
  criteria:
    - "Початкове ставлення до Московського царства"
    - "Дії після дізнання про умови договору"
    - "Зовнішньополітичний вибір для порятунку держави"
  model_answer: |
    Брюховецький спочатку був надзвичайно лояльним до Москви, але після її відвертої зради ініціював збройне антимосковське повстання. Дорошенко ж завжди розумів загрозу від обох сусідів і шукав порятунку в протектораті Османської імперії задля об'єднання країни. Обидва гетьмани зрештою виступили зі зброєю проти імперій для захисту українських національних інтересів, хоча їхні початкові позиції були кардинально різними.

- type: essay-response
  title: "Есе: Трагедія геополітичної ампутації"
  source_reading: reading-andrusovo
  instruction: "Напишіть аргументоване есе, спираючись на текст договору та історичний контекст."
  prompt: |
    Напишіть есе про наслідки поділу України по річці Дніпро.
    Поясніть, чому цей новий кордон став не просто територіальною втратою, а глибокою соціальною, економічною та ментальною травмою для нації.
    Обов'язково використовуйте терміни: 'демаркація', 'розкол' та 'біженці'.
  min_words: 150
  model_answer: |
    Поділ України по Дніпру, затверджений дипломатами в Андрусові, став справжньою геополітичною ампутацією. Річка, яка століттями органічно об'єднувала націю і була головною торговельною артерією, в одну мить перетворилася на жорсткий, мілітаризований військовий кордон. Демаркація цієї лінії означала не лише формальну втрату територій, але й тотальне руйнування економіки, розрив родинних зв'язків та знищення єдиного культурного простору. Правобережжя було знову віддане під контроль католицької Польщі, що відразу викликало масову міграцію місцевого населення. Тисячі людей ставали біженцями, рятуючись від повернення польського гніту і постійних татарських набігів під час трагічного 'Великого згону'. Цей штучний імперський розкол заклав міцний фундамент для глибокої ментальної травми, примусово розділивши єдиний український народ на дві окремі політичні орбіти.
  rubric:
    - criteria: "Використання термінології"
      description: "Чи правильно та доречно використані терміни демаркація, розкол, біженці?"
      points: 10
    - criteria: "Глибина історичного аналізу"
      description: "Чи чітко пояснено соціальні, економічні та ментальні наслідки поділу для українського суспільства?"
      points: 10