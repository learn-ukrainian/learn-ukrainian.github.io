- type: reading
  id: reading-bielski
  title: "Свідчення Мартина Бєльського про страту Вишневецького"
  source: "Мартин Бєльський, Хроніка Польська"
  text: |
    П'ясецький загинув миттєво, натомість Вишневецький зачепився ребром і дивом залишився живим. Висячи на гаку і зазнаючи нестерпних мук, князь не просив пощади; навпаки, протягом трьох днів він голосно проклинав Магомета і мусульманську віру, пророкуючи загибель імперії. Розлючені турки зрештою розстріляли його з луків.
  tasks:
    - "Які деталі свідчать про публічний характер страти?"
    - "Як автор описує поведінку князя перед лицем смерті?"

- type: true-false
  title: "Правда чи вигадка: Життя і боротьба князя"
  instruction: "Визначте, чи є наведені твердження правдивими згідно з історичними фактами."
  items:
    - statement: "Дмитро Вишневецький походив із простої селянської родини, яка втекла від кріпацтва."
      correct: false
      explanation: "Він був багатим магнатом і нащадком князівської династії Гедиміновичів."
    - statement: "Замок на Малій Хортиці був збудований переважно з каменю та цегли."
      correct: false
      explanation: "Основними матеріалами були дерево та земля."
    - statement: "Вишневецький обіймав посаду старости в Каневі та Черкасах."
      correct: true
      explanation: "Король призначив його старостою для захисту південних кордонів."
    - statement: "Під час облоги 1557 року польський король надіслав козакам потужне підкріплення."
      correct: false
      explanation: "Сигізмунд II Август відмовився надати допомогу."
    - statement: "Вишневецький здійснював військові походи на Азов та Північний Кавказ."
      correct: true
      explanation: "Це відбувалося під час його ситуативного союзу з Московським царством."
    - statement: "Іван Грозний підтримував ідею війни з Кримом до кінця життя князя."
      correct: false
      explanation: "Цар змінив пріоритети, розпочавши Лівонську війну на півночі."
    - statement: "Після розриву з Москвою князь приєднався до московських військ у війні проти Литви."
      correct: false
      explanation: "Він принципово відмовився воювати проти своєї батьківщини."
    - statement: "Князь Дмитро потрапив у полон через зраду під час Молдавської кампанії."
      correct: true
      explanation: "Молдавські бояри влаштували йому пастку і передали туркам."
    - statement: "У народній пісні султан пропонує герою багатство в обмін на зречення християнства."
      correct: true
      explanation: "Байда рішуче відкидає цю пропозицію, обираючи честь і віру."
    - statement: "Діяльність Вишневецького підтверджує міф про винятково селянський характер раннього козацтва."
      correct: false
      explanation: "Його аристократичне походження доводить, що це був процес, очолюваний елітою."

- type: essay-response
  title: "Аналітичне есе: Смерть як політична демонстрація"
  source_reading: reading-bielski
  prompt: "Проаналізуйте свідомий вибір князя не просити пощади. Як його страта перетворилася на політичний маніфест і символічну перемогу? Напишіть розгорнуту відповідь, спираючись на текст хроніки та історичний контекст."
  min_words: 150
  model_answer: "Смерть Вишневецького мала на меті залякати ворогів імперії, однак його поведінка зламала цей сценарій. Відмовляючись благати про пощаду, він продемонстрував абсолютну незламність і духовну перевагу над катами. Його прокльони та витримка перетворили страту на акт опору. Замість покірного бранця турки отримали мученика, який надихнув тисячі послідовників. Це доводить, що ідея свободи та честі може бути сильнішою за фізичний біль, а публічна розправа часто має зворотний ефект для тиранів."
  rubric:
    - criteria: "Розуміння символізму"
      description: "Чітко пояснено, чому поведінка князя стала маніфестом."
      points: 5
    - criteria: "Аргументація"
      description: "Наведено переконливі докази зворотного ефекту страти."
      points: 5

- type: critical-analysis
  title: "Критичний аналіз: Вишневецький як протодержавний діяч"
  source_reading: reading-bielski
  instruction: "Дайте короткі, але змістовні відповіді на запитання щодо діяльності Дмитра Вишневецького."
  questions:
    - "Які дії Вишневецького свідчать про те, що він діяв як самостійний суверенний гравець, а не лише як староста чи полководець?"
    - "Чому традиційна польсько-литовська влада була нездатна ефективно захищати південні кордони?"
    - "Як ситуативний союз із Московським царством характеризує дипломатичні пріоритети князя?"
  model_answers:
    - "Він самостійно вів переговори зі Стамбулом і Москвою, засновував фортеці на нічийних землях та розробляв масштабні коаліційні плани."
    - "Пасивна оборона замків не працювала проти швидкої степової кінноти, а центр не виділяв достатньо грошей і військ для превентивних ударів."
    - "Він сприймав Москву виключно як джерело ресурсів для війни з Кримом, і легко розірвав союз, коли інтереси розійшлися, відмовившись воювати проти батьківщини."
  focus_points:
    - "Дипломатична незалежність"
    - "Криза пасивної оборони"
    - "Національна свідомість"

- type: comparative-study
  title: "Порівняльне дослідження: Еволюція козацького лідерства"
  source_reading: reading-bielski
  instruction: "Порівняйте постать Дмитра Вишневецького з пізнішими козацькими гетьманами."
  items_to_compare:
    - "Дмитро Вишневецький (аристократ-засновник)"
    - "Пізніші виборні гетьмани Запорозької Січі"
  criteria:
    - "Соціальне походження та статус"
    - "Відносини з центральною владою"
    - "Масштаб геополітичних цілей"
  prompt: "Напишіть порівняльний аналіз лідерства Вишневецького та пізніших гетьманів, спираючись на наведені критерії. Як його аристократичне походження вплинуло на методи керівництва та бачення світу?"
  model_answer: "Вишневецький був магнатом королівської крові, який використовував власні ресурси для заснування фортеці, діючи як незалежний монарх. Пізніші гетьмани обиралися козацькою радою і залежали від волі війська. Відносини Вишневецького з королем були відносинами рівного з рівним (він міг поїхати до Стамбула чи Москви без дозволу), тоді як пізніші лідери часто мусили формально визнавати чийсь протекторат. Однак обидва типи лідерів прагнули створити антитатарську коаліцію та зберегти автономію козацтва."