- type: reading
  id: "reading-soldier-letter"
  title: "Первинне джерело: Лист загиблого солдата"
  source: "З листа українського юнака до матері"
  text: "Мамо. Вибач, я не зумів дописати тобі листа. Мені вчора виповнилося 20, а сьогодні мене не стало. Але перед тобою і Батьківщиною я чистий. Я чесно виконав свій солдатський обов'язок... Єдине чого не зумів – це врятувати себе для тебе рідної."
  instruction: "Прочитайте уривок з листа та підготуйтеся до аналізу."

- type: critical-analysis
  title: "Аналіз первинного джерела"
  source_reading: "reading-soldier-letter"
  instruction: "Проаналізуйте лист солдата та дайте відповіді на запитання."
  questions:
    - "Який внутрішній конфлікт відображається у словах солдата?"
    - "Як ви розумієте фразу 'перед Батьківщиною я чистий' у контексті несправедливої війни?"
    - "Чому подібні листи часто не доходили до адресатів через офіційну пошту?"
  model_answers:
    - "Солдат відчуває провину перед матір'ю за свою неминучу смерть, але водночас намагається виправдати себе виконанням нав'язаного обов'язку."
    - "Це свідчить про глибокий вплив пропаганди: навіть перед обличчям смерті юнак мислить категоріями 'обов'язку', не усвідомлюючи, що держава його зрадила."
    - "Радянська цензура жорстко контролювала листування, забороняючи будь-які згадки про небезпеку, поранення чи смерть."

- type: true-false
  title: "Факти та міфи про війну"
  instruction: "Визначте, чи є твердження правильним (true) або хибним (false)."
  items:
    - statement: "Радянська пропаганда виправдовувала вторгнення необхідністю захисту від нападу Китаю."
      correct: false
      explanation: "Пропаганда виправдовувала вторгнення 'інтернаціональним обов'язком' та міфом про американську загрозу."
    - statement: "Понад 160 тисяч українців пройшли через війну в Афганістані."
      correct: true
      explanation: "Українці складали близько 25 відсотків радянського контингенту."
    - statement: "Операція 'Шторм-333' мала на меті захист чинного уряду Хафізулли Аміна."
      correct: false
      explanation: "Метою операції було фізичне усунення Аміна спецпідрозділами КДБ та ГРУ."
    - statement: "Термін 'Вантаж 200' виник через нормативну вагу цинкової труни."
      correct: true
      explanation: "Вага запаяної труни у дерев'яному ящику становила приблизно 200 кілограмів."
    - statement: "Діти компартійної номенклатури складали значну частину військовослужбовців у гарячих точках."
      correct: false
      explanation: "Вони успішно уникали служби в Афганістані завдяки корупції та зв'язкам."
    - statement: "Поява американських комплексів 'Стінгер' у 1986 році змінила хід війни."
      correct: true
      explanation: "Втрата радянською авіацією панування в повітрі стала переломним моментом."
    - statement: "Більшість втрат радянської армії були виключно бойовими."
      correct: false
      explanation: "Значний відсоток становили небойові втрати через інфекційні хвороби та нещасні випадки."
    - statement: "Радянські війська контролювали більшість території Афганістану, включаючи віддалені кишлаки."
      correct: false
      explanation: "Вони контролювали лише великі міста та головні магістралі, тоді як гори контролювали моджахеди."
    - statement: "Літак Ан-12, що перевозив тіла загиблих, отримав назву 'Чорний тюльпан'."
      correct: true
      explanation: "Це стало поширеним фольклорним символом трагедії."
    - statement: "Сучасна українська історіографія розглядає українських учасників війни як 'героїв-інтернаціоналістів'."
      correct: false
      explanation: "Їх розглядають як жертв імперської мобілізації, яких змусили воювати за чужі інтереси."

- type: comparative-study
  title: "Імперські механізми тоді і зараз"
  instruction: "Порівняйте використання людського ресурсу колонізованих народів."
  items_to_compare:
    - "Дії СРСР в Афганістані (1979-1989)"
    - "Дії Російської Федерації проти України (сучасність)"
  criteria:
    - "Кого мобілізують (цільові групи)"
    - "Риторика виправдання"
    - "Ставлення до життя солдата"
  prompt: "Проаналізуйте історичну наступність імперської політики Москви на основі запропонованих критеріїв."
  model_answer: "СРСР мобілізував українців, білорусів та інші народи для війни в Афганістані, так само як сучасна РФ використовує бурятів, тувинців та мешканців окупованих територій України. Риторика також ідентична: 'інтернаціональний обов'язок' змінився на 'захист російськомовних', хоча мета залишається незмінною — агресія та окупація. В обох випадках життя мобілізованих з поневолених територій не має для імперії жодної цінності."

- type: essay-response
  title: "Деколонізаційний погляд на пам'ять"
  instruction: "Напишіть розгорнуте есе на запропоновану тему."
  prompt: "Напишіть есе про те, чому українське суспільство відмовляється від терміну 'воїни-інтернаціоналісти'. Як зміна термінології допомагає деколонізувати історичну пам'ять та усвідомити справжню роль українців у цій війні?"
  min_words: 150
  model_answer: "Термін 'воїни-інтернаціоналісти' був штучно створений радянською пропагандою для маскування збройної агресії проти незалежної держави. Він нав'язував хибне уявлення про благородну місію, тоді як насправді це була військова окупація. Відмова від цього терміну є критично важливою для процесу деколонізації пам'яті. Називаючи речі своїми іменами, ми розуміємо, що українці в Афганістані були насамперед жертвами жорстокої імперської мобілізації, яких перетворили на інструмент агресії. Це зміщує фокус відповідальності на злочинний режим Кремля. Розуміння того, що українці воювали не за свої інтереси, а використовувалися як безправне гарматне м'ясо імперії, допомагає деконструювати радянські міфи і по-іншому поглянути на цінність та необхідність власної незалежної держави."
  rubric:
    - criteria: "Історична точність"
      description: "Чітке пояснення походження та реальної мети радянського терміну."
      points: 5
    - criteria: "Деколонізаційний аналіз"
      description: "Розкриття ролі українців як жертв імперської мобілізації."
      points: 5