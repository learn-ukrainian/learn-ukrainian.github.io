- type: reading
  id: reading-bucha
  title: 'Свідчення вижилих з Бучі'
  source: 'Усна історія (Слідство.Інфо)'
  text: |
    Навесні дві тисячі двадцять другого року назви невеликих містечок під Києвом стали відомі всьому світу. Звірства, виявлені після відступу російських військ з Бучі, Ірпеня та Бородянки, стали переломним моментом. Світ побачив шокуючі докази масових розстрілів цивільних осіб із зав'язаними руками, братські могили та сліди жорстоких катувань. Окупанти мали заздалегідь складені списки місцевих активістів, колишніх військових та посадовців, яких вони цілеспрямовано шукали та знищували.
  tasks:
    - 'Які докази воєнних злочинів побачив світ після деокупації Бучі?'
    - 'З якою метою російські військові використовували заздалегідь складені списки?'
    - 'Як ці події вплинули на ставлення світової спільноти до війни?'
    - 'Чому розстріли цивільних вважаються системною політикою, а не випадковістю?'

- type: critical-analysis
  title: 'Аналіз: Воєнні злочини як державна політика'
  source_reading: reading-bucha
  target_text: |
    Окупанти мали заздалегідь складені списки місцевих активістів, колишніх військових та посадовців, яких вони цілеспрямовано шукали та знищували.
  questions:
    - 'Як наявність підготовлених списків спростовує твердження про те, що злочини були ексцесами окремих солдатів?'
    - 'Яку роль відігравали такі цілеспрямовані вбивства в загальній стратегії залякування цивільного населення?'
  model_answers:
    - 'Наявність заздалегідь підготовлених списків свідчить про системне планування злочинів на найвищому рівні ще до початку вторгнення. Це доводить, що терор був цілеспрямованою державною політикою.'
    - 'Цілеспрямоване знищення лідерів громад, активістів та колишніх військових мало на меті зламати здатність суспільства до спротиву, деморалізувати населення та полегшити встановлення окупаційного контролю.'
  focus_points:
    - 'Державна політика терору'
    - 'Системність злочинів'
    - 'Залякування населення'

- type: essay-response
  title: 'Есе: Національна стійкість під час війни'
  source_reading: reading-bucha
  prompt: |
    Спираючись на текст модуля та загальний контекст, поясніть феномен української національної стійкості (resilience). Як українське суспільство адаптувалося до екзистенційних загроз, таких як блекаути та окупація? Наведіть приклади самоорганізації.
  min_words: 150
  model_answer: |
    Українська національна стійкість — це не просто здатність виживати, а активна спроможність суспільства зберігати свою функціональність та адаптуватися до критичних умов. Яскравим прикладом цього є енергетичний фронт: під час блекаутів український бізнес масово перейшов на генератори, а держава і суспільство створили мережу Пунктів незламності. Крім того, безпрецедентний волонтерський рух, що базується на горизонтальних зв'язках, дозволив ефективно закривати потреби армії та цивільних. Ця стійкість стала вирішальним фактором у провалі планів агресора зламати волю нації до опору.
  rubric:
    - criteria: 'Розкриття поняття стійкості'
      description: 'Есе чітко пояснює сутність концепції національної стійкості'
      points: 4
    - criteria: 'Наведення прикладів'
      description: 'Надано конкретні приклади адаптації та самоорганізації'
      points: 3
    - criteria: 'Аналітичний підхід'
      description: 'Продемонстровано розуміння того, як ці процеси вплинули на хід війни'
      points: 3

- type: comparative-study
  title: 'Порівняння: Російська пропаганда проти реальності'
  source_reading: reading-bucha
  instruction: 'Проаналізуйте відмінності між російськими інформаційними наративами та реальними фактами, зафіксованими міжнародними організаціями.'
  items_to_compare:
    - 'Російський наратив про постановку та фейки'
    - 'Фактичні докази (супутникові знімки Maxar, ексгумація тіл, свідчення очевидців)'
  criteria:
    - 'Мета поширення інформації'
    - 'Рівень доказовості'
    - 'Вплив на міжнародне правосуддя'
  model_answer: |
    Російська пропаганда використовує тактику віддзеркалення та заперечення з метою посіяти сумніви та уникнути відповідальності. Ці наративи не спираються на жодні докази. Натомість реальна ситуація підтверджується незалежними джерелами: супутникові знімки компанії Maxar зафіксували тіла ще під час російського контролю над містом, а міжнародні слідчі провели детальні ексгумації. Реальні докази стають основою для рішень Міжнародного кримінального суду, тоді як російські міфи слугують лише інструментом дегуманізації та інформаційної війни.

- type: true-false
  title: 'Перевірка фактів: Злочини і стійкість'
  instruction: 'Визначте, чи є ці твердження правильними (true) чи хибними (false).'
  items:
    - statement: 'Воєнні злочини російської армії в Україні були випадковими помилками окремих солдатів, а не спланованою державною політикою.'
      correct: false
      explanation: 'Воєнні злочини були глибоко продуманою та систематичною політикою керівництва держави-агресора для залякування населення.'
    - statement: 'Супутникові знімки компанії Maxar спростували заяви російської пропаганди про те, що трагедія в Бучі була постановкою.'
      correct: true
      explanation: 'Знімки чітко зафіксували тіла на вулицях ще до звільнення міста українськими військами.'
    - statement: 'Оборона Маріуполя тривала вісімдесят шість днів у повному оточенні ворожих сил.'
      correct: true
      explanation: 'Захисники міста героїчно тримали оборону 86 днів, що відтягнуло на себе значні сили ворога.'
    - statement: 'Напис ДІТИ біля Драмтеатру в Маріуполі зупинив російську авіацію від бомбардування будівлі.'
      correct: false
      explanation: 'Попри чіткий напис, ворожий літак цілеспрямовано скинув авіабомби на театр, який слугував бомбосховищем.'
    - statement: 'Головною метою енергетичного терору було позбавити цивільне населення світла, тепла та спровокувати міграційну кризу.'
      correct: true
      explanation: 'Агресор намагався заморозити населення взимку, щоб примусити політичне керівництво України до капітуляції.'
    - statement: 'Міжнародний кримінальний суд видав ордер на арешт президента РФ за цілеспрямовані ракетні удари по енергетиці.'
      correct: false
      explanation: 'Ордер був виданий за воєнний злочин — незаконну масову депортацію та примусове переміщення українських дітей.'
    - statement: 'Мережа Пунктів незламності була створена виключно міжнародними гуманітарними організаціями без участі української держави.'
      correct: false
      explanation: 'Це була спільна державна та громадська відповідь на енергетичний терор, що продемонструвала високий рівень самоорганізації.'
    - statement: 'Фонд Сергія Притули за кілька днів зібрав кошти на купівлю цілої ескадрильї ударних безпілотників Байрактар.'
      correct: true
      explanation: 'Це був феноменальний приклад народних мегазборів, коли суспільство акумулювало 600 мільйонів гривень за неповні три дні.'
    - statement: 'Історик Тімоті Снайдер стверджує, що агресія проти України є звичайним територіальним конфліктом без ознак геноциду.'
      correct: false
      explanation: 'Тімоті Снайдер переконливо аргументує, що дії Росії мають чітко виражений геноцидний характер.'
    - statement: 'Балаклійсько-Куп''янська наступальна операція призвела до каскадного обвалу російської оборони на Харківщині.'
      correct: true
      explanation: 'Блискавичний наступ української армії восени 2022 року змусив елітні ворожі підрозділи панічно тікати, залишаючи техніку.'