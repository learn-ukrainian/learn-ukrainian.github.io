- type: reading
  id: reading-nalyvaiko-letter
  title: "Джерело: Лист Северина Наливайка до короля"
  source: "Северин Наливайко (1596)"
  text: |
    Найясніший милостивий Пане Королю... служив йому [Острозькому], як мені належало, лицарськи... а після того мордування отця мого звів зі світу. Ми не є свавільниками, а шукаємо справедливості та захисту наших старовинних вольностей. Просимо дозволити нам створити Удільне князівство між Дністром і Південним Бугом, де б ми могли нести лицарську службу на захист кордонів Речі Посполитої від татарських набігів, маючи власну автономію та суд.
  tasks:
    - "Які головні аргументи висуває Наливайко у своєму зверненні?"
    - "Як він пояснює мотиви своїх дій та дій козацтва?"

- type: essay-response
  title: "Есе: Еволюція козацьких вимог"
  source_reading: reading-nalyvaiko-letter
  prompt: "Проаналізуйте, як змінилися вимоги козацтва від приватних образ (як у випадку з Криштофом Косинським) до масштабних політичних проєктів, таких як ідея Удільного князівства Северина Наливайка. Використайте текст листа для аргументації."
  min_words: 150
  model_answer: "Еволюція козацьких вимог наприкінці шістнадцятого століття демонструє перехід від захисту особистих майнових прав до боротьби за політичну автономію. Якщо повстання Косинського розпочалося як приватна вендета за захоплений маєток Рокитне, то Северин Наливайко вже мислив категоріями державного будівництва. У своєму листі він пропонує створити Удільне князівство — автономну територію, яка б служила буфером проти татарських набігів. Це свідчить про формування нової республіканської еліти, здатної формулювати глибокі політичні програми та вимагати інституційного закріплення своїх прав, перетворюючись із прикордонних найманців на самостійний політичний суб'єкт."
  rubric:
    - criteria: "Аналіз еволюції"
      description: "Чітко простежується перехід від приватних конфліктів до системних політичних вимог."
      points: 10
    - criteria: "Використання джерела"
      description: "Успішно та доречно використано аргументи з тексту листа Наливайка."
      points: 10

- type: comparative-study
  title: "Порівняння: Косинський та Наливайко"
  source_reading: reading-nalyvaiko-letter
  items_to_compare:
    - "Повстання Криштофа Косинського"
    - "Повстання Северина Наливайка"
  criteria:
    - "Безпосередні причини виступу"
    - "Масштаб і географія військових дій"
    - "Політична програма та стратегічна мета"
  prompt: "Порівняйте два найбільші козацькі повстання кінця шістнадцятого століття за наведеними критеріями."
  model_answer: "Повстання Косинського розпочалося через приватний майновий конфлікт із магнатом Острозьким і локалізувалося переважно на Київщині та Волині. Його головною метою було відновлення особистої справедливості та захист майна. Натомість повстання Наливайка мало значно ширший розмах, охопивши величезні території від Поділля до сучасної Білорусі. Воно відзначалося наявністю чіткої політичної програми — ідеї створення козацького Удільного князівства, що свідчило про набагато вищий рівень політичної зрілості повстанців та їхнє свідоме прагнення до широкої інституційної автономії."

- type: reading
  id: reading-seim-1596
  title: "Джерело: Сеймова конституція 1596 року"
  source: "Постанова Варшавського сейму"
  text: |
    Оскільки козаки низові не припиняють свого свавілля і піднімають зброю проти законної влади та маєтків шляхетських, віднині ми оголошуємо їх ворогами вітчизни. Всі їхні вольності та привілеї скасовуються, а землі підлягають конфіскації. Реєстрове військо, яке зрадило свою присягу, також ліквідується. Кожен шляхтич має право карати свавільників без суду для збереження спокою в державі.
  tasks:
    - "Який новий юридичний статус отримали козаки за цією сеймовою конституцією?"
    - "Які наслідки цей документ мав для легального реєстрового війська?"

- type: critical-analysis
  title: "Аналіз: Легалізація державного терору"
  source_reading: reading-seim-1596
  target_text: "віднині ми оголошуємо їх ворогами вітчизни... Кожен шляхтич має право карати свавільників без суду"
  questions:
    - "Які правові та довгострокові політичні наслідки мало проголошення всіх козаків 'ворогами вітчизни'?"
    - "Як дозвіл на покарання людей без суду вплинув на подальшу ескалацію збройного конфлікту?"
  model_answers:
    - "Проголошення козаків ворогами вітчизни означало повне скасування їхніх громадянських та майнових прав, ліквідацію реєстру та виштовхування цілого стану за межі легального правового поля. Це фактично знищило будь-яку можливість мирного діалогу."
    - "Легалізація позасудових розправ перетворила державний закон на прямий інструмент репресій та терору. Це лише посилило радикалізацію українського суспільства, оскільки жорсткий збройний спротив залишився єдиним можливим способом фізичного виживання."

- type: true-false
  title: "Правда чи вигадка: Факти про повстання"
  instruction: "Визначте, чи є наведені твердження правдивими з історичної точки зору."
  items:
    - statement: "Повстання Криштофа Косинського розпочалося виключно як протест проти релігійних утисків православної церкви."
      correct: false
      explanation: "Повстання розпочалося через приватний майновий конфлікт — захоплення маєтку Рокитне білоцерківським старостою Янушем Острозьким."
    - statement: "Під час захоплення Білої Церкви козацькі загони свідомо спалили офіційні боргові архіви місцевої адміністрації."
      correct: true
      explanation: "Це був глибоко символічний політичний акт скасування правової системи, яка міцно закріплювала феодальні повинності."
    - statement: "У масштабній битві під П'яткою військо Косинського мало значну перевагу над ворогами у кількості важкої артилерії."
      correct: false
      explanation: "Навпаки, козаки критично поступалися польському війську князів Острозьких саме у наявності потужної польової артилерії."
    - statement: "Після взяття міста Северин Наливайко публічно проголосив Брацлав 'вільним козацьким містом'."
      correct: true
      explanation: "Це стало першою практичною спробою створення автономної козацької адміністрації на звільненій від шляхти території."
    - statement: "У війську Наливайка радикали-нереєстровці категорично відмовилися об'єднуватися з офіційними реєстровими козаками Лободи."
      correct: false
      explanation: "Наливайку вдалося створити унікальну, хоча й нестабільну коаліцію, що об'єднала реєстровців (Лобода) та запорожців (Шаула)."
    - statement: "Тактика рухомого табору з возів (вагенбурга) успішно використовувалася козацькою піхотою для захисту від важкої польської гусарії."
      correct: true
      explanation: "Міцно зчеплені ланцюгами вози утворювали неприступну пересувну фортецю, що повністю нівелювала нищівний удар кінноти."
    - statement: "Проєкт Удільного князівства передбачав створення повністю незалежної від Речі Посполитої держави на чолі з королем."
      correct: false
      explanation: "Проєкт передбачав широку автономію, проте козаки погоджувалися залишатися під зверхністю короля та нести прикордонну службу."
    - statement: "В урочищі Солониця коронні війська чесно дотрималися обіцянки про загальну амністію після того, як козаки добровільно склали зброю."
      correct: false
      explanation: "Станіслав Жолкевський віроломно порушив свою обіцянку і влаштував криваву різанину роззброєного табору, не шкодуючи навіть цивільних."
    - statement: "Сеймова конституція тисяча п'ятсот дев'яносто шостого року офіційно визнала українське козацтво окремим повноправним лицарським станом."
      correct: false
      explanation: "Навпаки, ця реакційна конституція проголосила всіх без винятку козаків 'ворогами вітчизни' і формально повністю ліквідувала реєстр."
    - statement: "Російська імперська історіографія традиційно описувала ці ранні повстання як примітивні та стихійні селянські бунти."
      correct: true
      explanation: "Цей колоніальний міф створювався свідомо, аби приховати державотворчий характер рухів та повністю маргіналізувати молоду українську еліту."