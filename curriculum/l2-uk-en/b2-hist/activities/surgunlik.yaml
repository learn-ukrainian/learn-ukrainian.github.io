- type: reading
  id: reading-survivors
  title: 'Свідчення вижилих: Ранок 18 травня'
  source: 'Усніє Чолпан'
  text: |
    Рано-вранці в будинок увірвалися озброєні радянські солдати: "Збирайтеся! Вас, зрадників, зараз виселяють". Куди саме? Навіщо це все? Чому ми? ... Взяла в першу чергу наш Коран... Нам заборонялося абсолютно все, окрім смерті.
  tasks:
    - 'Якими були перші слова солдатів, що увірвалися до будинку?'
    - 'Що дівчина вирішила взяти з собою в першу чергу і чому?'
    - 'Як фраза про заборону всього, окрім смерті, характеризує правовий статус депортованих?'
    - 'Чому раптовість була ключовим елементом операції НКВС?'

- type: reading
  id: reading-greeks
  title: 'Спогади: Зачистка Приазов''я'
  source: 'Історичні свідчення депортованих греків'
  text: |
    Нас безжально везли довгими тижнями в абсолютно невідомому напрямку, без найменшої можливості навіть просто вимити руки. Спільне, невимовне горе об'єднувало представників абсолютно різних національностей, які мусили щодня виживати в суворих умовах чужини, стикаючись із тим самим жорстким комендантським режимом спецпоселень.
  tasks:
    - 'В яких умовах відбувалося транспортування депортованих греків?'
    - 'Що об''єднувало різні національності у місцях заслання?'
    - 'Яким був режим життя у нових поселеннях?'

- type: critical-analysis
  title: 'Верифікація фактів: Міф про народ-зрадник'
  source_reading: reading-survivors
  target_text: |
    Офіційне радянське звинувачення кримських татар у масовому колабораціонізмі було лише зручним ідеологічним міфом... Понад сімнадцять тисяч сміливих кримських татар віддано воювали у лавах Червоної армії.
  questions:
    - 'Який головний аргумент використовувала радянська влада для виправдання депортації?'
    - 'Скільки кримських татар насправді воювали у лавах Червоної армії?'
    - 'Чому звинувачення в колабораціонізмі було лише ідеологічною ширмою?'
    - 'Якою була справжня демографічна мета сталінського режиму в Криму?'
    - 'Як сучасна Російська Федерація використовує цей радянський міф?'
  model_answers:
    - 'Радянська влада звинувачувала весь народ у масовому колабораціонізмі та зраді.'
    - 'Понад сімнадцять тисяч кримських татар воювали в армії, багато хто отримав нагороди.'
    - 'Це був привід для етнічної чистки та русифікування стратегічно важливого регіону.'
    - 'Метою було повне очищення півострова від автохтонного населення для колонізації.'
    - 'Цей міф використовується для виправдання нових репресій в окупованому Криму.'
  focus_points:
    - 'Деконструкція радянської пропаганди'
    - 'Історичні факти участі у війні'

- type: essay-response
  title: 'Есе: Чому депортація кримських татар є геноцидом?'
  source_reading: reading-survivors
  prompt: |
    Спираючись на свідчення вижилих та історичні факти, проаналізуйте трагедію Sürgünlik через призму Конвенції ООН про геноцид. Розгляньте намір режиму, умови транспортування та режим спецпоселень. Чому важливо використовувати саме термін "геноцид", а не просто "депортація"?
  min_words: 150
  model_answer: |
    Трагедія Sürgünlik є класичним прикладом геноциду, оскільки дії радянської влади мали чіткий системний характер і намір фізично та культурно знищити кримськотатарський народ. Умови в товарних вагонах під час транспортування та подальший режим спецпоселень в Узбекистані були свідомо створені так, щоб спричинити високу смертність, яка досягла 46% у перші роки. Заборона на повернення, знищення культурної спадщини та топоніміки Криму підтверджують мету повного стирання ідентичності. Використання терміна "геноцид" необхідне для історичної справедливості та деколонізації, оскільки воно визнає справжній масштаб злочину проти корінного народу.
  rubric:
    - criteria: 'Аргументація геноцидного наміру'
      description: 'Есе наводить чіткі докази свідомого наміру режиму знищити народ.'
      points: 40
    - criteria: 'Аналіз умов заслання'
      description: 'Описано вплив транспортування та спецпоселень на рівень смертності.'
      points: 30
    - criteria: 'Значення термінології'
      description: 'Пояснено деколонізаційне та правове значення визнання подій геноцидом.'
      points: 30

- type: true-false
  title: 'Депортації: міфи та реальність'
  instruction: 'Визначте, чи є наведені твердження правдивими, чи хибними.'
  items:
    - statement: 'Депортація кримських татар розпочалася вісімнадцятого травня тисяча дев''ятсот сорок четвертого року.'
      correct: true
      explanation: 'Саме в цей день о третій годині ранку почалася основна фаза каральної операції.'
    - statement: 'Радянська влада давала людям кілька днів на збори перед виселенням.'
      correct: false
      explanation: 'Людям давали від кількох хвилин до пів години на збори, щоб посіяти паніку.'
    - statement: 'Кримські татари були єдиним народом, депортованим з території Криму.'
      correct: false
      explanation: 'Також були депортовані греки, болгари, вірмени та німці.'
    - statement: 'Основна маса виселених кримських татар опинилася в пустельному Узбекистані.'
      correct: true
      explanation: 'Клімат Узбекистану різко відрізнявся від кримського, що призвело до масових хвороб.'
    - statement: 'У місцях заслання депортовані мали право вільно пересуватися країною.'
      correct: false
      explanation: 'Вони жили у спецпоселеннях і не мали права вільно пересуватися навіть сусідніми селами.'
    - statement: 'Під час транспортування людей перевозили у комфортних пасажирських потягах.'
      correct: false
      explanation: 'Людей перевозили у задушливих вагонах для худоби без нормальної води та їжі.'
    - statement: 'За офіційними даними, у перші роки заслання загинуло близько сорока шести відсотків депортованих.'
      correct: true
      explanation: 'Висока смертність була спричинена голодом, хворобами та нестерпними умовами життя.'
    - statement: 'Після смерті Сталіна кримським татарам одразу дозволили повернутися на батьківщину.'
      correct: false
      explanation: 'Заборона на повернення діяла аж до періоду політичної Перебудови наприкінці 80-х років.'
    - statement: 'Радянська влада цілеспрямовано змінювала історичну топоніміку Криму на російську.'
      correct: true
      explanation: 'Це робилося для того, щоб назавжди стерти пам''ять про корінний народ півострова.'
    - statement: 'Масове виселення етнічних німців України відбулося як превентивний захід ще до окупації Криму.'
      correct: true
      explanation: 'Депортація німців розпочалася у серпні 1941 року через параноїдальні побоювання зради.'