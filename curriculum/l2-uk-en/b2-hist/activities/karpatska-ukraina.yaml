- type: reading
  id: reading-spohady-sabola
  title: "Первинне джерело: Спогади учасників Карпатської Січі"
  instruction: "Прочитайте уривок зі спогадів про Карпатську Січ та підготуйтеся до аналізу."
  source: "Севастіян Сабол (Зореслав), 'Від Угорської Русі до Карпатської України'"
  text: |
    Наша молодь ішла на смерть з молитвою та піснею. Коли почався наступ, гімназисти і семінаристи не відступили. Вони не мали достатньо зброї, але мали віру в незалежність. Це був не просто бій за територію, це був акт духовної оборони нації від агресії.
  tasks:
    - "Які емоції переважали серед січовиків під час наступу?"
    - "Як автор описує духовний вимір оборони?"
    - "Чому молодь не відступила перед переважаючими силами ворога?"
    - "Що означав цей спротив для формування української ідентичності?"

- type: essay-response
  title: "Есе: Значення Карпатської України"
  instruction: "Напишіть розгорнуту відповідь, спираючись на прочитаний текст та історичний контекст."
  source_reading: "reading-spohady-sabola"
  prompt: "Проаналізуйте, чому проголошення та оборона Карпатської України є важливими для формування сучасної української ідентичності. Як цей короткий період державності вплинув на подолання комплексу меншовартості?"
  min_words: 200
  model_answer: "Проголошення Карпатської України стало каталізатором національного пробудження. Незважаючи на військову поразку та окупацію, безпрецедентний збройний спротив січовиків засвідчив готовність українців зі зброєю в руках захищати свою незалежність. Це зруйнувало міф про покірність нації. Утвердження синьо-жовтого прапора та гімну створило символічний міст до здобуття повноцінної незалежності у 1991 році."
  rubric:
    - criteria: "Аргументація"
      description: "Чіткість та обґрунтованість тез щодо впливу на ідентичність."
      points: 10
    - criteria: "Історичний контекст"
      description: "Правильне використання фактів про проголошення та оборону 1939 року."
      points: 10

- type: critical-analysis
  title: "Критичний аналіз: Конституційний Закон Ч.1"
  instruction: "Проаналізуйте наведені положення та дайте відповіді на запитання."
  target_text: "1. Карпатська Україна є незалежна Держава. 2. Назва Держави є: КАРПАТСЬКА УКРАЇНА. 3. Карпатська Україна є республіка..."
  questions:
    - "Чому відмова від назви 'Підкарпатська Русь' мала критичне значення?"
    - "Як форма правління (республіка) відображала європейські демократичні прагнення українців?"
    - "Яким чином цей закон легітимізував боротьбу Карпатської Січі?"
  model_answers:
    - "Зміна назви підкреслювала єдність із Великою Україною та відкидала імперські концепції відокремленості Закарпаття."
    - "Республіканський устрій контрастував із тоталітарними сусідніми режимами (Угорщина, Німеччина) та засвідчував демократичний вибір нації."
    - "Закон перетворив добровольців Січі на офіційних захисників суверенної держави від зовнішньої агресії."
  focus_points:
    - "Деколонізація назви"
    - "Демократичний устрій"
    - "Правовий статус оборони"

- type: comparative-study
  title: "Порівняльний аналіз: Автономія та Незалежність"
  instruction: "Порівняйте політичний статус Закарпаття у різні періоди."
  items_to_compare:
    - "Автономія Підкарпатської Русі (жовтень 1938)"
    - "Незалежність Карпатської України (березень 1939)"
  criteria:
    - "Рівень політичного суверенітету"
    - "Вплив зовнішніх геополітичних факторів"
    - "Реакція сусідніх держав (особливо Угорщини)"
  prompt: "Зіставте автономний та незалежний статуси Закарпаття за запропонованими критеріями. Які фактори змусили уряд Августина Волошина перейти від вимог автономії до проголошення повної незалежності?"
  model_answer: "У стані автономії Закарпаття залишалося частиною Чехословаччини, маючи лише самоврядування, тоді як незалежність означала повний суверенітет. Перехід до незалежності був спровокований розпадом Чехословаччини та агресією Угорщини. Якщо автономія викликала дипломатичний тиск, то незалежність зустріла відкриту збройну інтервенцію ворога."

- type: true-false
  title: "Правда чи хиба: Факти про Карпатську Україну"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "Столицею Карпатської України після Віденського арбітражу стало місто Ужгород."
      correct: false
      explanation: "Після втрати Ужгорода та Мукачева столицю було перенесено до міста Хуст."
    - statement: "Августин Волошин очолив автономний уряд Закарпаття у жовтні 1938 року."
      correct: true
      explanation: "Августин Волошин був призначений прем'єр-міністром після відставки уряду Андрія Бродія."
    - statement: "Карпатська Січ була регулярною професійною армією з важким озброєнням."
      correct: false
      explanation: "Карпатська Січ формувалася як добровільне ополчення і мала катастрофічний брак зброї."
    - statement: "Конституційний Закон Ч.1 затвердив синьо-жовтий прапор як державний символ."
      correct: true
      explanation: "Сойм офіційно ухвалив національні символи, підтверджуючи єдність із загальноукраїнським рухом."
    - statement: "Проголошення незалежності відбулося за прямої підтримки уряду нацистської Німеччини."
      correct: false
      explanation: "Берлін радив українцям капітулювати перед Угорщиною, тому оборона Хуста була самостійним актом спротиву."
    - statement: "Бій на Красному полі 16 березня 1939 року часто називають Українськими Термопілами."
      correct: true
      explanation: "Жменька січовиків героїчно тримала оборону проти переважаючих сил регулярної угорської армії."
    - statement: "Угорська окупація Закарпаття супроводжувалася масовими репресіями та розстрілами полонених."
      correct: true
      explanation: "Окупанти жорстоко розправлялися з січовиками, зокрема передаючи їх на розстріл польським прикордонникам на перевалах."
    - statement: "Більшість депутатів Сойму проголосували проти незалежності, щоб уникнути війни."
      correct: false
      explanation: "Усі ключові рішення, включаючи проголошення незалежності, були ухвалені депутатами Сойму одноголосно."
    - statement: "Захищати Карпатську Україну приїхало багато добровольців із Галичини та еміграції."
      correct: true
      explanation: "Закарпаття стало українським П'ємонтом, куди масово з'їжджалися патріоти для розбудови державності."
    - statement: "Державною мовою Карпатської України була визнана чеська мова."
      correct: false
      explanation: "Згідно з Конституційним Законом Ч.1, єдиною державною мовою Карпатської України була українська."