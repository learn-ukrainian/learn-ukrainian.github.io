- type: reading
  id: "reading-velychko"
  title: "Первинне джерело: Літопис Самійла Величка"
  instruction: "Прочитайте уривок з козацького літопису для подальшого аналізу."
  source: "Самійло Величко"
  text: "Нехай виповідять людською мовою про лицарську діяльність нашу поля й долини, хащі та гори... коли ви ставали й воювали за свої вольності з мужнім і величним серцем, з рицарською відвагою проти ворогів!"

- type: true-false
  title: "Міфи та факти: Перевірка розуміння"
  instruction: "Визначте, які твердження є правдивими, а які — хибними."
  items:
    - statement: "Формування козацтва стало наслідком органічного синтезу давньоруської традиції та мілітарних практик Великого Степу."
      correct: true
    - statement: "Абсолютна більшість перших козацьких ватажків походила з найбідніших верств селянства."
      correct: false
      explanation: "Значна частина провідників мала шляхетське походження (наприклад, Косинський, Наливайко, Сагайдачний)."
    - statement: "Перша задокументована згадка про організовану військову операцію українських козаків належить до 1492 року."
      correct: true
    - statement: "Соціальний статус людини на Запорозькій Січі залежав від знатності її родоводу та розміру маєтків."
      correct: false
      explanation: "На Січі походження не мало значення, авторитет завойовувався виключно особистою хоробрістю та інтелектом."
    - statement: "У морських походах козаки використовували переважно великі галери європейського зразка."
      correct: false
      explanation: "Козаки використовували легкі, швидкі та маневрені човни — чайки."
    - statement: "У Хотинській битві 1621 року козацьке військо взяло на себе головний удар, зупинивши османську навалу."
      correct: true
    - statement: "Гетьман Петро Сагайдачний разом з усім військом відмовився підтримувати київських православних інтелектуалів."
      correct: false
      explanation: "У 1620 році Сагайдачний вступив до Київського Богоявленського братства, взявши його під свій збройний захист."
    - statement: "Києво-Могилянська колегія, заснована у 1632 році, стала потужним інтелектуальним центром."
      correct: true
    - statement: "Європейські монархи ніколи не вербували козацькі підрозділи як найманців, побоюючись їхньої недисциплінованості."
      correct: false
      explanation: "Козаки брали активну участь у Тридцятилітній війні як професійні найманці, яких високо цінували у Франції та Австрії."
    - statement: "Головною політичною метою козацтва була побудова безкласового суспільства."
      correct: false
      explanation: "Козаки боролися за здобуття і розширення власних законних громадянських та політичних прав (вольностей)."

- type: critical-analysis
  title: "Аналіз тексту: Риторика лицарства"
  instruction: "Проаналізуйте уривок з літопису Самійла Величка."
  source_reading: "reading-velychko"
  target_text: "Літопис Самійла Величка"
  questions:
    - "Якими словами автор описує характер боротьби запорожців?"
    - "Що означає концепція 'законних вольностей' у контексті цього літопису?"
  model_answers:
    - "Автор використовує піднесений стиль, вживаючи словосполучення 'лицарська діяльність', 'мужнє і величне серце', 'рицарська відвага', що підкреслює аристократичну природу козацтва."
    - "Вольності — це комплекс політичних і громадянських прав, які козаки вважали своїми по праву і які захищали зі зброєю в руках як вільні громадяни."
  focus_points:
    - "Риторичні прийоми"
    - "Ідеологія вольностей"

- type: comparative-study
  title: "Порівняльний аналіз: Великий Кордон"
  instruction: "Порівняйте два історичні фронтири."
  items_to_compare:
    - "Українське козацьке порубіжжя (Дике Поле)"
    - "Американський Дикий Захід"
  criteria:
    - "Економічна мотивація та ставлення до податків"
    - "Роль зброї у повсякденному житті"
    - "Державотворчі амбіції"
  prompt: "В чому полягає принципова відмінність політичних цілей українських козаків порівняно з американськими піонерами?"
  model_answer: "Хоча обидві спільноти цінували збройну свободу і уникали жорсткого державного контролю, американські колоністи освоювали нові землі переважно для приватного бізнесу та розширення вже існуючої держави. Натомість українські козаки колонізували власні історичні території з амбітною політичною метою — відродженням втраченої національної державності та перетворенням на нову повноцінну політичну націю."

- type: essay-response
  title: "Аналітичне есе: Соціальний синтез"
  instruction: "Напишіть розгорнуту відповідь на запитання."
  source_reading: "reading-velychko"
  prompt: "Проаналізуйте феномен Запорозької Січі як 'плавильного казана'. Як об'єднання шляхти, міщан і селян сприяло формуванню нової української політичної нації? Наведіть конкретні історичні приклади."
  min_words: 150
  model_answer: "Запорозька Січ функціонувала як унікальний соціальний 'плавильний казан' ранньомодерної доби. До її лав масово вливалися збіднілі шляхтичі (Косинський, Сагайдачний), які приносили знання військової тактики, юриспруденції та дипломатії; енергійні міщани та рішучі селяни. Завдяки суворій військовій дисципліні та постійній спільній загрозі всі вони ставали рівними товаришами, де статус визначався не походженням, а особистими здібностями. Цей синтез дав українському суспільству нову національну еліту замість частково полонізованих княжих родин. Об'єднавши високий інтелектуальний капітал шляхти з живою енергією мас, козацтво змогло виробити і сформулювати спільну політичну програму — безкомпромісний захист православ'я та європейських вольностей. Саме це відчуття спільної мети і стало потужним фундаментом для успішної трансформації розрізненого населення в міцну єдину політичну націю, яка змусила рахуватися з собою всю Європу."
  rubric:
    - criteria: "Історична аргументація"
      description: "Наведення прикладів синтезу різних станів (шляхта, міщани, селяни)."
      points: 40
    - criteria: "Розуміння концепції нації"
      description: "Пояснення переходу від станової свідомості до усвідомлення себе як єдиної спільноти."
      points: 40
    - criteria: "Структура та логіка"
      description: "Наявність чіткої тези, переконливих аргументів та логічного висновку."
      points: 20