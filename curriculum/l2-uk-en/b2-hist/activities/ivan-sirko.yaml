- type: reading
  id: reading-sirko-myth
  title: 'Історичний аналіз: Феномен характерництва'
  source: "Навчальний матеріал"
  text: |
    У народній пам'яті Іван Сірко назавжди залишився як видатний характерник. Цей термін позначає людину з надзвичайними здібностями. За переказами, характерники могли наводити ману на ворогів, перетворюватися на звірів, ловити кулі голими руками, проходити крізь вогонь і воду. Проте сучасна історична наука пояснює феномен характерництва інакше. Це була не магія, а високий рівень елітної військової підготовки, глибоке знання психології та медицини. Вороги не могли пояснити його раптових появ із туману чи лісу, тому приписували йому надприродні властивості.
  tasks:
    - "Проаналізуйте наведений текст."
    - "Подумайте, чому виникали міфи про козаків-характерників."

- type: critical-analysis
  source_reading: reading-sirko-myth
  title: 'Критичний аналіз: Міфологізація Івана Сірка'
  instruction: "Дайте розгорнуті відповіді на запитання щодо міфологізації постаті кошового отамана."
  target_text: "Легенди про характерництво та магічні здібності."
  questions:
    - "Яку функцію виконував міф про козаків-характерників у народній свідомості та серед ворогів?"
    - "Як саме психологічна війна та військова тактика Сірка сприяли створенню його демонізованого образу Урус-Шайтана?"
  model_answers:
    - "Міф пояснював виняткові військові успіхи козаків та надихав народ. Для ворогів міф був формою психологічного тиску, який викликав панічний страх і деморалізував їх ще до початку бою."
    - "Сірко використовував раптові напади, пересування вночі або в тумані, а також безшумну ліквідацію вартових. Нездатність ворога раціонально пояснити ці маневри призводила до приписування йому магічних властивостей."

- type: true-false
  title: 'Правда чи вигадка: Факти та міфи про Івана Сірка'
  instruction: "Визначте, чи є наведені твердження правдивими згідно з історичними фактами."
  items:
    - statement: "Іван Сірко народився в родині заможного польського шляхтича і згодом перейшов на бік козаків."
      correct: false
      explanation: "Точне походження Сірка невідоме, але гіпотези пов'язують його з Поділлям або Слобожанщиною."
    - statement: "Сучасна історіографія пояснює феномен характерництва високим рівнем військової підготовки, а не магією."
      correct: true
      explanation: "Характерництво було наслідком геніальної тактики, розвідки та психологічної війни."
    - statement: "Запорожці обирали Івана Сірка кошовим отаманом понад вісім разів завдяки його військовим талантам."
      correct: true
      explanation: "Він був абсолютним рекордсменом Січі, і козаки довіряли йому завдяки його непідкупності та перемогам."
    - statement: "Після Переяславської ради 1654 року Іван Сірко був одним із перших, хто присягнув московському царю."
      correct: false
      explanation: "Сірко категорично відмовився складати присягу московському царю."
    - statement: "Військова стратегія Сірка базувалася на пасивному захисті кордонів Запорозької Січі від татарських нападів."
      correct: false
      explanation: "Він використовував тактику превентивних рейдів, атакуючи кримські улуси та османські фортеці."
    - statement: "Під час походів Іван Сірко запроваджував жорсткий сухий закон, за порушення якого карали на смерть."
      correct: true
      explanation: "Залізна дисципліна та сухий закон були основою його військових успіхів."
    - statement: "Знаменитий лист турецькому султанові є офіційним дипломатичним документом козацької канцелярії."
      correct: false
      explanation: "Історики вважають цей текст блискучим зразком барокової літератури та містифікацією."
    - statement: "Російська імперська історіографія часто змальовувала Сірка як зрадника через його незалежну зовнішню політику."
      correct: true
      explanation: "Імперські історики засуджували його за те, що він діяв в інтересах Січі, а не Москви чи інших імперій."
    - statement: "Іван Сірко героїчно загинув під час битви з турецькими військами поблизу фортеці Ізмаїл."
      correct: false
      explanation: "Кошовий помер власною смертю у 1680 році на своєму хуторі-пасіці в Грушівці."
    - statement: "Легенда стверджує, що після смерті Сірка козаки відрізали його праву руку і брали її з собою в походи як талісман."
      correct: true
      explanation: "Ця легенда підкреслює масштаб сакралізації особистості Сірка серед січовиків."

- type: reading
  id: reading-sirko-politics
  title: 'Історичний документ: Оцінка постаті Івана Сірка'
  source: "Літопис Самійла Величка та дипломатичне листування"
  text: |
    Авторитет Івана Сірка виходив далеко за межі України і визнавався навіть його ворогами. Польський король Ян III Собеський в одному зі своїх листів назвав Сірка великим воїном і мастаком ратної справи. Для Сірка головною цінністю була військова та політична незалежність Запорожжя. Коли лівобережний гетьман ставав маріонеткою російського воєводи, Сірко піднімав повстання. Ця непохитна вірність ідеї козацької волі робила його незручним і небезпечним для всіх імперій. Він був справжнім центристом української політики XVII століття.
  tasks:
    - "Прочитайте текст про політичну позицію Івана Сірка."
    - "Зверніть увагу на те, як європейські правителі оцінювали його діяльність."

- type: essay-response
  source_reading: reading-sirko-politics
  title: 'Есе: Державницька позиція та лояльність Сірка'
  instruction: "Напишіть есе-відповідь на основі прочитаного тексту та матеріалу модуля."
  prompt: "Спираючись на текст літописних оцінок та політичну біографію отамана, поясніть концепцію лояльності Івана Сірка. Чому його відмова підкорятися владі іноземних монархів є свідченням державницького мислення, а не зрадництва?"
  min_words: 150
  model_answer: "Для Івана Сірка лояльність вимірювалася виключно відданістю Запорозькій Січі та інтересам українського народу, а не вірністю іноземним сюзеренам. Відмова присягати московському царю у 1654 році чи опір діям гетьманів, які йшли на поступки імперіям, свідчать про його прагнення зберегти автономію Козацької держави. Його політика балансування між могутніми сусідами була стратегією виживання в умовах Руїни, що характеризує його як прагматичного державного діяча, який ставив свободу нації вище за тимчасові союзи."
  rubric:
    - criteria: "Розуміння концепції лояльності"
      description: "Здатність пояснити, кому насправді був вірний Іван Сірко."
      points: 40
    - criteria: "Аналіз історичного контексту"
      description: "Використання прикладів з епохи Руїни (переяславські події, союзи з гетьманами)."
      points: 40
    - criteria: "Аргументація та стиль"
      description: "Чіткість викладу думок та використання відповідної лексики."
      points: 20

- type: comparative-study
  source_reading: reading-sirko-politics
  title: 'Порівняльне дослідження: Сірко та європейські полководці'
  instruction: "Порівняйте тактику та стратегію Івана Сірка з підходами інших видатних воєначальників епохи."
  items_to_compare:
    - "Тактика Івана Сірка (превентивні рейди, асиметрія)"
    - "Класична тактика європейських регулярних армій XVII ст."
  criteria:
    - "Ефективність проти переважаючих сил"
    - "Мобільність та використання ландшафту"
  prompt: "Спираючись на оцінку Яна III Собеського, порівняйте партизанську тактику Сірка (превентивні рейди, використання ландшафту) з класичною лінійною тактикою європейських армій XVII століття. Чому регулярні армії імперій часто виявлялися безпорадними проти мобільних козацьких загонів?"
  model_answer: "Європейські армії XVII століття покладалися на важку кавалерію, лінійний стрій піхоти та повільні обози постачання. Їхня сила полягала у відкритому бою. Натомість тактика Сірка була асиметричною: мобільність, фактор раптовості, нічні напади та використання природних укриттів (степ, плавні). Сірко уникав прямих зіткнень з переважаючими силами, натомість знищував комунікації та тили ворога. Його стратегія базувалася на превентивних ударах, що позбавляло ворога ініціативи і змушувало реагувати на дії козаків, нівелюючи чисельну перевагу регулярних армій імперій."