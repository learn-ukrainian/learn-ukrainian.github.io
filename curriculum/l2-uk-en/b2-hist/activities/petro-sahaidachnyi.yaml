- type: "reading"
  id: "reading-sakovych"
  title: "Первинне джерело: Панегірик Касіяна Саковича"
  source: "Касіян Сакович, Вірші на жалісний погреб (1622)"
  text: "Не хоче козацтво жити у рабстві, а воліє гинути за вітчизну і віру свою. Як Олег колись Царград штурмував, так і лицарство запорозьке море Чорне підкоряє. Злотом вольності не купиш, мусиш доступляти кров'ю, а в ній по коліна треба побродити."

- type: "critical-analysis"
  source_reading: "reading-sakovych"
  title: "Критичний аналіз: Ідеологема князівської спадщини"
  instruction: "Проаналізуйте текст панегірика та дайте відповіді на запитання."
  target_text: "Текст панегірика Касіяна Саковича"
  questions:
    - "Як автор легітимізує козацтво через історичні паралелі?"
    - "Що означає концепція кривавої ціни свободи в контексті тогочасної політики?"
  model_answers:
    - "Автор прямо порівнює запорожців із князем Олегом, проголошуючи їх законними спадкоємцями еліти Київської Русі."
    - "Свободу не можна здобути дипломатією чи грошима; її можна захистити лише збройною боротьбою і самопожертвою."
  focus_points:
    - "Історична спадковість"
    - "Ціна свободи"

- type: "essay-response"
  source_reading: "reading-sakovych"
  title: "Есе: Лицарський етос Сагайдачного"
  instruction: "Напишіть есе на основі прочитаного джерела та матеріалу уроку."
  prompt: "Поясніть, як Петро Сагайдачний поєднав військову силу з культурним меценатством, створивши образ справжнього православного лицаря. Використовуйте терміни: гетьман, меценат, ієрархія."
  min_words: 150
  model_answer: "Петро Сагайдачний кардинально змінив образ українського козацтва. Завдяки своїй європейській освіті він розумів, що для збереження нації недостатньо лише військової сили. Його геніальним кроком став вступ усього Війська Запорозького до Київського братства, що забезпечило фізичний захист православній культурі та освіті. Сагайдачний виступав як великий меценат, передаючи значні кошти на розвиток шкіл. Окрім того, він сприяв відновленню православної ієрархії у 1620 році, кинувши виклик польському королю. Цей синтез енергії Січі та інтелекту дозволив йому створити нову еліту. Козаки стали сприйматися не як найманці, а як справжні лицарі, які захищають європейську цивілізацію від навали."
  rubric:
    - criteria: "Змістове розкриття"
      description: "Глибоко розкрито концепцію лицарського етосу та меценатства."
      points: 10
    - criteria: "Використання термінології"
      description: "Правильно вжито ключові історичні терміни."
      points: 5

- type: "comparative-study"
  title: "Порівняльний аналіз: Еволюція козацького лідерства"
  instruction: "Порівняйте Петра Сагайдачного з попередніми ватажками козаків."
  items_to_compare:
    - "Петро Сагайдачний"
    - "Попередні козацькі ватажки"
  criteria:
    - "Рівень освіти та стратегічне бачення"
    - "Ставлення до дисципліни у війську"
    - "Дипломатична майстерність та геополітика"
  prompt: "Проаналізуйте, як змінилося козацтво під проводом Сагайдачного порівняно з часами ранніх ватажків."
  model_answer: "На відміну від ранніх ватажків, які переважно здійснювали стихійні рейди за здобиччю, Сагайдачний мав системне мислення, сформоване в Острозькій академії. Він запровадив жорстку дисципліну, заборонивши алкоголь у морських походах, і перетворив ватаги на регулярну армію європейського зразка. Сагайдачний став самостійним геополітичним гравцем, який вміло шантажував Варшаву і домовлявся з іншими державами."

- type: "true-false"
  title: "Перевірка фактів: Військова та політична діяльність"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "Петро Сагайдачний народився в сім'ї дрібної православної шляхти на Галичині."
      correct: true
      explanation: "Він походив зі шляхетського роду герба Побуг із села Кульчиці."
    - statement: "Сагайдачний дозволяв козакам вживати горілку під час морських походів."
      correct: false
      explanation: "Він запровадив суворий сухий закон: за вживання алкоголю в морі порушників викидали за борт."
    - statement: "У 1616 році запорожці успішно штурмували Кафу і звільнили тисячі невільників."
      correct: true
      explanation: "Це був один із найвизначніших морських походів українського флоту."
    - statement: "Козаки використовували важкі великі кораблі для битв на Чорному морі."
      correct: false
      explanation: "Український флот складався з легких і маневрених човнів, які називалися чайками."
    - statement: "У Московській кампанії козаки свідомо не стали руйнувати російську столицю дощенту."
      correct: true
      explanation: "Сагайдачний хотів зберегти геополітичний баланс і не посилювати надмірно Польщу."
    - statement: "Деулінська угода стала великою дипломатичною поразкою для Речі Посполитої."
      correct: false
      explanation: "Це був величезний дипломатичний тріумф, який забезпечив розширення території."
    - statement: "Відновлення православної ієрархії у 1620 році було погоджено з польським королем."
      correct: false
      explanation: "Ця акція була здійснена всупереч заборонам уряду, під збройним захистом козаків."
    - statement: "Битва під Хотином зупинила експансію могутньої Османської імперії вглиб Європи."
      correct: true
      explanation: "Козацьке військо зіграло вирішальну роль у порятунку християнського світу від навали."
    - statement: "У Хотинській битві козаки використовували інноваційну тактику вагенбурга."
      correct: true
      explanation: "Вагенбург, або табір з возів, став надійним захистом від турецької кавалерії."
    - statement: "Свій величезний статок гетьман заповів виключно своїм найближчим родичам."
      correct: false
      explanation: "Більшу частину майна він заповів братським школам Києва та Львова на підтримку освіти."