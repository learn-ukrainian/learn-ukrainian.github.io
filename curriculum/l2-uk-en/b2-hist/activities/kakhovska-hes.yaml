- type: reading
  id: "reading-svidchennia"
  title: "Свідчення: Два покоління, дві катастрофи"
  source: "Збірний образ спогадів очевидців"
  text: |
    У 1955 році мій дід плакав, коли вони власноруч розбирали свою хату на дрова. Вони вирубали сади, щоб ті не спливли на поверхню майбутнього водосховища. Вони втратили все своє минуле, свої церкви і могили пращурів. А 6 червня 2023 року вже ми сиділи на даху нашої хати на лівому березі. Вода прибувала так стрімко, що ми ледве встигли схопити документи. Росіяни не випускали нас, човни обстрілювали. Вода забрала наше теперішнє, так само як 70 років тому вона забрала минуле нашого діда.
  tasks:
    - "Проаналізуйте паралелі між двома катастрофами, описаними у тексті."

- type: true-false
  title: "Аналіз фактів: Катастрофа на Каховській ГЕС"
  instruction: "Визначте, чи є наведені твердження правдивими чи хибними."
  items:
    - statement: "Сейсмічні дані норвезької системи NORSAR зафіксували зовнішній ракетний удар по греблі."
      correct: false
      explanation: "Сейсмологи зафіксували потужний внутрішній вибух у машинній залі станції."
    - statement: "Знищення Каховської ГЕС було визнано найбільшою техногенною катастрофою в Європі за останні десятиліття."
      correct: true
      explanation: "Цей акт завдав безпрецедентної шкоди довкіллю та життю десятків тисяч людей."
    - statement: "Проєкт створення Каховського водосховища у 1950 році мав на меті збереження унікальної екосистеми Великого Лугу."
      correct: false
      explanation: "Проєкт, навпаки, передбачав затоплення сакрального простору Великого Лугу заради зрошення степів."
    - statement: "Затоплення Великого Лугу у двадцятому столітті знищило історичне серце українського козацтва."
      correct: true
      explanation: "Більшість відомих Запорозьких Січей знаходилися саме на території цієї гігантської річкової заплави."
    - statement: "Евакуація жителів правобережжя Херсонщини відбувалася у безпечних умовах та без перешкод."
      correct: false
      explanation: "Евакуація відбувалася під постійними артилерійськими обстрілами російських військ по рятувальниках та цивільних."
    - statement: "Внаслідок руйнування ГЕС у води Дніпра потрапило понад сто п'ятдесят тонн машинного мастила."
      correct: true
      explanation: "Це стало одним із перших ударів по екосистемі, який спричинив масове токсичне забруднення води."
    - statement: "Різке падіння рівня води призвело до повної зупинки системи інтенсивного зрошення на півдні України."
      correct: true
      explanation: "Сотні тисяч гектарів сільськогосподарських угідь у трьох областях залишилися без життєво необхідної води."
    - statement: "Після підриву греблі дно водосховища остаточно перетворилося на небезпечну мертву пустелю з пиловими бурями."
      correct: false
      explanation: "Дно швидко вкрилося зеленим килимом молодого вербового лісу завдяки процесу екологічної сукцесії."
    - statement: "Знищення ГЕС поставило під загрозу роботу систем охолодження реакторів Запорізької атомної електростанції."
      correct: true
      explanation: "Ставок-охолоджувач ЗАЕС виявився ізольованим від основного джерела водопостачання."
    - statement: "Міжнародне кримінальне право наразі містить окрему статтю 'екоцид' у Римському статуті."
      correct: false
      explanation: "Римський статут поки не має окремого злочину 'екоцид', але розглядає це як воєнний злочин із нанесенням масштабної шкоди довкіллю."

- type: reading
  id: "reading-ecology"
  title: "Екологічний звіт: Повернення Великого Лугу"
  source: "Звіт Української природоохоронної групи (UNCG)"
  text: |
    Ми спостерігаємо унікальний природний експеримент планетарного масштабу: природа забирає своє там, де людина відступила. На мулистих відкладеннях колишнього Каховського моря насіння аборигенних видів, переважно верби білої та тополі, почало проростати з неймовірною швидкістю. Замість прогнозованих пилових бур та мертвої пустелі Україна отримала гігантські "зелені легені" площею понад двісті тисяч гектарів. Ця швидка екологічна сукцесія повністю заблокувала вітрову ерозію. Великий Луг оживає на наших очах, демонструючи неймовірну життєву силу української землі та відновлюючи історично автентичний біоценоз.
  tasks:
    - "Визначте головні чинники, які дозволили природі так швидко відновити рослинний покрив."

- type: critical-analysis
  title: "Аналіз екосистеми: Великий Луг"
  source_reading: "reading-ecology"
  instruction: "Прочитайте уривок екологічного звіту та дайте відповіді на запитання."
  questions:
    - "Які саме аборигенні види стали основою для формування нового лісу на місці водосховища?"
    - "Чому апокаліптичні прогнози щодо перетворення території на небезпечну пустелю виявилися хибними?"
    - "Яке символічне значення має відродження 'зелених легень' для українського суспільства в умовах війни?"
  model_answers:
    - "Основою стали верба біла та тополя, насіння яких рознеслося вітром і швидко проросло на вологому мулі."
    - "Стрімке заростання території деревами та травами зафіксувало ґрунт своїми коренями, повністю заблокувавши вітрову ерозію та утворення пилових бур."
    - "Це символізує життєстійкість української землі, незламність природи та відновлення історичної справедливості щодо затопленого радянською владою Великого Лугу."

- type: comparative-study
  title: "Порівняльний аналіз: Два бачення відбудови"
  instruction: "Порівняйте аргументи двох сторін щодо майбутнього території Каховської ГЕС."
  items_to_compare:
    - "Енергетичний та аграрний сектори (відбудова водосховища)"
    - "Екологи та історики (збереження Великого Лугу)"
  criteria:
    - "Економічна доцільність та потреби промисловості"
    - "Вплив на екосистему та збереження природи"
    - "Значення для збереження історичної пам'яті"
  prompt: "Спираючись на аргументи обох сторін, напишіть порівняльний аналіз цих підходів. Який інноваційний компромісний варіант може задовольнити як економічні, так і екологічні потреби регіону?"
  model_answer: "Представники енергетичного сектору аргументують необхідність відбудови ГЕС для балансування енергосистеми та відновлення систем зрошення, що є критично важливим для економіки. Натомість екологи наголошують на тому, що відродження Великого Лугу стало унікальним природним експериментом, і нове затоплення буде другим екоцидом. Компромісним рішенням може стати будівництво сучасних насосних станцій, що дозволить забирати воду для крапельного зрошення без створення гігантського мілководного водосховища, зберігаючи при цьому новоутворений ліс як заповідну зону."

- type: essay-response
  title: "Есе: Екоцид як зброя масового знищення"
  source_reading: "reading-svidchennia"
  instruction: "Напишіть розгорнуте есе, аналізуючи підрив Каховської ГЕС у контексті воєнних злочинів."
  prompt: "Використовуючи свідчення очевидців та знання про масштаби катастрофи, аргументуйте, чому підрив Каховської ГЕС кваліфікується як екоцид. Поясніть, як цей акт відображає імперське ставлення до природи та людських життів."
  min_words: 250
  rubric:
    - criteria: "Аргументація та аналіз"
      description: "Чітке пояснення терміну 'екоцид' та наведення переконливих доказів спланованого злочину."
      points: 40
    - criteria: "Використання контексту"
      description: "Інтеграція свідчень очевидців та аналіз наслідків катастрофи для цивільного населення."
      points: 30
    - criteria: "Граматика та стиль"
      description: "Використання публіцистичного стилю та складної лексики рівня B2."
      points: 30