- type: reading
  id: reading-litopys
  title: 'Первинне джерело: Літопис Руський'
  source: Літопис Руський (1245 рік)
  text: О, лихіша лиха честь татарська! Данило Романович, що був князем великим, володів
    із братом своїм Руською землею... нині сидить на колінах і холопом себе називає!
- type: essay-response
  title: Аналіз стратегій виживання
  source_reading: reading-litopys
  prompt: Спираючись на наведену цитату з Літопису Руського та матеріал уроку, порівняйте
    стратегії виживання Данила Галицького (опір та пошук союзників) та Олександра
    Невського (колаборація). Які наслідки мали ці стратегії для подальшого політичного
    розвитку двох держав?
  min_words: 200
  model_answer: Данило Галицький намагався зберегти європейський вектор, уклавши союз
    із Заходом (коронація 1253 року). Поїздка до Орди була для нього особистою трагедією,
    як показує літопис. Натомість Олександр Невський обрав шлях повної колаборації,
    щоб зміцнити власну владу, жорстоко придушуючи антиординський опір. Ця модель
    заклала основу московської традиції абсолютної покори владі (холопства), кардинально
    відмінної від європейської концепції суверенітету та громадянського суспільства.
  rubric:
  - criteria: Аналіз стратегій
    description: Глибоке порівняння політики Данила Галицького та Олександра Невського.
    points: 5
  - criteria: Використання термінології
    description: Доречне використання термінів (легітимність, західний вектор, деспотія).
    points: 5
- type: critical-analysis
  title: 'Критичний аналіз: Магдебурзьке право'
  questions:
  - Як Магдебурзьке право вплинуло на формування громадянського суспільства в українських
    містах?
  - У чому полягає принципова відмінність між статусом жителя міста з Магдебурзьким
    правом і підданим Московського царства?
  model_answers:
  - Магдебурзьке право перетворило містян на повноцінних суб'єктів права, здатних
    самостійно вирішувати судові та адміністративні питання через магістрат. Це створило
    європейську культуру вільного підприємництва, ініціативності та відповідальності.
  - Житель міста з Магдебурзьким правом був вільним громадянином із законними гарантіями
    безпеки та приватної власності. Підданий Московського царства залишався безправним
    холопом царя, життя та майно якого залежали від свавілля деспотичної влади.
- type: comparative-study
  title: Порівняння політичних систем
  items_to_compare:
  - Королівство Русь (Данило Галицький)
  - Кримське ханство (Хаджи Гірей)
  criteria:
  - Джерело легітимності влади
  - Геополітичний вектор та економічні зв'язки
  prompt: Порівняйте політичні системи Королівства Русь та Кримського ханства на етапі
    їхнього становлення. Як кожна з держав здобувала легітимність і з якими регіонами
    світу розбудовувала економічні та політичні зв'язки?
  model_answer: 'Королівство Русь спиралося на європейську модель легітимності (коронація
    Папою Римським у 1253 році) і послідовно розвивало західний вектор інтеграції.
    Кримське ханство черпало легітимність зі статусу Чингізида Хаджи Гірея та стратегічного
    союзу з Литвою. Обидві держави були тісно інтегровані в глобальний економічний
    простір: Русь - через розбудову міст і запрошення європейських майстрів, а Крим
    - через торговельні зв''язки генуезьких факторій.'
- type: true-false
  title: 'Перевірте знання: від навали до державності'
  items:
  - statement: Монгольська навала 1240 року стала точкою біфуркації, яка розколола
      Східну Європу на різні вектори розвитку.
    correct: true
    explanation: Ця подія визначила кардинальні відмінності між політичною культурою
      України-Русі та Московії.
  - statement: Термін 'Дике Поле' означає абсолютно безлюдну пустелю без жодних торговельних
      шляхів.
    correct: false
    explanation: Насправді це була динамічна контактна зона, де функціонували великі
      торговельні шляхи та перетиналися різні цивілізації.
  - statement: Коронація Данила Галицького у 1253 році означала юридичне визнання
      його статусу європейського монарха.
    correct: true
    explanation: Легітимність його влади відтепер ґрунтувалася на європейському праві
      суверена, освяченому католицькою церквою.
  - statement: Хаджи Гірей проголосив створення незалежного Кримського ханства без
      жодної зовнішньої підтримки.
    correct: false
    explanation: Хаджи Гірей заснував державу завдяки стратегічному союзу та військовій
      підтримці Великого князівства Литовського.
  - statement: Олександр Невський обрав шлях відкритого збройного опору проти влади
      Золотої Орди.
    correct: false
    explanation: Невський обрав політику повної покори Орді в обмін на отримання ярлика
      на князювання.
  - statement: Магдебурзьке право звільняло містян від юрисдикції державних урядовців
      чи великих феодалів.
    correct: true
    explanation: Містяни отримували можливість самостійно вирішувати судові та адміністративні
      питання через обрані органи.
  - statement: Першим містом на території сучасної України, яке отримало Магдебурзьке
      право, став Київ.
    correct: false
    explanation: Першим містом на цих територіях, яке отримало це право, став Сянок
      у 1339 році.
  - statement: Принцип Neminem captivabimus гарантував шляхтичу недоторканність особи
      без відкритого судового вироку.
    correct: true
    explanation: Це був фундаментальний юридичний принцип, що захищав шляхту від свавілля
      короля і обмежував деспотизм.
  - statement: Московське боярство мало такі ж широкі політичні права та гарантії
      недоторканності, як і руська шляхта.
    correct: false
    explanation: Бояри вважалися особистими холопами царя і не мали гарантій безпеки
      або захисту приватної власності.
  - statement: Радянський міф про спільну колиску трьох народів штучно використовувався
      для виправдання російського імперіалізму.
    correct: true
    explanation: Цей конструкт мав на меті позбавити Україну статусу окремої нації
      з незалежним європейським корінням.
  instruction: Визначте, чи твердження правильне.
