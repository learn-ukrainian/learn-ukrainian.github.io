    - statement: "Австрійська імперія використовувала Чернівецький університет виключно для поширення української культури."
      correct: false
      explanation: "Університет був інструментом імперської політики та німецької модернізації, хоча об'єктивно сприяв і розвитку місцевих національних рухів."
    - statement: "Ужгородська унія 1646 року передбачала повний перехід на латинський обряд богослужіння."
