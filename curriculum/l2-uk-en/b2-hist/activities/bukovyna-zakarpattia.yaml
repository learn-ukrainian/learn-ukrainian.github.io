- type: reading
  id: reading-university
  title: "Свідчення епохи: Відкриття Чернівецького університету"
  source: "Хроніки та спогади очевидців (1875 рік)"
  text: |
    Для розуміння грандіозності цивілізаційного стрибка Буковини варто звернутися до спогадів очевидців про урочисте відкриття Чернівецького університету у жовтні 1875 року. Хроністи того часу описують це дійство як справжній тріумф просвітництва над провінційною темрявою. Місто потопало в прапорах та ілюмінації, а на вулицях змішалися розкішні фраки віденської професури, строгі мундири військових та барвисті національні строї місцевих селян, які спеціально спустилися з гір, аби побачити це диво. Промови ректора та імперських міністрів були сповнені пафосних метафор про світло науки, яке розжене туман невігластва на найсхідніших кордонах імперії. Однак за цим імперським фасадом уважний читач мемуарів легко помітить приховану напругу: представники різних етнічних груп, приязно посміхаючись один одному, вже тоді розуміли, що ця нова кузня кадрів стане головним полем битви за інтелектуальне домінування в краї на найближчі десятиліття.

- type: essay-response
  title: "Аналітичне есе: Значення Чернівецького університету"
  instruction: "Напишіть розгорнуте есе, спираючись на прочитаний текст."
  source_reading: reading-university
  prompt: "Проаналізуйте роль Чернівецького університету в житті Буковини. Чому відкриття цього закладу сучасники називали тріумфом просвітництва, і який прихований політичний та міжнаціональний підтекст мала ця подія для майбутнього краю?"
  min_words: 150
  model_answer: "Відкриття Чернівецького університету у 1875 році стало не лише культурним, але й потужним політичним чинником розвитку Буковини. З одного боку, воно символізувало імперську модернізацію та цивілізаційну місію Австрії, приносячи європейську науку в далекий край. Це дійсно був тріумф просвітництва, адже університет надав можливість здобути вищу освіту талановитій молоді різних національностей. З іншого боку, як зазначають хроністи, за парадними промовами ховалася глибока міжнаціональна напруга. Університет швидко перетворився на арену інтелектуальної боротьби, де українці, румуни, євреї та німці змагалися за культурне і політичне лідерство. Для українців доступ до цієї освіти став ключовим інструментом національного відродження та формування власної еліти, яка згодом змогла легально відстоювати права народу."
  rubric:
    - criteria: "Глибина аналізу"
      description: "Уміння виявити прихований політичний підтекст події"
      points: 5
    - criteria: "Використання джерел"
      description: "Опора на наведений текст та історичний контекст"
      points: 5

