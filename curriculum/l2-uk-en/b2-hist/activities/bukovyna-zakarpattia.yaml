    - statement: "Лук'ян Кобилиця поєднував керівництво селянським повстанням із діяльністю депутата в австрійському парламенті."
      correct: true
      explanation: "Він був обраний депутатом під час революції 1848 року і захищав права селян на найвищому рівні."
