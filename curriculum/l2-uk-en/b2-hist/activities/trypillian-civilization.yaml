  title: "Есе: Спадщина Трипілля"
  prompt: "Напишіть есе на тему впливу Трипілля на українську культуру. Як аграрні традиції того часу відображаються в сучасній ментальності?"
  min_words: 150
  model_answer: "Трипільська культура залишила глибокий слід в українській ідентичності. Аграрний цикл, шанування землі, естетика житла та одягу мають коріння в тій епосі."

