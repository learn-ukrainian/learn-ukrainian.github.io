- type: reading
  id: reading-trypillia-1
  title: "Вікентій Хвойка про відкриття"
  text: "Уявіть собі Київ 1893 року, вулиця Кирилівська. Вікентій Хвойка нотує свої враження від знайдених уламків: «Глина випалена до дзвінкості, а поверхня вкрита складним, ритмічним розписом». Це були черепки, що не мали аналогів. У той час вважалося, що на цих землях жили лише «дикі племена», але хіба могли дикуни створити кераміку, яка за якістю не поступалася грецькій чи єгипетській, та ще й за тисячі років до них?"
  instruction: "Прочитайте уривок про відкриття Трипілля."
  tasks:
    - "Проаналізуйте враження Вікентія Хвойки від знахідки."
    - "Подумайте, чому якість кераміки стала аргументом на користь цивілізованості."

