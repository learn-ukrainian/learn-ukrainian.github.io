- type: reading
  id: reading-trypillian-khvoyka
  title: Звіт Вікентія Хвойки
  text: |
    Тут, на глибині кількох метрів, у шарах щільної глини, мені пощастило натрапити на залишки дивовижних споруд. Це були майданчики з обпаленої глини, завалені купою битого посуду, кісток тварин та кам'яного знаряддя. Піднявши один із таких черепків, я був здивований складом глини, з якої він був зроблений, а ще більше оригінальністю орнаменту на ньому. Це не були прості грубі горщики, які ми звикли бачити в курганах. Ні! Це була вишукана, тонкостінна кераміка, вкрита складними візерунками, намальованими червоною, чорною та білою фарбами. Я одразу зрозумів, що переді мною сліди якоїсь невідомої, але високорозвиненої цивілізації, що передувала всьому, що ми знали про давнину нашого краю.
  source: Вікентій Хвойка, 1899
  instruction: Прочитайте уривок зі звіту першовідкривача Трипільської культури.
  tasks:
    - Прочитайте текст уважно.

- type: critical-analysis
  title: Аналіз тексту Хвойки
  instruction: Проаналізуйте стиль та зміст звіту.
  source_reading: reading-trypillian-khvoyka
  questions:
    - Які емоційні маркери використовує автор для опису знахідок?
    - Як Хвойка протиставляє нову культуру відомим на той час "курганним" знахідкам?
  model_answers:
    - Автор використовує слова "пощастило", "дивовижних", "здивований", "оригінальністю", "вишукана", що передає його захоплення та розуміння ваги відкриття.
    - Він називає нову кераміку "вишуканою" та "тонкостінною", протиставляючи її "грубим горщикам", що свідчить про вищий технологічний рівень трипільців.

- type: comparative-study
  title: Протоміста проти міст Шумеру
  instruction: Порівняйте структуру трипільських протоміст та міст-держав Месопотамії.
  items_to_compare:
    - Трипільські протоміста (Тальянки)
    - Шумерські міста (Урук)
  criteria:
    - Планування
    - Соціальна структура
    - Економічна основа
  model_answer: |
    Трипільські протоміста мали радіально-концентричне планування з порожнім майданом у центрі, що свідчить про егалітарність та колективізм. Шумерські міста мали храмовий комплекс (зікурат) або палац у центрі, що вказує на ієрархію та владу жерців/царів. Економіка обох базувалася на землеробстві, але Шумер мав розвинену іригацію та писемність для обліку, тоді як Трипілля покладалося на екстенсивне землеробство та знаковий орнамент.

- type: essay-response
  title: Загадка спалених хат
  instruction: Напишіть есе на тему гіпотези "горизонту спалених хат".
  prompt: Чому трипільці спалювали свої житла кожні 60-80 років? Чи можна вважати це екологічною стратегією або суто релігійним ритуалом? Аргументуйте свою думку, спираючись на текст модуля.
  min_words: 150
  model_answer: |
    Гіпотеза "горизонту спалених хат" є однією з найцікавіших загадок Трипілля. На мою думку, це явище поєднувало як прагматичні, так і сакральні аспекти.
    З прагматичної точки зору, екстенсивне землеробство виснажувало ґрунти за кілька поколінь. Громада була змушена переселятися. Спалення старого житла могло бути способом санітарної очистки або просто унеможливленням повернення.
    Проте масштабність і системність цих пожеж (одночасне спалення сотень будинків) вказує на ритуал. Вогонь у давніх культурах був символом очищення та переродження. Спалюючи "дім", трипільці "ховали" його, віддаючи богам, щоб на новому місці збудувати новий світ. Це відображає їхній циклічний світогляд: життя-смерть-відродження.
    Отже, це була не просто утилізація сміття, а грандіозна містерія завершення циклу, яка дозволяла спільноті психологічно перейти на новий етап.

- type: authorial-intent
  title: Емоції Хвойки
  instruction: Проаналізуйте наміри автора тексту.
  source_reading: reading-trypillian-khvoyka
  prompt: Чому Вікентій Хвойка використовує такі емоційні слова як "дивовижний", "пощастило", "вишукана"? Яку мету він переслідував?
  techniques_to_identify:
    - Емоційні епітети
    - Протиставлення (контраст)
    - Риторичні вигуки
  model_answer: |
    Хвойка використовує емоційну лексику, щоб передати своє захоплення та підкреслити унікальність відкриття. Його мета — не просто зафіксувати факт, а переконати наукову спільноту в існуванні нової, високої цивілізації, яка руйнує стереотипи про "дикість" прадавніх мешканців краю. Це риторичний прийом для привернення уваги до сенсації.

- type: critical-analysis
  title: Міф про матріархат
  instruction: Проаналізуйте поширений міф про трипільський матріархат.
  questions:
    - Чому велика кількість жіночих статуеток не є прямим доказом матріархату?
    - Яка різниця між культом жінки та політичною владою жінок?
  model_answers:
    - Наявність статуеток свідчить про релігійний культ (шанування Богині-Матері), а не про соціальний устрій. У християнстві багато ікон Богородиці, але це не означає матріархат у церкві.
    - Культ жінки — це сакральна сфера (родючість, життя), а політична влада — це управління громадою. Археологія не дає доказів, що жінки приймали політичні рішення одноосібно.

- type: true-false
  title: Міфи та факти
  instruction: Визначте, що є фактом, а що — міфом.
  items:
    - statement: Трипільці мали писемність, яку ми просто ще не розшифрували.
      correct: false
      explanation: Вони мали систему знаків (протописьмо), але не повноцінну писемність.
    - statement: Трипільська цивілізація була знищена войовничими кочівниками.
      correct: false
      explanation: Вона занепала поступово через кліматичні зміни та екологічну кризу.
    - statement: Трипільці є прямими предками сучасних українців.
      correct: false
      explanation: Ми успадкували культуру (субстрат), але генетично ми — суміш багатьох народів.
    - statement: '"Біноклі" використовувалися як музичні інструменти.'
      correct: false
      explanation: Найімовірніше, це ритуальні посудини для "напування" землі.
    - statement: Трипільці знали гончарне коло.
      correct: false
      explanation: Кераміка ліпилася вручну, хоча й дуже майстерно.
    - statement: Трипільські міста були найбільшими у світі в свій час.
      correct: true
      explanation: Тальянки та Небелівка перевищували за розмірами ранні міста Шумеру.
    - statement: Всі трипільські житла були одноповерховими землянками.
      correct: false
      explanation: Вони будували двоповерхові наземні будинки.
    - statement: Трипільці імпортували мідь з Балкан.
      correct: true
      explanation: Власних покладів міді на їхній території не було.
    - statement: Головним божеством був Бог-Громовержець.
      correct: false
      explanation: Головною була Богиня-Матір.
    - statement: Орнамент на посуді мав лише декоративну функцію.
      correct: false
      explanation: Це була знакова система, що передавала інформацію про світ.

- type: true-false
  title: Перевірка знань
  instruction: Визначте, чи є твердження правильним.
  items:
    - statement: Трипільська культура існувала лише на території сучасної України.
      correct: false
      explanation: Вона охоплювала території Румунії (Кукутені) та Молдови.
    - statement: Трипільці будували двоповерхові будинки.
      correct: true
      explanation: Археологічні дані підтверджують існування двоповерхових жител.
    - statement: Головною тягловою силою трипільців був кінь.
      correct: false
      explanation: Головною тягловою силою був бик (віл).
    - statement: Трипільська кераміка виготовлялася на гончарному колі.
      correct: false
      explanation: Вона ліпилася вручну, без використання кола.
    - statement: Трипільці спалювали свої поселення через напади ворогів.
      correct: false
      explanation: Це був ритуал, пов'язаний із циклом життя поселення.
    - statement: У центрі трипільського міста завжди стояв храм або палац.
      correct: false
      explanation: У центрі був порожній майдан.
    - statement: Трипільці використовували писемність, схожу на шумерську.
      correct: false
      explanation: Трипільці не залишили писемних текстів.
    - statement: Трипільська економіка базувалася на землеробстві.
      correct: true
      explanation: Вони вирощували пшеницю, ячмінь, горох.
    - statement: Вікентій Хвойка відкрив Трипільську культуру у 1899 році.
      correct: false
      explanation: Він відкрив її раніше, а у 1899 році офіційно презентував на з'їзді.
    - statement: Трипільці вміли обробляти мідь.
      correct: true
      explanation: Це був енеоліт (мідно-кам'яний вік).
