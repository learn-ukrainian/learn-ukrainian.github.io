- type: reading
  id: "reading-1569-privilege"
  title: "Первинне джерело: Грамота короля Сигізмунда ІІ Августа"
  source: "З універсалу Сигізмунда II Августа волинській шляхті, 6 червня 1569 р."
  text: |
    Землю Руську... до Польського Королівства, як рівних до рівних, вільних до вільних і як власний і справжній до першого і то власного тіла і голови... приєднуємо.
  instruction: "Уважно прочитайте уривок з універсалу Сигізмунда II Августа."

- type: true-false
  title: "Перевірка фактів: Еволюція еліти"
  instruction: "Визначте, чи є наведені твердження правдивими чи хибними, спираючись на текст модуля."
  items:
    - statement: "Боярин володів умовним помістям, яке залежало від виконання військової служби."
      correct: false
      explanation: "Боярин володів вотчиною — спадковим земельним маєтком, який не залежав від тимчасової військової служби."
    - statement: "Термін шляхта походить від давньоверхньонімецького слова slahta, що означає рід або порода."
      correct: true
      explanation: "Цей термін підкреслював природну гідність і належність до шляхетного роду."
    - statement: "У період боярської олігархії в Галичині Дмитро Дедько проголосив себе новим князем."
      correct: false
      explanation: "Він не проголошував себе князем, а титулував себе 'старостою та управителем' Руської землі."
    - statement: "Єдлінський привілей 1430 року поширив на руських бояр Галичини права польської шляхти."
      correct: true
      explanation: "Цей документ ввів принцип недоторканності особи та майна (Neminem captivabimus)."
    - statement: "Другий Литовський Статут 1566 року скасував виборні шляхетські суди та сеймики."
      correct: false
      explanation: "Навпаки, він запровадив виборні шляхетські суди та місцеві органи самоврядування."
    - statement: "Концепція Золотої вольності (Aurea Libertas) означала абсолютну владу короля над шляхтою."
      correct: false
      explanation: "Золота вольність передбачала, що шляхта є сувереном, а влада короля суворо обмежена законом."
    - statement: "Право на рокош було легальним механізмом збройного опору королю в разі порушення ним законів."
      correct: true
      explanation: "Це створювало запобіжник проти абсолютної монархії та тиранії."
    - statement: "Фільваркова система була спрямована на вирощування зерна для внутрішнього споживання селянами."
      correct: false
      explanation: "Фільварки були товарними господарствами, орієнтованими переважно на експорт зерна до Західної Європи."
    - statement: "Полонізація української еліти найчастіше відбувалася виключно через насильницький примус."
      correct: false
      explanation: "Найчастіше це був свідомий соціальний вибір заради кар'єрного зростання та доступу до вищої освіти."
    - statement: "Московська політична модель базувалася на безумовному підданстві, де всі вважалися холопами царя."
      correct: true
      explanation: "Ця культура різко контрастувала з українською культурою договору та компромісу."

- type: critical-analysis
  title: "Аналіз політичної культури: Рівні до рівних"
  source_reading: "reading-1569-privilege"
  instruction: "Дайте розгорнуті відповіді на питання, аналізуючи ідеологему Люблінської унії."
  questions:
    - "Як ви розумієте формулу 'рівні до рівних, вільні до вільних' у контексті об'єднання двох держав?"
    - "Чому такий договірний підхід до побудови держави вважається запобіжником проти авторитаризму?"
    - "Яким чином ця ідеологема спростовує російський імперський міф про відсутність власної української еліти?"
  model_answers:
    - "Ця формула означає, що об'єднання сприймалося не як підкорення чи анексія, а як добровільний союз двох рівноправних політичних націй — польської та руської (української), які зберігають свою гідність та свободу."
    - "Коли держава будується на взаємній згоді і договорі (контракті) між рівними суб'єктами, жодна зі сторін не може узурпувати владу. Монарх стає лише гарантом виконання угоди, а не абсолютним правителем."
    - "Міф стверджує, що українці були лише залежними селянами. Формула ж доводить, що українські землі представляла потужна аристократія, яка мала достатньо політичної волі, освіти та суб'єктності, щоб диктувати свої умови під час об'єднання держав."

- type: comparative-study
  title: "Порівняльний аналіз політичних моделей"
  instruction: "Порівняйте українську (шляхетську) та московську (автократичну) політичні моделі."
  items_to_compare:
    - "Українська шляхетська модель (Річ Посполита)"
    - "Московська автократична модель"
  criteria:
    - "Статус монарха"
    - "Правовий захист еліти"
    - "Характер політичної культури (спосіб вирішення конфліктів)"
  prompt: "На основі виділених критеріїв поясніть, чому українська еліта не сприймала інтеграцію до Московського царства."
  model_answer: "В українській моделі монарх був виборним і обмеженим писаним Статутом (законом), тоді як московський цар вважався абсолютним і сакралізованим правителем. Українська еліта мала юридичний захист недоторканності особи та майна, а в Москві всі, навіть найбагатші бояри, вважалися безправними холопами царя. Культура договору і компромісу в Україні разюче контрастувала з московською культурою сили і покори. Саме тому українська шляхта, вихована на ідеалах особистої свободи та верховенства права, чинила екзистенційний опір спробам підпорядкувати її деспотичній системі, де ці цінності були відсутні."

- type: essay-response
  title: "Есе: Деколонізація минулого"
  instruction: "Напишіть аналітичне есе на задану тему."
  prompt: "Проаналізуйте, чому відмова від імперського міфу про українців як 'націю попів та хлопів' є критично важливою для сучасного розуміння української історії. У своєму есе наведіть щонайменше два приклади політичної суб'єктності української еліти в епоху раннього модерну."
  min_words: 250
  model_answer: "Відмова від імперського наративу є необхідним кроком для деколонізації національної свідомості, оскільки міф про 'націю попів та хлопів' штучно позбавляв українців державної та аристократичної традиції, представляючи їх пасивною масою, нездатною до самоврядування. Повернення до історичної правди демонструє, що українські землі завжди мали потужну еліту, яка була органічною частиною європейського простору. Першим яскравим прикладом політичної суб'єктності є період галицької боярської олігархії (1340-1349 рр.), коли бояри на чолі з Дмитром Дедьком самостійно керували державою, вели дипломатію та гарантували міжнародні договори без участі монарха. Другим прикладом є Люблінський сейм 1569 року, під час якого руська шляхта домоглася закріплення в королівському привілеї гарантій своїх прав, збереження дії Литовського Статуту та статусу української мови, керуючись принципом 'рівні до рівних, вільні до вільних'. Усвідомлення цієї спадщини доводить, що культура демократії, поваги до закону та захисту індивідуальних свобод є не запозиченою, а глибоко вкоріненою в українській політичній традиції."
  rubric:
    - criteria: "Аргументація та розкриття теми"
      description: "Чітко пояснено значення відмови від імперського міфу."
      points: 5
    - criteria: "Наведення історичних прикладів"
      description: "Наведено та розкрито щонайменше два релевантні приклади політичної суб'єктності еліти."
      points: 5