- type: reading
  id: reading-denazification
  title: "Аналіз термінології: Денацифікація"
  text: |
    Офіційна російська пропаганда висунула абсолютно абсурдні та взаємовиключні цілі вторгнення, серед яких центральне місце посідає так звана денацифікація. У російському кривому дзеркалі нацистом оголошується будь-хто, хто підтримує незалежність України, розмовляє українською мовою або шанує національних героїв. Денацифікація у російському виконанні — це лише евфемізм для політики знищення українства як такого.
  tasks:
    - "Прочитайте текст і поясніть значення терміна денацифікація в російському дискурсі."

- type: critical-analysis
  source_reading: reading-denazification
  title: "Критичний аналіз: Підміна понять"
  instruction: "Дайте розгорнуті відповіді на запитання щодо прочитаного тексту."
  questions:
    - "Як російська пропаганда змінила початкове значення терміна денацифікація?"
    - "Які реальні дії ховаються за офіційними російськими заявами про денацифікацію?"
    - "Чому збереження національної ідентичності розглядається агресором як загроза?"
  model_answers:
    - "Пропаганда використовує термін не для боротьби з фашизмом, а для таврування будь-яких проявів української ідентичності та незалежності."
    - "За цим терміном ховається політика етноциду: фізичне знищення еліти, масові репресії, заборона мови та примусова асиміляція."
    - "Національна ідентичність та незалежність України руйнують імперський міф про один народ і стають перешкодою для відновлення імперії."

- type: comparative-study
  title: "Порівняльний аналіз: Конфлікт наративів"
  instruction: "Порівняйте російські імперські наративи та реальні історичні факти."
  items_to_compare:
    - "Російський імперський наратив (один народ, штучна держава)"
    - "Українська історична реальність (тисячолітня традиція, політична нація)"
  criteria:
    - "Ставлення до української державності"
    - "Трактування подій 2014 року"
    - "Мета російсько-української війни"
  prompt: "Напишіть порівняльний аналіз двох протилежних поглядів на історію та сучасність України, спираючись на текст модуля."
  model_answer: "Російський наратив заперечує суб'єктність України, називаючи її штучною, а події 2014 року — возз'єднанням або громадянською війною. Мета агресора — знищення держави. Натомість українська реальність базується на тисячолітній традиції державності. Події 2014 року розглядаються як збройна агресія та окупація, а сучасна війна є антиколоніальною боротьбою за незалежність та виживання."

- type: true-false
  title: "Перевірка фактів: Етапи та причини війни"
  instruction: "Визначте, чи є твердження правильним (true) або хибним (false)."
  items:
    - statement: "Повномасштабне вторгнення Росії в Україну розпочалося 20 лютого 2014 року."
      correct: false
      explanation: "Повномасштабне вторгнення почалося 24 лютого 2022 року, а 20 лютого 2014 року почалася окупація Криму."
    - statement: "Концепція гібридної війни передбачає використання регулярних військ під виглядом місцевих повстанців разом з інформаційними атаками."
      correct: true
      explanation: "Саме так Росія діяла під час окупації Криму та початку війни на Донбасі."
    - statement: "Міжнародна спільнота беззаперечно визнала результати так званого референдуму на території Криму у 2014 році."
      correct: false
      explanation: "Жодна цивілізована країна не визнала результати цього псевдореферендуму."
    - statement: "Підписані Мінські угоди допомогли остаточно вирішити збройний конфлікт на Донбасі та забезпечили тривалий мир."
      correct: false
      explanation: "Мінські угоди були лише спробою заморозити конфлікт, а Росія не виконувала їхніх безпекових пунктів."
    - statement: "Блискавичний Харківський контрнаступ, який призвів до звільнення значних територій, відбувся восени 2022 року."
      correct: true
      explanation: "У вересні 2022 року українська армія стрімко звільнила Балаклію, Куп'янськ та Ізюм."
    - statement: "Ідеологія рашизму визнає право української нації на самовизначення та підтримку власної незалежної держави."
      correct: false
      explanation: "Рашизм абсолютно заперечує існування окремої української нації."
    - statement: "Створення професійного сержантського корпусу за західними стандартами стало одним із ключових чинників ефективного спротиву української армії."
      correct: true
      explanation: "Сержанти стали лідерами малих підрозділів, здатними самостійно ухвалювати рішення в бою."
    - statement: "Примусова депортація українських дітей до Росії з метою їхньої подальшої асиміляції є міжнародно визнаною ознакою геноциду."
      correct: true
      explanation: "Примусова передача дітей з однієї групи до іншої є чіткою ознакою акту геноциду згідно з конвенцією ООН."
    - statement: "Під час гібридної фази війни Росія намагалася використати концепцію російського світу виключно як культурний проєкт без політичного підтексту."
      correct: false
      explanation: "Росія фінансувала проросійські сили для створення п'ятої колони та дестабілізації країни."
    - statement: "Успішне звільнення міста Херсон відбулося завдяки стрімкому фронтальному прориву піхоти без використання далекобійної артилерії."
      correct: false
      explanation: "Звільнення Херсона було методичним, з інтенсивним використанням артилерії для руйнування ворожої логістики."

- type: essay-response
  title: "Есе: Екзистенційний вимір спротиву"
  instruction: "Напишіть аргументоване есе на основі матеріалів модуля."
  prompt: "Спираючись на текст модуля, поясніть, чому російсько-українська війна є для України війною за екзистенційне виживання. Які чинники мотивують українське суспільство чинити тотальний спротив агресору?"
  min_words: 250
  model_answer: "Російсько-українська війна є екзистенційною, оскільки її метою з боку Росії є не просто захоплення територій, а повне знищення української державності та національної ідентичності. Ідеологія рашизму заперечує існування українців як окремого народу. Практика окупаційних військ, що включає масові вбивства, депортацію дітей та стирання культури, підтверджує геноцидний характер агресії. Українське суспільство мотивоване чинити спротив завдяки сформованій національній ідентичності та усвідомленню того, що компроміс з імперією неможливий. Як зазначав генерал Залужний, українці не мають права перекладати цю війну на своїх дітей. Свобода від імперського диктату стала абсолютною цінністю. Спротив також підтримується ефективністю реформованих ЗСУ, масштабним волонтерським рухом та солідарністю міжнародної коаліції, яка розуміє, що Україна захищає не лише себе, але й демократичні цінності всього вільного світу."
  rubric:
    - criteria: "Аргументація та розуміння природи війни"
      description: "Есе чітко розкриває екзистенційний характер війни та геноцидні практики агресора."
      points: 40
    - criteria: "Аналіз чинників спротиву"
      description: "Студент наводить конкретні приклади факторів стійкості (ідентичність, армія, волонтери, міжнародна допомога)."
      points: 40
    - criteria: "Мовне оформлення"
      description: "Текст написаний грамотно, з використанням відповідної термінології рівня B2."
      points: 20