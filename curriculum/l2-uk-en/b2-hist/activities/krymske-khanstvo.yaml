- type: reading
  id: reading-boplan-chelebi
  title: 'Первинні джерела: Свідчення іноземців'
  source: 'Гійом де Боплан та Евлія Челебі'
  text: |
    Вони на диво витривалі й здатні неймовірно легко, без нарікань переносити страшний голод, спрагу, літню спеку та зимовий холод... Палац цей у всьому подібний до квітучого раю, і якщо людина на нього хоча б раз уважно подивиться, то щиро здивується... Дійсно, при його детальному описі навіть ті, хто найкраще вміє вихваляти красу, просто німіють від подиву.
  tasks:
    - 'Прочитайте цитати.'
    - 'Порівняйте різні перспективи бачення Криму.'

- type: critical-analysis
  source_reading: reading-boplan-chelebi
  title: 'Критичний аналіз свідчень'
  instruction: 'Проаналізуйте уривки з історичних джерел.'
  questions:
    - 'Чому французький інженер Боплан зосередив свою увагу саме на військовій витривалості та логістиці кримців?'
    - 'Як опис Бахчисарайського палацу Евлією Челебі спростовує імперський міф про диких кочівників?'
    - 'Які фактори могли вплинути на настільки різне сприйняття Криму цими двома іноземцями?'

- type: reading
  id: reading-state-structure
  title: 'Державний устрій та союзи'
  text: |
    Кожен кримський хан мусив обов'язково зважати на спільну думку впливової аристократії. Владний устрій спирався на підтримку чотирьох головних родів карачі-беїв, які формували Диван і мали право ветувати найважливіші рішення хана або навіть ініціювати його усунення. Крім того, зовнішня політика Криму передбачала гнучкі союзи. Наприклад, об'єднана армія гетьмана Хмельницького та хана Ісляма Ґерая продемонструвала неймовірну силу військового побратимства під Корсунем.
  tasks:
    - 'Ознайомтеся з описом державного устрою.'

- type: essay-response
  source_reading: reading-state-structure
  title: 'Есе: Система стримувань і противаг'
  prompt: 'Опишіть політичний устрій Кримського ханства. Як система карачі-беїв та Курултаю запобігала узурпації влади ханом? Наведіть приклади з тексту.'
  min_words: 150
  rubric:
    - criteria: 'Історична точність'
      description: 'Правильне використання термінів (курултай, карачі-беї, диван).'
      points: 40
    - criteria: 'Аргументація'
      description: 'Наведення чітких доказів обмеження влади хана.'
      points: 40
    - criteria: 'Стилістика'
      description: 'Дотримання академічного стилю та логічної структури тексту.'
      points: 20

- type: true-false
  title: 'Факти чи міфи: Кримське ханство'
  instruction: 'Визначте, чи є наведені твердження правдивими, чи хибними.'
  items:
    - statement: 'Кримське ханство утворилося як один із природних уламків Золотої Орди.'
      correct: true
      explanation: 'Крим успадкував державну та правову традицію Улусу Джучі.'
    - statement: 'Хан мав абсолютну та нічим не обмежену владу над усіма підданими.'
      correct: false
      explanation: 'Його влада була жорстко обмежена впливовими беями та Курултаєм.'
    - statement: 'Карачі-беї мали офіційне право на збройне повстання проти хана-порушника.'
      correct: true
      explanation: 'Це була ефективна система противаг проти тиранії.'
    - statement: 'Єдиним джерелом доходів кримської держави був продаж бранців у Кафі.'
      correct: false
      explanation: 'Ясир складав лише 5-15% бюджету; важливою була сіль, сади та ремесла.'
    - statement: 'Менґлі I Ґерай визнав політичний протекторат Османської імперії у 1478 році.'
      correct: true
      explanation: 'Це гарантувало безпеку Криму від нападів інших кочових орд.'
    - statement: 'Українські козаки ніколи не укладали військових союзів із кримськими татарами.'
      correct: false
      explanation: 'Гетьмани часто укладали союзи з Кримом проти Польщі чи Москви.'
    - statement: 'Знамениті українські козацькі шаровари були запозичені зі східної культури.'
      correct: true
      explanation: 'Це був практичний одяг для життя та їзди верхи у степу.'
    - statement: 'Анексія Криму Російською імперією у 1783 році відбулася згідно з міжнародними угодами.'
      correct: false
      explanation: 'Росія грубо порушила умови Кючук-Кайнарджійського миру.'
    - statement: 'Сюрґюн 1944 року був масовою депортацією корінного народу тоталітарним режимом.'
      correct: true
      explanation: 'Це стало актом геноциду кримськотатарського народу.'
    - statement: 'Кримські татари не мають статусу корінного народу в сучасній Україні.'
      correct: false
      explanation: 'У 2021 році Україна офіційно закріпила їхній статус як корінного народу.'