- type: reading
  id: "reading-spohady"
  title: "Спогади депортованих - Усна історія втраченого дому"
  source: "Усна історія (реконструкція зі спогадів)"
  text: |
    Нас везли як худобу, в товарняках. Коли відкрили двері в степу — ми побачили тільки небо і землю. А ми ж люди гір... Сонце пече так, що дихати нічим. Води немає. Тут хліб росте, а ми вмираємо. Пам'ятаю, як мама кричала. Нам дали дві години. Ми взяли трохи борошна і вузлик з одягом. А сусід... він просто сів на порозі і відмовився йти. Його вдарили прикладом.
  instruction: "Прочитайте спогади депортованих для подальшого аналізу."

- type: true-false
  title: "Перевірка розуміння тексту"
  instruction: "Визначте, чи є наступні твердження правдивими."
  items:
    - statement: "Переселення українців у 1944 році було абсолютно добровільним і не супроводжувалося терором."
      correct: false
      explanation: "Початковий етап пропаганда подавала як добровільний, але влада швидко перейшла до масового терору."
    - statement: "Люблінська угода 1944 року стала формальним прикриттям для початку депортацій."
      correct: true
      explanation: "Угода про переселення була використана для легалізації масштабної демографічної зачистки."
    - statement: "Операція 'Вісла' мала на меті покарання виключно членів Української Повстанської Армії."
      correct: false
      explanation: "Депортаціям підлягали абсолютно всі українці, застосовувався принцип колективної відповідальності."
    - statement: "Депортованих українців спеціально розпорошували на нових землях, щоб прискорити їхню асиміляцію."
      correct: true
      explanation: "Існувала заборона селити більше 3-4 родин в одному селі, щоб зруйнувати громади."
    - statement: "Радянські документи використовували термін 'евакуація', щоб приховати злочинний характер депортацій."
      correct: true
      explanation: "Це був свідомий евфемізм, адже евакуація передбачає порятунок і можливість повернення."
    - statement: "Більшість бойків, яких переселили в 1951 році, потрапили в західні області України."
      correct: false
      explanation: "У 1951 році бойків переселили у посушливі степи Півдня України."
    - statement: "Концтабір Явожно був створений спеціально для ув'язнення і репресій проти українців."
      correct: true
      explanation: "Туди без суду відправляли підозрілих в симпатіях до УПА та представників інтелігенції."
    - statement: "Міжнародне право класифікує переселення українців у 1944-1951 роках як гуманітарну місію."
      correct: false
      explanation: "Ці події мають всі ознаки класичної етнічної чистки."
    - statement: "Депортація кримських татар і переселення українців із Закерзоння мали спільні риси тоталітарного примусу."
      correct: true
      explanation: "Обидві депортації використовували колективну провину, товарні вагони та статус спецпереселенців."
    - statement: "Фестиваль 'Лемківська ватра' є доказом успішної та повної полонізації лемків."
      correct: false
      explanation: "Навпаки, цей фестиваль є символом опору асиміляції та збереження національної ідентичності."

- type: critical-analysis
  title: "Критичний аналіз - Голоси депортованих"
  source_reading: "reading-spohady"
  instruction: "Проаналізуйте спогади переселенців та дайте відповіді на запитання."
  target_text: "Нас везли як худобу, в товарняках. Коли відкрили двері в степу — ми побачили тільки небо і землю."
  questions:
    - "Які деталі у спогадах свідчать про те, що переселення відбувалося під жорстким примусом?"
    - "Чому переїзд із гірських районів у степи став додатковою психологічною і фізичною травмою для переселенців?"
  model_answers:
    - "Свідчення про те, що людям дали лише дві години на збори, транспортували в товарних вагонах ('як худобу') та застосовували фізичне насильство (вдарили прикладом), є прямими доказами жорсткого примусу і терору."
    - "Горяни звикли до іншого клімату та умов господарювання. У степу вони страждали від палючого сонця і дефіциту води, що руйнувало їхній традиційний спосіб життя і посилювало відчуття втрати рідного дому."
  focus_points:
    - "Аналіз емоційного стану жертв примусового переселення."
    - "Оцінка фізичних та психологічних наслідків зміни географічного середовища."

- type: comparative-study
  title: "Порівняльне дослідження - Спільний почерк тоталітаризму"
  instruction: "Порівняйте депортацію українців із Закерзоння та депортацію кримських татар."
  items_to_compare:
    - "Депортації українців Закерзоння (1944-1951)"
    - "Сургунлік (Депортація кримських татар 1944 року)"
  criteria:
    - "Методи здійснення (транспортування, час на збори)"
    - "Політичне обґрунтування та принцип провини"
    - "Умови на нових місцях поселення"
  prompt: "Використовуючи запропоновані критерії, проаналізуйте спільні риси тоталітарної інженерії щодо цих двох народів."
  model_answer: "Обидві акції були здійснені раптово, з використанням регулярних військ та з мінімальним часом на збори. Транспортування відбувалося у переповнених товарних вагонах з високою смертністю. Тоталітарна влада застосувала принцип колективної відповідальності, звинувачуючи цілі народи або регіони. На нових місцях депортовані зазнавали дискримінації, отримували статус спецпереселенців і піддавалися цілеспрямованій асиміляції."

- type: essay-response
  title: "Есе-відповідь - Етнічна чистка та історична пам'ять"
  instruction: "Напишіть розгорнуте есе на задану тему."
  source_reading: "reading-spohady"
  prompt: "Чому операція 'Вісла' та інші примусові переселення українців 1944-1951 років кваліфікуються істориками як етнічна чистка? Наведіть конкретні аргументи з тексту."
  min_words: 200
  model_answer: "Примусові переселення українців у 1944-1951 роках, зокрема операція 'Вісла', відповідають усім критеріям етнічної чистки. По-перше, головною метою було створення моноетнічних держав і повна депопуляція українських етнічних анклавів (Лемківщина, Холмщина). По-друге, влада застосовувала жорстокий примус, військову силу та тактику 'випаленої землі'. По-третє, переселенців навмисно розпорошували на нових землях, щоб прискорити їхню мовну та культурну асиміляцію. Радянські та польські терміни на кшталт 'репатріація' були лише евфемізмами для приховування злочину. Крім того, ліквідація греко-католицької церкви та знищення матеріальної спадщини свідчать про ознаки етноциду."
  rubric:
    - criteria: "Аргументація"
      description: "Наведено чіткі докази на користь кваліфікації подій як етнічної чистки."
      points: 40
    - criteria: "Використання термінології"
      description: "Коректно використано терміни - розпорошення, примус, евфемізм, етнічна чистка."
      points: 30
    - criteria: "Структура тексту"
      description: "Есе має логічну структуру - вступ, аргументація, висновки."
      points: 30