- type: reading
  id: reading-sloboda
  title: 'Первинне джерело: Вимоги до Москви'
  source: Зміст вимог українських послів
  text: Аби судилися старшини козацькі за своїми правами, і щоб ніхто з боку московського
    у їхні суди не втручався...
  tasks:
  - Яке головне право намагалися захистити козацькі посли?
  - Від кого козаки вимагали невтручання у свої суди?
  - Чому збереження власної судової системи було критично важливим для автономії?
  - Як цей принцип вплинув на подальший розвиток Слобожанщини?
- type: critical-analysis
  title: 'Аналіз: Правовий щит автономії'
  source_reading: reading-sloboda
  target_text: і щоб ніхто з боку московського у їхні суди не втручався
  questions:
  - Як ця вимога контрастує з російською самодержавною системою того часу?
  - Чому московські воєводи постійно намагалися порушити цей принцип на Слобожанщині?
  - Яку роль відігравала виборність старшини у забезпеченні незалежного суду?
  model_answers:
  - У Росії вся судова влада належала царю та його воєводам, тоді як українці вимагали
    суду рівних і незалежних виборних старшин.
  - Воєводи прагнули централізації та повного контролю над козацькими ресурсами, що
    було неможливо без підпорядкування судової влади.
  - Виборна старшина залежала від громади, що робило її суд незалежним від імперського
    адміністративного впливу.
  focus_points:
  - Розуміння глибинної різниці між двома правовими системами.
  - Аналіз справжніх мотивів російських воєвод.
  - Усвідомлення міцного зв'язку між виборністю та політичною незалежністю суду.
- type: comparative-study
  title: 'Порівняння: Два типи колонізації'
  source_reading: reading-sloboda
  items_to_compare:
  - Українська народна колонізація
  - Російська державна експансія
  criteria:
  - Ініціатор процесу
  - Фінансування та ресурси
  - Мета та соціальний статус поселенців
  prompt: Порівняйте українську та російську моделі колонізації нових територій у
    XVII-XVIII століттях.
  model_answer: Українська колонізація була органічним і самостійним рухом вільних
    людей, які власноруч фінансували переселення та збройний захист задля пошуку свободи.
    Російська державна експансія керувалася указами царя, фінансувалася безпосередньо
    з казни, а здійснювалася примусово силами залежних військових і селян для розширення
    імперії.
- type: essay-response
  title: 'Есе: Феномен вільного господаря'
  source_reading: reading-sloboda
  prompt: Проаналізуйте роль звичаєвого права займанщини у формуванні соціальної структури
    та менталітету мешканців Слобідської України. Як принцип хто обробив того й нива
    контрастував з інститутом кріпосного права?
  min_words: 150
  model_answer: 'Право займанщини стало економічним фундаментом вільної Слобожанщини.
    На відміну від кріпосного права, де людина була власністю поміщика і не мала жодного
    стимулу працювати краще, займанщина справедливо винагороджувала особисту працю:
    чим більше ти обробив власноруч, тим багатшим ти став. Це сформувало тип міцного,
    озброєного та цілком незалежного господаря, який знав ціну своїй землі і був здатним
    її захистити. Ця економічна свобода породила високу соціальну мобільність, де
    селянин легко міг стати козаком, і зумовила небувалий рівень культури та освіти
    в регіоні, адже вільні та заможні люди мали можливість фінансувати школи і будувати
    храми.'
  rubric:
  - criteria: Розкриття суті права займанщини
    description: Студент чітко пояснює принцип вільного обробітку землі та набуття
      власності.
    points: 5
  - criteria: Порівняння з кріпацтвом
    description: Студент проводить глибоке та аргументоване порівняння з російською
      кріпосною системою.
    points: 5
  - criteria: Вплив на суспільний менталітет
    description: Студент аналізує формування типу вільного, самодостатнього та незалежного
      господаря.
    points: 5
- type: true-false
  title: 'Перевірте факти: Історія Слобожанщини'
  items:
  - statement: Дике Поле було абсолютно безлюдною пустелею до приходу російських воєвод.
    correct: false
    explanation: Це був надзвичайно динамічний фронтир і контактна зона, яка стала
      простором можливостей для козаків.
  - statement: Головною причиною масової міграції на схід була втеча українців від
      соціального гніту.
    correct: true
    explanation: Українці масово тікали від постійного збільшення панщини та жорстких
      релігійних утисків.
  - statement: Місто Харків було засноване згідно з прямим наказом російського царя.
    correct: false
    explanation: Харків був заснований з ініціативи українських козаків на чолі з
      осадчим Іваном Каркачем.
  - statement: Жителі новостворених слобід отримували значні податкові пільги.
    correct: true
    explanation: Нові переселенці повністю звільнялися від державних податків на період
      від десяти до сорока років.
  - statement: У слобідських полках посади полковника завжди призначалися особисто
      царем.
    correct: false
    explanation: Ключовою політичною відмінністю була вільна виборність старшини на
      загальній козацькій раді.
  - statement: Слобожанщина була поділена на п'ять класичних козацьких полків.
    correct: true
    explanation: Це були знамениті Харківський, Сумський, Охтирський, Ізюмський та
      Острогозький полки.
  - statement: Право займанщини передбачало необхідність купівлі землі безпосередньо
      у московського воєводи.
    correct: false
    explanation: Займанщина дозволяла вільно стати повноправним власником ділянки
      за фактом її першого обробітку.
  - statement: Московський уряд цинічно використовував українців як живий щит проти
      татар.
    correct: true
    explanation: Українські переселенці надійно захищали південні кордони власним
      життям, коштом і зброєю.
  - statement: Рівень освіти на Слобожанщині був дуже низьким через постійну військову
      небезпеку.
    correct: false
    explanation: Рівень народної письменності був високим, діяли парафіяльні школи
      та відомий Харківський колегіум.
  - statement: Автономія слобідських полків була жорстоко ліквідована Катериною II
      у 1765 році.
    correct: true
    explanation: Старовинні полки остаточно розформували, а на їхньому місці згодом
      запровадили кріпосне право.
  instruction: Визначте, чи твердження правильне.
