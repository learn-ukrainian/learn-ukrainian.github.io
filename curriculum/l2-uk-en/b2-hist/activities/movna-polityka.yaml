- type: reading
  id: reading-konstytuciia
  title: 'Конституція України: Стаття 10'
  source: 'Конституція України (1996)'
  instruction: 'Прочитайте текст статті та проаналізуйте її зміст.'
  text: |
    Державною мовою в Україні є українська мова.
    Держава забезпечує всебічний розвиток і функціонування української мови в усіх сферах суспільного життя на всій території України.
    В Україні гарантується вільний розвиток, використання і захист російської, інших мов національних меншин України.
  tasks:
    - 'Який статус надається українській мові?'
    - 'Які зобов''язання бере на себе держава щодо розвитку мови?'
    - 'Як згадується російська мова в тексті?'

- type: critical-analysis
  title: 'Аналіз міфів: Утиски російської мови'
  source_reading: reading-konstytuciia
  instruction: 'Проаналізуйте наведені твердження та спростуйте їх, спираючись на текст уроку.'
  target_text: 'Російська пропаганда стверджує, що в Україні відбувалися масові утиски російськомовного населення та заборона російської мови.'
  questions:
    - 'Які факти з історії української освіти та медіа до 2020 року спростовують міф про заборону російської мови?'
    - 'Як співвідноситься кількість російських шкіл в Україні та українських шкіл у Росії?'
    - 'Чому запровадження мовних квот не є дискримінацією?'
  model_answers:
    - 'В Україні до 2020 року функціонували сотні шкіл з російською мовою навчання, а медіапростір був переважно російськомовним.'
    - 'Держава Україна утримувала російські школи, тоді як у Росії немає жодної школи з українською мовою навчання.'
    - 'Мовні квоти є інструментом захисту та позитивної дискримінації для відновлення справедливості після століть лінгвоциду.'
  focus_points:
    - 'Реальний стан справ у медіа та освіті'
    - 'Порівняльний аналіз України та РФ'
    - 'Поняття позитивної дискримінації'

- type: essay-response
  title: 'Деколонізація простору'
  source_reading: reading-konstytuciia
  instruction: 'Напишіть есе на задану тему, використовуючи аргументи з тексту.'
  prompt: 'Чому захист української мови є процесом деколонізації, а не дискримінацією? Обґрунтуйте свою думку, використовуючи концепцію Юрія Шевельова та історичні факти.'
  min_words: 150
  model_answer: 'Захист української мови є відновленням історичної справедливості. Російська імперія та СРСР системно знищували українську мову через лінгвоцид, такий як Емський указ та Валуєвський циркуляр. Дерусифікація не означає дискримінацію росіян, а повертає українській мові її природне місце в суспільстві. Концепція "мовної шизофренії" Юрія Шевельова пояснює, що змішування мов шкодить ідентичності. Тому перехід на українську мову є способом захисту національної безпеки та побудови здорового суспільства.'
  rubric:
    - criteria: 'Розуміння деколонізації'
      description: 'Автор чітко розрізняє деколонізацію та дискримінацію.'
      points: 5
    - criteria: 'Використання історичних фактів'
      description: 'Наведені приклади лінгвоциду (укази, циркуляри).'
      points: 3
    - criteria: 'Згадка концепцій'
      description: 'Успішно використана концепція мовної шизофренії.'
      points: 2

- type: true-false
  title: 'Перевірте знання історичних фактів'
  instruction: 'Визначте, чи є твердження правдивими.'
  items:
    - statement: 'Емський указ забороняв друкувати книги українською мовою.'
      correct: true
      explanation: 'Емський указ 1876 року був інструментом лінгвоциду.'
    - statement: 'Закон 1989 року визнавав українську та російську мови державними.'
      correct: false
      explanation: 'Закон 1989 року визначав українську мову єдиною державною, але залишав за російською статус мови міжнаціонального спілкування.'
    - statement: 'Конституція 1996 року закріпила статус української мови як єдиної державної.'
      correct: true
      explanation: 'Стаття 10 Конституції проголошує українську мову єдиною державною.'
    - statement: 'Книга "Україна — не Росія" була написана українською мовою.'
      correct: false
      explanation: 'Ця книга Леоніда Кучми була написана російською мовою і видана в Москві.'
    - statement: 'Закон Ківалова-Колесніченка ухвалили без порушень регламенту.'
      correct: false
      explanation: 'Закон ухвалили з грубими порушеннями процедури та кнопкодавством.'
    - statement: 'Закон 2012 року дозволяв визнавати російську мову регіональною.'
      correct: true
      explanation: 'Це була пастка, яка дозволила російській стати другою державною у 13 областях.'
    - statement: 'Європейська хартія регіональних мов створена для захисту домінуючих мов.'
      correct: false
      explanation: 'Європейська хартія створена для захисту мов, які зникають.'
    - statement: 'Закон 2019 року запровадив посаду Уповноваженого із захисту державної мови.'
      correct: true
      explanation: 'Цей інститут створили для захисту мовних прав громадян.'
    - statement: 'Після 2022 року українці масово почали переходити на українську мову.'
      correct: true
      explanation: 'Це явище отримало назву "мовна стійкість".'
    - statement: 'Український дубляж став успішним інструментом м''якої сили.'
      correct: true
      explanation: 'Українська школа дублювання продемонструвала високий професіоналізм і змінила ставлення до мови.'

- type: comparative-study
  title: 'Порівняльний аналіз мовних законів'
  instruction: 'Порівняйте підходи до захисту мови у різні історичні періоди.'
  items_to_compare:
    - 'Закон про мови 1989 року'
    - 'Закон про забезпечення функціонування української мови 2019 року'
  criteria:
    - 'Статус російської мови'
    - 'Механізми контролю та виконання'
    - 'Сфера застосування'
  prompt: 'Які ключові відмінності між цими двома законами свідчать про зміну ставлення держави до мовної політики?'
  model_answer: 'Закон 1989 року мав декларативний характер і зберігав привілейований статус російської мови як мови міжнаціонального спілкування без реальних механізмів контролю. Закон 2019 року запровадив чіткі стандарти, іспити та інститут Уповноваженого із захисту державної мови. Він перестав оглядатися на російську мову і зосередився на захисті українського мовного простору.'