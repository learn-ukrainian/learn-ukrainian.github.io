- type: reading
  id: reading-network
  title: "Джерело: Мережа довіри та самоорганізація"
  source: "Історичний аналіз: Громадянське суспільство у війні"
  text: |
    Початок повномасштабного вторгнення Росії в Україну став моментом найвищої екзистенційної загрози. Однак первинний психологічний шок майже одразу трансформувався в масову суспільну реакцію, коли мільйони людей миттєво об'єдналися, створюючи загальнонаціональну мережу довіри. Українці гуртуються навколо спільних цінностей, а не страху перед правителем. Ця швидка реакція зірвала плани блискавичного захоплення країни.
  tasks:
    - "Як саме первинний шок трансформувався у суспільну реакцію?"
    - "Що означає концепція мережі довіри в контексті війни?"
    - "Чому українці гуртуються навколо спільних цінностей, а не страху?"

- type: critical-analysis
  title: "Аналіз: Феномен самоорганізації"
  source_reading: reading-network
  instruction: "Проаналізуйте наведений фрагмент та дайте відповіді на запитання."
  target_text: |
    Українці гуртуються навколо спільних цінностей, а не страху перед правителем. Ця швидка реакція зірвала плани блискавичного захоплення країни.
  questions:
    - "Яким чином традиції віче та братств вплинули на здатність українців до швидкої самоорганізації?"
    - "Як цей феномен спростовує імперський міф про українців як анархічну націю?"
  model_answers:
    - "Традиції віче та козацтва сформували політичний менталітет, де колективне рішення важить більше за наказ правителя, що дозволило швидко організувати опір."
    - "Те, що імперський центр сприймав як анархію, виявилося високоефективним порядком горизонтальної самоорганізації, заснованим на довірі."

- type: reading
  id: reading-volunteers
  title: "Джерело: Родинний зв'язок армії та суспільства"
  source: "Валерій Залужний"
  text: |
    Волонтери і військові — це нерозривний, фактично родинний, зв'язок. У нашій єдності — сила й незламність української нації. Громадянське суспільство стало своєрідною другою армією України, яка не тримає в руках зброю, але забезпечує першу армію всім необхідним — від супутників і автомобілів до тепла, турботи та психологічної підтримки.
  tasks:
    - "Яку метафору використовує Валерій Залужний для опису відносин армії та волонтерів?"
    - "Чому громадянське суспільство називають другою армією?"

- type: essay-response
  title: "Есе: Як громадянське суспільство допомагає вистояти"
  source_reading: reading-volunteers
  instruction: "Напишіть аргументоване есе на основі прочитаного матеріалу."
  prompt: |
    Спираючись на цитату Валерія Залужного та матеріали модуля, напишіть есе на тему: "Як громадянське суспільство допомагає Україні вистояти у війні?". Проаналізуйте перехід від зборів базових речей до закупівлі стратегічного озброєння та роль волонтерів у забезпеченні армії.
  min_words: 150
  model_answer: |
    Громадянське суспільство в Україні стало ключовим фактором стійкості під час повномасштабного вторгнення. Воно не лише взяло на себе функції забезпечення армії, але й продемонструвало безпрецедентну еволюцію. Від збору базових речей у 2014 році, таких як шоломи та бронежилети, волонтерський рух перейшов до купівлі високотехнологічного обладнання, включаючи ударні безпілотники та доступ до супутників.
    Метафора "родинного зв'язку", яку навів Валерій Залужний, підкреслює глибоку довіру між військовими та цивільними. Громадянське суспільство стало "другою армією", яка працює в тилу. Локальні ініціативи, децентралізована координація та міжнародна адвокація української діаспори створюють міцний фундамент, який дозволяє армії ефективно протистояти ворогу та захищати незалежність держави.
  rubric:
    - criteria: "Аргументація та аналіз"
      description: "Глибокий аналіз ролі волонтерського руху та його еволюції"
      points: 10
    - criteria: "Використання джерел"
      description: "Доречне посилання на слова Залужного та історичні факти"
      points: 5
    - criteria: "Лексика та граматика"
      description: "Використання термінології модуля (мобілізація, солідарність, ініціатива)"
      points: 5

