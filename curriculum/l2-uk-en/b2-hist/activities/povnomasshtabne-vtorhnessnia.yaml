- type: reading
  id: reading-zelensky
  title: "Первинне джерело від президента"
  source: "Володимир Зеленський 25 лютого 2022 року"
  text: |
    Лідер фракції тут, голова Офісу президента тут, прем'єр-міністр Шмигаль тут, Подоляк тут, президент тут. Всі ми тут. Наші військові тут. Громадяни, суспільство тут. Всі ми тут. Захищаємо нашу незалежність, нашу державу.
  tasks:
    - "Прочитайте звернення президента."
    - "Зверніть увагу на синтаксичну простоту тексту."

- type: essay-response
  source_reading: reading-zelensky
  title: "Есе про комунікацію під час кризи"
  prompt: "Проаналізуйте відеозвернення Володимира Зеленського від 25 лютого 2022 року. Чому використання простих, повторюваних синтаксичних конструкцій (Всі ми тут) виявилося ефективнішим за складну дипломатичну промову? Обґрунтуйте свою відповідь, спираючись на текст звернення."
  min_words: 150
  model_answer: "Відеозвернення від 25 лютого 2022 року стало переломним моментом в інформаційній площині, оскільки воно базувалося на принципі синтаксичної простоти. У стані гострого стресу та інформаційного шоку суспільство не сприймає довгих пафосних промов чи складних метафор. Постійне повторення прислівника тут виконало роль психологічного якоря, який миттєво спростував російські фейки про втечу влади і продемонстрував єдність керівництва з народом. Ця прямота дозволила встановити абсолютну довіру, давши нації чіткий сигнал - ми залишаємося і будемо захищати державу."
  rubric:
    - criteria: "Аргументація"
      description: "Наявність чітких аргументів щодо ефективності простого синтаксису."
      points: 40
    - criteria: "Розуміння контексту"
      description: "Демонстрація розуміння історичного та психологічного контексту перших днів вторгнення."
      points: 30
    - criteria: "Мовне оформлення"
      description: "Використання відповідної публіцистичної та аналітичної лексики."
      points: 30

- type: reading
  id: reading-maxar
  title: "Візуальні докази логістичного провалу"
  source: "Аналіз супутникових знімків Maxar Technologies"
  text: |
    Навесні 2022 року супутникові знімки зафіксували багатокілометрову колону російської бронетехніки, яка застрягла на підступах до Києва. Через логістичні прорахунки, відсутність пального та постійні удари української артилерії і мобільних вогневих груп ця військова армада перетворилася на нерухому мішень. Дані об'єктивного контролю остаточно спростували російські заяви про успішне виконання завдань і продемонстрували колапс стратегії блискавичної війни.
  tasks:
    - "Проаналізуйте текст про роль супутникових знімків."
    - "Знайдіть ключові причини зупинки колон техніки."

- type: critical-analysis
  source_reading: reading-maxar
  title: "Аналіз провалу блискавичної війни"
  target_text: "Провал логістики та знищення російської колони бронетехніки."
  questions:
    - "Яким чином географічні фактори (еластична оборона, водні бар'єри) та дії ЗСУ вплинули на рух ворожої колони?"
    - "Яку роль відіграли дані об'єктивного контролю в протидії російській пропаганді на міжнародній арені?"
  model_answers:
    - "Географічні бар'єри, зокрема підрив мостів через річку Ірпінь та затоплення заплав, змусили російську техніку рухатися вузькими дорогами. Це позбавило їх можливості маневрувати. Еластична оборона дозволила українським силам розтягнути ворожі комунікації, після чого мобільні вогневі групи та артилерія почали систематично знищувати машини забезпечення, зупинивши всю колону."
    - "Дані об'єктивного контролю, такі як супутникові знімки Maxar, стали візуальним і незаперечним доказом брехні російської пропаганди. Вони показали світу армію агресора в стані повного логістичного колапсу. Це знищило міф про непереможність армії РФ, переконавши західних партнерів у здатності України чинити успішний опір та стимулювавши надання військової допомоги."
  focus_points:
    - "Тактика еластичної оборони"
    - "Логістичний колапс"
    - "Об'єктивний контроль та пропаганда"

- type: true-false
  title: "Правда чи вигадка про перебіг вторгнення"
  instruction: "Визначте, чи є наведені твердження правильними, спираючись на текст модуля."
  items:
    - statement: "Російський наступ 24 лютого 2022 року розпочався лише на східному напрямку."
      correct: false
      explanation: "Наступ відбувався одночасно з півночі, сходу та півдня."
    - statement: "Метою російського десанту в Гостомелі було створення повітряного мосту для швидкого перекидання військ."
      correct: true
      explanation: "Так, противник планував захопити злітну смугу для висадки елітних підрозділів."
    - statement: "Українське командування застосувало стратегію еластичної оборони, використовуючи природні ландшафти."
      correct: true
      explanation: "Підрив мостів та дамб створив водні бар'єри, що зупинили бронетехніку."
    - statement: "Військова колона на підступах до Києва досягла своєї мети завдяки відмінній логістиці."
      correct: false
      explanation: "Колона застрягла через відсутність пального та успішні удари української артилерії."
    - statement: "Мобільні вогневі групи ЗСУ використовували сучасні протитанкові системи."
      correct: true
      explanation: "Ця тактика асиметричної війни виявилася вкрай ефективною проти бронетехніки."
    - statement: "Термін новояз застосовується для опису правдивого висвітлення подій у медіа агресора."
      correct: false
      explanation: "Новояз - це система пропагандистських евфемізмів для приховування злочинів."
    - statement: "Бучанська трагедія стала беззаперечним доказом воєнних злочинів агресора проти цивільного населення."
      correct: true
      explanation: "У Бучі та інших передмістях були задокументовані масові вбивства та катування мирних жителів."
    - statement: "Звання Місто-герой України присвоювалося лише містам-мільйонникам."
      correct: false
      explanation: "Звання отримали невеликі передмістя, такі як Буча, Ірпінь, Гостомель, які прийняли на себе основний удар."
    - statement: "Фраза Київ за три дні перетворилася на популярний інтернет-мем, що висміює амбіції ворога."
      correct: true
      explanation: "Ця фраза стала символом провалу російського бліцкригу та прикладом українського культурного гумору."
    - statement: "Наслідком повномасштабного вторгнення стало послаблення міжнародної підтримки України."
      correct: false
      explanation: "Навпаки, відбулася безпрецедентна міжнародна консолідація та об'єднання Заходу навколо України."
    - statement: "Знищення літака Мрія у Гостомелі залишилося непоміченим світовими медіа."
      correct: false
      explanation: "Втрата Мрії викликала величезний резонанс у світі та підкреслила варварську сутність агресії."
    - statement: "Президент України записав звернення 25 лютого з урядового кварталу в Києві."
      correct: true
      explanation: "Відеозвернення Всі ми тут з Банкової вулиці стало сигналом єдності та рішучості."