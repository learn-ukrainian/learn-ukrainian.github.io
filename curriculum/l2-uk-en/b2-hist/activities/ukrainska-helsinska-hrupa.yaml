- type: reading
  id: reading-memo1
  title: 'Первинне джерело: Меморандум №1'
  source: Українська Гельсінська група
  text: 'Ми розуміємо, що заліковування ран, заподіяних бюрократією та кар''єризмом,
    важче, ніж лікування ран, заподіяних на війні. Але ми, українці, живемо в Європі.
    Ми представляємо націю, яка зробила величезний внесок у європейську культуру.
    Тому ми вимагаємо відкритості та дотримання базових прав людини на нашій землі.

    '
- type: critical-analysis
  title: Аналіз аргументації дисидентів
  source_reading: reading-memo1
  questions:
  - Який головний аргумент використовує УГГ, посилаючись на європейську ідентичність?
  - Як ви розумієте метафору про заліковування ран, заподіяних бюрократією?
  model_answers:
  - Автори наголошують на тому, що Україна є частиною Європи, а отже, на неї поширюються
    європейські стандарти прав людини.
  - Метафора вказує на те, що моральна та соціальна шкода від тоталітаризму є глибшою
    і складнішою для подолання, ніж фізичні руйнування від війни.
- type: essay-response
  title: Вплив правозахисного руху
  source_reading: reading-memo1
  prompt: Спираючись на прочитаний уривок та матеріал уроку, напишіть есе про те,
    яку роль відіграла Українська Гельсінська група у боротьбі за незалежність. Чому
    перехід від збройного опору до легальної правозахисної діяльності став вирішальним?
  min_words: 200
  rubric:
  - criteria: Історичний аналіз
    description: Студент демонструє розуміння зміни парадигми опору від підпілля до
      відкритого захисту прав.
    points: 10
  - criteria: Аргументація
    description: Наведено переконливі аргументи щодо міжнародного резонансу та ефективності
      легальної боротьби.
    points: 10
- type: comparative-study
  title: Збройний опір та легальний правозахист
  items_to_compare:
  - Діяльність УПА (збройне підпілля)
  - Діяльність УГГ (легальний правозахист)
  criteria:
  - Методи та інструменти боротьби
  - Публічність та інформаційна стратегія
  - Реакція міжнародної спільноти
  prompt: Порівняйте два етапи українського руху опору. Які переваги та недоліки мав
    кожен із підходів в умовах тоталітарної системи?
- type: true-false
  title: Історичні факти про діяльність групи
  items:
  - statement: Радянський Союз підписав Гельсінські угоди з метою розширення прав
      людини у своїй країні.
    correct: false
    explanation: Радянське керівництво розглядало ці угоди як формальність і прагнуло
      лише легітимізувати повоєнні кордони.
  - statement: Українська Гельсінська група була створена у тисяча дев'ятсот сімдесят
      шостому році.
    correct: true
    explanation: Організацію було засновано восени сімдесятих років.
  - statement: Члени УГГ діяли у глибокому підпіллі і приховували свої справжні імена.
    correct: false
    explanation: Діячі відкрито ставили свої підписи та адреси під меморандумами.
  - statement: Меморандум УГГ вимагав акредитації іноземних журналістів на території
      республіки.
    correct: true
    explanation: Це було необхідно для прориву інформаційної блокади навколо республіки.
  - statement: Влада засуджувала дисидентів виключно за політичними звинуваченнями.
    correct: false
    explanation: Спецслужби часто фабрикували кримінальні справи для дискредитації
      активістів.
  - statement: Поет Василь Стус був одним із перших засновників Української Гельсінської
      групи.
    correct: false
    explanation: Поет приєднався до організації пізніше, вже після початку масових
      арештів.
  - statement: Українська група була єдиною в Радянському Союзі, яка не оголосила
      про саморозпуск.
    correct: true
    explanation: Організація продовжувала діяти навіть тоді, коли її лідери опинилися
      за ґратами.
  - statement: Колишній дисидент Левко Лук'яненко став співавтором Акта проголошення
      незалежності.
    correct: true
    explanation: В'язень сумління написав проект цього історичного державного документа.
  - statement: Діяльність правозахисників обмежувалася лише захистом етнічних українців.
    correct: false
    explanation: Група активно захищала права інших народів, зокрема виступала за
      права кримських татар.
  - statement: Наприкінці вісімдесятих років організація трансформувалася у відкриту
      політичну спілку.
    correct: true
    explanation: Вона стала першою політичною опозиційною структурою в республіці.
  instruction: Визначте, чи твердження правильне.
