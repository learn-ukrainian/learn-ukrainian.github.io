- type: reading
  id: reading-uman
  title: 'Первинні джерела про Уманську облогу'
  source: 'Історичний нарис'
  text: 'Умань була потужною фортецею, що належала магнатам Потоцьким. Вона стала епіцентром найтрагічніших подій Коліївщини. Полковник Іван Гонта, який мав захищати місто, перейшов на бік повстанців, вважаючи це не зрадою, а поверненням до свого народу. Взяття міста стало символом як народного гніву, так і жахливої жорстокості, яка увійшла в польську історіографію як Rzez humanska.'

- type: true-false
  title: 'Перевірка розуміння фактів про Коліївщину'
  instruction: 'Визначте, чи є твердження правдивими.'
  items:
    - statement: 'Холодний Яр був природною фортецею, де зароджувалася Коліївщина.'
      correct: true
    - statement: 'Польські магнати називали період експлуатації українських селян Золотим спокоєм.'
      correct: true
    - statement: 'Барська конфедерація була створена для захисту прав православних дисидентів.'
      correct: false
      explanation: 'Барська конфедерація була утворена реакційною шляхтою для захисту виключних прав католицизму.'
    - statement: 'Ігумен Мелхіседек Значко-Яворський особисто освячував гайдамацькі ножі у Мотронинському монастирі.'
      correct: false
      explanation: 'Історичні документи свідчать, що ігумен під час повстання перебував у від''їзді.'
    - statement: 'Гайдамацькі загони намагалися відтворити традиційний полково-сотенний устрій козацької держави.'
      correct: true
    - statement: 'Під час бойових походів гайдамакам дозволялося вживати алкоголь.'
      correct: false
      explanation: 'Жорсткий гайдамацький кодекс категорично забороняв вживання алкоголю.'
    - statement: 'Іван Гонта від початку був одним із лідерів селян-втікачів у Холодному Яру.'
      correct: false
      explanation: 'Гонта був довіреною особою Потоцьких і сотником надвірної міліції в Умані, перш ніж перейти на бік повсталих.'
    - statement: 'Російська влада підступно заарештувала лідерів Коліївщини під час дружнього бенкету.'
      correct: true
    - statement: 'Максим Залізняк був страчений у селі Кодня разом із тисячами повстанців.'
      correct: false
      explanation: 'Залізняк був засланий на довічну каторгу в сибірський Нерчинськ, оскільки вважався російським підданим.'
    - statement: 'Перетин гайдамаками кордону в місті Балта став приводом для російсько-турецької війни.'
      correct: true

- type: critical-analysis
  title: 'Аналіз: Хронологія подій 1768 року'
  source_reading: reading-uman
  instruction: 'Проаналізуйте хронологію повстання та його ключові етапи.'
  questions:
    - 'Як рішення Івана Гонти вплинуло на хід облоги Умані?'
    - 'Чому українська та польська історіографії по-різному оцінюють Взяття Умані?'
    - 'Яким чином російська імперія використала Коліївщину у власних геополітичних цілях?'
  model_answers:
    - 'Перехід сотника Івана Гонти та його добре озброєного полку на бік Максима Залізняка позбавив Умань головної лінії оборони і визначив швидке падіння фортеці.'
    - 'Українська історіографія розглядає ці події як страшний, але неминучий наслідок століть жорстокого гніту, тоді як польська візія фокусується лише на звірствах, ігноруючи колоніальну політику шляхти.'
    - 'Росія спочатку провокувала повстання для послаблення Польщі, але після успіхів гайдамаків підступно знищила їх, оскільки вільна козацька держава загрожувала російському кріпосництву.'
  focus_points:
    - 'Роль особистості в історії'
    - 'Деколонізаційний погляд'
    - 'Геополітичні наслідки'

- type: comparative-study
  title: 'Польська vs українська інтерпретація подій'
  source_reading: reading-uman
  instruction: 'Порівняйте дві різні історичні візії подій 1768 року.'
  items_to_compare:
    - 'Польський наратив (Bunt та Rzez humanska)'
    - 'Український наратив (Національно-визвольне повстання)'
  criteria:
    - 'Причини виступу'
    - 'Оцінка дій Івана Гонти'
    - 'Статус повстанців'
  prompt: 'На основі тексту поясніть, чому імперська польська історіографія та деколонізована українська історіографія дають настільки полярні оцінки подіям Коліївщини.'
  model_answer: 'Польська історіографія розглядає Коліївщину як хаотичний бунт кримінальних елементів проти цивілізованої влади, а вчинок Гонти — як підлу зраду присяги. Фокус робиться виключно на жертвах серед шляхти. Український деколонізований погляд розглядає повстання як закономірний наслідок багатовікового соціально-економічного та релігійного гніту. В цій візії Гонта є мучеником, що обрав свій народ, а самі повстанці — борцями за відновлення втраченої української державності.'

- type: essay-response
  title: 'Етична оцінка насильства у визвольній боротьбі'
  source_reading: reading-uman
  prompt: 'Коліївщина ставить перед сучасниками складну етичну дилему: чи виправдовує мета відновлення свободи та гідності жорстокі засоби її досягнення, такі як Уманська різня? Спираючись на матеріал модуля, дайте розгорнуту етичну оцінку діям гайдамаків. Чи можна відокремити справедливу боротьбу від масового насильства?'
  min_words: 150
  model_answer: 'Етична оцінка Коліївщини вимагає розуміння контексту тогочасної епохи. Жорстокість гайдамаків під час взяття Умані неможливо виправдати з позицій сучасного гуманізму, адже постраждали тисячі мирних людей. Водночас цю жорстокість не можна розглядати ізольовано. Вона стала дзеркальним відображенням системного насильства польської шляхти, яка століттями ставилася до українських селян як до робочої худоби та не залишала їм жодного правового шляху для захисту своїх прав. Гайдамаки реалізовували природне право на опір тиранії, будучи людьми довгої волі. Їхній збройний виступ був єдиною можливою реакцією на загрозу фізичного та духовного знищення нації. Тому, не глорифікуючи насильство і шануючи пам''ять безневинних жертв з усіх боків, українська історіографія вшановує повстанців як борців за відновлення втраченої державності. Коліївщина є трагічним, але необхідним уроком про те, що багатолітнє гноблення неминуче породжує руйнівний вибух народного гніву.'
  rubric:
    - criteria: 'Аргументація та аналіз'
      description: 'Студент наводить переконливі аргументи, враховуючи історичний контекст системного гніту та реакції на нього.'
      points: 5
    - criteria: 'Використання термінології'
      description: 'Доречно використовуються терміни (колоніальний гніт, право на опір, гібридна загроза).'
      points: 3
    - criteria: 'Структура та обсяг'
      description: 'Есе має логічну структуру та відповідає вимозі мінімального обсягу.'
      points: 2