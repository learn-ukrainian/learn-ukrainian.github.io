- type: reading
  id: "reading-karpini"
  title: "Первинне джерело: Звіт Плано Карпіні"
  source: "Джованні да Плано Карпіні. Історія Монгалів (1246 рік)"
  text: "Коли ми їхали через їхню землю, ми знаходили незліченні голови і кістки мертвих людей, що лежали на полі; бо місто це було дуже великим і дуже багатолюдним, а тепер воно зведено майже нанівець: ледве існує там двісті будинків, а людей тих вони тримають у найтяжчому рабстві."
  instruction: "Прочитайте уривок зі звіту папського легата про наслідки руйнування Києва."
  tasks:
    - "Які візуальні та статистичні докази тотального знищення міста наводить автор?"

- type: critical-analysis
  source_reading: "reading-karpini"
  title: "Аналіз звіту Плано Карпіні"
  instruction: "Проаналізуйте свідчення італійського дипломата та дайте відповіді на запитання."
  questions:
    - "Які факти з тексту свідчать про те, що монгольська навала мала винищувальний характер, а не була просто зміною політичної влади?"
    - "Чому свідчення іноземного спостерігача вважаються критично важливими для реконструкції реальних масштабів катастрофи?"
  focus_points:
    - "Демографічний колапс: зменшення міста до двохсот будинків."
    - "Відсутність у тексті Карпіні релігійної героїзації, характерної для літописів."

- type: true-false
  title: "Факти про монгольську навалу"
  instruction: "Визначте, чи є наведені твердження правдивими (True) чи хибними (False)."
  items:
    - statement: "До вторгнення Київська Русь була повністю ізольована від дипломатичних зв'язків із європейськими країнами."
      correct: false
      explanation: "Ні, київські князі активно укладали шлюби з королівськими дворами Франції, Скандинавії та Німеччини."
    - statement: "Під час битви на річці Калка у 1223 році руські князі не змогли об'єднатися під єдиним командуванням."
      correct: true
      explanation: "Так, політична роздробленість та відсутність єдності стали головною причиною катастрофічної поразки."
    - statement: "Монгольська армія відзначалася жорсткою дисципліною, де за втечу одного воїна страчували весь десяток."
      correct: true
      explanation: "Так, ця система кругової поруки унеможливлювала паніку та забезпечувала беззаперечне виконання наказів."
    - statement: "Після захоплення Києва хан Батий стратив тисяцького Дмитра за організацію відчайдушного опору."
      correct: false
      explanation: "Ні, хан помилував Дмитра виключно за його видатну військову мужність та героїзм."
    - statement: "Десятинна церква була повністю зруйнована ще до початку фінального штурму міста монгольськими військами."
      correct: false
      explanation: "Ні, вона стала останнім оплотом і завалилася під ударами таранів та вагою людей на склепіннях."
    - statement: "Для контролю над підкореними територіями монголи використовували баскаків, які збирали данину."
      correct: true
      explanation: "Так, економічний тиск та збір податків були головними інструментами ординського управління."
    - statement: "Щоб зберегти владу, руські князі мусили їхати до ставки хана з подарунками та отримувати спеціальний дозвіл — ярлик."
      correct: true
      explanation: "Так, поїздки за ярликом часто супроводжувалися моральним приниженням правителів, як у випадку з Данилом Галицьким."
    - statement: "В українській мові збереглася величезна кількість монгольських слів, які замінили питомо українську лексику."
      correct: false
      explanation: "Ні, кількість тюркізмів в українській мові є мінімальною порівняно з мовою Московського князівства."
    - statement: "Монгольська навала сприяла об'єднанню всіх східнослов'янських земель у єдину і неподільну державу."
      correct: false
      explanation: "Ні, навала стала геополітичним розломом, після якого українські та московські землі пішли різними цивілізаційними шляхами."
    - statement: "Приєднання українських земель до Великого князівства Литовського відбувалося за принципом недоторканності місцевих традицій."
      correct: true
      explanation: "Так, формула 'Ми старовини не рушимо' забезпечила мирну та взаємовигідну інтеграцію."

- type: comparative-study
  source_reading: "reading-karpini"
  title: "Порівняльний аналіз: Два шляхи після розлому"
  instruction: "Порівняйте політичний розвиток українських та московських земель після монгольської навали."
  items_to_compare:
    - "Українські землі (Галицько-Волинська держава та Литовський період)"
    - "Північно-східні землі (Московське князівство)"
  criteria:
    - "Ставлення до абсолютної влади монарха (самодержавство проти вічевих традицій)"
    - "Ступінь інтеграції ординських адміністративних практик та деспотичної моделі управління"
    - "Спрямованість розвитку (європейський вектор проти азійського)"
  prompt: "Напишіть короткий порівняльний аналіз розвитку цих двох регіонів. Поясніть, чому міф про спільну історичну колиску є антиісторичним."

- type: essay-response
  source_reading: "reading-karpini"
  title: "Есе: Катастрофа як каталізатор цивілізаційного розлому"
  instruction: "Напишіть розгорнуту відповідь на запропоновану тему."
  prompt: "Проаналізуйте наслідки монгольської навали не просто як військової поразки, а як переломного моменту, що назавжди розділив долі України та Росії. Як окупація змінила політичну культуру Московії, і завдяки чому українським землям вдалося зберегти європейський напрямок розвитку? Використовуйте терміни: 'ординська деспотія', 'вічеві традиції', 'ярлик', 'станове представництво'."
  min_words: 150
  rubric:
    - criteria: "Аргументація та історичний контекст"
      description: "Есе чітко пояснює суть цивілізаційного розлому з наведенням конкретних історичних фактів та аргументів."
      points: 10
    - criteria: "Використання термінології"
      description: "Коректно та доречно застосовуються вказані в завданні історичні та політологічні поняття."
      points: 5