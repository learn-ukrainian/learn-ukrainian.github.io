- type: reading
  id: reading-spohady
  title: 'Первинне джерело: Спогади про Лисоню'
  source: Невідомий стрілець
  text: 'Перед моїми очима була кривава картина... Стрільці змагаються на три боки...
    Нема як і кому їх відси забрати. А найгірше те, що з того боку, з-за російських
    окопів, лунає наша ж мова. Ми стріляємо у своїх.

    '
  tasks:
  - Які емоції викликає цей спогад?
  - Чому автор називає цю ситуацію найгіршою?
- type: critical-analysis
  title: 'Аналіз: Трагедія братовбивства'
  source_reading: reading-spohady
  target_text: А найгірше те, що з того боку, з-за російських окопів, лунає наша ж
    мова. Ми стріляємо у своїх.
  questions:
  - Як цей уривок ілюструє концепцію бездержавності?
  - Чому війна стала екзистенційною катастрофою для українців?
  model_answers:
  - Уривок демонструє, що без власної держави українці були змушені воювати за чужі
    інтереси один проти одного.
  - Війна змусила розділений народ знищувати власну націю заради амбіцій двох різних
    імперій.
- type: reading
  id: reading-kultura
  title: Культурний феномен УСС
  text: 'Стрілецька творчість є унікальним явищем, оскільки вона функціонувала як
    своєрідний музичний літопис історичних подій. Пісні створювалися не в тилових
    кабінетах, а безпосередньо в окопах та на маршах. Ці твори стали голосом нової,
    міської, освіченої української генерації.

    '
  tasks:
  - Де саме створювалися стрілецькі пісні?
  - Чим стрілецька творчість відрізнялася від традиційного селянського фольклору?
- type: essay-response
  title: 'Есе: Культурна місія Легіону УСС'
  source_reading: reading-kultura
  prompt: Проаналізуйте роль Легіону Українських Січових Стрільців не лише як військової
    одиниці, але і як культурно-просвітницького феномену. Як їхня діяльність вплинула
    на формування нової української ідентичності?
  min_words: 150
  model_answer: Легіон УСС став унікальним явищем, поєднавши військову боротьбу з
    культурною місією. Вони не лише воювали, але й створювали читальні, видавали журнали
    та навчали грамоті. Стрілецькі пісні стали музичним літописом війни та символом
    національного пробудження. Ця діяльність допомогла сформувати нову, політично
    свідому українську генерацію, готову до державотворення.
  rubric:
  - criteria: Розуміння ролі УСС
    description: Есе розкриває просвітницьку та мистецьку діяльність легіону.
    points: 10
  - criteria: Аналіз впливу
    description: Пояснення того, як ця діяльність формувала національну свідомість.
    points: 10
- type: true-false
  title: 'Перевірте факти: Перша світова війна'
  items:
  - statement: Перша світова війна почалася у 1914 році.
    correct: true
    explanation: Війна розпочалася 1 серпня 1914 року.
  - statement: Більшість українців воювала у складі австро-угорської армії.
    correct: false
    explanation: Близько 4 мільйонів українців воювали в російській армії, що значно
      більше.
  - statement: Легіон Українських Січових Стрільців був створений з ініціативи російського
      уряду.
    correct: false
    explanation: Легіон був створений у Галичині під егідою Австро-Угорської імперії.
  - statement: Річка Збруч слугувала кордоном між Російською та Австро-Угорською імперіями.
    correct: true
    explanation: Ця річка розрізала українські етнічні землі навпіл.
  - statement: Битва на горі Маківка завершилася розгромом Українських Січових Стрільців.
    correct: false
    explanation: Битва на Маківці стала символом героїчної оборони та військової доблесті
      УСС.
  - statement: Російська окупаційна влада в Галичині активно підтримувала українські
      школи.
    correct: false
    explanation: Окупаційна влада закривала українські школи та переслідувала український
      рух.
  - statement: Пісня "Ой у лузі червона калина" стала неофіційним гімном Січових Стрільців.
    correct: true
    explanation: Ця пісня набула надзвичайної популярності серед легіонерів.
  - statement: Крах Російської та Австро-Угорської імперій відкрив шлях до створення
      української держави.
    correct: true
    explanation: Цей політичний вакуум став вікном можливостей для державотворення.
  - statement: Під час війни українці ніколи не браталися з ворогуючою стороною.
    correct: false
    explanation: Є численні свідчення про випадки братання українців з обох боків
      фронту.
  - statement: Легіон УСС складався переважно з неписьменних селян.
    correct: false
    explanation: 'Основою легіону була освічена молодь: студенти, гімназисти, вчителі.'
  instruction: Визначте, чи твердження правильне.
- type: comparative-study
  title: 'Порівняння: Українці в двох імперіях'
  source_reading: reading-spohady
  items_to_compare:
  - Становище українців у російській армії
  - Становище українців в австро-угорській армії
  criteria:
  - Мотивація та добровільність
  - Можливості для національної самоорганізації
  - Ступінь репресій з боку командування
  prompt: Порівняйте умови перебування українських військових у лавах Російської та
    Австро-Угорської імперій під час Першої світової війни.
  model_answer: У російській армії українці складали величезну масу призовників, часто
    використовуючись як гарматне м'ясо без права на національну ідентичність. В австро-угорській
    армії, незважаючи на загальну мобілізацію, українці змогли створити добровольчий
    Легіон УСС, який став осередком національного відродження.
