- type: reading
  id: reading-ultimatum
  title: "Первинне джерело: Ультиматум Раднаркому"
  source: "Маніфест до українського народу (грудень 1917)"
  text: |
    Ми, Рада Народних Комісарів, визнаємо Народну Українську Республіку...
    Все, що стосується національних прав і національної незалежності українського
    народу, визнається нами... без обмежень і безумовно. Але ми вимагаємо:
    зупинити війська, що їдуть на Дон, та не роззброювати радянські полки в Україні.
  instruction: "Прочитайте уривок історичного документа."
  tasks:
    - "Проаналізуйте структуру та риторику цього маніфесту."
    - "Визначте справжні наміри петроградського керівництва."

- type: critical-analysis
  source_reading: reading-ultimatum
  title: "Критичний аналіз ультиматуму"
  instruction: "Проаналізуйте текст ультиматуму та дайте відповіді на запитання."
  questions:
    - "Як у тексті поєднується визнання незалежності з висунутими вимогами?"
    - "Чому українські публіцисти назвали цей документ безсоромним ультиматумом?"
    - "Як цей документ розкриває природу гібридної війни?"
  model_answers:
    - "Визнання незалежності було лише формальним маскуванням для жорстких вимог, що де-факто позбавляли УНР суверенітету."
    - "Тому що документ одночасно декларував право на самовизначення і відкрито погрожував застосуванням збройної сили."
    - "Він демонструє використання дипломатичних заяв для прикриття військової агресії та втручання у внутрішні справи."
  focus_points:
    - "Лицемірство дипломатичної мови імперії."
    - "Несумісність суверенітету і зовнішнього диктату."

- type: true-false
  title: "Правда чи вигадка: природа конфлікту"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "Більшовицький уряд у Петрограді поважав право України на національну незалежність без жодних додаткових умов."
      correct: false
      explanation: "Петроград визнавав УНР лише формально, висуваючи ультимативні вимоги повної покори."
    - statement: "Створення радянського уряду в Харкові було класичним прикладом використання маріонеткового уряду."
      correct: true
      explanation: "Цей уряд служив політичною ширмою для виправдання збройного вторгнення російських військ."
    - statement: "Бій під Крутами був стратегічною перемогою, яка повністю зупинила наступ ворога на Київ."
      correct: false
      explanation: "Це була героїчна тактична затримка на кілька днів, яка мала колосальне символічне значення."
    - statement: "Добровольча армія Денікіна підтримувала незалежність України і виступала надійним союзником УНР."
      correct: false
      explanation: "Білогвардійці прагнули відновити єдину імперію і були такими ж жорстокими окупантами для українців."
    - statement: "Брестський мирний договір став першим міжнародно-правовим актом, який офіційно визнавав УНР."
      correct: true
      explanation: "Цей договір легітимізував УНР на міжнародній арені та допоміг звільнити територію від агресора."
    - statement: "Перший Зимовий похід армії УНР тривав п'ять місяців глибокими тилами більшовиків та денікінців."
      correct: true
      explanation: "Це була безпрецедентна військова операція для збереження бойового ядра українського війська."
    - statement: "Варшавський договір з Польщею гарантував збереження всіх західноукраїнських земель у складі УНР."
      correct: false
      explanation: "Ціною союзу з Польщею стала вимушена і болісна відмова УНР від претензій на Галичину та Західну Волинь."
    - statement: "Ризький мирний договір 1921 року був підписаний за участю повноправної та визнаної делегації УНР."
      correct: false
      explanation: "Делегацію УНР цинічно не допустили до переговорів, а українську територію поділили між Польщею та Росією."
    - statement: "Економічним підґрунтям агресії більшовиків стала критична потреба в українському зерні та донецькому вугіллі."
      correct: true
      explanation: "Без доступу до ресурсів України економіка Радянської Росії перебувала на межі абсолютного колапсу."
    - statement: "Називати цей конфлікт громадянською війною означає продовжувати транслювати радянські колоніальні міфи."
      correct: true
      explanation: "Насправді це була неспровокована зовнішня збройна агресія проти суверенної сусідньої держави."

- type: comparative-study
  title: "Порівняльний аналіз окупаційних режимів"
  instruction: "Порівняйте політику більшовиків та білогвардійців щодо України."
  items_to_compare:
    - "Більшовицький режим (Радянська Росія)"
    - "Білогвардійський режим (Добровольча армія Денікіна)"
  criteria:
    - "Ставлення до ідеї української державної незалежності"
    - "Культурна політика та ставлення до української мови"
    - "Економічна політика (ставлення до приватної власності та селянства)"
  prompt: "Проаналізуйте, чому українське населення чинило запеклий збройний опір обом політичним силам, і чим їхні методи окупації були схожими."
  model_answer: "Обидва режими категорично заперечували право України на суверенітет. Більшовики робили це під гаслами класової боротьби, запроваджуючи жорстку продрозкладку. Білогвардійці відкрито прагнули відновити імперію і повертали землі колишнім поміщикам. Обидві сили агресивно знищували українську культуру і проводили масовий терор проти цивільного населення, тому закономірно сприймалися українцями виключно як окупанти."

- type: reading
  id: reading-winter-march
  title: "Первинне джерело: Листівка часів Зимового походу"
  source: "Відозва Армії УНР до селян (1920 рік)"
  text: |
    Брати-селяни! Ваша армія не загинула. Ми тут, щоб боронити вашу землю і вашу волю. 
    Женіть московських комісарів, не вірте їхнім брехливим декретам! 
    Допомагайте своїй армії, створюйте озброєні загони самооборони.
  instruction: "Ознайомтеся з текстом агітаційної листівки."
  tasks:
    - "Визначте головну практичну мету цього звернення до населення."
    - "Проаналізуйте емоційний та психологічний вплив тексту."

- type: essay-response
  source_reading: reading-winter-march
  title: "Значення Першого Зимового походу"
  instruction: "Напишіть аналітичне есе, базуючись на прочитаній листівці та матеріалі уроку."
  prompt: "Чому Перший Зимовий похід називають безпрецедентною демонстрацією сили духу, і яке стратегічне значення мала підтримка місцевих повстанців для успіху цієї військової операції?"
  min_words: 150
  model_answer: "Зимовий похід став унікальною військовою операцією, під час якої регулярна армія, опинившись у стратегічній безвиході, перейшла до мобільної партизанської тактики. Це наочно довело всьому світу та власному народу, що УНР не здалася і продовжує збройну боротьбу. Листівки, подібні до наведеної, мали колосальний психологічний вплив, піднімаючи моральний дух українців. Масова підтримка селянства забезпечила армію критично важливими харчами, безпечними маршрутами та розвідувальними даними, що дозволило зберегти бойове ядро війська."
  rubric:
    - criteria: "Аргументація та аналіз"
      description: "Чітко і глибоко пояснено психологічне та стратегічне значення Зимового походу."
      points: 40
    - criteria: "Робота з первинним джерелом"
      description: "Вдало використано посилання на зміст і тональність відозви до селян."
      points: 30
    - criteria: "Історичний контекст"
      description: "Повноцінно розкрито механізм взаємодії регулярної армії з місцевими повстанцями."
      points: 30