- type: reading
  id: reading-ruska-pravda
  title: 'Первинне джерело: Руська Правда'
  source: 'Правда Ярослава (XI століття)'
  text: |
    Якщо уб’є людина людину, то мстити брату за брата... а якщо не буде кому мстити, то покласти за голову 40 гривень.

- type: critical-analysis
  title: 'Аналіз правових норм Руської Правди'
  source_reading: reading-ruska-pravda
  instruction: 'Проаналізуйте наведений уривок з першого правового кодексу Київської держави.'
  questions:
    - 'Яку соціальну мету переслідувало обмеження кола осіб, що мали право на кровну помсту?'
    - 'Як заміна кровної помсти на величезний грошовий штраф стимулювала зменшення насильства в суспільстві?'
  focus_points:
    - 'Еволюція від звичаєвого до державного права'
    - 'Економічна мотивація в кримінальному праві'

- type: true-false
  title: 'Правда чи вигадка: Золота доба'
  instruction: 'Визначте, чи є ці твердження про правління Ярослава Мудрого правильними.'
  items:
    - statement: 'Термін Золота доба використовувався сучасниками Ярослава для опису його правління.'
      correct: false
      explanation: 'Цей термін є пізнішою метафорою істориків, як і сам епітет Мудрий.'
    - statement: 'Площа міста за часів Ярослава зросла майже у сім разів порівняно з містом Володимира.'
      correct: true
      explanation: 'Відбувся справжній урбаністичний вибух, і площа досягла понад сімдесяти гектарів.'
    - statement: 'Золоті ворота в Києві були виключно оборонною спорудою без ідеологічного значення.'
      correct: false
      explanation: 'Вони слугували парадним в’їздом і потужним ідеологічним маніфестом сили.'
    - statement: 'Графіті на стінах Софії Київської писалися мертвою церковнослов’янською мовою.'
      correct: false
      explanation: 'Вони написані живою розмовною мовою киян з виразними староукраїнськими рисами.'
    - statement: 'Віра у Руській Правді — це великий грошовий штраф за вбивство людини.'
      correct: true
      explanation: 'Цей штраф став гуманною альтернативою архаїчній кровній помсті.'
    - statement: 'Мозаїка Богоматері Оранти у Софії отримала назву Нерушима стіна.'
      correct: true
      explanation: 'Кияни вірили, що поки стоїть Оранта, стоятиме і їхнє місто.'
    - statement: 'Анна Ярославна, ставши королевою Франції, була однією з небагатьох письменних при дворі.'
      correct: true
      explanation: 'Її кириличний підпис контрастував із хрестиками неписьменних французьких баронів.'
    - statement: 'У державній бібліотеці при Софії Київській перекладали книги переважно з латинської мови.'
      correct: false
      explanation: 'Переклади здійснювалися насамперед з грецької мови, мови Візантії.'
    - statement: 'Ярослав Мудрий самостійно призначив митрополитом Іларіона, незалежно від Візантії.'
      correct: true
      explanation: 'Це був сміливий крок до церковної самостійності Київської держави.'
    - statement: 'Заповіт Ярослава запровадив вертикальну систему успадкування влади від батька до сина.'
      correct: false
      explanation: 'Він запровадив сеньйорат — горизонтальну систему від старшого брата до молодшого.'

- type: comparative-study
  title: 'Порівняльний аналіз правових систем'
  instruction: 'Порівняйте принципи давньокиївського права з московським.'
  items_to_compare:
    - 'Руська Правда (Київська держава)'
    - 'Судебники (Московська держава)'
  criteria:
    - 'Мета правосуддя'
    - 'Наявність тілесних покарань та тортур'
    - 'Гуманістичний вимір і захист особистості'
  prompt: 'На основі тексту модуля порівняйте правову філософію Києва та Москви. Як ці відмінності відображають цивілізаційний розрив між двома суспільствами?'

- type: essay-response
  title: 'Династична дипломатія: Тесть Європи'
  instruction: 'Напишіть розгорнуте есе-роздум на запропоновану тему.'
  prompt: 'Чому Ярослава Мудрого історики називають тестем Європи? Проаналізуйте його дипломатичну стратегію династичних шлюбів. Як ця політика вплинула на міжнародний авторитет Київської держави та її інтеграцію в європейський простір?'
  min_words: 250
  rubric:
    - criteria: 'Аналіз дипломатичної стратегії'
      description: 'Розкрито мету та механізми шлюбної дипломатії князя.'
      points: 40
    - criteria: 'Історичні приклади'
      description: 'Наведено конкретні приклади шлюбів дітей Ярослава з європейськими монархами.'
      points: 30
    - criteria: 'Висновки щодо європейської інтеграції'
      description: 'Оцінено вплив цієї політики на статус Києва як європейського мегаполіса.'
      points: 30