- type: reading
  id: reading-povchannia
  title: 'Первинне джерело: Повчання дітям'
  source: 'Володимир Мономах'
  text: |
    Не вбивайте ні правого, ні винного. Не покладайтеся на воєвод, а самі пильнуйте за всім. Лінощі ж — усьому лихому мати: що людина вміє — те забуде, а чого ж не вміє — того не вчиться. На війну вийшовши, не лінуйтеся.

- type: essay-response
  title: 'Унікальність Повчання Мономаха'
  source_reading: 'reading-povchannia'
  instruction: 'Напишіть аналітичне есе на основі прочитаного джерела.'
  prompt: 'Проаналізуйте уривок з Повчання дітям. Чому цей текст вважається унікальним для середньовічної Європи і як у ньому розкривається концепція відповідального лідерства та гуманізму правителя?'
  min_words: 150
  model_answer: 'У Повчанні дітям Володимир Мономах поєднує християнський гуманізм та політичну відповідальність. На відміну від типових середньовічних текстів, це автобіографічна розповідь. Князь закликає не вбивати ні правого, ні винного, що демонструє революційний рівень милосердя. Крім того, він наполягає на особистій відповідальності лідера, закликаючи не покладатися на підлеглих, а також підносить працелюбність як найвищу чесноту.'
  rubric:
    - criteria: 'Аналіз джерела'
      description: 'Глибокий аналіз концепції лідерства в тексті.'
      points: 40
    - criteria: 'Контекстуалізація'
      description: 'Порівняння з іншими середньовічними традиціями.'
      points: 30
    - criteria: 'Аргументація та мова'
      description: 'Логічна структура та публіцистичний стиль.'
      points: 30

- type: critical-analysis
  title: 'Аналіз філософії лідерства'
  source_reading: 'reading-povchannia'
  questions:
    - 'Яким чином Мономах визначає роль працелюбності у житті політика?'
    - 'Як князь аргументує свою позицію щодо скасування смертної кари?'
    - 'Чому настанова не покладатися на воєвод була критично важливою для збереження єдності держави?'
  model_answers:
    - 'Працелюбність розглядається як запорука збереження навичок і єдиний шлях до духовного та політичного успіху.'
    - 'Мономах спирається на християнський гуманізм, стверджуючи, що лише Бог має право відбирати людське життя.'
    - 'У часи династичної кризи делегування влади часто призводило до зрад або сепаратизму, тому особистий контроль гарантував стабільність.'

- type: comparative-study
  title: 'Любецький з''їзд vs Віче'
  instruction: 'Порівняйте дві форми політичного волевиявлення в Київській Русі.'
  items_to_compare:
    - 'Любецький з''їзд князів 1097 року'
    - 'Київське віче 1113 року'
  criteria:
    - 'Склад учасників'
    - 'Ступінь легітимності та вплив на державу'
    - 'Спосіб прийняття рішень'
  prompt: 'Проаналізуйте, як кожна з цих інституцій впливала на долю держави, та визначте їхні ключові відмінності.'
  model_answer: 'Любецький з''їзд був елітарним зібранням Рюриковичів, яке юридично закріпило принцип вотчини та конфедеративний устрій. Віче ж являло собою народні збори, які в моменти кризи (як у 1113 році) брали владу у свої руки, здійснюючи демократичний тиск знизу. З''їзд вирішував геополітичні питання, тоді як віче реагувало на соціально-економічні проблеми.'

- type: true-false
  title: 'Міфи та факти про Володимира Мономаха'
  instruction: 'Визначте, які твердження є правдивими, а які — хибними.'
  items:
    - statement: 'Знаменита шапка Мономаха була передана йому в спадок візантійським імператором.'
      correct: false
      explanation: 'Цей головний убір є золотоординською тюбетейкою XIV століття і не має стосунку до князя.'
    - statement: 'Любецький з''їзд 1097 року ліквідував ліствичне право і запровадив принцип спадкової вотчини.'
      correct: true
      explanation: 'Князі ухвалили рішення Кождо да держить отчину свою, щоб зупинити усобиці.'
    - statement: 'Під час повстання 1113 року в Києві головною вимогою містян було негайне скасування рабства.'
      correct: false
      explanation: 'Бунт був спрямований проти лихварів та спекулянтів сіллю, а не проти інституту рабства як такого.'
    - statement: 'Військова стратегія Мономаха полягала виключно у пасивній обороні київських мурів.'
      correct: false
      explanation: 'Він запровадив тактику глибоких превентивних ударів на території ворога.'
    - statement: 'У своєму Повчанні дітям Мономах закликав відмовитися від застосування смертної кари.'
      correct: true
      explanation: 'Князь керувався принципами християнського гуманізму, наказуючи не вбивати ні правого, ні винного.'
    - statement: 'Завдяки реформам Мономаха максимальний річний відсоток за позику було збільшено до двохсот відсотків.'
      correct: false
      explanation: 'Навпаки, Устав обмежив річний відсоток до п''ятдесяти відсотків, щоб захистити боржників.'
    - statement: 'Під час хрестового походу у степ у 1111 році руські полки здобули перемогу на річці Сальниця.'
      correct: true
      explanation: 'Ця битва стала вирішальним зіткненням, яке на багато років усунуло половецьку загрозу.'
    - statement: 'Князь Володимир Мономах став ініціатором засліплення Василька Теребовлянського.'
      correct: false
      explanation: 'Осліплення ініціювали Святополк та Давид Ігорович; Мономах навпаки виступив проти цього злочину.'
    - statement: 'Після смерті Мономаха його син Юрій Долгорукий намагався зміцнити централізовану владу Києва.'
      correct: false
      explanation: 'Юрій Долгорукий провадив сепаратистську політику та сприяв посиленню внутрішніх усобиць.'
    - statement: 'Гривня в епоху Мономаха являла собою масивний срібний зливок стандартної ваги.'
      correct: true
      explanation: 'Гривня витіснила з обігу куни та стала головним засобом накопичення багатства.'