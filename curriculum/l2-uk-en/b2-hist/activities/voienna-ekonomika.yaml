- type: reading
  id: reading-entrepreneurs
  title: 'Історії українських підприємців на війні'
  source: 'Медіа-матеріали'
  text: |
    Коли великі логістичні центри були зруйновані, дрібні перевізники організували нові маршрути. 
    Коли державі бракувало певних товарів для армії, підприємці швидко перепрофілювали свої цехи. 
    Восени дві тисячі двадцять другого року малий і середній бізнес власними силами та коштами створив паралельну, децентралізовану енергосистему. 
    Магазини та кав'ярні, що працювали попри все, отримали неформальний статус «пунктів незламності».
  tasks:
    - 'Як малий бізнес відреагував на руйнування логістичних центрів?'
    - 'Що зробили підприємці під час енергетичного терору восени 2022 року?'
    - 'Чому кав''ярні та магазини отримали статус «пунктів незламності»?'
    - 'Яка роль підприємств у забезпеченні армії необхідними товарами?'

- type: critical-analysis
  title: 'Аналіз: Адаптивність малого бізнесу'
  source_reading: reading-entrepreneurs
  instruction: 'Проаналізуйте роль малого та середнього бізнесу у воєнній економіці.'
  target_text: 'Восени дві тисячі двадцять другого року малий і середній бізнес власними силами та коштами створив паралельну, децентралізовану енергосистему.'
  questions:
    - 'Яким чином децентралізація енергосистеми стала перевагою для української економіки?'
    - 'Як створення «пунктів незламності» малим бізнесом вплинуло на моральний стан суспільства?'
  model_answers:
    - 'Децентралізація дозволила уникнути тотального блекауту, оскільки тисячі незалежних генераторів неможливо знищити ракетними ударами одночасно. Це забезпечило безперебійну роботу базових сервісів.'
    - 'Працюючі кав''ярні та магазини продемонстрували, що нормальне життя триває попри намагання агресора його зупинити. Вони стали центрами соціальної згуртованості та взаємодопомоги.'

- type: true-false
  title: 'Економічні реалії воєнного часу'
  instruction: 'Визначте, чи є твердження правдивим чи хибним.'
  items:
    - statement: 'Падіння ВВП у дві тисячі двадцять другому році склало близько п''ятдесяти відсотків, як і прогнозували західні аналітики.'
      correct: false
      explanation: 'Падіння вдалося втримати на рівні менше тридцяти відсотків.'
    - statement: 'Національний банк України заборонив виведення капіталу за кордон у перші дні повномасштабного вторгнення.'
      correct: true
      explanation: 'Це допомогло зупинити паніку та зберегти резерви.'
    - statement: 'Українська модель воєнної економіки повністю копіювала радянський досвід Другої світової війни з жорстким державним плануванням.'
      correct: false
      explanation: 'Українська модель була гібридною і поєднувала державне регулювання з ринковою свободою.'
    - statement: 'Втрата маріупольських комбінатів призвела до різкого падіння валютної виручки від експорту металів.'
      correct: true
      explanation: 'Держава втратила від тридцяти до сорока відсотків валютної виручки від цієї галузі.'
    - statement: 'Російські ракетні удари по енергетичній інфраструктурі розпочалися у жовтні дві тисячі двадцять другого року.'
      correct: true
      explanation: 'Ворог прагнув занурити країну в темряву та заморозити населення.'
    - statement: 'Блокада морських портів не мала суттєвого впливу на експорт аграрної продукції.'
      correct: false
      explanation: 'Блокада зупинила більшість експорту, змусивши шукати складні сухопутні шляхи.'
    - statement: 'Державна програма релокації допомогла перемістити понад вісімсот підприємств у безпечні регіони.'
      correct: true
      explanation: 'Більшість бізнесів переїхали на Львівщину, Закарпаття та Тернопільщину.'
    - statement: 'Волонтерські фонди фінансували виключно закупівлю медикаментів та їжі для військових.'
      correct: false
      explanation: 'Фонди купували навіть дрони, високотехнологічну зброю та супутники.'
    - statement: 'Міжнародна фінансова допомога використовувалася переважно для закупівлі зброї.'
      correct: false
      explanation: 'Міжнародні кошти йшли на цивільні потреби, а податки українців — на армію.'
    - statement: 'У серпні дві тисячі двадцять третього року Україна самостійно відкрила новий морський тимчасовий коридор.'
      correct: true
      explanation: 'Це стало можливим після відтіснення російського флоту.'

- type: reading
  id: reading-volunteers
  title: 'Феномен волонтерської економіки'
  source: 'Воєнна економіка України'
  text: |
    Кожен громадянин, незалежно від рівня доходів, відчув свою особисту відповідальність за забезпечення захисників на передовій.
    Ця система функціонувала як ефективна тіньова економіка у найбільш позитивному значенні цього терміна.
    Децентралізована мережа взаємодопомоги стала своєрідним суспільним договором нової доби: народ фінансує армію напряму.
  tasks:
    - 'Що таке волонтерська економіка у контексті цього уривку?'
    - 'Чому автор називає збір коштів тіньовою економікою у позитивному значенні?'
    - 'Який новий суспільний договір сформувався завдяки донатам?'

- type: essay-response
  title: 'Есе: Роль волонтерського руху в економіці'
  source_reading: reading-volunteers
  instruction: 'Напишіть коротке есе на основі прочитаного матеріалу та знань з модуля.'
  prompt: 'Як волонтерський рух та культура масових донатів допомогли українській економіці вистояти під час повномасштабної війни? Розгляньте вплив волонтерських фондів на забезпечення армії та значення «малих донатів».'
  min_words: 150
  model_answer: 'Волонтерський рух став невід''ємною частиною воєнної економіки України, перетворившись на потужний фінансовий інструмент прямої підтримки армії. В умовах, коли державна бюрократія не могла миттєво реагувати на всі потреби фронту, суспільство взяло ініціативу у свої руки. Культура малих донатів, коли мільйони українців щодня переказували невеликі суми, дозволила акумулювати колосальні бюджети. Це своєрідна форма добровільного оподаткування, яка відображає новий суспільний договір: громадяни фінансують захисників напряму. Крім того, великі волонтерські фонди діяли з інституційною ефективністю міжнародних корпорацій, закуповуючи високотехнологічне обладнання без бюрократичних затримок. Волонтерська економіка зняла частину фінансового тягаря з державного бюджету і стала ключовим фактором стійкості держави.'
  rubric:
    - criteria: 'Аргументація'
      description: 'Есе містить чіткі аргументи щодо ролі донатів та фондів у підтримці економіки.'
      points: 10
    - criteria: 'Використання лексики'
      description: 'У тексті доречно використано економічну та воєнну термінологію модуля.'
      points: 10
    - criteria: 'Структура тексту'
      description: 'Логічна побудова тексту з вступом, основною частиною та висновком.'
      points: 5