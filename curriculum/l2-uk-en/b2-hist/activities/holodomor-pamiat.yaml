- type: reading
  id: reading-jones
  title: 'Первинне джерело: Свідчення Гарета Джонса'
  source: 'Гарет Джонс, 1933 рік'
  text: |
    Я пройшов через села і дванадцять колгоспів. Скрізь я чув стогін: У нас немає хліба, ми помираємо! Я бачив, як люди на станціях билися за шкірку від апельсина, яку я викинув. Селяни казали мені: Раніше ми годували світ, а тепер самі не маємо що їсти.

- type: critical-analysis
  source_reading: reading-jones
  title: 'Критичний аналіз: Журналістика та свідчення'
  instruction: 'Проаналізуйте уривок зі щоденників Гарета Джонса.'
  questions:
    - 'Які саме деталі в тексті вказують на масштаби голоду?'
    - 'Чому ці свідчення є важливими для доведення штучності Голодомору?'
    - 'Як фраза селян про те, що вони раніше годували світ, підкреслює трагізм ситуації?'
  focus_points:
    - 'Аналіз первинних джерел'
    - 'Психологічний стан жертв Голодомору'

- type: true-false
  title: 'Факти та міфи про Голодомор'
  instruction: 'Визначте, чи є наведені твердження правдивими.'
  items:
    - statement: 'Радянська влада відкрито визнавала наявність масового голоду в Україні у 1933 році.'
      correct: false
      explanation: 'Існувала змова мовчання, і слово голод було абсолютним табу.'
    - statement: 'Лікарям заборонялося вказувати голод як причину смерті в медичних документах.'
      correct: true
      explanation: 'Діагнози фальсифікувалися: лікарі писали виснаження або старість.'
    - statement: 'Усі західні журналісти в Москві писали правду про масове вимирання людей.'
      correct: false
      explanation: 'Волтер Дюранті та інші публікували брехливі статті на користь радянської пропаганди.'
    - statement: 'Рафаель Лемкін розробляв концепцію геноциду, частково спираючись на український досвід.'
      correct: true
      explanation: 'Він виділив чотири складові знищення української нації тоталітарним режимом.'
    - statement: 'США офіційно визнали СРСР у 1933 році, попри дипломатичні звіти про вимирання мільйонів людей.'
      correct: true
      explanation: 'Економічні та геополітичні інтереси переважали над моральними принципами (realpolitik).'
    - statement: 'Уряд СРСР організовував показові екскурсії для іноземних делегацій, створюючи потьомкінські села.'
      correct: true
      explanation: 'Візит Едуарда Ерріо є класичним прикладом такої цинічної політики дезінформації.'
    - statement: 'Комісія Конгресу США під керівництвом Джеймса Мейса дійшла висновку, що голод був наслідком неврожаю.'
      correct: false
      explanation: 'Комісія офіційно визнала ці події актом геноциду проти українського народу.'
    - statement: 'Термін постгеноцидне суспільство пояснює психологічні та соціальні наслідки репресій для наступних поколінь українців.'
      correct: true
      explanation: 'Цю концепцію запровадив історик Джеймс Мейс для аналізу травми нації.'
    - statement: 'Сучасна Російська Федерація визнає Голодомор геноцидом українського народу на державному рівні.'
      correct: false
      explanation: 'Росія активно заперечує цей злочин і знищує пам''ятники жертвам на окупованих територіях.'
    - statement: 'Конвенція ООН визначає геноцидом умисне створення умов, розрахованих на фізичне знищення групи.'
      correct: true
      explanation: 'Цей юридичний критерій повністю відповідає репресивній політиці СРСР щодо українського селянства.'

- type: comparative-study
  title: 'Порівняльний аналіз: Інформаційна війна'
  instruction: 'Порівняйте позиції двох ключових фігур в інформаційному просторі 1930-х років.'
  items_to_compare:
    - 'Гарет Джонс'
    - 'Волтер Дюранті'
  criteria:
    - 'Методи збору інформації та перебування в СРСР'
    - 'Ставлення до офіційної радянської пропаганди'
    - 'Мотивація (професійний обов''язок проти кар''єризму)'
  prompt: 'Напишіть короткий текст, порівнюючи підходи Гарета Джонса та Волтера Дюранті до висвітлення подій в Україні у 1933 році.'

- type: essay-response
  title: 'Есе: Відновлення історичної справедливості'
  instruction: 'Напишіть розгорнуту відповідь на запитання.'
  prompt: 'Чому міжнародне визнання Голодомору геноцидом є критично важливим для України сьогодні? У своїй відповіді спирайтеся на концепцію постгеноцидного суспільства та зв''язок між непокараним злом минулого і сучасною російською агресією.'
  min_words: 200
  rubric:
    - criteria: 'Змістове наповнення'
      description: 'Глибоке розкриття теми, правильне використання історичних термінів (змова мовчання, політика заперечення).'
      points: 10
    - criteria: 'Аргументація'
      description: 'Логічне обґрунтування того, як непокаране зло сприяє повторенню злочинів у сучасному світі.'
      points: 10