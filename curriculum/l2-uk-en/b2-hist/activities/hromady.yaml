- type: reading
  id: reading-osnova
  title: 'Джерело: Стаття Миколи Костомарова'
  source: Журнал 'Основа' (1861)
  text: 'Кожен народ має природне і невід''ємне право розвивати свою культуру тією
    мовою, яку він успадкував від предків. Позбавляти його цього права — означає вчиняти
    духовне вбивство, зупиняти прогрес цивілізації...

    '
  tasks:
  - Яке право Костомаров називає природним і невід'ємним?
  - Як автор характеризує заборону розвивати культуру рідною мовою?
- type: true-false
  title: Факти про громадівський рух
  items:
  - statement: Громади мали чіткий статут та ієрархічну структуру підпорядкування.
    correct: false
    explanation: Громади свідомо відмовилися від статутів та списків учасників для
      безпеки і діяли як горизонтальна мережа.
  - statement: Хлопоманами називали польських шляхтичів, які перейшли до українського
      табору.
    correct: true
    explanation: Студенти польського походження, такі як Володимир Антонович, відмовилися
      від привілеїв заради служіння українському народу.
  - statement: Валуєвський циркуляр був виданий після проведення перепису населення
      Києва.
    correct: false
    explanation: Валуєвський циркуляр виданий у 1863 році, а перепис населення Києва
      відбувся значно пізніше — у 1874 році.
  - statement: Журнал 'Основа' був першим двомовним українсько-російським часописом.
    correct: true
    explanation: Журнал виходив у Петербурзі у 1861-1862 роках і публікував матеріали
      обома мовами.
  - statement: Південно-Західний відділ діяв як нелегальна таємна організація.
    correct: false
    explanation: Він був офіційною філією Російського географічного товариства, хоча
      де-факто став легальним центром української науки.
  - statement: Головним гаслом громадівців на початку діяльності була фраза 'Освіта
      для народу рідною мовою'.
    correct: true
    explanation: Просвітництво вважалося головним інструментом порятунку нації від
      асиміляції.
  - statement: Після Емського указу Михайло Драгоманов продовжив свою діяльність у
      Женеві.
    correct: true
    explanation: Рятуючись від репресій, він емігрував до Швейцарії, де заснував вільну
      українську друкарню та журнал 'Громада'.
  - statement: Польські революціонери 1863 року повністю підтримували незалежність
      України.
    correct: false
    explanation: Вони прагнули відновити Польщу в кордонах 1772 року, що включали
      Правобережну Україну, і тому громадівці їх не підтримали.
  - statement: Гімн 'Ще не вмерла Україна' був написаний Павлом Чубинським у колі
      громадівців.
    correct: true
    explanation: Вірш з'явився восени 1862 року під час зустрічі з сербськими студентами.
  - statement: Братство тарасівців продовжило виключно культурницьку традицію старих
      громад.
    correct: false
    explanation: Братство тарасівців стало новою, радикальною політичною організацією,
      яка вперше чітко вимагала державної самостійності.
  instruction: Визначте, чи твердження правильне.
- type: critical-analysis
  title: 'Аналіз: Значення рідної мови'
  source_reading: reading-osnova
  target_text: Позбавляти його цього права — означає вчиняти духовне вбивство, зупиняти
    прогрес цивілізації...
  questions:
  - Чому Костомаров порівнює заборону мови з 'духовним вбивством'?
  - Як цей текст спростовує імперський міф про українську мову як простонародне 'наріччя'?
  model_answers:
  - Автор підкреслює, що мова є основою ідентичності та мислення народу; без неї нація
    втрачає свою історичну сутність і пам'ять.
  - Використання таких понять, як 'прогрес цивілізації', показує, що українська мова
    є не лише інструментом побуту, а здатна виконувати найвищі інтелектуальні функції.
- type: essay-response
  title: 'Есе: Культурна самооборона'
  source_reading: reading-osnova
  prompt: Спираючись на цитату Костомарова та матеріал модуля, проаналізуйте концепцію
    'культурної самооборони'. Як культурна та наукова діяльність громадівців стала
    актом політичного опору проти Російської імперії?
  min_words: 150
  model_answer: Громадівці усвідомили, що збройний опір в умовах абсолютної влади
    імперії приречений на поразку. Натомість вони обрали шлях 'культурної самооборони'.
    Створюючи недільні школи, видаючи книжки та досліджуючи фольклор, вони захищали
    українську ідентичність від асиміляції. Цитата Костомарова підкреслює, що розвиток
    мови є базовим правом народу. Таким чином, наукова праця перетворилася на політичний
    інструмент, який руйнував імперські міфи про 'єдиний російський народ' і готував
    підґрунтя для політичної боротьби наступних поколінь.
  rubric:
  - criteria: Розуміння концепції
    description: Чітко пояснено сутність 'культурної самооборони' в умовах бездержавності.
    points: 10
  - criteria: Аргументація
    description: Наведено конкретні приклади діяльності громад (школи, наука, Південно-Західний
      відділ, видавництво).
    points: 10
- type: comparative-study
  title: 'Порівняння: Культурництво та Політика'
  source_reading: reading-osnova
  items_to_compare:
  - '''Стара громада'' (1860-ті роки)'
  - Братство тарасівців (1890-ті роки)
  criteria:
  - Головна мета діяльності
  - Ставлення до політичної боротьби
  - Методи досягнення цілей
  prompt: Порівняйте діяльність 'Старої громади' та Братства тарасівців за визначеними
    критеріями. Зверніть увагу на трансформацію методів національного руху.
  model_answer: 'Стара громада фокусувалася на культурній самообороні: освіті, виданні
    книг та наукових дослідженнях. Їхня мета була зберегти ідентичність в умовах заборон,
    уникаючи відкритої політичної боротьби. Братство тарасівців, навпаки, було радикальною
    політичною організацією, яка відкрито вимагала державної самостійності. Якщо громадівці
    діяли через легальну та напівлегальну культуру і науку, то нове покоління, виховане
    після Емського указу, перейшло до прямих політичних декларацій та безкомпромісної
    боротьби за власну державу.'
