- type: reading
  id: "reading-diaspora"
  title: "Первинне джерело: Спогади емігрантів"
  source: "Іван Багряний, публіцистика (адаптовано)"
  text: |
    Я не хочу вертатись на ту родіну. Для нас, переміщених осіб, повернення означає смерть або концтабір. Ми обрали шлях вигнання, щоб зберегти своє життя і право бути українцями. Наша мета — зберегти правду про те, що сталося на нашій землі, для всього вільного світу.
  instruction: "Прочитайте фрагмент тексту про мотивацію емігрантів."

- type: critical-analysis
  title: "Аналіз тексту: Мотивація еміграції"
  source_reading: "reading-diaspora"
  instruction: "Проаналізуйте аргументацію Івана Багряного."
  questions:
    - "Які головні аргументи використовує автор для відмови від повернення?"
    - "Як автор визначає місію переміщених осіб у вільному світі?"
  model_answers:
    - "Автор наголошує на загрозі життю та ризику репресій."
    - "Місія полягає у збереженні правди та української ідентичності."
  focus_points:
    - "Політична еміграція"
    - "Загроза репресій"

- type: comparative-study
  title: "Порівняльний аналіз хвиль еміграції"
  instruction: "Напишіть короткий аналіз двох хвиль української еміграції."
  items_to_compare:
    - "Перша хвиля (трудова еміграція)"
    - "Друга і третя хвилі (політична еміграція)"
  criteria:
    - "Головна причина та мотивація для виїзду"
    - "Соціальний склад емігрантів"
    - "Цілі створення громадських організацій"
  prompt: "Проаналізуйте, як відмінності в мотивації вплинули на організацію життя за кордоном."
  model_answer: "Перша хвиля складалася переважно з селян, які шукали економічного порятунку і гуртувалися навколо церкви. Політична еміграція другої та третьої хвиль включала інтелігенцію та військових, які створювали урядові структури в екзилі, університети та ставили за мету збереження національної державності."

- type: essay-response
  title: "Есе: Ковчег держави"
  source_reading: "reading-diaspora"
  prompt: "Яку роль відіграла західна українська діаспора у збереженні національної ідентичності та підготовці до відновлення незалежності? Обґрунтуйте свою думку історичними фактами."
  instruction: "Напишіть розгорнуту відповідь, використовуючи матеріали модуля."
  min_words: 150
  rubric:
    - criteria: "Аргументація"
      description: "Чітко визначена роль діаспори та наведені конкретні історичні приклади."
      points: 10
    - criteria: "Стилістика"
      description: "Використання академічного стилю та доречної термінології."
      points: 5

- type: true-false
  title: "Факти про українську діаспору"
  instruction: "Визначте, чи є твердження правдивими."
  items:
    - statement: "Перша хвиля еміграції мала переважно економічний характер."
      correct: true
      explanation: "Люди залишали батьківщину через аграрне перенаселення та бідність."
    - statement: "Радянська пропаганда називала емігрантів хранителями національної пам'яті."
      correct: false
      explanation: "Пропаганда називала їх зрадниками та ворогами народу."
    - statement: "Табори переміщених осіб стали центрами культурної самоорганізації."
      correct: true
      explanation: "У таборах активно діяли школи, театри та літературні рухи."
    - statement: "Уряд УНР в екзилі припинив своє існування відразу після Другої світової війни."
      correct: false
      explanation: "Уряд існував до 1992 року, коли передав повноваження незалежній Україні."
    - statement: "Головною метою другої хвилі еміграції було збереження політичної легітимності."
      correct: true
      explanation: "Політична еліта прагнула зберегти ідею незалежності після поразки визвольних змагань."
    - statement: "Енциклопедія українознавства була створена та видана в Радянському Союзі."
      correct: false
      explanation: "Вона була видана в діаспорі для збереження об'єктивних знань без цензури."
    - statement: "Українська діаспора активно лобіювала визнання Голодомору геноцидом у США."
      correct: true
      explanation: "Завдяки тиску громади було створено Комісію Джеймса Мейса."
    - statement: "Всі переміщені особи після війни добровільно повернулися до Радянського Союзу."
      correct: false
      explanation: "Сотні тисяч людей відмовилися від репатріації через загрозу сталінських репресій."
    - statement: "Світовий Конгрес Вільних Українців був створений для глобальної консолідації громад."
      correct: true
      explanation: "Ця організація об'єднала українські сили у вільному світі для захисту інтересів нації."
    - statement: "Встановлення пам'ятника Шевченку у Вашингтоні підтримувалося радянськими дипломатами."
      correct: false
      explanation: "Радянські дипломати намагалися заблокувати проєкт, але програли."