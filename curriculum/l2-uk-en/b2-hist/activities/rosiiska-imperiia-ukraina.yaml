- type: reading
  id: reading-manifest-1775
  title: 'Первинне джерело: Маніфест 1775 року'
  text: 'Ми захотіли через це оголосити всім вірнопідданим нашої імперії, що Січ Запорозька
    в кінці вже зруйнована, зі знищенням на майбутній час і самої назви запорозьких
    козаків...

    '
  tasks:
  - Прочитайте уривок з Маніфесту Катерини II.
- type: critical-analysis
  source_reading: reading-manifest-1775
  title: Аналіз імперського документа
  questions:
  - Яка головна мета цього маніфесту, згідно з текстом?
  - Чому імперія прагнула знищити саму назву запорозьких козаків?
  - Як цей документ спростовує міф про мирне освоєння Півдня?
  focus_points:
  - Імперська риторика
  - Етноцид
  - Знищення автономії
- type: essay-response
  source_reading: reading-manifest-1775
  title: 'Есе: Анатомія імперського міфу'
  prompt: Спираючись на прочитаний текст та матеріали модуля, поясніть, чому міф про
    Новоросію є інструментом імперської пропаганди, а не історичним фактом. Наведіть
    конкретні докази української присутності на Півдні до приходу Російської імперії.
  rubric:
  - criteria: Історична аргументація
    description: Наявність конкретних фактів (зимівники, паланки, переписи)
    points: 10
  - criteria: Аналіз пропаганди
    description: Розуміння механізмів створення міфу (перейменування, ігнорування
      населення)
    points: 10
  - criteria: Структура та логіка
    description: Чітка послідовність думок, наявність вступу та висновків
    points: 5
- type: true-false
  title: 'Правда чи вигадка: Історія Півдня'
  items:
  - statement: Термін Дике поле використовувався імперією для виправдання захоплення
      земель.
    correct: true
    explanation: Це був ідеологічний конструкт, що змальовував степ як порожній простір.
  - statement: Запорозькі зимівники були лише тимчасовими схованками для кількох козаків.
    correct: false
    explanation: Зимівники були великими капітальними фермерськими господарствами.
  - statement: Термін Новоросія з'явився у 1764 році як інструмент стирання пам'яті
      про козацтво.
    correct: true
    explanation: Він мав переконати, що історія регіону починається лише з приходом
      імперії.
  - statement: Сучасна Одеса була заснована на абсолютно порожньому місці за указом
      Катерини II.
    correct: false
    explanation: Місто розвинулося на базі давнього поселення і порту Хаджибей.
  - statement: Під час перепису населення 1763 року понад 98% осілого населення Півдня
      становили українці.
    correct: true
    explanation: Це повністю спростовує міф про безлюдну порожнечу.
  - statement: Козацькі слободи створювалися виключно для військових тренувань.
    correct: false
    explanation: Слободи були вільними поселеннями, мешканці яких звільнялися від
      податків для розвитку економіки.
  - statement: Меноніти привезли на Південь передові європейські сільськогосподарські
      технології.
    correct: true
    explanation: Вони використовували залізні плуги та впровадили багатопільну систему
      землеробства.
  - statement: Російська імперія сприяла вільному розвитку української мови на Півдні
      у XIX столітті.
    correct: false
    explanation: Імперія проводила жорстку політику русифікації через Емський указ
      та Валуєвський циркуляр.
  - statement: Чорноземи Півдня перетворили регіон на головного експортера зерна до
      Європи.
    correct: true
    explanation: Український хліб став головним джерелом експортних надходжень для
      Російської імперії.
  - statement: Архітектурний стиль класицизм використовувався імперією для підкреслення
      своєї військової слабкості.
    correct: false
    explanation: Класицизм мав транслювати ідею могутності, порядку та європейської
      приналежності імперії.
  instruction: Визначте, чи твердження правильне.
- type: comparative-study
  title: 'Порівняльний аналіз: Дві моделі колонізації'
  items_to_compare:
  - Козацька (народна) колонізація Півдня
  - Імперська колонізація Півдня
  criteria:
  - Ставлення до місцевого населення та самоврядування
  - Економічна модель (вільна праця проти експлуатації)
  - Використання ресурсів (розвиток регіону проти вивезення сировини)
  prompt: Порівняйте козацьку та імперську моделі освоєння Південної України, спираючись
    на визначені критерії. Яка з них сприяла органічному розвитку регіону, а яка мала
    експлуатаційний характер?
