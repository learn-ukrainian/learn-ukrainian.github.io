- type: reading
  id: reading-spohady
  title: 'Первинне джерело: Спогади та листи'
  source: Усна історія та архівні матеріали
  text: 'Цей голодомор страшніший чуми, косив людей як траву... Іде не то людина,
    не то привид... А з неї ллються вода. Скляні напівбожевільні пусті очі, байдужі
    до всього. Демобілізувався, приїхав додому, але краще мене б убили на фронті,
    ніж мучитися вдома, де вмирають всі з голоду. Не бачу ніякої допомоги зі сторони
    держави.

    '
  tasks:
  - Якими словами очевидці описують фізичний стан людей під час голоду?
  - Що найбільше вразило фронтовика після повернення додому?
  - Чому фронтовик був розчарований діями держави?
- type: critical-analysis
  title: 'Критичний аналіз: Міф про героїчну відбудову'
  source_reading: reading-spohady
  questions:
  - Як спогади очевидців спростовують радянський міф про загальнонародний ентузіазм
    під час відбудови?
  - Чому владі було важливо приховувати справжній стан справ у селах та ігнорувати
    голод?
  model_answers:
  - Спогади показують, що замість ентузіазму люди відчували абсолютний відчай та боролися
    за фізичне виживання в умовах масової смертності.
  - Правда про відсутність державної допомоги руйнувала б ілюзію успішності соціалістичної
    системи та показувала жорстокість імперського центру.
- type: essay-response
  title: 'Есе: Експлуатація під виглядом відбудови'
  source_reading: reading-spohady
  prompt: 'Спираючись на прочитаний текст та матеріали модуля, напишіть есе на тему:
    Чому повоєнна відбудова в Україні стала не періодом відновлення добробуту, а етапом
    нової експлуатації? У своїй роботі проаналізуйте політику хлібозаготівель, голод
    1946-1947 років та умови праці.'
  min_words: 150
  model_answer: 'Повоєнна відбудова в Україні характеризувалася жорстким підпорядкуванням
    економіки інтересам імперського центру. Замість покращення умов життя людей держава
    зосередилася на розвитку важкої промисловості, ігноруючи житлові та соціальні
    потреби населення. Село стало безкоштовним донором: через драконівську політику
    вилучення зерна у 1946-1947 роках виник штучний голод. Праця на заводах та будовах
    часто була примусовою або мотивованою страхом покарань, що підтверджує колоніальний
    характер повоєнного відновлення.'
  rubric:
  - criteria: Історична аргументація
    description: Використання конкретних фактів про голод, експорт зерна та пріоритети
      індустріалізації.
    points: 10
  - criteria: Критичне мислення
    description: Уміння відрізняти радянську пропаганду від історичної реальності.
    points: 10
- type: true-false
  title: 'Правда чи вигадка: Факти про повоєнну Україну'
  items:
  - statement: У 1945 році Україна втратила майже третину свого довоєнного населення.
    correct: true
    explanation: Населення зменшилося з 41 мільйона у 1941 році до 27.4 мільйона осіб.
  - statement: Тактику випаленої землі на території України застосовували лише нацистські
      окупанти.
    correct: false
    explanation: Цю стратегію масово використовували як нацисти, так і радянські війська
      під час відступу.
  - statement: Вступ УРСР до ООН означав реальну політичну незалежність республіки
      від Москви.
    correct: false
    explanation: Це був лише дипломатичний крок Сталіна для отримання додаткових голосів
      у Генеральній Асамблеї.
  - statement: Четверта п'ятирічка передбачала переважний розвиток легкої промисловості
      та житлового будівництва.
    correct: false
    explanation: Близько 85 відсотків капіталовкладень спрямовувалися на металургію
      та важку індустрію.
  - statement: Відновлення шахт Донбасу потребувало значних зусиль, оскільки більшість
      з них були затоплені або зруйновані.
    correct: true
    explanation: З понад трьохсот шахт регіону вціліло лише кілька одиниць.
  - statement: Колгоспники мали право вільно залишати село і шукати роботу в місті
      завдяки наявності паспортів.
    correct: false
    explanation: Селянам не видавали паспортів, що фактично прив'язувало їх до колгоспу
      і перетворювало на кріпаків.
  - statement: Основною робочою силою на розчищенні руїн міст і в сільському господарстві
      стали жінки та підлітки.
    correct: true
    explanation: Через величезні втрати чоловіків на фронті тягар відбудови ліг на
      їхні плечі.
  - statement: Під час голоду 1946-1947 років Радянський Союз повністю припинив експорт
      українського зерна.
    correct: false
    explanation: Уряд продовжував експортувати мільйони тонн зерна до країн Європи
      з політичних мотивів.
  - statement: Закон про п'ять колосків карав ув'язненням матерів за спроби зібрати
      залишки врожаю на полях.
    correct: true
    explanation: За крадіжку кількох колосків люди могли отримати від семи до десяти
      років таборів.
  - statement: Львівський псевдособор 1946 року допоміг відновити легальну діяльність
      греко-католицької церкви.
    correct: false
    explanation: На цьому соборі УГКЦ була примусово ліквідована та підпорядкована
      російській церкві.
  - statement: 'Після війни українські жінки часто опановували традиційно чоловічі
      професії: ставали трактористками і шахтарями.'
    correct: true
    explanation: Масове застосування жіночої праці на найтяжчих ділянках було нормою.
  - statement: Грошова реформа 1947 року дозволила селянам вигідно обміняти і зберегти
      свої заощадження.
    correct: false
    explanation: Реформа мала яскраво виражений конфіскаційний характер і позбавила
      мільйони людей їхніх статків.
  instruction: Визначте, чи твердження правильне.
- type: comparative-study
  title: 'Порівняльне дослідження: Міф і реальність'
  source_reading: reading-spohady
  items_to_compare:
  - Офіційний радянський наратив про відбудову
  - Історична реальність повоєнного десятиліття
  criteria:
  - Головна мотивація робітників
  - Стан сільського господарства
  - Рівень забезпечення населення товарами
  model_answer: 'Радянський наратив стверджував, що люди працювали завдяки небувалому
    ентузіазму, а добробут населення стрімко зростав. Натомість реальність була інакшою:
    мотивацією слугував страх репресій, сільське господарство зазнало колосальних
    втрат і голоду 1946-1947 років, а товари та житло фінансувалися за залишковим
    принципом, що залишало людей у бідності.'
