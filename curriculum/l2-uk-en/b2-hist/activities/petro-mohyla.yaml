- type: reading
  id: reading-mohyla-trebnyk
  title: "Первинне джерело: Передмова до Требника"
  source: "Петро Могила (1646)"
  text: |
    Гарно й почесно бути свічкою, бути оком, бути сіллю, бути ангелом. Але свічка має світити, око має дивитися, сіль має діяти на гнилизну та її припиняти.
  tasks:
    - "Як ви розумієте метафору солі в цьому тексті?"
    - "Чому Могила вважає пасивну релігійність недостатньою?"

- type: critical-analysis
  title: "Аналіз: Метафора активної дії"
  source_reading: reading-mohyla-trebnyk
  target_text: "Але свічка має світити, око має дивитися, сіль має діяти на гнилизну та її припиняти."
  questions:
    - "Яку соціальну роль духовенства описує ця метафора?"
    - "Що в історичному контексті сімнадцятого століття могло означати слово 'гнилизна'?"
  model_answers:
    - "Метафора підкреслює необхідність активної соціальної позиції духовенства, яке має не лише зберігати віру, але й просвіщати суспільство."
    - "Гнилизна може означати неосвіченість, занепад моралі серед парафіяльного духовенства або розбрат після унії."

- type: essay-response
  title: "Есе: Стратегія інтелектуального спротиву"
  source_reading: reading-mohyla-trebnyk
  prompt: "Спираючись на текст модуля та передмову до Требника, проаналізуйте стратегію Петра Могили щодо використання європейських освітніх інструментів для захисту православної традиції. Чи була ця стратегія успішною?"
  min_words: 150
  rubric:
    - criteria: "Аргументація"
      description: "Наявність чіткої тези та підкріплення її історичними фактами."
      points: 10
    - criteria: "Розуміння контексту"
      description: "Демонстрація розуміння викликів, перед якими стояла православна церква."
      points: 10

- type: comparative-study
  title: "Порівняння: Освітні парадигми"
  source_reading: reading-mohyla-trebnyk
  items_to_compare:
    - "Традиційна братська школа"
    - "Києво-Могилянський колегіум"
  criteria:
    - "Мова викладання"
    - "Навчальна програма"
    - "Ставлення до європейської культури"
  model_answer: "Братські школи орієнтувалися на церковнослов'янську мову та консервативне утримання традицій, тоді як колегіум Могили використовував латину та викладав сім вільних мистецтв за європейським зразком, інтегруючи західні знання для захисту східної віри."

- type: true-false
  title: "Перевірка фактів: Життя та реформи Могили"
  instruction: "Визначте, які з цих тверджень є правильними, а які хибними."
  items:
    - statement: "Петро Могила походив із простої козацької родини."
      correct: false
      explanation: "Він належав до вищої аристократії і був сином господаря Валахії та Молдови."
    - statement: "До постригу в ченці Могила мав військовий досвід і брав участь у Хотинській битві."
      correct: true
      explanation: "Так, він бився пліч-о-пліч із Сагайдачним у тисяча шістсот двадцять першому році."
    - statement: "Києво-Могилянський колегіум був утворений шляхом злиття Лаврської та Київської братської шкіл."
      correct: true
      explanation: "Це сталося у тисяча шістсот тридцять другому році як компроміс із консерваторами."
    - statement: "Викладання в колегіумі велося виключно церковнослов'янською мовою."
      correct: false
      explanation: "Головною інновацією було викладання латинською та польською мовами."
    - statement: "Петро Могила ініціював розкопки Десятинної церкви у Києві."
      correct: true
      explanation: "Він зробив це у тисяча шістсот тридцять п'ятому році для підтвердження історичної пам'яті."
    - statement: "Усім парафіяльним священикам дозволялося проводити обряди на власний розсуд."
      correct: false
      explanation: "Могила запровадив сувору дисципліну та видав Требник для уніфікації всіх ритуалів."
    - statement: "Требник Петра Могили був надрукований у тисяча шістсот сорок шостому році."
      correct: true
      explanation: "Це була монументальна праця, яка стандартизувала православне богослужіння."
    - statement: "Могила підтримував перехід української церкви під владу Московського патріархату."
      correct: false
      explanation: "Навпаки, він розвивав концепцію Києва як самодостатнього сакрального центру, Нового Єрусалима."
    - statement: "Заповіт митрополита передавав його величезну бібліотеку у власність колегіуму."
      correct: true
      explanation: "Це забезпечило навчальний заклад потужною дослідницькою базою європейського рівня."
    - statement: "Реформи Могили були схвалені всіма східними патріархами."
      correct: true
      explanation: "Православне сповідання віри, розроблене в Києві, було офіційно визнане всіма східними патріархами."