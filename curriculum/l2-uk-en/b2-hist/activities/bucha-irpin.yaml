- type: reading
  id: reading-bucha-witness
  title: "Первинне джерело: Свідчення про Бучу"
  source: "Наташа Александрова (цитата)"
  text: "Вони нас не били. Але у них була зброя. Вони просто дивилися крізь нас, ніби ми вже мертві."
  instruction: "Прочитайте свідчення очевидиці окупації Бучі."
  tasks:
    - "Проаналізуйте психологічний стан окупантів."

- type: critical-analysis
  title: "Аналіз психологічного терору"
  source_reading: "reading-bucha-witness"
  instruction: "Дайте відповіді на запитання щодо прочитаного свідчення."
  target_text: "Свідчення очевидців окупації Бучі"
  questions:
    - "Чому погляд крізь людей можна вважати формою психологічного терору?"
    - "Як відчуття абсолютної безкарності впливає на поведінку військових на окупованих територіях?"
  model_answers:
    - "Такий погляд дегуманізує жертву, перетворюючи її на безправний об'єкт. Це свідчить про те, що окупанти не сприймали українців як живих людей, що полегшувало їм скоєння злочинів."
    - "Відчуття безкарності руйнує будь-які моральні бар'єри, дозволяючи військовим вчиняти мародерство, катування та вбивства без страху перед покаранням."
  focus_points:
    - "Дегуманізація"
    - "Психологічний тиск"

- type: essay-response
  source_reading: "reading-bucha-witness"
  instruction: "Напишіть есе на основі вивченого матеріалу."
  title: "Документування злочинів та міжнародне правосуддя"
  prompt: "Чому документування воєнних злочинів у Бучі та Ірпені є критично важливим для майбутнього міжнародного правосуддя? Обґрунтуйте свою думку, спираючись на приклади міжнародної реакції та роль Міжнародного кримінального суду."
  min_words: 150
  model_answer: "Документування воєнних злочинів є фундаментальним кроком для забезпечення невідворотності покарання. Зібрані докази, такі як свідчення очевидців, результати ексгумації та супутникові знімки Maxar, спростовують російську пропаганду про постановку. Ці матеріали дозволили Міжнародному кримінальному суду кваліфікувати події як злочини проти людяності. Завдяки ретельному документуванню стає можливим не лише притягнення до відповідальності безпосередніх виконавців, наприклад, солдатів шістдесят четвертої бригади, а й вищого керівництва РФ. Крім того, це створює базу для майбутнього Спеціального трибуналу щодо злочину агресії та механізму виплати репарацій, що є критичним для відновлення справедливості."
  rubric:
    - criteria: "Аргументація"
      description: "Чітке обґрунтування важливості документування злочинів."
      points: 10
    - criteria: "Використання фактів"
      description: "Наведення конкретних прикладів з матеріалу (знімки Maxar, МКС, звіти ООН)."
      points: 10
    - criteria: "Лексика"
      description: "Правильне використання юридичної термінології та цільової лексики."
      points: 5

- type: comparative-study
  title: "Порівняльний аналіз реакції світу: Буча та Голодомор"
  instruction: "Проаналізуйте та порівняйте реакцію міжнародної спільноти на два масштабні злочини."
  items_to_compare:
    - "Реакція світу на масові страти в Бучі (2022)"
    - "Реакція світу на Голодомор в Україні (1932-1933)"
  criteria:
    - "Інформаційна доступність"
    - "Реакція міжнародних медіа"
    - "Політичні наслідки для агресора"
  prompt: "Як цифрова епоха вплинула на неможливість приховати злочини в Бучі порівняно з інформаційною блокадою під час Голодомору?"
  model_answer: "Під час Голодомору Радянський Союз успішно застосував тотальну інформаційну блокаду та підкуп журналістів, щоб приховати геноцид. Світ обрав замовчування заради власних інтересів. Натомість, у 2022 році завдяки смартфонам, супутниковим знімкам та відкритому доступу міжнародних медіа приховати злочини в Бучі стало неможливо. Цифрові докази в реальному часі миттєво зруйнували російську пропаганду, змусивши світ визнати жорстоку реальність та запровадити санкції."

- type: true-false
  title: "Перевірка фактів: Хроніка та виявлення злочинів"
  instruction: "Визначте, чи є наведені твердження правдивими чи хибними."
  items:
    - statement: "Спроба російського бліцкригу розпочалася з висадки десанту в аеропорту Антонов у Гостомелі."
      correct: true
      explanation: "Так, аеродром мав стати плацдармом для перекидання військ."
    - statement: "Підрив мостів через річку Ірпінь значно полегшив евакуацію цивільного населення."
      correct: false
      explanation: "Підрив мостів ускладнив евакуацію, але був необхідним для зупинки ворога."
    - statement: "Російські війська контролювали Бучу та частину Ірпеня протягом тридцяти трьох днів."
      correct: true
      explanation: "Окупація тривала понад місяць, до кінця березня 2022 року."
    - statement: "Місцевим жителям Бучі під час окупації дозволялося вільно пересуватися містом без жодних позначок."
      correct: false
      explanation: "Окупанти примушували жителів носити білі пов'язки як систему маркування."
    - statement: "Братська могила в Бучі була розташована на території храму Святого апостола Андрія Первозванного."
      correct: true
      explanation: "Місцеві жителі були змушені викопати траншею біля церкви через постійні обстріли."
    - statement: "Супутникові знімки компанії Maxar підтвердили версію російської пропаганди про постановку."
      correct: false
      explanation: "Знімки повністю спростували фейк, довівши, що тіла лежали на вулицях ще в середині березня."
    - statement: "Найбільшу відповідальність за різанину на вулиці Яблунській несе шістдесят четверта окрема мотострілецька бригада."
      correct: true
      explanation: "Слідчі довели безпосередню причетність цієї бригади з Хабаровського краю."
    - statement: "Міжнародний кримінальний суд може безпосередньо розглядати злочин агресії щодо війни Росії в Україні."
      correct: false
      explanation: "МКС має обмежену юрисдикцію щодо злочину агресії, тому необхідне створення Спеціального трибуналу."
    - statement: "Після деокупації Бучі, Ірпеню та Гостомелю було присвоєно почесну відзнаку Місто-Герой України."
      correct: true
      explanation: "Цей статус визнає їхній безпрецедентний внесок у захист столиці."
    - statement: "Відступаючи, російські війська залишили територію розмінованою та безпечною для повернення цивільних."
      correct: false
      explanation: "Окупанти застосували тактику випаленої землі, тотально замінувавши будинки та навіть тіла загиблих."