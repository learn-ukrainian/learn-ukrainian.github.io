- type: reading
  id: reading-pvl-kiy
  title: 'Джерело: Повість минулих літ про заснування Києва'
  source: 'Літопис руський (Нестор Літописець)'
  text: 'І сидів Кий на горі, де нині узвіз Боричів, а Щек сидів на горі, яка нині зветься Щековицею, а Хорив на третій горі, од чого й прозвалася вона Хоривицею. Зробили вони городок і на честь брата їх найстаршого назвали його Києвом. А були ж східні слов’яни мудрими і тямущими, і називалися вони полянами, від них поляни і до сьогодні в Києві.'
  instruction: 'Уважно прочитайте уривок з літопису. Зверніть увагу на те, як Нестор описує засновників міста.'
  tasks:
    - 'Проаналізуйте топонімічний міф: які географічні об’єкти отримали назви від імен братів?'

- type: critical-analysis
  title: 'Критичний аналіз: Князь чи перевізник?'
  source_reading: reading-pvl-kiy
  target_text: 'Постать Кия та полеміка Нестора Літописця'
  instruction: 'Проаналізуйте аргументацію Нестора Літописця щодо статусу Кия, спираючись на текст модуля.'
  questions:
    - 'Який головний аргумент наводить Нестор, щоб спростувати народну версію про Кия-перевізника?'
    - 'Чому для київської ідеології було критично важливо довести князівське, а не простолюдне походження засновника столиці?'
  model_answers:
    - 'Головним доказом Нестора є візит Кия до Царгорода (Константинополя) та його зустріч з візантійським імператором. Звичайний перевізник не мав би честі бути прийнятим при імператорському дворі.'
    - 'Легітимація влади вимагала наявності автохтонної монархічної династії. Щоб претендувати на статус столиці імперії та рівність серед європейських держав, Київ мусив мати засновника шляхетного походження, який вів самостійну міжнародну політику.'

- type: comparative-study
  title: 'Порівняльне дослідження: Два погляди на Київ'
  instruction: 'Порівняйте бачення раннього Києва у двох різних історичних джерелах.'
  items_to_compare:
    - 'Повість минулих літ (Нестор Літописець)'
    - 'Про управління імперією (Костянтин Багрянородний)'
  criteria:
    - 'Характер влади: легітимна династія проти жорстких збирачів данини'
    - 'Економічний опис: самодостатній центр проти транзитного хабу Самбатас'
    - 'Зовнішній образ киян: захисники землі проти небезпечних торгових партнерів'
  prompt: 'Напишіть коротке есе-порівняння (1-2 абзаци), у якому поясніть, чому ці два джерела подають настільки різні картини одного міста.'
  model_answer: 'Різниця в описах зумовлена різною метою авторів. Нестор Літописець створював патріотичний маніфест, легітимізуючи владу київських князів та наголошуючи на їхньому божественному призначенні. Візантійський імператор писав прагматичну таємну інструкцію з геополітики, тому його цікавили лише військові та комерційні аспекти функціонування київського транзитного хабу.'

- type: true-false
  title: 'Перевірка фактів: Міфи та реальність'
  instruction: 'Визначте, чи є твердження істинним (true) чи хибним (false), спираючись на текст.'
  items:
    - statement: 'Київ був заснований у точно визначений день 482 року.'
      correct: false
      explanation: 'Дата 482 рік є штучною і була затверджена у 1982 році з політичних мотивів. Місто виникало еволюційно.'
    - statement: 'Згідно з літописом, місто назвали Києвом на честь найстаршого з братів.'
      correct: true
      explanation: 'Місто отримало назву від імені старшого брата Кия, що закріпило політичну владу його роду.'
    - statement: 'Римські монети, знайдені в Києві, доводять, що місто заснували римляни.'
      correct: false
      explanation: 'Ці монети лише свідчать про те, що територія була перетином давніх торгових шляхів задовго до виникнення міста.'
    - statement: 'Нестор Літописець стверджував, що Кий працював перевізником на Дніпрі.'
      correct: false
      explanation: 'Навпаки, Нестор активно полемізував із цією версією і доводив князівське походження Кия.'
    - statement: 'Скандинавські воїни-торговці (варяги) заснували Київ на порожньому місці.'
      correct: false
      explanation: 'Варяги прийшли у вже існуючий розвинений словянський центр і інтегрувалися в його структуру.'
    - statement: 'Назва Самбатас зустрічається у творі візантійського імператора Костянтина Багрянородного.'
      correct: true
      explanation: 'Візантійський імператор згадує цю назву у своєму таємному трактаті, що свідчить про міжнародне значення Києва.'
    - statement: 'Археологи виявили на Старокиївській горі фундамент язичницького капища.'
      correct: true
      explanation: 'Це підтверджує, що гора була не лише місцем проживання, а й головним духовним центром.'
    - statement: 'Економічним серцем Києва була не Старокиївська гора, а низинний Поділ.'
      correct: true
      explanation: 'Саме на Подолі був порт, головне торжище і ремісничі квартали, що приносили місту багатство.'
    - statement: 'Київська Русь була моноетнічною державою, де всі племена розмовляли однією мовою.'
      correct: false
      explanation: 'Це була багатонаціональна імперія, де проживали десятки різних племен з власними діалектами і звичаями.'
    - statement: 'Контроль над Києвом означав контроль над водним шляхом із варягів у греки.'
      correct: true
      explanation: 'Місто було ключовим транзитним хабом на цій міжнародній торговельній магістралі.'

- type: essay-response
  title: 'Есе: Геополітична вісь Східної Європи'
  instruction: 'Напишіть розгорнуту відповідь на запропоновану тему.'
  prompt: 'Обґрунтуйте геополітичне та сакральне значення Києва у період раннього середньовіччя. Як поєднання природної фортеці, транзитного хабу та духовного центру дозволило місту стати столицею наймогутнішої імперії Східної Європи? У своїй відповіді обов’язково згадайте шлях із варягів у греки та концепцію деколонізації історичної пам’яті.'
  min_words: 150
  model_answer: 'Геополітичне значення Києва було зумовлене його унікальним розташуванням на високих пагорбах правого берега Дніпра, що забезпечувало природний захист від кочовиків та контроль над ключовою переправою. Ставши центральним хабом на трансконтинентальному шляху із варягів у греки, Київ накопичив величезні ресурси від транзитної торгівлі та збору данини. Одночасно місто функціонувало як сакральний центр, що надавало київським князям не лише економічну, але й духовну владу над підкореними племенами. Важливо розглядати цю історію через призму деколонізації, відкидаючи імперські міфи про спільну колиску трьох народів. Київ виник як автохтонний полянський проект, розвиток якого був пришвидшений, але не ініційований, варязьким військово-торговельним впливом. Таким чином, симбіоз економічної сили, військової організації та сакрального авторитету перетворив Київ на беззаперечного лідера Східної Європи.'
  rubric:
    - criteria: 'Змістовність'
      description: 'Повне розкриття теми, згадка шляху із варягів у греки та аспекту деколонізації.'
      points: 40
    - criteria: 'Аргументація'
      description: 'Логічне обґрунтування ролі природної фортеці, хабу та духовного центру.'
      points: 40
    - criteria: 'Мовне оформлення'
      description: 'Використання академічного стилю (B2), правильна граматика та лексика.'
      points: 20