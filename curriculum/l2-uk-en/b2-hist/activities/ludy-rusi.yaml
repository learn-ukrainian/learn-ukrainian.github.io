- type: reading
  id: reading-ruska-pravda
  title: 'Первинне джерело: Руська Правда'
  source: 'Правда Ярославичів'
  text: |
    Оже убиють огнищанина у клети, або у коня, або у стада, або у волов татьбою, то убити ї у пса место. Якщо злодія не спіймали на місці злочину, закон встановлював чітку градацію віри (штрафу).
  tasks:
    - 'Якою була віра за вбивство боярина згідно з Руською Правдою?'
    - 'Хто такий огнищанин у системі управління маєтком?'
    - 'Чому за вбивство холопа платили лише 5 гривень?'
    - 'Яку функцію виконувала сільська громада (верв) у системі тогочасного правосуддя?'

- type: true-false
  title: 'Перевірте факти: Суспільство Київської Русі'
  instruction: 'Визначте, які твердження про життя русичів є правдивими, а які — ні.'
  items:
    - statement: 'Князь у Київській Русі мав абсолютну монархічну владу та самостійно видавав усі закони.'
      correct: false
      explanation: 'Князь був лише "першим серед рівних", він спирався на звичаєве право та договір з містом.'
    - statement: 'Статус людини в середньовічному суспільстві визначався насамперед її народженням і соціальною функцією.'
      correct: true
      explanation: 'Саме народження і соціальна функція визначали права в становому суспільстві, а не лише багатство.'
    - statement: 'Боярська вотчина була тимчасовим земельним володінням, яке залежало виключно від волі князя.'
      correct: false
      explanation: 'Вотчина передавалася у спадок і робила бояр економічно та політично незалежними від князя.'
    - statement: 'Монахи ("чорне духовенство") відігравали ключову роль у створенні літописів та заснуванні шкіл.'
      correct: true
      explanation: 'Монастирі були інтелектуальними центрами Русі, а монахи — її інтелектуальною елітою.'
    - statement: 'Смерди були кріпаками, які не мали жодних прав на пересування або володіння майном.'
      correct: false
      explanation: 'Смерди були особисто вільними людьми, які мали своє господарство, майно і право залишати спадок.'
    - statement: 'Закуп — це напіввільна людина, яка мусила відпрацювати свій фінансовий борг у кредитора.'
      correct: true
      explanation: 'Закупи працювали за позику ("купу"), але мали чіткий правовий захист від продажу в рабство без причини.'
    - statement: 'Смертна кара була найпоширенішим і звичайним покаранням за більшість злочинів на території Русі.'
      correct: false
      explanation: 'Правова система Русі була гуманнішою за західноєвропейську і базувалася на системі фінансових штрафів.'
    - statement: 'Жінки у Київській Русі мали власні майнові права та могли розпоряджатися спадком і посагом.'
      correct: true
      explanation: 'Жінки мали надзвичайно високий правовий статус, володіли майном і могли бути головою родини.'
    - statement: 'Берестяні грамоти свідчать про те, що навичками письма та читання володіли виключно київські князі.'
      correct: false
      explanation: 'Берестяні грамоти та графіті доводять широке поширення грамотності серед купців, ремісників та жінок.'
    - statement: 'Інститут віча існував як орган міського самоврядування, що міг розірвати угоду з князем.'
      correct: true
      explanation: 'Віче приймало ключові рішення і могло легітимно вигнати князя, якщо він порушував свої обов`язки.'

- type: essay-response
  source_reading: reading-ruska-pravda
  title: 'Есе: Правова культура Київської Русі'
  prompt: 'Проаналізуйте значення системи грошових штрафів ("вір") у Руській Правді. Як ця система відображала соціальну нерівність та загальний рівень правової культури тогочасного суспільства? Наведіть конкретні приклади з тексту.'
  min_words: 150
  model_answer: 'Система вір у Руській Правді стала важливим кроком від варварської кровної помсти до державного правосуддя. Вона відображала чітку соціальну стратифікацію: життя боярина оцінювалося у 80 гривень, вільної людини — у 40, а смерда — у 12. Це свідчить про те, що закон насамперед захищав інтереси правлячої еліти та землевласників. Водночас відсутність поширеної смертної кари демонструє високий рівень правового гуманізму та прагматичний підхід держави до збереження робочої сили.'
  rubric:
    - criteria: 'Аргументація'
      description: 'Глибокий аналіз переходу від кровної помсти до штрафів та розуміння соціальної стратифікації.'
      points: 40
    - criteria: 'Використання джерел'
      description: 'Наявність конкретних прикладів вартості віри для різних станів суспільства.'
      points: 30
    - criteria: 'Структура тексту'
      description: 'Логічна побудова есе, наявність чіткого вступу, основної частини та аргументованих висновків.'
      points: 30

- type: critical-analysis
  source_reading: reading-ruska-pravda
  title: 'Критичний аналіз: Влада та громада'
  instruction: 'Проаналізуйте політичну структуру Київської Русі та дайте розгорнуті відповіді на запитання.'
  questions:
    - 'Як економічна незалежність бояр через інститут вотчини впливала на їхні політичні відносини з князем?'
    - 'У чому полягав договірний характер відносин ("ряд") між князем та жителями міста?'
    - 'Яким чином інститут кругової поруки (верв) компенсував відсутність розвиненої поліційної системи у державі?'
  model_answers:
    - 'Вотчина передавалася у спадок і робила боярина повноправним господарем своєї землі. Це дозволяло боярам формувати власні військові загони, економічно не залежати від князя і диктувати йому свої політичні умови.'
    - 'Князь не був абсолютним деспотом. Він укладав угоду з міським вічем, обіцяючи справедливий суд і військовий захист. Якщо він порушував угоду, віче могло розірвати договір і вигнати правителя.'
    - 'Сільська громада (верв) несла колективну відповідальність за злочини, скоєні на її території. Якщо вбивцю не знаходили, вся громада платила величезний спільний штраф, що змушувало сусідів ретельно контролювати одне одного.'

- type: critical-analysis
  title: 'Деколонізація історії: Аналіз імперських міфів'
  instruction: 'Спростуйте поширені історичні міфи, використовуючи фактичний матеріал з тексту модуля.'
  questions:
    - 'Як археологічні знахідки в Україні та Північній Росії спростовують міф про єдину архітектурну традицію "давньоруського народу"?'
    - 'Які докази беззаперечно руйнують міф про те, що населення Київської Русі було абсолютно неписьменним?'
    - 'Чому твердження про повністю безправний статус жінки в середньовічній Русі є історично хибним?'
    - 'Як політичний устрій Київської Русі принципово контрастує з пізнішою московською моделлю деспотії?'
    - 'Яким чином знахідки кістяних шахових фігур руйнують стереотип про примітивний щоденний побут звичайних містян?'
  model_answers:
    - 'В українській лісостеповій зоні будували автохтонні білені мазанки з глиняною піччю, тоді як на півночі зводили масивні зруби ("ізби"). Це доводить регіональну різноманітність матеріальної культури.'
    - 'Графіті на стінах Софії Київської та берестяні грамоти зі Звенигорода, написані ремісниками, жінками і дітьми (хлопчик Онфім), доводять існування масової побутової грамотності.'
    - 'Жінки мали гарантовані майнові права, володіли своїм посагом, могли самостійно розпоряджатися спадком і бути повноправною головою родини після смерті чоловіка.'
    - 'У Русі існував могутній інститут віча і договірні відносини між князем та громадою. У Московії ж пізніше запанувала абсолютна деспотія без самоврядування, де всі були "холопами государя".'
    - 'Шахи масово знаходять не лише в багатих палацах, а й у звичайних житлах ремісників та купців, що свідчить про поширення складного інтелектуального дозвілля серед широких верств міського населення.'