- type: reading
  id: reading-treaty-911
  title: 'Первинне джерело: Договір Русі з Візантією 911 року'
  source: 'Повість минулих літ'
  text: |
    Якщо хто вб’є — русин християнина або християнин русина, — хай умре на місці вбивства. Якщо ж утече вбивця, а є заможним, то хай візьмуть майно його родичі вбитого.
  tasks:
    - 'Який принцип правосуддя відображено в цій статті договору?'
    - 'Що цей договір говорить про міжнародний статус Русі?'

- type: true-false
  title: 'Перевірте розуміння'
  instruction: 'Визначте, чи є твердження істинним, чи хибним.'
  items:
    - statement: "Головним торговельним маршрутом ранньої Русі був шлях 'із варягів у греки'."
      correct: true
      explanation: 'Цей водний коридор з’єднував Балтійське море з Чорним.'
    - statement: 'У 944 році князь Ігор уклав найвигідніший торговельний договір з Візантією.'
      correct: false
      explanation: 'Договір 944 року був значно менш вигідним після поразки руського флоту.'
    - statement: 'Візит княгині Ольги до Константинополя у 957 році супроводжувався великим військом.'
      correct: false
      explanation: 'Це був мирний дипломатичний візит без військового тиску.'
    - statement: "Прийняття християнства у 988 році легітимізувало владу київського князя серед європейських монархів."
      correct: true
      explanation: "Це був геополітичний крок входження в сім'ю християнських монархів."
    - statement: 'Червенські гради були причиною тривалого конфлікту між Руссю та Візантією.'
      correct: false
      explanation: 'Червенські гради були об’єктом тривалого конфлікту між Руссю та Польщею.'
    - statement: 'Казимир I Відновник уклав династичний шлюб із сестрою Ярослава Мудрого.'
      correct: true
      explanation: 'Марія-Добронега стала дружиною польського князя для стратегічного примирення.'
    - statement: 'Угорщина була традиційним політичним притулком для руських князів-вигнанців.'
      correct: true
      explanation: 'Через Карпати часто тікали князі, які зазнали поразки в міжусобицях.'
    - statement: 'Печеніги були повністю знищені князем Святославом Хоробрим.'
      correct: false
      explanation: 'Святослав загинув від рук печенігів, а остаточно розгромив їх Ярослав Мудрий.'
    - statement: "Торків, берендеїв та печенігів, які служили київським князям, називали 'чорними клобуками'."
      correct: true
      explanation: 'Вони отримали землю в Пороссі і стали захисниками південних кордонів.'
    - statement: 'Реймське Євангеліє привезла до Франції Анна Ярославна.'
      correct: true
      explanation: 'Цей кириличний манускрипт пізніше використовувався для коронації французьких монархів.'

- type: critical-analysis
  title: 'Аналіз правових норм Русі'
  source_reading: 'reading-treaty-911'
  instruction: 'Проаналізуйте уривок з договору 911 року.'
  questions:
    - 'Чому відповідальність за вбивство була симетричною для обох сторін у цьому договорі?'
    - "Як цей документ спростовує теорію про 'варварство' та політичну ізольованість ранньої Русі?"

- type: comparative-study
  title: 'Порівняльний аналіз зовнішньої політики'
  instruction: 'Порівняйте політику Київської Русі щодо різних сусідів.'
  items_to_compare:
    - 'Відносини з Візантією'
    - 'Відносини з половцями'
  criteria:
    - 'Військові конфлікти'
    - 'Торговельні інтереси'
    - 'Династичні шлюби'
  prompt: 'Проаналізуйте, як київські князі змінювали свої дипломатичні підходи залежно від типу сусідів (велика імперія чи мобільний кочовий народ).'

- type: essay-response
  title: 'Есе: Геополітичний вибір Русі'
  instruction: 'Напишіть розгорнуту відповідь на запитання.'
  prompt: "На основі матеріалу уроку, дайте обґрунтовану відповідь: чи була Київська Русь повноцінною частиною Європи, чи вона розвивалася ізольовано? Наведіть конкретні приклади династичних, торговельних та політичних зв'язків для підтвердження своєї думки."
  min_words: 200
  rubric:
    - criteria: 'Аргументація'
      description: 'Наявність чіткої тези та конкретних історичних прикладів.'
    - criteria: 'Використання термінів'
      description: 'Правильне і доречне вживання ключових термінів: династичний шлюб, союз, дипломатія.'