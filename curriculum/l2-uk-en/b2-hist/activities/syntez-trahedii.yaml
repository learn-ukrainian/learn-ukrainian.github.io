- type: reading
  id: reading-radchenko
  title: "Первинне джерело: Щоденники Олександри Радченко"
  source: "Олександра Радченко"
  text: "Люди вмирають по селах від голоду, діти пухнуть і гинуть, а в газетах — суцільні перемоги і радість... Я записую це, щоб колись люди дізналися правду про наші муки."

- type: critical-analysis
  source_reading: "reading-radchenko"
  title: "Аналіз свідчень"
  instruction: "Прочитайте уривок і дайте відповіді на запитання."
  questions:
    - "Яка головна мета авторки щоденника?"
    - "Які дві паралельні реальності описує Олександра Радченко?"
  model_answers:
    - "Головна мета — зберегти правду для майбутніх поколінь, щоб світ дізнався про реальні події."
    - "Авторка протиставляє реальну трагедію сіл (смерть, голод) офіційній пропаганді в газетах (радість, перемоги)."
  focus_points:
    - "Мотивація до написання"
    - "Роль пропаганди"

- type: reading
  id: reading-tychyna
  title: "Маніфест незламності"
  source: "Павло Тичина"
  text: "Я єсть народ, якого Правди сила ніким звойована ще не була."

- type: essay-response
  source_reading: "reading-tychyna"
  title: "Есе: Від травми до суб'єктності"
  prompt: "Спираючись на цитату Павла Тичини та матеріали модуля, напишіть есе про перехід української нації від статусу жертви до суб'єкта, що бореться. Як трагедії двадцятого століття вплинули на сучасну українську ідентичність?"
  min_words: 150
  model_answer: "Трагедії минулого століття, такі як Голодомор та репресії, залишили глибоку трансгенераційну травму. Радянський режим намагався перетворити українців на слухняну масу. Проте, як зазначає Павло Тичина, сила народу не була звойована. Сьогодні Україна проходить процес деколонізації, повертаючи собі суб'єктність. Відмова від ролі жертви на користь активної боротьби є ключовою ознакою сучасної ідентичності. Ця стійкість дозволяє суспільству протистояти новим загрозам."
  rubric:
    - criteria: "Аргументація"
      description: "Наявність чіткої тези та аргументів, що спираються на історичні факти."
      points: 10
    - criteria: "Використання термінології"
      description: "Доречне використання термінів модуля (суб'єктність, деколонізація, травма)."
      points: 10

- type: true-false
  title: "Факти чи радянські міфи"
  instruction: "Визначте, чи є твердження правдивим, чи це елемент радянської пропаганди."
  items:
    - statement: "Словосполучення Велика Вітчизняна війна було створене для приховування співпраці СРСР та нацистської Німеччини."
      correct: true
      explanation: "Цей міф відсікає перші два роки Другої світової війни, щоб приховати факт союзництва між двома режимами."
    - statement: "Термін Криваві землі описує виключно територію нацистської Німеччини."
      correct: false
      explanation: "Цей термін концептуалізує територію Східної Європи, де режими Гітлера та Сталіна здійснювали масові вбивства."
    - statement: "Голодомор 1932-1933 років був спричинений виключно неврожаєм та посухою."
      correct: false
      explanation: "Це радянський міф. Голодомор був спланованим геноцидом, спрямованим проти українського селянства."
    - statement: "Процес Спілки визволення України 1930 року став прелюдією до масового нищення еліти."
      correct: true
      explanation: "Цей показовий процес мав на меті залякати інтелектуальну еліту і знешкодити лідерів суспільства."
    - statement: "Декомунізація означає лише формальну зміну табличок на вулицях."
      correct: false
      explanation: "Декомунізація є глибоким процесом очищення символічного простору нації та відновлення історичної справедливості."
    - statement: "Операція Вісла була спрямована на захист українського населення від війни."
      correct: false
      explanation: "Це була етнічна чистка та масова депортація з метою знищення бази підтримки УПА та асиміляції українців."
    - statement: "Урочище Сандармох стало місцем фізичної ліквідації представників Розстріляного відродження."
      correct: true
      explanation: "Там у 1937 році були розстріляні найвидатніші представники української інтелігенції."
    - statement: "Українське село не чинило жодного спротиву колективізації."
      correct: false
      explanation: "Це міф. На початку 1930-х років відбулося понад чотири тисячі збройних селянських повстань."
    - statement: "Феномен подвійної свідомості допомагав людям виживати в тоталітарній системі."
      correct: true
      explanation: "Люди навчилися публічно демонструвати лояльність режиму, а вдома зберігати критичне мислення."
    - statement: "Російська агресія 2022 року використовує нові, раніше невідомі методи упокорення."
      correct: false
      explanation: "Спостерігається разюча тяглість методів: фільтраційні табори, депортації та нищення культури повторюють практики XX століття."

- type: comparative-study
  title: "Порівняння термінів"
  instruction: "Порівняйте імперський наратив та український історичний погляд на події."
  items_to_compare:
    - "Велика Вітчизняна війна"
    - "Друга світова війна"
  criteria:
    - "Хронологічні межі"
    - "Ідеологічний зміст"
  prompt: "Поясніть, як зміна термінології впливає на розуміння ролі України у цій війні."
  model_answer: "Термін Друга світова війна охоплює період з 1939 року, включаючи співпрацю СРСР і нацистів. Це руйнує радянський міф про виняткову героїчність і показує Україну як арену зіткнення двох диктатур."