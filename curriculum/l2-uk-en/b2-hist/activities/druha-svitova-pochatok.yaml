- type: reading
  id: reading-secret-protocol
  title: 'Таємний протокол пакту Молотова-Ріббентропа'
  source: 'Архівні документи (23 серпня 1939 року)'
  instruction: 'Прочитайте уривок з історичного документа та перейдіть до аналітичних завдань.'
  text: |
    У разі територіально-політичного перевлаштування областей, які входять до складу Польської Держави, кордон сфер інтересів Німеччини і СРСР буде приблизно проходити по лінії річок Нарви, Вісли і Сяну. Питання про те, чи в обопільних інтересах бажане збереження незалежної Польської Держави і якими будуть кордони цієї держави, може бути остаточно з'ясоване лише впродовж подальшого політичного розвитку.

- type: critical-analysis
  source_reading: reading-secret-protocol
  title: 'Аналіз тексту: Доля незалежних держав'
  instruction: 'Проаналізуйте наведений текст та дайте відповіді на запитання.'
  target_text: 'Таємний додатковий протокол до пакту Молотова-Ріббентропа'
  questions:
    - 'Які річки визначали межу сфер інтересів Німеччини та СРСР?'
    - 'Як у документі вирішувалося питання збереження польської державності?'
    - 'Як цей протокол руйнує радянський міф про миролюбність СРСР напередодні Другої світової війни?'
  model_answers:
    - 'Кордон сфер інтересів мав проходити по лінії річок Нарви, Вісли і Сяну.'
    - 'Питання збереження незалежної Польщі залишалося відкритим і мало бути вирішене пізніше, що свідчить про готовність її знищити.'
    - 'Документ прямо доводить, що Радянський Союз разом із Третьим Рейхом ділив сфери впливу в Європі, свідомо готуючись до агресивної війни.'
  focus_points:
    - 'Цинічний характер документа'
    - 'Позбавлення Польщі суб''єктності'

- type: true-false
  title: 'Правда чи вигадка: події 1939-1941 років'
  instruction: 'Визначте, чи є твердження правильним.'
  items:
    - statement: 'Таємний протокол до пакту Молотова-Ріббентропа передбачав поділ Європи між Німеччиною та СРСР.'
      correct: true
      explanation: 'Так, документ встановлював межу сфер інтересів по річках Нарва, Вісла і Сян.'
    - statement: 'Першого вересня 1939 року у складі польської армії не було українців.'
      correct: false
      explanation: 'Навпаки, понад 100 тисяч етнічних українців воювали у Війську Польському.'
    - statement: 'Радянські війська увійшли на територію Західної України 17 вересня 1939 року.'
      correct: true
      explanation: 'Це сталося після того, як польська оборона була фактично зламана німцями.'
    - statement: 'Місцеве населення зустріло червоноармійців як справжніх визволителів і рівень їхньої культури вразив галичан.'
      correct: false
      explanation: 'Червоноармійці викликали культурний шок своїм бідним виглядом, наприклад, плутаючи нічні сорочки з вечірніми сукнями.'
    - statement: 'Радянська влада організувала вибори до Народних Зборів в умовах жорсткого терору.'
      correct: true
      explanation: 'Голосування було безальтернативним і проходило під контролем НКВС.'
    - statement: 'Депортації із Західної України у Сибір стосувалися виключно польського населення.'
      correct: false
      explanation: 'Депортували українців, поляків та євреїв, загалом понад мільйон осіб.'
    - statement: 'Катинський розстріл був організований нацистською Німеччиною, що було доведено радянськими слідчими.'
      correct: false
      explanation: 'Це радянський міф. Катинський злочин скоїв НКВС за наказом Сталіна.'
    - statement: 'Перед відступом влітку 1941 року радянське керівництво наказало розстріляти в''язнів тюрем НКВС.'
      correct: true
      explanation: 'Цей злочин шокував місцеве населення та радикалізував настрої проти СРСР.'
    - statement: 'ОУН проголосила Акт відновлення Української Держави 30 червня 1941 року за повної підтримки Гітлера.'
      correct: false
      explanation: 'Німці не підтримали Акт, а лідерів ОУН негайно заарештували.'
    - statement: 'Сучасна історіографія уникає радянського терміну "Золотий вересень" для опису подій осені 1939 року.'
      correct: true
      explanation: 'Цей термін замінюється на радянське вторгнення або радянську окупацію.'

- type: comparative-study
  title: 'Порівняльний аналіз: Дві окупації'
  instruction: 'Порівняйте методи радянської окупації 1939-1941 років із діями РФ у сучасній Україні.'
  items_to_compare:
    - 'Радянська окупація Західної України (1939-1941)'
    - 'Російська окупація територій України (після 2014 року)'
  criteria:
    - 'Легітимізація захоплення територій'
    - 'Ставлення до місцевої еліти та політичних діячів'
    - 'Депортації та переміщення населення'
  prompt: 'Напишіть коротке есе, у якому поясніть, чому дії сучасної Росії можна вважати прямою калькою сталінських методів 1939-1941 років.'
  model_answer: |
    Методи обох окупаційних режимів мають вражаючу подібність. Щодо легітимізації, радянська влада організувала фіктивні вибори до "Народних Зборів" у 1939 році під дулами автоматів, так само як Росія проводить псевдореферендуми на захоплених територіях. Ставлення до еліти в обох випадках передбачає знищення та репресії: у 1941 році НКВС розстрілював в'язнів, а зараз РФ створює катівні. Крім того, масові депортації в Сибір 1940-х років знаходять своє відображення у примусовому вивезенні українських дітей до Росії сьогодні. Це доводить незмінність імперської природи російської політики.

- type: essay-response
  title: 'Історичне есе: Деконструкція міфу'
  instruction: 'Напишіть розгорнуту відповідь на запитання.'
  prompt: 'Поясніть, чому використання радянського терміну "возз''єднання" є історично некоректним для опису подій осені 1939 року в Західній Україні. Чому сучасні історики використовують термін "окупація" або "анексія"?'
  min_words: 150
  model_answer: |
    Термін "возз'єднання", який активно просувала радянська пропаганда під назвою "Золотий вересень", є типовим імперським конструктом. Його мета полягала у створенні ілюзії, ніби прихід Червоної армії був здійсненням одвічної мрії українців про єдину соборну державу. Однак історична реальність була кардинально іншою. По-перше, цей процес розпочався як наслідок цинічної змови двох диктаторів — Гітлера та Сталіна — через таємний протокол до пакту Молотова-Ріббентропа. Західноукраїнські землі були просто передані до радянської сфери впливу. По-друге, легітимізація цієї дії відбулася через фіктивні вибори до Народних Зборів, які проходили в атмосфері терору. Українці Західної України не отримали справжньої свободи; їх просто силоміць інкорпорували до складу тоталітарної імперії. Замість національного визволення вони отримали масові репресії, ліквідацію культурних установ, депортації сотень тисяч людей у Сибір та криваві розстріли в тюрмах НКВС. Тому сучасна історична наука рішуче відкидає пропагандистське "возз'єднання" на користь об'єктивних термінів: "радянська анексія" та "окупація". Це повертає Україні її суб'єктність і допомагає деколонізувати погляд на Другу світову війну.
  rubric:
    - criteria: 'Історична аргументація'
      description: 'Здатність пояснити контекст пакту Молотова-Ріббентропа та реальні наслідки приходу Червоної армії.'
      points: 5
    - criteria: 'Деколонізаційний фокус'
      description: 'Чітке розмежування між радянськими міфами та історичною правдою про окупацію.'
      points: 3
    - criteria: 'Мовне оформлення'
      description: 'Використання відповідної історичної термінології та збереження академічного стилю.'
      points: 2