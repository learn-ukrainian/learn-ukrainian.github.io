- type: reading
  id: "reading-maidan-voices"
  title: "Первинне джерело: Свідчення учасника Майдану"
  source: "Усна історія: голос Майдану"
  text: |
    Коли все тільки починалося, ми думали про Європейський Союз, про візи, про економіку. Але після того, як вони розбили голови дітям 30 листопада, Європа відійшла на другий план. Ми вийшли не за Європу, ми вийшли за гідність. За право бути людьми, а не худобою, яку можна безкарно бити кийками у власній країні. Після тієї ночі я зрозумів: якщо ми зараз промовчимо, ми назавжди залишимося рабами.

- type: critical-analysis
  title: "Критичний аналіз: Зміна мотивації"
  source_reading: "reading-maidan-voices"
  instruction: "Проаналізуйте наведене свідчення учасника подій."
  questions:
    - "Як змінилася головна мета протестувальників після подій 30 листопада 2013 року?"
    - "Що автор тексту має на увазі під словом гідність у цьому контексті?"
    - "Які наслідки для суспільства прогнозує автор у разі відмови від протесту?"
  model_answers:
    - "Мета змінилася з політично-економічної на екзистенційну — захист базових прав людини та власної честі."
    - "Гідність означає право на безпеку, справедливість та повагу з боку держави, відмову терпіти приниження."
    - "Автор вважає, що відсутність опору призвела б до остаточного перетворення громадян на безправних і покірних рабів авторитарної системи."

- type: essay-response
  title: "Есе: Сутність Революції Гідності"
  source_reading: "reading-maidan-voices"
  prompt: "Спираючись на прочитаний текст та матеріали уроку, поясніть, чому Революцію 2014 року називають Революцією Гідності. Які ключові події підтверджують цю назву?"
  min_words: 150
  model_answer: "Революцію 2014 року називають Революцією Гідності, оскільки політичні вимоги щодо євроінтеграції швидко змінилися на вимоги захисту прав людини. Каталізатором цього стало жорстоке побиття студентів 30 листопада. Люди вийшли на вулиці, щоб захистити свою честь, право на вибір і безпеку. Вони відмовилися терпіти свавілля міліції, прийняття диктаторських законів та розстріли. Героїзм Небесної Сотні та феномен самоорганізації довели, що українці готові віддати життя за право бути вільними громадянами."
  rubric:
    - criteria: "Аргументація"
      description: "Чітко пояснено зміну мотивації протестувальників від євроінтеграції до захисту прав людини."
      points: 10
    - criteria: "Фактологічна база"
      description: "Згадано ключові події, такі як ніч на 30 листопада та ухвалення диктаторських законів."
      points: 10
    - criteria: "Мовне оформлення"
      description: "Текст логічний, без русизмів, відповідає публіцистичному стилю."
      points: 5

- type: comparative-study
  title: "Порівняльний аналіз: 2004 та 2013"
  instruction: "Порівняйте Помаранчеву революцію та Революцію Гідності."
  items_to_compare:
    - "Помаранчева революція 2004 року"
    - "Революція Гідності 2013-2014 років"
  criteria:
    - "Головна причина протестів"
    - "Рівень насилля з боку держави"
    - "Ключові наслідки для суспільства"
  prompt: "Які фундаментальні відмінності між цими двома протестними рухами свідчать про дорослішання українського суспільства?"
  model_answer: "У 2004 році головною причиною була фальсифікація виборів, тоді як у 2013 — цивілізаційний вибір та захист життя. Рівень насилля також кардинально відрізнявся: Помаранчева революція була безкровною, а Революція Гідності супроводжувалася масовими розстрілами. Дорослішання суспільства виявилося у тому, що у 2014 році люди не просто делегували владу політикам, а взяли відповідальність на себе, створивши потужні механізми самоорганізації."

- type: true-false
  title: "Перевірка фактів: Хронологія та міфи"
  instruction: "Визначте, чи є наведені твердження правдивими."
  items:
    - statement: "Безпосереднім каталізатором Євромайдану стала відмова уряду підписати Угоду про асоціацію з ЄС."
      correct: true
      explanation: "Протести розпочалися 21 листопада 2013 року після рішення уряду призупинити процес євроінтеграції."
    - statement: "Перші тижні протесту відзначалися агресивними діями студентів проти міліції."
      correct: false
      explanation: "Студентський етап був винятково мирним і проходив без партійної символіки."
    - statement: "Назва Революція Гідності виникла одразу в перший день протестів 21 листопада."
      correct: false
      explanation: "Ця назва закріпилася пізніше, після жорстокого побиття студентів 30 листопада."
    - statement: "Диктаторські закони 16 січня обмежували базові конституційні права громадян."
      correct: true
      explanation: "Вони забороняли масові зібрання, рух у колонах і запроваджували цензуру."
    - statement: "Першими жертвами режиму на вулиці Грушевського стали іноземні найманці."
      correct: false
      explanation: "Першими загиблими були учасники протесту: Сергій Нігоян, Михайло Жизневський та Юрій Вербицький."
    - statement: "Тітушки — це кримінальні елементи, яких влада використовувала для нападів на активістів."
      correct: true
      explanation: "Найманці виконували брудну роботу під прикриттям правоохоронних органів."
    - statement: "Російська пропаганда стверджувала, що Майдан фінансувався західними спецслужбами."
      correct: true
      explanation: "Це був міф для знецінення волонтерської підтримки та народної самоорганізації."
    - statement: "Віктор Янукович офіційно передав владу парламенту перед своїм від'їздом до Росії."
      correct: false
      explanation: "Він таємно втік, що було розцінено як самоусунення та акт державної зради."
    - statement: "Серед героїв Небесної Сотні були представники винятково західних регіонів України."
      correct: false
      explanation: "Небесна Сотня представляє весь зріз українського суспільства з усіх регіонів."
    - statement: "Революція Гідності прискорила процес формування сучасної політичної нації в Україні."
      correct: true
      explanation: "Вона об'єднала людей різних етносів та соціальних груп навколо демократичних цінностей."