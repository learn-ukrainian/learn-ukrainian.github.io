- type: reading
  id: "reading-valuev"
  title: "Первинне джерело: Валуєвський циркуляр"
  source: "Петро Валуєв (1863)"
  text: "...окремої малоросійської мови не було, немає і бути не може, і наріччя їхнє, вживане простолюдом, є та ж російська мова, тільки зіпсована впливом на неї Польщі..."
  instruction: "Прочитайте уривок з таємного розпорядження міністра внутрішніх справ Російської імперії."

- type: critical-analysis
  source_reading: "reading-valuev"
  title: "Аналіз імперського наративу"
  instruction: "Проаналізуйте наведений текст Валуєвського циркуляру."
  questions:
    - "Які аргументи використовував Валуєв для заперечення існування української мови?"
    - "Чому імперія вважала українську мову зіпсованою російською?"
  model_answers:
    - "Валуєв стверджував, що українська мова є зіпсованою через польський вплив, повністю ігноруючи її самостійний історичний розвиток."
    - "Це було типовим колоніальним виправданням: оголосити мову підкореного народу неповноцінною, щоб легітимізувати русифікацію."
  focus_points:
    - "лінгвоцид"
    - "колоніальна політика"

- type: comparative-study
  title: "Порівняння імперських політик"
  instruction: "Порівняйте умови розвитку українського руху в двох імперіях."
  items_to_compare:
    - "Російська імперія"
    - "Австрійська імперія"
  criteria:
    - "Адміністративний статус українських земель"
    - "Мовна політика"
    - "Можливості для легальної політичної діяльності"
  prompt: "Проаналізуйте, чому Галичина отримала назву український П'ємонт, порівнюючи її статус із Наддніпрянщиною."
  model_answer: "У Росії українські землі були перетворені на безправні губернії, діяв жорсткий лінгвоцид (Емський указ), а політична діяльність була заборонена. В Австрії статус коронного краю та наявність парламенту дозволили українцям створювати легальні партії та розбудовувати освіту, що зробило Галичину центром національного відродження."

- type: true-false
  title: "Механізми панування та опір"
  instruction: "Визначте, чи є наведені твердження правильними."
  items:
    - statement: "Російська імперія використовувала інкорпорацію як інструмент поглинання українських земель."
      correct: true
      explanation: "Інкорпорація супроводжувалася скасуванням місцевого права та нав'язуванням загальноімперських законів."
    - statement: "Валуєвський циркуляр заборонив усі без винятку україномовні видання, включно з художньою літературою."
      correct: false
      explanation: "Валуєвський циркуляр 1863 року забороняв релігійні та навчальні книги, тоді як тотальну заборону ввів Емський указ 1876 року."
    - statement: "У складі Австрійської імперії українські землі мали статус губерній."
      correct: false
      explanation: "В Австрійській імперії українські землі входили до складу коронних країв, а губернії існували в Росії."
    - statement: "Індустріалізація Півдня України проводилася в першу чергу для збагачення місцевого населення."
      correct: false
      explanation: "Це була колоніальна експлуатація: ресурси викачувалися на користь імперського центру."
    - statement: "Кирило-Мефодіївське братство було однією з перших організацій, що політично осмислила окремішність українців."
      correct: true
      explanation: "Братчики висували ідеї федералізму та широкої автономії."
    - statement: "Термін Новоросія використовувався імперією для стирання пам'яті про козацьке минуле Степу."
      correct: true
      explanation: "Це був інструмент колоніального перейменування та конструювання нової лояльної ідентичності."
    - statement: "Першою українською політичною партією стала Революційна українська партія у Києві."
      correct: false
      explanation: "Першою була Русько-українська радикальна партія, створена 1890 року в Галичині."
    - statement: "Товариство Просвіта виникло у Львові як відповідь на потребу в освіті широких мас."
      correct: true
      explanation: "Масовий рух читалень став фундаментом для національного пробудження в Галичині."
    - statement: "Микола Міхновський у своїй брошурі закликав до культурної автономії України в складі Росії."
      correct: false
      explanation: "Брошура Міхновського Самостійна Україна вимагала повної державної незалежності."
    - statement: "Емський указ забороняв навіть ввезення україномовних книг з-за кордону."
      correct: true
      explanation: "Цей указ став інструментом тотального лінгвоциду, забороняючи друк, театр і ноти."
    - statement: "Греко-католицька церква відіграла значну роль у збереженні національної ідентичності в Росії."
      correct: false
      explanation: "Церква зберегла вплив саме в Галичині, а в російській частині була ліквідована."
    - statement: "Скасування кріпацтва в Росії супроводжувалося безкоштовною передачею землі селянам."
      correct: false
      explanation: "Селяни отримували волю, але залишалися в економічній залежності через викупні платежі."

- type: essay-response
  title: "Наслідки імперської доби"
  instruction: "Напишіть розгорнуте есе, спираючись на матеріали лекції."
  prompt: "Як перебування у складі двох різних імперій вплинуло на формування модерної української нації? Чи згодні ви з метафорою про алмаз під тиском щодо українського національного руху?"
  min_words: 250
  model_answer: "Імперська доба стала визначальною для українців. З одного боку, російський колоніалізм та лінгвоцид гальмували розвиток, насаджуючи комплекс меншовартості. З іншого боку, цей жорсткий тиск викликав потужний спротив: від культурницьких громад до радикальних політичних партій. Розділеність земель дозволила використати ліберальніші умови Австрійської імперії для збереження ідентичності. Саме цей синтез досвідів парламентської боротьби в Галичині та радикального підпілля в Наддніпрянщині сформував життєздатну політичну націю до початку революції."
  rubric:
    - criteria: "Теоретична база"
      description: "Використання понять: лінгвоцид, автономія, інкорпорація, колоніалізм"
      points: 5
    - criteria: "Аргументація"
      description: "Наведення конкретних історичних прикладів (укази, братства, партії)"
      points: 5