- type: reading
  id: reading-90s-crisis
  title: "Первинне джерело: Економіка виживання"
  source: "Історичні свідчення про 1990-ті роки"
  text: |
    Проголошення незалежності викликало велику хвилю ейфорії серед населення. Люди сподівалися на потужний промисловий потенціал, проте розрив традиційних зв'язків призвів до катастрофічного шоку. У 1993 році рівень інфляції перевищив 10 000 відсотків на рік. Гроші знецінювалися настільки швидко, що ціни могли змінюватися тричі на день. Мільйони українців були змушені стати дрібними приватними торговцями, так званими човниками. Тим часом колишні партійні керівники великих підприємств доводили їх до банкрутства і дешево скуповували акції, перетворюючись на впливових капіталістів. Так утворилася кланово-олігархічна система.

- type: true-false
  title: "Аналіз фактів: Епоха дев'яностих"
  instruction: "Прочитайте твердження та визначте, чи відповідають вони історичним фактам."
  items:
    - statement: "У 1993 році інфляція в Україні була однією з найнижчих у світі."
      correct: false
      explanation: "Україна встановила світовий рекорд інфляції, яка перевищила 10 000 відсотків."
    - statement: "Кравчучка стала популярним символом епохи човникової торгівлі та виживання."
      correct: true
      explanation: "Цей візок допомагав перевозити великі вантажі дрібним торговцям."
    - statement: "Приватизація в Україні швидко створила потужний і заможний середній клас."
      correct: false
      explanation: "Більшість людей продавали свої ваучери за копійки, а майно сконцентрувалося в руках директорів."
    - statement: "Леонід Кучма виграв вибори 1994 року завдяки обіцянкам надати російській мові статус державної."
      correct: true
      explanation: "Він будував кампанію на популістській проросійській риториці."
    - statement: "Україна зберегла свій ядерний арсенал для захисту територіальної цілісності."
      correct: false
      explanation: "Україна відмовилася від ядерної зброї в обмін на Будапештський меморандум у 1994 році."
    - statement: "Нова Конституція України була прийнята швидко і без жодних суперечок у парламенті."
      correct: false
      explanation: "Конституцію ухвалили після виснажливої конституційної ночі та гострого протистояння."
    - statement: "Політика багатовекторності сприяла швидкому та прямому вступу України до Європейського Союзу."
      correct: false
      explanation: "Вона перетворила Україну на буферну зону між Заходом та Росією."
    - statement: "Касетний скандал був пов'язаний з оприлюдненням записів із кабінету президента Кучми."
      correct: true
      explanation: "Ці записи показали, що найвищі чиновники використовували кримінальні методи."
    - statement: "Акція Україна без Кучми стала першим великим суто політичним протестом."
      correct: true
      explanation: "Люди вийшли на вулиці з політичними вимогами, а не лише через соціальні проблеми."
    - statement: "Керівництво незалежної України провело жорстку люстрацію колишніх працівників КДБ."
      correct: false
      explanation: "Люстрації не було, і старі кадри зберегли свої посади, що сприяло корупції."

- type: critical-analysis
  title: "Критичний аналіз: Народження олігархату"
  source_reading: reading-90s-crisis
  instruction: "Проаналізуйте наведені запитання щодо формування олігархічної системи."
  questions:
    - "Як саме економічна криза та гіперінфляція сприяли успіху тіньових схем приватизації?"
    - "Чому колишні партійні керівники мали перевагу над звичайними робітниками під час розподілу державного майна?"
    - "Яким чином капітал новоутворених кланів почав перетворюватися на політичний вплив у державі?"

- type: comparative-study
  title: "Порівняльний аналіз: Економічні стратегії"
  instruction: "Порівняйте два підходи до економічних перетворень у посткомуністичних країнах."
  items_to_compare:
    - "Шокова терапія в Польщі"
    - "Повільне вмирання економіки в Україні"
  criteria:
    - "Швидкість та глибина ринкових реформ"
    - "Вплив на формування середнього класу"
    - "Рівень концентрації багатства в руках олігархів"

- type: essay-response
  title: "Есе: Довготривалі наслідки епохи"
  source_reading: reading-90s-crisis
  prompt: "Спираючись на історичні факти та зміст лекції, поясніть, як відсутність справедливої люстрації та масштабні корупційні схеми 1990-х років вплинули на подальший політичний і економічний розвиток України. Чому цей період вважають ключовим для розуміння наступних революцій?"
  min_words: 250
  rubric:
    - criteria: "Історична аргументація"
      description: "Есе має спиратися на конкретні факти з епохи 1990-х років, такі як касетний скандал чи ваучерна приватизація."
      points: 40
    - criteria: "Критичний аналіз причин і наслідків"
      description: "Глибоко розкритий зв'язок між відсутністю люстрації та формуванням стійкої олігархічної системи."
      points: 40
    - criteria: "Стилістика та грамотність"
      description: "Текст написаний публіцистичним стилем, без русизмів, з правильним використанням історичної лексики."
      points: 20