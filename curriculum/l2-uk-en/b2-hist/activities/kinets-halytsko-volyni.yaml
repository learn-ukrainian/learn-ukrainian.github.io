- type: reading
  id: reading-dlughosh
  title: 'Первинне джерело: Свідчення Яна Длугоша'
  text: Король Казимир, дізнавшись про смерть князя руського Болеслава, негайно рушив
    на Русь і знайшовши там величезні скарби, забрав їх.
  tasks:
  - Яку справжню мету польського походу можна виділити з цього історичного тексту?
  - Як іноземний хроніст описує дії свого монарха на території ослабленої сусідньої
    держави?
- type: true-false
  title: 'Перевірте знання: Причини та події 1340 року'
  items:
  - statement: Криза династії Романовичів почалася відразу після смерті короля Данила.
    correct: false
    explanation: Криза почалася після одночасної загибелі князів Андрія та Лева ІІ
      у 1323 році, коли обірвалася пряма чоловіча лінія.
  - statement: Юрій ІІ Болеслав прийняв православну віру заради збереження своєї політичної
      легітимності.
    correct: true
    explanation: Цей необхідний маневр був обов'язковою умовою для того, щоб місцеве
      населення визнало його своїм правителем.
  - statement: Радикальна вестернізація держави Юрієм ІІ повністю підтримувалася галицькими
      консервативними боярами.
    correct: false
    explanation: Боярська еліта відчула загрозу своєму становищу і жорстко опиралася
      наданню привілеїв іноземцям.
  - statement: Першим містом, що отримало Магдебурзьке право від Юрія ІІ у 1339 році,
      став Сянок.
    correct: true
    explanation: Це означало включення міста до загальноєвропейського правового простору
      та незалежність від місцевих феодалів.
  - statement: Польські війська короля Казимира ІІІ зберегли королівський замок у
      Львові під час нападу.
    correct: false
    explanation: Під час несподіваного нападу 1340 року польські загони вчинили акт
      вандалізму і повністю спалили замок.
  - statement: Дмитро Дедько титулував себе князем і єдиним легітимним володарем Королівства
      Русі.
    correct: false
    explanation: Він реалістично оцінював ситуацію і титулував себе лише управителем
      або старостою Руської землі.
  - statement: Таємна Вишеградська угода передбачала поділ руських земель між Польщею
      та Литвою.
    correct: false
    explanation: Угода про майбутній поділ сфер впливу була укладена у 1339 році між
      Польщею та Угорщиною.
  - statement: Печатка князя Юрія ІІ містила напис латиною, який підкреслював його
      суверенність.
    correct: true
    explanation: Напис латиною Dei gratia natus dux et dominus Russiae був найвищим
      маркером політичної незалежності європейського монарха.
  - statement: Українське населення добровільно та без жодного спротиву прийняло владу
      іноземних правителів.
    correct: false
    explanation: Населення Галичини чинило загарбникам відчайдушний та масовий збройний
      опір.
  - statement: Отруєння Юрія ІІ стало детонатором для масштабного вторгнення армій
      сусідніх країн.
    correct: true
    explanation: Замість повернення влади боярству, смерть князя миттєво перетворила
      Русь на головне поле битви у Центральній Європі.
  instruction: Визначте, чи твердження правильне.
- type: critical-analysis
  title: 'Аналіз причинно-наслідкових зв''язків: Падіння держави'
  questions:
  - Як криза легітимності після загибелі останніх Романовичів у 1323 році створила
    сприятливі передумови для подальшого геополітичного вибуху?
  - Чому політичний курс на вестернізацію, обраний Юрієм ІІ Болеславом, призвів до
    загострення відносин з місцевою елітою та його отруєння?
  - Яким чином егоїзм та внутрішні чвари боярської олігархії сприяли швидкій втраті
    незалежності та окупації українських територій?
- type: critical-analysis
  title: Критична оцінка історичних міфів та стереотипів
  questions:
  - Чому традиційне твердження польської історіографії про мирне успадкування руських
    земель є класичним прикладом колоніального імперського міфу?
  - Як використання поняття сфер впливу допомагає розкрити справжні мотиви сусідніх
    монархів під час підписання Вишеградської угоди?
  - Що саме символізувало адміністративне пониження статусу територій від Королівства
    Русі до провінційної Червоної Русі?
  - Яким чином печатка князя Юрія ІІ з написом Божою милістю руйнує тезу про меншовартість
    чи залежність руської еліти?
  - Чому відсутність вітчизняних літописів після подій 1292 року змушує сучасних
    істориків критичніше ставитися до іноземних документальних джерел?
- type: essay-response
  title: 'Есе: Трагедія втраченої державності'
  prompt: Уявіть, що ви — впливовий галицький дипломат часів правління Дмитра Дедька.
    Напишіть розгорнутий аналіз подій, що призвели до розвалу держави після 1340 року.
    Оцініть фатальні помилки консервативного боярства та наслідки відсутності сильної
    центральної влади перед загрозою агресивної зовнішньої експансії з боку Польщі
    та Угорщини.
  rubric:
  - criteria: Історична достовірність
    description: Використання конкретних фактів, дат та згадок про ключові події (Вишеградська
      угода, отруєння Юрія ІІ, напад на Львів).
  - criteria: Аналітична глибина
    description: Детальне розкриття складної взаємодії між внутрішнім розколом еліти
      та неминучою зовнішньою агресією.
  - criteria: Деколонізаційний погляд
    description: Категоричне відкидання міфу про мирне об'єднання на користь визнання
      факту прямого військового загарбання.
