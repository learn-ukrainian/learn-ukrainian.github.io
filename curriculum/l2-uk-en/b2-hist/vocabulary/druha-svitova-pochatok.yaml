items:
  - lemma: "окупація"
    ipa: '[ɔkuˈpɑt͡sʲijɑ]'
    translation: "occupation"
    pos: "noun"
    gender: "f"
    example: "Радянська окупація Західної України почалася у 1939 році."
  - lemma: "пакт"
    ipa: '[pɑkt]'
    translation: "pact"
    pos: "noun"
    gender: "m"
    example: "Пакт Молотова-Ріббентропа гарантував Гітлеру нейтралітет СРСР."
  - lemma: "депортація"
    ipa: '[dɛpɔrˈtɑt͡sʲijɑ]'
    translation: "deportation"
    pos: "noun"
    gender: "f"
    example: "Масові депортації в Сибір стали трагедією для мільйонів людей."
  - lemma: "репресії"
    ipa: '[rɛˈprɛsʲiji]'
    translation: "repressions"
    pos: "noun"
    example: "Сталінські репресії знищили українську культурну еліту."
  - lemma: "радянізація"
    ipa: '[rɑdʲɑnʲiˈzɑt͡sʲijɑ]'
    translation: "Sovietization"
    pos: "noun"
    gender: "f"
    example: "Радянізація передбачала ліквідацію незалежних партій та організацій."
  - lemma: "вермахт"
    ipa: '[ˈʋɛrmɑxt]'
    translation: "Wehrmacht"
    pos: "noun"
    gender: "m"
    example: "Німецький вермахт перетнув кордон Радянського Союзу 22 червня."
  - lemma: "НКВС"
    ipa: '[nkʍs]'
    translation: "NKVD"
    pos: "noun"
    notes: "Народний комісаріат внутрішніх справ (радянська таємна поліція)."
  - lemma: "возз'єднання"
    ipa: '[ʋɔˈzːjɛdnɑnʲːɑ]'
    translation: "reunification"
    pos: "noun"
    gender: "n"
    notes: "Використовувалося радянською пропагандою для виправдання анексії."
  - lemma: "протокол"
    ipa: '[prɔtɔˈkɔl]'
    translation: "protocol"
    pos: "noun"
    gender: "m"
    example: "Таємний протокол передбачав поділ Європи на сфери впливу."
  - lemma: "анексія"
    ipa: '[ɑˈnɛksʲijɑ]'
    translation: "annexation"
    pos: "noun"
    gender: "f"
    example: "Анексія Північної Буковини відбулася у червні 1940 року."
  - lemma: "колаборація"
    ipa: '[kɔlɑbɔˈrɑt͡sʲijɑ]'
    translation: "collaboration"
    pos: "noun"
    gender: "f"
    example: "Деякі люди погоджувалися на колаборацію через страх за своє життя."
  - lemma: "евакуація"
    ipa: '[ɛʋɑkuˈɑt͡sʲijɑ]'
    translation: "evacuation"
    pos: "noun"
    gender: "f"
    example: "Евакуація заводів на схід проходила в умовах хаосу."
  - lemma: "партизан"
    ipa: '[pɑrtɪˈzɑn]'
    translation: "partisan"
    pos: "noun"
    gender: "m"
    example: "Радянські партизани діяли в тилу ворога."
  - lemma: "підпілля"
    ipa: '[pʲiˈdʲpʲilʲːɑ]'
    translation: "underground"
    pos: "noun"
    gender: "n"
    example: "Члени ОУН були змушені піти у глибоке підпілля."
  - lemma: "вторгнення"
    ipa: '[ˈʍtɔrɦnɛnʲːɑ]'
    translation: "invasion"
    pos: "noun"
    gender: "n"
    example: "Радянське вторгнення до Польщі розпочалося 17 вересня."
  - lemma: "розстріл"
    ipa: '[ˈrɔzstʲrʲil]'
    translation: "execution"
    pos: "noun"
    gender: "m"
    example: "Масовий розстріл політичних в'язнів відбувся перед відступом."
  - lemma: "міф"
    ipa: '[mʲif]'
    translation: "myth"
    pos: "noun"
    gender: "m"
    example: "Пропаганда створила міф про щасливе визволення."
  - lemma: "терор"
    ipa: '[tɛˈrɔr]'
    translation: "terror"
    pos: "noun"
    gender: "m"
    example: "Тоталітарний терор був спрямований проти мирного населення."
  - lemma: "тоталітаризм"
    ipa: '[tɔtɑlʲitɑˈrɪzm]'
    translation: "totalitarianism"
    pos: "noun"
    gender: "m"
    example: "Нацизм і комунізм — це дві форми тоталітаризму."
  - lemma: "мобілізація"
    ipa: '[mɔbʲilʲiˈzɑt͡sʲijɑ]'
    translation: "mobilization"
    pos: "noun"
    gender: "f"
    example: "Через хаос мобілізація перетворилася на трагедію для новобранців."
  - lemma: "катівня"
    ipa: '[kɑˈtʲiu̯nʲɑ]'
    translation: "torture chamber"
    pos: "noun"
    gender: "f"
    example: "Тюрма на Лонцького стала відомою як найстрашніша катівня НКВС."
  - lemma: "бездержавність"
    ipa: '[bɛzdɛrˈʒɑu̯nʲisʲtʲ]'
    translation: "statelessness"
    pos: "noun"
    gender: "f"
    example: "Трагедія бездержавності призвела до величезних людських втрат."
  - lemma: "суб'єктність"
    ipa: '[suˈbjɛktʲnʲisʲtʲ]'
    translation: "agency (historical)"
    pos: "noun"
    gender: "f"
    example: "Важливо повернути Україні її історичну суб'єктність."
  - lemma: "опір"
    ipa: '[ˈɔpʲir]'
    translation: "resistance"
    pos: "noun"
    gender: "m"
    example: "Український рух опору діяв проти обох окупаційних режимів."
  - lemma: "в'язень"
    ipa: '[ˈʋjɑzɛnʲ]'
    translation: "prisoner"
    pos: "noun"
    gender: "m"
    example: "Тисячі в'язнів були вбиті без суду і слідства."