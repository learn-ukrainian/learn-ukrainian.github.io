- term: слов'яни
  ipa: sloˈu̯jɑnɪ
  translation: Slavs
  definition: Група народів у Європі, що розмовляють слов'янськими мовами.
  usage: Слов'яни з'явилися на історичній арені у V столітті.

- term: праслов'яни
  ipa: prɑsloˈu̯jɑnɪ
  translation: Proto-Slavs
  definition: Спільні предки всіх слов'янських народів до їхнього розселення.
  usage: Праслов'яни тривалий час жили на спільній території між Віслою та Дніпром.

- term: прабатьківщина
  ipa: prɑbɑtʲˈkʲiu̯ʃt͡ʃɪnɑ
  translation: ancestral homeland
  definition: Територія первісного формування етносу або групи народів.
  usage: Питання про прабатьківщину слов'ян досі є предметом наукових дискусій.

- term: розселення
  ipa: rozˈsɛlɛnʲnʲɑ
  translation: settlement / expansion
  definition: Процес переміщення та зайняття нових територій великими групами людей.
  usage: Велике розселення слов'ян змінило карту ранньосередньовічної Європи.

- term: плем'я
  ipa: ˈplɛmʲɑ
  translation: tribe
  definition: Група людей, об'єднаних спільним походженням, мовою та територією.
  usage: Кожне слов'янське плем'я мало свого вождя та старійшин.

- term: язичництво
  ipa: jɑˈzɪt͡ʃnɪt͡stvo
  translation: paganism
  definition: Система релігійних вірувань, що ґрунтується на поклонінні багатьом богам та силам природи.
  usage: До прийняття християнства слов'яни сповідували язичництво.

- term: міграція
  ipa: miˈɦrɑt͡sijɑ
  translation: migration
  definition: Масове переміщення населення на нові території для постійного проживання.
  usage: Міграція антів на Балкани була частиною Великого переселення народів.

- term: народоправство
  ipa: nɑrodɔˈprɑu̯stvo
  translation: democracy / folk rule
  definition: Форма суспільного устрою, за якої влада належить народу та здійснюється через загальні збори.
  usage: Прокопій Кесарійський описував народоправство як основу життя слов'ян.

- term: віче
  ipa: ˈvit͡ʃe
  translation: viche / popular assembly
  definition: Народні збори у давніх слов'ян для вирішення важливих громадських справ.
  usage: На вічі всі вільні чоловіки мали право голосу.

- term: громада
  ipa: ɦroˈmɑdɑ
  translation: community
  definition: Об'єднання людей, пов'язаних спільним проживанням та спільними інтересами.
  usage: Громада була базовою ланкою антського суспільства.

- term: верв
  ipa: verv
  translation: verv / community organization
  definition: Територіальна громада у давніх слов'ян, члени якої несли спільну відповідальність.
  usage: Верв відповідала за безпеку та сплату податків на своїй землі.

- term: капище
  ipa: ˈkɑpɪʃt͡ʃe
  translation: pagan shrine
  definition: Місце поклоніння язичницьким богам, де стояли ідоли.
  usage: На горі було давнє капище Перуна.

- term: волхв
  ipa: u̯olxw
  translation: magi / pagan priest
  definition: Слов'янський язичницький жрець, охоронець давніх знань і ритуалів.
  usage: Волхв вважався посередником між людьми та богами.

- term: Перун
  ipa: peˈrun
  translation: Perun
  definition: Головний бог слов'янського пантеону, бог грому та блискавки.
  usage: Перун вважався покровителем князя та його дружини.

- term: Велес
  ipa: ˈwɛles
  translation: Veles
  definition: Слов'янський бог достатку, худоби та підземного світу.
  usage: Велес був одним із найбільш шанованих богів серед землеробів.

- term: тризна
  ipa: ˈtrɪzna
  translation: funeral feast
  definition: Обряд прощання з померлим, що включав поминальний обід та військові ігри.
  usage: Після битви воїни влаштували пишну тризну за загиблим вождем.

- term: землянка
  ipa: zemˈlʲɑnka
  translation: dugout / semi-subterranean dwelling
  definition: Житло, заглиблене в землю для кращої теплоізоляції.
  usage: Антські родини жили в теплих землянках із піччю-кам'янкою.

- term: соха
  ipa: soˈxɑ
  translation: wooden plow
  definition: Примітивне знаряддя для оранки землі, зроблене з дерева.
  usage: Землероби використовували соху для обробки лісових ділянок.

- term: рало
  ipa: ˈrɑlo
  translation: plow
  definition: Вдосконалене знаряддя для оранки, що мало залізний наконечник.
  usage: Залізне рало дозволяло ефективніше обробляти чорноземи.

- term: старійшина
  ipa: stɑˈrijʃɪnɑ
  translation: elder
  definition: Досвідчений та шанований член роду, що входив до ради управління.
  usage: Рада старійшин обмежувала одноосібну владу князя.

- term: дружина
  ipa: druˈʒɪnɑ
  translation: retinue / warband
  definition: Озброєний загін воїнів, що перебував на службі у князя.
  usage: Княжа дружина була професійним ядром антського війська.

- term: вождь
  ipa: u̯oʒdʲ
  translation: leader / chieftain
  definition: Голова племені або військового союзу, наділений владою.
  usage: Антський вождь Бож очолив спротив проти готів.

- term: данина
  ipa: dɑˈnɪnɑ
  translation: tribute
  definition: Натуральний або грошовий податок, який переможені сплачували сильнішим сусідам.
  usage: Візантійська імперія часто сплачувала антам данину за ненапад.

- term: автохтон
  ipa: au̯ˈtɔxton
  translation: autochthon / indigenous
  definition: Корінний житель певної території, який проживає на ній з давніх часів.
  usage: Українці є автохтонами на своїй землі, що підтверджується історією.

- term: топонім
  ipa: toˈpɔnim
  translation: toponym
  definition: Власна назва будь-якого географічного об'єкта.
  usage: Багато сучасних топонімів України мають давнє антське коріння.
