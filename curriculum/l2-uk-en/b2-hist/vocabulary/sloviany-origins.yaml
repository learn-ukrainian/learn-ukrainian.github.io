- term: 褋谢芯胁'褟薪懈
  ipa: '[sl蓴藞蕥j蓱n瑟]'
  ipa: slo藞u摊j蓱n瑟
  translation: Slavs
  definition: 袚褉褍锌邪 薪邪褉芯写褨胁 褍 袆胁褉芯锌褨, 褖芯 褉芯蟹屑芯胁谢褟褞褌褜 褋谢芯胁'褟薪褋褜泻懈屑懈 屑芯胁邪屑懈.
  usage: 小谢芯胁'褟薪懈 蟹'褟胁懈谢懈褋褟 薪邪 褨褋褌芯褉懈褔薪褨泄 邪褉械薪褨 褍 V 褋褌芯谢褨褌褌褨.

- term: 锌褉邪褋谢芯胁'褟薪懈
  ipa: '[pr蓱sl蓴u摊j蓱n瑟]'
  ipa: pr蓱slo藞u摊j蓱n瑟
  translation: Proto-Slavs
  definition: 小锌褨谢褜薪褨 锌褉械写泻懈 胁褋褨褏 褋谢芯胁'褟薪褋褜泻懈褏 薪邪褉芯写褨胁 写芯 褩褏薪褜芯谐芯 褉芯蟹褋械谢械薪薪褟.
  usage: 袩褉邪褋谢芯胁'褟薪懈 褌褉懈胁邪谢懈泄 褔邪褋 卸懈谢懈 薪邪 褋锌褨谢褜薪褨泄 褌械褉懈褌芯褉褨褩 屑褨卸 袙褨褋谢芯褞 褌邪 袛薪褨锌褉芯屑.

- term: 锌褉邪斜邪褌褜泻褨胁褖懈薪邪
  ipa: '[pr蓱藞b蓱t什k什iu摊蕛t汀蕛瑟n蓱]'
  ipa: pr蓱b蓱t什藞k什iu摊蕛t汀蕛瑟n蓱
  translation: ancestral homeland
  definition: 孝械褉懈褌芯褉褨褟 锌械褉胁褨褋薪芯谐芯 褎芯褉屑褍胁邪薪薪褟 械褌薪芯褋褍 邪斜芯 谐褉褍锌懈 薪邪褉芯写褨胁.
  usage: 袩懈褌邪薪薪褟 锌褉芯 锌褉邪斜邪褌褜泻褨胁褖懈薪褍 褋谢芯胁'褟薪 写芯褋褨 褦 锌褉械写屑械褌芯屑 薪邪褍泻芯胁懈褏 写懈褋泻褍褋褨泄.

- term: 褉芯蟹褋械谢械薪薪褟
  ipa: '[r蓴藞zs蓻l蓻n什藧蓱]'
  ipa: roz藞s蓻l蓻n什n什蓱
  translation: settlement / expansion
  definition: 袩褉芯褑械褋 锌械褉械屑褨褖械薪薪褟 褌邪 蟹邪泄薪褟褌褌褟 薪芯胁懈褏 褌械褉懈褌芯褉褨泄 胁械谢懈泻懈屑懈 谐褉褍锌邪屑懈 谢褞写械泄.
  usage: 袙械谢懈泻械 褉芯蟹褋械谢械薪薪褟 褋谢芯胁'褟薪 蟹屑褨薪懈谢芯 泻邪褉褌褍 褉邪薪薪褜芯褋械褉械写薪褜芯胁褨褔薪芯褩 袆胁褉芯锌懈.

- term: 锌谢械屑'褟
  ipa: '[藞pl蓻mj蓱]'
  ipa: 藞pl蓻m什蓱
  translation: tribe
  definition: 袚褉褍锌邪 谢褞写械泄, 芯斜'褦写薪邪薪懈褏 褋锌褨谢褜薪懈屑 锌芯褏芯写卸械薪薪褟屑, 屑芯胁芯褞 褌邪 褌械褉懈褌芯褉褨褦褞.
  usage: 袣芯卸薪械 褋谢芯胁'褟薪褋褜泻械 锌谢械屑'褟 屑邪谢芯 褋胁芯谐芯 胁芯卸写褟 褌邪 褋褌邪褉褨泄褕懈薪.

- term: 褟蟹懈褔薪懈褑褌胁芯
  ipa: '[j蓱藞z瑟t汀蕛n瑟t汀st蕥蓴]'
  ipa: j蓱藞z瑟t汀蕛n瑟t汀stvo
  translation: paganism
  definition: 小懈褋褌械屑邪 褉械谢褨谐褨泄薪懈褏 胁褨褉褍胁邪薪褜, 褖芯 覒褉褍薪褌褍褦褌褜褋褟 薪邪 锌芯泻谢芯薪褨薪薪褨 斜邪谐邪褌褜芯屑 斜芯谐邪屑 褌邪 褋懈谢邪屑 锌褉懈褉芯写懈.
  usage: 袛芯 锌褉懈泄薪褟褌褌褟 褏褉懈褋褌懈褟薪褋褌胁邪 褋谢芯胁'褟薪懈 褋锌芯胁褨写褍胁邪谢懈 褟蟹懈褔薪懈褑褌胁芯.

- term: 屑褨谐褉邪褑褨褟
  ipa: '[m什i藞搔r蓱t汀s什ij蓱]'
  ipa: mi藞搔r蓱t汀sij蓱
  translation: migration
  definition: 袦邪褋芯胁械 锌械褉械屑褨褖械薪薪褟 薪邪褋械谢械薪薪褟 薪邪 薪芯胁褨 褌械褉懈褌芯褉褨褩 写谢褟 锌芯褋褌褨泄薪芯谐芯 锌褉芯卸懈胁邪薪薪褟.
  usage: 袦褨谐褉邪褑褨褟 邪薪褌褨胁 薪邪 袘邪谢泻邪薪懈 斜褍谢邪 褔邪褋褌懈薪芯褞 袙械谢懈泻芯谐芯 锌械褉械褋械谢械薪薪褟 薪邪褉芯写褨胁.

- term: 薪邪褉芯写芯锌褉邪胁褋褌胁芯
  ipa: '[n蓱r蓴d蓴藞pr蓱u摊st蕥蓴]'
  ipa: n蓱rod蓴藞pr蓱u摊stvo
  translation: democracy / folk rule
  definition: 肖芯褉屑邪 褋褍褋锌褨谢褜薪芯谐芯 褍褋褌褉芯褞, 蟹邪 褟泻芯褩 胁谢邪写邪 薪邪谢械卸懈褌褜 薪邪褉芯写褍 褌邪 蟹写褨泄褋薪褞褦褌褜褋褟 褔械褉械蟹 蟹邪谐邪谢褜薪褨 蟹斜芯褉懈.
  usage: 袩褉芯泻芯锌褨泄 袣械褋邪褉褨泄褋褜泻懈泄 芯锌懈褋褍胁邪胁 薪邪褉芯写芯锌褉邪胁褋褌胁芯 褟泻 芯褋薪芯胁褍 卸懈褌褌褟 褋谢芯胁'褟薪.

- term: 胁褨褔械
  ipa: '[藞蕥什it汀蕛蓻]'
  ipa: 藞vit汀蕛e
  translation: viche / popular assembly
  definition: 袧邪褉芯写薪褨 蟹斜芯褉懈 褍 写邪胁薪褨褏 褋谢芯胁'褟薪 写谢褟 胁懈褉褨褕械薪薪褟 胁邪卸谢懈胁懈褏 谐褉芯屑邪写褋褜泻懈褏 褋锌褉邪胁.
  usage: 袧邪 胁褨褔褨 胁褋褨 胁褨谢褜薪褨 褔芯谢芯胁褨泻懈 屑邪谢懈 锌褉邪胁芯 谐芯谢芯褋褍.

- term: 谐褉芯屑邪写邪
  ipa: '[搔r蓴藞m蓱d蓱]'
  ipa: 搔ro藞m蓱d蓱
  translation: community
  definition: 袨斜'褦写薪邪薪薪褟 谢褞写械泄, 锌芯胁'褟蟹邪薪懈褏 褋锌褨谢褜薪懈屑 锌褉芯卸懈胁邪薪薪褟屑 褌邪 褋锌褨谢褜薪懈屑懈 褨薪褌械褉械褋邪屑懈.
  usage: 袚褉芯屑邪写邪 斜褍谢邪 斜邪蟹芯胁芯褞 谢邪薪泻芯褞 邪薪褌褋褜泻芯谐芯 褋褍褋锌褨谢褜褋褌胁邪.

- term: 胁械褉胁
  ipa: '[蕥蓻r蕥]'
  ipa: verv
  translation: verv / community organization
  definition: 孝械褉懈褌芯褉褨邪谢褜薪邪 谐褉芯屑邪写邪 褍 写邪胁薪褨褏 褋谢芯胁'褟薪, 褔谢械薪懈 褟泻芯褩 薪械褋谢懈 褋锌褨谢褜薪褍 胁褨写锌芯胁褨写邪谢褜薪褨褋褌褜.
  usage: 袙械褉胁 胁褨写锌芯胁褨写邪谢邪 蟹邪 斜械蟹锌械泻褍 褌邪 褋锌谢邪褌褍 锌芯写邪褌泻褨胁 薪邪 褋胁芯褩泄 蟹械屑谢褨.

- term: 泻邪锌懈褖械
  ipa: '[藞k蓱p瑟蕛t汀蕛蓻]'
  ipa: 藞k蓱p瑟蕛t汀蕛e
  translation: pagan shrine
  definition: 袦褨褋褑械 锌芯泻谢芯薪褨薪薪褟 褟蟹懈褔薪懈褑褜泻懈屑 斜芯谐邪屑, 写械 褋褌芯褟谢懈 褨写芯谢懈.
  usage: 袧邪 谐芯褉褨 斜褍谢芯 写邪胁薪褦 泻邪锌懈褖械 袩械褉褍薪邪.

- term: 胁芯谢褏胁
  ipa: '[蕥蓴lx蕥]'
  ipa: u摊olxw
  translation: magi / pagan priest
  definition: 小谢芯胁'褟薪褋褜泻懈泄 褟蟹懈褔薪懈褑褜泻懈泄 卸褉械褑褜, 芯褏芯褉芯薪械褑褜 写邪胁薪褨褏 蟹薪邪薪褜 褨 褉懈褌褍邪谢褨胁.
  usage: 袙芯谢褏胁 胁胁邪卸邪胁褋褟 锌芯褋械褉械写薪懈泻芯屑 屑褨卸 谢褞写褜屑懈 褌邪 斜芯谐邪屑懈.

- term: 袩械褉褍薪
  ipa: '[p蓻藞run]'
  ipa: pe藞run
  translation: Perun
  definition: 袚芯谢芯胁薪懈泄 斜芯谐 褋谢芯胁'褟薪褋褜泻芯谐芯 锌邪薪褌械芯薪褍, 斜芯谐 谐褉芯屑褍 褌邪 斜谢懈褋泻邪胁泻懈.
  usage: 袩械褉褍薪 胁胁邪卸邪胁褋褟 锌芯泻褉芯胁懈褌械谢械屑 泻薪褟蟹褟 褌邪 泄芯谐芯 写褉褍卸懈薪懈.

- term: 袙械谢械褋
  ipa: '[藞蕥蓻l蓻s]'
  ipa: 藞w蓻les
  translation: Veles
  definition: 小谢芯胁'褟薪褋褜泻懈泄 斜芯谐 写芯褋褌邪褌泻褍, 褏褍写芯斜懈 褌邪 锌褨写蟹械屑薪芯谐芯 褋胁褨褌褍.
  usage: 袙械谢械褋 斜褍胁 芯写薪懈屑 褨蟹 薪邪泄斜褨谢褜褕 褕邪薪芯胁邪薪懈褏 斜芯谐褨胁 褋械褉械写 蟹械屑谢械褉芯斜褨胁.

- term: 褌褉懈蟹薪邪
  ipa: '[藞tr瑟zn蓱]'
  ipa: 藞tr瑟zna
  translation: funeral feast
  definition: 袨斜褉褟写 锌褉芯褖邪薪薪褟 蟹 锌芯屑械褉谢懈屑, 褖芯 胁泻谢褞褔邪胁 锌芯屑懈薪邪谢褜薪懈泄 芯斜褨写 褌邪 胁褨泄褋褜泻芯胁褨 褨谐褉懈.
  usage: 袩褨褋谢褟 斜懈褌胁懈 胁芯褩薪懈 胁谢邪褕褌褍胁邪谢懈 锌懈褕薪褍 褌褉懈蟹薪褍 蟹邪 蟹邪谐懈斜谢懈屑 胁芯卸写械屑.

- term: 蟹械屑谢褟薪泻邪
  ipa: '[z蓻藞ml什蓱nk蓱]'
  ipa: zem藞l什蓱nka
  translation: dugout / semi-subterranean dwelling
  definition: 袞懈褌谢芯, 蟹邪谐谢懈斜谢械薪械 胁 蟹械屑谢褞 写谢褟 泻褉邪褖芯褩 褌械锌谢芯褨蟹芯谢褟褑褨褩.
  usage: 袗薪褌褋褜泻褨 褉芯写懈薪懈 卸懈谢懈 胁 褌械锌谢懈褏 蟹械屑谢褟薪泻邪褏 褨蟹 锌褨褔褔褞-泻邪屑'褟薪泻芯褞.

- term: 褋芯褏邪
  ipa: '[s蓴藞x蓱]'
  ipa: so藞x蓱
  translation: wooden plow
  definition: 袩褉懈屑褨褌懈胁薪械 蟹薪邪褉褟写写褟 写谢褟 芯褉邪薪泻懈 蟹械屑谢褨, 蟹褉芯斜谢械薪械 蟹 写械褉械胁邪.
  usage: 袟械屑谢械褉芯斜懈 胁懈泻芯褉懈褋褌芯胁褍胁邪谢懈 褋芯褏褍 写谢褟 芯斜褉芯斜泻懈 谢褨褋芯胁懈褏 写褨谢褟薪芯泻.

- term: 褉邪谢芯
  ipa: '[藞r蓱l蓴]'
  ipa: 藞r蓱lo
  translation: plow
  definition: 袙写芯褋泻芯薪邪谢械薪械 蟹薪邪褉褟写写褟 写谢褟 芯褉邪薪泻懈, 褖芯 屑邪谢芯 蟹邪谢褨蟹薪懈泄 薪邪泻芯薪械褔薪懈泻.
  usage: 袟邪谢褨蟹薪械 褉邪谢芯 写芯蟹胁芯谢褟谢芯 械褎械泻褌懈胁薪褨褕械 芯斜褉芯斜谢褟褌懈 褔芯褉薪芯蟹械屑懈.

- term: 褋褌邪褉褨泄褕懈薪邪
  ipa: '[st蓱藞r什ij蕛瑟n蓱]'
  ipa: st蓱藞rij蕛瑟n蓱
  translation: elder
  definition: 袛芯褋胁褨写褔械薪懈泄 褌邪 褕邪薪芯胁邪薪懈泄 褔谢械薪 褉芯写褍, 褖芯 胁褏芯写懈胁 写芯 褉邪写懈 褍锌褉邪胁谢褨薪薪褟.
  usage: 袪邪写邪 褋褌邪褉褨泄褕懈薪 芯斜屑械卸褍胁邪谢邪 芯写薪芯芯褋褨斜薪褍 胁谢邪写褍 泻薪褟蟹褟.

- term: 写褉褍卸懈薪邪
  ipa: '[dru藞蕭瑟n蓱]'
  ipa: dru藞蕭瑟n蓱
  translation: retinue / warband
  definition: 袨蟹斜褉芯褦薪懈泄 蟹邪谐褨薪 胁芯褩薪褨胁, 褖芯 锌械褉械斜褍胁邪胁 薪邪 褋谢褍卸斜褨 褍 泻薪褟蟹褟.
  usage: 袣薪褟卸邪 写褉褍卸懈薪邪 斜褍谢邪 锌褉芯褎械褋褨泄薪懈屑 褟写褉芯屑 邪薪褌褋褜泻芯谐芯 胁褨泄褋褜泻邪.

- term: 胁芯卸写褜
  ipa: '[蕥蓴蕭d什]'
  ipa: u摊o蕭d什
  translation: leader / chieftain
  definition: 袚芯谢芯胁邪 锌谢械屑械薪褨 邪斜芯 胁褨泄褋褜泻芯胁芯谐芯 褋芯褞蟹褍, 薪邪写褨谢械薪懈泄 胁谢邪写芯褞.
  usage: 袗薪褌褋褜泻懈泄 胁芯卸写褜 袘芯卸 芯褔芯谢懈胁 褋锌褉芯褌懈胁 锌褉芯褌懈 谐芯褌褨胁.

- term: 写邪薪懈薪邪
  ipa: '[d蓱藞n瑟n蓱]'
  ipa: d蓱藞n瑟n蓱
  translation: tribute
  definition: 袧邪褌褍褉邪谢褜薪懈泄 邪斜芯 谐褉芯褕芯胁懈泄 锌芯写邪褌芯泻, 褟泻懈泄 锌械褉械屑芯卸械薪褨 褋锌谢邪褔褍胁邪谢懈 褋懈谢褜薪褨褕懈屑 褋褍褋褨写邪屑.
  usage: 袙褨蟹邪薪褌褨泄褋褜泻邪 褨屑锌械褉褨褟 褔邪褋褌芯 褋锌谢邪褔褍胁邪谢邪 邪薪褌邪屑 写邪薪懈薪褍 蟹邪 薪械薪邪锌邪写.

- term: 邪胁褌芯褏褌芯薪
  ipa: '[蓱u摊t蓴藞xt蓴n]'
  ipa: au摊藞t蓴xton
  translation: autochthon / indigenous
  definition: 袣芯褉褨薪薪懈泄 卸懈褌械谢褜 锌械胁薪芯褩 褌械褉懈褌芯褉褨褩, 褟泻懈泄 锌褉芯卸懈胁邪褦 薪邪 薪褨泄 蟹 写邪胁薪褨褏 褔邪褋褨胁.
  usage: 校泻褉邪褩薪褑褨 褦 邪胁褌芯褏褌芯薪邪屑懈 薪邪 褋胁芯褩泄 蟹械屑谢褨, 褖芯 锌褨写褌胁械褉写卸褍褦褌褜褋褟 褨褋褌芯褉褨褦褞.

- term: 褌芯锌芯薪褨屑
  ipa: '[t蓴藞p蓴n什im]'
  ipa: to藞p蓴nim
  translation: toponym
  definition: 袙谢邪褋薪邪 薪邪蟹胁邪 斜褍写褜-褟泻芯谐芯 谐械芯谐褉邪褎褨褔薪芯谐芯 芯斜'褦泻褌邪.
  usage: 袘邪谐邪褌芯 褋褍褔邪褋薪懈褏 褌芯锌芯薪褨屑褨胁 校泻褉邪褩薪懈 屑邪褞褌褜 写邪胁薪褦 邪薪褌褋褜泻械 泻芯褉褨薪薪褟.
