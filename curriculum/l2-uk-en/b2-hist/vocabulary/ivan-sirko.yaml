items:
  - lemma: "кошовий отаман"
    translation: "elected leader / koshovyi otaman"
    pos: "noun"
    gender: "m"
    notes: "Рекордсмен Сірко обирався на цю посаду до 15 разів."
  - lemma: "Січ"
    translation: "fortress / stronghold"
    pos: "noun"
    gender: "f"
    notes: "Центр козацької демократії та автономії."
  - lemma: "Руїна"
    translation: "The Ruin / period of civil wars"
    pos: "noun"
    gender: "f"
    notes: "Контекст діяльності Сірка у 1660-1680-х роках."
  - lemma: "ясир"
    translation: "captives / slaves taken by Tatars"
    pos: "noun"
    gender: "m"
    notes: "Головною метою походів Сірка було визволення ясиру."
  - lemma: "характерник"
    translation: "sorcerer-warrior / cossack-wizard"
    pos: "noun"
    gender: "m"
    notes: "Людина з надзвичайними здібностями; елітний воїн."
  - lemma: "клейноди"
    translation: "insignia / symbols of power"
    pos: "noun"
    notes: "Булава була головним символом влади отамана."
  - lemma: "орда"
    translation: "horde / army"
    pos: "noun"
    gender: "f"
    notes: "Кримське військо, яке було постійним супротивником козаків."
  - lemma: "літопис"
    translation: "chronicle / historical record"
    pos: "noun"
    gender: "m"
    notes: "Наприклад, Літопис Самійла Величка."
  - lemma: "зимівник"
    translation: "winter settlement / farmstead"
    pos: "noun"
    gender: "m"
    notes: "Місце мирної смерті Сірка в Грушівці."
  - lemma: "старшина"
    translation: "officers / military elite"
    pos: "noun"
    gender: "f"
    notes: "Оточення кошового отамана."
  - lemma: "бусурманин"
    translation: "infidel / non-Christian"
    pos: "noun"
    gender: "m"
    notes: "Історичний термін для позначення османів і татар."
  - lemma: "ятаган"
    translation: "Turkish saber / yatagan"
    pos: "noun"
    gender: "m"
    notes: "Трофейна холодна зброя козаків."
  - lemma: "демонізація"
    translation: "demonization"
    pos: "noun"
    gender: "f"
    notes: "Процес створення страхітливого іміджу, наприклад, Урус-Шайтан."
  - lemma: "бранець"
    translation: "captive / prisoner"
    pos: "noun"
    gender: "m"
    notes: "Християни, захоплені в полон під час татарських набігів."
  - lemma: "містифікація"
    translation: "mystification / hoax"
    pos: "noun"
    gender: "f"
    notes: "Наприклад, текст листа султанові."
  - lemma: "пасіка"
    translation: "apiary / beehive farm"
    pos: "noun"
    gender: "f"
    notes: "Місце, де Іван Сірко провів свої останні дні."
  - lemma: "череп"
    translation: "skull"
    pos: "noun"
    gender: "m"
    notes: "Останки Сірка, які були вилучені та пізніше повернуті в Україну."
  - lemma: "ультиматум"
    translation: "ultimatum"
    pos: "noun"
    gender: "m"
    notes: "Категорична вимога, як-от від турецького султана."
  - lemma: "аскетизм"
    translation: "asceticism"
    pos: "noun"
    gender: "m"
    notes: "Скромний спосіб життя кошового отамана."
  - lemma: "присяга"
    translation: "oath of allegiance"
    pos: "noun"
    gender: "f"
    notes: "Обіцянка вірності, яку Сірко відмовився давати царю."
  - lemma: "рейд"
    translation: "raid"
    pos: "noun"
    gender: "m"
    notes: "Блискавичний військовий напад."
  - lemma: "розвідка"
    translation: "reconnaissance / intelligence"
    pos: "noun"
    gender: "f"
    notes: "Збір інформації про супротивника."
  - lemma: "суверенний"
    translation: "sovereign"
    pos: "adjective"
    notes: "Незалежний у своїх діях суб'єкт."
  - lemma: "експансія"
    translation: "expansion"
    pos: "noun"
    gender: "f"
    notes: "Територіальне розширення імперій."
  - lemma: "компроміс"
    translation: "compromise"
    pos: "noun"
    gender: "m"
    notes: "Взаємна поступка заради досягнення мети."