items:
  - lemma: "泻芯褕芯胁懈泄 芯褌邪屑邪薪"
    ipa: '[k蓴蕛蓴藞蕥瑟j 蓴藞t蓱m蓱n]'
    translation: "elected leader / koshovyi otaman"
    pos: "noun"
    gender: "m"
    notes: "袪械泻芯褉写褋屑械薪 小褨褉泻芯 芯斜懈褉邪胁褋褟 薪邪 褑褞 锌芯褋邪写褍 写芯 15 褉邪蟹褨胁."
  - lemma: "小褨褔"
    ipa: '[s什it汀蕛]'
    translation: "fortress / stronghold"
    pos: "noun"
    gender: "f"
    notes: "笑械薪褌褉 泻芯蟹邪褑褜泻芯褩 写械屑芯泻褉邪褌褨褩 褌邪 邪胁褌芯薪芯屑褨褩."
  - lemma: "袪褍褩薪邪"
    ipa: '[ru藞jin蓱]'
    translation: "The Ruin / period of civil wars"
    pos: "noun"
    gender: "f"
    notes: "袣芯薪褌械泻褋褌 写褨褟谢褜薪芯褋褌褨 小褨褉泻邪 褍 1660-1680-褏 褉芯泻邪褏."
  - lemma: "褟褋懈褉"
    ipa: '[j蓱藞s瑟r]'
    translation: "captives / slaves taken by Tatars"
    pos: "noun"
    gender: "m"
    notes: "袚芯谢芯胁薪芯褞 屑械褌芯褞 锌芯褏芯写褨胁 小褨褉泻邪 斜褍谢芯 胁懈蟹胁芯谢械薪薪褟 褟褋懈褉褍."
  - lemma: "褏邪褉邪泻褌械褉薪懈泻"
    ipa: '[x蓱r蓱藞kt蓻rn瑟k]'
    translation: "sorcerer-warrior / cossack-wizard"
    pos: "noun"
    gender: "m"
    notes: "袥褞写懈薪邪 蟹 薪邪写蟹胁懈褔邪泄薪懈屑懈 蟹写褨斜薪芯褋褌褟屑懈; 械谢褨褌薪懈泄 胁芯褩薪."
  - lemma: "泻谢械泄薪芯写懈"
    ipa: '[kl蓻j藞n蓴d瑟]'
    translation: "insignia / symbols of power"
    pos: "noun"
    notes: "袘褍谢邪胁邪 斜褍谢邪 谐芯谢芯胁薪懈屑 褋懈屑胁芯谢芯屑 胁谢邪写懈 芯褌邪屑邪薪邪."
  - lemma: "芯褉写邪"
    ipa: '[蓴r藞d蓱]'
    translation: "horde / army"
    pos: "noun"
    gender: "f"
    notes: "袣褉懈屑褋褜泻械 胁褨泄褋褜泻芯, 褟泻械 斜褍谢芯 锌芯褋褌褨泄薪懈屑 褋褍锌褉芯褌懈胁薪懈泻芯屑 泻芯蟹邪泻褨胁."
  - lemma: "谢褨褌芯锌懈褋"
    ipa: '[l什i藞t蓴p瑟s]'
    translation: "chronicle / historical record"
    pos: "noun"
    gender: "m"
    notes: "袧邪锌褉懈泻谢邪写, 袥褨褌芯锌懈褋 小邪屑褨泄谢邪 袙械谢懈褔泻邪."
  - lemma: "蟹懈屑褨胁薪懈泻"
    ipa: '[z瑟m什iu摊n瑟k]'
    translation: "winter settlement / farmstead"
    pos: "noun"
    gender: "m"
    notes: "袦褨褋褑械 屑懈褉薪芯褩 褋屑械褉褌褨 小褨褉泻邪 胁 袚褉褍褕褨胁褑褨."
  - lemma: "褋褌邪褉褕懈薪邪"
    ipa: '[st蓱r藞蕛瑟n蓱]'
    translation: "officers / military elite"
    pos: "noun"
    gender: "f"
    notes: "袨褌芯褔械薪薪褟 泻芯褕芯胁芯谐芯 芯褌邪屑邪薪邪."
  - lemma: "斜褍褋褍褉屑邪薪懈薪"
    ipa: '[busurm蓱n瑟n]'
    translation: "infidel / non-Christian"
    pos: "noun"
    gender: "m"
    notes: "袉褋褌芯褉懈褔薪懈泄 褌械褉屑褨薪 写谢褟 锌芯蟹薪邪褔械薪薪褟 芯褋屑邪薪褨胁 褨 褌邪褌邪褉."
  - lemma: "褟褌邪谐邪薪"
    ipa: '[j蓱t蓱藞搔蓱n]'
    translation: "Turkish saber / yatagan"
    pos: "noun"
    gender: "m"
    notes: "孝褉芯褎械泄薪邪 褏芯谢芯写薪邪 蟹斜褉芯褟 泻芯蟹邪泻褨胁."
  - lemma: "写械屑芯薪褨蟹邪褑褨褟"
    ipa: '[d蓻m蓴n什i藞z蓱t汀s什ij蓱]'
    translation: "demonization"
    pos: "noun"
    gender: "f"
    notes: "袩褉芯褑械褋 褋褌胁芯褉械薪薪褟 褋褌褉邪褏褨褌谢懈胁芯谐芯 褨屑褨写卸褍, 薪邪锌褉懈泻谢邪写, 校褉褍褋-楔邪泄褌邪薪."
  - lemma: "斜褉邪薪械褑褜"
    ipa: '[藞br蓱n蓻t汀s什]'
    translation: "captive / prisoner"
    pos: "noun"
    gender: "m"
    notes: "啸褉懈褋褌懈褟薪懈, 蟹邪褏芯锌谢械薪褨 胁 锌芯谢芯薪 锌褨写 褔邪褋 褌邪褌邪褉褋褜泻懈褏 薪邪斜褨谐褨胁."
  - lemma: "屑褨褋褌懈褎褨泻邪褑褨褟"
    ipa: '[m什ist瑟f什i藞k蓱t汀s什ij蓱]'
    translation: "mystification / hoax"
    pos: "noun"
    gender: "f"
    notes: "袧邪锌褉懈泻谢邪写, 褌械泻褋褌 谢懈褋褌邪 褋褍谢褌邪薪芯胁褨."
  - lemma: "锌邪褋褨泻邪"
    ipa: '[藞p蓱s什ik蓱]'
    translation: "apiary / beehive farm"
    pos: "noun"
    gender: "f"
    notes: "袦褨褋褑械, 写械 袉胁邪薪 小褨褉泻芯 锌褉芯胁褨胁 褋胁芯褩 芯褋褌邪薪薪褨 写薪褨."
  - lemma: "褔械褉械锌"
    ipa: '[藞t汀蕛蓻r蓻p]'
    translation: "skull"
    pos: "noun"
    gender: "m"
    notes: "袨褋褌邪薪泻懈 小褨褉泻邪, 褟泻褨 斜褍谢懈 胁懈谢褍褔械薪褨 褌邪 锌褨蟹薪褨褕械 锌芯胁械褉薪褍褌褨 胁 校泻褉邪褩薪褍."
  - lemma: "褍谢褜褌懈屑邪褌褍屑"
    ipa: '[ul什t瑟藞m蓱tum]'
    translation: "ultimatum"
    pos: "noun"
    gender: "m"
    notes: "袣邪褌械谐芯褉懈褔薪邪 胁懈屑芯谐邪, 褟泻-芯褌 胁褨写 褌褍褉械褑褜泻芯谐芯 褋褍谢褌邪薪邪."
  - lemma: "邪褋泻械褌懈蟹屑"
    ipa: '[蓱sk蓻藞t瑟zm]'
    translation: "asceticism"
    pos: "noun"
    gender: "m"
    notes: "小泻褉芯屑薪懈泄 褋锌芯褋褨斜 卸懈褌褌褟 泻芯褕芯胁芯谐芯 芯褌邪屑邪薪邪."
  - lemma: "锌褉懈褋褟谐邪"
    ipa: '[pr瑟藞s什蓱搔蓱]'
    translation: "oath of allegiance"
    pos: "noun"
    gender: "f"
    notes: "袨斜褨褑褟薪泻邪 胁褨褉薪芯褋褌褨, 褟泻褍 小褨褉泻芯 胁褨写屑芯胁懈胁褋褟 写邪胁邪褌懈 褑邪褉褞."
  - lemma: "褉械泄写"
    ipa: '[r蓻jd]'
    translation: "raid"
    pos: "noun"
    gender: "m"
    notes: "袘谢懈褋泻邪胁懈褔薪懈泄 胁褨泄褋褜泻芯胁懈泄 薪邪锌邪写."
  - lemma: "褉芯蟹胁褨写泻邪"
    ipa: '[r蓴z什蕥什idk蓱]'
    translation: "reconnaissance / intelligence"
    pos: "noun"
    gender: "f"
    notes: "袟斜褨褉 褨薪褎芯褉屑邪褑褨褩 锌褉芯 褋褍锌褉芯褌懈胁薪懈泻邪."
  - lemma: "褋褍胁械褉械薪薪懈泄"
    ipa: '[su蕥蓻藞r蓻n藧瑟j]'
    translation: "sovereign"
    pos: "adjective"
    notes: "袧械蟹邪谢械卸薪懈泄 褍 褋胁芯褩褏 写褨褟褏 褋褍斜'褦泻褌."
  - lemma: "械泻褋锌邪薪褋褨褟"
    ipa: '[蓻藞ksp蓱n什s什ij蓱]'
    translation: "expansion"
    pos: "noun"
    gender: "f"
    notes: "孝械褉懈褌芯褉褨邪谢褜薪械 褉芯蟹褕懈褉械薪薪褟 褨屑锌械褉褨泄."
  - lemma: "泻芯屑锌褉芯屑褨褋"
    ipa: '[k蓴mpr蓴藞m什is]'
    translation: "compromise"
    pos: "noun"
    gender: "m"
    notes: "袙蟹邪褦屑薪邪 锌芯褋褌褍锌泻邪 蟹邪褉邪写懈 写芯褋褟谐薪械薪薪褟 屑械褌懈."