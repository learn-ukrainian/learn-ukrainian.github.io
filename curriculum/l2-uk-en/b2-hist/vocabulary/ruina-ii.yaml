items:
  - lemma: "протекторат"
    translation: "protectorate"
    pos: "noun"
    gender: "m"
    notes: "A political and military alliance where a stronger state protects a weaker one, maintaining its internal autonomy."
  - lemma: "сюзеренітет"
    translation: "suzerainty"
    pos: "noun"
    gender: "m"
    notes: "The nominal paramount authority of a monarch over a dependent state."
  - lemma: "капітуляція"
    translation: "capitulation"
    pos: "noun"
    gender: "f"
    notes: "Surrender; the act of yielding power or territory."
  - lemma: "облога"
    translation: "siege"
    pos: "noun"
    gender: "f"
    notes: "A military operation in which enemy forces surround a town or building."
  - lemma: "данина"
    translation: "tribute"
    pos: "noun"
    gender: "f"
    notes: "Wealth or payment given by one state to another as a sign of submission."
  - lemma: "васал"
    translation: "vassal"
    pos: "noun"
    gender: "m"
    notes: "A subordinate ruler or state; Doroshenko avoided this status."
  - lemma: "руйнація"
    translation: "destruction, ruin"
    pos: "noun"
    gender: "f"
    notes: "The era of the Ruin in 17th-century Ukraine."
  - lemma: "чвари"
    translation: "strife, discord"
    pos: "noun"
    notes: "Used only in plural; refers to internal conflicts among the elite."
  - lemma: "сердюк"
    translation: "serdyuk, mercenary guardsman"
    pos: "noun"
    gender: "m"
    notes: "Professional infantry mercenary loyal to the Hetman."
  - lemma: "соборність"
    translation: "sobornist, unity"
    pos: "noun"
    gender: "f"
    notes: "The concept of an undivided, unified national territory."
  - lemma: "булава"
    translation: "mace"
    pos: "noun"
    gender: "f"
    notes: "A symbol of highest military and political authority."
  - lemma: "універсал"
    translation: "universal, decree"
    pos: "noun"
    gender: "m"
    notes: "An official decree or proclamation issued by a Hetman."
  - lemma: "яничар"
    translation: "janissary"
    pos: "noun"
    gender: "m"
    notes: "Elite Ottoman infantry."
  - lemma: "експансія"
    translation: "expansion"
    pos: "noun"
    gender: "f"
    notes: "Territorial or political expansion."
  - lemma: "старшина"
    translation: "starshyna, officers"
    pos: "noun"
    gender: "f"
    notes: "The Cossack elite or officer corps."
  - lemma: "перемир'я"
    translation: "truce, armistice"
    pos: "noun"
    gender: "n"
    notes: "A temporary suspension of hostilities."
  - lemma: "найманець"
    translation: "mercenary"
    pos: "noun"
    gender: "m"
    notes: "A soldier fighting for pay."
  - lemma: "опозиція"
    translation: "opposition"
    pos: "noun"
    gender: "f"
    notes: "Political resistance or opponents."
  - lemma: "гарнізон"
    translation: "garrison"
    pos: "noun"
    gender: "m"
    notes: "Troops stationed in a fortress or town."
  - lemma: "цитадель"
    translation: "citadel"
    pos: "noun"
    gender: "f"
    notes: "The core fortified area of a town or castle."
  - lemma: "заслання"
    translation: "exile"
    pos: "noun"
    gender: "n"
    notes: "Banishment from one's native land."
  - lemma: "суверен"
    translation: "sovereign"
    pos: "noun"
    gender: "m"
    notes: "A supreme ruler acting independently."
  - lemma: "літописець"
    translation: "chronicler"
    pos: "noun"
    gender: "m"
    notes: "An author of historical chronicles."
  - lemma: "клейноди"
    translation: "insignia"
    pos: "noun"
    notes: "Used mainly in plural; symbols of Cossack authority."
  - lemma: "анархія"
    translation: "anarchy"
    pos: "noun"
    gender: "f"
    notes: "A state of disorder due to absence or nonrecognition of authority."