items:
  - lemma: "芯锌褉懈褕芯泻"
    ipa: '[蓴藞pr瑟蕛蓴k]'
    translation: "opryshok (Carpathian rebel)"
    pos: "noun"
    usage: "锌褨褌懈 胁 芯锌褉懈褕泻懈"
  - lemma: "胁邪褌邪谐邪"
    ipa: '[蕥蓱藞t蓱搔蓱]'
    translation: "band, group"
    pos: "noun"
    usage: "芯锌褉懈褕泻褨胁褋褜泻邪 胁邪褌邪谐邪"
  - lemma: "斜邪褉褌泻邪"
    ipa: '[藞b蓱rtk蓱]'
    translation: "Carpathian axe"
    pos: "noun"
    notes: "褋懈屑胁芯谢 胁谢邪写懈 褨 褔械褋褌褨"
  - lemma: "谢械谐褨薪褜"
    ipa: '[藞l蓻搔什in什]'
    translation: "young man (dialect)"
    pos: "noun"
    notes: "谐褍褑褍谢褜褋褜泻懈泄 褏谢芯锌械褑褜"
  - lemma: "锌芯谢芯薪懈薪邪"
    ipa: '[p蓴l蓴藞n瑟n蓱]'
    translation: "mountain pasture"
    pos: "noun"
    notes: "屑褨褋褑械 胁懈锌邪褋褍 褌邪 斜邪蟹邪 锌芯胁褋褌邪薪褑褨胁"
  - lemma: "谐褍褑褍谢"
    ipa: '[搔u藞t汀sul]'
    translation: "Hutsul"
    pos: "noun"
    notes: "械褌薪芯谐褉邪褎褨褔薪邪 谐褉褍锌邪 褍泻褉邪褩薪褑褨胁 袣邪褉锌邪褌"
  - lemma: "袣邪褉锌邪褌懈"
    ipa: '[k蓱r藞p蓱t瑟]'
    translation: "Carpathian mountains"
    pos: "noun"
    notes: "锌褉懈褉芯写薪邪 褎芯褉褌械褑褟"
  - lemma: "蟹褉邪写邪"
    ipa: '[藞zr蓱d蓱]'
    translation: "betrayal"
    pos: "noun"
  - lemma: "褋泻邪褉斜"
    ipa: '[sk蓱rb]'
    translation: "treasure"
    pos: "noun"
    usage: "褕褍泻邪褌懈 褋泻邪褉斜"
  - lemma: "胁邪褌邪卸芯泻"
    ipa: '[蕥蓱t蓱藞蕭蓴k]'
    translation: "leader, chieftain"
    pos: "noun"
  - lemma: "屑械褋薪懈泻"
    ipa: '[藞m蓻sn瑟k]'
    translation: "avenger"
    pos: "noun"
    usage: "薪邪褉芯写薪懈泄 屑械褋薪懈泻"
  - lemma: "泻褉褨锌邪泻"
    ipa: '[kr什i藞p蓱k]'
    translation: "serf"
    pos: "noun"
  - lemma: "褕谢褟褏褌邪"
    ipa: '[藞蕛l什蓱xt蓱]'
    translation: "nobility"
    pos: "noun"
  - lemma: "屑芯谢褜褎邪褉"
    ipa: '[m蓴l什藞f蓱r]'
    translation: "shaman, sorcerer"
    pos: "noun"
    notes: "泻邪褉锌邪褌褋褜泻懈泄 褔邪泻谢褍薪"
  - lemma: "褋锌褉芯褌懈胁"
    ipa: '[藞spr蓴t瑟u摊]'
    translation: "resistance"
    pos: "noun"
    usage: "蟹斜褉芯泄薪懈泄 褋锌褉芯褌懈胁"
  - lemma: "褉芯蟹斜褨泄薪懈褑褌胁芯"
    ipa: '[r蓴藞z什b什ijn瑟t汀st蕥蓴]'
    translation: "banditry, robbery"
    pos: "noun"
    notes: "褋芯褑褨邪谢褜薪械 褉芯蟹斜褨泄薪懈褑褌胁芯"
  - lemma: "谐薪褨褌"
    ipa: '[搔n什it]'
    translation: "oppression"
    pos: "noun"
    usage: "褋芯褑褨邪谢褜薪懈泄 谐薪褨褌"
  - lemma: "锌邪薪褖懈薪邪"
    ipa: '[藞p蓱n蕛t汀蕛瑟n蓱]'
    translation: "corv茅e, serfdom labor"
    pos: "noun"
  - lemma: "谐褨写薪褨褋褌褜"
    ipa: '[藞搔什id什n什is什t什]'
    translation: "dignity"
    pos: "noun"
    usage: "谢褞写褋褜泻邪 谐褨写薪褨褋褌褜"
  - lemma: "胁懈褌褉懈胁邪谢褨褋褌褜"
    ipa: '[蕥瑟tr瑟藞蕥蓱l什is什t什]'
    translation: "endurance, stamina"
    pos: "noun"
    usage: "褎褨蟹懈褔薪邪 胁懈褌褉懈胁邪谢褨褋褌褜"
  - lemma: "褋懈薪泻褉械褌懈蟹屑"
    ipa: '[s瑟nkr蓻藞t瑟zm]'
    translation: "syncretism"
    pos: "noun"
    notes: "褉械谢褨谐褨泄薪懈泄 褋懈薪泻褉械褌懈蟹屑"
  - lemma: "蟹薪邪褏邪褉"
    ipa: '[藞zn蓱x蓱r]'
    translation: "healer, herb doctor"
    pos: "noun"
  - lemma: "卸懈胁懈褑褟"
    ipa: '[蕭瑟藞蕥瑟t汀s什蓱]'
    translation: "resin"
    pos: "noun"
    notes: "锌褉懈褉芯写薪懈泄 邪薪褌懈褋械锌褌懈泻"
  - lemma: "褉芯蟹胁褨写薪懈褑褟"
    ipa: '[r蓴z什蕥什idn瑟t汀s什蓱]'
    translation: "female scout"
    pos: "noun"
  - lemma: "褔械褌胁械褉褌褍胁邪薪薪褟"
    ipa: '[t汀蕛蓻t蕥蓻rtu藞蕥蓱n什藧蓱]'
    translation: "quartering (execution method)"
    pos: "noun"