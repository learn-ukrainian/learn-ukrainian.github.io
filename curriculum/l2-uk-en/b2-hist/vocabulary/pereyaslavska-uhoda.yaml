items:
  - lemma: "протекторат"
    translation: "protectorate"
    pos: "noun"
    gender: "m"
    example: "Хмельницький був змушений прийняти протекторат московського царя для порятунку держави."
  - lemma: "присяга"
    translation: "oath"
    pos: "noun"
    gender: "f"
    example: "Козацька старшина складала односторонню присягу з надзвичайно важким серцем."
  - lemma: "стаття"
    translation: "article"
    pos: "noun"
    gender: "f"
    example: "Березневі статті юридично гарантували збереження військового реєстру та прав."
  - lemma: "автономія"
    translation: "autonomy"
    pos: "noun"
    gender: "f"
    example: "Військо Запорозьке зберігало внутрішню судову та фінансову автономію."
  - lemma: "легітимність"
    translation: "legitimacy"
    pos: "noun"
    gender: "f"
    example: "Відмова Запорізької Січі завдала удару по легітимності Переяславської ради."
  - lemma: "суб'єктність"
    translation: "political agency"
    pos: "noun"
    gender: "f"
    example: "Уклавши Раднотський договір, Україна повернула собі міжнародну суб'єктність."
  - lemma: "возз'єднання"
    translation: "reunification"
    pos: "noun"
    gender: "n"
    example: "Міф про возз'єднання активно пропагувався тоталітарним режимом."
  - lemma: "деколонізація"
    translation: "decolonization"
    pos: "noun"
    gender: "f"
    example: "Справжня деколонізація вимагає відмови від імперських історичних наративів."
  - lemma: "зрада"
    translation: "betrayal / treason"
    pos: "noun"
    gender: "f"
    example: "Віленське перемир'я стало неприхованою зрадою з боку Москви."
  - lemma: "союзник"
    translation: "ally"
    pos: "noun"
    gender: "m"
    example: "Український гетьман намагався знайти надійного стратегічного союзника."
  - lemma: "васалітет"
    translation: "vassalage"
    pos: "noun"
    gender: "m"
    example: "Турецький васалітет був би сприйнятий населенням як релігійне відступництво."
  - lemma: "самодержець"
    translation: "autocrat"
    pos: "noun"
    gender: "m"
    example: "Східний самодержець мав абсолютну та безконтрольну владу."
  - lemma: "клятвопорушення"
    translation: "perjury / oath-breaking"
    pos: "noun"
    gender: "n"
    example: "Цар швидко довів свою здатність до цинічного клятвопорушення."
  - lemma: "облога"
    translation: "siege"
    pos: "noun"
    gender: "f"
    example: "Жванецька облога закінчилася зовсім не так, як планував гетьман."
  - lemma: "віроломство"
    translation: "treachery / perfidy"
    pos: "noun"
    gender: "n"
    example: "Кримський хан здійснив акт жорстокого віроломства під час війни."
  - lemma: "ясир"
    translation: "captives / slaves"
    pos: "noun"
    gender: "m"
    example: "Татари отримали ганебний дозвіл брати ясир на українських землях."
  - lemma: "деспотія"
    translation: "despotism"
    pos: "noun"
    gender: "f"
    example: "Московська деспотія ніколи не рахувалася з правами звичайних людей."
  - lemma: "реєстр"
    translation: "register"
    pos: "noun"
    gender: "m"
    example: "Офіційний реєстр армії складав небачені на той час шістдесят тисяч осіб."
  - lemma: "шляхта"
    translation: "nobility"
    pos: "noun"
    gender: "f"
    example: "Українська шляхта зберегла за собою всі традиційні земельні маєтності."
  - lemma: "духовенство"
    translation: "clergy"
    pos: "noun"
    gender: "n"
    example: "Освічене православне духовенство виступило проти московського диктату."
  - lemma: "магістрат"
    translation: "magistrate / city council"
    pos: "noun"
    gender: "m"
    example: "Київський магістрат продовжував керувати містом за магдебурзьким правом."
  - lemma: "міщанин"
    translation: "burgher / townsman"
    pos: "noun"
    gender: "m"
    example: "Міщанин мав право на справедливий суд за законами свого міста."
  - lemma: "перемир'я"
    translation: "truce / armistice"
    pos: "noun"
    gender: "n"
    example: "Сепаратне Віленське перемир'я врятувало Річ Посполиту від повного знищення."
  - lemma: "опозиція"
    translation: "opposition"
    pos: "noun"
    gender: "f"
    example: "Козацька опозиція базувалася на розумінні наслідків авторитаризму."
  - lemma: "фальсифікація"
    translation: "falsification"
    pos: "noun"
    gender: "f"
    example: "Московські дипломати часто вдавалися до зухвалої фальсифікації документів."