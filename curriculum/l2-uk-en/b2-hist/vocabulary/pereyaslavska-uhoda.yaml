items:
  - lemma: "锌褉芯褌械泻褌芯褉邪褌"
    ipa: '[pr蓴t蓻kt蓴藞r蓱t]'
    translation: "protectorate"
    pos: "noun"
    gender: "m"
    example: "啸屑械谢褜薪懈褑褜泻懈泄 斜褍胁 蟹屑褍褕械薪懈泄 锌褉懈泄薪褟褌懈 锌褉芯褌械泻褌芯褉邪褌 屑芯褋泻芯胁褋褜泻芯谐芯 褑邪褉褟 写谢褟 锌芯褉褟褌褍薪泻褍 写械褉卸邪胁懈."
  - lemma: "锌褉懈褋褟谐邪"
    ipa: '[pr瑟藞s什蓱搔蓱]'
    translation: "oath"
    pos: "noun"
    gender: "f"
    example: "袣芯蟹邪褑褜泻邪 褋褌邪褉褕懈薪邪 褋泻谢邪写邪谢邪 芯写薪芯褋褌芯褉芯薪薪褞 锌褉懈褋褟谐褍 蟹 薪邪写蟹胁懈褔邪泄薪芯 胁邪卸泻懈屑 褋械褉褑械屑."
  - lemma: "褋褌邪褌褌褟"
    ipa: '[st蓱藞t什藧蓱]'
    translation: "article"
    pos: "noun"
    gender: "f"
    example: "袘械褉械蟹薪械胁褨 褋褌邪褌褌褨 褞褉懈写懈褔薪芯 谐邪褉邪薪褌褍胁邪谢懈 蟹斜械褉械卸械薪薪褟 胁褨泄褋褜泻芯胁芯谐芯 褉械褦褋褌褉褍 褌邪 锌褉邪胁."
  - lemma: "邪胁褌芯薪芯屑褨褟"
    ipa: '[蓱u摊t蓴藞n蓴m什ij蓱]'
    translation: "autonomy"
    pos: "noun"
    gender: "f"
    example: "袙褨泄褋褜泻芯 袟邪锌芯褉芯蟹褜泻械 蟹斜械褉褨谐邪谢芯 胁薪褍褌褉褨褕薪褞 褋褍写芯胁褍 褌邪 褎褨薪邪薪褋芯胁褍 邪胁褌芯薪芯屑褨褞."
  - lemma: "谢械谐褨褌懈屑薪褨褋褌褜"
    ipa: '[l蓻搔什i藞t瑟mn什is什t什]'
    translation: "legitimacy"
    pos: "noun"
    gender: "f"
    example: "袙褨写屑芯胁邪 袟邪锌芯褉褨蟹褜泻芯褩 小褨褔褨 蟹邪胁写邪谢邪 褍写邪褉褍 锌芯 谢械谐褨褌懈屑薪芯褋褌褨 袩械褉械褟褋谢邪胁褋褜泻芯褩 褉邪写懈."
  - lemma: "褋褍斜'褦泻褌薪褨褋褌褜"
    ipa: '[su藞bj蓻kt什n什is什t什]'
    translation: "political agency"
    pos: "noun"
    gender: "f"
    example: "校泻谢邪胁褕懈 袪邪写薪芯褌褋褜泻懈泄 写芯谐芯胁褨褉, 校泻褉邪褩薪邪 锌芯胁械褉薪褍谢邪 褋芯斜褨 屑褨卸薪邪褉芯写薪褍 褋褍斜'褦泻褌薪褨褋褌褜."
  - lemma: "胁芯蟹蟹'褦写薪邪薪薪褟"
    ipa: '[蕥蓴藞z藧j蓻dn蓱n什藧蓱]'
    translation: "reunification"
    pos: "noun"
    gender: "n"
    example: "袦褨褎 锌褉芯 胁芯蟹蟹'褦写薪邪薪薪褟 邪泻褌懈胁薪芯 锌褉芯锌邪谐褍胁邪胁褋褟 褌芯褌邪谢褨褌邪褉薪懈屑 褉械卸懈屑芯屑."
  - lemma: "写械泻芯谢芯薪褨蟹邪褑褨褟"
    ipa: '[d蓻k蓴l蓴n什i藞z蓱t汀s什ij蓱]'
    translation: "decolonization"
    pos: "noun"
    gender: "f"
    example: "小锌褉邪胁卸薪褟 写械泻芯谢芯薪褨蟹邪褑褨褟 胁懈屑邪谐邪褦 胁褨写屑芯胁懈 胁褨写 褨屑锌械褉褋褜泻懈褏 褨褋褌芯褉懈褔薪懈褏 薪邪褉邪褌懈胁褨胁."
  - lemma: "蟹褉邪写邪"
    ipa: '[藞zr蓱d蓱]'
    translation: "betrayal / treason"
    pos: "noun"
    gender: "f"
    example: "袙褨谢械薪褋褜泻械 锌械褉械屑懈褉'褟 褋褌邪谢芯 薪械锌褉懈褏芯胁邪薪芯褞 蟹褉邪写芯褞 蟹 斜芯泻褍 袦芯褋泻胁懈."
  - lemma: "褋芯褞蟹薪懈泻"
    ipa: '[s蓴藞juzn瑟k]'
    translation: "ally"
    pos: "noun"
    gender: "m"
    example: "校泻褉邪褩薪褋褜泻懈泄 谐械褌褜屑邪薪 薪邪屑邪谐邪胁褋褟 蟹薪邪泄褌懈 薪邪写褨泄薪芯谐芯 褋褌褉邪褌械谐褨褔薪芯谐芯 褋芯褞蟹薪懈泻邪."
  - lemma: "胁邪褋邪谢褨褌械褌"
    ipa: '[蕥蓱s蓱l什i藞t蓻t]'
    translation: "vassalage"
    pos: "noun"
    gender: "m"
    example: "孝褍褉械褑褜泻懈泄 胁邪褋邪谢褨褌械褌 斜褍胁 斜懈 褋锌褉懈泄薪褟褌懈泄 薪邪褋械谢械薪薪褟屑 褟泻 褉械谢褨谐褨泄薪械 胁褨写褋褌褍锌薪懈褑褌胁芯."
  - lemma: "褋邪屑芯写械褉卸械褑褜"
    ipa: '[s蓱m蓴藞d蓻r蕭蓻t汀s什]'
    translation: "autocrat"
    pos: "noun"
    gender: "m"
    example: "小褏褨写薪懈泄 褋邪屑芯写械褉卸械褑褜 屑邪胁 邪斜褋芯谢褞褌薪褍 褌邪 斜械蟹泻芯薪褌褉芯谢褜薪褍 胁谢邪写褍."
  - lemma: "泻谢褟褌胁芯锌芯褉褍褕械薪薪褟"
    ipa: '[kl什蓱t蕥蓴p蓴藞ru蕛蓻n什藧蓱]'
    translation: "perjury / oath-breaking"
    pos: "noun"
    gender: "n"
    example: "笑邪褉 褕胁懈写泻芯 写芯胁褨胁 褋胁芯褞 蟹写邪褌薪褨褋褌褜 写芯 褑懈薪褨褔薪芯谐芯 泻谢褟褌胁芯锌芯褉褍褕械薪薪褟."
  - lemma: "芯斜谢芯谐邪"
    ipa: '[蓴藞bl蓴搔蓱]'
    translation: "siege"
    pos: "noun"
    gender: "f"
    example: "袞胁邪薪械褑褜泻邪 芯斜谢芯谐邪 蟹邪泻褨薪褔懈谢邪褋褟 蟹芯胁褋褨屑 薪械 褌邪泻, 褟泻 锌谢邪薪褍胁邪胁 谐械褌褜屑邪薪."
  - lemma: "胁褨褉芯谢芯屑褋褌胁芯"
    ipa: '[蕥什ir蓴藞l蓴mst蕥蓴]'
    translation: "treachery / perfidy"
    pos: "noun"
    gender: "n"
    example: "袣褉懈屑褋褜泻懈泄 褏邪薪 蟹写褨泄褋薪懈胁 邪泻褌 卸芯褉褋褌芯泻芯谐芯 胁褨褉芯谢芯屑褋褌胁邪 锌褨写 褔邪褋 胁褨泄薪懈."
  - lemma: "褟褋懈褉"
    ipa: '[j蓱藞s瑟r]'
    translation: "captives / slaves"
    pos: "noun"
    gender: "m"
    example: "孝邪褌邪褉懈 芯褌褉懈屑邪谢懈 谐邪薪械斜薪懈泄 写芯蟹胁褨谢 斜褉邪褌懈 褟褋懈褉 薪邪 褍泻褉邪褩薪褋褜泻懈褏 蟹械屑谢褟褏."
  - lemma: "写械褋锌芯褌褨褟"
    ipa: '[d蓻sp蓴藞t什ij蓱]'
    translation: "despotism"
    pos: "noun"
    gender: "f"
    example: "袦芯褋泻芯胁褋褜泻邪 写械褋锌芯褌褨褟 薪褨泻芯谢懈 薪械 褉邪褏褍胁邪谢邪褋褟 蟹 锌褉邪胁邪屑懈 蟹胁懈褔邪泄薪懈褏 谢褞写械泄."
  - lemma: "褉械褦褋褌褉"
    ipa: '[r蓻藞j蓻str]'
    translation: "register"
    pos: "noun"
    gender: "m"
    example: "袨褎褨褑褨泄薪懈泄 褉械褦褋褌褉 邪褉屑褨褩 褋泻谢邪写邪胁 薪械斜邪褔械薪褨 薪邪 褌芯泄 褔邪褋 褕褨褋褌写械褋褟褌 褌懈褋褟褔 芯褋褨斜."
  - lemma: "褕谢褟褏褌邪"
    ipa: '[藞蕛l什蓱xt蓱]'
    translation: "nobility"
    pos: "noun"
    gender: "f"
    example: "校泻褉邪褩薪褋褜泻邪 褕谢褟褏褌邪 蟹斜械褉械谐谢邪 蟹邪 褋芯斜芯褞 胁褋褨 褌褉邪写懈褑褨泄薪褨 蟹械屑械谢褜薪褨 屑邪褦褌薪芯褋褌褨."
  - lemma: "写褍褏芯胁械薪褋褌胁芯"
    ipa: '[dux蓴藞蕥蓻nst蕥蓴]'
    translation: "clergy"
    pos: "noun"
    gender: "n"
    example: "袨褋胁褨褔械薪械 锌褉邪胁芯褋谢邪胁薪械 写褍褏芯胁械薪褋褌胁芯 胁懈褋褌褍锌懈谢芯 锌褉芯褌懈 屑芯褋泻芯胁褋褜泻芯谐芯 写懈泻褌邪褌褍."
  - lemma: "屑邪谐褨褋褌褉邪褌"
    ipa: '[m蓱搔什i藞str蓱t]'
    translation: "magistrate / city council"
    pos: "noun"
    gender: "m"
    example: "袣懈褩胁褋褜泻懈泄 屑邪谐褨褋褌褉邪褌 锌褉芯写芯胁卸褍胁邪胁 泻械褉褍胁邪褌懈 屑褨褋褌芯屑 蟹邪 屑邪谐写械斜褍褉蟹褜泻懈屑 锌褉邪胁芯屑."
  - lemma: "屑褨褖邪薪懈薪"
    ipa: '[m什i蕛t汀蕛蓱藞n瑟n]'
    translation: "burgher / townsman"
    pos: "noun"
    gender: "m"
    example: "袦褨褖邪薪懈薪 屑邪胁 锌褉邪胁芯 薪邪 褋锌褉邪胁械写谢懈胁懈泄 褋褍写 蟹邪 蟹邪泻芯薪邪屑懈 褋胁芯谐芯 屑褨褋褌邪."
  - lemma: "锌械褉械屑懈褉'褟"
    ipa: '[p蓻r蓻藞m瑟rj蓱]'
    translation: "truce / armistice"
    pos: "noun"
    gender: "n"
    example: "小械锌邪褉邪褌薪械 袙褨谢械薪褋褜泻械 锌械褉械屑懈褉'褟 胁褉褟褌褍胁邪谢芯 袪褨褔 袩芯褋锌芯谢懈褌褍 胁褨写 锌芯胁薪芯谐芯 蟹薪懈褖械薪薪褟."
  - lemma: "芯锌芯蟹懈褑褨褟"
    ipa: '[蓴p蓴藞z瑟t汀s什ij蓱]'
    translation: "opposition"
    pos: "noun"
    gender: "f"
    example: "袣芯蟹邪褑褜泻邪 芯锌芯蟹懈褑褨褟 斜邪蟹褍胁邪谢邪褋褟 薪邪 褉芯蟹褍屑褨薪薪褨 薪邪褋谢褨写泻褨胁 邪胁褌芯褉懈褌邪褉懈蟹屑褍."
  - lemma: "褎邪谢褜褋懈褎褨泻邪褑褨褟"
    ipa: '[f蓱l什s瑟f什i藞k蓱t汀s什ij蓱]'
    translation: "falsification"
    pos: "noun"
    gender: "f"
    example: "袦芯褋泻芯胁褋褜泻褨 写懈锌谢芯屑邪褌懈 褔邪褋褌芯 胁写邪胁邪谢懈褋褟 写芯 蟹褍褏胁邪谢芯褩 褎邪谢褜褋懈褎褨泻邪褑褨褩 写芯泻褍屑械薪褌褨胁."