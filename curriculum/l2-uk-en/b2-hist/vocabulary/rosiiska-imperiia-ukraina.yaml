items:
  - lemma: "Великий Луг"
    translation: "Great Meadow"
    pos: "noun"
    gender: "m"
    notes: "Historical name for the Zaporizhzhia region; a symbol of freedom."
  - lemma: "зимівник"
    translation: "winter settlement"
    pos: "noun"
    gender: "m"
    notes: "A Cossack farmstead; the foundation of their economy."
  - lemma: "паланка"
    translation: "district"
    pos: "noun"
    gender: "f"
    notes: "An administrative unit of the Zaporozhian Sich (e.g., Kodatska palanka)."
  - lemma: "слобода"
    translation: "tax-free settlement"
    pos: "noun"
    gender: "f"
    notes: "A free settlement; learners often confuse it with the abstract concept of freedom."
  - lemma: "Новоросія"
    translation: "New Russia"
    pos: "noun"
    gender: "f"
    notes: "An imperial colonial term introduced in 1764."
  - lemma: "колонізація"
    translation: "colonization"
    pos: "noun"
    gender: "f"
    notes: "Contrasts imperial colonization with Cossack (popular) colonization."
  - lemma: "чорнозем"
    translation: "black soil"
    pos: "noun"
    gender: "m"
    notes: "Highly fertile soil; a key economic resource of the region."
  - lemma: "русифікація"
    translation: "russification"
    pos: "noun"
    gender: "f"
    notes: "Imperial policy aimed at linguistic and cultural assimilation."
  - lemma: "топонім"
    translation: "toponym"
    pos: "noun"
    gender: "m"
    notes: "A place name; returning historical toponyms is key to decolonization."
  - lemma: "класицизм"
    translation: "classicism"
    pos: "noun"
    gender: "m"
    notes: "Architectural style used in imperial centers to project power."
  - lemma: "меноніти"
    translation: "Mennonites"
    pos: "noun"
    gender: "m"
    notes: "German Protestant colonists known for agricultural innovations."
  - lemma: "експлуатація"
    translation: "exploitation"
    pos: "noun"
    gender: "f"
    notes: "The use of local resources and labor for the benefit of the metropolis."
  - lemma: "Дике поле"
    translation: "Wild Field"
    pos: "noun"
    gender: "n"
    notes: "Colonial myth depicting the steppes as an empty, chaotic land (Loca Deserta)."
  - lemma: "Хаджибей"
    translation: "Khadzhibey"
    pos: "noun"
    gender: "m"
    notes: "The historical name of the settlement that later became Odesa."
  - lemma: "історіографія"
    translation: "historiography"
    pos: "noun"
    gender: "f"
    notes: "The study of historical writing and narratives."
  - lemma: "експансія"
    translation: "expansion"
    pos: "noun"
    gender: "f"
    notes: "Territorial or political growth, often through military force."
  - lemma: "міф"
    translation: "myth"
    pos: "noun"
    gender: "m"
    notes: "A widely held but false belief or idea."
  - lemma: "екосистема"
    translation: "ecosystem"
    pos: "noun"
    gender: "f"
    notes: "A biological community of interacting organisms."
  - lemma: "плавні"
    translation: "reed beds"
    pos: "noun"
    gender: "f"
    notes: "Flooded river valleys, characteristic of the Great Meadow."
  - lemma: "губернія"
    translation: "governorate"
    pos: "noun"
    gender: "f"
    notes: "A major administrative subdivision of the Russian Empire."
  - lemma: "житниця"
    translation: "breadbasket"
    pos: "noun"
    gender: "f"
    notes: "A region producing large amounts of grain."
  - lemma: "кріпацтво"
    translation: "serfdom"
    pos: "noun"
    gender: "n"
    notes: "The status of peasants under feudalism, forced into labor."
  - lemma: "деколонізація"
    translation: "decolonization"
    pos: "noun"
    gender: "f"
    notes: "The process of freeing a region or mindset from colonial influence."
  - lemma: "пам'ятник"
    translation: "monument"
    pos: "noun"
    gender: "m"
    notes: "A statue or structure built to commemorate a person or event."
  - lemma: "наратив"
    translation: "narrative"
    pos: "noun"
    gender: "m"
    notes: "A spoken or written account of connected events; a story."