items:
  - lemma: "褕谢褟褏褌邪"
    ipa: '[藞蕛l什蓱xt蓱]'
    translation: "nobility"
    pos: "noun"
    gender: "f"
    notes: "The privileged land-owning class in the Polish-Lithuanian Commonwealth."
  - lemma: "屑邪谐薪邪褌"
    ipa: '[m蓱藞搔n蓱t]'
    translation: "magnate"
    pos: "noun"
    gender: "m"
    notes: "A powerful and wealthy aristocrat."
  - lemma: "屑褨褖邪薪懈薪"
    ipa: '[m什i蕛t汀蕛蓱藞n瑟n]'
    translation: "burgher / town dweller"
    pos: "noun"
    gender: "m"
  - lemma: "泻褉褨锌邪泻"
    ipa: '[kr什i藞p蓱k]'
    translation: "serf"
    pos: "noun"
    gender: "m"
    notes: "A peasant legally bound to the land and subject to the will of the landowner."
  - lemma: "锌邪薪褖懈薪邪"
    ipa: '[藞p蓱n蕛t汀蕛瑟n蓱]'
    translation: "corv茅e / serfdom labor"
    pos: "noun"
    gender: "f"
    notes: "Unpaid forced labor that serfs were obliged to perform on the lord's estate."
  - lemma: "褎褨谢褜胁邪褉芯泻"
    ipa: '[f什il什藞蕥蓱r蓴k]'
    translation: "folwark / manor farm"
    pos: "noun"
    gender: "m"
    notes: "A large agricultural enterprise focused on producing surplus for export."
  - lemma: "屑邪谐写械斜褍褉蟹褜泻械 锌褉邪胁芯"
    ipa: '[m蓱搔d蓻藞burz什k蓻 藞pr蓱蕥蓴]'
    translation: "Magdeburg rights"
    pos: "noun"
    gender: "n"
    notes: "A set of town privileges providing self-government."
  - lemma: "褋械泄屑"
    ipa: '[s蓻jm]'
    translation: "Sejm / parliament"
    pos: "noun"
    gender: "m"
  - lemma: "褍薪褨褟"
    ipa: '[藞un什ij蓱]'
    translation: "union"
    pos: "noun"
    gender: "f"
    example: "袥褞斜谢褨薪褋褜泻邪 褍薪褨褟 芯斜'褦写薪邪谢邪 写胁褨 写械褉卸邪胁懈."
  - lemma: "锌芯谢芯薪褨蟹邪褑褨褟"
    ipa: '[p蓴l蓴n什i藞z蓱t汀s什ij蓱]'
