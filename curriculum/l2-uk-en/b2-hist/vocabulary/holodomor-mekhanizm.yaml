    translation: "occupation"
    pos: "noun"
    gender: "f"
    notes: "collocations: 褉邪写褟薪褋褜泻邪 芯泻褍锌邪褑褨褟, 褉械卸懈屑 芯泻褍锌邪褑褨褩"
