    pos: "noun"
    gender: "m"
    notes: "context: 褋褌邪谢褨薪褋褜泻懈泄 褌芯褌邪谢褨褌邪褉懈蟹屑, 邪斜褋芯谢褞褌薪懈泄 泻芯薪褌褉芯谢褜 薪邪写 褋褍褋锌褨谢褜褋褌胁芯屑"
  - lemma: "褏谢褨斜芯蟹邪谐芯褌褨胁谢褟"
