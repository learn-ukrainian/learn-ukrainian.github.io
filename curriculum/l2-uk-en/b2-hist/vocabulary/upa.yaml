items:
  - lemma: 'УПА'
    translation: 'UPA (Ukrainian Insurgent Army)'
    pos: 'noun'
    gender: 'f'
    notes: 'Acronym for Українська Повстанська Армія. Officially created on October 14, 1942.'
  - lemma: 'повстанець'
    translation: 'insurgent, rebel'
    pos: 'noun'
    gender: 'm'
    notes: 'Often referred to as forest brothers (лісові брати). The term partisan was used for Soviet fighters.'
  - lemma: 'опір'
    translation: 'resistance'
    pos: 'noun'
    gender: 'm'
    usage: 'збройний опір (armed resistance)'
  - lemma: 'партизан'
    translation: 'partisan, guerrilla'
    pos: 'noun'
    gender: 'm'
    notes: 'In the Soviet context, this meant Red partisans (enemies of UPA).'
  - lemma: 'окупація'
    translation: 'occupation'
    pos: 'noun'
    gender: 'f'
    usage: 'подвійна окупація (double occupation)'
  - lemma: 'незалежність'
    translation: 'independence'
    pos: 'noun'
    gender: 'f'
    usage: 'здобути незалежність (to gain independence)'
  - lemma: 'командир'
    translation: 'commander'
    pos: 'noun'
    gender: 'm'
    usage: 'Головнокомандувач (Commander-in-Chief)'
  - lemma: 'підпілля'
    translation: 'underground (resistance)'
    pos: 'noun'
    gender: 'n'
    usage: 'піти в підпілля (to go underground)'
  - lemma: 'бункер'
    translation: 'bunker'
    pos: 'noun'
    gender: 'm'
    notes: 'Essential for survival in 1944-1950s.'
  - lemma: 'криївка'
    translation: 'hideout, secret shelter'
    pos: 'noun'
    gender: 'f'
    notes: 'Secret underground shelter masked in forests or houses.'
  - lemma: 'диверсія'
    translation: 'sabotage, diversion'
    pos: 'noun'
    gender: 'f'
    usage: 'здійснювати диверсії (to carry out sabotage)'
  - lemma: 'пропаганда'
    translation: 'propaganda'
    pos: 'noun'
    gender: 'f'
    usage: 'ворожа пропаганда (enemy propaganda)'
  - lemma: 'репресія'
    translation: 'repression'
    pos: 'noun'
    gender: 'f'
    usage: 'масові репресії (mass repressions)'
  - lemma: 'депортація'
    translation: 'deportation'
    pos: 'noun'
    gender: 'f'
    notes: 'Forced eviction, e.g., Operation Vistula in 1947.'
  - lemma: 'бофон'
    translation: 'insurgent currency, combat fund receipt'
    pos: 'noun'
    gender: 'm'
    notes: 'From бойовий фонд (combat fund).'
  - lemma: 'присяга'
    translation: 'oath'
    pos: 'noun'
    gender: 'f'
    usage: 'скласти присягу (to take an oath)'
  - lemma: 'етнічний конфлікт'
    translation: 'ethnic conflict'
    pos: 'noun'
    gender: 'm'
    notes: 'Used to describe the Volhynia tragedy.'
  - lemma: 'зброя'
    translation: 'weapon, arms'
    pos: 'noun'
    gender: 'f'
    usage: 'взяти зброю в руки (to take up arms)'
  - lemma: 'держава'
    translation: 'state, country'
    pos: 'noun'
    gender: 'f'
    usage: 'здобути державу (to gain a state)'
  - lemma: 'шпиталь'
    translation: 'hospital (often military)'
    pos: 'noun'
    gender: 'm'
    usage: 'підпільний шпиталь (underground hospital)'
  - lemma: 'нація'
    translation: 'nation'
    pos: 'noun'
    gender: 'f'
    usage: 'бездержавна нація (stateless nation)'
  - lemma: 'імперія'
    translation: 'empire'
    pos: 'noun'
    gender: 'f'
    usage: 'тоталітарна імперія (totalitarian empire)'
  - lemma: 'жертва'
    translation: 'victim, casualty'
    pos: 'noun'
    gender: 'f'
    usage: 'цивільні жертви (civilian casualties)'
  - lemma: 'спадщина'
    translation: 'legacy, heritage'
    pos: 'noun'
    gender: 'f'
    usage: 'історична спадщина (historical legacy)'
  - lemma: 'визволення'
    translation: 'liberation'
    pos: 'noun'
    gender: 'n'
    usage: 'національне визволення (national liberation)'