items:
  - lemma: "锌芯胁褋褌邪薪薪褟"
    ipa: '[p蓴藞蕥st蓱n什藧蓱]'
    translation: "uprising / rebellion"
    pos: "noun"
    gender: "n"
    notes: "Often paired with 薪邪褑褨芯薪邪谢褜薪芯-胁懈蟹胁芯谢褜薪械 (national liberation)."
  - lemma: "谐薪褨褌"
    ipa: '[搔n什it]'
    translation: "oppression"
    pos: "noun"
    gender: "m"
    usage: "Collocations: 褋芯褑褨邪谢褜薪懈泄, 薪邪褑褨芯薪邪谢褜薪懈泄, 褉械谢褨谐褨泄薪懈泄."
  - lemma: "褍薪褨褟"
    ipa: '[藞un什ij蓱]'
    translation: "union"
    pos: "noun"
    gender: "f"
    notes: "Refers specifically to the Union of Brest (1596)."
  - lemma: "褕谢褟褏褌邪"
    ipa: '[藞蕛l什蓱xt蓱]'
    translation: "nobility"
    pos: "noun"
    gender: "f"
    notes: "The ruling class in the Polish-Lithuanian Commonwealth."
  - lemma: "褉械褦褋褌褉"
    ipa: '[r蓻藞j蓻str]'
    translation: "registry"
    pos: "noun"
    gender: "m"
    notes: "List of official Cossacks; limiting it was a major cause of war."
  - lemma: "褍薪褨胁械褉褋邪谢"
    ipa: '[un什i蕥蓻r藞s蓱l]'
    translation: "universal / manifesto"
    pos: "noun"
    gender: "m"
    notes: "Manifesto or decree issued by the Hetman."
  - lemma: "褋芯褞蟹"
    ipa: '[s蓴藞juz]'
    translation: "alliance"
    pos: "noun"
    gender: "m"
    usage: "E.g., 胁褨泄褋褜泻芯胁芯-锌芯谢褨褌懈褔薪懈泄 褋芯褞蟹 (military-political alliance)."
  - lemma: "蟹邪褋褨写泻邪"
    ipa: '[藞z蓱s什idk蓱]'
    translation: "ambush"
    pos: "noun"
    gender: "f"
    notes: "Military tactic successfully used in early battles."
  - lemma: "锌械褉械屑芯谐邪"
    ipa: '[p蓻r蓻藞m蓴搔蓱]'
    translation: "victory"
    pos: "noun"
    gender: "f"
    usage: "E.g., 斜谢懈褋泻褍褔邪 锌械褉械屑芯谐邪 (brilliant victory)."
  - lemma: "胁芯谢褟"
    ipa: '[藞蕥蓴l什蓱]'
    translation: "freedom / will"
    pos: "noun"
    gender: "f"
    notes: "Dual meaning: liberty vs. willpower; a core Cossack value."
  - lemma: "泻褉褨锌邪褑褌胁芯"
    ipa: '[kr什i藞p蓱t汀st蕥蓴]'
    translation: "serfdom"
    pos: "noun"
    gender: "n"
    notes: "Essential term for the socio-economic causes of the uprising."
  - lemma: "锌邪薪褖懈薪邪"
    ipa: '[藞p蓱n蕛t汀蕛瑟n蓱]'
    translation: "corv茅e"
    pos: "noun"
    gender: "f"
    notes: "Forced labor obligation to the lord."
  - lemma: "褋胁邪胁褨谢谢褟"
    ipa: '[s蕥蓱藞蕥什il什藧蓱]'
    translation: "arbitrariness / lawlessness"
    pos: "noun"
    gender: "n"
    notes: "Refers to the impunity of magnates and lack of rule of law."
  - lemma: "写懈蟹褍薪褨褌懈"
    ipa: '[d瑟zun什it瑟]'
    translation: "disuniats"
    pos: "noun"
    gender: "m"
    notes: "Derogatory term for Orthodox believers who rejected the Union."
  - lemma: "锌芯褋锌芯谢懈褌褨"
    ipa: '[p蓴sp蓴藞l瑟t什i]'
    translation: "commoners"
    pos: "noun"
    gender: "m"
    notes: "Term for peasants or townspeople as opposed to Cossacks and nobles."
  - lemma: "泻褉懈胁写邪"
    ipa: '[藞kr瑟u摊d蓱]'
    translation: "injustice / wrong"
    pos: "noun"
    gender: "f"
    notes: "A deep moral offense and violation of rights."
  - lemma: "褎芯谢褜胁邪褉泻"
    ipa: '[f蓴l什藞蕥蓱rk]'
    translation: "folwark / manor farm"
    pos: "noun"
    gender: "m"
    notes: "Large agricultural estate producing grain for export."
  - lemma: "芯褉械薪写邪褉"
    ipa: '[蓴r蓻n藞d蓱r]'
    translation: "leaseholder"
    pos: "noun"
    gender: "m"
    notes: "One who managed estates and collected taxes, often exploiting peasants."
  - lemma: "锌褉懈胁褨谢械泄"
    ipa: '[pr瑟蕥什i藞l蓻j]'
    translation: "privilege"
    pos: "noun"
    gender: "m"
    notes: "Special rights granted to Cossacks or nobles."
  - lemma: "锌芯胁褋褌邪薪械褑褜"
    ipa: '[p蓴藞蕥st蓱n蓻t汀s什]'
    translation: "rebel / insurgent"
    pos: "noun"
    gender: "m"
    notes: "Participant in the armed uprising."
  - lemma: "屑邪谐薪邪褌"
    ipa: '[m蓱藞搔n蓱t]'
    translation: "magnate"
    pos: "noun"
    gender: "m"
    notes: "Powerful and wealthy aristocrat."
  - lemma: "斜褍薪褌"
    ipa: '[bunt]'
    translation: "riot / rebellion"
    pos: "noun"
    gender: "m"
    notes: "Term often used by imperial narratives to describe the uprising."
  - lemma: "褉械胁芯谢褞褑褨褟"
    ipa: '[r蓻蕥蓴藞l什ut汀s什ij蓱]'
    translation: "revolution"
    pos: "noun"
    gender: "f"
    notes: "Modern historical term for the National Liberation War."
  - lemma: "褋芯褌薪懈泻"
    ipa: '[藞s蓴tn瑟k]'
    translation: "centurion / captain"
    pos: "noun"
    gender: "m"
    notes: "Cossack military rank held by Bohdan Khmelnytsky before the war."
  - lemma: "谐械褌褜屑邪薪"
    ipa: '[藞搔蓻t什m蓱n]'
    translation: "hetman"
    pos: "noun"
    gender: "m"
    notes: "Highest military and political commander of the Cossack state."