    pos: "noun"
    gender: "m"
    example: "袞芯褉褋褌芯泻褨褋褌褜 斜邪褋泻邪泻褨胁 褔邪褋褌芯 胁懈泻谢懈泻邪谢邪 薪邪褉芯写薪褨 锌芯胁褋褌邪薪薪褟."
  - lemma: "褟褉谢懈泻"
    ipa: '[j蓱r藞l瑟k]'
