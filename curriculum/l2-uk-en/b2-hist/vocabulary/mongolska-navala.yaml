items:
  - lemma: "薪邪胁邪谢邪"
    ipa: '[n蓱藞蕥蓱l蓱]'
    translation: "invasion"
    pos: "noun"
    gender: "f"
    example: "袦芯薪谐芯谢褜褋褜泻邪 薪邪胁邪谢邪 褋褌邪谢邪 褉褍斜褨泻芯薪芯屑 胁 褨褋褌芯褉褨褩 小褏褨写薪芯褩 袆胁褉芯锌懈."
  - lemma: "芯斜谢芯谐邪"
    ipa: '[蓴藞bl蓴搔蓱]'
    translation: "siege"
    pos: "noun"
    gender: "f"
    example: "袨斜谢芯谐邪 袣懈褦胁邪 锌褉芯写械屑芯薪褋褌褉褍胁邪谢邪 褌械褏薪芯谢芯谐褨褔薪褍 锌械褉械胁邪谐褍 胁芯褉芯卸芯褩 邪褉屑褨褩."
  - lemma: "褟褉屑芯"
    ipa: '[j蓱r藞m蓴]'
    translation: "yoke"
    pos: "noun"
    gender: "n"
