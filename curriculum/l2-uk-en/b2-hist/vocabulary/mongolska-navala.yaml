  - lemma: "芯褉写邪"
    ipa: '[蓴r藞d蓱]'
    translation: "horde"
    pos: "noun"
    gender: "f"
    example: "袚褨谐邪薪褌褋褜泻邪 芯褉写邪 芯褌芯褔懈谢邪 屑褨褋褌芯 蟹 褍褋褨褏 斜芯泻褨胁."
  - lemma: "褏邪薪"
    ipa: '[x蓱n]'
    translation: "khan"
    pos: "noun"
    gender: "m"
    example: "啸邪薪 袘邪褌懈泄 泻械褉褍胁邪胁 锌芯褏芯写芯屑 薪邪 褋褏褨写薪芯褦胁褉芯锌械泄褋褜泻褨 蟹械屑谢褨."
  - lemma: "斜邪褋泻邪泻"
    ipa: '[b蓱藞sk蓱k]'
