  - lemma: 'сила'
    ipa: '[ˈsɪlɑ]'
    translation: 'moral / power'
    pos: 'noun'
    gender: 'f'
    notes: 'specific term for the moral of a fable in Skovoroda''s works'
  - lemma: 'пізнання'
