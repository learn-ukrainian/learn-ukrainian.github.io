items:
  - lemma: 'сродна праця'
    ipa: '[srɔdnɑ ˈprɑt͡sʲɑ]'
    translation: 'congenial labor / affinity work'
    pos: 'phrase'
    notes: 'key philosophical concept of Skovoroda'
    example: 'Сродна праця — це найсолодша в світі річ.'
  - lemma: 'мандрівний'
    ipa: '[mɑnˈdʲrʲiˈʋnɪj]'
