- term: 褌褉懈锌褨谢褜褋褜泻邪 泻褍谢褜褌褍褉邪
  ipa: "[tr瑟藞p什il什s什k蓯 kul什藞tur蓯]"
  translation: "Trypillia culture"
  pos: noun
  definition: "袗褉褏械芯谢芯谐褨褔薪邪 泻褍谢褜褌褍褉邪 褔邪褋褨胁 械薪械芯谢褨褌褍, 锌芯褕懈褉械薪邪 薪邪 褌械褉懈褌芯褉褨褩 校泻褉邪褩薪懈, 袦芯谢写芯胁懈 褌邪 袪褍屑褍薪褨褩."

- term: 邪褉褏械芯谢芯谐褨褟
  ipa: "[蓯rxeo藞l蓴搔ij蓯]"
  translation: "archaeology"
  pos: noun
  definition: "袧邪褍泻邪, 褖芯 胁懈胁褔邪褦 屑懈薪褍谢械 谢褞写褋褌胁邪 蟹邪 屑邪褌械褉褨邪谢褜薪懈屑懈 蟹邪谢懈褕泻邪屑懈 写褨褟谢褜薪芯褋褌褨 谢褞写械泄."

- term: 械薪械芯谢褨褌
  ipa: "[eneo藞l什it]"
  translation: "Eneolithic, Chalcolithic"
  pos: noun
  definition: "袦褨写薪芯-泻邪屑'褟薪懈泄 胁褨泻, 锌械褉械褏褨写薪懈泄 锌械褉褨芯写 胁褨写 薪械芯谢褨褌褍 写芯 斜褉芯薪蟹芯胁芯谐芯 胁褨泻褍."

- term: 锌芯褋械谢械薪薪褟
  ipa: "[po藞s蓻l蓻n什藧蓯]"
  translation: "settlement"
  pos: noun
  definition: "袦褨褋褑械, 写械 卸懈胁褍褌褜 邪斜芯 泻芯谢懈褋褜 卸懈谢懈 谢褞写懈; 褋褍泻褍锌薪褨褋褌褜 卸懈褌谢芯胁懈褏 褨 谐芯褋锌芯写邪褉褋褜泻懈褏 斜褍写褨胁械谢褜."

- term: 泻械褉邪屑褨泻邪
  ipa: "[ke藞r蓱m什ik蓯]"
  translation: "ceramics, pottery"
  pos: noun
  definition: "袙懈褉芯斜懈 蟹 芯斜锌邪谢械薪芯褩 谐谢懈薪懈; 屑懈褋褌械褑褌胁芯 胁懈谐芯褌芯胁谢械薪薪褟 褌邪泻懈褏 胁懈褉芯斜褨胁."

- term: 褉芯蟹锌懈褋
  ipa: "[藞r蓴zp瑟s]"
  translation: "painting, ornamentation"
  pos: noun
  definition: "袛械泻芯褉邪褌懈胁薪褨 屑邪谢褞薪泻懈 薪邪 褋褌褨薪邪褏 斜褍写褨胁械谢褜, 薪邪 锌褉械写屑械褌邪褏 锌芯斜褍褌褍, 泻械褉邪屑褨褑褨."

- term: 褋褌邪褌褍械褌泻邪
  ipa: "[st蓯tu藞蓻tk蓯]"
  translation: "figurine"
  pos: noun
  definition: "袧械胁械谢懈褔泻邪 褎褨谐褍褉泻邪 蟹 谐谢懈薪懈, 泻邪屑械薪褞, 屑械褌邪谢褍, 褖芯 蟹芯斜褉邪卸褍褦 谢褞写懈薪褍 邪斜芯 褌胁邪褉懈薪褍."

- term: 蟹械屑谢械褉芯斜褋褌胁芯
  ipa: "[z蓻mle藞r蓴bstu摊o]"
  translation: "agriculture, farming"
  pos: noun
  definition: "袚邪谢褍蟹褜 褋褨谢褜褋褜泻芯谐芯 谐芯褋锌芯写邪褉褋褌胁邪, 褋锌褉褟屑芯胁邪薪邪 薪邪 胁懈褉芯褖褍胁邪薪薪褟 泻褍谢褜褌褍褉薪懈褏 褉芯褋谢懈薪."

- term: 褋泻芯褌邪褉褋褌胁芯
  ipa: "[sko藞t蓱rstu摊o]"
  translation: "animal husbandry"
  pos: noun
  definition: "袚邪谢褍蟹褜 褋褨谢褜褋褜泻芯谐芯 谐芯褋锌芯写邪褉褋褌胁邪, 褖芯 蟹邪泄屑邪褦褌褜褋褟 褉芯蟹胁械写械薪薪褟屑 褨 胁懈泻芯褉懈褋褌邪薪薪褟屑 写芯屑邪褕薪褨褏 褌胁邪褉懈薪."

- term: 邪褉褌械褎邪泻褌
  ipa: "[蓯rte藞f蓱kt]"
  translation: "artifact"
  pos: noun
  definition: "袩褉械写屑械褌, 胁懈谐芯褌芯胁谢械薪懈泄 邪斜芯 蟹屑褨薪械薪懈泄 谢褞写懈薪芯褞; 芯斜'褦泻褌 邪褉褏械芯谢芯谐褨褔薪芯谐芯 写芯褋谢褨写卸械薪薪褟."

- term: 褉芯蟹泻芯锌泻懈
  ipa: "[r蓴z藞k蓴pk瑟]"
  translation: "excavations"
  pos: noun
  definition: "袗褉褏械芯谢芯谐褨褔薪褨 褉芯斜芯褌懈 蟹褨 蟹胁褨谢褜薪械薪薪褟 写邪胁薪褨褏 锌邪屑'褟褌芯泻 胁褨写 褕邪褉褨胁 覒褉褍薪褌褍."

- term: 泻褍谢褜褌
  ipa: "[kul什t]"
  translation: "cult"
  pos: noun
  definition: "袪械谢褨谐褨泄薪械 褕邪薪褍胁邪薪薪褟 褟泻懈褏芯褋褜 锌褉械写屑械褌褨胁, 褨褋褌芯褌, 斜芯卸械褋褌胁; 褋懈褋褌械屑邪 芯斜褉褟写褨胁."

- term: 锌褉芯褌芯屑褨褋褌芯
  ipa: "[pro藞t蓴m什isto]"
  translation: "proto-city"
  pos: noun
  definition: "袙械谢懈泻械 锌芯褋械谢械薪薪褟, 褟泻械 蟹邪 褉芯蟹屑褨褉邪屑懈 褌邪 褋褌褉褍泻褌褍褉芯褞 薪邪斜谢懈卸邪褦褌褜褋褟 写芯 屑褨褋褌邪, 邪谢械 薪械 屑邪褦 胁褋褨褏 泄芯谐芯 芯蟹薪邪泻."

- term: 芯褉薪邪屑械薪褌
  ipa: "[orn藞蓱m蓻nt]"
  translation: "ornament"
  pos: noun
  definition: "袙褨蟹械褉褍薪芯泻, 锌芯斜褍写芯胁邪薪懈泄 薪邪 褉懈褌屑褨褔薪芯屑褍 褔械褉谐褍胁邪薪薪褨 谐械芯屑械褌褉懈褔薪懈褏 邪斜芯 褉芯褋谢懈薪薪懈褏 械谢械屑械薪褌褨胁."

- term: 褋锌褨褉邪谢褜
  ipa: "[sp什i藞r蓱l什]"
  translation: "spiral"
  pos: noun
  definition: "袣褉懈胁邪 谢褨薪褨褟, 褟泻邪 胁'褦褌褜褋褟 薪邪胁泻芯谢芯 褑械薪褌褉邪谢褜薪芯褩 褌芯褔泻懈, 锌芯褋褌褍锌芯胁芯 胁褨写写邪谢褟褞褔懈褋褜 胁褨写 薪械褩."

- term: 褉芯写褞褔褨褋褌褜
  ipa: "[ro藞d什ut汀蕛什ist什]"
  translation: "fertility"
  pos: noun
  definition: "袟写邪褌薪褨褋褌褜 覒褉褍薪褌褍 写邪胁邪褌懈 胁懈褋芯泻懈泄 胁褉芯卸邪泄 褉芯褋谢懈薪; 蟹写邪褌薪褨褋褌褜 写芯 褉芯蟹屑薪芯卸械薪薪褟."

- term: 邪胁褌芯褏褌芯薪薪懈泄
  ipa: "[蓯u摊藞t蓴xton藧瑟j]"
  translation: "autochthonous, indigenous"
  pos: adjective
  definition: "袦褨褋褑械胁懈泄, 泻芯褉褨薪薪懈泄; 褌邪泻懈泄, 褖芯 胁懈薪懈泻 薪邪 褌褨泄 褌械褉懈褌芯褉褨褩, 写械 锌械褉械斜褍胁邪褦 蟹邪褉邪蟹."

- term: 褋锌邪写褖懈薪邪
  ipa: "[藞sp蓱dt汀蕛瑟n蓯]"
  translation: "heritage, legacy"
  pos: noun
  definition: "袣褍谢褜褌褍褉薪褨 褌邪 屑邪褌械褉褨邪谢褜薪褨 褑褨薪薪芯褋褌褨, 锌械褉械写邪薪褨 胁褨写 锌芯锌械褉械写薪褨褏 锌芯泻芯谢褨薪褜."

- term: 屑邪褌褉褨邪褉褏邪褌
  ipa: "[m蓯tr什i蓯r藞x蓱t]"
  translation: "matriarchy"
  pos: noun
  definition: "肖芯褉屑邪 褋褍褋锌褨谢褜薪芯谐芯 褍褋褌褉芯褞, 写械 锌褉芯胁褨写薪邪 褉芯谢褜 薪邪谢械卸懈褌褜 卸褨薪褑褨 (褔邪褋褌芯 锌芯胁'褟蟹邪薪邪 蟹 褉械谢褨谐褨泄薪懈屑 泻褍谢褜褌芯屑)."

- term: 械谐邪谢褨褌邪褉薪懈泄
  ipa: "[e搔蓯l什i藞t蓱rn瑟j]"
  translation: "egalitarian"
  pos: adjective
  definition: "袟邪褋薪芯胁邪薪懈泄 薪邪 褉褨胁薪芯褋褌褨 胁褋褨褏 褔谢械薪褨胁 褋褍褋锌褨谢褜褋褌胁邪; 褌邪泻懈泄, 褖芯 薪械 屑邪褦 褉褨蟹泻芯谐芯 屑邪泄薪芯胁芯谐芯 锌芯写褨谢褍."

- term: 锌械褉胁褨褋薪懈泄
  ipa: "[藞p蓻r蕥什isn瑟j]"
  translation: "primitive, primordial"
  pos: adjective
  definition: "携泻懈泄 褋褌芯褋褍褦褌褜褋褟 锌芯褔邪褌泻芯胁懈褏 褋褌邪写褨泄 褉芯蟹胁懈褌泻褍 谢褞写褋褌胁邪; 褋褌邪褉芯写邪胁薪褨泄."

- term: 屑械褌邪谢褍褉谐褨褟
  ipa: "[met蓯藞lurd汀蕭ij蓯]"
  translation: "metallurgy"
  pos: noun
  definition: "袚邪谢褍蟹褜 锌褉芯屑懈褋谢芯胁芯褋褌褨 褌邪 薪邪褍泻懈, 褖芯 蟹邪泄屑邪褦褌褜褋褟 胁懈写芯斜褍褌泻芯屑 褨 芯斜褉芯斜泻芯褞 屑械褌邪谢褨胁."

- term: 谐芯褉薪芯
  ipa: "[藞搔蓴rn蓴]"
  translation: "kiln, furnace"
  pos: noun
  definition: "袩褨褔 写谢褟 胁懈锌谢邪胁谢械薪薪褟 屑械褌邪谢褍 邪斜芯 胁懈锌邪谢褞胁邪薪薪褟 泻械褉邪屑褨褔薪懈褏 胁懈褉芯斜褨胁."

- term: 锌械褉械谢芯谐芯胁械 蟹械屑谢械褉芯斜褋褌胁芯
  ipa: "[pere藞l蓴搔o蕥e z蓻mle藞r蓴bstu摊o]"
  translation: "slash-and-burn agriculture"
  pos: noun
  definition: "小懈褋褌械屑邪 蟹械屑谢械褉芯斜褋褌胁邪, 锌褉懈 褟泻褨泄 锌芯谢械 锌褨褋谢褟 胁懈褋薪邪卸械薪薪褟 蟹邪谢懈褕邪褞褌褜 斜械蟹 芯斜褉芯斜泻懈 薪邪 写芯胁谐懈泄 褔邪褋."

- term: 褋邪泻褉邪谢褜薪懈泄
  ipa: "[s蓯藞kr蓱l什n瑟j]"
  translation: "sacred"
  pos: adjective
  definition: "小胁褟褖械薪薪懈泄, 褌邪泻懈泄, 褖芯 褋褌芯褋褍褦褌褜褋褟 褉械谢褨谐褨泄薪芯谐芯 泻褍谢褜褌褍 邪斜芯 芯斜褉褟写褍."

- term: 胁褨胁褌邪褉
  ipa: "[蕥什iu摊藞t蓱r]"
  translation: "altar"
  pos: noun
  definition: "小锌芯褉褍写邪 邪斜芯 锌褨写胁懈褖械薪薪褟 写谢褟 蟹写褨泄褋薪械薪薪褟 褉械谢褨谐褨泄薪懈褏 芯斜褉褟写褨胁 褨 卸械褉褌胁芯锌褉懈薪芯褕械薪褜."

- term: 斜芯谐懈薪褟-屑邪褌褨褉
  ipa: "[bo藞搔瑟n什蓯 藞m蓱t什ir]"
  translation: "mother goddess"
  pos: noun
  definition: "袚芯谢芯胁薪械 卸褨薪芯褔械 斜芯卸械褋褌胁芯 胁 斜邪谐邪褌褜芯褏 写邪胁薪褨褏 褉械谢褨谐褨褟褏, 褋懈屑胁芯谢 褉芯写褞褔芯褋褌褨 褌邪 卸懈褌褌褟."

- term: 褏褉芯薪芯谢芯谐褨褟
  ipa: "[xrono藞l蓴搔ij蓯]"
  translation: "chronology"
  pos: noun
  definition: "袩芯褋谢褨写芯胁薪褨褋褌褜 锌芯写褨泄 褍 褔邪褋褨; 薪邪褍泻邪 锌褉芯 胁懈屑褨褉褞胁邪薪薪褟 褔邪褋褍."
