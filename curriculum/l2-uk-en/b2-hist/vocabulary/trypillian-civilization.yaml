- word: енеоліт
  translation: Chalcolithic (Copper Age)
  definition: Мідно-кам'яний вік, перехідний період від неоліту до бронзового віку.
  ipa: [eneolˈit]
- word: протомісто
  translation: proto-city
  definition: Велике поселення, що має ознаки міста (планування, населення), але без писемності та державної влади.
  ipa: [protomˈisto]
- word: автохтонний
  translation: autochthonous (indigenous)
  definition: Такий, що виник або живе на цій території; корінний.
  ipa: [aʋtoxtˈonnɪj]
- word: зернотерка
  translation: quern-stone
  definition: Кам'яне знаряддя для ручного розмелювання зерна.
  ipa: [zernotˈerka]
- word: горно
  translation: kiln
  definition: Піч для випалювання керамічних виробів.
  ipa: [hornˈo]
- word: охра
  translation: ochre
  definition: Природна мінеральна фарба червоного або жовтого кольору.
  ipa: [ˈoxra]
- word: тяглова сила
  translation: draft power (animals)
  definition: Тварини (воли, коні), яких використовують для перевезення вантажів або оранки.
  ipa: [tʲahlˈoʋa sˈɪla]
- word: егалітарний
  translation: egalitarian
  definition: Заснований на рівності членів суспільства.
  ipa: [ehalitˈarnɪj]
- word: святиня
  translation: shrine (sacred object)
  definition: Предмет або місце, що є об'єктом релігійного шанування.
  ipa: [sʋʲatˈɪnʲa]
- word: культурний шар
  translation: cultural layer
  definition: Шар ґрунту, що містить сліди діяльності людини.
  ipa: [kultˈurnɪj ʃˈar]
- word: трипільська культура
  translation: Trypillia culture
  definition: Археологічна культура енеоліту на теренах України, Молдови та Румунії.
  ipa: [trɪpˈilʲsʲka kultˈura]
- word: археологія
  translation: archaeology
  definition: Наука, що вивчає історію людства за матеріальними залишками.
  ipa: [arxeolˈohija]
- word: поселення
  translation: settlement
  definition: Місце проживання людей, населений пункт.
  ipa: [posˈelennʲa]
- word: кераміка
  translation: ceramics (pottery)
  definition: Вироби з обпаленої глини.
  ipa: [kerˈamika]
- word: розпис
  translation: painting (ornamentation)
  definition: Декоративний малюнок на стінах або посуді.
  ipa: [rˈozpɪs]
- word: статуетка
  translation: figurine
  definition: Невелика скульптура з глини, каменю або металу.
  ipa: [statuˈetka]
- word: землеробство
  translation: agriculture (farming)
  definition: Обробіток землі для вирощування сільськогосподарських рослин.
  ipa: [zemlerˈobstʋo]
- word: скотарство
  translation: animal husbandry
  definition: Розведення сільськогосподарських тварин.
  ipa: [skotˈarstʋo]
- word: артефакт
  translation: artifact
  definition: Предмет, створений людиною в минулому, що має історичну цінність.
  ipa: [artefˈakt]
- word: розкопки
  translation: excavations
  definition: Процес відкриття шарів землі для дослідження археологічних пам'яток.
  ipa: [rozkˈopkɪ]
- word: культ
  translation: cult
  definition: Релігійне шанування божества або предмета; сукупність ритуалів.
  ipa: [kult]
- word: орнамент
  translation: ornament
  definition: Візерунок, побудований на ритмічному повторенні елементів.
  ipa: [ornˈament]
- word: спіраль
  translation: spiral
  definition: Крива лінія, що закручується навколо центру; символ вічності у Трипіллі.
  ipa: [spirˈalʲ]
- word: родючість
  translation: fertility
  definition: Здатність землі давати врожай; здатність народжувати потомство.
  ipa: [rodʲˈut͡ʃisʲtʲ]
- word: спадщина
  translation: heritage (legacy)
  definition: Культурні та матеріальні цінності, передані від попередніх поколінь.
  ipa: [spˈadʃt͡ʃɪna]
