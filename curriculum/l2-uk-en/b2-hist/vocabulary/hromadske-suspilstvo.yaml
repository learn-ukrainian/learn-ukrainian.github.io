items:
  - lemma: "громадянське суспільство"
    ipa: '[ɦrɔmɑˈdʲɑnʲsʲkɛ suˈsʲpʲilʲstʋɔ]'
    translation: "civil society"
    pos: "phrase"
    notes: "колокація: розвинене громадянське суспільство"
  - lemma: "волонтер"
    ipa: '[ʋɔlɔnˈtɛr]'
    translation: "volunteer"
    pos: "noun"
    gender: "m"
    notes: "колокація: волонтерський рух, стати волонтером"
  - lemma: "благодійність"
    ipa: '[blɑɦɔˈdʲijnʲisʲtʲ]'
    translation: "charity"
    pos: "noun"
    gender: "f"
    notes: "World Giving Index 2023 (Україна — 2 місце у світі)"
  - lemma: "мобілізація"
    ipa: '[mɔbʲilʲiˈzɑt͡sʲijɑ]'
    translation: "mobilization"
    pos: "noun"
    gender: "f"
    notes: "не лише військова, а й суспільна/ресурсна; тотальна мобілізація"
  - lemma: "солідарність"
    ipa: '[sɔlʲiˈdɑrnʲisʲtʲ]'
    translation: "solidarity"
    pos: "noun"
    gender: "f"
    notes: "колокація: соціальна солідарність, міжнародна солідарність"
  - lemma: "координація"
    ipa: '[kɔɔrdɪˈnɑt͡sʲijɑ]'
    translation: "coordination"
    pos: "noun"
    gender: "f"
    notes: "горизонтальні зв'язки, мережева структура"
  - lemma: "ініціатива"
    ipa: '[inʲit͡sʲiɑˈtɪʋɑ]'
    translation: "initiative"
    pos: "noun"
    gender: "f"
    notes: "колокація: громадська ініціатива, низова ініціатива"
  - lemma: "стійкість"
    ipa: '[ˈsʲtʲijkʲisʲtʲ]'
    translation: "resilience"
    pos: "noun"
    gender: "f"
    notes: "синонім: резильєнтність; здатність відновлюватися після шоку"
  - lemma: "пожертва"
    ipa: '[pɔˈʒɛrtʋɑ]'
    translation: "donation"
    pos: "noun"
    gender: "f"
    notes: "синонім: донат (сленг); регулярний донат"
  - lemma: "евакуація"
    ipa: '[ɛʋɑkuˈɑt͡sʲijɑ]'
    translation: "evacuation"
    pos: "noun"
    gender: "f"
    notes: "медична евакуація (медевак)"
  - lemma: "переселенець"
    ipa: '[pɛrɛsɛˈlɛnɛt͡sʲ]'
    translation: "internally displaced person"
    pos: "noun"
    gender: "m"
    notes: "абревіатура: ВПО (внутрішньо переміщена особа)"
  - lemma: "правозахисник"
    ipa: '[prɑʋɔzɑxɪˈsnɪk]'
    translation: "human rights defender"
    pos: "noun"
    gender: "m"
    notes: "документування воєнних злочинів"
  - lemma: "документування"
    ipa: '[dɔkumɛntuˈʋɑnʲːɑ]'
    translation: "documentation"
    pos: "noun"
    gender: "n"
    notes: "збір доказів для трибуналу"
  - lemma: "відбудова"
    ipa: '[ʋʲidbuˈdɔʋɑ]'
    translation: "reconstruction"
    pos: "noun"
    gender: "f"
    notes: "відбудова громад, відновлення інфраструктури"
  - lemma: "активіст"
    ipa: '[ɑktɪˈʋʲist]'
    translation: "activist"
    pos: "noun"
    gender: "m"
    notes: "рушійна сила громадського сектору"
  - lemma: "забезпечення"
    ipa: '[zɑbɛˈzpɛt͡ʃɛnʲːɑ]'
    translation: "provision"
    pos: "noun"
    gender: "n"
    notes: "забезпечення війська (замість слова допомога)"
  - lemma: "самоорганізація"
    ipa: '[sɑmɔɔrɦɑnʲiˈzɑt͡sʲijɑ]'
    translation: "self-organization"
    pos: "noun"
    gender: "f"
    notes: "здатність суспільства вирішувати проблеми без вказівок згори"
  - lemma: "згуртованість"
    ipa: '[zɦurˈtɔʋɑnʲisʲtʲ]'
    translation: "cohesion"
    pos: "noun"
    gender: "f"
    notes: "соціальна єдність перед лицем загрози"
  - lemma: "децентралізація"
    ipa: '[dɛt͡sɛntrɑlʲiˈzɑt͡sʲijɑ]'
    translation: "decentralization"
    pos: "noun"
    gender: "f"
    notes: "розподіл повноважень, відсутність єдиного центру керування"
  - lemma: "довіра"
    ipa: '[dɔˈʋʲirɑ]'
    translation: "trust"
    pos: "noun"
    gender: "f"
    notes: "базовий елемент соціального капіталу в Україні"
  - lemma: "відповідальність"
    ipa: '[ʋʲidpɔʋʲiˈdɑlʲnʲisʲtʲ]'
    translation: "responsibility"
    pos: "noun"
    gender: "f"
    notes: "індивідуальна відповідальність за долю держави"
  - lemma: "спадщина"
    ipa: '[ˈspɑdʃt͡ʃɪnɑ]'
    translation: "heritage"
    pos: "noun"
    gender: "f"
    notes: "культурна спадщина, яку рятують від знищення"
  - lemma: "правосуддя"
    ipa: '[prɑʋɔˈsudʲːɑ]'
    translation: "justice"
    pos: "noun"
    gender: "n"
    notes: "невідворотність покарання за воєнні злочини"
  - lemma: "ідентичність"
    ipa: '[idɛnˈtɪt͡ʃnʲisʲtʲ]'
    translation: "identity"
    pos: "noun"
    gender: "f"
    notes: "національна ідентичність"
  - lemma: "горизонтальний"
    ipa: '[ɦɔrɪzɔnˈtɑlʲnɪj]'
    translation: "horizontal"
    pos: "adjective"
    notes: "горизонтальні зв'язки у суспільстві"