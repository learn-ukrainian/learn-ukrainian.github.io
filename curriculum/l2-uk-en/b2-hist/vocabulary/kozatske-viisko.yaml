items:
  - lemma: "булава"
    translation: "mace / baton"
    pos: "noun"
    gender: "f"
    notes: "Символ найвищої влади гетьмана."
  - lemma: "пернач"
    translation: "mace with flanges"
    pos: "noun"
    gender: "m"
    notes: "Символ влади полковника."
  - lemma: "самопал"
    translation: "musket / firearm"
    pos: "noun"
    gender: "m"
    notes: "Основна стрілецька зброя козацької піхоти."
  - lemma: "шабля"
    translation: "sabre"
    pos: "noun"
    gender: "f"
    notes: "Гостра вигнута холодна зброя."
  - lemma: "гармата"
    translation: "cannon"
    pos: "noun"
    gender: "f"
    notes: "Легка козацька польова артилерія (фальконет)."
  - lemma: "полк"
    translation: "regiment"
    pos: "noun"
    gender: "m"
    notes: "Основна військова та адміністративно-територіальна одиниця."
  - lemma: "сотня"
    translation: "company / hundred"
    pos: "noun"
    gender: "f"
    notes: "Підрозділ полку, що складався з козаків одного міста чи села."
  - lemma: "кіш"
    translation: "encampment / command"
    pos: "noun"
    gender: "m"
    notes: "Центральний орган управління на Запорозькій Січі."
  - lemma: "обоз"
    translation: "baggage train"
    pos: "noun"
    gender: "m"
    notes: "Військова логістика, вози з провіантом і зброєю."
  - lemma: "хоругва"
    translation: "banner"
    pos: "noun"
    gender: "f"
    notes: "Військовий бойовий прапор, найвища святиня підрозділу."
  - lemma: "клейноди"
    translation: "regalia"
    pos: "noun"
    notes: "Символи влади козацької старшини (булава, пернач, бунчук, печатка)."
  - lemma: "реєстровець"
    translation: "registered Cossack"
    pos: "noun"
    gender: "m"
    notes: "Професійний військовий на офіційній державній службі."
  - lemma: "пластун"
    translation: "scout"
    pos: "noun"
    gender: "m"
    notes: "Елітний розвідник спеціального призначення."
  - lemma: "чайка"
    translation: "boat"
    pos: "noun"
    gender: "f"
    notes: "Швидкохідний маневрений човен для морських походів."
  - lemma: "табір"
    translation: "camp / wagon fort"
    pos: "noun"
    gender: "m"
    notes: "Рухома фортеця з міцно зчеплених возів."
  - lemma: "курінь"
    translation: "battalion / barracks"
    pos: "noun"
    gender: "m"
    notes: "Військова структурна одиниця на Січі або солдатське житло."
  - lemma: "довбиш"
    translation: "drummer"
    pos: "noun"
    gender: "m"
    notes: "Посадовець, який бив у литаври для передачі звукових команд."
  - lemma: "гетьман"
    translation: "hetman"
    pos: "noun"
    gender: "m"
    notes: "Верховний головнокомандувач Війська Запорозького."
  - lemma: "полковник"
    translation: "colonel"
    pos: "noun"
    gender: "m"
    notes: "Військовий командир і керівник адміністрації полку."
  - lemma: "сотник"
    translation: "captain / commander of a hundred"
    pos: "noun"
    gender: "m"
    notes: "Керівник і командир козацької сотні."
  - lemma: "гармаш"
    translation: "artilleryman"
    pos: "noun"
    gender: "m"
    notes: "Досвідчений майстер-артилерист, який обслуговував гармати."
  - lemma: "піхота"
    translation: "infantry"
    pos: "noun"
    gender: "f"
    notes: "Головна ударна сила козаків, озброєна вогнепальною зброєю."
  - lemma: "кіннота"
    translation: "cavalry"
    pos: "noun"
    gender: "f"
    notes: "Кавалерія, що використовувалася для швидких рейдів та добивання ворога."
  - lemma: "мушкет"
    translation: "heavy musket"
    pos: "noun"
    gender: "m"
    notes: "Важка вогнепальна зброя, що використовувалася при облозі або для захисту табору."
  - lemma: "найманець"
    translation: "mercenary"
    pos: "noun"
    gender: "m"
    notes: "Професійний воїн, який служить в іноземній армії за плату."