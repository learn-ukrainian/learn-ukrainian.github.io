items:
  - lemma: "屑褍写褉懈泄"
    ipa: '[藞mudr瑟j]'
    translation: "wise"
    pos: "adjective"
    notes: "An epithet that became established later, emphasizing book learning."
  - lemma: "蟹芯谢芯褌邪 写芯斜邪"
    ipa: '[z蓴l蓴藞t蓱 d蓴藞b蓱]'
    translation: "golden age"
    pos: "phrase"
    notes: "A metaphor for the cultural and state flourishing of Kyivan Rus."
  - lemma: "蟹邪泻芯薪芯写邪胁褋褌胁芯"
    ipa: '[z蓱k蓴n蓴藞d蓱u摊st蕥蓴]'
    translation: "legislation"
    pos: "noun"
    gender: "n"
    notes: "The codification of customary law into a formal state code."
  - lemma: "袪褍褋褜泻邪 袩褉邪胁写邪"
    ipa: '[rus什k蓱 藞pr蓱u摊d蓱]'
    translation: "Rus' Justice"
    pos: "phrase"
    notes: "The first legal code of Kyivan Rus; not 'Russian Truth'."
  - lemma: "胁褨褉邪"
    ipa: '[藞蕥什ir蓱]'
    translation: "wergild, fine"
    pos: "noun"
    gender: "f"
    notes: "A monetary fine paid to the prince for the murder of a free person."
  - lemma: "小芯褎褨褟 袣懈褩胁褋褜泻邪"
    ipa: '[s蓴f什ij蓱 藞k瑟jiu摊s什k蓱]'
    translation: "St. Sophia's Cathedral"
    pos: "phrase"
    notes: "The main cathedral of Kyivan Rus, built to rival Constantinople."
  - lemma: "袟芯谢芯褌褨 胁芯褉芯褌邪"
    ipa: '[z蓴l蓴藞t什i 蕥蓴藞r蓴t蓱]'
    translation: "Golden Gates"
    pos: "phrase"
    notes: "The grand ceremonial entrance to the capital."
  - lemma: "写懈锌谢芯屑邪褌褨褟"
    ipa: '[d瑟pl蓴藞m蓱t什ij蓱]'
    translation: "diplomacy"
    pos: "noun"
    gender: "f"
    notes: "Used extensively by Yaroslav through dynastic marriages."
  - lemma: "写懈薪邪褋褌懈褔薪懈泄 褕谢褞斜"
    ipa: '[d瑟n蓱藞st瑟t汀蕛n瑟j 蕛l什ub]'
    translation: "dynastic marriage"
    pos: "phrase"
    notes: "A marriage used as a tool for international integration and peace."
  - lemma: "屑懈褌褉芯锌芯谢懈褌"
    ipa: '[m瑟tr蓴p蓴藞l瑟t]'
    translation: "metropolitan"
    pos: "noun"
    gender: "m"
    notes: "The head of the church; Ilarion was the first local to hold this title."
  - lemma: "泻薪懈卸薪褨褋褌褜"
    ipa: '[藞kn瑟蕭n什is什t什]'
    translation: "book learning"
    pos: "noun"
    gender: "f"
    notes: "The promotion of literacy and manuscript copying as a state priority."
  - lemma: "褋锌邪写褖懈薪邪"
    ipa: '[藞sp蓱d蕛t汀蕛瑟n蓱]'
    translation: "legacy, heritage"
    pos: "noun"
    gender: "f"
    notes: "Cultural and legal traditions passed down to subsequent generations."
  - lemma: "屑褨卸褍褋芯斜懈褑褟"
    ipa: '[m什i蕭u藞s蓴b瑟t汀s什蓱]'
    translation: "internecine war"
    pos: "noun"
    gender: "f"
    notes: "A destructive power struggle among princes, common after Yaroslav's death."
  - lemma: "锌褉芯写邪卸"
    ipa: '[藞pr蓴d蓱蕭]'
    translation: "sale-fine"
    pos: "noun"
    gender: "m"
    notes: "A fine paid to the state treasury for minor crimes."
  - lemma: "褌械褋褌褜"
    ipa: '[t蓻s什t什]'
    translation: "father-in-law"
    pos: "noun"
    gender: "m"
    notes: "Yaroslav was known as the 'father-in-law of Europe'."
  - lemma: "褎芯褉褌懈褎褨泻邪褑褨褟"
    ipa: '[f蓴rt瑟f什i藞k蓱t汀s什ij蓱]'
    translation: "fortification"
    pos: "noun"
    gender: "f"
    notes: "The expansion of defensive structures, creating the 'city of Yaroslav'."
  - lemma: "蟹邪锌芯胁褨褌"
    ipa: '[z蓱p蓴藞蕥什it]'
    translation: "testament, will"
    pos: "noun"
    gender: "m"
    notes: "An attempt to regulate the succession of the throne via seniority."
  - lemma: "泻邪谐邪薪"
    ipa: '[k蓱藞搔蓱n]'
    translation: "khagan"
    pos: "noun"
    gender: "m"
    notes: "A high Eurasian title used by the rulers of Kyiv to emphasize sovereignty."
  - lemma: "谐褉邪褎褨褌褨"
    ipa: '[搔r蓱藞f什it什i]'
    translation: "graffiti"
    pos: "noun"
    gender: "n"
    notes: "Inscriptions on cathedral walls revealing the living spoken language."
  - lemma: "锌芯屑褋褌邪"
    ipa: '[藞p蓴mst蓱]'
    translation: "revenge"
    pos: "noun"
    gender: "f"
    notes: "Blood feud, which was limited and gradually replaced by monetary fines."
  - lemma: "褋泻褉懈锌褌芯褉褨泄"
    ipa: '[skr瑟藞pt蓴r什ij]'
    translation: "scriptorium"
    pos: "noun"
    gender: "m"
    notes: "A workshop in a monastery dedicated to copying manuscripts."
  - lemma: "褋邪褉泻芯褎邪谐"
    ipa: '[s蓱rk蓴藞f蓱搔]'
    translation: "sarcophagus"
    pos: "noun"
    gender: "m"
    notes: "A stone coffin; Yaroslav's remains disappeared from his sarcophagus."
  - lemma: "褉械谐械薪褌泻邪"
    ipa: '[藞r蓻搔蓻ntk蓱]'
    translation: "female regent"
    pos: "noun"
    gender: "f"
    notes: "Anna of Kyiv acted as regent of France for her minor son."
  - lemma: "邪胁褌芯泻械褎邪谢褨褟"
    ipa: '[蓱u摊t蓴k蓻藞f蓱l什ij蓱]'
    translation: "autocephaly"
    pos: "noun"
    gender: "f"
    notes: "Ecclesiastical independence, first attempted by appointing Ilarion."
  - lemma: "泻芯屑锌械薪褋邪褑褨褟"
    ipa: '[k蓴mp蓻n藞s蓱t汀s什ij蓱]'
    translation: "compensation"
    pos: "noun"
    gender: "f"
    notes: "The European legal principle of paying for damages rather than physical punishment."