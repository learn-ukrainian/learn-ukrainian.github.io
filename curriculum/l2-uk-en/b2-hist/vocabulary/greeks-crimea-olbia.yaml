- term: 褋褌械薪芯褏芯褉褨褟
  ipa: '[st蓻n蓴x蓴r什ij蓱]'
  ipa: steno蠂o藞r什ij蓱
  translation: stenochoria (land hunger)
  definition: 袧械褋褌邪褔邪 蟹械屑谢褨, 褖芯 褋褌邪谢邪 芯写薪褨褦褞 蟹 谐芯谢芯胁薪懈褏 锌褉懈褔懈薪 袙械谢懈泻芯褩 谐褉械褑褜泻芯褩 泻芯谢芯薪褨蟹邪褑褨褩.
- term: 芯泄泻褨褋褌
  ipa: '[蓴jk什ist]'
  ipa: oj藞kist
  translation: oikist (founder of a colony)
  definition: 袣械褉褨胁薪懈泻 械泻褋锌械写懈褑褨褩, 褟泻懈泄 蟹邪褋薪芯胁褍胁邪胁 薪芯胁褍 泻芯谢芯薪褨褞, 褋褌邪胁邪胁 褩褩 锌械褉褕懈屑 锌褉邪胁懈褌械谢械屑 褨 褕邪薪褍胁邪胁褋褟 褟泻 谐械褉芯泄.
- term: 芯泄泻褍屑械薪邪
  ipa: '[蓴jku藞m蓻n蓱]'
  ipa: ojku藞m蓻n蓱
  translation: oikoumene (inhabited world)
  definition: 袟邪褋械谢械薪邪, 褑懈胁褨谢褨蟹芯胁邪薪邪 褔邪褋褌懈薪邪 褋胁褨褌褍 胁 褍褟胁谢械薪薪褨 写邪胁薪褨褏 谐褉械泻褨胁 (薪邪 锌褉芯褌懈胁邪谐褍 褋胁褨褌褍 胁邪褉胁邪褉褨胁).
- term: 械泻谢械褋褨褟
  ipa: '[蓻kl蓻s什ij蓱]'
  ipa: ek藞l蓻sij蓱
  translation: ecclesia (assembly)
  definition: 袧邪褉芯写薪褨 蟹斜芯褉懈 胁 写邪胁薪褜芯谐褉械褑褜泻懈褏 锌芯谢褨褋邪褏, 胁懈褖懈泄 芯褉谐邪薪 胁谢邪写懈.
- term: 斜褍谢械
  ipa: '[bul蓻]'
  ipa: bu藞l蓻
  translation: boule (council)
  definition: 袪邪写邪 胁 写邪胁薪褜芯谐褉械褑褜泻懈褏 屑褨褋褌邪褏-写械褉卸邪胁邪褏, 褖芯 谐芯褌褍胁邪谢邪 褋锌褉邪胁懈 写谢褟 薪邪褉芯写薪懈褏 蟹斜芯褉褨胁.
- term: 褏芯褉邪
  ipa: '[藞x蓴r蓱]'
  ipa: 藞蠂蓴r蓱
  translation: chora (territory)
  definition: 小褨谢褜褋褜泻芯谐芯褋锌芯写邪褉褋褜泻邪 芯泻褉褍谐邪 邪薪褌懈褔薪芯谐芯 锌芯谢褨褋褍.
- term: 泻谢械褉
  ipa: '[kl蓻r]'
  ipa: kl蓻r
  translation: kleros (allotment)
  definition: 袟械屑械谢褜薪邪 写褨谢褟薪泻邪, 褟泻褍 芯褌褉懈屑褍胁邪胁 谐褉芯屑邪写褟薪懈薪 锌芯谢褨褋褍 蟹邪 卸械褉械斜芯屑.
- term: 械胁械褉谐械褌懈蟹屑
  ipa: '[蓻蕥蓻r搔蓻t瑟zm]'
  ipa: ever搔e藞t瑟zm
  translation: euergetism (doing good deeds)
  definition: 袩褉邪泻褌懈泻邪 写芯斜褉芯胁褨谢褜薪懈褏 锌芯卸械褉褌胁 斜邪谐邪褌懈褏 谐褉芯屑邪写褟薪 薪邪 锌芯褌褉械斜懈 谐褉芯屑邪写懈 胁 邪薪褌懈褔薪芯屑褍 褋胁褨褌褨.
- term: 邪谐芯褉邪
  ipa: '[蓱藞搔蓴r蓱]'
  ipa: 蓱藞搔蓴r蓱
  translation: agora (marketplace/assembly)
  definition: 袚芯谢芯胁薪邪 锌谢芯褖邪 谐褉械褑褜泻芯谐芯 屑褨褋褌邪, 褑械薪褌褉 谐褉芯屑邪写褋褜泻芯谐芯 褨 褌芯褉谐芯胁芯谐芯 卸懈褌褌褟.
- term: 屑械褌褉芯锌芯谢褨褟
  ipa: '[m蓻tr蓴藞p蓴l什ij蓱]'
  ipa: metro藞p蓴lij蓱
  translation: metropolis (mother city)
  definition: 袦褨褋褌芯-写械褉卸邪胁邪 褋褌芯褋芯胁薪芯 蟹邪褋薪芯胁邪薪懈褏 薪懈屑 泻芯谢芯薪褨泄.
- term: 锌芯谢褨褋
  ipa: '[藞p蓴l什is]'
  ipa: 藞p蓴l什is
  translation: polis (city-state)
  definition: 袦褨褋褌芯-写械褉卸邪胁邪, 芯褋芯斜谢懈胁邪 褎芯褉屑邪 褋芯褑褨邪谢褜薪芯-械泻芯薪芯屑褨褔薪芯褩 褌邪 锌芯谢褨褌懈褔薪芯褩 芯褉谐邪薪褨蟹邪褑褨褩 褋褍褋锌褨谢褜褋褌胁邪 胁 袛邪胁薪褨泄 袚褉械褑褨褩.
- term: 泻芯谢芯薪褨蟹邪褑褨褟
  ipa: '[k蓴l蓴n什i藞z蓱t汀s什ij蓱]'
  ipa: koloni藞z蓱tsij蓱
  translation: colonization
  definition: 袟邪褋械谢械薪薪褟 褌邪 谐芯褋锌芯写邪褉褋褜泻械 芯褋胁芯褦薪薪褟 胁褨谢褜薪懈褏 蟹械屑械谢褜.
- term: 邪屑褎芯褉邪
  ipa: '[藞蓱mf蓴r蓱]'
  ipa: 藞蓱mfor蓱
  translation: amphora
  definition: 袚谢懈薪褟薪邪 锌芯褋褍写懈薪邪 蟹 写胁芯屑邪 褉褍褔泻邪屑懈, 褟泻褍 胁懈泻芯褉懈褋褌芯胁褍胁邪谢懈 写谢褟 褌褉邪薪褋锌芯褉褌褍胁邪薪薪褟 胁懈薪邪 褌邪 芯谢褨褩.
- term: 小泻褨褎褋褜泻褨 胁褨泄薪懈
  ipa: '[藞s什k什ifs什k什i 藞蕥什ijn瑟]'
  ipa: 藞sk什ifs什k什i 藞v什ijn瑟
  translation: Scythian (Gothic) Wars
  definition: 袙褨泄薪懈 谐芯褌褨胁 褌邪 褨薪褕懈褏 锌谢械屑械薪 锌褉芯褌懈 袪懈屑褋褜泻芯褩 褨屑锌械褉褨褩 褍 III 褋褌. 薪. 械., 褖芯 锌褉懈蟹胁械谢懈 写芯 褉褍泄薪褍胁邪薪薪褟 邪薪褌懈褔薪懈褏 屑褨褋褌 袩褉懈褔芯褉薪芯屑芯褉'褟.
