- term: стенохорія
  ipa: stenoχoˈrʲijɐ
  translation: stenochoria (land hunger)
  definition: Нестача землі, що стала однією з головних причин Великої грецької колонізації.
- term: ойкіст
  ipa: ojˈkist
  translation: oikist (founder of a colony)
  definition: Керівник експедиції, який засновував нову колонію, ставав її першим правителем і шанувався як герой.
- term: ойкумена
  ipa: ojkuˈmɛnɑ
  translation: oikoumene (inhabited world)
  definition: Заселена, цивілізована частина світу в уявленні давніх греків (на противагу світу варварів).
- term: еклесія
  ipa: ekˈlɛsijɐ
  translation: ecclesia (assembly)
  definition: Народні збори в давньогрецьких полісах, вищий орган влади.
- term: буле
  ipa: buˈlɛ
  translation: boule (council)
  definition: Рада в давньогрецьких містах-державах, що готувала справи для народних зборів.
- term: хора
  ipa: ˈχɔrɑ
  translation: chora (territory)
  definition: Сільськогосподарська округа античного полісу.
- term: клер
  ipa: klɛr
  translation: kleros (allotment)
  definition: Земельна ділянка, яку отримував громадянин полісу за жеребом.
- term: евергетизм
  ipa: everɦeˈtɪzm
  translation: euergetism (doing good deeds)
  definition: Практика добровільних пожертв багатих громадян на потреби громади в античному світі.
- term: агора
  ipa: ɑˈɦɔrɑ
  translation: agora (marketplace/assembly)
  definition: Головна площа грецького міста, центр громадського і торгового життя.
- term: метрополія
  ipa: metroˈpɔlijɐ
  translation: metropolis (mother city)
  definition: Місто-держава стосовно заснованих ним колоній.
- term: поліс
  ipa: ˈpɔlʲis
  translation: polis (city-state)
  definition: Місто-держава, особлива форма соціально-економічної та політичної організації суспільства в Давній Греції.
- term: колонізація
  ipa: koloniˈzɑtsijɐ
  translation: colonization
  definition: Заселення та господарське освоєння вільних земель.
- term: амфора
  ipa: ˈɑmforɑ
  translation: amphora
  definition: Глиняна посудина з двома ручками, яку використовували для транспортування вина та олії.
- term: Скіфські війни
  ipa: ˈskʲifsʲkʲi ˈvʲijnɪ
  translation: Scythian (Gothic) Wars
  definition: Війни готів та інших племен проти Римської імперії у III ст. н. е., що призвели до руйнування античних міст Причорномор'я.
