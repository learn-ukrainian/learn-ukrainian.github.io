slug: syntez-zakhid-2022
title: 'Синтез: 2022 — Зміна парадигми?'
word_target: 5000
content_outline:
- section: Вступ — Щось змінилося?
  words: 450
  points:
  - 'Контраст очікувань: «Київ за 3 дні» vs реальний спротив.'
  - Символізм фрази «Мені потрібна зброя, а не таксі».
  - 'Помилка західних розвідок: недооцінка української горизонтальної структури.'
  - 'Визначення парадигми: перехід від об''єкта до суб''єкта.'
- section: 'Порівняння з минулим: I — Історичні паралелі (1918–1994)'
  words: 800
  points:
  - '1918–1921: Ігнорування УНР Антантою, ставка на «єдину неділиму» Росію.'
  - '1945: Ялтинська система та закріплення України як радянської колонії.'
  - '1991: «Chicken Kyiv speech» та страх Заходу перед розпадом СРСР.'
  - '1994: Будапештський меморандум — ілюзія безпеки замість реальних гарантій.'
- section: 'Порівняння з минулим: II — Прелюдія до вторгнення (2008–2014)'
  words: 700
  points:
  - '2008: Бухарестський саміт НАТО — стратегічна помилка Меркель і Саркозі.'
  - '2014: Реакція на анексію Криму — «глибоке занепокоєння» та слабкі санкції.'
  - Мінські угоди як спроба «зберегти обличчя» Путіну коштом суверенітету України.
  - Ембарго на летальну зброю для України (2014–2017) як страх «спровокувати» РФ.
- section: Що змінилося у 2022
  words: 900
  points:
  - 'Економічний фронт: безпрецедентні санкції, замороження активів ЦБ РФ, вихід брендів.'
  - 'Військова підтримка: еволюція від NLAW до Patriot, Leopard та Storm Shadow.'
  - 'Формат «Рамштайн»: інституціалізація військової коаліції (50+ країн).'
  - 'Політичний прорив: статус кандидата в ЄС та кінець епохи «багатовекторності».'
- section: Що не змінилося
  words: 750
  points:
  - 'Стратегія «ескалаційного менеджменту»: дозування допомоги.'
  - Табу на удари по території РФ західною зброєю (до певної межі).
  - Страх перед розпадом Росії (контроль над ядерною зброєю).
  - Відсутність чіткої стратегії перемоги України («as long as it takes» vs «until
    victory»).
- section: Чому 2022 інший
  words: 800
  points:
  - 'Українська суб''єктність: ЗСУ та суспільство нав''язали світові свій порядок
    денний.'
  - 'Моральна ясність: Буча та Ірпінь знищили простір для «business as usual».'
  - 'Тиск громадської думки: солідарність пересічних європейців змусила уряди діяти.'
  - Крах міфу про «другу армію світу».
- section: Чи тривкі зміни
  words: 400
  points:
  - Ризик «втоми від війни» та внутрішні політичні цикли на Заході.
  - Російська ставка на війну на виснаження ресурсів демократій.
  - Необхідність переходу від ситуативної допомоги до довгострокових гарантій.
- section: Підсумок
  words: 200
  points:
  - 2022 рік як кінець «пострадянського періоду» в глобальній політиці.
  - Україна як новий безпековий центр Європи, а не «сіра зона».
  - 'Боротьба триває: зміна парадигми ще не стала незворотною інституційно (НАТО).'
