slug: povist-mynulykh-lit-ii
title: 'Повість минулих літ II: Ключові фрагменти'
word_target: 5000
content_outline:
- section: 'Вступ: Робота з первинним джерелом'
  words: 400
  points:
  - 'Літопис як жанр: поєднання історії, літератури та ідеології.'
  - 'Методологія аналізу: розрізняємо факт, легенду та політичний мотив.'
  - 'Структура уроку: три ключові наративи про владу, віру та порядок.'
- section: 'Фрагмент I: Покликання варягів — Текст і контекст'
  words: 800
  points:
  - 'Аналіз тексту 862 року: «Земля наша велика...» (філологічний розбір).'
  - 'Поняття «наряд»: влада чи порядок? Етимологія терміну.'
  - 'Історична реальність: варяги як найманці та арбітри в племінних конфліктах.'
  - 'Світовий контекст: практика запрошення іноземних правителів у Середньовіччі.'
- section: 'Фрагмент I: Покликання варягів — Битва інтерпретацій'
  words: 800
  points:
  - 'Норманізм vs Антинорманізм: суть наукової (і політичної) дискусії.'
  - Імперський міф про «нездатність слов'ян до державотворення».
  - 'Український погляд (М. Грушевський, М. Брайчевський): внутрішня еволюція державності.'
  - 'Деколонізація: чому важливо відкинути російську імперську схему історії.'
- section: 'Фрагмент II: Хрещення Володимира — Легенда про вибір'
  words: 600
  points:
  - 'Текст 986 року: діалоги з мусульманами, німцями та греками.'
  - '«Русі єсть веселіє пити»: аналіз знаменитої відмови (менталітет чи політика?).'
  - 'Естетичний аргумент: «Не відали, чи на небі ми...» як характеристика руської
    культури.'
- section: 'Фрагмент II: Хрещення Володимира — Realpolitik 988 року'
  words: 600
  points:
  - 'Що замовчує легенда: геополітичний контекст та візантійський союз.'
  - 'Корсунський похід і шлюб з Анною: Русь як супердержава регіону.'
  - Хрещення як вхід до європейського клубу монархів (Pax Christiana).
  - Спростування міфу про «колиску трьох народів» через призму джерел.
- section: 'Фрагмент III: Помста Ольги — Язичницький епос'
  words: 500
  points:
  - 'Текст літопису: аналіз чотирьох етапів помсти.'
  - 'Фольклорна основа: загадки, символізм човна та лазні.'
  - Паралелі зі скандинавськими сагами (сюжет про птахів-паліїв).
  - 'Ольга як «мудра жона» ще до хрещення: образ ідеальної правительки.'
- section: 'Фрагмент III: Помста Ольги — Від міфу до реформи'
  words: 500
  points:
  - 'Сакральний зміст помсти: ритуальне очищення і відновлення порядку.'
  - 'Адміністративна реформа: перехід від полюддя до системи уроків і погостів.'
  - Чому літописець-монах з захватом описує язичницьку жорстокість?
  - Роль жінки у владній ієрархії Русі (порівняння з Європою).
- section: Порівняльний аналіз наративів
  words: 400
  points:
  - 'Спільна схема: Криза (хаос/смерть/язичництво) -> Рішення (варяги/помста/хрещення)
    -> Порядок.'
  - 'Ідеологічна програма Нестора: єдність династії та землі, божественне благословення
    Києва.'
  - 'Мовні засоби літописця: пряма мова, риторичні фігури, біблійні цитати.'
- section: 'Практикум: Інтерпретація джерел'
  words: 400
  points:
  - Застосування методу джерелознавчої критики до нових фрагментів.
  - Виявлення упереджень автора (християнський/києвоцентричний погляд).
  - 'Підсумкова рефлексія: що «Повість» говорить нам про цінності людей XI ст.?'
