slug: halychyna-natsionalnyi-rukh
title: Галицький національний рух
word_target: 5000
content_outline:
- section: Вступ — Боротьба за душу Галичини
  words: 600
  points:
  - 'Криза ідентичності середини XIX ст.: ''Gente Ruthenus, natione Polonus'' проти
    пошуку власного ''Я''.'
  - 'Три шляхи: австрійська лояльність, польська асиміляція або власна національна
    ідея.'
  - 'Поява двох таборів: консерватори (старорусини) та модерністи (народовці).'
  - 'Мовна дискусія як відображення політичного вибору: ''язичіє'' проти народної
    мови.'
- section: Москвофіли — хибний шлях
  words: 750
  points:
  - 'Соціальна база: консервативне греко-католицьке духовенство та інтелігенція (''Святоюрці'').'
  - 'Ідеологія ''єдиної неділимої Росії'': надія на порятунок від полонізації через
    Москву.'
  - Фінансування з Петербурга та роль російських панславістських комітетів.
  - Судовий процес 1882 року (справа Ольги Грабар) та звинувачення у державній зраді.
  - 'Занепад руху: відрив від народної мови та потреб селянства.'
- section: Народовці — український вибір
  words: 750
  points:
  - 'Покоління 1860-х (''молоді русини''): вплив поезії Тараса Шевченка та контактів
    з Наддніпрянщиною.'
  - 'Ідеологія єдності: ''Україна одна — від Карпат до Кавказу''.'
  - Впровадження фонетичного правопису ('кулішівки') як маркер окремішності від росіян
    і поляків.
  - Заснування політичної організації 'Народна Рада' (1885) та перехід до системної
    боротьби.
  - Роль Олександра Барвінського та політика 'нової ери' (спроба українсько-польського
    порозуміння).
- section: «Просвіта» — культурний рух
  words: 750
  points:
  - 'Заснування товариства у 1868 році у Львові: ''Знання — то сила''.'
  - 'Мережа читалень: перетворення селянських хат на осередки культури та самоосвіти.'
  - 'Видавнича діяльність: дешеві книжки-метелики для народу, календарі, газети.'
  - 'Економічна самооборона: створення кооперативів (''Народна торгівля'', ''Маслосоюз'')
    при читальнях.'
  - Боротьба з соціальними недугами (пияцтвом) та виховання гідності.
- section: Січовий рух
  words: 750
  points:
  - Заснування першої 'Січі' Кирилом Трильовським у с. Завалля (1900).
  - 'Легальна форма: пожежно-гімнастичні товариства з парамілітарним змістом.'
  - 'Відродження козацьких традицій: назви (кошовий, осавул), однострій, символіка.'
  - 'Масова мобілізація молоді: Шевченківський здвиг 1914 року (12 тисяч учасників).'
  - Роль 'Січей' у підготовці кадрів для майбутніх Українських Січових Стрільців (УСС).
- section: Політичні партії
  words: 800
  points:
  - Створення РУРП (1890) — першої модерної політичної партії (І. Франко, М. Павлик).
  - Програма 'Україна irredenta' (1895) Юліана Бачинського — вимога державної самостійності.
  - 'Політична реструктуризація 1899 року: вихід націонал-демократів та соціал-демократів
    з РУРП.'
  - УНДП (М. Грушевський, К. Левицький) — масова партія середнього класу та інтелігенції.
  - Боротьба за виборчу реформу та відкриття українського університету у Львові (1901-1914).
- section: Підсумок
  words: 600
  points:
  - 'Тріумф української ідеї: перетворення Галичини на ''Український П''ємонт''.'
  - Поразка москвофільства як історично безперспективного напряму.
  - 'Готовність до державотворення: наявність партій, преси, кадрів, ''Просвіти''
    та ''Січей''.'
  - 'Трагедія Першої світової: Талергоф (австрійські репресії) та переслідування з
    боку російської окупаційної влади.'
