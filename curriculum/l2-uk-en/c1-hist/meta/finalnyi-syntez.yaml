slug: finalnyi-syntez
title: 'Фінальний синтез: Що ми дізналися'
word_target: 5000
content_outline:
- section: Вступ — Кінець курсу, початок розуміння
  words: 500
  points:
  - 'Від розрізнених 135 модулів до цілісної картини: історія як «навігатор» у часі
    та інструмент орієнтації.'
  - 'Головне досягнення: зміна мислення та методології, а не лише запам''ятовування
    фактів.'
  - 'Як думати про історію: концепція Івана Лисяка-Рудницького про Україну як фронтир
    і місце синтезу.'
  - 'Структура модуля: від методологічних основ до практичного імунітету проти пропаганди.'
- section: 'Методологічні уроки: I — Джерела та інтерпретації'
  words: 600
  points:
  - 'Джерелознавство — чому важливе: принцип Марка Блока про історика як слідчого,
    який допитує свідків.'
  - 'Множинність інтерпретацій: чому реальність складніша за чорно-білу картинку,
    і як розрізняти факти та їх оцінки.'
  - 'Міф про «об''єктивну історію»: кожна історія є інтерпретацією фактів, тому критично
    важливо знати, хто саме їх інтерпретує.'
- section: 'Методологічні уроки: II — Критичне мислення'
  words: 500
  points:
  - 'Критичне мислення: формування імунітету проти маніпуляцій через звичку шукати
    першоджерело.'
  - 'Як оцінювати історичні твердження: деконструкція наративів та пошук прихованих
    мотивів автора.'
  - 'Роль історії за Михайлом Грушевським: як пам''ять перетворює людину на особистість,
    а народ — на націю.'
- section: 'Тематичні уроки: I — Механізми імперії та опір'
  words: 700
  points:
  - 'Імперські механізми — як розпізнавати: політика асиміляції, переписування історії
    та мовні заборони (Емський указ, Валуєвський циркуляр).'
  - 'Деколонізаційний контекст: привласнення Росією спадщини Русі та міф про «українців
    як малоросів».'
  - 'Культурна резистенція — як працює: література та мистецтво як форма опору в умовах
    бездержавності (від Т. Шевченка до шістдесятників).'
- section: 'Тематичні уроки: II — Суб''єктність і пам''ять'
  words: 700
  points:
  - 'Агентність — чому ключова: повернення українцям суб''єктності як творців власної
    історії, а не пасивних жертв (Я. Грицак).'
  - 'Пам''ять — як формується: історична політика як поле битви та Голодомор 1933
    року як імперський «інструмент забуття».'
  - 'Деколонізоване трактування термінів: різниця між «Великою Вітчизняною» та Другою
    світовою війною, переосмислення ролі УНР.'
  - 'Тяглість державотворення: тризуб як безперервний символ від Рюриковичів до сучасної
    держави.'
- section: 'Практичні уроки: I — Робота з джерелами та аргументами'
  words: 600
  points:
  - 'Як читати джерела: вміння «читати між рядків» та аналізувати упередженість радянських
    чи імперських текстів.'
  - 'Як оцінювати аргументи: пошук того, що замовчується або заперечується офіційними
    документами (на прикладі преси).'
  - 'Як писати про історію: формування «державницького» фокусу замість виключно «народницького»,
    відмова від віктимізації.'
- section: 'Практичні уроки: II — Пропаганда та інформаційна гігієна'
  words: 500
  points:
  - 'Як розпізнавати пропаганду: маркери маніпуляцій, емоційна лексика та відсутність
    альтернативних точок зору.'
  - 'Деконструкція міфів: спростування російського наративу про «один народ» та тези
    про створення України більшовиками.'
  - 'Історичні аналогії: використання минулого як інформаційної зброї в умовах повномасштабного
    вторгнення 2022 року.'
- section: Відкриті питання
  words: 500
  points:
  - 'Що залишається невідомим: «білі плями» історії, повсякденне життя, регіональна
    специфіка та роль жінок.'
  - 'Де потрібні дослідження: вивчення архівів, відкритих після 1991 року, та повернення
    імен репресованих істориків.'
  - 'Нові джерела — нові інтерпретації: важливість усної історії та спогадів очевидців
    для реконструкції подій ХХ століття.'
  - 'Історія — незавершений проект: за словами Я. Грицака, минуле не змінимо, але
    його розуміння дає ключі до майбутнього.'
- section: Підсумок курсу
  words: 400
  points:
  - 'Від фактів до розуміння: прагматичний підсумок — історія як компас для сучасного
    громадянина.'
  - 'Від споживача до критика: формування стійкої національної ідентичності та незалежної
    аналітичної позиції.'
  - 'Завершення C1-HIST: остаточний розрив із російсько-радянським наративом та готовність
    до захисту української суб''єктності.'
