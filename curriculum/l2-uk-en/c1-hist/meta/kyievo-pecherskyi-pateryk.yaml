slug: kyievo-pecherskyi-pateryk
title: Києво-Печерський патерик
word_target: 5000
content_outline:
- section: Вступ — Агіографія як джерело
  words: 500
  points:
  - Визначення жанру 'патерик' (отцівник) та його візантійські прототипи.
  - 'Унікальність Києво-Печерського патерика: місцевий матеріал, живі діалоги, реалізм.'
  - 'Специфіка середньовічного сприйняття: диво як факт реальності, а не вигадка.'
  - 'Методологія читання: як відділити історичне зерно від агіографічної полови.'
- section: 'Історія тексту: I — Листування Симона і Полікарпа'
  words: 700
  points:
  - 'Історичний контекст XIII ст.: роздробленість Русі та піднесення ''Залісся''.'
  - 'Постаті авторів: єпископ Симон (Володимир-на-Клязьмі) та чернець Полікарп (Київ).'
  - 'Конфлікт як рушій сюжету: марнославство Полікарпа vs смирення Симона.'
  - 'Києвоцентризм Симона: відмова від єпископської пихи заради ''сміття'' Печерської
    лаври.'
- section: 'Історія тексту: II — Редакції та друк'
  words: 600
  points:
  - 'Арсеніївська (1406) та Касіянівські (1460, 1462) рукописні редакції: впорядкування
    хаосу.'
  - Включення творів Нестора Літописця (Житіє Феодосія) до корпусу Патерика.
  - 'Епоха бароко: роль Петра Могили та Інокентія Гізеля у підготовці друку.'
  - 'Видання 1661 року: Патерик як бестселер та інструмент конфесійної боротьби.'
- section: 'Структура патерика: I — Житія засновників'
  words: 700
  points:
  - 'Антоній Печерський: традиція аскези, самітництва та печерного життя.'
  - 'Феодосій Печерський: запровадження Студійського уставу та спільножиття (кіновії).'
  - 'Дві моделі святості: індивідуальний подвиг vs служіння братії та світу.'
  - Роль Успенського собору як сакрального центру монастиря в оповідях.
- section: 'Структура патерика: II — Оповіді про ченців'
  words: 600
  points:
  - 'Тематичне розмаїття: від чудес зцілення до боротьби з бісами (спокусами).'
  - 'Моральні дилеми: нестяжання vs багатство (Арефа), слухняність vs гординя.'
  - 'Образи ''подвижників'': Прохор Лободник (чудо з сіллю), Алімпій (іконописець),
    Агапіт (лікар).'
  - Фольклорні елементи та народні вірування в тканині церковного тексту.
- section: Фрагмент — Житіє Феодосія Печерського
  words: 700
  points:
  - Аналіз уривка про дитинство Феодосія (конфлікт з матір'ю).
  - 'Психологізм образу матері: любов, що стає перешкодою до святості.'
  - Топос 'святого отрока' vs реалії провінційного життя (Курськ, Київ).
  - 'Втеча до Києва: соціальна мобільність та релігійний вибір в XI столітті.'
- section: 'Патерик як історичне джерело: I — Соціально-політичний вимір'
  words: 700
  points:
  - 'Відносини з владою: монастир як совість нації, критика князівських міжусобиць.'
  - 'Епізод з князем Святославом: Феодосій відмовляється благословити узурпатора.'
  - 'Соціальний склад братії: ''князі і смерди'' в одному просторі (егалітаризм).'
  - 'Варяги, греки, вірмени в Патерику: етнічна строкатість Києва.'
- section: 'Патерик як історичне джерело: II — Побут та економіка'
  words: 600
  points:
  - 'Монастирська економіка: земельні надання, сіль, торгівля, ремесла.'
  - 'Деталі повсякдення: їжа (хліб, сочевиця), одяг (свита), гігієна (лазня).'
  - 'Медицина XI ст.: протистояння ченців-цілителів (Агапіт) та світських лікарів
    (вірменин).'
  - 'Архітектура та мистецтво: свідчення про будівництво та оздоблення Лаври.'
- section: Критика джерела
  words: 600
  points:
  - 'Проблема вірогідності: як історик працює з описом чудес.'
  - 'Літературний етикет: запозичення сюжетів з єгипетських та візантійських патериків.'
  - 'Тенденційність тексту: вихваляння печерського чернецтва, ''патріотизм'' обителі.'
  - 'Що Патерик замовчує: внутрішні конфлікти, дисциплінарні порушення (окрім повчальних).'
- section: Підсумок
  words: 400
  points:
  - 'Патерик як ''золота книга'' українського народу: вплив на формування ідентичності.'
  - 'Тяглість традиції: від Русі до козацького бароко і сучасності.'
  - 'Значення для деколонізації: доказ існування потужної київської культури до ''московського
    періоду''.'
  - Патерик як пам'ятник живого духу, а не мертвої букви.
