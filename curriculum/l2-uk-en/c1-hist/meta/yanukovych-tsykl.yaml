slug: yanukovych-tsykl
title: 'Янукович: Сучасна версія циклу'
word_target: 5000
content_outline:
- section: Вступ — Цикл у XXI столітті
  words: 400
  points:
  - 'Концепція «кооптації еліт»: порівняння донецького клану з козацькою старшиною
    XVIII ст. (обмін лояльності на привілеї).'
  - Янукович як фігура, що марно намагалася грати у «багатовекторність», але стала
    інструментом метрополії.
  - 'Сучасна версія старого паттерну: економічні схеми замість роздачі дворянських
    титулів.'
  - 'Структура модуля: від Харківських угод до Революції Гідності та розриву багатовікового
    циклу підпорядкування.'
- section: 'Фаза 1 — Підкуп (2010-2013): I — Харківські угоди та знижка'
  words: 450
  points:
  - 'Підписання угод 21 квітня 2010 року: легалізація російського військового плацдарму
    до 2042 року.'
  - 'Знижка на газ як ілюзія: законсервувала енергозатратну промисловість Донбасу,
    хоча ціна залишалася високою.'
  - Історична оцінка «Харківського Переяслава» як акту здачі суверенітету за тактичні
    вигоди.
- section: 'Фаза 1 — Підкуп (2010-2013): II — Російський кредит та обіцянки'
  words: 450
  points:
  - Домовленість про російський кредит у 15 мільярдів доларів як прямий політичний
    «хабар».
  - 'Що обіцяли натомість: збереження клептократичної вертикалі влади та здача національних
    інтересів.'
  - 'Спростування міфу про допомогу «братньому народу»: це була плата за втрату української
    суб''єктності.'
- section: 'Фаза 2 — Залежність: I — Газова і кредитна пастка'
  words: 450
  points:
  - Створення штучного боргового зашморгу через критичну залежність від російських
    ринків та енергоносіїв.
  - Аналіз заяв російських посадовців про «нерозривність економік» для виправдання
    поглинання.
  - Збагачення олігархів та формування «Сім'ї» як результат корупційного консенсусу
    з Кремлем.
- section: 'Фаза 2 — Залежність: II — Політичний тиск'
  words: 450
  points:
  - Згортання демократії та спроби збудувати авторитаризм російського зразка (арешти
    лідерів опозиції).
  - 'Імітація європейського шляху: декларації про євроінтеграцію слугували лише ширмою
    для торгів.'
  - Жорсткий політичний тиск з боку Москви, який систематично закривав шлях до ЄС.
- section: 'Фаза 3 — Вілнюс 2013: I — Тиск Росії'
  words: 450
  points:
  - Угода про асоціацію була готова, але влітку 2013 року РФ розпочала економічний
    шантаж і торговельні війни.
  - 'Таємні зустрічі Януковича з Путіним: жорсткий тиск та погрози повномасштабного
    конфлікту.'
  - 'Спростування міфу: Угода про асоціацію не загрожувала промисловості, а вимагала
    зменшення корупції режиму.'
- section: 'Фаза 3 — Вілнюс 2013: II — Відмова від Угоди'
  words: 450
  points:
  - '«Чорний четвер» 21 листопада: уряд М. Азарова офіційно зупиняє підготовку до
    підписання Угоди.'
  - Провал Вільнюського саміту 28–29 листопада як капітуляція перед шантажем та остаточна
    точка неповернення.
  - Російська інформаційна кампанія, що цинічно подавала відмову як «порятунок від
    соціально-економічної катастрофи».
- section: 'Фаза 4 — Крах: I — Майдан і втеча'
  words: 450
  points:
  - Переростання Євромайдану у масштабну національно-визвольну та антиколоніальну
    революцію.
  - Ухвалення неконституційних «диктаторських законів» 16 січня — спроба скалькувати
    російські репресивні практики.
  - Розстріли Небесної Сотні 18–20 лютого на Інститутській та ганебна втеча Януковича
    до Росії.
- section: 'Фаза 4 — Крах: II — Анексія і війна'
  words: 450
  points:
  - Денонсація Росією Харківських угод після військової окупації та незаконної анексії
    Криму.
  - Початок війни на Донбасі як гібридна військова помста імперії за втрату контролю
    над Україною.
  - Злам російського імперського плану підкорення через збройну агресію та розгортання
    спротиву.
- section: 'Чому цикл зламався: I — Громадянське суспільство'
  words: 450
  points:
  - Феномен українського горизонтального суспільства та традиції дієвого волонтерства
    й самоврядування.
  - Досвід 2004 року, який допоміг сформувати зріле громадянське суспільство як самостійного
    політичного суб'єкта.
  - Відкидання патерналістської моделі та російського міфу про «доброго царя».
- section: 'Чому цикл зламався: II — Європейський вибір'
  words: 450
  points:
  - Європейський вибір став питанням гідності, прав людини та цивілізаційного поступу,
    а не лише економіки.
  - 'Історичні паралелі: на відміну від минулих епох, український народ масово виступив
    проти компромісу еліт.'
  - Народ відмовився бути пасивним спостерігачем і не дозволив владі здати суверенітет.
- section: Підсумок
  words: 400
  points:
  - Янукович як останній «гетьман» пострадянської кооптації та уособлення кінця епохи
    залежності.
  - Революція Гідності як історична подія, що назавжди розірвала багатовіковий цикл
    підпорядкування.
  - Трагічний, але невідворотний перехід України до синтезу модерної політичної нації.
