slug: druha-khvylia-politychna
title: 'Друга хвиля: Політична (1920-1923)'
word_target: 5000
content_outline:
- section: Вступ — Поразка і відступ
  words: 600
  points:
  - 'Листопад 1920 року: Перехід Армії УНР через Збруч як фінал визвольних змагань.'
  - 'Демографічний портрет еміграції: 30-40 тисяч осіб, еліта нації (військові, урядовці,
    інтелігенція).'
  - 'Правовий вакуум: статус інтернованих та боротьба за визнання (Нансенівські паспорти).'
  - Психологічна травма поразки та трансформація армії в еміграційну спільноту.
- section: 'Табори інтернованих: Держава за дротом'
  words: 900
  points:
  - 'Географія інтернування: Каліш, Щипйорно, Вадовиці, Ланьцут — умови життя та побуту.'
  - 'Феномен самоорганізації: збереження військової структури та дисципліни під проводом
    М. Омеляновича-Павленка.'
  - 'Культурний вибух: заснування таборових гімназій, театрів, хорів та преси.'
  - Ліквідація таборів (1923-1924) та перехід до цивільного життя в Польщі та Європі.
- section: Прага — інтелектуальна столиця еміграції
  words: 900
  points:
  - 'Геополітичний контекст: «Руська акція» Томаша Масарика та підтримка емігрантів.'
  - 'Українські високі школи: Український Вільний Університет (УВУ), Педагогічний
    Інститут ім. Драгоманова.'
  - 'Українська Господарська Академія в Подєбрадах: кузня технічної інтелігенції.'
  - 'Науковий доробок: формування національної наукової школи вільної від радянської
    цензури.'
- section: 'Уряд УНР в екзилі: Символ безперервності'
  words: 800
  points:
  - 'Правові засади: Закон про тимчасовий державний устрій та легітимність Державного
    Центру УНР.'
  - 'Постаті: Симон Петлюра як Головний Отаман та Андрій Лівицький як організатор
    державного життя.'
  - 'Дипломатичний фронт: діяльність у Лізі Націй, протести проти окупації та Голодомору.'
  - Значення ДЦ УНР як єдиного легітимного представника української державності до
    1992 року.
- section: 'Географія діаспори: Відень, Берлін, Париж'
  words: 700
  points:
  - 'Відень: ранній центр дипломатії та видавничої справи (Союз Визволення України).'
  - 'Берлін: осередок консервативних сил, гетьманського руху та наукових інституцій.'
  - 'Париж: центр дипломатичної боротьби та трагічної загибелі Симона Петлюри (1926).'
  - 'Варшава: складний симбіоз союзництва та контролю в рамках політики «прометеїзму».'
- section: 'Політичні течії: Розколи та пошук єдності'
  words: 700
  points:
  - 'Великий розкол: Республіканці (УНР) проти Монархістів (Гетьманці).'
  - 'Ідеологічні розбіжності: орієнтація на західні демократії (Польща, Франція) vs.
    німецький вектор.'
  - 'Поява Української Військової Організації (УВО): радикальна альтернатива традиційним
    партіям.'
  - Внутрішня полеміка як ознака демократичної, хоч і роз'єднаної, політичної культури.
- section: 'Підсумок: Спадщина Другої хвилі'
  words: 600
  points:
  - Збереження національної ідеї та державної символіки в умовах бездержавності.
  - 'Інституційна спроможність: створення наукових, освітніх та громадських структур
    світового рівня.'
  - 'Місток поколінь: передача досвіду визвольних змагань майбутнім борцям (ОУН, УПА).'
  - 'Урок для сучасності: важливість єдності та інституційної стійкості.'
