slug: sich-dokumenty
title: 'Документи Січі: Козацьке самоврядування'
word_target: 5000
content_outline:
- section: Вступ — Січ як держава
  words: 400
  points:
  - 'Запорозька Січ: від міфу про анархію до розуміння структури християнської республіки'
  - Самоврядування як унікальний український політичний феномен раннього модерну
  - 'Архів Коша: що збереглося і чому ці документи є ключем до розуміння епохи'
  - Важливість деконструкції імперських наративів через першоджерела
- section: 'Устрій Січі: Адміністрація та Територія'
  words: 600
  points:
  - 'Курінна система: 38 куренів як військово-адміністративні та побутові одиниці'
  - 'Паланковий устрій: 8 паланок (Кодацька, Самарська, Бугогардівська та ін.) як
    прообраз територіального поділу'
  - Взаємодія центру (Січ) та периферії (зимоівники, паланки)
  - 'Економічна база самоврядування: від здобичі до господарювання'
- section: 'Устрій Січі: Виборна система та Влада'
  words: 600
  points:
  - 'Козацька рада: механізм прямої демократії та його еволюція'
  - 'Процедура виборів: символізм (сипання землею на голову) та реальна політика'
  - 'Інститут кошового отамана: межі влади, відповідальність та підзвітність раді'
  - Демократія чи олігархія? Роль старшини та конфлікт 'голоти' з 'сивоусими'
- section: 'Типи документів: Адміністративні та Судові'
  words: 600
  points:
  - 'Військова канцелярія: мозок Січі та роль військового писаря'
  - 'Класифікація документів: універсали, ордери, атестати, подорожні листи'
  - 'Протоколи рад: як фіксувалися колективні рішення'
  - 'Втрачені скарби: доля січового архіву після 1775 року'
- section: 'Козацьке право: Звичаї та Судочинство'
  words: 600
  points:
  - 'Звичаєве право (''словесне''): верховенство традиції над писаним законом'
  - 'Судова ієрархія: від курінного отамана до Коша як вищої інстанції'
  - Змагальність процесу та роль свідків у козацькому суді
  - 'Рівність перед судом: ідеал та реальність майнового розшарування'
- section: 'Козацьке право: Злочини та Покарання'
  words: 600
  points:
  - 'Ієрархія злочинів: вбивство побратима, крадіжка, ''жіноче питання'''
  - 'Система покарань: киї, гак, закопування живцем — жорстокість заради порядку'
  - Публічність покарання як виховний момент для спільноти
  - Порівняння з європейськими карними практиками того часу
- section: Фрагмент — Судова справа (Аналіз джерела)
  words: 600
  points:
  - 'Текст джерела: протокол допиту або вирок (з архіву Коша)'
  - 'Аналіз процедури: як відбувався розгляд справи'
  - Аргументація сторін та логіка винесення вироку
  - Мовні особливості діловодства XVIII століття
- section: 'Січ і зовнішній світ: Дипломатія'
  words: 600
  points:
  - 'Суб''єктність Січі: самостійна гра на міжнародній арені'
  - 'Відносини з Гетьманщиною: співпраця та конкуренція двох центрів'
  - 'Дипломатія з Кримом і Туреччиною: інститут товмачів та листування'
  - 'Відносини з Москвою: від автономії до поступового поглинання'
- section: 'Підсумок: Історична оцінка'
  words: 400
  points:
  - Січ як протодержавне утворення з розвиненими інститутами
  - Унікальність документів Січі для реконструкції соціальної історії
  - Баланс між романтизацією (Гоголь) та історичною реальністю (Яворницький, Грушевський)
  - Спадщина козацького самоврядування в модерній Україні
