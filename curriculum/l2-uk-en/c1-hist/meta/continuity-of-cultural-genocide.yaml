slug: continuity-of-cultural-genocide
title: 'Тяглість культурного геноциду: 1937 vs 2022'
word_target: 5000
content_outline:
- section: 'Вступ та контекст: I — Концепція Рафаеля Лемкіна'
  words: 400
  points:
  - Визначення культурного геноциду за Рафаелем Лемкіним як юридичного терміну.
  - Знищення патернів культури (мови, традицій, еліти) з метою перетворення нації
    на населення.
- section: 'Вступ та контекст: II — Тяглість російських методів'
  words: 400
  points:
  - Системна політика Москви щодо фізичного винищення носіїв української ідентичності.
  - Використання однакових інструментів придушення з різницею у 85 років (СРСР і РФ).
- section: 'Методи нищення: Від Сандармоху до Ізюма: I — Архіпелаг ГУЛАГ і Сандармох'
  words: 500
  points:
  - Урочище Сандармох як ешафот Розстріляного Відродження та символ знищення еліти.
  - Страта Леся Курбаса, Миколи Куліша, Валер'яна Підмогильного (27 жовтня – 4 листопада
    1937).
  - '''Зниклий'' соловецький етап та згортання українізації у 1930-х роках.'
- section: 'Методи нищення: Від Сандармоху до Ізюма: II — Технологія сталінського
    терору'
  words: 450
  points:
  - 'Індустріальний терор: масові ями, постріл у потилицю, вироки ''трійки''.'
  - 'Роль виконавців: капітан Матвєєв та 1111 розстріляних в''язнів.'
  - 'Мета: таємне та швидке обезголовлення нації.'
- section: 'Методи нищення: Від Сандармоху до Ізюма: III — Окупація 2022 та Ізюмський
    ліс'
  words: 500
  points:
  - Повномасштабне вторгнення як новий етап полювання на українське.
  - 'Масові поховання в Ізюмському лісі: понад 400 тіл, безіменні могили під номерами.'
  - Системне знищення книг українською мовою та руйнування музеїв (Сковороди, Куїнджі).
- section: 'Методи нищення: Від Сандармоху до Ізюма: IV — Списки ФСБ та справа Вакуленка'
  words: 450
  points:
  - Складання розстрільних 'списків' на окупованих територіях (активісти, вчителі,
    ветерани).
  - Викрадення та вбивство дитячого письменника Володимира Вакуленка (березень 2022).
  - Історія порятунку щоденника Вакуленка, захованого під вишнею.
- section: 'Історіографічне порівняння імперських практик: I — Паралелі інструментів
    терору'
  words: 500
  points:
  - Розстрільні списки Сталіна проти сучасних списків ФСБ та Росгвардії.
  - 'Географія терору: ліси Карелії (таємність заслання) проти лісів під містом (брак
    часу).'
  - 'Спільна мета обох режимів: повна покора, викорінення ідентичності та асиміляція.'
- section: 'Історіографічне порівняння імперських практик: II — Еволюція імперської
    пропаганди'
  words: 500
  points:
  - Зіставлення радянської риторики 'ворогів народу' та 'буржуазних націоналістів'.
  - Сучасна риторика 'дешатанізації', 'денацифікації' та 'захисту російськомовних'.
  - Спростування імперського міфу про 'перегини на місцях' та доведення системності
    геноциду.
- section: 'Деколонізаційна перспектива: I — Зв''язок поколінь і Нове Розстріляне
    Відродження'
  words: 450
  points:
  - Тяглість від 'Розстріляного Відродження' через 'Шістдесятників' до 'Покоління
    2022'.
  - '''Нове Розстріляне Відродження'' як концепт усвідомлення масштабів втрат.'
  - Культура як форма опору та відмова від російського контенту і концепту 'братніх
    народів'.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність та опір'
  words: 450
  points:
  - 'Злам віктимного наративу: українці як воїни, а не лише жертви.'
  - Участь митців (Артем Чех, Олег Сенцов, Артем Чапай) у збройному захисті держави.
  - Безпрецедентний вибух нової української культури в умовах екзистенційної війни.
- section: Підсумок та спадщина
  words: 500
  points:
  - Життя і загибель Вікторії Амеліної як місток між дослідженням минулого і трагедією
    сьогодення.
  - Останній запис Вакуленка 'Усе буде Україна' як моральний заповіт.
  - Збереження пам'яті як запобіжник від повторення трагедій до моменту руйнування
    імперії.
