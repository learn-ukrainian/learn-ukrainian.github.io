slug: pereiaslav-alternatyvy
title: 'Переяслав 1654: Які були альтернативи?'
word_target: 5000
content_outline:
- section: Вступ — «Що якби...»
  words: 400
  points:
  - '1654 рік як геополітичне перехрестя: Україна в оточенні трьох імперій.'
  - 'Контрфактична історія: інструмент аналізу втрачених можливостей, а не фантазій.'
  - 'Міф про безальтернативність: чому радянська історіографія стверджувала, що ''іншого
    шляху не було''.'
  - 'Огляд чотирьох векторів: Польща, Туреччина, Швеція, Москва.'
- section: Швецька альтернатива
  words: 600
  points:
  - 'Геополітика Півночі: Карл X Густав як природний союзник проти Польщі.'
  - 'Протестантсько-православний альянс: спільні інтереси без релігійного тиску.'
  - 'Чому не у 1654: географічна віддаленість та вичікувальна позиція Швеції.'
  - 'Раднотська угода 1656 року: втрачений шанс на балтійсько-чорноморську вісь.'
  - 'Візія: Україна як європейська держава у сфері впливу Швеції.'
- section: Османська альтернатива
  words: 600
  points:
  - 'Модель васалітету: приклад Молдови та Валахії (автономія під протекторатом).'
  - 'Дипломатія Порти: листування Хмельницького з султаном ще з 1648 року.'
  - 'Бар''єри: релігійний фактор (іслам vs православ''я) та пам''ять про невільницькі
    рейди.'
  - 'Військовий аспект: ненадійність Кримського хана як союзника.'
  - 'Петро Дорошенко: спроба реалізації турецького вектора у 1669 році (запізніла).'
- section: Польська альтернатива
  words: 800
  points:
  - 'Природна метрополія: культурна та політична близькість еліт (шляхти і старшини).'
  - 'Трагедія непорозуміння: небажання Варшави визнати козацтво третім політичним
    народом.'
  - 'Військова втома: чому після Зборова і Білої Церкви довіра була зруйнована.'
  - 'Гадяцька унія 1658: проєкт ''Великого Князівства Руського'' Івана Виговського.'
  - 'Чому Гадяч провалився: опір ''черні'' та польського сейму.'
- section: Незалежність
  words: 800
  points:
  - 'Мрія про суверенітет: чи могла Гетьманщина вижити самостійно?'
  - 'Проблема легітимності: світ монархій не визнавав ''бунтівників'' без сюзерена.'
  - 'Економічний колапс: 6 років війни, епідемії, спалена земля.'
  - 'Військове оточення: неможливість воювати на три фронти одночасно.'
  - 'Внутрішня опозиція: відсутність єдності серед полковників щодо моделі держави.'
- section: 'Чому Москва?: I — Фактор віри та військовий союз'
  words: 800
  points:
  - 'Православний цар: ідеологічний аргумент, зрозумілий для простого народу.'
  - 'Військовий розрахунок Хмельницького: потрібна кіннота і артилерія проти Польщі.'
  - 'Земський собор 1653: Москва довго вагалася, боячись війни з Польщею.'
  - 'Переяславська рада 8 січня: церемонія без підписання документів.'
  - 'Інцидент з присягою: відмова Бутурліна присягати від імені царя — перший тривожний
    дзвінок.'
- section: 'Чому Москва?: II — Березневі статті та ілюзії'
  words: 600
  points:
  - 'Березневі статті 1654: аналіз умов (реєстр 60 тис., право на дипломатію, виборність
    гетьмана).'
  - 'Зіткнення політичних культур: козацький ''договір'' vs московське ''жалування''.'
  - 'Непорозуміння суті: Хмельницький бачив тимчасовий військовий союз, цар — вічне
    підданство.'
  - 'Віленське перемир''я 1656: момент істини, коли Москва зрадила інтереси України.'
- section: Підсумок
  words: 400
  points:
  - 'Аналіз вибору: рішення Хмельницького як результат вичерпання інших опцій.'
  - 'Історичний урок: небезпека союзу з авторитарним режимом під гаслами ''братства''.'
  - 'Спадщина 1654: як Переяслав став інструментом імперської пропаганди.'
  - 'Висновок: незалежність здобувається власною силою, а не протекторатом.'
