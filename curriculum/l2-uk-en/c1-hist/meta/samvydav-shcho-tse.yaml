slug: samvydav-shcho-tse
title: 'Самвидав: Що це було?'
word_target: 5000
content_outline:
- section: Вступ — Підпільна література
  words: 500
  points:
  - 'Що таке самвидав: походження терміна (іронічне «сам-себе-видав» від російського
    «самиздат») та його специфічний національно-визвольний вимір в Україні.'
  - 'Чому виник — цензура: тотальний контроль Головліту та монополія комуністичної
    партії на будь-яку публічну інформацію.'
  - 'Форми — машинопис, копії: створення, тиражування та поширення текстів поза офіційними
    каналами радянського друку.'
  - 'Значення для опору: подолання страху в суспільстві, консолідація опозиційної
    інтелігенції та формування альтернативного інформаційного простору.'
- section: Історія самвидаву
  words: 800
  points:
  - 'Витоки — 1950-60-ті: культурницький етап, поширення неопублікованої поезії (Симоненко,
    Костенко, Вінграновський) та особистих щоденників.'
  - '«Відлига» — відносна свобода: зв''язок появи перших нецензурованих текстів із
    хрущовською десталінізацією.'
  - 'Шістдесятники — нове покоління: перехід до політизації після пожежі в бібліотеці
    АН УРСР (1964), памфлети Євгена Сверстюка та трактат Івана Дзюби «Інтернаціоналізм
    чи русифікація?» (1965).'
  - 'Повернення репресій: перша хвиля арештів інтелігенції у 1965 році (В. Чорновіл
    «Лихо з розуму»), подальший «Великий погром» 1972 року та початок табірного періоду.'
- section: 'Як працював самвидав: I — Технологія та розповсюдження'
  words: 600
  points:
  - 'Техніка — друкарська машинка: побутові портативні машинки («Еріка», «Москва»,
    «Колібрі») як головний інструмент підпільного друку.'
  - 'Копіювання — 5-7 копій: технологія «закладки» з використанням тонкого цигаркового
    паперу та копірки для створення 4-5 читабельних «сліпих» копій.'
  - 'Розповсюдження — ланцюжки: передача з рук у руки за принципом геометричної прогресії
    («прочитав — передай іншому»), що спиралася на глибоку особисту довіру.'
- section: 'Як працював самвидав: II — Ризики та міжнародний вимір'
  words: 600
  points:
  - 'Ризики — що загрожувало: облік шрифтів машинок у КДБ, вилучення під час обшуків
    та засудження за статтею 62 КК УРСР «Антирадянська агітація і пропаганда» (до
    7 років таборів і 5 років заслання).'
  - 'Вивезення на Захід: роль «тамвидаву» — передача мікроплівок через дипломатів
    і туристів за кордон, де тексти друкувалися видавництвами («Сучасність», «Смолоскип»)
    і поверталися в Україну через Радіо Свобода.'
- section: 'Типи текстів: I — Художня література та хроніки'
  words: 600
  points:
  - 'Літературні твори: заборонена поезія Василя Стуса, Ліни Костенко, а також поширення
    вилучених з бібліотек офіційних видань (наприклад, роману «Собор» Олеся Гончара).'
  - 'Хроніки репресій: правозахисна документалістика, складання списків політв''язнів,
    фіксація та стенограмування закритих судових процесів для інформування світу.'
- section: 'Типи текстів: II — Публіцистика та дослідження'
  words: 600
  points:
  - 'Звернення і петиції: відкриті колективні листи до керівництва СРСР та УРСР із
    правозахисними вимогами дотримуватися власної Конституції.'
  - 'Переклади: поширення іноземної літератури та перекладів демократичних текстів
    загальносоюзного російського самвидаву.'
  - 'Історичні дослідження: науковий самвидав для спростування офіційних імперських
    історичних міфів (зокрема, есей Михайла Брайчевського «Приєднання чи возз''єднання?»).'
- section: Український самвидав — особливості
  words: 800
  points:
  - 'Національне питання — центральне: деколонізаційна відмінність від російського
    (московського) самвидаву — українці боролися не лише за права людини, а насамперед
    за національне визволення та збереження ідентичності.'
  - 'Мова як опір: використання української мови у самвидаві як свідомий акт політичної
    та культурної непокори в умовах тотальної русифікації.'
  - '«Український вісник» Чорновола: заснування В''ячеславом Чорноволом у січні 1970
    року у Львові першого незалежного правозахисного та інформаційного журналу.'
  - 'Зв''язок із загальносоюзним: взаємодія та солідарність із московськими дисидентами
    («Хроника текущих событий»), обмін інформацією про політв''язнів.'
- section: Фрагмент — Перший номер
  words: 700
  points:
  - 'Текст (з глосами): детальний розбір передмови до першого випуску «Українського
    вісника» (січень 1970 р.).'
  - 'Мета видання: виразний легалістський підхід — надання об''єктивної інформації
    про порушення конституційних прав громадян без використання антирадянських чи
    антикомуністичних гасел.'
  - 'Тон і стиль: підкреслено стримана, фактологічна стилістика текстів, спрямована
    на уникнення звинувачень КДБ у «наклепницьких вигадках».'
  - 'Аудиторія: орієнтація журналу на українську інтелігенцію, діаспору та західний
    демократичний світ для прориву залізної завіси навколо УРСР.'
- section: Підсумок
  words: 400
  points:
  - 'Самвидав як феномен: усвідомлення самвидаву як єдиної форми вільного інтелектуального
    життя в умовах тоталітаризму.'
  - 'Значення для історії: ключова роль у формуванні правозахисного дисидентського
    руху 1960–1980-х років та підготовці ґрунту для здобуття незалежності.'
  - 'Підготовка до наступних модулів: перехід дисидентів від підпільної публіцистики
    до відкритої боротьби в таборах ГУЛАГу та створення Української Гельсінської групи.'
