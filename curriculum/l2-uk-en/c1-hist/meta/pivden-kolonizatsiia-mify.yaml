slug: pivden-kolonizatsiia-mify
title: 'Південь: Колонізація та міфи «Новоросії»'
word_target: 5000
content_outline:
- section: Вступ — «Новоросія» — що це?
  words: 500
  points:
  - 'Етимологія терміну: імперська калька з колоніальних назв (New England, New Spain).'
  - 'Географія міфу: які території імперія намагалася перейменувати.'
  - 'Мета конструктів: стирання козацької та татарської історії (tabula rasa).'
  - 'Політичний реаніматор: чому термін виринув у 2014 році.'
- section: 'До «Новоросії»: Дике поле чи Великий Луг?'
  words: 800
  points:
  - Деконструкція міфу «Дикого поля» як порожнечі.
  - 'Паланковий устрій: адміністративна сітка Запорожжя (Кодацька, Інгульська).'
  - 'Зимівники та слободи: економічна інфраструктура Степу до приходу імперії.'
  - 'Кримський фактор: татарська цивілізація Півдня та взаємодія з козаками.'
- section: 'Російська колонізація: І — Імперський каток'
  words: 600
  points:
  - Ліквідація Січі (1775) та анексія Криму (1783) як передумови колонізації.
  - 'Роздача земель: формування латифундій російського дворянства (Потьомкін, Воронцов).'
  - 'Кріпацтво замість вольностей: зміна соціального статусу населення.'
- section: 'Російська колонізація: ІІ — Демографічна мозаїка'
  words: 600
  points:
  - 'Запрошення іноземців: німці-меноніти, серби, болгари.'
  - 'Статистика Кабузана: українці як абсолютна більшість (71.5%) на кінець XVIII
    ст.'
  - 'Росіяни як меншина: чиновники, військові та поміщики, а не селяни.'
- section: Одеса — імперське місто чи український порт?
  words: 800
  points:
  - '1415 рік: Коцюбіїв-Хаджибей — 600 років історії замість 200.'
  - 'Рескрипт 1794 року: перейменування існуючого міста, а не створення.'
  - 'Етнічний склад ранньої Одеси: українська стихія передмість (Пересип, Молдаванка).'
  - 'Міф про «російське місто»: чому він виник і кому був вигідний.'
- section: 'Міста Півдня: Походження та ідентичність'
  words: 800
  points:
  - 'Дніпро: від козацької Половиці та Нового Кодака до імперського Катеринослава.'
  - 'Маріуполь: фортеця Домаха та трагедія депортованих кримських греків.'
  - 'Херсон та Миколаїв: верфі на місці козацьких укріплень (Олександр-Шанц).'
  - Русифікація міст у XIX-XX ст. як цілеспрямована політика.
- section: '«Новоросія» 2014-2022: Крах міфу'
  words: 600
  points:
  - '«Російська весна» 2014: чому проект «Новоросія» не злетів.'
  - 'Ідентичність Півдня: російськомовний український патріотизм.'
  - 'Опір 2022 року: Херсон, Миколаїв, Запоріжжя як форпости України.'
- section: 'Підсумок: Повернення імен'
  words: 300
  points:
  - 'Деколонізація топонімії: повернення історичної правди.'
  - 'Синтез: Південь як органічна частина українського політичного тіла.'
  - Кінець епохи «Новоросії».
