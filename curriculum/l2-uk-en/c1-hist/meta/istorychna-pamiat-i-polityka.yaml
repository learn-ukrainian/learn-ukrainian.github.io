slug: istorychna-pamiat-i-polityka
title: Історична пам'ять і політика
word_target: 5000
content_outline:
- section: Вступ — Пам'ять як поле битви
  words: 400
  points:
  - Історична пам'ять як емоційний і вибірковий соціальний конструкт, на відміну від
    об'єктивної академічної історії.
  - Роль держави, інституцій освіти та медіа у формуванні колективної пам'яті та офіційного
    наративу.
  - 'Мобілізаційний потенціал пам''яті: консолідація нації або поляризація суспільства.'
  - Концепція «безпеки ідентичності» та захисту національної безпеки в умовах гібридної
    війни.
- section: 'Теоретичні основи: I — Класичні концепції'
  words: 400
  points:
  - 'Концепція Моріса Альбвакса: соціальні рамки пам''яті та спогади через призму
    групи.'
  - «Місця пам'яті» (lieux de mémoire) П'єра Нора як точки кристалізації ідентичності
    при зникненні живого середовища пам'яті.
  - Роль фізичних монументів та символічних дат як локусів, де пам'ять знаходить свій
    притулок.
- section: 'Теоретичні основи: II — Ассмани та український контекст'
  words: 400
  points:
  - 'Розмежування Ян та Алейди Ассман: комунікативна пам''ять (жива, до 3-4 поколінь)
    та культурна (інституціоналізована).'
  - Функціональна (дієва) та накопичувальна (архівна) пам'ять у суспільних процесах.
  - Релевантність цих західних концептів для осмислення українського постколоніального
    та посттоталітарного транзиту.
- section: 'Інструменти політики пам''яті: I — Державні та освітні механізми'
  words: 400
  points:
  - 'Законодавча рамка (memory laws): охорона пам''яті та криміналізація (наприклад,
    заперечення Голодомору).'
  - Трансформація календаря та розрив з радянською традицією (скасування 23 лютого,
    встановлення 14 жовтня Днем захисників).
  - Шкільні програми та підручники історії як головний інструмент трансляції національного
    наративу новим поколінням.
- section: 'Інструменти політики пам''яті: II — Символічний простір'
  words: 450
  points:
  - Кодування простору монументами та масштабний Ленінопад (понад 2500 пам'ятників
    тоталітаризму) як візуальний розрив з імперією.
  - 'Топоніміка: дерусифікація назв (вулиці Пушкіна, Суворова) як закріплення права
    власності на власну територію.'
  - Офіційні інституції (наприклад, Національний музей Голодомору-геноциду) та виставки
    у формуванні канону.
- section: 'Війни пам''яті — Україна vs. Росія: I — Імперські міфи'
  words: 450
  points:
  - 'Битва за спадщину: українська самодостатність проти російського привласнення
    та міфу про «колиску трьох братніх народів».'
  - 'Переяславська рада 1654 року: ситуативний військово-політичний союз (українська
    візія) проти інструменталізованого РФ міфу про «споконвічне возз''єднання».'
  - Деконструкція російського міфу про «загальносоюзний голод» та утвердження українського
    наративу про Голодомор як акт геноциду.
- section: 'Війни пам''яті — Україна vs. Росія: II — ХХ століття та сучасність'
  words: 500
  points:
  - 'Зіткнення концептів: радянська «Велика Вітчизняна війна» (культ мілітаризму)
    проти української європейської парадигми пам''ятання «Ніколи знову» (Друга світова
    війна).'
  - 'ОУН та УПА: боротьба за незалежність бездержавної нації проти російської пропагандистської
    демонізації («бандерівці»).'
  - Інструменталізація політики пам'яті та викривлена історія як ідеологічне обґрунтування
    російського вторгнення 2022 року (міфологема про «денацифікацію»).
- section: 'Законодавство про пам''ять в Україні: I — Ключові закони'
  words: 450
  points:
  - Ухвалення Закону 2006 року про визнання Голодомору геноцидом як інституціоналізація
    національної травми (Стаття 1 фіксує юридичний факт).
  - '«Декомунізаційний пакет» (квітень 2015): засудження тоталітарних режимів та каталізатор
    масових перейменувань.'
  - Легалізація статусу борців за незалежність (Закон про УПА 2015 року) та відновлення
    репресованої пам'яті.
- section: 'Законодавство про пам''ять в Україні: II — Дискусії та критика'
  words: 350
  points:
  - Міжнародний резонанс та жваві дискусії щодо меж втручання держави у формування
    історичного наративу.
  - Внутрішня та зовнішня критика політики декомунізації та глорифікації.
  - Порівняння українського досвіду з підходами інших постколоніальних та посттоталітарних
    країн.
- section: 'Місця пам''яті в Україні: I — Травма та репресії'
  words: 400
  points:
  - 'Бабин Яр як складне «місце пам''яті»: конкуренція жертв (євреї, роми, українці,
    військовополонені) та боротьба за модель меморіалізації.'
  - Биківня та Биківнянські могили як символ відновленої і прихованої пам'яті про
    жертви сталінського Великого терору 1937–1938 років.
  - Значення місць масових поховань для деконструкції радянського міфу про справедливу
    державу.
- section: 'Місця пам''яті в Україні: II — Сакралізація та очищення простору'
  words: 400
  points:
  - 'Революція Гідності (Майдан) та Небесна Сотня як формування нового сакрального
    міфу: поєднання віктимності (жертви) та героїчної агентності.'
  - Пам'ятники Тарасу Шевченку як елемент української «громадянської релігії» та консолідації
    навколо національного генія.
  - 'Фізичне очищення простору: зникнення монументів Леніну (ленінопад) як акт деколонізації
    символічної сфери.'
- section: Виклики і перспективи
  words: 400
  points:
  - Дискусія щодо можливості створення «правильної» пам'яті та формування інклюзивного
    наративу, який зшиває регіональні відмінності.
  - Складний процес польсько-українського примирення (особливо щодо Волинської трагедії)
    та вплив пам'яті на сучасні геополітичні союзи.
  - 'Формування абсолютно нового пласту пам''яті внаслідок війни 2014–2022+ років:
    фіксація колективних травм та творення пантеону нових героїв у реальному часі.'
  - Пошук балансу між пам'яттю про жертви та пам'яттю про спротив у новій ідентичності.
