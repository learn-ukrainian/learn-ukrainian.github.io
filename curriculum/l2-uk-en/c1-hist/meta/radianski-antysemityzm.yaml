slug: radianski-antysemityzm
title: Радянський антисемітизм
word_target: 5000
content_outline:
- section: Вступ — Антисемітизм «без антисемітів»
  words: 600
  points:
  - 'Парадокс радянської ідеології: офіційний «інтернаціоналізм» проти реальної ксенофобії.'
  - 'Механізм подвійної моралі: публічне засудження расизму на Заході та державний
    антисемітизм вдома.'
  - Роль ідеологічних кампаній у створенні образу «внутрішнього ворога».
  - 'Структура модуля: від стирання пам''яті до фізичних репресій та побутової дискримінації.'
- section: 'Бабин Яр без пам''яті: I — Політика замовчування'
  words: 500
  points:
  - 'Стратегія розмивання жертв: концепт «мирні радянські громадяни».'
  - Заборона на публічну скорботу та згадування єврейської специфіки трагедії.
  - 'Плани фізичного знищення місця пам''яті: стадіон, парк, звалище.'
  - Куренівська трагедія 1961 року як символічний наслідок недбалого ставлення до
    історії.
- section: 'Бабин Яр без пам''яті: II — Боротьба за пам''ять'
  words: 500
  points:
  - 'Стихійні мітинги 1960-х років: прорив мовчання.'
  - 'Виступ Івана Дзюби 1966 року: солідарність українських та єврейських дисидентів.'
  - 'Встановлення радянського монумента 1976 року: компроміс чи фальсифікація?'
  - Роль діаспори та західного тиску у збереженні пам'яті.
- section: '«Безрідні космополіти»: I — Ідеологічний наступ'
  words: 600
  points:
  - 'Початок кампанії 1948 року: вбивство Соломона Міхоелса.'
  - Термін «безрідний космополіт» як евфемізм для єврея-інтелектуала.
  - 'Медійна атака: розкриття псевдонімів та звинувачення у «низькопоклонстві перед
    Заходом».'
  - Закриття єврейських театрів, видавництв та культурних установ.
- section: '«Безрідні космополіти»: II — Фізичне знищення'
  words: 600
  points:
  - Ліквідація Єврейського антифашистського комітету (ЄАК).
  - '«Ніч розстріляних поетів» (12 серпня 1952 року): страта цвіту єврейської літератури.'
  - '«Справа лікарів» 1953 року: апогей сталінської параної.'
  - 'План масової депортації євреїв до Сибіру: міф чи реальна загроза?'
- section: 'Пізній СРСР: I — «П''ята графа» і кар''єра'
  words: 500
  points:
  - 'Інституалізація дискримінації: національність у паспорті як вирок.'
  - Негласні квоти (numerus clausus) у престижних університетах та НДІ.
  - 'Професійні обмеження: недопуск до керівних посад та «секретних» галузей.'
  - 'Адаптаційні стратегії: зміна прізвищ, «втеча» у технічні науки або шахи.'
- section: 'Пізній СРСР: II — Еміграція та відмовники'
  words: 500
  points:
  - Рух за право на виїзд до Ізраїлю (алія) як форма протесту.
  - 'Феномен «відмовників» (refuseniks): життя в соціальному вакуумі.'
  - Судові процеси проти активістів (Справа дисидентів).
  - 'Еміграція 1970-1980-х: масштаби втрати інтелектуального капіталу.'
- section: Спадок
  words: 800
  points:
  - Інерція радянських стереотипів у пострадянському суспільстві.
  - 'Сучасна російська пропаганда: використання звинувачень у «фашизмі» як зброї.'
  - 'Відродження єврейського життя в незалежній Україні: вихід з підпілля.'
  - Спільна історія репресій як фундамент для сучасного українсько-єврейського діалогу.
- section: Підсумок
  words: 400
  points:
  - Радянський антисемітизм як системний злочин режиму, а не окремі ексцеси.
  - Крах політики асиміляції та «злиття націй».
  - Важливість історичної правди для побудови демократичного суспільства.
  - Пам'ять про жертв як запобіжник від повторення тоталітарних практик.
