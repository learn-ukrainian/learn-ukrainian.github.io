slug: 1991-referendum
title: '1991: Чому 90% сказали «так»?'
word_target: 0
content_outline:
- section: Вступ — Неймовірний результат
  words: 600
  points:
  - 'Статистичний шок: 90.32% підтримки при явці 84% — цифри, що змінили карту Європи.'
  - 'Реакція світу: від «Chicken Kiev» Буша до визнання Польщею та Канадою.'
  - 'Політичний контекст: чому Кравчук потребував референдуму для легітимізації Акту
    24 серпня.'
  - Крах надій Горбачова на «Новий Союзний договір».
- section: 'Що означала незалежність: I — Національний та елітний консенсус'
  words: 700
  points:
  - 'Націонал-демократи (Рух): незалежність як повернення історичної справедливості
    та європейської ідентичності.'
  - 'Суверен-комуністи (група Кравчука): незалежність як спосіб зберегти владу та
    уникнути контролю Єльцина/Горбачова.'
  - '«Історичний компроміс»: як вчорашні дисиденти та партійна номенклатура об''єдналися
    проти Центру.'
  - Роль української діаспори в підтримці та визнанні.
- section: 'Що означала незалежність: II — Прагматизм широких мас'
  words: 600
  points:
  - 'Позиція російськомовного населення: відсутність етнічного конфлікту, громадянське
    розуміння нації.'
  - 'Селянство та робітники: надії на економічну заможність та «господарювання на
    власній землі».'
  - 'Феномен «багатовекторності» очікувань: кожен голосував за свою уявну Україну.'
- section: Економічний аргумент
  words: 700
  points:
  - 'Агітаційний наратив: «Годі годувати Москву». Аналіз листівок 1991 року.'
  - 'Ілюзія самодостатності: порівняння з Францією та ФРН без врахування енергетичних
    дотацій.'
  - 'Реальний стан економіки УРСР на 1991 рік: потужний ВПК, але застарілі технології.'
  - Економічний популізм як інструмент мобілізації електорату.
- section: Демократичний аргумент
  words: 600
  points:
  - 'Вплив серпневого путчу (ГКЧП): страх перед поверненням тоталітаризму та репресій.'
  - 'Екологічний чинник: пам''ять про Чорнобиль і недовіра до центру, що приховував
    правду.'
  - Свобода слова та релігії як ключові мотиватори для інтелігенції.
  - Гасло «Геть від Москви» як втеча від імперського диктату.
- section: 'Регіональний аналіз: I — Захід, Центр та Схід'
  words: 600
  points:
  - 'Галичина (95-99%): ідеологічне ядро незалежності.'
  - 'Центральна Україна та Київ: стабілізуюча більшість.'
  - 'Феномен Донбасу (83%): чому шахтарі виступили проти Москви (економічні вимоги
    1989-1990 років).'
  - Відсутність розколу Схід-Захід у 1991 році — міф про «розірвану країну».
- section: 'Регіональний аналіз: II — Феномен Криму'
  words: 500
  points:
  - 'Результат 54.19% у Кримській АРСР та 57.07% у Севастополі: аналіз причин.'
  - Обіцянки широкої автономії та економічні зв'язки з материком.
  - Чому проросійські сили не змогли мобілізувати півострів проти незалежності.
  - 'Деколонізаційний погляд: спростування міфу про «завжди російський Крим».'
- section: 'Що пішло не так після: Виклики трансформації'
  words: 600
  points:
  - 'Холодний душ реальності: розрив виробничих ланцюжків та енергетичний шок.'
  - Гіперінфляція та економічна криза 90-х як плата за незалежність.
  - 'Криза очікувань: розчарування населення, що не отримало миттєвого добробуту.'
  - Збереження старої системи під новим прапором — відкладені реформи.
- section: Підсумок
  words: 500
  points:
  - 1 грудня 1991 року як точка неповернення в історії Східної Європи.
  - 'Легітимність держави: чому кордони 1991 року є непорушними (Будапештський меморандум).'
  - 'Мирний характер розлучення: уникнення «югославського сценарію».'
  - 'Народження політичної нації: українці, росіяни, євреї, кримські татари проголосували
    разом.'
