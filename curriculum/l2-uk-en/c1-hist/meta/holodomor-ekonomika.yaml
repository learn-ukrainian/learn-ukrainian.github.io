slug: holodomor-ekonomika
title: Голодомор як економічна зброя
word_target: 5000
content_outline:
- section: Вступ — Голод як інструмент
  words: 400
  points:
  - Голодомор як спланована економічна спецоперація, а не стихійне лихо.
  - Голод як «найдешевша зброя» для придушення опору та вилучення ресурсів.
  - 'Економічна мета: валюта для індустріалізації ціною життя мільйонів.'
  - 'Огляд структури модуля: від механізмів експорту до довгострокових наслідків.'
- section: 'Експорт під час голоду: I — Масштаби та напрямки'
  words: 500
  points:
  - Статистика зернового експорту СРСР у 1932–1933 роках (понад 1.5 млн тонн).
  - 'Географія експорту: порти Чорного моря, європейські ринки.'
  - 'Демпінгові ціни: радянське зерно як засіб економічного впливу на Захід.'
  - 'Світова реакція: знання про голод та продовження торгівлі (realpolitik).'
- section: 'Експорт під час голоду: II — Валюта ціною життя'
  words: 500
  points:
  - 'Пріоритет індустріалізації: верстати та технології важливіші за людей.'
  - «Торгсін» як механізм вилучення золота та цінностей у вмираючого населення.
  - Смерть українців як «допустимі витрати» в логіці радянського керівництва.
  - 'Цинізм ситуації: зерно гнило на станціях, поки люди помирали.'
- section: 'Конфіскація як механізм: I — Режим «чорних дошок»'
  words: 600
  points:
  - «Чорні дошки» як інструмент економічної блокади та фізичного знищення.
  - 'Складові режиму: заборона торгівлі, вивіз товарів, припинення кредитування.'
  - Інформаційна та фізична ізоляція занесених на дошку сіл та районів.
  - 'Юридичне оформлення терору: постанови ЦК КП(б)У та Раднаркому.'
- section: 'Конфіскація як механізм: II — Виконавці та методи'
  words: 600
  points:
  - Роль «буксирних бригад» та комітетів незаможних селян (комнезамів).
  - 'Технологія обшуків: щупи, руйнування печей, перекопування дворів.'
  - 'Натуральні штрафи: вилучення м''яса, картоплі та сала за борги по зерну.'
  - 'Тотальність вилучення: забирали навіть посівний матеріал та їжу, приготовану
    на обід.'
- section: 'Економічна логіка Сталіна: I — Внутрішня колонізація'
  words: 600
  points:
  - 'Концепція «внутрішньої колонізації»: Україна як ресурсна база імперії.'
  - '«Первісне соціалістичне накопичення»: пограбування села заради міста.'
  - Селянин як «тяглова сила» індустріалізації, позбавлена прав.
  - 'Україна як «найбагатша жертва»: чому удар був спрямований саме сюди.'
- section: 'Економічна логіка Сталіна: II — Раціональність зла'
  words: 600
  points:
  - 'Раціональність злочину: знищення економічної незалежності українця.'
  - Ліквідація приватного власника як загрози тоталітарній системі.
  - Перетворення гордого господаря на залежного колгоспного раба.
  - Злам традиційного укладу життя як необхідна умова радянізації.
- section: 'Довгострокові наслідки: I — Руйнування людського капіталу'
  words: 400
  points:
  - Фізичне знищення найпродуктивнішої частини нації.
  - Втрата навичок господарювання та культури праці на землі.
  - 'Демографічна яма: ненароджені покоління та зміна етнічного складу.'
  - Заселення спустошених сіл переселенцями з Росії та Білорусі.
- section: 'Довгострокові наслідки: II — Економічна та психологічна травма'
  words: 400
  points:
  - 'Постгеноцидний синдром: страх голоду та пасивність.'
  - Вплив на ставлення до приватної власності та багатства.
  - 'Руйнування соціального капіталу: недовіра всередині громади.'
  - Економічна відсталість українського села як прямий наслідок колгоспного рабства.
- section: Підсумок
  words: 400
  points:
  - Голодомор — наймасштабніший економічний злочин XX століття.
  - Ціна радянської індустріалізації — мільйони українських життів.
  - Визнання Голодомору геноцидом як відновлення історичної та економічної справедливості.
  - 'Паралелі з сучасністю: використання продовольства та енергії як зброї.'
