slug: zakhidni-media
title: 'Західні медіа: Сліпі плями'
word_target: 5000
content_outline:
- section: 'Вступ: Ненавмисна допомога'
  words: 500
  points:
  - 'Феномен «ненавмисної шкоди»: чому поважні медіа стають ретрансляторами пропаганди.'
  - 'Структурні причини: скорочення бюджетів, «парашутна журналістика», брак експертизи.'
  - 'Поняття «Westsplaining» (вестсплейнінг): коли західні експерти пояснюють українцям
    їхню долю.'
  - 'Мета модуля: навчитися деконструювати приховані наративи.'
- section: 'Пастка об''єктивності: «Обидві сторони»'
  words: 800
  points:
  - 'Журналістський стандарт «балансу»: історія та викривлення.'
  - 'Хибний баланс (false equivalence): рівняння агресора і жертви.'
  - 'Кейс-стаді: як висвітлювали збиття MH17 (версії РФ vs докази).'
  - 'Етична дилема: чи можна давати слово людожеру заради «об''єктивності»?'
- section: Кремлівські тези в мейнстримі
  words: 800
  points:
  - 'Технологія «відмивання наративів»: від анонімних телеграмів до колонок у NYT.'
  - Міф про «громадянську війну» та «повстанців» (rebels) — легітимізація проксі-сил.
  - 'Фрейм «сфери впливу»: позбавлення України суб''єктності.'
  - 'Нав''язлива увага до ультраправих: як «Азов» став головним страшилом.'
- section: 'Інфраструктура незнання: Контекст'
  words: 800
  points:
  - 'Проблема «Russian Studies»: чому Україну вивчали як додаток до Росії.'
  - 'Москвоцентризм: кореспондентські пункти в Москві як фільтр реальності.'
  - 'Мовний бар''єр: чому західні журналісти покладалися на російськомовних фіксерів.'
  - 'Інформаційна асиметрія: ресурси РФ vs ресурси України до 2022 року.'
- section: «Реалізм» як евфемізм цинізму
  words: 700
  points:
  - Школа «політичного реалізму» (Дж. Міршаймер) та її вплив на медіа.
  - Наратив «втоми від війни» (Ukraine fatigue) як інструмент тиску.
  - Чому заклики до «компромісу» завжди адресовані жертві, а не агресору.
  - 'Історичні паралелі: «Мюнхенська змова» в сучасних заголовках.'
- section: 'Тектонічні зрушення: Медіа після 2022'
  words: 800
  points:
  - 'Шок 24 лютого: крах експертних прогнозів про «три дні».'
  - 'Поява суб''єктності: світ почав слухати українців (Зеленський, Залужний, громадянське
    суспільство).'
  - Феномен The Kyiv Independent та української англомовної журналістики.
  - 'Залишкови явища: чому старі звички (називати міста по-російськи) повертаються.'
- section: 'Підсумок: Гігієна споживання'
  words: 600
  points:
  - 'Алгоритм аналізу статті: автор, джерело, термінологія.'
  - Як розпізнати «сліпу пляму» в тексті поважного видання.
  - 'Роль читача: чому важливо писати листи редакторам і виправляти помилки.'
  - 'Майбутнє: деколонізація погляду на Східну Європу.'
