slug: povist-mynulykh-lit-i
title: 'Повість минулих літ I: Структура та автори'
word_target: 5000
content_outline:
- section: Вступ — Найстаріший літопис Русі
  words: 600
  points:
  - Визначення «Повісті минулих літ» (ПМЛ) як головного історичного джерела XI–XII
    ст.
  - 'Парадокс джерела: відсутність оригіналу 1113 року та робота з пізніми списками
    (XIV–XV ст.).'
  - Чому ПМЛ є фундаментом української історичної пам'яті (від біблійних часів до
    Русі).
  - 'Огляд того, що буде розглянуто в модулі: структура, авторство, критика.'
- section: 'Структура літопису: Від легенд до дат'
  words: 800
  points:
  - 'Космогонічний вступ: біблійний родовід слов''ян від Яфета та вписання Русі у
    світову історію.'
  - 'Недатована частина: етногеографія племен (поляни, древляни) та легенда про заснування
    Києва.'
  - 'Датована частина (з 852 року): перехід до хронологічного викладу подій.'
  - Принцип погодного запису («В літо...») та його відмінність від сучасної історіографії.
  - 'Жанрова гетерогенність: поєднання договорів, житій святих, військових повістей
    та фольклору.'
- section: 'Питання авторства: Детектив століть'
  words: 800
  points:
  - 'Традиційна атрибуція: Нестор Літописець як символ, але не єдиний автор.'
  - 'Роль ігумена Сильвестра (Видубицький монастир): редакція 1116 року та зміна політичного
    акценту.'
  - 'Теорія Олексія Шахматова: концепція «літописних зводів» (1037, 1073, 1093) як
    попередників ПМЛ.'
  - 'Колективність праці: літопис як багатовіковий проект редагування та дописування.'
  - 'Політичні замовники: як зміна влади в Києві (Святополк -> Мономах) змінювала
    текст літопису.'
- section: 'Редакції та рукописи: Лаврентіївський vs Іпатіївський'
  words: 800
  points:
  - 'Лаврентіївський список (1377): найстаріший збережений, суздальське походження,
    редакція Сильвестра.'
  - 'Унікальність Лаврентіївського списку: наявність «Повчання Володимира Мономаха».'
  - 'Іпатіївський список (XV ст.): українське (південне) походження, редакція 1118
    року.'
  - 'Структурні відмінності: Іпатіївський як трилогія (ПМЛ + Київський + Галицько-Волинський
    літописи).'
  - 'Проблема «Приписки Сильвестра»: наявність у Лаврентіївському і відсутність в
    Іпатіївському.'
- section: 'Мова літопису: Церковнослов''янська чи Давньоукраїнська?'
  words: 600
  points:
  - 'Лінгвістична основа: церковнослов''янська мова як літературний стандарт.'
  - 'Живий субстрат: проникнення протоукраїнських рис (лексика, фонетика) у текст.'
  - 'Приклади українізмів: повноголосся, кличний відмінок, специфічна лексика («рілля»,
    «яруга»).'
  - Іпатіївський список як джерело дослідження живої мови Русі-України.
- section: Чому важлива критика джерела
  words: 700
  points:
  - ПМЛ як політичний маніфест, а не об'єктивна хроніка.
  - 'Проблема ранньої хронології: штучність дат IX століття.'
  - 'Легенди vs Історичні факти: як відрізнити фольклор (помста Ольги) від реальності.'
  - 'Упередженість авторів: симпатії до одних князів і демонізація інших.'
  - 'Методи критичного аналізу: зіставлення з іноземними джерелами.'
- section: 'Підсумок: Значення для сьогодення'
  words: 500
  points:
  - ПМЛ як доказ давності та безперервності української державницької традиції.
  - 'Деколонізаційний аспект: повернення київського центризму в інтерпретацію літопису.'
  - 'Підготовка до наступного модулю: перехід від форми до змісту.'
