slug: yevrei-v-ukraini-do-1917
title: Євреї в Україні до 1917
word_target: 5000
content_outline:
- section: Вступ — Спільна земля
  words: 500
  points:
  - 'Огляд 1000-літньої історії: від археологічних знахідок у Криму (I ст. н.е.) та
    Хозарського каганату до масової міграції ашкеназі після Люблінської унії 1569
    року.'
  - 'Демографічний феномен: формування на українських землях найбільшої єврейської
    громади світу до кінця XIX століття.'
  - 'Концепція співіснування: Україна як простір перетину східного та західного єврейства,
    ''спільна земля, розділені долі''.'
  - 'Структура модуля: деколоніальний погляд на взаємодію українського та єврейського
    світів.'
- section: 'Середньовіччя і Козацька доба: I — Економіка та суспільство'
  words: 500
  points:
  - 'Євреї в економічній структурі Речі Посполитої: заповнення ніші між шляхтою та
    селянами (орендарі, фактори).'
  - 'Формування структурного соціального конфлікту: єврей як ''соціальний буфер''
    та інструмент експлуатації в очах селянства.'
  - 'Деконструкція міфу про ''оренду ключів від церков'': докази пропагандистського
    походження цього наративу.'
- section: 'Середньовіччя і Козацька доба: II — Хмельниччина та Гайдамаччина'
  words: 600
  points:
  - 'Повстання 1648 року: Хмельниччина як національно-визвольна війна для українців
    та катастрофа ''Гзєйрот Тах-Тат'' для євреїв.'
  - 'Свідчення епохи: аналіз хроніки Натана Гановера ''Глибокий мул'' та трагедії
    громад Немирова й Тульчина.'
  - 'Коліївщина 1768 року (Уманська різня): повторення сценарію насильства та закріплення
    історичної травми.'
- section: 'Штетл — життя: I — Смуга осілості та ізоляція'
  words: 500
  points:
  - 'Запровадження ''Смуги осілості'' Катериною II (1791): імперська політика географічної
    та професійної сегрегації.'
  - 'Урбаністика і феномен штетлу: ''держава в державі'' з ринковою площею, синагогою
    та кагалом (самоврядуванням).'
  - 'Професійні обмеження та взаємодія з українцями: повсякденні економічні контакти
    на тлі релігійної замкненості.'
- section: 'Штетл — життя: II — Культура ідиш та хасидизм'
  words: 600
  points:
  - 'Духовна революція: зародження хасидизму на Поділлі (Баал Шем Тов у Меджибожі)
    як суто місцевого містичного феномену.'
  - 'Розвиток культури і літератури ідиш: збереження ідентичності та творчість Шолома-Алейхема.'
  - 'Гаскала (єврейське просвітництво): центри модернізації в Одесі та Бродах, конфлікт
    традиції і сучасності.'
- section: 'Погроми XIX-початок XX ст.: I — Перша хвиля'
  words: 400
  points:
  - 'Події 1881-1884 років: хвиля насильства на тлі вбивства Олександра II та економічної
    кризи.'
  - 'Реакція населення та початок масової еміграції: формування Першої Алії до Палестини
    та виїзд до США.'
- section: 'Погроми XIX-початок XX ст.: II — Державна політика'
  words: 500
  points:
  - 'Друга хвиля погромів (1903-1906): трагедії в Кишиневі, Одесі та Києві в контексті
    революції 1905 року.'
  - 'Роль держави: інструменталізація антисемітизму царською поліцією та діяльність
    ''Чорної сотні''.'
  - 'Справа Бейліса (1913): кривавий наклеп як кульмінація імперського антисемітизму
    та виступ української інтелігенції на захист.'
- section: 'Громадянська війна 1917-1921: I — УНР та автономія'
  words: 500
  points:
  - 'Світла сторінка Української революції: проголошення УНР та спроба побудови модерної
    нації з правами меншин.'
  - 'Інституційні кроки: створення Міністерства єврейських справ, написи мовою ідиш
    на банкнотах.'
  - 'Закон про національно-персональну автономію: унікальний для тогочасної Європи
    політичний експеримент.'
- section: 'Громадянська війна 1917-1921: II — Хаос і Петлюра'
  words: 600
  points:
  - 'Катастрофа 1919 року: анархія війни та масові погроми, вчинені всіма арміями
    (Денікін, більшовики, отамани, частини УНР).'
  - 'Спростування радянських міфів: Петлюра як державний діяч, що видавав накази проти
    погромів (наказ № 131), але втратив контроль над військом.'
  - 'Трагедія Проскурівського погрому: масштаб насильства в умовах безвладдя ''отаманщини''.'
- section: Підсумок
  words: 300
  points:
  - 'Осмислення складної історії: необхідність подолання імперських стереотипів та
    визнання взаємних травм.'
  - Українське єврейство як автохтонна спільнота, що століттями співтворила історію
    та культуру регіону.
  - Руйнування світу штетлу як трагічна прелюдія до катастрофи Голокосту.
