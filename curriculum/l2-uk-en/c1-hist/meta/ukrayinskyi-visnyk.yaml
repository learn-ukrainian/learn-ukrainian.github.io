slug: ukrayinskyi-visnyk
title: «Український вісник» Чорновола
word_target: 5000
content_outline:
- section: 'Вступ — Хроніка опору: I — Інформаційний прорив'
  words: 400
  points:
  - 'Україна 1970 року: вакуум правди після згортання ''відлиги''.'
  - Поява 'Українського вісника' (УВ) як відповідь на офіційну брехню.
  - 'Самвидав як феномен: ''Ера Гутенберга'' в підпіллі.'
  - Аналогія з 'Хроникой текущих событий', але з національним акцентом.
- section: 'Вступ — Хроніка опору: II — Місія видання'
  words: 400
  points:
  - 'Програмна заява першого випуску: не підпілля, а конституційне право.'
  - В'ячеслав Чорновіл як архітектор концепції 'легального спротиву'.
  - 'Мета: фіксація порушень прав людини та національних прав.'
  - 'Стратегія об''єктивності: факти проти пропаганди.'
- section: 'В''ячеслав Чорновіл: I — Становлення дисидента'
  words: 450
  points:
  - 'Біографічний нарис: від комсомолу до сумління нації.'
  - 'Переломний момент: акція в кінотеатрі ''Україна'' (1965).'
  - Відмова свідчити на закритих судах як моральний принцип.
  - 'Журналістський хист: уміння збирати та перевіряти інформацію.'
- section: 'В''ячеслав Чорновіл: II — Ціна правди'
  words: 450
  points:
  - '''Лихо з розуму'' (1967) — перша енциклопедія політв''язнів.'
  - Міжнародний резонанс праці та реакція КДБ.
  - 'Особиста жертва: арешти, заслання, табори суворого режиму.'
  - Статус 'зеківського генерала' та незаперечний авторитет.
- section: 'Історія видання: I — Самвидавна ера (1970-1972)'
  words: 450
  points:
  - 'Випуски 1-5: золотий стандарт українського самвидаву.'
  - 'Технологія виживання: друкарські машинки, фотоплівка, ''сліпий'' друк.'
  - 'Географія поширення: від Львова до Донецька.'
  - Випуск №6 (березень 1972) та 'Великий погром' інтелігенції.
- section: 'Історія видання: II — Відродження і легалізація (1987-1989)'
  words: 400
  points:
  - 'Відновлення ''Вісника'' у серпні 1987 року: випуск №7.'
  - 'Епоха гласності: вихід з підпілля, відкриті імена редлегії.'
  - Трансформація в орган Української Гельсінської Спілки (УГС).
  - Роль журналу у формуванні Народного Руху України.
- section: 'Структура і зміст: I — Анатомія репресій'
  words: 450
  points:
  - 'Рубрика ''Хроніка репресій'': арешти, обшуки, звільнення з роботи.'
  - 'Документальна база: петиції, листи протесту, судові промови.'
  - 'Фіксація етноциду: нищення пам''яток, русифікація освіти.'
  - 'Специфіка джерел: як інформація потрапляла до редакції.'
- section: 'Структура і зміст: II — Голос культури'
  words: 450
  points:
  - 'Літературна складова: чому це важливо для українського самвидаву.'
  - 'Повернення імен: Симоненко, Стус, Голобородько, Калинець.'
  - Історичні розвідки та есеїстика (Дзюба, Мороз).
  - Культура як форма політичного спротиву імперії.
- section: Фрагмент — Хроніка репресій
  words: 500
  points:
  - Аналіз тексту з Випуску №1 (опис подій 1969 року).
  - 'Стилістика ''сухого факту'': відсутність емоційних прикметників.'
  - 'Ефект документальності: прізвища, дати, точні адреси.'
  - Контраст із радянською пресою (де панувала мова ненависті).
  - 'Глосарій термінів: самвидав, тамвидав, КДБ, стаття 62 КК УРСР.'
- section: 'Значення для руху: I — Інструмент солідарності'
  words: 400
  points:
  - 'Подолання страху та ізоляції: ''Ми не одні''.'
  - Консолідація дисидентського середовища навколо видання.
  - Моральна підтримка жертв репресій та їхніх родин.
  - Формування альтернативної суспільної думки.
- section: 'Значення для руху: II — Міжнародний резонанс'
  words: 400
  points:
  - '''Ефект бумеранга'': передача на Захід -> Радіо Свобода -> слухач в УРСР.'
  - Документування порушень для міжнародних правозахисних організацій.
  - Інтеграція українського питання у світовий контекст прав людини.
  - Спростування міфу про 'радянське щастя' в Україні.
- section: Підсумок
  words: 300
  points:
  - «Український вісник» як модель майбутньої незалежної преси.
  - 'Спадщина Чорновола: журналістика як громадянський вчинок.'
  - Від самвидаву до Акту проголошення незалежності.
  - 'Урок для сучасності: важливість правди в часи гібридної війни.'
