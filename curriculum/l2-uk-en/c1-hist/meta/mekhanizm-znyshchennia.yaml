slug: mekhanizm-znyshchennia
title: 'Механізм знищення: 1930-1937'
word_target: 5000
content_outline:
- section: Вступ — Як знищували культуру
  words: 600
  points:
  - 'Культура як поле бою: чому тоталітарна імперія не могла співіснувати з вільною
    думкою.'
  - 'Від літературних дискусій 1920-х до розстрільних списків: еволюція державної
    політики.'
  - 'Механізм терору: це була не стихійна хвиля, а чітко налагоджена бюрократична
    машина знищення.'
  - 'Структура модуля: від хронології подій до анатомії індивідуальних трагедій.'
- section: Хронологія знищення
  words: 800
  points:
  - '1930 рік: Процес СВУ як пролог — показове судилище над «старою» інтелігенцією
    в оперному театрі.'
  - '1933 рік: Злам хребта — самогубство Хвильового та Скрипника на тлі Голодомору.'
  - '1934 рік: Вбивство Кірова як сигнал до масових репресій; «Кіровський потік» і
    розстріли 28-ми (Косинка, Фальківський).'
  - '1937-1938 роки: Апогей Великого терору; наказ НКВС № 00447 і планові квоти на
    знищення.'
  - 'Сандармох: трагедія до 20-річчя Жовтневої революції — фізична ліквідація еліти.'
- section: 'Етапи знищення особистості: I — Від критики до ізоляції'
  words: 700
  points:
  - 'Інформаційна арт-підготовка: нищівна критика в пресі та наклеювання ярликів («хвильовізм»,
    «шумськізм»).'
  - 'Ритуал самокритики: примус до публічного каяття як механізм ламання гідності
    та солідарності.'
  - 'Соціальна смерть: виключення з творчих спілок та партії, позбавлення роботи і
    засобів до існування.'
  - 'Психологія страху: життя в очікуванні нічного арешту, «тривожна валізка».'
- section: 'Етапи знищення особистості: II — Арешт і слідство'
  words: 700
  points:
  - 'Арешт: нічні візити НКВС, обшуки, зникнення людини у «чорному воронку».'
  - 'Слідчий конвеєр: методи фізичного та психологічного тиску для отримання зізнань
    у фантастичних злочинах.'
  - 'Роль «трійок»: позасудові органи, що виносили вироки без захисту і права на оскарження.'
  - 'Шлях у небуття: етапи, табори ГУЛАГу (Соловки, Колима) та місця масових розстрілів
    (Биківня, Сандармох).'
- section: Звинувачення — словник терору
  words: 600
  points:
  - '«Українізація» як склад злочину: як легальна державна політика стала доказом
    «буржуазного націоналізму».'
  - '«Формалізм»: як естетичні експерименти прирівнювалися до політичної диверсії.'
  - 'Абсурдні ярлики: «шпигунство» на користь Польщі/Німеччини/Японії, «тероризм»,
    «троцькізм».'
  - 'Конструювання «ворога народу»: дегуманізація жертв у радянській пропаганді.'
- section: 'Долі — приклади: I — Театр і слово'
  words: 700
  points:
  - 'Лесь Курбас: реформатор європейського рівня, знищений за відмову творити провінційне
    мистецтво («Березіль»).'
  - 'Микола Куліш: драматург, чиї п''єси передбачили трагедію («Маклена Граса»), розстріляний
    у Сандармосі.'
  - 'Микола Зеров: лідер неокласиків, який зберігав гідність до кінця, навіть у Соловецькому
    таборі.'
  - 'Валер''ян Підмогильний: прозаїк-екзистенціаліст, чиє життя обірвалося на злеті
    творчості.'
- section: 'Долі — приклади: II — Вибір і лещата'
  words: 600
  points:
  - 'Микола Хвильовий: трагедія комуніста, який поставив крапку пострілом у скроню,
    щоб врятувати честь.'
  - 'Ті, хто вижив: драма Павла Тичини, Максима Рильського, Володимира Сосюри — життя
    з тавром і компроміси.'
  - 'Доля жінок: репресії проти дружин «ворогів народу» та жінок-мисткинь (Людмила
    Старицька-Черняхівська).'
- section: Чому знищили
  words: 700
  points:
  - 'Імперська логіка: українська культура як екзистенційна загроза єдності радянської
    імперії.'
  - 'Деколонізаційний погляд: це не «класова боротьба», а колоніальне приборкання
    непокірної нації.'
  - 'Паралель із Голодомором: голод нищив тіло нації (селянство), терор нищив її мозок
    (інтелігенцію).'
  - 'Культурний геноцид: чи можна вважати Розстріляне відродження частиною геноциду
    українського народу?'
- section: Підсумок
  words: 500
  points:
  - 'Масштаби втрат: статистика (яка ніколи не буде повною) та імена, що стали символами.'
  - 'Пам''ять: від забуття в СРСР до повернення імен у незалежній Україні.'
  - 'Урок історії: механізм знищення працює, коли суспільство втрачає свободу; культура
    потребує захисту.'
