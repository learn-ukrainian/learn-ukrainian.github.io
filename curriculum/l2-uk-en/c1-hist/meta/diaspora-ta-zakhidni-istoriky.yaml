slug: diaspora-ta-zakhidni-istoriky
title: Діаспора та західні історики
word_target: 5000
content_outline:
- section: 'Вступ: Історія в екзилі як місія'
  words: 600
  points:
  - 'Феномен «держави без держави»: наука як інструмент збереження ідентичності в
    умовах бездержавності.'
  - 'Чому діаспора писала історію: протидія радянському викривленню та асиміляції.'
  - 'Зв''язок із батьківщиною: ідея безперервності української державності від Русі
    до УНР.'
  - 'Роль поколінь: від політичних емігрантів (ді-пі) до їхніх дітей, народжених на
    Заході.'
- section: Українські наукові інституції на Заході
  words: 800
  points:
  - 'Наукове товариство імені Шевченка (НТШ): відновлення діяльності в 1947 році,
    «Енциклопедія українознавства».'
  - 'УВАН (Українська Вільна Академія Наук): збереження академічних традицій 1920-х
    років у Канаді та США.'
  - 'Гарвардський українознавчий інститут (HURI, 1973): стратегія Омеляна Пріцака
    щодо легітимізації українознавства в західному академічному світі.'
  - 'Канадський інститут українських студій (CIUS, 1976): роль громади та урядової
    підтримки мультикультуралізму.'
- section: 'Омелян Пріцак: Архітектор гарвардського проєкту'
  words: 700
  points:
  - 'Інтелектуальна біографія: учень Агатангела Кримського, орієнталіст світового
    рівня.'
  - 'Заснування HURI та часопису «Harvard Ukrainian Studies»: виведення українознавства
    з «етнічного гетто».'
  - 'Методологія: поліетнічний підхід до історії України (врахування тюркського та
    скандинавського факторів).'
  - 'Праця «Походження Русі»: наукова дискусія та критика народницьких міфів.'
- section: 'Орест Субтельний та його «Ukraine: A History»'
  words: 700
  points:
  - 'Біографія: науковець другого покоління діаспори, професор Йоркського університету.'
  - 'Феномен підручника 1988 року: перша комплексна англомовна історія України західного
    зразка.'
  - 'Рецепція в Україні після 1991 року: тираж у 100 000, заповнення інформаційного
    вакууму.'
  - 'Критика та значення: відхід від радянських схем, але збереження елітоцентричного
    підходу.'
- section: Інші ключові постаті західної історіографії
  words: 700
  points:
  - 'Іван Лисяк-Рудницький: концепція «Україна між Сходом і Заходом», політична культура
    та шляхетська демократія.'
  - 'Пол Роберт Маґочі: мультикультурна історія та дослідження Закарпаття.'
  - 'Тімоті Снайдер: «Криваві землі» та введення української трагедії в глобальний
    контекст.'
  - 'Сергій Плохій: сучасний синтез історії («Брама Європи») та деміфологізація імперських
    наративів.'
- section: Методологічні особливості західної школи
  words: 700
  points:
  - 'Об''єктивність проти партійності: відмова від марксистсько-ленінської догматики.'
  - 'Робота з джерелами: доступ до західних архівів, ватиканських документів та трофейних
    матеріалів.'
  - 'Плюралізм інтерпретацій: відсутність «єдиної правильної» лінії, культура академічної
    дискусії.'
  - 'Вплив на західну політику: експертна роль істориків у формуванні бачення України
    (особливо після 1991).'
- section: 'Діалог із Україною: синтез і перспективи'
  words: 800
  points:
  - '«Повернення» спадщини: перевидання класиків діаспори та переклад західних праць
    у 1990-х.'
  - 'Спільні проєкти та гранти: інтеграція українських істориків у світову спільноту
    (Фулбрайт, HURI).'
  - 'Зміна поколінь: стирання межі між «діаспорною» та «материковою» наукою в умовах
    глобалізації.'
  - 'Нові виклики: протидія російській пропаганді (Russian Studies vs Ukrainian Studies)
    на Заході.'
