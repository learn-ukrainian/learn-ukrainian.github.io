slug: khreshchennia-spadshchyna
title: 'Спадщина Хрещення: Візантійська традиція'
word_target: 5000
content_outline:
- section: Вступ — Релігія і нація
  words: 500
  points:
  - Релігія як маркер політичної лояльності та цивілізаційної приналежності у середньовіччі.
  - Вступ до 'клубу' легітимних монархій та довготривалі наслідки хрещення 988 року.
  - Пояснення концепції 'Bizantine Commonwealth' (Візантійська співдружність) історика
    Дмитра Оболенського.
  - 'Огляд фази: від історичного вибору Володимира до сучасного осмислення спадщини.'
- section: Хрещення Русі — факти і міфи
  words: 800
  points:
  - Аналіз літописної легенди про 'вибір віри' як літературного топосу, а не фактажу.
  - 'Прагматичні політичні мотиви Володимира: ідеологічна єдність різноплемінної держави
    та союз з Візантією.'
  - 'Деконструкція міфу про ''мирне хрещення'': опір язичницьких еліт у Новгороді
    та насадження релігії ''вогнем і мечем''.'
  - 'Зміна етики влади: трансформація князя від жорстокого язичника до християнського
    монарха (десятина, школи).'
- section: 'Візантійська спадщина: I — Архітектура та Мистецтво'
  words: 700
  points:
  - 'Архітектура: хрестово-купольний храм на прикладі будівництва Софії Київської
    (1037) як символу величі.'
  - Політичне та сакральне значення шлюбу Володимира з багрянородною принцесою Анною
    Порфірогенетою.
  - 'Візантійське мистецтво: мозаїки та фрески як ''біблія для неписьменних'', що
    формувала візуальну культуру.'
  - 'Теологія ікони: використання зворотної перспективи як ''вікна у вічність'' для
    вірян.'
- section: 'Візантійська спадщина: II — Літургія, Право та Література'
  words: 700
  points:
  - Літургія як грандіозне театралізоване дійство, що об'єднувало громаду та проводилося
    церковнослов'янською мовою.
  - Кирилиця як інструмент культурної незалежності, що забезпечила зрозумілість богослужіння.
  - 'Перекладна література (Іоанн Златоуст) та народження власної: ствердження рівності
    Русі у ''Слові про Закон і Благодать'' Іларіона.'
  - 'Рецепція візантійського права: Номоканон як основа для формування церковного
    та сімейного законодавства.'
- section: Церква і держава
  words: 700
  points:
  - Впровадження візантійської моделі 'симфонії' (співзвуччя) влади світської і духовної
    на руських землях.
  - 'Створення Київської митрополії та її статус: залежність митрополита-грека від
    Константинопольського Патріарха.'
  - 'Складний баланс: князі залежали від Бога, а митрополити гарантували геополітичний
    зв''язок з імперією.'
  - Обрання Іларіона першим митрополитом-русином (1051) як ключова спроба утвердження
    власної суб'єктності.
- section: 'Дебати про спадщину: I — Московська претензія та міфи'
  words: 500
  points:
  - 'Гостра боротьба за київську спадщину: чия вона — України, Росії чи Білорусі?'
  - 'Московські претензії: привласнення концепції ''Третього Риму'' та конструювання
    імперського міфу про ''матерь міст руських''.'
  - Самовільне відокремлення Московської церкви (1448) та незаконна анексія Київської
    митрополії Москвою (1686).
  - 'Кардинальна відмінність ментальності: московський ізоляціонізм і жорстке одержавлення
    церкви.'
- section: 'Дебати про спадщину: II — Українська позиція і сучасні конфлікти'
  words: 500
  points:
  - 'Українська барокова традиція XVII ст.: відкритість до Заходу, вплив європейської
    освіти та соборноправність.'
  - 'Деколонізаційний спротив: протистояння наративу про ''канонічну територію'' та
    трактуванню вибору як ''розколу''.'
  - Сучасні церковні конфлікти як безпосередній наслідок багатовікової боротьби за
    візантійсько-київський спадок.
  - Надання Томосу про автокефалію ПЦУ (2019) Вселенським Патріархом як історичне
    повернення до матері-церкви.
- section: Спадщина для ідентичності
  words: 500
  points:
  - Православ'я як найглибший код української культури (календар, свята, етичні норми).
  - Вплив християнської спадщини на громадянське суспільство навіть в умовах прогресуючої
    секуляризації.
  - 'Український релігійний плюралізм: феномен УГКЦ як унікальний синтез Сходу і Заходу.'
  - Роль і значення протестантських громад у формуванні різноманітного сучасного релігійного
    ландшафту.
- section: Підсумок
  words: 400
  points:
  - Хрещення 988 року як безповоротна точка неповернення та початок нової європейської
    історії Русі-України.
  - 'Трансформація візантійського впливу до сьогодення: виживання традиції у демократичному,
    соборноправному варіанті.'
  - Остаточне відкидання імперського наративу 'спільної колиски' на користь власної
    цивілізаційної суб'єктності.
  - Підготовка історичного та ментального ґрунту до наступних великих процесів, зокрема
    Берестейської унії.
