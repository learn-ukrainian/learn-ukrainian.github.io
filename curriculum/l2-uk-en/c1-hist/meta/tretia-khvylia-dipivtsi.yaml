slug: tretia-khvylia-dipivtsi
title: 'Третя хвиля: ДіПі (1945-1950)'
word_target: 5000
content_outline:
- section: Вступ — Хто такі ДіПі?
  words: 600
  points:
  - 'Визначення ''Displaced Persons'' (ДіПі): від юридичного терміну UNRRA до національної
    ідентичності'
  - 'Масштаби трагедії: 2-3 мільйони українців у Рейху, 200-250 тисяч ''неповерненців'''
  - 'Соціальний портрет: інтелігенція, селяни, робітники, студенти — зріз цілого суспільства'
  - 'Психологічний стан: між радістю визволення та жахом невизначеності'
- section: Як опинилися на Заході
  words: 700
  points:
  - 'Остарбайтери: найбільша група примусових робітників, їхня мотивація не повертатися
    (страх перед НКВС)'
  - 'Втікачі 1943-1944 років: евакуація інтелігенції та духовенства перед наступом
    Червоної армії'
  - 'Військова еміграція: вояки Дивізії ''Галичина'', УПА (рейди на Захід), Українського
    Визвольного Війська'
  - 'Політичний вибір: відмова від громадянства СРСР як акт протесту'
- section: 'Табори ДіПі: Організація життя'
  words: 700
  points:
  - 'Географія таборів: американська (Мюнхен, Аугсбург), британська та французька
    зони окупації Німеччини, Австрія'
  - 'Побут ''планети ДіПі'': життя в казармах, перенаселення, розподіл пайків UNRRA/IRO'
  - 'Самоврядування: таборові ради, власна поліція, суди — модель демократичної держави'
  - Збереження національної символіки та свят (День Соборності, Свято Героїв)
- section: 'Табори ДіПі: Культурний феномен'
  words: 800
  points:
  - 'Освітянський вибух: від дитячих садків до відновлення УВУ та УТГІ'
  - 'Літературний процес: створення МУРу, дискусії про ''велику літературу'', творчість
    Багряного, Самчука, Барки'
  - 'Преса та видавництва: феномен 500 періодичних видань у напівголодних умовах'
  - 'Релігійне життя: відродження УАПЦ та роль УГКЦ в консолідації громади'
- section: Загроза репатріації
  words: 800
  points:
  - 'Ялтинська змова: таємні протоколи про обов''язкову видачу радянських громадян'
  - 'Операція ''Кілхол'' (Keelhaul): механізми примусової репатріації та роль західних
    союзників'
  - 'Трагедії спротиву: події в Кемптені, Плятлінгу, Лієнці, самогубства як останній
    аргумент'
  - 'Стратегії виживання: зміна біографій (легенда про ''галичан''), фальшиві документи,
    переховування'
- section: Еміграція до «третіх країн»
  words: 700
  points:
  - 'Кінець ери ДіПі: ліквідація таборів та перехід до IRO (1947-1951)'
  - 'США: Закон 1948 року (Displaced Persons Act) та вимоги до іммігрантів'
  - 'Канада та Австралія: політика залучення робочої сили, формування нових громад'
  - 'Південна Америка та Європа: доля тих, хто не пройшов відбір до Північної Америки'
- section: Спадщина третьої хвилі
  words: 500
  points:
  - 'Інституційна розбудова: створення СКВУ, УККА, КУК як лобістських інструментів'
  - 'Науковий внесок: Енциклопедія Українознавства, збереження архівів та бібліотек'
  - 'Державницька місія: збереження легітимності УНР в екзилі до 1992 року'
- section: Підсумок
  words: 200
  points:
  - 'Унікальність ''третьої хвилі'': найосвіченіша та найбільш політично активна еміграція'
  - Роль у збереженні української ідентичності під час радянської окупації
  - 'Історичний зв''язок: ДіПі як міст між Розстріляним Відродженням та Незалежністю
    1991'
