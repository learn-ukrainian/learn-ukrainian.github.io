slug: hranitna-revoliutsiia
title: Гранітна революція 1990
word_target: 5000
content_outline:
- section: Вступ — Забута революція
  words: 600
  points:
  - 'Жовтень 1990: Київ, площа Жовтневої революції, намети, студенти.'
  - Перша успішна українська революція новітнього часу — перемога без крові.
  - 'Феномен ''забуття'': чому Помаранчева революція та Революція Гідності затьмарили
    події 1990 року.'
  - 'Структура модуля: від контексту епохи до спадщини для сучасної України.'
- section: 'Контекст — 1990 рік: На порозі змін'
  words: 900
  points:
  - 'Агонія СРСР: економічна криза, ''парад суверенітетів'', спроби Горбачова реанімувати
    Союз.'
  - 'Декларація про державний суверенітет (16 липня 1990): документ, який дав надію,
    але міг залишитися папером.'
  - 'Мотивація студентів: страх перед новим Союзним договором, який би перекреслив
    шлях до незалежності.'
  - 'Реальні ризики: привид Тяньаньмень та Тбілісі — загроза силового розгону.'
- section: 'Голодування: Хроніка спротиву'
  words: 1000
  points:
  - 'Організатори: альянс Львівського Студентського Братства (Іващишин) та Української
    Студентської Спілки (Доній).'
  - 'Початок акції 2 жовтня: встановлення наметів, вихід на площу, реакція міліції.'
  - 'П''ять вимог: чітка політична програма (відставка Масола, ні — Союзному договору,
    перевибори, армія вдома, майно КПУ).'
  - 'Побут наметового містечка: дисципліна, пісні, лекції, підтримка киян, білі пов''язки.'
- section: 'Перемога: Як влада капітулювала'
  words: 900
  points:
  - 'Ескалація протесту: приєднання робітників, студентські страйки, похід 100 тисяч
    до Верховної Ради.'
  - 'Переговори: тактика Кравчука, тиск вулиці, розкол у комуністичній більшості (''Група
    239'').'
  - 'Постанова 17 жовтня 1990 року: офіційне прийняття вимог та відставка Віталія
    Масола.'
  - 'Аналіз перемоги: чому система відступила? (Слабкість Москви, масовість протесту,
    ненасильницький характер).'
- section: 'Спадок: Архетип Майдану'
  words: 1000
  points:
  - 'Народження традиції: Гранітна революція як прототип українських Майданів (намети,
    сцена, віче, самоорганізація).'
  - 'Кузня еліт: учасники революції в політиці та культурі незалежної України (Кириленко,
    Доній, Янішевський та ін.).'
  - 'Пам''ять і міфи: як подія трансформувалася в історичній свідомості.'
  - 'Урок для нації: мирний протест як ефективний інструмент впливу на владу.'
- section: 'Підсумок: Від Граніту до Незалежності'
  words: 600
  points:
  - Гранітна революція як каталізатор проголошення Незалежності у 1991 році.
  - Студентство як історичний авангард українських змін.
  - 'Історична тяглість: зв''язок між 1990 роком та боротьбою 2004 і 2013-2014 років.'
