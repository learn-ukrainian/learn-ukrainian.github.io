slug: halytsko-volynskyi-litopys-i
title: 'Галицько-Волинський літопис I: Про Данила'
word_target: 5000
content_outline:
- section: Вступ — Літопис королівства Русь
  words: 400
  points:
  - 'Унікальність джерела: відмінність від ''Повісті минулих літ'' та Київського літопису'
  - 'Світський характер: не хроніка подій, а життєпис династії (біографізм)'
  - 'Структура: Галицька (Холмська) та Волинська частини'
  - 'Хронологічні рамки XIII ст.: від смерті Романа до кінця епохи Романовичів'
- section: Контекст — Галицько-Волинська держава
  words: 600
  points:
  - 'Геополітика: ''Князівство на межі світів'' (Русь та Європа)'
  - 'Монгольська травма 1240 року: руйнування міст та вимушений васалітет'
  - 'Політична система: боротьба ''самодержця'' проти боярської олігархії'
  - 'Термінологія: ''Regnum Russiae'' (Королівство Русь) vs імперське ''Юго-Западная
    Русь'''
- section: 'Авторство: Літописна майстерня'
  words: 600
  points:
  - 'Гіпотеза про колективне авторство: ''писали не монахи, а воїни'''
  - 'Кандидати в автори Галицької частини: печатник Кирило, сотник Дем''ян, Діонісій
    Павлович'
  - 'Стилістичні особливості: динамізм, батальні сцени, народна мова'
  - 'Проблема датування: пізніша вставка хронологічної сітки (помилкова)'
- section: 'Образ Данила: Від сироти до Самодержця'
  words: 800
  points:
  - 'Період ''сорокалітньої війни'': боротьба за батьківську спадщину'
  - 'Битва на Калці (1223): бойове хрещення та поранення'
  - 'Битва під Ярославом (1245): остаточна перемога над опозицією'
  - 'Ідеалізація образу: Данило як взірець лицаря та мудрого правителя'
- section: Фрагмент — Коронація в Дорогичині (1253)
  words: 1000
  points:
  - 'Текст джерела: аналіз опису посольства від Папи Іннокентія IV'
  - 'Цитата: ''Сину! Прийми од нас вінець королівства'''
  - 'Мотивація Данила: корона не як амбіція, а як засіб проти татар (Realpolitik)'
  - 'Символізм: Дорогичин як форпост проти хрестоносців і місце коронації'
  - 'Історичне значення: перша легітимна українська королівська династія'
- section: 'Критика джерела: Що приховав літописець'
  words: 800
  points:
  - 'Жанр панегірика: виправдання всіх дій Романовичів'
  - 'Боярська ''крамола'': однобічне висвітлення конфлікту з елітами'
  - 'Відносини з Татарами: як літопис пояснює поїздку Данила в Орду (''О, лихіша лиха
    честь татарська!'')'
  - Порівняння з іноземними хроніками (угорськими, польськими)
- section: 'Підсумок: Західна альтернатива'
  words: 600
  points:
  - Галицько-Волинський літопис як свідок європейської інтеграції Русі
  - 'Спадщина: збереження руської ідентичності та державності'
  - Вплив на пізнішу українську свідомість та історіографію
  - 'Деколонізаційний висновок: Русь не зникла, а трансформувалася в Королівство'
