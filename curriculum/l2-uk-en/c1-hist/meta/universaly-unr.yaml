slug: universaly-unr
title: Універсали УНР
word_target: 5000
content_outline:
- section: 'Вступ: Чотири кроки до незалежності'
  words: 600
  points:
  - 'Універсали як кардіограма Української революції: від автономії до повної незалежності
    за 8 місяців.'
  - 'Символізм назви: апеляція до гетьманських універсалів XVII-XVIII ст. (Хмельницький,
    Мазепа).'
  - Чотири документи — чотири етапи державотворення в умовах війни та хаосу.
  - 'Ключова теза: еволюція була вимушеною та логічною реакцією на зовнішні виклики.'
- section: 'Історичний контекст: Вакуум влади 1917-го'
  words: 700
  points:
  - 'Лютнева революція та падіння монархії: вікно можливостей для Києва.'
  - 'Феномен Центральної Ради: від клубу інтелігенції до протопарламенту.'
  - 'Михайло Грушевський: історик як архітектор держави (концепція федералізму).'
  - 'Конфлікт двох столиць: Київ вимагає прав, Петроград зволікає.'
- section: 'Перший Універсал: Автономія як виклик'
  words: 800
  points:
  - '10 червня 1917 року: проголошення на Другому військовому з''їзді.'
  - 'Аналіз тексту: «Хай буде Україна вільною» — популізм чи стратегія?'
  - 'Юридичний статус: держава в державі без розриву зв''язків.'
  - Створення Генерального Секретаріату та реакція Тимчасового уряду (шок і компроміс).
- section: 'Еволюція: Від компромісу до Республіки'
  words: 900
  points:
  - 'Другий Універсал (липень): крок назад заради легалізації та бунт самостійників.'
  - 'Жовтневий переворот у Петрограді: кінець демократичних ілюзій.'
  - 'Третій Універсал (листопад): проголошення УНР.'
  - 'Парадокс Третього Універсалу: широкі кордони, власна армія, але все ще «у федеративному
    зв''язку».'
  - 'Соціальний пакет: скасування смертної кари, 8-годинний день, земля — селянам.'
- section: 'Четвертий Універсал: Незворотність'
  words: 900
  points:
  - '22 січня 1918 року: історичний контекст (війна з більшовиками, Брестські переговори).'
  - 'Аналіз тексту: «Однині УНР стає самостійною, ні від кого незалежною...».'
  - 'Міжнародний аспект: незалежність як умова для визнання суб''єктності в Бресті.'
  - 'Фатальна помилка: розпуск постійної армії та заміна її міліцією в умовах війни.'
- section: 'Порівняльний аналіз: Ідеологія документів'
  words: 600
  points:
  - 'Трансформація понять: від «народу» (етнос) до «нації» (політичний суб''єкт).'
  - 'Федералізм vs Самостійність: чому Грушевський і Винниченко трималися за федерацію
    до останнього?'
  - 'Таблиця еволюції повноважень: від культурної автономії до суверенітету.'
  - Роль більшовицької агресії як каталізатора незалежності.
- section: 'Підсумок: Спадщина Універсалів'
  words: 500
  points:
  - Універсали як правовий фундамент української державності XX століття.
  - 'Історичні паралелі: Акт 1991 року як завершення процесу, початого IV Універсалом.'
  - 'Уроки поразки: чому чудові документи не врятували УНР (проблема сили vs права).'
  - 'Значення для сучасної України: деколонізація пам''яті про 1917–1921 рр.'
