slug: pravoslavna-identychnist
title: Православна ідентичність XVII-XVIII ст.
word_target: 5000
content_outline:
- section: Вступ — Відповідь на унію
  words: 400
  points:
  - 'Криза православ''я після Берестейської унії 1596 року: втрата ієрархії та еліти.'
  - Роль братств та відновлення ієрархії 1620 року за підтримки Сагайдачного.
  - Необхідність освітньої реформи для конкуренції з єзуїтськими школами.
- section: Петро Могила — реформатор
  words: 800
  points:
  - 'Біографія: молдавське походження, західна освіта, шлях до митрополичого престолу.'
  - Легалізація Православної церкви в Речі Посполитій (1632).
  - 'Літургійна та догматична реформа: «Требник» (1646) та «Православне сповідання».'
  - 'Стратегія: використання західної зброї (латини, науки) для захисту східної віри.'
- section: Києво-Могилянська академія
  words: 1000
  points:
  - Заснування (1632) шляхом об'єднання Лаврської та Братської шкіл.
  - 'Навчальна програма: структура єзуїтських колегіумів, роль латини та філософії.'
  - Академія як інтелектуальний центр православного світу та кузня кадрів.
  - Випускники та їхній вплив на культуру України та Східної Європи.
- section: Українське православне бароко
  words: 800
  points:
  - 'Бароко як світогляд: динамізм, синтез, «гра зі смислами».'
  - 'Архітектура: «мазепинське бароко», реконструкція княжих храмів.'
  - 'Література та мистецтво: полемічна проза, шкільна драма, іконопис, гравюра.'
  - Унікальність українського бароко як поєднання візантійської традиції та західних
    форм.
- section: Проблема Москви
  words: 800
  points:
  - 'Перехід Київської митрополії під юрисдикцію Москви (1686): політичний контекст
    та симонія.'
  - Порушення умов підпорядкування та поступова втрата автономії.
  - 'Парадокс: київські інтелектуали (Яворський, Прокопович) як архітектори Російської
    імперії.'
  - 'Наслідки: русифікація церкви та цензура українських видань.'
- section: Православ'я і козацтво
  words: 800
  points:
  - 'Козацтво як «щит православ''я»: релігійна легітимація козацьких повстань.'
  - Вступ Сагайдачного до Київського братства (1615) — символічний союз.
  - Роль гетьманів (Хмельницький, Мазепа) у розбудові церковних структур.
  - Складні відносини між церковною ієрархією та козацькою старшиною.
- section: Підсумок
  words: 400
  points:
  - Православна ідентичність XVII-XVIII ст. як фундамент модерної української нації.
  - Трагічні наслідки поглинання Російською церквою, але збереження культурного коду.
  - Значення Могилянської доби для майбутнього українського відродження.
