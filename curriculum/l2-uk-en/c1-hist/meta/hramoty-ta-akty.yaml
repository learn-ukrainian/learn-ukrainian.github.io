  - 'Вкладні та духовні грамоти: заповіти і порятунок душі через дари церкві'
  - 'Купчі та мінові: обіг приватної власності в Русі'
  - Церковні устави (Володимира, Ярослава) як основа шлюбно-сімейного права
- section: 'Дипломатика: I — Наука та автентичність'
  words: 800
  points:
  - 'Що таке дипломатика: вивчення форми задля перевірки змісту'
  - 'Зовнішні ознаки: пергамент, чорнило, почерк (палеографія)'
  - 'Сфрагістика: висячі печатки (буллотірії) як гарант легітимності'
  - 'Проблема підробок: навіщо монастирі фальшували грамоти князів'
