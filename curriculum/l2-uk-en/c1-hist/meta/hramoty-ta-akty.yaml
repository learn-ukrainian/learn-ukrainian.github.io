slug: hramoty-ta-akty
title: 'Грамоти та акти: Княжі документи'
word_target: 5000
content_outline:
- section: Вступ — Документи vs. літописи
  words: 600
  points:
  - 'Визначення актового документа: фіксація юридичного факту'
  - 'Фундаментальна відмінність: літопис як наратив (memoria) проти документа як дії
    (praxis)'
  - 'Об''єктивність vs суб''єктивність: чому документи важче фальсифікувати непомітно'
  - 'Значення для історика: реконструкція соціально-економічного життя, яке ігнорують
    літописи'
- section: 'Типологія: I — Публічно-правові акти'
  words: 800
  points:
  - 'Договірні грамоти (ряд): міжнародні угоди (Русь-Візантія) та міжкнязівські альянси'
  - 'Уставні грамоти: законодавча творчість князів (Руська Правда як збірник норм)'
  - 'Судові грамоти: фіксація рішень княжого суду (праві грамоти)'
  - Еволюція від усного права до письмового закону
- section: 'Типологія: II — Приватно-правові та церковні акти'
  words: 800
  points:
