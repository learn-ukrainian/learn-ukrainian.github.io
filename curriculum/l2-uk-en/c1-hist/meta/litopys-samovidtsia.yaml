slug: litopys-samovidtsia
title: 'Літопис Самовидця: Голос очевидця'
word_target: 5000
content_outline:
- section: Вступ — Найстаріший козацький літопис
  words: 600
  points:
  - 'Феномен «Самовидця»: чому анонімність стала гарантією щирості (писав «про себе»,
    не на замовлення).'
  - 'Місце у тріаді козацьких літописів: найменш стилізований, найбільш фактографічний
    порівняно з Грабянкою та Величком.'
  - 'Хронологічні рамки (1648–1702): від тріумфу Хмельницького до початку доби Мазепи.'
  - 'Цінність безпосереднього спостереження: «бачив очима своїми» як метод верифікації
    істини.'
- section: 'Питання авторства: Хто приховав своє ім''я?'
  words: 800
  points:
  - 'Детективна історія атрибуції: від «невідомого автора» до гіпотези Миколи Петровського
    (1920-ті).'
  - 'Роман Ракушка-Романовський: кар''єра генерального підскарбія, падіння, священичий
    сан у Стародубі.'
  - 'Внутрішні докази: детальне знання фінансів Гетьманщини, географія Ніжина та Стародуба,
    специфічна лексика урядовця.'
  - 'Чому автор приховав ім''я: небезпека політичних переслідувань за відверті оцінки
    старшини та московських воєвод.'
- section: 'Зміст і структура: I — Хмельниччина та апогей Гетьманщини (1648–1657)'
  words: 700
  points:
  - 'Структурний поділ: мемуарна частина (до 1676) vs щоденникові записи (до 1702).'
  - 'Образ Богдана Хмельницького: ідеалізація «батька нації», але без барокової патетики;
    акцент на військовій геніальності.'
  - 'Деталізація битв: Корсунь, Пилявці, Зборів — опис тактики та наслідків очима
    військового професіонала.'
  - 'Соціальний зріз: як війна змінила статус козацтва та селянства («черні»).'
- section: 'Зміст і структура: II — Анатомія Руїни (1658–1676)'
  words: 700
  points:
  - 'Руїна як центральна трагедія твору: розпад єдності через амбіції («всякий своє
    волів»).'
  - 'Осуд міжусобиць: негативні портрети Виговського, Брюховецького, Дорошенка через
    призму проросійської орієнтації автора.'
  - 'Чорна рада 1663 року: унікальний репортажний опис охлократичного перевороту та
    вбивства Сомка.'
  - 'Польсько-російський поділ: Андрусівське перемир''я як катастрофа для цілісності
    України.'
- section: 'Особливості стилю: Естетика факту'
  words: 600
  points:
  - 'Мова твору: староукраїнська книжна мова з потужним вливанням народної лексики
    (полонізми, латинізми vs жива мова).'
  - 'Стилістичний мінімалізм: відсутність розлогих промов, міфологічних відступів
    та поетичних вставок.'
  - 'Діловий стиль: вплив канцелярії Війська Запорозького; точність у датах, назвах
    та цифрах.'
  - 'Фактографічність як художній прийом: емоційний вплив досягається через сухий
    виклад трагічних подій.'
- section: 'Фрагмент — Початок повстання 1648: Аналіз тексту'
  words: 800
  points:
  - 'Текстологічний розбір вступу: «Початок і причина войни...» — обґрунтування права
    на опір (релігійний та соціальний гніт).'
  - 'Образ ворога: як автор описує поляків («ляхи») та їхню політику, уникаючи демонізації,
    але фіксуючи несправедливість.'
  - 'Динаміка розгортання подій: швидкість мобілізації повстанців та розгубленість
    коронного війська.'
  - 'Позиція автора: повна солідарність з Хмельницьким у 1648 році vs критичність
    до пізніших ватажків.'
- section: 'Критика джерела: Межі об''єктивності очевидця'
  words: 800
  points:
  - 'Суб''єктивність «самовидця»: автор як представник заможної старшини, що боїться
    «черні» та соціального бунту.'
  - 'Політичні упередження: антипатія до пропольських та протурецьких гетьманів; виправдання
    московської протекції як «меншого зла».'
  - 'Інформаційні лакуни: що автор міг знати (події на Лівобережжі) vs що переказував
    з чужих слів (події на Правобережжі).'
  - 'Порівняння джерельної бази: Самовидець як першоджерело для Грабянки та Величка
    (вони переписували цілі шматки).'
- section: 'Підсумок: Значення для національної пам''яті'
  words: 500
  points:
  - 'Фундамент української історіографії: без Самовидця ми б не знали деталей Чорної
    ради та побуту Гетьманщини.'
  - 'Літературний спадок: прямий вплив на романтиків XIX ст. (Куліш, Костомаров, Шевченко).'
  - 'Урок історії: літопис як застереження проти внутрішніх чвар перед обличчям зовнішньої
    загрози.'
