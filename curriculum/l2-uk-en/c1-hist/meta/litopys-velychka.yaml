slug: litopys-velychka
title: 'Літопис Величка: Барокова історія'
word_target: 5000
content_outline:
- section: 'Вступ — Найповніший козацький літопис: I — Масштаб та амбіції'
  words: 450
  points:
  - 'Поєднання непоєднуваного: літопис як барокова епопея, що синтезує історію, художню
    прозу, поезію та теологічні роздуми.'
  - 'Масштаб праці: чотири томи, що роблять твір найобширнішою пам''яткою козацької
    історіографії.'
  - 'Програмна мета: слова Величка про порятунок козацької слави, що «гине в забутті»,
    як рушійний мотив написання.'
- section: 'Вступ — Найповніший козацький літопис: II — Особливості методу'
  words: 400
  points:
  - 'Енциклопедичність тексту: фіксація не лише великої політики, а й козацького побуту,
    менталітету та навіть кулінарних деталей.'
  - 'Провіденціалізм як філософія історії: трактування катастрофи Руїни як «Божого
    гніву» за гріхи та внутрішню незгоду еліт.'
  - 'Доля манускрипту: значні втрати тексту (зокрема, відсутність закінчення) та довгий
    шлях до повного академічного видання 2020 року.'
- section: 'Автор і обставини написання: I — Наближеність до влади'
  words: 450
  points:
  - Походження з Полтавщини (с. Жуки) та імовірна освіта, що дозволила вільно володіти
    латиною і польською мовою.
  - 'Старт кар''єри у 1690-х роках: служба у генерального писаря Василя Кочубея та
    входження у вищі владні кола.'
  - 'Перехід до Генеральної військової канцелярії у 1705 році: унікальний доступ старшого
    канцеляриста до державного архіву та оригіналів документів Богдана Хмельницького.'
- section: 'Автор і обставини написання: II — Трагедія інтелектуала'
  words: 450
  points:
  - 'Катастрофа 1708 року: арешт Величка як частина політичних репресій та чисток
    після переходу гетьмана Івана Мазепи на бік Карла XII.'
  - Роки ув'язнення в Чернігові та Ніжині, що підірвали здоров'я автора, але не знищили
    його дослідницького запалу.
  - 'Героїзм праці: повернення до с. Жуки у 1715 році, прогресуюча сліпота та диктування
    magnum opus помічникам як акт інтелектуальної самопожертви.'
- section: 'Структура і джерела: I — Архітектоніка твору'
  words: 450
  points:
  - 'Чіткий поділ на чотири томи: від Хмельниччини (1648–1660) до доби Руїни (1660–1686)
    та мазепинського періоду (до 1700 року).'
  - 'Європейський горизонт: залучення праць європейських інтелектуалів (Самуель Пуфендорф)
    та польських хроністів (Симон Окольський) для контекстуалізації української історії.'
  - 'Концептуальні лакуни: фізична неповнота збереженого тексту та проблема втрачених
    сторінок манускрипту.'
- section: 'Структура і джерела: II — Проблема джерельної бази'
  words: 400
  points:
  - 'Полеміка навколо «Щоденника Самійла Зорки»: сучасна історіографія трактує його
    не як втрачене першоджерело, а як талановиту барокову літературну містифікацію
    Величка.'
  - 'Інтерполяції та компілятивний метод: як Величко вплітав у свій текст чужі наративи,
    створюючи багатовимірне полотно козацького світу.'
  - 'Рівень ерудиції: здатність автора оперувати кількома мовами та європейськими
    концепціями державного устрою під час написання тексту.'
- section: 'Документи в літописі: I — Архів козацької держави'
  words: 450
  points:
  - 'Інкорпорація сотень документів: універсалів гетьманів, договорів, дипломатичного
    листування безпосередньо у тканину літопису.'
  - 'Унікальна джерельна цінність: збереження текстів, оригінали яких фізично загинули
    у вирі воєн та пожеж XVIII століття.'
  - 'Дипломатичний вимір: листування з європейськими монархами як свідоме підкреслення
    міжнародної політичної суб''єктності Війська Запорозького.'
- section: 'Документи в літописі: II — Метод барокової реконструкції'
  words: 450
  points:
  - 'Революційний підхід до фактології: перехід від простого фіксування подій до створення
    масштабної «документальної історії».'
  - 'Вирішення проблеми втрачених джерел: барокова реконструкція документів «як вони
    мали б звучати» на основі логіки історичного процесу.'
  - 'Відкидання звинувачень у фальсифікації (згідно з концепцією Т. Таїрової-Яковлевої):
    Величко не підробляв документи заради обману, а творив «ідеальну реальність» для
    захисту прав Гетьманщини.'
- section: 'Фрагмент — Переяславська рада: I — Конструювання суб''єктності'
  words: 450
  points:
  - 'Сцена Переяславської ради 1654 року: детальний опис зачитування «статей» Хмельницького,
    що не відповідає історичній дійсності, адже договір укладався пізніше.'
  - 'Юридичний маніфест: Величко використовує цю вигадану сцену для легітимації ідеї
    рівноправного військового союзу на основі чітких «пактів» і договорів.'
  - 'Деколонізаційний вимір: абсолютне спростування російського імперського міфу про
    так зване «возз''єднання» та безумовне підданство московському царю.'
- section: 'Фрагмент — Переяславська рада: II — Антиімперський концепт'
  words: 400
  points:
  - 'Термінологічна війна: використання назви «Малоросія» виключно як політичного
    синоніма самостійної козацької вітчизни, на противагу пізнішому імперському знеціненню
    терміна.'
  - Акцентування на залізних гарантіях «прав і вольностей» як єдиному можливому фундаменті
    легітимності будь-якої влади над Україною.
  - Трансляція політичних ідей автономістської еліти XVIII століття через призму опису
    подій епохи Богдана Хмельницького.
- section: Критика джерела
  words: 400
  points:
  - 'Складнощі роботи з текстом для сучасних істориків: необхідність постійного розмежування
    сухого документального факту та барокової літературної легенди.'
  - 'Політична заангажованість автора: виразна симпатія до державників-автономістів
    і жорстка критика старшинського «розбрату», що призвів до катастрофи Руїни.'
  - 'Наукове значення академічного видання 2020 року: подолання наслідків російської
    та радянської цензури, а також виправлення купюр попередніх публікацій.'
- section: Підсумок
  words: 300
  points:
  - 'Статус «Літопису Величка»: не лише найважливіший історіографічний твір епохи,
    а й потужний ідеологічний трактат про природу української державності.'
  - 'Головний урок історії за Величком: втрата державної суб''єктності є прямим наслідком
    внутрішньої дезінтеграції еліт, а не лише зовнішньої військової агресії.'
  - Значення твору для формування модерної української ідентичності та деконструкції
    колоніальних імперських наративів у сучасній історіографії.
