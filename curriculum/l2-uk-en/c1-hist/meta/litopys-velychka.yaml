slug: litopys-velychka
title: 'Літопис Величка: Барокова історія'
word_target: 5000
content_outline:
- section: Вступ — Найповніший козацький літопис
  words: 600
  points:
  - 'Літопис Самійла Величка як вершина українського барокового літописання: енциклопедія
    козацького життя.'
  - 'Масштаб праці: охоплення подій 1620–1700 років, поєднання жанрів (хроніка, мемуари,
    публіцистика).'
  - 'Концептуальна мета автора: порятунок «козацької слави» від забуття та аналіз
    причин занепаду Гетьманщини.'
  - 'Стилістичні особливості: високий бароковий стиль, риторика, використання латини
    та польської мови.'
- section: Автор і обставини написання
  words: 800
  points:
  - 'Біографія Самійла Величка: походження з козацького роду, освіта (Києво-Могилянська
    академія).'
  - 'Кар''єра канцеляриста: служба у Василя Кочубея та в Генеральній військовій канцелярії
    (доступ до державних таємниць).'
  - 'Політичні репресії 1708 року: арешт після падіння Мазепи та ув''язнення.'
  - 'Робота над літописом у с. Жуки: сліпота автора та диктування тексту помічникам
    (1715–1728).'
- section: Структура і джерела
  words: 800
  points:
  - 'Архітектоніка твору: поділ на чотири томи, тематичні блоки (Хмельниччина, Руїна,
    доба Мазепи).'
  - 'Джерельна база: використання праць іноземних істориків (С. Пуфендорф, С. Твардовський).'
  - 'Козацькі хроніки-попередники: Літопис Самовидця, Літопис Грабянки та їх вплив.'
  - 'Проблема «Щоденника Самійла Зорки»: містифікація чи втрачене джерело? Барокова
    гра з читачем.'
- section: Документи в літописі
  words: 800
  points:
  - 'Документалізм як метод: включення повних текстів універсалів, листів, договорів
    (понад 200 документів).'
  - 'Унікальність збереження: багато документів відомі лише завдяки копіям Величка.'
  - 'Барокова реконструкція: відтворення втрачених документів на основі логіки подій
    («як це мало бути»).'
  - 'Дипломатичне листування: демонстрація міжнародної суб''єктності Гетьманщини.'
- section: Фрагмент — Переяславська рада
  words: 800
  points:
  - 'Опис подій 1654 року: урочистість, промови, театральність моменту.'
  - 'Легенда про «зачитані пакти»: як Величко конструює юридичну базу українсько-російських
    відносин.'
  - 'Деколонізаційний аспект: трактування угоди як рівноправного військового союзу,
    а не підданства.'
  - 'Полеміка з російською імперською візією: наголос на збереженні «прав і вольностей».'
- section: Критика джерела
  words: 600
  points:
  - 'Верифікація даних: де закінчується історія і починається література.'
  - 'Вплив політичних поглядів автора: симпатії до запорожців та критика старшинського
    розбрату.'
  - 'Специфіка датування: помилки в хронології та їх причини.'
  - 'Наукове значення: видання Т. Таїрової-Яковлевої (2020) та повернення повного
    тексту.'
- section: Підсумок
  words: 600
  points:
  - «Літопис Величка» як пам'ятник української політичної думки XVIII століття.
  - 'Урок для нащадків: ідея національної єдності як запоруки існування держави.'
  - 'Вплив на культуру: джерело сюжетів для Шевченка, Костомарова, сучасних письменників.'
  - 'Актуальність: бачення України як частини європейського цивілізаційного простору.'
