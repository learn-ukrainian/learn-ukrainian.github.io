  words: 800
  points:
  - 'Постанова 6 грудня 1932 року: зміст та ініціатори (ЦК КП(б)У та РНК УСРР)'
  - 'Перші жертви: села Вербка, Гаврилівка, Лютенька'
  - 'П''ять пунктів репресій: припинення торгівлі, кредитування, чистки'
  - 'Економічна блокада: вивезення товарів та закриття крамниць як метод тиску'
