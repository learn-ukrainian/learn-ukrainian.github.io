title: 'Синтез: Чому цикл повторюється?'
word_target: 5000
content_outline:
- section: 'Вступ: Анатомія історичного дежавю'
  words: 600
  points:
  - 'Огляд пройденого шляху: від Хмельницького до сьогодення крізь призму повторень.'
  - 'Концепція ''довгого тривання'': чому події XVII століття визначають наше сьогодення.'
  - Шість циклів української історії — одна і та ж структурна пастка.
  - 'Мета модуля: синтезувати знання для розуміння механізмів історії.'
- section: 'Архітектура циклу: Гетьманщина vs УРСР'
  words: 1000
  points:
  - 'Фаза 1: Вимушена автономія. Хмельницький (1654) та Українізація (1920-ті) — імперія
    йде на поступки через слабкість.'
  - 'Фаза 2: Ілюзія стабільності. Мазепа та Шелест — спроба збудувати ''український
    дім'' на імперському фундаменті.'
  - 'Фаза 3: Ліквідація. Розумовський (1764) та Янукович (2014) — момент істини, коли
    імперія скидає маски.'
  - 'Паралелі доль: від ''зрадника'' Мазепи до ''націоналіста'' Шелеста.'
- section: 'Механіка поглинання: Чому це працювало?'
  words: 900
  points:
  - 'Асиметрія сили: ресурсна перевага центру над периферією.'
  - 'Кооптація еліт: обмін суверенітету на особисті привілеї (дворянство, спецпайки).'
  - 'Пастка надії: віра в те, що ''цього разу з Москвою можна домовитися''.'
  - Відсутність геополітичних альтернатив у минулому.
- section: 'Точка біфуркації: Чому 2014 рік став винятком?'
  words: 900
  points:
  - 'Новий гравець: вихід на авансцену громадянського суспільства замість еліт.'
  - 'Крах інформаційної монополії: правда як зброя проти імперських міфів.'
  - Наявність цивілізаційної альтернативи (ЄС) та чітка ідентичність.
  - 'Рішення народу: чому сценарій ''Розумовський-2'' не спрацював з Януковичем.'
- section: 'Війна 2022: Остання спроба імперії'
  words: 800
  points:
  - 2022 рік як реакція імперії на розрив циклу.
  - 'Відмінність від минулого: консолідація нації та світова підтримка.'
  - 'Загрози після війни: ризики нової втоми та пошуку ''простих рішень''.'
  - 'Західна залежність: партнерство чи новий виклик суверенітету?'
- section: 'Алгоритм виживання: Уроки для майбутнього'
  words: 800
  points:
  - 'Урок 1: Розпізнавання фаз циклу — як побачити загрозу до її реалізації.'
  - 'Урок 2: Інституційна пам''ять — чому історія не має права бути забутою.'
  - 'Урок 3: Суб''єктність понад усе — пошук внутрішньої сили, а не зовнішнього покровителя.'
  - 'Підсумок: перехід від циклічності до лінійного розвитку.'
