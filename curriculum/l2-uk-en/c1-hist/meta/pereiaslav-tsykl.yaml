slug: pereiaslav-tsykl
title: 'Переяславський цикл: Хмельницький → Руїна'
word_target: 5000
content_outline:
- section: Вступ — Класичний цикл
  words: 600
  points:
  - 'Визначення ''Переяславського циклу'' як історичної матриці: Обіцянки → Залежність
    → Зрада → Знищення.'
  - 'Чому 1654 рік став точкою відліку: від військового союзу до імперського поглинання.'
  - 'Кореляція з сучасністю: як механізми 17 століття працюють сьогодні.'
  - 'Огляд структури модуля: анатомія геополітичної пастки.'
- section: 'Фаза 1 — Підкуп (1654): Ілюзія рівноправності'
  words: 800
  points:
  - 'Аналіз Березневих статей 1654: 11 пунктів, що гарантували державність.'
  - 'Питання реєстру: 60 000 козаків як гарантія військової автономії.'
  - 'Фінансова та судова незалежність: податки залишаються в Україні, суд — за власним
    правом.'
  - 'Дипломатичний протокол: право на зовнішні зносини (окрім Польщі та Туреччини)
    як ознака суверенітету.'
- section: 'Фаза 2 — Залежність (1654-1667): Повзуча окупація'
  words: 800
  points:
  - 'Інститут воєвод: перетворення союзних гарнізонів на окупаційну адміністрацію.'
  - 'Фальсифікація умов: Переяславські статті 1659 року та звуження прав.'
  - 'Війна за Україну: як Гетьманщина стала полем бою між Москвою та Польщею.'
  - 'Виговський і Конотоп: спроба військовим шляхом розірвати порочне коло.'
- section: 'Фаза 3 — Зрада (1667-1686): Геополітичний торг'
  words: 800
  points:
  - 'Андрусівське перемир''я 1667: таємний поділ України ''по живому'' (по Дніпру).'
  - 'Реакція української еліти: повстання та спроба Дорошенка об''єднати береги.'
  - 'Вічний мир 1686: продаж Києва за 146 тисяч рублів та відмова Польщі від претензій.'
  - 'Анексія Київської митрополії: духовний вимір ''зради'' та втрата культурної автономії.'
- section: 'Фаза 4 — Знищення (поступове): Епоха Руїни'
  words: 800
  points:
  - 'Руїна як технологія: роль зовнішніх кураторів у розпалюванні громадянської війни
    (''Чорна рада'').'
  - 'Коломацькі статті 1687: обмеження прав гетьмана Мазепи на старті його правління.'
  - 'Депортації та репресії: долі Многогрішного та Самойловича як маркери системи.'
  - 'Що залишилось від 1654 року на кінець XVII століття: лише назва ''Військо Запорозьке''.'
- section: 'Аналіз циклу: Історичні альтернативи та уроки'
  words: 600
  points:
  - 'Counterfactual history: Чи був можливий успіх Гадяцької унії?'
  - 'Чому Хмельницький обрав Москву: релігійна пастка та помилка в оцінці партнера.'
  - 'Роль еліти: чому старшина легко піддавалася на ''підкуп'' і ''маніпуляції''.'
  - 'Стратегія ''багатовекторності'' у XVII столітті: переваги та фатальні ризики.'
- section: 'Підсумок: Паттерн імперської експансії'
  words: 600
  points:
  - Переяслав як перший повний цикл поглинання України.
  - 'Матриця дій Москви: порушення договорів, використання п''ятої колони, терор.'
  - 'Місток до наступної теми: як Мазепа спробує зламати цей цикл через 20 років.'
  - 'Фінальне узагальнення: державність не дарують, її захищають.'
