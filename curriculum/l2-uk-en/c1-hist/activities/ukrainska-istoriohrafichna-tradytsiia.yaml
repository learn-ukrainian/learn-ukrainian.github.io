- type: reading
  id: reading-hrushevsky
  title: Уривок зі вступу до Історії України-Руси
  source: Михайло Грушевський
  text: '...головним і єдиним рушієм усієї світової історії є не амбітні королі чи
    владні гетьмани, а саме широкі народні маси — їхній побут, їхня культура, їхні
    вірування та прагнення. Історія не є літописом царів та полководців; вона є
    оповіддю про життя цілого народу, від селянської хати до козацької ради.'
  instruction: Уважно прочитайте уривок для подальшого критичного аналізу.
- type: critical-analysis
  title: 'Критичний аналіз: Народницька парадигма'
  source_reading: reading-hrushevsky
  instruction: Дайте відповіді на запитання на основі прочитаного тексту.
  target_text: '...головним і єдиним рушієм усієї світової історії є не амбітні королі
    чи владні гетьмани, а саме широкі народні маси...'
  questions:
  - Як цей уривок відображає суть народницької парадигми Грушевського?
  - Чому такий підхід став революційним для української історіографії кінця ХІХ століття?
  model_answers:
  - Уривок яскраво демонструє, що народники вважали прості маси головним творцем історії,
    свідомо применшуючи роль політичних еліт та держави.
  - Це був виклик імперській історії, яка фокусувалася виключно на правителях і державному
    апараті, ігноруючи життя бездержавного українського народу.
  focus_points:
  - Народницька парадигма
  - Деколонізація історії
- type: essay-response
  title: 'Есе: Роль діаспори у збереженні науки'
  source_reading: reading-hrushevsky
  prompt: Проаналізуйте значення інституційного захисту (УВАН, НТШ, HURI) в українській
    діаспорі. Як створення цих інституцій вплинуло на легітимізацію українознавства
    на Заході?
  instruction: Напишіть академічне есе, спираючись на текст модуля.
  min_words: 500
  model_answer: Есе має розкрити тему інтелектуальної еміграції та її ролі у збереженні
    історичної пам'яті. Слід згадати діяльність Омеляна Пріцака та створення Гарвардського
    інституту, що дозволило вивчати історію України не як провінційний додаток, а
    як самостійну дисципліну. Успіх залежав від фінансування українцями діаспори та
    інтеграції у світовий академічний дискурс англомовними публікаціями.
  rubric:
  - criteria: Аргументація
    description: Чіткість та переконливість наведених аргументів.
    points: 40
  - criteria: Робота з фактами
    description: Використання конкретних прикладів з діяльності УВАН та HURI.
    points: 40
  - criteria: Академічний стиль
    description: Дотримання наукового стилю та термінології.
    points: 20
- type: true-false
  title: 'Факти та інтерпретації: Перевірка знань'
  instruction: Визначте, чи є наведені твердження істинними чи хибними.
  items:
  - statement: Михайло Грушевський вважав головним рушієм історії державні інституції
      та еліту.
    correct: false
    explanation: Грушевський був представником народництва і вважав головним рушієм
      народні маси.
  - statement: Російська імперська цензура дозволяла вільне видання українських історичних
      праць у Києві в ХІХ столітті.
    correct: false
    explanation: Діяли жорсткі заборони, такі як Емський указ, що унеможливлювали
      легальну україномовну науку в Російській імперії.
  - statement: Степан Томашівський належав до державницького напряму української історіографії.
    correct: true
    explanation: Томашівський відійшов від народництва Грушевського і високо оцінював
      державницьку діяльність лідерів.
  - statement: Концепція общерусскої історії визнавала Київську Русь виключно першим
      етапом української державності.
    correct: false
    explanation: Ця імперська концепція стверджувала існування єдиного російського
      народу і виводила родовід Московської держави з Києва.
  - statement: Наукове товариство імені Шевченка було засновано у Львові і виконувало
      функції неофіційної української академії наук.
    correct: true
    explanation: В умовах австрійської Галичини НТШ стало потужним центром вільної
      української науки.
  - statement: В'ячеслав Липинський був одним із найяскравіших представників народницької
      парадигми.
    correct: false
    explanation: Липинський заснував державницько-консервативний напрям, акцентуючи
      увагу на ролі еліт.
  - statement: Українська Вільна Академія Наук була створена українськими вченими
      в еміграції після Другої світової війни.
    correct: true
    explanation: УВАН була заснована в Німеччині у 1945 році, а згодом перемістилася
      до США та Канади.
  - statement: Орест Субтельний написав свою знамениту працю виключно російською мовою
      для радянського читача.
    correct: false
    explanation: 'Його праця Ukraine: A History була написана англійською і згодом
      перекладена українською.'
  - statement: Тімоті Снайдер розглядає Україну як епіцентр європейської історії ХХ
      століття у своїй праці про Криваві землі.
    correct: true
    explanation: Снайдер довів, що контроль над Україною був головною геополітичною
      метою тоталітарних режимів.
  - statement: Олександр Оглоблин досліджував козацьку еліту за допомогою сучасного
      просопографіїчного методу.
    correct: true
    explanation: Він детально аналізував генеалогію козацької старшини, доводячи її
      високий освітній рівень.
  - statement: Пол Роберт Маґочі пропагував етноцентричний підхід до написання історії
      України.
    correct: false
    explanation: Він запропонував мультикультурний підхід, включаючи історію всіх
      народів, що жили на території України.
  - statement: Відкриття архівів КДБ у 1991 році дозволило документально довести штучний
      характер Голодомору.
    correct: true
    explanation: Архіви надали тисячі беззаперечних доказів злочинних намірів сталінського
      керівництва.
- type: comparative-study
  title: 'Порівняльний аналіз: Народники та Державники'
  source_reading: reading-hrushevsky
  instruction: Порівняйте два ключові напрями української історіографії першої половини
    ХХ століття.
  items_to_compare:
  - Народницька школа (Михайло Грушевський)
  - Державницька школа (В'ячеслав Липинський)
  criteria:
  - Головний суб'єкт та рушій історії
  - Ставлення до еліт (шляхти, старшини)
  - Оцінка ролі держави та армії
  prompt: На основі вивченого матеріалу здійсніть порівняльний аналіз народницького
    та державницького підходів до історії України.
  model_answer: Народницька школа вважала єдиним рушієм історії прості народні маси,
    а еліту часто розглядала як зрадників. Держава сприймалася скоріше як апарат примусу.
    Державницька школа, навпаки, бачила в елітах єдиний державотворчий кістяк нації.
    Липинський стверджував, що без міцної держави та регулярної армії нація приречена
    на колоніальне рабство.
