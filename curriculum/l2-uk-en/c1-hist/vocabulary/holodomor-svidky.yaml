- word: "усна історія"
  ipa: "ˈʊsnɑ isˈtɔrʲijɑ"
  translation: "oral history"
  definition: "Метод збору історичної інформації через записані інтерв'ю з учасниками подій."
- word: "змова мовчання"
  ipa: "ˈzmɔʋɑ mɔu̯ˈt͡ʃɑnʲːɑ"
  translation: "conspiracy of silence"
  definition: "Ситуація, коли суспільство або група людей свідомо приховує правду про певну подію."
- word: "свідчення"
  ipa: "ˈsʲʋidt͡ʃenʲːɑ"
  translation: "testimony"
  definition: "Усна або письмова розповідь особи про події, очевидцем яких вона була."
- word: "очевидець"
  ipa: "ɔt͡ʃeˈʋɪdet͡sʲ"
  translation: "eyewitness"
  definition: "Людина, яка особисто бачила якусь подію."
- word: "буксирна бригада"
  ipa: "bʊkˈsɪrnɑ brɪˈɦɑdɑ"
  translation: "search brigade (literally: towing brigade)"
  definition: "Група активістів, що займалася примусовим вилученням продовольства у селян під час Голодомору."
- word: "щуп"
  ipa: "ʃt͡ʃup"
  translation: "probe"
  definition: "Гострий металевий стрижень для пошуку захованого зерна."
- word: "реквізиція"
  ipa: "rekʋiˈzɪt͡sʲijɑ"
  translation: "requisition"
  definition: "Примусове вилучення майна або продовольства державою."
- word: "сурогат"
  ipa: "sʊrɔˈɦɑt"
  translation: "surrogate / substitute"
  definition: "Замінник натурального продукту, часто неповноцінний або шкідливий."
- word: "макуха"
  ipa: "mɑˈkuxɑ"
  translation: "oilcake"
  definition: "Вичавки з насіння олійних культур, що використовувалися як їжа під час голоду."
- word: "лобода"
  ipa: "lɔbɔˈdɑ"
  translation: "goosefoot / quinoa"
  definition: "Трав'яниста рослина, яку вживали в їжу під час голоду."
- word: "опухлий"
  ipa: "ɔˈpuxlɪi̯"
  translation: "swollen"
  definition: "Який збільшився в об'ємі через хворобу або голодне виснаження (набряк)."
- word: "канібалізм"
  ipa: "kɑnʲibɑˈlʲizm"
  translation: "cannibalism"
  definition: "Поїдання людьми людської плоті, що траплялося в умовах крайнього голоду."
- word: "травма"
  ipa: "ˈtrɑu̯mɑ"
  translation: "trauma"
  definition: "Глибоке психологічне або фізичне ушкодження."
- word: "трансгенераційний"
  ipa: "trɑnsɦenerɑˈt͡sʲijniĭ"
  translation: "transgenerational"
  definition: "Такий, що передається від покоління до покоління (наприклад, травма)."
- word: "геноцид"
  ipa: "ɦenɔˈt͡sɪd"
  translation: "genocide"
  definition: "Цілеспрямоване знищення певної групи людей за національною, етнічною чи релігійною ознакою."
- word: "поминання"
  ipa: "pɔmɪˈnɑnʲːɑ"
  translation: "commemoration"
  definition: "Вшанування пам'яті померлих."
- word: "спогад"
  ipa: "ˈspɔɦɑd"
  translation: "recollection / memory"
  definition: "Відтворення в пам'яті минулих подій або вражень."
- word: "фальсифікація"
  ipa: "fɑlʲsʲifʲiˈkɑt͡sʲijɑ"
  translation: "falsification"
  definition: "Підробка, викривлення фактів."
- word: "архів"
  ipa: "ɑrˈxiu̯"
  translation: "archive"
  definition: "Установа або місце для зберігання документів."
- word: "продовольство"
  ipa: "prɔdɔˈʋɔlʲstʋɔ"
  translation: "food provisions"
  definition: "Продукти харчування, запаси їжі."
- word: "виживання"
  ipa: "ʋɪʒɪˈʋɑnʲːɑ"
  translation: "survival"
  definition: "Збереження життя в екстремальних умовах."
- word: "розкуркулення"
  ipa: "rɔzkurˈkulenʲːɑ"
  translation: "dekulakization"
  definition: "Політика знищення заможного селянства (куркулів) в СРСР."
- word: "активіст"
  ipa: "ɑktɪˈʋist"
  translation: "activist"
  definition: "У контексті Голодомору — виконавець злочинних наказів влади на місцях."
- word: "приховувати"
  ipa: "prɪˈxɔʋʊʋɑtɪ"
  translation: "to conceal / to hide"
  definition: "Робити непомітним, таїти щось."
- word: "вилучати"
  ipa: "ʋɪlʊˈt͡ʃɑtɪ"
  translation: "to confiscate / to remove"
  definition: "Забирати, відбирати щось (часто примусово)."
- word: "Голодомор"
  ipa: "ɦɔlɔdɔˈmɔr"
  translation: "Holodomor"
  definition: "Штучний голод 1932-1933 років, організований радянською владою для знищення українців."
- word: "пам'ять"
  ipa: "ˈpɑmju̯ɑtʲ"
  translation: "memory"
  definition: "Здатність зберігати і відтворювати інформацію про минуле."
- word: "замовчувати"
  ipa: "zɑˈmɔu̯t͡ʃʊʋɑtɪ"
  translation: "to hush up / to suppress"
  definition: "Свідомо не говорити про щось, приховувати інформацію."
- word: "ретравматизація"
  ipa: "retrɑu̯mɑtɪˈzɑt͡sʲijɑ"
  translation: "retraumatization"
  definition: "Повторне переживання травматичного досвіду під час спогадів."
- word: "верифікація"
  ipa: "ʋerɪfʲiˈkɑt͡sʲijɑ"
  translation: "verification"
  definition: "Перевірка істинності, достовірності чого-небудь."
