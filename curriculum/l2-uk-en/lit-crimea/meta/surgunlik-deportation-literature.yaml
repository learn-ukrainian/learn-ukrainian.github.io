slug: surgunlik-deportation-literature
title: 'Література Сюрґюнліку: Травма Депортації 1944 року'
word_target: 5000
content_outline:
- section: 'Вступ: Сюрґюнлік як центральна травма народу'
  words: 500
  points:
  - Депортація кримськотатарського народу 18 травня 1944 року.
  - Тоталітарна система та спроба повного стирання ідентичності.
  - 'Мовчання довжиною в десятиліття: неможливість публічного говоріння про трагедію.'
- section: Література в місцях заслання (Узбекистан)
  words: 600
  points:
  - Умови виживання в спецпоселеннях і збереження мови.
  - Перехід літератури в підпілля або алегоричні форми.
  - Роль самвидаву та усних розповідей.
- section: 'Шаміль Алядін: Від соцреалізму до свідчення'
  words: 800
  points:
  - Довоєнна творчість та участь у Другій світовій війні.
  - Повернення героя-фронтовика до порожнього Криму та його депортація.
  - 'Роман «Я — Узереш»: осмислення трагедії та боротьби за виживання.'
- section: 'Поезія болю: Ешреф Шем''ї-заде'
  words: 700
  points:
  - Поема «Козьяш дивары» (Стіна сліз) — епос депортації.
  - Мотиви втрати батьківщини, розпачу та надії на повернення.
  - Метафорика вигнання в його текстах.
- section: Документалістика та мемуари
  words: 600
  points:
  - Спогади тих, хто пережив дорогу в товарних вагонах.
  - Фіксація смертності, голоду та хвороб у перші роки заслання.
  - Значення цих текстів як доказів злочину геноциду.
- section: Жіночий досвід у літературі депортації
  words: 600
  points:
  - Специфіка виживання жінок та дітей (більшість чоловіків були на фронті).
  - Образ матері-охоронниці нації в екстремальних умовах.
  - Твори сучасних авторок, що реконструюють пам'ять бабусь.
- section: 'Деколонізаційна перспектива: Протистояння стиранню'
  words: 600
  points:
  - Література як акт збереження географічної пам'яті (топонімів, природи Криму).
  - Критика радянського виправдання депортації («народ-зрадник»).
  - Формування дисидентського руху через літературне осмислення травми.
- section: 'Підсумок: Від травми до руху за права'
  words: 500
  points:
  - Як тексти про Сюрґюнлік стимулювали національний рух у 1960-80-х роках.
  - Переклад творів українською мовою та загальноукраїнський контекст співпереживання.
  - Тема Сюрґюнліку в сучасній українській літературі та кіно.
