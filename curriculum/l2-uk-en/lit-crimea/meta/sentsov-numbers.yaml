slug: sentsov-numbers
title: "«Числа»: Олег Сенцов — Від Кінорежисера до Символу Спротиву"
word_target: 5000
content_outline:
  - section: 'Вступ та культурний контекст: Передумови та значення'
    words: 800
    points:
      - 'Створення п''єси у 2011 році: візіонерство Олега Сенцова напередодні Революції
        Гідності'
      - 'Редагування тексту в умовах російського ув''язнення: текст як акт політичного
        та екзистенційного опору'
      - Місце «Номерів» в українському літературному каноні та відродження жанру політичної
        антиутопії
  - section: 'Аналіз твору: Сюжет та структура'
    words: 600
    points:
      - 'Замкнений хронотоп твору: суспільство як замкнутий тренувальний табір або
        ізолятор'
      - 'Рушійна сила сюжету: рутина, доведена до абсурду, та поява Одинадцятого як
        каталізатора змін'
      - 'Літературні впливи: діалог із класичними європейськими антиутопіями (Орвелл,
        Замятін) та театром абсурду'
  - section: 'Герменевтика та ключові образи: Світ «Номерів»'
    words: 600
    points:
      - 'Символіка влади: постать Нуля (Zero) як абсолютного патерналістського диктатора'
      - 'Сакралізація абсурду: «Книга Правил» як метафора догматичної державної ідеології'
      - 'Ритуальність буття: як система регламентує інтимне та соціальне життя'
  - section: 'Герменевтика та ключові образи: Еволюція персонажів'
    words: 600
    points:
      - 'Деперсоналізація: парні та непарні номери як інструмент стирання індивідуальності'
      - 'Архетипи суспільства: конформісти, приховані дисиденти та радикальні бунтарі'
      - 'Психологія звільнення: парадокс страху перед свободою після повалення ідола'
  - section: Мова, стиль та поетика
    words: 600
    points:
      - Гротеск і буфонада як ключові стилістичні інновації та зброя проти тоталітарного
