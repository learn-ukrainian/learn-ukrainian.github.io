      - 'Специфіка діалогів: автоматизм, штампи та обмеженість лексики поневолених'
      - 'Театральність тексту: мінімалізм декорацій, що переносить фокус на соціальну
        механіку'
  - section: 'Деколонізаційний вимір: Руйнування імперського міфу'
    words: 600
    points:
      - 'Критика «homo sovieticus»: ілюзія безпеки в обмін на покірність і свободу'
      - Деконструкція імперського наративу про благодійну диктатуру
      - Оголення внутрішньої порожнечі системи (Нуль як фікція)
  - section: 'Деколонізаційний вимір: Агентність і опір'
    words: 600
    points:
      - Процес повернення власних імен як найвищий акт культурного самоствердження
      - 'Складнощі деколонізації: хаос після бунту та необхідність брати відповідальність'
      - 'Українська перспектива: відмова від асиміляції та боротьба за власну ідентичність'
  - section: Підсумок та рецепція
    words: 600
    points:
      - Унікальний світовий досвід постановки п'єси та створення фільму без фізичної
