content_outline:
- section: 'Вступ: Агатангел Кримський — титан українського інтелекту'
  words: 400
  points:
  - 'Унікальність постаті: кримськотатарське походження та українська ідентичність'
  - Кримський як поліглот та засновник українського сходознавства
  - Значення орієнталізму для модернізації української літератури
- section: 'Постать «вченого-поета»: Синтез філології та лірики'
  words: 500
  points:
  - Поезія як художнє продовження наукових студій Кримського
  - Вплив філологічної точності на образну систему автора
  - Концепція 'інтелектуальної поезії' в українському модернізмі
- section: '«Пальмове гілля»: Східна реінкарнація «Зів''ялого листя»'
  words: 600
  points:
  - Історія створення збірки (1896–1923) та її тричастинна структура
  - 'Рецепція Івана Франка: визнання Кримського як ''екзотичного квіту'''
  - Діалог між європейським модернізмом (декадансом) та східною традицією
- section: 'Історична пам''ять Сходу: Цикл «У горах Ліванських»'
  words: 550
  points:
  - Відображення ліванського періоду життя Кримського в поезії
  - Образ руїн як метафора історичної тяглості та занепаду цивілізацій
  - Співвідношення особистого переживання та історичного масштабу
- section: 'Концепція «Нечестивого кохання»: Ерос та історія'
  words: 550
  points:
  - Аналіз циклу 'Нечестиве кохання' як ліричного роману
  - Психологізм та провокативність модерністського героя
  - Автобіографізм та культурні коди (християнство vs іслам)
- section: 'Кримський-перекладач: I — «Шах-наме» та епічна традиція'
  words: 500
  points:
  - Робота Кримського над перським епосом Фірдоусі
  - 'Техніка перекладу: відтворення східної метрики в українській мові'
  - Значення епічних перекладів для формування високого стилю
- section: 'Кримський-перекладач: II — Хайям, Гафіз та Сааді'
  words: 450
  points:
  - Інтерпретація філософської лірики Сходу
  - Популяризація жанру газелі в українській літературі
  - 'Переклад як інструмент деколонізації: прямий доступ до джерел'
- section: Український орієнталізм як деколонізаційний проект
  words: 600
  points:
  - Подолання російського імперського посередництва у вивченні Сходу
  - Створення автономного українського науково-художнього простору
  - Кримський як голос поневолених народів (українців та кримських татар)
- section: 'Діалог цивілізацій: Східна історія крізь українську призму'
  words: 450
  points:
  - Пошук паралелей між долею України та народів Близького Сходу
  - Крим як геополітичний та культурний міст у творчості Кримського
  - 'Гуманістичний пафос поезії: Схід не як екзотика, а як рідний простір'
- section: 'Спадщина та трагедія: Від Академії до ГУЛАГу'
  words: 400
  points:
  - Внесок Кримського в розбудову Української Академії наук
  - 'Трагічна доля вченого-поета: арешт, депортація, забуття'
  - 'Повернення Кримського до національного канону: сучасна рецепція'
