slug: gaspirali-crimean-modernizer
title: "Ісмаїл Гаспринський: Мова, Освіта, Єдність — Архітектор Кримськотатарської Модерності"
word_target: 5000
content_outline:
- section: 'Вступ: I — Хто такий Гаспринський?'
  words: 500
  points:
  - 'Ісмаїл Гаспринський / Гаспирали (1851–1914): Бахчисарай — Париж — Москва — Бахчисарай — і проект, що охопив увесь тюркський світ.'
  - '"Тарджуман" (1883–1918): перша тюркомовна газета, що виходила одночасно в кількох країнах — що це означало для тюркської культурної свідомості.'
  - '"Мова, думка, справа": три компоненти гаспринського проекту модернізації кримських татар і тюркського світу.'
- section: 'Вступ: II — Джадидизм як панісламський просвітницький рух'
  words: 500
  points:
  - '"Джадидизм" (від "usul-i jadid" — нова метода): реформування мусульманської освіти через нові методи навчання і нові зміст.'
  - 'Бахчисарайська школа-зразок: де Гаспринський практикував власні освітні теорії — і як модель поширилась на Казань, Середню Азію, Кавказ.'
  - 'Критики справа і зліва: богослови-консерватори і царська адміністрація — обидва бачили Гаспринського небезпечним.'
- section: 'Аналіз: «Тарджуман» як медіапроект'
  words: 700
  points:
  - 'Газета між новинами і педагогікою: "Тарджуман" як інструмент мовного будівництва і суспільного просвітлення.'
  - '"Спільна тюркська мова": програмна стаття Гаспринського — де ідея єдиної міжтюркської літературної мови є революційною і де ілюзорною.'
  - 'Виживання газети 35 років під царською цензурою: які тактики давали Гаспринському простір для маневру.'
- section: 'Аналіз: Художня проза — утопія і подорож'
  words: 700
  points:
  - '"Французькі листи": художня проза Гаспринського між подорожніми нотатками і просвітницькою утопією.'
  - '"Дар уль-Рахат Муслиманлари" ("Країна Спокою Мусульман", 1906): утопічна повість як програма реформ у художній формі.'
  - Гаспринський і Вольтер: де просвітницька утопія як жанр слугує тій самій меті через два століття.
- section: 'Аналіз: Освітня програма і мовна реформа'
  words: 600
  points:
  - '"Усул-і Джадид" як педагогічна методика: звуковий метод навчання читанню замість традиційного складового.'
  - 'Підручники Гаспринського: перші системні навчальні матеріали кримськотатарською — що вони змінили для дітей.'
  - 'Дискусія про арабський алфавіт: де Гаспринський зупиняється перед реформою і чому.'
- section: 'Стилістика: Просвітницька риторика і публіцистична ясність'
  words: 500
  points:
  - 'Стиль «Тарджуману»: доступний, без зайвих арабізмів, але і без вульгаризації — де знаходить Гаспринський цей баланс.'
  - 'Риторика переконання: Гаспринський не наказує, а переконує — і це відрізняє його від релігійних авторитетів.'
  - '"Листування" як жанр: де Гаспринський найбільш відвертий — у листах до чиновників, читачів і однодумців.'
- section: 'Деколонізаційна перспектива: Модернізація як захист'
  words: 500
  points:
  - 'Гаспринський і царська адміністрація: не «лоялізм», а тактика — де він іде на компроміс і де тримає лінію.'
  - 'Паралель з Ататюрком: два проекти тюркської модернізації — спільні витоки і принципово різні шляхи.'
  - 'Спадщина Гаспринського після 1914 р.: що вижило у радянський час і що знищили разом з «буржуазними» інтелектуалами.'
- section: 'Підсумок: Гаспринський як точка відліку'
  words: 500
  points:
  - Від Гаспринського до Челебіджіхана і Чобан-Заде: тяглість кримськотатарського модернізаційного проекту.
  - 'Гаспринський у сучасному Криму: де його ім''я знають і де він замовчаний після анексії 2014 р.'
  - Питання до читача: чи є «мова, думка, справа» актуальним принципом для збереження ідентичності в умовах окупації?
