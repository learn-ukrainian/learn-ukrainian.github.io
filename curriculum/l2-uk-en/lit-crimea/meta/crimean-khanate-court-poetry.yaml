slug: crimean-khanate-court-poetry
title: 'Диванна Література: Висока Поезія Кримського Ханства'
word_target: 5000
content_outline:
- section: 'Вступ: Кримське ханство як культурний центр'
  words: 500
  points:
  - 'Стереотип про «дике поле» та кочовиків: деконструкція імперського міфу.'
  - Бахчисарай як осередок високої ісламської культури.
  - Знайомство з концепцією «Диванної літератури» (класичної придворної поезії).
- section: 'Хан-поет: Бора Гази Ґерай (1554–1607)'
  words: 700
  points:
  - Поєднання образу воїна, політика та витонченого лірика (псевдонім Газаї).
  - 'Аналіз його газелей та касид: любовна, філософська та суфійська тематика.'
  - Музична обдарованість хана та його вплив на мистецтво.
- section: Ашик Умер (1621–1707) та традиція ашиків
  words: 700
  points:
  - Ашик (трубадур, бард) як явище кримськотатарської культури.
  - Синтез високої (диванної) поезії та народної (усної) творчості.
  - 'Сюжети поезії Ашика Умера: містика, кохання, життєві роздуми.'
- section: Жіночі голоси в придворній поезії
  words: 600
  points:
  - Ханзоде-ханум (донька Бора Гази Ґерая) та її поетична спадщина.
  - Роль освічених жінок при дворі Ґераїв.
  - Особливості жіночого погляду в межах строгих канонів східної поезії.
- section: Поетика, жанри та метрика (Аруз)
  words: 700
  points:
  - 'Канонічні форми: газель, касида, рубаї.'
  - Система віршування «аруз» (чергування довгих і коротких складів).
  - 'Символіка: троянда і соловей, вино і мейхане (суфійське прочитання).'
- section: Літописання як література (Таріхи)
  words: 600
  points:
  - Історичні хроніки (наприклад, Сейїда Мухаммеда Ризи).
  - Поєднання історичного фактажу з високим риторичним стилем.
  - Епічні поеми про походи ханів.
- section: 'Деколонізаційний аспект: Знищення після 1783 року'
  words: 600
  points:
  - Анексія Криму Російською імперією та катастрофічні наслідки для культури.
  - Спалення бібліотек, еміграція еліти, занепад придворної традиції.
  - Повернення текстів у сучасний дискурс як акт відновлення справедливості.
- section: 'Підсумок: Місце в сучасній культурі'
  words: 500
  points:
  - Переклади диванної поезії українською мовою.
  - Вплив на сучасних кримськотатарських авторів.
  - Кримськотатарська класика як невід'ємна частина культурної спадщини України.
