slug: choban-zade-scholar-poet
title: "Бекір Чобан-Заде: Між Стамбулом і Симферополем — Вчений-Поет у Тоталітарній Пастці"
word_target: 5000
content_outline:
- section: 'Вступ: I — Траєкторія між двома світами'
  words: 500
  points:
  - 'Бекір Чобан-Заде (1893–1937): народжений у Карасубазарі (Крим), навчався в Угорщині і Стамбулі — перший кримськотатарський академічний лінгвіст.'
  - 'Повернення в СРСР у 1925 р.: свідоме рішення служити власному народу — і ціна цього рішення.'
  - 'Страта у Сімферополі 1937 р.: вчений, поет і громадський діяч знищений у 44 роки.'
- section: 'Вступ: II — Тюркологія і кримськотатарська культура'
  words: 500
  points:
  - 'Чобан-Заде як лінгвіст: праці з тюркологічного порівняльного мовознавства — фундаментальні і досі актуальні.'
  - '"Тюрксько-татарська поезія до XV ст.": видана у Баку 1926 р. — перший академічний огляд середньовічної тюркської лірики.'
  - 'Педагогічна діяльність: Бакинський університет — де він готував покоління кримськотатарських інтелектуалів.'
- section: 'Аналіз: Поетична спадщина — між газеллю і модернізмом'
  words: 700
  points:
  - 'Перші збірки: «Домбра»/ «Думбра» і рання лірика між народним і книжним — де вчений дозволяє собі бути ліриком.'
  - 'Тема Криму як «втраченого Едему»: образи рідної землі між тугою і надією.'
  - '"Осінні вірші": збірка еміграційних років — де особисте і суспільне зливаються у один настрій.'
- section: 'Аналіз: Науково-поетичний синтез'
  words: 700
  points:
  - 'Де вчений і поет говорять одночасно: вірші про мову, про слово, про назви місць — лінгвоісторична лірика.'
  - 'Кримськотатарська топоніміка у віршах: «Буюк-Ламбат», «Карасубазар» — як назви стають архівом пам''яті.'
  - 'Переклади Чобан-Заде: Гейне і Байрон кримськотатарською — мова у зустрічі зі світовою класикою.'
- section: 'Аналіз: Публіцистика і культурна програма'
  words: 600
  points:
  - '"Про кримськотатарську літературну мову": ключова стаття про стандартизацію і модернізацію мови.'
  - 'Чобан-Заде і «латинізація»: від арабського до латинського алфавіту — і де ця реформа зупинилась.'
  - '"Кримськотатарський Брюсов": порівняння з російським символістом — де воно доречне і де обмежує.'
- section: 'Стилістика: Висока форма і народне джерело'
  words: 500
  points:
  - 'Кримськотатарський класичний вірш і його народна трансформація у Чобан-Заде.'
  - 'Ритм і мелодика: де музичність входить у вірш і де вона пов''язана з манер (народна пісня-форма).'
  - '"Чистота мови": Чобан-Заде проти «засмічення» арабізмами і персизмами — лінгвістична дискусія у поетичній практиці.'
- section: 'Деколонізаційна перспектива: Мова як боротьба'
  words: 500
  points:
  - 'Арешт 1937 р. у логіці Великого терору: тюрколог = «буржуазний націоналіст» — хто і чому потрапляв під удар.'
  - '"Справа кримськотатарських інтелектуалів" 1937 р.: знищення цілого культурного покоління одночасно.'
  - 'Збереження спадщини в діаспорі: де праці Чобан-Заде зберігалися під час замовчування.'
- section: 'Підсумок: Сучасне визнання'
  words: 500
  points:
  - Перевидання Чобан-Заде в незалежній Україні і в Туреччині — де його ім''я відоме і де потребує популяризації.
  - 'Чобан-Заде і Джелял Байарли: сучасні кримськотатарські поети між традицією і новим досвідом окупації.'
  - Питання до читача: чи можна бути «об''єктивним» вченим у ситуації, коли твоя наука — зброя для захисту власної ідентичності?
