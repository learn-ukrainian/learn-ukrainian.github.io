content_outline:
- section: 'Вступ: Наріман Джелял та голос кримського спротиву'
  words: 400
  points:
  - Значення постаті Нарімана Джеляла як заступника голови Меджлісу та інтелектуала
  - Феномен перетворення політичного в'язня на письменника та філософа
  - Визначення 'Листів з-за ґрат' як ключового тексту сучасної кримської літератури
- section: 'Історичний контекст: Помста за ''Кримську платформу'''
  words: 500
  points:
  - 'Події серпня-вересня 2021 року: від дипломатичного тріумфу в Києві до репресій
    у Криму'
  - Сфабрикована справа про 'диверсію' як інструмент криміналізації мирного спротиву
  - Міжнародна реакція та формування образу Джеляла як символу незламності
- section: 'Філософія неволі: Листи як акт інтелектуальної свободи'
  words: 650
  points:
  - 'Концепція ''внутрішньої свободи'' у текстах Джеляла: перемога над тюремними стінами'
  - 'Роздуми про природу тиранії: чому страх є головною зброєю окупантів'
  - Письмо як спосіб збереження громадянської суб'єктності в ізоляції
- section: 'Етичний маніфест: Категорія ''Ілюзій немає'''
  words: 600
  points:
  - Аналіз фрази 'Ілюзій немає' як основи етики спротиву
  - 'Протистояння пропаганді: пошук правди в умовах цензури'
  - 'Заклик до моральної стійкості: чому не можна йти на компроміси з совістю'
- section: 'Кримськотатарський вимір: Код Батьківщини'
  words: 700
  points:
  - 'Тяглість трагедій: від Сюрґюнліку 1944 року до репресій 2021-го'
  - 'Образ Криму (Vatan) у листах: від фізичної втрати до духовної присутності'
  - Роль Меджлісу як гаранта збереження ідентичності народу в умовах окупації
- section: 'Поетика та стиль: I — Жанрові особливості тюремного епістолярію'
  words: 400
  points:
  - Трансформація журналістського стилю в есеїстичний
  - Лаконізм, точність деталей та психологічна глибина текстів
  - 'Символізм мови: як обходити цензуру через метафори'
- section: 'Поетика та стиль: II — Образна система та лейтмотиви'
  words: 450
  points:
  - Метафора 'вікна' та 'повітря' у текстах про листування
  - 'Художній час і простір у замкненій камері: сповільнення та концентрація смислів'
  - Лейтмотив надії як свідомого вибору ('любити надією')
- section: 'Комунікація як порятунок: Психологія отримання листів'
  words: 450
  points:
  - Детальний аналіз важливості зовнішнього зв'язку для в'язня
  - Листи від незнайомих людей як доказ солідарності вільного світу
  - Опис ритуалів читання та збереження листів у СІЗО та колонії
- section: 'Деколонізаційний вимір: Руйнування імперського наративу'
  words: 500
  points:
  - Спростування міфів про 'покору' Криму через голос Джеляла
  - 'Україноцентричний погляд на долю Криму: корінний народ як суб''єкт історії'
  - Джелял як міст між кримськотатарським та загальноукраїнським контекстом
- section: 'Вплив та сучасність: Спадщина, що триває'
  words: 350
  points:
  - 'Звільнення 2024 року: емоційне та політичне значення події'
  - 'Подальша місія Нарімана Джеляла: боротьба за всіх політв''язнів'
  - Значення його творчості для майбутнього переосмислення історії деокупації Криму
