slug: celebicihan-poet-statesman
title: "Номан Челебіджіхан: Поет-Державець — Короткий Злет Кримськотатарської Незалежності"
word_target: 5000
content_outline:
- section: 'Вступ: I — Хто такий Номан Челебіджіхан?'
  words: 500
  points:
  - 'Номан Челебіджіхан (1885–1918): поет, релігійний лідер (мусульманський суддя), перший голова Кримськотатарської Народної Республіки (1917).'
  - 'Короткий злет: Курултай листопада 1917 р. — перший кримськотатарський демократичний парламент — і більшовицький переворот лютого 1918 р.'
  - 'Вбивство 1918 р.: 33 роки, топлений у морі — і 70 років замовчування в СРСР.'
- section: 'Вступ: II — Кримськотатарський ренесанс початку XX ст.'
  words: 500
  points:
  - 'Контекст «джадидизму»: освітній і культурний реформ-рух у тюркському світі початку XX ст. — і Крим у його центрі.'
  - 'Гаспринський (Гаспирали) як попередник: «Тарджуман» і ідея паспільноти тюркських народів через мову.'
  - 'Молоде покоління після Гаспринського: де Челебіджіхан і Чобан-Заде продовжують і де ідуть власним шляхом.'
- section: 'Аналіз: Поетична спадщина — між іслямом і модернізмом'
  words: 700
  points:
  - 'Ліричний корпус Челебіджіхана: вірші між класичною газелллю і новою суспільною поезією.'
  - '"Ант" («Клятва»): найвідоміший вірш як маніфест кримськотатарської ідентичності і гідності.'
  - 'Релігійна і суспільна тематика в єдиному голосі: де мечеть і де площа, і чи є між ними суперечність?'
- section: 'Аналіз: Політичні тексти і державна риторика'
  words: 700
  points:
  - 'Конституція Крим-Курултай 1917 р.: Челебіджіхан як автор і ідеолог державної документації.'
  - '"Декларація прав кримськотатарського народу": юридична риторика як продовження поетичного проекту.'
  - 'Промови і публіцистика: де Челебіджіхан говорить не як поет, а як народний лідер — і де ці ролі зливаються.'
- section: 'Аналіз: «Ант» — детальний текстовий аналіз'
  words: 600
  points:
  - 'Мова і структура «Анта»: що вірш говорить безпосередньо і що стоїть за образами.'
  - '"Клятва" як жанр: від племінної присяги до національного маніфесту — тяглість і трансформація.'
  - 'Сучасні виконання «Анта»: де вірш живе у культурній пам''яті кримськотатарського народу після депортації.'
- section: 'Стилістика: Між аруз і силабікою'
  words: 500
  points:
  - 'Класична кримськотатарська версифікація: аруз (арабо-перська метрична система) і її трансформація у Челебіджіхана.'
  - 'Вплив нової тюркської поезії початку XX ст. (Намик Кемаль, Тевфік Фікрет) на стиль Челебіджіхана.'
  - 'Мова текстів: кримськотатарська між арабськими запозиченнями і народним словом — і куди рухається ця мова.'
- section: 'Деколонізаційна перспектива: Перший парламент і право на самовизначення'
  words: 500
  points:
  - 'Курултай 1917 р. і Центральна Рада 1917 р.: паралельні процеси у двох колонізованих народів на тій самій землі.'
  - 'Жорстокість більшовицького придушення і замовчування: Челебіджіхан замінений у совєтській пам''яті «зрадником».'
  - 'Повернення 1990-х і збереження пам''яті: де ім''я Челебіджіхана є сьогодні і де ще потребує відновлення.'
- section: 'Підсумок: Спадщина Поета-Державця'
  words: 500
  points:
  - Челебіджіхан і сучасні кримськотатарські поети: де живе його вплив і де він є свідомою точкою відліку.
  - 'Паралель між 1917–1918 і 2014–2024: анексія і опір — де «Ант» читається по-новому у вигнанні.'
  - Питання до читача: що означає писати і правити одночасно — і що ці ролі роблять одна з одною?
