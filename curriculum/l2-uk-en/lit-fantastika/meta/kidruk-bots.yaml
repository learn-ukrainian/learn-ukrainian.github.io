slug: kidruk-bots
title: "«Боти»: Штучний Інтелект і Людяність у Прозі Макса Кідрука"
word_target: 5000
content_outline:
  - section: 'Вступ: Феномен українського технотрилера'
    words: 500
    points:
      - 'Стан українського книжкового ринку до 2012 року: дефіцит вітчизняної жанрової
        літератури'
      - 'Визначення технотрилера: поєднання динамічного сюжету та глибокої наукової
        деталізації'
      - Значення виходу роману «Бот» для формування масової читацької аудиторії в
        Україні
  - section: Життєвий та творчий шлях Макса Кідрука
    words: 450
    points:
      - 'Від тревелогів до фантастики: еволюція автора та використання досвіду подорожей'
      - 'Професійний підхід до письменництва: дедлайни, ресерч, наукові консультації'
      - Створення власного бренду та комунікація з читачами як нова модель для укрліт
  - section: '«Бот: Атакамський синдром»: Сюжет та наукове підґрунтя'
    words: 600
    points:
      - 'Зав''язка сюжету: таємна лабораторія в чилійській пустелі Атакама'
      - 'Концепція наноботів: механізм впливу на людський мозок (фрактали, програмування)'
      - Тимур Коршак та його роль в ліквідації наслідків експерименту
  - section: Нанотехнології та етичні дилеми у першій книзі
    words: 550
    points:
      - Межа між науковим прогресом і небезпекою для людства
      - Проблема неконтрольованої еволюції штучного інтелекту/наноорганізмів
      - 'Ціна наукового відкриття: моральний вибір між збереженням даних та життями
        людей'
  - section: '«Бот: Ґуаякільський парадокс»: Еволюція конфлікту'
    words: 550
    points:
      - 'Масштабування загрози: перенесення дії з ізольованої лабораторії до мегаполіса
        Ґуаякіль'
      - Мутація технології та нові виклики для головного героя
      - Розвиток характеру Тимура Коршака під тиском глобальної відповідальності
  - section: Наукова достовірність як художній прийом
    words: 450
    points:
      - Інтеграція реальних наукових фактів з нейрофізіології, програмування та фізики
      - Використання ілюстрацій, схем та графіків у тексті роману для посилення імерсивності
      - Баланс між науковою точністю та доступністю для масового читача
  - section: Динаміка сюжету та кінематографічність наративу
    words: 450
    points:
      - 'Структура тексту: короткі динамічні сцени, використання кліфгенгерів'
      - Візуальна виразність описів та вплив сучасної екранної культури на стиль автора
      - 'Мова роману: поєднання технічного жаргону, розмовної лексики та наукового
        стилю'
  - section: 'Деколонізаційна перспектива: Український герой у глобальному вимірі'
    words: 500
    points:
      - Подолання постколоніального синдрому маргінальності українця
      - 'Тимур Коршак як глобальний професіонал: рівність у міжнародній команді експертів'
      - 'Проактивність і суб''єктність: український герой вирішує світову проблему,
        а не є пасивною жертвою'
  - section: Руйнування імперських міфів через масову культуру
    words: 500
    points:
      - Спростування міфу про нездатність української літератури творити сучасні світові
        сюжети
      - 'Емансипація жанрової літератури: україномовний контент як престижний та конкурентоздатний'
      - Важливість якісної популярної літератури для зміцнення національної ідентичності
        молодого покоління
  - section: Вплив серії «Бот» на сучасну літературу (Підсумок)
    words: 450
    points:
      - Комерційний успіх романів як стимул для розвитку вітчизняного книговидання
      - Вплив Кідрука на наступне покоління українських авторів фантастики та трилерів
      - Формування нових стандартів роботи автора з текстом та аудиторією в Україні
