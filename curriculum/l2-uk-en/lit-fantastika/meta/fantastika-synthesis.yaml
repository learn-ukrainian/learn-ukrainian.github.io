slug: fantastika-synthesis
title: 'Синтез: Простір уяви'
word_target: 5000
content_outline:
  - section: 'Діахронний аналіз: I — Еволюція архетипів'
    words: 500
    points:
      - Трансформація українських міфологічних та фольклорних архетипів у науковій
        фантастиці та фентезі.
      - Від демонології та козацького міфу до модерністських утопій («Сонячна машина»
        Винниченка).
  - section: 'Діахронний аналіз: II — Літературний діалог поколінь'
    words: 500
    points:
      - Діалог між розстріляним відродженням, шістдесятниками (химерна проза) та сучасними
        українськими фантастами.
      - Переосмислення спадщини попередників та відмова від радянського жанрового
        канону.
  - section: 'Деколонізаційна оптика: I — Стратегії інтелектуального опору'
    words: 500
    points:
      - Фантастика як «безпечна гавань» для інакомислення та дисидентських ідей.
      - Езопівська мова, алегоричні паралельні світи та антитоталітарний пафос (на
        прикладі О. Бердника).
  - section: 'Деколонізаційна оптика: II — Деконструкція імперського наративу'
    words: 500
    points:
      - Спростування міфу про провінційність української фантастики.
      - Створення масштабних космогоній та альтернативних історій, де Україна є суб'єктом
        глобальних процесів.
  - section: 'Стилістичний калейдоскоп: I — Авторські техніки та експерименти'
    words: 500
    points:
      - Порівняльний аналіз мови В. Винниченка та поетичної стилістики авторів «химерної
        прози».
      - Використання філософського та езотеричного словника у космічній фантастиці.
  - section: 'Стилістичний калейдоскоп: II — Трансформація літературної мови'
    words: 500
    points:
      - 'Збагачення української мови через потреби фантастичного жанру: творення неологізмів
        та термінології.'
      - Модернізація архаїзмів для конструювання унікальних фентезійних світів.
  - section: 'Філософія ідентичності: I — Образ українського суб''єкта'
    words: 500
    points:
      - 'Еволюція українського героя: від жертви історичних обставин до творця нових
        світів.'
      - Здобуття агентності через вихід за межі геополітичних обмежень у простір вільної
        уяви.
  - section: 'Філософія ідентичності: II — Формування національної етики'
    words: 500
    points:
      - Простір фантастичного як майданчик для розв'язання складних морально-етичних
        дилем.
      - Вибір між свободою і безпекою, відповідальність творця та формування українського
        ціннісного стрижня.
  - section: 'Спадщина: I — Вплив на сучасний літературний процес'
    words: 500
    points:
      - Інтеграція елементів химерного та фантастичного у сучасний український мейнстрім.
      - Стирання жорстких меж між «високою полицею» інтелектуальної прози та жанровою
        фантастикою.
  - section: 'Спадщина: II — Значення канону для інтелектуальної безпеки'
    words: 500
    points:
      - Фантастика як потужний інструмент візуалізації та програмування власного майбутнього.
      - Вразливість нації без власних візій майбутнього та роль жанру у формуванні
        інтелектуального суверенітету.
