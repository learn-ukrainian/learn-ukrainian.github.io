  - 'Синтез жанрів: соціально-утопічний + науково-фантастичний + детективний + філософський
    + авантюрний'
- section: 'Аналіз ключових творів: II — Образна система'
  words: 500
  points:
  - Рудольф Штор — ідеаліст-винахідник, що мирним шляхом хоче звільнити людство
  - Принцеса Еліза — «гострий розум, сильна воля», девіз «Життя — це боротьба»
  - Фрідріх Мертенс — фінансовий магнат, що трансформується в рятівника через кохання
  - Макс Штор — революціонер-скептик, контраст до ідеаліста-брата
  - 'Карикатурність ІНАРАКівців: революційна патетика vs людські слабкості'
- section: 'Аналіз ключових творів: III — Утопія чи антиутопія?'
  words: 450
  points:
  - 'Еволюція критичних оцінок: від «утопії» (Білецький, 1929) до «антиутопії» (сучасники)'
