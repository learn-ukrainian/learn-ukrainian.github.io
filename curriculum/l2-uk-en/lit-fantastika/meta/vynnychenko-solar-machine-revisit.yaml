  - 'Нечуваний читацький успіх: 3 перевидання за 2 роки, черги в бібліотеках, диспути'
- section: 'Аналіз ключових творів: I — Сюжет і жанрова своєрідність'
  words: 500
  points:
  - 'Дві паралельні сюжетні лінії: боротьба за сонячну машину + кохання Елізи й Рудольфа'
  - Геліоніт і «сонячний хліб» — науково-фантастичний елемент визволення від праці
  - Організація ІНАРАК — терористичне поширення винаходу → колапс цивілізації
  - 'Жанрова дискусія: Білецький — утопія, Костюк — науково-утопійний роман, сучасники
