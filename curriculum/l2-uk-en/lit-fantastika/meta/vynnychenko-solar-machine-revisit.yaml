  - Суб'єктивована оповідь і фрагментарна сюжетобудова
  - Модерністська система образів із посиленою експресивністю
  - Паралель з німецькими експресіоністами — незалежне зближення
  - Проміжне явище між класичним і пост-експресіонізмом
