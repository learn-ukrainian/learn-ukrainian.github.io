slug: arenev-soul-traps
title: Arenev Soul Traps
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Володимир Арєнєв і сучасна фантастика'
    words: 500
    points:
      - 'Біографічна довідка: народження у 1978 році, ранні кроки у літературі'
      - 'Еволюція творчості: свідомий перехід до української мови як культурна позиція'
      - Місце письменника в сучасній підлітковій літературі та формування нового канону
  - section: 'Вступ та контекст: II — Світове визнання та контекст епохи'
    words: 500
    points:
      - 'Перемога на Євроконі-2014 в Дубліні: визнання найкращим європейським автором
        для підлітків'
      - 'Передчуття війни: як «Душниця» (2013) резонує із суспільною травмою сьогодення'
      - Вплив інституцій (зокрема порталу BaraBooka) на рецепцію та популяризацію
        твору
  - section: 'Аналіз ключових творів: I — Світобудова повісті «Душниця»'
    words: 650
    points:
      - 'Концепція світу: зберігання душ померлих у повітряних кульках'
      - 'Урбаністичний пейзаж: органічне поєднання буденних технологій (мобілки) з
        містичним'
      - Метафора «Душниці» (сховища) як інституціоналізованої та комерціалізованої
        пам'яті суспільства
  - section: 'Аналіз ключових творів: II — Проблематика смерті та пам''яті'
    words: 600
    points:
      - 'Детальний розбір ставлення суспільства до померлих: від поваги до тягаря'
      - 'Зв''язок між живими та мертвими: етична дилема штучного утримання душ'
      - Глибокий психологізм переживання втрати головним героєм (Сашком Турухтуном)
  - section: 'Аналіз ключових творів: III — Проблема вибору та дорослішання'
    words: 500
    points:
      - Ініціація головного героя через стикання з відповідальністю за життя та смерть
      - 'Вибір Сашка: відпустити душу дідуся (свобода) чи залишити її заради власного
        комфорту'
      - Дидактичний вимір тексту без прямого радянського моралізаторства
  - section: 'Стилістика та мова автора: I — Жанровий синкретизм'
    words: 500
    points:
      - Майстерне поєднання елементів міського фентезі, соціальної антиутопії та роману
        виховання
      - 'Атмосферність тексту: помірна похмурість як засіб посилення психологічного
        напруження'
      - 'Багатошаровість смислів: текст формально для підлітків, що порушує дорослі
        екзистенційні питання'
  - section: 'Стилістика та мова автора: II — Мова та діалогічність'
    words: 500
    points:
      - Жива, автентична мова підлітків без штучного архаїзування чи надмірного сленгу
      - 'Функціональність діалогів: цитата про те, що ''душі перші дев''ять днів не
        розмовляють'''
      - Використання іронії та гіркого гумору як захисного механізму персонажів
  - section: 'Деколонізаційна перспектива: Як цей автор руйнує імперські міфи'
    words: 500
    points:
      - Спростування міфу про вторинність української фантастики щодо російської літературної
        метрополії
      - Успішне створення якісного конкурентоспроможного комерційного продукту українською
        мовою
      - Відмова від кліше радянської дитячої літератури, що уникала розмов про смерть
        і травму
  - section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
    words: 500
    points:
      - 'Суб''єктність через деміургію: український автор як самостійний творець унікальних
        світів'
      - Мовний вибір Арєнєва як чіткий політичний та культурний акт емансипації
      - Трансляція українського культурного коду в універсальній формі, зрозумілій
        європейському читачеві
  - section: 'Підсумок та вплив: Значення для сучасної літератури'
    words: 250
    points:
      - Масштабний вплив «Душниці» на розвиток сучасної української підліткової прози
        (Young Adult)
      - Роль Арєнєва не лише як письменника, але й як критика та популяризатора читання
      - 'Висновок: закріплення позицій української фантастики на європейському літературному
        ландшафті'
