slug: kidruk-colony
title: Kidruk Colony
word_target: 4000
content_outline:
- section: 'Вступ: Макс Кідрук і феномен «Нових Темних Віків»'
  words: 450
  points:
  - Еволюція творчості Макса Кідрука від тревелогів до масштабної наукової фантастики.
  - Заснування власного видавництва «Бородатий Тамарин» в умовах повномасштабного
    вторгнення (2022).
  - 'Концепція «Нових Темних Віків»: скептичний погляд на технологічний прогрес людства.'
- section: 'Вступ: Жанрова специфіка роману «Колонія»'
  words: 400
  points:
  - Характеристика роману як твердої наукової фантастики (hard SF) з елементами соціального
    технотрилера.
  - 'Складність світобудови (world-building): використання інфографіки, карт, деталізації.'
- section: 'Аналіз ключових творів: Земля у 2141 році та пандемія'
  words: 450
  points:
  - Земля майбутнього, що оговтується після глобальних катастроф і війн.
  - Виникнення вірусу «клодіс», який цілеспрямовано вражає вагітних жінок.
  - Демографічна криза як тло для соціальних катаклізмів.
- section: 'Аналіз ключових творів: Марс і нова соціальна стратифікація'
  words: 500
  points:
  - Структура марсіанської колонії з населенням понад сто тисяч осіб.
  - Дискримінація «марсіан» (народжених на планеті) і використання їх як дешевої робочої
    сили.
  - 'Висновок автора: перетворення на двопланетний вид не звільняє людство від його
    фундаментальних вад і схильності до експлуатації.'
- section: 'Стилістика та мова автора: Наукова достовірність'
  words: 450
  points:
  - 'Прискіплива увага до наукових фактів: від орбітальної механіки до генетики.'
  - Інтеграція таблиць та схем безпосередньо в тканину літературного тексту.
  - 'Лексичний інструментарій: адаптація наукового сленгу в українську мову.'
- section: 'Стилістика та мова автора: Архітектура багатолінійного сюжету'
  words: 400
  points:
  - 'Кінематографічність оповіді: паралельне ведення сюжетних ліній на двох планетах.'
  - Саспенс та ритміка об'ємного тексту (понад 900 сторінок).
- section: 'Деколонізаційна перспектива: Українська суб''єктність на Марсі'
  words: 450
  points:
  - Потужна роль української діаспори у політиці та економіці Марса (агрохолдинг «Томуто»).
  - Українці як впливові геополітичні суб'єкти майбутнього, а не маргіналізовані персонажі.
- section: 'Деколонізаційна перспектива: Подолання імперських міфів'
  words: 450
  points:
  - 'Рефлексія на російсько-українську війну: роман описує світ після «чергової війни
    з Росією».'
  - Руйнування радянського/імперського монопольного міфу про підкорення космосу.
  - Демонстрація повноцінної, деколонізованої української футурології.
- section: 'Підсумок: Культурний феномен та комерційний успіх'
  words: 450
  points:
  - Рекордні продажі для українського книжкового ринку (61 000+ примірників).
  - Створення навколо роману потужної фан-спільноти.
  - Значення роману для виведення українського сай-фаю на міжнародний рівень (переклади
    у Словаччині, Польщі, Угорщині).
