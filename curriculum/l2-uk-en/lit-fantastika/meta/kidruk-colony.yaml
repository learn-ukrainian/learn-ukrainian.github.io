slug: kidruk-colony
title: Kidruk Colony
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Макс Кідрук і феномен «Нових Темних Віків»'
    words: 650
    points:
      - Еволюція творчості Макса Кідрука та заснування видавництва «Бородатий Тамарин»
        у 2022 році на тлі повномасштабного вторгнення.
      - 'Концептуальна ідея серії: технологічний прогрес не вирішує фундаментальних
        людських проблем, а людська природа залишається незмінною.'
      - Похмурий, скептичний світогляд автора, продиктований реальними глобальними
        кризами та війною.
  - section: 'Вступ та контекст: II — Жанрова специфіка роману «Колонія»'
    words: 550
    points:
      - Позиціонування роману як представника жорсткої наукової фантастики (hard SF)
        з елементами масштабного технотрилера.
      - Обсяг понад 900 сторінок та глибокий, скрупульозний підхід до конструювання
        світу (world-building).
      - Руйнування міфу про виключно «сільську» чи фольклорну спрямованість української
        літератури через створення амбітного космосу.
  - section: 'Аналіз ключових творів: I — Земля у 2141 році та пандемія'
    words: 550
    points:
      - 'Хронологія та бекграунд 2141 року: Земля після руйнівних війн, зокрема чергової
        війни з Росією, та глобальної кризи.'
      - Пандемія вірусу «клодіс», що вражає вагітних жінок, як ключовий каталізатор
        демографічних і соціальних зрушень.
      - Статус Землі як метрополії, яка намагається утримати контроль, але поступово
        втрачає його над позаземними колоніями.
  - section: 'Аналіз ключових творів: II — Марс і нова соціальна стратифікація'
    words: 550
    points:
      - Устрій та життя марсіанської колонії, населення якої сягнуло 100 тисяч осіб.
      - Дискримінація людей, народжених на Марсі, соціальна напруга та передумови
        до масштабного марсіанського бунту.
      - 'Філософський аспект: перетворення людства на двопланетний вид і збільшення
        тривалості життя не ліквідували експлуатацію та рабську працю.'
  - section: 'Стилістика та мова автора: I — Наукова достовірність'
    words: 550
    points:
      - Інтеграція детальної інфографіки, карт, медичних та інженерних схем безпосередньо
        у художній текст.
      - Скрупульозний та точний опис орбітальної механіки, генетичних мутацій та медичних
        процедур.
      - Органічне поєднання складних наукових та технологічних концепцій із динамічним,
        захопливим наративом.
  - section: 'Стилістика та мова автора: II — Архітектура багатолінійного сюжету'
    words: 550
    points:
      - 'Масштабна архітектура роману: паралельний розвиток численних сюжетних ліній
        на Землі та на Марсі.'
      - Майстерне керування читацькою увагою, створення саспенсу та складна ритміка
        великого тексту.
      - 'Мовні інновації: створення специфічних неологізмів для опису марсіанського
        суспільства та реалій 22-го століття.'
  - section: 'Деколонізаційна перспектива: I — Українська суб''єктність на Марсі'
    words: 550
    points:
      - Зображення потужного впливу української діаспори на політику та економіку
        Марса (на прикладі агрохолдингу «Томуто»).
      - Українці фігурують не як пасивні спостерігачі, а як могутні геополітичні гравці
        з власною суб'єктністю.
      - Моделювання України майбутнього як самостійного та впливового учасника міжпланетних
        процесів.
  - section: 'Деколонізаційна перспектива: II — Подолання імперських міфів'
    words: 550
    points:
      - Деконструкція російськоцентричного погляду на освоєння космосу, притаманного
        радянській та пострадянській фантастиці.
      - Світ майбутнього, де Росія згадується в контексті «чергової війни», а майбутнє
        формується без її гегемонії.
      - Поява українського жорсткого сай-фаю, що позбавлений комплексу меншовартості
        та не є вторинним наслідуванням.
  - section: 'Підсумок та спадщина: Культурний феномен «Колонії»'
    words: 500
    points:
      - Безпрецедентний комерційний успіх на українському ринку (понад 61 тисяча проданих
        примірників станом на 2025 рік) в умовах війни.
      - Подолання стереотипів щодо «нечитабельності» об'ємних жанрових романів (900
        сторінок) українською аудиторією.
      - Значний вплив на розвиток української фантастики та успішна експансія на міжнародні
        ринки через переклади.
