slug: korniy-chimaeras
title: Korniy Chimaeras
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Життєвий шлях Дари Корній'
    words: 500
    points:
      - Походження Мирослави Замойської (Волинь) та формування раннього світогляду.
      - Історія виникнення псевдоніма «Дара Корній».
      - Трансформація від спостерігачки сільських легенд до провідної авторки міського
        фентезі.
  - section: 'Вступ та контекст: II — Джерела натхнення та фольклорне тло'
    words: 500
    points:
      - Опора на автентичні волинські та карпатські перекази.
      - Роль етнографічних досліджень у формуванні письменницької бази.
      - Дохристиянські вірування як фундамент для побудови нових літературних світів.
  - section: 'Аналіз ключових творів: I — «Гонихмарник»'
    words: 600
    points:
      - 'Мотивація до написання: створення української альтернативи західним фентезі-сагам.'
      - Аналіз міфу про дводушника та його адаптація до сучасних реалій.
      - Взаємопроникнення містики та повсякденності в сюжеті роману.
  - section: 'Аналіз ключових творів: II — Цикл «Зворотний бік»'
    words: 600
    points:
      - Розбудова авторської космології та конфлікту між Світлом і Темрявою.
      - Реінтерпретація праукраїнських божеств (Стрибог, Марена) як дійових осіб фентезі.
      - Відхід від полярного (чорно-білого) трактування моралі в межах язичницької
        парадигми.
  - section: 'Аналіз ключових творів: III — Енциклопедія «Чарівні істоти українського
      міфу»'
    words: 600
    points:
      - 'Мета проєкту: систематизація бестіарію та повернення забутих духів у культуру.'
      - 'Аналіз класифікації істот: духи природи, духи-шкідники, домашні духи.'
      - Значення серії для популяризації етнографії серед масового читача.
  - section: 'Стилістика та мова автора: I — Жанрова специфіка'
    words: 500
    points:
      - 'Прийом «двосвіття»: баланс між магічним виміром і буденністю.'
      - Поєднання елементів містичного трилера, казки та психологічної драми.
      - Наративні стратегії створення напруги та емоційного залучення читача.
  - section: 'Стилістика та мова автора: II — Мовний колорит'
    words: 500
    points:
      - Збагачення літературної мови автентичною лексикою та діалектизмами.
      - Використання фольклорних формул і замовлянь як стилістичного інструменту.
      - Функція архаїзмів у конструюванні магічної атмосфери тексту.
  - section: 'Деколонізаційна перспектива: I — Як автор руйнує імперські міфи'
    words: 500
    points:
      - Спростування радянського підходу до української демонології як до «комічної»
        та «примітивної».
      - Повернення українським міфічним істотам грізності, величі та масштабу.
      - Звільнення пантеону від меншовартості через призму повноцінного фентезійного
        епосу.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
    words: 500
    points:
      - Перенесення фольклорних сюжетів у сучасний український урбаністичний простір.
      - Осмислення українського міста (напр. Львова) як самодостатньої арени для містичних
        подій.
      - Герої як носії міцної національної ідентичності, що черпають силу з рідної
        землі.
  - section: Підсумок та вплив
    words: 250
    points:
      - Роль Дари Корній у формуванні вітчизняного ринку підліткового та міського
        фентезі.
      - Вплив її бестіарію на художників, ігрову індустрію та інших письменників.
      - Перспективи подальшого відкриття міфологічного «материка» в літературі.
