slug: kvitka-dead-mans-easter
title: Kvitka Dead Mans Easter
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Квітка і народження української фантастики'
    words: 600
    points:
      - Григорій Квітка-Основ'яненко (1778–1843) — засновник нової української художньої
        прози, а не просто 'малоросійський' гуморист
      - '1833 рік — annus mirabilis: три фантастичні твори за один рік (''Мертвецький
        Великдень'', ''Конотопська відьма'', ''От тобі і скарб'')'
      - 'Перша збірка ''Малоросійських повістей'' (1834): три грані одного автора
        — сентиментальне, побутове, фантастичне'
      - 'Біографічний контекст: дворянин, директор театру, послушник монастиря (1804–1805)
        — звідки глибоке знання церковного побуту'
  - section: 'Сюжет та композиція: Від побуту до потойбіччя'
    words: 550
    points:
      - 'Фольклорне джерело: Квітка визначав твір як ''легенду, місцевий розповід,
        щорічне нагадування в сім''ї'''
      - 'Сюжетна схема: побутова експозиція → фантастична кульмінація → раціональна
        розв''язка → моральний підсумок'
      - 'Оповідна рамка: наратор Гриц''ко Основ''яненко — ''мудрий, іронічний й проникливий''
        посередник'
      - 'Великодня ніч як хронотоп: перехідний час між світами живих і мертвих'
  - section: 'Читання: I — Образ Нечипора та побутовий реалізм'
    words: 550
    points:
      - 'Нечипір — ''злодіяка такий, що ні з чим не розминеться'': п''яниця-ледар
        як тип'
      - 'Дружина Приська як антагоніст і рушій моральної трансформації: ''Побожусь
        тобі, що такими товчениками тебе нагодую!'''
      - 'Гастрономічний код: вареники з масличком і сметанкою, великодні страви —
        їжа як маркер ідентичності'
      - 'Конфлікт побутового і духовного: замість говіння — пияцтво'
  - section: 'Читання: II — Фантастичне та потойбіччя'
    words: 600
    points:
      - '''Куди не гляне, усе мертвеці'' — мотив ''мертвої літургії'' з української
        народної демонології'
      - 'Індивідуалізація мертвих: ''Пан Олексій, що ще вмер тогди, як я ще підпарубочим
        був'''
      - Нечипір як дяк серед мертвих — інверсія соціальних ролей, карнавальний мотив
      - '''Аж тут півень кукурікну — і розсипалися мерці'': крик півня як давній слов''янський
        апотропей'
      - 'Амбівалентність фантастичного: раціональне пояснення (сон) і надприродне
        співіснують'
  - section: 'Стилістика та мова автора: I — Наративна техніка'
    words: 500
    points:
      - 'Оповідна маска Гриц''ка Основ''яненка: наратор-посередник між дворянином-автором
        і народним матеріалом'
      - 'Ритм усного оповідання: речення-періоди, вставні коментарі, діалогічність'
      - 'Гумор як іронічна дистанція: автор одночасно сміється з героя і співчуває
        йому'
      - Живий слобожанський говір як свідомий естетичний вибір
  - section: 'Стилістика та мова автора: II — Гастрономічна та побутова деталь'
    words: 400
    points:
      - Детальні описи їжі як спосіб передати матеріальність народного побуту
      - 'Гастрономічний код: їжа як маркер свята, посту, соціального статусу'
      - '''Замість говіння Великдень справляють!'' — іронія обрядового порушення'
      - 'Порівняння з гоголівськими описами їжі: спільне джерело (український побут),
        різний функціонал'
  - section: 'Деколонізаційна перспектива: I — Квітка проти Гоголя'
    words: 550
    points:
      - 'Дзеркальні фігури: обидва з українського дворянства, обидва використовують
        фольклор — але різні мови, різна аудиторія'
      - Гоголь транспонує українську нечисть для петербурзького читача російською;
        Квітка пише для українського читача українською
      - 'П''єса ''Приїзжий із столиці'' (1827) — за 10 років до ''Ревізора'' (1837):
        колоніальна інверсія пріоритету'
      - '''Повісті Квітки не є українською варіацією Вечорів — зовні схожі, а по суті
        різні'' (Білецький)'
  - section: 'Деколонізаційна перспектива: II — Мова як опір'
    words: 500
    points:
      - Квітка 'подолав стереотипи, що обмежували функціонування української мови
        сферою бурлеску' (НБУВ)
      - 'Радянська редукція: ''Мертвецький Великдень'' = моральна байка проти пияцтва.
        Реальність: зразок фольклорної фантастики'
      - 'Українська суб''єктність у тексті: автор, оповідач, персонажі, читач — усі
        українці'
      - Мова як політичний акт в умовах Російської імперії 1830-х років
  - section: 'Порівняльний контекст: Фольклорна фантастика Європи та України'
    words: 350
    points:
      - Європейський готичний роман (Радкліфф, Гофман) vs українська фольклорна фантастика
      - 'Своєрідність Квітки: фантастичне у комічному трактуванні (не романтичному,
        як у Гоголя)'
      - 'Народна демонологія як джерело: мертва літургія, апотропеї, порогові часи'
  - section: Спадщина та значення для жанру
    words: 500
    points:
      - 'Квітка → Стороженко → Коцюбинський → Винниченко → сучасна фантастика: ланцюг,
        що починається з ''Мертвецького Великодня'''
      - 'Шевченко визнавав Квітку як попередника: вірш ''До Основ''яненка'', листування'
      - Вулиці, пам'ятники, ювілейна монета НБУ (2008) — але недооцінка фантастичного
        аспекту спадщини
      - 'Контекст треку: ''Мертвецький Великдень'' як вихідна точка lit-fantastika,
        від готики до кіберпанку'
