slug: antonych-pagan-myth
title: Antonych Pagan Myth
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Формування світогляду'
  words: 400
  points:
  - 'Біографічний контекст: студентські роки у Львові та свідомий вибір української
    ідентичності.'
  - Вплив європейського авангарду на формування модерного бачення світу.
  - Звернення до архаїки як пошук непохитної основи для мистецтва в епоху політичної
    турбулентності.
- section: 'Вступ та контекст: II — Лемківський вимір та фольклор'
  words: 400
  points:
  - Лемківщина як міфопоетичний центр всесвіту Антонича.
  - Використання місцевих легенд, казок та повір'їв як будівельного матеріалу для
    поезії.
  - Перетворення локального етнографічного матеріалу на універсальні філософські символи.
- section: 'Аналіз ключових творів: I — «Три перстені» та природна магія'
  words: 400
  points:
  - Аналіз збірки «Три перстені» як кристалізації авторського стилю.
  - Концепція живої, одухотвореної природи; анімалістичні та фітоморфні образи.
  - Знищення межі між людиною та довкіллям як прояв пантеїстичного світовідчуття.
- section: 'Аналіз ключових творів: II — «Зелена Євангелія» та новий міф'
  words: 450
  points:
  - 'Розбір маніфесту поета: «Я — закоханий в життя поганин».'
  - 'Віталізм збірки: ствердження радості земного, фізичного існування.'
  - Поганство Антонича як оптимістична філософія, а не примітивне язичництво.
- section: 'Аналіз ключових творів: III — Філософія матерії у «Книзі Лева»'
  words: 400
  points:
  - Еволюція міфу від природи до макрокосму у збірці «Книга Лева».
  - Дослідження концепції незнищенності матерії та кругообігу життя і смерті.
  - Смерть як повернення у великий космічний котел матерії; сприйняття Землі як «космічного
    звіра».
- section: 'Стилістика та мова автора: I — Образність і міфотворення'
  words: 400
  points:
  - 'Новаторство поетичної мови: сюрреалістичні образи та несподівані метафори (напр.,
    «хрущі на вишнях» у новому контексті).'
  - Конструювання власного міфу для подолання сухого раціоналізму ХХ століття.
  - Динаміка та музичність мови Антонича.
- section: 'Стилістика та мова автора: II — Синтез поганства і християнства'
  words: 400
  points:
  - Унікальна гармонія архаїчних дохристиянських вірувань та християнської традиції.
  - 'Аналіз вірша «Різдво»: адаптація біблійного сюжету до українських (лемківських)
    реалій.'
  - Українське історичне двовір'я як джерело високої поезії.
- section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
  words: 400
  points:
  - Деконструкція радянського міфу про Антонича як «аполітичного пейзажиста» або «буржуазного
    формаліста».
  - Протистояння соцреалізму через створення еко-центричного, містичного мистецтва.
  - Повернення Антонича в український канон як спротив системі.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
  words: 400
  points:
  - Ліричний герой Антонича як активний творець, центр всесвіту, а не пасивна жертва
    обставин.
  - Лемківщина як самодостатній український космос, а не периферія чужих імперій.
  - Утвердження повноцінного європейського голосу через глибоко національну форму.
- section: 'Підсумок та спадщина: Рецепція та вплив'
  words: 350
  points:
  - Заборона творчості поета в СРСР та його збереження в еміграції.
  - Відкриття Антонича шістдесятниками (І. Драч, В. Симоненко) та вплив на Київську
    школу поезії.
  - Присутність міфу Антонича в сучасній українській культурі (музика, література,
    мистецтво).
