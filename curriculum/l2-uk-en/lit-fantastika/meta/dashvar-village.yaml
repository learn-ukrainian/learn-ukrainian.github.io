slug: dashvar-village
title: Dashvar Village
word_target: 5000
content_outline:
  - section: 'Вступ: Феномен Люко Дашвар'
    words: 500
    points:
      - 'Біографічна довідка: прихід Ірини Чернової в літературу у зрілому віці.'
      - Рекордні тиражі (понад 500 тисяч примірників) як доказ формування повноцінного
        національного книжкового ринку.
      - Запит суспільства на власну гостросюжетну прозу як альтернативу російському
        маскульту.
  - section: 'Контекст: Українське село у XXI столітті'
    words: 500
    points:
      - 'Соціально-економічне тло романів: маргіналізація провінції, трудова міграція,
        безробіття.'
      - Перехід від аграрної ідилії до депресивного постіндустріального ландшафту.
      - Село як замкнута екосистема зі своїми жорстокими законами виживання.
  - section: 'Аналіз: Роман «Село не люди»'
    words: 550
    points:
      - 'Сюжетна основа: історія 13-річної Катерини та її зіткнення з лицемірством
        дорослих.'
      - Феномен віктімблеймінгу (звинувачення жертви) з боку сільської громади.
      - Провокативність тем як каталізатор суспільної дискусії про межі дозволеного
        в укрліті.
  - section: 'Аналіз: «Молоко з кров''ю» та розвиток теми'
    words: 550
    points:
      - 'Розширення хронотопу: перенесення акцентів на міську та провінційну інтелігенцію,
        збереження «сільського» менталітету.'
      - Мотиви фатальної пристрасті, родинних проклять та таємниць.
      - 'Характеристика персонажів: відсутність абсолютно позитивних героїв.'
  - section: 'Стилістика: Гротеск та шок-контент'
    words: 500
    points:
      - Використання натуралізму, фізіологізму та шокових сцен для емоційного впливу.
      - 'Естетика потворного: чому критики звинувачували авторку в «чорнусі».'
      - 'Динаміка сюжету: кліфгенгери та телевізійні (сценарні) прийоми утримання
        уваги.'
  - section: 'Мова автора: Суржик як інструмент гіперреалізму'
    words: 500
    points:
      - 'Специфіка діалогів: свідома відмова від літературної норми.'
      - 'Функція суржику: маркування соціального статусу та психологічного стану персонажів.'
      - Контраст між авторською мовою (наративом) та репліками героїв.
  - section: 'Деколонізація: Руйнування імперського міфу'
    words: 500
    points:
      - Деконструкція радянського наративу про «щасливе колгоспне село».
      - Злам російсько-імперського стереотипу про ідеалізовану, комічну «Малоросію».
      - Село Дашвар як постколоніальний простір, що несе на собі шрами Голодомору
        та колективізації.
  - section: 'Деколонізація: Жіноча суб''єктність та травма'
    words: 500
    points:
      - 'Українська жінка в прозі Дашвар: жертва обставин чи активна дієвиця?'
      - Репрезентація жіночої тілесності, травми та подолання патріархального тиску.
      - 'Суб''єктність через страждання: як героїні виборюють своє право на існування.'
  - section: 'Підсумок: Масова література чи соціальний діагноз?'
    words: 450
    points:
      - Полеміка в академічних колах щодо літературної цінності творів Дашвар.
      - 'Виконання літературою функції соціального дзеркала: відображення прихованих
        страхів суспільства.'
      - Розмиття меж між масовою («низькою») та елітарною літературою.
  - section: 'Спадщина: Вплив на сучасний літпроцес'
    words: 450
    points:
      - Завоювання довіри українського читача до вітчизняного комерційного продукту.
      - Стимулювання розвитку жанрової прози (соціального трилера, мелодрами).
      - Внесок Люко Дашвар у формування економічно незалежного книговидавничого ринку
        України.
