slug: smolych-beautiful-catastrophes
title: Smolych Beautiful Catastrophes
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Смолич і народження української наукової фантастики'
    words: 600
    points:
      - 'Юрій Корнійович Смолич (1900–1976): від учительської родини в Умані через
        армію Петлюри до Харкова як культурної столиці'
      - 'Літературні організації як інтелектуальний тигель: «Гарт» (1923–25), ВАПЛІТЕ
        (1926–27), «Техно-мистецька група А» (1928–29)'
      - '«Техно-мистецька група А» — унікальне об''єднання літераторів та інженерів,
        ініційоване Йогансеном після саморозпуску ВАПЛІТЕ; гасло: «Немає на світі
        такої речі, що про неї не можна було б цікаво розповісти»'
      - '«Універсальний журнал» (1928–29): Смолич, Йогансен, Ковалів — платформа,
        де народилась українська НФ як жанр'
      - «Останній Ейджевуд» (1926) — перший великий фантастичний роман українською;
        непопулярний у влади через тему «світової революції»
  - section: 'Аналіз ключових творів: I — «Господарство доктора Гальванеску»'
    words: 650
    points:
      - 'Сюжет: Юлія Сахно, радянська дослідниця, відряджена Берлінською академією
        до Румунії; маєток Гальванеску ховає злочинні експерименти під виглядом «передових
        методів сільського господарства»'
      - 'Доктор Гальванеску як «божевільний учений»: хірургічне перетворення людей
        на роботів, позбавлення емоцій і здатності думати — «механізовані маріонетки»'
      - 'Жертви: збіднілі радянські емігранти, яким платять 1000 леїв за участь у
        злочинних експериментах'
      - 'Жанровий синтез: готичний горор + пригодницький роман + science fiction;
        погоні нічним бесарабським степом, перестрілки'
      - Паралель з «Островом доктора Моро» Веллса, але Смолич «заходить далі — його
        вівісектор зазіхає не лише на тіло людини, а й на її унікальну особистість»
      - 'Тематика міжвоєнної доби: євгеніка, соціальний дарвінізм, расова теорія —
        тривоги епохи, перенесені у фантастичний контекст'
  - section: 'Аналіз ключових творів: II — «Ще одна прекрасна катастрофа»'
    words: 500
    points:
      - Індійський учений Нен-Сагор здійснює епохальне медичне відкриття, що може
        «привести до зникнення медицини як такої»
      - Британська медична академія відкидає відкриття і виключає Нен-Сагора — алегорія
        імперського зневажання периферійної науки
      - 'Комісія з трьох британських «світил» і двоє радянських лікарів — нова розстановка
        сил: Індія, Британія, СРСР'
      - 'Антиколоніальний мотив: боротьба периферії за визнання — дзеркало українського
        досвіду'
      - 'Початок ідеологізації: радянські лікарі стають однозначно позитивними героями'
  - section: 'Аналіз ключових творів: III — «Що було потім» та деградація трилогії'
    words: 500
    points:
      - 'Третя частина (1934): Гальванеску сам стає об''єктом наукового експерименту
        — іронічна інверсія початкового сюжету'
      - 'Перехід від провокативного ставлення питань (частина 1) до дидактичної пропаганди:
        «радянські вчені перемагають елітистські претензії колективними зусиллями»'
      - 'Контекст 1934 року: рік після Голодомору, масові арешти, самогубство Хвильового
        — Смолич пише в атмосфері страху'
      - Після 1934 року Смолич назавжди припиняє писати фантастику — жанрова смерть
        як особистий символ епохи
      - 'Трилогія як документ: деградація літературної якості від першої до третьої
        частини віддзеркалює деградацію українського культурного середовища'
  - section: 'Стилістика та мова автора: I — Кінематографічність і пригодницький наратив'
    words: 500
    points:
      - 'Театральний досвід (1922–24) як основа: режисерська побудова сцен, динамічне
        монтажне чергування епізодів'
      - «Легка кінематографічна манера» — добре передає атмосферу міжвоєнної доби
      - «Написана жваво, захоплююче, читається з інтересом» — ритм пригодницького
        роману
      - Жіноча протагоністка Юлія Сахно — нетипова для української прози 1920-х; «плацкартний»
        радянський журналіст-слідчий
      - 'Географічна конкретність: Бесарабія, Румунія, Берлін — міжнародний масштаб,
        рідкісний для тогочасної української прози'
  - section: 'Стилістика та мова автора: II — Науковий дискурс та мовне новаторство'
    words: 400
    points:
      - «Чудове володіння словом, насичена, барвиста мова, енциклопедичні знання»
        — поєднання літературності з науковим дискурсом
      - 'Тематичний словник: анабіоз, трансплантація, консервація тканин, операції
        на серці — термінологія, яка у 1928 р. була фантастикою, а зараз — реальність'
      - Формування українськомовної наукової термінології в контексті художньої прози
      - 'Вплив «Техно-мистецької групи А»: інтеграція технічного і літературного дискурсу
        як естетична програма'
      - 'Зіставлення з Володимиром Владком: Смолич — «барвистий наратив», Владко —
        «технічний реалізм»'
  - section: 'Деколонізаційна перспектива: I — Жанрове знищення'
    words: 550
    points:
      - 'Радянський міф: «Смолич — патріарх української НФ, який добровільно залишив
        жанр». Реальність: система «невблаганно ламала найталановитіших»'
      - 1933 — Голодомор, самогубство Хвильового, арешт Ялового; 1934 — останній рік
        українського SF до кінця 1950-х
      - «Fantasy was prohibited at all» (SFE); «only few themes were allowed» під
        суворою цензурою
      - 'Знищення жанрової екосистеми: «Техно-мистецька група А» самоліквідована (1931),
        «Універсальний журнал» закритий (1929), ВАПЛІТЕ розпущена (1928)'
      - ~30 000 українських діячів культури репресовані в 1930-х — жанр НФ українською
        вбитий як побічна жертва
      - '«Патріарство» Смолича як симптом: він «патріарх» не тому, що найкращий, а
        тому, що інших знищили'
  - section: 'Деколонізаційна перспектива: II — Жертва і кат'
    words: 550
    points:
      - 'Агент «Стріла»: криптонім Смолича як інформатора НКВД (підтверджено дослідниками
        Микитенком і Тримбачем)'
      - Донос на Довженка (3 липня 1940) — «донос-шедевр» за точністю деталей і «тонким
        психологізмом»
      - 'Гончар у щоденниках: Смолич — «старий провокатор» і «Іудушка», який «вимагав
        виключення Ліни Костенко зі Спілки письменників під тиском КДБ»'
      - 'Біографічний «гак» вербування: служба в армії Петлюри; старший брат — денікінський
        емігрант — ідеальний компромат для НКВД'
      - Під час першого інфаркту (1962) «плакав перед друзями і проклинав Постишева»
        — людська ціна конформізму
      - 'Мемуари «Розповідь про неспокій» (1968–72) як спроба покаяння — і подальша
        заборона: система не дозволяє навіть каятися'
  - section: 'Порівняльний контекст: Смолич у дзеркалі світової фантастики'
    words: 400
    points:
      - 'Веллс «Острів доктора Моро» (1896) → Смолич «Господарство доктора Гальванеску»
        (1929): від біологічної до кібернетичної трансформації'
      - 'Мері Шеллі «Франкенштейн» (1818) → Смолич: тема «штучної людини» з українським
        контекстом експлуатації'
      - 'Роберт Вінер «Кабінет доктора Калігарі» (1920, фільм) → візуальна естетика
        Смолича: кінематографічна манера'
      - Олександр Бєляєв (рос. НФ, «Голова професора Доуеля», 1925) — паралельний
        розвиток, але різні мовні й культурні контексти
      - Владко «Роботери йдуть» (1929) — перший в світовій літературі роман про роботів
        з використанням подібного терміна — Смолич і Владко як паралельні піонери
      - 'Контекст треку: Смолич (модуль 5) між Винниченком (модуль 4, «Сонячна машина»,
        1928) і Бердником (модулі 6–8, 1960-ті) — 25-річна «чорна діра» жанру'
  - section: Спадщина та значення для жанру
    words: 400
    points:
      - Мемуарна трилогія «Розповідь про неспокій» (1968–72) — бестселер 1970-х, перше
        правдиве свідчення про «Розстріляне відродження»; потім неофіційно заборонена,
        вилучена з бібліотек
      - 'Сучасне перевидання: «Останній Ейджевуд» видавництвом «Темпора» (2018) в
        антології «Фантастика 20-х років» — повернення до читача'
      - Ілюстрації Олександра Довгаля до «Прекрасних катастроф» — візуальна спадщина,
        яка живе окремо від тексту
      - 'Подвійна спадщина: геніальний початок (1926–1929) і моральна капітуляція
        (1934–1976) — трагедія таланту під тоталітаризмом'
      - 'Значення для треку lit-fantastika: Смолич — ланка, яка пояснює, чому українська
        НФ мала 25-річну «чорну діру» між 1934 і кінцем 1950-х'
