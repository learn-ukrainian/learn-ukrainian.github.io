slug: korniy-forest
title: Korniy Forest
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Феномен Дари Корній'
  words: 400
  points:
  - Творчий шлях Мирослави Замойської (Дари Корній) та її дебют.
  - Значення перемоги в «Коронації слова» з романом «Гонихмарник».
  - Зародження нового етапу сучасного українського фентезі.
- section: 'Вступ та контекст: II — Відродження українського міфологічного фентезі'
  words: 400
  points:
  - Постколоніальний запит суспільства на власну, а не запозичену міфологію.
  - Література як спосіб культурного самоствердження у 2010-х роках.
  - Перехід від західних кліше до прадавніх українських вірувань.
- section: 'Аналіз ключових творів: I — Роман «Гонихмарник»'
  words: 400
  points:
  - Інтеграція міфологічного персонажа (гонихмарника) у сучасний урбаністичний простір
    Львова.
  - 'Дуалізм героя: поєднання людської природи і стихійної сили.'
  - Новаторство роману в контексті підліткової та молодіжної літератури.
- section: 'Аналіз ключових творів: II — Енциклопедія «Чарівні істоти українського
    міфу»'
  words: 400
  points:
  - Трансформація письменниці у дослідницю-популяризаторку фольклору.
  - Структуризація розрізненого пантеону української нижчої міфології.
  - Створення повноцінного візуального та текстового каталогу духів.
- section: 'Аналіз ключових творів: III — Лісова міфологія та її персонажі'
  words: 400
  points:
  - Аналіз образів мавок, лісовиків, блудів та унікального карпатського чугайстра.
  - Ліс як сакральний, небезпечний, але справедливий простір зі своїми законами.
  - Екологічна свідомість предків, відображена в образах духів природи.
- section: 'Стилістика та мова автора: I — Архаїзація та діалектизми'
  words: 400
  points:
  - Використання живих регіоналізмів для посилення автентичності.
  - Словник Корній як засіб занурення читача у магічний світ.
  - Реставрація забутих українських слів на позначення стихій та ритуалів.
- section: 'Стилістика та мова автора: II — Синтез сучасного та фольклорного'
  words: 400
  points:
  - Поєднання динамічного наративу з повільним ритмом народного замовляння.
  - Художня метафорика, щільно пов'язана з образами української природи.
  - 'Текст як міф: використання архетипних сюжетів.'
- section: 'Деколонізаційна перспектива: I — Деконструкція імперських міфів про демонологію'
  words: 400
  points:
  - Як радянська фольклористика знецінила український міф до рівня «дитячої казки».
  - Свідоме розмежування українських (лісовик, мавка) та російських (лєший, русалка)
    духів.
  - Повернення демонологічним постатям їхньої первісної амбівалентної глибини.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність та пантеон'
  words: 400
  points:
  - 'Відмова від меншовартості: український пантеон як самодостатній всесвіт, рівний
    західним фентезі-світам.'
  - Формування національної гордості через пізнання питомої міфології.
  - Подолання культурної колонізації через повернення сакрального простору предків.
- section: Підсумок та значення
  words: 400
  points:
  - Вплив Дари Корній на популяризацію української міфології серед молоді.
  - Створення фундаменту для наступного покоління українських авторів міфо-фентезі.
  - Важливість творчості письменниці для культурної деколонізації сучасного читача.
