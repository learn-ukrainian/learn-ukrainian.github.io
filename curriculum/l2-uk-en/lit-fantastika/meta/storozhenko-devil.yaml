slug: storozhenko-devil
title: "«Закоханий чорт» і Романтична Готика: Темна проза Олександра Стороженка"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Харківська романтична школа'
    words: 500
    points:
      - Олександр Стороженко (1805–1874) як представник харківської школи та спадкоємець
        Квітки-Основ'яненка.
      - 'Специфіка українського романтизму 1840–1860-х: поєднання фольклорної містики з суспільною сатирою.'
      - Відмінність від «сентиментальної» лінії Квітки — акцент на гротеску, темноті
        та козацькій демонології.
  - section: 'Вступ та контекст: II — Фольклорна основа «нечистої сили»'
    words: 500
    points:
      - Українська народна демонологія як літературне джерело — відьми, чорти, упирі
        Лівобережжя.
      - Вплив збірок фольклору 1820–1840-х (Срезневський, Максимович) на формування
        готичного образного ряду.
      - Функція «нечистої сили» у Стороженка — засіб соціальної критики, а не лише
        страшилка.
  - section: 'Аналіз ключового твору: «Закоханий чорт» — сюжет і тропи'
    words: 700
    points:
      - Комедійна інверсія готичного канону — чорт, що програє людській хитрості та
        жіночій волі.
      - Образ чорта як алегорія на пана-кріпосника (критика соціальної ієрархії).
      - Структура «казкового випробування» та її деконструкція через народний гумор.
  - section: 'Аналіз ключового твору: «Марко Проклятий» — готична поема'
    words: 700
    points:
      - Вічний мандрівник Марко як варіант архетипу Вічного Жида / Агасфера в
        українському контексті.
      - Козацька степова ідентичність versus прокляття безпам'ятства та бездомності.
      - Містичний хронотоп — час поза часом, простір між двома смертями.
  - section: 'Стилістика та мова: Бурлеск і жах поруч'
    words: 600
    points:
      - Поєднання бурлескної комічності і щирого жаху в одному тексті — «подвійний
        регістр» Стороженка.
      - Народна мова та ідіоматика як інструмент уземлення надприродного.
      - Ритм прози та усна оповідна традиція (казкар-оповідач як прихований наратор).
  - section: 'Стилістика та мова: Образна система демонологічного простору'
    words: 500
    points:
      - Топографія «нечистих місць» — перехрестя, ніч Івана Купала, болото, покинуті
        хутори.
      - Часова маркованість готичного — опівніч, п'ятниця, великодній тиждень.
      - Тілесність надприродного — як Стороженко матеріалізує духів через деталь.
  - section: 'Деколонізаційна перспектива: Своя нечиста сила проти чужих демонів'
    words: 500
    points:
      - Українська демонологія як суверенна символічна система — не запозичення з
        польського чи російського фольклору.
      - Образ чорта як критика царської адміністрації та польської шляхти на Лівобережжі.
      - Спростування тези про «провінційність» — Стороженко працює з тими ж архетипами,
        що й Гофман чи Гоголь.
  - section: 'Підсумок та спадщина: До сучасної темної прози'
    words: 500
    points:
      - Вплив Стороженка на «химерну прозу» 1960–1970-х — Земляк, Загребельний, Шевчук.
      - Стороженко як попередник сучасного українського dark fantasy (Корній, Виннычук).
      - Значення готичної традиції для формування повноцінного жанрового спектру
        української літератури.
