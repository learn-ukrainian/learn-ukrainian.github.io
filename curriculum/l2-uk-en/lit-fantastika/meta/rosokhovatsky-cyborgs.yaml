slug: rosokhovatsky-cyborgs
title: "«Кіборги»: Наукова Фантастика Ігоря Росохватського"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Епоха кібернетичної революції'
    words: 500
    points:
      - 'Історичний фон 1960-70-х років: перетворення Києва на потужний науковий центр
        (Інститут кібернетики В. Глушкова).'
      - Вплив науково-технічної революції на світогляд українських інтелектуалів та
        письменників.
      - Формування унікального середовища, сприятливого для жанру жорсткої наукової
        фантастики (hard sci-fi).
  - section: 'Вступ та контекст: II — Біографічний вимір Ігоря Росоховатського'
    words: 450
    points:
      - 'Життєвий і творчий шлях письменника: від фахової наукової журналістики до
        літератури.'
      - Співпраця з провідними вченими, яка забезпечила фактологічну правдоподібність
        його футурологічних концепцій.
      - Місце автора в генерації шістдесятників крізь призму наукового дискурсу.
  - section: 'Аналіз ключових творів: I — Концепція «сигома»'
    words: 550
    points:
      - Етимологія терміна «сигом» (синтетичний гомо) як світоглядна знахідка Росоховатського.
      - 'Відмінність сигома від класичного західного кіборга чи робота: акцент на
        біологічній та нейропластичній природі.'
      - Філософське питання подолання меж людської біології для дослідження глибокого
        космосу.
  - section: 'Аналіз ключових творів: II — Повість «Смертні і безсмертні»'
    words: 500
    points:
      - Рання артикуляція теми синтетичного безсмертя у творчості 1960-х років.
      - 'Морально-етичний конфлікт: безсмертя тіла проти ризику втрати людської емоційності.'
      - Ескізи перших персонажів, що стоять на порозі перетворення у постлюдину.
  - section: 'Аналіз ключових творів: III — Роман «Гість»'
    words: 650
    points:
      - 'Центральний твір циклу (публікація 1976-1979 рр.): історія сигома Юрія.'
      - 'Створення надрозуму як спостерігача за людством: еволюція свідомості штучного
        суб''єкта.'
      - 'Глибокі філософські діалоги між творцями та сигомом: проблема самоідентифікації
        та свободи волі.'
      - Завершення еволюції сигомів у повістях «Можливість відповіді» та «Останній
        сигнал».
  - section: 'Стилістика та мова автора: I — Науковість і філософічність'
    words: 500
    points:
      - Органічне поєднання суворої наукової термінології з глибинним психологізмом.
      - Використання жанру літературного діалогу-дискусії як інструменту для розкриття
        ідейних конфліктів.
      - Стриманість і лаконічність стилю як відповідник технологічної ери.
  - section: 'Стилістика та мова автора: II — Моделювання світу майбутнього'
    words: 450
    points:
      - Майстерність у творенні урбаністичних та космічних пейзажів майбутнього.
      - Введення лексичних новотворів, наукових абревіатур, які звучать природно в
        українському тексті.
      - Естетика «чистого раціо» в описах технологій та процесів мислення.
  - section: 'Деколонізаційна перспектива: I — Як автор руйнує імперські міфи'
    words: 500
    points:
      - Спростування імперського наративу про українську літературу як виключно селянську
        та побутову.
      - Демонстрація здатності української мови генерувати передовий науковий та футурологічний
        дискурс.
      - Повернення творчості Росоховатського до національного канону з радянської
        «знеособленої» фантастики.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
    words: 500
    points:
      - Незалежність української наукової думки, закодована в сюжетах творів.
      - 'Присутність традиційного українського кордоцентризму: пошук «серця» і людяності
        у високотехнологічних оболонках.'
      - Контраст гуманістичної візії Росоховатського з радянським агресивно-мілітарним
        космізмом.
  - section: 'Підсумок та спадщина: Значення творчості'
    words: 450
    points:
      - Сигоми Росоховатського як один із перших у світі концептів постлюдини та біологічного
        ШІ.
      - Вплив автора на наступні покоління українських фантастів.
      - Феноменальна актуальність етичних питань трилогії в епоху сучасних дебатів
        про штучний інтелект.
