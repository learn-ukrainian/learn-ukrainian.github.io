slug: babenko-witch
title: "Відьма у сучасній прозі: Фентезі Валентини Бабенко"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Історичне та культурне тло'
    words: 500
    points:
      - Написання повісті «Конотопська відьма» Григорієм Квіткою-Основ'яненком (1833
        р.) на етапі становлення української прози.
      - 'Історичні реалії Конотопщини XVIII століття: деградація сотенного устрою
        та втрата бойового духу козацькою старшиною.'
      - 'Спростування імперського міфу: Конотоп як місце історичної слави (Конотопська
        битва), а не провінційне захолустя.'
  - section: 'Вступ та контекст: II — Еволюція фольклорного архетипу'
    words: 500
    points:
      - 'Амбівалентність образу відьми в українській традиції: від фольклорної цілительки
        до втілення жіночої автономії та стихійних сил.'
      - 'Кардинальна відмінність української демонології від західноєвропейської:
        відсутність мотиву служіння Сатані, тісний зв''язок із природою.'
      - Еволюція архетипу від локального літературного анекдоту до могутнього символу
        непідкореності.
  - section: 'Аналіз ключових творів: I — Класичний текст Квітки-Основ''яненка'
    words: 500
    points:
      - Сатирично-реалістичне викриття місцевої влади через карикатурні образи сотника
        Микити Забрьохи та писаря Пістряка.
      - Роль відьми Явдохи Зубихи як руйнівниці чиновницького абсурду; магія як інструмент
        соціальної критики.
      - Контраст між містичною силою незалежної жінки та бюрократичною імпотенцією
        звироднілої козацької старшини.
  - section: 'Аналіз ключових творів: II — Фольклорні джерела та міфологізм'
    words: 500
    points:
      - Опора повісті на реальні історичні судові справи про «топлення відьом», які
        відбувалися в Україні під час посух.
      - Майстерне вплетення дохристиянських язичницьких уявлень та народних легенд
        у тканину реалістичного тексту.
      - Сублімація реальної соціальної напруги та пошук «цапа-відбувайла» через жорстокі
        містичні ритуали громади.
  - section: 'Аналіз ключових творів: III — Сучасна рецепція та горор'
    words: 500
    points:
      - 'Переосмислення міфу в новітній культурі: перехід від водевілю (екранізації
        1980-90х) до серйозного горор-наративу.'
      - Аналіз українського фільму «Конотопська відьма» (2024) та образу головної
        героїні Олени Бабенко.
      - Трансформація відьми у символ справедливої відплати та захисту своєї землі
        в умовах російсько-української війни.
  - section: 'Стилістика та мова автора: I — Сатира та бурлеск'
    words: 500
    points:
      - Використання бурлескної традиції, іронії та стилізації під живу народну мову
        у класичному творі 1833 року.
      - Створення унікального ефекту «комічного жаху», що знижує пафос та висміює
        інститути влади.
      - Цитатний аналіз авторського наративу (напр., «Смутний і невеселий сидів...»)
        як прикладу іронічної дистанції.
  - section: 'Стилістика та мова автора: II — Трансформація мови у фентезі'
    words: 500
    points:
      - 'Зміна стилістичного регістру в сучасному переосмисленні: перехід від сатири
        до похмурого горору та психологізму.'
      - Інтеграція прадавніх язичницьких замовлянь та проклять як вербальної зброї
        у сучасному тексті та кіно.
      - Формування нової автентичної української фентезійної естетики, очищеної від
        комплексу меншовартості.
  - section: 'Деколонізаційна перспектива: I — Як цей автор руйнує імперські міфи'
    words: 500
    points:
      - Спростування імперського та радянського стереотипу про українську демонологію
        як «примітивну малоросійську екзотику».
      - 'Відокремлення української міфопоетичної системи від російських/загальнослов''янських
        концептів: відсутність абсолютної дихотомії добра і зла.'
      - Повернення українській магічній традиції статусу самостійного, глибокого та
        серйозного світоглядного феномену.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
    words: 500
    points:
      - 'Радикальна відмова від віктимного наративу жертви: відьма як дієвий суб''єкт,
        що має силу знищувати ворогів.'
      - Образ сучасної Конотопської відьми (фільм 2024) як метафора безжального, активного
        спротиву російським окупантам.
      - Використання містичної помсти для ствердження потужної, агресивної та життєствердної
        національної ідентичності.
  - section: Підсумок та спадщина
    words: 500
    points:
      - Спадкоємність магічного архетипу від класичної повісті ХІХ століття до новітньої
        поп-культури доби повномасштабної війни.
      - Остаточне перетворення образу «Конотопської відьми» на міцний антиімперський
        символ та впізнаваний культурний бренд.
      - Екзистенційне значення міфологізму для підтримання сучасної української культурної
        резильєнтності та психологічної стійкості.
