slug: berdnyk-star-corsair-2
title: Berdnyk Star Corsair 2
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Публікація та феномен космізму'
  words: 400
  points:
  - Вихід роману у 1971 році та його величезний суспільний резонанс серед української
    інтелігенції.
  - «Зоряний корсар» як маніфест українського космізму, що поєднав наукову фантастику
    з кордоцентризмом.
- section: 'Вступ та контекст: II — Радянська цензура та заборона'
  words: 400
  points:
  - Реакція компартійної системи на «ідеалістичні» та вільнодумні концепції твору.
  - Заборона роману у 1973 році, брутальне вилучення накладів з бібліотек та репресії
    проти Олеся Бердника.
- section: 'Аналіз ключових творів: I — Філософія українського космізму'
  words: 450
  points:
  - Концепція Всесвіту як живого духовного організму (ідея ноосфери та духовної нескінченності).
  - Філософське заперечення вульгарного радянського матеріалізму та технократії.
- section: 'Аналіз ключових творів: II — Алегорія тоталітарної імперії'
  words: 450
  points:
  - Арагорія як прозора та нищівна сатира на Радянський Союз.
  - 'Деконструкція механізмів поневолення особистості: як «механічний розум» перетворює
    людей на біороботів.'
- section: 'Аналіз ключових творів: III — Образ Зоряного Корсара як бунтаря'
  words: 400
  points:
  - Головний герой як космічна проекція архетипу вільного українського козака-характерника.
  - Конфлікт між незламною волею індивіда та бездушною механістичною деспотією.
- section: 'Аналіз ключових творів: IV — Духовна еволюція'
  words: 400
  points:
  - Ідея повноти буття та щастя як найвищої мети людського існування.
  - Пріоритет внутрішньої духовної революції над зовнішнім технічним прогресом.
- section: 'Стилістика та мова автора: I — Синтез міфу та наукової фантастики'
  words: 400
  points:
  - Органічне поєднання української фольклорної міфопоетики з міжгалактичними просторами.
  - Одухотворення мертвого космосу через національні образи та віталізм.
- section: 'Стилістика та мова автора: II — Метафорика та неологізми Бердника'
  words: 300
  points:
  - Глибока поетична ритміка та емоційна насиченість фантастичної прози.
  - Аналіз авторської метафорики та лексики, що виходила за вузькі межі мови соцреалізму.
- section: 'Деколонізаційна перспектива: I — Як цей автор руйнує імперські міфи'
  words: 400
  points:
  - Спростування радянського міфу про «світле комуністичне майбутнє» як безальтернативне
    благо.
  - Доказ того, що стандартизація суспільства без індивідуальної свободи веде до галактичного
    ГУЛАГу.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
  words: 400
  points:
  - Відстоювання права української культури формувати власні глобальні філософські
    візії.
  - Національний характер як основа опору імперській нівеляції особистості.
- section: 'Підсумок та спадщина: Повернення із забуття'
  words: 300
  points:
  - Роль роману в духовному формуванні покоління українських дисидентів 1970-х років.
  - Значення «Зоряного корсара» як класики антитоталітарної та інтелектуальної літератури
    незалежної України.
