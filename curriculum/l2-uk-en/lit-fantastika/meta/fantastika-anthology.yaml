slug: fantastika-anthology
title: Fantastika Anthology
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Історія української фантастики'
  words: 400
  points:
  - Еволюція від фольклорних джерел та бароко до ранньої наукової фантастики
  - Становлення українського НФ-жанру в 1920-х роках (Володимир Владко та 'Аргонавти
    Всесвіту')
- section: 'Вступ та контекст: II — Жанрові межі та специфіка'
  words: 350
  points:
  - Відмінності та перетини між науковою фантастикою, класичним фентезі та химерною
    прозою
  - Химерна проза як унікальний національний феномен збереження культурної пам'яті
- section: 'Аналіз ключових творів: I — Химерна проза'
  words: 450
  points:
  - Міфологізація вітчизняної історії у творчісті В. Земляка ('Лебедина зграя')
  - Символізм, іронія та антитоталітарна критика у прозі В. Дрозда
- section: 'Аналіз ключових творів: II — Наукова фантастика та дисидентство'
  words: 450
  points:
  - Олесь Бердник та феномен його знакового роману 'Зоряний корсар'
  - Філософські виміри українського космомислення та свідоме протистояння радянській
    цензурі
- section: 'Аналіз ключових творів: III — Сучасне фентезі та альтернативна історія'
  words: 450
  points:
  - Постмодерністські жанрові експерименти та урбан-фентезі зламу тисячоліть
  - Мілітарна фантастика та рефлексія екзистенційної загрози після 2014 року
- section: 'Стилістика та мова автора: I — Міфопоетика'
  words: 350
  points:
  - Органічна інкорпорація слов'янської демонології та національного міфу
  - Трансформація архетипів колективного підсвідомого в сучасному фентезі
- section: 'Стилістика та мова автора: II — Мовні інновації'
  words: 350
  points:
  - Створення самобутньої футуристичної термінології та неологізмів українською мовою
  - Лексико-стилістичні маркери 'іншості' при конструюванні позаземних світів
- section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
  words: 400
  points:
  - Категоричне спростування стереотипу про російську мову як єдину 'мову майбутнього
    і науки'
  - Деконструкція нав'язаного концепту 'братніх народів' в утопічних і антиутопічних
    світах
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність'
  words: 400
  points:
  - Агентність і лідерство українських героїв у розв'язанні глобальних космологічних
    конфліктів
  - Формування власного, незалежного футурологічного бачення світу
- section: 'Підсумок та спадщина: I — Вплив на сучасну культуру'
  words: 200
  points:
  - Роль вітчизняної фантастики у формуванні ідентичності нових поколінь читачів
  - Філігранний баланс між розважальним ескапізмом та актуальною соціальною критикою
- section: 'Підсумок та спадщина: II — Парадигма майбутнього'
  words: 200
  points:
  - Як українська фантастика проектує візії політично та культурно вільного майбутнього
  - Значення антологізації жанру для захисту літературного канону від імперських зазіхань
