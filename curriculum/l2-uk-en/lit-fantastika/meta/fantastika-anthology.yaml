slug: fantastika-anthology
title: "Антологія Фантастики: Еволюція Жанру від Романтизму до Сьогодні"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Від фольклору до ранньої наукової фантастики'
    words: 500
    points:
      - Дослідження еволюції жанру від фольклорних казок та романтичних переказів
        до перших зразків наукової фантастики у 1920-х роках.
      - Роль Володимира Владка у формуванні вітчизняного науково-фантастичного канону
        (публікація повісті «Аргонавти Всесвіту», 1928 рік).
      - 'Інноваційність української фантастики 1920-х: чому твори Владка були революційними
        для тогочасного читача та випереджали світові тренди.'
  - section: 'Вступ та контекст: II — Феномен химерної прози'
    words: 500
    points:
      - Аналіз того, як «химерна проза» стала окремим національним різновидом фантастичного
        наративу у 1970-1980-х роках.
      - Химерна проза як органічна українська відповідь на магічний реалізм, що своїм
        корінням глибоко сягає бароко та гоголівської традиції.
      - Використання фантастичного жанру як прихованої форми національного спротиву
        в умовах суворих ідеологічних вимог соцреалізму.
  - section: 'Аналіз ключових творів: I — Класична химерна проза та фольклор'
    words: 500
    points:
      - Аналітичний розбір класичної химерної прози на прикладі творчості Василя Земляка
        та Володимира Дрозда.
      - Активне використання фольклору, демонології та національного міфу для легалізації
        культурної пам'яті в умовах тоталітаризму.
  - section: 'Аналіз ключових творів: II — Космізм та дисидентство Олеся Бердника'
    words: 550
    points:
      - Глибокий огляд творчості Олеся Бердника як унікального феномену поєднання
        космізму з українським дисидентством.
      - 'Аналіз знакового роману «Зоряний корсар» (1971), що став маніфестом духовної
        свободи: «Ми — діти Космосу... не підвладні земним тиранам».'
      - 'Репресії проти письменника: засудження Бердника у 1979 році за правозахисну
        діяльність та масове вилучення і знищення його книжок радянською цензурою.'
  - section: 'Аналіз ключових творів: III — Сучасний етап і мілітарна фантастика'
    words: 550
    points:
      - Початок відродження української химерної та міфологічної прози в часи пізньої
        перебудови (з 1989 року).
      - 'Огляд сучасного етапу: еволюція жанру від постмодерного фентезі до потужної
        мілітарної наукової фантастики та альтернативної історії.'
      - Сплеск жанру після початку російсько-української війни у 2014 році як глибока
        літературна рефлексія на колективну травму.
  - section: 'Стилістика та мова автора: I — Міфопоетика та архетипи'
    words: 500
    points:
      - 'Детальна робота з міфопоетикою: як традиційна слов''янська демонологія та
        барокові архетипи майстерно вплітаються у сучасний літературний текст.'
      - 'Концепція Валерія Шевчука: фантастика не як втеча від реальності, а як ефективний
        спосіб говорити про реальність мовою міфу.'
  - section: 'Стилістика та мова автора: II — Мовні та термінологічні інновації'
    words: 500
    points:
      - 'Лексичні інновації: неологізми та творення потужного науково-фантастичного
        термінологічного апарату українською мовою для опису концепцій «іншості».'
      - 'Спростування міфу про лексичну бідність: доведення спроможності української
        мови формулювати складні філософські, наукові та футурологічні ідеї, зберігаючи
        кордоцентричну специфіку.'
  - section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
    words: 500
    points:
      - Як українські автори впевнено ламали імперський наратив про другорядність
        своєї літератури та спростовували міф про вторинність щодо російської радянської
        НФ.
      - Деконструкція радянської пропаганди, яка нав'язувала думку, що мовою майбутнього,
        передової науки та підкорення космосу може бути виключно російська.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність'
    words: 500
    points:
      - Потужне відновлення української суб'єктності у процесі конструювання візій
        майбутнього та паралельних світів без жодної орієнтації на російську культурну
        матрицю.
      - Аналіз сучасного українського фентезі, яке розбудовує незалежні літературні
        світи, де Москва назавжди перестає бути центром цивілізаційного тяжіння.
  - section: Підсумок та спадщина
    words: 500
    points:
      - Важлива соціокультурна функція фантастики сьогодні та її невід'ємна роль у
        збереженні і формуванні української національної ідентичності.
      - Як антологізація фантастичного жанру допомагає суспільству осмислити глибоку
        національну травму та змоделювати візію незалежного, повністю суб'єктного
        майбутнього.
