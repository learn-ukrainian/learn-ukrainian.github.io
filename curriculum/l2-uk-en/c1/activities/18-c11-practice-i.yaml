module: 18-c11-practice-i
level: C1
version: '3.1'
activities:
  - type: match-up
    title: "Структура есе"
    instructions: "З'єднайте частину есе з її функцією."
    pairs:
      - left: "Вступ"
        right: "Представляє тему та тезу."
      - left: "Теза"
        right: "Виражає основну ідею роботи."
      - left: "Аргумент"
        right: "Підтримує тезу доказами."
      - left: "Основна частина"
        right: "Розвиває аргументацію детально."
      - left: "Висновок"
        right: "Підсумовує сказане та дає прогноз."
      - left: "Перехід"
        right: "Забезпечує логічний зв'язок між абзацами."
      - left: "Зачіпка"
        right: "Привертає увагу читача з першого речення."
      - left: "Контекст"
        right: "Дає необхідну фонову інформацію."
      - left: "Контраргумент"
        right: "Визнає та спростовує протилежну думку."
      - left: "Бібліографія"
        right: "Містить перелік використаних джерел."

  - type: group-sort
    title: "Сильна чи слабка теза?"
    instructions: "Визначте, чи є теза сильною (аргументованою) чи слабкою (надто загальною або описовою)."
    groups:
      - name: "Сильна теза"
        items:
          - "Глобалізація має позитивний вплив на економіку, але загрожує культурній ідентичності."
          - "Дистанційна освіта є ефективною лише за умови високої самодисципліни студентів."
          - "Впровадження штучного інтелекту вимагає нових етичних норм законодавства."
          - "Зміни клімату є наслідком індустріалізації, що вимагає негайних дій урядів."
          - "Вивчення іноземних мов покращує когнітивні здібності та кар'єрні перспективи."
          - "Обов'язкова шкільна форма не впливає на успішність учнів, але знижує соціальну нерівність."
          - "Космічні дослідження повинні фінансуватися приватним сектором через високі ризики для бюджету."
          - "Вегетаріанство є більш екологічним способом життя, оскільки зменшує вуглецевий слід."
          - "Введення безумовного базового доходу стимулює творчий потенціал населення."
      - name: "Слабка теза"
        items:
          - "У цьому есе я розповім про глобалізацію."
          - "Дистанційна освіта — це добре."
          - "Штучний інтелект існує вже давно."
          - "Клімат змінюється, і це дуже погано для всіх нас."
          - "Іноземні мови важливі для кожної людини."
          - "Шкільна форма — це одяг для школи."
          - "Космос дуже великий і цікавий."
          - "Я люблю їсти овочі."
          - "Гроші потрібні всім."

  - type: fill-in
    title: "Засоби зв'язку"
    instructions: "Вставте пропущені слова-зв'язки у текст."
    items:
      - sentence: "По-перше, туризм розвиває економіку. [blank], він створює нові робочі місця."
        answer: "По-друге"
      - sentence: "Ми повинні діяти швидко. [blank], наслідки будуть незворотними."
        answer: "Інакше"
      - sentence: "Ця проблема є складною. [blank], вона має кілька рішень."
        answer: "Проте"
      - sentence: "[blank], важливо розглянути історичний контекст."
        answer: "Зокрема"
      - sentence: "Він не прийшов на зустріч, [blank] захворів."
        answer: "оскільки"
      - sentence: "Проект був успішним, [blank] ми отримали прибуток."
        answer: "отже"
      - sentence: "[blank], я хотів би подякувати всім присутнім."
        answer: "Насамкінець"
      - sentence: "Це твердження є спірним. [blank], є докази протилежного."
        answer: "Наприклад"
      - sentence: "Ми не погоджуємося, [blank] поважаємо вашу думку."
        answer: "але"
      - sentence: "[blank] вищесказаного, можна зробити висновок."
        answer: "З огляду на"
    options:
      - По-друге
      - Інакше
      - Проте
      - Зокрема
      - оскільки
      - отже
      - Насамкінець
      - Наприклад
      - але
      - З огляду на

  - type: quiz
    title: "Правила академічного письма"
    instructions: "Виберіть правильну відповідь щодо стилю есе."
    items:
      - question: "Який займенник краще уникати в суворому академічному стилі?"
        options:
          - "**Я**"
          - "Ми"
          - "Вони"
          - "Він"
      - question: "Що є головною метою аргументативного есе?"
        options:
          - "**Переконати читача**"
          - "Розважити читача"
          - "Описати подію"
          - "Виразити емоції"
      - question: "Де зазвичай розміщується теза?"
        options:
          - "**В кінці вступу**"
          - "В кінці висновку"
          - "У першому реченні"
          - "У середині основної частини"
      - question: "Що таке плагіат?"
        options:
          - "**Використання чужих ідей без посилання**"
          - "Цитування з посиланням"
          - "Парафраз з посиланням"
          - "Власні ідеї"
      - question: "Який стиль є відповідним для есе?"
        options:
          - "**Офіційно-діловий / Науковий**"
          - "Розмовний"
          - "Художній"
          - "Публіцистичний (іноді)"
      - question: "Скільки аргументів зазвичай має стандартне есе?"
        options:
          - "**Три**"
          - "Один"
          - "Десять"
          - "Жодного"
      - question: "Що робить висновок?"
        options:
          - "**Узагальнює аргументи**"
          - "Додає нові аргументи"
          - "Копіює вступ слово в слово"
          - "Задає нові питання без відповіді"
      - question: "Що таке 'Topic Sentence'?"
        options:
          - "**Перше речення абзацу, що задає тему**"
          - "Заголовок есе"
          - "Останнє речення есе"
          - "Цитата відомої людини"

  - type: true-false
    title: "Академічний стиль: Так чи Ні"
    instructions: "Визначте, чи є твердження правильним для академічного есе."
    items:
      - statement: "В есе можна використовувати сленг."
        answer: false
      - statement: "Кожен абзац повинен мати одну головну ідею."
        answer: true
      - statement: "Емоційні вигуки (Ого! Жах!) доречні в есе."
        answer: false
      - statement: "Статистика є хорошим доказом."
        answer: true
      - statement: "Можна вигадувати факти для переконливості."
        answer: false
      - statement: "Вступ повинен зацікавити читача."
        answer: true
      - statement: "Висновок може містити абсолютно нову інформацію."
        answer: false
      - statement: "Критика джерел є важливою частиною аналізу."
        answer: true

  - type: match-up
    title: "Види аргументів"
    instructions: "З'єднайте тип доказу з прикладом."
    pairs:
      - left: "Факт"
        right: "Вода кипить при 100 градусах."
      - left: "Статистика"
        right: "60% респондентів підтримали закон."
      - left: "Експертна думка"
        right: "Професор Шевченко стверджує, що..."
      - left: "Приклад з життя"
        right: "Моя сусідка виграла лотерею."
      - left: "Логічний висновок"
        right: "Якщо А=Б і Б=В, то А=В."
      - left: "Цитата"
        right: "\"Бути чи не бути\" — писав Шекспір."
      - left: "Аналогія"
        right: "Економіка працює як двигун."
      - left: "Прецедент"
        right: "У 1990 році вже була така криза."
      - left: "Закон"
        right: "Згідно з Конституцією України..."
      - left: "Аксіома"
        right: "Паралельні прямі не перетинаються."

  - type: fill-in
    title: "Тематичні речення"
    instructions: "Доповніть тематичні речення відповідними словами."
    items:
      - sentence: "Однією з головних [blank] глобального потепління є викиди вуглецю."
        answer: "причин"
      - sentence: "Соціальні мережі мають як позитивний, так і [blank] вплив на молодь."
        answer: "негативний"
      - sentence: "Важливо [blank], що освіта є ключем до успіху."
        answer: "зазначити"
      - sentence: "Існує кілька [blank] для вирішення цієї проблеми."
        answer: "підходів"
      - sentence: "На [blank] думку, цензура в інтернеті неприпустима."
        answer: "мою"
      - sentence: "По-перше, [blank] здорового способу життя покращує самопочуття."
        answer: "дотримання"
      - sentence: "Насамкінець, варто [blank] підсумки дискусії."
        answer: "підбити"
      - sentence: "Цей [blank] ілюструє важливість командної роботи."
        answer: "приклад"
    options:
      - причин
      - негативний
      - зазначити
      - підходів
      - мою
      - дотримання
      - підбити
      - приклад

  - type: match-up
    title: "Структура абзацу"
    instructions: "Визначте правильний порядок речень у абзаці (1 - початок, 7 - кінець)."
    pairs:
     - left: "1. Теза"
       right: "По-перше, читання розширює словниковий запас людини."
     - left: "2. Додавання"
       right: "Крім того, воно розвиває уяву та креативність."
     - left: "3. Пояснення"
       right: "Книги дозволяють нам подорожувати світами, не виходячи з дому."
     - left: "4. Приклад"
       right: "Наприклад, класична література вчить нас емпатії."
     - left: "5. Протиставлення"
       right: "Однак, не всі книги є однаково корисними, тому важливо обирати якісну літературу."
     - left: "6. Наслідок"
       right: "Таким чином, читання є незамінним для саморозвитку."
     - left: "7. Висновок"
       right: "Отже, кожен повинен читати хоча б одну книгу на місяць."
     - left: "Зайве речення"
       right: "Фільми теж цікаві, але книги кращі."

  - type: error-correction
    title: "Стилістичні помилки"
    instructions: "Знайдіть неформальні слова, недоречні в есе."
    items:
      - sentence: "Ця ідея просто супер."
        error: "супер"
        answer: "Ця ідея є чудовою."
      - sentence: "Автор пише якусь нісенітницю."
        error: "нісенітницю"
        answer: "Автор висловлює суперечливі думки."
      - sentence: "Ми тіпа погодилися з ним."
        error: "тіпа"
        answer: "Ми певною мірою погодилися з ним."
      - sentence: "Це все фігня, не вірте."
        error: "фігня"
        answer: "Це твердження є хибним."
      - sentence: "Треба бабло для проекту."
        error: "бабло"
        answer: "Потрібні кошти для проекту."
      - sentence: "Чуваки зробили дослідження."
        error: "Чуваки"
        answer: "Дослідники провели дослідження."
      - sentence: "Короче, висновок такий."
        error: "Короче"
        answer: "Узагальнюючи, висновок такий."
      - sentence: "Він крутий спеціаліст."
        error: "крутий"
        answer: "Він висококваліфікований спеціаліст."

  - type: match-up
    title: "Словник модуля"
    instructions: "З'єднайте слово з його значенням."
    pairs:
      - left: "Есе"
        right: "Невеликий прозовий твір вільної композиції."
      - left: "Аргумент"
        right: "Підстава, доказ, який наводиться для обґрунтування."
      - left: "Логіка"
        right: "Наука про закони мислення; послідовність думок."
      - left: "Зв'язність"
        right: "Цілісність тексту, логічний зв'язок частин."
      - left: "Вступ"
        right: "Початкова частина твору."
      - left: "Висновок"
        right: "Остаточна думка, підсумок."
      - left: "Теза"
        right: "Положення, яке треба довести."
      - left: "Стаття"
        right: "Науковий або публіцистичний твір."
      - left: "Доказ"
        right: "Факт, що підтверджує істинність."
      - left: "Переконливість"
        right: "Здатність переконати когось."

  - type: fill-in
    title: "Формулювання тези"
    instructions: "Доповніть речення, щоб сформулювати тезу."
    items:
      - sentence: "Метою цього есе є [blank] причини економічної кризи."
        answer: "проаналізувати"
      - sentence: "Я [blank], що освіта має бути безкоштовною."
        answer: "вважаю"
      - sentence: "Це есе [blank] питання захисту довкілля."
        answer: "розглядає"
      - sentence: "Можна [blank], що технології змінюють наше життя."
        answer: "стверджувати"
      - sentence: "У цій роботі я [blank] аргументи 'за' і 'проти'."
        answer: "наведу"
      - sentence: "Головна [blank] полягає в тому, що спорт важливий."
        answer: "ідея"
      - sentence: "Я спробую [blank], що це твердження помилкове."
        answer: "довести"
      - sentence: "На [blank] думку, це найкраще рішення."
        answer: "мою"
    options:
      - проаналізувати
      - вважаю
      - розглядає
      - стверджувати
      - наведу
      - ідея
      - довести
      - мою

  - type: quiz
    title: "Оцінка доказів"
    instructions: "Виберіть найнадійніший доказ для академічного есе."
    items:
      - question: "Доказ про користь вакцинації:"
        options:
          - "**Дані Всесвітньої організації охорони здоров'я**"
          - "Коментар аноніма в Facebook"
          - "Думка моєї бабусі"
          - "Стаття в жовтій пресі"
      - question: "Доказ про зміни клімату:"
        options:
          - "**Звіт Міжурядової групи експертів (IPCC)**"
          - "Фільм-катастрофа"
          - "Пост блогера"
          - "Відчуття, що стало тепліше"
      - question: "Доказ історичної події:"
        options:
          - "**Архівний документ**"
          - "Історичний роман"
          - "Чутки"
          - "Художній фільм"
      - question: "Доказ економічної тенденції:"
        options:
          - "**Статистика Держстату**"
          - "Ціна на базарі"
          - "Розмова в таксі"
          - "Прогноз астролога"
      - question: "Доказ літературного впливу:"
        options:
          - "**Цитата з монографії літературознавця**"
          - "Вікіпедія (без посилань)"
          - "Шкільний твір"
          - "Коментар на форумі"
      - question: "Яке джерело є первинним?"
        options:
          - "**Щоденник письменника**"
          - "Підручник з літератури"
          - "Стаття в енциклопедії"
          - "Лекція вчителя"
      - question: "Який сайт є ненадійним джерелом?"
        options:
          - "**Сайт без вказання авторів та редакторів**"
          - "Сайт університету"
          - "Сайт бібліотеки"
          - "Урядовий портал"
      - question: "Що робити, якщо докази суперечливі?"
        options:
          - "**Навести обидві точки зору та проаналізувати їх**"
          - "Ігнорувати ті, що не подобаються"
          - "Вибрати найпростіший"
          - "Не писати про це"

  - type: group-sort
    title: "Переходи"
    instructions: "Розподіліть слова-зв'язки за категоріями."
    groups:
      - name: "Додавання"
        items:
          - "Також"
          - "Крім того"
          - "До того ж"
          - "Ба більше"
          - "Та"
          - "Ба навіть"
          - "Поряд з цим"
      - name: "Протиставлення"
        items:
          - "Але"
          - "Проте"
          - "Однак"
          - "Натомість"
          - "Втім"
          - "З іншого боку"
          - "Попри це"
      - name: "Висновок"
        items:
          - "Отже"
          - "Таким чином"
          - "У підсумку"
          - "Нарешті"
          - "Зрештою"
          - "Насамкінець"
          - "Взагалі"

  - type: fill-in
    title: "Початок висновку"
    instructions: "Впишіть слова для початку висновку."
    items:
      - sentence: "[blank], ми розглянули всі аспекти проблеми."
        answer: "Отже"
      - sentence: "[blank] підсумки, можна сказати, що..."
        answer: "Підбиваючи"
      - sentence: "У [blank], ця стратегія є ефективною."
        answer: "результаті"
      - sentence: "На [blank], хочу подякувати за увагу."
        answer: "завершення"
      - sentence: "[blank] чином, теза доведена."
        answer: "Таким"
      - sentence: "Ми [blank] до висновку, що це необхідно."
        answer: "дійшли"
      - sentence: "Це дослідження [blank], що гіпотеза вірна."
        answer: "показало"
      - sentence: "[blank], майбутнє залежить від нас."
        answer: "Зрештою"
    options:
      - Отже
      - Підбиваючи
      - результаті
      - завершення
      - Таким
      - дійшли
      - показало
      - Зрештою

  - type: match-up
    title: "Логічні хиби"
    instructions: "З'єднайте назву логічної помилки з прикладом."
    pairs:
      - left: "Ad Hominem (Перехід на особистості)"
        right: "Ви не праві, бо ви молодий."
      - left: "Солом'яне опудало (Strawman)"
        right: "Ви хочете заборонити автомобілі!"
