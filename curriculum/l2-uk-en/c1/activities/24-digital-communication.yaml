module: 24-digital-communication
level: C1
version: '2.0'
activities:
  - id: 1
    type: match-up
    instruction: "Match the term with its definition."
    pairs:
      - left: "Вкладення"
        right: "Файл, прикріплений до листа."
      - left: "Чернетка"
        right: "Збережений, але не відправлений лист."
      - left: "Спам"
        right: "Небажана рекламна розсилка."
      - left: "Посилання"
        right: "Адреса веб-сторінки."
      - left: "Шаблон"
        right: "Готовий зразок документа."
      - left: "Хмара"
        right: "Онлайн-сховище файлів."
      - left: "Автовідповідь"
        right: "Автоматичне повідомлення про відсутність."
      - left: "Підпис"
        right: "Контактні дані в кінці листа."

  - id: 2
    type: match-up
    instruction: "Match the email section with its purpose."
    pairs:
      - left: "Тема"
        right: "Короткий зміст листа."
      - left: "Привітання"
        right: "Встановлення контакту."
      - left: "Вступ"
        right: "Small Talk або контекст."
      - left: "Суть"
        right: "Головна мета повідомлення."
      - left: "Заклик до дії"
        right: "Що має зробити отримувач."
      - left: "Прощання"
        right: "Формула ввічливості в кінці."
      - left: "Копія (CC)"
        right: "Інформування інших осіб."
      - left: "Прихована копія (BCC)"
        right: "Конфіденційне інформування."

  - id: 3
    type: quiz
    instruction: "Analyze the Email Anatomy text."
    items:
      - question: "Яка оптимальна довжина теми листа?"
        options:
          - "До 5-7 слів."
          - "1-2 слова."
          - "Ціле речення."
          - "Тема не потрібна."
        answer: "До 5-7 слів."
      - question: "Що таке 'Заклик до дії'?"
        options:
          - "Чітка інструкція, що робити далі."
          - "Прощання."
          - "Підпис."
          - "Привітання."
        answer: "Чітка інструкція, що робити далі."
      - question: "Де має бути найважливіша інформація?"
        options:
          - "На початку листа."
          - "В кінці."
          - "В середині."
          - "У вкладенні."
        answer: "На початку листа."
      - question: "Як правильно звертатися до партнера?"
        options:
          - "Шановний пане/пані + Прізвище."
          - "Привіт + Ім'я."
          - "Гей, ти."
          - "Дорогий друже."
        answer: "Шановний пане/пані + Прізвище."
      - question: "Що робити, якщо лист довгий?"
        options:
          - "Використовувати списки і структуру."
          - "Писати суцільним текстом."
          - "Розбити на 10 листів."
          - "Не писати його."
        answer: "Використовувати списки і структуру."
      - question: "Яка функція підпису?"
        options:
          - "Надати контактні дані."
          - "Для краси."
          - "Щоб зайняти місце."
          - "Це застаріло."
        answer: "Надати контактні дані."
      - question: "Чому тема 'Питання' погана?"
        options:
          - "Вона неінформативна."
          - "Вона занадто довга."
          - "Вона груба."
          - "Вона ідеальна."
        answer: "Вона неінформативна."
      - question: "Що таке 'Правило перевернутої піраміди'?"
        options:
          - "Головне — спочатку, деталі — потім."
          - "Починати з жарту."
          - "Писати знизу вгору."
          - "Писати загадками."
        answer: "Головне — спочатку, деталі — потім."

  - id: 4
    type: quiz
    instruction: "Analyze the Messengers text."
    items:
      - question: "Яка головна особливість месенджерів?"
        options:
          - "Швидкість реакції."
          - "Офіційність."
          - "Повільність."
          - "Складність."
        answer: "Швидкість реакції."
      - question: "Як краще писати повідомлення?"
        options:
          - "Одним цілісним блоком."
          - "По одному слову в повідомленні."
          - "Тільки великими літерами."
          - "Тільки смайликами."
        answer: "Одним цілісним блоком."
      - question: "Що робити, якщо зробили помилку в тексті?"
        options:
          - "Відредагувати повідомлення."
          - "Написати нове з зірочкою."
          - "Видалити чат."
          - "Ігнорувати."
        answer: "Відредагувати повідомлення."
      - question: "Чи доречні голосові повідомлення в бізнесі?"
        options:
          - "Ні, це моветон без попередження."
          - "Так, це дуже зручно."
          - "Завжди."
          - "Тільки від шефа."
        answer: "Ні, це моветон без попередження."
      - question: "Чому голосові незручні?"
        options:
          - "Їх не можна просканувати очима і шукати."
          - "Вони занадто тихі."
          - "Вони платні."
          - "Вони зникають."
        answer: "Їх не можна просканувати очима і шукати."
      - question: "Які месенджери популярні в Україні?"
        options:
          - "Telegram, Viber, WhatsApp."
          - "ICQ."
          - "MSN."
          - "Тільки пошта."
        answer: "Telegram, Viber, WhatsApp."
      - question: "Чи можна писати вночі?"
        options:
          - "Ні, це порушення кордонів."
          - "Так, якщо не спиться."
          - "Так, робота понад усе."
          - "Тільки якщо це мем."
        answer: "Ні, це порушення кордонів."
      - question: "Як перейти з месенджера на пошту?"
        options:
          - "Надіслати документ на пошту для офіційності."
          - "Неможливо."
          - "Скопіювати текст."
          - "Зробити скріншот."
        answer: "Надіслати документ на пошту для офіційності."

  - id: 5
    type: fill-in
    instruction: "Fill in the blank with the appropriate vocabulary word."
    items:
      - sentence: "Я надіслав вам **__________** на Google Drive."
        answer: "посилання"
        options: ["посилання", "файл", "лист", "код"]
      - sentence: "Перевірте, будь ласка, папку **__________**, лист міг потрапити туди."
        answer: "спам"
        options: ["спам", "вхідні", "кошик", "вихідні"]
      - sentence: "Надсилаю договір у **__________**."
        answer: "вкладенні"
        options: ["вкладенні", "тілі", "темі", "конверті"]
      - sentence: "Прошу надати мені **__________** до папки."
        answer: "доступ"
        options: ["доступ", "ключ", "пароль", "вхід"]
      - sentence: "Це питання потрібно вирішити **__________**."
        answer: "терміново"
        options: ["терміново", "повільно", "завтра", "ніколи"]
      - sentence: "Я поставив вас у **__________** листа."
        answer: "копію"
        options: ["копію", "тему", "підпис", "спам"]
      - sentence: "Дякую за швидку **__________**."
        answer: "відповідь"
        options: ["відповідь", "роботу", "тему", "каву"]
      - sentence: "Встановіть **__________** про нові повідомлення."
        answer: "сповіщення"
        options: ["сповіщення", "звук", "екран", "колір"]

  - id: 6
    type: fill-in
    instruction: "Complete the email phrase."
    items:
      - sentence: "**__________** вам повідомити, що зустріч скасовано. (I regret to inform...)"
        answer: "Змушений"
        options: ["Змушений", "Хочу", "Радий", "Маю"]
      - sentence: "**__________** до Вашого листа від 20 жовтня... (Referring to...)"
        answer: "Відповідно"
        options: ["Відповідно", "Згідно", "На", "Про"]
      - sentence: "**__________** за Ваш швидкий відгук. (Thank you for...)"
        answer: "Дякую"
        options: ["Дякую", "Прошу", "Маю", "Чекаю"]
      - sentence: "**__________** підтвердити отримання документів. (Please confirm...)"
        answer: "Прошу"
        options: ["Прошу", "Хочу", "Маю", "Треба"]
      - sentence: "**__________** на плідну співпрацю. (Looking forward to...)"
        answer: "Сподіваюся"
        options: ["Сподіваюся", "Чекаю", "Хочу", "Бажаю"]
      - sentence: "**__________** Вам гарного дня! (Wishing you...)"
        answer: "Бажаю"
        options: ["Бажаю", "Хочу", "Маю", "Даю"]
      - sentence: "У разі виникнення питань, **__________** до мене. (Feel free to contact...)"
        answer: "звертайтеся"
        options: ["звертайтеся", "пишіть", "дзвоніть", "ідіть"]
      - sentence: "Пишу Вам, **__________** узгодити деталі. (in order to...)"
        answer: "щоб"
        options: ["щоб", "бо", "коли", "якщо"]

  - id: 7
    type: match-up
    instruction: "Match the field usage (To, CC, BCC)."
    pairs:
      - left: "To (Кому)"
        right: "Головний отримувач, від якого чекають дії."
      - left: "CC (Копія)"
        right: "Особа, яку інформують (до відома)."
      - left: "BCC (Прихована копія)"
        right: "Отримувач, невидимий для інших."
      - left: "Reply (Відповісти)"
        right: "Відповідь тільки відправнику."
      - left: "Reply All (Відповісти всім)"
        right: "Відповідь усім учасникам листування."
      - left: "Forward (Переслати)"
        right: "Відправка листа третій особі."
      - left: "Subject (Тема)"
        right: "Короткий опис змісту."
      - left: "Attachment (Вкладення)"
        right: "Файл разом з листом."

  - id: 8
    type: true-false
    instruction: "Digital Etiquette Rules."
    items:
      - statement: "Можна писати тему листа ВЕЛИКИМИ ЛІТЕРАМИ для привернення уваги."
        correct: false
        explanation: "Це сприймається як крик."
      - statement: "На робочі листи варто відповідати протягом 24 годин."
        correct: true
        explanation: "Це стандарт ділового етикету."
      - statement: "Голосові повідомлення зручні всім."
        correct: false
        explanation: "Більшість людей їх не любить у роботі."
      - statement: "Можна використовувати смайлики в першому листі до партнера."
        correct: false
        explanation: "Краще дотримуватися формального тону спочатку."
      - statement: "Варто перевіряти папку 'Спам', якщо чекаєте важливий лист."
        correct: true
        explanation: "Фільтри пошти іноді помиляються."
      - statement: "Кнопку 'Відповісти всім' треба натискати завжди."
        correct: false
        explanation: "Це створює інформаційний шум."
      - statement: "Можна надсилати файли розміром 100 Мб у вкладенні."
        correct: false
        explanation: "Краще використати посилання на хмару."
      - statement: "Варто видаляти історію листування при відповіді."
        correct: false
        explanation: "Історія (history) допомагає відновити контекст."

  - id: 9
    type: group-sort
    instruction: "Categorize characteristics: Email vs Messenger."
    groups:
      - name: "Email"
        items: ["Офіційні документи", "Структурований текст", "Час відповіді ~24 год", "Підпис з посадою", "Архівування рішень", "Формальне звертання", "Юридична сила", "Складна верстка", "Важкі файли"]
      - name: "Messenger"
        items: ["Оперативні питання", "Короткі речення", "Час відповіді ~15 хв", "Менш формально", "Емодзі та стікери", "Швидка координація", "Голосові повідомлення", "Стікери", "Групові чати"]

