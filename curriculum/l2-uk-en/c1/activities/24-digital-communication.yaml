  - id: 11
    type: error-correction
    instruction: "Fix the bad email habits."
    items:
      - sentence: "Тема: Питаннячко"
        error: "Питаннячко"
        answer: "Уточнення деталей проекту"
        options: ["Уточнення деталей проекту", "Питання", "Хелп", "Привіт"]
        explanation: "Тема має бути конкретною."
      - sentence: "Я скинув файл."
        error: "скинув"
        answer: "надіслав"
        options: ["надіслав", "кинув", "дав", "жбурнув"]
        explanation: "'Скинув' — це розмовний сленг. Офіційно: надіслав."
      - sentence: "Привіт, як діла?"
        error: "як діла"
        answer: "як справи"
        options: ["як справи", "як воно", "що там", "як життя"]
        explanation: "'Діла' — русизм. Українською: справи."
      - sentence: "Доброго часу доби."
        error: "Доброго часу доби"
        answer: "Добрий день"
        options: ["Добрий день", "Привіт", "Вітаю", "Здоров"]
        explanation: "'Доброго часу доби' — це канцеляризм і помилка. Кажіть: Добрий день/ранок/вечір."
      - sentence: "Я вибачаюсь за затримку."
        error: "вибачаюсь"
        answer: "перепрошую"
        options: ["перепрошую", "сорі", "вибачте", "пробачте"]
        explanation: "'Вибачаюсь' — дія на себе. Правильно: перепрошую або вибачте."
      - sentence: "Нажміть на ссилку."
        error: "Нажміть"
        answer: "Натисніть"
        options: ["Натисніть", "Тисніть", "Клікніть", "Жміть"]
        explanation: "Правильно: натискати. 'Нажати' — русизм."
      - sentence: "Ссилка не працює."
        error: "Ссилка"
        answer: "Посилання"
        options: ["Посилання", "Лінк", "Адреса", "Шлях"]
        explanation: "Правильно: посилання."
      - sentence: "Дякую за увагі."
        error: "увагі"
        answer: "увагу"
        options: ["увагу", "увага", "увазі", "увагою"]
        explanation: "Дякую (за що?) — знахідний відмінок: за увагу."

