      - left: "Sign up"
        right: "Зареєструватися"

  - id: 13
    type: fill-in
    instruction: "Choose the correct preposition."
    items:
      - sentence: "Натисніть **__________** посилання."
        answer: "на"
        options: ["на", "в", "до", "за"]
      - sentence: "Увійти **__________** систему."
        answer: "в"
        options: ["в", "на", "до", "за"]
      - sentence: "Надіслати листа **__________** пошту."
        answer: "на"
        options: ["на", "в", "до", "по"]
      - sentence: "Відповісти **__________** повідомлення."
        answer: "на"
        options: ["на", "за", "в", "до"]
      - sentence: "Доступ **__________** файлу."
        answer: "до"
        options: ["до", "на", "в", "за"]
      - sentence: "Проблема **__________** інтернетом."
        answer: "з"
        options: ["з", "на", "в", "за"]
      - sentence: "Говорити **__________** Zoom."
        answer: "у"
        options: ["у", "на", "в", "по"]
      - sentence: "Зберегти **__________** папку."
        answer: "в"
        options: ["в", "на", "до", "під"]

  - id: 14
    type: quiz
    instruction: "Scenario: What to do?"
    items:
      - question: "Ви випадково натиснули 'Відповісти всім' на особистий лист."
        options:
          - "Одразу написати коротке вибачення всім."
          - "Зробити вигляд, що нічого не сталося."
          - "Звільнитися."
          - "Вимкнути інтернет."
        answer: "Одразу написати коротке вибачення всім."
      - question: "Вам написали в Telegram у вихідний день."
        options:
          - "Відповісти в понеділок вранці (якщо не критично)."
          - "Одразу відповісти."
          - "Накричати."
          - "Заблокувати."
        answer: "Відповісти в понеділок вранці (якщо не критично)."
      - question: "Вам потрібно надіслати файл 500 Мб."
        options:
          - "Завантажити на Google Drive і надіслати посилання."
          - "Прикріпити до листа."
          - "Розбити на 100 листів."
          - "Надіслати поштою на флешці."
        answer: "Завантажити на Google Drive і надіслати посилання."
      - question: "Ви отримали лист із дивною адресою і проханням відкрити архів."
        options:
          - "Позначити як спам і не відкривати."
          - "Відкрити, цікаво ж."
          - "Переслати всім колегам."
          - "Відповісти і спитати, хто це."
        answer: "Позначити як спам і не відкривати."
      - question: "Як звернутися до незнайомої людини в першому листі?"
        options:
          - "Шановний пане/пані."
          - "Привіт."
          - "Доброго часу доби."
          - "Гей."
        answer: "Шановний пане/пані."
      - question: "Колега не відповідає на лист 3 дні."
        options:
          - "Надіслати ввічливе нагадування (Follow-up)."
          - "Написати скаргу директору."
          - "Забути."
          - "Подзвонити вночі."
        answer: "Надіслати ввічливе нагадування (Follow-up)."
      - question: "Чи потрібно писати тему листа?"
        options:
          - "Так, завжди."
          - "Ні, це не обов'язково."
          - "Тільки для директора."
          - "Тільки у свята."
        answer: "Так, завжди."
      - question: "Ви йдете у відпустку. Що зробити з поштою?"
        options:
          - "Налаштувати автовідповідь (Out of office)."
          - "Нічого."
          - "Дати пароль всім колегам."
          - "Видалити скриньку."
        answer: "Налаштувати автовідповідь (Out of office)."

  - id: 15
    type: match-up
