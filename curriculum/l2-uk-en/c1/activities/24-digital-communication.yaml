    instruction: "Match the technical term with its definition."
    pairs:
      - left: "Скріншот"
        right: "Знімок екрана."
      - left: "Браузер"
        right: "Програма для перегляду веб-сторінок."
      - left: "Акаунт"
        right: "Обліковий запис користувача."
      - left: "Логін"
        right: "Ім'я для входу в систему."
      - left: "Пароль"
        right: "Секретний код доступу."
      - left: "Дедлайн"
        right: "Кінцевий термін виконання."
      - left: "Фідбек"
