  - id: 8
    type: match-up
    instruction: "Match the situation with the correct phrase."
    pairs:
      - left: "Ви запізнилися"
        right: "Перепрошую за запізнення."
      - left: "Ви не почули ім'я"
        right: "Вибачте, як до Вас звертатися?"
      - left: "Ви хочете представити колегу"
        right: "Дозвольте представити Вам..."
      - left: "Ви прощаєтеся"
        right: "Дякую за зустріч, до побачення."
      - left: "Ви пропонуєте каву"
        right: "Чи бажаєте Ви кави або чаю?"
      - left: "Ви відмовляєтеся від пропозиції"
        right: "На жаль, я змушений відмовитися."
      - left: "Ви погоджуєтеся"
        right: "З радістю, дякую."
      - left: "Ви висловлюєте вдячність"
        right: "Щиро дякую за гостинність."

  - id: 9
    type: error-correction
    instruction: "Correct common mistakes in business Ukrainian."
    items:
      - sentence: "Ми приймали участь у виставці."
        error: "приймали"
        answer: "брали"
        options: ["брали", "взяли", "мали", "несли"]
        explanation: "Правильно: брати участь (to participate)."
      - sentence: "Згідно наказу директора."
        error: "наказу"
        answer: "наказом"
        options: ["наказом", "наказ", "наказі", "наказу"]
        explanation: "Згідно з (чим?) — орудний відмінок: згідно з наказом."
      - sentence: "Він являється директором."
        error: "являється"
        answer: "є"
        options: ["є", "був", "стає", "має"]
        explanation: "Українською правильно казати: Він Є директором. 'Являтися' може тільки привид."
      - sentence: "Доброго дня, Андрій!"
        error: "Андрій"
        answer: "Андрію"
        options: ["Андрію", "Андрія", "Андрієм", "Андрію"]
        explanation: "При звертанні використовуємо кличний відмінок."
      - sentence: "Ми заключили договір."
        error: "заключили"
        answer: "уклали"
        options: ["уклали", "підписали", "зробили", "склали"]
        explanation: "Договір укладають (або підписують). 'Заключити' — калька."
      - sentence: "На протязі тижня."
        error: "протязі"
        answer: "протягом"
        options: ["протягом", "під час", "за", "в"]
        explanation: "Час — протягом. Протяг — це вітер."
      - sentence: "Приймати міри."
        error: "приймати"
        answer: "вживати"
        options: ["вживати", "робити", "брати", "мати"]
        explanation: "Правильно: вживати заходів."
      - sentence: "Слідуюче питання."
        error: "Слідуюче"
        answer: "Наступне"
        options: ["Наступне", "Інше", "Друге", "Далі"]
        explanation: "Правильно: наступний (next)."

