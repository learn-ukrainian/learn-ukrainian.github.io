    type: group-sort
    instruction: "Categorize clothing items into Business Formal vs Smart Casual."
    groups:
      - name: "Business Formal"
        items: ["Темний костюм", "Краватка", "Біла сорочка", "Сукня-футляр", "Класичні туфлі", "Запонки", "Шовкова хустка", "Шкіряний портфель", "Суворий годинник"]
