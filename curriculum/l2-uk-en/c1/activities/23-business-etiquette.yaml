      - left: "Шановне товариство"
        right: "Звертання до аудиторії на конференції."
      - left: "Колего"
        right: "Звертання до співробітника рівного за рангом."
      - left: "Андрію (Кличний)"
        right: "Звертання на ім'я (менш формально)."
      - left: "Вельмишановний пане"
        right: "Найвищий ступінь поваги (у листах)."

  - id: 3
    type: quiz
    instruction: "Etiquette Quiz based on the text."
    items:
      - question: "Хто перший подає руку для привітання?"
        options:
          - "Старший за посадою або жінка."
          - "Молодший за посадою."
          - "Той, хто зайшов у кімнату."
          - "Чоловік завжди перший."
        answer: "Старший за посадою або жінка."
      - question: "Як звертатися до партнера на ім'я Андрій?"
        options:
          - "Пане Андрію."
          - "Пан Андрій."
          - "Андрій."
          - "Ей, ти."
        answer: "Пане Андрію."
      - question: "Скільки хвилин запізнення вважається 'академічним'?"
        options:
          - "До 5 хвилин."
          - "15 хвилин."
          - "Пів години."
          - "Запізнюватися не можна взагалі."
        answer: "До 5 хвилин."
      - question: "Де має сидіти почесний гість?"
        options:
          - "Праворуч від господаря."
          - "Ліворуч від господаря."
          - "Напроти."
          - "Де захоче."
        answer: "Праворуч від господаря."
      - question: "Що робити з отриманою візитівкою?"
        options:
          - "Прочитати її і покласти перед собою."
          - "Одразу сховати в кишеню."
          - "Зім'яти."
          - "Викинути."
        answer: "Прочитати її і покласти перед собою."
      - question: "Чи прийнято цілувати партнера в щоку при першій зустрічі?"
        options:
          - "Ні, це порушення кордонів."
          - "Так, три рази."
          - "Так, один раз."
          - "Тільки жінок."
        answer: "Ні, це порушення кордонів."
      - question: "Хто платить за ділову вечерю?"
        options:
          - "Сторона, яка запрошує."
          - "Кожен за себе (Go Dutch)."
          - "Гість."
          - "Найбагатший."
        answer: "Сторона, яка запрошує."
      - question: "Який дрес-код є найсуворішим?"
        options:
          - "Business Formal."
          - "Business Casual."
          - "Smart Casual."
          - "Casual."
        answer: "Business Formal."

  - id: 4
    type: fill-in
    instruction: "Fill in the blank with the appropriate word."
    items:
      - sentence: "Прошу надіслати мені **__________** дня зустрічі."
        answer: "порядок"
        options: ["порядок", "план", "графік", "список"]
      - sentence: "Ми отримали офіційне **__________** на конференцію."
        answer: "запрошення"
        options: ["запрошення", "лист", "папір", "виклик"]
      - sentence: "Він завжди дотримується правил ділового **__________**."
        answer: "етикету"
        options: ["етикету", "життя", "сну", "спорту"]
      - sentence: "На зустрічі була присутня вся наша **__________**."
        answer: "команда"
        options: ["команда", "сім'я", "група", "банда"]
      - sentence: "Ми обмінялися **__________** для подальшого зв'язку."
        answer: "візитівками"
        options: ["візитівками", "телефонами", "грошима", "думками"]
      - sentence: "Важливо дотримуватися **__________** у спілкуванні з керівництвом."
        answer: "субординації"
        options: ["субординації", "дистанції", "тиші", "спокою"]
      - sentence: "Він виявив **__________** і не став критикувати колегу публічно."
        answer: "тактовність"
        options: ["тактовність", "слабкість", "силу", "дурість"]
      - sentence: "Компанія дбає про свій позитивний **__________**."
        answer: "імідж"
        options: ["імідж", "вигляд", "стан", "дохід"]

  - id: 5
    type: true-false
    instruction: "Determine if the statement is True or False according to Ukrainian etiquette."
    items:
      - statement: "Можна дарувати дорогі ювелірні прикраси бізнес-партнерам."
        correct: false
        explanation: "Це може бути сприйнято як хабар."
      - statement: "На діловій вечері перший тост виголошує господар."
        correct: true
        explanation: "Це традиція гостинності."
      - statement: "Запізнення на 20 хвилин без попередження є припустимим."
        correct: false
        explanation: "Це прояв неповаги."
      - statement: "Можна прийти на офіційну зустріч у шортах влітку."
        correct: false
        explanation: "Шорти неприпустимі в діловому стилі."
      - statement: "Варто використовувати Кличний відмінок при звертанні."
        correct: true
        explanation: "Це граматична норма української мови."
      - statement: "Відмова від алкоголю на вечері сприймається нормально, якщо вона аргументована."
        correct: true
        explanation: "Головне — пояснити причину (кермо, здоров'я)."
      - statement: "Можна перебивати спікера, якщо ви не згодні."
        correct: false
        explanation: "Треба дочекатися сесії питань-відповідей."
      - statement: "Візитівку можна одразу сховати в задню кишеню штанів."
        correct: false
        explanation: "Це жест зневаги."

