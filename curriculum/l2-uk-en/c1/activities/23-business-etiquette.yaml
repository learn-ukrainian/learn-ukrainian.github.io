      - left: "За господаря цього вечора!"
        right: "Подяка організатору."
      - left: "За мир і перемогу!"
        right: "Актуальний тост у воєнний час."
      - left: "За іменинника!"
        right: "День народження колеги."
      - left: "За нові можливості!"
        right: "Новий рік або початок кварталу."
      - left: "Будьмо!"
        right: "Універсальний короткий тост."

  - id: 15
    type: quiz
    instruction: "Scenario: What would you do?"
    items:
      - question: "Партнер простягає вам руку через стіл. Ваші дії?"
        options:
          - "Встати і потиснути руку."
          - "Потиснути руку сидячи."
          - "Проігнорувати."
          - "Помахати."
        answer: "Встати і потиснути руку."
      - question: "Ви отримали подарунок, який суперечить антикорупційній політиці."
        options:
          - "Ввічливо відмовитися, пояснивши правила компанії."
          - "Взяти і сховати."
          - "Образитися."
          - "Взяти і передати іншому."
        answer: "Ввічливо відмовитися, пояснивши правила компанії."
      - question: "Ви забули ім'я партнера під час представлення."
        options:
          - "Чесно вибачитися і перепитати: 'Нагадайте, будь ласка, ваше ім'я'."
          - "Називати його 'Друже'."
          - "Втекти."
          - "Мовчати весь вечір."
        answer: "Чесно вибачитися і перепитати: 'Нагадайте, будь ласка, ваше ім'я'."
      - question: "Вам телефонують у неробочий час (21:00) по роботі."
        options:
          - "Можна не відповідати, якщо це не критично."
          - "Обов'язково відповісти."
          - "Накричати."
          - "Вимкнути телефон назавжди."
        answer: "Можна не відповідати, якщо це не критично."
      - question: "Ви чхнули під час переговорів."
        options:
          - "Сказати 'Перепрошую'."
          - "Вдати, що нічого не сталося."
          - "Засміятися."
          - "Вийти."
        answer: "Сказати 'Перепрошую'."
      - question: "Колега зробив помилку в презентації."
        options:
          - "Сказати йому про це особисто після зустрічі."
          - "Голосно виправити його при всіх."
          - "Сміятися."
          - "Написати скаргу."
        answer: "Сказати йому про це особисто після зустрічі."
      - question: "Вам подали візитівку двома руками."
        options:
          - "Прийняти її також двома руками (знак особливої поваги)."
          - "Взяти однією рукою."
          - "Не брати."
          - "Впустити."
        answer: "Прийняти її також двома руками (знак особливої поваги)."
      - question: "Ви хочете піти з вечірки раніше."
        options:
