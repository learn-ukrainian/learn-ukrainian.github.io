    type: match-up
    instruction: "Match the term with its definition."
    pairs:
      - left: "Етикет"
        right: "Правила поведінки в суспільстві."
      - left: "Протокол"
        right: "Суворі правила офіційних заходів."
      - left: "Субординація"
        right: "Дотримання службової ієрархії."
      - left: "Дрес-код"
        right: "Вимоги до зовнішнього вигляду."
      - left: "Пунктуальність"
        right: "Вчасне виконання зобов'язань."
      - left: "Порядок денний"
        right: "План питань для обговорення на зустрічі."
      - left: "Модератор"
        right: "Ведучий зустрічі або дискусії."
      - left: "Візитівка"
        right: "Картка з контактними даними."

  - id: 2
    type: match-up
    instruction: "Match the form of address with its usage."
    pairs:
      - left: "Пане Андрію"
        right: "Стандартне ввічливе звертання."
      - left: "Пані Олено"
        right: "Ввічливе звертання до жінки."
