  - id: 11
    type: fill-in
    instruction: "Make the request more polite using 'Чи могли б ви...' or similar."
    items:
      - sentence: "**__________** ви надіслати мені звіт? (Could you send...)"
        answer: "Чи могли б"
        options: ["Чи могли б", "Можете", "Надішліть", "Дайте"]
      - sentence: "**__________** ласка, двері. (Close please...)"
        answer: "Зачиніть, будь"
        options: ["Зачиніть, будь", "Закрийте", "Закрий", "Зачини"]
      - sentence: "**__________** мені, котра година? (Tell me...)"
        answer: "Підкажіть"
        options: ["Підкажіть", "Скажіть", "Кажіть", "Говоріть"]
      - sentence: "**__________** зайти? (May I come in?)"
        answer: "Дозвольте"
        options: ["Дозвольте", "Можна", "Заходжу", "Йду"]
      - sentence: "**__________** передати сіль? (Could you pass...)"
        answer: "Чи не могли б ви"
        options: ["Чи не могли б ви", "Дай", "Передай", "Кинь"]
      - sentence: "**__________** вашу візитівку. (Give me...)"
        answer: "Дайте, будь ласка"
        options: ["Дайте, будь ласка", "Дай", "На", "Бери"]
      - sentence: "**__________** хвилинку уваги. (I ask for...)"
        answer: "Прошу"
        options: ["Прошу", "Хочу", "Треба", "Давай"]
      - sentence: "**__________** вибачення за незручності. (We apologize...)"
        answer: "Приносимо"
        options: ["Приносимо", "Даємо", "Маємо", "Кажемо"]

  - id: 12
    type: quiz
    instruction: "Choose the correct preposition."
    items:
      - sentence: "Звернутися **__________** директора."
        answer: "до"
        options: ["до", "на", "в", "за"]
      - sentence: "Чекати **__________** відповідь."
        answer: "на"
        options: ["на", "за", "до", "в"]
      - sentence: "Дякувати **__________** допомогу."
        answer: "за"
        options: ["за", "на", "про", "до"]
      - sentence: "Вибачитися **__________** запізнення."
        answer: "за"
        options: ["за", "про", "на", "в"]
      - sentence: "Привітати **__________** святом."
        answer: "зі"
        options: ["зі", "з", "на", "про"]
      - sentence: "Надіслати лист **__________** пошті."
        answer: "по"
        options: ["по", "на", "через", "в"]
      - sentence: "Говорити **__________** телефону."
        answer: "по"
        options: ["по", "на", "через", "в"]
      - sentence: "Зустрітися **__________** кавою."
        answer: "за"
        options: ["за", "на", "під", "в"]

  - id: 13
    type: unjumble
    instruction: "Reorder words to form a polite sentence."
    items:
      - words: ["Дозвольте", "мені", "представити", "вам", "нашого", "нового", "колегу"]
        answer: "Дозвольте мені представити вам нашого нового колегу"
      - words: ["Ми", "будемо", "раді", "бачити", "вас", "на", "конференції"]
        answer: "Ми будемо раді бачити вас на конференції"
      - words: ["Я", "хотів", "би", "обговорити", "деталі", "нашого", "контракту"]
        answer: "Я хотів би обговорити деталі нашого контракту"
      - words: ["Дякую", "вам", "за", "приділений", "час", "та", "увагу"]
        answer: "Дякую вам за приділений час та увагу"
      - words: ["На", "жаль", "я", "не", "зможу", "бути", "присутнім"]
        answer: "На жаль я не зможу бути присутнім"
      - words: ["Прошу", "підтвердити", "вашу", "участь", "до", "кінця", "тижня"]
        answer: "Прошу підтвердити вашу участь до кінця тижня"
      - words: ["Чи", "не", "могли", "б", "ви", "надіслати", "презентацію"]
        answer: "Чи не могли б ви надіслати презентацію"
      - words: ["Зустріч", "відбудеться", "о", "десятій", "годині", "ранку"]
        answer: "Зустріч відбудеться о десятій годині ранку"

  - id: 14
    type: match-up
    instruction: "Match the toast with the occasion."
    pairs:
      - left: "За нашу плідну співпрацю!"
        right: "Ділова вечеря з партнерами."
