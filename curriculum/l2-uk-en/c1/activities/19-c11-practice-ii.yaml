module: 19-c11-practice-ii
level: C1
version: '3.0'
activities:
  - type: match-up
    title: "Термінологія медіаграмотності"
    instructions: "З'єднайте термін з його визначенням."
    pairs:
      - left: "Джинса"
        right: "Прихована реклама в медіа."
      - left: "Клікбейт"
        right: "Сенсаційний заголовок для залучення уваги."
      - left: "Фейк"
        right: "Свідомо неправдива інформація."
      - left: "Наратив"
        right: "Історія, що просуває певний світогляд."
      - left: "Бот"
        right: "Програма, що імітує дії людини в соцмережах."
      - left: "Фактчекінг"
        right: "Перевірка тверджень на правдивість."
      - left: "Маніпуляція"
        right: "Вплив на думку через викривлення."
      - left: "Першоджерело"
        right: "Оригінальне джерело інформації."
      - left: "Цензура"
        right: "Контроль влади за змістом медіа."
      - left: "Пропаганда"
        right: "Систематичне поширення ідей для впливу."

  - type: group-sort
    title: "Факт чи судження?"
    instructions: "Визначте, чи є твердження фактом (можна перевірити) чи судженням (особиста думка)."
    groups:
      - name: "Факт"
        items:
          - "Київ — столиця України."
          - "Вода кипить при 100 градусах Цельсія."
          - "Україна здобула незалежність у 1991 році."
          - "Закон набрав чинності 1 січня."
          - "Населення Землі перевищило 8 мільярдів."
          - "Сонце сходить на сході."
          - "Гривня — національна валюта України."
          - "Ця стаття була опублікована вчора."
          - "Президент підписав указ №123."
      - name: "Судження"
        items:
          - "Київ — найкраще місто світу."
          - "Цей закон несправедливий."
          - "1991 рік був найщасливішим в історії."
          - "Уряд працює неефективно."
          - "Економіка скоро впаде."
          - "Літо краще за зиму."
          - "Це найцікавіша стаття ролу."
          - "Політикам не можна вірити."
          - "Ціни занадто високі."

  - type: quiz
    title: "Маркери маніпуляції"
    instructions: "Виберіть правильну відповідь щодо ознак маніпуляції в тексті."
    items:
      - question: "Яке слово в заголовку вказує на маніпуляцію?"
        options:
          - "**ШОК!**"
          - "Повідомлення"
          - "Звіт"
          - "Аналіз"
      - question: "Що робити, якщо в статті немає посилання на джерело?"
        options:
          - "**Не довіряти цій інформації**"
          - "Повірити на слово"
          - "Поширити друзям"
          - "Написати автору листа"
      - question: "Яка фраза є ознакою узагальнення?"
        options:
          - "**Всі знають, що...**"
          - "За даними опитування..."
          - "Експерти зазначають..."
          - "Статистика показує..."
      - question: "Що таке 'мова ворожнечі'?"
        options:
          - "**Агресивні висловлювання проти групи людей**"
          - "Критика влади"
          - "Складна наукова термінологія"
          - "Іноземні слова в тексті"
      - question: "Навіщо використовують фотошоп у фейках?"
        options:
          - "**Щоб викликати сильні емоції**"
          - "Щоб покращити якість фото"
          - "Щоб зменшити розмір файлу"
          - "Щоб зберегти анонімність"
      - question: "Як перевірити автентичність фото?"
        options:
          - "**Через Google Images (пошук за зображенням)**"
          - "Запитати у друзів"
          - "Подивитися на дату публікації"
          - "Збільшити яскравість"
      - question: "Що таке 'астетурфінг'?"
        options:
          - "**Штучне створення громадської думки ботами**"
          - "Вид спорту"
          - "Політичні дебати"
          - "Реклама на телебаченні"
      - question: "Яка мета російських ботоферм?"
        options:
          - "**Посіяти розбрат і зневіру**"
          - "Допомогти українцям"
          - "Заробити гроші на рекламі"
          - "Підтримати демократію"

  - type: group-sort
    title: "Емоційні та нейтральні заголовки"
    instructions: "Розподіліть заголовки за тоном."
    groups:
      - name: "Емоційний / Клікбейт"
        items:
          - "Ви не повірите, що сталося!"
          - "Вченим вдалося приховати це!"
          - "Жахлива трагедія сколихнула місто!"
          - "Це кінець світу!"
          - "Терміново! Всім читати!"
          - "Шок! Сенсація! Скандал!"
          - "Влада приховує правду!"
          - "Неймовірно! Чудодійний засіб!"
          - "Вас обманювали все життя!"
      - name: "Нейтральний / Інформаційний"
        items:
          - "Результати виборів мера."
          - "Прогноз погоди на тиждень."
          - "Вчені відкрили нову планету."
          - "Міська рада ухвалила бюджет."
          - "Звіт про економічний стан."
          - "Інтерв'ю з міністром освіти."
          - "Огляд нових технологій."
          - "Статистика захворюваності за рік."
          - "Нові правила дорожнього руху."

  - type: fill-in
    title: "Аналіз джерел"
    instructions: "Вставте пропущені слова у текст про перевірку джерел."
    items:
      - sentence: "Перше правило фактчекінгу: завжди шукайте [blank]."
        answer: "першоджерело"
      - sentence: "Якщо новина викликає сильні [blank], зупиніться і перевірте її."
        answer: "емоції"
      - sentence: "Варто перевірити, кому належить це [blank]."
        answer: "медіа"
      - sentence: "Анонімні телеграм-канали часто поширюють [blank]."
        answer: "фейки"
      - sentence: "Експерт повинен мати відповідну [blank]."
        answer: "компетенцію"
      - sentence: "[blank] фотографії можна визначити за допомогою спеціальних сервісів."
        answer: "Автентичність"
      - sentence: "Звертайте увагу на [blank] публікації, новина може бути старою."
        answer: "дату"
      - sentence: "Російська [blank] часто використовує тактику 'віддзеркалення'."
        answer: "пропаганда"
    options:
      - першоджерело
      - емоції
      - медіа
      - фейки
      - компетенцію
      - Автентичність
      - дату
      - пропаганда

  - type: true-false
    title: "Інформаційна гігієна"
    instructions: "Визначте, чи є ці дії безпечними в інтернеті."
    items:
      - statement: "Репостити новини, не читаючи зміст (тільки заголовок)."
        answer: false
      - statement: "Перевіряти інформацію в кількох незалежних джерелах."
        answer: true
      - statement: "Вірити всьому, що надсилають родичі у Вайбер."
        answer: false
      - statement: "Ігнорувати джерела, які фінансуються державою-агресором."
        answer: true
      - statement: "Використовувати складні паролі та двофакторну автентифікацію."
        answer: true
      - statement: "Переходити за підозрілими посиланнями."
        answer: false
      - statement: "Критично оцінювати експертів."
        answer: true
      - statement: "Ділитися фотографіями роботи ППО."
        answer: false

  - type: match-up
    title: "Логічні хиби в пропаганді"
    instructions: "З'єднайте метод пропаганди з його описом."
    pairs:
      - left: "Whataboutism"
        right: "Відволікання уваги на проблеми опонента."
      - left: "Гнила риба"
        right: "Бездоказове звинувачення для псування репутації."
      - left: "Ефект ореолу"
        right: "Перенесення іміджу на всі дії особи."
      - left: "Багаторазове повторення"
        right: "Нав'язування брехні через частоту."
      - left: "Створення ворога"
        right: "Консолідація проти уявної загрози."
      - left: "Більшість"
        right: "Ілюзія, що 'всі так думають'."
      - left: "Напівправда"
        right: "Змішування фактів з вигадкою."
      - left: "Анонімний авторитет"
        right: "Посилання на абстрактних 'вчених'."
      - left: "Емоційний резонанс"
        right: "Маніпуляція почуттями жалю чи страху."
      - left: "Виривання з контексту"
        right: "Зміна змісту через неповну цитату."

  - type: essay-response
    title: "Критика статті"
    instructions: "Напишіть критичний відгук на фейкову новину про 'лікувальне сало' (200 слів)."
    rubric:
      - "25%: Аналіз заголовка."
      - "25%: Перевірка джерел."
      - "25%: Наукова точність."
      - "25%: Висновок."
    model_answer: >
      Цей матеріал є класичним прикладом фейку. Заголовок використовує узагальнення ("всі хвороби") та апелює до анонімного авторитету ("британські вчені"). Текст не містить посилань на першоджерела або клінічні дослідження. Мета статті — клікбейт.

  - type: match-up
    title: "Типи ботів"
    instructions: "З'єднайте тип бота з його функцією."
    pairs:
      - left: "Троль"
        right: "Розпалює конфлікти в коментарях."
      - left: "Бот-лайкер"
        right: "Накручує кількість вподобань."
      - left: "Бот-поширювач"
        right: "Автоматично робить репости."
      - left: "ЛОМ (Лідер думок)"
        right: "Блогер, що просуває замовні наративи."
      - left: "Астротурфінг"
        right: "Імітація масової підтримки."
      - left: "Ельф"
        right: "Український інтернет-активіст (анти-троль)."
      - left: "Спамер"
        right: "Масово розсилає рекламу."
      - left: "Фішер"
        right: "Краде паролі через підробні сайти."
      - left: "Діпфейк"
        right: "Відео, створене штучним інтелектом."
      - left: "ІПСО"
        right: "Інформаційно-психологічна операція."

  - type: quiz
    title: "Діпфейки та ШІ"
    instructions: "Виберіть правильне твердження про штучний інтелект в медіа."
    items:
      - question: "Що таке 'діпфейк'?"
        options:
          - "**Відео, де обличчя людини замінено за допомогою ШІ**"
          - "Глибоке синє море"
          - "Фейк, придуманий дуже розумною людиною"
          - "Підробка документів"
      - question: "Як розпізнати діпфейк?"
        options:
          - "**Звертати увагу на неприродне моргання та рухи губ**"
          - "За кольором очей"
          - "Якщо відео коротше 1 хвилини"
          - "Якщо якість дуже висока"
      - question: "Чи може ШІ писати новини?"
        options:
          - "**Так, і це може використовуватися для генерації фейків**"
          - "Ні, ШІ не вміє писати"
          - "Тільки про спорт"
          - "ШІ пише тільки правду"
      - question: "Що робити, якщо ви побачили підозріле відео з Президентом?"
        options:
          - "**Перевірити офіційні канали Президента**"
          - "Терміново поширити"
          - "Написати коментар"
          - "Подзвонити в поліцію"
      - question: "Як ШІ впливає на довіру?"
        options:
          - "**Знижує довіру, бо важче відрізнити правду від вигадки**"
          - "Підвищує довіру"
          - "Ніяк не впливає"
          - "Робить новини цікавішими"
      - question: "Яка небезпека голосових діпфейків?"
        options:
          - "**Шахрайство (дзвінки від імені родичів)**"
          - "Погана якість звуку"
          - "Вони занадто тихі"
          - "Немає небезпеки"
      - question: "Яка мета створення діпфейків про військових?"
        options:
          - "**Деморалізація армії та суспільства**"
          - "Розвага"
          - "Навчання солдатів"
          - "Підняття бойового духу"
      - question: "Чи існують програми для виявлення діпфейків?"
        options:
          - "**Так, але вони не завжди доступні звичайним користувачам**"
          - "Ні, це неможливо"
          - "Так, це вбудована функція в кожному смартфоні"
          - "Тільки в кіно"

  - type: group-sort
    title: "Надійні та ненадійні джерела"
    instructions: "Розподіліть джерела за категоріями довіри."
    groups:
      - name: "Висока довіра (Білий список)"
        items:
          - "Суспільне Мовлення"
          - "Українська Правда"
          - "BBC News Україна"
          - "Радіо Свобода"
          - "Офіційні сайти міністерств (gov.ua)"
          - "Голос Америки"
          - "Укрінформ"
          - "LIGA.net"
          - "Бабель"
      - name: "Низька довіра (Сміттярки / Пропаганда)"
        items:
          - "Telegram-канал 'Легітимний'"
          - "Сайт 'Vesti.ru'"
          - "Telegram-канал 'Резидент'"
          - "Сайт 'Znaj.ua' (часто клікбейт)"
          - "Група у Вайбері 'Новини нашого двору'"
          - "Russia Today (RT)"
          - "Блогер без прізвища"
          - "Сайт 'Super-news.xyz'"
          - "Коментарі ботів у Фейсбуці"

  - type: fill-in
    title: "Алгоритми соцмереж"
    instructions: "Доповніть речення."
    items:
      - sentence: "Алгоритми показують нам те, що нам [blank]."
        answer: "подобається"
      - sentence: "Це створює ефект інформаційної [blank]."
        answer: "бульбашки"
      - sentence: "Facebook заробляє на нашій [blank]."
        answer: "увазі"
      - sentence: "Чим більше [blank] викликає пост, тим більше людей його побачать."
        answer: "емоцій"
      - sentence: "Негативні новини поширюються [blank] за позитивні."
        answer: "швидше"
      - sentence: "[blank] мислення допомагає вийти з бульбашки."
        answer: "Критичне"
      - sentence: "Ми схильні вірити тому, що підтверджує наші [blank]."
        answer: "погляди"
      - sentence: "Соцмережі не зацікавлені в [blank], вони зацікавлені в активності."
        answer: "правді"
    options:
      - подобається
      - бульбашки
      - увазі
      - емоцій
      - швидше
      - Критичне
      - погляди
      - правді

  - type: true-false
    title: "Психологія довіри"
    instructions: "Правда чи міф?"
    items:
      - statement: "Люди схильні вірити інформації, яку чули багато разів."
        answer: true
      - statement: "Розумні люди не піддаються пропаганді."
        answer: false
      - statement: "Страх відключає критичне мислення."
        answer: true
      - statement: "Ми краще запам'ятовуємо факти, ніж емоції."
        answer: false
      - statement: "Пропаганда діє лише на неосвічених."
        answer: false
      - statement: "Визнати свою помилку психологічно важко."
        answer: true
      - statement: "Когнітивні викривлення є у всіх людей."
        answer: true
      - statement: "Фейки часто використовують наші упередження."
        answer: true

  - type: select
    title: "Вибір дії"
    instructions: "Оберіть найкращу дію в цій ситуації."
    items:
      - question: "Ви побачили новину про ядерний удар, але офіційні джерела мовчать."
        options:
          - "**Зберігати спокій і чекати офіційної інформації**"
          - "Терміново бігти в укриття і писати всім знайомим"
          - "Випити йод для профілактики"
          - "Репостити новину з коментарем 'Жах!'"
      - question: "Вам прислали посилання 'Виграй айфон'."
        options:
          - "**Видалити і нікому не пересилати**"
          - "Перейти і перевірити"
          - "Відправити другу, раптом правда"
          - "Спитати у відправника, чи він це виграв"
      - question: "Блогер просить гроші на збір, але не дає звіту."
        options:
          - "**Не донатити, поки не буде звіту або верифікації**"
          - "Скинути 10 гривень, не шкода"
          - "Написати 'Шахрай!'"
          - "Поскаржитися на сторінку"
      - question: "Вам подзвонили 'з банку' і просять код з СМС."
        options:
          - "**Покласти слухавку і передзвонити на офіційний номер банку**"
          - "Сказати код, адже це служба безпеки"
          - "Спитати прізвище оператора"
          - "Почати панікувати"
      - question: "Ви побачили відео, де військові скаржаться на командира, але обличчя закриті."
        options:
          - "**Поставитися критично, це може бути ІПСО**"
          - "Одразу репостити, щоб покарати командира"
          - "Написати гнівний коментар"
          - "Відправити в СБУ"
      - question: "Сайт новин виглядає як BBC, але адреса bbc-news.site."
        options:
          - "**Це фейковий сайт (клонування)**"
          - "Це дзеркало сайту"
          - "Це нова версія сайту"
          - "Це помилка браузера"

  - type: match-up
    title: "Інструменти перевірки"
    instructions: "Що для чого?"
    pairs:
