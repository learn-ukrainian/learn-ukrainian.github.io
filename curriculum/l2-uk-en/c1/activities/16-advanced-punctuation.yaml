- type: essay-response
  id: 16-17-essay
  title: "Punctuation Essay"
  instructions: "Write a short paragraph explaining why 'Стратити не можна помилувати' is a powerful example of punctuation's importance. Use at least 3 sentences."
  min_words: 30
  model_answer: |
    > [!model-answer]
    > Приклад "Стратити не можна помилувати" яскраво демонструє силу пунктуації. Одна маленька кома може кардинально змінити зміст наказу: від смерті до життя. Це нагадує нам, що розділові знаки — це не просто декорація, а важливий інструмент комунікації.
