module: 22-interview-language
level: C1
version: '2.0'
activities:
  - id: 1
    type: match-up
    instruction: "Match the interview term with its definition."
    pairs:
      - left: "Співбесіда"
        right: "Зустріч роботодавця з кандидатом."
      - left: "Рекрутер"
        right: "Фахівець із підбору персоналу."
      - left: "Вакансія"
        right: "Вільна посада в компанії."
      - left: "Оклад"
        right: "Фіксована частина зарплати."
      - left: "Бонуси"
        right: "Додаткова винагорода за результати."
      - left: "Випробувальний термін"
        right: "Період перевірки відповідності працівника."
      - left: "Оффер"
        right: "Офіційна пропозиція про роботу."
      - left: "Фідбек"
        right: "Зворотний зв'язок після інтерв'ю."

  - id: 2
    type: match-up
    instruction: "Match the STAR component with its description."
    pairs:
      - left: "Situation"
        right: "Опис контексту та умов, у яких виникла проблема."
      - left: "Task"
        right: "Конкретне завдання або ціль, що стояла перед вами."
      - left: "Action"
        right: "Конкретні кроки, які ВИ зробили для вирішення."
      - left: "Result"
        right: "Кінцевий вимірний наслідок ваших дій."
      - left: "S (Приклад)"
        right: "Ми втрачали клієнтів через помилки в базі."
      - left: "T (Приклад)"
        right: "Треба було зменшити відтік клієнтів на 10%."
      - left: "A (Приклад)"
        right: "Я впровадив нову систему верифікації даних."
      - left: "R (Приклад)"
        right: "Відтік зменшився на 15%, прибуток зріс."

  - id: 3
    type: quiz
    instruction: "Analyze the Dialogue (Text 1). Answer the questions."
    items:
      - question: "Як почалася розмова (Small Talk)?"
        options:
          - "Обговорення транспорту та виду з вікна."
          - "Обговорення погоди."
          - "Відразу перейшли до питань."
          - "Андрій поскаржився на затори."
        answer: "Обговорення транспорту та виду з вікна."
      - question: "Чому Андрій змінює сферу діяльності?"
        options:
          - "Його навички краще розкриються в IT."
          - "Його звільнили з минулої роботи."
          - "Він хоче більше грошей."
          - "Йому набридла логістика."
        answer: "Його навички краще розкриються в IT."
      - question: "Яку 'суперсилу' назвав Андрій?"
        options:
          - "Емоційний інтелект."
          - "Знання англійської."
          - "Швидкий друк."
          - "Вміння продавати."
        answer: "Емоційний інтелект."
      - question: "Яку слабку сторону він згадав?"
        options:
          - "Перфекціонізм і складність делегування."
          - "Лінь."
          - "Запізнення."
          - "Невміння працювати з Excel."
        answer: "Перфекціонізм і складність делегування."
      - question: "Як Оксана оцінила досвід Андрія?"
        options:
          - "Як переконливий."
          - "Як недостатній."
          - "Як нерелевантний."
          - "Вона промовчала."
        answer: "Як переконливий."
      - question: "Що резонує Андрію в компанії?"
        options:
          - "Інноваційні рішення та соціальний вплив."
          - "Висока зарплата."
          - "Близькість до метро."
          - "Безкоштовна кава."
        answer: "Інноваційні рішення та соціальний вплив."
      - question: "Скільки має тривати самопрезентація?"
        options:
          - "1.5-2 хвилини."
          - "10 хвилин."
          - "30 секунд."
          - "Годину."
        answer: "1.5-2 хвилини."
      - question: "Про що Андрій запитав у відповідь?"
        options:
          - "Він поки не ставив питань у діалозі."
          - "Про зарплату."
          - "Про відпустку."
          - "Про корпоративи."
        answer: "Він поки не ставив питань у діалозі."

  - id: 4
    type: quiz
    instruction: "Analyze the STAR example (Text 2). Answer the questions."
    items:
      - question: "Яка була проблема (Situation)?"
        options:
          - "Конфлікт між відділами продажів і логістики."
          - "Збій сервера."
          - "Звільнення працівника."
          - "Втрата грошей."
        answer: "Конфлікт між відділами продажів і логістики."
      - question: "Що було завданням Андрія (Task)?"
        options:
          - "Знайти компроміс і запустити систему вчасно."
          - "Звільнити винних."
          - "Написати код самому."
          - "Ігнорувати проблему."
        answer: "Знайти компроміс і запустити систему вчасно."
      - question: "Що саме зробив Андрій (Action)?"
        options:
          - "Ініціював фасилітацію і візуалізував процес."
          - "Наказав усім помиритися."
          - "Поскаржився директору."
          - "Нічого не робив."
        answer: "Ініціював фасилітацію і візуалізував процес."
      - question: "У чому була причина конфлікту?"
        options:
          - "Непорозумінні термінології."
          - "Особистій неприязні."
          - "Низькій зарплаті."
          - "Поганій погоді."
        answer: "Непорозумінні термінології."
      - question: "Який був результат (Result)?"
        options:
          - "Конфлікт вичерпано, ефективність зросла на 20%."
          - "Проект закрили."
          - "Андрія звільнили."
          - "Нічого не змінилося."
        answer: "Конфлікт вичерпано, ефективність зросла на 20%."
      - question: "Які дієслова краще використовувати?"
        options:
          - "Доконаного виду (зробив, досягнув)."
          - "Недоконаного виду (робив, ходив)."
          - "Безособові (було зроблено)."
          - "Майбутнього часу (зроблю)."
        answer: "Доконаного виду (зробив, досягнув)."
      - question: "Чому метод STAR ефективний?"
        options:
          - "Бо він базується на фактах і результатах."
          - "Бо він довгий."
          - "Бо він дозволяє брехати."
          - "Бо він складний."
        answer: "Бо він базується на фактах і результатах."
      - question: "Що означає A в абревіатурі STAR?"
        options:
          - "Action (Дія)."
          - "Analysis (Аналіз)."
          - "Ambition (Амбіція)."
          - "Answer (Відповідь)."
        answer: "Action (Дія)."

  - id: 5
    type: fill-in
    instruction: "Fill in the blank with the appropriate vocabulary word."
    items:
      - sentence: "Я надіслав своє резюме на **__________** менеджера."
        answer: "вакансію"
        options: ["вакансію", "роботу", "офіс", "стіл"]
      - sentence: "Мене запросили на **__________** з HR-менеджером."
        answer: "співбесіду"
        options: ["співбесіду", "каву", "прогулянку", "вечірку"]
      - sentence: "Компанія пропонує конкурентну **__________** та бонуси."
        answer: "зарплату"
        options: ["зарплату", "роботу", "їжу", "схему"]
      - sentence: "У мене великий **__________** роботи в цій сфері."
        answer: "досвід"
        options: ["досвід", "час", "інтерес", "день"]
      - sentence: "Моя головна **__________** — професійний розвиток."
        answer: "мотивація"
        options: ["мотивація", "проблема", "іграшка", "думка"]
      - sentence: "Ми підписали **__________** на один рік."
        answer: "контракт"
        options: ["контракт", "папір", "лист", "чек"]
      - sentence: "**__________** термін триває три місяці."
        answer: "Випробувальний"
        options: ["Випробувальний", "Довгий", "Короткий", "Веселий"]
      - sentence: "Я готовий працювати на умовах часткової **__________**."
        answer: "зайнятості"
        options: ["зайнятості", "роботи", "свободи", "відпустки"]

  - id: 6
    type: fill-in
    instruction: "Choose the correct preposition."
    items:
      - sentence: "Відповідати **__________** вимогам вакансії."
        answer: "відповідно до"
        options: ["відповідно до", "на", "за", "з"]
      - sentence: "Претендувати **__________** посаду."
        answer: "на"
        options: ["на", "за", "в", "до"]
      - sentence: "Домовитися **__________** співбесіду."
        answer: "про"
        options: ["про", "за", "на", "з"]
      - sentence: "Працювати **__________** проектом."
        answer: "над"
        options: ["над", "на", "з", "за"]
      - sentence: "Звільнитися **__________** роботи."
        answer: "з"
        options: ["з", "від", "до", "на"]
      - sentence: "Впливати **__________** результати."
        answer: "на"
        options: ["на", "в", "за", "до"]
      - sentence: "Залежно **__________** досвіду."
        answer: "від"
        options: ["від", "з", "до", "на"]
      - sentence: "Готуватися **__________** інтерв'ю."
        answer: "до"
        options: ["до", "на", "за", "в"]

  - id: 7
    type: match-up
    instruction: "Match the question to the interviewer with its strategic purpose."
    pairs:
      - left: "Які пріоритети на перші 3 місяці?"
        right: "Показує орієнтацію на результат."
      - left: "Як вимірюється успіх на цій посаді?"
        right: "Демонструє прагнення до чітких KPI."
      - left: "Чому ця вакансія відкрита?"
        right: "Допомагає зрозуміти стабільність/ріст."
      - left: "Які можливості для навчання?"
        right: "Показує бажання розвиватися."
      - left: "Який стиль управління в команді?"
        right: "Перевірка Cultural Fit."
      - left: "Які найбільші виклики зараз?"
        right: "Демонструє готовність вирішувати проблеми."
      - left: "Хто буде моїм ментором?"
        right: "Показує запит на підтримку."
      - left: "Які наступні кроки відбору?"
        right: "Уточнення організаційних моментів."

  - id: 8
    type: true-false
    instruction: "Identify correct Interview Etiquette."
    items:
      - statement: "Варто прийти на співбесіду за 10-15 хвилин до початку."
        correct: true
        explanation: "Це показує пунктуальність."
      - statement: "Можна перебивати рекрутера, щоб показати ентузіазм."
        correct: false
        explanation: "Це ознака невихованості."
      - statement: "Слід вимкнути телефон або поставити на беззвучний режим."
        correct: true
        explanation: "Телефон не має відволікати."
      - statement: "Можна негативно відгукуватися про минулого керівника."
        correct: false
        explanation: "Це 'червоний прапорець' для рекрутера."
      - statement: "Варто підготувати питання до роботодавця заздалегідь."
        correct: true
        explanation: "Це показує вашу підготовку."
      - statement: "На питання про слабкі сторони треба казати 'у мене їх немає'."
        correct: false
        explanation: "Це звучить нещиро і самовпевнено."
      - statement: "Зарплату 'net' в Україні називають 'на руки'."
        correct: true
        explanation: "Це сума після сплати податків."
      - statement: "Можна прийти в шортах, якщо це IT-компанія."
        correct: false
        explanation: "Краще обрати Smart Casual, якщо не впевнені."

  - id: 9
    type: group-sort
    instruction: "Categorize the skill as Hard Skill or Soft Skill."
    groups:
      - name: "Hard Skills"
        items: ["Знання Python", "Володіння Excel", "Водійські права", "Фінансовий аналіз", "Дизайн в Figma", "Сертифікат ACCA", "Знання SQL", "Бюджетування", "SEO-оптимізація"]
      - name: "Soft Skills"
        items: ["Комунікабельність", "Емоційний інтелект", "Робота в команді", "Лідерство", "Стресостійкість", "Креативність", "Адаптивність", "Критичне мислення", "Емпатія"]

  - id: 10
    type: unjumble
    instruction: "Reorder the words to form correct sentences using the STAR method."
    items:
      - words: ["Я", "впровадив", "нову", "систему", "звітності", "минулого", "місяця"]
        answer: "Я впровадив нову систему звітності минулого місяця"
      - words: ["Це", "дозволило", "збільшити", "продажі", "на", "двадцять", "відсотків"]
        answer: "Це дозволило збільшити продажі на двадцять відсотків"
      - words: ["Моїм", "завданням", "було", "організувати", "велику", "конференцію"]
        answer: "Моїм завданням було організувати велику конференцію"
      - words: ["Ми", "успішно", "завершили", "проект", "раніше", "визначеного", "терміну"]
        answer: "Ми успішно завершили проект раніше визначеного терміну"
      - words: ["Я", "ініціював", "проведення", "щотижневих", "зустрічей", "команди"]
        answer: "Я ініціював проведення щотижневих зустрічей команди"
      - words: ["Результатом", "стало", "підвищення", "лояльності", "наших", "клієнтів"]
        answer: "Результатом стало підвищення лояльності наших клієнтів"
      - words: ["Я", "розробив", "стратегію", "виходу", "на", "нові", "ринки"]
        answer: "Я розробив стратегію виходу на нові ринки"
      - words: ["Проблема", "виникла", "через", "недостатню", "комунікацію", "між", "відділами"]
        answer: "Проблема виникла через недостатню комунікацію між відділами"

  - id: 11
    type: error-correction
    instruction: "Find and correct the mistake (Russianism or Calque)."
    items:
      - sentence: "Я приймав участь у конференції."
        error: "приймав"
        answer: "брав"
        options: ["брав", "взяв", "мав", "ніс"]
        explanation: "Правильно: брати участь (to take part)."
      - sentence: "Це не складає мені проблем."
        error: "складає"
        answer: "становить"
        options: ["становить", "робить", "є", "має"]
        explanation: "Правильно: становити проблему/загрозу."
      - sentence: "Давайте обговоримо це питання."
        error: "Давайте"
        answer: "Обговорімо"
        options: ["Обговорімо", "Нумо", "Давай", "Хай"]
        explanation: "В українській мові спонукання виражається наказовим способом (обговорімо)."
      - sentence: "Я рахую, що це важливо."
        error: "рахую"
        answer: "вважаю"
        options: ["вважаю", "думаю", "гадаю", "мислю"]
        explanation: "Рахувати можна гроші. Думку висловлюють словом 'вважати'."
      - sentence: "Моя точка зору співпадає з вашою."
        error: "співпадає"
        answer: "збігається"
        options: ["збігається", "сходиться", "однакова", "така"]
        explanation: "Правильно: збігатися (to coincide)."
      - sentence: "На протязі року я працював там."
        error: "протязі"
        answer: "протягом"
        options: ["протягом", "під час", "за", "в"]
        explanation: "На протязі - це 'in the draft' (wind). Час - протягом."
      - sentence: "Я вибачаюся за запізнення."
        error: "вибачаюся"
        answer: "перепрошую"
        options: ["перепрошую", "вибачте", "даруйте", "сорі"]
        explanation: "Вибачаюся - це 'вибачаю себе'. Треба казати: перепрошую або вибачте."
      - sentence: "Самий кращий кандидат."
        error: "Самий"
        answer: "Найкращий"
        options: ["Найкращий", "Ліпший", "Дуже", "Топ"]
        explanation: "Найвищий ступінь порівняння утворюється префіксом най-."

  - id: 12
    type: match-up
    instruction: "Match the English term with its Ukrainian professional equivalent."
    pairs:
      - left: "Team player"
        right: "Командний гравець"
      - left: "Problem solver"
        right: "Той, хто вирішує проблеми"
      - left: "Goal-oriented"
        right: "Орієнтований на результат"
      - left: "Self-motivated"
        right: "Вмотивований / Ініціативний"
      - left: "Detail-oriented"
        right: "Уважний до деталей"
      - left: "Fast learner"
        right: "Швидко навчаюся"
      - left: "Open-minded"
        right: "Відкритий до нового"
      - left: "Reliable"
        right: "Надійний / Відповідальний"

  - id: 13
    type: fill-in
    instruction: "Choose the correct aspect (Done vs Doing)."
    items:
      - sentence: "Я **__________** цей проект два роки."
        answer: "вів"
        options: ["вів", "повів", "вивів", "завів"]
      - sentence: "Я **__________** проект успішно минулого місяця."
        answer: "завершив"
        options: ["завершив", "завершував", "робив", "кінчав"]
      - sentence: "Ми **__________** над цією проблемою довго."
        answer: "працювали"
        options: ["працювали", "опрацювали", "зробили", "виконали"]
      - sentence: "Ми **__________** проблему за два дні."
        answer: "вирішили"
        options: ["вирішили", "вирішували", "думали", "гадали"]
      - sentence: "Я **__________** звіти щотижня."
        answer: "писав"
        options: ["писав", "написав", "зробив", "склав"]
      - sentence: "Я **__________** звіт вчора."
        answer: "написав"
        options: ["написав", "писав", "робив", "творив"]
      - sentence: "Я завжди **__________** дедлайнів."
        answer: "дотримувався"
        options: ["дотримувався", "дотримався", "тримай", "брав"]
      - sentence: "Цього разу я **__________** слова."
        answer: "дотримав"
        options: ["дотримав", "дотримував", "тримав", "взяв"]

  - id: 14
    type: quiz
    instruction: "Negotiation Tactics Quiz."
    items:
      - question: "Коли найкраще говорити про зарплату?"
        options:
          - "Коли роботодавець сам запитає або зробить офер."
          - "Зразу 'з порога'."
          - "Ніколи, хай платять скільки хочуть."
          - "У ліфті."
        answer: "Коли роботодавець сам запитає або зробить офер."
      - question: "Якщо вам пропонують менше, ніж ви хочете, що робити?"
        options:
