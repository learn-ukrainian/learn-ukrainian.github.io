  - id: 9
    type: true-false
    instruction: "Determine if the statement about Ukrainian business culture is True or False."
    items:
      - statement: "У сучасному діловому листуванні прийнято звертатися 'Пане/Пані'."
        correct: true
        explanation: "Це повернення до українських традицій звертання."
      - statement: "Використання суржику або кальок з російської мови додає авторитету."
        correct: false
        explanation: "Навпаки, це ознака низької мовної культури."
      - statement: "Волонтерський досвід високо цінується українськими роботодавцями."
        correct: true
        explanation: "Це свідчить про активну громадянську позицію."
      - statement: "У резюме варто писати 'Мною було зроблено' замість 'Я зробив' або 'Зроблено'."
        correct: false
        explanation: "Пасивні конструкції з орудним відмінком (мною) вважаються застарілими і канцелярськими."
      - statement: "Закон про мову вимагає складання резюме українською мовою."
        correct: true
        explanation: "Державна мова є обов'язковою у публічній сфері."
      - statement: "Можна використовувати будь-який шрифт та колір у резюме."
        correct: false
        explanation: "Варто дотримуватися ділового стилю і читабельності."
      - statement: "Роботодавець має право запитувати про релігійні переконання."
        correct: false
        explanation: "Це дискримінація, заборонена КЗпП."
      - statement: "Мотиваційний лист має дублювати резюме."
        correct: false
        explanation: "Він має доповнювати резюме і пояснювати мотивацію."

  - id: 10
    type: fill-in
    instruction: "Fill in the blank with the appropriate vocabulary word."
    items:
      - sentence: "Перед співбесідою варто уважно вивчити вимоги до **__________**."
        answer: "вакансії"
        options: ["вакансії", "роботи", "офісу", "зарплати"]
      - sentence: "Ваш **__________** лист має пояснити, чому ви хочете працювати саме тут."
        answer: "мотиваційний"
        options: ["мотиваційний", "супровідний", "любовний", "відкритий"]
      - sentence: "Рекрутери звертають увагу на ваші професійні **__________**."
        answer: "компетенції"
        options: ["компетенції", "мрії", "хобі", "очі"]
      - sentence: "Успішне **__________** залежить від якості підготовки документів."
        answer: "працевлаштування"
        options: ["працевлаштування", "навчання", "відпочинок", "лікування"]
      - sentence: "Він отримав **__________** магістра з міжнародного права."
        answer: "диплом"
        options: ["диплом", "сертифікат", "атестат", "грамоту"]
      - sentence: "Вкажіть вашу актуальну **__________** проживання."
        answer: "адресу"
        options: ["адресу", "вулицю", "країну", "пошту"]
      - sentence: "Вимога до кандидата: вільне **__________** англійською мовою."
        answer: "володіння"
        options: ["володіння", "знання", "розуміння", "читання"]
      - sentence: "Обов'язковим пунктом є українське **__________**."
        answer: "громадянство"
        options: ["громадянство", "походження", "коріння", "прізвище"]

  - id: 11
    type: essay-response
    title: "Мотиваційний лист"
    prompt: "Напишіть мотиваційний лист (450+ слів) на посаду Старшого менеджера проектів у великій українській ІТ-компанії. Обґрунтуйте свій інтерес до цифрової трансформації, проаналізуйте свій досвід управління та поясніть зв'язок ваших цінностей з місією компанії."
    min_words: 450
    model_answer: "Вельмишановна пані Рекрутер / Пане Рекрутер! Звертаюся до Вас із великим зацікавленням щодо вакансії Старшого менеджера проектів... [See full model answer in module text]"
    rubric:
      - criteria: "Регістр"
        description: "Суворе дотримання офіційно-ділового стилю."
        points: 5
      - criteria: "Синтаксис"
        description: "Використання складних речень та безособових конструкцій."
        points: 5
      - criteria: "Лексика"
        description: "Вживання професійної термінології."
        points: 5
      - criteria: "Аргументація"
        description: "Логічний зв'язок досвіду з вакансією."
        points: 5

