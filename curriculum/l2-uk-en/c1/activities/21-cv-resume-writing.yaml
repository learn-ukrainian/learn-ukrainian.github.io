  - id: 13
    type: true-false
    instruction: "Identify common mistakes in resume writing."
    items:
      - statement: "Варто писати резюме на 5-6 сторінок, щоб показати весь досвід."
        correct: false
        explanation: "Резюме має бути лаконічним (1-2 сторінки)."
      - statement: "Можна використовувати фото з вечірки, якщо ви там гарні."
        correct: false
        explanation: "Фото має бути професійним."
      - statement: "Варто трохи перебільшити досвід, щоб отримати роботу."
        correct: false
        explanation: "Брехня завжди викривається під час перевірки."
      - statement: "Необхідно ретельно перевіряти граматику та орфографію."
        correct: true
        explanation: "Помилки псують перше враження."
      - statement: "Використання ключових слів з вакансії підвищує шанси."
        correct: true
        explanation: "Це допомагає пройти автоматизовані системи (ATS)."
      - statement: "Можна надсилати лист без теми."
        correct: false
        explanation: "Тема листа є обов'язковою для ділового листування."
      - statement: "Файл краще називати своїм ім'ям (Petrenko_CV.pdf)."
        correct: true
        explanation: "Це спрощує пошук вашого резюме рекрутером."
      - statement: "Шрифт Comic Sans ідеально підходить для резюме."
        correct: false
        explanation: "Варто використовувати стандартні ділові шрифти (Arial, Calibri)."

  - id: 14
    type: fill-in
    instruction: "Choose the correct preposition for the phrase."
    items:
      - sentence: "Я пишу цей лист **__________** директора компанії."
        answer: "до"
        options: ["до", "на", "в", "за"]
      - sentence: "Він відповідальний **__________** фінансовий відділ."
        answer: "за"
