module: 21-cv-resume-writing
level: C1
version: '2.0'
activities:
  - id: 1
    type: match-up
    instruction: "Match the document type or term with its definition."
    pairs:
      - left: "Резюме"
        right: "Стислий виклад фактів про освіту та досвід."
      - left: "Автобіографія"
        right: "Хронологічний опис життя від першої особи."
      - left: "Мотиваційний лист"
        right: "Текст-аргументація, чому ви підходите компанії."
      - left: "Супровідний лист"
        right: "Коротке повідомлення при надсиланні резюме."
      - left: "Вакансія"
        right: "Вільна посада в штатному розписі."
      - left: "Рекомендація"
        right: "Відгук попереднього роботодавця про працівника."
      - left: "Компетенція"
        right: "Здатність успішно діяти на основі знань."
      - left: "Рекрутер"
        right: "Фахівець із пошуку та підбору персоналу."

  - id: 2
    type: match-up
    instruction: "Match the informal phrase with its formal equivalent (Official-Business Style)."
    pairs:
      - left: "Я допомагав колегам"
        right: "Забезпечував методичну підтримку персоналу"
      - left: "Я придумав ідею"
        right: "Ініціював та впровадив інноваційне рішення"
      - left: "Я добре знаю мову"
        right: "Володію мовою на рівні C1"
      - left: "Я керував людьми"
        right: "Здійснював керівництво командою"
      - left: "Я багато працював"
        right: "Демонстрував високу працездатність"
      - left: "Я хочу отримати роботу"
        right: "Маю намір обійняти вакантну посаду"
      - left: "Я вчився в університеті"
        right: "Здобув вищу освіту в університеті"
      - left: "Я вирішував проблеми"
        right: "Забезпечував врегулювання проблемних ситуацій"

  - id: 3
    type: fill-in
    instruction: "Transform the verb phrase into a verbal noun (Nominalization). Use the Genitive case for the object if needed."
    items:
      - sentence: "Аналізувати ринок -> **__________** ринку"
        answer: "Аналіз"
        options: ["Аналіз", "Аналізування", "Проаналізовано", "Аналітик"]
      - sentence: "Впроваджувати стандарти -> **__________** стандартів"
        answer: "Впровадження"
        options: ["Впровадження", "Впровадив", "Впроваджено", "Впроваджуючи"]
      - sentence: "Керувати проектом -> **__________** проектом"
        answer: "Керівництво"
        options: ["Керівництво", "Керування", "Керуючий", "Керовано"]
      - sentence: "Забезпечувати якість -> **__________** якості"
        answer: "Забезпечення"
        options: ["Забезпечення", "Забезпечив", "Забезпечено", "Забезпечуючи"]
      - sentence: "Створювати контент -> **__________** контенту"
        answer: "Створення"
        options: ["Створення", "Створив", "Створено", "Створіння"]
      - sentence: "Розвивати бізнес -> **__________** бізнесу"
        answer: "Розвиток"
        options: ["Розвиток", "Розвивання", "Розвинув", "Розвинуто"]
      - sentence: "Підтримувати клієнтів -> **__________** клієнтів"
        answer: "Підтримка"
        options: ["Підтримка", "Підтримання", "Підтримав", "Підтримано"]
      - sentence: "Контролювати виконання -> **__________** виконання"
        answer: "Контроль"
        options: ["Контроль", "Контролювання", "Контролював", "Контрольовано"]

  - id: 4
    type: fill-in
    instruction: "Complete the sentence using the impersonal construction (-но/-то) derived from the verb in brackets."
    items:
      - sentence: "У звіті **__________** (записати) всі недоліки."
        answer: "записано"
        options: ["записано", "записали", "записав", "записують"]
      - sentence: "Рішення **__________** (прийняти) одноголосно."
        answer: "прийнято"
        options: ["прийнято", "прийняли", "прийняв", "приймають"]
      - sentence: "Проект **__________** (розробити) у стислі терміни."
        answer: "розроблено"
        options: ["розроблено", "розробили", "розробив", "розробляють"]
      - sentence: "Угоду **__________** (підписати) вчора."
        answer: "підписано"
        options: ["підписано", "підписали", "підписав", "підписують"]
      - sentence: "Роботу **__________** (завершити) вчасно."
        answer: "завершено"
        options: ["завершено", "завершили", "завершив", "завершують"]
      - sentence: "Факт **__________** (встановити) під час перевірки."
        answer: "встановлено"
        options: ["встановлено", "встановили", "встановив", "встановлюють"]
      - sentence: "Захід **__________** (провести) на високому рівні."
        answer: "проведено"
        options: ["проведено", "провели", "провів", "проводять"]
      - sentence: "Питання **__________** (узгодити) з керівництвом."
        answer: "узгоджено"
        options: ["узгоджено", "узгодили", "узгодив", "узгоджують"]

  - id: 5
    type: quiz
    instruction: "Analyze Text 1 (Autobiography) and general principles. Answer the questions."
    items:
      - question: "Який стиль використовується в автобіографії?"
        options:
          - "Наративний, хронологічний"
          - "Тезовий, функціональний"
          - "Художній, емоційний"
          - "Розмовний, побутовий"
        answer: "Наративний, хронологічний"
      - question: "Яка інформація є обов'язковою в автобіографії?"
        options:
          - "Дата і місце народження, адреса"
          - "Улюблене хобі та колір"
          - "Список прочитаних книг"
          - "Імена домашніх тварин"
        answer: "Дата і місце народження, адреса"
      - question: "Від якої особи пишеться автобіографія?"
        options:
          - "Від першої (Я...)"
          - "Від третьої (Він...)"
          - "Від другої (Ти...)"
          - "У безособовій формі"
        answer: "Від першої (Я...)"
      - question: "Як зазначається громадянство в автобіографії?"
        options:
          - "Громадянство — Україна"
          - "Я громадянин світу"
          - "Маю паспорт України"
          - "Живу в Україні"
        answer: "Громадянство — Україна"
      - question: "Чи потрібно вказувати склад сім'ї в автобіографії?"
        options:
          - "Так, це стандартна вимога"
          - "Ні, це конфіденційна інформація"
          - "Тільки якщо є діти"
          - "Тільки для чоловіків"
        answer: "Так, це стандартна вимога"
      - question: "Що пишеться в кінці автобіографії?"
        options:
          - "Дата і підпис"
          - "Дякую за увагу"
          - "З повагою"
          - "Чекаю на відповідь"
        answer: "Дата і підпис"
      - question: "Як описується навчання?"
        options:
          - "У хронологічному порядку"
          - "Від найвищого ступеня"
          - "Хаотично"
          - "Тільки університет"
        answer: "У хронологічному порядку"
      - question: "Чи вказується відсутність судимості?"
        options:
          - "Так, часто це обов'язковий пункт"
          - "Ні, це образа"
          - "Тільки для суддів"
          - "За бажанням"
        answer: "Так, часто це обов'язковий пункт"

  - id: 6
    type: quiz
    instruction: "Analyze Text 2 (Resume) and modern trends. Answer the questions."
    items:
      - question: "На чому зроблено акцент у сучасному резюме?"
        options:
          - "На досягненнях та результатах"
          - "На детальному описі дитинства"
          - "На переліку всіх посадових обов'язків"
          - "На особистих проблемах"
        answer: "На досягненнях та результатах"
      - question: "Які слова допомагають пройти автоматичний відбір (ATS)?"
        options:
          - "Ключові слова (оптимізовано, впроваджено)"
          - "Складні метафори"
          - "Цитати відомих людей"
          - "Жаргонні вирази"
        answer: "Ключові слова (оптимізовано, впроваджено)"
      - question: "Який обсяг резюме вважається оптимальним?"
        options:
          - "1-2 сторінки"
          - "5-6 сторінок"
          - "Пів сторінки"
          - "10 сторінок"
        answer: "1-2 сторінки"
      - question: "Що таке 'Soft Skills'?"
        options:
          - "Особистісні якості та комунікативні навички"
          - "Технічні знання"
          - "Знання мов програмування"
          - "Вміння працювати з обладнанням"
        answer: "Особистісні якості та комунікативні навички"
      - question: "Чи варто додавати фото в українське резюме?"
        options:
          - "Так, це поширена практика"
          - "Ні, це заборонено"
          - "Тільки для моделей"
          - "Ніколи"
        answer: "Так, це поширена практика"
      - question: "Як краще описувати досвід роботи?"
        options:
          - "У зворотному хронологічному порядку"
          - "Від першої роботи до останньої"
          - "За алфавітом компаній"
          - "За важливістю посади"
        answer: "У зворотному хронологічному порядку"
      - question: "Що таке 'Hard Skills'?"
        options:
          - "Професійні технічні навички"
          - "Вміння дружити"
          - "Риси характеру"
          - "Фізична сила"
        answer: "Професійні технічні навички"
      - question: "Чи потрібно адаптувати резюме під вакансію?"
        options:
          - "Так, обов'язково"
          - "Ні, одне резюме для всіх"
          - "Тільки супровідний лист"
          - "Не має значення"
        answer: "Так, обов'язково"

