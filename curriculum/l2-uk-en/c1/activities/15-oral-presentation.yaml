module: 15-oral-presentation
level: C1
version: '1.0'
activities:
  # 1. Signposting Phrases (Match-up)
  - type: match-up
    id: 15-act-01
    instruction: "Співставте фрази з етапом презентації."
    pairs:
      - "Дозвольте представити...": "Вступ"
      - "Сьогодні я розповім про...": "Оголошення теми"
      - "На цьому графіку ви бачите...": "Основна частина (візуалізація)"
      - "Переходячи до наступного пункту...": "Перехід"
      - "На завершення хочу сказати...": "Висновки"
      - "Дякую за увагу.": "Завершення"
      - "Я готовий відповісти на запитання.": "Запрошення до дискусії"
      - "По-перше, розглянемо...": "Структурування"

  # 2. Q&A Diplomatic Responses (Quiz)
  - type: quiz
    id: 15-act-02
    instruction: "Виберіть найкращу відповідь на складне запитання."
    items:
      - question: "Слухач ставить запитання, на яке ви не знаєте відповіді."
        options:
          - "Я не знаю, погугліть."
          - "Це дурне питання."
          - "Дякую за цікаве запитання. На жаль, зараз у мене немає точних даних, але я можу перевірити і надіслати вам відповідь."
        answer: "Дякую за цікаве запитання. На жаль, зараз у мене немає точних даних, але я можу перевірити і надіслати вам відповідь."
      - question: "Слухач не погоджується з вашою тезою і починає сперечатися під час виступу."
        options:
          - "Ви помиляєтесь, сядьте."
          - "Давайте обговоримо це після презентації, щоб не затримувати інших."
          - "Замовкніть, я тут доповідач."
        answer: "Давайте обговоримо це після презентації, щоб не затримувати інших."
      - question: "Ви не почули або не зрозуміли запитання."
        options:
          - "Що?"
          - "Говоріть голосніше."
          - "Перепрошую, чи не могли б ви уточнити запитання?"
        answer: "Перепрошую, чи не могли б ви уточнити запитання?"
      - question: "Запитання зовсім не стосується теми вашої доповіді."
        options:
          - "Це не по темі."
          - "Це цікавий аспект, але він виходить за межі мого сьогоднішнього дослідження."
          - "Я про це не говорив."
        answer: "Це цікавий аспект, але він виходить за межі мого сьогоднішнього дослідження."
      - question: "Хтось перебиває вас."
        options:
          - "Не перебивайте!"
          - "Дозвольте я закінчу думку, а потім ми повернемося до цього."
          - "Ігнорувати."
        answer: "Дозвольте я закінчу думку, а потім ми повернемося до цього."
      - question: "Вам ставлять провокаційне запитання."
        options:
          - "Агресивно відповісти."
          - "Спокійно подякувати за точку зору і повернутися до фактів."
          - "Піти зі сцени."
        answer: "Спокійно подякувати за точку зору і повернутися до фактів."
      - question: "Ви забули слово або збилися."
        options:
          - "Втекти."
          - "Перепросити, зробити паузу, подивитися в нотатки і продовжити."
          - "Плакати."
        answer: "Перепросити, зробити паузу, подивитися в нотатки і продовжити."
      - question: "Час вийшов, а ви ще не закінчили."
        options:
          - "Швидко пропустити слайди до висновків."
          - "Продовжувати говорити, ігноруючи модератора."
          - "Зупинитися на півслові."
        answer: "Швидко пропустити слайди до висновків."

  # 3. Slide Design Critique (Fill-in)
  - type: fill-in
    id: 15-act-03
    instruction: "Заповніть пропуски словами, що стосуються дизайну слайдів."
    items:
      - text: "Слайди не повинні мати забагато [тексту]."
      - text: "Використовуйте [шрифт] великого розміру."
      - text: "Кожен слайд повинен мати [заголовок]."
      - text: "Краще один раз [показати], ніж сто разів розказати."
      - text: "Уникайте [яскравих] кольорів, від яких болять очі."
      - text: "Використовуйте [списки] замість довгих абзаців."
      - text: "[Зображення] повинні бути високої якості."
      - text: "Не читайте [зі слайда], розповідайте!"

  # 4. Structure Ordering (Match-up)
  - type: match-up
    id: 15-act-04
    instruction: "Розташуйте етапи презентації в логічному порядку (1-8)."
    pairs:
      - "Привітання та представлення": "1"
      - "Оголошення теми та регламенту": "2"
      - "Актуальність проблеми (Гачок)": "3"
      - "Основна частина (Аргументи)": "4"
      - "Практичні приклади": "5"
      - "Висновки": "6"
      - "Заклик до дії": "7"
      - "Сесія запитань і відповідей": "8"

  # 5. Rhetorical Devices (Quiz)
  - type: quiz
    id: 15-act-05
    instruction: "Визначте риторичний прийом."
    items:
      - question: "'Хіба ми не хочемо жити краще?'"
        options:
          - "Риторичне запитання"
          - "Метафора"
          - "Гіпербола"
        answer: "Риторичне запитання"
      - question: "'Навігація в морі інформації'"
        options:
          - "Риторичне запитання"
          - "Метафора"
          - "Повтор"
        answer: "Метафора"
      - question: "'Ми дослідили, ми побачили, ми зрозуміли.'"
        options:
          - "Трикомпонентний список"
          - "Антитеза"
          - "Іронія"
        answer: "Трикомпонентний список"
      - question: "'Це не просто помилка, це катастрофа.'"
        options:
          - "Градація"
          - "Порівняння"
          - "Алегорія"
        answer: "Градація"
      - question: "'З одного боку..., з іншого боку...'"
        options:
          - "Протиставлення"
          - "Гіпербола"
          - "Уособлення"
        answer: "Протиставлення"
      - question: "'Я мільйон разів казав...'"
        options:
          - "Гіпербола"
          - "Літота"
          - "Епітет"
        answer: "Гіпербола"
      - question: "'Шановні колеги!'"
        options:
          - "Звертання"
          - "Вигук"
          - "Вставне слово"
        answer: "Звертання"
      - question: "'Отже, що ми маємо в результаті?'"
        options:
          - "Питання-відповідь"
          - "Парцеляція"
          - "Інверсія"
        answer: "Питання-відповідь"

  # 6. Presentation Anxiety (Fill-in)
  - type: fill-in
    id: 15-act-06
    instruction: "Вставте слова, щоб завершити поради щодо подолання хвилювання."
    items:
      - text: "Зробіть глибокий [вдих] перед виходом на сцену."
      - text: "Випийте трохи [води], якщо пересохло в горлі."
      - text: "Знайдіть у залі [дружнє] обличчя і говоріть до цієї людини."
      - text: "Пам'ятайте, що аудиторія на вашому [боці]."
      - text: "Не бійтеся робити [паузи], це додає ваги словам."
      - text: "Хороша [підготовка] — найкращі ліки від страху."
      - text: "Якщо ви помилилися, просто [усміхніться] і продовжуйте."
      - text: "Контролюйте свої [жести], не махайте руками хаотично."

  # 7. Opening Phrases (Match-up)
  - type: match-up
    id: 15-act-07
    instruction: "Поєднайте тип вступу з прикладом."
    pairs:
      - "Шокуюча статистика": "Чи знаєте ви, що 90% стартапів помирають у перший рік?"
      - "Цитата": "Як казав Ейнштейн, уява важливіша за знання."
      - "Історія": "У 2010 році я вперше зіткнувся з цією проблемою..."
      - "Риторичне питання": "Чому ми всі сьогодні тут зібралися?"
      - "Провокаційна заява": "Традиційна освіта померла."
      - "Візуалізація": "Уявіть собі світ без електрики."
      - "Загадка": "Що спільного між яблуком і комп'ютером?"
      - "Жарт": "Вчені довели, що презентації після обіду найважчі, тому я буду коротким."

  # 8. Transition Signals (Quiz)
  - type: quiz
    id: 15-act-08
    instruction: "Яку фразу краще використати для переходу?"
    items:
      - question: "Ви закінчили говорити про проблему і переходите до рішення."
        options:
          - "А тепер про хороше."
          - "Розглянувши проблему, перейдімо до можливих рішень."
          - "Далі буде рішення."
        answer: "Розглянувши проблему, перейдімо до можливих рішень."
      - question: "Ви хочете додати ще один аргумент."
        options:
          - "Більше того,..."
          - "І ще одне..."
          - "Також..."
        answer: "Більше того,..."
      - question: "Ви хочете навести приклад."
        options:
          - "Наприклад,..."
          - "Дивіться сюди..."
          - "Як от..."
        answer: "Наприклад,..."
      - question: "Ви хочете протиставити думки."
        options:
          - "Але..."
          - "З іншого боку,..."
          - "Ні..."
        answer: "З іншого боку,..."
      - question: "Ви хочете підкресліти важливість."
        options:
          - "Особливу увагу слід звернути на..."
          - "Круто, що..."
          - "Важливо..."
        answer: "Особливу увагу слід звернути на..."
      - question: "Ви хочете повернутися до попереднього пункту."
        options:
          - "Як було зазначено раніше..."
          - "Назад..."
          - "Згадаємо..."
        answer: "Як було зазначено раніше..."
      - question: "Ви хочете пояснити причину."
        options:
          - "Це зумовлено тим, що..."
          - "Тому що..."
          - "Бо..."
        answer: "Це зумовлено тим, що..."
      - question: "Ви хочете підсумувати розділ."
        options:
          - "Коротше кажучи..."
          - "Підсумовуючи цей розділ,..."
          - "Все."
        answer: "Підсумовуючи цей розділ,..."

  # 9. Conclusion Techniques (Fill-in)
  - type: fill-in
    id: 15-act-09
    instruction: "Заповніть пропуски."
    items:
      - text: "У висновку варто ще раз [озвучити] основну тезу."
      - text: "Не додавайте [нову] інформацію у висновки."
      - text: "Закінчіть сильним [закликом] до дії."
      - text: "Подякуйте аудиторії за [увагу]."
      - text: "Залиште свої [контакти] на останньому слайді."
      - text: "Запитайте, чи є у аудиторії [питання]."
      - text: "Висновок має бути [коротким] і чітким."
      - text: "Останнє враження — [найважливіше]."

  # 10. Voice and Body Language (Match-up)
  - type: match-up
    id: 15-act-10
    instruction: "Поєднайте проблему з порадою."
    pairs:
      - "Монотонний голос": "Змінюйте інтонацію та темп."
      - "Тихий голос": "Дихайте діафрагмою, говоріть 'у дальній кут'."
      - "Швидкий темп": "Робіть паузи, дихайте."
      - "Руки в кишенях": "Використовуйте відкриті жести."
      - "Погляд в підлогу": "Дивіться в очі слухачам (або на голови)."
      - "Спина до залу (читання слайдів)": "Поверніться до аудиторії, комп'ютер має бути перед вами."
      - "Хитання з боку в бік": "Встаньте впевнено, ноги на ширині плечей."
      - "Слова-паразити (еее, ну)": "Краще мовчазна пауза, ніж 'еее'."

  # 11. Visual Aids Vocabulary (Quiz)
  - type: quiz
    id: 15-act-11
    instruction: "Виберіть правильний термін."
    items:
      - question: "Діаграма у формі кола."
        options:
          - "Кругова діаграма"
          - "Стовпчикова діаграма"
          - "Графік"
        answer: "Кругова діаграма"
      - question: "Лінія, що показує тренд."
        options:
          - "Графік"
          - "Таблиця"
          - "Схема"
        answer: "Графік"
      - question: "Списки з крапками."
        options:
          - "Маркований список"
          - "Нумерований список"
          - "Абзац"
        answer: "Маркований список"
      - question: "Малюнок, що пояснює структуру."
        options:
          - "Схема"
          - "Фото"
          - "Креслення"
        answer: "Схема"
      - question: "Роздатковий матеріал."
        options:
          - "Хендаут"
          - "Брошура"
          - "Книга"
        answer: "Хендаут"
      - question: "Пристрій для перемикання слайдів."
        options:
          - "Клікер"
          - "Мишка"
          - "Пульт"
        answer: "Клікер"
      - question: "Екран, на який проектується зображення."
        options:
          - "Проектор"
          - "Екран"
          - "Дошка"
        answer: "Екран"
      - question: "Шрифт без зарубок (наприклад, Arial)."
        options:
          - "Sans Serif"
          - "Serif"
          - "Italic"
        answer: "Sans Serif"

  # 12. Handling Difficult Situations (Fill-in)
  - type: fill-in
    id: 15-act-12
    instruction: "Вставте пропущене слово."
    items:
      - text: "Якщо зник «звук», говоріть голосніше."
      - text: "Якщо зламався «проектор», розповідайте без слайдів."
      - text: "Якщо ви «запізнилися», скоротіть вступ."
      - text: "Завжди майте резервну копію презентації на «флешці»."
      - text: "Перевірте «обладнання» заздалегідь."
      - text: "Візьміть з собою пляшку «води»."
      - text: "Одягніться «зручно» і професійно."
      - text: "Будьте готові до будь-яких «несподіванок»."

  # 13. Presentation Ethics (Quiz)
  - type: quiz
    id: 15-act-13
    instruction: "Що є порушенням етики?"
    items:
      - question: "Використання чужих зображень без посилання."
        options:
          - "Порушення"
          - "Норма"
        answer: "Порушення"
      - question: "Перевищення регламенту на 10 хвилин."
        options:
          - "Порушення"
          - "Норма, якщо цікаво"
        answer: "Порушення"
      - question: "Читання тексту з листка."
        options:
          - "Непрофесійно"
          - "Професійно"
        answer: "Непрофесійно"
      - question: "Критика попереднього доповідача."
        options:
          - "Неетично"
          - "Нормально"
        answer: "Неетично"
      - question: "Відмова відповідати на запитання."
        options:
          - "Небажано"
          - "Нормально"
        answer: "Небажано"
      - question: "Використання занадто дрібного шрифту."
        options:
          - "Неповага до аудиторії"
          - "Економія місця"
        answer: "Неповага до аудиторії"
      - question: "Поворот спиною до залу."
        options:
          - "Ігнорування"
          - "Демонстрація спини"
        answer: "Ігнорування"
      - question: "Жарти, що можуть образити."
        options:
          - "Табу"
          - "Весело"
        answer: "Табу"

  # 14. Signposting Categories (Match-up)
  - type: match-up
    id: 15-act-14
    instruction: "До якої категорії належить фраза?"
    pairs:
      - "По-перше... По-друге...": "Послідовність"
      - "Наприклад...": "Ілюстрація"
      - "Тобто...": "Перефразування"
      - "Узагальнюючи...": "Підсумок"
      - "Як я вже казав...": "Посилання назад"
      - "Перейдемо до...": "Зміна теми"
      - "Дозвольте закінчити...": "Завершення"
      - "Це означає, що...": "Пояснення причини/наслідку"

  # 15. Active vs Passive Voice (Quiz)
  - type: quiz
    id: 15-act-15
    instruction: "Який варіант краще звучить у презентації?"
    items:
      - question: "Варіант А: Ми досягли значних успіхів. Варіант Б: Значні успіхи були досягнуті нами."
        options:
          - "Варіант А"
          - "Варіант Б"
        answer: "Варіант А"
      - question: "Варіант А: Дослідження було проведено минулого року. Варіант Б: Ми провели дослідження минулого року."
        options:
          - "Варіант А"
          - "Варіант Б"
        answer: "Варіант Б"
      - question: "Варіант А: Я пропоную змінити стратегію. Варіант Б: Пропонується зміна стратегії."
        options:
          - "Варіант А"
          - "Варіант Б"
        answer: "Варіант А"
      - question: "Варіант А: Помилка була зроблена. Варіант Б: Ми помилилися."
        options:
          - "Варіант А"
          - "Варіант Б (якщо берете відповідальність)"
        answer: "Варіант Б (якщо берете відповідальність)"
      - question: "Варіант А: Гроші були витрачені. Варіант Б: Ми витратили гроші."
        options:
          - "Варіант Б"
          - "Варіант А"
        answer: "Варіант Б"
      - question: "Варіант А: Це дозволить нам вирости. Варіант Б: Це дозволить зростання."
        options:
          - "Варіант А"
          - "Варіант Б"
        answer: "Варіант А"
      - question: "Варіант А: Я хочу показати вам... Варіант Б: Вашій увазі пропонується..."
        options:
          - "Варіант А"
          - "Варіант Б"
        answer: "Варіант А"
      - question: "Варіант А: Давайте почнемо. Варіант Б: Дозвольте розпочати."
        options:
          - "Варіант А (більш динамічно)"
          - "Варіант Б (більш офіційно)"
        answer: "Варіант А (більш динамічно)"

  # 16. Preparation Checklist (Match-up)
  - type: match-up
    id: 15-act-16
    instruction: "Співставте етап підготовки з дією."
    pairs:
      - "Аналіз аудиторії": "Хто вони і чого хочуть?"
