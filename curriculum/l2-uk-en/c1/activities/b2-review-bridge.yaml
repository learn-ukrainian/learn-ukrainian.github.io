- type: essay-response
  title: 'Аналіз стилістичної доречності'
  instruction: 'Прочитайте ситуацію та напишіть розгорнуту відповідь (200-250 слів), дотримуючись відповідного стилю.'
  prompt: 'Ви — керівник відділу. Ваш підлеглий надіслав вам звіт, написаний розмовною мовою зі сленгом. Напишіть йому електронний лист із зауваженнями, використовуючи офіційно-діловий стиль, але зберігаючи доброзичливий тон. Поясніть, чому стиль звіту неприйнятний.'
  min_words: 200
  model_answer: "Шановний Андрію! Дякую за надісланий звіт. Ознайомившись із ним, я виявив низку стилістичних невідповідностей. Документ містить багато розмовних зворотів та сленгових виразів, які є неприпустимими в діловій комунікації. Офіційно-діловий стиль вимагає точності, об''єктивності та стандартизованої лексики. Прошу Вас відредагувати текст, замінивши емоційні висловлювання на нейтральні конструкції, та надіслати виправлений варіант до кінця робочого дня. З повагою, [Ваше ім''я]."