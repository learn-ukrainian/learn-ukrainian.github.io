- type: translate
  title: 'Переклад з урахуванням регістру'
  items:
    - source: 'I think this is a good idea.'
      options:
        - text: 'Я вважаю, що ця ідея є конструктивною.'
          correct: true
        - text: 'Я думаю, це класна штука.'
          correct: false
        - text: 'Мені здається, це норм.'
          correct: false
        - text: 'Це гарна ідея, як на мене.'
          correct: false
      explanation: 'В академічному контексті (C1) краще вживати «Я вважаю» та «конструктивна», ніж прості «думаю» та «гарна».'
    - source: 'Because of the rain, we stopped working.'
      options:
        - text: 'У зв''язку з погодними умовами роботи призупинено.'
          correct: true
        - text: 'Через дощ ми перестали робити.'
          correct: false
        - text: 'Ми стали, бо дощ пішов.'
          correct: false
        - text: 'Роботу стопнули через зливу.'
          correct: false
      explanation: 'Офіційний стиль вимагає конструкцій «У зв''язку з...» та безособових форм «призупинено».'
    - source: 'The man standing by the window is my boss.'
      options:
        - text: 'Чоловік, що стоїть біля вікна, — мій керівник.'
          correct: true
        - text: 'Стоячий біля вікна чоловік — мій бос.'
          correct: false
        - text: 'Чоловік біля вікна — мій шеф.'
          correct: false
        - text: 'Той, хто стоїть там, — начальник.'
          correct: false
      explanation: 'Уникайте кальки «стоячий» (активний дієприкметник). Використовуйте підрядне речення «що стоїть».'
    - source: 'Despite the problems, we succeeded.'
      options:
        - text: 'Незважаючи на труднощі, ми досягли успіху.'
          correct: true
        - text: 'Не дивлячись на проблеми, ми виграли.'
          correct: false
        - text: 'Попри все, у нас вийшло.'
          correct: false
        - text: 'Хоча були проблеми, ми змогли.'
          correct: false
      explanation: '«Незважаючи на» — правильний прийменник допустовості. «Не дивлячись на» означає фізично не дивитися.'
    - source: 'This article was written by a famous scientist.'
      options:
        - text: 'Цю статтю написав відомий вчений.'
          correct: true
        - text: 'Ця стаття була написана відомим вченим.'
          correct: false
        - text: 'Стаття написана вченим.'
          correct: false
        - text: 'Статтю написано вченим.'
          correct: false
      explanation: 'Якщо є виконавець (вчений), українська мова надає перевагу активному стану.'
  instruction: 'Оберіть найбільш вдалий переклад для академічного або офіційного контексту (C1).'

- type: unjumble
  title: 'Фразеологія у реченні'
  items:
    - words: ['досить', 'вже', 'бити', 'байдики', 'пора', 'братися', 'за', 'роботу', 'засукавши', 'рукави', 'і', 'показати', 'результат']
      answer: 'Досить вже бити байдики пора братися за роботу засукавши рукави і показати результат'
    - words: ['не', 'варто', 'згущувати', 'фарби', 'адже', 'ситуація', 'не', 'така', 'вже', 'й', 'критична', 'як', 'здається']
      answer: 'Не варто згущувати фарби адже ситуація не така вже й критична як здається'
    - words: ['він', 'на', 'цій', 'справі', 'собаку', 'з''їв', 'тому', 'може', 'вирішити', 'проблему', 'із', 'заплющеними', 'очима']
      answer: 'Він на цій справі собаку з''їв тому може вирішити проблему із заплющеними очима'
    - words: ['замість', 'того', 'щоб', 'переливати', 'з', 'пустого', 'в', 'порожнє', 'давайте', 'перейдемо', 'до', 'конструктивних', 'пропозицій']
      answer: 'Замість того щоб переливати з пустого в порожнє давайте перейдемо до конструктивних пропозицій'
    - words: ['якщо', 'ти', 'будеш', 'сидіти', 'склавши', 'руки', 'то', 'успіх', 'сам', 'до', 'тебе', 'не', 'прийде']
      answer: 'Якщо ти будеш сидіти склавши руки то успіх сам до тебе не прийде'
  instruction: 'Складіть речення з фразеологізмами, відновивши правильний порядок слів.'

- type: error-correction
  title: 'Стилістичний редактор: Змішування стилів'
  items:
    - sentence: 'У своїй дисертації автор надибав купу цікавих аргументів.'
      error: 'надибав купу'
      answer: 'виявив низку'
      error_type: 'register'
      options:
        - 'виявив низку'
        - 'знайшов багато'
        - 'відкопав трохи'
        - 'побачив масу'
      explanation: 'Слова «надибати» і «купа» є розмовними. У науковому стилі вживаємо «виявити» та «низка» або «значна кількість».'
    - sentence: 'Шановний директоре, я в шоці від вашого рішення.'
      error: 'в шоці від'
      answer: 'здивований вашим'
      error_type: 'register'
      options:
        - 'здивований вашим'
        - 'вражений від'
        - 'не розумію'
        - 'обурений через'
      explanation: 'В офіційному листуванні емоційні вирази типу «в шоці» неприпустимі. Вживайте стримані формулювання: «здивований», «не погоджуюся».'
    - sentence: 'Науковці повинні тримати язик за зубами про свої відкриття до публікації.'
      error: 'тримати язик за зубами'
      answer: 'не розголошувати інформацію'
      error_type: 'register'
      options:
        - 'не розголошувати інформацію'
        - 'мовчати'
        - 'нічого не казати'
        - 'бути тихо'
      explanation: 'Фразеологізм «тримати язик за зубами» є занадто розмовним для контексту наукової етики. Краще: «не розголошувати інформацію».'
    - sentence: 'Згідно з наказом, треба засукати рукави і працювати.'
      error: 'треба засукати рукави'
      answer: 'необхідно активізувати роботу'
      error_type: 'register'
      options:
        - 'необхідно активізувати роботу'
        - 'треба добре працювати'
        - 'слід почати робити'
        - 'потрібно взятися за діло'
      explanation: 'В офіційному наказі не вживаються образні фразеологізми. Використовуйте стандартні канцеляризми: «активізувати», «забезпечити виконання».'
    - sentence: 'Цей закон просто капець який важливий.'
      error: 'просто капець який'
      answer: 'надзвичайно'
      error_type: 'register'
      options:
        - 'надзвичайно'
        - 'дуже-дуже'
        - 'реально'
        - 'страшенно'
      explanation: 'Сленгове слово «капець» руйнує серйозність висловлювання про закон. Вживайте «надзвичайно», «вкрай».'
  instruction: 'Виправте стилістичні помилки, замінивши розмовні або сленгові вирази на відповідні до контексту (наукового чи офіційного).'

