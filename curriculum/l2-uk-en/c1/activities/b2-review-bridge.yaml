- type: quiz
  title: 'Рівень C1: Філософія та компетенції'
  items:
    - question: 'Яка ключова відмінність між рівнем B2 та C1 згідно з описом у цьому модулі, особливо в контексті вибору мовних засобів для комунікації?'
      explanation: 'На рівні C1 головним критерієм стає доречність (appropriateness) та вміння обирати правильний регістр, а не просто передача інформації.'
      options:
        - text: 'Вміння обирати найточніші інструменти та відчувати стилістичну доречність'
          correct: true
        - text: 'Знання більшої кількості слів та ідіом'
          correct: false
        - text: 'Відсутність граматичних помилок у простих реченнях'
          correct: false
        - text: 'Здатність говорити дуже швидко без пауз'
          correct: false
    - question: 'Чому використання конструкції «книга читається студентом» вважається стилістичною помилкою та проявом «синтаксичної отрути» в українській мові?'
      explanation: 'Українська мова вимагає активного стану, коли є конкретний виконавець (студент). Пасив з «-ся» вживається, коли виконавець неважливий або дія відбувається сама собою.'
      options:
        - text: 'Тому що це калька, яка ігнорує активну природу українського синтаксису'
          correct: true
        - text: 'Тому що дієслово читати не має форми на -ся'
          correct: false
        - text: 'Тому що студент не може читати книгу вголос'
          correct: false
        - text: 'Тому що це речення занадто довге для розмови'
          correct: false
    - question: 'У якому функціональному стилі найбільш доречно використовувати безособові форми на -но/-то, такі як «рішення ухвалено» або «наказ підписано»?'
      explanation: 'Ці форми ідеальні для офіційно-ділового стилю, де важливий факт дії, а не особа виконавця, що забезпечує об''єктивність та протокольність.'
      options:
        - text: 'В офіційно-діловому та науковому стилях'
          correct: true
        - text: 'У розмовному стилі під час бесіди з друзями'
          correct: false
        - text: 'У художньому стилі для опису природи'
          correct: false
        - text: 'У публіцистичному стилі для емоційного впливу'
          correct: false
    - question: 'Який з наведених варіантів заміни активного дієприкметника «бажаючі» є найбільш природним та літературним для сучасної української мови?'
      explanation: 'Слово «охочі» є природним українським відповідником, тоді як «бажаючі» — це калька з російської мови, якої слід уникати.'
      options:
        - text: 'Охочі'
          correct: true
        - text: 'Ті, що бажають'
          correct: false
        - text: 'Бажальні'
          correct: false
        - text: 'Хотіючі'
          correct: false
    - question: 'Яка основна функція дієприкметникового звороту в науковому стилі згідно з матеріалами цього навчального модуля?'
      explanation: 'Дієприкметниковий зворот дозволяє «згорнути» підрядне речення, забезпечуючи лаконічність та економію мовних засобів, що важливо для науки.'
      options:
        - text: 'Забезпечення точності та економії мовних засобів'
          correct: true
        - text: 'Надання тексту емоційного забарвлення'
          correct: false
        - text: 'Збільшення кількості слів у реченні'
          correct: false
        - text: 'Спрощення тексту для дітей'
          correct: false
  instruction: 'Оберіть правильну відповідь, спираючись на теоретичний матеріал модуля.'

- type: group-sort
  title: 'Класифікація функціональних стилів'
  groups:
    - name: 'Науковий стиль'
      items:
        - 'Методом аналізу встановлено закономірність.'
        - 'Отримані дані підтверджують гіпотезу.'
        - 'Спостерігається кореляція між явищами.'
        - 'За результатами експерименту виявлено тенденцію.'
    - name: 'Офіційно-діловий стиль'
      items:
        - 'Згідно з наказом прошу надати відпустку.'
        - 'Рішення ухвалено одноголосно.'
        - 'Договір набуває чинності з моменту підписання.'
        - 'Прошу надати мені матеріальну допомогу.'
    - name: 'Розмовний стиль'
      items:
        - 'Слухай, там таке робиться, просто капець!'
        - 'Може, гайнемо на каву після роботи?'
        - 'Я в шоці від цієї погоди.'
        - 'Та не переймайся ти так через дурниці!'
  instruction: 'Розподіліть наведені речення за відповідними функціональними стилями.'

- type: match-up
  title: 'Типи пасивних конструкцій'
  pairs:
    - left: 'Прямий пасив з -ся'
      right: 'Цей журнал видається щомісяця.'
    - left: 'Безособова форма на -но/-то'
      right: 'Рішення ухвалено одноголосно.'
    - left: 'Пасивний стан (характеристика)'
      right: 'Двері зачинені на замок.'
    - left: 'Інверсія (логічний наголос)'
      right: 'Цю пісню співають у кожному селі.'
    - left: 'Активна конструкція (Норма)'
      right: 'Комісія розглянула заяву.'
    - left: 'Канцелярит (Помилка)'
      right: 'Мною було зроблено помилку.'
    - left: 'Неозначено-особове речення'
      right: 'Там будують нову школу.'
    - left: 'Активна форма (Заміна пасиву)'
      right: 'Ми виконали завдання вчасно.'
    - left: 'Калька з російської (Уникати)'
      right: 'Завдання виконується студентом.'
  instruction: 'З''єднайте назву граматичної конструкції з відповідним прикладом.'

- type: error-correction
  title: 'Редактор: Виправлення пасивних конструкцій'
  items:
    - sentence: 'Ця проблема вирішується нашим новим менеджером.'
      error: 'вирішується нашим новим менеджером'
      answer: 'вирішує наш новий менеджер'
      error_type: 'construction'
      options:
        - 'вирішує наш новий менеджер'
        - 'була вирішена менеджером'
        - 'вирішена менеджером'
        - 'вирішується через менеджера'
      explanation: 'Пасив з «-ся» не вживається з дійовою особою в орудному відмінку. Потрібен активний стан: «Хто робить що».'
    - sentence: 'Закон приймається депутатами Верховної Ради.'
      error: 'приймається депутатами'
      answer: 'приймають депутати'
      error_type: 'construction'
      options:
        - 'приймають депутати'
        - 'був прийнятий депутатами'
        - 'прийнятий депутатами'
        - 'приймається через депутатів'
      explanation: 'Депутати — це активні діячі. Вживання пасиву тут є грубою стилістичною помилкою (калькою).'
    - sentence: 'Мною було написано цю доповідь вчора.'
      error: 'Мною було написано'
      answer: 'Я написав'
      error_type: 'register'
      options:
        - 'Я написав'
        - 'Мною написано'
        - 'Було написано мною'
        - 'Доповідь написалася мною'
      explanation: 'Конструкція «Мною було зроблено» є важким канцеляризмом. Вживайте просту активну форму: «Я зробив».'
    - sentence: 'Усі помилки були виправлені вчителем.'
      error: 'були виправлені вчителем'
      answer: 'виправив учитель'
      error_type: 'construction'
      options:
        - 'виправив учитель'
        - 'виправлялися вчителем'
        - 'були виправлені через вчителя'
        - 'виправлені учителем'
      explanation: 'Якщо є виконавець (вчитель), речення має бути активним: «Учитель виправив усі помилки».'
    - sentence: 'Книга читається учнями з великим інтересом.'
      error: 'читається учнями'
      answer: 'читають учні'
      error_type: 'construction'
      options:
        - 'читають учні'
        - 'була прочитана учнями'
        - 'прочитується учнями'
        - 'читана учнями'
      explanation: 'Книга не може «читати себе». Правильно: «Учні читають книгу».'
  instruction: 'Виправте речення, замінивши неприродні пасивні конструкції на активні.'

- type: unjumble
  title: 'Синтаксис наукового стилю'
  items:
    - words: ['отримані', 'в', 'ході', 'експерименту', 'дані', 'повністю', 'підтверджують', 'нашу', 'попередню', 'гіпотезу', 'про', 'зміни', 'клімату']
      answer: 'Отримані в ході експерименту дані повністю підтверджують нашу попередню гіпотезу про зміни клімату'
    - words: ['методом', 'спектрального', 'аналізу', 'було', 'встановлено', 'що', 'дана', 'речовина', 'містить', 'високу', 'концентрацію', 'рідкісних', 'елементів']
      answer: 'Методом спектрального аналізу було встановлено що дана речовина містить високу концентрацію рідкісних елементів'
    - words: ['враховуючи', 'всі', 'історичні', 'чинники', 'ми', 'можемо', 'зробити', 'висновок', 'про', 'циклічність', 'економічних', 'процесів', 'у', 'державі']
      answer: 'Враховуючи всі історичні чинники ми можемо зробити висновок про циклічність економічних процесів у державі'
    - words: ['теорія', 'розроблена', 'українськими', 'вченими', 'минулого', 'століття', 'лягла', 'в', 'основу', 'сучасних', 'досліджень', 'у', 'цій', 'галузі']
      answer: 'Теорія розроблена українськими вченими минулого століття лягла в основу сучасних досліджень у цій галузі'
    - words: ['оскільки', 'експеримент', 'не', 'дав', 'очікуваних', 'результатів', 'на', 'першому', 'етапі', 'ми', 'змушені', 'переглянути', 'стратегію']
      answer: 'Оскільки експеримент не дав очікуваних результатів на першому етапі ми змушені переглянути стратегію'
  instruction: 'Складіть речення, дотримуючись правильного порядку слів наукового стилю. Зверніть увагу на дієприкметникові звороти.'

- type: mark-the-words
  title: 'Полювання на кальки: Активні дієприкметники'
  instruction: 'Знайдіть у тексті штучні активні дієприкметники (кальки з російської), які не є нормою в літературній мові.'
  text: 'На конференції були присутні бажаючі виступити студенти. Всі виступаючі підготували цікаві доповіді. Відпочиваючі на морі туристи насолоджувалися сонцем. Подорожуючі Європою українці часто зустрічають земляків. Завідуючий відділенням підписав наказ. Керуючий банком провів нараду.'
  answers:
    - 'бажаючі'
    - 'виступаючі'
    - 'Відпочиваючі'
    - 'Подорожуючі'
    - 'Завідуючий'
    - 'Керуючий'

- type: fill-in
  title: 'Трансформація: Уникнення кальок'
  items:
    - sentence: 'Всі ______ взяли участь у дискусії.'
      answer: 'охочі'
      options:
        - 'охочі'
        - 'бажаючі'
        - 'хотіючі'
        - 'бажальні'
      explanation: 'Замість «бажаючі» (калька) вживаємо «охочі» або «ті, хто бажає».'
    - sentence: '______ кафедри провів засідання.'
      answer: 'Завідувач'
      options:
        - 'Завідувач'
        - 'Завідуючий'
        - 'Завідатель'
        - 'Керуючий'
      explanation: 'Замість «завідуючий» (активний дієприкметник) вживаємо іменник «завідувач».'
    - sentence: 'На пероні стояли втомлені ______.'
      answer: 'подорожні'
      options:
        - 'подорожні'
        - 'подорожуючі'
        - 'мандруючі'
        - 'їздячі'
      explanation: 'Замість «подорожуючі» краще вживати іменники «подорожні» або «мандрівники».'
    - sentence: 'Наступний рік буде ______ роком.'
      answer: 'прийдешнім'
      options:
        - 'прийдешнім'
        - 'наступаючим'
        - 'ідучим'
        - 'настаючим'
      explanation: 'Замість «наступаючий» (калька) кажемо «прийдешній» або «наступний».'
    - sentence: 'Він є ______ директором заводу.'
      answer: 'чинним'
      options:
        - 'чинним'
        - 'діючим'
        - 'робочим'
        - 'активним'
      explanation: 'Замість «діючий» (у значенні current) вживаємо «чинний».'
    - sentence: 'У залі зібралися ______.'
      answer: 'протестувальники'
      options:
        - 'протестувальники'
        - 'протестуючі'
        - 'бастуючі'
        - 'мітингуючі'
      explanation: 'Замість «протестуючі» використовуємо іменник «протестувальники».'
  instruction: 'Оберіть правильний нормативний варіант, щоб уникнути суржику та кальок.'

- type: select
  title: 'Визначення стилістичних маркерів'
  items:
    - question: 'Які з наведених слів та зворотів є характерними маркерами офіційно-ділового стилю? Оберіть усі правильні варіанти.'
      options:
        - text: 'Згідно з чинним законодавством'
          correct: true
        - text: 'Взяти бика за роги'
          correct: false
        - text: 'Відповідно до наказу'
          correct: true
        - text: 'На підставі викладеного'
          correct: true
        - text: 'Гайнемо на каву'
          correct: false
      min_correct: 3
      explanation: 'Офіційний стиль використовує стандартизовані прийменникові конструкції («згідно з», «відповідно до»). Фразеологізми та сленг тут недоречні.'
    - question: 'Які риси притаманні науковому стилю мовлення згідно з матеріалами модуля? Оберіть усі правильні варіанти.'
      options:
        - text: 'Логічність та доказовість викладу'
          correct: true
        - text: 'Використання термінології'
          correct: true
        - text: 'Надмірна емоційність та окличні речення'
          correct: false
        - text: 'Вживання пасивних дієприкметникових зворотів'
          correct: true
        - text: 'Використання діалектних слів'
          correct: false
      min_correct: 3
      explanation: 'Науковий стиль характеризується об''єктивністю, точністю та використанням спеціальної лексики. Емоції та діалектизми йому не властиві.'
    - question: 'Які з наведених фраз є прикладами стилістичного дисонансу (невідповідності)? Оберіть усі правильні варіанти.'
      options:
        - text: 'У ході серйозного дослідження ми надибали прикольні факти.'
          correct: true
        - text: 'Кохана, я офіційно заявляю про свої почуття.'
          correct: true
        - text: 'Згідно з протоколом збори оголошено закритими.'
          correct: false
        - text: 'Ми виявили важливі закономірності під час експерименту.'
          correct: false
        - text: 'Чувак, я прошу надати мені відпустку.'
          correct: true
      min_correct: 3
      explanation: 'Поєднання сленгу з науковим стилем або канцеляризмів з інтимною розмовою створює комічний або неприродний ефект.'
    - question: 'Які типи підрядних частин найчастіше використовуються для побудови логічної аргументації в есе? Оберіть усі правильні варіанти.'
      options:
        - text: 'Обставинні причини (тому що, оскільки)'
          correct: true
        - text: 'Обставинні наслідку (так що, внаслідок чого)'
          correct: true
        - text: 'Обставинні умови (якщо, якби)'
          correct: true
        - text: 'Односкладні прості речення'
          correct: false
      min_correct: 3
      explanation: 'Складна аргументація вимагає розгортання думки через пояснення причин, наслідків та умов.'
    - question: 'Які слова є маркерами художнього стилю? Оберіть усі правильні варіанти.'
      options:
        - text: 'Метафори та епітети'
          correct: true
        - text: 'Канцеляризми'
          correct: false
        - text: 'Символи та образи'
          correct: true
        - text: 'Емоційно забарвлена лексика'
          correct: true
        - text: 'Сухі статистичні дані'
          correct: false
      min_correct: 3
      explanation: 'Художній стиль оперує образами, емоціями та естетикою слова, на відміну від сухої статистики чи канцеляризмів.'
  instruction: 'Оберіть усі правильні варіанти відповідей, що стосуються стилістичних особливостей.'

- type: cloze
  title: 'Логічні зв''язки у складному реченні'
