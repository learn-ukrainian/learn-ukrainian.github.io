module: 25-political-system
level: C1
version: '2.0'
activities:
  - id: 1
    type: match-up
    instruction: "Match the political term with its definition."
    pairs:
      - left: "Конституція"
        right: "Основний Закон держави."
      - left: "Суверенітет"
        right: "Незалежність держави у внутрішніх і зовнішніх справах."
      - left: "Імпічмент"
        right: "Процедура усунення Президента з поста."
      - left: "Інавгурація"
        right: "Урочистий вступ на посаду глави держави."
      - left: "Референдум"
        right: "Всенародне голосування з важливих питань."
      - left: "Коаліція"
        right: "Об'єднання фракцій для формування більшості."
      - left: "Опозиція"
        right: "Політичні сили, що протистоять владі."
      - left: "Електорат"
        right: "Коло виборців, які голосують за певну партію."

  - id: 2
    type: match-up
    instruction: "Match the branch of power with its institution."
    pairs:
      - left: "Законодавча влада"
        right: "Верховна Рада України."
      - left: "Виконавча влада"
        right: "Кабінет Міністрів України."
      - left: "Судова влада"
        right: "Верховний Суд / Конституційний Суд."
      - left: "Глава держави"
        right: "Президент України."
      - left: "Місцеве самоврядування"
        right: "Міська рада / Організація громади."
      - left: "Четверта влада (неофіційно)"
        right: "Засоби масової інформації (ЗМІ)."
      - left: "Джерело влади"
        right: "Народ України."
      - left: "Гарант Конституції"
        right: "Президент."

  - id: 3
    type: quiz
    instruction: "Analyze the State Structure text."
    items:
      - question: "Якою державою є Україна за формою правління?"
        options:
          - "Парламентсько-президентською республікою."
          - "Президентською республікою."
          - "Монархією."
          - "Федерацією."
        answer: "Парламентсько-президентською республікою."
      - question: "Скільки депутатів у Верховній Раді?"
        options:
          - "450."
          - "100."
          - "300."
          - "500."
        answer: "450."
      - question: "Хто очолює Кабінет Міністрів?"
        options:
          - "Прем'єр-міністр."
          - "Президент."
          - "Спікер парламенту."
          - "Генпрокурор."
        answer: "Прем'єр-міністр."
      - question: "Коли була ухвалена Конституція України?"
        options:
          - "28 червня 1996 року."
          - "24 серпня 1991 року."
          - "1 грудня 1991 року."
          - "Вчора."
        answer: "28 червня 1996 року."
      - question: "Хто має право розпустити парламент?"
        options:
          - "Президент (за певних умов)."
          - "Прем'єр-міністр."
          - "Народ."
          - "Суд."
        answer: "Президент (за певних умов)."
      - question: "Який документ уклав Пилип Орлик?"
        options:
          - "Першу українську Конституцію (1710)."
          - "Акт про незалежність."
          - "Універсал."
          - "Заповіт."
        answer: "Першу українську Конституцію (1710)."
      - question: "На який строк обирається Президент?"
        options:
          - "5 років."
          - "4 роки."
          - "10 років."
          - "Довічно."
        answer: "5 років."
      - question: "Чи є Україна федерацією?"
        options:
          - "Ні, це унітарна держава."
          - "Так, звісно."
          - "Частково."
          - "Це конфедерація."
        answer: "Ні, це унітарна держава."

  - id: 4
    type: quiz
    instruction: "Analyze the Legislative Process text."
    items:
      - question: "Хто має право законодавчої ініціативи?"
        options:
          - "Президент, депутати, Кабмін."
          - "Будь-який громадянин."
          - "Тільки Президент."
          - "Тільки судді."
        answer: "Президент, депутати, Кабмін."
      - question: "Скільки голосів потрібно для ухвалення звичайного закону?"
        options:
          - "226 (більшість)."
          - "300 (конституційна більшість)."
          - "100."
          - "450."
        answer: "226 (більшість)."
      - question: "Що робить Президент із законом після ухвалення Радою?"
        options:
          - "Підписує або накладає вето."
          - "Одразу публікує."
          - "Ігнорує."
          - "Переписує."
        answer: "Підписує або накладає вето."
      - question: "Коли закон набирає чинності?"
        options:
          - "Після офіційного опублікування."
          - "Після голосування."
          - "Через рік."
          - "Ніколи."
        answer: "Після офіційного опублікування."
      - question: "Що таке вето?"
        options:
          - "Відмова Президента підписати закон."
          - "Згода Президента."
          - "Голосування в парламенті."
          - "Виступ депутата."
        answer: "Відмова Президента підписати закон."
      - question: "Де спочатку розглядають законопроект?"
        options:
          - "У профільних комітетах."
          - "На вулиці."
          - "В новинах."
          - "В суді."
        answer: "У профільних комітетах."
      - question: "Хто підписує закон перед Президентом?"
        options:
          - "Голова Верховної Ради (Спікер)."
          - "Прем'єр-міністр."
          - "Автор закону."
          - "Мер Києва."
        answer: "Голова Верховної Ради (Спікер)."
      - question: "Скільки днів має Президент на розгляд закону?"
        options:
          - "15 днів."
          - "3 дні."
          - "Місяць."
          - "Рік."
        answer: "15 днів."

  - id: 5
    type: fill-in
    instruction: "Fill in the blank with the appropriate vocabulary word."
    items:
      - sentence: "Україна обрала курс на **__________** до Євросоюзу."
        answer: "євроінтеграцію"
        options: ["євроінтеграцію", "ізоляцію", "війну", "розпад"]
      - sentence: "Депутати сформували нову **__________** у парламенті."
        answer: "коаліцію"
        options: ["коаліцію", "бійку", "чергу", "гру"]
      - sentence: "Президент наклав **__________** на цей закон."
        answer: "вето"
        options: ["вето", "руку", "штраф", "податок"]
      - sentence: "Громадяни обирають владу через чесні **__________**."
        answer: "вибори"
        options: ["вибори", "лотереї", "ігри", "танці"]
      - sentence: "**__________** - це влада народу."
        answer: "Демократія"
        options: ["Демократія", "Анархія", "Монархія", "Тиранія"]
      - sentence: "Реформа **__________** передала владу громадам."
        answer: "децентралізації"
        options: ["децентралізації", "освіти", "медицини", "поліції"]
      - sentence: "Кожен має право на **__________** слова."
        answer: "свободу"
        options: ["свободу", "заборону", "купівлю", "продаж"]
      - sentence: "Уряд подав у **__________**."
        answer: "відставку"
        options: ["відставку", "суд", "парк", "кафе"]

  - id: 6
    type: fill-in
    instruction: "Choose the correct verb for the political process."
    items:
      - sentence: "Парламент **__________** новий закон."
        answer: "ухвалив"
        options: ["ухвалив", "зробив", "написав", "сказав"]
      - sentence: "Президент **__________** указ."
        answer: "підписав"
        options: ["підписав", "намалював", "прочитав", "подумав"]
      - sentence: "Уряд **__________** нові тарифи."
        answer: "затвердив"
        options: ["затвердив", "побачив", "забув", "сховав"]
      - sentence: "Ми **__________** за цього кандидата."
        answer: "проголосували"
        options: ["проголосували", "кричали", "бігли", "співали"]
      - sentence: "Депутати **__________** зміни до Конституції."
        answer: "внесли"
        options: ["внесли", "винесли", "принесли", "занесли"]
      - sentence: "Партію **__________** до виборів."
        answer: "допустили"
        options: ["допустили", "вигнали", "закрили", "забули"]
      - sentence: "Суд **__________** рішення."
        answer: "виніс"
        options: ["виніс", "вніс", "приніс", "заніс"]
      - sentence: "Країна **__________** незалежність."
        answer: "здобула"
        options: ["здобула", "купила", "знайшла", "вкрала"]

  - id: 7
    type: match-up
    instruction: "Match the political role definition."
    pairs:
      - left: "Спікер"
        right: "Голова Верховної Ради."
      - left: "Омбудсмен"
        right: "Уповноважений з прав людини."
      - left: "Мер"
        right: "Голова міста."
      - left: "Губернатор (неофіційно)"
        right: "Голова обласної адміністрації."
      - left: "Посол"
        right: "Дипломатичний представник за кордоном."
      - left: "Активіст"
        right: "Учасник громадського руху."
      - left: "Виборець"
        right: "Громадянин, який голосує."
      - left: "Кандидат"
        right: "Особа, яка балотується на виборах."

  - id: 8
    type: true-false
    instruction: "Identify myths vs facts about Ukrainian politics."
    items:
      - statement: "Президент відповідає за ремонт доріг у селі."
        correct: false
        explanation: "Це відповідальність місцевої влади та Уряду."
      - statement: "Народ є єдиним джерелом влади."
        correct: true
        explanation: "Це записано в Конституції."
      - statement: "Депутати мають право на недоторканність."
        correct: false
        explanation: "Депутатську недоторканність скасовано."
      - statement: "Прем'єр-міністра обирає народ на виборах."
        correct: false
        explanation: "Його призначає Рада за поданням Президента (від коаліції)."
      - statement: "В Україні діє безвізовий режим з ЄС."
        correct: true
        explanation: "Українці можуть подорожувати до ЄС без віз."
      - statement: "Конституцію можна змінювати референдумом."
        correct: true
        explanation: "Деякі розділи потребують затвердження на референдумі."
      - statement: "Судді призначаються Президентом довічно без конкурсу."
        correct: false
        explanation: "Існує складна процедура відбору та кваліфікаційного оцінювання."
      - statement: "Громадські організації контролюють владу."
        correct: true
        explanation: "Громадянське суспільство має великий вплив."

  - id: 9
    type: group-sort
    instruction: "Categorize duties: President vs Government (Cabinet)."
    groups:
      - name: "President (Президент)"
        items: ["Зовнішня політика", "Оборона і армія", "Національна безпека", "Підписання законів", "Призначення послів", "Нагородження державними нагородами", "Присвоєння рангів", "Керівництво РНБО", "Помилування"]
      - name: "Government (Уряд)"
        items: ["Економічна політика", "Соціальні виплати", "Будівництво доріг", "Тарифи на комуналку", "Освіта і медицина", "Виконання бюджету", "Управління держмайном", "Розробка бюджету", "Митна політика"]

  - id: 10
    type: match-up
    instruction: "Match the reform with its essence."
    pairs:
      - left: "Децентралізація"
        right: "Передача повноважень місцевим громадам."
      - left: "Земельна реформа"
        right: "Відкриття ринку землі."
      - left: "Медична реформа"
        right: "Принцип 'гроші ходять за пацієнтом'."
      - left: "Антикорупційна реформа"
        right: "Створення НАБУ, САП, ВАКС."
      - left: "Цифрова реформа"
        right: "Держава в смартфоні (Дія)."
      - left: "Реформа поліції"
        right: "Створення патрульної поліції."
      - left: "Освітня реформа"
        right: "Нова Українська Школа (НУШ)."
      - left: "Судова реформа"
        right: "Очищення та переатестація суддів."

  - id: 11
    type: error-correction
    instruction: "Fix common political language mistakes."
    items:
      - sentence: "Більшість людей голосували за."
        error: "людей"
        answer: "громадян / виборців"
        options: ["громадян", "люду", "населення", "натовпу"]
        explanation: "У політичному контексті вживаємо 'громадяни' або 'виборці'."
      - sentence: "Закон вступив у силу."
        error: "вступив"
        answer: "набрав"
        options: ["набрав", "взяв", "пішов", "став"]
        explanation: "Закон набирає чинності (not enters force)."
      - sentence: "Президент веде країну в НАТО."
        error: "веде"
        answer: "спрямовує"
        options: ["спрямовує", "тягне", "несе", "котить"]
        explanation: "Стилістично краще: спрямовує курс."
      - sentence: "Депутати прийняли участь у засіданні."
        error: "прийняли"
        answer: "взяли"
        options: ["взяли", "мали", "зробили", "дали"]
        explanation: "Брати участь."
      - sentence: "Згідно закону."
        error: "закону"
        answer: "із законом"
        options: ["із законом", "закона", "законі", "закону"]
        explanation: "Згідно з (чим?)."
      - sentence: "Виборча дільниця."
        error: "дільниця"
        answer: "дільниця"
        options: ["дільниця", "участок", "місце", "точка"]
        explanation: "Правильно: дільниця. Участок — русизм (земельна ділянка)."
      - sentence: "Одержати громадянство."
        error: "Одержати"
        answer: "Набути"
        options: ["Набути", "Взяти", "Купити", "Знайти"]
        explanation: "Громадянства набувають (acquire)."
      - sentence: "Він зайняв пост міністра."
        error: "зайняв"
        answer: "обійняв"
        options: ["обійняв", "сів", "встав", "взяв"]
        explanation: "Посаду обіймають."

  - id: 12
    type: match-up
    instruction: "Match English political terms with Ukrainian."
    pairs:
      - left: "Human rights"
        right: "Права людини"
      - left: "Rule of law"
        right: "Верховенство права"
      - left: "Freedom of speech"
