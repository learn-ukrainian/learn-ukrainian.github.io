  - id: 13
    type: fill-in
    instruction: "Choose the correct preposition."
    items:
      - sentence: "Голосувати **__________** кандидата."
        answer: "за"
        options: ["за", "на", "про", "до"]
      - sentence: "Впливати **__________** політику."
        answer: "на"
        options: ["на", "в", "за", "до"]
      - sentence: "Боротися **__________** корупцією."
        answer: "з"
        options: ["з", "проти", "на", "за"]
      - sentence: "Вступити **__________** партію."
        answer: "до"
        options: ["до", "в", "на", "за"]
      - sentence: "Відповідати **__________** законом."
        answer: "перед"
        options: ["перед", "за", "під", "над"]
      - sentence: "Право **__________** працю."
        answer: "на"
        options: ["на", "за", "в", "про"]
      - sentence: "Згідно **__________** Конституцією."
        answer: "з"
        options: ["з", "по", "на", "від"]
      - sentence: "Незалежно **__________** поглядів."
        answer: "від"
        options: ["від", "з", "до", "на"]

  - id: 14
    type: quiz
    instruction: "Scenario: Who deals with this?"
    items:
      - question: "У вашому місті погані дороги. До кого звертатися?"
        options:
          - "До міського голови (мера)."
          - "До Президента."
          - "До ООН."
          - "До НАТО."
        answer: "До міського голови (мера)."
      - question: "Ви хочете змінити закон про освіту. Хто це робить?"
        options:
          - "Верховна Рада."
          - "Місцева школа."
          - "Поліція."
          - "Суд."
        answer: "Верховна Рада."
      - question: "Ваші права порушили поліцейські. Куди йти?"
        options:
          - "До суду або прокуратури."
          - "До Президента."
          - "До церкви."
          - "Додому."
        answer: "До суду або прокуратури."
      - question: "Країні загрожує військова небезпека. Хто головнокомандувач?"
        options:
          - "Президент."
          - "Прем'єр-міністр."
          - "Спікер."
          - "Мер."
        answer: "Президент."
      - question: "Ви хочете отримувати субсидію. Хто за це відповідає?"
        options:
          - "Уряд (соціальні служби)."
          - "Верховна Рада."
          - "Армія."
          - "Суд."
        answer: "Уряд (соціальні служби)."
      - question: "Хто представляє Україну на саміті НАТО?"
        options:
          - "Президент."
          - "Мер Києва."
          - "Глава Нацбанку."
          - "Директор школи."
        answer: "Президент."
      - question: "Хто стежить за тим, щоб закони відповідали Конституції?"
        options:
          - "Конституційний Суд."
          - "Поліція."
          - "Президент."
          - "Народ."
        answer: "Конституційний Суд."
      - question: "Хто ухвалює бюджет країни?"
        options:
          - "Верховна Рада."
          - "Президент."
          - "МВФ."
          - "Банки."
        answer: "Верховна Рада."

  - id: 15
    type: match-up
    instruction: "Match the organization with its abbreviation/name."
    pairs:
      - left: "ЄС"
        right: "Європейський Союз."
      - left: "НАТО"
        right: "Північноатлантичний альянс."
      - left: "ООН"
        right: "Організація Об'єднаних Націй."
      - left: "РЄ"
        right: "Рада Європи."
