module: 20-c11-checkpoint-i
level: C1
version: '2.0'
activities:
  - type: fill-in
    title: "Пасивний стан"
    instructions: "Перетворіть активний стан на пасивний. Впишіть пропущене слово."
    items:
      - sentence: "Закон був [blank] Верховною Радою."
        answer: "ухвалений"
      - sentence: "Ця книга була [blank] відомим автором."
        answer: "написана"
      - sentence: "Міст був [blank] після війни."
        answer: "відбудований"
      - sentence: "Рішення було [blank] одноголосно."
        answer: "прийнято"
      - sentence: "Двері були [blank] ключем."
        answer: "зачинені"
      - sentence: "Помилка була [blank] вчасно."
        answer: "виправлена"
      - sentence: "Проєкт був [blank] у 2023 році."
        answer: "завершений"
      - sentence: "Лист був [blank] електронною поштою."
        answer: "відправлений"
      - sentence: "Угода була [blank] між країнами."
        answer: "підписана"
      - sentence: "План був [blank] директором."
        answer: "затверджений"
    options:
      - ухвалений
      - написана
      - відбудований
      - прийнято
      - зачинені
      - виправлена
      - завершений
      - відправлений
      - підписана
      - затверджений

  - type: match-up
    title: "Дієприкметники"
    instructions: "З'єднайте дієслово з його пасивним дієприкметником."
    pairs:
      - left: "Зробити"
        right: "Зроблений"
      - left: "Забути"
        right: "Забутий"
      - left: "Почути"
        right: "Почутий"
      - left: "Вимити"
        right: "Вимитий"
      - left: "Закрити"
        right: "Закритий"
      - left: "Розбити"
        right: "Розбитий"
      - left: "Одягнути"
        right: "Одягнений"
      - left: "Створити"
        right: "Створений"
      - left: "Бачити"
        right: "Бачений"
      - left: "Писати"
        right: "Писаний"

  - type: group-sort
    title: "Стилістика"
    instructions: "Розподіліть слова за стилем."
    groups:
      - name: "Офіційно-діловий / Науковий"
        items:
          - "Внаслідок"
          - "Згідно з"
          - "Функціонувати"
          - "Реалізувати"
          - "Забезпечити"
          - "Наявний"
          - "Відповідно до"
          - "Зважаючи на"
      - name: "Розмовний / Побутовий"
        items:
          - "Через те що"
          - "Як кажуть"
          - "Працювати"
          - "Зробити"
          - "Дати"
          - "Є"
          - "Як написано"
          - "Дивлячись на"

  - type: quiz
    title: "Критичне читання"
    instructions: "Виберіть правильну відповідь щодо аналізу тексту."
    items:
      - question: "Що таке 'джинса'?"
        options:
          - "**Прихована реклама**"
          - "Вид одягу"
          - "Офіційна новина"
          - "Інтерв'ю"
      - question: "Яка ознака клікбейту?"
        options:
          - "**Емоційний заголовок без суті**"
          - "Сухий виклад фактів"
          - "Вказана точна дата"
          - "Посилання на джерело"
      - question: "Що таке факт?"
        options:
          - "**Те, що можна перевірити**"
          - "Особиста думка"
          - "Припущення"
          - "Емоція"
      - question: "Що таке судження?"
        options:
          - "**Суб'єктивна оцінка**"
          - "Дата події"
          - "Ім'я автора"
          - "Назва міста"
      - question: "Ефект 'гнилої риби' - це..."
        options:
          - "**Брудне звинувачення без доказів**"
          - "Кулінарна страва"
          - "Екологічна проблема"
          - "Вид риболовлі"
      - question: "Що робить 'фактчекер'?"
        options:
          - "**Перевіряє правдивість інформації**"
          - "Пише фейки"
          - "Продає рекламу"
          - "Створює сайти"
      - question: "Whataboutism - це техніка..."
        options:
          - "**Відволікання уваги**"
          - "Уважного слухання"
          - "Компліментів"
          - "Подяки"
      - question: "Діпфейк створюється за допомогою..."
        options:
          - "**Штучного інтелекту**"
          - "Фотошопу"
          - "Фарб"
          - "Камери телефону"
      - question: "'Білий список' медіа - це..."
        options:
          - "**Надійні джерела**"
          - "Заблоковані сайти"
          - "Список ворогів"
          - "Рекламний прайс"
      - question: "Астротурфінг - це імітація..."
        options:
          - "**Громадської думки**"
          - "Польоту в космос"
          - "Вирощування трави"
          - "Спортивних змагань"

  - type: error-correction
    title: "Редагування"
    instructions: "Знайдіть та виправте помилку (суржик, лексика, граматика)."
    items:
      - sentence: "Я рахую, що це неправильно."
        correction: "Я вважаю, що це неправильно."
        error: "рахую"
      - sentence: "Ми прийняли участь у концерті."
        correction: "Ми взяли участь у концерті."
        error: "прийняли"
      - sentence: "Відкрийте вікно, будь ласка."
        correction: "Відчиніть вікно, будь ласка."
        error: "Відкрийте"
      - sentence: "Закрийте очі."
        correction: "Заплющте очі."
        error: "Закрийте"
      - sentence: "Підняти питання на зборах."
        correction: "Порушити питання на зборах."
        error: "Підняти"
      - sentence: "Згідно закону України."
        correction: "Згідно із законом України."
        error: "Згідно"
      - sentence: "В кінці кінців ми погодилися."
        correction: "Зрештою ми погодилися."
        error: "В кінці кінців"
      - sentence: "Самий кращий друг."
        correction: "Найкращий друг."
        error: "Самий"
      - sentence: "На протязі року."
        correction: "Протягом року."
        error: "На протязі"
      - sentence: "Включати світло."
        correction: "Вмикати світло."
        error: "Включати"

  - type: essay-response
    title: "Критичний аналіз"
    instructions: "Напишіть коротке есе (150-200 слів), аналізуючи надійність джерела новини про 'лікувальне сало'."
    prompt: "Проаналізуйте джерело 'ua-news-24.xyz', відсутність автора та посилань. Зробіть висновок."
    rubric:
      - "25%: Аналіз джерела."
      - "25%: Аргументація."
      - "25%: Лексика C1."
      - "25%: Граматика."
    model_answer: "Джерело є ненадійним..."

  - type: fill-in
    title: "Дієслова руху"
    instructions: "Вставте правильне дієслово руху."
    items:
      - sentence: "Ми часто [blank] до парку пішки."
        answer: "ходимо"
      - sentence: "Завтра я [blank] у відрядження літаком."
        answer: "полечу"
      - sentence: "Він [blank] через міст кожного ранку."
        answer: "бігає"
      - sentence: "Машина [blank] дуже швидко."
        answer: "їхала"
      - sentence: "Птахи [blank] на південь."
        answer: "летять"
      - sentence: "Корабель [blank] до порту."
        answer: "пливе"
      - sentence: "Ми [blank] речі на другий поверх."
        answer: "несли"
      - sentence: "Вона [blank] дитину до школи."
        answer: "вела"
      - sentence: "Автобус [blank] за розкладом."
        answer: "їздить"
      - sentence: "Спортсмен [blank] сто метрів за 10 секунд."
        answer: "пробіг"
    options:
      - ходимо
      - полечу
      - бігає
      - їхала
      - летять
      - пливе
      - несли
      - вела
      - їздить
      - пробіг

  - type: match-up
    title: "Лексика: Емоції"
    instructions: "З'єднайте емоцію з її описом."
    pairs:
      - left: "Ейфорія"
        right: "Стан піднесеного настрою."
      - left: "Апатія"
        right: "Байдужість до всього."
      - left: "Тривога"
        right: "Відчуття небезпеки."
      - left: "Гнів"
        right: "Сильне обурення."
      - left: "Розпач"
        right: "Втрата надії."
      - left: "Зневіра"
        right: "Втрата віри в успіх."
      - left: "Натхнення"
        right: "Бажання творити."
      - left: "Сором"
        right: "Почуття провини."
      - left: "Гордість"
        right: "Повага до себе."
      - left: "Заздрість"
        right: "Бажання чужого."

  - type: true-false
    title: "Історія України"
    instructions: "Правда чи ні?"
    items:
      - statement: "Голодомор був геноцидом українського народу."
        answer: true
      - statement: "Україна здобула незалежність у 1990 році."
        answer: false
      - statement: "Київська Русь — це спільна колиска трьох народів."
        answer: false
      - statement: "УПА боролася за незалежність України."
        answer: true
      - statement: "Крим завжди був російським."
        answer: false
      - statement: "Конституція Пилипа Орлика була першою в Європі."
        answer: true
      - statement: "Шевченко був кріпаком."
        answer: true
      - statement: "Українська мова походить від російської."
        answer: false
      - statement: "Леся Українка писала драми."
        answer: true
      - statement: "Грушевський був першим президентом."
        answer: false

