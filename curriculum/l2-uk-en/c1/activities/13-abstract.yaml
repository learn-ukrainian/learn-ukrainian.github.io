module: 13-abstract
level: C1
activities:
  - type: match-up
    id: q-01
    title: "Анотація та Реферат"
    instructions: "З'єднайте термін з його визначенням."
    pairs:
      - "Анотація": "Стисла реклама статті (150-250 слів)"
      - "Реферат": "Детальний переказ змісту (10-15% оригіналу)"
      - "IMRaD": "Стандартна структура наукової статті"
      - "Ключові слова": "Теги для пошукових систем"
      - "Довідкова анотація": "Лише називає теми, не розкриває висновків"
      - "Інформативна анотація": "Містить конкретні результати та висновки"
      - "Об'єкт дослідження": "Широка сфера, яку вивчають"
      - "Предмет дослідження": "Конкретний аспект об'єкта"

  - type: match-up
    id: q-02
    title: "Структура Анотації"
    instructions: "З'єднайте частину анотації з її функцією."
    pairs:
      - "Вступ": "Актуальність теми та постановка проблеми"
      - "Методи": "Опис інструментарію та перебігу дослідження"
      - "Результати": "Основні емпіричні дані та факти"
      - "Висновки": "Інтерпретація та практичне значення"
      - "Назва": "Анотація анотації (максимально стисло)"
      - "Мета": "Відповідь на питання 'Навіщо?'"
      - "Обмеження": "Вказівка на те, що не увійшло в дослідження"
      - "Перспективи": "Напрямки подальших досліджень"

  - type: match-up
    id: q-03
    title: "Академічні дієслова"
    instructions: "З'єднайте дієслово з іменником (стійкі словосполучення)."
    pairs:
      - "Провести": "експеримент / опитування"
      - "Здійснити": "аналіз / порівняння"
      - "Виявити": "закономірність / тенденцію"
      - "Отримати": "результати / дані"
      - "Зробити": "висновок"
      - "Поставити": "завдання / мету"
      - "Заповнити": "прогалину в науці"
      - "Окреслити": "межі дослідження"

  - type: match-up
    id: q-04
    title: "Логіка Анотації (Порядок)"
    instructions: "З'єднайте етап з відповідним реченням."
    pairs:
      - "Крок 1 - Мета": "Метою роботи є аналіз впливу сну на пам'ять."
      - "Крок 2 - Методи": "Для цього було проведено експеримент зі 100 студентами."
      - "Крок 3 - Результати": "Встановлено, що 8-годинний сон покращує результати."
      - "Крок 4 - Висновки": "Зроблено висновок про важливість режиму дня."
      - "Крок 5 - Практика": "Результати можуть бути використані в школах."
      - "Крок 6 - Теги": "Ключові слова: сон, пам'ять, студенти."
      - "Крок 7 - Назва": "Вплив сну на когнітивні здібності."
      - "Крок 8 - Автор": "Автори: Петренко І., Сидоренко П."

  - type: quiz
    id: q-05
    title: "Мистецтво стислості"
    items:
      - question: "Оберіть найбільш стислий варіант речення:"
        options:
          - "Ми провели дослідження і дізналися, що більшість людей люблять каву."
          - "Опитування показало, що кава є популярною серед респондентів."
          - "Встановлено популярність кави серед респондентів."
          - "Я думаю, що кава дуже популярна."
        answer: "Встановлено популярність кави серед респондентів."
      - question: "Як скоротити фразу 'Беручи до уваги все вищесказане'?"
        options:
          - "Отже"
          - "Нарешті"
          - "Враховуючи все це"
          - "Таким чином, ми думаємо"
        answer: "Отже"
      - question: "Оберіть варіант без 'води':"
        options:
          - "У статті розглядається надзвичайно важлива і актуальна проблема."
          - "Статтю присвячено проблемі..."
          - "Ми хочемо поговорити про проблему..."
          - "Ця тема хвилює всіх вчених світу."
        answer: "Статтю присвячено проблемі..."
      - question: "Як краще написати: 'Ми використали метод'?"
        options:
          - "Використано метод..."
          - "Нами був використаний метод..."
          - "Я використав метод..."
          - "Ми брали метод..."
        answer: "Використано метод..."
      - question: "Оберіть правильний стиль для анотації:"
        options:
          - "Ми, автори, раді повідомити..."
          - "Було цікаво дізнатися, що..."
          - "Встановлено, що..."
          - "Скажу чесно, результати здивували."
        answer: "Встановлено, що..."
      - question: "Що таке 'номіналізація'?"
        options:
          - "Заміна дієслів іменниками"
          - "Називання автора по імені"
          - "Використання цифр"
          - "Написання заголовка"
        answer: "Заміна дієслів іменниками"
      - question: "Яке слово свідчить про результат?"
        options:
          - "Виявлено"
          - "Проаналізовано"
          - "Розглянуто"
          - "Описано"
        answer: "Виявлено"
      - question: "Яке слово зайве в анотації?"
        options:
          - "Чудовий"
          - "Ефективний"
          - "Достовірний"
          - "Статистичний"
        answer: "Чудовий"

  - type: match-up
    id: q-06
    title: "Ключові слова: Так чи Ні?"
    instructions: "З'єднайте слово з оцінкою (Вдало/Невдало)."
    pairs:
      - "штучний інтелект": "Вдало"
      - "нейронні мережі": "Вдало"
      - "дистанційна освіта": "Вдало"
      - "методика CLIL": "Вдало"
      - "академічна доброчесність": "Вдало"
      - "соціальні мережі": "Вдало"
      - "квантова фізика": "Вдало"
      - "українська література": "Вдало"
      - "інтертекстуальність": "Вдало"
      - "мікроекономіка": "Вдало"
      - "комп'ютер": "Невдало (Загальне)"
      - "людина": "Невдало (Загальне)"
      - "школа": "Невдало (Загальне)"
      - "добро": "Невдало (Загальне)"
      - "світ": "Невдало (Загальне)"
      - "інтернет": "Невдало (Загальне)"
      - "розвиток": "Невдало (Загальне)"
      - "проблема": "Невдало (Загальне)"
      - "наука": "Невдало (Загальне)"
      - "життя": "Невдало (Загальне)"

  - type: fill-in
    id: q-07
    title: "Маркери Мети"
    items:
      - question: "1. [___] статті полягає у вивченні нових підходів."
        answer: "Мета"
      - question: "2. Роботу [___] аналізу європейського досвіду."
        answer: "присвячено"
      - question: "3. Головним [___] дослідження є система оцінювання."
        answer: "завданням"
      - question: "4. У статті [___] проблему академічної доброчесності."
        answer: "розглянуто"
      - question: "5. Основна [___] приділяється питанню мотивації."
        answer: "увага"
      - question: "6. [___] роботи є виявлення причин кризи."
        answer: "Метою"
      - question: "7. У пропонованій статті [___] теоретичні засади."
        answer: "викладено"
      - question: "8. [___] дослідження виступають процеси глобалізації."
        answer: "Об'єктом"

  - type: fill-in
    id: q-08
    title: "Маркери Методології"
    items:
      - question: "1. У процесі дослідження [___] методи спостереження."
        answer: "застосовано"
      - question: "2. Основу джерельної бази [___] архівні матеріали."
        answer: "становлять"
      - question: "3. Для перевірки гіпотези [___] експеримент."
        answer: "проведено"
      - question: "4. Дані [___] за допомогою статистичного пакета."
        answer: "оброблено"
      - question: "5. [___] основу становить системний підхід."
        answer: "Методологічну"
      - question: "6. Вибірку [___] 200 студентів."
        answer: "склали"
      - question: "7. [___] порівняльний аналіз двох творів."
        answer: "Здійснено"
      - question: "8. [___] метод контент-аналізу."
        answer: "Використано"

  - type: fill-in
    id: q-09
    title: "Маркери Результатів"
    items:
      - question: "1. У результаті аналізу [___] провідну роль інтонації."
        answer: "виявлено"
      - question: "2. Експериментально [___] ефективність методики."
        answer: "доведено"
      - question: "3. Дані [___] про зростання інтересу до теми."
        answer: "свідчать"
      - question: "4. [___] кореляцію між віком і швидкістю читання."
        answer: "Встановлено"
      - question: "5. [___] закономірність розвитку сюжету."
        answer: "З'ясовано"
      - question: "6. [___] основні етапи еволюції жанру."
        answer: "Визначено"
      - question: "7. [___] позитивну динаміку показників."
        answer: "Зафіксовано"
      - question: "8. Результати [___] нашу гіпотезу."
        answer: "підтвердили"

  - type: fill-in
    id: q-10
    title: "Маркери Висновків"
    items:
      - question: "1. Практична [___] роботи полягає у можливості використання матеріалів."
        answer: "цінність"
      - question: "2. Теоретичне [___] дослідження зумовлене новизною підходу."
        answer: "значення"
      - question: "3. Зроблено [___] про необхідність освітніх реформ."
        answer: "висновок"
      - question: "4. Перспективи подальших [___] пов'язані з вивченням діалектів."
        answer: "розвідок"
      - question: "5. Отримані результати дають [___] стверджувати, що метод дієвий."
        answer: "підстави"
      - question: "6. Матеріали можуть бути [___] у навчальному процесі."
        answer: "використані"
      - question: "7. Дослідження [___] нові горизонти для науки."
        answer: "відкриває"
      - question: "8. [___] ряд рекомендацій для вчителів."
        answer: "Розроблено"

  - type: quiz
    id: q-11
    title: "Теорія анотації"
    items:
      - question: "Який рекомендований обсяг анотації?"
        options:
          - "10-20 слів"
          - "150-250 слів"
          - "1-2 сторінки"
          - "500-1000 слів"
        answer: "150-250 слів"
      - question: "Чи можна копіювати вступ статті в анотацію?"
        options:
          - "Так, це економить час"
          - "Ні, це груба помилка"
          - "Тільки якщо вступ короткий"
          - "Залежить від журналу"
        answer: "Ні, це груба помилка"
      - question: "Що таке 'еліпсис' в анотації?"
        options:
          - "Пропуск слів для стислості"
          - "Графік у формі еліпса"
          - "Помилка в слові"
          - "Використання трикрапки"
        answer: "Пропуск слів для стислості"
      - question: "Яка функція інформативної анотації?"
        options:
          - "Замінити читання статті"
          - "Тільки зацікавити"
          - "Приховати результати"
          - "Розсмішити читача"
        answer: "Замінити читання статті"
      - question: "Що таке 'структурована анотація'?"
        options:
          - "Анотація з рубриками (Мета, Методи...)"
          - "Анотація у вигляді таблиці"
          - "Анотація у вигляді вірша"
          - "Дуже довга анотація"
        answer: "Анотація з рубриками (Мета, Методи...)"
      - question: "Для чого потрібні Ключові слова?"
        options:
          - "Для пошукових систем (SEO)"
          - "Для краси"
          - "Щоб заповнити місце"
          - "Це застаріла вимога"
        answer: "Для пошукових систем (SEO)"
      - question: "Скільки ключових слів рекомендується?"
        options:
          - "1-2"
          - "5-8"
          - "20-30"
          - "Не має значення"
        answer: "5-8"
      - question: "Чи можна писати 'Я' в анотації?"
        options:
          - "Ні, краще безособові форми"
          - "Так, це показує впевненість"
          - "Тільки якщо ти професор"
          - "Так, завжди"
        answer: "Ні, краще безособові форми"

  - type: fill-in
    id: q-12
    title: "Академічна лексика 1"
    items:
      - question: "1. Анотація має бути [___], тобто короткою і змістовною."
        answer: "стислою"
      - question: "2. Вона повинна мати чітку [___]."
        answer: "структуру"
      - question: "3. Інформація має бути [___], без зайвої 'води'."
        answer: "вичерпною"
      - question: "4. Стиль викладу — [___] (науковий)."
        answer: "академічний"
      - question: "5. Анотація розміщується [___] текстом статті."
        answer: "перед"
      - question: "6. Вона виконує [___] функцію."
        answer: "сигнальну"
      - question: "7. У міжнародних базах використовують англійську [___]."
        answer: "анотацію"
      - question: "8. Реферат має [___] обсяг, ніж анотація."
        answer: "більший"

  - type: fill-in
    id: q-13
    title: "Академічна лексика 2"
    items:
      - question: "1. Кожна стаття повинна мати наукову [___]."
        answer: "новизну"
      - question: "2. Автор має вказати [___] дослідження (широка тема)."
        answer: "об'єкт"
      - question: "3. Також вказують [___] (вузький аспект)."
        answer: "предмет"
      - question: "4. Важливо окреслити [___] дослідження."
        answer: "межі"
      - question: "5. Робота має теоретичне [___]."
        answer: "значення"
      - question: "6. [___] цінність полягає у впровадженні результатів."
        answer: "Практична"
      - question: "7. Статтю опубліковано у фаховому [___]."
        answer: "виданні"
      - question: "8. Анотація допомагає подолати [___] бар'єр."
        answer: "інформаційний"

  - type: quiz
    id: q-14
    title: "Суб'єктивність vs Об'єктивність"
    items:
      - question: "Яке речення є прийнятним для анотації?"
        options:
          - "На жаль, результати нас розчарували."
          - "Результати не підтвердили початкову гіпотезу."
          - "Ми дуже старалися, але щось пішло не так."
          - "Це була чудова робота."
        answer: "Результати не підтвердили початкову гіпотезу."
      - question: "Яке слово зайве в науковому тексті?"
        options:
          - "Чудовий"
          - "Ефективний"
          - "Значний"
          - "Статистичний"
        answer: "Чудовий"
      - question: "Чим замінити 'Я думаю'?"
        options:
          - "Вважається"
          - "Мені здається"
          - "Я впевнений"
          - "Мамою клянусь"
        answer: "Вважається"
      - question: "Чим замінити 'Дуже багато'?"
        options:
          - "Значна кількість"
          - "Купа"
          - "Сила-силенна"
          - "Вагон"
        answer: "Значна кількість"
      - question: "Чим замінити 'Хороший'?"
        options:
          - "Ефективний / Якісний"
          - "Кльовий"
          - "Добрий"
          - "Нормальний"
        answer: "Ефективний / Якісний"
      - question: "Чим замінити 'Ми подивилися на'?"
        options:
          - "Проаналізовано"
          - "Ми глянули"
          - "Ми зиркнули"
          - "Ми бачили"
        answer: "Проаналізовано"
      - question: "Чим замінити 'В кінці-кінців'?"
        options:
          - "Зрештою / У підсумку"
          - "В концях"
          - "На кінець"
          - "Фінально"
        answer: "Зрештою / У підсумку"
      - question: "Чим замінити 'Писати про'?"
        options:
          - "Висвітлювати / Описувати"
          - "Мазюкати"
          - "Строчити"
          - "Друкувати"
        answer: "Висвітлювати / Описувати"

  - type: match-up
    id: q-15
    title: "Українські vs Англійські терміни"
    instructions: "Знайдіть український відповідник англійському терміну."
    pairs:
      - "Abstract": "Анотація"
      - "Summary": "Реферат / Підсумок"
      - "Keywords": "Ключові слова"
      - "Background": "Вступ / Актуальність"
      - "Methods": "Методи"
      - "Discussion": "Обговорення"
      - "Conclusion": "Висновок"
      - "Objectives": "Цілі / Мета"

  - type: match-up
    id: q-16
    title: "Синоніми стислості"
    instructions: "Знайдіть синонім до слова."
    pairs:
      - "Стислий": "Лаконічний"
      - "Короткий": "Компактний"
      - "Вичерпний": "Повний"
      - "Зайвий": "Надлишковий"
      - "Суттєвий": "Важливий"
      - "Окреслювати": "Визначати"
      - "Узагальнювати": "Підсумовувати"
      - "Вилучати": "Викидати / Прибирати"

  - type: essay-response
    id: q-17
    title: "Академічна анотація"
    instructions: "Напишіть анотацію (150 слів) до вашої уявної статті на тему 'Вплив інтернету на українську мову'. Використовуйте структуру IMRaD (Мета, Методи, Результати, Висновки) та безособові конструкції."
    model_answer: "Метою статті є аналіз впливу інтернет-комунікації на лексичний склад сучасної української мови. Методологічну основу дослідження становить контент-аналіз дописів у соціальних мережах Facebook та Instagram (загальний обсяг — 10 000 слів). Застосовано методи спостереження та лінгвістичного опису. Встановлено, що інтернет-спілкування сприяє активному проникненню англіцизмів та сленгових неологізмів, які адаптуються до граматичної системи української мови (наприклад, 'лайкати', 'шерити'). Виявлено тенденцію до спрощення синтаксичних конструкцій та економії мовних засобів. Водночас зафіксовано зростання популярності питомої української лексики як маркера національної ідентичності. Зроблено висновок про те, що інтернет є потужним чинником динамічних змін мовної норми, який потребує подальшого моніторингу."
    rubric: "1. Структура IMRaD (25%)\n2. Безособові конструкції (25%)\n3. Лексичне багатство (25%)\n4. Обсяг та стислість (25%)"
