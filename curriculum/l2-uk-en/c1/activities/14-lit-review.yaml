activities:
  - module: 14-lit-review
    type: match-up
    slug: vocab-definitions-1
    name: "Термінологія 1"
    description: "З'єднайте термін із визначенням."
    pairs:
      - "Синтез": "Поєднання різних ідей для створення нового розуміння"
      - "Огляд літератури": "Критичний аналіз існуючих досліджень"
      - "Прогалина": "Питання, яке ще не було досліджено"
      - "Анотована бібліографія": "Простий перелік джерел з коротким описом"
      - "Достовірність": "Надійність отриманих результатів"
      - "Релевантність": "Відповідність джерела темі дослідження"
      - "Цитування": "Пряме використання тексту автора"
      - "Плагіат": "Привласнення чужих ідей без посилання"

  - module: 14-lit-review
    type: match-up
    slug: vocab-definitions-2
    name: "Термінологія 2"
    description: "З'єднайте термін із визначенням."
    pairs:
      - "Першоджерело": "Оригінальний науковий текст (стаття, книга)"
      - "Полеміка": "Наукова суперечка, дискусія"
      - "Консенсус": "Загальна згода більшості дослідників"
      - "Гіпотеза": "Наукове припущення, яке потребує перевірки"
      - "Методологія": "Система методів дослідження"
      - "Емпіричні дані": "Дані, отримані шляхом досвіду/експерименту"
      - "Апробація": "Оприлюднення результатів на конференції"
      - "Рецензування": "Оцінка статті незалежними експертами"

  - module: 14-lit-review
    type: match-up
    slug: reporting-verbs-positive
    name: "Позитивні дієслова"
    description: "З'єднайте дієслово з його значенням."
    pairs:
      - "Доводить": "Автор повністю впевнений (факт)"
      - "Демонструє": "Автор наочно показує"
      - "Обґрунтовує": "Автор наводить докази"
      - "Підтверджує": "Автор погоджується з іншими даними"
      - "Висвітлює": "Автор детально описує проблему"
      - "Встановлює": "Автор виявляє факт"
      - "Генерує": "Автор створює нову ідею"
      - "Формулює": "Автор чітко визначає поняття"

  - module: 14-lit-review
    type: match-up
    slug: reporting-verbs-negative
    name: "Критичні дієслова"
    description: "З'єднайте дієслово з його значенням."
    pairs:
      - "Стверджує": "Це лише думка автора (сумнів)"
      - "Припускає": "Це гіпотеза (непевність)"
      - "Помилково вважає": "Пряма критика"
      - "Ігнорує": "Вказівка на недолік"
      - "Не враховує": "Вказівка на прогалину в методах"
      - "Перебільшує": "Критика значущості результатів"
      - "Спрощує": "Критика глибини аналізу"
      - "Суперечить": "Вказівка на нелогічність"

  - module: 14-lit-review
    type: quiz
    slug: synthesis-check-1
    name: "Синтез чи Переказ? (Частина 1)"
    description: "Визначте тип уривка."
    items:
      - question: "Іванов (2020) каже, що мова важлива. Петров (2021) пише про граматику."
        answer: "Переказ (Погано)"
        options:
          - "Синтез (Добре)"
      - question: "Хоча Іванов і Петров погоджуються щодо важливості мови, вони розходяться у методах."
        answer: "Синтез (Добре)"
        options:
          - "Переказ (Погано)"
      - question: "У 2010 році вийшла стаття про екологію. У 2012 році з'явилася книга про клімат."
        answer: "Переказ (Погано)"
        options:
          - "Синтез (Добре)"
      - question: "Аналіз робіт свідчить про зміщення фокусу з теорії на практику (Коваленко, 2019; Бондар, 2023)."
        answer: "Синтез (Добре)"
        options:
          - "Переказ (Погано)"
      - question: "Робота Петренка присвячена економіці. Робота Сидоренка присвячена політиці."
        answer: "Переказ (Погано)"
        options:
          - "Синтез (Добре)"
      - question: "Обидва автори підходять до проблеми з різних боків: перший — з економічного, другий — з політичного."
        answer: "Синтез (Добре)"
        options:
          - "Переказ (Погано)"
      - question: "Ми прочитали статтю і вона нам дуже сподобалася."
        answer: "Суб'єктивна оцінка (Погано)"
        options:
          - "Синтез (Добре)"
      - question: "Спостерігається консенсус щодо впливу інфляції на ринок."
        answer: "Синтез (Добре)"
        options:
          - "Переказ (Погано)"

  - module: 14-lit-review
    type: quiz
    slug: synthesis-check-2
    name: "Синтез чи Переказ? (Частина 2)"
    description: "Визначте інформаційну якість."
    items:
      - question: "Автор А використав опитування. Автор Б використав інтерв'ю."
        answer: "Переказ (Погано)"
        options:
          - "Синтез (Добре)"
      - question: "Вибір методології залежав від регіону: європейці надавали перевагу інтерв'ю, американці — опитуванням."
        answer: "Синтез (Добре)"
        options:
          - "Переказ (Погано)"
      - question: "Книга цікава і корисна для студентів."
        answer: "Суб'єктивна оцінка (Погано)"
        options:
          - "Синтез (Добре)"
      - question: "Попри фрагментарність даних, висновки корелюють із теорією."
        answer: "Синтез (Добре)"
        options:
          - "Переказ (Погано)"
      - question: "У першому розділі пишеться про історію. У другому — про сьогодення."
        answer: "Переказ (Погано)"
        options:
          - "Синтез (Добре)"
      - question: "Історичний екскурс дозволяє краще зрозуміти сучасні процеси."
        answer: "Синтез (Добре)"
        options:
          - "Переказ (Погано)"
      - question: "Дані таблиці 1 показують ріст, а дані таблиці 2 показують падіння."
        answer: "Переказ (Погано)"
        options:
          - "Синтез (Добре)"
      - question: "Суперечливість даних у таблицях вказує на нестабільність ринку."
        answer: "Синтез (Добре)"
        options:
          - "Переказ (Погано)"

  - module: 14-lit-review
    type: fill-in
    slug: cohesive-devices-1
    name: "Слова-зв'язки (Схожість)"
    description: "Вставте слова."
    items:
      - text: "[Подібно до] Іванова, Петренко також наголошує на важливості мотивації."
      - text: "Більшість вчених підтримують цю теорію. [Аналогічні] результати отримав Коваль."
      - text: "Ми розглянули загальні тенденції. [Зокрема], варто звернути увагу на кейс України."
      - text: "Ця думка [узгоджується] з висновками інших авторів."
      - text: "[Так само] як і попередні дослідники, ми вважаємо це важливим."
      - text: "Автор [розвиває] ідею свого попередника."
      - text: "Результати [підтверджують] загальну тенденцію."
      - text: "Цей підхід [співзвучний] з ідеями гуманізму."

  - module: 14-lit-review
    type: fill-in
    slug: cohesive-devices-2
    name: "Слова-зв'язки (Контраст)"
    description: "Вставте слова."
    items:
      - text: "Більшість підтримує теорію. [Проте], існують і альтернативні погляди."
      - text: "Дослідження не виявило кореляції. [Отже], гіпотеза не підтвердилася."
      - text: "[Всупереч] поширеній думці, кава не є шкідливою."
      - text: "Марія використала якісний аналіз. [Натомість], Олег обрав кількісний підхід."
      - text: "Ми отримали дані, [однак] вони потребують перевірки."
      - text: "[Хоча] метод старий, він досі ефективний."
      - text: "Автор критикує підхід, [але] пропонує власну альтернативу."
      - text: "Ситуація покращилася, [тим не менше] проблеми залишилися."

  - module: 14-lit-review
    type: match-up
    slug: source-types
    name: "Типи джерел"
    description: "Класифікуйте джерела."
    pairs:
      - "Стаття з експериментом": "Першоджерело"
      - "Огляд літератури": "Вторинне джерело"
      - "Підручник": "Вторинне/Третинне джерело"
      - "Архівний документ": "Першоджерело"
      - "Енциклопедія": "Третинне джерело"
      - "Дисертація": "Першоджерело"
      - "Рецензія на книгу": "Вторинне джерело"
      - "Інтерв'ю": "Першоджерело"
      - "Монографія": "Вторинне джерело (узагальнення)"
      - "Статистичний звіт": "Першоджерело"

  - module: 14-lit-review
    type: quiz
    slug: plagiarism-check
    name: "Детектор плагіату"
    description: "Чи є це порушенням?"
    items:
      - question: "Ви скопіювали речення, але змінили порядок слів."
        answer: "Так, це плагіат"
        options:
          - "Ні, це переказ"
      - question: "Ви взяли ідею, переказали своїми словами і дали посилання."
        answer: "Ні, це доброчесно"
        options:
          - "Так, це плагіат"
      - question: "Ви використали свою стару статтю в новій без посилання."
        answer: "Так, це самоплагіат"
        options:
          - "Ні, це моє власне"
      - question: "Ви забули поставити лапки для цитати."
        answer: "Так, це технічний плагіат"
        options:
          - "Це не страшно"
      - question: "Ви переклали текст з англійської без посилання."
        answer: "Так, це плагіат перекладу"
        options:
          - "Ні, переклад — це творчість"
      - question: "Ви купили статтю в інтернеті."
        answer: "Так, це грубе порушення"
        options:
          - "Ні, я ж заплатив"
      - question: "Ви вказали співавтором друга, який нічого не робив."
        answer: "Так, це порушення етики"
        options:
          - "Ні, це допомога другу"
      - question: "Ви використали ChatGPT для ідей, але написали самі."
        answer: "Це допустимо (з вказівкою)"
        options:
          - "Це суворо заборонено"

  - module: 14-lit-review
    type: fill-in
    slug: intro-structure
    name: "Структура Вступу"
    description: "Відновіть логіку."
    items:
      - text: "Спочатку ми описуємо [актуальність] теми."
      - text: "Далі ми робимо огляд [останніх] досліджень."
      - text: "Потім ми знаходимо [прогалину] в знаннях."
      - text: "Етап завершується формулюванням [мети] нашої роботи."
      - text: "Також варто окреслити [об'єкт] дослідження."
      - text: "Не забуваймо про [предмет] (вузький аспект)."
      - text: "Важливо вказати [методи], якими ми користувалися."
      - text: "Вступ має зацікавити [читача] з перших рядків."

  - module: 14-lit-review
    type: match-up
    slug: synonyms-say
    name: "Синоніми 'Сказати'"
    description: "Замініть прості слова на академічні."
    pairs:
      - "Сказати": "Зазначити / Стверджувати"
      - "Думати": "Вважати / Міркувати"
      - "Дивитися": "Аналізувати / Розглядати"
      - "Знайти": "Виявити / Встановити"
      - "Показати": "Продемонструвати"
      - "Перевірити": "Верифікувати"
      - "Зробити": "Здійснити"
      - "Писати": "Висвітлювати"

  - module: 14-lit-review
    type: quiz
    slug: formatting-basics
    name: "Основи цитування"
    description: "Оберіть правильний формат (спрощено)."
    items:
      - question: "Де ставиться крапка при цитуванні?"
        answer: "Після дужок з прізвищем: '...(Іванов, 2020).'"
        options:
         - "Перед дужками"
      - question: "Що робити, якщо авторів двоє?"
        answer: "Вказувати обох (Іванов і Петров, 2020)"
        options:
         - "Вказувати тільки першого"
      - question: "Що таке 'et al.' або 'та ін.'?"
        answer: "Колектив авторів (більше 2-3)"
        options:
         - "Це ім'я вченого"
      - question: "Чи треба вказувати сторінку для прямої цитати?"
        answer: "Так, обов'язково (с. 45)"
        options:
         - "Ні, достатньо року"
      - question: "Як оформити список літератури?"
        answer: "В алфавітному порядку"
        options:
         - "У порядку появи в тексті"
      - question: "Що таке DOI?"
        answer: "Унікальний номер статті в інтернеті"
        options:
         - "Дата публікації"
      - question: "Чи можна цитувати Вікіпедію?"
        answer: "Ні, це не академічне джерело"
        options:
         - "Так, це зручно"
      - question: "Чи треба перекладати назви англійських статей?"
        answer: "Зазвичай наводять мовою оригіналу"
        options:
         - "Так, завжди"

  - module: 14-lit-review
    type: fill-in
    slug: gap-analysis
    name: "Аналіз прогалин"
    description: "Вставте типи прогалин."
    items:
      - text: "Ми знаємо, що це працює в США, але не в Україні. Це [географічна] прогалина."
      - text: "Ми знаємо теорію, але не маємо даних. Це [емпірична] прогалина."
      - text: "Ми досліджували дорослих, але не дітей. Це прогалина у [вибірці]."
      - text: "Ми знаємо 'що', але не знаємо 'чому'. Це [теоретична] прогалина."
      - text: "Попередні методи були неточні. Це [методологічна] прогалина."
      - text: "Результати суперечать одне одному. Це [дискусійна] прогалина."
      - text: "Ніхто не досліджував цю тему останні 50 років. Це [часова] прогалина."
      - text: "Ми ігнорували контекст. Це [контекстуальна] прогалина."

  - module: 14-lit-review
    type: match-up
    slug: review-stages
    name: "Етапи роботи"
    description: "Розставте кроки."
    pairs:
      - "Крок 1": "Пошук джерел"
      - "Крок 2": "Відбір (скринінг)"
      - "Крок 3": "Читання та анотування"
      - "Крок 4": "Групування за темами"
      - "Крок 5": "Синтез і написання"
      - "Крок 6": "Редагування"
      - "Крок 7": "Оформлення бібліографії"
      - "Крок 8": "Перевірка плагіату"

  - module: 14-lit-review
    type: essay-response
    slug: lit-review-draft
    name: "Написання міні-огляду"
    description: "Напишіть короткий огляд (3-4 речення) на тему 'Вплив технологій на освіту', синтезуючи дві позиції."
    items:
      - question: "Напишіть синтез позицій 'оптимістів' та 'песимістів'."
        answer: "Зразок: Питання впливу технологій на освіту залишається дискусійним. Якщо 'оптимісти' (Гейтс, 2015) наголошують на доступності знань, то 'песимісти' (Шпіцер, 2012) застерігають про зниження когнітивних здібностей. Отже, технології є інструментом, ефективність якого залежить від методики."
