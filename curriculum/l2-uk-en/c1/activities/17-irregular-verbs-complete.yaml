- type: mark-the-words
  instructions: Позначте всі нерегулярні дієслова в тексті.
  text: |
    Я *сиджу* біля вікна і *пишу* листа. На вулиці *іде* дощ. Люди *біжать* під парасольками. Тато *несе* важку сумку, а мама *веде* маленького сина. Я *хочу* вийти на вулицю, але *мушу* вчитися. Завтра я *дам* цей зошит вчителю. Він скаже, що я стараюся. Я знаю.

- type: unjumble
  instructions: Побудуйте правильні речення рівня С1.
  items:
  - jumbled: Ми / не / могли / передбачити / таких / наслідків.
    answer: Ми не могли передбачити таких наслідків.
  - jumbled: Час / летить / коли / ти / щасливий.
    answer: Час летить коли ти щасливий.
  - jumbled: Вона / завжди / хоче / знати / правду.
    answer: Вона завжди хоче знати правду.
  - jumbled: Куди / ти / біжиш / так / пізно / ввечері?
    answer: Куди ти біжиш так пізно ввечері?
  - jumbled: Я / дам / тобі / відповідь / завтра / вранці.
    answer: Я дам тобі відповідь завтра вранці.
  - jumbled: Вони / їдять / лише / здорову / та / свіжу / їжу.
    answer: Вони їдять лише здорову та свіжу їжу.
  - jumbled: Ти / мусиш / дати / мені / спокій.
    answer: Ти мусиш дати мені спокій.
  - jumbled: Ця / дорога / веде / до / старого / замку.
    answer: Ця дорога веде до старого замку.

- type: true-false
  instructions: Визначте, чи правдиве твердження про українські дієслова.
  items:
  - statement: Дієслово "дати" має регулярні закінчення в однині (-ю, -єш, -є).
    answer: false
  - statement: Форма "ти даси" є єдиною правильною літературною формою.
    answer: true
  - statement: Дієслова "ходити" і "носити" належать до групи мультиспрямованих дієслів.
    answer: true
  - statement: У дієсловах на -ти (губний) з'являється "л" тільки в 3-й особі множини.
    answer: false
  - statement: "'Я біжу' - це правильна форма 1-ї особи однини."
    answer: true
  - statement: Дієслово "хотіти" змінюється за ІІ дієвідміною (як "робити").
    answer: false
  - statement: "'Йти' - це рух в один бік у конкретний момент."
    answer: true
  - statement: "'Їсти' має в однині закінчення -м, -си, -сть."
    answer: true

- type: error-correction
  instructions: Виправте помилки в реченнях.
  items:
  - sentence: "Ти даш мені ручку?"
    error: "даш"
    answer: "Ти даси мені ручку?"
  - sentence: "Я хочу додому пішки вчора."
    error: "хочу"
    answer: "Я йшов додому пішки вчора."
  - sentence: "Ми їмо суп ложками."
    error: "їмо"
    answer: "Ми їмо суп ложками."
  - sentence: "Він біжить кожного ранку в парку."
    error: "біжить"
    answer: "Він бігає кожного ранку в парку."
  - sentence: "Я любю читати книги українською."
    error: "любю"
    answer: "Я люблю читати книги українською."
  - sentence: "Вона пише листа зараз."
    error: "пише"
    answer: "Вона пише листа зараз."
  - sentence: "Ти їш занадто багато солодкого."
    error: "їш"
    answer: "Ти їси занадто багато солодкого."
  - sentence: "Вони хочуть поїхати в Карпати."
    error: "хочуть"
    answer: "Вони хочуть поїхати в Карпати."

- type: fill-in
  instructions: Вставте пропущені слова у текст про історичну лінгвістику.
