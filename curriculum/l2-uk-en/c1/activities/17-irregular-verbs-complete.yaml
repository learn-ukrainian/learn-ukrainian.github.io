  - sentence: "Це відрізняє літературну мову від ___ (діалектів)."
    answer: діалектів

- type: essay-response
  instructions: Напишіть короткий аналіз (200-250 слів) про роль дієслів руху в художній літературі. Використовуйте приклади (йти/ходити, нести/носити).
  rubric:
    - "25%: Correct use of motion verb aspect (unidirectional/multidirectional)."
    - "25%: Analysis of prefix nuances (прийти, піти, зайти)."
    - "25%: Coherent argument about literary effect."
    - "25%: C1 academic vocabulary usage."
  model_answer: >
    У поезії Тараса Шевченка дієслова руху відіграють ключову роль у відтворенні плинності часу та людської долі. Розглянемо, наприклад, контраст між "йти" та "ходити". Коли поет пише "Минають дні, минають ночі", він використовує дієслова, що підкреслюють незворотність руху часу (unidirectional flow). Водночас, використання багатоспрямованих дієслів, як-от "блукати", часто символізує пошук істини або втрату орієнтирів. У вірші "Мені тринадцятий минало" дієслово "пасти" не є дієсловом руху, але динаміка змінюється, коли герой починає "дивитися" і "плакати". Раптом з'являється рух: "прийшла", "поцілувала". Це одномоментна дія, яка змінює весь настрій сцени. Якби Шевченко написав "приходила", це зняло б унікальність моменту. Отже, вибір між доконаним/недоконаним видом та типом руху дозволяє автору керувати темпом оповіді.
