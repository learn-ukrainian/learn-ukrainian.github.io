- type: quiz
  instructions: Оберіть правильну форму дієслова 'бути' або споріднених слів.
  items:
  - question: У майбутньому я ___ лікарем.
    options:
    - буду
    - є
    - був
    - буваю
    answer: буду
  - question: Цей факт ___ незаперечним доказом.
    options:
    - є
    - будуть
    - були
    - бувши
    answer: є
  - question: Чи ___ ви коли-небудь у Львові?
    options:
    - були
    - будуть
    - є
    - будьте
    answer: були
  - question: Ми ___ вдячні за вашу допомогу.
    options:
    - будемо
    - є
    - були
    - будьмо
    answer: будемо
  - question: Вона ___ експертом у цій галузі.
    options:
    - є
    - буде
    - була
    - було
    answer: є
  - question: На жаль, їх тут не ___.
    options:
    - було
    - були
    - є
    - будуть
    answer: було
  - question: ___ уважні на дорозі!
    options:
    - Будьте
    - Будете
    - Є
    - Були
    answer: Будьте
  - question: Нехай ___ як буде.
    options:
    - буде
    - є
    - був
    - буду
    answer: буде

