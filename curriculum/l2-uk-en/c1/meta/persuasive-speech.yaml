slug: persuasive-speech
title: Переконлива промова
word_target: 4000
content_outline:
- section: Вступ — Мистецтво переконання
  words: 600
  points:
  - 'Визначення риторики в контексті Стандарту (С1): від античності до сучасності.'
  - 'Українська риторична традиція: від промов на козацьких радах до виступів на Майдані.'
  - 'Три кити переконання: логос (логіка, факти), пафос (емоції, цінності), етос (авторитет
    мовця).'
  - Відмінність між 'переконувати' (процес) та 'переконати' (результат).
- section: Структура аргументації
  words: 900
  points:
  - 'Класична модель: Теза (твердження) → Антитеза (заперечення) → Синтез (висновок/рішення).'
  - 'Дедукція vs Індукція: особливості української академічної традиції (перевага
    дедукції).'
  - 'Ланцюгова аргументація: використання вставних слів (по-перше, по-друге, зрештою)
    для структурування.'
  - 'Техніка поступки та спростування: конструкції ''Хоча..., проте...'', ''Звісно...,
    але...'' для посилення позиції.'
- section: 'Фігури мовлення: Синтаксичні засоби'
  words: 900
  points:
  - 'Анафора (єдинопочаток): повторення для ритму та натиску (приклади з поезії та
    політики).'
  - 'Епіфора: повторення кінцевих елементів для фіксації думки.'
  - 'Градація (висхідна та низхідна): нагнітання емоційної напруги.'
  - 'Антитеза: різке протиставлення понять для контрасту (війна — мир, світло — темрява).'
  - 'Риторичне запитання: функція твердження у формі запитання.'
- section: Ритм і паузи в промові
  words: 700
  points:
  - 'Правило трьох (триколон): магія числа три в українській фразеології та риториці.'
  - 'Чергування довгих і коротких речень: динаміка виступу.'
  - 'Парцеляція: навмисне розчленування речення на частини для драматичного ефекту.'
  - 'Роль паузи: як мовчання може бути гучнішим за слова.'
- section: 'Практика: Написання та виголошення промови'
  words: 600
  points:
  - Аналіз фрагмента відомої української промови (наприклад, промова В. Чорновола
    або сучасного лідера).
  - 'Алгоритм підготовки: від визначення мети до вибору тональності.'
  - 'Критерії ефективності: ясність тези, сила аргументів, доречність фігур.'
  - 'Peer review: як оцінювати переконливість чужого виступу (чек-лист).'
- section: Підсумок
  words: 300
  points:
  - Узагальнення ключових інструментів риторики.
  - 'Таблиця доречності: коли використовувати пафос, а коли — сухий логос.'
  - Заклик до свідомого використання слова як зброї та інструменту змін.
