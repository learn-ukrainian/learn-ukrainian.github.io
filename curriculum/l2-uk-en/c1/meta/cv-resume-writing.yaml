slug: cv-resume-writing
title: Написання резюме та CV
word_target: 4000
content_outline:
- section: 'Вступ: Резюме та CV — у чому різниця?'
  words: 300
  points:
  - Definition and distinction between Resume (concise) and CV (academic/detailed)
    in the Ukrainian context.
  - 'Global vs. local trends: When to use which format.'
  - The shift from Soviet-style 'Autobiography' to modern professional standards.
- section: 'Структура українського CV: Стандарти та очікування'
  words: 800
  points:
  - 'Header: Contact info, photo etiquette, and professional summary.'
  - 'Work Experience: Reverse chronological order, formatting roles and dates.'
  - 'Education: Correctly translating degrees and institutions (Bologna process compatibility).'
  - 'Skills & Languages: Categorizing hard vs. soft skills; CEFR levels for languages.'
  - 'Additional sections: Portfolio, volunteering, references (Рекомендації).'
- section: 'Мова успіху: Дієслова дії та активні конструкції'
  words: 600
  points:
  - 'The power of Action Verbs: List of high-impact verbs (керував, впровадив, збільшив).'
  - Transforming passive duties into active achievements (STAR method adaptation).
  - 'Quantifying results: How to integrate metrics and numbers into descriptions.'
- section: 'Офіційно-діловий стиль: Лаконічність та точність'
  words: 600
  points:
  - 'Characteristics of official-business style in CVs: Objectivity, logic, clarity.'
  - Avoiding 'water' (clichés and empty phrases like 'комунікабельний').
  - 'Grammar focus: Impersonal constructions vs. direct active verbs.'
  - 'De-anglicization: Avoiding direct calques and false friends.'
- section: 'Супровідний лист (Cover Letter): Мистецтво самопрезентації'
  words: 800
  points:
  - Purpose and structure of a Ukrainian cover letter.
  - 'Opening lines: Addressing the recruiter and stating intent.'
  - 'The ''Hook'': Connecting your experience to the company''s needs.'
  - Closing formulas and Call to Action.
  - 'Tone calibration: Confident but polite (ввічлива впевненість).'
- section: Типові помилки та як їх уникнути
  words: 500
  points:
  - Visual clutter and formatting errors.
  - 'Grammatical traps: Case agreement in lists, spelling mistakes.'
  - 'Stylistic blunders: Informal tone, slang, excessive subjectivity.'
  - 'Irrelevant information: What to leave out (hobbies, marital status).'
- section: 'Практикум: Створення ідеального профілю'
  words: 400
  points:
  - Step-by-step checklist for self-audit.
  - 'Peer review simulation: Analyzing a ''bad'' CV example.'
  - Adapting the CV for different job descriptions (tailoring).
