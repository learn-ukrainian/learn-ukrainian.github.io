slug: honcharstvo-ta-rizbyarstvo
title: Гончарство та різьбярство
word_target: 4000
content_outline:
- section: Розминка — Ремесло та мистецтво
  words: 800
  points:
  - 'Гончарство та різьбярство як фундамент матеріальної культури українців: від неоліту
    (Трипілля) до сьогодення.'
  - 'Філософське розмежування понять: ужиткове ремесло (craft) vs декоративне мистецтво
    (art). Де проходить межа?'
  - 'Матеріали та їх символіка: глина (земля, народження, тепло) та дерево (життя,
    рід, тепло).'
  - 'Сакральний вимір речі: макітра як символ достатку, різьблений сволок як оберіг
    дому.'
- section: Українське гончарство
  words: 1200
  points:
  - 'Географія стилів: пишна, рослинна Опішня (Полтавщина) проти графічного, сюжетного
    Косова (Гуцульщина).'
  - 'Технологія дива: підготовка глини, робота на гончарному крузі, випалювання в
    горні, глазурування (полива).'
  - 'Унікальні форми посуду: куманець (для свят), тиква, барильце, двійнята (для обіду
    в полі).'
  - 'Косівська кераміка (ЮНЕСКО): техніка ''ритування'' (сграфіто) та канон трьох
    кольорів (зелений, жовтий, коричневий).'
  - 'Чорнодимлена кераміка (Гавареччина): аскетизм форми та ''сріблястий'' ефект без
    використання глазурі.'
- section: Українське різьбярство
  words: 1200
  points:
  - 'Гуцульщина як серце українського різьбярства: феномен династій Шкрібляків та
    Корпанюків.'
  - 'Види різьблення: ''суха'' (плоска) різьба, рельєфна різьба, ажурна (наскрізна)
    різьба.'
  - 'Мистецтво інкрустації (''писане дерево''): використання бісеру (пацьорки), кольорового
    металу, перламутру, рогу.'
  - 'Асортимент виробів: від монументальних іконостасів та скринь до мініатюрних рахв,
    тарілок і топірців.'
  - 'Символіка орнаменту: солярні знаки (розети), ''зубці'', ''кучері'' та їхнє давнє
    значення.'
- section: Практика — опис ремесла
  words: 800
  points:
  - 'Лексичний інструментарій мистецтвознавця: як професійно описати фактуру, форму
    та декор виробу.'
  - 'Аналітичне завдання: порівняльний опис опішнянського глечика та гуцульської тарілки
    (спільне та відмінне).'
  - 'Есе-роздум: ''Традиційне ремесло в епоху мас-маркету: музейний експонат чи жива
    традиція?'' (аргументація).'
  - 'Роль сучасних брендів (Gunia Project та ін.) у переосмисленні спадщини: від етнографії
    до сучасного дизайну.'
