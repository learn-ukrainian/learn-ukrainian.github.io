slug: thesis-development
title: Розвиток наукової тези
word_target: 4000
content_outline:
- section: 'Вступ: Що таке наукова теза?'
  words: 500
  points:
  - 'Визначення тези: не просто тема, а ствердження, яке потребує доказів.'
  - Етимологія та історія поняття (від грец. thesis — положення).
  - 'Ключова відмінність: Факт (незаперечний) vs Теза (дискусійна).'
  - 'Роль тези в академічному тексті: стрижень, на який нанизуються аргументи.'
- section: 'Типологія тез: від констатації до аналізу'
  words: 600
  points:
  - 'Констатувальна теза (Fact-based thesis): Стверджує наявність явища (X є Y).'
  - 'Аргументативна теза (Argumentative thesis): Переконує у правильності позиції
    (X є Y, тому що Z).'
  - 'Аналітична теза (Analytical thesis): Розкладає явище на складові (X складається
    з A, B, C, що впливає на D).'
  - Приклади трансформації однієї теми в різні типи тез.
- section: 'Критерії сильної тези: чек-ліст науковця'
  words: 600
  points:
  - 'Конкретність (Specific): Уникнення розмитих узагальнень (''цікавий'', ''хороший'').'
  - 'Дискусійність (Debatable): Теза не повинна бути очевидною істиною (аксіомою).'
  - 'Доказовість (Supportable): Наявність доступних джерел та аргументів.'
  - 'Лаконічність: Вміння сформулювати головну думку одним-двома реченнями.'
- section: 'Тест «І що з того?»: перевірка значущості'
  words: 500
  points:
  - 'Суть тесту ''So What?'': Чому читач має про це дбати?'
  - Виявлення банальностей та 'води'.
  - Забезпечення актуальності та новизни дослідження.
  - 'Практикум: Редагування ''слабких'' тез за допомогою цього питання.'
- section: 'Стратегії обґрунтування: архітектура доказу'
  words: 600
  points:
  - 'Тріада: Теза — Аргумент — Доказ (Evidence).'
  - 'Логічна послідовність: як будувати ланцюжок доказів.'
  - 'Дієслова академічної аргументації: доводити, спростовувати, ілюструвати, корелювати.'
  - Використання вставних конструкцій для зв'язності (отже, по-перше, з огляду на
    це).
- section: 'Еволюція тези: від чернетки до фіналу'
  words: 600
  points:
  - 'Аналіз типових помилок: ''теза-анонс'', ''теза-факт'', ''теза-кліше''.'
  - 'Процес уточнення (refining): як звузити тему до робочої тези.'
  - 'Гнучкість: чому нормально змінювати тезу в процесі дослідження.'
  - 'Вправа ''До і Після'': трансформація слабких формулювань.'
- section: 'Практикум: Майстерня формулювань'
  words: 600
  points:
  - Алгоритм створення тези на задану тему (наприклад, 'Вплив ШІ на освіту').
  - Техніка 'Brainstorming' для пошуку аргументів.
  - 'Peer-review: критерії оцінювання тези колеги.'
  - 'Підсумок: теза як інтелектуалний підпис автора.'
