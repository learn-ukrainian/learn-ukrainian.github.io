slug: high-formal-register
title: 'Офіційно-діловий стиль: Мова документів'
word_target: 4000
content_outline:
- section: Вступ — Світ офіційних документів
  words: 600
  points:
  - Definition of official-business style (офіційно-діловий стиль) and its function
    in society (legal regulation, documentation).
  - 'State Standard alignment: Overview of functional styles with a focus on the official
    style.'
  - 'Key characteristics: precision, unambiguity, standardization, lack of emotional
    coloring.'
  - 'Cultural context: Brief history of Ukrainian official documentation from Cossack
    Universals to modern State Standard (ДСТУ).'
- section: Підстилі офіційно-ділового стилю
  words: 600
  points:
  - 'Legislative substyle (Законодавчий): Language of laws, constitution, codes. Focus
    on imperative and regulatory nature.'
  - 'Diplomatic substyle (Дипломатичний): Language of international relations, notes,
    memorandums, conventions. Focus on protocol and etiquette.'
  - 'Administrative-clerical substyle (Адміністративно-канцелярський): Language of
    office work, orders, instructions, correspondence. Focus on standard templates.'
  - 'Business substyle (Діловий): Language of commercial contracts, agreements, acts.
    Focus on obligations and rights.'
- section: Синтаксис канцеляриту
  words: 800
  points:
  - 'Passive constructions: Usage and formation (e.g., ''було прийнято рішення'').
    When to use passive vs active voice.'
  - 'Nominalization (Verbal Nouns): Prevalence of -ння/-ення forms (e.g., ''з метою
    забезпечення'', ''для виконання'').'
  - 'Impersonal constructions: ''слід зазначити'', ''необхідно підкреслити'', ''заборонено''.
    usage for objectivity.'
  - 'Word order: Strict direct word order (Subject-Predicate-Object) to avoid ambiguity.
    Minimal inversion.'
  - 'Common syntax errors: Splitting standard phrases, misplaced modifiers.'
- section: Кліше та стандартні формули
  words: 800
  points:
  - 'Prepositional phrases: ''Відповідно до + Gen'', ''Згідно з + Instr'', ''На підставі
    + Gen'', ''З огляду на + Acc''. Detailed analysis of case government.'
  - 'Opening formulas: ''Звертаємося до Вас із проханням...'', ''Повідомляємо, що...''.'
  - 'Body formulas: ''Вважати за доцільне...'', ''Покласти контроль на...'', ''Взяти
    до уваги...''.'
  - 'Closing formulas: ''З повагою...'', ''Підпис...'', ''Дата...''.'
  - 'Differentiation: When to use which formula depending on the document type and
    substyle.'
- section: Типи документів
  words: 800
  points:
  - 'Legislative documents: Закон (Law) structure (preamble, articles). Постанова
    (Decree).'
  - 'Administrative documents: Наказ (Order) - structure (header, administrative part,
    operative part). Протокол (Protocol/Minutes) - strict formatting of meetings.'
  - 'Personal documents: Заява (Application) - detailed structure (addressee, applicant,
    text, date, signature). Довідка (Certificate).'
  - 'Visual structure: Importance of margins, spacing, and standard layout (ДСТУ 4163).'
- section: Практика — Від канцеляриту до людської мови
  words: 400
  points:
  - 'Analysis of an authentic legislative text excerpt: Identifying features.'
  - 'Writing task: Drafting a standard ''заява'' for a leave of absence or request.'
  - 'Stylistic editing: Transforming a heavily bureaucratic text into neutral style
    (de-bureaucratization).'
  - 'Stylistic transformation: Turning a colloquial request into a formal ''заява''
    (bureaucratization).'
- section: Підсумок
  words: 200
  points:
  - 'Recap of key features: Precision, standardization, objectivity.'
  - 'The ''Golden Mean'': Using official style where appropriate vs. abusing ''канцелярит''
    in daily speech.'
  - Checklist for drafting an official document.
