slug: intimate-register
title: 'Інтимно-ласкавий стиль: Мова близьких стосунків'
word_target: 4000
content_outline:
- section: 'Вступ: Природа інтимно-ласкавого стилю'
  words: 400
  points:
  - Визначення інтимно-ласкавого стилю як синтезу розмовного та художнього.
  - 'Сфери вживання: родина, романтичні стосунки, близька дружба.'
  - Відмінність від нейтрального та офіційного регістрів (таблиця порівняння).
  - 'Психологічна функція: створення безпеки, довіри та емоційної близькості.'
- section: 'Морфологія ніжності: Зменшувально-пестливі форми'
  words: 1000
  points:
  - 'Суфіксальний спосіб творення демінутивів: -ок, -ек, -к- (чоловічий рід).'
  - 'Суфікси жіночого роду: -ка, -ця, -еньк-, -оньк- (рибка, квітонька).'
  - 'Суфікси середнього роду: -це, -еня (сонечко, зайченя).'
  - Подвійна та потрійна демінутивізація (рука -> ручка -> рученька).
  - Демінутиви у дієсловах та прислівниках (спатки, їстоньки, тихенько, гарненько)
    — особливість української мови.
- section: 'Етикет звертань: Кличний відмінок у близьких стосунках'
  words: 800
  points:
  - 'Граматика інтимного вокативу: усічення та пом''якшення (Мам! Тат! vs Мамо, Тату).'
  - 'Ласкаві прізвиська: метафори (тваринний світ, явища природи, коштовності).'
  - 'Епітети у звертаннях: *Мій дорогий, моя єдина, світло моїх очей*.'
  - 'Займенникова інтимізація: постпозиція займенника *мій/моя* (*радість моя*, *серце
    моє*).'
- section: 'Синтаксис почуттів: Інверсія, еліпсис та повтори'
  words: 800
  points:
  - 'Еліпсис (неповні речення): роль спільного контексту («Ти каву?» — «Ага»).'
  - Інверсія для емоційного виділення (*Гарна ти сьогодні*, *Люблю я тебе*).
  - Лексичні повтори для підсилення (*чекаю-чекаю*, *далеко-далеко*).
  - Парцеляція та емоційні паузи на письмі (тире, три крапки).
- section: 'Культурний вимір: Українська епістолярна традиція'
  words: 600
  points:
  - 'Історичні приклади: листування Лесі Українки («Твої листи завжди пахнуть зів''ялими
    трояндами...»).'
  - Публічний vs Приватний прояв почуттів в українській традиції.
  - 'Сучасні тенденції: інтимність у месенджерах (емодзі, скорочення, транслітерація
    як гра).'
  - Аналіз уривка з літературного твору (Франко або Кобилянська).
- section: Підсумок
  words: 400
  points:
  - Узагальнення основних ознак стилю.
  - 'Попередження про доречність: коли ніжність стає фамільярністю.'
  - 'Фінальна рефлексія: мова як інструмент любові.'
