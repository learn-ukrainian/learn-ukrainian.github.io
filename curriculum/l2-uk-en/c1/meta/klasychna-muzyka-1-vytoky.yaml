slug: klasychna-muzyka-1-vytoky
title: Класична музика I — Витоки
word_target: 4000
content_outline:
- section: Розминка — Українці у світовій музиці
  words: 400
  points:
  - Українські композитори XVIII-XIX ст. як частина загальноєвропейського контексту
  - Еволюція від церковної музики (бароко) до світської опери
  - Вплив італійської школи на формування українського музичного стилю
  - 'Вступ до теми: роль музики у формуванні національної ідентичності'
- section: 'Максим Березовський: Трагічний геній'
  words: 850
  points:
  - Навчання в Болонській академії та визнання в Європі (порівняння з Моцартом)
  - 'Опера «Демофонт» (1773): успіх в Італії та забуття на батьківщині'
  - 'Духовна музика: концерт «Не отвержи мене во время старости» як вершина трагізму'
  - Загадкові обставини смерті та повернення із забуття в XXI столітті
- section: 'Дмитро Бортнянський: Золота доба хорового співу'
  words: 850
  points:
  - 'Блискуча кар''єра: від Глухова до директора Придворної співацької капели'
  - Вплив західноєвропейського класицизму на творчість Бортнянського
  - 'Хорові концерти: поєднання технічної досконалості та емоційної глибини'
  - 'Спадщина: як Бортнянський вплинув на розвиток української церковної музики'
- section: 'Семен Гулак-Артемовський: Народження національної опери'
  words: 850
  points:
  - 'Постать Гулака-Артемовського: співак, композитор, драматург'
  - '«Запорожець за Дунаєм» (1863): історичний контекст створення та сюжет'
  - 'Образ Карася та Одарки: народний гумор і жива українська мова'
  - Значення опери для ствердження української культури в умовах імперії
- section: Практика — аналіз музики
  words: 650
  points:
  - 'Аналіз фрагмента «Демофонта» (лексика для опису: темп, динаміка, настрій)'
  - Порівняльний аналіз хорового стилю Бортнянського та західних сучасників
  - 'Робота з текстом: написання есе про культурне значення «Запорожця за Дунаєм»'
  - 'Дискусія: трагедія митця в тоталітарній (імперській) системі (кейс Березовського)'
- section: Підсумок
  words: 400
  points:
  - Узагальнення внеску «золотої трійці» (Березовський, Бортнянський, Ведель/Гулак-Артемовський)
  - Повторення ключових музичних термінів та граматичних конструкцій (дієприкметникові
    звороти)
  - 'Рефлексія: як музика 18-19 століть резонує з сучасністю'
  - 'Анонс наступних тем: від класики до романтизму (Лисенко)'
