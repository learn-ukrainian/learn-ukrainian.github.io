slug: speaking-practice
title: Мовний практикум
word_target: 4000
content_outline:
- section: Огляд C1.2 — Контрольна точка
  words: 400
  points:
  - Recap of the 'Professional Communication' phase (Modules 21-34), highlighting
    key achievements.
  - 'Definition of C1.2 competencies: fluency in official and publicistic styles.'
  - 'Structure of this checkpoint: from theory review to practical simulation.'
  - The importance of self-reflection in mastering advanced language skills.
- section: Професійна комунікація
  words: 800
  points:
  - 'CV and Cover Letter: Key structural elements and ''power words'' in Ukrainian.'
  - 'Job Interview simulation: Standard questions (Tell us about yourself) and STAR
    method answers in Ukrainian.'
  - 'Business Etiquette: ''Ви'' vs ''Ти'', email formalities, and small talk restrictions.'
  - 'Digital Communication: Norms for Slack/Telegram in Ukrainian IT and business
    sectors.'
- section: Політика та медіа
  words: 600
  points:
  - 'Ukrainian Political System: Key terminology (Verkhovna Rada, Cabinet of Ministers,
    decentralization).'
  - 'Media Literacy: Identifying manipulation, emotional language, and fake news markers.'
  - 'Publicistic Style features: Rhetorical questions, appeals to emotion, and logical
    structuring.'
  - 'Discussing international context: Vocabulary for diplomacy and global relations.'
- section: Соціолінгвістичні знання
  words: 600
  points:
  - Overview of Ukrainian dialects (Polissian, South-Eastern, South-Western) with
    listening examples descriptions.
  - 'Surzhyk: Definition, mechanisms of formation, and how to distinguish it from
    dialects.'
  - 'Brief history of the Ukrainian language: Key prohibitions (Ems Ukaz) and renaissance
    periods.'
  - 'Diaspora Ukrainian: Key traits of the language spoken in Canada and the US (preservation
    of archaic forms).'
- section: Усні завдання
  words: 600
  points:
  - 'Framework for spontaneous speech: How to structure a 2-minute monologue on an
    unseen topic.'
  - 'Debate simulation: Phrases for agreeing, disagreeing, and interrupting politely.'
  - 'Roleplay scenarios: ''Difficult negotiation'' and ''Press conference''.'
  - Techniques for maintaining fluency when vocabulary is lacking (circumlocution).
- section: Оцінювання
  words: 400
  points:
  - 'CEFR C1 Criteria for Speaking: Range, Accuracy, Fluency, Interaction, Coherence.'
  - 'Self-assessment rubric: How to evaluate one''s own recorded speech.'
  - 'Constructive feedback: How to give and receive critique in a professional setting.'
  - Common pitfalls at C1 level and how to overcome the 'intermediate plateau' legacy.
- section: Практичні завдання
  words: 600
  points:
  - 'Mock Exam Task 1: Formal presentation based on a graph or chart.'
  - 'Mock Exam Task 2: Collaborative problem solving (consensus building).'
  - 'Dialect recognition challenge: Analyzing short text excerpts for regional features.'
  - 'Final reflection: Setting goals for the next phase (C1.3 Stylistics).'
