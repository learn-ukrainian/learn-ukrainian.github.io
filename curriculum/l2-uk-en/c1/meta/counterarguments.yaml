slug: counterarguments
title: Контраргументи та спростування
word_target: 4000
content_outline:
- section: Вступ — Сила контраргументу
  words: 400
  points:
  - 'Definition of a counterargument: not just disagreement, but a reasoned response'
  - The 'Steel Man' vs. 'Straw Man' concept (intellectual charity)
  - Why acknowledging opposing views increases your own credibility (ethos)
- section: Мова визнання (Acknowledging)
  words: 600
  points:
  - 'Introductory phrases for partial agreement: ''Справді, ...'', ''Безперечно, ...'',
    ''Можна погодитися, що...'''
  - 'Distancing phrases: ''Дехто стверджує...'', ''Існує думка, що...'''
  - 'Grammar focus: Parenthetical words indicating concession (звісно, безумовно)'
  - The psychology of 'Yes, and...' vs 'Yes, but...'
- section: Мова спростування (Refuting)
  words: 600
  points:
  - 'Strong contrast markers: ''Проте'', ''Однак'', ''Втім'', ''Тим не менш'''
  - 'Softening the blow: ''Водночас'', ''З іншого боку'', ''Разом з тим'''
  - 'Verbs of refutation: ''спростовувати'', ''заперечувати'', ''ставити під сумнів'',
    ''нівелювати'''
  - 'Stylistic nuance: How to disagree politely vs. categorically'
- section: Структура «визнання + спростування»
  words: 800
  points:
  - 'The concession-assertion pattern: ''Хоча [X], проте [Y]'''
  - 'Prepositional concessions: ''Незважаючи на [X], [Y]'', ''Попри [X], [Y]'''
  - 'Complex sentence construction: subordination with ''хоча'', ''дарма що'', ''хай'''
  - 'Analyzing the weight of arguments: balancing the concession clause against the
    main clause'
- section: Типи спростувань
  words: 600
  points:
  - 'Refuting the Fact: Evidence-based correction (''Це суперечить даним...'')'
  - 'Refuting the Relevance: ''Це не стосується суті питання...'''
  - 'Refuting the Sufficiency: ''Цього недостатньо для висновку, що...'''
  - 'Refuting the Logic: Pointing out the flaw in reasoning'
- section: Логічні помилки в аргументації
  words: 500
  points:
  - 'Ad Hominem (Перехід на особистості): Attacking the person, not the argument'
  - 'Straw Man (Солом''яна людина): Distorting the opponent''s view'
  - 'False Dichotomy (Помилкова дихотомія): ''Abo... abo...'' when other options exist'
  - 'Vocabulary for identifying fallacies: ''хибне коло'', ''підміна понять'''
- section: 'Практика дебатів: Етика та структура'
  words: 500
  points:
  - 'The 4-step refutation model: ''They say...'' -> ''But...'' -> ''Because...''
    -> ''Therefore...'''
  - Academic vs. Political debate styles
  - 'Cultural notes: The tradition of Ukrainian polemical literature'
  - Final checklist for a strong counterargument
