  - Повернення сакрального та державницького змісту в добу Незалежності.
  - 'Концепція ''європеїзму'' Шевченка: естет, художник, інтелектуал.'
- section: 'Глобальний Шевченко: Пам''ятники та діаспора'
  words: 800
