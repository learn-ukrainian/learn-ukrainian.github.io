  - 'Географія пам''ятників: Вашингтон, Париж, Буенос-Айрес як маркери української
    присутності.'
  - Роль діаспори у збереженні 'нецензурованого' Шевченка в ХХ столітті.
  - 'Шевченко в перекладах: як світ читає українського пророка.'
  - 'Шевченківська премія: історія найвищої нагороди.'
- section: 'Сучасний контекст: Шевченко у пікселях і камуфляжі'
  words: 800
