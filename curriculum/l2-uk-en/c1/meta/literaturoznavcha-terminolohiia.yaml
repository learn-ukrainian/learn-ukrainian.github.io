slug: literaturoznavcha-terminolohiia
title: Літературознавча термінологія
word_target: 4000
content_outline:
- section: 'Розминка: Мова літературознавства'
  words: 400
  points:
  - 'Вступ до курсу літературознавчого аналізу: навіщо нам спеціальна термінологія.'
  - Відмінність побутового читання ('про що книга') від аналітичного ('як зроблена
    книга').
  - 'Огляд основних категорій: структура, образність, жанр, стиль.'
  - 'Активізація попередніх знань: що ми вже знаємо про жанри.'
- section: 'Наратологія: Сюжет, фабула та оповідач'
  words: 800
  points:
  - Дихотомія 'фабула' (що відбулося хронологічно) vs 'сюжет' (як про це розповів
    автор).
  - Приклади трансформації фабули в сюжет (інверсія, ретроспекція).
  - 'Типи оповідача: всезнаючий (аукторіальний), персональний (я-наратор), ненадійний
    оповідач.'
  - 'Поняття фокалізації: чиїми очима ми бачимо подію (нульова, внутрішня, зовнішня).'
- section: 'Поетика образу: Тропи та символіка'
  words: 800
  points:
  - 'Метафора як приховане порівняння: механізм творення нового смислу.'
  - 'Метонімія та синекдоха: перенесення за суміжністю (приклад: ''читати Підмогильного'').'
  - 'Символ: багатозначність образу, що виходить за межі конкретного контексту.'
  - 'Алегорія: абстрактна ідея в конкретному образі (порівняння з символом).'
- section: 'Жанрова система: Від новели до роману'
  words: 700
  points:
  - 'Тріада епічних жанрів: оповідання — повість — роман.'
  - Специфіка української 'повісті' (povist) як проміжного жанру (відмінність від
    західної classification).
  - 'Новела: пуант (несподівана розв''язка), лаконізм, психологічна напруга (приклад
    Стефаника).'
  - 'Драма як рід літератури: специфіка тексту, призначеного для сцени (діалог, ремарки).'
- section: 'Аналітичні категорії: Тема, ідея, конфлікт'
  words: 600
  points:
  - Тема (про що?) vs Ідея (заради чого? / що стверджується?).
  - 'Мотив: стійкий, повторюваний елемент сюжету або композиції.'
  - 'Конфлікт як рушійна сила сюжету: зовнішній (людина vs суспільство) та внутрішній
    (психологічний).'
  - 'Проблема художнього твору: як формулювати проблематику.'
- section: 'Стилістика тексту: Іронія та гротеск'
  words: 500
  points:
  - 'Іронія: приховане насмішка, розбіжність між сказаним і мається на увазі.'
  - 'Гротеск: поєднання непоєднуваного, карикатурне викривлення, фантастика (приклад
    Гоголя).'
  - 'Парадокс: твердження, що суперечить здравому глузду, але має глибокий зміст.'
  - Роль стилістичних фігур у створенні авторського ідіостилю.
- section: 'Практика: Термінологічний аналіз'
  words: 400
  points:
  - 'Аналіз короткого уривка (новела): визначення типу оповідача та фокалізації.'
  - Ідентифікація тропів у поетичному фрагменті (знайти метафору та символ).
  - Визначення жанру за набором ознак (кейс-стаді).
  - Формулювання теми та ідеї запропонованого мікротексту.
