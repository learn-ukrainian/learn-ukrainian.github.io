slug: narodna-medytsyna
title: Народна медицина
word_target: 4000
content_outline:
- section: Розминка — Зцілення словом та травою
  words: 800
  points:
  - 'Define Ukrainian folk medicine as a dualistic system: material (''зілля'') and
    verbal (''слово'').'
  - 'Explore the syncretism in healing: how pagan nature worship merged with Christian
    prayers.'
  - Contrast the worldview of the 'traditional society' (holistic, magical) vs modern
    'scientific' approach.
  - 'Introduce key terminology: ''народна медицина'' vs ''традиційна (офіційна) медицина''
    (note the false friend potential).'
- section: Знахарі та їхні методи
  words: 1200
  points:
  - 'Classify traditional healers: ''знахарі'' (generalists), ''шептуни'' (verbal
    healers), ''костоправи'' (manual therapists), ''мольфари'' (Carpathian shamans).'
  - 'Analyze the structure of ''замовляння'' (incantations): rhythm, imperative formulas,
    reference to natural elements (water, fire).'
  - 'Describe ritual diagnostic and healing tools: ''вилливання воском'' (wax pouring),
    ''викачування яйцем'' (egg rolling), ''свячена вода''.'
  - 'Discuss the social contract: the healer''s status in the village, payment in
    kind (products, not money), and the concept of ''дар'' (gift).'
- section: 'Лікарські рослини: Зелена аптека'
  words: 1000
  points:
  - 'Detail the ''sacred timing'' of herb gathering: Ivan Kupala, phases of the moon,
    morning dew requirements.'
  - 'Describe key plants and their symbolic vs pharmacological roles: ''калина'' (blood/health),
    ''полин'' (purification), ''звіробій'' (cure for 99 diseases).'
  - 'Explain preparation terminology and forms: ''відвар'' (decoction), ''настій''
    (infusion), ''мазь'' (ointment), ''примочка'' (compress).'
  - 'Discuss the modern resurgence: ''фітотерапія'' as a bridge between folk wisdom
    and pharmacology.'
- section: Практика — аналіз традицій
  words: 1000
  points:
  - 'Linguistic analysis task: Deconstruct a text of a ''замовляння'' identifying
    archaic forms and rhetorical devices.'
  - 'Descriptive writing: Create a ''passport'' for a medicinal plant combining botanical
    description with folklore.'
  - 'Critical discussion: The ethical boundaries of folk medicine in the 21st century
    (placebo effect vs danger of delaying treatment).'
  - 'Essay prompt: ''Folk medicine as intangible cultural heritage: preservation or
    superstition?'''
