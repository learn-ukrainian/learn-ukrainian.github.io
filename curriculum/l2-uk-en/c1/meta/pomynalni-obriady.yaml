slug: pomynalni-obriady
title: Поминальні обряди
word_target: 4000
content_outline:
- section: Розминка — Культ предків
  words: 800
  points:
  - 'Death in the Ukrainian worldview: A transition to the ''other world'' (ирій),
    not absolute nothingness.'
  - 'The dichotomy of the dead: ''Dids'' (revered ancestors, protectors) vs ''Zalozhni
    mertsi'' (unquiet spirits, dangerous).'
  - 'Syncretism: How pagan fear of the dead merged with Christian prayer for the soul
    (sacred duty).'
  - 'The concept of ''Rid'' (Lineage): The living and the dead as a single, indivisible
    community.'
- section: Похоронні обряди
  words: 1200
  points:
  - 'Pre-funeral rites: The vigil (''chuvannya''), mirror covering, and the symbolic
    ''washing'' of the soul.'
  - 'The Ritual of ''Holosinnya'' (Laments): Analysis of the genre''s structure (address,
    complaint, praise) and psychological function.'
  - 'The Funeral Procession: Symbolism of the ''last journey'', stopping at crossroads,
    and blocking the return path.'
  - 'The Commemorative Timeline: Symbolism of the 3rd (earth), 9th (heaven), and 40th
    (judgment) days.'
- section: Поминальні свята
  words: 1200
  points:
  - 'Provody / Hrobky (Radonytsia): The unique Ukrainian tradition of ''Easter for
    the Dead'' (joyous communion).'
  - 'Autumnal Commemorations (''Dmitriivska subota'' and ''Dids''): The quiet family
    dinner and setting a place for the spirits.'
  - 'Ritual Food Symbolism: Kolyvo (wheat = resurrection, honey = sweet life), bread,
    and the ban on knives.'
  - 'Regional variations: ''Hrobky'' (Central/North) vs ''Provody'' (South/East) vs
    ''Zeleni Sviata'' commemoration.'
- section: Практика — аналіз традицій
  words: 800
  points:
  - 'Text Analysis: Deconstructing a fragment of a traditional folk lament (identifying
    metaphors and rhythm).'
  - 'Comparative Analysis: Ukrainian ''living'' cemetery culture (food, conversation)
    vs Western ''silent/park'' culture.'
  - 'Essay Writing: ''Transformation of funeral rites in the 21st century'' (Military
    honors, urbanization vs tradition).'
  - 'Discussion: The evolution of ''Memory'' in the context of modern war (Memorials,
    minutes of silence, ''Vichna Pamyat'').'
