slug: analysis-vocabulary
title: Словник аналізу та критики
word_target: 4000
content_outline:
- section: Вступ — Мова критичного мислення
  words: 300
  points:
  - Визначення критичного мислення в контексті української академічної традиції.
  - 'Роль точної термінології: чому важливо розрізняти ''оцінку'', ''аналіз'' та ''інтерпретацію''.'
  - Огляд ключових категорій аналітичної лексики (іменники, прикметники, дієслова).
- section: Іменники аналізу
  words: 600
  points:
  - 'Базова тріада: аналіз (розкладання), синтез (поєднання), інтерпретація (тлумачення).'
  - 'Поняття структуризації: класифікація, систематизація, категоризація, типологія.'
  - 'Лексика зіставлення: порівняння, аналогія, кореляція, розбіжність.'
  - 'Культурний контекст: приклад аналітичного підходу в працях українських шістдесятників
    (наприклад, І. Дзюба).'
- section: Прикметники для характеристики
  words: 600
  points:
  - 'Характеристика глибини: детальний, ґрунтовний, всебічний, вичерпний, поверхневий.'
  - 'Характеристика підходу: системний, комплексний, критичний, аналітичний, емпіричний.'
  - 'Характеристика об''єктивності: об''єктивний, суб''єктивний, упереджений, неупереджений.'
  - Приклади вживання прикметників у наукових анотаціях.
- section: Прикметники оцінки
  words: 600
  points:
  - 'Позитивна валідація: переконливий, вагомий, достовірний, слушний (висновок).'
  - 'Проблемна оцінка: суперечливий, неоднозначний, спірний, дискусійний.'
  - 'Актуальність та відповідність: актуальний, релевантний, доречний, своєчасний.'
  - 'Нюанси вживання: різниця між ''спірним'' (controversial) і ''дискусійним'' (debatable).'
- section: Словосполучення та колокації
  words: 600
  points:
  - 'Дієслівні колокації: проводити аналіз, здійснювати синтез, давати оцінку (уникати
    ''робити аналіз'').'
  - 'Атрибутивні конструкції: ґрунтовне дослідження, критичний огляд, системний підхід.'
  - 'Стійкі фрази для вступу та висновків: ''на основі проведеного аналізу'', ''узагальнюючи
    викладене''.'
  - Таблиця типових помилок у колокаціях (кальки з англійської/російської).
- section: Контексти використання
  words: 600
  points:
  - 'Жанр рецензії: специфіка лексики (оцінка твору/праці).'
  - 'Жанр аналітичної статті: фокус на аргументації та доказах.'
  - 'Наукова дискусія: як ввічливо висловити незгоду (''дозволю собі не погодитися'',
    ''це твердження видається суперечливим'').'
  - Приклади мікро-текстів для кожного контексту.
- section: Практика в академічному письмі
  words: 700
  points:
  - Алгоритм побудови аналітичного абзацу (Teza - Argument - Pryklad - Vysnovok).
  - 'Варіювання лексики: як уникнути тавтологій (синонімічні ряди для слова ''дослідження'').'
  - 'Точність формулювань: редагування ''водянистого'' тексту в чіткий аналітичний
    стиль.'
  - 'Підсумковий чек-ліст: чи звучить ваш текст як C1?'
