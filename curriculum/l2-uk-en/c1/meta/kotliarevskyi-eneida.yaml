slug: kotliarevskyi-eneida
title: 'Котляревський: Енеїда'
word_target: 4000
content_outline:
- section: Розминка — Народження нової літератури
  words: 400
  points:
  - '1798 рік: історичний вододіл між старою (книжною) та новою літературою.'
  - Чому саме розмовна мова стала фундаментом нації.
  - Постать Івана Котляревського в контексті доби (кінець Гетьманщини).
- section: 'Іван Котляревський: Біографія і контекст'
  words: 700
  points:
  - 'Полтавський козак і дворянин: соціальне походження.'
  - 'Військова служба і масонство: джерела світогляду.'
  - 'Директор театру та просвітник: внесок у розвиток культури.'
  - Зв'язок із народною стихією та фольклором.
- section: '«Енеїда»: Жанр бурлеску і травестії'
  words: 900
  points:
  - 'Визначення жанрів: що таке бурлеск і травестія.'
  - 'Діалог з Вергілієм: як високе стає земним (метод контрасту).'
  - 'Сюжетна канва: мандри Енея як метафора козацької долі.'
  - 'Гумор як зброя: сміхова культура і карнавал.'
- section: Енциклопедія українського життя
  words: 900
  points:
  - 'Троянці як запорожці: козацький устрій, побратимство, звичаї.'
  - 'Етнографічна точність: опис одягу, страв (гастрономічний код), ігор.'
  - 'Пекло і Рай: соціальна сатира на імперську бюрократію та панів.'
  - 'Образ Енея: еволюція від «парубка моторного» до державного мужа.'
- section: Мовне новаторство та значення
  words: 600
  points:
  - Полтавський діалект як основа літературної норми.
  - 'Лексичне багатство: синонімічні ряди, фразеологізми, просторіччя.'
  - 'Вплив на наступників: Квітка-Основ''яненко, Гулак-Артемовський, Шевченко.'
  - «Енеїда» як маніфест національного самозбереження.
- section: Практика — аналіз Енеїди
  words: 500
  points:
  - Аналіз фрагменту (опис Енея або сцена в Пеклі).
  - Ідентифікація засобів комічного (вульгаризми, макаронічна мова).
  - 'Дискусія: чи є Еней ідеальним героєм?'
  - 'Есе: «Чому сміх Котляревського називають життєствердним?»'
