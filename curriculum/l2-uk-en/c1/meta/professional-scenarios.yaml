slug: professional-scenarios
title: Професійні сценарії
word_target: 4000
content_outline:
- section: Вступ — Інтеграція професійних навичок
  words: 400
  points:
  - 'Огляд пройденого шляху (M21-M31): від теорії до практики'
  - 'Цілі практикуму: синтез навичок говоріння, письма та аудіювання'
  - 'Формат симуляції: повний цикл працевлаштування та роботи'
  - Важливість офіційно-ділового стилю (State Standard §4.4.1.1)
- section: 'Сценарій 1 — Влаштування на роботу: CV та Interview'
  words: 800
  points:
  - 'Написання CV: структура, ключові слова, уникання кальок'
  - 'Супровідний лист (Cover Letter): етикет та структура'
  - 'Слововір: Суфікс -ість (відповідальність, пунктуальність, комунікабельність)'
  - 'Симуляція співбесіди: типові питання та стратегії відповідей'
  - Переговори про умови праці (зарплата, графік, бенефіти)
- section: Сценарій 2 — Ділова зустріч та нарада
  words: 800
  points:
  - 'Підготовка до наради: порядок денний (agenda) та цілі'
  - 'Етикет обговорення: як брати слово, висловлювати незгоду, підтримувати ідеї'
  - 'Словотвір: Суфікс -ння для процесів (обговорення, планування, рішення)'
  - 'Протокол зустрічі (Meeting Minutes): фіксація домовленостей'
  - 'Рольова гра: вирішення робочого питання'
- section: Сценарій 3 — Ділове листування та комунікація
  words: 800
  points:
  - 'Типи ділових листів: запит, пропозиція, скарга, подяка'
  - 'Ланцюжок електронних листів (Email thread): логіка та стиль'
  - 'Словотвір: Професійні назви осіб (менеджер, аналітик, розробник) — State Standard
    §4.2.3'
  - 'Вирішення конфлікту через листування: дипломатична мова'
  - 'Реєстри мовлення: коли доречно перейти на менш формальний тон'
- section: Сценарій 4 — Презентація та публічний виступ
  words: 700
  points:
  - 'Структура успішної презентації: вступ, основна частина, висновки'
  - 'Візуалізація даних: як описувати графіки та діаграми українською'
  - 'Робота з аудиторією: відповіді на складні запитання'
  - Мова тіла та невербальна комунікація в українському контексті
- section: Самооцінка та професійний розвиток
  words: 300
  points:
  - Критерії оцінювання власної комунікативної ефективності
  - Складання плану професійного розвитку (PDP)
  - 'Рубрика самооцінки: аналіз сильних та слабких сторін'
- section: Підсумок
  words: 200
  points:
  - Узагальнення ключових лексичних та граматичних тем
  - Поради для подальшого вдосконалення ділової української
  - Заключне слово про кар'єрні можливості
