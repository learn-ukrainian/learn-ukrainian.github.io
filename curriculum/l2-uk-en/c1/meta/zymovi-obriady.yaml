slug: zymovi-obriady
title: Зимові обряди
word_target: 4000
content_outline:
- section: 'Вступ: Зимовий цикл свят в українській культурі'
  words: 600
  points:
  - 'Календарні межі циклу: від Романа (початку зими) до Водохреща. Вплив новоюліанського
    календаря.'
  - 'Феномен релігійного синкретизму: як християнські святі замінили язичницьких богів
    (Перун → Ілля/Миколай, народження Сонця → Різдво).'
  - 'Сакральний час і простір: поняття ''святі вечори'', заборони на працю, відкрите
    небо.'
  - 'Аграрна магія як основа обрядів: програмування врожаю на наступний рік.'
- section: 'Різдвяно-новорічні обряди: Від Святого вечора до Водохреща'
  words: 1400
  points:
  - 'Святий Вечір (Святвечір): символіка числа 12, обрядова тиша, перша зірка.'
  - 'Кутя як головна обрядова страва: три види куті (Багата, Щедра, Голодна) та їх
    ритуальне значення.'
  - 'Колядування: структура обряду, функція колядників як ''гостей з іншого світу'',
    основні мотиви колядок.'
  - 'Вертеп: від лялькового театру до вуличної драми. Основні архетипи: Цар, Ірод,
    Коза, Смерть, Чорт, Ангел.'
  - 'Щедрий вечір (Маланка) і Василя: карнавальна культура, водіння Кози, різниця
    між щедруванням і посіванням.'
  - 'Водохреще (Йордан): культ води, очищення, завершення святкового циклу.'
- section: 'Символіка та ритуальні дії: Культ предків і магія'
  words: 1200
  points:
  - 'Культ предків: Дідух як вмістилище душ, залишання їжі на столі, ''дмухання''
    на лаву перед тим, як сісти.'
  - 'Магія слова: віншування як заклинання на добробут. Сила побажання.'
  - 'Магія першого дня: ''як почнеш рік, так його і проведеш''. Роль полазника.'
  - 'Ворожіння (гадання): дівочі ворожіння на Андрія та в різдвяний період (калета,
    балабушки, дзеркало).'
  - 'Символіка їжі: зерно (воскресіння), мед (солодке життя/світ померлих), мак (захист/сон).'
- section: 'Практичний блок: Аналіз текстів і порівняння традицій'
  words: 800
  points:
  - 'Текстологічний аналіз: розбір архаїчної колядки (пошук космогонічних мотивів
    — світове дерево, створення світу).'
  - 'Порівняльний аналіз: український Дідух vs європейська ялинка; Санта Клаус vs
    Святий Миколай.'
  - 'Дискусія: комерціалізація Різдва проти збереження автентичності. Чи є місце стародавнім
    обрядам у мегаполісі?'
  - 'Письмове завдання (есе): ''Трансформація зимових свят у XXI столітті: втрата
    змісту чи набуття нових форм?'''
