slug: c1-1-checkpoint
title: Контрольна точка — Академічна база
word_target: 4000
content_outline:
- section: Огляд C1.1 — Академічні основи
  words: 300
  points:
  - 'Підсумок пройденого шляху (модулі M01-M19): перехід від B2 до академічної впевненості.'
  - 'Огляд ключових компетенцій рівня C1.1: аналіз, синтез, критичне мислення.'
  - 'Структура контрольної точки: як працювати з цим модулем для самодіагностики.'
  - Роль академічної доброчесності та стандартів цитування.
- section: Граматичний огляд
  words: 800
  points:
  - 'Пасивний стан (Passive Voice) та його альтернативи: безособові форми на -но/-то,
    зворотні дієслова.'
  - Дієприкметникові та дієприслівникові звороти як засоби компресії тексту.
  - 'Складні речення: типові помилки в пунктуації та сполучниках (аби, ніби, наче).'
  - Неправильні дієслова та архаїчні форми в академічному контексті (суть, їм, дам).
- section: Академічний стиль
  words: 800
  points:
  - 'Особливості наукового стилю: об''єктивність, точність, логічність.'
  - 'Безособові конструкції: як писати про дослідження, не фокусуючись на собі (*вважається,
    досліджено*).'
  - 'Номіналізація (Nominalization): перетворення дієслів на іменники для створення
    абстрактних понять.'
  - 'Хеджінг (Hedging) та мовна обережність: використання слів *ймовірно, очевидно,
    певною мірою*.'
  - 'Формальний регістр: уникнення розмовної лексики та емоційно забарвлених слів.'
- section: Наукове письмо
  words: 800
  points:
  - 'Структура есе та наукової статті: вступ, тези, аргументація, висновки.'
  - 'Цитування та парафразування: як уникати плагіату та коректно посилатися на джерела.'
  - 'Написання анотації (Abstract) та огляду літератури: стислість і інформативність.'
  - 'Формулювання тез та контраргументів: побудова логічного ланцюжка доказів.'
- section: Усна презентація
  words: 500
  points:
  - 'Структура академічної доповіді: від привітання до сесії запитань-відповідей.'
  - 'Мовні маркери переходу (Signposting language): *переходячи до, варто зазначити,
    підсумовуючи*.'
  - 'Стратегії роботи з аудиторією: як утримувати увагу та реагувати на складні запитання.'
  - Інтонація та темп мовлення в офіційному виступі.
- section: Критичний аналіз
  words: 500
  points:
  - 'Методологія критичного читання: як оцінювати надійність джерел.'
  - 'Аналіз аргументації: виявлення логічних хиб та маніпуляцій.'
  - 'Написання критичної рецензії: структура *опис-аналіз-оцінка*.'
  - 'Відмінність між критикою та критиканством: конструктивний підхід.'
- section: Практичні завдання
  words: 300
  points:
  - Написання есе на вибір теми (аргументативне або аналітичне).
  - Аналіз та редагування фрагмента наукової статті (пошук помилок).
  - Написання короткої рецензії на прочитаний текст.
  - 'Чек-ліст самооцінки рівня C1.1: що я вмію, над чим ще треба працювати.'
