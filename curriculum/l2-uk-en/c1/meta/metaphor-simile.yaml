slug: metaphor-simile
title: 'Метафора та порівняння: Образна мова'
word_target: 4000
content_outline:
- section: Розминка — Образність української мови
  words: 1200
  points:
  - 'Definition of imagery (образність) in the context of C1 mastery: moving beyond
    literal information transfer to emotional impact.'
  - 'The fundamental distinction: Metaphor (implicit identity) vs. Simile (explicit
    comparison).'
  - 'The spectrum of simile markers: detailed analysis of *як, мов, немов, наче, неначе,
    ніби, нібито*.'
  - 'Stylistic nuance of markers: when to use logical *як* vs. poetic *мов/наче*.'
  - 'The persuasive function: how imagery is used in public speaking and rhetoric
    to influence audiences.'
  - 'Analysis of a ''dry'' vs. ''vivid'' text: demonstrating transformation through
    figurative language.'
- section: Типи метафор
  words: 1400
  points:
  - 'Direct Metaphor (Пряма метафора): Structural analysis (Target Domain is Source
    Domain).'
  - 'Hidden Metaphor (Прихована метафора): Verbs and adjectives that imply metaphor
    without explicit equation (*час біжить*, *гострі слова*).'
  - 'Personification (Уособлення): Giving human agency to inanimate objects — distinctive
    feature of Ukrainian poetic tradition (Shevchenko, Kostenko).'
  - 'Extended Metaphor (Розгорнута метафора): Sustaining a single image across multiple
    sentences or a whole paragraph.'
  - 'Dead vs. Live Metaphors: Distinguishing lexicalized idioms (*ніжка стільця*)
    from fresh, creative authorial imagery.'
  - 'Strategies for creating original metaphors: mapping attributes from one domain
    to another.'
- section: Практика — аналіз образної мови
  words: 1400
  points:
  - 'Literary Deconstruction: Analyzing the density of imagery in a stanza by Lina
    Kostenko or Serhiy Zhadan.'
  - 'Identification & Classification: Distinguishing between direct metaphors, similes,
    and personification in complex texts.'
  - 'Creative Writing Task: Description of a natural phenomenon (e.g., a thunderstorm
    over Kyiv) using at least 5 distinct figurative devices.'
  - 'Cross-Cultural Translation: Finding functional Ukrainian equivalents for common
    English metaphors (avoiding calques).'
  - 'Style Editing: Rewriting a bureaucratic or neutral paragraph into an expressive,
    metaphor-rich text.'
  - 'Self-Correction: Identifying and replacing clichéd metaphors with fresh imagery.'
