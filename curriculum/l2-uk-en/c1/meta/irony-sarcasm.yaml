slug: irony-sarcasm
title: 'Іронія та сарказм: Тонкощі змісту'
word_target: 4000
content_outline:
- section: 'Розминка: Коли слова означають протилежне'
  words: 600
  points:
  - 'Definition: The gap between the literal (*буквальне*) and the intended (*приховане*)
    meaning.'
  - 'The spectrum of humor: *Гумор* (gentle) → *Іронія* (intellectual/critical) →
    *Сарказм* (biting/destructive).'
  - 'Cultural Context: Irony as a national defense mechanism (from Cossack letters
    to modern memes).'
  - Self-irony (*самоіронія*) as a marker of psychological resilience and emotional
    intelligence.
- section: 'Маркери іронії: Як розпізнати підтекст'
  words: 1000
  points:
  - 'Intonation cues (Auditory): Elongated vowels, exaggerated pitch, significant
    pauses (*значущі паузи*).'
  - 'Contextual contradiction: When words clash with evident reality (e.g., ''Чудова
    погода'' during a downpour).'
  - 'Lexical markers: Hyperbole (*гіпербола*), litotes (*літота*), and antiphrasis.'
  - 'Particles of irony: Using *авжеж, звісно, ще б пак, саме так* to signal the opposite
    meaning.'
  - 'Graphic markers (Visual): Quotation marks (''scare quotes''), ellipsis, specific
    emoji use in digital text.'
- section: 'Типи: Вербальна іронія, ситуативна іронія та сарказм'
  words: 1200
  points:
  - 'Verbal Irony (*Вербальна іронія*): Intentional inversion of meaning in speech
    (saying ''Great job'' to a mess).'
  - 'Situational Irony (*Іронія долі/ситуації*): When the outcome is the exact opposite
    of the expectation (O. Henry style twists).'
  - 'Sarcasm (*Сарказм*): The intent to wound or mock; distinct from playful irony
    by its target and aggression.'
  - 'Dramatic Irony (*Драматична іронія*): Briefly introduced for literary context
    — when the audience knows what the character doesn''t.'
  - 'Satire (*Сатира*): Irony used for social criticism (brief distinction).'
- section: 'Практика: Розпізнавання та вживання'
  words: 1200
  points:
  - 'Text Analysis: Deconstructing a fragment from Ostap Vyshnya to find the ''smile''
    markers.'
  - 'Register Check: When is sarcasm appropriate? (Friends vs. Boss vs. Public Speech).'
  - 'Transformation Task: Converting neutral statements into ironic ones using particles
    and hyperbole.'
  - 'Writing Task: Composing a short ironic commentary on a mundane problem (e.g.,
    public transport delays).'
  - 'Decoding Digital Irony: Analyzing screenshots of chats/posts for implicit meaning.'
