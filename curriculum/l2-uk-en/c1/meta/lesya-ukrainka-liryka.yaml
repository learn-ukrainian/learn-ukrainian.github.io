slug: lesya-ukrainka-liryka
title: 'Леся Українка: Лірична поезія'
word_target: 4000
content_outline:
- section: 'Вступ: Contra Spem Spero'
  words: 600
  points:
  - 'Історія написання вірша: 1890 рік, боротьба з хворобою, особистий контекст'
  - 'Концепція «Contra Spem Spero» як життєвого кредо: стоїцизм і воля до життя'
  - 'Аналіз ключових метафор: «сіяти квіти на морозі», «лити сльози на розпечений
    камінь»'
  - Роль оксиморону в розкритті внутрішнього конфлікту ліричної героїні
- section: 'Пейзажна лірика: Дихання Волині'
  words: 600
  points:
  - Вплив природи Полісся та Волині на образну систему поетеси
  - 'Цикл «Подорож до моря»: еволюція пейзажу від Волині до Одеси'
  - 'Неоромантичне бачення природи: гармонія та стихійна сила'
  - Музичність пейзажної лірики (алітерації, ритміка)
- section: 'Громадянські цикли: «Сім струн» та «Невільничі пісні»'
  words: 800
  points:
  - 'Цикл «Сім струн»: музична структура та патріотичний підтекст (присвята Драгоманову)'
  - '«Невільничі пісні»: алегорія «вавилонського полону» України'
  - Образ Прометея як символ нескореності духу
  - Відмінність громадянської лірики Лесі від народницької традиції (інтелектуалізм
    vs плач)
- section: 'Філософські мотиви: Роль митця'
  words: 800
  points:
  - 'Вірш «Слово, чому ти не твердая криця...»: мистецтво як зброя'
  - Діалектика свободи і необхідності у творчості
  - 'Образ митця: пророк чи воїн? (порівняння з Шевченком)'
  - Проблема вибору та відповідальності поета перед народом
- section: 'Жіночий голос: Феміністичний дискурс'
  words: 600
  points:
  - 'Новий тип героїні в українській літературі: інтелектуалка, борець'
  - Ламання стереотипу «жіночої» (слізної) поезії
  - Епістолярний діалог з Ольгою Кобилянською як контекст
  - Сучасна рецепція феміністичних мотивів Лесі Українки
- section: 'Практикум: Літературний аналіз'
  words: 600
  points:
  - Аналіз риторичних фігур у тексті «Contra Spem Spero» (практичне завдання)
  - Порівняльний аналіз пейзажної лірики Лесі Українки та Тараса Шевченка
  - 'Есе: «Чи актуальний стоїцизм Лесі Українки у XXI столітті?»'
  - Визначення рис неоромантизму на прикладі вивчених поезій
