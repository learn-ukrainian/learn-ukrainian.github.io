slug: digital-communication
title: Цифрова комунікація
word_target: 4000
content_outline:
- section: 'Вступ: Регістри цифрової комунікації'
  words: 400
  points:
  - 'Формальний vs неформальний регістр: коли доречний email, а коли чат'
  - Вибір каналу комунікації залежно від терміновості та важливості
  - 'Специфіка онлайн-спілкування: відсутність невербальних сигналів'
  - Поняття 'цифрового слідy' та професійна репутація
- section: Структура ділового листа
  words: 800
  points:
  - 'Тема листа (Subject line): стислість, інформативність, теги'
  - 'Звертання (Salutation): етикетні формули, кличний відмінок'
  - 'Основний текст (Body): принцип ''один лист — одна думка'', структурування абзацами'
  - Заклик до дії (Call to Action) та дедлайни
  - 'Прощання (Closing) та підпис (Signature): контакти, посада'
  - Вкладення та технічні нюанси (формати файлів)
- section: Типи ділових листів
  words: 800
  points:
  - 'Запит інформації: чіткість формулювань'
  - 'Лист-подяка (Follow-up): закріплення домовленостей'
  - 'Лист-вибачення: структура вибачення, пропонування рішення'
  - 'Лист-нагадування: ввічливість vs наполегливість'
  - 'Автовідповідь (Out of office): необхідні елементи'
- section: Месенджери в бізнесі
  words: 700
  points:
  - 'Етикет робочих чатів: час реакції, робочі години'
  - 'Використання емодзі та реакцій: доречність у діловому стилі'
  - 'Голосові повідомлення: коли вони табу, а коли допустимі'
  - 'Групові чати: теги (@), треди (threads), офтоп'
- section: Відеоконференції та онлайн-зустрічі
  words: 700
  points:
  - 'Підготовка до зустрічі: адженда, технічна перевірка'
  - 'Технічний етикет: камера, мікрофон (mute/unmute), фон'
  - 'Модерація обговорення: надання слова, таймінг'
  - 'Інструменти взаємодії: чат зустрічі, ''піднята рука'', шерінг екрана'
- section: Типові помилки в цифровій комунікації
  words: 400
  points:
  - Надмірна неформальність або панібратство
  - Ігнорування повідомлень та порушення строків відповіді
  - 'Помилки з копіями листів (CC vs BCC): конфіденційність'
  - Використання кальок та русизмів у діловому мовленні
- section: 'Практикум: Аналіз та написання'
  words: 200
  points:
  - 'Аналіз кейсів: вдалі та невдалі приклади комунікації'
  - 'Трансформація стилів: переписати неформальне повідомлення в офіційний лист'
  - Чек-ліст перевірки власного листа перед відправкою
