slug: pysanky
title: 'Писанки: Космос на долоні'
word_target: 4000
content_outline:
- section: 'Розминка: Яйце як символ життя'
  words: 800
  points:
  - 'Вступ: Легенда про скутого монстра та роль писанки у порятунку світу (чому ми
    пишемо).'
  - 'Універсальний архетип: Світове Яйце в космогонічних міфах та українській традиції.'
  - 'Синкретизм: Як язичницькі солярні культи злилися з християнським Воскресінням.'
  - 'Термінологічна різниця: Писанка (сира, магічна, оберег) проти Крашанки (варена,
    їстівна).'
- section: 'Символіка писанок: Мова знаків'
  words: 1200
  points:
  - 'Солярні знаки: Сонце, зірки, сварга (свастика) як символи руху та світла.'
  - 'Фітоморфні мотиви: Вазон (Дерево Життя), дубове листя (сила Перуна), мак (пам''ять
    роду).'
  - 'Зооморфні та антропоморфні символи: Коні, птахи (вісники), Берегиня (Богиня-Мати).'
  - 'Геометричні коди: Безконечник (меандр) як пастка для злих духів.'
  - 'Кольорова семантика: Червоний (життя/кров), Чорний (земля/вічність/потойбіччя),
    Білий (чистота/початок).'
- section: Техніка та регіональні особливості
  words: 1000
  points:
  - 'Інструментарій: Писачок, живий вогонь, бджолиний віск та фізика воскової резервації
    (батик).'
  - 'Ритуал процесу: Послідовність ''написання'' від білого до найтемнішого кольору.'
  - 'Гуцульщина: Дрібний геометричний орнамент, насиченість деталями, жовто-гарячі
    барви.'
  - 'Поділля та Київщина: Рослинні мотиви, ''сороки'', ''клинці'', широкі лінії, чорне
    тло.'
  - 'Сучасний контекст: Писанкарство як арт-терапія та національний бренд.'
- section: 'Практика: Опис та аналіз'
  words: 1000
  points:
  - 'Лексичний практикум: Активні дієслова (розписувати, занурювати, топити, знімати
    віск).'
  - 'Аналітичне завдання: ''Читання'' конкретної писанки (інтерпретація сукупності
    символів).'
  - 'Есе-роздум: Писанка як нематеріальна культурна спадщина UNESCO (аргументація).'
  - 'Підсумок: Писанка як ''Космос на долоні'' — макросвіт у мікросвіті.'
