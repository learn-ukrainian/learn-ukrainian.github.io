slug: analiz-poezii
title: Аналіз поезії
word_target: 4000
content_outline:
- section: Розминка — Інструменти аналізу
  words: 400
  points:
  - 'Поезія як особлива форма мовлення: ритмічність та образність'
  - 'Відмінність віршованої мови від прозової: ключові ознаки'
  - 'Огляд основних рівнів аналізу: метрика, фоніка, строфіка, тропіка'
  - 'Діагностичне завдання: інтуїтивне відчуття ритму (без термінів)'
- section: 'Теорія: Основи версифікації'
  words: 1000
  points:
  - 'Системи віршування: силабо-тонічна як основна для української літератури'
  - 'Поняття стопи (foot): двоскладові (ямб, хорей) та трискладові (дактиль, амфібрахій,
    анапест)'
  - 'Визначення віршового розміру: алгоритм підрахунку наголосів'
  - 'Пірихій та спондей: допоміжні стопи та відхилення від метру'
  - Верлібр (вільний вірш) в українській поезії XX століття
- section: 'Теорія: Рима, строфіка та звукопис'
  words: 1000
  points:
  - 'Класифікація рим за наголосом: чоловіча, жіноча, дактилічна'
  - 'Схеми римування: парне (aabb), перехресне (abab), кільцеве (abba)'
  - 'Види строф: дистих, катрен (найпоширеніша), терцина, сонет (14 рядків)'
  - 'Звукопис (фоніка): алітерація (приголосні) та асонанс (голосні)'
  - Звуковий символізм в українській поезії (ефект 'р' vs ефект 'л')
- section: 'Лексична стилістика: Тропи'
  words: 600
  points:
  - 'Епітет як художнє означення: постійні та авторські'
  - Метафора та її різновиди (уособлення, алегорія)
  - 'Порівняння: пряме та приховане'
  - 'Символ у поетичному тексті: від образу до ідеї'
- section: Практика — філологічний аналіз
  words: 1000
  points:
  - Алгоритм повного аналізу поетичного твору ('паспорт твору')
  - Аналіз метру та ритму на прикладі 'Садок вишневий коло хати'
  - Аналіз звукопису у поезії 'Contra spem spero' Лесі Українки
  - Аналіз модерністської форми (семенківський футуризм або неокласика)
  - 'Створення власного есе-аналізу: структура та ключові фрази'
