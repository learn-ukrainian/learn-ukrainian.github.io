slug: abstract-writing
title: Жанр — Анотація та реферат
word_target: 4000
content_outline:
- section: Вступ — Роль анотації
  words: 400
  points:
  - Визначення анотації як «візитівки» наукової праці (функція навігації)
  - 'Ключова відмінність від простого опису: стислість та інформативність'
  - Вимоги українських наукових видань (стандарти ДСТУ щодо обсягу та змісту)
  - 'Типи анотацій: довідкова (описова) vs рекомендаційна (оцінна)'
- section: Структура анотації
  words: 700
  points:
  - 'Компоненти IMRaD в мініатюрі: вступ, методи, результати, обговорення'
  - 'Актуальність теми (1-2 речення): чому це важливо саме зараз'
  - 'Мета дослідження: формулювання через іменники (вивчення, аналіз, встановлення)'
  - 'Методологія: короткий перелік використаних підходів (без зайвих деталей)'
  - 'Результати та висновки: що саме нового виявлено (конкретика замість води)'
- section: Стилістичні особливості
  words: 600
  points:
  - 'Принцип лаконічності: відсутність зайвих слів, вставних конструкцій, емоційності'
  - 'Синтаксична компресія: використання дієприкметникових зворотів замість підрядних
    речень'
  - 'Безособовий стиль: типові форми на -но, -то (розглянуто, виявлено, доведено)'
  - 'Термінологічна точність: уникнення побутової лексики та метафор'
- section: Типові фрази для анотацій
  words: 600
  points:
  - 'Кліше для вступу: «У статті досліджується...», «Робота присвячена...»'
  - 'Формулювання мети: «Метою роботи є...», «Автор ставить за мету...»'
  - 'Опис результатів: «Встановлено, що...», «Виявлено закономірність...», «Доведено
    вплив...»'
  - 'Практичне значення: «Результати можуть бути використані...», «Висновки сприятимуть...»'
- section: Описова vs інформативна анотація
  words: 600
  points:
  - 'Описова анотація (Indiicative): про що написано (тільки тема та мета)'
  - 'Інформативна анотація (Informative): що саме знайдено (містить результати та
    висновки)'
  - 'Сфери використання: описова — для оглядів/книг; інформативна — для оригінальних
    статей'
  - Порівняльна таблиця характеристик обох типів
- section: Реферат — розширена форма
  words: 500
  points:
  - 'Визначення реферату: розширений виклад змісту першоджерела'
  - 'Відмінність від анотації: обсяг (реферат довший), деталізація аргументації'
  - 'Структура реферату: бібліографічний опис, текст реферату, довідковий апарат'
  - Типові ситуації використання реферату в навчальному процесі
- section: Практика написання
  words: 600
  points:
  - 'Алгоритм написання: від ключових слів до зв''язного тексту'
  - 'Аналіз типової помилки: переказ змісту замість викладу суті'
  - 'Редагування чернетки: видалення «води» та повторів'
  - Приклад трансформації тексту статті в анотацію (крок за кроком)
