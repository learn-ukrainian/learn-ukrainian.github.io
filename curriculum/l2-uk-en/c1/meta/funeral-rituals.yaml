slug: funeral-rituals
title: Родинні обряди - похорон
word_target: 4000
content_outline:
- section: Розминка — Смерть як перехід
  words: 600
  points:
  - 'Сприйняття смерті в українській етнокультурі: не кінець, а перехід до ''іншого
    світу'' (засвіти).'
  - 'Культ предків: чому ''діди'' важливі для живих та як підтримується цей зв''язок.'
  - 'Триетапна структура переходу: відокремлення (смерть), межа (похорон), інтеграція
    (статус предка).'
  - 'Лексичний аспект: евфемізми та табу на слово ''смерть'' у ритуальному контексті.'
- section: Похоронні обряди
  words: 1200
  points:
  - 'Передпохоронний етап: прощання, ''остання воля'', підготовка тіла (обмивання
    як очищення).'
  - 'Нічне чування біля тіла (''посижіння''): читання Псалтиря, ігри (архаїчна традиція)
    та розмови.'
  - 'Голосіння: психотерапевтична та ритуальна функція плачу. Структура голосіння.'
  - 'Винос тіла та поховання: символіка порогу, ''запечатування'' гробу, кидання грудки
    землі.'
  - 'Очищення живих: миття рук, перевертання лави/стільців, нейтралізація ''мертвого
    простору''.'
- section: Поминальні обряди
  words: 1100
  points:
  - 'Сакральні дати: третини, дев''ятини, сороковини, роковини — значення кожного
    етапу для душі.'
  - 'Поминальна трапеза: коливо (канун) як обов''язкова ритуальна страва, символіка
    меду та пшениці.'
  - 'Правила поведінки за поминальним столом: про кого говорять, як згадують (''Про
    мертвих або добре, або нічого'').'
  - 'Календарні поминання: Проводи (Гробки) — весняне відвідування могил як комунікація
    роду.'
- section: Практика — поминальна культура
  words: 1100
  points:
  - 'Аналіз тексту автентичного голосіння: пошук метафор та звертань (робота з джерелом).'
  - 'Лінгвістичний розбір: градація синонімів смутку та скорботи (від ''журби'' до
    ''розпачу'').'
  - 'Порівняльний аналіз: українські Гробки vs західний День всіх святих (Halloween/All
    Saints).'
  - 'Етикет співчуття: написання формального та особистого листа-співчуття (structure,
    fixed phrases).'
