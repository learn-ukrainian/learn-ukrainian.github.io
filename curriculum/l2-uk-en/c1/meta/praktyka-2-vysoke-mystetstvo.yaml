slug: praktyka-2-vysoke-mystetstvo
title: Практика II — Високе мистецтво
word_target: 4000
content_outline:
- section: Розминка — Огляд високого мистецтва
  words: 600
  points:
  - 'Часова лінія музики: від барокових хорів Бортнянського до «сильвестрівської»
    тиші (еволюція стилів).'
  - 'Візуальний код нації: шлях від сакрального іконопису через реалізм Шевченка до
    авангарду та наїву Примаченко.'
  - 'Театральні вершини: від корифеїв до експериментів Курбаса та сучасного театру.'
  - 'Ключова ідея: єдність традиції та новаторства в українському мистецтві.'
- section: 'Панорама мистецтв: Музика, Сцена, Візія'
  words: 1800
  points:
  - 'Музична спадщина (Review M62, M65): Лисенко як творець національної композиторської
    школи; феномен українського оперного співу (Соломія Крушельницька).'
  - 'Візуальне мистецтво (Review M67): Бойчукізм і монументальне мистецтво — розквіт
    і трагедія; внесок Архипенка у світову скульптуру.'
  - 'Театр і Балет (Review M69): Реформаторська діяльність Леся Курбаса (театр «Березіль»)
    та Сержа Лифаря (світовий балет).'
  - 'Архітектура (Review M72): Українське бароко (Мазепинський стиль) як унікальний
    синтез західних і східних впливів.'
  - 'Синтез мистецтв: взаємодія музики, слова і візуального образу в сучасному перформансі
    та опері.'
- section: Практика — мистецтвознавчий аналіз
  words: 1600
  points:
  - 'Порівняльний аналіз епох: зіставлення творчого методу Бортнянського (класицизм)
    та Лисенка (романтизм).'
  - 'Деконструкція шедевру: аналіз картини Марії Примаченко «Звірі» — колористика,
    символіка, наївний стиль.'
  - 'Майстерня критика: написання рецензії на уявну оперну постановку з використанням
    лексики естетичної оцінки (вишуканий, новаторський, еклектичний).'
  - 'Дискусійний клуб: «Я українець і пишаюся цим» — феномен національної ідентичності
    Сержа Лифаря в еміграції.'
