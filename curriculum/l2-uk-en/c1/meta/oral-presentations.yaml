slug: oral-presentations
title: Доповідь та презентація
word_target: 4000
content_outline:
- section: Вступ — Мистецтво усної презентації
  words: 500
  points:
  - 'Визначення жанрів: академічна доповідь vs бізнес-презентація vs пітч'
  - Ключові відмінності усного виступу від письмового тексту (синтаксис, ритм)
  - 'Психологічна підготовка: подолання страху та налаштування голосу'
  - Роль особистості спікера в українській риторичній традиції
- section: Структура доповіді
  words: 600
  points:
  - 'Композиція: Вступ (Hook) → Основна частина (Body) → Висновки (Takeaway)'
  - Як сформулювати ціль виступу (Call to Action)
  - 'Правило трьох: групування аргументів для кращого сприйняття'
  - 'Таймінг: розподіл часу між частинами виступу'
- section: Мовні маркери (Signposting)
  words: 700
  points:
  - Фрази для початку та оголошення плану («Сьогодні я хотів би зосередитися на...»)
  - Маркери переходу («Переходячи до наступного пункту...», «З іншого боку...»)
  - Фрази для акцентування уваги («Важливо підкреслити...», «Зверніть увагу на...»)
  - Маркери завершення та підсумовування («Отже, підсумовуючи...», «На завершення...»)
- section: Візуальні матеріали
  words: 500
  points:
  - Лексика для опису графіків, діаграм та схем (зростання, спад, кореляція)
  - Як коректно посилатися на слайди («Як бачимо на графіку...», «Зверніть увагу на
    діаграму...»)
  - 'Етикет оформлення: баланс тексту та візуалізації, читабельність'
  - 'Типові помилки: читання зі слайдів vs коментування'
- section: Робота з аудиторією
  words: 600
  points:
  - 'Встановлення контакту: зоровий контакт, мова тіла, жестикуляція'
  - Риторичні запитання та інтерактивні прийоми («Чи замислювалися ви..?», «Хто з
    вас..?»)
  - 'Керування увагою: паузи, інтонація, зміна темпу мовлення'
  - Реагування на невербальні сигнали (нудьга, незгода, зацікавлення)
- section: Відповіді на запитання
  words: 500
  points:
  - 'Стратегія відповідей: Подяка → Уточнення → Відповідь → Перевірка'
  - Шаблонні фрази для Q&A («Дякую за чудове запитання...», «Якщо я правильно зрозумів...»)
  - Як відповідати на складні або провокативні запитання (техніка «мостиків»)
  - Що робити, коли не знаєш відповіді (етикетні формули)
- section: Практика презентації
  words: 600
  points:
  - Алгоритм підготовки міні-доповіді (Checklist)
  - 'Симуляція сесії Q&A: рольова гра (спікер vs аудиторія)'
  - Критерії взаємного оцінювання (Peer Review Rubric)
  - 'Модельна відповідь: зразок вступу та завершення презентації'
