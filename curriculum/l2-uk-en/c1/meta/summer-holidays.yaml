slug: summer-holidays
title: Українські свята - літній цикл
word_target: 4000
content_outline:
- section: Розминка — Літо та врожай
  words: 600
  points:
  - Літо як кульмінація сонячного циклу в українському світогляді
  - Зв'язок між рухом сонця та аграрним календарем (літнє сонцестояння)
  - 'Сакральне значення врожаю: від першого ростка до обжинків'
  - Огляд основних етапів літнього обрядового циклу
- section: 'Купальський цикл: Вогонь і Вода'
  words: 1000
  points:
  - 'Івана Купала (7 липня): синкретизм язичницького Купала та християнського Іоанна
    Хрестителя'
  - 'Символіка Вогню: очищення, стрибання через вогнище, спалення опудала Купала/Марени'
  - 'Символіка Води та Рослин: дівочі вінки, ворожіння, цілющі трави'
  - 'Легенда про цвіт папороті: пошук скарбів та таємного знання'
  - 'Русальний тиждень: небезпечний час, заборони та обереги від русалок'
- section: 'Свята врожаю: Три Спаси'
  words: 1000
  points:
  - 'Маковій або Медовий Спас (14 серпня): освячення води, меду та ''маковійчиків''
    (букетів)'
  - 'Яблучний Спас (19 серпня): свято Преображення, освячення плодів, заборона їсти
    яблука до Спаса'
  - 'Горіховий (Хлібний) Спас (29 серпня): завершення жнив, випікання хліба з нового
    врожаю'
  - Петра і Павла (12 липня) як екватор літа та початок підготовки до жнив
- section: Обжинки та завершення циклу
  words: 800
  points:
  - 'Обряд обжинків: ритуал останнього снопа (''дід'', ''дідух'')'
  - 'Вшанування поля і землі: ''завивання бороди'' (залишення колосся на полі)'
  - 'Дожинкові пісні: величання господарів та женців'
  - Покрова (14 жовтня) як межа між літом і зимою, перехід до весільного сезону (короткий
    огляд переходу)
- section: Практика — літня обрядовість
  words: 600
  points:
  - Аналіз символіки купальської пісні (текст пісні + розбір)
  - 'Есе-роздум: ''Аграрна магія у сучасному світі — забобон чи пам''ять предків?'''
  - 'Порівняльна характеристика: Купала в Україні та літні свята в Європі (Midsummer)'
  - 'Лінгвістичний практикум: лексика жниварського циклу'
