slug: birth-rituals
title: Родинні обряди - народження
word_target: 4000
content_outline:
- section: Розминка — Народження як чудо
  words: 800
  points:
  - 'Народження як сакральний акт переходу: межа між світами ''тим'' і ''цим'''
  - 'Давні уявлення про душу та її прихід у тіло: птах, зірка, зерно'
  - 'Охоронна магія: захист вагітної та плоду від ''лихого ока'' та нечистої сили'
  - 'Роль баби-повитухи: не лише акушерка, а й посередниця між світами (функції та
    статус)'
- section: Родильні обряди
  words: 1000
  points:
  - 'Вагітність у народній культурі: заборони (не дивитися на калік, не шити), прикмети
    та обмеження'
  - 'Обрядові дії під час пологів: розв''язування вузлів, відмикання замків як симпатична
    магія'
  - 'Перша купіль: символіка води, додавання трав (любисток, чорнобривці) та предметів
    (гроші, мед)'
  - 'Сповивання та колиска: обереги для немовляти (часник, ніж, червона нитка, лялька-мотанка)'
- section: Хрестини
  words: 1200
  points:
  - 'Інститут кумівства: духовна спорідненість, критерії вибору хрещених та їхня довічна
    відповідальність'
  - 'Церковний обряд: наречення іменем (магічна функція імені), роль крижми та натільного
    хрестика'
  - 'Святкування хрестин (обід): традиційні страви, порядок тостів та символіка частування'
  - 'Обряд ''бабина каша'': продаж горщика, розбивання на щастя та ворожіння на долю
    дитини'
  - 'Подарунки на хрестини: традиційні (срібна ложка, ікона, мірні ікони) та сучасні
    аспекти'
- section: Практика — родильна обрядовість
  words: 1000
  points:
  - 'Аналіз ролі кумів у сучасному українському суспільстві: зміна функцій (дискусія)'
  - 'Есе: символічне значення ''бабиної каші'' та порівняння з ритуалами інших культур'
  - 'Порівняльна характеристика: українські традиційні хрестини vs європейські традиції
    (напр. baby shower)'
  - 'Написання традиційних побажань та тостів на хрестини (практикум: кличний відмінок
    + наказовий спосіб)'
