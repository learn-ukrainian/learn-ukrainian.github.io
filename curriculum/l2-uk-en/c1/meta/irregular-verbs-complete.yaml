slug: irregular-verbs-complete
title: Неправильні дієслова — повний огляд
word_target: 4000
content_outline:
- section: Вступ — Чому дієслова «неправильні»?
  words: 500
  points:
  - 'Лінгвістична природа «неправильності»: історичні чергування та давні корені.'
  - 'Класифікація нерегулярностей: від фонетичних змін до суплетивізму.'
  - 'Роль частотності: чому найважливіші дієслова (бути, йти) є найбільш нерегулярними.'
  - Огляд основних груп, що будуть розглянуті в модулі.
- section: Чергування приголосних
  words: 600
  points:
  - 'Перша група дієвідміни: зміни в усіх особах (писати -> пишу, пишеш).'
  - 'Друга група дієвідміни: зміни лише в 1-й особі однини (сидіти -> сиджу, возити
    -> вожу).'
  - Губні приголосні (б, п, в, м, ф) -> поява `л` (любити -> люблю, ловити -> ловлю).
  - 'Зубні та шиплячі чергування (с-ш, з-ж, т-ч, ст-щ): просити -> прошу, їздити ->
    їжджу.'
- section: Чергування голосних
  words: 600
  points:
  - Чергування `о` / `і` в коренях дієслів (носити -> ношу, але ніс).
  - 'Зникнення та поява голосних (fleeting vowels): брати -> беру, дерти -> деру.'
  - 'Чергування `а` / `е` в основах: лягти -> ляжу.'
  - 'Нульовий ступінь кореня: слати -> шлю, стелити -> стелю.'
- section: Суплетивні основи
  words: 600
  points:
  - 'Дієслово «йти»: унікальна парадигма (йду, йдеш) та минулий час (ішов/йшов).'
  - 'Дієслово «бути»: форми теперішнього (є), майбутнього (буду) та минулого (був).'
  - Стилістичні особливості використання форм «є» та їх опущення (еліпсис).
  - Вживання «суть» як архаїчної форми 3-ї особи множини (C1 рівень).
- section: Унікальні парадигми
  words: 600
  points:
  - 'Архаїчна група: дієслово «дати» (дам, даси, дасть...).'
  - 'Дієслово «їсти»: парадигма (їм, їси, їсть...) та відмінність від 2-ї дієвідміни.'
  - 'Дієслово «відповісти» (та інші на -вісти): збереження архаїчних закінчень.'
  - 'Дієслова «хотіти» та «бігти»: змішані типи дієвідмінювання (розбіжності в однині
    та множині).'
- section: Дієслова руху
  words: 500
  points:
  - 'Однонаправлені vs різноспрямовані: вплив на відмінювання (йти vs ходити).'
  - Особливості дієслова «їхати» (їду) vs «їздити» (їжджу).
  - Чергування в дієсловах «нести» (несу), «вести» (веду) та їхніх ітеративах.
  - 'Префіксальні утворення: як префікси впливають на вибір основи (піти, приїхати).'
- section: Практика відмінювання
  words: 600
  points:
  - 'Синтез: алгоритм визначення типу відмінювання для незнайомого дієслова.'
  - 'Типові помилки: інтерференція груп (плутанина `дати` та звичайних дієслів).'
  - 'Стилістичний аналіз: використання архаїчних або розмовних форм.'
  - Підсумковий огляд найскладніших випадків у контексті речень.
