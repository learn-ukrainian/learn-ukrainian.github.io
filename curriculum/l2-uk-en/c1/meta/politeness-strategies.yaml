slug: politeness-strategies
title: 'Стратегії ввічливості: Прагматика спілкування'
word_target: 4000
content_outline:
- section: Розминка — Мистецтво ввічливості
  words: 600
  points:
  - 'Визначення прагматики: різниця між тим, що ми говоримо, і тим, що маємо на увазі'
  - 'Концепція ''обличчя'' (Face) у комунікації: позитивне (бажання схвалення) та
    негативне (бажання автономії)'
  - 'Українська специфіка: баланс між європейською стриманістю та слов''янською емоційністю'
  - Роль займенників 'Ви' та 'ти' як базових маркерів соціальної дистанції та поваги
- section: Позитивна ввічливість
  words: 1200
  points:
  - 'Стратегія зближення: створення атмосфери ''свої'' через спільну ідентичність'
  - 'Маркери спільності та інклюзивності: ''Ми з вами'', ''Як ми знаємо'', ''Погодьтеся'''
  - 'Мистецтво компліменту: як висловити схвалення без лестощів'
  - Використання зменшувально-пестливих форм (diminutives) як інструменту пом'якшення
    ('кавуся', 'хвилинка')
  - 'Інтенсифікатори інтересу до співрозмовника: риторичні питання, емоційні вигуки'
- section: Негативна ввічливість
  words: 1200
  points:
  - 'Стратегія поваги до автономії: ненав''язливість та збереження дистанції'
  - 'Хеджування (hedging) та умовний спосіб: ''Я б хотів...'', ''Чи не могли б ви...'',
    ''Варто було б...'''
  - 'Мінімізація прохання: ''Лише одна хвилинка'', ''Невеличке уточнення'', ''Трохи
    потурбую'''
  - 'Вибачення як превентивний захід: ''Перепрошую, що турбую'', ''Вибачте, але...'''
  - Безособові конструкції для уникнення прямого тиску ('Вважається, що...', 'Було
    б доречно...')
- section: Практика — стратегії ввічливості
  words: 1000
  points:
  - Трансформація прямих наказів у ввічливі прохання (Imperative -> Conditional)
  - 'Аналіз діалогів: ідентифікація загроз ''обличчю'' (FTA) та методів їх пом''якшення'
  - 'Написання відмови: як сказати ''ні'', не образивши (техніка ''сендвіча'' або
    часткової згоди)'
  - 'Кейс-стаді: ввічливість у конфліктній ситуації (черга, помилка в рахунку, зауваження
    колезі)'
  - Порівняння українського та англомовного етикету (прямота vs. натяки)
