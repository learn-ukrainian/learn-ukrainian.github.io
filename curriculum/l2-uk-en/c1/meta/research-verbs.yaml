slug: research-verbs
title: Дієслова наукового дослідження
word_target: 4000
content_outline:
- section: Вступ — Дієслова як інструмент науковця
  words: 400
  points:
  - 'Роль дієслова як двигуна наукової думки: від гіпотези до висновку.'
  - 'Стилістичні особливості наукових дієслів: точність, однозначність, нейтральність.'
  - 'Категоризація дієслів за етапами дослідження: пошук, аргументація, презентація.'
  - 'Відмінність академічного вживання від побутового (приклад: ''думати'' vs ''вважати'',
    ''дивитися'' vs ''спостерігати'').'
- section: Дієслова дослідження
  words: 800
  points:
  - 'Група пізнання: ''досліджувати'', ''вивчати'', ''аналізувати''. Смислові відтінки
    та контексти.'
  - 'Група пошуку істини: ''з''ясовувати'' (clarify/find out), ''перевіряти'' (verify),
    ''випробовувати'' (test). Вживання у методологічній частині.'
  - 'Група емпіричного сприйняття: ''розглядати'' (consider/examine), ''обстежувати''
    (inspect/survey), ''спостерігати'' (observe).'
  - 'Таблиця синонімів: як уникнути тавтології при описі процесу дослідження.'
- section: Дієслова аргументації
  words: 800
  points:
  - 'Активна позиція дослідника: ''стверджувати'' (assert), ''доводити'' (prove),
    ''обґрунтовувати'' (substantiate). Різниця в силі твердження.'
  - 'Робота з контраргументами: ''спростовувати'' (refute), ''заперечувати'' (deny/object),
    ''критикувати'' (critique).'
  - 'Підтримка тези: ''підтверджувати'' (confirm), ''підкріплювати'' (support/backup),
    ''ілюструвати'' (illustrate).'
  - 'Логічні зв''язки: як ці дієслова будують каркас доказової бази.'
- section: Дієслова презентації
  words: 800
  points:
  - 'Представлення результатів: ''представляти'', ''викладати'' (lay out/present),
    ''описувати''.'
  - 'Деталізація: ''характеризувати'' (characterize), ''демонструвати'', ''ілюструвати''
    прикладами.'
  - 'Аналітичне зіставлення: ''порівнювати'' (compare), ''зіставляти'' (collate/contrast),
    ''протиставляти'' (contrast/oppose).'
  - Важливість дієслова 'зіставляти' для коректного порівняльного аналізу.
- section: Дієслова висновку
  words: 600
  points:
  - 'Фіналізація думки: ''підсумовувати'' (summarize), ''узагальнювати'' (generalize),
    ''резюмувати''.'
  - 'Фіксація результату: ''робити висновок'', ''констатувати'' (state a fact), ''визначати''
    (determine).'
  - 'Логічний наслідок: ''виводити'' (derive/deduce), ''формулювати'' (formulate),
    ''встановлювати'' (establish).'
  - 'Кліше для висновків: ''На основі аналізу можна стверджувати...''.'
- section: Нюанси та контексти
  words: 400
  points:
  - 'Синонімічні ряди: тонкі відмінності (наприклад, ''вивчати'' процес vs ''вчити''
    предмет).'
  - 'Колокації: ''провести аналіз'' vs ''аналізувати''; ''навести аргументи'' vs ''аргументувати''.'
  - 'Керування дієслів: ''доводити'' (що?), але ''наголошувати'' (на чому?). Типові
    помилки керування.'
  - 'Активний стан vs Пасивні конструкції: сучасні тенденції в українській науковій
    мові (Agency Pass).'
- section: Практичне застосування
  words: 200
  points:
  - 'Редагування тексту: заміна слабких дієслів сильними та точними.'
  - 'Уникнення повторів: як варіювати лексику в межах одного абзацу.'
  - 'Чек-ліст для самоперевірки: чи правильно обрано дієслово для опису методу/результату.'
