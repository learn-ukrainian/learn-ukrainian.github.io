slug: review-c1-4
title: 'Огляд етапу C1.4: Стилістика та регістри'
word_target: 4000
content_outline:
- section: 'Вступ: Архітектура українських стилів'
  words: 500
  points:
  - 'Review of the functional styles (§4.4.1.1): Conversational, Official-Business,
    Scientific, Publicistic, Artistic.'
  - 'The concept of ''Register'': How context determines the choice of vocabulary
    and syntax.'
  - 'Diagnostic: Identifying the style of short text excerpts.'
- section: 'Офіційно-діловий та науковий стилі: Протокол'
  words: 800
  points:
  - 'Features of high register: Precision, objectivity, standardized clichés.'
  - 'Syntactic markers: Complex sentences, noun chains (нанизування відмінків), impersonal
    constructions.'
  - 'The trap of ''Kanselyaryt'': When official style infects normal speech (deadly
    sins of style).'
  - Analysis of a formal letter vs. a bureaucratic disaster.
- section: 'Розмовний стиль: Жива мова та сленг'
  words: 800
  points:
  - 'Features of low/intimate register: Ellipsis, emotional particles, affective vocabulary
    (§4.4.3).'
  - 'Slang and Jargon: Functions (group identity vs. laziness). When it adds flavor
    and when it kills communication.'
  - 'Diminutives and Augmentatives: Emotional coloring in everyday speech.'
  - 'Dialogues: Switching from ''Kitchen Talk'' to ''Street Talk''.'
- section: 'Етикет і модальність: Мистецтво ввічливості'
  words: 700
  points:
  - 'Degrees of Certainty: From ''безумовно'' to ''навряд чи''. Hedging in academic/formal
    contexts.'
  - 'Politeness strategies: Indirect requests (''Чи не могли б ви...''), forms of
    address (Пан/Пані/Добродій).'
  - Softening criticism and expressing disagreement diplomatically.
- section: 'Стилістичне редагування: Робота над помилками'
  words: 700
  points:
  - 'Common stylistic vices: Tautology (''пам''ятний сувенір''), Pleonasm (''основний
    лейтмотив''), Paronyms (тактовний vs тактичний).'
  - 'Surzhyk as a stylistic marker: Intentional use in literature vs. unintentional
    error.'
  - 'Practical editing: Fixing a ''broken'' text to match a specific register.'
- section: 'Підсумок: Стилістична гнучкість'
  words: 500
  points:
  - Summary of key markers for each register.
  - 'Final ''Exam'': Matching phrases to their appropriate social context.'
  - 'Reflection: Developing one''s own linguistic taste.'
