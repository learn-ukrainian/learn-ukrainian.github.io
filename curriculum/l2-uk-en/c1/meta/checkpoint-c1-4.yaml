slug: checkpoint-c1-4
title: 'Контрольна точка: Стилістика і регістри'
word_target: 4000
content_outline:
- section: Вступ та діагностика стилів
  words: 400
  points:
  - 'Привітання та окреслення мети контрольної точки: перевірка стилістичного чуття.'
  - 'Діагностичне завдання: ідентифікація стилів (науковий, офіційний, художній, публіцистичний,
    розмовний) за короткими уривками.'
  - Короткий огляд критеріїв розрізнення стилів (лексика, синтаксис, тон).
- section: 'Функціональні стилі мови: Характеристики та сфери'
  words: 900
  points:
  - 'Офіційно-діловий стиль: кліше, безособовість, точність. Типові помилки (канцеляризми).'
  - 'Науковий стиль: термінологічність, логічність, об''єктивність. Цитати та посилання.'
  - 'Публіцистичний стиль: емоційність, заклик, актуальність. Риторичні фігури.'
  - 'Художній стиль: образність, естетична функція, авторська індивідуальність.'
  - 'Розмовний стиль: спонтанність, еліптичність, емоційно-експресивна лексика.'
- section: Лексична стилістика та тропи
  words: 900
  points:
  - Аналіз синонімії як інструменту точності та виразності.
  - 'Тропи: метафора, епітет, гіпербола, літота. Розпізнавання та доречність вживання.'
  - 'Стилістично маркована лексика: архаїзми, неологізми, діалектизми, жаргонізми.'
  - Явище паронімії та уникнення лексичних помилок.
- section: Синтаксична стилістика і фігури
  words: 900
  points:
  - Стилістичні функції порядку слів (інверсія).
  - 'Риторичні фігури: антитеза, градація, повтор (анафора, епіфора).'
  - Еліптичні конструкції та їх роль у динамізації тексту.
  - Період та парцеляція як засоби ритмічної організації мовлення.
- section: Практикум з редагування
  words: 600
  points:
  - 'Редагування суржику та кальок: переклад українською ідіоматикою.'
  - 'Стилістична правка: заміна канцеляризмів у живій мові.'
  - 'Зміна регістру: переписати офіційне повідомлення у дружньому тоні і навпаки.'
- section: Підсумок
  words: 300
  points:
  - 'Узагальнення ключових навичок: доречність, точність, виразність.'
  - Заклик до свідомого ставлення до власного мовлення.
  - 'Анонс наступного етапу: використання цих інструментів для аналізу культури та
    літератури.'
