slug: spring-holidays
title: Українські свята - весняний цикл
word_target: 4000
content_outline:
- section: Розминка — Весняне пробудження
  words: 800
  points:
  - 'Концепт весни в українській ментальності: не просто зміна сезону, а міфологічна
    перемога життя над смертю (зимою).'
  - 'Свято Стрітення: народна інтерпретація зустрічі зими з весною та прогностичні
    прикмети.'
  - 'Магія слова: аналіз текстів веснянок та гаївок (імперативні форми: ''прилинь'',
    ''воскресни'', ''оживи'').'
  - 'Символіка перших птахів: випікання ''жайворонків'' із тіста як акт закликання
    весни.'
- section: Великодній цикл
  words: 1400
  points:
  - 'Великий піст: філософія самообмеження, духовна vs. гастрономічна складова.'
  - 'Вербна неділя: чому верба замінила пальму? Ритуал ''биття'' вербою та його вітальна
    функція.'
  - 'Страсний тиждень: сакральна географія часу (Чистий четвер — очищення вогнем і
    водою, Страсна п''ятниця — тиша).'
  - 'Великдень: семантика свята. Великодній кошик як модель всесвіту (паска-сонце,
    яйце-життя, хрін-коріння).'
  - 'Ніч Воскресіння: літургійна урочистість, вітання ''Христос Воскрес!'', розговіння.'
- section: Від Великодня до Трійці
  words: 1200
  points:
  - 'Проводи (Гробки, Радониця): унікальна українська традиція ''обіду з предками''
    на цвинтарі.'
  - 'Вознесіння: народні вірування про 40-денне перебування душ на землі.'
  - 'Зелені свята (Трійця): культ рослинності, ''клечання'' хати травами та гілками.'
  - 'Русальний тиждень: відгомін давніх вірувань про духів природи та води, небезпека
    і табу.'
- section: Практика — весняна обрядовість
  words: 1100
  points:
  - 'Лінгвістичний аналіз автентичної веснянки: пошук архаїзмів та метафоричних кодів.'
  - 'Декодування писанки: значення кольорів (червоний/чорний) та орнаментів (безконечник,
    берегиня).'
  - 'Дискусійний клуб: порівняння комерціалізованого ''Easter Bunny'' та сакрального
    українського Великодня.'
  - 'Творче завдання: написання есе про синкретизм (сплетіння християнського та язичницького)
    у сучасних святкуваннях.'
