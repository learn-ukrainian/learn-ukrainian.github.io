slug: business-etiquette
title: Діловий етикет в Україні
word_target: 4000
content_outline:
- section: Вступ — Ділова культура України
  words: 450
  points:
  - 'Визначення сучасного українського бізнес-середовища: мікс європейських цінностей
    та локальних традицій.'
  - 'Ключові цінності: довіра, особисті відносини, гостинність.'
  - 'Регіональні особливості: відмінності у темпі та стилі спілкування (Київ vs Львів
    vs Одеса).'
  - 'Важливість першого враження: ''зустрічають по одягу''.'
- section: Форми звертання
  words: 700
  points:
  - 'Граматика ввічливості: Кличний відмінок — обов''язковий елемент (Пане Андрію,
    Пані Олено).'
  - 'Система звертань: ''Пан/Пані + Ім''я'' (сучасний стандарт) vs ''Ім''я + По батькові''
    (держсектор, стара школа).'
  - 'Стратегія переходу з ''Ви'' на ''Ти'': хто ініціює, як реагувати, як відмовити
    ввічливо.'
  - 'Титули та посади: коли доречно додавати ''Пане Директоре'', ''Пане Професоре''.'
- section: Вітання та знайомство
  words: 600
  points:
  - 'Протокол рукостискання: гендерні аспекти в сучасному бізнесі (жінка подає руку
    першою або рівноправність?), сила потиску.'
  - 'Правило ''порогу'': культурний імператив, який не можна ігнорувати.'
  - 'Обмін візитками: ритуал вручення, як читати, де зберігати під час зустрічі.'
  - 'Представлення третіх осіб: порядок представлення (молодший старшому, колега клієнту).'
- section: Подарунки в бізнесі
  words: 500
  points:
  - 'Тонка межа: діловий сувенір vs хабар. Юридичні та етичні аспекти.'
  - 'Культура дарування: що доречно (книги, канцелярія, національні сувеніри), а що
    ні (особисті речі, алкоголь сумнівної якості).'
  - 'Протокол приймання подарунків: чи відкривати одразу, як дякувати.'
  - 'Квіти в діловому етикеті: кількість, колір, ситуативна доречність.'
- section: Час та пунктуальність
  words: 500
  points:
  - 'Українське ставлення до часу: поліхронність vs монохронність.'
  - 'Допустимі межі запізнення: 5 хвилин («академічне»), 15 хвилин (потрібне попередження).'
  - 'Планування зустрічей: наскільки заздалегідь домовлятися, підтвердження зустрічі.'
  - 'Deadline culture: як в Україні ставляться до дедлайнів та як ввічливо нагадувати
    (follow-up).'
- section: Дрес-код
  words: 450
  points:
  - 'Рівні офіційності: Business Best, Business Traditional, Business Casual, Smart
    Casual.'
  - 'Особливості українського контексту: тенденція до більшої формальності та доглянутості
    порівняно з Заходом.'
  - Табу в діловому одязі для чоловіків та жінок.
  - Вплив індустрії (IT vs Банкінг) на стандарти зовнішнього вигляду.
- section: Практичне завдання
  words: 800
  points:
  - 'Кейс-стаді 1: ''Незручна ситуація'' (помилка в імені, забув візитку, розлив каву)
    — стратегії виходу.'
  - 'Рольова гра: ''Перша зустріч з потенційним партнером'' — від привітання до прощання.'
  - 'Аналіз помилок: розбір типових faux pas іноземців в Україні.'
  - 'Словник ''ділової дипломатії'': фрази для пом''якшення відмови, вираження незгоди,
    переривання співрозмовника.'
