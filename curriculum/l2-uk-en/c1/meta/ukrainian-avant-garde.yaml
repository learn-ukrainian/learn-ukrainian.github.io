slug: ukrainian-avant-garde
title: Український авангард
word_target: 4000
content_outline:
- section: Розминка — Українські модерністи
  words: 600
  points:
  - 'Визначення українського авангарду: феномен 1910–1930-х років, що змінив світове
    мистецтво.'
  - 'Історичне тло: революція, українізація та пошук нової національної форми.'
  - 'Зв''язок із Заходом: Київ-Париж-Мюнхен, синхронність із європейським модернізмом.'
  - 'Трагічний фінал: сталінські репресії та знищення мистецької еліти.'
- section: Ключові постаті та напрямки
  words: 1600
  points:
  - 'Олександра Екстер: «Амазонка авангарду», кубофутуризм, ритм кольору та сценографія.'
  - 'Казимир Малевич: київське коріння, супрематизм як «чисте відчуття», вплив селянського
    мистецтва.'
  - 'Давид Бурлюк: епатаж футуризму, організатор виставок, «батько» нового мистецтва.'
  - 'Михайло Бойчук і бойчукізм: неовізантійський стиль, монументальні фрески, колективна
    творчість.'
  - 'Олександр Архипенко: скульптура порожнечі, скульптомалярство, світове визнання.'
- section: Спадщина авангарду
  words: 1000
  points:
  - 'Народне джерело: зв''язок авангарду з примітивізмом (Марія Примаченко, Ганна
    Собачко-Шостак).'
  - 'Втрачені шедеври: доля монументальних розписів Бойчука та «Спецфонд» музею.'
  - 'Сучасне відродження: виставки Мистецького Арсеналу, повернення імен у світовий
    контекст.'
  - 'Вплив на дизайн: як ідеї 1920-х живуть у сучасному українському брендінгу та
    моді.'
- section: Практика — аналіз мистецтва
  words: 800
  points:
  - 'Алгоритм аналізу: композиція, колорит, динаміка, ідея (словник мистецтвознавця).'
  - 'Практичний розбір: опис супрематичної композиції Малевича (геометрія, вага, рух).'
  - 'Порівняння: зіставити бойчукізм (статичність, лінія) та футуризм (рух, розпад
    форми).'
  - 'Письмове завдання (есе): «Чому тоталітарні режими бояться авангарду?».'
