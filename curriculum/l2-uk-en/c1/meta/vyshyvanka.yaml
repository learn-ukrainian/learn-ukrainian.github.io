slug: vyshyvanka
title: 'Вишиванка: Зашифрована доля'
word_target: 4000
content_outline:
- section: Розминка — Сорочка як оберіг
  words: 600
  points:
  - 'Концепція ''зашифрованої долі'': вишиванка як духовний паспорт, а не просто декор.'
  - 'Апотропеїчна (захисна) функція: чому орнамент розміщували на комірі, манжетах
    та подолі (захист отворів одягу).'
  - 'Вишиванка в сучасному контексті: трансформація від архаїчного ритуалу до політичного
    маніфесту та світового бренду.'
  - Короткий вступ до дискусії 'брокарівська вишивка' vs 'автентика' (як анонс для
    подальшого аналізу).
- section: Регіональні стилі вишивки
  words: 1200
  points:
  - 'Полтавщина (Решетилівка): філософія ''білим по білому'', техніка вирізування
    та естетична стриманість.'
  - 'Гуцульщина (Космач): буйство кольорів, геометрична складність та вплив карпатського
    ландшафту.'
  - 'Борщів (Поділля): домінування чорної вовни, легенда про жалобу та унікальний
    ''кучерявий шов''.'
  - 'Полісся: архаїчні червоні лінійні візерунки, ткацькі техніки (заволікання) та
    збереження давньослов''янських мотивів.'
  - 'Буковина: використання золотих та срібних ниток, бісеру та квіткова пишність.'
- section: Техніка та символіка
  words: 1000
  points:
  - 'Більше ніж хрестик: детальний аналіз ''низинки'' (шов ''поза голку'' з вивороту),
    ''гладі'' та ''мережки''.'
  - 'Солярні та геометричні символи: Ромб (родючість/земля), Хрест (захист), Зірка
    (всесвіт).'
  - 'Рослинні символи (Дерево Життя): Калина (кров/рід), Дуб (чоловіча сила), Виноград
    (радість створення сім''ї).'
  - 'Гендерна диференціація візерунків: чому чоловіки не носять лілії, а жінки рідко
    використовують чисті жолуді.'
- section: Практика — аналіз вишивки
  words: 1200
  points:
  - 'Завдання на візуальний аналіз: деконструкція фотографії музейного експоната (Регіон?
    Техніка? Ймовірний власник?).'
  - 'Сучасна диференціація: як відрізнити дешевий мас-маркет принт від ручної роботи
    майстра.'
  - 'Дипломатичний дрескод: вишиванка як інструмент ''м''якої сили'' (приклади публічних
    осіб).'
  - 'Тема для есе: ''Еволюція вишиванки: від сакрального талісмана до світового бренду
    — здобуток чи втрата?'''
