slug: franko-liryka
title: 'Франко: Громадянська та філософська лірика'
word_target: 4000
content_outline:
- section: Розминка — Каменяр української поезії
  words: 300
  points:
  - 'Іван Франко: титан праці та інтелекту (поет, вчений, політик)'
  - Концепція «наукового реалізму» в творчості Франка
  - 'Відмінність від романтизму: раціоналізм проти емоцій'
  - Ключові збірки та етапи творчості
- section: Гімн «Вічний революціонер»
  words: 500
  points:
  - Аналіз вірша «Гімн» (Вічний революціонер)
  - Образ «духу, що тіло рве до бою» як рушійної сили прогресу
  - Риторичні фігури та ритміка вірша
  - Значення твору для українського національного руху
- section: 'Поема «Каменярі»: алегорія боротьби'
  words: 600
  points:
  - Сюжет та алегоричний зміст поеми «Каменярі»
  - Образ каменярів як будівничих нового шляху
  - Лексика праці та фізичного зусилля в поезії
  - Добровільна самопожертва заради майбутнього
- section: Лірична драма «Зів’яле листя»
  words: 600
  points:
  - 'Структура збірки: три «жмутки» (частини)'
  - Від особистої трагедії до філософських узагальнень
  - Аналіз поезії «Ой ти, дівчино, з горіха зерня»
  - Фольклорні мотиви та модерністська психологія
- section: Філософська поема «Мойсей»
  words: 700
  points:
  - Історичний контекст та біблійна основа поеми
  - Конфлікт вождя (пророка) і пасивної маси (народу)
  - Сумніви та спокуси Мойсея (Азазель)
  - Пролог до поеми як заповіт українському народу
- section: Науковий реалізм та новаторство Франка
  words: 400
  points:
  - Синтез науки, публіцистики та поезії
  - 'Розширення тематики: від села до міста і нафтопромислів'
  - Інтелектуалізація української літератури
  - Вплив Франка на наступні покоління (модерністів)
- section: Практика — поезія Франка
  words: 500
  points:
  - Порівняльний аналіз образів «Каменярів» та «Вічного революціонера»
  - Інтерпретація символіки «Зів'ялого листя»
  - 'Дискусія: актуальність дилеми «Мойсея» в сучасному світі'
  - Робота з літературознавчими термінами (алегорія, гімн, лірична драма)
- section: Підсумок
  words: 400
  points:
  - Франко як універсальний геній української культури
  - 'Багатогранність спадщини: від інтимної лірики до філософських поем'
  - Значення громадянської позиції поета
  - Фінальна рефлексія над вивченим
