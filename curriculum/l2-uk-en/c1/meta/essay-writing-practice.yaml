slug: essay-writing-practice
title: Практикум — Написання есе
word_target: 4000
content_outline:
- section: Вступ — Інтеграція навичок
  words: 400
  points:
  - 'Огляд пройденого шляху: від речення (M01) до цілісного тексту'
  - 'Чек-лист есеїста: що робить текст успішним'
  - Критерії оцінювання згідно з Державним стандартом (зміст, структура, лексика)
- section: 'Планування есе: Стратегія'
  words: 500
  points:
  - 'Аналіз теми: розрізнення ключових слів та інструкцій (analyze, discuss, evaluate)'
  - 'Техніки мозкового штурму: ментальні мапи (mind maps) та вільне письмо'
  - 'Створення скелета есе: Теза — Аргументи — Висновок'
- section: 'Написання чернетки: Архітектура думки'
  words: 700
  points:
  - 'Формулювання сильної тези: якір усього тексту'
  - 'Структура абзацу (TEEL): Topic sentence, Explanation, Evidence, Link'
  - 'Інтеграція цитат та доказів: як не втратити власний голос'
  - 'Логічні переходи (transitions): клей, що тримає текст купи'
- section: Редагування та шліфування
  words: 600
  points:
  - 'Макро-редагування: перевірка логіки та структури'
  - 'Мікро-редагування: боротьба з тавтологіями та словами-паразитами'
  - 'Пунктуаційна гігієна: типові помилки у складних реченнях'
  - 'Ритм тексту: чергування довгих і коротких речень'
- section: 'Взірцеве есе з аналізом: Деконструкція'
  words: 900
  points:
  - 'Повний текст зразкового академічного есе (тема: ''Майбутнє освіти в Україні'')'
  - 'Покроковий коментар: аналіз вступу, основної частини та висновку'
  - Розбір використаних засобів зв'язності та стилістичних прийомів
  - Альтернативні підходи до розкриття тієї ж теми
- section: 'Типові помилки: Робота над помилками'
  words: 500
  points:
  - 'Структурні пастки: відсутність чіткої тези або висновку'
  - 'Стилістичний дисонанс: змішування розмовного та офіційного стилів'
  - 'Логічні прогалини: аргументи, що не підтверджують тезу'
- section: 'Практичне завдання: Творча майстерня'
  words: 400
  points:
  - Вибір теми для власного есе (із запропонованих варіантів)
  - 'Поетапний алгоритм написання: від плану до фінальної вичитки'
  - 'Рубрика самооцінки: перевір себе перед здачею'
