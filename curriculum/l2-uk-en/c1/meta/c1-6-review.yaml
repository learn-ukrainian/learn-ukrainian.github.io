slug: c1-6-review
title: 'C1.6 Література: Огляд та рефлексія'
word_target: 4000
content_outline:
- section: Розминка — Український літературний канон
  words: 1000
  points:
  - 'Визначення літературного канону: динамічний процес відбору текстів, що формують
    національну ідентичність.'
  - 'Від Котляревського до Коцюбинського: еволюція живої народної мови в інструмент
    високого модернізму.'
  - 'Три стовпи: Шевченко (пророк/націєтворення), Франко (інтелект/європеїзація),
    Леся Українка (драматургія/світовий контекст).'
  - 'Роль поколінь: як ''шістдесятники'' та сучасні автори (Жадан, Забужко) переосмислюють
    класичну спадщину.'
- section: Ключові напрями огляду
  words: 1500
  points:
  - 'Романтизм (ХІХ ст.): культ почуттів, історична пам''ять, фольклорний ідеал (Котляревський,
    ранній Шевченко, Кирило-Мефодіївці).'
  - 'Реалізм (др. пол. ХІХ ст.): соціальний аналіз, ''пропаща сила'', народницька
    ідеологія (Нечуй-Левицький, Панас Мирний).'
  - 'Ранній модернізм (fin de siècle): психологізм, естетизм, ''зривання масок'' (Коцюбинський,
    Стефаник, Ольга Кобилянська).'
  - 'Літературний аналіз: ключові інструменти (тема, ідея, сюжет, композиція, система
    образів) та їх застосування.'
  - 'Компаративістика: порівняння українських течій з європейськими відповідниками
    (наприклад, український романтизм vs байронізм).'
- section: Практика — інтеграційний аналіз
  words: 1500
  points:
  - 'Кейс-стаді: Порівняння образів ''Каменяра'' (Франко) та ''Пророка'' (Шевченко)
    — різні шляхи служіння народу.'
  - 'Есе-рефлексія: Еволюція жіночих образів від покритки-жертви до емансипованої
    інтелектуалки (Марко Вовчок -> Леся Українка).'
  - 'Історичний контекст: Як заборони (Емський указ) впливали на жанровий вибір (розквіт
    театру корифеїв).'
  - 'Актуальність: Чому класичні сюжети (''Кайдашева сім''я'', ''Лісова пісня'') резонують
    у сучасному українському кіно та театрі.'
  - 'Підсумок: Література як безперервний діалог поколінь та дзеркало національного
    духу.'
