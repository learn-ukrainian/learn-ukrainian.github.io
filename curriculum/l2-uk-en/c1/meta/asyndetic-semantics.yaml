slug: asyndetic-semantics
title: 'Безсполучникове речення: логіка тире і двокрапки'
word_target: 4000
content_outline:
- section: Вступ — Речення без сполучників
  words: 400
  points:
  - 'Визначення безсполучникового складного речення (БСР) у контексті стилістики C1:
    це не ''втрата'' сполучника, а набуття динаміки.'
  - 'Інтонація як основний засіб зв''язку: як пауза замінює ''тому що'', ''але'',
    ''і''.'
  - 'Огляд семантичних відношень: одночасність, послідовність, причина, наслідок,
    пояснення, контраст.'
  - 'Чому зріла проза тяжіє до асиндетону (безсполучниковості): ритм, енергія, лаконічність.'
- section: Двокрапка — пояснення і причина
  words: 800
  points:
  - 'Семантика ''ЧОМУ?'' та ''ЩО САМЕ?'': двокрапка як маркер розкриття змісту.'
  - 'Заміна сполучників ''бо'', ''тому що'': ''Він не прийшов: захворів''.'
  - 'Заміна сполучників ''а саме'', ''тобто'': ''Я люблю три речі: каву, книжки і
    тишу'' (узагальнювальне слово).'
  - 'Доповнення дієслів сприйняття (бачити, чути, знати, розуміти): ''Я озирнувся:
    до мене біг пес'' (замість ''що'').'
  - 'Літературні приклади (Коцюбинський): використання двокрапки для деталізації вражень.'
- section: Тире — наслідок і контраст
  words: 800
  points:
  - 'Семантика ''І ЩО ДАЛІ?'' та ''АЛЕ'': тире як маркер динаміки та зміни.'
  - 'Наслідок і висновок (замість ''тому'', ''так що''): ''Прийшла весна — зацвіли
    сади''.'
  - 'Протиставлення (замість ''а'', ''але'', ''проте''): ''Шукав щастя — знайшов біду''.'
  - 'Швидка зміна подій: ''Блискавка — грім — злива'' (кінематографічність синтаксису).'
  - 'Умова і час (перша частина): ''Прийдеш вчасно — отримаєш приз'' (замість ''якщо'').'
- section: Кома — послідовність і одночасність
  words: 600
  points:
  - 'Семантика ''І... І...'': спокійний плин подій.'
  - 'Одночасність дій: ''Сонце сідало, вітер стихав, птахи замовкали'' (статичний
    пейзаж).'
  - Послідовність без причинно-наслідкового акценту.
  - 'Крапка з комою: коли частини віддалені за змістом або вже мають свої розділові
    знаки (ускладнений синтаксис).'
  - 'Алгоритм вибору: Кома (нейтрально) vs Тире (динамічно) vs Двокрапка (аналітично).'
- section: 'Трансформація: від сполучникового до безсполучникового'
  words: 800
  points:
  - 'Практикум стиліста: перетворення складнопідрядних речень на безсполучникові.'
  - 'Аналіз втрати/набуття смислів: як зникає ''канцеляризм'' і з''являється ''художність''.'
  - 'Зворотна трансформація: відновлення пропущених сполучників для перевірки розуміння
    семантики (тест ''Встав сполучник'').'
  - 'Робота з текстом: редагування уривка з надмірною кількістю ''тому що'' та ''який''.'
- section: Підсумок
  words: 600
  points:
  - 'Зведена таблиця-алгоритм: Який знак обрати? (Схема ''Зміст → Знак'').'
  - 'Стилістичні поради: коли доречний асиндетон (есе, художній опис), а коли ні (сухий
    протокол).'
  - 'Фінальний акцент: пунктуація як ''нотний стан'' тексту.'
  - Список рекомендованої літератури для спостереження за синтаксисом (Стефаник, Коцюбинський).
