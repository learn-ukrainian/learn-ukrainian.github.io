slug: essay-structure
title: Структура академічного есе
word_target: 4000
content_outline:
- section: Вступ — Архітектура тексту
  words: 400
  points:
  - 'Есе як інтелектуальна споруда: чому структура важливіша за натхнення'
  - 'Типологія академічних есе: аналітичні, аргументативні, описові'
  - 'Загальна тричастинна будова: правило «Вступ-Тіло-Висновок» як універсальний стандарт'
  - Поняття когерентності (coherence) та зв'язності (cohesion) у тексті
- section: Вступна частина
  words: 600
  points:
  - 'Функції вступу: карта для читача'
  - 'Гачок (hook): стратегії привертання уваги (риторичне питання, статистика, цитата)'
  - 'Контекстуалізація: перехід від загального до конкретного (методика «лійки»)'
  - 'Теза (Thesis Statement): серце есе. Вимоги до сильної тези (специфічність, дискусійність)'
- section: Основна частина — TEEL
  words: 800
  points:
  - 'Анатомія ідеального абзацу: чому одного речення недостатньо'
  - 'T (Topic sentence): тематичне речення як міні-теза абзацу'
  - 'E (Explanation): розгортання та пояснення думки'
  - 'E (Evidence): доказова база (факти, цитати, дані) — академічна доброчесність'
  - 'L (Link): замикання кола — зв''язок із головною тезою есе'
- section: Розвиток аргументів
  words: 600
  points:
  - 'Лінійна логіка: послідовність «від слабшого до сильнішого»'
  - 'Міжабзацні переходи (transitions): як будувати містки між ідеями'
  - 'Баланс аргументації: глибина проти ширини охоплення'
  - Уникнення логічних розривів та стрибків думки
- section: Висновки
  words: 400
  points:
  - 'Мистецтво прощання: функції заключної частини'
  - 'Перефразування тези (Restatement): не копіювати, а переосмислити'
  - 'Синтез аргументів: показати «велику картину»'
  - 'Заключний акорд (Final thought): імплікації, прогнози або заклики'
- section: Структурна мова
  words: 600
  points:
  - 'Маркери послідовності: «по-перше», «насамперед», «далі»'
  - 'Маркери причинно-наслідкових зв''язків: «отже», «унаслідок цього», «зумовлено
    тим, що»'
  - 'Маркери протиставлення та допусту: «водночас», «попри те, що», «натомість»'
  - 'Академічні кліше для структурування: «у цій роботі розглядається», «варто наголосити
    на»'
- section: Практика структурування
  words: 600
  points:
  - 'Техніка «скелету»: планування есе до написання першого рядка'
  - 'Зворотний інжиніринг: аналіз структури зразкового есе'
  - 'Редагування на рівні структури: як виявити «провисання» логіки'
  - Чек-ліст структурної перевірки власного тексту
