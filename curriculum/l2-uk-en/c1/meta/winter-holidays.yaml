slug: winter-holidays
title: Українські свята - зимовий цикл
word_target: 4000
content_outline:
- section: Розминка — Зимові свята та їх філософія
  words: 800
  points:
  - 'Хронологія циклу: від Романа (18 листопада) та Миколая (6 грудня) до Стрітення
    (2 лютого). Новий календарний стиль.'
  - 'Феномен двовір''я (синкретизм): як християнські святі замінили язичницьких богів
    (Миколай замість Велеса/Мороза, Різдво замість Коляди).'
  - 'Сакральний зміст зимового часу: культ предків, аграрна магія, боротьба світла
    і темряви.'
  - 'Лексичний практикум: ключові етнографічні терміни (обряд, ритуал, звичай, повір''я,
    забобон).'
- section: Різдвяно-Новорічний період
  words: 1400
  points:
  - 'Святий Миколай (6 грудня): традиція дарування, відмінність від Діда Мороза (радянський
    конструкт) та Санта-Клауса.'
  - 'Святвечір (24 грудня): символіка 12 страв, кутя як головна ритуальна страва,
    обряд запрошення морозу, Дідух.'
  - 'Різдво (25 грудня): космогонічний вимір колядок (найдавніші колядки про створення
    світу), вертепна драма (персонажі, соціальний підтекст).'
  - 'Щедрий вечір та Маланка (31 грудня): карнавальна культура, маскування, водіння
    Кози, відмінність щедрівок від колядок («Щедрик»).'
- section: Від Водохреща до Стрітення
  words: 1000
  points:
  - 'Водохреще (6 січня): космогонічна символіка води, обряди освячення, «стріляння»
    коляди.'
  - 'Завершення святок: «Розляд» (прощання з колядою), спалення дідуха.'
  - 'Стрітення (2 лютого): зустріч зими з весною, освячення громичної свічки та води,
    народна метеорологія.'
  - 'Мовні формули вітань: специфічні вітання для кожного свята (Христос рождається,
    Христос хрещається) та правильні відповіді.'
- section: Практика — зимова обрядовість
  words: 1300
  points:
  - 'Аналітичне завдання: порівняння текстів архаїчної колядки та християнської колядки
    (аналіз образної системи).'
  - 'Кейс-стаді: Вертеп як дзеркало української історії (як змінювалися персонажі
    від бароко до сьогодення).'
  - 'Есе-роздум (C1): «Чи можливе збереження сакрального змісту свята в епоху споживання?»
    (використання стилістичних фігур).'
  - 'Дискусійний клуб: трансформація традицій у діаспорі та в сучасній Україні.'
