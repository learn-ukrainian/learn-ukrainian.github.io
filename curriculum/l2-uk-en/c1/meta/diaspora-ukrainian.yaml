slug: diaspora-ukrainian
title: Українська діаспора
word_target: 4000
content_outline:
- section: Вступ — Історія еміграції
  words: 600
  points:
  - Визначення діаспори та її масштаби у світі (понад 20 млн).
  - 'Перша хвиля (трудова): кінець XIX ст., виїзд до Канади, Бразилії, США.'
  - 'Друга хвиля (міжвоєнна): політична еміграція після поразки визвольних змагань.'
  - 'Третя хвиля (політична): ''Ді-Пі'' (Displaced Persons) після Другої світової
    війни.'
  - 'Четверта хвиля (економічна): 1990-ті роки, розпад СРСР.'
- section: Основні громади
  words: 800
  points:
  - 'Канада: найстаріша та найорганізованіша діаспора, вплив на політику (G7).'
  - 'США: великі осередки (Нью-Йорк, Чикаго, Філадельфія), наукові інституції.'
  - 'Бразилія та Аргентина: специфіка ''старої'' еміграції, сільськогосподарські поселення.'
  - 'Австралія: повоєнна еміграція, збереження мови в ізоляції.'
  - 'Європа (Польща, Німеччина, Італія): феномен нової трудової міграції та біженців.'
- section: Мовні особливості
  words: 700
  points:
  - 'Консервація мови: збереження норм скрипниківки та галицьких діалектизмів 1930-х.'
  - 'Вплив мови середовища: інтерференція (англійська, іспанська, португальська).'
  - 'Феномен ''Ukish'' (українсько-англійський суржик): лексичні запозичення (''гара'',
    ''бас'').'
  - 'Особливості мовлення heritage speakers: акцент, граматичні спрощення.'
- section: Культурне життя
  words: 600
  points:
  - 'Роль церкви: парафія як центр громадського життя (УГКЦ, УПЦ).'
  - 'Освіта: суботні школи українознавства, кафедри україністики (Гарвард, КІУС).'
  - 'Молодіжні організації: Пласт, СУМ (Спілка Української Молоді).'
  - 'Фестивалі та культурні заходи: Bloor West Village Festival (Торонто), Український
    фестиваль у Чикаго.'
- section: Мовна ідентичність
  words: 500
  points:
  - 'Мова як маркер ідентичності: чому діаспора зберігала мову десятиліттями.'
  - 'Виклики асиміляції: перехід на мову країни проживання у 3-4 поколінні.'
  - 'Подвійна ідентичність: ''українець канадського походження'' vs ''канадець''.'
  - 'Зв''язок з Україною: допомога, волонтерство, культурна дипломатія.'
- section: Сучасна діаспора
  words: 500
  points:
  - 'Нова хвиля після 2022 року: тимчасовий захист vs еміграція.'
  - 'Діджитал-зв''язок: соціальні мережі, миттєва комунікація з Батьківщиною.'
  - 'Глобальне українство: адвокація інтересів України у світі (мітинги, петиції).'
  - 'Зміна ставлення до діаспори в самій Україні: від ''зрадників'' (СРСР) до партнерів.'
- section: Практичне завдання
  words: 300
  points:
  - Аналіз тексту діаспорного автора (наприклад, стаття з газети 'Свобода').
  - Виявлення архаїзмів та запозичень у наведеному уривку.
  - 'Дискусійне питання: ''Чи можливо зберегти мову в іншомовному середовищі назавжди?''.'
  - Написання есе про роль діаспори у відновленні незалежності України.
