slug: case-studies
title: Практичні кейси
word_target: 4000
content_outline:
- section: Вступ — Метод кейсів
  words: 400
  points:
  - Визначення кейс-методу (case study) як інструменту аналізу в бізнесі та політиці
  - 'Алгоритм роботи з кейсом: ознайомлення, діагностика проблеми, пошук альтернатив'
  - 'Критерії оцінювання: логічність, обґрунтованість, реалістичність рішень'
  - Роль критичного мислення в аналізі складних ситуацій
- section: Кейс 1 — Мовна політика
  words: 700
  points:
  - 'Опис ситуації: Впровадження мовного закону в сфері обслуговування (реалії 2021-2022
    рр.)'
  - 'Чинники та контекст: Права споживачів vs звички персоналу, регіональні особливості'
  - 'Аналіз і дискусія: Аргументи сторін, правовий аспект (стаття 30 Мовного закону)'
  - 'Пропозиції рішень: Стратегії м''якої українізації бізнесу (курси, мотивація,
    скрипти)'
- section: Кейс 2 — Медіааналіз
  words: 700
  points:
  - 'Новинний матеріал: Порівняння висвітлення однієї події (наприклад, екологічного
    протесту) в різних медіа'
  - 'Виявлення маніпуляцій: Емоційна лексика, вибіркові факти, «джинса»'
  - 'Порівняння джерел: Офіційні повідомлення vs блогосфера/Telegram-канали'
  - Висновки щодо медіаграмотності та перевірки фактів
- section: Кейс 3 — Діалект чи суржик?
  words: 700
  points:
  - 'Зразок мовлення: Транскрипт розмови, що містить нестандартну лексику'
  - 'Лінгвістичний аналіз: Виокремлення діалектизмів (органічні) та русизмів (суржик)'
  - 'Соціальний контекст: Коли суржик є стилістичним засобом (література, гумор),
    а коли — ознакою низької культури мовлення'
  - 'Висновки: Ставлення до мовної норми в професійному середовищі'
- section: Кейс 4 — Політичний дискурс
  words: 700
  points:
  - 'Аналіз промови: Уривок публічного виступу політика (риторика, популізм vs прагматизм)'
  - 'Риторичні прийоми: Метафори, повтори, апеляція до емоцій чи цінностей'
  - 'Критична оцінка: Відповідність обіцянок повноваженням, логічні хиби'
  - Формулювання власної позиції щодо почутого
- section: Груповий проєкт
  words: 400
  points:
  - 'Командна робота: Розподіл ролей (модератор, скептик, аналітик, презентатор)'
  - 'Підготовка презентації: Структура пітчингу рішення кейсу'
  - 'Обговорення результатів: Як надавати конструктивний зворотний зв''язок колегам'
  - 'Симуляція: Міні-дебати щодо обраного рішення'
- section: Підсумок
  words: 400
  points:
  - Узагальнення аналітичних навичок, здобутих у модулі
  - Важливість відділення фактів від інтерпретацій
  - 'Зворотний зв''язок: Самооцінка прогресу в аргументації'
  - 'Подальший розвиток: Рекомендації щодо практики кейс-методу (бізнес-література,
    дебатні клуби)'
