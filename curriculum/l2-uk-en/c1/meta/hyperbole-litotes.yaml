slug: hyperbole-litotes
title: 'Гіпербола та літота: Гра масштабів'
word_target: 4000
content_outline:
- section: 'Розминка: Гра масштабів'
  words: 600
  points:
  - 'Визначення понять масштабу в мові: чому ми не завжди говоримо буквально'
  - Гіпербола (збільшення) та літота (зменшення) як два полюси експресії
  - 'Психологія сприйняття: чому перебільшення викликає емоцію, а применшення — довіру'
  - 'Огляд інструментарію: від суфіксів до складних синтаксичних конструкцій'
- section: 'Гіпербола: Мистецтво перебільшення'
  words: 1000
  points:
  - 'Лексична гіпербола: фразеологізми часу (''чекав вічність''), кількості (''море
    людей''), стану (''мертвий від втоми'')'
  - 'Граматична гіпербола: роль суфіксів -ищ- (вітрище), -енн- (страшенний), префіксів
    над-, архі-, ультра-'
  - 'Стилістичні функції: комічний ефект, патетика, драматизація (на прикладах з літератури)'
  - 'Типові помилки: коли гіпербола стає кліше або звучить неприродно'
- section: 'Літота: Сила применшення'
  words: 1000
  points:
  - 'Механізм подвійного заперечення: ''непоганий'' (добрий), ''не без гріха'' (грішний),
    ''не останній'' (важливий)'
  - 'Етикетна функція: літота як засіб ввічливості, скромності та уникнення конфлікту
    (''Я б не сказав, що це ідеально'')'
  - 'Іронічна літота: як сказати мало, а матися на увазі багато (британський vs український
    контекст)'
  - 'Граматичні засоби применшення: суфікси -еньк-, -есеньк- у функції іронії або
    пом''якшення'
- section: 'Практика: Масштаб у контексті'
  words: 1000
  points:
  - 'Гіпербола в українському фольклорі: аналіз уривків з дум та народних пісень (козак
    Мамай, богатирі)'
  - 'Літературний бурлеск: ''Енеїда'' Котляревського як приклад тотальної гіперболізації'
  - 'Офіційно-діловий стиль: де доречна літота (''недоцільно'', ''непередбачені обставини'')
    і де заборонена гіпербола'
  - 'Порівняльний аналіз: українська емоційність vs англійська стриманість (переклад
    ідіом)'
- section: Підсумок
  words: 400
  points:
  - 'Синтез: баланс між перебільшенням і применшенням як ознака майстерності мовця'
  - 'Чек-лист: коли використовувати гіперболу (емоції, гумор), а коли — літоту (дипломатія,
    іронія)'
  - 'Фінальна рефлексія: як масштаб мовлення впливає на сприйняття реальності'
