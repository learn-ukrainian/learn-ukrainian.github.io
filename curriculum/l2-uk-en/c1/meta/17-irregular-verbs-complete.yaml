objectives:
- Master conjugation patterns of all major irregular verbs (e.g., дати, їсти, бути).
- Distinguish between motion verbs (іти vs ходити, їхати vs їздити) and their irregularities.
- Correctly apply consonant alternations in conjugation (писати - пишу, хотіти - хочу).
- Use irregular verbs accurately in various tenses and moods in academic and formal contexts.
