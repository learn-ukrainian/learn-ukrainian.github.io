slug: practice-ii-article-critique
title: Практика II — Критика статті
word_target: 4000
content_outline:
- section: Вступ — Критичне читання
  words: 450
  points:
  - Визначення критичного читання як активного діалогу з текстом (на відміну від пасивного
    споживання інформації).
  - 'Роль наукової рецензії в академічному процесі: фільтр якості та інструмент наукової
    дискусії.'
  - 'Етичні аспекти критики: об''єктивність, доброчесність, повага до опонента.'
  - Відмінність між критикою (аналізом) та критиканством (пошуком помилок).
- section: Оцінка методології
  words: 600
  points:
  - 'Критерії оцінювання методів дослідження: валідність, надійність, відповідність
    поставленій меті.'
  - 'Аналіз вибірки: репрезентативність, обсяг, критерії включення/виключення.'
  - 'Виявлення обмежень дослідження (limitations): чи визнає їх автор, як вони впливають
    на висновки.'
  - 'Типові методологічні помилки: упередженість відбору, кореляція vs причинність.'
- section: Оцінка аргументації
  words: 600
  points:
  - 'Логічна структура доказів: теза — аргумент — приклад/доказ.'
  - 'Достатність та якість доказів: емпіричні дані, посилання на авторитетні джерела,
    статистика.'
  - Виявлення логічних хиб (logical fallacies) у науковому тексті.
  - 'Оцінка альтернативних інтерпретацій: чи розглядає автор інші можливі пояснення
    результатів.'
- section: Мова критичного аналізу
  words: 650
  points:
  - 'Лексичні маркери згоди та часткової згоди: «Автор слушно зауважує...», «Можна
    погодитися з твердженням...».'
  - 'Формули ввічливої незгоди та сумніву: «Викликає сумнів теза про...», «Дискусійним
    видається твердження...».'
  - 'Засоби логічного зв''язку (linkers) для структурування аргументів: «по-перше»,
    «з іншого боку», «водночас».'
  - 'Безособові конструкції для об''єктивізації оцінки: «Встановлено, що...», «Аналіз
    показує...».'
- section: Сильні та слабкі сторони
  words: 600
  points:
  - 'Стратегія «сендвіча» (або балансу): початок з позитиву, перехід до критичних
    зауважень, конструктивний підсумок.'
  - 'Як формулювати позитивні коментарі: відзначати новизну, глибину аналізу, практичну
    значущість.'
  - 'Конструктивна критика: не лише вказати на недолік, а й запропонувати шлях покращення
    або альтернативу.'
  - 'Важливість конкретики: уникати загальних фраз («робота цікава»), наводити конкретні
    приклади.'
- section: Структура рецензії
  words: 550
  points:
  - Бібліографічний опис статті (стандарт ДСТУ/APA).
  - 'Вступна частина: актуальність теми, мета статті, коротка характеристика автора.'
  - 'Основна частина: аналіз змісту, методології, аргументації (найбільший обсяг).'
  - 'Висновки та рекомендації: загальна оцінка, рекомендація до публікації/використання.'
- section: Практичне завдання
  words: 550
  points:
  - 'Моделювання процесу рецензування: покроковий алгоритм дій рецензента.'
  - Чек-лист для самоперевірки рецензії (Self-Assessment Checklist).
  - Інструкція до написання рецензії на запропоновану статтю (симуляція реального
    завдання).
  - 'Взаємне рецензування (Peer Review): як оцінювати роботу колеги.'
