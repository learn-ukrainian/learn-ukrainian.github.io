slug: podillia-ta-volyn
title: Поділля та Волинь
word_target: 4000
content_outline:
- section: Розминка — Серце України
  words: 400
  points:
  - Define the geographical and ethnographic boundaries of Podillia and Volyn within
    modern Ukraine.
  - Analyze the historical impact of the Grand Duchy of Lithuania and the Polish Crown
    on regional identity (architecture, religion).
  - Introduce the concept of 'historical-ethnographic region' vs 'administrative oblast'.
  - Highlight key cultural markers that distinguish these regions from Halychyna or
    Dnieper Ukraine.
- section: Поділля
  words: 1400
  points:
  - 'Describe the unique landscape: Dniester canyons and the Podilski Tovtry (barrier
    reef origin).'
  - 'Explore fortress architecture: Kamianets-Podilskyi, Khotyn, and Medzhybizh as
    defense outposts.'
  - 'Analyze Podillian embroidery: distinctive ''nyz'' technique (black stitching
    from reverse) and plant motifs.'
  - 'Discuss traditional architecture: the phenomenon of the ''white hut'' with painted
    facades and fortress-churches (Sutkivtsi).'
  - Introduce linguistic features of the Podillian dialect (phonetic traits like hard
    'r').
  - 'Mention culinary specialties: Zinkivska black sausage and Podillian varenyky.'
- section: Волинь
  words: 1400
  points:
  - 'Describe the geography: ''Land of Forests and Lakes'' (Shatsky Lakes, Polissia
    forests).'
  - Examine the Lutsk Castle (Lubart's Castle) and its historical significance (1429
    Congress).
  - 'Analyze the Volyn Icon phenomenon: stylistic features (humanism, warmth) and
    the Kholm Mother of God.'
  - 'Discuss textile traditions: ''zavolikannia'' weaving technique and dominance
    of red geometric patterns.'
  - 'Connect literature to place: Lesia Ukrainka''s ''Forest Song'' and the mythology
    of the Volyn forests (mavka).'
  - 'Briefly address ''Places of Memory'': respecting historical tragedies as part
    of regional identity.'
- section: Практика — регіони України
  words: 800
  points:
  - 'Compare and contrast Podillia and Volyn: architecture (stone vs wood/brick),
    embroidery (black vs red), landscape.'
  - Analyze an excerpt from an ethnographic text describing a traditional wedding
    or holiday in one of the regions.
  - 'Creative writing task: Describe a ''Journey through Time'' to a 17th-century
    Podillian market or Volynian monastery.'
  - 'Discussion: The role of regional diversity in forming a unified Ukrainian political
    nation.'
