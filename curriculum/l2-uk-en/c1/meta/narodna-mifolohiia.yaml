slug: narodna-mifolohiia
title: Народна міфологія
word_target: 4000
content_outline:
- section: Розминка — Світ українських духів
  words: 800
  points:
  - 'Визначення міфології: відмінність від казки та легенди; міф як спосіб пізнання
    світу.'
  - 'Феномен двовір''я (синкретизму): як християнські святі замінили язичницьких богів
    (Перун -> Ілля).'
  - 'Нижча міфологія: чому віра в духів (демонологія) виявилася стійкішою за офіційний
    язичницький пантеон.'
  - Роль міфології в українському культурному коді та літературі (від Котляревського
    до фентезі).
- section: Міфологічні істоти
  words: 1400
  points:
  - 'Домашні духи (охоронці): Домовик як покровитель роду; місце його проживання (піч,
    поріг); ритуали ''годування''.'
  - 'Природні духи (господарі стихій): Лісовик (пастир звірів), Водяник (володар вод),
    Польовик.'
  - 'Жіночі міфологічні образи: Русалки та мавки (різниця в походженні); їхня небезпечна
    краса та календарний цикл (Зелені свята).'
  - 'Демонічні істоти та ''нечиста сила'': Упир, вовкулака, відьма; способи розпізнавання
    та захисту.'
  - 'Персоніфікація абстрактних понять: Доля і Недоля, Злидні; як українці намагалися
    ''домовитися'' зі своєю долею.'
- section: Міфологічні вірування
  words: 1000
  points:
  - 'Культ предків: віра в ''Дідів'', поминальні традиції, зв''язок між світом живих
    і мертвих.'
  - 'Анімізм: одухотворення природи; поняття ''нечистого місця'' та ''святого місця''.'
  - 'Магія слова та дії: функція оберегів (вишивка, вінок, лялька-мотанка); сила прокльону
    та благословення.'
  - 'Календарна міфологія: як зміна пір року відображається в боротьбі міфологічних
    сил (зима vs літо).'
- section: Практика — аналіз міфології
  words: 800
  points:
  - 'Аналіз уривка: міфологічні мотиви в ''Тінях забутих предків'' (сприйняття світу
    гуцулами).'
  - 'Кейс-стаді: порівняння української Русалки та європейської Ундини/Русалоньки.'
  - 'Написання есе: ''Чи живуть міфи у сучасному місті?'' (міські легенди та забобони).'
  - 'Дискусія: Роль міфології у збереженні національної ідентичності під час бездержавності.'
