slug: advanced-punctuation
title: Поглиблена пунктуація
word_target: 4000
content_outline:
- section: Вступ — Пунктуація як інструмент
  words: 350
  points:
  - 'Пунктуація як система навігації в тексті: відмінність від інтонації.'
  - Роль розділових знаків у науковому та офіційно-діловому стилях (точність vs емоційність).
  - 'Огляд основних функцій: розділова, видільна, змістова.'
  - Поняття пунктуаційної норми та пунктуаційної помилки.
- section: Кома в складних реченнях
  words: 850
  points:
  - 'Складносурядне речення: кома перед ''і'', ''та'' (коли ставиться, а коли — ні).'
  - Спільний другорядний член як умова відсутності коми.
  - 'Складнопідрядне речення: відокремлення підрядних частин (позиція всередині, перед,
    після головної).'
  - 'Збіг сполучників (напр., ''що... то'', ''якщо... то''): правила розставлення
    ком.'
  - 'Типові помилки: ''кома-зрощення'' та розрив логічних зв''язків.'
- section: Тире — функції та правила
  words: 650
  points:
  - 'Тире між підметом і присудком: обов''язкові та факультативні випадки.'
  - Тире в неповному реченні (еліпсис) на місці пропущеного члена.
  - Тире перед узагальнювальним словом після однорідних членів.
  - 'Інтонаційне та авторське тире: межі дозволеного в академічному тексті.'
  - 'Відмінність тире (—) від дефіса (-): технічні та граматичні аспекти.'
- section: Двокрапка і крапка з комою
  words: 600
  points:
  - 'Двокрапка перед переліком: умови вживання (узагальнювальне слово).'
  - 'Двокрапка в безсполучниковому складному реченні: причинні та пояснювальні зв''язки.'
  - 'Крапка з комою: розмежування поширених однорідних членів.'
  - Крапка з комою в складних реченнях з різнотипним зв'язком (блокова структура).
- section: Лапки та цитування
  words: 550
  points:
  - 'Типи лапок в українській типографіці: «ялинки» (зовнішні) та „лапки“ (внутрішні).'
  - 'Оформлення цитат: пряма мова, вбудовані цитати, епіграфи.'
  - Лапки для позначення іронії, умовності або незвичного вживання слова.
  - 'Назви творів, установ, брендів: що береться в лапки, а що — ні.'
- section: Дужки та інші знаки
  words: 450
  points:
  - 'Круглі дужки: вставні конструкції, пояснення, ремарки.'
  - 'Квадратні дужки: авторські вставки в цитатах, пропуски тексту [...].'
  - 'Три крапки (еліпсис): перерваність мови, недосказанність, цитування з уривками.'
  - Комбінація розділових знаків (дужка і крапка, лапки і кома).
- section: Практика редагування
  words: 550
  points:
  - Аналіз типових помилок у студентських наукових роботах.
  - Алгоритм перевірки тексту на пунктуаційну грамотність.
  - 'Стилістичне варіювання: як зміна знака змінює зміст (напр., кома vs тире).'
  - Підсумкові рекомендації для саморедагування.
