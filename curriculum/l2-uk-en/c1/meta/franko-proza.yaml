slug: franko-proza
title: 'Франко: Проза'
word_target: 4000
content_outline:
- section: 'Розминка: Франко-прозаїк'
  words: 400
  points:
  - 'Ivan Franko''s dual legacy: The poet (''Kamenyar'') vs. the prose writer (''The
    Great Realist'').'
  - 'Overview of his prose genres: historical fiction, social novels, psychological
    short stories.'
  - The concept of 'Scientific Realism' in Franko's work.
  - Brief biography context relevant to his prose (childhood in Nahuievychi, studies
    in Lviv/Vienna).
- section: 'Історичний епос: «Захар Беркут»'
  words: 800
  points:
  - 'Historical context: 1241, the Mongol invasion, and the Carpathian setting (Tukhlya).'
  - 'Genre analysis: Romantic historicism vs. realistic detail.'
  - 'Character archetypes: Zakhar (wisdom/tradition), Maksym (heroism), Myroslava
    (new woman).'
  - 'Language analysis: Use of Carpathian dialectisms (*плай*, *бесідник*) to create
    atmosphere.'
  - 'The central conflict: Community (hromada) vs. Autocracy/Betrayal.'
- section: 'Соціальний злам: «Борислав сміється»'
  words: 800
  points:
  - 'The ''Boryslav Cycle'': Industrialization and the ''Oil Fever'' in Galicia.'
  - 'Themes: Labor vs. Capital, the birth of the working class, strike dynamics.'
  - 'Character study: Benedyo Synytsia as a leader; Herman Goldkramer as a capitalist
    archetype.'
  - 'Stylistic shift: From romantic mountains to the grime of industrial realism.'
  - 'Professional lexicon: The language of oil workers (*ріпники*, *кайло*, *шхта*).'
- section: 'Мала проза: Психологія «малих людей»'
  words: 600
  points:
  - 'Focus on the ''Little Man'': Peasant life, poverty, and dignity.'
  - 'Psychological depth: Exploration of guilt, crime, and moral choices (e.g., ''Ukradene
    shchastia'' context).'
  - Childhood themes in Franko's short stories ('Malyi Myron', 'Hrytsva shkilna nauka').
  - 'Narrative techniques: Irony, internal monologue, and realistic dialogue.'
- section: 'Стилістична майстерня: Регістри та діалекти'
  words: 700
  points:
  - 'Franko''s linguistic map: Boyko/Hutsul dialects vs. Boryslav jargon.'
  - 'Analyzing narrative registers: Authorial voice vs. character voice.'
  - 'Archaisms in historical prose: Function and effect.'
  - 'Syntactic features: Complex sentences and rhetorical figures in Franko''s descriptions.'
- section: Франко-критик і теоретик
  words: 300
  points:
  - Franko's contribution to literary theory and criticism.
  - His views on the social function of literature ('Literature as a weapon').
  - Influence on subsequent generations of Ukrainian prose writers.
- section: 'Практика: Літературознавчий аналіз'
  words: 400
  points:
  - Step-by-step guide to analyzing a passage from 'Zakhar Berkut'.
  - 'Comparative analysis task: Romantic hero vs. Realistic worker.'
  - 'Essay prompts: ''The relevance of the Hromada concept today'', ''Psychology of
    the strike''.'
  - 'Stylistic editing task: Identifying and explaining dialectisms in a text sample.'
