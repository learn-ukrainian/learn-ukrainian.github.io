slug: obrazotvorche-mystetstvo-1
title: Образотворче мистецтво I
word_target: 4000
content_outline:
- section: Розминка — Від ікони до авангарду
  words: 400
  points:
  - 'Вступ до теми: мистецтво як дзеркало національної ідентичності.'
  - 'Огляд трьох ключових епох: Сакральне (Київська Русь), Реалістичне (XIX ст.),
    Модерне (XX ст.).'
  - 'Ключова лексика арт-критика: стиль, канон, техніка, композиція, перспектива.'
  - 'Активізація знань: роль Києва як вічного мистецького магніту.'
- section: Content Areas
  words: 2400
  points:
  - 'Київська школа іконопису: Візантійський канон та його гуманізація (теплі кольори,
    емоційність).'
  - Алімпій Печерський — перший іконописець. Особливості українського барокового іконопису.
  - 'Тарас Шевченко — академік гравюри: серія офортів «Живописна Україна» як історичний
    документ.'
  - 'Відмінність Шевченка-художника від Шевченка-поета: реалізм, увага до деталей,
    світлотінь.'
  - 'Український авангард — світовий феномен: відмова від міметизму, пошук нової форми.'
  - 'Казимир Малевич: київське коріння супрематизму та вплив народного мистецтва.'
  - 'Олександр Архипенко: революція в скульптурі (негативний простір, скульптуро-малярство).'
  - 'Олександра Екстер та Олександр Богомазов: ритм та колір у динаміці міста.'
- section: Практика — аналіз мистецтва
  words: 1200
  points:
  - 'Алгоритм опису ікони: зворотна перспектива, символіка кольорів, канонічні сюжети.'
  - 'Порівняльний аналіз: офорт Шевченка vs. народна картина (спільне та відмінне).'
  - 'Деконструкція авангарду: як описувати абстракцію (Чорний квадрат) — форма, ідея,
    контекст.'
  - 'Створення есе-рецензії на віртуальну виставку: використання епітетів, метафор
    та професійної лексики.'
  - 'Дискусія: внесок українців у світову скарбницю візуального мистецтва.'
