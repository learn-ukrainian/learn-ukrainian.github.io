slug: citation-reference
title: Цитація та посилання
word_target: 4000
content_outline:
- section: Вступ — Наукова чесність
  words: 500
  points:
  - Визначення академічної доброчесності та її значення для наукової спільноти України
  - 'Що таке плагіат: види (дослівний, мозаїчний, самоплагіат) та наслідки'
  - 'Етика цитування: чому ми зобов''язані вказувати авторство ідей'
  - 'Культурний контекст: діяльність НАЗЯВО та нові стандарти в українській освіті'
- section: Дієслова цитування
  words: 600
  points:
  - 'Лексичний мінімум для введення думки автора: зазначати, стверджувати, наголошувати,
    писати'
  - 'Специфічні дієслова: покликатися (на когось), відсилати (до чогось), наводити
    (дані)'
  - 'Нюанси значення: різниця між ''припускати'' та ''доводити'' (рівень впевненості)'
  - 'Стилістичні помилки: уникнення повторів та канцеляризмів'
- section: Структури посилань
  words: 600
  points:
  - 'Вступні конструкції: ''Як зазначає Х...'', ''На думку У...'', ''За словами Z...'''
  - 'Синтаксичні моделі для посилання на дослідження: ''Згідно з дослідженням...'',
    ''У праці... розглядається'''
  - 'Безособові конструкції для узагальнення: ''Вважається, що...'', ''Дослідниками
    встановлено...'''
  - 'Граматична узгодженість: відмінювання прізвищ авторів у ввідних конструкціях'
- section: Пряма та непряма цитата
  words: 600
  points:
  - 'Пряма мова в науковому тексті: пунктуація (лапки «...», двокрапка, тире)'
  - Правила скорочення цитати (трикрапка в кутових дужках <...> або просто ...)
  - 'Трансформація прямої мови в непряму: зміни займенників, часів та дієслів'
  - Коли краще цитувати, а коли — перефразувати (парафраз)
- section: Бібліографічне оформлення
  words: 600
  points:
  - 'ДСТУ 8302:2015: основні принципи та відмінності від застарілих стандартів'
  - 'Елементи бібліографічного опису: автор, назва, місто, видавництво, рік, сторінки'
  - 'Оформлення посилань у тексті: квадратні дужки [1, с. 5] vs круглі дужки (Автор,
    рік)'
  - Оформлення електронних ресурсів (DOI, URL, дата звернення)
- section: Інтеграція цитат у текст
  words: 500
  points:
  - 'Принцип ''сендвіча'': вступ до цитати → сама цитата → коментар/аналіз'
  - 'Плавність переходу: як уникнути ''клаптикового'' тексту'
  - 'Коментар до цитати: вираження власної позиції (згода, полеміка, уточнення)'
  - Уникнення надмірного цитування (цитатна хвороба)
- section: Практика цитування
  words: 600
  points:
  - 'Аналіз типових помилок: ''ссилка'', неправильні лапки, відсутність сторінок'
  - 'Редагування тексту: перетворення недбалого чернетки на академічний текст'
  - 'Робота з джерелами: як коректно записати вихідні дані книги чи статті'
  - Самоперевірка тексту на дотримання норм академічної доброчесності
