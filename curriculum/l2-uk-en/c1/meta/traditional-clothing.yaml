slug: traditional-clothing
title: Традиційний український одяг
word_target: 4000
content_outline:
- section: Розминка — Одяг як ідентичність
  words: 800
  points:
  - 'Одяг як комунікативна система: що костюм ''говорив'' про власника без слів (вік,
    статок, регіон)'
  - 'Сакральне та профанне: різниця між буденним вбранням і ''святковим строєм'''
  - 'Естетика і функція: чому традиційний одяг не мав зайвих деталей'
  - 'Сучасна рецепція: від архаїки до символу опору та національної гордості (Day
    of Vyshyvanka)'
- section: Жіночий костюм
  words: 1200
  points:
  - 'Сорочка як база: типи крою (уставкова, тунікоподібна) та семантика вишивки'
  - 'Поясний одяг: статусність плахти (святкова) проти запаски (буденна), дерга та
    спідниця'
  - 'Маркери статусу: драматична різниця головних уборів (вінок/стрічки у дівчат vs
    очіпок/намітка у жінок)'
  - 'Комплекс прикрас: коралі, дукачі, згарди як магічний оберіг та банківський рахунок
    жінки'
  - 'Регіональний контраст: порівняння стриманої графіки Полісся та барвистості Гуцульщини'
- section: Чоловічий костюм
  words: 1000
  points:
  - 'Чоловіча сорочка: відмінності крою, довжини та зони декорування (пазуха, комір)'
  - 'Міф про шаровари: вузькі штани (гачі) як основа народного строю vs козацькі шаровари'
  - 'Верхній одяг: свита, жупан, кожух — соціальна градація матеріалів'
  - 'Чоловічі головні убори: бриль (літо) та кучма (зима), шапка як знак гідності'
  - 'Пояс як оберіг: сакральне значення підперезування (розділення верху і низу, свого
    і чужого)'
- section: Практика — опис костюма
  words: 1000
  points:
  - 'Алгоритм етнографічного опису: структура аналізу (силует → матеріали → колористика
    → орнамент)'
  - 'Порівняльний аналіз: спільне та відмінне з європейськими костюмами (напр., українська
    плахта vs шотландський кілт)'
  - 'Есе: ''Ретрадиціоналізація'' — чому молоді дизайнери (Gunia, Litkovska) звертаються
    до етно'
  - 'Дискусія: Етикет носіння вишиванки сьогодні — де межа між шаною і кітчем?'
