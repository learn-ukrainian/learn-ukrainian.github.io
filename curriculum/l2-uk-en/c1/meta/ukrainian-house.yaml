slug: ukrainian-house
title: Українська хата - архітектура та побут
word_target: 4000
content_outline:
- section: Розминка — Хата як світ
  words: 600
  points:
  - 'Концепція житла: хата як мікрокосм і модель Всесвіту (три рівні: підземелля/поріг,
    земний світ, небо/сволок).'
  - 'Лінгвістичні нюанси: розмежування понять ''дім'' (емоційне), ''хата'' (етнографічне/сільське),
    ''будинок'' (архітектурне), ''оселя'' (поетичне).'
  - 'Символізм матеріалів: глина (тіло землі) та дерево (жива сутність) у будівництві.'
  - 'Регіональне розмаїття: короткий огляд відмінностей (Південь — відкритість, Карпати
    — захищеність).'
- section: Будова та елементи хати
  words: 1400
  points:
  - 'Конструктивні типи: детальний огляд ''мазанки'' (каркасна, глинобитна) та ''зрубу''
    (дерев''яна, вінцева).'
  - 'Дах (стріха): технології покриття (солома, очерет, ґонта, драниця) та їхній зв''язок
    з кліматом регіону.'
  - 'Інтер''єр та зонування: традиційне трикамерне планування (сіни — хата — комора).'
  - 'Вікна та двері: їхня роль як ''очей'' хати та захисних бар''єрів; конструкція
    віконниць та одвірків.'
  - 'Декор екстер''єру: побілка як ритуал очищення, настінний розпис, різьблення.'
- section: Символіка простору
  words: 1400
  points:
  - 'Сакральна діагональ: протиставлення та єдність Печі (жіноче начало, вогонь, північ)
    та Покуті (чоловіче начало, дух, південь).'
  - 'Піч як серце дому: багатофункціональність (готування, спання, лікування) та табу
    (заборона сваритися біля печі).'
  - 'Покуть (Святий кут): місце для ікон, божника, рушників, столу; роль у сімейних
    ритуалах (сватання, свята).'
  - 'Сволок: головна балка як охоронець душі дому, місце для сакральних написів та
    знаків.'
  - 'Поріг: межа світів, ритуали переходу, заборони (не передавати через поріг, не
    ставати на поріг).'
- section: Практика — опис житла
  words: 600
  points:
  - 'Лексичний практикум: вживання специфічних архітектурних термінів (причілок, стріха,
    сволок, одвірок) у контексті.'
  - 'Граматика простору: коректне вживання місцевого відмінка та просторових прийменників
    (на покуті, за піччю, під стріхою).'
  - 'Аналіз помилок: виправлення кальок та суржику в описах інтер''єру (відкривати
    vs відчиняти, обої vs шпалери).'
  - 'Творче завдання: детальний опис інтер''єру української хати (екфразис) на основі
    класичного живопису або літературного уривка.'
