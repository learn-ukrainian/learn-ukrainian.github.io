slug: klasychna-muzyka-3-modernizm-i-suchasnist
title: Класична музика III — Модернізм і сучасність
word_target: 4000
content_outline:
- section: 'Розминка: Українська музика XX–XXI століть'
  words: 400
  points:
  - 'Introductory dialogue: The curator welcomes guests to the ''Modernism & Contemporary''
    hall.'
  - 'Brief overview: From Late Romanticism to the Avant-Garde.'
  - 'Historical context: The impact of Soviet repression on musical evolution (Socialist
    Realism vs. Free Art).'
  - 'Global context: Ukrainian music on the world stage today.'
- section: 'Борис Лятошинський: Батько українського модернізму'
  words: 700
  points:
  - 'Biography brief: The founder of modern Ukrainian orchestral music.'
  - 'Analysis: Symphony No. 3 ''Grazhyna'' and the struggle against censorship.'
  - 'Stylistic features: Expressionism, Slavic melos, and polyphony.'
  - 'Legacy: Teacher of the ''Kyiv Avant-Garde'' (Silvestrov, Stankovych).'
- section: 'Левко Ревуцький: Симфонізм і традиція'
  words: 500
  points:
  - 'Role: Bridging the Lysenko school and 20th-century professional technique.'
  - 'Key work: Symphony No. 2 – the masterwork of Ukrainian heroic epic style.'
  - 'Pedagogy: His immense influence as a mentor to the next generation.'
  - 'Survival: Creating art within the strict confines of the Soviet canon.'
- section: 'Мирослав Скорик: Карпатський фанк і неофольклоризм'
  words: 700
  points:
  - 'Style: The unique blend of Hutsul folklore, jazz, and classical forms.'
  - 'Masterpiece: Analysis of ''Melody'' (from ''The High Pass'') – why it touches
    the soul.'
  - 'Film music: ''Shadows of Forgotten Ancestors'' and the atmospheric soundscape.'
  - 'Concept: What is ''neofolklore'' in the Ukrainian context?'
- section: 'Валентин Сильвестров: Авангард, тиша і метамузика'
  words: 700
  points:
  - 'Evolution: From radical avant-garde rebel to the composer of ''Quiet Songs''.'
  - 'Philosophy: The concept of ''Meta-music'' and the ''Coda'' of culture.'
  - 'Global fame: Ukraine''s most famous living composer in the West.'
  - 'Listening guide: How to listen to Silvestrov (patience, resonance, after-sound).'
- section: 'Євген Станкович: Фольк-опера та енергія землі'
  words: 500
  points:
  - 'Scale: Monumentalism and intense emotional power.'
  - 'Case study: ''Koly tsvite paporot'' (When the Fern Blooms) – the banned masterpiece.'
  - 'Technique: Aleatoric music and modern orchestral textures.'
  - 'Current status: A living classic.'
- section: 'Практика: Мистецтво музичної критики'
  words: 600
  points:
  - 'Listening Lab: Guided listening to a fragment of Skoryk or Silvestrov.'
  - 'Writing task: Structure of a concert review (recenzia).'
  - 'Debate: Is classical music still relevant in the age of streaming?'
  - 'Summary: The ''Gene Code'' of Ukrainian music – tragedy, lyricism, and resilience.'
