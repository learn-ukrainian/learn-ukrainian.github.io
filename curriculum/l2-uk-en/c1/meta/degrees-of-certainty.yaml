slug: degrees-of-certainty
title: 'Ступені впевненості: Модальність та хеджування'
word_target: 4000
content_outline:
- section: Розминка — Наскільки ви впевнені?
  words: 800
  points:
  - 'Концепція хеджування (hedging): інструмент ввічливості, точності та академічної
    чесності'
  - 'Суб''єктивна vs. об''єктивна модальність: різниця між ''я знаю'' (факт) та ''я
    припускаю'' (інтерпретація)'
  - 'Ризики категоричності: чому слова ''завжди'', ''ніколи'', ''всі'' є червоними
    прапорцями в науковому тексті'
  - 'Роль аналітика ризиків: професійний погляд на невизначеність та важливість точних
    формулювань'
- section: Шкала впевненості
  words: 2000
  points:
  - '100% — Абсолютна впевненість: аналіз слів ''безперечно'', ''безумовно'', ''фактично'',
    ''звісно'' (синтаксис та пунктуація)'
  - '75% — Логічний висновок: ''очевидно'', ''напевно'', ''скоріш за все'', ''має
    бути'' (коли докази переконливі, але не остаточні)'
  - '50% — Зона можливостей: ''можливо'', ''ймовірно'', ''мабуть'', ''припускаю''
    (гіпотези та теорії)'
  - '25% — Сумнів та скепсис: частка ''навряд чи'' (пунктуаційна пастка!), ''сумнівно'',
    ''важко повірити'''
  - '0% — Неможливість: ''виключено'', ''неможливо'', ''жодним чином'', ''ні в якому
    разі'' (сильне заперечення)'
  - 'Граматичний нюанс: розрізнення членів речення та вставних слів (Він може це зробити
    vs. Він, може, це зробить)'
- section: Практика — модальність у тексті
  words: 1200
  points:
  - 'Деконструкція наукового тексту: пошук маркерів впевненості та аналіз позиції
    автора'
  - 'Техніка ''Пом''якшення'' (Softening): трансформація агресивних тверджень у виважені
    гіпотези'
  - 'Градація синонімів: побудова ланцюжків від найслабшого сумніву до непохитної
    віри'
  - 'Письмове завдання: формулювання прогнозу або гіпотези з використанням повного
    спектру модальності'
