slug: c1-5-checkpoint
title: C1.5 Контрольна точка
word_target: 4000
content_outline:
- section: 'Тест — Народна культура: Код нації'
  words: 1500
  points:
  - 'Музичний фольклор як історичний літопис: жанрова специфіка дум та історичних
    пісень.'
  - 'Інститут кобзарства: соціальна роль, цехова організація та феномен ''незрячих
    провидців''.'
  - 'Візуальний код: семантика орнаментів української вишивки та регіональні особливості.'
  - 'Писанкарство: дохристиянська символіка сонця, води та життя в сучасному контексті.'
  - 'Календарно-обрядовий цикл: синкретизм християнських та язичницьких вірувань (від
    Коляди до Купала).'
- section: 'Тест — Високе мистецтво: Від бароко до модернізму'
  words: 1500
  points:
  - 'Українське бароко: архітектурні шедеври Мазепинської доби та музика Бортнянського.'
  - 'Феномен українського авангарду: Київ як центр тяжіння (Малевич, Екстер, Богомазов).'
  - 'Театральний прорив: Лесь Курбас, ''Березіль'' та естетика ''розстріляного відродження''.'
  - 'Українське поетичне кіно: візуальна мова Довженка та етнографічний сюрреалізм
    Параджанова.'
  - 'Сучасна музична класика: ''метафоричний стиль'' Валентина Сильвестрова та його
    ''Тихі пісні''.'
- section: Практика — комплексний аналіз та есе
  words: 1000
  points:
  - 'Структура аналітичного есе: теза, антитеза, синтез та аргументація рівня C1.'
  - 'Засоби текстового зв''язку: використання конекторів (натомість, втім, передусім,
    з одного боку).'
  - 'Порівняльний аналіз: спільні та відмінні риси народної думи та оперної арії.'
  - 'Кейс-стаді: аналіз культурного феномену (на прикладі ''Щедрика'' Леонтовича).'
  - 'Рефлексія: роль мистецтва у збереженні національної ідентичності в умовах глобалізації.'
