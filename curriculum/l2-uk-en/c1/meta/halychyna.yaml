slug: halychyna
title: Галичина
word_target: 4000
content_outline:
- section: Розминка — Західна Україна
  words: 800
  points:
  - 'Галичина як унікальний історико-географічний феномен: чіткі межі (Львівська,
    Івано-Франківська, Тернопільська області) та ментальна мапа.'
  - 'Відмінність Галичини від сусідніх регіонів: Волині, Закарпаття та Буковини (історичні
    та культурні нюанси).'
  - 'Концепт «Бабця Австрія»: вплив династії Габсбургів на архітектурне обличчя міст,
    бюрократичну культуру та побутові звички.'
  - Греко-Католицька Церква (УГКЦ) як фундамент національної ідентичності та відмінність
    від православ'я Наддніпрянщини.
- section: Культурні особливості
  words: 1400
  points:
  - 'Мовний ландшафт: феномен «галицької ґвари», найпоширеніші полонізми та германізми
    (філіжанка, коліжанка, райтшток, спацер).'
  - 'Сакральний час: особливості релігійного календаря, святкування Різдва (вертеп,
    дідух, пампухи) та Великодня (гаївки, обливаний понеділок).'
  - 'Мистецтво Карпат: унікальність гуцульської кераміки (Косів), дерев''яного різьблення
    та сакральної архітектури (церкви спадщини ЮНЕСКО).'
  - 'Галицька гастрономія: культ домашньої випічки (пляцки, штруделі, андрути) та
    ритуал споживання кави як інструмент соціальної комунікації.'
- section: Історична пам'ять
  words: 1000
  points:
  - 'Міф про «Український П''ємонт»: роль Галичини як центру національного відродження
    у XIX столітті («Руська трійця», «Просвіта»).'
  - 'Листопадовий чин 1918 року та ЗУНР: досвід власної державності, Українська Галицька
    Армія та акт Злуки.'
  - 'Трагічні сторінки XX століття: діяльність ОУН-УПА, радянські репресії, операція
    «Вісла» та зміна етнічного складу міст.'
  - 'Сучасна ідентичність: поєднання глибокого патріотизму, релігійного консерватизму
    та орієнтації на європейські цінності.'
- section: Практика — регіональна культура
  words: 800
  points:
  - 'Аналітичне порівняння: ментальні та культурні відмінності між Галичиною та Великою
    Україною (стереотипи vs реальність).'
  - 'Опис архітектури: використання специфічної лексики для опису площі Ринок або
    дерев''яної церкви (неф, іконостас, бруківка, кам''яниця).'
  - 'Есе-роздум: аналіз ролі Львова як культурної столиці та його впливу на сучасну
    українську культуру.'
  - 'Рольова гра: діалог у львівській кав''ярні з використанням вивченої регіональної
    лексики (замовлення, обговорення новин).'
