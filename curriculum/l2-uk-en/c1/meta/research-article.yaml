slug: research-article
title: Жанр — Наукова стаття
word_target: 4000
content_outline:
- section: Вступ — Що таке наукова стаття?
  words: 500
  points:
  - Визначення наукової статті як основного жанру наукової комунікації
  - Відмінність статті від есе, тези та монографії
  - 'Типологія статей: оригінальне дослідження (original research), оглядова стаття
    (review), кейс-стаді'
  - Поняття 'фахового видання' в Україні (категорії А та Б)
- section: Структура IMRaD
  words: 800
  points:
  - 'Розшифровка абревіатури IMRaD: Introduction, Methods, Results, Discussion'
  - 'Вступ (Introduction): постановка проблеми, аналіз останніх досліджень, мета статті'
  - 'Методи (Methods): опис інструментарію та процедури (відтворюваність результатів)'
  - 'Результати (Results): об’єктивний виклад отриманих даних (без інтерпретації)'
  - 'Обговорення (Discussion): інтерпретація результатів, порівняння з іншими дослідженнями,
    обмеження'
- section: Назва та ключові слова
  words: 400
  points:
  - 'Вимоги до назви: інформативність, лаконічність, відсутність загальних фраз'
  - Функція ключових слів (keywords) для індексації та пошуку
  - Типові помилки при виборі ключових слів (занадто широкі або вузькі поняття)
  - 'Стратегії SEO для науковців: як зробити статтю видимою'
- section: Анотація (Abstract)
  words: 600
  points:
  - 'Анотація як ''вітрина'' статті: структура та обсяг (зазвичай 150-250 слів)'
  - 'Чотири обов''язкові елементи: мета, методи, результати, висновки'
  - Мовні кліше для анотації ('У статті розглядається...', 'Метою роботи є...')
  - Відмінність структурованої та неструктурованої анотації
- section: Висновки та література
  words: 600
  points:
  - 'Висновки (Conclusions): відповідність поставленій меті та перспективи подальших
    розвідок'
  - Академічна доброчесність та важливість коректного цитування
  - 'Оформлення списку літератури: ДСТУ 8302:2015 vs міжнародні стилі (APA, MLA)'
  - Поняття індексу цитування та імпакт-фактора
- section: Мова наукової статті
  words: 700
  points:
  - 'Стилістичні особливості: об''єктивність, точність, логічність, безособовість'
  - 'Безособові конструкції: ''встановлено'', ''досліджено'', ''проаналізовано'''
  - Пасивні конструкції та їх доречність у науковому стилі
  - 'Засоби текстового зв''язку (linkers): ''отже'', ''натомість'', ''зокрема'', ''по-перше'''
  - Уникнення емоційної лексики та розмовних зворотів
- section: Практика аналізу статей
  words: 400
  points:
  - Критерії оцінювання якості наукової статті
  - Як відрізнити якісне дослідження від 'сміттєвої' публікації (predatory journals)
  - Чек-ліст для самоперевірки власної статті перед поданням
  - Аналіз типових помилок початківців на конкретних прикладах
