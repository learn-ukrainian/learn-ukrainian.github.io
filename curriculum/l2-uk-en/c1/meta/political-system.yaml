slug: political-system
title: Політична система України
word_target: 4000
content_outline:
- section: Вступ — Конституційний устрій
  words: 500
  points:
  - 'Конституція України 1996 року як основний закон: структура, значення, ''Конституційна
    ніч''.'
  - Україна як суверенна і незалежна, демократична, соціальна, правова держава (стаття
    1).
  - 'Форма правління: парламентсько-президентська республіка (розподіл повноважень).'
  - 'Територіальний устрій: унітарна держава, області, АР Крим, міста зі спеціальним
    статусом.'
- section: Президент України
  words: 600
  points:
  - 'Статус Президента: глава держави, гарант державного суверенітету та Конституції.'
  - 'Ключові повноваження: національна безпека, оборона (Верховний Головнокомандувач),
    зовнішня політика.'
  - 'Процедура виборів: прямі, таємні, строком на 5 років, обмеження двох термінів.'
  - 'Взаємодія з іншими гілками влади: право вето, призначення суддів та генпрокурора
    (за згодою ВР).'
- section: Верховна Рада
  words: 600
  points:
  - 'Єдиний орган законодавчої влади: структура, кількість депутатів (450), складання
    присяги.'
  - 'Законодавчий процес: законодавча ініціатива, читання (перше, друге), ухвалення,
    підписання.'
  - Парламентські фракції та групи, поняття 'коаліція депутатських фракцій'.
  - 'Функції контролю: парламентські слухання, запити, ''година запитань до Уряду''.'
- section: Кабінет Міністрів
  words: 500
  points:
  - 'Вищий орган у системі органів виконавчої влади: відповідальність перед Президентом
    і ВР.'
  - 'Процедура формування уряду: роль коаліції, подання Прем''єр-міністра.'
  - 'Структура виконавчої влади: міністерства, служби, агентства, інспекції.'
  - 'Реалізація державної політики: бюджетний процес, державні програми.'
- section: Судова система
  words: 600
  points:
  - 'Принципи правосуддя: верховенство права, незалежність суддів.'
  - 'Конституційний Суд України: перевірка законів на конституційність, тлумачення
    Конституції.'
  - 'Система судоустрою: місцеві суди, апеляційні суди, Верховний Суд як найвища інстанція.'
  - 'Судова реформа: Вища рада правосуддя, кваліфікаційне оцінювання суддів, антикорупційний
    суд.'
- section: Місцеве самоврядування
  words: 600
  points:
  - 'Суть реформи децентралізації: передача повноважень і фінансів на місця.'
  - 'Територіальна громада як базова одиниця: права та можливості.'
  - 'Органи місцевого самоврядування: сільські, селищні, міські ради та їх голови.'
  - Місцеві вибори та їх значення для розвитку регіонів.
- section: Практичне завдання
  words: 600
  points:
  - 'Аналіз політичних новин: розбір актуальної статті про законодавчу ініціативу
    (лексичний аналіз).'
  - 'Дискусія: переваги та недоліки парламентсько-президентської моделі для України.'
  - 'Порівняльний аналіз: повноваження гілок влади в Україні та країні вивчення мови
    (якщо застосовно) або іншій європейській країні.'
  - Написання есе-роздуму на тему 'Роль громадянського суспільства в політичній системі'.
