slug: kozatski-lehendy
title: Козацькі легенди
word_target: 4000
content_outline:
- section: 'Розминка: Козаки в народній уяві'
  words: 800
  points:
  - 'Козацтво як міф: чому народ наділив воїнів магічними рисами (психологія захисника)'
  - 'Поняття ''народна етимологія'': як легенди пояснюють незрозуміле'
  - Роль козацького міфу у формуванні української ідентичності (козак як архетип Волі)
- section: Героїчні легенди
  words: 1400
  points:
  - 'Байда Вишневецький: аналіз пісні-хроніки та мотиву стоїцизму'
  - 'Козак Мамай: дешифрування символів народної картини (кобза, кінь, дуб, чарка)'
  - 'Характерники: українські ніндзя чи шамани? (вміння: гіпноз, ''мана'', невразливість)'
  - 'Іван Сірко: легенди про народження з зубами та посмертну силу його руки'
- section: Топонімічні легенди
  words: 1000
  points:
  - 'Сакральна географія Січі: Хортиця як місце сили'
  - 'Легенди про скарби: золото Полуботка та закляті могили (мотив охорони скарбу)'
  - 'Походження назв: Умань (гумань?), Батурин, Чигирин (народні версії проти наукових)'
  - 'Річки та урочища: легенди про Савур-Могилу та Дніпровські пороги'
- section: 'Практика: Аналіз легенд'
  words: 800
  points:
  - 'Деконструкція тексту: виокремлення історичного ядра та фольклорного нашарування'
  - Аналіз образу характерника крізь призму сучасної психології (сугестія)
  - 'Есе-роздум: ''Чому сучасна поп-культура (фільми, комікси) повертається до образу
    характерника?'''
  - 'Дискусія: Функція легенди в умовах бездержавності (збереження історичної пам''яті)'
