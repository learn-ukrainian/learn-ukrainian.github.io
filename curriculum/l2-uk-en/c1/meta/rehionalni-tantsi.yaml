slug: rehionalni-tantsi
title: 'Регіональні танці: Від Аркана до Коломийки'
word_target: 4000
content_outline:
- section: Розминка — Танцювальна карта України
  words: 600
  points:
  - 'Вступ до етнографічного районування України через призму хореографії: танець
    як відображення ландшафту.'
  - 'Характеристика основних танцювальних регіонів: Західний (Карпати), Центральний
    (Наддніпрянщина), Східний (Слобожанщина) та Південний (Степ).'
  - 'Аналіз впливу географії на стиль: чому горяни танцюють у колі (замкненість долин),
    а степовики — широко і розмашисто.'
  - 'Короткий огляд історичних передумов: вплив сусідніх культур та історичних подій
    на формування регіональних стилів.'
- section: Танці Західної України
  words: 1400
  points:
  - 'Аркан як феномен гуцульської культури: ритуальне значення, символіка сонячного
    кола та чоловічого братерства.'
  - 'Обряд ініціації (посвячення у легіні): випробування витривалості та ролі бартки
    в танці.'
  - 'Коломийка: синкретизм танцю та пісні, структура «дві строфи (14 складів) — шалений
    темп».'
  - 'Бойківські та лемківські танці: специфіка рухів (більш земні, важкі кроки) та
    відмінності від «повітряних» гуцульських.'
  - 'Музичний супровід: роль трембіти, цимбалів, дримби та скрипки у створенні унікального
    ритмічного малюнка Карпат.'
- section: Танці інших регіонів
  words: 1200
  points:
  - 'Танці Центральної України (Полтавщина): ліричність, плавність рухів, значна роль
    жіночої партії.'
  - 'Гопак як візитівка Наддніпрянщини: еволюція від бойового мистецтва козаків до
    сценічного віртуозного танцю.'
  - 'Танці Поділля: особлива жвавість, гумор, сюжетність та вплив молдавських традицій.'
  - 'Степові танці Півдня: широта рухів, імітація вершників, вплив козацької вольниці
    та взаємодія з кримськотатарською культурою (Хайтарма).'
- section: Практика — порівняльний аналіз
  words: 800
  points:
  - 'Порівняльна характеристика Аркана та Гопака: спільне (чоловіче начало, змагальність)
    та відмінне (ритуал/містика vs імпровізація/шоу).'
  - 'Завдання на опис регіонального танцю за відеофрагментом: використання професійної
    етнографічної лексики (па, фігура, коліно).'
  - 'Дискусія: проблеми збереження автентичної танцювальної спадщини в умовах глобалізації
    та кітчу.'
  - Написання есе на тему «Танець як маркер етнічної ідентичності» з використанням
    порівняльних конструкцій та стилістичних фігур.
