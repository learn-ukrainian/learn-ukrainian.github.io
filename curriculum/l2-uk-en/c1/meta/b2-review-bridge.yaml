slug: b2-review-bridge
title: Огляд B2 та міст до C1
word_target: 4000
content_outline:
- section: Вступ — Від B2 до C1
  words: 400
  points:
  - 'Ключова відмінність C1: перехід від накопичення слів до усвідомленого вибору
    регістру (appropriateness).'
  - 'Огляд компетенцій C1 згідно з Держстандартом §4.4.1.1: систематизація знань про
    п''ять функціональних стилів.'
  - 'Структура академічного модуля: як працювати з матеріалом рівня C1 (аналіз, синтез,
    критичне мислення).'
  - 'Поняття «мовного детективу»: увага до нюансів, які змінюють зміст повідомлення.'
- section: Пасивний стан — повна система
  words: 700
  points:
  - 'Чотири форми пасивного стану: предикативні форми на -но/-то, пасивні дієприкметники,
    зворотні дієслова.'
  - 'Типові помилки: вживання частки «-ся» з агентом дії (чому «Книга читається студентом»
    — це помилка).'
  - 'Історична довідка: як у 1930-х роках штучно наближали український синтаксис до
    російського зразка (нав''язування пасиву).'
  - 'Культурний аспект: деколонізація синтаксису та повернення до активних конструкцій
    (Agency Pass) як вияв української ментальності.'
  - 'Безособові конструкції на -но/-то: коли «було зроблено» є виправданим, а коли
    — канцеляризмом.'
- section: Дієприкметники — активні та пасивні
  words: 700
  points:
  - 'Активні та пасивні дієприкметники: розрізнення та функція в тексті.'
  - 'Боротьба з кальками: чому слід уникати суфіксів -уч/-юч («бажаючі» → «охочі»,
    «подорожуючі» → «подорожні»).'
  - Пасивні дієприкметники з суфіксами -ний/-тий як фундамент наукового стилю.
  - 'Культурний аспект: роль Наукового товариства імені Шевченка у формуванні української
    наукової термінології.'
  - 'Дієприкметниковий зворот в академічному письмі: правила пунктуації та стилістична
    роль.'
- section: Складнопідрядні речення
  words: 600
  points:
  - 'Вимоги Держстандарту §4.3.4.1: складне сполучникове речення як інструмент вираження
    складної думки.'
  - 'Типи підрядних частин: означальні (який?), з''ясувальні (що?), обставинні (коли?
    де? чому?).'
  - 'Пунктуація у багатокомпонентних реченнях: логіка коми та інтонаційне оформлення.'
  - Засоби зв'язку частин речення для побудови логічної аргументації в есе.
- section: П'ять функціональних стилів
  words: 800
  points:
  - 'Огляд системи стилів: науковий, офіційно-діловий, публіцистичний, художній, розмовний.'
  - 'Детальний аналіз наукового стилю: об''єктивність, точність, термінологічність
    (основа C1).'
  - 'Офіційно-діловий стиль: стандартизація, кліше, беземоційність.'
  - Проблема змішування стилів (stylistic mismatch) як ознака недостатньої мовної
    компетенції.
  - Практичні приклади трансформації однієї думки через призму різних стилів.
- section: Фразеологія в контексті
  words: 500
  points:
  - 'Роль фразеології на рівні C1: перехід від пасивного розуміння до активного стилістичного
    інструменту.'
  - 'Прислів''я та приказки: аналіз доречності вживання в різних регістрах.'
  - Ідіоми та сталі вирази як маркери природності мовлення.
  - 'Емоційне забарвлення фразеологізмів: як не зіпсувати серйозний текст недоречним
    виразом.'
- section: Підсумок і шлях уперед
  words: 300
  points:
  - 'Чек-ліст готовності до C1: самооцінка знань (пасив, стилі, синтаксис, фразеологія).'
  - 'Огляд структури рівня C1 (106 модулів): що чекає далі (професійна комунікація,
    стилістика, література).'
  - 'Заклик до свідомого навчання: мова як інструмент впливу, кар''єри та ідентичності.'
  - 'Фінальна мотивація: C1 як рівень професійної свободи та інтелектуальної незалежності.'
