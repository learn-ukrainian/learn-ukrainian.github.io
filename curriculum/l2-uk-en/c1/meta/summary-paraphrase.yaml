slug: summary-paraphrase
title: Резюме та парафраз
word_target: 4000
content_outline:
- section: Вступ — Мистецтво переказу
  words: 500
  points:
  - Definition of summary (резюме/анотація) and paraphrase (парафраз/переказ) in academic
    context.
  - The role of retelling in Ukrainian educational tradition (стислий vs. детальний
    переказ).
  - 'Why paraphrasing is a core C1 skill: demonstrating understanding vs. parroting.'
  - 'Ethical dimension: intellectual property and academic integrity basics.'
- section: Техніки резюмування
  words: 700
  points:
  - 'Algorithm for summarizing: Read -> Analyze -> Select -> Synthesize.'
  - Distinguishing 'головне' (core) from 'другорядне' (secondary) information.
  - 'Strategies for omission: removing examples, details, and redundancies.'
  - 'Generalization techniques: replacing lists with category names (hyponyms -> hypernyms).'
  - 'Objectivity check: removing subjective bias in summaries.'
- section: Техніки парафразування
  words: 700
  points:
  - 'Lexical transformation: using synonyms and antonyms (contextual appropriateness).'
  - 'Syntactic transformation: Active <-> Passive voice, changing word order.'
  - 'Morphological transformation: Nominalization (verb -> noun) and verbalization.'
  - 'Combined approach: changing both structure and vocabulary (Deep Paraphrase).'
  - 'The ''Look away'' technique: reading the original, closing it, and writing from
    memory.'
- section: Маркери парафразу
  words: 600
  points:
  - 'Introductory phrases: ''Інакше кажучи'', ''Іншими словами'', ''Тобто'', ''А саме''.'
  - 'Reporting verbs for attributing ideas: ''автор стверджує'', ''дослідник наголошує'',
    ''зазначається''.'
  - 'Distancing markers: ''на думку автора'', ''за словами...''.'
  - 'Connecting paraphrased ideas: ''разом з тим'', ''водночас'', ''натомість''.'
- section: Резюме vs цитата vs парафраз
  words: 600
  points:
  - 'Comparative table: When to use which method.'
  - 'The value of direct quotes: accuracy, authority, stylistic impact.'
  - 'The dominance of paraphrase: flow, synthesis, voice control.'
  - Balancing the three elements in an academic text (the 'sandwich' method).
  - Integrating short quotes into paraphrased sentences.
- section: Плагіат та його уникнення
  words: 500
  points:
  - Defining plagiarism in the Ukrainian context (академічний плагіат).
  - 'The spectrum of plagiarism: from copy-paste to ''patchwriting''.'
  - 'Criteria for a successful paraphrase: sufficient distance from original.'
  - 'Self-check questions: Is the meaning preserved? Is the wording unique?'
  - Overview of tools/practices for verifying originality.
- section: Практика переказу
  words: 400
  points:
  - Step-by-step analysis of a 'bad' vs. 'good' paraphrase example.
  - 'Summarizing a complex academic paragraph: before and after.'
  - Checklist for evaluating one's own summary.
  - Transition to practice activities.
