slug: hedging-modality
title: Хеджінг та модальність
word_target: 4000
content_outline:
- section: Вступ — Навіщо пом'якшувати?
  words: 400
  points:
  - Визначення хеджінгу в контексті українського академічного дискурсу.
  - Різниця між невпевненістю (слабкість) та обережністю (наукова етика).
  - Вплив категоричності на сприйняття аргументів читачем.
  - 'Культурний аспект: ''Ми-авторське'' та традиція ввічливості.'
- section: Модальні дієслова
  words: 600
  points:
  - 'Градація дієслів за ступенем обов''язковості: мусити vs мати vs повинні.'
  - Використання умовного способу (міг би, хотілося б) для пом'якшення тверджень.
  - 'Безособові форми: видається, здається, виявляється.'
  - 'Таблиця: категоричні vs хеджінгові форми дієслів.'
- section: Прислівники невизначеності
  words: 600
  points:
  - 'Ключові прислівники: можливо, ймовірно, мабуть, очевидно.'
  - 'Стилістичні нюанси: ''напевно'' (впевненість чи припущення?) vs ''певно''.'
  - 'Обмежувальні прислівники: частково, почасти, певною мірою.'
  - Позиція прислівника в реченні та вплив на логічний наголос.
- section: Фразові конструкції хеджінгу
  words: 600
  points:
  - 'Вставні конструкції: ''на нашу думку'', ''як видається'', ''за нашими спостереженнями''.'
  - 'Пасивні та безособові конструкції: ''можна припустити'', ''не виключено, що''.'
  - 'Посилання на невизначене джерело: ''існує думка'', ''деякі дослідники вважають''.'
  - Шаблони для формулювання гіпотез.
- section: Шкала впевненості
  words: 500
  points:
  - 'Візуалізація спектру: від 0% (неможливо) до 100% (безперечно).'
  - 'Групування лексики за рівнями: висока (безсумнівно), середня (ймовірно), низька
    (сумнівно).'
  - Як обрати правильний рівень впевненості відповідно до сили доказів.
  - Практичний розбір прикладів із різним рівнем епістемічної модальності.
- section: Контексти використання
  words: 700
  points:
  - 'Формулювання наукової гіпотези: баланс сміливості та обережності.'
  - 'Інтерпретація статистичних даних: уникнення помилки ''correlation implies causation''.'
  - 'Висновки та рекомендації: як пропонувати рішення, не нав''язуючи їх.'
  - 'Критика чужих робіт: ввічлива незгода (''можна посперечатися'', ''викликає сумнів'').'
- section: Практика модуляції тону
  words: 600
  points:
  - Алгоритм перетворення категоричного тексту на академічний.
  - 'Аналіз ''до'' і ''після'': розбір відредагованих уривків.'
  - 'Типові пастки: надмірний хеджінг (вода) vs відсутність хеджінгу (агресія).'
  - 'Підсумковий чекліст: чи звучить ваш текст професійно?'
