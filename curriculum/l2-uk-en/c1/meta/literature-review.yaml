slug: literature-review
title: Жанр — Огляд літератури
word_target: 4000
content_outline:
- section: Вступ — Що таке огляд літератури?
  words: 400
  points:
  - Визначення огляду літератури як критичного аналізу наявних джерел, а не простого
    переліку.
  - 'Функції огляду: контекстуалізація, виявлення прогалин, уникнення дублювання.'
  - Місце огляду в структурі наукової роботи (дисертації, статті) та як самостійного
    жанру.
  - 'Ключова відмінність від анотованої бібліографії: синтез проти опису.'
- section: Пошук і відбір джерел
  words: 500
  points:
  - 'Стратегії ефективного пошуку: ключові слова, бази даних, ланцюговий пошук.'
  - 'Критерії відбору: актуальність, авторитетність, релевантність темі.'
  - 'Ієрархія джерел: первинні vs вторинні, рецензовані статті vs науково-популярні
    видання.'
  - 'Оцінка якості джерела: перевірка методології та об''єктивності автора.'
- section: Синтез джерел
  words: 700
  points:
  - 'Підходи до структурування огляду: тематичний (за концепціями), хронологічний
    (розвиток ідеї), методологічний.'
  - 'Техніка ''матриці синтезу'': групування джерел за спільними ідеями, а не за авторами.'
  - 'Побудова ''наукової бесіди'': як змусити джерела ''говорити'' одне з одним.'
  - Виявлення спільних тенденцій та розбіжностей у поглядах дослідників.
- section: Мова синтезу
  words: 700
  points:
  - 'Дієслова для введення думки автора: стверджувати, наголошувати, припускати, заперечувати,
    аналізувати.'
  - 'Фрази для вираження згоди/консенсусу: ''Дослідники сходяться на думці'', ''Загальновизнаним
    є факт''.'
  - 'Фрази для протиставлення: ''На відміну від X, Y вважає'', ''Водночас'', ''Проте
    інші дані свідчать про''.'
  - Граматичні конструкції для дистанціювання та об'єктивності (безособові речення,
    пасивні конструкції).
- section: Виявлення прогалин
  words: 500
  points:
  - Поняття 'наукової прогалини' (research gap) та її типи (методологічна, емпірична,
    теоретична).
  - 'Мовні засоби для опису прогалин: ''малодослідженим залишається'', ''потребує
    подальшого вивчення''.'
  - Виявлення суперечностей як точки росту для нового дослідження.
  - Логічний перехід від огляду до обґрунтування власної теми.
- section: Критична оцінка джерел
  words: 600
  points:
  - Аналіз сильних та слабких сторін досліджень, а не лише їхніх висновків.
  - Виявлення методологічних обмежень (вибірка, інструментарій).
  - 'Оцінка актуальності: чи не застаріли дані?'
  - 'Уникнення упередженості (bias) в оцінці: об''єктивний тон критики.'
- section: Практика огляду
  words: 600
  points:
  - 'Алгоритм написання міні-огляду: від добірки 3-5 джерел до зв''язного тексту.'
  - Типові помилки початківців та як їх уникнути (checklist).
  - Приклад трансформації опису в синтез (Before/After).
  - Взаємне рецензування (peer review) як інструмент покращення тексту.
