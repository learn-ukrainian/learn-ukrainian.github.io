slug: wedding-rituals
title: Родинні обряди - весілля
word_target: 4000
content_outline:
- section: Розминка — Весілля як перехід
  words: 800
  points:
  - 'Концепція ''обряду переходу'' (rite of passage): весілля як сакральна межа між
    юністю та дорослим життям, зміна соціального статусу.'
  - 'Триадина структура традиційного українського весілля: передвесільний, весільний
    та післявесільний цикли.'
  - 'Термінологічна точність: розмежування понять ''весілля'' (святкування), ''шлюб''
    (союз), ''вінчання'' (таїнство), ''подружжя'' (пара).'
  - 'Сакральний вимір шлюбу в українському світогляді: поєднання не лише двох людей,
    а двох родів (рід як основа соціуму).'
- section: 'Передвесільні обряди: від вибору до згоди'
  words: 1100
  points:
  - 'Інститут сватання: ритуалізований діалог, роль старостів, символіка хліба (обмін
    хлібом) та семіотика згоди/відмови (рушники vs гарбуз).'
  - 'Заручини як юридичний та публічний акт: остаточне скріплення угоди, обмін перснями
    та подарунками, неможливість відмови без безчестя.'
  - 'Прощання з дошлюбним життям: Дівич-вечір (символіка розплітання коси, виготовлення
    гільця) та Парубоцький вечір.'
  - 'Бгання короваю: сакральне дійство випікання, вимоги до ''коровайниць'' (щаслива
    доля), символічне оздоблення (сонце, місяць, птахи) та пісенний супровід.'
- section: 'Весільні обряди: кульмінація свята'
  words: 1100
  points:
  - 'Обряд ''Посад'': благословення батьків, сидіння на вивернутому кожусі як магічний
    символ багатства та плодючості.'
  - 'Вінчання (церковний шлюб): ключові елементи та їх символіка (покладання корон,
    обходження аналою, спільна чаша, рушник під ногами).'
  - 'Весільний поїзд та ігрова культура: переймання дороги, ''ворота'', символічний
    викуп нареченої (торг між родами).'
  - 'Обряд покривання: кульмінаційний момент зміни статусу (зміна вінка на хустку/намітку),
    драматизм прощання з дівоцтвом.'
  - 'Розподіл короваю та дарування: структура роду через порядок отримання частин
    короваю, ''підошва'' для музик.'
- section: Практика — весільна обрядовість та етикет
  words: 1000
  points:
  - 'Граматика побажань: структура весільного тосту з використанням умовного способу
    (конструкції ''якби'', ''щоб'', побажання неможливого як гіпербола).'
  - 'Порівняльний аналіз: паралелі та відмінності між традиційним українським весіллям
    та сучасними ''європейськими'' трендами (збереження vs втрата елементів).'
  - 'Комунікативна практика: складання діалогу про весільні забобони та прикмети (що
    віщує щастя/нещастя), аналіз їхнього логічного походження.'
  - 'Лінгвістичний аналіз: інтерпретація символіки та метафор у весільних піснях (на
    прикладі 1-2 автентичних текстів).'
