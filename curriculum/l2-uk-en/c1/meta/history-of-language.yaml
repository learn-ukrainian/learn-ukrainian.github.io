slug: history-of-language
title: 'Історія мови: Від Русі до сьогодення'
word_target: 4000
content_outline:
- section: 'Вступ: Давньоруська спадщина та міфи'
  words: 500
  points:
  - 'Концепція праслов''янської єдності та її розпад: формування східнослов''янської
    підгрупи.'
  - Давньоруська мова як спільний предок чи сукупність діалектів? (Погляд Ю. Шевельова
    та Агатангела Кримського).
  - 'Риси української мови в графіті Софії Київської (XI ст.): доказ давності розмовного
    мовлення.'
- section: Середньоукраїнська доба (XIV–XVIII ст.)
  words: 600
  points:
  - 'Староукраїнська мова (руська мова) у Великому князівстві Литовському: статус
    державної.'
  - 'Феномен двомовності: церковнослов''янська (високий стиль) vs «проста мова» (діловодство,
    література).'
  - 'Пересопницьке Євангеліє та полемічна література: початок синтезу книжної та народної
    мов.'
- section: Імперські заборони та мовний спротив
  words: 650
  points:
  - 'Мовна політика Російської імперії: концепція «наречія».'
  - 'Валуєвський циркуляр (1863): «не було, немає і бути не може» — заборона духовної
    та навчальної літератури.'
  - 'Емський указ (1876): тотальна заборона друку, театру та нотних текстів українською.'
  - 'Наслідки: переміщення видавничих центрів у Галичину (Австро-Угорщина).'
- section: Народження нової літературної мови
  words: 600
  points:
  - 'Іван Котляревський та «Енеїда» (1798): легітимізація живого народного слова в
    літературі.'
  - 'Тарас Шевченко: синтез діалектів та створення наддіалектного стандарту.'
  - 'Пантелеймон Куліш та «кулішівка»: перші спроби правописної кодифікації.'
- section: 'ХХ століття: Між розквітом та лінгвоцидом'
  words: 700
  points:
  - 'Період «Українізації» (1920-ті): Скрипниківка, розвиток термінології, державний
    статус.'
  - 'Репресії 1930-х та Розстріляне відродження: фізичне знищення носіїв та штучне
    зближення з російською.'
  - 'Радянська політика русифікації (1960–80-ті): витіснення мови з освіти та науки,
    концепція «гармонійного двомовлення».'
- section: 'Сучасний етап: Відродження та державність'
  words: 550
  points:
  - Статус державної мови в Конституції (1996) та Закон про мову (2019).
  - 'Подолання постколоніальної травми: перехід на українську в побуті та професійній
    сфері.'
  - 'Вплив війни на мовну свідомість: мова як кордон та інструмент безпеки.'
- section: 'Практикум: Аналіз історичних джерел'
  words: 400
  points:
  - Порівняльний аналіз уривка з «Енеїди» та сучасного тексту.
  - 'Робота з термінологією: ідентифікація історизмів та архаїзмів у публіцистиці.'
  - 'Дискусія: роль мови у формуванні модерної політичної нації.'
