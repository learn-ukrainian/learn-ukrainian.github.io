slug: job-interview
title: 'Співбесіда: стратегії успіху'
word_target: 4000
content_outline:
- section: Вступ — Підготовка до співбесіди
  words: 600
  points:
  - 'Стратегії дослідження компанії: джерела інформації, аналіз цінностей та місії'
  - 'Підготовка пакету документів: що взяти з собою (портфоліо, рекомендації)'
  - 'Психологічне налаштування: техніки подолання хвилювання та візуалізація успіху'
  - 'Типові формати співбесід в Україні: телефонна, відеозустріч, очна зустріч'
- section: Типові запитання співбесіди
  words: 800
  points:
  - 'Самопрезентація: формула ідеальної відповіді на ''Розкажіть про себе'''
  - 'Мотивація: аргументація бажання працювати саме в цій компанії'
  - 'Аналіз сильних та слабких сторін: як перетворити недоліки на зони розвитку'
  - 'Кар''єрне бачення: відповідь на питання ''Ким ви бачите себе через 5 років?''
    без кліше'
- section: Метод STAR
  words: 800
  points:
  - 'Розшифровка абревіатури STAR: Situation, Task, Action, Result'
  - Детальний розбір компонента Situation (Ситуація) та Task (Завдання)
  - 'Опис Action (Дія): акцент на особистому внеску кандидата'
  - 'Формулювання Result (Результат): кількісні показники та висновки'
  - Приклад повної відповіді за методом STAR українською мовою
- section: Переговори про умови
  words: 600
  points:
  - 'Етикет обговорення заробітної плати: коли і як називати суму'
  - Узгодження робочого графіку та формату роботи (дистанційно/офіс)
  - Обговорення соціального пакету та додаткових пільг (страхування, навчання)
  - 'Юридичні аспекти: випробувальний термін та оформлення договору'
- section: Складні запитання
  words: 600
  points:
  - 'Пояснення причин звільнення з попереднього місця роботи: дипломатичні формулювання'
  - 'Поведінкові питання про конфлікти: конструктивний опис вирішення проблем'
  - 'Питання про прогалини в резюме (gaps): чесні та професійні пояснення'
  - 'Стрес-інтерв''ю: як реагувати на провокаційні запитання'
- section: Невербальна комунікація
  words: 400
  points:
  - Важливість зорового контакту та відкритої пози під час розмови
  - 'Жестикуляція: помірність та відповідність контексту'
  - 'Дрес-код: вибір одягу відповідно до корпоративної культури компанії'
  - 'Голос та інтонація: впевненість без агресії'
- section: Практичне завдання
  words: 200
  points:
  - 'Аналіз модельної симуляції співбесіди: розбір помилок та вдалих моментів'
  - Алгоритм адаптації відповіді під різні типи вакансій
  - Чек-лист готовності до співбесіди
