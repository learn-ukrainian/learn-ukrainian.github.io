slug: c1-6-checkpoint
title: 'C1.6 Контрольна точка: Літературний канон'
word_target: 4000
content_outline:
- section: Тест — Літературна історія
  words: 1300
  points:
  - 'Огляд ключових епох: від бароко до постмодернізму (хронологія та маркери)'
  - 'Романтизм vs Реалізм: порівняльна характеристика світогляду (Шевченко vs Франко)'
  - 'Український модернізм: специфіка, ключові постаті (Леся Українка, Коцюбинський)
    та ''Розстріляне відродження'''
  - Тестові завдання на атрибуцію текстів (визначення автора/епохи за уривком)
  - 'Жанрова система: еволюція від бурлеску до психологічної прози'
- section: Тест — Аналіз тексту
  words: 1300
  points:
  - 'Літературознавчий інструментарій: тема, ідея, пафос, композиція'
  - 'Поетика тексту: тропи (метафора, метонімія, синекдоха) та синтаксичні фігури'
  - 'Основи версифікації: види рим, віршові розміри (ямб, хорей, дактиль)'
  - 'Наратологія: типи оповідачів, фокалізація, часопростір (хронотоп)'
  - Практичний розбір поетичного та прозового уривків
- section: Практика — комплексний аналіз
  words: 1400
  points:
  - Методика написання компаративного есе (порівняння двох творів/авторів)
  - 'Аргументація в літературній критиці: структура тези та доказу'
  - 'Дискусія: Український канон у європейському контексті (впливи та самобутність)'
  - Моделювання відповіді на екзаменаційне питання (зразок високого рівня)
  - 'Саморефлексія: значення літератури для формування національної ідентичності'
