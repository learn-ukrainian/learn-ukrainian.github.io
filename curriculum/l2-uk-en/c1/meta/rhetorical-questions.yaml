slug: rhetorical-questions
title: 'Риторичні питання: Мистецтво переконання'
word_target: 4000
content_outline:
- section: Розминка — Питання без відповіді
  words: 600
  points:
  - 'Визначення риторичного питання: граматична форма питання, але семантична суть
    ствердження або заперечення.'
  - 'Психологія сприйняття: чому риторичне питання змушує мозок шукати відповідь,
    навіть якщо вона не потрібна.'
  - 'Інтонаційний малюнок: відмінність від інформативного питання (мелодика, паузи,
    логічний наголос).'
  - 'Роль у діалозі: підтримка контакту, емоційна реакція (''Та ти що?'', ''Хто б
    казав!'').'
- section: 'Функції: Від емоції до маніпуляції'
  words: 1000
  points:
  - 'Функція наголошення (Emphatic): підкреслення очевидного факту (''Хіба сонце не
    сходить щоранку?'').'
  - 'Функція заперечення (Negative): ''Хіба я ворог собі?'' = ''Я не ворог собі''.'
  - 'Функція емоційної розрядки (Emotional): вираження гніву, відчаю, радості (''Коли
    ж це скінчиться?!'').'
  - 'Функція маніпуляції та переконання (Persuasive): нав''язування думки під виглядом
    спільного роздуму (''Чи можемо ми дозволити таку недбалість?'').'
  - 'Літературна функція: ліричний відступ та авторське звернення (на прикладах Шевченка
    або Костенко).'
- section: Структурні засоби та маркери
  words: 1200
  points:
  - 'Частка ''Хіба'': спектр значень від легкого сумніву до категоричного заперечення.'
  - 'Частка ''Невже'': вираження щирого здивування або недовіри фактам.'
  - 'Конструкції з ''Чи'': ''Чи ж...'', ''Чи не...'' як інструмент м''якої аргументації
    або поетизації.'
  - 'Займенникові конструкції: ''Хто...'', ''Що...'', ''Де...'' у значенні ''Ніхто'',
    ''Ніщо'', ''Ніде'' (''Хто не знає Шевченка?'').'
  - 'Негативні риторичні конструкції: ''Як можна...'', ''Чому б не...'' як прихований
    докір або спонукання.'
- section: Практика — риторика в дії
  words: 1200
  points:
  - 'Аналіз політичної промови: ідентифікація риторичних питань та їхньої мети (активізація
    уваги, атака опонента).'
  - 'Трансформація тексту: перетворення сухого інформативного тексту на емоційний
    виступ за допомогою риторичних фігур.'
  - 'Стилістичне редагування: заміна недоречних риторичних питань у діловому стилі
    на стверджувальні конструкції.'
  - 'Написання переконливого есе-фрагмента: використання градації з трьох риторичних
    питань для підсилення аргументу.'
  - 'Дебати: використання риторичних питань як інструменту захисту та контратаки.'
