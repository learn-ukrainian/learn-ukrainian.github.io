slug: surzhyk
title: 'Суржик: Феномен змішування'
word_target: 4000
content_outline:
- section: Вступ — Що таке суржик
  words: 400
  points:
  - Визначення суржику як соціолінгвістичного феномену змішування української та російської
    мов (відмінність від піджину та креолу).
  - 'Історичні передумови виникнення: тривалий контакт мов, політика русифікації,
    урбанізація.'
  - 'Соціолінгвістичний вимір: суржик як перехідна ланка або застигла форма напівмовності.'
  - 'Розрізнення понять: суржик vs. діалект vs. просторіччя.'
- section: Фонетична інтерференція
  words: 600
  points:
  - 'Редукція голосних: ненаголошене ''о'' як ''а'' (малако vs молоко) — типова ознака
    суржику.'
  - 'Вимова приголосних: м''яке ''ч'' (чяшка), тверде ''ц'' в кінці слів (палец),
    оглушення дзвінких у кінці слова.'
  - 'Акцентуаційні помилки: неправильний наголос під впливом російської моделі (одинадцять
    vs одинадцять, феномен vs феномен).'
  - 'Інтонаційні особливості: ''розтягування'' голосних та специфічна мелодика.'
- section: Лексична інтерференція
  words: 800
  points:
  - 'Прямі запозичення (варваризми): ''да'' (так), ''нє'' (ні), ''канєшно'' (звісно),
    ''понімаю'' (розумію).'
  - 'Семантичні кальки: слова, що існують в українській, але вживаються у невластивому
    значенні (наприклад, ''мішати'' у значенні ''заважати'', ''построїти'' замість
    ''збудувати'').'
  - 'Фразеологічні кальки: ''кидатися в очі'' (впадати в очі/віч), ''підняти питання''
    (порушити питання).'
  - 'Слова-паразити суржикового походження: ''тіпа'', ''корочє'', ''в смислє''.'
  - Таблиця типових лексичних помилок та їх літературних відповідників.
- section: Граматична інтерференція
  words: 600
  points:
  - 'Морфологічні помилки: неправильний рід іменників (собака — він, а не вона; біль
    — він, а не вона).'
  - 'Синтаксичні помилки керування: ''дякую вас'' (помилка) -> ''дякую вам'', ''сміятися
    над'' (калька) -> ''сміятися з''.'
  - 'Вживання прийменників: ''по'' в усіх контекстах (''по справам'', ''по вихідним'')
    замість українських відповідників (''у справах'', ''у вихідні'').'
  - 'Активні дієприкметники: зловживання формами на -учий/-ючий (бігучий рядок ->
    рухомий рядок).'
- section: Код-свічинг
  words: 500
  points:
  - 'Визначення перемикання кодів (code-switching): свідомий перехід з однієї мови
    на іншу в межах розмови.'
  - 'Відмінність від суржику: код-свічинг є стратегією білінгвів, суржик часто є неусвідомленим.'
  - 'Функції перемикання: цитування, зміна адресата, вираження емоцій, гумористичний
    ефект.'
  - 'Ситуативне використання: коли перемикання є доречним (неформальне спілкування),
    а коли ні (офіційні промови).'
- section: Соціальне сприйняття
  words: 500
  points:
  - 'Стигматизація суржику: сприйняття як ознаки низької культури або неосвіченості.'
  - 'Суржик у мистецтві та літературі: засіб характеристики персонажа (Нечуй-Левицький,
    Старицький, сучасні автори).'
  - 'Мовна стійкість: як реагувати на суржик співрозмовника, стратегії лагідної українізації.'
  - Престиж літературної мови як фактор витіснення суржику.
- section: Практичне завдання
  words: 600
  points:
  - 'Редагування тексту: виявлення та виправлення суржикізмів у запропонованому уривку
    (імітація реального діалогу).'
  - 'Аналіз відео/аудіо: ідентифікація типів інтерференції (фонетична, лексична, граматична)
    на прикладі запису.'
  - 'Рольова гра (опис ситуації): перефразування суржикових виразів літературною мовою
    у формальному контексті.'
  - 'Дискусійний клуб: обговорення ставлення до суржику (чи має він право на існування
    як субкультура?).'
