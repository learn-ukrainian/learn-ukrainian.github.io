    \ книжкова мініатюра. Мозаїкою і фресками \nприкрашали храми, щоправда, мозаїку\
    \ використовували рідше \nчерез її велику вартість. З початком ХІІ століття храми\
    \ почали \nоздоблювати переважно фресками. Визначним здобутком Київської держави\
