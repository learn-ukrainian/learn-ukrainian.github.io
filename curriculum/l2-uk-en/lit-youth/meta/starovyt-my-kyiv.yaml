slug: starovyt-my-kyiv
title: Starovyt My Kyiv
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Образ старовинного Києва у дитячій літературі'
  words: 700
  points:
  - Значення урбаністичного міфу для формування національної ідентичності юних читачів.
  - Київ як не просто локація, а живий організм, 'свідок' тисячолітньої історії.
  - Роль дитячої історичної літератури та інтерактивних путівників у візуалізації
    минулого для сучасних підлітків.
- section: 'Аналіз ключових творів: Від міфу до історичної реальності'
  words: 700
  points:
  - Трансформація літописної легенди про засновників (Кий, Щек, Хорив, Либідь) у сучасних
    захопливих оповідях.
  - 'Відображення епохи Володимира Великого та Ярослава Мудрого: акцент на освіті,
    культурі та масштабному державотворенні.'
  - 'Прийоми ''занурення'' в історію: мандрівки в часі, інтерактивні елементи путівників,
    постійний діалог з читачем.'
- section: 'Аналіз ключових творів: Простір міста як головний герой'
  words: 700
  points:
  - 'Топографія старовитого Києва: соціальний контраст і синергія ремісничого Подолу
    та сакрально-князівської Гори.'
  - 'Сакральна географія міста: Софія Київська, Десятинна церква та Золоті Ворота
    як архітектурні портали в минуле.'
  - Взаємодія сучасного героя-підлітка з багатошаровим історичним ландшафтом столиці
    України.
- section: 'Стилістика та мова автора: Архаїзми та урбаністичний словник'
  words: 600
  points:
  - Досягнення балансу між історичною мовною стилізацією (архаїзми, історизми) та
    безпосередньою зрозумілістю тексту для юного читача.
  - Використання давньоруської лексики, автентичних топонімів та антропонімів як дієвих
    інструментів створення історичної атмосфери.
  - 'Риторика ''живого спілкування'' з містом: діалогічність, динамічна описовість
    та висока емоційна включеність оповіді.'
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 600
  points:
  - Послідовне спростування імперського концепту 'спільної колиски трьох братніх народів'
    на матеріалі дитячих текстів.
  - Розвінчання російської багатовікової апропріації назви 'Русь' та культурної спадщини
    київських князів.
  - Повернення справжнього значення фрази 'Мати міст руських' як європейської 'метрополії',
    позбавляючи її московського трактування.
- section: 'Деколонізаційна перспектива: Українська суб''єктність та європейський
    контекст'
  words: 600
  points:
  - 'Зображення Києва як потужного європейського центру: міжнародна торгівля, дипломатія,
    династичні шлюби (на прикладі Анни Київської).'
  - Демонстрація концептуальної тяглості української державної, культурної та правової
    (Руська Правда) традиції від Русі до сьогодення.
  - 'Радикальна відмова від колоніальної віктимності: акцент на культурному розвитку,
    політичній суб''єктності та військовій силі.'
- section: 'Підсумок та спадщина: Значення урбаністичного міфу для сучасної молоді'
  words: 600
  points:
  - Формування історичної пам'яті та активного громадянського патріотизму через глибоку
    емоційну прив'язаність до рідного міста.
  - Значення літературного концепту 'Старовитого Києва' для культурного спротиву та
    зміцнення ідентичності під час сучасної війни.
  - Перспективи подальшого розвитку жанру історичного міського путівника та урбаністичного
    фентезі в українській юнацькій літературі.
