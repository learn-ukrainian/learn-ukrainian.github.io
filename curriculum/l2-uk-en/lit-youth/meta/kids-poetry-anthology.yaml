slug: kids-poetry-anthology
title: Kids Poetry Anthology
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Витоки традиції'
    words: 750
    points:
      - 'Зародження української дитячої поезії в ХІХ столітті: протистояння асиміляції
        (діяльність Олени Пчілки, Івана Франка).'
      - Видавничі ініціативи та функція дитячої книги як засобу збереження мови в
        умовах імперських заборон.
      - 'Перехід від дидактики до естетики: фольклорна основа та перші авторські експерименти.'
  - section: 'Аналіз ключових творів: Від класики до авангарду'
    words: 1000
    points:
      - 'Сплеск 1920-х: авангард, експерименти з формою та відсутність жорсткого дидактизму
        в дитячих журналах.'
      - 'Радянський період: подвійна природа дитячої поезії (тиск цензури vs високохудожні
        тексти).'
      - 'Шістдесятники в дитячій літературі (Микола Вінграновський, Ліна Костенко):
        філософічність, космізм і повернення до справжньої поезії.'
  - section: 'Аналіз ключових творів: Антології незалежності'
    words: 1000
    points:
      - 'Феномен видавництва «А-БА-БА-ГА-ЛА-МА-ГА» та серія «Улюблені вірші»: створення
        нового канону.'
      - Сучасна українська дитяча поезія (Іван Малкович, Галина Малик, Іван Андрусяк,
        Мар'яна Савка).
      - 'Тематична розмаїтість: нонсенс, іронія, урбаністика та розмова з дитиною
        на рівних.'
  - section: 'Стилістика та мова автора: Естетика і гра'
    words: 750
    points:
      - 'Фонетичне багатство: ритміка, алітерації, неологізми як засіб залучення юного
        читача.'
      - 'Мовна гра та абсурд як вияв свободи: відмова від сухої повчальності на користь
        естетичної насолоди.'
      - 'Вітаїзм та радість у віршах: формування оптимістичної мовної картини світу.'
  - section: 'Деколонізаційна перспектива: Подолання травми'
    words: 900
    points:
      - 'Як цей автор руйнує імперські міфи: відмова від меншовартості та творення
        повноцінного світу.'
      - 'Українська суб''єктність у тексті: руйнування образу української мови як
        виключно сільської.'
      - Деконструкція радянської моделі дитячого читання («радянське дитинство» як
        ідеологічний конструкт).
  - section: 'Підсумок та спадщина: Формування нації'
    words: 600
    points:
      - Роль поетичних антологій у формуванні національної ідентичності та естетичного
        смаку змалечку.
      - Українська дитяча поезія як конкурентний продукт європейського рівня.
      - Вплив дитячої книги на виховання вільного, критично мислячого покоління.
