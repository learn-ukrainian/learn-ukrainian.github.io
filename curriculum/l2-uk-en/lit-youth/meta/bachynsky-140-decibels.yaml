slug: bachynsky-140-decibels
title: "«140 Децибелів»: Любко Баченський і Голос Нового Покоління"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Нова підліткова проза'
    words: 500
    points:
      - Початок 2010-х років як переломний етап для української дитячої та підліткової
        літератури, поява запиту на «складні» теми.
      - Роль Андрія Бачинського як одного з флагманів сучасної соціально-психологічної
        прози.
      - Публікація повісті «140 децибелів тиші» у 2015 році, здобуття престижної премії
        «Дитяча Книга року ВВС - 2015» та значний суспільний резонанс.
  - section: 'Вступ та контекст: Проблема інклюзії'
    words: 500
    points:
      - Маргіналізованість теми життя нечуючих людей в попередні роки, подолання статусу
        «неформатної» теми в літературі.
      - Зіткнення «світу тих, хто чує» зі світом жестової мови та абсолютної тиші.
      - Достовірність опису побуту інтернатів завдяки глибокому дослідженню автором
        цієї теми.
  - section: 'Аналіз ключових творів: Сюжетна канва і травма'
    words: 500
    points:
      - Автокатастрофа як фатальна межа, що розділила життя 15-річного Сергія на «до»
        і «після».
      - Миттєва втрата Сергієм родини (батьків, молодшої сестри), можливості займатися
        музикою, а також слуху та мови.
      - Психологічний стан дитини, яка потрапляє в закриту систему інтернату, та болісне
        проходження через стадії прийняття неминучого.
  - section: 'Аналіз ключових творів: Інтернатна система'
    words: 500
    points:
      - Зображення закритої інтернатної системи та відверте викриття жорстокості цього
        середовища.
      - Проблема злочинних синдикатів і кримінального «бізнесу», які використовують
        дітей з інвалідністю для примусового жебракування.
      - Деконструкція міфу про безпеку державних закладів опіки та розкриття гострих
        соціальних виразок пострадянського суспільства.
  - section: 'Аналіз ключових творів: Сергій та Яринка'
    words: 500
    points:
      - Еволюція Сергія від абсолютного відчаю до гіпервідповідальності в нових умовах.
      - Роль Яринки, яка нагадує загиблу сестру та стає для героя новим сенсом життя.
      - Формування глибокого емоційного зв'язку на основі жестової мови та довіри
        в новій системі координат тиші.
  - section: 'Аналіз ключових творів: Метафора 140 децибелів'
    words: 500
    points:
      - 'Музика як ключовий лейтмотив твору: внутрішня музика та ритм, що залишаються
        попри фізичну втрату слуху.'
      - Символізм 140 децибелів як межі больового порогу, за якою настає абсолютна
        тиша.
      - Осмислення тиші не як порожнечі, а як простору, що має власну гучність емоцій
        та виступає джерелом внутрішньої сили.
  - section: 'Стилістика та мова автора: Наратив тиші'
    words: 500
    points:
      - Динамічний, дещо кінематографічний стиль письма Андрія Бачинського, що ідеально
        відповідає гостросюжетній історії.
      - Використання специфічних текстових інструментів для передання внутрішніх монологів
        нечуючого підлітка.
      - Особливості відтворення комунікації за допомогою жестів та невербальної взаємодії
        винятково літературними засобами.
  - section: 'Деколонізаційна перспектива: Як цей автор руйнує імперські міфи'
    words: 500
    points:
      - Критика та подолання радянської «дефектології», яка штучно ізолювала людей
        з інвалідністю у віддалених спецустановах.
      - Руйнування імперського міфу про «країну щасливого дитинства» через показ жорсткої
        реальності пострадянської інтернатної системи.
      - Перехід від медичної моделі (де людина розглядається винятково як «хвора»)
        до соціальної моделі правозахисту та інтеграції.
  - section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
    words: 500
    points:
      - Подолання стереотипного образу героя з інвалідністю як винятково об'єкта для
        жалю та пасивного отримувача державної опіки.
      - Прояв української суб'єктності через внутрішню волю Сергія, його самостійні
        рішення, опір кримінальній системі та захист Яринки.
      - Ствердження літератури про людську гідність, де герой не чекає на порятунок
        від абстрактної держави, а сам змінює обставини.
  - section: 'Підсумок та вплив: Значення твору'
    words: 500
    points:
      - 'Значення твору Бачинського для становлення української дитячої та підліткової
        літератури: прокладання шляху для текстів про інклюзію.'
      - Доведення того, що українська сучасна проза здатна працювати на рівні найкращих
        світових зразків соціально-психологічної літератури.
      - Роль повісті «140 децибелів тиші» в сучасній шкільній програмі як важливого
        інструменту для виховання емпатії та інклюзивного світогляду.
