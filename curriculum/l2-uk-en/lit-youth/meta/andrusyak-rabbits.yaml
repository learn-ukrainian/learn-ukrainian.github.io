slug: andrusyak-rabbits
title: "«Мій кролик Ромчик»: Іван Андрусяк і Нова Хвиля Дитячої Прози"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Новаторство Івана Андрусяка'
    words: 450
    points:
      - 'Прихід Івана Андрусяка в дитячу літературу: перехід від серйозної поезії
        до текстів для найменших'
      - Роль автора у становленні якісної україномовної дитячої літератури у 2000-х
        роках
      - Відмова від радянської моделі дитячого письменника як строгого моралізатора
  - section: 'Вступ та контекст: Концепція дитинства у творах Андрусяка'
    words: 450
    points:
      - Дитинство як простір гри та пізнання, а не як підготовка до 'серйозного дорослого
        життя'
      - 'Дитиноцентризм: партнерський тон розмови з юним читачем'
      - Легітимізація дитячих емоцій, пустощів та фантазій у літературі
  - section: 'Аналіз ключових творів: Поетичний світ «Зайчикової книжечки»'
    words: 750
    points:
      - Історія створення та популярність збірки серед українських родин (bedtime
        stories)
      - Аналіз образу Зайчика як літературного альтер-его сучасної допитливої дитини
      - 'Тематика віршів: відкриття малого світу навколо (дім, ліс, друзі)'
  - section: 'Аналіз ключових творів: «Хто боїться зайчиків» та психологія страху'
    words: 500
    points:
      - Сюжет та головний конфлікт поетичної казки
      - 'Казкотерапія: як автор допомагає дитині проживати та відпускати базові страхи'
      - Сміх і парадокс як головні інструменти деконструкції тривожності
  - section: 'Аналіз ключових творів: Образ зайця як архетип у сучасній казці'
    words: 500
    points:
      - Трансформація фольклорного образу зайця (від традиційного трикстера чи боягуза
        до багатогранного героя)
      - Психологічна глибина анімалістичних персонажів Андрусяка
      - Емпатія та співпереживання як ключові реакції, що їх викликає герой
  - section: 'Стилістика та мова автора: Мовна гра та словотвір'
    words: 500
    points:
      - Використання неологізмів, каламбурів та гри слів, що відповідає дитячій психології
      - Розвиток мовного чуття та творчого ставлення до рідної мови
      - Приклади авторських словотворчих експериментів (цитування)
  - section: 'Стилістика та мова автора: Ритміка та звуконаслідування'
    words: 450
    points:
      - Віртуозне володіння поетичним ритмом, динаміка текстів
      - Важливість звуконаслідування для логопедичного та мовленнєвого розвитку дітей
      - 'Музичність поезії Андрусяка: ідеальна пристосованість до читання вголос'
  - section: 'Деколонізаційна перспектива: Подолання радянського дидактизму'
    words: 500
    points:
      - Критика утилітарно-виховного підходу радянської дитячої літератури
      - Відсутність прямого повчання та менторства; мораль, яка випливає природно
        з тексту
      - Формування вільної, незакомплексованої особистості через вільне читання
  - section: 'Деколонізаційна перспектива: Українська суб''єктність та фольклорні
      мотиви'
    words: 450
    points:
      - Органічна (не шароварна) присутність українського культурного коду у творах
      - 'Проактивність героїв: український герой як суб''єкт, що діє і змінює свій
        світ'
      - Сучасна інтерпретація національних родинних цінностей та традицій
  - section: 'Підсумок та спадщина: Вплив на сучасну українську дитячу літературу'
    words: 450
    points:
      - Роль Андрусяка як письменника і головного редактора видавництва «Фонтан казок»
      - Формування нових, європейських стандартів для української дитячої книги
      - 'Спадщина автора: тексти, на яких зростає нове покоління українців'
