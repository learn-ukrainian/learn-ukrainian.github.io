slug: rutkivsky-dzhury-3
title: Rutkivsky Dzhury 3
word_target: 5000
content_outline:
  - section: Вступ та контекст
    words: 1000
    points:
      - Значення третьої книги в тетралогії «Джури» та її місце в українській літературі.
      - 'Історичне тло кінця XV століття: діяльність черкаського старости Богдана
        Глинського.'
      - Поєднання історичної достовірності та міфологічної казки в наративі Рутківського.
  - section: 'Аналіз ключових творів: І — Дорослішання та ініціація'
    words: 900
    points:
      - Розвиток характерів головних героїв (Санька, Грицика) від дітей до справжніх
        воїнів.
      - Оборона Києва та подолання дніпровських порогів як архетиповий етап ініціації.
      - Роль наставника-характерника Швайки у формуванні світогляду молодих козаків.
  - section: 'Аналіз ключових творів: ІІ — Технологічний міф та морський похід'
    words: 900
    points:
      - Літературна адаптація легенди про козацькі підводні човни як символ національної
        винахідливості.
      - 'Образи винахідників Телесика і Чортория: технологічна кмітливість раннього
        козацтва.'
      - 'Вихід за межі степу: морський похід на Очаків як демонстрація геополітичної
        сили.'
  - section: Стилістика та мова автора
    words: 750
    points:
      - Функція гумору та іронії як механізмів психологічного захисту і зняття надмірного
        пафосу.
      - Жива та динамічна мова діалогів, адаптована для сприйняття сучасною дитячою
        аудиторією.
      - Органічне вплетення козацької термінології без перевантаження тексту важкими
        архаїзмами.
  - section: Деколонізаційна перспектива
    words: 750
    points:
      - Спростування імперського міфу про козаків як 'неосвічених збіглих селян' (показ
        їх як інтелектуальної та військової еліти).
      - Повернення Чорного та Азовського морів до українського наративного та історичного
        простору.
      - Як автор руйнує колоніальні стереотипи та вибудовує потужну українську суб'єктність
        у тексті.
  - section: Підсумок та спадщина
    words: 750
    points:
      - Шевченківська премія 2012 року як визнання трилогії сучасним класичним каноном.
      - 'Відмова від концепції ''мертвих героїв'': спадщина як живий орієнтир для
        націєтворення.'
      - Вплив В. Рутківського на розвиток усієї української історичної прози для підлітків.
