slug: rutkivsky-dzhury
title: Rutkivsky Dzhury
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Біографічний контекст Володимира Рутківського'
    words: 450
    points:
      - Народився 18 квітня 1937 року на Черкащині, дитинство припало на Другу світову
        війну.
      - Творчий шлях та тривале перебування у 'літературному підпіллі' через небажання
        коритися радянській цензурі.
      - Звернення до історико-пригодницького жанру як засобу збереження національної
        пам'яті.
  - section: 'Вступ та контекст: II — Історичне тло роману (події 1487 року)'
    words: 450
    points:
      - Події розгортаються у березні 1487 року на пограниччі — в епоху татарських
        набігів.
      - Формування Дикого Поля як українського фронтиру та простору свободи.
      - Умови зародження перших загонів самооборони, що стали основою козацтва.
  - section: 'Аналіз ключових творів: I — Сюжетна канва та проблематика «Джур козака
      Швайки»'
    words: 500
    points:
      - Аналіз першої книги тетралогії (видана 2007 р. 'А-ба-ба-га-ла-ма-га').
      - Пригоди юних героїв-втікачів у степу, мотив ініціації та дорослішання.
      - 'Ключова проблематика: вірність, зрада, відповідальність за власні вчинки.'
  - section: 'Аналіз ключових творів: II — Система персонажів (Грицик, Санько, Демко)'
    words: 500
    points:
      - Санько як втілення духовного потенціалу (юний волхв-характерник).
      - Грицик (спритність) та Демко Дурна Сила (богатирська міць) як архетипи козацької
        вдачі.
      - Психологічна достовірність підліткових характерів у екстремальних умовах.
  - section: 'Аналіз ключових творів: III — Образ Пилипа Швайки як архетипного козака-вивідника'
    words: 500
    points:
      - Швайка як дорослий наставник, невловимий лицар і стратег степу.
      - Інтелект, хитрість та передбачення як головна зброя вивідника.
      - Вовк Барвінок як тотемний помічник, що підкреслює зв'язок козака з природою.
  - section: 'Стилістика та мова автора: I — Жанрова специфіка (історико-пригодницький
      роман)'
    words: 450
    points:
      - Баланс між історичною правдою та захопливим вимислом (авторська 'логічна модель').
      - Динамізм оповіді, орієнтований на утримання уваги юного читача.
      - Трансформація історичного матеріалу у формат пригодницького квесту.
  - section: 'Стилістика та мова автора: II — Мовні засоби та гумор у творі'
    words: 450
    points:
      - Органічне вплетення історизмів та архаїзмів у живу розмовну мову персонажів.
      - Козацький гумор як механізм психологічного захисту та знецінення ворога.
      - Майстерність діалогів, що слугують засобом індивідуалізації героїв.
  - section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів про зародження
      козацтва'
    words: 500
    points:
      - Спростування радянського стереотипу про козаків як 'збіглих кріпаків'.
      - Утвердження візії козацтва як самоорганізованої військової еліти та національних
        захисників.
      - Повернення поваги до ранніх етапів українського державотворення.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність та вікова
      психологія'
    words: 500
    points:
      - Формування національної гідності через створення українських літературних
        супергероїв.
      - Виховання патріотизму через вчинки персонажів, а не пафосні декларації.
      - Відновлення права українців бути суб'єктом, а не об'єктом історії.
  - section: 'Підсумок та спадщина: I — Тетралогія «Джури» та Шевченківська премія'
    words: 400
    points:
      - Еволюція історії у наступних книгах аж до роману 'Джури і Кудлатик' (2015).
      - Здобуття Національної премії імені Тараса Шевченка у 2012 році.
      - Визнання тетралогії найвищим досягненням сучасної української літератури.
  - section: 'Підсумок та спадщина: II — Значення твору для сучасної дитячої літератури'
    words: 400
    points:
      - Фундаментальний вплив Рутківського на розвиток історичної прози для дітей
        в Україні.
      - Актуальність творчості митця в умовах сучасної війни (козацький дух як імунітет
        нації).
      - Забезпечення тяглості поколінь через передачу національних цінностей.
