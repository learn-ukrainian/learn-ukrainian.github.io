slug: oksenyk-forest-valley
title: Oksenyk Forest Valley
word_target: 5000
content_outline:
  - section: 'Вступ: I — Біографічний контекст'
    words: 400
    points:
      - Життєвий шлях Сергія Іванюка (1952–2018)
      - Діяльність у Києво-Могилянській академії та журналі «Однокласник»
      - Вибір псевдоніма Сергій Оксеник для дитячої літератури
  - section: 'Вступ: II — Жанрова своєрідність'
    words: 500
    points:
      - Трилогія «Лісом, небом, водою» як перший український постапокаліпсис для підлітків
      - Синтез антиутопії, фентезі та пригодницького роману
      - 'Хронологія видання частин: «Лисий», «Леля», «Кролик»'
  - section: 'Аналіз творів: I — Світ після катастрофи'
    words: 600
    points:
      - Сеттинг зруйнованої екологічної рівноваги та дефіциту чистої води
      - Регрес суспільства до архаїчного племінного стану
      - Небезпеки мутованої природи та ворожих угруповань
  - section: 'Аналіз творів: II — Еволюція головних героїв'
    words: 600
    points:
      - Психологічний портрет Лисого та Лелі
      - Проблема передчасного дорослішання та прийняття відповідальності
      - 'Порушення табу: необхідність вимушеного насилля заради виживання'
  - section: 'Аналіз творів: III — Філософські виміри'
    words: 500
    points:
      - Дилема збереження людяності в екстремальних умовах
      - Мотив збереження знань «Старих»
      - Моральні імперативи, що допомагають вижити фізично і духовно
  - section: 'Стилістика: I — Адаптація мови'
    words: 500
    points:
      - Багатство та динаміка української мови у тексті
      - Створення власного лексикону вигаданого світу
      - Баланс між захопливим сюжетом та складністю словника
  - section: 'Стилістика: II — Художні засоби'
    words: 500
    points:
      - Метафорика «лісової звички»
      - Психологізація пейзажу та створення атмосфери напруги
      - Міфологічні та фольклорні підтексти у творі
  - section: 'Деколонізація: I — Руйнування імперських міфів'
    words: 500
    points:
      - Подолання комплексу меншовартості у вітчизняній фантастиці
      - Створення альтернативи російськомовному масовому постапокаліпсису
      - Доведення спроможності української літератури до серйозної жанрової прози
  - section: 'Деколонізація: II — Українська суб''єктність'
    words: 500
    points:
      - Активна агентність юних українських героїв
      - Відмова від радянської патерналістської моделі героя-піонера
      - Формування нової системи цінностей, заснованої на свободі та відповідальності
  - section: 'Підсумок та спадщина: Значення для дитячої літератури'
    words: 400
    points:
      - Вплив Оксеника на розвиток сучасної української підліткової книги
      - Спадщина автора як орієнтир для нових поколінь письменників
      - Актуальність проблематики трилогії в сучасних українських реаліях
