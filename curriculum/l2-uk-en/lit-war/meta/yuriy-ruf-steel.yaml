slug: yuriy-ruf-steel
title: 'Юрій Руф: Поезія сталі'
word_target: 4000
content_outline:
- section: 'Вступ: Біографічний пунктир та формування ідеолога'
  words: 400
  points:
  - 'Юрій Дадак (Руф) (1980–2022): від кандидата технічних наук до ідеолога мілітарної
    культури.'
  - Свідомий вибір псевдоніма та життєвого шляху в умовах постколоніальної України.
  - Роль Руфа як виховника нової, незламної генерації українців.
- section: 'Історичний контекст: Від постсовка до збройної боротьби'
  words: 300
  points:
  - 'Стан українського суспільства до 2014 року: загроза культурної асиміляції.'
  - Революція Гідності та початок війни як каталізатори переходу до збройного опору.
  - Формування запиту на жорстку, безкомпромісну літературу.
- section: 'Концепт «Літератури чину»: Проєкт «Дух Нації»'
  words: 450
  points:
  - Заснування проєкту «Дух Нації» (2014) як платформи для мілітарної та патріотичної
    творчості.
  - 'Суть «літератури чину»: текст як прелюдія до дії, а не проста рефлексія.'
  - Створення навколо проєкту повноцінної субкультури (література, музика, просвітництво).
- section: 'Поезія як зброя: Феномен «римованої пропаганди»'
  words: 450
  points:
  - Авторське визначення своєї творчості як «римованої пропаганди».
  - Спрощення метафорики заради максимальної ударної сили та донесення сенсів.
  - Поезія як інструмент підтримки бойового духу на фронті («фронтова лірика»).
- section: 'Мілітарна естетика: Від «Часу Революції» до «На зламі епох»'
  words: 450
  points:
  - 'Аналіз збірки «Час Революції» (2014): поетична хроніка зламу внутрішньої окупації.'
  - 'Збірка «На зламі епох» (2015): увічнення пам''яті кіборгів, добробатів та конкретних
    битв.'
  - 'Естетизація збройної боротьби: зброя та війна як священний обов''язок.'
- section: Національна етика воїна у збірці «Ваніль чи сталь?!»
  words: 450
  points:
  - Остання прижиттєва збірка (2021) як концептуальний маніфест.
  - Дихотомія «ванілі» (зони комфорту, ілюзій) та «сталі» (готовності до випробувань).
  - Гідність і воля як чесноти, що здобуваються виключно через вибір і боротьбу.
- section: 'Деколонізаційна перспектива: Відкидання комплексу жертви'
  words: 400
  points:
  - Критика традиційної «журливої» та «шароварної» української поезії.
  - Демонтаж російського міфу про українців як вічних мучеників та селян-кріпаків.
  - 'Культивація образу переможця: наступальний націоналізм та гордість за своє коріння.'
- section: 'Історична тяглість: Зв''язок із Розстріляним Відродженням'
  words: 400
  points:
  - Паралель між репресіями 1930-х (Сандармох) та війною Росії проти України у ХХІ
    столітті.
  - Цілеспрямоване знищення української інтелігенції як незмінна імперська тактика.
  - Руф як продовжувач справи нескорених поетів Розстріляного Відродження, але зі
    зброєю в руках.
- section: Українська суб'єктність та екзистенційний опір
  words: 400
  points:
  - Збройний вибір Юрія Руфа 24 лютого 2022 року як найвищий прояв суб'єктності.
  - 'Поєднання слова і діла: поет стає воїном 24-ї ОМБр.'
  - 'Екзистенційний характер опору: війна за право бути, розрив «сталевих ланок ланцюга».'
- section: 'Підсумок та спадщина: Безсмертя сталевого поета'
  words: 300
  points:
  - 'Героїчна загибель 1 квітня 2022 року на Луганщині: поет розділив долю своїх героїв.'
  - Орден «За мужність» та топонімічна пам'ять (перейменування вулиць, озер).
  - 'Ідеологічна спадщина: тексти Руфа продовжують виховувати волю нації після його
    смерті.'
