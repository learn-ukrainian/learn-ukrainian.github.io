slug: lozko-poetry-of-maidan
title: Lozko Poetry Of Maidan
word_target: 5000
content_outline:
  - section: 'Вступ: Історичний контекст та феномен поезії Майдану'
    words: 750
    points:
      - 'Революція Гідності як каталізатор потужного поетичного вибуху: миттєва рефлексія
        на події.'
      - Роль соціальних мереж (Facebook) як основного майданчика для публікації та
        поширення текстів.
      - Повернення до громадянської лірики та відмова від відстороненого постмодернізму
        1990-х років.
  - section: 'Аналіз: Сакралізація простору Майдану'
    words: 800
    points:
      - Майдан як екзистенційна межа, «територія гідності» та простір переродження
        нації.
      - Образ барикад, вогню і льоду як символів очищення та опору.
      - 'Поетична фіксація хронології протесту: від мирного студентського майдану
        до вогняного протистояння.'
  - section: 'Аналіз: Образ Небесної Сотні та мотив самопожертви'
    words: 950
    points:
      - Трагізм і героїка лютневих розстрілів в українській поезії.
      - 'Формування пантеону новітніх мучеників: Небесна Сотня як символ найвищої
        любові до Батьківщини.'
      - Зв'язок із традицією визвольних змагань минулого (Крути, УПА).
  - section: 'Стилістика: Мова протесту, публіцистичність та нова лексика'
    words: 750
    points:
      - Репортажність, документалізм та ефект присутності (свідчення) як ключові ознаки
        текстів.
      - 'Мілітаризація словника: використання термінів війни, зброї та протесту.'
      - 'Ритміка віршів Майдану: рваний ритм, верлібр, що відображають дихання революції
        та напругу боїв.'
  - section: 'Деколонізаційна перспектива: Деконструкція міфу про братні народи'
    words: 800
    points:
      - Вірш «Ніколи ми не будемо братами» як маніфест остаточного розриву з Російською
        імперією.
      - Спростування радянських міфів про «спільну колиску» через усвідомлення несумісності
        ціннісних систем.
      - 'Українська суб''єктність: перехід від образу безправної колонії до свідомої
        політичної нації.'
  - section: 'Підсумок та спадщина: Від Майдану до поезії війни'
    words: 950
    points:
      - Вплив поезії Революції Гідності на формування новітньої національної ідентичності.
      - Еволюція поезії Майдану у масштабну літературу опору та комбатантську лірику
        після початку російської збройної агресії.
      - Значення цих текстів як емоційного документа епохи для майбутніх поколінь.
