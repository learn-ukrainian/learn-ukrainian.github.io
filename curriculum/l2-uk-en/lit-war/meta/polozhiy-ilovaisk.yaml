slug: polozhiy-ilovaisk
title: "«Іловайськ»: Сергій Положій і Хроніка Катастрофи"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Іловайський котел'
    words: 450
    points:
      - 'Історичне тло: серпень 2014 року, пряме вторгнення регулярних військ РФ.'
      - Створення «зеленого коридору» та віроломний розстріл українських колон.
      - Іловайськ як найглибша національна травма початку війни.
  - section: 'Вступ та контекст: II — Історія створення роману'
    words: 450
    points:
      - 'Євген Положій як журналіст і медіатор: проведення близько 100 інтерв''ю з
        бійцями, що вижили.'
      - 'Швидкість реакції: публікація книги вже у 2015 році до роковин трагедії.'
      - Етичний обов'язок письменника зафіксувати свідчення (testimony literature).
  - section: 'Аналіз ключових творів: I — Документальна основа та голоси свідків'
    words: 450
    points:
      - 'Жанрова специфіка: межа між художнім репортажем та новелістичним романом
        (non-fiction vs. fiction).'
      - Фактчекінг та опора на реальні спогади як основа довіри до тексту.
      - 'Функція голосу свідка в тексті: документальність проти імперської брехні.'
  - section: 'Аналіз ключових творів: II — Композиція та новелістична структура'
    words: 450
    points:
      - 'Структура з 16 новел: мозаїка індивідуальних доль у спільному хронотопі котла.'
      - 'Поліфонія досвідів: погляд на трагедію очима різних учасників (медики, добровольці,
        кадрові військові).'
      - Фрагментованість тексту як відображення розірваної війною реальності.
  - section: 'Аналіз ключових творів: III — Аналіз новел та ключові герої'
    words: 500
    points:
      - Розбір ключових сюжетів, зокрема образу героя «Дядя Ваня» (збірні та реальні
        прототипи).
      - 'Мотивація добровольців: екзистенційний вибір вільних людей, а не примус.'
      - Протиставлення гуманізму українських воїнів та безжальної машини війни.
  - section: 'Аналіз ключових творів: IV — Психологізм та опрацювання травми'
    words: 450
    points:
      - 'Фокус не на баталістиці, а на внутрішньому стані людини: страх, біль, контузії.'
      - Синдром того, хто вижив (survivor's guilt) та межові психологічні стани.
      - Роман як інструмент суспільної терапії та проговорення болю.
  - section: 'Стилістика та мова автора: I — Наратив свідчення'
    words: 350
    points:
      - 'Стилістична лаконічність Положія: відмова від зайвого пафосу та штучного
        героїзму.'
      - Сухий, майже протокольний репортажний стиль опису трагічних подій.
      - Скрипторська позиція автора, який відходить на другий план, даючи говорити
        героям.
  - section: 'Стилістика та мова автора: II — Мовні регістри та багатоголосся'
    words: 350
    points:
      - Використання живої розмовної мови, фронтового сленгу, суржику.
      - Відображення російськомовних українських патріотів, що ламає міфи пропаганди
        РФ.
      - Поліфонічність та автентичність діалогів як спосіб збереження історичної достовірності.
  - section: 'Деколонізаційна перспектива: I — Деконструкція міфу про «братній народ»'
    words: 450
    points:
      - 'Іловайськ як рубікон: остаточне руйнування мілофогеми про «офіцерську честь»
        російської армії.'
      - Викриття віроломства та сутності російського імперіалізму через акт розстрілу
        в коридорі.
      - Відмова від концепції «громадянської війни» — чітка фіксація іноземного вторгнення.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
    words: 450
    points:
      - Герої твору не як пасивні жертви обставин, а як активні суб'єкти опору.
      - Здатність до самоорганізації та збереження людяності (братерство, порятунок
        побратимів).
      - Формування нової української мілітарної ідентичності.
  - section: 'Підсумок та спадщина: I — Роман як національний епос спротиву'
    words: 350
    points:
      - Роль книги у збереженні національної пам'яті про події 2014 року.
      - Створення літературного пам'ятника (monumentum) полеглим та вцілілим.
      - Перетворення історичної травми на елемент героїчного міфу.
  - section: 'Підсумок та спадщина: II — Місце твору в літературі про війну'
    words: 350
    points:
      - «Іловайськ» як один із основоположних текстів сучасної української ветеранської
        та комбатантської прози.
      - Вплив роману на подальше формування канону літератури свідоцтва в Україні.
      - Стандарти документальної чесності, задані Положієм для майбутніх авторів.
