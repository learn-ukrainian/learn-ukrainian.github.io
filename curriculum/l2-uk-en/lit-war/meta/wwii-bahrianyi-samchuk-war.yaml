slug: wwii-bahrianyi-samchuk-war
title: "Другий Фронт Другої Світової: Багряний і Самчук — Між Двома Окупаціями"
word_target: 5000
content_outline:
- section: 'Вступ: I — Українці між Гітлером і Сталіним'
  words: 500
  points:
  - 'Друга світова для України: не «союзники проти фашизму», а дві окупації і вибір між злом і злом.'
  - 'Три мільйони загиблих на боці СРСР і два мільйони загиблих під нацистською окупацією — подвійна катастрофа.'
  - 'Два письменники в еміграції: Іван Багряний і Улас Самчук — два голоси про неможливий вибір.'
- section: 'Вступ: II — Контекст МУР: письменники у повоєнній Европі'
  words: 500
  points:
  - 'МУР (Мистецький Укр. Рух, 1945–1948): табори переміщених осіб у Германії — де народилися ключові тексти.'
  - 'Самчук і Багряний у дискусії про «органічний стиль»: два різні бачення завдань еміграційної літератури.'
  - 'Свідки і автори: хто має право писати про досвід, якого ти не мав — і де межа між пам''яттю і вигадкою.'
- section: 'Аналіз: «Тигролови» Багряного (1944) — втеча і виживання'
  words: 700
  points:
  - '"Тигролови": роман-утеча з ГУЛАГу у Сибіру — де документальна основа переходить у пригодницький наратив.'
  - 'Образ Григорія Многогрішного: героїзм як форма виживання — між «позитивним героєм» і живою людиною.'
  - '"Тигрові" метафори: що тайга означає для колонізованого і депортованого — природа як союзник і як суддя.'
- section: 'Аналіз: «Сад Гетсиманський» Багряного (1950) — ГУЛАГ як теологія'
  words: 700
  points:
  - '"Сад Гетсиманський": від пригодницького до психологічного і філософського — де Багряний виходить за межі роману-втечі.'
  - 'Назва і підтекст: Гетсиманський сад як місце останньої молитви — ГУЛАГ як страсний тиждень без воскресіння?'
  - 'Катування і гідність: як Багряний зображує тіло під тиском — художнє рішення і психологічна точність.'
- section: 'Аналіз: «Ост» Самчука (1948) — голос Галичини у Другій світовій'
  words: 600
  points:
  - '"Ост" (1948): три томи про долю галицьких українців між радянською і нацистською окупаціями.'
  - 'Самчук і «народна» правда: де документальне свідчення і де художня реконструкція — і чи важливий цей поділ для автора?'
  - 'Образи жінок у «Ост»: як Самчук зображує жіночий досвід окупації — чи він поза гендерними стереотипами часу?'
- section: 'Стилістика: Два різні наративні підходи'
  words: 500
  points:
  - 'Багряний: стрімкий темп, пригодницький ритм, кінематографічний монтаж — реалізм у формі трилеру.'
  - 'Самчук: повільний, «монументальний» стиль — епічна хроніка, що документує, а не розважає.'
  - 'Порівняння з «Доктором Живаго» і «Ночами у Ліссабоні» — де три романи перетинаються і де принципово розходяться.'
- section: 'Деколонізаційна перспектива: Третій наратив Другої світової'
  words: 500
  points:
  - 'Чому Друга світова у «радянській» версії не є «українською»: де Багряний і Самчук показують щось, що Симонов не міг побачити.'
  - 'ДіПі-табори і «третій» вибір: не нацисти і не комуністи — і що означала ця позиція у 1945–1948 рр.'
  - 'Сучасне прочитання «Тигроловів»: чому роман видається знову і знову, і що молоді читачі в ньому шукають.'
- section: 'Підсумок: Багряний, Самчук і повнота воєнного наративу'
  words: 500
  points:
  - Місце Багряного і Самчука у повному каноні літератури про Другу світову — поруч з Гроссманом, Борхертом, Каміно.
  - Рецепція в сучасній Україні — перевидання, адаптації, обговорення після 2022 р.
  - Питання до читача: де закінчується «воєнна проза» і де починається «проза виживання» — і чи це різниця має значення?
