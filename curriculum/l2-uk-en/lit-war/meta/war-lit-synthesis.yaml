slug: war-lit-synthesis
title: 'Синтез: Література чину'
word_target: 5000
content_outline:
  - section: 'Діахронний аналіз: I — Еволюція ідей та архетипів'
    words: 500
    points:
      - 'Від народницького «плачу» до віталізму: злам парадигми в міжвоєнній українській
        літературі.'
      - Формування архетипу митця-воїна, де поезія стає актом державотворення.
      - Донцовський «Вісник» як каталізатор ідейного та естетичного оновлення.
  - section: 'Діахронний аналіз: II — Інтертекстуальний діалог поколінь'
    words: 500
    points:
      - 'Спадкоємність опору: переосмислення Тараса Шевченка та Лесі Українки вісниківцями.'
      - Відгомін «Літератури чину» у творчості дисидентів та шістдесятників (В. Стус).
      - Сучасна комбатантська література як прямий продовжувач традиції Празької школи.
  - section: 'Деколонізаційна оптика: I — Стратегії інтелектуального опору'
    words: 500
    points:
      - Свідома відмова від комплексу меншовартості та провінціалізму в текстах Празької
        школи.
      - Література як простір боротьби за культурний суверенітет (на прикладі есеїстики
        Є. Маланюка).
      - Формування антиімперського дискурсу через звернення до європейських та античних
        контекстів.
  - section: 'Деколонізаційна оптика: II — Деконструкція імперського міфу'
    words: 500
    points:
      - Спростування радянських міфів про вісниківців як «буржуазних націоналістів»
        та зрадників.
      - Викриття методів радянської цензури, що стирала імена авторів з історії.
      - 'Повернення справжньої суб''єктності: література чину як заперечення російського
        домінування.'
  - section: 'Стилістичний калейдоскоп: I — Авторські техніки та експерименти'
    words: 500
    points:
      - '«Стилет і стилос»: мілітарна метафорика Євгена Маланюка та історіософський
        масштаб.'
      - Неокласична строгість і карбованість рядка Олега Ольжича («Камінь»).
      - Емоційна напруга та вольовий імператив у ліриці Олени Теліги.
  - section: 'Стилістичний калейдоскоп: II — Еволюція літературної мови'
    words: 500
    points:
      - 'Творення нового словника опору: очищення мови від сентиментальних штампів.'
      - Поєднання античної грації з модерною динамікою війни.
      - Як естетична форма ставала інструментом дисциплінування національного духу.
  - section: 'Філософія ідентичності: I — Конструювання українського суб''єкта'
    words: 500
    points:
      - 'Перехід від об''єкта страждань до активного суб''єкта історії: «Державу будується
        нині» (О. Ольжич).'
      - 'Психологія героїзму: подолання страху смерті заради вищої мети.'
      - Створення ідеалу нової української людини, вільної від рабської покірності.
  - section: 'Філософія ідентичності: II — Національна етика в літературі'
    words: 500
    points:
      - 'Єдність тексту і життя: митець як гарант власних ідей.'
      - 'Мучеництво і чин: біографії Ольжича (Заксенгаузен) і Теліги (Бабин Яр) як
        найвищий етичний аргумент.'
      - Моральний імператив «Літератури чину» та його вплив на покоління УПА.
  - section: 'Спадщина: I — Вплив на сучасний літературний процес'
    words: 500
    points:
      - Резонанс естетики Празької школи після початку російської агресії у 2014 році.
      - Трансформація архетипу воїна у текстах сучасних українських авторів-комбатантів.
      - Література чину як матриця для розуміння екзистенційного виміру нинішньої
        війни.
  - section: 'Спадщина: II — Канон та інтелектуальна безпека'
    words: 500
    points:
      - Інтеграція «викресленого покоління» до шкільної та університетської програми.
      - Роль вісниківського канону у формуванні стійкості суспільства до інформаційних
        атак.
      - 'Висновок: література чину як вічний духовний арсенал української нації.'
