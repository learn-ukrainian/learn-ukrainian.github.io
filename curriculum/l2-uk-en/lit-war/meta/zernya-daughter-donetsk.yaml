slug: zernya-daughter-donetsk
title: Zernya Daughter Donetsk
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Феномен Тамари Горіха Зерня'
  words: 400
  points:
  - 'Біографічний контекст авторки: від волонтерки до лауреатки Шевченківської премії.'
  - Місце роману в сучасній українській літературі про війну (ветеранська/волонтерська
    проза).
- section: 'Вступ та контекст: II — Донецьк напередодні війни'
  words: 400
  points:
  - 'Історичне тло весни-літа 2014 року в Донецьку: останні проукраїнські мітинги
    та повзуча окупація.'
  - Атмосфера суспільної розгубленості, страху та зародження громадянського опору.
- section: 'Аналіз роману «Доця»: I — Сюжет та документальність'
  words: 500
  points:
  - 'Огляд сюжетної лінії: шлях дівчини з Волині в українському Донецьку.'
  - 'Документальна основа: реальні прототипи (волонтерка Наталія) та свідчення очевидців
    як фундамент тексту.'
- section: 'Аналіз роману «Доця»: II — Образ Ельфа та еволюція героїні'
  words: 500
  points:
  - Психологічний портрет головної героїні (позивний «Ельф», «Доця»).
  - Трансформація від аполітичної підприємниці до лідерки волонтерської мережі та
    «месії з Донбасу».
- section: 'Аналіз роману «Доця»: III — Вітраж як центральна метафора'
  words: 400
  points:
  - Символізм назв розділів (Кришталь, Смальта, Патина) та ремесла героїні.
  - Метафора збирання єдиної родини та нації з різних, часом «зламаних» індивідів.
- section: 'Стилістика та мова автора: I — Динаміка пригодницького жанру'
  words: 400
  points:
  - 'Жанрові особливості: поєднання воєнної драми з динамікою гостросюжетного трилера.'
  - Емоційна напруга, кінематографічність описів та робота з психологією читача.
- section: 'Стилістика та мова автора: II — Мовний портрет епохи'
  words: 400
  points:
  - Мова як маркер ідентичності та інструмент розпізнавання «свій-чужий».
  - 'Автентичність діалогів: використання живої розмовної мови, волонтерського та
    військового жаргону.'
- section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
  words: 400
  points:
  - Деконструкція російського наративу про суцільно «проросійський Донбас» та «русскую
    весну».
  - Демонстрація реального масштабу українського патріотизму та збройної окупації
    ззовні.
- section: 'Деколонізаційна перспектива: II — Суб''єктність і духовний спротив'
  words: 350
  points:
  - Роман як «інструмент духовного спротиву» (за визначенням самої авторки).
  - 'Активна позиція героїв: відмова від віктимізації на користь дієвої української
    суб''єктності.'
- section: 'Підсумок та вплив: Значення роману'
  words: 300
  points:
  - Внесок «Доці» у формування національної пам'яті про початковий етап російсько-української
    війни.
  - 'Спадщина твору: повернення Донецька в український культурний та ментальний простір.'
