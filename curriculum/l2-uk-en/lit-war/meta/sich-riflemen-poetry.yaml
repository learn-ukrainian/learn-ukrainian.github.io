slug: sich-riflemen-poetry
title: "Поети Стрілецтва: Голоси Першої Визвольної Війни (1914–1919)"
word_target: 5000
content_outline:
- section: 'Вступ: I — Перша світова і Українські Січові Стрільці'
  words: 500
  points:
  - 'Українські Січові Стрільці (1914–1919): перше добровольче українське військо в Австро-Угорській армії — і перший масив воєнної лірики.'
  - 'Контекст: Східна Галичина на фронті Першої світової — між двома імперіями, між двома виборами.'
  - 'Стрілецька культура як феномен: вояки, що пишуть вірші, малюють, видають журнали — культурне відродження у траншеях.'
- section: 'Вступ: II — Поетична традиція до 1914 року і її розрив'
  words: 500
  points:
  - 'Стрілецька лірика на перетині галицької і наддніпрянської традицій — де зустрічаються два береги однієї культури.'
  - 'Народна пісня і «висока» лірика: стрілецьке письмо між жанрами.'
  - "Стрілецька пісня як окремий жанр: «Гей там на горі Січ іде» та інші — де пісня стає ідентифікатором спільноти."
- section: 'Аналіз: Левко Лепкий і стрілецька ліричність'
  words: 700
  points:
  - 'Левко Лепкий (1888–1956): поет і музикант, автор найвідоміших стрілецьких пісень-маршів.'
  - '"Чуєш, брате мій" і "Журавлі": де патетика і де лірика, і як вони не суперечать одне одному.'
  - Лепкий після 1919 р.: еміграція і продовження стрілецького проекту за межами батьківщини.
- section: 'Аналіз: Роман Купчинський і сатирична стрілецька проза'
  words: 700
  points:
  - 'Роман Купчинський (1894–1976): гумор і сатира у стрілецьких текстах — сміх як виживання у траншеях.'
  - '"Заметіль" і оповідання з фронтового побуту — де документальне зливається з художнім.'
  - 'Купчинський після 1919 р.: журналістика, культурна діяльність, еміграція — і забуття.'
- section: 'Аналіз: Григорій Чупринка і містична лірика'
  words: 600
  points:
  - 'Григорій Чупринка (1879–1921): поет між символізмом і стрілецьким досвідом — особливий голос у хорі.'
  - 'Містичні і природні образи у воєнній ліриці: де природа стає свідком катастрофи.'
  - 'Розстріл більшовиками 1921 р.: ще одна жертва, що не встигла повністю реалізувати свій потенціал.'
- section: 'Стрілецька пісня як жанр: між маршем і елегією'
  words: 500
  points:
  - 'Музикальність стрілецьких текстів: що відрізняє поезію, що стала піснею, від поезії, що лишилась на папері.'
  - 'Марш і елегія: два полюси стрілецького жанру — і де вони зустрічаються в одному тексті.'
  - Збирання і збереження стрілецького репертуару у діаспорі після 1939 і 1944 рр.
- section: 'Деколонізаційна перспектива: Перша визвольна війна і культурна пам''ять'
  words: 500
  points:
  - 'Чому стрілецька традиція замовчувалась у радянській Україні і в УРСР: «буржуазні націоналісти» як ярлик.'
  - 'Повернення стрілецьких пісень після 1991 р.: не лише ностальгія, а реконструкція втраченого культурного пласту.'
  - 'Паралель між УСС 1914–1919 і ЗСУ після 2014 р.: що нове покоління вояків-поетів успадкувало і що творить заново.'
- section: 'Підсумок: Стрілецька традиція у сучасній культурі'
  words: 500
  points:
  - Стрілецькі пісні у репертуарі сучасних виконавців — де традиція жива і де вона стає частиною нової воєнної ліричності.
  - Зв'язок з наступним модулем про добу УНР і продовженням воєнної літературної традиції 1917–1921 рр.
  - Питання до студента: що спільного між стрілецькою лірикою і сучасними текстами Якимчук, Рибаченко та інших воєнних поетів?
