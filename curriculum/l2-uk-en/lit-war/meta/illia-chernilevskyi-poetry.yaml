slug: illia-chernilevskyi-poetry
title: 'Ілля Чернілевський: Поезія несправдженого майбуття'
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Мистецьке коріння та ранні роки'
  words: 400
  points:
  - Народження 10 червня 1991 року у Києві в мистецькій родині (батько — кінорежисер
    і поет Станіслав Чернілевський).
  - Творча атмосфера та інтелектуальне середовище, що вплинули на раннє формування
    особистості поета.
  - Вихід дебютної поетичної збірки «Розділимо простір» у 2011 році як старт літературного
    шляху.
- section: 'Вступ та контекст: II — Багатогранність таланту і професійний успіх'
  words: 450
  points:
  - Успішна багаторічна робота перекладачем для світових студій (Disney, Sony, Netflix),
    створення українськомовних адаптацій для хітів («Піноккіо», «Коти-аристократи»,
    «Міккі Маус»).
  - 'Діяльність як барда та композитора: здобуття Гран-прі на фестивалі «Ірпінський
    Парнас» за авторську пісню у 2019 році.'
  - 'Феномен невидимої культурної присутності: широке споживання текстів Чернілевського
    через якісний дубляж ще до його широкого визнання як самостійного автора.'
- section: 'Ліризм та війна: Аналіз збірки: I — Доброволець без досвіду'
  words: 450
  points:
  - 'Миттєва та радикальна реакція на вторгнення: добровільний прихід до військкомату
    24 лютого 2022 року без жодного попереднього військового досвіду.'
  - 'Бойовий шлях захисника: служба спочатку в лавах Територіальної оборони, а згодом
    — у 110-й окремій механізованій бригаді ЗСУ на Донецькому напрямку.'
  - Перетворення митця на воїна як свідомий акт громадянської відповідальності та
    безпосереднього захисту культури.
- section: 'Ліризм та війна: Аналіз збірки: II — Поетика бліндажів і контрастів'
  words: 500
  points:
  - Посмертний вихід підсумкової збірки «Я птах між тенет» (2023, видавництво «Білка»)
    як ключового документального свідоцтва війни.
  - Аналіз разючого зіткнення ліричної медитативності («надія у квіточці на бездоріжжі»)
    із жорсткою, окопною реальністю («нужнику будка пронизана кулями»).
  - 'Трансформація поетичної мови на фронті: набуття нею форм прямого, неприкритого
    свідоцтва про жахи війни («Життя, що шугнуло патроном в калюжу...»).'
- section: 'Метафорика втраченої весни: I — Філософія спокою в небезпеці'
  words: 450
  points:
  - 'Глибокий аналіз знакового вірша «Тягнеться тихо смужка світанку»: розкриття психологічного
    стану воїна-митця в екстремальних умовах.'
  - 'Філософське осмислення феномену стійкості та внутрішньої рівноваги: «Цей дивний
    настрой. Цей спокій у серці. / Що тільки сильніше росте в небезпеці.»'
  - Збереження людяності та пошук внутрішнього світла на постійній межі між життям
    і смертю.
- section: 'Метафорика втраченої весни: II — Обірваний політ'
  words: 450
  points:
  - Трагічна загибель поета 7 травня 2022 року під час мінометного обстрілу біля села
    Кам'янка Донецької області.
  - Аналіз символіки назви збірки «Я птах між тенет», що уособлює фатальність та надзвичайну
    крихкість мистецької душі в безжальних жорнах війни.
  - Осмислення загибелі Іллі Чернілевського не лише як особистої трагедії, але і як
    втрати величезного нереалізованого культурного потенціалу для України.
- section: 'Деколонізаційна перспектива: I — Зв''язок з Розстріляним Відродженням
    1930-х'
  words: 450
  points:
  - Проведення прямої історичної паралелі між розстрілами української інтелігенції
    у Сандармосі (1937) та вбивствами сучасних митців (2022).
  - Спростування російського імперського міфу про загибель діячів культури як «випадковість»
    або «супутні втрати» під час збройного конфлікту.
  - Констатація спланованого, тяглого історичного геноциду (Розстріляне Відродження
    2.0), що має на меті тотальне знекровлення інтелектуального та культурного потенціалу
    нації.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність та опір'
  words: 450
  points:
  - Життєвий та творчий шлях Чернілевського (який починав як російськомовний автор)
    як абсолютне руйнування наративу Кремля про «російськомовних українців», що чекали
    на окупацію.
  - 'Фундаментальна зміна культурної парадигми: перехід української нації від стану
    безборонної жертви (як у 1930-х) до свідомого та дієвого збройного опору агресору.'
  - 'Аналіз поетичного заповіту, що стверджує непохитну українську суб''єктність:
    «Ми знов переможемо. Я обіцяю.»'
- section: Підсумок та спадщина
  words: 400
  points:
  - 'Офіційна меморіалізація пам''яті: включення творів Іллі Чернілевського до рекомендаційних
    списків української літератури для школярів.'
  - Усвідомлення його спадщини як суворого документального свідоцтва непомірної ціни,
    яку платить українська нація за своє вільне культурне майбутнє.
  - Постать Чернілевського як потужний символ нового покоління митців-воїнів, що ціною
    власного життя захистили ідентичність і право України на існування.
