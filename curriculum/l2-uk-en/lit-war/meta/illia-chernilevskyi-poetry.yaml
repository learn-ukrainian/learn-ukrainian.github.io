slug: illia-chernilevskyi-poetry
title: 'Ілля Чернілевський: Поезія несправдженого майбуття'
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Мистецьке коріння та талант'
  words: 450
  points:
  - Народження у Києві (1991) в родині поета та кінорежисера Станіслава Чернілевського.
  - 'Багатогранність таланту: поет, бард, композитор, перекладач пісень для дубляжу
    світових кінохітів (Disney, Netflix).'
  - Перша збірка «Розділимо простір» (2011) та визнання на фестивалях авторської пісні.
- section: 'Вступ та контекст: II — Свідомий вибір добровольця'
  words: 450
  points:
  - 'Повномасштабне вторгнення: рішення йти до ТрО та ЗСУ (110 ОМБр) попри повну відсутність
    військового досвіду.'
  - Етичний і громадянський вибір митця у час екзистенційної загрози для нації.
- section: 'Ліризм та війна: Аналіз збірки: I — Історія видання «Я птах між тенет»'
  words: 500
  points:
  - Посмертна публікація збірки у видавництві «Білка» (2023 рік).
  - 38 текстів, у яких зібрано філософську лірику, роздуми про Батьківщину та любов.
  - Включення поезій Чернілевського до рекомендаційних списків для шкільної програми
    як визнання їхньої мистецької ваги.
- section: 'Ліризм та війна: Аналіз збірки: II — Поетика бліндажів'
  words: 600
  points:
  - Аналіз знакового вірша «Тягнеться тихо смужка світанку».
  - Контраст високої медитативної лірики з натуралістичними деталями фронтового побуту
    («кухлі», «бліндажик»).
  - 'Психологія солдата-поета: спокій у небезпеці, тваринні інстинкти поруч із надією
    («надія у квіточці на бездоріжжі»).'
- section: 'Метафорика втраченої весни: I — Символізм обірваного життя'
  words: 500
  points:
  - Символіка назви збірки «Я птах між тенет» як відображення митця, впійманого павутиною
    війни.
  - 'Мотив несправдженого майбуття: нездійснені проєкти, недописані сценарії, нестворені
    пісні.'
- section: 'Метафорика втраченої весни: II — Останній бій на Донеччині'
  words: 400
  points:
  - Обставини загибелі (7 травня 2022 року поблизу Кам'янки на Донеччині від мінометного
    обстрілу).
  - Трагедія втрати в контексті цілого покоління тридцятилітніх митців, чиє життя
    «шугнуло патроном в калюжу».
- section: 'Деколонізаційна перспектива: Зв''язок з Розстріляним Відродженням 1930-х'
  words: 600
  points:
  - 'Історична тяглість: паралелі між розстрілами української інтелігенції у Сандармосі
    (1937) та цілеспрямованим знищенням культурного шару у ХХІ столітті.'
  - Поняття «Недостріляного» або «Нового Розстріляного Відродження» — війна Росії
    як продовження геноцидної політики проти української культури.
- section: 'Деколонізаційна перспектива: Українська суб''єктність та опір'
  words: 500
  points:
  - Перехід від російськомовної творчості до збройної та вербальної боротьби за українську
    ідентичність.
  - 'Відмінність від 1930-х: сучасні митці не є безборонними жертвами режиму, вони
    мають зброю, армію і власну суб''єктність.'
  - Рядки «Ми знов переможемо. Я обіцяю.» як маніфест національної нескореності.
- section: Підсумок та спадщина
  words: 400
  points:
  - 'Пам''ять про Іллю Чернілевського: не лише як героя-захисника, а як потужного
    голосу сучасної літератури.'
  - Ціна, яку українська культура платить за право існувати і бути вільною.
