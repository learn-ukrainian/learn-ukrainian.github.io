slug: zhadan-internat-war
title: Zhadan Internat War
word_target: 4000
content_outline:
- section: 'Вступ: Війна як каталізатор ідентичності'
  words: 400
  points:
  - 'Історичний контекст роману: січень 2015 року, бої за Дебальцеве.'
  - Представлення головного героя, Павла Івановича, як символу «нейтральної» людини
    у стані війни.
  - 'Центральне питання твору: шлях від особистої байдужості до громадянської відповідальності.'
- section: 'Павло Іванович: анатомія трансформації'
  words: 600
  points:
  - 'Аналіз початкового стану героя: інфантилізм, спроба бути «поза політикою».'
  - Подорож за племінником як вимушений вихід із зони комфорту.
  - Ключові епізоди, що спричинили злам у світогляді Паші (зустрічі з військовими,
    цивільними, досвід насильства).
  - 'Фінальне прозріння: усвідомлення дому та своєї приналежності.'
- section: 'Символічний простір: метафора «Інтернату»'
  words: 500
  points:
  - Інтернат як буквальний простір покинутих дітей.
  - 'Розшифровка метафори: Донбас як «інтернат», регіон із втраченою суб''єктністю.'
  - '«Синдром інтернату» як діагноз постколоніальному суспільству: невкоріненість
    та очікування зовнішнього патронажу.'
- section: 'Проблема ідентичності: деконструкція «свого» і «чужого»'
  words: 600
  points:
  - 'Початкова позиція Паші: неспроможність ідентифікувати «своїх».'
  - Як війна руйнує ілюзію багатовекторності та змушує до чіткого вибору.
  - Аналіз діалогів та внутрішніх монологів, де відбувається переоцінка цінностей.
  - '[!decolonization] Відмова від радянського конструкту «братніх народів» через
    пряме зіткнення з агресією.'
- section: Мова як зброя та ідентичність
  words: 450
  points:
  - 'Ставлення героя до української мови на початку роману: професійний обов''язок,
    а не частина ідентичності.'
  - Як в умовах окупації мова стає лінією фронту і маркером приналежності.
  - '[!quote] Аналіз цитати про готовність «вбивати за мову», коли її забирають.'
- section: 'Поетика роману: естетика туману і розрухи'
  words: 550
  points:
  - 'Аналіз стилю: лаконічність, «телеграфна» проза, відсутність патетики.'
  - 'Пейзаж як активна дійова особа: образи туману, холоду, снігу та їх символічне
    значення.'
  - Фокус на тілесності та фізіології для передачі автентичності воєнного досвіду.
- section: «Інтернат» у світовому та українському контексті
  words: 400
  points:
  - Порівняльний аналіз з романом «Дорога» Кормака Маккарті.
  - Місце роману в традиції української воєнної прози.
  - 'Критична рецепція: від звинувачень у схематизмі до визнання «найважливішим романом
    про війну».'
- section: 'Підсумок: народження громадянина'
  words: 500
  points:
  - Фінал роману як відкрите питання, а не готова відповідь.
  - 'Спадщина твору: роман про дорослішання особистості та нації.'
  - Висновок про те, що вихід з постколоніального стану «інтернату» лежить через особистий
    вибір і взяття відповідальності.
