slug: war-lit-origins-2014
title: "Витоки воєнної літератури: 2014"
word_target: 4000
content_outline:
  - section: "Вступ та контекст: I — Від Майдану до війни"
    words: 400
    points:
      - "Хронологія подій: Євромайдан (листопад 2013), Небесна Сотня (лютий 2014), анексія Криму (березень 2014), початок бойових дій на Донбасі (квітень 2014)"
      - "Суспільний шок і потреба у словесному осмисленні нової реальності"
      - "Роль письменників як свідків і учасників — від есеїстів до добровольців"
  - section: "Вступ та контекст: II — Літературне поле напередодні 2014 року"
    words: 350
    points:
      - "Стан української літератури до 2014: постмодернізм, Жадан, Андрухович, Забужко — жодної воєнної тематики"
      - "Відсутність традиції воєнного письма в незалежній Україні"
      - "Радянська «лейтенантська проза» як чужа традиція: чужа мова, чужа ідеологія"
      - "2014 як абсолютна «точка нуль» для української воєнної літератури"
  - section: "Аналіз ключових творів: I — Антології Майдану"
    words: 450
    points:
      - "«Євромайдан: Хроніка відчуттів» (2014, ред. Василь Карп'юк) — есеї Прохаська, Жадана, Андруховича, Винничука; «книга емоцій», а не документалістика"
      - "«Небесна Сотня: антологія майданівських віршів» (квітень 2014) — 200+ авторів із шести країн, 400 сторінок, упорядник Леся Воронюк"
      - "Альманах «Майдан. (Р)еволюція духу» — 200 світлин, інтерв'ю, революційна поезія"
      - "[!quote] Антологія як перша літературна реакція на розстріл Небесної Сотні"
  - section: "Аналіз ключових творів: II — Перші голоси з фронту"
    words: 500
    points:
      - "Борис Гуменюк «Вірші з війни» (2014) — перша фронтова поезія незалежної України, написана в окопах під Пісками; наклад 10 000 на Форумі видавців"
      - "Сергій Жадан «Месопотамія» (2014) та «Життя Марії» (2015) — Харків між миром і війною; 60 віршів, написаних під час найзапекліших зіткнень"
      - "Facebook як нова літературна платформа: від посту до збірки в реальному часі"
      - "[!history-bite] Гуменюк — «перший фронтовий поет незалежної України»"
  - section: "Аналіз ключових творів: III — Проза свідчень та документалістика"
    words: 500
    points:
      - "Євген Положій «Іловайськ» (2015) — роман на основі ~100 інтерв'ю з учасниками Іловайської трагедії серпня 2014; «зіткнення цивілізацій»"
      - "Сергій Лойко «Аеропорт» (2015) — документальний роман про 240 днів оборони Донецького аеропорту; бестселер"
      - "Пальваль, Музика, Потєхін «Савур-Могила: Військові щоденники» — 320 сторінок свідчень оборони стратегічної висоти"
      - "[!context] Іловайський котел і Донецький аеропорт — дві знакові битви, що породили окремі літературні наративи"
  - section: "Аналіз ключових творів: IV — Есеїстика та рефлексія"
    words: 400
    points:
      - "Артем Чех «Точка нуль» (2017) — есеї інтелігента на передовій; «суб'єктивне письмо» і «авторська оптика»; 10 місяців у лавах ЗСУ"
      - "Олександр Вдовиченко «72: Записки комбата» — документальна проза офіцера"
      - "Еволюція від фіксації «по гарячих слідах» до художньої рефлексії"
      - "[!myth-buster] Воєнна література — не пропаганда: відсутність пафосу, ура-патріотизму; іронія та гумор як засоби виживання"
  - section: "Стилістика та мова: I — Жанрова палітра нового воєнліту"
    words: 400
    points:
      - "Класифікація авторів (Марина Рябченко): комбатанти, цивільні письменники, журналісти, аматори, капелани"
      - "Жанри: фронтова поезія, щоденник, есей, роман-свідчення, мелодрама, фантастика"
      - "Статистика: понад 1000 книг про війну з 2014 до 2022 (дані Ганни Скоріної), 120-130 видань на рік"
      - "Літературні премії: «Книжка року» (номінація «воєнна книга»), премія ім. В. Свідзінського"
  - section: "Стилістика та мова: II — Мова комбатантського письма"
    words: 350
    points:
      - "Автентична мова: суржик, армійський жаргон, мат — не вульгаризм, а літературний засіб"
      - "Фрагментарне письмо: стрес і травма диктують форму — потік свідомості, обірвані фрази"
      - "Іронія та гумор: Чех («світлий гумор прокладає стежку людяності»), Мартін Брест (72-га ОМБр)"
      - "Від Facebook-посту до збірки: демократизація літературного процесу"
  - section: "Деколонізаційна перспектива"
    words: 400
    points:
      - "Радянська «лейтенантська проза» як контрприклад: пропаганда, героїзація, цензура, комуністична ідеологія"
      - "Українська воєнна проза 2014+ як повна протилежність: без партійних рамок, без «обох сторін», із живою мовою"
      - "Українська суб'єктність: свідомий мовний вибір як акт деколонізації; подолання спадщини русифікації"
      - "[!decolonization] Від «радянського солдата» до українського добровольця — зміна суб'єкта оповіді як ключова деколонізаційна трансформація"
  - section: "Підсумок та спадщина"
    words: 350
    points:
      - "2014 як рік народження нової літературної традиції незалежної України"
      - "Академічна періодизація: фіксація (2014-2017), рефлексія (2018-2021), лавина (2022+)"
      - "«Воєнна література — тепер це і є укрсучліт» (Чітомо, 2023)"
      - "Вхід у трек LIT-WAR: від витоків (цей модуль) через фронтову прозу до повномасштабної війни"
