slug: yashchenko-donbas-stories
title: "Оповідання з Донбасу: Іван Ященко і Голоси Окупованого Краю"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Історико-культурне тло регіону'
    words: 500
    points:
      - Історичне різноманіття Донбасу до 2014 року та спростування імперського міфу
        про монолітний російськомовний регіон.
      - Схід України як 'складне переплетення людських доль' із глибоким українським
        корінням.
  - section: 'Вступ та контекст: II — Етнографічний вимір і злам 2014 року'
    words: 500
    points:
      - Роль автора як 'етнографа степу', що фіксує локальну ідентичність, традиції
        та побут.
      - 'Злам 2014 року: початок збройної агресії РФ, окупація Донецька та Луганська,
        поява нової хвилі літератури свідчення.'
  - section: 'Аналіз ключових творів: I — Травма втрати дому'
    words: 500
    points:
      - Фокус на документалізмі та безпосередня реакція на травму втрати дому.
      - Активне формування літературного дискурсу вимушених переселенців у 2014-2015
        роках.
  - section: 'Аналіз ключових творів: II — Життя в умовах гібридної війни'
    words: 500
    points:
      - Відображення повсякденного життя в умовах окупації та гібридної війни.
      - Фіксація долі людини на тлі воєнних дій і збереження локальної ідентичності.
  - section: 'Стилістика та мова автора: I — Синтез репортажності й художності'
    words: 500
    points:
      - Поєднання документалізму та репортажності з глибокою художністю тексту.
      - Створення специфічної риторики травми для передачі складного емоційного досвіду.
  - section: 'Стилістика та мова автора: II — Мовні особливості сходу'
    words: 500
    points:
      - Автентичні мовні особливості та їх роль у збереженні національної пам'яті.
      - Використання степової метафорики для відтворення духу регіону.
  - section: 'Деколонізаційна перспектива: I — Як цей автор руйнує імперські міфи'
    words: 500
    points:
      - Деконструкція радянських міфів про суто індустріальний Донбас та 'пролетарську
        романтику'.
      - Спростування пропагандистських наративів про 'Новоросію' та 'внутрішній конфлікт'.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
    words: 500
    points:
      - 'Повернення української суб''єктності: регіон як східне порубіжжя та невід''ємна
        частина України.'
      - Повернення власного голосу місцевим жителям як потужний акт культурного опору.
  - section: 'Підсумок та спадщина: I — Злам індустріального наративу'
    words: 500
    points:
      - Значення текстів для загальноукраїнського контексту пам'яті про війну.
      - Переосмислення ідентичності сходу, що посилилося після повномасштабного вторгнення
        2022 року.
  - section: 'Підсумок та спадщина: II — Сучасне значення та вплив'
    words: 500
    points:
      - Вплив автора на формування національної ідентичності та стійкої нації.
      - Етнографічне документування як критично важливий елемент для майбутніх поколінь
        (автор живий, тому акцент на триваючому впливі, а не посмертній спадщині).
