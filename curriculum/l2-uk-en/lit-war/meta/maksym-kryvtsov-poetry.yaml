slug: maksym-kryvtsov-poetry
title: "Максим Кривцов «Лось»: Поет, Що Загинув і Став Легендою"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Життєвий шлях Максима Кривцова'
    words: 500
    points:
      - 'Біографічна довідка: народження в Рівному (1990), формування особистості'
      - Участь у Революції Гідності як точка неповернення та світоглядна база
      - Походження позивного «Далі» (захоплення Сальвадором Далі та мистецтвом)
  - section: 'Вступ та контекст: Від Майдану до повномасштабного вторгнення'
    words: 500
    points:
      - 'Добровольчий рух 2014 року: перший бойовий досвід і формування світогляду
        воїна'
      - Повернення до лав ЗСУ (кулеметник) після 24 лютого 2022 року
      - Органічне поєднання ролі захисника, фотографа та письменника в одній особі
  - section: 'Аналіз ключових творів: Збірка «Вірші з бійниці»'
    words: 700
    points:
      - Вихід збірки у 2023 році та визнання її українським PEN однією з найкращих
        книг року
      - Концепт «бійниці» як оптичної лінзи, через яку поет дивиться на світ і війну
      - 'Маніфестарність передмови: запрошення читача до емпатії та співпроживання
        («Побудьте поруч»)'
  - section: 'Аналіз ключових творів: Екзистенційні та релігійні мотиви'
    words: 500
    points:
      - Десакралізація класичного релігійного образу і його нове набуття в окопних
        реаліях
      - 'Цитатний розбір метафори Бога: Бог як протеїновий батончик, Бог як вода,
        Бог як надія на повернення'
      - Екзистенційний вибір між буттям і небуттям на нулі
  - section: 'Стилістика та мова автора: Поєднання натуралізму й ліризму'
    words: 500
    points:
      - 'Специфіка авторського стилю: різкий контраст між металом війни та крихкістю
        життя'
      - Використання простих, буденних образів (чай, картопля, трава) для контрастування
        з руйнуваннями
      - Вміння знаходити красу («пострибунчик сонця») всередині апокаліптичних пейзажів
  - section: 'Стилістика та мова автора: Репортажність та документалістика'
    words: 500
    points:
      - 'Фотографічна оптика Максима Кривцова: вірш як зафіксований кадр дійсності'
      - Документалізм як спосіб збереження пам'яті про побратимів та простір
      - Відмова від надмірного пафосу на користь точної, чесної деталізації пережитого
  - section: 'Деколонізаційна перспектива: Як автор руйнує імперські міфи'
    words: 600
    points:
      - Деконструкція радянсько-російського міфу про «велику вітчизняну» мілітаристику
      - Спростування концепту солдата як сліпого інструмента чи гарматного м'яса
      - Презентація українського війська як зібрання вільних індивідів-інтелектуалів
  - section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
    words: 600
    points:
      - Текст як маніфестація глибокої суб'єктності українця, який свідомо приймає
        бій
      - Відмова від позиції віктимності (жертви) на користь позиції захисника цінностей
        вільного світу
      - Утвердження української культурної повноцінності навіть в умовах екзистенційної
        загрози
  - section: 'Підсумок та спадщина: Вплив на сучасну культуру'
    words: 600
    points:
      - Трагічна загибель 7 січня 2024 року як втрата масштабу нового Розстріляного
        Відродження
      - 'Посмертні державні та літературні відзнаки: премія Уласа Самчука, звання
        Героя України'
      - 'Подальше життя текстів у масовій культурі: пісні (Yurcash), читання, меморіалізація
        простору'
