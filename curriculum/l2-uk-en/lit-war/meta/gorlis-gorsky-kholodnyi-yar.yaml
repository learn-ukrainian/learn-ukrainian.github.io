slug: gorlis-gorsky-kholodnyi-yar
title: 'Юрій Горліс-Горський «Холодний Яр»: Літопис Антибільшовицького Опору'
word_target: 5000
content_outline:
- section: 'Вступ: Україна початку 1920-х років'
  words: 500
  points:
  - Поразка Директорії УНР та окупація України більшовиками.
  - Селянські повстання проти продрозверстки та комун.
  - 'Феномен Холодноярської республіки: держава в лісі.'
- section: 'Біографія автора: Юрій Горліс-Горський'
  words: 600
  points:
  - Офіцер армії УНР, хорунжий Холодноярської бригади.
  - Життя в підпіллі, арешти, симуляція божевілля, втеча.
  - Створення роману на еміграції (1934-1937) як виконання клятви пам'яті.
- section: 'Жанрова природа: Роман-документ'
  words: 700
  points:
  - Поєднання мемуарів, історичної хроніки та пригодницького роману.
  - Автобіографічність головного героя (Залізняка/Горського).
  - 'Стилістика репортажу з місця подій: динаміка, натуралізм, діалоги.'
- section: 'Образи повстанців: Лицарі Холодного Яру'
  words: 800
  points:
  - Отамани Василь Чучупака, Чорний Ворон, Мамай.
  - Дисципліна, ідеологія та психологія повстанців.
  - Трансформація селянина у воїна-месника.
- section: 'Поетика боротьби: Жорстокість і романтика'
  words: 600
  points:
  - Натуралістичні описи боїв та тортур.
  - 'Відсутність пафосу жертви: акцент на збройному опорі та гідності.'
  - Мотив «воля або смерть» як екзистенційний вибір.
- section: Сприйняття і вплив тексту на покоління
  words: 600
  points:
  - Величезна популярність у Галичині та на еміграції в 1930-х.
  - Вплив на формування ідеології ОУН та бійців УПА.
  - Заборона книги в СРСР та повернення в Україну у 1990-х.
- section: 'Деколонізаційний аспект: Деконструкція радянського міфу'
  words: 600
  points:
  - Спростування міфу про «бандитів-куркулів» (наратив радянської пропаганди).
  - Показ свідомого національно-визвольного характеру руху.
  - Холодний Яр як символ тяглості української військової традиції (від козаків до
    сучасності).
- section: 'Підсумок: «Холодний Яр» у сучасній війні'
  words: 500
  points:
  - Актуалізація тексту після 2014 року (назва 93-ї бригади ЗСУ).
  - Роман як підручник стійкості та партизанської тактики.
  - Місце Горліс-Горського в каноні української мілітарної літератури.
