slug: kalytko-borders-lit
title: Kalytko Borders Lit
word_target: 5000
content_outline:
  - section: 'Вступ: Голос покоління війни'
    words: 400
    points:
      - Місце Катерини Калитко в сучасному літературному процесі
      - 'Трансформація поетичного голосу: від ранньої лірики до поезії свідчення'
  - section: 'Контекст: Література як свідчення з 2014 року'
    words: 500
    points:
      - Вплив початку російсько-української війни на літературну парадигму
      - 'Письменник як літописець та свідок: відповідальність за збереження пам''яті'
  - section: 'Аналіз: Збірка «Ніхто нас тут не знає, і ми — нікого»'
    words: 600
    points:
      - Тематика внутрішнього переселення та втрати малої батьківщини
      - Поняття «дому» і його трансформація в умовах відчуження
      - 'Метафорика кордону: між своїми і чужими'
  - section: 'Аналіз: Збірка «Орден мовчальниць»'
    words: 600
    points:
      - 'Проблема висловлення травматичного досвіду: як говорити після катастрофи'
      - 'Голос і мовчання: подолання історичних та особистих травм'
      - Значення премії імені Тараса Шевченка (2023) за цю збірку
  - section: 'Аналіз: Поезія повномасштабного вторгнення'
    words: 600
    points:
      - Екстремальна прямота та оголеність мови після 24 лютого 2022 року
      - 'Називання зла своїм іменем: відмова від метафор на користь факту'
  - section: 'Стилістика: Метафізика тілесності і болю'
    words: 550
    points:
      - Тіло як картосхема травми та поле бою
      - Мотив шрамів, раненої землі та фізичного страждання як уособлення долі країни
  - section: 'Мова: Зміна лексикону в умовах війни'
    words: 500
    points:
      - 'Мілітаризація лексики: входження воєнної термінології у поетичний простір'
      - Мова як жива матерія, що реагує на біль і стає лінією оборони
  - section: 'Деколонізація: Руйнування імперських міфів'
    words: 500
    points:
      - Безкомпромісний розрив із концептом «братніх народів»
      - Критика ліберально-пацифістського підходу до мистецтва під час війни
  - section: 'Суб''єктність: Означення власних кордонів'
    words: 500
    points:
      - Українська суб'єктність через готовність боронити свій культурний і фізичний
        простір
      - Кордон не як межа, а як імунна система національної ідентичності
  - section: 'Підсумок: Документування національного досвіду'
    words: 350
    points:
      - Спадщина Катерини Калитко як фундаментальний літопис виживання
      - Вплив її поезії на формування новітньої української самосвідомості
