slug: yaryna-chornohuz-war
title: Yaryna Chornohuz War
word_target: 4000
content_outline:
- section: 'Вступ: Біографічний вимір та формування голосу'
  words: 350
  points:
  - Народження у Києві (1995) у мистецькій родині, класична освіта в НаУКМА.
  - Участь у Революції Гідності як точка відліку активної громадянської позиції.
  - Шлях від парамедика-волонтера до розвідниці Морської піхоти ЗСУ.
- section: 'Контекст: Література в умовах бойових дій'
  words: 350
  points:
  - Феномен сучасної ветеранської (комбатантської) літератури в Україні.
  - Писання 'тут і зараз' (в окопах, на ротаціях) як основа документальної та емоційної
    чесності.
  - Поєднання безпосереднього досвіду загрози життю з гуманітарною рефлексією.
- section: Збірка «Як вигинається воєнне коло»
  words: 400
  points:
  - Дебютна збірка (2020), присвячена пам'яті загиблого коханого Миколи Сорочука.
  - Осмислення досвіду втрати, болю та незворотних трансформацій особистості.
  - Метафора 'воєнного кола', що стирає межу між мирним і фронтовим світами.
- section: 'Збірка «[dasein: оборона присутності]»'
  words: 400
  points:
  - Друга збірка (2023) — поетичний щоденник із передової, відзначений Шевченківською
    премією.
  - Ущільнена метафорика, звернення до первісних стихій (земля, камінь, тиша).
  - Пошук нової мови для опису межових екзистенційних станів війни.
- section: Філософія Dasein у поезії
  words: 400
  points:
  - Переосмислення гайдеггерівського 'Dasein' як 'буття-на-війні'.
  - Військова служба як свідома 'оборона присутності' українців у світі.
  - Протистояння екзистенційній загрозі знищення з боку російського імперіалізму.
- section: Поетика та метафорика
  words: 450
  points:
  - Відмова від плакатного патріотизму на користь 'темної' та епічної образності ('темне
    сонце', 'пустеля висохлих риб').
  - 'Античний масштаб бачення сучасної війни: мотиви неминучості, стихійної сили.'
  - Аналіз ритміки та звукопису в умовах 'нечутної й звичної' небезпеки.
- section: Жіночий голос та тілесність на війні
  words: 450
  points:
  - Специфіка жіночого досвіду в епіцентрі насильства ('у кожній жінці живе солдатка...').
  - Тілесність як інструмент опору та подолання фізичних/психологічних меж.
  - Деконструкція патріархальних стереотипів про 'нежіноче обличчя війни'.
- section: Руйнування імперських міфів
  words: 400
  points:
  - Антитеза до радянського міфу про війну та наративу пасивного страждання (жертви).
  - Спростування російської зверхності через утвердження сили воїна-захисника.
  - 'Деколонізація пам''яті: відмова від віктимності на користь мілітарної гідності.'
- section: Українська суб'єктність та опір
  words: 400
  points:
  - 'Нова оптика: українці не об''єкт геополітики, а суб''єкт, що творить власну історію.'
  - Тотальний збройний опір як єдиний спосіб збереження національного 'Dasein'.
  - Кожен військовий як носій суб'єктності, що свідомо тримає лінію фронту.
- section: Вплив на сучасну літературу та визнання
  words: 400
  points:
  - Легітимізація комбатантської літератури як провідної частини сучасного українського
    канону.
  - Значення вручення Національної премії імені Тараса Шевченка (2024) діючій розвідниці.
  - 'Завдання нових високих стандартів поезії про війну: синтез документалістики та
    модернізму.'
