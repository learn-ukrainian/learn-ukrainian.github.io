slug: markus-infantry
title: "«Піхота»: Валерій Маркус і Проза Окопів"
word_target: 5000
content_outline:
  - section: Вступ та контекст
    words: 900
    points:
      - 'Життєвий шлях Валерія Маркуса: від десантника 25-ї ОПДБр у 2014 році до головного
        сержанта 47-ї ОМБр.'
      - Феномен української ветеранської (комбатантської) літератури нової хвилі як
        реакція суспільства.
  - section: Аналіз ключових творів
    words: 1250
    points:
      - 'Роман «Сліди на дорозі» (2018): автобіографічність, тематика подолання травми
        та дорослішання на війні.'
      - 'Інноваційна мультимедійність форми: використання QR-кодів для поєднання тексту
        з реальними відео та фото з передової.'
      - Екзистенційний вибір героя у критичних умовах бойових дій (Слов'янськ, Дебальцеве).
  - section: Стилістика та мова автора
    words: 1000
    points:
      - 'Концепт «окопної правди»: жорсткий реалізм, відмова від пафосу та літературних
        прикрас.'
      - Поєднання брутального фронтового побуту з глибоким філософським психологізмом.
      - 'Динаміка мови: як трансформується голос героя від юнака до загартованого
        ветерана.'
  - section: Деколонізаційна перспектива
    words: 1100
    points:
      - Руйнування радянського міфу про солдата як «гвинтика» та «гарматне м'ясо».
      - 'Українська суб''єктність: формування наративу свідомого, вільного воїна-інтелектуала.'
      - Протиставлення рабської ментальності ворога та української боротьби за власну
        ідентичність і гідність.
  - section: Підсумок та вплив
    words: 750
    points:
      - Трансформація української мілітарної культури через літературу та публічну
        діяльність автора.
      - Формування модерного іміджу ЗСУ (зокрема концепт бригади «Маґура»).
      - Значення книги для розуміння російсько-української війни сучасниками та прийдешніми
        поколіннями.
