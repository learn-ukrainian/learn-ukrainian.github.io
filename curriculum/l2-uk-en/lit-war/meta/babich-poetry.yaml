slug: babich-poetry
title: Babich Poetry
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Життєвий шлях Гліба Бабіча'
  words: 350
  points:
  - 'Біографія Гліба Бабіча: походження з Миколаєва та формування ідентичності на
    Півдні України'
  - Символізм позивного «Лєнтяй» та парадокс його надзвичайної активності
  - 'Довоєнний період: від підприємництва та музики до усвідомлення неминучості збройної
    боротьби'
- section: 'Вступ та контекст: Від волонтерства до фронту'
  words: 350
  points:
  - Добровільна мобілізація у 2014 році та початок військового шляху
  - Служба у 10-й окремій гірсько-штурмовій бригаді «Едельвейс» (шість бойових ротацій)
  - Трансформація безпосереднього бойового досвіду у літературну творчість
- section: 'Аналіз ключових творів: «Подай зброю» як національний гімн спротиву'
  words: 450
  points:
  - Історія створення гімну для 10-ї ОГШБр та співпраця з гуртом Kozak System
  - 'Аналіз тексту: семантика братерства, єдності та рішучості у боротьбі'
  - Риторичні прийоми мобілізації духу в умовах екзистенційної загрози
- section: 'Аналіз ключових творів: Неоміфологізм у пісні «Мольфар»'
  words: 450
  points:
  - Використання архетипу карпатського мольфара як метафори долі та провидіння на
    війні
  - Екзистенційне питання ціни перемоги та тривалості шляху («чого вартий мій шлях?»)
  - Синтез архаїчного міфу з реаліями сучасної траншейної війни
- section: 'Аналіз ключових творів: Значення збірки «Вірші та пісні»'
  words: 400
  points:
  - Огляд єдиної прижиттєвої книги поезій (2021 рік)
  - 'Структура збірки: баланс між суворою військовою лірикою та інтимними переживаннями'
  - Поезія як документ епохи та безпосереднє свідчення учасника подій
- section: 'Стилістика та мова автора: Фронтова естетика без зайвого пафосу'
  words: 400
  points:
  - Лаконізм, точність образів та відмова від штучної літературщини
  - Трансляція «окопної правди» через чоловічу, стоїчну інтонацію
  - Естетизація солдатського побуту без його романтизації чи прикрашання
- section: 'Стилістика та мова автора: Гумор та іронія як психологічний захист'
  words: 400
  points:
  - Використання солдатського гумору як інструменту подолання страху та смерті
  - Іронічний погляд на ворога та абсурд війни
  - Життєствердна тональність творів, що контрастує з трагізмом втрат
- section: 'Деколонізаційна перспектива: Руйнування міфу про «російськомовний Південь»'
  words: 400
  points:
  - Постать Бабіча як спростування імперського наративу про «Новоросію» та проросійський
    Південь
  - Вибір української мови як свідомий акт культурного та політичного спротиву
  - Інтеграція миколаївського досвіду в загальнонаціональний український контекст
- section: 'Деколонізаційна перспектива: Утвердження української суб''єктності у тексті'
  words: 400
  points:
  - Радикальна відмова від радянського та постколоніального віктимного дискурсу
  - Образ українського воїна як свідомого суб'єкта історії, який сам вирішує свою
    долю
  - 'Філософія переможця: перехід від оплакування втрат до активної помсти та захисту'
- section: 'Підсумок та спадщина: Роль у формуванні ветеранського братерства'
  words: 200
  points:
  - 'Громадська діяльність: співзаснування ГО «Res_Publica. Брати по Зброї»'
  - Вплив Бабіча на формування політично активного громадянського суспільства ветеранів
  - Перенесення фронтового братерства у цивільне життя
- section: 'Підсумок та спадщина: Безсмертя воїна-поета у національній пам''яті'
  words: 200
  points:
  - Осмислення героїчної загибелі поета у бою поблизу Ізюма (липень 2022 року)
  - Місце Гліба Бабіча в новітньому пантеоні української військової літератури
  - Тривале життя його слова у музиці, що продовжує надихати ЗСУ
