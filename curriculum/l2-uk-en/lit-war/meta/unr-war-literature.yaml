slug: unr-war-literature
title: "Доба УНР у Прозі та Поезії: Короткий Подих Незалежності (1917–1921)"
word_target: 5000
content_outline:
- section: 'Вступ: I — УНР як культурний проект'
  words: 500
  points:
  - 'Українська Народна Республіка (1917–1921): держава, що прожила чотири роки і залишила культурну спадщину на сторіччя.'
  - 'Парадокс: найбільший вибух творчої енергії — в умовах постійної війни на чотири фронти одночасно.'
  - 'Культурна програма УНР: Академія наук (1918), театри, видавництва — що встигли зробити за чотири роки.'
- section: 'Вступ: II — Письменники при владі і при зброї'
  words: 500
  points:
  - 'Грушевський, Франко, Рильський, Тичина — де вони стояли у 1917–1921 рр. і що писали.'
  - 'Солдат і поет: дихотомія, що в цей час зникає — Тичина у Роменській раді, Рильський в Романівці.'
  - 'Еміграція 1920–1921 рр.: хто виїхав і хто залишився — і як цей вибір визначив подальші долі.'
- section: 'Аналіз: Тичина — від «Сонячних кларнетів» до мовчання'
  words: 700
  points:
  - '«Сонячні кларнети» (1918): симфонія радості і тривоги на початку революції — де лірика виходить за межі будь-якого жанру.'
  - '«Плуг» і «Вітер з України» (1920, 1924): як Тичина стає совєтським поетом і що це означало для його голосу.'
  - 'Трагедія Тичини: «Не хочу бути трусом, але..» — де він замовкає і де його мовчання є красномовнішим за слова.'
- section: 'Аналіз: Рильський — класичний голос у час революції'
  words: 700
  points:
  - 'Молодий Рильський: неокласичні збірки 1918–1926 рр. — краса форми як опір хаосу.'
  - '"На білих островах" (1910) і "Під осінніми зорями" (1918): де поет залишається собою і де вимушений змінюватись.'
  - 'Рильський і «масовізм»: як поет виживає у добу, коли особисте переслідується як «буржуазне».'
- section: 'Аналіз: Проза революції — Яновський і Хвильовий'
  words: 600
  points:
  - '«Чотири шаблі» Яновського (1930) і «Синій листопад» Хвильового (1921): два способи зображення революційного хаосу.'
  - 'Романтика революції проти її розчарування: де в прозі 1920-х з''являється сумнів?'
  - 'Хвильовий і «Орієнтація на психологічну Європу»: культурна позиція як відповідь на воєнні роки.'
- section: 'Стилістика: Поетика руїни і відродження'
  words: 500
  points:
  - 'Образ Руїни у 1917–1921 рр.: свідома паралель з XVII ст. чи спонтанне перегукування?'
  - 'Символізм і реалізм у поезії доби: де вони конкурують і де синтезуються в єдиний стиль.'
  - 'Пісня і вірш: де народна традиція підживлює «нову» поезію і де штучно ламає її.'
- section: 'Деколонізаційна перспектива: Чотири роки, які треба помістити у центр'
  words: 500
  points:
  - 'Замовчування доби УНР у совєтських програмах: «петлюрівщина» як ярлик — і що ховалось за ним.'
  - 'Повернення після 1991: недостатнє і неповне — доба УНР досі не є «своєю» для масового уявлення.'
  - 'Паралель між 1917–1921 і 2014–2022: нова незалежність у часи нових воєнних загроз — де перегукування і де принципова різниця.'
- section: 'Підсумок: Спадщина доби'
  words: 500
  points:
  - Тексти доби УНР як джерело для сучасної культури — де вони прямо цитуються і де присутні підсвідомо.
  - Тичина і Рильський: два різних вибори — і обидва важливі для розуміння того, як виживає культура.
  - Зв'язок з наступними модулями про Другу світову — де 1939–1945 рр. є «продовженням» перерваної у 1921 р. боротьби.
