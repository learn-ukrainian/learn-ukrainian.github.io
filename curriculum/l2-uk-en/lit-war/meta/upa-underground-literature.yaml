slug: upa-underground-literature
title: 'Література Підпілля: Тексти і Поети Української Повстанської Армії'
word_target: 5000
content_outline:
- section: 'Вступ: Феномен літератури в бункерах (1940-1950-ті)'
  words: 500
  points:
  - Діяльність ОУН-УПА не лише як військової, але й культурної структури.
  - Створення підпільної преси (бофони, журнали, збірки).
  - 'Технічні умови: друкарні в криївках під землею.'
- section: 'Марко Боєслав (Михайло Дяченко): Поет-борець'
  words: 700
  points:
  - Головний поет УПА, ідеолог, редактор підпільного журналу «Чорний ліс».
  - 'Збірка «Непокірні слова»: пафос боротьби та трагізм приреченості.'
  - Біографія Боєслава та його загибель у бункері (1952).
- section: Поетика повстанської лірики
  words: 700
  points:
  - Мотиви героїчної смерті, самопожертви, любові до України.
  - Маршові ритми, звернення до зброї, неоромантичний стиль.
  - 'Автори: Василь Пашко (Лис), Микола Колотило та безіменні поети.'
- section: 'Проза підпілля: Мемуаристика та новелістика'
  words: 700
  points:
  - Спогади та звіти про бої як специфічний літературний жанр.
  - Твори Петра Полтави та Осипа Дяківа-Горнового.
  - Фіксація психологічного стану людини, яка роками живе під землею.
- section: 'Пісенна творчість: Від маршів до фольклору'
  words: 600
  points:
  - Пісні УПА як усна форма підпільної літератури («Лента за лентою»).
  - Анонімність авторів і народне поширення.
  - Трансформація поезії у пісню.
- section: Агітаційна література та публіцистика
  words: 600
  points:
  - Листівки, заклики, статті як зброя інформаційної війни.
  - Спрямованість на різні цільові групи (селян, червоноармійців, національні меншини).
  - Стилістика переконання та полеміка з радянською пропагандою.
- section: 'Деколонізаційний аспект: Мова як територія свободи'
  words: 600
  points:
  - Збереження незалежного українського слова в умовах тотального терору.
  - Література підпілля як абсолютна антитеза соцреалізму.
  - Руйнування радянського наративу про УПА через вивчення їхніх оригінальних текстів.
- section: 'Підсумок: Повернення з небуття'
  words: 500
  points:
  - Збереження текстів у бідонах під землею та передача на еміграцію.
  - Дослідження «Літопису УПА» в сучасній Україні.
  - Значення літератури підпілля для розуміння екзистенційного вибору людини на війні.
