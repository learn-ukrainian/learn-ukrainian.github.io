slug: bilozerska-diary
title: Bilozerska Diary
word_target: 5000
content_outline:
  - section: 'Вступ: Феномен Олени Білозерської'
    words: 450
    points:
      - 'Життєвий шлях Олени Білозерської: від журналістики та громадського активізму
        до снайперської гвинтівки на фронті'
      - Вихід друком книги «Щоденник нелегального солдата» (2017) як знакова подія
        для мілітарної літератури
      - Особистий приклад авторки як ілюстрація тотальної мобілізації українського
        суспільства у 2014 році
  - section: 'Контекст: Добровольчий рух 2014-2015 років'
    words: 650
    points:
      - 'Історичне тло початку російсько-української війни: стан армії та виникнення
        добровольчих формувань'
      - Роль ДУК «Правий сектор» у боях за Карлівку, Піски та інші населені пункти
        Донеччини
      - 'Концепт «нелегального солдата»: правовий вакуум, відсутність офіційного статусу
        та соціального захисту на початку війни'
  - section: 'Аналіз: Документалістика та репортажність'
    words: 550
    points:
      - Жанрова специфіка твору як органічного синтезу щоденникових записів, фронтового
        репортажу та мемуаристики
      - 'Документальна цінність тексту: журналістська скрупульозність у фіксації дат,
        локацій та учасників подій'
      - Відмова від художньої вигадки як головна світоглядна та літературна засада
        авторки
  - section: 'Аналіз: Тема жінки на передовій'
    words: 550
    points:
      - Практичне руйнування гендерних стереотипів щодо ролі жінки у війську та на
        лінії зіткнення
      - Боротьба за право воювати на рівні з чоловіками та доводити свій професіоналізм
        у бойових умовах
      - Специфіка жіночого погляду на сувору військову рутину, побутові труднощі та
        фронтове братерство
  - section: 'Аналіз: Психологія снайпера та моральний вибір'
    words: 550
    points:
      - Психологічний вимір та специфіка професії снайпера в умовах сучасної позиційної
        війни
      - Екзистенційні роздуми про життя і смерть, легалізація насильства заради захисту
        своєї країни
      - Внутрішня трансформація цивільної людини у холоднокровного та професійного
        військового
  - section: 'Стилістика: Окопна правда та фактографічність'
    words: 450
    points:
      - 'Свідома дегероїзація війни: зображення фронту як важкої, брудної та монотонної
        праці, позбавленої романтики'
      - 'Пильна увага до матеріального світу війни: зброя, екіпірування, тактика бою,
        облаштування позицій'
      - Щирість інтонації, відсутність штучного пафосу та надмірної емоційності в
        описах трагічних подій
  - section: 'Мова автора: Мілітарний сленг та чорний гумор'
    words: 450
    points:
      - Органічне використання мілітарного сленгу та професійної військової термінології
        добровольців
      - Роль фронтового чорного гумору та самоіронії як механізмів психологічного
        захисту від постійного стресу
      - 'Мовний синтез: поєднання вивіреного журналістського стилю із живою розмовною
        мовою окопів'
  - section: 'Деколонізація: Руйнування імперських міфів про війну'
    words: 450
    points:
      - Різке протиставлення радянському наративу про «Велику Вітчизняну війну» та
        її шаблонно-плакатним героям
      - Документальне розвінчування російської пропаганди, яка таврувала добровольців
        як «бандформування» чи «карателів»
      - Фіксація беззаперечних доказів російської військової агресії на Донбасі (зокрема,
        знахідок у Широкиному)
  - section: 'Деколонізація: Українська суб''єктність у тексті'
    words: 450
    points:
      - Усвідомлений вибір захищати Батьківщину як найвищий прояв національної та
        індивідуальної суб'єктності
      - Формування нової ідентичності українського воїна-добровольця, незалежного
        від державної бюрократії
      - 'Чітка артикуляція мети боротьби: війна не за ілюзорний «мир», а за перемогу
        і звільнення територій'
  - section: 'Підсумок: Вплив на сучасну ветеранську прозу'
    words: 450
    points:
      - Закріплення «Щоденника нелегального солдата» у каноні сучасної української
        літератури про російсько-українську війну
      - Вплив твору на формування суспільного сприйняття добровольчого руху та деміфологізацію
        війни
      - Виняткове значення книги як першоджерела для майбутніх дослідників, істориків
        та літературознавців
