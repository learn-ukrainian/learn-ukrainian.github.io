slug: amelina-new-renaissance
title: "«Нове Розстріляне відродження»: Амеліна про Письменників на Війні"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Феномен Нового Розстріляного відродження'
    words: 1000
    points:
      - 'Історична паралель: від Розстріляного відродження 1930-х до сучасного цілеспрямованого
        знищення росією українських митців.'
      - 'Біографічний портрет Вікторії Амеліної: шлях від IT-сфери до знакової письменниці
        та засновниці Нью-Йоркського літературного фестивалю.'
      - 'Трансформація після 24 лютого 2022 року: відмова від створення художньої
        прози заради роботи документалісткою воєнних злочинів у правозахисній організації
        Truth Hounds.'
  - section: 'Аналіз ключових творів: Проза як деконструкція імперської амнезії'
    words: 1000
    points:
      - 'Аналіз дебютного роману «Синдром листопаду»: концепт емпатії (Homo Compatiens)
        на тлі глобальних світових конфліктів та Революції Гідності.'
      - 'Деколонізаційне прочитання роману «Дім для Дома»: препарування радянської
        ментальності, нав''язаної ідентичності та привласнення чужого простору на
        прикладі життя родини радянського полковника у Львові.'
      - 'Роль пам''яті в прозі Амеліної: як українці повертають власну історію з-під
        уламків імперських наративів.'
  - section: 'Стилістика та мова автора: Від художньої метафори до поезії свідчення'
    words: 900
    points:
      - 'Радикальна зміна авторського стилю в умовах війни: неможливість писати розлогу
        прозу та перехід до короткої, сконцентрованої поетичної форми.'
      - 'Аналіз вірша «Тривога»: екзистенційний вимір колективної загрози та метафорика
        щоденного розстрілу («Наче щоразу ведуть на розстріл...»).'
      - 'Естетика та етика свідчення: чому пряме називання злочинів стало важливішим
        за літературну вигадку.'
  - section: 'Деколонізаційна перспектива: Cancel culture vs. Execute culture'
    words: 1100
    points:
      - Спростування західного міфу про «велику» та «позаполітичну» російську культуру.
      - 'Аналіз концепту Вікторії Амеліної «Cancel culture vs. Execute culture»: як
        дискусії про «скасування» російських творів на Заході контрастують із реальною
        російською політикою фізичного винищення (розстрілу) української культури.'
      - 'Українська суб''єктність: голос Амеліної як потужний інструмент культурної
        дипломатії, що доносив правду про справжню природу війни (культуроцид та геноцид).'
  - section: 'Підсумок та спадщина: Порятунок пам''яті як акт спротиву'
    words: 1000
    points:
      - 'Символічне значення знахідки щоденника дитячого письменника Володимира Вакуленка
        в деокупованій Капитолівці: акт передачі пам''яті та продовження боротьби.'
      - Трагічна загибель Вікторії Амеліної внаслідок російського ракетного теракту
        в Краматорську як страшне підтвердження тези про Нове Розстріляне відродження.
      - 'Вплив і спадщина: збереження зібраних доказів воєнних злочинів, міжнародні
        премії її імені та формування міцного фундаменту національної пам''яті та
        ідентичності.'
