slug: kotsyubailo-legacy-lit
title: Kotsyubailo Legacy Lit
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Формування особистості'
  words: 400
  points:
  - Походження з Івано-Франківщини та родинний зв'язок з традицією УПА.
  - Мистецький бекграунд (навчання на художника) і вибір позивного «Да Вінчі».
  - Революція Гідності як каталізатор громадянської позиції.
- section: 'Вступ та контекст: II — Добровольчий рух як феномен'
  words: 400
  points:
  - 'Історичний контекст 2014 року: добровольці як відповідь на екзистенційну загрозу.'
  - Шлях від бійця ДУК ПС до створення елітного підрозділу.
  - Да Вінчі як перший доброволець-Герой України прижиттєво.
- section: 'Аналіз ключових творів: I — Маніфести та інтерв''ю'
  words: 400
  points:
  - Інтерв'ю та промови Да Вінчі як зразки фронтової публіцистики.
  - 'Головний мотив текстів: відмова залишати війну дітям.'
  - Риторика відповідальності та безальтернативності перемоги.
- section: 'Аналіз ключових творів: II — Поетична та меморіальна рецепція'
  words: 400
  points:
  - Рефлексія загибелі Да Вінчі у текстах сучасних українських письменників (напр.
    есеї С. Жадана).
  - Меморіальні тексти побратимів та Аліни Михайлової як документальна література
    болю та сили.
  - Прощання з героєм як символічний момент національної консолідації в літературі.
- section: 'Стилістика та мова автора: I — Риторика воїна-громадянина'
  words: 400
  points:
  - 'Аналіз мілітарного дискурсу: лаконічність, відмова від штучного пафосу.'
  - Точність фронтової лексики та наказового стилю.
  - Специфіка військового братерства у мовленні командира.
- section: 'Стилістика та мова автора: II — Архетип новітнього козака'
  words: 400
  points:
  - Проєкція образу характерника на постать сучасного командира.
  - Зв'язок образу Да Вінчі з лицарським кодексом честі у текстах про нього.
  - Літературне осмислення тяглості української військової традиції.
- section: 'Деколонізаційна перспектива: I — Здобуття української суб''єктності'
  words: 400
  points:
  - Постать Да Вінчі як абсолютний вияв здатності нації до самовизначення.
  - Генерація власної військової еліти 'знизу' без державного примусу.
  - Переосмислення ролі армії у національній культурі.
- section: 'Деколонізаційна перспектива: II — Руйнування імперського міфу'
  words: 400
  points:
  - Спростування міфу про 'братній народ' через безкомпромісну збройну боротьбу.
  - Деконструкція російського наративу про 'незаконні збройні формування'.
  - Да Вінчі як антитеза імперському стереотипу покірного малороса.
- section: 'Підсумок та спадщина: I — Вплив на мілітарну культуру'
  words: 400
  points:
  - Батальйон «Вовки Да Вінчі» як еталон організації та бойового духу.
  - Мілітарна культура поваги до життя бійця та високих стандартів підготовки.
  - Інтеграція добровольчого етосу в регулярні Збройні Сили України.
- section: 'Підсумок та спадщина: II — Да Вінчі як національний символ'
  words: 400
  points:
  - Трансформація біографії Дмитра Коцюбайла у сучасний національний міф.
  - Місце в пантеоні українських героїв та вплив на майбутні покоління.
  - Життя героя як текст, що продовжує формувати націю.
