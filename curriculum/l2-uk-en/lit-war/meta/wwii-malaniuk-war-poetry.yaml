slug: wwii-malaniuk-war-poetry
title: "Євген Маланюк: Степова Елегія у Час Другої Руїни — Лірика Між Двома Окупаціями"
word_target: 5000
content_outline:
- section: 'Вступ: I — Маланюк і «степова» ідентичність'
  words: 500
  points:
  - 'Євген Маланюк (1897–1968): поет-емігрант, культурний критик і невтомний аналітик «малоросійства» — голос, що не замовк.'
  - '"Степова Еллада": концепція України як особливої цивілізації між Сходом і Заходом — не провінція і не «Малоросія».'
  - 'Еміграційна доля: Польща, Чехія, Германія, США — переміщення як умова існування і джерело ностальгії.'
- section: 'Вступ: II — Маланюк між поезією і есеїстикою'
  words: 500
  points:
  - 'Два виміри творчості: ліричний поет і безкомпромісний культурний критик — де вони підсилюють і де суперечать один одному.'
  - '"Малоросійство" (1954): найвідоміший есей Маланюка — де він критикує не росіян, а власний народ, і навіщо.'
  - 'Поезія як диагностика: де кожен вірш Маланюка є одночасно сповіддю і аналізом.'
- section: 'Аналіз: Рання лірика і образ батьківщини-зрадниці'
  words: 700
  points:
  - '"Стилет і стилос" (1925) і "Гербарій" (1926): ранні збірки між пристрастю і гіркотою.'
  - 'Україна як жінка-зрадниця: образ, що шокує, але що за ним стоїть — де поетична метафора і де глибша культурна позиція.'
  - '"Батьківщина і чужина": подвійна ідентичність поета між тугою і відштовхуванням.'
- section: 'Аналіз: Воєнна лірика 1939–1945 рр.'
  words: 700
  points:
  - 'Збірки воєнних років: «Земля і залізо» (1930) і «Перстень Полікрата» (1939) — де Маланюк передбачає і де реагує на катастрофу.'
  - '"Друга Руїна": як поет поєднує XVII ст. з XX ст. в єдиний наратив трагедії.'
  - 'Маланюк і МУР: де він підтримує «органічний стиль» і де іде власним шляхом.'
- section: 'Аналіз: «Малоросійство» як культурна патологія'
  words: 600
  points:
  - '"Малоросійство" (1954) як есей — і де ці самі ідеї присутні у ліриці, сховані за образами.'
  - 'Маланюк і Шевченко: де він захоплюється і де критикує — «Кобзар» як джерело і як проблема.'
  - '"Малоросійство" у XXI ст.: де ця концепція ще застосовна і де вона вже застаріла.'
- section: 'Стилістика: Класична дисципліна і пристрасна напруга'
  words: 500
  points:
  - 'Форма сонету і строфічна дисципліна: Маланюк між неокласицизмом і власним «степовим» стилем.'
  - 'Ритм і гнів: як напруга не руйнує форму, а укладається в неї — майстерність контролю.'
  - 'Лексика «степу»: де Маланюк знаходить слова, яких немає у «міському» поетичному словнику.'
- section: 'Деколонізаційна перспектива: Самокритика як сила'
  words: 500
  points:
  - 'Де Маланюкова критика «малоросійства» є деколонізаційним актом: назвати хворобу — перший крок до лікування.'
  - 'Ризик Маланюкового методу: де самокритика переходить у самознищення — і де читач має право не погодитися.'
  - 'Маланюк після 2014 р.: повернення з бібліотечних полиць до живого дискурсу — і нові прочитання старих текстів.'
- section: 'Підсумок: Маланюк у канону воєнної поезії'
  words: 500
  points:
  - Маланюк і Малий Сакральний Хор воєнної поезії — де він стоїть поруч з Оуеном, Тракліном, Целаном.
  - Вплив Маланюка на сучасну воєнну лірику — де Якимчук і Рибаченко свідомо продовжують «степову» традицію.
  - Питання для обговорення: чи «степова Еллада» є живою концепцією сьогодні чи лише поетичним архівом?
