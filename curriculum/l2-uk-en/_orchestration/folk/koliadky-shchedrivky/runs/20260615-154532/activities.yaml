- id: act-1
  type: ritual-sequencing
  title: Порядок творення світу
  instruction: Космогонічна колядка розгортає творення світу як послідовність подій.
    Постав їх у правильному порядку — від первісної води до зірок.
  items:
  - Із дна моря дістають дрібний пісок
  - Серед моря стоїть зелений явір
  - 'Світу ще немає: немає ні неба, ні землі'
  - З піску постає чорна земля
  - Три голуби радяться, як творити світ
  - Із золотого каменю з'являються небо, сонце, місяць і зорі
  correct_order:
  - 2
  - 1
  - 4
  - 0
  - 3
  - 5
  steps:
  - 'Світу ще немає: немає ні неба, ні землі'
  - Серед моря стоїть зелений явір
  - Три голуби радяться, як творити світ
  - Із дна моря дістають дрібний пісок
  - З піску постає чорна земля
  - Із золотого каменю з'являються небо, сонце, місяць і зорі
  model_answer: 'Світ виникає знизу вгору: спершу первісна вода й зелений явір, потім
    нарада трьох голубів, далі голуби дістають із дна пісок і камінь, і нарешті з
    них з''являються земля та небесні світила. Порядок не випадковий — він повторює
    логіку космогонії: від хаосу води до впорядкованого неба.'
- id: act-2
  type: motif-formula
  title: Формула космічної родини
  prompt: У щедрівці родину описано через небесні світила. Зістав кожен образ із членом
    родини за формулою тексту й поясни, навіщо це робиться.
  passage: Ясен місяць — пан господар, красне сонце — жона його, дрібні зірки — його
    дітки.
  text: Ясен місяць — пан господар, красне сонце — жона його, дрібні зірки — його
    дітки.
  formulas:
  - місяць = господар
  - сонце = господиня (жона)
  - зорі = діти
  answers:
  - місяць → господар
  - сонце → господиня
  - зорі → діти
  model_answer: 'Формула підносить родину до рівня космосу: господар стає місяцем,
    господиня — сонцем, діти — зорями. Це не прикраса, а структура: дім зображено
    як модель усього світу, а родину — як небесні світила. Саме ця тріада, за Поповичем,
    відрізняє українську колядку від образу єдиного домовладики.'
- id: act-3
  type: ritual-sequencing
  title: Сценарій колядування
  instruction: Колядування — це не лише пісня, а цілий обрядовий сценарій. Постав
    дії гурту в порядку, у якому вони відбуваються під час обходу хат.
  items:
  - Гурт співає величальну пісню господареві та його родині
  - Гурт приходить до хати й просить дозволу колядувати
  - Колядники співають побажання доброго врожаю й добробуту
  - Господар дякує й дає дар або частування
  correct_order:
  - 1
  - 0
  - 2
  - 3
  steps:
  - Гурт приходить до хати й просить дозволу колядувати
  - Гурт співає величальну пісню господареві та його родині
  - Колядники співають побажання доброго врожаю й добробуту
  - Господар дякує й дає дар або частування
  model_answer: 'Обрядовий сценарій сталий: прихід і дозвіл, величання, формула побажання,
    дар чи частування у відповідь. Саме ця структура, а не окрема пісня, забезпечувала
    обряду тривкість: доки був хто колядувати й кому давати дар, доти жанр мав сенс.'
- type: variant-comparison
  title: Колядка чи щедрівка?
  prompt: Порівняй два жанри зимового циклу за поданими ознаками й поясни, чому їх
    не можна плутати.
  features:
  - Час виконання
  - Адресат
  - Обрядовий цикл
  - Провідна образність
  variants:
  - name: Колядка
    Час виконання: різдвяний цикл
    Адресат: господар і його родина
    Обрядовий цикл: Різдво
    Провідна образність: величання дому, космогонічні мотиви
  - name: Щедрівка
    Час виконання: новорічний цикл, Щедрий вечір
    Адресат: господар, родина, іноді молода дівчина
    Обрядовий цикл: свято Маланки та Василя
    Провідна образність: приліт ластівки, майбутній врожай
  model_answer: Колядка належить різдвяному циклу й величає господаря; щедрівка —
    новорічному, від Щедрого вечора до свята Маланки, і часто містить образ майбутнього
    врожаю. Спільний у них обрядовий каркас, відмінні — час виконання та провідні
    мотиви. Сплутати їх легко, але це стирає різницю двох обрядових циклів.
- type: motif-formula
  title: 'Зачин і рефрен: магія повтору'
  prompt: Знайди у поданому тексті сталий зачин або рефрен і поясни його обрядову
    функцію, а не лише форму.
  passage: Щедрий вечір, добрий вечір, добрим людям на здоров'я! — цей рефрен повторюється
    після кожного рядка пісні.
  text: Щедрий вечір, добрий вечір, добрим людям на здоров'я!
  formulas:
  - 'рефрен: «Щедрий вечір, добрий вечір» після кожного рядка'
  - 'зачин: стала формула початку («Як ще не було початку світа»)'
  answers:
  - рефрен — «Щедрий вечір, добрий вечір, добрим людям на здоров'я!»
  - функція — повторюване побажання здоров'я й добра, що працює як заклинання
  model_answer: 'Рефрен «Щедрий вечір, добрий вечір» — це не приспів задля ритму,
    а повторюване побажання. Повтор у замовлянні діє як заклинання: що частіше звучить
    формула, то сильнішою вважали її магічну дію. Зачин же виводить слухача в час
    початку світу, коли все ще можливе.'
- type: comparative-study
  title: Зимове сонцестояння у різних народів
  prompt: Порівняй українські колядки й щедрівки з іншими обрядами зимового сонцестояння
    та визнач спільне й відмінне.
  task: Заповни порівняння за критеріями й сформулюй висновок про спільний солярний
    каркас і про те, що в українській традиції власне своє.
  criteria:
  - Астрономічна основа
  - Головний образ або герой
  - Обрядова дія
  - Зв'язок із урожаєм та родючістю
  items_to_compare:
  - Українські колядки та щедрівки
  - Скандинавський Йоль
  - Римські Сатурналії
  - Перська Ялда
  source_a: 'Українські колядки та щедрівки: космогонія, родина як модель космосу,
    засівання на врожай'
  source_b: 'Йоль, Сатурналії та Ялда: святкування повернення сонця після найкоротшого
    дня року'
  source_reading: 'Колядки й щедрівки належать до солярного циклу зимового сонцестояння.
    Спільний для багатьох народів астрономічний факт — найкоротший день і повернення
    світла — наповнюється щоразу власним матеріалом: образами, структурою родини,
    мовою.'
  model_answer: 'Спільний каркас усіх цих обрядів — зимове сонцестояння й перемога
    світла над темрявою. Але українська традиція наповнює його власним змістом: космогонічним
    міфом, образом родини як моделі космосу й аграрним засіванням. Схожість астрономічної
    основи не робить колядку «лише варіантом» чужого обряду — вона показує спільне
    коріння й окрему форму водночас.'
- type: critical-analysis
  title: Латинське чи автохтонне походження?
  context: Костомаров у «Слов'янській міфології» виводить слово «коляда» від латинського
    calendae. Сучасні етнолінгвісти вказують на можливе автохтонне коріння обряду.
  target_text: За версією Костомарова, назва «коляда» походить від латинського calendae
    — назви перших днів місяця в римському календарі.
  source_reading: Походження слова й походження обряду — два різні питання. Можна
    співати дуже давню пісню й називати її запозиченим словом. Чижевський пропонує
    бачити в жанрі нашарування різних стилістичних епох, а не єдиний прадавній моноліт.
  focus_points:
  - Чи доводить латинське походження слова, що й сам обряд запозичений?
  - Як версія Костомарова співвідноситься з гіпотезою про автохтонне коріння?
  - Де тут факт, а де інтерпретація дослідника?
  question: 'Оціни аргумент про латинське походження колядки: що він справді доводить,
    а чого ні?'
  questions:
  - Що саме доводить етимологія слова «коляда»?
  - Чому походження назви не дорівнює походженню обряду?
  - Як уникнути і романтизації архаїки, і її заперечення?
  model_answer: 'Етимологія від calendae доводить лише давній мовний контакт із римським
    світом, а не запозичення самого обряду. Назва й обряд можуть мати різний вік:
    пізня латинська етикетка цілком сумісна з давнім автохтонним дійством. Сильна
    позиція — розрізняти рівні: слово, текст, обряд. Костомарова варто читати як одну
    з гіпотез, а не як остаточний доказ; Чижевський додає обережність, нагадуючи про
    нашарування стилів.'
  model_answers:
  - Етимологія доводить мовний контакт, а не запозичення обряду.
  - Назва й обряд можуть мати різний вік, тож одне не випливає з іншого.
  - Чесно тримати обидві версії як гіпотези й спиратися на текст.
- type: essay-response
  title: Навіщо колядки сьогодні?
  prompt: Напиши есе про сучасне значення колядок і щедрівок. Чи це лише спадщина,
    яку зберігають, — чи живий інструмент ідентичності? Спирайся на матеріал уроку,
    зокрема на приклад колядування 2022–2025 років.
  min_words: 180
  source_reading: Колядки пережили християнізацію, навали й радянський атеїзм. У 2022–2025
    роках колядування звучало в укриттях і прифронтових селах, дістаючи нове значення.
    Жанр живий доти, доки має функцію в житті громади.
  rubric:
  - Чітка теза про сучасне значення жанру
  - Щонайменше два аргументи з матеріалу уроку
  - Згадка про зв'язок тексту й обрядової функції
  - Власна обґрунтована позиція, а не переказ
  peer_review_guidelines: Перевір, чи має есе чітку тезу, чи спирається на конкретні
    приклади з уроку й чи відрізняє автор спадщину-музей від живого обряду. Познач
    місця, де твердження не підкріплене текстом.
  model_answer: 'Сильне есе доводить, що колядка лишається живою саме тому, що зберігає
    функцію. Спадщина, яку лише консервують, перетворюється на музейний експонат;
    натомість колядування 2022–2025 років показало, що пісня про творення світу й
    перемогу світла здатна згуртовувати громаду в часи війни. Висновок: колядка —
    не пам''ятка минулого, а інструмент культурної ідентичності, що змінює значення
    разом із тими, хто співає.'
- type: performance
  title: Виконай фрагмент колядки
  prompt: Прочитай уголос фрагмент космогонічної колядки, зберігаючи її архаїчні форми
    й розмірений ритуальний ритм. Не виправляй давні слова на сучасні — це джерело.
  fragment: Як ще не було початку світа, тогди не було неба, ні землі, а но лем було
    синєє море, а серед моря зелений явір.
  self_check:
  - Чи зберіг я архаїчні форми (било, лем, нащада) без виправлень?
  - Чи витримав розмірений, урочистий темп замість побутового?
  - Чи відчутно у вимові, що це початок світу, а не звичайна розповідь?
  self_checklist:
  - Архаїчні форми збережено
  - Ритм урочистий і рівний
  - Інтонація відповідає космогонічному змісту
  show_record_button: true
  model_answer: 'Добре виконання тримає повільний, рівний ритм і не «осучаснює» текст.
    Архаїчні форми звучать як свідчення давності, а не як помилки. Інтонація передає
    урочистість початку світу: це не побутова оповідь, а ритуальне проголошення творення.'
- type: ritual-sequencing
  title: Обряд засівання на Новий рік
  instruction: Засівання — окрема дія новорічного циклу. Постав етапи обряду в правильному
    порядку.
  items:
  - Хлопці посипають зерном підлогу в хаті
  - Рано-вранці на Новий рік хлопці виходять обходити хати
  - Господарі дякують і дають частування
  - Засівальники промовляють побажання врожаю й добробуту
  correct_order:
  - 1
  - 0
  - 3
  - 2
  steps:
  - Рано-вранці на Новий рік хлопці виходять обходити хати
  - Хлопці посипають зерном підлогу в хаті
  - Засівальники промовляють побажання врожаю й добробуту
  - Господарі дякують і дають частування
  model_answer: 'Засівання відбувається вранці першого дня Нового року: хлопці обходять
    хати родичів і сусідів, посипають підлогу зерном, промовляють побажання врожаю
    й добробуту, а господарі дякують частуванням. Зерно тут — магічний знак майбутньої
