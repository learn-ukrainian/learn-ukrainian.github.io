module: a2-016
level: A2
sequence: 16
slug: checkpoint-genitive
version: 1.0.2
title: Контрольна робота — родовий відмінок
subtitle: Перевірка знань з модулів M08-M13 — прийменники, узгодження, множина, 
  ситуації
focus: review
pedagogy: Review
phase: A2.2 [Genitive Case Complete]
word_target: 1500
objectives:
- Learner can recognize and produce Genitive forms after all studied 
  prepositions (з/із/зі, від, після, для, без, біля, навпроти, коло, до).
- Learner can form correct Genitive noun phrases with adjective and pronoun 
  agreement (мого нового друга, цієї старої книги).
- Learner can produce Genitive plural forms for common nouns across all three 
  genders.
- Learner can apply Genitive structures in real-life contexts (shopping, health,
  directions, time expressions).
dialogue_situations:
- setting: 'Role-play: tour guide describing Kyiv landmarks — using all genitive patterns:
    Біля Софійського собору (m, cathedral). Без квитка (m, ticket) не можна. Для групи
    з десяти людей. До Хрещатика (m) п''ять хвилин.'
  speakers:
  - Гід
  - Туристи
  motivation: 'All genitive patterns: біля собору, без квитка, для групи, до Хрещатика'
content_outline:
- section: 'Частина 1: Впізнавання форм (Part 1: Recognizing Forms)'
  words: 450
  points:
  - 'Preposition identification: given a sentence, identify which preposition triggers
    the Genitive and what meaning it carries (source, purpose, direction, time, location).'
  - 'Form recognition: given noun phrases, identify whether they are correctly formed
    Genitives or contain errors.'
  - 'Covers all prepositions from M08-M10: з/із/зі, від, після, для, без, біля, навпроти,
    коло, до.'
  - 'Mixed examples from everyday contexts: shopping, health, directions, daily routines.'
- section: 'Частина 2: Вибір правильної форми (Part 2: Choosing the Correct Form)'
  words: 500
  points:
  - 'Adjective and pronoun agreement: choose the correct Genitive form for adjectives
    (нового/нової), possessives (мого/моєї), and demonstratives (цього/цієї) in context.'
  - 'Genitive plural selection: given a quantity word + noun, choose the correct Genitive
    plural ending (-ів, -ей, zero, or irregular).'
  - 'Preposition choice: choose між з vs. від, біля vs. навпроти, до vs. після in
    minimal-pair sentences.'
  - 'Error correction: find and fix the Genitive error in short sentences (wrong ending,
    wrong preposition, wrong agreement).'
- section: 'Частина 3: Вільне вживання (Part 3: Free Production)'
  words: 550
  points:
  - 'Sentence building: given a situation (at the market, at the doctor, giving directions),
    produce complete sentences using Genitive constructions.'
  - 'Dialogue completion: fill in both sides of a short dialogue using appropriate
    Genitive phrases — market scenario, asking for directions, describing a daily
    routine.'
  - 'Translation challenge: translate short English sentences into Ukrainian, requiring
    correct Genitive prepositions, agreement, and plural forms.'
  - 'Self-assessment checklist: can I use all 9+ prepositions with Genitive? Can I
    form Gen. plural for all genders? Can I agree adjectives and pronouns in Genitive?'
- section: Підсумок — Summary
  words: 200
  points:
  - "Genitive prepositions (з/із/зі, від, після, для, без, біля, навпроти, коло, до)
    and adjective/pronoun agreement: мого нового друга, цієї старої книги. Self-check:
    What's the difference between біля and навпроти? Describe the location of 3 objects
    in your room using Genitive prepositions."
  - "Genitive plural forms across all genders (-ів, -ей, zero endings) and real-life
    application. Self-check: How do you translate 'after these new books'? (після
    цих нових книг) Ask for directions to the nearest pharmacy using 'до'."
vocabulary_hints:
  required:
  - родовий відмінок (genitive case)
  - прийменник (preposition)
  - узгодження (agreement)
  - множина (plural)
  - однина (singular)
  - закінчення (ending)
  - перевірка (check, review)
  - помилка (mistake, error)
  recommended:
  - виправити (to correct)
  - впізнати (to recognize)
  - вибрати (to choose)
activity_hints:
- type: quiz
  focus: Identify the Genitive preposition and its function in context sentences
  items: 8
- type: fill-in
  focus: Complete sentences requiring Genitive singular and plural with correct 
    agreement
  items: 8
- type: match-up
  focus: Match situations (market, doctor, directions) to correct Genitive 
    expressions
  items: 8
- type: error-correction
  focus: Find and correct grammar errors in sentences covering module topics
  items: 6
references:
- title: Заболотний Grade 5-6
  notes: Comprehensive review of Genitive case across prepositions, agreement, 
    and plural
