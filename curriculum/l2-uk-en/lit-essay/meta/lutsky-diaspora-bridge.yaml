slug: lutsky-diaspora-bridge
title: Lutsky Diaspora Bridge
word_target: 4000
content_outline:
- section: 'Вступ: Постать Юрія Луцького'
  words: 350
  points:
  - Знайомство з Юрієм Луцьким (1919–2001) як фундатором західної україністики
  - 'Символізм ''мосту'': з''єднання діаспори, материкової України та західного академічного
    світу'
  - Родинне тло (син Остапа Луцького) та відчуття культурної спадкоємності
- section: Еміграція та становлення науковця
  words: 350
  points:
  - Повоєнна еміграція до Канади та виклики збереження ідентичності
  - Початок академічної кар'єри у Саскачеванському та Торонтському університетах
  - 'Формування місії: виведення україністики з ізоляції'
- section: Канадський інститут українських студій (КІУС)
  words: 400
  points:
  - 'Інституціоналізація науки: роль Луцького як директора КІУС (1976-1982)'
  - Перехід від емігрантського аматорства до строгих академічних стандартів Заходу
  - Заснування видавничих програм та підтримка перекладів
- section: '«Літературна політика в радянській Україні»: Передумови'
  words: 400
  points:
  - 'Вихід magnum opus у 1956 році: контекст Холодної війни'
  - 'Мета праці: розбити радянський міф про ''щасливий розвиток'' національних культур'
  - 'Доказова база: використання першоджерел для ілюстрації партійного диктату'
- section: '«Літературна політика в радянській Україні»: Аналіз репресій'
  words: 450
  points:
  - Детальний аналіз механізмів підпорядкування літератури (1917–1934)
  - Введення концепту культурного геноциду (Розстріляного відродження) в англомовний
    дискурс
  - Розкриття трагедії Хвильового, Куліша, Зерова для західного читача
- section: Дослідження творчості Пантелеймона Куліша
  words: 350
  points:
  - Куліш як інтелектуальний орієнтир для Луцького
  - Аналіз європейськості та складності Кулішевого світогляду
  - Повернення постаті Куліша в пантеон ключових українських мислителів
- section: 'Перекладацька діяльність: Мости між культурами'
  words: 400
  points:
  - Переклад як політичний акт і засіб культурної дипломатії
  - Аналіз англомовних видань 'Міста' Підмогильного та творів Івана Багряного
  - Труднощі адаптації українських реалій та стилістики для англомовної аудиторії
- section: Академічна мова та стиль Луцького
  words: 350
  points:
  - 'Риторика: відхід від емігрантського пафосу до стриманої наукової аргументації'
  - 'Стилістика його англомовних праць: об''єктивність, точність, фактологічність'
  - Як цей стиль сприяв легітимізації україністики у західних університетах
- section: Як Луцький руйнував імперські міфи про «провінційність»
  words: 400
  points:
  - 'Деколонізаційна перспектива: відмова від погляду на Україну через ''московські
    окуляри'''
  - Доведення урбаністичного та модерного характеру української літератури 1920-х
  - Протистояння русифікаторським наративам у західній славістиці
- section: 'Українська суб''єктність: Від об''єкта до суб''єкта історії'
  words: 400
  points:
  - 'Формування нового бачення: Україна як самостійний культурний гравець'
  - Аналіз 'суб'єктності' в есеїстиці та наукових працях Луцького
  - Значення його роботи для формування української ідентичності в діаспорі
- section: 'Підсумок: Спадщина Юрія Луцького'
  words: 350
  points:
  - Повернення праць Луцького в незалежну Україну після 1991 року
  - Вплив його методології на сучасне покоління українських літературознавців
  - Актуальність його деколонізаційних підходів сьогодні
