slug: chmut-institutions
title: Chmut Institutions
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Формування мілітарної публіцистики'
  words: 400
  points:
  - Передумови виникнення нової мілітарної публіцистики з початком війни у 2014 році.
  - Зміна суспільного запиту від емоційного репортерства до фахової військово-технічної
    аналітики.
- section: 'Вступ та контекст: Від волонтера до інституції'
  words: 350
  points:
  - 'Біографічний вимір: шлях Тараса Чмута від морпіха до керівника найбільшого мілітарного
    фонду.'
  - 'Еволюція риторики: перехід від індивідуального авторства до системного інституційного
    голосу.'
- section: 'Аналіз ключових творів: Статті на «Мілітарному»'
  words: 450
  points:
  - Огляд концепції та формату матеріалів на Українському мілітарному порталі.
  - Поєднання мілітарної фактології та публіцистичного осмислення.
- section: 'Аналіз ключових творів: Аналітичні звіти як маніфести'
  words: 450
  points:
  - Звіти фонду «Повернись живим» як зразки сучасної інституційної нон-фікшн есеїстики.
  - 'Риторика цифр: використання статистики та польових даних замість метафор для
    переконання аудиторії.'
- section: 'Аналіз ключових творів: Есеїстика цифрової епохи'
  words: 400
  points:
  - Роль подкастів (зокрема, «Фронтової поплави») як майданчика для концептуальних
    роздумів.
  - Перетворення усної розмови на впливовий цифровий текст, що формує порядок денний.
- section: 'Стилістика та мова автора: Технократичний прагматизм'
  words: 400
  points:
  - 'Характерний «холодний» стиль: відмова від віктимності, емоційного надриву та
    патетики.'
  - Фокус текстуального простору на алгоритмах дій, процедурах, KPI та ефективності.
- section: 'Стилістика та мова автора: Мілітарний новотвір'
  words: 350
  points:
  - Інтеграція професійної західної та української військової термінології у суспільний
    дискурс.
  - Як мова текстів формує нову «технічну» культуру читачів.
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 400
  points:
  - Деконструкція російського міфу про українську нездатність до системного державного
    будівництва.
  - Тексти як доказ спроможності керувати складними технічними й логістичними архітектурами.
- section: 'Деколонізаційна перспектива: Українська суб''єктність'
  words: 400
  points:
  - 'Витіснення патерналізму: утвердження тези про те, що безпека є справою самих
    українців.'
  - Формування літературного образу сучасного, озброєного, раціонального українця-суб'єкта.
- section: 'Підсумок та спадщина: Нова оборонна свідомість'
  words: 400
  points:
  - Значення інституційної есеїстики для дорослішання українського суспільства.
  - Закладення фундаменту для української школи мілітарної аналітики.
