slug: chmut-institutions
title: Chmut Institutions
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Формування мілітарної публіцистики'
    words: 500
    points:
      - Передумови виникнення нового жанру в умовах російсько-української війни з
        2014 року.
      - Зростання запиту українського суспільства на фахову, неупереджену експертизу
        замість емоційного контенту новин.
  - section: 'Вступ та контекст: II — Від волонтера до інституції'
    words: 500
    points:
      - 'Біографічний шлях Тараса Чмута: від засновника порталу та військовослужбовця
        до керівника потужної організації.'
      - Трансформація його публічного голосу від індивідуального блогера до виразника
        інституційної позиції.
  - section: 'Аналіз ключових творів: I — Статті на «Мілітарному»'
    words: 500
    points:
      - Жанрові особливості публікацій на «Українському мілітарному порталі».
      - Поєднання актуального новинного формату з глибокою військово-технічною аналітикою,
        що заклало основу нової української мілітарної журналістики.
  - section: 'Аналіз ключових творів: II — Аналітичні звіти як маніфести'
    words: 500
    points:
      - Тексти звітів та доповідей фонду «Повернись живим» як зразки сучасної нон-фікшн
        літератури оборонного спрямування.
      - Використання статистики, польових досліджень та фактів як головних риторичних
        аргументів.
  - section: 'Аналіз ключових творів: III — Есеїстика цифрової епохи'
    words: 500
    points:
      - Транскрипти, дописи у соцмережах та концептуальні тези з подкастів (наприклад,
        «Фронтова поплава») як форма усної та цифрової есеїстики.
      - Вплив цих форматів на формування загальнонаціональних наративів.
  - section: 'Стилістика та мова автора: I — Технократичний прагматизм'
    words: 500
    points:
      - 'Риторика «холодного розуму»: свідома відмова від надмірного літературного
        пафосу, трагізму чи «шароварщини».'
      - Фокус на ефективності, оптимізації процесів та вимірюваних результатах («Ефективність
        — це не про емоції»).
  - section: 'Стилістика та мова автора: II — Мілітарний новотвір'
    words: 500
    points:
      - Інтеграція фахової (зокрема, натівської) термінології у повсякденний дискурс
        (C4ISR, KPI, логістичні ланцюги).
      - Формування нового лексичного стандарту для обговорення питань безпеки та оборони.
  - section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
    words: 500
    points:
      - Системне спростування російського пропагандистського наративу про українську
        державу як нежиттєздатну або здатну лише на анархічну «отаманщину».
      - Демонстрація здатності українців розбудовувати складні, прозорі системи логістики
        та управління мільйонами доларів.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність'
    words: 500
    points:
      - 'Конструювання модерної національної суб''єктності: відхід від комплексу меншовартості.'
      - 'Наратив самозарадності: волонтери не замінюють державу, вони посилюють її
        там, де інституції ще слабкі.'
  - section: 'Підсумок та вплив: Нова оборонна свідомість'
    words: 500
    points:
      - Вплив інституційної есеїстики Чмута на суспільне сприйняття армії.
      - Зародження міцної традиції української прагматичної мілітарної аналітики як
        авторитетного джерела для західних think tanks.
