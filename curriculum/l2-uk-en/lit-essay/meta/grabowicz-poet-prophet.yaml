slug: grabowicz-poet-prophet
title: Grabowicz Poet Prophet
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Григорій Грабович та його доба'
    words: 400
    points:
      - Формування академічної оптики автора (Гарвардська школа, західна гуманітаристика)
      - Відсутність радянського ідеологічного тиску як передумова наукової свободи
      - Створення праці англійською мовою (1982) для введення Шевченка у світовий
        науковий контекст
  - section: 'Вступ та контекст: Стан шевченкознавства до 1982 року'
    words: 450
    points:
      - 'Домінування народницької парадигми: Шевченко як співець селянського горя'
      - 'Радянський редукціонізм: конструювання образу «марксиста-революціонера»'
      - Криза традиційного біографічного підходу та ігнорування міфосимволічного пласта
        текстів
  - section: 'Аналіз ключових творів: Концепція «Поет як міфотворець»'
    words: 500
    points:
      - Нове визначення поняття «міф» (не як вигадка, а як символічний всесвіт)
      - Шевченко як архітектор національного космосу, що стоїть поза лінійним історичним
        часом
      - Аналіз центральних архетипів у поезії Кобзаря (могила, степ, мати)
  - section: 'Аналіз ключових творів: Структуралістичний метод у дії'
    words: 500
    points:
      - Адаптація теорій Клода Леві-Строса для аналізу українського літературного
        матеріалу
      - 'Застосування концепції Віктора Тернера: протистояння ідеальної «communitas»
        та імперської «структури»'
      - Лімінальність як ключова категорія для розуміння Шевченкових героїв
  - section: 'Аналіз ключових творів: Подвійна структура творчості'
    words: 550
    points:
      - Радикальне розмежування спадщини на «пристосовану» та «непристосовану»
      - Україномовна поезія як зона вільного міфотворення та підсвідомої правди
      - Російськомовні твори (проза, щоденники) як фасад, адаптація до логіки імперського
        соціуму
  - section: 'Стилістика та мова автора: Академічна термінологія'
    words: 400
    points:
      - 'Модернізація літературознавчого апарату: введення структуралістської лексики'
      - Відмова від емоційно-патетичного тону на користь строгого аналітичного викладу
      - Вплив англомовної академічної традиції на архітектоніку тексту
  - section: 'Стилістика та мова автора: Полемічний дискурс'
    words: 400
    points:
      - Риторичні стратегії деконструкції застарілих стереотипів
      - Інтелектуальна дискусія з попередниками (від Куліша до радянських академіків)
      - 'Уникнення ідолопоклонства: критичний, але глибоко шанобливий погляд на об''єкт
        дослідження'
  - section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
    words: 500
    points:
      - Остаточний демонтаж міфу про російськомовну прозу як доказ «інтернаціоналізму»
      - Спростування марксистської тези про суто класову боротьбу в поезії Шевченка
      - Викриття імперського придушення через виявлення опозиції «священне (українське)
        — профанне/демонічне (імперське)»
  - section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
    words: 500
    points:
      - Міфотворчість як найвищий прояв культурної самостійності нації
      - Текст Шевченка як альтернативна реальність, що скасовує владу імперської історії
      - Відновлення ролі пророка як творця духовного імунітету українців
  - section: 'Підсумок та спадщина: Рецепція праці в Україні'
    words: 450
    points:
      - 'Культурний шок початку 1990-х: зіткнення традиціоналістів і модернізаторів'
      - Критика з боку консервативної частини діаспори та вітчизняних науковців
      - Поступове визнання праці як класики сучасного літературознавства
  - section: 'Підсумок та спадщина: Зміна парадигми шевченкознавства'
    words: 450
    points:
      - 'Вплив книги на нове покоління дослідників: відхід від позитивізму і біографізму'
      - 'Інтелектуальний ландшафт після Грабовича: заснування часопису «Критика»'
      - Присудження Шевченківської премії (2015) як офіційне визнання деколонізаційного
        значення праці
