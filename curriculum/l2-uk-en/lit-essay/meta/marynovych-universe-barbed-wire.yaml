  - Гельсінський рух як форма утвердження української політичної нації.
- section: 'Підсумок та вплив: Сучасне значення'
  words: 450
  points:
  - Актуальність ідей Мариновича для сучасного українського суспільства.
  - Уроки дисидентської етики в умовах повномасштабної російсько-української війни.
  - Значення 'Всесвіту за колючим дротом' для формування політики національної пам'яті.
