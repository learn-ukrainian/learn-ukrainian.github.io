  - 'Арешт 1977 року та вирок: ціна правозахисної діяльності.'
- section: 'Вступ та контекст: II — Епоха шістдесятників'
  words: 450
  points:
  - 'Історичне тло: перехід від хрущовської ''відлиги'' до брежнєвського ''застою''.'
  - Атмосфера тотального контролю КДБ та реакція інтелігенції на згортання свобод.
  - Місце мемуарів Мариновича серед інших дисидентських текстів епохи.
- section: 'Аналіз ключових творів: I — Анатомія тоталітаризму'
  words: 550
  points:
