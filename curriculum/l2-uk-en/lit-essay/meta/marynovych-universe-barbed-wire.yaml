content_outline:
- section: 'Вступ та контекст: I — Шлях дисидента'
  words: 450
  points:
  - 'Біографічні витоки Мирослава Мариновича: формування світогляду в умовах радянського
    конформізму.'
  - Створення Української Гельсінкської групи (1976) та вибір свідомого протистояння
