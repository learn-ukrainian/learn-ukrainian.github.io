  - Табори як справжнє обличчя російської імперської політики.
- section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
  words: 550
  points:
  - Українські політв'язні як активні борці (голодування, страйки), а не пасивні жертви
    режиму.
  - Збереження національної ідентичності та мови в умовах русифікаторського пресу
