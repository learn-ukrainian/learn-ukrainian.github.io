slug: shevelov-moscow-maros
title: Shevelov Moscow Maros
word_target: 4000
content_outline:
- section: 'Вступ та контекст: І — Постать Юрія Шевельова'
  words: 300
  points:
  - Представлення Юрія Шевельова (Юрія Шереха) як одного з найвидатніших інтелектуалів
    української еміграції та світового славіста.
  - 'Біографічний контекст: формування у Харкові часів Розстріляного відродження,
    досвід сталінського тоталітаризму та еміграція на Захід.'
  - Статус Шевельова як професора Колумбійського університету та його бескомпромісна
    позиція щодо російського імперіалізму.
- section: 'Вступ та контекст: ІІ — Історичне тло створення есею'
  words: 300
  points:
  - '1954 рік як апогей радянської пропаганди: помпезне святкування 300-річчя Переяславської
    ради.'
  - Офіційний міф про «возз'єднання України з Росією» та «Тези ЦК КПРС» як інструмент
    ідеологічного контролю.
  - Написання есею «Москва, Маросєйка» як глибоко аналітичної та антиімперської відповіді
    українського інтелектуала з вільного світу на радянську брехню.
- section: 'Аналіз ключових творів: І — Метафора Маросєйки'
  words: 400
  points:
  - Історичне значення московської вулиці Маросейка, де розміщувався Малоросійський
    двір для прийому українських посольств у XVII столітті.
  - Маросєйка як потужний літературний символ геополітичної наївності української
    еліти та її фатальних ілюзій щодо рівноправності з Москвою.
  - 'Переосмислення Переяслава: відмова від святкового наративу і сприйняття його
    як початку трагічної інкорпорації Гетьманщини.'
- section: 'Аналіз ключових творів: ІІ — Москва як зовнішній ворог'
  words: 400
  points:
  - 'Детальний розбір першого з ''трьох страшних ворогів'' українського відродження:
    російської імперської політики.'
  - Обґрунтування шевельовської тези про те, що історія відносин з Росією є історією
    безперервної і 'ще не закінченої' культурної та фізичної війни.
  - 'Механізми підкорення: вимивання українських інтелектуальних еліт до імперського
    центру та цілеспрямована маргіналізація Києва.'
- section: 'Аналіз ключових творів: ІІІ — Провінціалізм як внутрішня загроза'
  words: 400
  points:
  - Визначення провінціалізму не як територіальної проблеми, а як добровільного психологічного
    стану 'небажання мати власну думку'.
  - Аналіз звички української еліти спиратися на чужі зразки, постійно озиратися на
    метрополію та страждати від комплексу меншовартості.
  - Як провінціалізм змушує українців відмовлятися від творення універсальної високої
    культури, звужуючи її до рівня сільської етнографії.
- section: 'Аналіз ключових творів: ІV — Кочубеївщина як феномен зради'
  words: 400
  points:
  - 'Розбір третього ворога: ''комплексу Кочубея'', який відсилає до історичного доносу
    Василя Кочубея на гетьмана Івана Мазепу.'
  - 'Сутність ''кочубеївщини'' як найнебезпечнішої національної вади: готовності до
    взаємного знищення з використанням зовнішньої російської сили.'
  - Колабораціонізм як політична стратегія вирішення внутрішньоукраїнських конфліктів
    ціною здачі суверенітету.
- section: 'Стилістика та мова автора: І — Інтелектуальна риторика Шевельова'
  words: 300
  points:
  - 'Особливості есеїстичного стилю Юрія Шереха (Шевельова): холодна раціональність,
    європейська аналітичність та іронічність.'
  - Свідома відмова автора від традиційного сентиментального народництва та емоційного
    'плачу' над українською долею.
  - 'Концептуальна точність мислення: створення афоризмів, які стали ключовими політологічними
    термінами (як ''кочубеївщина'').'
- section: 'Стилістика та мова автора: ІІ — Есеїзм як зброя вільного мислення'
  words: 300
  points:
  - Значення вільної форми есею в умовах, коли в підрадянській Україні історія та
    література були паралізовані цензурою та соцреалізмом.
  - Есей як синтез історіософії, культурної критики та блискучої публіцистики, що
    дозволяє ставити найскладніші діагнози нації.
  - Полемічний характер тексту, який провокував дискусію та спонукав до критичного
    переосмислення власного минулого.
- section: 'Деколонізаційна перспектива: І — Руйнування міфу Переяслава'
  words: 400
  points:
  - Як Шевельов методично деконструює базовий імперський міф про 'споконвічне прагнення
    до братнього союзу'.
  - Викриття деструктивної та відверто колонізаторської природи російської присутності
    в Україні від XVII століття і до сучасності.
  - Переведення дискурсу Переяславської ради з площини 'історичного тріумфу' в площину
    катастрофи та втрати державної самостійності.
- section: 'Деколонізаційна перспектива: ІІ — Формування української суб''єктності'
  words: 400
  points:
  - 'Принцип відповідальності: Шевельов переносить центр ваги з критики зовнішнього
    окупанта (Москви) на аналіз внутрішньої слабкості самої нації.'
  - Нещадна критика комплексу жертви як способу зняти з себе історичну відповідальність
    за втрату державності.
  - Доведення того факту, що справжня деколонізація та політична суб'єктність починаються
    з подолання 'провінціалізму' та власної зрадницької 'кочубеївщини'.
- section: 'Підсумок та спадщина: І — Вплив есею на українську політичну думку'
  words: 200
  points:
  - Величезний резонанс есею 'Москва, Маросєйка' в середовищі української діаспори
    та його нелегальне поширення (самвидав) серед дисидентів в УРСР.
  - Значення тексту як одного з найважливіших політологічних і культурологічних маніфестів
    української думки XX століття.
- section: 'Підсумок та спадщина: ІІ — Актуальність концепції Шевельова сьогодні'
  words: 200
  points:
  - Пророча точність шевельовської концепції 'незакінченої війни' в реаліях сучасної
    повномасштабної російсько-української війни (після 2014 та 2022 років).
  - Сучасні прояви комплексу Кочубея (колабораціонізм) та життєва необхідність остаточно
    позбутися провінційності для збереження української держави.
