slug: hrytsak-history-ukraine
title: Hrytsak History Ukraine
word_target: 4000
content_outline:
- section: 'Вступ: Ярослав Грицак як публічний інтелектуал'
  words: 400
  points:
  - 'Біографічна довідка: народження, освіта (Львівський університет) та наукове становлення
    (УКУ)'
  - Концепт 'публічного історика' в умовах сучасної України
  - Роль Грицака в комунікації складних історичних тем для широкої аудиторії
- section: 'Контекст: Формування історика на перетині епох'
  words: 500
  points:
  - 'Методологічний зсув 1990-х: перехід від радянської марксистської моделі до західних
    теорій націотворення'
  - Вплив європейських та американських історіографічних шкіл на формування світогляду
    автора
  - Створення та редагування журналу 'Україна модерна' як майданчика нової гуманітаристики
- section: 'Аналіз ключових творів: «Нарис історії України» (1996)'
  words: 600
  points:
  - 'Революційність тексту: відмова від етнографічно-народницького наративу на користь
    аналізу суспільних структур'
  - Фокус на XIX–XX століттях як періоді формування модерної нації
  - Теза про Україну як 'перебільшений варіант європейської норми'
- section: 'Аналіз ключових творів: «Пророк у своїй вітчизні» (2006)'
  words: 600
  points:
  - Деконструкція радянського міфу про Івана Франка як 'каменяра' та 'соціаліста'
  - Франко як уособлення модерного європейського інтелектуала та 'націотворця' Галичини
  - Аналіз спільноти (мережі) навколо Франка як механізму кристалізації ідентичності
- section: 'Аналіз ключових творів: «Подолати минуле» (2021)'
  words: 600
  points:
  - 'Глобальний підхід: історія України не в ізоляції, а як частина світових макроекономічних
    та геополітичних процесів'
  - Вплив 'Колумбового обміну' та глобального ринку зерна на Східну Європу та закріпачення
    селян
  - Концепція 'подолання колії' (path dependence) задля успішної європейської інтеграції
- section: 'Стилістика та мова автора: Есеїзм та академічна легкість'
  words: 400
  points:
  - Поєднання суворої академічної аргументації з витонченим літературним стилем
  - Використання метафор, іронії та літературних ремінісценцій для полегшення рецепції
    складних текстів
  - Значення есеїстики Грицака для розвитку українського нон-фікшену
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 500
  points:
  - Системний демонтаж російської 'парасолькової' історії та міфу про 'спільну колиску'
  - Аргументація на користь цивілізаційної приналежності України до Центрально-Східної
    Європи
  - Протидія російській пропаганді інструментами раціональної історичної аргументації
- section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
  words: 500
  points:
  - 'Подолання віктимного наративу: перехід від історії ''жертв'' до історії ''діячів'''
  - Фокус на громадянській самоорганізації (від дисидентів до Майданів) як рушійній
    силі історії
  - Концепція нації як 'щоденного референдуму' (за Е. Ренаном) та громадянського вибору
- section: 'Підсумок та вплив: Формування модерної нації'
  words: 400
  points:
  - Вплив ідей Грицака на покоління сучасних інтелектуалів, політиків та громадянське
    суспільство
  - Актуальність його текстів під час повномасштабної російсько-української війни
  - 'Висновок: історія не лише як пам''ять про минуле, але й як інструмент проектування
    європейського майбутнього'
