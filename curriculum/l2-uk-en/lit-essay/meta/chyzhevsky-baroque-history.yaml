slug: chyzhevsky-baroque-history
title: Chyzhevsky Baroque History
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Інтелектуальна біографія Дмитра Чижевського'
  words: 400
  points:
  - Формування європейського вченого-полімата в умовах тривалої еміграції (Прага,
    Галле, Гейдельберг, США).
  - Глибоке засвоєння європейської філософської традиції (феноменологія Гуссерля)
    як міцний базис для літературознавства.
  - Категорична відмова від народницько-соціологічної парадигми (С. Єфремов, М. Грушевський)
    на користь «історії духу» (Geistesgeschichte).
- section: 'Вступ та контекст: Методологічний переворот в україністиці'
  words: 500
  points:
  - Інтелектуальне подолання комплексу меншовартості та відмова від погляду на літературу
    виключно як на інструмент соціально-класової боротьби.
  - Розуміння історії літератури як об'єктивного відображення зміни великих європейських
    культурних епох (Ренесанс, Бароко, Романтизм).
  - Повна реабілітація давньої української літератури (XI–XVIII ст.) як самостійного
    естетичного явища, а не просто історичного чи побутового документа.
- section: 'Аналіз ключових творів: Концепція «Українського літературного бароко»'
  words: 500
  points:
  - 'Визначення головних стильових домінант українського бароко: рух, динамізм, антитетичність,
    монументальність, складна гра зі словом.'
  - Бароко як унікальний синтез античного раціоналізму та напруженої християнської
    емоційності.
  - 'Центральна теза Чижевського: Бароко виступило найважливішою епохою, що назавжди
    сформувала національний характер («барокова людина»).'
- section: 'Аналіз ключових творів: Відкриття Івана Величковського та курйозної поезії'
  words: 400
  points:
  - Блискуче спростування міфу про курйозну поезію як ознаку інтелектуального «занепаду
    смаку» та провінційного графоманства.
  - Глибокий аналіз творчості І. Величковського («Зегар з полугарком», «Млеко») як
    філософської інтелектуальної гри європейського рівня.
  - Символізм і консептизм (concettismo) у складних формальних експериментах барокових
    авторів (раки літеральні, акровірші).
- section: 'Аналіз ключових творів: Філософія серця та бароковий світ Григорія Сковороди'
  words: 500
  points:
  - Сковорода як останній і найвидатніший мислитель епохи українського бароко, а не
    примітивний «перший революціонер».
  - Аналіз дуалістичної картини світу філософа (світ невидимий і видимий, макрокосм
    і мікрокосм).
  - Студіювання кордоцентризму («філософії серця») як онтологічної основи української
    ментальності за Дмитром Чижевським.
- section: 'Стилістика та мова автора: Науковий апарат та термінологія'
  words: 400
  points:
  - Цілеспрямоване введення в український гуманітарний дискурс передової європейської
    термінології.
  - Органічне поєднання глибокої, академічної ерудиції з есеїстичною легкістю та прозорістю
    викладу матеріалу.
  - Унікальне вміння Чижевського робити надзвичайно складні філософські концепції
    точним інструментом літературного аналізу.
- section: 'Стилістика та мова автора: Формальний та структуралістський підходи в
    есеїстиці'
  words: 400
  points:
  - Новаторська увага до звукопису (алітерації, асонанси), метричного ритму та синтаксичної
    побудови давніх текстів.
  - Ретельний аналіз текстуальних мікроструктур як головний ключ до розуміння глобального
    світогляду автора.
  - 'Застосування формалістського підходу: форма сама по собі є носієм глибокого філософського
    смислу.'
- section: 'Деколонізаційна перспектива: Європейський вектор проти імперської провінціалізації'
  words: 400
  points:
  - 'Фундаментальна деконструкція імперського міфу: українська література XVII–XVIII
    ст. ніколи не була «провінційною» чи вторинною.'
  - Доведення органічної приналежності України до загальноєвропейського культурного
    процесу (постійний вплив латинської, польської, західноєвропейської традицій).
  - Визначення об'єктивної ролі Києва як потужного донора барокової культури для культурно
    ізольованої Московії.
- section: 'Деколонізаційна перспектива: Українська суб''єктність в епоху бароко'
  words: 300
  points:
  - Категоричне відкидання імперської тези про культурний «розрив» або «пустку» між
    Київською Руссю та І. Котляревським.
  - Діяльність Києво-Могилянської академії та козацькі літописи розглядаються як безперечні
    прояви високої національної суб'єктності.
  - Позиціонування бароко як епохи, коли Україна мала власний потужний і незалежний
    інтелектуальний голос у Східній Європі.
- section: 'Підсумок та спадщина: Вплив на сучасне літературознавство'
  words: 200
  points:
  - Базове, фундаторське значення праць Чижевського для наступних поколінь дослідників
    (напр., Валерій Шевчук, Леонід Ушкалов).
  - Остаточне й безповоротне закріплення самостійного наукового концепту «українське
    бароко» у світовій славістиці.
  - Екзистенційне значення методологічної спадщини вченого для культурної самоідентифікації
    та деколонізації сучасної України.
