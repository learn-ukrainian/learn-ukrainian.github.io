slug: dontsov-nationalism
title: Dontsov Nationalism
word_target: 5000
content_outline:
  - section: 'Вступ: Історичний контекст 1920-х років'
    words: 500
    points:
      - Поразка Визвольних змагань 1917–1921 рр. та крах демократичних ілюзій
      - Потреба нової, безкомпромісної ідеологічної платформи для нації
  - section: 'Вступ: Публікація та резонанс монографії'
    words: 400
    points:
      - Вихід книги у Жовкві (1926) у друкарні отців Василіян
      - Поляризація суспільства: захоплення молоді та критика поміркованих легалістів
  - section: 'Аналіз: Критика «українського провансальства»'
    words: 600
    points:
      - Перша частина твору: нищівна критика драгоманівщини та народництва
      - Провансальство як колоніальний синдром і психологія меншовартості
      - Відкидання легалізму та віри в еволюційний компроміс з імперіями
  - section: 'Аналіз: Доктрина «чинного націоналізму»'
    words: 600
    points:
      - Друга частина: націоналізм не як партійна програма, а як світогляд
      - Волюнтаризм, ірраціоналізм та концепція «волі до життя і експансії»
      - Роль фанатизму та догматизму у мобілізації національної енергії
  - section: 'Аналіз: Формування «людини нового духу»'
    words: 500
    points:
      - Концепція «ініціативної меншості» як авангарду нації
      - Протиставлення лицарського героїзму масовій пасивності
      - Культ самопожертви та активної, часто безкомпромісної дії
  - section: 'Стилістика: Риторична стратегія та мова'
    words: 500
    points:
      - Полемічна, агресивна та глибоко метафорична мова автора
      - Жанрові особливості: перетин політичного трактату та літературного есе
      - Вплив риторичної форми на емоційне й підсвідоме сприйняття тексту
  - section: 'Деколонізаційна перспектива: Радикальний розрив з Москвою'
    words: 550
    points:
      - Обґрунтування абсолютного політичного й культурного сепаратизму від Росії
      - Руйнування міфів про «братні народи» та небезпека будь-якого союзу
  - section: 'Деколонізаційна перспектива: Українська суб''єктність'
    words: 500
    points:
      - Перехід нації від об'єкта впливу до агресивного суб'єкта історії
      - Відмова від статусу жертви на користь міфології власної сили
  - section: 'Підсумок: Вплив на покоління борців'
    words: 450
    points:
      - Ідеологічний фундамент для створення та розбудови ОУН
      - Формування психології та світогляду покоління вояків УПА
  - section: 'Спадщина: Сучасне переосмислення'
    words: 400
    points:
      - Пророчий вимір праці в контексті сучасної війни за незалежність
      - Розрізнення антиколоніальної цінності тексту та його дискусійних авторитарних
        рис
