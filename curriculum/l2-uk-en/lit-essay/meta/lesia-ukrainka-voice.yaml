slug: lesia-ukrainka-voice
title: Lesia Ukrainka Voice
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Життєвий і творчий шлях'
    words: 500
    points:
      - Родина Косачів-Драгоманових як осередок української інтелектуальної аристократії
      - Освіта, поліглотність та формування пан'європейського світогляду
      - Хвороба як виклик і гасло 'Contra spem spero' — формування вольового характеру
  - section: 'Вступ та контекст: Європейський модернізм'
    words: 500
    points:
      - Подолання українською літературою вузького етнографічного народництва
      - Місце Лесі Українки в парадигмі європейського неоромантизму та символізму
  - section: 'Аналіз ключових творів: «Лісова пісня»'
    words: 600
    points:
      - Драма-феєрія як синтез фольклорної міфології та екзистенційної філософії
      - Антагонізм Мавки (духовність, свобода) та Килини (утилітаризм, обмеженість)
      - Трагедія роздвоєності Лукаша та мотив безсмертя істинної любові й творчості
  - section: 'Аналіз ключових творів: Інтелектуальна драма'
    words: 800
    points:
      - '«Кассандра»: трагедія пророка, що знає правду, яку суспільство відкидає (алюзія
        на долю української еліти)'
      - '«Одержима»: конфлікт християнської догми та особистісного почуття любові
        й ненависті'
      - '«Бояриня»: жорстка критика національної пасивності, колабораціонізму та московського
        деспотизму'
  - section: 'Стилістика та мова автора: Неоромантизм і символізм'
    words: 500
    points:
      - Культ сильної, 'одержимої' ідеєю особистості, що протистоїть пасивній більшості
      - Використання глобальних світових сюжетів для рефлексії над українською проблематикою
  - section: 'Стилістика та мова автора: Інтелектуалізм та ритміка'
    words: 500
    points:
      - 'Переосмислення української поетичної мови: від лірики до складної поліфонічної
        драми'
      - 'Новаторство у віршуванні: білий вірш, вільна ритміка, філософський діалог'
  - section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
    words: 500
    points:
      - Спростування радянського міфу про 'хвору революціонерку-демократку'
      - Аналіз концепції О. Забужко ('Notre Dame d’Ukraine') про аристократизм та
        лицарство духу Лесі Українки
  - section: 'Деколонізаційна перспектива: Українська суб''єктність'
    words: 600
    points:
      - Творчість Лесі Українки як акт подолання колоніального комплексу меншовартості
      - 'Відмова від імперського центру: інтеграція українського слова у світову культуру
        на рівних правах'
  - section: 'Підсумок та спадщина: Феміністичний вимір'
    words: 250
    points:
      - 'Образ ''Нової жінки'' в українській літературі: інтелектуалка, здатна до
        самостійного етичного вибору'
      - Суб'єктність жіночих персонажів (Міріам, Кассандра, Оксана)
  - section: 'Підсумок та спадщина: Значення для сучасності'
    words: 250
    points:
      - Вплив Лесі Українки на дисидентів-шістдесятників та сучасних митців
      - Актуальність її безкомпромісної позиції та інтелектуальної зброї під час сучасної
        війни
