slug: sverstiuk-cathedral
title: "Євген Сверстюк: «Собор у риштованні» і Дисидентська Есеїстика"
word_target: 5000
content_outline:
  - section: 'Вступ: Постать Євгена Сверстюка та рух шістдесятників'
    words: 450
    points:
      - Євген Сверстюк як провідний інтелектуал, філософ і моральний авторитет покоління
        шістдесятників.
      - Формування світогляду автора, поєднання християнської етики та національної
        свідомості.
      - Місце есеїстики в українському літературному процесі другої половини ХХ століття.
  - section: 'Контекст: Ідеологічна кампанія проти роману Олеся Гончара'
    words: 500
    points:
      - Публікація роману «Собор» (1968) та його резонанс в українському суспільстві.
      - Агресивна реакція партійної номенклатури (роль Олексія Ватченка).
      - Заборона твору, вилучення з бібліотек та атмосфера суспільного залякування.
  - section: 'Аналіз есею: «Собор у риштованні» як філософський маніфест'
    words: 550
    points:
      - Написання есею (1970) та його феномен у системі українського самвидаву.
      - 'Трансформація жанру: від літературної рецензії до екзистенційного та громадянського
        маніфесту.'
      - Співвідношення художнього світу роману Гончара та філософської рефлексії Сверстюка.
  - section: 'Аналіз есею: Проблема історичної пам''яті та тяглості поколінь'
    words: 550
    points:
      - Козацький собор як архітектурний шедевр і символ історичної тяглості нації.
      - Критика феномену «безбатченків» та руйнівної психології пристосуванців.
      - 'Значення пам''яті для виживання нації: «людина без коріння» в тоталітарній
        системі.'
  - section: 'Аналіз есею: Духовність проти радянського матеріалізму'
    words: 500
    points:
      - Протиставлення вічних моральних цінностей утилітарному радянському «прогресу».
      - Концепти «екології природи» та «екології душі» в тексті Сверстюка.
      - Ідея побудови невидимого духовного собору в кожній людині.
  - section: 'Стилістика: Інтелектуальна есеїстика як форма спротиву'
    words: 450
    points:
      - 'Специфіка есеїстичного стилю Сверстюка: глибокий психологізм та публіцистична
        пристрасність.'
      - Есеїстика як простір інтелектуальної свободи, непідконтрольний радянській
        цензурі.
      - Майстерність аргументації та діалогічність тексту.
  - section: 'Стилістика: Риторика, іронія та біблійні мотиви тексту'
    words: 450
    points:
      - Насиченість тексту біблійними алюзіями, що підсилюють етичний вимір твору.
      - Тонка іронія як інструмент деконструкції офіціозного радянського «новоязу».
      - Багатство мови та метафорики Сверстюка як доказ зрілості української літературної
        думки.
  - section: 'Деколонізаційна перспектива: Руйнація імперського наративу'
    words: 500
    points:
      - Викриття лицемірства імперської політики знищення українських святинь під
        виглядом «атеїзму».
      - Спростування міфу про «віджилу патріархальщину» української історії.
      - Деконструкція імперського наративу про другорядність української культури.
  - section: 'Деколонізаційна перспектива: Захист української суб''єктності'
    words: 550
    points:
      - Перенесення фокусу з класової парадигми на право нації мати власну сакральну
        географію.
      - Захист гідності та національної свідомості в умовах системної русифікації
        та колоніального тиску.
      - Есей як потужний акт інтелектуальної самостійності та утвердження української
        суб'єктності.
  - section: 'Підсумок та спадщина: Вплив на дисидентський рух та сучасність'
    words: 500
    points:
      - 'Трагічні наслідки для автора: арешт (1972) та репресії за «антирадянську
        агітацію».'
      - Роль есею у формуванні ідеології правозахисного та дисидентського руху 1970-1980-х
        років.
      - Актуальність ідей Євгена Сверстюка в XXI столітті в контексті збереження української
        ідентичності.
