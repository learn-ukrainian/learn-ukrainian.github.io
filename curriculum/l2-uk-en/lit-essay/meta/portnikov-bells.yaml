slug: portnikov-bells
title: Portnikov Bells
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Формування світогляду Портникова'
    words: 450
    points:
      - Інтелектуальне становлення Віталія Портникова
      - 'Жанрова специфіка його есеїстики: синтез журналістики, історії та літератури'
  - section: 'Вступ та контекст: II — Історичний фон трилогії'
    words: 500
    points:
      - Місце «Дзвонів Майдану» у трилогії (після «Богородиця у синагозі» та «Тюрма
        для янголів»)
      - Політична криза 2011-2013 років як передумова суспільного вибуху
  - section: 'Аналіз ключових творів: I — «Дзвони Майдану» як літопис'
    words: 700
    points:
      - Хронологія Революції Гідності крізь призму есеїстики автора
      - Майдан не як емоційний бунт, а як закономірний цивілізаційний вибір
  - section: 'Аналіз ключових творів: II — Публіцистика як інструмент фіксації'
    words: 550
    points:
      - 'Осмислення періоду 2014-2018 років: війна та державне будівництво'
      - Трансформація українського суспільства в умовах збройної агресії
  - section: 'Стилістика та мова автора: I — Риторичні стратегії'
    words: 450
    points:
      - Іронія та аналітична холодність як фірмові прийоми Портникова
      - Використання європейських історичних паралелей для пояснення українських подій
  - section: 'Стилістика та мова автора: II — Мовний код і метафорика'
    words: 450
    points:
      - Символіка назви «Дзвони Майдану» (набат, пам'ять, попередження)
      - Інтелектуальний регістр і конструювання деколонізованого словника
  - section: 'Деколонізаційна перспектива: I — Як цей автор руйнує імперські міфи'
    words: 550
    points:
      - Деконструкція тези про «братні народи»
      - Послідовне викриття імперської матриці російської політичної культури
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
    words: 550
    points:
      - Відмова від концепту «пострадянський простір»
      - Україна як самостійний гравець та геополітичний фронтир Європи
  - section: 'Підсумок та вплив: I — Роль у сучасній журналістиці'
    words: 400
    points:
      - Підвищення планки української аналітичної публіцистики
      - Текст як інструмент боротьби за смисли в епоху постправди
  - section: 'Підсумок та вплив: II — Вплив на формування нації'
    words: 400
    points:
      - Значення трилогії для кристалізації національної пам'яті
      - Роль есеїстики у формуванні політичної свідомості покоління Незалежності
