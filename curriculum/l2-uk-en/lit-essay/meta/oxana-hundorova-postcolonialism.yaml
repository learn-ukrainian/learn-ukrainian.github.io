slug: oxana-hundorova-postcolonialism
title: Oxana Hundorova Postcolonialism
word_target: 4000
content_outline:
- section: Вступ та контекст
  words: 500
  points:
  - Тамара Гундорова як ключова фігура українських постколоніальних студій (з 1990-х
    років).
  - 'Специфіка українського постколоніалізму: пам''ять, мова, травма замість класичного
    расового фокуса.'
  - Адаптація західних теорій (Е. Саїд) до посттоталітарного українського контексту.
- section: 'Аналіз ключових творів: I — «Післячорнобильська бібліотека»'
  words: 600
  points:
  - Чорнобиль як точка метафоричного розриву з радянським минулим.
  - Український постмодернізм як засіб постколоніальної терапії (Бу-Ба-Бу, Ю. Андрухович).
  - Деконструкція імперського пафосу через карнавалізацію, іронію та кітч.
- section: 'Аналіз ключових творів: II — «Транзитна культура»'
  words: 600
  points:
  - Поняття «транзитної культури» та посттоталітарного синдрому.
  - Аналіз генераційної та постколоніальної травми в літературі Східної Європи.
  - Проблема «подвійної фемінізації» України та посторєнталізму.
- section: 'Аналіз ключових творів: III — Переосмислення класики'
  words: 500
  points:
  - Деконструкція радянських міфів про класиків у книгах «Франко не Каменяр» та «Леся
    Українка. Книги Сивілли».
  - Звільнення класичних текстів від народницької та соціалістично-реалістичної рамки.
  - Акцентування на модернізмі та європейському контексті української літератури зламу
    століть.
- section: Стилістика та мова автора
  words: 500
  points:
  - 'Особливості наукового стилю Гундорової: синтез есеїстики та строгого теоретичного
    апарату.'
  - Введення в український дискурс понять ресантименту, колоніальної шизофренії, пост-орієнталізму.
  - Складний, але метафоричний інструментарій психоаналізу та деконструкції.
- section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
  words: 500
  points:
  - Викриття імперської стратегії маргіналізації української культури як «провінційної».
  - Аналіз і деконструкція феномену малоросійства та колоніальної залежності.
  - Спростування міфу про вторинність української літературної традиції.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
  words: 400
  points:
  - 'Повернення суб''єктності українським авторам: від «жертв імперії» до творців
    власного дискурсу.'
  - Література як простір національного спротиву та самоусвідомлення.
  - Значення праць Гундорової для інтелектуальної емансипації України.
- section: Підсумок та спадщина
  words: 400
  points:
  - Внесок Тамари Гундорової у створення деколонізованої історії української літератури.
  - Введення українського контексту в глобальні постколоніальні студії.
  - Тривалий вплив її концепцій на сучасну освітню парадигму та нові покоління критиків.
