slug: grabowicz-myth-shevchenko
title: Grabowicz Myth Shevchenko
word_target: 4000
content_outline:
- section: Вступ та контекст
  words: 550
  points:
  - 'Стан шевченкознавства до 1982 року: домінування радянської класової парадигми
    та народницького ідолопоклонства.'
  - Введення методів структурної антропології (К. Леві-Строс) та аналітичної психології
    (К. Юнг) у вивчення української класики.
  - Культурний шок в Україні після перекладу монографії 1991 року та полеміка між
    'модерністами' і 'традиціоналістами'.
- section: 'Аналіз ключових творів: I — Бінарна опозиція поезії та прози'
  words: 650
  points:
  - 'Вирішення парадоксу двомовності Шевченка: мова як структурний інструмент, а не
    рівень асиміляції.'
  - Російськомовна проза (і щоденник) як відображення 'профанного', буденного, матеріального
    виміру імперської реальності.
  - Україномовна поезія як 'сакральний' простір колективної пам'яті та есхатологічного
    пророцтва.
- section: 'Аналіз ключових творів: II — Міфотворець та шаман'
  words: 650
  points:
  - 'Аналіз центрального концепту Грабовича: поет виконує роль ''шамана'', що бере
    на себе гріхи та травми колективу.'
  - Трактування заслання Шевченка як необхідної міфологічної 'ініціації' (сходження
    у підземний світ).
  - 'Моделювання універсальної міфологічної тріади у творах Шевченка: золотий вік
    (Космос) — імперське падіння (Хаос) — апокаліптичне відродження.'
- section: Стилістика та мова автора
  words: 600
  points:
  - Мова Шевченка як складна система символічних кодів та юнгіанських архетипів (степ,
    сирота, сліпий кобзар).
  - Трансформація етнографічного матеріалу (фольклору) у високоінтелектуальний авторський
    міф.
  - Аналіз повторюваних структур і мотивів (зокрема мотиву покритої дівчини) як метафори
    колоніального зґвалтування України.
- section: 'Деколонізаційна перспектива: I — Деконструкція імперського міфу'
  words: 650
  points:
  - Спростування радянського міфу про Шевченка як 'революціонера-демократа' та 'марксиста
    до Маркса'.
  - 'Деконструкція імперського наративу про класову (соціальну) боротьбу: у Шевченка
    конфлікт має передусім національно-екзистенційний характер.'
  - Переосмислення богоборчих мотивів Шевченка не як атеїзму, а як традиційного міфологічного
    бунту проти деміурга за справедливість.
- section: 'Деколонізаційна перспектива: II — Подолання народництва'
  words: 600
  points:
  - Критика Грабовичем 'плакального', сентиментального підходу до постаті Кобзаря.
  - 'Відновлення інтелектуальної суб''єктності автора: Шевченко — свідомий архітектор
    національного наративу, а не ''голос неосвіченого села''.'
  - Вписування українського літературного досвіду в глобальний контекст міфотворчої
    європейської традиції.
- section: Підсумок та спадщина
  words: 300
  points:
  - Вплив 'Поета як міфотворця' на становлення сучасної модерної української гуманістики
    (заснування часопису 'Критика').
  - Значення праці для деколонізації українського літературознавства та легітимізації
    західних академічних стандартів.
  - Збереження актуальності теорії Грабовича для розуміння культурних механізмів українського
    спротиву в XXI столітті.
