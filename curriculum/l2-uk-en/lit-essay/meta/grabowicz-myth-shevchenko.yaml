slug: grabowicz-myth-shevchenko
title: Grabowicz Myth Shevchenko
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Стан шевченкознавства до 1982 року'
  words: 350
  points:
  - Домінування радянської вульгарно-соціологічної парадигми (образ Шевченка як революціонера-демократа
    та суто класового борця).
  - Вплив народницько-діаспорного бачення (Шевченко як 'батько Тарас' та 'селянський
    плакальник').
  - Глухий кут обох підходів, що відмовляли поетові у складній філософській та структурній
    геніальності.
- section: 'Вступ та контекст: II — Впровадження методів антропології та психоаналізу'
  words: 350
  points:
  - Вихід монографії 'The Poet as Mythmaker' (1982) у Гарварді та застосування методів
    Клода Леві-Строса й Карла Юнга.
  - Культурний шок в українському літературознавстві 1990-х років після перекладу
    праці (1991).
  - Гостра дискусія між 'традиціоналістами' та 'модерністами', перехід до препарування
    глибинних антропологічних структур тексту.
- section: 'Аналіз ключових творів: I — Бінарна опозиція поезії та прози'
  words: 400
  points:
  - Розв'язання Грабовичем парадоксу Шевченкової двомовності як глибинного структурного
    поділу, а не компромісу з імперією.
  - Російськомовна проза та щоденник як свідомо 'профанний' простір, мова соціального
    дна та раціональності.
  - Україномовна поезія як мова 'сакрального' світу, духовного бунту та міфологічної
    істини.
- section: 'Аналіз ключових творів: II — Концепт міфотворця та шамана'
  words: 400
  points:
  - Трактування Шевченка не як політичного ідеолога, а як універсального творця колективного
    національного міфу.
  - 'Роль ''шамана'': проходження через особисту травму (заслання) як ініціацію для
    здобуття здатності лікувати колективну травму народу.'
  - Відтворення архетипних моделей зцілення, есхатологічного пророцтва та переходу
    від Хаосу до Космосу в поемах ('Великий льох', 'Гайдамаки').
- section: 'Стилістика та мова автора: I — Символічні коди та архетипи'
  words: 350
  points:
  - Мова Шевченка як складна система символічних кодів, що резонують із колективним
    несвідомим (могила, степ, вогонь).
  - Відмова від розуміння цих символів як простого романтичного реквізиту; акцент
    на їхньому ритуальному значенні.
  - Сполучення глибинних українських міфопоетичних архетипів із європейською романтичною
    традицією.
- section: 'Стилістика та мова автора: II — Трансформація міфопоетики'
  words: 350
  points:
  - Перетворення звичайного етнографічного та фольклорного матеріалу на потужний інтелектуальний
    авторський міф.
  - 'Персоніфікація України: аналіз мотиву ''покритки'' як ритуального символу зґвалтованої
    імперією нації.'
  - Вибудова власного сакрального мовного простору, який естетично протистоїть імперському
    профанному дискурсу.
- section: 'Деколонізаційна перспектива: I — Деконструкція імперського та радянського
    міфів'
  words: 400
  points:
  - Спростування марксистської імперської школи, що зводила антиколоніальну риторику
    до вузької класової ненависті.
  - 'Руйнування міфу про ''Шевченка-атеїста'': богоборчі мотиви (''Світе тихий...'')
    як класичний міфологічний бунт героя заради порятунку народу.'
  - Повернення поетові релігійно-національної суб'єктності всупереч нав'язаному радянському
    канону.
- section: 'Деколонізаційна перспектива: II — Подолання народницького стереотипу'
  words: 350
  points:
  - Критика Грабовичем 'плакального' підходу та редукції постаті Шевченка до провінційного
    'мужицького поета'.
  - 'Відновлення інтелектуального масштабу автора: Шевченко як свідомий і раціональний
    архітектор складного наративу.'
  - Повернення українській літературі елітарного, філософського виміру та універсальної
    значущості.
- section: 'Деколонізаційна перспектива: III — Повернення Україні культурної суб''єктності'
  words: 350
  points:
  - Позиціонування України у творах поета як центру сакрального всесвіту, якому радикально
    протистоїть імперія-Хаос.
  - Трансформація українців з етнографічної маси на політичну націю завдяки потужному
    впливу сконструйованого міфу.
  - Виведення українського літературного досвіду на глобальний рівень, порівняння
    Шевченка з творцями світових міфів.
- section: 'Підсумок та вплив: I — Вплив монографії на гуманітарне мислення'
  words: 350
  points:
  - Праця 'Поет як міфотворець' як інтелектуальний вододіл, що зруйнував застарілі
    парадигми прочитання класики.
  - Відкриття та легітимізація західних аналітичних інструментів у постсовєтському
    гуманітарному просторі.
  - Заснування часопису 'Критика' (1997) як провідного майданчика для антиімперського
    та структурного літературознавства.
- section: 'Підсумок та вплив: II — Значення для сучасного шевченкознавства'
  words: 350
  points:
  - Присудження Грабовичу Національної премії ім. Т. Шевченка (2015) як офіційне визнання
    його внеску в деколонізацію.
  - Формування сучасної школи читання класики без пафосу, але з глибокою академічною
    повагою до її інтелектуальної складності.
  - Надійний методологічний фундамент для майбутніх досліджень української ідентичності
    та літературної суб'єктності.
