slug: zerov-ad-fontes
title: "«Ad fontes»: Микола Зеров і Неокласицизм як Повернення до Першоджерел"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Епоха Розстріляного відродження'
    words: 350
    points:
      - Формування покоління митців 1920-х років та атмосфера культурного ренесансу.
      - Феномен київських неокласиків («п'ятірне гроно»).
      - Микола Зеров як ідеолог, професор та лідер інтелектуального спротиву.
  - section: 'Вступ та контекст: Літературна дискусія 1925–1928 років'
    words: 450
    points:
      - 'Причини спалаху дискусії: протистояння між масовізацією та високим мистецтвом.'
      - Свідома підтримка позиції Миколи Хвильового («Геть від Москви!», «Психологічна
        Європа»).
      - Протистояння з пролетарськими письменниками та панфутуристами.
  - section: 'Вступ та контекст: Філософія гасла «Ad fontes»'
    words: 450
    points:
      - Походження крилатого вислову («до першоджерел», до античності та Ренесансу).
      - Вимога високої літературної освіти та засвоєння світового культурного досвіду.
      - Відмова від звуження української культури до виключно селянської чи вузькопролетарської
        тематики.
  - section: 'Аналіз ключових творів: Полеміка проти «масовізму» та провінційності'
    words: 500
    points:
      - Огляд концептуальної збірки статей «До джерел» (1926).
      - Гостра критика «аматорства», графоманії та зниження естетичних критеріїв у
        постреволюційній літературі.
      - 'Заклик до професіоналізму: «Ми хочемо такої літературної обстановки, в якій
        би виростали міцні фаланги письменників».'
  - section: 'Аналіз ключових творів: Засвоєння європейської спадщини'
    words: 500
    points:
      - 'Значення перекладів з античної літератури (особливо римських поетів: Овідія,
        Горація).'
      - Теза Зерова про необхідність перенесення здобутків світової цивілізації на
        український ґрунт.
      - Культурний універсалізм як альтернатива хуторянству та провінціалізму.
  - section: 'Аналіз ключових творів: Нове прочитання української класики'
    words: 450
    points:
      - Аналіз літературно-критичних статей Зерова про Лесю Українку, Пантелеймона
        Куліша та Максима Рильського.
      - Трактування українських класиків як творців європейського рівня, а не лише
        побутоописувачів.
      - Відкидання народницьких, спрощених оцінок літературної спадщини ХІХ століття.
  - section: 'Стилістика та мова автора: Інтелектуалізм та ерудиція'
    words: 350
    points:
      - Насиченість текстів Зерова алюзіями, багатомовними цитатами та широкими історичними
        паралелями.
      - Елітарний, академічний стиль викладу критичної думки.
      - Точність формулювань та бездоганна логічна вивіреність кожного аргументу в
        есеях.
  - section: 'Стилістика та мова автора: Риторичні стратегії та іронія'
    words: 350
    points:
      - Використання витонченої іронії та сарказму у полеміці з опонентами-авангардистами.
      - 'Блискуче володіння полемічним мистецтвом: повага до опонента при нищівній
        критиці його ідей.'
      - Класична ясність, прозорість синтаксису та формальна досконалість текстів.
  - section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
    words: 500
    points:
      - Спростування радянського наративу про неокласиків як «відірваних від життя
        естетів».
      - Естетизм Зерова як глибока форма політичного та інтелектуального спротиву
        імперській асиміляції.
      - Безкомпромісне протистояння нав'язуванню російських зразків як єдино можливого
        культурного орієнтиру.
  - section: 'Деколонізаційна перспектива: Українська суб''єктність та шлях в обхід
      Москви'
    words: 450
    points:
      - Ствердження повноцінності та лексичної потужності української мови для передачі
        найвищих філософських смислів.
      - Встановлення прямого культурного зв'язку «Київ — Рим / Париж», оминаючи російський
        імперський центр.
      - Ствердження абсолютної культурної самодостатності та незалежності українського
        національного наративу.
  - section: 'Підсумок та спадщина: Трагедія Сандармоху'
    words: 350
    points:
      - Арешт Миколи Зерова у 1935 році та висунення йому абсурдних звинувачень в
        тероризмі.
      - Розстріл в урочищі Сандармох (1937 рік) — цілеспрямоване знищення інтелектуального
        цвіту нації.
      - Фізичне винищення еліти як інструмент імперського контролю над колонізованою
        територією.
  - section: 'Підсумок та спадщина: Актуальність ідей Зерова сьогодні'
    words: 300
    points:
      - Повернення спадщини Зерова та текстів «До джерел» у сучасний науковий та суспільний
        дискурс.
      - Значення заклику «Ad fontes» для сучасної деколонізації та євроінтеграції
        України.
      - Микола Зеров як символ незламності українського європейського вибору.
