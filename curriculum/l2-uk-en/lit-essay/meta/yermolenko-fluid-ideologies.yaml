slug: yermolenko-fluid-ideologies
title: Yermolenko Fluid Ideologies
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Повернення українського есею'
  words: 600
  points:
  - Традиція української інтелектуальної есеїстики (від Шевельова до сучасності).
  - Біографічний та академічний бекграунд Володимира Єрмоленка (європейський контекст,
    Могилянка).
  - Історичне тло виходу книги «Плинні ідеології» (2018 рік, переосмислення Європи
    після Майдану).
- section: 'Аналіз: I — Метафора «плинності» та європейська думка'
  words: 800
  points:
  - 'Розкриття головного концепту книги: ідеології як рідини, що мутують і перетікають
    одна в одну.'
  - Аналіз європейських утопій ХІХ століття та їх трансформація у ХХ столітті.
  - Критика жорстких філософських догматів через гнучкість есеїстичного мислення.
- section: 'Аналіз: II — Деконструкція тоталітарних та імперських міфів'
  words: 800
  points:
  - Як Єрмоленко препарує ідеологічне підґрунтя тоталітаризмів ХХ століття.
  - Деконструкція російського імперського месіанства та його європейських запозичень.
  - Аналіз механізмів, через які романтичні ідеї перетворюються на репресивні практики.
- section: 'Стилістика та мова автора: Інтелектуальна поліфонія'
  words: 600
  points:
  - Синтез академічної глибини та публіцистичної ясності.
  - Метафоричність мови як інструмент філософського пізнання.
  - Вплив французької філософської школи (деконструктивізм, традиція Монтеня) на український
    текст.
- section: 'Деколонізаційна перспектива: Україна як суб''єкт аналізу'
  words: 800
  points:
  - Руйнування міфу про 'провінційність' української гуманітаристики.
  - Український дослідник як повноцінний діагност європейської та російської історії
    ідей.
  - Подолання комплексу меншовартості через привласнення права судити 'великі' традиції.
- section: Сучасний вплив та значення
  words: 400
  points:
  - Премія імені Юрія Шевельова як визнання канонічного статусу тексту.
  - 'Актуальність «Плинних ідеологій» в умовах повномасштабної війни: аналіз ідеології
    ворога.'
  - Роль Володимира Єрмоленка як інтелектуального амбасадора України у світі.
