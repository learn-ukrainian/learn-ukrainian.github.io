slug: kipiani-case-of-stus
title: Kipiani Case Of Stus
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Судовий процес 1980 року'
    words: 600
    points:
      - Історичне тло пізнього застою та зачистка дисидентів напередодні Олімпіади-80.
      - Арешт Василя Стуса (травень 1980) за участь в Українській Гельсінській групі.
      - Закритий характер судового процесу та ізоляція поета від світу.
  - section: 'Вступ та контекст: Формування документальної бази'
    words: 500
    points:
      - Відкриття архівів КДБ УРСР після прийняття законів про декомунізацію 2015
        року.
      - Робота Вахтанга Кіпіані з шістьма томами кримінальної справи № 5.
      - 'Принципи відбору матеріалів: протоколи допитів, обшуків, листи.'
  - section: 'Аналіз ключових творів: Документи КДБ як жанр'
    words: 600
    points:
      - 'Документ як літературний текст: специфічна радянська канцеляритно-бюрократична
        мова.'
      - Контраст між живою мовою поета та сухими формулюваннями слідчих КДБ.
      - Читання архівних матеріалів як антиутопічної документальної драми.
  - section: 'Аналіз ключових творів: Поведінка Стуса та адвоката'
    words: 900
    points:
      - 'Аналіз протоколів судових засідань: відмова Стуса від адвоката Віктора Медведчука.'
      - 'Роль адвоката: визнання кваліфікації дій підзахисного як вірної.'
      - 'Стратегія захисту Стуса: перетворення підсудного на обвинувача системи.'
  - section: 'Стилістика та мова автора: Монтаж та коментарі Вахтанга Кіпіані'
    words: 600
    points:
      - Метод документального монтажу без спотворення первинного тексту.
      - Роль авторських коментарів та вступної статті Кіпіані.
      - Викриття абсурдності звинувачень через збереження мовних покручів слідчих.
  - section: 'Деколонізаційна перспектива: Як цей автор руйнує імперські міфи'
    words: 600
    points:
      - Деконструкція міфу про 'законність' і процедурність радянського суду.
      - Аналіз процесу як акту політичного терору метрополії проти української інтелігенції.
      - 'Повернення історичної пам''яті: зняття тавра ''кримінального злочинця''.'
  - section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
    words: 600
    points:
      - Пряма мова Василя Стуса в протоколах як маніфест національної гідності.
      - Спротив асиміляції та русифікації, зафіксований у матеріалах допитів.
      - Стус як активний суб'єкт власної долі, а не пасивна жертва режиму.
  - section: 'Підсумок та спадщина: Вплив книги та судовий процес'
    words: 600
    points:
      - Позов В. Медведчука 2020 року про заборону розповсюдження книги.
      - 'Ефект Стрейзанд: суспільний резонанс, масові тиражі та солідарність суспільства.'
      - Перемога Кіпіані в Апеляційному суді 2021 року як символічне завершення 'справи
        Стуса'.
