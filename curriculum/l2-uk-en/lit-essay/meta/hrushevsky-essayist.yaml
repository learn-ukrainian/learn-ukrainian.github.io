slug: hrushevsky-essayist
title: "Михайло Грушевський як Есеїст: Між Наукою і Публіцистикою — Голос Ученого у Час Революції"
word_target: 5000
content_outline:
- section: 'Вступ: I — Грушевський поза «Великою Історією»'
  words: 500
  points:
  - 'Михайло Грушевський (1866–1934): відомий як автор 10-томної «Історії України-Руси» — але що ми втрачаємо, коли зупиняємося тільки на цьому?'
  - 'Грушевський-есеїст: сотні статей, публіцистичних нарисів, відкритих листів, промов — корпус текстів без читача.'
  - 'Мета цього модуля: не «спростити» Грушевського, а показати, де він говорить не як учений, а як громадянин і мислитель.'
- section: 'Вступ: II — Жанровий діапазон: від монографії до маніфесту'
  words: 500
  points:
  - 'Публіцистика у «Літературно-Науковому Вістнику»: як Грушевський говорить до освіченого читача, а не до фахівця.'
  - 'Відкриті листи і звернення: жанр громадянського есею у практиці Грушевського — пряма мова до суспільства.'
  - '"Хто такі українці і чого вони хочуть?" — коротка брошура 1917 р. як зразок популярного пояснення для найширшого кола.'
- section: 'Аналіз: «Хто такі українці і чого вони хочуть?» (1917)'
  words: 700
  points:
  - 'Жанр: між науковою популяризацією і політичним маніфестом — чому він написаний саме так у лютому–березні 1917 р.'
  - 'Аргументація права на автономію: Грушевський використовує власні наукові аргументи в новому риторичному контексті.'
  - 'Мова тексту: доступна без спрощення — як Грушевський будує міст між академічним знанням і масовим читачем.'
- section: 'Аналіз: «Україна і Росія» та публіцистика 1907–1917 рр.'
  words: 700
  points:
  - 'Серія статей про стосунки між Україною і Росією: де Грушевський-публіцист починає там, де Грушевський-учений закінчує.'
  - 'Концепція «двох народів, двох держав»: формулювання до революції і його значення у контексті 1917 р.'
  - 'Відкрита полеміка з Мілюковим і кадетами: приклад академічного дискурсу у публічному просторі.'
- section: 'Аналіз: «Велика, Мала і Біла Русь» та питання ідентичності'
  words: 600
  points:
  - 'Праці про розподіл «руського» спадку: де Грушевський веде наукову суперечку, а де — ідеологічну позицію.'
  - 'Проблема «малоруськості» у Грушевського: критика як аргумент, а не як інвектива.'
  - Порівняння з Франком і Драгомановим як публіцистами — три підходи до схожої теми.
- section: 'Грушевський у 1917–1918 рр.: Учений при владі'
  words: 500
  points:
  - 'Голова Центральної Ради: де наукова традиція зустрічається з революційною практикою і де конфліктує з нею.'
  - 'Промови і документи Ради: Грушевський як автор державних текстів — різниця між академічним і державним есеїстом.'
  - 'Трагедія 1918 р.: чому учений-мислитель і реальна влада виявилися несумісними.'
- section: 'Деколонізаційна перспектива: Наука як зброя і як захист'
  words: 500
  points:
  - 'Грушевський і «наукова деколонізація»: його 10-томник як інструмент спростування «єдиної руської нації» задовго до сучасних дебатів.'
  - 'Совєтський Грушевський: повернення в УРСР, «самокритика», арешт 1931 р. і смерть у Кисловодську 1934 р.'
  - Актуальність Грушевського-есеїста сьогодні — де його публіцистика говорить до нас прямо і де потребує контексту.
- section: 'Підсумок: Грушевський-людина поряд з Грушевським-ученим'
  words: 500
  points:
  - Публіцистика як ключ до розуміння мотивацій наукового проекту — навіщо учений пише «Велику Історію»?
  - 'Питання до читача: чи є «об''єктивна» наукова позиція — і що відповідь Грушевського означає для нашого розуміння?'
  - Зв'язок модуля з попередніми есеїстами курсу — де Грушевський у розмові з Франком, Костомаровим і Єфремовим.
