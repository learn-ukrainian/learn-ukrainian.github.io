slug: dziuba-internationalism
title: "«Інтернаціоналізм чи русифікація?»: Іван Дзюба і Голос Шістдесятництва"
word_target: 5000
content_outline:
  - section: 'Вступ: Постать Івана Дзюби та феномен шістдесятництва'
    words: 500
    points:
      - Іван Дзюба як ключовий критик, літературознавець та інтелектуальний лідер
        покоління шістдесятників.
      - Його роль у публічному протесті під час прем'єри фільму 'Тіні забутих предків'
        (1965) як момент народження відкритого дисидентства.
  - section: 'Вступ: Історичний контекст створення праці'
    words: 500
    points:
      - Перша хвиля масових арештів української інтелігенції у серпні-вересні 1965
        року як каталізатор написання тексту.
      - Написання та надсилання відкритого листа до П. Шелеста та В. Щербицького як
        безпрецедентний акт громадянської мужності та спроба легального діалогу.
  - section: 'Аналіз ключових творів: Марксистська методологія'
    words: 600
    points:
      - Використання цитат з Маркса, Енгельса та Леніна як ідеологічного 'щита' для
        легальної критики політики русифікації.
      - 'Демонстрація парадоксу: радянська практика в Україні є прямим порушенням
        декларованих класиками марксизму принципів самовизначення націй.'
  - section: 'Аналіз ключових творів: Культурний та мовний виміри'
    words: 600
    points:
      - Деконструкція міфу про 'добровільну' асиміляцію та критичний аналіз витіснення
        української мови з освіти, науки, діловодства.
      - Наведення статистики, що доводила непропорційно малу частку українськомовних
        шкіл та видань, що свідчило про державний етноцид.
  - section: 'Аналіз ключових творів: Економічна дискримінація'
    words: 600
    points:
      - Аналіз надцентралізації радянської економіки як сучасної форми колоніальної
        експлуатації ресурсів УРСР Москвою.
      - Доведення того факту, що національне пригнічення нерозривно пов'язане із соціальною
        та економічною нерівністю республік.
  - section: 'Стилістика та мова автора: Полемічна майстерність'
    words: 500
    points:
      - Поєднання строгих логічних висновків, масиву статистичних даних та пристрасного,
        безкомпромісного публіцистичного пафосу.
      - Майстерне використання сарказму та іронії для викриття лицемірства і демагогії
        радянського партійного апарату.
  - section: 'Деколонізаційна перспектива: Деконструкція міфу'
    words: 500
    points:
      - Розвінчання концепту радянського 'інтернаціоналізму', який Дзюба ідентифікує
        як замаскований російський великодержавний шовінізм.
      - Проведення історичної паралелі між асиміляторською політикою Російської імперії
        (царату) та діями комуністичної номенклатури.
  - section: 'Деколонізаційна перспектива: Українська суб''єктність'
    words: 400
    points:
      - Ствердження беззаперечного права української нації на повнокровний державний,
        соціальний і культурний розвиток.
      - Рішуче відкидання нав'язаного комплексу 'молодшого брата' та меншовартості.
  - section: 'Підсумок та спадщина: Реакція влади і самвидав'
    words: 400
    points:
      - Офіційне засудження праці, кампанія цькування, виключення Дзюби зі Спілки
        письменників (1972) та його арешт.
      - 'Феномен самвидаву: поширення праці тисячами машинописних копій в Україні
        та видання за кордоном (Мюнхен, 1968).'
  - section: 'Підсумок та спадщина: Значення для націєтворення'
    words: 400
    points:
      - Статус тексту як головного антиколоніального маніфесту покоління шістдесятників
        і наріжного каменю дисидентського руху.
      - Актуальність ідей Дзюби сьогодні для розуміння природи російського імперіалізму
        та формування модерної української ідентичності.
