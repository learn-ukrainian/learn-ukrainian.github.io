slug: plokhy-frontline
title: Plokhy Frontline
word_target: 5000
content_outline:
  - section: 'Вступ: Інтелектуальний фронтир Плохія'
    words: 450
    points:
      - Сергій Плохій як ключовий публічний інтелектуал та директор Гарвардського
        українського наукового інституту.
      - 'Трансформація ролі історика після 2014 року: від академічних монографій до
        публічної есеїстики.'
      - Концепція 'Frontline' (фронтиру) як метафори української історії на перетині
        цивілізацій.
  - section: Історичний контекст написання есеїв
    words: 450
    points:
      - Запит західного світу на розуміння генези російсько-української війни.
      - Есеїстика як форма швидкого реагування на історичну пропаганду та квазіісторичні
        статті В. Путіна.
      - Збірка 'The Frontline' (2021) як концептуальний підсумок багаторічних досліджень
        автора.
  - section: 'Аналіз: Деконструкція міфу Київської Русі'
    words: 500
    points:
      - Критика радянського концепту 'давньоруської народності' та 'спільної колиски'.
      - Історія привласнення київської спадщини московськими царями як свідомий політичний
        проект.
      - Відновлення української тяглості від Києва до сучасності.
  - section: 'Аналіз: Козацтво та імперський наратив'
    words: 500
    points:
      - Деконструкція міфу про 'добровільне возз'єднання' у Переяславі (1654).
      - Козацька держава як носій республіканських та демократичних традицій на противагу
        московському самодержавству.
      - 'Постать Івана Мазепи: від імперського тавра ''зрадника'' до європейського
        політика.'
  - section: 'Аналіз: Україна у жорнах ХХ століття'
    words: 550
    points:
      - Голодомор як геноцид та інструмент знищення української суб'єктності.
      - Україна як головний театр воєнних дій Другої світової війни ('Криваві землі').
      - 'Чорнобиль та розпад Радянського Союзу: український референдум як фінальний
        удар по імперії.'
  - section: 'Стилістика: Науково-популярний наратив'
    words: 500
    points:
      - Синтез глибокої академічної ерудиції та доступного сторітелінгу.
      - Використання мікроісторичних сюжетів для ілюстрації макроісторичних зламів.
      - 'Есеїстичність: поєднання особистих рефлексій дослідника з об''єктивним аналізом
        документів.'
  - section: 'Стилістика: Риторика для західного читача'
    words: 500
    points:
      - Адаптація специфічного українського контексту для англомовної аудиторії через
        європейські аналогії.
      - Систематична критика 'росієцентричної' (russocentric) оптики в західних університетах.
      - 'Мова Плохія як інструмент культурної дипломатії: переконлива, аргументована,
        позбавлена патетики.'
  - section: 'Деколонізаційна перспектива: Руйнування імперії'
    words: 550
    points:
      - Плохій показує, що російський імперський проект неможливий без контролю над
        Україною.
      - Викриття того, як імперія апропріювала українські інтелектуальні ресурси (від
        Феофана Прокоповича до Гоголя).
      - Історія України як найпотужніший антидот проти російського великодержавного
        шовінізму.
  - section: 'Деколонізаційна перспектива: Українська суб''єктність'
    words: 500
    points:
      - Злам традиційної парадигми України як 'жертви' між двома вогнями.
      - 'Фокус на українській агентності: здатність українців самостійно ухвалювати
        політичні рішення в критичні моменти історії.'
      - 'Відродження ідентичності в умовах бездержавності: роль мови, культури та
        інтелектуальних еліт.'
  - section: 'Підсумок: Значення праць Плохія'
    words: 500
    points:
      - Збірка 'Frontline' як фундаментальний текст для розуміння не лише минулого,
        але й сучасного українського спротиву.
      - Внесок автора у зміну глобального уявлення про Східну Європу.
      - 'Спадщина Плохія: інтелектуальне озброєння нації, що доводить своє право на
        існування.'
