slug: aseyev-isolation-donetsk
title: Aseyev Isolation Donetsk
word_target: 4000
content_outline:
- section: 'Контекст: Донецьк до і після окупації'
  words: 300
  points:
  - Станіслав Асєєв як свідок переходу рідного міста під контроль окупантів у 2014
    році.
  - Свідомий вибір залишитися в окупації для документування реальності (під псевдонімом
    Станіслав Васін).
- section: 'Ізоляція: від мистецького фонду до концтабору'
  words: 400
  points:
  - 'Трагічна трансформація простору: як артцентр «Ізоляція» став таємною катівнею
    МДБ ДНР.'
  - 'Іронія топоніміки: розташування концтабору на вулиці «Світлого шляху».'
  - Символічне знищення культури як прелюдія до фізичного знищення людей.
- section: 'Біографічний вимір: журналіст під прикриттям'
  words: 300
  points:
  - 'Діяльність Васіна-Асєєва: репортажі для українських медіа (Радіо Свобода, Дзеркало
    тижня).'
  - Арешт у 2017 році та 962 дні полону.
  - Звільнення 29 грудня 2019 року під час обміну.
- section: '«В ізоляції»: есеїстика опору'
  words: 500
  points:
  - Аналіз збірки есеїв, написаних до арешту (Національна премія імені Шевченка 2021
    року).
  - Осмислення суспільних змін на Донбасі, пропаганди та втрати зв'язку з реальністю.
  - Філософський підхід до проблеми ідентичності мешканців окупованих територій.
- section: '«Світлий шлях»: анатомія зла та структура табору'
  words: 600
  points:
  - 'Жанрова специфіка книги: документальний роман, мемуари, свідчення.'
  - Детальний опис рутини концтабору, тортур та інфраструктури знущань.
  - Аналіз системи катів (наприклад, роль ката «Палича») та банальності зла.
- section: 'Психологічний вимір: виживання і втрата людського'
  words: 500
  points:
  - 'Психологічні наслідки тортур: стан між життям і смертю.'
  - 'Взаємини між ув''язненими: зрада, солідарність, підозра.'
  - 'Спроби зберегти розум: таємне ведення записів та запам''ятовування деталей.'
- section: Документальна точність та репортажний стиль
  words: 400
  points:
  - 'Стилістичні особливості прози Асєєва: відстороненість, фактографічність, відсутність
    надмірного пафосу.'
  - Мова як інструмент фіксації злочину.
  - 'Відмінність від класичної художньої прози: етика свідчення понад естетикою.'
- section: Метафорика межі та відчуження
  words: 300
  points:
  - Концепт «чорної діри», де зупиняється час (простір Ізоляції).
  - Відчуження від власного тіла під час і після тортур.
  - Екзистенційний досвід межової ситуації.
- section: Деконструкція імперського міфу про «громадянську війну»
  words: 400
  points:
  - Твори Асєєва як беззаперечний доказ російського фінансування та керівництва терором
    на Донбасі.
  - Спростування наративу про «внутрішній конфлікт» через документацію участі громадян
    РФ.
  - 'Деколонізаційний кут: повернення права власного голосу окупованому Донбасу.'
- section: Українська суб'єктність в умовах тотального терору
  words: 400
  points:
  - Збереження української ідентичності всупереч фізичному знищенню.
  - Опір через акт пам'ятання та написання книги.
  - Голос Асєєва як голос суб'єкта, що не скорився обставинам.
- section: 'Свідчення як зброя правосуддя: значення творчості'
  words: 400
  points:
  - Перетворення літературного тексту на юридичний документ для міжнародних судів.
  - Створення фонду «Ініціатива справедливості» (Justice Initiative Fund) для пошуку
    воєнних злочинців.
  - 'Місце Асєєва в сучасній світовій літературі: продовження традиції літератури
    травми та опору (В. Франкл, П. Леві, В. Шаламов).'
