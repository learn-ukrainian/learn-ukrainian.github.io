slug: zabuzhko-notre-dame
title: Zabuzhko Notre Dame
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Задум і створення праці'
  words: 600
  points:
  - Завершення 15-річної «дослідницької трилогії» Оксани Забужко (після Франка і Шевченка)
  - 'Історія написання праці: від обіцянки Соломії Павличко у 1999 році до видання
    2007 року'
  - 'Мета дослідження: переосмислення постаті Лесі Українки в контексті українського
    та європейського міфів'
- section: 'Аналіз ключових творів: Деконструкція міфу Лесі Українки'
  words: 800
  points:
  - Спростування радянського стереотипу про Українку як «хвору революціонерку-демократку»
  - Аналіз архетипової функції Лесі Українки як єдиної жінки у пантеоні національних
    «великих»
  - Дослідження зв'язку кохання, смерті та творчості (на прикладі листів та біографії)
- section: 'Аналіз ключових творів: Лицарський код та легенда про Грааль'
  words: 800
  points:
  - Вписування творчості Лесі Українки у європейську парадигму лицарства та культу
    Прекрасної Дами
  - Нове прочитання «Лісової пісні» не як звичайної казки, а як складної гностичної
    містерії
  - Зашифрована легенда про Святий Грааль як код порятунку національної еліти
- section: 'Стилістика та мова автора: Жанр і метод'
  words: 500
  points:
  - Жанрова специфіка книги як великого культурологічного есе та «інтелектуального
    роману»
  - Характерний вишуканий синтаксис та багатство лексики Оксани Забужко
  - Поєднання феміністичної методології з глибоким історичним та філософським аналізом
- section: 'Деколонізаційна перспектива: Протистояння імперським міфам'
  words: 700
  points:
  - Деконструкція нав'язаного міфу про українців як суто «селянську націю» без власної
    аристократії
  - Принципове розмежування еволюційного українського та нігілістичного російського
    народництва
  - Повернення Україні суб'єктності через віднайдення європейських інтелектуальних
    коренів
- section: 'Підсумок та спадщина: Значення для сучасності'
  words: 600
  points:
  - 'Суспільний резонанс: Гран-прі «Книжка року 2007», премії Фундації Антоновичів
    та Ковалевих'
  - Вплив праці на зміну шкільних та академічних парадигм вивчення літератури
  - Роль книги у формуванні сучасного українського проекту та захисті інтелектуального
    простору
