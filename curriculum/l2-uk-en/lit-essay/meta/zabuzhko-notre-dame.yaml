slug: zabuzhko-notre-dame
title: "«Notre Dame d'Ukraine»: Забужко і Образ Лесі Українки як Духовного Першообразу"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Дослідницька трилогія'
    words: 450
    points:
      - Історія 15-річної «дослідницької трилогії» авторки, що розпочалася книгою
        про Івана Франка у 1992 році та продовжилася працею про Тараса Шевченка (1997).
      - Контекст перших років незалежності України та тривалий інтелектуальний пошук,
        який передував написанню книги.
  - section: 'Вступ та контекст: II — Задум і публікація'
    words: 450
    points:
      - 'Історія задуму: обіцянка Оксани Забужко Соломії Павличко у 1999 році написати
        масштабну працю про Лесю Українку.'
      - Вихід книги у 2007 році як концептуального підсумку та «інтелектуального роману
        авторки з класиками».
  - section: 'Аналіз ключових творів: I — Деконструкція радянського міфу'
    words: 500
    points:
      - Жорстка критика радянського та стереотипного традиційного сприйняття поетеси
        як «хворої мучениці» та «дочки Прометея».
      - Спростування нав'язаного імперського образу «співачки досвітніх вогнів» та
        «пролетарської революціонерки-демократки».
  - section: 'Аналіз ключових творів: II — Архетип та європейська ідентичність'
    words: 500
    points:
      - Аналіз архетипової функції Лесі Українки як фактично єдиної жінки, яку українська
        нація беззастережно ввела до пантеону «великих».
      - Утвердження статусу Лесі Українки як аристократки духу, високоосвіченої європейської
        інтелектуалки та свідомої творчині модерної української ідентичності.
  - section: 'Аналіз ключових творів: III — Лицарський код'
    words: 500
    points:
      - Глибоке дослідження європейських джерел Лесі Українки та її зв'язку з культурою
        Заходу.
      - Аналіз європейського лицарства та культу Прекрасної Дами як фундаментального
        культурного коду України, втіленого у творчості письменниці.
  - section: 'Аналіз ключових творів: IV — Таємниця «Лісової пісні»'
    words: 500
    points:
      - Нове, нефольклорне прочитання драми-феєрії «Лісова пісня».
      - Інтерпретація твору як складної гностичної містерії, що зберігає та зашифровує
        код легенди про Святий Грааль.
  - section: 'Стилістика та мова автора: I — Жанрова та синтаксична специфіка'
    words: 350
    points:
      - Визначення специфіки книги як масштабного культурологічного есе та багатовимірного
        тексту.
      - Аналіз есеїстичного, вишуканого та надзвичайно складного синтаксису Оксани
        Забужко, що відповідає глибині дослідження.
  - section: 'Стилістика та мова автора: II — Аналітична методологія'
    words: 350
    points:
      - Органічне поєднання філософського, культурологічного та історичного методів
        аналізу літературного матеріалу.
      - Застосування феміністичної оптики для деконструкції патріархальних та імперських
        стереотипів щодо постаті письменниці.
  - section: 'Деколонізаційна перспектива: I — Спростування міфу про «селянську націю»'
    words: 500
    points:
      - Деконструкція російського імперського міфу про українців як провінційну гілку
        та суто «безкласову селянську націю».
      - Повернення Україні власної аристократичної еліти та доведення існування потужних
        традицій релігійної містики та шляхетності.
  - section: 'Деколонізаційна перспектива: II — Природа українського народництва'
    words: 500
    points:
      - Принципове розмежування українського (органічного, еволюційного) та російського
        (радикального, нігілістичного) народництва.
      - Протиставлення української шляхетської традиції та європейських інтелектуальних
        коренів імперським наративам асиміляції.
  - section: 'Підсумок та спадщина: Значення та вплив'
    words: 450
    points:
      - 'Висока оцінка праці: здобуття Гран-прі Всеукраїнського рейтингу «Книжка року
        2007» та Премії Фундації Антоновичів (2009).'
      - Колосальний вплив «Notre Dame d'Ukraine» на сучасне осмислення української
        ідентичності, «модерного проекту» та формування нової ґенерації читачів Лесі
        Українки.
