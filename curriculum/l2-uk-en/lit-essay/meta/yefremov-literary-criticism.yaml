slug: yefremov-literary-criticism
title: "Сергій Єфремов: Що Значить Бути Критиком Нації — Від «Кобзаря» до Катівні"
word_target: 5000
content_outline:
- section: 'Вступ: I — Великий критик і велике замовчування'
  words: 500
  points:
  - 'Сергій Єфремов (1876–1939): найавторитетніший літературний критик дореволюційної і ранньорадянської України — і повне замовчування за совєтів.'
  - '"Історія українського письменства" (1911, перевидана 1919) — перший системний огляд від давнини до сучасності власною мовою критика.'
  - 'Арешт 1929 року, «Спілка визволення України», смерть у тюрмі 1939-го: доля критика у часи, коли критика = злочин.'
- section: 'Вступ: II — Критика як служіння нації'
  words: 500
  points:
  - 'Єфремов і народницька традиція: що означає «служіння народу» у літературній критиці — не агітація, а чесне свідчення.'
  - 'Громадська діяльність: видавнича праця, «Громада», захист прав мови і культури — критик як культурний активіст.'
  - 'Відношення до модернізму: критика «Молодої Музи» і «хмарочосів» — де Єфремов не погоджується і чому це важливо знати.'
- section: 'Аналіз: «Історія українського письменства» — метод і концепція'
  words: 700
  points:
  - 'Структура «Історії»: від Нестора-Літописця до Коцюбинського і Лесі Українки — як Єфремов будує тяглість традиції.'
  - 'Критичний метод: «органічна критика» Добролюбова проти «чистого мистецтва» — де Єфремов знаходить свою позицію.'
  - 'Оцінка Шевченка: Єфремов як один з перших системних шевченкознавців — що він побачив і що упустив.'
- section: 'Аналіз: Щоденники як документ доби'
  words: 700
  points:
  - '"Щоденники" Єфремова (1923–1929) — унікальний документ інтелектуального і культурного побуту доби коренізації.'
  - 'Щоденникові оцінки сучасників: Хвильового, Зерова, Микитенка — хто і чому цінується або відкидається.'
  - '"Щоденники" як жанр: де приватна особа і де публічний критик — і як їх розрізнення допомагає розуміти добу.'
- section: 'Єфремов і академічна наука: Між критикою і архівом'
  words: 600
  points:
  - 'Робота в Українській Академії наук (заснована 1918): видавнича серія «Пам''ятки мови і письменства давньої України».'
  - 'Шевченківська комісія і корпус текстів: що Єфремов зробив для текстологічної бази «Кобзаря».'
  - 'Наукові дискусії 1920-х: Єфремов проти Яворського і «вульгарного соціологізму» — методологічна позиція під ударом.'
- section: 'Стиль критики: Ясність як гідність'
  words: 500
  points:
  - 'Мова Єфремова: ясна, без термінологічного замулення — критика для читача, а не для академічного кола.'
  - 'Полеміческий стиль: пряма критика без хибної ввічливості — де Єфремов зразок для наслідування.'
  - 'Баланс між естетичною і соціальною оцінкою: критик, який не жертвує ані одним, ані іншим.'
- section: 'Деколонізаційна перспектива: Критик як загроза для колонізатора'
  words: 500
  points:
  - 'Чому «Справа СВУ» 1929–1930 рр. почалася із критиків і академіків — знищити критичну думку = знищити самоусвідомлення.'
  - 'Паралель: знищення польської академічної інтелігенції у 1939 р. — знищення критиків і вчених як системна практика колонізатора.'
  - 'Єфремов у сучасних програмах: чому «Історія письменства» досі важлива як методологічний і культурний документ.'
- section: 'Підсумок: Повернення Єфремова'
  words: 500
  points:
  - Посмертна реабілітація і перевидання «Щоденників» у 1990-х — що нове покоління відкрило в цих текстах.
  - Єфремов і сучасна літературна критика в Україні — чи є лінія від нього до Агеєвої і Павличко?
  - 'Питання до читача: чи можлива «незаангажована» літературна критика і чи потрібна вона — відповідь Єфремова.'
