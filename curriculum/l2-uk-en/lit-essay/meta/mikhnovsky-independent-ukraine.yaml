slug: mikhnovsky-independent-ukraine
title: Mikhnovsky Independent Ukraine
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Історичне тло кінця XIX століття'
    words: 400
    points:
      - 'Характеристика статусу українських земель у Російській імперії: дія Валуєвського
        циркуляра та Емського указу'
      - Домінування аполітичного українофільства та етнографічного культурництва серед
        інтелігенції
  - section: 'Вступ та контекст: II — Формування світогляду Міхновського'
    words: 400
    points:
      - Роль 'Братства тарасівців' як предтечі переходу до політичної боротьби
      - Освіта адвоката та її вплив на правове мислення і політичний лексикон Міхновського
  - section: 'Вступ та контекст: III — Промова в Полтаві та заснування РУП'
    words: 450
    points:
      - 'Події лютого 1900 року: виступи у Полтаві та Харкові на Шевченківських святах'
      - Захоплення студентської молоді та створення Революційної української партії
        (РУП)
      - Друк брошури 'Самостійна Україна' у Львові у 1900 році як першої партійної
        програми
  - section: 'Аналіз ключових творів: I — Юридична деконструкція Переяславської угоди'
    words: 500
    points:
      - Тлумачення Переяславської ради 1654 року як рівноправного міжнародного договору,
        а не інкорпорації
      - Доведення, що порушення умов договору Російською імперією звільняє Україну
        від усіх зобов'язань
      - Правовий аргумент як основа для легітимної вимоги відновлення державної незалежності
  - section: 'Аналіз ключових творів: II — Концепція «поневоленої нації»'
    words: 500
    points:
      - Осмислення українців як поневоленої нації, якій загрожує повна асиміляція
      - Критика 'малоросійства' та пасивного очікування поступок від метрополії
      - Теза про те, що державна самостійність — єдина умова виживання національного
        організму
  - section: 'Аналіз ключових творів: III — Радикалізм та гасло «Україна для українців»'
    words: 450
    points:
      - 'Формулювання максималістської мети: ''Одна, єдина, нероздільна, вільна, самостійна
        Україна від гір Карпатських аж по Кавказькі'''
      - 'Поляризація політичного поля: ''Усі, хто на цілій Україні не за нас, ті проти
        нас'''
      - Радикальний безкомпромісний тон як необхідний шок для суспільної свідомості
  - section: 'Стилістика та мова автора: I — Риторика національного пробудження'
    words: 400
    points:
      - Використання жанру публіцистичного маніфесту
      - Мова ультиматумів, емоційна зарядженість та використання різких контрастів
        (свобода — неволя)
  - section: 'Стилістика та мова автора: II — Публіцистичний пафос та маніфестний
      стиль'
    words: 400
    points:
      - Ораторська природа тексту, розрахованого на публічне виголошення перед масами
      - Афористичність висловлювань, карбованість і динамічність фрази
  - section: 'Деколонізаційна перспектива: I — Як цей автор руйнує імперські міфи'
    words: 450
    points:
      - Категорична відмова від лояльності до російського царату
      - Деконструкція імперського наративу про історичне 'братерство' та 'добровільне
        злиття'
      - Спростування міфу про винятково соціальну спрямованість українського руху
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
    words: 450
    points:
      - Повернення Україні статусу політичного суб'єкта міжнародного права
      - Визнання нації самодостатньою силою, яка має природне право на самовизначення
      - Подолання комплексу меншовартості через проголошення власної державної волі
  - section: 'Підсумок та спадщина: I — Рецепція сучасниками та критика'
    words: 400
    points:
      - Обережне і часто вороже сприйняття ідей Міхновського тогочасною соціалістичною
        елітою (М. Грушевський, В. Винниченко)
      - Звинувачення у 'шовінізмі' та подальший вихід Міхновського з РУП, створення
        УНП
  - section: 'Підсумок та спадщина: II — Ідеологічний фундамент XX століття'
    words: 400
    points:
      - Вплив 'Самостійної України' на становлення ідеології українського націоналізму
        та праці Дмитра Донцова
      - Реалізація візії Міхновського під час Визвольних змагань 1917-1921 років та
        значення для сучасної незалежної України
