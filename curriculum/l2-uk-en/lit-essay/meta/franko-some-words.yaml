slug: franko-some-words
title: Franko Some Words
word_target: 4000
content_outline:
- section: Вступ та історичний контекст Галичини 1897 року
  words: 500
  points:
  - Політичний та культурний клімат Львова наприкінці XIX століття
  - Конфлікт Івана Франка з польським інтелектуальним середовищем (стаття про Міцкевича)
  - 'Становище українського руху: консерватизм народовців та криза радикалізму'
- section: Генеза есею «Дещо про себе самого»
  words: 450
  points:
  - Передмова до польськомовної збірки «Obrazki galicyjskie» (1897)
  - Парадокс написання українського маніфесту польською мовою
  - 'Подвійний адресат есею: відповідь польському шовінізму та виклик українській
    провінційності'
- section: 'Аналіз парадоксу: «Я не люблю русинів»'
  words: 600
  points:
  - Деконструкція скандальної тези та її справжнє семантичне значення
  - Критика «сліпого», сентиментального патріотизму («безтямна любов»)
  - Неприйняття інтелектуальної лінощів та меншовартості тогочасної галицької еліти
- section: Концепція національного обов'язку
  words: 550
  points:
  - Трактування патріотизму як етичного імперативу («тяжке ярмо»)
  - Філософський перехід від емоційного захоплення до політичної відповідальності
  - Розуміння праці для нації як фатуму і неминучого покликання
- section: Риторика та стилістика сповіді
  words: 450
  points:
  - 'Жанрова специфіка: поєднання публіцистики, сповіді та маніфесту'
  - 'Риторична стратегія шокової терапії: антитези, метафори, різкі формулювання'
  - Використання відвертості як зброї в інтелектуальній дискусії
- section: Полеміка та суспільний резонанс
  words: 500
  points:
  - 'Реакція галицького суспільства: шок, нерозуміння, звинувачення у зраді'
  - Аналіз публікації Юліана Романчука «Смутні появи»
  - Остракізм Франка та трагедія інтелектуала, що випередив свій час
- section: Деколонізаційна перспектива та суб'єктність
  words: 500
  points:
  - 'Руйнування колоніальних міфів: відмова від віктимного наративу'
  - Самокритика як прояв найвищої сили та української суб'єктності
  - Вихід української літератури та думки на універсальний європейський рівень рефлексії
- section: Спадщина тексту в модерному націєтворенні
  words: 450
  points:
  - Вплив есею на формування ідеології націоналізму 1920-х років (Д. Донцов, Є. Маланюк)
  - Ідейний місток між «Дещо про себе самого» (1897) та поемою «Мойсей» (1905)
  - Актуальність франкового критичного патріотизму для сучасної України
