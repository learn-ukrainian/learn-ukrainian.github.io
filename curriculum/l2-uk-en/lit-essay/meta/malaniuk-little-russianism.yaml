slug: malaniuk-little-russianism
title: Malaniuk Little Russianism
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Історичні передумови'
  words: 400
  points:
  - Втрата державності (від Руїни до поразки УНР) як головний ґрунт малоросійства.
  - Травма поразки 1917–1921 років як імпульс для пошуку внутрішніх причин національної
    катастрофи.
- section: 'Вступ та контекст: II — Біографічний вимір та еміграція'
  words: 400
  points:
  - Спостереження Маланюка за українцями в еміграції та підрадянській Україні.
  - Написання та видання есею «Малоросійство» (Нью-Йорк, 1959) як спроба встановлення
    жорсткого діагнозу нації.
- section: 'Аналіз ключових творів: I — Структура та головна теза есею'
  words: 400
  points:
  - Малоросійство як не політична орієнтація, а внутрішньонаціональна неміч і хвороба.
  - Зв'язок малоросійства з послабленням та втратою історичної пам'яті.
- section: 'Аналіз ключових творів: II — Діагностика хвороби бездержавності'
  words: 400
  points:
  - Вразливість «мозкового центру» нації — інтелігенції — до малоросійського комплексу.
  - 'Медична термінологія Маланюка: хвороба, каліцтво, параліч політичної волі.'
- section: 'Стилістика та мова автора: I — Риторика та термінологія'
  words: 400
  points:
  - Формування мілітарного, категоричного («вісниківського») стилю письма.
  - 'Кування нових термінів: «національне пораженство», «тотальна капітуляція».'
- section: 'Стилістика та мова автора: II — Метафорика мілітарності'
  words: 400
  points:
  - Використання лексики сили, зброї та боротьби (концепт «стилета і стилоса»).
  - Відкидання сентименталізму та ліризму як проявів ментальної слабкості.
- section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
  words: 400
  points:
  - Деконструкція образу безпечного, співочого «меншого брата» як інструменту імперського
    розтління.
  - Викриття малоросійства як механізму духовного рабства, а не простої лояльності.
- section: 'Деколонізаційна перспектива: II — Повернення української суб''єктності'
  words: 400
  points:
  - Усвідомлення діагнозу як перший крок до національного зцілення та деколонізації.
  - Потреба у «напруженому творенні Духової Суверенності» та відновленні державотворчої
    волі.
- section: 'Підсумок та спадщина: I — Рецепція праці в діаспорі та в Україні'
  words: 400
  points:
  - Гостра дискусійність есею в середовищі еміграції та заборона твору в радянській
    Україні.
  - Повернення праці до українського інтелектуального дискурсу в 1990-х роках.
- section: 'Підсумок та спадщина: II — Актуальність концепції в сучасних умовах'
  words: 400
  points:
  - Пророче значення «Малоросійства» для усвідомлення постколоніальних травм.
  - Актуалізація ідей Маланюка в умовах екзистенційної російсько-української війни.
