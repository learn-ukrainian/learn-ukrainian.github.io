slug: drahomanov-shevchenko
title: "Драгоманов про Шевченка: Народництво і Літературна Критика"
word_target: 5000
content_outline:
  - section: 'Вступ: Історичний контекст еміграції та європейська думка'
    words: 450
    points:
      - Емський указ 1876 року та вимушена еміграція М. Драгоманова до Женеви
      - Створення вільної преси («Громада») як майданчика для незалежної європейської
        думки
      - Вплив європейського позитивізму та соціалізму на формування критичного методу
        автора
  - section: 'Вступ: Проблема некритичного культу Шевченка'
    words: 450
    points:
      - Формування майже релігійного поклоніння навколо постаті Шевченка в 1870-х
        роках
      - Перетворення вшанування поета на аполітичний, безпечний ритуал для київської
        інтелігенції
      - Драгоманівське несприйняття ідолопоклонства та сентиментального шароварництва
  - section: 'Аналіз есе: Критика сліпого українофільства'
    words: 550
    points:
      - Огляд основної тези праці «Шевченко, українофіли й соціалізм» (1879)
      - Критика ліберальної інтелігенції, яка прикривала свою бездіяльність авторитетом
        «Кобзаря»
      - Твір як політичний маніфест, що вимагає переходу від слів до практичної організаційної
        роботи
  - section: 'Аналіз есе: Десакралізація образу поета'
    words: 550
    points:
      - Застосування раціоналістичного європейського методу до аналізу української
        ікони
      - 'Спростування міфу про «недоторканість» Шевченка: необхідність бачити в ньому
        живу людину свого часу'
      - Вимога читати історіософські поеми Кобзаря з позицій сучасної європейської
        науки, а не як непогрішиме святе письмо
  - section: 'Аналіз есе: Шевченко і європейські соціальні ідеї'
    words: 550
    points:
      - Оцінка Драгомановим Шевченка як могутнього виразника соціального протесту
        пригнобленого селянства
      - Вписування поезії Шевченка у контекст європейської демократичної літератури
        (паралелі з Бернсом, Беранже)
      - Драгоманівське тлумачення соціальних інстинктів поета, які необхідно перетворити
        на свідому програму
  - section: 'Стилістика: Мова української політичної публіцистики'
    words: 450
    points:
      - Створення Драгомановим нової мови модерної української есеїстики та політології
      - Відмова від емоційно-романтичного стилю на користь логічної, сухої, аргументованої
        прози
      - Вироблення наукової та політичної термінології українською мовою в женевських
        виданнях
  - section: 'Стилістика: Риторика та полемічні прийоми Драгоманова'
    words: 450
    points:
      - 'Аналіз архітектоніки аргументу: перехід від тези опонента до її логічного
        розгрому'
      - Використання іронії та сарказму щодо аполітичних «плакальників» над долею
        України
      - Застосування європейських порівнянь як інструменту інтелектуального переконання
        читача
  - section: 'Деколонізаційна перспектива: Руйнування імперських та провінційних міфів'
    words: 500
    points:
      - Спростування імперського російського міфу про меншовартість і виключну етнографічність
        української літератури
      - Удар по українському провінціалізму, який добровільно замикався в гетто сентиментального
        патріотизму
      - 'Деколонізація читацького мислення: перетворення об''єкта страждань на політично
        свідомого громадянина'
  - section: 'Деколонізаційна перспектива: Українська суб''єктність'
    words: 500
    points:
      - Утвердження здатності української думки генерувати політичні ідеї світового
        рівня
      - Трактування Шевченка не як кінцевої мети національного розвитку, а як потужного
        фундаменту для європейської нації
      - 'Формування ідеї суб''єктності: відмова від російського народництва на користь
        українського самостійного європейського шляху'
  - section: 'Підсумок: Рецепція серед сучасників та вплив на радикалів'
    words: 250
    points:
      - 'Розкол в українському середовищі: відторгнення статті старшими київськими
        громадівцями'
      - Потужний вплив праці на формування світогляду Івана Франка, Михайла Павлика
        та галицької радикальної молоді
  - section: 'Підсумок: Спадщина Драгоманова в історії літературознавства'
    words: 300
    points:
      - Фундаментальне значення статті для зародження української філософської критики
      - Закладення раціональних, деколоніальних підходів до вивчення класичної літератури,
        актуальних для сучасної модерної України
