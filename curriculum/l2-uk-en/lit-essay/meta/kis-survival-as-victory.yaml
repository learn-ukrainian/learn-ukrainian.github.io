slug: kis-survival-as-victory
title: 'Оксана Кісь: Вижити значить перемогти'
word_target: 5000
content_outline:
  - section: 'Вступ: Жіночий досвід ГУЛАГу та усна історія'
    words: 500
    points:
      - 'Актуалізація жіночого досвіду: вихід за межі маргіналізації в історіографії'
      - Методологія усної історії та феміністичної антропології
      - Аналіз понад 150 жіночих спогадів, мемуарів та інтерв'ю
  - section: 'Вступ: Чоловічий vs Жіночий таборовий наратив'
    words: 500
    points:
      - Домінування класичного «чоловічого» канону (Солженіцин, Шаламов) і його обмеженість
      - Фокус чоловічих текстів на політиці, конкуренції та фізичному виживанні
      - Зосередженість жіночих текстів на тілесності, міжособистісних зв'язках та
        емоціях
  - section: 'Тілесність і Гендер: Тіло, гідність та захист'
    words: 700
    points:
      - 'Дегуманізація через руйнування тілесності: чоловічий одяг, гоління голів'
      - Специфіка жіночої фізіології та гігієни в нелюдських умовах
      - Догляд за тілом як акт спротиву та збереження людської подоби
      - Постійна загроза сексуального насильства та стратегії жіночого захисту
  - section: 'Тілесність і Гендер: Материнство в неволі'
    words: 550
    points:
      - 'Вагітність у таборах: наслідки насильства та пошук сенсу життя'
      - Трагедія відриву матері від дитини як інструмент психологічного тортурування
      - Катастрофічні умови та надвисока смертність у табірних сиротинцях
  - section: 'Стратегії виживання: Творчість і мікроопір'
    words: 600
    points:
      - Таємна творчість (вишивання риб'ячими кістками, складання віршів) як порятунок
        розуму
      - 'Релігійні практики: таємне святкування Великодня, Різдва, спільні молитви'
      - Значення культурних ритуалів для символічного виходу за межі зони (табору)
  - section: 'Стратегії виживання: Посестримство та солідарність'
    words: 600
    points:
      - 'Концепт «посестримства»: формування табірних (ерзац) сімей'
      - Взаємодопомога, спільне використання пайків, догляд за хворими
      - Національна та земляцька солідарність (зокрема, серед жінок із Західної України)
        як основа протистояння атомізації
  - section: 'Аналіз тексту: Методологія та емоційна глибина'
    words: 500
    points:
      - Баланс між науковою строгістю (антропологія) та високою емоційною емпатією
      - Етичний підхід О. Кісь до роботи зі свідченнями та травматичною пам'яттю
      - 'Читання «між рядків»: аналіз мовчання та використання евфемізмів'
  - section: 'Аналіз тексту: Деколонізаційний вимір'
    words: 550
    points:
      - Деконструкція радянського міфу про ГУЛАГ як універсальну трагедію без національного
        виміру
      - Визнання українок агентками історії, а не пасивними жертвами
      - Специфіка досвіду українських політичних в'язнів (зв'язкових підпілля) у протистоянні
        русифікації
  - section: 'Підсумок: Збереження життя як перемога'
    words: 500
    points:
      - 'Розшифрування головної тези: «вижити значить перемогти»'
      - Збереження ідентичності (людської, жіночої, української) як абсолютна перемога
        над тоталітаризмом
      - Фундаментальне значення книги Оксани Кісь для сучасної історії України та
        розуміння ГУЛАГу
