slug: shevelov-history-language
title: "Юрій Шевельов: Есеїстика про Мову і Культурний Геноцид"
word_target: 5000
content_outline:
  - section: Вступ та контекст
    words: 750
    points:
      - 'Життєвий шлях Юрія Шевельова (Шереха): від Харкова до Гарварду та Колумбійського
        університету.'
      - Інтелектуальне середовище МУРу в діаспорі як простір вільної української думки.
      - Статус українського мовознавства під радянським тиском та роль Шевельова у
        його збереженні.
  - section: 'Аналіз ключових творів: «Історична фонологія» та науковий переворот'
    words: 1300
    points:
      - Розвінчання імперського міфу про «давньоруську народність» та єдину «колиску
        трьох братніх народів».
      - Фонологічні докази безпосереднього походження української мови від праслов'янської.
      - Значення праці «A Historical Phonology of the Ukrainian Language» (1979) для
        світової славістики.
  - section: 'Аналіз ключових творів: Есеїстика та «Москва, Маросейка»'
    words: 1250
    points:
      - Інтелектуальна есеїстика Юрія Шереха як жанр національної саморефлексії.
      - 'Аналіз есе «Москва, Маросейка» (1954): анатомія відносин між Україною та
        Росією після Переяслава.'
      - 'Три головні вороги українського відродження: Москва, провінціалізм (хуторянство)
        та «Кочубеївщина».'
  - section: Стилістика та мова автора
    words: 600
    points:
      - Поєднання строгої академічної логіки, європейської ерудиції та дошкульної
        полемічної іронії.
      - Використання питомої української лексики та харківського правопису як акт
        опору радянській асиміляції.
      - 'Риторичні стратегії Шевельова: інтелектуальна провокація та деконструкція
        догм.'
  - section: Деколонізаційна перспектива
    words: 600
    points:
      - Як науковий об'єктивізм Шевельова розбиває російську політичну міфологію.
      - 'Повернення українській культурі суб''єктності: вихід із тіні «молодшого брата».'
      - Деконструкція комплексу меншовартості та малоросійства через інтелектуальний
        аналіз.
  - section: Підсумок та спадщина
    words: 500
    points:
      - Фундаментальне значення Шевельова для сучасного українського мовознавства
        та літературознавства.
      - Вплив його есеїстики на сучасних публічних інтелектуалів (Оксана Забужко,
        Юрій Андрухович).
      - Актуальність концепції «трьох ворогів» для сучасної України в умовах екзистенційної
        війни.
