slug: prokopovych-baroque-oratory
title: 'Феофан Прокопович і Риторика Барокового Розуму: Києво-Могилянська Ораторська
  Традиція'
word_target: 5000
content_outline:
- section: 'Вступ та контекст: I — Києво-Могилянська академія як центр риторики'
  words: 600
  points:
  - КМА як унікальний простір синтезу європейської єзуїтської моделі освіти та православної
    ідентичності.
  - Повернення Прокоповича з Європи (Рим) та оновлення академічних курсів з «Піїтики»
    та «Риторики» у 1705-1706 роках.
  - Роль Прокоповича як студента, згодом викладача і ректора КМА, який заклав основи
    для жанру українського есею.
- section: 'Вступ та контекст: II — Між Києвом і Петербургом'
  words: 600
  points:
  - 'Конфлікт ідентичностей: київський період незалежного барокового вченого проти
    петербурзького періоду ідеолога імперії.'
  - Спростування деколонізаційного міфу про те, що Прокопович є виключно «російським
    діячем».
  - 'Аргументація українського канону: найкращі теоретичні трактати написані латиною
    в Києві до імперської кооптації 1716 року.'
- section: 'Аналіз «De Arte Poetica» (Поетика, 1705): Теорія мистецтва'
  words: 700
  points:
  - Розгляд Прокоповича як першого систематичного теоретика поетичного мистецтва на
    східнослов'янських землях.
  - 'Спирання на античну спадщину: концепція Арістотеля про поезію як mimesis (наслідування)
    та важливість барокової вигадки (inventio).'
  - 'Еволюція критеріїв краси: від суто дидактичного церковного підходу до передгуманістичного
    розуміння естетичної цінності тексту.'
- section: 'Аналіз «De Arte Rhetorica» (Риторика, 1706): Переконання і влада'
  words: 700
  points:
  - Трактат як практичний посібник з використання слова як інструменту впливу та влади
    (орієнтація на Цицерона і Квінтиліана).
  - Класифікація риторики на судове, дорадче та епідейктичне (похвальне) красномовство;
    специфіка їх використання в КМА.
  - 'Панегірик як головний публічний жанр епохи: як через похвалу оратор висловлював
    політичну програму.'
- section: 'Ораторські виступи: Проповідь як публічний есей'
  words: 700
  points:
  - Аналіз «Слова похвального про Полтавську перемогу» (1709) як зразка політичної
    публіцистики та майстерної пропаганди.
  - «Надгробне слово Петру I» (1725) як філософсько-риторичний лабіринт, де перетинаються
    офіційний пафос і рефлексія.
  - Трансформація церковної проповіді у світський публічний виступ, що впливає на
    суспільну думку.
- section: 'Стилістика та мова: Бароковий орнамент і ясність думки'
  words: 600
  points:
  - Баланс між бароковою надмірністю (amplificatio) та класицистичною ясністю й лаконічністю
    (brevitas).
  - 'Полілінгвізм Прокоповича: використання європейської латини, книжної української
    мови та пізнішого імперського словенороського стилю.'
  - Рясне цитування античних класиків (Вергілій, Овідій, Цицерон) як доказ належності
    до загальноєвропейського культурного простору.
- section: 'Деколонізаційна перспектива: КМА і незалежність думки'
  words: 600
  points:
  - 'Аналіз феномену «київської експансії»: викачування інтелектуалів з КМА до неосвіченої
    Московської держави.'
  - 'Трагічний парадокс: українські гуманісти власноруч створили ідеологічний апарат
    Російської імперії (зокрема «Духовний регламент»).'
  - КМА як осередок системної освіти, що суттєво випереджав тогочасний рівень Московії.
- section: 'Підсумок та спадщина: Від Прокоповича до сучасної публіцистики'
  words: 600
  points:
  - Вплив риторичної школи КМА на формування потужного українського публіцистичного
    слова (від Шевченка до діячів XX ст.).
  - Актуальність трактату «De Arte Rhetorica» для сучасних досліджень з академічного
    письма та комунікацій.
  - 'Проблема повернення Прокоповича в український культурний простір: прийняття амбівалентної
    спадщини видатного мислителя.'
