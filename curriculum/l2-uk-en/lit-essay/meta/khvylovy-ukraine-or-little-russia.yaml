slug: khvylovy-ukraine-or-little-russia
title: "Хвильовий: «Україна чи Малоросія?» — Орієнтація на Захід"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Історичне тло Літературної дискусії'
    words: 450
    points:
      - Літературна дискусія 1925–1928 рр. як переломний момент культурної незалежності.
      - Ілюзія свободи під час політики «українізації» у 1920-х роках.
      - Протистояння ідеології примітивного масовізму («пролеткульту») та ідеї високого,
        елітарного мистецтва.
  - section: 'Вступ та контекст: II — Постать Миколи Хвильового'
    words: 450
    points:
      - 'Біографічний контекст: еволюція від фронтовика і комуніста до палкого ідеолога
        національного відродження.'
      - Створення ВАПЛІТЕ як противаги офіційній партійній лінії в літературі.
      - 'Світоглядний злам: від віри у всесвітню «загірну комуну» до жорсткого антиімперіалізму.'
  - section: 'Аналіз ключових творів: I — Історія написання та заборона памфлету'
    words: 500
    points:
      - Написання трактату «Україна чи Малоросія?» у 1926 році як відповідь на ідеологічний
        тиск.
      - 'Особисте втручання Сталіна: лист до Кагановича з вимогою припинити антимосковські
        виступи Хвильового.'
      - 'Заборона публікації тексту: його циркуляція лише у машинописних списках (самвидаві).'
      - Історія переховування рукопису в спецсховищах КДБ до сенсаційної публікації
        у 1990 році.
  - section: 'Аналіз ключових творів: II — Концепт «Малоросійства»'
    words: 550
    points:
      - Малоросійство як психологічний, а не географічний чи етнографічний феномен
        (комплекс меншовартості).
      - Гостра критика конформістської інтелігенції, яка продовжує сліпо озиратися
        на московських «диригентів».
      - 'Залізна аргументація Хвильового: «Росія самостійна держава? Ну, так і ми
        самостійна».'
      - Малоросійство як добровільна згода на культурну провінційність та другорядність.
  - section: 'Аналіз ключових творів: III — Орієнтація на «Психологічну Європу»'
    words: 550
    points:
      - Розшифровка легендарного гасла «Даєш психологічну Європу!».
      - Європа як уособлення «фаустівського духу», динамізму, постійного пошуку і
        культурного прогресу.
      - Кардинальне протиставлення європейської творчої активності «євразійському
        застою» та пасивності.
      - Необхідність виходу української літератури на широку світову арену без посередництва
        метрополії.
  - section: 'Стилістика та мова автора: I — Публіцистичний запал та полемічність'
    words: 450
    points:
      - Експресивність, безкомпромісність та іронічність авторського стилю.
      - Майстерне використання риторичних запитань, окликів та гострої полемічної
        агресії.
      - 'Специфіка форми памфлету: відверте звернення до політичного опонента і водночас
        до всієї нації.'
  - section: 'Стилістика та мова автора: II — Образність та риторичні фігури'
    words: 450
    points:
      - Використання потужних і влучних метафор (таких як «рабське наслідування»,
        «диригентська паличка Москви»).
      - Своєрідне поєднання офіційної марксистської термінології з виразно національно-визвольним,
        деколонізаційним змістом.
      - Особливий авторський ритм прози, що нагадує політичний маніфест.
  - section: 'Деколонізаційна перспектива: I — Руйнування імперського міфу про «старшого
      брата»'
    words: 500
    points:
      - Пряме спростування міфу про природну єдність російської та української культур.
      - Критика російської літератури не за її художню якість, а за її гегемоністську,
        імперсько-асиміляційну роль.
      - 'Аналіз тези: «Справа в тому, що російська література тяжить над нами в віках
        як господар становища».'
      - Викриття культурних механізмів, за допомогою яких імперія утримує колонії.
  - section: 'Деколонізаційна перспектива: II — Емансипація української культури'
    words: 500
    points:
      - Розкодування гасла «Геть від Москви!» як заклику до абсолютної ментальної
        суверенності.
      - 'Ствердження повноцінної української суб''єктності: література має творитися
        виключно за власними законами.'
      - Культурна емансипація як базова і необхідна умова для виживання нації в умовах
        посилення радянського тиску.
  - section: 'Підсумок та спадщина: I — Трагічний фінал автора та розстріляне відродження'
    words: 350
    points:
      - Кінець політики українізації та розгортання масових репресій проти вільної
        української інтелігенції.
      - Арешт Михайла Ялового та символічний постріл Хвильового 13 травня 1933 року.
      - Історичне значення цього самогубства як останнього акту спротиву і пронизливого
        попередження для нації.
  - section: 'Підсумок та спадщина: II — Актуальність ідей Хвильового сьогодні'
    words: 350
    points:
      - Як памфлет «Україна чи Малоросія?» звучить і резонує в умовах сучасної російсько-української
        війни.
      - Остаточне подолання «малоросійства» як найважливіше завдання нинішнього покоління
        українців.
      - Законне місце спадщини Миколи Хвильового у пантеоні деколонізаційної думки
        України.
