slug: istoriia-rusiv-romantics-reception
title: "«Історія Русів» і Романтики: Як Шевченко, Куліш і Костомаров Будували Міф"
word_target: 5000
content_outline:
- section: 'Вступ: I — Текст і покоління'
  words: 500
  points:
  - 'Публікація «Історії Русів» 1846 року у «Чтениях» Московського товариства — і відразу захоплений відгук серед романтиків.'
  - 'Три романтики і один текст: Шевченко, Куліш, Костомаров — три різних прочитання одного твору і три різних «Руси».'
  - 'Чому романтики потребували «Історії Русів»: брак власної документальної спадщини і потреба в «першоджерелі».'
- section: 'Вступ: II — Романтичний проект і будівництво нації'
  words: 500
  points:
  - 'Харківська школа і «Руська трійця» — контекст, у якому читалася «Історія Русів»: що шукали і що знаходили.'
  - 'Концепція «народного духу» (Volksgeist) у Гердера: як цей інтелектуальний інструмент застосовується до козацького наративу.'
  - 'Кирило-Мефодіївське братство: чому і Шевченко, і Костомаров, і Куліш входили до одного кола і мали різні проекти.'
- section: 'Шевченко і «Гайдамаки»: Козацький епос як відповідь на «Русів»'
  words: 700
  points:
  - 'Поема «Гайдамаки» (1841) як свідома художня відповідь на «Історію Русів» — де Шевченко продовжує і де переосмислює.'
  - 'Образ Гонти і Залізняка: народна мова проти книжного стилю «Русів» — два підходи до ідентичної теми.'
  - 'Деколонізаційна позиція Шевченка: народ, а не козацька старшина, є носієм нації — принципова відмінність від автора «Русів».'
- section: 'Куліш і «Чорна рада»: Роман як поглиблення рецепції'
  words: 700
  points:
  - '«Чорна рада» (1857) як перший україномовний роман — і «Історія Русів» як одне з його першоджерел.'
  - 'Куліш і козацька держава: трагедія Руїни у художньому і публіцистичному осмисленні — де він і де «Руси».'
  - 'Пізній Куліш і критика козацтва: від захоплення до розчарування — як змінилася рецепція тексту з часом.'
- section: 'Костомаров і «Книги буття»: Від «Русів» до народного євангелія'
  words: 600
  points:
  - '«Книги буття українського народу» (1846) як радикальна переінтерпретація тієї ж козацько-демократичної ідеї.'
  - Костомаров і «рівність народів» — де він іде далі «Русів» і де залишається в її ідеологічному просторі.
  - 'Процес над Кирило-Мефодіївцями 1847 року: як читання «Русів» стало поліційним злочином.'
- section: 'Інші голоси: Куліш-редактор, Максимович, Мордовець'
  words: 500
  points:
  - Куліш як редактор і коментатор «Русів» — його наукова робота з текстом поряд з художньою рецепцією.
  - Максимович і фольклористика — як «Руси» вплинули на збирання і тлумачення народних пісень.
  - 'Мордовець і пізній романтизм: рецепція «Русів» у другій половині XIX ст. — що змінилося і що залишилося.'
- section: 'Деколонізаційна перспектива: Міф і право на минуле'
  words: 500
  points:
  - 'Чому колонізовані культури потребують «давніх» джерел: влада над минулим = влада над ідентичністю.'
  - Реакція царської цензури на «Историю Русов» і «Гайдамаки» — що держава розуміла краще за сучасних критиків.
  - '«Міф» у позитивному сенсі: не «хибна розповідь», а організуюча нарація спільноти — що означає «руйнування» цього міфу.'
- section: 'Підсумок: «Руси» у сучасному прочитанні'
  words: 500
  points:
  - Від Шевченка до Грушевського — тяглість рецепції козацького наративу в українській думці.
  - 'Сьогодні: чи потрібен «Русів» наратив Україні після 2022 року, або він уже виконав свою функцію?'
  - Зв'язок між попереднім модулем (текст) і цим (рецепція) — як текст стає «живим» тільки через читачів.
