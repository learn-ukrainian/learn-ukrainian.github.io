slug: istoriia-rusiv-forgery-and-genius
title: "«Історія Русів»: Геніальна Містифікація чи Перший Маніфест Нації?"
word_target: 5000
content_outline:
- section: 'Вступ: I — Текст, що змінив самосвідомість'
  words: 500
  points:
  - '«Історія Русів» (написана бл. 1800–1820, опублікована 1846): чому текст, написаний анонімно, став одним з найвпливовіших в українській культурі.'
  - 'Приписування авторства: від Кониського до Полетики — сторіччя спорів і відсутність однозначної відповіді.'
  - 'Ключове питання: чи є «містифікація» перешкодою для вивчення тексту, чи вона і є його головним смислом?'
- section: 'Вступ: II — Жанрова проблема: між хронікою і маніфестом'
  words: 500
  points:
  - 'Псевдо-хроніка як жанр: текст вдає, що він давніший, ніж є — які аналоги існують в інших літературах?'
  - '«Ossian» і «Краледворський рукопис» — контекст загальноєвропейської «первісної поезії» і романтичних містифікацій.'
  - 'Чому розвінчання «автентичності» не знижує значення тексту: ідеологічна функція важливіша за філологічну справжність.'
- section: 'Аналіз тексту: I — Козацька автономія і право на державу'
  words: 700
  points:
  - Центральний аргумент «Історії Русів» — козацтво як правонаступник давньої руської держави, а не як продукт польського сюзеренітету.
  - 'Концепція «прав і вольностей»: юридичний аргумент у наративній формі — як автор перетворює пропаганду на «правову» доктрину.'
  - Образ Хмельницького у тексті — між реальністю і легендою, між бунтівником і засновником держави.
- section: 'Аналіз тексту: II — Мова і риторика влади'
  words: 700
  points:
  - 'Мова тексту: книжна українська з елементами ранньомодерного стилю — свідома стилізація «під давнину».'
  - 'Риторичні стратегії: апеляція до «споконвічних прав», промови героїв, риторика жертви і опору.'
  - Порівняння стилю з реальними козацькими документами XVII ст. — де відрізняється і де наближається.
- section: 'Аналіз тексту: III — Деколонізаційна програма під маскою хроніки'
  words: 600
  points:
  - 'Зображення Москви і Польщі у тексті: обидва «чужих» влади зображені як поневолювачі без права на Україну.'
  - Відмова від «малоросійського» наративу — текст стверджує повну державну суб'єктність України, а не автономію в межах Росії.
  - 'Чому це небезпечний текст: він легітимізує ідею незалежності на мові XVIII ст., яку влада не зразу впізнає як «небезпечну».'
- section: 'Рецепція і вплив до 1846 року: Рукописна традиція'
  words: 500
  points:
  - Поширення рукописних копій у 1820–40-х серед козацької старшини і ранніх романтиків.
  - 'Декабристи і «Історія Русів»: чи читали Рилєєв і Муравйов-Апостол цей текст і що вони з ним робили?'
  - Роль тексту у формуванні Харківської романтичної школи і раннього Шевченка.
- section: 'Деколонізаційна перспектива: Містифікація як акт культурного спротиву'
  words: 500
  points:
  - 'Чому у колонізованих культур виникають «містифіковані» документи: брак доступу до архівів = брак права на власну минувшину.'
  - 'Порівняння з «Ossian» і валлійськими романтичними містифікаціями: між «підробкою» і «відновленням» — де межа?'
  - '"Злочин" автора «Історії Русів» — написати те, що мало б бути написано, але не було, — і чому це вимагає аналізу, а не засудження.'
- section: 'Підсумок: Чому «Історія Русів» досі актуальна'
  words: 500
  points:
  - Текст як дзеркало, у якому кожне покоління бачить власні потреби — від романтиків до сьогоднішніх дебатів про ідентичність.
  - 'Питання канону: чи належить «Історія Русів» до «літератури» чи до «документального джерела» — і чи важливо це розрізнення?'
  - Зв'язок з наступним модулем про рецепцію тексту романтиками — як міф народжувався і поширювався.
