slug: vira-ageyeva-canon
title: "Віра Агеєва: Жіночий Канон і Феміністична Критика в Українській Літературі"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: І — Формування дослідниці'
    words: 450
    points:
      - Біографічний вихід з радянської школи літературознавства
      - Становлення Віри Агеєвої як науковиці на зламі епох
  - section: 'Вступ та контекст: ІІ — Літературознавство 1990-х'
    words: 450
    points:
      - Роль Києво-Могилянської академії у створенні нової гуманітарної школи
      - Впровадження західних методологій (постколоніалізм, фемінізм) замість марксистської
        критики
  - section: 'Аналіз ключових творів: І — Феміністичний дискурс'
    words: 500
    points:
      - Аналіз книги «Жіночий простір»
      - 'Деконструкція образу Лесі Українки: від «дочки Прометея» до європейської
        інтелектуалки'
      - Утвердження жіночого голосу в українському модернізмі
  - section: 'Аналіз ключових творів: ІІ — Реабілітація модернізму'
    words: 500
    points:
      - Розгляд «Апології модерну» та робіт про Віктора Петрова-Домонтовича
      - Модернізм як проект європеїзації та національного самоствердження
  - section: 'Аналіз ключових творів: ІІІ — Київський текст'
    words: 500
    points:
      - «Марсіани на Хрещатику» як реконструкція урбаністичної ідентичності
      - 'Літературний Київ 1920-х: богема, авангард, кав''ярні'
  - section: 'Стилістика та мова автора: І — Есеїстичність'
    words: 450
    points:
      - 'Подолання сухого академізму: перехід до блискучої європейської есеїстики'
      - Полемічність, іронія та відкритість до діалогу з читачем
  - section: 'Стилістика та мова автора: ІІ — Концептуальний апарат'
    words: 450
    points:
      - 'Адаптація та введення нових термінів: дискурс, ресентимент, деконструкція'
      - Створення нової мови для розмови про українську літературу
  - section: 'Деколонізаційна перспектива: І — Руйнування імперських міфів'
    words: 600
    points:
      - Аналіз есеїстики «За лаштунками імперії»
      - Розвінчання міфу про провінційність і селянськість української літератури
      - Викриття механізмів імперського привласнення
  - section: 'Деколонізаційна перспектива: ІІ — Українська суб''єктність'
    words: 600
    points:
      - 'Зміна оптики: відмова від погляду через призму Москви'
      - Утвердження самодостатньої української культури в європейському контексті
  - section: 'Підсумок та значення: І — Зміна парадигми'
    words: 250
    points:
      - Вплив праць Агеєвої на шкільні та університетські програми
      - Остаточний відхід від народницького канону
  - section: 'Підсумок та значення: ІІ — Інтелектуальний орієнтир'
    words: 250
    points:
      - Місце Віри Агеєвої як публічної інтелектуалки під час повномасштабної війни
      - Актуальність її праць для захисту культурної ідентичності
