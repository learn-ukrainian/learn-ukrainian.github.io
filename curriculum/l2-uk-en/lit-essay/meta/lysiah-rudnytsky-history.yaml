slug: lysiah-rudnytsky-history
title: Lysiah Rudnytsky History
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Формування інтелектуала в еміграції'
    words: 600
    points:
      - 'Біографічний контекст: походження з впливової родини (Мілена Рудницька),
        європейська освіта (Львів, Відень, Берлін).'
      - 'Вплив еміграції: формування раціонального, позбавленого сентименталізму погляду
        на українську історію.'
  - section: 'Вступ та контекст: Концепція української історії'
    words: 600
    points:
      - Відхід від етнографічно-оповідної історії до історії політичних ідей.
      - Синтез державницької та демократичної традицій в історіографії.
  - section: 'Аналіз ключових творів: «Формування українського народу і нації»'
    words: 850
    points:
      - 'Центральний есей: розмежування понять «етнос» і «політична нація».'
      - Аргументація щодо безперервності української політичної традиції від Київської
        Русі до модерної доби.
  - section: 'Аналіз ключових творів: Полеміка з традиційними школами'
    words: 750
    points:
      - Критичний аналіз народницької школи М. Грушевського (роль мас).
      - Діалог з державницькою школою В. Липинського (роль еліт та інституцій).
  - section: 'Стилістика та мова автора: Західноєвропейський стандарт'
    words: 550
    points:
      - Особливості жанру історичного есе у творчості Лисяка-Рудницького.
      - 'Риторичні стратегії: англосаксонська аналітичність, структурна ясність, відмова
        від віктимного пафосу.'
  - section: 'Деколонізаційна перспектива: Деконструкція міфу про «неісторичну націю»'
    words: 600
    points:
      - Спростування гегельянської концепції «неісторичних націй» щодо України.
      - Як Лисяк-Рудницький руйнував російський імперський міф про відсутність української
        політичної культури.
  - section: 'Деколонізаційна перспектива: Українська суб''єктність'
    words: 600
    points:
      - Переосмислення української історії не як об'єкта впливу сусідів, а як активного
        суб'єкта європейського процесу.
      - Україна як цивілізаційне порубіжжя із власним синтетичним характером (Схід
        і Захід).
  - section: 'Підсумок та спадщина: Рецепція ідей у сучасній Україні'
    words: 450
    points:
      - Повернення спадщини Лисяка-Рудницького в незалежну Україну у 1990-х роках.
      - Вплив його ідей на формування концепції сучасної української громадянської
        нації.
