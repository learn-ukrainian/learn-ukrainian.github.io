slug: kostomarov-two-rus-nationalities
title: "Костомаров: «Дві Руські Народності» — Витоки Відмінності"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Історичне тло'
    words: 450
    points:
      - 'Інтелектуальна атмосфера імперії 1850-1860-х років: ''відлига'' Олександра
        II.'
      - Микола Костомаров як ідеолог Кирило-Мефодіївського братства та його шлях до
        Петербурга.
      - Еволюція ідей від 'Книг буття українського народу' до наукової публіцистики.
  - section: 'Вступ та контекст: II — Журнал «Основа»'
    words: 450
    points:
      - Роль журналу 'Основа' (1861-1862) як платформи українського руху.
      - 'Причини написання есею: потреба теоретично обґрунтувати національну окремішність
        українців.'
      - Полеміка Костомарова з імперськими істориками (зокрема М. Погодіним).
  - section: 'Аналіз ключових творів: I — Концепція двох народностей'
    words: 500
    points:
      - 'Базова теза твору: заперечення ''єдиного народу'' і виділення двох несумісних
        етносів.'
      - 'Термінологія епохи: ''південноруси'' (українці) та ''великоруси'' (росіяни).'
      - 'Географічні та історичні витоки розбіжностей: Київська традиція vs Суздальсько-Московська
        традиція.'
  - section: 'Аналіз ключових творів: II — Індивідуалізм проти колективізму'
    words: 550
    points:
      - 'Український індивідуалізм: прагнення до особистої волі, власності, хутірське
        мислення.'
      - 'Російський колективізм: розчинення особистості в ''мірі'', общинне землеволодіння.'
      - Аналіз цитат Костомарова щодо ціннісних пріоритетів (свобода особистості проти
        єдності маси).
  - section: 'Аналіз ключових творів: III — Релігійність та світогляд'
    words: 500
    points:
      - Внутрішній, глибоко емоційний та поетичний характер української релігійності.
      - Зовнішня, суворо обрядова та формалізована релігійність росіян.
      - Відображення цих рис у народних піснях, фольклорі та повсякденному житті.
  - section: 'Аналіз ключових творів: IV — Політичні ідеали'
    words: 550
    points:
      - 'Український ідеал: віче, добровільність, договір (Київ, козацтво, федералізм).'
      - 'Російський ідеал: самодержавство, безумовне підкорення владі, централізація
        держави.'
      - 'Історична несумісність: як дві різні політичні культури зіткнулися в межах
        однієї імперії.'
  - section: 'Стилістика та мова автора: I — Романтична історіографія'
    words: 450
    points:
      - 'Народництво та романтизм: історія як життя народу, а не діяння еліт і царів.'
      - Використання етнографічного матеріалу (пісень, дум, прислів'їв) як повноцінного
        історичного джерела.
      - Психологізм та емоційність історичного наративу Костомарова.
  - section: 'Стилістика та мова автора: II — Полемічна риторика'
    words: 450
    points:
      - Метод бінарних опозицій (контрастів) як головний риторичний прийом твору.
      - 'Маневрування між цензурою: як Костомаров критикує імперію без прямих закликів
        до бунту.'
      - Публіцистичний, есеїстичний стиль викладу, розрахований на широку інтелігенцію.
  - section: 'Деколонізаційна перспектива: I — Руйнування імперського міфу'
    words: 400
    points:
      - Деконструкція міфу про Москву як органічного наступника демократичного Києва.
      - Спростування теорії про те, що українські особливості — це лише 'польський
        вплив'.
      - Утвердження думки, що відмінності народів є первинними, глибинними та генетичними.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність'
    words: 400
    points:
      - 'Відновлення суб''єктності: українці як самостійна історична нація зі своїм
        шляхом.'
      - Вплив есею на подолання комплексу меншовартості ('малоросійства').
      - Інтелектуальний опір асиміляційним процесам у Російській імперії.
  - section: 'Підсумок та спадщина: Значення статті'
    words: 400
    points:
      - 'Реакція імперії: Валуєвський циркуляр 1863 року як страх перед подібними
        ідеями.'
      - Вплив 'Двох народностей' на наступні покоління (Антонович, Драгоманов, Липинський,
        Грушевський).
      - 'Сучасна актуальність: як концепція Костомарова пояснює цивілізаційну прірву
        під час російсько-української війни.'
