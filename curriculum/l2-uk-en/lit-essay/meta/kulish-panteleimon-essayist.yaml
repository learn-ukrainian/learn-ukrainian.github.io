slug: kulish-panteleimon-essayist
title: "Пантелеймон Куліш: Суперечливий Будівничий — Від «Чорної Ради» до Листів Шевченку"
word_target: 5000
content_outline:
- section: 'Вступ: I — Куліш як культурний проект'
  words: 500
  points:
  - 'Пантелеймон Куліш (1819–1897): романіст, поет, перекладач, критик, видавець, мовознавець — людина-проект без аналогів у XIX ст.'
  - '"Кулішівка" (1856) — власний правопис як декларація: хто дає мові правила, той створює мову.'
  - 'Парадокс Куліша: людина, яка більше ніж хто-небудь зробила для культури, залишилась в тіні Шевченка — чому?'
- section: 'Вступ: II — Есеїстика Куліша: де публіцистика стає сповіддю'
  words: 500
  points:
  - 'Жанровий діапазон: листи, передмови, «Хутірська філософія» — де Куліш говорить найповніше від себе.'
  - '"Хутірська філософія і відгуки на неї" (1879): куди веде ідея відходу від міста до ідилічного хутора?'
  - Публіцистика в «Основі» і «Правді» — Куліш як організатор дискурсу, а не тільки його учасник.
- section: 'Аналіз: Передмова до «Чорної ради» — маніфест романтичного письменника'
  words: 700
  points:
  - '"Чорна рада" (1857) і її передмова: перший роман українською мовою як культурний акт і спосіб осмислення козацтва.'
  - 'Ідея «рідного письменства»: Куліш і формування концепції національної літератури до Єфремова.'
  - 'Мова «Чорної ради» як художній вибір: куди йде Куліш від живої народної мови Шевченка і чому?'
- section: 'Аналіз: «Листи з хутора» і хутірська ідеологія'
  words: 700
  points:
  - 'Концепція «хутора» як культурного і духовного осередку — що вона означала у часи 1860-х і де вона суперечить собі.'
  - 'Антиурбанізм Куліша: критика міста і «масової культури» — чи актуальна ця критика після двох сотень років?'
  - 'Парадокс «хутірської» позиції: найосвіченіший чоловік своєї доби закликає до простоти — де риторика і де переконання?'
- section: 'Аналіз: Листи до Шевченка і полеміка з ним'
  words: 600
  points:
  - 'Дружба і суперечка: де Куліш і Шевченко сходяться і де принципово розходяться — два проекти «України».'
  - '"Шевченко і ти": Куліш як перший серйозний критик Шевченка — що це означало і чому це викликало обурення.'
  - 'Пізній Куліш і переклад Біблії: де релігійний консерватизм і де культурний прорив.'
- section: 'Куліш і перекладацький проект: Шекспір, Байрон, Гете українською'
  words: 500
  points:
  - 'Переклади як есеїстика: кожна передмова до перекладу як маніфест про місце України у світовій культурі.'
  - '"Шекспір по-українськи": що Куліш вніс і де він поступається пізнішим перекладачам.'
  - 'Перекладацька праця як аргумент: «ця мова рівна англійській і німецькій» — доказ через дію.'
- section: 'Деколонізаційна перспектива: Проблема «консервативного просвітника»'
  words: 500
  points:
  - 'Куліш і «хохломанія»: пізня критика народного козацького насилля і суперечка з цим із самим собою.'
  - 'Де Куліш вписується у деколонізаційний дискурс: він і утворює, і підриває власний проект звільнення.'
  - '"Суперечливий" як комплімент: чому складні постаті важливіші за непохитних героїв у розбудові культурного канону.'
- section: 'Підсумок: Куліш як найважливіший недооцінений автор XIX ст.'
  words: 500
  points:
  - Що ми втрачаємо, коли зводимо XIX ст. до Шевченка і Франка — Куліш як третій незамінний голос.
  - Сучасне перевидання і переосмислення: що в Кулішеві знаходить XXI ст. і чого не бачило XX ст.?
  - Питання до студента: чи можна бути «суперечливим» і водночас «фундаментальним» для культури?
