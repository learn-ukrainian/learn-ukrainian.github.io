slug: solomea-pavlychko-modernism
title: Solomea Pavlychko Modernism
word_target: 4000
content_outline:
- section: 'Вступ: Соломія Павличко та інтелектуальний злам 1990-х'
  words: 400
  points:
  - Символ нового покоління незалежної України, відкритого до світу
  - 'Біографічний контекст: стажування на Заході, формування світогляду'
  - Роль Павличко в подоланні радянського академічного догматизму
- section: 'Контекст: Народницький канон проти модерного дискурсу'
  words: 300
  points:
  - Характеристика народницької парадигми (література як служіння масам)
  - Радянське звуження українського канону до 'селянських' тем
  - Потреба у філософському, урбаністичному та індивідуалістичному читанні
- section: '«Дискурс модернізму»: Ревізія літературної історії'
  words: 500
  points:
  - Аналіз центральної монографії 1997 року як віхи в літературознавстві
  - 'Визначення модернізму за Павличко: розрив з традицією, нова свідомість'
  - Переосмислення хронології та ключових фігур українського модернізму
- section: 'Феміністична перспектива: Леся Українка та Ольга Кобилянська'
  words: 400
  points:
  - Перше застосування системного феміністичного аналізу в Україні
  - Аналіз листування Кобилянської та Українки ('Хтось біленький', 'Хтось чорненький')
  - Зіткнення з консервативною критикою та скандал у тодішній пресі
- section: 'Психоаналітичний вимір: Агатангел Кримський та Валер''ян Підмогильний'
  words: 400
  points:
  - Інтеграція психоаналізу в розгляд українських текстів
  - Перевідкриття роману 'Андрій Лаговський' А. Кримського
  - Урбанізм та психологія маргінальності у 'Місті' В. Підмогильного
- section: 'Стилістика та мова: Західний інтелектуальний апарат'
  words: 350
  points:
  - Адаптація західної термінології (дискурс, деконструкція, Інший)
  - Створення нової мови говоріння про українську літературу
  - Подолання провінційності наукового стилю
- section: Полемічність і есеїстичність наукового тексту
  words: 350
  points:
  - Відхід від сухого академізму до пристрасної есеїстики
  - Інтелектуальна провокація як метод стимулювання дебатів
  - Аналіз риторики переконання у працях Соломії Павличко
- section: 'Деколонізація: Руйнування імперських та народницьких міфів'
  words: 400
  points:
  - Спростування міфу про виключно 'селянську' та безфілософську культуру
  - Боротьба з російським імперським поглядом на Україну як провінцію
  - Емансипація української культури від російського впливу
- section: 'Українська суб''єктність: Повноцінна європейська література'
  words: 400
  points:
  - Інтеграція України в загальноєвропейський культурний контекст
  - Український модернізм як синхронний і рівноцінний європейському
  - Утвердження повноцінної суб'єктності через естетичну складність
- section: Видавництво «Основи» та формування нової еліти
  words: 250
  points:
  - Заснування 'Основ' у 1992 році та культурна місія
  - Масштабні переклади світової класики філософії та економіки
  - Формування термінологічної бази для розбудови держави
- section: Спадщина Соломії Павличко в сучасній гуманітаристиці
  words: 250
  points:
  - Трагічна смерть і відчуття незавершеності проєкту
  - Вплив на сучасних інтелектуалок (О. Забужко, В. Агеєва, Т. Гундорова)
  - Актуальність її ідей у сучасній деколінізаційній війні
