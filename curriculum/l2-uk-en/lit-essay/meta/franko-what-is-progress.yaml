slug: franko-what-is-progress
title: Franko What Is Progress
word_target: 5000
content_outline:
  - section: 'Вступ: Еволюція світогляду Івана Франка'
    words: 600
    points:
      - Молодече захоплення соціалізмом у 1870-х роках та перший арешт (1877–1878).
      - Поступове розчарування в догматичному марксизмі протягом 1890-х років.
      - Остаточний світоглядний розрив із радикалами та перехід до національно-демократичних
        позицій (співзаснування УНДП у 1899 році).
  - section: Історичний контекст публікації (1903 рік)
    words: 600
    points:
      - Публікація праці у Коломиї (1903) як відповідь на бурхливі політичні дискусії
        в Європі.
      - Інтелектуальна полеміка Франка з європейськими та російськими соціал-демократами.
      - Запит тогочасного українського суспільства в Галичині на чіткий власний політичний
        та ідеологічний дороговказ.
  - section: 'Аналіз тексту: Поняття поступу та його рушії'
    words: 700
    points:
      - Спростування Франком ідеї лінійного та обов'язкового прогресу (поступ як 'ступання
        у незвідане').
      - Голод (матеріальні та духовні потреби) і любов (солідарність) як первинні,
        ірраціональні рушії еволюції.
      - Поступ як складна, суперечлива взаємодія процесів емансипації індивіда та
        суспільної кооперації.
  - section: 'Аналіз тексту: Критика марксизму та соціал-демократії'
    words: 850
    points:
      - Деконструкція марксистського ідеалу ліквідації приватної власності та тотального
        одержавлення економіки.
      - 'Пророче передбачення диктатури: соціал-демократична держава як ''величезна
        народна тюрма''.'
      - Попередження про всевладдя держави над життям громадянина та неминучу деградацію
        суспільства в умовах тотального контролю.
  - section: 'Стилістика: Риторика, полеміка та публіцистична майстерність'
    words: 600
    points:
      - Органічне поєднання глибокої наукової аргументації (зокрема ідей Г. Спенсера)
        з популярним, доступним викладом.
      - 'Блискуча риторика та полемічні прийоми: доведення ідей опонентів до логічного
        абсурду.'
      - Використання потужних метафор, що стали крилатими (держава як 'тюрма', держава
        як 'машина').
  - section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
    words: 700
    points:
      - Тотальне розвінчання радянського міфу про Франка виключно як 'каменяра', соціаліста
        та предтечу більшовизму.
      - Викриття факту цензурування та замовчування праці 'Що таке поступ?' у радянській
        історіографії.
      - Включення Франка в загальноєвропейський інтелектуальний контекст, протиставляючи
        його 'провінційній' російській революційній думці.
  - section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
    words: 600
    points:
      - 'Відкидання космополітичних утопій: національне питання як невід''ємний фундамент
        соціального прогресу.'
      - Обґрунтування потреби інтелектуальної незалежності українців від чужих (зокрема
        російських) ідеологічних впливів.
      - 'Українська нація в оптиці Франка: не об''єкт класової боротьби, а повноцінний
        суб''єкт, що прагне вільного розвитку.'
  - section: 'Підсумок: Значення праці та її пророчий характер'
    words: 350
    points:
      - Історичне підтвердження Франкових застережень у вигляді радянського тоталітаризму,
        ГУЛАГу та Голодомору.
      - Актуальність філософії індивідуальної свободи та солідарності для сучасного
        етапу розвитку української держави.
