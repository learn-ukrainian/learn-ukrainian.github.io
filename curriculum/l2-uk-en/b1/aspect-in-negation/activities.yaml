- type: essay-response
  instruction: Напишіть короткий робочий або навчальний діалог.
  prompt: 'Напишіть робочий або навчальний діалог із шести реплік-відповідей. Обов’язково включіть: 1) книжку як факт досвіду; 2) книжку як очікуваний результат; 3) лист, який не доручали; 4) звіт, який ще не готовий; 5) посуд із частковим прогресом; 6) проєкт із терміном. Використайте не + недоконаний вид для фактів і ще не + доконаний вид для незавершених результатів.'
  min_words: 180
  source_reading: 'Моделі: Я не читав книжку. Я ще не прочитав книжку. Посуд я мив, але ще не домив.'
  model_answer: — Ти читав книжку? — Ні, не читав. — А звіт уже написав? — Ще не написав, але працюю над ним. — Посуд мив? — Мив, але ще не домив. — Лист писав? — Не писав, бо це не моє завдання. — Проєкт закінчив? — Ще не закінчив.
  rubric:
  - Є щонайменше три форми не + недоконаний вид.
  - Є щонайменше три форми ще не + доконаний вид.
  - Є шість змістових мікрозавдань із prompt.
  - Посуд або інша справа має частковий прогрес із до-.
  - Контекст пояснює, де факт, а де очікуваний результат.
  - Немає суржикових кальок у виборі дієслова.
  peer_review_guidelines:
  - Перевірте, чи «ще не» стоїть біля доконаного виду.
  - Перевірте, чи нейтральний факт подано недоконаним видом.
  title: Діалог про завдання
