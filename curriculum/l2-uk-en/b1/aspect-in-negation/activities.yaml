version: '1.0'
module: aspect-in-negation
level: b1
inline:
  - id: act-1
    type: quiz
    instruction: Оберіть форму, яка відповідає контексту.
    items:
      - question: 'Друг питає про досвід: «Ти читав цю книжку?»'
        options:
          - Ні, не читав.
          - Ще не прочитав.
        explanation: Йдеться про факт досвіду, тому природний недоконаний вид.
        correct: 0
      - question: 'Керівник чекає готовий звіт: «Ти написав звіт?»'
        options:
          - Ще не написав.
          - Не писав.
        explanation: Є очікуваний результат, тому потрібний доконаний вид із «ще не».
        correct: 0
      - question: 'Сусід питає про хатню справу: «Ти мив посуд?»'
        options:
          - Ні, не мив.
          - Ще не домив.
        explanation: Питання стосується факту процесу, а не завершення.
        correct: 0
      - question: 'Колега питає про сам факт: «Ви обговорювали це питання?»'
        options:
          - Ні, не обговорювали.
          - Ще не обговорили.
        explanation: Питання про факт розмови потребує недоконаного виду.
        correct: 0
      - question: 'Команда чекає рішення: «Ви вже вирішили це питання?»'
        options:
          - Ще не вирішили.
          - Не вирішували.
        explanation: Очікується результат, тому природне «ще не» з доконаним видом.
        correct: 0
      - question: 'Викладач питає про досвід роботи з темою: «Ти вчила цей матеріал?»'
        options:
          - Ні, не вчила.
          - Ще не вивчила.
        explanation: Заперечено факт навчання, не готовий результат.
        correct: 0
      - question: 'Викладач питає про готовність: «Ти вже вивчила матеріал?»'
        options:
          - Ще не вивчила.
          - Не вчила.
        explanation: Є очікуване опанування матеріалу.
        correct: 0
      - question: 'Друг питає: «Вона телефонувала?»'
        options:
          - Ні, не телефонувала.
          - Ще не зателефонувала.
        explanation: Це факт дзвінка, тому недоконаний вид.
        correct: 0
      - question: 'Ви чекаєте дзвінка: «Вона вже зателефонувала?»'
        options:
          - Ще не зателефонувала.
          - Не телефонувала.
        explanation: Дзвінок очікується як результат.
        correct: 0
      - question: Працівник пояснює, що завдання не було його частиною.
        options:
          - Я не працював над цим.
          - Я ще не попрацював над цим.
        explanation: Йдеться про відсутність процесу роботи.
        correct: 0
    title: 'Діагностика: факт чи очікування'
  - id: act-2
    type: group-sort
    instruction: Розподіліть речення за прагматикою.
    groups:
      - label: загальне заперечення
        items:
          - Я не читав цю книжку.
          - Вона не телефонувала.
          - Ми не обговорювали це питання.
          - Я не писав лист.
          - Вони не вирішували це питання.
      - label: очікуване завершення
        items:
          - Я ще не прочитав цю книжку.
          - Вона ще не зателефонувала.
          - Ми ще не обговорили це питання.
          - Він ще не написав лист.
          - Вони ще не вирішили це питання.
    title: Прагматика заперечення
  - id: act-3
    type: fill-in
    instruction: Доповніть речення правильною формою.
    items:
      - sentence: 'Я ____ цей матеріал: роботи з ним не було.'
        answer: не вчив
        options:
          - не вчив
          - ще не вивчив
      - sentence: 'Я ____ цей матеріал: результат ще попереду.'
        answer: ще не вивчив
        options:
          - не вчив
          - ще не вивчив
      - sentence: 'Ми ____ план: розмови не було.'
        answer: не обговорювали
        options:
          - не обговорювали
          - ще не обговорили
      - sentence: Лист як очікуваний результат він ____.
        answer: ще не написав
        options:
          - не писав
          - ще не написав
        explanation: Лист має бути готовим, тому потрібний доконаний вид.
      - sentence: Лист як процес він ____.
        answer: не писав
        options:
          - не писав
          - ще не написав
        explanation: Процесу писання не було.
      - sentence: 'Вона ____ на лист: відповіді ще немає.'
        answer: ще не відповіла
        options:
          - не відповідала
          - ще не відповіла
        explanation: Очікується готова відповідь.
      - sentence: 'Вона ____ на листи вчора: процесу відповіді не було.'
        answer: не відповідала
        options:
          - не відповідала
          - ще не відповіла
        explanation: Це загальне заперечення факту.
      - sentence: Посуд я мив, але ____.
        answer: ще не домив
        options:
          - не мив
          - ще не домив
        explanation: Частковий прогрес веде до дієслова з до-.
    title: Форма за наміром мовця
  - id: act-4
    type: match-up
    instruction: З'єднайте ситуацію з природною відповіддю.
    pairs:
      - left: Посуд був у процесі.
        right: Посуд я мив, але ще не домив.
      - left: Лист не входив у завдання.
        right: Я не писав лист.
      - left: Рішення ще потрібне.
        right: Ми ще не вирішили питання.
      - left: Дзвінка взагалі не було.
        right: Вона не телефонувала.
      - left: Матеріал ще не опановано.
        right: Я ще не вивчив матеріал.
      - left: Матеріал взагалі не був у роботі.
        right: Я не вчив матеріал.
      - left: Звіт чекають до вечора.
        right: Я ще не перевірив звіт.
      - left: Звіт не був у моїх завданнях.
        right: Я не перевіряв звіт.
    title: Ситуація і природна відповідь
  - id: act-5
    type: quiz
    instruction: Оберіть, що саме заперечує речення.
    items:
      - question: Я не читав книжку.
        options:
          - факт дії
          - очікуваний результат
        explanation: Недоконаний вид подає дію як факт, що не відбувся.
        correct: 0
      - question: Я ще не прочитав книжку.
        options:
          - факт дії
          - очікуваний результат
        explanation: Доконаний вид із «ще не» показує результат попереду.
        correct: 1
      - question: Він не писав лист.
        options:
          - факт процесу
          - готовий лист
        explanation: Процес писання не відбувався.
        correct: 0
      - question: Він ще не написав лист.
        options:
          - факт процесу
          - готовий лист
        explanation: Лист очікується як результат.
        correct: 1
      - question: Ми не обговорювали план.
        options:
          - не було розмови
          - рішення ще не готове
        explanation: Недоконаний вид заперечує процес обговорення.
        correct: 0
      - question: Ми ще не обговорили план.
        options:
          - не було розмови
          - результат обговорення ще попереду
        explanation: Доконаний вид із «ще не» показує очікуваний результат.
        correct: 1
      - question: Вона не відповідала на листи.
        options:
          - процесу відповіді не було
          - одна відповідь ще не готова
        explanation: Це загальне заперечення процесу.
        correct: 0
      - question: Вона ще не відповіла на лист.
        options:
          - процесу відповіді не було
          - відповідь очікується
        explanation: Очікується конкретна відповідь.
        correct: 1
    title: Що заперечено?
workbook:
  - type: group-sort
    instruction: Розподіліть речення на дві групи.
    groups:
      - label: не + недоконаний вид
        items:
          - Я не читав книгу вчора.
          - Він не писав лист.
          - Ми не вирішували це питання.
          - Вона не відповідала на лист.
          - Я не перевіряв звіт.
      - label: ще не + доконаний вид
        items:
          - Я ще не прочитав книгу.
          - Він ще не написав лист.
          - Ми ще не вирішили це питання.
          - Вона ще не відповіла на лист.
          - Я ще не перевірив звіт.
    title: Дві моделі заперечення
    id: wb-1
  - type: fill-in
    instruction: Оберіть форму за контекстом.
    items:
      - sentence: Книжку як досвід я ____.
        answer: не читав
        options:
          - не читав
          - ще не прочитав
      - sentence: Книжку для обговорення я ____.
        answer: ще не прочитав
        options:
          - не читав
          - ще не прочитав
      - sentence: Звіт як завдання я ____.
        answer: ще не написав
        options:
          - не писав
          - ще не написав
      - sentence: Лист як процес я ____.
        answer: не писав
        options:
          - не писав
          - ще не написав
      - sentence: Посуд я мив, але ____.
        answer: ще не домив
        options:
          - не мив
          - ще не домив
      - sentence: План як тему розмови ми ____.
        answer: не обговорювали
        options:
          - не обговорювали
          - ще не обговорили
        explanation: Тут заперечено сам факт розмови.
      - sentence: План як потрібний результат ми ____.
        answer: ще не обговорили
        options:
          - не обговорювали
          - ще не обговорили
        explanation: Результат обговорення очікується.
      - sentence: Завдання я робив, але ____.
        answer: ще не доробив
        options:
          - не робив
          - ще не доробив
        explanation: Частковий прогрес потребує «доробив».
    title: Контекст обирає вид
    id: wb-2
  - type: quiz
    instruction: Оберіть найприроднішу відповідь.
    items:
      - question: «Ви вже вирішили питання?»
        options:
          - Ще не вирішили.
          - Не вирішували.
        explanation: Питання просить готовий результат, тому потрібний доконаний вид.
        correct: 0
      - question: «Ви обговорювали це питання?»
        options:
          - Не обговорювали.
          - Ще не обговорили.
        explanation: Питання стосується факту розмови, тому потрібний недоконаний вид.
        correct: 0
      - question: «Ти вже відповів на лист?»
        options:
          - Ще не відповів.
          - Не відповідав.
        explanation: Очікується готова відповідь, тому природне «ще не» з доконаним видом.
        correct: 0
      - question: «Ти читав цей текст раніше?»
        options:
          - Ні, не читав.
          - Ще не прочитав.
        explanation: Питання про досвід, не про завдання.
        correct: 0
      - question: «Текст уже прочитаний для семінару?»
        options:
          - Ще не прочитаний.
          - Не читав.
        explanation: Є очікуваний результат підготовки.
        correct: 0
      - question: «Вона телефонувала вчора?»
        options:
          - Ні, не телефонувала.
          - Ще не зателефонувала.
        explanation: Запитано факт дзвінка.
        correct: 0
      - question: «Вона вже зателефонувала клієнту?»
        options:
          - Ще не зателефонувала.
          - Не телефонувала.
        explanation: Очікується завершений дзвінок.
        correct: 0
      - question: «Ти працював над цим файлом?»
        options:
          - Ні, не працював.
          - Ще не попрацював.
        explanation: Питання про процес роботи.
        correct: 0
    title: Найприродніша відповідь
    id: wb-3
  - type: match-up
    instruction: З'єднайте прагматичний намір із моделлю.
    pairs:
      - left: нейтральна констатація факту
        right: не + недоконаний вид
      - left: результат ще попереду
        right: ще не + доконаний вид
      - left: частковий прогрес із посудом
        right: мив, але ще не домив
      - left: книжка як досвід
        right: не читав книжку
      - left: книжка як завдання
        right: ще не прочитав книжку
      - left: дзвінок очікується
        right: ще не зателефонувала
      - left: дзвінка не було як факту
        right: не телефонувала
      - left: матеріал ще не опановано
        right: ще не вивчив матеріал
    title: Намір і модель
    id: wb-4
  - type: error-correction
    instruction: Знайдіть і виправте помилку.
    items:
      - sentence: У нього не має олівця.
        error: У нього не має олівця.
        correction: У нього немає олівця.
        explanation: Для відсутності предмета потрібне предикативне слово «немає».
      - sentence: Цей будинок є не старий.
        error: Цей будинок є не старий.
        correction: Цей будинок не старий.
        explanation: У теперішньому іменному присудку «є» тут не потрібне.
      - sentence: Я ще не робив домашнє завдання, але вже написав половину.
        error: Я ще не робив домашнє завдання, але вже написав половину.
        correction: Я робив домашнє завдання, але ще не доробив.
        explanation: Якщо частина завдання вже виконана, треба показати процес і незавершену межу.
      - sentence: Я ще не зроблю домашнє завдання до вечора.
        error: Я ще не зроблю домашнє завдання до вечора.
        correction: Я ще не зробив домашнє завдання, але зроблю до вечора.
        explanation: Спершу назвіть поточний незавершений результат, а потім майбутній план.
      - sentence: Я не прочитав книгу вчора, бо її не було у списку.
        error: Я не прочитав книгу вчора, бо її не було у списку.
        correction: Я не читав книгу вчора, бо її не було у списку.
        explanation: Якщо книжка не входила до плану, краще подати дію як факт, що не відбувався.
      - sentence: Я ще не дочитав цю книжку, бо ще її не відкривав.
        error: ще не дочитав
        correction: Я ще не відкривав цю книжку.
        explanation: Якщо процес читання не починався, природно назвати відсутність процесу, а не незавершену межу.
      - sentence: Він не написав лист, бо лист не входив до завдання.
        error: Він не написав лист, бо лист не входив до завдання.
        correction: Він не писав лист, бо лист не входив до завдання.
        explanation: Нейтральний факт без доручення потребує недоконаного виду.
      - sentence: Ми ще не обговорили це питання, бо воно не входило до порядку денного.
        error: ще не обговорили
        correction: Ми не обговорювали це питання, бо воно не входило до порядку денного.
        explanation: Якщо розмови не планували, це загальний факт, а не очікуваний результат.
      - sentence: Посуд я не мив, але ще не домив.
        error: Посуд я не мив, але ще не домив.
        correction: Посуд я мив, але ще не домив.
        explanation: Дієслово «домити» передбачає, що миття вже почалося.
      - sentence: Ця книга зовсім нецікава.
        error: Ця книга зовсім нецікава.
        correction: Ця книга зовсім не цікава.
        explanation: Підсилене заперечення з «зовсім не» вимагає окремого написання «не».
      - sentence: Ви вже побачили його? — Не бачив.
        error: Не бачив.
        correction: Ще не побачив, але подивлюся пізніше.
        explanation: Коротке «не бачив» можливе, але в робочому контексті краще додати очікуваний результат і план.
    title: Редагування видових помилок
    id: wb-5
  - type: cloze
    instruction: Заповніть пропуски.
    text: Заперечення з видом залежить від наміру мовця. Якщо мовець констатує факт, він обирає не + недоконаний вид. Якщо мовець говорить про результат, який ще попереду, він обирає ще не + доконаний вид. Якщо процес уже почався, але межі ще немає, допомагають дієслова домити, дочитати, доробити.
    blanks:
      - id: 1
        answer: наміру
        options:
          - наміру
          - перекладу
          - іменника
      - id: 2
        answer: факт
        options:
          - факт
          - термін
          - проєкт
      - id: 3
        answer: недоконаний
        options:
          - недоконаний
          - доконаний
          - нейтральний
      - id: 4
        answer: результат
        options:
          - результат
          - контекст
          - матеріал
      - id: 5
        answer: доконаний
        options:
          - доконаний
          - недоконаний
          - загальний
      - id: 6
        answer: ще
        options:
          - ще
          - вже
          - дуже
      - id: 7
        answer: домити
        options:
          - домити
          - думати
          - ходити
      - id: 8
        answer: дочитати
        options:
          - дочитати
          - читати
          - писати
      - id: 9
        answer: доробити
        options:
          - доробити
          - робити
          - працювати
    title: Коротке пояснення з пропусками
    id: wb-6
  - type: group-sort
    instruction: Розподіліть речення за видом і прагматикою.
    title: Вид і прагматика
    groups:
      - label: недоконаний вид; загальне заперечення
        items:
          - Вона не телефонувала.
          - Ми не перевіряли звіт.
          - Я не починав завдання.
          - Він не писав лист.
          - Я не читав книжку.
      - label: доконаний вид; очікуване завершення
        items:
          - Вона ще не зателефонувала.
          - Ми ще не перевірили звіт.
          - Я ще не почав завдання.
          - Він ще не написав лист.
          - Я ще не прочитав книжку.
    id: wb-7
  - type: quiz
    instruction: Оберіть, чи твердження правильне.
    items:
      - question: «Не читав» подає дію як факт, що не відбувся.
        options:
          - правильно
          - неправильно
        explanation: Недоконаний вид працює для загального заперечення.
        correct: 0
      - question: «Ще не прочитав» показує очікуваний результат.
        options:
          - правильно
          - неправильно
        explanation: Слово «ще» додає очікування завершення.
        correct: 0
      - question: «Не писав» і «ще не написав» завжди означають те саме.
        options:
          - правильно
          - неправильно
        explanation: Перше речення про факт, друге про результат.
        correct: 1
