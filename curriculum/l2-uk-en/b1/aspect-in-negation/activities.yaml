- id: act-1
  type: quiz
  instruction: Оберіть форму, яка відповідає контексту.
  items:
  - prompt: 'Друг питає про досвід: «Ти читав цю книжку?»'
    options:
    - text: Ні, не читав.
      correct: true
    - text: Ще не прочитав.
      correct: false
    explanation: Йдеться про факт досвіду, тому природний недоконаний вид.
  - prompt: 'Керівник чекає готовий звіт: «Ти написав звіт?»'
    options:
    - text: Ще не написав.
      correct: true
    - text: Не писав.
      correct: false
    explanation: Є очікуваний результат, тому потрібний доконаний вид із «ще не».
  - prompt: 'Сусід питає про хатню справу: «Ти мив посуд?»'
    options:
    - text: Ні, не мив.
      correct: true
    - text: Ще не домив.
      correct: false
    explanation: Питання стосується факту процесу, а не завершення.
  - prompt: 'Колега питає про сам факт: «Ви обговорювали це питання?»'
    options:
    - text: Ні, не обговорювали.
      correct: true
    - text: Ще не обговорили.
      correct: false
    explanation: Питання про факт розмови потребує недоконаного виду.
  - prompt: 'Команда чекає рішення: «Ви вже вирішили це питання?»'
    options:
    - text: Ще не вирішили.
      correct: true
    - text: Не вирішували.
      correct: false
    explanation: Очікується результат, тому природне «ще не» з доконаним видом.
  - prompt: 'Викладач питає про досвід роботи з темою: «Ти вчила цей матеріал?»'
    options:
    - text: Ні, не вчила.
      correct: true
    - text: Ще не вивчила.
      correct: false
    explanation: Заперечено факт навчання, не готовий результат.
  - prompt: 'Викладач питає про готовність: «Ти вже вивчила матеріал?»'
    options:
    - text: Ще не вивчила.
      correct: true
    - text: Не вчила.
      correct: false
    explanation: Є очікуване опанування матеріалу.
  - prompt: 'Друг питає: «Вона телефонувала?»'
    options:
    - text: Ні, не телефонувала.
      correct: true
    - text: Ще не зателефонувала.
      correct: false
    explanation: Це факт дзвінка, тому недоконаний вид.
  - prompt: 'Ви чекаєте дзвінка: «Вона вже зателефонувала?»'
    options:
    - text: Ще не зателефонувала.
      correct: true
    - text: Не телефонувала.
      correct: false
    explanation: Дзвінок очікується як результат.
  - prompt: Працівник пояснює, що завдання не було його частиною.
    options:
    - text: Я не працював над цим.
      correct: true
    - text: Я ще не попрацював над цим.
      correct: false
    explanation: Йдеться про відсутність процесу роботи.
  title: 'Діагностика: факт чи очікування'
- id: act-2
  type: group-sort
  instruction: Розподіліть речення за прагматикою.
  groups:
  - name: загальне заперечення
    items:
    - Я не читав цю книжку.
    - Вона не телефонувала.
    - Ми не обговорювали це питання.
    - Я не писав лист.
    - Вони не вирішували це питання.
  - name: очікуване завершення
    items:
    - Я ще не прочитав цю книжку.
    - Вона ще не зателефонувала.
    - Ми ще не обговорили це питання.
    - Він ще не написав лист.
    - Вони ще не вирішили це питання.
  title: Прагматика заперечення
- id: act-3
  type: fill-in
  instruction: Доповніть речення правильною формою.
  items:
  - sentence: 'Я ____ цей матеріал: роботи з ним не було.'
    answer: не вчив
    options:
    - не вчив
    - ще не вивчив
  - sentence: 'Я ____ цей матеріал: результат ще попереду.'
    answer: ще не вивчив
    options:
    - не вчив
    - ще не вивчив
  - sentence: 'Ми ____ план: розмови не було.'
    answer: не обговорювали
    options:
    - не обговорювали
    - ще не обговорили
  - sentence: Лист як очікуваний результат він ____.
    answer: ще не написав
    options:
    - не писав
    - ще не написав
    explanation: Лист має бути готовим, тому потрібний доконаний вид.
  - sentence: Лист як процес він ____.
    answer: не писав
    options:
    - не писав
    - ще не написав
    explanation: Процесу писання не було.
  - sentence: 'Вона ____ на лист: відповіді ще немає.'
    answer: ще не відповіла
    options:
    - не відповідала
    - ще не відповіла
    explanation: Очікується готова відповідь.
  - sentence: 'Вона ____ на листи вчора: процесу відповіді не було.'
    answer: не відповідала
    options:
    - не відповідала
    - ще не відповіла
    explanation: Це загальне заперечення факту.
  - sentence: Посуд я мив, але ____.
    answer: ще не домив
    options:
    - не мив
    - ще не домив
    explanation: Частковий прогрес веде до дієслова з до-.
  title: Форма за наміром мовця
- id: act-4
  type: match-up
  instruction: З'єднайте ситуацію з природною відповіддю.
  pairs:
  - left: Посуд був у процесі.
    right: Посуд я мив, але ще не домив.
  - left: Лист не входив у завдання.
    right: Я не писав лист.
  - left: Рішення ще потрібне.
    right: Ми ще не вирішили питання.
  - left: Дзвінка взагалі не було.
    right: Вона не телефонувала.
  - left: Матеріал ще не опановано.
    right: Я ще не вивчив матеріал.
  - left: Матеріал взагалі не був у роботі.
    right: Я не вчив матеріал.
  - left: Звіт чекають до вечора.
    right: Я ще не перевірив звіт.
  - left: Звіт не був у моїх завданнях.
    right: Я не перевіряв звіт.
  title: Ситуація і природна відповідь
- id: act-5
  type: quiz
  instruction: Оберіть, що саме заперечує речення.
  items:
  - prompt: Я не читав книжку.
    options:
    - text: факт дії
      correct: true
    - text: очікуваний результат
      correct: false
    explanation: Недоконаний вид подає дію як факт, що не відбувся.
  - prompt: Я ще не прочитав книжку.
    options:
    - text: факт дії
      correct: false
    - text: очікуваний результат
      correct: true
    explanation: Доконаний вид із «ще не» показує результат попереду.
  - prompt: Він не писав лист.
    options:
    - text: факт процесу
      correct: true
    - text: готовий лист
      correct: false
    explanation: Процес писання не відбувався.
  - prompt: Він ще не написав лист.
    options:
    - text: факт процесу
      correct: false
    - text: готовий лист
      correct: true
    explanation: Лист очікується як результат.
  - prompt: Ми не обговорювали план.
    options:
    - text: не було розмови
      correct: true
    - text: рішення ще не готове
      correct: false
    explanation: Недоконаний вид заперечує процес обговорення.
  - prompt: Ми ще не обговорили план.
    options:
    - text: не було розмови
      correct: false
    - text: результат обговорення ще попереду
      correct: true
    explanation: Доконаний вид із «ще не» показує очікуваний результат.
  - prompt: Вона не відповідала на листи.
    options:
    - text: процесу відповіді не було
      correct: true
    - text: одна відповідь ще не готова
      correct: false
    explanation: Це загальне заперечення процесу.
  - prompt: Вона ще не відповіла на лист.
    options:
    - text: процесу відповіді не було
      correct: false
    - text: відповідь очікується
      correct: true
    explanation: Очікується конкретна відповідь.
  title: Що заперечено?
- type: group-sort
  instruction: Розподіліть речення на дві групи.
  groups:
  - name: не + недоконаний вид
    items:
    - Я не читав книгу вчора.
    - Він не писав лист.
    - Ми не вирішували це питання.
    - Вона не відповідала на лист.
    - Я не перевіряв звіт.
  - name: ще не + доконаний вид
    items:
    - Я ще не прочитав книгу.
    - Він ще не написав лист.
    - Ми ще не вирішили це питання.
    - Вона ще не відповіла на лист.
    - Я ще не перевірив звіт.
  title: Дві моделі заперечення
- type: fill-in
  instruction: Оберіть форму за контекстом.
  items:
  - sentence: Книжку як досвід я ____.
    answer: не читав
    options:
    - не читав
    - ще не прочитав
  - sentence: Книжку для обговорення я ____.
    answer: ще не прочитав
    options:
    - не читав
    - ще не прочитав
  - sentence: Звіт як завдання я ____.
    answer: ще не написав
    options:
    - не писав
    - ще не написав
  - sentence: Лист як процес я ____.
    answer: не писав
    options:
    - не писав
    - ще не написав
  - sentence: Посуд я мив, але ____.
    answer: ще не домив
    options:
    - не мив
    - ще не домив
  - sentence: План як тему розмови ми ____.
    answer: не обговорювали
    options:
    - не обговорювали
    - ще не обговорили
    explanation: Тут заперечено сам факт розмови.
  - sentence: План як потрібний результат ми ____.
    answer: ще не обговорили
    options:
    - не обговорювали
    - ще не обговорили
    explanation: Результат обговорення очікується.
  - sentence: Завдання я робив, але ____.
    answer: ще не доробив
    options:
    - не робив
    - ще не доробив
    explanation: Частковий прогрес потребує «доробив».
  title: Контекст обирає вид
- type: quiz
  instruction: Оберіть найприроднішу відповідь.
  items:
  - prompt: «Ви вже вирішили питання?»
    options:
    - text: Ще не вирішили.
      correct: true
    - text: Не вирішували.
      correct: false
    explanation: Питання просить готовий результат, тому потрібний доконаний вид.
  - prompt: «Ви обговорювали це питання?»
    options:
    - text: Не обговорювали.
      correct: true
    - text: Ще не обговорили.
      correct: false
    explanation: Питання стосується факту розмови, тому потрібний недоконаний вид.
  - prompt: «Ти вже відповів на лист?»
    options:
    - text: Ще не відповів.
      correct: true
    - text: Не відповідав.
      correct: false
    explanation: Очікується готова відповідь, тому природне «ще не» з доконаним видом.
  - prompt: «Ти читав цей текст раніше?»
    options:
    - text: Ні, не читав.
      correct: true
    - text: Ще не прочитав.
      correct: false
    explanation: Питання про досвід, не про завдання.
  - prompt: «Текст уже прочитаний для семінару?»
    options:
    - text: Ще не прочитаний.
      correct: true
    - text: Не читав.
      correct: false
    explanation: Є очікуваний результат підготовки.
  - prompt: «Вона телефонувала вчора?»
    options:
    - text: Ні, не телефонувала.
      correct: true
    - text: Ще не зателефонувала.
      correct: false
    explanation: Запитано факт дзвінка.
  - prompt: «Вона вже зателефонувала клієнту?»
    options:
    - text: Ще не зателефонувала.
      correct: true
    - text: Не телефонувала.
      correct: false
    explanation: Очікується завершений дзвінок.
  - prompt: «Ти працював над цим файлом?»
    options:
    - text: Ні, не працював.
      correct: true
    - text: Ще не попрацював.
      correct: false
    explanation: Питання про процес роботи.
  title: Найприродніша відповідь
- type: match-up
  instruction: З'єднайте прагматичний намір із моделлю.
  pairs:
  - left: нейтральна констатація факту
    right: не + недоконаний вид
  - left: результат ще попереду
    right: ще не + доконаний вид
  - left: частковий прогрес із посудом
    right: мив, але ще не домив
  - left: книжка як досвід
    right: не читав книжку
  - left: книжка як завдання
    right: ще не прочитав книжку
  - left: дзвінок очікується
    right: ще не зателефонувала
  - left: дзвінка не було як факту
    right: не телефонувала
  - left: матеріал ще не опановано
    right: ще не вивчив матеріал
  title: Намір і модель
- type: error-correction
  instruction: Знайдіть і виправте помилку.
  items:
  - sentence: У нього не має олівця.
    error: У нього не має олівця.
    correction: У нього немає олівця.
    explanation: Для відсутності предмета потрібне предикативне слово «немає».
  - sentence: Цей будинок є не старий.
    error: Цей будинок є не старий.
    correction: Цей будинок не старий.
    explanation: У теперішньому іменному присудку «є» тут не потрібне.
  - sentence: Не написавши текст, я виписую цитати з нього.
    error: Не написавши текст, я виписую цитати з нього.
    correction: Читаючи текст, я виписую цитати.
    explanation: Одночасний процес потребує дієприслівника недоконаного виду.
  - sentence: Я виконаю домашнє завдання вчора.
    error: Я виконаю домашнє завдання вчора.
    correction: Я виконав домашнє завдання.
    explanation: Минула дія потребує минулої форми.
  - sentence: Я не прочитав книгу вчора (бо не мав часу).
    error: Я не прочитав книгу вчора (бо не мав часу).
    correction: Я не читав книгу вчора.
    explanation: Загальне заперечення факту потребує недоконаного виду.
  - sentence: Я ще не читав цю книжку.
    error: Я ще не читав цю книжку.
    correction: Я не читав цю книжку. / Я ще не прочитав цю книжку.
    explanation: Оберіть факт або очікуваний результат.
  - sentence: Він не написав лист. (нейтрально)
    error: Він не написав лист. (нейтрально)
    correction: Він не писав лист. / Він ще не написав лист.
    explanation: Для нейтрального факту потрібне «не писав».
  - sentence: Ми ще не обговорювали це питання.
    error: Ми ще не обговорювали це питання.
    correction: Ми не обговорювали це питання. / Ми ще не обговорили це питання.
    explanation: Не змішуйте процес і очікуваний результат.
  - sentence: Посуд я не домив. (без попереднього контексту)
    error: Посуд я не домив. (без попереднього контексту)
    correction: Посуд я мив, але ще не домив.
    explanation: Форма з до- потребує контексту часткового прогресу.
  - sentence: Ця книга зовсім нецікава.
    error: Ця книга зовсім нецікава.
    correction: Ця книга нітрохи не цікава.
    explanation: Підсилене заперечення вимагає окремого написання «не».
  - sentence: Ви бачили його? — Не бачив.
    error: Ви бачили його? — Не бачив.
    correction: Ви бачили його? — Не бачив, але... (розгорнута відповідь)
    explanation: Коротке заперечення краще розгорнути в робочому або навчальному діалозі.
  title: Редагування видових помилок
- type: cloze
  instruction: Заповніть пропуски.
  text: Заперечення з видом залежить від наміру мовця. Якщо мовець констатує факт, він обирає не + недоконаний вид. Якщо мовець говорить про результат, який ще попереду, він обирає ще не + доконаний вид.
  passage: Заперечення з видом залежить від {наміру|перекладу|іменника} мовця. Якщо мовець констатує {факт|термін|проєкт}, він обирає не + {недоконаний|доконаний|нейтральний} вид. Якщо мовець говорить про {результат|контекст|матеріал}, який ще попереду, він обирає ще не + {доконаний|недоконаний|загальний} вид. Слово {ще|вже|дуже} додає очікування. Дієслова {домити|думати|ходити}, {дочитати|читати|писати} і {доробити|робити|працювати} називають завершення початого процесу.
  blanks:
  - id: 0
    answer: наміру
    options:
    - наміру
    - перекладу
    - іменника
  - id: 1
    answer: факт
    options:
    - факт
    - термін
    - проєкт
  - id: 2
    answer: недоконаний
    options:
    - недоконаний
    - доконаний
    - нейтральний
  - id: 3
    answer: результат
    options:
    - результат
    - контекст
    - матеріал
  - id: 4
    answer: доконаний
    options:
    - доконаний
    - недоконаний
    - загальний
  - id: 5
    answer: ще
    options:
    - ще
    - вже
    - дуже
  - id: 6
    answer: домити
    options:
    - домити
    - думати
    - ходити
  - id: 7
    answer: дочитати
    options:
    - дочитати
    - читати
    - писати
  - id: 8
    answer: доробити
    options:
    - доробити
    - робити
    - працювати
  title: Коротке пояснення з пропусками
- type: group-sort
  instruction: Розподіліть речення за видом і прагматикою.
  title: Вид і прагматика
  groups:
  - name: недоконаний вид; загальне заперечення
    items:
    - Вона не телефонувала.
    - Ми не перевіряли звіт.
    - Я не починав завдання.
    - Він не писав лист.
    - Я не читав книжку.
  - name: доконаний вид; очікуване завершення
    items:
    - Вона ще не зателефонувала.
    - Ми ще не перевірили звіт.
    - Я ще не почав завдання.
    - Він ще не написав лист.
    - Я ще не прочитав книжку.
- type: quiz
  instruction: Оберіть, чи твердження правильне.
  items:
  - prompt: «Не читав» подає дію як факт, що не відбувся.
    options:
    - text: правильно
      correct: true
    - text: неправильно
      correct: false
