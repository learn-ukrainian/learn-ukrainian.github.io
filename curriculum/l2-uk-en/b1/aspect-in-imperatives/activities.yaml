version: '1.0'
module: aspect-in-imperatives
level: b1
inline:
  - id: act-1
    type: quiz
    title: Який вид природний?
    instruction: Оберіть форму, яка найкраще відповідає ситуації.
    items:
      - question: "У кімнаті душно. Ви просите друга виконати дію з конкретним результатом."
        options:
          - "Відчини вікно."
          - "Відчиняй вікно."
          - "Не відчиняй вікно."
        correct: 0
        explanation: "Потрібен конкретний результат: треба відчинити вікно."
      - question: "Надворі холодно. Ви забороняєте дію."
        options:
          - "Не відчиняй вікно."
          - "Не відчини вікно."
          - "Відчини вікно."
        correct: 0
        explanation: "Звичайна заборона контрольованої дії має недоконаний вид."
      - question: "Гість прийшов до квартири. Ви м'яко запрошуєте його всередину."
        options:
          - "Заходьте, будь ласка."
          - "Зайдіть негайно."
          - "Не заходьте."
        correct: 0
        explanation: "Заходьте звучить як запрошення або дозвіл."
      - question: "Потрібно мати готову відповідь до вечора."
        options:
          - "Напишіть відповідь до вечора."
          - "Пишіть відповідь до вечора."
          - "Не пишіть відповідь."
        correct: 0
        explanation: "До вечора потрібен готовий результат, тому доконаний вид."
      - question: "Учитель просить учнів працювати повільніше."
        options:
          - "Пишіть повільніше."
          - "Напишіть повільніше."
          - "Не напишіть повільніше."
        correct: 0
        explanation: "Йдеться про спосіб процесу, тому недоконаний вид."
      - question: "Мама нагадує про один конкретний ризик перед виходом."
        options:
          - "Не забудь ключі."
          - "Не забувай ключі щодня."
          - "Не забуваєш ключі."
        correct: 0
        explanation: "Не забудь - застереження про один небажаний результат."
      - question: "Лікар дає тривалу рекомендацію."
        options:
          - "Пийте більше води."
          - "Випийте більше води щодня."
          - "Не випийте води."
        correct: 0
        explanation: "Тривала рекомендація потребує недоконаного виду."
      - question: "В інструкції до програми потрібен один технічний крок."
        options:
          - "Збережіть зміни."
          - "Зберігайте зміни випадково."
          - "Не збережіть зміни."
        correct: 0
        explanation: "Потрібен готовий результат: зміни збережені."
      - question: "Правило безпеки щодо файлів."
        options:
          - "Не відкривайте підозрілі файли."
          - "Не відкрийте підозрілі файли."
          - "Відкрийте підозрілі файли."
        correct: 0
        explanation: "Правило забороняє дію відкривання, тому недоконаний вид."
      - question: "Турист на сходах може впасти."
        options:
          - "Обережно, не впади."
          - "Не падай духом."
          - "Не падаєш."
        correct: 0
        explanation: "Не впади - це попередження про випадковий результат."
      - question: "Господар пропонує чай гостям."
        options:
          - "Беріть чай."
          - "Візьміть чай негайно."
          - "Не візьміть чай."
        correct: 0
        explanation: "Беріть звучить як гостинне запрошення."
      - question: "Екскурсовод просить звернути увагу на один об'єкт."
        options:
          - "Подивіться на фреску праворуч."
          - "Дивіться на фреску щодня."
          - "Не подивіться на фреску."
        correct: 0
        explanation: "Подивіться називає один фокус уваги."
  - id: act-2
    type: fill-in
    title: Позитивний наказ
    instruction: Доповніть речення формою правильного виду.
    items:
      - sentence: "____ цибулю дрібними кубиками. (нарізати)"
        answer: наріжте
        options:
          - наріжте
          - ріжте
          - не наріжте
        explanation: "У рецепті це один готовий крок."
      - sentence: "____ уважно під час пояснення. (слухати)"
        answer: слухайте
        options:
          - слухайте
          - послухайте
          - не послухайте
        explanation: "Йдеться про тривалий процес."
      - sentence: "____ файл перед виходом із програми. (зберегти)"
        answer: збережіть
        options:
          - збережіть
          - зберігайте
          - не збережіть
        explanation: "Потрібен результат: файл збережений."
      - sentence: "____ пошту щоранку. (перевіряти)"
        answer: перевіряйте
        options:
          - перевіряйте
          - перевірте
          - не перевірте
        explanation: "Щоранку вказує на повторюване правило."
      - sentence: "____ до столу, будь ласка. (сідати)"
        answer: сідайте
        options:
          - сідайте
          - сядьте
          - не сядьте
        explanation: "Гостинне запрошення природно має недоконаний вид."
      - sentence: "____ на перше місце біля вікна. (сісти)"
        answer: сядьте
        options:
          - сядьте
          - сідайте
          - не сідайте
        explanation: "Мовець просить конкретний результат: зайняти місце."
      - sentence: "____ відповідь до п'ятої. (написати)"
        answer: напишіть
        options:
          - напишіть
          - пишіть
          - не пишіть
        explanation: "До п'ятої потрібна готова відповідь."
      - sentence: "____ розбірливо, щоб усі бачили. (писати)"
        answer: пишіть
        options:
          - пишіть
          - напишіть
          - не напишіть
        explanation: "Розбірливо описує спосіб процесу."
      - sentence: "____ застосунок і увійдіть у профіль. (відкрити)"
        answer: відкрийте
        options:
          - відкрийте
          - відкривайте
          - не відкрийте
        explanation: "Треба відкрити застосунок як один технічний крок."
      - sentence: "____ двері, будь ласка, тут душно. (відчинити)"
        answer: відчиніть
        options:
          - відчиніть
          - відчиняйте
          - відкрийте
        explanation: "Для дверей природна пара відчинити / відчиняти."
      - sentence: "____ чай, будь ласка. (брати)"
        answer: беріть
        options:
          - беріть
          - візьміть
          - не візьміть
        explanation: "Це гостинне запрошення, а не сувора команда."
      - sentence: "____ талон у черзі. (взяти)"
        answer: візьміть
        options:
          - візьміть
          - беріть
          - не беріть
        explanation: "Потрібен один конкретний предмет."
  - id: act-3
    type: group-sort
    title: Заборона чи порада?
    instruction: Розподіліть заперечні накази за функцією.
    groups:
      - label: "Заборона контрольованої дії"
        items:
          - "Не відкривайте підозрілий файл."
          - "Не відчиняйте дверей незнайомим людям."
          - "Не торкайтеся експонатів."
      - label: "Порада або заспокоєння"
        items:
          - "Не хвилюйся перед виступом."
          - "Не поспішайте з відповіддю."
          - "Не соромтеся питати."
      - label: "Повторюване правило"
        items:
          - "Не залишайте речі без нагляду."
          - "Не надсилайте пароль у повідомленнях."
          - "Не переходьте дорогу на червоне."
      - label: "Застереження про результат"
        items:
          - "Не забудь ключі."
          - "Не загуби квиток."
          - "Не впади на сходах."
  - id: act-4
    type: match-up
    title: Застереження і заборона
    instruction: Поєднайте речення з поясненням вибору виду.
    pairs:
      - left: "Не забувай тренуватися."
        right: "звичка або регулярна порада"
      - left: "Не забудь зателефонувати сьогодні."
        right: "один конкретний ризик"
      - left: "Не губи речі."
        right: "загальна поведінка"
      - left: "Не загуби квиток."
        right: "застереження про один предмет"
      - left: "Не падай духом."
        right: "стійкий вислів про стан"
      - left: "Не впади на сходах."
        right: "попередження про випадкову подію"
      - left: "Не відкривайте приватні файли."
        right: "заборона контрольованої дії"
      - left: "Обережно, не відкрий приватний файл випадково."
        right: "спеціальний контекст випадковості"
      - left: "Не відчиняй вікно."
        right: "звичайна заборона"
      - left: "Обережно, не розбий чашку."
        right: "ризик небажаного результату"
      - left: "Не ріж хліб на цій дошці."
        right: "контрольована дія заборонена"
      - left: "Не поріжся."
        right: "попередження про травму"
  - id: act-5
    type: error-correction
    title: Виправте вид
    instruction: Замініть помилкову форму природною.
    items:
      - sentence: "Не відчини вікно, надворі холодно."
        error: "Не відчини"
        correction: "Не відчиняй"
        explanation: "Звичайна заборона потребує недоконаного виду."
      - sentence: "Не відкрий підозрілий файл."
        error: "Не відкрий"
        correction: "Не відкривай"
        explanation: "Для заборони контрольованої дії потрібен недоконаний вид."
      - sentence: "Записуй адресу зараз і покажи мені."
        error: "Записуй"
        correction: "Запиши"
        explanation: "Потрібен один готовий запис."
      - sentence: "Заходьте до кабінету номер три й одразу вийдіть."
        error: "Заходьте"
        correction: "Зайдіть"
        explanation: "Кабінет номер три задає конкретний результат входу."
      - sentence: "Сядьте до столу, гості дорогі."
        error: "Сядьте"
        correction: "Сідайте"
        explanation: "У гостинному запрошенні природніше сідайте."
      - sentence: "Не забувай ключі сьогодні."
        error: "Не забувай"
        correction: "Не забудь"
        explanation: "Сьогодні йдеться про один конкретний ризик."
      - sentence: "Не губи квиток у метро, він потрібен на виході."
        error: "Не губи"
        correction: "Не загуби"
        explanation: "Це застереження про один конкретний квиток."
      - sentence: "Відкривайте застосунок і увійдіть у профіль."
        error: "Відкривайте"
        correction: "Відкрийте"
        explanation: "Потрібен один технічний крок."
      - sentence: "Не поділіть команду на групи без потреби."
        error: "Не поділіть"
        correction: "Не діліть"
        explanation: "Це заборона контрольованої організаційної дії."
      - sentence: "Беріть талон у терміналі й чекайте номер."
        error: "Беріть"
        correction: "Візьміть"
        explanation: "У черзі потрібен один конкретний талон."
      - sentence: "Не падай на сходах, вони слизькі."
        error: "Не падай"
        correction: "Не впади"
        explanation: "Це попередження про можливий випадковий результат."
      - sentence: "Почніть, коли будете готові."
        error: "Почніть"
        correction: "Починайте"
        explanation: "Коли будете готові звучить як дозвіл почати процес."
workbook:
  - id: wb-1
    type: quiz
    title: Команда, запрошення, заборона
    instruction: Оберіть правильне пояснення або форму.
    items:
      - question: "Що означає доконаний вид у фразі 'Збережіть файл'?"
        options:
          - "потрібен готовий результат"
          - "це повторювана звичка"
          - "це застереження про випадковість"
          - "це запрошення"
        correct: 0
        explanation: "Після дії потрібен збережений файл."
      - question: "Яка форма природна для гостинного запрошення?"
        options:
          - "Сідайте, будь ласка."
          - "Сядьте, будь ласка, гості дорогі."
          - "Не сядьте."
          - "Сісти."
        correct: 0
        explanation: "Недоконаний вид м'якший у запрошенні."
      - question: "Яка форма є звичайною забороною?"
        options:
          - "Не торкайтеся експонатів."
          - "Не торкніться експонатів."
          - "Торкніться експонатів."
          - "Торкатися експонатів."
        correct: 0
        explanation: "Заборона дії має недоконаний вид."
      - question: "Де доконаний вид після 'не' природний?"
        options:
          - "Обережно, не впади."
          - "Не відкрий файл у правилі безпеки."
          - "Не пиши олівцем."
          - "Не шуміть."
        correct: 0
        explanation: "Не впади - застереження про випадковий результат."
      - question: "У якому реченні потрібна повторювана дія?"
        options:
          - "Перевіряйте пошту щоранку."
          - "Перевірте пошту зараз."
          - "Не перевірте пошту."
          - "Перевірили пошту."
        correct: 0
        explanation: "Слово щоранку вказує на регулярність, тому потрібен недоконаний вид."
      - question: "Яке речення правильно розрізняє двері й файл?"
        options:
          - "Відчиніть двері, але не відкривайте файл."
          - "Відчиняйте двері зараз, але не відкрийте файл."
          - "Відчинити двері й не відкривати файл."
          - "Не відчиніть двері й відкривайте файл."
        correct: 0
        explanation: "Двері відчиняють, файл відкривають."
      - question: "Що означає 'Не забувай тренуватися'?"
        options:
          - "регулярна порада"
          - "один конкретний ризик"
          - "готовий результат"
          - "дозвіл"
        correct: 0
        explanation: "Недоконаний вид показує звичку."
      - question: "Що означає 'Не забудь паспорт'?"
        options:
          - "попередження про один результат"
          - "загальна заборона забування"
          - "процес"
          - "гостинне запрошення"
        correct: 0
        explanation: "Це застереження перед конкретною ситуацією."
      - question: "Яке речення описує спосіб роботи?"
        options:
          - "Говоріть повільніше."
          - "Скажіть це повільніше."
          - "Не скажіть."
          - "Сказати повільніше."
        correct: 0
        explanation: "Повільніше описує процес мовлення."
      - question: "Яка форма природна в рецепті як один крок?"
        options:
          - "Додайте сіль."
          - "Додавайте сіль випадково."
          - "Не додайте сіль."
          - "Додавати сіль."
        correct: 0
        explanation: "У формі додайте є завершений крок."
      - question: "Яке речення є правилом безпеки?"
        options:
          - "Не надсилайте пароль у чаті."
          - "Не надішліть пароль у чаті."
          - "Надішліть пароль у чаті."
          - "Надсилати пароль у чаті."
        correct: 0
        explanation: "Правило безпеки забороняє дію."
      - question: "Яка форма звучить як дозвіл почати?"
        options:
          - "Починайте, коли будете готові."
          - "Почніть, бо я наказав."
          - "Не почніть."
          - "Почати."
        correct: 0
        explanation: "Недоконаний вид часто звучить як дозвіл або організаційний сигнал."
  - id: wb-2
    type: fill-in
    title: Заперечний наказ
    instruction: Вставте форму, яка відповідає функції речення.
    items:
      - sentence: "____ підозрілі файли на робочому комп'ютері. (не відкривати)"
        answer: не відкривайте
        options:
          - не відкривайте
          - не відкрийте
          - відкрийте
        explanation: "Це правило безпеки, тому недоконаний вид."
      - sentence: "Обережно, ____ на мокрій підлозі. (не впасти)"
        answer: не впади
        options:
          - не впади
          - не падай
          - не падати
        explanation: "Це застереження про випадковий результат."
      - sentence: "____ двері, якщо не знаєш, хто прийшов. (не відчиняти)"
        answer: не відчиняй
        options:
          - не відчиняй
          - не відчини
          - не відкривай
        explanation: "Для дверей потрібне відчиняти; заборона має недоконаний вид."
      - sentence: "____ ключі, вони потрібні ввечері. (не забути)"
        answer: не забудь
        options:
          - не забудь
          - не забувай
          - не забувати
        explanation: "Це конкретне нагадування на сьогодні."
      - sentence: "____ телефонувати бабусі щонеділі. (не забувати)"
        answer: не забувай
        options:
          - не забувай
          - не забудь
          - не забути
        explanation: "Щонеділі показує регулярну звичку."
      - sentence: "____ експонатів у музеї. (не торкатися)"
        answer: не торкайтеся
        options:
          - не торкайтеся
          - не торкніться
          - торкніться
        explanation: "Це заборона контрольованої дії."
      - sentence: "____ чашку, вона слизька. (не розбити)"
        answer: не розбий
        options:
          - не розбий
          - не розбивай
          - не розбити
        explanation: "Мовець попереджає про один ризик."
      - sentence: "____ команду на групи без потреби. (не ділити)"
        answer: не діліть
        options:
          - не діліть
          - не поділіть
          - поділіть
        explanation: "Це заборона свідомої організаційної дії."
      - sentence: "____ пароль іншим людям. (не надсилати)"
        answer: не надсилайте
        options:
          - не надсилайте
          - не надішліть
          - надішліть
        explanation: "Правило забороняє дію надсилання."
      - sentence: "____ паспорт у готелі. (не загубити)"
        answer: не загуби
        options:
          - не загуби
          - не губи
          - не губити
        explanation: "Це застереження про один документ."
      - sentence: "____ речі в транспорті. (не губити)"
        answer: не губи
        options:
          - не губи
