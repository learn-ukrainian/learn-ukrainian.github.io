  - id: wb-9
    type: essay-response
    title: Інструкція з чотирма функціями
    prompt: >
      Напишіть 140-170 слів українською. Оберіть одну ситуацію: рецепт, правила
      для волонтерів, інструкція для користувача застосунку або порада підлітку
      перед дорогою. Використайте щонайменше вісім наказових форм: два доконані
      накази для конкретних результатів, два недоконані накази для процесу або
      запрошення, дві заборони з не + недоконаний вид і два застереження з
      не + доконаний вид. Після тексту коротко поясніть два вибори виду.
    min_words: 140
    model_answer: |
      Спочатку перевірте список гостей і розкладіть бейджі на столі біля входу.
      Зустрічайте людей спокійно, говоріть повільно й допомагайте тим, хто не
      знає, де зал. Поставте воду для учасників, але не залишайте коробки на
      сходах і не відчиняйте службових дверей без координатора. Перед початком
      збережіть таблицю реєстрації й надішліть її організаторці. Під час перерви
      пояснюйте маршрут коротко, показуйте ліфт і не діліть команду на групи без
      потреби. Будьте уважні: не загубіть ключ від зали, не переплутайте список
      учасників із чернеткою і не забудьте вимкнути проєктор. Після події
      вимкніть світло, приберіть стіл і підсумуймо роботу разом сьогодні.

      У тексті "перевірте", "розкладіть", "збережіть" і "надішліть" називають
      конкретні результати. "Зустрічайте", "говоріть", "пояснюйте" і "показуйте"
      описують процес роботи. "Не залишайте", "не відчиняйте" і "не діліть" є
      заборонами контрольованих дій, тому вони мають недоконаний вид. "Не загубіть",
      "не переплутайте" і "не забудьте" є попередженнями про небажані результати.
    evaluation_criteria:
      - "140-170 слів українською"
      - "Є два доконані накази для конкретних результатів"
      - "Є два недоконані накази для процесу або запрошення"
      - "Є дві заборони з не + недоконаний вид"
      - "Є два застереження з не + доконаний вид"
      - "Є коротке пояснення двох виборів виду"
