version: '1.0'
module: text-register-formal
level: b1
inline:
  - id: act-1
    type: quiz
    title: Упізнаємо офіційний стиль
    instruction: Оберіть варіант, який найкраще відповідає офіційно-діловому стилю.
    items:
      - question: Яке речення доречне в заяві до мовного центру?
        options:
          - "Прошу зарахувати мене до групи B1 з 1 вересня."
          - "Запишіть мене, будь ласка, бо дуже хочу."
          - "Привіт! Можна я буду в B1?"
          - "Мені супер треба потрапити в цю групу!"
        correct: 0
        explanation: Офіційний стиль використовує формулу прохання, точну дію й нейтральний тон.
      - question: Яка ознака НЕ характерна для офіційно-ділового стилю?
        options:
          - емоційні вигуки
          - точні дати
          - стандартні формули
          - реквізити документа
        correct: 0
        explanation: Вигуки й емоційні оцінки належать радше до розмовного або художнього стилю.
      - question: У якому рядку є маркер офіційного стилю?
        options:
          - "відповідно до правил курсу"
          - "ну, якось так"
          - "класно було б"
          - "та без проблем"
        correct: 0
        explanation: Складений прийменник відповідно до типовий для формального письма.
      - question: Чому речення "Мені дуже-дуже потрібна довідка!!!" не підходить для офіційного листа?
        options:
          - бо має емоційний тиск і зайві знаки оклику
          - бо в ньому є слово довідка
          - бо воно занадто коротке
          - бо в ньому немає дієслова минулого часу
        correct: 0
        explanation: Офіційний лист має бути ввічливим і нейтральним, без драматичного тону.
      - question: Який стиль найімовірніше має текст заяви?
        options:
          - офіційно-діловий
          - художній
          - розмовний
          - публіцистичний
        correct: 0
        explanation: Заява є базовим жанром офіційно-ділового стилю.
  - id: act-2
    type: match-up
    title: Терміни офіційного стилю
    instruction: Поєднайте термін із коротким поясненням.
    pairs:
      - left: офіційно-діловий стиль
        right: регістр документів, установ і формальних звернень
      - left: канцеляризм
        right: бюрократична фраза, типова для документів
      - left: реквізити
        right: обов'язкові елементи документа
      - left: адресат
        right: той, кому подають заяву або лист
      - left: адресант
        right: той, хто подає заяву або пише лист
      - left: заява
        right: письмове офіційне прохання
      - left: автобіографія
        right: хронологічний офіційний виклад фактів життя
      - left: оголошення
        right: публічне повідомлення про подію або зміну
  - id: act-3
    type: fill-in
    title: Формальні прийменники
    instruction: Оберіть прийменник або формулу, що граматично підходить до речення.
    items:
      - sentence: "____ правил курсу, заяву потрібно подати до 15 травня."
        answer: Відповідно до
        options:
          - Відповідно до
          - Згідно з
          - У зв'язку
          - З метою
        explanation: "Відповідно до керує родовим відмінком: до правил."
      - sentence: "____ наказом директора, заняття перенесено на п'ятницю."
        answer: Згідно з
        options:
          - Згідно з
          - Відповідно до
          - З метою
          - На підставі до
        explanation: "Згідно з керує орудним відмінком: з наказом."
      - sentence: "____ участі в конференції прошу видати довідку."
        answer: З метою
        options:
          - З метою
          - Згідно з
          - Відповідно до
          - Попри до
        explanation: З метою поєднується з родовим відмінком і називає мету.
      - sentence: "____ переїздом прошу змінити адресу в анкеті."
        answer: У зв'язку з
        options:
          - У зв'язку з
          - Відповідно до
          - З метою
          - Згідно до
        explanation: У зв'язку з називає причину й керує орудним відмінком.
      - sentence: "____ заяви комісія розглянула прохання студента."
        answer: На підставі
        options:
          - На підставі
          - Згідно до
          - Відповідно з
          - У меті
        explanation: На підставі вказує документ або факт, на якому ґрунтується дія.
  - id: act-4
    type: error-correction
    title: Редагуємо регістр
    instruction: Знайдіть регістрову або граматичну помилку й запишіть офіційно доречний варіант.
    items:
      - sentence: "Я дуже-дуже хочу, щоб ви мене записали на курс."
        error: "розмовно-емоційний тон"
        correction: "Прошу зарахувати мене на курс."
        explanation: Офіційний текст не підсилює прохання емоційними повтореннями.
      - sentence: "Згідно до графіка заняття починаються о 18:00."
        error: "неправильне керування"
        correction: "Згідно з графіком заняття починаються о 18:00."
        explanation: Згідно з потребує орудного відмінка.
      - sentence: "У відповідності до правил я подав заяву."
        error: "калькована формула"
        correction: "Відповідно до правил я подав заяву."
        explanation: Нормативна формула в офіційному тексті — відповідно до.
      - sentence: "Прошу здійснити отримання довідки."
        error: "зайвий канцеляризм"
        correction: "Прошу видати мені довідку."
        explanation: Краще назвати дію прямо, без важкої іменникової конструкції.
      - sentence: "Я хочу приймати участь у семінарі."
        error: "калька в сталому словосполученні"
        correction: "Я хочу брати участь у семінарі."
        explanation: Українська нормативна форма — брати участь.
workbook:
  - id: wb-1
    type: group-sort
    title: Офіційне чи неформальне?
    instruction: Розподіліть фрази за регістром.
    groups:
      - label: Офіційно-діловий стиль
        items:
          - Прошу повідомити графік роботи.
          - Відповідно до наказу.
          - З повагою, Олена Коваль.
          - Доводжу до вашого відома.
          - Додаю копію паспорта.
      - label: Розмовний стиль
        items:
          - Підкажіть, що там із графіком?
          - Ок, тоді побачимось.
          - Це супер важливо!
          - Я вам зараз скину файл.
          - Дуже дякуююю!
  - id: wb-2
    type: cloze
    title: Офіційний лист
    instruction: Оберіть формули, які тримають офіційний тон листа.
    text: "Шановна пані Олено! {1} повідомити, чи можна отримати довідку про навчання на курсі B1. Довідка потрібна {2} до університету. {3} за відповідь. {4}, Марко Савченко."
    blanks:
      - id: 1
        answer: Прошу
        options:
          - Прошу
          - Хочу
          - Давайте
          - Супер
      - id: 2
        answer: для подання
        options:
          - для подання
          - щоб скинути
          - бо треба
          - для приколу
      - id: 3
        answer: Дякую
        options:
          - Дякую
          - Ну все
          - Ок
          - Бувайте
      - id: 4
        answer: З повагою
        options:
          - З повагою
          - Па-па
          - До зустрічі в чаті
          - Ну тоді
  - id: wb-3
    type: translate
    title: Формальні прохання
    instruction: Оберіть найприродніший офіційний переклад.
    items:
      - source: Please issue me a certificate of study.
        options:
          - text: "Прошу видати мені довідку про навчання."
            correct: true
          - text: "Дайте мені папір про навчання."
            correct: false
          - text: "Я хочу, щоб ви зробили мені довідку."
            correct: false
          - text: "Мені треба довідка, ок?"
            correct: false
        explanation: Формула прошу видати є типовою для заяви або офіційного листа.
      - source: In accordance with the course rules, registration ends tomorrow.
        options:
          - text: "Відповідно до правил курсу реєстрація завершується завтра."
            correct: true
          - text: "Згідно до правил курсу реєстрація завершується завтра."
            correct: false
          - text: "По правилам курсу реєстрація завершується завтра."
            correct: false
          - text: "За правилами якось завтра кінець реєстрації."
            correct: false
        explanation: Відповідно до керує родовим відмінком.
      - source: Thank you for the information.
        options:
          - text: "Дякую за інформацію."
            correct: true
          - text: "Дякуююю за інфу."
            correct: false
          - text: "Спасибки за все."
            correct: false
          - text: "Ок, норм."
            correct: false
        explanation: Коротка нейтральна подяка доречна в офіційному діалозі.
  - id: wb-4
    type: true-false
    title: Реквізити заяви
    instruction: Визначте, чи твердження правильне.
    items:
      - statement: У заяві адресат зазвичай стоїть у давальному відмінку.
        correct: true
        explanation: Пишемо директорові, завідувачці, координаторові.
      - statement: У заяві доречно ставити багато знаків оклику, щоб показати важливість прохання.
        correct: false
        explanation: Офіційний стиль уникає емоційного тиску.
      - statement: Слово Заява може бути окремою назвою документа.
        correct: true
        explanation: Назва документа є одним із реквізитів.
      - statement: Фраза "відповідно до графіка" граматично правильна.
        correct: true
        explanation: Після до потрібен родовий відмінок.
      - statement: Фраза "згідно до наказу" є нормативною офіційною формою.
        correct: false
        explanation: Треба згідно з наказом або відповідно до наказу.
  - id: wb-5
    type: fill-in
    title: Шапка документа
    instruction: Оберіть форму, що підходить до реквізитів заяви.
    items:
      - sentence: "____ мовного центру пані Ірині Мельник"
        answer: Директорці
        options:
          - Директорці
          - Директорка
          - Директорку
          - Директоркою
        explanation: Адресат у шапці заяви стоїть у давальному відмінку.
      - sentence: "____ курсу B1 Олега Ткача"
        answer: слухача
        options:
          - слухача
          - слухач
          - слухачеві
          - слухачем
        explanation: Адресант традиційно подається в родовому відмінку.
      - sentence: "Прошу ____ мене до розмовного клубу."
        answer: зарахувати
        options:
          - зарахувати
          - зарахування
          - зараховую
          - зарахований
        explanation: Після прошу часто стоїть інфінітив.
      - sentence: "____ копію паспорта."
        answer: Додаю
        options:
          - Додаю
          - Доданої
          - Додавання
          - Додаток
        explanation: У кінці заяви можна прямо назвати доданий документ.
  - id: wb-6
    type: error-correction
    title: Офіційний лист без шуму
    instruction: Виправте речення так, щоб воно звучало офіційно й природно.
    items:
      - sentence: "Привіт, я вам пишу, щоб попросити довідку."
        error: "розмовний початок і зайве пояснення"
        correction: "Шановна пані Олено! Прошу видати мені довідку."
        explanation: Офіційний лист починається зі звертання й одразу називає прохання.
      - sentence: "Ви можете скинути мені документ?"
        error: "розмовне дієслово"
        correction: "Чи могли б ви надіслати мені документ?"
        explanation: У формальному листі краще надіслати, а не скинути.
      - sentence: "Діючий графік прийому є на сайті."
        error: "невдалий прикметник у формальному контексті"
        correction: "Чинний графік прийому є на сайті."
        explanation: Для законів, правил і графіків нормативне слово чинний.
      - sentence: "Ми заключили договір із центром."
        error: "калька в діловому словосполученні"
        correction: "Ми уклали договір із центром."
        explanation: Українська нормативна форма — укласти договір.
