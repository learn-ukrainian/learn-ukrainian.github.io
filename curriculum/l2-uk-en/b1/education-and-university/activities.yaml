version: '1.0'
module: education-and-university
level: b1
inline:
  - id: act-1
    type: quiz
    title: Система освіти і вступ
    instruction: "Оберіть найточніший варіант для академічного контексту."
    items:
      - question: "Як нейтрально сказати про вступ до університету?"
        options:
          - "вступити до університету"
          - "поступити в університет"
          - "зайти в університет"
        correct: 0
        explanation: "Для навчального й офіційного стилю безпечна форма вступити до університету."
      - question: "Яка абревіатура є актуальною для сучасного вступного тесту на бакалаврат?"
        options:
          - "НМТ"
          - "ЗНО як єдина поточна назва"
          - "ЄВІ для всіх бакалаврів"
        correct: 0
        explanation: "У сучасному контексті вступу на бакалаврат говорять про НМТ; ЗНО доречне як історична назва."
      - question: "Що означає бюджетне місце?"
        options:
          - "навчання за державним замовленням"
          - "навчання без іспитів"
          - "кімната в гуртожитку"
        correct: 0
        explanation: "Бюджетне місце пов'язане з державним фінансуванням навчання."
      - question: "Що означає контрактна форма навчання?"
        options:
          - "навчання за кошти фізичної або юридичної особи"
          - "навчання тільки онлайн"
          - "короткий літній курс"
        correct: 0
        explanation: "Контрактна форма передбачає оплату навчання не з державного замовлення."
      - question: "Який ряд називає три рівні повної загальної середньої освіти?"
        options:
          - "початкова, базова середня, профільна середня"
          - "бакалавр, магістр, доктор філософії"
          - "лекція, семінар, консультація"
        correct: 0
        explanation: "Це три рівні загальної середньої освіти."
      - question: "Що таке факультет?"
        options:
          - "великий академічний підрозділ університету"
          - "будь-який викладач університету"
          - "оцінка за іспит"
        correct: 0
        explanation: "Факультет є частиною університету, а не назвою людини чи оцінки."
      - question: "Що найточніше відповідає англійському major в університетському контексті?"
        options:
          - "спеціальність або освітня програма"
          - "майор"
          - "гуртожиток"
        correct: 0
        explanation: "Major у цій темі перекладаємо за змістом: спеціальність або освітня програма."
      - question: "Яке речення звучить найприродніше?"
        options:
          - "Я навчаюся за спеціальністю 'Філологія'."
          - "Я навчаюся по спеціальності 'Філологія'."
          - "Я навчаюся на спеціальністю 'Філологія'."
        correct: 0
        explanation: "Нормативна модель: навчатися за спеціальністю."
      - question: "Що таке сесія?"
        options:
          - "період заліків та іспитів"
          - "назва студентського гуртожитку"
          - "перша лекція семестру"
        correct: 0
        explanation: "Сесія - це період підсумкового контролю."
      - question: "Яке слово нейтральне в навчальному стилі?"
        options:
          - "іспит"
          - "екзамен як єдина норма"
          - "екз"
        correct: 0
        explanation: "Іспит - нейтральна літературна форма для навчального стилю."
      - question: "Яке словосполучення є безпечним у сучасній літературній мові?"
        options:
          - "навчальний план"
          - "учбовий план"
          - "план по навчанню"
        correct: 0
        explanation: "У навчальному контексті вживаємо навчальний."
      - question: "Що таке залік?"
        options:
          - "форма підсумкового контролю"
          - "назва факультету"
          - "документ про поселення"
        correct: 0
        explanation: "Залік - один із типів оцінювання або підсумкового контролю."
  - id: act-2
    type: match-up
    title: Хто і де в університеті
    instruction: "З'єднайте університетський термін із поясненням."
    pairs:
      - left: деканат
        right: адміністративний центр факультету
      - left: декан
        right: керівник факультету
      - left: кафедра
        right: академічний підрозділ певної галузі
      - left: викладач
        right: людина, яка проводить заняття
      - left: першокурсник
        right: студент першого курсу
      - left: старшокурсниця
        right: студентка старшого курсу
      - left: одногрупник
        right: людина з тієї самої академічної групи
      - left: куратор
        right: людина, яка допомагає групі орієнтуватися
      - left: науковий керівник
        right: наставник курсової, дипломної або дослідницької роботи
      - left: бібліотека
        right: місце для книжок, джерел і читання
      - left: гуртожиток
        right: студентське житло
      - left: аудиторія
        right: кімната для занять
  - id: act-3
    type: fill-in
    title: Навчальний план і дисципліни
    instruction: "Вставте найприродніший термін або форму."
    items:
      - sentence: "Цього семестру я ____ академічне письмо."
        answer: "вивчаю"
        options:
          - "вивчаю"
          - "вступаю"
          - "захищаю"
        explanation: "Дисципліну вивчають."
      - sentence: "Я записався ____ курс з історії культури."
        answer: "на"
        options:
          - "на"
          - "по"
          - "за"
        explanation: "Природна модель: записатися на курс."
      - sentence: "Студенти готуються ____ іспиту з біології."
        answer: "до"
        options:
          - "до"
          - "на"
          - "по"
        explanation: "Готуватися до іспиту."
      - sentence: "У розкладі з'явилася нова ____ з філософії."
        answer: "лекція"
        options:
          - "лекція"
          - "заява"
          - "стипендія"
        explanation: "Лекція є типом заняття."
      - sentence: "На ____ студенти обговорюють текст і ставлять запитання."
        answer: "семінарі"
        options:
          - "семінарі"
          - "гуртожитку"
          - "деканаті"
        explanation: "Семінар передбачає обговорення."
      - sentence: "Перед сесією викладач проводить ____ для групи."
        answer: "консультацію"
        options:
          - "консультацію"
          - "спеціальність"
          - "кампус"
        explanation: "Консультація допомагає підготуватися до контролю."
      - sentence: "Моя ____ - міжнародна економіка."
        answer: "спеціальність"
        options:
          - "спеціальність"
          - "аудиторія"
          - "оцінка"
        explanation: "Спеціальність називає напрям підготовки."
      - sentence: "Кафедра затвердила тему ____ роботи."
        answer: "курсової"
        options:
          - "курсової"
          - "семестровий"
          - "іспитовий"
        explanation: "Курсова робота - навчальна письмова робота."
      - sentence: "У програмі подано список рекомендованої ____."
        answer: "літератури"
        options:
          - "літератури"
          - "перескладання"
          - "аудиторії"
        explanation: "Рекомендована література - джерела для курсу."
      - sentence: "Студенти ____ залік наприкінці семестру."
        answer: "складають"
        options:
          - "складають"
          - "поступають"
          - "відчиняють"
        explanation: "Нейтральна модель: складати залік."
      - sentence: "Після бакалаврату він планує вступити ____ магістратури."
        answer: "до"
        options:
          - "до"
          - "на"
          - "з"
        explanation: "Вступити до магістратури."
      - sentence: "Навчальний ____ містить обов'язкові дисципліни і вибіркові курси."
        answer: "план"
        options:
          - "план"
          - "квиток"
          - "бал"
        explanation: "Навчальний план описує структуру навчання."
  - id: act-4
    type: group-sort
    title: "Регістр: розмова чи офіційний стиль"
    instruction: "Розсортуйте вислови за регістром."
    groups:
      - label: "Нейтрально-офіційно"
        items:
          - "скласти іспит"
          - "навчальний план"
          - "домашнє завдання"
          - "викладач курсу"
      - label: "Розмовне студентське"
        items:
          - "пара о дев'ятій"
          - "домашка"
          - "препод"
          - "екз"
      - label: "Ввічливе повідомлення"
        items:
          - "Хотів би уточнити розклад."
          - "Підкажіть, будь ласка."
          - "Дякую за відповідь."
          - "Чи могли б ви повідомити?"
  - id: act-5
    type: error-correction
    title: Редагуємо академічні кальки
    instruction: "Виправте виділену помилку в академічному контексті."
    items:
      - sentence: "Я хочу поступити до університету цього року."
        error: "поступити"
        correction: "вступити"
        error_type: word
        explanation: "У навчальному стилі: вступити до університету."
      - sentence: "Моя подруга навчається по спеціальності психологія."
        error: "по спеціальності"
        correction: "за спеціальністю"
        error_type: phrase
        explanation: "Нормативна модель: навчатися за спеціальністю."
      - sentence: "У нас змінився учбовий план."
        error: "учбовий"
        correction: "навчальний"
        error_type: word
        explanation: "У сучасному навчальному стилі вживаємо навчальний план."
      - sentence: "Завтра я здаю іспит з історії."
        error: "здаю"
        correction: "складаю"
        error_type: word
        explanation: "Нейтрально в навчальному стилі: складати іспит."
      - sentence: "Препод надіслав рекомендовану літературу."
        error: "Препод"
        correction: "Викладач"
        error_type: register
        explanation: "У нейтральному академічному стилі потрібне слово викладач."
      - sentence: "Я записався по курс з академічного письма."
        error: "по курс"
        correction: "на курс"
        error_type: phrase
        explanation: "Природна модель: записатися на курс."
      - sentence: "Діючий розклад опубліковано на сайті."
        error: "Діючий"
        correction: "Чинний"
        error_type: word
        explanation: "Для розкладу краще чинний розклад."
      - sentence: "Існуючі правила стипендії пояснили на зустрічі."
        error: "Існуючі"
        correction: "Наявні"
        error_type: word
        explanation: "Наявні правила звучить природніше в офіційному стилі."
      - sentence: "Завідуючий кафедрою підписав довідку."
        error: "Завідуючий"
        correction: "Завідувач"
        error_type: word
        explanation: "Нормативна назва посади: завідувач кафедри."
      - sentence: "Я маю лекцію по філософії."
        error: "по філософії"
        correction: "з філософії"
        error_type: phrase
        explanation: "Предмет заняття: лекція з філософії."
      - sentence: "Вона отримала оцінку по біології."
        error: "по біології"
        correction: "з біології"
        error_type: phrase
        explanation: "Оцінка з дисципліни."
      - sentence: "Працюючий студент може подати заяву на індивідуальний графік."
        error: "Працюючий студент"
        correction: "Студент, який працює"
        error_type: phrase
        explanation: "Для активної ознаки людини краще підрядне речення."
workbook:
  - id: wb-1
    type: quiz
    title: Університетські ролі й документи
    instruction: "Оберіть правильне пояснення або форму."
    items:
      - question: "Що підтверджує студентський квиток?"
        options:
          - "статус студента"
          - "право викладати"
          - "тему дипломної роботи"
        correct: 0
        explanation: "Студентський квиток підтверджує, що людина є студентом."
      - question: "Що таке довідка?"
        options:
          - "документ, який підтверджує факт"
          - "тип лекції"
          - "назва дисципліни"
        correct: 0
        explanation: "Довідка підтверджує певний статус або факт."
      - question: "Куди студент звертається щодо адміністративних питань факультету?"
        options:
          - "до деканату"
          - "до гуртожитку"
          - "до семінару"
        correct: 0
        explanation: "Деканат займається адміністративними питаннями факультету."
      - question: "Хто допомагає з курсовою або дипломною роботою?"
        options:
          - "науковий керівник"
          - "абітурієнт"
          - "одногрупник як офіційна посада"
        correct: 0
        explanation: "Науковий керівник супроводжує дослідницьку роботу."
      - question: "Який варіант звучить ввічливо в листі викладачці?"
        options:
          - "Чи могли б ви повідомити тему семінару?"
          - "Скиньте тему семінару."
          - "Що там по семінару?"
        correct: 0
        explanation: "Чи могли б ви... підтримує ввічливий академічний тон."
      - question: "Яке слово доречне в офіційному розкладі?"
        options:
          - "заняття"
          - "пара як єдина форма"
          - "тусовка"
        correct: 0
        explanation: "Заняття - нейтральне слово; пара розмовна."
      - question: "Що таке перескладання?"
        options:
          - "повторна спроба скласти залік або іспит"
          - "перехід до гуртожитку"
          - "зміна спеціальності без заяви"
        correct: 0
        explanation: "Перескладання пов'язане з повторним контролем."
      - question: "Що означає освітня програма?"
        options:
          - "конкретний шлях навчання в межах спеціальності"
          - "лише будівля університету"
          - "будь-яка оцінка в журналі"
        correct: 0
        explanation: "Освітня програма деталізує навчання в межах спеціальності."
      - question: "Що зазвичай роблять у читальному залі?"
        options:
          - "працюють із книжками й джерелами"
          - "складають спортивний норматив"
          - "поселяються на семестр"
        correct: 0
        explanation: "Читальний зал пов'язаний із бібліотекою і джерелами."
      - question: "Яке речення коректне?"
        options:
          - "Я звернувся до деканату."
          - "Я звернувся на деканат."
          - "Я звернувся деканатом."
        correct: 0
        explanation: "Звернутися до установи."
      - question: "Яке речення природне?"
        options:
          - "Стипендія виплачується щомісяця."
          - "Стипендія платить студента щомісяця."
          - "Стипендія здає щомісяця."
        correct: 0
        explanation: "Стипендія виплачується - природна пасивноподібна модель."
      - question: "Що таке абітурієнт?"
        options:
          - "людина, яка вступає до закладу освіти"
          - "викладач кафедри"
          - "кімната для лекцій"
        correct: 0
        explanation: "Абітурієнт подає заяви й бере участь у вступі."
  - id: wb-2
    type: fill-in
    title: Керування в освітній темі
    instruction: "Вставте правильний прийменник або форму."
    items:
      - sentence: "Вона вступила ____ університету торік."
        answer: "до"
        options:
          - "до"
          - "в"
          - "по"
        explanation: "Вступити до університету."
      - sentence: "Я навчаюся ____ спеціальністю 'Право'."
        answer: "за"
        options:
          - "за"
          - "по"
          - "через"
        explanation: "Навчатися за спеціальністю."
      - sentence: "Ми готуємося ____ заліку з інформатики."
        answer: "до"
        options:
          - "до"
          - "по"
          - "за"
        explanation: "Готуватися до заліку."
      - sentence: "Студент подав заяву ____ деканату."
        answer: "до"
        options:
          - "до"
          - "на"
          - "під"
        explanation: "Подати заяву до установи."
      - sentence: "Викладач відповів ____ студентам електронною поштою."
        answer: "студентам"
        options:
          - "студентам"
          - "студентів"
          - "студентами"
        explanation: "Відповідати кому? студентам."
      - sentence: "Наукова керівниця порадила ____ змінити тему."
        answer: "магістрантові"
        options:
          - "магістрантові"
          - "магістранта"
          - "магістрантом"
        explanation: "Радити кому? магістрантові."
      - sentence: "Розклад опубліковано ____ сайті факультету."
        answer: "на"
        options:
          - "на"
          - "до"
          - "за"
        explanation: "Опубліковано на сайті."
      - sentence: "Я отримала оцінку ____ хімії."
        answer: "з"
        options:
          - "з"
          - "по"
          - "на"
        explanation: "Оцінка з дисципліни."
      - sentence: "Після бакалаврату вона вступила ____ магістратури."
        answer: "до"
        options:
          - "до"
          - "по"
          - "за"
        explanation: "Вступити до магістратури."
      - sentence: "Підручник потрібен ____ семінару."
        answer: "для"
        options:
          - "для"
          - "під"
          - "крізь"
        explanation: "Для семінару - мета або призначення."
      - sentence: "Студенти працювали ____ джерелами в бібліотеці."
        answer: "з"
        options:
          - "з"
          - "по"
          - "на"
        explanation: "Працювати з джерелами."
