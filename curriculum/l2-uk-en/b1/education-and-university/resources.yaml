- title: "B1 M54: dative nuances"
  role: curriculum
  notes: "Попередній модуль дав університетські приклади з деканатом, студентами, потребою та адресатом дії."
- title: "B1 work and career"
  role: curriculum
  notes: "Подає близьке розрізнення фах, спеціальність, посада і формули професійного регістру."
- title: "B1 passive voice intro"
  role: curriculum
  notes: "Підтримує безпечне вживання коротких результативних форм на -но/-то в академічному й адміністративному стилі."
- title: "B1 verbal nouns"
  role: curriculum
  notes: "Підтримує академічні іменники на зразок вивчення, дослідження, оцінювання, обговорення."
- title: "МОН: Державні стандарти загальної середньої освіти"
  role: official
  notes: "Підтверджує три рівні повної загальної середньої освіти: початкова, базова середня, профільна середня."
  source_ref: "https://mon.gov.ua/osvita-2/zagalna-serednya-osvita/derzhavni-standarti"
- title: "МОН: Рівні вищої освіти та наукові ступені"
  role: official
  notes: "Підтверджує документи і ступені бакалавра, магістра, доктора філософії/доктора мистецтва та роль додатка до диплома."
  source_ref: "https://mon.gov.ua/osvita-2/vishcha-osvita-ta-osvita-doroslikh/rivni-vishchoi-osviti-ta-naukovi-stupeni"
- title: "УЦОЯО: University Entrance Exams in 2026"
  role: official
  notes: "Підтверджує поточний вступний контекст НМТ для бакалаврських програм у 2026 році та комп'ютерний формат тесту."
  source_ref: "https://testportal.gov.ua/en/university-entrance-exams-in-2026-%28university-admission-campaign-2026%29/"
- title: "МОН: профільна старша школа з 2027 року"
  role: official
  notes: "Пояснює реформу профільної старшої школи і вибір профілів, предметів і курсів."
  source_ref: "https://mon.gov.ua/news/yak-zminytsia-starsha-shkola-z-2027-roku-use-pro-vybir-profiliv-i-novi-mozhlyvosti-dlia-uchniv"
