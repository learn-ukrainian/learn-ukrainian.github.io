version: '1.0'
module: text-register-informal
level: b1
inline:
  - id: act-1
    type: quiz
    title: Маркери розмовного стилю
    instruction: Оберіть відповідь, яка найкраще пояснює розмовний регістр.
    items:
      - question: Яке речення найприродніше звучить у неформальній розмові?
        options:
          - "Слухай, зустріч перенесли на п'ятницю."
          - "Повідомляю, що зустріч перенесено на п'ятницю."
          - "Згідно з розпорядженням зустріч перенесено."
          - "Прошу взяти до відома зміну дати зустрічі."
        correct: 0
        explanation: Частка слухай і простий порядок дії створюють неформальний тон.
      - question: Що є типовою ознакою розмовного стилю?
        options:
          - неповні речення
          - реквізити документа
          - юридичні формули
          - список додатків
        correct: 0
        explanation: У діалозі контекст часто відновлює пропущені частини речення.
      - question: Яка фраза звучить занадто офіційно для чату з другом?
        options:
          - "Дякую за приділений час."
          - "Дякую, дуже виручив."
          - "Клас, дякую!"
          - "О, супер, дякую."
        correct: 0
        explanation: Дякую за приділений час — формула офіційного листа або зустрічі.
      - question: Яке слово є українським розмовним вигуком?
        options:
          - "овва"
          - "здравствуйте"
          - "получається"
          - "слідуючий"
        correct: 0
        explanation: Овва виражає здивування й належить до української розмовної лексики.
      - question: Чому речення "Я додому" може бути правильним?
        options:
          - бо в розмові дієслово руху зрозуміле з контексту
          - бо в українській немає дієслів руху
          - бо офіційний стиль вимагає неповних речень
          - бо займенники завжди заборонені
        correct: 0
        explanation: Це еліптичне розмовне речення, де контекст відновлює "йду".
  - id: act-2
    type: match-up
    title: Розмовні інструменти
    instruction: Поєднайте мовний засіб із його функцією.
    pairs:
      - left: частка
        right: додає нюанс, сумнів або підсилення
      - left: вигук
        right: передає швидку емоційну реакцію
      - left: неповне речення
        right: пропускає те, що зрозуміло з контексту
      - left: фразеологізм
        right: образно називає ситуацію
      - left: зменшувальна форма
        right: може показати близькість або м'якість
      - left: інтонація
        right: змінює настрій і значення репліки
      - left: кличний відмінок
        right: позначає звертання до співрозмовника
      - left: суржик
        right: небажане змішування української та російської
  - id: act-3
    type: fill-in
    title: Частки в репліках
    instruction: Оберіть частку або вигук, який найкраще підходить до контексту.
    items:
      - sentence: "____, давай зустрінемось завтра, якщо сьогодні не встигаєш."
        answer: Ну
        options:
          - Ну
          - Згідно
          - Прошу
          - Відповідно
        explanation: Ну може м'яко починати пропозицію або реакцію.
      - sentence: "Ти ____ знаєш, де бібліотека."
        answer: ж
        options:
          - ж
          - овва
          - коротше кажучи
          - згідно
        explanation: Ж підсилює очевидність або спільне знання.
      - sentence: "____ ні, я не образився."
        answer: Та
        options:
          - Та
          - З метою
          - Офіційно
          - Реквізити
        explanation: Та ні часто заспокоює або м'яко заперечує.
      - sentence: "____, ти вже закінчив проєкт?"
        answer: Невже
        options:
          - Невже
          - Відповідно
          - Адресат
          - Чинний
        explanation: Невже передає здивування.
      - sentence: "____, я саме це й мав на увазі."
        answer: Отож
        options:
          - Отож
          - Протокол
          - На підставі
          - Автобіографія
        explanation: Отож підтверджує попередню думку.
  - id: act-4
    type: error-correction
    title: Без суржику
    instruction: Замініть небажану змішану або кальковану форму природною українською.
    items:
      - sentence: "Короче, я сьогодні не прийду."
        error: "російська калька в дискурсивному маркері"
        correction: "Коротше, я сьогодні не прийду."
        explanation: Коротше або коротше кажучи — український варіант.
      - sentence: "Получається, ми зустрінемось завтра?"
        error: "російська основа"
        correction: "Виходить, ми зустрінемось завтра?"
        explanation: Виходить природно передає значення результату або висновку.
      - sentence: "Ладно, побачимось після заняття."
        error: "російське розмовне слово"
        correction: "Гаразд, побачимось після заняття."
        explanation: Гаразд або добре — українські відповідники.
      - sentence: "Давай встрінемось біля метро."
        error: "кальковане дієслово"
        correction: "Давай зустрінемось біля метро."
        explanation: Зустрітися — нормативне українське дієслово.
      - sentence: "На слідуючій неділі я буду зайнятий."
        error: "калькована модель часу"
        correction: "Наступного тижня я буду зайнятий."
        explanation: Українською природно сказати наступного тижня.
workbook:
  - id: wb-1
    type: group-sort
    title: Регістр фрази
    instruction: Розподіліть фрази за регістром.
    groups:
      - label: Розмовний стиль
        items:
          - Слухай, ти завтра вільний?
          - Ого, як швидко!
          - Чаю?
          - Коротше, план змінився.
          - Бувай, до завтра.
      - label: Офіційно-діловий стиль
        items:
          - Прошу повідомити графік роботи.
          - Дякую за надану інформацію.
          - Відповідно до правил курсу.
          - З повагою, Марко Савченко.
          - Повідомляю про зміну адреси.
  - id: wb-2
    type: cloze
    title: Неформальний чат
    instruction: Заповніть пропуски природними розмовними формами.
    text: "{1}, ти завтра йдеш на клуб? Я трохи запізнюся, бо маю справи після роботи. Якщо що, {2} мені повідомлення. {3}, я дуже хочу встигнути на другу частину. {4}, побачимось там."
    blanks:
      - id: 1
        answer: Слухай
        options:
          - Слухай
          - Відповідно
          - Шановний
          - На підставі
      - id: 2
        answer: напиши
        options:
          - напиши
          - доводжу
          - зарахуй
          - реквізити
      - id: 3
        answer: Коротше
        options:
          - Коротше
          - З метою
          - Чинний
          - Згідно з
      - id: 4
        answer: Бувай
        options:
          - Бувай
          - З повагою
          - Додаток
          - Прошу
  - id: wb-3
    type: fill-in
    title: Неповні речення
    instruction: Оберіть природну розмовну відповідь.
    items:
      - sentence: "— Ти куди? — ____."
        answer: Додому
        options:
          - Додому
          - Згідно з домом
          - Я маю намір рухатися до дому
          - Домом
        explanation: У відповіді можна опустити "я йду", бо це зрозуміло.
      - sentence: "— Чаю? — Так, ____."
        answer: без цукру
        options:
          - без цукру
          - відповідно до цукру
          - прошу видати цукор
          - на підставі цукру
        explanation: Коротка відповідь природна в побутовій ситуації.
      - sentence: "— Завтра зустрінемось? — ____."
        answer: Можна
        options:
          - Можна
          - Повідомляю
          - Реквізити
          - Чинний
        explanation: Можна тут означає згоду або прийнятну пропозицію.
      - sentence: "— Ти вже прочитав? — ____."
        answer: Ще ні
        options:
          - Ще ні
          - З повагою
          - Автобіографія
          - Згідно з
        explanation: Неповна відповідь не повторює очевидний об'єкт.
  - id: wb-4
    type: translate
    title: Звучить по-людськи
    instruction: Оберіть природний розмовний переклад.
    items:
      - source: Can you send me the file?
        options:
          - text: "Можеш надіслати мені файл?"
            correct: true
          - text: "Прошу здійснити надсилання файла."
            correct: false
          - text: "Відповідно до файла, надішліть."
            correct: false
          - text: "Повідомляю про потребу файла."
            correct: false
        explanation: Розмовне прохання може бути коротким і прямим.
      - source: Wow, that's really fast!
        options:
          - text: "Ого, це справді швидко!"
            correct: true
          - text: "Доводжу до вашого відома, це швидко."
            correct: false
          - text: "Згідно з швидкістю, це швидко."
            correct: false
          - text: "Прошу взяти швидкість до уваги."
            correct: false
        explanation: Ого передає живу реакцію.
      - source: In short, the plan changed.
        options:
          - text: "Коротше, план змінився."
            correct: true
          - text: "Короче, план помінявся."
            correct: false
          - text: "Відповідно до зміни плану."
            correct: false
          - text: "З метою зміни плану."
            correct: false
        explanation: Коротше — природний український маркер підсумку.
  - id: wb-5
    type: true-false
    title: Розмовна граматика
    instruction: Визначте, чи твердження правильне.
    items:
      - statement: Розмовний стиль може використовувати неповні речення.
        correct: true
        explanation: Контекст часто відновлює пропущені частини.
      - statement: Суржик потрібно подавати як найкращу модель живої української.
        correct: false
        explanation: Курс має вчити природної української без російських кальок.
      - statement: Частки можуть передавати сумнів, підтвердження або емоцію.
        correct: true
        explanation: Ну, ж, та, хіба, невже змінюють нюанс репліки.
      - statement: У розмовному стилі відмінки більше не потрібні.
        correct: false
        explanation: Розмовність не скасовує граматичної норми.
      - statement: Кличний відмінок часто звучить природно у звертаннях.
        correct: true
        explanation: Олено, Марку, друже — живі форми звертання.
  - id: wb-6
    type: error-correction
    title: Занадто офіційно
    instruction: Перепишіть фразу так, щоб вона звучала як неформальна розмова.
    items:
      - sentence: "Прошу повідомити, чи відбудеться зустріч."
        error: "офіційна формула в неформальному контексті"
        correction: "Скажи, зустріч буде?"
        explanation: У розмові з близькою людиною достатньо короткого питання.
      - sentence: "У зв'язку зі зміною графіка не зможу бути присутнім."
        error: "офіційна причина й книжний тон"
        correction: "У мене змінився графік, не прийду."
        explanation: Розмовний стиль називає причину простіше.
      - sentence: "Дякую за приділений час."
        error: "формальна кінцівка"
        correction: "Дякую, що знайшов час."
        explanation: Другий варіант ближчий до живої розмови.
      - sentence: "З метою уточнення деталей прошу зателефонувати."
        error: "канцелярський зворот"
        correction: "Подзвони, будь ласка, треба уточнити деталі."
        explanation: У неформальному прохання доречне пряме дієслово.
