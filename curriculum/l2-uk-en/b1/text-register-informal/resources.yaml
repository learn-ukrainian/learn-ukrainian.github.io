- title: Заболотний Grade 7, розмовне мовлення
  role: textbook
  notes: Шкільне пояснення розмовного стилю, його побутової сфери, діалогічності й неповних речень.
- title: Караман Grade 10, розмовний стиль
  role: textbook
  notes: Ознаки розмовного стилю, експресивне забарвлення й стилістичні різновиди, адаптовані до B1.
- title: Глазова Grade 11, стилістика словотвору
  role: textbook
  notes: Зменшувально-пестливі форми й оцінна лексика як засоби розмовного мовлення.
