version: '1.0'
module: aspect-future-tense
level: b1
inline:
  - id: act-1
    type: quiz
    title: Фокус речення
    instruction: Обери форму, яка найкраще відповідає фокусу речення.
    items:
      - question: До вечора я ____ лист.
        options:
          - напишу
          - писатиму
          - буду писати
        explanation: Готовий лист вимагає доконаного виду й простої форми.
        correct: 0
      - question: Завтра з другої до п'ятої години вони ____ звіт.
        options:
          - писатимуть
          - напишуть
          - <!-- bad -->будуть напишуть<!-- /bad -->
        explanation: Маркер тривалості веде до недоконаного виду.
        correct: 0
      - question: Завтра він ____ в офісі весь день.
        options:
          - буде працювати
          - <!-- bad -->буде працює<!-- /bad -->
          - зробить
        explanation: Після буде стоїть інфінітив недоконаного виду.
        correct: 0
      - question: До п'ятої ми ____ звіт.
        options:
          - завершимо
          - завершуватимемо
          - будемо завершити
        explanation: Межа до п'ятої вимагає доконаного результату.
        correct: 0
      - question: З дев'ятої до одинадцятої ми ____ над проєктом.
        options:
          - працюватимемо
          - попрацюємо
          - зробимо
        explanation: Проміжок часу вимагає недоконаного виду.
        correct: 0
      - question: Після наради ми ____ остаточне рішення.
        options:
          - вирішимо
          - вирішуватимемо
          - будемо вирішити
        explanation: Остаточне рішення — результат.
        correct: 0
      - question: Увесь ранок команда ____ план.
        options:
          - обговорюватиме
          - обговорить
          - вирішить
        explanation: Увесь ранок підкреслює процес.
        correct: 0
      - question: Перед дедлайном я ____ файл.
        options:
          - надішлю
          - надсилатиму
          - буду надіслати
        explanation: Надіслати файл — завершений крок.
        correct: 0
      - question: Під час чергування я ____ на листи.
        options:
          - відповідатиму
          - відповім
          - буду відповісти
        explanation: Повторювана дія потребує недоконаного виду.
        correct: 0
      - question: До вечора ми ____ завдання.
        options:
          - зробимо
          - робитимемо
          - будемо робити
        explanation: Готове завдання потребує доконаного виду.
        correct: 0
  - id: act-2
    type: match-up
    title: Вид і форма
    instruction: Познач вид і доступну майбутню форму.
    pairs:
      - left: писати — написати
        right: недоконаний вид має дві форми; доконаний вид має просту форму
      - left: робити — зробити
        right: робитиму або буду робити; зроблю
      - left: читати — прочитати
        right: читатиму або буду читати; прочитаю
      - left: готувати — підготувати
        right: готуватиму або буду готувати; підготую
      - left: перевіряти — перевірити
        right: перевірятиму або буду перевіряти; перевірю
      - left: надсилати — надіслати
        right: надсилатиму або буду надсилати; надішлю
      - left: відкривати — відкрити
        right: відкриватиму або буду відкривати; відкрию
      - left: зустрічати — зустріти
        right: зустрічатиму або буду зустрічати; зустріну
  - id: act-3
    type: group-sort
    title: Три конструкції
    instruction: Розподіли форми за конструкціями.
    groups:
      - label: складена форма
        items:
          - буду писати
          - будемо працювати
          - будуть чекати
      - label: складна форма
        items:
          - писатиму
          - працюватимемо
          - читатимуть
      - label: проста форма доконаного виду
        items:
          - напишу
          - зробимо
          - прочитають
  - id: act-4
    type: fill-in
    title: Форма в контексті
    instruction: Доповни речення формою майбутнього часу.
    items:
      - sentence: Завтра я ____ статтю протягом години.
        answer: читатиму
        options:
          - читатиму
          - прочитаю
          - зроблю
      - sentence: До вечора ми ____ завдання.
        answer: зробимо
        options:
          - зробимо
          - робитимемо
          - будемо робити
      - sentence: У Карпатах ми ____ природою.
        answer: насолоджуватимемося
        options:
          - насолоджуватимемося
          - забронюємо
          - закінчимо
      - sentence: До п'ятниці я ____ заявку.
        answer: надішлю
        options:
          - надішлю
          - надсилатиму
          - буду надсилати
      - sentence: Увесь день ми ____ гостей.
        answer: зустрічатимемо
        options:
          - зустрічатимемо
          - зустрінемо
          - зробимо
      - sentence: Після обговорення команда ____ рішення.
        answer: ухвалить
        options:
          - ухвалить
          - ухвалюватиме
          - буде ухвалити
      - sentence: Зранку технік ____ звук.
        answer: налаштовуватиме
        options:
          - налаштовуватиме
          - налаштує
          - налаштував
      - sentence: До початку події волонтери ____ залу.
        answer: підготують
        options:
          - підготують
          - готуватимуть
          - будуть підготувати
  - id: act-5
    type: match-up
    title: Намір і форма
    instruction: Поєднай комунікативний намір із формою.
    pairs:
      - left: результат до вечора
        right: напишу
      - left: процес протягом тижня
        right: буду працювати
      - left: компактний план процесу
        right: працюватиму
      - left: готове бронювання
        right: забронюю
      - left: до обіду
        right: закінчу
      - left: увесь обід
        right: відпочиватиму
      - left: після дзвінка
        right: уточню
      - left: з восьмої до дев'ятої
        right: перевірятиму
workbook:
  - type: quiz
    title: Конструкція майбутнього часу
    instruction: Обери правильну конструкцію майбутнього часу.
    items:
      - question: Я обіцяю, що до вечора ____ лист.
        options:
          - напишу
          - писатиму
          - <!-- bad -->буду написати<!-- /bad -->
        explanation: Обіцянка готового листа потребує доконаного виду.
        correct: 0
      - question: Завтра ми ____ це завдання разом.
        options:
          - робитимемо
          - <!-- bad -->робитимемомо<!-- /bad -->
          - зробимо
        explanation: Форма робитимемо вже містить особу й число.
        correct: 0
      - question: Завтра він ____ в офісі.
        options:
          - буде працювати
          - <!-- bad -->буде працює<!-- /bad -->
          - попрацює
        explanation: Складена форма має бути + інфінітив.
        correct: 0
      - question: Завтра я ____ цю цікаву книгу.
        options:
          - прочитаю
          - <!-- bad -->буду прочитати<!-- /bad -->
          - читатиму
        explanation: 'Йдеться про результат: книга буде прочитана.'
        correct: 0
      - question: З другої до п'ятої години вони ____ звіт.
        options:
          - писатимуть
          - напишуть
          - <!-- bad -->будуть напишуть<!-- /bad -->
        explanation: Проміжок часу показує тривалий процес.
        correct: 0
      - question: Яка форма є простою майбутньою формою доконаного виду?
        options:
          - прочитаю
          - буду читати
          - читатиму
        explanation: Прочитаю називає майбутній результат.
        correct: 0
      - question: Яка форма є складеною?
        options:
          - буду працювати
          - працюватиму
          - попрацюю
        explanation: Складена форма має буду + інфінітив.
        correct: 0
      - question: Яка форма є складною?
        options:
          - писатиму
          - буду писати
          - напишу
        explanation: Складна форма має суфікс -тиму.
        correct: 0
      - question: Який варіант ненормативний?
        options:
          - буду зроблю
          - зроблю
          - буду робити
        explanation: Буду не поєднується з особовою формою доконаного виду.
        correct: 0
      - question: Який варіант передає тривалість?
        options:
          - будемо обговорювати
          - обговоримо
          - вирішимо
        explanation: Складена форма недоконаного виду підкреслює процес.
        correct: 0
    id: wb-1
  - type: fill-in
    title: Утвори майбутній час
    instruction: Утвори майбутній час. Спершу визнач вид.
    items:
      - sentence: Я ____ лист до вечора.
        answer: напишу
        options:
          - напишу
          - писатиму
          - буду писати
      - sentence: Ми ____ звіт з другої до п'ятої.
        answer: писатимемо
        options:
          - писатимемо
          - напишемо
          - зробимо
      - sentence: Вони ____ це завдання разом.
        answer: зроблять
        options:
          - зроблять
          - робитимуть
          - будуть робити
      - sentence: Ти ____ статтю протягом години.
        answer: читатимеш
        options:
          - читатимеш
          - прочитаєш
          - зробиш
      - sentence: Вона завтра ____ готель.
        answer: забронює
        options:
          - забронює
          - буде бронювати
          - читатиме
      - sentence: Ми ____ на тебе.
        answer: будемо чекати
        options:
          - будемо чекати
          - дочекаємося
          - прочитаємо
      - sentence: Я ____ закінчити проєкт.
        answer: постараюся
        options:
          - постараюся
          - старатимуся
          - насолоджуватимуся
      - sentence: Вони ____ природою в Карпатах.
        answer: насолоджуватимуться
        options:
          - насолоджуватимуться
          - забронюють
          - закінчать
    id: wb-2
  - type: group-sort
    title: Сортування форм
    instruction: Розподіли форми на три конструкції.
    groups:
      - label: буду + інфінітив
        items:
          - буду читати
          - будеш працювати
          - будемо чекати
          - будуть писати
      - label: форма на -му
        items:
          - читатиму
          - працюватимеш
          - робитимемо
          - писатимуть
      - label: простий доконаний майбутній
        items:
          - прочитаю
          - зробиш
          - напишемо
          - забронюють
    id: wb-3
  - type: error-correction
    title: Редагування майбутнього часу
    instruction: Знайди помилку й виправ речення.
    items:
      - sentence: Я буду прочитати цю цікаву книгу.
        error: Я буду прочитати цю цікаву книгу.
        correction: Я прочитаю цю цікаву книгу.
        explanation: Доконаний вид утворює просту форму майбутнього часу.
      - sentence: Завтра він буде працює в офісі.
        error: Завтра він буде працює в офісі.
        correction: Завтра він буде працювати в офісі. або Завтра він працюватиме в офісі.
        explanation: Після буде потрібен інфінітив недоконаного виду.
      - sentence: Ми робитимемомо це завдання разом.
        error: Ми робитимемомо це завдання разом.
        correction: Ми робитимемо це завдання разом.
        explanation: Форма робитимемо вже має особове закінчення.
      - sentence: Вони напишуть звіт завтра з другої до п'ятої години.
        error: Вони напишуть звіт завтра з другої до п'ятої години.
        correction: Вони писатимуть звіт завтра з другої до п'ятої години.
        explanation: Проміжок часу вимагає недоконаного виду.
      - sentence: "Я маю йти до школи завтра. (у значенні майбутньої дії: піду)"
        error: "Я маю йти до школи завтра. (у значенні майбутньої дії: піду)"
        correction: Я йтиму до школи завтра. або Я буду йти до школи завтра.
        explanation: Мати + інфінітив позначає обов'язок, а не нейтральне майбутнє.
      - sentence: Я буду робитиму це завдання.
        error: Я буду робитиму це завдання.
        correction: Я робитиму це завдання. або Я буду робити це завдання.
        explanation: Аналітичну й синтетичну форми не накладають одну на одну.
      - sentence: Завтра ми будемо зробимо вправу.
        error: будемо зробимо
        correction: Завтра ми зробимо вправу.
        explanation: Не можна поєднувати буду з особовою формою доконаного виду.
      - sentence: Увесь вечір я напишу звіт.
        error: напишу
        correction: Увесь вечір я писатиму звіт.
        explanation: Увесь вечір підкреслює тривалість.
    id: wb-4
  - type: match-up
    title: Ситуація і форма
    instruction: Поєднай ситуацію з найприроднішою формою.
    pairs:
      - left: обіцянка готового листа
        right: напишу
      - left: план тривалої роботи
        right: працюватиму
      - left: очікування як процес
        right: будемо чекати
      - left: бронювання як результат
        right: забронюю
      - left: зусилля як процес
        right: старатимуся
      - left: завершення проєкту
        right: закінчу
      - left: протягом години
        right: читатиму
      - left: до кінця години
        right: прочитаю
      - left: під час чергування
        right: відповідатиму
      - left: після чергування
        right: відповім
      - left: увесь тиждень
        right: готуватимемо
      - left: до п'ятниці
        right: підготуємо
    id: wb-5
  - type: match-up
    title: Вид, конструкція, фокус
    instruction: Визнач вид, конструкцію і фокус значення.
    pairs:
      - left: Я прочитаю статтю.
        right: доконаний вид; проста форма; результат
      - left: Я читатиму статтю.
        right: недоконаний вид; складна форма; процес
      - left: Я буду читати статтю.
        right: недоконаний вид; складена форма; процес
      - left: Ми зробимо завдання.
        right: доконаний вид; проста форма; результат
      - left: Ми робитимемо завдання.
        right: недоконаний вид; складна форма; процес
      - left: Ми будемо робити завдання.
        right: недоконаний вид; складена форма; процес
      - left: буду відповідати на листи
        right: складена форма, недоконаний вид, процес
      - left: відповім на лист
        right: проста форма, доконаний вид, результат
    id: wb-6
  - type: true-false
    title: Самоперевірка правил
    instruction: Познач, чи правильне твердження.
    items:
      - statement: Доконаний вид має просту форму майбутнього часу.
        correct: true
      - statement: Недоконаний вид має складену й складну форми майбутнього часу.
        correct: true
      - statement: Після буде основне дієслово стоїть в інфінітиві.
        correct: true
      - statement: Форма робитимемо потребує ще одного закінчення.
        correct: false
      - statement: Часовий маркер протягом тижня часто веде до недоконаного виду.
        correct: true
      - statement: Форма «буду зробити» нормативна.
        correct: false
        explanation: Після буду потрібен інфінітив недоконаного виду.
      - statement: Форма «зроблю» передає майбутній результат.
        correct: true
        explanation: Це проста форма доконаного виду.
      - statement: Форма «писатиму» і «буду писати» можуть передавати процес.
        correct: true
        explanation: Обидві форми належать до недоконаного виду.
    id: wb-7
  - type: order
    title: План на завтра
    instruction: Упорядкуй дії в плані на завтра.
    items:
      - встану о сьомій
      - снідатиму
      - приїду на роботу
      - працюватиму до шостої
      - приготую вечерю
      - пообідаю з колегами
      - дорогою додому куплю продукти
      - увечері відпочиватиму
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
    id: wb-8
  - type: cloze
    title: Майбутній час у плані
    instruction: Заповни пропуски формами майбутнього часу.
    text: Завтра я встану о сьомій. Потім ____ до дев'ятої. На роботі ____ звіт з другої до п'ятої. До вечора ____ лист. До обіду я ____ матеріали, а після обіду ____ короткий лист. Увечері ми ____ результати й ____ фінальний файл. Перед сном я ____ нотатки.
    blanks:
      - id: 1
        answer: снідатиму
        options:
          - снідатиму
          - поснідаю
          - снідав
      - id: 2
        answer: писатиму
        options:
          - писатиму
          - напишу
          - написав
      - id: 3
        answer: напишу
        options:
          - напишу
          - писатиму
          - писав
      - id: 4
        answer: переглядатиму
        options:
          - переглядатиму
          - перегляну
          - переглянув
      - id: 5
        answer: напишу
        options:
          - напишу
          - писатиму
          - писав
      - id: 6
        answer: обговорюватимемо
        options:
          - обговорюватимемо
          - обговоримо
          - обговорили
      - id: 7
        answer: надішлемо
        options:
          - надішлемо
          - надсилатимемо
          - надсилали
      - id: 8
        answer: збережу
        options:
          - збережу
          - зберігатиму
          - зберігав
    id: wb-9
  - type: odd-one-out
    title: Зайва форма
    instruction: Знайди форму, яка не належить до групи.
    items:
      - words:
          - писатиму
          - читатиму
          - робитиму
          - напишу
        explanation: Напишу є доконаною формою результату, а інші форми називають процес.
        correct: 3
      - words:
          - буду читати
          - будеш писати
          - будемо працювати
          - прочитаю
        explanation: Прочитаю є доконаною простою формою, а інші варіанти мають буду + інфінітив.
        correct: 3
