- id: act-1
  type: quiz
  title: Фокус речення
  instruction: Обери форму, яка найкраще відповідає фокусу речення.
  items:
  - prompt: До вечора лист має бути готовий.
    options:
    - text: напишу
      correct: true
    - text: писатиму
      correct: false
    - text: буду писати
      correct: false
    explanation: Готовий лист вимагає доконаного виду й простої форми.
  - prompt: Завтра з другої до п'ятої години дія триватиме.
    options:
    - text: писатимуть
      correct: true
    - text: напишуть
      correct: false
    - text: <!-- bad -->будуть напишуть<!-- /bad -->
      correct: false
    explanation: Маркер тривалості веде до недоконаного виду.
  - prompt: Завтра він описує процес роботи в офісі.
    options:
    - text: буде працювати
      correct: true
    - text: <!-- bad -->буде працює<!-- /bad -->
      correct: false
    - text: зробить
      correct: false
    explanation: Після буде стоїть інфінітив недоконаного виду.
  - question: До п’ятої звіт має бути готовий.
    options:
    - text: завершимо
      correct: true
    - text: завершуватимемо
      correct: false
    - text: будемо завершити
      correct: false
    explanation: Межа до п’ятої вимагає доконаного результату.
  - question: З дев’ятої до одинадцятої дія триватиме.
    options:
    - text: працюватимемо
      correct: true
    - text: попрацюємо
      correct: false
    - text: зробимо
      correct: false
    explanation: Проміжок часу вимагає недоконаного виду.
  - question: Після наради потрібне остаточне рішення.
    options:
    - text: вирішимо
      correct: true
    - text: вирішуватимемо
      correct: false
    - text: будемо вирішити
      correct: false
    explanation: Остаточне рішення — результат.
  - question: Увесь ранок команда буде в процесі.
    options:
    - text: обговорюватиме
      correct: true
    - text: обговорить
      correct: false
    - text: вирішить
      correct: false
    explanation: Увесь ранок підкреслює процес.
  - question: Перед дедлайном треба надіслати файл.
    options:
    - text: надішлю
      correct: true
    - text: надсилатиму
      correct: false
    - text: буду надіслати
      correct: false
    explanation: Надіслати файл — завершений крок.
  - question: Під час чергування дія повторюватиметься.
    options:
    - text: відповідатиму
      correct: true
    - text: відповім
      correct: false
    - text: буду відповісти
      correct: false
    explanation: Повторювана дія потребує недоконаного виду.
  - question: До вечора завдання має бути виконане.
    options:
    - text: зробимо
      correct: true
    - text: робитимемо
      correct: false
    - text: будемо робити
      correct: false
    explanation: Готове завдання потребує доконаного виду.
- id: act-2
  type: grammar-identify
  title: Вид і форма
  instruction: Познач вид і доступну майбутню форму.
  items:
  - sentence: писати — написати
    answer: недоконаний вид має дві форми; доконаний вид має просту форму
  - sentence: робити — зробити
    answer: робитиму або буду робити; зроблю
  - sentence: читати — прочитати
    answer: читатиму або буду читати; прочитаю
  - sentence: готувати — підготувати
    answer: готуватиму або буду готувати; підготую
  - sentence: перевіряти — перевірити
    answer: перевірятиму або буду перевіряти; перевірю
  - sentence: надсилати — надіслати
    answer: надсилатиму або буду надсилати; надішлю
  - sentence: відкривати — відкрити
    answer: відкриватиму або буду відкривати; відкрию
  - sentence: зустрічати — зустріти
    answer: зустрічатиму або буду зустрічати; зустріну
- id: act-3
  type: group-sort
  title: Три конструкції
  instruction: Розподіли форми за конструкціями.
  groups:
  - name: складена форма
    items:
    - буду писати
    - будемо працювати
    - будуть чекати
    - будуть обговорювати
  - name: складна форма
    items:
    - писатиму
    - працюватимемо
    - читатимуть
    - перевірятимемо
  - name: проста форма доконаного виду
    items:
    - напишу
    - зробимо
    - прочитають
    - надішлю
- id: act-4
  type: fill-in
  title: Форма в контексті
  instruction: Доповни речення формою майбутнього часу.
  items:
  - sentence: Завтра я ____ статтю протягом години.
    answer: читатиму
    options:
    - читатиму
    - прочитаю
    - зроблю
  - sentence: До вечора ми ____ завдання.
    answer: зробимо
    options:
    - зробимо
    - робитимемо
    - будемо робити
  - sentence: У Карпатах ми ____ природою.
    answer: насолоджуватимемося
    options:
    - насолоджуватимемося
    - забронюємо
    - закінчимо
  - sentence: До п’ятниці я ____ заявку.
    answer: надішлю
    options:
    - надішлю
    - надсилатиму
    - буду надсилати
  - sentence: Увесь день ми ____ гостей.
    answer: зустрічатимемо
    options:
    - зустрічатимемо
    - зустрінемо
    - зробимо
  - sentence: Після обговорення команда ____ рішення.
    answer: ухвалить
    options:
    - ухвалить
    - ухвалюватиме
    - буде ухвалити
  - sentence: Зранку технік ____ звук.
    answer: налаштовуватиме
    options:
    - налаштовуватиме
    - налаштує
    - налаштував
  - sentence: До початку події волонтери ____ залу.
    answer: підготують
    options:
    - підготують
    - готуватимуть
    - будуть підготувати
- id: act-5
  type: match-up
  title: Намір і форма
  instruction: Поєднай комунікативний намір із формою.
  pairs:
  - left: результат до вечора
    right: напишу
  - left: процес протягом тижня
    right: буду працювати
  - left: компактний план процесу
    right: працюватиму
  - left: готове бронювання
    right: забронюю
  - left: до обіду
    right: закінчу
  - left: увесь обід
    right: відпочиватиму
  - left: після дзвінка
    right: уточню
  - left: з восьмої до дев’ятої
    right: перевірятиму
  - left: до дедлайну
    right: надішлю
  - left: протягом тижня
    right: готуватиму
  - left: перед зустріччю
    right: перечитаю
  - left: під час чергування
    right: відповідатиму
- type: quiz
  title: Конструкція майбутнього часу
  instruction: Обери правильну конструкцію майбутнього часу.
  items:
  - prompt: Я обіцяю, що до вечора ____ лист.
    options:
    - text: напишу
      correct: true
    - text: писатиму
      correct: false
    - text: <!-- bad -->буду написати<!-- /bad -->
      correct: false
    explanation: Обіцянка готового листа потребує доконаного виду.
  - prompt: Завтра ми ____ це завдання разом.
    options:
    - text: робитимемо
      correct: true
    - text: <!-- bad -->робитимемомо<!-- /bad -->
      correct: false
    - text: зробимо
      correct: false
    explanation: Форма робитимемо вже містить особу й число.
  - prompt: Завтра він ____ в офісі.
    options:
    - text: буде працювати
      correct: true
    - text: <!-- bad -->буде працює<!-- /bad -->
      correct: false
    - text: попрацює
      correct: false
    explanation: Складена форма має бути + інфінітив.
  - prompt: Завтра я ____ цю цікаву книгу.
    options:
    - text: прочитаю
      correct: true
    - text: <!-- bad -->буду прочитати<!-- /bad -->
      correct: false
    - text: читатиму
      correct: false
    explanation: 'Йдеться про результат: книга буде прочитана.'
  - prompt: З другої до п'ятої години вони ____ звіт.
    options:
    - text: писатимуть
      correct: true
    - text: напишуть
      correct: false
    - text: <!-- bad -->будуть напишуть<!-- /bad -->
      correct: false
    explanation: Проміжок часу показує тривалий процес.
  - question: Яка форма є простою майбутньою формою доконаного виду?
    options:
    - text: прочитаю
      correct: true
    - text: буду читати
      correct: false
    - text: читатиму
      correct: false
    explanation: Прочитаю називає майбутній результат.
  - question: Яка форма є складеною?
    options:
    - text: буду працювати
      correct: true
    - text: працюватиму
      correct: false
    - text: попрацюю
      correct: false
    explanation: Складена форма має буду + інфінітив.
  - question: Яка форма є складною?
    options:
    - text: писатиму
      correct: true
    - text: буду писати
      correct: false
    - text: напишу
      correct: false
    explanation: Складна форма має суфікс -тиму.
  - question: Який варіант ненормативний?
    options:
    - text: буду зроблю
      correct: true
    - text: зроблю
      correct: false
    - text: буду робити
      correct: false
    explanation: Буду не поєднується з особовою формою доконаного виду.
  - question: Який варіант передає тривалість?
    options:
    - text: будемо обговорювати
      correct: true
    - text: обговоримо
      correct: false
    - text: вирішимо
      correct: false
    explanation: Складена форма недоконаного виду підкреслює процес.
- type: fill-in
  title: Утвори майбутній час
  instruction: Утвори майбутній час. Спершу визнач вид.
  items:
  - sentence: Я ____ лист до вечора.
    answer: напишу
    options:
    - напишу
    - писатиму
    - буду писати
  - sentence: Ми ____ звіт з другої до п'ятої.
    answer: писатимемо
    options:
    - писатимемо
    - напишемо
    - зробимо
  - sentence: Вони ____ це завдання разом.
    answer: зроблять
    options:
    - зроблять
    - робитимуть
    - будуть робити
  - sentence: Ти ____ статтю протягом години.
    answer: читатимеш
    options:
    - читатимеш
    - прочитаєш
    - зробиш
  - sentence: Вона завтра ____ готель.
    answer: забронює
    options:
    - забронює
    - буде бронювати
    - читатиме
  - sentence: Ми ____ на тебе.
    answer: будемо чекати
    options:
    - будемо чекати
    - дочекаємося
    - прочитаємо
  - sentence: Я ____ закінчити проєкт.
    answer: постараюся
    options:
    - постараюся
    - старатимуся
    - насолоджуватимуся
  - sentence: Вони ____ природою в Карпатах.
    answer: насолоджуватимуться
    options:
    - насолоджуватимуться
    - забронюють
    - закінчать
- type: group-sort
  title: Сортування форм
  instruction: Розподіли форми на три конструкції.
  groups:
  - name: буду + інфінітив
    items:
    - буду читати
    - будеш працювати
    - будемо чекати
    - будуть писати
  - name: форма на -му
    items:
    - читатиму
    - працюватимеш
    - робитимемо
    - писатимуть
  - name: простий доконаний майбутній
    items:
    - прочитаю
    - зробиш
    - напишемо
    - забронюють
- type: error-correction
  title: Редагування майбутнього часу
  instruction: Знайди помилку й виправ речення.
  items:
  - sentence: Я буду прочитати цю цікаву книгу.
    error: Я буду прочитати цю цікаву книгу.
    correction: Я прочитаю цю цікаву книгу.
    explanation: Доконаний вид утворює просту форму майбутнього часу.
  - sentence: Завтра він буде працює в офісі.
    error: Завтра він буде працює в офісі.
    correction: Завтра він буде працювати в офісі. або Завтра він працюватиме в офісі.
    explanation: Після буде потрібен інфінітив недоконаного виду.
  - sentence: Ми робитимемомо це завдання разом.
    error: Ми робитимемомо це завдання разом.
    correction: Ми робитимемо це завдання разом.
    explanation: Форма робитимемо вже має особове закінчення.
  - sentence: Вони напишуть звіт завтра з другої до п'ятої години.
    error: Вони напишуть звіт завтра з другої до п'ятої години.
    correction: Вони писатимуть звіт завтра з другої до п'ятої години.
    explanation: Проміжок часу вимагає недоконаного виду.
  - sentence: Я маю йти до школи завтра. (у значенні I will go)
    error: Я маю йти до школи завтра. (у значенні I will go)
    correction: Я йтиму до школи завтра. або Я буду йти до школи завтра.
    explanation: Мати + інфінітив позначає обов'язок, а не нейтральне майбутнє.
  - sentence: Я буду робитиму це завдання.
    error: Я буду робитиму це завдання.
    correction: Я робитиму це завдання. або Я буду робити це завдання.
    explanation: Аналітичну й синтетичну форми не накладають одну на одну.
  - sentence: Завтра ми будемо зробимо вправу.
    error: будемо зробимо
    correction: Завтра ми зробимо вправу.
    explanation: Не можна поєднувати буду з особовою формою доконаного виду.
  - sentence: Увесь вечір я напишу звіт.
    error: напишу
    correction: Увесь вечір я писатиму звіт.
    explanation: Увесь вечір підкреслює тривалість.
- type: match-up
  title: Ситуація і форма
  instruction: Поєднай ситуацію з найприроднішою формою.
  pairs:
  - left: обіцянка готового листа
    right: напишу
