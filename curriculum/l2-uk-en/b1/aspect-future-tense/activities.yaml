  - приготую вечерю
  - пообідаю з колегами
  - дорогою додому куплю продукти
  - увечері відпочиватиму
- type: cloze
  title: Майбутній час у плані
  instruction: Заповни пропуски формами майбутнього часу.
  text: Завтра я встану о сьомій. Потім ____ до дев’ятої. На роботі ____ звіт з другої до п’ятої. До вечора ____ лист. До обіду я ____ матеріали, а після обіду ____ короткий лист. Увечері ми ____ результати й ____ фінальний файл. Перед сном я ____ нотатки.
  passage: Завтра я встану о сьомій. Потім {1} до дев’ятої. На роботі {2} звіт з другої до п’ятої. До вечора {3} лист. До обіду я {4} матеріали, а після обіду {5} короткий лист. Увечері ми {6} результати й {7} фінальний файл. Перед сном я {8} нотатки.
  blanks:
  - id: 1
    answer: снідатиму
    options:
    - снідатиму
    - поснідаю
    - снідав
  - id: 2
