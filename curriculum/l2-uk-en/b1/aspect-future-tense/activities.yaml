- type: essay-response
  title: Мій план на завтра
  instruction: Напиши план і поясни вибір виду.
  prompt: 'Напишіть план на завтра: дві дії з тривалістю, три дії з чітким результатом, одну складну форму на -тиму й одну складену форму з буду. Уникайте форм на кшталт «буду зроблю».'
  min_words: 120
  source_reading: 'План на завтра має поєднувати результат і процес: встану, снідатиму, приїду, працюватиму, напишу.'
  model_answer: Завтра я встану о сьомій, бо це одна завершена дія. Потім снідатиму, бо важливий процес. До дев'ятої я приїду на роботу. Там працюватиму до шостої. Увечері напишу лист і прочитаю статтю. Також читатиму книжку перед сном.
  peer_review_guidelines:
  - Перевір вид кожного дієслова.
