  - left: зусилля як процес
    right: старатимуся
  - left: завершення проєкту
    right: закінчу
  - left: протягом години
    right: читатиму
  - left: до кінця години
    right: прочитаю
  - left: під час чергування
    right: відповідатиму
  - left: після чергування
    right: відповім
  - left: увесь тиждень
    right: готуватимемо
  - left: до п’ятниці
    right: підготуємо
- type: grammar-identify
  title: Вид, конструкція, фокус
  instruction: Визнач вид, конструкцію і фокус значення.
  items:
  - sentence: Я прочитаю статтю.
    answer: доконаний вид; проста форма; результат
  - sentence: Я читатиму статтю.
    answer: недоконаний вид; складна форма; процес
  - sentence: Я буду читати статтю.
    answer: недоконаний вид; складена форма; процес
  - sentence: Ми зробимо завдання.
    answer: доконаний вид; проста форма; результат
  - sentence: Ми робитимемо завдання.
    answer: недоконаний вид; складна форма; процес
  - sentence: Ми будемо робити завдання.
    answer: недоконаний вид; складена форма; процес
  - sentence: буду відповідати на листи
    answer: складена форма, недоконаний вид, процес
  - sentence: відповім на лист
    answer: проста форма, доконаний вид, результат
- type: true-false
  title: Самоперевірка правил
  instruction: Познач, чи правильне твердження.
  items:
  - statement: Доконаний вид має просту форму майбутнього часу.
    correct: true
  - statement: Недоконаний вид має складену й складну форми майбутнього часу.
    correct: true
  - statement: Після буде основне дієслово стоїть в інфінітиві.
    correct: true
  - statement: Форма робитимемо потребує ще одного закінчення.
    correct: false
  - statement: Часовий маркер протягом тижня часто веде до недоконаного виду.
    correct: true
  - statement: Форма «буду зробити» нормативна.
    correct: false
    explanation: Після буду потрібен інфінітив недоконаного виду.
  - statement: Форма «зроблю» передає майбутній результат.
    correct: true
    explanation: Це проста форма доконаного виду.
  - statement: Форма «писатиму» і «буду писати» можуть передавати процес.
    correct: true
    explanation: Обидві форми належать до недоконаного виду.
