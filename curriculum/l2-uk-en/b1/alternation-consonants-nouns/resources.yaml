- title: Авраменко Grade 5, p.114-115
  role: textbook
  notes: Планове джерело для потрійної моделі г - з - ж, к - ц - ч, х - с - ш.
  source_ref: Авраменко Grade 5, p.114-115
- title: Заболотний Grade 5, p.116-119
  role: textbook
  notes: Планове джерело для прикладів друг - друзі - дружити та молоко - у молоці - молочний.
  source_ref: Заболотний Grade 5, p.116-119
- title: Глазова Grade 10, p.209
  role: textbook
  notes: Планове джерело для кличного відмінка з чергуваннями друг - друже, козак - козаче, хлопець - хлопче.
  source_ref: Глазова Grade 10, p.209
- title: Литвінова Grade 6, p.159
  role: textbook
  notes: Планове джерело для систематизації кличного відмінка іменників другої відміни.
  source_ref: Литвінова Grade 6, p.159
- title: Авраменко Grade 10, p.175
  role: textbook
  notes: Планове джерело для форм звертання й кличного відмінка в діалогічному поясненні.
  source_ref: Авраменко Grade 10, p.175
- title: Wiki grammar article for B1 alternation-consonants-nouns
  role: wiki
  notes: Використано як внутрішню карту типів чергування, типових L2 помилок і рекомендованої прогресії вправ.
  source_ref: wiki/grammar/b1/alternation-consonants-nouns.md
- title: Local B1 alternation-vowels module
  role: curriculum
  notes: Модуль продовжує морфонологічний блок після чергування голосних і зберігає той самий B1 формат.
