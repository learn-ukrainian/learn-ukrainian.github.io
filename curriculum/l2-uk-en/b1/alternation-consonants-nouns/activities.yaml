  - id: wb-10
    type: cloze
    title: Редакторський абзац
    instruction: Оберіть форму, яка природно працює в контексті.
    text: "Учора я сказав: {Олеже|Олег|Олегу}, перевір цей короткий текст. У першому реченні книжка лежала у {сумці|сумкі|сумчі}, а поруч була нотатка у {книзі|книгі|книжці}. Потім автор написав лист {Ользі|Ольгі|Ольже} і домовився зустрітися на {зупинці|зупинкі|зупинчі}. Далі герой ішов по широкій {дорозі|дорогі|дорожі} й говорив: {друже|друге|друзе}, зачекай. У діалозі був і рядок {хлопче|хлопець|хлопцю}, підійди сюди. Після цього мандрівник писав про подорож у {Празі|Прагі|Пражі} та навчання в {Америці|Америкі|Америчі}. Наприкінці документи лежали у {теці|текі|течі}, а для множини автор правильно написав у {сумках|сумцях|сумчах}."
  - id: wb-11
    type: essay-response
    title: Письмова самоперевірка
    instruction: Напишіть короткий текст і поясніть форми.
    prompt: "Напишіть 120-160 слів українською. Частина 1: складіть короткий діалог або опис ситуації, де є щонайменше п'ять форм із чергуванням приголосних в іменниках. Частина 2: після тексту випишіть ці форми парами, наприклад друг - друже або нога - на нозі. Частина 3: поясніть дві форми через відмінок або словотворення."
    min_words: 120
    rubric:
      - criteria: Обсяг
        description: Текст має 120-160 слів і читається як зв'язна ситуація.
        points: 1
      - criteria: П'ять форм
        description: У тексті є щонайменше п'ять форм із чергуванням приголосних.
        points: 1
      - criteria: Кличний
        description: Є принаймні одна правильна форма звертання.
        points: 1
      - criteria: Форма на -і
        description: Є принаймні одна правильна форма давального або місцевого на -і.
        points: 1
      - criteria: Пари форм
        description: Після тексту подано початкові форми й результати.
        points: 1
      - criteria: Пояснення
        description: Дві форми пояснено через контекст, а не просто через пам'ять.
        points: 1
      - criteria: Не змішано ряди
        description: Немає форм на зразок на ногі для нога або друзе для друг.
        points: 1
      - criteria: Книга і книжка
        description: Не переплутано у книзі та на книжці.
        points: 1
      - criteria: Множина
        description: Множинні форми на -ах або -ам не отримують чергування перед -і.
        points: 1
      - criteria: Власні назви
        description: Власні назви подано природно або перевірено.
        points: 1
      - criteria: Регістр B1
        description: Мова проста, природна й без штучної академічності.
        points: 1
      - criteria: Саморедагування
        description: Учень може показати, як перевірив сумнівну форму.
        points: 1
