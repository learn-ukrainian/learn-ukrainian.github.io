      - left: Ольга
        right: Ользі
      - left: подруга
        right: подрузі
      - left: книжка
        right: на книжці
      - left: книга
        right: у книзі
      - left: Прага
        right: у Празі
      - left: сумка
        right: у сумці
  - id: wb-4
    type: group-sort
    title: Чотири типи прикладів
    instruction: Розподіліть приклади за типом.
    groups:
      - label: Г - ж або к - ч у звертанні
        items:
          - друг - друже
          - козак - козаче
          - Олег - Олеже
          - юнак - юначе
          - чоловік - чоловіче
      - label: Г - з або к - ц перед -і
        items:
          - нога - на нозі
          - рука - у руці
          - дорога - на дорозі
          - подруга - подрузі
          - книжка - на книжці
      - label: Власні назви
        items:
          - Прага - у Празі
          - Америка - в Америці
          - Ольга - Ользі
          - Марійка - Марійці
          - Олег - Олеже
      - label: Без чергування цієї моделі
        items:
          - Ігор - Ігорю
          - Джек - Джеку
          - друг - другові
          - сумка - у сумках
          - Канада - у Канаді
  - id: wb-5
    type: error-correction
    title: Редагування речень
    instruction: Виправте форму й поясніть контекст.
    items:
      - sentence: "Я залишив телефон у сумкі."
        error: сумкі
        correction: сумці
        error_type: word
        explanation: Сумка має форму у сумці.
