version: '1.0'
module: alternation-consonants-nouns
level: b1
inline:
  - id: act-1
    type: quiz
    title: Побачити ряд чергування
    instruction: Оберіть тип зміни для пари слів.
    items:
      - question: У парі "друг - друже" видно...
        options:
          - г - ж у кличному відмінку
          - г - з перед -і
          - к - ц перед -і
        correct: 0
        explanation: Це звертання, тому працює ряд кличного відмінка.
      - question: У парі "нога - на нозі" видно...
        options:
          - г - з перед -і
          - г - ж у кличному
          - х - ш у словотворенні
        correct: 0
        explanation: Місцевий відмінок на -і дає форму нозі.
      - question: У парі "козак - козаче" видно...
        options:
          - к - ч у кличному відмінку
          - к - ц перед -і
          - ц - ч у слові на -ець
        correct: 0
        explanation: У звертанні козак має форму козаче.
      - question: У парі "рука - у руці" видно...
        options:
          - к - ц перед -і
          - к - ч у словотворенні
          - г - з перед -і
        correct: 0
        explanation: Місцевий відмінок на -і викликає к - ц.
      - question: У парі "пастух - пастуше" видно...
        options:
          - х - ш у кличному відмінку
          - х - с перед -і
          - г - ж у кличному
        correct: 0
        explanation: Звертання до пастуха має форму пастуше.
      - question: У парі "вухо - у вусі" видно...
        options:
          - х - с перед -і
          - х - ш у кличному
          - ц - ч у звертанні
        correct: 0
        explanation: Місцевий відмінок на -і дає форму у вусі.
      - question: У парі "хлопець - хлопче" видно...
        options:
          - ц - ч у кличному відмінку
          - к - ц перед -і
          - г - з перед -і
        correct: 0
        explanation: Слова на -ець часто мають кличний на -че.
      - question: У парі "книжка - на книжці" видно...
        options:
          - к - ц перед -і
          - к - ч у кличному
          - г - ж у словотворенні
        correct: 0
        explanation: Початкове слово книжка має форму на книжці.
      - question: У парі "Ольга - Ользі" видно...
        options:
          - г - з перед -і
          - г - ж у кличному
          - х - с перед -і
        correct: 0
        explanation: Давальний відмінок імені Ольга має форму Ользі.
      - question: У парі "книга - книжка" видно...
        options:
          - г - ж у словотворенні
          - г - з перед -і
          - ц - ч у кличному
        correct: 0
        explanation: Книжка є словотворчою родиною слова книга.
      - question: У парі "сумка - у сумці" видно...
        options:
          - к - ц перед -і
          - к - ч у звертанні
          - х - ш у словотворенні
        correct: 0
        explanation: Місцевий відмінок однини має форму у сумці.
      - question: У парі "Ігор - Ігорю" видно...
        options:
          - кличний без цього чергування
          - г - ж у кличному
          - г - з перед -і
        correct: 0
        explanation: Ігорю є усталена форма кличного без г - ж.
  - id: act-2
    type: fill-in
    title: Кличний відмінок
    instruction: Виберіть природну форму звертання.
    items:
      - sentence: "Привіт, ____!"
        answer: друже
        options:
          - друге
          - друже
          - друзі
        explanation: Друг має кличний друже.
      - sentence: "Слухай, ____!"
        answer: козаче
        options:
          - козаке
          - козаче
          - козаце
        explanation: Козак має кличний козаче.
      - sentence: "____, зачекай мене біля школи."
        answer: Олеже
        options:
          - Олеге
          - Олеже
          - Олегу
        explanation: Олег у звертанні має форму Олеже.
      - sentence: "Добрий день, ____."
        answer: пане Олеже
        options:
          - пане Олег
          - пане Олеже
          - пан Олеже
        explanation: У звертанні ім'я теж стоїть у кличному.
      - sentence: "____, передайте, будь ласка, цю книжку."
        answer: хлопче
        options:
          - хлопець
          - хлопче
          - хлопцю
        explanation: Хлопець має кличний хлопче.
      - sentence: "Тримайся, ____!"
        answer: юначе
        options:
          - юнак
          - юначе
          - юнаку
        explanation: Юнак має кличний юначе.
      - sentence: "Дякую, ____."
        answer: чоловіче
        options:
          - чоловіку
          - чоловіче
          - чоловіке
        explanation: Чоловік має кличний чоловіче.
      - sentence: "Гей, ____!"
        answer: пастуше
        options:
          - пастухе
          - пастуше
          - пастусе
        explanation: Пастух має кличний пастуше.
      - sentence: "____, зайдіть до кабінету."
        answer: Сергію
        options:
          - Сергію
          - Сергіже
          - Сергіе
        explanation: Сергію є клична форма без цього чергування.
      - sentence: "____, радий тебе бачити."
        answer: Джеку
        options:
          - Джеку
          - Джече
          - Джеке
        explanation: Для цього іншомовного імені природна форма Джеку.
      - sentence: "____, прочитайте перший абзац."
        answer: шевче
        options:
          - швець
          - шевче
          - швецю
        explanation: Швець має кличний шевче.
      - sentence: "Молодець, ____!"
        answer: молодче
        options:
          - молодче
          - молодцю
          - молодеце
        explanation: Молодець у звертанні дає форму молодче.
  - id: act-3
    type: fill-in
    title: Форми перед -і
    instruction: Виберіть форму давального або місцевого відмінка.
    items:
      - sentence: "Я стою на ____."
        answer: нозі
        options:
          - ногі
          - нозі
          - ножі
        explanation: Нога має форму на нозі.
      - sentence: "Ключ лежить у ____."
        answer: руці
        options:
          - рукі
          - руці
          - ручі
        explanation: Рука має форму у руці.
      - sentence: "Ми зустрілися на ____."
        answer: зупинці
        options:
          - зупинкі
          - зупинці
          - зупинчі
        explanation: Зупинка має форму на зупинці.
      - sentence: "Записка лежить у ____."
        answer: сумці
        options:
          - сумкі
          - сумці
          - сумчі
        explanation: Сумка має форму у сумці.
      - sentence: "Я написав ____."
        answer: Ользі
        options:
          - Ольгі
          - Ользі
          - Ольже
        explanation: Ольга має давальний Ользі.
      - sentence: "Він допоміг своїй ____."
        answer: подрузі
        options:
          - подругі
          - подрузі
          - подружі
        explanation: Подруга має форму подрузі.
      - sentence: "Цей факт є в ____."
        answer: книзі
        options:
          - книгі
          - книзі
          - книжці
        explanation: Книга має форму у книзі; книжці походить від книжка.
      - sentence: "Ми йшли по широкій ____."
        answer: дорозі
        options:
          - дорогі
          - дорозі
          - дорожі
        explanation: Дорога має форму дорозі.
      - sentence: "Вони жили в ____."
        answer: Празі
        options:
          - Прагі
          - Празі
          - Пражі
        explanation: Прага має місцевий у Празі.
      - sentence: "Сестра навчається в ____."
        answer: Америці
        options:
          - Америкі
          - Америці
          - Америчі
        explanation: Америка має форму в Америці.
      - sentence: "Лікар подивився у ____."
        answer: вусі
        options:
          - вухі
          - вусі
          - вуші
        explanation: Вухо має місцевий у вусі.
      - sentence: "Я подякував ____ за пораду."
        answer: дочці
        options:
          - дочкі
          - дочці
          - доччі
        explanation: Дочка має давальний дочці.
  - id: act-4
    type: group-sort
    title: Контекст вирішує
    instruction: Розподіліть пари за граматичним контекстом.
    groups:
      - label: Кличний відмінок
        items:
          - друг - друже
          - козак - козаче
          - Олег - Олеже
          - хлопець - хлопче
          - пастух - пастуше
          - чоловік - чоловіче
      - label: Давальний або місцевий на -і
        items:
          - нога - на нозі
          - рука - у руці
          - Ольга - Ользі
          - подруга - подрузі
          - книжка - на книжці
          - дорога - на дорозі
      - label: Словотворення
        items:
          - книга - книжка
          - рука - ручка
          - молоко - молочний
          - вухо - вушко
          - кожух - кожушок
          - нога - ніжка
      - label: Без цього чергування
        items:
          - Ігор - Ігорю
          - Джек - Джеку
          - сумка - у сумках
          - друг - другові
          - Канада - у Канаді
          - Сергій - Сергію
  - id: act-5
    type: error-correction
    title: Виправте форму
    instruction: Знайдіть помилкову форму й подайте природний варіант.
    items:
      - sentence: "Привіт, мій друге!"
        error: друге
        correction: друже
        error_type: word
        explanation: У кличному відмінку друг має форму друже.
      - sentence: "Я стою на лівій ногі."
        error: ногі
        correction: нозі
        error_type: word
        explanation: Нога має місцевий на нозі.
      - sentence: "Ключі лежать у сумкі."
        error: сумкі
        correction: сумці
        error_type: word
        explanation: Сумка має форму у сумці.
      - sentence: "Олег, зайди, будь ласка."
        error: Олег
        correction: Олеже
        error_type: word
        explanation: У звертанні треба кличний Олеже.
      - sentence: "Я написав Ольгі коротке повідомлення."
        error: Ольгі
        correction: Ользі
        error_type: word
        explanation: Ольга має давальний Ользі.
      - sentence: "Ми живемо на тихій дорогі."
        error: дорогі
        correction: дорозі
        error_type: word
        explanation: Дорога має місцевий дорозі.
      - sentence: "Слухай, козаце, будь уважний."
        error: козаце
        correction: козаче
        error_type: word
        explanation: Козак має кличний козаче.
      - sentence: "Цей приклад є у книгі."
        error: книгі
        correction: книзі
        error_type: word
        explanation: Книга має місцевий у книзі.
      - sentence: "Ми зустрілися на зупинкі."
        error: зупинкі
        correction: зупинці
        error_type: word
        explanation: Зупинка має місцевий на зупинці.
      - sentence: "Добрий день, пане Олег."
        error: пане Олег
        correction: пане Олеже
        error_type: phrase
        explanation: У звертанні ім'я має кличну форму.
      - sentence: "У конспекті написано: на книжці багато прикладів."
        error: на книжці
        correction: у книжках
        error_type: phrase
        explanation: Коли йдеться про множину, потрібна форма у книжках.
      - sentence: "Вона допомогла подругі з переїздом."
        error: подругі
        correction: подрузі
        error_type: word
        explanation: Подруга має давальний подрузі.
workbook:
  - id: wb-1
    type: quiz
    title: Перевірка рядів
    instruction: Оберіть правильне пояснення.
    items:
      - question: Чому правильна форма "на нозі"?
        options:
          - Перед -і г переходить у з.
          - У кличному г переходить у ж.
          - Це множина.
        correct: 0
        explanation: Це місцевий відмінок із закінченням -і.
      - question: Чому правильна форма "друже"?
        options:
          - У кличному г переходить у ж.
          - Перед -і г переходить у з.
          - Це родовий відмінок.
        correct: 0
        explanation: Це форма звертання.
      - question: Яка пара показує к - ц перед -і?
        options:
          - рука - у руці
          - козак - козаче
          - книга - книжка
        correct: 0
        explanation: У руці є місцевий на -і.
      - question: Яка пара показує к - ч у кличному?
        options:
          - козак - козаче
          - сумка - у сумці
          - Америка - в Америці
        correct: 0
        explanation: Козаче є клична форма.
      - question: Яке слово не треба змінювати за моделлю г - з?
        options:
          - Канада - у Канаді
          - Прага - у Празі
          - Ольга - Ользі
        correct: 0
        explanation: Канада не має основи на г, к, х у цій моделі.
      - question: Яка форма природна для звертання до Ігоря?
        options:
          - Ігорю
          - Ігоже
          - Ігореже
        correct: 0
        explanation: Ігорю є усталена клична форма.
      - question: Яка форма природна для "книга" в місцевому?
        options:
          - у книзі
          - у книжці
          - у книгі
        correct: 0
        explanation: У книжці походить від книжка, не від книга.
      - question: Яка форма природна для "книжка" в місцевому?
        options:
          - на книжці
          - на книзі
          - на книжкі
        correct: 0
        explanation: Книжка має форму на книжці.
      - question: Яке пояснення підходить до "хлопець - хлопче"?
        options:
          - ц переходить у ч у кличному.
          - ц переходить у с перед -і.
          - Це форма множини.
        correct: 0
        explanation: Це окремий кличний тип.
      - question: Яка форма показує, що множина не бере чергування перед -і?
        options:
          - у сумках
          - у сумці
          - сумці
        correct: 0
        explanation: У множині маємо у сумках.
      - question: Яка форма природна для "подруга" в давальному?
        options:
          - подрузі
          - подругі
          - подружі
        correct: 0
        explanation: Подруга має давальний подрузі.
      - question: Яка пара є словотворенням, а не відмінюванням?
        options:
          - рука - ручка
          - рука - у руці
          - друг - друже
        correct: 0
        explanation: Ручка є інше слово тієї самої родини.
  - id: wb-2
    type: fill-in
    title: Короткі форми в реченнях
    instruction: Виберіть форму, яка відповідає контексту.
    items:
      - sentence: "Ми сиділи на ____ біля кав'ярні."
        answer: лавці
        options:
          - лавкі
          - лавці
          - лавчі
        explanation: Лавка має місцевий лавці.
      - sentence: "Документи лежать у ____."
        answer: папці
        options:
          - папкі
          - папці
          - папчі
        explanation: Папка має місцевий папці.
      - sentence: "Я розповів це ____."
        answer: подрузі
        options:
          - подругі
          - подрузі
          - подружі
        explanation: Подруга має давальний подрузі.
      - sentence: "У цій ____ є корисна таблиця."
        answer: книзі
        options:
          - книзі
          - книгі
          - книжці
        explanation: Книга має форму у книзі.
      - sentence: "На ____ ростуть дерева."
        answer: дорозі
        options:
          - дорогі
          - дорозі
          - дорожі
        explanation: Дорога має місцевий дорозі.
      - sentence: "Привіт, ____!"
        answer: Олеже
        options:
          - Олег
          - Олеже
          - Олегу
        explanation: Олег має кличний Олеже.
      - sentence: "Дякую, ____."
        answer: друже
        options:
          - друге
          - друже
          - друзі
        explanation: Друг має кличний друже.
      - sentence: "Слухай, ____!"
        answer: хлопче
        options:
          - хлопець
          - хлопче
          - хлопцю
        explanation: Хлопець має кличний хлопче.
      - sentence: "Ми були у ____ минулого року."
        answer: Празі
        options:
          - Прагі
          - Празі
          - Пражі
        explanation: Прага має форму у Празі.
      - sentence: "Сестра живе в ____."
        answer: Америці
        options:
          - Америкі
          - Америці
          - Америчі
        explanation: Америка має форму в Америці.
      - sentence: "Лікар сказав, що у ____ все добре."
        answer: вусі
        options:
          - вухі
          - вусі
          - вуші
        explanation: Вухо має форму у вусі.
      - sentence: "Він допоміг ____ із завданням."
        answer: дочці
        options:
          - дочкі
          - дочці
          - доччі
        explanation: Дочка має давальний дочці.
  - id: wb-3
    type: match-up
    title: Початкова форма і результат
    instruction: Поєднайте початкову форму з природною формою.
    pairs:
