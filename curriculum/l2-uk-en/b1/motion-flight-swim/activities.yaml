version: '1.0'
module: motion-flight-swim
level: b1
inline:
  - id: act-1
    type: quiz
    title: Один маршрут чи звичка?
    instruction: Оберіть дієслово, яке відповідає ситуації.
    items:
      - question: "Зараз ми ____ до Варшави ранковим рейсом."
        options:
          - летимо
          - літаємо
          - плаваємо
        correct: 0
        explanation: Зараз і один рейс потребують односпрямованого летимо.
      - question: "Вона часто ____ у відрядження до Праги."
        options:
          - літає
          - летить
          - пливе
        correct: 0
        explanation: Часто означає повторення, тому літає.
      - question: "Човен ____ до берега після сигналу."
        options:
          - пливе
          - плаває
          - летить
        correct: 0
        explanation: Один водний маршрут до берега - пливе.
      - question: "Діти щосуботи ____ у басейні."
        options:
          - плавають
          - пливуть
          - летять
        correct: 0
        explanation: Щосуботи означає регулярне заняття, тому плавають.
      - question: "Птахи ____ над озером у різних напрямках."
        options:
          - літають
          - летять
          - пливуть
        correct: 0
        explanation: Різні напрямки підказують літати.
      - question: "Пором ____ до острова одним маршрутом."
        options:
          - пливе
          - плаває
          - літає
        correct: 0
        explanation: Один маршрут порома - пливе.
      - question: "Пілот ____ щодня, бо це його робота."
        options:
          - літає
          - летить
          - пливе
        correct: 0
        explanation: Щоденна професійна регулярність - літає.
      - question: "Коли ти подзвонив, я ____ над Карпатами."
        options:
          - летів
          - літав
          - плавав
        correct: 0
        explanation: У момент дзвінка тривав один політ, тому летів.
      - question: "Минулого літа ми ____ поромом між островами."
        options:
          - плавали
          - пливли
          - летіли
        correct: 0
        explanation: Досвід або кілька поїздок між островами - плавали.
      - question: "Спортсмен ____ до фінішу останні двадцять метрів."
        options:
          - плив
          - плавав
          - летів
        correct: 0
        explanation: Один заплив до фінішу - плив.
      - question: "Ластівки низько ____ перед дощем."
        options:
          - літають
          - летять
          - пливуть
        correct: 0
        explanation: Загальна поведінка птахів у різних напрямках - літають.
      - question: "Ми ____ до Одеси літаком, а не поїздом."
        options:
          - летимо
          - їдемо
          - пливемо
        correct: 0
        explanation: Літаком у конкретному маршруті - летимо.
  - id: act-2
    type: fill-in
    title: Форми летіти і пливти
    instruction: Заповніть пропуск правильною формою.
    items:
      - sentence: "Я зараз ____ до Кракова. (летіти)"
        answer: лечу
        options:
          - лечу
          - літаю
          - летів
        explanation: Я і зараз потребують форми лечу.
      - sentence: "Ти ____ до Вільнюса чи їдеш автобусом? (летіти)"
        answer: летиш
        options:
          - летиш
          - літаєш
          - полетиш
        explanation: Питання про один майбутній маршрут може вживати теперішній летиш.
      - sentence: "Рейс ____ з другого термінала о дев'ятій. (вилітати)"
        answer: вилітає
        options:
          - вилітає
          - вилетів
          - летить
        explanation: Розклад часто виражається теперішнім часом.
      - sentence: "Учора літак ____ над містом дуже низько. (летіти)"
        answer: летів
        options:
          - летів
          - літав
          - летить
        explanation: Один політ у минулому - летів.
      - sentence: "Вона часто ____ до родини в Італію. (літати)"
        answer: літає
        options:
          - літає
          - летить
          - летіла
        explanation: Часто потребує різноспрямованої форми літає.
      - sentence: "Ми ____ до Варшави щомісяця. (літати)"
        answer: літаємо
        options:
          - літаємо
          - летимо
          - летіли
        explanation: Щомісяця означає повторення.
      - sentence: "Я ____ до буйка, а потім повернуся. (пливти)"
        answer: пливу
        options:
          - пливу
          - плаваю
          - поплив
        explanation: Один маршрут у воді - пливу.
      - sentence: "Ти добре ____? (плавати)"
        answer: плаваєш
        options:
          - плаваєш
          - пливеш
          - плив
        explanation: Ідеться про вміння, тому плаваєш.
      - sentence: "Човен ____ до пристані повільно. (пливти)"
        answer: пливе
        options:
          - пливе
          - плаває
          - летить
        explanation: Один маршрут човна до пристані - пливе.
      - sentence: "Качки ____ на озері цілий ранок. (плавати)"
        answer: плавали
        options:
          - плавали
          - пливли
          - летіли
        explanation: Рух у різних напрямках на озері - плавали.
      - sentence: "Ми ____ поромом до острова двадцять хвилин. (пливти)"
        answer: пливли
        options:
          - пливли
          - плавали
          - летіли
        explanation: Конкретний маршрут поромом - пливли.
      - sentence: "Улітку діти ____ у басейні щодня. (плавати)"
        answer: плавали
        options:
          - плавали
          - пливли
          - попливли
        explanation: Щодня і заняття в басейні - плавали.
  - id: act-3
    type: match-up
    title: Префікс і траєкторія
    instruction: Поєднайте дієслово з найближчим значенням.
    pairs:
      - left: прилетіти
        right: прибути повітрям
      - left: долетіти
        right: досягти пункту польотом
      - left: вилетіти
        right: вирушити з аеропорту або вилетіти назовні
      - left: перелетіти
        right: перетнути щось повітрям
      - left: пролетіти
        right: минути повітрям або пролетіти над чимось
      - left: підлетіти
        right: наблизитися в повітрі
      - left: припливти
        right: прибути водою
      - left: доплисти
        right: досягти пункту водою
      - left: відпливти
        right: віддалитися від причалу або берега
      - left: переплисти
        right: перетнути воду до іншого берега
      - left: проплисти
        right: минути водою або проплисти повз
      - left: обплисти
        right: пройти водою навколо
  - id: act-4
    type: group-sort
    title: Повітряні та водні префікси
    instruction: Розподіліть форми за фазою маршруту.
    groups:
      - label: "Прибуття або досягнення"
        items:
          - прилетіти до Львова
          - долетіти до Стамбула
          - припливти до порту
      - label: "Старт або віддалення"
        items:
          - полетіти о сьомій
          - відлетіти від термінала
          - відпливти від причалу
      - label: "Вхід або вихід"
        items:
          - залетіти у кімнату
          - вилетіти з аеропорту
          - виплисти із затоки
      - label: "Перетин, транзит або коло"
        items:
          - перелетіти через гори
          - пролетіти над містом
          - переплисти річку
  - id: act-5
    type: error-correction
    title: Редактор польоту і води
    instruction: Виправте одну помилку в кожному реченні.
    items:
      - sentence: "Зараз я літаю до Варшави ранковим рейсом."
        error: літаю
        correction: "Зараз я лечу до Варшави ранковим рейсом."
        explanation: Зараз і один рейс потребують лечу.
      - sentence: "Вона летить до Праги щомісяця."
        error: летить
        correction: "Вона літає до Праги щомісяця."
        explanation: Щомісяця означає повторювані польоти.
      - sentence: "Літак їхав до Відня над Карпатами."
        error: їхав
        correction: "Літак летів до Відня над Карпатами."
        explanation: Літак у повітрі летить.
      - sentence: "Рейс прилітає з термінала D о сьомій."
        error: прилітає
        correction: "Рейс вилітає з термінала D о сьомій."
        explanation: З термінала D у розкладі - вилітає.
      - sentence: "Птах пролетів через річку і сів на іншому березі."
        error: пролетів
        correction: "Птах перелетів через річку і сів на іншому березі."
        explanation: Інший берег підказує перетин.
      - sentence: "Я плаваю до буйка зараз."
        error: плаваю
        correction: "Я пливу до буйка зараз."
        explanation: Зараз і один маршрут у воді - пливу.
      - sentence: "Діти пливуть у басейні щосуботи."
        error: пливуть
        correction: "Діти плавають у басейні щосуботи."
        explanation: Щосуботи означає регулярне заняття.
      - sentence: "Пором їде до острова."
        error: їде
        correction: "Пором пливе до острова."
        explanation: У цій темі водний транспорт пливе.
      - sentence: "Плавець хоче перепливти річку."
        error: перепливти
        correction: "Плавець хоче переплисти річку."
        explanation: Нормативний інфінітив - переплисти.
      - sentence: "Команда планує допливти до фінішу."
        error: допливти
        correction: "Команда планує доплисти до фінішу."
        explanation: Нормативний інфінітив - доплисти.
      - sentence: "Яхта має обпливти острів."
        error: обпливти
        correction: "Яхта має обплисти острів."
        explanation: Нормативний інфінітив - обплисти.
      - sentence: "Човен переплив повз маяк."
        error: переплив
        correction: "Човен проплив повз маяк."
        explanation: Повз орієнтир без зупинки - проплив.
workbook:
  - id: wb-1
    type: quiz
    title: Повітря чи вода?
    instruction: Оберіть природний варіант.
    items:
      - question: "Літак, що прибув із Лондона, ____."
        options:
          - прилетів
          - приплив
          - приїхав
        correct: 0
        explanation: Повітряне прибуття - прилетів.
      - question: "Корабель, що прибув до порту, ____."
        options:
          - приплив
          - прилетів
          - приїхав
        correct: 0
        explanation: Прибуття водою - приплив.
      - question: "Рейс, що вирушає з аеропорту, ____."
        options:
          - вилітає
          - випливає
          - виїжджає
        correct: 0
        explanation: З аеропорту рейс вилітає.
      - question: "Пором, що відходить від причалу, ____."
        options:
          - відпливає
          - відлітає
          - від'їжджає
        correct: 0
        explanation: Від причалу пором відпливає.
      - question: "Літак, що перетнув гори, ____."
        options:
          - перелетів через гори
          - пролетів повз гори
          - переплив гори
        correct: 0
        explanation: Через гори як перетин - перелетів.
      - question: "Човен, що перетнув затоку, ____."
        options:
          - переплив затоку
          - проплив повз затоку
          - перелетів затоку
        correct: 0
        explanation: Водний перетин - переплив.
      - question: "Дрон, що наблизився до вікна, ____."
        options:
          - підлетів
          - підплив
          - підійшов пішки
        correct: 0
        explanation: Наближення повітрям - підлетів.
      - question: "Човен, що наблизився до пристані, ____."
        options:
          - підплив
          - підлетів
          - підбіг
        correct: 0
        explanation: Наближення водою - підплив.
      - question: "Гелікоптер, що зробив коло навколо острова, ____."
        options:
          - облетів острів
          - обплив острів
          - обійшов пішки острів
        correct: 0
        explanation: Навколо повітрям - облетів.
      - question: "Яхта, що зробила коло навколо острова, ____."
        options:
          - обпливла острів
          - облетіла острів
          - оббігла острів
        correct: 0
        explanation: Навколо водою - обпливла.
      - question: "Птах, що минув вікно збоку, ____."
        options:
          - пролетів повз вікно
          - перелетів вікно
          - приплив до вікна
        correct: 0
        explanation: Повз орієнтир у повітрі - пролетів.
      - question: "Човен, що минув маяк без зупинки, ____."
        options:
          - проплив повз маяк
          - переплив маяк
          - прилетів до маяка
        correct: 0
        explanation: Повз орієнтир водою - проплив.
  - id: wb-2
    type: match-up
    title: Форми і значення
    instruction: Поєднайте форму з поясненням.
    pairs:
      - left: я лечу
        right: один політ зараз
      - left: я літаю
        right: звичні або повторювані польоти
      - left: він летів
        right: один політ у минулому
      - left: вони літали
        right: досвід або кілька польотів
      - left: я пливу
        right: один рух водою зараз
      - left: я плаваю
        right: вміння, заняття або рух у різних напрямках
      - left: човен плив
        right: один водний маршрут у минулому
      - left: діти плавали
        right: заняття або рух у різних напрямках у минулому
      - left: рейс вилітає
        right: розклад або відправлення з аеропорту
      - left: літак прилетів
        right: прибуття повітрям завершено
      - left: пором відплив
        right: віддалення від причалу завершено
      - left: човен приплив
        right: прибуття водою завершено
  - id: wb-3
    type: group-sort
    title: Сигнали вибору
    instruction: Розподіліть фрази за сигналом, який визначає дієслово.
    groups:
      - label: "Один маршрут"
        items:
          - зараз лечу до Праги
          - човен пливе до берега
          - літак летів над містом
      - label: "Звичка або повторення"
        items:
          - часто літає у відрядження
          - діти плавають щосуботи
          - пілот літає щодня
      - label: "Перетин"
        items:
          - перелетіти через гори
          - переплисти річку
          - перелетіти на інший бік
      - label: "Повз або навколо"
        items:
          - пролетіти повз вікно
          - проплисти повз маяк
          - обплисти острів
  - id: wb-4
    type: fill-in
    title: Маршрут літаком і поромом
    instruction: Заповніть пропуск правильною формою.
    items:
      - sentence: "Завтра ми ____ до Стамбула ранковим рейсом. (летіти)"
        answer: летимо
        options:
          - летимо
          - літаємо
          - пливемо
        explanation: Один запланований рейс - летимо.
      - sentence: "Рейс ____ з Києва о сьомій. (вилітати)"
        answer: вилітає
        options:
          - вилітає
          - вилетів
          - прилітає
        explanation: Розклад рейсу - вилітає.
      - sentence: "Літак ____ через гори перед посадкою. (перелетіти)"
        answer: перелетів
        options:
          - перелетів
          - пролетів
          - переплив
        explanation: Через гори як перетин - перелетів.
      - sentence: "Дрон ____ повз вікно і зник. (пролетіти)"
        answer: пролетів
        options:
          - пролетів
          - перелетів
          - прилетів
        explanation: Повз вікно - пролетів.
      - sentence: "Після обіду пором ____ від причалу. (відпливти)"
        answer: відплив
        options:
          - відплив
          - відлетів
          - від'їхав
        explanation: Від причалу водою - відплив.
      - sentence: "Човен ____ до острова за пів години. (доплисти)"
        answer: доплив
        options:
          - доплив
          - допливти
          - долетів
        explanation: Минулий час - доплив; інфінітив був би доплисти.
      - sentence: "Плавець хоче ____ річку. (переплисти)"
        answer: переплисти
        options:
          - переплисти
          - перепливти
          - проплисти повз
        explanation: Нормативний інфінітив - переплисти.
      - sentence: "Яхта має ____ острів до заходу сонця. (обплисти)"
        answer: обплисти
        options:
          - обплисти
          - обпливти
          - облетіти
        explanation: Нормативний інфінітив - обплисти.
      - sentence: "Качка ____ до дітей біля берега. (підплисти)"
        answer: підпливла
        options:
          - підпливла
          - підлетіла
          - підійшла
        explanation: Наближення водою - підпливла.
      - sentence: "Метелик ____ у кімнату через відчинене вікно. (залетіти)"
        answer: залетів
        options:
          - залетів
          - заплив
          - зайшов
        explanation: Потрапив усередину повітрям - залетів.
      - sentence: "Човен ____ із туману біля берега. (виплисти)"
        answer: виплив
        options:
          - виплив
          - вилетів
          - виїхав
        explanation: З'явився з туману на воді - виплив.
      - sentence: "Вона добре ____ і тренується щодня. (плавати)"
        answer: плаває
        options:
          - плаває
          - пливе
          - летить
        explanation: Вміння і регулярне тренування - плаває.
  - id: wb-5
    type: cloze
    title: Подорож через море
    instruction: Заповніть пропуски правильними формами.
    text: "Вранці наш рейс {1} з Києва. Спочатку літак {2} над Карпатами, потім {3} через хмари і нарешті {4} до Стамбула. Після короткої пересадки ми поїхали в порт. Пором {5} від причалу, повільно {6} до протоки, {7} повз маяк і {8} протоку на інший берег. Біля острова він {9} скелю, а потім {10} до пристані. Увечері діти не просто {11} до берега, а довго {12} у басейні готелю."
