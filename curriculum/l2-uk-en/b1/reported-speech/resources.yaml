- title: Заболотний Grade 9, §4
  role: textbook
  notes: Визначення прямої й непрямої мови, слова автора, базові перетворення та пунктуаційні схеми для чужого мовлення.
- title: Заболотний Grade 9, p.27
  role: textbook
  notes: Перетворення прямої мови на непряму, вибір що, щоб, чи та зміна займенників у переказі.
- title: Авраменко Grade 5, §79-80
  role: textbook
  notes: Початкове пояснення прямої мови, діалогу й розділових знаків, адаптоване тут для B1-практики.
- title: Заболотний Grade 11, Пунктуаційна норма
  role: textbook
  notes: Пунктуація прямої мови й діалогу, зокрема репліки з нового рядка та тире в діалогічному записі.
