version: '1.0'
module: reported-speech
level: b1
inline:
  - id: act-1
    type: quiz
    title: Схеми прямої мови
    instruction: Обери правильну схему або розділовий знак.
    items:
      - question: 'Яка схема відповідає реченню «Марко сказав: «Я прийду»»?'
        options:
          - "А: «П»."
          - "«П», — а."
          - "«П, — а, — п»."
        correct: 0
        explanation: Слова автора стоять перед прямою мовою, тому після них двокрапка.
      - question: Який знак стоїть після слів автора перед прямою мовою?
        options:
          - двокрапка
          - крапка з комою
          - дефіс
        correct: 0
        explanation: 'У схемі А: «П». після слів автора ставимо двокрапку.'
      - question: Який варіант правильно оформлює слова автора після прямої мови?
        options:
          - "«Я зачекаю», — сказала Олена."
          - "«Я зачекаю.» — сказала Олена."
          - "«Я зачекаю» сказала Олена."
        correct: 0
        explanation: Для розповідної прямої мови перед словами автора потрібні кома й тире.
      - question: У реченні «Ти прийдеш?» — запитала вона. чому немає коми перед тире?
        options:
          - бо знак питання уже стоїть у прямій мові
          - бо після питання тире не потрібне
          - бо слова автора пишуться з великої літери
        correct: 0
        explanation: Після знака питання або оклику кому перед тире не додаємо.
  - id: act-2
    type: group-sort
    title: Що, щоб, чи або питальне слово
    instruction: Розподіли репліки за тим, як вони переходять у непряму мову.
    groups:
      - label: що
        items:
          - "Він сказав: «Я знаю адресу»."
          - "Вона пояснила: «Зустріч починається о десятій»."
      - label: щоб
        items:
          - "Мама попросила: «Зателефонуй мені»."
          - "Тренер сказав: «Повторіть вправу»."
      - label: чи
        items:
          - "Олена запитала: «Ти маєш час?»"
          - "Марко поцікавився: «Ви вже готові?»"
      - label: питальне слово
        items:
          - "Він запитав: «Де зупинка?»"
          - "Вона поцікавилася: «Коли початок?»"
  - id: act-3
    type: fill-in
    title: Перетвори точку зору
    instruction: Обери природний варіант для непрямої мови.
    items:
      - sentence: "Ірина сказала: «Я готова». → Ірина сказала, що ____ готова."
        answer: вона
        options:
          - вона
          - я
          - ти
        explanation: Слова Ірини переказує інша людина, тому я стає вона.
      - sentence: "Олег сказав: «Це мій квиток». → Олег сказав, що це ____ квиток."
        answer: його
        options:
          - його
          - мій
          - їхній
        explanation: Квиток належить Олегові, тому мій стає його.
      - sentence: "Вона сказала: «Зустрінемося тут». → Вона сказала, що зустрінемося ____."
        answer: там
        options:
          - там
          - тут
          - сюди
        explanation: У переказі місце часто змінюється з тут на там.
      - sentence: "Він додав: «Завтра надішлю файл». → Він додав, що надішле файл ____."
        answer: наступного дня
        options:
          - наступного дня
          - завтра
          - учора
        explanation: У переказі завтра часто стає наступного дня.
  - id: act-4
    type: error-correction
    title: Редагуємо кальки
    instruction: Знайди помилку й запиши природний український варіант.
    items:
      - sentence: "Вона запитала, якщо я прийду."
        error: "якщо в непрямому питанні"
        correction: "Вона запитала, чи я прийду."
        explanation: Непряме питання так/ні потребує чи, а не якщо.
      - sentence: "\"Я прийду,\" сказала вона."
        error: "англійська пунктуація й лапки"
        correction: "«Я прийду», — сказала вона."
        explanation: В українській прямій мові використовуємо « » і кому з тире перед словами автора.
      - sentence: "Учитель сказав нам читати текст."
        error: "калька з інфінітивом після дієслова мовлення"
        correction: "Учитель сказав, щоб ми читали текст."
        explanation: Прохання або наказ у непрямій мові передаємо через щоб.
      - sentence: "Олена сказала, що вона була втомлена, хоча говорила про теперішній стан."
        error: "механічний англійський зсув часу"
        correction: "Олена сказала, що вона втомлена."
        explanation: Українська форма має відповідати змісту, а не механічному зсуву часу.
  - id: act-5
    type: match-up
    title: Пряма і непряма пара
    instruction: Поєднай пряму мову з природним переказом.
    pairs:
      - left: "«Я прийду о шостій», — сказала Олена."
        right: "Олена сказала, що вона прийде о шостій."
      - left: "Марко запитав: «Ти маєш ключ?»"
        right: "Марко запитав, чи я маю ключ."
      - left: "Мама попросила: «Зачекай мене біля входу»."
        right: "Мама попросила, щоб я зачекав її біля входу."
      - left: "Викладач запитав: «Де ваші нотатки?»"
        right: "Викладач запитав, де наші нотатки."
      - left: "Ірина додала: «Завтра буде зустріч»."
        right: "Ірина додала, що наступного дня буде зустріч."
      - left: "Тренер сказав: «Повторіть вправу»."
        right: "Тренер сказав, щоб команда повторила вправу."
  - id: act-6
    type: quiz
    title: Діалог або переказ
    instruction: Вибери найкраще рішення для короткого тексту.
    items:
      - question: Коли варто залишити пряму мову?
        options:
          - коли важлива точна фраза або емоція мовця
          - коли треба приховати, хто говорив
          - коли треба прибрати всі розділові знаки
        correct: 0
        explanation: Пряма мова дає голос і точну форму репліки.
      - question: Коли доречна непряма мова?
        options:
          - коли важливий лише зміст розмови
          - коли треба записати кожне слово дослівно
          - коли репліку треба почати з тире
        correct: 0
        explanation: Непряма мова стисло переказує зміст.
      - question: Що робимо з кожною новою реплікою в українському діалозі?
        options:
          - починаємо з нового рядка й тире
          - беремо кожну репліку в англійські лапки
          - пишемо всі репліки в одному рядку без тире
        correct: 0
        explanation: Типовий письмовий діалог оформлюємо тире з нового рядка.
      - question: Яке речення є непрямою мовою?
        options:
          - "Олена сказала, що має лише годину."
          - "Олена сказала: «Я маю лише годину»."
          - "— Я маю лише годину, — сказала Олена."
        correct: 0
        explanation: Непряма мова передає зміст без лапок і прямої цитати.
workbook:
  - id: wb-1
    type: quiz
    title: Розпізнай чуже мовлення
    instruction: Визнач, що подано в реченні.
    items:
      - question: "Марко сказав: «Я повернуся ввечері»."
        options:
          - пряма мова
          - непряма мова
          - діалог без слів автора
        correct: 0
        explanation: Чужі слова передано дослівно в лапках.
      - question: "Марко сказав, що повернеться ввечері."
        options:
          - непряма мова
          - пряма мова
          - звертання
        correct: 0
        explanation: Зміст передано через складне речення зі сполучником що.
      - question: "— Ти прийдеш? — запитала Олена."
        options:
          - діалогічна репліка
          - непряма мова
          - називне речення
        correct: 0
        explanation: Репліка починається з тире й має слова автора.
      - question: "Вона попросила, щоб я зачекав біля входу."
        options:
          - непряме прохання
          - точна цитата
          - авторська ремарка без репліки
        correct: 0
        explanation: Прохання передано через щоб.
  - id: wb-2
    type: fill-in
    title: Заміна часу й місця
    instruction: Встав природну форму для непрямої мови.
    items:
      - sentence: "Він сказав: «Я зараз у дорозі». → Він сказав, що ____ у дорозі."
        answer: тоді
        options:
          - тоді
          - зараз
          - тут
        explanation: У переказі зараз часто стає тоді.
      - sentence: "Вона сказала: «Сьогодні збори». → Вона сказала, що ____ збори."
        answer: того дня
        options:
          - того дня
          - учора
          - тут
        explanation: Сьогодні у переказі часто стає того дня.
      - sentence: "Олег пояснив: «Я бачив це вчора». → Олег пояснив, що бачив це ____."
        answer: напередодні
        options:
          - напередодні
          - наступного дня
          - тоді
        explanation: Вчора переходить у напередодні.
      - sentence: "Ірина додала: «Завтра буде дедлайн». → Ірина додала, що дедлайн буде ____."
        answer: наступного дня
        options:
          - наступного дня
          - напередодні
          - того дня
        explanation: Завтра в переказі часто стає наступного дня.
  - id: wb-3
    type: match-up
    title: Дієслово мовлення і функція
    instruction: Поєднай дієслово мовлення з типовою функцією.
    pairs:
      - left: сказав
        right: передав повідомлення
      - left: запитала
        right: поставила питання
      - left: відповів
        right: відреагував на питання
      - left: пояснила
        right: зробила зміст яснішим
      - left: додав
        right: приєднав ще одну думку
      - left: попросила
        right: ввічливо спонукала до дії
      - left: поцікавився
        right: запитав м'якше або обережніше
      - left: зауважила
        right: звернула увагу на деталь
  - id: wb-4
    type: error-correction
    title: Віднови пунктуацію прямої мови
    instruction: Виправ речення з прямою мовою.
    items:
      - sentence: "Олена сказала «Я готова»."
        error: "немає двокрапки після слів автора"
        correction: "Олена сказала: «Я готова»."
        explanation: Перед прямою мовою після слів автора ставимо двокрапку.
      - sentence: "«Я готова» сказала Олена."
        error: "немає коми й тире перед словами автора"
        correction: "«Я готова», — сказала Олена."
        explanation: У схемі «П», — а потрібні кома й тире.
      - sentence: "«Ти готовий», — запитала Олена?"
        error: "питальний знак стоїть не в прямій мові"
        correction: "«Ти готовий?» — запитала Олена."
        explanation: Знак питання належить прямій мові й стоїть перед закритими лапками.
      - sentence: "Марко сказав: «Я прийду, — і зачинив двері»."
        error: "слова автора після прямої мови мають стояти за лапками"
        correction: "Марко сказав: «Я прийду», — і зачинив двері."
        explanation: 'У схемі А: «П», — а продовження слів автора стоїть після лапок.'
  - id: wb-5
    type: group-sort
    title: Тип репліки
    instruction: Розподіли репліки за типом перетворення.
    groups:
      - label: повідомлення
        items:
          - "«Я знаю відповідь»."
          - "«Зустріч починається о дев'ятій»."
      - label: прохання або наказ
        items:
          - "«Почекай мене біля входу»."
          - "«Надішліть файл сьогодні»."
      - label: питання так/ні
        items:
          - "«Ти вже читав текст?»"
          - "«Ви маєте квитки?»"
      - label: питання з питальним словом
        items:
          - "«Куди ми йдемо?»"
          - "«Скільки це коштує?»"
  - id: wb-6
    type: cloze
    title: Переказ розмови
    instruction: Заповни пропуски в переказі короткого діалогу.
    text: "Олена запитала Марка, {{1}} він уже знайшов статтю. Марко відповів, {{2}} знайшов два тексти, але ще не прочитав {{3}}. Олена попросила, {{4}} він надіслав їй посилання {{5}}. Марко додав, що зробить це {{6}}, бо зараз він не вдома."
    blanks:
      - id: 1
        answer: чи
        options:
          - чи
          - якщо
          - що
      - id: 2
        answer: що
        options:
          - що
          - щоб
          - чи
      - id: 3
        answer: їх
        options:
          - їх
          - його
          - її
      - id: 4
        answer: щоб
        options:
          - щоб
          - що
          - якщо
      - id: 5
        answer: того дня
        options:
          - того дня
          - вчора
          - тут
      - id: 6
        answer: наступного дня
        options:
          - наступного дня
          - напередодні
          - зараз
  - id: wb-7
    type: translate
    title: Передай зміст українською
    instruction: Обери природний український переказ.
    items:
      - source: "She said, 'I will call tomorrow.'"
        options:
          - text: "Вона сказала, що зателефонує наступного дня."
            correct: true
          - text: "Вона сказала, якщо зателефонує завтра."
            correct: false
        explanation: Повідомлення передаємо через що, а завтра в переказі часто стає наступного дня.
      - source: "He asked if I had time."
        options:
          - text: "Він запитав, чи я маю час."
            correct: true
          - text: "Він запитав, якщо я маю час."
            correct: false
        explanation: У непрямому питанні if відповідає українському чи.
      - source: "The teacher told us to open the books."
        options:
          - text: "Учитель сказав, щоб ми відкрили підручники."
            correct: true
          - text: "Учитель сказав нас відкрити підручники."
            correct: false
        explanation: Українське непряме спонукання передаємо через щоб.
      - source: "Oksana asked, 'Where do you live?'"
        options:
          - text: "Оксана запитала, де я живу."
            correct: true
          - text: "Оксана запитала, чи де я живу."
            correct: false
        explanation: Питальне слово де саме вводить непряме питання.
  - id: wb-8
    type: match-up
    title: Віднови пряму мову
    instruction: Поєднай переказ із можливою прямою мовою.
    pairs:
      - left: "Олена сказала, що вона готова."
        right: "Олена сказала: «Я готова»."
      - left: "Марко запитав, чи я маю час."
        right: "Марко запитав: «Ти маєш час?»"
      - left: "Мама попросила, щоб я зачекав її."
        right: "Мама попросила: «Зачекай мене»."
      - left: "Викладач запитав, куди ми йдемо."
        right: "Викладач запитав: «Куди ви йдете?»"
      - left: "Ірина додала, що прийде наступного дня."
        right: "Ірина додала: «Я прийду завтра»."
      - left: "Тренер сказав, щоб команда повторила вправу."
        right: "Тренер сказав: «Повторіть вправу»."
  - id: wb-9
    type: quiz
    title: Оформи діалог
    instruction: Обери правильно оформлену репліку.
    items:
      - question: Який варіант правильно починає нову репліку в діалозі?
        options:
          - "— Ти вже готовий? — запитала Олена."
          - "«— Ти вже готовий?» — запитала Олена."
          - "\"Ти вже готовий?\" запитала Олена."
        correct: 0
        explanation: Діалогічна репліка починається з тире без лапок.
      - question: Який варіант правильно передає відповідь зі словами автора?
        options:
          - "— Так, — відповів Марко."
          - "— Так. — відповів Марко."
          - "— Так відповів Марко."
        correct: 0
        explanation: Якщо слова автора стоять після розповідної репліки, потрібні кома й тире.
      - question: Який варіант правильно оформлює оклик?
        options:
          - "— Чудово! — сказала вона."
          - "— Чудово, — сказала вона!"
          - "— Чудово! сказала вона."
        correct: 0
        explanation: Знак оклику залишається в репліці перед тире.
      - question: Який варіант доречно поєднує репліку й ремарку?
        options:
          - "— Я не впевнена, — Олена поглянула на нотатки."
          - "— Я не впевнена, — сказала Олена невпевнено."
          - "— Я не впевнена. Олена."
        correct: 0
        explanation: Ремарка додає дію й не дублює слово не впевнена.
  - id: wb-10
    type: essay-response
    title: Коротка розповідь із розмовою
    instruction: Напиши 8-10 речень про розмову з другом, колегою або викладачем. Використай щонайменше дві прямі репліки, два приклади непрямої мови й один короткий діалог із тире.
    min_words: 80
    prompt: Згадай коротку розмову про навчання, подорож, зустріч або роботу. Передай частину слів дослівно, а частину стисло переказуй.
    evaluation_criteria:
      - Є щонайменше дві прямі репліки з правильною пунктуацією.
      - Є щонайменше два приклади непрямої мови зі що, щоб, чи або питальним словом.
      - У короткому діалозі кожна репліка починається з тире.
