version: '1.0'
module: restaurant-and-food
level: b1
inline:
  - id: act-1
    type: quiz
    title: Страви і меню
    instruction: Оберіть найприродніший варіант для ресторанної ситуації.
    items:
      - question: Що найточніше означає "перша страва" в українському меню?
        options:
          - суп або інша страва на початку обіду
          - будь-який десерт
          - рахунок після вечері
        correct: 0
        explanation: Перша страва зазвичай означає суп або близьку гарячу страву на початку обіду.
      - question: Яке словосполучення природне для борщу?
        options:
          - борщ із пампушками
          - борщ на пампушки
          - борщ до пампушок
        correct: 0
        explanation: Додаток до страви часто вводимо через з/із + орудний відмінок.
      - question: Що таке узвар?
        options:
          - напій із сухофруктів
          - гострий соус
          - вид вареників
        correct: 0
        explanation: Узвар - традиційний напій із сухофруктів.
      - question: Яке слово невідмінюване?
        options:
          - меню
          - страва
          - офіціант
        correct: 0
        explanation: Меню не змінюється за відмінками.
      - question: Яка фраза найкраще підходить для ввічливого замовлення?
        options:
          - Принесіть, будь ласка, вареники.
          - Дай мені вареники негайно.
          - Вареники мені швидко.
        correct: 0
        explanation: Принесіть, будь ласка - нейтральна ввічлива формула.
      - question: Яка форма правильно показує родовий частковий?
        options:
          - тарілка борщу
          - тарілка борщ
          - тарілка борщем
        correct: 0
        explanation: "Після слова тарілка потрібен родовий відмінок: борщу."
      - question: Що виражає "Замовлю каву"?
        options:
          - прямий додаток у знахідному відмінку
          - місце дії
          - часткове значення
        correct: 0
        explanation: Замовити що? каву - знахідний відмінок.
      - question: Яке питання природне до офіціанта?
        options:
          - Що ви порадите на друге?
          - Що ви радите у другий?
          - Що радити друге?
        correct: 0
        explanation: Що ви порадите на друге? - природна формула для вибору головної страви.
  - id: act-2
    type: match-up
    title: Фраза і ситуація
    instruction: Поєднайте ресторанну фразу з ситуацією, де вона звучить природно.
    pairs:
      - left: У вас є вільний столик?
        right: запитати про місце в ресторані
      - left: Принесіть, будь ласка, меню.
        right: попросити список страв
      - left: Що ви порадите на перше?
        right: попросити рекомендацію щодо супу
      - left: Мені, будь ласка, вареники з картоплею.
        right: зробити конкретне замовлення
      - left: А це з чим подається?
        right: уточнити додаток або начинку
      - left: Без сметани, будь ласка.
        right: попросити прибрати інгредієнт
      - left: Можна рахунок?
        right: завершити обід і перейти до оплати
      - left: Чи можна оплатити карткою?
        right: уточнити спосіб оплати
  - id: act-3
    type: fill-in
    title: Відмінок у замовленні
    instruction: Вставте форму, яка найкраще пасує до ресторанної фрази.
    items:
      - sentence: "Замовлю ____ із пампушками."
        answer: борщ
        options:
          - борщ
          - борщу
          - борщем
        explanation: Замовлю що? борщ - знахідний відмінок, форма як називний.
      - sentence: "Принесіть тарілку ____."
        answer: борщу
        options:
          - борщу
          - борщ
          - борщем
        explanation: Тарілку чого? борщу - родовий відмінок.
      - sentence: "Мені, будь ласка, ____ з картоплею."
        answer: вареники
        options:
          - вареники
          - вареників
          - варениками
        explanation: "У замовленні маємо прямий додаток: вареники."
      - sentence: "Порція ____ була велика."
        answer: вареників
        options:
          - вареників
          - вареники
          - варениками
        explanation: Порція чого? вареників - родовий множини.
      - sentence: "Деруни подають зі ____."
        answer: сметаною
        options:
          - сметаною
          - сметани
          - сметану
        explanation: З чим? зі сметаною - орудний відмінок.
      - sentence: "Замовлю ____ без цукру."
        answer: каву
        options:
          - каву
          - кави
          - кавою
        explanation: Замовлю що? каву - знахідний відмінок.
      - sentence: "Дайте трохи ____ до чаю."
        answer: меду
        options:
          - меду
          - мед
          - медом
        explanation: Трохи чого? меду - частковий родовий.
      - sentence: "Чай подайте із ____."
        answer: цукром
        options:
          - цукром
          - цукру
          - цукор
        explanation: Із чим? із цукром - орудний відмінок.
  - id: act-4
    type: group-sort
    title: Полички меню
    instruction: Розподіліть слова й фрази за ресторанними категоріями.
    groups:
      - label: Перші страви
        items:
          - борщ
          - зелений борщ
          - юшка
          - капусняк
      - label: Другі страви
        items:
          - вареники
          - деруни
          - голубці
          - галушки
      - label: Напої
        items:
          - узвар
          - компот
          - кава
          - чай
      - label: Ресторанні фрази
        items:
          - Що ви порадите?
          - Можна рахунок?
          - Без сметани, будь ласка.
          - Чи можна оплатити карткою?
  - id: act-5
    type: error-correction
    title: Редагуємо ресторанну фразу
    instruction: Знайдіть помилку й подайте природний український варіант.
    items:
      - sentence: "Я хочу замовити тарілка борщ."
        error: тарілка борщ
        correction: тарілку борщу
        error_type: phrase
        explanation: Після замовити потрібен знахідний тарілку, а після тарілку - родовий борщу.
      - sentence: "Принесіть мені склянка узвар."
        error: склянка узвар
        correction: склянку узвару
        error_type: phrase
        explanation: Принесіть що? склянку; склянку чого? узвару.
      - sentence: "Деруни з сметану були смачні."
        error: з сметану
        correction: зі сметаною
        error_type: phrase
        explanation: Зі сметаною відповідає на питання з чим?
      - sentence: "Я візьму вареників з картоплею."
        error: вареників
        correction: вареники
        error_type: word
        explanation: Візьму що? вареники - знахідний відмінок.
      - sentence: "Дайте каву, будь ласка, трохи."
        error: Дайте каву, будь ласка, трохи
        correction: Дайте трохи кави, будь ласка
        error_type: construction
        explanation: Для часткового значення природно трохи кави.
      - sentence: "Що ви радите на першу?"
        error: на першу
        correction: на перше
        error_type: phrase
        explanation: У ресторанній формулі кажемо на перше, на друге, на десерт.
      - sentence: "Можна рахунку?"
        error: рахунку
        correction: рахунок
        error_type: word
        explanation: У проханні Можна рахунок? слово стоїть у знахідному відмінку.
      - sentence: "У меню немає свіжу рибу."
        error: свіжу рибу
        correction: свіжої риби
        error_type: phrase
        explanation: Після немає потрібен родовий відмінок.
workbook:
  - id: wb-1
    type: quiz
    title: Українська кухня і меню
    instruction: Оберіть правильний варіант або пояснення.
    items:
      - question: Яка страва найчастіше належить до перших страв?
        options:
          - борщ
          - деруни
          - млинці з варенням
        correct: 0
        explanation: Борщ - типова перша страва.
      - question: Яке словосполучення правильно описує вареники?
        options:
          - вареники з картоплею
          - вареники на картоплю
          - вареники від картоплі
        correct: 0
        explanation: Начинку або додаток часто вводимо через з + орудний.
      - question: Яка форма потрібна після слова "порція"?
        options:
          - родовий відмінок
          - кличний відмінок
          - місцевий відмінок
        correct: 0
        explanation: Порція чого? вареників, дерунів, салату.
      - question: Який варіант природний у ресторані?
        options:
          - Я б хотіла замовити узвар.
          - Я була хотіла замовити узвар.
          - Я би замовляла узвару.
        correct: 0
        explanation: Я б хотіла замовити - ввічлива формула.
      - question: У якій фразі є родовий частковий?
        options:
          - Налийте узвару.
          - Замовлю узвар.
          - Узвар холодний.
        correct: 0
        explanation: Налийте узвару означає певну кількість напою.
      - question: Яка форма правильна в меню?
        options:
          - млинці з м'ясом
          - млинці з м'ясо
          - млинці м'ясом
        correct: 0
        explanation: З м'ясом - орудний відмінок після з.
      - question: Яке слово вживається тільки у множині?
        options:
          - чайові
          - рахунок
          - тарілка
        correct: 0
        explanation: Чайові - множинний іменник.
      - question: Який варіант точніше передає культурну довідку?
        options:
          - Ukrainian borshch cooking culture is on the UNESCO Urgent Safeguarding List.
          - Every recipe for borshch is protected by UNESCO.
          - UNESCO lists all Ukrainian dishes as one element.
        correct: 0
        explanation: Точно говоримо про Ukrainian borshch cooking culture, а не про кожну страву окремо.
  - id: wb-2
    type: fill-in
    title: Родовий частковий
    instruction: Вставте форму родового відмінка там, де йдеться про кількість або частину.
    items:
      - sentence: "Принесіть тарілку ____."
        answer: борщу
        options:
          - борщу
          - борщ
          - борщем
        explanation: Тарілку чого? борщу.
      - sentence: "Я хочу склянку ____."
        answer: узвару
        options:
          - узвару
          - узвар
          - узваром
        explanation: Склянку чого? узвару.
      - sentence: "Дайте шматок ____."
        answer: хліба
        options:
          - хліба
          - хліб
          - хлібом
        explanation: Шматок чого? хліба.
      - sentence: "Покладіть трохи ____."
        answer: сметани
        options:
          - сметани
          - сметану
          - сметаною
        explanation: Трохи чого? сметани.
      - sentence: "Додайте ложку ____."
        answer: меду
        options:
          - меду
          - мед
          - медом
        explanation: Ложку чого? меду.
      - sentence: "У нас немає свіжої ____."
        answer: риби
        options:
          - риби
          - рибу
          - рибою
        explanation: Після немає потрібен родовий відмінок.
      - sentence: "Порція ____ коштує сто двадцять гривень."
        answer: дерунів
        options:
          - дерунів
          - деруни
          - дерунами
        explanation: Порція чого? дерунів.
      - sentence: "До чаю можна трохи ____."
        answer: цукру
        options:
          - цукру
          - цукор
          - цукром
        explanation: Трохи чого? цукру.
      - sentence: "На тарілці було кілька ____."
        answer: галушок
        options:
          - галушок
          - галушки
          - галушками
        explanation: Кілька чого? галушок.
      - sentence: "До борщу принесли кілька ____."
        answer: пампушок
        options:
          - пампушок
          - пампушки
          - пампушками
        explanation: Кілька чого? пампушок.
  - id: wb-3
    type: match-up
    title: Кількість і форма
    instruction: Поєднайте кількісний вислів із правильною формою.
    pairs:
      - left: тарілка
        right: борщу
      - left: склянка
        right: узвару
      - left: шматок
        right: сала
      - left: ложка
        right: меду
      - left: порція
        right: вареників
      - left: кілька
        right: пампушок
      - left: трохи
        right: сметани
      - left: немає
        right: кави
      - left: багато
        right: овочів
      - left: менше
        right: солі
  - id: wb-4
    type: group-sort
    title: Відмінкові полички
    instruction: Розподіліть фрази за тим, який відмінок тренує виділене слово.
    groups:
      - label: Родовий частковий
        items:
          - тарілка борщу
          - склянка узвару
          - трохи сметани
          - шматок хліба
      - label: Знахідний для замовлення
        items:
          - замовлю борщ
          - візьму каву
          - принесіть салат
          - хочу вареники
      - label: Орудний після з/із/зі
        items:
          - з картоплею
          - із цукром
          - зі сметаною
          - з м'ясом
      - label: Невідмінювані слова
        items:
          - меню
          - кафе
          - у меню
          - біля кафе
  - id: wb-5
    type: error-correction
    title: Виправляємо відмінки і кальки
    instruction: Подайте природну нормативну фразу.
    items:
      - sentence: "Я замовлю борщу і кави."
        error: борщу і кави
        correction: борщ і каву
        error_type: phrase
        explanation: Після замовлю потрібен знахідний відмінок.
      - sentence: "Принесіть мені тарілка борщ."
        error: тарілка борщ
        correction: тарілку борщу
        error_type: phrase
        explanation: Принесіть що? тарілку; тарілку чого? борщу.
      - sentence: "Вареники з картопля були холодні."
        error: з картопля
        correction: з картоплею
        error_type: phrase
        explanation: З чим? з картоплею.
      - sentence: "Чай із цукру вже стоїть на столі."
        error: із цукру
        correction: із цукром
        error_type: phrase
        explanation: У значенні додатку до напою потрібен орудний відмінок.
      - sentence: "Покладіть сметану трохи."
        error: сметану трохи
        correction: трохи сметани
        error_type: phrase
        explanation: Кількість ставимо перед словом, а іменник має родовий відмінок.
      - sentence: "На перший я хочу борщ."
        error: На перший
        correction: На перше
        error_type: phrase
        explanation: У меню кажемо на перше, на друге, на десерт.
      - sentence: "Це меню дуже довга."
        error: довга
        correction: довге
        error_type: word
        explanation: Меню - середнього роду і невідмінюване слово.
      - sentence: "Я залишив чайовий."
        error: чайовий
        correction: чайові
        error_type: word
        explanation: У значенні tip вживаємо множинний іменник чайові.
      - sentence: "Що ви порадите на другий?"
        error: на другий
        correction: на друге
        error_type: phrase
        explanation: "Ресторанна формула має середній рід: на друге."
      - sentence: "У кафеї немає вільних столиків."
        error: У кафеї
        correction: У кафе
        error_type: word
        explanation: "Кафе невідмінюване: у кафе."
  - id: wb-6
    type: true-false
    title: З/із/зі + орудний
    instruction: Визначте, чи твердження правильне.
    items:
      - statement: "У фразі вареники з картоплею слово картоплею стоїть в орудному відмінку."
        correct: true
        explanation: З чим? з картоплею.
      - statement: "Правильно: деруни зі сметаною."
        correct: true
        explanation: Зі сметаною - милозвучний варіант перед збігом приголосних.
      - statement: "У фразі чай із цукром слово цукром стоїть у родовому відмінку."
        correct: false
        explanation: Цукром - орудний відмінок.
      - statement: "З/із/зі можуть змінюватися через милозвучність."
        correct: true
        explanation: Вибір форми залежить від звуків навколо.
      - statement: "Після з у значенні додатку до їжі зазвичай потрібен орудний відмінок."
        correct: true
        explanation: З чим? з м'ясом, із сиром, зі сметаною.
      - statement: "Правильно: борщ із пампушками."
        correct: true
        explanation: Пампушками - орудний множини.
      - statement: "Фраза млинці з м'ясом означає, що м'ясо є начинкою або додатком."
        correct: true
        explanation: Це природне значення конструкції.
      - statement: "У фразі кава з молоком слово молоком стоїть у знахідному відмінку."
        correct: false
        explanation: Молоком - орудний відмінок.
      - statement: "Зі спеціями і зі сметаною звучать природно."
        correct: true
        explanation: Зі допомагає уникнути важкого збігу.
      - statement: "Правильно: вареники з картоплю."
        correct: false
        explanation: Потрібно з картоплею.
  - id: wb-7
    type: cloze
    title: Діалог у ресторані
    instruction: Вставте форми, які роблять діалог природним.
    blanks:
      - id: 1
        answer: столик
        options:
          - столик
          - столику
          - столиком
      - id: 2
        answer: меню
        options:
          - меню
          - менюю
          - менюом
      - id: 3
        answer: перше
        options:
          - перше
          - перший
          - першому
      - id: 4
        answer: борщ
        options:
          - борщ
          - борщу
          - борщем
      - id: 5
        answer: пампушками
        options:
          - пампушками
          - пампушок
          - пампушки
      - id: 6
        answer: вареники
        options:
          - вареники
          - вареників
          - варениками
      - id: 7
        answer: картоплею
        options:
          - картоплею
          - картоплі
          - картоплю
      - id: 8
        answer: узвару
        options:
          - узвару
