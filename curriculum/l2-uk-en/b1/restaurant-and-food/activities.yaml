  - id: wb-11
    type: essay-response
    title: Відгук про ресторан
    instruction: Напишіть короткий відгук із потрібними відмінками.
    prompt: "Опишіть обід або вечерю в українському ресторані. Обов'язково напишіть, що ви замовили у знахідному відмінку, з чим подавалася страва в орудному відмінку, і яку кількість їжі чи напою отримали в родовому відмінку. Використайте щонайменше шість слів із теми меню."
    min_words: 90
    model_answer: "Учора ми вечеряли в невеликому ресторані біля центру. Спочатку я замовив борщ із пампушками, а подруга взяла вареники з картоплею та сметаною. Офіціант приніс тарілку борщу, склянку узвару і шматок хліба. Борщ був гарячий, трохи кислий і дуже смачний. Вареники подавалися зі сметаною, тому смак був м'який і домашній. На десерт ми взяли млинці з вишнями. Наприкінці попросили рахунок і залишили чайові, бо обслуговування було уважне."
    rubric:
      - criteria: Знахідний відмінок
        description: Правильно називає те, що замовили або взяли.
        points: 3
      - criteria: Родовий частковий
        description: Використовує форми на зразок тарілку борщу, склянку узвару, шматок хліба.
        points: 3
      - criteria: Орудний із з/із/зі
        description: Природно описує додатки до страв через з/із/зі + орудний.
        points: 2
      - criteria: Лексика і зв'язність
        description: Використовує тематичну лексику меню, смаку й обслуговування у зв'язному тексті.
        points: 2
