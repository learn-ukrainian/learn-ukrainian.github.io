objectives:
  - Будувати зв'язну українську розповідь із зачином, розвитком подій, кульмінацією і кінцівкою.
  - Чергувати недоконаний аспект для тла і доконаний аспект для завершених подій.
  - Використовувати префіксальні дієслова руху, пряму мову і описові звороти в короткому наративі.
  - Редагувати чернетку за структурою, дієсловами, зв'язками і природністю української мови.
grammar:
