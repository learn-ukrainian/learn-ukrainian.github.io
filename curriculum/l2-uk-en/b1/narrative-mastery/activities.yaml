version: '1.0'
module: narrative-mastery
level: b1
inline:
- id: act-1
  type: order
  title: Послідовність розповіді
  instruction: Розташуйте етапи так, щоб вийшла логічна сюжетна дуга.
  items:
  - Зачин вводить місце, час і персонажа.
  - Зав'язка запускає подію або несподіванку.
  - Розвиток подій показує кілька кроків ситуації.
  - Кульмінація створює найнапруженіший момент.
  - Розв'язка показує, як ситуація завершилася.
  - Кінцівка дає короткий післясмак або висновок.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
- id: act-2
  type: fill-in
  title: Тло чи подія
  instruction: Оберіть форму, яка природно працює в розповіді.
  items:
  - sentence: "Ми повільно ____ вузькою вулицею, коли почули музику."
    answer: йшли
    options:
    - йшли
    - пішли
    - зайшли
    - перейшли
    explanation: Недоконаний вид створює тло для наступної події.
  - sentence: "Раптом двері ____ і всі замовкли."
    answer: відчинилися
    options:
    - відчинялися
    - відчинилися
    - відчинятися
    - відчиняються
    explanation: Доконаний вид позначає завершену подію.
  - sentence: "Олена ____ листа, коли задзвонив телефон."
    answer: читала
    options:
    - читала
    - прочитала
    - прочитає
    - зачитала
    explanation: Тривала дія є фоном для дзвінка.
  - sentence: "За хвилину Марко ____ дивну адресу внизу сторінки."
    answer: помітив
    options:
    - помічав
    - помітив
    - помічати
    - помічає
    explanation: Помітив рухає сюжет як окрема завершена дія.
  - sentence: "Я ____ до зали, бачу порожні стільці і чую знайомий голос."
    answer: заходжу
    options:
    - заходжу
    - зайшла
    - ходила
    - ходжу
    explanation: Теперішній історичний час наближає сцену до читача.
- id: act-3
  type: match-up
  title: Рухові дієслова і функція
  instruction: Поєднайте дієслово з його роллю в сюжеті.
  pairs:
  - left: вирушити
    right: почати шлях
  - left: доїхати
    right: досягти місця транспортом
  - left: зайти
    right: увійти або відвідати коротко
  - left: вийти
    right: залишити простір
  - left: перейти
    right: перетнути межу або міст
  - left: обійти
    right: оминути перешкоду
- id: act-4
  type: select
  title: Пряма мова в історії
  instruction: Оберіть речення, де пряма мова вставлена природно.
  items:
  - question: Який варіант найкраще додає голос у кульмінації?
    options:
    - text: "«Не заходь туди», - прошепотіла Ірина."
      correct: true
    - text: "Ірина сказала слова про те, що не треба туди заходити."
      correct: false
    - text: "Було сказано Іриною, що туди не треба заходити."
      correct: false
    - text: "Ірина здійснила висловлення про заборону."
      correct: false
    explanation: Коротка пряма репліка створює напругу і звучить природно.
  - question: Де ремарка додає дію, а не дублює емоцію?
    options:
    - text: "«Я не впевнена», - сказала Олена і поглянула на мапу."
      correct: true
    - text: "«Я не впевнена», - сказала Олена невпевнено."
      correct: false
    - text: "«Я не впевнена», - невпевненість сказала Олена."
      correct: false
    - text: "Олена сказала, що сказала невпевнено."
      correct: false
    explanation: Дія з мапою показує стан без повтору.
  - question: Який варіант краще поєднує пряму й непряму мову?
    options:
    - text: "Марко сказав: «Я перевірю табло». Потім пояснив, що бачив зміну платформи."
      correct: true
    - text: "Марко сказав, що «я перевірю табло» і що він бачив зміну."
      correct: false
    - text: "«Марко перевірить табло», пояснив він що бачив зміну."
      correct: false
    - text: "Було Марком сказано про перевірку табло."
      correct: false
    explanation: Перша репліка дає голос, а друге речення стисло переказує факт.
- id: act-5
  type: error-correction
  title: Редагування чернетки
  instruction: Знайдіть слабке або неприродне місце й оберіть кращий варіант.
  items:
  - sentence: "Я бачила, як двері були відкриті вітром."
    error: "двері були відкриті вітром"
    correction: "вітер відчинив двері"
    error_type: phrase
    explanation: "Активна дія природніша: я бачила, як вітер відчинив двері."
  - sentence: "Я хотів розповісти цю історію, - сказала Олена."
    error: "хотів"
    correction: "хотіла"
    error_type: word
    explanation: Минулий час узгоджується з жіночим родом підмета.
  - sentence: "Потім ми пішли в музей, потім пішли в зал, потім пішли до виходу."
    error: "пішли"
    correction: "увійшли"
    error_type: word
    explanation: "Варто замінити повтор на точніші рухові дієслова: увійшли, перейшли, вийшли."
  - sentence: "В мою думку, ця історія має сильну кінцівку."
    error: "В мою думку"
    correction: "На мою думку"
    error_type: phrase
    explanation: Українська конструкція - на мою думку.
  - sentence: "Підійшовши до дверей, музика стала гучнішою."
    error: "музика стала гучнішою"
    correction: "Марко почув гучнішу музику"
    error_type: phrase
    explanation: 'Дієприслівниковий зворот має стосуватися Марка: підійшовши, він почув музику.'
- id: act-6
  type: essay-response
  title: Коротка розповідь
  instruction: Напишіть коротку розповідь за опорою.
  prompt: >-
    Напишіть 150-200 слів про несподівану зустріч, загублену річ або коротку подорож. Використайте зачин,
    зав'язку, кульмінацію і кінцівку; щонайменше чотири дієслова доконаного виду для подій; щонайменше
    два дієслова недоконаного виду для тла; два префіксальні дієслова руху; одну коротку пряму репліку.
  min_words: 150
  model_answer: >-
    Минулої неділі я їхала до подруги і випадково вийшла на зупинку раніше. Дощ уже закінчувався, але
    тротуар був мокрий, а люди поспішали до метро. Я хотіла повернутися назад, коли помітила на лавці
    маленький блокнот. На першій сторінці було написано ім'я Оксана і номер телефону. Я зателефонувала,
    і за кілька хвилин до зупинки підбігла дівчина з червоним шарфом. «Ви врятували мій день», - сказала
    вона. Виявилося, що в блокноті були нотатки для співбесіди. Ми зайшли до найближчої кав'ярні, щоб
    вона могла перечитати записи. Коли я нарешті доїхала до подруги, то запізнилася на пів години, але
    привезла нову історію про випадкову допомогу. Після цієї зустрічі я ще довго згадувала червоний шарф
    і мокрий перон. Подруга спершу сміялася з мого запізнення, але потім попросила розповісти все докладніше.
    Я зрозуміла, що добра історія тримається не на великій події, а на точних деталях: дощі, табло, загубленому
    блокноті й короткій репліці незнайомої людини. Увечері я записала цю пригоду в нотатник, щоб не забути
    її природний кінець.
  evaluation_criteria:
  - Перевірте, чи зрозуміло, що саме сталося.
  - Підкресліть дієслова доконаного виду, які рухають сюжет.
  - Знайдіть одну деталь, яка створює місце або настрій.
  rubric:
  - criteria: Структура
    description: Є зачин, розвиток, кульмінація і кінцівка.
    points: 3
  - criteria: Дієслова
    description: Вид, час і рухові дієслова працюють природно.
    points: 3
  - criteria: Стиль
    description: Текст активний, зв'язний і без грубих кальок.
    points: 4
workbook:
- id: wb-1
  type: group-sort
  title: Частини розповіді
  instruction: Розподіліть фрагменти за функцією.
  groups:
  - label: Зачин
    items:
    - Минулого ранку я вийшла з дому раніше, ніж зазвичай.
    - У невеликій кав'ярні біля вокзалу майже нікого не було.
  - label: Зав'язка
    items:
    - Раптом незнайомець поклав на мій стіл чужий конверт.
    - На табло несподівано змінили номер платформи.
  - label: Кульмінація
    items:
    - Саме тоді з конверта випала фотографія, яку я вже бачила.
    - Коли двері зачинилися, я зрозуміла, що сумка залишилася в поїзді.
  - label: Кінцівка
    items:
    - Ввечері я ще раз перечитала записку і всміхнулася.
    - Ця помилка навчила мене не поспішати з висновками.
- id: wb-2
  type: fill-in
  title: Рух і вид
  instruction: Оберіть форму, яка найкраще завершує речення.
  items:
  - sentence: "Щосуботи ми ____ до бабусі, але того дня вирушили до Львова."
    answer: їздили
    options:
    - їздили
    - поїхали
    - доїхали
    - заїхали
    explanation: Щосуботи показує повторювану дію.
  - sentence: "Нарешті ми ____ до маленької станції біля лісу."
    answer: доїхали
    options:
    - їздили
    - доїхали
    - ходили
    - обходили
    explanation: Доїхали означає досягли місця транспортом.
  - sentence: "Олена ____ до книгарні, щоб перечекати дощ."
    answer: зайшла
    options:
    - ходила
    - зайшла
    - виходила
    - переходила
    explanation: Зайшла означає увійшла на короткий час.
  - sentence: "Поки ми ____ міст, Марко розповідав про старий район."
    answer: переходили
    options:
    - перейшли
    - переходили
    - зайшли
    - дійшли
    explanation: Поки потребує тривалої фонової дії.
- id: wb-3
  type: translate
  title: Природна українська розповідь
  instruction: Оберіть природний український варіант.
  items:
  - source: In my opinion, the ending is strong.
    options:
    - text: "На мою думку, кінцівка сильна."
      correct: true
    - text: "В мою думку, кінцівка сильна."
      correct: false
    - text: "У моєму опініоні, кінцівка сильна."
      correct: false
    explanation: Українська конструкція - на мою думку.
  - source: The door was opened by the wind.
    options:
    - text: "Вітер відчинив двері."
      correct: true
    - text: "Двері були відкриті вітром."
      correct: false
    - text: "Двері зробилися відкриті вітром."
      correct: false
    explanation: Активна конструкція часто природніша в розповіді.
  - source: She wanted to tell the story.
    options:
    - text: "Вона хотіла розповісти історію."
      correct: true
    - text: "Вона хотів розповісти історію."
      correct: false
    - text: "Вона була хотіти розповісти історію."
      correct: false
    explanation: Минулий час узгоджується з жіночим родом.
- id: wb-4
  type: true-false
  title: Чекліст наратора
  instruction: Визначте, чи твердження правильне.
  items:
  - statement: Недоконаний вид часто створює тло розповіді.
    correct: true
    explanation: Він показує тривалу або повторювану дію.
  - statement: Кожна добра розповідь має складатися тільки з доконаних дієслів.
    correct: false
    explanation: Без тла розповідь звучатиме як сухий список подій.
  - statement: Пряма мова доречна, коли треба дати персонажеві голос.
    correct: true
    explanation: Репліка може створити емоцію або кульмінацію.
  - statement: У реченні з дієприслівником діяч може змінюватися без обмежень.
    correct: false
    explanation: Додаткова дія має стосуватися того самого діяча.
  - statement: Редагування починається з перевірки структури, а не тільки ком.
    correct: true
    explanation: Якщо сюжет не працює, пунктуація не врятує текст.
- id: wb-5
  type: cloze
  title: Мініісторія з пропусками
  instruction: Заповніть пропуски словами, які тримають наратив.
  text: >-
    У суботу ми {1} до музею просто перед закриттям. У залі було тихо, і чергова {2} старий журнал. Раптом
    біля вікна {3} сигналізація. Ми {4} до виходу, але екскурсовод зупинив нас і сказав: «Не хвилюйтеся,
    це технічна перевірка». Після цього всі {5}, а я зрозумів, що напруга може з'явитися навіть у звичайному
    музеї.
  blanks:
  - id: 1
    answer: зайшли
    options:
    - зайшли
    - ходили
    - йшли
    - виходили
  - id: 2
    answer: читала
    options:
    - читала
    - прочитала
    - прочитає
    - прочитав
  - id: 3
    answer: спрацювала
    options:
    - спрацювала
    - працювала
    - працює
    - спрацьовувала
  - id: 4
    answer: рушили
    options:
    - рушили
    - рухалися
    - рухаємося
    - рушали
  - id: 5
    answer: засміялися
    options:
    - засміялися
    - сміялися
    - сміються
    - сміятися
- id: wb-6
  type: essay-response
  title: Відредагуйте і розширте
  instruction: Перепишіть слабку чернетку як зв'язну мініісторію.
  prompt: >-
    Чернетка: Я пішов на вокзал. Було багато людей. Я побачив жінку. Вона шукала квиток. Я допоміг. Потім
    поїзд приїхав. Перепишіть це як розповідь на 100-130 слів. Додайте точний зачин, два рухові дієслова
    з префіксами, одну деталь місця, одну пряму репліку і природну кінцівку.
  min_words: 100
  model_answer: >-
    У понеділок я прийшов на вокзал за пів години до відправлення. У залі було тісно, валізи стояли просто
    біля проходу, а люди нервово дивилися на табло. Біля каси я помітив жінку, яка швидко переглядала
    кишені пальта. «Здається, я загубила квиток», - сказала вона. Ми разом обійшли лавки і нарешті знайшли
    квиток під газетою. Коли поїзд під'їхав до платформи, жінка подякувала мені і встигла зайти до вагона.
    Я залишився на пероні й подумав, що іноді коротка допомога змінює весь день. Пізніше я сам сів у свій
    вагон і побачив через вікно, як жінка махнула мені рукою. Її поїзд рушив першим, а мій затримався
    ще на десять хвилин. Я не вважав це проблемою: замість звичайної поїздки отримав маленьку історію
    про уважність. Увечері я розповів її сестрі й помітив, що пам'ятаю не тільки подію, а й запах кави,
    мокру підлогу та голос у гучномовці.
  evaluation_criteria:
  - Перевірте, чи чернетка стала зв'язною історією, а не списком.
  - Знайдіть дві префіксальні форми руху.
  - Оцініть, чи кінцівка має завершений ефект.
