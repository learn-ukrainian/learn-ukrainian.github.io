  - id: wb-7
    type: error-correction
    title: Виправлення маршрутних інструкцій
    instruction: Виправте одну помилку в кожному реченні.
    items:
      - sentence: "Перейдіть повз театр і поверніть ліворуч."
        error: Перейдіть повз
        correction: "Пройдіть повз театр і поверніть ліворуч."
        explanation: Повз театр означає пройти біля нього.
      - sentence: "Пройдіть дорогу на зелене світло."
        error: Пройдіть
        correction: "Перейдіть дорогу на зелене світло."
        explanation: Дорогу треба перейти на інший бік.
      - sentence: "Проїдьте міст і зупиніться на іншому березі."
        error: Проїдьте
        correction: "Переїдьте міст і зупиніться на іншому березі."
        explanation: Інший берег підкреслює перетин мосту.
      - sentence: "Переїдьте два перехрестя й поверніть праворуч."
        error: Переїдьте
        correction: "Проїдьте два перехрестя й поверніть праворуч."
        explanation: Перехрестя як точки маршруту проїжджають.
      - sentence: "Проведіть дитину через дорогу на інший бік."
        error: Проведіть
        correction: "Переведіть дитину через дорогу на інший бік."
        explanation: Людину через дорогу переводять.
      - sentence: "Переведіть туристів по музею."
        error: Переведіть
        correction: "Проведіть туристів по музею."
        explanation: По музею як екскурсійний маршрут - проведіть.
      - sentence: "Пронесіть групу через двір."
        error: Пронесіть
        correction: "Проведіть групу через двір."
        explanation: Групу ведуть, а не несуть.
      - sentence: "Провезіть коробку в руках через контроль."
        error: Провезіть
        correction: "Пронесіть коробку в руках через контроль."
        explanation: У руках означає нести.
      - sentence: "Перевезіть туристів по місту як екскурсію."
        error: Перевезіть
        correction: "Провезіть туристів по місту як екскурсію."
        explanation: По місту маршрутом транспортом - провезіть.
      - sentence: "Провезіть вантаж через кордон на інший бік."
        error: Провезіть
        correction: "Перевезіть вантаж через кордон на інший бік."
        explanation: Кордон як межа на інший бік - перевезіть.
      - sentence: "Перепливіть повз пристань і зупиніться далі."
        error: Перепливіть повз
        correction: "Пропливіть повз пристань і зупиніться далі."
        explanation: Повз пристань - пропливіть.
      - sentence: "Пропливіть річку до протилежного берега."
        error: Пропливіть
        correction: "Перепливіть річку до протилежного берега."
        explanation: До протилежного берега означає перепливіть.
  - id: wb-8
    type: essay-response
    title: Детальний маршрут
    instruction: Опишіть маршрут містом, використавши щонайменше чотири форми з пере- та чотири форми з про-.
    min_words: 120
    prompt: "Уявіть, що ви пояснюєте маршрут від метро до музею або описуєте поїздку через місто. Використайте через + знахідний, повз + знахідний і по + давальний."
    model_answer: "Вийдіть з метро біля площі й пройдіть по головній вулиці до світлофора. На переході перейдіть дорогу на зелене світло, а потім пройдіть повз аптеку й банк. Якщо ви їдете машиною, спочатку проїдьте два перехрестя без зупинки, потім переїдьте міст через річку і зупиніться на іншому березі. Біля музею екскурсовод проведе групу по першому залу, а потім проведе гостей через двір до майстерні. Працівник перенесе коробку через коридор, а охоронець пронесе сумку через контроль. Після екскурсії ми перейдемо площу до кав'ярні, але не проїдемо свою зупинку, бо водій попередить нас заздалегідь."
    rubric:
      - criteria: дієслова з пере-
        description: Є щонайменше чотири форми з пере- у значенні перетину, переміщення або зміни стану.
      - criteria: дієслова з про-
        description: Є щонайменше чотири форми з про- у значенні руху повз, наскрізь або вздовж маршруту.
      - criteria: керування
        description: Через + знахідний, повз + знахідний і по + давальний ужиті природно.
      - criteria: спосіб руху
        description: Пішки, транспортом, бігом, руками, веденням і перевезенням не змішані.
      - criteria: зміст
        description: Текст описує зв'язний маршрут або поїздку, а не список непов'язаних речень.
