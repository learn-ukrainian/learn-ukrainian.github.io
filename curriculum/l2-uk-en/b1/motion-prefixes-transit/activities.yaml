version: '1.0'
module: motion-prefixes-transit
level: b1
inline:
  - id: act-1
    type: quiz
    title: Перетин чи транзит?
    instruction: Оберіть дієслово, яке найкраще відповідає просторовій картинці.
    items:
      - question: "На зелене світло пішоходи ____ дорогу."
        options:
          - перейшли
          - пройшли
          - зайшли
        correct: 0
        explanation: Дорогу перетинають з одного боку на інший, тому перейшли.
      - question: "Ми ____ повз музей і не зупинилися."
        options:
          - пройшли
          - перейшли
          - зайшли
        correct: 0
        explanation: Повз орієнтир без зупинки потребує про-.
      - question: "Автобус ____ міст і зупинився на іншому березі."
        options:
          - переїхав
          - проїхав
          - заїхав
        correct: 0
        explanation: Інший берег підкреслює перетин, тому переїхав.
      - question: "Таксі ____ два перехрестя без зупинки."
        options:
          - проїхало
          - переїхало
          - доїхало
        correct: 0
        explanation: Два перехрестя як послідовні точки маршруту проїжджають.
      - question: "Дитина небезпечно ____ дорогу перед автобусом."
        options:
          - перебігла
          - пробігла
          - прибігла
        correct: 0
        explanation: Швидкий перетин дороги - перебігла.
      - question: "Спортсмен ____ повз трибуну і помахав рукою."
        options:
          - пробіг
          - перебіг
          - забіг
        correct: 0
        explanation: Повз трибуну означає минув її бігом.
      - question: "Волонтер ____ коробку через коридор до іншої кімнати."
        options:
          - переніс
          - проніс
          - приніс
        correct: 0
        explanation: Коробку перемістили на інший бік або в інше місце.
      - question: "Працівник ____ сумку через контроль."
        options:
          - проніс
          - переніс
          - доніс
        correct: 0
        explanation: Через контроль як транзитний пункт природно проніс.
      - question: "Екскурсовод ____ групу по музею."
        options:
          - провів
          - перевів
          - привів
        correct: 0
        explanation: По музею означає маршрут екскурсії, тому провів.
      - question: "Учитель ____ дітей через пішохідний перехід."
        options:
          - перевів
          - провів
          - вивів
        correct: 0
        explanation: Через перехід і на інший бік - перевів.
      - question: "Човен ____ повз берег без зупинки."
        options:
          - проплив
          - переплив
          - виплив
        correct: 0
        explanation: Повз берег - проплив.
      - question: "Плавець ____ річку від одного берега до іншого."
        options:
          - переплив
          - проплив
          - заплив
        correct: 0
        explanation: Від одного берега до іншого означає переплив.
  - id: act-2
    type: fill-in
    title: Форми пере- і про-
    instruction: Заповніть пропуск правильною формою дієслова.
    items:
      - sentence: "Завтра я ____ дорогу біля школи тільки на зелене світло. (перейти)"
        answer: перейду
        options:
          - перейду
          - пройду
          - перейшов
        explanation: Я і завтра потребують майбутньої форми перейду.
      - sentence: "Щодня вона ____ цю вулицю на переході. (переходити)"
        answer: переходить
        options:
          - переходить
          - проходить
          - перейшла
        explanation: Щодня потребує недоконаної форми переходить.
      - sentence: "Автобус ____ міст і опинився на іншому березі. (переїхати)"
        answer: переїхав
        options:
          - переїхав
          - проїхав
          - заїхав
        explanation: Інший берег показує завершений перетин мосту.
      - sentence: "Ми ____ через центр без зупинки. (проїхати)"
        answer: проїхали
        options:
          - проїхали
          - переїхали
          - доїхали
        explanation: Через центр транзитом без зупинки - проїхали.
      - sentence: "Діти ____ площу до фонтану. (перебігти)"
        answer: перебігли
        options:
          - перебігли
          - пробігли
          - прибігли
        explanation: Площу перетнули бігом.
      - sentence: "Щоранку спортсменка ____ по набережній. (пробігати)"
        answer: пробігає
        options:
          - пробігає
          - перебігає
          - прибігає
        explanation: По набережній означає біг уздовж маршруту.
      - sentence: "Я ____ коробку через коридор до архіву. (перенести)"
        answer: перенесу
        options:
          - перенесу
          - пронесу
          - принесу
        explanation: Я і майбутня дія дають перенесу; через коридор до іншого місця.
      - sentence: "Охоронець ____ відвідувача через контроль. (провести)"
        answer: провів
        options:
          - провів
          - перевів
          - привів
        explanation: Через контроль як пункт маршруту - провів.
      - sentence: "Учителька ____ першокласників через дорогу. (перевести)"
        answer: перевела
        options:
          - перевела
          - провела
          - вивела
        explanation: Дітей допомогли перевести на інший бік дороги.
      - sentence: "Водій ____ туристів по старому місту. (провезти)"
        answer: провіз
        options:
          - провіз
          - перевіз
          - привіз
        explanation: По місту означає маршрут транспортом, тому провіз.
      - sentence: "Птахи ____ через річку на інший берег. (перелетіти)"
        answer: перелетіли
        options:
          - перелетіли
          - пролетіли
          - залетіли
        explanation: На інший берег підкреслює перетин повітрям.
      - sentence: "Човен ____ повз пристань і рушив далі. (проплисти)"
        answer: проплив
        options:
          - проплив
          - переплив
          - виплив
        explanation: Повз пристань без зупинки - проплив.
  - id: act-3
    type: match-up
    title: Дієслово і траєкторія
    instruction: Поєднайте дієслово з найближчим просторовим змістом.
    pairs:
      - left: перейти дорогу
        right: опинитися на іншому боці дороги пішки
      - left: пройти повз театр
        right: минути театр без входу
      - left: переїхати міст
        right: перетнути міст транспортом
      - left: проїхати два перехрестя
        right: минути дві точки маршруту
      - left: перебігти площу
        right: швидко перетнути відкритий простір
      - left: пробігти по набережній
        right: бігти вздовж води певним маршрутом
      - left: перенести папку через коридор
        right: перемістити предмет руками на інший бік
      - left: пронести валізу через контроль
        right: пройти контроль із валізою
      - left: перевести дитину через перехід
        right: допомогти людині перейти на інший бік
      - left: провести групу по музею
        right: супроводити людей екскурсійним маршрутом
      - left: переплисти річку
        right: дістатися водою до протилежного берега
      - left: проплисти повз берег
        right: минути берег водою без зупинки
  - id: act-4
    type: group-sort
    title: Прийменник підказує
    instruction: Розподіліть фрази за моделлю керування.
    groups:
      - label: "Пере-: перетин на інший бік"
        items:
          - перейти дорогу
          - переїхати міст
          - переплисти річку
      - label: "Про- + повз + знахідний"
        items:
          - пройти повз музей
          - проїхати повз вокзал
          - пробігти повз трибуну
      - label: "Про- + через + знахідний"
        items:
          - пройти через парк
          - проїхати через центр
          - пронести сумку через контроль
      - label: "Про- + по + давальний"
        items:
          - пройти по вулиці
          - пробігти по набережній
          - провести гостей по музею
  - id: act-5
    type: error-correction
    title: Редагування транзиту
    instruction: Виправте одну помилку в кожному реченні.
    items:
      - sentence: "Пішоходи пройшли дорогу на зелене світло."
        error: пройшли
        correction: "Пішоходи перейшли дорогу на зелене світло."
        explanation: Дорогу перетинають на інший бік, тому перейшли.
      - sentence: "Ми перейшли повз театр і не зупинилися."
        error: перейшли повз
        correction: "Ми пройшли повз театр і не зупинилися."
        explanation: Повз орієнтир потребує про-.
      - sentence: "Автобус проїхав міст і зупинився на іншому березі."
        error: проїхав
        correction: "Автобус переїхав міст і зупинився на іншому березі."
        explanation: Інший берег підказує перетин.
      - sentence: "Таксі переїхало два перехрестя без зупинки."
        error: переїхало
        correction: "Таксі проїхало два перехрестя без зупинки."
        explanation: Перехрестя як послідовні точки маршруту проїжджають.
      - sentence: "Дитина пробігла дорогу перед автобусом."
        error: пробігла
        correction: "Дитина перебігла дорогу перед автобусом."
        explanation: Швидкий перетин дороги - перебігла.
      - sentence: "Спортсмен перебіг повз трибуну."
        error: перебіг повз
        correction: "Спортсмен пробіг повз трибуну."
        explanation: Повз трибуну означає минув її бігом.
      - sentence: "Екскурсовод перевів групу по музею."
        error: перевів
        correction: "Екскурсовод провів групу по музею."
        explanation: По музею означає екскурсійний маршрут.
      - sentence: "Учитель провів дітей через дорогу на інший бік."
        error: провів
        correction: "Учитель перевів дітей через дорогу на інший бік."
        explanation: На інший бік дороги - перевів.
      - sentence: "Водій перевіз туристів по старому місту."
        error: перевіз
        correction: "Водій провіз туристів по старому місту."
        explanation: По місту як маршрут транспортом - провіз.
      - sentence: "Вантажівка провезла обладнання через кордон на інший бік."
        error: провезла
        correction: "Вантажівка перевезла обладнання через кордон на інший бік."
        explanation: Через кордон на інший бік підкреслює перетин.
      - sentence: "Човен переплив повз берег."
        error: переплив повз
        correction: "Човен проплив повз берег."
        explanation: Повз берег без зупинки - проплив.
      - sentence: "Плавець проплив річку від берега до берега."
        error: проплив
        correction: "Плавець переплив річку від берега до берега."
        explanation: Від берега до берега означає переплив.
workbook:
  - id: wb-1
    type: quiz
    title: Точний вибір префікса
    instruction: Оберіть природний варіант для ситуації.
    items:
      - question: "Якщо людина стоїть перед дорогою і переходить на інший бік, вона ____."
        options:
          - переходить дорогу
          - проходить повз дорогу
          - заходить у дорогу
        correct: 0
        explanation: На інший бік дороги - переходить.
      - question: "Якщо людина йде біля театру й не заходить, вона ____."
        options:
          - проходить повз театр
          - переходить театр
          - виходить з театру
        correct: 0
        explanation: Біля орієнтира без входу - повз театр.
      - question: "Машина, що перетинає міст і опиняється на іншому березі, ____."
        options:
          - переїжджає міст
          - проїжджає повз міст
          - заходить на міст
        correct: 0
        explanation: Транспортом на інший бік - переїжджає.
      - question: "Автобус, що минув потрібну зупинку, ____."
        options:
          - проїхав зупинку
          - переїхав зупинку
          - заїхав зупинку
        correct: 0
        explanation: Пропущену точку маршруту проїжджають.
      - question: "Біг через дорогу на інший бік - це ____."
        options:
          - перебігти дорогу
          - пробігти повз дорогу
          - забігти дорогу
        correct: 0
        explanation: Швидкий перетин - перебігти.
      - question: "Біг біля стадіону без зупинки - це ____."
        options:
          - пробігти повз стадіон
          - перебігти повз стадіон
          - добігти повз стадіон
        correct: 0
        explanation: Повз орієнтир - пробігти.
      - question: "Групу через дорогу на інший бік треба ____."
        options:
          - перевести
          - провести по
          - завести
        correct: 0
        explanation: Людей ведуть через межу на інший бік.
      - question: "Групу по музею як екскурсію треба ____."
        options:
          - провести
          - перевести
          - перенести
        correct: 0
        explanation: По музею як маршрут - провести.
      - question: "Валізу через контроль природно ____."
        options:
          - пронести
          - перевести
          - провести
        correct: 0
        explanation: Предмет у руках несуть через контроль.
      - question: "Меблі через кордон вантажівкою треба ____."
        options:
          - перевезти
          - провести
          - перенести в руках
        correct: 0
        explanation: Вантажівкою і через межу - перевезти.
      - question: "Літак, що минув місто в небі, ____."
        options:
          - пролетів над містом
          - перелетів у місто
          - заплив у місто
        correct: 0
        explanation: Минув у повітрі - пролетів.
      - question: "Літак, що перетнув гори, ____."
        options:
          - перелетів через гори
          - проїхав через гори
          - переплив через гори
        correct: 0
        explanation: Повітряний перетин через гори - перелетів.
  - id: wb-2
    type: match-up
    title: Пара руху і спосіб
    instruction: Поєднайте ситуацію з правильним дієсловом.
    pairs:
      - left: людина пішки на інший бік дороги
        right: перейти
      - left: людина пішки повз музей
        right: пройти
      - left: машина на інший берег через міст
        right: переїхати
      - left: автобус повз вокзал без зупинки
        right: проїхати
      - left: дитина бігом через подвір'я
        right: перебігти
      - left: спортсмен бігом повз трибуну
        right: пробігти
      - left: коробка руками через коридор
        right: перенести
      - left: валіза руками через контроль
        right: пронести
      - left: дитина з дорослим через дорогу
        right: перевести
      - left: гості з гідом по музею
        right: провести
      - left: вантаж транспортом через кордон
        right: перевезти
      - left: туристи автобусом по місту
        right: провезти
  - id: wb-3
    type: group-sort
    title: Сигнали маршруту
    instruction: Розподіліть речення за головним сигналом.
    groups:
      - label: "Через межу на інший бік"
        items:
          - Перейдіть дорогу на зелене світло.
          - Переведіть дітей через перехід.
          - Перевезіть вантаж через кордон.
      - label: "Повз орієнтир"
        items:
          - Пройдіть повз аптеку.
          - Проїдьте повз вокзал.
          - Пробіжіть повз трибуну.
      - label: "Крізь простір"
        items:
          - Пройдіть через парк.
          - Проведіть гостей через двір.
          - Провезіть вантаж через центр.
      - label: "Уздовж поверхні або лінії"
        items:
          - Пройдіть по вулиці.
          - Пробіжіть по набережній.
          - Проведіть групу по музею.
  - id: wb-4
    type: fill-in
    title: Маршрут містом
    instruction: Заповніть пропуски формами пере-/про- або потрібними прийменниками.
    items:
      - sentence: "____ дорогу на пішохідному переході. (перейти, наказовий)"
        answer: Перейдіть
        options:
          - Перейдіть
          - Пройдіть
          - Зайдіть
        explanation: Дорогу перетинають, тому перейдіть.
      - sentence: "____ повз аптеку й поверніть праворуч. (пройти, наказовий)"
        answer: Пройдіть
        options:
          - Пройдіть
          - Перейдіть
          - Вийдіть
        explanation: Повз аптеку - пройдіть.
      - sentence: "Автобус ____ через центр без зупинки. (проїхати)"
        answer: проїхав
        options:
          - проїхав
          - переїхав
          - доїхав
        explanation: Через центр транзитом без зупинки - проїхав.
      - sentence: "Таксі ____ міст і стало на іншому березі. (переїхати)"
        answer: переїхало
        options:
          - переїхало
          - проїхало
          - заїхало
        explanation: Інший берег означає перетин мосту.
      - sentence: "Ми пройшли ____ музей, але не зайшли всередину. (повз)"
        answer: повз
        options:
          - повз
          - через
          - по
        explanation: Біля музею без входу - повз музей.
      - sentence: "Пройдіть ____ коридору до останніх дверей. (по)"
        answer: по
        options:
          - по
          - повз
          - з
        explanation: Уздовж коридору - по коридору.
      - sentence: "Проведіть гостей ____ двір до майстерні. (через)"
        answer: через
        options:
          - через
          - повз
          - від
        explanation: Крізь простір двору - через двір.
      - sentence: "Пасажир ____ свою зупинку, бо читав повідомлення. (проїхати)"
        answer: проїхав
        options:
          - проїхав
          - переїхав
          - виїхав
        explanation: Пропущену зупинку проїжджають.
      - sentence: "Вона ____ на українську під час зустрічі. (перейти)"
        answer: перейшла
        options:
          - перейшла
          - пройшла
          - зайшла
        explanation: Перейти на іншу мову - переносне значення пере-.
      - sentence: "Екскурсовод ____ туристів по старій частині міста. (провести)"
        answer: провів
        options:
          - провів
          - перевів
          - привів
        explanation: По частині міста як маршрут - провів.
