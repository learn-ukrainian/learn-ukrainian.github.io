- title: Local B1 alternation-vowels module
  role: curriculum
  notes: Попередній модуль для перевірки голосних чергувань у парах рік - року, ніч - ночі, вухо - у вусі.
  source_ref: curriculum/l2-uk-en/b1/alternation-vowels/module.md
- title: Local B1 alternation-consonants-nouns module
  role: curriculum
  notes: Попередній модуль для іменникових чергувань друг - друже, рука - руці, вухо - вусі.
  source_ref: curriculum/l2-uk-en/b1/alternation-consonants-nouns/module.md
- title: Local B1 alternation-consonants-verbs module
  role: curriculum
  notes: Попередній модуль для дієслівних форм я воджу, сиджу, ношу, роблю, куплю.
  source_ref: curriculum/l2-uk-en/b1/alternation-consonants-verbs/module.md
- title: Local B1 health-at-the-doctor module
  role: curriculum
  notes: Попередній тематичний модуль для медичного керування скаржитися на, лікуватися від, хворіти на.
  source_ref: curriculum/l2-uk-en/b1/health-at-the-doctor/module.md
- title: Local B1 simplification-consonants module
  role: curriculum
  notes: Попередній модуль для спрощення в групах приголосних і розрізнення спрощення від інших історичних змін.
  source_ref: curriculum/l2-uk-en/b1/simplification-consonants/module.md
- title: Local B1 noun-subclasses-hissing module
  role: curriculum
  notes: Попередній модуль для мішаної групи та форм сторожем, ножем, товаришем.
  source_ref: curriculum/l2-uk-en/b1/noun-subclasses-hissing/module.md
- title: Local B1 noun-subclasses-feminine module
  role: curriculum
  notes: Попередній модуль для третьої відміни, подвоєння в орудному та форм радістю, кров'ю, ніччю.
  source_ref: curriculum/l2-uk-en/b1/noun-subclasses-feminine/module.md
- title: Local B1 pluralia-tantum module
  role: curriculum
  notes: Попередній модуль для множинних іменників двері, гроші, ліки, окуляри, Карпати.
  source_ref: curriculum/l2-uk-en/b1/pluralia-tantum/module.md
- title: Goroh and Slovnyk.ua form checks
  role: dictionary
  notes: Використано як словникову перевірку нормативних форм дверей, грошей, ліків, сторожем, ніччю, радістю, кров'ю.
  source_ref: goroh.pp.ua; slovnyk.ua
