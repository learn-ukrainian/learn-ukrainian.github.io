version: '1.0'
module: checkpoint-morphophonemics
level: b1
inline:
  - id: act-1
    type: quiz
    title: Швидка карта явищ
    instruction: Оберіть точне пояснення для форми в реченні.
    items:
      - question: "У реченні «Я сиджу біля дверей» форма сиджу показує..."
        options:
          - дієслівне чергування в першій особі однини
          - мішану групу іменника
          - pluralia tantum
        correct: 0
        explanation: "Сидіти дає форму я сиджу з чергуванням д - дж."
      - question: "У формі дверей головне правило таке:"
        options:
          - це родовий відмінок pluralia tantum
          - це орудний відмінок третьої відміни
          - це кличний відмінок мішаної групи
        correct: 0
        explanation: "Біля чого? біля дверей; слово двері має тільки множинну форму."
      - question: "Форма сторожем нормативна, бо..."
        options:
          - основа на шиплячий належить до мішаної групи
          - слово має тільки множину
          - це дієслово доконаного виду
        correct: 0
        explanation: "В орудному однини мішана група має закінчення -ем."
      - question: "Форма радістю пишеться без подвоєння, бо..."
        options:
          - перед закінченням є збіг приголосних
          - це слово pluralia tantum
          - це кличний відмінок
        correct: 0
        explanation: "У слові радість уже є збіг приголосних, тому подвоєння не з'являється."
      - question: "У парі тиждень - тижня бачимо..."
        options:
          - спрощення групи приголосних
          - зміну виду дієслова
          - форму орудного відмінка
        correct: 0
        explanation: "При творенні форми випадає зайвий приголосний у групі."
  - id: act-2
    type: error-correction
    title: Знайдіть першу помилку
    instruction: Виправте форму й назвіть коротку причину.
    items:
      - sentence: "Ми говорили зі сторожом біля входу."
        error: "сторожом"
        correction: "сторожем"
        options:
          - сторожем
          - сторожа
          - сторожі
          - сторожу
        explanation: "Орудний відмінок мішаної групи має закінчення -ем."
      - sentence: "У мене немає гроші на дорогу."
        error: "гроші"
        correction: "грошей"
        options:
          - грошей
          - грошима
          - гроші
          - грошам
        explanation: "Немає чого? Потрібен родовий відмінок: грошей."
      - sentence: "Я водю бабусю до лікаря щоп'ятниці."
        error: "водю"
        correction: "воджу"
        options:
          - воджу
          - водиш
          - веду
          - водив
        explanation: "У формі я від водити відбувається чергування д - дж."
      - sentence: "Вона написала відповідь ноччю."
        error: "ноччю"
        correction: "вночі"
        options:
          - вночі
          - ніччю
          - ночі
          - ніч
        explanation: "У цьому контексті потрібно прислівникове коли? - вночі."
      - sentence: "Цей ліки допоміг швидко."
        error: "Цей ліки допоміг"
        correction: "Ці ліки допомогли"
        options:
          - Ці ліки допомогли
          - Цей лік допоміг
          - Ця ліка допомогла
          - Ці ліки допоміг
        explanation: "Ліки - pluralia tantum, тому узгодження стоїть у множині."
  - id: act-3
    type: fill-in
    title: Алгоритм форми
    instruction: Вставте нормативну форму за контекстом.
    items:
      - sentence: "Ми стояли біля ____ і чекали товариша."
        answer: "дверей"
        options:
          - дверей
          - двері
          - дверима
        explanation: "Біля + родовий відмінок; двері - pluralia tantum."
      - sentence: "Я щодня ____ окуляри в університеті."
        answer: "ношу"
        options:
          - ношу
          - носю
          - носиш
        explanation: "Носити має форму я ношу."
      - sentence: "Офіціант різав хліб гострим ____."
        answer: "ножем"
        options:
          - ножем
          - ножом
          - ножа
        explanation: "Ніж належить до мішаної групи: орудний ножем."
      - sentence: "Вона говорила про цю новину з ____."
        answer: "радістю"
        options:
          - радістю
          - радісстю
          - радісттю
        explanation: "Після збігу приголосних у третій відміні подвоєння не пишеться."
      - sentence: "Після ____ ми повторили всі форми."
        answer: "канікул"
        options:
          - канікул
          - канікули
          - канікулами
        explanation: "Після + родовий відмінок: після канікул."
  - id: act-4
    type: match-up
    title: Форма і причина
    instruction: Поєднайте нормативну форму з поясненням.
    pairs:
      - left: "на руці"
        right: "місцевий відмінок із чергуванням к - ц"
      - left: "друже"
        right: "кличний відмінок із чергуванням г - ж"
      - left: "сторожем"
        right: "орудний відмінок мішаної групи"
      - left: "ніччю"
        right: "третя відміна з подвоєнням"
      - left: "кров'ю"
        right: "третя відміна без подвоєння після губного"
      - left: "дверей"
        right: "родовий відмінок pluralia tantum"
  - id: act-5
    type: group-sort
    title: Чотири кошики контрольної
    instruction: Розподіліть форми за тим, яке правило насамперед перевіряється.
    groups:
      - label: Дієслівне чергування
        items:
          - я воджу
          - я сиджу
          - я ношу
          - я роблю
      - label: Мішана група
        items:
          - сторожем
          - ножем
          - товаришем
          - плащем
      - label: Третя відміна
        items:
          - ніччю
          - радістю
          - кров'ю
          - сіллю
      - label: Pluralia tantum
        items:
          - дверей
          - грошей
          - ліків
          - Карпат
workbook:
  - id: wb-1
    type: quiz
    title: Діагностичний тест
    instruction: Оберіть правильну відповідь.
    items:
      - question: "Яке речення нормативне?"
        options:
          - "Я воджу машину щодня."
          - "Я водю машину щодня."
          - "Ти воджиш машину щодня."
          - "Він воджить машину щодня."
        correct: 0
        explanation: "Форма я від водити - воджу; інші особи мають водиш, водить."
      - question: "Яка форма орудного відмінка правильна?"
        options:
          - "з товаришем"
          - "з товаришом"
          - "з товаришу"
          - "з товариша"
        correct: 0
        explanation: "Товариш має основу на шиплячий, тому орудний - товаришем."
      - question: "Яка форма родового відмінка pluralia tantum правильна?"
        options:
          - "немає дверей"
          - "немає дверів"
          - "немає двері"
          - "немає дверям"
        correct: 0
        explanation: "Родовий відмінок слова двері - дверей."
      - question: "Де є спрощення?"
        options:
          - "тиждень - тижня"
          - "друг - друже"
          - "рука - на руці"
          - "ніч - ніччю"
        correct: 0
        explanation: "У формі тижня спрощується група приголосних."
      - question: "Яка форма третьої відміни неправильна?"
        options:
          - "радісстю"
          - "ніччю"
          - "сіллю"
          - "кров'ю"
        correct: 0
        explanation: "Правильно радістю, без подвоєння."
  - id: wb-2
    type: group-sort
    title: Розпізнайте клас
    instruction: Розкладіть слова за граматичною поведінкою.
    groups:
      - label: Звичайні іменники
        items:
          - ключ
          - шкарпетка
          - лікар
          - рецепт
      - label: Мішана група
        items:
          - сторож
          - товариш
          - ніж
          - плащ
      - label: Третя відміна
        items:
          - ніч
          - радість
          - кров
          - сіль
      - label: Pluralia tantum
        items:
          - двері
          - гроші
          - ліки
          - окуляри
  - id: wb-3
    type: fill-in
    title: Відмінок у реченні
    instruction: Виберіть форму, яку вимагає контекст.
    items:
      - sentence: "Лікар дав інструкцію до ____."
        answer: "ліків"
        options:
          - ліків
          - ліки
          - ліками
        explanation: "До + родовий відмінок: до ліків."
      - sentence: "Ми розмовляли з ____ про контрольну."
        answer: "товаришем"
        options:
          - товаришем
          - товаришом
          - товариша
        explanation: "З ким? з товаришем."
      - sentence: "У кімнаті не було ____."
        answer: "окулярів"
        options:
          - окулярів
          - окуляри
          - окулярами
        explanation: "Не було чого? окулярів."
      - sentence: "Вона писала листа ____."
        answer: "вночі"
        options:
          - вночі
          - ніччю
          - ночі
        explanation: "Тут потрібна форма коли? - вночі."
      - sentence: "Ми милувалися тихою ____."
        answer: "ніччю"
        options:
          - ніччю
          - вночі
          - ночі
        explanation: "Милуватися чим? тихою ніччю."
      - sentence: "Після ____ пацієнт повернувся на роботу."
        answer: "хвороби"
        options:
          - хвороби
          - хворобою
          - хворобу
        explanation: "Після + родовий відмінок."
  - id: wb-4
    type: error-correction
    title: Редакторська перевірка
    instruction: Виправте форму, яка порушує правило.
    items:
      - sentence: "Ти воджиш сестру до школи щодня."
        error: "воджиш"
        correction: "водиш"
        options:
          - водиш
          - воджу
          - водить
          - водити
        explanation: "Чергування д - дж у цій моделі стоїть у формі я, не в формі ти."
      - sentence: "Офіціант приніс суп з ножом."
        error: "ножом"
        correction: "ножем"
        options:
          - ножем
          - ножа
          - ножі
          - ножу
        explanation: "Ніж має орудний відмінок ножем."
      - sentence: "Мої окуляри зламався в дорозі."
        error: "зламався"
        correction: "зламалися"
        options:
          - зламалися
          - зламалося
          - зламалася
          - зламав
        explanation: "Окуляри вимагають множинного узгодження."
      - sentence: "Вона радісстю розповідала про результат."
        error: "радісстю"
        correction: "радістю"
        options:
          - радістю
          - радісттю
          - радістью
          - радостю
        explanation: "У слові радість немає подвоєння в орудному."
      - sentence: "У нього болить ухо після поїздки."
        error: "ухо"
        correction: "вухо"
        options:
          - вухо
          - у вусі
          - вухом
          - вуха
        explanation: "Нормативна словникова форма - вухо; після у можливе у вусі."
      - sentence: "У нас немає ліки від застуди."
        error: "ліки"
        correction: "ліків"
        options:
          - ліків
          - ліками
          - лікам
          - ліки
        explanation: "Немає чого? ліків."
  - id: wb-5
    type: match-up
    title: Початкова форма і контрольна форма
    instruction: З'єднайте початкову форму з потрібною контрольною формою.
    pairs:
      - left: "водити"
        right: "я воджу"
      - left: "носити"
        right: "я ношу"
      - left: "сторож"
        right: "сторожем"
      - left: "радість"
        right: "радістю"
      - left: "кров"
        right: "кров'ю"
      - left: "двері"
        right: "дверей"
      - left: "гроші"
        right: "грошей"
      - left: "рука"
        right: "на руці"
  - id: wb-6
    type: cloze
    title: Мінітекст із пропусками
    instruction: Заповніть пропуски нормативними формами.
    text: "Учора я був у лікаря. Я {скаржився|скаржив|скаржував} на біль у {вусі|вухі|усі}. Лікар виписав рецепт і сказав купити {ліки|лік|ліка}. Біля {дверей|дверів|двері} аптеки я зустрів товариша. Ми говорили з {радістю|радісстю|радісттю}, бо контрольна вже не здавалася страшною."
    blanks:
      - id: 1
        answer: "скаржився"
        options:
          - скаржився
          - скаржив
          - скаржував
      - id: 2
        answer: "вусі"
        options:
          - вусі
          - вухі
          - усі
      - id: 3
        answer: "ліки"
        options:
          - ліки
          - лік
          - ліка
      - id: 4
        answer: "дверей"
        options:
          - дверей
          - дверів
          - двері
      - id: 5
        answer: "радістю"
        options:
          - радістю
          - радісстю
          - радісттю
  - id: wb-7
    type: true-false
    title: Правда чи пастка
    instruction: Позначте, чи твердження правильне.
    items:
      - statement: "Форма я воджу не дозволяє будувати форму ти воджиш."
        correct: true
        explanation: "У формі ти нормативно водиш."
      - statement: "Слово двері має звичайну форму однини дверя."
        correct: false
        explanation: "У сучасному нейтральному вжитку двері є pluralia tantum."
      - statement: "Орудний відмінок слова ніч - ніччю."
        correct: true
        explanation: "Це третя відміна з подвоєнням."
      - statement: "Форма сторожом нормативна в орудному відмінку."
        correct: false
        explanation: "Правильно сторожем."
      - statement: "У слові тижня є спрощення приголосних."
        correct: true
        explanation: "Пара тиждень - тижня показує спрощення."
      - statement: "Форма кров'ю пишеться без подвоєння."
        correct: true
        explanation: "Після губного в подвоєння немає."
  - id: wb-8
    type: order
    title: Порядок редакторської перевірки
    instruction: Розташуйте дії так, щоб перевірити форму без механічного вгадування.
    items:
      - "Визначити частину мови й контекст речення."
      - "Поставити граматичне питання: відмінок, особа, число або вид."
      - "Перевірити підклас: мішана група, третя відміна чи pluralia tantum."
      - "Застосувати потрібне чергування або спрощення."
      - "Прочитати готове речення й перевірити узгодження."
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
  - id: wb-9
    type: mark-the-words
    title: Позначте контрольні форми
    instruction: Позначте форми, які показують морфонеміку або особливий підклас.
    text: "Уночі я сиджу біля дверей, читаю інструкцію до ліків і думаю про розмову зі сторожем. У тексті є грошей, радістю, ножем і на руці."
    target_words:
      - Уночі
      - сиджу
      - дверей
      - ліків
      - сторожем
      - грошей
      - радістю
      - ножем
      - руці
  - id: wb-10
    type: translate
    title: Переклад без кальки
    instruction: Оберіть природний український варіант.
    items:
      - source: "I complain of ear pain."
        options:
          - text: "Я скаржуся на біль у вусі."
            correct: true
          - text: "Я скаржуся болем у вусі."
            correct: false
          - text: "Я скаржуся про біль у вусі."
            correct: false
        explanation: "Скаржитися на + знахідний відмінок."
      - source: "I have no money."
        options:
          - text: "У мене немає грошей."
            correct: true
          - text: "У мене немає гроші."
            correct: false
          - text: "У мене немає грошима."
            correct: false
        explanation: "Немає чого? грошей."
      - source: "I spoke with the guard."
        options:
          - text: "Я говорив зі сторожем."
            correct: true
          - text: "Я говорив зі сторожом."
            correct: false
          - text: "Я говорив сторожа."
            correct: false
        explanation: "Орудний відмінок мішаної групи - сторожем."
      - source: "These medicines helped."
        options:
          - text: "Ці ліки допомогли."
            correct: true
          - text: "Цей ліки допоміг."
            correct: false
          - text: "Ця ліка допомогла."
            correct: false
        explanation: "Ліки мають множинне узгодження."
  - id: wb-11
    type: fill-in
    title: Фінальна мініконтрольна
    instruction: Виберіть правильну форму без підказки в реченні.
    items:
      - sentence: "Я ____ звіт учора ввечері й одразу надіслав його викладачці."
        answer: "написав"
        options:
          - написав
          - писав
          - пишу
        explanation: "Учора й результат надіслав підказують доконаний вид."
      - sentence: "Щодня після роботи я ____ короткий щоденник українською."
        answer: "пишу"
        options:
          - пишу
          - написав
          - напишу
        explanation: "Щодня вказує на регулярну недоконану дію."
      - sentence: "У місцевому відмінку від рука буде на ____."
        answer: "руці"
        options:
          - руці
          - рукі
          - рукою
        explanation: "Рука дає чергування к - ц: на руці."
      - sentence: "Кличний відмінок від друг - ____."
        answer: "друже"
        options:
          - друже
          - другу
          - друге
        explanation: "Друг має чергування г - ж у кличному."
      - sentence: "Орудний відмінок від сіль - ____."
        answer: "сіллю"
        options:
          - сіллю
          - сілью
          - соллю
        explanation: "Третя відміна з подвоєнням: сіллю."
      - sentence: "До ____ ми поїхали після канікул."
        answer: "Карпат"
        options:
          - Карпат
          - Карпати
          - Карпатів
        explanation: "До + родовий відмінок; Карпати мають множинну форму."
