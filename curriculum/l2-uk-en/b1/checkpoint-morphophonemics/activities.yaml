version: '1.0'
module: checkpoint-morphophonemics
level: b1
inline:
  - id: act-1
    type: quiz
    title: Швидка карта явищ
    instruction: Оберіть точне пояснення для форми в реченні.
    items:
      - question: "У реченні «Я сиджу біля дверей» форма сиджу показує..."
        options:
          - дієслівне чергування в першій особі однини
          - мішану групу іменника
          - pluralia tantum
        correct: 0
        explanation: "Сидіти дає форму я сиджу з чергуванням д - дж."
      - question: "У формі дверей головне правило таке:"
        options:
          - це родовий відмінок pluralia tantum
          - це орудний відмінок третьої відміни
          - це кличний відмінок мішаної групи
        correct: 0
        explanation: "Біля чого? біля дверей; слово двері має тільки множинну форму."
      - question: "Форма сторожем нормативна, бо..."
        options:
          - основа на шиплячий належить до мішаної групи
          - слово має тільки множину
          - це дієслово доконаного виду
        correct: 0
        explanation: "В орудному однини мішана група має закінчення -ем."
      - question: "Форма радістю пишеться без подвоєння, бо..."
        options:
          - перед закінченням є збіг приголосних
          - це слово pluralia tantum
          - це кличний відмінок
        correct: 0
        explanation: "У слові радість уже є збіг приголосних, тому подвоєння не з'являється."
      - question: "У парі тиждень - тижня бачимо..."
        options:
          - спрощення групи приголосних
          - зміну виду дієслова
          - форму орудного відмінка
        correct: 0
        explanation: "При творенні форми випадає зайвий приголосний у групі."
      - question: "У формі на руці головне явище таке:"
        options:
          - приголосне чергування к - ц у місцевому відмінку
          - спрощення приголосних
          - подвоєння третьої відміни
        correct: 0
        explanation: "Рука в місцевому відмінку дає форму на руці з чергуванням к - ц."
      - question: "Форма ніччю нормативна, бо..."
        options:
          - це орудний відмінок третьої відміни з подвоєнням
          - це родовий відмінок pluralia tantum
          - це форма мішаної групи на -ем
        correct: 0
        explanation: "Ніч має один кінцевий приголосний, тому в орудному з'являється подвоєння."
      - question: "У реченні «Ти водиш брата до школи» форма водиш показує..."
        options:
          - що чергування д - дж не переноситься на другу особу
          - що дієслово стало доконаним
          - що потрібен родовий відмінок
        correct: 0
        explanation: "Водити має я воджу, але ти водиш і він водить."
      - question: "У парі друг - друже бачимо..."
        options:
          - кличний відмінок із чергуванням г - ж
          - орудний відмінок із закінченням -ем
          - pluralia tantum без однини
        correct: 0
        explanation: "Кличний відмінок друг - друже показує приголосне чергування."
      - question: "Форма ліків у словосполученні до ліків є..."
        options:
          - родовим відмінком pluralia tantum після до
          - орудним відмінком третьої відміни
          - знахідним відмінком однини
        correct: 0
        explanation: "До вимагає родового відмінка; ліки мають форму ліків."
      - question: "У парі щастя - щасливий перевіряємо..."
        options:
          - спрощення приголосних ст - с
          - чергування к - ц
          - форму кличного відмінка
        correct: 0
        explanation: "Щастя - щасливий є типовим прикладом спрощення."
      - question: "У реченні «Я написав звіт і надіслав його» вид дієслова передає..."
        options:
          - завершений результат
          - повторюваний процес
          - множинне узгодження
        correct: 0
        explanation: "Написав і надіслав описують завершені дії з результатом."
  - id: act-2
    type: error-correction
    title: Знайдіть першу помилку
    instruction: Виправте форму й назвіть коротку причину.
    items:
      - sentence: "Ми говорили зі сторожом біля входу."
        error: "сторожом"
        correction: "сторожем"
        options:
          - сторожем
          - сторожа
          - сторожі
          - сторожу
        explanation: "Орудний відмінок мішаної групи має закінчення -ем."
      - sentence: "У мене немає гроші на дорогу."
        error: "гроші"
        correction: "грошей"
        options:
          - грошей
          - грошима
          - гроші
          - грошам
        explanation: "Немає чого? Потрібен родовий відмінок: грошей."
      - sentence: "Я водю бабусю до лікаря щоп'ятниці."
        error: "водю"
        correction: "воджу"
        options:
          - воджу
          - водиш
          - веду
          - водив
        explanation: "У формі я від водити відбувається чергування д - дж."
      - sentence: "Вона написала відповідь ноччю."
        error: "ноччю"
        correction: "вночі"
        options:
          - вночі
          - ніччю
          - ночі
          - ніч
        explanation: "У цьому контексті потрібно прислівникове коли? - вночі."
      - sentence: "Цей ліки допоміг швидко."
        error: "Цей ліки допоміг"
        correction: "Ці ліки допомогли"
        options:
          - Ці ліки допомогли
          - Цей лік допоміг
          - Ця ліка допомогла
          - Ці ліки допоміг
        explanation: "Ліки - pluralia tantum, тому узгодження стоїть у множині."
      - sentence: "Ти воджиш брата до школи щодня."
        error: "воджиш"
        correction: "водиш"
        options:
          - водиш
          - воджу
          - водить
          - водити
        explanation: "Чергування д - дж у цій моделі стоїть у формі я, не в формі ти."
      - sentence: "Ми чекали друга на рукі."
        error: "рукі"
        correction: "руці"
        options:
          - руці
          - рукою
          - руки
          - руке
        explanation: "У місцевому відмінку рука має чергування к - ц: на руці."
      - sentence: "Орудний відмінок слова ніч - нічю."
        error: "нічю"
        correction: "ніччю"
        options:
          - ніччю
          - ночі
          - нічю
          - вночі
        explanation: "Ніч у третій відміні має подвоєння в орудному відмінку."
      - sentence: "Він скаржився болем у вусі."
        error: "скаржився болем"
        correction: "скаржився на біль"
        options:
          - скаржився на біль
          - скаржився про біль
          - скаржився біль
          - скаржився з болем
        explanation: "Скаржитися керує конструкцією на + знахідний: на біль."
      - sentence: "У слові честний треба писати т."
        error: "честний"
        correction: "чесний"
        options:
          - чесний
          - честний
          - честьний
          - чесен
        explanation: "Честь - чесний показує спрощення ст - с."
      - sentence: "Ми говорили з лікаром після огляду."
        error: "лікаром"
        correction: "лікарем"
        options:
          - лікарем
          - лікаря
          - лікарю
          - лікарі
        explanation: "Нейтральна нормативна форма орудного відмінка - лікарем."
      - sentence: "До Карпатів ми поїхали після канікул."
        error: "Карпатів"
        correction: "Карпат"
        options:
          - Карпат
          - Карпатів
          - Карпати
          - Карпатами
        explanation: "До + родовий відмінок; нормативно до Карпат."
  - id: act-3
    type: fill-in
    title: Алгоритм форми
    instruction: Вставте нормативну форму за контекстом.
    items:
      - sentence: "Ми стояли біля ____ і чекали товариша."
        answer: "дверей"
        options:
          - дверей
          - двері
          - дверима
        explanation: "Біля + родовий відмінок; двері - pluralia tantum."
      - sentence: "Я щодня ____ окуляри в університеті."
        answer: "ношу"
        options:
          - ношу
          - носю
          - носиш
        explanation: "Носити має форму я ношу."
      - sentence: "Офіціант різав хліб гострим ____."
        answer: "ножем"
        options:
          - ножем
          - ножом
          - ножа
        explanation: "Ніж належить до мішаної групи: орудний ножем."
      - sentence: "Вона говорила про цю новину з ____."
        answer: "радістю"
        options:
          - радістю
          - радісстю
          - радісттю
        explanation: "Після збігу приголосних у третій відміні подвоєння не пишеться."
      - sentence: "Після ____ ми повторили всі форми."
        answer: "канікул"
        options:
          - канікул
          - канікули
          - канікулами
        explanation: "Після + родовий відмінок: після канікул."
      - sentence: "У місцевому відмінку від рука буде на ____."
        answer: "руці"
        options:
          - руці
          - рукі
          - рукою
        explanation: "Рука дає чергування к - ц у формі на руці."
      - sentence: "Кличний відмінок від друг - ____."
        answer: "друже"
        options:
          - друже
          - другу
          - друге
        explanation: "Друг має кличний друже з чергуванням г - ж."
      - sentence: "Я ____ бабусю до лікаря щоп'ятниці."
        answer: "воджу"
        options:
          - воджу
          - водю
          - водиш
        explanation: "У першій особі однини від водити маємо воджу."
      - sentence: "Він ____ звіт і одразу надіслав його."
        answer: "написав"
        options:
          - написав
          - писав
          - пише
        explanation: "Результат надіслав підказує доконаний вид написав."
      - sentence: "У слові ____ видно спрощення від честь."
        answer: "чесний"
        options:
          - чесний
          - честний
          - честьний
        explanation: "Честь - чесний показує спрощення ст - с."
      - sentence: "Лікар сказав лікуватися від ____."
        answer: "застуди"
        options:
          - застуди
          - застуду
          - застудою
        explanation: "Лікуватися від + родовий відмінок."
      - sentence: "Орудний відмінок від подорож - ____."
        answer: "подорожжю"
        options:
          - подорожжю
          - подорожю
          - подорожем
        explanation: "Подорож належить до третьої відміни й має подвоєння."
  - id: act-4
    type: match-up
    title: Форма і причина
    instruction: Поєднайте нормативну форму з поясненням.
    pairs:
      - left: "на руці"
        right: "місцевий відмінок із чергуванням к - ц"
      - left: "друже"
        right: "кличний відмінок із чергуванням г - ж"
      - left: "сторожем"
        right: "орудний відмінок мішаної групи"
      - left: "ніччю"
        right: "третя відміна з подвоєнням"
      - left: "кров'ю"
        right: "третя відміна без подвоєння після губного"
      - left: "дверей"
        right: "родовий відмінок pluralia tantum"
      - left: "ліків"
        right: "родовий відмінок pluralia tantum після до або немає"
      - left: "тижня"
        right: "спрощення приголосних у парі тиждень - тижня"
      - left: "чесний"
        right: "спрощення у парі честь - чесний"
      - left: "я воджу"
        right: "перша особа однини з чергуванням д - дж"
      - left: "я ношу"
        right: "перша особа однини з чергуванням с - ш"
      - left: "подорожжю"
        right: "третя відміна з подвоєнням після одного приголосного"
  - id: act-5
    type: group-sort
    title: Чотири кошики контрольної
    instruction: Розподіліть форми за тим, яке правило насамперед перевіряється.
    groups:
      - label: Дієслівне чергування
        items:
          - я воджу
          - я сиджу
          - я ношу
          - я роблю
      - label: Мішана група
        items:
          - сторожем
          - ножем
          - товаришем
          - плащем
      - label: Третя відміна
        items:
          - ніччю
          - радістю
          - кров'ю
          - сіллю
      - label: Pluralia tantum
        items:
          - дверей
          - грошей
          - ліків
          - Карпат
workbook:
  - id: wb-1
    type: quiz
    title: Діагностичний тест
    instruction: Оберіть правильну відповідь.
    items:
      - question: "Яке речення нормативне?"
        options:
          - "Я воджу машину щодня."
          - "Я водю машину щодня."
          - "Ти воджиш машину щодня."
          - "Він воджить машину щодня."
        correct: 0
        explanation: "Форма я від водити - воджу; інші особи мають водиш, водить."
      - question: "Яка форма орудного відмінка правильна?"
        options:
          - "з товаришем"
          - "з товаришом"
          - "з товаришу"
          - "з товариша"
        correct: 0
        explanation: "Товариш має основу на шиплячий, тому орудний - товаришем."
      - question: "Яка форма родового відмінка pluralia tantum правильна?"
        options:
          - "немає дверей"
          - "немає дверів"
          - "немає двері"
          - "немає дверям"
        correct: 0
        explanation: "Родовий відмінок слова двері - дверей."
      - question: "Де є спрощення?"
        options:
          - "тиждень - тижня"
          - "друг - друже"
          - "рука - на руці"
          - "ніч - ніччю"
        correct: 0
        explanation: "У формі тижня спрощується група приголосних."
      - question: "Яка форма третьої відміни неправильна?"
        options:
          - "радісстю"
          - "ніччю"
          - "сіллю"
          - "кров'ю"
        correct: 0
        explanation: "Правильно радістю, без подвоєння."
      - question: "Яка форма місцевого відмінка правильна?"
        options:
          - "на руці"
          - "на рукі"
          - "на рукою"
          - "на рука"
        correct: 0
        explanation: "Рука в місцевому відмінку має чергування к - ц."
      - question: "Яке речення правильно передає медичне керування?"
        options:
          - "Пацієнт скаржиться на біль."
          - "Пацієнт скаржиться болем."
          - "Пацієнт скаржиться про біль."
          - "Пацієнт скаржиться біль."
        correct: 0
        explanation: "Скаржитися вимагає конструкції на + знахідний."
      - question: "Яка форма кличного відмінка правильна?"
        options:
          - "друже"
          - "друге"
          - "другу"
          - "друг"
        correct: 0
        explanation: "Друг має кличний відмінок друже."
      - question: "Яка форма орудного відмінка від лікар правильна?"
        options:
          - "лікарем"
          - "лікаром"
          - "лікаря"
          - "лікарю"
        correct: 0
        explanation: "Нейтральна нормативна форма - лікарем."
      - question: "Яке пояснення для форми Карпат правильне?"
        options:
          - "родовий відмінок множинної географічної назви"
          - "орудний відмінок мішаної групи"
          - "кличний відмінок із чергуванням"
          - "форма третьої відміни з подвоєнням"
        correct: 0
        explanation: "До Карпат: прийменник до вимагає родового відмінка."
      - question: "Яке речення показує доконаний вид?"
        options:
          - "Я написав звіт і надіслав його."
          - "Я щодня пишу звіт."
          - "Я пишу звіт зараз."
          - "Я писав звіт цілу годину."
        correct: 0
        explanation: "Написав і надіслав називають завершені дії."
      - question: "Яка пара НЕ є спрощенням?"
        options:
          - "рука - на руці"
          - "тиждень - тижня"
          - "честь - чесний"
          - "щастя - щасливий"
        correct: 0
        explanation: "Рука - на руці є чергуванням к - ц, а не спрощенням."
  - id: wb-2
    type: group-sort
    title: Розпізнайте клас
    instruction: Розкладіть слова за граматичною поведінкою.
    groups:
      - label: Звичайні іменники
        items:
          - ключ
          - шкарпетка
          - лікар
          - рецепт
      - label: Мішана група
        items:
          - сторож
          - товариш
          - ніж
          - плащ
      - label: Третя відміна
        items:
          - ніч
          - радість
          - кров
          - сіль
      - label: Pluralia tantum
        items:
          - двері
          - гроші
          - ліки
          - окуляри
  - id: wb-3
    type: fill-in
    title: Відмінок у реченні
    instruction: Виберіть форму, яку вимагає контекст.
    items:
      - sentence: "Лікар дав інструкцію до ____."
        answer: "ліків"
        options:
          - ліків
          - ліки
          - ліками
        explanation: "До + родовий відмінок: до ліків."
      - sentence: "Ми розмовляли з ____ про контрольну."
        answer: "товаришем"
        options:
          - товаришем
          - товаришом
          - товариша
        explanation: "З ким? з товаришем."
      - sentence: "У кімнаті не було ____."
        answer: "окулярів"
        options:
          - окулярів
          - окуляри
          - окулярами
        explanation: "Не було чого? окулярів."
      - sentence: "Вона писала листа ____."
        answer: "вночі"
        options:
          - вночі
          - ніччю
          - ночі
        explanation: "Тут потрібна форма коли? - вночі."
      - sentence: "Ми милувалися тихою ____."
        answer: "ніччю"
        options:
          - ніччю
          - вночі
          - ночі
        explanation: "Милуватися чим? тихою ніччю."
      - sentence: "Після ____ пацієнт повернувся на роботу."
        answer: "хвороби"
        options:
          - хвороби
          - хворобою
          - хворобу
