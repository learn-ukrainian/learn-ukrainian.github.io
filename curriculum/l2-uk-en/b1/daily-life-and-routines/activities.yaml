    - вмиватися
    - виходити з дому
  - name: робота й навчання
    items:
    - електронна пошта
    - звіт
    - співбесіда
    - робоче місце
  - name: хатні справи
    items:
    - прати білизну
    - пилососити
    - витирати пил
    - виносити сміття
  - name: вільний час
    items:
    - кататися на велосипеді
    - дивитися серіал
    - вирощувати квіти
    - мандрувати
- id: act-8
  type: cloze
  title: День без запізнення
  instruction: Заповни пропуски формами, які підтримують логіку розкладу.
  text: Щоб не запізнитися, я {1} о шостій сорок пʼять. Спочатку {2}, потім швидко {3} і готую сніданок. Якщо звечора {4} сумку, вранці не {5}. На роботі я спершу {6} електронну пошту, а після обіду {7} звіт. Увечері посуд уже {8}, тому можна відпочити.
  blanks:
  - id: 1
    answer: прокидаюся
    options:
    - прокидаюся
    - прокинув
    - прокидаю
  - id: 2
    answer: вмиваюся
    options:
    - вмиваюся
    - вмиваю
    - умив
  - id: 3
    answer: одягаюся
    options:
    - одягаюся
    - одягаю
    - одягнув
  - id: 4
    answer: підготую
    options:
    - підготую
    - готуватиму
    - готуюся
  - id: 5
    answer: поспішаю
    options:
    - поспішаю
    - поспішаюся
    - поспішається
  - id: 6
    answer: перевіряю
    options:
    - перевіряю
    - переїжджаю
    - обговорюю
  - id: 7
    answer: допрацьовую
    options:
    - допрацьовую
    - приїжджаю
    - відпочиваю
  - id: 8
    answer: помито
    options:
    - помито
    - помився
    - помитий є
- id: act-9
  type: mark-the-words
  title: Зворотні дієслова в розпорядку
  instruction: Познач зворотні дієслова, які описують щоденні дії або стан.
  text: Щоранку я **прокидаюся** рано, **вмиваюся**, **одягаюся** і швидко **збираюся**. Якщо **запізнююся**, то починаю нервувати, але намагаюся не панікувати. Увечері я **займаюся** спортом, іноді **розважаюся** з друзями, а перед сном **готуюся** до наступного дня.
  target_words:
  - прокидаюся
  - вмиваюся
  - одягаюся
  - збираюся
  - запізнююся
  - займаюся
  - розважаюся
  - готуюся
- id: act-10
  type: order
  title: Робочий день за порядком
  instruction: Упорядкуй дії так, щоб вийшов природний робочий день.
  items:
  - Я прокидаюся о сьомій.
  - Я снідаю й виходжу з дому.
  - Я приїжджаю на роботу о девʼятій.
  - Я перевіряю електронну пошту.
  - Ми обговорюємо план з колегами.
  - Після обіду я допрацьовую звіт.
  - Увечері я повертаюся додому.
  - Перед сном я складаю план на завтра.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
- id: act-11
  type: quiz
  title: Вибір форми для плану
  instruction: Обери форму, яка найкраще пасує до ситуації.
  items:
  - prompt: До вечора кімната має бути чистою.
    options:
    - text: приберу
      correct: true
    - text: прибиратиму
      correct: false
    - text: прибираюся
      correct: false
    explanation: Межа до вечора підкреслює результат.
  - prompt: З другої до четвертої триватиме робота над звітом.
    options:
    - text: писатиму
      correct: true
    - text: напишу
      correct: false
    - text: написав би
      correct: false
    explanation: Проміжок часу потребує недоконаного виду.
  - prompt: Треба ввічливо попросити колегу допомогти.
    options:
    - text: Чи не могли б ви допомогти?
      correct: true
    - text: Хай ви допоможете?
      correct: false
    - text: Ви допоможи.
      correct: false
    explanation: Чи не могли б ви — ввічлива формула прохання.
  - prompt: Після прибирання хочемо коротко прозвітувати про результат.
    options:
    - text: Кімнату прибрано.
      correct: true
    - text: Кімната прибирається мною.
      correct: false
    - text: Кімната є прибрана мною.
      correct: false
    explanation: Форма -но/-то природна для звіту про завершення.
  - prompt: Друг пропонує разом піти на прогулянку.
    options:
    - text: Ходімо на прогулянку.
      correct: true
    - text: Ходимо на прогулянку.
      correct: false
    - text: Пішлися на прогулянку.
      correct: false
    explanation: Ходімо — природне запрошення до спільної дії.
  - prompt: Йдеться про регулярну суботню справу.
    options:
    - text: Щосуботи я перу білизну.
      correct: true
    - text: Щосуботи я виперу білизну.
      correct: false
    - text: Щосуботи я стираю білизну.
      correct: false
    explanation: Регулярність підтримує недоконаний вид; прати є нормативним.
  - prompt: Хтось постійно переносить завдання.
    options:
    - text: Він відкладає справи.
      correct: true
    - text: Він складає справи.
      correct: false
    - text: Він відкладається справами.
      correct: false
    explanation: Відкладати справи означає переносити їх.
  - prompt: Треба дати пораду людині, яка не встигає.
    options:
    - text: Плануй день заздалегідь.
      correct: true
    - text: Плануєш день заздалегідь.
      correct: false
    - text: Плануйся день заздалегідь.
      correct: false
    explanation: Наказовий спосіб природний для поради.
- id: act-12
  type: match-up
  title: Ситуація і граматична модель
  instruction: Поєднай ситуацію з природною граматичною моделлю.
  pairs:
  - left: звичка щоранку
    right: недоконаний вид у теперішньому часі
  - left: конкретний результат до вечора
    right: доконаний вид у майбутньому часі
  - left: довга дія з другої до пʼятої
    right: недоконаний вид для процесу
  - left: звіт без виконавця
    right: форма на -но/-то
  - left: ввічливе прохання до колеги
    right: чи не могли б ви
  - left: спільне запрошення
    right: форма на -імо
  - left: реальна умова на завтра
    right: якщо плюс майбутній час
  - left: нереальна умова
    right: якби плюс умовний спосіб
  - left: порада щодо часу
    right: наказовий спосіб
  - left: хобі після роботи
    right: зворотне дієслово займатися
  - left: завершені хатні справи
    right: результативний короткий звіт
  - left: перенесення завдання
    right: дієслово відкладати
- id: act-13
  type: fill-in
  title: Домовленість про вихідні
  instruction: Встав форму, яка робить домовленість природною.
  items:
  - sentence: Якщо завтра не буде дощу, ми ____ парком.
    answer: погуляємо
    options:
    - погуляємо
    - гуляли
    - гуляємося
    explanation: Реальна умова про майбутнє потребує майбутньої форми.
  - sentence: Якби я мав більше часу, я ____ спортом щодня.
    answer: займався б
    options:
    - займався б
    - займуся
    - займав спортом
    explanation: Нереальна умова потребує умовного способу й зворотної форми.
  - sentence: Після роботи ____ біля метро.
    answer: зустріньмося
    options:
    - зустріньмося
    - зустрічаємося
    - зустрінемосяся
    explanation: Зустріньмося — запрошення до спільної дії.
  - sentence: До приходу гостей я ____ пил.
    answer: витру
    options:
    - витру
    - витиратиму
    - витруся
    explanation: До приходу гостей підкреслює завершений результат.
  - sentence: Увесь ранок мама ____ їжу для родини.
    answer: готуватиме
    options:
    - готуватиме
    - приготує
    - приготовлено
    explanation: Увесь ранок називає процес.
  - sentence: 'Коли посуд буде чистий, скажемо: «Посуд ____».'
    answer: помито
    options:
    - помито
    - помився
    - помитиме
    explanation: Помито — короткий результативний звіт.
  - sentence: Не ____ важливі справи на вечір.
    answer: відкладай
    options:
    - відкладай
    - відкладаєш
    - відкладаєшся
    explanation: Для поради потрібен наказовий спосіб.
  - sentence: Чи не ____ ви перевірити цей звіт?
    answer: могли б
    options:
    - могли б
    - можеш
    - хай могли
    explanation: Чи не могли б ви — ввічлива формула прохання.
- id: act-14
  type: error-correction
  title: Побутові русизми й вид
  instruction: Виправ помилку в побутовій фразі або видовій формі.
  items:
  - sentence: У неділю я стираю білизну.
    error: стираю білизну
    correction: перу білизну
    options:
    - перу білизну
    - стираю білизну
    - виперу білизну
    explanation: У побутовому значенні нормативно прати білизну.
  - sentence: Старий пилесос зламався.
    error: пилесос
    correction: пилосос
    options:
    - пилосос
    - пилесос
    - пилососити
    explanation: Нормативна форма — пилосос.
  - sentence: До шостої я буду прибрати кімнату.
    error: буду прибрати
    correction: приберу
    options:
    - приберу
    - буду прибрати
    - буду прибирати
    explanation: Доконаний вид не поєднується з буду.
  - sentence: Увесь вечір ми помиємо посуд.
    error: помиємо
    correction: митимемо
    options:
    - митимемо
    - помиємо
    - будемо помити
    explanation: Увесь вечір підкреслює процес.
  - sentence: Я займаю спортом після роботи.
    error: займаю спортом
    correction: займаюся спортом
    options:
    - займаюся спортом
    - займаю спортом
    - займу спортом
    explanation: Для хобі потрібне зворотне дієслово займатися.
  - sentence: Вечерю є приготовлено.
    error: є приготовлено
    correction: приготовлено
    options:
    - приготовлено
    - є приготовлено
    - приготувала
    explanation: Для короткого звіту природна форма -но/-то.
  - sentence: Якщо будеш час, допоможи з посудом.
    error: будеш час
    correction: матимеш час
    options:
    - матимеш час
    - будеш час
    - маєш час
    explanation: Час можна мати; форма будеш час неприродна.
  - sentence: На вашому місці я виходжу раніше.
    error: я виходжу
    correction: я б виходив
    options:
    - я б виходив
    - я виходжу
    - я вийду
    explanation: Порада з дистанцією часто потребує умовного способу.
- id: act-15
  type: grammar-identify
  title: Намір, форма, результат
  instruction: Визнач граматичну модель і комунікативну функцію.
  items:
  - sentence: Я прокидаюся о сьомій.
    answer: зворотне дієслово; звичка в розпорядку дня
  - sentence: Завтра я прокинуся раніше.
    answer: доконаний вид; конкретний майбутній результат
  - sentence: Чи не могли б ви допомогти зі звітом?
    answer: ввічливе прохання; умовна форма могли б
  - sentence: Обговорімо це після обіду.
    answer: наказовий спосіб першої особи множини; спільна пропозиція
  - sentence: Посуд помито.
    answer: форма на -но/-то; результат без виконавця
  - sentence: Якщо буде час, приготуємо вечерю.
    answer: реальна умова; майбутній час
  - sentence: Якби я мав більше часу, мандрував би частіше.
    answer: нереальна умова; умовний спосіб
  - sentence: Не відкладайте важливі справи.
    answer: наказовий спосіб; порада щодо планування часу
- id: act-16
  type: essay-response
  title: Мій день і мої обовʼязки
  instruction: Напиши звʼязний опис дня з планом, порадою і коротким звітом.
  prompt: Опиши свій типовий день або день вигаданої людини. Згадай ранок, роботу чи навчання, хатні справи, вільний час і план на завтра. Використай щонайменше два зворотні дієслова, одну реальну умову з якщо, одну пораду в наказовому або умовному способі й одну форму на -но/-то.
  min_words: 130
  model_answer: >-
    Щоранку я прокидаюся о сьомій, вмиваюся, снідаю і виходжу з дому о восьмій. Після сніданку я перевіряю список справ і вирішую, що потрібно зробити до вечора. Якщо маю важливу зустріч, виходжу з дому раніше, щоб не запізнитися. На роботі спершу перевіряю електронну пошту, а потім обговорюю план із колегами. З другої до четвертої я працюватиму над звітом, а до кінця дня його допрацюю. Удома я мию посуд, витираю пил, перу білизну і готую просту вечерю. Коли все зроблено, можна сказати коротко: посуд помито, вечерю приготовлено, сміття винесено. На вашому місці я б планував день заздалегідь і записував три головні справи, бо так легше не відкладати дрібні обовʼязки. Увечері я займаюся спортом або розважаюся з друзями, але перед сном готуюся до наступного дня. Завтра я прокинуся раніше, підготую сумку й спокійно поснідаю.
  rubric:
  - criteria: зміст
    description: Є ранок, робота або навчання, хатні справи, вільний час і план.
    points: 3
  - criteria: граматика
    description: Використано зворотні дієслова, умову, пораду й форму -но/-то.
    points: 3
  - criteria: вид
    description: Звички, процеси й результати розрізнено природно.
    points: 2
  - criteria: лексика
    description: Побутова лексика нормативна, без русизмів на кшталт стирати білизну або пилесос.
    points: 2
