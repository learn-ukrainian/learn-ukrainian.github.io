  - id: wb-6
    type: quiz
    title: Вибір форми для плану
    instruction: Обери форму, яка найкраще пасує до ситуації.
    items:
      - question: До вечора кімната має бути чистою.
        options:
          - приберу
          - прибиратиму
          - прибираюся
        explanation: Межа до вечора підкреслює результат.
        correct: 0
      - question: З другої до четвертої триватиме робота над звітом.
        options:
          - писатиму
          - напишу
          - написав би
        explanation: Проміжок часу потребує недоконаного виду.
        correct: 0
      - question: Треба ввічливо попросити колегу допомогти.
        options:
          - Чи не могли б ви допомогти?
          - Хай ви допоможете?
          - Ви допоможи.
        explanation: Чи не могли б ви — ввічлива формула прохання.
        correct: 0
      - question: Після прибирання хочемо коротко прозвітувати про результат.
        options:
          - Кімнату прибрано.
          - Кімната прибирається мною.
          - Кімната є прибрана мною.
        explanation: Форма -но/-то природна для звіту про завершення.
        correct: 0
      - question: Друг пропонує разом піти на прогулянку.
        options:
          - Ходімо на прогулянку.
          - Ходимо на прогулянку.
          - Пішлися на прогулянку.
        explanation: Ходімо — природне запрошення до спільної дії.
        correct: 0
      - question: Йдеться про регулярну суботню справу.
        options:
          - Щосуботи я перу білизну.
          - Щосуботи я виперу білизну.
          - Щосуботи я стираю білизну.
        explanation: Регулярність підтримує недоконаний вид; прати є нормативним.
        correct: 0
      - question: Хтось постійно переносить завдання.
        options:
          - Він відкладає справи.
          - Він складає справи.
          - Він відкладається справами.
        explanation: Відкладати справи означає переносити їх.
        correct: 0
      - question: Треба дати пораду людині, яка не встигає.
        options:
          - Плануй день заздалегідь.
          - Плануєш день заздалегідь.
          - Плануйся день заздалегідь.
        explanation: Наказовий спосіб природний для поради.
        correct: 0
