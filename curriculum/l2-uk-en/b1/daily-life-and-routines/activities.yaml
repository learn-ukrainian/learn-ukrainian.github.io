version: '1.0'
module: daily-life-and-routines
level: b1
inline:
  - id: act-1
    type: fill-in
    title: Форми щоденного розпорядку
    instruction: Доповни речення правильною формою дієслова або сталого словосполучення.
    items:
      - sentence: Щоранку я ____ о пів на сьому, коли дзвонить будильник.
        answer: прокидаюся
        options:
          - прокидаюся
          - підводжуся
          - збираюся
        explanation: 'Ранкова дія має зворотне дієслово прокидатися: я прокидаюся.'
      - sentence: Після будильника ми швидко ____ і відкриваємо вікно.
        answer: підводимося
        options:
          - підводимося
          - підводимо
          - підвели
        explanation: Підводитися в цьому значенні є зворотним дієсловом.
      - sentence: Перед сніданком вона ____ і чистить зуби.
        answer: вмивається
        options:
          - вмивається
          - вмиває
          - умивали
        explanation: Йдеться про дію над собою, тому потрібна зворотна форма.
      - sentence: О восьмій ти ____ з дому чи ще снідаєш?
        answer: виходиш
        options:
          - виходиш
          - вийдеш
          - збираєшся
        explanation: Виходити з дому не є зворотним дієсловом.
      - sentence: На робочому місці колега спершу ____ електронну пошту.
        answer: перевіряє
        options:
          - перевіряє
          - обговорює
          - приїжджає
        explanation: Перевіряти пошту означає переглядати її, а не переїжджати.
      - sentence: Після обіду ми ____ звіт і вирішимо, що дописати.
        answer: обговоримо
        options:
          - обговоримо
          - перевіримо
          - приїдемо
        explanation: Префікс об- у дієслові обговорити передає завершене обговорення теми.
      - sentence: Перед співбесідою я ____ документи й оновлю резюме.
        answer: перевірю
        options:
          - перевірю
          - готуватиму
          - обговорю
        explanation: 'У ситуації підготовки потрібен доконаний результат: я перевірю документи.'
      - sentence: Увечері батько ____ посуд, а мама приготує чай.
        answer: помиє
        options:
          - помиє
          - митиме
          - переїде
        explanation: Посуд можна помити; зворотна форма тут не потрібна.
      - sentence: У суботу ми ____ білизну й розвішаємо її на балконі.
        answer: пратимемо
        options:
          - пратимемо
          - <!-- bad -->стиратимемо<!-- /bad -->
          - прасуватимемо
        explanation: Українською природно казати прати білизну, не <!-- bad -->стирати білизну<!-- /bad -->.
      - sentence: Щопʼятниці сестра ____ пил у вітальні.
        answer: витирає
        options:
          - витирає
          - прасує
          - переходить
        explanation: У сталому словосполученні кажемо витирати пил.
      - sentence: Якщо запізнюватимешся, ти не ____ на автобус.
        answer: встигнеш
        options:
          - встигнеш
          - відкладеш
          - розважишся
        explanation: Встигнути означає зробити щось у потрібний час.
      - sentence: Я часто ____ справи, тому щовечора складаю план на день.
        answer: відкладаю
        options:
          - відкладаю
          - відпочиваю
          - обідаю
        explanation: Відкладати справи означає переносити їх на пізніше.
  - id: act-2
    type: quiz
    title: Граматика фази 3 у побуті
    instruction: Обери форму або пояснення, яке найкраще відповідає ситуації.
    items:
      - question: Сусід шумить, а ти просиш тихіше закрити двері.
        options:
          - Зачини, будь ласка, двері тихіше.
          - <!-- bad -->Закрийся двері тихіше<!-- /bad -->.
          - Двері зачинено вчора.
        explanation: Для прямого прохання потрібен наказовий спосіб.
        correct: 0
      - question: Ти даєш пораду людині, яка постійно запізнюється.
        options:
          - На вашому місці я б виходив з дому раніше.
          - На вашому місці я виходжу з дому раніше.
          - Хай я вийду з дому раніше.
        explanation: 'Порада з дистанцією часто оформлюється умовним способом: я б виходив.'
        correct: 0
      - question: Після вечері тарілки вже чисті. Яке речення природне?
        options:
          - Посуд помито.
          - <!-- bad -->Посуд є помитий<!-- /bad -->.
          - <!-- bad -->Посуд помився сам<!-- /bad -->.
        explanation: Безособова форма на -но/-то природно підсумовує результат.
        correct: 0
      - question: Колега хоче запропонувати спільне обговорення після обіду.
        options:
          - Обговорімо це після обіду.
          - Обговоримо це після обіду.
          - <!-- bad -->Обговорюємося це після обіду<!-- /bad -->.
        explanation: Для спільної пропозиції використовуємо форму на -імо.
        correct: 0
      - question: Яка форма правильно називає процес навчання?
        options:
          - вивчення української мови
          - <!-- bad -->вивчати української мови<!-- /bad -->
          - <!-- bad -->вивчанням мова<!-- /bad -->
        explanation: Віддієслівний іменник вивчення керує родовим відмінком.
        correct: 0
      - question: Ти говориш про звичку на вихідних.
        options:
          - Я займаюся спортом у суботу.
          - <!-- bad -->Я займаю спортом у суботу<!-- /bad -->.
          - <!-- bad -->Я спортом займаюсяся<!-- /bad -->.
        explanation: У цьому значенні потрібне зворотне дієслово займатися.
        correct: 0
      - question: Треба описати готову вечерю без називання виконавця.
        options:
          - Вечерю приготовлено.
          - Вечеря приготовилася.
          - <!-- bad -->Вечерю є приготовлена<!-- /bad -->.
        explanation: Форма -но/-то фокусує результат, а не виконавця.
        correct: 0
      - question: Яка пара найкраще показує аспектний контраст у хатніх справах?
        options:
          - мити посуд — помити посуд
          - <!-- bad -->стирати білизну — постірати білизну<!-- /bad -->
          - пилосос — пилососити
        explanation: Мити описує процес, помити — завершений результат.
        correct: 0
      - question: 'У розкладі написано: зустріч о восьмій. Яке речення показує ризик?'
        options:
          - Ми можемо запізнитися.
          - <!-- bad -->Ми можемо опіздатися<!-- /bad -->.
          - Ми можемо відпочитися.
        explanation: Запізнитися — нормативне дієслово для приходу пізніше потрібного часу.
        correct: 0
      - question: Ти пропонуєш другові піти в кіно разом.
        options:
          - Ходімо в кіно!
          - Ходимо в кіно!
          - <!-- bad -->Підемося в кіно<!-- /bad -->!
        explanation: Ходімо — наказова форма першої особи множини для спільної дії.
        correct: 0
      - question: Яке речення правильно розподіляє обовʼязки в родині?
        options:
          - Нехай Олег винесе сміття, а я помию посуд.
          - <!-- bad -->Нехай я винесеш сміття<!-- /bad -->.
          - Хай посуд помиє мене.
        explanation: Хай/нехай уживається з формою третьої особи або природним підметом.
        correct: 0
      - question: Ти описуєш довгу роботу над завданням завтра з другої до пʼятої.
        options:
          - Ми працюватимемо над завданням.
          - Ми попрацюємо над завданням.
          - <!-- bad -->Ми будемо попрацювати<!-- /bad --> над завданням.
        explanation: Проміжок часу підказує недоконаний вид і процес.
        correct: 0
  - id: act-3
    type: match-up
    title: 'Хатні справи: дія і результат'
    instruction: Поєднай хатню справу з природним описом або результатом.
    pairs:
      - left: прибирати кімнату
        right: наводити лад у просторі
      - left: помити посуд
        right: зробити тарілки й чашки чистими
      - left: прати білизну
        right: очищати одяг у пральній машині або вручну
      - left: прасувати сорочку
        right: вирівнювати тканину праскою
      - left: пилососити килим
        right: прибирати пил пилососом
      - left: витирати пил
        right: протирати полиці або стіл вологою ганчіркою
      - left: виносити сміття
        right: нести пакет до контейнера
      - left: готувати їжу
        right: робити страву на сніданок або вечерю
      - left: Посуд помито.
        right: результат уже є, виконавця не названо
      - left: Білизну випрано.
        right: підсумок завершеного прання
      - left: Вечерю приготовлено.
        right: безособове повідомлення про готову страву
      - left: розподіляти обовʼязки
        right: домовлятися, хто що робитиме
  - id: act-4
    type: match-up
    title: Плани, розклад і умови
    instruction: Поєднай набір слів із природним реченням.
    pairs:
      - left: плануй / все, / Якщо / заздалегідь. / хочеш / встигати
        right: Якщо хочеш встигати все, плануй заздалегідь.
      - left: я / склав / На / б / місці / день. / план / вашому / на
        right: На вашому місці я б склав план на день.
      - left: кожен / свій / Хай / запише / розклад.
        right: Хай кожен запише свій розклад.
      - left: пів / вмиюся / сьому / О / на / й / поснідаю.
        right: О пів на сьому вмиюся й поснідаю.
      - left: о / дому / восьмій, / з / не / Вийди / щоб / запізнитися.
        right: Вийди з дому о восьмій, щоб не запізнитися.
      - left: після / Обговорімо / це / обіду.
        right: Обговорімо це після обіду.
      - left: ви / Чи / могли / не / б / допомогти / з / цим / звітом?
        right: Чи не могли б ви допомогти з цим звітом?
      - left: буде / Якщо / час, / помиємо / посуд.
        right: Якщо буде час, помиємо посуд.
      - left: не / Старайся / відкладати / справи.
        right: Старайся не відкладати справи.
      - left: зустріньмося / Після / й / роботи / погуляймо / парком.
        right: Після роботи зустріньмося й погуляймо парком.
      - left: я / б / Якби / завтра / мав / час, / я / попрасував / сорочку.
        right: Якби завтра я мав час, я б попрасував сорочку.
      - left: спершу / Якщо / хочемо / навести / лад, / витрімо / пил.
        right: Якщо хочемо навести лад, спершу витрімо пил.
  - id: act-5
    type: error-correction
    title: Редагування повсякденного мовлення
    instruction: Знайди помилку в реченні й виправ її природною українською формою.
    items:
      - sentence: У суботу треба стирати білизну.
        error: стирати білизну
        correction: У суботу треба прати білизну.
        explanation: У нормативній українській уживаємо прати білизну.
      - sentence: Новий пилесос стоїть у коридорі.
        error: пилесос
        correction: Новий пилосос стоїть у коридорі.
        explanation: 'Правильна форма іменника: пилосос.'
      - sentence: З другої до третьої ми помиємо посуд.
        error: помиємо
        correction: З другої до третьої ми митимемо посуд.
        explanation: Проміжок часу підказує процес, тому потрібен недоконаний вид.
      - sentence: До восьмої ми будемо помити посуд.
        error: будемо помити
        correction: До восьмої ми помиємо посуд.
        explanation: Доконаний вид має просту форму майбутнього часу.
      - sentence: Я маю 20 років.
        error: Я маю 20 років.
        correction: Мені 20 років.
        explanation: 'Вік українською передаємо безособово: мені 20 років.'
      - sentence: Без десяти шість.
        error: Без десяти шість.
        correction: За десять шоста.
        explanation: 'Для часу перед повною годиною нормативна модель: за десять шоста.'
      - sentence: Я дякую мій однокласник.
        error: Я дякую мій однокласник.
        correction: Я дякую моєму однокласникові.
        explanation: Дякувати керує давальним відмінком адресата подяки.
      - sentence: Він навчається робототехніку на курсі.
        error: робототехніку
        correction: Він навчається робототехніки на курсі.
        explanation: 'Навчатися вимагає родового відмінка: навчатися чого?'
      - sentence: Я хворію грипом.
        error: Я хворію грипом.
        correction: Я хворію на грип.
        explanation: Із назвами хвороб уживаємо керування хворіти на що?
      - sentence: Вона сміється на мене.
        error: Вона сміється на мене.
        correction: Вона сміється з мене.
        explanation: Нормативна модель — сміятися з когось.
      - sentence: Увечері я відпочиваюся після роботи.
        error: відпочиваюся
        correction: Увечері я відпочиваю після роботи.
        explanation: Відпочивати у звичайному значенні не є зворотним дієсловом.
      - sentence: Я займаю спортом щосуботи.
        error: займаю спортом
        correction: Я займаюся спортом щосуботи.
        explanation: У значенні хобі потрібне зворотне дієслово займатися.
workbook:
  - id: wb-1
    type: true-false
    title: Самоперевірка щоденних форм
    instruction: Познач, чи правильне твердження.
    items:
      - statement: У словосполученні прати білизну дієслово прати є нормативним.
        correct: true
        explanation: Прати білизну — природна українська побутова сполука.
      - statement: Слово пилесос є нормативним відповідником до vacuum cleaner.
        correct: false
        explanation: Нормативна форма — пилосос.
      - statement: У реченні «Я прокидаюся о сьомій» дієслово зворотне.
        correct: true
        explanation: Прокидатися має постфікс -ся.
      - statement: Речення «Посуд помито» називає виконавця дії.
        correct: false
        explanation: Форма -но/-то подає результат без виконавця.
      - statement: «Ходімо в кіно» є природною формою спільного запрошення.
        correct: true
        explanation: Форма на -імо пропонує спільну дію.
      - statement: «Якби я мав час, я б приготував вечерю» виражає нереальну умову.
        correct: true
        explanation: Якби + умовний спосіб описує гіпотетичну ситуацію.
      - statement: «З другої до пʼятої я напишу звіт» найкраще передає довгий процес.
        correct: false
        explanation: Для проміжку часу природніше писатиму звіт.
      - statement: «Відкладати справи» означає переносити їх на пізніше.
        correct: true
        explanation: Це ключова лексика планування часу.
  - id: wb-2
    type: group-sort
    title: Розклади, справи, відпочинок
    instruction: Розподіли слова й фрази за сферою щоденного життя.
    groups:
      - label: ранок і розпорядок
        items:
          - будильник
          - прокидатися
          - вмиватися
          - виходити з дому
      - label: робота й навчання
        items:
          - електронна пошта
          - звіт
          - співбесіда
          - робоче місце
      - label: хатні справи
        items:
          - прати білизну
          - пилососити
          - витирати пил
          - виносити сміття
      - label: вільний час
        items:
          - кататися на велосипеді
          - дивитися серіал
          - вирощувати квіти
          - мандрувати
  - id: wb-3
    type: cloze
    title: День без запізнення
    instruction: Заповни пропуски формами, які підтримують логіку розкладу.
    text: Щоб не запізнитися, я {1} о шостій сорок пʼять. Спочатку {2}, потім швидко {3} і готую сніданок. Якщо звечора {4} сумку, вранці не {5}. На роботі я спершу {6} електронну пошту, а після обіду {7} звіт. Увечері посуд уже {8}, тому можна відпочити.
    blanks:
      - id: 1
        answer: прокидаюся
        options:
          - прокидаюся
          - прокинув
          - прокидаю
      - id: 2
        answer: вмиваюся
        options:
          - вмиваюся
          - вмиваю
          - умив
      - id: 3
        answer: одягаюся
        options:
          - одягаюся
          - одягаю
          - одягнув
      - id: 4
        answer: підготую
        options:
          - підготую
          - готуватиму
          - готуюся
      - id: 5
        answer: поспішатиму
        options:
          - поспішатиму
          - поспішаюся
          - поспішається
      - id: 6
        answer: перевіряю
        options:
          - перевіряю
          - переїжджаю
          - обговорюю
      - id: 7
        answer: допрацьовую
        options:
          - допрацьовую
          - приїжджаю
          - відпочиваю
      - id: 8
        answer: помито
        options:
          - помито
          - помився
          - помитий є
  - id: wb-4
    type: mark-the-words
    title: Зворотні дієслова в розпорядку
    instruction: Познач зворотні дієслова, які описують щоденні дії або стан.
    text: Щоранку я **прокидаюся** рано, **вмиваюся**, **одягаюся** і швидко **збираюся**. Якщо **запізнююся**, то починаю нервувати, але намагаюся не панікувати. Увечері я **займаюся** спортом, іноді **розважаюся** з друзями, а перед сном **готуюся** до наступного дня.
    target_words:
      - прокидаюся
      - вмиваюся
      - одягаюся
      - збираюся
      - запізнююся
      - намагаюся
      - займаюся
      - розважаюся
      - готуюся
  - id: wb-5
    type: order
    title: Робочий день за порядком
    instruction: Упорядкуй дії так, щоб вийшов природний робочий день.
    items:
      - Я прокидаюся о сьомій.
