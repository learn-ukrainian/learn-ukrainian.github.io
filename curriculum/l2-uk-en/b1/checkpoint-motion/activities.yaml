version: '1.0'
module: checkpoint-motion
level: b1
inline:
  - id: act-1
    type: quiz
    title: Прийменник і відмінок
    instruction: Оберіть граматично природний варіант.
    items:
      - question: "Кав'ярня розташована ___ вокзалу."
        options:
          - "біля вокзалу"
          - "біля вокзал"
          - "біля вокзалом"
        correct: 0
        explanation: Біля вимагає родового відмінка.
      - question: "Ми чекали ___ університетом."
        options:
          - "перед"
          - "до"
          - "через"
        correct: 0
        explanation: Перед університетом описує місце й орудний відмінок.
      - question: "Таксі зупинилося ___ мостом."
        options:
          - "під"
          - "до"
          - "через"
        correct: 0
        explanation: Під мостом відповідає на питання де.
      - question: "Водій повернув машину ___ будинок."
        options:
          - "за"
          - "біля"
          - "серед"
        correct: 0
        explanation: За будинок показує напрямок за орієнтир.
      - question: "Стежка йде ___ ліс."
        options:
          - "через"
          - "навпроти"
          - "серед"
        correct: 0
        explanation: Через ліс показує шлях крізь простір.
      - question: "Музей стоїть ___ театру."
        options:
          - "навпроти"
          - "між"
          - "під"
        correct: 0
        explanation: Навпроти театру потребує родового відмінка.
      - question: "Ми сиділи ___ двома студентами."
        options:
          - "між"
          - "через"
          - "повз"
        correct: 0
        explanation: Між двома студентами має орудний відмінок.
      - question: "Автобус проїхав ___ школу."
        options:
          - "повз"
          - "серед"
          - "біля"
        correct: 0
        explanation: Повз школу означає рух мимо орієнтира.
      - question: "Вони живуть ___ парком."
        options:
          - "поруч із"
          - "через"
          - "повз"
        correct: 0
        explanation: Поруч із парком описує близьке місце.
      - question: "Покладіть квиток ___ паспорт."
        options:
          - "під"
          - "під час"
          - "навпроти"
        correct: 0
        explanation: Під паспорт відповідає на питання куди.
      - question: "Слово навколо є прийменником у реченні:"
        options:
          - "Дерева росли навколо будинку."
          - "Діти стояли навколо."
          - "Навколо було тихо."
        correct: 0
        explanation: Є залежний іменник будинку.
      - question: "Найкраща пара для контрасту місця й напрямку:"
        options:
          - "під мостом / під міст"
          - "біля мосту / біля міст"
          - "серед лісу / серед ліс"
        correct: 0
        explanation: Орудний описує місце, знахідний - напрямок.
  - id: act-2
    type: fill-in
    title: Базові пари руху
    instruction: Вставте форму, яка відповідає контексту.
    items:
      - sentence: "Я зараз ____ до метро. (іти)"
        answer: іду
        options:
          - іду
          - ходжу
          - їжджу
        explanation: Зараз і один напрямок - іду.
      - sentence: "Щосереди я ____ до басейну. (ходити)"
        answer: ходжу
        options:
          - ходжу
          - іду
          - піду
        explanation: Щосереди означає регулярну дію.
      - sentence: "Олена сьогодні ____ до Чернівців поїздом. (їхати)"
        answer: їде
        options:
          - їде
          - їздить
          - ходить
        explanation: Одна конкретна поїздка.
      - sentence: "Вона часто ____ до Чернівців у відрядження. (їздити)"
        answer: їздить
        options:
          - їздить
          - їде
          - іде
        explanation: Часто означає повторювані поїздки.
      - sentence: "Дитина ____ до автобуса, бо він уже відходить. (бігти)"
        answer: біжить
        options:
          - біжить
          - бігає
          - ходить
        explanation: Конкретний рух у момент мовлення.
      - sentence: "Марко ____ у парку щоранку. (бігати)"
        answer: бігає
        options:
          - бігає
          - біжить
          - їде
        explanation: Щоранку означає звичку.
      - sentence: "Я ____ валізу до вагона. (нести)"
        answer: несу
        options:
          - несу
          - ношу
          - веду
        explanation: Один напрямок з предметом.
      - sentence: "Вона завжди ____ із собою словник. (носити)"
        answer: носить
        options:
          - носить
          - несе
          - веде
        explanation: Завжди означає звичку.
      - sentence: "Літак ____ до Варшави о дев'ятій. (летіти)"
        answer: летить
        options:
          - летить
          - літає
          - пливе
        explanation: Конкретний рейс має летить.
      - sentence: "Пілот часто ____ цим маршрутом. (літати)"
        answer: літає
        options:
          - літає
          - летить
          - їде
        explanation: Часто показує регулярність.
      - sentence: "Пором ____ до острова. (пливти)"
        answer: пливе
        options:
          - пливе
          - плаває
          - летить
        explanation: Є один напрямок до острова.
      - sentence: "Діти ____ у басейні після уроків. (плавати)"
        answer: плавають
        options:
          - плавають
          - пливуть
          - їздять
        explanation: У басейні рух різноспрямований або тренувальний.
  - id: act-3
    type: match-up
    title: Префікс і значення
    instruction: Поєднайте форму з просторовим або переносним значенням.
    pairs:
      - left: приїхати до Львова
        right: прибути в місто
      - left: доїхати до вокзалу
        right: досягти пункту призначення
      - left: поїхати в Одесу
        right: вирушити в дорогу
      - left: від'їхати від дому
        right: віддалитися від початкової точки
      - left: зайти в аптеку
        right: увійти або коротко відвідати
      - left: вийти з метро
        right: залишити простір
      - left: перейти вулицю
        right: перетнути на інший бік
      - left: проїхати повз театр
        right: рухатися мимо орієнтира
      - left: обійти будинок
        right: пройти навколо
      - left: підійти до вікна
        right: наблизитися
      - left: перепливти річку
        right: перетнути воду
      - left: обійтися без таксі
        right: впоратися без чогось
  - id: act-4
    type: group-sort
    title: Пряме чи переносне?
    instruction: Розподіліть вирази за типом уживання.
    groups:
      - label: "Прямий рух"
        items:
          - літак летить до Варшави
          - пором пливе до острова
          - студент іде до метро
      - label: "Нейтральне переносне"
        items:
          - дощ іде
          - урок іде
          - йдеться про маршрут
      - label: "Швидкість або поширення"
        items:
          - час летить
          - новина облетіла місто
          - ціни злетіли
      - label: "Абстрактні префікси"
        items:
          - план не вийшов
          - цей час підходить
          - ми дійшли до висновку
  - id: act-5
    type: error-correction
    title: Редакторська діагностика
    instruction: Виправте одну головну помилку в кожному реченні.
    items:
      - sentence: "Кав'ярня розташована біля вокзал."
        error: вокзал
        correction: "Кав'ярня розташована біля вокзалу."
        explanation: Біля потребує родового відмінка.
      - sentence: "Ми чекали автобус під міст."
        error: під міст
        correction: "Ми чекали автобус під мостом."
        explanation: Очікування описує місце, тому потрібен орудний відмінок.
      - sentence: "Я щодня іду до університету пішки."
        error: іду
        correction: "Я щодня ходжу до університету пішки."
        explanation: Щодня означає регулярний рух.
      - sentence: "Олена зараз їздить до вокзалу."
        error: їздить
        correction: "Олена зараз їде до вокзалу."
        explanation: Зараз і один напрямок потребують їде.
      - sentence: "Ми прийшли до Львова поїздом."
        error: прийшли
        correction: "Ми приїхали до Львова поїздом."
        explanation: Транспортний рух осіб потребує приїхали, а не прийшли.
      - sentence: "Ми перейшли повз театр."
        error: перейшли
        correction: "Ми пройшли повз театр."
        explanation: Повз вимагає руху мимо, не перетину.
      - sentence: "Таксі проїхало через будинок."
        error: через будинок
        correction: "Таксі проїхало повз будинок."
        explanation: Будинок не перетинають як маршрут, природно повз будинок.
      - sentence: "Катер переплавав річку за десять хвилин."
        error: переплавав
        correction: "Катер переплив річку за десять хвилин."
        explanation: Для одного перетину водойми потрібне переплив.
      - sentence: "Літак літав до Варшави о дев'ятій ранку."
        error: літав
        correction: "Літак летів до Варшави о дев'ятій ранку."
        explanation: Конкретний рейс у напрямку - летів.
      - sentence: "У статті ходиться про подорож Україною."
        error: ходиться
        correction: "У статті йдеться про подорож Україною."
        explanation: Нейтральна безособова форма - йдеться про.
      - sentence: "На канікулах час літає."
        error: літає
        correction: "На канікулах час летить."
        explanation: Про швидкий плин часу кажемо час летить.
      - sentence: "Команда носить переговори з перевізником."
        error: носить
        correction: "Команда веде переговори з перевізником."
        explanation: Переговори ведуть.
workbook:
  - id: wb-1
    type: quiz
    title: Змішаний тест блоку руху
    instruction: Оберіть правильну діагностику або форму.
    items:
      - question: "У реченні 'під мостом' прийменник показує:"
        options:
          - "місце й орудний відмінок"
          - "напрямок і знахідний відмінок"
          - "рух повз орієнтир"
        correct: 0
        explanation: Під мостом відповідає на питання де.
      - question: "У реченні 'під міст' прийменник показує:"
        options:
          - "напрямок і знахідний відмінок"
          - "місце й орудний відмінок"
          - "родовий після біля"
        correct: 0
        explanation: Під міст відповідає на питання куди.
      - question: "Найкраще для регулярної дії:"
        options:
          - "Я щодня ходжу до офісу."
          - "Я щодня іду до офісу."
          - "Я щодня прийду до офісу."
        correct: 0
        explanation: Щодня потребує ходжу.
      - question: "Найкраще для конкретної поїздки:"
        options:
          - "Сьогодні ми їдемо до Полтави."
          - "Сьогодні ми їздимо до Полтави."
          - "Сьогодні ми ходимо поїздом до Полтави."
        correct: 0
        explanation: Сьогодні в одному маршруті - їдемо.
      - question: "Префікс при- у 'прилетіти' означає:"
        options:
          - "прибуття"
          - "рух повз"
          - "вихід"
        correct: 0
        explanation: Прилетіти - прибути повітрям.
      - question: "Префікс про- у 'проїхати повз вокзал' означає:"
        options:
          - "рух мимо орієнтира"
          - "рух навколо"
          - "вхід"
        correct: 0
        explanation: Повз підказує про-.
      - question: "Правильна пара:"
        options:
          - "зайти в магазин / вийти з магазину"
          - "зайти з магазину / вийти в магазин"
          - "підійти через магазин / обійти до магазину"
        correct: 0
        explanation: За- вхід, ви- вихід.
      - question: "Пряме значення:"
        options:
          - "птах летить над лісом"
          - "час летить на вихідних"
          - "новина облетіла місто"
        correct: 0
        explanation: Птах справді рухається в повітрі.
      - question: "Нейтральна форма для теми тексту:"
        options:
          - "У тексті йдеться про транспорт."
          - "У тексті ходиться про транспорт."
          - "У тексті їздиться про транспорт."
        correct: 0
        explanation: Йдеться про називає тему.
      - question: "Природний варіант для погоди:"
        options:
          - "Йде дощ."
          - "Дощ ходить."
          - "Дощ їздить."
        correct: 0
        explanation: Для погоди природно йде дощ.
      - question: "Офіційно-діловий сталий вислів:"
        options:
          - "нести відповідальність"
          - "ходити відповідальність"
          - "їздити відповідальність"
        correct: 0
        explanation: Відповідальність несуть.
      - question: "Розмовний фразеологізм:"
        options:
          - "водити за ніс"
          - "вести за паспорт"
          - "носити за маршрут"
        correct: 0
        explanation: Водити за ніс означає обманювати.
  - id: wb-2
    type: fill-in
    title: Префікси й прийменники
    instruction: Заповніть пропуск правильною формою.
    items:
      - sentence: "Ми ____ з дому о сьомій. (вийти)"
        answer: вийшли
        options:
          - вийшли
          - зайшли
          - перейшли
      - sentence: "Потім ____ до зупинки. (піти)"
        answer: пішли
        options:
          - пішли
          - відійшли
          - обійшли
      - sentence: "Автобус ____ до вокзалу за двадцять хвилин. (доїхати)"
        answer: доїхав
        options:
          - доїхав
          - заїхав
          - від'їхав
      - sentence: "Поїзд ____ від платформи рівно о восьмій. (від'їхати)"
        answer: від'їхав
        options:
          - від'їхав
          - приїхав
          - під'їхав
      - sentence: "Ми ____ до Львова опівдні. (приїхати)"
        answer: приїхали
        options:
          - приїхали
          - проїхали
          - виїхали
      - sentence: "У центрі ми ____ у кав'ярню. (зайти)"
        answer: зайшли
        options:
          - зайшли
          - вийшли
          - переплили
      - sentence: "Після кави ми ____ з кав'ярні. (вийти)"
        answer: вийшли
        options:
          - вийшли
          - зайшли
          - підійшли
      - sentence: "Пішоходи ____ вулицю на переході. (перейти)"
        answer: перейшли
        options:
          - перейшли
          - пройшли
          - обійшли
      - sentence: "Трамвай ____ повз театр. (проїхати)"
        answer: проїхав
        options:
          - проїхав
          - переїхав
          - під'їхав
      - sentence: "Ми ____ площу по колу. (обійти)"
        answer: обійшли
        options:
          - обійшли
          - підійшли
          - дійшли
      - sentence: "Екскурсовод ____ до пам'ятника. (підійти)"
        answer: підійшов
        options:
          - підійшов
          - відійшов
          - проїхав
      - sentence: "Увечері нам ____ ідея залишитися ще на день. (прийти)"
        answer: прийшла
        options:
          - прийшла
          - підійшла
          - вийшла
  - id: wb-3
    type: group-sort
    title: Групи префіксів
    instruction: Розподіліть дієслова за значенням префікса.
    groups:
      - label: "Прибуття / досягнення"
        items:
          - приїхати до міста
          - доїхати до вокзалу
          - допливти до берега
      - label: "Вирушання / віддалення"
        items:
          - поїхати в дорогу
          - відійти від дверей
          - відпливти від причалу
      - label: "Вхід / вихід / перетин"
        items:
          - зайти в метро
          - вийти з метро
          - перейти міст
      - label: "Повз / навколо / наближення"
        items:
          - проїхати повз театр
          - обійти будинок
          - підійти до вікна
  - id: wb-4
    type: cloze
    title: Подорож Україною
    instruction: Заповніть пропуски в короткій розповіді.
    text: "У суботу ми {1} з дому рано і {2} до зупинки. Автобус {3} до вокзалу за двадцять хвилин. На вокзалі ми {4} у потяг і {5} до Тернополя опівдні. У місті ми {6} центр, {7} в музей і {8} повз стару ратушу. Потім ми {9} до озера, а човен {10} до причалу. Увечері час {11}, але справи {12} добре."
    blanks:
      - id: 1
        answer: вийшли
        options:
          - вийшли
          - зайшли
          - перепливли
      - id: 2
        answer: пішли
        options:
          - пішли
          - ходили
          - їздили
      - id: 3
        answer: доїхав
        options:
          - доїхав
          - від'їхав
          - обійшов
      - id: 4
        answer: сіли
        options:
          - сіли
          - стали
          - пливли
      - id: 5
        answer: приїхали
        options:
          - приїхали
          - прийшли
          - перепливли
      - id: 6
        answer: обійшли
        options:
          - обійшли
          - під'їхали
          - відпливли
      - id: 7
        answer: зайшли
        options:
          - зайшли
          - вийшли
          - проїхали
      - id: 8
        answer: пройшли
        options:
          - пройшли
          - перейшли
          - прилетіли
      - id: 9
        answer: підійшли
        options:
          - підійшли
          - відійшли
          - облетіли
      - id: 10
        answer: підплив
        options:
          - підплив
          - прилетів
          - їздив
      - id: 11
        answer: летів
        options:
          - летів
          - літав
          - ходив
      - id: 12
        answer: йшли
        options:
          - йшли
          - ходили
          - їхали
  - id: wb-5
    type: match-up
    title: Вираз і пояснення
    instruction: Поєднайте вираз із поясненням.
    pairs:
      - left: дощ іде
        right: триває дощова погода
      - left: час летить
        right: час минає дуже швидко
      - left: йдеться про маршрут
        right: тема - маршрут
      - left: справи йдуть добре
        right: ситуація розвивається успішно
      - left: нести відповідальність
        right: бути відповідальним за результат
