- title: "Local B1 motion block modules"
  role: curriculum
  notes: "Контрольна робота повторює сертифіковані модулі B1.3: просторові прийменники, базові пари дієслів руху, префікси, подорож Україною, повітряний і водний рух, переносне значення."
- title: "B1 M34: Просторові прийменники"
  role: curriculum
  notes: "Безпосереднє джерело для повторення біля/серед/навпроти + родовий, між/над/під/за/перед + орудний, напрямку в/на/під/за + знахідний."
- title: "B1 M35: Рух: іти, їхати, бігти"
  role: curriculum
  notes: "Джерело для діагностики односпрямованих і різноспрямованих пар: іти/ходити, їхати/їздити, бігти/бігати, нести/носити."
- title: "B1 M36-M40: Motion prefixes"
  role: curriculum
  notes: "Серія модулів для префіксів при-, до-, пі-/по-, від-, за-, ви-, пере-, про-, об-, під- з дієсловами руху."
- title: "B1 M41: Летіти, пливти"
  role: curriculum
  notes: "Повторення руху в повітрі й на воді, включно з префіксальними формами прилетіти, вилетіти, перепливти, відпливти."
- title: "B1 M42: Час іде, дощ іде"
  role: curriculum
  notes: "Повторення прямого й переносного значення дієслів руху: дощ іде, час летить, справи йдуть, йдеться про."
- title: "Заболотний 7 клас 2024, розділ про прийменники"
  role: textbook
  notes: "Підручник розрізняє прийменники та співзвучні прислівники в контексті й показує модель 'дієслово + прийменник + іменник'."
  source_ref: "7-klas-ukrmova-zabolotnyi-2024, с.183-184"
- title: "Литвінова 7 клас 2024, §30"
  role: textbook
  notes: "Джерело для фонетичних варіантів прийменників: під/піді, над/наді, перед/переді, з/із/зі, в/у/уві."
  source_ref: "7-klas-ukrmova-litvinova-2024, §30"
- title: "Караман 10 клас 2018, §82"
  role: textbook
  notes: "Матеріал для повторення прийменниково-відмінкових форм і розрізнення просторових прийменників у реченні."
  source_ref: "10-klas-ukrmova-karaman-2018, §82"
