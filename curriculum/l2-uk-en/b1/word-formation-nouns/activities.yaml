  - id: wb-7
    type: essay-response
    title: Мініаналіз словотвірної мережі
    instruction: "Напишіть 6-8 речень про одну словотвірну мережу з уроку."
    prompt: "Виберіть одну основу або тему, наприклад читати, пекти, захистити, школа або праця. Назвіть щонайменше чотири пов'язані іменники, поясніть їхні значення і додайте один приклад, де форму не можна творити механічно."
    min_words: 90
    model_answer: "Я вибираю мережу читати. Від дієслова читати можна утворити слово читач, тобто людина, яка читає або користується бібліотекою. Жіноча форма - читачка, і вона природна, коли йдеться про конкретну жінку. Слово читання називає процес: читання статті тривало пів години. Слово читальня називає місце, де читають книжки, газети або документи. Усі ці слова пов'язані з однією дією, але мають різні значення: особа, жіноча назва особи, процес і місце. Водночас не треба механічно вигадувати слово *читник для людини або *читальник для приміщення. Якщо форма звучить дивно, краще перевірити словник або використати пояснення. Так учень бачить і систему, і межі цієї системи."
    rubric:
      - criteria: "Мережа"
        description: "Обрано одну основу або тему й утримано фокус."
        points: 2
      - criteria: "Форми"
        description: "Є щонайменше чотири доречні похідні іменники."
        points: 3
      - criteria: "Значення"
        description: "Пояснено різницю між особою, місцем, процесом або результатом."
        points: 3
      - criteria: "Обережність"
        description: "Є приклад, де механічне творення не підходить."
        points: 1
      - criteria: "Мова"
        description: "Текст зрозумілий, граматично охайний і відповідає рівню B1."
        points: 1
