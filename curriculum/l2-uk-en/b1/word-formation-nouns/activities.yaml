version: '1.0'
module: word-formation-nouns
level: b1
inline:
  - id: act-1
    type: quiz
    title: Тип похідного іменника
    instruction: "Оберіть правильне пояснення."
    items:
      - question: "Словотвір вивчає:"
        options:
          - "як утворюються нові слова"
          - "як змінюється час дієслова"
          - "як ставити наголос у реченні"
        correct: 0
        explanation: "Словотвір пояснює, від чого і за допомогою чого утворено слово."
      - question: "Мотивувальне слово для читач:"
        options:
          - "читати"
          - "читальня"
          - "читачка"
        correct: 0
        explanation: "Читач називає людину, яка читає."
      - question: "У слові працівник основне значення:"
        options:
          - "назва особи за діяльністю або сферою"
          - "назва приміщення"
          - "назва абстрактної якості"
        correct: 0
        explanation: "Працівник - людина, пов'язана з працею або роботою."
      - question: "Нормальна жіноча пара до працівник:"
        options:
          - "працівниця"
          - "працівникка"
          - "працева"
        correct: 0
        explanation: "Для цієї пари працює модель -ник - -ниця."
      - question: "Пекарня - це:"
        options:
          - "місце, пов'язане з пекарем або випіканням"
          - "жінка, яка пече хліб"
          - "абстрактна якість"
        correct: 0
        explanation: "Пекарня називає приміщення або заклад."
      - question: "Читальня найточніше означає:"
        options:
          - "місце для читання"
          - "людину, яка читає"
          - "короткий підпис"
        correct: 0
        explanation: "Суфікс -ня тут допомагає назвати приміщення."
      - question: "Прикарпаття має просторове значення:"
        options:
          - "територія при Карпатах"
          - "людина з Карпат"
          - "процес подорожі Карпатами"
        correct: 0
        explanation: "Префікс при- і формант допомагають передати просторовий зв'язок."
      - question: "Читання у реченні Читання тексту тривало довго є:"
        options:
          - "віддієслівним іменником"
          - "назвою особи"
          - "назвою міста"
        correct: 0
        explanation: "Читання називає дію як процес."
      - question: "Підпис на документі - це:"
        options:
          - "результат або знак, а не процес підписання"
          - "місце для підписування"
          - "жіноча назва особи"
        correct: 0
        explanation: "Підпис - короткий безафіксний іменник із конкретним значенням."
      - question: "Нормативний приклад абстрактного іменника на -ота:"
        options:
          - "доброта"
          - "добриність"
          - "чеснотасть"
        correct: 0
        explanation: "Доброта - стандартна українська форма; сумнівні кальки не використовуємо."
      - question: "Студентство найчастіше означає:"
        options:
          - "студентську спільноту або групу"
          - "одного студента"
          - "кімнату для студентів"
        correct: 0
        explanation: "Суфікс -ство може називати спільноту або явище."
      - question: "Найкраща стратегія з новою формою:"
        options:
          - "бачити модель, але перевіряти природність"
          - "додавати будь-який суфікс до будь-якої основи"
          - "уникати всіх похідних іменників"
        correct: 0
        explanation: "Словотвір дає прогноз, але норма й контекст залишаються важливими."
  - id: act-2
    type: match-up
    title: Основа і назва особи
    instruction: "Поєднайте мотивувальне слово або форму з природним похідним іменником."
    pairs:
      - left: "читати"
        right: "читач"
      - left: "слухати"
        right: "слухач"
      - left: "викладати"
        right: "викладач"
      - left: "відвідувати"
        right: "відвідувач"
      - left: "праця"
        right: "працівник"
      - left: "захист"
        right: "захисник"
      - left: "учитель"
        right: "учителька"
      - left: "пекар"
        right: "пекарка"
      - left: "журналіст"
        right: "журналістка"
      - left: "школа"
        right: "школяр"
      - left: "лікар"
        right: "лікарка"
      - left: "волонтер"
        right: "волонтерка"
  - id: act-3
    type: group-sort
    title: Особа, місце, процес
    instruction: "Розподіліть іменники за основним значенням."
    groups:
      - label: "Назви осіб"
        items:
          - читач
          - працівник
          - викладач
      - label: "Жіночі назви осіб"
        items:
          - працівниця
          - учителька
          - журналістка
      - label: "Назви місць"
        items:
          - пекарня
          - читальня
          - майстерня
      - label: "Процес або результат"
        items:
          - читання
          - відкриття
          - підпис
  - id: act-4
    type: fill-in
    title: Утворіть іменник
    instruction: "Вставте природний похідний іменник у контекст."
    items:
      - sentence: "В університеті працює досвідчений ____. (викладати)"
        answer: викладач
        options:
          - викладач
          - викладник
          - викладальня
        explanation: "Викладач - назва особи від викладати."
      - sentence: "У бібліотеці зареєструвалася нова ____. (читати)"
        answer: читачка
        options:
          - читачка
          - читальня
          - читанка
        explanation: "Для конкретної жінки природна форма читачка."
      - sentence: "У громадському центрі працює ____. (праця)"
        answer: працівниця
        options:
          - працівниця
          - працівникка
          - працева
        explanation: "Жіноча пара до працівник - працівниця."
      - sentence: "Вранці відкрилася нова ____. (пекар)"
        answer: пекарня
        options:
          - пекарня
          - пекарка
          - печальня
        explanation: "Пекарня - місце, пов'язане з випіканням або продажем хліба."
      - sentence: "На другому поверсі є тиха ____. (читати)"
        answer: читальня
        options:
          - читальня
          - читач
          - читання
        explanation: "Читальня - приміщення для читання."
      - sentence: "Поруч із класами працює шкільна ____. (їсти)"
        answer: їдальня
        options:
          - їдальня
          - їдач
          - їдність
        explanation: "Їдальня - місце, де їдять."
      - sentence: "____ виставки відбудеться о шостій. (відкрити)"
        answer: Відкриття
        options:
          - Відкриття
          - Відкривальня
          - Відкривачка
        explanation: "Відкриття тут називає подію."
      - sentence: "____ тексту тривало пів години. (читати)"
        answer: Читання
        options:
          - Читання
          - Читаня
          - Читач
        explanation: "Читання пишемо з подвоєним н."
      - sentence: "На договорі бракує ____. (підписати)"
        answer: підпису
        options:
          - підпису
          - підписання
          - підписника
        explanation: "На документі потрібен підпис як знак або результат."
      - sentence: "Українське ____ має важливу історію. (козак)"
        answer: козацтво
        options:
          - козацтво
          - козакня
          - козакість
        explanation: "Козацтво може називати історичну спільноту або явище."
      - sentence: "Його ____ допомогла сусідам. (добрий)"
        answer: доброта
        options:
          - доброта
          - добраність
          - добриня
        explanation: "Доброта - нормативний абстрактний іменник."
      - sentence: "Наша родина часто їздить у ____. (при + Карпати)"
        answer: Прикарпаття
        options:
          - Прикарпаття
          - Карпатник
          - Прикарпатник
        explanation: "Прикарпаття - територія при Карпатах."
  - id: act-5
    type: error-correction
    title: Редактор словотвору
    instruction: "Знайдіть штучну або неправильну форму й замініть її природною."
    items:
      - sentence: "Новий читник узяв книжку в бібліотеці."
        error: читник
        correction: читач
        explanation: "Людина, яка читає або користується бібліотекою, - читач."
      - sentence: "Працівникка центру пояснила розклад."
        error: Працівникка
        correction: Працівниця
        explanation: "Нормальна жіноча форма - працівниця."
      - sentence: "У дворі відкрили маленьку пекальню."
        error: пекальню
        correction: пекарню
        explanation: "Місце, де печуть або продають хліб, - пекарня."
      - sentence: "У школі облаштували нову навчальню для дорослих."
        error: навчальню
        correction: навчальний центр
        error_type: phrase
        explanation: "Для місця навчання природніші готові назви: школа, клас, аудиторія, навчальний центр."
      - sentence: "Читаня правил зайняло десять хвилин."
        error: Читаня
        correction: Читання
        explanation: "Віддієслівний іменник читання пишемо з подвоєним н."
      - sentence: "Відкритя виставки перенесли на п'ятницю."
        error: Відкритя
        correction: Відкриття
        explanation: "Відкриття пишемо з подвоєним т."
      - sentence: "Підписання на аркуші було нечітким."
        error: Підписання
        correction: Підпис
        explanation: "На аркуші видно підпис; підписання - процес або подія."
      - sentence: "Киянинка розповіла про новий маршрут."
        error: Киянинка
        correction: Киянка
        explanation: "Нормативна жіноча форма від киянин - киянка."
      - sentence: "Студентиство підтримало ініціативу."
        error: Студентиство
        correction: Студентство
        explanation: "Збірна назва спільноти - студентство."
      - sentence: "Майстерник ремонтує велосипеди в гаражі."
        error: Майстерник
        correction: Майстер
        explanation: "Для цієї ролі вже є усталене слово майстер."
      - sentence: "Підпис договору відбудеться завтра о десятій."
        error: Підпис
        correction: Підписання
        explanation: "Як календарна подія природніше підписання договору."
      - sentence: "У нас є кімната, де працюють майстри, тобто майстрівня."
        error: майстрівня
        correction: майстерня
        explanation: "Усталена назва такого місця - майстерня."
  - id: act-6
    type: cloze
    title: Словотвірний маршрут
    instruction: "Заповніть пропуски в поясненні."
    text: "Словотвір починається з {1} слова. У слові читач мотивувальним є {2}, а суфікс -ач називає {3}. Жіноча форма читач - {4}. Слово працівниця пов'язане з парою {5} - працівниця. Пекарня - це назва {6}, а читальня - місце для {7}. Віддієслівний іменник читання називає {8}. Відкриття може означати подію або {9}. Підпис часто є безафіксним іменником і називає видимий {10}. У слові студентство суфікс -ство називає {11}. Якщо форма звучить штучно, краще перевірити її за словником або замінити {12}."
    blanks:
      - id: 1
        answer: мотивувального
        options:
          - мотивувального
          - кличного
          - майбутнього
      - id: 2
        answer: читати
        options:
          - читати
          - читальня
          - читачка
      - id: 3
        answer: особу
        options:
          - особу
          - місце
          - відмінок
      - id: 4
        answer: читачка
        options:
          - читачка
          - читниця
          - читальна
      - id: 5
        answer: працівник
        options:
          - працівник
          - працівний
          - працяч
      - id: 6
        answer: місця
        options:
          - місця
          - часу
          - наказу
      - id: 7
        answer: читання
        options:
          - читання
          - підпису
          - козацтва
      - id: 8
        answer: процес
        options:
          - процес
          - професію
          - територію
      - id: 9
        answer: результат
        options:
          - результат
          - прикметник
          - займенник
      - id: 10
        answer: знак
        options:
          - знак
          - клас
          - народ
      - id: 11
        answer: спільноту
        options:
          - спільноту
          - кімнату
          - голосний
      - id: 12
        answer: словосполученням
        options:
          - словосполученням
          - наказом
          - часткою
workbook:
  - id: wb-1
    type: quiz
    title: Контроль моделей
    instruction: "Оберіть нормативну форму або пояснення."
    items:
      - question: "Правильна пара:"
        options:
          - "пекар - пекарка - пекарня"
          - "пекар - пекальниця - печальня"
          - "пекти - пекатель - пекальник"
        correct: 0
        explanation: "Це природний ланцюжок: особа, жіноча форма, місце."
      - question: "Правильна пара:"
        options:
          - "працівник - працівниця"
          - "працівник - працівникка"
          - "працівник - працівничка"
        correct: 0
        explanation: "У цій парі маємо -ник - -ниця."
      - question: "Який варіант називає місце?"
        options:
          - "майстерня"
          - "майстер"
          - "майстриня"
        correct: 0
        explanation: "Майстерня - місце роботи майстра або майстрині."
      - question: "Який варіант називає процес?"
        options:
          - "навчання"
          - "учителька"
          - "лікарня"
        correct: 0
        explanation: "Навчання - віддієслівний іменник."
      - question: "Який варіант найточніший для графічного знака на документі?"
        options:
          - "підпис"
          - "підписання"
          - "підписник"
        correct: 0
        explanation: "Підпис - результат або знак; підписання - процес."
      - question: "У слові Закарпаття префікс за- допомагає передати:"
        options:
          - "просторове відношення"
          - "жіночу форму"
          - "доконаний вид"
        correct: 0
        explanation: "Закарпаття історично пов'язане з простором за Карпатами."
      - question: "Яке слово не варто творити механічно?"
        options:
          - "викладачня"
          - "пекарня"
          - "читальня"
        correct: 0
        explanation: "Для місця роботи викладача вживаємо університет, аудиторія, курс тощо."
      - question: "Який варіант є жіночою назвою професії?"
        options:
          - "журналістка"
          - "журналістня"
          - "журналістість"
        correct: 0
        explanation: "Журналістка - природний фемінітив."
      - question: "У слові доброта маємо:"
        options:
          - "абстрактну якість"
          - "назву приміщення"
          - "назву мешканки міста"
        correct: 0
        explanation: "Доброта називає якість."
      - question: "Що означає безафіксний спосіб у прикладі підпис?"
        options:
          - "іменник утворено без нового суфікса"
          - "до слова додано -ня"
          - "слово стало прикметником"
        correct: 0
        explanation: "Підпис пов'язаний із підписати, але не має нового видимого суфікса."
      - question: "Найкраще пояснення для читачка:"
        options:
          - "жіноча назва особи від читач"
          - "місце для читання"
          - "процес читання"
        correct: 0
        explanation: "Читачка називає конкретну жінку або дівчину, яка читає."
      - question: "Що робити з сумнівною новою формою?"
        options:
          - "перевірити словник або замінити описом"
          - "залишити, якщо суфікс знайомий"
          - "завжди перекласти з англійської буквально"
        correct: 0
        explanation: "Природність важливіша за механічну схему."
  - id: wb-2
    type: fill-in
    title: Форми в реченні
    instruction: "Вставте потрібний іменник."
    items:
      - sentence: "До музею зайшов перший ____. (відвідувати)"
        answer: відвідувач
        options:
          - відвідувач
          - відвідування
          - відвідувальня
        explanation: "Відвідувач - назва особи."
      - sentence: "На лекції було двадцять ____. (слухати)"
        answer: слухачів
        options:
          - слухачів
          - слухань
          - слухалень
        explanation: "Слухачі - люди, які слухають курс або лекцію."
      - sentence: "Нова ____ курсу пояснила тему повільно. (викладати)"
        answer: викладачка
        options:
          - викладачка
          - викладниця
          - викладальня
        explanation: "Викладачка - природна жіноча форма."
      - sentence: "У лікарні працює молода ____. (лікар)"
        answer: лікарка
        options:
          - лікарка
          - лікарниця
          - лікарня
        explanation: "Лікарка - жінка-лікар; лікарня - місце."
      - sentence: "Після ремонту відкрилася велика ____. (майстер)"
        answer: майстерня
        options:
          - майстерня
          - майстерка
          - майстерність
        explanation: "Майстерня - місце для роботи майстра або майстрині."
      - sentence: "У старому корпусі є простора ____. (їсти)"
        answer: їдальня
        options:
          - їдальня
          - їдачка
          - їдність
        explanation: "Їдальня - приміщення для їжі."
      - sentence: "____ української потребує щоденної практики. (вивчати)"
        answer: Вивчення
        options:
          - Вивчення
          - Вивчіння
          - Вивчальник
        explanation: "Вивчення - віддієслівний іменник."
      - sentence: "____ поїзда оголосили по радіо. (прибути)"
        answer: Прибуття
