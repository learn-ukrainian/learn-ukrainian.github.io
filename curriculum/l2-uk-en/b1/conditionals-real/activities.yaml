version: '1.0'
module: conditionals-real
level: b1
inline:
  - id: act-1
    type: quiz
    title: Реальна умова і умовний спосіб
    instruction: Оберіть нормативне речення або правильну межу між якщо та б/би.
    items:
      - question: Яке речення описує реальну можливість у майбутньому?
        options:
          - Якщо матиму час, зайду після роботи.
          - Якби мав час, зайшов би після роботи.
          - Якщо мав би час, зайшов би після роботи.
        correct: 0
        explanation: "Реальна умова бере якщо + дійсний спосіб: матиму, зайду."
      - question: Де правильно побудовано план на випадок дощу?
        options:
          - Якщо буде дощ, залишимося вдома.
          - Якщо буде дощ, ми б залишилися вдома.
          - Якби буде дощ, залишимося вдома.
        correct: 0
        explanation: У реальній умові потрібне якщо і звичайний майбутній час.
      - question: Яке речення НЕ належить до активної теми цього модуля?
        options:
          - Якби я мав час, пішов би.
          - Якщо буде час, піду.
          - Якщо встигну, напишу.
        correct: 0
        explanation: Якби + умовний спосіб належить до нереальних умов.
      - question: Яке речення має дійсний спосіб в обох частинах?
        options:
          - Якщо клієнт відповість, підготуємо договір.
          - Якщо клієнт відповів би, підготували б договір.
          - Якщо клієнт би відповів, підготуємо договір.
        correct: 0
        explanation: Відповість і підготуємо - звичайні майбутні форми.
      - question: Де якщо вводить теперішній стан?
        options:
          - Якщо хочеш, можемо повторити правило.
          - Якщо хотів би, можемо повторити правило.
          - Якби хочеш, можемо повторити правило.
        correct: 0
        explanation: Якщо хочеш - реальна поточна умова.
      - question: Яке речення природніше для B1-моделі?
        options:
          - Якщо матиму нагоду, напишу відгук.
          - Якщо буду мати нагоду, написав би відгук.
          - Якщо мав би нагоду, напишу відгук.
        correct: 0
        explanation: Матиму нагоду + напишу тримає реальну майбутню умову.
      - question: Де правильно утворено умовний спосіб для ввічливого прохання?
        options:
          - Чи не могли б ви повторити адресу?
          - Чи не могли ви повторили адресу?
          - Якщо могли б ви повторити адресу?
        correct: 0
        explanation: Могли б - умовний спосіб для ввічливого прохання.
      - question: Яка форма частки природна після голосного?
        options:
          - сказала б
          - сказала би
          - сказалаб
        correct: 0
        explanation: Після голосного в навчальній нормі очікуємо коротку частку б.
      - question: Яка форма частки природна після приголосного?
        options:
          - хотів би
          - хотів б
          - хотівби
        correct: 0
        explanation: Після приголосного природніше би, і частку пишемо окремо.
      - question: Де правильно написано частку б/би?
        options:
          - Я написав би короткий лист.
          - Я написавби короткий лист.
          - Я би написавби короткий лист.
        correct: 0
        explanation: Б/би пишеться окремо від дієслова.
      - question: Яке речення НЕ змішує реальну умову з умовним способом?
        options:
          - Якщо отримаємо підтвердження, надішлемо договір.
          - Якщо отримали б підтвердження, надішлемо договір.
          - Якщо б отримаємо підтвердження, надішлемо договір.
        correct: 0
        explanation: Реальна умова бере якщо + дійсний спосіб без б/би.
      - question: Що робить форма я хотів би запитати?
        options:
          - Пом'якшує прохання або намір.
          - Будує реальну умову після якщо.
          - Замінює майбутній час у всіх реченнях.
        correct: 0
        explanation: Хотів би - ввічлива умовна форма, а не модель реальної умови.
  - id: act-2
    type: fill-in
    title: Форма після якщо
    instruction: Вставте природну форму дієслова для реальної умови.
    items:
      - sentence: "Якщо ____ час, зателефоную ввечері."
        answer: матиму
        options:
          - матиму
          - мав би
          - буду мав
        explanation: Для реальної майбутньої умови природно матиму час.
      - sentence: "Якщо автобус ____, візьмемо таксі."
        answer: запізниться
        options:
          - запізниться
          - запізнився б
          - запізнювався б
        explanation: Запізниться - майбутня доконана форма.
      - sentence: "Якщо клієнт ____ сьогодні, ми підготуємо договір."
        answer: відповість
        options:
          - відповість
          - відповів би
          - відповідає б
        explanation: Умова можлива, тому потрібен дійсний спосіб.
      - sentence: "Якщо ти ____ це щодня, результат буде стабільний."
        answer: робитимеш
        options:
          - робитимеш
          - зробиш
          - зробив би
        explanation: Щодня вказує на повторення, тому природний недоконаний вид.
      - sentence: "Якщо температура ____, зверніться до лікаря."
        answer: підніметься
        options:
          - підніметься
          - піднялася б
          - піднімалась би
        explanation: Це реальна майбутня умова в інструкції.
      - sentence: "Якщо магазин буде ____, куплю хліб дорогою."
        answer: відчинений
        options:
          - відчинений
          - відчиненим би
          - відчинити
        explanation: Буде відчинений описує майбутній стан.
      - sentence: "Якщо ____ підтвердження до п'ятої, надішлемо договір сьогодні."
        answer: отримаємо
        options:
          - отримаємо
          - отримали б
          - отримуємо би
        explanation: Отримаємо - майбутній результат у реальній умові.
      - sentence: "Якщо ____ українською щодня, помилки стануть помітнішими."
        answer: писатимеш
        options:
          - писатимеш
          - напишеш
          - написав би
        explanation: Щодня підказує процес або повторення.
      - sentence: "Якщо місць не ____, забронюємо інший день."
        answer: буде
        options:
          - буде
          - було б
          - є би
        explanation: Не буде місць - реальна майбутня умова.
      - sentence: "Якщо вам ____ зручно, почнемо о десятій."
        answer: буде
        options:
          - буде
          - було б
          - був би
        explanation: Буде зручно лишається реальною умовою без б/би.
      - sentence: "Якщо завтра ____, перенесемо прогулянку."
        answer: дощитиме
        options:
          - дощитиме
          - подощить би
          - дощив би
        explanation: Дощитиме описує тривалий можливий стан погоди.
      - sentence: "Якщо ____ карткою зараз, квиток з'явиться в застосунку."
        answer: сплатите
        options:
          - сплатите
          - сплатили б
          - сплачували б
        explanation: Сплатите - доконаний майбутній результат у сервісній умові.
  - id: act-3
    type: group-sort
    title: Результат, процес, стан
    instruction: Розподіліть якщо-частини за значенням дієслова.
    groups:
      - label: Завершений результат
        items:
          - якщо закінчимо раніше
          - якщо отримаю відповідь
          - якщо знайдемо квитки
          - якщо підпишуть договір
      - label: Процес або повторення
        items:
          - якщо працюватимемо без перерви
          - якщо робитимеш це щодня
          - якщо чекатимемо на вокзалі
          - якщо тренуватимешся регулярно
      - label: Стан або можливість
        items:
          - якщо буде дощ
          - якщо є час
          - якщо вам зручно
          - якщо магазин буде відчинений
  - id: act-4
    type: match-up
    title: Умова і наслідок
    instruction: Поєднайте якщо-частину з природним наслідком.
    pairs:
      - left: Якщо буде час
        right: я зайду після роботи.
      - left: Якщо зустріч перенесуть
        right: я попереджу команду.
      - left: Якщо автобус запізниться
        right: ми візьмемо таксі.
      - left: Якщо почуватимешся гірше
        right: звернися до лікаря.
      - left: Якщо картка не спрацює
        right: заплатимо готівкою.
      - left: Якщо вивчиш цей розділ
        right: легше виконаєш вправу.
      - left: Якщо робитимеш це щодня
        right: прогрес буде стабільний.
      - left: Якщо магазин буде відчинений
        right: куплю продукти дорогою.
      - left: Якщо отримаємо підтвердження
        right: надішлемо рахунок сьогодні.
      - left: Якщо місць не буде
        right: забронюємо інший день.
      - left: Якщо дощитиме весь день
        right: перенесемо прогулянку.
      - left: Якщо вам зручно
        right: почнемо о десятій.
  - id: act-5
    type: error-correction
    title: Виправте змішану умову
    instruction: Виправте змішування реальної умови, умовного способу або частки б/би.
    items:
      - sentence: "Якщо я мав би час, я зайду після роботи."
        error: мав би
        correction: матиму
        error_type: phrase
        explanation: Для реальної майбутньої умови потрібно якщо матиму час.
      - sentence: "Якщо буде дощ, ми б залишилися вдома."
        error: ми б залишилися
        correction: залишимося
        error_type: phrase
        explanation: Реальна умова бере майбутній час без б/би.
      - sentence: "Якби автобус запізниться, візьмемо таксі."
        error: Якби
        correction: Якщо
        error_type: word
        explanation: Автобус може реально запізнитися, тому потрібне якщо.
      - sentence: "Якщо я матиму б час, надішлю листа."
        error: матиму б
        correction: матиму
        error_type: phrase
        explanation: У реальній умові після якщо не додаємо б до майбутньої форми.
      - sentence: "Якщо ти зробиш це щодня, прогрес буде стабільний."
        error: зробиш
        correction: робитимеш
        error_type: word
        explanation: Щодня потребує недоконаного виду для повторення.
      - sentence: "Якщо температура піднялася б, зателефонуйте лікарю."
        error: піднялася б
        correction: підніметься
        error_type: phrase
        explanation: Це реальна майбутня інструкція, не нереальна умова.
      - sentence: "Якщо ви могли б, надішліть розклад сьогодні."
        error: могли б
        correction: можете
        error_type: phrase
        explanation: "У реальній умові після якщо потрібен дійсний спосіб: якщо можете."
      - sentence: "Вона сказалаб, що прийде пізніше."
        error: сказалаб
        correction: сказала б
        error_type: word
        explanation: Частку б пишемо окремо від дієслова.
      - sentence: "Я хотівб запитати про розклад курсу."
        error: хотівб
        correction: хотів би
        error_type: word
        explanation: Частку би пишемо окремо після приголосного.
      - sentence: "Чи не могли ви б повторити адресу?"
        error: могли ви б
        correction: могли б ви
        error_type: phrase
        explanation: "У ввічливому проханні нейтрально: могли б ви."
      - sentence: "Якщо клієнт підтвердив би оплату, відправимо замовлення."
        error: підтвердив би
        correction: підтвердить
        error_type: phrase
        explanation: Реальна майбутня умова потребує форми підтвердить.
      - sentence: "Якщо вам було б зручно, почнемо о десятій."
        error: було б зручно
        correction: буде зручно
        error_type: phrase
        explanation: Реальна умова про майбутню зручність не потребує б.
workbook:
  - id: wb-1
    type: quiz
    title: Основне правило
    instruction: Оберіть правильне твердження або форму.
    items:
      - question: Що позначає якщо в цьому модулі?
        options:
          - Реальну умову, яка може здійснитися.
          - Нереальну мрію, протилежну фактам.
          - Тільки ввічливе прохання з б/би.
        correct: 0
        explanation: Активна тема - реальні умови з якщо.
      - question: Який спосіб потрібен у реальній умові?
        options:
          - Дійсний спосіб.
          - Умовний спосіб з б/би.
          - Лише наказовий спосіб.
        correct: 0
        explanation: Якщо + дійсний спосіб створює реальну умову.
      - question: Яке речення правильне?
        options:
          - Якщо отримаю листа, відповім сьогодні.
          - Якщо отримав би листа, відповім сьогодні.
          - Якби отримаю листа, відповім сьогодні.
        correct: 0
        explanation: Отримаю і відповім - майбутні форми дійсного способу.
      - question: Коли доречне то?
        options:
          - Коли треба чіткіше зв'язати довгу умову з наслідком.
          - Після кожного якщо без винятків.
          - Лише в нереальних умовах.
        correct: 0
        explanation: То корисне, але не обов'язкове.
      - question: Що краще як базова B1-модель?
        options:
          - Якщо матиму час.
          - Якщо буду мати час.
          - Якщо мав би час.
        correct: 0
        explanation: Матиму час звучить компактно й природно.
      - question: Яке речення містить процес або повторення?
        options:
          - Якщо тренуватимешся щодня, прогрес буде стабільний.
          - Якщо вивчиш цей список, виконаєш вправу.
          - Якщо підпишемо договір, почнемо роботу.
        correct: 0
        explanation: Тренуватимешся щодня - недоконаний вид і повторення.
      - question: Яке речення має інструкцію в головній частині?
        options:
          - Якщо почуватимешся гірше, звернися до лікаря.
          - Якщо буде час, я зайду.
          - Якщо клієнт відповість, ми підготуємо договір.
        correct: 0
        explanation: Звернися - спонукальна форма після реальної умови.
      - question: Що робить якби?
        options:
          - Відкриває нереальну або уявну умову.
          - Завжди замінює якщо в майбутньому.
          - Показує доконаний вид.
        correct: 0
        explanation: Якби - межа наступного модуля про нереальні умови.
      - question: Як утворюємо умовний спосіб?
        options:
          - Минулий час + окрема частка б/би.
          - Майбутній час + частка то.
          - Інфінітив + якщо.
        correct: 0
        explanation: Умовний спосіб спирається на минулий час і частку б/би.
      - question: Яка форма написана правильно?
        options:
          - Ми хотіли б почати раніше.
          - Ми хотілиб почати раніше.
          - Ми хотіли би б почати раніше.
        correct: 0
        explanation: Частка б пишеться окремо після голосного.
      - question: Яке речення є ввічливим проханням?
        options:
          - Чи не підказали б ви, де аптека?
          - Якщо підкажете би, де аптека?
          - Якби підкажете, де аптека?
        correct: 0
        explanation: Підказали б ви - умовний спосіб для ввічливості.
      - question: Яке речення не ставить б/би після якщо?
        options:
          - Якщо план зміниться, попереджу вас.
          - Якщо план змінився б, попереджу вас.
          - Якщо б план зміниться, попереджу вас.
        correct: 0
        explanation: Реальна умова лишається в дійсному способі.
  - id: wb-2
    type: fill-in
    title: Майбутня умова
    instruction: Вставте форму, яка створює реальну умову.
    items:
      - sentence: "Якщо ми ____ раніше, поїдемо на вокзал пішки."
        answer: закінчимо
        options:
          - закінчимо
          - закінчили б
          - закінчували б
        explanation: Закінчимо - доконаний майбутній результат.
      - sentence: "Якщо вони ____ оплату сьогодні, замовлення відправлять завтра."
        answer: підтвердять
        options:
          - підтвердять
          - підтвердили б
          - підтверджували б
        explanation: Це реальна умова в сервісній ситуації.
      - sentence: "Якщо ліки не ____, запишіться на повторний прийом."
        answer: допоможуть
        options:
          - допоможуть
          - допомогли б
          - допомагали б
        explanation: Допоможуть - майбутня доконана форма.
      - sentence: "Якщо ____ без перерви, швидко втомимося."
        answer: працюватимемо
        options:
          - працюватимемо
          - попрацюємо
          - попрацювали б
        explanation: Без перерви описує процес роботи.
      - sentence: "Якщо ____ потрібний розмір, я замовлю його зі складу."
        answer: знайду
        options:
          - знайду
          - знайшов би
          - знаходив би
        explanation: Знайду - один завершений результат пошуку.
      - sentence: "Якщо тобі ____, зустрінемося онлайн."
        answer: зручно
        options:
          - зручно
          - зручним би
          - буде зручним би
        explanation: Теперішній стан зручно може бути реальною умовою.
      - sentence: "Якщо кур'єр ____, вам надійде повідомлення."
