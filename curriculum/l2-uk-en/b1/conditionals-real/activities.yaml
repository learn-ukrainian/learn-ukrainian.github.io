version: '1.0'
module: conditionals-real
level: b1
inline:
  - id: act-1
    type: quiz
    title: Реальна чи нереальна умова
    instruction: Оберіть речення, яке відповідає реальній умові з якщо.
    items:
      - question: Яке речення описує реальну можливість у майбутньому?
        options:
          - Якщо матиму час, зайду після роботи.
          - Якби мав час, зайшов би після роботи.
          - Якщо мав би час, зайшов би після роботи.
        correct: 0
        explanation: "Реальна умова бере якщо + дійсний спосіб: матиму, зайду."
      - question: Де правильно побудовано план на випадок дощу?
        options:
          - Якщо буде дощ, залишимося вдома.
          - Якщо буде дощ, ми б залишилися вдома.
          - Якби буде дощ, залишимося вдома.
        correct: 0
        explanation: У реальній умові потрібне якщо і звичайний майбутній час.
      - question: Яке речення НЕ належить до активної теми цього модуля?
        options:
          - Якби я мав час, пішов би.
          - Якщо буде час, піду.
          - Якщо встигну, напишу.
        correct: 0
        explanation: Якби + умовний спосіб належить до нереальних умов.
      - question: Яке речення має дійсний спосіб в обох частинах?
        options:
          - Якщо клієнт відповість, підготуємо договір.
          - Якщо клієнт відповів би, підготували б договір.
          - Якщо клієнт би відповів, підготуємо договір.
        correct: 0
        explanation: Відповість і підготуємо - звичайні майбутні форми.
      - question: Де якщо вводить теперішній стан?
        options:
          - Якщо хочеш, можемо повторити правило.
          - Якщо хотів би, можемо повторити правило.
          - Якби хочеш, можемо повторити правило.
        correct: 0
        explanation: Якщо хочеш - реальна поточна умова.
      - question: Яке речення природніше для B1-моделі?
        options:
          - Якщо матиму нагоду, напишу відгук.
          - Якщо буду мати нагоду, написав би відгук.
          - Якщо мав би нагоду, напишу відгук.
        correct: 0
        explanation: Матиму нагоду + напишу тримає реальну майбутню умову.
  - id: act-2
    type: fill-in
    title: Форма після якщо
    instruction: Вставте природну форму дієслова для реальної умови.
    items:
      - sentence: "Якщо ____ час, зателефоную ввечері."
        answer: матиму
        options:
          - матиму
          - мав би
          - буду мав
        explanation: Для реальної майбутньої умови природно матиму час.
      - sentence: "Якщо автобус ____, візьмемо таксі."
        answer: запізниться
        options:
          - запізниться
          - запізнився б
          - запізнювався б
        explanation: Запізниться - майбутня доконана форма.
      - sentence: "Якщо клієнт ____ сьогодні, ми підготуємо договір."
        answer: відповість
        options:
          - відповість
          - відповів би
          - відповідає б
        explanation: Умова можлива, тому потрібен дійсний спосіб.
      - sentence: "Якщо ти ____ це щодня, результат буде стабільний."
        answer: робитимеш
        options:
          - робитимеш
          - зробиш
          - зробив би
        explanation: Щодня вказує на повторення, тому природний недоконаний вид.
      - sentence: "Якщо температура ____, зверніться до лікаря."
        answer: підніметься
        options:
          - підніметься
          - піднялася б
          - піднімалась би
        explanation: Це реальна майбутня умова в інструкції.
      - sentence: "Якщо магазин буде ____, куплю хліб дорогою."
        answer: відчинений
        options:
          - відчинений
          - відчиненим би
          - відчинити
        explanation: Буде відчинений описує майбутній стан.
  - id: act-3
    type: group-sort
    title: Результат, процес, стан
    instruction: Розподіліть якщо-частини за значенням дієслова.
    groups:
      - label: Завершений результат
        items:
          - якщо закінчимо раніше
          - якщо отримаю відповідь
          - якщо знайдемо квитки
          - якщо підпишуть договір
      - label: Процес або повторення
        items:
          - якщо працюватимемо без перерви
          - якщо робитимеш це щодня
          - якщо чекатимемо на вокзалі
          - якщо тренуватимешся регулярно
      - label: Стан або можливість
        items:
          - якщо буде дощ
          - якщо є час
          - якщо вам зручно
          - якщо магазин буде відчинений
  - id: act-4
    type: match-up
    title: Умова і наслідок
    instruction: Поєднайте якщо-частину з природним наслідком.
    pairs:
      - left: Якщо буде час
        right: я зайду після роботи.
      - left: Якщо зустріч перенесуть
        right: я попереджу команду.
      - left: Якщо автобус запізниться
        right: ми візьмемо таксі.
      - left: Якщо почуватимешся гірше
        right: звернися до лікаря.
      - left: Якщо картка не спрацює
        right: заплатимо готівкою.
      - left: Якщо вивчиш цей розділ
        right: легше виконаєш вправу.
      - left: Якщо робитимеш це щодня
        right: прогрес буде стабільний.
      - left: Якщо магазин буде відчинений
        right: куплю продукти дорогою.
  - id: act-5
    type: error-correction
    title: Виправте змішану умову
    instruction: Замініть помилкову частину на нормативну форму реальної умови.
    items:
      - sentence: "Якщо я мав би час, я зайду після роботи."
        error: мав би
        correction: матиму
        error_type: phrase
        explanation: Для реальної майбутньої умови потрібно якщо матиму час.
      - sentence: "Якщо буде дощ, ми б залишилися вдома."
        error: ми б залишилися
        correction: залишимося
        error_type: phrase
        explanation: Реальна умова бере майбутній час без б/би.
      - sentence: "Якби автобус запізниться, візьмемо таксі."
        error: Якби
        correction: Якщо
        error_type: word
        explanation: Автобус може реально запізнитися, тому потрібне якщо.
      - sentence: "Якщо я буду мати час, надішлю листа."
        error: буду мати
        correction: матиму
        error_type: phrase
        explanation: Матиму час - природна компактна форма майбутнього.
      - sentence: "Якщо ти зробиш це щодня, прогрес буде стабільний."
        error: зробиш
        correction: робитимеш
        error_type: word
        explanation: Щодня потребує недоконаного виду для повторення.
      - sentence: "Якщо температура піднялася б, зателефонуйте лікарю."
        error: піднялася б
        correction: підніметься
        error_type: phrase
        explanation: Це реальна майбутня інструкція, не нереальна умова.
workbook:
  - id: wb-1
    type: quiz
    title: Основне правило
    instruction: Оберіть правильне твердження або форму.
    items:
      - question: Що позначає якщо в цьому модулі?
        options:
          - Реальну умову, яка може здійснитися.
          - Нереальну мрію, протилежну фактам.
          - Тільки ввічливе прохання з б/би.
        correct: 0
        explanation: Активна тема - реальні умови з якщо.
      - question: Який спосіб потрібен у реальній умові?
        options:
          - Дійсний спосіб.
          - Умовний спосіб з б/би.
          - Лише наказовий спосіб.
        correct: 0
        explanation: Якщо + дійсний спосіб створює реальну умову.
      - question: Яке речення правильне?
        options:
          - Якщо отримаю листа, відповім сьогодні.
          - Якщо отримав би листа, відповім сьогодні.
          - Якби отримаю листа, відповім сьогодні.
        correct: 0
        explanation: Отримаю і відповім - майбутні форми дійсного способу.
      - question: Коли доречне то?
        options:
          - Коли треба чіткіше зв'язати довгу умову з наслідком.
          - Після кожного якщо без винятків.
          - Лише в нереальних умовах.
        correct: 0
        explanation: То корисне, але не обов'язкове.
      - question: Що краще як базова B1-модель?
        options:
          - Якщо матиму час.
          - Якщо буду мати час.
          - Якщо мав би час.
        correct: 0
        explanation: Матиму час звучить компактно й природно.
      - question: Яке речення містить процес або повторення?
        options:
          - Якщо тренуватимешся щодня, прогрес буде стабільний.
          - Якщо вивчиш цей список, виконаєш вправу.
          - Якщо підпишемо договір, почнемо роботу.
        correct: 0
        explanation: Тренуватимешся щодня - недоконаний вид і повторення.
      - question: Яке речення має інструкцію в головній частині?
        options:
          - Якщо почуватимешся гірше, звернися до лікаря.
          - Якщо буде час, я зайду.
          - Якщо клієнт відповість, ми підготуємо договір.
        correct: 0
        explanation: Звернися - спонукальна форма після реальної умови.
      - question: Що робить якби?
        options:
          - Відкриває нереальну або уявну умову.
          - Завжди замінює якщо в майбутньому.
          - Показує доконаний вид.
        correct: 0
        explanation: Якби - межа наступного модуля про нереальні умови.
  - id: wb-2
    type: fill-in
    title: Майбутня умова
    instruction: Вставте форму, яка створює реальну умову.
    items:
      - sentence: "Якщо ми ____ раніше, поїдемо на вокзал пішки."
        answer: закінчимо
        options:
          - закінчимо
          - закінчили б
          - закінчували б
        explanation: Закінчимо - доконаний майбутній результат.
      - sentence: "Якщо вони ____ оплату сьогодні, замовлення відправлять завтра."
        answer: підтвердять
        options:
          - підтвердять
          - підтвердили б
          - підтверджували б
        explanation: Це реальна умова в сервісній ситуації.
      - sentence: "Якщо ліки не ____, запишіться на повторний прийом."
        answer: допоможуть
        options:
          - допоможуть
          - допомогли б
          - допомагали б
        explanation: Допоможуть - майбутня доконана форма.
      - sentence: "Якщо ____ без перерви, швидко втомимося."
        answer: працюватимемо
        options:
          - працюватимемо
          - попрацюємо
          - попрацювали б
        explanation: Без перерви описує процес роботи.
      - sentence: "Якщо ____ потрібний розмір, я замовлю його зі складу."
        answer: знайду
        options:
          - знайду
          - знайшов би
          - знаходив би
        explanation: Знайду - один завершений результат пошуку.
      - sentence: "Якщо тобі ____, зустрінемося онлайн."
        answer: зручно
        options:
          - зручно
          - зручним би
          - буде зручним би
        explanation: Теперішній стан зручно може бути реальною умовою.
      - sentence: "Якщо кур'єр ____, вам надійде повідомлення."
        answer: запізниться
        options:
          - запізниться
          - запізнився б
          - запізнювався би
        explanation: Реальна сервісна умова потребує майбутньої форми.
      - sentence: "Якщо ____ цю вправу, перевір відповіді."
        answer: закінчиш
        options:
          - закінчиш
          - закінчував би
          - закінчиш би
        explanation: Закінчиш - завершений результат перед перевіркою.
  - id: wb-3
    type: match-up
    title: Пара умова - дія
    instruction: Поєднайте умову з логічною дією.
    pairs:
      - left: Якщо квитки будуть дешевші
        right: поїдемо потягом.
      - left: Якщо не буде хліба
        right: візьму лаваш.
      - left: Якщо система не приймає пароль
        right: перевірте розкладку клавіатури.
      - left: Якщо буде холодно
        right: одягнемо теплі куртки.
      - left: Якщо отримаю адресу
        right: надішлю документи.
      - left: Якщо будемо чекати довго
        right: купимо каву.
      - left: Якщо зустріч почнеться раніше
        right: я прийду о дев'ятій.
      - left: Якщо не заперечуєте
        right: я поставлю ще одне питання.
  - id: wb-4
    type: group-sort
    title: Чотири типи головної частини
    instruction: Розподіліть наслідки за комунікативною функцією.
    groups:
      - label: План або прогноз
        items:
          - поїдемо потягом
          - підготуємо договір
          - надішлю документи
          - залишимося вдома
      - label: Порада або інструкція
        items:
          - зверніться до лікаря
          - перевірте адресу
          - попередь мене заздалегідь
          - не чекайте до понеділка
      - label: М'яка пропозиція
        items:
          - можемо повторити правило
          - можемо піти пішки
          - я можу допомогти
          - можемо зустрітися онлайн
  - id: wb-5
    type: true-false
    title: Так чи ні
    instruction: Визначте, чи твердження правильне.
    items:
      - statement: У реальній умові з якщо зазвичай уживаємо дійсний спосіб.
        correct: true
        explanation: Саме це основна модель модуля.
      - statement: Частка б/би обов'язкова після кожного якщо.
        correct: false
        explanation: У реальних умовах б/би не потрібне.
      - statement: То може з'являтися в головній частині, але не є обов'язковим.
        correct: true
        explanation: Воно допомагає в довших реченнях.
      - statement: Якщо матиму час, зайду - природна реальна умова.
        correct: true
        explanation: Матиму і зайду - майбутні форми дійсного способу.
      - statement: Якщо я зробив би це завтра - добра базова B1-модель.
        correct: false
        explanation: Це змішує якщо з умовним способом.
      - statement: Якщо ти робитимеш це щодня - приклад повторення.
        correct: true
        explanation: Недоконаний вид показує повторювану дію.
      - statement: Коли може інколи мати умовний відтінок.
        correct: true
        explanation: Наприклад, Коли будеш у Львові, зайди до нас.
      - statement: Якби є головним сполучником цього модуля.
        correct: false
        explanation: Якби належить до наступної теми про нереальні умови.
  - id: wb-6
    type: error-correction
    title: Редагування реальних умов
    instruction: Виправте помилкову частину.
    items:
      - sentence: "Якщо клієнт відповів би сьогодні, ми підготуємо договір."
        error: відповів би
        correction: відповість
        error_type: phrase
        explanation: Реальна умова потребує майбутньої форми відповість.
      - sentence: "Якщо ми будемо мати змогу, приїдемо раніше."
        error: будемо мати
        correction: матимемо
        error_type: phrase
        explanation: Матимемо змогу - природна компактна форма.
      - sentence: "Якби картка не спрацює, заплатимо готівкою."
        error: Якби
        correction: Якщо
        error_type: word
        explanation: Це реальна сервісна умова.
      - sentence: "Якщо будеш робити це один раз, результат буде стабільний."
        error: один раз
        correction: щодня
        error_type: phrase
        explanation: Стабільний результат логічно пов'язаний із повторенням.
      - sentence: "При умові що буде місце, ми сядемо біля вікна."
        error: При умові що
        correction: Якщо
        error_type: construction
        explanation: У звичайній розмові природніше просто якщо.
      - sentence: "Якщо запізнишся, то б попередь мене."
        error: то б попередь
        correction: попередь
        error_type: phrase
        explanation: У реальній інструкції не потрібне б.
      - sentence: "Якщо товар не підійшов би, ви можете повернути його."
        error: не підійшов би
        correction: не підійде
        error_type: phrase
        explanation: Це реальна майбутня сервісна умова.
      - sentence: "Якщо ти вивчатимеш список один раз, вивчиш його."
        error: вивчатимеш список один раз
        correction: вивчиш список
        error_type: phrase
        explanation: Для одного завершеного результату потрібен доконаний вид.
  - id: wb-7
    type: cloze
    title: Лист із планом
    instruction: Заповніть пропуски формами реальної умови.
    text: "Привіт! Якщо {1}, я зайду до тебе після роботи. Якщо зустріч {2}, напишу раніше. Якщо ми {3} до сьомої, встигнемо на фільм. Якщо буде дощ, {4} вдома і замовимо вечерю. Якщо ти {5} це щодня, швидко побачиш результат."
    blanks:
      - id: 1
        answer: матиму час
        options:
          - матиму час
          - мав би час
          - буду мав час
      - id: 2
        answer: перенесуть
        options:
          - перенесуть
          - перенесли б
          - переносили би
      - id: 3
        answer: закінчимо
        options:
          - закінчимо
          - закінчили б
          - закінчували б
      - id: 4
        answer: залишимося
        options:
          - залишимося
          - залишилися б
          - залишались би
      - id: 5
        answer: робитимеш
        options:
          - робитимеш
