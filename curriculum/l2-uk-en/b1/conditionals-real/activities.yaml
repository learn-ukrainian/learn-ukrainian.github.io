  - id: wb-9
    type: translate
    title: Переклад реальних умов
    instruction: Оберіть або подайте природний український варіант.
    items:
      - source: "If I have time, I will call you."
        answer: "Якщо матиму час, зателефоную тобі."
        alternatives:
          - "Якщо буде час, зателефоную тобі."
        explanation: Не треба додавати б/би до реальної умови.
      - source: "If the bus is late, we will take a taxi."
        answer: "Якщо автобус запізниться, візьмемо таксі."
        explanation: Запізниться - майбутній доконаний результат.
      - source: "If you do this every day, the result will be stable."
        answer: "Якщо робитимеш це щодня, результат буде стабільний."
        alternatives:
          - "Якщо ти робитимеш це щодня, результат буде стабільний."
        explanation: Щодня вимагає недоконаного виду.
      - source: "If the medicine does not help, make another appointment."
        answer: "Якщо ліки не допоможуть, запишіться на повторний прийом."
        alternatives:
          - "Якщо ліки не допоможуть, запишись на повторний прийом."
        explanation: Реальна умова + інструкція в головній частині.
      - source: "If the card does not work, we will pay in cash."
        answer: "Якщо картка не спрацює, заплатимо готівкою."
        explanation: Сервісна умова описує можливий майбутній збій.
