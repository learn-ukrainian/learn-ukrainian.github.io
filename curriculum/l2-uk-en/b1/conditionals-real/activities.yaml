        answer: "Якщо картка не спрацює, заплатимо готівкою."
        explanation: Сервісна умова описує можливий майбутній збій.
      - source: "I would like to ask about the schedule."
        answer: "Я хотів би запитати про розклад."
        alternatives:
          - "Я хотіла б запитати про розклад."
        explanation: Хотів би / хотіла б - ввічливий умовний спосіб.
      - source: "Could you send the schedule?"
        answer: "Чи не могли б ви надіслати розклад?"
        alternatives:
          - "Ви могли б надіслати розклад?"
        explanation: Могли б ви - ввічливе прохання.
      - source: "If it is convenient for you, we will start at ten."
        answer: "Якщо вам буде зручно, почнемо о десятій."
        alternatives:
          - "Якщо вам зручно, почнемо о десятій."
        explanation: Реальна умова про зручність не потребує б/би.
      - source: "If we receive confirmation, we will send the invoice."
        answer: "Якщо отримаємо підтвердження, надішлемо рахунок."
        explanation: Отримаємо і надішлемо - майбутні форми дійсного способу.
      - source: "If it rains all day, we will postpone the walk."
        answer: "Якщо дощитиме весь день, перенесемо прогулянку."
        explanation: Дощитиме описує тривалий стан погоди.
      - source: "If there are no seats, we will book another day."
        answer: "Якщо місць не буде, забронюємо інший день."
        explanation: Не буде місць - реальна майбутня умова.
      - source: "If the plan changes, warn me in advance."
        answer: "Якщо план зміниться, попередь мене заздалегідь."
        alternatives:
          - "Якщо план зміниться, попередьте мене заздалегідь."
        explanation: Зміниться - можлива майбутня зміна плану.
  - id: wb-10
    type: order
    title: Побудуйте план
    instruction: Упорядкуйте речення так, щоб вийшов логічний план на випадок зміни погоди.
    items:
      - Спершу перевіримо прогноз погоди ввечері.
      - Якщо завтра буде сонячно, поїдемо велосипедами до озера.
      - Якщо вітер буде сильний, оберемо коротший маршрут.
      - Якщо дощитиме, залишимося в місті.
      - Якщо знайдемо квитки онлайн, підемо в музей.
      - Якщо місць не буде, забронюємо екскурсію на інший день.
      - Якщо зустрінемося раніше, встигнемо випити кави.
      - Якщо хтось запізниться, попередить групу в чаті.
      - Якщо плани зміняться, попередимо одне одного заздалегідь.
      - Якщо буде час після прогулянки, зайдемо в книгарню.
      - Якщо втомимося, повернемося додому метро.
      - Увечері напишемо короткий підсумок і домовимося про наступну зустріч.
    correct_order:
      - 0
      - 1
      - 2
