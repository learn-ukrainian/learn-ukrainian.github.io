  - id: wb-11
    type: fill-in
    title: То чи без то
    instruction: Вставте природний варіант. Пам'ятайте, що то не завжди обов'язкове.
    items:
      - sentence: "Якщо хочеш, ____ повторити правило."
        answer: можемо
        options:
          - можемо
          - то б можемо
          - могли би
        explanation: У короткому реальному реченні то не потрібне.
      - sentence: "Якщо зустріч перенесуть на ранок, ____ ми встигнемо підготувати презентацію."
        answer: то
        options:
          - то
          - би
          - якби
        explanation: У довшому реченні то допомагає чітко зв'язати частини.
      - sentence: "Зателефоную тобі, ____ матиму час після роботи."
        answer: якщо
        options:
          - якщо
          - якби
          - би
        explanation: Коли головна частина перша, якщо стоїть перед умовою.
      - sentence: "____ буде важко, напиши мені."
        answer: Якщо
        options:
          - Якщо
          - Якби
          - Би
        explanation: Це реальна можлива ситуація.
      - sentence: "Якщо система не приймає пароль, ____ перевірте розкладку клавіатури."
        answer: то
        options:
          - то
          - б
          - якби
        explanation: То можливе в інструкції, але б не потрібне.
      - sentence: "Я ____ запитати про розклад курсу."
        answer: хотів би
        options:
          - хотів би
          - хотівб
          - хочу би
        explanation: Хотів би - ввічлива умовна форма.
      - sentence: "Вона сказала ____, що прийде пізніше."
        answer: б
        options:
          - б
          - би
          - якщо
        explanation: Після голосного сказала природна коротка частка б.
      - sentence: "Ви ____ надіслати підтвердження сьогодні?"
        answer: могли б
        options:
          - могли б
          - моглиби
          - можете би
        explanation: Могли б - ввічливий умовний спосіб.
      - sentence: "Якщо отримаємо підтвердження, ____ надішлемо рахунок."
        answer: то
        options:
          - то
          - би
          - якби
        explanation: То можливе після довшої умови; б/би не потрібне.
      - sentence: "____ можна, я поставлю ще одне питання."
        answer: Якщо
        options:
          - Якщо
          - Якби
          - Би
        explanation: Якщо можна - реальна умова дозволу.
      - sentence: "Ми зустрінемося онлайн, ____ вам буде зручно."
        answer: якщо
        options:
          - якщо
          - якби
          - би
        explanation: Якщо може стояти після головної частини.
      - sentence: "Було ____ добре перевірити час зустрічі."
        answer: б
        options:
          - б
          - якщо
          - то
        explanation: Було б добре - м'яка порада з умовним способом.
