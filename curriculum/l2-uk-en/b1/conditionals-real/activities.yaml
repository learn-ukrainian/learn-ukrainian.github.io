        explanation: У довшому реченні то допомагає чітко зв'язати частини.
      - sentence: "Зателефоную тобі, ____ матиму час після роботи."
        answer: якщо
        options:
          - якщо
          - якби
          - би
        explanation: Коли головна частина перша, якщо стоїть перед умовою.
