version: '1.0'
module: prepositions-temporal
level: b1
inline:
  - id: act-1
    type: quiz
    title: Через чи за?
    instruction: "Оберіть прийменник, який точно передає часове значення."
    items:
      - question: "Перерва буде ____ двадцять хвилин після початку лекції."
        options:
          - "через"
          - "за"
          - "до"
        correct: 0
        explanation: "Форма через двадцять хвилин після початку означає час після початку."
      - question: "Ми підготували зал ____ двадцять хвилин."
        options:
          - "за"
          - "через"
          - "після"
        correct: 0
        explanation: "Йдеться про час виконання дії, тому за."
      - question: "____ тиждень після відкриття буде фінальний концерт."
        options:
          - "через"
          - "за"
          - "на"
        correct: 0
        explanation: "Через тиждень після відкриття означає один тиждень після відкриття."
      - question: "На питання Скільки часу знадобилося? відповідаємо: дизайнер зробив афішу ____ тиждень."
        options:
          - "за"
          - "через"
          - "до"
        correct: 0
        explanation: "Питання скільки часу знадобилося? робить за єдиним точним вибором."
      - question: "Документи треба надіслати ____ п'ятниці."
        options:
          - "до"
          - "після"
          - "під час"
        correct: 0
        explanation: "До + родовий позначає дедлайн."
      - question: "Поговоримо ____ лекції, коли всі вийдуть із зали."
        options:
          - "після"
          - "перед"
          - "під час"
        correct: 0
        explanation: "Дія буде пізніше за лекцію."
      - question: "Технік перевірить мікрофон ____ лекцією."
        options:
          - "перед"
          - "після"
          - "до"
        correct: 0
        explanation: "Перед керує орудним: лекцією."
      - question: "Не шуміть ____ виступу."
        options:
          - "під час"
          - "перед"
          - "за"
        correct: 0
        explanation: "Під час + родовий означає всередині події."
      - question: "Волонтери працювали ____ усього тижня."
        options:
          - "протягом"
          - "через"
          - "на"
        correct: 0
        explanation: "Протягом + родовий підкреслює тривалість."
      - question: "Ми забронювали зал ____ дві години."
        options:
          - "на"
          - "протягом"
          - "через"
        correct: 0
        explanation: "На + знахідний задає запланований строк."
      - question: "____ обіді команда зустрінеться з гідом."
        options:
          - "По"
          - "За"
          - "До"
        correct: 0
        explanation: "По обіді - правильне літературне значення після обіду."
      - question: "О 5:50 нормативно можна сказати:"
        options:
          - "за десять хвилин шоста"
          - "без десяти шість"
          - "після п'ятої десять"
        correct: 0
        explanation: "Українська традиційна форма уникає кальки без десяти."
  - id: act-2
    type: fill-in
    title: Вставте часовий прийменник
    instruction: "Заповніть пропуск правильною формою."
    items:
      - sentence: "Повідомлення прийшло ____ п'ять хвилин після реєстрації."
        answer: "через"
        options:
          - "через"
          - "за"
          - "перед"
        explanation: "Через п'ять хвилин після реєстрації означає п'ять хвилин після реєстрації."
      - sentence: "Ми переклали оголошення ____ п'ять хвилин."
        answer: "за"
        options:
          - "за"
          - "через"
          - "до"
        explanation: "П'ять хвилин - час виконання перекладу."
      - sentence: "Поставте запитання ____ кінця заняття."
        answer: "до"
        options:
          - "до"
          - "після"
          - "на"
        explanation: "До кінця заняття - дедлайн."
      - sentence: "____ заняттям перевірте домашнє завдання."
        answer: "Перед"
        options:
          - "Перед"
          - "Після"
          - "Під час"
        explanation: "Перед + орудний: заняттям."
      - sentence: "____ заняття викладачка відповіла на листи."
        answer: "Після"
        options:
          - "Після"
          - "Перед"
          - "На"
        explanation: "Після + родовий: заняття."
      - sentence: "____ лекції студенти не користувалися телефонами."
        answer: "Під час"
        options:
          - "Під час"
          - "Через"
          - "За"
        explanation: "Дія відбувалася всередині лекції."
      - sentence: "____ місяця ми збирали заявки від учасників."
        answer: "Протягом"
        options:
          - "Протягом"
          - "На"
          - "Через"
        explanation: "Протягом + родовий передає тривалість."
      - sentence: "Культурний центр орендував додатковий зал ____ тиждень."
        answer: "на"
        options:
          - "на"
          - "за"
          - "до"
        explanation: "На тиждень - строк оренди."
      - sentence: "____ обіді ми обговоримо деталі програми."
        answer: "По"
        options:
          - "По"
          - "На"
          - "До"
        explanation: "По обіді означає після обіду."
      - sentence: "Зустріч починається ____ третій годині."
        answer: "о"
        options:
          - "о"
          - "до"
          - "за"
        explanation: "Точний час: о третій годині."
      - sentence: "Звіт треба подати ____ третьої години."
        answer: "до"
        options:
          - "до"
          - "о"
          - "після"
        explanation: "До третьої години - часова межа."
      - sentence: "Розмовний клуб працює ____."
        answer: "щосереди"
        options:
          - "щосереди"
          - "через середи"
          - "на середи"
        explanation: "Для регулярності природна прислівникова форма."
  - id: act-3
    type: match-up
    title: Значення і модель
    instruction: "Поєднайте часовий вираз із його граматичним значенням."
    pairs:
      - left: "через годину"
        right: "майбутній момент після години від тепер"
      - left: "за годину"
        right: "час, потрібний для виконання дії"
      - left: "перед лекцією"
        right: "час раніше за подію, орудний відмінок"
      - left: "після лекції"
        right: "час пізніше за подію, родовий відмінок"
      - left: "до п'ятниці"
        right: "дедлайн або часова межа"
      - left: "під час лекції"
        right: "період усередині події"
      - left: "протягом тижня"
        right: "тривалість у межах періоду"
      - left: "на тиждень"
        right: "запланований строк"
      - left: "по обіді"
        right: "літературне після обіду"
      - left: "о третій"
        right: "точний час на годиннику"
      - left: "за десять шоста"
        right: "традиційна форма для 5:50"
      - left: "щопонеділка"
        right: "регулярність кожного понеділка"
  - id: act-4
    type: group-sort
    title: Розподіліть часові вирази
    instruction: "Розкладіть фрази за їхнім значенням."
    groups:
      - label: "Майбутній момент"
        items:
          - "через хвилину"
          - "через два дні"
          - "через місяць"
      - label: "Час виконання"
        items:
          - "за хвилину"
          - "за два дні"
          - "за місяць"
      - label: "Дедлайн"
        items:
          - "до п'ятниці"
          - "до кінця заняття"
          - "до третьої години"
      - label: "Тривалість або строк"
        items:
          - "протягом тижня"
          - "упродовж року"
          - "на два тижні"
  - id: act-5
    type: error-correction
    title: Виправляємо часові кальки
    instruction: "Знайдіть і виправте одну часову помилку в кожному реченні."
    items:
      - sentence: "Я напишу відповідь за десять хвилин від тепер."
        error: "за десять хвилин від тепер"
        correction: "через десять хвилин"
        error_type: phrase
        explanation: "Відлік від тепер потребує через десять хвилин."
      - sentence: "Перерва буде за десять хвилин після початку лекції."
        error: "за десять хвилин після"
        correction: "через десять хвилин після"
        error_type: phrase
        explanation: "З після природно: через десять хвилин після початку."
      - sentence: "На протязі тижня ми збирали заявки."
        error: "На протязі"
        correction: "Протягом"
        error_type: word
        explanation: "На протязі - про рух повітря; для часу треба протягом."
      - sentence: "Перед лекції перевірте звук."
        error: "Перед лекції"
        correction: "Перед лекцією"
        error_type: phrase
        explanation: "Перед керує орудним відмінком."
      - sentence: "Після лекцією буде кава."
        error: "Після лекцією"
        correction: "Після лекції"
        error_type: phrase
        explanation: "Після керує родовим відмінком."
      - sentence: "Під час лекцією не шуміть."
        error: "Під час лекцією"
        correction: "Під час лекції"
        error_type: phrase
        explanation: "Під час керує родовим відмінком."
      - sentence: "Надішліть заявку після п'ятниці, якщо дедлайн п'ятниця."
        error: "після п'ятниці"
        correction: "до п'ятниці"
        error_type: phrase
        explanation: "Дедлайн передає до + родовий."
      - sentence: "Ми приїхали в гості на тижня."
        error: "на тижня"
        correction: "на тиждень"
        error_type: phrase
        explanation: "Планований строк перебування: на тиждень."
      - sentence: "Оголошення буде готове за дві години від тепер."
        error: "за дві години від тепер"
        correction: "через дві години"
        error_type: phrase
        explanation: "Відлік від тепер потребує через."
      - sentence: "О 5:50 скажіть без десяти шість."
        error: "без десяти шість"
        correction: "за десять хвилин шоста"
        error_type: phrase
        explanation: "Навчальна норма уникає кальки без."
      - sentence: "Лекція по історії буде щопонеділка."
        error: "по історії"
        correction: "з історії"
        error_type: phrase
        explanation: "Для навчального предмета природно з історії."
      - sentence: "Зустрічі будуть по понеділкам."
        error: "по понеділкам"
        correction: "щопонеділка"
        error_type: phrase
        explanation: "Для регулярності природно щопонеділка."
workbook:
  - id: wb-1
    type: quiz
    title: Точний часовий вибір
    instruction: "Оберіть найприродніший варіант для кожної ситуації."
    items:
      - question: "Як сказати, що подія буде після трьох годин від тепер?"
        options:
          - "через три години"
          - "за три години"
          - "на три години"
        correct: 0
        explanation: "Майбутній момент від тепер - через."
      - question: "Як сказати, що робота займе три години?"
        options:
          - "за три години"
          - "через три години"
          - "до трьох годин"
        correct: 0
        explanation: "Час виконання - за."
      - question: "Як сказати, що кімнату заброньовано на дві години?"
        options:
          - "на дві години"
          - "через дві години"
          - "після двох годин"
        correct: 0
        explanation: "Строк бронювання - на + знахідний."
      - question: "Який варіант означає кінцевий строк?"
        options:
          - "до понеділка"
          - "після понеділка"
          - "по понеділках"
        correct: 0
        explanation: "До + родовий задає межу."
      - question: "Який варіант має правильний відмінок?"
        options:
          - "перед зустріччю"
          - "перед зустрічі"
          - "перед зустріч"
        correct: 0
        explanation: "Перед керує орудним."
      - question: "Який варіант має правильний відмінок?"
        options:
          - "після зустрічі"
          - "після зустріччю"
          - "після зустріч"
        correct: 0
        explanation: "Після керує родовим."
      - question: "Який варіант означає перебіг події?"
        options:
          - "під час зустрічі"
          - "перед зустріччю"
          - "через зустріч"
        correct: 0
        explanation: "Під час + родовий = усередині події."
      - question: "Як найкраще виправити на протязі семестру?"
        options:
          - "протягом семестру"
          - "на протягу семестру"
          - "по семестру"
        correct: 0
        explanation: "Для часу потрібне протягом/упродовж."
      - question: "Яка форма природна для регулярної події щотижня в понеділок?"
        options:
          - "щопонеділка"
          - "по понеділкам"
          - "через понеділок"
        correct: 0
        explanation: "Щопонеділка означає кожного понеділка."
      - question: "Який варіант є правильним часовим по?"
        options:
          - "по обіді"
          - "по фізиці"
          - "по понеділкам"
        correct: 0
        explanation: "По обіді = після обіду; інші варіанти кальковані."
      - question: "Як сказати 5:30 традиційно?"
        options:
          - "пів на шосту"
          - "пів шостої після"
          - "половина шостої без"
        correct: 0
        explanation: "Пів на шосту означає 5:30."
      - question: "Що краще для офіційного строку в оголошенні?"
        options:
          - "до 18:00"
          - "після 18:00"
          - "через 18:00"
        correct: 0
        explanation: "До 18:00 задає крайній час."
  - id: wb-2
    type: fill-in
    title: Розклад центру
    instruction: "Заповніть пропуски часовими прийменниками або прислівниковими формами."
    items:
      - sentence: "Лекція починається ____ третій годині."
        answer: "о"
        options:
          - "о"
          - "до"
          - "за"
        explanation: "Точний час: о третій."
      - sentence: "____ лекцією волонтери розставлять стільці."
        answer: "Перед"
        options:
          - "Перед"
          - "Після"
          - "Через"
        explanation: "Перед + орудний."
      - sentence: "____ лекції не можна говорити телефоном."
        answer: "Під час"
        options:
          - "Під час"
          - "За"
          - "До"
        explanation: "Дія відбувається всередині лекції."
      - sentence: "____ лекції гості залишаться на каву."
        answer: "Після"
        options:
          - "Після"
          - "Перед"
          - "На"
        explanation: "Пізніше за лекцію - після."
      - sentence: "Програму треба надіслати ____ п'ятниці."
        answer: "до"
        options:
          - "до"
          - "після"
          - "через"
        explanation: "До п'ятниці - дедлайн."
      - sentence: "Фестиваль почнеться ____ тиждень."
        answer: "через"
        options:
          - "через"
          - "за"
          - "на"
        explanation: "Майбутній момент від тепер."
      - sentence: "Сцену змонтували ____ один день."
        answer: "за"
        options:
          - "за"
          - "через"
          - "до"
        explanation: "Один день - час виконання."
      - sentence: "Виставкова зала зарезервована ____ місяць."
        answer: "на"
        options:
          - "на"
          - "протягом"
          - "після"
        explanation: "Строк резервування - на місяць."
      - sentence: "____ місяця кураторка готувала каталог."
        answer: "Упродовж"
        options:
          - "Упродовж"
          - "На"
          - "Через"
        explanation: "Упродовж + родовий підкреслює тривалість."
      - sentence: "____ обіді команда зустрінеться з гідом."
        answer: "По"
        options:
          - "По"
          - "За"
          - "На"
        explanation: "По обіді = після обіду."
      - sentence: "Розмовний клуб працює ____."
        answer: "щопонеділка"
        options:
          - "щопонеділка"
          - "по понеділка"
          - "через понеділка"
        explanation: "Регулярність кожного понеділка."
      - sentence: "Цього разу зустріч перенесли ____ середу."
        answer: "на"
        options:
          - "на"
          - "за"
          - "протягом"
        explanation: "Перенести на середу - призначити новий день."
  - id: wb-3
    type: cloze
    title: Тиждень подій
    instruction: "Заповніть пропуски, щоб отримати точний розклад."
    text: "У понеділок {1} третій годині буде лекція. {2} лекцією волонтери перевірять звук, а {3} лекції технік записуватиме відео. {4} лекції гості залишаться на каву. Програму треба надіслати {5} п'ятниці, бо фестиваль почнеться {6} тиждень. Дизайнер зробить афішу {7} два дні. Культурний центр орендував зал {8} місяць, а координаторка {9} місяця збирала заявки. {10} обіді команда зустрінеться з гідом. Розмовний клуб працює {11}, а 5:50 у програмі можна написати як {12}."
    blanks:
      - id: 1
        answer: "о"
        options:
          - "о"
          - "до"
          - "за"
      - id: 2
        answer: "Перед"
        options:
          - "Перед"
          - "Після"
          - "Через"
      - id: 3
        answer: "під час"
        options:
          - "під час"
          - "за"
          - "до"
      - id: 4
        answer: "Після"
        options:
          - "Після"
          - "Перед"
          - "На"
      - id: 5
        answer: "до"
        options:
          - "до"
          - "після"
          - "через"
      - id: 6
        answer: "через"
        options:
          - "через"
          - "за"
          - "на"
      - id: 7
        answer: "за"
        options:
          - "за"
          - "через"
          - "після"
      - id: 8
        answer: "на"
        options:
          - "на"
          - "протягом"
