  - id: wb-7
    type: essay-response
    title: План тижня
    instruction: "Напишіть короткий робочий розклад із часовими прийменниками."
    min_words: 120
    prompt: "Опишіть тиждень культурного центру, курсу або власного проєкту. Використайте щонайменше: через, за, перед, після, до, під час, протягом або упродовж, на, по обіді, о + час."
    model_answer: "У понеділок о третій годині в центрі буде лекція. Перед лекцією волонтери перевірять звук, а під час лекції технік записуватиме відео. Після лекції гості залишаться на каву. До п'ятниці команда має підготувати афішу, бо через тиждень починається фестиваль. Дизайнер зробить макет за два дні. Ми орендували зал на місяць, а упродовж місяця збирали заявки від учасників. По обіді в суботу група зустрінеться з гідом, а на вихідних відбудеться екскурсія. Щопонеділка після роботи координаторка перевіряє нові реєстрації."
    rubric:
      - criteria: "через / за"
        description: "Майбутній момент і час виконання розрізнені правильно."
      - criteria: "відмінки"
        description: "Перед + орудний, після/до/під час/протягом + родовий ужиті коректно."
      - criteria: "тривалість і строк"
        description: "Протягом/упродовж і на не змішані."
      - criteria: "час доби"
        description: "О + годинниковий час і по обіді або інший часовий вислів ужиті природно."
      - criteria: "зв'язність"
        description: "Текст є реальним розкладом, а не списком непов'язаних речень."
