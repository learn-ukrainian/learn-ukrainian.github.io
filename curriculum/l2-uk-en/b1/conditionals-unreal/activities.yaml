version: '1.0'
module: conditionals-unreal
level: b1
inline:
  - id: act-1
    type: quiz
    title: Реальна чи нереальна умова
    instruction: Оберіть точне пояснення для кожного речення.
    items:
      - question: "Якщо завтра буде дощ, ми залишимося вдома."
        options:
          - Реальна умова для майбутнього.
          - Нереальна умова про минуле.
          - Ввічливе прохання.
        correct: 0
        explanation: Мовець ще не знає погоди, тому розглядає реальний план.
      - question: "Якби завтра був вільний день, я б поїхав до друзів."
        options:
          - Нереальна або уявна умова.
          - Реальна умова з майбутнім часом.
          - Наказовий спосіб.
        correct: 0
        explanation: Якби сигналізує уявну ситуацію, а я б поїхав показує наслідок.
      - question: "Якщо матиму час, прочитаю статтю."
        options:
          - Реальна умова.
          - Нереальна умова.
          - Прислів'я.
        correct: 0
        explanation: Час може з'явитися, тому це реальний майбутній план.
      - question: "Якби я мав більше часу, читав би щовечора."
        options:
          - Нереальна теперішня умова.
          - Реальна минула умова.
          - Питання про спосіб дії.
        correct: 0
        explanation: Мовець зараз не має достатньо часу.
      - question: "Якщо вона знає адресу, вона нам скаже."
        options:
          - Реальна перевірка факту.
          - Нереальна умова.
          - Помилка дублювання би.
        correct: 0
        explanation: Ми ще перевіряємо, чи вона знає адресу.
      - question: "Якби вона знала адресу, вона б нам сказала."
        options:
          - Нереальна умова.
          - Реальна умова.
          - Безособова форма.
        correct: 0
        explanation: Вона адреси не знає, тому наслідок теж уявний.
      - question: "Якщо знатиму адресу, приїду."
        options:
          - Реальна умова з майбутнім значенням.
          - Нереальна умова з якби.
          - Минулий контрфакт.
        correct: 0
        explanation: Майбутня форма знатиму належить до реального сценарію.
      - question: "Якби я знав адресу, приїхав би."
        options:
          - Нереальна умова.
          - Реальна умова.
          - Команда.
        correct: 0
        explanation: Якби я знав показує, що адреси немає або її не було.
      - question: "Якби не робота, я б поїхала на фестиваль."
        options:
          - Нереальна умова з реальною перешкодою.
          - Реальна майбутня умова.
          - Питання про спосіб дії.
        correct: 0
        explanation: Робота справді завадила, тому мовець уявляє варіант без неї.
      - question: "Як би ти це пояснив простіше?"
        options:
          - Питання про спосіб дії, не умовний сполучник.
          - Нереальна умова з якби.
          - Реальна умова з якщо.
        correct: 0
        explanation: Окреме як би відповідає на питання як, яким способом.
      - question: "Коли б я мав нагоду, написав би довший лист."
        options:
          - Нереальна умова з книжнішим варіантом коли б.
          - Реальна умова про майбутнє.
          - Помилка, бо коли б неможливе.
        correct: 0
        explanation: Коли б може вводити нереальну умову, але активна B1-модель - якби.
      - question: "Якщо б я знав раніше, купив би квитки."
        options:
          - Ірреальна модель, близька до якби.
          - Реальна майбутня умова.
          - Питання про спосіб дії.
        correct: 0
        explanation: Якщо б із минулою формою читаємо як нереальну умову; для письма краще якби.
  - id: act-2
    type: fill-in
    title: Побудуйте якби-речення
    instruction: Вставте форму, яка робить речення нереальною умовою.
    items:
      - sentence: "Якби я ____ більше часу, я б тренувався щодня."
        answer: мав
        options:
          - мав
          - матиму
          - маю би
        explanation: Після якби потрібна минула форма без другого би.
      - sentence: "Якби вона ____ адресу, вона б приїхала."
        answer: знала
        options:
          - знала
          - знатиме
          - знає би
        explanation: Нереальна умова вимагає форми знала.
      - sentence: "Якби ми ____ ближче, бачилися б щотижня."
        answer: жили
        options:
          - жили
          - житимемо
          - живемо би
        explanation: Жили показує уявну теперішню ситуацію.
      - sentence: "Якби ти ____ раніше, ми б устигли на потяг."
        answer: вийшов
        options:
          - вийшов
          - вийдеш
          - виходиш би
        explanation: Для минулого контрфакту потрібна минула форма.
      - sentence: "Якби не дощ, ми б ____ гуляти."
        answer: пішли
        options:
          - пішли
          - підемо
          - ідемо би
        explanation: Наслідок у нереальній умові має минулу форму з б.
      - sentence: "Якби я ____ про зустріч, прийшов би."
        answer: знав
        options:
          - знав
          - знатиму
          - знаю би
        explanation: Якби я знав - стандартна форма для жалю.
      - sentence: "Якби вона ____ квиток учора, поїхала б сьогодні."
        answer: купила
        options:
          - купила
          - купить
          - купуватиме
        explanation: Учора вказує на минулий контрфакт.
      - sentence: "Якби ми ____ перешкоду, завершили б роботу швидше."
        answer: прибрали
        options:
          - прибрали
          - приберемо
          - прибираємо би
        explanation: Умова уявна, тому потрібна минула форма.
      - sentence: "Якби брат ____ адресу, він би надіслав лист."
        answer: знав
        options:
          - знав
          - знала
          - знатиме
        explanation: Брат вимагає чоловічої минулої форми знав.
      - sentence: "Якби сестра ____ квиток учора, поїхала б сьогодні."
        answer: купила
        options:
          - купила
          - купив
          - купить
        explanation: Сестра вимагає жіночої форми купила.
      - sentence: "Коли б я ____ нагоду, написав би довший лист."
        answer: мав
        options:
          - мав
          - матиму
          - маю би
        explanation: Коли б також бере минулу форму для нереальної умови.
      - sentence: "Якщо б я ____ раніше, обрав би інший маршрут."
        answer: знав
        options:
          - знав
          - знатиму
          - знаю
        explanation: У розпізнавальній моделі якщо б потрібна минула форма; активніше пишіть якби.
  - id: act-3
    type: error-correction
    title: Приберіть зайве би
    instruction: Знайдіть помилку й подайте природний український варіант.
    items:
      - sentence: "Якби я зробив би завдання, отримав би кращу оцінку."
        error: зробив би
        correction: зробив
        error_type: phrase
        explanation: У частині з якби друге би не потрібне.
      - sentence: "Якби вона знала би адресу, вона б прийшла."
        error: знала би
        correction: знала
        error_type: phrase
        explanation: Якби вже містить умовний маркер.
      - sentence: "Якби ми жили би ближче, зустрічалися б частіше."
        error: жили би
        correction: жили
        error_type: phrase
        explanation: Умова після якби не потребує ще одного би.
      - sentence: "Якщо я мав би більше часу, я б читав більше."
        error: Якщо я мав би
        correction: Якби я мав
        error_type: phrase
        explanation: Для нереальної теперішньої умови потрібне якби.
      - sentence: "Якби я знатиму адресу, приїхав би."
        error: знатиму
        correction: знав
        error_type: word
        explanation: Після якби потрібна минула форма.
      - sentence: "Я б поїхав б до Львова, якби мав час."
        error: поїхав б
        correction: поїхав
        error_type: phrase
        explanation: У наслідку вже є я б, тому друге б зайве.
      - sentence: "Як би я мав більше часу, я б допоміг."
        error: Як би
        correction: Якби
        error_type: phrase
        explanation: Умовний сполучник пишеться разом.
      - sentence: "Якби вона знав, сказала б нам."
        error: знав
        correction: знала
        error_type: word
        explanation: Форма минулого часу має узгоджуватися з вона.
      - sentence: "Якби брат знала адресу, він би надіслав лист."
        error: знала
        correction: знав
        error_type: word
        explanation: Брат потребує чоловічої форми знав.
      - sentence: "Коли б я мав би час, написав би довший лист."
        error: мав би
        correction: мав
        error_type: phrase
        explanation: Після коли б у частині умови не дублюємо би.
      - sentence: "Якщо б я знатиму раніше, обрав би інший маршрут."
        error: знатиму
        correction: знав
        error_type: word
        explanation: Ірреальна умова потребує минулої форми, не майбутньої.
      - sentence: "Аби я мав час, я б поїхав до Львова."
        error: Аби
        correction: Якби
        error_type: word
        explanation: Аби не є нейтральною заміною якби в такій нереальній умові.
  - id: act-4
    type: match-up
    title: Умова і наслідок
    instruction: Поєднайте якби-частину з природним наслідком.
    pairs:
      - left: Якби я мав більше часу
        right: я б частіше телефонував батькам
      - left: Якби ми жили ближче
        right: бачилися б щовихідних
      - left: Якби вона знала адресу
        right: вона б надіслала лист
      - left: Якби не дощ
        right: ми б пішли гуляти
      - left: Якби я купив квиток учора
        right: поїхав би сьогодні
      - left: Якби ти сказав раніше
        right: я б підготувала документи
      - left: Якби вони вийшли о сьомій
        right: встигли б на потяг
      - left: Якби не ваша допомога
        right: ми б не завершили проєкт
      - left: Якби брат знав адресу
        right: він би надіслав лист
      - left: Коли б я мав нагоду
        right: написав би довший лист
      - left: Якби ми забронювали столик
        right: не чекали б біля входу
      - left: Якби я перевірив пошту вчора
        right: побачив би повідомлення
  - id: act-5
    type: group-sort
    title: Що показує речення
    instruction: Розподіліть речення за значенням.
    groups:
      - label: Реальна умова
        items:
          - Якщо матиму час, поїду.
          - Якщо буде дощ, залишимося вдома.
          - Якщо знатиму адресу, приїду.
          - Якщо зустріч почнеться раніше, напишіть мені.
      - label: Нереальна теперішня умова
        items:
          - Якби я мав більше часу, тренувався б щодня.
          - Якби ми жили ближче, бачилися б частіше.
          - Якби вона знала адресу, прийшла б.
          - Якби я міг, допоміг би зараз.
      - label: Нереальна минула умова
        items:
          - Якби я знав раніше, купив би квиток.
          - Якби ми вийшли раніше, встигли б на потяг.
          - Якби вона почула дзвінок, відчинила б двері.
          - Якби не затор, ми б не спізнилися.
      - label: Межа теми
        items:
          - Чи могли б ви повторити?
          - Я хотів би уточнити час зустрічі.
          - Як би ти це пояснив простіше?
          - Аби не запізнитися, вийдімо раніше.
workbook:
  - id: wb-1
    type: quiz
    title: Вибір сполучника
    instruction: Оберіть правильний сполучник або пояснення.
    items:
      - question: "____ матиму час, зателефоную."
        options:
          - Якщо
          - Якби
          - Як би
        correct: 0
        explanation: Це реальна майбутня умова.
      - question: "____ я мав час, зателефонував би."
        options:
          - Якби
          - Якщо
          - Аби
        correct: 0
        explanation: Це нереальна умова.
      - question: "____ вона знала адресу, вона б прийшла."
        options:
          - Якби
          - Якщо
          - Хоч
        correct: 0
        explanation: Вона адреси не знає, тому потрібне якби.
      - question: "____ знатиму адресу, прийду."
        options:
          - Якщо
          - Якби
          - Коли б
        correct: 0
        explanation: Майбутня форма знатиму належить до реальної умови.
      - question: "____ я знав адресу, прийшов би."
        options:
          - Якби
          - Якщо
          - Щоб
        correct: 0
        explanation: Знав + би створює нереальну умову.
      - question: "____ не робота, я б поїхала на фестиваль."
        options:
          - Якби
          - Якщо
          - Коли
        correct: 0
        explanation: Якби не називає перешкоду, яка справді була.
      - question: "____ буде фестиваль наступного року, поїдемо."
        options:
          - Якщо
          - Якби
          - Як би
        correct: 0
        explanation: Наступний рік ще можливий, тому це реальна умова.
      - question: "____ ти це зробив інакше?"
        options:
          - Як би
          - Якби
          - Якщо
        correct: 0
        explanation: Тут питання про спосіб дії, тому пишемо окремо.
      - question: "____ я мав нагоду, написав би довший лист."
        options:
          - Коли б
          - Якщо
          - Як би
        correct: 0
        explanation: Коли б може вводити нереальну умову, близьку до якби.
      - question: "____ я знав раніше, купив би квитки."
        options:
          - Якби
          - Якщо
          - Як би
        correct: 0
        explanation: Активна нейтральна модель для нереальної умови - якби.
      - question: "____ не запізнитися, вийдімо раніше."
        options:
          - Аби
          - Якби
          - Якщо б
        correct: 0
        explanation: Аби тут означає мету, близьку до щоб не запізнитися.
      - question: "____ я знав раніше, купив би квитки - як це читати?"
        options:
          - Якщо б; це ірреальна модель, але для B1 краще якби.
          - Якщо; це реальна майбутня умова.
          - Як би; це питання про спосіб.
        correct: 0
        explanation: Якщо б із минулою формою може позначати ірреаліс, але активніше пишіть якби.
  - id: wb-2
    type: fill-in
    title: Б чи би
    instruction: Вставте частку, яка звучить природно після попереднього слова.
    items:
      - sentence: "Я ____ поїхав, якби мав квиток."
        answer: б
        options:
          - б
          - би
          - був
        explanation: Після я природно стоїть б.
      - sentence: "Він ____ допоміг, якби знав про проблему."
        answer: би
        options:
          - би
          - б
          - був
        explanation: Після він зручніше би.
      - sentence: "Вона ____ сказала, якби знала адресу."
        answer: б
        options:
          - б
          - би
          - була
        explanation: Після вона природне б.
      - sentence: "Міг ____ прийти раніше, якби закінчив роботу."
        answer: би
        options:
          - би
          - б
          - був
        explanation: Після міг природне би.
      - sentence: "Могла ____ залишитися, якби не зустріч."
        answer: б
        options:
          - б
          - би
          - була
        explanation: Після могла природне б.
      - sentence: "Ми ____ встигли, якби вийшли раніше."
        answer: б
        options:
          - б
          - би
          - були
        explanation: Після ми природне б.
      - sentence: "Зробив ____ інакше, якби знав правило."
        answer: би
        options:
          - би
          - б
          - був
        explanation: Після зробив природне би.
      - sentence: "Сказала ____ правду, якби її запитали."
        answer: б
        options:
          - б
          - би
          - була
        explanation: Після сказала природне б.
      - sentence: "Хотів ____ поїхати, якби мав вихідні."
        answer: би
        options:
          - би
          - б
          - був
        explanation: Після хотів природніше би.
      - sentence: "Хотіла ____ уточнити адресу, якби мала номер."
        answer: б
        options:
          - б
          - би
          - була
        explanation: Після хотіла природніше б.
      - sentence: "Вони ____ допомогли, якби знали про проблему."
        answer: б
        options:
          - б
          - би
          - були
        explanation: Після вони природне б.
      - sentence: "Брат ____ надіслав лист, якби знав адресу."
        answer: би
        options:
          - би
          - б
          - був
        explanation: Після брат природніше би.
  - id: wb-3
    type: error-correction
    title: Редагуємо типові помилки
    instruction: Знайдіть помилку й подайте нормативний варіант.
    items:
      - sentence: "Якби я зробив би завдання, я б відпочив."
        error: зробив би
        correction: зробив
        error_type: phrase
        explanation: Після якби не дублюємо би.
      - sentence: "Якби я знатиму адресу, приїхав би."
        error: знатиму
        correction: знав
        error_type: word
        explanation: Для нереальної умови потрібна минула форма.
      - sentence: "Якщо я мав би більше часу, я б тренувався."
        error: Якщо я мав би
        correction: Якби я мав
        error_type: phrase
        explanation: Це нереальна теперішня умова.
      - sentence: "Як би вона знала, сказала б."
        error: Як би
        correction: Якби
        error_type: phrase
        explanation: Умовний сполучник пишеться разом.
      - sentence: "Вона б прийшов, якби знала адресу."
        error: прийшов
        correction: прийшла
        error_type: word
