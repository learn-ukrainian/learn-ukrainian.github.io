  - id: wb-11
    type: essay-response
    title: Уявний варіант і реальність
    instruction: Напишіть короткий текст і перевірте власні умовні речення.
    prompt: "Напишіть 110-140 слів українською про ситуацію, яка могла б скластися інакше: навчання, поїздка, зустріч, робота або житло. Використайте щонайменше п'ять нереальних умов із якби, одну конструкцію якби не..., одну реальну умову з якщо для майбутнього плану і дві форми з правильним б/би. Після тексту випишіть три речення й коротко поясніть, чому там якби або якщо."
    min_words: 110
    model_answer: "Минулого тижня я не поїхала на зустріч мовного клубу, і тепер трохи шкодую. Якби я купила квиток раніше, поїхала б до Львова в суботу. Якби не термінова робота, я б залишилася там на цілий день. Якби я знала, що буде така цікава дискусія, попросила б колегу замінити мене. Якби ми жили ближче, я б відвідувала такі зустрічі щомісяця. Якби друзі написали мені раніше, ми б поїхали разом. Тепер я планую інакше: якщо наступного місяця буде така подія, я куплю квиток заздалегідь. Я також зрозуміла, що такі речення корисні для чесного аналізу, а не тільки для жалю. У першому реченні якби показує нереальне минуле. У реченні з якщо йдеться про реальний план. У фразі якби не робота названа перешкода."
    rubric:
      - criteria: Обсяг
        description: Текст має 110-140 слів і читається як зв'язна ситуація.
        points: 2
      - criteria: Нереальні умови
        description: Є щонайменше п'ять правильних речень із якби.
        points: 3
      - criteria: Контраст
        description: Є одна реальна умова з якщо для майбутнього плану.
        points: 2
      - criteria: Б/би
        description: Частки б/би стоять природно і не дублюються після якби.
        points: 2
      - criteria: Пояснення
        description: Після тексту пояснено три власні речення.
        points: 2
      - criteria: Мова
        description: Речення природні, без русизмів і без механічного перекладу з англійської.
        points: 1
