version: '1.0'
module: noun-subclasses-hissing
level: b1
inline:
  - id: act-1
    type: quiz
    title: Знайдіть мішану групу
    instruction: Оберіть правильну класифікацію або пояснення.
    items:
      - question: Чому іменник "товариш" належить до мішаної групи?
        options:
          - Основа закінчується на шиплячий ш.
          - У слові є три склади.
          - Це назва істоти.
        correct: 0
        explanation: Групу визначає кінцевий приголосний основи товариш-.
      - question: Яка форма орудного відмінка однини є нормативною?
        options:
          - сторожем
          - сторожом
          - сторожею
        correct: 0
        explanation: Мішана група в орудному однини має закінчення -ем.
      - question: Яке слово не є прикладом мішаної групи?
        options:
          - серце
          - плече
          - прізвище
        correct: 0
        explanation: Серце має основу на ц, а не на шиплячий приголосний.
      - question: У якому слові основа закінчується на щ?
        options:
          - плащ
          - слухач
          - товариш
        correct: 0
        explanation: Основа плащ- закінчується на щ.
      - question: Яке словосполучення має правильну форму?
        options:
          - різати ножем
          - різати ножом
          - різати ножею
        correct: 0
        explanation: Ніж у формі орудного відмінка дає ножем.
      - question: Чому "бачу товариша", але "бачу ніж"?
        options:
          - Знахідний залежить від істотності.
          - Ніж має тільки одну форму.
          - Товариш належить до іншої відміни.
        correct: 0
        explanation: Для істот знахідний збігається з родовим, для неістот - з називним.
      - question: Який кличний відмінок є нормативним для "слухач"?
        options:
          - слухачу
          - слухаче
          - слухачом
        correct: 0
        explanation: Іменники на -ач у звертанні звичайно мають кличний на -у.
      - question: Яка форма показує мішану групу середнього роду?
        options:
          - плечем
          - серцем
          - полем
        correct: 0
        explanation: Плече має основу плеч- на шиплячий ч.
  - id: act-2
    type: fill-in
    title: Орудний і знахідний
    instruction: Виберіть форму, яка пасує до речення.
    items:
      - sentence: "Ми говорили з ____ після заняття."
        answer: товаришем
        options:
          - товаришем
          - товаришом
          - товаришу
        explanation: Орудний від товариш - товаришем.
      - sentence: "Кухар ріже овочі гострим ____."
        answer: ножем
        options:
          - ножем
          - ножом
          - ніжем
        explanation: Ніж має орудний ножем.
      - sentence: "Викладач працював зі ____ онлайн."
        answer: слухачем
        options:
          - слухачем
          - слухачом
          - слухачу
        explanation: Слухач у формі орудного відмінка має -ем.
      - sentence: "Я бачу ____ біля входу."
        answer: сторожа
        options:
          - сторожа
          - сторож
          - сторожем
        explanation: Сторож - істота, тому знахідний збігається з родовим.
      - sentence: "Я бачу ____ на столі."
        answer: ключ
        options:
          - ключ
          - ключа
          - ключем
        explanation: Ключ - неістота, тому знахідний збігається з називним.
      - sentence: "У документі є помилка в ____."
        answer: прізвищі
        options:
          - прізвищі
          - прізвищем
          - прізвища
        explanation: Місцевий від прізвище - у прізвищі.
      - sentence: "Після тренування боліло праве ____."
        answer: плече
        options:
          - плече
          - плечем
          - плеча
        explanation: Після боліло тут потрібен називний відмінок.
      - sentence: "____, поставте запитання після таблиці."
        answer: Слухачу
        options:
          - Слухачу
          - Слухаче
          - Слухачем
        explanation: У звертанні потрібен кличний відмінок слухачу.
  - id: act-3
    type: match-up
    title: Називний і контрольна форма
    instruction: Поєднайте називний відмінок із формою, яка перевіряє мішану групу.
    pairs:
      - left: товариш
        right: товаришем
      - left: сторож
        right: сторожем
      - left: слухач
        right: слухачем
      - left: читач
        right: читачем
      - left: ніж
        right: ножем
      - left: ключ
        right: ключем
      - left: плащ
        right: плащем
      - left: плече
        right: плечем
  - id: act-4
    type: group-sort
    title: Що показує форма?
    instruction: Розподіліть форми за граматичною ознакою.
    groups:
      - label: Орудний однини
        items:
          - товаришем
          - ножем
          - ключем
          - плечем
      - label: Орудний множини
        items:
          - товаришами
          - слухачами
          - ножами
          - плащами
      - label: Знахідний істот
        items:
          - товариша
          - слухача
          - читача
          - сторожа
      - label: Знахідний неістот
        items:
          - ніж
          - ключ
          - плащ
          - м'яч
  - id: act-5
    type: error-correction
    title: Редагуємо мішану групу
    instruction: Знайдіть неправильну форму й подайте нормативний варіант.
    items:
      - sentence: "Я розмовляв із товаришом після лекції."
        error: товаришом
        correction: товаришем
        error_type: word
        explanation: Орудний від товариш має закінчення -ем.
      - sentence: "Вона різала яблуко ножом."
        error: ножом
        correction: ножем
        error_type: word
        explanation: Ніж у формі орудного відмінка дає ножем.
      - sentence: "Ми накрилися плащом від дощу."
        error: плащом
        correction: плащем
        error_type: word
        explanation: Плащ належить до мішаної групи, тому орудний - плащем.
      - sentence: "Слухаче, повторіть відповідь."
        error: Слухаче
        correction: Слухачу
        error_type: word
        explanation: Кличний від слухач - слухачу.
      - sentence: "Я бачу товариш біля музею."
        error: товариш
        correction: товариша
        error_type: word
        explanation: Товариш - істота, тому знахідний збігається з родовим.
      - sentence: "Я бачу ключа на полиці."
        error: ключа
        correction: ключ
        error_type: word
        explanation: Ключ - неістота, тому знахідний збігається з називним.
      - sentence: "У вашому прізвищу є літера щ."
        error: прізвищу
        correction: прізвищі
        error_type: word
        explanation: Після у потрібен місцевий відмінок - у прізвищі.
      - sentence: "Серце належить до мішаної групи."
        error: мішаної
        correction: м'якої
        error_type: word
        explanation: Серце має основу на ц і належить до м'якої групи II відміни.
workbook:
  - id: wb-1
    type: quiz
    title: Правило в деталях
    instruction: Оберіть точну відповідь.
    items:
      - question: Що визначає мішану групу в другій відміні?
        options:
          - Кінцевий шиплячий приголосний основи.
          - Наявність апострофа в слові.
          - Кількість складів у називному відмінку.
        correct: 0
        explanation: Групу визначає основа, а не випадкова літера в слові.
      - question: Яка форма є орудним відмінком однини?
        options:
          - ключем
          - ключі
          - ключів
        correct: 0
        explanation: Ключем відповідає на питання чим?
      - question: Який іменник середнього роду належить до мішаної групи?
        options:
          - видовище
          - серце
          - море
        correct: 0
        explanation: Видовище має основу видовищ- на щ.
      - question: Яка форма є знахідним відмінком множини для назви істот?
        options:
          - слухачів
          - слухачі
          - слухачами
        correct: 0
        explanation: Для істот знахідний множини збігається з родовим.
      - question: Яка форма є знахідним відмінком множини для назви неістот?
        options:
          - ножі
          - ножів
          - ножами
        correct: 0
        explanation: Для неістот знахідний множини збігається з називним.
      - question: Який кличний відмінок є нормативним?
        options:
          - товаришу
          - товарише
          - товаришем
        correct: 0
        explanation: Товариш у звертанні має форму товаришу.
      - question: Чому "серце" не є прикладом мішаної групи?
        options:
          - Основа закінчується на ц, а не на шиплячий.
          - Це слово не має відмінків.
          - Групу визначає тільки закінчення -е.
        correct: 0
        explanation: Серце - друга відміна, м'яка група.
      - question: Яка форма множини має орудний відмінок?
        options:
          - товаришами
          - товаришів
          - товариші
        correct: 0
        explanation: Орудний множини має закінчення -ами.
  - id: wb-2
    type: fill-in
    title: Вставте правильну форму
    instruction: Виберіть нормативну форму за контекстом.
    items:
      - sentence: "Музейний ____ пояснив правила відвідувачам."
        answer: сторож
        options:
          - сторож
          - сторожа
          - сторожем
        explanation: Потрібен називний відмінок підмета.
      - sentence: "Я подякував ____ за допомогу."
        answer: товаришеві
        options:
          - товаришеві
          - товаришем
          - товариш
        explanation: Після подякував потрібен давальний відмінок.
      - sentence: "Ми зустріли ____ біля аудиторії."
        answer: слухача
        options:
          - слухача
          - слухач
          - слухачем
        explanation: Слухач - істота, тому знахідний збігається з родовим.
      - sentence: "Він загубив ____ від квартири."
        answer: ключ
        options:
          - ключ
          - ключа
          - ключем
        explanation: Ключ - неістота, знахідний збігається з називним.
      - sentence: "У вправі треба працювати з ____."
        answer: читачем
        options:
          - читачем
          - читачом
          - читачу
        explanation: Орудний від читач - читачем.
      - sentence: "Після гри діти шукали ____."
        answer: м'яч
        options:
          - м'яч
          - м'яча
          - м'ячем
        explanation: М'яч - неістота, тому знахідний збігається з називним.
      - sentence: "У формі треба вписати ____ латинкою."
        answer: прізвище
        options:
          - прізвище
          - прізвищем
          - прізвища
        explanation: Потрібен знахідний відмінок, що збігається з називним.
      - sentence: "Лікар оглянув ліве ____."
        answer: плече
        options:
          - плече
          - плечем
          - плеча
        explanation: Знахідний середнього роду збігається з називним.
      - sentence: "Документ підписали всі ____."
        answer: товариші
        options:
          - товариші
          - товаришів
          - товаришами
        explanation: Потрібен називний множини підмета.
      - sentence: "Ми говорили з кількома ____."
        answer: слухачами
        options:
          - слухачами
          - слухачів
          - слухачі
        explanation: З кількома вимагає орудного відмінка множини.
  - id: wb-3
    type: match-up
    title: Форма і пояснення
    instruction: Поєднайте форму з граматичним поясненням.
    pairs:
      - left: товаришем
        right: орудний однини, істота
      - left: ножем
        right: орудний однини, неістота
      - left: товариша
        right: знахідний однини істоти
      - left: ніж
        right: знахідний однини неістоти
      - left: товаришами
        right: орудний множини істот
      - left: ножами
        right: орудний множини неістот
      - left: прізвищем
        right: орудний однини середнього роду
      - left: у прізвищі
        right: місцевий однини середнього роду
  - id: wb-4
    type: true-false
    title: Так чи ні
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Товариш належить до мішаної групи."
        correct: true
        explanation: Основа товариш- закінчується на ш.
      - statement: "Орудний від сторож - сторожом."
        correct: false
        explanation: Нормативна форма - сторожем.
      - statement: "Плече належить до мішаної групи."
        correct: true
        explanation: Основа плеч- закінчується на ч.
      - statement: "Серце належить до мішаної групи."
        correct: false
        explanation: Серце - друга відміна, м'яка група.
      - statement: "У множині орудний має форму товаришами."
        correct: true
        explanation: Орудний множини має -ами.
      - statement: "Бачу слухача - правильний знахідний для назви істоти."
        correct: true
        explanation: Для істот знахідний збігається з родовим.
      - statement: "Бачу ключа - нейтральна форма для предмета ключ."
        correct: false
        explanation: "Для неістот знахідний збігається з називним: бачу ключ."
      - statement: "Кличний від читач - читачу."
        correct: true
        explanation: Слова на -ач у звертанні часто мають -у.
      - statement: "Прізвище має орудний прізвищем."
        correct: true
        explanation: Це середній рід мішаної групи.
      - statement: "Поле є прикладом мішаної групи."
        correct: false
        explanation: Поле належить до м'якої групи, основа не на шиплячий.
      - statement: "М'ячем - правильний орудний від м'яч."
        correct: true
        explanation: Основа м'яч- закінчується на ч.
      - statement: "Кличний множини може збігатися з називним: товариші."
        correct: true
        explanation: У звертанні до групи природно сказати Товариші.
  - id: wb-5
    type: group-sort
    title: Класифікуємо іменники
    instruction: Розподіліть іменники за групою або контрастом.
    groups:
      - label: Мішана група, чоловічий рід
        items:
          - товариш
          - слухач
          - сторож
          - ніж
          - ключ
          - плащ
          - м'яч
          - пейзаж
      - label: Мішана група, середній рід
        items:
          - плече
          - прізвище
          - видовище
          - вогнище
          - становище
      - label: Не мішана група
        items:
          - серце
          - поле
          - море
          - сонце
          - обличчя
      - label: Тверда група для порівняння
        items:
          - завод
          - стіл
          - дуб
          - брат
          - сад
  - id: wb-6
    type: cloze
    title: Пояснення правила
    instruction: Вставте слова, які точно пояснюють мішану групу.
    blanks:
      - id: 1
        answer: основа
        options:
          - основа
          - наголос
          - переклад
      - id: 2
        answer: шиплячий
        options:
          - шиплячий
          - голосний
          - подвоєний
      - id: 3
        answer: орудному
        options:
          - орудному
          - називному
          - родовому
      - id: 4
        answer: -ем
        options:
          - -ем
          - -ом
          - -ою
      - id: 5
        answer: товариша
        options:
          - товариша
          - товариш
          - товаришем
      - id: 6
        answer: ніж
        options:
          - ніж
          - ножа
          - ножем
      - id: 7
        answer: плечем
        options:
          - плечем
          - плечом
          - плечу
      - id: 8
        answer: м'якої
        options:
          - м'якої
          - мішаної
          - твердої
      - id: 9
        answer: товаришами
        options:
          - товаришами
          - товаришем
          - товаришів
      - id: 10
        answer: кличний
        options:
          - кличний
          - орудний
          - місцевий
    text: "Мішану групу визначає {1}, яка закінчується на {2} приголосний. В {3} відмінку однини пишемо {4}: товаришем, ножем, плечем. Для істоти кажемо бачу {5}, а для неістоти - бачу {6}. Середній рід має форму {7}. Серце належить до {8} групи. У множині правильно {9}. У звертанні працює {10} відмінок."
  - id: wb-7
    type: grammar-identify
    title: Визначте форму
    instruction: Назвіть відмінок, число або групу.
    items:
      - word: товаришем
        task: Визначте відмінок і число.
        answer: орудний відмінок однини
      - word: ножами
        task: Визначте відмінок і число.
        answer: орудний відмінок множини
      - word: слухачів
        task: Визначте можливий відмінок у реченні "бачу слухачів".
        answer: знахідний відмінок множини істот
      - word: ключі
        task: Визначте можливий відмінок у реченні "бачу ключі".
        answer: знахідний відмінок множини неістот
      - word: прізвищем
        task: Визначте відмінок і рід.
        answer: орудний відмінок однини, середній рід
      - word: у прізвищі
        task: Визначте відмінок.
        answer: місцевий відмінок
      - word: плече
        task: Визначте групу.
        answer: мішана група
      - word: серце
        task: Визначте групу.
        answer: м'яка група II відміни
      - word: товаришу
        task: Визначте форму у звертанні.
        answer: кличний відмінок
      - word: читачем
        task: Визначте закінчення.
        answer: -ем
      - word: борщу
        task: Визначте відмінок у словосполученні "немає борщу".
        answer: родовий відмінок однини
      - word: м'яч
        task: Визначте знахідний у реченні "ловлю м'яч".
        answer: знахідний відмінок однини неістоти
  - id: wb-8
