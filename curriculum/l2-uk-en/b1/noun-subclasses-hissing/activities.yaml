  - id: wb-11
    type: essay-response
    title: Поясніть мішану групу в контексті
    instruction: Напишіть коротке пояснення з власними прикладами.
    prompt: "Напишіть 8-10 речень українською. Поясніть, як визначити мішану групу другої відміни, чому в орудному однини потрібне -ем, як працює знахідний відмінок для істот і неістот, і чому серце не є прикладом мішаної групи. Використайте щонайменше шість слів: товариш, слухач, сторож, ніж, ключ, плече, прізвище, серце."
    min_words: 90
    model_answer: "Мішану групу другої відміни визначає основа на шиплячий приголосний. Наприклад, товариш, слухач і сторож мають основи на ш, ч і ж. В орудному відмінку однини ці слова мають закінчення -ем: товаришем, слухачем, сторожем. Так само кажемо ножем і ключем, бо ніж і ключ теж належать до мішаної групи. У знахідному відмінку важливо розрізняти істоти й неістоти. Правильно: бачу товариша і бачу слухача, але бачу ніж і бачу ключ. Середній рід теж може належати до мішаної групи, наприклад плече і прізвище. Однак серце не є мішаною групою, бо його основа закінчується на ц, а не на шиплячий. Тому серце належить до м'якої групи другої відміни."
    rubric:
      - criteria: Класифікація
        description: Правильно пояснено основу на шиплячий приголосний.
        points: 3
      - criteria: Форми
        description: Наведено нормативні форми орудного та знахідного відмінків.
        points: 4
      - criteria: Контраст
        description: Чітко пояснено, чому серце не є мішаною групою.
        points: 2
      - criteria: Мова
        description: Речення природні, без русизмів і без форм на -ом у мішаній групі.
        points: 1
