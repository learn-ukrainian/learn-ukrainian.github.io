- title: "Заболотний Grade 7, §30"
  role: textbook
  notes: "Дієслівні форми на -но, -то; пасивні конструкції з дієсловами на -ся; стилістична перевага активних конструкцій."
- title: "Авраменко Grade 7, §51"
  role: textbook
  notes: "Безособові форми на -но, -то; практична межа між результатом дії, виконавцем і природним активним реченням."
