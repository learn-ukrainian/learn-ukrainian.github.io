version: '1.0'
module: passive-voice-intro
level: b1
inline:
  - id: act-1
    type: quiz
    title: Впізнайте фокус речення
    instruction: Оберіть, яку модель показує речення.
    items:
      - question: "Команда завершила проєкт."
        options:
          - "активний стан: виконавець названий"
          - "форма на -но/-то: результат без виконавця"
          - "пасив на -ся: процес або правило"
        correct: 0
        explanation: "Підмет команда виконує дію."
      - question: "Проєкт завершено."
        options:
          - "форма на -но/-то: результат без виконавця"
          - "активний стан із названим виконавцем"
          - "власне зворотна дія"
        correct: 0
        explanation: "Завершено фіксує готовий результат."
      - question: "Проєкт завершується цього тижня."
        options:
          - "пасивноподібна форма на -ся: процес"
          - "форма на -но/-то: завершений результат"
          - "активний стан із виконавцем"
        correct: 0
        explanation: "Завершується показує процес, а не готовий результат."
      - question: "Квитки продаються онлайн."
        options:
          - "форма на -ся для правила або способу"
          - "форма на -но/-то для проданих квитків"
          - "активне речення з продавцем"
        correct: 0
        explanation: "Продаються онлайн означає спосіб продажу."
      - question: "Усі квитки продано."
        options:
          - "форма на -но/-то для результату"
          - "пасив на -ся для правила"
          - "взаємне дієслово"
        correct: 0
        explanation: "Продано означає результат: квитків уже немає."
      - question: "Олена написала звіт."
        options:
          - "активний стан"
          - "безособова форма"
          - "пасивноподібна форма"
        correct: 0
        explanation: "Олена є виконавицею дії."
      - question: "Звіт написано."
        options:
          - "безособова форма на -но"
          - "форма на -ся"
          - "власне зворотна дія"
        correct: 0
        explanation: "Написано не змінюється і не називає виконавця."
      - question: "Звіт готується до п'ятниці."
        options:
          - "форма на -ся для процесу"
          - "форма на -но/-то для завершеного результату"
          - "актив із названою людиною"
        correct: 0
        explanation: "Готується показує, що робота ще триває."
      - question: "Файл збережено."
        options:
          - "системне повідомлення з формою на -но"
          - "пасив на -ся для правила"
          - "активний стан"
        correct: 0
        explanation: "Збережено повідомляє про готовий результат."
      - question: "Файл зберігається автоматично."
        options:
          - "форма на -ся для правила системи"
          - "форма на -но для завершеної дії"
          - "кличний відмінок"
        correct: 0
        explanation: "Зберігається автоматично описує правило."
      - question: "Прочитана книга лежить на столі."
        options:
          - "дієприкметникова ознака, не форма на -но/-то"
          - "форма на -ся"
          - "активний стан"
        correct: 0
        explanation: "Прочитана узгоджується з книга, тому це не незмінне прочитано."
      - question: "Ми перевірили заявку."
        options:
          - "активний стан"
          - "форма на -то"
          - "пасивний дієприкметник"
        correct: 0
        explanation: "Ми - виконавець дії."
  - id: act-2
    type: match-up
    title: Процес чи результат
    instruction: З'єднайте форму з точним значенням.
    pairs:
      - left: "будується"
        right: "процес будівництва триває"
      - left: "збудовано"
        right: "результат будівництва готовий"
      - left: "надсилається"
        right: "повідомлення надходить за правилом або зараз у процесі"
      - left: "надіслано"
        right: "лист уже відправлено"
      - left: "відкривається"
        right: "розклад, правило або процес відкриття"
      - left: "відкрито"
        right: "доступ або вхід уже відкритий"
      - left: "перевіряється"
        right: "заявка зараз у процесі перевірки"
      - left: "перевірено"
        right: "перевірка завершена"
      - left: "продаються"
        right: "є спосіб або місце продажу"
      - left: "продано"
        right: "товар уже купили або його немає"
      - left: "готується"
        right: "робота над текстом триває"
      - left: "підготовлено"
        right: "матеріал уже готовий"
  - id: act-3
    type: fill-in
    title: Форма на -но/-то
    instruction: Вставте форму, яка фіксує готовий результат без виконавця.
    items:
      - sentence: "Роботу ____ вчасно."
        answer: "виконано"
        options:
          - "виконано"
          - "виконується"
          - "виконали"
        explanation: "Потрібен результат без виконавця."
      - sentence: "Книгу ____ до кінця."
        answer: "прочитано"
        options:
          - "прочитано"
          - "читається"
          - "читали"
        explanation: "Прочитано показує завершену дію."
      - sentence: "Листа ____ вчора."
        answer: "надіслано"
        options:
          - "надіслано"
          - "надсилається"
          - "надісланий"
        explanation: "Листа лишається додатком, форма незмінна."
      - sentence: "Рішення ____ на засіданні."
        answer: "ухвалено"
        options:
          - "ухвалено"
          - "ухвалюється"
          - "ухвалений"
        explanation: "Ухвалено - короткий результат."
      - sentence: "Вхід ____ з десятої ранку."
        answer: "відкрито"
        options:
          - "відкрито"
          - "відкривається"
          - "відкритий"
        explanation: "Відкрито повідомляє про стан доступу."
      - sentence: "Пароль ____ успішно."
        answer: "змінено"
        options:
          - "змінено"
          - "змінюється"
          - "змінений"
        explanation: "Це системне повідомлення про результат."
      - sentence: "Заявку ____."
        answer: "прийнято"
        options:
          - "прийнято"
          - "приймається"
          - "прийнята"
        explanation: "Прийнято - безособова форма."
      - sentence: "Оплату ____."
        answer: "підтверджено"
        options:
          - "підтверджено"
          - "підтверджується"
          - "підтверджена"
        explanation: "Підтверджено фіксує завершену перевірку."
      - sentence: "Файл ____ у спільній папці."
        answer: "збережено"
        options:
          - "збережено"
          - "зберігається"
          - "збережений"
        explanation: "Збережено - результат дії."
      - sentence: "Доступ ____."
        answer: "відкрито"
        options:
          - "відкрито"
          - "відкривається"
          - "відкритий"
        explanation: "Коротке повідомлення: доступ уже є."
      - sentence: "Стіни ____ у світлі кольори."
        answer: "пофарбовано"
        options:
          - "пофарбовано"
          - "фарбуються"
          - "пофарбовані"
        explanation: "Пофарбовано - результат ремонту."
      - sentence: "Старі крісла ____ на нові."
        answer: "замінено"
        options:
          - "замінено"
          - "замінюються"
          - "замінені"
        explanation: "Замінено показує, що дія завершена."
  - id: act-4
    type: cloze
    title: Редагуємо пасив
    instruction: Заповніть пропуски в поясненні про вибір конструкції.
    text: "Якщо виконавець важливий, краще використати {1} стан: команда {2} проєкт. Якщо важливий готовий результат, природна форма на {3}: проєкт {4}. Якщо йдеться про процес або правило, можлива форма на {5}: проєкт {6} цього тижня. Форма на -но/-то є {7}: вона не узгоджується з іменником. У реченні книгу прочитано слово книгу лишається в {8} відмінку. Пасив із явним виконавцем в орудному часто звучить {9}, тому речення документ написано Оленою краще переписати: Олена {10} документ. Не кожне -ся є пасивом: Олена {11} - власне зворотна дія, а квитки {12} онлайн - правило продажу."
    blanks:
      - id: 1
        answer: "активний"
        options:
          - "активний"
          - "пасивний"
          - "кличний"
      - id: 2
        answer: "завершила"
        options:
          - "завершила"
          - "завершено"
          - "завершується"
      - id: 3
        answer: "-но/-то"
        options:
          - "-но/-то"
          - "-ся"
          - "-сь"
      - id: 4
        answer: "завершено"
        options:
          - "завершено"
          - "завершується"
          - "завершила"
      - id: 5
        answer: "-ся"
        options:
          - "-ся"
          - "-но"
          - "-то"
      - id: 6
        answer: "завершується"
        options:
          - "завершується"
          - "завершено"
          - "завершений"
      - id: 7
        answer: "незмінною"
        options:
          - "незмінною"
          - "узгодженою"
          - "кличною"
      - id: 8
        answer: "знахідному"
        options:
          - "знахідному"
          - "називному"
          - "кличному"
      - id: 9
        answer: "неприродно"
        options:
          - "неприродно"
          - "розмовно"
          - "поетично"
      - id: 10
        answer: "написала"
        options:
          - "написала"
          - "написано"
          - "пишеться"
      - id: 11
        answer: "миється"
        options:
          - "миється"
          - "мито"
          - "миють"
      - id: 12
        answer: "продаються"
        options:
          - "продаються"
          - "продано"
          - "продані"
  - id: act-5
    type: error-correction
    title: Приберіть канцелярит
    instruction: Виправте неприродну або нечітку конструкцію, зберігаючи зміст.
    items:
      - sentence: "Звіт був написаний Оленою."
        error: "Звіт був написаний Оленою"
        correction: "Олена написала звіт"
        error_type: phrase
        explanation: "Коли виконавиця важлива, активний стан природніший."
      - sentence: "Лист надіслано Марком."
        error: "Лист надіслано Марком"
        correction: "Марко надіслав листа"
        error_type: phrase
        explanation: "З явним виконавцем краще активне речення."
      - sentence: "Проєкт завершується командою."
        error: "завершується командою"
        correction: "команда завершує проєкт"
        error_type: phrase
        explanation: "Пасив на -ся з виконавцем звучить важко."
      - sentence: "Книга прочитано."
        error: "Книга прочитано"
        correction: "Книгу прочитано"
        error_type: phrase
        explanation: "У формі на -но додаток лишається у знахідному."
      - sentence: "Робота виконана вчора як системне повідомлення."
        error: "Робота виконана"
        correction: "Роботу виконано"
        error_type: phrase
        explanation: "Для короткого результату потрібна безособова форма."
      - sentence: "Файл зберігано автоматично."
        error: "зберігано"
        correction: "зберігається"
        error_type: word
        explanation: "Правило системи передає форма на -ся."
      - sentence: "Усі квитки продаються."
        error: "продаються"
        correction: "продано"
        error_type: word
        explanation: "Якщо квитків уже немає, потрібен результат продано."
      - sentence: "Реєстрацію відкрито щопонеділка."
        error: "відкрито"
        correction: "відкривається"
        error_type: word
        explanation: "Повторюване правило краще передати формою на -ся."
      - sentence: "Олена готується звіт."
        error: "готується звіт"
        correction: "готує звіт"
        error_type: phrase
        explanation: "Олена як виконавиця потребує активної форми."
      - sentence: "Звіт готує до п'ятниці."
        error: "готує"
        correction: "готується"
        error_type: word
        explanation: "Звіт не є активним виконавцем; ідеться про процес."
      - sentence: "Було здійснено проведення перевірки."
        error: "Було здійснено проведення перевірки"
        correction: "Перевірку проведено"
        error_type: phrase
        explanation: "Канцелярит треба скоротити до сильного дієслова."
      - sentence: "Я не спиться."
        error: "Я не спиться"
        correction: "Мені не спиться"
        error_type: phrase
        explanation: "Це безособова конструкція з давальним, не пасив."
workbook:
  - id: wb-1
    type: quiz
    title: Оберіть найприродніший варіант
    instruction: Виберіть українське речення, яке найкраще відповідає контексту.
    items:
      - question: "Виконавиця важлива: Olena wrote the report."
        options:
          - "Олена написала звіт."
          - "Звіт було написано Оленою."
          - "Звіт пишеться Оленою."
        correct: 0
        explanation: "Коли виконавиця важлива, активний стан найясніший."
      - question: "Системне повідомлення після завантаження."
        options:
          - "Файл збережено."
          - "Файл зберігається автоматично."
          - "Користувач зберіг файл."
        correct: 0
        explanation: "Після дії система фіксує результат."
      - question: "Правило налаштувань: файл saved automatically."
        options:
          - "Файл зберігається автоматично."
          - "Файл збережено автоматично."
          - "Файл зберіг користувач."
        correct: 0
        explanation: "Правило або повторюваний процес передає -ся."
      - question: "Квитків уже немає."
        options:
          - "Усі квитки продано."
          - "Квитки продаються онлайн."
          - "Квитки продають завтра."
        correct: 0
        explanation: "Продано - результат продажу."
      - question: "Де можна купити квитки?"
        options:
          - "Квитки продаються онлайн."
          - "Квитки продано онлайн."
          - "Квитки написано онлайн."
        correct: 0
        explanation: "Продаються онлайн описує спосіб продажу."
      - question: "У короткому звіті після події."
        options:
          - "Подію проведено 12 травня."
          - "Подія проводиться 12 травня."
          - "Подія проводить 12 травня."
        correct: 0
        explanation: "Після події потрібен результат проведено."
      - question: "Подія ще триває як організаційний процес."
        options:
          - "Підготовка проводиться онлайн."
          - "Підготовку проведено онлайн."
          - "Підготовка провела онлайн."
        correct: 0
        explanation: "Проводиться показує процес."
      - question: "Хто ухвалив рішення важливо."
        options:
          - "Рада ухвалила рішення."
          - "Рішення ухвалено радою."
          - "Рішення ухвалюється радою."
        correct: 0
        explanation: "Активний стан прямо називає виконавця."
      - question: "Рішення є, виконавець неважливий."
        options:
          - "Рішення ухвалено."
          - "Рішення ухвалюється."
          - "Рішення ухвалило."
        correct: 0
        explanation: "Ухвалено фіксує готовий результат."
      - question: "Назва розділу."
        options:
          - "Розділ називається «Пасивний стан»."
          - "Розділ названо автором «Пасивний стан»."
          - "Розділ називає «Пасивний стан»."
        correct: 0
        explanation: "Називається - природна лексична форма."
      - question: "Опис місця в простій мові."
        options:
          - "Музей у центрі."
          - "Музей знаходиться центром."
          - "Музей знайдено центром."
        correct: 0
        explanation: "Простий опис часто кращий за важку пасивну кальку."
      - question: "Результат перевірки заявки."
        options:
          - "Заявку перевірено."
          - "Заявка перевіряється автоматично."
          - "Заявка перевірена автоматичною."
        correct: 0
        explanation: "Перевірено - результат; перевіряється - процес."
  - id: wb-2
    type: fill-in
    title: Процес або результат
    instruction: Оберіть форму за контекстом.
    items:
      - sentence: "Будинок зараз ____ біля вокзалу."
        answer: "будується"
        options:
          - "будується"
          - "збудовано"
          - "збудований"
        explanation: "Зараз показує процес."
      - sentence: "Будинок уже ____."
        answer: "збудовано"
        options:
          - "збудовано"
          - "будується"
          - "будують"
        explanation: "Уже вимагає результату."
      - sentence: "Документи ____ онлайн щодня."
        answer: "подаються"
        options:
          - "подаються"
          - "подано"
          - "поданий"
        explanation: "Щодня показує правило."
      - sentence: "Документи ____ вчасно."
        answer: "подано"
        options:
          - "подано"
          - "подаються"
          - "подавалися"
        explanation: "Вчасно тут фіксує результат."
      - sentence: "Реєстрація ____ завтра о дев'ятій."
        answer: "відкривається"
        options:
          - "відкривається"
          - "відкрито"
          - "відкрита"
        explanation: "Це розклад або правило."
      - sentence: "Реєстрацію вже ____."
        answer: "відкрито"
        options:
          - "відкрито"
          - "відкривається"
          - "відкрилися"
        explanation: "Уже означає готовий результат."
      - sentence: "Запит ____ протягом трьох днів."
        answer: "розглядається"
        options:
          - "розглядається"
          - "розглянуто"
          - "розглянутий"
        explanation: "Протягом трьох днів описує процес."
      - sentence: "Запит ____ учора."
        answer: "розглянуто"
        options:
