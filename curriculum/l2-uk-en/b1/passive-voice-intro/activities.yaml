  - id: wb-8
    type: essay-response
    title: Міні-звіт із пасивом
    instruction: Напишіть короткий звіт або повідомлення, свідомо вибираючи актив, -ся і -но/-то.
    prompt: "Опишіть ремонт аудиторії, запуск події або роботу онлайн-сервісу. Напишіть 8-10 речень і використайте щонайменше 12 змістових деталей: хто виконав частину роботи, що вже зроблено, що ще триває, що відбувається автоматично, один результат на -но/-то, одне правило на -ся, одне активне речення з названим виконавцем, одне системне повідомлення, одну дату або час, одну причину вибору активної форми, одну причину вибору -но/-то, одну причину вибору -ся."
    min_words: 100
    model_answer: "Технічна команда підготувала аудиторію до нового семестру. Стіни пофарбовано, старі столи замінено на нові, а проєктор встановлено над дошкою. Презентації завантажено на комп'ютер, доступ до мережі відкрито з дев'ятої ранку. Файли зберігаються автоматично, тому викладачі не втрачають матеріали. Заявки на технічну допомогу розглядаються протягом трьох днів. Я використовую активний стан, коли називаю команду, бо виконавець важливий. Я використовую -но/-то для готових результатів ремонту. Я використовую -ся для правил сервісу і процесів."
    rubric:
      - criteria: "Форми"
        description: "Є актив, форма на -но/-то і форма на -ся з правильним фокусом."
        points: 4
      - criteria: "Зміст"
        description: "Є щонайменше 12 змістових деталей із завдання."
        points: 3
      - criteria: "Природність"
        description: "Немає важкого пасиву з явним виконавцем там, де актив кращий."
        points: 2
      - criteria: "Пояснення"
        description: "Автор коротко пояснює, чому вибрав актив, -но/-то і -ся."
        points: 1
