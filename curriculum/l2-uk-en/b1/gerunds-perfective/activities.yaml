  - id: wb-5
    type: error-correction
    title: Фінальна редактура M71
    instruction: Виправте речення так, щоб форма і підмет були правильними.
    items:
      - sentence: "Написавши листа, я писав адресу одночасно."
        error: "Написавши"
        correction: "Пишучи листа, я писав адресу одночасно."
        explanation: Одночасна дія потребує недоконаної форми.
      - sentence: "Пишучи листа, я відправив його після завершення."
        error: "Пишучи"
        correction: "Написавши листа, я відправив його."
        explanation: Відправив після завершення письма.
      - sentence: "Дізнавшися адресу, ми поїхали до музею."
        error: "Дізнавшися"
        correction: "Дізнавшись адресу, ми поїхали до музею."
        explanation: Стандартна форма - дізнавшись.
      - sentence: "Повернувшись з поїздки, валіза стояла в коридорі."
        error: "валіза стояла"
        correction: "Повернувшись з поїздки, я поставив валізу в коридорі."
        explanation: Валіза не повернулася як виконавець основної дії.
      - sentence: "Побачивши афішу, концерт став цікавішим."
        error: "концерт став"
        correction: "Побачивши афішу, ми зацікавилися концертом."
        explanation: Концерт не побачив афішу.
      - sentence: "Прочитавши правила, можна було починати."
        error: "Прочитавши правила"
        correction: "Після того як ми прочитали правила, можна було починати."
        explanation: Безособове можна було не дає підмета для дієприслівника.
      - sentence: "Зроблюючи вправу, студент звірив ключ після завершення."
        error: "Зроблюючи"
        correction: "Зробивши вправу, студент звірив ключ."
        explanation: Потрібна доконана форма зробивши.
      - sentence: "Поснідавши, я снідав і слухав новини."
        error: "Поснідавши"
        correction: "Снідаючи, я слухав новини."
        explanation: Слухав під час сніданку.
      - sentence: "Зустрівшись колегою, ми уточнили план."
        error: "Зустрівшись колегою"
        correction: "Зустрівшись із колегою, ми уточнили план."
        explanation: Потрібен прийменник із.
      - sentence: "Умившись, стало бадьоріше."
        error: "стало бадьоріше"
        correction: "Умившись, я відчув себе бадьоріше."
        explanation: Треба назвати виконавця дії.
      - sentence: "Купивши квитки, маршрут перевірився."
        error: "маршрут перевірився"
        correction: "Купивши квитки, туристи перевірили маршрут."
        explanation: Туристи купили і туристи перевірили.
      - sentence: "Отримавши листа, відповідь була швидкою."
        error: "відповідь була"
        correction: "Отримавши листа, Олена швидко відповіла."
        explanation: Відповідь не отримала листа.
