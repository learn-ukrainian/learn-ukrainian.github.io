version: '1.0'
module: gerunds-perfective
level: b1
inline:
  - id: act-1
    type: quiz
    title: Попередня дія
    instruction: Оберіть варіант, який правильно пояснює часовий зв'язок.
    items:
      - question: "У реченні Прочитавши листа, я відповів форма прочитавши означає:"
        options:
          - "дію, завершену перед відповіддю"
          - "дію, що відбувається одночасно з відповіддю"
          - "ознаку іменника лист"
        correct: 0
        explanation: Спочатку я прочитав листа, потім відповів.
      - question: "На яке питання відповідає дієприслівник доконаного виду?"
        options:
          - "що зробивши?"
          - "що роблячи?"
          - "який?"
        correct: 0
        explanation: Доконаний дієприслівник називає завершену попередню дію.
      - question: "Яка форма показує попередність, а не одночасність?"
        options:
          - "написавши"
          - "пишучи"
          - "письмовий"
        correct: 0
        explanation: Написавши означає після того як написав.
      - question: "Що найточніше передає пара читаючи / прочитавши?"
        options:
          - "під час читання / після завершення читання"
          - "майбутнє / наказ"
          - "прикметник / іменник"
        correct: 0
        explanation: Це головний контраст M70 і M71.
      - question: "Яке речення має правильну часову логіку?"
        options:
          - "Поснідавши, Марія вийшла з дому."
          - "Поснідавши, Марія їла кашу під час сніданку."
          - "Сніданок поснідавши Марія."
        correct: 0
        explanation: Поснідавши означає, що сніданок завершився перед виходом.
      - question: "Яка форма є зворотним дієприслівником доконаного виду?"
        options:
          - "повернувшись"
          - "повертаючись"
          - "повернений"
        correct: 0
        explanation: Повернутися -> повернувшись.
      - question: "Коли краще сказати Після того як я прочитав інструкцію?"
        options:
          - "коли безособова або розмовна конструкція звучить природніше"
          - "коли треба приховати виконавця дії"
          - "коли дія відбувається одночасно"
        correct: 0
        explanation: Підрядне речення часто безпечніше для розмови й різних підметів.
      - question: "Яке речення має спільний підмет?"
        options:
          - "Побачивши помилку, редактор зупинив друк."
          - "Побачивши помилку, друк зупинився."
          - "Побачивши помилку, стало пізно."
        correct: 0
        explanation: Редактор побачив і редактор зупинив.
      - question: "Що означає Дізнавшись адресу, ми поїхали до музею?"
        options:
          - "Спочатку ми дізналися адресу, потім поїхали."
          - "Ми дізнавалися адресу під час поїздки."
          - "Адреса поїхала до музею."
        correct: 0
        explanation: Дізнавшись показує попередню завершену дію.
      - question: "Яку форму краще залишити для одночасної дії?"
        options:
          - "слухаючи"
          - "прослухавши"
          - "послух"
        correct: 0
        explanation: Слухаючи означає одночасну дію слухання.
      - question: "Що є головною перевіркою перед уживанням доконаного дієприслівника?"
        options:
          - "Чи завершена дія має того самого виконавця, що й присудок?"
          - "Чи можна слово відмінювати?"
          - "Чи є в реченні прикметник?"
        correct: 0
        explanation: Спільний підмет потрібен і для доконаного виду.
      - question: "Який варіант найкраще передає дію після повернення?"
        options:
          - "повернувшись"
          - "повертаючись"
          - "повернений"
        correct: 0
        explanation: Повернувшись означає після повернення.
  - id: act-2
    type: fill-in
    title: Утворіть доконану форму
    instruction: Доповніть речення дієприслівником доконаного виду.
    items:
      - sentence: "____ листа, я одразу відповів."
        answer: Прочитавши
        options:
          - Прочитавши
          - Читаючи
          - Читач
        explanation: Прочитати -> прочитавши.
      - sentence: "____ заяву, Олена перевірила дату."
        answer: Написавши
        options:
          - Написавши
          - Пишучи
          - Письмово
        explanation: Написати -> написавши.
      - sentence: "____ помилку, редактор зупинив друк."
        answer: Побачивши
        options:
          - Побачивши
          - Бачачи
          - Видимий
        explanation: Побачити -> побачивши.
      - sentence: "____ вправу, студент звірив ключ."
        answer: Зробивши
        options:
          - Зробивши
          - Роблячи
          - Робітник
        explanation: Зробити -> зробивши.
      - sentence: "____ новину, ми змінили план."
        answer: Дізнавшись
        options:
          - Дізнавшись
          - Дізнаючи
          - Знавши
        explanation: Дізнатися -> дізнавшись.
      - sentence: "____ додому, я зателефонував сестрі."
        answer: Повернувшись
        options:
          - Повернувшись
          - Повертаючись
          - Повернений
        explanation: Повернутися -> повернувшись.
      - sentence: "____ із колегою, ми уточнили план."
        answer: Зустрівшись
        options:
          - Зустрівшись
          - Зустрічаючи
          - Зустрічний
        explanation: Зустрітися -> зустрівшись.
      - sentence: "____ рано, Андрій відкрив вікно."
        answer: Прокинувшись
        options:
          - Прокинувшись
          - Прокидаючись
          - Сонний
        explanation: Прокинутися -> прокинувшись.
      - sentence: "____, Марія швидко зібралася."
        answer: Умившись
        options:
          - Умившись
          - Умиваючись
          - Умитий
        explanation: Умитися -> умившись.
      - sentence: "____ документи, секретар поклав їх на стіл."
        answer: Принісши
        options:
          - Принісши
          - Несучи
          - Принесений
        explanation: Принести -> принісши; форма книжна, але граматично можлива.
      - sentence: "____ презентацію, команда надіслала її викладачу."
        answer: Завершивши
        options:
          - Завершивши
          - Завершуючи
          - Завершальний
        explanation: Завершити -> завершивши.
      - sentence: "____ квитки, туристи перевірили маршрут."
        answer: Купивши
        options:
          - Купивши
          - Купуючи
          - Купівля
        explanation: Купити -> купивши.
  - id: act-3
    type: match-up
    title: Пара видів
    instruction: З'єднайте недоконану форму з доконаною парою.
    pairs:
      - left: "читаючи"
        right: "прочитавши"
      - left: "пишучи"
        right: "написавши"
      - left: "слухаючи"
        right: "прослухавши"
      - left: "роблячи"
        right: "зробивши"
      - left: "бачачи"
        right: "побачивши"
      - left: "повертаючись"
        right: "повернувшись"
      - left: "дізнаючись"
        right: "дізнавшись"
      - left: "прокидаючись"
        right: "прокинувшись"
      - left: "умиваючись"
        right: "умившись"
      - left: "зустрічаючись"
        right: "зустрівшись"
      - left: "збираючись"
        right: "зібравшись"
      - left: "купуючи"
        right: "купивши"
  - id: act-4
    type: group-sort
    title: Одночасність чи попередність
    instruction: Розподіліть форми за часовою логікою.
    groups:
      - label: "Недоконаний вид: одночасність"
        items:
          - "читаючи"
          - "слухаючи"
          - "пишучи"
          - "повертаючись"
      - label: "Доконаний вид: попередність"
        items:
          - "прочитавши"
          - "написавши"
          - "побачивши"
          - "повернувшись"
      - label: "Краще перетворити на підрядне речення"
        items:
          - "Повернувшись, почався дощ"
          - "Дізнавшись результат, мені стало легше"
          - "Прочитавши інструкцію, стало зрозуміло"
          - "Знайшовши ключ, двері відчинилися"
  - id: act-5
    type: error-correction
    title: Редагуємо підмет і вид
    instruction: Виправте головну помилку в реченні.
    items:
      - sentence: "Прочитавши статтю, я підкреслював терміни під час читання."
        error: "Прочитавши статтю"
        correction: "Читаючи статтю, я підкреслював терміни."
        explanation: Якщо дія відбувається під час читання, потрібна недоконана форма.
      - sentence: "Читаючи інструкцію, я почав працювати після завершення."
        error: "Читаючи інструкцію"
        correction: "Прочитавши інструкцію, я почав працювати."
        explanation: Почав працювати після завершення читання.
      - sentence: "Дізнавши новину, ми змінили план."
        error: "Дізнавши"
        correction: "Дізнавшись новину, ми змінили план."
        explanation: Від дізнатися треба зберегти -сь.
      - sentence: "Повернувшись додому, почався дощ."
        error: "Повернувшись додому"
        correction: "Коли я повернувся додому, почався дощ."
        explanation: Дощ не повертався; потрібне підрядне речення або інший підмет.
      - sentence: "Прочитавши інструкцію, стало зрозуміло."
        error: "Прочитавши інструкцію"
        correction: "Після того як я прочитав інструкцію, стало зрозуміло."
        explanation: Безособове стало зрозуміло не має підмета для дієприслівника.
      - sentence: "Повертаючись додому, я зняв пальто після приходу."
        error: "Повертаючись"
        correction: "Повернувшись додому, я зняв пальто."
        explanation: Зняв пальто після повернення, тому потрібна доконана форма.
      - sentence: "Зустрівшися з колегою, ми уточнили план."
        error: "Зустрівшися"
        correction: "Зустрівшись із колегою, ми уточнили план."
        explanation: Нормальна зворотна форма після голосного - зустрівшись.
      - sentence: "Поснідавши, Марія снідала й слухала новини."
        error: "Поснідавши"
        correction: "Снідаючи, Марія слухала новини."
        explanation: Слухала під час сніданку, отже одночасність.
      - sentence: "Побачивши помилку, друк зупинився."
        error: "Побачивши помилку, друк"
        correction: "Побачивши помилку, редактор зупинив друк."
        explanation: Друк не може побачити помилку.
      - sentence: "Умившися, Андрій швидко зібрався."
        error: "Умившися"
        correction: "Умившись, Андрій швидко зібрався."
        explanation: У сучасній зворотній формі вживаємо умившись.
      - sentence: "Купуючи квитки, туристи перевірили маршрут після покупки."
        error: "Купуючи квитки"
        correction: "Купивши квитки, туристи перевірили маршрут."
        explanation: Перевірили після покупки, отже доконана форма.
      - sentence: "Закінчивши вправу, відповіді звірилися з ключем."
        error: "відповіді звірилися"
        correction: "Закінчивши вправу, студенти звірили відповіді з ключем."
        explanation: Треба назвати виконавця завершення й звіряння.
workbook:
  - id: wb-1
    type: quiz
    title: Контроль M71
    instruction: Оберіть відповідь, яка відповідає правилу M71.
    items:
      - question: "Який варіант означає попередню дію написання?"
        options:
          - "написавши"
          - "пишучи"
          - "письменник"
        correct: 0
        explanation: Написавши означає після того як написав.
      - question: "Яка форма утворена від доконаного дієслова?"
        options:
          - "зробивши"
          - "роблячи"
          - "робочий"
        correct: 0
        explanation: Зробити -> зробивши.
      - question: "Яке речення краще для різних підметів?"
        options:
          - "Коли я повернувся, мама приготувала вечерю."
          - "Повернувшись, мама приготувала вечерю."
          - "Повернувшись, вечеря приготувалася."
        correct: 0
        explanation: Якщо повернувся я, а діяла мама, потрібне підрядне речення.
      - question: "Що треба зберегти у формах дізнавшись, повернувшись?"
        options:
          - "зворотність -сь"
          - "форму множини"
          - "родовий відмінок"
        correct: 0
        explanation: Вони походять від зворотних дієслів.
      - question: "Яка форма логічна в реченні ____ рано, я відкрив вікно?"
        options:
          - "Прокинувшись"
          - "Прокидаючись"
          - "Прокидання"
        correct: 0
        explanation: Спочатку прокинувся, потім відкрив.
      - question: "Яке речення має неправильний підмет?"
        options:
          - "Прочитавши листа, відповідь стала очевидною."
          - "Прочитавши листа, я зрозумів відповідь."
          - "Коли я прочитав листа, відповідь стала очевидною."
        correct: 0
        explanation: Відповідь не прочитала листа.
      - question: "Що означає побачивши?"
        options:
          - "після того як побачив"
          - "під час бачення"
          - "той, хто бачить"
        correct: 0
        explanation: Це доконаний дієприслівник.
      - question: "Який варіант найбезпечніший, якщо форма на -ши звучить незграбно?"
        options:
          - "підрядне речення з коли або після того як"
          - "прибрати підмет"
          - "замінити на прикметник"
        correct: 0
        explanation: Підрядна конструкція часто природніша.
      - question: "Яка пара правильно показує M70/M71?"
        options:
          - "повертаючись / повернувшись"
          - "повернувшись / повернений"
          - "повернення / повернений"
        correct: 0
        explanation: Перша форма - процес, друга - завершення перед основною дією.
      - question: "Який варіант підходить для інструкції?"
        options:
          - "Заповнивши анкету, перевірте паспортні дані."
          - "Заповнивши анкету, паспортні дані перевірилися."
          - "Заповнюючи анкету, дані вже перевірені після заповнення."
        correct: 0
        explanation: У наказовій формі підмет ви зрозумілий.
      - question: "Що краще передає після сніданку?"
        options:
          - "поснідавши"
          - "снідаючи"
          - "сніданковий"
        correct: 0
        explanation: Поснідавши означає після завершення сніданку.
      - question: "Який головний зміст доконаного дієприслівника?"
        options:
          - "попередня завершена дія"
          - "ознака предмета"
          - "одночасний процес"
        correct: 0
        explanation: Це ядро M71.
  - id: wb-2
    type: cloze
    title: Короткий конспект
    instruction: Заповніть пропуски термінами й формами з M71.
    text: "Дієприслівник доконаного виду відповідає на питання {1}. Він називає дію, що відбулася {2} основної дії. Типові суфікси - {3} і {4}. Від прочитати утворюємо {5}, від написати - {6}, від побачити - {7}. У зворотних дієсловах зберігаємо {8}: повернутися -> {9}. Форма читаючи означає {10}, а прочитавши - {11}. Якщо підмети різні, краще використати {12}."
    blanks:
      - id: 1
        answer: що зробивши?
        options:
          - що зробивши?
          - що роблячи?
          - який?
      - id: 2
        answer: перед
        options:
          - перед
          - одночасно з
          - замість
      - id: 3
        answer: -вши
        options:
          - -вши
          - -учи
          - -ий
      - id: 4
        answer: -ши
        options:
          - -ши
          - -ючи
          - -ість
      - id: 5
        answer: прочитавши
        options:
          - прочитавши
          - читаючи
          - прочитаний
      - id: 6
        answer: написавши
        options:
          - написавши
          - пишучи
          - письмовий
      - id: 7
        answer: побачивши
        options:
          - побачивши
          - бачачи
          - видимий
      - id: 8
        answer: -сь
        options:
          - -сь
          - -і
          - -ого
      - id: 9
        answer: повернувшись
        options:
          - повернувшись
          - повертаючись
          - повернений
      - id: 10
        answer: одночасність
        options:
          - одночасність
          - попередність
          - майбутність
      - id: 11
        answer: попередність
        options:
          - попередність
          - одночасність
          - прикмету
      - id: 12
        answer: підрядне речення
        options:
          - підрядне речення
          - кличний відмінок
          - ступінь порівняння
  - id: wb-3
    type: match-up
    title: Перефразуйте безпечно
    instruction: З'єднайте дієприслівникову конструкцію з підрядною заміною.
    pairs:
      - left: "Прочитавши листа, я відповів."
        right: "Після того як я прочитав листа, я відповів."
      - left: "Написавши заяву, Олена перевірила дату."
        right: "Коли Олена написала заяву, вона перевірила дату."
      - left: "Побачивши помилку, редактор зупинив друк."
        right: "Після того як редактор побачив помилку, він зупинив друк."
