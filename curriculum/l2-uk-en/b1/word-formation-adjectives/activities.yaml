  - id: wb-7
    type: essay-response
    title: Опис твору або місця
    instruction: "Напишіть короткий опис із прикметниками різних словотвірних моделей."
    min_words: 140
    prompt: "Опишіть картину, кімнату, парк, район міста або родинний предмет. Використайте щонайменше десять прикметників, серед них: один із -ськ-/-зьк-/-цьк-, один із -уват-/-юват-, один із -ичн-/-ічн-, один присвійний прикметник, один прикметник із -нн-, один префіксальний, один префіксально-суфіксальний і один складний прикметник. Поясніть 3-4 форми словотвірно."
    model_answer: "Я описую стару кімнату в батьковому домі біля правобережної частини міста. На стіні висить київський краєвид: вечірнє небо синювате, а дерева темно-зелені. Поруч стоїть дерев'яний стіл і невелика шафа з материними листами. У тексті під картиною є короткий історичний коментар, тому опис звучить не лише особисто, а й навчально. Прикметник київський утворено від назви Київ за допомогою суфікса -ськ-, а синюватий має суфікс -юват-, що означає неповну якість. Слово батьковому є присвійним прикметником, бо відповідає на питання чий. Осінній зошит на столі нагадує про подвоєння -нн-, а безхмарний ранок за вікном показує префіксально-суфіксальну модель від без хмар. На підлозі лежить темнуватий килим, і його колір добре поєднується з жовтуватими шторами. У кутку стоїть післявоєнна лампа, яку родина зберегла як пам'ять. Навіть маленька настільна рамка здається важливою, бо вона має теплий домашній відтінок. Мені подобається цей простір, бо кожен предмет має родинний, міський і культурний зміст."
    rubric:
      - criteria: Різні словотвірні моделі
        description: Є щонайменше десять прикметників, зокрема суфіксальні, префіксальні, присвійні та складні.
        points: 4
      - criteria: Словотвірне пояснення
        description: Текст коротко пояснює 3-4 форми через основу, суфікс, префікс або спосіб творення.
        points: 4
      - criteria: Правопис
        description: Нормативно написано -н-/-нн-, дефісні та злиті складні прикметники.
        points: 3
      - criteria: Зв'язність
        description: Опис має логічний порядок і не перетворюється на список окремих слів.
        points: 3
