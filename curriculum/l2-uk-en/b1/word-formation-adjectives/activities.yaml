version: '1.0'
module: word-formation-adjectives
level: b1
inline:
  - id: act-1
    type: quiz
    title: Суфікси й значення
    instruction: "Оберіть правильну форму або пояснення словотвірної моделі."
    items:
      - question: "Прикметник лісовий утворено від:"
        options:
          - "іменника ліс за допомогою суфікса"
          - "дієслова лісити за допомогою префікса"
          - "двох основ із дефісом"
        correct: 0
        explanation: Лісовий - суфіксальне похідне від іменника ліс.
      - question: "Правильна форма від Київ:"
        options:
          - "київський"
          - "київцький"
          - "києвський"
        correct: 0
        explanation: Київ дає київський із суфіксом -ськ-.
      - question: "Правильна форма від Париж:"
        options:
          - "паризький"
          - "парижський"
          - "парижький"
        correct: 0
        explanation: "Після ж очікуємо модель -зьк-: паризький."
      - question: "Правильна форма від козак:"
        options:
          - "козацький"
          - "козакський"
          - "козазький"
        correct: 0
        explanation: Основа на к переходить у модель -цьк-.
      - question: "Синюватий означає:"
        options:
          - "трохи синій, із синім відтінком"
          - "повністю синій і найсиніший"
          - "той, хто належить синьому"
        correct: 0
        explanation: Суфікс -уват-/-юват- виражає наближену якість.
      - question: "Чистенький має:"
        options:
          - "зменшувальний або лагідний відтінок"
          - "офіційний юридичний відтінок"
          - "значення протилежності"
        correct: 0
        explanation: Суфікс -еньк- часто додає лагідності або зменшення.
      - question: "Історичний і логічний показують модель:"
        options:
          - "-ичн-/-ічн-"
          - "-цьк-/-зьк-"
          - "по-...-ськи"
        correct: 0
        explanation: Історичний і логічний належать до книжнішої моделі -ичн-/-ічн-.
      - question: "Який прикметник зазвичай відносний, а не якісний?"
        options:
          - "дерев'яний"
          - "тихий"
          - "солодкуватий"
        correct: 0
        explanation: Дерев'яний означає матеріал; тихий і солодкуватий називають міру ознаки.
      - question: "Яке слово є похідним?"
        options:
          - "безхмарний"
          - "хмара"
          - "без"
        correct: 0
        explanation: Безхмарний утворено від конструкції без хмар.
      - question: "У слові козацький твірна основа пов'язана зі словом:"
        options:
          - "козак"
          - "коза"
          - "коса"
        correct: 0
        explanation: Козацький мотивується словом козак.
      - question: "Продуктивний суфікс - це суфікс, який:"
        options:
          - "активно утворює нові слова"
          - "ніколи не вживається в сучасній мові"
          - "стоїть тільки перед коренем"
        correct: 0
        explanation: Продуктивний формант активно працює в сучасному словотворі.
      - question: "Словотвірний розбір слова міський починаємо з питання:"
        options:
          - "від якого слова воно утворене?"
          - "який у нього час дієслова?"
          - "скільки в ньому прийменників?"
        correct: 0
        explanation: "Спершу шукаємо мотивувальне слово: місто."
  - id: act-2
    type: fill-in
    title: Присвійні форми
    instruction: "Вставте природний присвійний прикметник."
    items:
      - sentence: "Це ____ дім, у якому він виріс. (батько)"
        answer: батьків
        options:
          - батьків
          - батьковий
          - батькового
        explanation: У називному чоловічого роду вживаємо коротку форму батьків.
      - sentence: "____ порада допомогла мені не поспішати. (мати)"
        answer: материна
        options:
          - материна
          - материного
          - материн
        explanation: Порада жіночого роду, тому материна.
      - sentence: "На столі лежала ____ книжка. (сестра)"
        answer: сестрина
        options:
          - сестрина
          - сестрин
          - сестрів
        explanation: Книжка жіночого роду, тому сестрина.
      - sentence: "У коридорі стояв ____ велосипед. (брат)"
        answer: братів
        options:
          - братів
          - братова
          - братине
        explanation: Велосипед чоловічого роду; коротка форма братів.
      - sentence: "Ми зайшли до ____ кабінету. (батько)"
        answer: батькового
        options:
          - батькового
          - батьків
          - батькова
        explanation: "До кабінету вимагає родового відмінка: батькового."
      - sentence: "Вона говорила з ____ подругою. (мати)"
        answer: материною
        options:
          - материною
          - материн
          - материна
        explanation: З подругою - орудний відмінок жіночого роду.
      - sentence: "Це ____ фото зі старого альбому. (батько)"
        answer: батькове
        options:
          - батькове
          - батьків
          - батькова
        explanation: Фото середнього роду, тому батькове.
      - sentence: "Я пам'ятаю ____ голос із дитинства. (мати)"
        answer: материн
        options:
          - материн
          - материна
          - материної
        explanation: Голос чоловічого роду, тому коротка форма материн.
      - sentence: "У музеї читали ____ листи. (Шевченко)"
        answer: Шевченкові
        options:
          - Шевченкові
          - Шевченкін
          - Шевченкого
        explanation: У множині природна форма Шевченкові листи.
      - sentence: "Це ____ малюнок, а не мій. (Марія)"
        answer: Маріїн
        options:
          - Маріїн
          - Марійський
          - Маріїного
        explanation: Малюнок чоловічого роду; від Марія маємо Маріїн.
      - sentence: "Учитель пояснив ____ відповідь. (Сергій)"
        answer: Сергієву
        options:
          - Сергієву
          - Сергіїв
          - Сергійську
        explanation: "Відповідь жіночого роду у знахідному: Сергієву відповідь."
      - sentence: "Ми говорили про ____ традицію. (родина)"
        answer: родинну
        options:
          - родинну
          - родинин
          - родинів
        explanation: Родина не дає присвійної короткої форми тут; потрібен відносний прикметник родинну.
  - id: act-3
    type: quiz
    title: Одне н чи нн?
    instruction: "Оберіть нормативне написання і пояснення."
    items:
      - question: "Правильно:"
        options:
          - "осінній день"
          - "осіний день"
          - "осіньний день"
        correct: 0
        explanation: Осінь має основу на н, тому осінній із -нн-.
      - question: "Правильно:"
        options:
          - "денний розклад"
          - "дений розклад"
          - "деньний розклад"
        correct: 0
        explanation: День + -н- дає денний.
      - question: "Правильно:"
        options:
          - "туманний ранок"
          - "туманий ранок"
          - "туманій ранок"
        correct: 0
        explanation: Туман закінчується на н, тому туманний.
      - question: "Правильно:"
        options:
          - "дерев'яний стіл"
          - "дерев'янний стіл"
          - "деревяний стіл"
        correct: 0
        explanation: Дерев'яний має суфікс -ян- з одним н і апостроф.
      - question: "Правильно:"
        options:
          - "піщаний берег"
          - "піщанний берег"
          - "піщяний берег"
        correct: 0
        explanation: Піщаний має суфікс -ан- з одним н.
      - question: "Правильно:"
        options:
          - "скляний посуд"
          - "склянний посуд"
          - "скляній посуд"
        correct: 0
        explanation: Скляний пишемо з одним н.
      - question: "Правильно:"
        options:
          - "лимонний смак"
          - "лимоний смак"
          - "лимоньний смак"
        correct: 0
        explanation: Лимон + -н- дає лимонний.
      - question: "Правильно:"
        options:
          - "глиняний посуд"
          - "глинняний посуд"
          - "глинянний посуд"
        correct: 0
        explanation: Глиняний має суфікс -ян- з одним н.
      - question: "Правильно:"
        options:
          - "нездоланний страх"
          - "нездоланий страх"
          - "нездоланій страх"
        correct: 0
        explanation: Нездоланний у цьому значенні має -анн-.
      - question: "Правильно:"
        options:
          - "здійсненний план"
          - "здійснений план"
          - "здійсненій план"
        correct: 0
        explanation: Здійсненний означає такий, що може бути здійснений, і має -енн-.
      - question: "Правильно:"
        options:
          - "безсонна ніч"
          - "безсона ніч"
          - "безсону ніч"
        correct: 0
        explanation: Сон + -н- дає сонний, тому безсонна.
      - question: "Яке пояснення правильне для туманний?"
        options:
          - "основа туман закінчується на н, додається -н-"
          - "це завжди суфікс -ян-"
          - "подвоєння тут випадкове й не пояснюється"
        correct: 0
        explanation: Подвоєння виникає на межі основи й суфікса.
  - id: act-4
    type: group-sort
    title: Префікси й способи творення
    instruction: "Розподіліть прикметники за способом творення або значенням префікса."
    groups:
      - label: "Префіксальне посилення"
        items:
          - прегарний
          - надважливий
          - надпотужний
          - надзвичайний
      - label: "Відсутність ознаки"
        items:
          - безхмарний
          - безсонний
          - безмежний
          - безбарвний
      - label: "Протилежність або позиція проти"
        items:
          - антивоєнний
          - антикорупційний
          - антинауковий
          - антидемократичний
      - label: "Час перед або після"
        items:
          - передсвятковий
          - передвиборчий
          - післявоєнний
          - післяобідній
      - label: "Префіксально-суфіксальне місце"
        items:
          - прибережний
          - прикордонний
          - підземний
          - підводний
  - id: act-5
    type: error-correction
    title: Редактор словотвору
    instruction: "Знайдіть помилкову форму й замініть її нормативною."
    items:
      - sentence: "Це містовий парк біля нової галереї."
        error: містовий
        correction: міський
        explanation: Від місто нормативна форма міський.
      - sentence: "У тексті згадано парижський музей."
        error: парижський
        correction: паризький
        explanation: Париж дає паризький із -зьк-.
      - sentence: "Екскурсовод говорив про козакський звичай."
        error: козакський
        correction: козацький
        explanation: Козак дає козацький із -цьк-.
      - sentence: "Над морем був без хмарний ранок."
        error: без хмарний
        correction: безхмарний
        error_type: phrase
        explanation: Прикметник безхмарний пишемо разом.
      - sentence: "Осіний вітер став холоднішим."
        error: Осіний
        correction: Осінній
        explanation: Осінній має подвоєне -нн-.
      - sentence: "У кімнаті стояв дерев'янний стіл."
        error: дерев'янний
        correction: дерев'яний
        explanation: Дерев'яний пишемо з одним н.
      - sentence: "Вона вибрала темнозелений светр."
        error: темнозелений
        correction: темно-зелений
        explanation: Відтінки кольору такого типу пишемо через дефіс.
      - sentence: "Художник намалював чорно-окого хлопця."
        error: чорно-окого
        correction: чорноокого
        explanation: Чорноокий пишемо разом зі сполучною голосною -о-.
      - sentence: "Батьківий дім стояв біля саду."
        error: Батьківий
        correction: Батьків
        explanation: У називному чоловічого роду потрібна коротка форма батьків.
      - sentence: "Материного порада була короткою."
        error: Материного порада
        correction: Материна порада
        error_type: phrase
        explanation: "Порада жіночого роду в називному відмінку: материна."
      - sentence: "На площі висів анти воєнний плакат."
        error: анти воєнний
        correction: антивоєнний
        error_type: phrase
        explanation: Антивоєнний пишемо разом як усталений прикметник.
      - sentence: "Післявоєний період був складним."
        error: Післявоєний
        correction: Післявоєнний
        explanation: Післявоєнний має подвоєне -нн-.
  - id: act-6
    type: match-up
    title: Складні прикметники
    instruction: "Поєднайте форму з поясненням її написання."
    pairs:
      - left: чорноокий
        right: "разом: основа + сполучна голосна -о- + основа"
      - left: синьоокий
        right: "разом: колір очей як цілісна ознака"
      - left: правобережний
        right: "разом: утворено від словосполучення правий берег"
      - left: лівобережний
        right: "разом: одна географічна ознака"
      - left: темно-зелений
        right: "через дефіс: відтінок кольору"
      - left: ніжно-блакитний
        right: "через дефіс: уточнений відтінок кольору"
      - left: кисло-солодкий
        right: "через дефіс: поєднання двох смакових ознак"
      - left: синьо-жовтий
        right: "через дефіс: поєднання двох кольорів"
      - left: західноукраїнський
        right: "разом: прикметник від назви регіональної належності"
      - left: північно-східний
        right: "через дефіс: складний напрямок"
      - left: водоочисний
        right: "разом: складна технічна ознака зі сполучною голосною"
      - left: землеробський
        right: "разом: похідне від складної основи землероб"
workbook:
  - id: wb-1
    type: quiz
    title: Контроль словотвору прикметників
    instruction: "Оберіть правильний варіант."
    items:
      - question: "Яке слово утворено префіксально-суфіксальним способом?"
        options:
          - "прибережний"
          - "синюватий"
          - "темно-зелений"
        correct: 0
        explanation: Прибережний походить від при березі з префіксом і суфіксом.
      - question: "Яке слово є присвійним прикметником?"
        options:
          - "батьків"
          - "міський"
          - "логічний"
        correct: 0
        explanation: Батьків відповідає на питання чий?
      - question: "Яке слово має суфікс -ичн-/-ічн-?"
        options:
          - "критичний"
          - "козацький"
          - "безсонний"
        correct: 0
        explanation: Критичний належить до моделі -ичн-.
      - question: "Яке слово пишемо через дефіс?"
        options:
          - "кисло-солодкий"
          - "правобережний"
          - "безхмарний"
        correct: 0
        explanation: Кисло-солодкий поєднує дві смакові ознаки.
      - question: "Яке слово пишемо разом?"
        options:
          - "чорноокий"
          - "темно зелений"
          - "північно східний"
        correct: 0
        explanation: Чорноокий має сполучну голосну й пишеться разом.
      - question: "Правильний прикметник від француз:"
        options:
          - "французький"
          - "французський"
          - "француцький"
        correct: 0
        explanation: Після з очікуємо -зьк-.
      - question: "Правильний прикметник від студент:"
        options:
          - "студентський"
          - "студенцький"
          - "студентзький"
        correct: 0
        explanation: Тут нормативна модель -ськ-.
      - question: "Передсвятковий означає:"
        options:
          - "пов'язаний із часом перед святом"
          - "той, що не має свята"
          - "той, що належить святові як особі"
        correct: 0
        explanation: Перед- задає часову рамку перед подією.
      - question: "Післявоєнний означає:"
        options:
          - "пов'язаний із часом після війни"
          - "той, що відбувається під землею"
          - "трохи воєнний"
        correct: 0
        explanation: Після- означає час після події.
      - question: "Який варіант є калькою або ненормативною формою в цьому контексті?"
        options:
          - "парижський"
          - "паризький"
          - "київський"
        correct: 0
        explanation: "Нормативно: паризький."
      - question: "Яке слово має наближену якість?"
        options:
          - "зеленуватий"
          - "зелений"
          - "зеленський"
        correct: 0
        explanation: -уват- виражає приблизну або неповну ознаку.
      - question: "Яке пояснення найточніше для словотвірного аналізу?"
        options:
          - "мотивувальне слово + формант + нове значення"
          - "тільки кількість складів"
          - "тільки місце наголосу"
        correct: 0
        explanation: Словотвірний аналіз пов'язує основу, формант і значення.
  - id: wb-2
    type: fill-in
    title: Утворіть прикметник
    instruction: "Вставте нормативний прикметник від слова в дужках."
    items:
      - sentence: "У центрі є ____ простір для виставок. (місто)"
        answer: міський
        options:
          - міський
          - містовий
          - містький
        explanation: Від місто утворюємо міський.
      - sentence: "Ми слухали ____ пісню. (козак)"
        answer: козацьку
        options:
          - козацьку
          - козакську
          - козазьку
        explanation: Козак дає козацький; тут знахідний жіночого роду.
      - sentence: "Вона написала ____ огляд події. (історія)"
        answer: історичний
        options:
          - історичний
          - історійський
          - історичський
        explanation: Історія дає історичний.
      - sentence: "Це ____ висновок із прикладів. (логіка)"
        answer: логічний
        options:
          - логічний
          - логіковий
          - логікський
        explanation: Логіка дає логічний.
      - sentence: "Після дощу небо стало ____ . (без хмар)"
        answer: безхмарне
        options:
          - безхмарне
          - без хмарне
          - безхмарний
        explanation: Небо середнього роду, тому безхмарне.
      - sentence: "Місто переживало ____ відновлення. (після війни)"
        answer: післявоєнне
        options:
          - післявоєнне
          - після воєнне
          - післявоєне
        explanation: Відновлення середнього роду; післявоєнне з -нн-.
      - sentence: "У центрі почався ____ рух. (перед святом)"
        answer: передсвятковий
        options:
          - передсвятковий
          - перед святковий
          - передсвятковій
        explanation: Передсвятковий пишемо разом.
      - sentence: "На плакаті був ____ напис. (проти війни)"
        answer: антивоєнний
        options:
          - антивоєнний
          - анти воєнний
          - антивоєний
        explanation: Антивоєнний пишемо разом і з -нн-.
      - sentence: "Увечері з'явився ____ відтінок. (синій, наближено)"
        answer: синюватий
        options:
          - синюватий
          - синійський
          - синний
        explanation: Синюватий означає трохи синій.
      - sentence: "Вона принесла ____ стілець. (дерево)"
        answer: дерев'яний
        options:
          - дерев'яний
          - дерев'янний
          - деревовий
        explanation: Дерев'яний пишемо з одним н.
      - sentence: "Біля річки тягнувся ____ парк. (при березі)"
        answer: прибережний
        options:
          - прибережний
          - при береговий
          - прибержний
        explanation: Прибережний утворено префіксально-суфіксальним способом.
      - sentence: "З вікна видно ____ район. (правий берег)"
        answer: правобережний
        options:
          - правобережний
          - право-бережний
          - правийбережний
        explanation: Правобережний пишемо разом.
