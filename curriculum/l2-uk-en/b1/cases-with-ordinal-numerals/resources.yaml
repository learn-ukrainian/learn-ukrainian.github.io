- title: "B1 M53: genitive nuances"
  role: curriculum
  notes: "Попередній модуль уже показав родовий у датах; M61 уточнює, як змінюється саме порядковий числівник у календарній даті."
- title: "B1 M58: prepositions temporal"
  role: curriculum
  notes: "Часові прийменники з M58 готують форми о третій, до восьмої, за десять хвилин сьома."
- title: "B1 M60: prepositions cause purpose"
  role: curriculum
  notes: "Попередній модуль закріпив прийменникове керування; M61 застосовує ту саму точність до порядкових числівників."
- title: "B1 M62: cases with quantity expressions"
  role: curriculum
  notes: "Наступний модуль перейде від порядкових до кількісних виразів і узгодження кількості з іменниками."
- title: "Заболотний Grade 6, §55"
  role: textbook
  notes: "Пояснює, що порядкові числівники змінюються за родами, числами й відмінками як прикметники; у складених порядкових відмінюється тільки останнє слово."
  source_ref: "6-klas-ukrmova-zabolotnyi-2020, §55, pp.179-187"
- title: "Авраменко Grade 6, §83"
  role: textbook
  notes: "Подає парадигми шостий, третій, сто сорок п'ятий; наголошує на узгодженні з іменником і м'якому типі числівника третій."
  source_ref: "6-klas-ukrmova-avramenko-2023, §83, pp.163-164"
- title: "Литвінова Grade 6, §50"
  role: textbook
  notes: "Пояснює форми 7-й поверх, до 1-ї години та відсутність нарощення в календарних датах і номерах сторінок."
  source_ref: "6-klas-ukrmova-litvinova-2023, §50, p.237"
- title: "Литвінова Grade 6, §52"
  role: textbook
  notes: "Підтверджує, що в календарних датах змінюється порядковий числівник, а назва місяця лишається в родовому відмінку однини."
  source_ref: "6-klas-ukrmova-litvinova-2023, §52, pp.245-246"
- title: "Авраменко Grade 11, §14"
  role: textbook
  notes: "Подає культуру мовлення для часу: за десять сьома, п'ять хвилин на шосту; застерігає від без десяти сім і п'ять хвилин шостої."
  source_ref: "11-klas-ukrajinska-mova-avramenko-2019, §14, pp.41-44"
- title: "Караман Grade 10, §68"
  role: textbook
  notes: "Підтримує правопис складних порядкових із -сотий, -тисячний, -мільйонний та дефіс у цифрових формах 7-й, 10-ї, 11-го."
  source_ref: "10-klas-ukrmova-karaman-2018, §68, pp.171-175"
