  - id: wb-8
    type: essay-response
    title: Розклад із порядковими числівниками
    instruction: "Напишіть 6-8 речень українською."
    prompt: "Опишіть один день навчання, подорожі або роботи. Використайте щонайменше шість порядкових числівників: дату, час, поверх або платформу, номер кабінету чи вагона, століття або порядок у тексті."
    min_words: 90
    model_answer: "Сьогодні двадцять перше квітня, і в мене насичений день в університеті. Перша пара починається о дев'ятій годині, але я прийду за десять хвилин до дев'ятої, щоб знайти аудиторію. Консультація відбудеться в кабінеті двісті десятому на третьому поверсі. Після другої пари я піду на вокзал, бо маю квиток на двадцять друге квітня у п'ятий вагон. Поїзд вирушає з другої платформи о пів на шосту. Увечері я прочитаю текст про Україну у двадцять першому столітті й запишу три приклади: по-перше, дату; по-друге, час; по-третє, номер кабінету. Так я ще раз перевірю відмінки й напишу короткий розклад без кальок."
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "6-8 речень і щонайменше 90 слів."
      - criteria: "Порядкові числівники"
        points: 3
        description: "Є щонайменше шість порядкових числівників у різних функціях."
      - criteria: "Відмінки"
        points: 3
        description: "Дати, час, поверхи, платформи або кабінети мають правильний відмінок."
      - criteria: "Природність"
        points: 1
        description: "Текст звучить як реальний розклад або розповідь, а не як випадковий список."
