version: '1.0'
module: cases-with-ordinal-numerals
level: b1
inline:
  - id: act-1
    type: quiz
    title: Кількість чи порядок?
    instruction: "Оберіть правильне пояснення форми."
    items:
      - question: "На яке питання відповідає порядковий числівник?"
        options:
          - "котрий?"
          - "скільки?"
          - "чому?"
        correct: 0
        explanation: "Порядковий числівник називає місце в послідовності."
      - question: "У фразі перший урок числівник має форму:"
        options:
          - "чоловічий рід, називний відмінок"
          - "жіночий рід, родовий відмінок"
          - "середній рід, місцевий відмінок"
        correct: 0
        explanation: "Урок - чоловічий рід, називний відмінок."
      - question: "У фразі п'яте березня приховане слово:"
        options:
          - "число"
          - "місяць"
          - "година"
        correct: 0
        explanation: "Мається на увазі п'яте число березня."
      - question: "П'ятого березня у реченні Зустріч відбудеться п'ятого березня - це:"
        options:
          - "родовий відмінок для дати події"
          - "називний відмінок для сьогоднішньої дати"
          - "орудний відмінок для способу дії"
        correct: 0
        explanation: "Дата події відповідає на питання якого числа?"
      - question: "У фразі о третій годині числівник стоїть у:"
        options:
          - "місцевому відмінку жіночого роду"
          - "знахідному відмінку середнього роду"
          - "родовому відмінку множини"
        correct: 0
        explanation: "Година - жіночий рід; о + місцевий."
      - question: "Що змінюється у складеному порядковому числівнику двадцять перший?"
        options:
          - "тільки останнє слово"
          - "усі слова"
          - "жодне слово"
        correct: 0
        explanation: "Двадцять першого, двадцять першому: змінюється останнє слово перший."
      - question: "Який числівник відмінюється як прикметник м'якої групи?"
        options:
          - "третій"
          - "перший"
          - "п'ятий"
        correct: 0
        explanation: "Нормативні форми: третього, третьому, третьої."
      - question: "На третьому поверсі означає:"
        options:
          - "місце"
          - "напрямок"
          - "дату"
        correct: 0
        explanation: "Де? на третьому поверсі."
      - question: "На третій поверх означає:"
        options:
          - "напрямок"
          - "місце"
          - "походження"
        correct: 0
        explanation: "Куди? на третій поверх."
      - question: "За десять сьома означає:"
        options:
          - "6:50"
          - "7:10"
          - "10:07"
        correct: 0
        explanation: "За десять хвилин буде сьома година."
      - question: "Який запис календарної дати найкращий?"
        options:
          - "25 березня 2024 року"
          - "25-го березня 2024 року"
          - "25-те березень 2024 року"
        correct: 0
        explanation: "У звичайних календарних датах нарощення не пишемо."
      - question: "Як записати двадцять перше століття римськими цифрами?"
        options:
          - "XXI століття"
          - "XXI-й століття"
          - "XXI-ше століття"
        correct: 0
        explanation: "Після римських цифр нарощення не додаємо."
  - id: act-2
    type: fill-in
    title: Поставте форму
    instruction: "Заповніть пропуск правильною формою порядкового числівника."
    items:
      - sentence: "Зустріч відбудеться ____ березня."
        answer: "п'ятого"
        options:
          - "п'ятого"
          - "п'яте"
          - "п'ятий"
        explanation: "Дата події: якого числа? п'ятого березня."
      - sentence: "Сьогодні ____ квітня."
        answer: "двадцять перше"
        options:
          - "двадцять перше"
          - "двадцять першого"
          - "двадцять першому"
        explanation: "Називаємо число: середній рід, називний."
      - sentence: "Квиток купили на ____ вересня."
        answer: "перше"
        options:
          - "перше"
          - "першого"
          - "першій"
        explanation: "На яку дату? на перше вересня."
      - sentence: "Лекція починається о ____ годині."
        answer: "третій"
        options:
          - "третій"
          - "третю"
          - "третього"
        explanation: "О + місцевий: о третій годині."
      - sentence: "Зараз пів на ____."
        answer: "п'яту"
        options:
          - "п'яту"
          - "п'ятої"
          - "п'ята"
        explanation: "Пів на + знахідний: пів на п'яту."
      - sentence: "Підніміться на ____ поверх."
        answer: "третій"
        options:
          - "третій"
          - "третьому"
          - "третього"
        explanation: "Куди? на третій поверх."
      - sentence: "Каса працює на ____ поверсі."
        answer: "другому"
        options:
          - "другому"
          - "другий"
          - "другого"
        explanation: "Де? на другому поверсі."
      - sentence: "Поїзд вирушає з ____ платформи."
        answer: "другої"
        options:
          - "другої"
          - "друга"
          - "другу"
        explanation: "Звідки? з другої платформи."
      - sentence: "Подія сталася у ____ столітті."
        answer: "двадцять першому"
        options:
          - "двадцять першому"
          - "двадцять першого"
          - "двадцять перше"
        explanation: "У якому столітті? у двадцять першому."
      - sentence: "Зустрінемося в кабінеті ____."
        answer: "двісті десятому"
        options:
          - "двісті десятому"
          - "двохсот десятому"
          - "двісті десятий"
        explanation: "У складеному порядковому змінюється останнє слово."
      - sentence: "Це ____ спроба за тиждень."
        answer: "третя"
        options:
          - "третя"
          - "третього"
          - "третій"
        explanation: "Спроба - жіночий рід, називний."
      - sentence: "Я читаю цей текст ____."
        answer: "вдруге"
        options:
          - "вдруге"
          - "другого"
          - "другій"
        explanation: "Вдруге - прислівник, він не відмінюється."
  - id: act-3
    type: match-up
    title: Форма і причина
    instruction: "Поєднайте фразу з граматичним поясненням."
    pairs:
      - left: "перший вагон"
        right: "чоловічий рід, називний відмінок"
      - left: "першого вагона"
        right: "родовий відмінок однини"
      - left: "перша платформа"
        right: "жіночий рід, називний відмінок"
      - left: "з першої платформи"
        right: "родовий після прийменника з"
      - left: "п'яте березня"
        right: "називання дати, приховане слово число"
      - left: "п'ятого березня"
        right: "дата події, питання якого числа"
      - left: "о третій годині"
        right: "місцевий після о"
      - left: "пів на п'яту"
        right: "знахідний після на у часовій формулі"
      - left: "на третьому поверсі"
        right: "місце, місцевий відмінок"
      - left: "на третій поверх"
        right: "напрямок, знахідний відмінок"
      - left: "у двадцять першому столітті"
        right: "складений порядковий, змінено останнє слово"
      - left: "по-перше"
        right: "прислівник для переліку, пишеться через дефіс"
  - id: act-4
    type: group-sort
    title: Де яка модель?
    instruction: "Розкладіть фрази за комунікативною ситуацією."
    groups:
      - label: "Дата"
        items:
          - "сьогодні сьоме квітня"
          - "зустріч сьомого квітня"
          - "квиток на сьоме квітня"
      - label: "Час"
        items:
          - "о третій годині"
          - "пів на п'яту"
          - "за десять сьома"
      - label: "Місце і напрямок"
        items:
          - "на третьому поверсі"
          - "на третій поверх"
          - "з другої платформи"
      - label: "Порядок і період"
        items:
          - "по-перше"
          - "вдруге"
          - "у двадцять першому столітті"
  - id: act-5
    type: error-correction
    title: Виправляємо відмінок
    instruction: "Знайдіть і виправте одну помилку в кожному реченні."
    items:
      - sentence: "Сьогодні п'ятий березень."
        error: "п'ятий березень"
        correction: "п'яте березня"
        error_type: phrase
        explanation: "У даті мається на увазі п'яте число березня."
      - sentence: "Зустріч відбудеться п'яте березня."
        error: "п'яте березня"
        correction: "п'ятого березня"
        error_type: phrase
        explanation: "Дата події відповідає на питання якого числа?"
      - sentence: "Квиток купили на п'ятого березня."
        error: "на п'ятого"
        correction: "на п'яте"
        error_type: phrase
        explanation: "Плануємо на дату: на п'яте березня."
      - sentence: "Лекція починається у шість годин."
        error: "у шість годин"
        correction: "о шостій годині"
        error_type: phrase
        explanation: "Для часу події вживаємо о + місцевий."
      - sentence: "Зараз без десяти сім."
        error: "без десяти сім"
        correction: "за десять сьома"
        error_type: phrase
        explanation: "Нормативна модель: за десять хвилин сьома."
      - sentence: "Зараз п'ять хвилин шостої."
        error: "п'ять хвилин шостої"
        correction: "п'ять хвилин на шосту"
        error_type: phrase
        explanation: "Для хвилин після години вживаємо на + знахідний."
      - sentence: "Ми сидимо на третій поверсі."
        error: "на третій поверсі"
        correction: "на третьому поверсі"
        error_type: phrase
        explanation: "Де? на третьому поверсі."
      - sentence: "Підніміться на третьому поверх."
        error: "на третьому поверх"
        correction: "на третій поверх"
        error_type: phrase
        explanation: "Куди? на третій поверх."
      - sentence: "Подія сталася у двадцять першого столітті."
        error: "у двадцять першого"
        correction: "у двадцять першому"
        error_type: phrase
        explanation: "У якому столітті? у двадцять першому."
      - sentence: "Він народився у двох тисячах двадцять четвертому році."
        error: "у двох тисячах двадцять четвертому"
        correction: "у дві тисячі двадцять четвертому"
        error_type: phrase
        explanation: "У складеному порядковому році змінюється останнє слово."
      - sentence: "Зайдіть до третого кабінету."
        error: "третого"
        correction: "третього"
        error_type: phrase
        explanation: "Третій має м'який тип: третього."
      - sentence: "Україна в XXI-й столітті активно розвиває цифрові сервіси."
        error: "XXI-й столітті"
        correction: "XXI столітті"
        error_type: phrase
        explanation: "Після римських цифр нарощення не додаємо."
workbook:
  - id: wb-1
    type: quiz
    title: Оберіть нормативну форму
    instruction: "Оберіть речення з правильною формою порядкового числівника."
    items:
      - question: "Як правильно назвати сьогоднішню дату?"
        options:
          - "Сьогодні сьоме квітня."
          - "Сьогодні сьомий квітень."
          - "Сьогодні сьомого квітня."
        correct: 0
        explanation: "Для називання дати потрібна форма середнього роду."
      - question: "Як правильно сказати про дату події?"
        options:
          - "Зустріч відбудеться сьомого квітня."
          - "Зустріч відбудеться сьоме квітня."
          - "Зустріч відбудеться сьомий квітень."
        correct: 0
        explanation: "Дата події: родовий відмінок."
      - question: "Яка форма правильна для квитка?"
        options:
          - "Квиток на перше вересня."
          - "Квиток на першого вересня."
          - "Квиток на перший вересень."
        correct: 0
        explanation: "На дату: на перше вересня."
      - question: "Яка відповідь на питання о котрій годині? правильна?"
        options:
          - "О третій годині."
          - "У три години."
          - "На третю годину."
        correct: 0
        explanation: "О + місцевий: о третій годині."
      - question: "Як сказати 4:30?"
        options:
          - "Пів на п'яту."
          - "Пів п'ятої."
          - "Половина п'яти."
        correct: 0
        explanation: "Нормативна модель: пів на п'яту."
      - question: "Як сказати 6:50?"
        options:
          - "За десять сьома."
          - "Без десяти сім."
          - "За десять сім."
        correct: 0
        explanation: "За десять хвилин буде сьома."
      - question: "Де розташована каса?"
        options:
          - "На другому поверсі."
          - "На другий поверх."
          - "З другого поверху."
        correct: 0
        explanation: "Де? на другому поверсі."
      - question: "Куди треба піднятися?"
        options:
          - "На другий поверх."
          - "На другому поверсі."
          - "З другого поверху."
        correct: 0
        explanation: "Куди? на другий поверх."
      - question: "Як відмінити кабінет двісті десятий у місцевому?"
        options:
          - "у кабінеті двісті десятому"
          - "у кабінеті двохсот десятому"
          - "у кабінеті двісті десятий"
        correct: 0
        explanation: "У складеному порядковому змінюється тільки останнє слово."
      - question: "Яка форма року правильна?"
        options:
          - "у дві тисячі двадцять четвертому році"
          - "у двох тисячах двадцять четвертому році"
          - "у дві тисячі двадцять четвертий рік"
        correct: 0
        explanation: "Для років у місцевому змінюється останній порядковий компонент."
      - question: "Який цифровий запис правильний для поверху?"
        options:
          - "7-й поверх"
          - "7 поверхий"
          - "7-ий поверх"
        correct: 0
        explanation: "Для цифрового порядкового вживаємо дефісне закінчення."
      - question: "Який запис правильний для століття?"
        options:
          - "XXI століття"
          - "XXI-й століття"
          - "XXI-ше століття"
        correct: 0
        explanation: "Після римських цифр закінчення не пишемо."
  - id: wb-2
    type: fill-in
    title: Розклад і простір
    instruction: "Виберіть форму, яка відповідає питанню в реченні."
    items:
      - sentence: "Сьогодні ____ травня."
        answer: "десяте"
        options:
          - "десяте"
          - "десятого"
          - "десятий"
        explanation: "Яке число? десяте травня."
      - sentence: "Екзамен призначено на ____ травня."
        answer: "десяте"
        options:
          - "десяте"
          - "десятого"
          - "десятим"
        explanation: "На яку дату? на десяте травня."
      - sentence: "Екзамен відбудеться ____ травня."
        answer: "десятого"
        options:
          - "десятого"
          - "десяте"
          - "десятому"
        explanation: "Коли? десятого травня."
      - sentence: "Консультація почнеться о ____."
        answer: "другій"
        options:
          - "другій"
          - "другу"
          - "друга"
        explanation: "О котрій? о другій."
      - sentence: "Зараз чверть на ____."
        answer: "восьму"
        options:
          - "восьму"
          - "восьмої"
          - "восьма"
        explanation: "Чверть на + знахідний."
      - sentence: "Зараз за чверть ____."
        answer: "восьма"
        options:
          - "восьма"
          - "восьму"
          - "восьмої"
        explanation: "За чверть буде восьма."
      - sentence: "Ми працюємо в ____ аудиторії."
        answer: "четвертій"
        options:
          - "четвертій"
          - "четверту"
          - "четверта"
        explanation: "Де? в четвертій аудиторії."
      - sentence: "Зайдіть у ____ аудиторію."
        answer: "четверту"
        options:
          - "четверту"
          - "четвертій"
          - "четвертої"
        explanation: "Куди? у четверту аудиторію."
      - sentence: "Поверніться з ____ корпусу."
        answer: "першого"
        options:
          - "першого"
          - "перший"
          - "першому"
        explanation: "Звідки? з першого корпусу."
      - sentence: "Поїзд прибуває на ____ колію."
        answer: "третю"
        options:
          - "третю"
          - "третій"
          - "третьої"
        explanation: "Куди? на третю колію."
      - sentence: "Він живе у ____ столітті."
        answer: "двадцять першому"
        options:
          - "двадцять першому"
          - "двадцять перше"
          - "двадцять першого"
        explanation: "У якому столітті? місцевий відмінок."
      - sentence: "Завдання є на ____ сторінці."
        answer: "сто п'ятнадцятій"
        options:
          - "сто п'ятнадцятій"
          - "ста п'ятнадцятій"
          - "сто п'ятнадцята"
        explanation: "Змінюється тільки останнє слово складеного порядкового."
  - id: wb-3
    type: cloze
    title: Повідомлення з розкладом
    instruction: "Заповніть текст формами порядкових числівників і часовими моделями."
    text: "Сьогодні {1} квітня. Консультація відбудеться {2} квітня {3} третій годині, а тренування почнеться {4}. Кабінет розташований на {5} поверсі, але спочатку треба зайти в {6} аудиторію біля сходів. Поїзд вирушає з {7} платформи о 6:50; словами це {8}. У квитку вказано {9} вагон. Подія описує Україну у {10} столітті. У заяві треба написати: до {11} травня. У розкладі цифровий варіант для поверху можна подати як {12} поверх."
