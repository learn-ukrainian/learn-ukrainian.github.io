version: '1.0'
module: checkpoint-text-register
level: b1
inline:
  - id: act-1
    type: group-sort
    title: Регістр речення
    instruction: Розподіліть речення за регістром.
    groups:
      - label: Офіційно-діловий стиль
        items:
          - Прошу видати мені довідку до 15 травня.
          - Відповідно до графіка зустріч відбудеться у п'ятницю.
          - З повагою, Марко Савченко.
      - label: Розмовний стиль
        items:
          - Слухай, скинь мені файл до шостої.
          - Ого, ти вже все прочитав?
          - Коротше, зустріч перенесли.
  - id: act-2
    type: fill-in
    title: Абревіатури в реченнях
    instruction: Оберіть правильне узгодження.
    items:
      - sentence: "ООН ____ про підтримку програми."
        answer: заявила
        options:
          - заявила
          - заявив
          - заявили
          - заявило
        explanation: Головне слово — організація.
      - sentence: "ЄС ____ нові рекомендації."
        answer: ухвалив
        options:
          - ухвалив
          - ухвалила
          - ухвалили
          - ухвалило
        explanation: Європейський Союз — чоловічий рід.
      - sentence: "ЗМІ ____ новину."
        answer: повідомили
        options:
          - повідомили
          - повідомила
          - повідомив
          - повідомило
        explanation: Засоби — множина.
      - sentence: "СБУ ____ деталі."
        answer: повідомила
        options:
          - повідомила
          - повідомив
          - повідомили
          - повідомило
        explanation: Служба — жіночий рід.
  - id: act-5
    type: error-correction
    title: Подвійне заперечення
    instruction: Виправте заперечення або написання не/ні.
    items:
      - sentence: "Ніхто бачив цей документ."
        error: "пропущено не"
        correction: "Ніхто не бачив цього документа."
        explanation: Із займенником ніхто присудок теж має не.
      - sentence: "Я нічого знаю про довідку."
        error: "пропущено не"
        correction: "Я нічого не знаю про довідку."
        explanation: Із займенником нічого потрібне заперечення біля дієслова.
      - sentence: "Марко ніким не говорив після заняття."
        error: "ніким замість ні з ким"
        correction: "Марко ні з ким не говорив після заняття."
        explanation: Прийменник стоїть між ні та займенником.
      - sentence: "Ніколи бачив таку річку."
        error: "пропущено не"
        correction: "Ніколи не бачив такої річки."
        explanation: Заперечний прислівник ніколи потребує не.
  - id: act-3
    type: true-false
    title: Художній уривок
    instruction: Визначте, чи твердження відповідає уривку з уроку.
    items:
      - statement: Уривок описує простір біля річки після дощу.
        correct: true
        explanation: У тексті є стежка біля річки, верби, вода й дощ.
      - statement: 'Порівняння "верби, мов уважні слухачі" створює образ природи.'
        correct: true
        explanation: Сполучник мов прямо вводить порівняння.
      - statement: Марко прийшов до парку, бо волонтери домовилися прибрати берег.
        correct: true
        explanation: Саме ця домовленість починає екологічну дію в уривку.
      - statement: '"Річка втомлено дихала" є персоніфікацією.'
        correct: true
        explanation: Річці надано людську дію.
      - statement: Уривок написано офіційно-діловим стилем.
        correct: false
        explanation: У ньому є образність, метафори й настрій.
  - id: act-4
    type: error-correction
    title: Вставні й однорідні
    instruction: Виправте пунктуацію.
    items:
      - sentence: "Мабуть ми запізнимося."
        error: "немає коми після вставного слова"
        correction: "Мабуть, ми запізнимося."
        explanation: Мабуть виділяємо комою.
      - sentence: "Адже, ми вже домовилися."
        error: "зайва кома після не вставного слова"
        correction: "Адже ми вже домовилися."
        explanation: Адже не є вставним словом.
      - sentence: "Автор використовує три засоби епітет, метафору й порівняння."
        error: "немає двокрапки після узагальнювального слова"
        correction: "Автор використовує три засоби: епітет, метафору й порівняння."
        explanation: Після узагальнювального слова перед рядом ставимо двокрапку.
      - sentence: "Ми читали слухали й записували."
        error: "немає коми між однорідними присудками"
        correction: "Ми читали, слухали й записували."
        explanation: Між однорідними присудками без повторюваного сполучника потрібна кома.
workbook:
  - id: wb-1
    type: quiz
    title: Маркери стилю
    instruction: Оберіть маркер, який пояснює стиль.
    items:
      - question: Чому речення "Прошу повідомити графік роботи" офіційне?
        options:
          - має формулу прохання й нейтральний тон
          - має вигук ого
          - має неповне речення
          - має фразеологізм
        correct: 0
        explanation: Формула прошу повідомити належить до офіційно-ділового стилю.
      - question: Чому "Слухай, зустріч буде?" розмовне?
        options:
          - має частку-звернення й коротке питання
          - має реквізити документа
          - має графічне скорочення
          - має дату в родовому відмінку
        correct: 0
        explanation: Слухай і коротка структура створюють неформальний тон.
      - question: Яке речення найкраще перетворює "Мені треба довідка" на офіційний стиль?
        options:
          - "Прошу видати мені довідку."
          - "Скиньте довідку, ок?"
          - "Ого, довідка треба."
          - "Коротше, довідка."
        correct: 0
        explanation: Офіційний стиль прямо називає прохання.
  - id: wb-2
    type: group-sort
    title: Крапка в скороченнях
    instruction: Розподіліть скорочення.
    groups:
      - label: З крапкою
        items:
          - вул.
          - м.
          - с.
          - тис.
      - label: Без крапки
        items:
          - грн
          - кг
          - см
          - млн
  - id: wb-3
    type: cloze
    title: Інтегрований відгук
    instruction: Оберіть форми, які роблять відповідь грамотною.
    text: "{1}, уривок має тривожний настрій. Автор використовує три засоби: {2}, метафору й порівняння. Українські {3} могли б описати цей текст як приклад художнього стилю. {4}, коми зі вставними словами дуже важливі."
    blanks:
      - id: 1
        answer: На мою думку
        options:
          - На мою думку
          - Адже
          - Навіть
          - Нібито
      - id: 2
        answer: епітет
        options:
          - епітет
          - реквізит
          - гривню
          - протокол
      - id: 3
        answer: ЗМІ
        options:
          - ЗМІ
          - грн
          - вул.
          - кг
      - id: 4
        answer: Отже
        options:
          - Отже
          - Навіть
          - Адже
          - Принаймні
  - id: wb-4
    type: translate
    title: Короткі контрольні переклади
    instruction: Оберіть природний український варіант.
    items:
      - source: Unfortunately, the meeting was moved.
        options:
          - text: "На жаль, зустріч перенесли."
            correct: true
          - text: "Адже, зустріч перенесли."
            correct: false
          - text: "Навіть, зустріч перенесли."
            correct: false
          - text: "Зустріч грн перенесли."
            correct: false
        explanation: На жаль — вставне словосполучення емоції.
      - source: The UN supported the program.
        options:
          - text: "ООН підтримала програму."
            correct: true
          - text: "ООН підтримав програму."
            correct: false
          - text: "О.О.Н. підтримала програму."
            correct: false
          - text: "ООН підтримали програму."
            correct: false
        explanation: ООН без крапок; головне слово організація.
      - source: Please issue me a certificate.
        options:
          - text: "Прошу видати мені довідку."
            correct: true
          - text: "Скиньте мені довідку, ок?"
            correct: false
          - text: "Ого, довідка!"
            correct: false
          - text: "Довідка, мабуть, грн."
            correct: false
        explanation: Це офіційне прохання.
      - source: Nobody said anything.
        options:
          - text: "Ніхто нічого не сказав."
            correct: true
          - text: "Ніхто нічого сказав."
            correct: false
          - text: "Хтось нічого не сказав."
            correct: false
          - text: "Ніхто не щось сказав."
            correct: false
        explanation: Українське подвійне заперечення потребує не біля присудка.
  - id: wb-5
    type: fill-in
    title: Дати й числа
    instruction: Оберіть правильне читання або запис.
    items:
      - sentence: "24 серпня 1991 року: місяць стоїть у формі ____."
        answer: родового відмінка
        options:
          - родового відмінка
          - називного відмінка
          - кличного відмінка
          - орудного відмінка
        explanation: У датах після числа назва місяця має родовий відмінок.
      - sentence: "50 грн читаємо як ____."
        answer: п'ятдесят гривень
        options:
          - п'ятдесят гривень
          - п'ятдесят гривні
          - п'ятдесят гривня
          - п'ятдесят грн.
        explanation: У вимові читаємо повну назву валюти.
      - sentence: "70 кг пишемо ____."
        answer: без крапки
        options:
          - без крапки
          - з крапкою
          - через дефіс
          - у лапках
        explanation: Одиниці виміру пишуться без крапки.
  - id: wb-6
    type: error-correction
    title: Мішана корекція
    instruction: Виправте помилку.
    items:
      - sentence: "Згідно до графіка зустріч буде завтра."
        error: "неправильне керування"
        correction: "Згідно з графіком зустріч буде завтра."
        explanation: Згідно з керує орудним відмінком.
      - sentence: "Короче, ООН заявив про програму."
        error: "суржик і неправильне узгодження"
        correction: "Коротше, ООН заявила про програму."
        explanation: Коротше — український маркер; ООН — жіночий рід.
      - sentence: "Вул Шевченка, 10."
        error: "немає крапки після графічного скорочення"
        correction: "вул. Шевченка, 10."
        explanation: Вул. як графічне скорочення має крапку.
      - sentence: "Здається цей шлях довгим."
        error: "плутання вставного і присудка"
        correction: "Цей шлях здається довгим."
        explanation: Тут здається є присудком, а не вставним словом.
      - sentence: "Ніхто бачив пляшки біля річки."
        error: "пропущено не"
        correction: "Ніхто не бачив пляшок біля річки."
        explanation: Заперечний займенник ніхто потребує не біля дієслова.
