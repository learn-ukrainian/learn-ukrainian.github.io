version: '1.0'
module: adjectives-superlative
level: b1
inline:
  - id: act-1
    type: quiz
    title: Що показує найвищий ступінь?
    instruction: "Оберіть правильний варіант або пояснення."
    items:
      - question: "Найвищий ступінь називає:"
        options:
          - "найбільшу або найменшу міру ознаки в групі"
          - "будь-яку дію в минулому"
          - "лише матеріал предмета"
        correct: 0
        explanation: Найвищий ступінь виділяє один об'єкт у групі за мірою ознаки.
      - question: "Проста форма найвищого ступеня твориться так:"
        options:
          - "най- + форма вищого ступеня"
          - "найбільш + форма з най-"
          - "самий + прикметник"
        correct: 0
        explanation: Спочатку будуємо вищий ступінь, потім додаємо най-.
      - question: "Правильний ланцюжок:"
        options:
          - "дорогий - дорожчий - найдорожчий"
          - "дорогий - дорогіший - найдорогіший"
          - "дорогий - дорожчий - найбільш найдорожчий"
        correct: 0
        explanation: Частотна нормативна форма вищого ступеня дорожчий дає найдорожчий.
      - question: "Правильне речення:"
        options:
          - "Говерла - найвища гора України."
          - "Говерла - найвисокіша гора України."
          - "Говерла - найбільш найвища гора України."
        correct: 0
        explanation: Високий дає вищий, а далі найвищий.
      - question: "Складена форма найвищого ступеня:"
        options:
          - "найменш ризикований план"
          - "найменш ризикованіший план"
          - "найбільш найризикованіший план"
        correct: 0
        explanation: Після найменш стоїть початкова форма прикметника.
      - question: "Який варіант є русизмом у навчальному стандарті?"
        options:
          - "самий кращий"
          - "найкращий"
          - "щонайкращий"
        correct: 0
        explanation: Для найвищого ступеня вживаємо найкращий, а не самий кращий.
      - question: "Правильне написання підсиленої форми:"
        options:
          - "якнайшвидший"
          - "як найшвидший"
          - "як-найшвидший"
        correct: 0
        explanation: Якнай- пишеться разом із формою найвищого ступеня.
      - question: "Форма щонайкращий додає:"
        options:
          - "підсилення або виразний максимум"
          - "заперечення ознаки"
          - "минулу дію"
        correct: 0
        explanation: Щонай- підкреслює максимальність оцінки.
      - question: "У словосполученні найкращу відповідь форма найкращу:"
        options:
          - "знахідний жіночого роду"
          - "називний чоловічого роду"
          - "родовий множини"
        correct: 0
        explanation: Відповідь жіночого роду; після бачити/обрати потрібен знахідний.
      - question: "Що природніше для офіційного звіту?"
        options:
          - "найбільш ефективний метод"
          - "прегарний метод"
          - "самий ефективний метод"
        correct: 0
        explanation: Складена форма добре підходить для аналітичного стилю.
      - question: "Яка форма показує найменшу міру ознаки?"
        options:
          - "найменш складне завдання"
          - "складніше завдання"
          - "найскладніше завдання"
        correct: 0
        explanation: Найменш + прикметник означає найменшу міру ознаки.
      - question: "Най- пишеться:"
        options:
          - "разом із прикметником"
          - "через дефіс"
          - "окремо перед прикметником"
        correct: 0
        explanation: Правильно найкращий, найточніший, найдорожчий.
  - id: act-2
    type: fill-in
    title: Додайте най-
    instruction: "Вставте просту форму найвищого ступеня, узгоджену з іменником."
    items:
      - sentence: "Це ____ маршрут у центрі. (короткий)"
        answer: найкоротший
        options:
          - найкоротший
          - найбільш коротший
          - найкоротша
        explanation: Маршрут - чоловічий рід; коротший дає найкоротший.
      - sentence: "Ця кімната ____ в готелі. (тихий)"
        answer: найтихіша
        options:
          - найтихіша
          - найтихіший
          - найбільш тихіша
        explanation: Кімната - жіночий рід; тихіша дає найтихіша.
      - sentence: "Це ____ пояснення в підручнику. (точний)"
        answer: найточніше
        options:
          - найточніше
          - найточніший
          - найбільш найточніше
        explanation: Пояснення - середній рід.
      - sentence: "Ми обрали ____ відповідь. (кращий)"
        answer: найкращу
        options:
          - найкращу
          - найкраща
          - саму кращу
        explanation: Після обрали потрібен знахідний жіночого роду.
      - sentence: "Говерла - ____ гора України. (високий)"
        answer: найвища
        options:
          - найвища
          - найвисока
          - найбільш найвища
        explanation: Високий - вищий - найвищий; гора жіночого роду.
      - sentence: "Цей квиток ____ у списку. (дорогий)"
        answer: найдорожчий
        options:
          - найдорожчий
          - найдорогіший
          - найбільш найдорожчий
        explanation: Дорогий - дорожчий - найдорожчий.
      - sentence: "Ця станція ____ до мого дому. (близький)"
        answer: найближча
        options:
          - найближча
          - найблизькіша
          - найближче
        explanation: Станція - жіночий рід; близький - ближчий - найближчий.
      - sentence: "Це ____ завдання в тесті. (легкий)"
        answer: найлегше
        options:
          - найлегше
          - найлегкий
          - найлегче
        explanation: Легкий - легший - найлегший; завдання середнього роду.
      - sentence: "Це ____ результат за семестр. (поганий)"
        answer: найгірший
        options:
          - найгірший
          - найпоганішийший
          - найбільш найгірший
        explanation: Поганий має форму гірший, далі найгірший.
      - sentence: "Ці двері ____ у квартирі. (широкий)"
        answer: найширші
        options:
          - найширші
          - найширша
          - найбільш широкіші
        explanation: Двері - множина; широкий - ширший - найширший.
      - sentence: "Немає ____ рішення. (простий)"
        answer: найпростішого
        options:
          - найпростішого
          - найпростіше
          - найбільш найпростого
        explanation: Немає потребує родового відмінка.
      - sentence: "Я задоволений ____ порадою. (корисний)"
        answer: найкориснішою
        options:
          - найкориснішою
          - найкорисніша
          - найкориснішим
        explanation: Порадою - орудний жіночого роду.
  - id: act-3
    type: match-up
    title: Ланцюжок форми
    instruction: "Поєднайте початковий прикметник із формою найвищого ступеня."
    pairs:
      - left: сильний
        right: найсильніший
      - left: тихий
        right: найтихіший
      - left: точний
        right: найточніший
      - left: молодий
        right: наймолодший
      - left: старий
        right: найстарший
      - left: дорогий
        right: найдорожчий
      - left: близький
        right: найближчий
      - left: високий
        right: найвищий
      - left: легкий
        right: найлегший
      - left: широкий
        right: найширший
      - left: добрий
        right: найкращий
      - left: поганий
        right: найгірший
  - id: act-4
    type: group-sort
    title: Яка модель?
    instruction: "Розподіліть приклади за моделлю найвищого ступеня або підсилення."
    groups:
      - label: "Проста форма"
        items:
          - найкоротший маршрут
          - найточніша відповідь
          - найдорожчий квиток
      - label: "Складена форма"
        items:
          - найбільш ефективний метод
          - найменш ризикований план
          - найбільш поширена помилка
      - label: "Підсилена форма"
        items:
          - щонайкращий варіант
          - якнайшвидший маршрут
          - якнайточніша відповідь
      - label: "Синонімічне підсилення"
        items:
          - надзвичайно корисна порада
          - вкрай важливе правило
          - прегарний краєвид
  - id: act-5
    type: error-correction
    title: Редактор найвищого ступеня
    instruction: "Виправте одну головну помилку в кожному реченні."
    items:
      - sentence: "Це самий кращий варіант."
        error: самий кращий
        correction: "Це найкращий варіант."
        explanation: У нормативному найвищому ступені вживаємо най-, а не самий.
      - sentence: "Це найбільш найцікавіший музей."
        error: найбільш найцікавіший
        correction: "Це найцікавіший музей."
        explanation: Не змішуємо найбільш із простою формою на най-.
      - sentence: "Ми обрали найкраща відповідь."
        error: найкраща відповідь
        correction: "Ми обрали найкращу відповідь."
        explanation: Після обрали потрібен знахідний жіночого роду.
      - sentence: "Говерла - найвисокіша гора України."
        error: найвисокіша
        correction: "Говерла - найвища гора України."
        explanation: Високий - вищий - найвищий.
      - sentence: "Це най-дорожчий квиток."
        error: най-дорожчий
        correction: "Це найдорожчий квиток."
        explanation: Най- пишеться разом.
      - sentence: "Нам потрібен як найшвидший маршрут."
        error: як найшвидший
        correction: "Нам потрібен якнайшвидший маршрут."
        explanation: Якнай- у підсиленій формі пишеться разом.
      - sentence: "Це найменш ризикованіший план."
        error: найменш ризикованіший
        correction: "Це найменш ризикований план."
        explanation: Після найменш стоїть початкова форма прикметника.
      - sentence: "Немає найзручний маршруту."
        error: найзручний маршруту
        correction: "Немає найзручнішого маршруту."
        explanation: Немає потребує родового відмінка.
      - sentence: "Ця станція найблизькіша до дому."
        error: найблизькіша
        correction: "Ця станція найближча до дому."
        explanation: Близький - ближчий - найближчий.
      - sentence: "Це найбільш точніша формула."
        error: найбільш точніша
        correction: "Це найбільш точна формула."
        explanation: Складена форма не має суфікса вищого ступеня.
      - sentence: "Я задоволений найкраща роботою."
        error: найкраща роботою
        correction: "Я задоволений найкращою роботою."
        explanation: Роботою - орудний жіночого роду.
      - sentence: "Це що-найкращий подарунок."
        error: що-найкращий
        correction: "Це щонайкращий подарунок."
        explanation: Щонай- пишеться разом.
workbook:
  - id: wb-1
    type: quiz
    title: Контроль моделей
    instruction: "Оберіть правильний варіант."
    items:
      - question: "Правильна форма від добрий:"
        options:
          - "найкращий"
          - "найдобрішийший"
          - "самий добрий"
        correct: 0
        explanation: Добрий у значенні якості часто має суплетивний ланцюжок кращий - найкращий.
      - question: "Правильна форма від поганий:"
        options:
          - "найгірший"
          - "найпоганішийший"
          - "найбільш найгірший"
        correct: 0
        explanation: Поганий - гірший - найгірший.
      - question: "Правильний варіант:"
        options:
          - "найменш офіційна заява"
          - "найменш офіційніша заява"
          - "найбільш найофіційніша заява"
        correct: 0
        explanation: Після найменш прикметник лишається у початковому ступені.
      - question: "У реченні Це найкорисніші поради форма узгоджується з:"
        options:
          - "поради"
          - "це"
          - "прихованим прислівником"
        correct: 0
        explanation: Прикметник узгоджується з іменником поради.
      - question: "Правильне речення:"
        options:
          - "Немає найточнішого пояснення."
          - "Немає найточніше пояснення."
          - "Немає найбільш найточного пояснення."
        correct: 0
        explanation: Немає потребує родового, а подвійне най- не потрібне.
      - question: "Що означає якнайкоротший?"
        options:
          - "настільки короткий, наскільки можливо"
          - "трохи коротший"
          - "не короткий"
        correct: 0
        explanation: Якнай- часто виражає прагнення до максимальної міри.
      - question: "Що краще для нейтрального B1 письма?"
        options:
          - "найкращий варіант"
          - "самий кращий варіант"
          - "найбільш найкращий варіант"
        correct: 0
        explanation: Найкращий - нормативна проста форма.
      - question: "Правильна форма від близький:"
        options:
          - "найближчий"
          - "найблизькіший"
          - "найбільш найближчий"
        correct: 0
        explanation: Близький - ближчий - найближчий.
      - question: "Що природніше в офіційному звіті?"
        options:
          - "найбільш поширена помилка"
          - "самая поширена помилка"
          - "поширеніша найпомилка"
        correct: 0
        explanation: Складена форма підходить для аналітичного стилю.
      - question: "Правильне написання:"
        options:
          - "щонайменший"
          - "що найменший"
          - "що-найменший"
        correct: 0
        explanation: Щонай- пишеться разом.
      - question: "Яке слово не змінюється у складеній формі?"
        options:
          - "найбільш"
          - "прикметник після нього"
          - "іменник"
        correct: 0
        explanation: Найбільш/найменш незмінні; відмінюється прикметник.
      - question: "Яка форма є синонімічним підсиленням, а не формальним найвищим ступенем?"
        options:
          - "надзвичайно корисний"
          - "найкорисніший"
          - "найменш корисний"
        correct: 0
        explanation: Надзвичайно підсилює ознаку без формального найвищого ступеня.
  - id: wb-2
    type: fill-in
    title: Відмінювання найвищого ступеня
    instruction: "Вставте форму найвищого ступеня в потрібному відмінку."
    items:
      - sentence: "Я бачу ____ кімнату. (тихий)"
        answer: найтихішу
        options:
          - найтихішу
          - найтихіша
          - найтихіший
        explanation: Кімнату - знахідний жіночого роду.
      - sentence: "Немає ____ квитка. (дорогий)"
        answer: найдорожчого
        options:
          - найдорожчого
          - найдорожчий
          - найдорожчим
        explanation: Немає потребує родового відмінка.
      - sentence: "Ми задоволені ____ відповіддю. (найбільш точний)"
        answer: найбільш точною
        options:
          - найбільш точною
          - найбільш точна
          - найбільш точніша
        explanation: Відповіддю - орудний жіночого роду; найбільш не змінюється.
      - sentence: "Він пише про ____ маршрут. (швидкий)"
        answer: найшвидший
        options:
          - найшвидший
          - найшвидшим
          - найшвидша
        explanation: Про маршрут - знахідний чоловічого роду для неістоти.
      - sentence: "У ____ заяві немає емоцій. (найменш офіційний)"
        answer: найменш офіційній
        options:
          - найменш офіційній
          - найменш офіційна
          - найменш офіційним
        explanation: У заяві - місцевий жіночого роду.
      - sentence: "Ми обрали ____ спосіб. (простий)"
        answer: найпростіший
        options:
          - найпростіший
          - найпростіша
          - найбільш найпростий
        explanation: Спосіб - чоловічий рід; проста форма без подвійного маркування.
      - sentence: "Для ____ групи потрібна окрема вправа. (слабкий)"
        answer: найслабшої
        options:
          - найслабшої
          - найслабша
          - найслабшим
        explanation: Для групи потребує родового жіночого роду.
      - sentence: "Після ____ спроби команда змінила план. (гірший)"
        answer: найгіршої
        options:
          - найгіршої
          - найгірша
          - найгірший
        explanation: Після спроби - родовий жіночого роду.
      - sentence: "Я довіряю ____ джерелу. (надійний)"
        answer: найнадійнішому
        options:
          - найнадійнішому
          - найнадійніше
          - найнадійніший
        explanation: Джерелу - давальний середнього роду.
      - sentence: "Вони пишуть про ____ умови. (найменш ризикований)"
        answer: найменш ризиковані
        options:
          - найменш ризиковані
          - найменш ризикованими
          - найменш ризикована
        explanation: Про умови - знахідний множини для неістот.
      - sentence: "З ____ аргументами важко сперечатися. (переконливий)"
        answer: найпереконливішими
        options:
          - найпереконливішими
          - найпереконливіші
          - найбільш найпереконливішими
        explanation: З аргументами - орудний множини.
      - sentence: "У ____ тексті немає зайвих слів. (короткий)"
        answer: найкоротшому
        options:
          - найкоротшому
          - найкоротший
          - найкоротшим
