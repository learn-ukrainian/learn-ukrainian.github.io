version: '1.0'
module: motion-prefixes-arrival
level: b1
inline:
  - id: act-1
    type: quiz
    title: Прибуття чи досягнення?
    instruction: Оберіть префіксоване дієслово, яке найкраще відповідає фокусу речення.
    items:
      - question: "Гості ____ до садиби о сьомій вечора."
        options:
          - прийшли
          - дійшли
          - ходили
        correct: 0
        explanation: Тут головний факт - поява гостей на місці.
      - question: "Після довгого підйому ми нарешті ____ до вершини."
        options:
          - дійшли
          - прийшли
          - ходили
        correct: 0
        explanation: Нарешті й вершина підкреслюють досягнення межі.
      - question: "Поїзд ____ до Львова за розкладом."
        options:
          - приїхав
          - дійшов
          - прийшов
        correct: 0
        explanation: Поїзд прибув транспортом, тому приїхав.
      - question: "Автобус ледве ____ до села через сніг."
        options:
          - доїхав
          - приїхав
          - ходив
        correct: 0
        explanation: Ледве й складна дорога висувають досягнення на перший план.
      - question: "Пес ____ до воріт, коли почув машину."
        options:
          - прибіг
          - добігав
          - приїхав
        correct: 0
        explanation: Пес швидко з'явився бігом біля воріт.
      - question: "Бігун ____ до фінішу попри втому."
        options:
          - добіг
          - прибігав
          - прийшов
        correct: 0
        explanation: Фініш - кінцева межа дистанції, тому добіг.
      - question: "Літак ____ із Варшави вчасно."
        options:
          - прилетів
          - долетів
          - приїхав
        correct: 0
        explanation: Йдеться про прибуття повітрям.
      - question: "Ми ____ до берега, хоча хвилі були сильні."
        options:
          - допливли
          - припливли
          - приїхали
        correct: 0
        explanation: Сильні хвилі й берег як межа підказують досягнення.
      - question: "Кур'єр ____ посилку до офісу."
        options:
          - привіз
          - довів
          - дійшов
        correct: 0
        explanation: Кур'єр доставив посилку транспортом.
      - question: "Я ____ валізу до кімнати, хоча вона була важка."
        options:
          - доніс
          - привіз
          - прийшов
        correct: 0
        explanation: Важка валіза й кімната як точка завершення дають доніс.
      - question: "Мати ____ дитину до лікаря."
        options:
          - привела
          - привезла
          - донесла
        correct: 0
        explanation: Дитину супроводжують пішки або ведуть, тому привела.
      - question: "Провідник ____ групу до табору."
        options:
          - довів
          - привіз
          - приніс
        correct: 0
        explanation: Провідник супроводив групу аж до табору.
  - id: act-2
    type: fill-in
    title: Форми при- і до-
    instruction: Заповніть пропуск правильною формою дієслова.
    items:
      - sentence: "Завтра я ____ до тебе після роботи. (прийти)"
        answer: прийду
        options:
          - прийду
          - прийдеш
          - прийшов
        explanation: Я і завтра потребують форми майбутнього часу прийду.
      - sentence: "Вона вже ____ до школи. (прийти)"
        answer: прийшла
        options:
          - прийшла
          - прийде
          - приходить
        explanation: Вона й уже дають минулий результат.
      - sentence: "Ми ____ до Одеси потягом уночі. (приїхати)"
        answer: приїхали
        options:
          - приїхали
          - прийшли
          - приїдемо
        explanation: Потягом означає транспорт, а уночі - минулу подію.
      - sentence: "Ти ____ до вокзалу вчасно? (доїхати)"
        answer: доїхав
        options:
          - доїхав
          - дійшов
          - приїде
        explanation: Ти в чоловічому роді минулого часу - доїхав.
      - sentence: "Вони ____ до вершини перед дощем. (дійти)"
        answer: дійшли
        options:
          - дійшли
          - прийдуть
          - доходять
        explanation: Вони й минула завершена подія дають дійшли.
      - sentence: "Пес ____ до хвіртки за кілька секунд. (добігти)"
        answer: добіг
        options:
          - добіг
          - прибігла
          - добіжать
        explanation: Пес чоловічого роду в минулому часі - добіг.
      - sentence: "Літак ____ із Кишинева о дев'ятій. (прилетіти)"
        answer: прилетів
        options:
          - прилетів
          - приплив
          - приїхав
        explanation: Літак рухається повітрям, тому прилетів.
      - sentence: "Човен ____ до пристані після обіду. (припливти)"
        answer: приплив
        options:
          - приплив
          - прилетів
          - приїхав
        explanation: Човен рухається водою, тому приплив.
      - sentence: "Я ____ документи до кабінету. (принести)"
        answer: принесу
        options:
          - принесу
          - привезу
          - прийду
        explanation: Я перенесу документи руками, тому принесу.
      - sentence: "Кур'єр ____ ліки до аптеки. (привезти)"
        answer: привіз
        options:
          - привіз
          - приніс
          - довів
        explanation: Кур'єр доставив транспортом, тому привіз.
      - sentence: "Водій ____ нас до готелю. (довезти)"
        answer: довіз
        options:
          - довіз
          - доніс
          - дійшов
        explanation: Водій транспортом доставив аж до готелю.
      - sentence: "Провідниця ____ туристів до водоспаду. (довести)"
        answer: довела
        options:
          - довела
          - довезла
          - донесла
        explanation: Провідниця супроводила людей пішки до точки маршруту.
  - id: act-3
    type: match-up
    title: База і префіксована форма
    instruction: Поєднайте базове дієслово з природною формою прибуття або досягнення.
    pairs:
      - left: іти
        right: прийти
      - left: їхати
        right: приїхати
      - left: бігти
        right: прибігти
      - left: летіти
        right: прилетіти
      - left: пливти
        right: припливти
      - left: нести
        right: принести
      - left: вести
        right: привести
      - left: везти
        right: привезти
      - left: іти до межі
        right: дійти
      - left: їхати до межі
        right: доїхати
      - left: бігти до межі
        right: добігти
      - left: везти до кінця
        right: довезти
  - id: act-4
    type: group-sort
    title: При- чи до-
    instruction: Розподіліть фрази за головним фокусом.
    groups:
      - label: Прибуття, поява
        items:
          - гості прийшли
          - поїзд приїхав
          - діти прибігли
          - літак прилетів
          - кур'єр привіз
          - листоноша приніс
      - label: Досягнення межі
        items:
          - туристи дійшли до вершини
          - автобус доїхав до кордону
          - бігун добіг до фінішу
          - човен доплив до берега
          - водій довіз до вокзалу
          - я доніс валізу до кімнати
  - id: act-5
    type: error-correction
    title: Типові помилки
    instruction: Виправте речення так, щоб дієслово руху, прийменник і відмінок збігалися.
    items:
      - sentence: "Я прийшов до Львова потягом."
        error: прийшов
        correction: "Я приїхав до Львова потягом."
        explanation: Потягом означає транспорт, тому треба приїхав.
      - sentence: "Вона приїхала Київ учора."
        error: Київ
        correction: "Вона приїхала до Києва учора."
        explanation: Пункт призначення потребує прийменника й родового відмінка.
      - sentence: "Ми дійшли в вершину."
        error: "в вершину"
        correction: "Ми дійшли до вершини."
        explanation: Досягнення межі вимагає до + родовий.
      - sentence: "Кур'єр довів посилку до офісу."
        error: довів
        correction: "Кур'єр довіз посилку до офісу."
        explanation: Посилку доставляють транспортом, тому довіз.
      - sentence: "Мати привезла дитину до лікаря пішки."
        error: привезла
        correction: "Мати привела дитину до лікаря пішки."
        explanation: Пішки з людиною - привести, не привезти.
      - sentence: "Літак приїхав із Варшави."
        error: приїхав
        correction: "Літак прилетів із Варшави."
        explanation: Літак рухається повітрям, тому прилетів.
      - sentence: "Човен прилетів до берега."
        error: прилетів
        correction: "Човен приплив до берега."
        explanation: Човен рухається водою.
      - sentence: "Ми приїхали до кордону після важкої дороги і ледве не встигли."
        error: приїхали
        correction: "Ми доїхали до кордону після важкої дороги і ледве не встигли."
        explanation: Важка дорога й межа роблять доїхали точнішим.
      - sentence: "Пес доїхав до воріт."
        error: доїхав
        correction: "Пес добіг до воріт."
        explanation: Пес рухається бігом, не транспортом.
      - sentence: "Я доніс гостей до готелю машиною."
        error: доніс
        correction: "Я довіз гостей до готелю машиною."
        explanation: Машиною й гостей транспортують, тому довіз.
      - sentence: "Вона прийде до садибі."
        error: садибі
        correction: "Вона прийде до садиби."
        explanation: Після до потрібен родовий відмінок.
      - sentence: "Ми приїхали на вокзалі."
        error: вокзалі
        correction: "Ми приїхали на вокзал."
        explanation: Куди? потребує знахідного відмінка.
workbook:
  - id: wb-1
    type: quiz
    title: Оберіть точний фокус
    instruction: Виберіть найприродніший варіант для речення.
    items:
      - question: "Нарешті ми ____ до табору перед темрявою."
        options:
          - дійшли
          - прийшли
          - ходили
        correct: 0
        explanation: Нарешті й табір як кінцева точка підказують дійшли.
      - question: "Батьки ____ до нас на вихідні."
        options:
          - приїхали
          - доїхали
          - їхали
        correct: 0
        explanation: Нейтральне повідомлення про прибуття гостей - приїхали.
      - question: "Маршрутка ____ до кінцевої зупинки."
        options:
          - доїхала
          - прийшла
          - прибігла
        correct: 0
        explanation: Транспорт досяг кінцевої точки.
      - question: "Сестра ____ до мене пішки."
        options:
          - прийшла
          - приїхала
          - долетіла
        correct: 0
        explanation: Пішки означає прийшла.
      - question: "Сестра ____ до мене автобусом."
        options:
          - приїхала
          - прийшла
          - донесла
        correct: 0
        explanation: Автобусом означає приїхала.
      - question: "Ми ____ до берега після години плавання."
        options:
          - допливли
          - приїхали
          - прийшли
        correct: 0
        explanation: Година плавання й берег як межа дають допливли.
      - question: "Листоноша ____ газети о восьмій."
        options:
          - приніс
          - привів
          - доїхав
        correct: 0
        explanation: Газети несуть або приносять.
      - question: "Таксі ____ нас просто до дверей."
        options:
          - довезло
          - донесло
          - дійшло
        correct: 0
        explanation: Таксі транспортом довозить до точки.
      - question: "Діти ____ з подвір'я, коли почули дзвоник."
        options:
          - прибігли
          - доїхали
          - прийшли
        correct: 0
        explanation: Діти з'явилися бігом.
      - question: "Стежка ____ до річки."
        options:
          - доходить
          - приходить
          - приїздить
        correct: 0
        explanation: Стежка простягається до межі.
      - question: "Подруга часто ____ до нас улітку."
        options:
          - приїжджає
          - доїхала
          - прийшла
        correct: 0
        explanation: Часто потребує недоконаної повторюваної форми.
      - question: "Я скоро ____ документи в кабінет."
        options:
          - принесу
          - приходжу
          - довезу
        correct: 0
        explanation: Документи переносять руками, тому принесу.
  - id: wb-2
    type: match-up
    title: Дієслово і керування
    instruction: Поєднайте початок речення з правильною конструкцією.
    pairs:
      - left: прийти
        right: до лікаря
      - left: приїхати
        right: до Києва
      - left: дійти
        right: до вершини
      - left: доїхати
        right: до кінцевої зупинки
      - left: прибігти
        right: до воріт
      - left: добігти
        right: до фінішу
      - left: принести
        right: валізу в кімнату
      - left: донести
        right: коробку до складу
      - left: привести
        right: дитину до лікаря
      - left: довести
        right: групу до табору
      - left: привезти
        right: посилку до офісу
      - left: довезти
        right: пасажирів до готелю
  - id: wb-3
    type: group-sort
    title: Спосіб руху
    instruction: Розподіліть дієслова за способом руху.
    groups:
      - label: Пішки або бігом
        items:
          - прийти
          - дійти
          - прибігти
          - добігти
      - label: Транспортом
        items:
          - приїхати
          - доїхати
          - привезти
          - довезти
      - label: Предмет або людина
        items:
          - принести
          - донести
          - привести
          - довести
  - id: wb-4
    type: fill-in
    title: Відмінки після до, в, на
    instruction: Заповніть пропуск потрібною формою іменника.
    items:
      - sentence: "Ми приїхали до _____. (Львів)"
        answer: Львова
        options:
          - Львова
          - Львів
          - Львові
        explanation: До потребує родового відмінка.
      - sentence: "Вона прийшла до _____. (школа)"
        answer: школи
        options:
          - школи
          - школу
          - школі
        explanation: До школи - родовий відмінок.
      - sentence: "Туристи дійшли до _____. (вершина)"
        answer: вершини
        options:
          - вершини
          - вершину
          - вершині
        explanation: До вершини - родовий відмінок.
      - sentence: "Автобус доїхав до _____. (кордон)"
        answer: кордону
        options:
          - кордону
          - кордон
          - кордоні
        explanation: До кордону - родовий відмінок.
      - sentence: "Я приніс валізу в _____. (кімната)"
        answer: кімнату
        options:
          - кімнату
          - кімнаті
          - кімнати
        explanation: Куди? в кімнату - знахідний відмінок.
      - sentence: "Ми приїхали на _____. (вокзал)"
        answer: вокзал
        options:
          - вокзал
          - вокзалі
          - вокзалу
        explanation: Куди? на вокзал - знахідний відмінок.
      - sentence: "Діти прибігли на _____. (стадіон)"
        answer: стадіон
        options:
          - стадіон
          - стадіоні
          - стадіону
        explanation: Куди? на стадіон.
      - sentence: "Кур'єр привіз посилку до _____. (офіс)"
        answer: офісу
        options:
          - офісу
          - офіс
          - офісі
        explanation: До офісу - родовий відмінок.
      - sentence: "Човен приплив до _____. (берег)"
        answer: берега
        options:
          - берега
          - берег
          - березі
        explanation: До берега - родовий відмінок.
      - sentence: "Провідник довів нас до _____. (табір)"
        answer: табору
        options:
          - табору
          - табір
          - таборі
        explanation: До табору - родовий відмінок.
      - sentence: "Таксі довезло гостей до _____. (готель)"
        answer: готелю
        options:
          - готелю
          - готель
          - готелі
        explanation: До готелю - родовий відмінок.
      - sentence: "Мати привела дитину до _____. (лікар)"
        answer: лікаря
        options:
          - лікаря
          - лікар
          - лікарю
        explanation: До лікаря - родовий відмінок.
  - id: wb-5
    type: cloze
    title: Подорож до Карпат
    instruction: Заповніть пропуски формами з при- або до-.
    text: "У п'ятницю ми {1} до Яремча потягом. На вокзал {2} таксі, бо ми мали важкі рюкзаки. Сестра {3} до міста автобусом пізніше. До садиби ми {4} пішки від зупинки. Кур'єр уже {5} продукти до садиби, але я ще {6} валізу до кімнати. У суботу група {7} до стежки біля лісу, а потім повільно {8} до водоспаду. Пес господарів {9} до нас, коли почув голоси. Після обіду човен {10} до берега, і діти нарешті {11} до альтанки. Увечері всі {12} до садиби втомлені, але задоволені."
    blanks:
      - id: 1
        answer: приїхали
        options:
          - приїхали
          - прийшли
          - доїхали
      - id: 2
        answer: приїхало
        options:
          - приїхало
          - прийшло
          - доїхало
      - id: 3
        answer: приїхала
        options:
          - приїхала
          - прийшла
          - дійшла
      - id: 4
        answer: дійшли
        options:
          - дійшли
          - прийшли
          - приїхали
      - id: 5
        answer: привіз
        options:
          - привіз
          - приніс
          - довів
      - id: 6
        answer: доніс
        options:
          - доніс
          - довіз
          - привів
      - id: 7
        answer: прийшла
        options:
          - прийшла
          - приїхала
          - донесла
      - id: 8
        answer: дійшла
        options:
          - дійшла
          - прийшла
          - доїхала
      - id: 9
        answer: прибіг
        options:
          - прибіг
          - приїхав
          - доплив
      - id: 10
        answer: приплив
        options:
          - приплив
          - прилетів
          - доїхав
      - id: 11
        answer: добігли
        options:
          - добігли
          - доїхали
          - прийшли
      - id: 12
        answer: прийшли
        options:
          - прийшли
          - доїхали
          - прилетіли
  - id: wb-6
    type: translate
    title: "Переклад: при- чи до-"
    instruction: Оберіть природний український переклад із дієсловом руху на при- або до-.
    items:
      - source: We arrived in Lviv by train.
        options:
          - text: Ми приїхали до Львова потягом.
            correct: true
          - text: Ми прийшли до Львова потягом.
            correct: false
        explanation: Потягом потребує транспортного дієслова приїхати.
      - source: They finally reached the summit.
        options:
          - text: Вони нарешті дійшли до вершини.
            correct: true
          - text: Вони нарешті прийшли на вершину.
            correct: false
        explanation: Нарешті й вершина підкреслюють досягнення межі.
      - source: The courier brought the package to the office.
        options:
          - text: Кур'єр привіз посилку до офісу.
            correct: true
          - text: Кур'єр довів посилку до офісу.
            correct: false
        explanation: Посилку доставляють транспортом, тому привіз.
      - source: The child ran up to the gate.
        options:
          - text: Дитина прибігла до воріт.
            correct: true
          - text: Дитина приїхала до воріт.
            correct: false
        explanation: Бігом до місця - прибігла.
      - source: The bus reached the final stop.
        options:
          - text: Автобус доїхав до кінцевої зупинки.
            correct: true
          - text: Автобус прийшов до кінцевої зупинки.
            correct: false
        explanation: "Транспорт досягає кінцевої точки: доїхав."
      - source: The plane arrived from Warsaw.
        options:
          - text: Літак прилетів із Варшави.
            correct: true
          - text: Літак приїхав із Варшави.
            correct: false
        explanation: Літак рухається повітрям, тому прилетів.
      - source: Please bring the key to the room.
        options:
          - text: Принесіть, будь ласка, ключ від кімнати.
            correct: true
          - text: Привезіть, будь ласка, ключ від кімнати.
            correct: false
        explanation: Ключ від кімнати переносять руками, тому принесіть.
      - source: The guide led the group to the camp.
        options:
          - text: Провідник довів групу до табору.
            correct: true
          - text: Провідник доніс групу до табору.
            correct: false
        explanation: Людей ведуть або доводять до точки, їх не несуть.
      - source: The taxi brought us all the way to the hotel.
        options:
          - text: Таксі довезло нас до готелю.
            correct: true
          - text: Таксі донесло нас до готелю.
            correct: false
        explanation: Таксі транспортом довозить пасажирів до місця.
      - source: My sister came to me on foot.
        options:
          - text: Сестра прийшла до мене пішки.
            correct: true
          - text: Сестра приїхала до мене пішки.
            correct: false
        explanation: Пішки потребує прийшла, не приїхала.
      - source: We barely got to the village.
        options:
          - text: Ми ледве доїхали до села.
            correct: true
          - text: Ми ледве прийшли до села автобусом.
            correct: false
        explanation: Ледве й транспортний маршрут підказують доїхали.
      - source: The boat sailed up to the shore.
        options:
          - text: Човен приплив до берега.
            correct: true
          - text: Човен прилетів до берега.
            correct: false
        explanation: Човен рухається водою, тому приплив.
  - id: wb-7
    type: error-correction
    title: Редагування маршруту
    instruction: Виправте помилку в кожному реченні.
    items:
      - sentence: "Вона прийшла автобусом."
        error: прийшла
        correction: "Вона приїхала автобусом."
        explanation: Автобусом означає транспорт, тому приїхала.
      - sentence: "Ми приїхали Київ."
        error: Київ
        correction: "Ми приїхали до Києва."
        explanation: Пункт призначення потребує до + родовий.
      - sentence: "Я доїду до тебе пішки."
        error: доїду
        correction: "Я дійду до тебе пішки."
        explanation: Пішки до межі - дійду.
      - sentence: "Пес приїхав до хвіртки."
        error: приїхав
        correction: "Пес прибіг до хвіртки."
        explanation: Пес рухається бігом або пішки, не транспортом.
      - sentence: "Літак приплив до аеропорту."
        error: приплив
        correction: "Літак прилетів до аеропорту."
        explanation: Літак рухається повітрям.
      - sentence: "Човен прилетів до пристані."
        error: прилетів
        correction: "Човен приплив до пристані."
        explanation: Човен рухається водою.
      - sentence: "Я привів валізу до кімнати."
        error: привів
        correction: "Я доніс валізу до кімнати."
        explanation: Валізу несуть, а не ведуть.
      - sentence: "Водій доніс нас до готелю."
        error: доніс
        correction: "Водій довіз нас до готелю."
        explanation: Водій перевозить пасажирів транспортом.
      - sentence: "Вони дійшли на вершину."
        error: "на вершину"
        correction: "Вони дійшли до вершини."
        explanation: Досягнення межі вимагає до + родовий.
      - sentence: "Кур'єр приніс посилку машиною."
        error: приніс
        correction: "Кур'єр привіз посилку машиною."
        explanation: Машиною означає транспортування.
      - sentence: "Ми прийшли до Одеси потягом."
        error: прийшли
        correction: "Ми приїхали до Одеси потягом."
        explanation: Потягом означає транспорт.
      - sentence: "Вона прийде до школа завтра."
        error: школа
        correction: "Вона прийде до школи завтра."
        explanation: Після до потрібен родовий відмінок.
  - id: wb-8
    type: essay-response
    title: Туристична розповідь
    instruction: Опишіть коротку подорож або приїзд гостей, використавши щонайменше чотири дієслова з при- і три дієслова з до-.
    min_words: 120
    prompt: "Напишіть розповідь про те, як люди добиралися до місця зустрічі. Згадайте спосіб руху, пункт призначення і принаймні одну складну частину маршруту."
    model_answer: "У суботу ми чекали друзів у садибі біля Яремча. Марко приїхав потягом до вокзалу, а потім дійшов до центру пішки, бо хотів подивитися на річку. Олена прилетіла до Івано-Франківська і доїхала до нас автобусом. Мій брат прийшов із сусіднього села через ліс. Бабуся приїхала маршруткою до Яремча, але не доїхала до нашої вулиці, тому ми зустріли її біля зупинки. Кур'єр привіз продукти, але залишив коробку біля воріт, тому я доніс її до кухні. Листоноша приніс листівку від родичів, а сусід привіз додаткові ковдри. Пізніше провідниця привела гостей до стежки, і вся група дійшла до водоспаду. Дорога була мокра, проте діти добігли до альтанки першими. Біля садиби пес прибіг до воріт, а таксі довезло маму з валізою просто до входу. Увечері всі прийшли до садиби втомлені, але задоволені."
    rubric:
      - criteria: дієслова з при-
        description: Є щонайменше чотири природні форми прибуття або появи.
      - criteria: дієслова з до-
        description: Є щонайменше три форми досягнення межі або кінцевої точки.
      - criteria: спосіб руху точний
        description: Пішки, транспортом, бігом, водою і перенесення предметів не змішані.
      - criteria: прийменники й відмінки
        description: Конструкції до + родовий та в/на + знахідний ужиті правильно.
      - criteria: зв'язність
        description: Текст читається як один зрозумілий маршрут або історія прибуття.
