version: '1.0'
module: vocative-formal
level: b1
inline:
  - id: act-1
    type: quiz
    title: Яка модель звертання?
    instruction: "Оберіть правило, яке пояснює форму звертання."
    items:
      - question: "У звертанні Шановний Іване Петровичу обидва іменники стоять у кличному, бо це:"
        options:
          - "ім'я + по батькові"
          - "посада + прізвище"
          - "прикметник + давальний"
        correct: 0
        explanation: "Ім'я + по батькові: обидва слова мають кличну форму."
      - question: "У формулі пані Олено слово Олено є:"
        options:
          - "кличним відмінком імені"
          - "називним відмінком"
          - "орудним відмінком"
        correct: 0
        explanation: "Пані не змінюється, а ім'я переходить у кличний."
      - question: "У звертанні шановний пане директоре слово шановний:"
        options:
          - "залишається в називному"
          - "має бути шановному"
          - "має бути шановним"
        correct: 0
        explanation: "Прикметники в складі звертання мають називну форму."
      - question: "Найбезпечніша навчальна модель для посада + прізвище:"
        options:
          - "пане Ковальчук"
          - "пан Ковальчук"
          - "панові Ковальчуку"
        correct: 0
        explanation: "Рольове слово в кличному, прізвище часто залишається в називному."
      - question: "У реченні Дякую Вам, пані Олено, за відповідь звертання потрібно:"
        options:
          - "виділити комами"
          - "писати без ком"
          - "замінити на родовий"
        correct: 0
        explanation: "Звертання всередині речення виділяється комами."
      - question: "Форма добродію походить від:"
        options:
          - "добродій"
          - "добродійка"
          - "добродії"
        correct: 0
        explanation: "Добродій у кличному має форму добродію."
      - question: "Форма Маріє Степанівно правильна, бо:"
        options:
          - "ім'я і по батькові стоять у кличному"
          - "прізвище стоїть у знахідному"
          - "прикметник стоїть у давальному"
        correct: 0
        explanation: "Маріє + Степанівно - обидві частини звертання."
      - question: "У звертанні Шановні колеги форма множини:"
        options:
          - "збігається із називним для більшості іменників"
          - "завжди має закінчення -ове"
          - "має форму родового"
        correct: 0
        explanation: "У множині кличний часто збігається з називним."
      - question: "Що краще для нейтрального листа до відомої адресатки на ім'я Наталка?"
        options:
          - "Добрий день, пані Наталко!"
          - "Добрий день, пані Наталка!"
          - "Добрий день, пані Наталкою!"
        correct: 0
        explanation: "Навчальна норма тренує кличний після пані."
      - question: "У звертанні колего Ірино обидва слова кличні, бо це:"
        options:
          - "загальна назва + ім'я"
          - "посада + прізвище"
          - "прикметник + іменник"
        correct: 0
        explanation: "Загальна назва + ім'я: обидві частини є звертанням."
      - question: "Помилка в Шановному пане директоре полягає в тому, що:"
        options:
          - "прикметник помилково поставлено в давальний"
          - "слово директоре має бути в називному"
          - "слово пане не є українським"
        correct: 0
        explanation: "Правильно: Шановний пане директоре."
      - question: "Звертання Вельмишановні пані та панове доречне насамперед у:"
        options:
          - "урочистому або дуже формальному контексті"
          - "SMS до близького друга"
          - "неформальному чаті"
        correct: 0
        explanation: "Вельмишановні підсилює офіційність."
  - id: act-2
    type: fill-in
    title: Ім'я та по батькові
    instruction: "Вставте правильну кличну форму."
    items:
      - sentence: "Шановний ____ Петровичу, дякую за консультацію."
        answer: "Іване"
        options:
          - "Іване"
          - "Іван"
          - "Іваном"
        explanation: "Іван у кличному: Іване."
      - sentence: "Добрий день, Олено ____!"
        answer: "Вікторівно"
        options:
          - "Вікторівно"
          - "Вікторівна"
          - "Вікторівні"
        explanation: "По батькові у звертанні має кличну форму."
      - sentence: "Шановна ____ Степанівно, надсилаю документи."
        answer: "Маріє"
        options:
          - "Маріє"
          - "Марія"
          - "Марію"
        explanation: "Марія -> Маріє."
      - sentence: "Дякую Вам, Андрію ____, за швидку відповідь."
        answer: "Олексійовичу"
        options:
          - "Олексійовичу"
          - "Олексійович"
          - "Олексійовича"
        explanation: "Чоловіче по батькові в кличному: -овичу."
      - sentence: "Пані ____, чи можете уточнити час зустрічі?"
        answer: "Наталко"
        options:
          - "Наталко"
          - "Наталка"
          - "Наталці"
        explanation: "Наталка -> Наталко."
      - sentence: "Шановний ____ Миколайовичу, прошу переглянути звіт."
        answer: "Юрію"
        options:
          - "Юрію"
          - "Юрій"
          - "Юрія"
        explanation: "Юрій -> Юрію."
      - sentence: "Добрий день, Тамаро ____!"
        answer: "Іванівно"
        options:
          - "Іванівно"
          - "Іванівна"
          - "Іванівною"
        explanation: "Ім'я і по батькові в звертанні мають кличну форму."
      - sentence: "Пане ____, запрошую Вас до слова."
        answer: "Андрію"
        options:
          - "Андрію"
          - "Андрій"
          - "Андрієм"
        explanation: "Андрій -> Андрію."
      - sentence: "Шановна ____ Сергіївно, вітаємо Вас із призначенням."
        answer: "Надіє"
        options:
          - "Надіє"
          - "Надія"
          - "Надію"
        explanation: "Надія -> Надіє."
      - sentence: "Добрий день, ____ Валерійовичу!"
        answer: "Ігорю"
        options:
          - "Ігорю"
          - "Ігор"
          - "Ігорем"
        explanation: "Ігор -> Ігорю."
      - sentence: "Шановна пані ____, пишу щодо зустрічі."
        answer: "Галино"
        options:
          - "Галино"
          - "Галина"
          - "Галині"
        explanation: "Галина -> Галино."
      - sentence: "Дякую, Олександре ____, за допомогу."
        answer: "Петровичу"
        options:
          - "Петровичу"
          - "Петрович"
          - "Петровича"
        explanation: "Олександре Петровичу - обидва слова в кличному."
  - id: act-3
    type: match-up
    title: Початкова форма і звертання
    instruction: "З'єднайте початкову форму з правильною формою звертання."
    pairs:
      - left: "Іван Петрович"
        right: "Іване Петровичу"
      - left: "Олена Вікторівна"
        right: "Олено Вікторівно"
      - left: "Марія Степанівна"
        right: "Маріє Степанівно"
      - left: "Андрій Олексійович"
        right: "Андрію Олексійовичу"
      - left: "пан Євген"
        right: "пане Євгене"
      - left: "пані Оксана"
        right: "пані Оксано"
      - left: "добродій"
        right: "добродію"
      - left: "добродійка"
        right: "добродійко"
      - left: "директор"
        right: "директоре"
      - left: "лікар"
        right: "лікарю"
      - left: "голова"
        right: "голово"
      - left: "колега Ірина"
        right: "колего Ірино"
  - id: act-4
    type: group-sort
    title: Тип звертання
    instruction: "Розподіліть звертання за моделями."
    groups:
      - label: "Ім'я + по батькові"
        items:
          - "Іване Петровичу"
          - "Олено Вікторівно"
          - "Маріє Степанівно"
      - label: "Пане/пані + ім'я"
        items:
          - "пане Андрію"
          - "пані Наталко"
          - "пані Маріє"
      - label: "Посада / роль + прізвище"
        items:
          - "пане Ковальчук"
          - "лікарю Онищук"
          - "кореспонденте Левчук"
      - label: "Групове звертання"
        items:
          - "шановні колеги"
          - "пані та панове"
          - "шановні учасники"
  - id: act-5
    type: error-correction
    title: Виправляємо формальні звертання
    instruction: "Знайдіть і виправте помилку в кожному звертанні."
    items:
      - sentence: "Шановний Іван Петрович, надсилаю Вам матеріали."
        error: "Іван Петрович"
        correction: "Іване Петровичу"
        error_type: phrase
        explanation: "Ім'я + по батькові: обидва слова в кличному."
      - sentence: "Добрий день, Олена Вікторівна!"
        error: "Олена Вікторівна"
        correction: "Олено Вікторівно"
        error_type: phrase
        explanation: "У прямому звертанні потрібен кличний."
      - sentence: "Пані Оксана, чи можете відповісти?"
        error: "Пані Оксана"
        correction: "Пані Оксано"
        error_type: phrase
        explanation: "Після пані тренуємо кличний імені."
      - sentence: "Шановному пане директоре, прошу розглянути заяву."
        error: "Шановному"
        correction: "Шановний"
        error_type: word
        explanation: "Прикметник у звертанні має форму називного."
      - sentence: "Маріє Степанівна, дякую за відповідь."
        error: "Степанівна"
        correction: "Степанівно"
        error_type: word
        explanation: "По батькові теж має кличну форму."
      - sentence: "Дякую пані Олено за пояснення."
        error: "Дякую пані Олено за пояснення"
        correction: "Дякую, пані Олено, за пояснення"
        error_type: phrase
        explanation: "Звертання всередині речення виділяється комами."
      - sentence: "Пан директор, дозвольте запитання."
        error: "Пан директор"
        correction: "Пане директоре"
        error_type: phrase
        explanation: "Дві загальні назви у звертанні отримують кличні форми."
      - sentence: "Колега Ірина, надішліть, будь ласка, звіт."
        error: "Колега Ірина"
        correction: "Колего Ірино"
        error_type: phrase
        explanation: "Загальна назва + ім'я: обидва слова в кличному."
      - sentence: "Шановна Марія Сергіївна, вітаю Вас."
        error: "Марія Сергіївна"
        correction: "Маріє Сергіївно"
        error_type: phrase
        explanation: "Ім'я та по батькові в кличному."
      - sentence: "Вельмишановний добродій, просимо Вас до слова."
        error: "добродій"
        correction: "добродію"
        error_type: word
        explanation: "Добродій у кличному: добродію."
      - sentence: "Пан Ковальчук, просимо підписати документ."
        error: "Пан"
        correction: "Пане"
        error_type: word
        explanation: "Слово пан у звертанні має форму кличного відмінка: пане."
      - sentence: "Шановні колегам, запрошуємо на зустріч."
        error: "колегам"
        correction: "колеги"
        error_type: word
        explanation: "У множині звертання часто збігається з називним: колеги."
workbook:
  - id: wb-1
    type: quiz
    title: Кличний чи не кличний?
    instruction: "Оберіть правильний варіант офіційного звертання."
    items:
      - question: "Як правильно почати лист до Івана Петровича?"
        options:
          - "Шановний Іване Петровичу!"
          - "Шановний Іван Петрович!"
          - "Шановному Івану Петровичу!"
        correct: 0
        explanation: "У звертанні ім'я і по батькові мають кличну форму."
      - question: "Як звернутися до Олени Вікторівни?"
        options:
          - "Олено Вікторівно"
          - "Олена Вікторівна"
          - "Олені Вікторівні"
        correct: 0
        explanation: "Це пряме звертання, тому кличний."
      - question: "Який варіант найкращий для пані Оксани?"
        options:
          - "пані Оксано"
          - "пане Оксано"
          - "пані Оксаною"
        correct: 0
        explanation: "Пані не змінюється, ім'я має кличну форму."
      - question: "Яка форма прикметника правильна у звертанні?"
        options:
          - "Шановний пане директоре"
          - "Шановному пане директоре"
          - "Шановним пане директоре"
        correct: 0
        explanation: "Прикметник залишається в називному."
      - question: "Як безпечно звернутися до лікаря Онищука у листі?"
        options:
          - "лікарю Онищук"
          - "лікар Онищук"
          - "лікареві Онищуку"
        correct: 0
        explanation: "Рольове слово в кличному, прізвище в називному."
      - question: "Який варіант має правильну пунктуацію?"
        options:
          - "Дякую, пані Олено, за відповідь."
          - "Дякую пані Олено, за відповідь."
          - "Дякую, пані Олено за відповідь."
        correct: 0
        explanation: "Звертання всередині речення відокремлюється з двох боків."
      - question: "Яке звертання до групи є природним?"
        options:
          - "Шановні колеги!"
          - "Шановним колегам!"
          - "Шановними колегами!"
        correct: 0
        explanation: "У множині форма звертання часто збігається з називним."
      - question: "Що правильно для Марії Степанівни?"
        options:
          - "Маріє Степанівно"
          - "Марія Степанівна"
          - "Марію Степанівну"
        correct: 0
        explanation: "Обидва слова в кличному."
      - question: "Яка форма доречна в урочистому звертанні?"
        options:
          - "Вельмишановні пані та панове!"
          - "Вельмишановним паням та панам!"
          - "Вельмишановними пані та панове!"
        correct: 0
        explanation: "Це готова формула звертання до групи."
      - question: "Як виправити Пан директор у звертанні?"
        options:
          - "Пане директоре"
          - "Панові директору"
          - "Паном директором"
        correct: 0
        explanation: "Обидва іменники мають кличні форми."
      - question: "Яке звертання має загальна назва + ім'я?"
        options:
          - "колего Ірино"
          - "колега Ірина"
          - "колезі Ірині"
        correct: 0
        explanation: "Обидва слова є частинами звертання."
      - question: "Який варіант краще уникати як кальку?"
        options:
          - "Шановний Іван Петрович!"
          - "Шановний Іване Петровичу!"
          - "Пане Іване!"
        correct: 0
        explanation: "У прямому звертанні називний звучить ненормативно."
  - id: wb-2
    type: fill-in
    title: Діловий лист
    instruction: "Вставте звертання в правильній формі."
    items:
      - sentence: "____ пане директоре, прошу розглянути заяву."
        answer: "Шановний"
        options:
          - "Шановний"
          - "Шановному"
          - "Шановним"
        explanation: "Прикметник у звертанні має називну форму."
      - sentence: "Добрий день, пані ____!"
        answer: "Олено"
        options:
          - "Олено"
          - "Олена"
          - "Олені"
        explanation: "Олена -> Олено."
      - sentence: "____ добродію, запрошуємо Вас до слова."
        answer: "Вельмишановний"
        options:
          - "Вельмишановний"
          - "Вельмишановному"
          - "Вельмишановним"
        explanation: "Прикметник залишається називним."
      - sentence: "Шановна ____ Сергіївно, дякую за лист."
        answer: "Надіє"
        options:
          - "Надіє"
          - "Надія"
          - "Надію"
        explanation: "Надія -> Надіє."
      - sentence: "Пане ____, чи можете уточнити адресу?"
        answer: "Євгене"
        options:
          - "Євгене"
          - "Євген"
          - "Євгену"
        explanation: "Євген -> Євгене."
      - sentence: "Шановні ____, зустріч почнеться о десятій."
        answer: "колеги"
        options:
          - "колеги"
          - "колегам"
          - "колегами"
        explanation: "Множинне звертання: колеги."
      - sentence: "Дякую Вам, пане ____, за відповідь."
        answer: "Андрію"
        options:
          - "Андрію"
          - "Андрій"
          - "Андрієм"
        explanation: "Андрій -> Андрію."
      - sentence: "____ пані Голово, дозвольте поставити питання."
        answer: "Шановна"
        options:
          - "Шановна"
          - "Шановній"
          - "Шановною"
        explanation: "Прикметник узгоджується, але лишається називним."
      - sentence: "Колего ____, надішліть, будь ласка, протокол."
        answer: "Ірино"
        options:
          - "Ірино"
          - "Ірина"
          - "Ірині"
        explanation: "Колего + ім'я: обидва слова в кличному."
      - sentence: "____ Ковальчук, Ваш документ готовий."
        answer: "Пане"
        options:
          - "Пане"
          - "Пан"
          - "Пану"
        explanation: "Слово пан у звертанні має форму кличного відмінка: пане."
      - sentence: "Шановна пані ____, прошу підтвердити участь."
        answer: "Маріє"
        options:
          - "Маріє"
          - "Марія"
          - "Марії"
        explanation: "Марія -> Маріє."
      - sentence: "Пане ____, просимо підписати наказ."
        answer: "ректоре"
        options:
          - "ректоре"
          - "ректор"
          - "ректору"
        explanation: "Ректор у звертанні: ректоре."
  - id: wb-3
    type: match-up
    title: Помилка і правило
    instruction: "З'єднайте помилкову форму з правилом, яке її виправляє."
