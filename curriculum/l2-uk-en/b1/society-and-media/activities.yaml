version: '1.0'
module: society-and-media
level: b1
inline:
  - id: act-1
    type: quiz
    title: Перше читання медіатексту
    instruction: Оберіть найточніше пояснення.
    items:
      - question: "Що найперше варто з'ясувати в новині?"
        options:
          - "що саме сталося"
          - "чи подобається мені заголовок"
          - "скільки в тексті складних слів"
        correct: 0
        explanation: Без головної події неможливо зрозуміти решту тексту.
      - question: "Яке питання перевіряє джерело інформації?"
        options:
          - "Хто це повідомляє?"
          - "Чи текст довгий?"
          - "Чи є в тексті прикметники?"
        correct: 0
        explanation: Джерело показує, звідки походить твердження.
      - question: "Що є фактом?"
        options:
          - "У середу відкрили центр."
          - "Центр надзвичайно важливий."
          - "Це найкраща новина року."
        correct: 0
        explanation: Дату й подію можна перевірити.
      - question: "Що є думкою або оцінкою?"
        options:
          - "Проєкт дуже корисний для громади."
          - "Захід відбувся у суботу."
          - "У тексті є цитата координаторки."
        correct: 0
        explanation: Слово корисний передає позицію автора.
      - question: "Який маркер вказує на джерело?"
        options:
          - "за словами координаторки"
          - "дуже важливо"
          - "нарешті"
        correct: 0
        explanation: Фраза називає, хто повідомляє інформацію.
      - question: "Що таке медіаграмотність у практичному читанні?"
        options:
          - "уміння аналізувати й оцінювати інформаційні повідомлення"
          - "уміння читати тільки короткі тексти"
          - "уміння швидко поширювати всі новини"
        correct: 0
        explanation: Медіаграмотність включає аналіз, оцінювання, створення й відповідальне поширення.
      - question: "Який заголовок найбільш нейтральний?"
        options:
          - "У громаді відкрили пункт допомоги"
          - "Шок! Влада нарешті прокинулася"
          - "Неймовірна правда, яку приховували"
        correct: 0
        explanation: Нейтральний заголовок називає подію без емоційного тиску.
      - question: "Що треба зробити перед поширенням емоційної новини?"
        options:
          - "перевірити джерело й докази"
          - "додати три окличні знаки"
          - "написати, що всі мають це прочитати"
        correct: 0
        explanation: Емоція не замінює перевірку.
      - question: "Яка фраза краще підходить для B1-дискусії?"
        options:
          - "Я не погоджуюся, бо в тексті бракує джерела."
          - "Це дурна думка."
          - "Усі нормальні люди вже погодилися."
        correct: 0
        explanation: Перша фраза критикує аргумент, а не людину.
      - question: "Що показує дієслово спростувати?"
        options:
          - "попередню інформацію визнали неправдивою або неточною"
          - "інформацію вперше опублікували"
          - "автор написав особистий допис"
        correct: 0
        explanation: Спростування заперечує або уточнює проблемне твердження.
      - question: "Яка дія є частиною фактчекінгу?"
        options:
          - "знайти конкретне твердження, яке треба перевірити"
          - "оцінити новину лише за фото"
          - "довіряти першому скриншоту"
        correct: 0
        explanation: Перевіряти треба конкретне твердження, а не загальне враження.
      - question: "Що є відповідальною реакцією на неперевірене повідомлення?"
        options:
          - "Я не знайшла офіційного підтвердження."
          - "Це точно правда, бо так написали в коментарях."
          - "Поширю всім, а потім перевірю."
        correct: 0
        explanation: Обережна фраза чесно показує межу знання.
  - id: act-2
    type: group-sort
    title: Типи медіа і повідомлень
    instruction: Розподіліть слова за найточнішою групою.
    groups:
      - label: Канали або платформи
        items:
          - телебачення
          - радіо
          - вебсайт
      - label: Жанри медіатексту
        items:
          - новина
          - інтерв'ю
          - реклама
      - label: Соцмережі
        items:
          - допис
          - підписник
          - стрічка
      - label: Перевірка інформації
        items:
          - джерело
          - фактчекінг
          - підтвердження
  - id: act-3
    type: match-up
    title: Частини новини
    instruction: З'єднайте термін або фразу з поясненням.
    pairs:
      - left: заголовок
        right: коротко називає тему й привертає увагу
      - left: лід
        right: перший абзац із головною інформацією
      - left: основна частина
        right: додає деталі, цитати, передісторію й наслідки
      - left: за словами координаторки
        right: маркер джерела інформації
      - left: у середу
        right: часовий маркер
      - left: у Львові
        right: просторовий маркер
      - left: повідомити
        right: нейтрально передати інформацію
      - left: заявити
        right: офіційно висловити позицію
      - left: підтвердити
        right: зробити інформацію надійнішою після перевірки
      - left: спростувати
        right: заперечити неправдиве або неточне твердження
      - left: цитата
        right: дослівні або передані слова іншої особи
      - left: джерело
        right: походження інформації
  - id: act-4
    type: error-correction
    title: Приберіть маніпуляцію
    instruction: Виправте речення так, щоб воно стало точнішим і менш маніпулятивним.
    items:
      - sentence: "Шок! Усі школи міста закривають уже завтра!"
        error: "Шок! Усі школи міста закривають уже завтра!"
        correction: "За повідомленням міської ради, завтра частина шкіл працюватиме дистанційно."
        explanation: Замість емоційного узагальнення потрібні джерело й точний обсяг.
      - sentence: "Усі нормальні люди підтримують цю петицію."
        error: "Усі нормальні люди"
        correction: "Багато мешканців"
        explanation: Ярлик і тиск на читача треба замінити нейтральним описом.
      - sentence: "Експерти кажуть, що рішення провальне."
        error: "Експерти кажуть"
        correction: "Експертка з місцевого самоврядування Олена Коваль вважає"
        explanation: Нечіткий авторитет слабший за назване джерело.
      - sentence: "Влада знову нічого не робить."
        error: "нічого не робить"
        correction: "у новині не пояснено, які кроки зробила установа"
        explanation: Оцінку треба прив'язати до спостереження в тексті.
      - sentence: "Цей допис доводить, що всі медіа брешуть."
        error: "всі медіа брешуть"
        correction: "цей допис потребує перевірки за іншими джерелами"
        explanation: Один допис не доводить узагальнення про всі медіа.
      - sentence: "Фото в коментарях точно підтверджує новину."
        error: "точно підтверджує"
        correction: "може бути додатковим матеріалом, але потребує перевірки"
        explanation: Фото без контексту не є автоматичним доказом.
      - sentence: "Місто нарешті прокинулося й відкрило центр."
        error: "нарешті прокинулося"
        correction: "міська рада відкрила центр"
        explanation: Для новини краще назвати дію без образливої оцінки.
      - sentence: "Джерела стверджують, що все буде погано."
        error: "Джерела стверджують"
        correction: "У тексті не названо джерел, тому прогноз треба перевірити"
        explanation: Анонімне джерело й загальна емоція слабкі для факту.
      - sentence: "Очевидно, ця ініціатива нікому не потрібна."
        error: "Очевидно"
        correction: "На мою думку"
        explanation: Оцінку треба позначити як позицію, якщо доказів немає.
      - sentence: "Усі вже знають правду про цей проєкт."
        error: "Усі вже знають"
        correction: "У тексті наведено такі факти про проєкт"
        explanation: Узагальнення треба замінити конкретними фактами.
      - sentence: "Коментар без імені показує реальну ситуацію."
        error: "показує реальну ситуацію"
        correction: "може показувати одну думку, але не всю ситуацію"
        explanation: Анонімний коментар не дорівнює повній картині.
      - sentence: "Не думайте, просто поширте цю новину."
        error: "Не думайте, просто поширте"
        correction: "Перевірте джерело перед поширенням"
        explanation: Відповідальний читач спочатку перевіряє інформацію.
  - id: act-5
    type: fill-in
    title: Медіасловник у реченнях
    instruction: Оберіть слово, яке найточніше завершує речення.
    items:
      - sentence: "Перший абзац новини, де подано головне, називається ____."
        answer: "лід"
        options:
          - "лід"
          - "ярлик"
          - "петиція"
        explanation: Лід стисло відповідає на головні запитання.
      - sentence: "Походження інформації в тексті - це ____."
        answer: "джерело"
        options:
          - "джерело"
          - "стрічка"
          - "коментар"
        explanation: Джерело показує, хто або що повідомляє інформацію.
      - sentence: "Твердження, яке можна перевірити, - це ____."
        answer: "факт"
        options:
          - "факт"
          - "думка"
          - "емоція"
        explanation: Факт має перевірні ознаки.
      - sentence: "Особиста позиція або оцінка автора - це ____."
        answer: "думка"
        options:
          - "думка"
          - "дата"
          - "місце"
        explanation: Думка показує ставлення, а не тільки подію.
      - sentence: "Прихований вплив на читача називається ____."
        answer: "маніпулювання"
        options:
          - "маніпулювання"
          - "підтвердження"
          - "заголовок"
        explanation: Маніпулювання керує реакцією без чесного пояснення мети.
      - sentence: "Перевірка твердження за джерелами - це ____."
        answer: "фактчекінг"
        options:
          - "фактчекінг"
          - "репортаж"
          - "підписник"
        explanation: Фактчекінг перевіряє конкретне твердження.
      - sentence: "Короткий текст у соцмережі - це ____."
        answer: "допис"
        options:
          - "допис"
          - "уряд"
          - "електорат"
        explanation: Допис є типовим форматом соцмереж.
      - sentence: "Людина, яка готує повідомлення для медіа, - це ____."
        answer: "кореспондент"
        options:
          - "кореспондент"
          - "громадянин"
          - "підписник"
        explanation: Кореспондент або кореспондентка працює з новинами й репортажами.
      - sentence: "Офіційна зустріч із журналістами називається ____."
        answer: "прес-конференція"
        options:
          - "прес-конференція"
          - "стрічка"
          - "петиція"
        explanation: На прес-конференції посадовці або організатори відповідають на запитання ЗМІ.
      - sentence: "Письмове або електронне звернення з вимогою - це ____."
        answer: "петиція"
        options:
          - "петиція"
          - "лід"
          - "фейк"
        explanation: Петиція збирає підтримку для пропозиції або вимоги.
      - sentence: "Неправдиве повідомлення часто називають словом ____."
        answer: "фейк"
        options:
          - "фейк"
          - "лід"
          - "джерело"
        explanation: Фейк імітує правдиву інформацію, але вводить в оману.
      - sentence: "Сукупність медіа, каналів і дискусій можна назвати ____ простором."
        answer: "медійним"
        options:
          - "медійним"
          - "родовим"
          - "часовим"
        explanation: Медійний простір пов'язаний із ЗМІ, платформами й публічною інформацією.
workbook:
  - id: wb-1
    type: quiz
    title: Публіцистичний стиль
    instruction: Оберіть правильну ознаку або пояснення.
    items:
      - question: "Яка головна сфера публіцистичного стилю?"
        options:
          - "ЗМІ та публічне суспільне мовлення"
          - "тільки приватні листи"
          - "тільки математичні формули"
        correct: 0
        explanation: Публіцистичний стиль пов'язаний із медіа й суспільним життям.
      - question: "Яка лексика типова для публіцистичного стилю?"
        options:
          - "суспільно-політична"
          - "тільки дитяча"
          - "тільки кулінарна"
        correct: 0
        explanation: У медійних текстах часто є держава, громада, суспільство, права.
      - question: "Яка ознака бажана для якісної новини?"
        options:
          - "точність"
          - "нечіткість"
          - "анонімні чутки без контексту"
        correct: 0
        explanation: Новина має давати перевірну інформацію.
      - question: "Що робить емоційність проблемною?"
        options:
          - "коли вона замінює доказ"
          - "коли в тексті є джерело"
          - "коли автор називає дату"
        correct: 0
        explanation: Емоція не повинна приховувати брак фактів.
      - question: "Який жанр належить до публіцистичного стилю?"
        options:
          - "репортаж"
          - "таблиця множення"
          - "приватний список покупок"
        correct: 0
        explanation: Репортаж є медійним жанром.
      - question: "Що означає оцінний тон?"
        options:
          - "автор показує ставлення до події"
          - "автор не має жодної позиції"
          - "у тексті немає прикметників"
        correct: 0
        explanation: Оцінка передає позицію або ставлення.
      - question: "Яке речення найбільш фактографічне?"
        options:
          - "Акція відбулася у суботу біля бібліотеки."
          - "Акція була просто неймовірна."
          - "Усі мають захоплюватися акцією."
        correct: 0
        explanation: Тут є час і місце, які можна перевірити.
      - question: "Яке речення є обережною думкою?"
        options:
          - "На мою думку, проєкт корисний для громади."
          - "Це факт, що проєкт найкращий у світі."
          - "Немає сенсу нічого перевіряти."
        correct: 0
        explanation: Фраза на мою думку чесно позначає позицію.
      - question: "Що робить заголовок маніпулятивним?"
        options:
          - "емоційний тиск без конкретної події"
          - "назва місця й події"
          - "нейтральне дієслово повідомити"
        correct: 0
        explanation: Заголовок має інформувати, а не тільки тиснути.
      - question: "Яке слово є суспільно-політичним?"
        options:
          - "демократія"
          - "ложка"
          - "подушка"
        correct: 0
        explanation: Демократія належить до суспільної лексики.
      - question: "Яке дієслово звучить офіційніше?"
        options:
          - "заявити"
          - "балакати"
          - "скинути"
        correct: 0
        explanation: Заявити часто передає офіційну позицію.
      - question: "Що має зробити якісний коментар?"
        options:
          - "спертися на факт або аргумент"
          - "образити опонента"
          - "заховати джерело"
        correct: 0
        explanation: Коментар сильний тоді, коли має аргументацію.
  - id: wb-2
    type: group-sort
    title: Факт, думка, маніпуляція
    instruction: Розподіліть приклади за типом.
    groups:
      - label: Факт
        items:
          - "Центр відкрили у середу."
          - "У тексті є цитата директорки."
          - "Петиція зібрала 500 підписів."
      - label: Думка або оцінка
        items:
          - "Цей центр дуже потрібний."
          - "На мою думку, ініціатива корисна."
          - "Рішення здається поспішним."
      - label: Маніпулятивний сигнал
        items:
          - "Усі нормальні люди це підтримують."
          - "Шокуюча правда, яку приховують."
          - "Експерти кажуть, але імен немає."
      - label: Джерело або перевірка
        items:
          - "за словами координаторки"
          - "офіційне повідомлення міської ради"
          - "перевірка за двома джерелами"
  - id: wb-3
    type: cloze
    title: Короткий медіааналіз
    instruction: Виберіть правильні слова в аналітичному абзаці.
    text: "Я прочитала {новину|ярлик|емоцію} про волонтерський центр. У {заголовку|підписнику|фейку} названо головну подію, а в {ліді|стрічці|коментарі без контексту} подано час, місце й учасників. Джерелом є {координаторка|невідомі всі|чутка}, тому інформація виглядає конкретнішою. У тексті є {факти|вигуки|образи}: центр відкрили в суботу, а перші заняття безкоштовні. Також є {думка|дата|адреса}: автор вважає ініціативу важливою. Перед поширенням я перевірю {джерело|настрій|колір}, бо емоційний заголовок може бути {маніпулятивним|родовим|минулим}. Якщо твердження неправдиве, фактчекери можуть його {спростувати|прикрасити|замовчати}. У своєму коментарі я використаю формулу {на мою думку|усі знають|без сумніву завжди}, щоб відокремити позицію від факту. Після цього я напишу короткий {відгук|скриншот|ярлик} українською й поширю інформацію {відповідально|випадково|анонімно}."
