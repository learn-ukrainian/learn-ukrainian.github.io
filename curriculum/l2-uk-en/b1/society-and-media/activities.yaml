  - id: wb-5
    type: essay-response
    title: Відгук на новину
    instruction: Напишіть короткий відгук на навчальну новину.
    prompt: "Напишіть 8-10 речень про новину з модуля або про реальну коротку українську новину. Обов'язково назвіть тему, головний факт, джерело, одну думку або оцінку, один можливий ризик маніпуляції та власний висновок. Використайте щонайменше шість слів із теми: ЗМІ, медіатекст, заголовок, лід, джерело, факт, думка, підтвердити, спростувати, фактчекінг, громада, волонтер."
    min_words: 90
    model_answer: "Я прочитала новину про молодіжний медіацентр у Львові. У заголовку названо головну подію, а лід пояснює, де й для кого відкрили центр. Головний факт полягає в тому, що школярі й студенти зможуть навчатися фактчекінгу та створювати український контент. Джерелом інформації є координаторка проєкту. На мою думку, ця ініціатива корисна для громади, бо вона розвиває медіаграмотність. Водночас я хотіла б побачити посилання на реєстрацію й точний розклад занять. Маніпуляції в тексті майже немає, бо заголовок не тисне на емоції. Перед поширенням я все одно перевірила б повідомлення на сайті міської ради. Якщо інформацію підтвердять, я можу порадити цю новину друзям. Такий медіатекст допомагає читати українською уважно й відповідально."
    rubric:
      - criteria: Структура
        description: Є тема, факт, джерело, оцінка, ризик і висновок.
        points: 3
      - criteria: Лексика
        description: Використано щонайменше шість слів із теми модуля.
        points: 3
      - criteria: Медіаграмотність
        description: Автор відрізняє факт від думки й називає перевірку.
        points: 3
      - criteria: Мова
        description: Речення зрозумілі, B1-рівня, без грубих кальок.
        points: 1
