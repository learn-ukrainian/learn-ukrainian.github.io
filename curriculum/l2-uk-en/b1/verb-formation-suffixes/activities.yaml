version: '1.0'
module: verb-formation-suffixes
level: b1
inline:
  - id: act-1
    type: quiz
    title: Який спосіб творення?
    instruction: Оберіть найточніший спосіб творення дієслова.
    items:
      - question: "писати → написати"
        options:
          - "префіксальний"
          - "суфіксальний"
          - "префіксально-суфіксальний"
        correct: 0
        explanation: "До дієслова писати додано префікс на-."
      - question: "читати → перечитати"
        options:
          - "префіксальний"
          - "безафіксний"
          - "суфіксальний"
        correct: 0
        explanation: "Пере- додає значення повторення."
      - question: "білий → біліти"
        options:
          - "суфіксальний"
          - "префіксальний"
          - "складення основ"
        correct: 0
        explanation: "Дієслово утворене від прикметникової основи з суфіксом -іти."
      - question: "програма → програмувати"
        options:
          - "суфіксальний"
          - "префіксальний"
          - "префіксально-суфіксальний"
        correct: 0
        explanation: "Модель -увати робить дієслово від основи."
      - question: "земля → заземлити"
        options:
          - "префіксально-суфіксальний"
          - "лише префіксальний"
          - "безафіксний"
        correct: 0
        explanation: "У шкільному розборі бачимо за- + земл- + -ити."
      - question: "шкода → знешкодити"
        options:
          - "префіксально-суфіксальний"
          - "лише суфіксальний"
          - "перехід в іншу частину мови без афікса"
        correct: 0
        explanation: "Зне- і -ити працюють разом із основою шкод-."
      - question: "штовхати → штовхнути"
        options:
          - "суфіксальний"
          - "префіксальний"
          - "складання слів"
        correct: 0
        explanation: "Суфікс -нути дає коротку одноразову дію."
      - question: "стукати → стукнути"
        options:
          - "суфіксальний"
          - "префіксально-суфіксальний"
          - "зміна наголосу без афікса"
        correct: 0
        explanation: "Стукнути утворене з суфіксом -нути."
      - question: "різати → розрізати"
        options:
          - "префіксальний"
          - "суфіксальний"
          - "префіксально-суфіксальний"
        correct: 0
        explanation: "Додано префікс роз-."
      - question: "світло → освітлити"
        options:
          - "префіксально-суфіксальний"
          - "лише префіксальний"
          - "безафіксний"
        correct: 0
        explanation: "О-/ос- і -ити працюють із основою світл-."
      - question: "фільтр → фільтрувати"
        options:
          - "суфіксальний"
          - "префіксальний"
          - "чергування приголосних"
        correct: 0
        explanation: "Дієслово має продуктивну модель -увати."
      - question: "барва → знебарвити"
        options:
          - "префіксально-суфіксальний"
          - "лише префіксальний"
          - "видова пара без зміни значення"
        correct: 0
        explanation: "Знебарвити пов'язане з барва: зне- + барв- + -ити."
  - id: act-2
    type: match-up
    title: Префікс і значення
    instruction: З'єднайте дієслово з найточнішою підказкою префікса в цьому контексті.
    pairs:
      - left: "перечитати абзац"
        right: "прочитати ще раз"
      - left: "дочитати книжку"
        right: "довести читання до кінця"
      - left: "заспівати пісню"
        right: "почати співати або виконати пісню"
      - left: "почекати хвилину"
        right: "чекати короткий час"
      - left: "наготувати їжі"
        right: "приготувати багато"
      - left: "розрізати папір"
        right: "поділити на частини"
      - left: "відрізати шматок"
        right: "відокремити частину"
      - left: "приєднати файл"
        right: "додати до чогось"
      - left: "вимкнути світло"
        right: "припинити роботу"
      - left: "увімкнути мікрофон"
        right: "зробити активним"
      - left: "недооцінити ризик"
        right: "оцінити занизько"
      - left: "перевтомитися"
        right: "втомитися надмірно"
  - id: act-3
    type: fill-in
    title: Доберіть префіксоване дієслово
    instruction: Вставте дієслово, яке найкраще відповідає контексту.
    items:
      - sentence: "Перед виходом треба ____ світло."
        answer: "вимкнути"
        options:
          - "вимкнути"
          - "увімкнути"
          - "перемкнути"
        explanation: "Перед виходом світло роблять неактивним."
      - sentence: "Перед виступом треба ____ мікрофон."
        answer: "увімкнути"
        options:
          - "увімкнути"
          - "вимкнути"
          - "відрізати"
        explanation: "Мікрофон потрібно зробити активним."
      - sentence: "Якщо текст важкий, його варто ____ ще раз."
        answer: "перечитати"
        options:
          - "перечитати"
          - "дочитати"
          - "заспівати"
        explanation: "Пере- тут означає повторення дії."
      - sentence: "Я почав роман учора і хочу ____ його сьогодні."
        answer: "дочитати"
        options:
          - "дочитати"
          - "увімкнути"
          - "розрізати"
        explanation: "До- показує доведення читання до кінця."
      - sentence: "Не треба ____ розклад зайвими зустрічами."
        answer: "перенавантажувати"
        options:
          - "перенавантажувати"
          - "перечитувати"
          - "приєднувати"
        explanation: "Пере- означає надмірність."
      - sentence: "Будь ласка, ____ файл до листа."
        answer: "приєднайте"
        options:
          - "приєднайте"
          - "відріжте"
          - "знебарвіть"
        explanation: "Приєднати файл - додати його до листа."
      - sentence: "Ми можемо ____ план після обговорення."
        answer: "переписати"
        options:
          - "переписати"
          - "недоїсти"
          - "зеленіти"
        explanation: "Переписати план - написати його наново або ще раз."
      - sentence: "Викладач попросив ____ відповідь прикладом."
        answer: "підсилити"
        options:
          - "підсилити"
          - "заспівати"
          - "дочитати"
        explanation: "Підсилити аргумент - зробити його сильнішим."
      - sentence: "Спробуйте ____ програму, якщо вона не працює."
        answer: "перевстановити"
        options:
          - "перевстановити"
          - "знебарвити"
          - "почекати"
        explanation: "У технічному контексті перевстановити означає встановити знову."
      - sentence: "Не можна ____ складність цієї теми."
        answer: "недооцінювати"
        options:
          - "недооцінювати"
          - "дочитувати"
          - "увімкнути"
        explanation: "Недооцінювати - оцінювати занизько."
      - sentence: "Після ремонту треба ____ обладнання."
        answer: "заземлити"
        options:
          - "заземлити"
          - "зеленіти"
          - "переписати"
        explanation: "Заземлити - під'єднати до землі для безпеки."
      - sentence: "Щоб розпочати концерт, хор має ____ першу пісню."
        answer: "заспівати"
        options:
          - "заспівати"
          - "недооцінити"
          - "відключити"
        explanation: "Заспівати може означати почати співати або виконати пісню."
  - id: act-4
    type: cloze
    title: Суфікси в контексті
    instruction: Заповніть пропуски дієсловами з правильним суфіксом.
    text: "Навесні парк {1}, а після дощу небо {2}. Майстри можуть {3} стіни, але сама стіна не білить, а {4}. Програміст буде {5} нове правило, дизайнер може {6} ескіз, а адміністратор - {7} список заявок. Якщо двері застрягли, не треба довго їх {8}; краще один раз обережно {9}. У коридорі можна {10} кілька разів, але в реченні про одну дію природніше {11}. Коли людина довго кричить, це кричати; один короткий вигук - {12}."
    blanks:
      - id: 1
        answer: "зеленіє"
        options:
          - "зеленіє"
          - "зеленить"
          - "заземлює"
      - id: 2
        answer: "синіє"
        options:
          - "синіє"
          - "синить"
          - "синює"
      - id: 3
        answer: "білити"
        options:
          - "білити"
          - "біліти"
          - "білювати"
      - id: 4
        answer: "біліє"
        options:
          - "біліє"
          - "білить"
          - "знебарвлює"
      - id: 5
        answer: "програмувати"
        options:
          - "програмувати"
          - "програміти"
          - "програмнути"
      - id: 6
        answer: "малювати"
        options:
          - "малювати"
          - "малюнкувати"
          - "малюнити"
      - id: 7
        answer: "фільтрувати"
        options:
          - "фільтрувати"
          - "фільтріти"
          - "фільтрнути"
      - id: 8
        answer: "штовхати"
        options:
          - "штовхати"
          - "штовхнути"
          - "штовхніть"
      - id: 9
        answer: "штовхнути"
        options:
          - "штовхнути"
          - "штовхати"
          - "штовхував"
      - id: 10
        answer: "стукати"
        options:
          - "стукати"
          - "стукнути"
          - "стукнув"
      - id: 11
        answer: "стукнути"
        options:
          - "стукнути"
          - "стукати"
          - "стукає"
      - id: 12
        answer: "крикнути"
        options:
          - "крикнути"
          - "кричати"
          - "крикати"
  - id: act-5
    type: error-correction
    title: Не механізуйте словотвір
    instruction: Виправте слово або фразу так, щоб речення звучало природно.
    items:
      - sentence: "Я переоцінив ризик, бо думав, що він дуже малий."
        error: "переоцінив"
        correction: "недооцінив"
        error_type: word
        explanation: "Оцінив занизько = недооцінив."
      - sentence: "Будь ласка, увимкніть світло перед виходом."
        error: "увимкніть"
        correction: "вимкніть"
        error_type: word
        explanation: "Для вимкнення потрібне вимкнути."
      - sentence: "Перед презентацією треба вимкнути мікрофон."
        error: "вимкнути"
        correction: "увімкнути"
        error_type: word
        explanation: "Перед виступом мікрофон роблять активним."
      - sentence: "Ми переочитали текст ще раз."
        error: "переочитали"
        correction: "перечитали"
        error_type: word
        explanation: "Правильна форма - перечитати."
      - sentence: "Діти штовхнули двері десять хвилин."
        error: "штовхнули"
        correction: "штовхали"
        error_type: word
        explanation: "Тривала повторювана дія потребує недоконаного штовхали."
      - sentence: "Він стукав один раз у двері."
        error: "стукав"
        correction: "стукнув"
        error_type: word
        explanation: "Один раз природніше стукнув."
      - sentence: "Парк зеленив навесні."
        error: "зеленив"
        correction: "зеленів"
        error_type: word
        explanation: "Парк сам ставав зеленим: зеленів."
      - sentence: "Майстри біліли стелю."
        error: "біліли"
        correction: "білили"
        error_type: word
        explanation: "Майстри робили стелю білою: білили."
      - sentence: "Я хотів повсюдити цю інформацію серед колег."
        error: "повсюдити"
        correction: "розповсюдити"
        error_type: word
        explanation: "Розповсюдити краще не розкладати на штучне *повсюдити."
      - sentence: "Підписати - це просто доконаний вид від писати."
        error: "просто доконаний вид від писати"
        correction: "окреме дієслово зі значенням поставити підпис"
        error_type: phrase
        explanation: "Підписати змінює лексичне значення."
      - sentence: "За- завжди означає початок дії."
        error: "завжди означає"
        correction: "часто може означати"
        error_type: phrase
        explanation: "Префікс за- має кілька значень."
      - sentence: "Пере- завжди означає ще раз."
        error: "завжди означає ще раз"
        correction: "може означати ще раз або надмірність"
        error_type: phrase
        explanation: "У перевтомитися пере- означає надмірність."
workbook:
  - id: wb-1
    type: quiz
    title: Префікс і вид
    instruction: Оберіть правильне пояснення.
    items:
      - question: "писати лист → написати лист"
        options:
          - "можлива видова пара: процес і результат тієї самої дії"
          - "нове лексичне значення без зв'язку з писати"
          - "суфіксальна дія від іменника"
        correct: 0
        explanation: "У цьому значенні написати доводить писання до результату."
      - question: "писати → підписати"
        options:
          - "нова лексична дія: поставити підпис"
          - "та сама дія лише в минулому часі"
          - "форма на -нути"
        correct: 0
        explanation: "Підписати не означає просто завершити писання."
      - question: "читати статтю → прочитати статтю"
        options:
          - "видова пара в конкретному значенні"
          - "префіксально-суфіксальний спосіб"
          - "помилка, бо префікси не творять виду"
        correct: 0
        explanation: "Прочитати показує завершений результат читання."
      - question: "бити → розбити склянку"
        options:
          - "префікс додає новий результат: зламати"
          - "це лише синонім бити"
          - "це дієслово від прикметника"
        correct: 0
        explanation: "Розбити має лексичне значення зробити частинами."
      - question: "втомитися → перевтомитися"
        options:
          - "пере- означає надмірність"
          - "пере- означає читати ще раз"
          - "це дія від іменника том"
        correct: 0
        explanation: "Перевтомитися - втомитися надміру."
      - question: "оцінити → недооцінити"
        options:
          - "недо- означає недостатню оцінку"
          - "недо- означає повторення"
          - "недо- завжди означає рух униз"
        correct: 0
        explanation: "Недооцінити - оцінити занизько."
      - question: "будувати → збудувати"
        options:
          - "часто процес і завершений результат"
          - "форма від прикметника"
          - "безафіксний спосіб"
        correct: 0
        explanation: "Збудувати показує завершений результат будівництва."
      - question: "організувати → організовувати"
        options:
          - "доконана і недоконана форми можуть різнитися суфіксом"
          - "це не українські дієслова"
          - "це завжди одне й те саме за видом"
        correct: 0
        explanation: "Організовувати позначає процес або повторюваність."
      - question: "переписати → переписувати"
        options:
          - "недоконаний партнер для процесу або повторення"
          - "форма тільки наказового способу"
          - "помилка, бо пере- вже є"
        correct: 0
        explanation: "Переписувати потрібне для тривалого або повторюваного процесу."
      - question: "зробити"
        options:
          - "краще вчити як усталену доконану форму до робити"
          - "завжди розкладати як з- = надмірність"
          - "це слово від прикметника злий"
        correct: 0
        explanation: "Зробити пов'язане з робити, але префікс не перекладаємо окремо."
      - question: "спекти"
        options:
          - "усталена доконана форма до пекти"
          - "дієслово на -нути"
          - "форма від слова спека"
        correct: 0
        explanation: "Для B1 важливіше знати пару пекти/спекти."
      - question: "обговорити"
        options:
          - "розглянути питання в розмові"
          - "просто говорити голосніше"
          - "стати говором"
        correct: 0
        explanation: "Обговорити має окреме лексичне значення."
  - id: wb-2
    type: match-up
    title: Значення дієслів
    instruction: З'єднайте дієслово з природним значенням.
    pairs:
      - left: "перевстановити програму"
        right: "встановити її знову"
      - left: "відтворити запис"
        right: "запустити або відновити звучання"
      - left: "знебарвити тканину"
        right: "прибрати колір"
      - left: "знешкодити небезпеку"
        right: "зробити нешкідливою"
      - left: "освітлити кімнату"
        right: "зробити світлою"
      - left: "озброїти команду інструментами"
        right: "дати потрібні засоби"
      - left: "підсилити доказ"
        right: "зробити сильнішим"
      - left: "відключити послугу"
        right: "припинити з'єднання або роботу"
      - left: "розповсюдити інформацію"
        right: "поширити серед багатьох"
      - left: "добудувати будинок"
        right: "закінчити будівництво"
      - left: "наготувати борщу"
        right: "приготувати багато"
      - left: "переоцінити сили"
        right: "оцінити занадто високо"
  - id: wb-3
    type: group-sort
    title: Розподіліть дієслова
    instruction: Розподіліть дієслова за основним способом творення в навчальному розборі.
    groups:
      - label: "префіксальний"
        items:
          - написати
          - перечитати
          - розрізати
          - дочитати
      - label: "суфіксальний"
        items:
          - програмувати
          - синіти
          - штовхнути
          - фільтрувати
      - label: "префіксально-суфіксальний"
        items:
          - заземлити
          - знешкодити
          - знебарвити
          - освітлити
  - id: wb-4
