  - id: wb-6
    type: translate
    title: Перекладіть дієслово в контексті
    instruction: Оберіть природний український варіант.
    items:
      - source: "Turn off the light."
        answer: "Вимкніть світло."
        alternatives:
          - "Вимкніть світло."
          - "Увімкніть світло."
          - "Перемкніть світло."
        explanation: "Вимкнення = вимкнути."
      - source: "Turn on the microphone."
        answer: "Увімкніть мікрофон."
        alternatives:
          - "Увімкніть мікрофон."
          - "Вимкніть мікрофон."
          - "Відріжте мікрофон."
        explanation: "Увімкнення = увімкнути."
      - source: "Reread the paragraph."
        answer: "Перечитайте абзац."
        alternatives:
          - "Перечитайте абзац."
          - "Дочитайте абзац."
          - "Заспівайте абзац."
        explanation: "Прочитати ще раз = перечитати."
      - source: "Finish reading the book."
        answer: "Дочитайте книжку."
        alternatives:
          - "Дочитайте книжку."
          - "Перечитайте книжку."
          - "Недооцініть книжку."
        explanation: "Завершити читання = дочитати."
      - source: "Do not underestimate the task."
        answer: "Не недооцінюйте завдання."
        alternatives:
          - "Не недооцінюйте завдання."
          - "Не переоцінюйте завдання."
          - "Не вимикайте завдання."
        explanation: "Оцінити занизько = недооцінювати."
      - source: "Do not overload the schedule."
        answer: "Не перенавантажуйте розклад."
        alternatives:
          - "Не перенавантажуйте розклад."
          - "Не перечитуйте розклад."
          - "Не зеленійте розклад."
        explanation: "Надмірно завантажити = перенавантажувати."
      - source: "Attach the file."
        answer: "Приєднайте файл."
        alternatives:
          - "Приєднайте файл."
          - "Відріжте файл."
          - "Знебарвіть файл."
        explanation: "Додати файл = приєднати."
      - source: "Reinstall the program."
        answer: "Перевстановіть програму."
        alternatives:
          - "Перевстановіть програму."
          - "Дочитайте програму."
          - "Заземліть програму."
        explanation: "Встановити ще раз = перевстановити."
      - source: "Strengthen the argument."
        answer: "Підсильте аргумент."
        alternatives:
          - "Підсильте аргумент."
          - "Недоїжте аргумент."
          - "Увімкніть аргумент."
        explanation: "Зробити сильнішим = підсилити."
      - source: "Neutralize the danger."
        answer: "Знешкодьте небезпеку."
        alternatives:
          - "Знешкодьте небезпеку."
          - "Зеленійте небезпеку."
          - "Перечитайте небезпеку."
        explanation: "Зробити безпечним = знешкодити."
      - source: "The park is turning green."
        answer: "Парк зеленіє."
        alternatives:
          - "Парк зеленіє."
          - "Парк зеленить."
          - "Парк знебарвлює."
        explanation: "Ставати зеленим = зеленіти."
      - source: "Push the door once."
        answer: "Штовхніть двері один раз."
        alternatives:
          - "Штовхніть двері один раз."
          - "Штовхайте двері один раз."
          - "Заспівайте двері."
        explanation: "Один короткий рух = штовхнути."
  - id: wb-7
    type: error-correction
    title: Виправте словотвір і вид
    instruction: Виправте помилку в дієслові або поясненні.
    items:
      - sentence: "Я недооцінив ризик, бо думав, що він дуже великий."
        error: "недооцінив"
        correction: "переоцінив"
        error_type: word
        explanation: "Думав, що ризик завеликий = переоцінив."
      - sentence: "Ми дочитали текст ще раз."
        error: "дочитали"
        correction: "перечитали"
        error_type: word
        explanation: "Ще раз = перечитали."
      - sentence: "Я перечитав книжку до кінця після вчорашньої перерви."
        error: "перечитав"
        correction: "дочитав"
        error_type: word
        explanation: "До кінця після початку = дочитав."
      - sentence: "Учитель попросив підслабити аргумент прикладом."
        error: "підслабити"
        correction: "підсилити"
        error_type: word
        explanation: "Аргумент роблять сильнішим."
      - sentence: "Після ремонту треба землювати прилад."
        error: "землювати"
        correction: "заземлити"
        error_type: word
        explanation: "Усталене технічне дієслово - заземлити."
      - sentence: "Хмари чорнять перед бурею."
        error: "чорнять"
        correction: "чорніють"
        error_type: word
        explanation: "Хмари самі стають темними."
      - sentence: "Дизайнер буде малюнкувати ескіз."
        error: "малюнкувати"
        correction: "малювати"
        error_type: word
        explanation: "Нормальне дієслово - малювати."
      - sentence: "Ми фільтримо список заявок."
        error: "фільтримо"
        correction: "фільтруємо"
        error_type: word
        explanation: "Усталена форма - фільтрувати."
      - sentence: "Перенавантажити означає встановити ще раз."
        error: "Перенавантажити"
        correction: "Перевстановити"
        error_type: word
        explanation: "Встановити ще раз = перевстановити; перенавантажити = надмірно завантажити."
      - sentence: "Знебарвити означає додати колір."
        error: "додати колір"
        correction: "прибрати колір"
        error_type: phrase
        explanation: "Зне- тут означає позбавлення барви."
      - sentence: "Заспівати завжди означає заборонити спів."
        error: "заборонити спів"
        correction: "почати співати або виконати пісню"
        error_type: phrase
        explanation: "За- в заспівати не означає заборону."
      - sentence: "Усі префіксовані дієслова є просто видовими парами."
        error: "Усі"
        correction: "Не всі"
        error_type: word
        explanation: "Префікс може створити нове лексичне значення."
  - id: wb-8
    type: essay-response
    title: Мініаналіз дієслова
    instruction: Напишіть 5-7 речень про три дієслова з префіксами або суфіксами. Для кожного поясніть, яка частина слова допомагає зрозуміти значення.
    prompt: Виберіть три дієслова з уроку. Для кожного назвіть префікс або суфікс, поясніть значення в одному реченні й додайте приклад у контексті. Обов'язково згадайте один випадок, де розбір не можна робити механічно.
    min_words: 80
    model_answer: "Я вибрав дієслова перечитати, недооцінити і розповсюдити. У слові перечитати префікс пере- означає повторення: я перечитав абзац ще раз. У слові недооцінити префікс недо- показує недостатню оцінку: ми недооцінили складність завдання. Слово розповсюдити має префікс роз-, який добре узгоджується з ідеєю поширення, але я не буду розкладати його механічно на штучне *повсюдити. У контексті розповсюдити інформацію означає поширити її серед багатьох людей. Такий розбір допомагає читати, але словник і речення все одно важливі."
    rubric:
      - criteria: "Вибір дієслів"
        description: "Є три доречні дієслова з уроку."
        points: 2
      - criteria: "Словотвір"
        description: "Правильно названо префікс або суфікс і його роль."
        points: 3
      - criteria: "Контекст"
        description: "Кожне дієслово має природний приклад у реченні."
        points: 2
      - criteria: "Обережність"
        description: "Є згадка, що не всі слова розкладаються механічно."
        points: 2
      - criteria: "Мова"
        description: "Текст граматично зрозумілий і відповідає рівню B1."
        points: 1
