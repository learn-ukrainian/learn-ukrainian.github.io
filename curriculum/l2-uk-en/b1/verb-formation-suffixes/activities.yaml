        explanation: "Не оцінюйте занизько."
      - sentence: "Треба ____ текст перед публікацією."
        answer: "відредагувати"
        options:
          - "відредагувати"
          - "заземлити"
          - "синіти"
        explanation: "Текст редагують, щоб поліпшити."
      - sentence: "Перед уроком учитель має ____ список учасників."
        answer: "перевірити"
        options:
          - "перевірити"
          - "розрізати"
          - "знебарвити"
        explanation: "Перевірити список - звірити його."
      - sentence: "Після оновлення треба ____ налаштування."
        answer: "перевірити"
        options:
          - "перевірити"
          - "перевтомити"
          - "зеленіти"
        explanation: "Налаштування перевіряють після змін."
      - sentence: "Цю небезпеку вдалося ____."
        answer: "знешкодити"
        options:
          - "знешкодити"
          - "засиніти"
          - "дочитати"
        explanation: "Знешкодити - зробити нешкідливою."
      - sentence: "Ми хочемо ____ кімнату новою лампою."
        answer: "освітлити"
        options:
          - "освітлити"
          - "знебарвити"
          - "недоїсти"
        explanation: "Освітлити - зробити світлою."
      - sentence: "Не треба ____ графік зайвими задачами."
        answer: "перенавантажувати"
        options:
