version: '1.0'
module: participles-active
level: b1
inline:
  - id: act-1
    type: quiz
    title: Що саме називає форма?
    instruction: Оберіть пояснення, яке найточніше описує форму в реченні.
    items:
      - question: "У словосполученні зів'ялий листок форма зів'ялий означає:"
        options:
          - ознаку за дією, яку листок пережив сам
          - дію, яку хтось виконав над листком
          - звичайний наказ
        correct: 0
        explanation: Листок сам зів'яв, тому це активний дієприкметник минулого часу.
      - question: "Яка пара правильно розрізняє дію і ознаку?"
        options:
          - сад квітне - дія; квітучий сад - ознака за дією
          - сад квітне - прикметник; квітучий сад - наказ
          - сад квітне - родовий; квітучий сад - давальний
        correct: 0
        explanation: Дієслово називає дію, а дієприкметник робить цю дію ознакою предмета.
      - question: "У фразі посаджений сад форма посаджений є:"
        options:
          - пасивною, бо сад посадив хтось
          - активною, бо сад сам посадив себе
          - кличною, бо до саду звертаються
        correct: 0
        explanation: Пасивний дієприкметник називає ознаку за дією над предметом.
      - question: "У фразі розквітлий сад форма розквітлий є:"
        options:
          - активною минулою, бо сад сам розквітнув
          - пасивною, бо сад хтось розквітлив
          - не пов'язаною з дієсловом
        correct: 0
        explanation: Розквітлий походить від розквітнути і називає результат зміни самого саду.
      - question: "Яке питання ставимо до дієприкметника як до прикметника?"
        options:
          - який? яка? яке? які?
          - що робити?
          - кому?
        correct: 0
        explanation: Дієприкметник має прикметникові питання й узгодження.
      - question: "Яка форма є прикметником без дієслівної дії в цьому контексті?"
        options:
          - зелений сад
          - сад зеленіє
          - зеленіючий гай
        correct: 0
        explanation: Зелений називає сталу ознаку, а не процес.
      - question: "У словосполученні опале листя форма опале означає:"
        options:
          - листя, що опало
          - листя, яке хтось написав
          - листя, до якого звертаються
        correct: 0
        explanation: Опале можна розгорнути як листя, що опало.
      - question: "Яка форма належить до майбутнього модуля про пасивні дієприкметники?"
        options:
          - написаний лист
          - посивілий чоловік
          - зниклий файл
        correct: 0
        explanation: Лист хтось написав, тому написаний є пасивною формою.
      - question: "Що спільного між зів'ялий і посивілий?"
        options:
          - обидва називають результат завершеної зміни
          - обидва є формами кличного відмінка
          - обидва утворені від іменників
        correct: 0
        explanation: Це активні дієприкметники минулого часу з результативним значенням.
      - question: "Яке речення найкраще перевіряє активність форми?"
        options:
          - Чи предмет сам виконує дію або сам змінився?
          - Чи слово завжди стоїть у називному?
          - Чи слово має тільки множину?
        correct: 0
        explanation: Активність означає, що дія пов'язана із самим предметом.
      - question: "У фразі зірване листя форма зірване не активна, бо:"
        options:
          - листя зірвав вітер або людина
          - листя саме стало зеленим
          - це форма майбутнього часу
        correct: 0
        explanation: Над предметом виконано дію, тому це пасивна зона.
      - question: "Який варіант природно стискає речення сад, що розквітнув після дощу?"
        options:
          - розквітлий після дощу сад
          - розквітивший після дощу сад
          - сад розквітлий що після дощу
        correct: 0
        explanation: Розквітлий є нормативною минулою активною формою.
  - id: act-2
    type: fill-in
    title: Утворення і природність
    instruction: Вставте нормативну форму або природну заміну.
    items:
      - sentence: "Після спеки на столі стояла ____ квітка. (зів'янути)"
        answer: зів'яла
        options:
          - зів'яла
          - зів'явша
          - зів'яюча
        explanation: Минулий активний дієприкметник утворюється з -л-; форма узгоджується з квітка.
      - sentence: "У парку лежало ____ листя. (опасти)"
        answer: опале
        options:
          - опале
          - опавше
          - опадаюче
        explanation: "Опале називає результат: листя вже опало."
      - sentence: "На фото видно ____ сад після дощу. (розквітнути)"
        answer: розквітлий
        options:
          - розквітлий
          - розквітнувший
          - розквітаючий у нейтральному описі
        explanation: Розквітлий є природною минулою активною формою.
      - sentence: "У договорі треба написати ____ закон, не діючий закон."
        answer: чинний
        options:
          - чинний
          - діючий
          - діявший
        explanation: Для закону нормативний прикметник - чинний.
      - sentence: "Для кухні купили ____ засіб, не миючий засіб."
        answer: мийний
        options:
          - мийний
          - миючий
          - мивший
        explanation: Нормативна прикметникова форма - мийний засіб.
      - sentence: "У протоколі написали ____ засідання, не головуючий."
        answer: голова
        options:
          - голова
          - головуючий
          - головавший
        explanation: Роль людини природно називає іменник голова.
      - sentence: "Кафедрою керує ____ кафедри, не завідуючий кафедрою."
        answer: завідувач
        options:
          - завідувач
          - завідуючий
          - завідувавший
        explanation: Нормативна назва посади - завідувач.
      - sentence: "У статті згадано ____ види рослин. (зникнути)"
        answer: зниклі
        options:
          - зниклі
          - зникнувші
          - зникаючі в значенні вже зниклі
        explanation: Зниклі називає результат завершеної зміни.
      - sentence: "Після хвороби він мав ____ обличчя. (змарніти)"
        answer: змарніле
        options:
          - змарніле
          - змарнівше
          - марніюче
        explanation: Змарніле є активною минулою формою з -л-.
      - sentence: "У технічному описі природно сказати ____ стіна."
        answer: несуча
        options:
          - несуча
          - несла
          - несивша
        explanation: Несуча стіна є усталеним технічним словосполученням.
      - sentence: "У нейтральному тексті краще: студенти, ____ над проєктом."
        answer: які працюють
        options:
          - які працюють
          - працюючі
          - працювавші
        explanation: Для дії людей природніше підрядне речення.
      - sentence: "Замість всі бажаючі нормативніше сказати усі ____."
        answer: охочі
        options:
          - охочі
          - бажаючі
          - бажавші
        explanation: Охочі є природним українським відповідником.
  - id: act-3
    type: match-up
    title: Редакторські заміни
    instruction: Поєднайте небажану форму з природним українським відповідником.
    pairs:
      - left: діючий закон
        right: чинний закон
      - left: існуючі умови
        right: наявні умови
      - left: миючий засіб
        right: мийний засіб
      - left: всі бажаючі
        right: усі охочі
      - left: головуючий на зборах
        right: голова зборів
      - left: завідуючий кафедрою
        right: завідувач кафедри
      - left: працюючі студенти
        right: студенти, які працюють
      - left: сидячі місця
        right: місця для сидіння
      - left: хвилюючий спогад
        right: зворушливий спогад
      - left: підростаюче покоління
        right: молоде покоління
      - left: координуючий центр
        right: координаційний центр
      - left: початкуючий художник
        right: художник-початківець
  - id: act-4
    type: group-sort
    title: Природне, результативне, редагуємо
    instruction: Розподіліть приклади за найкращим рішенням.
    groups:
      - label: "Усталена або термінологічна форма"
        items:
          - несуча конструкція
          - блукаючий нерв
          - лежачий хворий
      - label: "Активний минулий результат"
        items:
          - зів'яла квітка
          - опале листя
          - посивілий чоловік
      - label: "Краще замінити прикметником"
        items:
          - діючий договір
          - існуюча проблема
          - миючий засіб
      - label: "Краще замінити іменником або підрядним реченням"
        items:
          - головуючий на засіданні
          - працюючі влітку студенти
          - знаюча правила людина
  - id: act-5
    type: error-correction
    title: Виправте кальку або форму
    instruction: Виправте одну головну помилку в кожному реченні.
    items:
      - sentence: "У заяві треба вказати діючий правопис."
        error: діючий
        correction: чинний
        explanation: Для правопису або закону природний прикметник чинний.
      - sentence: "Ми купили миючий засіб для аудиторії."
        error: миючий
        correction: мийний
        explanation: Нормативно мийний засіб.
      - sentence: "Головуючий на зборах відкрив обговорення."
        error: Головуючий на зборах
        correction: Голова зборів
        explanation: Роль краще назвати іменником.
      - sentence: "Зів'явша квітка стояла біля вікна."
        error: Зів'явша
        correction: Зів'яла
        explanation: Українська не творить цю форму через -вш-; потрібна форма з -л-.
      - sentence: "На столі лежали опавші листки."
        error: опавші
        correction: опалі
        explanation: Нормативна активна минула форма - опалі.
      - sentence: "Початкуючий художник показав першу виставку."
        error: Початкуючий художник
        correction: Художник-початківець
        explanation: Природний відповідник - художник-початківець.
      - sentence: "Працюючі над проєктом студенти залишилися в бібліотеці."
        error: Працюючі над проєктом студенти
        correction: Студенти, які працювали над проєктом
        explanation: Для дії людей природніше підрядне речення.
      - sentence: "У документі описано існуючі правила поселення."
        error: існуючі
        correction: наявні
        explanation: Наявні правила звучать природніше й точніше.
      - sentence: "Завідуючий кафедрою підписав лист."
        error: Завідуючий
        correction: Завідувач
        explanation: Нормативна назва посади - завідувач кафедри.
      - sentence: "Посинівший від холоду турист зайшов до кав'ярні."
        error: Посинівший
        correction: Посинілий
        explanation: Українська форма має суфікс -л-, не -вш-.
      - sentence: "Усі бажаючі можуть записатися на консультацію."
        error: бажаючі
        correction: охочі
        explanation: Усі охочі - природний відповідник.
      - sentence: "Сидячі місця біля сцени вже зайняті."
        error: Сидячі місця
        correction: Місця для сидіння
        explanation: Нормативніше місця для сидіння.
workbook:
  - id: wb-1
    type: quiz
    title: Норма і значення
    instruction: Оберіть нормативний або стилістично доречний варіант.
    items:
      - question: "Який варіант нормативний для офіційного документа?"
        options:
          - чинний договір
          - діючий договір
          - діявший договір
        correct: 0
        explanation: У діловому стилі кажемо чинний договір.
      - question: "Який варіант природний для результату зміни?"
        options:
          - пожовклі сторінки
          - пожовтівші сторінки
          - жовтіючі сторінки в значенні вже пожовклі
        correct: 0
        explanation: Пожовклі називає завершений результат.
      - question: "Що краще в нейтральному тексті?"
        options:
          - людина, яка знає правила
          - знаюча правила людина
          - знавша правила людина
        correct: 0
        explanation: Підрядна частина звучить природніше.
      - question: "Яка форма є усталеним терміном?"
        options:
          - блукаючий нерв
          - біжучий студент
          - говорячий сусід
        correct: 0
        explanation: Блукаючий нерв - термін; інші форми неприродні.
      - question: "Який варіант замінює мандруючий сюжет?"
        options:
          - мандрівний сюжет
          - мандруючий сюжет
          - мандрувавший сюжет
        correct: 0
        explanation: Мандрівний сюжет - природний прикметниковий відповідник.
      - question: "Який варіант є активним минулим дієприкметником?"
        options:
          - збанкрутіле підприємство
          - збанкрутоване підприємство в значенні саме збанкрутіло
          - банкрутуюче підприємство
        correct: 0
        explanation: Збанкрутіле означає підприємство, що збанкрутіло.
      - question: "Який варіант краще для посади?"
        options:
          - завідувач кафедри
          - завідуючий кафедрою
          - завідувавший кафедрою
        correct: 0
        explanation: Завідувач - нормативна назва ролі.
      - question: "Що означає опале листя?"
        options:
          - листя, що опало
          - листя, яке хтось написав
          - листя, що буде опадати завтра
        correct: 0
        explanation: Це активний минулий результат.
      - question: "Який варіант природний для побутового предмета?"
        options:
          - зволожувальний крем
          - зволожуючий крем
          - зволоживший крем
        correct: 0
        explanation: Прикметник із -альн- є нормативним відповідником.
      - question: "Яка фраза має книжний, але природний опис природи?"
        options:
          - синіючі вдалині гори
          - говорячі вдалині гори
          - синівші вдалині гори
        correct: 0
        explanation: Синіючі вдалині гори можливе як художній опис.
      - question: "Який варіант краще для покоління?"
        options:
          - молоде покоління
          - підростаюче покоління
          - підростивше покоління
        correct: 0
        explanation: Молоде покоління - природна заміна.
      - question: "Який приклад показує активний дієприкметник, що став прикметником?"
        options:
          - родючий ґрунт
          - роблячий учень
          - існуючий план
        correct: 0
        explanation: Родючий сприймається як усталений прикметник.
  - id: wb-2
    type: cloze
    title: Короткий редакторський огляд
    instruction: Заповніть пропуски нормативними формами.
    text: "У тексті про парк краще написати: {1} листя лежало біля алеї, а {2} кущі закривали стару огорожу. Якщо йдеться про закон, кажемо {3} закон, а не діючий. Для засобу для прибирання нормативна форма - {4} засіб. Посаду в університеті називаємо {5} кафедри, не завідуючий кафедрою. Людей, які хочуть долучитися, називаємо усі {6}. Якщо люди справді виконують дію зараз, часто природніше сказати студенти, {7} над проєктом. Форма від зів'янути - {8} квітка, від посивіти - {9} чоловік, від зникнути - {10} документ. Українська не використовує модель {11} для таких форм, тому треба писати посинілий, а не посинівший. Наступний модуль пояснить {12} дієприкметники, де дію виконують над предметом."
    blanks:
      - id: 1
        answer: опале
        options:
          - опале
          - опавше
          - опадаюче
      - id: 2
        answer: розквітлі
        options:
          - розквітлі
          - розквітнувші
          - розквітаючі
      - id: 3
        answer: чинний
        options:
          - чинний
          - діючий
          - діявший
      - id: 4
        answer: мийний
        options:
          - мийний
          - миючий
          - мивший
      - id: 5
        answer: завідувач
        options:
          - завідувач
          - завідуючий
          - завідувавший
      - id: 6
        answer: охочі
        options:
          - охочі
          - бажаючі
          - бажавші
      - id: 7
        answer: які працюють
        options:
          - які працюють
          - працюючі
          - працювавші
      - id: 8
        answer: зів'яла
        options:
          - зів'яла
          - зів'явша
          - в'януча
      - id: 9
        answer: посивілий
        options:
          - посивілий
          - посивівший
          - сивіючий
      - id: 10
        answer: зниклий
        options:
          - зниклий
          - зникнувший
          - зникаючий
      - id: 11
        answer: -вш-
        options:
          - -вш-
          - -л-
          - -н-
      - id: 12
        answer: пасивні
        options:
          - пасивні
          - активні теперішні
          - кличні
  - id: wb-3
    type: match-up
    title: Форма і пояснення
    instruction: Поєднайте форму з поясненням.
    pairs:
      - left: зів'ялий
        right: активний минулий результат від зів'янути
      - left: розквітлий
        right: активний минулий результат від розквітнути
      - left: опалий
        right: природна форма для листя, що опало
      - left: посивілий
