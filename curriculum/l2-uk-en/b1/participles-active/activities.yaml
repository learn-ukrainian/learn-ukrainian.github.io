  - id: wb-4
    type: group-sort
    title: Регістр і рішення
    instruction: Розподіліть словосполучення за тим, як з ними працювати.
    groups:
      - label: "Залишити як природне"
        items:
          - квітучий сад
          - родючий ґрунт
          - опале листя
      - label: "Термін або фаховий контекст"
        items:
          - несуча стіна
          - блукаючий нерв
          - лежачий хворий
      - label: "Замінити прикметником"
        items:
          - домінуючий мотив
          - хвилюючий спогад
          - існуючі умови
      - label: "Замінити іменником, фразою або реченням"
        items:
          - завідуючий кафедрою
          - сидячі місця
          - людина, знаюча тему
  - id: wb-5
    type: error-correction
    title: Фінальна редактура
    instruction: Виправте одну помилку в кожному реченні.
    items:
      - sentence: "У чинному договорі описано існуючі умови оренди."
        error: існуючі
        correction: наявні
        explanation: Наявні умови природніше за існуючі умови.
      - sentence: "Збанкрутівше підприємство продали новому власнику."
        error: Збанкрутівше
        correction: Збанкрутіле
        explanation: Потрібна активна минула форма з -л-.
      - sentence: "Усі бажаючі студенти можуть прийти на консультацію."
        error: бажаючі
        correction: охочі
        explanation: Усі охочі - нормативна заміна.
      - sentence: "Підростаюче покоління краще читає цифрові тексти."
        error: Підростаюче
        correction: Молоде
        explanation: Молоде покоління звучить природніше.
      - sentence: "Після морозу ми побачили пожовтівші сторінки старого зошита."
        error: пожовтівші
        correction: пожовклі
        explanation: Нормативна форма - пожовклі сторінки.
      - sentence: "Координуючий центр надіслав інструкцію."
        error: Координуючий
        correction: Координаційний
        explanation: Координаційний центр - природна прикметникова форма.
      - sentence: "Людина, знаюча цю тему, допоможе групі."
        error: знаюча цю тему
        correction: яка знає цю тему
        explanation: Для дії людини природніше підрядне речення.
      - sentence: "У лабораторії потрібні знеболюючі ліки."
        error: знеболюючі
        correction: знеболювальні
        explanation: Нормативна прикметникова форма - знеболювальні.
      - sentence: "На дошці висів список працюючих над проєктом студентів."
        error: працюючих над проєктом
        correction: які працюють над проєктом
        explanation: Підрядна частина природніше передає дію студентів.
      - sentence: "У парку стояли розквітнувші після дощу кущі."
        error: розквітнувші
        correction: розквітлі
        explanation: Українська форма має суфікс -л-.
      - sentence: "У кімнаті є сидячі місця для двадцяти людей."
        error: сидячі місця
        correction: місця для сидіння
        explanation: Нормативніше місця для сидіння.
      - sentence: "Діявший раніше порядок уже не чинний."
        error: Діявший раніше
        correction: Попередній
        explanation: Попередній порядок природніше за форму на -вш-.
