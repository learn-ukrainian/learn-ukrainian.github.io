- title: "B1 M65: Активні дієприкметники"
  role: curriculum
  notes: "Основний модуль про ознаку за дією самого предмета, форми теперішнього й минулого часу та редагування кальок."
- title: "Авраменко, 7 клас: активні й пасивні дієприкметники"
  role: reference
  notes: "Джерело для творення активних форм теперішнього й минулого часу, суфікса -л- і заборони форм на -вш-."
- title: "Авраменко, 11 клас: морфологічна норма"
  role: reference
  notes: "Джерело для обмеженого вживання активних дієприкметників теперішнього часу та стратегій заміни кальок."
- title: "Литвінова, 7 клас: дієприкметник"
  role: reference
  notes: "Джерело для таблиці активних і пасивних дієприкметників, значення активного стану та прикладів із -уч-/-юч-, -ач-/-яч-, -л-."
- title: "Глазова, 11 клас: паралельні нормативні форми"
  role: reference
  notes: "Джерело для природних відповідників на кшталт охочий, працівник, завідувач, мийний, знеболювальний, чинний."
