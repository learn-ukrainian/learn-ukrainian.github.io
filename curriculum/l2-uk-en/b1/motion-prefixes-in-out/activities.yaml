version: '1.0'
module: motion-prefixes-in-out
level: b1
inline:
  - id: act-1
    type: quiz
    title: Вхід чи вихід?
    instruction: Оберіть дієслово, яке найкраще відповідає просторовому фокусу.
    items:
      - question: "Стажер ____ у кабінет координаторки."
        options:
          - зайшов
          - вийшов
          - відійшов
        correct: 0
        explanation: У кабінет означає рух усередину, тому зайшов.
      - question: "Директор ____ з кабінету після зустрічі."
        options:
          - вийшов
          - зайшов
          - прийшов
        correct: 0
        explanation: З кабінету означає вихід назовні.
      - question: "Машина повільно ____ у двір."
        options:
          - заїхала
          - вийшла
          - вибігла
        correct: 0
        explanation: Транспорт рухається всередину двору, тому заїхала.
      - question: "Таксі ____ з гаража на дорогу."
        options:
          - виїхало
          - зайшло
          - заїхало
        correct: 0
        explanation: З гаража називає вихід транспорту з простору.
      - question: "Студент ____ до пошти на п'ять хвилин."
        options:
          - забіг
          - вибіг
          - відбіг
        correct: 0
        explanation: До пошти на короткий час - забіг.
      - question: "Діти ____ з класу на перерву."
        options:
          - вибігли
          - забігли
          - прибігли
        correct: 0
        explanation: З класу й швидкий рух назовні дають вибігли.
      - question: "____ парасолю в дім, бо починається дощ."
        options:
          - Занеси
          - Винеси
          - Вивези
        correct: 0
        explanation: Предмет несуть руками усередину, тому занеси.
      - question: "____ сміття з кухні, будь ласка."
        options:
          - Винеси
          - Занеси
          - Заведи
        correct: 0
        explanation: Предмет несуть руками зсередини назовні.
      - question: "Секретар ____ гостя до переговорної."
        options:
          - завів
          - заніс
          - заїхав
        correct: 0
        explanation: Людину ведуть усередину, тому завів.
      - question: "Учителька ____ дітей з музею."
        options:
          - вивела
          - винесла
          - виїхала
        correct: 0
        explanation: Людей ведуть назовні, тому вивела.
      - question: "Птах ____ у відчинене вікно."
        options:
          - залетів
          - вилетів
          - заїхав
        correct: 0
        explanation: Рух повітрям усередину - залетів.
      - question: "Човен ____ із затоки на річку."
        options:
          - виплив
          - заплив
          - вибіг
        correct: 0
        explanation: Рух водою зсередини затоки назовні - виплив.
  - id: act-2
    type: fill-in
    title: Форми і прийменники
    instruction: Заповніть пропуск правильною формою або прийменником.
    items:
      - sentence: "Завтра після роботи я ____ до аптеки. (зайти)"
        answer: зайду
        options:
          - зайду
          - вийду
          - зайшов
        explanation: Я і завтра дають майбутню форму зайду.
      - sentence: "Завтра вона ____ з офісу о шостій. (вийти)"
        answer: вийде
        options:
          - вийде
          - зайде
          - вийшла
        explanation: Вона й завтра потребують майбутньої форми вийде.
      - sentence: "Таксі ____ на парковку біля входу. (заїхати)"
        answer: заїхало
        options:
          - заїхало
          - виїхало
          - зайшло
        explanation: Таксі - транспорт, рух усередину парковки - заїхало.
      - sentence: "Ми ____ з міста рано-вранці. (виїхати)"
        answer: виїхали
        options:
          - виїхали
          - заїхали
          - пішли
        explanation: З міста означає рух транспортом за межу міста.
      - sentence: "Колега ____ до друкарні по анкети. (забігти)"
        answer: забіг
        options:
          - забіг
          - вибіг
          - відбіг
        explanation: До друкарні на коротку справу - забіг.
      - sentence: "Діти ____ з під'їзду, коли приїхало таксі. (вибігти)"
        answer: вибігли
        options:
          - вибігли
          - забігли
          - прибігли
        explanation: З під'їзду означає швидкий вихід назовні.
      - sentence: "Я ____ документи в кабінет. (занести)"
        answer: занесу
        options:
          - занесу
          - винесу
          - завезу
        explanation: Документи несуть руками усередину кабінету.
      - sentence: "Прибиральниця ____ стільці з аудиторії. (винести)"
        answer: винесла
        options:
          - винесла
          - занесла
          - вивела
        explanation: Стільці несуть зсередини аудиторії назовні.
      - sentence: "Секретарка ____ відвідувача до зали. (завести)"
        answer: завела
        options:
          - завела
          - занесла
          - заїхала
        explanation: Відвідувача ведуть усередину, тому завела.
      - sentence: "Охоронець ____ людей із залу. (вивести)"
        answer: вивів
        options:
          - вивів
          - виніс
          - виїхав
        explanation: Людей ведуть назовні, тому вивів.
      - sentence: "Птах ____ з кімнати через балкон. (вилетіти)"
        answer: вилетів
        options:
          - вилетів
          - залетів
          - виплив
        explanation: З кімнати повітрям назовні - вилетів.
      - sentence: "Човен ____ у тиху затоку. (заплисти)"
        answer: заплив
        options:
          - заплив
          - виплив
          - забіг
        explanation: Рух водою всередину затоки - заплив.
  - id: act-3
    type: match-up
    title: Пари за- і ви-
    instruction: Поєднайте дієслово входу з найближчим дієсловом виходу.
    pairs:
      - left: зайти
        right: вийти
      - left: заїхати
        right: виїхати
      - left: забігти
        right: вибігти
      - left: занести
        right: винести
      - left: завести
        right: вивести
      - left: завезти
        right: вивезти
      - left: залетіти
        right: вилетіти
      - left: заплисти
        right: виплисти
      - left: заходити
        right: виходити
      - left: заїжджати
        right: виїжджати
      - left: заносити
        right: виносити
      - left: забігати
        right: вибігати
  - id: act-4
    type: group-sort
    title: Який префікс працює?
    instruction: Розподіліть фрази за просторовим або словотвірним фокусом.
    groups:
      - label: "За-: вхід або короткий візит"
        items:
          - зайти в аудиторію
          - забігти до пошти
          - занести коробку в офіс
      - label: "Ви-: вихід назовні"
        items:
          - вийти з аудиторії
          - вибігти з під'їзду
          - винести коробку зі складу
      - label: "За-: початок дії, не рух"
        items:
          - заспівати пісню
          - засміятися голосно
          - заговорити українською
      - label: Інший фокус руху
        items:
          - прийти до офісу
          - відійти від дверей
          - поїхати до Львова
  - id: act-5
    type: error-correction
    title: Редагування входу й виходу
    instruction: Виправте помилку в кожному реченні.
    items:
      - sentence: "Я зайшов у друга після роботи."
        error: у друга
        correction: "Я зайшов до друга після роботи."
        explanation: До людини або на короткий візит потрібне до + родовий.
      - sentence: "Вона вийшла від магазину з покупками."
        error: від магазину
        correction: "Вона вийшла з магазину з покупками."
        explanation: Якщо людина була всередині магазину, потрібне з + родовий.
      - sentence: "Діти забігли з класу на урок."
        error: з класу
        correction: "Діти забігли до класу на урок."
        explanation: Рух усередину до класу потребує до або в/у.
      - sentence: "Машина зайшла у двір."
        error: зайшла
        correction: "Машина заїхала у двір."
        explanation: Машина рухається транспортом, тому заїхала.
      - sentence: "Кур'єр завів коробки на склад вантажівкою."
        error: завів
        correction: "Кур'єр завіз коробки на склад вантажівкою."
        explanation: Вантажівкою означає транспортувати, тому завіз.
      - sentence: "Винеси гостя з кімнати, будь ласка."
        error: Винеси
        correction: "Виведи гостя з кімнати, будь ласка."
        explanation: Людину ведуть, а не несуть.
      - sentence: "Вивези сміття з кухні в руках."
        error: Вивези
        correction: "Винеси сміття з кухні в руках."
        explanation: У руках означає нести.
      - sentence: "Птах виїхав з клітки."
        error: виїхав
        correction: "Птах вилетів з клітки."
        explanation: Птах рухається повітрям, тому вилетів.
      - sentence: "Човен вибіг із затоки."
        error: вибіг
        correction: "Човен виплив із затоки."
        explanation: Човен рухається водою.
      - sentence: "Вона заспівала в кабінет."
        error: заспівала
        correction: "Вона зайшла в кабінет."
        explanation: Заспівала означає почала співати, а не увійшла.
      - sentence: "Ми заїхали до офісу пішки."
        error: заїхали
        correction: "Ми зайшли до офісу пішки."
        explanation: Пішки потребує зайти, не заїхати.
      - sentence: "Він вийшов до кабінету директора на розмову."
        error: вийшов до
        correction: "Він зайшов до кабінету директора на розмову."
        explanation: До кабінету на розмову означає рух усередину, тому зайшов.
workbook:
  - id: wb-1
    type: quiz
    title: Просторова логіка за-/ви-
    instruction: Оберіть природний варіант.
    items:
      - question: "Коли людина перетинає двері всередину кабінету, вона ____."
        options:
          - заходить у кабінет
          - виходить з кабінету
          - відходить від кабінету
        correct: 0
        explanation: Усередину кабінету - заходить.
      - question: "Коли людина залишає кабінет, вона ____."
        options:
          - виходить з кабінету
          - заходить до кабінету
          - доходить до кабінету
        correct: 0
        explanation: З кабінету - виходить.
      - question: "Короткий візит до лікаря природно звучить як ____."
        options:
          - зайти до лікаря
          - зайти в лікаря
          - вийти до лікаря
        correct: 0
        explanation: До людини або спеціаліста потрібне до + родовий.
      - question: "Вихід із магазину після покупки - це ____."
        options:
          - вийти з магазину
          - вийти від магазину
          - зайти з магазину
        correct: 0
        explanation: Зсередини магазину - з магазину.
      - question: "Автомобіль, що потрапляє на парковку, ____."
        options:
          - заїжджає на парковку
          - заходить на парковку
          - вибігає на парковку
        correct: 0
        explanation: Автомобіль рухається транспортом.
      - question: "Автомобіль, що залишає гараж, ____."
        options:
          - виїжджає з гаража
          - заходить з гаража
          - відходить з гаража
        correct: 0
        explanation: Транспорт виходить із простору - виїжджає.
      - question: "Предмет у руках переносять усередину словом ____."
        options:
          - занести
          - завести
          - заїхати
        correct: 0
        explanation: Руками - нести.
      - question: "Людину з кімнати назовні треба ____."
        options:
          - вивести
          - винести
          - виїхати
        correct: 0
        explanation: Людину ведуть, тому вивести.
      - question: "Коробки вантажівкою зі складу треба ____."
        options:
          - вивезти
          - винести
          - вийти
        correct: 0
        explanation: Вантажівкою - везти.
      - question: "Птах, що потрапив у кімнату через вікно, ____."
        options:
          - залетів у кімнату
          - заплив у кімнату
          - заїхав у кімнату
        correct: 0
        explanation: Рух повітрям усередину - залетів.
      - question: "Човен, що залишив затоку, ____."
        options:
          - виплив із затоки
          - вибіг із затоки
          - вилетів із затоки
        correct: 0
        explanation: Водою назовні - виплив.
      - question: "У реченні «Вона засміялася» префікс за- означає ____."
        options:
          - початок дії, не вхід
          - вхід у кімнату
          - вихід із простору
        correct: 0
        explanation: Засміятися - почати сміятися, не дієслово руху.
  - id: wb-2
    type: match-up
    title: Фраза і просторовий зміст
    instruction: Поєднайте фразу з точним описом.
    pairs:
      - left: зайти в аудиторію
        right: увійти до навчального простору
      - left: зайти до друга
        right: зробити короткий візит до людини
      - left: заїхати на парковку
        right: потрапити транспортом на майданчик
      - left: забігти до пошти
        right: швидко заскочити до установи
      - left: занести папку в кабінет
        right: перенести предмет руками усередину
      - left: завести гостя до кімнати
        right: привести людину всередину
      - left: вийти з аудиторії
        right: залишити навчальний простір
      - left: виїхати з гаража
        right: виїхати транспортом назовні
      - left: вибігти з під'їзду
        right: швидко залишити будинок
      - left: винести коробку зі складу
        right: перенести предмет руками назовні
      - left: вивести групу з музею
        right: повести людей назовні
      - left: вивезти меблі з квартири
        right: транспортувати речі з приміщення
  - id: wb-3
    type: group-sort
    title: Прийменник і відмінок
    instruction: Розподіліть фрази за моделлю керування.
    groups:
      - label: В/у + знахідний
        items:
          - зайти в кабінет
          - занести речі у кімнату
          - залетіти у вікно
      - label: До + родовий
        items:
          - зайти до друга
          - забігти до аптеки
          - заїхати до сервісу
      - label: З/із/зі + родовий
        items:
          - вийти з офісу
          - виїхати із двору
          - винести коробки зі складу
      - label: На + знахідний
        items:
          - вийти на вулицю
          - виїхати на дорогу
          - заїхати на парковку
  - id: wb-4
    type: fill-in
    title: Рутинні справи
    instruction: Заповніть пропуски формами за-/ви- або прийменниками.
    items:
      - sentence: "Щодня вона ____ з дому о восьмій. (виходити)"
        answer: виходить
        options:
          - виходить
          - заходить
          - вийшла
        explanation: Щодня потребує недоконаної форми виходить.
      - sentence: "Після роботи він часто ____ до цієї кав'ярні. (заходити)"
        answer: заходить
        options:
          - заходить
          - виходить
          - зайшов
        explanation: Часто потребує недоконаної форми заходить.
      - sentence: "Машини ____ з паркінгу після концерту. (виїжджати)"
        answer: виїжджають
        options:
          - виїжджають
          - заїжджають
          - виходять
        explanation: З паркінгу транспортом назовні - виїжджають.
      - sentence: "Кур'єри ____ на склад після обіду. (заїжджати)"
        answer: заїжджають
        options:
          - заїжджають
          - виїжджають
          - заходять
        explanation: На склад транспортом усередину - заїжджають.
      - sentence: "Зайдіть ____ кабінет, будь ласка. (в/у)"
        answer: у
        options:
          - у
          - з
          - від
        explanation: Кабінет як простір потребує в/у + знахідний.
      - sentence: "Я зайду ____ лікаря після обіду. (до)"
        answer: до
        options:
          - до
          - у
          - від
        explanation: До людини або спеціаліста вживаємо до + родовий.
      - sentence: "Вийдіть ____ будівлі через бічні двері. (з)"
        answer: з
        options:
          - з
          - до
          - в
        explanation: Вихід із простору потребує з + родовий.
      - sentence: "Вийдіть ____ вулицю й зачекайте біля входу. (на)"
        answer: на
        options:
          - на
          - з
          - до
        explanation: Поява на відкритому місці - на + знахідний.
      - sentence: "Працівники ____ коробки в архів щоп'ятниці. (заносити)"
        answer: заносять
        options:
          - заносять
          - виносять
          - заводять
        explanation: Щоп'ятниці потребує недоконаного заносять.
      - sentence: "Черговий ____ сміття з офісу щовечора. (виносити)"
        answer: виносить
        options:
          - виносить
          - заносить
          - вивозить
        explanation: Сміття несуть з офісу назовні регулярно.
      - sentence: "Охоронець ____ відвідувачів із залу після події. (вивести)"
        answer: вивів
        options:
          - вивів
          - виніс
          - виїхав
        explanation: Відвідувачів ведуть назовні.
      - sentence: "Водій ____ обладнання у двір вантажівкою. (завезти)"
        answer: завіз
        options:
          - завіз
          - заніс
          - завів
        explanation: Вантажівкою означає завіз.
  - id: wb-5
    type: cloze
    title: Перший день у центрі
    instruction: Заповніть пропуски формами за-/ви- або потрібними прийменниками.
