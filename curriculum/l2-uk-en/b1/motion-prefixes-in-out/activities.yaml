  - id: wb-6
    type: translate
    title: "Переклад: вхід, короткий візит і вихід"
    instruction: Оберіть природний український переклад.
    items:
      - source: Come into the office, please.
        options:
          - text: Зайдіть в офіс, будь ласка.
            correct: true
          - text: Вийдіть в офіс, будь ласка.
            correct: false
        explanation: Вхід у простір - зайти в/у.
      - source: I will drop by the pharmacy after work.
        options:
          - text: Я зайду до аптеки після роботи.
            correct: true
          - text: Я вийду до аптеки після роботи.
            correct: false
        explanation: Короткий візит до установи - зайти до.
      - source: She left the store with purchases.
        options:
          - text: Вона вийшла з магазину з покупками.
            correct: true
          - text: Вона вийшла від магазину з покупками.
            correct: false
        explanation: Вихід ізсередини магазину - з магазину.
      - source: The car drove into the yard.
        options:
          - text: Машина заїхала у двір.
            correct: true
          - text: Машина зайшла у двір.
            correct: false
        explanation: Рух транспорту у двір - заїхала.
      - source: The car drove out of the garage.
        options:
          - text: Машина виїхала з гаража.
            correct: true
          - text: Машина вийшла з гаража.
            correct: false
        explanation: Рух транспорту назовні - виїхала.
      - source: Run into the post office for a minute.
        options:
          - text: Забіжи до пошти на хвилину.
            correct: true
          - text: Вибіжи до пошти на хвилину.
            correct: false
        explanation: Короткий рух до пошти - забіжи.
      - source: The children ran out of the classroom.
        options:
          - text: Діти вибігли з класу.
            correct: true
          - text: Діти забігли з класу.
            correct: false
        explanation: Рух із класу назовні - вибігли з класу.
      - source: Carry the umbrella into the house.
        options:
          - text: Занеси парасолю в дім.
            correct: true
          - text: Винеси парасолю в дім.
            correct: false
        explanation: Перенесення в дім - занести.
      - source: Take the trash out of the kitchen.
        options:
          - text: Винеси сміття з кухні.
            correct: true
          - text: Занеси сміття з кухні.
            correct: false
        explanation: Винесення з кухні - винести.
      - source: Lead the guest into the room.
        options:
          - text: Заведи гостя до кімнати.
            correct: true
          - text: Занеси гостя до кімнати.
            correct: false
        explanation: Гостя ведуть, а не несуть.
      - source: Lead the group out of the museum.
        options:
          - text: Виведи групу з музею.
            correct: true
          - text: Винеси групу з музею.
            correct: false
        explanation: Групу виводять.
      - source: The boat sailed out of the bay.
        options:
          - text: Човен виплив із затоки.
            correct: true
          - text: Човен заплив із затоки.
            correct: false
        explanation: Рух із затоки назовні - виплив із затоки.
  - id: wb-7
    type: error-correction
    title: Виправлення маршруту в будівлі
    instruction: Виправте помилку в кожному реченні.
    items:
      - sentence: "Зайдіть з кабінету після дзвінка."
        error: Зайдіть з
        correction: "Вийдіть з кабінету після дзвінка."
        explanation: З кабінету означає вихід.
      - sentence: "Вийдіть у кабінет директора."
        error: Вийдіть у
        correction: "Зайдіть у кабінет директора."
        explanation: У кабінет означає вхід.
      - sentence: "Я зайду у лікаря завтра."
        error: у лікаря
        correction: "Я зайду до лікаря завтра."
        explanation: До людини або спеціаліста потрібне до.
      - sentence: "Вона вийшла від офісу о шостій."
        error: від офісу
        correction: "Вона вийшла з офісу о шостій."
        explanation: Зсередини офісу - з офісу.
      - sentence: "Автобус вийшов з депо."
        error: вийшов
        correction: "Автобус виїхав з депо."
        explanation: Автобус рухається транспортом.
      - sentence: "Студент заїхав до аудиторії пішки."
        error: заїхав
        correction: "Студент зайшов до аудиторії пішки."
        explanation: Пішки потребує зайшов.
      - sentence: "Секретарка занесла директора до зали."
        error: занесла
        correction: "Секретарка завела директора до зали."
        explanation: Людину ведуть, не несуть.
      - sentence: "Охоронець виніс відвідувачів із залу."
        error: виніс
        correction: "Охоронець вивів відвідувачів із залу."
        explanation: Відвідувачів ведуть назовні.
      - sentence: "Вантажівка занесла меблі на склад."
        error: занесла
        correction: "Вантажівка завезла меблі на склад."
        explanation: Вантажівка перевозить.
      - sentence: "Працівник вивіз коробку в руках зі складу."
        error: вивіз
        correction: "Працівник виніс коробку в руках зі складу."
        explanation: У руках означає виніс.
      - sentence: "Птах заплив у вікно."
        error: заплив
        correction: "Птах залетів у вікно."
        explanation: Птах рухається повітрям.
      - sentence: "Човен вилетів із затоки."
        error: вилетів
        correction: "Човен виплив із затоки."
        explanation: Човен рухається водою.
  - id: wb-8
    type: essay-response
    title: Будівля з багатьма дверима
    instruction: Опишіть ранок у будівлі, використавши щонайменше чотири дієслова із за- та чотири дієслова з ви-.
    min_words: 120
    prompt: "Опишіть, хто заходить, заїжджає, заносить речі, виходить, виїжджає або виносить речі. Зверніть увагу на правильні прийменники: в/у, до, з/із/зі, на."
    model_answer: "О восьмій я зайшов у будівлю культурного центру через головний вхід. Секретарка завела мене до кабінету координаторки, а потім я вийшов з кабінету й забіг до друкарні по анкети. Після цього я заніс папки в аудиторію і вийшов на подвір'я зустріти групу. Біля воріт вантажівка заїхала у двір, і водій завіз коробки на склад. Працівники винесли старі ящики зі складу, а прибиральниця винесла сміття з кухні. Коли почалася екскурсія, учителька завела дітей до музею, а після заняття вивела їх із зали на подвір'я. Увечері машина виїхала з двору на головну дорогу, а я вийшов з будівлі через бічний вхід."
    rubric:
      - criteria: дієслова із за-
        description: Є щонайменше чотири форми із за- у просторовому значенні входу або короткого візиту.
      - criteria: дієслова з ви-
        description: Є щонайменше чотири форми з ви- у значенні виходу назовні.
      - criteria: спосіб руху
        description: Пішки, транспортом, бігом, руками, веденням людини та перевезенням не змішані.
      - criteria: керування
        description: В/у + знахідний, до + родовий, з/із/зі + родовий і на + знахідний ужиті природно.
      - criteria: зміст
        description: Текст описує послідовну сцену, а не список окремих речень.
