  - id: wb-8
    type: essay-response
    title: Мініпояснення перед наступним блоком
    instruction: Напишіть 7-9 речень, у яких поясните три різні дієслівні явища з цього контрольного модуля.
    prompt: "Виберіть три явища: умовний спосіб, наказовий спосіб, зворотні дієслова, пасив, віддієслівні іменники або словотвір. Для кожного дайте один власний приклад і поясніть, чому форма природна. Обов'язково додайте одне речення про типову помилку, якої треба уникати."
    min_words: 90
    model_answer: "Якби я мав більше часу, я переписав би звіт: це нереальна умова, тому потрібні якби, минулий час і частка би. У реченні Не відкривайте файл без перевірки наказ є забороною, тому природний недоконаний вид. Але Не забудьте паспорт є конкретним нагадуванням, тому доконаний вид можливий. Мені сьогодні не спиться - безособове зворотне дієслово з давальним відмінком. Заявку прийнято ставить у центр результат, а не виконавця. Після обговорення ми ухвалили рішення має віддієслівний іменник після прийменника. Типова помилка - механічно виправляти всі пасиви або всі заперечні накази за одним правилом."
    rubric:
      - criteria: "Охоплення"
        description: "Пояснено три різні явища."
        points: 3
      - criteria: "Приклади"
        description: "Кожне явище має власний природний приклад."
        points: 3
      - criteria: "Пояснення"
        description: "Форми пояснено через функцію, а не тільки назву правила."
        points: 2
      - criteria: "Помилка"
        description: "Названо одну типову помилку або надмірне узагальнення."
        points: 1
      - criteria: "Мова"
        description: "Текст зрозумілий, зв'язний і відповідає B1."
        points: 1
