version: '1.0'
module: checkpoint-verbs
level: b1
inline:
  - id: act-1
    type: quiz
    title: Що перевіряється?
    instruction: Оберіть граматичну функцію, яку треба пояснити в реченні.
    items:
      - question: "Якби я мав час, написав би відповідь."
        options:
          - "нереальна умова й умовний спосіб"
          - "стандартна заборона"
          - "пасив на -но/-то"
        correct: 0
        explanation: "Якби + минулий час + би створює нереальну умовну рамку."
      - question: "Якщо команда погодиться, ми оновимо інструкцію."
        options:
          - "реальна умова"
          - "безособове зворотне дієслово"
          - "віддієслівний іменник"
        correct: 0
        explanation: "Якщо вводить можливу умову з дійсним способом."
      - question: "Не відкривайте файл без перевірки."
        options:
          - "заперечний наказ-заборона"
          - "нереальна умова"
          - "суфіксальний словотвір"
        correct: 0
        explanation: "Це стандартна заборона, тому природний недоконаний наказ."
      - question: "Не забудьте паспорт."
        options:
          - "конкретне нагадування"
          - "пасивноподібне -ся"
          - "безафіксний спосіб"
        correct: 0
        explanation: "Тут доконаний вид природний, бо йдеться про один небажаний результат."
      - question: "Мені сьогодні не спиться."
        options:
          - "безособове зворотне дієслово"
          - "видова пара"
          - "активний стан"
        correct: 0
        explanation: "Давальний мені + не спиться створює безособову конструкцію."
      - question: "Квитки продаються онлайн."
        options:
          - "пасивноподібне або середнє значення -ся"
          - "наказ першої особи множини"
          - "нереальна умова"
        correct: 0
        explanation: "Форма на -ся описує спосіб продажу без названого продавця."
      - question: "Заявку прийнято."
        options:
          - "пасив на -но/-то"
          - "взаємне зворотне дієслово"
          - "ввічливе прохання"
        correct: 0
        explanation: "Прийнято ставить у центр результат."
      - question: "Після обговорення ми ухвалили рішення."
        options:
          - "віддієслівний іменник після прийменника"
          - "заперечний наказ"
          - "хай/нехай"
        correct: 0
        explanation: "Обговорення називає дію як іменник."
      - question: "Перечитайте абзац ще раз."
        options:
          - "префікс пере- у значенні повторення"
          - "пере- у значенні надмірності"
          - "пасивний стан"
        correct: 0
        explanation: "Ще раз підтверджує повторення."
      - question: "Він переоцінив свої сили."
        options:
          - "пере- у значенні надмірності"
          - "реальна умова"
          - "власне зворотна дія"
        correct: 0
        explanation: "Переоцінити - оцінити занадто високо."
      - question: "Ходімо до аудиторії."
        options:
          - "наказ першої особи множини"
          - "пасив на -ся"
          - "безособова форма"
        correct: 0
        explanation: "Ходімо включає мовця і слухача в спільну дію."
      - question: "Хай Сашко купить хліб."
        options:
          - "третя особа наказового способу"
          - "нереальна умова"
          - "віддієслівний іменник"
        correct: 0
        explanation: "Хай/нехай утворює наказ або побажання для третьої особи."
  - id: act-2
    type: fill-in
    title: Умовний і наказовий спосіб
    instruction: Вставте форму, яка відповідає реальності умови, тону наказу або виду дії.
    items:
      - sentence: "Якщо я ____ час завтра, напишу відповідь."
        answer: "матиму"
        options:
          - "матиму"
          - "мав би"
          - "мав"
        explanation: "Реальна майбутня умова: якщо + дійсний спосіб."
      - sentence: "Якби я ____ час, написав би відповідь."
        answer: "мав"
        options:
          - "мав"
          - "матиму"
          - "маю"
        explanation: "Нереальна умова: якби + минулий час."
      - sentence: "Якщо команда ____, ми оновимо інструкцію."
        answer: "погодиться"
        options:
          - "погодиться"
          - "погодилася б"
          - "погоджувалася б"
        explanation: "Це можлива умова, тому потрібен дійсний спосіб."
      - sentence: "Якби команда ____, ми оновили б інструкцію."
        answer: "погодилася"
        options:
          - "погодилася"
          - "погодиться"
          - "погоджується"
        explanation: "Якби вимагає минулої форми в умовній рамці."
      - sentence: "____ файл, будь ласка."
        answer: "Відкрийте"
        options:
          - "Відкрийте"
          - "Відкривайте"
          - "Відкрили"
        explanation: "Конкретне прохання про один результат."
      - sentence: "Не ____ підозрілі файли."
        answer: "відкривайте"
        options:
          - "відкривайте"
          - "відкрийте"
          - "відкрили"
        explanation: "Стандартна заборона потребує недоконаного наказу."
      - sentence: "Не ____ паспорт перед поїздкою."
        answer: "забудьте"
        options:
          - "забудьте"
          - "забувайте"
          - "забули"
        explanation: "Це конкретне нагадування про один результат."
      - sentence: "____ це питання після перерви."
        answer: "Обговорімо"
        options:
          - "Обговорімо"
          - "Обговорили"
          - "Обговорюєш"
        explanation: "Обговорімо - інклюзивна форма першої особи множини."
      - sentence: "____ вони перевірять дані ще раз."
        answer: "Нехай"
        options:
          - "Нехай"
          - "Якби"
          - "Щоб"
        explanation: "Нехай утворює наказ або побажання для третьої особи."
      - sentence: "Чи не ____ б ви допомогти?"
        answer: "могли"
        options:
          - "могли"
          - "можете"
          - "могтимете"
        explanation: "Могли б - ввічлива умовна форма."
      - sentence: "Якби я працював удома, частіше ____ перерви."
        answer: "робив би"
        options:
          - "робив би"
          - "зробив би"
          - "зроблю"
        explanation: "Частіше показує повторювану дію."
      - sentence: "Якби я закінчив звіт раніше, ____ його до обіду."
        answer: "надіслав би"
        options:
          - "надіслав би"
          - "надсилав би"
          - "надсилаю"
        explanation: "Йдеться про один гіпотетичний результат."
  - id: act-3
    type: group-sort
    title: Розподіліть дієслівні явища
    instruction: Розподіліть приклади за граматичною функцією.
    groups:
      - label: Зворотні дієслова
        items:
          - "я готуюся до контрольної"
          - "ми зустрічаємося після роботи"
          - "мені не спиться"
      - label: Пасивні конструкції
        items:
          - "документ підписано"
          - "квитки продаються онлайн"
          - "звіт готується"
      - label: Віддієслівні іменники
        items:
          - "після обговорення"
          - "перед підписанням"
          - "під час навчання"
      - label: Словотвір дієслів
        items:
          - "перечитати абзац"
          - "заземлити обладнання"
          - "фільтрувати список"
  - id: act-4
    type: cloze
    title: Дієслівний блок у тексті
    instruction: Заповніть пропуски формами, які найкраще відповідають контексту.
    text: "Якщо команда {1} дані сьогодні, ми {2} звіт завтра. Якби ми {3} більше часу, ми {4} інструкцію докладніше. Перед початком роботи {5} файл, але не {6} вихідні дані без дозволу. Мені сьогодні добре {7}, бо завдання вже {8}. Після {9} результатів заявку {10}. Якщо програма не працює, її можна {11}, але не треба {12} графік зайвими діями."
    blanks:
      - id: 1
        answer: "перевірить"
        options:
          - "перевірить"
          - "перевірила б"
          - "перевіряла б"
      - id: 2
        answer: "надішлемо"
        options:
          - "надішлемо"
          - "надсилали б"
          - "надсилаємо б"
      - id: 3
        answer: "мали"
        options:
          - "мали"
          - "матимемо"
          - "маємо"
      - id: 4
        answer: "переписали б"
        options:
          - "переписали б"
          - "перепишемо"
          - "переписуємо"
      - id: 5
        answer: "відкрийте"
        options:
          - "відкрийте"
          - "відкривайте"
          - "відкрили"
      - id: 6
        answer: "змінюйте"
        options:
          - "змінюйте"
          - "змініть"
          - "змінили"
      - id: 7
        answer: "працюється"
        options:
          - "працюється"
          - "працююся"
          - "працює"
      - id: 8
        answer: "підготовлено"
        options:
          - "підготовлено"
          - "підготувалося"
          - "підготовлення"
      - id: 9
        answer: "обговорення"
        options:
          - "обговорення"
          - "обговорити"
          - "обговорювати"
      - id: 10
        answer: "прийнято"
        options:
          - "прийнято"
          - "приймається мною"
          - "прийняття"
      - id: 11
        answer: "перевстановити"
        options:
          - "перевстановити"
          - "перевантажити"
          - "знебарвити"
      - id: 12
        answer: "перевантажувати"
        options:
          - "перевантажувати"
          - "перечитати"
          - "заземлити"
  - id: act-5
    type: error-correction
    title: Редактор дієслівного блоку
    instruction: Виправте помилкове слово або фразу.
    items:
      - sentence: "Якщо я мав би час, я зробив би це завтра."
        error: "Якщо я мав би час"
        correction: "Якби я мав час"
        error_type: phrase
        explanation: "Тут нереальна умова, тому краще якби + минулий час."
      - sentence: "Якби завтра буде дощ, ми залишимося вдома."
        error: "Якби завтра буде"
        correction: "Якщо завтра буде"
        error_type: phrase
        explanation: "Це реальна майбутня умова."
      - sentence: "Не відкрийте файл без перевірки."
        error: "відкрийте"
        correction: "відкривайте"
        error_type: word
        explanation: "Стандартна заборона потребує недоконаного наказу."
      - sentence: "Пішли до аудиторії після перерви."
        error: "Пішли"
        correction: "Ходімо"
        error_type: word
        explanation: "У стандартному навчальному стилі інклюзивна форма - ходімо."
      - sentence: "Мені сьогодні не спитися."
        error: "спитися"
        correction: "спиться"
        error_type: word
        explanation: "Безособова форма: мені не спиться."
      - sentence: "Я користуюся цей застосунок щодня."
        error: "цей застосунок"
        correction: "цим застосунком"
        error_type: phrase
        explanation: "Користуватися вимагає орудного відмінка."
      - sentence: "Книга читалася мною за один вечір."
        error: "Книга читалася мною"
        correction: "Я прочитав книгу"
        error_type: phrase
        explanation: "Активний варіант природніший, коли виконавець важливий."
      - sentence: "Заявка прийняла системою."
        error: "прийняла"
        correction: "прийнята"
        error_type: word
        explanation: "Можна сказати: заявка прийнята системою; ще природніше: заявку прийнято."
      - sentence: "Після читати ми обговорили текст."
        error: "читати"
        correction: "читання"
        error_type: word
        explanation: "Після потребує іменника: після читання."
      - sentence: "Ми зробили обговорення питання і ухвалили рішення."
        error: "зробили обговорення"
        correction: "обговорили"
        error_type: phrase
        explanation: "Живе дієслово тут природніше за важку номіналізацію."
      - sentence: "Я хотів повсюдити оголошення в чаті."
        error: "повсюдити"
        correction: "розповсюдити"
        error_type: word
        explanation: "Розповсюдити - усталене дієслово; не будуємо *повсюдити."
      - sentence: "Крик → кричати - проста продуктивна модель для всіх іменників."
        error: "проста продуктивна модель"
        correction: "небезпечне узагальнення"
        error_type: phrase
        explanation: "Кричати треба вчити як окреме дієслово; для одноразової дії безпечніше крикнути."
workbook:
  - id: wb-1
    type: quiz
    title: Виберіть точне пояснення
    instruction: Оберіть найкраще пояснення форми в реченні.
    items:
      - question: "У реченні 'Якби вона знала, відповіла б' форма 'відповіла б'..."
        options:
          - "узгоджується з жіночим родом у нереальній умові"
          - "є наказом другої особи"
          - "є пасивом на -но/-то"
        correct: 0
      - question: "У реченні 'Якщо отримаємо лист, відповімо сьогодні'..."
        options:
          - "умова реальна"
          - "умова нереальна"
          - "потрібна частка би"
        correct: 0
      - question: "Форма 'сядьте' є..."
        options:
          - "наказовим способом другої особи множини або ввічливої форми"
          - "безособовим дієсловом"
          - "віддієслівним іменником"
        correct: 0
      - question: "Форма 'хай читає' є..."
        options:
          - "наказом або побажанням для третьої особи"
          - "пасивом"
          - "реальною умовою"
        correct: 0
      - question: "У 'ми зустрічаємося щоп'ятниці' -ся має..."
        options:
          - "взаємне значення"
          - "пасив на -но/-то"
          - "суфікс віддієслівного іменника"
        correct: 0
      - question: "У 'мені не працюється' важливий..."
        options:
          - "давальний відмінок особи"
          - "знахідний прямого об'єкта"
          - "кличний відмінок"
        correct: 0
      - question: "У 'кімнату прибрано' форма..."
        options:
          - "ставить у центр результат"
          - "називає виконавця"
          - "є наказом"
        correct: 0
      - question: "Речення 'звіт готується' найкраще означає..."
        options:
          - "процес триває"
          - "звіт уже готовий"
          - "це нереальна умова"
        correct: 0
      - question: "У 'після підписання договору' слово 'підписання'..."
        options:
          - "віддієслівний іменник"
          - "наказовий спосіб"
          - "зворотне дієслово"
        correct: 0
      - question: "У 'перечитати текст' пере- найкраще означає..."
        options:
          - "повторення"
          - "надмірність"
          - "заборону"
        correct: 0
      - question: "У 'переоцінити сили' пере- найкраще означає..."
        options:
          - "надмірність"
          - "повторення читання"
          - "рух усередину"
        correct: 0
      - question: "У 'знебарвити тканину' безпечний розбір..."
        options:
          - "барва + зне- + -ити"
          - "колір + пере-"
          - "повсюдити + роз-"
        correct: 0
  - id: wb-2
    type: match-up
    title: Форма і функція
    instruction: З'єднайте форму з її функцією.
    pairs:
      - left: "якби мав час"
        right: "нереальна умова"
      - left: "якщо матиму час"
        right: "реальна умова"
      - left: "читайте щодня"
        right: "загальна порада"
      - left: "прочитайте до завтра"
        right: "конкретне завдання"
      - left: "не відкривайте"
        right: "стандартна заборона"
      - left: "не забудьте"
        right: "конкретне нагадування"
      - left: "мені не спиться"
        right: "безособове зворотне дієслово"
      - left: "зустрічатися"
        right: "взаємна дія"
      - left: "документ підписано"
        right: "пасивний результат"
      - left: "квитки продаються"
        right: "пасивноподібний процес або властивість"
      - left: "після обговорення"
        right: "віддієслівний іменник"
      - left: "заземлити"
        right: "префіксально-суфіксальний словотвір"
  - id: wb-3
    type: group-sort
    title: Реальна граматика чи стилістичний ризик
    instruction: Розподіліть приклади за тим, що з ними треба зробити.
    groups:
      - label: Нормативно й природно
        items:
          - "Заявку прийнято."
          - "Ходімо до аудиторії."
          - "Не забудьте паспорт."
          - "Мені не спиться."
      - label: Треба виправити форму
        items:
          - "Мені не спитися."
          - "Якби завтра буде дощ."
          - "Я користуюся цей застосунок."
          - "Після читати поговоримо."
      - label: Стилістично краще спростити
        items:
          - "Книга читалася мною."
          - "Було здійснено проведення перевірки."
          - "Документ був підписаний мною особисто."
          - "Ми зробили обговорення питання."
  - id: wb-4
    type: fill-in
    title: Доберіть форму
    instruction: Вставте нормативну форму.
    items:
      - sentence: "Якби Олена знала, вона ____ раніше."
        answer: "відповіла б"
        options:
          - "відповіла б"
          - "відповів би"
          - "відповість"
      - sentence: "Якщо Олена дізнається, вона ____ раніше."
        answer: "відповість"
        options:
          - "відповість"
          - "відповіла б"
