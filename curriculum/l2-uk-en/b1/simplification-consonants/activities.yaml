version: '1.0'
module: simplification-consonants
level: b1
inline:
  - id: act-1
    type: quiz
    title: Спрощення чи чергування
    instruction: Оберіть правильне пояснення для кожної пари.
    items:
      - question: Що відбувається в парі "тиждень - тижневий"?
        options:
          - Приголосний д випадає.
          - Приголосний д переходить у ж.
          - Голосний е переходить в і.
        correct: 0
        explanation: У важкому збігу ждн приголосний д не пишеться.
      - question: Яка пара показує чергування, а не спрощення?
        options:
          - друг - друже
          - щастя - щасливий
          - радість - радісний
        correct: 0
        explanation: У парі друг - друже г змінюється на ж.
      - question: Чому пишемо "проїзний", а не "*проїздний"?
        options:
          - У групі здн випадає д.
          - У групі здн випадає з.
          - Це форма родового відмінка.
        correct: 0
        explanation: Проїзд + -н- дає проїзний зі спрощенням здн до зн.
      - question: Який опис найточніший для "щастя - щасливий"?
        options:
          - Т випадає перед л.
          - Т змінюється на с.
          - Л випадає після т.
        correct: 0
        explanation: Збіг стл спрощується до сл.
      - question: У якій парі є модель [скн]->[сн]?
        options:
          - тиск - тиснути
          - честь - чесний
          - масло - масний
        correct: 0
        explanation: У слові тиснути к із групи скн не пишеться.
      - question: Яке слово є винятком без спрощення на письмі?
        options:
          - хвастливий
          - щасливий
          - корисний
        correct: 0
        explanation: Хвастливий пишеться з т і не повторює модель щасливий.
      - question: У якому слові літера т пишеться, хоча вимова може бути спрощеною?
        options:
          - шістнадцять
          - якісний
          - обласний
        correct: 0
        explanation: У слові шістнадцять т зберігається на письмі.
      - question: Яке формулювання найкраще підсумовує тему?
        options:
          - Спрощення означає, що приголосний випадає з важкого збігу.
          - Спрощення означає, що голосний завжди змінюється.
          - Спрощення означає, що всі винятки пишуться без т.
        correct: 0
        explanation: У центрі теми саме випадіння приголосного.
  - id: act-2
    type: match-up
    title: Основа і похідне слово
    instruction: Поєднайте базове слово з нормативною похідною формою.
    pairs:
      - left: тиждень
        right: тижневий
      - left: проїзд
        right: проїзний
      - left: виїзд
        right: виїзний
      - left: щастя
        right: щасливий
      - left: радість
        right: радісний
      - left: якість
        right: якісний
      - left: користь
        right: корисний
      - left: область
        right: обласний
  - id: act-3
    type: group-sort
    title: Полички правопису
    instruction: Розподіліть слова за тим, як вони поводяться на письмі.
    groups:
      - label: Спрощення пишемо
        items:
          - тижневий
          - проїзний
          - щасливий
          - радісний
          - якісний
          - корисний
          - тиснути
          - масний
      - label: Виняток без спрощення
        items:
          - пестливий
          - хвастливий
          - кістлявий
      - label: Вимова може спрощуватися, письмо зберігає літеру
        items:
          - шістнадцять
          - зап'ястний
          - контрастний
      - label: Чергування, не спрощення
        items:
          - друг - друже
          - рука - руці
          - водити - воджу
  - id: act-4
    type: fill-in
    title: Нормативна форма
    instruction: Виберіть правильну форму зі спрощенням або без нього.
    items:
      - sentence: "У нас є ____ план на червень."
        answer: тижневий
        options:
          - тижневий
          - тиждневий
          - тижденний
        explanation: Тиждень дає тижневий без д перед н.
      - sentence: "Мені потрібен ____ документ для маршруту."
        answer: проїзний
        options:
          - проїзний
          - проїздний
          - проїжний
        explanation: Проїзд + -н- дає проїзний.
      - sentence: "Це дуже ____ день."
        answer: щасливий
        options:
          - щасливий
          - щастливий
          - щасний
        explanation: Щастя дає щасливий із моделлю стл до сл.
      - sentence: "Вона дала ____ відповідь."
        answer: чесну
        options:
          - чесну
          - честну
          - чешну
        explanation: Честь дає чесний, чесну без т.
      - sentence: "Це ____ порада для письма."
        answer: корисна
        options:
          - корисна
          - користна
          - корісна
        explanation: Користь дає корисний без т.
      - sentence: "Потрібен ____ центр обслуговування."
        answer: обласний
        options:
          - обласний
          - областний
          - облазний
        explanation: Область дає обласний без т.
      - sentence: "У вправі треба ____ на кнопку."
        answer: тиснути
        options:
          - тиснути
          - тискнути
          - тішнути
        explanation: Тиск дає тиснути без к перед н.
      - sentence: "Цей тон занадто ____."
        answer: пестливий
        options:
          - пестливий
          - песливий
          - пестний
        explanation: Пестливий є винятком і пишеться з т.
  - id: act-5
    type: error-correction
    title: Редагуємо зайві й пропущені літери
    instruction: Знайдіть помилкову форму й подайте нормативний варіант.
    items:
      - sentence: "Це був щастливий випадок."
        error: щастливий
        correction: щасливий
        error_type: word
        explanation: У групі стл випадає т.
      - sentence: "Ми купили проїздний квиток."
        error: проїздний
        correction: проїзний
        error_type: word
        explanation: У групі здн випадає д.
      - sentence: "Це якістний переклад."
        error: якістний
        correction: якісний
        error_type: word
        explanation: Якість дає якісний без т.
      - sentence: "Він написав честну відповідь."
        error: честну
        correction: чесну
        error_type: word
        explanation: Честь дає чесний, чесну без т.
      - sentence: "Нам потрібен областний архів."
        error: областний
        correction: обласний
        error_type: word
        explanation: Область дає обласний без т.
      - sentence: "Не треба тискнути на екран."
        error: тискнути
        correction: тиснути
        error_type: word
        explanation: Тиск дає тиснути без к.
      - sentence: "Вона сказала це хвасливим тоном."
        error: хвасливим
        correction: хвастливим
        error_type: word
        explanation: Хвастливий є винятком і пишеться з т.
      - sentence: "Йому шіснадцять років."
        error: шіснадцять
        correction: шістнадцять
        error_type: word
        explanation: У слові шістнадцять т зберігається на письмі.
workbook:
  - id: wb-1
    type: quiz
    title: Моделі спрощення
    instruction: Оберіть модель або пояснення.
    items:
      - question: Яка модель працює в слові "тижневий"?
        options:
          - "[ждн]->[жн]"
          - "[стн]->[сн]"
          - "[слн]->[сн]"
        correct: 0
        explanation: Тиждень + -н- дає тижневий.
      - question: Яка модель працює в слові "проїзний"?
        options:
          - "[здн]->[зн]"
          - "[скн]->[сн]"
          - "[стл]->[сл]"
        correct: 0
        explanation: Проїзд + -н- дає проїзний.
      - question: Яка модель працює в слові "щасливий"?
        options:
          - "[стл]->[сл]"
          - "[ждн]->[жн]"
          - "[слн]->[сн]"
        correct: 0
        explanation: Щастя + -лив- дає щасливий.
      - question: Яка модель працює в слові "радісний"?
        options:
          - "[стн]->[сн]"
          - "[здн]->[зн]"
          - "[стл]->[сл]"
        correct: 0
        explanation: Радість + -н- дає радісний.
      - question: Яка модель працює в слові "тиснути"?
        options:
          - "[скн]->[сн]"
          - "[ждн]->[жн]"
          - "[здн]->[зн]"
        correct: 0
        explanation: Тиск + -нути дає тиснути.
      - question: Яка модель працює в слові "масний"?
        options:
          - "[слн]->[сн]"
          - "[стн]->[сн]"
          - "[скн]->[сн]"
        correct: 0
        explanation: Масло дає масний.
      - question: Яке слово не підкоряється моделі "щастя - щасливий"?
        options:
          - кістлявий
          - радісний
          - чесний
        correct: 0
        explanation: Кістлявий є винятком із збереженим т.
      - question: Яке слово пишеться з т, хоча вимова може бути спрощеною?
        options:
          - контрастний
          - корисний
          - масний
        correct: 0
        explanation: Контрастний зберігає т на письмі.
  - id: wb-2
    type: fill-in
    title: Пишемо похідну форму
    instruction: Вставте нормативну форму.
    items:
      - sentence: "____ зустріч відбудеться в понеділок."
        answer: тижнева
        options:
          - тижнева
          - тижднева
          - тижденева
        explanation: Тиждень дає тижневий, тижнева.
      - sentence: "Для автобуса потрібен ____ квиток."
        answer: проїзний
        options:
          - проїзний
          - проїздний
          - проїсний
        explanation: Проїзд дає проїзний.
      - sentence: "Це ____ новина для всієї групи."
        answer: радісна
        options:
          - радісна
          - радістна
          - радізна
        explanation: Радість дає радісний, радісна.
      - sentence: "Нам потрібен ____ приклад."
        answer: якісний
        options:
          - якісний
          - якістний
          - якосний
        explanation: Якість дає якісний.
      - sentence: "Він зробив ____ вибір."
        answer: чесний
        options:
          - чесний
          - честний
          - чезний
        explanation: Честь дає чесний.
      - sentence: "Це ____ інструмент для навчання."
        answer: корисний
        options:
          - корисний
          - користний
          - корістний
        explanation: Користь дає корисний.
      - sentence: "Вона живе в ____ центрі."
        answer: обласному
        options:
          - обласному
          - областному
          - облазному
        explanation: Область дає обласний.
      - sentence: "Не можна сильно ____ на двері."
        answer: тиснути
        options:
          - тиснути
          - тискнути
          - тиснити
        explanation: Тиск дає тиснути.
      - sentence: "Дитина почала ____ водою."
        answer: бризнути
        options:
          - бризнути
          - бризкнути
          - бризнити
        explanation: Бризки пов'язані з формою бризнути без к.
      - sentence: "На папері залишилася ____ пляма."
        answer: масна
        options:
          - масна
          - маслна
          - мазна
        explanation: Масло дає масний, масна.
  - id: wb-3
    type: match-up
    title: Пара і модель
    instruction: Поєднайте пару з моделлю спрощення або типом винятку.
    pairs:
      - left: тиждень - тижневий
        right: "[ждн]->[жн]"
      - left: проїзд - проїзний
        right: "[здн]->[зн]"
      - left: щастя - щасливий
        right: "[стл]->[сл]"
      - left: радість - радісний
        right: "[стн]->[сн]"
      - left: тиск - тиснути
        right: "[скн]->[сн]"
      - left: масло - масний
        right: "[слн]->[сн]"
      - left: пестливий
        right: виняток без спрощення
      - left: шістнадцять
        right: спрощена вимова, письмо з т
  - id: wb-4
    type: group-sort
    title: Сортуємо за зниклим приголосним
    instruction: Розподіліть слова за тим, який приголосний не пишеться у регулярній формі.
    groups:
      - label: Випадає д
        items:
          - тижневий
          - проїзний
          - виїзний
      - label: Випадає т
        items:
          - щасливий
          - радісний
          - якісний
          - чесний
          - корисний
          - обласний
      - label: Випадає к
        items:
          - тиснути
          - бризнути
          - блиснути
      - label: Випадає л
        items:
          - масний
  - id: wb-5
    type: true-false
    title: Так чи ні
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "У слові тижневий не пишемо д."
        correct: true
        explanation: Збіг ждн спрощується до жн.
      - statement: "Форма проїздний є нормативною."
        correct: false
        explanation: Нормативна форма - проїзний.
      - statement: "У слові щасливий т випадає перед л."
        correct: true
        explanation: Це модель стл до сл.
      - statement: "Слово пестливий треба писати без т."
        correct: false
        explanation: Пестливий є винятком і пишеться з т.
      - statement: "У слові якісний випадає т із групи стн."
        correct: true
        explanation: Якість дає якісний.
      - statement: "Контрастний пишеться без т."
        correct: false
        explanation: Контрастний зберігає т на письмі.
      - statement: "Тиснути пов'язане з моделлю скн до сн."
        correct: true
        explanation: Тиск дає тиснути без к.
      - statement: "Масний пишеться з л перед н."
        correct: false
        explanation: Масло дає масний без л.
      - statement: "Спрощення і чергування - це одна й та сама дія."
        correct: false
        explanation: У чергуванні звук змінюється, у спрощенні випадає.
      - statement: "Шістнадцять пишеться з т."
        correct: true
        explanation: Це слово зберігає т на письмі.
      - statement: "Обласний пов'язане зі словом область."
        correct: true
        explanation: Область дає обласний без т.
      - statement: "Хвастливий повторює написання щасливий."
        correct: false
        explanation: Хвастливий є винятком із т.
  - id: wb-6
    type: error-correction
    title: Орфографічне редагування
    instruction: Виправте слово або словосполучення.
    items:
      - sentence: "Це тиждневий графік занять."
        error: тиждневий
        correction: тижневий
        error_type: word
        explanation: Тиждень дає тижневий без д.
      - sentence: "Купіть проїздний квиток заздалегідь."
        error: проїздний
        correction: проїзний
        error_type: word
        explanation: Проїзд дає проїзний.
      - sentence: "У нас щастлива нагода."
        error: щастлива
        correction: щаслива
        error_type: word
        explanation: Щастя дає щасливий без т.
      - sentence: "Команда підготувала якістний план."
        error: якістний
        correction: якісний
        error_type: word
        explanation: Якість дає якісний.
      - sentence: "Це користна звичка."
        error: користна
        correction: корисна
        error_type: word
        explanation: Користь дає корисний без т.
      - sentence: "Ми поїхали до областного центру."
        error: областного
        correction: обласного
        error_type: word
        explanation: Область дає обласний.
      - sentence: "Не бризкни водою на книжку."
        error: бризкни
        correction: бризни
        error_type: word
        explanation: Бризнути має форму бризни без к.
      - sentence: "На столі лежала маслна пляма."
        error: маслна
        correction: масна
        error_type: word
        explanation: Масло дає масний.
      - sentence: "Автор ужив песливе слово."
        error: песливе
        correction: пестливе
        error_type: word
        explanation: Пестливий пишеться з т.
      - sentence: "Це контрасний приклад."
        error: контрасний
        correction: контрастний
        error_type: word
        explanation: Контрастний зберігає т на письмі.
  - id: wb-7
    type: cloze
    title: Пояснення правила
    instruction: Вставте слова, які точно пояснюють спрощення.
    blanks:
      - id: 1
        answer: випадає
        options:
          - випадає
          - чергується
          - подвоюється
      - id: 2
        answer: збігу
        options:
          - збігу
          - наголосу
          - закінчення
      - id: 3
        answer: тижневий
        options:
          - тижневий
          - тиждневий
          - тиждений
      - id: 4
        answer: проїзний
        options:
          - проїзний
          - проїздний
          - проїсний
      - id: 5
        answer: щасливий
        options:
          - щасливий
          - щастливий
          - щасний
      - id: 6
        answer: винятки
        options:
          - винятки
          - чергування
          - суфікси
      - id: 7
        answer: шістнадцять
        options:
          - шістнадцять
          - шіснадцять
          - шіснацять
      - id: 8
        answer: чергування
        options:
          - чергування
          - спрощення
          - відмінювання
    text: "Спрощення означає, що приголосний {1} із важкого {2}. Тому пишемо {3}, {4}, {5}. Але є {6}: пестливий, хвастливий, кістлявий. У слові {7} літера т зберігається на письмі. Якщо звук не випадає, а змінюється на інший, це вже {8}."
  - id: wb-8
    type: translate
    title: Перекладаємо з увагою до правопису
    instruction: Оберіть український варіант із правильною формою.
    items:
      - source: weekly plan
        options:
          - text: тижневий план
            correct: true
          - text: тиждневий план
            correct: false
        explanation: Тижневий пишеться без д.
      - source: travel pass
        options:
          - text: проїзний квиток
            correct: true
          - text: проїздний квиток
            correct: false
        explanation: Проїзний пишеться без д.
      - source: happy person
        options:
          - text: щаслива людина
            correct: true
          - text: щастлива людина
            correct: false
        explanation: Щасливий пишеться без т.
      - source: quality service
        options:
