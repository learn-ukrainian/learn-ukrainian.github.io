  - id: wb-11
    type: order
    title: Алгоритм перевірки
    instruction: Розташуйте кроки перевірки правопису в логічному порядку.
    items:
      - Знайдіть слово, яке здається похідним або спорідненим з іншою формою.
      - Поставте поруч базове слово, наприклад радість, тиждень, проїзд.
      - Перевірте, чи перед суфіксом виникає важкий збіг приголосних.
      - Порівняйте збіг із моделями ждн, здн, стл, стн, скн, слн.
      - Якщо модель регулярна, запишіть форму зі спрощенням.
      - Перевірте, чи слово не є винятком без спрощення.
      - Перевірте, чи це не слово з письмом т, як шістнадцять або контрастний.
      - Якщо лишився сумнів, зверніться до словника.
      - Поверніться до речення й перевірте, чи форма пасує за змістом.
      - Запишіть коротке пояснення через модель або виняток.
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
