  - id: wb-8
    type: essay-response
    title: Мій маршрут
    instruction: Напишіть короткий опис маршруту з базовими дієсловами руху.
    prompt: "Опишіть свій типовий день або одну поїздку містом. Використайте щонайменше шість дієслів руху: два односпрямовані, два різноспрямовані, одне дієслово з предметом або групою, і одне транспортне дієслово. Додайте щонайменше три прийменникові конструкції: до + родовий, в/на + знахідний або через + знахідний."
    min_words: 120
    model_answer: >-
      Зазвичай я ходжу на роботу пішки до метро, а потім їжджу трамваєм
      до центру. Сьогодні я вийшов раніше, тому спокійно йшов через парк і
      ніс невелику сумку з документами. Біля зупинки я зустрів колегу, і ми
      разом їхали до офісу автобусом. Водій віз нас повільно, бо в центрі
      був затор. Після роботи я не поїхав додому одразу, а пішов у спортзал.
      Там я бігав двадцять хвилин, а тренер водив нову групу по залі й
      показував вправи. Увечері я йшов додому вже без поспіху. Такий день
      добре показує різницю: я ходжу на роботу регулярно, але сьогодні
      йшов через парк; я їжджу трамваєм зазвичай, але сьогодні їхав
      автобусом; я ніс сумку, а автобус віз пасажирів. Такі деталі допомагають
      точніше описувати маршрут, спосіб руху й повторюваність дії.
    rubric:
      - criteria: односпрямовані дієслова
        description: Є щонайменше дві форми для одного напрямку.
      - criteria: різноспрямовані дієслова
        description: Є щонайменше дві форми для звички, повторення або різних напрямків.
      - criteria: спосіб руху точний
        description: Пішки, транспортом, бігом, із предметом або групою не змішані.
      - criteria: прийменники й відмінки
        description: Конструкції до, в/на, через мають правильні форми.
      - criteria: зв'язний текст
        description: Опис читається як один маршрут або типовий день.
