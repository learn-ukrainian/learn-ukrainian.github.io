version: '1.0'
module: dative-nuances
level: b1
inline:
  - id: act-1
    type: quiz
    title: Що робить давальний?
    instruction: "Оберіть роль давального відмінка в прикладі."
    items:
      - question: "У реченні Мені холодно форма мені показує:"
        options:
          - "того, хто відчуває стан"
          - "предмет, який купують"
          - "місце після прийменника"
        correct: 0
        explanation: "Мені холодно - давальний суб'єкта стану."
      - question: "У фразі Сестрі сімнадцять років давальний потрібний, бо:"
        options:
          - "українська виражає вік через кому?"
          - "сестра є місцем дії"
          - "після числа завжди стоїть давальний"
        correct: 0
        explanation: "Вік: кому? сестрі."
      - question: "У реченні Нам потрібно відпочити форма нам показує:"
        options:
          - "кого стосується потреба"
          - "прямий об'єкт дії"
          - "причину події"
        correct: 0
        explanation: "Потрібно кому? нам."
      - question: "У реченні Їй вдалося приїхати вчасно давальний позначає:"
        options:
          - "людину, якій вдався результат"
          - "місце прибуття"
          - "річ, яку привезли"
        correct: 0
        explanation: "Вдалося кому? їй."
      - question: "У фразі подарувати другові квиток форма другові показує:"
        options:
          - "адресата/отримувача"
          - "частину від цілого"
          - "обставину часу"
        correct: 0
        explanation: "Подарувати кому? другові."
      - question: "У реченні Мамі це сподобається давальний означає:"
        options:
          - "зацікавлену особу"
          - "повний прямий об'єкт"
          - "інструмент дії"
        correct: 0
        explanation: "Ситуація стосується мами: кому сподобається?"
      - question: "У фразі завдяки викладачеві давальний з'являється, бо:"
        options:
          - "завдяки керує давальним"
          - "викладач є прямим об'єктом"
          - "це дата події"
        correct: 0
        explanation: "Завдяки кому? викладачеві."
      - question: "У фразі пам'ятник героям давальний показує:"
        options:
          - "кому присвячений пам'ятник"
          - "з чого зроблений пам'ятник"
          - "де стоїть пам'ятник"
        correct: 0
        explanation: "Пам'ятник кому? героям."
      - question: "У реченні Я бачу лікаря форма лікаря НЕ є давальним, бо:"
        options:
          - "бачити бере прямий об'єкт у знахідному"
          - "лікар завжди має тільки родовий"
          - "після я завжди стоїть давальний"
        correct: 0
        explanation: "Бачити кого? лікаря - знахідний."
      - question: "У реченні Я телефоную лікарю форма лікарю є давальним, бо:"
        options:
          - "телефонувати керує давальним адресата"
          - "телефонувати означає бачити"
          - "лікарю є називний"
        correct: 0
        explanation: "Телефонувати кому? лікарю."
      - question: "У фразі дітям не можна шуміти давальний показує:"
        options:
          - "для кого діє заборона"
          - "чим шумлять"
          - "звідки йде звук"
        correct: 0
        explanation: "Не можна кому? дітям."
      - question: "У реченні Мені не спиться форма мені показує:"
        options:
          - "людину, яка переживає стан"
          - "людину, яку хтось будить"
          - "місце для сну"
        correct: 0
        explanation: "Не спиться кому? мені."
  - id: act-2
    type: fill-in
    title: Кому який стан?
    instruction: "Вставте правильну форму давального відмінка."
    items:
      - sentence: "____ холодно після довгої прогулянки."
        answer: "Мені"
        options:
          - "Мені"
          - "Я"
          - "Мене"
        explanation: "Стан людини: кому холодно? мені."
      - sentence: "____ сумно без друзів."
        answer: "Їй"
        options:
          - "Їй"
          - "Вона"
          - "Нею"
        explanation: "Кому сумно? їй."
      - sentence: "____ цікаво слухати лекцію."
        answer: "Студентам"
        options:
          - "Студентам"
          - "Студенти"
          - "Студентів"
        explanation: "Кому цікаво? студентам."
      - sentence: "____ важко підніматися сходами."
        answer: "Бабусі"
        options:
          - "Бабусі"
          - "Бабуся"
          - "Бабусю"
        explanation: "Кому важко? бабусі."
      - sentence: "____ весело на святі."
        answer: "Дітям"
        options:
          - "Дітям"
          - "Діти"
          - "Дітей"
        explanation: "Кому весело? дітям."
      - sentence: "____ не спиться перед іспитом."
        answer: "Тобі"
        options:
          - "Тобі"
          - "Ти"
          - "Тебе"
        explanation: "Не спиться кому? тобі."
      - sentence: "____ соромно за помилку."
        answer: "Йому"
        options:
          - "Йому"
          - "Він"
          - "Його"
        explanation: "Кому соромно? йому."
      - sentence: "____ зрозуміло це правило."
        answer: "Нам"
        options:
          - "Нам"
          - "Ми"
          - "Нас"
        explanation: "Кому зрозуміло? нам."
      - sentence: "____ байдуже до цієї теми."
        answer: "Вам"
        options:
          - "Вам"
          - "Ви"
          - "Вас"
        explanation: "Кому байдуже? вам."
      - sentence: "____ працюється краще в бібліотеці."
        answer: "Олені"
        options:
          - "Олені"
          - "Олена"
          - "Олену"
        explanation: "Працюється кому? Олені."
      - sentence: "____ страшно йти темною вулицею."
        answer: "Дитині"
        options:
          - "Дитині"
          - "Дитина"
          - "Дитину"
        explanation: "Кому страшно? дитині."
      - sentence: "____ легко запам'ятати ці форми."
        answer: "Викладачеві"
        options:
          - "Викладачеві"
          - "Викладач"
          - "Викладача"
        explanation: "Кому легко? викладачеві."
  - id: act-3
    type: fill-in
    title: Вік через давальний
    instruction: "Вставте форму, яка правильно виражає вік."
    items:
      - sentence: "____ двадцять років."
        answer: "Мені"
        options:
          - "Мені"
          - "Я"
          - "Мене"
        explanation: "Вік виражаємо через давальний: мені двадцять років."
      - sentence: "____ один рік."
        answer: "Йому"
        options:
          - "Йому"
          - "Він"
          - "Його"
        explanation: "Кому один рік? йому."
      - sentence: "____ два роки."
        answer: "Сестрі"
        options:
          - "Сестрі"
          - "Сестра"
          - "Сестру"
        explanation: "Скільки років сестрі?"
      - sentence: "____ п'ять років, коли родина переїхала."
        answer: "Їй було"
        options:
          - "Їй було"
          - "Вона була"
          - "Її було"
        explanation: "Минулий час віку: їй було п'ять років."
      - sentence: "Наступного тижня ____ буде тридцять."
        answer: "братові"
        options:
          - "братові"
          - "брат"
          - "брата"
        explanation: "Кому буде тридцять? братові."
      - sentence: "Скільки ____ років?"
        answer: "тобі"
        options:
          - "тобі"
          - "ти"
          - "тебе"
        explanation: "Питання про вік: скільки тобі років?"
      - sentence: "____ майже сорок."
        answer: "Викладачці"
        options:
          - "Викладачці"
          - "Викладачка"
          - "Викладачку"
        explanation: "Приблизний вік також бере давальний."
      - sentence: "Коли ____ було десять, він почав грати на скрипці."
        answer: "Андрієві"
        options:
          - "Андрієві"
          - "Андрій"
          - "Андрія"
        explanation: "Кому було десять? Андрієві."
      - sentence: "____ за п'ятдесят, але вона активно подорожує."
        answer: "Мамі"
        options:
          - "Мамі"
          - "Мама"
          - "Маму"
        explanation: "Розмовна приблизна модель: мамі за п'ятдесят."
      - sentence: "Через рік ____ буде сімнадцять."
        answer: "студентові"
        options:
          - "студентові"
          - "студент"
          - "студента"
        explanation: "Майбутній вік: студентові буде сімнадцять."
      - sentence: "____ було двадцять два, коли вона закінчила університет."
        answer: "Марії"
        options:
          - "Марії"
          - "Марія"
          - "Марію"
        explanation: "Кому було двадцять два? Марії."
      - sentence: "____ під шістдесят, але він щодня бігає."
        answer: "Дідусеві"
        options:
          - "Дідусеві"
          - "Дідусь"
          - "Дідуся"
        explanation: "Приблизний вік із під: дідусеві під шістдесят."
  - id: act-4
    type: match-up
    title: Перебудуйте безособово
    instruction: "Поєднайте особову модель із природною безособовою конструкцією."
    pairs:
      - left: "Я повинен відпочити."
        right: "Мені потрібно відпочити."
      - left: "Ти маєш перевірити текст."
        right: "Тобі варто перевірити текст."
      - left: "Вона змогла приїхати."
        right: "Їй вдалося приїхати."
      - left: "Ми чекали годину через обставини."
        right: "Нам довелося чекати годину."
      - left: "Вони випадково знайшли місця."
        right: "Їм пощастило знайти місця."
      - left: "Діти не мають права шуміти."
        right: "Дітям не можна шуміти."
      - left: "Ви можете зайти."
        right: "Вам можна зайти."
      - left: "Студент повинен подати заяву."
        right: "Студентові слід подати заяву."
      - left: "Я хочу кави."
        right: "Мені хочеться кави."
      - left: "Вона не може заснути."
        right: "Їй не спиться."
      - left: "Ми повинні зателефонувати."
        right: "Нам треба зателефонувати."
      - left: "Ти успішно домовився."
        right: "Тобі вдалося домовитися."
  - id: act-5
    type: group-sort
    title: Ролі давального
    instruction: "Розподіліть приклади за роллю давального відмінка."
    groups:
      - label: "Стан"
        items:
          - "мені холодно"
          - "дітям весело"
          - "їй не спиться"
      - label: "Вік"
        items:
          - "йому тридцять років"
          - "сестрі було десять"
          - "доньці буде сім"
      - label: "Потреба або результат"
        items:
          - "нам потрібно"
          - "вам довелося"
          - "їм пощастило"
      - label: "Адресат або призначення"
        items:
          - "подарувати мамі"
          - "лист другові"
          - "пам'ятник героям"
workbook:
  - id: wb-1
    type: quiz
    title: Давальний чи інший відмінок?
    instruction: "Оберіть правильну форму в контрастних реченнях."
    items:
      - question: "Я телефоную ____ після обіду."
        options:
          - "лікарю"
          - "лікаря"
          - "лікарем"
        correct: 0
        explanation: "Телефонувати кому? лікарю."
      - question: "Я викликаю ____ додому."
        options:
          - "лікаря"
          - "лікарю"
          - "лікарем"
        correct: 0
        explanation: "Викликати кого? лікаря - знахідний."
      - question: "Ми допомагаємо ____ з переїздом."
        options:
          - "сусідці"
          - "сусідку"
          - "сусідкою"
        correct: 0
        explanation: "Допомагати кому? сусідці."
      - question: "Ми запросили ____ на зустріч."
        options:
          - "сусідку"
          - "сусідці"
          - "сусідкою"
        correct: 0
        explanation: "Запросити кого? сусідку."
      - question: "Викладач радить ____ повторити тему."
        options:
          - "студентові"
          - "студента"
          - "студентом"
        correct: 0
        explanation: "Радити кому? студентові."
      - question: "Команда потребує ____ для нового проєкту."
        options:
          - "досвіду"
          - "досвідові"
          - "досвідом"
        correct: 0
        explanation: "Потребувати чого? досвіду - родовий, не давальний."
      - question: "Ми радіємо ____ після перемоги."
        options:
          - "другові"
          - "друга"
          - "другом"
        correct: 0
        explanation: "Радіти кому? другові."
      - question: "Вона захоплюється ____."
        options:
          - "другом"
          - "другові"
          - "друга"
        correct: 0
        explanation: "Захоплюватися ким? другом - орудний."
      - question: "Адміністрація відповіла ____ вчасно."
        options:
          - "студентам"
          - "студентів"
          - "студентами"
        correct: 0
        explanation: "Відповідати кому? студентам."
      - question: "Ми бачимо ____ біля входу."
        options:
          - "студентів"
          - "студентам"
          - "студентами"
        correct: 0
        explanation: "Бачити кого? студентів - знахідний."
      - question: "Проєкт заважає ____ спати."
        options:
          - "сусідам"
          - "сусідів"
          - "сусідами"
        correct: 0
        explanation: "Заважати кому? сусідам."
      - question: "Ми керуємо ____ дистанційно."
        options:
          - "командою"
          - "команді"
          - "команду"
        correct: 0
        explanation: "Керувати ким? командою - орудний."
  - id: wb-2
    type: fill-in
    title: Потрібно, варто, можна
    instruction: "Вставте форму давального відмінка."
    items:
      - sentence: "____ потрібно більше часу."
        answer: "Нам"
        options:
          - "Нам"
          - "Ми"
          - "Нас"
        explanation: "Потрібно кому? нам."
      - sentence: "____ варто поговорити з куратором."
        answer: "Тобі"
        options:
          - "Тобі"
          - "Ти"
          - "Тебе"
        explanation: "Варто кому? тобі."
      - sentence: "____ можна зайти після перерви."
        answer: "Вам"
        options:
          - "Вам"
          - "Ви"
          - "Вас"
        explanation: "Можна кому? вам."
      - sentence: "____ не можна шуміти в бібліотеці."
        answer: "Дітям"
        options:
          - "Дітям"
          - "Діти"
          - "Дітей"
        explanation: "Не можна кому? дітям."
      - sentence: "____ вдалося скласти іспит."
        answer: "Їй"
        options:
          - "Їй"
          - "Вона"
          - "Її"
        explanation: "Вдалося кому? їй."
      - sentence: "____ довелося чекати автобус."
        answer: "Мені"
        options:
          - "Мені"
          - "Я"
          - "Мене"
        explanation: "Довелося кому? мені."
      - sentence: "____ пощастило знайти квитки."
        answer: "Їм"
        options:
          - "Їм"
          - "Вони"
          - "Їх"
        explanation: "Пощастило кому? їм."
      - sentence: "____ треба підписати заяву."
        answer: "Студентові"
        options:
          - "Студентові"
          - "Студент"
          - "Студента"
        explanation: "Треба кому? студентові."
      - sentence: "____ слід уважно прочитати інструкцію."
        answer: "Викладачеві"
        options:
          - "Викладачеві"
          - "Викладач"
          - "Викладача"
        explanation: "Слід кому? викладачеві."
      - sentence: "____ хочеться чаю після дороги."
        answer: "Бабусі"
        options:
          - "Бабусі"
          - "Бабуся"
          - "Бабусю"
        explanation: "Хочеться кому? бабусі."
      - sentence: "____ не віриться, що семестр закінчився."
        answer: "Нам"
        options:
          - "Нам"
          - "Ми"
          - "Нас"
        explanation: "Не віриться кому? нам."
      - sentence: "____ працюється краще зранку."
        answer: "Олегові"
        options:
          - "Олегові"
          - "Олег"
          - "Олега"
        explanation: "Працюється кому? Олегові."
  - id: wb-3
    type: match-up
    title: Дієслова з давальним
    instruction: "Поєднайте дієслово з природним давальним додатком."
    pairs:
      - left: "допомагати"
        right: "сусідці"
      - left: "заважати"
        right: "колезі"
      - left: "радити"
        right: "студентові"
      - left: "відповідати"
        right: "викладачці"
      - left: "телефонувати"
        right: "лікарю"
      - left: "дзвонити"
        right: "другові"
      - left: "завдячувати"
        right: "батькам"
      - left: "дарувати квиток"
        right: "сестрі"
      - left: "писати листа"
        right: "братові"
      - left: "пояснювати правило"
        right: "групі"
      - left: "обіцяти допомогу"
        right: "команді"
      - left: "передати повідомлення"
        right: "деканові"
  - id: wb-4
    type: error-correction
    title: Виправте давальний
    instruction: "Виправте одну відмінкову або конструкційну помилку в кожному реченні."
    items:
      - sentence: "Я холодно після прогулянки."
        error: "Я холодно"
        correction: "Мені холодно"
        explanation: "Стан людини виражаємо давальним."
      - sentence: "Вона сумно без друзів."
        error: "Вона сумно"
        correction: "Їй сумно"
        explanation: "Кому сумно? їй."
      - sentence: "Я маю двадцять років."
        error: "Я маю двадцять років"
        correction: "Мені двадцять років"
        explanation: "Вік в українській мові має давальний."
      - sentence: "Брат буде тридцять наступного року."
        error: "Брат буде тридцять"
        correction: "Братові буде тридцять"
        explanation: "Кому буде тридцять? братові."
      - sentence: "Ми потрібно відпочити."
        error: "Ми потрібно"
        correction: "Нам потрібно"
        explanation: "Потрібно кому? нам."
      - sentence: "Ти варто перевірити текст."
        error: "Ти варто"
        correction: "Тобі варто"
        explanation: "Варто кому? тобі."
