version: '1.0'
module: checkpoint-participles
level: b1
inline:
  - id: act-1
    type: quiz
    title: Діагностика фази B1.6
    instruction: Оберіть відповідь, яка найточніше пояснює форму або правило.
    items:
      - question: "У словосполученні розквітлий сад дієприкметник є:"
        options:
          - "активним минулого часу"
          - "пасивним із суфіксом -т-"
          - "коротким прикметником"
        correct: 0
        explanation: "Сад сам розквітнув; форма з -л- називає результат зміни."
      - question: "У словосполученні підписана заява дієприкметник є:"
        options:
          - "пасивним, бо заяву хтось підписав"
          - "активним теперішнього часу"
          - "дієприслівником доконаного виду"
        correct: 0
        explanation: "Пасивний дієприкметник називає ознаку предмета після дії над ним."
      - question: "Яка заміна найприродніша?"
        options:
          - "чинний закон замість діючий закон"
          - "бігаючий закон замість чинний закон"
          - "закон, діючий постійно, замість чинний закон"
        correct: 0
        explanation: "Чинний є природним українським відповідником у юридичному значенні."
      - question: "Що треба перевірити у формі зроблений проєкт?"
        options:
          - "чергування б -> бл і узгодження з проєкт"
          - "наявність короткого прикметника"
          - "чи це дієприслівник одночасності"
        correct: 0
        explanation: "Зробити -> зроблений; далі форма узгоджується з іменником."
      - question: "Коли дієприкметниковий зворот найчастіше відокремлюється?"
        options:
          - "коли стоїть після означуваного слова"
          - "коли стоїть безпосередньо перед іменником без додаткового відтінку"
          - "коли є коротким прикметником"
        correct: 0
        explanation: "Після означуваного слова зворот зазвичай виділяється комами."
      - question: "У реченні Прочитавши статтю, Марія написала відгук форма прочитавши показує:"
        options:
          - "попередню завершену дію"
          - "одночасну тривалу дію"
          - "ознаку предмета"
        correct: 0
        explanation: "Доконаний дієприслівник показує дію, що завершилася перед головною."
      - question: "У реченні Читаючи новини, студент виписував джерела форма читаючи показує:"
        options:
          - "одночасність із головною дією"
          - "пасивну ознаку"
          - "поетичну коротку форму"
        correct: 0
        explanation: "Недоконаний дієприслівник називає додаткову одночасну дію."
      - question: "Яке речення має проблему спільного підмета?"
        options:
          - "Прочитавши текст, мені стало легше."
          - "Прочитавши текст, я зрозумів тему."
          - "Коли я прочитав текст, мені стало легше."
        correct: 0
        explanation: "У головній частині немає виконавця, який прочитав текст."
      - question: "У фразі працювали не покладаючи рук кома зазвичай:"
        options:
          - "не ставиться, бо це фразеологізований зворот"
          - "ставиться після не"
          - "ставиться перед кожним словом"
        correct: 0
        explanation: "Сталий вислів означає працювали дуже багато, а не окрему буквальну дію."
      - question: "Форма ясен у фразі ясен місяць найчастіше сигналізує:"
        options:
          - "поетичну або фольклорну коротку форму"
          - "помилковий пасивний дієприкметник"
          - "обов'язкову сучасну розмовну форму"
        correct: 0
        explanation: "Короткі форми такого типу здебільшого впізнаємо в художньому стилі."
      - question: "Яка сучасна модель природна?"
        options:
          - "Мені потрібна допомога."
          - "Я потрібна допомога."
          - "Мені потрібен допомога."
        correct: 0
        explanation: "Особу подаємо давальним, а потрібна узгоджується з допомога."
      - question: "Навіщо M74 потрібна перед M75?"
        options:
          - "щоб перевірити готовність до складнішого синтаксису"
          - "щоб замінити всі підрядні речення дієприслівниками"
          - "щоб прибрати коми зі зворотів"
        correct: 0
        explanation: "B1.7 спиратиметься на точне керування формами, комами й підметами."
  - id: act-2
    type: group-sort
    title: Форма і стратегія
    instruction: Розподіліть приклади за рішенням, яке треба ухвалити.
    groups:
      - label: "Залишити як природну форму"
        items:
          - "розквітлий сад"
          - "підписана заява"
          - "не покладаючи рук"
      - label: "Замінити кальку"
        items:
          - "діючий закон"
          - "миючий засіб"
          - "завідуючий кафедрою"
      - label: "Перевірити коми"
        items:
          - "лист, написаний студенткою"
          - "Прочитавши новину, я перевірив джерело"
          - "Олена, готуючись до семінару, виписала терміни"
      - label: "Пояснити стиль"
        items:
          - "ясен місяць"
          - "зеленеє жито"
          - "я рад вас бачити"
  - id: act-3
    type: match-up
    title: Звороти і пунктуація
    instruction: З'єднайте приклад із правилом або діагностичним питанням.
    pairs:
      - left: "книга, прочитана групою"
        right: "дієприкметниковий зворот після означуваного слова"
      - left: "прочитана групою книга"
        right: "зворот перед іменником без ком у нейтральній позиції"
      - left: "студент, зацікавлений темою"
        right: "означення пояснює іменник студент"
      - left: "Зацікавлений темою, студент поставив питання"
        right: "початковий зворот має додатковий обставинний відтінок"
      - left: "Читаючи статтю, Марія виписувала терміни"
        right: "додаткова дія одночасна з головною"
      - left: "Прочитавши статтю, Марія написала відгук"
        right: "додаткова дія завершилася раніше"
      - left: "Працюючи над проєктом у бібліотеці"
        right: "повна межа дієприслівникового звороту"
      - left: "Перейшовши дорогу, я відчув полегшення"
        right: "спільний підмет збережено"
      - left: "Перейшовши дорогу, мені стало легше"
        right: "треба переробити через різних виконавців"
      - left: "працювали не покладаючи рук"
        right: "фразеологізований виняток без коми"
      - left: "читати лежачи"
        right: "одиничний дієприслівник як спосіб дії"
      - left: "підвівся і, не озираючись, вийшов"
        right: "зворот стоїть між двома присудками"
  - id: act-4
    type: error-correction
    title: Редакторська перевірка
    instruction: Виправте одну головну помилку в кожному реченні.
    items:
      - sentence: "У діючому положенні є правила для студентів."
        error: "діючому"
        correction: "чинному"
        error_type: word
        explanation: "У юридичному значенні природно чинний."
      - sentence: "У лабораторії потрібен миючий засіб."
        error: "миючий"
        correction: "мийний"
        error_type: word
        explanation: "Для засобу для миття нормативна прикметникова форма мийний."
      - sentence: "Завідуючий кафедрою відкрив семінар."
        error: "Завідуючий"
        correction: "Завідувач"
        error_type: word
        explanation: "Назву посади краще передати іменником завідувач."
      - sentence: "Зів'явші квіти стояли біля вікна."
        error: "Зів'явші"
        correction: "Зів'ялі"
        error_type: word
        explanation: "Українська не творить такі дієприкметники за моделлю -вший."
      - sentence: "Зробений макет показали на виставці."
        error: "Зробений"
        correction: "Зроблений"
        error_type: word
        explanation: "Зробити -> зроблений із чергуванням б -> бл."
      - sentence: "Прочитаний стаття допомогла підготувати виступ."
        error: "Прочитаний"
        correction: "Прочитана"
        error_type: word
        explanation: "Форма узгоджується з жіночим іменником стаття."
      - sentence: "Студент прочитав книгу написану викладачкою."
        error: "книгу написану"
        correction: "книгу, написану"
        error_type: construction
        explanation: "Зворот після означуваного слова відокремлюємо комою."
      - sentence: "Прочитавши новину джерело стало зрозумілішим."
        error: "Прочитавши новину джерело"
        correction: "Коли я прочитав новину, джерело"
        error_type: phrase
        explanation: "Джерело не читало новину; краще підрядне речення."
      - sentence: "Працюючи над презентацією, нам бракувало часу."
        error: "Працюючи над презентацією"
        correction: "Коли ми працювали над презентацією"
        error_type: phrase
        explanation: "Безособова головна частина не має спільного підмета."
      - sentence: "Студенти працювали, не покладаючи рук, над проєктом."
        error: ", не покладаючи рук,"
        correction: "не покладаючи рук"
        error_type: construction
        explanation: "Фразеологізований вислів у такій позиції зазвичай пишемо без ком."
      - sentence: "У пісні форма зелен гай є звичайною нейтральною прозою."
        error: "звичайною нейтральною прозою"
        correction: "поетичною або фольклорною формою"
        error_type: phrase
        explanation: "Зелен має стилістичний сигнал, це не нейтральна сучасна форма."
      - sentence: "Я є певен, що нам потрібен нова карта."
        error: "Я є певен, що нам потрібен нова карта"
        correction: "Я певен, що нам потрібна нова карта"
        error_type: phrase
        explanation: "У теперішньому часі зв'язка часто нульова; потрібна узгоджується з карта."
  - id: act-5
    type: fill-in
    title: Академічний міні-текст
    instruction: Вставте форму або конструкцію, яка найкраще завершує речення.
    items:
      - sentence: "У ____ університетському положенні описано правила цитування. (чинний)"
        answer: "чинному"
        options:
          - "чинному"
          - "діючому"
          - "чинним"
        explanation: "Чинному узгоджується з положенні в місцевому відмінку."
      - sentence: "Стаття, ____ студенткою, має чіткі посилання. (написати)"
        answer: "написана"
        options:
          - "написана"
          - "написаний"
          - "пишуча"
        explanation: "Пасивна форма узгоджується зі стаття."
      - sentence: "____ статтю, група підготувала запитання. (прочитати)"
        answer: "Прочитавши"
        options:
          - "Прочитавши"
          - "Читаючий"
          - "Прочитана"
        explanation: "Дія читання завершилася перед підготовкою питань."
      - sentence: "____ новини, Марія перевіряла джерела. (читати)"
        answer: "Читаючи"
        options:
          - "Читаючи"
          - "Прочитавши"
          - "Читаний"
        explanation: "Недоконаний дієприслівник показує одночасність."
      - sentence: "Коментар, ____ на фактах, звучить переконливіше. (заснувати)"
        answer: "заснований"
        options:
          - "заснований"
          - "заснувавши"
          - "засновуючий"
        explanation: "Пасивний дієприкметник пояснює коментар."
      - sentence: "Працювали ____ рук, готуючи студентський форум. (не покладати)"
        answer: "не покладаючи"
        options:
          - "не покладаючи"
          - "не поклавши"
          - "не покладений"
        explanation: "Сталий вислів не покладаючи рук означає дуже старанно."
      - sentence: "Мені ____ ще один приклад із дієприслівником. (потрібен)"
        answer: "потрібен"
        options:
          - "потрібен"
          - "потрібна"
          - "потрібні"
        explanation: "Приклад чоловічого роду, тому потрібен."
      - sentence: "Олена ____, що пунктуація правильна. (певен)"
        answer: "певна"
        options:
          - "певна"
          - "певен"
          - "певні"
        explanation: "Форма узгоджується з підметом Олена."
      - sentence: "Ця вправа ____ повторення перед M75. (варт)"
        answer: "варта"
        options:
          - "варта"
          - "варт"
          - "варто"
        explanation: "Вправа жіночого роду, тому варта повторення."
      - sentence: "У фразі ____ місяць форма має поетичний сигнал. (ясний)"
        answer: "ясен"
        options:
          - "ясен"
          - "ясна"
          - "ясні"
        explanation: "Ясен - коротка форма, типова для поезії або стилізації."
      - sentence: "Матеріали, ____ групою, опублікували на сайті. (підготувати)"
        answer: "підготовлені"
        options:
          - "підготовлені"
          - "підготувавши"
          - "підготовлена"
        explanation: "Матеріали - множина, тому підготовлені."
      - sentence: "____ джерело, я не поширюю новину. (не перевірити)"
        answer: "Не перевіривши"
        options:
          - "Не перевіривши"
          - "Не перевіряючий"
          - "Не перевірений"
        explanation: "Доконаний дієприслівник із не показує умову перед головною дією."
workbook:
  - id: wb-1
    type: match-up
    title: Академічна лексика контрольної
    instruction: Поєднайте термін із точним поясненням.
    pairs:
      - left: "діагностична карта"
        right: "план, який показує слабкі зони після контрольної"
      - left: "активний дієприкметник"
        right: "ознака за дією самого предмета"
      - left: "пасивний дієприкметник"
        right: "ознака за дією, виконаною над предметом"
      - left: "дієприкметниковий зворот"
        right: "дієприкметник із залежними словами"
      - left: "дієприслівниковий зворот"
        right: "дієприслівник із залежними словами"
      - left: "спільний підмет"
        right: "той самий виконавець для головної і додаткової дії"
      - left: "одночасність"
        right: "додаткова дія відбувається під час головної"
      - left: "різночасність"
        right: "одна дія завершилася раніше за іншу"
      - left: "калька"
        right: "форма або конструкція, механічно перенесена з іншої мови"
      - left: "повна нестягнена форма"
        right: "поетична форма типу зеленеє або яснії"
      - left: "присудкова модель"
        right: "схема речення на кшталт мені потрібен час"
      - left: "рубрика"
        right: "критерії оцінювання письмового або усного завдання"
  - id: wb-2
    type: quiz
    title: Короткі прикметники і стиль
    instruction: Оберіть природне пояснення або форму.
    items:
      - question: "У звичайному повідомленні краще сказати:"
        options:
          - "зелений парк"
          - "зелен парк"
          - "зеленеє парк"
        correct: 0
        explanation: "Нейтральне мовлення використовує повну стягнену форму."
      - question: "Форма зеленеє у пісні є:"
        options:
          - "повною нестягненою формою"
          - "пасивним дієприкметником"
          - "помилкою узгодження"
        correct: 0
        explanation: "Нестягнені форми типові для поезії й фольклору."
      - question: "Яке речення має правильну модель потрібен?"
        options:
          - "Студентам потрібні приклади."
          - "Студенти потрібні приклади."
          - "Студентам потрібен приклади."
        correct: 0
        explanation: "Особу подаємо давальним, а форма узгоджується з приклади."
      - question: "Яке речення звучить природно?"
        options:
          - "Я певна, що відповідь правильна."
          - "Я є певна, що відповідь правильна завжди треба."
          - "Я певний, що відповідь правильна. (про Олену)"
        correct: 0
        explanation: "Певна узгоджується з жіночим мовцем або підметом."
      - question: "Варто у реченні Варто повторити правило є:"
        options:
          - "безособовим словом"
          - "формою жіночого роду"
          - "активним дієприкметником"
        correct: 0
        explanation: "Варто + інфінітив працює як безособова оцінка."
      - question: "У реченні Ця стаття варта уваги форма варта:"
        options:
          - "узгоджується зі стаття"
          - "не змінюється ніколи"
          - "є дієприслівником"
        correct: 0
        explanation: "Стаття жіночого роду, тому варта."
      - question: "Який варіант краще для аналізу поезії?"
        options:
          - "Форма ясен додає народнопоетичного звучання."
          - "Форма ясен є помилкою школяра."
          - "Форма ясен обов'язкова в усіх текстах."
        correct: 0
        explanation: "Коротка форма має стилістичну функцію."
      - question: "Яка фраза природна як етикетна?"
        options:
          - "Я рад вас бачити."
          - "Я зелен вас бачити."
          - "Я прочитаний вас бачити."
        correct: 0
        explanation: "Рад вас бачити - усталена сучасна присудкова модель."
      - question: "Яке речення найм'якше критикує текст?"
        options:
          - "Мені здається, ця стаття не дуже варта часу для нашої мети."
