  - id: wb-3
    type: cloze
    title: Підсумковий академічний абзац
    instruction: Виберіть правильні слова в інтегрованому тексті.
    text: "Під час контрольної я спершу відрізняю {активний|безособовий|поетичний} дієприкметник від пасивного: {розквітлий|підписаний|прочитавши} сад сам розквітнув, а {підписана|зеленеє|читаючи} заява зазнала дії. Потім перевіряю {узгодження|джерело|стрічку}: прочитана стаття, прочитаний лист, прочитані матеріали. Якщо бачу кальку на -учий, шукаю {природний відповідник|довшу кому|англійський порядок}: чинний закон, мийний засіб, завідувач кафедри. У зворотах я питаю, де {означуване слово|коротка форма|фактчекінг}; книга, написана студенткою, потребує коми. У дієприслівнику важливий {спільний підмет|рід іменника|суфікс прикметника}: прочитавши текст, я пишу відгук. Якщо підмета немає, краще сказати {коли я прочитав|прочитавши мені|прочитаний я}. Недоконаний вид показує {одночасність|пасивність|нестягненість}: читаючи новину, я перевіряю джерело. Доконаний вид показує {різночасність|кличний|оцінку}: прочитавши новину, я роблю висновок. У фразеологізмі працювати {не покладаючи рук|не покладені руки|не поклавши рука} коми зазвичай немає. Короткі форми типу {ясен|написаний|перевіривши} пояснюю як стиль, а в нейтральному тексті пишу ясний. Наприкінці роблю самооцінку і позначаю, який модуль треба повторити."
