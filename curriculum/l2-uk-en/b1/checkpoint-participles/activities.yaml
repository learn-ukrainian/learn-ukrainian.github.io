  - id: wb-5
    type: essay-response
    title: Інтегроване письмове завдання
    instruction: "Напишіть 5-7 речень про навчальний або медійний проєкт. Використайте щонайменше два дієприкметникові звороти, два дієприслівникові звороти й одну сучасну присудкову модель із потрібен, певен, ладен, варт або рад."
    prompt: "Опишіть, як група студентів підготувала короткий медіапроєкт або академічну презентацію українською мовою. Після тексту додайте самооцінку: назвіть один дієприкметниковий зворот, один дієприслівниковий зворот і поясніть, чому підмет у ньому спільний."
    min_words: 90
    model_answer: |
      Прочитавши новину про студентський медіацентр, наша група перевірила
      джерело й виписала факти. Новину, опубліковану місцевою редакцією, ми
      порівняли з повідомленням університету. Працюючи над презентацією, Олена
      замінила кальковані форми природними відповідниками. Підготовлені групою
      слайди стали коротшими й точнішими. Я певен, що така перевірка варта
      часу, бо текст звучить відповідальніше. Самооцінка: "новину,
      опубліковану місцевою редакцією" - дієприкметниковий зворот; "прочитавши
      новину" - дієприслівниковий зворот зі спільним підметом група/ми.
    evaluation_criteria:
      - "90+ слів українською"
      - "Є щонайменше два дієприкметникові звороти з правильною пунктуацією"
      - "Є щонайменше два дієприслівникові звороти зі спільним підметом"
      - "Є одна сучасна присудкова модель: потрібен, певен, ладен, варт або рад"
      - "Кальки типу діючий закон або працюючі студенти замінено природними відповідниками"
      - "Після абзацу є коротка самооцінка з поясненням одного правила"
