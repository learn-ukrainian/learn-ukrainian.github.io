  - id: wb-5
    type: error-correction
    title: Підсумкова редактура
    instruction: Виправте речення й поясніть правило.
    items:
      - sentence: "У парку був зелен газон і яснії день."
        error: "зелен газон і яснії день"
        correction: "У парку був зелений газон і ясний день."
        explanation: Для нейтрального опису потрібні повні стягнені форми.
      - sentence: "Мені потрібна паспорт для реєстрації."
        error: "потрібна паспорт"
        correction: "Мені потрібен паспорт для реєстрації."
        explanation: Паспорт чоловічого роду, тому потрібен.
      - sentence: "Нам потрібен нові приклади."
        error: "потрібен нові приклади"
        correction: "Нам потрібні нові приклади."
        explanation: Приклади - множина, тому потрібні.
      - sentence: "Олена певен, що відповідь правильна."
        error: "Олена певен"
        correction: "Олена певна, що відповідь правильна."
        explanation: Форма певна узгоджується з жіночим підметом.
      - sentence: "Я є рада вас бачити."
        error: "є рада"
        correction: "Я рада вас бачити."
        explanation: У звичайному теперішньому часі зв'язка є не потрібна.
      - sentence: "Петро ладна почекати."
        error: "Петро ладна"
        correction: "Петро ладен почекати."
        explanation: З чоловічим підметом уживаємо ладен.
      - sentence: "Цей фільм варта уваги."
        error: "фільм варта"
        correction: "Цей фільм варт уваги."
        explanation: Фільм чоловічого роду, тому варт.
      - sentence: "Ці вправи варта повторення."
        error: "вправи варта"
        correction: "Ці вправи варті повторення."
        explanation: Множина вимагає форми варті.
      - sentence: "У звіті написано: дрібен дощ тривав дві години."
        error: "дрібен дощ"
        correction: "У звіті написано: дрібний дощ тривав дві години."
        explanation: У нейтральному звіті потрібна повна стягнена форма.
      - sentence: "У поезії форма зеленеє - це короткий прикметник."
        error: "короткий прикметник"
        correction: "У поезії форма зеленеє - це повна нестягнена форма."
        explanation: Зеленеє має закінчення, тому це не коротка форма.
      - sentence: "Форма ясенний місяць передає народнопоетичний стиль."
        error: "ясенний місяць"
        correction: "Форма ясен місяць передає народнопоетичний стиль."
        explanation: Коротка форма - ясен; форма ясенний тут не потрібна.
      - sentence: "Я потрібна допомога після уроку."
        error: "Я потрібна допомога"
        correction: "Мені потрібна допомога після уроку."
        explanation: У моделі потреби особа стоїть у давальному відмінку.
