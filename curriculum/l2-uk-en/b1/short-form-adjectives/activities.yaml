version: '1.0'
module: short-form-adjectives
level: b1
inline:
  - id: act-1
    type: quiz
    title: Три форми прикметника
    instruction: Оберіть правильне пояснення форми.
    items:
      - question: "Яка форма є нейтральною для сучасної української?"
        options:
          - "зелений гай"
          - "зелен гай"
          - "зеленеє гай"
        correct: 0
        explanation: Повна стягнена форма зелений є нейтральною.
      - question: "У фразі ясен місяць слово ясен - це:"
        options:
          - "коротка поетична форма"
          - "форма родового відмінка"
          - "прислівник"
        correct: 0
        explanation: Ясен не має звичайного закінчення й належить до коротких форм.
      - question: "У фразі яснії зорі слово яснії - це:"
        options:
          - "повна нестягнена форма"
          - "коротка форма"
          - "дієприкметник"
        correct: 0
        explanation: Закінчення -ії показує нестягнену повну форму множини.
      - question: "Яке речення найкраще підходить для нейтрального повідомлення?"
        options:
          - "Сьогодні ясний день."
          - "Сьогодні ясен день."
          - "Сьогодні яснеє день."
        correct: 0
        explanation: У звичайному мовленні потрібна повна стягнена форма.
      - question: "Що правильно про короткі прикметники типу зелен, ясен?"
        options:
          - "Їх небагато, і вони часто мають художній або народнопоетичний відтінок."
          - "Кожен український прикметник обов'язково має таку форму."
          - "Вони замінюють усі відмінкові форми в сучасному мовленні."
        correct: 0
        explanation: Це обмежена група, а не продуктивна таблиця для всіх прикметників.
      - question: "Яка пара правильно показує нейтральну й коротку форму?"
        options:
          - "ясний - ясен"
          - "ясний - ясного"
          - "ясний - ясно"
        correct: 0
        explanation: Ясен є короткою формою від ясний.
      - question: "Яка пара правильно показує нейтральну й нестягнену форму?"
        options:
          - "зелене - зеленеє"
          - "зелене - зелен"
          - "зелене - зелено"
        correct: 0
        explanation: Зеленеє має поетичне нестягнене закінчення.
      - question: "Чому не варто писати Я бачу зелен ліс у звичайній прозі?"
        options:
          - "Бо нейтрально треба Я бачу зелений ліс."
          - "Бо слово ліс не існує."
          - "Бо всі прикметники треба прибрати."
        correct: 0
        explanation: Коротка форма зелен стилістично маркована.
      - question: "Яке слово є короткою формою?"
        options:
          - "повен"
          - "повного"
          - "повними"
        correct: 0
        explanation: Повен не має звичайного відмінкового закінчення.
      - question: "Яке слово є повною стягненою формою?"
        options:
          - "дрібний"
          - "дрібен"
          - "дрібнії"
        correct: 0
        explanation: Дрібний є звичайною сучасною формою.
      - question: "Яке слово є повною нестягненою формою?"
        options:
          - "тихії"
          - "тихий"
          - "тих"
        correct: 0
        explanation: Тихії має поетичне нестягнене закінчення.
      - question: "Який підхід правильний для B1?"
        options:
          - "Розпізнавати поетичні короткі форми й активно вживати перевірені присудкові моделі."
          - "Створювати коротку форму від кожного прикметника."
          - "Уникати всіх слів потрібен і певен."
        correct: 0
        explanation: Це безпечна межа між пасивним і активним знанням.
  - id: act-2
    type: fill-in
    title: Оберіть доречну форму
    instruction: Доповніть речення формою, яка відповідає стилю.
    items:
      - sentence: "У звичайному описі краще сказати: Біля дому росте ____ сад."
        answer: зелений
        options:
          - зелений
          - зелен
          - зеленеє
        explanation: Для нейтрального опису потрібна повна стягнена форма.
      - sentence: "У народнопісенному рядку можлива форма: Ой, ____ гаю."
        answer: зелен
        options:
          - зелен
          - зеленого
          - зеленими
        explanation: Зелен може створювати народнопоетичний стиль.
      - sentence: "У поетичному вислові можлива форма: ____ жито, зелене."
        answer: Зеленеє
        options:
          - Зеленеє
          - Зелен
          - Зеленого
        explanation: Зеленеє є повною нестягненою формою.
      - sentence: "У прогнозі погоди природно: Сьогодні ____ небо."
        answer: ясне
        options:
          - ясне
          - ясен
          - яснії
        explanation: Нейтральний прогноз використовує повну стягнену форму.
      - sentence: "У фольклорному звертанні можливо: Ой зійди, ____ місяцю."
        answer: ясен
        options:
          - ясен
          - ясного
          - ясними
        explanation: Ясен має народнопоетичний відтінок.
      - sentence: "У сучасному тексті краще: Ішов ____ дощ."
        answer: дрібний
        options:
          - дрібний
          - дрібен
          - дрібнії
        explanation: Дрібний є нейтральною повною формою.
      - sentence: "У народній пісні можливо: ____ дощик іде."
        answer: Дрібен
        options:
          - Дрібен
          - Дрібного
          - Дрібними
        explanation: Дрібен звучить народнопоетично.
      - sentence: "У звичайному листі напишіть: Це ____ зал."
        answer: повний
        options:
          - повний
          - повен
          - повнеє
        explanation: Повний є нейтральною формою для опису з іменником.
      - sentence: "У художньому образі можливо: Човен води ____."
        answer: повен
        options:
          - повен
          - повного
          - повними
        explanation: Повен може стояти в образному присудковому вжитку.
      - sentence: "У піднесеному стилі можливо: ____ край."
        answer: славен
        options:
          - славен
          - славному
          - славними
        explanation: Славен є короткою формою з піднесеним відтінком.
      - sentence: "У сучасному нейтральному реченні краще: Це ____ край."
        answer: славний
        options:
          - славний
          - славен
          - славнії
        explanation: Славний є безпечним нейтральним варіантом.
      - sentence: "У поетичному рядку можлива нестягнена форма: ____ зорі."
        answer: яснії
        options:
          - яснії
          - ясен
          - ясного
        explanation: Яснії є повною нестягненою формою множини.
  - id: act-3
    type: match-up
    title: Сучасні присудкові моделі
    instruction: З'єднайте початок речення з природним продовженням.
    pairs:
      - left: "Мені потрібен"
        right: "час на повторення."
      - left: "Мені потрібна"
        right: "нова карта міста."
      - left: "Нам потрібне"
        right: "коротке пояснення правила."
      - left: "Студентам потрібні"
        right: "додаткові приклади."
      - left: "Я певен, що"
        right: "відповідь правильна."
      - left: "Вона певна, що"
        right: "встигне на заняття."
      - left: "Він ладен"
        right: "почекати десять хвилин."
      - left: "Марія ладна"
        right: "допомогти після уроку."
      - left: "Цей текст варт"
        right: "уважного читання."
      - left: "Ця книжка варта"
        right: "уваги."
      - left: "Я рад"
        right: "вас бачити."
      - left: "Ми раді"
        right: "працювати разом."
  - id: act-4
    type: group-sort
    title: Розподіліть форми
    instruction: Перетягніть приклади до правильного типу.
    groups:
      - label: "Нейтральна повна форма"
        items:
          - "зелений парк"
          - "ясний день"
          - "дрібний дощ"
          - "повна зала"
      - label: "Поетична коротка форма"
        items:
          - "зелен гай"
          - "ясен місяць"
          - "дрібен дощик"
          - "славен край"
      - label: "Повна нестягнена форма"
        items:
          - "зеленеє жито"
          - "яснії зорі"
          - "тихії квіти"
          - "золотая грива"
  - id: act-5
    type: error-correction
    title: Виправте форму
    instruction: Виправте одну граматичну або стилістичну помилку.
    items:
      - sentence: "Я бачу зелен парк біля дому."
        error: "Я бачу зелен парк біля дому."
        correction: "Я бачу зелений парк біля дому."
        explanation: У нейтральному реченні потрібна повна стягнена форма.
      - sentence: "Сьогодні ясен день, тому підемо гуляти."
        error: "Сьогодні ясен день, тому підемо гуляти."
        correction: "Сьогодні ясний день, тому підемо гуляти."
        explanation: Для звичайного опису погоди краще ясний.
      - sentence: "Мені потрібен нова карта."
        error: "Мені потрібен нова карта."
        correction: "Мені потрібна нова карта."
        explanation: Форма потрібна узгоджується зі словом карта.
      - sentence: "Я потрібен словник для заняття."
        error: "Я потрібен словник для заняття."
        correction: "Мені потрібен словник для заняття."
        explanation: Особа в моделі потреби стоїть у давальному відмінку.
      - sentence: "Я є певен, що це правильно."
        error: "Я є певен, що це правильно."
        correction: "Я певен, що це правильно."
        explanation: У звичайному теперішньому часі зв'язку є не вставляємо.
      - sentence: "Вона рад вас бачити."
        error: "Вона рад вас бачити."
        correction: "Вона рада вас бачити."
        explanation: Форма рада узгоджується з підметом вона.
      - sentence: "Марія ладен допомогти."
        error: "Марія ладен допомогти."
        correction: "Марія ладна допомогти."
        explanation: З жіночим підметом уживаємо ладна.
      - sentence: "Ця книжка варт уваги."
        error: "Ця книжка варт уваги."
        correction: "Ця книжка варта уваги."
        explanation: Форма варта узгоджується зі словом книжка.
      - sentence: "Це завдання варта зусиль."
        error: "Це завдання варта зусиль."
        correction: "Це завдання варте зусиль."
        explanation: Завдання середнього роду, тому варте.
      - sentence: "Певенний студент відповів першим."
        error: "Певенний"
        correction: "Упевнений студент відповів першим."
        explanation: Певенний не є нормативною формою; тут потрібне упевнений або певний за змістом.
      - sentence: "Я бачу яснії зорі в науковому звіті."
        error: "яснії зорі"
        correction: "ясні зорі"
        explanation: Нестягнена форма яснії доречна в поезії, а не в нейтральному звіті.
      - sentence: "Варто уваги ця стаття."
        error: "Варто уваги ця стаття."
        correction: "Ця стаття варта уваги."
        explanation: З підметом стаття потрібна узгоджена форма варта.
workbook:
  - id: wb-1
    type: quiz
    title: Перевірка понять
    instruction: Оберіть найточнішу відповідь.
    items:
      - question: "Що таке повний прикметник у цьому модулі?"
        options:
          - "форма з закінченням, яка узгоджується з іменником"
          - "будь-яке слово без закінчення"
          - "тільки слово потрібен"
        correct: 0
        explanation: Повні прикметники змінюються за родом, числом і відмінком.
      - question: "Що таке коротка форма зелен?"
        options:
          - "обмежена форма без звичайного прикметникового закінчення"
          - "форма орудного відмінка"
          - "помилка в усіх текстах"
        correct: 0
        explanation: Зелен є короткою формою з обмеженим стилістичним ужитком.
      - question: "Де найприродніше очікувати форму дрібен?"
        options:
          - "у народній пісні або поезії"
          - "у технічній інструкції"
          - "у банківському договорі"
        correct: 0
        explanation: Дрібен має народнопоетичний відтінок.
      - question: "Яка форма є повною нестягненою?"
        options:
          - "зеленеє"
          - "зелен"
          - "зеленого"
        correct: 0
        explanation: Зеленеє має поетичне нестягнене закінчення.
      - question: "Яка фраза є сучасною присудковою моделлю?"
        options:
          - "Мені потрібна допомога."
          - "Мені зелен допомога."
          - "Допомога потрібен мені."
        correct: 0
        explanation: Мені потрібна допомога є природною сучасною моделлю.
      - question: "Яке речення правильно вживає певен?"
        options:
          - "Я певен, що він прийде."
          - "Я певенний, що він прийде."
          - "Я певен у кімнату."
        correct: 0
        explanation: Певен відкриває зміст із що.
      - question: "Яке речення правильно вживає ладна?"
        options:
          - "Вона ладна допомогти."
          - "Вона ладен допомогти."
          - "Вона ладне допомогти."
        correct: 0
        explanation: З підметом вона потрібна форма ладна.
      - question: "Яке речення правильно вживає варта?"
        options:
          - "Ця вистава варта уваги."
          - "Ця вистава варт уваги."
          - "Ця вистава варто уваги."
        correct: 0
        explanation: Варта узгоджується зі словом вистава.
      - question: "Що означає рад/рада в етикетній фразі?"
        options:
          - "glad"
          - "green"
          - "needed"
        correct: 0
        explanation: Я рад/рада вас бачити означає I am glad to see you.
      - question: "Яке речення не калькує англійське I need?"
        options:
          - "Мені потрібен час."
          - "Я потребую час."
          - "Я потрібен час."
        correct: 0
        explanation: Мені потрібен час є природною базовою моделлю.
      - question: "Що краще сказати в нейтральному стилі?"
        options:
          - "зелений ліс"
          - "зелен ліс"
          - "зеленеє ліс"
        correct: 0
        explanation: Повна стягнена форма є нейтральною.
      - question: "Яка головна стратегія для цієї теми?"
        options:
          - "Розмежовувати читацькі поетичні форми й активні сучасні моделі."
          - "Усі форми вживати однаково."
          - "Уникати всіх прикметників."
        correct: 0
        explanation: Розмежування стилю й функції запобігає помилкам.
  - id: wb-2
    type: cloze
    title: Консультація про форми
    instruction: Заповніть пропуски природними словами.
    text: "У тексті пісні я побачив форму {1} гай. У нейтральному стилі я сказав би {2} гай. У рядку про місяць форма {3} місяцю звучить народнопоетично. Форма {4} зорі не є короткою, бо має нестягнене закінчення. Для сучасної розмови мені {5} словник і {6} карта. Я {7}, що правило вже зрозуміле. Марія {8} допомогти групі після заняття. Ця стаття {9} уваги, але це завдання теж {10} зусиль. Коли ми зустріли викладачку, я сказав: Я {11} вас бачити. Для жіночого мовця природно: Я {12} вас бачити."
    blanks:
      - id: 1
        answer: зелен
        options:
          - зелен
          - зеленого
          - зеленими
      - id: 2
        answer: зелений
        options:
          - зелений
          - зеленеє
          - зелен
      - id: 3
        answer: ясен
        options:
          - ясен
          - ясного
          - яснії
      - id: 4
        answer: яснії
        options:
          - яснії
          - ясен
          - ясного
      - id: 5
        answer: потрібен
        options:
          - потрібен
          - потрібна
          - потрібне
      - id: 6
        answer: потрібна
        options:
          - потрібна
          - потрібен
          - потрібне
      - id: 7
        answer: певен
        options:
          - певен
          - певенний
          - певного
      - id: 8
        answer: ладна
        options:
          - ладна
          - ладен
          - ладне
      - id: 9
        answer: варта
        options:
          - варта
          - варт
          - варто
      - id: 10
        answer: варте
        options:
          - варте
          - варта
          - варт
      - id: 11
        answer: рад
        options:
          - рад
          - рада
          - раде
      - id: 12
        answer: рада
        options:
          - рада
          - рад
          - раде
  - id: wb-3
    type: match-up
    title: Форма і пояснення
    instruction: З'єднайте форму з поясненням.
    pairs:
      - left: "зелений"
        right: "нейтральна повна стягнена форма"
      - left: "зелен"
        right: "коротка поетична форма"
      - left: "зеленеє"
        right: "повна нестягнена форма"
      - left: "ясний"
        right: "звичайна форма для сучасного опису"
      - left: "ясен"
        right: "коротка форма в поетичному звертанні"
      - left: "яснії"
        right: "нестягнена форма множини"
      - left: "потрібен"
        right: "присудкова модель із давальним особи"
      - left: "певен"
        right: "модель упевненості з що"
      - left: "ладен"
        right: "готовий або згодний щось зробити"
      - left: "годен"
        right: "здатний або спроможний щось зробити"
      - left: "варта"
        right: "worth, узгоджено з жіночим підметом"
      - left: "рада"
        right: "glad, узгоджено з жіночим підметом або мовцем"
  - id: wb-4
    type: group-sort
    title: Активне чи читацьке?
