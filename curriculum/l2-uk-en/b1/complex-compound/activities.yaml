  - id: wb-5
    type: essay-response
    title: Побудуйте аргумент
    instruction: "Напишіть 6-8 речень про подію, новину або план. Використайте щонайменше два єднальні, два протиставні й два розділові складносурядні речення; поясніть один випадок без коми."
    prompt: "Напишіть 6-8 речень про подію, новину або план. Використайте щонайменше два єднальні, два протиставні й два розділові складносурядні речення; поясніть один випадок без коми."
    min_words: 120
    model_answer: "У суботу наша група прийшла до культурного центру рано, і волонтери ще готували реєстрацію. У холі грала музика, а в першій залі технічна команда перевіряла звук. Ми хотіли залишитися на всі події, але частину програми перенесли онлайн. Або ми чекали на дискусію, або могли поїхати до книгарні неподалік. То зал наповнювався людьми, то коридор знову порожнів. Увечері вітер стих і дощ перестав, тому дорога додому була спокійною. Останнє речення без коми перед і, бо обставина увечері стосується обох частин."
    rubric:
      - criteria: Обсяг
        description: Є 6-8 речень і щонайменше 120 слів.
      - criteria: Сполучники
        description: Є щонайменше два єднальні, два протиставні й два розділові приклади.
      - criteria: Граматичні основи
        description: Частини в складносурядних реченнях справді мають окремі граматичні основи.
      - criteria: Пунктуація
        description: Пояснено принаймні один випадок без коми.
      - criteria: Природність
        description: Текст природний українською і не плутає просте речення з однорідними членами зі складносурядним.
