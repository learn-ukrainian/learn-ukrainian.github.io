version: '1.0'
module: complex-compound
level: b1
inline:
  - id: act-1
    type: quiz
    title: Упізнайте складносурядне речення
    instruction: "Оберіть правильне пояснення структури."
    items:
      - question: "У реченні Сонце зайшло, і місто потемніло є:"
        options:
          - "дві граматичні основи, поєднані сурядним зв'язком"
          - "одна основа з однорідними присудками"
          - "підрядна частина часу"
        correct: 0
        explanation: "Сонце зайшло і місто потемніло - дві рівноправні частини."
      - question: "У реченні Ми купили квитки і зайшли до зали кома перед і не потрібна, бо:"
        options:
          - "це однорідні присудки з одним підметом"
          - "слово і ніколи не потребує коми"
          - "це складнопідрядне речення"
        correct: 0
        explanation: "Підмет ми спільний, тому це просте речення з однорідними присудками."
      - question: "Яке речення є складносурядним?"
        options:
          - "Ми прийшли рано, але зала ще була зачинена."
          - "Коли ми прийшли, зала була зачинена."
          - "Ми прийшли рано й чекали біля входу."
        correct: 0
        explanation: "У першому реченні дві рівноправні основи з протиставним сполучником."
      - question: "Яка ознака відрізняє складносурядне речення від складнопідрядного?"
        options:
          - "рівноправність частин"
          - "наявність будь-якої коми"
          - "одна граматична основа"
        correct: 0
        explanation: "У складнопідрядному одна частина залежить від іншої."
      - question: "Схема [ ], і [ ] означає:"
        options:
          - "дві рівноправні частини, поєднані і"
          - "один підмет і два присудки"
          - "пряму мову"
        correct: 0
        explanation: "Квадратні дужки позначають окремі частини складного речення."
      - question: "У реченні Дощ посилився, і лекцію перенесли до аудиторії сполучник і передає:"
        options:
          - "послідовність із відтінком наслідку"
          - "різке протиставлення"
          - "взаємовиключення"
        correct: 0
        explanation: "Друга подія логічно йде після першої."
      - question: "Яке речення має спільний другорядний член і тому може писатися без коми?"
        options:
          - "Увечері вітер стих і дощ перестав."
          - "Вітер стих, і дощ перестав."
          - "Вітер стих, але дощ не перестав."
        correct: 0
        explanation: "Увечері стосується обох частин."
      - question: "Перед яким сполучником кома зазвичай потрібна як протиставлення?"
        options:
          - "але"
          - "і в простому переліку"
          - "або в словосполученні чай або кава"
        correct: 0
        explanation: "Але вводить протиставну частину або член речення."
      - question: "Яке речення передає вибір двома рівноправними частинами?"
        options:
          - "Або ми подамо заявку сьогодні, або конкурс закриється."
          - "Ми подамо заявку сьогодні або завтра."
          - "Ми подамо заявку, щоб устигнути."
        correct: 0
        explanation: "Або...або поєднує дві частини з окремими основами."
      - question: "Крапка з комою доречна, коли:"
        options:
          - "частини довгі або вже мають свої коми"
          - "речення має тільки два короткі слова"
          - "будь-який сполучник повторюється"
        correct: 0
        explanation: "Крапка з комою допомагає розділити великі частини."
      - question: "Тире між частинами може підкреслювати:"
        options:
          - "швидку зміну або наслідок"
          - "відмінок іменника"
          - "звичайний одиничний перелік"
        correct: 0
        explanation: "Тире сильніше за кому показує різкий перехід."
      - question: "Найкращий перший крок перед пунктуацією:"
        options:
          - "знайти граматичні основи"
          - "порахувати довжину речення"
          - "замінити всі сполучники на і"
        correct: 0
        explanation: "Без граматичних основ не видно, чи речення складне."
  - id: act-2
    type: group-sort
    title: Який це сполучник?
    instruction: "Розподіліть приклади за типом сурядного зв'язку."
    groups:
      - label: "Єднальні"
        items:
          - "і"
          - "й"
          - "та (= і)"
          - "ні...ні"
      - label: "Протиставні"
        items:
          - "але"
          - "а"
          - "проте"
          - "зате"
      - label: "Розділові"
        items:
          - "або"
          - "чи"
          - "то...то"
          - "або...або"
  - id: act-3
    type: match-up
    title: Смисловий зв'язок
    instruction: "Поєднайте речення з найточнішим смисловим зв'язком."
    pairs:
      - left: "У кав'ярні грала музика, і за вікном падав сніг."
        right: "одночасність"
      - left: "Задзвонив телефон, і зустріч довелося перенести."
        right: "послідовність із наслідком"
      - left: "Ми прийшли вчасно, але подія вже почалася."
        right: "протиставлення"
      - left: "У першій залі була лекція, а в другій тривала дискусія."
        right: "зіставлення"
      - left: "Або ми перевіряємо джерело, або текст не публікуємо."
        right: "взаємовиключення"
      - left: "То вітер здіймав пил, то дощ прибивав його до землі."
        right: "чергування"
      - left: "Квитки були дорогі, зате місця виявилися зручними."
        right: "компенсація через зате"
      - left: "Ні сайт не відкривався, ні форма не надсилалася."
        right: "заперечний паралелізм"
      - left: "Почався вітер - і площа спорожніла."
        right: "швидкий наслідок"
      - left: "Увечері вітер стих і дощ перестав."
        right: "спільний другорядний член"
      - left: "Може, зустріч затримається і студенти встигнуть."
        right: "спільне вставне слово"
      - left: "Коли почнеться лекція і хто її модеруватиме?"
        right: "спільна питальна рамка"
  - id: act-4
    type: error-correction
    title: Виправте пунктуацію
    instruction: "Виправте помилку в реченні або підтвердьте правильний розділовий знак."
    items:
      - sentence: "Сонце зайшло і, місто потемніло."
        error: "Сонце зайшло і, місто потемніло."
        correction: "Сонце зайшло, і місто потемніло."
        explanation: "Кома стоїть перед і, бо є дві граматичні основи."
      - sentence: "Ми купили квитки, і зайшли до зали."
        error: "Ми купили квитки, і зайшли до зали."
        correction: "Ми купили квитки і зайшли до зали."
        explanation: "Один підмет ми і два однорідні присудки, тому кома не потрібна."
      - sentence: "Увечері вітер стих, і дощ перестав."
        error: "Увечері вітер стих, і дощ перестав."
        correction: "Увечері вітер стих і дощ перестав."
        explanation: "Увечері є спільним другорядним членом для обох частин."
      - sentence: "Вітер стих і дощ перестав."
        error: "Вітер стих і дощ перестав."
        correction: "Вітер стих, і дощ перестав."
        explanation: "Спільного другорядного члена немає, тому кома потрібна."
      - sentence: "Ми прийшли рано але зала була зачинена."
        error: "Ми прийшли рано але зала була зачинена."
        correction: "Ми прийшли рано, але зала була зачинена."
        explanation: "Перед але між частинами потрібна кома."
      - sentence: "Або ми подамо заявку або конкурс закриється."
        error: "Або ми подамо заявку або конкурс закриється."
        correction: "Або ми подамо заявку, або конкурс закриється."
        explanation: "Повторюване або...або потребує коми між частинами."
      - sentence: "То дощ посилювався то вітер розганяв хмари."
        error: "То дощ посилювався то вітер розганяв хмари."
        correction: "То дощ посилювався, то вітер розганяв хмари."
        explanation: "Повторюване то...то відділяє частини комою."
      - sentence: "Зала була невелика; але звук працював добре."
        error: "Зала була невелика; але звук працював добре."
        correction: "Зала була невелика, але звук працював добре."
        explanation: "Короткі частини без внутрішніх ком зазвичай розділяє кома, не крапка з комою."
      - sentence: "У першій залі волонтери перевіряли списки, відповідали на запитання, а в другій команда налаштовувала звук, світло й трансляцію."
        error: "У першій залі волонтери перевіряли списки, відповідали на запитання, а в другій команда налаштовувала звук, світло й трансляцію."
        correction: "У першій залі волонтери перевіряли списки, відповідали на запитання; а в другій команда налаштовувала звук, світло й трансляцію."
        explanation: "Крапка з комою доречна, бо частини поширені й мають внутрішні коми."
      - sentence: "Ще хвилина, і двері зачинилися."
        error: "Ще хвилина, і двері зачинилися."
        correction: "Ще хвилина - і двері зачинилися."
        explanation: "Тире краще підкреслює швидкий наслідок."
      - sentence: "Нехай команда перевірить факти, і редактор затвердить текст!"
        error: "Нехай команда перевірить факти, і редактор затвердить текст!"
        correction: "Нехай команда перевірить факти і редактор затвердить текст!"
        explanation: "Обидві частини мають спільну спонукальну рамку."
      - sentence: "План складний проте команда готова."
        error: "План складний проте команда готова."
        correction: "План складний, проте команда готова."
        explanation: "Перед проте між частинами потрібна кома."
  - id: act-5
    type: fill-in
    title: Виберіть знак або сполучник
    instruction: "Заповніть пропуск так, щоб речення було граматично й пунктуаційно правильним."
    items:
      - sentence: "Сонце вийшло____ туман розвіявся."
        answer: ", і"
        options:
          - ", і"
          - "і"
          - "; але"
        explanation: "Дві основи без спільного члена потребують коми перед і."
      - sentence: "Уранці сонце вийшло____ туман розвіявся."
        answer: "і"
        options:
          - "і"
          - ", і"
          - ", але"
        explanation: "Уранці стосується обох частин, тому кома не потрібна."
      - sentence: "Ми прийшли рано____ зала ще була зачинена."
        answer: ", але"
        options:
          - ", але"
          - "і"
          - "або"
        explanation: "Контраст очікування передає але."
      - sentence: "У першій аудиторії тривала лекція____ у другій ішла дискусія."
        answer: ", а"
        options:
          - ", а"
          - "або"
          - "та"
        explanation: "А зіставляє дві паралельні ситуації."
      - sentence: "____ ми перевіримо джерело, ____ текст не опублікуємо."
        answer: "Або / або"
        options:
          - "Або / або"
          - "І / і"
          - "Але / проте"
        explanation: "Або...або показує вибір між двома варіантами."
      - sentence: "____ дощ посилювався, ____ вітер розганяв хмари."
        answer: "То / то"
        options:
          - "То / то"
          - "Але / і"
          - "Зате / або"
        explanation: "То...то передає чергування подій."
      - sentence: "Квитки були дорогі____ місця виявилися зручними."
        answer: ", зате"
        options:
          - ", зате"
          - "і"
          - "або"
        explanation: "Зате компенсує мінус плюсом."
      - sentence: "Може, зустріч затримається____ студенти встигнуть на каву."
        answer: "і"
        options:
          - "і"
          - ", і"
          - "; і"
        explanation: "Може є спільним вставним словом."
      - sentence: "Волонтери перевіряли списки, роздавали бейджі____ а технічна команда налаштовувала звук, світло й трансляцію."
        answer: ";"
        options:
          - ";"
          - ","
          - "-"
        explanation: "Частини поширені й мають внутрішні коми, тому доречна крапка з комою."
      - sentence: "Одна помилка в даті____ заявка повернеться без розгляду."
        answer: "- і"
        options:
          - "- і"
          - ", але"
          - "або"
        explanation: "Тире підкреслює швидкий наслідок."
      - sentence: "Чи почнеться лекція вчасно____ хто її модеруватиме?"
        answer: "і"
        options:
          - "і"
          - ", і"
          - ", але"
        explanation: "Обидві частини входять в одне питання."
      - sentence: "Новина звучить переконливо____ доказів у ній немає."
        answer: ", проте"
        options:
          - ", проте"
          - "і"
          - "або"
        explanation: "Проте вводить протиставну частину."
workbook:
  - id: wb-1
    type: match-up
    title: Схеми складносурядних речень
    instruction: "Поєднайте схему з прикладом."
    pairs:
      - left: "[ ], і [ ]."
        right: "День потеплів, і парк наповнився людьми."
      - left: "[ ], але [ ]."
        right: "Ми поспішали, але автобус запізнився."
      - left: "[ ], а [ ]."
        right: "У залі слухали лекцію, а в коридорі чекали учасники."
      - left: "Або [ ], або [ ]."
        right: "Або ми пишемо сьогодні, або дедлайн минає."
      - left: "То [ ], то [ ]."
        right: "То сонце виходило, то дощ повертався."
      - left: "[ ] - і [ ]."
        right: "Ще мить - і поїзд рушив."
      - left: "[ ]; а [ ]."
        right: "Команда перевіряла списки, бейджі й техніку; а модераторка готувала вступ."
      - left: "[ ] і [ ]."
        right: "Увечері світло згасло і вулиця стихла."
      - left: "Ні [ ], ні [ ]."
        right: "Ні сайт не працював, ні форма не відкривалася."
      - left: "[ ], проте [ ]."
        right: "Текст короткий, проте аргументи в ньому сильні."
      - left: "[ ], зате [ ]."
        right: "Маршрут довший, зате дорога безпечніша."
      - left: "[ ], або [ ]."
        right: "Ми зачекаємо тут, або зустріч перенесуть."
