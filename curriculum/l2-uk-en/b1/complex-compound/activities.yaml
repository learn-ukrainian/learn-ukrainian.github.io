        correct: 0
        explanation: "То...то розділяє чергування комою."
      - question: "Може, сайт оновиться __ форма стане доступною."
        options:
          - "і"
          - ", і"
          - "; і"
        correct: 0
        explanation: "Може стосується обох частин."
      - question: "Квитки були дорогі __ місця виявилися зручними."
        options:
          - ", зате"
          - "і"
          - "чи"
        correct: 0
        explanation: "Зате показує компенсацію."
  - id: wb-3
    type: cloze
