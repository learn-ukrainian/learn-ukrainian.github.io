          - ", але"
        correct: 0
        explanation: "Обидві частини в одному питанні."
      - question: "Нехай організатори відкриють зал __ учасники займуть місця!"
        options:
          - "і"
          - ", і"
          - "; і"
        correct: 0
        explanation: "Спільна спонукальна рамка."
      - question: "Новина емоційна __ джерела в ній не названо."
        options:
          - ", але"
          - "і"
