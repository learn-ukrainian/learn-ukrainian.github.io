- title: "B1 M75 plan: Складносурядне речення"
  role: curriculum
  notes: "Планове джерело для визначення складносурядного речення, груп сурядних сполучників, смислових зв'язків і пунктуації."
  source_ref: curriculum/l2-uk-en/plans/b1/complex-compound.yaml
- title: "9 клас: складносурядне речення"
  role: textbook
  notes: "Локальне підручникове джерело для рівноправності частин, єднальних, протиставних і розділових сполучників, коми, винятків, крапки з комою та тире."
  source_ref: docs/references/textbooks-txt/9-klas-ukrajinska-mova-voron-2017.txt
- title: "11 клас: пунктуація у складносурядному реченні"
  role: textbook
  notes: "Підтвердження правил про спільний другорядний член, спільну вставну конструкцію, однакову питальну/спонукальну/окличну інтонацію, крапку з комою і тире."
  source_ref: docs/references/textbooks-txt/11-klas-ukrajinska-mova-voron-2019.txt
- title: "B1 M52: Однорідні члени речення"
  role: curriculum
  notes: "Контрастне джерело для межі між простим реченням з однорідними членами і складносурядним реченням з двома граматичними основами."
  source_ref: curriculum/l2-uk-en/b1/homogeneous-members/module.md
- title: "B1 M74: Контрольна робота 6"
  role: curriculum
  notes: "Попередній сертифікований модуль, після якого починається блок B1.7 складного синтаксису."
  source_ref: curriculum/l2-uk-en/b1/checkpoint-participles/module.md
