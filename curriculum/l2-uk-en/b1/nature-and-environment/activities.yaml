version: '1.0'
module: nature-and-environment
level: b1
inline:
  - id: act-1
    type: quiz
    title: Погода і прогноз
    instruction: "Оберіть точне слово або найприродніше пояснення."
    items:
      - question: "Що означає слово опади?"
        options:
          - "дощ, сніг, град або інші явища, що падають з неба"
          - "лише сильний вітер"
          - "лише температура повітря"
        correct: 0
        explanation: Опади - загальна назва для дощу, снігу, граду тощо.
      - question: "Мряка - це:"
        options:
          - "дуже дрібний дощ, часто майже як туман"
          - "раптовий сильний вітер без дощу"
          - "крига на дорогах після морозу"
        correct: 0
        explanation: Мряка дрібна й тривала; крига на дорогах - ожеледиця.
      - question: "Злива - це:"
        options:
          - "сильний дощ"
          - "легкий туман"
          - "теплий вітер"
        correct: 0
        explanation: Злива означає інтенсивний дощ.
      - question: "Як природно сказати про небо, вкрите хмарами?"
        options:
          - "Сьогодні хмарно."
          - "Сьогодні хмарний дощить."
          - "Сьогодні хмарами."
        correct: 0
        explanation: Хмарно - безособова прислівникова форма для стану неба.
      - question: "Відлига - це:"
        options:
          - "потепління взимку, коли сніг або крига тане"
          - "найсильніший мороз року"
          - "суха спека без вітру"
        correct: 0
        explanation: Відлига пов'язана з таненням під час зимового потепління.
      - question: "Ожеледиця найчастіше небезпечна:"
        options:
          - "на дорогах і тротуарах"
          - "лише в кімнаті"
          - "лише під час спеки"
        correct: 0
        explanation: Ожеледиця - слизька крига на поверхнях.
      - question: "Завірюха поєднує:"
        options:
          - "сніг, вітер і погану видимість"
          - "спеку, пил і безхмарне небо"
          - "росу, туман і штиль"
        correct: 0
        explanation: Завірюха - снігова буря.
      - question: "Що звучить як прогноз погоди?"
        options:
          - "Завтра очікується хмарна погода з проясненнями."
          - "Завтра дерева дуже красиві."
          - "Завтра калина символічна."
        correct: 0
        explanation: Прогноз подає очікуваний стан погоди.
      - question: "Короткочасні опади означають:"
        options:
          - "дощ або сніг триватиме недовго"
          - "опади не можуть початися"
          - "температура буде короткою"
        correct: 0
        explanation: Короткочасний описує тривалість явища.
      - question: "Бабине літо - це:"
        options:
          - "теплі ясні дні восени після похолодання"
          - "перша завірюха взимку"
          - "весняна повінь"
        correct: 0
        explanation: Бабине літо - теплий осінній період.
      - question: "Іній з'являється:"
        options:
          - "на поверхнях після холодної ночі"
          - "тільки під час літньої спеки"
          - "лише в морі"
        correct: 0
        explanation: Іній - замерзла волога на поверхнях.
      - question: "Яке речення найточніше описує погоду?"
        options:
          - "Зранку хмарно, можлива мряка, температура близько п'яти градусів."
          - "Зранку погода якась."
          - "Зранку природа хороша."
        correct: 0
        explanation: Точний опис називає небо, опади й температуру.
  - id: act-2
    type: fill-in
    title: Рослини й сезонні дії
    instruction: "Вставте слово, яке природно завершує речення."
    items:
      - sentence: "Навесні на гілках розпускаються ____ ."
        answer: бруньки
        options:
          - бруньки
          - зливи
          - ожеледиці
        explanation: Бруньки розпускаються на деревах і кущах.
      - sentence: "Біля хати часто росте ____ як культурний символ України."
        answer: калина
        options:
          - калина
          - борсук
          - град
        explanation: Калина - рослина й український культурний символ.
      - sentence: "На полі цвіте високий ____ ."
        answer: соняшник
        options:
          - соняшник
          - лелека
          - туман
        explanation: Соняшник - рослина, типова для літніх полів.
      - sentence: "Біля українських хат часто садять ____ ."
        answer: чорнобривці
        options:
          - чорнобривці
          - опади
          - видри
        explanation: Чорнобривці - поширені квіти й культурний образ.
      - sentence: "Вічнозелений ____ має символічне значення в народній культурі."
        answer: барвінок
        options:
          - барвінок
          - ожеледиця
          - заповідник
        explanation: Барвінок - рослина, а не погодне явище чи територія.
      - sentence: "Коли зерно достигає, починаються ____ ."
        answer: жнива
        options:
          - жнива
          - мряки
          - лелеки
        explanation: Жнива - період збирання зернового врожаю.
      - sentence: "Фермери збирають добрий ____ після сприятливої погоди."
        answer: урожай
        options:
          - урожай
          - туман
          - барвінок
        explanation: Урожай - результат вирощування культур.
      - sentence: "У лісі можна знайти суниці, малину, ожину й ____ ."
        answer: чорниці
        options:
          - чорниці
          - ожеледицю
          - зливу
        explanation: Чорниці належать до ягід.
      - sentence: "Отруйний ____ не можна класти до кошика."
        answer: мухомор
        options:
          - мухомор
          - соняшник
          - лелека
        explanation: Мухомор - отруйний гриб.
      - sentence: "Після дощу трава пахне свіжо, а на листі блищить ____ ."
        answer: роса
        options:
          - роса
          - посуха
          - завірюха
        explanation: Роса - краплі вологи на траві чи листі.
      - sentence: "У степу часто видно широкі поля ____ ."
        answer: пшениці
        options:
          - пшениці
          - видри
          - синиці
        explanation: Пшениця - сільськогосподарська культура.
      - sentence: "Стара ____ нахиляється гілками до води."
        answer: верба
        options:
          - верба
          - бджола
          - злива
        explanation: Верба - дерево, яке часто росте біля води.
  - id: act-3
    type: match-up
    title: Тварини й місця
    instruction: "Поєднайте тварину або птаха з природним описом."
    pairs:
      - left: лелека
        right: великий птах, пов'язаний із домом і добробутом
      - left: ластівка
        right: птах, про якого кажуть, що низький політ віщує дощ
      - left: зубр
        right: рідкісна велика тварина, яку охороняють
      - left: борсук
        right: лісова тварина, що живе в норі
      - left: видра
        right: тварина, пов'язана з водою та чистими річками
      - left: їжак
        right: невелика тварина з голками
      - left: дятел
        right: птах, який стукає по деревах
      - left: бджола
        right: комаха, що запилює рослини
      - left: метелик
        right: комаха з крильми, яку часто бачать біля квітів
      - left: козуля
        right: дика тварина, схожа на невеликого оленя
      - left: журавель
        right: великий птах, відомий сезонними перельотами
      - left: синиця
        right: невеликий птах, якого часто бачать узимку біля годівниць
  - id: act-4
    type: group-sort
    title: Екологічна лексика
    instruction: "Розподіліть слова за тематичними групами."
    groups:
      - label: "Проблеми"
        items:
          - забруднення
          - вирубка
          - вимирання
          - посуха
      - label: "Дії захисту"
        items:
          - сортувати
          - переробляти
          - очищати
          - відновлювати
      - label: "Місця й системи"
        items:
          - заповідник
          - екосистема
          - ліс
          - річка
      - label: "Відходи й ресурси"
        items:
          - папір
          - скло
          - пластик
          - органічні рештки
  - id: act-5
    type: error-correction
    title: Редактор довкілля
    instruction: "Виправте одну головну лексичну або граматичну помилку."
    items:
      - sentence: "Окружаюче середовище потребує захисту."
        error: Окружаюче середовище
        correction: Довкілля
        error_type: phrase
        explanation: Довкілля - природне українське слово для цієї теми.
      - sentence: "У лісі не можна залишати мусор."
        error: мусор
        correction: сміття
        explanation: Сміття або відходи - нормативні українські слова.
      - sentence: "Переработка пластику зменшує кількість відходів."
        error: Переработка
        correction: Переробка
        explanation: Українською переробка.
      - sentence: "Забруднення шкодить для річки."
        error: для річки
        correction: річці
        error_type: phrase
        explanation: "Шкодити керує давальним відмінком без прийменника: шкодить річці."
      - sentence: "Ми піклуємося за тварин у заповіднику."
        error: за
        correction: про
        explanation: Піклуватися про тварин.
      - sentence: "Люди мають сортирувати папір і скло."
        error: сортирувати
        correction: сортувати
        explanation: Нормативна форма - сортувати.
      - sentence: "Цей завод загрязнює повітря."
        error: загрязнює
        correction: забруднює
        explanation: Українською забруднює.
      - sentence: "У заповіднику охороняють рідкі види від вимірання."
        error: вимірання
        correction: вимирання
        explanation: Правильна форма - вимирання.
      - sentence: "Після зливи на дорозі була гололедиця."
        error: гололедиця
        correction: ожеледиця
        explanation: Нормативне слово для слизької криги на дорогах - ожеледиця.
      - sentence: "Лелека - це животне, що часто символізує дім."
        error: животне
        correction: птах
        explanation: Лелека - птах; животне є калькованим і неприродним.
      - sentence: "Калина росте коло хати і являється символом України."
        error: являється
        correction: є
        explanation: "У цьому значенні природно: є символом."
      - sentence: "Ніхто хоче жити біля забрудненої річки."
        error: Ніхто хоче
        correction: Ніхто не хоче
        error_type: phrase
        explanation: "Українське заперечення потребує не: ніхто не хоче."
  - id: act-6
    type: quiz
    title: Літературний краєвид
    instruction: "Оберіть правильний аналіз слова або образу."
    items:
      - question: "У фразі ліс шепоче використано:"
        options:
          - "персоніфікацію"
          - "числівник"
          - "назву опадів"
        correct: 0
        explanation: Ліс отримує людську дію шепотіти.
      - question: "У фразі білий, наче сніг є:"
        options:
          - "порівняння"
          - "переробка"
          - "назва тварини"
        correct: 0
        explanation: Наче прямо вводить порівняння.
      - question: "Срібний іній - це приклад:"
        options:
          - "епітета"
          - "подвійного заперечення"
          - "прогнозу погоди"
        correct: 0
        explanation: Срібний виразно описує іній.
      - question: "Земля дихала свіжо - це:"
        options:
          - "персоніфікація"
          - "помилка керування"
          - "назва заповідника"
        correct: 0
        explanation: Землі приписано дію живої істоти.
      - question: "Краєвид означає:"
        options:
          - "вид на місцевість, landscape"
          - "дрібний дощ"
          - "період збирання зерна"
        correct: 0
        explanation: Краєвид - це те, що відкривається оку або описується як пейзаж.
      - question: "У художньому описі мряка може створювати:"
        options:
          - "тихий, трохи туманний настрій"
          - "лише математичну точність"
          - "назву домашньої тварини"
        correct: 0
        explanation: Мряка впливає на атмосферу й настрій опису.
      - question: "Яке речення має образний засіб?"
        options:
          - "Верба нахилилася, наче слухала річку."
          - "Температура становить сім градусів."
          - "Пластик потрібно сортувати."
        correct: 0
        explanation: Наче слухала річку створює образ.
      - question: "Що найкраще показує настрій тексту?"
        options:
          - "добір прикметників, дієслів і природних деталей"
          - "лише кількість абзаців"
          - "лише назва автора"
        correct: 0
        explanation: Настрій формується мовними деталями.
      - question: "Слово лан у фразі соняшниковий лан означає:"
        options:
          - "поле"
          - "зливу"
          - "птаха"
        correct: 0
        explanation: Лан - поле, часто в поетичному або піднесеному контексті.
      - question: "У реченні після нічної зливи земля дихала свіжо слово злива означає:"
        options:
          - "сильний дощ"
          - "легкий мороз"
          - "вид квітки"
        correct: 0
        explanation: Злива - інтенсивний дощ.
      - question: "Яке питання допомагає аналізувати опис природи?"
        options:
          - "Який настрій створено?"
          - "Скільки коштує квиток?"
          - "Яка посада в резюме?"
        correct: 0
        explanation: Настрій є ключовим для художнього опису.
      - question: "Що поєднує опис природи й екологічну тему?"
        options:
          - "увага до місця, живих істот і відповідальності людини"
          - "лише список випадкових слів"
          - "тільки минулий час дієслова"
        correct: 0
        explanation: Природнича тема переходить від опису до відповідальності.
workbook:
  - id: wb-1
    type: quiz
    title: Тематичний контроль
    instruction: "Оберіть правильний варіант."
    items:
      - question: "Довкілля - це:"
        options:
          - "середовище, у якому живуть люди, рослини й тварини"
          - "лише домашня кімната"
          - "лише список тварин"
        correct: 0
        explanation: Довкілля охоплює природне й життєве середовище.
      - question: "Заповідник потрібен, щоб:"
        options:
          - "охороняти природу й рідкісні види"
          - "збільшувати сміття"
          - "замінити прогноз погоди"
        correct: 0
        explanation: Заповідники створюють для охорони природи.
      - question: "Переробка пов'язана з:"
        options:
          - "повторним використанням матеріалів після обробки"
          - "утворенням інею"
          - "поверненням птахів навесні"
        correct: 0
        explanation: Переробка стосується відходів і матеріалів.
      - question: "Вимирання видів означає:"
        options:
          - "зникнення видів"
          - "збирання врожаю"
          - "короткий прогноз"
        correct: 0
        explanation: Вимирання - процес зникнення виду.
      - question: "Яка пара належить до рослин?"
        options:
          - "калина, соняшник"
          - "лелека, борсук"
          - "мряка, злива"
        correct: 0
        explanation: Калина й соняшник - рослини.
      - question: "Яка пара належить до птахів?"
        options:
          - "лелека, ластівка"
          - "дуб, верба"
          - "опади, туман"
        correct: 0
        explanation: Лелека й ластівка - птахи.
      - question: "Що є погодним явищем?"
        options:
          - "ожеледиця"
          - "барвінок"
          - "зубр"
        correct: 0
        explanation: Ожеледиця - небезпечний стан поверхні після замерзання.
      - question: "Яке слово найкраще підходить до фрази берегти ____?"
        options:
          - "природу"
          - "зливою"
          - "хмарно"
        correct: 0
        explanation: Берегти природу - природна конструкція.
      - question: "Що треба робити вдома з папером, склом і пластиком?"
        options:
          - "сортувати"
          - "завірюхати"
          - "вимирати"
        correct: 0
        explanation: Відходи сортують перед переробкою.
      - question: "Яке речення має правильне керування?"
        options:
          - "Забруднення шкодить природі."
          - "Забруднення шкодить для природи."
          - "Забруднення шкодить за природою."
        correct: 0
        explanation: Шкодити керує давальним відмінком.
      - question: "Яке речення має вставне слово?"
        options:
          - "На жаль, річка забруднена."
          - "Річка забруднена водою."
          - "Лелека летить високо."
        correct: 0
        explanation: На жаль виражає ставлення мовця.
      - question: "Яке речення має порівняння?"
        options:
          - "Після зливи повітря чистіше, ніж учора."
          - "Після зливи є калюжі."
          - "Після зливи почалися опади."
        correct: 0
        explanation: Чистіше, ніж учора - порівняльна конструкція.
  - id: wb-2
    type: fill-in
    title: Погода, довкілля, аргумент
    instruction: "Вставте точне слово або конструкцію."
    items:
      - sentence: "У прогнозі повідомили про сильні ____ на заході країни."
        answer: опади
        options:
          - опади
          - лелеки
          - врожаї
        explanation: У прогнозах опади - дощ, сніг, град тощо.
      - sentence: "Зранку було ____ , тому сонця майже не видно."
        answer: хмарно
        options:
          - хмарно
          - калина
          - борсук
        explanation: Хмарно описує стан неба.
      - sentence: "Після раптової ____ вода стояла на дорозі."
