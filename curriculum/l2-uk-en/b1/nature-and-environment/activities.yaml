  - id: wb-7
    type: essay-response
    title: Опис і захист місця
    instruction: "Напишіть короткий текст про реальний або вигаданий природний простір."
    min_words: 140
    prompt: "Напишіть 10-12 речень про парк, ліс, річку, поле, степ, гори або узбережжя. Опишіть погоду, назвіть щонайменше три рослини, дві тварини або птахи, одну екологічну проблему й дві конкретні дії для захисту довкілля. Використайте принаймні шість слів: довкілля, опади, хмарно, мряка, злива, калина, соняшник, лелека, забруднення, заповідник, переробка, вимирання, урожай, краєвид. Додайте одне вставне слово й одне порівняння."
    model_answer: "Мій улюблений краєвид - берег річки біля невеликого села. Вранці там часто хмарно, а після нічної зливи над водою стоїть легкий туман. Біля стежки росте калина, далі видно стару вербу й кілька високих соняшників на городі. Навесні сюди повертається лелека, а в траві чути бджіл і коників. На жаль, після відпочинку люди іноді залишають сміття біля води. Таке забруднення шкодить річці й тваринам, які живуть поруч. На мою думку, громада має поставити контейнери для сортування й регулярно очищати берег. Переробка паперу, скла й пластику допоможе зменшити кількість відходів. Також потрібно пояснювати дітям, чому довкілля важливе для здоров'я людей і для майбутнього врожаю. Якщо школярі побачать, як сортувати відходи правильно, вони легше підтримають ці звички вдома. Улітку чиста вода також допоможе рибі, жабам і водяним рослинам вижити під час спеки. Після прибирання берег стане чистішим, ніж був раніше, і люди знову бачитимуть не сміття, а спокійну річку."
    rubric:
      - criteria: Лексика природи
        description: Є погода, рослини, тварини або птахи й щонайменше шість тематичних слів.
        points: 4
      - criteria: Екологічний аргумент
        description: Названо проблему, причину або наслідок і дві конкретні дії.
        points: 4
      - criteria: Зв'язність
        description: Текст має зрозумілий порядок і логічні сполучники.
        points: 3
      - criteria: Граматика B1
        description: Є вставне слово, порівняння та правильне керування після шкодити або піклуватися.
        points: 3
