  - id: wb-7
    type: essay-response
    title: Опис міста або регіону
    instruction: "Напишіть 5-8 речень українською про реальне або вигадане місце."
    prompt: "Опишіть місто, район або регіон. Використайте щонайменше три слова з географічної лексики, дві форми місцевого відмінка, дві форми родового відмінка та одну модель напрямку: до + родовий або у/на + знахідний."
    min_words: 90
    model_answer: "Чернівці - місто на Буковині, недалеко від Карпат. У центрі міста є старі вулиці, площі й архітектурні пам'ятки. На вулиці Ольги Кобилянської багато кав'ярень, тому це добрий орієнтир для туристів. З Чернівців можна поїхати до Хотина або в Карпати. Мені подобається ця місцевість, бо тут поєднуються міський простір, пагорби й долина Прута. На околиці міста ритм спокійніший, ніж у центрі. Від центральної площі можна дійти до набережної, а з пагорба видно річку й передмістя. Я б порадив відвідати Чернівці навесні, коли краєвид особливо гарний і місто зручне для довгих прогулянок."
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "5-8 речень і щонайменше 90 слів."
      - criteria: "Лексика"
        points: 2
        description: "Є щонайменше три тематичні слова про місце або рельєф."
      - criteria: "Відмінки"
        points: 3
        description: "Правильно вжито місцевий, родовий і одну модель напрямку."
      - criteria: "Зв'язність"
        points: 2
        description: "Текст має вступ, просторовий опис і коротку рекомендацію або оцінку."
