version: '1.0'
module: places-and-locations
level: b1
inline:
  - id: act-1
    type: quiz
    title: Що це за місце?
    instruction: "Оберіть найточніше слово або модель."
    items:
      - question: "Яке слово означає територію біля великого міста або навколо нього?"
        options:
          - "передмістя"
          - "півострів"
          - "височина"
        correct: 0
        explanation: "Передмістя - територія біля великого міста або навколо нього."
      - question: "Що таке набережна?"
        options:
          - "вулиця або простір уздовж річки чи моря"
          - "маленька гора в лісі"
          - "адміністративний район"
        correct: 0
        explanation: "Набережна пов'язана з водою та міським простором."
      - question: "Яке слово називає ділянку суші, оточену водою?"
        options:
          - "острів"
          - "яр"
          - "околиця"
        correct: 0
        explanation: "Острів оточений водою з усіх боків."
      - question: "Що означає краєвид?"
        options:
          - "вид на місцевість або пейзаж"
          - "документ для туриста"
          - "тип міського транспорту"
        correct: 0
        explanation: "Краєвид - вид на місцевість або пейзаж."
      - question: "Яка пара належить до рельєфу?"
        options:
          - "рівнина, височина"
          - "площа, провулок"
          - "театр, музей"
        correct: 0
        explanation: "Рівнина й височина описують форму земної поверхні."
      - question: "Яка пара називає міські простори?"
        options:
          - "площа, вулиця"
          - "озеро, море"
          - "гора, яр"
        correct: 0
        explanation: "Площа й вулиця є частинами міського простору."
      - question: "Що таке заповідник?"
        options:
          - "природоохоронна територія"
          - "головна площа міста"
          - "малий провулок"
        correct: 0
        explanation: "Заповідник охороняє природну територію."
      - question: "Яке слово найкраще підходить для краю населеного пункту?"
        options:
          - "околиця"
          - "узбережжя"
          - "низовина"
        correct: 0
        explanation: "Околиця - край міста або територія біля нього."
      - question: "Що таке провулок?"
        options:
          - "невелика вулиця або проїзд"
          - "широке узбережжя"
          - "природний заповідник"
        correct: 0
        explanation: "Провулок - невелика вулиця або проїзд."
      - question: "Яке слово називає територію вздовж моря?"
        options:
          - "узбережжя"
          - "площа"
          - "височина"
        correct: 0
        explanation: "Узбережжя - територія вздовж моря або іншої великої водойми."
      - question: "Яке слово може бути орієнтиром у місті?"
        options:
          - "театр"
          - "відмінок"
          - "низовина"
        correct: 0
        explanation: "Орієнтиром може бути помітний об'єкт, наприклад театр."
      - question: "Яка фраза природна для центральної частини міста?"
        options:
          - "центр міста"
          - "центр місто"
          - "місто центру"
        correct: 0
        explanation: "Центр міста має родовий відмінок."
  - id: act-2
    type: fill-in
    title: Де розташовано?
    instruction: "Вставте прийменник або правильну форму."
    items:
      - sentence: "Музей розташований ____ Києві."
        answer: "у"
        options:
          - "у"
          - "на"
          - "з"
        explanation: "Для міста вживаємо у/в + місцевий."
      - sentence: "Готель стоїть ____ площі Ринок."
        answer: "на"
        options:
          - "на"
          - "у"
          - "з"
        explanation: "З назвами площ уживаємо на + місцевий."
      - sentence: "Кав'ярня є ____ вулиці Шевченка."
        answer: "на"
        options:
          - "на"
          - "до"
          - "з"
        explanation: "З назвами вулиць уживаємо на."
      - sentence: "Синевир розташований ____ Карпатах."
        answer: "у"
        options:
          - "у"
          - "на"
          - "до"
        explanation: "Нормативна модель: у Карпатах."
      - sentence: "Улітку багато людей відпочиває ____ узбережжі."
        answer: "на"
        options:
          - "на"
          - "у"
          - "з"
        explanation: "На узбережжі - відкритий прибережний простір."
      - sentence: "Університетський корпус стоїть ____ центрі міста."
        answer: "у"
        options:
          - "у"
          - "на"
          - "із"
        explanation: "У центрі міста відповідає на питання де?."
      - sentence: "Національний парк розташований ____ заповідній місцевості."
        answer: "у"
        options:
          - "у"
          - "на"
          - "до"
        explanation: "У місцевості - місцевий відмінок жіночого роду."
      - sentence: "Стара церква стоїть ____ пагорбі."
        answer: "на"
        options:
          - "на"
          - "з"
          - "до"
        explanation: "На пагорбі - місце на підвищенні."
      - sentence: "Наша квартира ____ передмісті."
        answer: "у"
        options:
          - "у"
          - "на"
          - "з"
        explanation: "Передмістя має форму у передмісті."
      - sentence: "В Україні багато міст ____ берегах річок."
        answer: "на"
        options:
          - "на"
          - "у"
          - "до"
        explanation: "На берегах - місце вздовж води."
      - sentence: "Туристичний офіс працює ____ провулку біля театру."
        answer: "у"
        options:
          - "у"
          - "на"
          - "із"
        explanation: "У провулку - місце всередині малого міського простору."
      - sentence: "Кафедральний собор видно ____ околиці."
        answer: "з"
        options:
          - "з"
          - "у"
          - "на"
        explanation: "З околиці - звідки видно."
  - id: act-3
    type: match-up
    title: Питання і модель
    instruction: "Поєднайте фразу з її значенням або граматичною моделлю."
    pairs:
      - left: "у Києві"
        right: "де? місто, місцевий відмінок"
      - left: "в Україні"
        right: "де? держава, сучасна нейтральна норма"
      - left: "на площі"
        right: "де? відкритий міський простір"
      - left: "на вулиці"
        right: "де? назва або тип вулиці"
      - left: "у передмісті"
        right: "де? простір біля великого міста"
      - left: "з Києва"
        right: "звідки? походження або старт"
      - left: "зі Львова"
        right: "звідки? милозвучний варіант з родовим"
      - left: "із Закарпаття"
        right: "звідки? регіон з із для легшої вимови"
      - left: "до Львова"
        right: "куди? напрямок із до + родовий"
      - left: "у Львів"
        right: "куди? пункт призначення з у + знахідний"
      - left: "на море"
        right: "куди? типова поїздка на відпочинок"
      - left: "центр міста"
        right: "родовий відмінок для частини й цілого"
  - id: act-4
    type: group-sort
    title: Розкладіть за моделями
    instruction: "Розсортуйте фрази за питанням і відмінковою моделлю."
    groups:
      - label: "Де? у/в + місцевий"
        items:
          - "у Чернівцях"
          - "в Україні"
          - "у передмісті"
      - label: "Де? на + місцевий"
        items:
          - "на площі"
          - "на вулиці"
          - "на узбережжі"
      - label: "Звідки? з/із/зі + родовий"
        items:
          - "з Одеси"
          - "зі Львова"
          - "із Закарпаття"
      - label: "Куди? напрямок"
        items:
          - "до Києва"
          - "у Карпати"
          - "на острів"
  - id: act-5
    type: error-correction
    title: Редагуємо місця
    instruction: "Виправте одну головну помилку в кожному реченні."
    items:
      - sentence: "Моя подруга живе на Україні."
        error: "на Україні"
        correction: "в Україні"
        error_type: word
        explanation: "Сучасна нейтральна норма для держави - в Україні."
      - sentence: "Ми зустрінемося в площі біля фонтану."
        error: "в площі"
        correction: "на площі"
        error_type: word
        explanation: "З площами вживаємо на + місцевий."
      - sentence: "Кав'ярня розташована в вулиці Франка."
        error: "в вулиці"
        correction: "на вулиці"
        error_type: word
        explanation: "З вулицями природна модель на вулиці."
      - sentence: "Я повернувся з Київ учора ввечері."
        error: "з Київ"
        correction: "з Києва"
        error_type: word
        explanation: "З + родовий: з Києва."
      - sentence: "Вона приїхала з Львів на конференцію."
        error: "з Львів"
        correction: "зі Львова"
        error_type: word
        explanation: "Потрібен родовий; зі допомагає милозвучності."
      - sentence: "Ми їдемо до Карпати на вихідні."
        error: "до Карпати"
        correction: "в Карпати"
        error_type: word
        explanation: "Для поїздки в гірський регіон природно: в Карпати."
      - sentence: "Туристи гуляли набережна ввечері."
        error: "набережна"
        correction: "набережною"
        error_type: word
        explanation: "Маршрут можна передати орудним: гуляли набережною."
      - sentence: "У центр місто є стара ратуша."
        error: "центр місто"
        correction: "центрі міста"
        error_type: word
        explanation: "Де? у центрі; частина чого? міста."
      - sentence: "Музей стоїть у острові."
        error: "у острові"
        correction: "на острові"
        error_type: word
        explanation: "З островом у значенні місця вживаємо на."
      - sentence: "Вони живуть на передмісті."
        error: "на передмісті"
        correction: "у передмісті"
        error_type: word
        explanation: "Передмістя як простір: у передмісті."
      - sentence: "Парк розташований в околиці міста."
        error: "в околиці"
        correction: "на околиці"
        error_type: word
        explanation: "Усталена модель: на околиці."
      - sentence: "До музей треба йти прямо."
        error: "До музей"
        correction: "До музею"
        error_type: word
        explanation: "До + родовий: до музею."
workbook:
  - id: wb-1
    type: quiz
    title: Лексика місця
    instruction: "Оберіть слово, яке найкраще відповідає опису."
    items:
      - question: "Природоохоронна територія"
        options:
          - "заповідник"
          - "провулок"
          - "площа"
        correct: 0
        explanation: "Заповідник - природоохоронна територія."
      - question: "Вид на місцевість або пейзаж"
        options:
          - "краєвид"
          - "район"
          - "берег"
        correct: 0
        explanation: "Краєвид - те, що відкривається погляду."
      - question: "Вулиця або простір уздовж річки чи моря"
        options:
          - "набережна"
          - "низовина"
          - "яр"
        correct: 0
        explanation: "Набережна пов'язана з водою."
      - question: "Невелика вулиця або проїзд"
        options:
          - "провулок"
          - "рівнина"
          - "узбережжя"
        correct: 0
        explanation: "Провулок - маленька вулиця."
      - question: "Край міста або місцевість біля нього"
        options:
          - "околиця"
          - "острів"
          - "пам'ятка"
        correct: 0
        explanation: "Околиця - край міста або місцевість біля нього."
      - question: "Територія вздовж моря"
        options:
          - "узбережжя"
          - "височина"
          - "передмістя"
        correct: 0
        explanation: "Узбережжя - територія вздовж моря."
      - question: "Пласка місцевість"
        options:
          - "рівнина"
          - "гора"
          - "півострів"
        correct: 0
        explanation: "Рівнина - переважно пласка місцевість."
      - question: "Підвищена місцевість"
        options:
          - "височина"
          - "площа"
          - "набережна"
        correct: 0
        explanation: "Височина - підвищена місцевість."
      - question: "Низьке місце між підвищеннями або вздовж річки"
        options:
          - "долина"
          - "проспект"
          - "район"
        correct: 0
        explanation: "Долина - низьке місце між підвищеннями або вздовж річки."
      - question: "Визначна пам'ятка"
        options:
          - "пам'ятка"
          - "низовина"
          - "відмінок"
        correct: 0
        explanation: "Пам'ятка може бути історичною, архітектурною або природною."
      - question: "Орієнтир для навігації"
        options:
          - "орієнтир"
          - "родовий"
          - "берег"
        correct: 0
        explanation: "Орієнтир допомагає знайти дорогу."
      - question: "Частина міста або адміністративна територія"
        options:
          - "район"
          - "яр"
          - "море"
        correct: 0
        explanation: "Район - частина міста або адміністративна територія."
  - id: wb-2
    type: fill-in
    title: Відмінки в маршруті
    instruction: "Оберіть правильну форму."
    items:
      - sentence: "Я народилася ____ Полтаві, а тепер живу в Києві."
        answer: "в"
        options:
          - "в"
          - "на"
          - "до"
        explanation: "Де? в Полтаві."
      - sentence: "Мій брат приїхав ____ Харкова."
        answer: "з"
        options:
          - "з"
          - "у"
          - "на"
        explanation: "Звідки? з Харкова."
      - sentence: "Ми плануємо поїхати ____ Одеси."
        answer: "до"
        options:
          - "до"
          - "з"
          - "на"
        explanation: "Куди? до + родовий: до Одеси."
      - sentence: "У неділю вони їдуть ____ море."
        answer: "на"
        options:
          - "на"
          - "у"
          - "з"
        explanation: "Їхати на море - типова поїздка до узбережжя."
      - sentence: "Ми спустилися ____ річки вузькою стежкою."
        answer: "до"
        options:
          - "до"
          - "на"
          - "у"
        explanation: "До річки - напрямок до води."
      - sentence: "Гід чекає ____ площі перед театром."
        answer: "на"
        options:
          - "на"
          - "в"
          - "із"
        explanation: "На площі - місце."
      - sentence: "Він мешкає ____ Галичині."
        answer: "в"
        options:
          - "в"
          - "на"
          - "до"
        explanation: "Усталена модель: в Галичині."
      - sentence: "Вона працює ____ Харківщині."
        answer: "на"
        options:
          - "на"
          - "у"
          - "до"
        explanation: "Регіональні назви на -щина часто мають на."
      - sentence: "Музей стоїть ____ березі Дніпра."
        answer: "на"
        options:
          - "на"
          - "з"
          - "у"
        explanation: "На березі - місце біля води."
      - sentence: "З вежі видно ____ міста."
        answer: "центр"
        options:
          - "центр"
          - "центрі"
          - "центру"
        explanation: "Видно що? центр міста."
      - sentence: "Ми повернулися ____ Закарпаття."
        answer: "із"
        options:
          - "із"
          - "у"
          - "на"
        explanation: "Звідки? із Закарпаття."
      - sentence: "Увечері туристи вийшли ____ набережну."
        answer: "на"
        options:
          - "на"
          - "у"
          - "з"
        explanation: "Куди? на набережну."
  - id: wb-3
    type: match-up
    title: Географічні пари
    instruction: "З'єднайте слово з природною фразою."
    pairs:
      - left: "Київ"
        right: "у Києві, з Києва, до Києва"
      - left: "Одеса"
        right: "в Одесі, з Одеси, до Одеси"
      - left: "Львів"
        right: "у Львові, зі Львова, до Львова"
      - left: "Чернівці"
        right: "у Чернівцях, з Чернівців, до Чернівців"
      - left: "Україна"
        right: "в Україні, з України, до України"
      - left: "Закарпаття"
        right: "на Закарпатті, із Закарпаття, до Закарпаття"
      - left: "Буковина"
        right: "на Буковині, з Буковини, до Буковини"
      - left: "Галичина"
        right: "в Галичині, з Галичини, до Галичини"
      - left: "Карпати"
        right: "у Карпатах, з Карпат, у Карпати"
      - left: "площа"
        right: "на площі, з площі, на площу"
      - left: "вулиця"
        right: "на вулиці, з вулиці, на вулицю"
      - left: "парк"
        right: "у парку, з парку, у парк"
  - id: wb-4
    type: group-sort
    title: Лексичні групи
    instruction: "Розсортуйте слова за типом простору."
    groups:
      - label: "Рельєф"
        items:
          - "рівнина"
          - "височина"
          - "долина"
      - label: "Вода"
        items:
          - "річка"
          - "озеро"
          - "узбережжя"
      - label: "Міський простір"
        items:
          - "площа"
          - "провулок"
          - "набережна"
      - label: "Природа й охорона"
        items:
          - "заповідник"
          - "національний парк"
          - "краєвид"
  - id: wb-5
    type: error-correction
    title: Фінальне редагування
    instruction: "Виправте прийменник або відмінок."
    items:
      - sentence: "Ми живемо в околиці великого міста."
        error: "в околиці"
        correction: "на околиці"
