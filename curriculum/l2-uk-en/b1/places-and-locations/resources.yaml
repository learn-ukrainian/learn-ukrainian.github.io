- title: "B1 M53: genitive nuances"
  role: curriculum
  notes: "Дає ширшу базу для родового відмінка; M59 використовує Р.в. у походженні, напрямку та географічній приналежності."
- title: "B1 M58: prepositions temporal"
  role: curriculum
  notes: "Попередній модуль у навігації; M59 зіставляє до + Р.в. як напрямок із часовою межею з M58."
- title: "B1 M60: prepositions cause purpose"
  role: curriculum
  notes: "Наступний модуль продовжить прийменникову фазу через причину й мету; M59 закріплює просторові та географічні моделі."
- title: "Глазова Grade 11, §16"
  role: textbook
  notes: "Пояснює в/у з назвами держав, областей, міст, сіл; на з вулицями, проспектами, площами та окремими регіональними назвами на -щина; подає сучасну норму в Україні."
  source_ref: "11-klas-ukrajinska-mova-glazova-2019, §16, p.73"
- title: "Заболотний Grade 6, §30"
  role: textbook
  notes: "Підтримує родовий відмінок географічних назв: назви населених пунктів здебільшого Києва, Львова, Парижа; інші географічні назви часто Криму, Світязю, Кавказу."
  source_ref: "6-klas-ukrmova-zabolotnyi-2020, §30, pp.106-116"
- title: "Глазова Grade 10, §45"
  role: textbook
  notes: "Дає приклади місцевого відмінка чоловічого роду: у Києві, у Харкові, у музеї; нагадує чергування г/к/х перед -і."
  source_ref: "10-klas-ukrmova-glazova-2018, §45, pp.190-206"
