version: '1.0'
module: homogeneous-members
level: b1
inline:
  - id: act-1
    type: quiz
    title: Чи це однорідні члени?
    instruction: "Оберіть правильне пояснення."
    items:
      - question: "У реченні Ми купили хліб, сир і молоко виділені слова є однорідними, бо:"
        options:
          - "усі відповідають на що? і залежать від купили"
          - "усі стоять після коми"
          - "усі мають однаковий рід"
        correct: 0
        explanation: "Хліб, сир і молоко - однорідні додатки до присудка купили."
      - question: "У реченні Діти й дорослі зібралися на площі однорідними є:"
        options:
          - "підмети"
          - "присудки"
          - "обставини"
        correct: 0
        explanation: "Діти й дорослі відповідають на хто? і виконують роль підметів."
      - question: "У реченні Вона читала, писала й редагувала однорідними є:"
        options:
          - "присудки"
          - "додатки"
          - "означення"
        correct: 0
        explanation: "Три дії належать до того самого підмета вона."
      - question: "У реченні Він працював тихо, уважно й швидко виділені слова є:"
        options:
          - "однорідними обставинами"
          - "однорідними підметами"
          - "неоднорідними означеннями"
        correct: 0
        explanation: "Усі три слова відповідають на як? і описують спосіб дії."
      - question: "У словосполученні новий шкільний рюкзак кома між прикметниками:"
        options:
          - "не потрібна, бо ознаки не рівноправні"
          - "завжди потрібна"
          - "потрібна тільки перед другим словом"
        correct: 0
        explanation: "Новий і шкільний називають різні типи ознак, тому це не типовий перелік."
      - question: "У словосполученні зручний, легкий рюкзак кома можлива, бо:"
        options:
          - "обидві ознаки рівноправно характеризують рюкзак"
          - "друге слово має більше складів"
          - "іменник стоїть після прикметників"
        correct: 0
        explanation: "Зручний і легкий можна прочитати з перелічувальною інтонацією."
      - question: "У реченні Ми відкрили вікна і провітрили аудиторію кома перед і:"
        options:
          - "не потрібна, бо це однорідні присудки з одним підметом"
          - "потрібна завжди"
          - "потрібна через слово аудиторію"
        correct: 0
        explanation: "Підмет ми спільний для двох присудків."
      - question: "У реченні Ми відкрили вікна, і аудиторія провітрилася кома перед і:"
        options:
          - "потрібна, бо після і є нова граматична основа"
          - "не потрібна, бо є слово і"
          - "потрібна тільки в художньому стилі"
        correct: 0
        explanation: "Це вже межа між частинами складного речення."
      - question: "У реченні Усе було готове: квитки, паспорти й вода слово усе є:"
        options:
          - "узагальнювальним словом"
          - "протиставним сполучником"
          - "однорідним означенням"
        correct: 0
        explanation: "Усе називає весь перелік."
      - question: "У моделі Або сьогодні, або завтра кома стоїть, бо:"
        options:
          - "сполучник або повторюється"
          - "або завжди вимагає кому"
          - "це узагальнювальне слово"
        correct: 0
        explanation: "Одиничне або коми не потребує, але повторюване або...або потребує."
      - question: "Перед але між однорідними членами:"
        options:
          - "ставимо кому"
          - "ніколи не ставимо кому"
          - "ставимо двокрапку"
        correct: 0
        explanation: "Але є протиставним сполучником."
      - question: "Найнадійніша перевірка однорідності:"
        options:
          - "те саме питання, те саме головне слово, та сама роль"
          - "однакова довжина слів"
          - "наявність будь-якої паузи"
        correct: 0
        explanation: "Інтонація допомагає, але граматичні три перевірки є основою."
  - id: act-2
    type: match-up
    title: Роль однорідних членів
    instruction: "Поєднайте речення з типом однорідних членів."
    pairs:
      - left: "Діти й дорослі чекали на автобус."
        right: "однорідні підмети"
      - left: "Марія читала, виписувала й порівнювала приклади."
        right: "однорідні присудки"
      - left: "Ми взяли карту, воду й аптечку."
        right: "однорідні додатки"
      - left: "Тихий, ясний ранок почався над Дніпром."
        right: "однорідні означення"
      - left: "Він говорив повільно, чітко й доброзичливо."
        right: "однорідні обставини способу"
      - left: "Квитки, паспорти й ключі лежали на столі."
        right: "однорідні підмети-речі"
      - left: "Студенти слухали й записували."
        right: "однорідні присудки без коми"
      - left: "Вона купила зошити, ручки та маркери."
        right: "однорідні додатки з та в значенні і"
      - left: "План був короткий, але змістовний."
        right: "однорідні означення з протиставленням"
      - left: "Працювали вранці, вдень і ввечері."
        right: "однорідні обставини часу"
      - left: "І студенти, і викладачі прийшли рано."
        right: "однорідні підмети з повторюваним і"
      - left: "Або в суботу, або в неділю ми поїдемо."
        right: "однорідні обставини з повторюваним або"
  - id: act-3
    type: fill-in
    title: Кома чи без коми
    instruction: "Вставте фрагмент із правильною пунктуацією."
    items:
      - sentence: "Ми купили хліб ____ молоко."
        answer: ", сир і"
        options:
          - ", сир і"
          - ", сир, і"
          - ", сир, але"
        explanation: "Перед одиничним і між однорідними додатками коми немає."
      - sentence: "У саду дозріли ____ сливи."
        answer: "і яблука, і груші, і"
        options:
          - "і яблука, і груші, і"
          - "і яблука і груші і"
          - "яблука, і груші і"
        explanation: "Повторюване і...і потребує ком перед повтореннями."
      - sentence: "День був довгий ____ корисний."
        answer: ", але"
        options:
          - ", але"
          - "і"
          - "або"
        explanation: "Перед але в повному реченні буде кома: довгий, але корисний."
      - sentence: "Приходьте ____ завтра."
        answer: "сьогодні або"
        options:
          - "сьогодні або"
          - "сьогодні, або"
          - "сьогодні, але"
        explanation: "Одиничне або не потребує коми."
      - sentence: "Зателефонуйте ____ ввечері."
        answer: "або вранці, або"
        options:
          - "або вранці, або"
          - "або вранці або"
          - "вранці, або"
        explanation: "Повторюване або...або відділяємо комою."
      - sentence: "Рішення було не швидке ____ обдумане."
        answer: ", а"
        options:
          - ", а"
          - "і"
          - "чи"
        explanation: "Перед а ставимо кому: не швидке, а обдумане."
      - sentence: "Ми взяли карту ____ аптечку."
        answer: ", воду та"
        options:
          - ", воду та"
          - ", воду, та"
          - ", воду, проте"
        explanation: "Тут та має значення і, тому коми немає."
      - sentence: "Команда працювала тихо ____ швидко."
        answer: ", проте"
        options:
          - ", проте"
          - "й"
          - "або"
        explanation: "Перед проте ставимо кому: тихо, проте швидко."
      - sentence: "На столі було все____ документи, квитки й вода."
        answer: ":"
        options:
          - ":"
          - ","
          - "-"
        explanation: "Узагальнювальне слово перед переліком вимагає двокрапки."
      - sentence: "Документи, квитки й вода ____ усе було готове."
        answer: "-"
        options:
          - "-"
          - ":"
          - ","
        explanation: "Перелік перед узагальнювальним словом вимагає тире."
      - sentence: "Усе: документи, квитки й вода ____ лежало в рюкзаку."
        answer: "-"
        options:
          - "-"
          - ","
          - ":"
        explanation: "Якщо речення продовжується після переліку, після нього ставимо тире."
      - sentence: "То дощ ____ сонце змінювали наші плани."
        answer: ", то"
        options:
          - ", то"
          - "то"
          - ", і"
        explanation: "Повторюване то...то потребує коми перед другим то."
  - id: act-4
    type: group-sort
    title: Яке правило працює?
    instruction: "Розподіліть приклади за пунктуаційним правилом."
    groups:
      - label: "Без коми з одиничним сполучником"
        items:
          - "чай або кава"
          - "карта й квитки"
          - "музей та театр"
      - label: "Кома з повторюваним сполучником"
        items:
          - "і текст, і вправи"
          - "або вранці, або ввечері"
          - "то тиша, то шум"
      - label: "Кома з протиставленням"
        items:
          - "короткий, але точний"
          - "не швидко, а уважно"
          - "малий, проте важливий"
      - label: "Двокрапка або тире з узагальненням"
        items:
          - "усе: ключі, квитки, вода"
          - "ключі, квитки, вода - усе"
          - "три речі: текст, зошит, ручка"
  - id: act-5
    type: error-correction
    title: Редактор пунктуації
    instruction: "Знайдіть пунктуаційну помилку й виправте її."
    items:
      - sentence: "Ми купили хліб, сир, і молоко."
        error: "сир, і"
        correction: "сир і"
        explanation: "Перед одиничним і між однорідними додатками коми немає."
      - sentence: "День був довгий але корисний."
        error: "довгий але"
        correction: "довгий, але"
        explanation: "Перед але ставимо кому."
      - sentence: "І яблука і груші і сливи дозріли."
        error: "І яблука і груші і сливи"
        correction: "І яблука, і груші, і сливи"
        explanation: "Повторюване і...і потребує ком."
      - sentence: "Усе було готове, документи, квитки й вода."
        error: "готове, документи"
        correction: "готове: документи"
        explanation: "Після узагальнювального слова перед переліком ставимо двокрапку."
      - sentence: "Документи, квитки й вода усе було готове."
        error: "вода усе"
        correction: "вода - усе"
        explanation: "Після переліку перед узагальнювальним словом ставимо тире."
      - sentence: "Ми підемо сьогодні, або завтра."
        error: "сьогодні, або"
        correction: "сьогодні або"
        explanation: "Одиничне або не потребує коми."
      - sentence: "Маршрут короткий проте складний."
        error: "короткий проте"
        correction: "короткий, проте"
        explanation: "Перед проте ставимо кому."
      - sentence: "Усе документи, квитки й ключі лежало на столі."
        error: "Усе документи"
        correction: "Усе: документи"
        explanation: "Узагальнювальне слово перед переліком відкривається двокрапкою."
      - sentence: "Усе: документи, квитки й ключі лежало на столі."
        error: "ключі лежало"
        correction: "ключі - лежало"
        explanation: "Якщо речення продовжується після переліку, ставимо тире."
      - sentence: "Ми взяли карту та воду, та аптечку."
        error: "воду, та"
        correction: "воду та"
        explanation: "Тут та має значення і, тому зайва кома."
      - sentence: "Не швидко а точно працювала команда."
        error: "швидко а"
        correction: "швидко, а"
        explanation: "Перед протиставним а ставимо кому."
      - sentence: "То дощ то сонце змінювали настрій."
        error: "дощ то"
        correction: "дощ, то"
        explanation: "У моделі то...то кома стоїть перед другим то."
workbook:
  - id: wb-1
    type: quiz
    title: Перевірка трьох ознак
    instruction: "Оберіть правильне рішення."
    items:
      - question: "Що спільне для однорідних членів?"
        options:
          - "те саме питання, те саме головне слово, та сама роль"
          - "однакова частина мови завжди"
          - "однакова кількість складів"
        correct: 0
        explanation: "Однорідність визначає синтаксична функція, а не довжина або форма слова."
      - question: "У реченні На столі лежали книги, зошити й ручки слова книги, зошити, ручки є:"
        options:
          - "однорідними підметами"
          - "однорідними присудками"
          - "вставними словами"
        correct: 0
        explanation: "Саме ці речі лежали на столі."
      - question: "У реченні Я люблю читати і малювати кома перед і:"
        options:
          - "не потрібна"
          - "потрібна"
          - "замінюється двокрапкою"
        correct: 0
        explanation: "Це одиничний сполучник між однорідними додатками-інфінітивами."
      - question: "У реченні Я люблю читати, і це мене заспокоює кома перед і:"
        options:
          - "потрібна, бо є друга граматична основа"
          - "зайва, бо є і"
          - "залежить тільки від інтонації"
        correct: 0
        explanation: "Після і починається частина це заспокоює."
      - question: "Перед протиставним а:"
        options:
          - "ставимо кому"
          - "ставимо двокрапку"
          - "не ставимо жодного знака"
        correct: 0
        explanation: "А вводить протиставлення."
      - question: "Одиничне або між однорідними членами:"
        options:
          - "зазвичай не потребує коми"
          - "завжди потребує коми"
          - "завжди потребує тире"
        correct: 0
        explanation: "Порівняйте: сьогодні або завтра."
      - question: "Повторюване або...або:"
        options:
          - "потребує коми перед другим або"
          - "ніколи не має коми"
          - "вимагає двокрапки"
        correct: 0
        explanation: "Наприклад: або сьогодні, або завтра."
      - question: "Якщо узагальнювальне слово стоїть перед переліком, ставимо:"
        options:
          - "двокрапку"
          - "тире"
          - "лапки"
        correct: 0
        explanation: "Усе: квитки, паспорти, вода."
      - question: "Якщо перелік стоїть перед узагальнювальним словом, ставимо:"
        options:
          - "тире"
          - "двокрапку"
          - "крапку з комою"
        correct: 0
        explanation: "Квитки, паспорти, вода - усе."
      - question: "У моделі Усе: текст, вправи, таймер - лежало на столі потрібні:"
        options:
          - "двокрапка й тире"
          - "дві коми без інших знаків"
          - "тільки тире перед текст"
        correct: 0
        explanation: "Узагальнення стоїть перед списком, а речення продовжується після нього."
      - question: "Та в значенні і між однорідними членами:"
        options:
          - "не потребує коми"
          - "завжди потребує коми"
          - "замінює двокрапку"
        correct: 0
        explanation: "Карта та вода = карта і вода."
      - question: "Та в значенні але:"
        options:
          - "може вимагати кому як протиставний сполучник"
          - "ніколи не має коми"
          - "вживається тільки в переліках місць"
        correct: 0
        explanation: "Значення сполучника визначає пунктуацію."
  - id: wb-2
    type: fill-in
    title: Сполучники в контексті
    instruction: "Вставте фрагмент із правильною пунктуацією."
    items:
      - sentence: "На заняття прийшли ____ батьки."
        answer: "учні й"
        options:
          - "учні й"
          - "учні, й"
          - "учні, але"
        explanation: "Одиничний й з'єднує однорідні підмети без коми."
      - sentence: "На заняття прийшли ____ батьки."
        answer: "і учні, і"
        options:
          - "і учні, і"
          - "і учні і"
          - "учні, і"
        explanation: "Повторюване і...і має кому перед другим і."
      - sentence: "Ми працювали ____ уважно."
        answer: "повільно, але"
        options:
          - "повільно, але"
          - "повільно але"
          - "повільно і"
        explanation: "Перед але потрібна кома."
      - sentence: "Виберіть ____ каву."
        answer: "чай або"
        options:
          - "чай або"
          - "чай, або"
          - "чай, а"
        explanation: "Одиничне або не відокремлюємо комою."
      - sentence: "Виберіть ____ каву."
        answer: "або чай, або"
        options:
          - "або чай, або"
          - "або чай або"
          - "чай, або"
        explanation: "Повторюване або...або має кому."
      - sentence: "Текст був ____ зрозумілий."
        answer: "короткий, проте"
        options:
          - "короткий, проте"
          - "короткий проте"
          - "короткий або"
        explanation: "Проте є протиставним сполучником."
      - sentence: "Ми поклали в папку ____ договори."
        answer: "заяви та"
        options:
          - "заяви та"
          - "заяви, та"
          - "заяви, проте"
        explanation: "Тут та означає і."
      - sentence: "Завдання було не складне ____ уважності."
        answer: ", а вимагало"
        options:
          - ", а вимагало"
          - "і вимагало"
          - "або вимагало"
        explanation: "У повному реченні буде кома перед а: не складне, а вимагало уважності."
      - sentence: "____ учитель пояснить ще раз."
        answer: "Чи сьогодні, чи завтра"
        options:
          - "Чи сьогодні, чи завтра"
          - "Чи сьогодні чи завтра"
          - "Сьогодні, чи завтра"
        explanation: "Повторюване чи...чи має кому."
