version: '1.0'
module: adjectives-comparative
level: b1
inline:
  - id: act-1
    type: quiz
    title: Чи можна порівняти?
    instruction: Оберіть граматично природний варіант або пояснення.
    items:
      - question: "Який прикметник нормально утворює вищий ступінь?"
        options:
          - "тихий"
          - "дерев'яний"
          - "студентський"
        correct: 0
        explanation: Тихий - якісний прикметник, тому кімната може бути тихіша.
      - question: "Нормативна проста форма від дорогий:"
        options:
          - "дорожчий"
          - "дорогішийший"
          - "більш дорожчий"
        correct: 0
        explanation: Дорогий дає частотну форму дорожчий.
      - question: "Складена форма вищого ступеня:"
        options:
          - "більш офіційний"
          - "офіційнішийший"
          - "самий офіційний"
        correct: 0
        explanation: Більш + початкова форма прикметника утворює складену форму.
      - question: "Що НЕ можна змішувати?"
        options:
          - "більш + форма на -іш-"
          - "набагато + форма вищого ступеня"
          - "за + знахідний відмінок"
        correct: 0
        explanation: Більш сильніший має подвійну ознаку вищого ступеня.
      - question: "Правильна форма для: Марія ___ за Олену."
        options:
          - "молодша"
          - "молодший"
          - "молодше"
        correct: 0
        explanation: Марія - жіночий рід, тому молодша.
      - question: "Правильна конструкція з ніж:"
        options:
          - "вищий, ніж я"
          - "вищий, ніж мене"
          - "вищий, ніж мною"
        correct: 0
        explanation: Після ніж у такій конструкції вживаємо називний відмінок.
      - question: "Прикметник без звичайного ступеня порівняння:"
        options:
          - "міський"
          - "світлий"
          - "короткий"
        correct: 0
        explanation: Міський - відносний прикметник.
      - question: "Нормативна форма від близький:"
        options:
          - "ближчий"
          - "близькішийший"
          - "більш ближчий"
        correct: 0
        explanation: Близький має чергування й форму ближчий.
      - question: "Що означає менш складний?"
        options:
          - "has a lower degree of difficulty"
          - "has a higher degree of difficulty"
          - "has no adjective agreement"
        correct: 0
        explanation: Менш виражає нижчу міру ознаки.
      - question: "Правильне речення:"
        options:
          - "Ця відповідь точніша від попередньої."
          - "Ця відповідь точніший від попередньої."
          - "Ця відповідь точніша від попередню."
        correct: 0
        explanation: Точніша узгоджується з відповідь, а від потребує родового відмінка.
      - question: "Яка пара показує просту й складену форму без змішування?"
        options:
          - "зручніший / більш зручний"
          - "більш зручніший / зручнийший"
          - "самий зручний / менш зручніший"
        correct: 0
        explanation: Обидві форми правильні, якщо їх не змішувати.
      - question: "У реченні Ці документи більш офіційні слово більш:"
        options:
          - "не змінюється"
          - "узгоджується в множині"
          - "стає більшого"
        correct: 0
        explanation: Більш і менш незмінні; змінюється прикметник.
  - id: act-2
    type: fill-in
    title: Утворіть просту форму
    instruction: Вставте форму вищого ступеня, узгоджену з іменником.
    items:
      - sentence: "Цей чай ____ за той. (гарячий)"
        answer: гарячіший
        options:
          - гарячіший
          - гарячіша
          - більш гарячіший
        explanation: Чай - чоловічий рід, проста форма гарячіший.
      - sentence: "Нова дорога ____ за стару. (широкий)"
        answer: ширша
        options:
          - ширша
          - ширший
          - широкіша
        explanation: Дорога - жіночий рід; нормативна форма ширша.
      - sentence: "Цей квиток ____ від учорашнього. (дорогий)"
        answer: дорожчий
        options:
          - дорожчий
          - дорогийший
          - більш дорожчий
        explanation: Дорогий дає форму дорожчий.
      - sentence: "Ця станція ____ до дому. (близький)"
        answer: ближча
        options:
          - ближча
          - близькіша
          - ближче
        explanation: Станція - жіночий рід; близький дає ближчий/ближча.
      - sentence: "Це завдання ____ за попереднє. (легкий)"
        answer: легше
        options:
          - легше
          - легший
          - легкіше
        explanation: Завдання - середній рід; нормативна форма легше.
      - sentence: "Ця кімната ____ за коридор. (світлий)"
        answer: світліша
        options:
          - світліша
          - світліший
          - більш світліша
        explanation: Кімната - жіночий рід.
      - sentence: "Мій брат ____ за мене. (старий)"
        answer: старший
        options:
          - старший
          - старіший
          - більш старший
        explanation: Частотна форма від старий - старший.
      - sentence: "Ця група ____ від нашої. (малий)"
        answer: менша
        options:
          - менша
          - маліша
          - менш менша
        explanation: Малий має форму менший/менша.
      - sentence: "Цей метод ____ за старий. (ефективний)"
        answer: ефективніший
        options:
          - ефективніший
          - ефективніша
          - більш ефективніший
        explanation: Метод - чоловічий рід; не змішуємо більш із -іш-.
      - sentence: "Ця відповідь ____, ніж перша. (точний)"
        answer: точніша
        options:
          - точніша
          - точніший
          - більш точніша
        explanation: Відповідь - жіночий рід.
      - sentence: "Цей рюкзак ____ від валізи. (важкий)"
        answer: важчий
        options:
          - важчий
          - важкіший
          - більш важчий
        explanation: Важкий дає нормативну форму важчий.
      - sentence: "Це пояснення ____ за попереднє. (ясний)"
        answer: ясніше
        options:
          - ясніше
          - ясніший
          - більш ясніше
        explanation: Пояснення - середній рід.
  - id: act-3
    type: match-up
    title: Початкова форма і вищий ступінь
    instruction: Поєднайте прикметник із нормативною формою вищого ступеня.
    pairs:
      - left: сильний
        right: сильніший
      - left: тихий
        right: тихіший
      - left: старий
        right: старший
      - left: молодий
        right: молодший
      - left: дорогий
        right: дорожчий
      - left: близький
        right: ближчий
      - left: високий
        right: вищий
      - left: низький
        right: нижчий
      - left: легкий
        right: легший
      - left: широкий
        right: ширший
      - left: добрий
        right: кращий
      - left: поганий
        right: гірший
  - id: act-4
    type: group-sort
    title: Модель творення
    instruction: Розподіліть приклади за моделлю або обмеженням.
    groups:
      - label: "Проста форма -іш-"
        items:
          - сильніший голос
          - тихіша кімната
          - цікавіше завдання
      - label: "Коротка форма або чергування"
        items:
          - дорожчий квиток
          - ближча станція
          - ширші двері
      - label: "Складена форма"
        items:
          - більш офіційний лист
          - менш ризикований план
          - більш переконливий аргумент
      - label: "Без нормативного порівняння"
        items:
          - дерев'яний стіл
          - зимовий одяг
          - мертвий герой
  - id: act-5
    type: error-correction
    title: Редактор вищого ступеня
    instruction: Виправте одну головну помилку в кожному реченні.
    items:
      - sentence: "Цей маршрут більш коротший за той."
        error: більш коротший
        correction: "Цей маршрут коротший за той."
        explanation: Не змішуємо більш із простою формою коротший.
      - sentence: "Марія вища, ніж мене."
        error: ніж мене
        correction: "Марія вища, ніж я."
        explanation: Після ніж у такій конструкції потрібен називний відмінок.
      - sentence: "Ця кімната світліший за коридор."
        error: світліший
        correction: "Ця кімната світліша за коридор."
        explanation: Кімната - жіночий рід.
      - sentence: "Ми обрали більш точний відповідь."
        error: більш точний відповідь
        correction: "Ми обрали більш точну відповідь."
        explanation: Відповідь у знахідному відмінку жіночого роду.
      - sentence: "Цей стіл дерев'яніший за той."
        error: дерев'яніший
        correction: "У цьому столі більше дерев'яних деталей, ніж у тому."
        explanation: Дерев'яний - відносний прикметник; краще переформулювати зміст.
      - sentence: "Нова квартира дорожчі за стару."
        error: дорожчі
        correction: "Нова квартира дорожча за стару."
        explanation: Квартира - однина жіночого роду.
      - sentence: "Він старший від брат."
        error: від брат
        correction: "Він старший від брата."
        explanation: Від потребує родового відмінка.
      - sentence: "Це завдання більш легше."
        error: більш легше
        correction: "Це завдання легше."
        explanation: Легше вже є формою вищого ступеня.
      - sentence: "Ця заява менш офіційніша."
        error: менш офіційніша
        correction: "Ця заява менш офіційна."
        explanation: Менш вимагає початкової форми прикметника.
      - sentence: "Київ більший від Львів."
        error: від Львів
        correction: "Київ більший від Львова."
        explanation: Від керує родовим відмінком.
      - sentence: "Я бачу краща можливість."
        error: краща можливість
        correction: "Я бачу кращу можливість."
        explanation: Після бачу потрібен знахідний відмінок.
      - sentence: "Цей текст більш кращий за попередній."
        error: більш кращий
        correction: "Цей текст кращий за попередній."
        explanation: Кращий уже має значення вищого ступеня.
workbook:
  - id: wb-1
    type: quiz
    title: Контроль форми
    instruction: Оберіть правильний варіант.
    items:
      - question: "Правильна форма від високий:"
        options:
          - "вищий"
          - "високіший"
          - "більш вищий"
        correct: 0
        explanation: Високий має частотну форму вищий.
      - question: "Правильна форма від низький:"
        options:
          - "нижчий"
          - "низькіший"
          - "більш нижчий"
        correct: 0
        explanation: Низький дає нижчий.
      - question: "Правильний варіант:"
        options:
          - "менш ризикований план"
          - "менш ризикованіший план"
          - "менший ризикованіший план"
        correct: 0
        explanation: Менш поєднується з початковою формою прикметника.
      - question: "У реченні Ці двері ширші за ті форма ширші узгоджується з:"
        options:
          - "ці двері"
          - "за ті"
          - "прихованим прислівником"
        correct: 0
        explanation: Прикметник узгоджується з іменником, ознаку якого називає.
      - question: "Правильне речення:"
        options:
          - "Ця дорога коротша від старої."
          - "Ця дорога коротший від старої."
          - "Ця дорога коротша від стару."
        correct: 0
        explanation: Коротша узгоджується з дорога, а від вимагає родового.
      - question: "Яке слово не змінюється у складеній формі?"
        options:
          - "більш"
          - "офіційний"
          - "прикметникове закінчення"
        correct: 0
        explanation: Більш і менш є незмінними.
      - question: "Що краще для нейтрального B1 письма?"
        options:
          - "типовіший район"
          - "міськіший район"
          - "район більш міськийший"
        correct: 0
        explanation: Типовий - якісний прикметник; міський у базовому значенні відносний.
      - question: "Правильна конструкція:"
        options:
          - "старший за брата"
          - "старший за брат"
          - "старший від братом"
        correct: 0
        explanation: За керує знахідним, а для істоти брата збігається з родовою формою.
      - question: "Що означає дещо точніший?"
        options:
          - "трохи точніший"
          - "найточніший"
          - "без порівняння"
        correct: 0
        explanation: Дещо позначає невелику різницю.
      - question: "Правильна форма від поганий:"
        options:
          - "гірший"
          - "поганішийший"
          - "більш гірший"
        correct: 0
        explanation: Поганий має суплетивну форму гірший.
      - question: "Правильне речення з ніж:"
        options:
          - "Результат кращий, ніж ми очікували."
          - "Результат кращий, ніж нами очікували."
          - "Результат кращий, ніж нас очікували."
        correct: 0
        explanation: Після ніж може стояти повне порівняльне речення.
      - question: "Який прикметник не треба порівнювати механічно?"
        options:
          - "студентський"
          - "тихий"
          - "важкий"
        correct: 0
        explanation: Студентський - відносний прикметник.
  - id: wb-2
    type: fill-in
    title: Відмінювання форм
    instruction: Вставте форму вищого ступеня в потрібному відмінку.
    items:
      - sentence: "Я бачу ____ кімнату. (світлий)"
        answer: світлішу
        options:
          - світлішу
          - світліша
          - світліший
        explanation: Кімнату - знахідний жіночого роду.
      - sentence: "Немає ____ пояснення. (точний)"
        answer: точнішого
        options:
          - точнішого
          - точніше
          - точніший
        explanation: Немає потребує родового відмінка.
      - sentence: "Ми задоволені ____ відповіддю. (більш точний)"
        answer: більш точною
        options:
          - більш точною
          - більш точна
          - більш точний
        explanation: Відповіддю - орудний жіночого роду.
      - sentence: "Він розмовляє зі ____ братом. (старий)"
        answer: старшим
        options:
          - старшим
          - старший
          - старшого
        explanation: Зі братом вимагає орудного відмінка.
      - sentence: "У ____ заяві немає жартів. (більш офіційний)"
        answer: більш офіційній
        options:
          - більш офіційній
          - більш офіційна
          - більш офіційним
        explanation: У заяві - місцевий жіночого роду.
      - sentence: "Ми обрали ____ маршрут. (короткий)"
        answer: коротший
        options:
          - коротший
          - коротша
          - коротшому
        explanation: Маршрут - знахідний чоловічого роду для неістоти.
      - sentence: "Для ____ групи потрібна більша аудиторія. (великий)"
        answer: більшої
        options:
          - більшої
          - більша
          - більшим
        explanation: Для групи потребує родового відмінка.
      - sentence: "Після ____ спроби команда продовжила роботу. (гірший)"
        answer: гіршої
        options:
          - гіршої
          - гірша
          - гірший
        explanation: Після спроби - родовий жіночого роду.
      - sentence: "Я довіряю ____ джерелу. (надійний)"
        answer: надійнішому
        options:
          - надійнішому
          - надійніше
          - надійніший
        explanation: Джерелу - давальний середнього роду.
      - sentence: "Вони пишуть про ____ умови. (менш ризикований)"
        answer: менш ризиковані
        options:
          - менш ризиковані
          - менш ризикованими
          - менш ризикована
        explanation: Про умови - знахідний множини для неістот.
      - sentence: "З ____ аргументами легше погодитися. (переконливий)"
        answer: переконливішими
        options:
          - переконливішими
          - переконливіші
          - переконливішого
        explanation: З аргументами - орудний множини.
      - sentence: "У ____ тексті менше зайвих слів. (стислий)"
        answer: стислішому
        options:
          - стислішому
          - стисліший
          - стислішим
        explanation: У тексті - місцевий чоловічого роду.
  - id: wb-3
    type: group-sort
    title: Конструкції порівняння
    instruction: Розподіліть речення за моделлю порівняння.
    groups:
      - label: "за + знахідний"
        items:
          - Марія вища за Олену
          - маршрут коротший за старий
          - відповідь точніша за першу
      - label: "від + родовий"
        items:
          - кімната світліша від коридору
          - план безпечніший від попереднього
          - брат старший від сестри
      - label: "ніж + називний або речення"
        items:
          - він вищий, ніж я
          - дорога коротша, ніж стара
          - результат кращий, ніж ми думали
      - label: "чим... тим..."
        items:
          - чим коротший маршрут, тим зручніша поїздка
          - чим уважніший читач, тим точніша відповідь
          - чим старша будівля, тим цікавіша історія
  - id: wb-4
    type: cloze
    title: Дві квартири
    instruction: Заповніть пропуски формами вищого ступеня.
