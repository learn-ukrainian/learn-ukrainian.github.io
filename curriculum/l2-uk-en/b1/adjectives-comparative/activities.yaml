- id: act-1
  type: quiz
  title: Міра ознаки
  instruction: Оберіть правильну відповідь.
  items:
  - question: Який прикметник може мати вищий ступінь?
    options:
    - теплий
    - дерев'яний
    - міський
    answer: теплий
  - question: Яка форма є вищим ступенем?
    options:
    - сильніший
    - сильний
    - найсильніший
    answer: сильніший
- id: act-2
  type: fill-in
  title: Проста форма
  instruction: Вставте форму вищого ступеня.
  items:
  - sentence: Цей аргумент ____ за попередній.
    answer: сильніший
    options:
    - сильніший
    - сильний
    - найсильніший
  - sentence: Нова кімната ____ за стару.
    answer: світліша
    options:
    - світліша
    - світла
    - найсвітліша
- id: act-3
  type: group-sort
  title: Дві форми
  instruction: Розподіліть форми за групами.
  groups:
  - name: проста форма
    items:
    - цікавіший
    - молодший
    - дорожчий
  - name: складена форма
    items:
    - більш цікавий
    - менш складний
    - більш вагомий
- id: act-4
  type: grammar-identify
  title: Конструкція порівняння
  instruction: Визначте модель порівняння.
  items:
  - sentence: Петро вищий за Марію.
    answer: за + знахідний відмінок
    options:
    - за + знахідний відмінок
    - від + родовий відмінок
    - ніж + називний відмінок
  - sentence: Петро вищий від Марії.
    answer: від + родовий відмінок
    options:
    - за + знахідний відмінок
    - від + родовий відмінок
    - ніж + називний відмінок
- id: act-5
  type: true-false
  title: Обмеження
  instruction: Позначте правильність твердження.
  items:
  - statement: Прикметник дерев'яний не має звичайного вищого ступеня.
    answer: true
  - statement: Прикметник теплий може мати форму тепліший.
    answer: true
  - statement: Прикметник порожній звичайно утворює вищий ступінь.
    answer: false
- id: act-6
  type: match-up
  title: Прислів'я як модель
  instruction: З'єднайте вислів із моделлю.
  pairs:
  - left: Що темніша ніч, то ясніші зорі.
    right: що..., то...
  - left: Свій хліб смачніший за чужий.
    right: вищий ступінь + за
  - left: Старший розумом, а не віком.
    right: вищий ступінь + орудний відмінок
- id: act-7
  type: fill-in
  title: Утворення форм
  instruction: Вставте правильну форму вищого ступеня.
  items:
  - sentence: Ця кава ____ за чай.
    answer: дорожча
    options:
    - дорожча
    - дорога
    - найдорожча
  - sentence: Цей маршрут ____ за попередній.
    answer: коротший
    options:
    - коротший
    - короткий
    - найкоротший
  - sentence: Нова кімната ____ від старої.
    answer: тихіша
    options:
    - тихіша
    - тиха
    - найтихіша
  - sentence: Цей текст ____, ніж перший.
    answer: точніший
    options:
    - точніший
    - точний
    - найточніший
  - sentence: Моя сестра ____ за мене.
    answer: молодша
    options:
    - молодша
    - молода
    - наймолодша
  - sentence: Цей телефон ____ за старий.
    answer: швидший
    options:
    - швидший
    - швидкий
    - найшвидший
  - sentence: Друга квартира ____ до метро.
    answer: ближча
    options:
    - ближча
    - близька
    - найближча
  - sentence: Цей доказ ____ для плану.
    answer: важливіший
    options:
    - важливіший
    - важливий
    - найважливіший
- id: act-8
  type: error-correction
  title: Редагування типових помилок
  instruction: Виправте речення.
  items:
  - sentence: Ця вправа більш легша.
    error: Ця вправа більш легша.
    correction: Ця вправа легша. АБО Ця вправа більш легка.
    explanation: Не змішуємо складену і просту форму.
  - sentence: Він самий розумний у нашій групі.
    error: Він самий розумний у нашій групі.
    correction: Він найрозумніший у нашій групі.
    explanation: Для найвищого ступеня потрібна форма з най-.
  - sentence: Моя сестра молодша мене.
    error: Моя сестра молодша мене.
    correction: Моя сестра молодша за мене.
    explanation: Потрібна конструкція за + знахідний відмінок.
  - sentence: Ця будівля високіша.
    error: Ця будівля високіша.
    correction: Ця будівля вища.
    explanation: 'Нормативна форма: високий — вищий.'
  - sentence: Це саме головне правило.
    error: Це саме головне правило.
    correction: Це найважливіше правило. АБО Це головне правило.
    explanation: Уникаємо кальки й обираємо якісний прикметник.
  - sentence: Кава дорогша, ніж чай.
    error: Кава дорогша, ніж чай.
    correction: Кава дорожча, ніж чай.
    explanation: Дорогий має форму дорожчий.
  - sentence: Цей план більш точніший.
    error: більш точніший
    correction: Цей план точніший.
    explanation: Або точніший, або більш точний.
  - sentence: Дуб міцніший берези.
    error: міцніший берези
    correction: Дуб міцніший за березу.
    explanation: Потрібне керування з прийменником.
- id: act-9
  type: grammar-identify
  title: Форма і відмінок
  instruction: Визначте форму прикметника.
  items:
  - sentence: Я бачив кращу книжку.
    answer: знахідний, жіночий рід
    options:
    - знахідний, жіночий рід
    - родовий, чоловічий рід
    - називний, множина
  - sentence: Він розмовляв із старшим братом.
    answer: орудний, чоловічий рід
    options:
    - орудний, чоловічий рід
    - знахідний, жіночий рід
    - місцевий, множина
  - sentence: Ми працювали в тихішій кімнаті.
    answer: місцевий, жіночий рід
    options:
    - місцевий, жіночий рід
    - називний, середній рід
    - родовий, множина
  - sentence: Вони обрали дешевші квитки.
    answer: знахідний, множина
    options:
    - знахідний, множина
    - орудний, чоловічий рід
    - родовий, жіночий рід
- id: act-10
  type: group-sort
  title: Можна чи не можна
  instruction: Розподіліть прикметники.
  groups:
  - name: може мати вищий ступінь
    items:
    - теплий
    - цікавий
    - дорогий
    - зручний
  - name: звичайно не має вищого ступеня
    items:
    - дерев'яний
    - порожній
    - чорноокий
    - буланий
- id: act-11
  type: cloze
  title: Огляд товарів
  instruction: Заповніть пропуски формами вищого ступеня.
  passage: Новий телефон [1] за попередній, але [2] від базової моделі. Екран [3],
    камера [4], а батарея [5]. Для читання планшет [6], ніж телефон.
  blanks:
  - id: 1
    answer: швидший
  - id: 2
    answer: дорожчий
  - id: 3
    answer: ширший
  - id: 4
    answer: краща
  - id: 5
    answer: сильніша
  - id: 6
    answer: зручніший
- id: act-12
  type: match-up
  title: Терміни
  instruction: З'єднайте термін із поясненням.
  pairs:
  - left: проста форма
    right: один прикметник із суфіксом
  - left: складена форма
    right: більш або менш + прикметник
  - left: якісний прикметник
    right: ознака може змінюватися за мірою
  - left: відносний прикметник
    right: ознака йде через належність до предмета
- id: act-13
  type: odd-one-out
  title: Зайва форма
  instruction: Оберіть форму, яка не належить до групи.
  items:
  - options:
    - сильніший
    - молодший
    - більш цікавий
    - дорожчий
    answer: більш цікавий
    explanation: Це складена форма, решта прості.
  - options:
    - дерев'яний
    - міський
    - теплий
    - залізний
    answer: теплий
    explanation: Це якісний прикметник.
  - options:
    - дорожчий
    - ближчий
    - вищий
    - цікавий
    answer: цікавий
    explanation: Це початкова форма.
- id: act-14
  type: order
  title: Дерево рішення
  instruction: Упорядкуйте кроки вибору форми.
  items:
  - Перевірити, чи прикметник якісний.
  - Визначити, чи ознака має міру.
  - Обрати просту або складену форму.
  - Узгодити прикметник з іменником.
  - Додати за, від або ніж для другого предмета.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
- id: act-15
  type: highlight-morphemes
  title: Суфікси
  instruction: Позначте суфікс вищого ступеня.
  text: сильніший, цікавіший, молодший, старший, тонший, дорожчий, вищий
  items:
  - word: сильніший
    answer: -іш-
  - word: цікавіший
    answer: -іш-
  - word: молодший
    answer: -ш-
  - word: старший
    answer: -ш-
  - word: тонший
    answer: -ш-
  - word: дорожчий
    answer: -ш-
  - word: вищий
    answer: -ш-
- id: act-16
  type: quiz
  title: Норма
  instruction: Оберіть нормативний варіант.
  items:
  - question: Який варіант нормативний?
    options:
    - Ця вправа легша.
    - Ця вправа більш легша.
    - Ця вправа сама легка.
    answer: Ця вправа легша.
  - question: Який варіант нормативний?
    options:
    - Кава дорожча, ніж чай.
    - Кава дорогша, ніж чай.
    - Кава саме дорожча чай.
    answer: Кава дорожча, ніж чай.
  - question: Який варіант нормативний?
    options:
    - Моя сестра молодша за мене.
    - Моя сестра молодша мене.
    - Моя сестра більш молодша.
    answer: Моя сестра молодша за мене.
- id: act-17
  type: essay-response
  title: Порівняння житла
  instruction: Напишіть короткий огляд двох квартир.
  prompt: Порівняйте дві квартири для оренди. Використайте щонайменше шість форм вищого
    ступеня та дві конструкції з за, від або ніж.
  min_words: 90
  source_reading: Квартира на Хрещатику більша й дорожча. Квартира на Оболоні тихіша,
    ближча до метро й зручніша для щоденного життя.
  model_answer: Квартира на Хрещатику більша за квартиру на Оболоні, але вона дорожча.
    Кімнати там ширші, зате район гучніший. Квартира на Оболоні тихіша від першої,
    ближча до метро й зручніша для щоденного життя. Для роботи вона краща, ніж квартира
    в центрі.
  peer_review_guidelines:
  - Перевірте, чи всі форми вищого ступеня узгоджені з іменниками.
  - Позначте конструкції з за, від або ніж.
  - Знайдіть можливе змішування простої та складеної форми.
  rubric:
    grammar: Форми вищого ступеня нормативні.
    syntax: Порівняльні конструкції мають правильне керування.
    coherence: Огляд має зрозумілий вибір між двома квартирами.
