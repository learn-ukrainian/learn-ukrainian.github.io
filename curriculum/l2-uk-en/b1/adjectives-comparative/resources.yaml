- title: "B1 M12-M13: чергування приголосних"
  role: curriculum
  notes: "Модулі про чергування іменників і дієслів дають фонетичну основу для форм дорожчий, ближчий, вищий, легший."
- title: "B1 M34-M43: точність відмінка й керування"
  role: curriculum
  notes: "Попередній блок закріпив керування й відмінки; M44 переносить цю точність у порівняльні конструкції за + знахідний, від + родовий, ніж + називний."
- title: "Авраменко Grade 6, p.124-125"
  role: textbook
  notes: "Ступені порівняння якісних прикметників, прості форми, чергування приголосних і прикметники, що не утворюють ступенів порівняння."
  source_ref: "6-klas-ukrmova-avramenko, с.124-125"
- title: "Литвінова Grade 6, p.198"
  role: textbook
  notes: "Таблиця творення вищого ступеня: суфікси -іш-, -ш- та складена форма більш/менш + прикметник."
  source_ref: "6-klas-ukrmova-litvinova, с.198"
- title: "Заболотний Grade 6, p.137-138"
  role: textbook
  notes: "Якісні прикметники, обмеження на утворення ступенів порівняння та приклади прислів'їв із порівняльними формами."
  source_ref: "6-klas-ukrmova-zabolotnyi, с.137-138"
- title: "Заболотний Grade 8, p.18-21"
  role: textbook
  notes: "Прості й складені форми ступенів порівняння, стилістичний вибір і синонімічні конструкції."
  source_ref: "8-klas-ukrmova-zabolotnyi, с.18-21"
- title: "Авраменко Grade 11, p.29"
  role: textbook
  notes: "Нормативне застереження проти змішування форм на кшталт більш сильніший і розмовних русизмів типу самий кращий."
  source_ref: "11-klas-ukrmova-avramenko, с.29"
- title: "Заболотний Grade 8, p.28"
  role: textbook
  notes: "Зведена таблиця ступенів порівняння прикметників і прислівників; корисний місток до наступних модулів B1.4."
  source_ref: "8-klas-ukrmova-zabolotnyi, с.28"
