version: '1.0'
module: reading-literature
level: b1
inline:
  - id: act-1
    type: quiz
    title: Ознаки художнього стилю
    instruction: Оберіть відповідь, яка найкраще описує художній стиль.
    items:
      - question: Яка головна мета художнього стилю?
        options:
          - створити образ і вплинути на почуття читача
          - повідомити адміністративне рішення
          - дати наукове визначення
          - заповнити реквізити документа
        correct: 0
        explanation: Художній стиль працює через образність, емоцію й авторське бачення.
      - question: У якому реченні є художній образ?
        options:
          - "Дощ тихо стукав у вікна, ніби просився до кімнати."
          - "Дощ — це атмосферні опади."
          - "У зв'язку з дощем захід перенесено."
          - "Завтра можливі опади."
        correct: 0
        explanation: Речення оживлює дощ і створює настрій.
      - question: Що НЕ є типовою ознакою художнього стилю?
        options:
          - реквізити документа
          - образність
          - емоційність
          - конкретні деталі
        correct: 0
        explanation: Реквізити належать до офіційно-ділового стилю.
      - question: Який термін означає виразне означення?
        options:
          - епітет
          - протокол
          - абревіатура
          - адресат
        correct: 0
        explanation: Епітет додає предмету емоційної або образної риси.
      - question: Яке слово краще для цілого поетичного твору українською?
        options:
          - вірш
          - стих
          - графік
          - реквізит
        correct: 0
        explanation: Українською нормативно кажемо вірш або поезія.
  - id: act-2
    type: match-up
    title: Художні засоби
    instruction: Поєднайте засіб із прикладом.
    pairs:
      - left: епітет
        right: важке небо
      - left: метафора
        right: місто прокинулося
      - left: порівняння
        right: лист важкий, як камінь
      - left: персоніфікація
        right: вітер шепоче
      - left: гіпербола
        right: чекаю сто років
      - left: алітерація
        right: тихо тече темна вода
  - id: act-3
    type: true-false
    title: Уривок про Марка
    instruction: Визначте, чи твердження відповідає навчальному уривку.
    items:
      - statement: Марко повертався додому пізно.
        correct: true
        explanation: Це прямо сказано на початку уривка.
      - statement: Лист із університету лежав у рюкзаку.
        correct: false
        explanation: У тексті лист лежав у кишені.
      - statement: Порівняння "лист важкий, як камінь" показує тривогу героя.
        correct: true
        explanation: Вага листа є образом внутрішньої напруги.
      - statement: Настрій уривка веселий і святковий.
        correct: false
        explanation: Настрій тихий, напружений, трохи тривожний.
      - statement: Уривок має художній стиль.
        correct: true
        explanation: У ньому є образи, деталі й емоційний настрій.
workbook:
  - id: wb-1
    type: group-sort
    title: Стиль уривка
    instruction: Розподіліть речення за стилем.
    groups:
      - label: Художній стиль
        items:
          - Верба стояла над водою, мов стара пам'ять села.
          - Дощ шепотів у темному саду.
          - Ліхтар, мов сторож, не дрімав.
      - label: Не художній стиль
        items:
          - Відповідно до рішення заяву задоволено.
          - Верба — рід дерев і кущів.
          - Прошу повідомити графік роботи.
  - id: wb-2
    type: cloze
    title: Короткий відгук
    instruction: Заповніть пропуски словами для структурованої реакції.
    text: "{1}, мене вразив цей уривок, бо в ньому тихий настрій поєднується з напругою. Автор використовує {2} \"лист важкий, як камінь\", щоб показати страх героя. {3}, текст говорить про момент перед важливим рішенням. Я {4} цей уривок для повільного читання."
    blanks:
      - id: 1
        answer: На мою думку
        options:
          - На мою думку
          - Згідно з
          - Вул.
          - Ого
      - id: 2
        answer: порівняння
        options:
          - порівняння
          - реквізит
          - скорочення
          - адресат
      - id: 3
        answer: Мабуть
        options:
          - Мабуть
          - ЦНАП
          - Грн
          - Р-н
      - id: 4
        answer: порадив би
        options:
          - порадив би
          - розшифрував би
          - переніс би
          - узгодив би
  - id: wb-3
    type: fill-in
    title: Терміни читання
    instruction: Оберіть термін, який відповідає визначенню.
    items:
      - sentence: "____ — емоційна атмосфера тексту."
        answer: настрій
        options:
          - настрій
          - реквізит
          - графік
          - валюта
        explanation: Настрій показує, як текст відчувається.
      - sentence: "____ — голос, який говорить у вірші."
        answer: ліричний герой
        options:
          - ліричний герой
          - адресант
          - абревіатура
          - протокол
        explanation: Ліричний герой не завжди збігається з автором.
      - sentence: "____ — фрагмент більшого тексту."
        answer: уривок
        options:
          - уривок
          - одиниця виміру
          - канцеляризм
          - графема
        explanation: Уривок може бути частиною оповідання, повісті або роману.
      - sentence: "____ — художнє перебільшення."
        answer: гіпербола
        options:
          - гіпербола
          - крапка
          - заява
          - автобіографія
        explanation: Гіпербола підсилює емоцію через перебільшення.
  - id: wb-4
    type: error-correction
    title: Хибні друзі в літературній лексиці
    instruction: Виправте термін або формулювання.
    items:
      - sentence: "Це красивий стих Лесі Українки."
        error: "російський вплив у назві поетичного твору"
        correction: "Це красивий вірш Лесі Українки."
        explanation: Українською цілий поетичний твір — вірш або поезія.
      - sentence: "Головний характер твору боїться листа."
        error: "кальковане вживання слова характер"
        correction: "Головний персонаж твору боїться листа."
        explanation: Характер — це риси людини, а дійова особа — персонаж.
      - sentence: "Ця новела має 500 сторінок."
        error: "неправильний літературний термін"
        correction: "Цей роман має 500 сторінок."
        explanation: Українська новела — короткий прозовий твір.
      - sentence: "Автор використовує реквізити, щоб створити образ."
        error: "термін з офіційного стилю"
        correction: "Автор використовує художні засоби, щоб створити образ."
        explanation: У літературному аналізі потрібен термін художні засоби.
  - id: wb-5
    type: translate
    title: Говоримо про текст
    instruction: Оберіть природний український варіант.
    items:
      - source: The image of the old willow creates a sad mood.
        options:
          - text: "Образ старої верби створює сумний настрій."
            correct: true
          - text: "Реквізит старої верби створює сумний настрій."
            correct: false
          - text: "Скорочення старої верби створює сумний настрій."
            correct: false
          - text: "Адресат старої верби створює сумний настрій."
            correct: false
        explanation: Образ і настрій — ключові слова для художнього стилю.
      - source: In my opinion, the metaphor is effective.
        options:
          - text: "На мою думку, метафора вдала."
            correct: true
          - text: "Згідно з моєю думкою, метафора офіційна."
            correct: false
          - text: "Прошу метафору вдалою."
            correct: false
          - text: "Метафора грн вдала."
            correct: false
        explanation: На мою думку — природний початок короткого відгуку.
      - source: The character is afraid to open the letter.
        options:
          - text: "Персонаж боїться відкрити лист."
            correct: true
          - text: "Характер боїться відкрити лист."
            correct: false
          - text: "Роман боїться відкрити лист."
            correct: false
          - text: "Стиль боїться відкрити лист."
            correct: false
        explanation: Персонаж — дійова особа твору.
  - id: wb-6
    type: quiz
    title: Поезія й проза
    instruction: Оберіть найкращу відповідь.
    items:
      - question: Що таке ущільненість у поезії?
        options:
          - багато значення в небагатьох словах
          - обов'язкова наявність реквізитів
          - запис тільки великими літерами
          - повна відсутність образів
        correct: 0
        explanation: Поетичний рядок часто має кілька шарів значення.
      - question: Що допомагає читати прозовий уривок?
        options:
          - "три проходи: сюжет, настрій, мова"
          - тільки переклад кожного слова
          - пропуск усіх описів
          - пошук лише дат і скорочень
        correct: 0
        explanation: Така стратегія допомагає не загубитися в художньому тексті.
      - question: Чому не варто ототожнювати ліричного героя з автором автоматично?
        options:
          - бо голос у вірші може бути художньою роллю
          - бо автор завжди невідомий
          - бо у віршах немає голосу
          - бо ліричний герой означає видавництво
        correct: 0
        explanation: Ліричний герой — текстовий голос, не обов'язково біографічний автор.
