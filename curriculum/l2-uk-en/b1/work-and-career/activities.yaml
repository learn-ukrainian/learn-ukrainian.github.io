      - statement: Вакансія - це будь-яка професія людини.
        correct: false
        explanation: Вакансія - відкрита посада.
      - statement: Після "займатися" вживаємо орудний відмінок.
        correct: true
        explanation: Займатися маркетингом, логістикою, перекладом.
      - statement: '"Відповідати за клієнтами" - нормативна форма.'
        correct: false
        explanation: Треба відповідати за клієнтів.
      - statement: '"Подала резюме" підходить для однієї завершеної дії.'
        correct: true
        explanation: Доконаний вид показує результат.
      - statement: '"Працювала три роки" показує тривалість.'
        correct: true
        explanation: Недоконаний вид описує період.
      - statement: Колега завжди узгоджується як чоловічий рід.
        correct: false
