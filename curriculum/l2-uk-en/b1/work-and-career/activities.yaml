    text: "Після університету Олена {влаштувалася|влаштовувалася|влаштує} на першу роботу. Три роки вона {працювала|попрацювала|спрацювала} у відділі продажу й {відповідала|відповіла|відповідається} за корпоративних клієнтів. Потім Олена {вирішила|вирішувала|рішила} змінити сферу, {подала|подавала|подає} резюме на вакансію координаторки й {пройшла|проходила|перейшла} співбесіду. На новій посаді вона {займалася|зайнялася|займає} комунікацією з партнерами, {працювала|попрацювала|працюєш} з документами й за рік {отримала|отримувала|отримує} підвищення. Зараз вона {керує|керувала|керувалася} невеликою командою."
