  - id: wb-11
    type: essay-response
    title: Коротка кар'єрна біографія
    instruction: Напишіть 8 речень про реальний або вигаданий професійний шлях.
    prompt: "Напишіть рівно 8 речень. Згадайте фах або спеціальність, одну посаду, три тривалі обов'язки з недоконаним видом, три завершені події з доконаним видом і одне ввічливе запитання для співбесіди. Обов'язково використайте принаймні чотири слова з теми: вакансія, резюме, співбесіда, працевлаштування, стажування, обов'язки, підвищення, керівник, колега."
    min_words: 80
    model_answer: "За фахом я економістка, а моя спеціальність пов'язана з фінансовою аналітикою. Після університету я влаштувалася на першу роботу в невеликій компанії. Три роки працювала з таблицями, готувала звіти й відповідала за комунікацію з керівниками відділів. Потім я вирішила змінити напрямок і подала резюме на вакансію координаторки проєктів. Після співбесіди отримала пропозицію пройти стажування. Під час стажування я займалася розкладом, працювала з документами й допомагала колегам готувати зустрічі. За пів року отримала підвищення й почала керувати невеликим процесом. На наступній співбесіді я хотіла б запитати: які обов'язки передбачає ця посада?"
    rubric:
      - criteria: Лексика
        description: Використано щонайменше чотири професійні слова з модуля.
        points: 3
      - criteria: Вид дієслова
        description: Недоконаний вид передає тривалий досвід, доконаний - завершені події.
        points: 4
      - criteria: Керування
        description: Правильно вжито відповідати за, займатися, працювати з або керувати.
        points: 2
      - criteria: Регістр
        description: Є ввічлива формула або запитання, доречне для співбесіди.
        points: 1
