      - sentence: "Молодь прийшли на зустріч."
        error: прийшли
        correction: прийшла
        error_type: word
        explanation: '"Молодь" - singularia tantum, граматична однина.'
      - sentence: "Дружби дуже важливі для людини."
        error: Дружби дуже важливі
        correction: Дружба дуже важлива
        error_type: phrase
        explanation: У нейтральному значенні "дружба" є singularia tantum.
      - sentence: "Рукавиці є pluralia tantum."
        error: є pluralia tantum
        correction: не є pluralia tantum
        error_type: phrase
        explanation: Є однина "рукавиця".
      - sentence: "Один гроші лежав у конверті."
        error: Один гроші лежав
        correction: Гроші лежали
        error_type: phrase
        explanation: '"Гроші" вимагають множини; кількість краще назвати сумою.'
      - sentence: "Один комплект мебля стояв у кімнаті."
        error: мебля
        correction: меблів
        error_type: word
        explanation: "Після 'комплект' потрібен родовий множини: меблів."
      - sentence: "Київ розташовані на Дніпрі."
        error: розташовані
        correction: розташований
        error_type: word
        explanation: '"Київ" має форму однини.'
      - sentence: "Карпати красивий узимку."
        error: красивий
        correction: красиві
        error_type: word
        explanation: '"Карпати" мають множинну форму.'
      - sentence: "Ліки закінчився вчора."
        error: закінчився
        correction: закінчилися
        error_type: word
        explanation: '"Ліки" вимагають дієслова у множині.'
      - sentence: "Парфуми був занадто різкий."
        error: був занадто різкий
        correction: були занадто різкі
        error_type: phrase
        explanation: '"Парфуми" мають множинне узгодження.'
      - sentence: "Сани стояла біля хати."
        error: стояла
        correction: стояли
        error_type: word
        explanation: '"Сани" мають множинну граматичну форму.'
      - sentence: "Ми повернулися з Сумів."
        error: Сумів
        correction: Сум
        error_type: word
        explanation: Родовий відмінок множинної назви "Суми" - "Сум".
