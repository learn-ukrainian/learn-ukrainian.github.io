version: '1.0'
module: pluralia-tantum
level: b1
inline:
  - id: act-1
    type: quiz
    title: Чи має слово однину
    instruction: Оберіть точне пояснення для кожного слова або словосполучення.
    items:
      - question: Чому "двері" є pluralia tantum?
        options:
          - Слово не має нейтральної форми однини в цьому значенні.
          - Слово називає тільки багато різних дверей.
          - Слово завжди означає будинок.
        correct: 0
        explanation: Можна сказати "одні двері", але не нейтрально "*одна двері".
      - question: Яке слово НЕ є pluralia tantum?
        options:
          - шкарпетки
          - окуляри
          - ножиці
        correct: 0
        explanation: Є форма однини "шкарпетка", тому це звичайний іменник.
      - question: Як правильно назвати один комплект окулярів?
        options:
          - одні окуляри
          - один окуляри
          - одна окуляра
        correct: 0
        explanation: З pluralia tantum для одного комплекту вживаємо "одні".
      - question: Яке речення має правильне узгодження?
        options:
          - Нові двері відчинилися.
          - Новий двері відчинився.
          - Нова двері відчинилася.
        correct: 0
        explanation: '"Двері" вимагає множинного прикметника і дієслова.'
      - question: Чому слово "гроші" поводиться як pluralia tantum?
        options:
          - У звичайному значенні вони мають тільки множинну граматичну форму.
          - Бо це завжди рівно дві монети.
          - Бо це слово не відмінюється.
        correct: 0
        explanation: Кажемо "ці гроші", "немає грошей", "грошима/грішми".
      - question: Яка географічна назва має множинну граматичну форму?
        options:
          - Суми
          - Одеса
          - Київ
        correct: 0
        explanation: '"Суми" узгоджується у множині: Суми розташовані.'
      - question: Яка форма родового відмінка правильна?
        options:
          - немає дверей
          - немає дверів
          - немає дверям
        correct: 0
        explanation: Родовий відмінок слова "двері" - "дверей".
      - question: Яка фраза правильно рахує pluralia tantum?
        options:
          - дві пари окулярів
          - два окуляри у значенні дві пари
          - дві окуляра
        correct: 0
        explanation: Для комплектів зручно вживати "пара" або збірні числівники.
      - question: Яке слово є pluralia tantum у медичній темі?
        options:
          - ліки
          - лікар
          - таблетка
        correct: 0
        explanation: Ліки мають тільки множинну форму в нейтральному значенні.
      - question: Яка форма правильно узгоджується зі словом меблі?
        options:
          - нові меблі стояли
          - нова меблі стояла
          - новий меблі стояв
        correct: 0
        explanation: Меблі вимагають множинного прикметника і дієслова.
      - question: Яка фраза правильно показує рух до міста з множинною назвою?
        options:
          - до Чернівців
          - до Чернівці
          - до Чернівця
        correct: 0
        explanation: Чернівці мають множинну форму, тому після до потрібен родовий Чернівців.
      - question: Яке слово НЕ є pluralia tantum?
        options:
          - рукавиця
          - сани
          - ворота
        correct: 0
        explanation: Рукавиця має звичайну однину і множину рукавиці.
  - id: act-2
    type: group-sort
    title: Три полички числа
    instruction: Розподіліть слова за граматичною поведінкою.
    groups:
      - label: Pluralia tantum
        items:
          - двері
          - окуляри
          - ножиці
          - гроші
          - меблі
          - канікули
          - Карпати
          - Черкаси
      - label: Звичайні іменники з одниною і множиною
        items:
          - шкарпетки
          - рукавиці
          - книжки
          - ключі
          - міста
          - черевики
      - label: Singularia tantum
        items:
          - молоко
          - дружба
          - молодь
          - залізо
          - студентство
          - добро
      - label: Потрібна одиниця міри або комплект
        items:
          - пара окулярів
          - комплект меблів
          - упаковка ліків
          - сума грошей
  - id: act-3
    type: match-up
    title: Називний, родовий, орудний
    instruction: Поєднайте словникову форму з потрібним набором відмінкових форм.
    pairs:
      - left: двері
        right: дверей; дверима/дверми
      - left: окуляри
        right: окулярів; окулярами
      - left: гроші
        right: грошей; грошима/грішми
      - left: ворота
        right: воріт; воротами/ворітьми
      - left: ножиці
        right: ножиць; ножицями
      - left: канікули
        right: канікул; канікулами
      - left: сани
        right: саней; саньми/санями
      - left: Карпати
        right: Карпат; Карпатами
      - left: ліки
        right: ліків; ліками
      - left: меблі
        right: меблів; меблями
      - left: парфуми
        right: парфумів; парфумами
      - left: Чернівці
        right: Чернівців; Чернівцями
  - id: act-4
    type: fill-in
    title: Форма в реченні
    instruction: Вставте правильну форму pluralia tantum.
    items:
      - sentence: "Після ____ ми повернулися до Києва."
        answer: канікул
        options:
          - канікул
          - канікули
          - канікулам
        explanation: "Після + родовий відмінок: після канікул."
      - sentence: "У коридорі не було ____."
        answer: дверей
        options:
          - дверей
          - дверів
          - дверям
        explanation: Немає чого? дверей.
      - sentence: "Вона розплатилася ____."
        answer: грошима
        options:
          - грошима
          - грошей
          - гроші
        explanation: Розплатитися чим? грошима; також можлива форма грішми.
      - sentence: "Ми повернулися з ____ у неділю ввечері."
        answer: Карпат
        options:
          - Карпат
          - Карпатів
          - Карпатам
        explanation: Звідки? з Карпат.
      - sentence: "На столі лежали гострі ____."
        answer: ножиці
        options:
          - ножиці
          - ножиця
          - ножицями
        explanation: У називному відмінку потрібна форма "ножиці".
      - sentence: "Біля входу стояли високі ____."
        answer: ворота
        options:
          - ворота
          - ворото
          - воріт
        explanation: "Підмет у називному відмінку: ворота стояли."
      - sentence: "Я не можу читати без ____."
        answer: окулярів
        options:
          - окулярів
          - окулярей
          - окулярами
        explanation: "Без + родовий відмінок: без окулярів."
      - sentence: "У кімнаті стояли нові ____."
        answer: меблі
        options:
          - меблі
          - мебля
          - меблів
        explanation: "Підмет у називному відмінку: меблі стояли."
      - sentence: "Пацієнт не повинен бути без ____."
        answer: ліків
        options:
          - ліків
          - ліки
          - ліками
        explanation: "Без + родовий відмінок: без ліків."
      - sentence: "Потяг вирушає до ____ увечері."
        answer: Чернівців
        options:
          - Чернівців
          - Чернівці
          - Чернівцям
        explanation: "До + родовий відмінок: до Чернівців."
      - sentence: "Після ____ село швидко спорожніло."
        answer: жнив
        options:
          - жнив
          - жнива
          - жнивів
        explanation: "Після + родовий відмінок: після жнив."
      - sentence: "На полиці стояли дорогі ____."
        answer: парфуми
        options:
          - парфуми
          - парфум
          - парфумів
        explanation: "Підмет у називному відмінку: парфуми стояли."
  - id: act-5
    type: error-correction
    title: Узгодження і рахунок
    instruction: Знайдіть помилку й подайте нормативний варіант.
    items:
      - sentence: "Цей двері зачинений."
        error: Цей двері зачинений
        correction: Ці двері зачинені
        error_type: phrase
        explanation: '"Двері" вимагає множини: ці, зачинені.'
      - sentence: "Мої окуляри зламався."
        error: зламався
        correction: зламалися
        error_type: word
        explanation: Присудок із "окуляри" стоїть у множині.
      - sentence: "Я купив один ножиці."
        error: один ножиці
        correction: одні ножиці
        error_type: phrase
        explanation: Для одного комплекту кажемо "одні ножиці".
      - sentence: "У нас немає дверів."
        error: дверів
        correction: дверей
        error_type: word
        explanation: Родовий відмінок слова "двері" - "дверей".
      - sentence: "Новий меблі стояв біля стіни."
        error: Новий меблі стояв
        correction: Нові меблі стояли
        error_type: phrase
        explanation: '"Меблі" мають множинне узгодження.'
      - sentence: "Ці гроші закінчився дуже швидко."
        error: закінчився
        correction: закінчилися
        error_type: word
        explanation: '"Гроші" вимагають дієслова у множині.'
      - sentence: "Після канікули ми поїхали до Черкас."
        error: канікули
        correction: канікул
        error_type: word
        explanation: Родовий відмінок - "канікул".
      - sentence: "Суми розташоване на північному сході України."
        error: розташоване
        correction: розташовані
        error_type: word
        explanation: Назва "Суми" має множинну форму.
      - sentence: "Цей ліки допоміг швидко."
        error: Цей ліки допоміг
        correction: Ці ліки допомогли
        error_type: phrase
        explanation: '"Ліки" вимагають множинного займенника і дієслова.'
      - sentence: "Ми поїхали до Чернівці."
        error: Чернівці
        correction: Чернівців
        error_type: word
        explanation: Після до потрібен родовий відмінок множинної назви.
      - sentence: "У кімнаті немає меблей."
        error: меблей
        correction: меблів
        error_type: word
        explanation: Родовий відмінок слова "меблі" - "меблів".
      - sentence: "Він купив один штани."
        error: один штани
        correction: одні штани
        error_type: phrase
        explanation: Для одного предмета pluralia tantum уживаємо "одні".
workbook:
  - id: wb-1
    type: quiz
    title: Основи pluralia tantum
    instruction: Оберіть правильне твердження або форму.
    items:
      - question: Що означає pluralia tantum?
        options:
          - Іменник уживається тільки у множинній формі.
          - Іменник завжди називає багато однакових речей.
          - Іменник не має відмінкових форм.
        correct: 0
        explanation: "Це граматична властивість: форма множини без звичайної однини."
      - question: Чому такі іменники не належать до I-IV відмін?
        options:
          - Відміна визначається за формою однини, якої тут немає.
          - Вони всі незмінювані.
          - Вони всі іншомовні.
        correct: 0
        explanation: Вони відмінюються, але не класифікуються через однину.
      - question: Яка пара є правильним прикладом pluralia tantum?
        options:
          - двері, ножиці
          - книжки, міста
          - шкарпетки, рукавиці
        correct: 0
        explanation: '"Книжка", "місто", "шкарпетка", "рукавиця" мають однину.'
      - question: Яке слово належить до singularia tantum?
        options:
          - молоко
          - окуляри
          - двері
        correct: 0
        explanation: '"Молоко" звичайно має тільки однину.'
      - question: Яка форма правильна для одного комплекту?
        options:
          - одні ворота
          - один ворота
          - одна ворота
        correct: 0
        explanation: З pluralia tantum уживаємо "одні".
      - question: Яке речення правильне?
        options:
          - Канікули були короткі.
          - Канікули була коротка.
          - Канікули було коротке.
        correct: 0
        explanation: '"Канікули" узгоджується у множині.'
      - question: Яка форма орудного відмінка нормативна?
        options:
          - грішми
          - грошам
          - грошей
        correct: 0
        explanation: '"Грішми" є нормативним варіантом орудного поряд із "грошима".'
      - question: Яке слово не слід рахувати як "двоє ..."?
        options:
          - гроші
          - двері
          - ножиці
        correct: 0
        explanation: Гроші рахують через суму, купюри або монети, а не "двоє грошей".
      - question: Яка форма родового відмінка правильна?
        options:
          - без ліків
          - без лік
          - без ліками
        correct: 0
        explanation: Родовий відмінок слова "ліки" - "ліків".
      - question: Яка назва узгоджується у множині?
        options:
          - Чернівці відомі
          - Чернівці відоме
          - Чернівці відома
        correct: 0
        explanation: Чернівці мають множинну граматичну форму.
      - question: Як природно назвати один комплект меблів?
        options:
          - один комплект меблів
          - одна мебля
          - один меблі
        correct: 0
        explanation: Для рахунку слова меблі потрібне слово-міра або назва предмета.
      - question: Яка пара протиставляє pluralia tantum і singularia tantum?
        options:
          - гроші - молоко
          - книга - стіл
          - шкарпетка - ключ
        correct: 0
        explanation: Гроші мають множинну граматику, а молоко - однину.
  - id: wb-2
    type: fill-in
    title: Родовий відмінок
    instruction: Вставте правильну форму родового відмінка.
    items:
      - sentence: "У квартирі немає ____."
        answer: меблів
        options:
          - меблів
          - меблей
          - меблі
        explanation: "Родовий відмінок: немає меблів."
      - sentence: "Після ____ ми почали новий семестр."
        answer: канікул
        options:
          - канікул
          - канікули
          - канікулам
        explanation: "Після + родовий: після канікул."
      - sentence: "Не вистачає ____ на ремонт."
        answer: грошей
        options:
          - грошей
          - грошів
          - грошам
        explanation: Родовий відмінок слова "гроші" - "грошей".
      - sentence: "Без ____ я погано бачу."
        answer: окулярів
        options:
          - окулярів
          - окулярей
          - окулярам
        explanation: "Без + родовий: без окулярів."
      - sentence: "Біля будинку не було ____."
        answer: воріт
        options:
          - воріт
          - воротів
          - воротам
        explanation: Родовий відмінок слова "ворота" - "воріт".
      - sentence: "У коробці не знайшли ____."
        answer: ножиць
        options:
          - ножиць
          - ножиців
          - ножицям
        explanation: Родовий відмінок слова "ножиці" - "ножиць".
      - sentence: "Ми повернулися з ____."
        answer: Черкас
        options:
          - Черкас
          - Черкасів
          - Черкасам
        explanation: Звідки? з Черкас.
      - sentence: "Туристи приїхали з ____."
        answer: Карпат
        options:
          - Карпат
          - Карпатів
          - Карпатам
        explanation: "Родовий відмінок: з Карпат."
      - sentence: "Для тіста треба трохи ____."
        answer: дріжджів
        options:
          - дріжджів
          - дріжджей
          - дріжджі
        explanation: "Родовий відмінок: трохи дріжджів."
      - sentence: "У магазині немає цих ____."
        answer: парфумів
        options:
          - парфумів
          - парфум
          - парфумам
        explanation: "Родовий відмінок: немає парфумів."
      - sentence: "Потяг не доїхав до ____."
        answer: Чернівців
        options:
          - Чернівців
          - Чернівці
          - Чернівцям
        explanation: "До + родовий відмінок: до Чернівців."
      - sentence: "Після ____ техніку прибрали в комору."
        answer: жнив
        options:
          - жнив
          - жнивів
          - жнива
        explanation: "Родовий відмінок слова жнива - жнив."
  - id: wb-3
    type: match-up
    title: Відмінкові міні-парадигми
    instruction: Поєднайте форму з правильною функцією.
    pairs:
      - left: дверей
        right: родовий відмінок від двері
      - left: дверима
        right: орудний відмінок від двері
      - left: грішми
        right: варіант орудного від гроші
      - left: воріт
        right: родовий відмінок від ворота
      - left: ворітьми
        right: варіант орудного від ворота
      - left: ножиць
        right: родовий відмінок від ножиці
      - left: канікул
        right: родовий відмінок від канікули
      - left: Карпатами
        right: орудний відмінок від Карпати
      - left: меблів
        right: родовий відмінок від меблі
      - left: ліками
        right: орудний відмінок від ліки
      - left: Чернівців
        right: родовий відмінок від Чернівці
      - left: Сум
        right: родовий відмінок від Суми
  - id: wb-4
    type: group-sort
    title: Моделі родового
    instruction: Розподіліть pluralia tantum за типовою формою родового відмінка.
    groups:
      - label: Закінчення -ів/-їв
        items:
          - окулярів
          - ліків
          - меблів
          - парфумів
          - дріжджів
          - штанів
          - хитрощів
          - радощів
      - label: Закінчення -ей
        items:
          - дверей
          - грошей
          - саней
      - label: Нульове закінчення
        items:
          - воріт
          - канікул
          - Карпат
          - Черкас
          - Сум
          - жнив
          - заручин
          - іменин
  - id: wb-5
    type: true-false
    title: Так чи ні
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Pluralia tantum мають тільки множинну форму."
        correct: true
        explanation: Це основне визначення групи.
      - statement: "Слово шкарпетки є pluralia tantum."
        correct: false
        explanation: Є форма однини "шкарпетка".
      - statement: "Двері вимагають множинного узгодження."
        correct: true
        explanation: "Правильно: двері відчинені."
      - statement: "Родовий відмінок слова ворота - воріт."
        correct: true
        explanation: Це нульове закінчення з чергуванням о - і.
      - statement: "Слово гроші нормально рахувати як один гроші."
        correct: false
        explanation: Називаємо суму, купюри або монети; форма "один гроші" ненормативна.
      - statement: "Меблі можна замінити конкретними словами: стіл, шафа, крісло."
        correct: true
        explanation: Для рахунку часто називають конкретні предмети меблів.
      - statement: "Київ є pluralia tantum."
        correct: false
        explanation: '"Київ" має форму однини.'
      - statement: "Суми узгоджуються у множині."
        correct: true
        explanation: "Правильно: Суми розташовані."
      - statement: "Молодь граматично поводиться як однина."
        correct: true
        explanation: "Це singularia tantum: молодь прийшла."
      - statement: "Форма грішми є помилковою."
        correct: false
        explanation: '"Грішми" - нормативний варіант орудного.'
      - statement: "Після канікул - правильна форма."
        correct: true
        explanation: Родовий відмінок слова "канікули" - "канікул".
      - statement: "Окуляр - звичайна однина до окуляри у значенні оптичного приладу."
        correct: false
        explanation: '"Окуляр" має інше спеціальне значення.'
