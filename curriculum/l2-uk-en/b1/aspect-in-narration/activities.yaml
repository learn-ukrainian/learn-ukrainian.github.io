version: '1.0'
module: aspect-in-narration
level: b1
inline:
  - id: act-1
    type: quiz
    title: Роль дієслова
    instruction: Обери роль дієслова в розповіді.
    items:
      - question: Сонце сідало за будинками.
        options:
          - процес / обставина
          - завершений крок
          - наказ
        explanation: Сідало відкриває процес і створює обстановку сцени.
        correct: 0
      - question: Ми сиділи в кав'ярні й чекали.
        options:
          - процес / обставина
          - поворотний момент
          - результат
        explanation: Сиділи й чекали тримають стан відкритим у часі.
        correct: 0
      - question: Двері відчинилися.
        options:
          - завершений крок
          - тривалий стан
          - звичка
        explanation: Після відчинилися ситуація змінилася.
        correct: 0
      - question: Максим зайшов до зали.
        options:
          - завершений крок
          - опис погоди
          - паралельна дія
        explanation: Зайшов рухає сюжет до наступної події.
        correct: 0
      - question: Катерина весь вечір мовчала.
        options:
          - тривалий стан
          - одноразовий результат
          - поворотний момент
        explanation: Мовчала створює напружений стан, який тривав.
        correct: 0
      - question: Раптом телефон задзвонив.
        options:
          - поворотний момент
          - звична дія
          - обстановка
        explanation: Раптом + задзвонив перериває попередню сцену.
        correct: 0
      - question: Поки Юлія говорила, Максим шукав телефон.
        options:
          - паралельні процеси
          - два завершені кроки
          - фінальний результат
        explanation: Поки показує одночасні відкриті дії.
        correct: 0
      - question: Нарешті він знайшов телефон.
        options:
          - завершений результат
          - тривалий процес
          - опис атмосфери
        explanation: Знайшов закриває попередній процес пошуку.
        correct: 0
      - question: Зазвичай ми зустрічалися біля вікна.
        options:
          - звичка / повторюваність
          - одноразовий крок
          - раптовий поворот
        explanation: Зазвичай переводить речення в повторюваний сценарій.
        correct: 0
      - question: Юлія підвелася й відповіла.
        options:
          - послідовні кроки
          - опис тривалої сцени
          - одночасні процеси
        explanation: Підвелася й відповіла будують ланцюжок завершених подій.
        correct: 0
  - id: act-2
    type: group-sort
    title: Конектори часу
    instruction: Розподіли конектори за тим, як вони організовують час у розповіді.
    groups:
      - label: тривалість / одночасність
        items:
          - тим часом
          - поки
          - доки
          - увесь час
      - label: послідовність / поворот
        items:
          - спочатку
          - потім
          - раптом
          - нарешті
  - id: act-3
    type: group-sort
    title: Опис чи зміна?
    instruction: Розподіли речення за роллю дієслова.
    groups:
      - label: описує ситуацію
        items:
          - Ми сиділи біля вікна.
          - Катерина хвилювалася.
          - У залі грала тиха музика.
          - За вікном темніло.
      - label: називає зміну
        items:
          - Телефон задзвонив.
          - Він прочитав записку.
          - Максим кинув сумку на стіл.
          - Юлія підвелася.
  - id: act-4
    type: fill-in
    title: Форма за функцією
    instruction: Доповни речення формою з потрібною функцією.
    items:
      - sentence: Ми ____ в кав'ярні й чекали.
        answer: сиділи
        options:
          - сиділи
          - зайшли
      - sentence: Раптом Максим ____ сумку на стіл.
        answer: кинув
        options:
          - кинув
          - кидав
      - sentence: Юлія ____ каву, поки Катерина хвилювалася.
        answer: пила
        options:
          - пила
          - випила
      - sentence: Раптом двері ____ самі.
        answer: відчинилися
        options:
          - відчинилися
          - відчинялися
      - sentence: Увесь вечір Катерина ____ на телефон.
        answer: дивилася
        options:
          - дивилася
          - подивилася
      - sentence: Нарешті вона ____ повідомлення.
        answer: прочитала
        options:
          - прочитала
          - читала
      - sentence: Тим часом у залі ____ музика.
        answer: грала
        options:
          - грала
          - заграла
      - sentence: Після цього ми ____ надвір.
        answer: вийшли
        options:
          - вийшли
          - виходили
  - id: act-5
    type: match-up
    title: Що змінює вид?
    instruction: Поєднай результат у тексті зі способом розповіді.
    pairs:
      - left: повільніший опис
        right: більше обставин
      - left: чіткіший сюжет
        right: більше завершених кроків
      - left: поворотний момент
        right: доконаний крок
      - left: паралельна дія
        right: поки + недоконаний вид
      - left: звичний сценарій
        right: зазвичай + недоконаний вид
      - left: результат після пошуку
        right: знайти / знайшов
      - left: атмосфера сцени
        right: стан або процес недоконаним видом
      - left: фінальний етап
        right: нарешті + доконаний вид
workbook:
  - type: match-up
    title: Функція форми
    instruction: Познач, яку роль виконує форма в розповіді.
    pairs:
      - left: Було тихо.
        right: стан / обставина
      - left: Юлія пила каву.
        right: процес
      - left: Максим зайшов.
        right: завершений крок
      - left: Він сказав новину.
        right: завершений крок
      - left: Катерина хвилювалася.
        right: стан
      - left: Марія довго мовчала.
        right: тривалий стан
      - left: Марія раптом відповіла.
        right: завершений крок
      - left: У дворі темніло.
        right: опис атмосфери
    id: wb-1
  - type: fill-in
    instruction: Вибери форму за роллю в розповіді.
    items:
      - sentence: Поки ми ____, сонце сідало.
        answer: чекали
        options:
          - чекали
          - дочекалися
      - sentence: Після цього Андрій ____.
        answer: повернувся
        options:
          - повертався
          - повернувся
      - sentence: Тим часом розмова ____.
        answer: тривала
        options:
          - тривала
          - закінчилася
      - sentence: Нарешті Катерина ____.
        answer: відповіла
        options:
          - відповідала
          - відповіла
      - sentence: Коли ми ____ коридором, світло раптом згасло.
        answer: йшли
        options:
          - йшли
          - пішли
      - sentence: Після паузи Андрій ____ правду.
        answer: сказав
        options:
          - сказав
          - казав
      - sentence: Поки телефон ____, Олена шукала ключі.
        answer: дзвонив
        options:
          - дзвонив
          - задзвонив
      - sentence: Нарешті кур'єр ____ пакет.
        answer: приніс
        options:
          - приніс
          - носив
    title: Вибір форми
    id: wb-2
  - type: group-sort
    instruction: Розподіли дієслова за тим, чи вони відкривають дію, чи закривають крок.
    groups:
      - label: відкритий процес / стан
        items:
          - сиділи
          - пили
          - розмовляли
          - чекали
          - хвилювалася
      - label: завершений крок
        items:
          - зайшов
          - кинув
          - сказав
          - знайшов
          - повернувся
    title: Дієслова за роллю
    id: wb-3
  - type: error-correction
    instruction: Познач неправильну форму виду й обери доречну заміну.
    items:
      - sentence: Поки ми випили каву, Максим розповідав новину.
        error: випили
        correction: пили
        options:
          - пили
          - випили
        explanation: «Поки» тримає тривалу дію-обставину, тому потрібен недоконаний вид.
      - sentence: Раптом телефон дзвонив.
        error: дзвонив
        correction: задзвонив
        options:
          - задзвонив
          - дзвонив
        explanation: «Раптом» уводить раптову подію, тому потрібен доконаний вид.
      - sentence: Спочатку було тихо, а потім Максим заходив до кав'ярні.
        error: заходив
        correction: зайшов
        options:
          - зайшов
          - заходив
        explanation: «Потім» називає один завершений крок сюжету — доконаний вид.
      - sentence: Цілий вечір за вікном стемніло.
        error: стемніло
        correction: темніло
        options:
          - темніло
          - стемніло
        explanation: «Цілий вечір» описує тривалий процес, тому недоконаний вид.
      - sentence: Поки Олена написала листа, Максим дивився у вікно.
        error: написала
        correction: писала
        options:
          - писала
          - написала
        explanation: «Поки» потребує одночасної тривалої дії — недоконаний вид.
      - sentence: Нарешті кур'єр приносив пакет.
        error: приносив
        correction: приніс
        options:
          - приніс
          - приносив
        explanation: «Нарешті» називає завершений результат — доконаний вид.
      - sentence: Читавши лист до кінця, я потім виписав цитати.
        error: Читавши
        correction: Прочитавши
        options:
          - Прочитавши
          - Читаючи
        explanation: До кінця й потім показують передування завершеної дії, тому потрібен доконаний дієприслівник на -вши.
      - sentence: Прочитавши текст, я одночасно виписую цитати.
        error: Прочитавши
        correction: Читаючи
        options:
          - Читаючи
          - Прочитавши
        explanation: Одночасно вимагає додаткової дії, що триває разом із головною, тому потрібен недоконаний дієприслівник на -ючи.
      - sentence: Прочитавши текст, цитати були виписані.
        error: Прочитавши текст, цитати були виписані.
        correction: Я виписав цитати, прочитавши текст.
        options:
          - Я виписав цитати, прочитавши текст.
          - Прочитавши текст, цитати були виписані.
        explanation: Дієприслівниковий зворот і головна дія мають одного виконавця.
    title: Виправлення виду
    id: wb-4
  - type: match-up
    instruction: Поєднай функцію з видом.
    pairs:
      - left: обстановка
        right: опис обставин недоконаним видом
      - left: одночасна дія
        right: паралельний процес недоконаним видом
      - left: результат
        right: завершений крок доконаним видом
      - left: послідовний ланцюжок
        right: серія доконаних подій
      - left: поки ми чекали
        right: відкритий процес
      - left: раптом він зайшов
        right: завершений крок
      - left: у кімнаті темніло
        right: атмосфера
      - left: після цього ми вийшли
        right: крок сюжету
    title: Функція і вид
    id: wb-5
  - type: cloze
    instruction: Заповни пропуски конекторами.
    text: ____ ми сиділи в кав'ярні. ____ зайшов Максим. ____ він кинув сумку на стіл. ____ Юлія відповідала тихо. ____ Олена писала записку, Максим мовчав. ____ вона поклала записку на стіл. ____ у коридорі було темно. ____ двері відчинилися.
    blanks:
      - id: 1
        answer: У цей час
        options:
          - У цей час
          - Нарешті
      - id: 2
        answer: Раптом
        options:
          - Раптом
          - Зазвичай
      - id: 3
        answer: Після цього
        options:
          - Після цього
          - Поки
      - id: 4
        answer: Тим часом
        options:
          - Тим часом
          - Спочатку
      - id: 5
        answer: Поки
        options:
          - Поки
          - Раптом
          - Нарешті
      - id: 6
        answer: Потім
        options:
          - Потім
          - Увесь час
          - Доки
      - id: 7
        answer: Тим часом
        options:
          - Тим часом
          - Нарешті
          - Раптом
      - id: 8
        answer: Раптом
        options:
          - Раптом
          - Поки
          - Увесь час
    title: Конектори в тексті
    id: wb-6
  - type: order
    instruction: Вибудуй завершені події в правильному порядку.
    items:
      - Максим зайшов.
      - Він кинув сумку.
      - Він сказав новину.
      - Юлія відповіла.
      - Розмова закінчилася.
      - Олена знайшла записку.
      - Вона прочитала її мовчки.
      - Після цього всі вийшли надвір.
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
    title: Порядок подій
    id: wb-7
  - type: true-false
    instruction: Познач істинність твердження.
    items:
      - statement: Обставини й процеси часто мають недоконаний вид.
        correct: true
      - statement: Раптом часто вводить новий крок сюжету.
        correct: true
      - statement: Опис відповідає на питання «що сталося?».
        correct: false
      - statement: Послідовність подій часто має доконаний вид.
        correct: true
      - statement: Недоконаний вид може додавати довший опис.
        correct: true
        explanation: Він часто показує обставини й тривалість.
      - statement: Доконаний вид ніколи не рухає сюжет.
        correct: false
        explanation: Саме доконані форми часто позначають кроки сюжету.
      - statement: Конектор «поки» часто підтримує паралельну тривалу дію.
        correct: true
        explanation: Поки вводить дію, яка триває одночасно з іншою.
      - statement: Конектор «раптом» зазвичай не підходить для спокійного опису обставин.
        correct: true
        explanation: Він сигналізує несподівану подію.
    title: Перевір твердження
    id: wb-8
  - type: quiz
    instruction: Вибери найкращий варіант.
    items:
      - question: Яке речення найкраще тримає відкритий процес?
        options:
          - Ми сиділи й пили каву.
          - Максим зайшов і сказав.
          - Телефон задзвонив.
        explanation: Недоконані форми створюють тривалий процес.
        correct: 0
      - question: Яке речення найкраще рухає сюжет?
        options:
          - Катерина хвилювалася.
          - Раптом Андрій повернувся.
          - Було тихо.
        explanation: Доконана форма з «раптом» створює поворотний момент.
        correct: 1
      - question: Що краще для опису обставин?
        options:
          - Вітер шумів у деревах.
          - Вітер раптом зламав гілку.
          - Олена підписала лист.
        explanation: Шумів описує атмосферу.
        correct: 0
      - question: Що краще для завершеного кроку?
        options:
          - Олена відчинила вікно.
          - Олена сиділа біля вікна.
          - За вікном темніло.
        explanation: Відчинила — завершений крок.
        correct: 0
      - question: Що краще після «поки»?
        options:
          - ми чекали
          - ми дочекалися
          - ми вийшли
        explanation: Поки потребує тривалої дії.
        correct: 0
      - question: Що краще після «раптом»?
        options:
          - задзвонив телефон
          - телефон дзвонив увесь вечір
          - телефон лежав на столі
        explanation: Раптом уводить новий крок.
        correct: 0
      - question: Що краще для фінального кроку?
        options:
          - ми зачинили двері
          - ми стояли біля дверей
          - ми чекали біля дверей
        explanation: Зачинили називає завершену дію.
        correct: 0
      - question: Що краще для повільного опису?
        options:
          - сніг падав великими пластівцями
          - сніг упав із даху
          - Марко кинув сумку
        explanation: Падав створює тривалий процес.
        correct: 0
      - question: Що краще показує зміну ситуації?
        options:
          - світло згасло
          - світло горіло
          - було світло
        explanation: Згасло змінює стан сцени.
        correct: 0
      - question: Що краще залишає дію відкритою?
        options:
          - Катерина шукала ключі
          - Катерина знайшла ключі
          - Катерина поклала ключі
        explanation: Шукала не гарантує результат.
        correct: 0
    title: Найкращий варіант
    id: wb-9
  - title: Дієприслівникові суфікси
    instruction: Поєднай дієприслівник із суфіксом і видовою функцією.
    type: match-up
    id: wb-10
    pairs:
      - left: Читаючи
        right: '-ючи: суфікс недоконаного дієприслівника'
      - left: Прочитавши
        right: '-вши: суфікс доконаного дієприслівника'
      - left: Повертаючись
        right: '-ючи: суфікс недоконаного дієприслівника'
      - left: Повернувшись
        right: '-вши: суфікс доконаного дієприслівника'
      - left: Слухаючи
        right: '-ючи: суфікс недоконаного дієприслівника'
      - left: Вислухавши
        right: '-вши: суфікс доконаного дієприслівника'
      - left: Працюючи
        right: '-ючи: суфікс недоконаного дієприслівника'
      - left: Попрацювавши
        right: '-вши: суфікс доконаного дієприслівника'
  - type: essay-response
    instruction: Напиши коротку розповідь із обставинами й послідовністю подій.
    prompt: 'Напишіть коротку розповідь, де є обставини сцени й послідовність подій. Додайте щонайменше чотири недоконані форми для процесів, станів або обставин, чотири доконані форми для завершених кроків, три конектори та один контраст «поки/раптом».'
    min_words: 120
    model_answer: >-
      Вчора ввечері ми сиділи в кав'ярні біля великого вікна й тихо
      розмовляли про роботу. За вікном темніло, надворі йшов легкий дощ,
      а в залі грала музика. Юлія пила каву й читала повідомлення, а
      Катерина чекала на Максима і час від часу дивилася на двері. Поки
      ми говорили про плани на вихідні, телефон Катерини раптом задзвонив.
      Через хвилину двері відчинилися, і до кав'ярні зайшов Максим. Він
      кинув сумку на стілець, сів поруч і сказав, що знайшов нову роботу.
      Ми одразу підвелися, привітали його й замовили чай. Після цього
      розмова стала жвавішою: Максим спокійно пояснював подробиці, Юлія
      ставила питання, а Катерина усміхалася. Ми сміялися, слухали його
      історію й планували зустрітися знову наступного тижня. Нарешті ми
      заплатили, вийшли надвір і ще довго обговорювали цю добру новину.
