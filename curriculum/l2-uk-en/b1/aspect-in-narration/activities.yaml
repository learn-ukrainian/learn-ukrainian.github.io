- type: highlight-morphemes
  instruction: Підкресли дієприслівникові суфікси.
  text: Читаючи текст, я виписую цитати. Прочитавши текст, я виписав цитати. Повертаючись додому, ми обговорювали новину. Повернувшись додому, ми записали висновки. Слухаючи співрозмовника, Олена занотовувала деталі. Вислухавши співрозмовника, вона поставила запитання. Працюючи над планом, команда сперечалася. Попрацювавши над планом, команда узгодила рішення.
  items:
  - word: Читаючи
    morpheme: -ючи
  - word: Прочитавши
    morpheme: -вши
  - word: Повертаючись
