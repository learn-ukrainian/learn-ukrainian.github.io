- id: act-1
  type: grammar-identify
  instruction: Познач функцію дієслова в розповіді.
  items:
  - sentence: Сонце сідало за обрій.
    answer: тло
    explanation: Дія відкрита в часі й створює атмосферу.
  - sentence: Раптом задзвонив телефон.
    answer: подія
    explanation: Дія змінює ситуацію й рухає сюжет.
  - sentence: Ми сиділи на терасі.
    answer: тло
    explanation: Дія триває як обстановка сцени.
  - sentence: Дощ тихо шумів за вікном.
    answer: тло
  - sentence: Раптом хтось постукав у двері.
    answer: подія
  - sentence: Ми довго чекали на відповідь.
    answer: тло
  - sentence: Нарешті прийшло повідомлення.
    answer: подія
  - sentence: У кімнаті пахло кавою.
    answer: тло
  title: Тло чи подія
- id: act-2
  type: group-sort
  title: Конектори шарів
  instruction: Розподіли конектори за наративною функцією.
  groups:
  - label: тло
    items:
    - тим часом
    - у цей час
    - поки
    - доки
    - увесь час
    - зазвичай
  - label: передній план
    items:
    - спочатку
    - потім
    - після цього
    - раптом
    - нарешті
    - тоді
- id: act-3
  type: quiz
  title: Чому доконаний?
  instruction: Вибери найкраще пояснення видової форми.
  items:
  - prompt: У реченні «Максим зайшов» дієслово доконаного виду, бо...
    options:
    - text: подія змінює ситуацію
      correct: true
    - text: опис триває увесь час
      correct: false
    - text: стан залишається відкритим
      correct: false
    explanation: «Зайшов» закриває один крок сюжету.
  - question: У реченні «Олена відчинила двері» дієслово доконаного виду, бо...
    options:
    - text: дія створює новий крок сюжету
      correct: true
    - text: опис триває без межі
      correct: false
    - text: це звичка
      correct: false
    - text: це тло сцени
      correct: false
    explanation: Відчинила — завершена подія.
  - question: У реченні «Ми сиділи біля вікна» недоконаний вид потрібен, бо...
    options:
    - text: дія створює тло
      correct: true
    - text: дія різко змінює сюжет
      correct: false
    - text: це майбутній результат
      correct: false
    - text: це наказ
      correct: false
    explanation: Сиділи описує стан сцени.
  - question: Який маркер вводить передній план?
    options:
    - text: раптом
      correct: true
    - text: тим часом
      correct: false
    - text: увесь вечір
      correct: false
    - text: поки
      correct: false
    explanation: Раптом сигналізує нову подію.
  - question: Який маркер підтримує тло?
    options:
    - text: поки
      correct: true
    - text: нарешті
      correct: false
    - text: раптом
      correct: false
    - text: після цього
      correct: false
    explanation: Поки поєднує дію тла з іншою подією.
  - question: Чому «задзвонив телефон» часто є подією?
    options:
    - text: він перериває ситуацію
      correct: true
    - text: він описує погоду
      correct: false
    - text: він називає звичку
      correct: false
    - text: він триває годинами
      correct: false
    explanation: Таке дієслово рухає сюжет.
  - question: Чому «світало» часто є тлом?
    options:
    - text: воно описує атмосферу сцени
      correct: true
    - text: воно завершує конфлікт
      correct: false
    - text: воно називає один крок
      correct: false
    - text: воно є наказом
      correct: false
    explanation: Світало створює обстановку.
  - question: Яке речення найкраще рухає сюжет?
    options:
    - text: Максим поклав ключі на стіл.
      correct: true
    - text: За вікном шумів дощ.
      correct: false
    - text: У кімнаті було тепло.
      correct: false
    - text: Ми сиділи мовчки.
      correct: false
    explanation: Поклав ключі — завершена дія переднього плану.
  - question: Яке речення найкраще створює атмосферу?
    options:
    - text: У коридорі пахло фарбою.
      correct: true
    - text: Катерина підписала заяву.
      correct: false
    - text: Телефон задзвонив.
      correct: false
    - text: Двері відчинилися.
      correct: false
    explanation: Пахло описує стан, а не сюжетний крок.
  - question: Який варіант показує межу події?
    options:
    - text: прочитав записку
      correct: true
    - text: читав записку
      correct: false
    - text: дивився у вікно
      correct: false
    - text: чекав мовчки
      correct: false
    explanation: Прочитав означає завершення дії.
- id: act-4
  type: fill-in
  title: Форма за функцією
  instruction: Доповни речення формою з потрібною функцією.
  items:
  - sentence: Ми ____ в кав'ярні й чекали.
    answer: сиділи
    options:
    - сиділи
    - зайшли
  - sentence: Раптом Максим ____ сумку на стіл.
    answer: кинув
    options:
    - кинув
    - кидав
  - sentence: Юлія ____ каву, поки Катерина хвилювалася.
    answer: пила
    options:
    - пила
    - випила
  - sentence: Коли надворі ____ дощ, ми сиділи мовчки.
    answer: йшов
    options:
    - йшов
    - пішов
  - sentence: Раптом двері ____ самі.
    answer: відчинилися
    options:
    - відчинилися
    - відчинялися
  - sentence: Поки Олена ____ листа, Максим дивився у вікно.
    answer: писала
    options:
    - писала
    - написала
  - sentence: Нарешті вона ____ останнє речення.
    answer: написала
    options:
    - написала
    - писала
  - sentence: У кімнаті ____ тиша.
    answer: стояла
    options:
    - стояла
    - постала
- id: act-5
  type: match-up
  title: Ефект і шар
  instruction: Установи відповідність між ефектом і шаром розповіді.
  pairs:
  - left: повільніший темп
    right: більше тла
  - left: чіткіший сюжет
    right: більше переднього плану
  - left: атмосфера
