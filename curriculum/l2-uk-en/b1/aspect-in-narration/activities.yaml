version: '1.0'
module: aspect-in-narration
level: b1
inline:
  - id: act-1
    type: match-up
    title: Тло чи подія
    instruction: Познач функцію дієслова в розповіді.
    pairs:
      - left: Сонце сідало за обрій.
        right: тло
      - left: Раптом задзвонив телефон.
        right: подія
      - left: Ми сиділи на терасі.
        right: тло
      - left: Дощ тихо шумів за вікном.
        right: тло
      - left: Раптом хтось постукав у двері.
        right: подія
      - left: Ми довго чекали на відповідь.
        right: тло
      - left: Нарешті прийшло повідомлення.
        right: подія
      - left: У кімнаті пахло кавою.
        right: тло
  - id: act-2
    type: group-sort
    title: Конектори шарів
    instruction: Розподіли конектори за наративною функцією.
    groups:
      - label: тло
        items:
          - тим часом
          - у цей час
          - поки
          - доки
          - увесь час
          - зазвичай
      - label: передній план
        items:
          - спочатку
          - потім
          - після цього
          - раптом
          - нарешті
          - тоді
  - id: act-3
    type: quiz
    title: Чому доконаний?
    instruction: Вибери найкраще пояснення видової форми.
    items:
      - question: У реченні «Максим зайшов» дієслово доконаного виду, бо...
        options:
          - подія змінює ситуацію
          - опис триває увесь час
          - стан залишається відкритим
        explanation: «Зайшов» закриває один крок сюжету.
        correct: 0
      - question: У реченні «Олена відчинила двері» дієслово доконаного виду, бо...
        options:
          - дія створює новий крок сюжету
          - опис триває без межі
          - це звичка
          - це тло сцени
        explanation: Відчинила — завершена подія.
        correct: 0
      - question: У реченні «Ми сиділи біля вікна» недоконаний вид потрібен, бо...
        options:
          - дія створює тло
          - дія різко змінює сюжет
          - це майбутній результат
          - це наказ
        explanation: Сиділи описує стан сцени.
        correct: 0
      - question: Який маркер вводить передній план?
        options:
          - раптом
          - тим часом
          - увесь вечір
          - поки
        explanation: Раптом сигналізує нову подію.
        correct: 0
      - question: Який маркер підтримує тло?
        options:
          - поки
          - нарешті
          - раптом
          - після цього
        explanation: Поки поєднує дію тла з іншою подією.
        correct: 0
      - question: Чому «задзвонив телефон» часто є подією?
        options:
          - він перериває ситуацію
          - він описує погоду
          - він називає звичку
          - він триває годинами
        explanation: Таке дієслово рухає сюжет.
        correct: 0
      - question: Чому «світало» часто є тлом?
        options:
          - воно описує атмосферу сцени
          - воно завершує конфлікт
          - воно називає один крок
          - воно є наказом
        explanation: Світало створює обстановку.
        correct: 0
      - question: Яке речення найкраще рухає сюжет?
        options:
          - Максим поклав ключі на стіл.
          - За вікном шумів дощ.
          - У кімнаті було тепло.
          - Ми сиділи мовчки.
        explanation: Поклав ключі — завершена дія переднього плану.
        correct: 0
      - question: Яке речення найкраще створює атмосферу?
        options:
          - У коридорі пахло фарбою.
          - Катерина підписала заяву.
          - Телефон задзвонив.
          - Двері відчинилися.
        explanation: Пахло описує стан, а не сюжетний крок.
        correct: 0
      - question: Який варіант показує межу події?
        options:
          - прочитав записку
          - читав записку
          - дивився у вікно
          - чекав мовчки
        explanation: Прочитав означає завершення дії.
        correct: 0
  - id: act-4
    type: fill-in
    title: Форма за функцією
    instruction: Доповни речення формою з потрібною функцією.
    items:
      - sentence: Ми ____ в кав'ярні й чекали.
        answer: сиділи
        options:
          - сиділи
          - зайшли
      - sentence: Раптом Максим ____ сумку на стіл.
        answer: кинув
        options:
          - кинув
          - кидав
      - sentence: Юлія ____ каву, поки Катерина хвилювалася.
        answer: пила
        options:
          - пила
          - випила
      - sentence: Коли надворі ____ дощ, ми сиділи мовчки.
        answer: йшов
        options:
          - йшов
          - пішов
      - sentence: Раптом двері ____ самі.
        answer: відчинилися
        options:
          - відчинилися
          - відчинялися
      - sentence: Поки Олена ____ листа, Максим дивився у вікно.
        answer: писала
        options:
          - писала
          - написала
      - sentence: Нарешті вона ____ останнє речення.
        answer: написала
        options:
          - написала
          - писала
      - sentence: У кімнаті ____ тиша.
        answer: стояла
        options:
          - стояла
          - постала
  - id: act-5
    type: match-up
    title: Ефект і шар
    instruction: Установи відповідність між ефектом і шаром розповіді.
    pairs:
      - left: повільніший темп
        right: більше тла
      - left: чіткіший сюжет
        right: більше переднього плану
      - left: атмосфера
        right: опис і стан
      - left: поворотний момент
        right: доконана подія
      - left: раптовий поворот
        right: раптовий сюжетний злам
      - left: повільний опис
        right: недоконане тло
      - left: паралельна дія
        right: поки + недоконаний вид
      - left: крок сюжету
        right: потім + доконаний вид
workbook:
  - type: match-up
    title: Функція форми
    instruction: Познач дієслова як тло або подію.
    pairs:
      - left: Було тихо.
        right: тло
      - left: Юлія пила каву.
        right: тло
      - left: Максим зайшов.
        right: подія
      - left: Він сказав новину.
        right: подія
      - left: Катерина хвилювалася.
        right: тло
      - left: Марія довго мовчала.
        right: тло
      - left: Марія раптом відповіла.
        right: подія
      - left: У дворі темніло.
        right: атмосферне тло
    id: wb-1
  - type: fill-in
    instruction: Вибери форму за наративною функцією.
    items:
      - sentence: Поки ми ____, сонце сідало.
        answer: чекали
        options:
          - чекали
          - дочекалися
      - sentence: Після цього Андрій ____.
        answer: повернувся
        options:
          - повертався
          - повернувся
      - sentence: Тим часом розмова ____.
        answer: тривала
        options:
          - тривала
          - закінчилася
      - sentence: Нарешті Катерина ____.
        answer: відповіла
        options:
          - відповідала
          - відповіла
      - sentence: Коли ми ____ коридором, світло раптом згасло.
        answer: йшли
        options:
          - йшли
          - пішли
      - sentence: Після паузи Андрій ____ правду.
        answer: сказав
        options:
          - сказав
          - казав
      - sentence: Поки телефон ____, Олена шукала ключі.
        answer: дзвонив
        options:
          - дзвонив
          - задзвонив
      - sentence: Нарешті кур’єр ____ пакет.
        answer: приніс
        options:
          - приніс
          - носив
    title: Вибір форми
    id: wb-2
  - type: group-sort
    instruction: Розподіли дієслова за шаром розповіді.
    groups:
      - label: тло
        items:
          - сиділи
          - пили
          - розмовляли
          - чекали
          - хвилювалася
      - label: передній план
        items:
          - зайшов
          - кинув
          - сказав
          - знайшов
          - повернувся
    title: Дієслова за шаром
    id: wb-3
  - type: error-correction
    instruction: Виправ помилку виду або синтаксису.
    items:
      - sentence: Читавши текст, я виписав цитати.
        error: Читавши текст, я виписав цитати.
        correction: Прочитавши текст, я виписав цитати.
        explanation: Додаткова дія передує головній, тому потрібен доконаний вид.
      - sentence: Прочитавши текст, я виписую цитати (якщо дія паралельна).
        error: Прочитавши текст, я виписую цитати (якщо дія паралельна).
        correction: Читаючи текст, я виписую цитати.
        explanation: Паралельні дії потребують недоконаного дієприслівника.
      - sentence: Прочитавши текст, цитати були виписані.
        error: Прочитавши текст, цитати були виписані.
        correction: Я виписав цитати, прочитавши текст.
        explanation: Додаткова й головна дія мають одного виконавця.
      - sentence: До тексту-опису можна поставити питання «Що сталося?».
        error: До тексту-опису можна поставити питання «Що сталося?».
        correction: До тексту-опису можна поставити загальне питання «Який?».
        explanation: Опис називає ознаки, а не послідовність подій.
      - sentence: Співачка виступила на конкурсі і вона подякувала глядачам.
        error: Співачка виступила на конкурсі і вона подякувала глядачам.
        correction: Виступивши на конкурсі, співачка подякувала глядачам.
        explanation: Перша завершена дія може стати дієприслівниковим зворотом.
      - sentence: Поки ми випили каву, Максим розповідав новину.
        error: випили
        correction: Поки ми пили каву, Максим розповідав новину.
        explanation: Поки потребує процесу тла.
      - sentence: Раптом телефон дзвонив.
        error: дзвонив
        correction: Раптом телефон задзвонив.
        explanation: Раптом уводить початок події.
      - sentence: Вона писала лист і нарешті писала його до кінця.
        error: писала його до кінця
        correction: Вона писала лист і нарешті написала його до кінця.
        explanation: Нарешті й до кінця вимагають результату.
    title: Виправлення виду
    id: wb-4
  - type: match-up
    instruction: Поєднай функцію з видом.
    pairs:
      - left: обстановка
        right: фоновий опис недоконаним видом
      - left: одночасна дія
        right: паралельний процес недоконаним видом
      - left: результат
        right: завершений крок доконаним видом
      - left: послідовний ланцюжок
        right: серія доконаних подій
      - left: поки ми чекали
        right: тло
      - left: раптом він зайшов
        right: подія
      - left: у кімнаті темніло
        right: атмосфера
      - left: після цього ми вийшли
        right: крок сюжету
    title: Функція і вид
    id: wb-5
  - type: cloze
    instruction: Заповни пропуски конекторами.
    text: ____ ми сиділи в кав’ярні. ____ зайшов Максим. ____ він кинув сумку на стіл. ____ Юлія відповідала тихо. ____ Олена писала записку, Максим мовчав. ____ вона поклала записку на стіл. ____ у коридорі було темно. ____ двері відчинилися.
    blanks:
      - id: 1
        answer: У цей час
        options:
          - У цей час
          - Нарешті
      - id: 2
        answer: Раптом
        options:
          - Раптом
          - Зазвичай
      - id: 3
        answer: Після цього
        options:
          - Після цього
          - Поки
      - id: 4
        answer: Тим часом
        options:
          - Тим часом
          - Спочатку
      - id: 5
        answer: Поки
        options:
          - Поки
          - Раптом
          - Нарешті
      - id: 6
        answer: Потім
        options:
          - Потім
          - Увесь час
          - Доки
      - id: 7
        answer: Тим часом
        options:
          - Тим часом
          - Нарешті
          - Раптом
      - id: 8
        answer: Раптом
        options:
          - Раптом
          - Поки
          - Увесь час
    title: Конектори в тексті
    id: wb-6
  - type: order
    instruction: Вибудуй події переднього плану.
    items:
      - Максим зайшов.
      - Він кинув сумку.
      - Він сказав новину.
      - Юлія відповіла.
      - Розмова закінчилася.
      - Олена знайшла записку.
      - Вона прочитала її мовчки.
      - Після цього всі вийшли на двір.
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
    title: Порядок подій
    id: wb-7
  - type: true-false
    instruction: Познач істинність твердження.
    items:
      - statement: Тло часто має недоконаний вид.
        correct: true
      - statement: Раптом часто вводить подію переднього плану.
        correct: true
      - statement: Опис відповідає на питання «що сталося?».
        correct: false
      - statement: Послідовність подій часто має доконаний вид.
        correct: true
      - statement: Недоконаний вид може сповільнювати темп розповіді.
        correct: true
        explanation: Він часто створює тло й тривалість.
      - statement: Доконаний вид ніколи не рухає сюжет.
        correct: false
        explanation: Саме доконані форми часто позначають кроки сюжету.
      - statement: Конектор «поки» часто підтримує паралельну фонову дію.
        correct: true
        explanation: Поки вводить тривалу дію тла.
      - statement: Конектор «раптом» зазвичай не підходить для спокійного тла.
        correct: true
        explanation: Він сигналізує несподівану подію.
    title: Перевір твердження
    id: wb-8
  - type: quiz
    instruction: Вибери найкращий варіант.
    items:
      - question: Яке речення найкраще тримає тло?
        options:
          - Ми сиділи й пили каву.
          - Максим зайшов і сказав.
          - Телефон задзвонив.
        explanation: Недоконані форми створюють тривалий процес.
        correct: 0
      - question: Яке речення найкраще рухає сюжет?
        options:
          - Катерина хвилювалася.
          - Раптом Андрій повернувся.
          - Було тихо.
        explanation: Доконана форма з «раптом» створює поворотний момент.
        correct: 1
      - question: Що краще для тла?
        options:
          - Вітер шумів у деревах.
          - Вітер раптом зламав гілку.
          - Олена підписала лист.
        explanation: Шумів описує атмосферу.
        correct: 0
      - question: Що краще для події?
        options:
          - Олена відчинила вікно.
          - Олена сиділа біля вікна.
          - За вікном темніло.
        explanation: Відчинила — завершений крок.
        correct: 0
      - question: Що краще після «поки»?
        options:
          - ми чекали
          - ми дочекалися
          - ми вийшли
        explanation: Поки потребує тривалої дії.
        correct: 0
      - question: Що краще після «раптом»?
        options:
          - задзвонив телефон
          - телефон дзвонив увесь вечір
          - телефон лежав на столі
        explanation: Раптом уводить подію.
        correct: 0
      - question: Що краще для фінального кроку?
        options:
          - ми зачинили двері
          - ми стояли біля дверей
          - ми чекали біля дверей
        explanation: Зачинили називає завершену дію.
        correct: 0
      - question: Що краще для повільного опису?
        options:
          - сніг падав великими пластівцями
          - сніг упав із даху
          - Марко кинув сумку
        explanation: Падав створює тривале тло.
        correct: 0
      - question: Що краще показує зміну ситуації?
        options:
          - світло згасло
          - світло горіло
          - було світло
        explanation: Згасло змінює стан сцени.
        correct: 0
      - question: Що краще залишає дію відкритою?
        options:
          - Катерина шукала ключі
          - Катерина знайшла ключі
          - Катерина поклала ключі
        explanation: Шукала не гарантує результат.
        correct: 0
    title: Найкращий варіант
    id: wb-9
  - title: Дієприслівникові суфікси
    instruction: Поєднай дієприслівник із суфіксом і видовою функцією.
    type: match-up
    id: wb-10
    pairs:
      - left: Читаючи
        right: '-ючи: суфікс недоконаного дієприслівника'
      - left: Прочитавши
        right: '-вши: суфікс доконаного дієприслівника'
      - left: Повертаючись
        right: '-ючи: суфікс недоконаного дієприслівника'
      - left: Повернувшись
        right: '-вши: суфікс доконаного дієприслівника'
      - left: Слухаючи
        right: '-ючи: суфікс недоконаного дієприслівника'
      - left: Вислухавши
        right: '-вши: суфікс доконаного дієприслівника'
      - left: Працюючи
        right: '-ючи: суфікс недоконаного дієприслівника'
      - left: Попрацювавши
        right: '-вши: суфікс доконаного дієприслівника'
  - type: essay-response
    instruction: Напиши коротку розповідь із двома шарами.
    prompt: 'Напишіть коротку розповідь із двома шарами: тло й передній план. Додайте щонайменше чотири недоконані форми для тла, чотири доконані форми для подій, три конектори та один контраст «поки/раптом».'
    min_words: 120
    model_answer: Ввечері ми сиділи в кав'ярні й тихо розмовляли. Юлія пила каву, а Катерина чекала. Раптом зайшов Максим. Він кинув сумку на стіл і сказав новину. Ми підвелися. Після цього розмова змінилася.
    rubric:
      - criteria: є тло
        description: є тло
      - criteria: є передній план
        description: є передній план
      - criteria: конектори доречні
        description: конектори доречні
