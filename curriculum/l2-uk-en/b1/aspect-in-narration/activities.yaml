    type: суфікс недоконаного дієприслівника
  - word: Повернувшись
    morpheme: -вши
    type: суфікс доконаного дієприслівника
  - word: Слухаючи
    morpheme: -ючи
    type: суфікс недоконаного дієприслівника
  - word: Вислухавши
    morpheme: -вши
    type: суфікс доконаного дієприслівника
  - word: Працюючи
    morpheme: -ючи
    type: суфікс недоконаного дієприслівника
  - word: Попрацювавши
    morpheme: -вши
    type: суфікс доконаного дієприслівника
  title: Дієприслівникові суфікси
- type: essay-response
  instruction: Напиши коротку розповідь із двома шарами.
  prompt: 'Напишіть коротку розповідь із двома шарами: тло й передній план. Додайте щонайменше чотири недоконані форми для тла, чотири доконані форми для подій, три конектори та один контраст «поки/раптом».'
  min_words: 120
  source_reading: Було тихо. Ми сиділи в кав'ярні й пили каву. Раптом зайшов Максим.
  model_answer: Ввечері ми сиділи в кав'ярні й тихо розмовляли. Юлія пила каву, а Катерина чекала. Раптом зайшов Максим. Він кинув сумку на стіл і сказав новину. Ми підвелися. Після цього розмова змінилася.
  rubric:
  - є тло
  - є передній план
  - конектори доречні
  - вид відповідає функції
  - criteria: шари розповіді
    description: Тло й події розрізнені видовими формами.
  - criteria: конектори
    description: Конектори допомагають читачеві стежити за темпом сюжету.
  peer_review_guidelines:
  - Познач дієслова тла.
  - Познач події переднього плану.
  - Поясни один вибір виду.
  title: Коротка розповідь
