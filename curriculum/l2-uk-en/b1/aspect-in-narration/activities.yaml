- id: act-1
  type: grammar-identify
  instruction: Познач функцію дієслова в розповіді.
  items:
  - sentence: Сонце сідало за обрій.
    answer: тло
    explanation: Дія відкрита в часі й створює атмосферу.
  - sentence: Раптом задзвонив телефон.
    answer: подія
    explanation: Дія змінює ситуацію й рухає сюжет.
  - sentence: Ми сиділи на терасі.
    answer: тло
    explanation: Дія триває як обстановка сцени.
  title: Тло чи подія
- id: act-2
  type: group-sort
  title: Конектори шарів
  instruction: Розподіли конектори за наративною функцією.
  groups:
  - label: тло
    items:
    - тим часом
    - у цей час
    - поки
    - доки
    - увесь час
    - зазвичай
  - label: передній план
    items:
    - спочатку
    - потім
    - після цього
    - раптом
    - нарешті
    - тоді
- id: act-3
  type: quiz
  title: Чому доконаний?
  instruction: Вибери найкраще пояснення видової форми.
  items:
  - prompt: У реченні «Максим зайшов» дієслово доконаного виду, бо...
    options:
    - text: подія змінює ситуацію
      correct: true
    - text: опис триває увесь час
      correct: false
    - text: стан залишається відкритим
      correct: false
    explanation: «Зайшов» закриває один крок сюжету.
- id: act-4
  type: fill-in
  title: Форма за функцією
  instruction: Доповни речення формою з потрібною функцією.
  items:
  - sentence: Ми ____ в кав'ярні й чекали.
    answer: сиділи
    options:
    - сиділи
    - зайшли
  - sentence: Раптом Максим ____ сумку на стіл.
    answer: кинув
    options:
    - кинув
    - кидав
  - sentence: Юлія ____ каву, поки Катерина хвилювалася.
    answer: пила
    options:
    - пила
    - випила
- id: act-5
  type: match-up
  title: Ефект і шар
  instruction: Установи відповідність між ефектом і шаром розповіді.
  pairs:
  - left: повільніший темп
    right: більше тла
  - left: чіткіший сюжет
    right: більше переднього плану
  - left: атмосфера
    right: опис і стан
  - left: поворотний момент
    right: доконана подія
- type: grammar-identify
  instruction: Познач дієслова як тло або подію.
  items:
  - sentence: Було тихо.
    answer: тло
  - sentence: Юлія пила каву.
    answer: тло
  - sentence: Максим зайшов.
    answer: подія
  - sentence: Він сказав новину.
    answer: подія
  - sentence: Катерина хвилювалася.
    answer: тло
  title: Функція форми
- type: fill-in
  instruction: Вибери форму за наративною функцією.
  items:
  - sentence: Поки ми ____, сонце сідало.
    answer: чекали
    options:
    - чекали
    - дочекалися
  - sentence: Після цього Андрій ____.
    answer: повернувся
    options:
    - повертався
    - повернувся
  - sentence: Тим часом розмова ____.
    answer: тривала
    options:
    - тривала
    - закінчилася
  - sentence: Нарешті Катерина ____.
    answer: відповіла
    options:
    - відповідала
    - відповіла
  title: Вибір форми
- type: group-sort
  instruction: Розподіли дієслова за шаром розповіді.
  groups:
  - label: тло
    items:
    - сиділи
    - пили
    - розмовляли
    - чекали
    - хвилювалася
  - label: передній план
    items:
    - зайшов
    - кинув
    - сказав
    - знайшов
    - повернувся
  title: Дієслова за шаром
- type: error-correction
  instruction: Виправ помилку виду або синтаксису.
  items:
  - sentence: Читавши текст, я виписав цитати.
    error: Читавши текст, я виписав цитати.
    correction: Прочитавши текст, я виписав цитати.
    explanation: Додаткова дія передує головній, тому потрібен доконаний вид.
  - sentence: Прочитавши текст, я виписую цитати (якщо дія паралельна).
    error: Прочитавши текст, я виписую цитати (якщо дія паралельна).
    correction: Читаючи текст, я виписую цитати.
    explanation: Паралельні дії потребують недоконаного дієприслівника.
  - sentence: Прочитавши текст, цитати були виписані.
    error: Прочитавши текст, цитати були виписані.
    correction: Я виписав цитати, прочитавши текст.
    explanation: Додаткова й головна дія мають одного виконавця.
  - sentence: До тексту-опису можна поставити питання «Що сталося?».
    error: До тексту-опису можна поставити питання «Що сталося?».
    correction: До тексту-опису можна поставити загальне питання «Який?».
    explanation: Опис називає ознаки, а не послідовність подій.
  - sentence: Співачка виступила на конкурсі і вона подякувала глядачам.
    error: Співачка виступила на конкурсі і вона подякувала глядачам.
    correction: Виступивши на конкурсі, співачка подякувала глядачам.
    explanation: Перша завершена дія може стати дієприслівниковим зворотом.
  title: Виправлення виду
- type: match-up
  instruction: Поєднай функцію з видом.
  pairs:
  - left: обстановка
    right: недоконаний вид
  - left: одночасна дія
    right: недоконаний вид
  - left: результат
    right: доконаний вид
  - left: послідовний ланцюжок
    right: доконаний вид
  title: Функція і вид
- type: cloze
  instruction: Заповни пропуски конекторами.
  text: ____ ми сиділи в кав'ярні. ____ зайшов Максим. ____ він кинув сумку на стіл.
    ____ Юлія відповідала тихо.
  passage: ____ ми сиділи в кав'ярні. ____ зайшов Максим. ____ він кинув сумку на
    стіл. ____ Юлія відповідала тихо.
  blanks:
  - answer: У цей час
    options:
    - У цей час
    - Нарешті
  - answer: Раптом
    options:
    - Раптом
    - Зазвичай
  - answer: Після цього
    options:
    - Після цього
    - Поки
  - answer: Тим часом
    options:
    - Тим часом
    - Спочатку
  title: Конектори в тексті
- type: order
  instruction: Вибудуй події переднього плану.
  items:
  - Максим зайшов.
  - Він кинув сумку.
  - Він сказав новину.
  - Юлія відповіла.
  - Розмова закінчилася.
  correct_order:
  - Максим зайшов.
  - Він кинув сумку.
  - Він сказав новину.
  - Юлія відповіла.
  - Розмова закінчилася.
  title: Порядок подій
- type: true-false
  instruction: Познач істинність твердження.
  items:
  - statement: Тло часто має недоконаний вид.
    answer: true
  - statement: Раптом часто вводить подію переднього плану.
    answer: true
  - statement: Опис відповідає на питання «що сталося?».
    answer: false
  - statement: Послідовність подій часто має доконаний вид.
    answer: true
  title: Перевір твердження
- type: quiz
  instruction: Вибери найкращий варіант.
  items:
  - prompt: Яке речення найкраще тримає тло?
    options:
    - text: Ми сиділи й пили каву.
      correct: true
    - text: Максим зайшов і сказав.
      correct: false
    - text: Телефон задзвонив.
      correct: false
    explanation: Недоконані форми створюють тривалий процес.
  - prompt: Яке речення найкраще рухає сюжет?
    options:
    - text: Катерина хвилювалася.
      correct: false
    - text: Раптом Андрій повернувся.
      correct: true
    - text: Було тихо.
      correct: false
    explanation: Доконана форма з «раптом» створює поворотний момент.
  title: Найкращий варіант
- type: highlight-morphemes
  instruction: Підкресли дієприслівникові суфікси.
  text: Читаючи текст, я виписую цитати. Прочитавши текст, я виписав цитати.
  items:
  - word: Читаючи
    morpheme: -ючи
  - word: Прочитавши
    morpheme: -вши
  title: Дієприслівникові суфікси
- type: essay-response
  instruction: Напиши коротку розповідь із двома шарами.
  prompt: Напиши 8-10 речень про несподівану подію ввечері. Використай тло й передній
    план.
  min_words: 120
  source_reading: Було тихо. Ми сиділи в кав'ярні й пили каву. Раптом зайшов Максим.
  model_answer: Ввечері ми сиділи в кав'ярні й тихо розмовляли. Юлія пила каву, а
    Катерина чекала. Раптом зайшов Максим. Він кинув сумку на стіл і сказав новину.
    Ми підвелися. Після цього розмова змінилася.
  rubric:
  - є тло
  - є передній план
  - конектори доречні
  - вид відповідає функції
  peer_review_guidelines:
  - Познач дієслова тла.
  - Познач події переднього плану.
  - Поясни один вибір виду.
  title: Коротка розповідь
