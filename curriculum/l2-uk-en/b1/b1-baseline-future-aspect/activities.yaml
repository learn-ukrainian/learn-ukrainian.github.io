version: '1.0'
module: b1-baseline-future-aspect
level: b1
inline:
  - id: act-1
    type: quiz
    title: Вид і значення
    instruction: Оберіть відповідь, яка найточніше пояснює форму.
    items:
      - question: Що найточніше передає форма «напишу»?
        options:
          - майбутній результат доконаного виду
          - теперішній процес недоконаного виду
          - минулий результат доконаного виду
          - наказ або прохання
        correct: 0
        explanation: «Напишу» має доконаний вид і називає результат у майбутньому.
      - question: Що найточніше передає форма «писатиму»?
        options:
          - майбутній процес недоконаного виду
          - майбутній результат доконаного виду
          - минулий процес
          - теперішній стан
        correct: 0
        explanation: «Писатиму» є складною формою майбутнього часу недоконаного виду.
      - question: Чому «прочитаю» не є теперішнім часом?
        options:
          - бо доконаний вид не має справжнього теперішнього часу
          - бо форма має суфікс минулого часу
          - бо це складена форма з «бути»
          - бо це наказовий спосіб
        correct: 0
        explanation: Дієслово доконаного виду з такими закінченнями називає майбутній результат.
      - question: Яка пара найкраще показує процес і результат?
        options:
          - читатиму / прочитаю
          - читаю / читала
          - прочитав / прочитала
          - буде / були
        correct: 0
        explanation: «Читатиму» передає майбутній процес, а «прочитаю» — майбутній результат.
      - question: Що передає форма «підготую»?
        options:
          - майбутній результат доконаного виду
          - майбутній процес недоконаного виду
          - теперішній стан
          - минулий процес
        correct: 0
        explanation: Підготую називає завершений результат у майбутньому.
      - question: Що передає форма «готуватиму»?
        options:
          - майбутній процес недоконаного виду
          - завершений результат
          - минулий факт
          - наказ
        correct: 0
        explanation: Готуватиму підкреслює перебіг дії.
      - question: Яка форма природна з маркером «до п’ятниці»?
        options:
          - завершимо
          - завершуватимемо
          - будемо завершити
          - завершували
        correct: 0
        explanation: До п’ятниці задає межу й очікуваний результат.
      - question: Яка форма природна з маркером «увесь день»?
        options:
          - працюватимемо
          - попрацюємо
          - зробимо
          - відповімо
        correct: 0
        explanation: Увесь день підкреслює тривалий процес.
  - id: act-2
    type: match-up
    title: Видові пари
    instruction: З'єднайте дієслово недоконаного виду з доконаним відповідником.
    pairs:
      - left: писати
        right: написати
      - left: читати
        right: прочитати
      - left: робити
        right: зробити
      - left: малювати
        right: намалювати
      - left: говорити
        right: сказати
      - left: брати
        right: взяти
      - left: домовлятися
        right: домовитися
      - left: збирати
        right: зібрати
      - left: готувати
        right: підготувати
      - left: перевіряти
        right: перевірити
      - left: надсилати
        right: надіслати
      - left: відкривати
        right: відкрити
  - id: act-3
    type: fill-in
    title: Проста форма майбутнього часу
    instruction: Вставте доконану форму майбутнього часу.
    items:
      - sentence: До вечора я ___ короткий лист.
        answer: напишу
        options:
          - напишу
          - писатиму
          - буду писати
          - писав
        explanation: «До вечора» вимагає результату, тому потрібна проста форма доконаного виду.
      - sentence: Після лекції ми ___ план концерту.
        answer: обговоримо
        options:
          - обговоримо
          - обговорюватимемо
          - будемо обговорювати
          - обговорювали
        explanation: План буде доведений до результату після лекції.
      - sentence: Волонтери ___ потрібну суму до п'ятниці.
        answer: зберуть
        options:
          - зберуть
          - збиратимуть
          - будуть збирати
          - збирали
        explanation: «До п'ятниці» задає межу й результат.
      - sentence: Завтра Олена ___ афішу в університетську групу.
        answer: поширить
        options:
          - поширить
          - поширюватиме
          - буде поширювати
          - поширювала
        explanation: Йдеться про завершений крок у плані.
      - sentence: Після зустрічі я ___ тобі всі деталі.
        answer: поясню
        options:
          - поясню
          - пояснюватиму
          - буду пояснювати
          - пояснював
        explanation: Результат пояснення відбудеться після зустрічі.
      - sentence: Після наради я ___ протокол.
        answer: надішлю
        options:
          - надішлю
          - надсилатиму
          - буду надсилати
          - надсилав
        explanation: Потрібен майбутній результат.
      - sentence: До ранку команда ___ нову версію.
        answer: підготує
        options:
          - підготує
          - готуватиме
          - буде готувати
          - готувала
        explanation: До ранку означає готовий результат.
      - sentence: Після дзвінка ми ___ деталі.
        answer: уточнимо
        options:
          - уточнимо
          - уточнюватимемо
          - будемо уточнювати
          - уточнювали
        explanation: Після дзвінка очікується завершена дія.
  - id: act-4
    type: group-sort
    title: Три форми майбутнього часу
    instruction: Розподіліть форми за групами.
    groups:
      - label: проста форма доконаного виду
        items:
          - напишу
          - зробимо
          - прочитаєш
          - оголосять
          - домовимося
      - label: складна форма недоконаного виду
        items:
          - писатиму
          - працюватимемо
          - збиратимуть
          - говоритимеш
          - перевірятиме
      - label: складена форма недоконаного виду
        items:
          - буду писати
          - будемо працювати
          - будуть збирати
          - будеш говорити
          - буде перевіряти
  - id: act-5
    type: error-correction
    title: Редагування майбутнього часу
    instruction: Знайдіть помилку й виправте речення.
    items:
      - sentence: Я буду прочитати цю книгу завтра.
        error: Я буду прочитати цю книгу завтра.
        correction: Я прочитаю цю книгу завтра.
        explanation: Доконаний інфінітив не стоїть після «буду»; потрібна проста форма доконаного виду.
      - sentence: Вона робитиму домашнє завдання.
        error: Вона робитиму домашнє завдання.
        correction: Вона робитиме домашнє завдання.
        explanation: Підмет «вона» вимагає форми третьої особи однини.
      - sentence: Ми будемо ідемо в кіно.
        error: Ми будемо ідемо в кіно.
        correction: Ми будемо йти в кіно. (або Ми підемо в кіно.)
        explanation: У складеній формі після «будемо» потрібен інфінітив.
      - sentence: Якщо я буду мати час, я буду допомогти тобі.
        error: Якщо я буду мати час, я буду допомогти тобі.
        correction: Якщо я матиму час, я допоможу тобі.
        explanation: «Мати час» може бути процесом, але «допомогти» тут результативна дія.
      - sentence: Завтра я буду їхати до моря. (коли йдеться про твердий план)
        error: Завтра я буду їхати до моря. (коли йдеться про твердий план)
        correction: Завтра їду до моря.
        explanation: Коли план твердий, українська може природно використати теперішній час із майбутнім значенням.
      - sentence: Комітет буде здійснювати підготовку зали.
        error: буде здійснювати підготовку
        correction: готуватиме залу
        explanation: Іменникову кальку краще замінити дієслівною українською конструкцією.
      - sentence: Завтра я буду написати звіт.
        error: буду написати
        correction: Завтра я напишу звіт.
        explanation: З доконаним видом уживаємо просту форму майбутнього часу.
      - sentence: До вечора ми будемо завершити презентацію.
        error: будемо завершити
        correction: До вечора ми завершимо презентацію.
        explanation: Межа до вечора вимагає доконаного результату.
workbook:
  - id: wb-1
    type: fill-in
    title: План концерту
    instruction: Заповніть пропуски формами майбутнього часу.
    items:
      - sentence: У понеділок команда ____ дату концерту.
        answer: оголосить
        options:
          - оголосить
          - оголошуватиме
          - буде оголосити
        explanation: Дата має бути названа як результат, тому потрібен доконаний вид.
      - sentence: Протягом тижня волонтери ____ заявки.
        answer: збиратимуть
        options:
          - збиратимуть
          - зберуть
          - зібрали
        explanation: Маркер «протягом тижня» підтримує процес.
      - sentence: До п'ятниці Марко ____ афішу.
        answer: напише
        options:
          - напише
          - писатиме
          - буде написати
        explanation: «До п'ятниці» задає межу й результат.
      - sentence: Олена ____ список гостей цілий вечір.
        answer: буде перевіряти
        options:
          - буде перевіряти
          - перевірить
          - перевірила
        explanation: «Цілий вечір» показує тривалий процес.
      - sentence: Після концерту ми ____ кошти.
        answer: підрахуємо
        options:
          - підрахуємо
          - підраховуватимемо
          - будемо підрахувати
        explanation: Тут ідеться про підсумок після події.
      - sentence: Після репетиції ми ___ афішу.
        answer: перевіримо
        options:
          - перевіримо
          - перевірятимемо
          - будемо перевіряти
      - sentence: Упродовж вечора волонтери ___ гостей.
        answer: зустрічатимуть
        options:
          - зустрічатимуть
          - зустрінуть
          - зустріли
      - sentence: До початку концерту технік ___ мікрофони.
        answer: налаштує
        options:
          - налаштує
          - налаштовуватиме
          - налаштовував
  - id: wb-2
    type: true-false
    title: Самоперевірка
    instruction: Позначте правильність твердження.
    items:
      - statement: Дієслова доконаного виду мають просту форму майбутнього часу.
        correct: true
        explanation: Наприклад, «написати» дає форму «напишу».
      - statement: Складна форма майбутнього часу утворюється від дієслів недоконаного виду.
        correct: true
        explanation: Наприклад, «писати» дає форму «писатиму».
      - statement: Після «буду» може стояти доконаний інфінітив.
        correct: false
        explanation: Нормативно «прочитаю», а не «буду прочитати».
      - statement: У складеній формі змінюється тільки допоміжне дієслово «бути».
        correct: true
        explanation: «Буду писати», «будеш писати», «будуть писати» змінюють «бути».
      - statement: «Я пишу» і «я напишу» мають однаковий час.
        correct: false
        explanation: «Пишу» є теперішнім процесом, а «напишу» — майбутнім результатом.
      - statement: Форма читатиму передає майбутній процес.
        correct: true
        explanation: Складна форма недоконаного виду підкреслює перебіг.
      - statement: Форма напишу потребує допоміжного слова буду.
        correct: false
        explanation: Доконаний вид має просту форму майбутнього часу.
      - statement: Маркер «до вечора» часто вимагає доконаного виду.
        correct: true
        explanation: Він задає межу й результат.
  - id: wb-3
    type: quiz
    title: Процес чи результат
    instruction: Оберіть речення, де форма відповідає значенню.
    items:
      - question: Де дія подана як процес?
        options:
          - Цілий день я писатиму звіт.
          - До вечора я напишу звіт.
          - Волонтери зберуть кошти до п'ятниці.
          - Я надішлю програму ввечері.
        correct: 0
        explanation: «Цілий день» підкреслює процес, тому природна форма «писатиму».
      - question: Де дія подана як результат?
        options:
          - Команда працюватиме зранку.
          - Олена буде відповідати на запитання.
          - Ми оголосимо дату завтра.
          - Студенти зустрічатимуть гостей біля входу.
        correct: 2
        explanation: «Оголосимо» називає завершений майбутній крок.
      - question: Що краще з «протягом години»?
        options:
          - працюватиму
          - попрацюю
          - зроблю
          - надішлю
        correct: 0
        explanation: Протягом години підкреслює тривалість.
      - question: Що краще з «до дев’ятої»?
        options:
          - закінчу
          - закінчуватиму
          - буду закінчувати
          - закінчував
        correct: 0
        explanation: До дев’ятої задає межу результату.
      - question: Яка форма є складною формою майбутнього часу?
        options:
          - читатиму
          - буду читати
          - прочитаю
          - читав
        correct: 0
        explanation: Складна форма має суфікс -тиму/-меш/-ме.
      - question: Яка форма є складеною формою майбутнього часу?
        options:
          - буду читати
          - прочитаю
          - читав
          - читаю
        correct: 0
        explanation: Складена форма має допоміжне бути й інфінітив.
      - question: Яка форма неможлива?
        options:
          - буду напишу
          - писатиму
          - напишу
          - буду писати
        correct: 0
        explanation: Буду не поєднується з особовою формою доконаного виду.
      - question: Який варіант показує результат?
        options:
          - зроблю
          - робитиму
          - буду робити
          - робив
        correct: 0
        explanation: Зроблю — доконаний вид у майбутньому.
  - id: wb-4
    type: match-up
    title: Маркер часу і форма
    instruction: З'єднайте маркер часу з природною формою дієслова.
    pairs:
      - left: до вечора
        right: підготуємо залу
      - left: протягом місяця
        right: збиратимуть кошти
      - left: завтра о шостій
        right: оголосимо дату
      - left: щоп'ятниці
        right: надсилатиму нагадування
      - left: після зустрічі
        right: надішлемо план
      - left: цілий день
        right: будемо перевіряти список
      - left: протягом ранку
        right: писатиму
      - left: до ранку
        right: напишу
      - left: увесь тиждень
        right: працюватимемо
      - left: після обговорення
        right: вирішимо
      - left: з другої до четвертої
        right: обговорюватимемо
      - left: до кінця дня
        right: надішлемо
  - id: wb-5
    type: mark-the-words
    title: Форми на -тиму
    instruction: Позначте складні форми майбутнього часу.
    criteria: складна форма майбутнього часу недоконаного виду
    text: Завтра ми **працюватимемо** в аудиторії, **перевірятимемо** звук і **зустрічатимемо** гостей. Після обіду волонтери **рахуватимуть** місця, технік **налаштовуватиме** мікрофони, а я **записуватиму** короткі оголошення. Увечері ми ще **обговорюватимемо** звіт і **плануватимемо** наступну подію.
    target_words:
      - працюватимемо
      - перевірятимемо
      - зустрічатимемо
      - рахуватимуть
      - налаштовуватиме
      - записуватиму
      - обговорюватимемо
      - плануватимемо
  - id: wb-6
    type: match-up
    title: Терміни
    instruction: З'єднайте термін із поясненням.
    pairs:
      - left: доконаний вид
        right: дія подана як завершена або результативна
      - left: недоконаний вид
        right: дія подана як процес, повторення або відкрита дія
      - left: проста форма
        right: майбутній час доконаного виду одним словом
      - left: складна форма
        right: недоконаний майбутній на -тиму
      - left: складена форма
        right: бути в майбутньому часі плюс інфінітив
      - left: видова пара
        right: два дієслова з близьким значенням і різним видом
      - left: простий доконаний майбутній
        right: доконаний вид без буду
      - left: складена майбутня форма
        right: буду + інфінітив
      - left: складна майбутня форма
        right: основа + -тиму
      - left: межа в часі
        right: сигнал результату
      - left: тривалість
        right: сигнал процесу
      - left: пара недоконаний — доконаний
        right: процес і результат
  - id: wb-7
    type: essay-response
    title: Мій реальний план
    instruction: Напишіть зв'язний план на наступний тиждень.
    prompt: Опишіть реальний план на завтра або на вихідні. Дайте щонайменше три процеси, три результати, два часові маркери межі й два маркери тривалості. Не змішуйте «буду» з доконаною особовою формою.
    min_words: 110
    model_answer: Наступного тижня я підготую план навчання й напишу короткий лист викладачці. У понеділок працюватиму з конспектом, у вівторок повторюватиму видові пари, а в середу буду читати український текст і виписувати приклади. До п'ятниці я перевірю слабкі місця й домовлюся про консультацію. У цьому плані «підготую», «напишу», «перевірю» й «домовлюся» показують результат, а «працюватиму», «повторюватиму» й «буду читати» показують процес.
    rubric:
      - criteria: вид
        description: Форми доконаного й недоконаного виду відповідають змісту.
      - criteria: майбутній час
        description: Є всі три форми майбутнього часу.
      - criteria: зв'язність
        description: План читається як природний текст, а не як список ізольованих форм.
      - criteria: видова логіка
        description: Процеси й результати розподілені за змістом плану.
      - criteria: часові маркери
        description: Межі й тривалість підтримують вибір форми.
