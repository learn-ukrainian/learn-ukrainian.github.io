  - id: wb-10
    type: order
    title: Дерево вибору
    instruction: Упорядкуйте кроки вибору форми майбутнього часу.
    items:
      - Визначити, чи дія подана як процес, повторення або відкрита дія.
      - Якщо це процес, вибрати недоконаний вид.
      - Вирішити між складною формою на -тиму і складеною формою з «бути».
      - Якщо дія подана як результат, вибрати доконаний вид.
      - Утворити просту форму майбутнього часу від доконаного дієслова.
      - Обери доконаний вид для межі.
      - Обери недоконаний вид для тривалості.
      - Перевір, чи не з’явилося зайве «буду».
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
