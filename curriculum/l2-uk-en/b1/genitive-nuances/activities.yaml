version: '1.0'
module: genitive-nuances
level: b1
inline:
  - id: act-1
    type: quiz
    title: Що запускає родовий?
    instruction: "Оберіть причину родового відмінка в прикладі."
    items:
      - question: "У фразі склянка води родовий з'являється, бо:"
        options:
          - "склянка називає міру, а води - те, чого є частина"
          - "вода завжди стоїть у родовому"
          - "після всіх назв посуду потрібний орудний"
        correct: 0
        explanation: "Міра або місткість відкриває частковий родовий: склянка чого? води."
      - question: "У реченні Сьогодні немає часу родовий потрібний, бо:"
        options:
          - "немає вимагає родового відмінка"
          - "час є підметом у називному"
          - "сьогодні завжди керує родовим"
        correct: 0
        explanation: "Немає / нема системно вимагає родового: немає чого? часу."
      - question: "У фразі досягти мети родовий з'являється, бо:"
        options:
          - "дієслово досягти керує родовим"
          - "мета є назвою місця"
          - "усі дієслова руху керують родовим"
        correct: 0
        explanation: "Досягти чого? мети - стала модель керування."
      - question: "У фразі другого лютого родовий потрібний, бо:"
        options:
          - "це дата події, відповідь на коли?"
          - "лютий завжди має тільки родовий"
          - "порядкові числівники не відмінюються"
        correct: 0
        explanation: "Дата події оформлюється родовим: коли? другого лютого."
      - question: "У фразі біля університету родовий з'являється, бо:"
        options:
          - "прийменник біля керує родовим"
          - "університет є підметом"
          - "біля є прислівником без керування"
        correct: 0
        explanation: "Коли після біля є іменник, це прийменник із родовим."
      - question: "У фразі багато людей форма людей показує:"
        options:
          - "родовий множини після кількісного слова"
          - "називний множини після підмета"
          - "місцевий відмінок після багато"
        correct: 0
        explanation: "Багато кого? людей - кількісне слово вимагає родового."
      - question: "У реченні Проєкт потребує допомоги родовий з'являється, бо:"
        options:
          - "потребувати керує родовим"
          - "допомога є назвою дії в майбутньому"
          - "після всіх іншомовних слів потрібний родовий"
        correct: 0
        explanation: "Потребувати чого? допомоги."
      - question: "У фразі внаслідок дощу родовий потрібний, бо:"
        options:
          - "внаслідок є прийменником із родовим"
          - "дощ завжди має тільки одну форму"
          - "це приклад давального відмінка"
        correct: 0
        explanation: "Внаслідок чого? дощу."
      - question: "У фразі шматок хліба родовий показує:"
        options:
          - "частину від цілого"
          - "місце предмета"
          - "адресата дії"
        correct: 0
        explanation: "Шматок чого? хліба - часткове значення."
      - question: "У реченні Він набув досвіду родовий з'являється, бо:"
        options:
          - "набути керує родовим"
          - "досвід є прямим додатком у знахідному"
          - "після минулого часу завжди родовий"
        correct: 0
        explanation: "Набути чого? досвіду."
      - question: "У фразі цього тижня родовий потрібний, бо:"
        options:
          - "це часовий вираз із займенником цей"
          - "цей завжди вимагає називного"
          - "тиждень є назвою істоти"
        correct: 0
        explanation: "Цього тижня відповідає на коли? і має родовий."
      - question: "У фразі з-під столу родовий з'являється, бо:"
        options:
          - "складний прийменник з-під керує родовим"
          - "під завжди вимагає знахідного"
          - "стіл є назвою часу"
        correct: 0
        explanation: "З-під чого? столу."
  - id: act-2
    type: fill-in
    title: Частина, міра, кількість
    instruction: "Вставте форму родового відмінка."
    items:
      - sentence: "Дайте, будь ласка, склянку ____."
        answer: "соку"
        options:
          - "соку"
          - "сік"
          - "соком"
        explanation: "Склянка чого? соку."
      - sentence: "Ми купили шматок ____."
        answer: "хліба"
        options:
          - "хліба"
          - "хліб"
          - "хлібом"
        explanation: "Шматок чого? хліба."
      - sentence: "Для пирога потрібно кілограм ____."
        answer: "яблук"
        options:
          - "яблук"
          - "яблука"
          - "яблуками"
        explanation: "Кілограм чого? яблук."
      - sentence: "На підготовку залишилося мало ____."
        answer: "часу"
        options:
          - "часу"
          - "час"
          - "часом"
        explanation: "Мало чого? часу."
      - sentence: "У касі було багато ____."
        answer: "грошей"
        options:
          - "грошей"
          - "гроші"
          - "грошима"
        explanation: "Багато чого? грошей."
      - sentence: "Додайте трохи ____ до тіста."
        answer: "молока"
        options:
          - "молока"
          - "молоко"
          - "молоком"
        explanation: "Трохи чого? молока."
      - sentence: "У чай покладіть ложку ____."
        answer: "цукру"
        options:
          - "цукру"
          - "цукор"
          - "цукром"
        explanation: "Ложку чого? цукру."
      - sentence: "У супі забагато ____."
        answer: "солі"
        options:
          - "солі"
          - "сіль"
          - "сіллю"
        explanation: "Забагато чого? солі."
      - sentence: "Після обіду я випив чашку ____."
        answer: "кави"
        options:
          - "кави"
          - "каву"
          - "кавою"
        explanation: "Чашку чого? кави."
      - sentence: "На столі стояла тарілка ____."
        answer: "борщу"
        options:
          - "борщу"
          - "борщ"
          - "борщем"
        explanation: "Тарілка чого? борщу."
      - sentence: "Для рецепта треба літр ____."
        answer: "кефіру"
        options:
          - "кефіру"
          - "кефір"
          - "кефіром"
        explanation: "Літр чого? кефіру."
      - sentence: "У залі достатньо ____ для всіх."
        answer: "місць"
        options:
          - "місць"
          - "місця"
          - "місцями"
        explanation: "Достатньо чого? місць."
  - id: act-3
    type: match-up
    title: Слова, що керують родовим
    instruction: "Поєднайте початок із природним родовим додатком."
    pairs:
      - left: "бажати"
        right: "успіху"
      - left: "потребувати"
        right: "допомоги"
      - left: "досягти"
        right: "мети"
      - left: "позбутися"
        right: "страху"
      - left: "набути"
        right: "досвіду"
      - left: "шукати абстрактної"
        right: "правди"
      - left: "шукати конкретні"
        right: "ключі"
      - left: "вартий"
        right: "уваги"
      - left: "гідний"
        right: "поваги"
      - left: "повний"
        right: "світла"
      - left: "позбавлений"
        right: "сенсу"
      - left: "не отримати"
        right: "дозволу"
  - id: act-4
    type: fill-in
    title: Заперечення і час
    instruction: "Вставте форму, яка природно завершує речення."
    items:
      - sentence: "Сьогодні немає ____ для довгої розмови."
        answer: "часу"
        options:
          - "часу"
          - "час"
          - "часом"
        explanation: "Немає чого? часу."
      - sentence: "У пляшці не було ____."
        answer: "води"
        options:
          - "води"
          - "вода"
          - "водою"
        explanation: "Не було чого? води."
      - sentence: "Завтра не буде вільних ____."
        answer: "місць"
        options:
          - "місць"
          - "місця"
          - "місцями"
        explanation: "Не буде чого? місць."
      - sentence: "Учора не було сильного ____."
        answer: "дощу"
        options:
          - "дощу"
          - "дощ"
          - "дощем"
        explanation: "Не було чого? дощу."
      - sentence: "Команда не знайшла правильної ____."
        answer: "відповіді"
        options:
          - "відповіді"
          - "відповідь"
          - "відповіддю"
        explanation: "Після заперечного дієслова з абстрактним результатом природний родовий."
      - sentence: "Ми не отримали офіційного ____."
        answer: "дозволу"
        options:
          - "дозволу"
          - "дозвіл"
          - "дозволом"
        explanation: "Не отримали чого? дозволу."
      - sentence: "Вона не мала ____ пояснювати все вдруге."
        answer: "змоги"
        options:
          - "змоги"
          - "змогу"
          - "змогою"
        explanation: "Не мала чого? змоги."
      - sentence: "Зустріч відбулася ____."
        answer: "другого лютого"
        options:
          - "другого лютого"
          - "друге лютого"
          - "другим лютим"
        explanation: "Дата події відповідає на коли? і має родовий."
      - sentence: "Ми переїхали ____."
        answer: "минулого року"
        options:
          - "минулого року"
          - "минулий рік"
          - "минулим роком"
        explanation: "Минулого року - часовий родовий."
      - sentence: "____ ми повторюємо відмінки."
        answer: "Цього тижня"
        options:
          - "Цього тижня"
          - "Цей тиждень"
          - "Цим тижнем"
        explanation: "Цього тижня відповідає на коли?"
      - sentence: "Контрольна робота буде ____."
        answer: "наступного місяця"
        options:
          - "наступного місяця"
          - "наступний місяць"
          - "наступним місяцем"
        explanation: "Наступного місяця - часовий родовий."
      - sentence: "Рішення ухвалили ____."
        answer: "того дня"
        options:
          - "того дня"
          - "той день"
          - "тим днем"
        explanation: "Того дня - родовий часовий вираз."
  - id: act-5
    type: group-sort
    title: Знайдіть тип родового
    instruction: "Розподіліть приклади за причиною родового відмінка."
    groups:
      - label: "Частина або кількість"
        items:
          - "трохи солі"
          - "склянка соку"
          - "багато людей"
      - label: "Керування слова"
        items:
          - "потребувати допомоги"
          - "досягти мети"
          - "вартий уваги"
      - label: "Заперечення або час"
        items:
          - "немає часу"
          - "не було світла"
          - "минулого року"
      - label: "Прийменник із родовим"
        items:
          - "замість кави"
          - "з-під столу"
          - "щодо питання"
workbook:
  - id: wb-1
    type: quiz
    title: Закінчення -а/-я чи -у/-ю
    instruction: "Оберіть форму родового однини чоловічого роду."
    items:
      - question: "Немає ____ на столі."
        options:
          - "олівця"
          - "олівцю"
          - "олівець"
        correct: 0
        explanation: "Олівець - конкретний предмет, тому олівця."
      - question: "У нас мало ____ перед іспитом."
        options:
          - "часу"
          - "часа"
          - "часом"
        correct: 0
        explanation: "Час - абстрактне поняття, тому часу."
      - question: "Після ____ дорога була мокра."
        options:
          - "дощу"
          - "доща"
          - "дощем"
        correct: 0
        explanation: "Дощ - явище природи, тому дощу."
      - question: "Біля ____ відкрили нову станцію."
        options:
          - "Києва"
          - "Києву"
          - "Київ"
        correct: 0
        explanation: "Назви міст зазвичай мають -а/-я: Києва."
      - question: "Він повернувся з ____."
        options:
          - "Донбасу"
          - "Донбаса"
          - "Донбасом"
        correct: 0
        explanation: "Донбас - регіон, тому Донбасу."
      - question: "На столі не було ____."
        options:
          - "ножа"
          - "ножу"
          - "ніж"
        correct: 0
        explanation: "Ніж - конкретний предмет, тому ножа."
      - question: "У рецепті забагато ____."
        options:
          - "цукру"
          - "цукра"
          - "цукром"
        correct: 0
        explanation: "Цукор як речовина має форму цукру."
      - question: "Ми чекали початку ____."
        options:
          - "уроку"
          - "урока"
          - "уроком"
        correct: 0
        explanation: "Урок у часово-подієвому значенні має форму уроку."
      - question: "У музеї не було цього ____."
        options:
          - "екрана"
          - "екрану"
          - "екраном"
        correct: 0
        explanation: "Екран як конкретний предмет має форму екрана."
      - question: "Поблизу ____ зібралися студенти."
        options:
          - "університету"
          - "університета"
          - "університетом"
        correct: 0
        explanation: "Установа має родовий університету."
      - question: "Не вистачає ____ для рішення."
        options:
          - "розуму"
          - "розума"
          - "розумом"
        correct: 0
        explanation: "Абстрактна якість має форму розуму."
      - question: "Ми підійшли до ____."
        options:
          - "стола"
          - "столу"
          - "столом"
        correct: 0
        explanation: "Стіл як конкретний предмет у навчальній нормі має стола."
  - id: wb-2
    type: fill-in
    title: Прийменник плюс форма
    instruction: "Вставте правильну форму після прийменника."
    items:
      - sentence: "Замість ____ я замовив чай."
        answer: "кави"
        options:
          - "кави"
          - "каву"
          - "кавою"
        explanation: "Замість чого? кави."
      - sentence: "Крім ____ ніхто не знав адреси."
        answer: "мене"
        options:
          - "мене"
          - "я"
          - "мною"
        explanation: "Крім кого? мене."
      - sentence: "Навколо ____ було тихо."
        answer: "будинку"
        options:
          - "будинку"
          - "будинок"
          - "будинком"
        explanation: "Навколо чого? будинку."
      - sentence: "Серед ____ було багато новачків."
        answer: "студентів"
        options:
          - "студентів"
          - "студенти"
          - "студентами"
        explanation: "Серед кого? студентів."
      - sentence: "Щодо ____ потрібна окрема відповідь."
        answer: "питання"
        options:
          - "питання"
          - "питанню"
          - "питанням"
        explanation: "Щодо чого? питання."
      - sentence: "Внаслідок ____ матч перенесли."
        answer: "дощу"
        options:
          - "дощу"
          - "дощ"
          - "дощем"
        explanation: "Внаслідок чого? дощу."
      - sentence: "Поблизу ____ є парк."
        answer: "школи"
        options:
          - "школи"
          - "школа"
          - "школою"
        explanation: "Поблизу чого? школи."
      - sentence: "Ключі дістали з-під ____."
        answer: "столу"
        options:
          - "столу"
          - "стіл"
          - "столом"
        explanation: "З-під чого? столу."
      - sentence: "Сонце виглянуло з-за ____."
        answer: "хмар"
        options:
          - "хмар"
          - "хмари"
          - "хмарами"
        explanation: "З-за чого? хмар."
      - sentence: "З-поміж ____ обрали трьох волонтерів."
        answer: "учасників"
        options:
          - "учасників"
          - "учасники"
          - "учасниками"
        explanation: "З-поміж кого? учасників."
      - sentence: "У разі ____ напишіть викладачеві."
        answer: "затримки"
        options:
          - "затримки"
          - "затримка"
          - "затримкою"
        explanation: "У разі чого? затримки."
      - sentence: "На відміну від ____ вона любить тишу."
        answer: "брата"
        options:
          - "брата"
          - "брат"
          - "братом"
        explanation: "На відміну від кого? брата."
  - id: wb-3
    type: match-up
    title: Прийменникові моделі
    instruction: "Поєднайте прийменник із природним прикладом."
    pairs:
      - left: "замість"
        right: "замість кави"
      - left: "крім"
        right: "крім викладача"
      - left: "навколо"
        right: "навколо площі"
      - left: "серед"
        right: "серед друзів"
      - left: "щодо"
        right: "щодо заяви"
      - left: "внаслідок"
        right: "внаслідок помилки"
      - left: "поблизу"
        right: "поблизу вокзалу"
      - left: "з-під"
        right: "з-під ліжка"
      - left: "з-за"
        right: "з-за рогу"
      - left: "з-поміж"
        right: "з-поміж студентів"
      - left: "у разі"
        right: "у разі небезпеки"
      - left: "на відміну від"
        right: "на відміну від сестри"
  - id: wb-4
    type: error-correction
    title: Виправте родовий
    instruction: "Виправте одну відмінкову помилку в кожному реченні."
    items:
      - sentence: "У нас немає час на перерву."
        error: "немає час"
        correction: "немає часу"
        explanation: "Немає вимагає родового."
      - sentence: "Дайте склянку сік."
        error: "склянку сік"
        correction: "склянку соку"
        explanation: "Склянку чого? соку."
      - sentence: "Проєкт потребує допомогу."
        error: "потребує допомогу"
        correction: "потребує допомоги"
        explanation: "Потребувати керує родовим."
      - sentence: "Команда досягла мету."
        error: "досягла мету"
        correction: "досягла мети"
        explanation: "Досягти чого? мети."
      - sentence: "Зустріч відбулася другого лютий."
