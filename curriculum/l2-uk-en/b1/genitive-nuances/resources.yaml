- title: "A2 case system review"
  role: curriculum
  notes: "Базові питання відмінків і форми родового вже мають бути знайомі з A2."
- title: "Заболотний Grade 6, §25"
  role: textbook
  notes: "Пояснює контраст знахідного для повного об'єкта й родового для часткового значення."
  source_ref: "6-klas-ukrmova-zabolotnyi-2020, §25"
- title: "Заболотний Grade 6, §30"
  role: textbook
  notes: "Систематизує закінчення -а/-я та -у/-ю в родовому однини іменників чоловічого роду ІІ відміни."
  source_ref: "6-klas-ukrmova-zabolotnyi-2020, §30"
- title: "Глазова Grade 10, §45"
  role: textbook
  notes: "Дає ширші семантичні групи для вибору закінчень родового чоловічого роду."
  source_ref: "10-klas-ukrmova-glazova-2018, §45"
- title: "Авраменко Grade 8, §34-35"
  role: textbook
  notes: "Подає родовий додаток при запереченні та частковому охопленні предмета."
  source_ref: "8-klas-ukrmova-avramenko-2025, §34-35"
- title: "Караман Grade 10, §56"
  role: textbook
  notes: "Нагадує, що знахідний однини чоловічого роду назв істот збігається з родовим за формою."
  source_ref: "10-klas-ukrmova-karaman-2018, §56"
- title: "Авраменко Grade 7, §75-76"
  role: textbook
  notes: "Класифікує прості, складні та складені прийменники, зокрема щодо, з-під, із-за, на відміну від."
  source_ref: "7-klas-ukrmova-avramenko-2024, §75-76"
- title: "Заболотний Grade 7, прийменники"
  role: textbook
  notes: "Пояснює прийменник як службове слово з керованим іменником та контраст із прислівником."
  source_ref: "7-klas-ukrmova-zabolotnyi-2024, розділ про прийменник"
- title: "State Standard 2024, §4.2.2.2"
  role: standard
  notes: "Підтримує розширення прийменникових конструкцій і точне керування відмінками на B1."
