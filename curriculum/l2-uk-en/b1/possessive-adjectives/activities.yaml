version: '1.0'
module: possessive-adjectives
level: b1
inline:
  - id: act-1
    type: quiz
    title: Чий чи який?
    instruction: "Оберіть правильне пояснення або форму."
    items:
      - question: "Присвійний прикметник відповідає на питання:"
        options:
          - "чий? чия? чиє? чиї?"
          - "де? куди? звідки?"
          - "коли? відколи? доки?"
        correct: 0
        explanation: Присвійні прикметники називають належність і відповідають на питання чий?
      - question: "Яке словосполучення має присвійний прикметник?"
        options:
          - "батьків дім"
          - "міський парк"
          - "шкільний розклад"
        correct: 0
        explanation: Батьків означає належність конкретному батькові.
      - question: "Яке слово є присвійним займенником, а не прикметником?"
        options:
          - "мій"
          - "Петрів"
          - "сестрин"
        correct: 0
        explanation: Мій є займенником; Петрів і сестрин утворені від іменників/імен.
      - question: "Найточніше пояснення для материна порада:"
        options:
          - "порада матері"
          - "порада для матерів як групи"
          - "порада про материнство"
        correct: 0
        explanation: Материна відповідає на питання чия? і називає конкретну належність.
      - question: "У якому варіанті родовий відмінок звучить нейтральніше?"
        options:
          - "книжка сестри"
          - "сестрина книжка"
          - "сестрин книжка"
        correct: 0
        explanation: Книжка сестри - нейтральна родова конструкція; сестрина книжка компактніша й ближча.
      - question: "Який варіант правильно узгоджений?"
        options:
          - "батькова кімната"
          - "батьків кімната"
          - "батькового кімната"
        correct: 0
        explanation: Кімната жіночого роду в називному відмінку, тому батькова.
      - question: "Що краще для конкретної власниці Марії?"
        options:
          - "Маріїн малюнок"
          - "марійський малюнок"
          - "Маріїв малюнок"
        correct: 0
        explanation: Від Марія творимо присвійний прикметник Маріїн.
      - question: "Яке словосполучення НЕ є природною зоною присвійного прикметника?"
        options:
          - "двері аудиторії"
          - "бабусина хустка"
          - "Андріїв рюкзак"
        correct: 0
        explanation: Аудиторія не є конкретною особою; тут природний родовий відмінок.
      - question: "У реченні Це дідусів годинник слово дідусів означає:"
        options:
          - "годинник дідуся"
          - "годинник для всіх дідусів"
          - "старий годинник"
        correct: 0
        explanation: Дідусів називає належність конкретному дідусеві.
      - question: "Який варіант показує різницю стилю, а не правильності?"
        options:
          - "дім батька / батьків дім"
          - "батьків дім / батьківий дім"
          - "Маріїн лист / Маріїв лист"
        correct: 0
        explanation: Дім батька і батьків дім можуть бути правильними, але мають різний стильовий фокус.
      - question: "Яка форма є помилковою?"
        options:
          - "батьківий дім"
          - "батьків дім"
          - "батькова кімната"
        correct: 0
        explanation: У називному чоловічого роду потрібна коротка форма батьків, не батьківий.
      - question: "Присвійний прикметник найкраще пасує до:"
        options:
          - "конкретної особи або персоніфікованої істоти"
          - "будь-якого предмета без винятків"
          - "тільки абстрактних понять"
        correct: 0
        explanation: Основна зона теми - належність конкретній особі.
  - id: act-2
    type: fill-in
    title: Форми на -ів і -їв
    instruction: "Вставте природний присвійний прикметник від слова в дужках."
    items:
      - sentence: "На столі лежав ____ зошит. (Петро)"
        answer: Петрів
        options:
          - Петрів
          - Петровий
          - Петрин
        explanation: Петро дає коротку форму Петрів перед іменником чоловічого роду.
      - sentence: "У коридорі стояв ____ велосипед. (брат)"
        answer: братів
        options:
          - братів
          - братин
          - братовий
        explanation: Брат належить до чоловічої моделі з -ів.
      - sentence: "Це ____ рюкзак біля дверей. (Андрій)"
        answer: Андріїв
        options:
          - Андріїв
          - Андрійів
          - Андріїн
        explanation: "Основа на -й дає форму з -їв: Андріїв."
      - sentence: "Ми знайшли ____ ключі в кишені куртки. (Сергій)"
        answer: Сергієві
        options:
          - Сергієві
          - Сергіїв
          - Сергійові
        explanation: Ключі - множина, тому потрібна повна форма Сергієві.
      - sentence: "На полиці лежала ____ книжка. (Олексій)"
        answer: Олексієва
        options:
          - Олексієва
          - Олексіїв
          - Олексіїна
        explanation: Книжка жіночого роду; від Олексій маємо Олексієва.
      - sentence: "У музеї показали ____ рукопис. (Шевченко)"
        answer: Шевченків
        options:
          - Шевченків
          - Шевченкін
          - шевченківський
        explanation: Для конкретного рукопису Шевченка потрібна присвійна форма Шевченків.
      - sentence: "Ми обговорювали ____ поезію. (Франко)"
        answer: Франкову
        options:
          - Франкову
          - Франків
          - франківську
        explanation: Поезію - знахідний жіночого роду, тому Франкову.
      - sentence: "Діти слухали ____ розповідь. (дідусь)"
        answer: дідусеву
        options:
          - дідусеву
          - дідусів
          - дідусину
        explanation: Розповідь жіночого роду у знахідному відмінку, тому дідусеву.
      - sentence: "Це ____ фото зі старого альбому. (батько)"
        answer: батькове
        options:
          - батькове
          - батьків
          - батькова
        explanation: Фото середнього роду, тому батькове.
      - sentence: "Ми зайшли до ____ кабінету. (директор)"
        answer: директорового
        options:
          - директорового
          - директорів
          - директориного
        explanation: До кабінету вимагає родового відмінка; повна форма директорового.
      - sentence: "У класі згадали ____ план. (Юрій)"
        answer: Юріїв
        options:
          - Юріїв
          - Юрієва
          - Юрин
        explanation: План чоловічого роду в називному, тому коротка форма Юріїв.
      - sentence: "Вона відповідала на ____ запитання. (Тарас)"
        answer: Тарасове
        options:
          - Тарасове
          - Тарасів
          - Тарасине
        explanation: Запитання середнього роду, тому Тарасове.
  - id: act-3
    type: group-sort
    title: Модель і чергування
    instruction: "Розподіліть форми за способом творення."
    groups:
      - label: "-ів/-їв без чергування"
        items:
          - батьків
          - братів
          - Олегів
      - label: "-їв після основи на -й"
        items:
          - Андріїв
          - Сергіїв
          - Олексіїв
      - label: "-ин/-їн без чергування"
        items:
          - материн
          - сестрин
          - Маріїн
      - label: "-ин із чергуванням"
        items:
          - тітчин
          - Ольжин
          - Солошин
  - id: act-4
    type: fill-in
    title: Відмінювання в словосполученні
    instruction: "Вставте форму, узгоджену з іменником і відмінком."
    items:
      - sentence: "Я зайшов до ____ дому. (батько)"
        answer: батькового
        options:
          - батькового
          - батьків
          - батькова
        explanation: До дому вимагає родового відмінка чоловічого роду.
      - sentence: "Ми сиділи в ____ кімнаті. (батько)"
        answer: батьковій
        options:
          - батьковій
          - батькова
          - батьків
        explanation: В кімнаті - місцевий відмінок жіночого роду.
      - sentence: "Вона говорила з ____ подругою. (мати)"
        answer: материною
        options:
          - материною
          - материн
          - материна
        explanation: З подругою - орудний відмінок жіночого роду.
      - sentence: "У тексті бракувало ____ голосу. (мати)"
        answer: материного
        options:
          - материного
          - материн
          - материна
        explanation: Бракувало голосу - родовий відмінок чоловічого роду.
      - sentence: "Учні читали ____ листи. (Марія)"
        answer: Маріїні
        options:
          - Маріїні
          - Маріїн
          - Маріїного
        explanation: Листи - множина називного відмінка.
      - sentence: "У ____ листі було кілька нових слів. (Марія)"
        answer: Маріїному
        options:
          - Маріїному
          - Маріїн
          - Маріїна
        explanation: У листі - місцевий відмінок чоловічого роду.
      - sentence: "Він пишався ____ малюнком. (Оленка)"
        answer: Оленчиним
        options:
          - Оленчиним
          - Оленчин
          - Оленкиним
        explanation: Орудний відмінок чоловічого роду; Оленка дає Оленчин.
      - sentence: "Діти повернулися з ____ дому. (тітка)"
        answer: тітчиного
        options:
          - тітчиного
          - тітчин
          - тіткиного
        explanation: До/з дому вимагає родового відмінка; тітка дає тітчин.
      - sentence: "Він зберіг ____ годинник. (дідусь)"
        answer: дідусів
        options:
          - дідусів
          - дідусевого
          - дідусина
        explanation: Годинник чоловічого роду в знахідному для неістоти збігається з називним.
      - sentence: "Ми скористалися ____ порадою. (сестра)"
        answer: сестриною
        options:
          - сестриною
          - сестрин
          - сестриного
        explanation: Порадою - орудний відмінок жіночого роду.
      - sentence: "На столі стояло ____ горнятко. (Сергій)"
        answer: Сергієве
        options:
          - Сергієве
          - Сергіїв
          - Сергіїне
        explanation: Горнятко середнього роду, тому Сергієве.
      - sentence: "У шафі лежали ____ речі. (батько)"
        answer: батькові
        options:
          - батькові
          - батьків
          - батькового
        explanation: Речі - множина називного відмінка.
  - id: act-5
    type: error-correction
    title: Редактор належності
    instruction: "Знайдіть помилкову форму й замініть її нормативною."
    items:
      - sentence: "Батьківий дім стояв біля річки."
        error: Батьківий
        correction: Батьків
        explanation: У називному чоловічого роду потрібна коротка форма батьків.
      - sentence: "Материного порада допомогла мені."
        error: Материного порада
        correction: Материна порада
        error_type: phrase
        explanation: Порада жіночого роду в називному відмінку, тому материна.
      - sentence: "Це Маріїв малюнок на дошці."
        error: Маріїв
        correction: Маріїн
        explanation: Від Марія творимо форму Маріїн.
      - sentence: "Тіткин пиріг був ще теплий."
        error: Тіткин
        correction: Тітчин
        explanation: Перед -ин відбувається чергування к на ч.
      - sentence: "Ольгин коментар здивував групу."
        error: Ольгин
        correction: Ольжин
        explanation: У формі від Ольга маємо чергування г на ж.
      - sentence: "Андрійів рюкзак стояв під партою."
        error: Андрійів
        correction: Андріїв
        explanation: Після основи на -й пишемо Андріїв.
      - sentence: "Ми говорили з Андріївим братом."
        error: Андріївим
        correction: Андрієвим
        explanation: В орудному відмінку потрібна повна форма Андрієвим.
      - sentence: "У батьків кабінеті було тихо."
        error: батьків кабінеті
        correction: батьковому кабінеті
        error_type: phrase
        explanation: У кабінеті - місцевий відмінок, тому батьковому.
      - sentence: "Шевченківський рукопис зберігають у музеї."
        error: Шевченківський
        correction: Шевченків
        explanation: Для конкретного рукопису Шевченка потрібен присвійний прикметник.
      - sentence: "шевченкові твори вивчають у школі."
        error: шевченкові
        correction: Шевченкові
        explanation: Присвійний прикметник від власної назви пишемо з великої літери.
      - sentence: "Солохин голос було чути здалеку."
        error: Солохин
        correction: Солошин
        explanation: Перед -ин основа на х переходить у ш.
      - sentence: "Ми читали сестриного лист."
        error: сестриного лист
        correction: сестрин лист
        error_type: phrase
        explanation: У знахідному для неістоти чоловічого роду форма збігається з називним.
  - id: act-6
    type: match-up
    title: Присвійний, відносний, родовий
    instruction: "Поєднайте словосполучення з найточнішим поясненням."
    pairs:
      - left: батьків дім
        right: "присвійний прикметник: дім батька"
      - left: дім батька
        right: "родовий відмінок: нейтральна конструкція належності"
      - left: батьківські збори
        right: "відносний прикметник: збори для батьків як групи"
      - left: материна порада
        right: "присвійний прикметник із теплим особистим відтінком"
      - left: материнська турбота
        right: "відносний або якісно-відносний прикметник про тип турботи"
      - left: Шевченкові твори
        right: "конкретні твори Шевченка, присвійна форма з великої літери"
      - left: шевченківський стиль
        right: "ширший зв'язок із традицією або манерою, мала літера"
      - left: Маріїн лист
        right: "лист конкретної Марії"
      - left: лист Марії
        right: "родовий відмінок, нейтральніший варіант"
      - left: університетський курс
        right: "відносний прикметник від установи"
      - left: двері аудиторії
        right: "родовий відмінок, бо аудиторія не є особою-власником"
      - left: Оленчин зошит
        right: "присвійний прикметник від домашньої форми Оленка"
workbook:
  - id: wb-1
    type: quiz
    title: Контроль присвійних прикметників
    instruction: "Оберіть правильний варіант."
    items:
      - question: "Правильна форма від Андрій:"
        options:
          - "Андріїв"
          - "Андрійів"
          - "Андріїн"
        correct: 0
        explanation: Після основи на -й маємо -їв.
      - question: "Правильна форма від Марія:"
        options:
          - "Маріїн"
          - "Маріїв"
          - "Марійський"
        correct: 0
        explanation: Марія дає присвійний прикметник Маріїн.
      - question: "Правильна форма від тітка:"
        options:
          - "тітчин"
          - "тіткин"
          - "тітків"
        correct: 0
        explanation: Перед -ин відбувається к на ч.
      - question: "Правильна форма від Ольга:"
        options:
          - "Ольжин"
          - "Ольгин"
          - "Ольгів"
        correct: 0
        explanation: У цій моделі г переходить у ж.
      - question: "Яка форма коротка в називному чоловічого роду?"
        options:
          - "батьків дім"
          - "батьковий дім"
          - "батькового дім"
        correct: 0
        explanation: "У цій позиції форма коротка: батьків."
      - question: "Правильно:"
        options:
          - "батькова кімната"
          - "батьків кімната"
          - "батькового кімната"
        correct: 0
        explanation: Кімната жіночого роду в називному відмінку.
      - question: "У реченні У батьковому кабінеті прикметник стоїть у:"
        options:
          - "місцевому відмінку"
          - "називному відмінку"
          - "кличному відмінку"
        correct: 0
        explanation: У кабінеті - місцевий відмінок.
      - question: "Яке словосполучення є відносним, а не присвійним?"
        options:
          - "батьківські збори"
          - "батьків дім"
          - "Маріїн лист"
        correct: 0
        explanation: Батьківські збори пов'язані з батьками як групою.
      - question: "Яке написання правильно для конкретних творів Шевченка?"
        options:
          - "Шевченкові твори"
          - "шевченкові твори"
          - "шевченківські твори"
        correct: 0
        explanation: Це присвійний прикметник від власної назви, тому велика літера.
      - question: "Який варіант природний для ширшого стилю або традиції?"
        options:
          - "шевченківський стиль"
          - "Шевченків стиль"
          - "Шевченківий стиль"
        correct: 0
        explanation: Для ширшого зв'язку потрібен відносний прикметник.
      - question: "Правильна пара:"
        options:
          - "Марія -> Маріїн, Марійка -> Марійчин"
          - "Марія -> Маріїв, Марійка -> Маріїн"
          - "Марія -> Марійчин, Марійка -> Маріїн"
        correct: 0
        explanation: Форма залежить від того, з якої основи починаємо.
      - question: "Яке речення найкраще показує стилістичний вибір?"
        options:
          - "Материна порада звучить тепліше, ніж порада матері."
          - "Порада матері завжди неправильна."
          - "Материнська порада є єдиною правильною формою."
        correct: 0
        explanation: Обидві конструкції можуть бути правильними, але мають різний стиль.
  - id: wb-2
    type: fill-in
    title: Утворіть присвійний прикметник
    instruction: "Вставте нормативну форму від слова в дужках."
    items:
      - sentence: "Це ____ голос у записі. (батько)"
        answer: батьків
        options:
          - батьків
          - батькова
          - батькового
        explanation: Голос чоловічого роду в називному відмінку.
      - sentence: "____ відповідь була найточнішою. (Сергій)"
        answer: Сергієва
        options:
          - Сергієва
          - Сергіїв
          - Сергіїна
        explanation: Відповідь жіночого роду, тому Сергієва.
      - sentence: "У кімнаті лежало ____ пальто. (Петро)"
        answer: Петрове
        options:
          - Петрове
          - Петрів
          - Петрине
        explanation: Пальто середнього роду.
      - sentence: "Ми слухали ____ історії. (дідусь)"
        answer: дідусеві
        options:
          - дідусеві
          - дідусів
          - дідусині
        explanation: Історії - множина називного відмінка.
      - sentence: "____ пісня починалася тихо. (мати)"
        answer: материна
        options:
          - материна
          - материн
          - материного
        explanation: Пісня жіночого роду в називному відмінку.
      - sentence: "На столі був ____ лист. (сестра)"
        answer: сестрин
        options:
          - сестрин
          - сестрина
          - сестрів
        explanation: Лист чоловічого роду в називному відмінку.
      - sentence: "Вона принесла ____ пиріг. (тітка)"
        answer: тітчин
        options:
          - тітчин
          - тіткин
          - тітків
        explanation: Тітка дає тітчин із чергуванням к на ч.
      - sentence: "Це ____ щоденник. (Марійка)"
        answer: Марійчин
        options:
          - Марійчин
          - Маріїн
          - Марійків
        explanation: Марійка дає Марійчин.
      - sentence: "____ малюнок висів на стіні. (Софія)"
        answer: Софіїн
        options:
          - Софіїн
          - Софіїв
          - Софійчин
        explanation: Софія дає Софіїн.
      - sentence: "У сумці була ____ книжка. (Леся)"
        answer: Лесина
        options:
          - Лесина
          - Лесів
          - Лесієва
        explanation: Леся дає Лесин; книжка жіночого роду, тому Лесина.
      - sentence: "На дошці лишився ____ приклад. (Оленка)"
        answer: Оленчин
        options:
          - Оленчин
          - Оленкин
          - Оленків
        explanation: Оленка дає Оленчин із чергуванням к на ч.
      - sentence: "У музеї зберігають ____ словник. (Грінченко)"
        answer: Грінченків
        options:
          - Грінченків
          - грінченківський
          - Грінченкин
        explanation: Конкретний словник Грінченка - присвійний прикметник із великої літери.
  - id: wb-3
    type: error-correction
    title: Виправте форму
    instruction: "Замініть помилкову форму нормативною."
    items:
      - sentence: "Петрин зошит лежав на столі."
        error: Петрин
        correction: Петрів
        explanation: Петро дає форму Петрів для чоловічого роду називного.
      - sentence: "Сергіїв відповідь була короткою."
        error: Сергіїв відповідь
        correction: Сергієва відповідь
        error_type: phrase
        explanation: Відповідь жіночого роду, тому Сергієва.
      - sentence: "Маріїна малюнок сподобався класу."
        error: Маріїна малюнок
        correction: Маріїн малюнок
        error_type: phrase
        explanation: Малюнок чоловічого роду в називному відмінку, тому Маріїн.
      - sentence: "Сестровий лист був дуже довгий."
        error: Сестровий
        correction: Сестрин
        explanation: Від сестра нормативна присвійна форма сестрин.
      - sentence: "Подругин лист прийшов учора."
        error: Подругин
        correction: Подружин
        explanation: Подруга дає подружин із чергуванням г на ж.
      - sentence: "Солохин жарт усіх розсмішив."
        error: Солохин
        correction: Солошин
        explanation: Солоха дає Солошин із чергуванням х на ш.
      - sentence: "У Маріїн листі була новина."
        error: Маріїн листі
        correction: Маріїному листі
        error_type: phrase
        explanation: У листі - місцевий відмінок, тому потрібна повна форма Маріїному.
      - sentence: "Ми сиділи за батьків столом."
        error: батьків столом
        correction: батьковим столом
        error_type: phrase
        explanation: За столом - орудний відмінок, тому батьковим.
      - sentence: "Франківські листи до Ольги були в архіві."
        error: Франківські
        correction: Франкові
        explanation: Якщо йдеться про конкретні листи Франка, потрібна присвійна форма.
      - sentence: "шевченкова поезія звучить сучасно."
        error: шевченкова
        correction: Шевченкова
        explanation: Присвійний прикметник від власної назви пишемо з великої літери.
      - sentence: "Це університетів курс для студентів."
        error: університетів
        correction: університетський
        explanation: Університет не є конкретною особою; потрібен відносний прикметник.
      - sentence: "Наталкіна сумка залишилася в автобусі."
        error: Наталкіна
        correction: Наталчина
        explanation: Наталка дає Наталчин із чергуванням к на ч.
