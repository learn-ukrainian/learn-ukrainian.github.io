  - id: wb-7
    type: essay-response
    title: Родинна річ або культурний текст
    instruction: "Напишіть короткий опис із присвійними прикметниками."
    prompt: "Опишіть родинну річ, фотографію або культурний текст. Використайте щонайменше шість присвійних прикметників, серед них одну форму на -ів/-їв, одну форму на -ин/-їн, одну форму з чергуванням і одну форму в непрямому відмінку. Поясніть, де присвійний прикметник звучить краще за родовий відмінок, а де родовий відмінок був би нейтральнішим."
    min_words: 140
    model_answer: "У нашому родинному альбомі є батькове фото біля старої школи й материна записка на звороті. Поруч лежить дідусів годинник: він уже не працює, але всі пам'ятають його тихий звук. На іншій сторінці я знайшла Маріїн малюнок і Оленчин підпис, бо двоюрідні сестри часто малювали разом. Мені подобається казати материна записка, а не записка матері, бо ця форма звучить тепліше. Але в описі для архіву я, мабуть, написала б записка матері або фото батька, щоб текст був нейтральнішим. У шкільному есе я також згадала Шевченкову поезію і пояснила, що це присвійний прикметник від власної назви. У непрямих відмінках форми змінюються: у батьковому альбомі, з материною запискою, біля Оленчиного підпису. Так видно, що власник дає основу, а форму визначає іменник. Наприкінці я порівнюю: Ольжин коментар звучить особисто, а коментар Ольги пасує до бібліографічного опису; тітчин пиріг доречний у сімейній історії, але пиріг тітки нейтральний у списку."
    evaluation_criteria:
      - "Використано щонайменше шість присвійних прикметників."
      - "Є форми на -ів/-їв, -ин/-їн, форма з чергуванням і форма в непрямому відмінку."
      - "Пояснено стильову різницю між присвійним прикметником і родовим відмінком."
      - "Форми узгоджені з іменниками за родом, числом і відмінком."
