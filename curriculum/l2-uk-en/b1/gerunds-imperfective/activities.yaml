  - id: wb-5
    type: error-correction
    title: Фінальна редактура
    instruction: Виправте одну головну помилку в кожному реченні.
    items:
      - sentence: "Слухаючі подкаст, я записував нові слова."
        error: "Слухаючі подкаст, я записував нові слова."
        correction: "Слухаючи подкаст, я записував нові слова."
        explanation: Дієприслівник має кінцеву літеру и, не і.
      - sentence: "Говорючи українською, студент робить паузи."
        error: "Говорючи українською, студент робить паузи."
        correction: "Говорячи українською, студент робить паузи."
        explanation: Говорити -> говорять -> говорячи.
      - sentence: "Писачи есе, я перевіряю джерела."
        error: "Писачи есе, я перевіряю джерела."
        correction: "Пишучи есе, я перевіряю джерела."
        explanation: Писати -> пишуть -> пишучи.
      - sentence: "Дивлячи на мапу, ми шукали музей."
        error: "Дивлячи на мапу, ми шукали музей."
        correction: "Дивлячись на мапу, ми шукали музей."
        explanation: Від дивитися потрібна зворотна форма дивлячись.
      - sentence: "Усміхаючи, викладачка привіталася з групою."
        error: "Усміхаючи, викладачка привіталася з групою."
        correction: "Усміхаючись, викладачка привіталася з групою."
        explanation: Від усміхатися зберігаємо -сь.
      - sentence: "Прочитавши статтю, я роблю нотатки одночасно."
        error: "Прочитавши статтю, я роблю нотатки одночасно."
        correction: "Читаючи статтю, я роблю нотатки одночасно."
        explanation: Для одночасної дії потрібен недоконаний дієприслівник.
      - sentence: "Читаючи статтю, нотатки стали довшими."
        error: "Читаючи статтю, нотатки стали довшими."
        correction: "Читаючи статтю, я робив довші нотатки."
        explanation: Нотатки не читають статтю.
      - sentence: "Працюючи з текстом я підкреслюю дієприслівники."
        error: "Працюючи з текстом я підкреслюю дієприслівники."
        correction: "Працюючи з текстом, я підкреслюю дієприслівники."
        explanation: Дієприслівниковий зворот перед присудком відокремлюємо комою.
      - sentence: "Не думаючи я відповів занадто швидко."
        error: "Не думаючи я відповів занадто швидко."
        correction: "Не думаючи, я відповів занадто швидко."
        explanation: На початку речення дієприслівниковий зворот відокремлюємо.
      - sentence: "Навчаючись університеті, він багато читав українською."
        error: "Навчаючись університеті"
        correction: "Навчаючись в університеті, він багато читав українською."
        explanation: Для місця потрібен прийменник в/у з місцевим відмінком.
      - sentence: "Хвилюючись перед іспитом студентка повторювала таблицю."
        error: "Хвилюючись перед іспитом студентка"
        correction: "Хвилюючись перед іспитом, студентка повторювала таблицю."
        explanation: Дієприслівниковий зворот на початку речення відокремлюємо комою.
      - sentence: "Не думаючи, відповідь прозвучала різко."
        error: "Не думаючи, відповідь прозвучала різко."
        correction: "Не думаючи, я відповів різко."
        explanation: Відповідь не може думати; треба назвати виконавця дії.
