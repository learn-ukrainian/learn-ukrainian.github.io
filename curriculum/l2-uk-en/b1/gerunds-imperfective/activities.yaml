version: '1.0'
module: gerunds-imperfective
level: b1
inline:
  - id: act-1
    type: quiz
    title: Що називає дієприслівник?
    instruction: Оберіть найточніше пояснення форми в реченні.
    items:
      - question: "У реченні Читаючи статтю, я виписую нові слова форма читаючи означає:"
        options:
          - "додаткову дію того самого підмета"
          - "ознаку іменника стаття"
          - "наказ читати швидше"
        correct: 0
        explanation: Читаючи називає додаткову дію підмета я.
      - question: "На яке питання відповідає дієприслівник недоконаного виду?"
        options:
          - "що роблячи?"
          - "який?"
          - "кому?"
        correct: 0
        explanation: Недоконаний дієприслівник відповідає на питання що роблячи?
      - question: "Яка форма є дієприслівником?"
        options:
          - "слухаючи"
          - "слухач"
          - "слухняний"
        correct: 0
        explanation: Слухаючи є незмінюваною формою дієслова.
      - question: "Яка головна синтаксична роль дієприслівника в реченні?"
        options:
          - "обставина"
          - "підмет"
          - "означення, що узгоджується з іменником"
        correct: 0
        explanation: Дієприслівник переважно пояснює присудок як обставина.
      - question: "Що правильно про форму працюючи?"
        options:
          - "Вона не змінюється за родом, числом і відмінком."
          - "Вона має форму жіночого роду працююча."
          - "Вона є формою майбутнього часу."
        correct: 0
        explanation: Дієприслівник є незмінюваним.
      - question: "У реченні Усміхаючись, волонтерка пояснювала правила хто усміхався?"
        options:
          - "волонтерка"
          - "правила"
          - "пояснення"
        correct: 0
        explanation: Додаткова й основна дія мають одного виконавця.
      - question: "Яке речення правильно показує одночасність?"
        options:
          - "Слухаючи подкаст, Марія готувала вечерю."
          - "Прослухавши подкаст, Марія вже вимкнула плиту."
          - "Подкаст слухаюча Марія вечеря."
        correct: 0
        explanation: Слухання й готування відбуваються одночасно.
      - question: "Яка пара правильно розрізняє дієприслівник і дієприкметник?"
        options:
          - "сяючи розповідати - дієприслівник; сяючі очі - дієприкметник або прикметник"
          - "сяючі очі - дієприслівник; сяючи розповідати - іменник"
          - "обидві форми завжди є прислівниками"
        correct: 0
        explanation: Дієприслівник закінчується на -и й не узгоджується.
      - question: "Чому форма зробивши не є темою активного творення в цьому модулі?"
        options:
          - "Бо це доконаний дієприслівник попередньої дії."
          - "Бо це форма кличного відмінка."
          - "Бо українська не має такої форми."
        correct: 0
        explanation: M70 фокусується на недоконаних формах типу читаючи.
      - question: "Яка відповідь найкраще описує дієприслівниковий зворот?"
        options:
          - "дієприслівник із залежними словами"
          - "будь-який прикметник із іменником"
          - "форма майбутнього часу з інфінітивом"
        correct: 0
        explanation: Наприклад, читаючи статтю про Київ є зворотом.
      - question: "Який варіант найприродніший для розмови без книжного відтінку?"
        options:
          - "Коли я йшов додому, я слухав музику."
          - "Ідучи додому, я слухав музику."
          - "Додому ідучи музика слухав."
        correct: 0
        explanation: Підрядне речення часто природніше в невимушеній розмові.
      - question: "Що є головною перевіркою перед уживанням дієприслівника?"
        options:
          - "Чи одна й та сама особа виконує обидві дії?"
          - "Чи можна поставити слово в родовий відмінок?"
          - "Чи має слово форму множини?"
        correct: 0
        explanation: Правило спільного підмета є обов'язковим.
  - id: act-2
    type: fill-in
    title: Утворіть форму
    instruction: Доповніть речення дієприслівником недоконаного виду.
    items:
      - sentence: "____ статтю, я виписую нові слова."
        answer: Читаючи
        options:
          - Читаючи
          - Читач
          - Прочитавши
        explanation: Читати -> читають -> читаючи.
      - sentence: "____ подкаст, Марія готує каву."
        answer: Слухаючи
        options:
          - Слухаючи
          - Слухачі
          - Прослухавши
        explanation: Слухати -> слухають -> слухаючи.
      - sentence: "____ есе, студент перевіряє приклади."
        answer: Пишучи
        options:
          - Пишучи
          - Писавши
          - Письмовий
        explanation: Писати -> пишуть -> пишучи.
      - sentence: "____ українською, викладач говорить повільніше."
        answer: Говорячи
        options:
          - Говорячи
          - Говорячі
          - Поговоривши
        explanation: Говорити -> говорять -> говорячи.
      - sentence: "____ біля вікна, Олена читає повідомлення."
        answer: Сидячи
        options:
          - Сидячи
          - Сидячі
          - Сівши
        explanation: Сидіти -> сидять -> сидячи.
      - sentence: "____ на зупинці, ми обговорювали маршрут."
        answer: Стоячи
        options:
          - Стоячи
          - Стоячі
          - Ставши
        explanation: Стояти -> стоять -> стоячи.
      - sentence: "____ набережною, я слухаю музику."
        answer: Біжучи
        options:
          - Біжучи
          - Бігучі
          - Побігши
        explanation: Бігти -> біжать -> біжучи.
      - sentence: "____ на мапу, туристи шукають музей."
        answer: Дивлячись
        options:
          - Дивлячись
          - Дивлячі
          - Подивившись
        explanation: Дивитися -> дивляться -> дивлячись.
      - sentence: "____, волонтерка пояснює правила."
        answer: Усміхаючись
        options:
          - Усміхаючись
          - Усміхаючі
          - Усміхнувшись
        explanation: Усміхатися -> усміхаються -> усміхаючись.
      - sentence: "____ в університеті, він багато читає українською."
        answer: Навчаючись
        options:
          - Навчаючись
          - Навчаючі
          - Навчившись
        explanation: Навчатися -> навчаються -> навчаючись.
      - sentence: "____ за результат, команда перевіряє кожну деталь."
        answer: Хвилюючись
        options:
          - Хвилюючись
          - Хвилюючі
          - Схвилювавшись
        explanation: Хвилюватися -> хвилюються -> хвилюючись.
      - sentence: "____ над проєктом, ми користуємося словником."
        answer: Працюючи
        options:
          - Працюючи
          - Працюючі
          - Попрацювавши
        explanation: Працювати -> працюють -> працюючи.
  - id: act-3
    type: match-up
    title: Алгоритм творення
    instruction: З'єднайте інфінітив із правильною формою.
    pairs:
      - left: "читати"
        right: "читаючи"
      - left: "слухати"
        right: "слухаючи"
      - left: "писати"
        right: "пишучи"
      - left: "нести"
        right: "несучи"
      - left: "працювати"
        right: "працюючи"
      - left: "мріяти"
        right: "мріючи"
      - left: "стояти"
        right: "стоячи"
      - left: "лежати"
        right: "лежачи"
      - left: "бачити"
        right: "бачачи"
      - left: "говорити"
        right: "говорячи"
      - left: "дивитися"
        right: "дивлячись"
      - left: "усміхатися"
        right: "усміхаючись"
  - id: act-4
    type: group-sort
    title: Розпізнайте тип форми
    instruction: Розподіліть форми за граматичним типом.
    groups:
      - label: "Дієприслівник недоконаного виду"
        items:
          - "читаючи"
          - "слухаючи"
          - "пишучи"
          - "дивлячись"
      - label: "Дієприкметник або прикметникова форма"
        items:
          - "сяючі очі"
          - "лежачий хворий"
          - "працюючі студенти"
          - "квітучий сад"
      - label: "Доконаний дієприслівник для наступного модуля"
        items:
          - "прочитавши"
          - "написавши"
          - "побачивши"
          - "повернувшись"
  - id: act-5
    type: error-correction
    title: Спільний підмет
    instruction: Виправте речення так, щоб дія дієприслівника мала виконавця.
    items:
      - sentence: "Їдучи в автобусі, мені зателефонували."
        error: "Їдучи в автобусі, мені зателефонували."
        correction: "Їдучи в автобусі, я отримав дзвінок."
        explanation: Їхав саме я, тому підмет треба назвати.
      - sentence: "Слухаючи музику, кімната наповнилася звуками."
        error: "Слухаючи музику, кімната наповнилася звуками."
        correction: "Слухаючи музику, я помітив, як кімната наповнилася звуками."
        explanation: Кімната не слухає музику.
      - sentence: "Повертаючись додому, почався дощ."
        error: "Повертаючись додому, почався дощ."
        correction: "Повертаючись додому, я потрапив під дощ."
        explanation: Повертався не дощ, а людина.
      - sentence: "Готуючи презентацію, було важко зосередитися."
        error: "Готуючи презентацію, було важко зосередитися."
        correction: "Коли я готував презентацію, було важко зосередитися."
        explanation: У безособовому реченні немає виконавця для дієприслівника.
      - sentence: "Читаючи текст, відповідь стала зрозумілою."
        error: "Читаючи текст, відповідь стала зрозумілою."
        correction: "Читаючи текст, я зрозумів відповідь."
        explanation: Відповідь не може читати текст.
      - sentence: "Працюючи в бібліотеці, знайшлися потрібні джерела."
        error: "Працюючи в бібліотеці, знайшлися потрібні джерела."
        correction: "Працюючи в бібліотеці, ми знайшли потрібні джерела."
        explanation: Потрібен виконавець дії працюючи.
      - sentence: "Дивлячись на мапу, маршрут змінився."
        error: "Дивлячись на мапу, маршрут змінився."
        correction: "Дивлячись на мапу, туристи змінили маршрут."
        explanation: Маршрут не дивиться на мапу.
      - sentence: "Стоячи біля входу, стало холодно."
        error: "Стоячи біля входу, стало холодно."
        correction: "Стоячи біля входу, ми змерзли."
        explanation: Безособове стало холодно не має спільного підмета.
      - sentence: "Пишучи листа, думки впорядкувалися."
        error: "Пишучи листа, думки впорядкувалися."
        correction: "Пишучи листа, я впорядкував думки."
        explanation: Думки не пишуть листа.
      - sentence: "Говорячи повільно, правило стало простішим."
        error: "Говорячи повільно, правило стало простішим."
        correction: "Говорячи повільно, викладач зробив правило простішим."
        explanation: Говорить викладач, а не правило.
      - sentence: "Хвилюючись перед іспитом, не спалося всю ніч."
        error: "Хвилюючись перед іспитом, не спалося всю ніч."
        correction: "Хвилюючись перед іспитом, я не спав усю ніч."
        explanation: У реченні треба назвати того, хто хвилювався.
      - sentence: "Усміхаючись, пояснення звучало доброзичливо."
        error: "Усміхаючись, пояснення звучало доброзичливо."
        correction: "Усміхаючись, волонтерка пояснювала все доброзичливо."
        explanation: Усміхалася людина, а не пояснення.
workbook:
  - id: wb-1
    type: quiz
    title: Контроль понять
    instruction: Оберіть відповідь, яка найкраще відповідає правилу.
    items:
      - question: "Яка форма утворена від дієслова недоконаного виду?"
        options:
          - "працюючи"
          - "попрацювавши"
          - "працівник"
        correct: 0
        explanation: Працюючи походить від працювати.
      - question: "Який варіант правильно передає одночасну дію читання?"
        options:
          - "читаючи"
          - "прочитавши"
          - "читач"
        correct: 0
        explanation: Читаючи передає одночасну дію.
      - question: "Яке слово допомагає перевірити логічний підмет?"
        options:
          - "хто виконує дію?"
          - "який відмінок має іменник?"
          - "чи є ступінь порівняння?"
        correct: 0
        explanation: Треба знайти виконавця додаткової дії.
      - question: "Чому речення Втомившись, хотілося спати проблемне?"
        options:
          - "У ньому немає виконавця для дієприслівника."
          - "У ньому забагато іменників."
          - "Дієприслівник стоїть після присудка."
        correct: 0
        explanation: Безособова модель не дає підмета для втомившись.
      - question: "Яка форма має кінцеву літеру и як дієприслівник?"
        options:
          - "сяючи"
          - "сяючі"
          - "сяйво"
        correct: 0
        explanation: Сяючи - дієприслівник, сяючі - прикметникова форма множини.
      - question: "Що означає форма дивлячись у реченні Дивлячись на мапу, ми шукали станцію?"
        options:
          - "Ми дивилися й одночасно шукали."
          - "Станція дивилася на мапу."
          - "Ми вже закінчили шукати перед дивленням."
        correct: 0
        explanation: Недоконаний дієприслівник показує одночасність.
      - question: "Яке речення має правильний спільний підмет?"
        options:
          - "Працюючи в кав'ярні, Олег слухав лекцію."
          - "Працюючи в кав'ярні, лекція стала цікавішою."
          - "Працюючи в кав'ярні, було шумно."
        correct: 0
        explanation: Олег і працював, і слухав.
      - question: "Коли краще замінити дієприслівник підрядним реченням?"
        options:
          - "Коли розмовний стиль звучить природніше з коли..."
          - "Коли треба приховати підмет."
          - "Коли дієслово недоконаного виду."
        correct: 0
        explanation: У розмові підрядне речення часто легше.
      - question: "Який варіант правильно утворено від говорити?"
        options:
          - "говорячи"
          - "говорючи"
          - "говоричи"
        correct: 0
        explanation: Говорити -> говорять -> говорячи.
      - question: "Який варіант правильно утворено від мріяти?"
        options:
          - "мріючи"
          - "мріючися"
          - "мріячі"
        correct: 0
        explanation: Мріяти -> мріють -> мріючи.
      - question: "Яка форма зберігає зворотність?"
        options:
          - "навчаючись"
          - "навчаючи"
          - "навчальний"
        correct: 0
        explanation: Від навчатися потрібна форма навчаючись.
      - question: "Який приклад краще залишити для наступного модуля про доконаний вид?"
        options:
          - "прочитавши"
          - "читаючи"
          - "слухаючи"
        correct: 0
        explanation: Прочитавши означає попередню завершену дію.
  - id: wb-2
    type: cloze
    title: Алгоритм у міні-тексті
    instruction: Заповніть пропуски формами й термінами з модуля.
    text: "Дієприслівник недоконаного виду відповідає на питання {1}. Він називає {2} дію, яка відбувається {3} з основною. Форму читаючи утворюємо так: читати -> {4} -> {5}. Для I дієвідміни типові суфікси {6}, а для II дієвідміни - {7}. У зворотних формах зберігаємо постфікс: усміхатися -> {8}. Перед уживанням перевіряємо {9}: у реченні дві дії має виконувати той самий {10}. У письмі дієприслівниковий зворот часто відокремлюємо {11}. У розмові його можна замінити реченням із {12}."
    blanks:
      - id: 1
        answer: що роблячи?
        options:
          - що роблячи?
          - який?
          - кому?
      - id: 2
        answer: додаткову
        options:
          - додаткову
          - відмінкову
          - наказову
      - id: 3
        answer: одночасно
        options:
          - одночасно
          - після
          - замість
      - id: 4
        answer: читають
        options:
          - читають
          - прочитав
          - читач
      - id: 5
        answer: читаючи
        options:
          - читаючи
          - прочитавши
          - читаючі
      - id: 6
        answer: -учи/-ючи
        options:
          - -учи/-ючи
          - -ши/-вши
          - -ий/-а
      - id: 7
        answer: -ачи/-ячи
        options:
          - -ачи/-ячи
          - -ти/-тися
          - -но/-то
      - id: 8
        answer: усміхаючись
        options:
          - усміхаючись
          - усміхаючі
          - усміхнений
      - id: 9
        answer: логічний підмет
        options:
          - логічний підмет
          - родовий відмінок
          - ступінь порівняння
      - id: 10
        answer: підмет
        options:
          - підмет
          - додаток
          - прийменник
      - id: 11
        answer: комами
        options:
          - комами
          - лапками
          - дефісами
      - id: 12
        answer: коли
        options:
          - коли
          - чий
          - щоб
  - id: wb-3
