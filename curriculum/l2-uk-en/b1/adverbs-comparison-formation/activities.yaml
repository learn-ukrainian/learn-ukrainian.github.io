version: '1.0'
module: adverbs-comparison-formation
level: b1
inline:
  - id: act-1
    type: quiz
    title: Прикметник чи прислівник?
    instruction: "Оберіть правильний варіант або пояснення."
    items:
      - question: "У реченні Вона біжить швидко слово швидко:"
        options:
          - "прислівник"
          - "прикметник жіночого роду"
          - "іменник"
        correct: 0
        explanation: Швидко описує дію біжить.
      - question: "Правильна пара:"
        options:
          - "швидкий - швидко"
          - "швидкий - швидке"
          - "швидкий - швидський"
        correct: 0
        explanation: Суфіксальна модель дає прислівник швидко.
      - question: "Правильний прислівник від гарячий:"
        options:
          - "гаряче"
          - "гарячо"
          - "по-гарячий"
        correct: 0
        explanation: Частотна форма - гаряче.
      - question: "Який варіант написано правильно?"
        options:
          - "по-українськи"
          - "по українськи"
          - "поукраїнськи"
        correct: 0
        explanation: По-...-ськи пишемо через дефіс.
      - question: "Яке слово пишеться разом?"
        options:
          - "помалу"
          - "по-малу"
          - "по малу"
        correct: 0
        explanation: Помалу не є моделлю по-...-ому/-ськи.
      - question: "Правильна форма вищого ступеня від тихо:"
        options:
          - "тихіше"
          - "тихший"
          - "більш тихіше"
        correct: 0
        explanation: Тихо дає тихіше; не змішуємо більш із простою формою.
      - question: "Правильна форма від дорого:"
        options:
          - "дорожче"
          - "дорогше"
          - "дорогіший"
        correct: 0
        explanation: Дорого - дорожче з чергуванням.
      - question: "Правильне речення:"
        options:
          - "Він біжить швидше за мене."
          - "Він біжить швидший за мене."
          - "Він біжить більш швидше за мене."
        correct: 0
        explanation: Біжить описує прислівник швидше.
      - question: "Суплетивна пара прислівника:"
        options:
          - "добре - краще"
          - "добре - добріше"
          - "добре - добрий"
        correct: 0
        explanation: Добре має форму краще.
      - question: "Найвищий ступінь від швидко:"
        options:
          - "найшвидше"
          - "самий швидко"
          - "найбільш найшвидше"
        correct: 0
        explanation: Най- додається до форми швидше.
      - question: "Форма якнайшвидше означає:"
        options:
          - "настільки швидко, наскільки можливо"
          - "трохи швидко"
          - "без швидкості"
        correct: 0
        explanation: Якнай- часто виражає максимальне прагнення.
      - question: "Який прислівник зазвичай не порівнюємо механічно?"
        options:
          - "вчора"
          - "тихо"
          - "точно"
        correct: 0
        explanation: Вчора - прислівник часу, не якісна ознака з мірою.
  - id: act-2
    type: fill-in
    title: Утворіть прислівник
    instruction: "Вставте прислівник або правильну форму порівняння."
    items:
      - sentence: "Вона говорить ____ . (тихий)"
        answer: тихо
        options:
          - тихо
          - тиха
          - тихий
        explanation: Дію говорить описує прислівник тихо.
      - sentence: "Сьогодні вона говорить ____ . (тихо, вищий ступінь)"
        answer: тихіше
        options:
          - тихіше
          - тихіший
          - більш тихіше
        explanation: Прислівникова форма - тихіше.
      - sentence: "Студент відповів ____ . (точний)"
        answer: точно
        options:
          - точно
          - точний
          - точна
        explanation: Точно описує дію відповів.
      - sentence: "Після практики він відповів ____ . (точно, вищий ступінь)"
        answer: точніше
        options:
          - точніше
          - точніший
          - більш точніше
        explanation: Точно - точніше.
      - sentence: "У центрі житло коштує ____ . (дорого, вищий ступінь)"
        answer: дорожче
        options:
          - дорожче
          - дорогше
          - дорожчий
        explanation: Дорого - дорожче.
      - sentence: "Спортсменка стрибнула ____ . (високо, вищий ступінь)"
        answer: вище
        options:
          - вище
          - вища
          - високіше
        explanation: Стрибнула як? - вище.
      - sentence: "Після відпочинку він працює ____ . (добре, вищий ступінь)"
        answer: краще
        options:
          - краще
          - добріше
          - кращий
        explanation: Добре - краще.
      - sentence: "Без сну людина працює ____ . (погано, вищий ступінь)"
        answer: гірше
        options:
          - гірше
          - поганіше
          - гірший
        explanation: Погано - гірше.
      - sentence: "Надішліть відповідь ____ . (якнай + швидко)"
        answer: якнайшвидше
        options:
          - якнайшвидше
          - як найшвидше
          - як-найшвидше
        explanation: Якнайшвидше пишеться разом.
      - sentence: "На уроці ми говоримо ____ . (український)"
        answer: по-українськи
        options:
          - по-українськи
          - по українськи
          - поукраїнськи
        explanation: По-...-ськи пишемо через дефіс.
      - sentence: "Ми ____ звикаємо до нового розкладу. (помалу)"
        answer: помалу
        options:
          - помалу
          - по-малу
          - по малу
        explanation: Помалу пишеться разом.
      - sentence: "Команда підготувалася ____ . (щонай + добре)"
        answer: щонайкраще
        options:
          - щонайкраще
          - що найкраще
          - що-найкраще
        explanation: Щонайкраще пишеться разом.
  - id: act-3
    type: match-up
    title: Ланцюжки порівняння
    instruction: "Поєднайте початковий прислівник із формою вищого ступеня."
    pairs:
      - left: швидко
        right: швидше
      - left: тихо
        right: тихіше
      - left: повільно
        right: повільніше
      - left: точно
        right: точніше
      - left: дорого
        right: дорожче
      - left: близько
        right: ближче
      - left: високо
        right: вище
      - left: низько
        right: нижче
      - left: легко
        right: легше
      - left: добре
        right: краще
      - left: погано
        right: гірше
      - left: часто
        right: частіше
  - id: act-4
    type: group-sort
    title: Спосіб творення
    instruction: "Розподіліть прислівники за способом або правописною моделлю."
    groups:
      - label: "Суфіксальний від прикметника"
        items:
          - швидко
          - тихо
          - точно
      - label: "По-... через дефіс"
        items:
          - по-українськи
          - по-доброму
          - по-новому
      - label: "Разом, не по-...-ому"
        items:
          - помалу
          - потроху
          - позавчора
      - label: "Складання або історична складність"
        items:
          - праворуч
          - мимоволі
          - самохіть
  - id: act-5
    type: error-correction
    title: Редактор прислівників
    instruction: "Виправте одну головну помилку в кожному реченні."
    items:
      - sentence: "Він біжить швидший за мене."
        error: швидший
        correction: швидше
        explanation: Дію біжить описує прислівник швидше.
      - sentence: "Вона відповіла точніша."
        error: точніша
        correction: точніше
        explanation: Відповіла як? - точніше.
      - sentence: "Ми працюємо більш швидше."
        error: більш швидше
        correction: швидше
        explanation: Не змішуємо більш із простою формою швидше.
      - sentence: "На занятті ми говоримо по українськи."
        error: по українськи
        correction: по-українськи
        explanation: По-...-ськи пишемо через дефіс.
      - sentence: "Ми по-малу звикаємо до нового графіка."
        error: по малу
        correction: помалу
        explanation: Помалу пишеться разом.
      - sentence: "Це правило треба пояснити як найпростіше."
        error: як найпростіше
        correction: якнайпростіше
        explanation: Якнай- у підсиленій формі пишеться разом.
      - sentence: "Команда підготувалася що-найкраще."
        error: що найкраще
        correction: щонайкраще
        explanation: Щонай- пишеться разом.
      - sentence: "У центрі все коштує дорогше."
        error: дорогше
        correction: дорожче
        explanation: Дорого - дорожче.
      - sentence: "Після ночі він працює поганіше."
        error: поганіше
        correction: гірше
        explanation: Погано має суплетивну форму гірше.
      - sentence: "Вона стрибнула вища за всіх."
        error: вища
        correction: вище
        explanation: Стрибнула як? - вище.
      - sentence: "Цей сервіс працює найбільш найстабільніше."
        error: найбільш найстабільніше
        correction: найстабільніше
        explanation: Не змішуємо найбільш із простою формою на най-.
      - sentence: "Учора ми прийшли раніший."
        error: раніший
        correction: раніше
        explanation: Прийшли коли? - раніше.
workbook:
  - id: wb-1
    type: quiz
    title: Контроль прислівникових форм
    instruction: "Оберіть правильний варіант."
    items:
      - question: "Правильна форма від добре:"
        options:
          - "краще"
          - "добріше"
          - "кращий"
        correct: 0
        explanation: Добре - краще.
      - question: "Правильна форма від погано:"
        options:
          - "гірше"
          - "поганіше"
          - "гірший"
        correct: 0
        explanation: Погано - гірше.
      - question: "Правильний найвищий ступінь від часто:"
        options:
          - "найчастіше"
          - "найчастіший"
          - "самий часто"
        correct: 0
        explanation: Прислівник має форму найчастіше.
      - question: "Правильний варіант:"
        options:
          - "менш часто"
          - "менш частіше"
          - "менший часто"
        correct: 0
        explanation: Складена форма має менш + початкова форма прислівника.
      - question: "Яке речення має прислівник?"
        options:
          - "Вона говорить тихіше."
          - "Вона тихіша."
          - "Тихіша кімната зліва."
        correct: 0
        explanation: Тихіше описує дію говорить.
      - question: "Яке речення має прикметник?"
        options:
          - "Ця відповідь точніша."
          - "Вона відповіла точніше."
          - "Поясніть точніше."
        correct: 0
        explanation: Точніша описує іменник відповідь.
      - question: "Правильне написання:"
        options:
          - "по-доброму"
          - "по доброму"
          - "подоброму"
        correct: 0
        explanation: По-...-ому пишемо через дефіс.
      - question: "Що не треба порівнювати механічно?"
        options:
          - "по-українськи"
          - "тихо"
          - "часто"
        correct: 0
        explanation: По-українськи не утворює звичайного ступеня порівняння.
      - question: "Правильна форма від високо:"
        options:
          - "вище"
          - "високіше"
          - "вищий"
        correct: 0
        explanation: Високо - вище.
      - question: "Правильна форма від легко:"
        options:
          - "легше"
          - "легчіше"
          - "легший"
        correct: 0
        explanation: Легко - легше.
      - question: "Що означає найменш переконливо?"
        options:
          - "least persuasively"
          - "more persuasively"
          - "the best argument"
        correct: 0
        explanation: Найменш + прислівник означає найнижчу міру ознаки.
      - question: "Правильна підсилена форма:"
        options:
          - "щонайкраще"
          - "що найкраще"
          - "що-найкраще"
        correct: 0
        explanation: Щонайкраще пишеться разом.
  - id: wb-2
    type: fill-in
    title: Вищий і найвищий ступені
    instruction: "Вставте правильну прислівникову форму."
    items:
      - sentence: "Сьогодні я читаю ____ , ніж учора. (швидко)"
        answer: швидше
        options:
          - швидше
          - швидший
          - більш швидше
        explanation: Читаю як? - швидше.
      - sentence: "Вона говорить ____ , ніж раніше. (тихо)"
        answer: тихіше
        options:
          - тихіше
          - тихіша
          - тихше
        explanation: Тихо - тихіше.
      - sentence: "Команда працювала ____ за всіх. (стабільно, найвищий ступінь)"
        answer: найстабільніше
        options:
          - найстабільніше
          - найстабільніша
          - найбільш найстабільніше
        explanation: Най- + стабільніше.
      - sentence: "Цього разу він відповів ____ . (добре, вищий ступінь)"
        answer: краще
        options:
          - краще
          - добріше
          - кращий
        explanation: Добре - краще.
      - sentence: "Без підготовки група виконала завдання ____ . (погано, вищий ступінь)"
        answer: гірше
        options:
          - гірше
          - поганіше
          - гірша
        explanation: Погано - гірше.
      - sentence: "У цьому районі оренда коштує ____ . (дорого, вищий ступінь)"
        answer: дорожче
        options:
          - дорожче
          - дорогше
          - дорожчий
        explanation: Дорого - дорожче.
      - sentence: "Поверніть ____ біля аптеки. (правий)"
        answer: праворуч
        options:
          - праворуч
          - по-правому
          - правіший
        explanation: Праворуч - прислівник місця/напрямку.
      - sentence: "Вона пояснила правило ____ . (по + добрий)"
        answer: по-доброму
        options:
          - по-доброму
          - по доброму
          - подоброму
        explanation: По-...-ому пишемо через дефіс.
      - sentence: "Після вправ я пишу ____ . (точно, вищий ступінь)"
        answer: точніше
        options:
          - точніше
          - точніший
          - більш точніше
        explanation: Прислівникова форма - точніше.
      - sentence: "Ми хочемо завершити роботу ____ . (якнай + швидко)"
        answer: якнайшвидше
        options:
          - якнайшвидше
          - як найшвидше
          - як-найшвидше
        explanation: Якнайшвидше пишеться разом.
      - sentence: "Він тренується ____ вранці. (часто, найвищий ступінь)"
        answer: найчастіше
        options:
          - найчастіше
          - найчастіший
          - самий часто
        explanation: Найчастіше описує дію тренується.
      - sentence: "Ми ____ читаємо складніші тексти. (потроху)"
        answer: потроху
        options:
          - потроху
          - по-троху
          - по троху
        explanation: Потроху пишеться разом.
  - id: wb-3
    type: group-sort
    title: Чи утворює ступені?
    instruction: "Розподіліть прислівники за можливістю звичайного порівняння."
    groups:
      - label: "Звичайно порівнюються"
        items:
          - швидко
          - тихо
          - точно
      - label: "Мають чергування або коротку форму"
        items:
          - дорого
          - високо
          - легко
      - label: "Суплетивні"
        items:
          - добре
          - погано
          - багато
      - label: "Не порівнюємо механічно"
        items:
          - вчора
          - по-українськи
          - праворуч
  - id: wb-4
    type: cloze
    title: Біговий клуб
    instruction: "Заповніть пропуски прислівниками."
    text: "У парку тренер порівнює результати. Олена бігла {1}, ніж учора, а Марко стартував {2}. Ірина стрибнула {3} за всіх і приземлилася {4}. Команда цього тижня тренувалася {5}. Тренер попросив говорити {6}, щоб усі чули інструкції, але пояснювати правила {7}. Після перерви група працювала {8}. У звіті тренер написав, що наймолодші учасники виконали вправу {9}, а досвідчені - {10}. Наступного разу всі мають прийти {11} і підготуватися {12}."
    blanks:
      - id: 1
        answer: швидше
        options:
          - швидше
          - швидший
          - більш швидше
      - id: 2
        answer: раніше
        options:
          - раніше
          - раніший
          - більш раніше
      - id: 3
        answer: вище
        options:
          - вище
          - вища
          - високіше
      - id: 4
        answer: м'якше
        options:
          - м'якше
          - м'якший
          - більш м'якше
      - id: 5
        answer: найчастіше
        options:
          - найчастіше
          - найчастіший
          - самий часто
      - id: 6
        answer: голосніше
        options:
          - голосніше
          - голосніший
          - більш голосніше
      - id: 7
        answer: точніше
        options:
          - точніше
          - точніша
          - більш точніше
      - id: 8
        answer: краще
        options:
          - краще
          - добріше
          - краща
      - id: 9
        answer: найстаранніше
        options:
          - найстаранніше
          - найстаранніший
          - найбільш найстаранніше
      - id: 10
        answer: найстабільніше
        options:
          - найстабільніше
          - найстабільніші
          - найбільш найстабільно
      - id: 11
        answer: раніше
        options:
          - раніше
          - раніший
          - більш раніше
      - id: 12
        answer: щонайкраще
        options:
          - щонайкраще
          - що найкраще
          - що-найкраще
  - id: wb-5
    type: match-up
    title: Термін і пояснення
    instruction: "Поєднайте термін або форму з поясненням."
    pairs:
      - left: прислівник
        right: незмінне слово, що часто описує дію
      - left: суфіксальний спосіб
        right: творення на зразок точний - точно
      - left: по-українськи
