version: '1.0'
module: practice-exam
level: b1
inline:
  - id: act-1
    type: reading
    title: "Читання: мовний клуб"
    text: |
      У міській бібліотеці щочетверга працює мовний клуб для студентів рівня B1. Зустріч має три частини: знайомство, роботу в парах і спільне обговорення. Організатори не виправляють кожну помилку одразу, бо хочуть зберегти природний темп розмови. Після заняття учасники записують дві вдалі фрази й одну тему для повторення. Минулого місяця клуб провів спеціальну зустріч для новачків. Після опитування стало зрозуміло, що їм потрібні реальні ситуації, тому організатори підготували станції з проханням про допомогу, поясненням проблеми й домовленістю про час. Найскладнішою виявилася зміна регістру: не всі могли швидко перейти від розмови з другом до офіційного звернення.
    tasks:
      - Визначте головну мету мовного клубу.
      - Поясніть, чому помилки не виправляють одразу.
      - Назвіть проблему, яка виявилася найскладнішою.
  - id: act-2
    type: quiz
    title: Розуміння тексту
    instruction: Оберіть правильну відповідь.
    items:
      - question: Для чого учасники записують дві вдалі фрази й одну тему для повторення?
        options:
          - text: Щоб поєднати практику говоріння із самодіагностикою.
            correct: true
          - text: Щоб замінити розмову письмовим тестом.
            correct: false
          - text: Щоб організатори могли не готувати наступну зустріч.
            correct: false
        explanation: Запис після зустрічі допомагає помітити сильні місця й прогалини.
      - question: Що змінилося після опитування новачків?
        options:
          - text: Замість звичайної презентації підготували практичні станції.
            correct: true
          - text: Зустріч перенесли до іншої бібліотеки.
            correct: false
          - text: Учасникам заборонили працювати в парах.
            correct: false
        explanation: Опитування показало потребу в реальних ситуаціях.
      - question: Яка проблема була найскладнішою?
        options:
          - text: Перехід між розмовним і офіційним регістром.
            correct: true
          - text: Вимова назви бібліотеки.
            correct: false
          - text: Пошук аудиторії.
            correct: false
        explanation: Текст прямо називає зміну регістру найскладнішою.
  - id: act-3
    type: fill-in
    title: "Аудіювання: деталі транскрипту"
    instruction: Оберіть деталь, яка відповідає оголошенню.
    items:
      - sentence: "Зустріч почнеться завтра о ____ ранку."
        answer: десятій
        options:
          - десятій
          - дев'ятій
          - дванадцятій
          - пів на одинадцяту
        explanation: У транскрипті сказано о десятій ранку.
      - sentence: "Власний текст має бути на ____ слів."
        answer: 150-200
        options:
          - 150-200
          - 50-80
          - 250-300
          - 400
        explanation: Текст потрібен для редагування, не для оцінки.
      - sentence: "Якщо студент не зможе прийти, треба написати координаторці до ____ вечора."
        answer: дев'ятої
        options:
          - дев'ятої
          - десятої
          - восьмої
          - сьомої
        explanation: Це інструкція з кінця оголошення.
      - sentence: "У власному тексті треба знайти три сильні місця й ____ зони повторення."
        answer: дві
        options:
          - дві
          - три
          - чотири
          - одну
        explanation: Транскрипт називає три сильні місця й дві зони.
  - id: act-4
    type: match-up
    title: Формат письма й регістр
    instruction: Поєднайте завдання з найкращим початком.
    pairs:
      - left: Повідомлення другові
        right: Привіт! Хочу запросити тебе на мовний клуб у четвер.
      - left: Офіційний лист
        right: Шановна пані Олено, прошу надіслати матеріали зустрічі.
      - left: Аргументований абзац
        right: На мою думку, пробні екзамени корисні, бо показують реальні прогалини.
      - left: Розповідь
        right: Минулої середи я вперше прийшов на зустріч мовного клубу.
  - id: act-5
    type: essay-response
    title: Письмова відповідь B1
    instruction: Оберіть один формат і напишіть повну відповідь.
    source_reading: act-1
    prompt: "Напишіть 140-180 слів. Варіант 1: офіційний лист координаторці з проханням надіслати матеріали, бо ви не можете прийти на зустріч. Варіант 2: повідомлення другові із запрошенням на мовний клуб. Варіант 3: аргументований абзац про користь пробних екзаменів. Дотримуйтеся регістру."
    min_words: 140
    model_answer: "Шановна пані Олено, добрий день! На жаль, я не зможу прийти на пробну зустріч завтра о десятій, бо маю консультацію в університеті. Прошу надіслати мені матеріали зустрічі або порадити, коли можна виконати завдання самостійно. Я підготував текст на 170 слів і хочу використати його для редагування, тому для мене важливо отримати інструкцію. Також буду вдячний, якщо Ви повідомите, які ситуації для діалогу треба повторити перед наступним заняттям. Перепрошую за незручність і дякую за розуміння. З повагою, Марко Савченко."
  - id: act-6
    type: group-sort
    title: Рубрика говоріння
    instruction: Розподіліть ознаки за рівнем відповіді.
    groups:
      - name: Впевнено
        items:
          - Думка зрозуміла без додаткових пояснень.
          - Є теза, приклад і короткий висновок.
          - Мовець ставить уточнювальне питання партнерові.
      - name: Частково
        items:
          - Відповідь складається переважно з окремих фраз.
          - Мовець уникає складних речень.
          - Потрібні часті підказки, щоб продовжити діалог.
      - name: Потребує повторення
        items:
          - Паузи руйнують основний зміст.
          - Словник не дозволяє втримати тему.
          - Відповідь не реагує на питання партнера.
  - id: act-7
    type: error-correction
    title: Післяекзаменаційне редагування
    instruction: Виправте типові помилки після проби.
    items:
      - sentence: "Я хочу приймати участь у мовному клубі."
        error: "приймати участь"
        answer: "Я хочу брати участь у мовному клубі."
        options:
          - "Я хочу брати участь у мовному клубі."
          - "Я хочу приймати участь у мовному клубі."
          - "Я хочу прийняти участь у мовному клубі."
        explanation: Нормативна конструкція - брати участь.
      - sentence: "Шановна Олена, скиньте мені матеріали."
        error: "скиньте"
        answer: "Шановна пані Олено, прошу надіслати мені матеріали."
        options:
          - "Шановна пані Олено, прошу надіслати мені матеріали."
          - "Шановна Олена, скиньте мені матеріали."
          - "Олено, киньте матеріали офіційно."
        explanation: Офіційний лист потребує кличного відмінка й нейтрального дієслова.
      - sentence: "Якщо б я знав про зустріч, я прийшов би."
        error: "Якщо б"
        answer: "Якби я знав про зустріч, я прийшов би."
        options:
          - "Якби я знав про зустріч, я прийшов би."
          - "Якщо я знав про зустріч, я прийшов би."
          - "Якщо буду знати про зустріч, я прийшов би."
        explanation: Для нереальної умови потрібне якби.
workbook:
  - id: wb-1
    type: reading
    title: "Додаткове читання: після проби"
    text: |
      Після пробного екзамену Андрій не дивився лише на загальний результат. Він розділив помилки за частинами. У читанні він правильно зрозумів основну думку, але пропустив одну причину. В аудіюванні він записав час зустрічі, проте переплутав кількість слів у письмовому тексті. У письмі зміст був повний, але офіційний лист починався занадто розмовно. У говорінні Андрій міг говорити хвилину, але майже не використовував складні речення. Тому він обрав дві наступні дії: тренувати нотатки з числами й написати три офіційні прохання.
    tasks:
      - Назвіть найсильнішу частину Андрія.
      - Назвіть дві конкретні наступні дії.
      - Поясніть, чому загальний результат був би менш корисним.
  - id: wb-2
    type: quiz
    title: Стратегії виконання
    instruction: Оберіть найкращу стратегію.
    items:
      - question: Що робити перед письмом?
        options:
          - text: Визначити адресата, мету, регістр і структуру.
            correct: true
          - text: Одразу писати перше красиве речення.
            correct: false
          - text: Використати один стиль для всіх завдань.
            correct: false
        explanation: Ситуація спілкування керує письмом.
      - question: Що найважливіше під час аудіювання з числами?
        options:
          - text: Робити короткі нотатки й перевіряти деталі під час другого слухання.
            correct: true
          - text: Записувати кожне слово повністю.
            correct: false
          - text: Ігнорувати час і кількість.
            correct: false
        explanation: Числа легко переплутати без нотаток.
  - id: wb-3
    type: fill-in
    title: Письмові формули
    instruction: Оберіть природну форму.
    items:
      - sentence: "____ пані Олено, прошу перенести консультацію."
        answer: Шановна
        options:
          - Шановна
          - Привіт
          - Гей
        explanation: Для офіційного листа потрібне офіційне звертання.
      - sentence: "____ думку, пробний екзамен допомагає побачити прогалини."
        answer: На мою
        options:
          - На мою
          - Для мене як
          - Мене є
        explanation: На мою думку - природна вставна конструкція.
      - sentence: "Дякую ____ розуміння."
        answer: за
        options:
          - за
          - для
          - через
        explanation: Дякувати за щось.
  - id: wb-4
    type: essay-response
    title: Самооцінка після проби
    instruction: Напишіть короткий звіт після виконання чотирьох частин.
    prompt: "Напишіть 160-220 слів. Опишіть результат у читанні, аудіюванні, письмі й говорінні. Для кожної частини назвіть один доказ і одну наступну дію. Використайте слова рубрика, критерій, редагування, регістр, готовність."
    min_words: 160
    model_answer: "Після пробного екзамену я оцінила свою готовність за чотирма частинами. У читанні результат достатній: я зрозуміла головну думку тексту, але не одразу побачила причину зміни формату зустрічі. Наступна дія - тренувати логічні зв'язки. В аудіюванні я правильно записала час, але переплутала кількість слів, тому буду робити коротші нотатки. У письмі моя відповідь виконала завдання, проте регістр був нерівний: офіційний лист мав одну розмовну фразу. Наступна дія - редагування звертань і прохань. У говорінні я говорила майже хвилину, але використовувала мало складних речень. За рубрикою головний критерій для мене - не швидкість, а зрозуміла структура відповіді."
  - id: wb-5
    type: group-sort
    title: Наступні дії
    instruction: Розподіліть дії за частиною екзамену.
    groups:
      - name: Читання
        items:
          - Підкреслити слова однак, тому, отже.
          - Шукати дати, ролі й причини в тексті.
      - name: Аудіювання
        items:
          - Записувати числа й часові межі.
          - Перевіряти інструкції після другого слухання.
      - name: Письмо
        items:
          - Визначити адресата перед чернеткою.
          - Залишити час на редагування регістру.
      - name: Говоріння
        items:
          - Підготувати фрази для уточнення.
          - Додати приклад після тези.
