- title: Литвінова Grade 7, p.30-47
  role: textbook
  notes: Планове джерело для огляду доконаного й недоконаного виду, видових пар і зв'язку виду з часовими формами.
  source_ref: Литвінова Grade 7, p.30-47
- title: Литвінова Grade 7, p.44
  role: textbook
  notes: Планове джерело для зв'язку виду і майбутнього часу; використано для контрасту простого майбутнього доконаного виду та майбутніх форм недоконаного виду.
  source_ref: Литвінова Grade 7, p.44
- title: Заболотний Grade 7, p.54-65
  role: textbook
  notes: Планове джерело для повторення виду дієслова, часових форм і діагностичного вибору виду в реченні.
  source_ref: Заболотний Grade 7, p.54-65
- title: Авраменко Grade 7, p.57-78
  role: textbook
  notes: Планове джерело для видових пар, наказового способу і таблиць дієслівних форм.
  source_ref: Авраменко Grade 7, p.57-78
- title: Local B1 modules M01-M09
  role: curriculum
  notes: "Контрольна робота повторює активні B1 теми: минулий і майбутній час, стосунки, щоденне життя, розповідь, заперечення, робота і кар'єра."
- title: Wiki grammar article for B1 checkpoint-aspect
