version: '1.0'
module: checkpoint-aspect
level: b1
inline:
  - id: act-1
    type: quiz
    title: Тло чи подія
    instruction: Оберіть пояснення видової функції дієслова в реченні.
    items:
      - question: У реченні "Ми снідали, коли зателефонувала бабуся" форма "снідали" показує...
        options:
          - тло розповіді
          - завершену подію
          - конкретний наказ
        correct: 0
        explanation: Недоконаний вид відкриває процес, на тлі якого сталася подія.
      - question: У цьому самому реченні форма "зателефонувала" показує...
        options:
          - подію, яка змінила ситуацію
          - регулярну звичку
          - загальне заперечення
        correct: 0
        explanation: Доконаний вид називає один завершений крок у розповіді.
      - question: Чому в реченні "Олена працювала у відділі продажу три роки" потрібен недоконаний вид?
        options:
          - Бо важлива тривалість досвіду.
          - Бо йдеться про один готовий документ.
          - Бо це майбутній час.
        correct: 0
        explanation: Три роки відкривають період роботи.
      - question: Яке речення найкраще створює подієвий ланцюг?
        options:
          - Він встав, одягнувся, поснідав і вийшов.
          - Він довго снідав і слухав радіо.
          - Він часто вставав рано.
        correct: 0
        explanation: Усі дієслова подані як завершені кроки.
      - question: У реченні "Я писав лист цілий вечір" форма "писав" підкреслює...
        options:
          - процес
          - готовий лист
          - заборону
        correct: 0
        explanation: Цілий вечір підтримує тривалість.
      - question: У реченні "Я написав лист до вечора" форма "написав" підкреслює...
        options:
          - результат
          - звичку
          - одночасне тло
        correct: 0
        explanation: Лист готовий до певної межі.
      - question: Який контекст найкраще підтримує недоконаний вид?
        options:
          - Поки ми обговорювали план, з'явилася нова інформація.
          - Ми обговорили план і підписали документ.
          - До обіду ми обговоримо план.
        correct: 0
        explanation: Поки відкриває процес як тло.
      - question: Яке дієслово природне в реченні "Нарешті я ____ останній розділ"?
        options:
          - прочитав
          - читав
          - читаю
        correct: 0
        explanation: Нарешті підводить до завершення.
      - question: Яка пара найкраще показує процес і результат?
        options:
          - готувати звіт - підготувати звіт
          - звіт - таблиця
          - учора - завтра
        correct: 0
        explanation: Це видова пара з різною аспектною функцією.
      - question: Чому "почав готуватися" має дві різні видові ролі?
        options:
          - Почав називає межу, а готуватися відкриває процес.
          - Обидві форми завжди доконані.
          - Обидві форми завжди наказові.
        correct: 0
        explanation: Початок є завершеним кроком, а підготовка триває.
      - question: Яке речення найкраще описує тло робочої історії?
        options:
          - Я працювала над звітом, коли керівниця зайшла.
          - Я подала резюме і пройшла співбесіду.
          - Я підписала договір у понеділок.
        correct: 0
        explanation: Працювала над звітом є процесом, на тлі якого сталася подія.
      - question: У реченні "Студенти повторювали вид, а наприкінці написали тест" форми показують...
        options:
          - процес підготовки і завершений результат
          - дві однакові звички
          - два заперечні накази
        correct: 0
        explanation: Повторювали відкриває процес, написали закриває подію.
  - id: act-2
    type: fill-in
    title: Майбутній час і наказ
    instruction: Виберіть форму, яка відповідає контексту процесу, регулярності або результату.
    items:
      - sentence: "До п'ятниці я ____ звіт."
        answer: підготую
        options:
          - готуватиму
          - підготую
          - готую
        explanation: Є дедлайн і готовий результат.
      - sentence: "Цілий тиждень я ____ до контрольної."
        answer: готуватимуся
        options:
          - готуватимуся
          - підготуюся
          - підготувався
        explanation: Цілий тиждень відкриває тривалий процес.
      - sentence: "Щодня я ____ короткі нотатки українською."
        answer: писатиму
        options:
          - напишу
          - писатиму
          - написав
        explanation: Щодня підтримує регулярність.
      - sentence: "Завтра я ____ відповідь на лист."
        answer: напишу
        options:
          - писатиму
          - буду писати
          - напишу
        explanation: Йдеться про один готовий текст.
      - sentence: "____ українські тексти щодня."
        answer: Читайте
        options:
          - Читайте
          - Прочитайте
          - Прочитали
        explanation: Це загальна порада, тому потрібен недоконаний наказ.
      - sentence: "____ цей текст до завтра."
        answer: Прочитайте
        options:
          - Читайте
          - Прочитайте
          - Читали
        explanation: Конкретне завдання з терміном підтримує доконаний наказ.
      - sentence: "Не ____ файл без перевірки."
        answer: відкривайте
        options:
          - відкривайте
          - відкрийте
          - відкрили
        explanation: Звичайна заборона тяжіє до недоконаного виду.
      - sentence: "Не ____ ключі вдома."
        answer: забудьте
        options:
          - забувайте
          - забудьте
          - забули
        explanation: Це конкретне попередження про один небажаний результат.
      - sentence: "У новому відділі я ____ з клієнтами."
        answer: працюватиму
        options:
          - попрацюю
          - працюватиму
          - спрацюю
        explanation: Йдеться про майбутню роль і процес.
      - sentence: "Після заняття я ____ мамі."
        answer: зателефоную
        options:
          - телефонуватиму
          - зателефоную
          - телефонував
        explanation: Це один запланований дзвінок.
  - id: act-3
    type: group-sort
    title: Факт чи очікуваний результат
    instruction: Розподіліть речення за тим, що саме заперечено.
    groups:
      - label: Факт дії не відбувся
        items:
          - Я не читав цей текст.
          - Ми не обговорювали план.
          - Вона не телефонувала вчора.
          - Я не писав звіт.
          - Вони не працювали над таблицею.
          - Я не готувала вечерю.
      - label: Очікуваний результат ще не настав
        items:
          - Я ще не прочитав цей текст.
          - Ми ще не обговорили план.
          - Вона ще не зателефонувала.
          - Я ще не написав звіт.
          - Вони ще не заповнили таблицю.
          - Я ще не приготувала вечерю.
  - id: act-4
    type: error-correction
    title: Виправте аспектну помилку
    instruction: Замініть помилкову форму на природну для контексту.
    items:
      - sentence: "Цілий вечір я прочитав статтю, але ще не дійшов до кінця."
        error: прочитав
        correction: читав
        error_type: word
        explanation: Цілий вечір і незавершений процес потребують недоконаного виду.
      - sentence: "Нарешті ми обговорювали план і ухвалили рішення."
        error: обговорювали
        correction: обговорили
        error_type: word
        explanation: Нарешті й рішення показують завершений результат.
      - sentence: "До завтра читайте цей текст повністю."
        error: читайте
        correction: прочитайте
        error_type: word
        explanation: Є конкретне завдання з терміном.
      - sentence: "Не відкрийте документ без дозволу."
        error: відкрийте
        correction: відкривайте
        error_type: word
        explanation: Звичайна заборона потребує недоконаного наказу.
      - sentence: "Я ще не читав звіт, але маю здати висновок сьогодні."
        error: читав
        correction: прочитав
        error_type: word
        explanation: Є очікуваний результат читання.
      - sentence: "Я не написав лист, бо мені його не доручали."
        error: написав
        correction: писав
        error_type: word
        explanation: Контекст заперечує сам процес, а не невиконаний результат.
      - sentence: "Щодня я напишу три речення українською."
        error: напишу
        correction: писатиму
        error_type: word
        explanation: Щодня підтримує регулярну дію.
      - sentence: "Поки ми підготували презентацію, керівниця зайшла."
        error: підготували
        correction: готували
        error_type: word
        explanation: Поки відкриває процес як тло.
  - id: act-5
    type: match-up
    title: Контекст і природна форма
    instruction: Поєднайте ситуацію з природним реченням.
    pairs:
      - left: Друг питає, чи був досвід читання.
        right: Ні, я не читав цей текст.
      - left: Викладач чекає готовий текст.
        right: Я ще не прочитав цей текст.
      - left: Порада для регулярної практики.
        right: Пишіть короткі нотатки щодня.
      - left: Завдання з конкретним результатом.
        right: Напишіть три речення до завтра.
      - left: Тло в минулій розповіді.
        right: Ми вечеряли, коли сусід постукав.
      - left: Подієвий ланцюг у біографії.
        right: Вона подала резюме і пройшла співбесіду.
      - left: Звичайна заборона.
        right: Не відкривайте файл без перевірки.
      - left: Попередження про один небажаний результат.
        right: Не забудьте перевірити дату.
workbook:
  - id: wb-1
    type: quiz
    title: Комплексна діагностика виду
    instruction: Оберіть найкращу форму або пояснення.
    items:
      - question: Яке речення найкраще відповідає питанню "Що відбувалося?"
        options:
          - Ми готували презентацію.
          - Ми підготували презентацію.
          - Ми підготуємо презентацію.
        correct: 0
        explanation: Питання відкриває процес.
      - question: Яке речення найкраще відповідає питанню "Що сталося?"
        options:
          - Колега поставив запитання.
          - Колега ставив запитання щодня.
          - Колега буде ставити запитання.
        correct: 0
        explanation: Доконаний вид називає подію.
      - question: Який варіант природний для дедлайну "до обіду"?
        options:
          - До обіду я перевірю таблицю.
          - До обіду я перевірятиму таблицю.
          - До обіду я перевіряв таблицю.
        correct: 0
        explanation: До обіду очікується готовий результат.
      - question: Який варіант природний для регулярної дії?
        options:
          - Щопонеділка ми обговорюватимемо план.
          - Щопонеділка ми обговоримо план один раз.
          - Щопонеділка ми обговорили план завтра.
        correct: 0
        explanation: Щопонеділка задає повторюваність.
      - question: Яка відповідь нейтрально заперечує факт дзвінка?
        options:
          - Вона не телефонувала.
          - Вона ще не зателефонувала.
          - Вона не зателефонує.
        correct: 0
        explanation: Недоконаний вид заперечує сам факт дії.
      - question: Яка відповідь визнає очікуваний результат?
        options:
          - Я ще не написав відповідь.
          - Я не писав відповідь.
          - Я не пишу відповідь.
        correct: 0
        explanation: Ще не + доконаний вид показує, що результат очікується.
      - question: Яка форма є загальною порадою?
        options:
          - Повторюйте видові пари щодня.
          - Повторіть цю пару зараз.
          - Повторили цю пару.
        correct: 0
        explanation: Недоконаний наказ підтримує звичку.
      - question: Яка форма є конкретною командою?
        options:
          - Випишіть п'ять дієслів.
          - Виписуйте дієслова частіше.
          - Виписували дієслова.
        correct: 0
        explanation: Є конкретний результат.
      - question: Яке речення має гіпотетичну регулярну дію?
        options:
          - Якби я жив у Києві, я ходив би в театр щотижня.
          - Якби я переїхав до Києва, я знайшов би роботу.
          - Якби я підписав договір, я почав би роботу.
        correct: 0
        explanation: Щотижня підтримує повторюваність.
      - question: Яке речення має гіпотетичний результат?
        options:
          - Якби вона зателефонувала, я б відповів.
          - Якби вона дзвонила щовечора, я б відповідав.
          - Якби вона працювала тут, ми б бачилися частіше.
        correct: 0
        explanation: Один дзвінок і одна відповідь подані як завершені кроки.
      - question: Що найкраще пояснює пару "не писав" і "ще не написав"?
        options:
          - Перше заперечує процес, друге очікуваний результат.
          - Обидва варіанти завжди означають одне й те саме.
          - Перше завжди майбутнє, друге завжди теперішнє.
        correct: 0
        explanation: Вид у запереченні залежить від того, що саме заперечено.
      - question: Яке речення найкраще поєднує тло і подію?
        options:
          - Поки ми повторювали вид, викладач дав нове завдання.
          - Ми повторили вид і закрили підручник.
          - Ми будемо повторювати вид завтра.
        correct: 0
        explanation: Поки відкриває тло, а дав називає подію.
  - id: wb-2
    type: fill-in
    title: Вид у всіх контекстах
    instruction: Доповніть речення природною формою.
    items:
      - sentence: "Коли ми ____ план, керівниця зайшла до кімнати."
        answer: обговорювали
        options:
          - обговорили
          - обговорювали
          - обговоримо
        explanation: Коли тут відкриває тло процесу.
      - sentence: "Після наради ми ____ план і розіслали його команді."
        answer: обговорили
        options:
          - обговорювали
          - обговорили
          - обговорюємо
        explanation: План уже має результат.
      - sentence: "До завтра я ____ короткий звіт."
        answer: напишу
        options:
          - писатиму
          - напишу
          - писав
        explanation: До завтра потрібен готовий текст.
      - sentence: "У липні я ____ українські тексти щовечора."
        answer: читатиму
        options:
          - прочитаю
          - читатиму
          - прочитав
        explanation: Щовечора означає регулярність.
      - sentence: "____ вправу номер три."
        answer: Зробіть
        options:
          - Робіть
          - Зробіть
          - Робили
        explanation: Це конкретне завдання.
      - sentence: "____ вправи регулярно, а не тільки перед тестом."
        answer: Робіть
        options:
          - Робіть
          - Зробіть
          - Зробили
        explanation: Регулярно підтримує недоконаний наказ.
      - sentence: "Я ____ цей фільм; не знаю його сюжету."
        answer: не дивився
        options:
          - не дивився
          - ще не подивився
          - не подивлюся
        explanation: Йдеться про факт досвіду.
      - sentence: "Я ____ цей фільм до зустрічі; перегляну ввечері."
        answer: ще не подивився
        options:
          - не дивився
          - ще не подивився
          - не дивлюся
        explanation: Є очікуваний результат до зустрічі.
      - sentence: "Якби вона ____ щодня, результат був би кращий."
        answer: тренувалася
        options:
          - потренувалася
          - тренувалася
          - натренувала
        explanation: Щодня підтримує повторюваний процес.
      - sentence: "Якби вона ____ цей лист учора, ми б уже мали відповідь."
        answer: надіслала
        options:
          - надсилала
          - надіслала
          - надсилає
        explanation: Один результат у гіпотетичній ситуації.
  - id: wb-3
    type: error-correction
    title: Помилки в контрольній роботі
    instruction: Знайдіть аспектну помилку й подайте природну форму.
    items:
      - sentence: "Коли я написав домашнє завдання, подруга подзвонила."
        error: написав
        correction: писав
        error_type: word
        explanation: Подруга подзвонила під час процесу, тому потрібне тло.
      - sentence: "Нарешті я читав текст до кінця."
        error: читав
        correction: прочитав
        error_type: word
        explanation: Нарешті й до кінця вимагають результату.
      - sentence: "Щодня буду прочитати одну сторінку."
        error: прочитати
        correction: читати
        error_type: word
        explanation: Буду + інфінітив потребує недоконаного виду.
      - sentence: "До ранку я буду писати лист і надішлю його."
        error: буду писати
        correction: напишу
        error_type: phrase
        explanation: До ранку і надсилання показують готовий лист як результат.
      - sentence: "Не закрийте програму без збереження."
        error: закрийте
        correction: закривайте
        error_type: word
        explanation: Це звичайна заборона.
      - sentence: "Пишіть цю заяву до кінця заняття."
        error: Пишіть
        correction: Напишіть
        error_type: word
        explanation: Є конкретне завдання з терміном.
      - sentence: "Ми не вирішили це питання, бо воно не було на порядку денному."
        error: вирішили
        correction: вирішували
        error_type: word
        explanation: Контекст заперечує сам процес обговорення або рішення.
      - sentence: "Вона ще не телефонувала, хоча домовилася повідомити результат."
        error: телефонувала
        correction: зателефонувала
        error_type: word
        explanation: Очікується один результативний дзвінок.
  - id: wb-4
    type: group-sort
    title: Чотири видові функції
    instruction: Розподіліть речення за функцією виду.
    groups:
      - label: Тло або процес
        items:
          - Ми вечеряли, коли почалася розмова.
          - Вона працювала над резюме цілий вечір.
          - Я читав статтю в метро.
      - label: Подія або результат
        items:
          - Ми підписали договір у понеділок.
          - Вона подала резюме вранці.
          - Я прочитав статтю до кінця.
      - label: Загальна інструкція або заборона
        items:
          - Читайте українською щодня.
          - Не відкривайте листи від незнайомих адрес.
          - Перевіряйте контекст перед відповіддю.
      - label: Конкретне завдання або попередження
        items:
          - Прочитайте текст до завтра.
          - Не забудьте додати файл.
          - Напишіть відповідь на перше запитання.
  - id: wb-5
    type: match-up
    title: Видові пари і контекст
    instruction: Поєднайте форму з її типовою функцією.
    pairs:
      - left: читати
        right: процес читання або звичка
      - left: прочитати
        right: завершити текст до результату
      - left: писати
        right: бути в процесі створення тексту
      - left: написати
        right: створити готовий текст
      - left: готувати
        right: виконувати підготовку як процес
      - left: підготувати
        right: довести підготовку до готового стану
      - left: телефонувати
        right: здійснювати дзвінок як процес або факт
      - left: зателефонувати
        right: зробити один результативний дзвінок
      - left: обговорювати
        right: вести розмову над питанням
      - left: обговорити
        right: дійти до результату розмови
  - id: wb-6
    type: true-false
    title: Правда чи ні
    instruction: Визначте, чи правильне пояснення.
    items:
      - statement: "У реченні 'Я читав лист цілий вечір' недоконаний вид показує процес."
        correct: true
        explanation: Цілий вечір підсилює тривалість.
      - statement: "У реченні 'Я прочитав лист до кінця' доконаний вид показує результат."
        correct: true
        explanation: До кінця називає межу.
      - statement: "Форма 'буду написати' є нормальною формою майбутнього часу."
        correct: false
        explanation: "Буду поєднується з недоконаним інфінітивом: буду писати."
      - statement: "Форма 'писатиму' може показувати майбутній процес або регулярну дію."
        correct: true
        explanation: Це синтетична форма майбутнього недоконаного виду.
      - statement: "Заперечний наказ 'не відкривайте' природний для загальної заборони."
        correct: true
        explanation: Заборони тяжіють до недоконаного наказу.
      - statement: "Заперечний наказ 'не відкрийте випадково' може бути попередженням."
        correct: true
        explanation: Доконаний вид тут фокусує небажаний результат.
      - statement: "Речення 'Я не читав текст' завжди означає, що текст був моїм завданням."
        correct: false
        explanation: Воно нейтрально заперечує факт читання.
      - statement: "Речення 'Я ще не прочитав текст' показує, що результат очікується."
        correct: true
        explanation: Ще не + доконаний вид підкреслює незавершений результат.
      - statement: "В умовному реченні 'якби дзвонила щовечора' недоконаний вид підтримує повторюваність."
        correct: true
        explanation: Щовечора задає регулярну рамку.
      - statement: "У подієвому ланцюгу всі дієслова зазвичай відкривають тло."
        correct: false
        explanation: Подієвий ланцюг зазвичай рухається завершеними кроками.
  - id: wb-7
    type: order
    title: Розповідь із тлом і подіями
    instruction: Розташуйте речення так, щоб вийшла природна історія.
    items:
      - Уранці я працював над звітом.
      - За вікном ішов дощ, а в офісі було тихо.
      - Раптом керівниця зайшла до кімнати.
      - Вона поставила кілька запитань про таблицю.
      - Я швидко відкрив файл і показав дані.
      - Ми обговорили дві помилки.
      - Після розмови я виправив таблицю.
      - До обіду я надіслав готовий звіт.
    correct_order:
      - 1
      - 0
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
  - id: wb-8
    type: odd-one-out
    title: Знайдіть зайву форму
    instruction: Оберіть форму, яка не відповідає аспектній логіці групи.
    items:
      - words:
          - читав
          - писав
          - готував
          - прочитав
        correct: 3
        explanation: Перші три форми недоконані, а прочитав доконана.
      - words:
          - написала
          - підготувала
          - зателефонувала
          - телефонувала
        correct: 3
        explanation: Телефонувала є недоконаною формою серед доконаних.
      - words:
          - читатиму
          - писатиму
          - готуватимуся
          - прочитаю
        correct: 3
        explanation: Прочитаю є доконаним майбутнім результатом.
      - words:
          - напишу
          - прочитаю
          - підготую
          - буду писати
        correct: 3
        explanation: Буду писати є майбутнім недоконаного виду.
      - words:
          - читайте
          - пишіть
          - перевіряйте
          - напишіть
        correct: 3
        explanation: Напишіть є конкретним доконаним наказом.
      - words:
          - зробіть
          - прочитайте
          - підготуйте
          - робіть
        correct: 3
        explanation: Робіть є недоконаним наказом.
      - words:
          - не читав
          - не писав
          - не обговорювали
          - ще не написав
        correct: 3
        explanation: Ще не написав фокусує очікуваний результат.
      - words:
          - ще не прочитав
          - ще не підготувала
          - ще не зателефонували
          - не телефонували
        correct: 3
        explanation: Не телефонували заперечує факт дії.
  - id: wb-9
    type: translate
    title: Переклад без кальки виду
    instruction: Оберіть природний український варіант.
    items:
      - source: I read the text all evening.
        options:
          - text: Я читав текст цілий вечір.
            correct: true
          - text: Я прочитав текст цілий вечір.
            correct: false
        explanation: Тривалість підтримує недоконаний вид.
      - source: I read the text by the end.
        options:
          - text: Я прочитав текст до кінця.
            correct: true
          - text: Я читав текст до кінця.
            correct: false
        explanation: До кінця називає результат.
      - source: Tomorrow I will write the answer.
        options:
          - text: Завтра я напишу відповідь.
            correct: true
          - text: Завтра я буду написати відповідь.
            correct: false
        explanation: Для результату потрібна доконана форма майбутнього.
      - source: I will write notes every day.
        options:
          - text: Я писатиму нотатки щодня.
            correct: true
          - text: Я напишу нотатки щодня.
            correct: false
        explanation: Щодня підтримує регулярність.
      - source: Read this text by tomorrow.
        options:
          - text: Прочитайте цей текст до завтра.
            correct: true
          - text: Читайте цей текст до завтра.
            correct: false
        explanation: Конкретне завдання з терміном.
      - source: Read more in Ukrainian.
        options:
          - text: Читайте більше українською.
            correct: true
          - text: Прочитайте більше українською.
            correct: false
        explanation: Це загальна порада.
      - source: I have not written the report yet.
        options:
          - text: Я ще не написав звіт.
            correct: true
          - text: Я ще не писав звіт.
            correct: false
        explanation: Очікується готовий звіт.
      - source: I did not work on that report.
        options:
          - text: Я не працював над тим звітом.
            correct: true
          - text: Я ще не попрацював над тим звітом.
            correct: false
        explanation: Йдеться про відсутність процесу роботи.
  - id: wb-10
    type: cloze
    title: Мініісторія з видовими пропусками
    instruction: Оберіть форми, які найкраще відповідають історії.
    text: "Учора я {готував|підготував|приготую} короткий звіт, коли колега {поставив|ставив|ставитиме} запитання про таблицю. Ми швидко {обговорили|обговорювали|будемо обговорювати} проблему, але я ще не {виправив|виправляв|виправлятиму} всі дані. До обіду я {виправлю|виправлятиму|виправляв} таблицю і {надішлю|надсилатиму|надсилав} готовий файл керівниці. Вона сказала: '{Перевірте|Перевіряйте|Перевіряли} цифри ще раз і не {змінюйте|змініть|змінили} формули без потреби'."
  - id: wb-11
    type: essay-response
    title: Письмова самоперевірка
    instruction: Напишіть коротку відповідь і використайте вид свідомо.
    prompt: "Напишіть 140-180 слів українською. Частина 1: розкажіть про минулий тиждень, використавши принаймні чотири недоконані форми для тла або процесу і чотири доконані форми для подій. Частина 2: складіть три пари наказів: загальна порада і конкретне завдання. Частина 3: додайте два умовні речення: одне з регулярною гіпотетичною дією, одне з одноразовим результатом."
    min_words: 140
    evaluation_criteria:
      - Є чітка різниця між тлом і подіями.
      - Майбутній час або наказ не змішують процес і результат.
      - Заперечення з не / ще не пояснене контекстом.
      - Умовні речення не вводять зайво складної граматики.
