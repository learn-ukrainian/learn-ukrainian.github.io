- lemma: доконаний вид
  translation: perfective aspect
  pos: phrase
  usage: Доконаний вид показує результат або завершену подію.
- lemma: недоконаний вид
  translation: imperfective aspect
  pos: phrase
  usage: Недоконаний вид показує процес, тривалість або повторюваність.
- lemma: видова пара
  translation: aspectual pair
  pos: phrase
  usage: Писати і написати утворюють видову пару.
- lemma: тло розповіді
  translation: narrative background
  pos: phrase
  usage: У реченні «Ми вечеряли, коли він прийшов» форма вечеряли створює тло розповіді.
- lemma: послідовність подій
  translation: sequence of events
  pos: phrase
