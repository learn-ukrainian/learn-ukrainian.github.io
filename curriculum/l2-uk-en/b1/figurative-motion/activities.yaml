version: '1.0'
module: figurative-motion
level: b1
inline:
  - id: act-1
    type: quiz
    title: Пряме чи переносне?
    instruction: Визначте, як ужито дієслово руху.
    items:
      - question: "Птах летить над річкою."
        options:
          - пряме значення
          - переносне значення
          - фразеологізм
        correct: 0
        explanation: Птах справді рухається в повітрі.
      - question: "Час летить на канікулах."
        options:
          - переносне значення
          - пряме значення
          - форма наказового способу
        correct: 0
        explanation: Час не має крил; летить означає швидко минає.
      - question: "Човен пливе до пристані."
        options:
          - пряме значення
          - переносне значення
          - калька
        correct: 0
        explanation: Човен справді рухається водою.
      - question: "Хмари пливуть над містом."
        options:
          - переносне значення
          - пряме значення
          - помилкова форма
        correct: 0
        explanation: Хмари не пливуть водою; це образ плавного руху.
      - question: "Дощ іде зранку."
        options:
          - переносне значення
          - пряме значення
          - форма від їхати
        correct: 0
        explanation: Дощ не ходить ногами, але це природний український вислів.
      - question: "Студенти йдуть до аудиторії."
        options:
          - пряме значення
          - переносне значення
          - фразеологізм
        correct: 0
        explanation: Студенти реально рухаються пішки.
      - question: "Переговори йдуть уже третю годину."
        options:
          - переносне значення
          - пряме значення
          - помилка керування
        correct: 0
        explanation: Переговори тривають; це не буквальний рух.
      - question: "Плавець пливе до фінішу."
        options:
          - пряме значення
          - переносне значення
          - розмовний фразеологізм
        correct: 0
        explanation: Плавець реально рухається у воді.
      - question: "Новина облетіла місто."
        options:
          - переносне значення
          - пряме значення
          - буквальний маршрут літака
        correct: 0
        explanation: Новина швидко поширилася, а не летіла фізично.
      - question: "Рейс вилетів з Києва о сьомій."
        options:
          - пряме значення
          - переносне значення
          - калька
        correct: 0
        explanation: Рейс пов'язаний із реальним польотом.
      - question: "Мені прийшла ідея."
        options:
          - переносне значення
          - пряме значення
          - помилка узгодження
        correct: 0
        explanation: Ідея не рухалася ногами; вона з'явилася в думках.
      - question: "Не води мене за ніс."
        options:
          - фразеологізм
          - пряме значення
          - офіційний термін
        correct: 0
        explanation: Це сталий вислів зі значенням обманювати.
  - id: act-2
    type: fill-in
    title: Природний руховий образ
    instruction: Заповніть пропуск природною формою.
    items:
      - sentence: "Надворі ____ сильний дощ. (іти)"
        answer: йде
        options:
          - йде
          - ходить
          - їде
        explanation: Для погоди нейтрально кажемо йде дощ.
      - sentence: "На канікулах час ____ дуже швидко. (летіти)"
        answer: летить
        options:
          - летить
          - літає
          - їде
        explanation: Швидкий плин часу - час летить.
      - sentence: "У кінотеатрі зараз ____ новий фільм. (іти)"
        answer: іде
        options:
          - іде
          - ходить
          - біжить
        explanation: Фільм іде означає фільм у програмі або на екрані.
      - sentence: "Після обговорення ми ____ до висновку. (дійти)"
        answer: дійшли
        options:
          - дійшли
          - зайшли
          - прилетіли
        explanation: До висновку доходять.
      - sentence: "Цей час мені не ____. (підходити)"
        answer: підходить
        options:
          - підходить
          - приходить
          - відходить
        explanation: Підходить означає пасує або придатний.
      - sentence: "Новина швидко ____ весь офіс. (облетіти)"
        answer: облетіла
        options:
          - облетіла
          - обійшла
          - обпливла
        explanation: Облетіла підкреслює швидке поширення.
      - sentence: "Хмари повільно ____ над річкою. (пливти)"
        answer: пливуть
        options:
          - пливуть
          - плавають
          - летять
        explanation: Хмари пливуть - образ плавного руху.
      - sentence: "У статті ____ про культуру мовлення. (йтися)"
        answer: йдеться
        options:
          - йдеться
          - йде
          - ходиться
        explanation: Йдеться про - нейтральна безособова конструкція.
      - sentence: "Ціни ____ за один місяць. (злетіти)"
        answer: злетіли
        options:
          - злетіли
          - полетіли
          - літали
        explanation: Різке підвищення - ціни злетіли.
      - sentence: "Ми ____ без таксі. (обійтися)"
        answer: обійдемося
        options:
          - обійдемося
          - обійдемо
          - об'їдемо
        explanation: Обійтися без чогось означає впоратися без цього.
      - sentence: "Керівник ____ відповідальність за рішення. (нести)"
        answer: несе
        options:
          - несе
          - носить
          - веде
        explanation: Сталий вислів - нести відповідальність.
      - sentence: "Від цієї пісні мурашки ____ по шкірі. (бігти)"
        answer: біжать
        options:
          - біжать
          - ходять
          - їдуть
        explanation: Мурашки біжать по шкірі - сталий образ відчуття.
  - id: act-3
    type: match-up
    title: Вираз і значення
    instruction: Поєднайте переносний вираз із найближчим тлумаченням.
    pairs:
      - left: час іде
        right: час нейтрально минає
      - left: час летить
        right: час минає дуже швидко
      - left: час пливе
        right: час минає повільно й плавно
      - left: дощ іде
        right: триває дощова погода
      - left: фільм іде
        right: фільм зараз у програмі або на екрані
      - left: справи йдуть добре
        right: ситуація розвивається успішно
      - left: йдеться про безпеку
        right: тема - безпека
      - left: вийшло
        right: вдалося або дало результат
      - left: підходить
        right: пасує або є придатним
      - left: дійти до висновку
        right: сформувати рішення після міркування
      - left: обійтися без словника
        right: впоратися без словника
      - left: водити за ніс
        right: обманювати або не говорити правду
  - id: act-4
    type: group-sort
    title: Сфери переносного руху
    instruction: Розподіліть вирази за сферою значення.
    groups:
      - label: "Погода і час"
        items:
          - йде дощ
          - час іде
          - літо йде до кінця
      - label: "Події і процеси"
        items:
          - урок іде
          - переговори йдуть
          - справи йдуть добре
      - label: "Швидкість і поширення"
        items:
          - час летить
          - новина облетіла місто
          - ціни злетіли
      - label: "Плавність і відчуття"
        items:
          - хмари пливуть
          - думки пливуть
          - мурашки біжать по шкірі
  - id: act-5
    type: error-correction
    title: Калька чи природний вислів?
    instruction: Виправте одну помилку або неприродний вибір у кожному реченні.
    items:
      - sentence: "Сьогодні дощ ходить весь день."
        error: ходить
        correction: "Сьогодні дощ іде весь день."
        explanation: Для погоди природна формула - дощ іде, не дощ ходить.
      - sentence: "У тексті ходиться про культуру мовлення."
        error: ходиться
        correction: "У тексті йдеться про культуру мовлення."
        explanation: Нейтральна безособова форма - йдеться про.
      - sentence: "На канікулах час літає дуже швидко."
        error: літає
        correction: "На канікулах час летить дуже швидко."
        explanation: Про швидкий плин часу кажемо час летить.
      - sentence: "Хмари плавають над містом."
        error: плавають
        correction: "Хмари пливуть над містом."
        explanation: Для образу плавного руху хмар природне пливуть.
      - sentence: "Фільм ходить у кінотеатрі вже тиждень."
        error: ходить
        correction: "Фільм іде у кінотеатрі вже тиждень."
        explanation: Фільм іде означає він у програмі.
      - sentence: "Справи є добре після відпустки."
        error: є
        correction: "Справи йдуть добре після відпустки."
        explanation: Ситуація розвивається - справи йдуть.
      - sentence: "Після розмови ми зайшли до висновку."
        error: зайшли
        correction: "Після розмови ми дійшли до висновку."
        explanation: До висновку доходять.
      - sentence: "Цей варіант мені не приходить."
        error: приходить
        correction: "Цей варіант мені не підходить."
        explanation: Підходить означає пасує або придатний.
      - sentence: "У нас не зайшло підготувати все вчасно."
        error: не зайшло
        correction: "У нас не вийшло підготувати все вчасно."
        explanation: Не вийшло означає не вдалося.
      - sentence: "Команда носить переговори з партнерами."
        error: носить
        correction: "Команда веде переговори з партнерами."
        explanation: Переговори ведуть.
      - sentence: "Вулиця веде ім'я Лесі Українки."
        error: веде
        correction: "Вулиця носить ім'я Лесі Українки."
        explanation: Сталий вислів - носити ім'я.
      - sentence: "Не носи мене за ніс."
        error: носи
        correction: "Не води мене за ніс."
        explanation: Сталий вираз - водити за ніс.
workbook:
  - id: wb-1
    type: quiz
    title: Найприродніший варіант
    instruction: Оберіть природний український вислів для ситуації.
    items:
      - question: "Про звичайну дощову погоду скажемо:"
        options:
          - йде дощ
          - дощ ходить
          - дощ їде
        correct: 0
        explanation: Йде дощ - нейтральна формула погоди.
      - question: "Про швидкі канікули скажемо:"
        options:
          - канікули пролетіли
          - канікули плавали
          - канікули ходили
        correct: 0
        explanation: Пролетіли означає минули дуже швидко.
      - question: "Про тему статті найкраще нейтрально сказати:"
        options:
          - у статті йдеться про освіту
          - стаття ходить про освіту
          - стаття їде про освіту
        correct: 0
        explanation: Йдеться про називає тему.
      - question: "Про різке підвищення цін скажемо:"
        options:
          - ціни злетіли
          - ціни попливли
          - ціни ходили
        correct: 0
        explanation: Злетіли підкреслює різке підвищення.
      - question: "Про повільний спокійний день скажемо:"
        options:
          - час пливе
          - час їде
          - час носить
        correct: 0
        explanation: Пливе додає плавність і повільність.
      - question: "Про успішний розвиток ситуації скажемо:"
        options:
          - справи йдуть добре
          - справи стоять добре
          - справи сидять добре
        correct: 0
        explanation: Справи йдуть добре - природний вислів.
      - question: "Про придатний час зустрічі скажемо:"
        options:
          - цей час мені підходить
          - цей час мене підлітає
          - цей час мене везе
        correct: 0
        explanation: Підходить означає пасує.
      - question: "Про результат, який вдався, скажемо:"
        options:
          - усе вийшло
          - усе вийшло з кімнати
          - усе ходило
        correct: 0
        explanation: Вийшло переносно означає вдалося.
      - question: "Про ухвалене після міркування рішення скажемо:"
        options:
          - ми дійшли до висновку
          - ми зайшли у висновок
          - ми відпливли до висновку
        correct: 0
        explanation: До висновку доходять.
      - question: "Про відповідальність керівника скажемо:"
        options:
          - керівник несе відповідальність
          - керівник веде відповідальність
          - керівник їде відповідальність
        correct: 0
        explanation: Сталий вислів - нести відповідальність.
      - question: "Про переговорний процес скажемо:"
        options:
          - вести переговори
          - носити переговори
          - плавати переговори
        correct: 0
        explanation: Переговори ведуть.
      - question: "Про обман у розмові можна сказати:"
        options:
          - водити за ніс
          - вести за руку
          - нести за плечі
        correct: 0
        explanation: Водити за ніс - фразеологізм.
  - id: wb-2
    type: match-up
    title: Префіксальна метафора
    instruction: Поєднайте форму з типовим переносним значенням.
    pairs:
      - left: вийшло
        right: вдалося, дало результат
      - left: не вийшло
        right: не вдалося
      - left: підходить
        right: пасує або є придатним
      - left: дійти до висновку
        right: сформувати рішення після міркування
      - left: дійти згоди
        right: домовитися після обговорення
      - left: зайти надто далеко
        right: перейти небажану межу
      - left: обійтися без цього
        right: впоратися без цього
      - left: прийшла ідея
        right: ідея з'явилася
      - left: прийшов час
        right: настав момент
      - left: пролетіли вихідні
        right: вихідні минули дуже швидко
      - left: злетіли ціни
        right: ціни різко підвищилися
      - left: облетіла новина
        right: новина швидко поширилася
  - id: wb-3
    type: group-sort
    title: Пряме і переносне в контексті
    instruction: Розподіліть речення за типом уживання.
    groups:
      - label: "Прямий рух"
        items:
          - студент іде до аудиторії
          - літак летить до Відня
          - човен пливе до берега
      - label: "Час і події"
        items:
          - час іде
          - концерт іде
          - канікули пролетіли
      - label: "Абстрактні результати"
        items:
          - план вийшов
          - варіант підходить
          - ми дійшли до висновку
      - label: "Образи і фразеологізми"
        items:
          - думки пливуть
          - мурашки біжать по шкірі
          - водити за ніс
  - id: wb-4
    type: fill-in
    title: Форми в реченні
    instruction: Заповніть пропуск правильною формою.
    items:
      - sentence: "Учора весь день ____ сніг. (іти)"
        answer: ішов
        options:
          - ішов
          - ходив
          - їхав
        explanation: Про сніг у минулому - ішов сніг.
      - sentence: "На зустрічі ____ про новий бюджет. (йтися)"
        answer: йшлося
        options:
          - йшлося
          - ходилося
          - їхалося
        explanation: "У минулому: йшлося про."
      - sentence: "Після довгої паузи мені ____ ідея. (прийти)"
        answer: прийшла
        options:
          - прийшла
          - підійшла
          - зайшла
        explanation: Ідея прийшла - з'явилася в думках.
      - sentence: "Розмова ____ надто далеко. (зайти)"
        answer: зайшла
        options:
          - зайшла
          - вийшла
          - відлетіла
        explanation: Зайшла надто далеко - перейшла межу.
      - sentence: "Ми ____ без перекладача. (обійтися)"
        answer: обійшлися
        options:
          - обійшлися
          - обійшли
          - об'їхалися
        explanation: Обійтися без когось - впоратися без нього.
      - sentence: "Увечері думки вже ____ додому. (пливти)"
        answer: пливли
        options:
          - пливли
          - плавали
          - їхали
        explanation: Думки пливли - образ втоми або плавного руху думок.
      - sentence: "За тиждень новина ____ всю групу. (облетіти)"
        answer: облетіла
        options:
          - облетіла
          - обійшла
          - обпливла
        explanation: Облетіла означає швидко поширилася.
      - sentence: "Після ремонту квартира ____ дуже затишною. (вийти)"
        answer: вийшла
        options:
          - вийшла
          - зайшла
          - прийшла
        explanation: Вийшла затишною - отримала такий результат.
      - sentence: "Цей приклад ____ для B1. (підходити)"
        answer: підходить
        options:
          - підходить
          - приходить
          - переходить
        explanation: Підходить означає придатний.
      - sentence: "Від цієї історії мурашки ____ по спині. (бігти)"
        answer: біжать
        options:
          - біжать
          - бігають
          - ходять
        explanation: Сталий образ - мурашки біжать.
      - sentence: "Вулиця ____ ім'я Франка. (носити)"
        answer: носить
        options:
          - носить
          - несе
          - веде
        explanation: Вулиця носить ім'я.
      - sentence: "Усе ____ краще, ніж ми думали. (вийти)"
        answer: вийшло
        options:
          - вийшло
          - прийшло
          - зійшло
        explanation: Вийшло краще - результат був кращий.
  - id: wb-5
    type: cloze
    title: Тиждень без буквальної подорожі
    instruction: Заповніть пропуски природними формами дієслів руху.
    text: "У понеділок зранку {1} дощ, і час {2} дуже повільно. На першій зустрічі {3} про новий проєкт, але рішення ще не {4}. У вівторок справи {5} краще: нам {6} ідея і ми {7} до висновку, що можна {8} без додаткового бюджету. У середу новина {9} весь офіс, ціни на матеріали різко {10}, а дедлайн наблизився. У п'ятницю час уже {11}, і ввечері думки спокійно {12} додому."
    blanks:
      - id: 1
        answer: йшов
        options:
          - йшов
          - ходив
