- title: "Авраменко 5 клас, §10"
  role: textbook
  notes: "Планове джерело для прямого й переносного значення, діалогу про фразу `піде дощ` і багатозначність дієслова йти."
  source_ref: "5-klas-ukrmova-avramenko-2022, p.27"
- title: "Вашуленко 2 клас, с.80"
  role: textbook
  notes: "Вправа з моделями `іде катер`, `іде поїзд`, `іде зима`, `іде час`, `іде концерт` і близькими дієсловами."
  source_ref: "2-klas-ukrmova-vashulenko-2019-1, p.80"
- title: "Авраменко 10 клас, лексична норма"
  role: textbook
  notes: "Пояснення багатозначності дієслова `летіти`, зокрема переносного значення швидкого плину часу."
  source_ref: "10-klas-ukrajinska-mova-avramenko-2018, p.18-38"
- title: "Заболотний 5 клас, переносне значення"
  role: textbook
  notes: "Підтримка розрізнення прямого й переносного значення, зокрема контраст `пливе думка` / `пливе корабель`."
  source_ref: "5-klas-ukrmova-zabolotnyi-2023, p.22"
