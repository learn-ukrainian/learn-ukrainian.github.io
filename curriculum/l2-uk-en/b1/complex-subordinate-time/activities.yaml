  - id: wb-4
    type: true-false
    title: Правда чи неправда про часові речення
    instruction: "Визначте, чи правильне твердження."
    items:
      - statement: "Часова підрядна частина стосується всієї головної частини, а не лише іменника."
        correct: true
        explanation: "Вона відповідає на питання коли? доки? відколи? до головної події."
      - statement: "У реченні День, коли ми зустрілися, був сонячним підрядна частина є часовою обставинною."
        correct: false
        explanation: "Це означальна частина, бо описує іменник день."
      - statement: "Поки часто відкриває часовий проміжок для іншої дії."
        correct: true
        explanation: "Поки я читав, вона готувала чай."
      - statement: "Щойно зазвичай підкреслює безпосередню послідовність."
        correct: true
        explanation: "Щойно він зайшов, усі замовкли."
      - statement: "Після того як не поєднується з незавершеним процесом у значенні поки."
        correct: false
        explanation: "Тут краще поки/коли + недоконаний вид."
      - statement: "Поки не часто означає межу типу доки не."
        correct: true
        explanation: "Чекай, поки не завершиться завантаження."
      - statement: "У майбутніх часових реченнях українська може вживати майбутню форму: коли приїдеш."
        correct: true
        explanation: "Коли приїдеш, зателефонуй - нормальна українська модель."
      - statement: "Кома не потрібна, якщо підрядна частина коротка."
        correct: false
        explanation: "Кома потрібна незалежно від довжини підрядної частини."
      - statement: "Перш ніж і перед тим як показують дію, перед якою треба щось зробити."
        correct: true
        explanation: "Перш ніж відповідати, подумайте."
      - statement: "Відколи називає початкову точку періоду."
        correct: true
        explanation: "Відколи почався курс, я слухаю радіо щодня."
      - statement: "Дієприслівниковий зворот завжди може замінити часове речення з різними суб'єктами."
        correct: false
        explanation: "Якщо суб'єкти різні, підрядне речення безпечніше й природніше."
      - statement: "Одна подія може бути часовою межею або причиною залежно від сполучника."
        correct: true
        explanation: "Коли почався дощ... - час; бо почався дощ - причина."
  - id: wb-5
    type: essay-response
    title: Напишіть розповідь із часовою структурою
    instruction: "Напишіть 8-10 речень українською."
    prompt: "Опишіть ранок, навчальний день, подорож або робочий процес. Можете спиратися на перше читання. Використайте щонайменше шість часових сполучників: коли, поки/доки, щойно/як тільки, після того як, перш ніж/перед тим як, відколи або доти...доки. Обов'язково покажіть і одночасність, і послідовність."
    min_words: 120
    model_answer: >-
      Коли я прокинувся о сьомій, у телефоні вже було повідомлення від
      колеги. Поки я готував сніданок, він перевіряв таблицю для нашої
      презентації і надсилав короткі коментарі. Щойно я відкрив ноутбук,
      прийшов новий лист від викладачки. Перед тим як відповідати, я перечитав
      план, виправив порядок слайдів і перевірив посилання. Після того як
      команда зібралася онлайн, ми розподілили завдання. Доки Олена редагувала
      графіки, я писав короткий вступ, а Марко шукав точні дати. Як тільки ми
      зберегли фінальну версію, надіслали файл викладачці й домовилися про
      репетицію. Відколи ми працюємо разом, такі термінові ранки вже не
      здаються хаотичними, бо кожен знає свою частину роботи. Ми працювали
      доти, доки не перевірили всі підписи під графіками, а потім спокійно
      повторили вступ перед камерою. Коли настав час презентації, ми вже мали
      готовий файл і чіткий порядок виступів.
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "8-10 речень і щонайменше 120 слів."
      - criteria: "Часові сполучники"
        points: 3
        description: "Є щонайменше шість доречних часових сполучників або фраз."
      - criteria: "Одночасність і послідовність"
        points: 3
        description: "Текст чітко розрізняє тло, межу та порядок подій."
      - criteria: "Вид і час"
        points: 3
        description: "Доконаний і недоконаний вид підтримують значення речення."
      - criteria: "Пунктуація"
        points: 2
        description: "Підрядні частини відокремлено комами."
