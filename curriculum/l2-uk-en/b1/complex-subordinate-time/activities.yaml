version: '1.0'
module: complex-subordinate-time
level: b1
inline:
  - id: act-1
    type: quiz
    title: "Читання: ранок перед презентацією"
    instruction: "Прочитайте текст перед вправою і оберіть правильне пояснення."
    items:
      - question: "Коли Марина побачила повідомлення від команди?"
        options:
          - "Коли прокинулася"
          - "Після того як команда зібралася"
          - "Перед тим як зберегли презентацію"
        correct: 0
        explanation: "Текст починається з часової частини Коли Марина прокинулася."
      - question: "Яка дія відбувалася одночасно з тим, що Марина готувала каву?"
        options:
          - "Колега перевіряв цифри у таблиці"
          - "Команда надіслала презентацію"
          - "Ірина шукала аудиторію"
        correct: 0
        explanation: "Поки вона готувала каву, колега перевіряв цифри."
      - question: "Що сталося щойно Марина відкрила ноутбук?"
        options:
          - "Прийшов лист від викладачки"
          - "Олег завершив графіки"
          - "Команда пішла на презентацію"
        correct: 0
        explanation: "Щойно підкреслює швидку послідовність."
      - question: "Перед тим як відповідати, Марина:"
        options:
          - "перечитала план і позначила місця для змін"
          - "надіслала фінальну презентацію"
          - "вимкнула телефон"
        correct: 0
        explanation: "Перед тим як називає дію, перед якою була підготовка."
      - question: "Після того як команда зібралася онлайн, усі:"
        options:
          - "розподілили завдання"
          - "прокинулися"
          - "готували каву"
        correct: 0
        explanation: "Після того як показує наступну дію після збору."
      - question: "Доки Олег редагував графіки, Ірина:"
        options:
          - "шукала правильні посилання"
          - "відповідала викладачці"
          - "зберігала презентацію"
        correct: 0
        explanation: "Доки відкриває проміжок одночасних дій."
      - question: "Яка конструкція у тексті називає швидку реакцію після збереження презентації?"
        options:
          - "Як тільки презентацію зберегли..."
          - "Відтоді як вони почали..."
          - "Перед тим як відповідати..."
        correct: 0
        explanation: "Як тільки показує швидку наступну дію."
      - question: "Відтоді як вони почали працювати разом означає:"
        options:
          - "початкову точку нового періоду"
          - "причину запізнення"
          - "місце зустрічі"
        correct: 0
        explanation: "Ця фраза відповідає на питання відколи?"
      - question: "Яке речення з тексту найкраще показує одночасність?"
        options:
          - "Поки вона готувала каву, колега перевіряв останні цифри."
          - "Щойно Марина відкрила ноутбук, прийшов лист."
          - "Як тільки презентацію зберегли, команда надіслала її."
        correct: 0
        explanation: "Поки + два недоконані процеси показують одночасність."
      - question: "Яке речення з тексту найкраще показує послідовність?"
        options:
          - "Щойно Марина відкрила ноутбук, прийшов лист."
          - "Доки Олег редагував графіки, Ірина шукала посилання."
          - "Поки вона готувала каву, колега перевіряв цифри."
        correct: 0
        explanation: "Щойно показує одну подію одразу після іншої."
      - question: "Чому у фразі Доки Олег редагував графіки використано недоконаний вид?"
        options:
          - "Бо дія триває як тло"
          - "Бо це наказ"
          - "Бо це означальна частина"
        correct: 0
        explanation: "Редагував показує процес, під час якого відбувалися інші дії."
      - question: "Яке питання можна поставити до більшості підрядних частин у тексті?"
        options:
          - "коли? або відколи?"
          - "який? або чий?"
          - "чому? або через що?"
        correct: 0
        explanation: "Це часові підрядні частини."
  - id: act-2
    type: quiz
    title: Упізнайте часову підрядну частину
    instruction: "Оберіть правильне пояснення."
    items:
      - question: "У реченні Коли почався дощ, ми зайшли до кав'ярні підрядна частина відповідає на питання:"
        options:
          - "коли?"
          - "який?"
          - "чому?"
        correct: 0
        explanation: "Підрядна частина називає час дії головної частини."
      - question: "Яке речення є часовим, а не означальним?"
        options:
          - "Коли зустріч закінчилася, ми пішли додому."
          - "День, коли зустріч закінчилася, був дощовим."
          - "Я пам'ятаю, коли зустріч закінчилася."
        correct: 0
        explanation: "Підрядна частина стосується всієї події ми пішли додому."
      - question: "У реченні Поки я писав звіт, колега перевіряв таблиці підкреслено:"
        options:
          - "одночасність"
          - "причину"
          - "належність"
        correct: 0
        explanation: "Обидві дії тривали одночасно."
      - question: "Щойно він зайшов, усі замовкли означає, що друга дія сталася:"
        options:
          - "одразу після першої"
          - "замість першої"
          - "без зв'язку з першою"
        correct: 0
        explanation: "Щойно підкреслює безпосередню послідовність."
      - question: "Який сполучник найкраще підкреслює тривалість тла?"
        options:
          - "поки"
          - "чий"
          - "бо"
        correct: 0
        explanation: "Поки відкриває часовий проміжок."
      - question: "Після того як ми закінчили обговорення, секретарка надіслала протокол. Перша дія:"
        options:
          - "закінчили обговорення"
          - "надіслала протокол"
          - "секретарка працювала"
        correct: 0
        explanation: "Після того як називає попередню подію."
      - question: "Перш ніж підписати заяву, уважно прочитайте текст. Конструкція перш ніж означає:"
        options:
          - "перед дією підписати"
          - "після дії підписати"
          - "причину підписання"
        correct: 0
        explanation: "Перш ніж показує дію, яка має передувати іншій."
      - question: "У реченні Ми чекали, поки не приїхав автобус конструкція поки не означає:"
        options:
          - "до моменту приїзду автобуса"
          - "під час не-приїзду без межі"
          - "причину очікування"
        correct: 0
        explanation: "Поки не часто називає межу тривалості."
      - question: "Відколи почався курс, я щодня слухаю українські новини. Підрядна частина називає:"
        options:
          - "початкову точку періоду"
          - "місце курсу"
          - "належність новин"
        correct: 0
        explanation: "Відколи відповідає на питання з якого часу?"
      - question: "Яке речення має правильну кому?"
        options:
          - "Коли закінчиться пара, ми підемо до бібліотеки."
          - "Коли закінчиться пара ми підемо до бібліотеки."
          - "Коли, закінчиться пара ми підемо до бібліотеки."
        correct: 0
        explanation: "Після початкової підрядної частини ставимо кому."
      - question: "У реченні Я пам'ятаю день, коли ми познайомилися підрядна частина є:"
        options:
          - "означальною"
          - "часовою обставинною"
          - "причинною"
        correct: 0
        explanation: "Вона описує іменник день: який день?"
      - question: "Коли приїдеш, зателефонуй. Головна частина має:"
        options:
          - "наказовий спосіб"
          - "означальне слово"
          - "прийменникову конструкцію"
        correct: 0
        explanation: "Зателефонуй - наказовий спосіб; підрядна частина задає майбутній час дії."
  - id: act-3
    type: match-up
    title: Сполучник і часове значення
    instruction: "Поєднайте приклад із поясненням часового зв'язку."
    pairs:
      - left: "Коли я читав, телефон мовчав."
        right: "одночасність двох тривалих ситуацій"
      - left: "Коли я прочитав листа, відповів."
        right: "завершена попередня дія"
      - left: "Поки ми чекали автобус, почався дощ."
        right: "процес як тло для події"
      - left: "Доки тривала нарада, телефони були вимкнені."
        right: "тривалість у межах події"
      - left: "Щойно поїзд зупинився, пасажири вийшли."
        right: "безпосередня послідовність"
      - left: "Як тільки отримаю відповідь, напишу тобі."
        right: "швидка майбутня реакція"
      - left: "Після того як ми пообідали, пішли на прогулянку."
        right: "одна дія після завершення іншої"
      - left: "Перш ніж відповідати, подумайте."
        right: "підготовча дія перед відповіддю"
      - left: "Перед тим як вийти, перевір документи."
        right: "перевірка перед виходом"
      - left: "Відколи почався курс, я слухаю радіо щодня."
        right: "початок нового періоду"
      - left: "Ми працювали доти, доки не завершили звіт."
        right: "межа тривалості"
      - left: "Поки не вимкнеш комп'ютер, не виходь."
        right: "умова часової межі перед наступною дією"
  - id: act-4
    type: fill-in
    title: Вставте часовий сполучник
    instruction: "Оберіть сполучник або сполучну фразу, що найкраще передає часовий зв'язок."
    items:
      - sentence: "____ почалася лекція, студенти вимкнули телефони."
        answer: "Коли"
        options:
          - "Коли"
          - "Бо"
          - "Який"
        explanation: "Потрібна часова рамка для всієї головної частини."
      - sentence: "____ я писав листа, сестра готувала каву."
        answer: "Поки"
        options:
          - "Поки"
          - "Щойно"
          - "Чий"
        explanation: "Дві дії тривали одночасно."
      - sentence: "____ поїзд зупинився, пасажири вийшли."
        answer: "Щойно"
        options:
          - "Щойно"
          - "Доки"
          - "Де"
        explanation: "Друга дія сталася одразу після першої."
      - sentence: "____ ми закінчили обговорення, секретарка надіслала протокол."
        answer: "Після того як"
        options:
          - "Після того як"
          - "Поки"
          - "Куди"
        explanation: "Спершу завершилося обговорення, потім надіслали протокол."
      - sentence: "____ підписати заяву, уважно прочитайте текст."
        answer: "Перш ніж"
        options:
          - "Перш ніж"
          - "Звідки"
          - "Щойно"
        explanation: "Текст треба прочитати перед підписанням."
      - sentence: "____ вийти з дому, перевірте документи."
        answer: "Перед тим як"
        options:
          - "Перед тим як"
          - "Після того як"
          - "Коли не"
        explanation: "Перевірка передує виходу."
      - sentence: "Ми чекали, ____ приїхав автобус."
        answer: "поки не"
        options:
          - "поки не"
          - "щойно"
          - "де"
        explanation: "Поки не називає межу очікування."
      - sentence: "____ я почав курс, щодня слухаю українські новини."
        answer: "Відколи"
        options:
          - "Відколи"
          - "Куди"
          - "Чому"
        explanation: "Відколи називає початкову точку періоду."
      - sentence: "Ми працювали доти, ____ завершили звіт."
        answer: "доки не"
        options:
          - "доки не"
          - "як тільки"
          - "який"
        explanation: "Доки не закриває проміжок роботи."
      - sentence: "____ отримаєш лист, дай мені знати."
        answer: "Як тільки"
        options:
          - "Як тільки"
          - "Доки"
          - "Через те що"
        explanation: "Потрібна швидка реакція після отримання листа."
      - sentence: "____ тривала перевірка, команда не публікувала звіт."
        answer: "Доки"
        options:
          - "Доки"
          - "Котрий"
          - "Тому що"
        explanation: "Доки підкреслює тривалість перевірки."
      - sentence: "____ ми переходили міст, вітер ставав сильнішим."
        answer: "Коли"
        options:
          - "Коли"
          - "Чий"
          - "Оскільки"
        explanation: "Коли вводить часову рамку процесу."
  - id: act-5
    type: error-correction
    title: Виправте часову конструкцію
    instruction: "Виправте одну головну помилку в кожному реченні."
    items:
      - sentence: "Коли почався дощ ми зайшли до кав'ярні."
        error: "дощ ми"
        correction: "дощ, ми"
        error_type: construction
        explanation: "Після початкової підрядної частини потрібна кома."
      - sentence: "Ми зайшли до кав'ярні коли почався дощ."
        error: "кав'ярні коли"
        correction: "кав'ярні, коли"
        error_type: construction
        explanation: "Перед підрядною частиною в постпозиції потрібна кома."
      - sentence: "Щойно я читав листа, отримав відповідь."
        error: "читав"
        correction: "прочитав"
        error_type: word
        explanation: "Щойно очікує завершену дію: щойно прочитав."
      - sentence: "Поки я прочитав листа, вона чекала."
        error: "прочитав"
        correction: "читав"
        error_type: word
        explanation: "Поки для одночасного тла потребує недоконаного виду."
      - sentence: "Після того як я писав звіт, надіслав його."
        error: "писав"
        correction: "написав"
        error_type: word
        explanation: "Після того як називає завершену попередню дію."
      - sentence: "Перед тим як я написав звіт, я перевіряв джерела."
        error: "написав"
        correction: "почав писати"
        error_type: phrase
        explanation: "Перевірка була перед початком писання, а не перед завершенням уже написаного звіту."
      - sentence: "День, коли ми зустрілися був сонячним."
        error: "зустрілися був"
        correction: "зустрілися, був"
        error_type: construction
        explanation: "Означальна підрядна частина всередині головної відокремлюється з обох боків."
      - sentence: "Коли ми зустрілися був сонячний день."
        error: "зустрілися був"
        correction: "зустрілися, був"
        error_type: construction
        explanation: "Початкова часова підрядна частина відокремлюється комою."
      - sentence: "Ми чекали, поки приїхав автобус."
        error: "поки приїхав"
        correction: "поки не приїхав"
        error_type: phrase
        explanation: "Для межі очікування природна модель поки не приїхав."
      - sentence: "Перш ніж студенти вийти, викладачка пояснила завдання."
        error: "студенти вийти"
        correction: "студенти вийшли"
        error_type: phrase
        explanation: "Якщо суб'єкт названо окремо, потрібна особова форма дієслова."
      - sentence: "Як тільки отримаю відповідь напишу тобі."
        error: "відповідь напишу"
        correction: "відповідь, напишу"
        error_type: construction
        explanation: "Після початкової підрядної частини потрібна кома."
      - sentence: "Відколи я почав курс, я слухав новини завтра."
        error: "слухав новини завтра"
        correction: "слухаю новини щодня"
        error_type: phrase
        explanation: "Відколи відкриває період, що триває; потрібна узгоджена часова перспектива."
workbook:
  - id: wb-1
    type: group-sort
    title: Розподіліть часові значення
    instruction: "Розподіліть речення за основним часовим значенням."
    groups:
      - label: "Одночасність"
        items:
          - "Коли ми їхали трамваєм, за вікном падав сніг."
          - "Поки я готував вечерю, брат накривав на стіл."
          - "Доки тривала лекція, студенти занотовували приклади."
      - label: "Швидка послідовність"
        items:
          - "Щойно двері відчинилися, діти вибігли у двір."
          - "Як тільки я отримав листа, відповів."
          - "Щойно поїзд прибув, пасажири вийшли на перон."
      - label: "Попередня дія"
        items:
          - "Після того як ми завершили проєкт, написали звіт."
          - "Коли вона прочитала інструкцію, почала тест."
          - "Після того як команда перевірила дані, опублікувала результати."
      - label: "Межа або початок періоду"
        items:
          - "Ми чекали, поки не приїхав автобус."
          - "Відколи почався курс, я щодня слухаю українське радіо."
          - "Ми працювали доти, доки не завершили таблицю."
  - id: wb-2
    type: cloze
    title: Відновіть часову розповідь
    instruction: "Заповніть 12 пропусків часовими сполучниками або фразами."
    text: "____ я прийшов до університету, коридор уже був повний студентів. ____ я шукав аудиторію, кураторка відповідала на повідомлення. ____ знайшов потрібні двері, почалася перекличка. ____ усі сіли, викладач пояснив план заняття. ____ ми працювали в групах, одна студентка записувала приклади на дошці. ____ заняття закінчилося, ми обговорили домашнє завдання. ____ виходити з аудиторії, я перевірив, чи взяв зошит. Ми чекали біля гардероба, ____ не принесли куртки. ____ почався цей курс, я краще розумію складні речення. Команда працювала доти, ____ не підготувала короткий конспект. ____ отримаєш файл, переглянь першу сторінку. ____ ми переходили вулицю, загорілося зелене світло."
    blanks:
