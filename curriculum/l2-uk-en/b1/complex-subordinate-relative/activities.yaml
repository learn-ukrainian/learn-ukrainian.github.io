version: '1.0'
module: complex-subordinate-relative
level: b1
inline:
  - id: act-1
    type: quiz
    title: Упізнайте означальне речення
    instruction: "Оберіть правильне пояснення структури."
    items:
      - question: "У реченні Дерево, яке росте біля оранжереї, дуже старе підрядна частина описує слово:"
        options:
          - "дерево"
          - "оранжереї"
          - "старе"
        correct: 0
        explanation: "Підрядна частина яке росте біля оранжереї відповідає на питання яке дерево?"
      - question: "Яке речення є складнопідрядним означальним?"
        options:
          - "Книга, яку я прочитав, лежить на столі."
          - "Я знаю, що книга лежить на столі."
          - "Книга лежить на столі, і я читаю."
        correct: 0
        explanation: "Частина яку я прочитав описує іменник книга."
      - question: "Означальна підрядна частина найчастіше відповідає на питання:"
        options:
          - "який? яка? яке? які?"
          - "що зробив?"
          - "чому?"
        correct: 0
        explanation: "Вона характеризує іменник або займенник."
      - question: "У реченні Місце, де ми зустрілися, було тихим слово де показує:"
        options:
          - "місце, пов'язане з означуваним словом"
          - "зміст повідомлення"
          - "причину дії"
        correct: 0
        explanation: "Де описує іменник місце."
      - question: "Що є означуваним словом у реченні Студентка, яка записує назви рослин, готує звіт?"
        options:
          - "студентка"
          - "назви"
          - "звіт"
        correct: 0
        explanation: "Підрядна частина яка записує назви рослин описує студентку."
      - question: "Яке речення є з'ясувальним, а не означальним?"
        options:
          - "Я знаю, що дерево старе."
          - "Дерево, що росте біля входу, старе."
          - "Квітка, яку подарували з Японії, цвіте."
        correct: 0
        explanation: "Що дерево старе пояснює зміст слова знаю."
      - question: "У реченні Країна, звідки привезли рослину, має теплий клімат слово звідки означає:"
        options:
          - "походження або напрям від місця"
          - "напрям до місця"
          - "час події"
        correct: 0
        explanation: "Звідки показує, з якого місця походить рослина."
      - question: "Яке речення правильно показує позицію означальної частини?"
        options:
          - "Я знайшов статтю, яку порадила викладачка."
          - "Яку порадила викладачка, я знайшов статтю."
          - "Я знайшов яку порадила викладачка статтю."
        correct: 0
        explanation: "Підрядна означальна частина стоїть після означуваного слова статтю."
      - question: "У реченні День, коли ми відвідали сад, був сонячним слово коли описує:"
        options:
          - "іменник часу день"
          - "причину відвідування"
          - "непряме питання"
        correct: 0
        explanation: "У цьому модулі коли може описувати іменник часу."
      - question: "Яке слово зв'язку виражає належність?"
        options:
          - "чий"
          - "де"
          - "коли"
        correct: 0
        explanation: "Чий, чия, чиє, чиї показують, кому щось належить."
      - question: "У реченні Люди, які працюють у саду, знають кожну алею форма які узгоджується з:"
        options:
          - "люди"
          - "саду"
          - "алею"
        correct: 0
        explanation: "Люди - множина, тому які."
      - question: "Найкращий перший крок аналізу означального речення:"
        options:
          - "знайти означуване слово"
          - "прибрати кому"
          - "замінити всі слова на що"
        correct: 0
        explanation: "Означуване слово показує, що саме описує підрядна частина."
  - id: act-2
    type: match-up
    title: Форма який і її роль
    instruction: "Поєднайте приклад із поясненням форми сполучного слова."
    pairs:
      - left: "Студент, який читає статтю"
        right: "який - підмет у підрядній частині"
      - left: "Студента, якого ми запросили"
        right: "якого - додаток після запросили"
      - left: "Студентка, якій ми допомогли"
        right: "якій - давальний після допомогли"
      - left: "Книга, яку я читаю"
        right: "яку - знахідний жіночого роду"
      - left: "Квітка, якою милуються відвідувачі"
        right: "якою - орудний жіночого роду"
      - left: "Місто, в якому я живу"
        right: "в якому - місцевий із прийменником"
      - left: "Сад, до якого ми йдемо"
        right: "до якого - родовий після до"
      - left: "Люди, з якими я працюю"
        right: "з якими - орудний множини"
      - left: "Тема, про яку ми говорили"
        right: "про яку - знахідний із прийменником про"
      - left: "Алея, якою ми йшли"
        right: "якою - шлях руху в орудному"
      - left: "Місце, яке я люблю"
        right: "яке - знахідний середнього роду"
      - left: "Рослини, які ростуть у теплиці"
        right: "які - множина і підмет у підрядній"
  - id: act-3
    type: group-sort
    title: Оберіть тип сполучного слова
    instruction: "Розподіліть приклади за основною функцією слова зв'язку."
    groups:
      - label: "Форми який"
        items:
          - "Стаття, яку ми обговорювали, була корисною."
          - "Ботанік, якого ми слухали, показав теплицю."
          - "Люди, з якими я працюю, уважні."
      - label: "Що як заміна який"
        items:
          - "Дерево, що росте біля входу, старе."
          - "Книга, що лежить на столі, моя."
          - "Стежка, що веде до ставка, вузька."
      - label: "Місце, напрям, походження"
        items:
          - "Місце, де ми відпочили, було тихим."
          - "Алея, куди ми пішли, веде до фонтану."
          - "Країна, звідки привезли рослину, тепла."
      - label: "Час або належність"
        items:
          - "День, коли ми зустрілися, був сонячним."
          - "Дослідниця, чию статтю ми читали, виступила."
          - "Студент, чиї нотатки допомогли групі, поділився файлом."
  - id: act-4
    type: error-correction
    title: Виправте форму, кому або слово зв'язку
    instruction: "Виправте одну головну помилку в кожному реченні."
    items:
      - sentence: "Книга, я читав, лежить на столі."
        error: "я читав"
        correction: "яку я читав"
        error_type: construction
        explanation: "В українській не можна пропускати сполучне слово; потрібна форма яку."
      - sentence: "Студент, хто сидить біля вікна, читає."
        error: "хто"
        correction: "який"
        error_type: word
        explanation: "Після звичайного іменника людини вживаємо який, не хто."
      - sentence: "Дівчина, який працює в лабораторії, пише звіт."
        error: "який"
        correction: "яка"
        error_type: word
        explanation: "Дівчина - жіночий рід, тому яка."
      - sentence: "Місто, в що я живу, має багато парків."
        error: "в що"
        correction: "в якому"
        error_type: phrase
        explanation: "З прийменником потрібна форма який або прислівник де."
      - sentence: "Я говорив з людиною, яким працює тут."
        error: "яким"
        correction: "яка"
        error_type: word
        explanation: "У підрядній частині людина є підметом: людина працює, тому яка."
      - sentence: "Квітка яку подарували з Японії цвіте навесні."
        error: "Квітка яку"
        correction: "Квітка, яку"
        error_type: construction
        explanation: "Перед означальною підрядною частиною потрібна кома."
      - sentence: "Місце де ми зустрілися було тихим."
        error: "Місце де"
        correction: "Місце, де"
        error_type: construction
        explanation: "Підрядна частина з де відокремлюється комою."
      - sentence: "Країна, куди привезли рослину, має теплий клімат."
        error: "куди"
        correction: "звідки"
        error_type: word
        explanation: "Якщо рослину привезли з країни, потрібне звідки."
      - sentence: "День, де ми відвідали сад, був сонячним."
        error: "де"
        correction: "коли"
        error_type: word
        explanation: "Для іменника часу день потрібне коли."
      - sentence: "Дослідниця, чий статтю ми читали, працює в університеті."
        error: "чий"
        correction: "чию"
        error_type: word
        explanation: "Чию узгоджується зі словом статтю."
      - sentence: "Сад, до який ми йдемо, розташований біля метро."
        error: "до який"
        correction: "до якого"
        error_type: phrase
        explanation: "Після до потрібний родовий відмінок: до якого."
      - sentence: "Люди, з які я працюю, уважні до деталей."
        error: "з які"
        correction: "з якими"
        error_type: phrase
        explanation: "Після з потрібний орудний відмінок множини: з якими."
  - id: act-5
    type: fill-in
    title: Вставте сполучне слово
    instruction: "Заповніть пропуск правильною формою або словом зв'язку."
    items:
      - sentence: "Студент____ читає статтю, сидить біля вікна."
        answer: ", який"
        options:
          - ", який"
          - ", яку"
          - "який"
        explanation: "Студент - чоловічий рід, а який є підметом у підрядній."
      - sentence: "Книга____ я читаю, дуже корисна."
        answer: ", яку"
        options:
          - ", яку"
          - ", яка"
          - "яку"
        explanation: "Книга - жіночий рід, у підрядній це прямий додаток."
      - sentence: "Місто____ я живу, має багато парків."
        answer: ", в якому"
        options:
          - ", в якому"
          - ", яке"
          - "в якому"
        explanation: "Жити в чому? - в якому місті."
      - sentence: "Алея____ ми йдемо, веде до теплиці."
        answer: ", куди"
        options:
          - ", куди"
          - ", де"
          - ", звідки"
        explanation: "Йдемо куди? - куди."
      - sentence: "Країна____ привезли рослину, має теплий клімат."
        answer: ", звідки"
        options:
          - ", звідки"
          - ", куди"
          - ", коли"
        explanation: "Привезли з країни - звідки."
      - sentence: "День____ ми зустрілися, був сонячним."
        answer: ", коли"
        options:
          - ", коли"
          - ", де"
          - ", куди"
        explanation: "День є іменником часу, тому коли."
      - sentence: "Дослідниця____ статтю ми читали, виступила на семінарі."
        answer: ", чию"
        options:
          - ", чию"
          - ", чий"
          - ", якій"
        explanation: "Чию узгоджується зі словом статтю."
      - sentence: "Ботанік____ ми слухали, показав старе дерево."
        answer: ", якого"
        options:
          - ", якого"
          - ", який"
          - ", яким"
        explanation: "Ми слухали кого? - ботаніка, якого."
      - sentence: "Студентка____ я допоміг, подякувала після заняття."
        answer: ", якій"
        options:
          - ", якій"
          - ", яку"
          - ", яка"
        explanation: "Допоміг кому? - студентці, якій."
      - sentence: "Люди____ я працюю, уважні до деталей."
        answer: ", з якими"
        options:
          - ", з якими"
          - ", які"
          - ", яким"
        explanation: "Працюю з ким? - з людьми, з якими."
      - sentence: "Дерево____ росте біля оранжереї, посадили давно."
        answer: ", що"
        options:
          - ", що"
          - ", щоб"
          - "що"
        explanation: "Що може замінювати яке в означальному реченні."
      - sentence: "Тема____ ми говорили на семінарі, важлива для іспиту."
        answer: ", про яку"
        options:
          - ", про яку"
          - ", яку"
          - ", про який"
        explanation: "Говорили про що? - про тему, про яку."
workbook:
  - id: wb-1
    type: quiz
    title: "Читання: екскурсія ботанічним садом"
    instruction: "Прочитайте мінітекст і дайте відповіді. Група студентів прийшла до Київського ботанічного саду, де ботанік проводив коротку екскурсію. Він показав дерево, яке росте біля оранжереї понад сто років, і теплицю, в якій зберігають тропічні рослини. Студентка записала назву квітки, яку привезли з Японії, а Марко сфотографував карту, на якій були позначені старі алеї. Потім група пішла до місця, де можна відпочити біля ставка. Ботанік розповів про країну, звідки привезли кілька рідкісних видів, і згадав дослідницю, чию статтю студенти читали перед заняттям. Наприкінці він назвав день, коли сад відкриє нову виставку."
    items:
      - question: "Яке означуване слово описує підрядна частина яке росте біля оранжереї понад сто років?"
        options:
          - "дерево"
          - "ботанік"
          - "група"
        correct: 0
        explanation: "Яке узгоджується зі словом дерево."
      - question: "Яка форма показує місцевий відмінок із прийменником?"
        options:
          - "в якій"
          - "яке"
          - "яку"
        correct: 0
        explanation: "У теплиці - в якій."
      - question: "Що описує частина яку привезли з Японії?"
        options:
          - "квітку"
          - "назву"
          - "студентку"
        correct: 0
        explanation: "Квітку яку? - яку привезли з Японії."
      - question: "У фразі карта, на якій були позначені старі алеї слово якій залежить від:"
        options:
          - "прийменника на і слова карта"
          - "слова алеї"
          - "слова Марко"
        correct: 0
        explanation: "На якій карті? Форма узгоджується з карта і має місцевий відмінок."
      - question: "Яке слово зв'язку описує місце для відпочинку?"
        options:
          - "де"
          - "коли"
          - "чий"
        correct: 0
        explanation: "Місце, де можна відпочити."
      - question: "Що означає звідки у тексті?"
        options:
          - "країну походження рослин"
          - "напрям руху групи"
          - "час відкриття виставки"
        correct: 0
        explanation: "Звідки показує, з якої країни привезли рослини."
      - question: "Яка форма виражає належність?"
        options:
          - "чию"
          - "яку"
          - "де"
        correct: 0
        explanation: "Чию статтю - статтю дослідниці."
      - question: "Яке слово зв'язку описує день відкриття виставки?"
        options:
          - "коли"
          - "куди"
          - "звідки"
        correct: 0
        explanation: "День, коли сад відкриє виставку."
      - question: "Скільки означальних підрядних частин прямо названо в тексті?"
        options:
          - "дев'ять"
          - "три"
          - "одна"
        correct: 0
        explanation: "У тексті є де, яке, в якій, яку, на якій, де, звідки, чию, коли."
      - question: "Яке речення з тексту найкраще показує форму який з прийменником?"
        options:
          - "теплицю, в якій зберігають тропічні рослини"
          - "дерево, яке росте біля оранжереї"
          - "день, коли сад відкриє нову виставку"
        correct: 0
        explanation: "В якій - форма який із прийменником в."
      - question: "Що робить підрядна означальна частина в усіх цих прикладах?"
        options:
          - "описує конкретний іменник"
          - "пояснює зміст дієслова знати"
          - "виражає тільки причину"
        correct: 0
        explanation: "Означальні частини характеризують іменники."
      - question: "Який приклад можна перефразувати як теплицю, де зберігають тропічні рослини?"
        options:
          - "теплицю, в якій зберігають тропічні рослини"
          - "квітки, яку привезли з Японії"
          - "дослідницю, чию статтю читали"
        correct: 0
        explanation: "Де може замінити в якій у простій місцевій моделі."
  - id: wb-2
    type: match-up
    title: Схеми означальних речень
    instruction: "Поєднайте схему з природним прикладом."
    pairs:
      - left: "[іменник], (який + присудок)"
        right: "Ботанік, який проводить екскурсію, працює в саду."
      - left: "[іменник], (яку + підмет + присудок)"
        right: "Квітка, яку ми сфотографували, цвіте навесні."
      - left: "[іменник], (в якому + підмет + присудок)"
        right: "Місто, в якому я живу, зелене."
      - left: "[іменник], (з якими + підмет + присудок)"
        right: "Люди, з якими я працюю, уважні."
      - left: "[іменник місця], (де + присудок)"
        right: "Місце, де можна відпочити, розташоване біля ставка."
      - left: "[іменник напряму], (куди + присудок)"
        right: "Алея, куди ми йдемо, веде до теплиці."
      - left: "[іменник походження], (звідки + присудок)"
        right: "Країна, звідки привезли рослину, має теплий клімат."
      - left: "[іменник часу], (коли + присудок)"
        right: "День, коли відкрили виставку, був сонячним."
      - left: "[особа], (чию + іменник + присудок)"
        right: "Дослідниця, чию статтю ми читали, виступила."
      - left: "[іменник], (що + присудок)"
