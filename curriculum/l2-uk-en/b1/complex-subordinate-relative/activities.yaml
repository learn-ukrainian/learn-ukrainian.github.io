  - id: wb-5
    type: essay-response
    title: Опишіть місце або подію
    instruction: "Напишіть 7-9 речень про місце, екскурсію, університет або подію."
    prompt: "Напишіть 7-9 речень. Використайте щонайменше два речення з формами який/яка/яке/які у різних відмінках, одне речення з де або куди, одне речення зі звідки або коли, і одне речення з чий/чия/чиє/чиї. Поясніть одну форму займенника який."
    min_words: 130
    model_answer: "Минулої суботи я відвідав ботанічний сад, який розташований біля університету. Найбільше мені сподобалося дерево, яке посадили понад сто років тому і про яке ботанік говорив майже на початку екскурсії. Ботанік, якого ми слухали, розповів історію старої оранжереї та показав карту, на якій були позначені давні алеї. Потім ми зайшли до теплиці, де ростуть тропічні рослини і де студентам дозволили зробити кілька фотографій для навчального щоденника і короткої групової презентації. Він показав країну, звідки привезли рідкісну квітку, і назвав день, коли відкриють нову виставку. Я сфотографував дослідницю, чию статтю ми читали перед екскурсією, бо хотів згадати її прізвище в письмовому звіті. Після прогулянки наша група обрала місце, куди повернеться навесні, коли почнеться цвітіння. У реченні «Ботанік, якого ми слухали» форма «якого» потрібна, бо в підрядній частині ми слухали кого? - ботаніка."
    rubric:
      - criteria: Обсяг
        description: Є 7-9 речень і щонайменше 130 слів.
      - criteria: Форми який
        description: Є щонайменше дві форми який/яка/яке/які у різних ролях.
      - criteria: Інші сполучні слова
        description: Є де або куди, є звідки або коли, є форма чий.
      - criteria: Пунктуація
        description: Коми перед і після означальних підрядних частин поставлено правильно.
      - criteria: Пояснення
        description: Одну форму який пояснено через рід/число означуваного слова і роль у підрядній частині.
