version: '1.0'
module: shopping-and-services
level: b1
inline:
- id: act-1
  type: quiz
  title: Ситуація і фраза
  instruction: Оберіть природну українську фразу для кожної ситуації покупок або послуг.
  items:
  - question: Ви на ринку хочете дізнатися ціну яблук. Що скажете?
    options:
    - Скільки коштує кілограм яблук?
    - Який сьогодні курс яблук?
    - Де можна повернути яблука за гарантією?
    correct: 0
    explanation: На ринку питаємо скільки коштує товар або кілограм товару.
  - question: Ви берете більше овочів і ввічливо просите знижку.
    options:
    - А якщо візьму два кілограми, можна трохи дешевше?
    - Я вимагаю найнижчий курс.
    - Дайте гарантію на ці помідори.
    correct: 0
    explanation: Торгування природне саме в м'якій формі питання.
  - question: У магазині ви хочете приміряти куртку. Що запитаєте?
    options:
    - Де примірочна?
    - Де обмін валют?
    - Де доставка?
    correct: 0
    explanation: Примірочна - місце, де приміряють одяг.
  - question: Вам потрібна менша футболка.
    options:
    - Чи є цей розмір менший?
    - Чи є ця здача менша?
    - Чи є ця посилка менша за чек?
    correct: 0
    explanation: Розмір поєднується з більший, менший, потрібний.
  - question: На касі вас питають про спосіб оплати.
    options:
    - Ви розраховуєтесь готівкою чи карткою?
    - Ви розраховуєтесь поштою чи перукарнею?
    - Ви розраховуєтесь гарантією чи примірочною?
    correct: 0
    explanation: Готівка і картка - типові способи оплати.
  - question: Після оплати вам потрібен документ про купівлю.
    options:
    - Дайте, будь ласка, чек.
    - Дайте, будь ласка, курс.
    - Дайте, будь ласка, стрижку.
    correct: 0
    explanation: Чек підтверджує оплату і потрібен для повернення.
  - question: Товар зламався в перший день.
    options:
    - Цей товар бракований, я хочу повернення або обмін.
    - Цей товар найсмачніший, я хочу доставку.
    - Цей товар швидший за гарантію.
    correct: 0
    explanation: Бракований товар можна ввічливо повернути або обміняти.
  - question: На пошті ви відправляєте коробку.
    options:
    - Я хочу відправити посилку.
    - Я хочу вкоротити штани.
    - Я хочу обміняти курс.
    correct: 0
    explanation: Посилка - предмет, який відправляють поштою.
  - question: У банку ви питаєте про долари.
    options:
    - Який сьогодні курс долара?
    - Яка сьогодні примірочна долара?
    - Яка сьогодні тканина долара?
    correct: 0
    explanation: Курс - ціна однієї валюти в іншій валюті.
  - question: Вам треба полагодити телефон.
    options:
    - Скільки коштує ремонт телефона?
    - Скільки коштує стрижка телефона?
    - Скільки коштує примірка телефона?
    correct: 0
    explanation: Ремонт стосується зламаних речей або техніки.
  - question: Ви прийшли в перукарню.
    options:
    - Мені потрібна стрижка, коротше з боків, будь ласка.
    - Мені потрібен переказ у меншому розмірі.
    - Мені потрібна гарантія на каву.
    correct: 0
    explanation: Перукарня надає послуги стрижки.
  - question: Ви пишете позитивний відгук про кав'ярню.
    options:
    - Обслуговування швидке, а кава смачніша, ніж у сусідній кав'ярні.
    - Обслуговування браковане, тому примірочна дорожча.
    - Курс кави зламався, тому потрібна здача.
    correct: 0
    explanation: У відгуку природно порівнювати якість, ціну й обслуговування.
- id: act-2
  type: fill-in
  title: Порівняння у покупках
  instruction: Доповніть речення словом або формою, яка найкраще підходить до ситуації.
  items:
  - sentence: "Ці яблука свіжіші ____ ті, але дорожчі."
    answer: за
    options:
    - за
    - від
    - самий
    explanation: У порівнянні природно сказати свіжіші за ті.
  - sentence: "Я шукаю ____ розмір цієї сорочки."
    answer: менший
    options:
    - менший
    - найменше
    - дешевше
    explanation: Розмір описуємо прикметником у чоловічому роді.
  - sentence: "Де тут ____? Я хочу приміряти сукню."
    answer: примірочна
    options:
    - примірочна
    - гарантія
    - здача
    explanation: Одяг приміряють у примірочній.
  - sentence: "Ця тканина ____ якісна, ніж та."
    answer: більш
    options:
    - більш
    - самий
    - най
    explanation: Для описового ступеня кажемо більш якісна.
  - sentence: "Я розрахуюся ____, бо термінал не працює."
    answer: готівкою
    options:
    - готівкою
    - посилкою
    - гарантією
    explanation: Якщо термінал не працює, платять готівкою.
  - sentence: "Після покупки не викидайте ____, бо він потрібен для повернення."
    answer: чек
    options:
    - чек
    - курс
    - ремонт
    explanation: Чек підтверджує покупку.
  - sentence: "На цей телефон є ____ на один рік."
    answer: гарантія
    options:
    - гарантія
    - здача
    - примірочна
    explanation: Гарантія діє після купівлі техніки або інших товарів.
  - sentence: "Цей чайник ____, він не вмикається."
    answer: бракований
    options:
    - бракований
    - найвигідніший
    - готівковий
    explanation: Бракований товар має дефект.
  - sentence: "Я хочу оформити ____ товару, бо він не працює."
    answer: повернення
    options:
    - повернення
    - стрижку
    - кав'ярню
    explanation: Повернення - процедура повернення товару в магазин.
  - sentence: "Яка ____ доставка до Львова?"
    answer: найшвидша
    options:
    - найшвидша
    - швидший
    - самий швидко
    explanation: Доставка - жіночого роду, тому найшвидша.
  - sentence: "Де ____ обмін валют?"
    answer: найвигідніший
    options:
    - найвигідніший
    - вигідніше
    - більш вигідніший
    explanation: Обмін - чоловічого роду, тому найвигідніший.
  - sentence: "У тій майстерні ремонт дешевший, але ____."
    answer: довший
    options:
    - довший
    - довше
    - самий довгий
    explanation: Ремонт - чоловічого роду, тому довший.
- id: act-3
  type: match-up
  title: Хто де працює
  instruction: Поєднайте назву людини або місця з відповідною послугою чи сферою.
  pairs:
  - left: продавець
    right: допомагає покупцеві у крамниці або на ринку
  - left: продавчиня
    right: консультує клієнтку щодо товару
  - left: покупець
    right: обирає товар і платить за нього
  - left: покупчиня
    right: питає про розмір, ціну або знижку
  - left: перукар
    right: робить стрижку в перукарні
  - left: перукарка
    right: радить клієнтові коротшу або довшу зачіску
  - left: кравець
    right: шиє або вкорочує одяг
  - left: кравчиня
    right: працює в ательє з тканиною
  - left: майстер
    right: ремонтує телефон або іншу річ
  - left: майстерня
    right: місце, де виконують ремонт
  - left: кав'ярня
    right: місце, де замовляють каву й оцінюють обслуговування
  - left: банк
    right: місце для переказу, рахунку або обміну валют
- id: act-4
  type: group-sort
  title: Чотири зони послуг
  instruction: Розподіліть фрази за ситуаціями.
  groups:
  - label: Ринок
    items:
    - Скільки коштує кілограм?
    - Чи можна трохи дешевше?
    - А якщо візьму два кілограми?
  - label: Магазин
    items:
    - Де примірочна?
    - Чи є більший розмір?
    - Дайте, будь ласка, чек.
  - label: Пошта і банк
    items:
    - Я хочу відправити посилку.
    - Який сьогодні курс?
    - Мені потрібно зробити переказ.
  - label: Послуги і скарги
    items:
    - Скільки коштує ремонт?
    - Мені потрібна стрижка.
    - Цей товар бракований.
- id: act-5
  type: error-correction
  title: Виправте кальку або невдале порівняння
  instruction: Замініть помилкову частину природною українською формою.
  items:
  - sentence: "Цей магазин самий дешевий у районі."
    error: самий дешевий
    correction: найдешевший
    error_type: phrase
    explanation: У нормативному найвищому ступені вживаємо префікс най-.
  - sentence: "Ця доставка більш швидша за ту."
    error: більш швидша
    correction: швидша
    error_type: phrase
    explanation: Не поєднуємо більш із простою формою вищого ступеня.
  - sentence: "Цей сервіс кращий той."
    error: кращий той
    correction: кращий за той
    error_type: phrase
    explanation: Після вищого ступеня потрібне за, ніж або від.
  - sentence: "Я хочу вернути бракований товар."
    error: вернути
    correction: повернути
    error_type: word
    explanation: У магазинному регістрі природно сказати повернути товар.
  - sentence: "Мені потрібна меньша куртка."
    error: меньша
    correction: менша
    error_type: word
    explanation: Українська форма - менша, без ь після н.
  - sentence: "Дайте чек, тому що я буду робити возврат."
    error: возврат
    correction: повернення
    error_type: word
    explanation: Возврат - росіянізм; у цій ситуації потрібне повернення.
  - sentence: "Де примерочна?"
    error: примерочна
    correction: примірочна
    error_type: word
    explanation: "Українська форма має і: примірочна."
  - sentence: "Я заплачу карточкою."
    error: карточкою
    correction: карткою
    error_type: word
    explanation: Для платіжної картки нормативно казати карткою.
  - sentence: "Який сьогодні курс валюти більш вигідніший?"
    error: більш вигідніший
    correction: найвигідніший
    error_type: phrase
    explanation: Питаємо про найкращий варіант, тому потрібен найвищий ступінь.
  - sentence: "У цій перукарні обслуговування самий швидкий."
    error: самий швидкий
    correction: найшвидше
    error_type: phrase
    explanation: З обслуговуванням природно вживати найшвидше, а не самий швидкий.
  - sentence: "Ця тканина якісніше за ту."
    error: якісніше
    correction: якісніша
    error_type: word
    explanation: Тканина - жіночого роду, тому якісніша.
  - sentence: "Я хочу поговорити з менеджер."
    error: з менеджер
    correction: з менеджером
    error_type: phrase
    explanation: Після з потрібен орудний відмінок.
workbook:
- id: wb-1
  type: quiz
  title: Транзакційна логіка
  instruction: Оберіть відповідь, яка найкраще завершує практичну ситуацію.
  items:
  - question: Що найважливіше зберегти після покупки, якщо можливе повернення?
    options:
    - чек
    - примірочну
    - курс
    - стрижку
    correct: 0
    explanation: Чек підтверджує покупку.
  - question: Де природніше торгуватися про ціну?
    options:
    - на ринку
    - у магазині з фіксованими цінами
    - на пошті
    - у банку
    correct: 0
    explanation: На ринку торгування може бути доречним, у магазині зазвичай ні.
  - question: Яке слово означає гроші, які вам повертають після оплати?
    options:
    - здача
    - гарантія
    - посилка
    - стрижка
    correct: 0
    explanation: Здача - решта після оплати.
  - question: Яка фраза підходить для банку?
    options:
    - Мені потрібно зробити переказ.
    - Де примірочна?
    - Мені потрібно вкоротити рукави.
    - Чи можна два кілограми дешевше?
    correct: 0
    explanation: Переказ - банківська операція.
  - question: Яка фраза підходить для ательє?
    options:
    - Мені потрібно вкоротити штани.
    - Який сьогодні курс євро?
    - Коли дійде посилка?
    - Я хочу повернути чайник.
    correct: 0
    explanation: В ательє шиють, ремонтують або підганяють одяг.
  - question: Яка пара є словотвірним ланцюжком людина -> місце?
    options:
    - перукар -> перукарня
    - чек -> чековий
    - картка -> готівка
    - курс -> валюта
    correct: 0
    explanation: Перукар працює в перукарні.
  - question: Яке речення правильно порівнює дві доставки?
    options:
    - Нова Пошта швидша за Укрпошту, але дорожча.
    - Нова Пошта самий швидкий від Укрпошту.
    - Нова Пошта більш швидша, але дорожче.
    - Нова Пошта швидше той сервіс.
    correct: 0
    explanation: Швидша за і дорожча узгоджені з доставка.
  - question: Що означає бракований товар?
    options:
    - товар із дефектом
    - товар зі знижкою
    - товар у більшому розмірі
    - товар із готівкою
    correct: 0
    explanation: Бракований - той, що має брак або дефект.
  - question: Який варіант ввічливо починає скаргу?
    options:
    - Вибачте, але цей товар бракований.
    - Ви все зробили неправильно.
    - Дайте мені гроші зараз.
    - Я не буду говорити українською.
    correct: 0
    explanation: Скарга може бути наполегливою, але починатися ввічливо.
  - question: Яке слово означає customer service?
    options:
    - обслуговування
    - обмін валют
    - примірочна
    - розмір
    correct: 0
    explanation: Обслуговування - якість роботи з клієнтом.
  - question: Який варіант найприродніший для позитивного відгуку?
    options:
    - Ця кав'ярня найкраща в районі.
    - Ця кав'ярня самий хороша в районі.
    - Ця кав'ярня більш краща в районі.
    - Ця кав'ярня краще район.
    correct: 0
    explanation: Найкраща - нормативний найвищий ступінь.
  - question: Що питають перед обміном грошей?
    options:
    - Який сьогодні курс?
    - Який сьогодні розмір?
    - Яка сьогодні гарантія?
    - Яка сьогодні здача?
    correct: 0
    explanation: Курс визначає співвідношення валют.
- id: wb-2
  type: fill-in
  title: Діалоги без підказок
  instruction: Вставте найточніше слово або форму.
  items:
  - sentence: "Продавчиня дала мені ____ десять гривень."
    answer: здачу
    options:
    - здачу
    - знижку
    - гарантію
    explanation: Дала здачу - повернула решту грошей.
  - sentence: "Чи є цей светр у більшому ____?"
    answer: розмірі
    options:
    - розмірі
    - курсі
    - ремонті
    explanation: Одяг має розмір.
  - sentence: "Я хочу відправити ____ до Харкова."
    answer: посилку
    options:
    - посилку
    - примірочну
    - готівку
    explanation: Посилку відправляють поштою.
  - sentence: "Скільки коштує ____ телефона?"
    answer: ремонт
    options:
    - ремонт
    - рахунок
    - обмін
    explanation: Телефон ремонтують.
  - sentence: "У цій кав'ярні ____ найшвидше."
    answer: обслуговування
    options:
    - обслуговування
    - повернення
    - примірочна
    explanation: Обслуговування може бути швидким або повільним.
  - sentence: "Мені потрібно відкрити банківський ____."
    answer: рахунок
    options:
    - рахунок
    - чек
    - тканину
    explanation: У банку відкривають рахунок.
  - sentence: "Де тут найвигідніший ____ валют?"
    answer: обмін
    options:
    - обмін
    - ремонт
    - розмір
    explanation: Обмін валют може мати вигідний або невигідний курс.
  - sentence: "Ця сукня гарніша, ____ та, але дорожча."
    answer: ніж
    options:
    - ніж
    - самий
    - більш
    explanation: Ніж вводить другу частину порівняння.
  - sentence: "У майстерні ремонт дешевший ____ у сервісному центрі."
    answer: ніж
    options:
    - ніж
    - самий
    - більш
    explanation: Ніж природно вводить цілу обставинну фразу без додаткового відмінкового керування.
  - sentence: "На цей чайник немає ____, тому повернення складніше."
    answer: гарантії
    options:
    - гарантії
    - стрижки
    - доставки
    explanation: Після немає потрібен родовий відмінок.
  - sentence: "Цей сервіс ____ за той, але дорожчий."
    answer: надійніший
    options:
    - надійніший
    - надійніше
    - більш надійніший
    explanation: Сервіс - чоловічого роду, тому надійніший.
  - sentence: "У перукарні я попросив коротшу ____."
    answer: стрижку
    options:
    - стрижку
    - посилку
    - картку
    explanation: Стрижка - послуга в перукарні.
