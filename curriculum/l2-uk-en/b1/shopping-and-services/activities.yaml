- id: wb-4
  type: true-false
  title: Правда чи ні
  instruction: Визначте, чи твердження правильне.
  items:
  - statement: "У магазині з фіксованими цінами торгування менш доречне, ніж на ринку."
    correct: true
    explanation: Це культурна й практична різниця між ринком і магазином.
  - statement: "Самий дешевий - нормативна форма найвищого ступеня в українській."
    correct: false
    explanation: Нормативно - найдешевший.
  - statement: "Можна сказати дешевший за той варіант."
    correct: true
    explanation: За вводить об'єкт порівняння.
  - statement: "Більш якісний і якісніший - можливі моделі, але більш якісніший є подвійним порівнянням."
    correct: true
    explanation: Не треба дублювати більш і суфікс вищого ступеня.
  - statement: "Чек може знадобитися для повернення товару."
    correct: true
    explanation: Чек підтверджує покупку.
  - statement: "Примірочна - це місце для обміну валют."
    correct: false
    explanation: Примірочна потрібна для одягу.
  - statement: "Кравець або кравчиня можуть працювати в ательє."
    correct: true
    explanation: Ательє пов'язане з одягом.
  - statement: "Переказ і рахунок належать до банківської лексики."
    correct: true
    explanation: Це типові фінансові слова.
  - statement: "Бракований товар означає товар зі святковою знижкою."
    correct: false
    explanation: Бракований товар має дефект.
  - statement: "У відгуку про кав'ярню можна оцінити обслуговування, ціну і якість."
    correct: true
    explanation: Це природні критерії відгуку.
  - statement: "Карткою означає тим самим способом, що й готівкою."
    correct: false
    explanation: Картка - безготівкова оплата, готівка - фізичні гроші.
  - statement: "Найвигідніший курс означає найкращий курс для клієнта."
    correct: true
    explanation: Вигідний - той, що дає кращі умови.
