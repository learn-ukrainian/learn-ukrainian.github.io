- id: wb-9
  type: essay-response
  title: Скарга або відгук
  prompt: >
    Напишіть 130-160 слів українською. Оберіть одну ситуацію: ввічлива скарга на бракований товар або
    відгук про магазин, кав'ярню чи послугу. Використайте щонайменше шість слів із модуля, два вищі ступені
    порівняння і один найвищий ступінь. У тексті має бути конкретна дія: повернення, обмін, ремонт, доставка
    або переказ.
  min_words: 130
  model_answer: >
    Учора я купила електричний чайник у невеликій крамниці біля метро. Продавчиня була ввічлива, показала
    мені кілька моделей і пояснила, що дорожчий чайник має довшу гарантію. Я розрахувалася карткою, взяла
    чек і попросила коротко пояснити умови повернення. Удома я побачила, що товар бракований: чайник не
    вмикався, хоча коробка була ціла. Сьогодні я повернулася до магазину й сказала: "Вибачте, але цей
    товар бракований, я хочу оформити повернення або обмін". Консультант перевірив чек, подивився гарантію
    і запропонував іншу модель. Вона була трохи дорожча, ніж попередня, але якісніша й надійніша. Я також
    уточнила, чи можна безкоштовно відправити старий чайник назад на склад, якщо магазин оформить внутрішню
    доставку. Я погодилася, бо гарантія була найкраща з усіх варіантів. Обслуговування було швидким і
    спокійним, тому я напишу чесний відгук: проблема була неприємна, але магазин вирішив її професійно.
  evaluation_criteria:
  - "130-160 слів українською"
  - "Принаймні шість слів із модуля"
  - "Два вищі ступені і один найвищий ступінь"
  - "Зрозуміла транзакційна дія: повернення, обмін, ремонт, доставка або переказ"
