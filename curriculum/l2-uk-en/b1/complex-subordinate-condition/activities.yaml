  - id: wb-4
    type: true-false
    title: "Правда чи неправда про речення умови"
    instruction: "Визначте, чи правильне твердження."
    items:
      - statement: "Підрядна умови відповідає на питання за якої умови?"
        correct: true
        explanation: "Це головне питання цього типу підрядної частини."
      - statement: "Якщо завжди пояснює факт, який уже відбувся."
        correct: false
        explanation: "Якщо ставить можливу ситуацію або правило."
      - statement: "Бо вводить причину, а якщо вводить умову."
        correct: true
        explanation: "Це головний контраст M79/M80."
      - statement: "Коли може мати умовне значення, якщо його природно замінити на якщо."
        correct: true
        explanation: "Коли хочеш відповідь = Якщо хочеш відповідь."
      - statement: "У реченні Коли ми прийшли, заняття почалося слово коли є умовним."
        correct: false
        explanation: "Тут коли називає момент у часі."
      - statement: "Якби зазвичай вимагає умовного способу в головній частині."
        correct: true
        explanation: "Якби мав час, прийшов би."
      - statement: "То і тоді можуть підкреслювати наслідок виконання умови."
        correct: true
        explanation: "Вони допомагають зв'язати дві частини."
      - statement: "За умови що доречніше в офіційному тексті, ніж у дружньому чаті."
        correct: true
        explanation: "Це формальна конструкція."
      - statement: "У випадку якщо зазвичай називає непередбачену ситуацію."
        correct: true
        explanation: "Наприклад: У випадку якщо система не працюватиме..."
      - statement: "Якщо тільки часто вводить виняток або обмеження."
        correct: true
        explanation: "Зустрінемося, якщо тільки поїзд не запізниться."
      - statement: "Ми прийшли раніше, щоб підготувати залу - це речення умови."
        correct: false
        explanation: "Це речення мети: для чого прийшли?"
      - statement: "Умова, причина і мета відповідають на одне й те саме питання."
        correct: false
        explanation: "Умова: за якої умови? причина: чому? мета: для чого?"
  - id: wb-5
    type: essay-response
    title: "Сплануйте сценарії"
    instruction: "Напишіть 8-10 речень українською."
    prompt: "Опишіть навчальну, робочу або громадську ситуацію, у якій треба мати план А і план Б. Використайте щонайменше п'ять умовних конструкцій: якщо, коли (=якщо), якби, за умови що, у випадку якщо, якщо тільки, то/тоді. Додайте одну пару, де ви розрізняєте причину й умову."
    min_words: 120
    model_answer: >-
      Наша команда готує відкриту лекцію для студентів. Якщо університет
      підтвердить аудиторію до вівторка, ми надрукуємо оголошення й розішлемо
      запрошення. Коли буде понад тридцять заявок, то відкриємо онлайн-трансляцію
      для тих, кому не вистачить місця. За умови що лекторка надішле презентацію
      за день до події, волонтери перевірять техніку заздалегідь. У випадку якщо
      оголосять тривогу, тоді ми перервемо лекцію й продовжимо її після паузи.
      Зустріч відбудеться о шостій, якщо тільки поїзд лекторки не запізниться.
      Якби ми мали більший бюджет, запросили б ще перекладача жестової мови, але
      зараз це нереальна умова. Ми змінили попередній план, тому що стара аудиторія
      була замала; це причина, а не умова. Якщо наступного разу зареєструється більше
      людей, одразу забронюємо більший зал.
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "8-10 речень і щонайменше 120 слів."
      - criteria: "Умовні конструкції"
        points: 3
        description: "Є щонайменше п'ять різних умовних конструкцій."
      - criteria: "Реальна і нереальна умова"
        points: 2
        description: "Є принаймні одна реальна і одна нереальна умова."
      - criteria: "Причина vs умова"
        points: 3
        description: "Є чітке розрізнення причини й умови."
