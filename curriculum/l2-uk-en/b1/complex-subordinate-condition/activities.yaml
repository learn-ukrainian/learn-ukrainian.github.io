version: '1.0'
module: complex-subordinate-condition
level: b1
inline:
  - id: act-1
    type: quiz
    title: "Читання: зимова майстерня"
    instruction: "Прочитайте текст перед вправою і оберіть правильне пояснення умовних конструкцій."
    items:
      - question: "За якої умови команда надрукує афіші в четвер?"
        options:
          - "Якщо школа підтвердить залу до середи"
          - "Тому що залу вже ремонтують"
          - "Щоб підлітки прийшли раніше"
        correct: 0
        explanation: "Якщо вводить реальну умову для наступної дії."
      - question: "У реченні Коли буде багато заявок, то відкриють другу групу слово коли має значення:"
        options:
          - "якщо"
          - "після того як"
          - "де"
        correct: 0
        explanation: "Коли можна замінити на якщо, тому це умовне коли."
      - question: "Що підкреслює слово то в реченні Коли буде багато заявок, то відкриють другу групу?"
        options:
          - "наслідок виконання умови"
          - "місце події"
          - "причину минулої дії"
        correct: 0
        explanation: "То допомагає зв'язати умову з головною дією."
      - question: "Яка конструкція в тексті формулює офіційну умову?"
        options:
          - "За умови що батьки підпишуть дозвіл..."
          - "Один волонтер пожартував..."
          - "Команда готувала зимову майстерню..."
        correct: 0
        explanation: "За умови що доречне в правилах і формальних домовленостях."
      - question: "У випадку якщо через тривогу перервуть заняття означає:"
        options:
          - "якщо станеться непередбачена ситуація"
          - "тому що заняття вже перервали"
          - "для того щоб заняття перервали"
        correct: 0
        explanation: "У випадку якщо вводить можливий сценарій."
      - question: "Яке речення з тексту є нереальною умовою?"
        options:
          - "Якби ми мали більший бюджет, запросили б музикантів."
          - "Якщо школа підтвердить залу, ми надрукуємо афіші."
          - "Коли буде багато заявок, відкриють другу групу."
        correct: 0
        explanation: "Якби + умовний спосіб створює уявний сценарій."
      - question: "Чому план названо добрим наприкінці тексту?"
        options:
          - "Для кожної важливої умови є наступна дія"
          - "Усі умови вже гарантовано виконані"
          - "Причини й умови там не розрізняються"
        correct: 0
        explanation: "Текст підкреслює сценарне планування."
      - question: "Яке питання ставимо до підрядної умови?"
        options:
          - "За якої умови?"
          - "Чому?"
          - "Для чого?"
        correct: 0
        explanation: "Це головне питання умовної підрядної частини."
      - question: "Що означає Якщо частина учасників не матиме ноутбуків, центр підготує планшети?"
        options:
          - "План дії залежить від можливої ситуації"
          - "Ноутбуків точно не було"
          - "Центр уже підготував планшети через причину"
        correct: 0
        explanation: "Умова описує можливість, а не факт."
      - question: "Який сполучник у тексті найкраще підходить для нейтральної реальної умови?"
        options:
          - "якщо"
          - "бо"
          - "щоб"
        correct: 0
        explanation: "Якщо є базовим нейтральним сполучником умови."
      - question: "Яка пара найкраще показує контраст M79/M80?"
        options:
          - "тому що = причина, якщо = умова"
          - "коли = завжди причина, бо = завжди умова"
          - "щоб = умова, якби = мета"
        correct: 0
        explanation: "Причина пояснює факт, умова ставить можливість."
      - question: "Яке твердження про підрядну умови правильне?"
        options:
          - "Вона залежить від усієї головної частини"
          - "Вона пояснює тільки один іменник"
          - "Вона завжди стоїть після головної частини"
        correct: 0
        explanation: "Підрядна умови стосується всієї головної дії."
  - id: act-2
    type: quiz
    title: "Реальна умова і умовне коли"
    instruction: "Оберіть варіант, який найкраще передає реальну умову."
    items:
      - question: "____ матимеш час, напиши мені після заняття."
        options:
          - "Якщо"
          - "Бо"
          - "Щоб"
        correct: 0
        explanation: "Якщо вводить можливу ситуацію."
      - question: "____ хочеш отримати чесну відповідь, постав конкретне питання."
        options:
          - "Коли"
          - "Тому що"
          - "Де"
        correct: 0
        explanation: "Коли тут можна замінити на якщо."
      - question: "____ захочеш поговорити, зателефонуй."
        options:
          - "Як"
          - "Адже"
          - "Доки"
        correct: 0
        explanation: "Як у розмовному стилі може означати якщо."
      - question: "Якщо поїзд запізниться, ____ ми перенесемо початок."
        options:
          - "тоді"
          - "бо"
          - "щоб"
        correct: 0
        explanation: "Тоді підкреслює наступний сценарій."
      - question: "Напишіть адміністратору, ____ система не приймає пароль."
        options:
          - "якщо"
          - "тому що"
          - "який"
        correct: 0
        explanation: "Це інструкція на випадок можливої проблеми."
      - question: "У якому реченні коли є часовим, а не умовним?"
        options:
          - "Коли ми прийшли, заняття вже почалося."
          - "Коли хочеш знати правду, запитай прямо."
          - "Коли працюєш з архівом, перевіряй дату."
        correct: 0
        explanation: "Тут коли називає момент у часі."
      - question: "Яке речення найкраще звучить як правило?"
        options:
          - "Якщо документ неповний, його повертають на доопрацювання."
          - "Документ повернули, бо він був неповний."
          - "Документ повернули, щоб він був неповний."
        correct: 0
        explanation: "Якщо формулює загальну умову правила."
      - question: "Де кома стоїть правильно?"
        options:
          - "Якщо буде дощ, зустрінемося онлайн."
          - "Якщо буде дощ зустрінемося онлайн."
          - "Якщо, буде дощ зустрінемося онлайн."
        correct: 0
        explanation: "Початкову підрядну частину закриваємо комою."
      - question: "Де кома стоїть правильно, коли умова після головної?"
        options:
          - "Зателефонуй, якщо будеш поруч."
          - "Зателефонуй якщо, будеш поруч."
          - "Зателефонуй якщо будеш поруч."
        correct: 0
        explanation: "Кома стоїть перед підрядною частиною."
      - question: "Яке речення найприродніше для нейтрального письма?"
        options:
          - "Якщо матимеш питання, напиши."
          - "Як матимеш питання, напиши."
          - "У випадку якщо матимеш питання, напиши другу."
        correct: 0
        explanation: "Якщо нейтральніше за розмовне як і легше за канцелярську фразу."
      - question: "Що можна пропустити без втрати граматики: Якщо буде час, ____ обговоримо друге питання?"
        options:
          - "то"
          - "якщо"
          - "би"
        correct: 0
        explanation: "То корисне, але не завжди обов'язкове."
      - question: "Яке речення не є умовним?"
        options:
          - "Ми залишилися вдома, бо почалася гроза."
          - "Якщо почнеться гроза, залишимося вдома."
          - "Коли почнеться гроза, залишимося вдома."
        correct: 0
        explanation: "Бо вводить причину, не умову."
  - id: act-3
    type: match-up
    title: "Реальна чи нереальна умова"
    instruction: "Поєднайте речення з його граматичним поясненням."
    pairs:
      - left: "Якщо матиму час, прийду."
        right: "реальна майбутня умова"
      - left: "Якби мав час, прийшов би."
        right: "нереальна умова"
      - left: "Якщо команда отримає грант, відкриє другу групу."
        right: "реальний план"
      - left: "Якби команда отримала грант, відкрила б другу групу."
        right: "уявний сценарій"
      - left: "Коли хочеш відповідь, запитай конкретно."
        right: "умовне коли"
      - left: "Коли ми прийшли, заняття почалося."
        right: "часове коли"
      - left: "Як захочеш поговорити, зателефонуй."
        right: "розмовне як у значенні якщо"
      - left: "Коли б ми знали про затримку, змінили б маршрут."
        right: "книжніше нереальне коли б"
      - left: "Якщо прийдеш раніше, то допоможеш із залом."
        right: "то підкреслює наслідок"
      - left: "Якщо дощ не припиниться, тоді залишимося вдома."
        right: "тоді показує запасний сценарій"
      - left: "За умови що документи подадуть вчасно, заявку розглянуть."
        right: "формальна умова"
      - left: "Якщо тільки поїзд не запізниться, зустрінемося о шостій."
        right: "обмеження або виняток"
  - id: act-4
    type: fill-in
    title: "Умова, причина, час чи мета?"
    instruction: "Оберіть слово або фразу, що найточніше завершує речення."
    items:
      - sentence: "Візьми пальто, ____ буде холодно."
        answer: "якщо"
        options:
          - "якщо"
          - "бо"
          - "щоб"
        explanation: "Холод лише можливий, тому це умова."
      - sentence: "Візьми пальто, ____ вже холодно."
        answer: "бо"
        options:
          - "бо"
          - "якщо"
          - "щоб"
        explanation: "Холод подано як факт і причину."
      - sentence: "Ми прийшли раніше, ____ підготувати залу."
        answer: "щоб"
        options:
          - "щоб"
          - "якщо"
          - "бо"
        explanation: "Це мета: для чого прийшли?"
      - sentence: "____ ми прийшли, заняття вже почалося."
        answer: "Коли"
        options:
          - "Коли"
          - "Якщо"
          - "Тому що"
        explanation: "Це часове коли, бо названо момент."
      - sentence: "____ документи будуть неповні, заявку повернуть."
        answer: "Якщо"
        options:
          - "Якщо"
          - "Оскільки"
          - "Щоб"
        explanation: "Це правило на можливу ситуацію."
      - sentence: "____ документи неповні, заявку вже повернули."
        answer: "Оскільки"
        options:
          - "Оскільки"
          - "Якщо"
          - "Щоб"
        explanation: "Документи неповні - причина вже відомої дії."
      - sentence: "____ матимеш запитання, звертайся після заняття."
        answer: "Якщо"
        options:
          - "Якщо"
          - "Бо"
          - "Адже"
        explanation: "Це ввічлива інструкція на випадок можливої ситуації."
      - sentence: "____ я знав відповідь, сказав би зараз."
        answer: "Якби"
        options:
          - "Якби"
          - "Якщо"
          - "Тому що"
        explanation: "Сказав би вимагає нереальної умови."
      - sentence: "Ми не вийшли, ____ почалася гроза."
        answer: "бо"
        options:
          - "бо"
          - "якщо"
          - "щоб"
        explanation: "Гроза вже стала причиною."
      - sentence: "Ми не вийдемо, ____ почнеться гроза."
        answer: "якщо"
        options:
          - "якщо"
          - "бо"
          - "тому що"
        explanation: "Гроза лише можлива."
      - sentence: "Якщо аудиторія буде зайнята, ____ зустрінемося онлайн."
        answer: "тоді"
        options:
          - "тоді"
          - "бо"
          - "щоб"
        explanation: "Тоді підкреслює наступний сценарій."
      - sentence: "У M81 ми вивчатимемо речення ____, які відповідають на питання для чого?"
        answer: "мети"
        options:
          - "мети"
          - "умови"
          - "причини"
        explanation: "Для чого? - це питання мети."
  - id: act-5
    type: error-correction
    title: "Виправте умовні речення"
    instruction: "Знайдіть помилку в кожному реченні й запишіть природний варіант."
    items:
      - sentence: "Якщо буде дощ зустрінемося онлайн."
        error: "дощ зустрінемося"
        correction: "дощ, зустрінемося"
        error_type: construction
        explanation: "Початкову підрядну частину відокремлюємо комою."
      - sentence: "Зателефонуй якщо будеш поруч."
        error: "Зателефонуй якщо"
        correction: "Зателефонуй, якщо"
        error_type: construction
        explanation: "Кома стоїть перед підрядною частиною."
      - sentence: "Я не прийшов, якщо захворів."
        error: "якщо"
        correction: "бо"
        error_type: word
        explanation: "Хвороба вже стала причиною, не умовою."
      - sentence: "Якби я матиму час, прийду."
        error: "Якби"
        correction: "Якщо"
        error_type: word
        explanation: "Матиму час, прийду - реальна умова."
      - sentence: "Якщо я знав відповідь, допоміг би."
        error: "Якщо"
        correction: "Якби"
        error_type: word
        explanation: "Допоміг би вимагає нереальної умови."
      - sentence: "Коли ми прийшли, то заняття вже почалося якщо."
        error: "почалося якщо"
        correction: "почалося"
        error_type: word
        explanation: "Речення вже має часове коли; якщо наприкінці зайве."
      - sentence: "У випадку якщо завтра матиму час, зайду до тебе."
        error: "У випадку якщо"
        correction: "Якщо"
        error_type: phrase
        explanation: "Для побутової домовленості краще просте якщо."
      - sentence: "За умови що всі погодяться ми змінимо дату."
        error: "погодяться ми"
        correction: "погодяться, ми"
        error_type: construction
        explanation: "Початкова формальна умова теж закривається комою."
      - sentence: "Якщо тільки поїзд запізниться, зустрінемося о шостій."
        error: "запізниться"
        correction: "не запізниться"
        error_type: word
        explanation: "Якщо тільки часто вводить виняток із не."
      - sentence: "Якби ми знали про затримку, ми змінимо маршрут."
        error: "змінимо"
        correction: "змінили б"
        error_type: word
        explanation: "Нереальна умова потребує умовного способу в головній частині."
      - sentence: "Якщо хочеш знати правду, бо запитай прямо."
        error: "бо запитай"
        correction: "запитай"
        error_type: word
        explanation: "Бо зайве; головна дія - запитай прямо."
      - sentence: "Ми прийшли раніше, якщо підготувати залу."
        error: "якщо"
        correction: "щоб"
        error_type: word
        explanation: "Підготувати залу - мета, а не умова."
workbook:
  - id: wb-1
    type: group-sort
    title: "Розсортуйте умовні конструкції"
    instruction: "Перетягніть речення до групи за значенням або стилем."
    groups:
      - label: "Реальна умова"
        items:
          - "Якщо матиму час, прийду."
          - "Напиши, якщо зустріч перенесуть."
          - "Якщо команда отримає дані, звіт буде готовий завтра."
      - label: "Нереальна умова"
        items:
          - "Якби я мав більше часу, підготував би звіт."
          - "Коли б ми знали про затримку, змінили б маршрут."
          - "Якби завтра був вихідний, ми поїхали б до Черкас."
      - label: "Умовне коли або як"
        items:
          - "Коли хочеш відповідь, запитай конкретно."
          - "Як захочеш поговорити, зателефонуй."
          - "Коли працюєш з архівом, перевіряй дату."
      - label: "Формальна або обмежувальна умова"
        items:
          - "За умови що документи подадуть вчасно, заявку розглянуть."
          - "У випадку якщо оголосять тривогу, робота продовжиться онлайн."
          - "Зустрінемося о шостій, якщо тільки поїзд не запізниться."
  - id: wb-2
    type: cloze
    title: "Відновіть умовний план"
    instruction: "Заповніть 12 пропусків умовними сполучниками, словами або формами."
    text: "____ школа підтвердить залу до середи, ми надрукуємо афіші в четвер. ____ буде багато заявок, то відкриємо другу групу. ____ частина учасників не матиме ноутбуків, центр підготує планшети. За умови ____ батьки підпишуть дозвіл, підлітки залишаться на презентацію. У випадку ____ через тривогу перервуть заняття, команда продовжить роботу онлайн. ____ ми мали більший бюджет, запросили б музикантів. Якщо прийдеш раніше, ____ допоможеш підготувати залу. Якщо дощ не припиниться, ____ залишимося вдома. Я не прийшов, ____ захворів. Ми прийшли раніше, ____ підготувати залу. ____ хочеш отримати відповідь, постав конкретне питання. Зустрінемося о шостій, якщо тільки поїзд ____ запізниться."
    blanks:
      - id: 1
        answer: "Якщо"
        options: ["Якщо", "Бо", "Щоб"]
      - id: 2
        answer: "Коли"
        options: ["Коли", "Тому що", "Де"]
      - id: 3
        answer: "Якщо"
        options: ["Якщо", "Оскільки", "Щоб"]
      - id: 4
        answer: "що"
        options: ["що", "коли", "де"]
      - id: 5
        answer: "якщо"
        options: ["якщо", "бо", "щоб"]
