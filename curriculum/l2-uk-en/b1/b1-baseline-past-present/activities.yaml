- id: act-12
  type: essay-response
  title: Мій учорашній день
  instruction: Напишіть короткий текст про вчорашній день.
  prompt: Опишіть тло, три завершені події, одну повторювану дію та одну форму на -ся. Використайте щонайменше три дієслова недоконаного виду, три дієслова доконаного виду, два часові маркери й один природний зв’язок між реченнями.
  min_words: 90
  model_answer: Учора було холодно, і я працював удома. Зранку я читав статтю й робив нотатки. Потім прочитав лист, відповів колезі та написав короткий план. Увечері я готувався до розмови й домовився з друзями про зустріч.
  rubric:
  - criteria: граматика
    description: Час, вид і узгодження працюють без помилок.
  - criteria: зв'язність
    description: Текст має тло й послідовність подій.
  - criteria: стиль
    description: Мовлення природне для дорослого B1-учня.
  - criteria: видова точність
    description: Процес і результат розрізнено послідовно.
  - criteria: лексична природність
    description: Немає кальок на кшталт «я маю 20 років» або зайвого «є».
- id: act-13
  type: cloze
  title: Процес і результат у мінітексті
  instruction: Вставте форму, яка відповідає змісту речення.
  text: Учора Дарина {1} в бібліотеці. До вечора вона {2} короткий план. Коли Олексій {3} архівні матеріали, йому зателефонувала редакторка. Після розмови вони {4} про наступну зустріч. Пізніше Дарина {5} відповідь редакторці, Олексій {6} таблицю, а команда {7} роботу перед вечерею. Увечері всі {8} додому.
