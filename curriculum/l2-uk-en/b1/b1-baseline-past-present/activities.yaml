- id: act-5
  type: error-correction
  title: Редагування виду й часу
  instruction: Виправте речення.
  items:
  - sentence: Я прочитав книжку три години.
    error: прочитав
    correction: Я читав книжку три години.
    explanation: Маркер три години описує тривалий процес, тому потрібен недоконаний вид.
  - sentence: Вона написала лист цілий вечір.
    error: написала
    correction: Вона писала лист цілий вечір.
    explanation: Цілий вечір підкреслює тривалість, тому природніший недоконаний вид.
  - sentence: Дарина писав нотатки.
    error: писав
    correction: Дарина писала нотатки.
    explanation: Минулий час в однині узгоджується з родом підмета.
  - sentence: Ти вчишься щодня.
    error: вчишься
    correction: Ти вчишся щодня.
    explanation: У формі другої особи пишемо -шся без м'якого знака.
  - sentence: Я є читаю книгу кожного вечора.
    error: Я є читаю книгу кожного вечора.
    correction: Я читаю книгу кожного вечора.
    explanation: Форма читаю вже передає теперішню дію, тому зайва зв'язка не потрібна.
  - sentence: Я студент і я маю 20 років.
    error: Я студент і я маю 20 років.
    correction: Я студент. Мені 20 років.
    explanation: Вік природно передаємо давальним відмінком, а не конструкцією мати роки.
  - sentence: Вона сказав, що прийде пізніше.
    error: Вона сказав, що прийде пізніше.
    correction: Вона сказала, що прийде пізніше.
    explanation: У минулому часі форма однини узгоджується з родом підмета.
  - sentence: Дівчина, читаюча роман, сиділа на лавці.
    error: Дівчина, читаюча роман, сиділа на лавці.
    correction: 'Дівчина, яка читала роман, сиділа на лавці. (Або: Читаючи роман, дівчина сиділа на лавці).'
    explanation: Замість калькованого активного дієприкметника природно вжити підрядне речення.
  - sentence: Він прийшов додому, посинівший від холоду.
    error: Він прийшов додому, посинівший від холоду.
    correction: Він прийшов додому, посинілий від холоду.
    explanation: Для цієї ознаки потрібна форма на -лий, а не кальковане -вший.
  - sentence: Я читав вчора і я читатиму завтра.
    error: Я читав вчора і я читатиму завтра.
    correction: Я читав учора і читатиму завтра. (Займенники опускаються).
    explanation: Після першої форми займенник можна опустити; також нормативно вживати учора.
  - sentence: Дерево швидко зів'януло під сонцем.
    error: Дерево швидко зів'януло під сонцем.
    correction: Дерево швидко зів'яло під сонцем.
    explanation: У цій формі суфікс -ну- випадає.
- id: act-6
  type: fill-in
