    - домовилися
    - домовлялися
    - домовляємося
  - sentence: Я ___ до презентації.
    answer: готувався
    options:
    - готувався
    - підготувався
    - готується
  - sentence: Перед сном я ___ повідомлення.
    answer: написав
    options:
    - написав
    - писав
    - пишу
  - sentence: Поки колега ___ звіт, я шукав дані.
