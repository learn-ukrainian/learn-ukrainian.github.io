- id: act-1
  type: quiz
  title: Теперішній час
  instruction: Оберіть правильну відповідь.
  items:
  - question: Яка форма належить до І дієвідміни?
    options:
    - пишеш
    - робиш
    - бачиш
    correct: 0
    explanation: У формі пишеш видно закінчення з е, характерне для І дієвідміни.
  - question: Яка форма належить до ІІ дієвідміни?
    options:
    - робить
    - пише
    - читає
    correct: 0
    explanation: У формі робить видно закінчення з и, характерне для ІІ дієвідміни.
  - question: За якою формою зручно визначати дієвідміну?
    options:
    - вони пишуть / вони бачать
    - я писав / я писала
    - писати / написати
    correct: 0
    explanation: Форма третьої особи множини показує -уть/-ють або -ать/-ять.
- id: act-2
  type: fill-in
  title: Минулий час
  instruction: Вставте правильну форму минулого часу.
  items:
  - sentence: Дарина вчора ___ листа.
    answer: писала
    options:
    - писала
    - писав
    - писали
  - sentence: Олексій уранці ___ статтю.
    answer: читав
    options:
    - читав
    - читала
    - читали
  - sentence: Повідомлення ___ пізно.
    answer: прийшло
    options:
    - прийшов
    - прийшла
    - прийшло
  - sentence: Друзі довго ___ про поїздку.
    answer: говорили
    options:
    - говорив
    - говорила
    - говорили
- id: act-3
  type: group-sort
  title: Вид дієслова
  instruction: Розподіліть дієслова за видом.
  groups:
  - label: недоконаний вид
    items:
    - читати
    - писати
    - шукати
    - працювати
    - домовлятися
  - label: доконаний вид
    items:
    - прочитати
    - написати
    - знайти
    - попрацювати
    - домовитися
- id: act-4
  type: match-up
  title: Видові пари
  instruction: З'єднайте недоконаний і доконаний вид.
  pairs:
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: робити
    right: зробити
  - left: шукати
    right: знайти
  - left: говорити
    right: сказати
  - left: брати
    right: взяти
- id: act-5
  type: error-correction
  title: Редагування виду й часу
  instruction: Виправте речення.
  items:
  - sentence: Я прочитав книжку три години.
    error: прочитав
    correction: Я читав книжку три години.
    explanation: Маркер три години описує тривалий процес, тому потрібен недоконаний вид.
  - sentence: Вона написала лист цілий вечір.
    error: написала
    correction: Вона писала лист цілий вечір.
    explanation: Цілий вечір підкреслює тривалість, тому природніший недоконаний вид.
  - sentence: Дарина писав нотатки.
    error: писав
    correction: Дарина писала нотатки.
    explanation: Минулий час в однині узгоджується з родом підмета.
  - sentence: Ти вчишься щодня.
    error: вчишься
    correction: Ти вчишся щодня.
    explanation: У формі другої особи пишемо -шся без м'якого знака.
  - sentence: Я є читаю книгу кожного вечора.
    error: Я є читаю книгу кожного вечора.
    correction: Я читаю книгу кожного вечора.
    explanation: Форма читаю вже передає теперішню дію, тому зайва зв'язка не потрібна.
  - sentence: Я студент і я маю 20 років.
    error: Я студент і я маю 20 років.
    correction: Я студент. Мені 20 років.
    explanation: Вік природно передаємо давальним відмінком, а не конструкцією мати роки.
  - sentence: Вона сказав, що прийде пізніше.
    error: Вона сказав, що прийде пізніше.
    correction: Вона сказала, що прийде пізніше.
    explanation: У минулому часі форма однини узгоджується з родом підмета.
  - sentence: Дівчина, читаюча роман, сиділа на лавці.
    error: Дівчина, читаюча роман, сиділа на лавці.
    correction: 'Дівчина, яка читала роман, сиділа на лавці. (Або: Читаючи роман, дівчина сиділа на лавці).'
    explanation: Замість калькованого активного дієприкметника природно вжити підрядне речення.
  - sentence: Він прийшов додому, посинівший від холоду.
    error: Він прийшов додому, посинівший від холоду.
    correction: Він прийшов додому, посинілий від холоду.
    explanation: Для цієї ознаки потрібна форма на -лий, а не кальковане -вший.
  - sentence: Я читав вчора і я читатиму завтра.
    error: Я читав вчора і я читатиму завтра.
    correction: Я читав учора і читатиму завтра. (Займенники опускаються).
    explanation: Після першої форми займенник можна опустити; також нормативно вживати учора.
  - sentence: Дерево швидко зів'януло під сонцем.
    error: Дерево швидко зів'януло під сонцем.
    correction: Дерево швидко зів'яло під сонцем.
    explanation: У цій формі суфікс -ну- випадає.
- id: act-6
  type: cloze
  title: Розповідь про день
  instruction: Заповніть пропуски формами дієслів.
  text: Учора я [1] удома. Зранку [2] статтю, потім [3] нотатки. Коли я [4] каву, зателефонував друг. Увечері ми [5] про зустріч і я [6] до презентації.
  blanks:
  - id: 1
    answer: працював
    options:
    - працював
    - працювала
    - працювали
  - id: 2
    answer: читав
    options:
    - читав
    - прочитав
    - читаю
  - id: 3
    answer: зробив
    options:
    - зробив
    - робив
    - роблю
  - id: 4
    answer: робив
    options:
    - робив
    - зробив
    - робитиму
  - id: 5
    answer: домовилися
    options:
    - домовилися
    - домовлялися
    - домовляємося
  - id: 6
    answer: готувався
    options:
    - готувався
    - підготувався
    - готується
- id: act-7
  type: quiz
  title: Форма дієслова
  instruction: Визначте граматичну характеристику виділеної форми.
  items:
  - question: Я пишу план.
    options:
    - теперішній час, 1-ша особа однини
    - минулий час, чоловічий рід
    - доконаний вид, майбутнє значення
    correct: 0
    explanation: Пишу має теперішнє закінчення першої особи однини.
  - question: Вона читала статтю.
    options:
    - теперішній час, 3-тя особа
    - минулий час, жіночий рід
    - майбутній час, множина
    correct: 1
    explanation: Читала є формою минулого часу жіночого роду.
  - question: Ми прочитали текст.
    options:
    - минулий час, множина, доконаний вид
    - теперішній час, множина
    - минулий час, недоконаний вид
    correct: 0
    explanation: Прочитали має множину минулого часу й доконаний вид.
- id: act-8
  type: true-false
  title: Правда чи ні?
  instruction: Позначте правильність твердження.
  items:
  - statement: Дієслова теперішнього часу завжди недоконаного виду.
    correct: true
  - statement: Дієслова минулого часу змінюються за особами.
    correct: false
  - statement: Форма переміг має нульовий суфікс у чоловічому роді.
    correct: true
  - statement: Форма вчишся пишеться з м'яким знаком після ш.
    correct: false
- id: act-9
  type: order
  title: Послідовність подій
  instruction: Упорядкуйте завершені дії.
  items:
  - Я прокинувся.
  - Я поснідав.
  - Я вийшов з дому.
  - Я сів в автобус.
  - Я приїхав на роботу.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
- id: act-10
  type: match-up
  title: Суфікси минулого часу
  instruction: З'єднайте форму минулого часу з суфіксом або його відсутністю.
  pairs:
  - left: писав
    right: -в
  - left: писала
    right: -л-
  - left: переміг
    right: нульовий суфікс
  - left: відніс
    right: нульовий суфікс
  - left: читали
    right: -л-
  - left: несла
    right: -л-
- id: act-11
  type: odd-one-out
  title: Зайва форма
  instruction: Оберіть форму, яка не належить до групи.
  items:
  - words:
    - пишу
    - пишеш
    - пише
    - написав
    correct: 3
    explanation: Це минулий час доконаного виду, решта форми теперішнього часу.
  - words:
    - читав
    - писала
    - працювали
    - робимо
    correct: 3
    explanation: Це теперішній час, решта форми минулого часу.
  - words:
    - посинілий
    - посивілий
    - зів'ялий
    - посинівший
    correct: 3
    explanation: Це ненормативна калькована форма; нормативно посинілий.
- id: act-12
  type: essay-response
  title: Мій учорашній день
  instruction: Напишіть короткий текст про вчорашній день.
  prompt: Опишіть тло, три завершені події та одну форму на -ся. Використайте щонайменше три дієслова недоконаного виду й три дієслова доконаного виду.
  min_words: 90
  model_answer: Учора було холодно, і я працював удома. Зранку я читав статтю й робив нотатки. Потім прочитав лист, відповів колезі та написав короткий план. Увечері я готувався до розмови й домовився з друзями про зустріч.
  rubric:
  - criteria: граматика
    description: Час, вид і узгодження працюють без помилок.
  - criteria: зв'язність
    description: Текст має тло й послідовність подій.
  - criteria: стиль
    description: Мовлення природне для дорослого B1-учня.
