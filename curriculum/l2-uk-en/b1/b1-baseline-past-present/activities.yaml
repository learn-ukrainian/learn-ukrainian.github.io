- id: act-1
  type: quiz
  title: Теперішній час
  instruction: Оберіть правильну відповідь.
  items:
  - question: Яка форма належить до І дієвідміни?
    options:
    - пишеш
    - робиш
    - бачиш
    correct: 0
    explanation: У формі пишеш видно закінчення з е, характерне для І дієвідміни.
  - question: Яка форма належить до ІІ дієвідміни?
    options:
    - робить
    - пише
    - читає
    correct: 0
    explanation: У формі робить видно закінчення з и, характерне для ІІ дієвідміни.
  - question: За якою формою зручно визначати дієвідміну?
    options:
    - вони пишуть / вони бачать
    - я писав / я писала
    - писати / написати
    correct: 0
    explanation: Форма третьої особи множини показує -уть/-ють або -ать/-ять.
  - question: Яке закінчення має форма «вони читають»?
    options:
    - -ють
    - -ать
    - -ить
    correct: 0
    explanation: Форма третьої особи множини І дієвідміни має -уть/-ють.
  - question: Яка форма правильно узгоджена з «ми»?
    options:
    - ми працюємо
    - ми працюєш
    - ми працює
    correct: 0
    explanation: Підмет ми вимагає форми першої особи множини.
  - question: Яка форма є теперішнім часом?
    options:
    - він шукає
    - він шукав
    - він знайде
    correct: 0
    explanation: Шукає має особове закінчення теперішнього часу.
  - question: Який варіант правильно пишеться?
    options:
    - ти вчишся
    - ти вчишься
    - ти вчиш ся
    correct: 0
    explanation: У формі вчишся не пишемо м’якого знака після ш.
  - question: Яка форма належить до ІІ дієвідміни?
    options:
    - вони бачать
    - вони пишуть
    - вони читають
    correct: 0
    explanation: Закінчення -ать/-ять типове для ІІ дієвідміни.
  - question: Яка форма передає теперішню дію без допоміжного слова?
    options:
    - я читаю
    - я є читаю
    - я був читаю
    correct: 0
    explanation: Особова форма читаю сама є присудком.
  - question: Яка пара показує різні особи теперішнього часу?
    options:
    - пишу / пишеш
    - писав / писала
    - написав / напишу
    correct: 0
    explanation: Пишу і пишеш розрізняють першу та другу особу.
- id: act-2
  type: fill-in
  title: Минулий час
  instruction: Вставте правильну форму минулого часу.
  items:
  - sentence: Дарина вчора ___ листа.
    answer: писала
    options:
    - писала
    - писав
    - писали
  - sentence: Олексій уранці ___ статтю.
    answer: читав
    options:
    - читав
    - читала
    - читали
  - sentence: Повідомлення ___ пізно.
    answer: прийшло
    options:
    - прийшов
    - прийшла
    - прийшло
  - sentence: Друзі довго ___ про поїздку.
    answer: говорили
    options:
    - говорив
    - говорила
    - говорили
  - sentence: Марко ввечері ___ план.
    answer: написав
    options:
    - написав
    - написала
    - написали
  - sentence: Сестри вчора ___ до Львова.
    answer: поїхали
    options:
    - поїхав
    - поїхала
    - поїхали
  - sentence: Вікно раптом ___.
    answer: відчинилося
    options:
    - відчинився
    - відчинилася
    - відчинилося
  - sentence: Ми після занять ___ у кав’ярні.
    answer: зустрілися
    options:
    - зустрівся
    - зустрілася
    - зустрілися
