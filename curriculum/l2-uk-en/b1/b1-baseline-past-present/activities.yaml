version: '1.0'
module: b1-baseline-past-present
level: b1
inline:
  - id: act-1
    type: quiz
    title: Теперішній час
    instruction: Оберіть правильну відповідь.
    items:
      - question: Яка форма належить до І дієвідміни?
        options:
          - пишеш
          - робиш
          - бачиш
        correct: 0
        explanation: У формі пишеш видно закінчення з е, характерне для І дієвідміни.
      - question: Яка форма належить до ІІ дієвідміни?
        options:
          - робить
          - пише
          - читає
        correct: 0
        explanation: У формі робить видно закінчення з и, характерне для ІІ дієвідміни.
      - question: За якою формою зручно визначати дієвідміну?
        options:
          - вони пишуть / вони бачать
          - я писав / я писала
          - писати / написати
        correct: 0
        explanation: Форма третьої особи множини показує -уть/-ють або -ать/-ять.
  - id: act-2
    type: fill-in
    title: Минулий час
    instruction: Вставте правильну форму минулого часу.
    items:
      - sentence: Дарина вчора ___ листа.
        answer: писала
        options:
          - писала
          - писав
          - писали
      - sentence: Олексій уранці ___ статтю.
        answer: читав
        options:
          - читав
          - читала
          - читали
      - sentence: Повідомлення ___ пізно.
        answer: прийшло
        options:
          - прийшов
          - прийшла
          - прийшло
      - sentence: Друзі довго ___ про поїздку.
        answer: говорили
        options:
          - говорив
          - говорила
          - говорили
      - sentence: Марко ввечері ___ план.
        answer: написав
        options:
          - написав
          - написала
          - написали
  - id: act-3
    type: group-sort
    title: Вид дієслова
    instruction: Розподіліть дієслова за видом.
    groups:
      - label: недоконаний вид
        items:
          - читати
          - писати
          - шукати
      - label: доконаний вид
        items:
          - прочитати
          - написати
          - знайти
  - id: act-4
    type: match-up
    title: Швидка перевірка відповідників
    instruction: З'єднайте недоконаний і доконаний вид. Одну непрозору пару запам'ятайте як готовий блок.
    pairs:
      - left: писати
        right: написати
      - left: читати
        right: прочитати
      - left: робити
        right: зробити
      - left: будувати
        right: збудувати
      - left: брати
        right: взяти
  - id: act-5
    type: error-correction
    title: Швидке редагування
    instruction: Виправте речення.
    items:
      - sentence: Я прочитав книжку три години.
        error: прочитав
        correction: читав
        options:
          - читав
          - прочитав
          - читатиму
        explanation: Маркер три години описує тривалий процес, тому потрібен недоконаний вид.
      - sentence: Дарина писав нотатки.
        error: писав
        correction: писала
        options:
          - писала
          - писав
          - писали
        explanation: Минулий час в однині узгоджується з родом підмета.
workbook:
  - id: wb-1
    type: fill-in
    title: Розповідь про день
    instruction: Заповніть пропуски формами дієслів.
    items:
      - sentence: Учора я ___ удома.
        answer: працював
        options:
          - працював
          - працювала
          - працювали
      - sentence: Зранку я ___ статтю.
        answer: читав
        options:
          - читав
          - прочитав
          - читаю
      - sentence: Потім я ___ нотатки.
        answer: зробив
        options:
          - зробив
          - робив
          - роблю
      - sentence: Коли я ___ каву, зателефонував друг.
        answer: робив
        options:
          - робив
          - зробив
          - робитиму
      - sentence: Увечері ми ___ про зустріч.
        answer: домовилися
        options:
          - домовилися
          - домовлялися
          - домовляємося
      - sentence: Я ___ до презентації.
        answer: готувався
        options:
          - готувався
          - підготувався
          - готується
      - sentence: Перед сном я ___ повідомлення.
        answer: написав
        options:
          - написав
          - писав
          - пишу
      - sentence: Поки колега ___ звіт, я шукав дані.
        answer: перевіряв
        options:
          - перевіряв
          - перевірив
          - перевірить
  - id: wb-2
    type: quiz
    title: Форма дієслова
    instruction: Визначте граматичну характеристику виділеної форми.
    items:
      - question: Я пишу план.
        options:
          - теперішній час, 1-ша особа однини
          - минулий час, чоловічий рід
          - доконаний вид, майбутнє значення
        correct: 0
        explanation: Пишу має теперішнє закінчення першої особи однини.
      - question: Вона читала статтю.
        options:
          - теперішній час, 3-тя особа
          - минулий час, жіночий рід
          - майбутній час, множина
        correct: 1
        explanation: Читала є формою минулого часу жіночого роду.
      - question: Ми прочитали текст.
        options:
          - минулий час, множина, доконаний вид
          - теперішній час, множина
          - минулий час, недоконаний вид
        correct: 0
        explanation: Прочитали має множину минулого часу й доконаний вид.
      - question: Він працює над проєктом.
        options:
          - теперішній час, 3-тя особа однини
          - минулий час, чоловічий рід
          - майбутній час, множина
        correct: 0
        explanation: Працює має теперішнє закінчення третьої особи.
      - question: Я повернувся додому.
        options:
          - минулий час, чоловічий рід, форма на -ся
          - теперішній час, 1-ша особа
          - минулий час, жіночий рід
        correct: 0
        explanation: Повернувся є минулим часом чоловічого роду.
      - question: Вони домовилися про зустріч.
        options:
          - минулий час, множина, доконаний вид
          - теперішній час, множина
          - майбутній час, доконаний вид
        correct: 0
        explanation: Домовилися позначає завершений результат у минулому.
      - question: Ти бачиш помилку.
        options:
          - теперішній час, 2-га особа однини
          - минулий час, чоловічий рід
          - майбутній час, 2-га особа
        correct: 0
        explanation: Бачиш має закінчення другої особи однини.
      - question: Вона підготувалася до іспиту.
        options:
          - минулий час, жіночий рід, доконаний вид
          - теперішній час, жіночий рід
          - минулий час, недоконаний вид
        correct: 0
        explanation: Підготувалася показує завершену підготовку.
      - question: Ми читаємо інструкцію.
        options:
          - теперішній час, 1-ша особа множини
          - минулий час, множина
          - майбутній час, доконаний вид
        correct: 0
        explanation: Читаємо має закінчення першої особи множини.
      - question: Лист прийшов учора.
        options:
          - минулий час, чоловічий рід
          - теперішній час, 3-тя особа
          - майбутній час
        correct: 0
        explanation: Прийшов є формою минулого часу чоловічого роду.
  - id: wb-3
    type: true-false
    title: Правда чи ні?
    instruction: Позначте правильність твердження.
    items:
      - statement: Дієслова теперішнього часу завжди недоконаного виду.
        correct: true
      - statement: Дієслова минулого часу змінюються за особами.
        correct: false
      - statement: Форма переміг має нульовий суфікс у чоловічому роді.
        correct: true
      - statement: Форма вчишся пишеться з м'яким знаком після ш.
        correct: false
      - statement: Форма писала узгоджується з підметом жіночого роду.
        correct: true
        explanation: У минулому часі однина має родові форми.
      - statement: Форма вони бачать належить до І дієвідміни.
        correct: false
        explanation: Закінчення -ать указує на ІІ дієвідміну.
      - statement: Доконаний вид може передавати завершену подію в минулому.
        correct: true
        explanation: Написав, прочитала, зробили називають результат.
      - statement: У реченні «я є працюю» слово є потрібне для теперішнього часу.
        correct: false
        explanation: Особова форма працюю не потребує зв’язки.
  - id: wb-4
    type: order
    title: Послідовність подій
    instruction: Упорядкуйте завершені дії.
    items:
      - Я прокинувся.
      - Я поснідав.
      - Я вийшов з дому.
      - Я сів в автобус.
      - Я приїхав на роботу.
      - Я перевірив пошту.
      - Я написав відповідь.
      - Я вимкнув комп’ютер.
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
  - id: wb-5
    type: match-up
    title: Суфікси минулого часу
    instruction: З'єднайте форму минулого часу з суфіксом або його відсутністю.
    pairs:
      - left: писав
        right: -в після голосного
      - left: писала
        right: -л- жіночого роду
      - left: переміг
        right: нульовий суфікс після приголосного
      - left: відніс
        right: нульовий суфікс після -с
      - left: читали
        right: -л- множини
      - left: несла
        right: -л- перед -а
      - left: знайшов
        right: -в у формі на -ов
      - left: росла
        right: -л- у сполуці -сл-
      - left: стеріг
        right: нульовий суфікс після -г
      - left: принесла
        right: -л- у жіночому роді від нести
      - left: побіг
        right: нульовий суфікс у чоловічому роді від бігти
      - left: пішов
        right: -в у формі пішов
  - id: wb-6
    type: odd-one-out
    title: Зайва форма
    instruction: Оберіть форму, яка не належить до групи.
    items:
      - words:
          - пишу
          - пишеш
          - пише
          - написав
        correct: 3
        explanation: Це минулий час доконаного виду, решта форми теперішнього часу.
      - words:
          - читав
          - писала
          - працювали
          - робимо
        correct: 3
        explanation: Це теперішній час, решта форми минулого часу.
      - words:
          - посинілий
          - посивілий
          - зів'ялий
          - посинівший
        correct: 3
        explanation: Це ненормативна калькована форма; нормативно посинілий.
      - words:
          - бачу
          - бачиш
          - бачать
          - побачив
        correct: 3
        explanation: Це минулий час доконаного виду, решта форми теперішнього часу.
      - words:
          - говорила
          - писали
          - читав
          - працює
        correct: 3
        explanation: Це теперішній час, решта форми минулого часу.
      - words:
          - зробив
          - прочитала
          - написали
          - робиш
        correct: 3
        explanation: Це теперішній час, решта форми доконаного минулого часу.
      - words:
          - вчуся
          - готуєшся
          - готуємося
          - бачимо
        correct: 3
        explanation: Бачимо не має постфікса -ся.
      - words:
          - пишу
          - читаєш
          - шукаємо
          - бачить
        correct: 3
        explanation: Бачить належить до ІІ дієвідміни, решта приклади І дієвідміни.
  - id: wb-7
    type: essay-response
    title: Мій учорашній день
    instruction: Напишіть короткий текст про вчорашній день.
    prompt: Опишіть обставини ситуації, три завершені події, одну повторювану дію та одну форму на -ся. Використайте щонайменше три дієслова недоконаного виду, три дієслова доконаного виду, два часові маркери й один природний зв’язок між реченнями.
    min_words: 90
    model_answer: Учора було холодно, і я працював удома. Зранку я читав статтю й робив нотатки. Потім прочитав лист, відповів колезі та написав короткий план. Увечері я готувався до розмови й домовився з друзями про зустріч.
    rubric:
      - criteria: граматика
        description: Час, вид і узгодження працюють без помилок.
      - criteria: зв'язність
        description: Текст має обставини ситуації й послідовність подій.
      - criteria: стиль
        description: Мовлення природне для дорослого B1-учня.
      - criteria: видова точність
        description: Процес і результат розрізнено послідовно.
      - criteria: лексична природність
        description: Немає кальок на кшталт «я маю 20 років» або зайвого «є».
  - id: wb-8
    type: cloze
    title: Процес і результат у мінітексті
    instruction: Вставте форму, яка відповідає змісту речення.
    text: Учора Дарина {1} в бібліотеці. До вечора вона {2} короткий план. Коли Олексій {3} старі матеріали, йому зателефонувала редакторка. Після розмови вони {4} про наступну зустріч. Пізніше Дарина {5} відповідь редакторці, Олексій {6} таблицю, а команда {7} роботу перед вечерею. Увечері всі {8} додому.
    blanks:
      - id: 1
        answer: працювала
        options:
          - працювала
          - попрацювала
          - працює
      - id: 2
        answer: написала
        options:
          - написала
          - писала
          - пише
      - id: 3
        answer: читав
        options:
          - читав
          - прочитав
          - читатиме
      - id: 4
        answer: домовилися
        options:
          - домовилися
          - домовлялися
          - домовляються
      - id: 5
        answer: надіслала
        options:
          - надіслала
          - надсилала
          - надсилає
      - id: 6
        answer: перевіряв
        options:
          - перевіряв
          - перевірив
          - перевірить
      - id: 7
        answer: завершила
        options:
          - завершила
          - завершувала
          - завершує
      - id: 8
        answer: повернулися
        options:
          - повернулися
          - поверталися
          - повертаються
  - id: wb-9
    type: mark-the-words
    title: Доконаний вид у розповіді
    instruction: Позначте форми доконаного виду, які рухають подію вперед.
    criteria: доконаний вид у минулому часі
    text: Учора я читав статтю дві години, потім **прочитав** останній розділ, **зробив** нотатки й **надіслав** редакторці короткий висновок. Після обіду я **відповів** колезі, **домовився** про зустріч, **завершив** таблицю, **зберіг** файл і **вимкнув** комп’ютер. Увечері ми ще обговорювали деталі.
    target_words:
      - прочитав
      - зробив
      - надіслав
      - відповів
      - домовився
      - завершив
      - зберіг
      - вимкнув
  - id: wb-10
    type: odd-one-out
    title: Зайва форма
    instruction: Оберіть форму, яка не належить до групи.
    items:
      - words:
          - читав
          - писала
          - працювали
          - напишу
        correct: 3
        explanation: Це майбутній час доконаного виду; решта форм стоять у минулому часі.
      - words:
          - домовлявся
          - готувалася
          - хвилювалися
          - вчишся
        correct: 3
        explanation: Це теперішній час другої особи; решта форм минулого часу на -ся.
      - words:
          - посинілий
          - зів'ялий
          - посивілий
          - працювавший
        correct: 3
        explanation: Це калькована форма на -вший; нормативно краще підрядне речення або форма на -лий, якщо вона природна.
      - words:
          - пишеш
          - читає
          - працюємо
          - робить
        correct: 3
        explanation: Робить належить до ІІ дієвідміни; решта приклади І дієвідміни.
      - words:
          - працював
          - читала
          - писали
          - зробимо
        correct: 3
        explanation: Це майбутній час доконаного виду, решта форми минулого часу.
      - words:
          - знайшов
          - написала
          - прочитали
          - шукаєш
        correct: 3
        explanation: Це теперішній час, решта форми доконаного минулого часу.
      - words:
          - бачу
          - бачиш
          - бачимо
          - робить
        correct: 3
        explanation: Робить належить до іншого дієслова; решта — форми дієслова бачити.
      - words:
          - готувався
          - домовилася
          - повернулися
          - читав
        correct: 3
        explanation: Читав не має постфікса -ся.
  - id: wb-11
    type: quiz
    title: Підсумкова перевірка
    instruction: Оберіть відповідь, яка найточніше пояснює форму.
    items:
      - question: Чому форма «я пишу» не потребує слова «є»?
        options:
          - бо дієслово вже має особове закінчення й передає теперішню дію
          - бо українська не має теперішнього часу
          - бо «є» вживається тільки в минулому часі
        correct: 0
        explanation: Особова форма «пишу» сама виконує роль присудка в теперішньому часі.
      - question: Яка пара найкраще показує процес і результат?
        options:
          - писав / написав
          - пишу / пишеш
          - читала / писала
        correct: 0
        explanation: «Писав» показує процес, а «написав» — завершений результат.
      - question: Яка форма правильно узгоджена з підметом «Дарина»?
        options:
          - Дарина повернулася
          - Дарина повернувся
          - Дарина повернулися
        correct: 0
        explanation: У минулому часі однина узгоджується з родом підмета.
      - question: Який варіант нормативно передає ознаку після зміни стану?
        options:
          - посинілий від холоду палець
