- id: act-14
  type: mark-the-words
  title: Доконаний вид у розповіді
  instruction: Позначте форми доконаного виду, які рухають подію вперед.
  criteria: доконаний вид у минулому часі
  text: Учора я читав статтю дві години, потім **прочитав** останній розділ, **зробив** нотатки й **надіслав** редакторці короткий висновок. Після обіду я **відповів** колезі, **домовився** про зустріч, **завершив** таблицю, **зберіг** файл і **вимкнув** комп’ютер. Увечері ми ще обговорювали деталі.
  target_words:
  - прочитав
  - зробив
  - надіслав
  - відповів
  - домовився
  - завершив
  - зберіг
  - вимкнув
- id: act-15
  type: odd-one-out
  title: Зайва форма
  instruction: Оберіть форму, яка не належить до групи.
  items:
  - words:
    - читав
    - писала
    - працювали
    - напишу
    correct: 3
    explanation: Це майбутній час доконаного виду; решта форм стоять у минулому часі.
  - words:
    - домовлявся
    - готувалася
    - хвилювалися
    - вчишся
    correct: 3
    explanation: Це теперішній час другої особи; решта форм минулого часу на -ся.
  - words:
    - посинілий
    - зів'ялий
    - посивілий
    - працювавший
    correct: 3
    explanation: Це калькована форма на -вший; нормативно краще підрядне речення або форма на -лий, якщо вона природна.
  - words:
    - пишеш
    - читає
    - працюємо
    - робить
    correct: 3
    explanation: Робить належить до ІІ дієвідміни; решта приклади І дієвідміни.
  - words:
    - працював
    - читала
    - писали
    - зробимо
    correct: 3
    explanation: Це майбутній час доконаного виду, решта форми минулого часу.
  - words:
    - знайшов
    - написала
    - прочитали
    - шукаєш
    correct: 3
    explanation: Це теперішній час, решта форми доконаного минулого часу.
  - words:
    - бачу
    - бачиш
    - бачимо
    - робить
    correct: 3
    explanation: Робить належить до іншого дієслова; решта — форми дієслова бачити.
  - words:
    - готувався
    - домовилася
    - повернулися
    - читав
    correct: 3
    explanation: Читав не має постфікса -ся.
- id: act-16
  type: quiz
  title: Підсумкова перевірка
  instruction: Оберіть відповідь, яка найточніше пояснює форму.
  items:
  - question: Чому форма «я пишу» не потребує слова «є»?
    options:
    - бо дієслово вже має особове закінчення й передає теперішню дію
    - бо українська не має теперішнього часу
    - бо «є» вживається тільки в минулому часі
    correct: 0
    explanation: Особова форма «пишу» сама виконує роль присудка в теперішньому часі.
  - question: Яка пара найкраще показує процес і результат?
    options:
    - писав / написав
    - пишу / пишеш
    - читала / писала
    correct: 0
    explanation: «Писав» показує процес, а «написав» — завершений результат.
  - question: Яка форма правильно узгоджена з підметом «Дарина»?
    options:
    - Дарина повернулася
    - Дарина повернувся
    - Дарина повернулися
    correct: 0
    explanation: У минулому часі однина узгоджується з родом підмета.
  - question: Який варіант нормативно передає ознаку після зміни стану?
    options:
    - посинілий від холоду палець
    - посинівший від холоду палець
    - палець, який посинівший
    correct: 0
    explanation: Для цієї ознаки природна форма на -лий; форма на -вший є калькованою.
  - question: Який варіант правильно передає вік?
    options:
    - Мені 20 років.
    - Я маю 20 років.
    - Я є 20 років.
    correct: 0
    explanation: Українською вік природно передають давальним відмінком.
  - question: У якому реченні дія тривала?
    options:
    - Я читав статтю цілий вечір.
    - Я прочитав статтю до вечора.
    - Я надіслав лист.
    correct: 0
    explanation: Цілий вечір підкреслює процес.
  - question: У якому реченні дія завершена?
    options:
    - Марко написав план.
    - Марко писав план дві години.
    - Марко пише план щодня.
    correct: 0
    explanation: Написав називає готовий результат.
  - question: Яка форма правильно узгоджена з підметом «ми»?
    options:
    - ми повернулися
    - ми повернувся
    - ми повернулася
    correct: 0
    explanation: Ми вимагає форми множини.
  - question: Яка форма має постфікс -ся?
    options:
    - готувався
    - читав
    - пише
    correct: 0
    explanation: У слові готувався постфікс -ся стоїть після форми минулого часу.
  - question: Яке речення нормативне?
    options:
    - Учора я читав і писав нотатки.
    - Я є читав і я є писав нотатки.
    - Учора я читаю і писав нотатки.
    correct: 0
    explanation: У минулому часі допоміжне є не потрібне, а часові форми мають узгоджуватися з контекстом.
