    text: "Кияни зустріли львів'ян на вокзалі, а львів'яни привезли листи для киян. Громадяни підписали спільну заяву, і без громадян рішення не ухвалили. Селяни підтримали ярмарок, селян запросили до ради, а селянам подякували. Міщани відкрили школу, міщан запросили до ради, а міщанам надіслали листи. Окремо пояснили винятки: грузинів та осетинів."
    target_words:
