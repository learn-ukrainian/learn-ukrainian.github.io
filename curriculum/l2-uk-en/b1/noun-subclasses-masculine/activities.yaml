  - id: wb-11
    type: essay-response
    title: Мініпояснення для однокурсника
    instruction: Напишіть коротке пояснення з власними прикладами.
    prompt: "Поясніть іншому студентові різницю між словами пекар/лікар/школяр і киянин/громадянин/селянин. Обов'язково використайте форми кияни, киян, громадяни, громадян, лікарю, школяре і один виняток на зразок грузинів або осетинів."
    min_words: 80
    model_answer: "Слова пекар, лікар і школяр називають людей за професією, заняттям або роллю. Їх треба відмінювати як окремі іменники: з пекарем, до лікаря, школяре. Слова киянин, громадянин і селянин називають походження або належність. У множині в них випадає -ин: кияни, громадяни, селяни. У родовому множини маємо нульове закінчення: киян, громадян, селян. Але є винятки: грузини, грузинів; осетини, осетинів."
    rubric:
      - criteria: "Модель -ин/-янин"
        description: "Пояснює випадання -ин у множині та нульове закінчення в родовому множини."
        points: 3
      - criteria: "Кличний відмінок"
        description: "Правильно використовує лікарю і школяре."
        points: 2
      - criteria: "Приклади"
        description: "Наводить щонайменше один виняток із родовим множини на -ів."
        points: 2
      - criteria: "Мовна природність"
        description: "Пояснення звучить природно для B1 і не перевантажене термінами."
        points: 3
