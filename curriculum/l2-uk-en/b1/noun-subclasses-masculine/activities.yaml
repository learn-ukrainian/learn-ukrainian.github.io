version: '1.0'
module: noun-subclasses-masculine
level: b1
inline:
  - id: act-1
    type: match-up
    title: Суфікс і значення
    instruction: Поєднайте слово з найточнішим поясненням його словотвірної моделі.
    pairs:
      - left: "пекар"
        right: "людина за дією або професією: пече хліб"
      - left: "лікар"
        right: "людина за професією: лікує пацієнтів"
      - left: "школяр"
        right: "людина за належністю до школи"
      - left: "кобзар"
        right: "музикант, пов'язаний із кобзою"
      - left: "каменяр"
        right: "майстер або робітник, пов'язаний із каменем"
      - left: "киянин"
        right: "людина з Києва або житель Києва"
      - left: "громадянин"
        right: "людина як член державної спільноти"
      - left: "селянин"
        right: "людина з села або сільської громади"
      - left: "бондар"
        right: "ремісник, який робить діжки та дерев'яний посуд"
      - left: "гончар"
        right: "майстер, який працює з глиною і посудом"
      - left: "токар"
        right: "фахівець, який працює за верстатом"
      - left: "міщанин"
        right: "людина з міста або міської громади"
  - id: act-2
    type: fill-in
    title: Форми на -ар і -яр
    instruction: Виберіть нормативну форму в реченні.
    items:
      - sentence: "Я хочу поговорити з ____ після огляду."
        answer: "лікарем"
        options:
          - "лікарем"
          - "лікаром"
          - "лікарями"
        explanation: "Орудний однини слова лікар: лікарем."
      - sentence: "У пекарні немає досвідченого ____."
        answer: "пекаря"
        options:
          - "пекаря"
          - "пекару"
          - "пекар"
        explanation: "Родовий однини істоти: пекаря."
      - sentence: "Ми слухали старого ____ на ярмарку."
        answer: "кобзаря"
        options:
          - "кобзаря"
          - "кобзар"
          - "кобзарем"
        explanation: "Знахідний однини істоти збігається з родовим: кобзаря."
      - sentence: "У музеї розповіли про двох ____."
        answer: "гончарів"
        options:
          - "гончарів"
          - "гончар"
          - "гончарами"
        explanation: "Родовий множини: гончарів."
      - sentence: "Учитель звернувся до ____ біля дошки."
        answer: "школяра"
        options:
          - "школяра"
          - "школяря"
          - "школяре"
        explanation: "Родовий однини: школяра."
      - sentence: "Біля майстерні працювали ____."
        answer: "столяри"
        options:
          - "столяри"
          - "столярі"
          - "столярів"
        explanation: "Для слова столяр нормативна називна множина: столяри."
      - sentence: "На виставці було багато ____."
        answer: "каменярів"
        options:
          - "каменярів"
          - "каменяр"
          - "каменярами"
        explanation: "Родовий множини: каменярів."
      - sentence: "У майстерні бракує ____."
        answer: "слюсаря"
        options:
          - "слюсаря"
          - "слюсара"
          - "слюсарем"
        explanation: "Родовий однини: слюсаря."
      - sentence: "Батьки говорили з ____ після уроків."
        answer: "школярем"
        options:
          - "школярем"
          - "школяром"
          - "школяря"
        explanation: "Орудний однини слова школяр: школярем."
      - sentence: "Пане ____, перевірте замок."
        answer: "слюсарю"
        options:
          - "слюсарю"
          - "слюсаре"
          - "слюсаря"
        explanation: "Кличний відмінок слова слюсар: слюсарю."
      - sentence: "До цеху запросили нового ____."
        answer: "токаря"
        options:
          - "токаря"
          - "токар"
          - "токарем"
        explanation: "Знахідний однини істоти збігається з родовим: токаря."
      - sentence: "На ярмарку ми познайомилися з ____."
        answer: "бондарем"
        options:
          - "бондарем"
          - "бондаром"
          - "бондаря"
        explanation: "Орудний однини слова бондар: бондарем."
  - id: act-3
    type: group-sort
    title: Кличний відмінок
    instruction: Розподіліть звертання за моделями.
    groups:
      - label: "Кличний на -ю"
        items:
          - "пекарю"
          - "лікарю"
          - "кобзарю"
          - "бондарю"
          - "гончарю"
          - "токарю"
          - "слюсарю"
      - label: "Кличний на -е"
        items:
          - "школяре"
          - "каменяре"
          - "столяре"
          - "ювіляре"
      - label: "Кличний на -ине"
        items:
          - "киянине"
          - "громадянине"
          - "селянине"
          - "львів'янине"
  - id: act-4
    type: quiz
    title: Множина слів на -ин
    instruction: Оберіть нормативну форму множини або родового множини.
    items:
      - question: "Яка форма називного множини від киянин?"
        options:
          - "кияни"
          - "киянини"
          - "кияні"
        correct: 0
        explanation: "Суфікс -ин випадає: киянин -> кияни."
      - question: "Яка форма родового множини від кияни?"
        options:
          - "киян"
          - "киянів"
          - "киянинів"
        correct: 0
        explanation: "Після випадання -ин родовий множини має нульове закінчення: киян."
      - question: "Яка форма називного множини від громадянин?"
        options:
          - "громадяни"
          - "громадянини"
          - "громадян"
        correct: 0
        explanation: "Називний множини: громадяни."
      - question: "Яка форма родового множини від громадяни?"
        options:
          - "громадян"
          - "громадянів"
          - "громадянинів"
        correct: 0
        explanation: "Родовий множини: громадян."
      - question: "Яка форма називного множини від селянин?"
        options:
          - "селяни"
          - "селянини"
          - "селянів"
        correct: 0
        explanation: "Називний множини: селяни."
      - question: "Яка форма родового множини від львів'яни?"
        options:
          - "львів'ян"
          - "львів'янів"
          - "львів'янинів"
        correct: 0
        explanation: "Львів'янин -> львів'яни -> львів'ян."
      - question: "Яка форма є винятком із закінченням -ів?"
        options:
          - "грузинів"
          - "киян"
          - "селян"
        correct: 0
        explanation: "Грузин не втрачає -ин у множині: грузини, грузинів."
      - question: "Яка форма є нормативною для осетин?"
        options:
          - "осетинів"
          - "осет"
          - "осетян"
        correct: 0
        explanation: "Осетин -> осетини, родовий множини осетинів."
      - question: "Яка форма називного множини від львів'янин?"
        options:
          - "львів'яни"
          - "львів'янини"
          - "львів'янів"
        correct: 0
        explanation: "Львів'янин -> львів'яни."
      - question: "Яка форма родового множини від селяни?"
        options:
          - "селян"
          - "селянів"
          - "селянинів"
        correct: 0
        explanation: "Селянин -> селяни -> селян."
      - question: "Яка форма називного множини від міщанин?"
        options:
          - "міщани"
          - "міщанини"
          - "міщан"
        correct: 0
        explanation: "Міщанин -> міщани."
      - question: "Яка форма родового множини від міщани?"
        options:
          - "міщан"
          - "міщанів"
          - "міщанинів"
        correct: 0
        explanation: "Родовий множини після випадання -ин: міщан."
  - id: act-5
    type: error-correction
    title: Редагуємо типові помилки
    instruction: Виправте форму і коротко поясніть модель.
    items:
      - sentence: "У групі було багато киянинів."
        error: "киянинів"
        correction: "киян"
        error_type: word
        explanation: "Киянин втрачає -ин у множині, а родовий множини має нульове закінчення."
      - sentence: "До школи прийшли нові школяріни."
        error: "школяріни"
        correction: "школярі"
        error_type: word
        explanation: "Школяр не має суфікса -ин; множина: школярі."
      - sentence: "Пане школярю, прочитайте речення."
        error: "школярю"
        correction: "школяре"
        error_type: word
        explanation: "Перевірена клична форма слова школяр: школяре."
      - sentence: "Громадянинів запросили на зустріч."
        error: "Громадянинів"
        correction: "Громадян"
        error_type: word
        explanation: "Громадянин -> громадяни -> громадян."
      - sentence: "На фестивалі бракувало гончар."
        error: "гончар"
        correction: "гончарів"
        error_type: word
        explanation: "Після багато/бракувало потрібен родовий множини: гончарів."
      - sentence: "Каменярю, покажіть інструмент."
        error: "Каменярю"
        correction: "Каменяре"
        error_type: word
        explanation: "Перевірена клична форма слова каменяр: каменяре."
      - sentence: "Ми говорили з досвідченим пекаром."
        error: "пекаром"
        correction: "пекарем"
        error_type: word
        explanation: "Орудний однини слова пекар: пекарем."
      - sentence: "У статті згадали кількох грузин."
        error: "грузин"
        correction: "грузинів"
        error_type: word
        explanation: "Грузин є винятком: родовий множини грузинів."
      - sentence: "Львів'янинів запросили на екскурсію."
        error: "Львів'янинів"
        correction: "Львів'ян"
        error_type: word
        explanation: "Львів'янин -> львів'яни -> львів'ян."
      - sentence: "У місті живе багато міщанів."
        error: "міщанів"
        correction: "міщан"
        error_type: word
        explanation: "Міщанин у родовому множини має форму міщан."
      - sentence: "Пане лікаре, прийміть пацієнта."
        error: "лікаре"
        correction: "лікарю"
        error_type: word
        explanation: "Нормативна клична форма слова лікар: лікарю."
      - sentence: "У цеху працювали досвідчені токари."
        error: "токари"
        correction: "токарі"
        error_type: word
        explanation: "Називний множини слова токар: токарі."
workbook:
  - id: wb-1
    type: quiz
    title: Словотвірна модель
    instruction: Оберіть найточніше пояснення.
    items:
      - question: "Що найчастіше називають слова на -ар/-яр у цьому модулі?"
        options:
          - "людину за професією, заняттям або пов'язаним предметом"
          - "лише назву місця"
          - "лише абстрактну якість"
        correct: 0
        explanation: "Пекар, лікар, кобзар, каменяр називають осіб."
      - question: "Яка пара найкраще показує модель місця або походження?"
        options:
          - "Київ -> киянин"
          - "пекти -> пекар"
          - "кобза -> кобзар"
        correct: 0
        explanation: "Киянин називає людину з Києва."
      - question: "Яке слово пов'язане з громадою або державною спільнотою?"
        options:
          - "громадянин"
          - "гончар"
          - "школяр"
        correct: 0
        explanation: "Громадянин - член державної спільноти."
      - question: "Яке слово пов'язане з кобзою?"
        options:
          - "кобзар"
          - "каменяр"
          - "міщанин"
        correct: 0
        explanation: "Кобзар - музикант, пов'язаний із кобзою."
      - question: "Яке слово найприродніше означає майстра з глини?"
        options:
          - "гончар"
          - "бондар"
          - "столяр"
        correct: 0
        explanation: "Гончар виготовляє посуд із глини."
      - question: "Яке слово означає майстра з дерев'яних діжок?"
        options:
          - "бондар"
          - "пекар"
          - "слюсар"
        correct: 0
        explanation: "Бондар виробляє діжки й інший дерев'яний посуд."
      - question: "Яке слово пов'язане зі школою?"
        options:
          - "школяр"
          - "селянин"
          - "токар"
        correct: 0
        explanation: "Школяр - учень школи."
      - question: "Яке слово в цьому модулі НЕ належить до продуктивної моделі -ин/-янин?"
        options:
          - "лікар"
          - "киянин"
          - "львів'янин"
        correct: 0
        explanation: "Лікар має суфікс -ар, а не -ин/-янин."
      - question: "Яке слово означає фахівця, що працює за верстатом?"
        options:
          - "токар"
          - "селянин"
          - "кобзар"
        correct: 0
        explanation: "Токар працює за верстатом."
      - question: "Яке слово означає майстра з ремонту механізмів або замків?"
        options:
          - "слюсар"
          - "школяр"
          - "киянин"
        correct: 0
        explanation: "Слюсар ремонтує механізми."
      - question: "Яке слово історично називає жителя міста?"
        options:
          - "міщанин"
          - "пекар"
          - "гончар"
        correct: 0
        explanation: "Міщанин - житель міста або міської громади."
      - question: "Яка пара належить до винятків із родовим множини на -ів?"
        options:
          - "грузин, осетин"
          - "киянин, селянин"
          - "громадянин, львів'янин"
        correct: 0
        explanation: "Грузини і осетини зберігають родовий множини на -ів: грузинів, осетинів."
  - id: wb-2
    type: fill-in
    title: Відмінки в реченні
    instruction: Вставте форму, яка граматично пасує до контексту.
    items:
      - sentence: "Ми подякували ____ за допомогу."
        answer: "лікарю"
        options:
          - "лікарю"
          - "лікаря"
          - "лікарем"
        explanation: "Подякувати кому? лікарю."
      - sentence: "У місті відкрили школу для майбутніх ____."
        answer: "пекарів"
        options:
          - "пекарів"
          - "пекарі"
          - "пекарями"
        explanation: "Для кого? родовий множини: пекарів."
      - sentence: "Я бачив молодого ____ біля майстерні."
        answer: "бондаря"
        options:
          - "бондаря"
          - "бондарем"
          - "бондар"
        explanation: "Знахідний істоти в однині: бондаря."
      - sentence: "Екскурсовод говорив із ____ про глину."
        answer: "гончарем"
        options:
          - "гончарем"
          - "гончаром"
          - "гончаря"
        explanation: "Орудний однини: гончарем."
      - sentence: "У класі бракувало одного ____."
        answer: "школяра"
        options:
          - "школяра"
          - "школяря"
          - "школярі"
        explanation: "Родовий однини: школяра."
      - sentence: "Музей запросив трьох ____."
        answer: "каменярів"
        options:
          - "каменярів"
          - "каменярі"
          - "каменяри"
        explanation: "Знахідний множини істот збігається з родовим: каменярів."
      - sentence: "Біля верстатів працювали ____."
        answer: "токарі"
        options:
          - "токарі"
          - "токари"
          - "токарів"
        explanation: "Називний множини слова токар: токарі."
      - sentence: "Під час ремонту не було ____."
        answer: "слюсаря"
        options:
          - "слюсаря"
          - "слюсара"
          - "слюсарем"
        explanation: "Родовий однини: слюсаря."
      - sentence: "Перед роботою майстер порадився із ____."
        answer: "слюсарем"
        options:
          - "слюсарем"
          - "слюсаром"
          - "слюсаря"
        explanation: "Орудний однини слова слюсар: слюсарем."
      - sentence: "Директор привітав молодого ____."
        answer: "токаря"
        options:
          - "токаря"
          - "токар"
          - "токарем"
        explanation: "Знахідний однини істоти: токаря."
      - sentence: "На святі бракувало досвідчених ____."
        answer: "бондарів"
        options:
          - "бондарів"
          - "бондарі"
          - "бондарями"
        explanation: "Після бракувало потрібен родовий множини: бондарів."
      - sentence: "Після виступу слухачі підійшли до ____."
        answer: "кобзаря"
        options:
          - "кобзаря"
          - "кобзарю"
          - "кобзарем"
        explanation: "Прийменник до вимагає родового: до кобзаря."
  - id: wb-3
    type: match-up
    title: Лема і потрібна форма
    instruction: Поєднайте початкову форму з потрібною формою.
    pairs:
      - left: "пекар + орудний однини"
        right: "пекарем"
      - left: "лікар + кличний"
        right: "лікарю"
      - left: "кобзар + родовий множини"
        right: "кобзарів"
      - left: "гончар + кличний"
        right: "гончарю"
      - left: "школяр + кличний"
        right: "школяре"
      - left: "каменяр + кличний"
        right: "каменяре"
      - left: "столяр + називний множини"
        right: "столяри"
      - left: "токар + називний множини"
        right: "токарі"
      - left: "бондар + кличний"
        right: "бондарю"
      - left: "слюсар + орудний однини"
        right: "слюсарем"
      - left: "киянин + родовий множини"
        right: "киян"
      - left: "осетин + родовий множини"
        right: "осетинів"
  - id: wb-4
    type: group-sort
    title: За значенням і формою
    instruction: Розподіліть слова за практичними групами.
    groups:
