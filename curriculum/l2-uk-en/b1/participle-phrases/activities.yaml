version: '1.0'
module: participle-phrases
level: b1
inline:
  - id: act-1
    type: quiz
    title: Знайдіть зворот
    instruction: Оберіть правильне пояснення структури речення.
    items:
      - question: "У реченні Лист, написаний олівцем, лежить на столі означуване слово - це:"
        options:
          - лист
          - олівцем
          - лежить
        correct: 0
        explanation: Зворот описує лист.
      - question: "У фразі написаний олівцем лист дієприкметниковий зворот - це:"
        options:
          - написаний олівцем
          - олівцем лист
          - лист написаний
        correct: 0
        explanation: Дієприкметник написаний разом із залежним словом олівцем утворює зворот.
      - question: "Яке питання ставимо від означуваного слова до звороту?"
        options:
          - який? яка? яке? які?
          - де? коли?
          - що роблячи?
        correct: 0
        explanation: Дієприкметниковий зворот працює як означення.
      - question: "Який варіант має зворот після означуваного слова?"
        options:
          - "Будинок, збудований у центрі, видно здалеку."
          - "Збудований у центрі будинок видно здалеку."
          - "Будинок видно здалеку."
        correct: 0
        explanation: Спершу йде означуване слово будинок, потім зворот.
      - question: "Який варіант має зворот перед означуваним словом?"
        options:
          - "Пофарбований у синій колір паркан видно здалеку."
          - "Паркан, пофарбований у синій колір, видно здалеку."
          - "Паркан видно здалеку."
        correct: 0
        explanation: Зворот пофарбований у синій колір стоїть перед іменником паркан.
      - question: "Коли в базовій моделі потрібні коми?"
        options:
          - коли зворот стоїть після означуваного слова
          - коли зворот стоїть перед означуваним словом
          - завжди після кожного дієприкметника
        correct: 0
        explanation: Постпозиція вимагає відокремлення комами.
      - question: "Яке речення правильно розставляє коми?"
        options:
          - "Міст, збудований у XIX столітті, досі служить."
          - "Міст збудований у XIX столітті, досі служить."
          - "Міст, збудований у XIX столітті досі служить."
        correct: 0
        explanation: Зворот після іменника в середині речення виділяється з обох боків.
      - question: "Яке речення не потребує ком у базовій моделі?"
        options:
          - "Збудований у XIX столітті міст досі служить."
          - "Міст, збудований у XIX столітті, досі служить."
          - "Міст, досі служить."
        correct: 0
        explanation: Зворот стоїть перед іменником міст.
      - question: "Яка трансформація правильна?"
        options:
          - "лист, написаний олівцем -> лист, який написали олівцем"
          - "лист, написаний олівцем -> лист, який олівцем лежить"
          - "лист, написаний олівцем -> олівець, який написав лист"
        correct: 0
        explanation: Підрядне речення розгортає дію над листом.
      - question: "Що краще для живої дії в теперішньому часі?"
        options:
          - "студент, який читає книжку"
          - "читаючий книжку студент"
          - "прочитаний книжку студент"
        correct: 0
        explanation: Активні форми на -учий/-ючий часто кальковані; безпечніше який + дієслово.
      - question: "У реченні Стомлений дорогою, я швидко заснув кома потрібна, бо зворот стосується:"
        options:
          - особового займенника
          - назви міста
          - безособової форми на -но
        correct: 0
        explanation: Звороти при особових займенниках відокремлюються.
      - question: "Яке речення звучить найменш перевантажено?"
        options:
          - "Комісія підготувала проєкт, рада його погодила, а текст опублікували на сайті."
          - "Проєкт, підготовлений комісією, погоджений радою, опублікований на сайті, набуде чинності завтра."
          - "Підготовлений погоджений опублікований проєкт радою сайтом набуде чинності."
        correct: 0
        explanation: Коли зворотів забагато, краще розбити речення.
  - id: act-2
    type: fill-in
    title: Позиція і коми
    instruction: Оберіть речення з правильною пунктуацією.
    items:
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Лист, написаний олівцем, лежить на столі."
        options:
          - "Лист, написаний олівцем, лежить на столі."
          - "Лист написаний олівцем лежить на столі."
          - "Лист, написаний олівцем лежить на столі."
        explanation: Зворот після іменника виділяється двома комами.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Написаний олівцем лист лежить на столі."
        options:
          - "Написаний олівцем лист лежить на столі."
          - "Написаний олівцем, лист лежить на столі."
          - "Написаний, олівцем лист лежить на столі."
        explanation: Зворот перед іменником у базовій моделі не відокремлюється.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Дорога, розмита дощем, була закрита."
        options:
          - "Дорога, розмита дощем, була закрита."
          - "Дорога розмита дощем, була закрита."
          - "Дорога, розмита дощем була закрита."
        explanation: Після іменника дорога потрібні дві коми.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Розмита дощем дорога була закрита."
        options:
          - "Розмита дощем дорога була закрита."
          - "Розмита дощем, дорога була закрита."
          - "Розмита, дощем дорога була закрита."
        explanation: Перед іменником дорога коми немає.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Міст, збудований над річкою, відкрили в суботу."
        options:
          - "Міст, збудований над річкою, відкрили в суботу."
          - "Міст збудований над річкою відкрили в суботу."
          - "Міст, збудований над річкою відкрили в суботу."
        explanation: Зворот стоїть після означуваного слова міст.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Збудований над річкою міст відкрили в суботу."
        options:
          - "Збудований над річкою міст відкрили в суботу."
          - "Збудований над річкою, міст відкрили в суботу."
          - "Збудований, над річкою міст відкрили в суботу."
        explanation: Препозитивний зворот щільно стоїть перед іменником.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Картина, намальована олією, висить у галереї."
        options:
          - "Картина, намальована олією, висить у галереї."
          - "Картина намальована олією, висить у галереї."
          - "Картина, намальована олією висить у галереї."
        explanation: Коми відкривають і закривають зворот.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Намальована олією картина висить у галереї."
        options:
          - "Намальована олією картина висить у галереї."
          - "Намальована олією, картина висить у галереї."
          - "Намальована, олією картина висить у галереї."
        explanation: Перед іменником картина коми немає.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Документи, підписані директором, передали до архіву."
        options:
          - "Документи, підписані директором, передали до архіву."
          - "Документи підписані директором передали до архіву."
          - "Документи, підписані директором передали до архіву."
        explanation: Зворот після множинного іменника документи відокремлюється.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Підписані директором документи передали до архіву."
        options:
          - "Підписані директором документи передали до архіву."
          - "Підписані директором, документи передали до архіву."
          - "Підписані, директором документи передали до архіву."
        explanation: Зворот перед іменником не відокремлюється.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Я, здивований новиною, мовчав кілька секунд."
        options:
          - "Я, здивований новиною, мовчав кілька секунд."
          - "Я здивований новиною мовчав кілька секунд."
          - "Я, здивований новиною мовчав кілька секунд."
        explanation: Зворот при особовому займеннику відокремлюється.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Здивований новиною, я мовчав кілька секунд."
        options:
          - "Здивований новиною, я мовчав кілька секунд."
          - "Здивований новиною я мовчав кілька секунд."
          - "Здивований, новиною я мовчав кілька секунд."
        explanation: При особовому займеннику я кома потрібна і перед займенником.
