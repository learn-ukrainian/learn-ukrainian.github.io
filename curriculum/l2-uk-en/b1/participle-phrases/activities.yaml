        explanation: Залежне слово олівцем має бути всередині звороту.
      - question: "Що правильно замінює зворот міст, збудований у XIX столітті?"
        options:
          - "міст, який збудували в XIX столітті"
          - "міст, який збудував XIX століття"
          - "міст, який будує століття"
        correct: 0
        explanation: Підрядне речення розгортає дію над мостом.
      - question: "Що не варто робити з англійським reading a book?"
        options:
          - "механічно писати читаючий книжку"
          - "перекладати як який читає книжку"
          - "вибирати підрядне речення"
        correct: 0
        explanation: Форми на -учий/-ючий часто кальковані.
