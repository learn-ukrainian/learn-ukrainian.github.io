        correct: 0
        explanation: Після звороту в середині речення потрібна друга кома.
      - question: "Який варіант має правильну межу звороту?"
        options:
          - "Ми бачили лист, написаний олівцем."
          - "Ми бачили написаний лист олівцем."
          - "Ми бачили написаний лист, олівцем."
