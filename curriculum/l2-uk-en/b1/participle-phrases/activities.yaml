  - id: act-4
    type: group-sort
    title: Три моделі
    instruction: Розподіліть приклади за структурою.
    groups:
      - label: "Постпозиція з комами"
        items:
          - "Лист, написаний олівцем, лежить на столі."
          - "Дорога, розмита дощем, була закрита."
          - "Міст, збудований над річкою, відкрили в суботу."
          - "Документи, підписані директором, передали до архіву."
      - label: "Препозиція без ком"
        items:
          - "Написаний олівцем лист лежить на столі."
          - "Розмита дощем дорога була закрита."
          - "Збудований над річкою міст відкрили в суботу."
          - "Підписані директором документи передали до архіву."
      - label: "Підрядне речення з який"
        items:
          - "Лист, який написали олівцем, лежить на столі."
          - "Дорога, яку розмив дощ, була закрита."
          - "Міст, який збудували над річкою, відкрили в суботу."
          - "Документи, які підписав директор, передали до архіву."
  - id: act-5
    type: error-correction
    title: Виправте пунктуацію
    instruction: Виправте одну пунктуаційну або структурну помилку.
    items:
      - sentence: "Лист написаний олівцем лежить на столі."
        error: "Лист написаний олівцем лежить на столі."
        correction: "Лист, написаний олівцем, лежить на столі."
        explanation: Зворот після іменника лист треба виділити комами.
      - sentence: "Написаний олівцем, лист лежить на столі."
        error: "Написаний олівцем, лист лежить на столі."
        correction: "Написаний олівцем лист лежить на столі."
        explanation: Зворот перед іменником у базовій моделі не відокремлюється.
      - sentence: "Дорога, розмита дощем була закрита."
        error: "Дорога, розмита дощем була закрита."
        correction: "Дорога, розмита дощем, була закрита."
        explanation: Потрібна друга кома після звороту.
      - sentence: "Розмита дощем, дорога була закрита."
        error: "Розмита дощем, дорога була закрита."
        correction: "Розмита дощем дорога була закрита."
        explanation: Перед іменником дорога кома не потрібна.
      - sentence: "Міст збудований над річкою відкрили в суботу."
        error: "Міст збудований над річкою відкрили в суботу."
        correction: "Міст, збудований над річкою, відкрили в суботу."
        explanation: Зворот після іменника міст відокремлюється.
      - sentence: "Збудований над річкою, міст відкрили в суботу."
        error: "Збудований над річкою, міст відкрили в суботу."
        correction: "Збудований над річкою міст відкрили в суботу."
        explanation: Перед іменником міст кома зайва.
      - sentence: "Картина, намальована олією висить у галереї."
        error: "Картина, намальована олією висить у галереї."
        correction: "Картина, намальована олією, висить у галереї."
        explanation: Зворот у середині речення закривається другою комою.
      - sentence: "Намальована олією, картина висить у галереї."
        error: "Намальована олією, картина висить у галереї."
        correction: "Намальована олією картина висить у галереї."
        explanation: У препозиції без обставинного відтінку коми немає.
      - sentence: "Документи підписані директором передали до архіву."
        error: "Документи підписані директором передали до архіву."
        correction: "Документи, підписані директором, передали до архіву."
        explanation: Зворот після слова документи виділяється комами.
      - sentence: "Підписані директором, документи передали до архіву."
        error: "Підписані директором, документи передали до архіву."
        correction: "Підписані директором документи передали до архіву."
        explanation: Зворот перед означуваним словом не відокремлюється.
      - sentence: "Я здивований новиною мовчав кілька секунд."
        error: "Я здивований новиною мовчав кілька секунд."
        correction: "Я, здивований новиною, мовчав кілька секунд."
        explanation: Зворот при особовому займеннику відокремлюється.
      - sentence: "Прочитана всіма, бібліотекар забрала книгу."
        error: "Прочитана всіма, бібліотекар забрала книгу."
        correction: "Бібліотекар забрала книгу, прочитану всіма."
        explanation: Зворот має стосуватися книги, а не бібліотекаря.
workbook:
  - id: wb-1
    type: quiz
    title: Редакторський вибір
    instruction: Оберіть найприродніший або граматично правильний варіант.
    items:
      - question: "Що краще для офіційного повідомлення?"
