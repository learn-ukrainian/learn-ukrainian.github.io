          - "Підготовлені комісією, матеріали опублікували на сайті."
        correct: 0
        explanation: Зворот після іменника відокремлено правильно.
      - question: "Що краще для розмовного стилю?"
        options:
          - "Це книга, яку мені подарувала сестра."
