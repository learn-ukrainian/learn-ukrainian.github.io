- title: "B1 M46-M48: case control"
  role: curriculum
  notes: "Поглиблені модулі про відмінки потрібні для відмінювання хто/що/який/чий/котрий, себе, ніхто, будь-хто."
- title: "B1 M61-M62: numerals and quantity"
  role: curriculum
  notes: "Попередні модулі тренували питання котрий? і скільки?; M63 переносить ці форми в займенникову систему."
- title: "B1 M66-M67: subordinate clauses"
  role: curriculum
  notes: "M63 готує відносні та з'ясувальні речення через сполучні слова хто, що, який, чий, котрий."
- title: "Заболотний Grade 6, §58"
  role: textbook
  notes: "Пояснює питальні й відносні займенники, синтаксичну роль хто/що/який/чий/котрий, відмінювання, а також зворотний займенник себе без називного, роду й числа."
  source_ref: "6-klas-ukrmova-zabolotnyi-2020, §58, pp.192-202"
- title: "Литвінова Grade 6, §54"
  role: textbook
  notes: "Дає таблиці питально-відносних займенників, пояснює функцію відносних займенників у складному реченні, уживання котрий для часу/вибору, відмінювання себе та наголос у заперечних займенниках."
  source_ref: "6-klas-ukrmova-litvinova-2023, §54, pp.255-277"
- title: "Авраменко Grade 6, §94"
  role: textbook
  notes: "Подає відмінювання питально-відносних займенників, повну парадигму себе та відмінювання неозначених і заперечних займенників як похідних від питальних."
  source_ref: "6-klas-ukrmova-avramenko-2023, §94, pp.185-186"
- title: "Заболотний Grade 6, §61"
  role: textbook
  notes: "Пояснює творення, правопис, відмінювання й наголошування заперечних та неозначених займенників; окремо правило ні з ким / ні перед чим."
  source_ref: "6-klas-ukrmova-zabolotnyi-2020, §61, pp.203-206"
- title: "Голуб Grade 6, §65, §68"
  role: textbook
  notes: "Підтверджує класифікацію займенників і правопис неозначених та заперечних форм: разом, через дефіс або окремо з прийменником."
  source_ref: "6-klas-ukrmova-golub-2023, §65, §68"
