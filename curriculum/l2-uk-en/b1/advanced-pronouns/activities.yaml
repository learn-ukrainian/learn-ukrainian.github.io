version: '1.0'
module: advanced-pronouns
level: b1
inline:
  - id: act-1
    type: quiz
    title: Який це займенник?
    instruction: "Оберіть правильний тип, форму або пояснення."
    items:
      - question: "Який займенник ставить питання про особу?"
        options:
          - "хто"
          - "що"
          - "який"
        correct: 0
        explanation: "Хто питає про особу."
      - question: "Який займенник питає про належність?"
        options:
          - "чий"
          - "котрий"
          - "що"
        correct: 0
        explanation: "Чий відповідає на питання належності."
      - question: "У якому реченні який є відносним займенником?"
        options:
          - "Це документ, який треба підписати."
          - "Який документ треба підписати?"
          - "Який сьогодні день?"
        correct: 0
        explanation: "У першому реченні який з'єднує частини складного речення."
      - question: "Який варіант правильно вживає форму після прийменника з?"
        options:
          - "з ким"
          - "з хто"
          - "з кого"
        correct: 0
        explanation: "Після з потрібен орудний: з ким."
      - question: "Яка форма правильна в реченні: Людина, ___ я говорив, працює тут?"
        options:
          - "з якою"
          - "яка"
          - "яку"
        correct: 0
        explanation: "Говорив з ким? з якою."
      - question: "Коли котрий звучить найприродніше?"
        options:
          - "коли питаємо про час або вибір серед кількох"
          - "завжди замість який"
          - "тільки з неістотами"
        correct: 0
        explanation: "Котра година? У котрому вагоні?"
      - question: "Яка форма правильно питає про документ?"
        options:
          - "у чиєму документі"
          - "у чий документі"
          - "у чиїм документа"
        correct: 0
        explanation: "Документ чоловічого роду в місцевому: у чиєму документі."
      - question: "Що правильно сказати про себе?"
        options:
          - "Себе не має називного відмінка."
          - "Себе має форму називного себе."
          - "Себе змінюється за родами."
        correct: 0
        explanation: "Зворотний займенник не має називного, роду й числа."
      - question: "Яка форма є давальним відмінком від себе?"
        options:
          - "собі"
          - "себе"
          - "собою"
        correct: 0
        explanation: "Давальний: собі."
      - question: "Що правильно пояснює різницю між себе і свій?"
        options:
          - "себе є займенником-додатком, а свій узгоджується з іменником"
          - "себе стоїть тільки біля іменника"
          - "свій не змінюється за родами"
        correct: 0
        explanation: "Свій поводиться як присвійна прикметникова форма."
      - question: "Який варіант означає невідому конкретну особу?"
        options:
          - "хтось"
          - "ніхто"
          - "кожен"
        correct: 0
        explanation: "Хтось називає невідому або не названу особу."
      - question: "Який варіант є заперечним займенником?"
        options:
          - "ніщо"
          - "щось"
          - "будь-що"
        correct: 0
        explanation: "Ніщо вказує на відсутність предмета або явища."
  - id: act-2
    type: fill-in
    title: Відмінок займенника
    instruction: "Виберіть форму займенника, якої вимагає речення."
    items:
      - sentence: "З ____ ти говорив після лекції?"
        answer: "ким"
        options:
          - "ким"
          - "хто"
          - "кого"
        explanation: "З + орудний: з ким."
      - sentence: "До ____ треба звернутися з цією заявою?"
        answer: "кого"
        options:
          - "кого"
          - "ким"
          - "кому"
        explanation: "До + родовий: до кого."
      - sentence: "Я не знаю, ____ це телефон."
        answer: "чий"
        options:
          - "чий"
          - "чиїм"
          - "чийого"
        explanation: "Телефон у називному чоловічого роду: чий телефон."
      - sentence: "У ____ кабінеті буде зустріч?"
        answer: "чиєму"
        options:
          - "чиєму"
          - "чий"
          - "чиїм"
        explanation: "Кабінет чоловічого роду в місцевому: у чиєму кабінеті."
      - sentence: "Це людина, з ____ я домовився про інтерв'ю."
        answer: "якою"
        options:
          - "якою"
          - "яка"
          - "яку"
        explanation: "Домовився з ким? з якою."
      - sentence: "Поясни, про ____ йдеться в листі."
        answer: "що"
        options:
          - "що"
          - "чим"
          - "чому"
        explanation: "Йдеться про що? форма що після про."
      - sentence: "Я уявив ____ іншу розмову."
        answer: "собі"
        options:
          - "собі"
          - "себе"
          - "собою"
        explanation: "Уявити кому? собі."
      - sentence: "Вона була задоволена ____ після виступу."
        answer: "собою"
        options:
          - "собою"
          - "собі"
          - "себе"
        explanation: "Задоволена ким? собою."
      - sentence: "Візьміть із ____ паспорт."
        answer: "собою"
        options:
          - "собою"
          - "себе"
          - "собі"
        explanation: "Із собою - усталена орудна форма."
      - sentence: "На столі лежить ____ зошит."
        answer: "чийсь"
        options:
          - "чийсь"
          - "чиїмсь"
          - "чийогось"
        explanation: "Зошит у називному чоловічого роду: чийсь."
      - sentence: "Ми чекали ____ із адміністрації."
        answer: "когось"
        options:
          - "когось"
          - "хтось"
          - "кимось"
        explanation: "Чекали кого? когось."
      - sentence: "Він ні з ____ не радився."
        answer: "ким"
        options:
          - "ким"
          - "кого"
          - "хто"
        explanation: "Прийменник розриває заперечний займенник: ні з ким."
  - id: act-3
    type: match-up
    title: Термін і приклад
    instruction: "Поєднайте займенниковий термін або правило з прикладом."
    pairs:
      - left: "питальний займенник"
        right: "Хто прийшов?"
      - left: "відносний займенник"
        right: "Людина, яка прийшла"
      - left: "хто в родовому"
        right: "до кого"
      - left: "що в орудному"
        right: "чим"
      - left: "чий у місцевому"
        right: "у чиєму кабінеті"
      - left: "себе без називного"
        right: "для себе, собі, собою"
      - left: "свій"
        right: "свою заяву"
      - left: "-сь разом"
        right: "хтось, якийсь"
      - left: "будь- через дефіс"
        right: "будь-хто"
      - left: "-небудь через дефіс"
        right: "хто-небудь"
      - left: "ні з прийменником окремо"
        right: "ні з ким"
      - left: "наголос змінює значення"
        right: "нікого немає / нікого спитати"
  - id: act-4
    type: group-sort
    title: Розряди займенників
    instruction: "Розкладіть форми за розрядом або правилом написання."
    groups:
      - label: "Питально-відносні"
        items:
          - "хто"
          - "який"
          - "чий"
      - label: "Зворотні"
        items:
          - "себе"
          - "собі"
          - "собою"
      - label: "Неозначені"
        items:
          - "хтось"
          - "будь-хто"
          - "дехто"
      - label: "Заперечні"
        items:
          - "ніхто"
          - "ні з ким"
          - "ніщо"
  - id: act-5
    type: error-correction
    title: Виправляємо займенники
    instruction: "Знайдіть і виправте одну помилку у формі, правописі або виборі займенника."
    items:
      - sentence: "Людина, яка я говорив, працює в університеті."
        error: "яка я говорив"
        correction: "з якою я говорив"
        error_type: phrase
        explanation: "Говорив з ким? з якою."
      - sentence: "Я не знаю, з хто ти домовився."
        error: "з хто"
        correction: "з ким"
        error_type: phrase
        explanation: "Після з потрібен орудний."
      - sentence: "Це студент, чийого заява лежить тут."
        error: "чийого заява"
        correction: "чия заява"
        error_type: phrase
        explanation: "Заява жіночого роду в називному: чия."
      - sentence: "Себе прийшов на консультацію."
        error: "Себе прийшов"
        correction: "Він сам прийшов"
        error_type: phrase
        explanation: "Себе не має називного й не може бути підметом."
      - sentence: "Вона взяла себе книжку."
        error: "себе книжку"
        correction: "свою книжку"
        error_type: phrase
        explanation: "Біля іменника потрібен присвійний свій."
      - sentence: "Ми були задоволені собі."
        error: "задоволені собі"
        correction: "задоволені собою"
        error_type: phrase
        explanation: "Задоволені ким? собою."
      - sentence: "Хто сь залишив парасольку."
        error: "Хто сь"
        correction: "Хтось"
        error_type: phrase
        explanation: "Частка -сь пишеться разом."
      - sentence: "Будь хто може відповісти."
        error: "Будь хто"
        correction: "Будь-хто"
        error_type: phrase
        explanation: "Будь- без прийменника пишемо через дефіс."
      - sentence: "Чи є тут хто небудь із групи?"
        error: "хто небудь"
        correction: "хто-небудь"
        error_type: phrase
        explanation: "-небудь пишемо через дефіс."
      - sentence: "Він нізким не радився."
        error: "нізким"
        correction: "ні з ким"
        error_type: phrase
        explanation: "Прийменник з розриває заперечний займенник."
      - sentence: "У звіті ніяких помилки не було."
        error: "ніяких помилки"
        correction: "ніяких помилок"
        error_type: phrase
        explanation: "Після ніяких потрібен родовий множини."
      - sentence: "Це самий важливий пункт договору."
        error: "самий важливий"
        correction: "найважливіший"
        error_type: phrase
        explanation: "Для найвищого ступеня в навчальній нормі краще найважливіший; той самий має інше значення."
workbook:
  - id: wb-1
    type: quiz
    title: Нормативний вибір
    instruction: "Оберіть нормативне речення або пояснення."
    items:
      - question: "Яке речення правильно використовує відносний займенник?"
        options:
          - "Це студент, якому треба допомогти."
          - "Це студент, який треба допомогти."
          - "Це студент, кого треба допомогти."
        correct: 0
        explanation: "Допомогти кому? студентові, якому."
      - question: "Який варіант правильний?"
        options:
          - "Я знаю, про що йдеться."
          - "Я знаю, про чому йдеться."
          - "Я знаю, про чим йдеться."
        correct: 0
        explanation: "Йдеться про що."
      - question: "Де котрий ужито природно?"
        options:
          - "О котрій годині початок?"
          - "Це студент, котрий я говорив."
          - "Я купив котрийсь хліб."
        correct: 0
        explanation: "Котрий природний у часі та виборі."
      - question: "Яка пара форм себе правильна?"
        options:
          - "собі, собою"
          - "себою, себі"
          - "свій, своя"
        correct: 0
        explanation: "Собі - давальний/місцевий, собою - орудний."
      - question: "Яке речення правильно розрізняє себе і свій?"
        options:
          - "Я поважаю себе і беру свою книжку."
          - "Я поважаю свій і беру себе книжку."
          - "Я поважаю собою і беру себе книжку."
        correct: 0
        explanation: "Себе - додаток; свій узгоджується з книжка."
      - question: "Який варіант пишемо разом?"
        options:
          - "дехто"
          - "де хто"
          - "де-хто"
        correct: 0
        explanation: "Де- пишемо разом."
      - question: "Який варіант пишемо через дефіс?"
        options:
          - "будь-який"
          - "будь який"
          - "будь у який"
        correct: 0
        explanation: "Будь- без прийменника пишемо через дефіс."
      - question: "Який варіант треба писати окремо?"
        options:
          - "ні до кого"
          - "нідокого"
          - "ні-до-кого"
        correct: 0
        explanation: "Прийменник до розриває форму."
      - question: "Що означає нікого немає?"
        options:
          - "відсутня будь-яка особа"
          - "немає кого спитати"
          - "будь-хто може прийти"
        correct: 0
        explanation: "Наголос на корені позначає відсутність."
      - question: "Що означає нікого спитати?"
        options:
          - "немає кого спитати"
          - "усі присутні"
          - "ніхто не питає"
        correct: 0
        explanation: "Наголос на префіксі позначає неможливість скористатися особою."
      - question: "Який варіант правильно використовує весь?"
        options:
          - "усі студенти прийшли"
          - "все студенти прийшли"
          - "всього студенти прийшли"
        correct: 0
        explanation: "Для множини людей потрібне усі/всі."
      - question: "Який варіант означає the same?"
        options:
          - "той самий документ"
          - "самий документ"
          - "сам документів"
        correct: 0
        explanation: "The same - той самий, та сама, те саме, ті самі."
  - id: wb-2
    type: fill-in
    title: Форми в контексті
    instruction: "Виберіть форму, яка завершує речення граматично й природно."
    items:
      - sentence: "Це викладач, ____ я написав листа."
        answer: "якому"
        options:
          - "якому"
          - "який"
          - "якого"
        explanation: "Написав кому? викладачеві, якому."
      - sentence: "Документ, про ____ ми говорили, уже готовий."
        answer: "який"
        options:
          - "який"
          - "яким"
          - "якому"
        explanation: "Говорили про що? про документ, який."
      - sentence: "Студентка, ____ робота перемогла, виступить завтра."
        answer: "чия"
        options:
          - "чия"
          - "чию"
          - "чиєю"
        explanation: "Робота жіночого роду в називному: чия."
      - sentence: "У ____ групі ти навчаєшся?"
        answer: "якій"
        options:
          - "якій"
          - "яка"
          - "якою"
        explanation: "Група жіночого роду в місцевому: у якій."
      - sentence: "Я питаю ____ про причину."
        answer: "себе"
        options:
          - "себе"
          - "собі"
          - "собою"
        explanation: "Питаю кого? себе."
      - sentence: "Після помилки він сказав ____ правду."
        answer: "собі"
        options:
          - "собі"
          - "себе"
          - "собою"
        explanation: "Сказав кому? собі."
      - sentence: "Вони захищають ____ права."
        answer: "свої"
        options:
          - "свої"
          - "себе"
          - "собою"
        explanation: "Права - іменник множини; потрібен свій."
      - sentence: "____ із сусідів залишив повідомлення."
        answer: "Хтось"
        options:
          - "Хтось"
          - "Ніхто"
          - "Кожен"
        explanation: "Йдеться про невідому особу."
      - sentence: "Чи є тут ____ із адміністрації?"
        answer: "хто-небудь"
        options:
          - "хто-небудь"
          - "хто небудь"
          - "хтонебудь"
        explanation: "-небудь пишемо через дефіс."
      - sentence: "____ студент може отримати консультацію."
        answer: "Будь-який"
        options:
          - "Будь-який"
          - "Будь який"
          - "Будь в який"
        explanation: "Будь- без прийменника пишемо через дефіс."
      - sentence: "Він ____ не розповів про проблему."
        answer: "нікому"
        options:
          - "нікому"
          - "ні кому"
          - "ні-кому"
        explanation: "Без прийменника нікому пишемо разом."
      - sentence: "Ми ____ не домовлялися про зміну дати."
        answer: "ні з ким"
        options:
          - "ні з ким"
          - "нізким"
          - "ні-з-ким"
        explanation: "Прийменник з розриває форму."
  - id: wb-3
    type: cloze
    title: Таємничий дзвінок
    instruction: "Заповніть текст займенниковими формами."
    text: "Учора {1} телефонував до офісу, але секретар не зрозуміла, {2} це був номер. Вона запитала {3}, чи не забула записати ім'я, і відкрила журнал, у {4} були всі дзвінки. Там не було {5} нового, тільки примітка: «Попросити {6} з адміністрації передзвонити». Коли директор спитав, з {7} вона говорила, вона відповіла: «Ні з {8}; я тільки почула шум». Тепер {9} не знає, до {10} звернутися, але {11} із команди може перевірити записи. Це {12} випадок, який треба розібрати уважно."
    blanks:
      - id: 1
        answer: "хтось"
        options:
          - "хтось"
          - "ніхто"
          - "кожен"
      - id: 2
        answer: "чий"
        options:
          - "чий"
          - "чиїм"
          - "чийого"
      - id: 3
        answer: "себе"
        options:
          - "себе"
          - "собі"
          - "собою"
      - id: 4
        answer: "якому"
        options:
          - "якому"
          - "який"
          - "яким"
      - id: 5
        answer: "нічого"
        options:
          - "нічого"
          - "ні чого"
          - "ні-чого"
      - id: 6
        answer: "когось"
        options:
          - "когось"
          - "хтось"
          - "кимось"
      - id: 7
        answer: "ким"
        options:
          - "ким"
          - "кого"
          - "хто"
      - id: 8
        answer: "ким"
        options:
          - "ким"
          - "кого"
          - "хто"
      - id: 9
        answer: "ніхто"
        options:
          - "ніхто"
          - "ні хто"
          - "будь-хто"
      - id: 10
        answer: "кого"
        options:
