  - id: wb-8
    type: essay-response
    title: Короткий звіт із займенниками
    instruction: "Напишіть 7-9 речень українською."
    prompt: "Опишіть ситуацію в університеті, офісі, будинку або під час онлайн-зустрічі. Використайте щонайменше десять займенникових форм: один питальний займенник, один відносний, себе/собі/собою, свій, хтось або щось, будь-хто або хто-небудь, ніхто або ніщо, форму з прийменником типу ні з ким, один означальний займенник і той самий."
    min_words: 100
    model_answer: "Учора в університеті хтось залишив телефон в аудиторії, у якій ми мали семінар. Викладач запитав, чий це телефон, але ніхто не відповів. Я сказав собі, що треба перевірити список групи, і взяв із собою журнал відвідування. Студентка, з якою я говорив після заняття, згадала, що бачила той самий телефон біля вікна. Кожен студент перевірив свої речі, але ні з ким із власників ми не змогли зв'язатися. Потім будь-хто з адміністрації міг забрати телефон на зберігання, тому ми віднесли його секретареві. У звіті я написав, що нічого не зникло, але треба уважніше стежити за своїми речами. Ця ситуація навчила нас швидко організовувати себе й допомагати одне одному."
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "7-9 речень і щонайменше 100 слів."
      - criteria: "Займенникова різноманітність"
        points: 3
        description: "Є питальні, відносні, зворотні, неозначені, заперечні та означальні форми."
      - criteria: "Відмінки й правопис"
        points: 3
        description: "Форми після прийменників, себе/свій і написання ні з ким / будь-хто правильні."
      - criteria: "Зв'язність"
        points: 1
        description: "Текст звучить як реальна ситуація, а не список окремих речень."
