- lemma: займенник
  translation: "pronoun"
  pos: noun
  usage: "Займенник замінює або уточнює іменник, прикметник, числівник чи цілу ситуацію."
- lemma: питальний займенник
  translation: "interrogative pronoun"
  pos: noun phrase
  usage: "Питальний займенник допомагає поставити питання: хто, що, який, чий?"
- lemma: відносний займенник
  translation: "relative pronoun"
  pos: noun phrase
  usage: "Відносний займенник з'єднує частини складного речення."
- lemma: питально-відносний
  translation: "interrogative-relative"
  pos: adjective
  usage: "Хто, що, який, чий і котрий належать до питально-відносних займенників."
- lemma: хто
