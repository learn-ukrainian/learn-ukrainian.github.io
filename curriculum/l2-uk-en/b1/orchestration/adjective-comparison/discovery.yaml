  text: "КрокЗ. Зроби висновок. Порівняй його з правилом.\nВ українській мові прикметники\
    \ не лише називають ознаку \nпредмета, а й виражають різний ступінь прояву певної\
    \ якості. \nЦі форми прикметників називають ступенями порівняння. \nВони можуть\
    \ утворюватися за допомогою суфікса -іш-(-ш-) \n(цікавіший) та префікса най- (найцікавіший).\n\
    \\>\n196. 1. Для чого потрібні ступені порівняння прикметників? \nСвої міркування\
    \ починайте так:\nЯ гадаю, що ступені порівняння прикметників потрібні \nдля того,\
    \ щоб... .Я можу до"
