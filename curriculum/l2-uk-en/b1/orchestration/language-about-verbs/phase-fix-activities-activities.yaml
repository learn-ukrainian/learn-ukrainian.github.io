      options: ["дійсним", "наказовим", "умовним", "активним"]
    - sentence: "Сукупність усіх форм дієслова називається _____."
      answer: "парадигмою"
      options: ["дієвідмінюванням", "інфінітивом", "парадигмою", "складною формою"]
    - sentence: "Дієслова із суфіксом -ся часто вказують на _____ стан."
      answer: "пасивний"
      options: ["активний", "пасивний", "дійсний", "наказовий"]
