- type: group-sort
  title: "Терміни дієслова: Категоризація"
  instruction: "Розподіліть терміни за їхньою основною категорією."
  groups:
    - name: "Вид дієслова"
      items:
        - "вид"
        - "доконаний вид"
        - "недоконаний вид"
    - name: "Час дієслова"
      items:
        - "час"
        - "теперішній час"
        - "минулий час"
        - "майбутній час"
    - name: "Концепції дії"
      items:
        - "дія"
        - "процес"
        - "результат"
        - "тривалість"
        - "повторення"
    - name: "Спосіб та стан дієслова"
      items:
        - "спосіб"
        - "дійсний спосіб"
        - "наказовий спосіб"
        - "умовний спосіб"
        - "стан"
        - "активний стан"
        - "пасивний стан"
    - name: "Форми дієслова"
      items:
        - "складна форма"
        - "синтетична форма"
        - "наказова форма"
        - "дієвідмінювання"
        - "парадигма"
        - "інфінітив"

- type: match-up
  title: "Дієслівні терміни та їхні визначення"
  instruction: "З'єднайте термін з його правильним визначенням або описом."
  pairs:
    - left: "Вид дієслова"
      right: "Граматична категорія, що вказує на характер перебігу дії в часі."
    - left: "Доконаний вид"
      right: "Дія завершилася або буде завершена, має чіткий результат."
    - left: "Недоконаний вид"
      right: "Дія перебуває у процесі, повторюється або є тривалою."
    - left: "Час дієслова"
      right: "Граматична категорія, що вказує на відношення дії до моменту мовлення."
    - left: "Процес"
      right: "Тривалість дії, її розвиток у часі без акценту на завершенні."
    - left: "Результат"
      right: "Завершення дії, її фінальна точка або наслідок."
    - left: "Заперечення"
      right: "Виражає відсутність дії, стану або ознаки, часто за допомогою частки «не»."
    - left: "Складна форма майбутнього часу"
      right: "Утворюється за допомогою допоміжного дієслова «бути» та інфінітива."
    - left: "Синтетична форма майбутнього часу"
      right: "Однослівна форма, що утворюється від дієслів доконаного виду."
    - left: "Наказовий спосіб"
      right: "Виражає наказ, прохання, заклик до дії."
    - left: "Активний стан"
      right: "Суб'єкт сам виконує дію."
    - left: "Пасивний стан"
      right: "Дія спрямована на суб'єкт, суб'єкт є об'єктом дії."

- type: fill-in
  title: "Опишіть дієслово: Вид та Час"
  instruction: "Заповніть пропуски відповідними дієслівними термінами з наданих варіантів."
  items:
    - sentence: "Дієслово «написати» має _____ вид, бо вказує на завершеність дії."
      answer: "доконаний"
      options: ["недоконаний", "теперішній", "минулий", "доконаний"]
    - sentence: "Коли дія відбувається прямо зараз, ми використовуємо _____ час."
      answer: "теперішній"
      options: ["майбутній", "минулий", "теперішній", "доконаний"]
    - sentence: "Якщо дія тривала або повторювалася, це свідчить про _____ вид дієслова."
      answer: "недоконаний"
      options: ["доконаний", "минулий", "майбутній", "недоконаний"]
    - sentence: "Відношення дії до моменту мовлення визначається категорією _____ дієслова."
      answer: "часу"
      options: ["виду", "стану", "способу", "часу"]
    - sentence: "Дієслово «писати» вказує на _____ дії, без акценту на її завершенні."
      answer: "процес"
      options: ["результат", "заперечення", "дія", "процес"]
    - sentence: "Форма «Я буду читати» є _____ формою майбутнього часу."
      answer: "складною"
      options: ["синтетичною", "наказовою", "минулою", "складною"]
    - sentence: "Коли ми акцентуємо на завершенні дії, це називається _____."
      answer: "результат"
      options: ["процес", "дія", "заперечення", "результат"]
    - sentence: "Частка «не» перед дієсловом виражає _____."
      answer: "заперечення"
      options: ["ствердження", "питання", "наказ", "заперечення"]

- type: unjumble
  title: "Розшифруйте терміни"
  instruction: "Розставте слова у правильному порядку, щоб утворити речення про дієслівні терміни."
  items:
    - words: ["в", "українській", "мові", "розрізняють", "два", "види", "дієслів"]
      answer: "в українській мові розрізняють два види дієслів"
    - words: ["теперішній", "час", "вказує", "на", "дію", "в", "момент", "мовлення"]
      answer: "теперішній час вказує на дію в момент мовлення"
    - words: ["складна", "форма", "майбутнього", "часу", "утворюється", "з", "допоміжного", "дієслова"]
      answer: "складна форма майбутнього часу утворюється з допоміжного дієслова"
    - words: ["наказова", "форма", "використовується", "для", "вираження", "наказу", "або", "прохання"]
      answer: "наказова форма використовується для вираження наказу або прохання"
    - words: ["доконаний", "вид", "зазвичай", "вказує", "на", "завершену", "дію", "та", "результат"]
      answer: "доконаний вид зазвичай вказує на завершену дію та результат"
    - words: ["пасивний", "стан", "означає", "що", "дія", "спрямована", "на", "підмет"]
      answer: "пасивний стан означає що дія спрямована на підмет"
    - words: ["дієвідмінювання", "це", "зміна", "дієслів", "за", "особами", "числами", "та", "часами"]
      answer: "дієвідмінювання це зміна дієслів за особами числами та часами"

- type: error-correction
  title: "Виправте термінологічні помилки"
  instruction: "Знайдіть і виправте помилку у вживанні дієслівних термінів."
  items:
    - sentence: "Вид дієслова і час дієслова — це одне й те саме."
      error: "одне й те саме"
      answer: "різні категорії"
      options: ["одне й те саме", "різні категорії", "синоніми", "схожі поняття"]
      explanation: "Вид і час — це різні граматичні категорії."
    - sentence: "Дієслово «писати» має доконаний вид."
      error: "доконаний вид"
      answer: "недоконаний вид"
      options: ["доконаний вид", "недоконаний вид", "минулий час", "майбутній час"]
      explanation: "Дієслово «писати» вказує на процес, тому це недоконаний вид."
    - sentence: "Форма «буду читати» — це синтетична форма майбутнього часу."
      error: "синтетична форма"
      answer: "складна форма"
      options: ["синтетична форма", "складна форма", "наказова форма", "минулий час"]
      explanation: "Складна форма майбутнього часу утворюється з двох слів (бути + інфінітив)."
    - sentence: "Якщо суб'єкт є об'єктом дії, це активний стан."
      error: "активний стан"
      answer: "пасивний стан"
      options: ["активний стан", "пасивний стан", "дійсний спосіб", "умовний спосіб"]
      explanation: "Пасивний стан вказує на те, що дія спрямована на суб'єкт."
    - sentence: "Заперечення завжди виражає заборону завершення певної дії."
      error: "завжди виражає заборону завершення певної дії"
      answer: "може виражати заборону процесу або результату"
      options: ["завжди виражає заборону завершення певної дії", "ніколи не виражає заборони", "може виражати заборону процесу або результату", "лише попередження"]
      explanation: "Заперечення може стосуватися як процесу (не бігай!), так і результату (не забудь!)."
    - sentence: "Парадигма дієслова — це лише його форми теперішнього часу."
      error: "лише його форми теперішнього часу"
      answer: "сукупність усіх його форм"
      options: ["лише його форми теперішнього часу", "сукупність усіх його форм", "тільки доконаний вид", "тільки недоконаний вид"]
      explanation: "Парадигма включає всі форми дієслова за різними категоріями."

- type: quiz
  title: "Розуміння функцій дієслівних термінів"
  instruction: "Оберіть правильне твердження щодо функцій дієслівних термінів."
  items:
    - question: "Яка категорія визначає, чи є дія завершеною чи незавершеною?"
      options:
        - text: "Час"
          correct: false
        - text: "Вид"
          correct: true
        - text: "Спосіб"
          correct: false
        - text: "Стан"
          correct: false
    - question: "Що означає термін «процес» у контексті дієслова?"
      options:
        - text: "Завершення дії"
          correct: false
        - text: "Фінальна точка дії"
          correct: false
        - text: "Тривалість або повторюваність дії"
          correct: true
        - text: "Наслідок дії"
          correct: false
    - question: "Який спосіб дієслова виражає наказ або прохання?"
      options:
        - text: "Дійсний спосіб"
          correct: false
        - text: "Умовний спосіб"
          correct: false
        - text: "Наказовий спосіб"
          correct: true
        - text: "Активний стан"
          correct: false
    - question: "Яка форма майбутнього часу є однослівною і утворюється від дієслів доконаного виду?"
      options:
        - text: "Складна форма"
          correct: false
        - text: "Синтетична форма"
          correct: true
        - text: "Наказова форма"
          correct: false
        - text: "Минулий час"
          correct: false
    - question: "Який термін описує зміну дієслова за особами, числами, часами, видами та способами?"
      options:
        - text: "Парадигма"
          correct: false
        - text: "Дієвідмінювання"
          correct: true
        - text: "Інфінітив"
          correct: false
        - text: "Концепція дії"
          correct: false
    - question: "Що відбувається з дієсловом у пасивному стані?"
      options:
        - text: "Суб'єкт сам виконує дію."
          correct: false
        - text: "Дія спрямована на суб'єкт."
          correct: true
        - text: "Дія відбувається за певних умов."
          correct: false
        - text: "Дія є наказом."
          correct: false
    - question: "Який термін використовується для позначення відсутності дії, стану або ознаки?"
      options:
        - text: "Результат"
          correct: false
        - text: "Процес"
          correct: false
        - text: "Заперечення"
          correct: true
        - text: "Повторення"
          correct: false
    - question: "Чим відрізняється «момент мовлення» від «минулого часу»?"
      options:
        - text: "Це синоніми."
          correct: false
        - text: "Момент мовлення - це точка на часовій осі, минулий час - період до цієї точки."
          correct: true
        - text: "Момент мовлення - це завжди майбутнє, минулий час - минуле."
          correct: false
        - text: "Момент мовлення стосується лише дієслів доконаного виду."
          correct: false

- type: true-false
  title: "Правда чи Неправда: Дієслівні твердження"
  instruction: "Визначте, чи є твердження істинним чи хибним."
  items:
    - statement: "Вид дієслова та час дієслова є синонімами і вказують на одне й те саме."
      correct: false
      explanation: "Це різні категорії. Вид — про завершеність, час — про положення на часовій осі."
    - statement: "Дієслова доконаного виду завжди вказують на завершений результат."
      correct: true
      explanation: "Так, доконаний вид акцентує на результаті або завершенні дії."
    - statement: "Процес та повторення дії завжди виражаються недоконаним видом дієслова."
      correct: true
      explanation: "Недоконаний вид використовується для позначення тривалих або повторюваних дій."
    - statement: "Майбутній час в українській мові має лише одну форму — синтетичну."
      correct: false
      explanation: "Майбутній час має дві форми: складну та синтетичну."
    - statement: "Загальне заперечення стосується випадків, коли заперечується конкретна дія."
      correct: false
      explanation: "Загальне заперечення заперечує саму можливість здійснення дії."
    - statement: "Наказовий спосіб дієслова виражає лише прохання, але не наказ."
      correct: false
      explanation: "Наказовий спосіб виражає наказ, прохання або заклик до дії."
    - statement: "У пасивному стані суб'єкт сам виконує дію."
      correct: false
      explanation: "У пасивному стані дія спрямована на суб'єкт, а не виконується ним."
    - statement: "Термін «парадигма» дієслова означає сукупність усіх його форм."
      correct: true
      explanation: "Парадигма — це повний набір форм дієслова за всіма граматичними категоріями."

- type: cloze
  title: "Вставте пропущені терміни"
  instruction: "Заповніть пропуски відповідними дієслівними термінами, вибравши один з варіантів."
  passage: |
    В українській мові дієслово має категорію {виду|виду|часу|стану|способу}, що вказує на характер перебігу дії. Розрізняють {доконаний вид|доконаний вид|недоконаний вид|теперішній час|майбутній час} та {недоконаний вид|недоконаний вид|доконаний вид|минулий час|майбутній час}. Також дієслово має категорію {часу|часу|виду|стану|способу}, яка показує відношення дії до {моменту мовлення|моменту мовлення|минулого часу|майбутнього часу|дійсної форми}.
    Якщо ми хочемо підкреслити {процес|процес|результат|дію|заперечення}, мы використовуємо {недоконаний вид|недоконаний вид|доконаний вид|теперішній час|минулий час}. А якщо важливий {результат|результат|процес|дія|заперечення}, то обираємо {доконаний вид|доконаний вид|недоконаний вид|майбутній час|теперішній час}.
    {Заперечення|Заперечення|Підтвердження|Питання|Наказ} виражається часткою «не». {Наказова форма|Наказова форма|Дійсний спосіб|Умовний спосіб|Складна форма} використовується для вираження прохань або наказів.
    Форма «Я {буду читати|буду читати|прочитаю|читатиму|читаю}» — це {складна форма|складна форма|синтетична форма|наказова форма|дійсний спосіб} майбутнього часу, а «Я {прочитаю|прочитаю|буду читати|читатиму|читаю}» — {синтетична форма|синтетична форма|складна форма|наказова форма|дійсний спосіб}.

