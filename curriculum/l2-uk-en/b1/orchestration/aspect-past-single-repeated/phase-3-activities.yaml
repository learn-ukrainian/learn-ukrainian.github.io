- type: match-up
  title: 'Маркери часу та вид дієслова'
  instruction: 'З’єднайте маркер часу з відповідним видом дієслова, який він зазвичай вимагає.'
  pairs:
    - left: 'щодня'
      right: 'недоконаний (процес/рутина)'
    - left: 'одного разу'
      right: 'доконаний (подія/факт)'
    - left: 'завжди'
      right: 'недоконаний (звичка)'
    - left: 'раптом'
      right: 'доконаний (миттєва зміна)'
    - left: 'часто'
      right: 'недоконаний (повторюваність)'
    - left: 'саме того дня'
      right: 'доконаний (конкретний момент)'
    - left: 'зазвичай'
      right: 'недоконаний (типова дія)'
    - left: 'вперше'
      right: 'доконаний (унікальний досвід)'
    - left: 'постійно'
      right: 'недоконаний (тривалість)'
    - left: 'нарешті'
      right: 'доконаний (результат)'

- type: group-sort
  title: 'Рутина чи Подія?'
  instruction: 'Визначте, що описує речення: звичну рутину (недоконаний вид) чи конкретну подію (доконаний вид).'
  groups:
    - name: 'Рутина (Недоконаний)'
      items:
        - 'Ми щодня снідали на терасі.'
        - 'Він завжди купував свіжий хліб.'
        - 'Вона часто запізнювалася на роботу.'
        - 'Я зазвичай читав книги ввечері.'
        - 'Бабуся постійно готувала пироги.'
    - name: 'Подія (Доконаний)'
      items:
        - 'Одного разу ми поїхали в гори.'
        - 'Раптом почалася сильна злива.'
        - 'Того дня я зустрів старого друга.'
        - 'Вона вперше побачила море.'
        - 'Ми нарешті знайшли вихід.'

- type: fill-in
  title: 'Оберіть правильну форму'
  instruction: 'Впишіть правильну форму дієслова, звертаючи увагу на маркер часу.'
  items:
    - sentence: 'Раніше я часто (читати) _____ газети, але зараз читаю новини в інтернеті.'
      answer: 'читав'
      options: ['читав', 'прочитав', 'читаю', 'буду читати']
      explanation: 'Слово "часто" вказує на повторювану дію в минулому.'
    - sentence: 'Вчора я (прочитати) _____ цікаву статтю про космос.'
      answer: 'прочитав'
      options: ['читав', 'прочитав', 'читаю', 'буду читати']
      explanation: 'Йдеться про конкретний факт завершеної дії вчора.'
    - sentence: 'Ми зазвичай (снідати) _____ о восьмій годині.'
      answer: 'снідали'
      options: ['снідали', 'поснідали', 'снідаємо', 'будемо снідати']
      explanation: '"Зазвичай" — маркер регулярної дії.'
    - sentence: 'Того ранку ми (поснідати) _____ дуже швидко, бо поспішали.'
      answer: 'поснідали'
      options: ['снідали', 'поснідали', 'снідаємо', 'будемо снідати']
      explanation: '"Того ранку" вказує на конкретну одноразову ситуацію.'
    - sentence: 'Одного разу він (принести) _____ додому кошеня.'
      answer: 'приніс'
      options: ['приносив', 'приніс', 'несе', 'буде нести']
      explanation: '"Одного разу" вимагає доконаного виду.'
    - sentence: 'Він щодня (приносити) _____ їй квіти.'
      answer: 'приносив'
      options: ['приносив', 'приніс', 'несе', 'буде нести']
      explanation: '"Щодня" означає повторювану дію.'
    - sentence: 'Я ніколи не (бути) _____ в Лондоні.'
      answer: 'був'
      options: ['був', 'побував', 'є', 'буду']
      explanation: 'Відсутність досвіду ("ніколи") зазвичай передається недоконаним видом.'
    - sentence: 'Раптом вона (відчути) _____ холод.'
      answer: 'відчула'
      options: ['відчувала', 'відчула', 'відчуває', 'буде відчувати']
      explanation: '"Раптом" позначає миттєву зміну стану.'

- type: quiz
  title: 'Перевірка розуміння'
  instruction: 'Оберіть правильну відповідь на запитання про вживання виду дієслова.'
  items:
    - question: 'Яке слово-маркер ВИМАГАЄ недоконаного виду?'
      explanation: 'Слово "завжди" вказує на постійну, повторювану дію.'
      options:
        - text: 'завжди'
          correct: true
        - text: 'одного разу'
          correct: false
        - text: 'раптом'
          correct: false
        - text: 'нарешті'
          correct: false
    - question: 'Яке слово-маркер ВИМАГАЄ доконаного виду?'
      explanation: '"Вперше" вказує на унікальну, одноразову подію.'
      options:
        - text: 'вперше'
          correct: true
        - text: 'щодня'
          correct: false
        - text: 'часто'
          correct: false
        - text: 'зазвичай'
          correct: false
    - question: 'Яке речення містить помилку?'
      explanation: 'Після "одного разу" треба вживати доконаний вид: "пішов", а не "ходив".'
      options:
        - text: 'Одного разу я ходив у кіно.'
          correct: true
        - text: 'Одного разу я пішов у кіно.'
          correct: false
        - text: 'Щодня я ходив у кіно.'
          correct: false
        - text: 'Вчора я пішов у кіно.'
          correct: false
    - question: 'Що означає фраза "Я писав звіт"?'
      explanation: 'Недоконаний вид акцентує на процесі, а не на результаті.'
      options:
        - text: 'Я був у процесі написання.'
          correct: true
        - text: 'Я закінчив писати звіт.'
          correct: false
        - text: 'Я написав звіт один раз.'
          correct: false
        - text: 'Я ніколи не писав звіт.'
          correct: false
    - question: 'Як сказати "I used to play football"?'
      explanation: 'Для минулих звичок використовуємо недоконаний вид.'
      options:
        - text: 'Я грав у футбол.'
          correct: true
        - text: 'Я зіграв у футбол.'
          correct: false
        - text: 'Я пограв у футбол.'
          correct: false
        - text: 'Я граю у футбол.'
          correct: false
    - question: 'Яке дієслово пропущене: "Раптом він ... двері"?'
      explanation: '"Раптом" вказує на швидку, одноразову дію.'
      options:
        - text: 'відчинив'
          correct: true
        - text: 'відчиняв'
          correct: false
        - text: 'відкривав'
          correct: false
        - text: 'був відчинив'
          correct: false
    - question: 'Яке речення правильне для жінки?'
      explanation: 'Дієслова минулого часу жіночого роду мають закінчення -ла.'
      options:
        - text: 'Я зрозуміла це правило.'
          correct: true
        - text: 'Я зрозумів це правило.'
          correct: false
        - text: 'Я зрозуміло це правило.'
          correct: false
        - text: 'Я зрозуміли це правило.'
          correct: false
    - question: 'Коли ми використовуємо "Одного разу..."?'
      explanation: 'Це класичний початок для розповіді про конкретну подію.'
      options:
        - text: 'Для початку історії про подію.'
          correct: true
        - text: 'Для опису щоденної рутини.'
          correct: false
        - text: 'Для опису погоди за вікном.'
          correct: false
        - text: 'Для вираження майбутнього часу.'
          correct: false

- type: cloze
  title: 'Історія про відпустку'
  instruction: 'Заповніть пропуски у тексті, обираючи правильну форму дієслова.'
  passage: 'Минулого літа ми {{1}} на морі. Ми {{2}} прокидалися рано і {{3}} на пляж. Погода {{4}} чудова: сонце {{5}}, а море було теплим. Ми {{6}} купалися і {{7}} морозиво. Це була наша ідеальна відпустка. Але {{8}} сталося щось дивне. Коли ми {{9}} на березі, до нас {{10}} маленький пес. Він {{11}} на нас і почав гавкати. Ми {{12}} дати йому води. Пес {{13}} воду і {{14}} біля нас.'
  blanks:
    - id: 1
      answer: 'були'
      options: ['були', 'побували', 'є', 'будемо']
    - id: 2
      answer: 'щодня'
      options: ['щодня', 'одного разу', 'вчора', 'раптом']
    - id: 3
      answer: 'ходили'
      options: ['ходили', 'пішли', 'йшли', 'підемо']
    - id: 4
      answer: 'була'
      options: ['була', 'стала', 'є', 'буде']
    - id: 5
      answer: 'світило'
      options: ['світило', 'засвітило', 'світить', 'посвітило']
    - id: 6
      answer: 'багато'
      options: ['багато', 'один раз', 'вперше', 'раптом']
    - id: 7
      answer: 'їли'
      options: ['їли', 'з’їли', 'поїли', 'їмо']
    - id: 8
      answer: 'одного разу'
      options: ['одного разу', 'завжди', 'щодня', 'зазвичай']
    - id: 9
      answer: 'сиділи'
      options: ['сиділи', 'сіли', 'посиділи', 'сядемо']
    - id: 10
      answer: 'підбіг'
      options: ['підбіг', 'підбігав', 'бігав', 'біжить']
    - id: 11
      answer: 'подивився'
      options: ['подивився', 'дивився', 'дивиться', 'подивиться']
    - id: 12
      answer: 'вирішили'
      options: ['вирішили', 'вирішували', 'вирішимо', 'вирішуємо']
    - id: 13
      answer: 'випив'
      options: ['випив', 'пив', 'питиме', 'п’є']
    - id: 14
      answer: 'ліг'
      options: ['ліг', 'лежав', 'лягав', 'ляже']

- type: mark-the-words
  title: 'Знайдіть рутину'
  instruction: 'Знайдіть і позначте всі дієслова НЕДОКОНАНОГО виду, які описують регулярні дії або стани.'
  text: 'У дитинстві я часто гостював у бабусі. Вона жила в маленькому селі. Щоранку я пив парне молоко і їв свіжий хліб. Ми ходили до лісу по гриби. Бабуся розповідала мені казки. Я любив ці тихі вечори.'
  answers: ['гостював', 'жила', 'пив', 'їв', 'ходили', 'розповідала', 'любив']

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Розставте слова у правильному порядку, щоб утворити речення.'
  items:
    - words: ['Одного', 'ми', 'разу', 'пішли', 'кіно', 'в']
      answer: 'Одного разу ми пішли в кіно'
    - words: ['Вона', 'завжди', 'каву', 'пила', 'ранку', 'з']
      answer: 'Вона завжди пила каву з ранку'
    - words: ['Того', 'він', 'дня', 'запізнився', 'роботу', 'на']
      answer: 'Того дня він запізнився на роботу'
    - words: ['Ми', 'їздили', 'море', 'на', 'літа', 'кожного']
      answer: 'Ми їздили на море кожного літа'
    - words: ['Раптом', 'почалася', 'гроза', 'сильна', 'дуже']
      answer: 'Раптом почалася дуже сильна гроза'
    - words: ['Я', 'борщ', 'вперше', 'спробував', 'український']
      answer: 'Я вперше спробував український борщ'

- type: error-correction
  title: 'Виправте помилки'
  instruction: 'Знайдіть і виправте помилку у вживанні виду дієслова.'
  items:
    - sentence: 'Одного разу я ходив у театр і подивився виставу.'
      error: 'ходив'
      answer: 'пішов'
      options: ['пішов', 'йшов', 'ходжу', 'буду йти']
      explanation: 'Після "одного разу" для позначення одноразової події вживаємо "пішов".'
    - sentence: 'Ми поїхали на море кожного літа.'
      error: 'поїхали'
      answer: 'їздили'
      options: ['їздили', 'їхали', 'їдемо', 'поїдемо']
      explanation: 'Для регулярних повторюваних дій ("кожного літа") потрібен недоконаний вид.'
    - sentence: 'Вчора я читав цю книгу за дві години.'
      error: 'читав'
      answer: 'прочитав'
      options: ['прочитав', 'почитав', 'буду читати', 'читаю']
      explanation: 'Коли є результат ("за дві години"), вживаємо доконаний вид.'
    - sentence: 'Раптом він читав повідомлення.'
      error: 'читав'
      answer: 'прочитав'
      options: ['прочитав', 'почитав', 'читатиме', 'читає']
      explanation: '"Раптом" вказує на швидку зміну подій, тому потрібен доконаний вид.'
    - sentence: 'Я ніколи не з’їв суші.'
      error: 'з’їв'
      answer: 'їв'
      options: ['їв', 'їм', 'поїв', 'буду їсти']
      explanation: 'Коли говоримо про життєвий досвід (або його відсутність), вживаємо недоконаний вид.'
    - sentence: 'Зазвичай вона прийшла додому о шостій.'
      error: 'прийшла'
      answer: 'приходила'
      options: ['приходила', 'йшла', 'приходить', 'буде приходити']
      explanation: '"Зазвичай" вказує на регулярність, тому потрібен недоконаний вид.'

- type: true-false
  title: 'Правда чи ні?'
  instruction: 'Визначте, чи є твердження правильним.'
  items:
    - statement: 'Слово "щодня" вимагає недоконаного виду.'
      correct: true
      explanation: 'Так, бо це вказує на повторювану дію.'
    - statement: 'Слово "одного разу" зазвичай вживається з недоконаним видом.'
      correct: false
      explanation: 'Ні, "одного разу" позначає конкретну подію, тому вимагає доконаного виду.'
    - statement: 'Фраза "used to do" перекладається українською недоконаним видом.'
      correct: true
      explanation: 'Так, це описує звичку в минулому.'
    - statement: 'Дієслова минулого часу змінюються за особами (я, ти, він).'
      correct: false
      explanation: 'У минулому часі дієслова змінюються за родами (він, вона, воно) та числами.'
    - statement: 'Слово "раптом" означає поступову зміну.'
      correct: false
      explanation: '"Раптом" означає раптову, миттєву зміну.'
    - statement: 'Жінки використовують закінчення -ла у минулому часі.'
      correct: true
      explanation: 'Так, наприклад: я сказала, я зробила.'
    - statement: 'Слово "ніколи" завжди вимагає доконаного виду.'
      correct: false
      explanation: 'Ні, часто воно вживається з недоконаним видом для опису відсутності досвіду.'
    - statement: '"Вперше" — це маркер доконаного виду.'
      correct: true
      explanation: 'Так, це вказує на унікальну одноразову подію.'
