- type: mark-the-words
  title: 'Знайдіть маркери уваги та пояснення'
  instruction: 'Прочитайте текст і натисніть на слова, що використовуються для привернення уваги або пояснення (маркери важливості та зв''язки).'
  text: "Коли ви вивчаєте нову тему, зверніть увагу на структуру правила. Це допоможе вам краще зрозуміти матеріал. Запам'ятайте: іменники змінюються за відмінками. Це важливо для побудови речень. Деякі слова є незмінними, наприклад, таксі або метро. Цей термін складний, тобто він потребує додаткового пояснення. Отже, ми маємо бути уважними до деталей."
  answers:
  - "зверніть увагу"
  - "Запам'ятайте"
  - "важливо"
  - "наприклад"
  - "тобто"
  - "Отже"

- type: true-false
  title: 'Граматичні шаблони та структури'
  instruction: 'Визначте, чи є твердження правильним відповідно до матеріалу уроку.'
  items:
  - statement: 'Конструкція "X використовується, коли..." описує функцію або значення граматичної форми.'
    correct: false
    explanation: 'Ця конструкція описує ситуацію або умови ("Коли?"). Функцію описує конструкція "X показує...".'
  - statement: 'Слово "крім" вказує на наявність винятку з правила.'
    correct: true
    explanation: 'Так, "крім" та "за винятком" вводять слова, що не підкоряються загальному правилу.'
  - statement: 'Дієслово "означає" використовується для надання дефініцій та пояснення змісту.'
    correct: true
    explanation: 'Це слово (means) є ключовим для визначень.'
  - statement: 'Фраза "на відміну від" використовується для показу подібності між явищами.'
    correct: false
    explanation: 'Ця фраза (unlike) використовується для контрасту, тобто показує різницю.'
  - statement: 'У граматичних текстах часто вживаються пасивні форми на -ться (вживається, утворюється).'
    correct: true
    explanation: 'Науковий стиль надає перевагу безособовим та пасивним конструкціям.'
  - statement: 'Слова "отже" та "тобто" використовуються для вираження емоцій автора.'
    correct: false
    explanation: 'Це слова-зв''язки для логічного пояснення або висновку.'
  - statement: 'Дієслово "утворіть" означає те саме, що й "зробіть" у будь-якому контексті.'
    correct: false
    explanation: '"Утворіть" — це специфічний термін словотвору (create/form), а "зробіть" — загальний (do/make).'
  - statement: 'Слово "кінець" є правильним граматичним терміном для позначення останньої частини слова.'
    correct: false
    explanation: 'У граматиці використовується термін "закінчення" (ending), а не "кінець".'

- type: fill-in
  title: 'Доповніть граматичні пояснення'
  instruction: 'Вставте пропущені слова в речення, щоб відновити типові граматичні пояснення.'
  items:
  - sentence: 'Орудний відмінок __________ для позначення інструменту дії.'
    answer: 'використовується'
    options:
    - 'використовується'
    - 'робиться'
    - 'означає'
    - 'хоче'
    explanation: 'Конструкція "використовується" (is used) описує ситуацію вживання.'
  - sentence: 'Префікс не- __________, що дія або ознака є заперечною.'
    answer: 'показує'
    options:
    - 'показує'
    - 'бачить'
    - 'думає'
    - 'питає'
    explanation: 'Дієслово "показує" (shows) описує функцію морфеми.'
  - sentence: 'Термін "антонім" __________ слово з протилежним значенням.'
    answer: 'означає'
    options:
    - 'означає'
    - 'робить'
    - 'пише'
    - 'читає'
    explanation: 'Для визначень використовуємо "означає" (means).'
  - sentence: 'Усі іменники цього типу мають закінчення -а, __________ слова "ім''я".'
    answer: 'крім'
    options:
    - 'крім'
    - 'також'
    - 'разом'
    - 'або'
    explanation: 'Слово "крім" (except) вводить виняток.'
  - sentence: '__________ увагу на чергування приголосних у корені слова.'
    answer: 'Зверніть'
    options:
    - 'Зверніть'
    - 'Дивіться'
    - 'Беріть'
    - 'Робіть'
    explanation: 'Стала фраза "Зверніть увагу" (Pay attention/Note).'
  - sentence: 'Це дієслово доконаного виду, __________ воно вказує на результат.'
    answer: 'тобто'
    options:
    - 'тобто'
    - 'але'
    - 'або'
    - 'ні'
    explanation: '"Тобто" (that is) використовується для пояснення.'
  - sentence: 'Дієслово "йти" відмінюється __________ до дієслова "їхати".'
    answer: 'подібно'
    options:
    - 'подібно'
    - 'різно'
    - 'інакше'
    - 'протилежно'
    explanation: '"Подібно до" (similar to) вказує на аналогію.'
  - sentence: 'В офіційному стилі цей вираз не вживається, __________ він є розмовним.'
    answer: 'тому що'
    options:
    - 'тому що'
    - 'але'
    - 'хоча'
    - 'ніби'
    explanation: '"Тому що" (because) вводить причину.'

- type: match-up
  title: 'Інструкції до вправ'
  instruction: 'З''єднайте дієслово-інструкцію з описом дії, яку потрібно виконати.'
  pairs:
  - left: 'Виберіть'
    right: 'Обрати один варіант із кількох'
  - left: 'Знайдіть'
    right: 'Відшукати елемент у тексті'
  - left: 'З''єднайте'
    right: 'Знайти пару для слова або фрази'
  - left: 'Розташуйте'
    right: 'Поставити елементи в правильному порядку'
  - left: 'Утворіть'
    right: 'Створити нову граматичну форму'
  - left: 'Перекладіть'
    right: 'Передати зміст іншою мовою'
  - left: 'Доповніть'
    right: 'Дописати відсутню частину речення'
  - left: 'Підкресліть'
    right: 'Виділити слово рискою знизу'
  - left: 'Вставте'
    right: 'Помістити слово в пропущене місце'
  - left: 'Визначте'
    right: 'Встановити правильність твердження'
  - left: 'Порівняйте'
    right: 'Знайти спільні та відмінні риси'
  - left: 'Поясніть'
    right: 'Розкрити зміст або причину явища'

- type: quiz
  title: 'Аналітична термінологія'
  instruction: 'Виберіть правильне визначення для кожного лінгвістичного терміна.'
  items:
  - question: 'Що означає лінгвістичний термін "контекст"?'
    options:
    - text: 'Оточення слова, яке допомагає зрозуміти його значення'
      correct: true
    - text: 'Список слів у кінці підручника'
      correct: false
    - text: 'Помилка в граматичній вправі'
      correct: false
    - text: 'Перша літера в реченні'
      correct: false
    explanation: 'Контекст — це ситуація або текст навколо слова, що впливає на його зміст.'
  - question: 'Що означає термін "аспектуальна пара"?'
    options:
    - text: 'Зв''язок між доконаним і недоконаним видом дієслова'
      correct: true
    - text: 'Два слова, що римуються'
      correct: false
    - text: 'Синонім та антонім'
      correct: false
    - text: 'Іменник та прикметник разом'
      correct: false
    explanation: 'Аспектуальна пара об''єднує дієслова одного значення, але різного виду (робити — зробити).'
  - question: 'Яка різниця між "коренем" та "основою"?'
    options:
    - text: 'Корінь — це головна частина, основа — це все слово без закінчення'
      correct: true
    - text: 'Це одне й те саме'
      correct: false
    - text: 'Корінь є тільки в іменників, а основа — в дієслів'
      correct: false
    - text: 'Основа — це перша буква, а корінь — остання'
      correct: false
    explanation: 'Основа (stem) включає префікс, корінь і суфікс, але не включає закінчення.'
  - question: 'Як визначається поняття "літературна мова"?'
    options:
    - text: 'Нормована, правильна мова книг та медіа'
      correct: true
    - text: 'Мова, якою говорять тільки письменники'
      correct: false
    - text: 'Сленг та діалекти'
      correct: false
    - text: 'Мова, яку використовують тільки вдома'
      correct: false
    explanation: 'Літературна мова (standard language) — це унормована форма мови.'
  - question: 'Що таке "маркер" у граматиці?'
    options:
    - text: 'Слово-сигнал, що вказує на певну граматичну форму'
      correct: true
    - text: 'Фломастер для виділення тексту'
      correct: false
    - text: 'Оцінка за тест'
      correct: false
    - text: 'Назва граматичного підручника'
      correct: false
    explanation: 'Маркер допомагає ідентифікувати час, вид або відмінок (наприклад, "вчора" — маркер минулого).'
  - question: 'Що означає граматичний термін "узгодження"?'
    options:
    - text: 'Зміна слів, щоб вони граматично відповідали одне одному'
      correct: true
    - text: 'Сварка між людьми'
      correct: false
    - text: 'Підписання офіційного документа'
      correct: false
    - text: 'Переклад тексту без словника'
      correct: false
    explanation: 'Узгодження (agreement) — це коли, наприклад, прикметник має той самий рід, що й іменник.'
  - question: 'Який стиль використовується в законах та інструкціях?'
    options:
    - text: 'Офіційно-діловий стиль'
      correct: true
    - text: 'Розмовний стиль'
      correct: false
    - text: 'Художній стиль'
      correct: false
    - text: 'Поетичний стиль'
      correct: false
    explanation: 'Документи пишуться офіційно-діловим стилем (сухим і точним).'
  - question: 'Яке визначення має термін "суфікс"?'
    options:
    - text: 'Частина слова після кореня, що часто визначає частину мови'
      correct: true
    - text: 'Частина слова перед коренем'
      correct: false
    - text: 'Змінна частина в кінці слова'
      correct: false
    - text: 'Головне значення слова'
      correct: false
    explanation: 'Суфікс стоїть між коренем і закінченням (або в кінці незмінних слів) і служить для словотвору.'

- type: error-correction
  title: 'Виправте термінологічні помилки'
  instruction: 'Знайдіть помилку у використанні лінгвістичних термінів або стилю і виберіть правильний варіант.'
  items:
  - sentence: 'У слові "вікно" кінець -о.'
    error: 'кінець'
    answer: 'закінчення'
    options:
    - 'закінчення'
    - 'фінал'
    - 'стоп'
    - 'крапка'
    explanation: 'У граматиці змінна частина слова називається "закінчення" (ending), а не "кінець".'
  - sentence: 'Слово "класний" — це офіційна мова.'
    error: 'офіційна'
    answer: 'розмовна'
    options:
    - 'розмовна'
    - 'ділова'
    - 'наукова'
    - 'старовинна'
    explanation: '"Класний" — це сленгове, розмовне слово, недоречне в офіційному стилі.'
  - sentence: 'Префікс стоїть після кореня.'
    error: 'після'
    answer: 'перед'
    options:
    - 'перед'
    - 'всередині'
    - 'навколо'
    - 'замість'
    explanation: 'Префікс (prefix) завжди стоїть перед коренем (pre-).'
  - sentence: 'Дієслова "робити" і "зробити" — це синоніми.'
    error: 'синоніми'
    answer: 'аспектуальна пара'
    options:
    - 'аспектуальна пара'
    - 'антоніми'
    - 'омоніми'
    - 'родичі'
    explanation: 'Це форми одного слова, що розрізняються видом, тому це аспектуальна пара.'
  - sentence: 'В реченні "Я йду" порушено узгодження.'
    error: 'порушено'
    answer: 'є'
    options:
    - 'є'
    - 'відсутнє'
    - 'втрачено'
    - 'заборонено'
    explanation: 'Тут немає помилки. "Я" (1 особа) і "йду" (1 особа) узгоджуються правильно.'
  - sentence: 'Слово "стіл" походить від слова "столовий".'
    error: 'походить від'
    answer: 'є твірним для'
    options:
    - 'є твірним для'
    - 'копіює'
    - 'заперечує'
    - 'перекладає'
    explanation: 'Навпаки, "столовий" утворене від "стіл". Менше слово зазвичай є базою.'
