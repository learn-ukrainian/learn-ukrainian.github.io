- kind: skeleton_para
  text: 'P1 (160w): Core Rule: The ''Neutral Fact'' pattern. Explain that ''не + недоконаний
    вид'' is the default for stating that an action simply did not happen. Reference
    Zabolotnyi Grade 7 (p.57) regarding ''загальне заперечення''. Use examples: ''Він
    не вчив іспанську'' (He never studied it) and ''Ми не обговорювали це'' (The topic
    never came up).'
  covered: false
  coverage_note: 10/36 keywords (28%)
- kind: skeleton_para
  text: 'P3 (170w): Negation in the Present Tense. Explain why present tense negation
    is *always* imperfective. Since perfective verbs have no present tense, you cannot
    say ''I am not finishing yet'' in a single word. Examples: ''Я не розумію'' (Ongoing
    state of not understanding) and ''Він не працює'' (Current fact of not working).'
  covered: false
  coverage_note: 9/30 keywords (30%)
- kind: skeleton_para
  text: 'P5 (170w): The ''Neutral Stance''. Explain that ''не + impf'' protects the
    speaker from commitment. If a teacher asks ''Ти читав книжку?'', answering ''Я
    не читав'' is a blunt admission of fact. It doesn''t promise that you will read
    it tomorrow. It simply closes the book on the past.'
  covered: false
  coverage_note: 8/31 keywords (26%)
- kind: skeleton_para
  text: 'P6 (170w): Factual denial in complex situations. Discussing long-term states.
    ''Він не жив у Києві'' (He didn''t live in Kyiv—general fact) vs ''Він не переїхав
    у Київ'' (He failed to move—specific result). Emphasize that ''не + impf'' covers
    the entire duration of the non-event.'
  covered: false
