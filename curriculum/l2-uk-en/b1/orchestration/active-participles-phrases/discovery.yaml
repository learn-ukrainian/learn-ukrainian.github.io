  text: '9

    Морфологічна норма

    Морфологія (від грец. morphe  — форма, logos  — слово, учення)  — це роз-

    діл науки про мову, що вивчає слова як частини мови.

    Частини мови — це класи слів, які характеризуються спільністю: а) лексич-

    них значень; б) граматичних ознак; в) будови слів і словотворчих засобів; г) син-

    таксичної ролі.

    Морфологічні норми стосуються вживання граматичних форм слів та поєд-

    нання їх з іншими словами.

    Наслідком порушення морфологічної норми літературної мови є  морфоло-

    гічна помилка'
