findings:
- dimension: LINGUISTIC ACCURACY
  severity: CRITICAL
  location: 'Section "Префікс пере-: перетинання", paragraph starting "Для повного
    розуміння теми..."'
  issue: '"Недосконала форма фокусується на тривалому процесі або регулярній звичці"
    — uses "Недосконала" (= imperfect/flawed, quality adjective) instead of "Недоконана"
    (= imperfective, grammatical term). The module correctly introduces "недоконаний
    вид" two sentences earlier, then uses the wrong synonym. B1 learners will memorize
    incorrect terminology.'
  fix: Replace "Недосконала форма" with "Недоконана форма"
- dimension: LINGUISTIC ACCURACY
  severity: CRITICAL
  location: 'Section "Префікс пере-: перетинання", same paragraph'
  issue: '"ідеальна форма **перейти** *(to cross - completion)* фокусується виключно
    на успішному результаті" — uses "ідеальна" (= ideal) instead of "доконана" (=
    perfective). "Ідеальний" is not a Ukrainian grammatical term. This is a calque
    from English "perfect → ideal."'
  fix: Replace "ідеальна форма" with "доконана форма"
- dimension: PLAN ADHERENCE
  severity: MAJOR
  location: 'Section "Префікс про-: проходження повз або наскрізь"'
  issue: Plan section 3 explicitly requires examples for пролетіти ("Літак пролетів
    над містом"), проплисти ("Човен проплив повз берег"), and провезти ("Провезли
    вантаж через кордон") in the "passing by" subsection. None of these appear in
    the generated prose. The content covers пройти, проїхати, пробігти, пронести,
    провести but omits these three verbs from the recommended vocabulary.
  fix: Insert examples for the three missing verbs after the existing "passing by"
    examples.
- dimension: PLAN ADHERENCE
  severity: MAJOR
  location: 'Section "Шість префіксів разом: подорож етапами"'
  issue: 'Plan specifies "Prefix system overview table: all 8 prefixes taught so far
    organized by spatial meaning" with learners filling in example sentences. The
    content describes the categories in prose paragraphs but does NOT include the
    actual TABLE. This is a key plan deliverable — a reference table learners can
    revisit.'
  fix: Add a markdown table after the prose description of the four prefix groups.
