    - left: 'Синтаксис'
      right: 'Наука про будову речення та словосполучення'
    - left: 'Фонетика'
      right: 'Наука про звуки мови та вимову'
    - left: 'Підмет'
      right: 'Головний член речення (хто? що?)'
    - left: 'Присудок'
      right: 'Головний член речення (що робить?)'
    - left: 'Інфінітив'
      right: 'Початкова, словникова форма дієслова'
    - left: 'Відмінок'
      right: 'Категорія зміни іменників за ролями'
    - left: 'Вид'
      right: 'Категорія завершеності або тривалості дії'
    - left: 'Наголос'
      right: 'Виділення складу у слові голосом'
    - left: 'Додаток'
      right: 'Другорядний член речення (кого? чого?)'
    - left: 'Означення'
      right: 'Другорядний член речення (який? чий?)'
    - left: 'Обставина'
      right: 'Другорядний член речення (де? як?)'
    - left: 'Правопис'
      right: 'Система правил написання слів'
    - left: 'Виняток'
      right: 'Слово, що не підпорядковується правилу'

- type: fill-in
  title: 'Дієслівна термінологія'
  instruction: 'Вставте пропущений термін у речення.'
  items:
    - sentence: 'Дієслова, які відповідають на питання «що зробити?», мають _____ вид.'
      answer: 'доконаний'
      options:
        - 'доконаний'
        - 'недоконаний'
        - 'теперішній'
        - 'минулий'
      explanation: 'Доконаний вид означає завершену дію.'
    - sentence: 'Початкова форма дієслова називається _____.'
      answer: 'інфінітив'
      options:
        - 'інфінітив'
        - 'суфікс'
        - 'префікс'
        - 'основа'
      explanation: 'Інфінітив — це словникова форма.'
    - sentence: 'Дієслова змінюються за часами: минулий, _____ та майбутній.'
      answer: 'теперішній'
      options:
        - 'теперішній'
        - 'давній'
        - 'сучасний'
        - 'активний'
      explanation: 'Три часи: минулий, теперішній, майбутній.'
    - sentence: 'Категорія _____ вказує на те, хто виконує дію (я, ти, він).'
      answer: 'особи'
      options:
        - 'особи'
        - 'роду'
        - 'числа'
        - 'стану'
      explanation: 'Особа (1-ша, 2-га, 3-тя) вказує на виконавця.'
    - sentence: 'У минулому часі дієслова змінюються за _____ (читав, читала).'
      answer: 'родами'
      options:
        - 'родами'
        - 'особами'
        - 'відмінками'
        - 'видами'
      explanation: 'У минулому часі дієслово має рід (чоловічий, жіночий, середній).'
    - sentence: 'Дієслово «писати» має _____ вид.'
      answer: 'недоконаний'
      options:
        - 'недоконаний'
        - 'доконаний'
        - 'завершеним'
        - 'миттєвим'
      explanation: 'Писати (що робити?) — процес, недоконаний вид.'
    - sentence: 'Форма «напишу» — це _____ час.'
      answer: 'майбутній'
      options:
        - 'майбутній'
        - 'теперішній'
        - 'минулий'
        - 'давній'
      explanation: 'Напишу — дія відбудеться в майбутньому.'
    - sentence: 'Зміна дієслова за особами називається _____.'
      answer: 'дієвідмінювання'
      options:
        - 'дієвідмінювання'
        - 'відмінювання'
        - 'узгодження'
        - 'керування'
      explanation: 'Дієвідмінювання — це зміна дієслова (conjugation).'

- type: match-up
  title: 'Мова інструкцій'
  instruction: 'З''єднайте інструкцію з її поясненням.'
  pairs:
    - left: 'Підкресліть'
