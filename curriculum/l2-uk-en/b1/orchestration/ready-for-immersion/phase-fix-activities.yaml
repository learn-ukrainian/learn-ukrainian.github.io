- type: quiz
  title: 'Контекст і спілкування'
  instruction: 'Оберіть правильну репліку для діалогу.'
  items:
    - question: 'Ви не знаєте, куди падає наголос. Що ви запитаєте?'
      explanation: 'Питання про наголос стосується вимови.'
      options:
        - text: 'Яка тут вимова? Куди падає наголос?'
          correct: true
        - text: 'Як це пишеться?'
          correct: false
        - text: 'Що це означає?'
          correct: false
        - text: 'Якого це роду?'
          correct: false
    - question: 'Вчитель каже: «Підкресліть підмет». Що ви маєте зробити?'
      explanation: 'Підкреслити — це намалювати лінію під словом.'
      options:
        - text: 'Виділити слово рискою знизу'
          correct: true
        - text: 'Обвести слово кружечком'
          correct: false
        - text: 'Закреслити слово'
          correct: false
        - text: 'Написати слово великими буквами'
          correct: false
    - question: 'Ви хочете запитати про значення слова. Що ви скажете?'
      explanation: 'Значення — це зміст слова.'
      options:
        - text: 'Що означає це слово?'
          correct: true
        - text: 'Як читається це слово?'
          correct: false
        - text: 'Це іменник чи дієслово?'
          correct: false
        - text: 'Де тут помилка?'
          correct: false
    - question: 'Друг каже: «Ти вжив не той вид дієслова». Про що йдеться?'
      explanation: 'Вид (aspect) — це доконаність або недоконаність дії.'
      options:
        - text: 'Про завершеність або тривалість дії'
          correct: true
        - text: 'Про час дії (минулий/теперішній)'
          correct: false
        - text: 'Про особу виконавця'
          correct: false
        - text: 'Про рід іменника'
          correct: false
    - question: 'Що означає фраза «Слово — не горобець»?'
      explanation: 'Це означає, що треба бути обережним зі словами.'
      options:
        - text: 'Треба думати перед тим, як говорити'
          correct: true
        - text: 'Слова летять дуже швидко'
          correct: false
        - text: 'Горобці не вміють говорити'
          correct: false
        - text: 'Слова не мають значення'
          correct: false
    - question: 'Вам треба знайти «виняток з правила». Що ви шукаєте?'
      explanation: 'Виняток — це те, що не підпорядковується правилу.'
      options:
        - text: 'Слово, яке не підходить під правило'
          correct: true
        - text: 'Приклад, який підтверджує правило'
          correct: false
        - text: 'Нове правило'
          correct: false
        - text: 'Переклад правила'
          correct: false
    - question: 'Вчитель просить: «Провідміняйте дієслово». Що робити?'
      explanation: 'Дієвідмінювання — зміна за особами (я, ти, він...).'
      options:
        - text: 'Змінити його за особами (я читаю, ти читаєш)'
          correct: true
        - text: 'Змінити його за відмінками'
          correct: false
        - text: 'Зробити з нього іменник'
          correct: false
        - text: 'Перекласти його англійською'
          correct: false
    - question: 'Ви бачите інструкцію «Вставте пропущене слово». Що це означає?'
      explanation: 'Вставити (Insert/Fill in) — заповнити пропуск.'
      options:
        - text: 'Написати слово там, де його немає'
          correct: true
        - text: 'Видалити зайве слово'
          correct: false
        - text: 'Підкреслити слово'
          correct: false
        - text: 'Змінити порядок слів'
          correct: false
