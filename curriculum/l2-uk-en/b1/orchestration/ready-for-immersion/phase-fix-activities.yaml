        - 'стіл'
        - 'читати'
        - 'гарний'
        - 'швидко'
        - 'я'
        - 'один'
    - name: 'Службові (Functional Words)'
      items:
        - 'і'
        - 'на'
        - 'але'
        - 'під'
        - 'би'
        - 'не'

