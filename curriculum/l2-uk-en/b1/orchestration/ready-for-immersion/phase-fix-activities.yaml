      right: 'Дописати завершення речення'
    - left: 'Заповніть'
      right: 'Вписати слова у пропуски'

- type: true-false
  title: 'Граматичні факти'
  instruction: 'Визначте, чи є твердження правильним.'
  items:
    - statement: 'В українській мові існує 12 граматичних часів.'
      correct: false
      explanation: 'В українській лише 3 часи: минулий, теперішній і майбутній.'
    - statement: 'Доконаний вид дієслова відповідає на питання «що зробити?».'
      correct: true
      explanation: 'Так, це ознака завершеної дії.'
    - statement: 'Службові частини мови мають лексичне значення і є членами речення.'
      correct: false
      explanation: 'Службові частини мови не є членами речення і служать для зв''язку.'
    - statement: 'Наголос в українській мові завжди падає на перший склад.'
      correct: false
      explanation: 'Наголос є рухомим і може падати на будь-який склад.'
    - statement: 'Слово «правило» і слово «право» — це синоніми.'
      correct: false
      explanation: 'Це різні слова: rule (правило) vs right/law (право).'
    - statement: 'Підмет зазвичай виражений іменником у називному відмінку.'
      correct: true
      explanation: 'Так, підмет відповідає на питання хто? що?'
    - statement: 'Дієслово «читаю» стоїть у теперішньому часі.'
      correct: true
      explanation: 'Дія відбувається зараз.'
    - statement: 'Прикметник змінюється за родами, числами та відмінками.'
      correct: true
      explanation: 'Прикметник узгоджується з іменником у цих категоріях.'

- type: unjumble
  title: 'Будова речення'
  instruction: 'Складіть речення з правильним порядком слів.'
  items:
    - words: ['молодий', 'студент', 'читає', 'дуже', 'цікаву', 'книгу']
      answer: 'Молодий студент читає дуже цікаву книгу'
    - words: ['ми', 'сьогодні', 'граматику', 'вивчаємо', 'українську', 'мову']
      answer: 'Сьогодні ми вивчаємо українську граматику'
    - words: ['наголос', 'часто', 'значення', 'змінює', 'цього', 'слова']
      answer: 'Наголос часто змінює значення цього слова'
    - words: ['мова', 'це', 'важливий', 'інструмент', 'нашого', 'спілкування']
      answer: 'Мова це важливий інструмент нашого спілкування'
    - words: ['я', 'вчора', 'ввечері', 'писав', 'довгого', 'листа']
      answer: 'Вчора ввечері я писав довгого листа'
    - words: ['треба', 'добре', 'знати', 'правила', 'українського', 'правопису']
      answer: 'Треба добре знати правила українського правопису'

- type: error-correction
  title: 'Знайди помилку'
  instruction: 'Знайдіть та виправте помилку в реченні.'
  items:
    - sentence: 'Я маю правило це робити.'
      error: 'правило'
      answer: 'право'
      options:
        - 'право'
        - 'закон'
        - 'обов''язок'
        - 'можливість'
      explanation: 'Правило (rule) — це норма, а право (right) — це можливість.'
    - sentence: 'Я не розумію ця правила.'
      error: 'ця'
      answer: 'цього'
      options:
        - 'цього'
        - 'цю'
        - 'це'
        - 'ці'
      explanation: 'Після заперечення «не» краще вживати родовий відмінок (цього правила).'
    - sentence: 'Він приймав участь у конкурсі.'
      error: 'приймав участь'
      answer: 'брав участь'
      options:
        - 'брав участь'
        - 'мав участь'
        - 'робив участь'
        - 'тримав участь'
      explanation: '«Приймати участь» — це калька, правильно «брати участь».'
    - sentence: 'Це самий кращий підручник.'
      error: 'самий кращий'
      answer: 'найкращий'
      options:
        - 'найкращий'
        - 'більш кращий'
        - 'дуже кращий'
        - 'кращий'
      explanation: '«Самий» для порівняння — це помилка, треба вживати префікс «най-».'
    - sentence: 'Я кушаю сніданок.'
      error: 'кушаю'
      answer: 'їм'
      options:
        - 'їм'
        - 'снідаю'
        - 'готую'
        - 'беру'
      explanation: '«Кушати» — це русизм, українською «їсти» або «снідати».'
    - sentence: 'Ми вивчаємо український мова.'
      error: 'український'
      answer: 'українську'
      options:
        - 'українську'
        - 'українське'
        - 'українські'
        - 'українського'
      explanation: 'Мова — жіночий рід, тому прикметник має бути «українську» (знахідний відмінок).'

- type: select
  title: 'Аналіз тексту: Префікси'
  instruction: 'Прочитайте текст про префікси в уроці та дайте відповідь.'
  items:
    - question: 'Перед якими буквами префікс з- змінюється на с-?'
      options:
        - text: 'К, П, Т, Ф, Х'
          correct: true
        - text: 'Б, П, В, М, Ф'
          correct: false
        - text: 'Г, Ґ, К, Х'
          correct: false
        - text: 'Д, Т, З, С'
          correct: false
      explanation: 'Правило «Кафе Птах» містить букви К, П, Т, Ф, Х.'
    - question: 'Яка мнемонічна фраза допомагає запам''ятати це правило?'
      options:
        - text: 'Кафе «Птах»'
          correct: true
        - text: 'Мавпа Буф'
          correct: false
        - text: 'Де ти з''їси цю чашу жиру'
          correct: false
        - text: 'Реве та стогне Дніпр широкий'
          correct: false
      explanation: 'Фраза «Кафе Птах» містить усі глухі приголосні для цього правила.'
    - question: 'Як правильно написати слово: з+фотографувати?'
      options:
        - text: 'Сфотографувати'
          correct: true
        - text: 'Зфотографувати'
          correct: false
        - text: 'Зіфотографувати'
          correct: false
        - text: 'Суфотографувати'
          correct: false
      explanation: 'Перед «ф» префікс «з-» переходить у «с-».'
    - question: 'Як правильно написати слово: з+робити?'
      options:
        - text: 'Зробити'
          correct: true
        - text: 'Сробити'
          correct: false
        - text: 'Зіробити'
          correct: false
        - text: 'Заробити'
          correct: false
      explanation: 'Перед «р» (не входить до «Кафе Птах») пишемо «з-».'
    - question: 'Що таке «мнемонічна фраза»?'
      options:
        - text: 'Фраза для запам''ятовування'
          correct: true
        - text: 'Фраза для вимови'
          correct: false
        - text: 'Фраза для перекладу'
          correct: false
        - text: 'Фраза для каліграфії'
          correct: false
      explanation: 'Це інструмент для легкого запам''ятовування інформації.'
    - question: 'Який префікс ми пишемо перед усіма іншими приголосними?'
      options:
        - text: 'З-'
          correct: true
        - text: 'С-'
          correct: false
        - text: 'Зі-'
          correct: false
        - text: 'Від-'
          correct: false
      explanation: 'Основний варіант префікса — «з-».'

