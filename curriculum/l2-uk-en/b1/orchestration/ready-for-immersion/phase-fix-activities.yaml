- type: quiz
  title: 'Діагностика: Базові поняття'
  instruction: 'Оберіть правильну відповідь на запитання.'
  items:
    - question: 'У чому полягає різниця між буквою та звуком?'
      explanation: 'Буква — це те, що ми пишемо, а звук — те, що чуємо.'
      options:
        - text: 'Букву ми пишемо, а звук вимовляємо'
          correct: true
        - text: 'Це одне й те саме, немає різниці'
          correct: false
        - text: 'Букву ми чуємо, а звук бачимо'
          correct: false
        - text: 'Звуків завжди більше, ніж букв'
          correct: false
    - question: 'Скільки звуків позначає українська буква «ї»?'
      explanation: 'Буква «ї» завжди позначає два звуки: [й] та [і].'
      options:
        - text: 'Два звуки'
          correct: true
        - text: 'Один звук'
          correct: false
        - text: 'Три звуки'
          correct: false
        - text: 'Залежить від наголосу'
          correct: false
    - question: 'Що змінює лексичне значення у словах «за́мок» і «замо́к»?'
      explanation: 'Наголос розрізнює значення цих слів (будівля vs пристрій).'
      options:
        - text: 'Наголос'
          correct: true
        - text: 'Закінчення'
          correct: false
        - text: 'Рід'
          correct: false
        - text: 'Префікс'
          correct: false
    - question: 'Яке значення має слово «голова» у реченні «Голова зборів оголосив перерву»?'
      explanation: 'Тут слово вжито у переносному значенні (керівник).'
      options:
        - text: 'Переносне'
          correct: true
        - text: 'Пряме'
          correct: false
        - text: 'Граматичне'
          correct: false
        - text: 'Фонетичне'
          correct: false
    - question: 'Як називається спеціальна мова, якою ми описуємо мову?'
      explanation: 'Метамова — це термінологія для опису мовних явищ.'
      options:
        - text: 'Метамова'
          correct: true
        - text: 'Діалект'
          correct: false
        - text: 'Сленг'
          correct: false
        - text: 'Суржик'
          correct: false
    - question: 'Яка літера була репресована та вилучена з абетки у 1933 році?'
      explanation: 'Літеру Ґ вилучили з абетки з політичних мотивів.'
      options:
        - text: 'Ґ'
          correct: true
        - text: 'Ї'
          correct: false
        - text: 'Є'
          correct: false
        - text: 'Щ'
          correct: false
    - question: 'Що означає граматичний термін «правопис» у вивченні мови?'
      explanation: 'Правопис (orthography) — це система правил написання слів.'
      options:
        - text: 'Система правил написання'
          correct: true
        - text: 'Правила вимови'
          correct: false
        - text: 'Будова речення'
          correct: false
        - text: 'Зміна слів'
          correct: false
    - question: 'Яка частина мови відповідає на питання «хто? що?»?'
      explanation: 'Іменник називає предмети та осіб.'
      options:
        - text: 'Іменник'
          correct: true
        - text: 'Дієслово'
          correct: false
        - text: 'Прикметник'
          correct: false
        - text: 'Займенник'
          correct: false

- type: group-sort
  title: 'Частини мови: Сортування'
  instruction: 'Розподіліть слова на самостійні та службові частини мови.'
  groups:
    - name: 'Самостійні (Content Words)'
