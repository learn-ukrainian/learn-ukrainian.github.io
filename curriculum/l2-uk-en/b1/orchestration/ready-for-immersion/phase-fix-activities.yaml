      right: 'Знайти пару для слова'
    - left: 'Виберіть'
      right: 'Обрати правильний варіант'
    - left: 'Перекладіть'
      right: 'Передати зміст іншою мовою'
    - left: 'Узгодьте'
      right: 'Поставити слова у правильні форми роду/числа'
    - left: 'Випишіть'
      right: 'Знайти в тексті і записати окремо'
    - left: 'Утворіть'
      right: 'Створити нову форму від слова'
