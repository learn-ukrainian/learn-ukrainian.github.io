- type: fill-in
  title: 'Синтаксичний розбір'
  instruction: 'Визначте роль виділеного слова в реченні (підмет, присудок, додаток, означення).'
  items:
    - sentence: '«Студент» читає книгу.'
      answer: 'підмет'
      options:
        - 'підмет'
        - 'присудок'
        - 'додаток'
        - 'означення'
      explanation: 'Студент (хто?) виконує дію.'
    - sentence: 'Студент «читає» книгу.'
      answer: 'присудок'
      options:
        - 'присудок'
        - 'підмет'
        - 'додаток'
        - 'обставина'
      explanation: 'Читає (що робить?) — це дія.'
    - sentence: 'Студент читає «книгу».'
      answer: 'додаток'
      options:
        - 'додаток'
        - 'підмет'
        - 'присудок'
        - 'означення'
      explanation: 'Книгу (що? знахідний відмінок) — об''єкт дії.'
    - sentence: 'Студент читає «цікаву» книгу.'
      answer: 'означення'
      options:
        - 'означення'
        - 'обставина'
        - 'додаток'
        - 'підмет'
      explanation: 'Цікаву (яку?) — ознака предмета.'
    - sentence: 'Студент читає «вдома».'
      answer: 'обставина'
      options:
        - 'обставина'
        - 'додаток'
        - 'означення'
        - 'підмет'
      explanation: 'Вдома (де?) — місце дії.'
    - sentence: '«Він» добре навчається.'
      answer: 'підмет'
      options:
        - 'підмет'
        - 'додаток'
        - 'обставина'
        - 'присудок'
