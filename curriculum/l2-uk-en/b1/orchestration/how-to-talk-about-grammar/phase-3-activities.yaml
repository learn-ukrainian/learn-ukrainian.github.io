- type: true-false
  title: 'Факти про граматику'
  instruction: 'Визначте, чи є твердження про українську граматику правдивим.'
  items:
    - statement: 'В українській мові існує сім відмінків іменника.'
      correct: true
      explanation: 'Так: називний, родовий, давальний, знахідний, орудний, місцевий та кличний.'
    - statement: 'Прислівник — це частина мови, що змінюється за відмінками.'
      correct: false
      explanation: 'Ні, прислівник — це незмінна частина мови.'
    - statement: 'Кличний відмінок використовується для позначення інструмента дії.'
      correct: false
      explanation: 'Ні, для звертання. Інструмент дії позначає орудний відмінок.'
    - statement: 'Місцевий відмінок ніколи не вживається без прийменника.'
      correct: true
      explanation: 'Це єдиний відмінок в українській мові, який завжди потребує прийменника.'
    - statement: 'Власні назви в українській мові пишуться з маленької літери.'
      correct: false
      explanation: 'Власні назви (Київ, Марія) завжди пишуться з великої літери.'
    - statement: 'Дієслово недоконаного виду відповідає на питання "що зробити?".'
      correct: false
      explanation: 'Ні, "що зробити?" — це доконаний вид. Недоконаний — "що робити?".'
    - statement: 'Службові частини мови не є членами речення.'
      correct: true
      explanation: 'Службові слова лише з’єднують самостійні слова або додають відтінків.'
    - statement: 'Мелетій Смотрицький написав першу фундаментальну граматику у 1619 році.'
      correct: true
      explanation: 'Саме він виокремив місцевий відмінок та створив систему відмін.'
    - statement: 'Орудний відмінок відповідає на питання "Ким? Чим?".'
      correct: true
      explanation: 'Так, він вказує на засіб дії або спільність.'
    - statement: 'Частка «не» з дієсловами зазвичай пишеться разом.'
      correct: false
      explanation: 'За загальним правилом частка «не» з дієсловами пишеться окремо.'
    - statement: 'Закінчення — це частина слова, що містить основне значення.'
      correct: false
      explanation: 'Ні, основне значення містить корінь. Закінчення вказує на граматичну форму.'
    - statement: 'Підмет у реченні найчастіше виражається іменником у називному відмінку.'
      correct: true
      explanation: 'Так, це головний герой речення, що виконує дію.'

