    - words: ['Орудний', 'відмінок', 'вказує', 'на', 'засіб', 'дії', 'або', 'на', 'те,', 'з', 'ким', 'саме', 'виконується', 'певна', 'дія', 'в', 'реченні.']
      answer: 'Орудний відмінок вказує на засіб дії або на те, з ким саме виконується певна дія в реченні.'
    - words: ['Місцевий', 'відмінок', 'в', 'українській', 'мові', 'завжди', 'вживається', 'тільки', 'з', 'прийменником', 'і', 'вказує', 'на', 'місце', 'дії.']
      answer: 'Місцевий відмінок в українській мові завжди вживається тільки з прийменником і вказує на місце дії.'

- type: unjumble
  title: 'Слова в реченні'
  instruction: 'Відновіть правильний порядок слів у реченнях, що ілюструють граматичні правила.'
  items:
    - words: ['У', 'цьому', 'реченні', 'кожне', 'слово', 'відповідає', 'правилу', 'граматики.']
      answer: 'У цьому реченні кожне слово відповідає правилу граматики.'
    - words: ['Наведіть', 'приклад', 'іменника', 'в', 'називному', 'відмінку.']
      answer: 'Наведіть приклад іменника в називному відмінку.'
    - words: ['Чи', 'є', 'у', 'цьому', 'правилі', 'якісь', 'важливі', 'винятки?']
      answer: 'Чи є у цьому правилі якісь важливі винятки?'
    - words: ['Сьогодні', 'чудовий', 'сонячний', 'день', 'у', 'Києві.']
      answer: 'Сьогодні чудовий сонячний день у Києві.'
    - words: ['Учитель', 'пояснює', 'правило', 'повільно', 'і', 'дуже', 'зрозуміло.']
      answer: 'Учитель пояснює правило повільно і дуже зрозуміло.'
    - words: ['Я', 'впевнено', 'рухаюся', 'до', 'мети', 'вивчення', 'мови.']
      answer: 'Я впевнено рухаюся до мети вивчення мови.'
    - words: ['Книга', 'цікава', 'лежить', 'на', 'столі', 'в', 'кабінеті.']
      answer: 'Цікава книга лежить на столі в кабінеті.'
    - words: ['Ми', 'вдячні', 'долі', 'за', 'цю', 'чудову', 'зустріч.']
      answer: 'Ми вдячні долі за цю чудову зустріч.'

- type: error-correction
  title: 'Виправте граматичні терміни'
  instruction: 'Знайдіть та виправте неправильно вжитий граматичний термін.'
  items:
    - sentence: 'Студенти часто вживають термін глагол під впливом іншої мови.'
      error: 'глагол'
      answer: 'дієслово'
      options: ['глагол', 'дієслово', 'іменник', 'присудок']
      explanation: 'В українській мові використовується виключно термін «дієслово».'
    - sentence: 'Слова "метро" та "кіно" — це виключення з правил відмінювання.'
      error: 'виключення'
      answer: 'винятки'
      options: ['виключення', 'винятки', 'приклади', 'норми']
      explanation: 'Правильний термін для відхилення від мовної норми — «виняток».'
    - sentence: 'Слово "мова" стоїть у називному відміна.'
      error: 'відміна'
      answer: 'відмінку'
      options: ['відміна', 'відмінку', 'роду', 'часу']
      explanation: 'Зміна іменника за питаннями називається «відмінком».'
    - sentence: 'Займенник — це службова частина мови.'
      error: 'службова'
      answer: 'самостійна'
      options: ['службова', 'самостійна', 'головна', 'другорядна']
      explanation: 'Займенник є самостійною частиною мови, оскільки вказує на предмети.'
    - sentence: 'Прийменник "бо" з’єднує речення.'
      error: 'Прийменник'
      answer: 'Сполучник'
      options: ['Прийменник', 'Сполучник', 'Частка', 'Вигук']
      explanation: 'Слова, що сполучають частини речення, називаються сполучниками.'
    - sentence: 'Іменник означає дію предмета.'
      error: 'Іменник'
      answer: 'Дієслово'
      options: ['Іменник', 'Дієслово', 'Прикметник', 'Прислівник']
      explanation: 'Дію означає дієслово, а іменник — назву предмета.'
    - sentence: 'Прислівник завжди змінюється за числами.'
      error: 'змінюється'
      answer: 'не змінюється'
      options: ['змінюється', 'не змінюється', 'узгоджується', 'відмінюється']
      explanation: 'Прислівник — це незмінна частина мови, у нього немає закінчення.'
    - sentence: 'Частка стоїть при імені іменнику.'
      error: 'Частка'
      answer: 'Прийменник'
      options: ['Частка', 'Прийменник', 'Сполучник', 'Вигук']
      explanation: 'Прийменник (preposition) стоїть «при імені» (перед іменником).'

- type: error-correction
  title: 'Класифікація слів'
  instruction: 'Виправте помилкову класифікацію слова в контексті граматики.'
  items:
    - sentence: 'Слово "швидко" — це прикметник.'
      error: 'прикметник'
      answer: 'прислівник'
      options: ['прикметник', 'прислівник', 'дієслово', 'іменник']
      explanation: '«Швидко» відповідає на питання "як?" і є прислівником.'
    - sentence: 'Слово "десять" — це іменник.'
      error: 'іменник'
      answer: 'числівник'
      options: ['іменник', 'числівник', 'займенник', 'прикметник']
      explanation: 'Слова, що означають кількість, є числівниками.'
    - sentence: 'Слово "і" — це частка.'
      error: 'частка'
      answer: 'сполучник'
      options: ['частка', 'сполучник', 'прийменник', 'вигук']
      explanation: 'Слово «і» сполучає слова та речення, тому є сполучником.'
    - sentence: 'Слово "гарний" — це прислівник.'
      error: 'прислівник'
      answer: 'прикметник'
      options: ['прислівник', 'прикметник', 'іменник', 'дієслово']
      explanation: '«Гарний» відповідає на питання "який?" і є прикметником.'
    - sentence: 'Слово "Київ" — це загальна назва.'
      error: 'загальна'
      answer: 'власна'
      options: ['загальна', 'власна', 'конкретна', 'абстрактна']
      explanation: 'Назви міст є власними назвами і пишуться з великої літери.'
    - sentence: 'Слово "не" — це прийменник.'
      error: 'прийменник'
      answer: 'частка'
      options: ['прийменник', 'частка', 'сполучник', 'вигук']
      explanation: 'Слово «не» додає заперечного значення і є часткою.'
    - sentence: 'Слово "над" — це сполучник.'
      error: 'сполучник'
      answer: 'прийменник'
      options: ['сполучник', 'прийменник', 'частка', 'вигук']
      explanation: '«Над» виражає залежність іменника і є прийменником.'
    - sentence: 'Слово "вона" — це іменник.'
      error: 'іменник'
      answer: 'займенник'
      options: ['іменник', 'займенник', 'прикметник', 'дієслово']
      explanation: '«Вона» вказує на особу, не називаючи її прямо, це займенник.'

- type: cloze
  title: 'Історія української граматики'
  instruction: 'Оберіть правильні слова, щоб відновити текст про становлення української граматичної традиції.'
  passage: |
    У 1619 році вчений {Мелетій|Мелетій|Михайло|Тарас} Смотрицький написав першу фундаментальну {граматику|граматику|книгу|статтю}. У цій праці він офіційно виокремив {місцевий|місцевий|родовий|давальний} відмінок. До цього його часто об’єднували з іншими формами. Його система п’яти {відмін|відмін|видів|родів} іменників та логіка класифікації {частин|частин|форм|типів} мови лежать в основі сучасного шкільного {навчання|навчання|читання|писання}. Це доводить, що українська граматична {думка|думка|мова|система} має довгу традицію. Знання {метамови|метамови|граматики|історії} допомагає студентам розуміти внутрішню {логіку|логіку|структуру|будову} мови. Кожен {іменник|іменник|дієслово|прикметник} має свій рід і число. {Дієслово|Дієслово|Іменник|Прислівник} виражає енергію дії. {Прикметник|Прикметник|Прислівник|Займенник} додає мові кольорів. {Прислівник|Прислівник|Прикметник|Частка} характеризує дію і є незмінним. А {службові|службові|самостійні|головні} слова служать «клеєм» для речення.

- type: mark-the-words
  title: 'Пошук дієслів у тексті'
  instruction: 'Клацніть на всі слова, що є дієсловами (виражають дію).'
  text: 'Учитель пояснює правило, студенти слухають, записують приклади, думають над ними, відповідають на запитання і вивчають граматику.'
  answers:
    - 'пояснює'
    - 'слухають'
    - 'записують'
    - 'думають'
    - 'відповідають'
    - 'вивчають'

- type: select
  title: 'Граматичні категорії'
  instruction: 'Оберіть УСІ правильні відповіді для кожної категорії.'
  items:
    - question: 'Які з цих частин мови належать до службових?'
      options:
        - text: 'Сполучник'
          correct: true
        - text: 'Прийменник'
          correct: true
        - text: 'Частка'
          correct: true
        - text: 'Вигук'
          correct: true
        - text: 'Займенник'
          correct: false
      min_correct: 2
      explanation: 'Службові частини мови — це сполучник, прийменник, частка та вигук.'
    - question: 'Які граматичні категорії має дієслово?'
      options:
        - text: 'Час'
          correct: true
        - text: 'Особа'
          correct: true
        - text: 'Вид'
          correct: true
        - text: 'Відмінок'
          correct: false
        - text: 'Число'
          correct: true
      min_correct: 3
      explanation: 'Дієслова змінюються за часом, особою, числом та видом, але не мають відмінків.'
    - question: 'Які відмінки існують в українській мові?'
      options:
        - text: 'Називний'
          correct: true
        - text: 'Давальний'
          correct: true
        - text: 'Кличний'
          correct: true
        - text: 'Об’єктний'
          correct: false
        - text: 'Місцевий'
          correct: true
      min_correct: 3
      explanation: 'В українській мові 7 відмінків, серед яких називний, давальний, кличний та місцевий.'
    - question: 'Які частини слова вивчає морфеміка?'
      options:
        - text: 'Корінь'
          correct: true
        - text: 'Префікс'
          correct: true
        - text: 'Суфікс'
          correct: true
        - text: 'Закінчення'
          correct: true
        - text: 'Речення'
          correct: false
      min_correct: 4
      explanation: 'Морфеміка вивчає значущі частини слова: корінь, префікс, суфікс та закінчення.'
    - question: 'Які з цих слів є займенниками?'
      options:
        - text: 'Я'
          correct: true
        - text: 'Ми'
          correct: true
        - text: 'Цей'
          correct: true
        - text: 'Мій'
          correct: true
        - text: 'Стіл'
          correct: false
      min_correct: 4
      explanation: 'Займенники вказують на осіб або предмети, не називаючи їх прямо.'
    - question: 'Які синтаксичні ролі є другорядними членами речення?'
      options:
        - text: 'Додаток'
          correct: true
        - text: 'Означення'
          correct: true
        - text: 'Обставина'
          correct: true
        - text: 'Підмет'
          correct: false
        - text: 'Присудок'
          correct: false
      min_correct: 3
      explanation: 'Другорядні члени речення — це додаток, означення та обставина.'
    - question: 'Які відмінки мають однакові питання для назв істот?'
      options:
        - text: 'Родовий (кого?)'
          correct: true
        - text: 'Знахідний (кого?)'
          correct: true
        - text: 'Називний'
          correct: false
        - text: 'Орудний'
          correct: false
      min_correct: 2
      explanation: 'Для назв істот питання "кого?" збігається в родовому та знахідному відмінках.'
    - question: 'Які роди мають іменники в українській мові?'
      options:
        - text: 'Чоловічий'
          correct: true
        - text: 'Жіночий'
          correct: true
        - text: 'Середній'
          correct: true
        - text: 'Спільний'
          correct: false
      min_correct: 3
      explanation: 'Базові роди іменників — чоловічий, жіночий та середній.'

- type: translate
  title: 'Переклад граматичних команд'
  instruction: 'Оберіть правильний переклад для типових навчальних команд.'
  items:
    - source: 'Identify the part of speech.'
      options:
        - text: 'Визначте частину мови.'
          correct: true
        - text: 'Напишіть частину мови.'
          correct: false
        - text: 'Прочитайте частину мови.'
          correct: false
        - text: 'Знайдіть речення.'
          correct: false
    - source: 'Give an example.'
      options:
        - text: 'Наведіть приклад.'
          correct: true
        - text: 'Знайдіть приклад.'
          correct: false
        - text: 'Напишіть правило.'
          correct: false
        - text: 'Дайте відповідь.'
          correct: false
    - source: 'Follow the rule.'
      options:
        - text: 'Дотримуйтесь правила.'
          correct: true
        - text: 'Читайте правило.'
          correct: false
        - text: 'Змініть правило.'
          correct: false
        - text: 'Вивчіть правило.'
          correct: false
    - source: 'The verb indicates action.'
      options:
        - text: 'Дієслово означає дію.'
          correct: true
        - text: 'Іменник означає дію.'
          correct: false
        - text: 'Дієслово — це предмет.'
          correct: false
        - text: 'Дія — це дієслово.'
          correct: false
    - source: 'Nouns have gender.'
      options:
        - text: 'Іменники мають рід.'
          correct: true
        - text: 'Іменники мають число.'
          correct: false
        - text: 'Дієслова мають рід.'
          correct: false
        - text: 'Слова мають рід.'
          correct: false
    - source: 'The exception to the rule.'
      options:
        - text: 'Виняток із правила.'
          correct: true
        - text: 'Приклад правила.'
          correct: false
        - text: 'Норма правила.'
          correct: false
        - text: 'Початок правила.'
          correct: false
    - source: 'Connect sentences with a conjunction.'
      options:
        - text: 'Сполучайте речення сполучником.'
          correct: true
        - text: 'Пишіть речення прийменником.'
          correct: false
        - text: 'Знайдіть сполучник у реченні.'
          correct: false
        - text: 'З’єднайте слова часткою.'
          correct: false
    - source: 'Address the teacher in the vocative case.'
      options:
        - text: 'Зверніться до вчителя у кличному відмінку.'
          correct: true
        - text: 'Напишіть вчителю в називному відмінку.'
          correct: false
        - text: 'Кличте вчителя в родовому відмінку.'
          correct: false
        - text: 'Говоріть з вчителем у орудному відмінку.'
          correct: false
