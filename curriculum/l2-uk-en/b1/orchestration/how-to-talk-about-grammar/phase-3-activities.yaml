    - words: ['Займенник', 'вказує', 'на', 'предмети,', 'ознаки', 'або', 'кількість,', 'але', 'не', 'називає', 'їх', 'прямо,', 'замінюючи', 'інші', 'слова.']
      answer: 'Займенник вказує на предмети, ознаки або кількість, але не називає їх прямо, замінюючи інші слова.'
    - words: ['Називний', 'відмінок', 'є', 'початковою', 'формою', 'слова', 'і', 'у', 'реченні', 'найчастіше', 'виконує', 'роль', 'головного', 'члена', '—', 'підмета.']
