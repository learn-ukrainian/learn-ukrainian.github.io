- type: quiz
  title: 'Визначте частину мови'
  instruction: 'Прочитайте опис і оберіть назву відповідної частини мови.'
  items:
    - question: 'Яка частина мови називає предмети або осіб і відповідає на питання "хто?" або "що?"?'
      options:
        - text: 'Іменник'
          correct: true
        - text: 'Дієслово'
          correct: false
        - text: 'Прикметник'
          correct: false
        - text: 'Прислівник'
          correct: false
      explanation: 'Іменник — це самостійна частина мови, що називає предмети (стіл) або осіб (студент).'
    - question: 'Яка частина мови означає дію або стан предмета і відповідає на питання "що робити?"?'
      options:
        - text: 'Дієслово'
          correct: true
        - text: 'Прикметник'
          correct: false
        - text: 'Займенник'
          correct: false
        - text: 'Числівник'
          correct: false
      explanation: 'Дієслово виражає дію (писати) або стан (думати) предмета.'
    - question: 'Яка частина мови виражає ознаку предмета і відповідає на питання "який?" або "чия?"?'
      options:
        - text: 'Прикметник'
          correct: true
        - text: 'Прислівник'
          correct: false
        - text: 'Іменник'
          correct: false
        - text: 'Сполучник'
          correct: false
      explanation: 'Прикметник додає мові кольорів та деталей, описуючи ознаки (цікавий, українська).'
    - question: 'Яка частина мови є незмінною і відповідає на питання "як?", "де?" або "коли?"?'
      options:
        - text: 'Прислівник'
          correct: true
        - text: 'Прикметник'
          correct: false
        - text: 'Дієслово'
          correct: false
        - text: 'Займенник'
          correct: false
      explanation: 'Прислівник не змінюється за відмінками чи числами і характеризує дію (швидко, вчора).'
    - question: 'Яка частина мови вказує на предмети або ознаки, але не називає їх прямо?'
      options:
        - text: 'Займенник'
          correct: true
        - text: 'Іменник'
          correct: false
        - text: 'Числівник'
          correct: false
        - text: 'Прикметник'
          correct: false
      explanation: 'Займенник стоїть «замість імені» (я, ти, цей, мій), допомагаючи уникати повторів.'
    - question: 'Як називається частина мови, що означає кількість предметів або їх порядок при лічбі?'
      options:
        - text: 'Числівник'
          correct: true
        - text: 'Займенник'
          correct: false
        - text: 'Іменник'
          correct: false
        - text: 'Прислівник'
          correct: false
      explanation: 'Числівник відповідає на питання "скільки?" (десять) або "котрий?" (перший).'
    - question: 'Яка службова частина мови сполучає слова в реченні або цілі речення між собою?'
      options:
        - text: 'Сполучник'
          correct: true
        - text: 'Прийменник'
          correct: false
        - text: 'Частка'
          correct: false
        - text: 'Вигук'
          correct: false
      explanation: 'Сполучник (і, але, бо) сполучає логічні частини вашого висловлювання.'
    - question: 'Яка службова частина мови виражає залежність іменника від інших слів і стоїть перед ним?'
      options:
        - text: 'Прийменник'
          correct: true
        - text: 'Сполучник'
          correct: false
        - text: 'Частка'
          correct: false
        - text: 'Займенник'
          correct: false
      explanation: 'Прийменник (у, на, до) виражає зв’язок слів і вимагає певного відмінка.'

- type: fill-in
  title: 'Граматична термінологія'
  instruction: 'Заповніть пропуски відповідними термінами з уроку.'
  items:
    - sentence: '[___] — це мова, якою ми говоримо про саму мову.'
      answer: 'Метамова'
      options: ['Метамова', 'Граматика', 'Синтаксис', 'Морфологія']
    - sentence: 'Основна частина слова, що містить його головне лексичне значення — це [___].'
      answer: 'корінь'
      options: ['корінь', 'префікс', 'суфікс', 'закінчення']
    - sentence: 'Іменники в українській мові мають граматичний [___]: чоловічий, жіночий або середній.'
      answer: 'рід'
      options: ['рід', 'вид', 'час', 'стан']
    - sentence: 'Процес зміни дієслів за особами та числами називається [___].'
      answer: 'дієвідмінюванням'
      options: ['дієвідмінюванням', 'відмінюванням', 'узгодженням', 'керуванням']
    - sentence: '[___] відмінок в українській мові використовується виключно для звертання.'
      answer: 'Кличний'
      options: ['Кличний', 'Називний', 'Місцевий', 'Орудний']
    - sentence: 'Частина слова, що стоїть після кореня і вказує на частину мови — це [___].'
      answer: 'суфікс'
      options: ['суфікс', 'префікс', 'корінь', 'основа']
    - sentence: '[___] — це завершена думка, що складається зі слів, поєднаних за змістом та граматично.'
      answer: 'Речення'
      options: ['Речення', 'Слово', 'Правило', 'Приклад']
    - sentence: 'Слова «метро» та «кіно» — це [___] з правил відмінювання іменників.'
      answer: 'винятки'
      options: ['винятки', 'приклади', 'норми', 'категорії']
    - sentence: 'Службові слова в реченні виконують роль [___], що з’єднує самостійні слова.'
      answer: 'клею'
      options: ['клею', 'фундаменту', 'цегли', 'мети']
    - sentence: 'Частина слова перед коренем, яка змінює значення слова, називається [___].'
      answer: 'префікс'
      options: ['префікс', 'суфікс', 'закінчення', 'корінь']
    - sentence: '[___] відмінок завжди вживається в українській мові тільки з прийменником.'
      answer: 'Місцевий'
      options: ['Місцевий', 'Називний', 'Давальний', 'Знахідний']
    - sentence: 'Кожне граматичне [___] у підручнику зазвичай супроводжує ілюстративний приклад.'
      answer: 'правило'
      options: ['правило', 'поняття', 'явище', 'слово']

- type: fill-in
  title: 'Ролі слів у реченні'
  instruction: 'Оберіть правильну назву синтаксичної ролі (члена речення).'
  items:
    - sentence: 'Головний член речення, що називає того, хто виконує дію — це [___].'
      answer: 'підмет'
      options: ['підмет', 'присудок', 'додаток', 'означення']
    - sentence: 'Дія, яку виконує підмет, зазвичай виражається дієсловом і називається [___].'
      answer: 'присудок'
      options: ['присудок', 'підмет', 'обставина', 'додаток']
    - sentence: '[___] — це другорядний член речення, на який спрямована дія підмета.'
      answer: 'Додаток'
      options: ['Додаток', 'Підмет', 'Означення', 'Обставина']
    - sentence: 'Член речення, що описує ознаку предмета і відповідає на питання "який?" — це [___].'
      answer: 'означення'
      options: ['означення', 'додаток', 'присудок', 'обставина']
    - sentence: '[___] вказує на місце, час, причину або спосіб дії в реченні.'
      answer: 'Обставина'
      options: ['Обставина', 'Означення', 'Додаток', 'Підмет']
    - sentence: 'Підмет у реченні зазвичай стоїть у [___] відмінку.'
      answer: 'називному'
      options: ['називному', 'знахідному', 'орудному', 'місцевому']
    - sentence: 'У реченні «Я читаю книгу» слово «книгу» є [___].'
      answer: 'додатком'
      options: ['додатком', 'підметом', 'присудком', 'означенням']
    - sentence: 'У реченні «Сонце світить яскраво» слово «яскраво» є [___].'
      answer: 'обставиною'
      options: ['обставиною', 'означенням', 'присудком', 'підметом']
    - sentence: 'У реченні «Старий парк мовчить» слово «старий» є [___].'
      answer: 'означенням'
      options: ['означенням', 'додатком', 'підметом', 'обставиною']
    - sentence: 'Другорядні члени речення допомагають розширити [___] думку.'
      answer: 'завершену'
      options: ['завершену', 'просту', 'складну', 'нову']
    - sentence: 'В українській мові [___] слів у реченні є вільнішим завдяки системі відмінків.'
      answer: 'порядок'
      options: ['порядок', 'набір', 'зв’язок', 'зміст']
    - sentence: 'Зв’язок між підметом та присудком — це [___] основа речення.'
      answer: 'граматична'
      options: ['граматична', 'лексична', 'логічна', 'головна']

