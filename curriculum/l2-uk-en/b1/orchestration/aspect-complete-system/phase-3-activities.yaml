- type: quiz
  title: 'Вид дієслова: основи'
  instruction: 'Оберіть правильну відповідь, базуючись на контексті та значенні дієслова.'
  items:
    - question: 'Яке дієслово описує ПРОЦЕС (недоконаний вид)?'
      options:
        - text: 'писав'
          correct: true
        - text: 'написав'
          correct: false
        - text: 'зробив'
          correct: false
        - text: 'прочитав'
          correct: false
      explanation: '«Писав» відповідає на питання «що робив?» і позначає тривалу дію.'
    - question: 'Яке дієслово описує РЕЗУЛЬТАТ (доконаний вид)?'
      options:
        - text: 'прочитав'
          correct: true
        - text: 'читав'
          correct: false
        - text: 'будував'
          correct: false
        - text: 'малював'
          correct: false
      explanation: '«Прочитав» означає, що дія завершена і є результат (книга прочитана).'
    - question: 'Що означає фраза «Я здавав екзамен»?'
      options:
        - text: 'Я був на екзамені, але результат невідомий'
          correct: true
        - text: 'Я успішно склав екзамен'
          correct: false
        - text: 'Я отримав гарну оцінку'
          correct: false
        - text: 'Я вже маю диплом'
          correct: false
      explanation: 'Недоконаний вид «здавав» описує лише спробу або процес, успіх не гарантований.'
    - question: 'Який вид ми використовуємо для опису звичок, що повторюються щодня?'
      options:
        - text: 'недоконаний (НДВ)'
          correct: true
        - text: 'доконаний (ДВ)'
          correct: false
        - text: 'обидва варіанти'
          correct: false
        - text: 'тільки теперішній час'
          correct: false
      explanation: 'Для повторюваних дій (щодня, часто) завжди використовується недоконаний вид.'
    - question: 'Яке речення описує послідовність подій (ланцюжок)?'
      options:
        - text: 'Він встав, одягнувся і вийшов.'
          correct: true
        - text: 'Він спав, а сонце світило.'
          correct: false
        - text: 'Ми гуляли і розмовляли.'
          correct: false
        - text: 'Вона читала книгу цілий день.'
          correct: false
      explanation: 'Для послідовних дій (одна за одною) використовується доконаний вид.'
    - question: 'У якому часі НЕ існує доконаного виду?'
      options:
        - text: 'у теперішньому'
          correct: true
        - text: 'у минулому'
          correct: false
        - text: 'у майбутньому'
          correct: false
        - text: 'у всіх часах є доконаний вид'
          correct: false
      explanation: 'Теперішній час — це завжди процес («зараз»), тому він може бути тільки недоконаним.'
    - question: 'Як правильно сказати про майбутній результат?'
      options:
        - text: 'Я напишу звіт.'
          correct: true
        - text: 'Я буду написати звіт.'
          correct: false
        - text: 'Я буду пишу звіт.'
          correct: false
        - text: 'Я є написав звіт.'
          correct: false
      explanation: '«Буду» вживається тільки з НДВ (буду писати). Для результату використовується проста форма ДВ (напишу).'
    - question: 'Оберіть правильну пару: процес — одноразова дія.'
      options:
        - text: 'стукати — стукнути'
          correct: true
        - text: 'стукати — стучати'
          correct: false
        - text: 'бити — битися'
          correct: false
        - text: 'кричати — кричати'
          correct: false
      explanation: 'Суфікс -ну- (стукнути) вказує на миттєву, одноразову дію.'

- type: match-up
  title: 'Маркери часу та вид'
  instruction: 'З’єднайте слово-маркер з відповідним видом дієслова.'
  pairs:
    - left: 'щодня (every day)'
      right: 'Недоконаний (НДВ)'
    - left: 'часто (often)'
      right: 'Недоконаний (НДВ)'
    - left: 'завжди (always)'
      right: 'Недоконаний (НДВ)'
    - left: 'довго (for a long time)'
      right: 'Недоконаний (НДВ)'
    - left: 'цілий день (all day)'
      right: 'Недоконаний (НДВ)'
    - left: 'раптом (suddenly)'
      right: 'Доконаний (ДВ)'
    - left: 'нарешті (finally)'
      right: 'Доконаний (ДВ)'
    - left: 'одразу (immediately)'
      right: 'Доконаний (ДВ)'
    - left: 'одного разу (once)'
      right: 'Доконаний (ДВ)'
    - left: 'за годину (in an hour - result)'
      right: 'Доконаний (ДВ)'

- type: fill-in
  title: 'Вибір виду в контексті'
  instruction: 'Оберіть правильну форму дієслова, щоб доповнити речення.'
  items:
    - sentence: 'Я _____ цю книгу вчора, але не дочитав до кінця.'
      answer: 'читав'
      options:
        - 'читав'
        - 'прочитав'
        - 'буду читати'
        - 'почитав'
      explanation: 'Акцент на процесі, результат не досягнуто -> Недоконаний вид.'
    - sentence: 'Ура! Я нарешті _____ цей екзамен!'
      answer: 'здав'
      options:
        - 'здав'
        - 'здавав'
        - 'здаю'
        - 'буду здавати'
      explanation: 'Слово «нарешті» та вигук «Ура!» вказують на успішний результат -> Доконаний вид.'
    - sentence: 'Ми _____ сніданок, коли задзвонив телефон.'
      answer: 'готували'
      options:
        - 'готували'
        - 'приготували'
        - 'зготували'
        - 'готуємо'
      explanation: 'Дія була в процесі (фоном), коли її перервала інша подія -> Недоконаний вид.'
    - sentence: 'Він _____ звіт за одну годину.'
      answer: 'написав'
      options:
        - 'написав'
        - 'писав'
        - 'пише'
        - 'буде писати'
      explanation: 'Маркер «за одну годину» вказує на час, витрачений на досягнення результату -> Доконаний вид.'
    - sentence: 'Вона _____ каву кожного ранку.'
      answer: 'пила'
      options:
        - 'пила'
        - 'випила'
        - 'попила'
        - 'випиває'
      explanation: 'Маркер «кожного ранку» вказує на звичку/повторення -> Недоконаний вид.'
    - sentence: 'Завтра я _____ тобі все, що знаю.'
      answer: 'розповім'
      options:
        - 'розповім'
        - 'буду розповісти'
        - 'розповідаю'
        - 'розповідав'
      explanation: 'Обіцянка результату в майбутньому. Форма «буду розповісти» граматично неправильна.'
    - sentence: 'Хто _____ цю чудову картину?'
      answer: 'намалював'
      options:
        - 'намалював'
        - 'малював'
        - 'малює'
        - 'буде малювати'
      explanation: 'Питання про автора готового результату (картини) -> Доконаний вид.'
    - sentence: 'Я _____ тебе, як тільки побачив.'
      answer: 'впізнав'
      options:
        - 'впізнав'
        - 'впізнавав'
        - 'пізнавав'
        - 'знаю'
      explanation: 'Миттєва дія (result/event) в минулому -> Доконаний вид.'

- type: error-correction
  title: 'Знайди та виправ помилку'
  instruction: 'Знайдіть помилку у вживанні виду дієслова та виправте її.'
  items:
    - sentence: 'Я буду прочитати цю книгу завтра.'
      error: 'буду прочитати'
      answer: 'прочитаю'
      options:
        - 'прочитаю'
        - 'читатиму'
        - 'буду читати'
        - 'прочитав'
      explanation: 'Не можна поєднувати «буду» з доконаним видом. Для результату в майбутньому використовуйте просту форму ДВ.'
    - sentence: 'Він часто запізнився на роботу.'
      error: 'запізнився'
      answer: 'запізнювався'
      options:
        - 'запізнювався'
        - 'спізнюється'
        - 'запізниться'
        - 'запізнюється'
      explanation: 'Слово «часто» вказує на повторювану дію, тому потрібен недоконаний вид.'
    - sentence: 'Зараз я напишу лист, почекай хвилинку.'
      error: 'напишу'
      answer: 'пишу'
      options:
        - 'пишу'
        - 'писав'
        - 'написав'
        - 'буду писати'
      explanation: 'Якщо дія відбувається «зараз» (в момент мовлення), це завжди процес -> Недоконаний вид.'
    - sentence: 'Ми збудували цей дім ціле літо.'
      error: 'збудували'
      answer: 'будували'
      options:
        - 'будували'
        - 'побудували'
        - 'будуємо'
        - 'збудуємо'
      explanation: 'Маркер «ціле літо» підкреслює тривалість процесу -> Недоконаний вид.'
    - sentence: 'Я здавав екзамен і отримав п’ятірку.'
      error: 'здавав'
      answer: 'здав'
      options:
        - 'здав'
        - 'здаватиму'
        - 'поздавав'
        - 'здаю'
      explanation: 'Якщо є результат («отримав п’ятірку»), значить дія завершена успішно -> Доконаний вид.'
    - sentence: 'Коли я прийшов, вона зготувала вечерю.'
      error: 'зготувала'
      answer: 'готувала'
      options:
        - 'готувала'
        - 'приготувала'
        - 'готує'
        - 'зготувати'
      explanation: 'Контекст «коли я прийшов» передбачає, що ми застали процес приготування, а не вже готовий результат (хоча ДВ теж можливий, НДВ тут природніший для фону).'

- type: mark-the-words
  title: 'Полювання на доконаний вид'
  instruction: 'Знайдіть і позначте всі дієслова ДОКОНАНОГО виду (результат, подія).'
  text: 'Вчора Іван прокинувся рано. Він швидко поснідав і вийшов з дому. На вулиці світило сонце, пташки співали. Люди йшли на роботу. Раптом Іван згадав, що забув телефон на столі. Він повернувся додому, взяв телефон і побіг на зупинку.'
  answers:
    - 'прокинувся'
    - 'поснідав'
    - 'вийшов'
    - 'згадав'
    - 'забув'
    - 'повернувся'
    - 'взяв'
    - 'побіг'
