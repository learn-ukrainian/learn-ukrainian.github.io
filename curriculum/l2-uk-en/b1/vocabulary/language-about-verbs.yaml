items:
  - lemma: вид
    translation: aspect
    pos: noun
    gender: m
    ipa: [vɪd]
    example: Вид дієслова — це важлива категорія.
  - lemma: доконаний вид
    translation: perfective aspect
    pos: phrase
    gender: m
    ipa: [doˈkɔnɐnɪj vɪd]
    example: Доконаний вид вказує на результат.
  - lemma: недоконаний вид
    translation: imperfective aspect
    pos: phrase
    gender: m
    ipa: [nedoˈkɔnɐnɪj vɪd]
    example: Недоконаний вид вказує на процес.
  - lemma: час
    translation: tense
    pos: noun
    gender: m
    ipa: [t͡ʃas]
    example: В українській мові є три часи.
  - lemma: теперішній час
    translation: present tense
    pos: phrase
    gender: m
    ipa: [teˈper⁽ʲ⁾iʃn⁽ʲ⁾ij t͡ʃas]
    example: Я працюю зараз — це теперішній час.
  - lemma: минулий час
    translation: past tense
    pos: phrase
    gender: m
    ipa: [mɪˈnulɪj t͡ʃas]
    example: Він працював учора — це минулий час.
  - lemma: майбутній час
    translation: future tense
    pos: phrase
    gender: m
    ipa: [mɐjˈbut⁽ʲ⁾n⁽ʲ⁾ij t͡ʃas]
    example: Я буду працювати — це майбутній час.
  - lemma: дія
    translation: action
    pos: noun
    gender: f
    ipa: [ˈd⁽ʲ⁾ijɐ]
    example: Дієслово називає дію.
  - lemma: процес
    translation: process
    pos: noun
    gender: m
    ipa: [proˈt͡sɛs]
    example: Дія може тривати як процес.
  - lemma: результат
    translation: result
    pos: noun
    gender: m
    ipa: [rezulʲˈtɑt]
    example: Ми бачимо результат роботи.
  - lemma: заперечення
    translation: negation
    pos: noun
    gender: n
    ipa: [zɐˈpɛret͡ʃenʲːɐ]
    example: Частка не виражає заперечення.
  - lemma: наказова форма
    translation: imperative form
    pos: phrase
    gender: f
    ipa: [nɐkɐˈzɔvɐ ˈfɔrmɐ]
    example: Пиши! — це наказова форма.
  - lemma: тривалість
    translation: duration
    pos: noun
    gender: f
    ipa: [trɪˈvɑl⁽ʲ⁾ist⁽ʲ⁾]
    example: Слова довго або годину вказують на тривалість.
  - lemma: повторення
    translation: repetition
    pos: noun
    gender: n
    ipa: [pou̯ˈtɔrenʲːɐ]
    example: Слово щодня вказує на повторення дії.
  - lemma: загальне заперечення
    translation: general negation
    pos: phrase
    gender: n
    ipa: [zɐˈɦɑlʲne zɐˈpɛret͡ʃenʲːɐ]
    example: Загальне заперечення позначає відсутність факту дії.
  - lemma: складена форма
    translation: compound form
    pos: phrase
    gender: f
    ipa: [sklɐˈdɛnɐ ˈfɔrmɐ]
    example: Складена форма майбутнього часу має два слова.
  - lemma: синтетична форма
    translation: synthetic form
    pos: phrase
    gender: f
    ipa: [sɪnteˈtɪt͡ʃnɐ ˈfɔrmɐ]
    example: Синтетична форма (читатиму) є дуже лаконічною.
  - lemma: застереження
    translation: warning
    pos: noun
    gender: n
    ipa: [zɐsteˈrɛʒenʲːɐ]
    example: Не впади! — це застереження.
  - lemma: заборона
    translation: prohibition
    pos: noun
    gender: f
    ipa: [zɐboˈrɔnɐ]
    example: Не розмовляй! — це сувора заборона.
  - lemma: інфінітив
    translation: infinitive
    pos: noun
    gender: m
    ipa: [infinʲiˈtɪu̯]
    example: Інфінітив відповідає на питання що робити?.
  - lemma: дієвідмінювання
    translation: conjugation
    pos: noun
    gender: n
    ipa: [d⁽ʲ⁾ijewidʲˈm⁽ʲ⁾inʲuwɐnʲːɐ]
    example: Система змін дієслова називається дієвідмінюванням.
  - lemma: основа дієслова
    translation: verb stem
    pos: phrase
    gender: f
    ipa: [oˈsnɔvɐ d⁽ʲ⁾ijeˈslɔvɐ]
    example: Ми додаємо закінчення до основи дієслова.
  - lemma: закінчення
    translation: ending
    pos: noun
    gender: n
    ipa: [zɐˈkinʲt͡ʃenʲːɐ]
    example: Змінювана частина слова називається закінченням.
  - lemma: видова пара
    translation: aspectual pair
    pos: phrase
    gender: f
    ipa: [vɪdoˈvɑ ˈpɑrɐ]
    example: Писати та написати — це видова пара.
  - lemma: завершеність
    translation: completion
    pos: noun
    gender: f
    ipa: [zɐˈvɛrʃen⁽ʲ⁾ist⁽ʲ⁾]
    example: Доконаний вид має значення завершеності.
