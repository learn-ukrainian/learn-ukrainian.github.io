items:
  - lemma: 'використовуватися'
    translation: 'to be used'
    pos: 'verb'
    notes: 'Imperfective. Часто вживається в пасивних конструкціях: "термін використовується".'
    aspect: 'imperfective'
  - lemma: 'показувати'
    translation: 'to show / to indicate'
    pos: 'verb'
    notes: 'У граматиці: вказувати на певну функцію (закінчення показує рід).'
    aspect: 'imperfective'
  - lemma: 'означати'
    translation: 'to mean / to signify'
    pos: 'verb'
    notes: 'Використовується для дефініцій та перекладу. Не плутати зі "значити".'
    aspect: 'imperfective'
  - lemma: 'порівняти'
    translation: 'to compare'
    pos: 'verb'
    notes: 'Інструкція: знайдіть спільне та відмінне.'
    aspect: 'perfective'
  - lemma: 'звернути увагу'
    translation: 'to pay attention / to note'
    pos: 'verb'
    notes: 'Часто вживається як наказ: "Зверніть увагу!".'
    aspect: 'perfective'
  - lemma: 'вибрати'
    translation: 'to choose / to select'
    pos: 'verb'
    notes: 'Інструкція: обрати правильний варіант зі списку.'
    aspect: 'perfective'
  - lemma: 'знайти'
    translation: 'to find'
    pos: 'verb'
    notes: 'Інструкція: побачити елемент у тексті.'
    aspect: 'perfective'
  - lemma: 'доповнити'
    translation: 'to complete / to fill in'
    pos: 'verb'
    notes: 'Інструкція: вставити пропущене.'
    aspect: 'perfective'
  - lemma: 'з''єднати'
    translation: 'to connect / to match'
    pos: 'verb'
    notes: 'Інструкція: встановити пару.'
    aspect: 'perfective'
  - lemma: 'перекласти'
    translation: 'to translate'
    pos: 'verb'
    notes: 'Інструкція: передати зміст іншою мовою.'
    aspect: 'perfective'
  - lemma: 'контекст'
    translation: 'context'
    pos: 'noun'
    gender: 'm'
    notes: 'Мовне оточення або ситуація.'
  - lemma: 'маркер'
    translation: 'marker'
    pos: 'noun'
    gender: 'm'
    notes: 'Слово-сигнал, що вказує на граматичне явище.'
  - lemma: 'частота'
    translation: 'frequency'
    pos: 'noun'
    gender: 'f'
    notes: 'Як часто слово вживається в мові.'
  - lemma: 'стиль'
    translation: 'style'
    pos: 'noun'
    gender: 'm'
    notes: 'Манера мовлення (науковий, художній).'
  - lemma: 'регістр'
    translation: 'register'
    pos: 'noun'
    gender: 'm'
    notes: 'Рівень формальності (офіційний, неофіційний).'
  - lemma: 'розмовний'
    translation: 'colloquial / spoken'
    pos: 'adj'
    notes: 'Стиль для спілкування з друзями.'
  - lemma: 'літературний'
    translation: 'literary / standard'
    pos: 'adj'
    notes: 'Унормована, правильна мова.'
  - lemma: 'формальний'
    translation: 'formal'
    pos: 'adj'
    notes: 'Офіційна, суха мова документів.'
  - lemma: 'корінь'
    translation: 'root'
    pos: 'noun'
    gender: 'm'
    notes: 'Головна частина слова.'
  - lemma: 'префікс'
    translation: 'prefix'
    pos: 'noun'
    gender: 'm'
    notes: 'Частина слова перед коренем.'
  - lemma: 'суфікс'
    translation: 'suffix'
    pos: 'noun'
    gender: 'm'
    notes: 'Частина слова після кореня.'
  - lemma: 'закінчення'
    translation: 'ending'
    pos: 'noun'
    gender: 'n'
    notes: 'Змінна частина слова в кінці.'
  - lemma: 'основа'
    translation: 'stem'
    pos: 'noun'
    gender: 'f'
    notes: 'Частина слова без закінчення.'
  - lemma: 'наприклад'
    translation: 'for example'
    pos: 'adv'
    notes: 'Вводить приклад або ілюстрацію.'
  - lemma: 'отже'
    translation: 'therefore / so'
    pos: 'conj'
    notes: 'Вводить висновок або підсумок.'