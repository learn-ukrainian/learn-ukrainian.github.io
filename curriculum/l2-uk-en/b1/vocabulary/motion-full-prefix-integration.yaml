items:
  - lemma: 'перейти'
    translation: 'to cross, switch'
    pos: 'verb'
    aspect: 'perfective'
    notes: 'often used figuratively: перейти на українську (switch to Ukrainian), перейти межу (cross the line)'
  - lemma: 'вийти'
    translation: 'to exit, emerge'
    pos: 'verb'
    aspect: 'perfective'
    notes: 'figuratively: вийти заміж (get married), нічого не вийшло (nothing worked out)'
  - lemma: 'прийти'
    translation: 'to arrive (on foot)'
    pos: 'verb'
    aspect: 'perfective'
    notes: 'figuratively: прийти до тями (regain consciousness)'
  - lemma: 'зайти'
    translation: 'to drop by, enter briefly'
    pos: 'verb'
    aspect: 'perfective'
    notes: 'indicates a short deviation from a planned route or short visit'
  - lemma: 'дійти'
    translation: 'to reach, walk as far as'
    pos: 'verb'
    aspect: 'perfective'
    notes: 'focuses on the limit; figuratively: дійти згоди (reach agreement)'
  - lemma: 'пройти'
    translation: 'to pass through, pass by'
    pos: 'verb'
    aspect: 'perfective'
    notes: 'often used for time: час пройшов (time passed)'
  - lemma: 'відійти'
    translation: 'to step back, retreat'
    pos: 'verb'
    aspect: 'perfective'
    notes: 'military context: retreat from a position'
  - lemma: 'увійти'
    translation: 'to enter'
    pos: 'verb'
    aspect: 'perfective'
    notes: 'neutral entry into a closed space'
  - lemma: 'піти'
    translation: 'to set off, leave'
    pos: 'verb'
    aspect: 'perfective'
    notes: 'indicates start of a unidirectional movement'
  - lemma: 'походити'
    translation: 'to walk for a bit'
    pos: 'verb'
    aspect: 'perfective'