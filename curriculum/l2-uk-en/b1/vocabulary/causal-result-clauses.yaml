items:
  - lemma: 'тому що'
    translation: 'because'
    pos: 'conjunction'
    usage: 'High frequency, neutral/universal'
    example: 'Я читаю, тому що це цікаво.'
  - lemma: 'бо'
    translation: 'because'
    pos: 'conjunction'
    usage: 'High frequency, spoken, often at end of sentence'
    example: 'Візьми парасольку, бо хмариться.'
  - lemma: 'через те що'
    translation: 'due to the fact that'
    pos: 'conjunction'
    usage: 'Medium frequency, neutral, external circumstances'
    example: 'Врожай менший через те що весна була сухою.'
  - lemma: 'тому'
    translation: 'therefore'
    pos: 'conjunction'
    usage: 'High frequency connector'
    example: 'Ішов дощ, тому ми залишилися вдома.'
  - lemma: 'отже'
    translation: 'thus / so'
    pos: 'conjunction'
    usage: 'Medium frequency, logical conclusion'
    example: 'У нас є всі матеріали, отже, ми можемо починати.'
