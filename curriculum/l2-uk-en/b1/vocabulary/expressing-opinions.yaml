items:
  - lemma: 'думка'
    translation: 'opinion/thought'
    pos: 'noun'
    gender: 'f'
    notes: 'Base word for expressing individual or collective positions. Requires comma in "на мою думку, ...".'
  - lemma: 'погляд'
    translation: 'view/perspective'
    pos: 'noun'
    gender: 'm'
    notes: 'Used in phrases like "на мій погляд" or "з точки зору". Can also mean literal gaze.'
  - lemma: 'вважати'
    translation: 'to consider/opine'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Fundamental verb for expressing an intellectual evaluation. Do not confuse with "рахувати".'
  - lemma: 'впевнений'
    translation: 'sure/certain'
    pos: 'adjective'
    notes: 'High frequency marker of strong certainty.'
  - lemma: 'переконаний'
    translation: 'convinced'
    pos: 'adjective'
    notes: 'Indicates strong certainty resulting from deep analysis or internal belief.'
  - lemma: 'безсумнівно'
    translation: 'undoubtedly'
    pos: 'adverb'
    notes: 'Formal or academic marker of absolute categorical certainty.'
  - lemma: 'можливо'
    translation: 'possibly'
    pos: 'adverb'
    notes: 'Key tool for diplomatic hedging and softening disagreement.'
  - lemma: 'гадати'
    translation: 'to think/suppose'
    pos: 'verb'
    aspect: 'impf'
    notes: 'A softer, more intuitive synonym for "вважати" or "думати".'
  - lemma: 'мабуть'
    translation: 'probably'
    pos: 'adverb'
    notes: 'Marker of weak assumption based on guesses or incomplete data.'
  - lemma: 'очевидно'
    translation: 'obviously'
    pos: 'adverb'
    notes: 'Implies certainty based on evidence visible to everyone.'
  - lemma: 'здаватися'
    translation: 'to seem'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Used in impersonal constructions like "мені здається" for subjective impressions.'
  - lemma: 'стверджувати'
    translation: 'to claim/assert'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Strictly formal verb used for official statements or scientific claims.'
  - lemma: 'припускати'
    translation: 'to assume/hypothesize'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Crucial for formulating logical hypotheses and scenarios.'
  - lemma: 'навряд чи'
    translation: 'hardly/unlikely'
    pos: 'adverb'
    notes: 'A powerful expression of strong doubt or negative probability.'
  - lemma: 'поділяти'
    translation: 'to share'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Used in collocations like "поділяти думку" (to share an opinion).'
  - lemma: 'висловлювати'
    translation: 'to express'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Used to actively communicate an idea ("висловити позицію").'
  - lemma: 'рахувати'
    translation: 'to count/calculate'
    pos: 'verb'
    aspect: 'impf'
    notes: 'WARNING: Only use for mathematical actions, never for expressing opinions.'
  - lemma: 'точка зору'
    translation: 'point of view'
    pos: 'noun'
    gender: 'f'
    notes: 'Formal expression for a perspective, often used in professional contexts.'
  - lemma: 'громадський'
    translation: 'public/civic'
    pos: 'adjective'
    notes: 'Forms the important collocation "громадська думка" (public opinion).'
  - lemma: 'цілком'
    translation: 'entirely/fully'
    pos: 'adverb'
    notes: 'Common intensifier for opinions ("цілком впевнений").'
  - lemma: 'твердо'
    translation: 'firmly'
    pos: 'adverb'
    notes: 'Intensifier showing unwavering stance ("твердо переконаний").'
  - lemma: 'глибоко'
    translation: 'deeply'
    pos: 'adverb'
    notes: 'Intensifier showing strong internal belief ("глибоко переконаний").'
  - lemma: 'тому що'
    translation: 'because'
    pos: 'conjunction'
    notes: 'Universal causal connector.'
  - lemma: 'через те що'
    translation: 'due to the fact that'
    pos: 'conjunction'
    notes: 'Causal connector focusing on external circumstances.'
  - lemma: 'оскільки'
    translation: 'since/as'
    pos: 'conjunction'
    notes: 'Formal causal connector, often placed at the beginning of a sentence.'
  - lemma: 'дискусія'
    translation: 'discussion/debate'
    pos: 'noun'
    gender: 'f'
    notes: 'Formal exchange of opinions and arguments.'
  - lemma: 'аргумент'
    translation: 'argument/reason'
    pos: 'noun'
    gender: 'm'
    notes: 'A logical point made to support a thesis.'
  - lemma: 'позиція'
    translation: 'position/stance'
    pos: 'noun'
    gender: 'f'
    notes: 'A formulated and structured opinion on a topic.'
  - lemma: 'переконання'
    translation: 'conviction/belief'
    pos: 'noun'
    gender: 'n'
    notes: 'A deeply held personal or philosophical belief.'
  - lemma: 'суперечка'
    translation: 'argument/dispute'
    pos: 'noun'
    gender: 'f'
    notes: 'A more emotional and less structured disagreement than a "дискусія".'