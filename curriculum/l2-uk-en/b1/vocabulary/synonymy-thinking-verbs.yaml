items:
  - lemma: 'думати'
    translation: 'to think'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Neutral frequency. Use "про" + Accusative for general thoughts, "над" + Instrumental for problem-solving.'
  - lemma: 'вважати'
    translation: 'to consider, to opine'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Formal context. Expresses a grounded opinion. Correct alternative to the calque "рахувати".'
  - lemma: 'гадати'
    translation: 'to suppose, to guess'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Used for suppositions or hypotheses. Common idiom: "не довго думаючи й гадаючи".'
  - lemma: 'міркувати'
    translation: 'to ponder, to reason'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Focuses on the logical process of analyzing. Collocations: "міркувати логічно", "міркувати вголос".'
  - lemma: 'розуміти'
    translation: 'to understand'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Collocations: "розуміти з півслова" (to understand perfectly), "дати зрозуміти" (to hint).'
  - lemma: 'пам''ятати'
    translation: 'to remember'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Refers to the state of holding information in memory.'
  - lemma: 'згадувати'
    translation: 'to recall, to mention'
    pos: 'verb'
    aspect: 'impf'
    notes: 'The active process of bringing something to mind.'
  - lemma: 'усвідомлювати'
    translation: 'to realize, to be conscious of'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Deep cognitive realization of facts or their significance.'
  - lemma: 'рахувати'
    translation: 'to count'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Strictly used for mathematics and money. NOT for expressing opinions.'
  - lemma: 'ворожити'
    translation: 'to tell fortunes'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Used for mystical prediction rituals. Often confused with "гадати".'
  - lemma: 'роздумувати'
    translation: 'to reflect, to meditate'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Profound, often literary or philosophical thought process.'
  - lemma: 'обмірковувати'
    translation: 'to deliberate, to weigh'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Analyzing various options before making a final decision.'
  - lemma: 'осягати'
    translation: 'to grasp, to comprehend'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Achieving full intellectual understanding of a complex concept.'
  - lemma: 'впізнавати'
    translation: 'to recognize'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Cognitive identification of something or someone known.'
  - lemma: 'мислити'
    translation: 'to think, to reason philosophically'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Abstract, high-level act of thinking, as used by Descartes.'
