  - id: wb-8
    type: essay-response
    title: Оголошення або скарга
    instruction: Напишіть один практичний текст на вибір.
    prompt: "Варіант А: напишіть оголошення про квартиру, яку ви здаєте. Варіант Б: напишіть повідомлення власникові про проблему в квартирі. Використайте принаймні 12 змістових деталей: тип житла, площа, поверх, район або адреса, меблі, техніка, комунальні, термін, завдаток або договір, одне питання чи прохання, одну проблему або умову, ввічливе звертання. Обов'язково використайте щонайменше шість моделей з модуля: без + Р.в., з + Ор.в., на + М.в., на + Зн.в. для терміну або напряму, давальний для потреби, кличний для звертання."
    min_words: 90
    model_answer: "Добрий день. Здається світла однокімнатна квартира площею сорок два квадратні метри на третьому поверсі. Квартира вмебльована, з балконом, холодильником і пральною машиною. Вікна виходять на тихе подвір'я, поруч є зупинка і супермаркет. Оренда — дванадцять тисяч гривень на місяць, комунальні оплачуються окремо. Договір укладаємо на рік, завдаток — одна місячна оплата. Можна з котом за попередньою домовленістю. Якщо вас цікавить огляд, напишіть, будь ласка, коли вам зручно подивитися квартиру."
    rubric:
      - criteria: "Деталі"
        description: "Є щонайменше 12 змістових деталей із завдання."
        points: 3
      - criteria: "Відмінки"
        description: "Правильно використано просторові й орендні моделі з модуля."
        points: 4
      - criteria: "Лексика"
        description: "Є житлова лексика: оренда, комунальні, договір, завдаток, меблі або ремонт."
        points: 2
      - criteria: "Регістр"
        description: "Текст ввічливий і практичний, без надто різких формулювань."
        points: 1
