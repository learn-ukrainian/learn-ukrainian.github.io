version: '1.0'
module: housing-and-renting
level: b1
inline:
  - id: act-1
    type: quiz
    title: Відмінок у житловій фразі
    instruction: Оберіть модель, яка пояснює виділену частину.
    items:
      - question: "Квартира на третьому поверсі."
        options:
          - "місцевий відмінок після на, бо це місце"
          - "знахідний відмінок, бо це напрям"
          - "родовий відмінок, бо це кількість"
        correct: 0
        explanation: "На третьому поверсі відповідає на питання де?"
      - question: "Кімната з балконом."
        options:
          - "орудний після з для характеристики"
          - "родовий після з для відсутності"
          - "кличний для звертання"
        correct: 0
        explanation: "З балконом описує ознаку кімнати."
      - question: "Вікна виходять на подвір'я."
        options:
          - "знахідний після на, бо це напрям"
          - "місцевий після на, бо це статичне місце"
          - "давальний, бо є адресат"
        correct: 0
        explanation: "Модель виходити на що? бере знахідний."
      - question: "Квартира без меблів."
        options:
          - "родовий після без"
          - "орудний після без"
          - "називний множини"
        correct: 0
        explanation: "Без завжди керує родовим."
      - question: "Оренда на місяць."
        options:
          - "знахідний у значенні терміну"
          - "місцевий у значенні місця"
          - "орудний у значенні способу"
        correct: 0
        explanation: "На місяць означає період домовленості."
      - question: "Договір оренди."
        options:
          - "родовий залежного іменника"
          - "кличний офіційного стилю"
          - "знахідний прямого об'єкта"
        correct: 0
        explanation: "Оренди відповідає на питання чого?"
      - question: "Мені потрібна квартира."
        options:
          - "давальний для людини, яка має потребу"
          - "родовий для відсутності"
          - "орудний для характеристики"
        correct: 0
        explanation: "Мені показує того, хто потребує."
      - question: "Площею сорок квадратних метрів."
        options:
          - "орудний площею плюс родовий після кількості"
          - "лише місцевий відмінок"
          - "лише кличний відмінок"
        correct: 0
        explanation: "Це змішана модель: площею і метрів."
      - question: "Поруч із парком."
        options:
          - "орудний після із"
          - "знахідний після із"
          - "кличний після поруч"
        correct: 0
        explanation: "Із парком стоїть в орудному."
      - question: "За адресою вулиця Франка, 12."
        options:
          - "орудний у формулі адреси"
          - "родовий для ціни"
          - "називний для звертання"
        correct: 0
        explanation: "За адресою - стала офіційна формула."
      - question: "Пане Ігорю, хочу уточнити умови."
        options:
          - "кличний відмінок у звертанні"
          - "родовий після хочу"
          - "місцевий після пане"
        correct: 0
        explanation: "Ігорю - клична форма імені Ігор."
      - question: "Комунальні оплачуються окремо."
        options:
          - "коротка оголошувальна формула про платежі"
          - "порівняння двох квартир"
          - "форма наказового способу"
        correct: 0
        explanation: "Це типова фраза з оголошень і переговорів."
  - id: act-2
    type: match-up
    title: Житлова лексика
    instruction: З'єднайте термін із точним поясненням.
    pairs:
      - left: "1к квартира"
        right: "однокімнатна квартира"
      - left: "2к квартира"
        right: "двокімнатна квартира"
      - left: "кв.м"
        right: "квадратні метри"
      - left: "3/9 поверх"
        right: "третій поверх із дев'яти"
      - left: "грн/міс"
        right: "гривень на місяць"
      - left: "б/м"
        right: "без меблів у цьому модулі"
      - left: "під ключ"
        right: "готова до заселення"
      - left: "євроремонт"
        right: "рекламна назва сучасного ремонту"
      - left: "комунальні"
        right: "платежі за послуги"
      - left: "завдаток"
        right: "сума наперед як гарантія"
      - left: "орендар"
        right: "людина, яка орендує"
      - left: "орендодавець"
        right: "людина, яка здає житло"
  - id: act-3
    type: fill-in
    title: Прочитайте оголошення
    instruction: Вставте слово або скорочення, яке найкраще завершує оголошення.
    items:
      - sentence: "Здається 2к квартира, 55 ____."
        answer: "кв.м"
        options:
          - "кв.м"
          - "грн/міс"
          - "поверх"
        explanation: "Після площі пишуть квадратні метри."
      - sentence: "Квартира на третьому ____."
        answer: "поверсі"
        options:
          - "поверсі"
          - "поверх"
          - "поверху"
        explanation: "На якому? на третьому поверсі."
      - sentence: "Оренда 12 000 ____ + комунальні."
        answer: "грн/міс"
        options:
          - "грн/міс"
          - "кв.м"
          - "3/9"
        explanation: "Це ціна за місяць."
      - sentence: "Квартира ____, є шафа, ліжко і стіл."
        answer: "вмебльована"
        options:
          - "вмебльована"
          - "поверхова"
          - "комунальна"
        explanation: "Вмебльована означає з меблями."
      - sentence: "Комунальні оплачуються ____."
        answer: "окремо"
        options:
          - "окремо"
          - "площею"
          - "поруч"
        explanation: "Окремо означає не включені в оренду."
      - sentence: "Квартира без ____."
        answer: "меблів"
        options:
          - "меблів"
          - "меблі"
          - "меблями"
        explanation: "Після без потрібен родовий."
      - sentence: "Вікна виходять на ____."
        answer: "подвір'я"
        options:
          - "подвір'я"
          - "подвір'ї"
          - "подвір'ям"
        explanation: "Виходять на що? на подвір'я."
      - sentence: "Договір укладаємо на ____."
        answer: "рік"
        options:
          - "рік"
          - "році"
          - "роком"
        explanation: "На рік означає термін."
      - sentence: "Завдаток — одна місячна ____."
        answer: "оплата"
        options:
          - "оплата"
          - "оплатою"
          - "оплати"
        explanation: "У фрагменті оголошення природна форма оплата."
      - sentence: "Будинок з ____."
        answer: "ліфтом"
        options:
          - "ліфтом"
          - "ліфта"
          - "ліфт"
        explanation: "З чим? з ліфтом."
      - sentence: "Здається кімната в ____."
        answer: "гуртожитку"
        options:
          - "гуртожитку"
          - "гуртожиток"
          - "гуртожитком"
        explanation: "У чому? в гуртожитку."
      - sentence: "Квартира ____ 42 квадратні метри."
        answer: "площею"
        options:
          - "площею"
          - "площі"
          - "площу"
        explanation: "Площею - стала модель для розміру житла."
  - id: act-4
    type: cloze
    title: Переговори з власником
    instruction: Заповніть пропуски у діалозі про умови оренди.
    text: "Орендар: Добрий день. Я телефоную щодо {1} про оренду квартири. Вона ще {2}? Власник: Так, квартира вільна. Орендар: Яка {3} оренди на місяць? Власник: Дванадцять тисяч гривень. {4} окремо. Орендар: Який {5}? Власник: Одна місячна {6}. Орендар: На який {7} укладаємо договір? Власник: Мінімум на {8}. Орендар: Чи можна {9} котом? Власник: Можна, якщо ви відповідаєте за {10}. Орендар: Коли можна {11} квартиру? Власник: Сьогодні після {12}."
    blanks:
      - id: 1
        answer: "оголошення"
        options:
          - "оголошення"
          - "поверх"
          - "опалення"
      - id: 2
        answer: "вільна"
        options:
          - "вільна"
          - "окрема"
          - "площею"
      - id: 3
        answer: "вартість"
        options:
          - "вартість"
          - "поверх"
          - "цвіль"
      - id: 4
        answer: "Комунальні"
        options:
          - "Комунальні"
          - "Квадратні"
          - "Кімнатні"
      - id: 5
        answer: "завдаток"
        options:
          - "завдаток"
          - "балкон"
          - "санвузол"
      - id: 6
        answer: "оплата"
        options:
          - "оплата"
          - "оплатою"
          - "оплаті"
      - id: 7
        answer: "термін"
        options:
          - "термін"
          - "ремонт"
          - "адресу"
      - id: 8
        answer: "рік"
        options:
          - "рік"
          - "році"
          - "роком"
      - id: 9
        answer: "з"
        options:
          - "з"
          - "на"
          - "без"
      - id: 10
        answer: "меблі"
        options:
          - "меблі"
          - "меблями"
          - "меблів"
      - id: 11
        answer: "подивитися"
        options:
          - "подивитися"
          - "платити"
          - "протікати"
      - id: 12
        answer: "шостої"
        options:
          - "шостої"
          - "шоста"
          - "шостою"
  - id: act-5
    type: match-up
    title: Проблема і повідомлення
    instruction: Поєднайте житлову проблему з природною фразою для повідомлення власникові.
    pairs:
      - left: "протікає кран"
        right: "У ванній протікає кран, потрібен сантехнік."
      - left: "не працює опалення"
        right: "У квартирі холодно, батареї не гріють."
      - left: "зламалася пральна машина"
        right: "Пральна машина не вмикається після прання."
      - left: "не працює ліфт"
        right: "Ліфт не працює третій день."
      - left: "у кімнаті цвіль"
        right: "На стіні з'явилася цвіль."
      - left: "сусіди шумлять"
        right: "Через шум після десятої важко спати."
      - left: "немає гарячої води"
        right: "Гаряча вода відсутня від ранку."
      - left: "іскрить розетка"
        right: "Терміново потрібен електрик."
      - left: "не зачиняється замок"
        right: "Замок у дверях не зачиняється."
      - left: "протікає труба"
        right: "Терміново протікає труба у ванній."
      - left: "не працює інтернет"
        right: "Інтернет не підключається вже дві години."
      - left: "немає світла"
        right: "У квартирі немає електрики."
workbook:
  - id: wb-1
    type: quiz
    title: Читаємо оголошення
    instruction: Оберіть правильне тлумачення фрагмента оголошення.
    items:
      - question: "Що означає «Здається 2к квартира»?"
        options:
          - "орендується двокімнатна квартира"
          - "квартира має дві кухні"
          - "квартира здається дивною"
        correct: 0
        explanation: "У житловому оголошенні здається означає доступна для оренди."
      - question: "Що означає «3/9 поверх»?"
        options:
          - "третій поверх із дев'яти"
          - "дев'ять квартир на третьому поверсі"
          - "три кімнати і дев'ять метрів"
        correct: 0
        explanation: "Перше число - поверх квартири, друге - поверховість будинку."
      - question: "Що означає «комунальні окремо»?"
        options:
          - "платежі за послуги не входять в оренду"
          - "комунальні вже включені"
          - "квартира без води й електрики"
        correct: 0
        explanation: "Окремо означає додатково до оренди."
      - question: "Що найкраще уточнити після «під ключ»?"
        options:
          - "що саме входить: меблі, техніка, інтернет"
          - "де взяти ключ від підвалу"
          - "чи є ключ українською мовою"
        correct: 0
        explanation: "Під ключ означає готовність, але склад готовності треба уточнити."
      - question: "Що означає «б/м» у цьому модулі?"
        options:
          - "без меблів"
          - "біля метро"
          - "без місяця"
        correct: 0
        explanation: "Ми фіксуємо це скорочення як без меблів, хоча в реальності варто уточнювати."
      - question: "Яка фраза ввічливо починає відповідь на оголошення?"
        options:
          - "Добрий день. Я пишу щодо оголошення..."
          - "Ціна?"
          - "Дай адресу."
        correct: 0
        explanation: "Перша фраза має привітання і контекст."
      - question: "Що краще спитати про завдаток?"
        options:
          - "Який завдаток і коли він повертається?"
          - "Чому ви хочете гроші?"
          - "Завдаток існує?"
        correct: 0
        explanation: "Питання має бути конкретним і ввічливим."
      - question: "Яке питання стосується терміну?"
        options:
          - "На який термін укладаємо договір?"
          - "На якому поверсі квартира?"
          - "На що виходять вікна?"
        correct: 0
        explanation: "Термін - це період оренди."
      - question: "Яке формулювання найточніше передає дозвіл на тварин?"
        options:
          - "Чи можна з тваринами?"
          - "Чи тварини можуть?"
          - "Чи квартира тваринна?"
        correct: 0
        explanation: "З тваринами - природна умова проживання."
      - question: "Яка фраза описує напрям вікон?"
        options:
          - "вікна виходять на подвір'я"
          - "вікна стоять у подвір'ї"
          - "вікнами на подвір'ї"
        correct: 0
        explanation: "Виходити на що? на подвір'я."
      - question: "Що означає «без посередників»?"
        options:
          - "ймовірно, контакт із власником напряму"
          - "у квартирі немає сусідів"
          - "немає комунальних послуг"
        correct: 0
        explanation: "Посередник - агент або третя сторона."
      - question: "Яке повідомлення про проблему найкраще?"
        options:
          - "Пані Олено, у квартирі не працює опалення."
          - "Усе погано."
          - "Ви нічого не робите."
        correct: 0
        explanation: "Конкретний факт кращий за загальну емоційну оцінку."
  - id: wb-2
    type: fill-in
    title: Відмінки в описі квартири
    instruction: Виберіть правильну форму.
    items:
      - sentence: "Квартира з великим ____."
        answer: "балконом"
        options:
          - "балконом"
          - "балкон"
          - "балкона"
        explanation: "З чим? з балконом."
      - sentence: "Будинок без ____."
        answer: "ліфта"
        options:
          - "ліфта"
          - "ліфт"
          - "ліфтом"
        explanation: "Без чого? без ліфта."
      - sentence: "Квартира на п'ятому ____."
        answer: "поверсі"
        options:
          - "поверсі"
          - "поверх"
          - "поверхом"
        explanation: "На якому? на п'ятому поверсі."
      - sentence: "Вікна виходять на тихе ____."
        answer: "подвір'я"
        options:
          - "подвір'я"
          - "подвір'ї"
          - "подвір'ям"
        explanation: "На що? на подвір'я."
      - sentence: "Квартира площею сорок квадратних ____."
        answer: "метрів"
        options:
          - "метрів"
          - "метри"
          - "метрами"
        explanation: "Після числа сорок тут родовий множини."
      - sentence: "Оренда на один ____."
        answer: "місяць"
        options:
          - "місяць"
          - "місяці"
          - "місяцем"
        explanation: "На місяць означає термін."
      - sentence: "Поруч із ____."
        answer: "парком"
        options:
          - "парком"
          - "парк"
          - "парку"
        explanation: "Із чим? із парком."
      - sentence: "Мені потрібна квартира без ____."
        answer: "посередників"
        options:
          - "посередників"
          - "посередники"
          - "посередниками"
        explanation: "Без керує родовим."
      - sentence: "Пані Олено, прошу надіслати ____."
        answer: "майстра"
        options:
          - "майстра"
          - "майстер"
          - "майстром"
        explanation: "Надіслати кого? майстра."
      - sentence: "За адресою ____ Франка, 12."
        answer: "вулиця"
        options:
          - "вулиця"
          - "вулицею"
          - "вулиці"
        explanation: "У формулі адреси назва типу може стояти як частина адреси: вулиця Франка."
      - sentence: "У квартирі немає гарячої ____."
        answer: "води"
        options:
          - "води"
          - "вода"
          - "водою"
        explanation: "Немає чого? води."
      - sentence: "Терміново потрібен ____."
        answer: "сантехнік"
        options:
          - "сантехнік"
          - "сантехніка"
          - "сантехніком"
        explanation: "Потрібен хто? сантехнік."
  - id: wb-3
    type: match-up
    title: Скорочення і умови
    instruction: З'єднайте фрагмент оголошення з повним змістом.
    pairs:
      - left: "1к"
        right: "однокімнатна"
      - left: "2к"
        right: "двокімнатна"
      - left: "3к"
        right: "трикімнатна"
      - left: "кв.м"
        right: "квадратні метри"
      - left: "грн/міс"
        right: "гривень на місяць"
      - left: "3/9"
        right: "третій поверх із дев'яти"
      - left: "б/м"
        right: "без меблів"
