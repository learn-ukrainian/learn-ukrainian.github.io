version: '1.0'
module: prepositions-temporal
level: b1
inline:
- id: reading-interval-logic
  type: reading
  passage: 'В українській мові прийменники «через» та «за» мають різне значення, хоча
    обидва використовуються зі Знахідним відмінком. «Через» означає очікування: дія
    відбудеться після певного часу (наприклад, «зустрінемося через годину»). «За»
    означає тривалість активної дії, яка має результат (наприклад, «він прочитав книгу
    за годину»). Важливо не плутати їх, адже «прочитати через годину» означатиме,
    що ви почнете читати тільки після того, як мине година, а не витратите годину
    на читання.'
  questions:
  - Який прийменник ми використовуємо для очікування дії в майбутньому?
  - Який прийменник підкреслює тривалість активного процесу від початку до результату?
  - Що означає речення «Я прочитав статтю за годину»?
  - Що означає речення «Я прийду через годину»?
  - Яке значення має прийменник «через» у реченні «Я запізнився через затори»?
  - Після якого слова прийменник «через» вказує на час, а не на причину?
- id: fill-in-interval-cases
  type: fill-in
  instruction: 'Вставте правильний прийменник: «через» або «за».'
  items:
  - sentence: Я зателефоную тобі ____ десять хвилин.
    answer: через
    options:
    - через
    - за
  - sentence: Вона вивчила цей вірш ____ один вечір.
    answer: за
    options:
    - через
    - за
  - sentence: Мій брат повернеться з відрядження ____ тиждень.
    answer: через
    options:
    - через
    - за
  - sentence: Ми доїхали до центру міста ____ пів години.
    answer: за
    options:
    - через
    - за
  - sentence: Новий фільм почнеться ____ п'ятнадцять хвилин.
    answer: через
    options:
    - через
    - за
  - sentence: Студент написав складне есе ____ дві години.
    answer: за
    options:
    - через
    - за
- id: quiz-cherez-za-choice
  type: quiz
  instruction: Оберіть правильний варіант завершення речення.
  items:
  - question: Ми зустрінемося біля метро...
    options:
    - через годину
    - за годину
    - в годину
    - на годину
    correct: 0
  - question: Я приготував цю вечерю...
    options:
    - за пів години
    - через пів години
    - протягом пів години
    - на пів години
    correct: 0
  - question: Мої батьки приїдуть у гості...
    options:
    - через два дні
    - за два дні
    - в два дні
    - на два дні
    correct: 0
  - question: Робітники збудували цей будинок...
    options:
    - за один рік
    - через один рік
    - в один рік
    - на один рік
    correct: 0
  - question: Літак приземлиться в аеропорту...
    options:
    - через двадцять хвилин
    - за двадцять хвилин
    - в двадцять хвилин
    - на двадцять хвилин
    correct: 0
  - question: Вона прочитала цю довгу статтю...
    options:
    - за п'ять хвилин
    - через п'ять хвилин
    - в п'ять хвилин
    - на п'ять хвилин
    correct: 0
- id: essay-temporal-sequence
  type: essay-response
  prompt: Напишіть 5 речень про свій звичайний робочий день, використовуючи часові
    прийменники «перед», «після», «до» та «під час». Опишіть послідовність ваших дій.
  min_words: 50
- id: error-correction-preps
  type: error-correction
  instruction: Знайдіть і виправте помилку у використанні часових прийменників та
    відмінків.
  items:
  - sentence: Я завжди п'ю каву перед сніданку.
    error: сніданку
    correction: сніданком
    error_type: word
    options:
    - сніданком
    - сніданок
    - сніданку
    explanation: Прийменник «перед» вимагає Орудного відмінка.
  - sentence: Ми будемо гуляти після обідом.
    error: обідом
    correction: обіду
    error_type: word
    options:
    - обіду
    - обід
    - обідом
    explanation: Прийменник «після» вимагає Родового відмінка.
  - sentence: Цей проект треба здати до п'ятницею.
    error: п'ятницею
    correction: п'ятниці
    error_type: word
    options:
    - п'ятниці
    - п'ятницю
    - п'ятницею
    explanation: Прийменник «до» вимагає Родового відмінка.
  - sentence: Не можна розмовляти під час урок.
    error: урок
    correction: уроку
    error_type: word
    options:
    - уроку
    - уроком
    - урок
    explanation: Прийменник «під час» вимагає Родового відмінка.
  - sentence: Перед початку лекції ми перевірили звук.
    error: початку
    correction: початком
    error_type: word
    options:
    - початком
    - початок
    - початку
    explanation: Прийменник «перед» вимагає Орудного відмінка.
  - sentence: Я відпочивав після тренуванням.
    error: тренуванням
    correction: тренування
    error_type: word
    options:
    - тренування
    - тренуванню
    - тренуванням
    explanation: Прийменник «після» вимагає Родового відмінка.
- id: match-temporal-definitions
  type: match-up
  instruction: З'єднайте прийменник з його значенням.
  pairs:
  - left: перед
    right: дія відбувається безпосередньо до іншої події
  - left: після
    right: дія відбувається пізніше за іншу подію
  - left: до
    right: кінцева точка в часі, дедлайн для виконання
  - left: під час
    right: дія відбувається паралельно з іншим процесом
  - left: через
    right: дія відбудеться після певного проміжку часу
  - left: за
    right: час, який потрібен для повного виконання дії
- id: fill-in-duration-types
  type: fill-in
  instruction: 'Вставте правильне слово: «протягом», «на» або Орудний відмінок для
    вираження тривалості.'
  items:
  - sentence: Він уважно читав цю книгу ____ тижня.
    answer: протягом
    options:
    - протягом
    - на
    - через
  - sentence: Мої батьки поїхали в село ____ місяць.
    answer: на
    options:
    - на
    - протягом
    - за
  - sentence: Він ____ сидів у бібліотеці і читав.
    answer: годинами
    options:
    - годинами
    - на години
    - протягом годин
  - sentence: Ми наполегливо працювали ____ усього літа.
    answer: впродовж
    options:
    - впродовж
    - на
    - ціле
  - sentence: Я позичив цей ноутбук лише ____ один день.
    answer: на
    options:
    - на
    - впродовж
    - за
  - sentence: Ми ____ чекали на його відповідь.
    answer: тижнями
    options:
    - тижнями
    - протягом тижнів
    - на тижні
- id: clock-time-match
  type: match-up
  instruction: З'єднайте цифровий час із правильним словесним варіантом.
  pairs:
  - left: '14:15'
    right: чверть по другій
  - left: '17:50'
    right: за десять хвилин шоста
  - left: 05:00
    right: о п'ятій годині
  - left: '11:00'
    right: об одинадцятій
  - left: '18:45'
    right: за чверть сьома
  - left: 08:10
    right: десять хвилин на дев'яту
- id: mixed-prep-quiz
  type: quiz
  instruction: Оберіть правильний варіант для кожного речення.
  items:
  - question: Я завжди п'ю каву...
    options:
    - вранці
    - в ранок
    - на ранок
    - з ранку
    correct: 0
  - question: Ми поїдемо в гори...
    options:
    - наступного місяця
    - в наступний місяць
    - на наступний місяць
    - через наступний місяць
    correct: 0
  - question: Конференція почнеться...
    options:
    - о десятій годині
    - в десять годин
    - на десяту годину
    - за десяту годину
    correct: 0
  - question: Я вивчаю нові слова...
    options:
    - щодня
    - на день
    - в день
    - через день
    correct: 0
  - question: Ми зустрінемося...
    options:
    - по обіді
    - на обід
    - в обіді
    - за обідом
    correct: 0
  - question: Цього року ми були на морі...
    options:
    - влітку
    - у літо
    - на літо
    - через літо
    correct: 0
workbook:
- type: match-up
  instruction: З'єднайте українські фрази з їхнім англійським перекладом.
  pairs:
  - left: через тиждень
    right: in a week
  - left: за тиждень
    right: within a week
  - left: перед уроком
    right: before the lesson
  - left: після уроку
    right: after the lesson
  - left: до п'ятниці
    right: by Friday
  - left: під час перерви
    right: during the break
  - left: протягом року
    right: throughout the year
  - left: на місяць
    right: for a month
- type: fill-in
  instruction: Вставте правильні часові прийменники за змістом.
  items:
  - sentence: Ми маємо закінчити цей звіт ____ завтра.
    answer: до
    options:
    - до
    - після
    - через
  - sentence: Я повернуся додому ____ дві години.
    answer: через
    options:
    - через
    - за
    - на
  - sentence: Він прочитав цю товсту книгу ____ один день.
    answer: за
    options:
    - за
    - через
    - впродовж
  - sentence: Не можна користуватися телефоном ____ вистави.
    answer: під час
    options:
    - під час
    - протягом
    - до
  - sentence: Я завжди мию руки ____ обідом.
    answer: перед
    options:
    - перед
    - після
    - до
  - sentence: Ми поїдемо в Карпати відпочивати ____ два тижні.
    answer: на
    options:
    - на
    - через
    - протягом
- type: true-false
  instruction: Правда чи ні? Оцініть правильність використання прийменників.
  items:
  - statement: Фраза «я зроблю це в десять хвилин» є правильною.
    correct: false
    explanation: 'Це калька. Правильно: «я зроблю це через десять хвилин».'
  - statement: Прийменник «перед» завжди вимагає Орудного відмінка.
    correct: true
    explanation: 'Так, ми кажемо: перед уроком, перед зустріччю.'
  - statement: «За годину» означає, що дія відбудеться після того, як мине година
      очікування.
    correct: false
    explanation: Це значення прийменника «через». «За годину» означає тривалість виконання
      дії.
  - statement: Слово «взимку» не потребує жодних додаткових прийменників.
    correct: true
    explanation: Так, це самостійний прислівник.
  - statement: Ми кажемо «минулого року» у Родовому відмінку без прийменника.
    correct: true
    explanation: Так, для конкретного року з означенням ми використовуємо Родовий
      відмінок.
  - statement: Вираз «на протязі року» є літературно правильним.
    correct: false
    explanation: Це калька. Правильно казати «протягом року» або «впродовж року».
- type: error-correction
  instruction: Знайдіть і виправте помилку в реченні.
  items:
  - sentence: Я вивчив цей вірш на протязі години.
    error: на протязі
    correction: протягом
    error_type: phrase
    options:
    - протягом
    - за
    - через
    explanation: «На протязі» означає на холодному вітрі (in a draft).
  - sentence: Ми зустрінемося в дві години.
    error: в дві години
    correction: о другій годині
    error_type: phrase
    options:
    - о другій годині
    - в дві
    - на дві
    explanation: Для точного часу використовуємо «о» + Місцевий відмінок.
  - sentence: Літак прилітає в десять годин.
    error: в десять годин
    correction: о десятій годині
    error_type: phrase
    options:
    - о десятій годині
    - в десять
    - на десяту
    explanation: Для часу використовуємо «о»/«об».
  - sentence: Я буду готовий в п'ять хвилин.
    error: в п'ять хвилин
    correction: через п'ять хвилин
    error_type: phrase
    options:
    - через п'ять хвилин
    - за п'ять хвилин
    - на п'ять хвилин
    explanation: Для майбутнього моменту використовуємо «через».
  - sentence: Минулого тиждень ми були в кіно.
    error: тиждень
    correction: тижня
    error_type: word
    options:
    - тижня
    - тижню
    - тижнем
    explanation: 'Потрібен Родовий відмінок: минулого тижня.'
  - sentence: Я працював цілий днем.
    error: днем
    correction: день
    error_type: word
    options:
    - день
    - дню
    - дня
    explanation: 'Тут потрібен Знахідний відмінок: працював цілий день.'
