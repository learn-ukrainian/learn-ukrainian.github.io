      correct: true
    - text: Ти говорив йому правду?
      correct: false
    - text: Ти говориш йому правду?
      correct: false
    - text: Ти скажеш йому правду?
      correct: false
  - source: They were talking about politics all evening.
    options:
    - text: Вони говорили про політику весь вечір.
      correct: true
    - text: Вони сказали про політику весь вечір.
      correct: false
    - text: Вони поговорять про політику весь вечір.
      correct: false
    - text: Вони сказали про політику за вечір.
