  pairs:
  - left: брати
    right: взяти
  - left: готувати
    right: приготувати
  - left: говорити
    right: сказати
  - left: робити
    right: зробити
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: вчити
    right: вивчити
  - left: відповідати
    right: відповісти
- type: quiz
  instruction: Визначте вид поданого дієслова
  items:
  - question: Який вид має дієслово «брати»?
    options:
    - Недоконаний вид
    - Доконаний вид
    - Обидва види
    - Жоден з них
    correct: 0
  - question: Який вид має дієслово «зробити»?
    options:
    - Доконаний вид
    - Недоконаний вид
    - Обидва види
    - Жоден з них
    correct: 0
  - question: Який вид має дієслово «говорив»?
    options:
    - Недоконаний вид
    - Доконаний вид
    - Обидва види
    - Жоден з них
    correct: 0
  - question: Який вид має дієслово «написав»?
    options:
    - Доконаний вид
    - Недоконаний вид
    - Обидва види
    - Жоден з них
    correct: 0
  - question: Який вид має дієслово «готувала»?
    options:
    - Недоконаний вид
    - Доконаний вид
    - Обидва види
    - Жоден з них
    correct: 0
  - question: Який вид має дієслово «відповісти»?
    options:
    - Доконаний вид
    - Недоконаний вид
    - Обидва види
    - Жоден з них
    correct: 0
- type: true-false
  instruction: Оцініть твердження про використання видів дієслова
  items:
  - statement: Слово «щодня» — це надійний маркер доконаного виду.
    correct: false
    explanation: «Щодня» вказує на регулярність (повторюваність), тому вимагає недоконаного
      виду.
  - statement: Якщо минула дія повністю завершена і є конкретний результат, ми завжди
      використовуємо доконаний вид.
    correct: true
    explanation: 'Це основне правило: доконаний вид фокусується на результаті або
      фіналі дії.'
  - statement: Фраза «одного разу» — це типовий маркер тривалості.
    correct: false
    explanation: «Одного разу» маркує унікальну, однократну подію (доконаний вид),
      а не її тривалість.
  - statement: Англійський час Past Simple завжди ідеально перекладається тільки доконаним
      видом.
    correct: false
    explanation: Past Simple може означати як процес (недоконаний вид), так і результат
      (доконаний вид) залежно від контексту.
  - statement: Форма дієслова «читав» підкреслює сам тривалий процес заняття, а не
      його успішний фінал.
    correct: true
    explanation: Це недоконаний вид, який не дає нам інформації про те, чи книга дочитана
      до кінця.
  - statement: Ми обов'язково використовуємо недоконаний вид для регулярних звичок
      або фонових дій у минулому.
    correct: true
    explanation: Недоконаний вид ідеально створює фонові декорації та описує багаторазову
      рутину.
- type: translate
  instruction: Оберіть правильний український переклад, враховуючи вид дієслова
  items:
  - source: I read a book yesterday (and finished it).
