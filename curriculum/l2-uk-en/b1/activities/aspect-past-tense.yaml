version: '1.0'
module: aspect-past-tense
level: b1
inline:
- id: quiz-aspect-intuition
  type: quiz
  instruction: Оберіть правильну форму дієслова, орієнтуючись на контекст (доконаний
    чи недоконаний вид)
  items:
  - question: Вчора ввечері я дві години _____ цікаву книжку.
    options:
    - читав
    - прочитав
    - читатиме
    - прочитає
    correct: 0
  - question: Вчора я нарешті _____ цю складну книжку до кінця.
    options:
    - прочитав
    - читав
    - читатиме
    - прочитає
    correct: 0
  - question: Минулого тижня ми щодня _____ нові слова.
    options:
    - вчили
    - вивчили
    - вчитимуть
    - вивчать
    correct: 0
  - question: Я _____ ці слова і тепер їх знаю.
    options:
    - вивчив
    - вчив
    - вивчу
    - вчитиму
    correct: 0
  - question: Тарас завжди _____ каву вранці, коли жив у Львові.
    options:
    - купував
    - купив
    - купуватиме
    - купить
    correct: 0
  - question: Сьогодні вранці Тарас _____ каву для всіх колег.
    options:
    - купив
    - купував
    - купує
    - купуватиме
    correct: 0
  - question: Оксана довго _____ звіт, але так і не закінчила його.
    options:
    - писала
    - написала
    - писатиме
    - напише
    correct: 0
  - question: Оксана швидко _____ звіт і відправила його директору.
    options:
    - написала
    - писала
    - напише
    - писатиме
    correct: 0
  - question: Коли я йшов додому, я раптом _____ старого друга.
    options:
    - зустрів
    - зустрічав
    - зустріне
    - зустрічатиме
    correct: 0
  - question: Ми часто _____ в цій кав'ярні минулого року.
    options:
    - зустрічалися
    - зустрілися
    - зустрічатимуться
    - зустрінуться
    correct: 0
- id: fill-in-aspect-pairs
  type: fill-in
  instruction: Вставте правильну форму дієслова (доконаний чи недоконаний вид)
  items:
  - sentence: Вчора мама цілий день ____ смачний обід.
    answer: готувала
    options:
    - готувала
    - приготувала
    - готуватиме
    - приготує
  - sentence: Вона нарешті ____ цей обід, можемо сідати їсти!
    answer: приготувала
    options:
    - готувала
    - приготувала
    - готуватиме
    - приготує
  - sentence: Минулого року я щодня ____ нові слова.
    answer: вчив
    options:
    - вчив
    - вивчив
    - вчитиме
    - вивчить
  - sentence: Вчора я за одну годину ____ всі правила.
    answer: вивчив
    options:
    - вчив
    - вивчив
    - вчитиме
    - вивчить
  - sentence: Він завжди ____ мій ноутбук без дозволу.
    answer: брав
    options:
    - брав
    - взяв
    - братиме
    - візьме
  - sentence: Хто ____ мої ключі зі столу?
    answer: взяв
    options:
    - брав
    - взяв
    - братиме
    - візьме
  - sentence: Вони дві години ____ про політику.
    answer: говорили
    options:
    - говорили
    - сказали
    - говоритимуть
    - скажуть
  - sentence: Він ____ одне слово і пішов додому.
    answer: сказав
    options:
    - говорив
    - сказав
    - говоритиме
    - скаже
- id: match-up-time-markers
  type: match-up
  instruction: З'єднайте часові маркери з відповідним видом дієслова та його значенням
  pairs:
  - left: щодня
    right: недоконаний вид (регулярна рутина)
  - left: довго
    right: недоконаний вид (тривалий процес)
  - left: завжди
    right: недоконаний вид (постійна звичка)
  - left: часто
    right: недоконаний вид (дія багато разів)
  - left: одного разу
    right: доконаний вид (унікальний випадок)
  - left: нарешті
    right: доконаний вид (успішне завершення)
  - left: раптом
    right: доконаний вид (несподівана подія)
  - left: за одну годину
    right: доконаний вид (чіткий ліміт часу до результату)
- id: group-sort-aspect-usage
  type: group-sort
  instruction: Розподіліть речення за видом дієслова та його значенням
  groups:
  - label: Недоконаний вид (процес або звичка)
    items:
    - У дитинстві я часто допомагав мамі по господарству.
    - Вчора ми три години говорили про політику.
    - Вона завжди купувала каву на Площі Ринок.
    - Я весь день писала звіт, але не закінчила його.
    - Щоліта ми їздили відпочивати в гори.
  - label: Доконаний вид (результат або однократна подія)
    items:
    - Одного разу ми поїхали на море.
    - Він зателефонував мені і сказав, що зустріч скасовано.
    - Я нарешті вивчив усі нові слова!
    - Вона швидко приготувала обід для гостей.
    - На вулиці раптом почалася страшна буря.
workbook:
- type: translate
  instruction: Оберіть правильний переклад, звертаючи увагу на контекст та вид дієслова
  items:
  - source: Yesterday I read a book for three hours.
    options:
    - text: Вчора я читав книгу три години.
      correct: true
    - text: Вчора я прочитав книгу три години.
      correct: false
  - source: She always bought coffee here.
    options:
    - text: Вона завжди купувала каву тут.
      correct: true
    - text: Вона завжди купила каву тут.
      correct: false
  - source: He finally learned all the words!
    options:
    - text: Він нарешті вивчив усі слова!
      correct: true
    - text: Він нарешті вчив усі слова!
      correct: false
  - source: Suddenly, a terrible storm started.
    options:
    - text: Раптом почалася страшна буря.
      correct: true
    - text: Раптом починалася страшна буря.
      correct: false
  - source: Who took my keys from the table?
    options:
    - text: Хто взяв мої ключі зі столу?
      correct: true
    - text: Хто брав мої ключі зі столу?
      correct: false
  - source: Last week we did renovations, so there was dust everywhere.
    options:
    - text: Минулого тижня ми робили ремонт, тому всюди був пил.
      correct: true
    - text: Минулого тижня ми зробили ремонт, тому всюди був пил.
      correct: false
- type: essay-response
  prompt: Напишіть коротку розповідь (мінімум 50 слів) про ваш минулий тиждень. Використайте
    принаймні три дієслова недоконаного виду для опису звичок чи процесів та три дієслова
    доконаного виду для конкретних подій чи результатів.
  min_words: 50
  model_answer: Минулого тижня я щоранку пив каву і читав новини. Це була моя рутина.
    Але в середу я не пив каву. Я прокинувся, швидко одягнувся і поїхав на важливу
    зустріч. Поки я їхав у метро, я перевіряв документи. Раптом мені зателефонував
    директор і сказав, що зустріч скасовано.
  evaluation_criteria:
  - Учень використовує дієслова недоконаного виду для рутини чи тривалих процесів
    (наприклад, пив, читав, їхав).
  - Учень використовує дієслова доконаного виду для раптових подій чи результатів
    (наприклад, прокинувся, зателефонував).
