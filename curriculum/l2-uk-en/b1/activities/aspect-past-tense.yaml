version: '1.0'
module: aspect-past-tense
level: b1
inline:
- id: quiz-aspect-intuition
  type: quiz
  instruction: Оберіть правильний вид дієслова для кожної ситуації
  items:
  - question: Вчора я довго _____ цю складну книжку, але не закінчив.
    options:
    - читав
    - прочитав
    - читаю
    - читатиму
    correct: 0
  - question: Нарешті він _____ своє важке домашнє завдання!
    options:
    - зробив
    - робив
    - робить
    - робитиме
    correct: 0
  - question: Минулого тижня я _____ три листи і швидко їх відправив.
    options:
    - написав
    - писав
    - пишу
    - напишу
    correct: 0
  - question: Ми _____ про фінанси цілий вечір без жодного фіналу.
    options:
    - говорили
    - сказали
    - кажемо
    - скажемо
    correct: 0
  - question: Щоліта ми _____ до нашої бабусі в маленьке село.
    options:
    - їдемо
    - поїхали
    - їздили
    - поїдемо
    correct: 2
  - question: Вона довго _____ вечерю, слухаючи улюблену музику.
    options:
    - приготувала
    - готує
    - приготує
    - готувала
    correct: 3
  - question: За годину студент ідеально _____ на всі питання.
    options:
    - відповідав
    - відповів
    - відповідає
    - відповість
    correct: 1
  - question: Я вже _____ цю книгу, тому готовий обговорювати сюжет.
    options:
    - читав
    - читаю
    - прочитав
    - читатиму
    correct: 2
  - question: Кожного ранку він _____ гарячу і дуже міцну каву.
    options:
    - пив
    - п'є
    - випив
    - вип'є
    correct: 0
  - question: Вона _____ перше вільне таксі, яке несподівано побачила.
    options:
    - взяла
    - бере
    - брала
    - візьме
    correct: 0
- id: fill-in-aspect-pairs
  type: fill-in
  instruction: Оберіть правильну форму дієслова минулого часу (доконаний чи недоконаний
    вид)
  items:
  - sentence: Вчора я весь вечір ____ нову книгу.
    answer: читав
    options:
    - читав
    - прочитав
    - читатиму
  - sentence: Він нарешті ____ цей важливий лист.
    answer: написав
    options:
    - написав
    - писав
    - писатиме
  - sentence: Студент ____ своє домашнє завдання за годину.
    answer: зробив
    options:
    - зробив
    - робив
    - робитиме
  - sentence: Ми ____ про політику дуже довго, але нічого не вирішили.
    answer: говорили
    options:
    - говорили
    - сказали
    - скажуть
  - sentence: Щоранку я ____ з собою велику парасольку.
    answer: брав
    options:
    - брав
    - взяв
    - візьме
  - sentence: За п'ять років він ідеально ____ українську мову.
    answer: вивчив
    options:
    - вивчив
    - вчив
    - вчитиме
  - sentence: Вона з радістю ____ смачну вечерю для нас цілий вечір.
    answer: готувала
    options:
    - готувала
    - приготувала
    - готуватиме
  - sentence: Студент ідеально ____ на всі складні питання екзаменатора.
    answer: відповів
    options:
    - відповів
    - відповідав
    - відповість
- id: match-up-time-markers
  type: match-up
  instruction: З'єднайте часовий маркер із правильним поясненням дії
  pairs:
  - left: щодня
    right: недоконаний вид (рутина)
  - left: одного разу
    right: доконаний вид (унікальна подія)
  - left: часто
    right: недоконаний вид (повторення)
  - left: нарешті
    right: доконаний вид (фінальний результат)
  - left: довго
    right: недоконаний вид (процес)
  - left: раптом
    right: доконаний вид (несподівана дія)
  - left: завжди
    right: недоконаний вид (постійна звичка)
  - left: за годину
    right: доконаний вид (швидке досягнення)
- id: group-sort-aspect-usage
  type: group-sort
  instruction: Розподіліть речення за категоріями виду дієслова
  groups:
  - label: Доконаний вид (результат / однократність)
    items:
    - Він написав довгий лист.
    - Вона нарешті прочитала цю книгу.
    - Я швидко зробив завдання за годину.
    - Раптом впало старе дерево.
    - Він сміливо сказав йому правду.
  - label: Недоконаний вид (процес / повторюваність)
    items:
    - Я читав новий роман цілий вечір.
    - Ми часто говорили про політику.
    - Він дуже довго робив фінансовий звіт.
    - Щоліта ми їздили відпочивати на море.
    - Вона радісно готувала смачну вечерю.
- id: error-correction-aspect
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку у виборі виду
  items:
  - sentence: Вчора я довго прочитав цю нову книгу.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - читаю
    - читатиму
    explanation: Маркер 'довго' вказує на процес, тому потрібен недоконаний вид (читав).
  - sentence: Щодня він зробив дуже корисні фізичні вправи.
    error: зробив
    correction: робив
    error_type: word
    options:
    - робив
    - робить
    - робитиме
    explanation: Маркер 'щодня' вказує на регулярну звичку, тому потрібен недоконаний
      вид (робив).
  - sentence: Я написав цей довгий звіт дві години, але так і не закінчив.
    error: написав
    correction: писав
    error_type: word
    options:
    - писав
    - пишу
    - писатиму
    explanation: Дія не завершена ('не закінчив') і тривала в часі, тому використовуємо
      недоконаний вид (писав).
  - sentence: У дитинстві вона часто взяла мій словник без дозволу.
    error: взяла
    correction: брала
    error_type: word
    options:
    - брала
    - бере
    - візьме
    explanation: Маркер 'часто' вказує на багаторазову дію, потрібен недоконаний вид
      (брала).
  - sentence: Одного разу я спокійно йшов вулицею і раптом бачив старого друга.
    error: бачив
    correction: побачив
    error_type: word
    options:
    - побачив
    - бачу
    - побачу
    explanation: Маркер 'раптом' та несподіваність ситуації вимагають доконаного виду
      (побачив).
  - sentence: Студент нарешті вчив усі ці складні граматичні правила.
    error: вчив
    correction: вивчив
    error_type: word
    options:
    - вивчив
    - вчить
    - вчитиме
    explanation: Маркер 'нарешті' вказує на успішний результат, потрібен доконаний
      вид (вивчив).
- id: open-writing-my-week
  type: essay-response
  prompt: Напишіть коротку розповідь (50-80 слів) про свій минулий тиждень. Використовуйте
    дієслова недоконаного виду для опису звичок чи процесів, і дієслова доконаного
    виду для конкретних результатів та несподіваних подій. Обов'язково підкресліть
    маркери часу (щодня, завжди, раптом, нарешті тощо).
  min_words: 50
  model_answer: Минулого тижня я працював дуже багато. Щодня я прокидався о сьомій
    годині ранку і пив міцну каву. Ввечері я зазвичай читав новини або дивився серіал.
    Це була моя рутина. Але в четвер все раптом змінилося. Я нарешті закінчив великий
    проєкт на роботі! Керівник подивився на результат і одразу сказав, що я молодець.
    Коли я спокійно йшов додому, мені несподівано зателефонував старий друг, і ми
    чудово провели вечір у кафе.
  evaluation_criteria:
  - Студент використовує недоконаний вид для рутини (наприклад, прокидався, пив).
  - Студент використовує доконаний вид для результатів (наприклад, закінчив, сказав).
  - Студент успішно поєднав фоновий процес із раптовою подією.
