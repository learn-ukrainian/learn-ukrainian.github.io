version: '1.0'
module: aspect-past-tense
level: b1
inline:
- id: quiz-aspect-intuition
  type: quiz
  instruction: Оберіть найбільш природний варіант для кожної ситуації
  items:
  - question: Вчора я _______ цікаву книжку, але ще не закінчив.
    options:
    - читав
    - прочитав
    - читаю
    - читатиму
    correct: 0
  - question: Минулого тижня він _______ три листи і відправив їх.
    options:
    - писав
    - написав
    - пише
    - писатиме
    correct: 1
  - question: Вона цілий день _______ звіт, тому дуже втомилася.
    options:
    - зробила
    - робила
    - робить
    - зробить
    correct: 1
  - question: Я нарешті _______ ту складну проблему!
    options:
    - вирішував
    - вирішую
    - вирішу
    - вирішив
    correct: 3
  - question: Щовечора ми _______ фільми разом.
    options:
    - подивилися
    - дивилися
    - дивимося
    - подивимось
    correct: 1
  - question: Одного разу я _______ цей фільм у кінотеатрі.
    options:
    - дивився
    - дивлюся
    - подивився
    - подивлюсь
    correct: 2
- id: fill-in-aspect-pairs
  type: fill-in
  instruction: Вставте правильну форму минулого часу (доконаний чи недоконаний вид)
  items:
  - sentence: Цілий день я ____ обід, тому так втомилася.
    answer: готувала
    options:
    - готувала
    - приготувала
    - готує
    - приготує
  - sentence: Сьогодні вранці я швидко ____ смачний сніданок.
    answer: приготував
    options:
    - приготував
    - готував
    - готує
    - готуватиме
  - sentence: Вона щодня ____ нові слова, щоб краще говорити.
    answer: вчила
    options:
    - вчила
    - вивчила
    - вчить
    - вивчить
  - sentence: Він нарешті ____ всі ці складні граматичні правила!
    answer: вивчив
    options:
    - вивчив
    - вчив
    - вчить
    - вивчить
  - sentence: Раптом мій телефон задзвонив, і я ____ слухавку.
    answer: взяв
    options:
    - взяв
    - брав
    - бере
    - візьме
  - sentence: Раніше я завжди ____ парасольку, коли йшов дощ.
    answer: брав
    options:
    - брав
    - взяв
    - бере
    - візьме
  - sentence: Ми ____ про політику цілі дві години.
    answer: говорили
    options:
    - говорили
    - сказали
    - говорять
    - скажуть
  - sentence: Директор зайшов і ____ нам дуже важливу новину.
    answer: сказав
    options:
    - сказав
    - говорив
    - каже
    - скаже
- id: match-up-time-markers
  type: match-up
  instruction: З'єднайте часовий маркер з видом дієслова, який він зазвичай вимагає
  pairs:
  - left: щодня
    right: недоконаний (повторюваність)
  - left: одного разу
    right: доконаний (однократність)
  - left: довго
    right: недоконаний (процес)
  - left: нарешті
    right: доконаний (результат)
  - left: часто
    right: недоконаний (повторюваність)
  - left: раптом
    right: доконаний (однократність)
  - left: цілий день
    right: недоконаний (тривалість)
  - left: за годину
    right: доконаний (завершеність)
- id: group-sort-aspect-usage
  type: group-sort
  instruction: Розподіліть маркери часу та типові ситуації за категоріями виду
  groups:
  - label: Недоконаний вид (процес, повторюваність)
    items:
    - щодня
    - завжди
    - довго
    - цілий день
    - часто
    - звична рутина
  - label: Доконаний вид (результат, однократність)
    items:
    - одного разу
    - раптом
    - нарешті
    - за годину
    - минулого вівторка
    - швидка зміна ситуації
workbook:
- id: wb-group-sort-verbs
  type: group-sort
  instruction: Розподіліть дієслова за видом (доконаний чи недоконаний)
  groups:
  - label: Недоконаний вид (процес)
    items:
    - читати
    - робити
    - говорити
    - вчити
    - готувати
    - відповідати
    - писати
    - брати
  - label: Доконаний вид (результат)
    items:
    - прочитати
    - зробити
    - сказати
    - вивчити
    - приготувати
    - відповісти
    - написати
    - взяти
- id: wb-match-up-pairs
  type: match-up
  instruction: З'єднайте недоконане дієслово з його доконаною парою
  pairs:
  - left: читати
    right: прочитати
  - left: робити
    right: зробити
  - left: говорити
    right: сказати
  - left: вчити
    right: вивчити
  - left: готувати
    right: приготувати
  - left: відповідати
    right: відповісти
  - left: писати
    right: написати
  - left: брати
    right: взяти
- id: wb-fill-in-aspect-context
  type: fill-in
  instruction: Оберіть правильний вид дієслова для контексту
  items:
  - sentence: Він довго ____ домашнє завдання, але так і не закінчив.
    answer: робив
    options:
    - робив
    - зробив
    - робить
    - зробить
  - sentence: Вчора ввечері я нарешті ____ цей звіт!
    answer: написав
    options:
    - написав
    - писав
    - пишу
    - напишу
  - sentence: Ми щодня ____ на ці складні питання на уроці.
    answer: відповідали
    options:
    - відповідали
    - відповіли
    - відповідають
    - відповідять
  - sentence: Сьогодні на іспиті він успішно ____ на всі питання.
    answer: відповів
    options:
    - відповів
    - відповідав
    - відповідає
    - відповідатиме
  - sentence: Одного разу ми гуляли в парку, і раптом ____ сильний дощ.
    answer: почався
    options:
    - почався
    - починався
    - почнеться
    - починається
  - sentence: Вона завжди ____ парасольку, коли йшла на роботу.
    answer: брала
    options:
    - брала
    - взяла
    - бере
    - візьме
- id: wb-group-sort-sentences
  type: group-sort
  instruction: 'Розподіліть речення за тим, що вони описують: тривалий процес чи конкретний
    результат'
  groups:
  - label: Процес або рутина (Недоконаний вид)
    items:
    - Я читав цю книгу вчора.
    - Ми довго говорили про політику.
    - Він робив свій новий звіт цілий день.
    - Вона часто телефонувала своїй мамі.
    - Щоліта ми їздили на тепле море.
    - Він постійно брав мої речі без дозволу.
  - label: Результат або однократність (Доконаний вид)
    items:
    - Я успішно прочитав цю книгу до кінця.
    - Він сказав нам дуже важливу новину.
    - Тарас нарешті зробив свій фінансовий звіт.
    - Вчора вона зателефонувала дуже пізно.
    - Одного разу ми несподівано поїхали в гори.
    - Він швидко взяв таксі і поїхав на вокзал.
- type: essay-response
  instruction: Напишіть про свій минулий тиждень
  prompt: Напишіть невелику розповідь про ваш минулий тиждень. Опишіть три регулярні,
    звичні дії (використайте недоконаний вид) та три конкретні, завершені події (використайте
    доконаний вид). Наприкінці додайте одне речення, де фоновий процес переривається
    раптовою дією («Коли я..., раптом...»).
  min_words: 50
  model_answer: Минулого тижня я щоранку прокидався о сьомій годині, пив міцну каву
    і йшов на роботу. Після роботи я зазвичай читав новини та відпочивав. Але в середу
    я нарешті написав складний звіт. У четвер мій друг несподівано запросив мене в
    кіно, і ми подивилися цікавий фільм. У п'ятницю я купив квитки на концерт. Коли
    я спокійно дивився телевізор у неділю, мені раптом зателефонував керівник.
  evaluation_criteria:
  - Використано щонайменше 3 дієслова недоконаного виду для рутини.
  - Використано щонайменше 3 дієслова доконаного виду для конкретних подій.
  - Є одне речення з перерваною дією (процес + раптовий результат).
  - Правильно вжито маркери часу (щодня, зазвичай, раптом, нарешті тощо).
  rubric:
  - criteria: Використання недоконаного виду
    description: Студент успішно описує фонові та повторювані дії за допомогою правильних
      форм минулого часу недоконаного виду.
  - criteria: Використання доконаного виду
    description: Студент чітко позначає результативні та однократні дії за допомогою
      правильних форм минулого часу доконаного виду.
  - criteria: Контраст видів (перервана дія)
    description: Студент вміє поєднувати тривалий процес (НВ) з раптовою подією (ДВ)
      в одному реченні.
