    - words:
        - 'З'
        - 'точки'
        - 'зору'
        - 'економіки,'
        - 'це'
        - 'вигідно'
      answer: 'З точки зору економіки, це вигідно'
    - words:
        - 'Громадська'
        - 'думка'
        - 'розділилася'
        - 'майже'
        - 'навпіл'
      answer: 'Громадська думка розділилася майже навпіл'
    - words:
        - 'Я'
        - 'твердо'
        - 'переконаний'
        - 'у'
        - 'своїй'
        - 'правоті'
      answer: 'Я твердо переконаний у своїй правоті'
    - words:
        - 'Очевидно,'
        - 'ця'
        - 'проблема'
        - 'потребує'
        - 'системного'
        - 'підходу'
      answer: 'Очевидно, ця проблема потребує системного підходу'

- type: quiz
  title: 'Формальний чи неформальний стиль?'
  instruction: 'Перевірте своє розуміння різних мовних регістрів.'
  items:
    - question: 'Яке з цих висловлювань найкраще підходить для неформальної розмови з близькими друзями?'
      options:
        - text: 'Мені здається, це повна дурниця.'
          correct: true
        - text: 'Можна стверджувати, що це неефективно.'
          correct: false
        - text: 'Я маю зазначити певні ризики.'
          correct: false
        - text: 'Очевидно, проблема потребує глибокого аналізу.'
          correct: false
      explanation: 'У неформальній розмові використовуються прості дієслова та емоційні вислови.'
    - question: 'Яку вступну фразу найбільш доречно використати на офіційній робочій нараді з керівництвом?'
      options:
        - text: 'З огляду на це, я пропоную...'
          correct: true
        - text: 'Я думаю, це абсолютно погана ідея.'
          correct: false
        - text: 'Як на мене, ми точно не встигнемо.'
          correct: false
        - text: 'Мабуть, це все одно не спрацює.'
          correct: false
      explanation: 'Фраза "З огляду на це" належить до високого ділового та формального стилю.'
    - question: 'Яке з цих дієслів є найбільш характерним для сухих юридичних або наукових текстів?'
      options:
        - text: 'стверджувати'
          correct: true
        - text: 'думати'
          correct: false
        - text: 'гадати'
          correct: false
        - text: 'здаватися'
          correct: false
      explanation: 'Дієслово "стверджувати" має відтінок офіційної констатації перевіреного факту.'
    - question: 'Як можна найввічливіше та найделікатніше не погодитися з ідеєю вашого колеги?'
      options:
        - text: 'Я розумію вашу позицію, але...'
          correct: true
        - text: 'Ви абсолютно не праві у цьому.'
          correct: false
        - text: 'Це дурниця, я з вами не згоден.'
          correct: false
        - text: 'Ні, ми будемо робити це зовсім інакше.'
          correct: false
      explanation: 'Формула "часткова згода + аргумент з але" є найкращою стратегією ввічливості.'
    - question: 'Яке саме вставне слово допомагає перетворити жорстку критику на м''яку пропозицію?'
      options:
        - text: 'можливо'
          correct: true
        - text: 'безсумнівно'
          correct: false
        - text: 'очевидно'
          correct: false
        - text: 'точно'
