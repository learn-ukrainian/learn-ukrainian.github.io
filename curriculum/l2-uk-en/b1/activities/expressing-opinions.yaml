- type: match-up
  title: 'Колокації: знайдіть правильну пару'
  instruction: 'З''єднайте слова так, щоб утворити правильні фрази для дискусії.'
  pairs:
    - left: 'поділяти'
      right: 'позицію'
    - left: 'висловити'
      right: 'ідею'
    - left: 'з точки'
      right: 'зору'
    - left: 'на мій'
      right: 'погляд'
    - left: 'обмінятися'
      right: 'думками'
    - left: 'широкий'
      right: 'світогляд'
    - left: 'громадська'
      right: 'думка'
    - left: 'твердо'
      right: 'переконаний'

- type: quiz
  title: 'Вважати чи рахувати?'
  instruction: 'Оберіть правильний варіант відповіді для кожного запитання.'
  items:
    - question: 'Яке дієслово слід обов''язково використати у цьому реченні: Я ... що це чудова ідея?'
      options:
        - text: 'вважаю'
          correct: true
        - text: 'рахую'
          correct: false
        - text: 'малюю'
          correct: false
        - text: 'пишу'
          correct: false
      explanation: 'Для вираження думки використовується слово "вважати".'
    - question: 'Що саме робить касир у супермаркеті наприкінці свого робочого дня?'
      options:
        - text: 'рахує гроші'
          correct: true
        - text: 'вважає гроші'
          correct: false
        - text: 'гадає гроші'
          correct: false
        - text: 'стверджує гроші'
          correct: false
        - text: 'пише гроші'
          correct: false
      explanation: 'Касир виконує математичну дію — обчислення, тому він "рахує".'
    - question: 'Яке з цих поданих слів означає виключно процес математичного обчислення чисел?'
      options:
        - text: 'рахувати'
          correct: true
        - text: 'вважати'
          correct: false
        - text: 'гадати'
          correct: false
        - text: 'здаватися'
          correct: false
      explanation: 'Дієслово "рахувати" стосується лише математики та цифр.'
    - question: 'Як правильно перекласти англійську фразу "I consider him a friend" українською мовою?'
      options:
        - text: 'Я вважаю його другом'
          correct: true
        - text: 'Я рахую його другом'
          correct: false
        - text: 'Я маю його другом'
          correct: false
        - text: 'Я роблю його другом'
          correct: false
      explanation: 'Дієслово "consider" у значенні думки завжди перекладається як "вважати".'
    - question: 'До якої саме частини мови належить дуже поширене слово "безсумнівно"?'
      options:
        - text: 'прислівник'
          correct: true
        - text: 'іменник'
          correct: false
        - text: 'дієслово'
          correct: false
        - text: 'прикметник'
          correct: false
      explanation: 'Слово "безсумнівно" відповідає на питання "як?" і є прислівником.'
    - question: 'Яке з цих слів найкраще передає значення англійського слова "probably"?'
      options:
        - text: 'мабуть'
          correct: true
        - text: 'можливо'
          correct: false
        - text: 'безсумнівно'
          correct: false
        - text: 'очевидно'
          correct: false
      explanation: 'Слово "мабуть" ідеально підходить для перекладу "probably".'
    - question: 'Якщо ви маєте дуже великі сумніви щодо події, яке слово краще використати?'
      options:
        - text: 'навряд чи'
          correct: true
        - text: 'цілком'
          correct: false
        - text: 'глибоко'
          correct: false
        - text: 'твердо'
          correct: false
      explanation: 'Конструкція "навряд чи" використовується для вираження сильного сумніву.'
    - question: 'Яке вставне слово найчастіше використовується для ввічливої та м''якої незгоди?'
      options:
        - text: 'можливо'
          correct: true
        - text: 'звичайно'
          correct: false
        - text: 'точно'
          correct: false
        - text: 'безперечно'
          correct: false
      explanation: 'Слово "можливо" є головним інструментом пом''якшення або хеджування.'

- type: fill-in
  title: 'Оберіть правильний маркер впевненості'
  instruction: 'Заповніть пропуски відповідними словами, які вказують на рівень впевненості.'
  items:
    - sentence: 'Він _____ не прийде на зустріч, бо дуже сильно захворів.'
      answer: 'мабуть'
      options:
        - 'мабуть'
        - 'безсумнівно'
        - 'цілком'
        - 'твердо'
      explanation: 'Це припущення, засноване на здогадці.'
    - sentence: 'Я _____ впевнений, що ми обов''язково виграємо цей складний матч.'
      answer: 'цілком'
      options:
        - 'цілком'
        - 'мабуть'
        - 'навряд чи'
        - 'можливо'
      explanation: 'Для підсилення впевненості використовуємо "цілком".'
    - sentence: 'Цей історичний факт, _____, змінив хід усієї європейської історії.'
      answer: 'безсумнівно'
      options:
        - 'безсумнівно'
        - 'здається'
        - 'навряд чи'
        - 'можливо'
      explanation: 'Це категоріальне ствердження високої впевненості.'
    - sentence: '_____ ми рухаємося у зовсім неправильному напрямку розвитку.'
      answer: 'Здається'
      options:
        - 'Здається'
        - 'Твердо'
        - 'Цілком'
        - 'Переконаний'
      explanation: 'Дієслово "здається" передає суб''єктивне особисте враження.'
    - sentence: '_____, нам варто ще раз уважно переглянути цей бюджетний план.'
      answer: 'Можливо'
      options:
        - 'Можливо'
        - 'Безсумнівно'
        - 'Очевидно'
        - 'Переконаний'
      explanation: 'Слово "можливо" пом''якшує критику і перетворює її на пропозицію.'
    - sentence: 'Я глибоко _____, що якісна освіта має бути доступною абсолютно для всіх.'
      answer: 'переконаний'
      options:
        - 'переконаний'
        - 'мабуть'
        - 'можливо'
        - 'навряд чи'
      explanation: 'Слово "переконаний" поєднується з підсилювачем "глибоко".'
    - sentence: 'Вони _____ погодяться на ці абсолютно невигідні умови контракту.'
      answer: 'навряд чи'
      options:
        - 'навряд чи'
        - 'цілком'
        - 'твердо'
        - 'безсумнівно'
      explanation: 'Тут виражається сильний сумнів.'
    - sentence: 'Я _____, що цей новий архітектурний проект буде дуже успішним.'
      answer: 'гадаю'
      options:
        - 'гадаю'
        - 'рахую'
        - 'цілком'
        - 'можливо'
      explanation: 'Дієслово "гадати" є синонімом до "вважати" або "думати".'

- type: unjumble
  title: 'Складіть речення з маркерами думок'
  instruction: 'Розташуйте слова у правильному порядку, щоб утворити логічне речення.'
  items:
    - words:
        - 'На'
        - 'мою'
        - 'думку,'
        - 'це'
        - 'геніально'
      answer: 'На мою думку, це геніально'
    - words:
        - 'Я'
        - 'вважаю,'
        - 'що'
        - 'ви'
        - 'маєте'
        - 'рацію'
      answer: 'Я вважаю, що ви маєте рацію'
    - words:
        - 'Мені'
        - 'здається,'
        - 'що'
        - 'ми'
        - 'запізнюємося'
      answer: 'Мені здається, що ми запізнюємося'
    - words:
        - 'Він'
        - 'навряд'
        - 'чи'
        - 'знає'
        - 'цю'
        - 'таємницю'
      answer: 'Він навряд чи знає цю таємницю'
    - words:
        - 'Можливо,'
        - 'нам'
        - 'варто'
        - 'змінити'
        - 'стратегію'
      answer: 'Можливо, нам варто змінити стратегію'
    - words:
        - 'Я'
        - 'повністю'
        - 'поділяю'
        - 'вашу'
        - 'думку'
      answer: 'Я повністю поділяю вашу думку'

- type: error-correction
  title: 'Виправте поширені помилки'
  instruction: 'Знайдіть граматичну, стилістичну або пунктуаційну помилку і виберіть правильний варіант.'
  items:
    - sentence: 'Я рахую, що нам потрібно значно більше часу.'
      error: 'рахую'
      answer: 'вважаю'
      error_type: 'word'
      options:
        - 'вважаю'
        - 'гадаю'
        - 'думаю'
        - 'розумію'
      explanation: 'Дієслово "рахувати" означає обчислення. Для вираження думки використовуємо "вважати".'
    - sentence: 'На мою думку цей новий фільм дуже цікавий.'
      error: 'думку цей'
      answer: 'думку, цей'
      error_type: 'phrase'
      options:
        - 'думку, цей'
        - 'думку. Цей'
        - 'думку: цей'
        - 'думку - цей'
      explanation: 'Вставна конструкція "на мою думку" на початку речення завжди виділяється комою.'
    - sentence: 'Очевидно він просто забув про нашу важливу зустріч.'
      error: 'Очевидно він'
      answer: 'Очевидно, він'
      error_type: 'phrase'
      options:
        - 'Очевидно, він'
        - 'Очевидно: він'
        - 'Очевидно - він'
        - 'Очевидно. Він'
      explanation: 'Вставне слово "очевидно" повинно відокремлюватися комою.'
    - sentence: 'Ми завжди приймаємо участь у таких жвавих дискусіях.'
      error: 'приймаємо'
      answer: 'беремо'
      error_type: 'word'
      options:
        - 'беремо'
        - 'маємо'
        - 'робимо'
        - 'даємо'
      explanation: 'Правильний український сталий вислів — "брати участь", а не "приймати".'
    - sentence: 'Вона являється найкращим експертом у цій складній галузі.'
      error: 'являється'
      answer: 'є'
      error_type: 'word'
      options:
        - 'є'
        - 'буде'
        - 'стала'
        - 'була'
      explanation: 'Слово "являється" у значенні дієслова-зв''язки "є" — це поширена калька.'
    - sentence: 'Це самий кращий аргумент у нашій сьогоднішній суперечці.'
      error: 'самий кращий'
      answer: 'найкращий'
      error_type: 'phrase'
      options:
        - 'найкращий'
        - 'більш кращий'
        - 'дуже кращий'
        - 'кращий'
      explanation: 'В українській мові найвищий ступінь порівняння утворюється органічно за допомогою префікса "най-".'

- type: mark-the-words
  title: 'Знайдіть дієслова'
  instruction: 'Знайдіть і позначте всі дієслова, які безпосередньо виражають особисту позицію або припущення.'
  text: 'Я вважаю, що цей проект принесе компанії успіх. Деякі експерти стверджують протилежне. Мені здається, що вони сильно помиляються. Ми припускаємо швидкі зміни на ринку. Тому я гадаю, що нам варто ще почекати. Ми чудово розуміємо всю складність ситуації.'
  answers:
    - 'вважаю'
    - 'стверджують'
    - 'здається'
    - 'припускаємо'
    - 'гадаю'
    - 'розуміємо'

- type: fill-in
  title: 'Сполучники причини: оберіть правильний варіант'
  instruction: 'Заповніть пропуски сполучниками, щоб логічно обґрунтувати твердження.'
  items:
    - sentence: 'Ми перенесли робочу зустріч, _____ директор трохи запізнювався.'
      answer: 'тому що'
      options:
        - 'тому що'
        - 'оскільки'
        - 'незважаючи на'
        - 'хоча'
      explanation: 'Це класичний сполучник причини, який ставиться усередині речення.'
    - sentence: '_____ погода була вкрай поганою, ми всі залишилися вдома.'
      answer: 'Оскільки'
      options:
        - 'Оскільки'
        - 'Тому що'
        - 'Через те що'
        - 'Але'
      explanation: 'Сполучник "оскільки" часто використовується на початку речення у формальному стилі.'
    - sentence: 'Складний проект швидко скасували _____ відсутність належного фінансування.'
      answer: 'через'
      options:
        - 'через'
        - 'тому що'
        - 'оскільки'
        - 'бо'
      explanation: 'Прийменник "через" вказує на зовнішні причини.'
    - sentence: 'Я повністю поділяю вашу думку, _____ вона міцно ґрунтується на фактах.'
      answer: 'оскільки'
      options:
        - 'оскільки'
        - 'через'
        - 'проте'
        - 'але'
      explanation: 'Сполучник "оскільки" підкреслює логічну підставу.'
    - sentence: 'Вона відмовилася від пропозиції, _____ умови контракту були невигідними.'
      answer: 'через те що'
      options:
        - 'через те що'
        - 'тому'
        - 'через'
        - 'оскільки'
      explanation: 'Цей складений сполучник наголошує на конкретних обставинах.'
    - sentence: 'Ми досягли великого успіху _____ нашій спільній та злагодженій роботі.'
      answer: 'завдяки'
      options:
        - 'завдяки'
        - 'тому що'
        - 'оскільки'
        - 'через те що'
      explanation: 'Прийменник "завдяки" використовується для вказівки на позитивні причини.'
    - sentence: 'Я глибоко переконаний у цьому, _____ маю дуже багато доказів.'
      answer: 'бо'
      options:
        - 'бо'
        - 'через'
        - 'завдяки'
        - 'проте'
      explanation: 'Сполучник "бо" є чудовим і коротким синонімом до "тому що".'
    - sentence: '_____ ми маємо критично мало часу, нам потрібно діяти швидко.'
      answer: 'Оскільки'
      options:
        - 'Оскільки'
        - 'Тому що'
        - 'Бо'
        - 'Через'
      explanation: 'На початку складнопідрядного речення найчастіше стоїть "оскільки".'

- type: unjumble
  title: 'Побудуйте логічні аргументи'
  instruction: 'Зберіть слова у правильному порядку, щоб створити повноцінний аргумент.'
  items:
    - words:
        - 'Оскільки'
        - 'йде'
        - 'дощ,'
        - 'ми'
        - 'залишимося'
        - 'вдома'
