- type: quiz
  title: "Практика етикету та дискусії"
  instruction: "Оберіть найбільш ввічливу та правильну реакцію або маркер для заданої ситуації."
  items:
    - question: "Колега пропонує абсолютно нереалістичний дедлайн. Як ввічливо відмовити?"
      explanation: "Хеджування зі словом 'можливо' зберігає повагу та професійний тон."
      options:
