- type: fill-in
  title: "Ступені та підсилювачі впевненості"
  instruction: "Оберіть маркер, який найкраще підходить до контексту речення."
  items:
    - sentence: "Я ... переконаний, що ця нова реформа принесе користь усім нам."
      answer: "глибоко"
      options:
        - "глибоко"
        - "трохи"
        - "слабко"
        - "десь"
    - sentence: "Він ..., не прийде сьогодні на зустріч, бо почувається дуже погано."
      answer: "мабуть"
      options:
        - "мабуть"
        - "безсумнівно"
        - "точно"
        - "обов'язково"
    - sentence: "Ми ... впевнені у вашому високому професіоналізмі та досвіді."
      answer: "цілком"
      options:
        - "цілком"
        - "навряд"
        - "майже"
        - "ніколи"
    - sentence: "Вони ... чи зможуть закінчити цей складний ремонт до завтрашнього вечора."
      answer: "навряд"
      options:
        - "навряд"
        - "точно"
        - "завжди"
        - "очевидно"
    - sentence: "Цей знайдений факт, ..., доводить правоту нашого головного адвоката."
