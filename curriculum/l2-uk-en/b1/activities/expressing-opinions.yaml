- type: fill-in
  title: "Дієслова 'вважати' та 'рахувати'"
  instruction: "Оберіть правильне дієслово для кожного контексту. Зверніть увагу на різницю між вираженням думки та обчисленням."
  items:
    - sentence: "Я ..., що цей проект буде дуже успішним."
      answer: "вважаю"
      options:
        - "вважаю"
        - "рахую"
        - "бачу"
        - "дивлюся"
      explanation: "Для вираження особистої думки використовуємо 'вважати'."
    - sentence: "Вчитель попросив дітей ... від одного до десяти."
      answer: "рахувати"
      options:
        - "рахувати"
        - "вважати"
        - "думати"
        - "гадати"
      explanation: "Математична дія (1, 2, 3...) — це 'рахувати'."
    - sentence: "Вона завжди ... його своїм найкращим другом."
      answer: "вважала"
      options:
        - "вважала"
        - "рахувала"
        - "дивилася"
        - "робила"
    - sentence: "Касир почав швидко ... отримані гроші."
      answer: "рахувати"
      options:
        - "рахувати"
        - "вважати"
        - "ділити"
        - "робити"
    - sentence: "Ми ... за потрібне негайно змінити наш план."
      answer: "вважаємо"
      options:
        - "вважаємо"
        - "рахуємо"
        - "дивимося"
        - "питаємо"
    - sentence: "Він довго не міг ... свої витрати за минулий місяць."
      answer: "порахувати"
      options:
        - "порахувати"
        - "повважати"
        - "подумати"
        - "погадати"
    - sentence: "Експерти ... цю стратегію найбільш ефективною на ринку."
      answer: "вважають"
      options:
        - "вважають"
        - "рахують"
        - "кажуть"
        - "пишуть"
    - sentence: "Маленький хлопчик щойно навчився ... до ста."
      answer: "рахувати"
      options:
        - "рахувати"
        - "вважати"
        - "писати"
        - "співати"

- type: match-up
  title: "Колокації: думка та погляд"
  instruction: "Знайдіть пару: початок та кінець стійкої фрази."
  pairs:
