    - left: "Висловити"
      right: "думку"
    - left: "На мій"
      right: "погляд"
    - left: "З точки"
      right: "зору"
    - left: "Широкий"
      right: "погляд"
    - left: "Обмінятися"
      right: "поглядами"

- type: unjumble
  title: "Складіть речення з вставними словами"
  instruction: "Правильно розставте слова, звертаючи увагу на структуру речення."
  items:
    - words:
        - "На"
        - "мою"
        - "думку,"
        - "ми"
        - "повинні"
        - "діяти"
        - "швидко"
      answer: "На мою думку, ми повинні діяти швидко"
    - words:
        - "На"
        - "мій"
        - "погляд,"
        - "цей"
        - "проект"
        - "дуже"
        - "важливий"
      answer: "На мій погляд, цей проект дуже важливий"
    - words:
        - "З"
        - "точки"
        - "зору"
        - "економіки,"
        - "це"
        - "вигідно"
      answer: "З точки зору економіки, це вигідно"
    - words:
        - "Я"
        - "повністю"
        - "поділяю"
        - "думку"
        - "мого"
        - "колеги"
      answer: "Я повністю поділяю думку мого колеги"
    - words:
        - "Можливо,"
        - "нам"
        - "варто"
        - "ще"
        - "раз"
        - "подумати"
      answer: "Можливо, нам варто ще раз подумати"
    - words:
        - "Я"
        - "глибоко"
        - "переконаний"
        - "у"
        - "нашому"
        - "майбутньому"
        - "успіху"
      answer: "Я глибоко переконаний у нашому майбутньому успіху"

- type: quiz
  title: "Сила думки та впевненість"
  instruction: "Оберіть правильний маркер впевненості для кожної ситуації."
  items:
    - question: "Яке слово виражає найслабшу впевненість у ситуації?"
      explanation: "Слово 'мабуть' означає ймовірність, здогадку, а не точну впевненість."
      options:
        - text: "мабуть"
          correct: true
        - text: "безсумнівно"
          correct: false
        - text: "переконаний"
          correct: false
        - text: "твердо"
          correct: false
    - question: "Як правильно висловити дипломатичну незгоду на нараді?"
      explanation: "Конструкція 'розумію, але...' допомагає зберегти ввічливість і повагу."
      options:
        - text: "Я розумію вашу позицію, але пропоную інше."
          correct: true
        - text: "Це повна дурниця і дуже погана ідея."
          correct: false
        - text: "Ви абсолютно нічого не розумієте в цьому."
          correct: false
        - text: "Я не буду це слухати і працювати так."
          correct: false
    - question: "Яке дієслово найкраще підходить для формальної заяви у новинах?"
      explanation: "Дієслово 'стверджувати' традиційно використовується в офіційному медійному мовленні."
      options:
        - text: "стверджувати"
          correct: true
        - text: "думати"
          correct: false
        - text: "здаватися"
          correct: false
        - text: "гадати"
          correct: false
    - question: "Який прислівник максимально підсилює вашу впевненість у рішенні?"
      explanation: "Слово 'цілком' робить вашу впевненість абсолютною."
      options:
        - text: "цілком"
          correct: true
        - text: "навряд чи"
          correct: false
        - text: "можливо"
          correct: false
        - text: "мабуть"
          correct: false
    - question: "Як правильно сказати про колективну позицію усього суспільства?"
      explanation: "Для цього явища існує стійкий термін 'громадська думка'."
      options:
        - text: "громадська думка"
          correct: true
        - text: "велика думка"
          correct: false
        - text: "людський погляд"
          correct: false
        - text: "соціальний розум"
          correct: false
    - question: "Що саме означає поширена вставна конструкція 'як на мене'?"
      explanation: "Вона виражає суб'єктивну особисту думку мовця, часто в неформальному спілкуванні."
      options:
        - text: "особисту думку"
          correct: true
        - text: "математичний факт"
          correct: false
        - text: "офіційну позицію"
          correct: false
        - text: "відсутність думки"
          correct: false
    - question: "Який сполучник чітко вказує на причину вашої думки у складному реченні?"
      explanation: "Сполучник 'оскільки' традиційно вводить причину в діловому стилі."
      options:
        - text: "оскільки"
          correct: true
        - text: "проте"
          correct: false
        - text: "але"
          correct: false
        - text: "щоб"
          correct: false
    - question: "Яке слово є типовим маркером сильного сумніву або негативної ймовірності?"
      explanation: "Конструкція 'навряд чи' показує мінімальну ймовірність того, що подія відбудеться."
      options:
        - text: "навряд чи"
          correct: true
        - text: "звичайно"
          correct: false
        - text: "очевидно"
          correct: false
        - text: "безсумнівно"
          correct: false

- type: error-correction
  title: "Виправте стилістичні та лексичні помилки"
  instruction: "Знайдіть і виправте помилки у реченнях. Звертайте увагу на кальки та неправильні колокації."
  items:
    - sentence: "Я рахую, що цей фільм дуже нудний і нецікавий для глядачів."
      error: "рахую"
      answer: "вважаю"
      options:
        - "вважаю"
        - "думаю"
        - "пишу"
        - "бачу"
      explanation: "Для вираження інтелектуальної думки слід використовувати 'вважати', а не математичне 'рахувати'."
    - sentence: "На мій думку, нам потрібно значно більше часу для підготовки."
      error: "мій"
      answer: "мою"
      options:
        - "мою"
        - "моя"
        - "мої"
        - "мене"
      explanation: "Слово 'думка' жіночого роду, тому правильна колокація: 'на мою думку'."
    - sentence: "Я рахую за потрібне зробити невелику паузу в нашій роботі."
      error: "рахую"
      answer: "вважаю"
      options:
        - "вважаю"
        - "знаю"
        - "роблю"
        - "маю"
      explanation: "Стала фраза звучить як 'вважати за потрібне'."
    - sentence: "З точки погляду сучасної психології, це абсолютно нормальна реакція."
      error: "погляду"
      answer: "зору"
      options:
        - "зору"
        - "думки"
        - "ока"
        - "знання"
      explanation: "Правильний фразеологізм в українській мові — 'з точки зору'."
    - sentence: "Громадська погляд розділилася навпіл після цих гучних телевізійних новин."
      error: "погляд"
      answer: "думка"
      options:
        - "думка"
        - "ідея"
        - "позиція"
        - "тема"
      explanation: "Правильний соціальний термін — 'громадська думка'."
    - sentence: "Я повністю ділю думку мого нового керівника щодо цього проекту."
      error: "ділю"
      answer: "поділяю"
      options:
        - "поділяю"
        - "роблю"
        - "даю"
        - "беру"
      explanation: "Правильна літературна конструкція — 'поділяти думку' (мати спільну позицію)."

- type: mark-the-words
  title: "Знайдіть маркери впевненості"
  instruction: "Позначте всі слова, які вказують на ступінь впевненості (слабку, середню або сильну)."
  text: "Я гадаю що цей план спрацює. Він безсумнівно найкращий експерт у цій галузі. Вони мабуть погодяться на наші умови. Мені здається що нам потрібен новий підхід. Вона очевидно знала про можливі ризики. Я твердо переконаний у цьому рішенні."
  answers:
    - "гадаю"
    - "безсумнівно"
    - "мабуть"
    - "здається"
    - "очевидно"
    - "твердо"
    - "переконаний"

