- type: match-up
  title: "Лексика: Знайдіть пару"
  instruction: "З'єднайте українське слово з його значенням або перекладом."
  pairs:
    - left: "зворотний зв'язок"
      right: "структурована інформація для покращення результату"
    - left: "відгук"
      right: "суб'єктивна оцінка товару або послуги"
    - left: "скарга"
      right: "офіційне повідомлення про погане обслуговування"
    - left: "компроміс"
      right: "рішення, яке частково задовольняє обидві сторони"
    - left: "пропозиція"
      right: "те, що ви пропонуєте розглянути партнеру"
    - left: "клієнтоорієнтованість"
      right: "філософія бізнесу, спрямована на задоволення потреб клієнта"
    - left: "зауваження"
      right: "коротка критика або вказівка на помилку"
    - left: "незручності"
      right: "проблеми або дискомфорт, завдані клієнту"
    - left: "обговорювати"
      right: "аналізувати певну проблему з іншими"
    - left: "альтернатива"
      right: "інший можливий варіант вирішення ситуації"
    - left: "врахувати"
      right: "взяти до уваги чиюсь пораду"
    - left: "експертиза"
      right: "детальна перевірка якості товару спеціалістами"

- type: true-false
  title: "Правда чи неправда: Правила спілкування"
  instruction: "Визначте, чи є ці твердження правильними."
  items:
    - statement: "Відгук — це завжди двосторонній процес обміну інформацією."
      correct: false
      explanation: "Відгук часто є односторонньою оцінкою, а зворотний зв'язок — двостороннім."
    - statement: "Умовний спосіб допомагає зробити критику більш ввічливою."
      correct: true
      explanation: "Частка «б» або «би» пом'якшує категоричність висловлювання."
    - statement: "Словосполучення «робити компроміс» є правильним в українській мові."
      correct: false
      explanation: "Правильно казати «йти на компроміс»."
    - statement: "Дієслово «обговорювати» вимагає після себе прийменника «про»."
      correct: false
      explanation: "Ми обговорюємо щось (знахідний відмінок без прийменника), а не «про щось»."
    - statement: "«Сендвіч-метод» передбачає, що критика знаходиться між двома позитивними коментарями."
      correct: true
      explanation: "Спочатку йде похвала, потім критика, а в кінці — підтримка."
    - statement: "Українською мовою правильно казати «приймати рішення»."
      correct: true
      explanation: "Це правильна колокація, калька «робити рішення» є помилкою."
    - statement: "Офіційна скарга повинна містити багато емоцій та знаків оклику."
      correct: false
      explanation: "Скарга має бути лаконічною, містити факти та вимоги без зайвих емоцій."
    - statement: "Фраза «Чи не могли б ви...?» є ввічливим проханням, а не агресивним наказом."
      correct: true
      explanation: "Вона використовується для м'якого спонукання до дії."

- type: fill-in
  title: "Доповніть речення правильними словами"
  instruction: "Оберіть правильне слово для кожного пропуску."
  items:
    - sentence: "Нам потрібно негайно налагодити зворотний _____ у нашій команді."
      answer: "зв'язок"
      options: ["зв'язок", "відгук", "напрямок", "контакт"]
      explanation: "Сталий вираз — «налагодити зворотний зв'язок»."
    - sentence: "Я вчора залишив дуже позитивний _____ про цей затишний готель на сайті."
      answer: "відгук"
      options: ["відгук", "зв'язок", "коментар", "лист"]
      explanation: "У контексті оцінки на сайті використовується слово «відгук»."
    - sentence: "Ми мусимо заради бізнесу _____ на компроміс."
      answer: "піти"
      options: ["піти", "зробити", "знайти", "дати"]
      explanation: "Правильна колокація — «йти/піти на компроміс»."
    - sentence: "Компанія вчора прийняла _____ кардинально змінити всі ціни."
      answer: "рішення"
      options: ["рішення", "компроміс", "поступки", "правило"]
      explanation: "Українською ми «приймаємо рішення»."
    - sentence: "Давайте сядемо і обговоримо цю _____ без зайвих емоцій."
      answer: "проблему"
      options: ["проблему", "про проблему", "про проблеми", "за проблему"]
      explanation: "Дієслово «обговорювати» вимагає прямого додатка без прийменника."
    - sentence: "Можливо, вам _____ було б змінити цей дизайн на більш сучасний."
      answer: "варто"
      options: ["варто", "треба", "потрібно", "можна"]
      explanation: "Ввічлива конструкція — «варто було б»."
    - sentence: "Як менеджер, я готовий піти на _____ у цьому складному питанні."
      answer: "поступки"
      options: ["поступки", "компроміси", "знижки", "угоди"]
      explanation: "Правильний вираз — «йти на поступки»."
    - sentence: "Дуже дякую за ваші слушні _____ щодо моєї роботи."
      answer: "зауваження"
      options: ["зауваження", "критики", "скарги", "проблеми"]
      explanation: "Конструктивна критика часто називається «зауваженнями»."

- type: quiz
  title: "Оберіть правильний варіант"
  instruction: "Дайте відповідь на запитання, обравши один правильний варіант."
  items:
    - question: "Яка фраза є найбільш ввічливою для вираження прохання в магазині?"
      options:
        - text: "Чи не могли б ви принести мені інший розмір?"
          correct: true
        - text: "Швидко принесіть мені інший розмір!"
          correct: false
        - text: "Дайте мені інший розмір зараз же!"
          correct: false
        - text: "Я вимагаю інший розмір негайно!"
          correct: false
      explanation: "Конструкція «Чи не могли б ви...» є найввічливішою."
    - question: "Яке слово краще використати, якщо ви пишете коментар про товар на сайті магазину?"
      options:
        - text: "відгук"
          correct: true
        - text: "зворотний зв'язок"
          correct: false
        - text: "компроміс"
          correct: false
        - text: "поступка"
          correct: false
      explanation: "Для оцінки товару в інтернеті використовується слово «відгук»."
    - question: "Що означає вираз «клієнтоорієнтованість» у сучасному українському бізнесі?"
      options:
        - text: "Філософія, спрямована на задоволення потреб клієнта"
          correct: true
        - text: "Уміння клієнтів орієнтуватися в магазині"
          correct: false
        - text: "Бажання клієнта написати скаргу"
          correct: false
        - text: "Процес повернення товару продавцю"
          correct: false
      explanation: "Це підхід, у центрі якого стоять інтереси та потреби клієнта."
    - question: "Яке дієслово правильно поєднується зі словом «рішення»?"
      options:
        - text: "приймати"
          correct: true
        - text: "робити"
          correct: false
        - text: "будувати"
          correct: false
        - text: "давати"
          correct: false
      explanation: "В українській мові рішення приймають, а не роблять."
    - question: "Як правильно сказати про процес обговорення певної теми?"
      options:
        - text: "обговорювати проблему"
          correct: true
        - text: "обговорювати про проблему"
          correct: false
        - text: "обговорювати за проблему"
          correct: false
        - text: "обговорювати на проблему"
          correct: false
      explanation: "Дієслово «обговорювати» вимагає знахідного відмінка без прийменників."
    - question: "Яка частина «Сендвіч-методу» повинна йти найпершою?"
      options:
        - text: "Щира похвала або позитивний коментар"
          correct: true
        - text: "Пряма критика помилок"
          correct: false
        - text: "Слова підтримки та мотивації"
          correct: false
        - text: "Вимога переробити всю роботу"
          correct: false
      explanation: "Розмову слід починати з позитиву, щоб створити довірливу атмосферу."
    - question: "Який граматичний спосіб найкраще підходить для пом'якшення критики?"
      options:
        - text: "Умовний спосіб"
          correct: true
        - text: "Наказовий спосіб"
          correct: false
        - text: "Дійсний спосіб минулого часу"
          correct: false
        - text: "Дійсний спосіб майбутнього часу"
          correct: false
      explanation: "Умовний спосіб (частка б/би) робить висловлювання менш категоричним."
    - question: "Яка фраза найкраще підійде для дипломатичного вираження незгоди?"
      options:
        - text: "Я розумію вашу позицію, але ми маємо врахувати ризики."
          correct: true
        - text: "Ви абсолютно неправі в цій ситуації."
          correct: false
        - text: "Я категорично відмовляюся це слухати."
          correct: false
        - text: "Ваша пропозиція позбавлена будь-якого сенсу."
          correct: false
      explanation: "Формула «Згода + але» показує повагу до співрозмовника і водночас вашу незгоду."

- type: unjumble
  title: "Складіть речення: Ввічливі прохання та поради"
  instruction: "Розташуйте слова в правильному порядку, щоб утворити речення."
  items:
    - words: ["варто", "було", "б", "трохи", "змінити", "дизайн"]
      answer: "Варто було б трохи змінити дизайн"
    - words: ["я", "б", "порадив", "перевірити", "ці", "дані"]
      answer: "Я б порадив перевірити ці дані"
    - words: ["ми", "мусимо", "піти", "на", "цей", "компроміс"]
      answer: "Ми мусимо піти на цей компроміс"
    - words: ["вони", "вчора", "прийняли", "дуже", "важливе", "рішення"]
      answer: "Вони вчора прийняли дуже важливе рішення"
    - words: ["чи", "не", "могли", "б", "ви", "допомогти"]
      answer: "Чи не могли б ви допомогти"
    - words: ["я", "хотів", "би", "повернути", "цей", "товар"]
      answer: "Я хотів би повернути цей товар"
    - words: ["давайте", "сядемо", "і", "обговоримо", "цю", "проблему"]
      answer: "Давайте сядемо і обговоримо цю проблему"
    - words: ["я", "обов'язково", "врахую", "ваші", "слушні", "зауваження"]
      answer: "Я обов'язково врахую ваші слушні зауваження"

- type: error-correction
  title: "Виправте типові помилки"
  instruction: "Знайдіть русизм, кальку або граматичну помилку та оберіть правильний варіант."
  items:
    - sentence: "Ми маємо швидко зробити компроміс у цій ситуації."
      error: "зробити"
      answer: "піти на"
      options: ["піти на", "дати", "взяти", "знайти"]
      explanation: "Правильний вираз — «йти/піти на компроміс»."
    - sentence: "Керівництво вже зробило рішення щодо цього проєкту."
      error: "зробило"
      answer: "прийняло"
      options: ["прийняло", "дало", "створило", "вирішило"]
      explanation: "В українській мові рішення приймають."
    - sentence: "Нам треба обговорити про цю проблему завтра."
      error: "про цю проблему"
      answer: "цю проблему"
      options: ["цю проблему", "за цю проблему", "на цю проблему", "об цю проблему"]
      explanation: "Дієслово «обговорювати» вживається без прийменника."
    - sentence: "Я кушаю в цьому ресторані щодня."
      error: "кушаю"
      answer: "їм"
      error_type: "word"
      options: ["їм", "їду", "їжу", "харчую"]
      explanation: "«Кушати» — це русизм, правильно казати «їсти»."
    - sentence: "Він приймав участь у вчорашніх переговорах."
      error: "приймав"
      answer: "брав"
      options: ["брав", "робив", "мав", "дав"]
      explanation: "Правильно — «брати участь»."
    - sentence: "Це самий кращий відгук про нашу роботу."
      error: "самий кращий"
      answer: "найкращий"
      error_type: "phrase"
      options: ["найкращий", "самий хороший", "більш кращий", "дуже кращий"]
      explanation: "Форма «самий + прикметник» є калькою з російської."
    - sentence: "Я получаю багато скарг від наших клієнтів."
      error: "получаю"
      answer: "отримую"
      options: ["отримую", "дістаю", "беру", "маю"]
      explanation: "«Получати» — русизм, правильно «отримувати»."
    - sentence: "Негайно дайте мені мої гроші назад!"
      error: "Негайно дайте"
      answer: "Я хотів би повернути"
      error_type: "register"
      options: ["Я хотів би повернути", "Швидко віддайте", "Поверніть зараз же", "Я вимагаю"]
      explanation: "Офіційний регістр вимагає використання ввічливих прохань замість агресивних наказів."

- type: mark-the-words
  title: "Знайдіть ключові іменники"
  instruction: "Знайдіть і позначте іменники в тексті."
  text: "Кожна скарга є важливою для нас. Ми завжди читаємо ваш відгук. Успішні переговори вимагають часу. Ця пропозиція відкриває нові можливості. Клієнт погодився на компроміс."
  answers: ["скарга", "відгук", "переговори", "пропозиція", "компроміс", "можливості"]

- type: cloze
  title: "Заповніть пропуски: Структура формальної скарги"
  instruction: "Оберіть правильні слова для кожного пропуску в тексті скарги."
  passage: "Шановний директоре! Звертаю вашу {{1}} на те, що вчора я придбав у вашому {{2}} новий телевізор. Справа в {{3}}, що вдома пристрій виявився повністю {{4}}. Ця неприпустима ситуація завдала мені значних {{5}}, оскільки я безповоротно втратив свій робочий {{6}}. Я {{7}} на максимально швидке розв'язання цього прикрого {{8}} з вашого {{9}}. Щиро сподіваюся на ваше глибоке {{10}} ситуації та дотримання стандартів {{11}}. Відповідно до українського {{12}}, прошу розглянути мою {{13}} в найкоротший термін та повернути мої {{14}} на банківську картку."
  blanks:
    - id: 1
      answer: "увагу"
      options: ["увагу", "думку", "позицію", "пропозицію"]
    - id: 2
      answer: "магазині"
      options: ["магазині", "ресторані", "банку", "готелі"]
    - id: 3
      answer: "тому"
      options: ["тому", "цьому", "чому", "всьому"]
    - id: 4
      answer: "несправним"
      options: ["несправним", "робочим", "ідеальним", "новим"]
    - id: 5
      answer: "незручностей"
      options: ["незручностей", "радостей", "переваг", "емоцій"]
    - id: 6
      answer: "час"
      options: ["час", "день", "бюджет", "настрій"]
    - id: 7
      answer: "очікую"
      options: ["очікую", "думаю", "бачу", "знаю"]
    - id: 8
      answer: "непорозуміння"
      options: ["непорозуміння", "досягнення", "компромісу", "рішення"]
    - id: 9
      answer: "боку"
      options: ["боку", "краю", "місця", "центру"]
    - id: 10
      answer: "розуміння"
      options: ["розуміння", "читання", "бачення", "знання"]
    - id: 11
      answer: "обслуговування"
      options: ["обслуговування", "навчання", "керування", "будівництва"]
    - id: 12
      answer: "законодавства"
      options: ["законодавства", "правила", "договору", "документа"]
    - id: 13
      answer: "скаргу"
      options: ["скаргу", "пропозицію", "подяку", "ідею"]
    - id: 14
      answer: "кошти"
      options: ["кошти", "борги", "документи", "товари"]

- type: select
  title: "Оберіть усі правильні варіанти: Ввічлива комунікація"
  instruction: "Для кожної ситуації оберіть усі фрази, які є ввічливими та прийнятними в діловому спілкуванні."
  items:
    - question: "Які фрази підходять для пом'якшення відмови?"
      min_correct: 2
      options:
        - text: "Я розумію вашу позицію, але..."
          correct: true
        - text: "На превеликий жаль, ми змушені відхилити..."
          correct: true
        - text: "Це абсолютно неможливо!"
          correct: false
        - text: "Ми категорично відмовляємося."
          correct: false
      explanation: "Вирази з «але» та «на жаль» пом'якшують відмову."
    - question: "Які конструкції містять правильний умовний спосіб для порад?"
      min_correct: 2
      options:
        - text: "Можливо, вам варто було б змінити текст."
          correct: true
        - text: "Я б щиро порадив вам перевірити дані."
          correct: true
        - text: "Ви повинні негайно змінити текст."
          correct: false
        - text: "Зробіть це завдання інакше."
          correct: false
      explanation: "Умовний спосіб з часткою «б» робить поради ввічливими."
    - question: "Які вирази підходять для прийняття критики?"
      min_correct: 2
      options:
        - text: "Я обов'язково це врахую."
          correct: true
        - text: "Дякую, що звернули на це мою увагу."
          correct: true
        - text: "Ви самі нічого не розумієте!"
          correct: false
        - text: "Це не моя помилка, а ваша."
