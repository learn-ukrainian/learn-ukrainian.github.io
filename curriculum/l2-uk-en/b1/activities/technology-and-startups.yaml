- type: quiz
  title: "Перевірте знання: історія та граматика IT"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Якого роду слово комп'ютер в українській мові?"
      options:
        - text: "чоловічого роду"
          correct: true
        - text: "жіночого роду"
          correct: false
        - text: "середнього роду"
          correct: false
        - text: "воно не має роду"
          correct: false
      explanation: "Слово комп'ютер — це іменник чоловічого роду другої відміни."
    - question: "Де був створений відомий сервіс Grammarly у 2009 році?"
      options:
        - text: "у Києві"
          correct: true
        - text: "у Харкові"
          correct: false
        - text: "у Львові"
          correct: false
        - text: "в Одесі"
          correct: false
      explanation: "Сервіс Grammarly був заснований у місті Києві."
    - question: "Яке дієслово означає завершений результат роботи над кодом?"
      options:
        - text: "написати"
          correct: true
        - text: "писати"
          correct: false
        - text: "розробляти"
          correct: false
        - text: "тестувати"
          correct: false
      explanation: "Дієслово доконаного виду написати вказує на успішний результат."
    - question: "Як правильно назвати мобільну програму українською мовою?"
      options:
        - text: "застосунок"
          correct: true
        - text: "додаток"
          correct: false
        - text: "аплікація"
          correct: false
        - text: "програма"
          correct: false
      explanation: "Правильний термін для мобільних телефонів — це застосунок."
    - question: "За допомогою якого суфікса утворюється слово тестувальник?"
      options:
        - text: "за допомогою суфікса -ник"
          correct: true
        - text: "за допомогою суфікса -іст"
          correct: false
        - text: "за допомогою суфікса -ння"
          correct: false
        - text: "це слово не має суфікса"
          correct: false
      explanation: "Цей термін утворено від дієслова тестувати за допомогою суфікса -ник."
    - question: "Яка компанія з України відома своєю моделлю all-remote?"
      options:
        - text: "GitLab"
          correct: true
        - text: "Grammarly"
          correct: false
        - text: "Ajax Systems"
          correct: false
        - text: "Дія"
          correct: false
      explanation: "Компанія GitLab працює повністю дистанційно без головного офісу."
    - question: "Яке закінчення має слово стартап у місцевому відмінку?"
      options:
        - text: "закінчення -і (у стартапі)"
          correct: true
        - text: "закінчення -у (у стартапу)"
          correct: false
        - text: "закінчення -ом (зі стартапом)"
          correct: false
        - text: "закінчення -а (стартапа)"
          correct: false
      explanation: "Правильна форма місцевого відмінка — працювати у стартапі."
    - question: "У якому році цифрові паспорти в Дії стали легальними?"
      options:
        - text: "у дві тисячі двадцять першому"
          correct: true
        - text: "у дві тисячі дев'ятнадцятому"
          correct: false
        - text: "у дві тисячі двадцятому"
          correct: false
        - text: "у дві тисячі двадцять другому"
          correct: false
      explanation: "Цей історичний факт стався у 2021 році."

