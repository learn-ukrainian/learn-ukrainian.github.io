- type: unjumble
  title: "Складіть речення: розмови про IT"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["Цей", "стартап", "вирішує", "важливу", "проблему", "міста"]
      answer: "Цей стартап вирішує важливу проблему міста"
    - words: ["Я", "успішно", "завантажив", "усі", "необхідні", "документи"]
      answer: "Я успішно завантажив усі необхідні документи"
    - words: ["У", "Києві", "знаходиться", "великий", "центр", "розробок"]
      answer: "У Києві знаходиться великий центр розробок"
    - words: ["Ми", "активно", "інвестуємо", "у", "сучасну", "технологію"]
      answer: "Ми активно інвестуємо у сучасну технологію"
    - words: ["Інженери", "розробляли", "свій", "продукт", "декілька", "років"]
      answer: "Інженери розробляли свій продукт декілька років"
    - words: ["Наша", "команда", "написала", "новий", "мобільний", "застосунок"]
      answer: "Наша команда написала новий мобільний застосунок"

- type: error-correction
  title: "Виправте помилки: русизми та кальки"
  instruction: "Знайдіть помилку в реченні та оберіть правильний варіант."
  items:
    - sentence: "Я скачав новий мобільний додаток вчора ввечері."
      error: "додаток"
      answer: "застосунок"
      error_type: "word"
      options: ["застосунок", "програму", "файл", "документ"]
      explanation: "Мобільні програми правильно називати словом застосунок."
    - sentence: "Тобі потрібно закачати цей файл ще один раз."
      error: "закачати"
      answer: "завантажити"
      error_type: "word"
      options: ["завантажити", "написати", "відкрити", "зробити"]
      explanation: "Слово закачати є русизмом, правильно казати завантажити."
    - sentence: "Він приймав участь у розробці відомого українського стартапу."
      error: "приймав участь"
      answer: "брав участь"
      error_type: "phrase"
      options: ["брав участь", "мав участь", "робив участь", "був участь"]
      explanation: "Українською мовою правильно говорити брати участь."
    - sentence: "Це самий кращий програміст у нашій команді."
      error: "самий кращий"
      answer: "найкращий"
      error_type: "phrase"
      options: ["найкращий", "дуже кращий", "більш кращий", "чудовий"]
      explanation: "Для найвищого ступеня порівняння ми використовуємо префікс най-."
    - sentence: "Вона працює у цьому стартапу вже три роки."
      error: "стартапу"
      answer: "стартапі"
      error_type: "word"
      options: ["стартапі", "стартапом", "стартап", "стартапа"]
      explanation: "У місцевому відмінку це слово має закінчення -і: працювати у стартапі."
    - sentence: "Я дуже довго писав код і нарешті писав його ідеально."
      error: "писав"
      answer: "написав"
      error_type: "word"
      options: ["написав", "робив", "створював", "тестував"]
      explanation: "Для результату потрібно використовувати дієслово доконаного виду написати."

