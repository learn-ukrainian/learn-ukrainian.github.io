- type: match-up
  title: "Утворіть пасивні дієприкметники"
  instruction: "З'єднайте дієслово (інфінітив) з його пасивним дієприкметником."
  pairs:
    - left: "прочитати"
      right: "прочитаний"
    - left: "написати"
      right: "написаний"
    - left: "зробити"
      right: "зроблений"
    - left: "відкрити"
      right: "відкритий"
    - left: "закрити"
      right: "закритий"
    - left: "збудувати"
      right: "збудований"
    - left: "знайти"
      right: "знайдений"
    - left: "вирішити"
      right: "вирішений"
    - left: "мити"
      right: "митий"
    - left: "забути"
      right: "забутий"
    - left: "виконати"
      right: "виконаний"
    - left: "запросити"
      right: "запрошений"

- type: fill-in
  title: "Оберіть правильний суфікс"
  instruction: "Доповніть речення правильним пасивним дієприкметником."
  items:
    - sentence: "Цей цікавий журнал був ______ мною ще вчора."
      answer: "прочитаний"
      options: ["прочитаний", "прочитатий", "прочитаємий", "прочитавши"]
    - sentence: "На столі лежав ретельно ______ від руки конспект."
      answer: "написаний"
      options: ["написаний", "написатий", "написений", "написуваний"]
    - sentence: "Це ідеально ______ інструмент для нашої роботи."
      answer: "зроблений"
      options: ["зроблений", "зроблетий", "зроблеий", "зробитий"]
    - sentence: "Ми зайшли у світлий, повністю ______ для відвідувачів зал."
      answer: "відкритий"
      options: ["відкритий", "відкриний", "відкритений", "відкрить"]
    - sentence: "На жаль, цей музей тимчасово ______ через ремонт."
      answer: "закритий"
      options: ["закритий", "закриний", "закритений", "закрив"]
    - sentence: "Це успішно ______ обіцянка перед нашими партнерами."
      answer: "виконана"
      options: ["виконана", "виконати", "виконуєма", "виконувана"]
    - sentence: "Чистий, ретельно ______ посуд уже стояв на столі."
      answer: "митий"
      options: ["митий", "миний", "миєний", "мивши"]
    - sentence: "Він знайшов старий, давно ______ лист на горищі."
      answer: "забутий"
      options: ["забутий", "забуний", "забутений", "забувши"]
    - sentence: "Усі питання на сьогодні остаточно ______."
      answer: "закрито"
      options: ["закрито", "закриті", "закрити", "закритий"]
    - sentence: "Святково ______ зал був готовий до церемонії."
      answer: "прикрашений"
      options: ["прикрашений", "прикрасений", "прикрасаний", "прикраситий"]
    - sentence: "Кінорежисер Тарантіно — це мій ______ автор."
      answer: "улюблений"
      options: ["улюблений", "любимий", "люблений", "любитий"]
    - sentence: "Учора в лісі був ______ старий артефакт."
      answer: "знайдений"
      options: ["знайдений", "знайдиний", "знайдетий", "знайшовши"]

- type: quiz
  title: "Перевірте знання: правила творення та узгодження"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який суфікс використовується для утворення пасивного дієприкметника від дієслова 'прочитати'?"
      explanation: "Дієслово 'прочитати' закінчується на '-ати', тому додається суфікс '-ний'."
      options:
        - text: "-ний"
          correct: true
        - text: "-ений"
          correct: false
        - text: "-тий"
          correct: false
        - text: "-мий"
          correct: false
    - question: "Як правильно утворити пасивний дієприкметник від дієслова 'зробити'?"
      explanation: "Основа на приголосний з інфінітивним 'и' вимагає суфікса '-ений' та випадіння 'и'."
      options:
        - text: "зроблений"
          correct: true
        - text: "зроблетий"
          correct: false
        - text: "зробитий"
          correct: false
        - text: "зробиний"
          correct: false
    - question: "Яке чергування приголосних відбувається у слові 'саджений'?"
      explanation: "Перед суфіксом '-ений' звук 'д' закономірно переходить у 'дж'."
      options:
        - text: "д переходить у дж"
          correct: true
        - text: "д переходить у ж"
          correct: false
        - text: "д переходить у з"
          correct: false
        - text: "д переходить у с"
          correct: false
    - question: "Як правильно сказати українською замість російської кальки 'любимий фільм'?"
      explanation: "Сучасний літературний стандарт використовує питоме українське слово 'улюблений'."
      options:
        - text: "улюблений фільм"
          correct: true
        - text: "любитий фільм"
          correct: false
        - text: "люблений фільм"
          correct: false
        - text: "любований фільм"
          correct: false
    - question: "Від яких дієслів можна утворити пасивні дієприкметники?"
      explanation: "Пасивні форми утворюються лише від дієслів, дія яких переходить на об'єкт (перехідних)."
      options:
        - text: "тільки від перехідних"
          correct: true
        - text: "тільки від неперехідних"
          correct: false
        - text: "від будь-яких дієслів"
          correct: false
        - text: "від зворотних дієслів"
          correct: false
    - question: "Який відмінок, число та рід має дієприкметник у реченні 'Я читаю написану книгу'?"
      explanation: "Дієприкметник повністю узгоджується з іменником 'книгу' (жіночий рід, однина, знахідний відмінок)."
      options:
        - text: "жіночий рід, однина, знахідний відмінок"
          correct: true
        - text: "жіночий рід, однина, називний відмінок"
          correct: false
        - text: "чоловічий рід, множина, орудний відмінок"
          correct: false
        - text: "середній рід, однина, родовий відмінок"
          correct: false
    - question: "У якому випадку дієприкметниковий зворот не виділяється комами?"
      explanation: "Якщо зворот стоїть перед іменником, він працює як звичайне означення і не виділяється розділовими знаками."
      options:
        - text: "коли він стоїть перед головним словом"
          correct: true
        - text: "коли він стоїть після головного слова"
          correct: false
        - text: "він завжди виділяється комами"
          correct: false
        - text: "він ніколи не виділяється комами"
          correct: false
    - question: "Який суфікс мають безособові форми, що виражають абсолютний результат?"
      explanation: "Безособові форми (наприклад, зроблено, відкрито) завжди закінчуються на -но або -то."
      options:
        - text: "-но, -то"
          correct: true
        - text: "-ний, -тий"
          correct: false
        - text: "-му, -ту"
          correct: false
        - text: "-ла, -ло"
          correct: false
    - question: "Яке з цих слів містить правильне чергування приголосних перед '-ений'?"
      explanation: "Звук 'с' завжди чергується з 'ш' перед суфіксом '-ений'."
      options:
        - text: "ношений"
          correct: true
        - text: "носений"
          correct: false
        - text: "ношний"
          correct: false
        - text: "ноший"
          correct: false
    - question: "Яке з цих дієслів використовує суфікс '-тий' для утворення пасивного дієприкметника?"
      explanation: "Односкладові основи, що закінчуються на голосний, вимагають суфікса '-тий'."
      options:
        - text: "мити"
          correct: true
        - text: "читати"
          correct: false
        - text: "робити"
          correct: false
        - text: "зрозуміти"
          correct: false

- type: unjumble
  title: "Складіть речення з дієприкметниками"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити граматично правильні речення."
  items:
    - words: ["журнал", "мною", "Цей", "вчора.", "був", "прочитаний"]
      answer: "Цей журнал був прочитаний мною вчора."
    - words: ["від", "руки", "На", "конспект.", "лежав", "написаний", "столі"]
      answer: "На столі лежав написаний від руки конспект."
    - words: ["для", "зал.", "відвідувачів", "відкритий", "зайшли", "у", "Ми"]
      answer: "Ми зайшли у відкритий для відвідувачів зал."
    - words: ["тимчасово", "Цей", "ремонт.", "через", "закритий", "музей"]
      answer: "Цей музей тимчасово закритий через ремонт."
    - words: ["лист,", "моїм", "написаний", "Я", "дідусем.", "знайшов"]
      answer: "Я знайшов лист, написаний моїм дідусем."
    - words: ["всіма", "викликала", "Прочитана", "студентами", "дискусію.", "стаття"]
      answer: "Прочитана всіма студентами стаття викликала дискусію."
    - words: ["була", "програма", "Уся", "виконана.", "успішно", "затверджена"]
      answer: "Уся затверджена програма була успішно виконана."
    - words: ["пекарні", "і", "Свіжоспечений", "пахнув.", "хліб", "принесений", "з"]
      answer: "Свіжоспечений і принесений з пекарні хліб пахнув."
    - words: ["в", "Україні", "з", "позначкою", "Зроблено", "важливо.", "Купувати", "речі"]
      answer: "Купувати речі з позначкою Зроблено в Україні важливо."
    - words: ["нашої", "Це", "зроблений", "роботи.", "інструмент", "для", "ідеально"]
      answer: "Це ідеально зроблений інструмент для нашої роботи."

- type: mark-the-words
  title: "Знайдіть дієприкметники"
  instruction: "Знайдіть і позначте всі пасивні дієприкметники минулого часу в цьому тексті."
  text: "На столі лежав написаний від руки конспект. Цей цікавий журнал був прочитаний мною вчора. Ми зайшли у повністю відкритий зал. Це ідеально зроблений інструмент. Мій забутий зошит знайшовся. План був успішно виконаний сьогодні. Цей конфлікт остаточно вирішений нами. На стіні висів яскраво намальований малюнок. Це блискуче зіграний спектакль. Свіжий, щойно спечений хліб дуже смачний."
  answers: ["написаний", "прочитаний", "відкритий", "зроблений", "забутий", "виконаний", "вирішений", "намальований", "зіграний", "спечений"]

- type: cloze
  title: "Заповніть пропуски в тексті"
  instruction: "Оберіть правильне слово для кожного пропуску, щоб відновити правило."
  passage: "Дієприкметник — це форма, яка поєднує ознаки дієслова та {{1}}. Термін {{2}} означає, що предмет зазнав дії. Наприклад, словосполучення {{3}} лист говорить нам про результат. Суфікс {{4}} використовується після голосних, як у слові прочитаний. Після приголосних звуків додаємо суфікс {{5}}, наприклад, зроблений. Односкладові слова отримують закінчення {{6}}, як слово {{7}}. Під час творення слова часто відбувається чергування приголосних, наприклад, звук {{8}} переходить у дж, як у слові {{9}}. А звук с переходить у {{10}}, як у слові {{11}}. Українська мова також має безособові форми на {{12}} та то, наприклад, двері {{13}}. Важливо пам'ятати про граматичне {{14}} з іменником у роді та числі."
  blanks:
    - id: 1
      answer: "прикметника"
      options: ["прикметника", "іменника", "прислівника", "займенника"]
    - id: 2
      answer: "пасивний"
      options: ["пасивний", "активний", "минулий", "майбутній"]
    - id: 3
      answer: "написаний"
      options: ["написаний", "написати", "написуючий", "написавши"]
    - id: 4
      answer: "-ний"
      options: ["-ний", "-ений", "-тий", "-мий"]
    - id: 5
      answer: "-ений"
      options: ["-ений", "-ний", "-тий", "-мий"]
    - id: 6
      answer: "-тий"
      options: ["-тий", "-ний", "-ений", "-мий"]
    - id: 7
      answer: "митий"
      options: ["митий", "прочитаний", "зроблений", "вирішений"]
    - id: 8
      answer: "д"
      options: ["д", "с", "т", "з"]
    - id: 9
      answer: "саджений"
      options: ["саджений", "ношений", "зроблений", "прочитаний"]
    - id: 10
      answer: "ш"
      options: ["ш", "ч", "щ", "ж"]
    - id: 11
      answer: "ношений"
      options: ["ношений", "саджений", "запрошений", "намальований"]
    - id: 12
      answer: "-но"
      options: ["-но", "-ло", "-мо", "-го"]
    - id: 13
      answer: "зачинено"
      options: ["зачинено", "зачинений", "зачинена", "зачинені"]
    - id: 14
      answer: "узгодження"
      options: ["узгодження", "чергування", "правило", "відмінювання"]

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Знайдіть помилку в пасивному дієприкметнику або його узгодженні та виправте її."
  items:
    - sentence: "Ця довга стаття була прочитаний студентами."
      error: "прочитаний"
      answer: "прочитана"
      options: ["прочитана", "прочитане", "прочитані", "прочитати"]
      explanation: "Слово 'стаття' — жіночого роду, тому дієприкметник має бути узгоджений: прочитана."
    - sentence: "Це мій самий любимий фільм."
      error: "любимий"
      answer: "улюблений"
      options: ["улюблений", "люблений", "любитий", "любований"]
      explanation: "Слово 'любимий' є російською калькою. Правильно — улюблений."
    - sentence: "Ми знайшли старий лист, написана моїм другом."
      error: "написана"
      answer: "написаний"
      options: ["написаний", "написане", "написані", "написаному"]
      explanation: "Іменник 'лист' чоловічого роду, тому потрібно використовувати написаний."
    - sentence: "Цей проєкт повністю зроблетий нашою командою."
      error: "зроблетий"
      answer: "зроблений"
      options: ["зроблений", "зробляний", "зробитий", "зробленний"]
      explanation: "Після основи на приголосний додається суфікс '-ений': зроблений."
    - sentence: "Двері в кабінет були закритій цілий день."
      error: "закритій"
      answer: "закриті"
      options: ["закриті", "закрито", "закрита", "закрите"]
      explanation: "Слово 'двері' — множина, тому правильна форма називного відмінка — закриті."
    - sentence: "Наш проєкт — це повністю керуємий процес."
      error: "керуємий"
      answer: "керований"
      options: ["керований", "керуючий", "керуваний", "кероватий"]
      explanation: "Форми на '-мий' є неприродними для української мови. Використовуйте 'керований'."
    - sentence: "Тут росте гарний садений ліс."
      error: "садений"
      answer: "саджений"
      options: ["саджений", "саджаний", "садитий", "саджетий"]
      explanation: "Перед суфіксом '-ений' звук 'д' переходить у 'дж': саджений."
    - sentence: "Вона віддала свій старий, носений одяг."
      error: "носений"
      answer: "ношений"
      options: ["ношений", "ношаний", "носитий", "ношетий"]
      explanation: "Звук 'с' перед суфіксом '-ений' завжди перетворюється на 'ш': ношений."
    - sentence: "Цей будинок збудовата минулого року."
      error: "збудовата"
      answer: "збудований"
      options: ["збудований", "збудована", "збудоване", "збудовані"]
      explanation: "Слово 'будинок' чоловічого роду, основа закінчується на 'а', отже суфікс '-ний': збудований."
    - sentence: "Ваш план роботи успішно виконана."
      error: "виконана"
      answer: "виконаний"
      options: ["виконаний", "виконане", "виконані", "виконуваний"]
      explanation: "Слово 'план' — чоловічого роду, тому дієприкметник має форму виконаний."

- type: fill-in
  title: "Узгодження дієприкметників"
  instruction: "Оберіть правильну форму пасивного дієприкметника для кожного речення."
  items:
    - sentence: "Він знайшов старий, ______ усіма зошит."
      answer: "забутий"
      options: ["забутий", "забута", "забуте", "забуті"]
    - sentence: "На столі лежала щойно ______ книга."
      answer: "прочитана"
      options: ["прочитана", "прочитаний", "прочитане", "прочитані"]
    - sentence: "Ми відчинили ______ вікно, щоб зайшло свіже повітря."
      answer: "закрите"
      options: ["закрите", "закритий", "закрита", "закриті"]
    - sentence: "Усі ______ двері вели до великого коридору."
      answer: "відкриті"
      options: ["відкриті", "відкритий", "відкрита", "відкрите"]
    - sentence: "Це дуже якісний, добре ______ стіл."
      answer: "зроблений"
      options: ["зроблений", "зроблена", "зроблено", "зроблені"]
    - sentence: "У повітрі стояв приємний запах, який давав свіжо ______ луг."
      answer: "скошений"
      options: ["скошений", "скошена", "скошене", "скошені"]
    - sentence: "Святково ______ зал був готовий до церемонії."
      answer: "прикрашений"
      options: ["прикрашений", "прикрашена", "прикрашене", "прикрашені"]
    - sentence: "Кожен ______ гість отримав вітальну листівку."
      answer: "запрошений"
      options: ["запрошений", "запрошена", "запрошене", "запрошені"]
    - sentence: "Ми сховалися від дощу під надійно ______ дах зупинки."
      answer: "критий"
      options: ["критий", "крита", "крите", "криті"]
    - sentence: "На підлозі лежав повністю ______ стакан."
