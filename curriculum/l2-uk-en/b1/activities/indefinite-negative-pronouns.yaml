- type: quiz
  title: Оберіть правильний займенник
  instruction: Прочитайте речення та оберіть найбільш логічний варіант.
  items:
  - question: Учора ввечері нам у двері ________ голосно постукав.
    explanation: Подія відбулася в минулому, факт реальний, тому використовуємо частку
      -сь.
    options:
    - text: хтось
      correct: true
    - text: хто-небудь
      correct: false
    - text: дехто
      correct: false
    - text: ніхто
      correct: false
  - question: Якщо вам подзвонить ________ з журналістів, не давайте коментарів.
    explanation: Умовне речення (якщо), подія гіпотетична, тому -небудь.
    options:
    - text: хто-небудь
      correct: true
    - text: хтось
      correct: false
    - text: дехто
      correct: false
    - text: будь-хто
      correct: false
  - question: Я маю тобі ________ дуже важливе розповісти після роботи.
    explanation: Інформація реальна і конкретна для мовця, тому -сь.
    options:
    - text: щось
      correct: true
    - text: що-небудь
      correct: false
    - text: дещо
      correct: false
    - text: нічого
      correct: false
  - question: На нараді ________ з колег висловили незгоду з новим проєктом.
    explanation: Мова йде про частину групи (підмножину), тому використовуємо префікс
      де-.
    options:
    - text: дехто
      correct: true
    - text: хтось
      correct: false
    - text: хто-небудь
      correct: false
    - text: ніхто
      correct: false
  - question: Чи знає тут ________ японську мову на рівні носія?
    explanation: Питання про наявність людини з гіпотетичними здібностями, тому -небудь.
    options:
    - text: хто-небудь
      correct: true
    - text: хтось
      correct: false
    - text: дехто
      correct: false
    - text: ніхто
      correct: false
  - question: Сьогодні зранку я бачив ________ дивного біля нашого під'їзду.
    explanation: Факт у минулому часі, реальна людина, тому когось.
    options:
    - text: когось
      correct: true
    - text: кого-небудь
      correct: false
    - text: декого
      correct: false
    - text: нікого
      correct: false
  - question: Він сподівається, що ________ допоможе йому з цим важким завданням.
    explanation: Подія стосується майбутнього, агент невідомий, підійде будь-який
      варіант.
    options:
    - text: хто-небудь
      correct: true
    - text: хтось
      correct: false
    - text: дехто
      correct: false
    - text: що-небудь
      correct: false
  - question: У цьому старому звіті є ________ цікаві факти про фінансування.
    explanation: Специфічні деталі з загальної маси виражаються через слово деякі.
    options:
    - text: деякі
      correct: true
    - text: якісь
      correct: false
    - text: які-небудь
      correct: false
    - text: ніякі
      correct: false
- type: fill-in
  title: Заперечні займенники та прийменники
  instruction: Доповніть речення правильним варіантом заперечного займенника.
  items:
  - sentence: Вона була дуже засмучена і не хотіла розмовляти ________.
    answer: ні з ким
    options:
    - ні з ким
    - з ніким
    - нізким
    - ніким
    explanation: Прийменник 'з' вклинюється між часткою 'ні' та займенником 'ким'.
  - sentence: Ця стара таємниця давно вже не цікава ________.
    answer: нікому
    options:
    - нікому
    - нікого
    - ніхто
    - некому
    explanation: Слово 'цікава' вимагає давального відмінка - 'нікому'.
  - sentence: Ми вчора ________ не бачили біля університету.
    answer: нікого
    options:
    - нікого
    - нікому
    - ніхто
    - ніким
    explanation: Дієслово 'бачили' вимагає знахідного відмінка - 'нікого'.
  - sentence: Він дуже самостійний і не чекає допомоги ________.
    answer: ні від кого
    options:
    - ні від кого
    - від нікого
    - ні від кому
    - нікого
    explanation: Прийменник 'від' ставиться між часткою та займенником у родовому
      відмінку.
  - sentence: Цей хлопець нічого не боїться і не вірить ________.
    answer: ні в що
    options:
    - ні в що
    - в ніщо
    - ні в чому
    - нічому
    explanation: Дієслово 'вірити' (в кого/що) вимагає знахідного відмінка з прийменником
      'в', який розщеплює займенник.
  - sentence: У цій порожній кімнаті ________ не було, крім старого стола.
    answer: нічого
    options:
    - нічого
    - ніщо
    - нічому
    - нічим
    explanation: Конструкція 'не було' вимагає родового відмінка (чого немає? - нічого).
  - sentence: Він був дуже обережним і не розповів свій секрет ________.
    answer: нікому
    options:
    - нікому
    - нікого
    - ні з ким
    - ні до кого
    explanation: Дієслово 'розповісти' (кому?) вимагає давального відмінка.
  - sentence: На цих вихідних я не планую йти в гості ________.
    answer: ні до кого
    options:
    - ні до кого
    - до нікого
    - нікого
    - ні від кого
    explanation: Йти (до кого?) - прийменник 'до' розщеплює займенник 'нікого'.
- type: match-up
  title: Знайдіть відповідність
  instruction: З'єднайте початок і кінець речення, звертаючи увагу на логіку.
  pairs:
  - left: Якщо подія вже реально відбулася,
    right: ми обов'язково використовуємо займенник на -сь.
  - left: Якщо об'єкт випадковий або гіпотетичний,
    right: правильно обрати частку -небудь.
  - left: Коли ми говоримо про частину великої групи,
    right: найкраще підійде займенник із префіксом де-.
  - left: Якщо в реченні є займенник ніхто,
    right: дієслово має стояти з часткою не.
  - left: Частка -небудь у всіх відмінках
    right: завжди пишеться через дефіс.
  - left: Прийменник розщеплює заперечний займенник,
    right: тому конструкція пишеться як три окремі слова.
  - left: Фраза 'хтось дзвонив' означає,
    right: що абонент існував фізично, але не назвав себе.
  - left: Фраза 'дехто вважає' ідеально підходить,
    right: для введення контраргументу у формальному стилі.
  - left: Якщо ми не знаємо виконавця події,
    right: ми все одно впевнені, що він фізично існує.
  - left: Конструкція 'ні з ким' демонструє,
    right: як прийменник вклинюється всередину займенника.
  - left: Щоб уникнути помилок при перекладі,
    right: аналізуйте контекст, а не копіюйте англійську граматику.
  - left: Займенник 'дещо' ідеально підійде,
    right: коли ви хочете розповісти про кілька цікавих речей.
- type: true-false
  title: Правда чи брехня
  instruction: Визначте, чи правильним є наведене твердження.
  items:
  - statement: Займенник 'хто-небудь' є точним еквівалентом англійського 'anyone'
      і завжди використовується в питаннях про минуле.
    correct: false
    explanation: У питаннях про фактичні події в минулому використовується 'хтось'.
  - statement: В українській мові обов'язкове подвійне заперечення, тому ми кажемо
      'ніхто не прийшов'.
    correct: true
    explanation: Так, заперечний займенник вимагає заперечної частки 'не' перед дієсловом.
  - statement: Слово 'хтонебудь' пишеться разом, як одне слово.
    correct: false
    explanation: 'Частка -небудь завжди пишеться через дефіс: хто-небудь.'
  - statement: Якщо перед заперечним займенником стоїть прийменник, він вклинюється
      між 'ні' та коренем, наприклад 'ні з ким'.
    correct: true
    explanation: Це правило розщеплення атома, конструкція пишеться як три слова.
  - statement: Фраза 'Дехто з нас піде в кіно' означає, що підуть абсолютно всі.
    correct: false
    explanation: Префікс де- вказує на часткову кількість, тобто піде лише частина
      групи.
  - statement: Форма 'нікому' — це давальний відмінок від займенника 'ніхто'.
    correct: true
    explanation: Так, відмінювання питання кому? — нікому.
  - statement: У реченні 'Я не бачу ніщо' граматика є повністю правильною.
    correct: false
    explanation: 'Дієслово ''бачити'' з запереченням вимагає родового відмінка: ''Я
      не бачу нічого''.'
  - statement: Займенники серії на -сь використовуються для опису реальної, але невідомої
      особи чи речі.
    correct: true
    explanation: Частка -сь завжди вказує на реальний факт або існуючий об'єкт.
- type: unjumble
  title: Побудуйте речення
  instruction: Складіть слова в правильному порядку. Зверніть увагу на розщеплення
    займенників.
  items:
  - words:
    - учора
    - ввечері
    - після
    - роботи
    - ми
    - не
    - зустрічалися
    - ні
    - з
    - ким
    answer: Учора ввечері після роботи ми не зустрічалися ні з ким
  - words:
    - сьогодні
    - зранку
    - хтось
    - невідомий
    - залишив
    - наше
    - велике
    - вікно
    - відкритим
    answer: Сьогодні зранку хтось невідомий залишив наше велике вікно відкритим
  - words:
    - нехай
    - хто-небудь
    - із
    - вашого
    - відділу
    - виконає
    - це
    - важливе
    - завдання
    - завтра
    answer: Нехай хто-небудь із вашого відділу виконає це важливе завдання завтра
  - words:
    - він
    - ні
    - про
    - що
    - не
    - знав
    - але
    - все
    - одно
    - прийшов
    answer: Він ні про що не знав але все одно прийшов
  - words:
    - незважаючи
    - на
    - статистику
    - дехто
    - з
    - експертів
    - має
    - абсолютно
    - іншу
    - думку
    answer: Незважаючи на статистику дехто з експертів має абсолютно іншу думку
  - words:
    - я
    - маю
    - тобі
    - сказати
    - щось
    - дуже
    - важливе
    - про
    - наш
    - новий
    - проєкт
    answer: Я маю тобі сказати щось дуже важливе про наш новий проєкт
- type: error-correction
  title: Знайдіть помилку
  instruction: Знайдіть і виправте граматичну помилку в реченні.
  items:
  - sentence: Вчора хто-небудь дзвонив на мій мобільний телефон.
    error: хто-небудь
    answer: хтось
    error_type: word
    options:
    - хтось
    - дехто
    - ніхто
    - щось
    explanation: Подія відбулася в минулому, факт реальний, тому потрібна частка -сь.
  - sentence: Я так втомився, що не хочу розмовляти з ніким.
    error: з ніким
    answer: ні з ким
    error_type: phrase
    options:
    - ні з ким
    - з кимось
    - ні до кого
    - ніким
    explanation: Прийменник 'з' повинен вклинитися між 'ні' та займенником 'ким'.
  - sentence: Ніхто прийшов на нашу зустріч сьогодні зранку.
    error: прийшов
    answer: не прийшов
    error_type: phrase
    options:
    - не прийшов
    - прийшли
    - прийде
    - не прийдуть
    explanation: 'Українська мова вимагає подвійного заперечення: ніхто не прийшов.'
  - sentence: Скажи мені щось приємне, щоб підняти настрій.
    error: щось
    answer: що-небудь
    error_type: word
    options:
    - що-небудь
    - дещо
    - нічого
    - будь-що
    explanation: У гіпотетичних проханнях або побажаннях правильно використовувати
      -небудь.
  - sentence: На цьому столі я не залишав ніщо цінного.
    error: ніщо
    answer: нічого
    error_type: word
    options:
    - нічого
    - щось
    - нічому
    - нічим
    explanation: Заперечне дієслово 'не залишав' вимагає родового відмінка - нічого.
  - sentence: Я купив цей подарунок для нікого.
    error: для нікого
    answer: ні для кого
    error_type: phrase
    options:
    - ні для кого
    - для когось
    - ні до кого
    - ні від кого
    explanation: Прийменник 'для' розщеплює заперечний займенник, утворюючи три слова.
- type: select
  title: Множинний вибір
  instruction: Оберіть усі правильні варіанти продовження речення. Їх може бути декілька.
  items:
  - question: 'Які займенники можна вставити в речення: ''Чи ти бачив ______ у тій
      кімнаті?'' (ймовірно, людина справді була там).'
    min_correct: 2
    options:
    - text: когось
      correct: true
    - text: кого-небудь
      correct: false
    - text: декого
      correct: true
    - text: нікого
      correct: false
    explanation: Когось вказує на реальну людину, декого - на групу людей. Кого-небудь
      тут нелогічне через реальність факту.
  - question: 'Оберіть правильні форми розщеплення прийменником:'
    min_correct: 3
    options:
    - text: ні з ким
      correct: true
    - text: ні про що
      correct: true
    - text: в нічому
      correct: false
    - text: ні до кого
      correct: true
    - text: з ніким
      correct: false
    explanation: Прийменник завжди розриває префікс ні- та займенник.
  - question: 'Оберіть усі займенники гіпотетичної невизначеності (серія -небудь):'
    min_correct: 2
    options:
    - text: хто-небудь
      correct: true
    - text: що-небудь
      correct: true
    - text: хтось
      correct: false
    - text: деякий
      correct: false
    explanation: Частка -небудь вказує на абсолютну гіпотетичність.
  - question: Які речення є граматично правильними?
    min_correct: 2
    options:
    - text: Ми нічого не знали.
      correct: true
    - text: Ніхто не знає правди.
      correct: true
    - text: Я ні з ким говорив.
      correct: false
    - text: Вона купила ніщо.
      correct: false
    explanation: Правильні речення мають обов'язкове подвійне заперечення.
  - question: Які займенники виражають парціальну кількість (певну частину від цілого)?
    min_correct: 3
    options:
    - text: дехто
      correct: true
    - text: дещо
      correct: true
    - text: деякий
      correct: true
    - text: хтось
      correct: false
    explanation: Префікс де- сигналізує про виокремлення частини з загальної маси.
  - question: У яких реченнях помилково використано англійську кальку замість української
      логіки?
    min_correct: 2
    options:
    - text: Чи хто-небудь дзвонив учора?
      correct: true
    - text: Я бачив ніщо.
      correct: true
    - text: Ніхто не прийшов.
      correct: false
    - text: Хтось залишив двері відкритими.
      correct: false
    explanation: Питання про минуле вимагає 'хтось', а заперечення вимагає форми 'нічого
      не бачив'.
- type: mark-the-words
  title: Аналіз тексту
  instruction: Знайдіть і позначте всі невизначені та заперечні займенники у тексті.
  text: Сьогодні зранку хтось постукав у мої двері. Я відкрив, але там нікого не було.
    Можливо, це був якийсь жарт, або дехто з сусідів помилився квартирою. Я нікому
    не став жалітися, бо не мав часу. Якщо хто-небудь запитає, я нічого не бачив.
  answers:
  - хтось
  - нікого
  - якийсь
  - дехто
  - нікому
  - хто-небудь
  - нічого
- type: cloze
  title: Заповніть пропуски в історії
  instruction: Оберіть правильний займенник для кожного пропуску, враховуючи контекст
    ситуації.
  passage: Одного разу в офісі сталася дивна історія. Зі столу директора зникли {{1}}
    важливі документи. Спочатку він думав, що їх взяв {{2}} із працівників, можливо,
    {{3}} з менеджерів. Він запитав у секретаря, чи вона не бачила {{4}} підозрілого,
    але вона сказала, що {{5}} не заходив. Директор вирішив {{6}} не казати про втрату,
    щоб не викликати паніки. Він сподівався, що {{7}} знайде ці папери пізніше. Але
    минав час, і {{8}} не міг пояснити, як таке могло статися. {{9}} вважали, що це
    конкуренти, але доказів не було {{10}}. Директор не міг поділитися своїми підозрами
    {{11}}. Якщо б {{12}} дізнався про це, міг би вибухнути скандал. Тому він робив
    вигляд, що {{13}} особливого не сталося, хоча в душі сподівався, що документи
    {{14}} знайдуться.
  blanks:
  - id: 1
    answer: деякі
    options:
    - деякі
    - якісь
    - які-небудь
    - ніякі
  - id: 2
    answer: хтось
    options:
    - хтось
    - хто-небудь
    - ніхто
    - дехто
  - id: 3
    answer: дехто
    options:
    - дехто
    - ніхто
    - хтось
    - щось
  - id: 4
    answer: когось
    options:
    - когось
    - кого-небудь
    - нікого
    - кого
  - id: 5
    answer: ніхто
    options:
    - ніхто
    - хтось
    - дехто
