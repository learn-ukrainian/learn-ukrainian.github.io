- type: quiz
  title: "Відносні речення: узгодження сполучного слова"
  instruction: "Оберіть правильну форму слова який або відповідний прислівник."
  items:
    - question: "Як правильно сказати: Це університет, ... я навчаюся?"
      options:
        - text: "у якому"
          correct: true
        - text: "який"
          correct: false
        - text: "в який"
          correct: false
        - text: "якому"
          correct: false
      explanation: "Прийменник у має стояти перед словом якому у місцевому відмінку."
    - question: "До якої частини мови належить сполучне слово який за своїми граматичними властивостями?"
      options:
        - text: "дієслово"
          correct: false
        - text: "прикметник"
          correct: true
        - text: "іменник"
          correct: false
        - text: "прислівник"
          correct: false
      explanation: "Слово який змінюється за родами, числами та відмінками, як прикметник."
    - question: "Яке слово треба вставити: Ми бачили студентку, ... виграла конкурс?"
      options:
        - text: "яка"
          correct: true
        - text: "яку"
          correct: false
        - text: "який"
          correct: false
        - text: "якій"
          correct: false
      explanation: "Студентка (жіночий рід), у підрядному реченні вона є підметом (називний відмінок)."
    - question: "Який варіант є правильним перекладом фрази The project I am responsible for?"
      options:
        - text: "проєкт за який я відповідаю"
          correct: true
        - text: "проєкт який я відповідаю за"
          correct: false
        - text: "проєкт якому я відповідаю"
          correct: false
        - text: "проєкт що я відповідаю за"
          correct: false
      explanation: "Прийменник за повинен стояти перед сполучним словом."
    - question: "Коли ми зазвичай використовуємо відносний прислівник куди?"
      options:
        - text: "для вказівки на напрямок руху"
          correct: true
        - text: "для вказівки на час події"
          correct: false
        - text: "для вказівки на місцезнаходження"
          correct: false
        - text: "для вказівки на причину"
          correct: false
      explanation: "Слово куди вказує на кінцеву точку руху."
    - question: "Оберіть правильне речення з прийменником для слова друзі."
      options:
        - text: "Друзі, з якими я подорожую."
          correct: true
        - text: "Друзі, які я подорожую з."
          correct: false
        - text: "Друзі, якими я подорожую з."
          correct: false
        - text: "Друзі, з якими я подорожує."
          correct: false
      explanation: "Прийменник з стоїть перед орудним відмінком якими."
    - question: "Як правильно завершити речення: Я пам'ятаю день, ... ми познайомилися?"
      options:
        - text: "коли"
          correct: true
        - text: "куди"
          correct: false
        - text: "звідки"
          correct: false
        - text: "який"
          correct: false
      explanation: "Слово коли використовується для вказівки на час події."
    - question: "Яку функцію виконує слово звідки у складному відносному реченні?"
      options:
        - text: "вказує на початкову точку руху"
          correct: true
        - text: "вказує на постійне місцезнаходження"
          correct: false
        - text: "позначає напрямок руху вперед"
          correct: false
        - text: "замінює слово який у називному відмінку"
          correct: false
      explanation: "Слово звідки показує місце походження або початку руху."

- type: quiz
  title: "Підрядні речення мети: інфінітив чи минулий час?"
  instruction: "Оберіть правильну форму для вираження мети."
  items:
    - question: "Що ми використовуємо після слова щоб, якщо суб'єкт дії один і той самий?"
      options:
        - text: "інфінітив"
          correct: true
        - text: "минулий час"
          correct: false
        - text: "майбутній час"
          correct: false
        - text: "теперішній час"
          correct: false
      explanation: "Якщо суб'єкт однаковий, використовується конструкція щоб + інфінітив."
    - question: "Як правильно перекласти речення: I bought a book for you to read?"
      options:
        - text: "Я купив книгу щоб ти читав."
          correct: true
        - text: "Я купив книгу щоб ти читати."
          correct: false
        - text: "Я купив книгу щоб тебе читати."
          correct: false
        - text: "Я купив книгу для тебе читати."
          correct: false
      explanation: "Суб'єкти різні (я купив, ти читаєш), тому щоб + минулий час."
    - question: "Яке речення є граматично правильним варіантом вираження мети?"
      options:
        - text: "Він працює щоб купити машину."
          correct: true
        - text: "Він працює щоб купить машину."
          correct: false
        - text: "Він працює щоб купує машину."
          correct: false
        - text: "Він працює щоб він купив машину."
          correct: false
      explanation: "Один суб'єкт (він працює і купує), тому використовуємо інфінітив."
    - question: "Яку форму дієслова треба використати: Мама просить, щоб син ... кімнату?"
      options:
        - text: "прибрав"
          correct: true
        - text: "прибрати"
          correct: false
        - text: "прибирає"
          correct: false
        - text: "прибере"
          correct: false
      explanation: "Різні суб'єкти (мама просить, син прибирає), тому потрібен минулий час."
    - question: "Чому після слова щоб не можна використовувати теперішній час (для різних суб'єктів)?"
      options:
        - text: "через історичну частку би у слові щоб"
          correct: true
        - text: "бо так звучить краще"
          correct: false
        - text: "бо це правило англійської мови"
          correct: false
        - text: "через вплив російської мови"
          correct: false
      explanation: "Слово щоб містить у собі умовну частку, яка вимагає минулого часу."
    - question: "Оберіть правильний варіант для речення: Я відчиняю вікно, щоб кімната ..."
      options:
        - text: "провітрилася"
          correct: true
        - text: "провітрити"
          correct: false
        - text: "провітрюється"
          correct: false
        - text: "провітриться"
          correct: false
      explanation: "Кімната — це новий суб'єкт (жіночий рід), тому потрібен минулий час (провітрилася)."
    - question: "Який сполучник використовується для вираження простого наслідку (результату), а не мети?"
      options:
        - text: "так що"
          correct: true
        - text: "щоб"
          correct: false
        - text: "для того щоб"
          correct: false
        - text: "аби"
          correct: false
      explanation: "Сполучник так що констатує факт, а не намір."
    - question: "Що є головною відмінністю між метою та наслідком у складних реченнях?"
      options:
        - text: "мета передбачає усвідомлений намір"
          correct: true
        - text: "мета це завжди подія в минулому"
          correct: false
        - text: "наслідок це завжди подія в майбутньому"
          correct: false
        - text: "наслідок вимагає використання інфінітива"
          correct: false
      explanation: "Мета показує намір діяти, а наслідок лише констатує результат."

- type: fill-in
  title: "Умовні речення: якщо чи якби?"
  instruction: "Вставте правильний сполучник для реальної або ірреальної умови."
  items:
    - sentence: "_____ ми закінчимо роботу сьогодні, завтра будемо відпочивати."
      answer: "Якщо"
      options:
        - "Якщо"
        - "Якби"
        - "Щоб"
        - "Коли"
    - sentence: "_____ я знав про це вчора, я б прийшов на зустріч."
      answer: "Якби"
      options:
        - "Якби"
        - "Якщо"
        - "Щоб"
        - "Бо"
    - sentence: "Я б із задоволенням поїхав з вами, _____ у мене був час."
      answer: "якби"
      options:
        - "якби"
        - "якщо"
        - "щоб"
        - "коли"
    - sentence: "_____ завтра піде дощ, ми залишимося вдома і будемо читати."
      answer: "Якщо"
      options:
        - "Якщо"
        - "Якби"
        - "Дарма що"
        - "Хоча"
    - sentence: "Ми встигнемо на потяг, _____ ти будеш збиратися швидше."
      answer: "якщо"
      options:
        - "якщо"
        - "якби"
        - "що"
        - "щоб"
    - sentence: "_____ вони запитали мою думку, я б порадив інший варіант."
      answer: "Якби"
      options:
        - "Якби"
        - "Якщо"
        - "Тому що"
        - "Щоб"
    - sentence: "Він купить новий телефон, _____ отримає хорошу премію цього місяця."
      answer: "якщо"
      options:
        - "якщо"
        - "якби"
        - "коли б"
        - "щоб"
    - sentence: "_____ я мав крила, я б полетів високо в небо."
      answer: "Якби"
      options:
        - "Якби"
        - "Якщо"
        - "Що"
        - "Щоб"

- type: error-correction
  title: "Виправте помилки: позиція прийменника"
  instruction: "Знайдіть і виправте англійську кальку відірваного прийменника."
  items:
    - sentence: "Це будинок, який я живу в."
      error: "який я живу в"
      answer: "у якому я живу"
      error_type: "phrase"
      options:
        - "у якому я живу"
        - "в який я живу"
        - "який я в живу"
        - "де я живу в"
      explanation: "Прийменник повинен стояти перед сполучним словом у місцевому відмінку."
    - sentence: "Люди, які ми працюємо з, дуже талановиті."
      error: "які ми працюємо з"
      answer: "з якими ми працюємо"
      error_type: "phrase"
      options:
        - "з якими ми працюємо"
        - "які з ми працюємо"
        - "з які ми працюємо"
        - "якими ми працюємо з"
      explanation: "Прийменник з ставиться перед словом якими (орудний відмінок)."
    - sentence: "Проблема, яку ми говорили про, вирішена."
      error: "яку ми говорили про"
      answer: "про яку ми говорили"
      error_type: "phrase"
      options:
        - "про яку ми говорили"
        - "про якій ми говорили"
        - "яку ми про говорили"
        - "якій ми говорили про"
      explanation: "Прийменник про має стояти перед словом яку (знахідний відмінок)."
    - sentence: "Проєкт, який вона відповідає за, успішно завершено."
      error: "який вона відповідає за"
      answer: "за який вона відповідає"
      error_type: "phrase"
      options:
        - "за який вона відповідає"
        - "який вона за відповідає"
        - "за якому вона відповідає"
        - "яким вона відповідає за"
      explanation: "Прийменник за ставиться перед словом який."
    - sentence: "Книга, яку я шукав інформацію в, лежить на столі."
      error: "яку я шукав інформацію в"
      answer: "в якій я шукав інформацію"
      error_type: "phrase"
      options:
        - "в якій я шукав інформацію"
        - "у яку я шукав інформацію"
        - "яку я в шукав інформацію"
        - "якій я шукав інформацію в"
      explanation: "Прийменник в ставиться перед словом якій (місцевий відмінок)."
    - sentence: "Конференція, яку я готувався до, пройшла чудово."
      error: "яку я готувався до"
      answer: "до якої я готувався"
      error_type: "phrase"
      options:
        - "до якої я готувався"
        - "яку до я готувався"
        - "до яку я готувався"
        - "якій я готувався до"
      explanation: "Прийменник до вимагає родового відмінка і стоїть перед словом."

- type: error-correction
  title: "Виправте помилки: гіпотетичні умови"
  instruction: "Знайдіть помилку у побудові гіпотетичної умови або мети."
  items:
    - sentence: "Якщо я був би тобою, я б не робив цього."
      error: "Якщо я був би"
      answer: "Якби я був"
      error_type: "phrase"
      options:
        - "Якби я був"
        - "Якщо я був"
        - "Якби я був би"
        - "Якщо б я був"
      explanation: "Сполучник якщо не поєднується з часткою би. Треба використовувати якби."
    - sentence: "Ми би приїхали, якщо б мали машину."
      error: "якщо б"
      answer: "якби"
      error_type: "word"
      options:
        - "якби"
        - "щоб"
        - "якщо"
        - "коли"
      explanation: "У гіпотетичних умовах замість якщо б використовується одне слово якби."
    - sentence: "Якби я маю більше грошей, я б купив дім."
      error: "маю"
      answer: "мав"
      error_type: "word"
      options:
        - "мав"
        - "матиму"
        - "мати"
        - "маючи"
      explanation: "Після якби завжди використовується дієслово в минулому часі."
    - sentence: "Я хочу, щоб ти читаєш цю статтю."
      error: "читаєш"
      answer: "прочитав"
      error_type: "word"
      options:
        - "прочитав"
        - "читати"
        - "читав би"
        - "будеш читати"
      explanation: "Різні суб'єкти вимагають форми минулого часу після сполучника щоб."
    - sentence: "Вона вчиться, щоб отримала диплом."
      error: "отримала"
      answer: "отримати"
      error_type: "word"
      options:
        - "отримати"
        - "отримує"
        - "отримає"
        - "отримавши"
      explanation: "Один суб'єкт в обох частинах речення вимагає інфінітива після щоб."
    - sentence: "Якби завтра буде дощ, ми залишимося вдома."
      error: "Якби"
      answer: "Якщо"
      error_type: "word"
      options:
        - "Якщо"
        - "Щоб"
        - "Бо"
        - "Коли б"
      explanation: "Для реальних планів на майбутнє використовується сполучник якщо."

