- type: quiz
  title: 'Перевірте розуміння аналітичних термінів'
  instruction: 'Виберіть правильне визначення для кожного лінгвістичного терміна.'
  items:
    - question: 'Що означає термін «контекст» у вивченні мови?'
      explanation: 'Контекст — це мовне оточення слова, яке визначає його конкретне значення в цій ситуації.'
      options:
        - text: 'безпосереднє мовне оточення слова'
          correct: true
        - text: 'спосіб вимови слова'
          correct: false
        - text: 'граматичний рід іменника'
          correct: false
        - text: 'список слів у словнику'
          correct: false
    - question: 'Яку функцію виконує «маркер» у граматиці?'
      explanation: 'Маркер — це сигнал (слово або закінчення), який чітко вказує на певний граматичний час, рід чи відмінок.'
      options:
        - text: 'вказує на певне граматичне явище'
          correct: true
        - text: 'закреслює неправильне слово'
          correct: false
        - text: 'перекладає слово англійською'
          correct: false
        - text: 'змінює лексичне значення слова'
          correct: false
    - question: 'Що таке «аспектуальна пара» в українській мові?'
      explanation: 'Аспектуальна пара — це зв''язок між доконаним і недоконаним видом одного дієслова (читати — прочитати).'
      options:
        - text: 'зв''язок доконаного і недоконаного видів'
          correct: true
        - text: 'два слова з протилежним значенням'
          correct: false
        - text: 'пара іменників одного роду'
          correct: false
        - text: 'синоніми з різних мов'
          correct: false
    - question: 'Яка головна ознака «формальної мови»?'
      explanation: 'Формальна мова — це сухий, точний, безособовий стиль офіційних документів та заяв.'
      options:
        - text: 'точність і відсутність емоцій'
          correct: true
        - text: 'використання сленгу та жартів'
          correct: false
        - text: 'багато емоційних вигуків'
          correct: false
        - text: 'спілкування з близькими друзями'
          correct: false
    - question: 'Як можна пояснити значення терміна «метамова» в лінгвістиці?'
      explanation: 'Метамова — це мова, яку ми використовуємо для опису та пояснення іншої мови (наприклад, граматичні терміни).'
      options:
        - text: 'мова для опису самої мови'
          correct: true
        - text: 'мова жестів і міміки'
          correct: false
        - text: 'давня мертва мова'
          correct: false
        - text: 'мова програмування'
          correct: false
    - question: 'Що показує «частота» вживання слова?'
      explanation: 'Частота показує, наскільки регулярно носії мови використовують це слово в реальному житті.'
      options:
        - text: 'як часто носії вживають слово'
          correct: true
        - text: 'скільки літер у цьому слові'
          correct: false
        - text: 'як швидко треба вимовляти слово'
          correct: false
        - text: 'наскільки складним є слово'
          correct: false
    - question: 'Яка частина слова несе його головне лексичне значення?'
      explanation: 'Корінь — це ядро слова, яке містить його основний зміст (наприклад, -ліс- у словах ліс, лісовий).'
      options:
        - text: 'корінь'
          correct: true
        - text: 'закінчення'
          correct: false
        - text: 'суфікс'
          correct: false
        - text: 'префікс'
          correct: false
    - question: 'Для чого використовується «закінчення» слова?'
      explanation: 'Закінчення служить для зв''язку слів у реченні, показуючи рід, число та відмінок.'
      options:
        - text: 'для зв''язку слів у реченні'
          correct: true
        - text: 'для створення нових коренів'
          correct: false
        - text: 'для зміни лексичного значення'
          correct: false
        - text: 'для позначення наголосу'
          correct: false

- type: match-up
  title: 'Інструкції та їх значення'
  instruction: 'З''єднайте дієслово-інструкцію або термін з описом дії, яку потрібно виконати або зрозуміти.'
  pairs:
    - left: 'Виберіть'
      right: 'Вказати один правильний варіант зі списку'
    - left: 'Знайдіть'
      right: 'Побачити конкретний елемент у тексті'
    - left: 'З''єднайте'
      right: 'Встановити логічний зв''язок між колонками'
    - left: 'Доповніть'
      right: 'Вписати пропущене слово або закінчення'
    - left: 'Утворіть'
      right: 'Створити нову граматичну форму слова'
    - left: 'Перекладіть'
      right: 'Передати зміст іншою мовою'
    - left: 'Натисніть'
      right: 'Зробити клік мишкою або доторк до екрана'
    - left: 'Введіть'
      right: 'Набрати текст на клавіатурі'
    - left: 'Зверніть увагу'
      right: 'Сфокусуватися на важливій деталі'
    - left: 'Запам''ятайте'
      right: 'Вивчити інформацію напам''ять'
    - left: 'Наприклад'
      right: 'Ввести ілюстрацію правила'
    - left: 'Тобто'
      right: 'Пояснити іншими словами'
    - left: 'Отже'
      right: 'Зробити логічний висновок'
    - left: 'На відміну від'
      right: 'Показати контраст між явищами'
    - left: 'Подібно до'
      right: 'Створити асоціацію за схожістю'
    - left: 'Складіть'
      right: 'Сконструювати нову одиницю мови'

- type: fill-in
  title: 'Граматичні пояснення'
  instruction: 'Доповніть речення, які пояснюють граматичні правила, використовуючи правильні слова-коннектори та дієслова.'
  items:
    - sentence: 'Іменник — це частина мови, ___ називає предмет.'
      answer: 'яка'
      options: ['яка', 'який', 'яке', 'які']
      explanation: 'Іменник (частина мови) — це вона (жіночий рід), тому використовуємо займенник «яка».'
    - sentence: 'Префікс стоїть перед коренем і ___ для утворення нових слів.'
      answer: 'служить'
      options: ['служить', 'працює', 'робить', 'стоїть']
      explanation: 'У науковому стилі ми кажемо, що частина слова «служить для» певної функції.'
    - sentence: 'Цей термін ___ рідко в розмовній мові.'
      answer: 'вживається'
      options: ['вживається', 'говорить', 'пишеться', 'читається']
      explanation: 'Термін «вживається» (або використовується) є стандартним для опису частоти.'
    - sentence: 'Закінчення -а в цьому слові ___, що це жіночий рід.'
      answer: 'показує'
      options: ['показує', 'бачить', 'знає', 'робить']
      explanation: 'Граматичні маркери «показують» (indicate/show) певну характеристику.'
    - sentence: 'Доконаний вид, ___ від недоконаного, фокусується на результаті.'
      answer: 'на відміну'
      options: ['на відміну', 'проти', 'разом', 'окрім']
      explanation: 'Конструкція «на відміну від» (unlike) використовується для контрасту.'
    - sentence: 'Це слово змінюється за відмінками ___, як і займенник «мій».'
      answer: 'так само'
      options: ['так само', 'схоже', 'однаково', 'рівно']
      explanation: 'Фраза «так само, як» (just like) вказує на ідентичність граматичної поведінки.'
    - sentence: 'Ми додали закінчення, ___ це форма множини.'
      answer: 'отже'
      options: ['отже', 'тому', 'але', 'бо']
      explanation: 'Слово «отже» (therefore) вводить логічний висновок.'
    - sentence: 'Синоніми — це слова, близькі за значенням, ___, «гарний» і «красивий».'
      answer: 'наприклад'
      options: ['наприклад', 'тобто', 'отже', 'проте']
      explanation: 'Слово «наприклад» вводить ілюстрацію до правила.'

- type: group-sort
  title: 'Категорії термінів'
  instruction: 'Розподіліть слова за категоріями: будова слова, стиль мовлення, або аналітичні інструменти.'
  groups:
    - name: 'Будова слова'
      items: ['корінь', 'префікс', 'суфікс', 'основа', 'закінчення']
    - name: 'Стиль і Регістр'
      items: ['формальна мова', 'розмовний стиль', 'літературна мова', 'офіційний стиль', 'сленг']
    - name: 'Аналітичні терміни'
      items: ['контекст', 'маркер', 'частота', 'аспектуальна пара', 'метамова']

- type: true-false
  title: 'Правда чи міф про мову?'
  instruction: 'Визначте, чи є ці твердження правильними відповідно до матеріалу уроку.'
  items:
    - statement: 'Українська граматична термінологія не має жодних аналогів у інших мовах.'
      correct: false
      explanation: 'Це міф. Багато категорій (рід, число, час) є універсальними для багатьох мов.'
    - statement: 'Слово «отже» зазвичай стоїть на початку речення і виділяється комою.'
      correct: true
      explanation: 'Так, «отже» використовується для підсумку і відокремлюється комою.'
    - statement: 'Інструкція «Знайдіть» означає, що треба вибрати один правильний варіант зі списку.'
      correct: false
      explanation: 'Ні, «Знайдіть» означає пошук елемента в тексті. Вибір варіанта — це «Виберіть».'
    - statement: '«Метамова» — це мова, якою ми описуємо граматичні правила.'
      correct: true
      explanation: 'Саме так, це використання мови для опису самої мови.'
    - statement: 'Слово «значити» і «означати» — це повні синоніми в науковому стилі.'
      correct: false
      explanation: 'Ні. Для дефініцій ми використовуємо «означає». «Значити» має інший відтінок (мати вагу).'
    - statement: 'Корінь слова несе його головне лексичне значення.'
      correct: true
      explanation: 'Корінь є ядром слова, яке містить його основний зміст.'
    - statement: 'У формальній мові доречно використовувати емоційні вигуки та сленг.'
      correct: false
      explanation: 'Формальна мова суха, точна і позбавлена емоцій.'
    - statement: 'Стрілка (→) у граматичних поясненнях часто замінює слова «означає» або «утворює».'
      correct: true
      explanation: 'Символи часто використовуються для візуалізації правил.'
    - statement: 'Суфікс стоїть перед коренем слова.'
      correct: false
      explanation: 'Ні, суфікс стоїть після кореня. Перед коренем стоїть префікс.'
    - statement: 'Конструкція «на відміну від» вимагає після себе родового відмінка.'
      correct: true
      explanation: 'Так, після «на відміну від» іменник має бути в родовому відмінку (кого? чого?).'

- type: mark-the-words
  title: 'Знайдіть дієслова-інструкції'
  instruction: 'Знайдіть та виділіть усі дієслова в наказовому способі (інструкції) у тексті.'
  text: 'Прочитайте текст уважно. Знайдіть у ньому незнайомі слова. Спробуйте зрозуміти їх з контексту. Потім перекладіть речення українською мовою. Запишіть нові слова у свій словник і вивчіть їх напам''ять. Порівняйте свої відповіді з відповідями партнера. Виберіть три найцікавіші слова та складіть з ними короткі речення. Зверніть увагу на наголоси. Доповніть таблицю прикладами.'
  answers: ['Прочитайте', 'Знайдіть', 'Спробуйте', 'перекладіть', 'Запишіть', 'вивчіть', 'Порівняйте', 'Виберіть', 'складіть', 'Зверніть', 'Доповніть']

- type: error-correction
  title: 'Виправте мовні помилки'
  instruction: 'Знайдіть та виправте лексичні або стилістичні помилки в реченнях.'
  items:
    - sentence: 'Я приймаю участь у науковій конференції.'
      error: 'приймаю участь'
      answer: 'беру участь'
      options: ['беру участь', 'маю участь', 'роблю участь', 'веду участь']
      explanation: '«Приймати участь» — це калька. Правильно українською: «брати участь».'
    - sentence: 'Що це слово значить англійською?'
      error: 'значить'
      answer: 'означає'
      options: ['означає', 'розуміє', 'важить', 'коштує']
      explanation: 'Коли ми питаємо про зміст або переклад, вживаємо слово «означає».'
    - sentence: 'Ці слова є виключеннями з цього правила.'
      error: 'виключеннями'
      answer: 'винятками'
      options: ['винятками', 'виділеннями', 'відхиленнями', 'вилученнями']
      explanation: '«Виключення» у значенні «exception» — це калька з російської. Правильно українською: «виняток» (множина: «винятки»).'
    - sentence: 'В листі до директора я написав «Привіт».'
      error: 'Привіт'
      answer: 'Вітаю'
      options: ['Вітаю', 'Здоров', 'Хай', 'Салют']
      explanation: '«Привіт» — це розмовний стиль. У формальному листуванні слід вживати «Вітаю» або «Шановний...».'
    - sentence: 'Зверніть увагу на закінчення слово.'
      error: 'слово'
      answer: 'слова'
      options: ['слова', 'слову', 'словом', 'слові']
      explanation: 'Іменник після «закінчення» (кого? чого?) має бути в родовому відмінку: закінчення слова.'
    - sentence: 'На відміну англійської, тут є три роди.'
      error: 'відміну'
      answer: 'відміну від'
      options: ['відміну від', 'відміну з', 'відміну до', 'відміну про']
      explanation: 'Правильна прийменникова конструкція — «на відміну від».'
