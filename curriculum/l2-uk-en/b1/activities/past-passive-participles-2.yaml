    - left: "Майстер пофарбував стіну."
      right: "Стіну пофарбовано."
    - left: "Комісія перевірила роботу."
      right: "Роботу перевірено."
    - left: "Директор підписав наказ."
      right: "Наказ підписано."
    - left: "Хтось відчинив двері."
      right: "Двері відчинено."
