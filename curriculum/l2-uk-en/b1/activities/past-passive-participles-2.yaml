- type: fill-in
  title: "Від повної форми до короткої"
  instruction: "Оберіть правильну коротку форму пасивного дієприкметника."
  items:
    - sentence: "Цей проєкт успішно (завершено)."
      answer: "завершено"
      options:
        - "завершено"
        - "завершений"
        - "завершувано"
        - "завершити"
    - sentence: "Двері магазину (зачинено) на ремонт."
      answer: "зачинено"
      options:
        - "зачинено"
        - "зачинені"
        - "зачиняти"
        - "зачиняються"
    - sentence: "Рішення суду (прийнято) вчора."
      answer: "прийнято"
      options:
        - "прийнято"
        - "прийнятий"
        - "приймати"
        - "прийняли"
    - sentence: "Нову статтю вже (написано)."
      answer: "написано"
      options:
        - "написано"
        - "написана"
        - "написаний"
        - "писати"
    - sentence: "Важливий документ (підписано) директором."
      answer: "підписано"
      options:
        - "підписано"
        - "підписаний"
        - "підписувати"
        - "підписали"
    - sentence: "Стіну у вітальні (пофарбовано) в білий колір."
      answer: "пофарбовано"
      options:
        - "пофарбовано"
        - "пофарбована"
        - "пофарбувати"
        - "фарбовано"
    - sentence: "Доступ до цієї інформації (заборонено)."
      answer: "заборонено"
      options:
        - "заборонено"
        - "заборонений"
        - "заборонити"
        - "забороняють"
    - sentence: "Роботу над цим завданням повністю (зроблено)."
      answer: "зроблено"
      options:
        - "зроблено"
        - "зроблена"
        - "зроблений"
        - "зробити"

