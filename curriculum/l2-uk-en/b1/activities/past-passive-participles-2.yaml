- type: true-false
  title: "Правила вживання коротких форм"
  instruction: "Визначте, чи є твердження правильним."
  items:
    - statement: "Короткі форми на -но/-то утворюються від дієслів недоконаного виду."
      correct: false
      explanation: "Вони утворюються винятково від дієслів доконаного виду."
    - statement: "У безособовому реченні з формою на -но/-то немає підмета."
      correct: true
      explanation: "Саме тому ці речення називаються безособовими."
    - statement: "Об'єкт у реченнях з короткою формою стоїть у Називному відмінку."
      correct: false
      explanation: "Об'єкт дії залишається прямим об'єктом і стоїть у Знахідному відмінку."
    - statement: "Форма 'зроблено' означає актуальний результат у теперішньому часі."
      correct: true
      explanation: "Ця форма фіксує поточний стан, який є результатом минулої дії."
    - statement: "В офіційно-діловому стилі часто уникають безособових форм."
      correct: false
      explanation: "Навпаки, офіційно-діловий стиль обожнює ці форми за їхню об'єктивність."
    - statement: "Коротка форма пасивного дієприкметника змінюється за родами."
      correct: false
      explanation: "Коротка форма є незмінною."
    - statement: "Після слова 'дозволено' зазвичай використовується дієслово в інфінітиві."
      correct: true
      explanation: "Наприклад: дозволено паркуватися, заборонено палити."
    - statement: "Слово 'відчинено' утворено за допомогою суфікса -то."
      correct: false
      explanation: "Воно закінчується на -но, а от слово 'відкрито' має суфікс -то."

- type: mark-the-words
  title: "Знайдіть результативні форми"
  instruction: "Позначте всі короткі форми пасивних дієприкметників у тексті."
  text: "Виставку сучасного мистецтва відкрито для відвідувачів. Усі картини розвішано у великому залі. Спеціальне освітлення налаштовано для кожної роботи. Торкатися експонатів руками суворо заборонено. Офіційну програму заходу успішно завершено."
  answers:
    - "відкрито"
    - "розвішано"
    - "налаштовано"
    - "заборонено"
    - "завершено"

