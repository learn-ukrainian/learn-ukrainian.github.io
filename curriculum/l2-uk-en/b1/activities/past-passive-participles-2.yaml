        - "заборонено"
        - "пофарбовано"

- type: quiz
  title: "Опис стану чи фіксація факту?"
  instruction: "Оберіть правильну відповідь на запитання."
  items:
    - question: "Яке речення просто описує поточний фізичний стан дверей?"
      explanation: "Повний дієприкметник (зачинені) описує фізичну властивість або стан."
      options:
        - text: "Двері зачинені."
          correct: true
        - text: "Двері зачинено."
          correct: false
        - text: "Двері зачиняються."
          correct: false
        - text: "Двері зачиняли."
          correct: false
    - question: "Яке речення фокусується на результаті завершеної дії та звучить як офіційне оголошення?"
      explanation: "Коротка форма (відчинено) фокусується на факті та результаті."
      options:
        - text: "Кафе відчинено."
          correct: true
        - text: "Кафе відчинене."
          correct: false
        - text: "Кафе відчиняється."
          correct: false
        - text: "Кафе відчиняли."
          correct: false
    - question: "У якому реченні правильно використано Знахідний відмінок об'єкта?"
      explanation: "Коротка форма вимагає Знахідного відмінка: (цю книгу)."
      options:
        - text: "Цю книгу написано давно."
          correct: true
        - text: "Ця книга написано давно."
          correct: false
        - text: "Цій книзі написано давно."
          correct: false
        - text: "Цієї книги написано давно."
          correct: false
    - question: "Яке допоміжне дієслово Є ЗАЙВИМ у реченні про теперішній результат 'Роботу було зроблено'?"
      explanation: "Для теперішнього результату дієслово (було) не потрібне: (Роботу зроблено)."
      options:
        - text: "було"
          correct: true
        - text: "роботу"
          correct: false
        - text: "зроблено"
          correct: false
        - text: "немає зайвих слів"
          correct: false
    - question: "Від якої основи дієслова утворюються короткі форми на -но/-то?"
      explanation: "Вони утворюються тільки від дієслів доконаного виду (завершена дія)."
      options:
        - text: "Від доконаного виду"
          correct: true
        - text: "Від недоконаного виду"
          correct: false
        - text: "Від обох видів"
          correct: false
        - text: "Тільки від дієслів руху"
          correct: false
    - question: "Яке з цих слів утворено за допомогою суфікса -то?"
      explanation: "Відкрито (від дієслова відкрити) має суфікс -то."
      options:
        - text: "відкрито"
          correct: true
        - text: "зроблено"
          correct: false
        - text: "написано"
          correct: false
        - text: "заборонено"
          correct: false
    - question: "Для якого стилю української мови найбільш характерні безособові форми на -но/-то?"
      explanation: "Вони часто використовуються в офіційно-діловому стилі для об'єктивності."
      options:
        - text: "Офіційно-діловий"
          correct: true
        - text: "Художній"
          correct: false
        - text: "Розмовний"
          correct: false
        - text: "Поетичний"
          correct: false
    - question: "Що ми зазвичай ставимо після слова 'дозволено' у правилах?"
      explanation: "Наприклад: дозволено (що робити?) користуватися."
      options:
        - text: "Інфінітив дієслова"
          correct: true
        - text: "Іменник у Називному відмінку"
          correct: false
        - text: "Прикметник"
          correct: false
        - text: "Займенник"
          correct: false

- type: unjumble
  title: "Синтаксичний зсув: складіть речення"
  instruction: "Складіть безособові речення. Зверніть увагу на відмінок об'єкта."
  items:
    - words:
        - "Цю"
        - "статтю"
        - "написано"
        - "вчора"
      answer: "Цю статтю написано вчора"
    - words:
        - "Роботу"
        - "успішно"
        - "зроблено"
        - "вчасно"
      answer: "Роботу успішно зроблено вчасно"
    - words:
        - "Нову"
        - "програму"
        - "встановлено"
        - "швидко"
      answer: "Нову програму встановлено швидко"
    - words:
        - "Важливе"
        - "рішення"
        - "прийнято"
        - "одноголосно"
      answer: "Важливе рішення прийнято одноголосно"
    - words:
        - "Вхід"
        - "стороннім"
        - "особам"
        - "заборонено"
      answer: "Вхід стороннім особам заборонено"
    - words:
        - "Усі"
        - "картини"
        - "розвішано"
        - "по"
        - "залах"
      answer: "Усі картини розвішано по залах"

- type: error-correction
  title: "Лабораторія помилок: знайдіть і виправте"
  instruction: "Виправте граматичні помилки в реченнях."
  items:
    - sentence: "Ця книга написано дуже цікаво."
      error: "Ця книга"
      answer: "Цю книгу"
      error_type: "construction"
      options:
        - "Цю книгу"
        - "Цієї книги"
        - "Цій книзі"
        - "Цією книгою"
      explanation: "Безособова форма на -но/-то вимагає прямого об'єкта у Знахідному відмінку."
    - sentence: "Двері було зачинено п'ять хвилин тому."
      error: "було зачинено"
      answer: "зачинено"
      error_type: "phrase"
      options:
        - "зачинено"
        - "зачинені"
        - "зачиняли"
        - "зачиняться"
      explanation: "Для фіксації поточного результату допоміжне дієслово не потрібне."
    - sentence: "Нова школа збудовано минулого року."
      error: "Нова школа"
      answer: "Нову школу"
      error_type: "construction"
      options:
        - "Нову школу"
        - "Нової школи"
        - "Новій школі"
        - "Новою школою"
      explanation: "Об'єкт у безособовому реченні має стояти у Знахідному відмінку."
    - sentence: "Лист писано чорнилом."
      error: "писано"
      answer: "написано"
      error_type: "word"
      options:
        - "написано"
        - "писати"
        - "написати"
        - "писаний"
      explanation: "Короткі форми утворюються лише від дієслів доконаного виду."
    - sentence: "Цю роботу роблено дуже довго."
      error: "роблено"
      answer: "зроблено"
      error_type: "word"
      options:
        - "зроблено"
        - "робити"
        - "зробити"
        - "роблений"
      explanation: "Необхідно використовувати дієслова доконаного виду."
    - sentence: "Стаття опубліковано у вчорашній газеті."
      error: "Стаття"
      answer: "Статтю"
      error_type: "construction"
      options:
        - "Статтю"
        - "Статті"
        - "Статтею"
        - "Статтям"
      explanation: "Об'єкт дії після короткої форми має форму Знахідного відмінка."

