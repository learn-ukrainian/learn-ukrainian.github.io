version: '1.0'
module: checkpoint-aspect
level: b1
inline:
- id: quiz
  type: quiz
  instruction: Визначте аспектну функцію дієслова (тло, подія, результат, тривалість)
  items:
  - question: 'У реченні «Діти **гралися** у дворі» дієслово означає:'
    options:
    - тло розповіді (background)
    - результат дії (result)
    - одноразову подію (single event)
    - коротку команду (short command)
    correct: 0
  - question: 'У реченні «Я **прочитав** цю книгу вчора» дієслово вказує на:'
    options:
    - досягнутий результат (achieved result)
    - тривалий процес (ongoing process)
    - нереалізований результат (unrealized result)
    - звичку в минулому (past habit)
    correct: 0
  - question: Яке з цих дієслів ідеально підходить для опису **послідовності подій**
      (event chain)?
    options:
    - доконаний вид (perfective)
    - недоконаний вид (imperfective)
    - дієслово-зв'язка «бути» (copula)
    - складна форма майбутнього часу
    correct: 0
  - question: Яку функцію виконує дієслово в реченні «Він завжди **купував** хліб
      у цьому магазині»?
    options:
    - регулярна дія в минулому (regular past action)
    - раптова подія (sudden event)
    - чіткий фінальний результат (final result)
    - попередження про небезпеку (warning)
    correct: 0
  - question: 'У складному реченні «Коли ми **снідали**, зателефонувала бабуся», дієслово
      «снідали» є:'
    options:
    - тлом розповіді (narrative background)
    - головною раптовою подією (sudden event)
    - нереалізованим результатом (unrealized result)
    - суворою забороною (strict prohibition)
    correct: 0
  - question: Чому у фразі «Я **не прочитав** цей текст» використано доконаний вид?
    options:
    - бо це нереалізований результат (очікування не виконано)
    - бо дія взагалі ніколи не існувала (чистий факт)
    - бо це стандартна заборона на майбутнє
    - бо це загальна звичка в минулому часі
    correct: 0
- id: fill-in
  type: fill-in
  instruction: Оберіть правильний вид дієслова у контексті
  items:
  - sentence: Вона довго _____ це складне завдання, але так і не закінчила.
    answer: робила
    options:
    - робила
    - зробила
    - робитиме
    - зробить
  - sentence: Завтра я обов'язково _____ цей важливий лист і відправлю його.
    answer: напишу
    options:
    - напишу
    - писатиму
    - писав
    - буду писати
  - sentence: Це термінове робоче завдання. _____ цей текст до завтрашнього ранку!
    answer: прочитайте
    options:
    - прочитайте
    - читайте
    - читаєте
    - читатимете
  - sentence: Я чесно намагався, але так і _____ цю велику статтю.
    answer: не прочитав
    options:
    - не прочитав
    - не читав
    - не читатиму
    - не читаю
  - sentence: Кожного ранку він _____ о сьомій годині.
    answer: снідав
    options:
    - снідав
    - поснідав
    - поснідає
    - поснідайте
  - sentence: Обережно, тут дуже слизько! Не _____!
    answer: впади
    options:
    - впади
    - падай
    - падайте
    - впадете
- id: group-sort-future-imperative
  type: group-sort
  instruction: Розподіліть дієслова за видом і контекстом (тло / інструкція / конкретна
    команда)
  groups:
  - label: Недоконаний вид (процес, звичка, тло, запрошення)
    items:
    - буду писати (складена форма)
    - читатиму (складна форма)
    - сідайте (ввічливе запрошення)
    - не забувай (корисне правило)
    - робіть (загальна рекомендація)
  - label: Доконаний вид (результат, подія, команда, попередження)
    items:
    - напишу (проста форма)
    - прочитаю (фінальний результат)
    - сядьте (сувора команда)
    - не забудь (термінове попередження)
    - зробіть (конкретний дедлайн)
- id: error-correction-imperative
  type: error-correction
  instruction: Знайдіть і виправте помилки у вживанні виду в розповіді, наказі та
    запереченні
  items:
  - sentence: Будь ласка, не відчиніть вікно, надворі сьогодні дуже холодно.
    error: відчиніть
    correction: відчиняйте
    error_type: word
    options:
    - відчиняйте
    - відчините
    - відчиняєте
    explanation: Стандартна заборона (prohibition) або прохання не робити чогось вимагає
      недоконаного виду.
  - sentence: Завтра я буду написати великий звіт для нашого менеджера.
    error: буду написати
    correction: напишу
    error_type: phrase
    options:
    - напишу
    - писатиму
    - буду писав
    explanation: Для конкретного результату в майбутньому використовується проста
      форма доконаного виду. Допоміжне слово 'буду' вживається лише з інфінітивом
      недоконаного виду.
  - sentence: Я намагався, але так і не читав цю складну книгу до кінця.
    error: не читав
    correction: не прочитав
    error_type: phrase
    options:
    - не прочитав
    - не дочитаю
    - не читатиму
    explanation: Нереалізований результат (unrealized result) вимагає доконаного виду
      із запереченням.
  - sentence: Коли ми поснідали, раптом голосно зателефонувала бабуся.
    error: поснідали
    correction: снідали
    error_type: word
    options:
    - снідали
    - будемо снідати
    - снідаємо
    explanation: 'Тло розповіді (background process) має бути у недоконаному виді:
      дія ще тривала, коли сталася раптова подія.'
  - sentence: Проходьте до хати і сядьте, будь ласка, ви напевно втомилися.
    error: сядьте
    correction: сідайте
    error_type: word
    options:
    - сідайте
    - сідали
    - будете сідати
    explanation: Ввічливе дружнє запрошення завжди використовує недоконаний вид наказового
      способу.
  - sentence: Обережно, сходи дуже слизькі! Не падай!
    error: падай
    correction: впади
    error_type: word
    options:
    - впади
    - впадеш
    - падайте
    explanation: Стурбоване попередження про випадковість (warning) вимагає доконаного
      виду, бо ви боїтеся раптового результату.
- id: match-up-negation-meaning
  type: match-up
  instruction: З'єднайте видові пари із запереченням та вкажіть контекст, де кожен
    вид доречний
  pairs:
  - left: Я не читав цей текст.
    right: Констатація факту (дія ніколи не існувала)
  - left: Я не прочитав цей текст.
    right: Нереалізований очікуваний результат
  - left: Не забувай свої ключі!
    right: Загальне правило на майбутнє (звичка)
  - left: Не забудь свої ключі!
    right: Термінове попередження прямо зараз
  - left: Не відчиняйте вікно!
    right: Стандартна ввічлива заборона
  - left: Я не буду писати звіт.
    right: Принципова свідома відмова від процесу
  - left: Я не напишу звіт до п'ятниці.
    right: Прогноз невдачі (об'єктивна неможливість)
  - left: Обережно, не впади!
    right: Страх перед випадковим наслідком
- id: open-writing-aspect-check
  type: essay-response
  prompt: 'Напишіть невеликий текст (мінімум 50 слів), у якому ви продемонструєте
    розуміння виду дієслова. Ваше завдання складається з трьох частин:

    1. **Минулий час**: розкажіть про свій минулий тиждень (3-4 речення). Обов''язково
    використайте недоконаний вид для опису тла (якою була погода, що ви зазвичай робили)
    і доконаний вид для послідовності завершених подій.

    2. **Наказовий спосіб**: напишіть дві прямі мови до свого друга. Перша репліка
    — дуже ввічливе запрошення в гості (недоконаний вид). Друга репліка — суворий
    наказ або конкретне робоче завдання (доконаний вид).

    3. **Умовний спосіб**: створіть одне речення, уявляючи своє ідеальне життя. Використайте
    недоконаний вид для опису тривалого, регулярного процесу у вашій фантазії (Якби...
    я б щодня...).'
  min_words: 50
  model_answer: 'Минулого тижня погода була дуже поганою. Щодня падав сніг, і я цілими
    днями сидів удома та працював за комп''ютером. Але в суботу я нарешті встав, одягнувся,
    вийшов з квартири і пішов у центр міста. Там я зустрів давнього друга.


    Запрошення: Привіт! Заходь до мене завтра ввечері, сідай на диван і відчувай себе
    як удома!

    Наказ: Негайно прочитай цей важливий документ і надішли мені відповідь до десятої
    години!


    Якби я мав багато вільного часу та грошей, я б щодня читав цікаві книжки та гуляв
    біля великого теплого моря.'
  evaluation_criteria:
  - 'Частина 1: Правильно поєднано тло розповіді (недоконаний вид) та послідовність
    подій (доконаний вид) у минулому часі.'
  - 'Частина 2: Ввічливе запрошення використовує недоконаний вид наказового способу
    (напр. ''заходьте'', ''сідайте'').'
  - 'Частина 2: Суворий наказ використовує доконаний вид наказового способу (напр.
    ''прочитай'', ''зроби'').'
  - 'Частина 3: Умовне речення використовує недоконаний вид для опису гіпотетичної
    звички або регулярного процесу.'
  - Лексика відповідає рівню B1 та темі модуля.
workbook:
- type: true-false
  instruction: Визначте, чи є ці твердження про вид дієслова правильними
  items:
  - statement: Дієслова доконаного виду ідеально підходять для створення «тла розповіді»
      (narrative background).
    correct: false
    explanation: Тло розповіді (опис атмосфери, природи) завжди створюється дієсловами
      недоконаного виду.
  - statement: В українській мові існують три різні форми для вираження майбутнього
      часу.
    correct: true
    explanation: 'Так, це проста форма (доконаний вид) та дві рівнозначні форми недоконаного
      виду: складена (буду писати) і складна (писатиму).'
  - statement: Для дуже ввічливого, приємного запрошення гостя українці використовують
      доконаний вид наказового способу.
    correct: false
    explanation: Для ввічливого запрошення та гостинності завжди потрібен недоконаний
      вид (напр. 'Сідайте!', 'Проходьте!').
  - statement: Заперечення з доконаним видом («Я не прочитав текст») зазвичай вказує
      на нереалізований очікуваний результат.
    correct: true
    explanation: Так, доконаний вид підкреслює, що ви намагалися або мали план, але
      очікуваний результат не був досягнутий.
  - statement: Щоб прямо заборонити комусь щось робити (Don't do it!), ви повинні
      обов'язково обрати доконаний вид.
    correct: false
    explanation: Стандартна пряма заборона в українській мові завжди вимагає недоконаного
      виду (напр. 'Не відчиняйте!').
  - statement: Доконаний вид із запереченням у наказовому способі («Не впади!») часто
      функціонує як стурбоване попередження про випадковість.
    correct: true
    explanation: Так, ми використовуємо доконаний вид, щоб попередити людину про небажаний
      миттєвий і випадковий результат.
  - statement: В умовному способі (conditional mood) вид дієслова не має значення,
      завжди використовується недоконаний вид.
    correct: false
    explanation: 'Вид дієслова в умовному способі зберігає свою функцію: він показує
      різницю між гіпотетичним тривалим процесом та гіпотетичним швидким результатом.'
  - statement: Складна форма майбутнього часу (наприклад, «читатиму») походить від
      давньоруської конструкції з дієсловом «мати».
    correct: true
    explanation: Так, «читатиму» історично утворилося від «читати маю» і є унікальною
      українською формою недоконаного виду.
- type: fill-in
  instruction: Доповніть речення правильними видовими формами, обираючи найкращий
    варіант
  items:
  - sentence: Він дуже довго _____ над цим проєктом, але так і не зміг його фіналізувати.
    answer: працював
    options:
    - працював
    - попрацював
    - попрацює
    - працюватиме
  - sentence: Я обіцяю, що завтра обов'язково _____ тобі всю правду про цю історію.
    answer: розповім
    options:
    - розповім
    - розповідатиму
    - буду розповідати
    - розповідав
  - sentence: Якби я зараз жив біля теплого океану, я б щоранку довго _____ на пляжі.
    answer: гуляв
    options:
    - гуляв
    - погуляв
    - погуляю
    - буду гуляти
  - sentence: Обережно, не _____ цю склянку, вона дуже дорога і крихка!
    answer: розбий
    options:
    - розбий
    - розбивай
    - розбивайте
    - розбиватимеш
  - sentence: Добрий вечір! Будь ласка, проходьте до вітальні і _____ за цей великий
      стіл.
    answer: сідайте
    options:
    - сідайте
    - сядьте
    - сідали
    - будете сідати
  - sentence: Вона чесно намагалася, але так і _____ цю нудну наукову статтю до кінця.
    answer: не прочитала
    options:
    - не прочитала
    - не читала
    - не дочитає
    - не читатиме
- type: error-correction
  instruction: Знайдіть і виправте помилку у використанні виду дієслова (умова, заперечення,
    тло)
  items:
  - sentence: Вона спокійно прочитала книгу на дивані, коли раптом у двері голосно
      подзвонили.
    error: прочитала
    correction: читала
    error_type: word
    options:
    - читала
    - буде читати
    - читає
    explanation: 'Тло розповіді (background process) вимагає недоконаного виду: дія
      ще тривала, коли сталася раптова подія.'
  - sentence: Якби я мав справді багато грошей, я б сьогодні ж купував великий будинок
      біля моря.
    error: купував
    correction: купив
    error_type: word
    options:
    - купив
    - куплю
    - буду купувати
    explanation: Одноразовий швидкий результат або чітке рішення в умовному способі
      потребує доконаного виду.
  - sentence: 'Вибачте, але я не зроблю це завдання: я принципово відмовляюся його
      виконувати сьогодні.'
    error: не зроблю
    correction: не робитиму
    error_type: phrase
    options:
    - не робитиму
    - не зробив
    - не робив
    explanation: Принципова і свідома відмова від самого процесу виражається недоконаним
      видом у майбутньому часі.
  - sentence: Будь ласка, не забудьте свої зошити вдома, завжди носіть їх на наші
      уроки!
    error: не забудьте
    correction: не забувайте
    error_type: word
    options:
    - не забувайте
    - не забудете
    - не забували
    explanation: Загальне корисне правило або постійна життєва порада вимагає недоконаного
      виду.
  - sentence: Зранку він встав, одягався і дуже швидко вийшов на холодну вулицю.
    error: одягався
    correction: одягнувся
    error_type: word
    options:
    - одягнувся
    - буде одягатися
    - одягається
    explanation: Для послідовності повністю завершених подій (event chain) абсолютно
      усі дієслова мають бути доконаного виду.
  - sentence: Ніколи не купіть цей старий телефон, він дуже поганий і постійно ламається!
    error: Не купіть
    correction: Не купуйте
    error_type: phrase
    options:
    - Не купуйте
    - Не купуєте
    - Не купуватимете
    explanation: Стандартна пряма заборона чи емоційне прохання не робити чогось завжди
      потребує недоконаного виду.
