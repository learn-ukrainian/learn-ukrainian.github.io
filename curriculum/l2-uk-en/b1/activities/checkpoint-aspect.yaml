version: '1.0'
module: checkpoint-aspect
level: b1
inline:
- id: quiz-aspect-identification
  type: quiz
  instruction: Визначте вид дієслова та поясніть його аспектну функцію (тло, подія,
    результат, тривалість) у реченні.
  items:
  - question: «Вчора я довго читав цікаву статтю.» — Яка функція дієслова «читав»?
    options:
    - Недоконаний вид (тривалість процесу)
    - Доконаний вид (результат дії)
    - Недоконаний вид (одноразова подія)
    - Доконаний вид (послідовність подій)
    correct: 0
  - question: «Студент успішно здав іспит і пішов додому.» — Яка функція дієслів «здав»
      і «пішов»?
    options:
    - Доконаний вид (послідовність подій)
    - Недоконаний вид (тло розповіді)
    - Доконаний вид (звичка або регулярність)
    - Недоконаний вид (тривала дія)
    correct: 0
  - question: «Коли ми спокійно снідали, раптом зателефонувала бабуся.» — Чому дієслово
      «зателефонувала» має доконаний вид?
    options:
    - Це раптова подія, що перериває тло.
    - Це постійна звичка бабусі.
    - Це тривалий процес телефонної розмови.
    - Це дія, яка ще не відбулася.
    correct: 0
  - question: «Кожного ранку вона пила каву на балконі.» — Чому дієслово «пила» має
      недоконаний вид?
    options:
    - Це повторювана дія, звичка.
    - Це єдина подія з конкретним результатом.
    - Це початок нової події.
    - Це завершення тривалого процесу.
    correct: 0
  - question: «Він швидко написав лист і відправив його.» — Який вид і яка функція
      дієслова «написав»?
    options:
    - Доконаний вид (результативна подія)
    - Недоконаний вид (загальний факт)
    - Доконаний вид (тривалий процес)
    - Недоконаний вид (тло)
    correct: 0
  - question: «Надворі падав сніг, а в кімнаті було тепло.» — Яку функцію виконує
      дієслово «падав»?
    options:
    - Недоконаний вид (тло розповіді)
    - Доконаний вид (швидка подія)
    - Недоконаний вид (наслідок події)
    - Доконаний вид (нереалізований результат)
    correct: 0
- id: group-sort-future-imperative
  type: group-sort
  instruction: 'Розподіліть дієслова за видом і контекстом: тло / подія / загальна
    інструкція / конкретна команда'
  groups:
  - label: Тло розповіді (недоконаний вид)
    items:
    - світило
    - снідали
    - падав
    - говорили
  - label: Послідовні події (доконаний вид)
    items:
    - зателефонувала
    - відправив
    - написала
    - зупинився
  - label: Загальна інструкція (недоконаний)
    items:
    - читайте
    - заходьте
    - сідайте
    - пишіть
  - label: Конкретна команда (доконаний)
    items:
    - прочитайте
    - увійдіть
    - напишіть
    - сядьте
- id: match-up-negation-meaning
  type: match-up
  instruction: З'єднайте видові пари та вкажіть контекст, де кожен вид доречний
  pairs:
  - left: Не відчиняйте!
    right: Заборона дії (недоконаний вид)
  - left: Не відчиніть!
    right: Попередження (доконаний вид)
  - left: Я не читав.
    right: Дія взагалі не відбувалася
  - left: Я не прочитав.
    right: Немає фінального результату
  - left: Буду готуватися.
    right: Намір процесу без гарантії
  - left: Підготуюся.
    right: Обіцянка конкретного результату
- id: fill-in-past-aspect
  type: fill-in
  instruction: 'Оберіть правильний вид дієслова у контексті: минулий, майбутній, наказовий
    спосіб, заперечення.'
  items:
  - sentence: Я ______ тобі цю книжку завтра, обіцяю.
    answer: принесу
    options:
    - принесу
    - приноситиму
    - буду приносити
  - sentence: Вчора ми довго ______ новий проект на зборах.
    answer: обговорювали
    options:
    - обговорювали
    - обговорили
    - обговоримо
  - sentence: ______, будь ласка, своє прізвище ось тут на бланку.
    answer: Напишіть
    options:
    - Напишіть
    - Пишіть
    - Писали
  - sentence: Проходьте, ______ на ці зручні крісла.
    answer: сідайте
    options:
    - сідайте
    - сядьте
    - сіли
  - sentence: Вона не ______ текст, бо він довгий, і здалася на середині.
    answer: прочитала
    options:
    - прочитала
    - читала
    - читатиме
  - sentence: Ти ______ цю статтю раніше? Ні, ніколи.
    answer: читав
    options:
    - читав
    - прочитав
    - прочитаєш
workbook:
- type: essay-response
  prompt: 'Напишіть короткий текст, у якому ви використовуєте різні види дієслів.
    Виконайте три завдання: 1) розкажіть про свій минулий тиждень (використовуйте
    недоконаний вид для тла і доконаний для подій); 2) складіть три пари наказів (загальна
    інструкція та конкретна команда); 3) напишіть два умовні речення, показавши гіпотетичний
    стан (недоконаний вид) і гіпотетичну подію (доконаний вид).'
  min_words: 50
  model_answer: 'Минулого тижня надворі світило сонце і дув теплий вітер. Я спокійно
    гуляв парком, коли раптом зустрів свого друга. Ми зайшли в кафе і випили каву.
    Пари наказів: Заходьте! / Увійдіть! Читайте щодня! / Прочитайте цю статтю! Пишіть
    охайно! / Напишіть своє прізвище! Умовні речення: Якби я жив у Києві, я б частіше
    ходив до театру. Якби я переїхав до Києва, моє життя б різко змінилося.'
  evaluation_criteria:
  - Чи використано недоконаний вид для опису тла (процесів) у першому завданні (мінімум
    2 дієслова)?
  - Чи використано доконаний вид для послідовних подій у розповіді (мінімум 2 дієслова)?
  - Чи правильно утворено три пари наказів (недоконаний і доконаний вид)?
  - Чи є в умовних реченнях логічний контраст між гіпотетичним станом (НВ) і подією
    (ДВ)?
