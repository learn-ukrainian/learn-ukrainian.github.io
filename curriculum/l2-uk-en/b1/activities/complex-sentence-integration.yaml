- type: fill-in
  title: 'Оберіть правильний сполучник'
  instruction: 'Доповніть речення правильним сполучником, враховуючи контекст.'
  items:
    - sentence: 'Вчора ми залишилися вдома, ___ на вулиці йшов сильний дощ.'
      answer: 'бо'
      options: ['бо', 'що', 'який', 'щоб']
      explanation: 'Розмовний сполучник причини.'
    - sentence: 'Компанія скасувала зустріч, ___ виникли непередбачувані проблеми.'
      answer: 'тому що'
      options: ['тому що', 'бо', 'щоб', 'якщо']
      explanation: 'Офіційний сполучник причини.'
    - sentence: 'Я працюю в школі, ___ мій брат працює в лікарні.'
      answer: 'а'
      options: ['а', 'і', 'та', 'що']
      explanation: 'Протиставлення або зіставлення двох різних людей.'
    - sentence: 'Ми купили квитки, ___ наші друзі вирішили залишитися.'
      answer: 'але'
      options: ['але', 'що', 'щоб', 'який']
      explanation: 'Протиставлення подій.'
    - sentence: 'Студенти читають книги, ___ краще знати мову.'
      answer: 'щоб'
      options: ['щоб', 'бо', 'що', 'а']
      explanation: 'Сполучник мети.'
    - sentence: '___ завтра буде гарна погода, ми поїдемо в парк.'
      answer: 'якщо'
      options: ['якщо', 'хоча', 'бо', 'що']
      explanation: 'Сполучник умови.'
    - sentence: 'Ми гуляли, ___ на вулиці було дуже холодно.'
      answer: 'хоча'
      options: ['хоча', 'якщо', 'бо', 'щоб']
      explanation: 'Сполучник допустовості.'
    - sentence: 'Вона сказала, ___ прийде пізніше.'
      answer: 'що'
      options: ['що', 'який', 'бо', 'щоб']
      explanation: 'Підрядний сполучник з''ясування.'

- type: fill-in
  title: 'Вставте правильну форму слова який'
  instruction: 'Оберіть правильну форму відносного займенника для кожного речення.'
  items:
    - sentence: 'Це дівчина, ___ працює в банку.'
      answer: 'яка'
      options: ['яка', 'що', 'який', 'які']
      explanation: 'Жіночий рід, називний відмінок.'
    - sentence: 'Ми прочитали книгу, ___ ти нам дав.'
      answer: 'яку'
      options: ['яку', 'яка', 'що', 'якій']
      explanation: 'Жіночий рід, знахідний відмінок.'
    - sentence: 'Ось будинок, у ___ ми жили раніше.'
      answer: 'якому'
      options: ['якому', 'який', 'що', 'яких']
      explanation: 'Чоловічий рід, місцевий відмінок.'
    - sentence: 'Люди, з ___ ми зустрілися, були дуже приємні.'
      answer: 'якими'
      options: ['якими', 'що', 'яких', 'яким']
      explanation: 'Множина, орудний відмінок.'
    - sentence: 'Це проєкт, ___ ми успішно закінчили.'
      answer: 'який'
      options: ['який', 'що', 'яку', 'які']
      explanation: 'Чоловічий рід, знахідний відмінок (неістота).'
    - sentence: 'Місто, до ___ ми їдемо, дуже старовинне.'
      answer: 'якого'
      options: ['якого', 'що', 'який', 'якому']
      explanation: 'Середній рід, родовий відмінок.'
    - sentence: 'Це проблема, про ___ всі говорять.'
      answer: 'яку'
      options: ['яку', 'яка', 'що', 'якій']
      explanation: 'Жіночий рід, знахідний відмінок.'
    - sentence: 'Кімната, у ___ ми працюємо, дуже світла.'
      answer: 'якій'
      options: ['якій', 'що', 'яку', 'яка']
      explanation: 'Жіночий рід, місцевий відмінок.'

- type: error-correction
  title: 'Виправте граматичні помилки'
  instruction: 'Знайдіть помилку в реченні та оберіть правильний варіант.'
  items:
    - sentence: 'Моя мама вчитель, і мій тато інженер.'
      error: 'і'
      answer: 'а'
      options: ['а', 'та', 'бо', 'щоб']
      explanation: 'Для зіставлення двох різних людей використовується сполучник а.'
    - sentence: 'Я купив куртку, що була в магазині.'
      error: 'що'
      answer: 'яка'
      options: ['яка', 'яку', 'якій', 'який']
      explanation: 'Слово куртка жіночого роду, тому потрібен відносний займенник яка.'
    - sentence: 'Ми чекали друзів, що запізнювалися.'
      error: 'що'
      answer: 'які'
      options: ['які', 'яких', 'яким', 'якими']
      explanation: 'Слово друзі у множині, тому використовуємо займенник які.'
    - sentence: 'Він не прийшов, що був дуже зайнятий.'
      error: 'що'
      answer: 'бо'
      options: ['бо', 'який', 'щоб', 'але']
      explanation: 'Тут потрібен сполучник причини, наприклад бо.'
    - sentence: 'Книга, у що я знайшов цю цитату, лежить на столі.'
      error: 'у що'
      answer: 'у якій'
      options: ['у якій', 'яка', 'яку', 'що']
      explanation: 'Потрібне узгодження: жіночий рід, місцевий відмінок.'
    - sentence: 'Я вчу мову для того що розуміти людей.'
      error: 'для того що'
      answer: 'для того щоб'
      options: ['для того щоб', 'бо', 'тому що', 'що']
      explanation: 'Сполучник мети вимагає використання щоб.'

- type: error-correction
  title: 'Виправте стилістичні помилки'
  instruction: 'Знайдіть стилістичну помилку або кальку і виберіть правильний варіант.'
  items:
    - sentence: 'Шановний директоре, я запізнився, бо зламався автобус.'
      error: 'бо'
      answer: 'оскільки'
      options: ['оскільки', 'що', 'а', 'щоб']
      explanation: 'В офіційному листі краще використовувати формальний сполучник.'
    - sentence: 'Ми любимо музику, і наші друзі люблять кіно.'
      error: 'і'
      answer: 'а'
      options: ['а', 'бо', 'щоб', 'тому що']
      explanation: 'При протиставленні інтересів використовуємо а.'
    - sentence: 'Це будинок, що побудував мій дід.'
      error: 'що'
      answer: 'який'
      options: ['який', 'якого', 'якому', 'яким']
      explanation: 'Слово будинок чоловічого роду, знахідний відмінок неістоти.'
    - sentence: 'Вона читає текст для того що відповісти на запитання.'
      error: 'що'
      answer: 'щоб'
      options: ['щоб', 'бо', 'якщо', 'який']
      explanation: 'Конструкція мети вимагає щоб.'
    - sentence: 'Вони працюють тут, і ми працюємо там.'
      error: 'і'
      answer: 'а'
      options: ['а', 'та', 'бо', 'щоб']
      explanation: 'Для зіставлення використовується а.'
    - sentence: 'Хоч ми втомилися, і ми продовжували йти.'
      error: 'і'
      answer: 'але'
      options: ['але', 'а', 'бо', 'та']
      explanation: 'У допустових реченнях (хоча/хоч) у головній частині часто використовують але.'

- type: unjumble
  title: 'Побудуйте багатокомпонентне речення'
  instruction: 'Складіть слова у правильному порядку, щоб утворити складне речення.'
  items:
    - words: ['Марія', 'готувала', 'вечерю,', 'а', 'Петро', 'читав', 'новини.']
      answer: 'Марія готувала вечерю, а Петро читав новини.'
    - words: ['Я', 'вивчаю', 'мову,', 'тому', 'що', 'хочу', 'розуміти', 'культуру.']
      answer: 'Я вивчаю мову, тому що хочу розуміти культуру.'
    - words: ['Якщо', 'завтра', 'буде', 'гарна', 'погода,', 'ми', 'підемо', 'гуляти.']
      answer: 'Якщо завтра буде гарна погода, ми підемо гуляти.'
    - words: ['Хоча', 'було', 'пізно,', 'вони', 'продовжували', 'свою', 'роботу.']
      answer: 'Хоча було пізно, вони продовжували свою роботу.'
    - words: ['Це', 'книга,', 'яку', 'я', 'шукав', 'дуже', 'довго.']
      answer: 'Це книга, яку я шукав дуже довго.'
    - words: ['Він', 'працює,', 'щоб', 'його', 'родина', 'мала', 'все', 'необхідне.']
      answer: 'Він працює, щоб його родина мала все необхідне.'

- type: unjumble
  title: 'Складіть речення з правильним порядком слів'
  instruction: 'Зверніть увагу на коми та сполучники під час складання речення.'
  items:
    - words: ['Ми', 'не', 'прийшли,', 'бо', 'були', 'дуже', 'зайняті', 'на', 'роботі.']
      answer: 'Ми не прийшли, бо були дуже зайняті на роботі.'
    - words: ['Сонце', 'зайшло,', 'і', 'на', 'вулиці', 'стало', 'дуже', 'холодно.']
      answer: 'Сонце зайшло, і на вулиці стало дуже холодно.'
    - words: ['Діти', 'гралися', 'надворі,', 'поки', 'мама', 'готувала', 'смачний', 'обід.']
      answer: 'Діти гралися надворі, поки мама готувала смачний обід.'
    - words: ['Я', 'знаю', 'людину,', 'яка', 'може', 'нам', 'швидко', 'допомогти.']
      answer: 'Я знаю людину, яка може нам швидко допомогти.'
    - words: ['Він', 'купив', 'словник', 'для', 'того,', 'щоб', 'розширити', 'словниковий', 'запас.']
      answer: 'Він купив словник для того, щоб розширити словниковий запас.'
    - words: ['Моя', 'сестра', 'лікар,', 'а', 'мій', 'брат', 'працює', 'в', 'школі.']
      answer: 'Моя сестра лікар, а мій брат працює в школі.'

- type: quiz
  title: 'Перевірка теоретичних знань'
  instruction: 'Дайте відповіді на запитання про складні речення.'
  items:
    - question: 'Який сполучник ми використовуємо для протиставлення або зіставлення осіб?'
      explanation: 'В українській мові для зіставлення використовується сполучник а.'
      options:
        - text: 'сполучник а'
          correct: true
        - text: 'сполучник і'
          correct: false
        - text: 'сполучник та'
          correct: false
