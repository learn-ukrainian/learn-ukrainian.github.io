      explanation: 'Слово який змінюється як прикметник.'
      options:
        - text: 'який'
          correct: true
        - text: 'що'
          correct: false
        - text: 'коли'
          correct: false
        - text: 'де'
          correct: false
    - question: 'Чи обов''язково ставити кому перед підрядним сполучником що в українській мові?'
      explanation: 'Кома перед що є абсолютно обов''язковою структурною нормою.'
      options:
        - text: 'так, завжди'
          correct: true
        - text: 'ні, ніколи'
          correct: false
        - text: 'лише якщо є пауза'
          correct: false
        - text: 'тільки в офіційних текстах'
          correct: false
    - question: 'Як називається зв''язок, де всі частини складного речення є рівноправними?'
      explanation: 'Сурядний зв''язок поєднує граматично рівноправні частини.'
      options:
        - text: 'сурядний'
          correct: true
        - text: 'підрядний'
          correct: false
        - text: 'вкладений'
          correct: false
        - text: 'паралельний'
          correct: false
    - question: 'Який сполучник використовується в підрядних частинах мети?'
      explanation: 'Щоб вказує на мету дії.'
      options:
        - text: 'щоб'
          correct: true
        - text: 'тому що'
          correct: false
        - text: 'якщо'
          correct: false
        - text: 'бо'
          correct: false
    - question: 'Як називається зв''язок, де одна частина залежить від іншої?'
      explanation: 'Підрядний зв''язок створює ієрархію між головною та залежною частинами.'
      options:
        - text: 'підрядний'
          correct: true
        - text: 'сурядний'
          correct: false
        - text: 'єдиний'
          correct: false
        - text: 'послідовний'
          correct: false
    - question: 'Що таке мелодійний синтаксис в українській мові?'
      explanation: 'Це чергування речень для створення плинності, уникнення різких пауз.'
      options:
        - text: 'плавність тексту завдяки сполучникам'
          correct: true
        - text: 'використання лише довгих слів'
          correct: false
        - text: 'відсутність будь-яких ком'
          correct: false
        - text: 'повторення голосних звуків'
          correct: false

- type: match-up
  title: 'Знайдіть логічну пару'
  instruction: 'З''єднайте початок речення з його правильним закінченням.'
  pairs:
