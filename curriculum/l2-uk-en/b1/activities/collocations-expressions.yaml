- type: "fill-in"
  title: "Заповніть пропуски: дієслова"
  instruction: "Оберіть дієслово, яке найкраще підходить до контексту."
  items:
    - sentence: "Директор довго думав і нарешті _____ рішення змінити стратегію."
      answer: "прийняв"
      options:
        - "прийняв"
        - "зробив"
        - "ухвалив"
        - "взяв"
    - sentence: "Наш університет буде _____ активну участь у конференції."
      answer: "брати"
      options:
        - "брати"
        - "приймати"
        - "робити"
        - "мати"
    - sentence: "Будь ласка, _____ увагу на цей важливий графік."
      answer: "зверніть"
      options:
        - "зверніть"
        - "приділіть"
        - "дайте"
        - "зробіть"
    - sentence: "Студенти швидко _____ досвіду під час стажування."
      answer: "набувають"
      options:
        - "набувають"
        - "отримують"
        - "беруть"
        - "мають"
    - sentence: "Він завжди _____ свого слова, тому йому можна довіряти."
      answer: "дотримує"
      options:
        - "дотримує"
        - "тримає"
        - "зберігає"
        - "робить"
    - sentence: "Я щиро _____, що цей проект буде дуже успішним."
      answer: "вважаю"
      options:
        - "вважаю"
        - "рахую"
        - "думаю"
        - "знаю"
    - sentence: "Вранці я повільно _____ очі і п'ю каву."
      answer: "розплющую"
      options:
        - "розплющую"
        - "відкриваю"
        - "піднімаю"
        - "роблю"
    - sentence: "Нам не варто _____ час на ці безглузді розмови."
      answer: "гаяти"
      options:
        - "гаяти"
        - "проводити"
        - "робити"
        - "мати"

