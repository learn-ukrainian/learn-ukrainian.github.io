- type: "error-correction"
  title: "Виправте кальки: дієслова"
  instruction: "Знайдіть помилку в реченні та оберіть правильний український варіант."
  items:
    - sentence: "Я не хочу приймати участь у цьому проекті."
      error: "приймати"
      answer: "брати"
      options:
        - "брати"
        - "робити"
        - "мати"
        - "давати"
      explanation: "Українською мовою участь можна лише брати."
    - sentence: "Мої батьки роблять важливі рішення разом."
      error: "роблять"
      answer: "приймають"
      options:
        - "приймають"
        - "беруть"
        - "дають"
        - "кажуть"
      explanation: "Рішення в українській мові приймають або ухвалюють, а не роблять."
    - sentence: "Вона дуже здивувалася і широко відкрила очі."
      error: "відкрила"
      answer: "розплющила"
      options:
        - "розплющила"
        - "підняла"
        - "зробила"
        - "показала"
      explanation: "Фізично очі ми розплющуємо, а відкриваємо двері чи книгу."
    - sentence: "Він прикладає багато зусиль, щоб вивчити мову."
      error: "прикладає"
      answer: "докладає"
      options:
        - "докладає"
        - "робить"
        - "дає"
        - "бере"
      explanation: "Зусилля ми свідомо докладаємо."
    - sentence: "Студенти отримують цінний досвід на практиці."
      error: "отримують"
      answer: "набувають"
      options:
        - "набувають"
        - "беруть"
        - "мають"
        - "знаходять"
      explanation: "Досвід ми традиційно набуваємо (з родовим відмінком)."
    - sentence: "Ми дуже добре потратили час на вихідних."
      error: "потратили"
      answer: "провели"
      options:
        - "провели"
        - "зробили"
        - "взяли"
        - "віддали"
      explanation: "Час, як приємне дозвілля, ми проводимо."

- type: "error-correction"
  title: "Виправте семантичні помилки"
  instruction: "Знайдіть слово, яке використано в неправильному значенні."
  items:
    - sentence: "Ти дав абсолютно вірну відповідь на запитання викладача."
      error: "вірну"
      answer: "правильну"
      options:
        - "правильну"
        - "точну"
        - "гарну"
        - "чітку"
      explanation: "Відповідь не має емоцій, тому вона може бути лише правильною. Вірним може бути друг."
    - sentence: "Я рахую, що нам треба негайно змінити план дій."
      error: "рахую"
      answer: "вважаю"
      options:
        - "вважаю"
        - "думаю"
        - "знаю"
        - "вірю"
      explanation: "Дієслово рахувати використовується для математики. Для вираження думки використовується вважати."
    - sentence: "Керівник компанії нарешті прийняв вірне рішення."
      error: "вірне"
      answer: "правильне"
      options:
        - "правильне"
        - "гарне"
        - "добре"
        - "нове"
      explanation: "Рішення має бути правильним (обєктивно), а не вірним (відданим)."
    - sentence: "Багато експертів рахують цю стратегію дуже ризикованою."
      error: "рахують"
      answer: "вважають"
      options:
        - "вважають"
        - "думають"
        - "кажуть"
        - "пишуть"
      explanation: "Експерти висловлюють думку, тому вони вважають."
    - sentence: "Ми довго робили рішення про нашу майбутню відпустку."
      error: "робили"
      answer: "приймали"
      options:
        - "приймали"
        - "ухвалювали"
        - "брали"
        - "думали"
      explanation: "Рішення в українській мові приймають."
    - sentence: "Цей закон був зроблений парламентом минулого тижня."
      error: "зроблений"
      answer: "ухвалений"
      options:
        - "ухвалений"
        - "прийнятий"
        - "взятий"
        - "даний"
      explanation: "Парламент ухвалює офіційні рішення та закони."

- type: "unjumble"
  title: "Складіть речення з колокаціями"
  instruction: "Розташуйте слова у правильному порядку."
  items:
    - words:
        - "я"
        - "прийняв"
        - "остаточне"
        - "рішення"
      answer: "Я прийняв остаточне рішення."
    - words:
        - "вони"
        - "беруть"
        - "активну"
        - "участь"
      answer: "Вони беруть активну участь."
    - words:
        - "ми"
        - "приділяємо"
        - "особливу"
        - "увагу"
      answer: "Ми приділяємо особливу увагу."
    - words:
        - "він"
        - "завжди"
        - "дотримує"
        - "слова"
      answer: "Він завжди дотримує слова."
    - words:
        - "ми"
        - "набуваємо"
        - "цінного"
        - "досвіду"
      answer: "Ми набуваємо цінного досвіду."
    - words:
        - "вона"
        - "повільно"
        - "розплющила"
        - "очі"
      answer: "Вона повільно розплющила очі."

- type: "quiz"
  title: "Теорія колокацій"
  instruction: "Оберіть найкращий варіант відповіді на запитання."
  items:
    - question: "Яке дієслово найкраще підходить для офіційного контексту (наприклад, коли голосує парламент)?"
      options:
        - text: "приймати рішення"
          correct: false
        - text: "ухвалювати рішення"
          correct: true
        - text: "робити рішення"
          correct: false
        - text: "брати рішення"
          correct: false
      explanation: "Дієслово ухвалювати використовується в офіційно-діловому стилі для колективних рішень."
    - question: "Яке дієслово ми використовуємо, коли говоримо про тривалий процес інвестування енергії в когось?"
      options:
        - text: "звертати увагу"
          correct: false
        - text: "приділяти увагу"
          correct: true
        - text: "давати увагу"
          correct: false
        - text: "робити увагу"
          correct: false
      explanation: "Приділяти увагу означає витрачати час та енергію протягом тривалого періоду."
    - question: "У якому відмінку має стояти слово досвід у конструкції з дієсловом набувати?"
      options:
        - text: "у знахідному"
          correct: false
        - text: "у давальному"
          correct: false
        - text: "у родовому"
          correct: true
        - text: "в орудному"
          correct: false
      explanation: "Дієслово набувати вимагає родового відмінка."
    - question: "Як правильно перекласти українською фразу correct answer?"
      options:
        - text: "вірна відповідь"
          correct: false
        - text: "правильна відповідь"
          correct: true
        - text: "точна відповідь"
          correct: false
        - text: "справжня відповідь"
          correct: false
      explanation: "Правильна використовується для об'єктивної інформації. Вірним буває друг."
    - question: "Що ми робимо з часом, коли просто приємно відпочиваємо з друзями?"
      options:
        - text: "витрачаємо час"
          correct: false
        - text: "гаємо час"
          correct: false
        - text: "проводимо час"
          correct: true
        - text: "робимо час"
          correct: false
      explanation: "Вираз проводити час має позитивне забарвлення і стосується дозвілля."
    - question: "Який прийменник обов'язково використовується з дієсловом заслуговувати?"
      options:
        - text: "на"
          correct: true
        - text: "про"
          correct: false
        - text: "за"
          correct: false
        - text: "без прийменника"
          correct: false
      explanation: "Правильна конструкція: заслуговувати на увагу."
    - question: "Яке з цих дієслів фізіологічно не може сполучатися зі словом очі?"
      options:
        - text: "розплющувати"
          correct: false
        - text: "заплющувати"
          correct: false
        - text: "відкривати"
          correct: true
        - text: "мружити"
          correct: false
      explanation: "Відкривати можна неживі об'єкти (двері), а очі ми розплющуємо."
    - question: "Яке дієслово ми вживаємо, коли хочемо поділитися своїми емоціями від мандрівки?"
      options:
        - text: "розповідати"
          correct: false
        - text: "робити"
          correct: false
        - text: "ділитися"
          correct: true
        - text: "давати"
          correct: false
      explanation: "Ми природно кажемо ділитися враженнями (в орудному відмінку)."

