- type: true-false
  title: "Правда чи неправда про граматику"
  instruction: "Визначте, чи є твердження про українську граматику правильним."
  items:
    - statement: "Прислівник — це незмінна частина мови, що не має закінчення."
      correct: true
      explanation: "Так, прислівник не відмінюється і не змінюється."
    - statement: "В українській мові існує вісім відмінків іменника."
      correct: false
      explanation: "Ні, в українській мові сім відмінків."
    - statement: "Кличний відмінок не відповідає на жодне питання."
      correct: true
      explanation: "Правильно, він використовується лише для звертання."
    - statement: "Підмет — це другорядний член речення."
      correct: false
      explanation: "Ні, підмет — це головний член речення."
    - statement: "Іменник відповідає на морфологічні питання «хто?» або «що?»."
      correct: true
      explanation: "Так, це основні питання іменника."
    - statement: "Прийменник вживається замість імені та не називає предметів."
      correct: false
      explanation: "Ні, це опис займенника. Прийменник стоїть «при імені»."
    - statement: "Корінь — це частина слова, що стоїть після закінчення."
      correct: false
      explanation: "Ні, корінь — це головна значуща частина слова."
    - statement: "Суфікс служить для утворення нових слів або форм."
      correct: true
      explanation: "Так, він стоїть після кореня і змінює значення слова."
    - statement: "Дієслово означає дію або стан предмета."
      correct: true
      explanation: "Це правильне визначення дієслова."
    - statement: "Називний відмінок є єдиним прямим відмінком в українській мові."
      correct: true
      explanation: "Так, усі інші шість відмінків називаються непрямими."
    - statement: "Прикметник завжди узгоджується з іменником у роді, числі та відмінку."
      correct: true
      explanation: "Так, це правило узгодження прикметника."
    - statement: "Сполучник є самостійною частиною мови та виступає членом речення."
      correct: false
      explanation: "Ні, сполучник — це службова частина мови."

