- type: cloze
  title: "Вибір граматичних термінів"
  instruction: "Оберіть правильний термін для кожного речення."
  passage: |
    В українській мові {називний|родовий|давальний|знахідний} відмінок є початковою формою іменника.
    Усього в мові існує {сім|вісім|шість|п'ять} відмінків.
    Займенник — це {самостійна|службова|допоміжна|незмінна} частина мови, що вказує на предмети.
    Частка та вигук належать до {службових|самостійних|головних|другорядних} частин мови.
    Речення, яке має дві або більше граматичних основ, називається {складним|простим|повним|окличним}.
    {Основа|Закінчення|Корінь|Суфікс} — це частина слова без закінчення.
    У реченні «Сонце світить яскраво» слово «сонце» виступає {підметом|присудком|додатком|обставиною}.
    Слово «швидко» — це {прислівник|прикметник|іменник|дієслово}, бо воно не змінюється.
    {Прийменник|Сполучник|Частка|Вигук} стоїть при імені та зв'язує слова.
    {Сполучник|Прийменник|Дієслово|Займенник} з'єднує частини складного речення.
    {Корінь|Суфікс|Префікс|Закінчення} — це головна значуща частина слова.
    {Префікс|Корінь|Суфікс|Основа} стоїть перед коренем.
    {Суфікс|Префікс|Корінь|Закінчення} стоїть після кореня перед закінченням.
    {Закінчення|Основа|Префікс|Суфікс} служить для зв'язку слів у реченні.

