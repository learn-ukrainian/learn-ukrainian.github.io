- type: quiz
  title: "Визначення частин мови"
  instruction: "Виберіть правильну назву частини мови для наведеного слова або прикладу."
  items:
    - question: "До якої частини мови належить слово «вивчати»?"
      options:
        - text: "дієслово"
          correct: true
        - text: "іменник"
          correct: false
        - text: "прислівник"
          correct: false
        - text: "сполучник"
          correct: false
      explanation: "Дієслово означає дію або стан."
    - question: "Якою частиною мови є слово «Київ»?"
      options:
        - text: "займенник"
          correct: false
        - text: "іменник"
          correct: true
        - text: "прикметник"
          correct: false
        - text: "частка"
          correct: false
      explanation: "Іменник називає предмет або власну назву."
    - question: "Слово «цікавий» відповідає на питання «який?». Це..."
      options:
        - text: "числівник"
          correct: false
        - text: "прислівник"
          correct: false
        - text: "прикметник"
          correct: true
        - text: "вигук"
          correct: false
      explanation: "Прикметник виражає ознаку предмета."
    - question: "Як ми називаємо слово «швидко», яке не змінюється?"
      options:
        - text: "прислівник"
          correct: true
        - text: "дієслово"
          correct: false
        - text: "іменник"
          correct: false
        - text: "прийменник"
          correct: false
      explanation: "Прислівник — це незмінна частина мови."
    - question: "Слово «вона» вживається замість імені. Це..."
      options:
        - text: "прикметник"
          correct: false
        - text: "займенник"
          correct: true
        - text: "сполучник"
          correct: false
        - text: "частка"
          correct: false
      explanation: "Займенник вказує на предмет, але не називає його."
    - question: "Якою частиною мови є слово «десять»?"
      options:
        - text: "числівник"
          correct: true
        - text: "іменник"
          correct: false
        - text: "дієслово"
          correct: false
        - text: "прислівник"
          correct: false
      explanation: "Числівник означає кількість або порядок при лічбі."
    - question: "Слово «бо» сполучає частини складного речення. Це..."
      options:
        - text: "прийменник"
          correct: false
        - text: "частка"
          correct: false
        - text: "сполучник"
          correct: true
        - text: "вигук"
          correct: false
      explanation: "Сполучник служить для сполучення слів чи речень."
    - question: "Слово «на» вказує на місце (на столі). Це..."
      options:
        - text: "прийменник"
          correct: true
        - text: "займенник"
          correct: false
        - text: "іменник"
          correct: false
        - text: "прикметник"
          correct: false
      explanation: "Прийменник виражає відношення між словами."
    - question: "Слово «але» виражає протиставлення. Це..."
      options:
        - text: "сполучник"
          correct: true
        - text: "частка"
          correct: false
        - text: "прислівник"
          correct: false
        - text: "вигук"
          correct: false
      explanation: "Це службова частина мови — сполучник."
    - question: "Якою частиною мови є емоційний вигук «ого»?"
      options:
        - text: "вигук"
          correct: true
        - text: "частка"
          correct: false
        - text: "іменник"
          correct: false
        - text: "дієслово"
          correct: false
      explanation: "Вигуки виражають почуття, не називаючи їх."

- type: fill-in
  title: "Граматична анатомія"
  instruction: "Впишіть пропущений граматичний термін у речення."
  items:
    - sentence: "В українській мові існує сім _____."
      answer: "відмінків"
      options: ["відмінків", "частин", "речень", "правил"]
    - sentence: "Початкова форма слова — це _____ відмінок."
      answer: "називний"
      options: ["називний", "родовий", "давальний", "кличний"]
    - sentence: "_____ відмінок використовується тільки для звертання."
      answer: "Кличний"
      options: ["Кличний", "Орудний", "Місцевий", "Знахідний"]
    - sentence: "Спільна частина споріднених слів називається _____."
      answer: "корінь"
      options: ["корінь", "суфікс", "префікс", "основа"]
    - sentence: "Частина слова, що стоїть перед коренем — це _____."
      answer: "префікс"
      options: ["префікс", "суфікс", "закінчення", "основа"]
    - sentence: "Частина слова після кореня називається _____."
      answer: "суфікс"
      options: ["суфікс", "префікс", "корінь", "підмет"]
    - sentence: "Змінна частина слова, що зв'язує слова в реченні — це _____."
      answer: "закінчення"
      options: ["закінчення", "префікс", "основа", "додаток"]
    - sentence: "Головний член речення, що вказує на суб'єкт — це _____."
      answer: "підмет"
      options: ["підмет", "присудок", "додаток", "означення"]
    - sentence: "Головний член речення, що вказує на дію підмета — це _____."
      answer: "присудок"
      options: ["присудок", "підмет", "обставина", "частка"]
    - sentence: "_____ — це другорядний член речення, що вказує на ознаку предмета."
      answer: "Означення"
      options: ["Означення", "Додаток", "Обставина", "Присудок"]
    - sentence: "_____ вказує на умови дії, наприклад на час або місце."
      answer: "Обставина"
      options: ["Обставина", "Означення", "Додаток", "Підмет"]
    - sentence: "_____ — це другорядний член речення, на який безпосередньо спрямована дія."
      answer: "Додаток"
      options: ["Додаток", "Підмет", "Присудок", "Префікс"]

