- type: error-correction
  title: "Виправлення граматичних термінів"
  instruction: "Знайдіть та виправте неправильно вжитий граматичний термін."
  items:
    - sentence: "«Студент» — це дієслово, яке означає назву предмета або істоти."
      error: "дієслово"
      answer: "іменник"
      options: ["дієслово", "іменник", "прикметник", "числівник"]
      explanation: "Слова, що відповідають на питання хто/що, є іменниками."
    - sentence: "«Читати» — це прикметник, який виражає дію або стан людини чи предмета."
      error: "прикметник"
      answer: "дієслово"
      options: ["прикметник", "дієслово", "прислівник", "частка"]
      explanation: "Слова, що виражають дію, є дієсловами."
    - sentence: "«Красивий» — це прислівник, який описує ознаку або властивість певного іменника."
      error: "прислівник"
      answer: "прикметник"
      options: ["прислівник", "прикметник", "числівник", "сполучник"]
      explanation: "Слова, що відповідають на питання який, є прикметниками."
    - sentence: "«Дуже» — це іменник, який вказує на обставину дії або іншу ознаку."
      error: "іменник"
      answer: "прислівник"
      options: ["іменник", "прислівник", "займенник", "вигук"]
      explanation: "«Дуже» — це незмінна частина мови, тобто прислівник."
    - sentence: "Питання «кого? чого?» — це давальний відмінок, що виражає відсутність або належність."
      error: "давальний"
      answer: "родовий"
      options: ["давальний", "родовий", "орудний", "місцевий"]
      explanation: "Запитання «кого? чого?» належать родовому відмінку."
    - sentence: "Питання «ким? чим?» — це знахідний відмінок, що вказує на інструмент дії."
      error: "знахідний"
      answer: "орудний"
      options: ["знахідний", "орудний", "називний", "родовий"]
      explanation: "Інструмент дії виражає орудний відмінок."
    - sentence: "«Він» — це числівник, який вказує на предмет, але не називає його."
      error: "числівник"
      answer: "займенник"
      options: ["числівник", "займенник", "іменник", "прикметник"]
      explanation: "Займенник вживається замість імені."
    - sentence: "«П'ять» — це прийменник, який позначає певну кількість або порядок при лічбі."
      error: "прийменник"
      answer: "числівник"
      options: ["прийменник", "числівник", "сполучник", "частка"]
      explanation: "Слова, що означають числа, називаються числівниками."

