- type: true-false
  title: "Правда чи брехня: Граматика"
  instruction: "Визначте, чи є твердження правильним."
  items:
    - statement: "В українській мові шість відмінків."
      correct: false
      explanation: "Ні, їх сім (включаючи кличний)."
    - statement: "Іменник відповідає на питання 'хто?' або 'що?'."
      correct: true
    - statement: "Прикметник вказує на дію предмета."
      correct: false
      explanation: "Ні, на дію вказує дієслово. Прикметник вказує на ознаку."
    - statement: "Корінь — це спільна частина споріднених слів."
      correct: true
    - statement: "Підмет — це головний член речення, що відповідає на питання 'хто?' або 'що?'."
      correct: true
    - statement: "Прийменник — це самостійна частина мови."
      correct: false
      explanation: "Ні, це службова частина мови."
    - statement: "В українській мові є три роди: чоловічий, жіночий та середній."
      correct: true
    - statement: "Кличний відмінок використовується як підмет у реченні."
      correct: false
      explanation: "Ні, кличний відмінок використовується лише для звертання."

- type: unjumble
  title: "Складіть термін"
  instruction: "Розставте слова у правильному порядку, щоб отримати граматичне твердження."
  items:
    - words: ["відповідає", "називний", "на", "відмінок", "Хто", "питання", "Що"]
      answer: "Називний відмінок відповідає на питання Хто Що"
    - words: ["слова", "корінь", "це", "головна", "значуща", "частина"]
      answer: "Корінь це головна значуща частина слова"
    - words: ["речення", "підмет", "це", "головний", "член"]
      answer: "Підмет це головний член речення"
    - words: ["іменник", "називає", "це", "частина", "мови", "що", "предмет"]
      answer: "Іменник це частина мови що називає предмет"
    - words: ["службові", "частини", "мови", "не", "відповідають", "на", "питання"]
      answer: "Службові частини мови не відповідають на питання"
    - words: ["прикметник", "завжди", "узгоджується", "з", "іменником", "у", "реченні"]
      answer: "Прикметник завжди узгоджується з іменником у реченні"

