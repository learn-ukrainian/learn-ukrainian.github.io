- type: match-up
  title: "Термінологія частин мови"
  instruction: "Зіставте український граматичний термін із його англійським еквівалентом."
  pairs:
    - left: "іменник"
      right: "noun"
    - left: "дієслово"
      right: "verb"
    - left: "прикметник"
      right: "adjective"
    - left: "прислівник"
      right: "adverb"
    - left: "займенник"
      right: "pronoun"
    - left: "числівник"
      right: "numeral"
    - left: "сполучник"
      right: "conjunction"
    - left: "прийменник"
      right: "preposition"
    - left: "частка"
      right: "particle"
    - left: "вигук"
      right: "interjection"
    - left: "підмет"
      right: "subject"
    - left: "присудок"
      right: "predicate"

- type: quiz
  title: "Визначення частин мови за питаннями"
  instruction: "Виберіть правильну частину мови, до якої ми ставимо вказані питання."
  items:
    - question: "До якої частини мови ми ставимо питання «Хто?» або «Що?»?"
      options:
        - text: "іменник"
          correct: true
        - text: "дієслово"
          correct: false
        - text: "прикметник"
          correct: false
        - text: "прислівник"
          correct: false
      explanation: "Іменник називає предмет або особу і відповідає на питання «хто?» або «що?»."
    - question: "На які питання зазвичай відповідає така частина мови, як прикметник?"
      options:
        - text: "Як? Де? Коли?"
          correct: false
        - text: "Який? Яка? Яке?"
          correct: true
        - text: "Що робити? Що зробити?"
          correct: false
        - text: "Скільки? Котрий?"
          correct: false
      explanation: "Прикметник вказує на ознаку предмета і відповідає на питання «який?», «яка?», «яке?» або «які?»."
    - question: "Яка частина мови виражає дію і відповідає на питання «Що робити?»?"
      options:
        - text: "іменник"
          correct: false
        - text: "дієслово"
          correct: true
        - text: "займенник"
          correct: false
        - text: "прислівник"
          correct: false
      explanation: "Дієслово походить від слова «діяти» і виражає дію або стан предмета."
    - question: "До якої категорії належать слова, що відповідають на питання «Як?», «Де?» або «Коли?»?"
      options:
        - text: "прислівник"
          correct: true
        - text: "прикметник"
          correct: false
        - text: "числівник"
          correct: false
        - text: "сполучник"
          correct: false
      explanation: "Прислівник — це незмінна частина мови, що описує обставини дії."
    - question: "Яка частина мови вказує на кількість предметів або їх порядок при лічбі?"
      options:
        - text: "іменник"
          correct: false
        - text: "числівник"
          correct: true
        - text: "займенник"
          correct: false
        - text: "частка"
          correct: false
      explanation: "Числівник позначає число, кількість або порядок предметів при лічбі."
    - question: "Як називається частина мови, що вказує на предмет, але не називає його прямо?"
      options:
        - text: "іменник"
          correct: false
        - text: "займенник"
          correct: true
        - text: "прикметник"
          correct: false
        - text: "вигук"
          correct: false
      explanation: "Займенник використовується «замість імені», щоб уникати повторів у мовленні."
    - question: "Яка частина мови використовується для зв’язку слів у реченні та виражає залежність іменника?"
      options:
        - text: "прийменник"
          correct: true
        - text: "сполучник"
          correct: false
        - text: "частка"
          correct: false
        - text: "вигук"
          correct: false
      explanation: "Прийменник стоїть «при іменнику» і допомагає зрозуміти місце, напрямок або час."
    - question: "Яку функцію в українській мові виконує така службова частина мови, як сполучник?"
      options:
        - text: "виражає емоції"
          correct: false
        - text: "сполучає слова або речення"
          correct: true
        - text: "вказує на ознаку дії"
          correct: false
        - text: "замінює собою іменник"
          correct: false
      explanation: "Сполучник — це інструмент логіки, який з’єднує слова або цілі речення."

- type: fill-in
  title: "Сім відмінків української мови"
  instruction: "Заповніть пропуски у реченнях, використовуючи назви українських відмінків."
  items:
    - sentence: "Початкова форма іменника, яка відповідає на питання «Хто? Що?», — це _____ відмінок."
      answer: "називний"
      options: ["називний", "родовий", "знахідний", "орудний"]
      explanation: "Називний відмінок називає предмет і зазвичай є підметом у реченні."
    - sentence: "Коли ми кажемо, що у нас чогось немає (питання «Кого? Чого?»), ми вживаємо _____ відмінок."
      answer: "родовий"
      options: ["родовий", "давальний", "місцевий", "кличний"]
      explanation: "Родовий відмінок вказує на відсутність, приналежність або походження."
    - sentence: "Для позначення адресата дії (питання «Кому? Чому?») використовується _____ відмінок."
      answer: "давальний"
      options: ["давальний", "знахідний", "орудний", "називний"]
      explanation: "Давальний відмінок вказує на того, кому призначена дія."
    - sentence: "Прямий додаток, який відповідає на питання «Кого? Що?», стоїть у _____ відмінку."
      answer: "знахідний"
      options: ["знахідний", "родовий", "місцевий", "орудний"]
      explanation: "Знахідний відмінок вказує на об’єкт, на який безпосередньо спрямована дія."
    - sentence: "Інструмент дії або особу, з якою ми щось робимо, позначає _____ відмінок."
      answer: "орудний"
      options: ["орудний", "називний", "давальний", "кличний"]
      explanation: "Орудний відмінок відповідає на питання «Ким? Чим?»."
    - sentence: "Відмінок, який завжди вживається з прийменником і вказує на місце, — це _____ відмінок."
      answer: "місцевий"
      options: ["місцевий", "родовий", "знахідний", "давальний"]
      explanation: "Місцевий відмінок вказує на місце або час і вимагає прийменника."
    - sentence: "Для автентичного звертання до людини в українській мові ми використовуємо _____ відмінок."
      answer: "кличний"
      options: ["кличний", "називний", "орудний", "давальний"]
      explanation: "Кличний відмінок не відповідає на питання і слугує для звертання."
    - sentence: "У реченні «Я пишу ручкою» слово «ручкою» вжите у _____ відмінку."
      answer: "орудний"
      options: ["орудний", "місцевий", "давальний", "родовий"]
      explanation: "Тут «ручка» виступає інструментом дії, тому це орудний відмінок (чим?)."

- type: error-correction
  title: "Виправлення граматичних термінів"
  instruction: "Знайдіть і виправте помилку в описі граматичної категорії або терміна."
  items:
    - sentence: "Іменник «Київ» у реченні «Я живу в Києві» стоїть у родовому відмінку."
      error: "родовому"
      answer: "місцевому"
      options: ["родовому", "місцевому", "давальному", "знахідному"]
      explanation: "Питання «де?» (в кому? в чому?) вказує на місцевий відмінок."
    - sentence: "Слово «швидко» є прикметником, бо воно описує дію."
      error: "прикметником"
      answer: "прислівником"
      options: ["прикметником", "прислівником", "дієсловом", "іменником"]
      explanation: "Слова, що відповідають на питання «як?» і описують дію, є прислівниками."
    - sentence: "У слові «підводний» частина «вод» називається префіксом."
      error: "префіксом"
      answer: "коренем"
      options: ["префіксом", "коренем", "суфіксом", "закінченням"]
      explanation: "«Вод» — це спільна частина споріднених слів, яка несе основне значення, тобто корінь."
    - sentence: "Службова частина мови, що виражає емоції, називається часткою."
      error: "часткою"
      answer: "вигуком"
      options: ["часткою", "вигуком", "сполучником", "прийменником"]
      explanation: "Емоції, настрої та звукові реакції виражають вигуки (наприклад, Ой!, Ах!)."
    - sentence: "Категорія, що визначає приналежність до чоловічого, жіночого або середнього, — це число."
      error: "число"
      answer: "рід"
      options: ["число", "рід", "особа", "час"]
      explanation: "Чоловічий, жіночий та середній — це граматичні роди (рід)."
    - sentence: "Головний член речення, що позначає дію підмета, називається додатком."
      error: "додатком"
      answer: "присудком"
      options: ["додатком", "присудком", "означенням", "обставиною"]
      explanation: "Присудок відповідає на питання «що робить підмет?» і виражає дію."
    - sentence: "Звертання «Пане вчитель!» вжите у називному відмінку."
      error: "називному"
      answer: "кличному"
      options: ["називному", "кличному", "давальному", "родовому"]
      explanation: "Звертання в українській мові завжди потребує кличного відмінка."
    - sentence: "Слово «двадцять» у реченні «Мені двадцять років» — це займенник."
      error: "займенник"
      answer: "числівник"
      options: ["займенник", "числівник", "іменник", "прислівник"]
      explanation: "Слова, що позначають кількість або число, є числівниками."

- type: mark-the-words
  title: "Знайдіть граматичні терміни в тексті"
  instruction: "Знайдіть і позначте всі граматичні терміни (назви частин мови, відмінків або членів речення) у кожному реченні."
  text: "Кожен іменник в українській мові має рід, число та відмінок. Дієслово позначає дію або стан і змінюється за часом та особою. У реченні підмет виконує головну дію, а присудок описує цю дію. Прикметник узгоджується з іменником у роді, числі та відмінку. Прийменник і сполучник — це службові частини мови, які зв'язують слова і речення. Знахідний відмінок відповідає на питання «кого? що?», а орудний — на «ким? чим?»."
  answers:
    - "іменник"
    - "рід"
    - "число"
    - "відмінок"
    - "Дієслово"
    - "часом"
    - "особою"
    - "підмет"
    - "присудок"
    - "Прикметник"
    - "Прийменник"
    - "сполучник"
    - "Знахідний відмінок"
    - "орудний"
