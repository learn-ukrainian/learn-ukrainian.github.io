- type: quiz
  title: "Визначення частини мови"
  instruction: "Виберіть правильну назву для частини мови на основі її граматичної функції."
  items:
    - question: "Яка частина мови вказує на назву предмета або особи і відповідає на питання «Хто?» або «Що?»?"
      options:
        - text: "іменник"
          correct: true
        - text: "дієслово"
          correct: false
        - text: "прикметник"
          correct: false
        - text: "прислівник"
          correct: false
    - question: "Як ми називаємо незмінну частину мови, що вказує на ознаку дії, як-от у слові «швидко»?"
      options:
        - text: "прислівник"
          correct: true
        - text: "іменник"
          correct: false
        - text: "дієслово"
          correct: false
        - text: "сполучник"
          correct: false
    - question: "Яка категорія слів описує дію або стан предмета і відповідає на питання «Що робити?»?"
      options:
        - text: "дієслово"
          correct: true
        - text: "іменник"
          correct: false
        - text: "прикметник"
          correct: false
        - text: "займенник"
          correct: false
    - question: "Яким терміном ми позначаємо слово, що вказує на ознаку предмета, наприклад «зелений»?"
      options:
        - text: "прикметник"
          correct: true
        - text: "прислівник"
          correct: false
        - text: "числівник"
          correct: false
        - text: "дієслово"
          correct: false
    - question: "Яка частина мови використовується для заміни іменника, щоб уникнути повторів у тексті?"
      options:
        - text: "займенник"
          correct: true
        - text: "іменник"
          correct: false
        - text: "сполучник"
          correct: false
        - text: "частка"
          correct: false
    - question: "Яка частина мови допомагає нам рахувати предмети або вказувати на їхній порядок при лічбі?"
      options:
        - text: "числівник"
          correct: true
        - text: "іменник"
          correct: false
        - text: "прикметник"
          correct: false
        - text: "прийменник"
          correct: false
    - question: "Як називається службова частина мови, що з’єднує слова або частини складного речення?"
      options:
        - text: "сполучник"
          correct: true
        - text: "прийменник"
          correct: false
        - text: "частка"
          correct: false
        - text: "вигук"
          correct: false
    - question: "Як ми називаємо слово, що стоїть «при імені» і вказує на просторові чи часові відношення?"
      options:
        - text: "прийменник"
          correct: true
        - text: "сполучник"
          correct: false
        - text: "іменник"
          correct: false
        - text: "дієслово"
          correct: false
    - question: "Яка категорія слів не має лексичного значення, але додає реченню емоційного забарвлення або заперечення?"
      options:
        - text: "частка"
          correct: true
        - text: "сполучник"
          correct: false
        - text: "вигук"
          correct: false
        - text: "числівник"
          correct: false
    - question: "Яка особлива частина мови виражає почуття та емоції, не називаючи їх, наприклад слово «ой»?"
      options:
        - text: "вигук"
          correct: true
        - text: "частка"
          correct: false
        - text: "іменник"
          correct: false
        - text: "прислівник"
          correct: false

- type: fill-in
  title: "Граматичні терміни в контексті"
  instruction: "Доповніть речення правильним граматичним терміном."
  items:
    - sentence: "В українській мові існує сім ____."
      answer: "відмінків"
      options: ["відмінків", "родів", "чисел", "часів"]
    - sentence: "____ — це початкова форма іменника."
      answer: "називний"
      options: ["називний", "родовий", "давальний", "знахідний"]
    - sentence: "Для звертання використовується ____ відмінок."
      answer: "кличний"
      options: ["кличний", "місцевий", "орудний", "давальний"]
    - sentence: "Частина слова перед коренем називається ____."
      answer: "префікс"
      options: ["префікс", "суфікс", "корінь", "закінчення"]
    - sentence: "____ — це головний член речення, що вказує на дію."
      answer: "присудок"
      options: ["присудок", "підмет", "іменник", "обставина"]
    - sentence: "Слово 'гарно' вказує на ознаку дії, тому це ____."
      answer: "прислівник"
      options: ["прислівник", "прикметник", "іменник", "дієслово"]
    - sentence: "Дієслова в українській мові мають два ____: доконаний і недоконаний."
      answer: "види"
      options: ["види", "часи", "роди", "особи"]
    - sentence: "____ відмінок найчастіше вказує на місце дії."
      answer: "місцевий"
      options: ["місцевий", "знахідний", "родовий", "називний"]

