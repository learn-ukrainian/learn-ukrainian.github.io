version: '1.0'
module: alternation-consonants-verbs
level: b1
inline:
- id: fill-in-1st-person
  type: fill-in
  instruction: Вставте правильну форму дієслова (1 особа однини).
  items:
  - sentence: Я часто ____ (сидіти) вдома.
    answer: сиджу
  - sentence: Я щодня ____ (носити) цю сумку.
    answer: ношу
  - sentence: Я ____ (крутити) кермо.
    answer: кручу
  - sentence: Я обережно ____ (водити) машину.
    answer: воджу
  - sentence: Я ____ (просити) вас допомогти.
    answer: прошу
  - sentence: Я ____ (летіти) літаком додому.
    answer: лечу
  - sentence: Я ____ (возити) дітей до школи.
    answer: вожу
  - sentence: Я ____ (морозити) ягоди на зиму.
    answer: морожу
  - sentence: Я щоранку ____ (будити) сина.
    answer: буджу
  - sentence: Я завжди ____ (платити) готівкою.
    answer: плачу
- id: match-infinitive-1st-sg
  type: match-up
  instruction: З'єднайте інфінітив із формою першої особи однини.
  pairs:
  - left: водити
    right: воджу
  - left: купити
    right: куплю
  - left: любити
    right: люблю
  - left: ловити
    right: ловлю
  - left: робити
    right: роблю
  - left: чистити
    right: чищу
  - left: ліпити
    right: ліплю
  - left: ставити
    right: ставлю
  - left: мостити
    right: мощу
  - left: дрімати
    right: дрімлю
- id: quiz-identify-which-alternation-type-applies-to-a-given-verb-dental-velar-or-labial
  type: quiz
  instruction: Визначте, який тип чергування відбувається в поданому дієслові.
  items:
  - question: пекти (я печу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 1
  - question: водити (я воджу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 0
  - question: ловити (я ловлю)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 2
  - question: могти (я можу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 1
  - question: робити (я роблю)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 2
  - question: сидіти (я сиджу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 0
  - question: берегти (я бережу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 1
  - question: купити (я куплю)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 2
- id: sort-alternation-groups
  type: group-sort
  instruction: Розподіліть дієслова за типом чергування в першій особі однини.
  groups:
  - label: '[д] -> [дж]'
    items:
    - ходити
    - сидіти
  - label: '[т] -> [ч]'
    items:
    - крутити
    - платити
  - label: '[з] -> [ж]'
    items:
    - возити
    - морозити
  - label: '[с] -> [ш]'
    items:
    - носити
    - просити
  - label: Губний + [л]
    items:
    - робити
    - купити
- id: fill-in-imperfective
  type: fill-in
  instruction: Утворіть дієслово недоконаного виду за допомогою суфікса «-увати» або
    «-ати».
  items:
  - sentence: Треба ____ (знизити) ціни на ці товари.
    answer: знижувати
  - sentence: Ми любимо ____ (запросити) друзів у гості.
    answer: запрошувати
  - sentence: Потрібно ____ (скоротити) цей довгий текст.
    answer: скорочувати
  - sentence: Вони хочуть ____ (зарядити) свій телефон.
    answer: заряджати
  - sentence: Не варто ____ (засудити) інших людей.
    answer: засуджувати
  - sentence: Вона намагається ____ (уявити) своє майбутнє.
    answer: уявляти
- id: error-correction-find-and-fix-conjugation-errors-in-sentences
  type: error-correction
  instruction: Знайдіть і виправте помилку в дієвідмінюванні.
  items:
  - sentence: Я завжди сижу на цьому зручному стільці.
    error: сижу
    correction: сиджу
    error_type: word
    options:
    - сиджу
    - сидю
    - сидію
    explanation: 'Чергування [д] -> [дж]: сидіти — я сиджу.'
  - sentence: Я щоранку робю ранкову гімнастику.
    error: робю
    correction: роблю
    error_type: word
    options:
    - роблю
    - робою
    - робую
    explanation: 'Губні приголосні вимагають вставного звука [л]: робити — я роблю.'
  - sentence: Я ніжно любу цю класичну музику.
    error: любу
    correction: люблю
    error_type: word
    options:
    - люблю
    - любію
    - любуюсь
    explanation: 'Чергування [б] -> [бл] у першій особі: любити — я люблю.'
  - sentence: Я часто їзжу до бабусі в село.
    error: їзжу
    correction: їжджу
    error_type: word
    options:
    - їжджу
    - їзду
    - їжжу
    explanation: 'Чергування групи [зд] -> [ждж]: їздити — я їжджу.'
  - sentence: Я із задоволенням ходю парком кожного вечора.
    error: ходю
    correction: ходжу
    error_type: word
    options:
    - ходжу
    - хожу
    - ходію
    explanation: 'Чергування [д] -> [дж] у першій особі однини: ходити — я ходжу.'
  - sentence: Я обов'язково купю цей смачний свіжий хліб.
    error: купю
    correction: куплю
    error_type: word
    options:
    - куплю
    - купаю
    - купу
    explanation: 'Губні приголосні вимагають вставного звука [л]: купити — я куплю.'
workbook:
- type: true-false
  instruction: Визначте, чи правильне твердження.
  items:
  - statement: У дієсловах другої дієвідміни чергування відбувається в усіх особах
      теперішнього часу.
    correct: false
    explanation: Чергування в другій дієвідміні відбувається лише в першій особі однини
      (я).
  - statement: Чергування губних приголосних із додаванням [л] відбувається у формах
      «я» та «вони».
    correct: true
    explanation: 'Наприклад: я люблю, вони люблять.'
  - statement: У минулому часі чергування приголосних не відбувається.
    correct: true
    explanation: 'Основа інфінітива зберігається: носити — носив.'
  - statement: У наказовому способі ми завжди зберігаємо чергування (наприклад, «сидж!»).
    correct: false
    explanation: 'У наказовому способі ми повертаємося до оригінального приголосного:
      «сидь!», «проси!».'
  - statement: Звук [д] у дієсловах завжди змінюється на [ж].
    correct: false
    explanation: Звук [д] змінюється на африкату [дж] (ходити — ходжу).
  - statement: У дієсловах першої дієвідміни (наприклад, «могти») шиплячий звук зберігається
      в усіх особах.
    correct: true
    explanation: Я можу, ти можеш, вони можуть — чергування стабільне.
- type: fill-in
  instruction: Вставте правильну форму дієслова за контекстом.
  items:
  - sentence: Вона дуже добре ____ (пекти) яблучний пиріг.
    answer: пече
    options:
    - пече
    - пеке
    - печеть
    - печу
  - sentence: Я завжди ____ (берегти) секрети своїх друзів.
    answer: бережу
    options:
    - берегу
    - бережу
    - бережеш
    - бережить
  - sentence: Вони часто ____ (їздити) на море влітку.
    answer: їздять
    options:
    - їздять
    - їжджать
    - їздуть
    - їжджуть
  - sentence: Ти ____ (бачити) цей новий високий будинок?
    answer: бачиш
    options:
    - бачиш
    - бачу
    - бачеш
    - бачить
  - sentence: Вони обов'язково ____ (купити) нам квитки на концерт.
    answer: куплять
    options:
    - куплять
    - купять
    - куплють
    - купить
  - sentence: Я ніколи не ____ (плакати) під час перегляду фільмів.
    answer: плачу
    options:
    - плачу
    - плакаю
    - плаку
    - плачемо
