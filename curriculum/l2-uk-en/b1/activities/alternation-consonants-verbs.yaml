version: '1.0'
module: alternation-consonants-verbs
level: b1
workbook:
- id: fill-in-conjugation-ii
  type: fill-in
  instruction: Вставте правильну форму дієслова (перша особа однини)
  items:
  - sentence: Я зручно _____ на дивані (сидіти).
    answer: сиджу
    options:
    - сиджу
    - сидю
    - сижу
    - сидію
  - sentence: Я щодня _____ окуляри (носити).
    answer: ношу
    options:
    - ношу
    - носю
    - ношю
    - носію
  - sentence: Я обережно _____ автомобіль (водити).
    answer: воджу
    options:
    - воджу
    - водю
    - вожу
    - водію
  - sentence: Я завжди _____ за каву готівкою (платити).
    answer: плачу
    options:
    - плачу
    - платю
    - плачю
    - платію
  - sentence: Я _____ свіжі ягоди на зиму (морозити).
    answer: морожу
    options:
    - морожу
    - морозю
    - морожю
    - морозію
  - sentence: Я часто _____ на роботу на метро (їздити).
    answer: їжджу
    options:
    - їжджу
    - їзжу
    - їздю
    - їздію
  - sentence: Я _____ тобі цю маленьку помилку (простити).
    answer: прощу
    options:
    - прощу
    - простю
    - прошчу
    - простію
  - sentence: Я _____ свіжу картоплю на кухні (чистити).
    answer: чищу
    options:
    - чищу
    - чистю
    - чишчу
    - чистію
  - sentence: Я _____ сина о сьомій ранку (будити).
    answer: буджу
    options:
    - буджу
    - будю
    - бужу
    - будію
  - sentence: Я не _____ тобі туди йти (радити).
    answer: раджу
    options:
    - раджу
    - радю
    - ражу
    - радію
- id: group-sort-alternation-types
  type: group-sort
  instruction: Розподіліть дієслова за типом чергування в першій особі однини («я»)
  groups:
  - label: Зубний (д, т) -> Африката або Шиплячий (дж, ч)
    items:
    - сидіти
    - водити
    - платити
    - летіти
  - label: Свистячий (з, с) -> Шиплячий (ж, ш)
    items:
    - носити
    - просити
    - возити
    - морозити
  - label: Губний (б, п, в, м, ф) -> отримує вставний [л']
    items:
    - робити
    - любити
    - спати
    - купити
- id: match-up-infinitive-1st-person
  type: match-up
  instruction: З'єднайте інфінітив дієслова з правильною формою першої особи однини
    («я»)
  pairs:
  - left: водити
    right: воджу
  - left: купити
    right: куплю
  - left: робити
    right: роблю
  - left: крутити
    right: кручу
  - left: спати
    right: сплю
  - left: губити
    right: гублю
  - left: ловити
    right: ловлю
  - left: летіти
    right: лечу
  - left: світити
    right: свічу
  - left: просити
    right: прошу
- id: group-sort-detailed-alternations
  type: group-sort
  instruction: Розподіліть дієслова за звуком, який з'являється у формі «я»
  groups:
  - label: З'являється звук [дж]
    items:
    - сидіти
    - водити
    - будити
  - label: З'являється звук [ч]
    items:
    - платити
    - крутити
    - летіти
    - пекти
  - label: З'являється звук [ж]
    items:
    - возити
    - морозити
    - лазити
    - могти
  - label: З'являється звук [ш]
    items:
    - носити
    - просити
    - косити
    - брехати
  - label: З'являється губний + [л']
    items:
    - робити
    - любити
    - спати
    - купити
- id: fill-in-imperfective-verbs
  type: fill-in
  instruction: Утворіть дієслово недоконаного виду від поданого доконаного дієслова
  items:
  - sentence: Я завжди забуваю _____ свій телефон ввечері (зарядити).
    answer: заряджати
    options:
    - заряджати
    - зарядати
    - заряджувати
    - заряжувати
  - sentence: Він хоче щомісяця _____ кредит за квартиру (сплатити).
    answer: сплачувати
    options:
    - сплачувати
    - сплатувати
    - сплатяти
    - сплачати
  - sentence: Супермаркет починає _____ ціни перед святами (знизити).
    answer: знижувати
    options:
    - знижувати
    - знизувати
    - знижати
    - знизяти
  - sentence: Ми любимо _____ друзів на вечерю у п'ятницю (запросити).
    answer: запрошувати
    options:
    - запрошувати
    - запросувати
    - запрощати
    - запрошати
  - sentence: Армія повинна _____ своїх громадян (захистити).
    answer: захищати
    options:
    - захищати
    - захистувати
    - захищувати
    - захистити
  - sentence: Він хоче _____ більше, тому шукає нову роботу (заробити).
    answer: заробляти
    options:
    - заробляти
    - зароблювати
    - заробити
    - зароблати
- id: error-correction-conjugations
  type: error-correction
  instruction: Знайдіть і виправте фонетичну помилку у формі дієслова
  items:
  - sentence: Я сижу на зручному дивані.
    error: сижу
    correction: сиджу
    error_type: word
    options:
    - сиджу
    - сидю
    - сидію
    - сидять
    explanation: 'Зубний [д] переходить в африкату [дж] у формі першої особи однини
      (я): сидіти -> сиджу.'
  - sentence: Я робю своє домашнє завдання.
    error: робю
    correction: роблю
    error_type: word
    options:
    - роблю
    - робу
    - робію
    - роблять
    explanation: Після губних приголосних (як [б]) завжди з'являється вставний [л']
      у формі «я».
  - sentence: Я їзжу на роботу на метро.
    error: їзжу
    correction: їжджу
    error_type: word
    options:
    - їжджу
    - їзджу
    - їздю
    - їздять
    explanation: 'Група приголосних [зд] переходить у складний звук [ждж]: їздити
      -> їжджу.'
  - sentence: Я платю за каву готівкою.
    error: платю
    correction: плачу
    error_type: word
    options:
    - плачу
    - платію
    - плачю
    - платять
    explanation: 'Зубний [т] переходить у шиплячий [ч]: платити -> плачу.'
  - sentence: Я любю класичну музику.
    error: любю
    correction: люблю
    error_type: word
    options:
    - люблю
    - любу
    - любію
    - люблять
    explanation: 'Після губного [б] з''являється вставний сонорний [л'']: любити ->
      люблю.'
  - sentence: Я носю важкі сумки.
    error: носю
    correction: ношу
    error_type: word
    options:
    - ношу
    - носію
    - ношю
    - носять
    explanation: 'Свистячий [с] переходить у глухий шиплячий [ш]: носити -> ношу.'
- id: quiz-velar-alternations
  type: quiz
  instruction: Оберіть правильну форму дієслова (чергування задньоязикового звука)
  items:
  - question: Я _____ це зробити швидко (могти).
    options:
    - можу
    - могу
    - могю
    - можю
    correct: 0
  - question: Я _____ нашу рідну природу (берегти).
    options:
    - бережу
    - берегу
    - берегю
    - бережю
    correct: 0
  - question: Я _____ смачний шоколадний торт (пекти).
    options:
    - печу
    - пеку
    - пекю
    - печю
    correct: 0
  - question: Я _____ від великого щастя (плакати).
    options:
    - плачу
    - плаку
    - плакю
    - плачю
    correct: 0
  - question: Я ніколи не _____ своїм друзям (брехати).
    options:
    - брешу
    - бреху
    - брехю
    - брешю
    correct: 0
  - question: Я лагідно _____ маленьку дитину (колихати).
    options:
    - колишу
    - колиху
    - колихю
    - колишю
    correct: 0
