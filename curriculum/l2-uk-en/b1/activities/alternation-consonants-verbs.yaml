version: '1.0'
module: alternation-consonants-verbs
level: b1
inline:
- id: fill-in-1st-person
  type: fill-in
  instruction: Вставте правильну форму дієслова (1 особа однини).
  items:
  - sentence: Я часто ____ вдома.
    answer: сиджу
  - sentence: Я щодня ____ цю сумку.
    answer: ношу
  - sentence: Я ____ кермо.
    answer: кручу
  - sentence: Я обережно ____ машину.
    answer: воджу
  - sentence: Я ____ вас допомогти.
    answer: прошу
  - sentence: Я ____ літаком додому.
    answer: лечу
  - sentence: Я ____ дітей до школи.
    answer: вожу
  - sentence: Я ____ ягоди на зиму.
    answer: морожу
  - sentence: Я щоранку ____ сина.
    answer: буджу
  - sentence: Я завжди ____ готівкою.
    answer: плачу
- id: match-infinitive-1st-sg
  type: match-up
  instruction: З'єднайте інфінітив із формою першої особи однини.
  pairs:
  - left: водити
    right: воджу
  - left: купити
    right: куплю
  - left: любити
    right: люблю
  - left: ловити
    right: ловлю
  - left: робити
    right: роблю
  - left: чистити
    right: чищу
  - left: ліпити
    right: ліплю
  - left: ставити
    right: ставлю
  - left: мостити
    right: мощу
  - left: дрімати
    right: дрімлю
- id: quiz-identify-which-alternation-type-applies-to-a-given-verb-dental-velar-or-labial
  type: quiz
  instruction: Визначте, який тип чергування відбувається в поданому дієслові.
  items:
  - question: пекти (я печу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 1
  - question: водити (я воджу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 0
  - question: ловити (я ловлю)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 2
  - question: могти (я можу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 1
  - question: робити (я роблю)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 2
  - question: сидіти (я сиджу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 0
  - question: берегти (я бережу)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 1
  - question: купити (я куплю)
    options:
    - Зубні та свистячі
    - Задньоязикові
    - Губні
    - Без чергування
    correct: 2
- id: sort-alternation-groups
  type: group-sort
  instruction: Розподіліть дієслова за типом чергування в першій особі однини.
  groups:
  - label: '[д] -> [дж]'
    items:
    - ходити
    - сидіти
  - label: '[т] -> [ч]'
    items:
    - крутити
    - платити
  - label: '[з] -> [ж]'
    items:
    - возити
    - морозити
  - label: '[с] -> [ш]'
    items:
    - носити
    - просити
  - label: Губний + [л]
    items:
    - робити
    - купити
- id: fill-in-imperfective
  type: fill-in
  instruction: Утворіть дієслово недоконаного виду за допомогою суфікса «-увати» або
    «-ати».
  items:
  - sentence: Треба ____ ціни на ці товари.
    answer: знижувати
  - sentence: Ми любимо ____ друзів у гості.
    answer: запрошувати
  - sentence: Потрібно ____ цей довгий текст.
    answer: скорочувати
  - sentence: Вони хочуть ____ свій телефон.
    answer: заряджати
  - sentence: Не варто ____ інших людей.
    answer: засуджувати
  - sentence: Вона намагається ____ своє майбутнє.
    answer: уявляти
workbook:
- type: fill-in
  instruction: Вставте правильну форму дієслова за контекстом.
  items:
  - sentence: Вона дуже добре ____ яблучний пиріг.
    answer: пече
    options:
    - пече
    - пеке
    - печеть
    - печу
  - sentence: Я завжди ____ секрети своїх друзів.
    answer: бережу
    options:
    - берегу
    - бережу
    - бережеш
    - бережить
  - sentence: Вони часто ____ на море влітку.
    answer: їздять
    options:
    - їздять
    - їжджать
    - їздуть
    - їжджуть
  - sentence: Ти ____ цей новий високий будинок?
    answer: бачиш
    options:
    - бачиш
    - бачу
    - бачеш
    - бачить
  - sentence: Вони обов'язково ____ нам квитки на концерт.
    answer: куплять
    options:
    - куплять
    - купять
    - куплють
    - купить
  - sentence: Я ніколи не ____ під час перегляду фільмів.
    answer: плачу
    options:
    - плачу
    - плакаю
    - плаку
    - плачемо
- type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - Я
    - ношу
    - рюкзак.
    - щодня
    - цей
    correct_order:
    - Я
    - щодня
    - ношу
    - цей
    - рюкзак.
  - words:
    - дуже
    - люблю
    - цю
    - Я
    - музику.
    correct_order:
    - Я
    - дуже
    - люблю
    - цю
    - музику.
  - words:
    - часто
    - Вони
    - в
    - рибу
    - ловлять
    - озері.
    correct_order:
    - Вони
    - часто
    - ловлять
    - рибу
    - в
    - озері.
  - words:
    - вечора.
    - Я
    - ходжу
    - кожного
    - парком
    correct_order:
    - Я
    - ходжу
    - парком
    - кожного
    - вечора.
  - words:
    - завжди
    - роботу.
    - свою
    - роблю
    - Я
    correct_order:
    - Я
    - завжди
    - роблю
    - свою
    - роботу.
  - words:
    - у
    - сиджу
    - кріслі.
    - Я
    - зручному
    correct_order:
    - Я
    - сиджу
    - у
    - зручному
    - кріслі.
