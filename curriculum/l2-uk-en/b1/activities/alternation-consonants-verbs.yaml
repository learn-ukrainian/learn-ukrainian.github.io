version: '1.0'
module: alternation-consonants-verbs
level: b1
inline:
- id: fill-in-1st-person
  type: fill-in
  instruction: Вставте правильну форму дієслова (я ...)
  items:
  - sentence: Я завжди ____ на цьому стільці.
    answer: сиджу
  - sentence: Я щоранку ____ сина.
    answer: буджу
  - sentence: Я ____ цей новий светр.
    answer: ношу
  - sentence: Я ____ вас про допомогу.
    answer: прошу
  - sentence: Я рідко ____ на метро.
    answer: їжджу
  - sentence: Я ____ кермо автомобіля.
    answer: кручу
  - sentence: Я завтра ____ до іншого міста.
    answer: лечу
  - sentence: Я ____ ліхтариком у темряві.
    answer: свічу
  - sentence: Я зараз ____ за нашу каву.
    answer: плачу
  - sentence: Я ____ зуби двічі на день.
    answer: чищу
  title: Вставте правильну форму дієслова (я ...)
- id: quiz-identify-which-alternation-type-applies-to-a-given-verb-dental-velar-or-labial
  type: quiz
  instruction: Який тип чергування приголосних відбувається у цих дієсловах?
  items:
  - question: любити (я люблю)
    options:
    - Зубний (д, т)
    - Свистячий (з, с, зд, ст)
    - Задньоязиковий (г, к, х)
    - Губний (б, п, в, м, ф)
    correct: 3
  - question: сидіти (я сиджу)
    options:
    - Зубний (д, т)
    - Свистячий (з, с, зд, ст)
    - Задньоязиковий (г, к, х)
    - Губний (б, п, в, м, ф)
    correct: 0
  - question: могти (я можу)
    options:
    - Зубний (д, т)
    - Свистячий (з, с, зд, ст)
    - Задньоязиковий (г, к, х)
    - Губний (б, п, в, м, ф)
    correct: 2
  - question: носити (я ношу)
    options:
    - Зубний (д, т)
    - Свистячий (з, с, зд, ст)
    - Задньоязиковий (г, к, х)
    - Губний (б, п, в, м, ф)
    correct: 1
  - question: робити (я роблю)
    options:
    - Зубний (д, т)
    - Свистячий (з, с, зд, ст)
    - Задньоязиковий (г, к, х)
    - Губний (б, п, в, м, ф)
    correct: 3
  - question: пекти (я печу)
    options:
    - Зубний (д, т)
    - Свистячий (з, с, зд, ст)
    - Задньоязиковий (г, к, х)
    - Губний (б, п, в, м, ф)
    correct: 2
  - question: крутити (я кручу)
    options:
    - Зубний (д, т)
    - Свистячий (з, с, зд, ст)
    - Задньоязиковий (г, к, х)
    - Губний (б, п, в, м, ф)
    correct: 0
  - question: просити (я прошу)
    options:
    - Зубний (д, т)
    - Свистячий (з, с, зд, ст)
    - Задньоязиковий (г, к, х)
    - Губний (б, п, в, м, ф)
    correct: 1
  title: Який тип чергування приголосних відбувається у цих дієсловах?
- id: sort-alternation-groups
  type: group-sort
  instruction: Розподіліть дієслова за типом чергування в 1-й особі однини (я)
  groups:
  - label: '[д] -> [дж]'
    items:
    - водити
    - будити
  - label: '[т] -> [ч]'
    items:
    - крутити
    - платити
  - label: '[з] -> [ж]'
    items:
    - возити
    - морозити
  - label: '[с] -> [ш]'
    items:
    - носити
    - просити
  - label: Губний + [л]
    items:
    - робити
    - купити
  title: Розподіліть дієслова за типом чергування в 1-й особі однини (я)
- id: match-infinitive-1st-sg
  type: match-up
  instruction: З'єднайте інфінітив із формою 1-ї особи однини (я)
  pairs:
  - left: ходити
    right: ходжу
  - left: возити
    right: вожу
  - left: мостити
    right: мощу
  - left: любити
    right: люблю
  - left: ставити
    right: ставлю
  - left: ловити
    right: ловлю
  - left: пекти
    right: печу
  - left: стерегти
    right: стережу
  - left: берегти
    right: бережу
  - left: їздити
    right: їжджу
  title: З'єднайте інфінітив із формою 1-ї особи однини (я)
- id: fill-in-imperfective
  type: fill-in
  instruction: Утворіть дієслово недоконаного виду (за допомогою суфіксів -ати/-увати)
  items:
  - sentence: 'Доконаний вид: народити. Недоконаний вид: ____.'
    answer: народжувати
  - sentence: 'Доконаний вид: запросити. Недоконаний вид: ____.'
    answer: запрошувати
  - sentence: 'Доконаний вид: знизити. Недоконаний вид: ____.'
    answer: знижувати
  - sentence: 'Доконаний вид: простити. Недоконаний вид: ____.'
    answer: прощати
  - sentence: 'Доконаний вид: збагатити. Недоконаний вид: ____.'
    answer: збагачувати
  - sentence: 'Доконаний вид: прикрасити. Недоконаний вид: ____.'
    answer: прикрашати
  title: Утворіть дієслово недоконаного виду (за допомогою суфіксів -ати/-увати)
