- type: fill-in
  instruction: Вставте правильну форму дієслова за особою (зверніть увагу, чи потрібне
    чергування)
  items:
  - sentence: Ти ____ цю куртку щодня?
    answer: носиш
    options:
    - ношу
    - носиш
    - носить
  - sentence: Я ____ цей светр тільки взимку.
    answer: ношу
    options:
    - ношу
    - носиш
    - носить
  - sentence: Вони дуже ____ слухати класичну музику.
    answer: люблять
    options:
    - люблю
    - любить
    - люблять
  - sentence: Він завжди ____ за свою каву.
    answer: платить
    options:
    - плачу
    - платиш
    - платить
  - sentence: Я зазвичай ____ готівкою.
    answer: плачу
    options:
    - плачу
    - платиш
    - платить
  - sentence: Ми часто ____ у цьому парку.
    answer: сидимо
    options:
    - сиджу
    - сидимо
    - сидять
  title: Вставте правильну форму дієслова за особою (зверніть увагу, чи потрібне чергуван
