version: '1.0'
module: alternation-vowels
level: b1
workbook:
- id: match-up-forms
  type: match-up
  instruction: З'єднайте форму називного відмінка з формою непрямого відмінка.
  pairs:
  - left: рік
    right: року
  - left: кінь
    right: коня
  - left: двір
    right: двору
  - left: ніж
    right: ножа
  - left: лід
    right: льоду
  - left: поріг
    right: порога
  - left: вечір
    right: вечора
  - left: стіл
    right: стола
- id: fill-in-syllables
  type: fill-in
  instruction: Утворіть форму родового відмінка множини. Пам'ятайте про закритий склад!
  items:
  - sentence: У нас багато сучасних ___ (школа).
    answer: шкіл
    options:
    - шкіл
    - школ
  - sentence: Навколо багато високих ___ (гора).
    answer: гір
    options:
    - гір
    - гор
  - sentence: Ми проїхали повз кілька мальовничих ___ (село).
    answer: сіл
    options:
    - сіл
    - сел
  - sentence: Він знає дуже багато нових ___ (слово).
    answer: слів
    options:
    - слів
    - слов
  - sentence: У фермера є велике стадо ___ (корова).
    answer: корів
    options:
    - корів
    - коров
  - sentence: Там стояли чоловіки без ___ (борода).
    answer: борід
    options:
    - борід
    - бород
  - sentence: У цій кімнаті зараз багато ___ (особа).
    answer: осіб
    options:
    - осіб
    - особ
  - sentence: У нашому місті з'явилося багато нових ___ (дорога).
    answer: доріг
    options:
    - доріг
    - дорог
- id: quiz-alternations
  type: quiz
  instruction: Визначте тип чергування голосних у цих парах слів.
  items:
  - question: рік — року
    options:
    - '[о] з [і]'
    - '[е] з [і]'
    - біглий голосний
    - '[о] з [а]'
    correct: 0
  - question: день — дня
    options:
    - біглий голосний
    - '[о] з [і]'
    - '[е] з [і]'
    - '[о] з [е] після шиплячих'
    correct: 0
  - question: учень — учня
    options:
    - біглий голосний
    - '[е] з [і]'
    - '[о] з [а]'
    - '[о] з [і]'
    correct: 0
  - question: ніч — ночі
    options:
    - '[о] з [і]'
    - біглий голосний
    - '[е] з [и]'
    - '[о] з [а]'
    correct: 0
  - question: піч — печі
    options:
    - '[е] з [і]'
    - '[о] з [і]'
    - біглий голосний
    - '[о] з [е] після шиплячих'
    correct: 0
  - question: шматок — шматка
    options:
    - біглий голосний
    - '[о] з [і]'
    - '[е] з [і]'
    - '[о] з [а]'
    correct: 0
  - question: допомогти — допомагати
    options:
    - '[о] з [а]'
    - '[о] з [і]'
    - біглий голосний
    - '[е] з [и]'
    correct: 0
  - question: терти — стирати
    options:
    - '[е] з [и]'
    - '[о] з [і]'
    - біглий голосний
    - '[о] з [а]'
    correct: 0
- id: group-sort-types
  type: group-sort
  instruction: Розподіліть пари слів за типом чергування.
  groups:
  - label: '[о] з [і]'
    items:
    - кіт — кота
    - поріг — порога
    - радість — радості
  - label: '[е] з [і]'
    items:
    - річ — речі
    - осінь — осені
  - label: Біглий голосний
    items:
    - хлопець — хлопця
    - корінь — кореня
    - сон — сну
  - label: '[о] з [е] після шиплячих'
    items:
    - вечеря — вчора
    - пшениця — пшоно
- id: error-correction-verbs
  type: error-correction
  instruction: Знайдіть і виправте помилку в дієслівних коренях.
  items:
  - sentence: Він завжди допомігає друзям.
    error: допомігає
    correction: допомагає
    error_type: word
    options:
    - допомагає
    - допоможу
    - допоможе
    explanation: Суфікс -а- змушує звук [о] перетворитися на [а].
  - sentence: Машина швидко коталася по дорозі.
    error: коталася
    correction: каталася
    error_type: word
    options:
    - каталася
    - котиться
    - катає
    explanation: Перед наголошеним суфіксом -а- пишемо [а].
  - sentence: Вона щодня стєрає пил з полиць.
    error: стєрає
    correction: стирає
    error_type: word
    options:
    - стирає
    - сторе
    - стерла
    explanation: Суфікс -а- змушує звук [е] перейти в [и].
  - sentence: Я часто забераю молодшого брата зі школи.
    error: забераю
    correction: забираю
    error_type: word
    options:
    - забираю
    - заберу
    - забере
    explanation: Перед суфіксом -а- пишеться [и] замість [е].
  - sentence: Діти люблять ломати старі іграшки.
    error: ломати
    correction: ламати
    error_type: word
    options:
    - ламати
    - ломити
    - ломить
    explanation: Наголошений суфікс -а- змінює [о] на [а].
  - sentence: Не треба мене гоняти по всьому місту!
    error: гоняти
    correction: ганяти
    error_type: word
    options:
    - ганяти
    - гонити
    - гоню
    explanation: Перед наголошеним суфіксом -а- звук [о] переходить в [а].
- id: true-false-rules
  type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про чергування.
  items:
  - statement: У слові «школа» склад закритий, а у формі множини «шкіл» він відкривається.
    correct: false
    explanation: 'Навпаки: «шко-ла» — відкриті склади, а «шкіл» — закритий, тому з''являється
      звук [і].'
  - statement: Запозичені слова (наприклад, «мотор», «атом») зазвичай не підкоряються
      правилу відкритого та закритого складу.
    correct: true
    explanation: Іншомовні слова зберігають оригінальне звучання і не змінюють [о],
      [е] на [і].
  - statement: Слова з повноголоссям (-оро-, -оло-), як-от «мороз» або «берег», завжди
      змінюють [о] на [і] в закритому складі.
    correct: false
    explanation: Слова з повноголоссям надійно захищені від чергування, голосні в
      них стабільні.
  - statement: Суфікси «-ець», «-ок», «-ень» часто вказують на наявність біглого голосного,
      який зникає при відмінюванні.
    correct: true
    explanation: 'Наприклад: хлопець — хлопця, шматок — шматка.'
  - statement: Після шиплячих ми завжди пишемо літеру «о», якщо наступний приголосний
      звук м'який.
    correct: false
    explanation: Перед м'яким приголосним після шиплячого ми пишемо «е» (наприклад,
      вечеря).
  - statement: Дієслівний суфікс -а- може змусити звук [о] в корені перетворитися
      на [а].
    correct: true
    explanation: 'Наприклад: котити — катати, ломити — ламати.'
- id: translate-sentences
  type: translate
  instruction: Оберіть правильний переклад речення, звертаючи увагу на форми слів
    та правила чергування.
  items:
  - source: I don't have a table.
    options:
    - text: У мене немає стола.
      correct: true
    - text: У мене немає стіла.
      correct: false
    - text: У мене немає стіл.
      correct: false
  - source: We are waiting for evening.
    options:
    - text: Ми чекаємо вечора.
      correct: true
    - text: Ми чекаємо вечіра.
      correct: false
    - text: Ми чекаємо вечор.
      correct: false
  - source: They help us every day.
    options:
    - text: Вони допомагають нам щодня.
      correct: true
    - text: Вони допомігають нам щодня.
      correct: false
    - text: Вони допомогають нам щодня.
      correct: false
  - source: I see a boy.
    options:
    - text: Я бачу хлопця.
      correct: true
    - text: Я бачу хлопеця.
      correct: false
    - text: Я бачу хлопца.
      correct: false
  - source: There is no ice today.
    options:
    - text: Сьогодні немає льоду.
      correct: true
    - text: Сьогодні немає ліду.
      correct: false
    - text: Сьогодні немає льода.
      correct: false
  - source: He is a good student.
    options:
    - text: Він хороший учень.
      correct: true
    - text: Він хороший учня.
      correct: false
    - text: Він хороший учнь.
      correct: false
