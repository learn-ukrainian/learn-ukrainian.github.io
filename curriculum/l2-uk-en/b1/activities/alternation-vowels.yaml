version: '1.0'
module: alternation-vowels
level: b1
inline:
- id: match-up-alternation-pairs
  type: match-up
  instruction: З'єднайте форму називного відмінка з правильною формою родового відмінка
    (немає...)
  pairs:
  - left: кінь
    right: коня
  - left: стіл
    right: стола
  - left: річ
    right: речі
  - left: ніс
    right: носа
  - left: Київ
    right: Києва
  - left: Канів
    right: Канева
  - left: двір
    right: двору
  - left: рік
    right: року
- id: fill-in-open-closed-syllables
  type: fill-in
  instruction: Вставте правильну форму слова, зважаючи на відкритий чи закритий склад
  items:
  - sentence: У кімнаті стоїть великий _____.
    answer: стіл
    options:
    - стіл
    - стола
    - столу
  - sentence: На поверхні цього _____ лежить хліб.
    answer: стола
    options:
    - стіл
    - стола
    - столі
  - sentence: Це мій улюблений _____.
    answer: кінь
    options:
    - кінь
    - коня
    - коню
  - sentence: Я даю яблуко для _____.
    answer: коня
    options:
    - кінь
    - коня
    - кіня
  - sentence: Сьогодні дуже холодний _____.
    answer: вечір
    options:
    - вечір
    - вечора
    - вечіру
  - sentence: Ми чекали до пізнього _____.
    answer: вечора
    options:
    - вечір
    - вечора
    - вечіра
  - sentence: На вулиці сильний _____.
    answer: вітер
    options:
    - вітер
    - вітру
    - вітір
  - sentence: Дерева хитаються від _____.
    answer: вітру
    options:
    - вітер
    - вітру
    - вітеру
- id: group-sort-alternation-categories
  type: group-sort
  instruction: Розподіліть пари слів за типом чергування
  groups:
  - label: Чергування [о] з [і]
    items:
    - стіл — стола
    - рік — року
    - ніс — носа
  - label: Чергування [е] з [і]
    items:
    - річ — речі
    - осінь — осені
    - піч — печі
  - label: Випадний голосний
    items:
    - день — дня
    - вітер — вітру
    - пень — пня
  - label: Немає чергування
    items:
    - мотор — мотора
    - атом — атома
    - город — городу
- id: quiz-alternation-types
  type: quiz
  instruction: Оберіть правильний варіант відповіді щодо правил чергування
  items:
  - question: Яке чергування відбувається в парі «село — сіл»?
    options:
    - '[е] з [і]'
    - '[о] з [і]'
    - '[о] з нулем звука'
    - '[е] з нулем звука'
    correct: 0
  - question: Яке чергування є в словах «допомогти — допомагати»?
    options:
    - '[о] з [а]'
    - '[е] з [и]'
    - '[о] з [і]'
    - '[е] з [і]'
    correct: 0
  - question: Яке явище спостерігається в парі «сон — сну»?
    options:
    - Випадний голосний (нуль звука)
    - Чергування [о] з [і]
    - Чергування [е] з [і]
    - Чергування [е] з [и]
    correct: 0
  - question: Чому в слові «мотор» у родовому відмінку («мотора») не відбувається
      чергування?
    options:
    - Бо це слово іншомовного походження
    - Бо це слово має повноголосся
    - Бо в ньому є випадний голосний
    - Бо наголос падає на закінчення
    correct: 0
  - question: Яка форма родового відмінка є правильною для слова «Київ»?
    options:
    - Києва
    - Київа
    - Кієва
    - Кийова
    correct: 0
  - question: Як суфікс «-а-» впливає на корінь у дієсловах (наприклад, «летіти —
      літати»)?
    options:
    - Голосний звук змінюється на довший
    - Голосний звук повністю зникає
    - Склад завжди стає закритим
    - Чергування взагалі не відбувається
    correct: 0
  - question: Яку літеру треба писати в слові «пш_ниця»?
    options:
    - е
    - о
    - и
    - і
    correct: 0
  - question: Яку літеру ми пишемо в закритому складі (наприклад, у слові «к_нь»)?
    options:
    - і
    - о
    - е
    - и
    correct: 0
workbook:
- type: translate
  instruction: Оберіть правильний переклад терміна
  items:
  - source: alternation
    options:
    - text: чергування
      correct: true
    - text: закінчення
      correct: false
    - text: наголос
      correct: false
    - text: корінь
      correct: false
  - source: vowel
    options:
    - text: голосний
      correct: true
    - text: приголосний
      correct: false
    - text: шиплячий
      correct: false
    - text: твердий
      correct: false
  - source: stress
    options:
    - text: наголос
      correct: true
    - text: відмінок
      correct: false
    - text: суфікс
      correct: false
    - text: склад
      correct: false
  - source: closed syllable
    options:
    - text: закритий склад
      correct: true
    - text: відкритий склад
      correct: false
    - text: випадний голосний
      correct: false
    - text: нуль звука
      correct: false
  - source: fleeting vowel
    options:
    - text: випадний голосний
      correct: true
    - text: відкритий склад
      correct: false
    - text: відмінок
      correct: false
    - text: перевірне слово
      correct: false
  - source: root
    options:
    - text: корінь
      correct: true
    - text: суфікс
      correct: false
    - text: закінчення
      correct: false
    - text: форма слова
      correct: false
- type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - це
    - визначальна
    - риса.
    - Чергування
    - —
    - голосних
    correct_order:
    - Чергування
    - голосних
    - —
    - це
    - визначальна
    - риса.
  - words:
    - завжди
    - на
    - Відкритий
    - склад
    - закінчується
    - голосний
    - звук.
    correct_order:
    - Відкритий
    - склад
    - завжди
    - закінчується
    - на
    - голосний
    - звук.
  - words:
    - склад
    - закінчується
    - приголосний
    - Закритий
    - звук.
    - виключно
    - на
    correct_order:
    - Закритий
    - склад
    - закінчується
    - виключно
    - на
    - приголосний
    - звук.
  - words:
    - слово
    - правильно.
    - Перевірне
    - писати
    - допомагає
    correct_order:
    - Перевірне
    - слово
    - допомагає
    - писати
    - правильно.
  - words:
    - ніби
    - Звуки
    - міняються
    - свідомо
    - місцями.
    correct_order:
    - Звуки
    - ніби
    - свідомо
    - міняються
    - місцями.
  - words:
    - інструмент.
    - потужний
    - системність
    - дає
    - Ця
    - фонетична
    - вам
    correct_order:
    - Ця
    - фонетична
    - системність
    - дає
    - вам
    - потужний
    - інструмент.
