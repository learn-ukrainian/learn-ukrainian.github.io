    про почуття, ми часто використовуємо давальний відмінок, щоб сказати Мені {{3}}
    або Йому радісно. Якщо емоція дуже сильна, вона викликає фізичну реакцію: ми можемо
    почервоніти від {{4}} або заціпеніти від {{5}}. Ми можемо також стрибати з {{6}},
    коли отримуємо хороші новини. Дуже важливо розрізняти різні відтінки емоцій. Наприклад,
    легкий {{7}} відрізняється від глибокої екзистенційної {{8}}. Коли ми втрачаємо
    надію, нас охоплює {{9}}. У сучасному контексті слово {{10}} часто повязане з
    повітряною небезпекою, хоча раніше це було просто відчуття нервозності. Коли ми
    бачимо несправедливість, у нас виникає праведний {{11}}. Ми можемо відчувати {{12}}
    до чужого успіху, але краще, щоб вона була білою. Загалом, важливо правильно використовувати
