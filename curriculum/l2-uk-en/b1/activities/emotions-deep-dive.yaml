- type: mark-the-words
  title: Знайдіть емоції в тексті
  instruction: Знайдіть і позначте сім іменників, які називають емоції та стани.
  text: Сьогодні радість наповнила моє серце. Проте вчора мене охопив глибокий смуток.
    Його спіткало розчарування після неприємної новини. Ми відчуваємо сильний страх
    у темряві, але натхнення швидко приходить зранку. Моя внутрішня тривога повільно
    наростала з кожною хвилиною, а потім зявився праведний гнів.
  answers:
  - радість
  - смуток
  - розчарування
  - страх
  - натхнення
  - тривога
  - гнів
