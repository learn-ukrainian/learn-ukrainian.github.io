  - left: смуток
    right: базовий термін для опису поганого настрою
  - left: туга
    right: глибокий біль душі, поетичний сум
  - left: розпач
    right: повна втрату надії, крайня межа негативних емоцій
  - left: захоплення
    right: поєднання поваги, здивування та естетичного задоволення
  - left: зажура
    right: світлий смуток української душі
  - left: заздрість
    right: токсичне почуття або захоплення успіхом іншого
  - left: гнів
    right: сильна, руйнівна емоція, яка буває праведною
  - left: страх
    right: реакція на небезпеку, від якої можна заціпеніти
  - left: ностальгія
    right: туга за минулим або рідними місцями
  - left: натхнення
    right: стан творчого піднесення та бажання діяти
  - left: сором
    right: сильна соціальна емоція через зроблену помилку
  instruction: З'єднайте відповідні елементи.
