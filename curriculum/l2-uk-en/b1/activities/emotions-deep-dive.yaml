- type: quiz
  title: Перевірте свої знання з граматики
  items:
  - question: Який відмінок ми використовуємо для опису загального стану емоції?
    options:
    - text: давальний відмінок
      correct: true
    - text: називний відмінок
      correct: false
    - text: знахідний відмінок
      correct: false
    - text: орудний відмінок
      correct: false
    explanation: 'Наприклад: Мені сумно, йому радісно (давальний відмінок).'
  - question: Який граматичний відмінок потрібен після дієслова емоційного стану захоплюватися?
    options:
    - text: орудний відмінок
      correct: true
    - text: місцевий відмінок
      correct: false
    - text: родовий відмінок
      correct: false
    - text: давальний відмінок
      correct: false
    explanation: 'Захоплюватися вимагає орудного відмінка: захоплюватися музикою.'
  - question: Яке дієслово означає глибоко страждати або вижити після важкого досвіду?
    options:
    - text: переживати
      correct: true
    - text: хвилюватися
      correct: false
    - text: сумувати
      correct: false
    - text: тривожитися
      correct: false
    explanation: Хвилюватися — це звичайна нервозність, а переживати — глибоке страждання.
  - question: Як правильно сказати I feel good нашою українською мовою?
    options:
    - text: Я почуваюся добре
      correct: true
    - text: Я відчуваю себе добре
      correct: false
    - text: Мені є добре
      correct: false
    - text: Я роблюся добре
      correct: false
    explanation: Дієслово почуватися використовується з прислівниками без слова себе.
  - question: Який прийменник ми часто використовуємо з родовим відмінком для екстремальних
      станів?
    options:
    - text: прийменник від
      correct: true
    - text: прийменник на
      correct: false
    - text: прийменник до
      correct: false
    - text: прийменник у
      correct: false
    explanation: 'Наприклад: почервоніти від сорому.'
  - question: Який відмінок ми використовуємо для опису себе як активного субєкта
      дії?
    options:
    - text: називний відмінок
      correct: true
    - text: давальний відмінок
      correct: false
    - text: кличний відмінок
      correct: false
    - text: знахідний відмінок
      correct: false
    explanation: 'Наприклад: Я сумую, ти радієш.'
  - question: Яка форма є найвищим рівнем позитивної оцінки у вашій мові?
    options:
    - text: я в захваті від
      correct: true
    - text: я дуже люблю
      correct: false
    - text: мені дуже подобається
      correct: false
    - text: мене це цікавить
      correct: false
    explanation: Я в захваті від означає найвищий рівень захоплення.
  - question: Яке слово найкраще описує легкий меланхолійний настрій в українській
      культурі?
    options:
    - text: зажура
      correct: true
    - text: депресія
      correct: false
    - text: розпач
      correct: false
    - text: тривога
      correct: false
    explanation: Зажура — це світлий смуток, який несе терапевтичний характер.
