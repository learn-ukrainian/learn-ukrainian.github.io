version: '1.0'
module: shopping-and-services
level: b1
inline:
- id: fill-in-shopping-dialogues
  type: fill-in
  instruction: Доповніть діалог на ринку відповідними словами
  items:
  - sentence: — Добрий день! Підкажіть, будь ласка, скільки _____ один кілограм цих
      помідорів?
    answer: коштує
    options:
    - коштує
    - платить
    - бере
  - sentence: — Ось ці великі — шістдесят гривень, а ті жовті, що трохи _____, я віддаю
      за п'ятдесят.
    answer: менші
    options:
    - менші
    - більші
    - гірші
  - sentence: — Справді, вони дуже смачні. Дайте, будь ласка, _____ червоних.
    answer: півкіла
    options:
    - півкіла
    - кіло
    - грам
  - sentence: — З вас рівно тридцять гривень. Вам потрібен пластиковий _____?
    answer: пакетик
    options:
    - пакетик
    - чек
    - рахунок
  - sentence: — Ні, дякую, я маю свою екологічну _____. Тримайте гроші.
    answer: торбинку
    options:
    - торбинку
    - кошик
    - сумку
  - sentence: — Дякую за покупку! Ось ваша _____. Приходьте ще!
    answer: решта
    options:
    - решта
    - знижка
    - гарантія
- id: quiz-transaction-phrases
  type: quiz
  instruction: Оберіть найбільш ввічливу та правильну фразу для кожної ситуації
  items:
  - question: Ви хочете запитати ціну товару на ринку.
    options:
    - Скільки платити?
    - Скільки коштує?
    - Яка ціна за все?
    - Дайте мені це.
    correct: 1
  - question: Ви хочете попросити знижку на базарі.
    options:
    - Дайте мені знижку.
    - Яка ваша перша ціна?
    - Чи можна трохи дешевше?
    - Я не буду це купувати.
    correct: 2
  - question: Ви успішно поторгувалися і хочете запитати про кінцеву вартість.
    options:
    - Дайте мені решту.
    - Яка ваша перша ціна?
    - Скільки я винен?
    - Яка ваша остання ціна?
    correct: 3
  - question: Ви хочете оплатити покупку на касі паперовими грошима.
    options:
    - Я буду платити готівкою.
    - Я буду платити з готівкою.
    - Я буду платити карткою.
    - Я буду платити телефоном.
    correct: 0
  - question: Ви даєте касиру 500 гривень і хочете сказати, що дрібні гроші вам не
      потрібні.
    options:
    - Мені потрібна знижка.
    - Решти не треба.
    - Дайте мені здачу.
    - Залиште чек собі.
    correct: 1
  - question: Ви хочете попросити касира дати вам чек.
    options:
    - Де моя решта?
    - Я хочу повернути товар.
    - Дайте мені, будь ласка, чек.
    - Де мій рахунок?
    correct: 2
- id: match-up-agent-workplace
  type: match-up
  instruction: З'єднайте професію або опис людини з відповідним місцем роботи
  pairs:
  - left: перукар
    right: перукарня
  - left: кравець
    right: ательє
  - left: майстер з ремонту
    right: майстерня
  - left: касир
    right: супермаркет
  - left: оператор
    right: поштове відділення
  - left: людина, яка пече хліб
    right: пекарня
  - left: продавець книг
    right: книгарня
  - left: працівник банку
    right: банк
- id: dialogue-completion-complaint
  type: fill-in
  instruction: Доповніть діалог-скаргу в магазині необхідними словами
  items:
  - sentence: — Добрий день! Я хочу _____ цей блендер. Він бракований.
    answer: повернути
    options:
    - повернути
    - купити
    - відремонтувати
  - sentence: — Добрий день. А що саме з ним не так? Ви його _____?
    answer: вмикали
    options:
    - вмикали
    - розбили
    - мили
  - sentence: — Так, він просто не _____ і дивно пахне. Ось мій чек та коробка.
    answer: працює
    options:
    - працює
    - готує
    - світить
  - sentence: — Розумію, але я не можу повернути гроші одразу. Треба залишити його
      на _____.
    answer: експертизу
    options:
    - експертизу
    - ремонт
    - обмін
  - sentence: — Вибачте, але я хотів би поговорити з _____.
    answer: менеджером
    options:
    - менеджером
    - продавцем
    - охоронцем
  - sentence: — Відповідно до закону про захист прав споживачів, ви _____ повернути
      кошти.
    answer: зобов'язані
    options:
    - зобов'язані
    - повинні
    - можете
  - sentence: — Якщо ви продовжуєте відмовляти, я напишу _____.
    answer: скаргу
    options:
    - скаргу
    - лист
    - відгук
workbook:
- type: error-correction
  instruction: Знайдіть і виправте помилку в реченнях
  items:
  - sentence: Я завжди плачу з карткою в супермаркеті.
    error: з карткою
    correction: карткою
    error_type: construction
    options:
    - карткою
    - картку
    - на картку
    explanation: Для позначення інструменту оплати використовується орудний відмінок
      без прийменника «з».
  - sentence: Ці яблука солодші ніж ті зелені.
    error: солодші ніж
    correction: солодші за
    error_type: construction
    options:
    - солодші за
    - солодше ніж
    - солодший за
    explanation: Після вищого ступеня з прийменником «за» використовується знахідний
      відмінок («солодші за ті»).
  - sentence: Скільки грошей на моєму рахунка?
    error: рахунка
    correction: рахунку
    error_type: word
    options:
    - рахунку
    - рахунок
    - рахунком
    explanation: Для позначення фінансового балансу в банку родовий відмінок має закінчення
      -у («рахунку»).
  - sentence: Цей телефон самий дорогий у магазині.
    error: самий дорогий
    correction: найдорожчий
    error_type: construction
    options:
    - найдорожчий
    - дуже дорогий
    - найбільш дорогий
    explanation: В українській мові найвищий ступінь утворюється за допомогою префікса
      «най-», а не слова «самий».
  - sentence: Я хочу поміняти долари в гривні.
    error: в гривні
    correction: на гривні
    error_type: phrase
    options:
    - на гривні
    - для гривні
    - за гривні
    explanation: В українській мові правильно казати «міняти / обмінювати щось на
      щось».
  - sentence: Мені потрібна менший розмір цього светра.
    error: потрібна
    correction: потрібен
    error_type: word
    options:
    - потрібен
    - потрібне
    - потрібні
    explanation: 'Слово «розмір» чоловічого роду, тому прикметник має узгоджуватися
      в чоловічому роді: «потрібен».'
- type: translate
  instruction: Оберіть правильний переклад українською мовою
  items:
  - source: How much does it cost?
    options:
    - text: Скільки це коштує?
      correct: true
    - text: Як багато це платить?
      correct: false
    - text: Яка є ціна для цього?
      correct: false
  - source: Keep the change.
    options:
    - text: Тримайте здачу.
      correct: false
    - text: Решти не треба.
      correct: true
    - text: Залиште решту мені.
      correct: false
  - source: I want to return this product because it is defective.
    options:
    - text: Я хочу купити цей товар, бо він зламаний.
      correct: false
    - text: Я хочу обміняти цей товар, бо він поганий.
      correct: false
    - text: Я хочу повернути цей товар, бо він бракований.
      correct: true
  - source: Can you fix my phone?
    options:
    - text: Ви можете зламати мій телефон?
      correct: false
    - text: Ви можете полагодити мій телефон?
      correct: true
    - text: Ви можете купити мій телефон?
      correct: false
  - source: Do you have anything cheaper?
    options:
    - text: Ви маєте найдешевше?
      correct: false
    - text: Чи є у вас щось гірше?
      correct: false
    - text: Чи є у вас щось дешевше?
      correct: true
  - source: I would like to speak with the manager.
    options:
    - text: Я хотів би поговорити з менеджером.
      correct: true
    - text: Я хочу слухати менеджера.
      correct: false
    - text: Я розмовляю з менеджером.
      correct: false
- type: group-sort
  instruction: Розподіліть слова та фрази за відповідними категоріями
  groups:
  - label: На пошті
    items:
    - відправити посилку
    - доставка
    - бандероль
    - номер накладної
    - відстежити
  - label: У банку
    items:
    - відкрити рахунок
    - обмін валют
    - готівка
    - оплатити рахунок
    - банківська картка
- type: essay-response
  prompt: 'Напишіть відгук про заклад, який ви нещодавно відвідали (наприклад, кав''ярню,
    перукарню, пошту або магазин). Використовуйте ступені порівняння прикметників
    (кращий, найшвидший, дорожчий тощо), щоб порівняти його з іншими місцями. Ваш
    відгук має бути об''єктивним: вкажіть як позитивні, так і негативні сторони.'
  min_words: 50
  model_answer: Це моя улюблена кав'ярня у нашому районі. Вона значно менша за інші
    заклади, але тут найсмачніша кава у всьому місті. Бариста працює дуже швидко,
    а обслуговування завжди привітне. Ціни тут трохи вищі, ніж у сусідній пекарні,
    проте якість напоїв набагато краща. Єдиний мінус — тут часто немає вільних місць,
    бо це найпопулярніше місце на нашій вулиці. Я щиро рекомендую цю кав'ярню всім,
    хто любить смачну каву та затишну атмосферу.
