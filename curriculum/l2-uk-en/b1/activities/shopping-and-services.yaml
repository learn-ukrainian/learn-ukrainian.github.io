version: '1.0'
module: shopping-and-services
level: b1
inline:
- id: dialogue-completion
  type: fill-in
  instruction: Доповніть діалог на ринку, обравши правильні слова.
  items:
  - sentence: — Добрий день! Скільки коштує один _____ полуниці?
    answer: кілограм
    options:
    - кілограм
    - розмір
    - шматок
  - sentence: — Сто п'ятдесят гривень. Вона дуже солодка, _____ на всьому ринку!
    answer: найсвіжіша
    options:
    - найсвіжіша
    - свіжіша
    - найгірша
  - sentence: — А чи можна віддати трохи _____? Я візьму три кілограми.
    answer: дешевше
    options:
    - дешевше
    - дорожче
    - найшвидше
  - sentence: — Ну, якщо берете три, то віддам за чотириста. Зробимо вам _____.
    answer: знижку
    options:
    - знижку
    - гарантію
    - тканину
  - sentence: — Домовилися. Зважте, будь ласка. Тільки виберіть ті, що _____.
    answer: більші
    options:
    - більші
    - менші
    - браковані
  - sentence: — Ще подивіться на ці яблука. Вони набагато _____ за ті жовті, дуже
      соковиті.
    answer: солодші
    options:
    - солодші
    - кисліші
    - найменші
  - sentence: — Добре, дайте ще п'ять _____ яблук.
    answer: штук
    options:
    - штук
    - грамів
    - чек
  - sentence: — Ось, тримайте міцно. Ваша полуниця, яблука і ваша _____ — п'ятдесят
      гривень.
    answer: здача
    options:
    - здача
    - картка
    - примірочна
- id: match-up
  type: match-up
  instruction: З'єднайте професію та місце роботи з послугою, яку вони надають.
  pairs:
  - left: кравець в ательє
    right: ремонтує та вкорочує одяг
  - left: перукар у перукарні
    right: робить нову модну стрижку
  - left: касир у супермаркеті
    right: приймає готівку та видає чек
  - left: майстер у майстерні
    right: робить ремонт бракованої техніки
  - left: продавець-консультант
    right: допомагає знайти правильний розмір
  - left: оператор на пошті
    right: оформлює доставку посилки
  - left: бариста в кав'ярні
    right: готує найсмачнішу каву
  - left: працівник банку
    right: відкриває рахунок і робить переказ
- id: quiz
  type: quiz
  instruction: Оберіть правильну транзакційну фразу для кожної ситуації.
  items:
  - question: Ви хочете заплатити банківською карткою. Що ви кажете касиру?
    options:
    - Я розрахуюся карткою.
    - Дайте мені готівку.
    - Де ваша примірочна?
    - Який це розмір?
    correct: 0
  - question: Одяг вам не підходить, він замалий. Що ви запитаєте консультанта?
    options:
    - Чи є у вас більший розмір?
    - Скільки коштує ремонт?
    - Можна здати посилку?
    - Який сьогодні курс валют?
    correct: 0
  - question: Ви купили техніку, але вона не працює. Ви хочете повернути гроші.
    options:
    - Цей товар бракований, я хочу зробити повернення.
    - Я хочу відкрити новий рахунок.
    - Зробіть мені стрижку коротше.
    - Це найкраще обслуговування.
    correct: 0
  - question: Ви хочете дізнатися, чи є спеціальна пропозиція на товар.
    options:
    - Чи є у вас знижка на цей товар?
    - Де знаходиться каса?
    - Зважте півкіла, будь ласка.
    - Ви видаєте гарантію?
    correct: 0
  - question: Ви оплатили покупку і просите офіційний документ про оплату.
    options:
    - Дайте мені фіскальний чек, будь ласка.
    - Оформіть найшвидшу доставку.
    - Виберіть найсолодші яблука.
    - Яка ваша найнижча ціна?
    correct: 0
  - question: Ви купуєте дорогий ноутбук і хочете знати про сервісне обслуговування.
    options:
    - Яка гарантія надається на цей комп'ютер?
    - Скільки коштує бавовняна тканина?
    - Який відсоток банківської комісії?
    - Чи працює ваша кав'ярня?
    correct: 0
  - question: Вам потрібно купити іноземну валюту для поїздки. Що ви шукаєте?
    options:
    - Обмін валют
    - Примірочну
    - Ремонт взуття
    - Ательє
    correct: 0
- id: sentence-builder
  type: unjumble
  instruction: Складіть речення для порівняння послуг, розставивши слова у правильному
    порядку.
  items:
  - words:
    - швидша,
    - доставка
    - пошта.
    - Ця
    - звичайна
    - ніж
    - набагато
    correct_order:
    - Ця
    - доставка
    - набагато
    - швидша,
    - ніж
    - звичайна
    - пошта.
  - words:
    - нижча
    - Комісія
    - цьому
    - інші.
    - за
    - в
    - банку
    correct_order:
    - Комісія
    - в
    - цьому
    - банку
    - нижча
    - за
    - інші.
  - words:
    - ніж
    - долара
    - Курс
    - сьогодні
    - вищий,
    - був
    - учора.
    correct_order:
    - Курс
    - долара
    - сьогодні
    - вищий,
    - ніж
    - був
    - учора.
  - words:
    - у
    - краще
    - за
    - старе.
    - Обслуговування
    - новій
    - кав'ярні
    correct_order:
    - Обслуговування
    - у
    - новій
    - кав'ярні
    - краще
    - за
    - старе.
  - words:
    - державну.
    - пошта
    - надійніша
    - дорожча,
    - але
    - за
    - Приватна
    correct_order:
    - Приватна
    - пошта
    - дорожча,
    - але
    - надійніша
    - за
    - державну.
  - words:
    - тут
    - за
    - очікував.
    - я
    - вищі,
    - кредитом
    - ніж
    - Відсотки
    correct_order:
    - Відсотки
    - за
    - кредитом
    - тут
    - вищі,
    - ніж
    - я
    - очікував.
  - words:
    - зручніший
    - додаток
    - попередній.
    - за
    - банківський
    - Цей
    correct_order:
    - Цей
    - банківський
    - додаток
    - зручніший
    - за
    - попередній.
  - words:
    - відділенні.
    - швидший,
    - у
    - онлайн
    - переказ
    - Грошовий
    - ніж
    correct_order:
    - Грошовий
    - переказ
    - онлайн
    - швидший,
    - ніж
    - у
    - відділенні.
- id: fill-in
  type: fill-in
  instruction: Доповніть речення правильними формами ступенів порівняння прикметників.
  items:
  - sentence: Будь ласка, зробіть мою стрижку трохи _____.
    answer: коротшою
    options:
    - коротшою
    - короткою
    - найкоротшою
  - sentence: Ця бавовняна тканина значно _____ за синтетичну.
    answer: якісніша
    options:
    - якісніша
    - якісна
    - найякісніша
  - sentence: Це _____ обслуговування, яке я коли-небудь бачив!
    answer: найкраще
    options:
    - найкраще
    - краще
    - найкраща
  - sentence: Ремонт мобільного телефону виявився набагато _____, ніж я думав.
    answer: дорожчим
    options:
    - дорожчим
    - дорожче
    - найдорожчим
  - sentence: У цьому ательє працюють _____ кравці у нашому місті.
    answer: найдосвідченіші
    options:
    - найдосвідченіші
    - досвідченіші
    - найдосвідченіший
  - sentence: На жаль, доставка цієї посилки була _____, ніж обіцяли.
    answer: повільнішою
    options:
    - повільнішою
    - повільною
    - найповільнішою
  - sentence: Цей светр мені зовсім не підходить, він замалий. Чи є у вас _____ розмір?
    answer: більший
    options:
    - більший
    - найбільший
    - більше
  - sentence: Я хочу знайти надійний банк, де комісія за переказ _____.
    answer: найнижча
    options:
    - найнижча
    - нижча
    - найнижче
- id: free-write
  type: essay-response
  prompt: Напишіть відгук про реальний або вигаданий магазин чи послугу (70-100 слів).
    Обов'язково використайте щонайменше 3 прикметники вищого і 2 найвищого ступеня.
    Опишіть рівень обслуговування, ціни та якість товару.
  min_words: 50
  model_answer: 'Нещодавно я відвідав нову кав''ярню у нашому районі. Можу з упевненістю
    сказати, що це найкраще місце для відпочинку.  Обслуговування тут набагато швидше,
    ніж у старому кафе поруч. Бариста дуже привітний і готує найсмачнішу каву в усьому
    місті.  Інтер''єр дуже затишний, а музика тихіша і приємніша за ту, що грає в
    інших закладах.  Хоча ціни тут трохи вищі, якість напоїв та фірмових десертів
    повністю виправдовує їх.  Я обов''язково повернуся сюди ще раз і щиро рекомендую
    це місце всім своїм друзям.

    '
  evaluation_criteria:
  - Відгук відповідає заданій темі (магазин або послуга).
  - Текст містить щонайменше 50-70 слів.
  - Правильно використано щонайменше 3 прикметники вищого ступеня порівняння.
  - Правильно використано щонайменше 2 прикметники найвищого ступеня порівняння.
  - Описано обслуговування, ціни та загальну якість.
