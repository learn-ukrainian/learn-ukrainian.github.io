- type: true-false
  title: Правила непрямої мови
  items:
  - statement: В українській мові перед сполучником що завжди ставиться кома.
    correct: true
    explanation: Кома перед сполучником що є обов’язковою у складнопідрядних реченнях.
  - statement: При переказі слів у непрямій мові ми завжди змінюємо час на минулий.
    correct: false
    explanation: Українська мова зберігає оригінальний час дієслова.
  - statement: Непряма мова завжди береться в лапки.
    correct: false
    explanation: Непряма мова не потребує лапок, на відміну від прямої мови.
  - statement: Займенник я у непрямій мові найчастіше змінюється на він або вона.
    correct: true
    explanation: Ми змінюємо перспективу на третю особу при переказі чужих слів.
  - statement: Слово що можна іноді пропускати у швидкій розмові.
    correct: false
    explanation: В українській мові пропуск що є грубою граматичною помилкою.
  - statement: Дієслово стверджувати звучить більш офіційно, ніж дієслово сказати.
    correct: true
    explanation: Стверджувати належить до медійного або офіційного стилю.
  - statement: Прислівник сьогодні при переказі новин наступного дня логічно змінюється
      на вчора.
    correct: true
    explanation: Маркери часу адаптуються до моменту переказу.
  - statement: Українська мова ігнорує англійське правило узгодження часів.
    correct: true
    explanation: Ми ніби заморожуємо час у той момент, коли людина сказала свої слова.
  instruction: Визначте, чи твердження правильне.
