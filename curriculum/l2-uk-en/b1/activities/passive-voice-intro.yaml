version: '1.0'
module: passive-voice-intro
level: b1
inline:
- id: identify-active-passive
  type: quiz
  instruction: 'Визначте стан дієслова у кожному реченні: чи це активна дія, пасивний
    процес на -ся, чи безособовий результат на -но/-то?'
  items:
  - question: Архітектори будують новий театр у центрі.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 0
  - question: Цей дім успішно будується вже майже два роки.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 1
  - question: Новий екологічний закон обов'язково буде ухвалено.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 2
  - question: Студенти читають нову цікаву книгу.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 0
  - question: Це складне завдання нарешті успішно виконано.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 2
  - question: Ця довга стаття дуже важко перекладається.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 1
  - question: Ця старовинна вулиця називається Центральною.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 1
  - question: Старовинне місто було засновано у десятому столітті.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 2
- id: fill-in-no-to-forms
  type: fill-in
  instruction: Вставте у речення правильну безособову результативну форму на -но/-то.
  items:
  - sentence: Цей великий багатоквартирний дім успішно ____.
    answer: збудовано
    options:
    - збудовано
    - збудований
    - збудувався
  - sentence: Це дуже складне завдання нарешті ____.
    answer: виконано
    options:
    - виконано
    - виконаний
    - виконалося
  - sentence: Цю надзвичайно цікаву книжку швидко ____.
    answer: прочитано
    options:
    - прочитано
    - прочитана
    - прочиталася
  - sentence: Новий важливий екологічний закон обов'язково буде ____.
    answer: ухвалено
    options:
    - ухвалено
    - ухвалений
    - ухвалився
  - sentence: Перші квитки на вечірню виставу вже ____.
    answer: продано
    options:
    - продано
    - продані
    - продалися
  - sentence: Унікальну міську експозицію ____ на основі старих архівів.
    answer: створено
    options:
    - створено
    - створена
    - створилася
  - sentence: Наше старовинне місто було ____ ще у десятому столітті.
    answer: засновано
    options:
    - засновано
    - засноване
    - заснувалося
  - sentence: Усі необхідні офіційні документи успішно ____.
    answer: надіслано
    options:
    - надіслано
    - надіслані
    - надіслалися
- id: transitive-intransitive-verbs
  type: group-sort
  instruction: 'Розподіліть дієслова на перехідні (вимагають прямого додатка: ''робити
    що?'') та неперехідні. Пам''ятайте: пасив утворюється лише від перехідних дієслів!'
  groups:
  - label: Перехідні дієслова (можуть утворити пасив)
    items:
    - будувати
    - читати
    - писати
    - відкривати
    - продавати
    - створювати
  - label: Неперехідні дієслова (НЕ можуть утворити пасив)
    items:
    - спати
    - гуляти
    - сидіти
    - жити
    - стояти
    - працювати
workbook:
- type: match-up
  instruction: З'єднайте активні речення з їхніми ідеальними безособовими еквівалентами
    на -но/-то.
  pairs:
  - left: Робітники збудували новий міст.
    right: Новий міст збудовано.
  - left: Студенти прочитали цікаву статтю.
    right: Цікаву статтю прочитано.
  - left: Архітектори спроєктували сучасний театр.
    right: Сучасний театр спроєктовано.
  - left: Менеджер виконав важливе завдання.
    right: Важливе завдання виконано.
  - left: Депутати ухвалили новий закон.
    right: Новий закон ухвалено.
  - left: Журналісти опублікували свіжі новини.
    right: Свіжі новини опубліковано.
  - left: Секретар надіслав усі документи.
    right: Усі документи надіслано.
  - left: Майстри завершили складний ремонт.
    right: Складний ремонт завершено.
