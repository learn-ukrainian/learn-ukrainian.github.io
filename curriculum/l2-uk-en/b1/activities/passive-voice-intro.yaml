version: '1.0'
module: passive-voice-intro
level: b1
workbook:
- id: voice-type-sorting
  type: group-sort
  instruction: Розподіліть речення за типом стану (активний, пасивний на -ся, чи форма
    на -но/-то).
  groups:
  - label: Активний стан
    items:
    - Журналіст швидко пише статтю.
    - Робітники будують новий міст.
    - Мама зараз миє вікно.
    - Студенти читають цікаву книгу.
  - label: Пасивний стан (-ся)
    items:
    - Ця будівля знаходиться в центрі.
    - Цей проєкт фінансується міською радою.
    - Квитки продаються в касі театру.
  - label: Форма на -но/-то
    items:
    - Цю статтю написано дуже швидко.
    - Новий міст успішно збудовано.
    - Важливе засідання вже проведено.
- id: fill-in-forms-1
  type: fill-in
  instruction: Вставте правильну безособову форму на -но/-то в речення.
  items:
  - sentence: Усі важливі завдання вже успішно _____.
    answer: виконано
    options:
    - виконаний
    - виконано
    - виконана
  - sentence: Новий закон _____ вчора ввечері.
    answer: ухвалено
    options:
    - ухвалили
    - ухвалено
    - ухвалений
  - sentence: Цей красивий міст _____ багато років тому.
    answer: збудовано
    options:
    - збудували
    - збудований
    - збудовано
  - sentence: Двері палацу культури вже _____ для всіх.
    answer: відкрито
    options:
    - відкритий
    - відкрита
    - відкрито
  - sentence: Цю цікаву книгу повністю _____ за один день.
    answer: прочитано
    options:
    - прочитаний
    - прочитана
    - прочитано
  - sentence: Це старовинне місто _____ у десятому столітті.
    answer: засновано
    options:
    - заснували
    - заснований
    - засновано
  - sentence: Дуже складну роботу _____ ідеально.
    answer: зроблено
    options:
    - зроблений
    - зроблена
    - зроблено
  - sentence: Цей важливий лист _____ без жодних помилок.
    answer: написано
    options:
    - написаний
    - написана
    - написано
- id: match-up-active-passive
  type: match-up
  instruction: З'єднайте активні речення з їхніми еквівалентами на -но/-то.
  pairs:
  - left: Ми успішно завершили проєкт.
    right: Проєкт успішно завершено.
  - left: Комітет провів важливе засідання.
    right: Важливе засідання проведено.
  - left: Рада ухвалила важливий закон.
    right: Важливий закон ухвалено.
  - left: Робітники збудували новий дім.
    right: Новий дім збудовано.
  - left: Хтось повністю прочитав цю книгу.
    right: Цю книгу повністю прочитано.
  - left: Журналіст швидко написав статтю.
    right: Статтю швидко написано.
  - left: Ми ретельно прибрали територію.
    right: Територію ретельно прибрано.
  - left: Система успішно прийняла оплату.
    right: Оплату успішно прийнято.
- id: error-correction-passive
  type: error-correction
  instruction: Виправте штучні пасивні конструкції (канцелярит), повністю переписавши
    речення в активному стані.
  items:
  - sentence: Лист був отриманий нами вчора.
    error: Лист був отриманий нами вчора.
    correction: Ми отримали лист вчора.
    error_type: construction
    options:
    - Ми отримали лист вчора.
    - Лист було отримано нами вчора.
    - Нами отримується лист вчора.
    explanation: Українська мова уникає пасивних конструкцій з орудним відмінком виконавця.
      Активний стан звучить природніше.
  - sentence: Ця стаття читається студентами.
    error: Ця стаття читається студентами.
    correction: Студенти читають цю статтю.
    error_type: construction
    options:
    - Студенти читають цю статтю.
    - Ця стаття прочитана студентами.
    - Цю статтю прочитано студентами.
    explanation: Неживий підмет + дієслово на -ся + виконавець = канцелярит. 'Студенти'
      мають стати підметом.
  - sentence: Новий дім будується кваліфікованими робітниками.
    error: Новий дім будується кваліфікованими робітниками.
    correction: Кваліфіковані робітники будують новий дім.
    error_type: construction
    options:
    - Кваліфіковані робітники будують новий дім.
    - Новий дім будувався робітниками.
    - Новий дім збудовано робітниками.
    explanation: Якщо у вас є конкретні виконавці дії (робітники), завжди використовуйте
      активний стан.
  - sentence: Цей рецепт готується нашим шеф-кухарем.
    error: Цей рецепт готується нашим шеф-кухарем.
    correction: Наш шеф-кухар готує цей рецепт.
    error_type: construction
    options:
    - Наш шеф-кухар готує цей рецепт.
    - Цей рецепт було приготовано нами.
    - Цей рецепт готується нами.
    explanation: Це речення звучить роботизовано. Жива людина (шеф-кухар) повинна
      бути підметом в активному стані.
  - sentence: Новий закон був ухвалений депутатами.
    error: Новий закон був ухвалений депутатами.
    correction: Депутати ухвалили новий закон.
    error_type: construction
    options:
    - Депутати ухвалили новий закон.
    - Новий закон ухвалювався депутатами.
    - Новий закон ухвалено депутатами.
    explanation: Навіть в офіційних текстах слід уникати конструкцій із зазначенням
      виконавця в орудному відмінку.
  - sentence: Вікно зараз миється нашою мамою.
    error: Вікно зараз миється нашою мамою.
    correction: Наша мама зараз миє вікно.
    error_type: construction
    options:
    - Наша мама зараз миє вікно.
    - Вікно було помито нашою мамою.
    - Вікно зараз миється нами.
    explanation: Вікно не може мити саме себе. Мама — живий виконавець, тому речення
      має бути активним.
- id: translate-transformations
  type: translate
  instruction: Оберіть правильну трансформацію речення (перехід між активним станом
    та безособовою формою на -но/-то).
  items:
  - source: Робітники швидко збудували цей міст.
    options:
    - text: Цей міст швидко збудовано.
      correct: true
    - text: Цей міст швидко збудований робітниками.
      correct: false
    - text: Цей міст швидко будується.
      correct: false
  - source: Територію парку ретельно прибрано.
    options:
    - text: Волонтери ретельно прибрали територію парку.
      correct: true
    - text: Територія парку ретельно прибирається.
      correct: false
    - text: Територія парку ретельно прибрана волонтерами.
      correct: false
  - source: Новий закон успішно ухвалено.
    options:
    - text: Депутати успішно ухвалили новий закон.
      correct: true
    - text: Новий закон успішно ухвалюється.
      correct: false
    - text: Новий закон успішно ухвалений депутатами.
      correct: false
  - source: Спеціальний комітет реалізував масштабний проєкт.
    options:
    - text: Масштабний проєкт реалізовано.
      correct: true
    - text: Масштабний проєкт реалізований комітетом.
      correct: false
    - text: Масштабний проєкт реалізувався.
      correct: false
  - source: Важливе засідання успішно проведено.
    options:
    - text: Організатори успішно провели важливе засідання.
      correct: true
    - text: Важливе засідання успішно проводиться.
      correct: false
    - text: Важливе засідання успішно проведене організаторами.
      correct: false
  - source: Ми нарешті відкрили нашу нову виставку.
    options:
    - text: Нашу нову виставку нарешті відкрито.
      correct: true
    - text: Наша нова виставка нарешті відкривається.
      correct: false
    - text: Нашу нову виставку нарешті відкрито нами.
      correct: false
  - source: Цю цікаву книгу повністю прочитано.
    options:
    - text: Я повністю прочитав цю цікаву книгу.
      correct: true
    - text: Ця цікава книга повністю читається.
      correct: false
    - text: Ця цікава книга повністю прочитана мною.
      correct: false
  - source: Автоматична система надіслала електронний лист.
    options:
    - text: Електронний лист надіслано.
      correct: true
    - text: Електронний лист надісланий системою.
      correct: false
    - text: Електронний лист надсилається.
      correct: false
- id: true-false-passive-rules
  type: true-false
  instruction: Визначте, чи є ці твердження про український пасивний стан правильними.
  items:
  - statement: Українська мова дуже любить пасивні конструкції і використовує їх частіше
      за активні.
    correct: false
    explanation: Українська мова завжди надає перевагу активному стану. Надмірний
      пасив вважається канцеляритом.
  - statement: Дієслова на -ся для пасиву утворюються тільки від перехідних дієслів.
    correct: true
    explanation: Так, пасив на -ся утворюється від перехідних дієслів, тобто тих,
      що вимагають після себе знахідного відмінка без прийменника.
  - statement: 'Безособові форми на -но/-то часто і природно вживаються разом з виконавцем
      в орудному відмінку (наприклад: ''написано мною'').'
    correct: false
    explanation: Це груба помилка. Форми на -но/-то є повністю безособовими і ніколи
      не вживаються з орудним відмінком виконавця.
  - statement: Дієслова 'називатися' та 'знаходитися' — це типові приклади лексикалізованого
      пасиву, які звучать абсолютно природно.
    correct: true
    explanation: Так, вони стали органічною частиною повсякденного спілкування і не
      вважаються бюрократичним стилем.
  - statement: 'Після форм на -но/-то об''єкт дії завжди стоїть у називному відмінку
      (наприклад: ''робота зроблено'').'
    correct: false
    explanation: Після форм на -но/-то об'єкт залишається у знахідному відмінку, так
      само як і в активному реченні ('роботу зроблено').
  - statement: Канцелярит — це мова офіційних паперів, яка звучить штучно в живому
      спілкуванні через часте використання пасиву.
    correct: true
    explanation: Саме так лінгвісти критично називають надмірно сухий та штучний офіційно-діловий
      стиль.
