version: '1.0'
module: passive-voice-intro
level: b1
inline:
- id: identify-active-passive
  type: quiz
  instruction: 'Визначте стан дієслова у кожному реченні: чи це активна дія, пасивний
    процес на -ся, чи безособовий результат на -но/-то?'
  items:
  - question: Архітектори будують новий театр у центрі.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 0
  - question: Цей дім успішно будується вже майже два роки.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 1
  - question: Новий екологічний закон обов'язково буде ухвалено.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 2
  - question: Студенти читають нову цікаву книгу.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 0
  - question: Це складне завдання нарешті успішно виконано.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 2
  - question: Ця довга стаття дуже важко перекладається.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 1
  - question: Ця старовинна вулиця називається Центральною.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 1
  - question: Старовинне місто було засновано у десятому столітті.
    options:
    - Активний стан (діяч виконує дію)
    - Пасивний стан (на -ся)
    - Безособова форма (на -но/-то)
    - Зворотне дієслово (дія на себе)
    correct: 2
- id: error-correction-active-preference
  type: error-correction
  instruction: Знайдіть 'канцелярит' (неприродну пасивну конструкцію з орудним відмінком)
    і виправте її, обравши правильний живий варіант в активному стані. Зверніть увагу
    на відмінки!
  items:
  - sentence: Новий проєкт зараз розробляється архітектором.
    error: Новий проєкт зараз розробляється архітектором.
    correction: Новий проєкт зараз розробляє архітектор.
    error_type: construction
    options:
    - Новий проєкт зараз розробляє архітектор.
    - Новий проєкт зараз розроблений архітектором.
    - Новий проєкт зараз розроблятиметься архітектором.
    explanation: 'В українській мові краще використовувати активний стан: діяч ''архітектор''
      (Називний) розробляє об''єкт ''проєкт'' (Знахідний).'
  - sentence: Ця складна стаття читається студентами.
    error: Ця складна стаття читається студентами.
    correction: Цю складну статтю читають студенти.
    error_type: construction
    options:
    - Цю складну статтю читають студенти.
    - Ця складна стаття прочитана студентами.
    - Ця складна стаття буде читатися студентами.
    explanation: 'Змінюємо структуру: виконавці ''студенти'' (Називний) виконують
      дію, а ''статтю'' (Знахідний) стає прямим додатком.'
  - sentence: Цей довгий звіт щотижня пишеться мною.
    error: Цей довгий звіт щотижня пишеться мною.
    correction: Цей довгий звіт щотижня пишу я.
    error_type: construction
    options:
    - Цей довгий звіт щотижня пишу я.
    - Цей довгий звіт щотижня написаний мною.
    - Цей довгий звіт щотижня писатиметься мною.
    explanation: Займенник 'я' у називному відмінку стає підметом активного речення,
      уникаючи штучного 'пишеться мною'.
  - sentence: Ця велика проблема швидко вирішується менеджером.
    error: Ця велика проблема швидко вирішується менеджером.
    correction: Цю велику проблему швидко вирішує менеджер.
    error_type: construction
    options:
    - Цю велику проблему швидко вирішує менеджер.
    - Ця велика проблема швидко вирішена менеджером.
    - Ця велика проблема швидко вирішуватиметься менеджером.
    explanation: Активна дія ('вирішує менеджер') завжди звучить набагато природніше
      та енергійніше.
  - sentence: Цей закон завжди приймається парламентом.
    error: Цей закон завжди приймається парламентом.
    correction: Цей закон завжди приймає парламент.
    error_type: construction
    options:
    - Цей закон завжди приймає парламент.
    - Цей закон завжди прийнятий парламентом.
    - Цей закон завжди прийматиметься парламентом.
    explanation: Організація 'парламент' (Називний) стає активним виконавцем дії над
      'законом' (Знахідний).
  - sentence: Сучасний театр проєктується нашою командою.
    error: Сучасний театр проєктується нашою командою.
    correction: Сучасний театр проєктує наша команда.
    error_type: construction
    options:
    - Сучасний театр проєктує наша команда.
    - Сучасний театр спроєктований нашою командою.
    - Сучасний театр проєктуватиметься нашою командою.
    explanation: Пасивна форма 'проєктується командою' є калькою. 'Команда' повинна
      бути підметом.
- id: fill-in-no-to-forms
  type: fill-in
  instruction: Вставте у речення правильну безособову результативну форму на -но/-то.
  items:
  - sentence: Цей великий багатоквартирний дім успішно ____.
    answer: збудовано
    options:
    - збудовано
    - збудований
    - збудувався
  - sentence: Це дуже складне завдання нарешті ____.
    answer: виконано
    options:
    - виконано
    - виконаний
    - виконалося
  - sentence: Цю надзвичайно цікаву книжку швидко ____.
    answer: прочитано
    options:
    - прочитано
    - прочитана
    - прочиталася
  - sentence: Новий важливий екологічний закон обов'язково буде ____.
    answer: ухвалено
    options:
    - ухвалено
    - ухвалений
    - ухвалився
  - sentence: Перші квитки на вечірню виставу вже ____.
    answer: продано
    options:
    - продано
    - продані
    - продалися
  - sentence: Унікальну міську експозицію ____ на основі старих архівів.
    answer: створено
    options:
    - створено
    - створена
    - створилася
  - sentence: Наше старовинне місто було ____ ще у десятому столітті.
    answer: засновано
    options:
    - засновано
    - засноване
    - заснувалося
  - sentence: Усі необхідні офіційні документи успішно ____.
    answer: надіслано
    options:
    - надіслано
    - надіслані
    - надіслалися
- id: sentence-builder-transform
  type: unjumble
  instruction: Складіть правильні речення. Зверніть увагу на логічний порядок слів
    у безособових конструкціях.
  items:
  - words:
    - збудовано.
    - дім
    - Новий
    - успішно
    correct_order:
    - Новий
    - дім
    - успішно
    - збудовано.
  - words:
    - звіт
    - написано.
    - нарешті
    - Цей
    correct_order:
    - Цей
    - звіт
    - нарешті
    - написано.
  - words:
    - проведено.
    - засідання
    - Важливе
    - успішно
    correct_order:
    - Важливе
    - засідання
    - успішно
    - проведено.
  - words:
    - потяг
    - куплено.
    - на
    - Квитки
    correct_order:
    - Квитки
    - на
    - потяг
    - куплено.
  - words:
    - зібрано.
    - речі
    - Усі
    - старі
    correct_order:
    - Усі
    - старі
    - речі
    - зібрано.
  - words:
    - складено
    - відмінно.
    - Фінальний
    - екзамен
    correct_order:
    - Фінальний
    - екзамен
    - складено
    - відмінно.
  - words:
    - ухвалено.
    - закон
    - освіту
    - Новий
    - про
    correct_order:
    - Новий
    - закон
    - про
    - освіту
    - ухвалено.
  - words:
    - палац
    - реконструйовано.
    - Цей
    - сучасний
    correct_order:
    - Цей
    - сучасний
    - палац
    - реконструйовано.
- id: transitive-intransitive-verbs
  type: group-sort
  instruction: 'Розподіліть дієслова на перехідні (вимагають прямого додатка: ''робити
    що?'') та неперехідні. Пам''ятайте: пасив утворюється лише від перехідних дієслів!'
  groups:
  - label: Перехідні дієслова (можуть утворити пасив)
    items:
    - будувати
    - читати
    - писати
    - відкривати
    - продавати
    - створювати
  - label: Неперехідні дієслова (НЕ можуть утворити пасив)
    items:
    - спати
    - гуляти
    - сидіти
    - жити
    - стояти
    - працювати
workbook:
- type: match-up
  instruction: З'єднайте активні речення з їхніми ідеальними безособовими еквівалентами
    на -но/-то.
  pairs:
  - left: Робітники збудували новий міст.
    right: Новий міст збудовано.
  - left: Студенти прочитали цікаву статтю.
    right: Цікаву статтю прочитано.
  - left: Архітектори спроєктували сучасний театр.
    right: Сучасний театр спроєктовано.
  - left: Менеджер виконав важливе завдання.
    right: Важливе завдання виконано.
  - left: Депутати ухвалили новий закон.
    right: Новий закон ухвалено.
  - left: Журналісти опублікували свіжі новини.
    right: Свіжі новини опубліковано.
  - left: Секретар надіслав усі документи.
    right: Усі документи надіслано.
  - left: Майстри завершили складний ремонт.
    right: Складний ремонт завершено.
- type: true-false
  instruction: Правда чи ні? Перевірте, наскільки добре ви зрозуміли правила використання
    пасивного стану в українській мові.
  items:
  - statement: В українській мові пасивний стан використовується значно частіше, ніж
      активний.
    correct: false
    explanation: Навпаки! Українська мова віддає абсолютну перевагу динамічному активному
      стану. Пасивний стан використовується набагато рідше.
  - statement: Безособові форми на -но/-то є незмінними і ніколи не мають закінчень
      роду чи числа.
    correct: true
    explanation: Саме так. Це безособові форми, вони ніколи не змінюють своє закінчення
      на відміну від дієприкметників.
  - statement: У реченнях із формою на -но/-то логічний об'єкт обов'язково стоїть
      у називному відмінку.
    correct: false
    explanation: 'Об''єкт завжди залишається у знахідному відмінку (як прямий додаток),
      оскільки це безособове речення без підмета (наприклад: ''збудовано школу'').'
  - statement: До безособових форм на -но/-то категорично заборонено додавати виконавця
      дії в орудному відмінку (наприклад, писати 'написано мною').
    correct: true
    explanation: Це дуже суворе правило. Безликі форми існують саме для того, щоб
      повністю сховати або проігнорувати виконавця. Додавати агента — це типовий русизм.
  - statement: Такі зворотні дієслова як 'знаходитися', 'вважатися' та 'називатися'
      звучать штучно і їх слід уникати.
    correct: false
    explanation: Ці конкретні дієслова є повністю лексикалізованими і звучать в українській
      мові абсолютно природно та органічно в будь-якому контексті.
  - statement: Перехідні дієслова — це дієслова, які не можуть мати прямого додатка.
    correct: false
    explanation: 'Усе навпаки. Перехідні дієслова завжди вимагають прямого додатка
      у знахідному відмінку (наприклад: ''будувати дім'', ''читати книгу'').'
- type: quiz
  instruction: 'Підсумковий тест: оберіть найбільш природний, стилістично та граматично
    правильний український варіант речення.'
  items:
  - question: Як найкраще сказати, що робітники закінчили будівництво цього дому?
    options:
    - Робітники успішно збудували цей дім.
    - Цей дім був успішно збудований робітниками.
    - Цей дім успішно будувався робітниками.
    - Цей дім успішно збудувався робітниками.
    correct: 0
  - question: Як правильно повідомити про результат будівництва школи, якщо виконавець
      нам невідомий або неважливий?
    options:
    - Нову школу нарешті збудовано.
    - Нова школа нарешті збудувалася.
    - Нову школу нарешті збудували невідомі.
    - Нова школа є збудована.
    correct: 0
  - question: Яке з цих речень є типовим прикладом небажаного 'канцеляриту'?
    options:
    - Цей звіт зараз розробляється нашим головним менеджером.
    - Наш головний менеджер зараз розробляє цей звіт.
    - Цей важливий звіт нарешті успішно розроблено.
    - Менеджер успішно розробив цей важливий звіт.
    correct: 0
  - question: 'Оберіть єдине граматично правильне використання форми на -но/-то:'
    options:
    - Цю цікаву статтю вже перекладено.
    - Ця цікава стаття вже перекладено.
    - Цю цікаву статтю вже перекладено перекладачем.
    - Ця цікава стаття вже перекладена перекладачем.
    correct: 0
  - question: Яке з цих дієслів є НЕПЕРЕХІДНИМ (тобто від нього фізично неможливо
      утворити пасивний стан)?
    options:
    - Спати
    - Будувати
    - Писати
    - Відкривати
    correct: 0
  - question: Як правильно, красиво і природно перекласти англійську фразу 'The book
      was read by the students'?
    options:
    - Студенти прочитали цю книгу.
    - Ця книга була прочитана студентами.
    - Цю книгу було прочитано студентами.
    - Ця книга прочиталася студентами.
    correct: 0
