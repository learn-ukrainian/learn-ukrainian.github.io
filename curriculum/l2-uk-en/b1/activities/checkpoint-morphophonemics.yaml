    correct: 1
  - question: піч — печі
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Подвоєння приголосних
    correct: 0
  - question: щастя — щасливий
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Подвоєння приголосних
    correct: 2
  - question: козак — козаче
    options:
    - Чергування голосних
    - Чергування приголосних
