version: '1.0'
module: checkpoint-morphophonemics
level: b1
inline: []
workbook:
- type: quiz
  instruction: Визначте тип морфонемічного явища в кожній парі слів.
  items:
  - question: рік — року
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Подвоєння приголосних
    correct: 0
  - question: рука — на руці
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Подвоєння приголосних
    correct: 1
  - question: тиждень — тижня
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Подвоєння приголосних
    correct: 2
  - question: сидіти — сиджу
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
