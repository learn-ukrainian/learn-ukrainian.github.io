version: '1.0'
module: checkpoint-morphophonemics
level: b1
inline:
- id: quiz-choosing-between-based-on-completion-vs-ongoing-action
  type: quiz
  instruction: Оберіть правильну форму дієслова за видом (доконаний/недоконаний)
  items:
  - question: Я _______ довгий лист учора, але так і не закінчив його.
    options:
    - писав
    - написав
    - буду писати
    - напишу
    correct: 0
  - question: Олег нарешті _______ свій новий складний проєкт.
    options:
    - робив
    - зробив
    - буде робити
    - робитиме
    correct: 1
  - question: Завтра я _______ над цією статтею весь вечір без перерви.
    options:
    - попрацюю
    - працюю
    - попрацював
    - працюватиму
    correct: 3
  - question: Не хвилюйся, я швидко _______ це завдання до ранку.
    options:
    - буду виконувати
    - виконаю
    - виконував
    - виконую
    correct: 1
  - question: Вона часто _______ йому про свої неймовірні успіхи в університеті.
    options:
    - розповідала
    - розповіла
    - розкаже
    - розказала
    correct: 0
  - question: Ми обов'язково _______ на вихідних у нашому улюбленому кафе.
    options:
    - будемо зустрічатися
    - зустрічалися
    - зустрінемося
    - зустрічаємося
    correct: 2
- id: fill-in-completing-descriptions-of-people-and-their-relationships
  type: fill-in
  instruction: Вставте правильне слово для опису зовнішності та характеру
  items:
  - sentence: Він завжди говорить правду, він дуже _______ друг.
    answer: щирий
    options:
    - щирий
    - хитрий
    - злий
  - sentence: Після медитації вона стала абсолютно _______.
    answer: врівноваженою
    options:
    - врівноваженою
    - імпульсивною
    - нервовою
  - sentence: Її брат дуже _______ — він часто змінює свій настрій.
    answer: імпульсивний
    options:
    - імпульсивний
    - спокійний
    - акуратний
  - sentence: Вона має прекрасну _______ — завжди дуже гарно та стильно одягається.
    answer: зовнішність
    options:
    - зовнішність
    - характер
    - професію
  - sentence: Олег виглядає як справжній _______ у своєму новому дорогому костюмі.
    answer: професіонал
    options:
    - професіонал
    - студент
    - підліток
  - sentence: Минулого року його зовнішність кардинально _______.
    answer: змінилася
    options:
    - змінилася
    - залишилася
    - пропала
- id: quiz-alternation-type
  type: quiz
  instruction: Яке фонетичне явище відбувається у цій парі слів?
  items:
  - question: рік — року
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 0
  - question: дорога — на дорозі
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 1
  - question: честь — чесний
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 2
  - question: учень — учня
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 3
  - question: плакати — плачу
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 1
  - question: кінь — коня
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 0
  - question: тиждень — тижня
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 2
  - question: вітер — вітру
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 3
  - question: муха — на мусі
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 1
  - question: щастя — щасливий
    options:
    - Чергування голосних
    - Чергування приголосних
    - Спрощення приголосних
    - Випадний голосний (нульове закінчення)
    correct: 2
- id: match-alternated-forms
  type: match-up
  instruction: З'єднайте базове слово з його правильною зміненою формою
  pairs:
  - left: ніч
    right: ночі
  - left: друг
    right: друже
  - left: кінь
    right: коня
  - left: рука
    right: руці
  - left: плакати
    right: плачу
  - left: сидіти
    right: сиджу
  - left: писати
    right: пишу
  - left: тиждень
    right: тижня
  - left: честь
    right: чесний
  - left: сіль
    right: сіллю
- id: fill-in-declension-context
  type: fill-in
  instruction: Вставте іменник у правильній відмінковій формі
  items:
  - sentence: Учора я довго розмовляв із новим _______.
    answer: сторожем
    options:
    - сторожем
    - сторожом
    - сторожі
  - sentence: Ми обережно розрізали хліб великим _______.
    answer: ножем
    options:
    - ножом
    - ножем
    - ножі
  - sentence: Він завжди був мені надійним і вірним _______.
    answer: товаришем
    options:
    - товаришу
    - товаришом
    - товаришем
  - sentence: Я виконую цю складну роботу з великою _______.
    answer: радістю
    options:
    - радісттю
    - радіссттю
    - радістю
  - sentence: Вона привітала нас у своєму домі з _______.
    answer: любов'ю
    options:
    - любоввю
    - любов'ю
    - любовью
  - sentence: Цю гарячу страву обов'язково потрібно посипати _______.
    answer: сіллю
    options:
    - сіллю
    - сілю
    - сілею
  - sentence: У мене зараз зовсім немає паперових _______.
    answer: грошей
    options:
    - гроші
    - грошов
    - грошей
  - sentence: Я стою біля дуже старих дерев'яних _______.
    answer: воріт
    options:
    - воротах
    - вороті
    - воріт
  - sentence: Лікар виписав рецепт для моїх нових _______.
    answer: окулярів
    options:
    - окуляр
    - окуляри
    - окулярів
  - sentence: Ми довго милувалися темною зоряною _______.
    answer: ніччю
    options:
    - нічею
    - ніччю
    - нічю
- id: sort-noun-subclasses
  type: group-sort
  instruction: Розподіліть іменники за їхньою граматичною підгрупою
  groups:
  - label: Мішана група (шиплячі)
    items:
    - сторож
    - товариш
    - ніж
  - label: Третя відміна (жіночий рід)
    items:
    - радість
    - ніч
    - любов
    - сіль
  - label: Pluralia tantum (тільки множина)
    items:
    - окуляри
    - двері
    - гроші
  - label: Інші (тверда/м'яка група)
    items:
    - стіл
    - батько
- id: comprehension-medical-grammar
  type: quiz
  instruction: Дайте відповідь на запитання за діалогом із фіналу вікторини
  items:
  - question: У якому відмінку стоїть слово «друже» у звертанні ведучого?
    options:
    - Кличний відмінок
    - Називний відмінок
    - Місцевий відмінок
    - Давальний відмінок
    correct: 0
  - question: Яке фонетичне правило ілюструє форма «ночі» (від слова «ніч»)?
    options:
    - Чергування голосних
    - Спрощення приголосних
    - Подвоєння приголосних
    - Випадний голосний
    correct: 0
  - question: Чому у формі «з радістю» немає подвоєння літер?
    options:
    - Бо основа закінчується на збіг двох приголосних
    - Бо це слово виняток
    - Бо основа закінчується на губний звук
    - Бо це іменник другої відміни
    correct: 0
  - question: До якої граматичної групи належить слово «ворота»?
    options:
    - Pluralia tantum
    - Третя відміна
    - Мішана група
    - Тверда група
    correct: 0
  - question: Яке закінчення має слово «ліки» в родовому відмінку (немає...)?
    options:
    - -ів (ліків)
    - -ей (лікей)
    - нульове закінчення
    - -а (ліка)
    correct: 0
  - question: Як правильно сказати про захворювання за правилами керування дієслів?
    options:
    - захворів на грип
    - захворів грипом
    - хворію від грипу
    - хворію грип
    correct: 0
workbook:
- type: translate
  instruction: Оберіть правильний український переклад
  items:
  - source: He was writing a long letter yesterday.
    options:
    - text: Він писав довгий лист учора.
      correct: true
    - text: Він написав довгий лист учора.
      correct: false
    - text: Він буде писати довгий лист учора.
      correct: false
  - source: I am cutting bread with a knife.
    options:
    - text: Я ріжу хліб ножем.
      correct: true
    - text: Я ріжу хліб ножом.
      correct: false
    - text: Я різав хліб ножем.
      correct: false
  - source: She signed the document with blood.
    options:
    - text: Вона підписала документ кров'ю.
      correct: true
    - text: Вона підписала документ кроввю.
      correct: false
    - text: Вона підписує документ кровію.
      correct: false
  - source: Unfortunately, we have no money.
    options:
    - text: На жаль, у нас немає грошей.
      correct: true
    - text: На жаль, у нас немає гроші.
      correct: false
    - text: На жаль, у нас немає грошів.
      correct: false
  - source: He works as a watchman.
    options:
    - text: Він працює сторожем.
      correct: true
    - text: Він працює сторожом.
      correct: false
    - text: Він працював сторожу.
      correct: false
  - source: I will do it quickly.
    options:
    - text: Я швидко це зроблю.
      correct: true
    - text: Я швидко робитиму це.
      correct: false
    - text: Я швидко робив це.
      correct: false
- id: unjumble-grammar-review
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - ножем.
    - різати
    - хліб
    - Я
    - буду
    correct_order:
    - Я
    - буду
    - різати
    - хліб
    - ножем.
    hint: Недоконаний вид майбутнього часу
  - words:
    - у
    - воріт.
    - Ми
    - зустрінемося
    - старих
    correct_order:
    - Ми
    - зустрінемося
    - у
    - старих
    - воріт.
    hint: Родовий відмінок для pluralia tantum
  - words:
    - з
    - її
    - товаришем.
    - Я
    - говорив
    correct_order:
    - Я
    - говорив
    - з
    - її
    - товаришем.
    hint: Мішана група, орудний відмінок
  - words:
    - скаржився
    - Він
    - на
    - біль.
    correct_order:
    - Він
    - скаржився
    - на
    - біль.
    hint: Керування дієслова скаржитися
  - words:
    - від
    - Вона
    - грипу.
    - швидко
    - одужала
    correct_order:
    - Вона
    - швидко
    - одужала
    - від
    - грипу.
    hint: Керування дієслова одужати
  - words:
    - немає
    - цих
    - У
    - мене
    - ліків.
    correct_order:
    - У
    - мене
    - немає
    - цих
    - ліків.
    hint: Pluralia tantum, родовий відмінок
