- id: fill-in-declension-context
  type: fill-in
  instruction: Вставте іменник у правильній відмінковій формі (мішана група, III відміна
    або pluralia tantum).
  items:
  - sentence: У магазині оптики немає нових _________.
    answer: окулярів
    options:
    - окулярів
    - окуляри
    - окулярах
    - окулярами
  - sentence: Пацієнт постійно скаржиться на гострий _________.
    answer: біль
    options:
    - біль
    - болю
    - болем
    - болі
  - sentence: Минулого літа ми подорожували до високих _________.
    answer: Карпат
    options:
    - Карпат
    - Карпатів
    - Карпатах
    - Карпатами
  - sentence: Лікар уважно оглянув _________ пацієнта.
    answer: носа
    options:
    - носа
    - ніс
    - носу
    - носом
  - sentence: На жаль, мені зараз не вистачає _________.
    answer: грошей
    options:
    - грошей
    - грошів
    - грошами
    - грошах
  - sentence: Мій старий знайомий працює _________ у лікарні.
    answer: сторожем
    options:
    - сторожем
    - сторожом
    - сторожі
    - сторожу
  - sentence: Мама обережно ріже іменинний пиріг новим _________.
    answer: ножем
    options:
    - ножем
    - ножом
    - ножі
    - ножу
  - sentence: Це свято принесло нам багато справжньої _________.
    answer: радості
    options:
    - радості
    - радости
    - радістю
    - радість
  - sentence: Медсестра швидко змастила рану цілющою _________.
    answer: маззю
    options:
    - маззю
    - мазю
    - маззі
    - мазь
  - sentence: Ви вже прийняли ці гіркі _________?
    answer: ліки
    options:
    - ліки
    - ліків
    - ліках
    - ліками
  title: Вставте іменник у правильній відмінковій формі (мішана група, III відміна
    або pl
- id: sort-noun-subclasses
  type: group-sort
  instruction: 'Розподіліть іменники за підкласами: мішана група, III відміна або
    pluralia tantum.'
  groups:
  - label: Мішана група
    items:
    - ніж
    - сторож
    - товариш
    - слухач
  - label: III відміна
    items:
    - ніч
    - сіль
    - радість
    - кров
  - label: Pluralia tantum
    items:
    - гроші
    - окуляри
    - канікули
    - Карпати
  title: 'Розподіліть іменники за підкласами: мішана група, III відміна або pluralia
    tantu'
- id: comprehension-medical-grammar
  type: quiz
  instruction: Дайте відповіді на граматичні запитання за змістом діалогу вікторини.
  items:
  - question: Яку форму кличного відмінка використав ведучий, звертаючись до учасника?
    options:
    - Друже
    - Друг
    - Дружу
    correct: 0
  - question: Яке чергування голосних відбувається у слові 'ніч' при відмінюванні?
    options:
    - і — о
    - і — е
    - е — о
    - випадання звука
    correct: 0
  - question: Чому у слові 'радістю' не пишеться подвійна літера 'т'?
    options:
    - Через збіг двох приголосних
    - Це губний звук
    - Це виняток
    - Через апостроф
    correct: 0
  - question: До якої категорії належить слово 'ліки'?
    options:
    - Pluralia tantum
    - Мішана група
    - III відміна
    - II відміна
    correct: 0
  - question: Який відмінок вимагає конструкція 'скаржитися на'?
    options:
    - Знахідний
    - Родовий
    - Давальний
    - Орудний
    correct: 0
  - question: Яка форма орудного відмінка слова 'кров' є правильною?
    options:
    - кров'ю
    - кроввю
    - кровю
    - кровом
    correct: 0
  title: Дайте відповіді на граматичні запитання за змістом діалогу вікторини.
