    - Спрощення приголосних
    - Подвоєння приголосних
    correct: 1
- type: fill-in
  instruction: Вставте правильну форму слова в дужках.
  items:
  - sentence: Я захоплююся вашою _____ (радість).
    answer: радістю
    options:
    - радістю
    - радісттю
    - радістем
  - sentence: У лікаря немає моїх _____ (ліки).
    answer: ліків
    options:
    - ліків
    - ліки
    - лікам
  - sentence: Ми зустрілися з _____ (товариш) біля дверей.
    answer: товаришем
    options:
    - товаришем
    - товаришом
    - товарищем
  - sentence: Він стоїть біля великих _____ (ворота).
    answer: воріт
    options:
    - воріт
    - воротов
    - воротях
  - sentence: Лікар користується гострим _____ (ніж).
    answer: ножем
    options:
    - ножем
    - ножом
    - ножу
  - sentence: Ми довго чекали темною _____ (ніч).
    answer: ніччю
    options:
    - ніччю
    - нічью
    - ночею
  - sentence: На це лікування треба багато _____ (гроші).
    answer: грошей
    options:
    - грошей
    - грошів
    - грошам
  - sentence: Вона поділилася зі мною своєю _____ (сіль).
    answer: сіллю
    options:
    - сіллю
    - сілью
    - сілем
  - sentence: Мій товариш заплатив за рецепт _____ (гроші).
    answer: грошима
    options:
    - грошима
    - грошів
    - грошам
  - sentence: Вона пишається своєю _____ (молодість).
    answer: молодістю
    options:
    - молодістю
    - молодісттю
    - молодістем
- type: error-correction
  instruction: Знайдіть і виправте граматичну або орфографічну помилку в кожному реченні.
  items:
  - sentence: Я вчора довго розмовляв зі сторожом.
    error: сторожом
    correction: сторожем
    error_type: word
    options:
    - сторожем
    - сторожі
    - сторожу
    explanation: Слово «сторож» належить до мішаної групи. В орудному відмінку такі
      слова мають закінчення «-ем».
  - sentence: Вона поділилася зі мною великою радіссттю.
    error: радіссттю
    correction: радістю
    error_type: word
    options:
    - радістю
    - радістей
    - радістем
    explanation: В іменниках III відміни подвоєння не відбувається, якщо основа закінчується
      на збіг двох приголосних (с + т).
  - sentence: Лікар помітив сильну інфекцію у вухові.
    error: вухові
    correction: вусі
    error_type: word
    options:
    - вусі
    - вуху
    - вухах
    explanation: У місцевому відмінку відбувається чергування приголосного [х] на
      [с'] (вухо — у вусі).
  - sentence: Мені потрібен один двері для нової кімнати.
    error: один
    correction: одні
    error_type: word
    options:
    - одні
    - одна
    - одне
    explanation: Слово «двері» — це pluralia tantum (має лише множину), тому числівник
      також має бути у формі множини.
  - sentence: Лікар шукає свій ножиці.
    error: свій
    correction: свої
    error_type: word
    options:
    - свої
    - свою
    - своє
    explanation: Слово «ножиці» має лише форму множини, тому займенник узгоджується
      у множині.
  - sentence: Лікар порадив користуватися цією мазью.
    error: мазью
    correction: маззю
    error_type: word
    options:
    - маззю
    - мазою
    - мазєм
    explanation: Оскільки основа слова «мазь» закінчується на один приголосний, в
      орудному відмінку відбувається подвоєння (зз).
  - sentence: Ми дуже чекаємо літніх канікулов.
    error: канікулов
    correction: канікул
    error_type: word
    options:
    - канікул
    - канікулам
    - канікулами
    explanation: Слово «канікули» в родовому відмінку множини має нульове закінчення.
  - sentence: Вона дуже пишається своєю подорожью до Карпат.
    error: подорожью
    correction: подорожжю
    error_type: word
    options:
    - подорожжю
    - подорожою
    - подорожем
    explanation: В іменниках III відміни з одним кінцевим приголосним основи відбувається
      подвоєння (подорож — подорожжю).
- type: match-up
  instruction: З'єднайте початкову форму слова з її зміненою формою.
  pairs:
  - left: нога
    right: на нозі
  - left: вухо
    right: у вусі
  - left: хотіти
    right: хочу
  - left: козак
    right: козаче
  - left: друг
    right: друже
  - left: сидіти
    right: сиджу
  - left: писати
    right: пишу
  - left: Ольга
    right: Ользі
  - left: плакати
    right: плачу
  - left: горох
    right: у горосі
- type: group-sort
  instruction: Розподіліть іменники за відповідними граматичними категоріями.
  groups:
  - label: Мішана група
    items:
    - сторож
    - товариш
    - ніж
  - label: Третя відміна
    items:
    - тінь
    - паморозь
    - ніч
  - label: Pluralia tantum
    items:
    - граблі
    - вершки
    - двері
  - label: Інші іменники
    items:
    - стіл
    - книга
    - лікар
- type: quiz
  instruction: Оберіть правильну граматичну характеристику слів із тексту про візит
    до поліклініки.
  items:
  - question: Який відмінок використано у фразі «біль у вусі»?
    options:
    - Місцевий відмінок
    - Давальний відмінок
    - Родовий відмінок
    - Знахідний відмінок
    correct: 0
  - question: Чому у слові «оці» (від «око») пишеться літера «ц»?
    options:
    - Це чергування приголосних [к] — [ц']
    - Це спрощення приголосних
    - Це виняток із правил
    - Це чергування голосних
    correct: 0
  - question: Який відмінок вимагає дієслово у фразі «лікується від інфекції»?
    options:
    - Родовий відмінок
    - Місцевий відмінок
    - Знахідний відмінок
    - Орудний відмінок
    correct: 0
  - question: Чому слово «маззю» має дві літери «з»?
    options:
    - Це подвоєння в орудному відмінку III відміни
    - Це мішана група іменників
    - Це множина слова
    - Це чергування приголосних
    correct: 0
  - question: Слово «ліки» в тексті («купив ліки») має форму...
    options:
    - Тільки множини (pluralia tantum)
    - Однини чоловічого роду
    - Однини жіночого роду
    - Мішаної групи
    correct: 0
  - question: Яку граматичну форму має слово «грошима» (від «гроші»)?
    options:
    - Орудний відмінок
    - Родовий відмінок
    - Місцевий відмінок
    - Давальний відмінок
    correct: 0
