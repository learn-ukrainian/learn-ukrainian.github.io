version: '1.0'
module: motion-prefixes-in-out
level: b1
inline: []
workbook:
- id: quiz-za-vy
  type: quiz
  instruction: Оберіть правильне дієслово, звертаючи увагу на напрямок руху (всередину
    чи назовні).
  items:
  - question: Після роботи я обов'язково _____ до магазину по хліб.
    options:
    - зайду
    - вийду
    - зайде
    - вийдеш
    correct: 0
  - question: О котрій годині ти зазвичай _____ з дому вранці?
    options:
    - виходиш
    - заходиш
    - виходить
    - заходжу
    correct: 0
  - question: Він _____ з кабінету і голосно грюкнув дверима.
    options:
    - вийшов
    - зайшов
    - залетів
    - забіг
    correct: 0
  - question: Птах випадково _____ у відчинене вікно.
    options:
    - залетів
    - вилетів
    - залетіла
    - вилетіла
    correct: 0
  - question: Водій обережно _____ у тісний підземний гараж.
    options:
    - заїхав
    - виїхав
    - заїхала
    - виїхала
    correct: 0
  - question: Будь ласка, _____ це старе крісло з кімнати.
    options:
    - винеси
    - занеси
    - винесу
    - занесеш
    correct: 0
  - question: Вони _____ з парковки і поїхали головною вулицею.
    options:
    - виїхали
    - заїхали
    - виїхав
    - заїхав
    correct: 0
  - question: Діти почули дзвоник і радісно _____ з класу на перерву.
    options:
    - вибігли
    - забігли
    - вибігла
    - забіг
    correct: 0
- id: fill-in-errands
  type: fill-in
  instruction: Доповніть речення правильними дієсловами руху з префіксами за- або
    ви-.
  items:
  - sentence: Вранці я _____ з дому о восьмій годині.
    answer: вийшов
    options:
    - вийшов
    - зайшов
    - виїхав
  - sentence: По дорозі на роботу я _____ до кав'ярні.
    answer: зайшов
    options:
    - зайшов
    - вийшов
    - залетів
  - sentence: Я купив каву і швидко _____ на вулицю.
    answer: вийшов
    options:
    - вийшов
    - зайшов
    - забіг
  - sentence: В обідню перерву колега _____ до мого кабінету.
    answer: зайшов
    options:
    - зайшов
    - вийшов
    - виніс
  - sentence: Увечері я _____ на парковку біля супермаркету.
    answer: заїхав
    options:
    - заїхав
    - виїхав
    - залетів
  - sentence: Я відчинив двері і _____ собаку на вулицю.
    answer: вивів
    options:
    - вивів
    - завів
    - виніс
  - sentence: Потім я _____ з парковки і поїхав додому.
    answer: виїхав
    options:
    - виїхав
    - заїхав
    - зайшов
  - sentence: Я _____ важкі пакунки у квартиру.
    answer: заніс
    options:
    - заніс
    - виніс
    - вивіз
- id: match-up-opposites
  type: match-up
  instruction: З'єднайте дієслова руху всередину (за-) з їхніми антонімами руху назовні
    (ви-).
  pairs:
  - left: зайти
    right: вийти
  - left: заїхати
    right: виїхати
  - left: забігти
    right: вибігти
  - left: залетіти
    right: вилетіти
  - left: занести
    right: винести
  - left: завести
    right: вивести
  - left: завезти
    right: вивезти
  - left: заходити
    right: виходити
- id: group-sort-prefixes
  type: group-sort
  instruction: Розподіліть дієслова за напрямком руху, звертаючи увагу на їхні префікси.
  groups:
  - label: Рух усередину (за-)
    items:
    - зайти
    - заїхати
    - забігти
  - label: Рух назовні (ви-)
    items:
    - вийти
    - виїхати
    - вибігти
  - label: Прибуття до фінішу (при- / до-)
    items:
    - приїхати
    - долетіти
    - дійти
  - label: Відправлення / початок (пі- / по- / від-)
    items:
    - піти
    - поїхати
    - віднести
- id: error-correction-prepositions
  type: error-correction
  instruction: Знайдіть і виправте помилку у вживанні прийменників та відмінків.
  items:
  - sentence: Я вийшов з кімната.
    error: кімната
    correction: кімнати
    error_type: word
    options:
    - кімнати
    - кімнату
    - кімнаті
    explanation: Прийменник 'з' вимагає родового відмінка (звідки?).
  - sentence: Він зайшов у кав'ярні.
    error: кав'ярні
    correction: кав'ярню
    error_type: word
    options:
    - кав'ярню
    - кав'ярня
    - кав'ярнею
    explanation: Прийменник 'у' (вхід у простір) вимагає знахідного відмінка (куди?).
  - sentence: Ми заїхали до друг.
    error: друг
    correction: друга
    error_type: word
    options:
    - друга
    - другу
    - другом
    explanation: Прийменник 'до' вимагає родового відмінка.
  - sentence: Вона вибігла із школа.
    error: школа
    correction: школи
    error_type: word
    options:
    - школи
    - школу
    - школі
    explanation: Прийменник 'із' вимагає родового відмінка.
  - sentence: Кіт забіг в кімнаті.
    error: кімнаті
    correction: кімнату
    error_type: word
    options:
    - кімнату
    - кімнати
    - кімната
    explanation: Прийменник 'в' (напрямок) вимагає знахідного відмінка.
  - sentence: Вони виїхали з гараж.
    error: гараж
    correction: гаража
    error_type: word
    options:
    - гаража
    - гаражу
    - гаражі
    explanation: Прийменник 'з' вимагає родового відмінка.
- id: essay-response-routine
  type: essay-response
  prompt: 'Опишіть свій вчорашній день (6-8 речень). Обов''язково використайте мінімум
    4 дієслова з префіксом за- (наприклад: зайшов, заїхав, забіг) та 4 дієслова з
    префіксом ви- (наприклад: вийшов, виїхав, виніс).'
  min_words: 50
  model_answer: Вчора вранці я вийшов з дому о восьмій годині. По дорозі на роботу
    я зайшов до кав'ярні, щоб купити смачну каву. Потім я вийшов на вулицю і швидко
    пішов до метро. Я зайшов у вагон і поїхав прямо в офіс. В обідню перерву я вийшов
    з офісу і забіг у супермаркет. Увечері я вийшов з роботи, заїхав на автозаправку
    і повернувся додому. Я заніс продукти у квартиру і нарешті відпочив.
