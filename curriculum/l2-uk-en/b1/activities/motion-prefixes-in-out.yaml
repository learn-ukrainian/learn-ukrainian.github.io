version: '1.0'
module: motion-prefixes-in-out
level: b1
inline:
- id: quiz-in-out-logic
  type: quiz
  instruction: Оберіть правильне дієслово за змістом.
  items:
  - question: Він _____ в кімнату, щоб швидко взяти ключі.
    options:
    - забіг
    - вибіг
    - прибіг
    - побіг
    correct: 0
  - question: Коли лунає пожежна тривога, всі повинні швидко _____ на вулицю.
    options:
    - вийти
    - зайти
    - піти
    - прийти
    correct: 0
  - question: Птах випадково _____ у відкрите вікно нашої вітальні.
    options:
    - залетів
    - вилетів
    - полетів
    - прилетів
    correct: 0
  - question: Будь ласка, _____ мою мокру парасолю в теплий дім.
    options:
    - занеси
    - винеси
    - принеси
    - віднеси
    correct: 0
  - question: Велика машина повільно _____ з гаража на вулицю.
    options:
    - виїхала
    - заїхала
    - поїхала
    - приїхала
    correct: 0
  - question: Кур'єр швидко _____ до офісу, віддав документи і пішов.
    options:
    - забіг
    - вибіг
    - перебіг
    - відбіг
    correct: 0
  - question: Батько привітно зустрів гостей і _____ їх до вітальні.
    options:
    - завів
    - вивів
    - перевів
    - відвів
    correct: 0
  - question: Ми довго чекали, коли відомі актори _____ на сцену.
    options:
    - вийдуть
    - зайдуть
    - перейдуть
    - відійдуть
    correct: 0
- id: match-up-match-idiomatic-and-literal-phrases-with
  type: match-up
  instruction: З'єднайте фразу з її правильним значенням або перекладом.
  pairs:
  - left: вийти з ситуації
    right: to resolve a problem
  - left: вийти заміж
    right: to get married (for a woman)
  - left: вийти на зв'язок
    right: to get in touch
  - left: вийти з ладу
    right: to break down
  - left: вийти з кімнати
    right: to exit the room
  - left: зайти до друга
    right: to drop by a friend's place
- id: free-write-describe-a-morning-routine-using-imperfective-verbs
  type: essay-response
  prompt: Опишіть свій типовий ранковий маршрут (наприклад, з дому на роботу чи навчання).
    Обов'язково використовуйте дієслова недоконаного виду для опису регулярних звичок
    (виходити, заходити, забігати, виїжджати тощо).
  min_words: 50
  model_answer: Я щоранку виходжу з дому рівно о восьмій годині. Спочатку я йду пішки
    і зазвичай заходжу до улюбленої кав'ярні за свіжою кавою. Після цього я виходжу
    на галасливу вулицю і прямую до метро. Я заходжу у вагон і довго їду до свого
    університету. Зі станції я часто забігаю до супермаркету, щоб купити воду, і тільки
    потім заходжу у свій навчальний корпус.
- id: match-opposites
  type: match-up
  instruction: З'єднайте дієслова з їхніми антонімами (протилежними за напрямком руху).
  pairs:
  - left: зайти
    right: вийти
  - left: заїхати
    right: виїхати
  - left: забігти
    right: вибігти
  - left: занести
    right: винести
  - left: завести
    right: вивести
  - left: завезти
    right: вивезти
  - left: залетіти
    right: вилетіти
  - left: заходити
    right: виходити
- id: group-sort-prefixes
  type: group-sort
  instruction: Розподіліть дієслова за їхнім напрямком руху.
  groups:
  - label: Рух усередину (за-)
    items:
    - зайти
    - занести
    - забігти
  - label: Рух назовні (ви-)
    items:
    - вийти
    - вивести
    - вилетіти
  - label: Прибуття на місце (при-, до-)
    items:
    - приїхати
    - дійти
    - принести
  - label: Відправлення (пі-, по-, від-)
    items:
    - піти
    - поїхати
    - відлетіти
- id: fill-in-errand-context
  type: fill-in
  instruction: Вставте правильне дієслово з префіксом «за-» або «ви-», щоб доповнити
    історію.
  items:
  - sentence: Зранку я _____ дому о восьмій годині.
    answer: вийшов з
    options:
    - вийшов з
    - зайшов у
    - пішов з
    - прийшов до
  - sentence: По дорозі я на хвилину _____ кав'ярні.
    answer: зайшов до
    options:
    - зайшов до
    - вийшов з
    - забіг на
    - заїхав у
  - sentence: Коли я купив каву, я швидко _____ вулицю.
    answer: вийшов на
    options:
    - вийшов на
    - зайшов у
    - виїхав з
    - забіг до
  - sentence: Потім мені треба було _____ аптеку по ліки.
    answer: забігти в
    options:
    - забігти в
    - вибігти з
    - побігти до
    - вийти на
  - sentence: Після цього ми вирішили _____ заправку.
    answer: заїхати на
    options:
    - заїхати на
    - виїхати з
    - зайти в
    - вийти на
  - sentence: Нарешті я успішно _____ свій офіс.
    answer: зайшов у
    options:
    - зайшов у
    - вийшов з
    - зайшов на
    - вийшов на
  - sentence: Ввечері колега допоміг мені _____ важкі коробки з кабінету.
    answer: винести
    options:
    - винести
    - занести
    - принести
    - віднести
  - sentence: О шостій годині ми всі _____ офісу і пішли відпочивати.
    answer: вийшли з
    options:
    - вийшли з
    - зайшли в
    - вийшли на
    - забігли до
- id: error-correction-preps
  type: error-correction
  instruction: Знайдіть і виправте помилку у використанні прийменників та відмінків.
  items:
  - sentence: Вона швидко вийшла кімнату.
    error: кімнату
    correction: з кімнати
    error_type: construction
    options:
    - з кімнати
    - в кімнату
    - на кімнату
    explanation: Після дієслів на ви- (рух назовні) використовуємо прийменник «з»
      + Родовий відмінок.
  - sentence: Ми вийшли із дому на вулиці.
    error: вулиці
    correction: вулицю
    error_type: construction
    options:
    - вулицю
    - вулиці
    - вулицею
    explanation: 'Рух на відкритий простір: вийти на + Знахідний відмінок (куди? на
      вулицю).'
  - sentence: Я хочу зайти магазин після роботи.
    error: магазин
    correction: в магазин
    error_type: construction
    options:
    - в магазин
    - з магазину
    - до магазину
    explanation: Дієслова на за- вимагають прийменника «в»/«у» (рух усередину).
  - sentence: Завтра я обов'язково зайду в свого друга.
    error: в свого друга
    correction: до свого друга
    error_type: phrase
    options:
    - до свого друга
    - з свого друга
    - від свого друга
    explanation: Візит до людини або особи вимагає прийменника «до» + Родовий відмінок.
  - sentence: Машина повільно виїхала у гараж.
    error: у гараж
    correction: з гаража
    error_type: phrase
    options:
    - з гаража
    - в гараж
    - на гараж
    explanation: Дієслово «виїхати» означає рух назовні і вимагає «з» + Родовий відмінок.
  - sentence: Птах залетів з відкритого вікна.
    error: з відкритого вікна
    correction: у відкрите вікно
    error_type: phrase
    options:
    - у відкрите вікно
    - на відкрите вікно
    - до відкритого вікна
    explanation: Дієслово «залетіти» (рух усередину) поєднується з прийменником «у»/«в».
- id: free-write-routine
  type: essay-response
  prompt: Напишіть коротку розповідь про ваш вчорашній день або цікаву подорож. Використайте
    щонайменше 4 дієслова з префіксом **за-** (зайти, забігти, занести тощо) та 4
    дієслова з префіксом **ви-** (вийти, виїхати, винести тощо) у формі минулого часу.
  min_words: 50
  model_answer: Вчора вранці я вийшов з дому і сів у свою машину. Я обережно виїхав
    з вузького двору і поїхав у центр міста. По дорозі я на хвилину зайшов у книгарню.
    Коли я купив книгу, я швидко вийшов на вулицю. Потім я заїхав на парковку біля
    офісу. Я зайшов у кабінет і заніс туди свої важкі документи. Ввечері колега допоміг
    мені винести коробки, і ми разом вийшли з будівлі.
workbook:
- type: translate
  instruction: Оберіть правильний український переклад для англійської фрази.
  items:
  - source: to enter the room
    options:
    - text: зайти в кімнату
      correct: true
    - text: вийти з кімнати
      correct: false
    - text: прийти в кімнату
      correct: false
  - source: to drop by a friend's place
    options:
    - text: зайти до друга
      correct: true
    - text: вийти від друга
      correct: false
    - text: піти до друга
      correct: false
  - source: to get married (for a woman)
    options:
    - text: вийти заміж
      correct: true
    - text: одружитися
      correct: false
    - text: вийти з ладу
      correct: false
  - source: to exit the building
    options:
    - text: вийти з будівлі
      correct: true
    - text: зайти в будівлю
      correct: false
    - text: прийти з будівлі
      correct: false
  - source: to run out onto the street
    options:
    - text: вибігти на вулицю
      correct: true
    - text: забігти з вулиці
      correct: false
    - text: прибігти на вулицю
      correct: false
  - source: to carry the heavy box out
    options:
    - text: винести важку коробку
      correct: true
    - text: занести важку коробку
      correct: false
    - text: принести важку коробку
      correct: false
- type: true-false
  instruction: Правда чи ні? Прочитайте твердження про префікси руху і виберіть правильну
    відповідь.
  items:
  - statement: Дієслова з префіксом «за-» завжди описують рух із закритого приміщення
      назовні.
    correct: false
    explanation: Префікс «за-» означає рух усередину, а «ви-» — назовні.
  - statement: Префікс «ви-» дуже часто використовується з прийменником «з» або «із».
    correct: true
    explanation: Так, вийти з кімнати, виїхати з гаража тощо.
  - statement: Вираз «вийти заміж» використовується в українській мові тільки для
      жінок.
    correct: true
    explanation: Для чоловіків використовується дієслово «одружитися».
  - statement: Дієслово недоконаного виду «заходити» описує одноразову, швидку і повністю
      завершену дію.
    correct: false
    explanation: Недоконаний вид описує тривалу або регулярну дію (звичку).
  - statement: В українській мові наголос у словах «вийшла» і «вийдуть» завжди падає
      на префікс «ви-».
    correct: true
    explanation: У доконаному виді дієслів на ви- наголос стабільно стоїть на префіксі.
  - statement: Фраза «зайти до магазину» означає, що магазин — це кінцева мета вашої
      довгої подорожі.
    correct: false
    explanation: Це означає короткий візит по дорозі («to drop by»). Для кінцевої
      мети використовується «прийти».
- type: observe
  prompt: Як змінюється значення дієслова при зміні виду (доконаний/недоконаний)?
  examples:
  - Він зайшов у кімнату. (доконаний вид — 1 раз)
  - Він заходив у кімнату щодня. (недоконаний вид — процес/звичка)
  - Вона вийшла з дому о восьмій. (доконаний вид — результат)
  - Вона виходить з дому щоранку. (недоконаний вид — звичка)
