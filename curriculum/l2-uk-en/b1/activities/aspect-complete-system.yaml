- type: quiz
  title: 'Вид дієслова: основи'
  instruction: 'Оберіть правильну відповідь, базуючись на контексті та значенні дієслова.'
  items:
    - question: 'Яке з наведених дієслів найкраще описує ПРОЦЕС (недоконаний вид)?'
      options:
        - text: 'писав'
          correct: true
        - text: 'написав'
          correct: false
        - text: 'зробив'
          correct: false
        - text: 'прочитав'
          correct: false
      explanation: '«Писав» відповідає на питання «що робив?» і позначає тривалу дію.'
    - question: 'Яке з наведених дієслів найкраще описує РЕЗУЛЬТАТ (доконаний вид)?'
      options:
        - text: 'прочитав'
          correct: true
        - text: 'читав'
          correct: false
        - text: 'будував'
          correct: false
        - text: 'малював'
          correct: false
      explanation: '«Прочитав» означає, що дія завершена і є результат (книга прочитана).'
    - question: 'Що насправді означає українська фраза «Я здавав екзамен»?'
      options:
        - text: 'Я був на екзамені, але результат невідомий'
          correct: true
        - text: 'Я успішно склав екзамен'
          correct: false
        - text: 'Я отримав гарну оцінку'
          correct: false
        - text: 'Я вже маю диплом'
          correct: false
      explanation: 'Недоконаний вид «здавав» описує лише спробу або процес, успіх не гарантований.'
    - question: 'Який вид ми використовуємо для опису звичок, що повторюються щодня?'
      options:
        - text: 'недоконаний (НДВ)'
          correct: true
        - text: 'доконаний (ДВ)'
          correct: false
        - text: 'обидва варіанти'
          correct: false
        - text: 'тільки теперішній час'
          correct: false
      explanation: 'Для повторюваних дій (щодня, часто) завжди використовується недоконаний вид.'
    - question: 'Яке з цих речень описує послідовність подій (ланцюжок дій)?'
      options:
        - text: 'Він встав, одягнувся і вийшов.'
          correct: true
        - text: 'Він спав, а сонце світило.'
          correct: false
        - text: 'Ми гуляли і розмовляли.'
          correct: false
        - text: 'Вона читала книгу цілий день.'
          correct: false
      explanation: 'Для послідовних дій (одна за одною) використовується доконаний вид.'
    - question: 'У якому граматичному часі в українській мові НЕ існує доконаного виду?'
      options:
        - text: 'у теперішньому'
          correct: true
        - text: 'у минулому'
          correct: false
        - text: 'у майбутньому'
          correct: false
        - text: 'у всіх часах є доконаний вид'
          correct: false
      explanation: 'Теперішній час — це завжди процес («зараз»), тому він може бути тільки недоконаним.'
    - question: 'Як граматично правильно сказати про конкретний майбутній результат?'
      options:
        - text: 'Я напишу звіт.'
          correct: true
        - text: 'Я буду написати звіт.'
          correct: false
        - text: 'Я буду пишу звіт.'
          correct: false
        - text: 'Я є написав звіт.'
          correct: false
      explanation: '«Буду» вживається тільки з НДВ (буду писати). Для результату використовується проста форма ДВ (напишу).'
    - question: 'Оберіть правильну видову пару: тривалий процес — одноразова дія.'
      options:
        - text: 'стукати — стукнути'
          correct: true
        - text: 'стукати — стучати'
          correct: false
        - text: 'бити — битися'
          correct: false
        - text: 'кричати — кричати'
          correct: false
      explanation: 'Суфікс -ну- (стукнути) вказує на миттєву, одноразову дію.'
    - question: 'Який маркер часу логічно вимагає використання недоконаного виду дієслова?'
      options:
        - text: 'зазвичай'
          correct: true
        - text: 'нарешті'
          correct: false
        - text: 'раптом'
          correct: false
        - text: 'за хвилину'
          correct: false
      explanation: 'Слово «зазвичай» вказує на повторення дії, що є функцією недоконаного виду.'
    - question: 'Що саме означає граматична форма «побігти» в українській мові?'
      options:
        - text: 'початок руху'
          correct: true
        - text: 'кінець руху'
          correct: false
        - text: 'тривалий рух'
          correct: false
        - text: 'регулярний рух'
          correct: false
      explanation: 'Префікс по- часто вказує на початок дії (інтресивне значення).'
    - question: 'Оберіть речення, яке містить грубу граматичну помилку у вживанні виду.'
      options:
        - text: 'Я буду збудувати дім.'
          correct: true
        - text: 'Я буду будувати дім.'
          correct: false
        - text: 'Я збудую дім.'
          correct: false
        - text: 'Ми будували дім.'
          correct: false
      explanation: 'Допоміжне дієслово «буду» не вживається з доконаним видом.'
    - question: 'Яка з цих форм дієслова відповідає на запитання «що робив?»'
      options:
        - text: 'читав'
          correct: true
        - text: 'прочитав'
          correct: false
        - text: 'написав'
          correct: false
        - text: 'вивчив'
          correct: false
      explanation: 'Питання «що робив?» стосується процесу (недоконаний вид).'

- type: match-up
  title: 'Маркери часу та вид'
  instruction: 'З’єднайте слово-маркер з відповідним видом дієслова.'
  pairs:
    - left: 'щодня (every day)'
      right: 'Недоконаний (НДВ)'
    - left: 'часто (often)'
      right: 'Недоконаний (НДВ)'
    - left: 'завжди (always)'
      right: 'Недоконаний (НДВ)'
    - left: 'довго (for a long time)'
      right: 'Недоконаний (НДВ)'
    - left: 'цілий день (all day)'
      right: 'Недоконаний (НДВ)'
    - left: 'регулярно (regularly)'
      right: 'Недоконаний (НДВ)'
    - left: 'поки (while)'
      right: 'Недоконаний (НДВ)'
    - left: 'раптом (suddenly)'
      right: 'Доконаний (ДВ)'
    - left: 'нарешті (finally)'
      right: 'Доконаний (ДВ)'
    - left: 'одразу (immediately)'
      right: 'Доконаний (ДВ)'
    - left: 'одного разу (once)'
      right: 'Доконаний (ДВ)'
    - left: 'за годину (in an hour - result)'
      right: 'Доконаний (ДВ)'
    - left: 'несподівано (unexpectedly)'
      right: 'Доконаний (ДВ)'
    - left: 'протягом дня (throughout the day)'
      right: 'Недоконаний (НДВ)'

- type: fill-in
  title: 'Вибір виду в контексті'
  instruction: 'Оберіть правильну форму дієслова, щоб доповнити речення.'
  items:
    - sentence: 'Я _____ цю книгу вчора, але не дочитав до кінця.'
      answer: 'читав'
      options:
        - 'читав'
        - 'прочитав'
        - 'буду читати'
        - 'почитав'
      explanation: 'Акцент на процесі, результат не досягнуто -> Недоконаний вид.'
    - sentence: 'Ура! Я нарешті _____ цей екзамен!'
      answer: 'здав'
      options:
        - 'здав'
        - 'здавав'
        - 'здаю'
        - 'буду здавати'
      explanation: 'Слово «нарешті» та вигук «Ура!» вказують на успішний результат -> Доконаний вид.'
    - sentence: 'Ми _____ сніданок, коли задзвонив телефон.'
      answer: 'готували'
      options:
        - 'готували'
        - 'приготували'
        - 'зготували'
        - 'готуємо'
      explanation: 'Дія була в процесі (фоном), коли її перервала інша подія -> Недоконаний вид.'
    - sentence: 'Він _____ звіт за одну годину.'
      answer: 'написав'
      options:
        - 'написав'
        - 'писав'
        - 'пише'
        - 'буде писати'
      explanation: 'Маркер «за одну годину» вказує на час, витрачений на досягнення результату -> Доконаний вид.'
    - sentence: 'Вона _____ каву кожного ранку.'
      answer: 'пила'
      options:
        - 'пила'
        - 'випила'
        - 'попила'
        - 'випиває'
      explanation: 'Маркер «кожного ранку» вказує на звичку/повторення -> Недоконаний вид.'
    - sentence: 'Завтра я _____ тобі все, що знаю.'
      answer: 'розповім'
      options:
        - 'розповім'
        - 'буду розповісти'
        - 'розповідаю'
        - 'розповідав'
      explanation: 'Обіцянка результату в майбутньому. Форма «буду розповісти» граматично неправильна.'
    - sentence: 'Хто _____ цю чудову картину?'
      answer: 'намалював'
      options:
        - 'намалював'
        - 'малював'
        - 'малює'
        - 'буде малювати'
      explanation: 'Питання про автора готового результату (картини) -> Доконаний вид.'
    - sentence: 'Я _____ тебе, як тільки побачив.'
      answer: 'впізнав'
      options:
        - 'впізнав'
        - 'впізнавав'
        - 'пізнавав'
        - 'знаю'
      explanation: 'Миттєва дія (result/event) в минулому -> Доконаний вид.'
    - sentence: 'Майстер _____ мій годинник цілий тиждень.'
      answer: 'лагодив'
      options:
        - 'лагодив'
        - 'полагодив'
        - 'буде полагодити'
        - 'полагодить'
      explanation: 'Маркер «цілий тиждень» вказує на тривалість процесу.'
    - sentence: 'Я обов’язково _____ це завдання до вечора.'
      answer: 'виконаю'
      options:
        - 'виконаю'
        - 'буду виконувати'
        - 'виконую'
        - 'виконував'
      explanation: 'Обіцянка результату до конкретного моменту.'
    - sentence: 'Колись я _____ у цьому будинку.'
      answer: 'жив'
      options:
        - 'жив'
        - 'пожив'
        - 'зажив'
        - 'прожив'
      explanation: 'Опис тривалого стану в минулому.'
    - sentence: 'Ти вже _____ вірш напам’ять?'
      answer: 'вивчив'
      options:
        - 'вивчив'
        - 'вчиш'
        - 'вчишся'
        - 'вивчишся'
      explanation: 'Питання про наявність результату (знання напам’ять).'

- type: true-false
  title: 'Процес чи результат?'
  instruction: 'Визначте, чи є твердження про вид дієслова правильним.'
  items:
    - statement: 'Дієслова доконаного виду відповідають на питання «що зробити?».'
      correct: true
      explanation: 'Питання з префіксом «з-» завжди вказує на доконаний вид (результат).'
    - statement: 'Недоконаний вид використовується для опису звичок.'
      correct: true
      explanation: 'Повторювані дії — це функція недоконаного виду.'
    - statement: 'Дієслово «писати» є доконаним видом.'
      correct: false
      explanation: '«Писати» — це процес (що робити?), тому це недоконаний вид.'
    - statement: 'Доконаний вид може вживатися в теперішньому часі.'
      correct: false
      explanation: 'У теперішньому часі буває тільки недоконаний вид, бо це процес зараз.'
    - statement: 'Маркери «раптом» і «нарешті» зазвичай вживаються з доконаним видом.'
      correct: true
      explanation: 'Ці слова вказують на зміну стану або завершення дії.'
    - statement: 'Фраза «я буду прочитати» є граматично правильною.'
      correct: false
      explanation: 'Допоміжне дієслово «буду» вживається тільки з недоконаним видом (буду читати).'
    - statement: 'Недоконаний вид підходить для опису фону в розповіді.'
      correct: true
      explanation: 'Фонові дії відбуваються тривало (світило сонце, дув вітер).'
    - statement: 'Дієслово «вивчити» вказує на результат.'
      correct: true
      explanation: 'Це доконаний вид, що означає успішне завершення навчання.'
    - statement: 'Префікс «по-» часто вказує на початок дії.'
      correct: true
      explanation: 'Наприклад: бігти -> побігти (стартувати).'
    - statement: 'Суфікс «-ну-» вказує на тривалий процес.'
      correct: false
      explanation: 'Суфікс «-ну-» позначає миттєву, одноразову дію (стукнути).'
    - statement: 'Дієслово «брати» — це доконаний вид.'
      correct: false
      explanation: '«Брати» — це процес, «взяти» — це результат.'
    - statement: 'Доконаний вид допомагає розповідати про ланцюжок послідовних подій.'
      correct: true
      explanation: 'Дії відбуваються одна за одною (прийшов, побачив, з’їв).'
    - statement: 'Для вираження результату в майбутньому потрібна форма «буду».'
      correct: false
      explanation: 'Результат у майбутньому виражається простою формою доконаного виду (зроблю).'
    - statement: 'Недоконаний вид може описувати дію, що була перервана іншою подією.'
      correct: true
      explanation: 'Наприклад: «Я читав (процес), коли хтось зайшов».'
    - statement: 'Слово «здавати» гарантує успішний результат іспиту.'
      correct: false
      explanation: '«Здавати» — це процес спроби, успіх гарантує форма «здати».'

- type: error-correction
  title: 'Знайди та виправ помилку'
  instruction: 'Знайдіть помилку у вживанні виду дієслова та виправте її.'
  items:
    - sentence: 'Я буду прочитати цю книгу завтра.'
      error: 'буду прочитати'
      answer: 'прочитаю'
      options:
        - 'прочитаю'
        - 'читатиму'
        - 'буду читати'
        - 'прочитав'
      explanation: 'Не можна поєднувати «буду» з доконаним видом. Для результату в майбутньому використовуйте просту форму ДВ.'
    - sentence: 'Він часто запізнився на роботу.'
      error: 'запізнився'
      answer: 'запізнювався'
      options:
        - 'запізнювався'
        - 'спізнюється'
        - 'запізниться'
        - 'запізнюється'
      explanation: 'Слово «часто» вказує на повторювану дію, тому потрібен недоконаний вид.'
    - sentence: "Вона щодня приготувала обід для сім'ї."
      error: 'приготувала'
      answer: 'готувала'
      options:
        - 'готувала'
        - 'зготувала'
        - 'приготує'
        - 'готує'
      explanation: 'Маркер «щодня» вказує на регулярну дію (звичку) -> Недоконаний вид.'
    - sentence: 'Ми збудували цей дім ціле літо.'
      error: 'збудували'
      answer: 'будували'
      options:
        - 'будували'
        - 'побудували'
        - 'будуємо'
        - 'збудуємо'
      explanation: 'Маркер «ціле літо» підкреслює тривалість процесу -> Недоконаний вид.'
    - sentence: 'Я здавав екзамен і отримав п’ятірку.'
      error: 'здавав'
      answer: 'здав'
      options:
        - 'здав'
        - 'здаватиму'
        - 'поздавав'
        - 'здаю'
      explanation: 'Якщо є результат («отримав п’ятірку»), значить дія завершена успішно -> Доконаний вид.'
    - sentence: 'Коли я прийшов, вона зготувала вечерю.'
      error: 'зготувала'
      answer: 'готувала'
      options:
        - 'готувала'
        - 'приготувала'
        - 'готує'
        - 'зготувати'
      explanation: 'Контекст «коли я прийшов» передбачає, що ми застали процес приготування, а не вже готовий результат.'

- type: mark-the-words
  title: 'Полювання на доконаний вид'
  instruction: 'Знайдіть і позначте всі дієслова ДОКОНАНОГО виду (результат, подія).'
  text: 'Вчора Іван прокинувся рано. Він швидко поснідав і вийшов з дому. На вулиці світило сонце, пташки співали. Люди йшли на роботу. Раптом Іван згадав, що забув телефон на столі. Він повернувся додому, взяв телефон і побіг на зупинку.'
  answers:
    - 'прокинувся'
    - 'поснідав'
    - 'вийшов'
    - 'згадав'
    - 'забув'
    - 'повернувся'
    - 'взяв'
    - 'побіг'
