- type: quiz
  title: "Теорія: розуміння видової системи"
  instruction: "Оберіть правильну відповідь на кожне запитання."
  items:
    - question: "Яка метафора найкраще описує функцію недоконаного виду?"
      explanation: "Недоконаний вид працює як відеокамера (Video mode), фіксуючи процес та тривалість дії."
      options:
        - text: "Video mode"
          correct: true
        - text: "Photo mode"
          correct: false
        - text: "Audio mode"
          correct: false
        - text: "Text mode"
          correct: false
    - question: "Яку форму має дієслово доконаного виду в майбутньому часі?"
      explanation: "Доконаний вид утворює майбутній час за допомогою простої форми (наприклад, 'напишу') без допоміжного дієслова."
      options:
        - text: "Складену з дієсловом бути"
          correct: false
        - text: "Просту синтетичну форму"
          correct: true
        - text: "Складену з дієсловом мати"
          correct: false
        - text: "Аналітичну форму"
          correct: false
    - question: "Які слова-маркери зазвичай вказують на необхідність недоконаного виду?"
      explanation: "Слова 'завжди' та 'часто' вказують на регулярність та повторення дії, що є ознакою недоконаного виду."
      options:
        - text: "Раптом, несподівано"
          correct: false
        - text: "За п'ять хвилин"
          correct: false
        - text: "Завжди, часто"
          correct: true
        - text: "Нарешті"
          correct: false
    - question: "Що означає загальнофактичне значення недоконаного виду?"
      explanation: "Це використання недоконаного виду для констатації наявності досвіду в минулому без акценту на результаті."
      options:
        - text: "Наявність досвіду в минулому"
          correct: true
        - text: "Очікування результату в майбутньому"
          correct: false
        - text: "Фокус на повному завершенні дії"
          correct: false
        - text: "Миттєва зміна фізичного стану"
          correct: false
    - question: "Як найприродніше сказати про дію, у якій ви взагалі не брали участі?"
      explanation: "Для повного заперечення участі у процесі (коли дія навіть не починалася) зазвичай використовується недоконаний вид: 'Я не читав'."
      options:
        - text: "Я не читав"
          correct: true
        - text: "Я не прочитав"
          correct: false
        - text: "Я не буду прочитати"
          correct: false
        - text: "Я не маю прочитати"
          correct: false
    - question: "Яку функцію виконує семельфактивне дієслово, наприклад, слово 'стукнути'?"
      explanation: "Семельфактивні дієслова описують один миттєвий спалах або одноразову дію серед іншого процесу."
      options:
        - text: "Довгий, безперервний процес"
          correct: false
        - text: "Миттєва одноразова дія"
          correct: true
        - text: "Початок сильної емоції"
          correct: false
        - text: "Регулярна щоденна звичка"
          correct: false
    - question: "Що означає префікс 'по-' у дієсловах стану або руху (наприклад, 'полюбити', 'побігти')?"
      explanation: "В інгресивному виді префікс 'по-' означає початок нової дії, стану або руху."
      options:
        - text: "Завершення довгого процесу"
          correct: false
        - text: "Початок дії або емоції"
          correct: true
        - text: "Повторення досягнутого результату"
          correct: false
        - text: "Повна відсутність будь-якої дії"
          correct: false
    - question: "Чому фраза 'Я буду прочитати' є грубою граматичною помилкою?"
      explanation: "Допоміжне дієслово 'бути' працює винятково з дієсловами недоконаного виду."
      options:
        - text: "Слово 'прочитати' не має майбутнього часу"
          correct: false
        - text: "Дієслово 'бути' поєднується лише з недоконаним видом"
          correct: true
        - text: "Потрібно завжди використовувати слово 'маю'"
          correct: false
        - text: "Це насправді правильна фраза"
          correct: false
    - question: "Який вид дієслова ми найчастіше використовуємо для опису фону в розповіді?"
      explanation: "Недоконаний вид описує атмосферу та паралельні дії, створюючи декорації для основних подій."
      options:
        - text: "Доконаний вид"
          correct: false
        - text: "Недоконаний вид"
          correct: true
        - text: "Інгресивний вид"
          correct: false
        - text: "Семельфактивний вид"
          correct: false
    - question: "Як зазвичай перекладається англійська структура 'Have you ever read' українською?"
      explanation: "Для запитання про загальний життєвий досвід українська мова використовує недоконаний вид: 'Ти коли-небудь читав?'."
      options:
        - text: "Ти прочитав?"
          correct: false
        - text: "Ти будеш читати?"
          correct: false
        - text: "Ти читав?"
          correct: true
        - text: "Ти читаєш?"
          correct: false
    - question: "У розповіді дієслова якого виду створюють фонову атмосферу, а якого — рухають сюжет уперед?"
      explanation: "Недоконаний вид створює фон (декорації, атмосферу), а доконаний вид рухає сюжет, вказуючи на ключові події."
      options:
        - text: "НДВ — фон, ДВ — сюжет"
          correct: true
        - text: "ДВ — фон, НДВ — сюжет"
          correct: false
        - text: "Обидва створюють лише фон"
          correct: false
        - text: "Обидва рухають лише сюжет"
          correct: false
    - question: "Чому на запитання 'Ти прочитав книгу?' природніше заперечити недоконаним видом 'Ні, ще не читав'?"
      explanation: "Недоконаний вид у запереченні показує, що дія навіть не розпочиналася, повністю відкидаючи факт процесу."
      options:
        - text: "Щоб підкреслити, що дія навіть не починалася"
          correct: true
        - text: "Тому що заперечення завжди вимагає НДВ"
          correct: false
        - text: "Це граматична помилка, потрібно 'не прочитав'"
          correct: false
        - text: "Так звучить більш формально"
          correct: false

