    - statement: "Семельфактивні дієслова (наприклад, 'стукнути') позначають довгий і безперервний процес."
      correct: false
      explanation: "Семельфактивні дієслова означають одноразову, миттєву дію."
    - statement: "Інгресивний вид з префіксом 'по-' часто означає початок стану або руху."
      correct: true
      explanation: "Наприклад, 'побігти' або 'полюбити' означають початок дії чи емоції."
    - statement: "Щоб запитати про загальний життєвий досвід ('Have you ever...'), українці використовують недоконаний вид."
      correct: true
      explanation: "Загальнофактичне значення (Ти коли-небудь читав Кобзар?) вимагає недоконаного виду."
    - statement: "Фраза 'Я буду прочитати' є абсолютно граматично правильною."
