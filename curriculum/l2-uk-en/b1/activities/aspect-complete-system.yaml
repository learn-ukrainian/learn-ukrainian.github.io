      correct: true
      explanation: "Недоконаний вид створює декорації ('світило сонце, співали пташки'), на тлі яких відбуваються події."
    - statement: "Якщо ви безуспішно намагалися щось зробити, ви повинні використовувати доконаний вид."
      correct: false
      explanation: "Спроба без результату ('я здавав іспит, але не здав') вимагає недоконаного виду."
    - statement: "На запитання з доконаним видом ('Ти прочитав?') завжди потрібно відповідати доконаним видом ('Ні, не прочитав')."
