- type: fill-in
  title: "Оберіть правильний вид у минулому часі"
  instruction: "Прочитайте речення та оберіть дієслово, яке найкраще підходить за контекстом."
  items:
    - sentence: "Вчора я цілий вечір _____ цікаву статтю."
      answer: "читав"
      options:
        - "читав"
        - "прочитав"
        - "почитав"
        - "дочитав"
    - sentence: "Нарешті він _____ цей складний проєкт."
      answer: "завершив"
      options:
        - "завершив"
        - "завершував"
        - "завершує"
        - "завершуватиме"
    - sentence: "Ми _____ на автобус майже годину."
      answer: "чекали"
      options:
        - "чекали"
        - "почекали"
        - "зачекали"
        - "дочекалися"
    - sentence: "Вона _____ книгу і віддала її мені."
      answer: "прочитала"
      options:
        - "прочитала"
        - "читала"
        - "дочитувала"
        - "перечитувала"
    - sentence: "Кожного літа вони _____ в Карпати."
      answer: "їздили"
      options:
        - "їздили"
        - "поїхали"
        - "заїхали"
        - "доїхали"
    - sentence: "Раптом двері _____ і зайшов викладач."
      answer: "відчинилися"
      options:
        - "відчинилися"
        - "відчинялися"
        - "відчиняться"
        - "відчинятимуться"
    - sentence: "Ти коли-небудь _____ справжній український борщ?"
      answer: "готував"
      options:
        - "готував"
        - "приготував"
        - "зготував"
        - "наготував"
    - sentence: "Хто _____ це вікно? Тут дуже холодно!"
      answer: "відкрив"
      options:
        - "відкрив"
        - "відкривав"
        - "привідкривав"
        - "привідкрив"
    - sentence: "Я довго _____ йому правило, але він так і не зрозумів."
      answer: "пояснював"
      options:
        - "пояснював"
        - "пояснив"
        - "розтлумачив"
        - "допояснював"
    - sentence: "Він успішно _____ іспит з математики і отримав найвищий бал."
      answer: "здав"
      options:
        - "здав"
        - "здавав"
        - "поздавав"
        - "перездавав"
    - sentence: "Вчора ввечері ми _____ у настільну гру і дуже весело проводили час."
      answer: "грали"
      options:
        - "грали"
        - "зіграли"
        - "пограли"
        - "програли"
    - sentence: "Мама _____ смачний пиріг і поставила його на стіл."
      answer: "спекла"
      options:
        - "спекла"
        - "пекла"
        - "допекла"
        - "перепекла"

- type: error-correction
  title: "Виправте типові помилки з майбутнім часом"
  instruction: "У кожному реченні є помилка у використанні майбутнього часу. Знайдіть її та оберіть правильний варіант."
  items:
    - sentence: "Завтра я буду написати довгий лист своєму найкращому другові."
      error: "буду написати"
      answer: "напишу"
      options:
        - "напишу"
        - "буду написав"
        - "буду писав"
        - "маю написати"
      explanation: "Для результату в майбутньому використовується проста форма доконаного виду: 'напишу'. Дієслово 'бути' не додається."
    - sentence: "Ми будемо зробити це складне завдання разом."
      error: "будемо зробити"
      answer: "зробимо"
      options:
        - "зробимо"
        - "будемо робили"
        - "будемо робив"
        - "маємо зробити"
      explanation: "Дієслово 'бути' працює тільки з недоконаним видом. 'Зробити' - доконаний вид, тому форма буде 'зробимо'."
    - sentence: "Вона буде прочитати цю книгу до кінця наступного тижня."
      error: "буде прочитати"
      answer: "прочитає"
      options:
        - "прочитає"
        - "буде читала"
        - "буде прочитала"
        - "має прочитати"
      explanation: "'Прочитати' - це доконаний вид, він має просту форму майбутнього часу: 'прочитає'."
    - sentence: "Ти будеш здати цей важливий іспит завтра зранку?"
      error: "будеш здати"
      answer: "здаси"
      options:
        - "здаси"
        - "будеш здав"
        - "здаватимеш"
        - "маєш здати"
      explanation: "Доконаний вид 'здати' утворює просту форму майбутнього часу без дієслова 'бути': 'здаси'."
    - sentence: "Я буду пояснити тобі це нове граматичне правило ще раз."
      error: "буду пояснити"
      answer: "поясню"
      options:
        - "поясню"
        - "буду пояснював"
        - "буду пояснив"
        - "маю пояснити"
      explanation: "'Пояснити' - доконаний вид, правильна форма: 'поясню'."
    - sentence: "Вони будуть вирішити цю велику проблему на завтрашніх зборах."
      error: "будуть вирішити"
      answer: "вирішать"
      options:
        - "вирішать"
        - "будуть вирішували"
        - "будуть вирішив"
        - "мають вирішити"
      explanation: "Доконаний вид 'вирішити' утворює майбутній час без слова 'бути': 'вирішать'."
    - sentence: "Ми будемо побудувати новий великий будинок наступного року."
      error: "будемо побудувати"
      answer: "побудуємо"
      options:
        - "побудуємо"
        - "будемо будували"
        - "будемо побудував"
        - "маємо побудувати"
      explanation: "Доконаний вид не потребує дієслова 'бути' у майбутньому часі: 'побудуємо'."
    - sentence: "Він впевнений, що буде знайти нову роботу дуже швидко."
      error: "буде знайти"
      answer: "знайде"
      options:
        - "знайде"
        - "буде шукав"
        - "буде знайшов"
        - "має знайти"
      explanation: "'Знайти' - доконаний вид, тому використовуємо форму 'знайде'."

- type: unjumble
  title: "Побудуйте речення правильно"
  instruction: "Складіть слова у правильному порядку, щоб утворити граматично коректне речення."
  items:
    - words: ["Я", "обов'язково", "буду", "працювати", "над", "цим", "складним", "проєктом", "цілий", "наступний", "місяць"]
      answer: "Я обов'язково буду працювати над цим складним проєктом цілий наступний місяць"
    - words: ["Він", "обов'язково", "напише", "цей", "важливий", "лист", "завтра", "зранку", "і", "одразу", "відправить", "його"]
      answer: "Він обов'язково напише цей важливий лист завтра зранку і одразу відправить його"
    - words: ["Кожного", "ранку", "я", "п'ю", "міцну", "чорну", "каву", "перед", "тим", "як", "іти", "на", "роботу"]
      answer: "Кожного ранку я п'ю міцну чорну каву перед тим як іти на роботу"
    - words: ["Вчора", "ми", "дуже", "успішно", "здали", "цей", "надзвичайно", "складний", "іспит", "з", "історії", "України"]
      answer: "Вчора ми дуже успішно здали цей надзвичайно складний іспит з історії України"
    - words: ["Вона", "дуже", "довго", "і", "уважно", "читала", "цю", "цікаву", "історичну", "книгу", "минулого", "вечора"]
      answer: "Вона дуже довго і уважно читала цю цікаву історичну книгу минулого вечора"
    - words: ["Раптом", "хтось", "дуже", "голосно", "і", "несподівано", "стукнув", "у", "великі", "дерев'яні", "двері", "нашого", "будинку"]
      answer: "Раптом хтось дуже голосно і несподівано стукнув у великі дерев'яні двері нашого будинку"
    - words: ["Ти", "коли-небудь", "дивився", "цей", "дуже", "відомий", "документальний", "фільм", "про", "історію", "нашої", "країни"]
      answer: "Ти коли-небудь дивився цей дуже відомий документальний фільм про історію нашої країни"
    - words: ["Тепле", "весняне", "сонце", "яскраво", "світило", "цілий", "день", "і", "зігрівало", "всіх", "людей", "на", "вулиці"]
      answer: "Тепле весняне сонце яскраво світило цілий день і зігрівало всіх людей на вулиці"

