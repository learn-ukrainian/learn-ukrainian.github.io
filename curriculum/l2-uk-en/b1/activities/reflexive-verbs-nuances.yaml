version: '1.0'
module: reflexive-verbs-nuances
level: b1
inline:
- id: quiz-focus-on-identifying-verbs-that-only-exist-in-reflexive-form
  type: quiz
  instruction: Оберіть дієслово, яке існує ТІЛЬКИ у зворотній формі (без -ся/-сь воно
    не вживається).
  items:
  - question: Яке слово не має пари без суфікса?
    options:
    - вмиватися
    - одягатися
    - боятися
    - зустрічатися
    correct: 2
  - question: Яке з цих слів існує тільки у зворотній формі?
    options:
    - сподіватися
    - митися
    - бачитися
    - обніматися
    correct: 0
  - question: 'Оберіть дієслово без активної пари:'
    options:
    - голитися
    - зачісуватися
    - цілуватися
    - пишатися
    correct: 3
  - question: Яке слово не може жити без суфікса -ся?
    options:
    - збиратися
    - сміятися
    - дивуватися
    - повертатися
    correct: 1
  - question: 'Знайдіть дієслово, що завжди має зворотну форму:'
    options:
    - милуватися
    - ховатися
    - сумніватися
    - прощатися
    correct: 2
  - question: Яке слово вживається лише з -ся/-сь?
    options:
    - сердитися
    - намагатися
    - хвилюватися
    - роздягатися
    correct: 1
  - question: 'Оберіть дієслово без незворотної пари:'
    options:
    - змінюватися
    - зупинятися
    - знайомитися
    - лінуватися
    correct: 3
  - question: Яке слово існує ТІЛЬКИ у зворотній формі?
    options:
    - вмиватися
    - усміхатися
    - готуватися
    - знайомитися
    correct: 1
- id: group-sort-focus-on-sorting-verbs-into-the-5-semantic-categories
  type: group-sort
  instruction: Розподіліть дієслова за п'ятьма семантичними категоріями.
  groups:
  - label: Власне зворотні (дія на себе)
    items:
    - митися
    - одягатися
    - зачісуватися
  - label: Взаємні (дія між людьми)
    items:
    - зустрічатися
    - листуватися
    - обніматися
  - label: Стану та емоцій
    items:
    - хвилюватися
    - сердитися
    - дивуватися
  - label: Безособові (без підмета)
    items:
    - не спиться
    - хочеться
    - здається
  - label: Пасивноподібні
    items:
    - будується
    - читається
    - зачиняються
- id: fill-in-euphony-reflexive
  type: fill-in
  instruction: Оберіть правильний суфікс (-ся чи -сь) за правилом милозвучності.
  items:
  - sentence: Вона щиро _____ Олені.
    answer: усміхнулась
    options:
    - усміхнулася
    - усміхнулась
  - sentence: Вона привітно _____ другові.
    answer: усміхнулася
    options:
    - усміхнулася
    - усміхнулась
  - sentence: Я маю швидко _____ вчасно.
    answer: повернутися
    options:
    - повернутися
    - повернутись
  - sentence: Я маю обов'язково _____ о шостій.
    answer: повернутись
    options:
    - повернутися
    - повернутись
  - sentence: Вони випадково _____ ввечері.
    answer: зустрілися
    options:
    - зустрілися
    - зустрілись
  - sentence: Вони вперше _____ аж уранці.
    answer: зустрілись
    options:
    - зустрілися
    - зустрілись
  - sentence: Ми нарешті _____ про зустріч.
    answer: домовилися
    options:
    - домовилися
    - домовились
  - sentence: Ми швидко _____ і пішли гуляти.
    answer: домовились
    options:
    - домовилися
    - домовились
- id: match-up-reflexive-shift
  type: match-up
  instruction: З'єднайте дієслово з його правильним значенням, звертаючи увагу на
    вплив суфікса.
  pairs:
  - left: вчити
    right: передавати знання комусь (to teach someone)
  - left: вчитися
    right: бути студентом або здобувати знання (to study generally)
  - left: збирати
    right: колекціонувати якісь предмети (to collect)
  - left: збиратися
    right: мати намір або готуватися до поїздки (to intend / get ready)
  - left: повертати
    right: змінювати напрямок руху автомобіля (to turn something)
  - left: повертатися
    right: йти або їхати назад додому (to return)
  - left: мити
    right: робити чистим брудний посуд або вікно (to wash objects)
  - left: митися
    right: приймати душ, очищати себе (to wash oneself)
  - left: одягати
    right: допомагати маленькій дитині вдягнути куртку (to dress someone)
  - left: одягатися
    right: самостійно вдягати одяг на себе (to dress oneself)
workbook:
- type: fill-in
  instruction: 'Відмінюй дієслово: вставте правильну форму зворотного дієслова.'
  items:
  - sentence: Я щодня _____ о сьомій годині ранку.
    answer: вмиваюся
    options:
    - вмивається
    - вмиваюся
  - sentence: Ти часто _____ над його веселими жартами?
    answer: смієшся
    options:
    - смієтеся
    - смієшся
  - sentence: Мій молодший брат довго _____ перед школою.
    answer: одягається
    options:
    - одягаємося
    - одягається
  - sentence: Ми завжди _____ біля головного входу в університет.
    answer: зустрічаємося
    options:
    - зустрічаються
    - зустрічаємося
  - sentence: Ви дуже _____ перед цим важливим іспитом?
    answer: хвилюєтеся
    options:
    - хвилюється
    - хвилюєтеся
  - sentence: Нові студенти зараз активно _____ в аудиторії.
    answer: знайомляться
    options:
    - знайомиться
    - знайомляться
- type: match-up
  instruction: З'єднайте речення з відповідною семантичною групою дієслів.
  pairs:
  - left: Він дуже довго миється у ванній кімнаті.
    right: Власне зворотне (фізична дія на себе)
  - left: Ми радісно обнімаємося при кожній зустрічі.
    right: Взаємне (дія рівноправна між людьми)
  - left: Студент завжди сердиться через ранковий затор.
    right: Стан (внутрішнє емоційне переживання)
  - left: Мені сьогодні зовсім не хочеться їсти.
    right: Безособове (стан незалежний від власної волі)
  - left: Ця цікава нова книга легко читається.
    right: Пасивноподібне (дія над неживим об'єктом)
  - left: Я обов'язково повернуся додому вчасно.
    right: Власне зворотне (фізичний рух свого тіла)
- type: translate
  instruction: Оберіть правильний переклад речень з англійської на українську.
  items:
  - source: I am getting ready for the lesson.
    options:
    - text: Я збираю речі на урок.
      correct: false
    - text: Я збираюся на урок.
      correct: true
  - source: Why are you laughing?
    options:
    - text: Чому ти смієшся?
      correct: true
    - text: Чому ти смієш?
      correct: false
  - source: They correspond with each other.
    options:
    - text: Вони листують один одного.
      correct: false
    - text: Вони листуються.
      correct: true
  - source: I can't sleep.
    options:
    - text: Я не сплю.
      correct: false
    - text: Мені не спиться.
      correct: true
  - source: Excuse me for the delay.
    options:
    - text: Вибачаюся за запізнення.
      correct: false
    - text: Вибачте за запізнення.
      correct: true
  - source: She is afraid of dogs.
    options:
    - text: Вона боїться собак.
      correct: true
    - text: Вона боїть собак.
      correct: false
