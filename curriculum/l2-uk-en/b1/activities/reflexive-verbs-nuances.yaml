- type: translate
  instruction: Оберіть правильний український переклад для англійських фраз
  items:
  - source: I am getting ready for the lesson.
    options:
    - text: Я збираюся на урок.
      correct: true
    - text: Я збираю на урок.
      correct: false
    - text: Я збираюсь на урок.
      correct: true
    - text: Я збирається на урок.
      correct: false
  - source: He is proud of his country.
    options:
