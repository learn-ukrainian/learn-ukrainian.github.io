version: '1.0'
module: reflexive-verbs-nuances
level: b1
inline:
- id: match-up
  type: match-up
  instruction: Зіставте перехідні дієслова з їхніми зворотними парами, враховуючи
    зміну значення
  pairs:
  - left: вчити (to teach)
    right: вчитися (to study)
  - left: мити (to wash something)
    right: митися (to wash oneself)
  - left: вмивати (to wash someone's face)
    right: вмиватися (to wash one's face)
  - left: взувати (to put shoes on someone)
    right: взуватися (to put shoes on oneself)
  - left: бачити (to see something)
    right: бачитися (to see each other)
  - left: голити (to shave someone)
    right: голитися (to shave oneself)
  - left: одягати (to dress someone)
    right: одягатися (to dress oneself)
  - left: збирати (to gather items)
    right: збиратися (to get ready)
  - left: хвилювати (to worry someone)
    right: хвилюватися (to be worried)
  - left: сердити (to make someone angry)
    right: сердитися (to be angry)
- id: group-sort
  type: group-sort
  instruction: Розподіліть зворотні дієслова за їхніми семантичними групами
  groups:
  - label: Власне зворотні (action on self)
    items:
    - митися
    - одягатися
    - зачісуватися
    - голитися
  - label: Взаємні (reciprocal action)
    items:
    - зустрічатися
    - листуватися
    - знайомитися
    - вітатися
  - label: Стану та емоцій (internal state)
    items:
    - хвилюватися
    - сердитися
    - боятися
    - дивуватися
  - label: Безособові (no subject)
    items:
    - не спиться
    - здається
    - хочеться
  - label: Пасивноподібні (passive-like)
    items:
    - книга читається
    - дім будується
    - двері зачиняються
- id: fill-in
  type: fill-in
  instruction: Оберіть правильний варіант суфікса (-ся чи -сь), враховуючи правила
    милозвучності
  items:
  - sentence: Я щоранку вмиваю___ холодною водою.
    answer: сь
    options:
    - ся
    - сь
  - sentence: Ти швидко одягає___ на роботу.
    answer: ся
    options:
    - ся
    - сь
  - sentence: Він завжди довго збирає___ з думками.
    answer: ся
    options:
    - ся
    - сь
  - sentence: Ми домовилися зустріти___ о шостій годині.
    answer: сь
    options:
    - ся
    - сь
  - sentence: Вам потрібно повернути___ вчасно.
    answer: ся
    options:
    - ся
    - сь
  - sentence: Мені подобає___ милувати___ озером.
    answer: сь
    options:
    - ся
    - сь
  - sentence: Студенти пишають___ своїм університетом.
    answer: ся
    options:
    - ся
    - сь
  - sentence: Я сподіваю___, що ми скоро побачимо___.
    answer: сь
    options:
    - ся
    - сь
- id: quiz
  type: quiz
  instruction: Визначте, чи є дієслово «reflexiva tantum» (вживається тільки з -ся)
    або воно має незворотну пару
  items:
  - question: Дієслово «сміятися»...
    options:
    - Має перехідну пару
    - Вживається тільки як зворотне
    - Це безособова форма
    - Це пасивна форма
    correct: 1
  - question: Дієслово «вчитися»...
    options:
    - Вживається тільки як зворотне
    - Має перехідну пару (вчити)
    - Це безособова форма
    - Не має суфікса -ся
    correct: 1
  - question: Дієслово «боятися»...
    options:
    - Має перехідну пару
    - Вживається тільки як зворотне
    - Це взаємне дієслово
    - Це пасивна форма
    correct: 1
  - question: Дієслово «митися»...
    options:
    - Вживається тільки як зворотне
    - Має перехідну пару (мити)
    - Це безособова форма
    - Це пасивна форма
    correct: 1
  - question: Дієслово «сподіватися»...
    options:
    - Має перехідну пару
    - Вживається тільки як зворотне
    - Це власне зворотне
    - Це взаємне дієслово
    correct: 1
  - question: Дієслово «пишатися»...
    options:
    - Має перехідну пару
    - Вживається тільки як зворотне
    - Це безособова форма
    - Це пасивна форма
    correct: 1
  - question: Дієслово «повертатися»...
    options:
    - Вживається тільки як зворотне
    - Має перехідну пару (повертати)
    - Це безособова форма
    - Це взаємне дієслово
    correct: 1
  - question: Дієслово «насолоджуватися»...
    options:
    - Має перехідну пару
    - Вживається тільки як зворотне
    - Це пасивна форма
    - Це взаємне дієслово
    correct: 1
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте типові помилки у вживанні зворотних дієслів
  items:
  - sentence: Я вибачаюся за своє вчорашнє запізнення.
    error: вибачаюся
    correction: вибачте / перепрошую
    error_type: word
    options:
    - вибачте
    - дякую
    - сміюся
    explanation: «Вибачаюся» буквально означає «вибачаю самого себе». Потрібно казати
      «вибачте» або «перепрошую».
  - sentence: Ми дуже дякуємося вам за цікаву екскурсію.
    error: дякуємося
    correction: дякуємо
    error_type: construction
    options:
    - дякуємо
    - дякуюся
    - дякувати
    explanation: Дієслово «дякувати» не є зворотним і не потребує суфікса -ся.
  - sentence: Мені зараз дуже потребується ваша допомога.
    error: потребується
    correction: потрібна / потребую
    error_type: construction
    options:
    - потрібна
    - потребує
    - потрібен
    explanation: Українською мовою правильно казати «мені потрібна допомога» або «я
      потребую допомоги».
  - sentence: Я смію з твого вчорашнього жарту.
    error: смію
    correction: сміюся
    error_type: word
    options:
    - сміюся
    - смію
    - сміятися
    explanation: Дієслово «сміятися» існує тільки у зворотній формі. «Сміти» означає
      «мати відвагу».
  - sentence: Ця цікава стаття читає дуже швидко.
    error: читає
    correction: читається
    error_type: construction
    options:
    - читається
    - читають
    - читати
    explanation: 'Тут потрібна пасивноподібна форма зворотного дієслова: «стаття читається».'
  - sentence: Хлопчик боїть залишатися вдома сам.
    error: боїть
    correction: боїться
    error_type: word
    options:
    - боїться
    - боїть
    - боятися
    explanation: Дієслово «боятися» не вживається без суфікса -ся.
workbook:
- type: true-false
  instruction: Визначте, чи правильні ці твердження про зворотні дієслова
  items:
  - statement: Суфікс -ся історично походить від займенника 'себе'.
    correct: true
    explanation: Так, це скорочена форма давнього зворотного займенника.
  - statement: Усі дієслова із суфіксом -ся обов'язково мають пару без цього суфікса.
    correct: false
    explanation: Ні, існують дієслова (reflexiva tantum), які вживаються тільки з
      -ся, наприклад 'боятися'.
  - statement: Зворотне дієслово завжди є неперехідним.
    correct: true
    explanation: Додавання -ся робить дієслово неперехідним, воно не може мати прямого
      додатка.
  - statement: Форма 'вибачаюся' є літературною нормою ввічливості.
    correct: false
    explanation: Це помилка. Правильно казати 'вибачте' або 'перепрошую'.
  - statement: Суфікс -ся завжди стоїть після закінчення дієслова.
    correct: true
    explanation: Так, це постфікс, що розташовується на самому кінці слова.
  - statement: Безособові зворотні дієслова вимагають підмета в називному відмінку.
    correct: false
    explanation: У безособових конструкціях немає підмета, а особа стоїть у давальному
      відмінку (мені не спиться).
- type: unjumble
  instruction: Складіть правильні речення зі слів
  items:
  - words:
    - Мені
    - сьогодні.
    - спиться
    - не
    correct_order:
    - Мені
    - не
    - спиться
    - сьогодні.
    hint: Impersonal construction with negation.
  - words:
    - театру.
    - Ми
    - біля
    - зустрічаємося
    correct_order:
    - Ми
    - зустрічаємося
    - біля
    - театру.
    hint: Reciprocal action.
  - words:
    - на
    - сердиться
    - Вона
    - брата.
    correct_order:
    - Вона
    - сердиться
    - на
    - брата.
    hint: Emotion/state verb.
  - words:
    - Я
    - успіх.
    - сподіваюся
    - на
    correct_order:
    - Я
    - сподіваюся
    - на
    - успіх.
    hint: Always reflexive verb.
  - words:
    - вчаться
    - дуже
    - старанно.
    - Студенти
    correct_order:
    - Студенти
    - вчаться
    - дуже
    - старанно.
    hint: Reflexive pair of 'вчити'.
  - words:
    - ввечері.
    - зачиняються
    - Двері
    - автоматично
    correct_order:
    - Двері
    - автоматично
    - зачиняються
    - ввечері.
    hint: Passive-like usage.
