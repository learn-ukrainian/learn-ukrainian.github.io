- type: fill-in
  title: "Оберіть правильний сполучник: коли чи що"
  instruction: "Прочитайте речення і виберіть найбільш доречне слово."
  items:
    - sentence: "Ми всі чудово знаємо, що цей проєкт потребує часу."
      answer: "що"
      options:
        - "що"
        - "коли"
        - "якщо"
        - "поки"
      explanation: "Дієслово 'знати' вимагає з'ясувального підрядного речення зі сполучником 'що'."
    - sentence: "Я зателефоную тобі, коли приїду додому."
      answer: "коли"
      options:
        - "що"
        - "коли"
        - "поки"
        - "який"
      explanation: "Тут вказується час майбутньої неминучої події."
    - sentence: "Він сказав, що не зможе прийти на зустріч."
      answer: "що"
      options:
        - "що"
        - "коли"
        - "який"
        - "те"
      explanation: "Дієслово мовлення 'сказати' констатує факт, тому потрібне 'що'."
    - sentence: "Це був той самий момент, коли все змінилося."
      answer: "коли"
      options:
        - "коли"
        - "що"
        - "все"
        - "який"
      explanation: "Слово 'момент' вказує на час, тому використовуємо часовий сполучник 'коли'."
    - sentence: "Найважливіше — це те, що ми працюємо разом."
      answer: "що"
      options:
        - "що"
        - "коли"
        - "поки"
        - "якщо"
      explanation: "Вказівна конструкція абстрактного факту 'те, що'."
    - sentence: "Я люблю гуляти парком, коли йде дощ."
      answer: "коли"
      options:
        - "коли"
        - "що"
        - "після"
        - "до"
      explanation: "Вказівка на час і паралельність дії у звичній ситуації."
    - sentence: "Ми бачимо, що ринок стабілізується."
      answer: "що"
      options:
        - "що"
        - "коли"
        - "як"
        - "який"
      explanation: "Дієслово сприйняття 'бачити' вводить факт через 'що'."
    - sentence: "Компанія випустила новий продукт, що змінить усе."
      answer: "що"
      options:
        - "що"
        - "коли"
        - "те"
        - "якщо"
      explanation: "У цьому реченні 'що' є відносним займенником і замінює слово 'продукт'."
    - sentence: "Я пам'ятаю той день, коли ми вперше зустрілися."
      answer: "коли"
      options:
        - "коли"
        - "що"
        - "який"
        - "те"
      explanation: "Слово 'день' вимагає часового сполучника 'коли'."
    - sentence: "Мені подобається все, що ти готуєш."
      answer: "що"
      options:
        - "що"
        - "коли"
        - "який"
        - "якщо"
      explanation: "Максимальне узагальнення вимагає конструкції 'все, що'."

- type: error-correction
  title: "Виправте помилки у часових підрядних реченнях"
  instruction: "Знайдіть неправильне сполучне слово та виберіть правильний варіант."
  items:
    - sentence: "Я почну працювати, якщо керівник підпише документ ввечері."
      error: "якщо"
      answer: "коли"
      error_type: "word"
      options:
        - "коли"
        - "поки"
        - "що"
        - "те"
      explanation: "Це неминуча подія в часі. Підписання точно відбудеться, тому потрібне 'коли'."
    - sentence: "Ми сиділи в кафе що йшов сильний дощ."
      error: "що"
      answer: "коли"
      error_type: "word"
      options:
        - "коли"
        - "якщо"
        - "те"
        - "все"
      explanation: "Дві дії відбуваються одночасно. Використовуємо часовий сполучник 'коли' або 'поки'."
    - sentence: "Наш проєкт буде успішним, коли ти нам допоможеш."
      error: "коли"
      answer: "якщо"
      error_type: "word"
      options:
        - "якщо"
        - "поки"
        - "що"
        - "те"
      explanation: "Це умова, а не гарантований час. Англійське when тут перекладається як 'якщо'."
    - sentence: "Після того коли концерт закінчився, ми пішли додому."
      error: "коли"
      answer: "як"
      error_type: "word"
      options:
        - "як"
        - "що"
        - "те"
        - "поки"
      explanation: "Правильна конструкція для вираження різночасовості: 'після того як'."
    - sentence: "Поки того як він прийшов, ми вже повечеряли."
      error: "Поки"
      answer: "До"
      error_type: "word"
      options:
        - "До"
        - "Після"
        - "Коли"
        - "Що"
      explanation: "Правильна конструкція передування: 'до того як'."
    - sentence: "Я зателефоную тобі, який приїду до Києва."
      error: "який"
      answer: "коли"
      error_type: "word"
      options:
        - "коли"
        - "що"
        - "поки"
        - "якщо"
      explanation: "Тут потрібен часовий сполучник 'коли', а не займенник 'який'."
    - sentence: "З того моменту, якщо ми зустрілися, багато змінилося."
      error: "якщо"
      answer: "коли"
      error_type: "word"
      options:
        - "коли"
        - "поки"
        - "що"
        - "те"
      explanation: "Правильний сталий вираз для відправної точки: 'з того часу/моменту, коли'."
    - sentence: "Ти можеш прийти в гості якщо завгодно."
      error: "якщо"
      answer: "коли"
      error_type: "word"
      options:
        - "коли"
        - "що"
        - "те"
        - "поки"
      explanation: "Правильний сталий вираз: 'коли завгодно' (whenever)."

- type: error-correction
  title: "Виправте стилістичні та граматичні помилки"
  instruction: "Оберіть правильний варіант замість помилкової конструкції."
  items:
    - sentence: "Факт того, що він запізнився, роздратував усіх."
      error: "Факт того, що"
      answer: "Те, що"
      error_type: "phrase"
      options:
        - "Те, що"
        - "Що"
        - "Коли"
        - "Все, що"
      explanation: "Уникайте канцелярської кальки 'факт того, що'. Використовуйте українську вказівну конструкцію 'те, що'."
    - sentence: "Це та сама стаття, який я читав учора."
      error: "який"
      answer: "що"
      error_type: "word"
      options:
        - "що"
        - "яка"
        - "те"
        - "коли"
      explanation: "Стаття — жіночого роду. Замість помилкового 'який' (чоловічий рід), можна використати універсальне 'що'."
    - sentence: "Я готовий підтримати все, який допоможе проєкту."
      error: "який"
      answer: "що"
      error_type: "word"
      options:
        - "що"
        - "коли"
        - "те"
        - "якщо"
      explanation: "Після узагальнюючого слова 'все' завжди використовується відносний займенник 'що' (все, що)."
    - sentence: "Дарма коли ми довго працювали, результат не ідеальний."
      error: "коли"
      answer: "що"
      error_type: "word"
      options:
        - "що"
        - "те"
        - "якщо"
        - "поки"
      explanation: "Правильна конструкція поступки — 'дарма що' (even though)."
    - sentence: "Це такий будинок, який подобається всім, які його бачать."
      error: "які його бачать"
      answer: "що його бачать"
      error_type: "phrase"
      options:
        - "що його бачать"
        - "коли його бачать"
        - "те його бачать"
        - "як його бачать"
      explanation: "Щоб уникнути тавтології (нагромадження 'який', 'які'), стилістично краще вжити 'що'."
    - sentence: "Він сказав те він зараз зайнятий."
      error: "те"
      answer: "що"
      error_type: "word"
      options:
        - "що"
        - "коли"
        - "якщо"
        - "який"
      explanation: "Після дієслів мовлення використовуємо з'ясувальний сполучник 'що'."

- type: translate
  title: "Перекладіть українською"
  instruction: "Оберіть правильний переклад речення."
  items:
    - source: "I remember the day when we met."
      options:
        - text: "Я пам'ятаю день, коли ми зустрілися."
          correct: true
        - text: "Я пам'ятаю день, що ми зустрілися."
          correct: false
        - text: "Я пам'ятаю день, якщо ми зустрілися."
          correct: false
        - text: "Я пам'ятаю день, те що ми зустрілися."
          correct: false
      explanation: "Тут 'коли' використовується як класичний часовий сполучник."
    - source: "They understand that this requires time."
      options:
        - text: "Вони розуміють, що це вимагає часу."
          correct: true
        - text: "Вони розуміють, коли це вимагає часу."
          correct: false
        - text: "Вони розуміють, те що це вимагає часу."
          correct: false
        - text: "Вони розуміють, який це вимагає часу."
          correct: false
      explanation: "Констатація факту після дієслова 'розуміти' вимагає сполучника 'що'."
    - source: "The worst thing is that we have no information."
      options:
        - text: "Найгірше те, що ми не маємо інформації."
          correct: true
        - text: "Найгірше що, ми не маємо інформації."
          correct: false
        - text: "Найгірше факт що, ми не маємо інформації."
          correct: false
        - text: "Найгірше коли, ми не маємо інформації."
          correct: false
      explanation: "Для вираження абстрактної ідеї використовується вказівна конструкція 'те, що'."
    - source: "I will do everything that helps the project."
      options:
        - text: "Я зроблю все, що допоможе проєкту."
          correct: true
        - text: "Я зроблю все, який допоможе проєкту."
          correct: false
        - text: "Я зроблю все, коли допоможе проєкту."
          correct: false
        - text: "Я зроблю все, те що допоможе проєкту."
          correct: false
      explanation: "Максимальне узагальнення завжди вимагає конструкції 'все, що'."
    - source: "Even though we were tired, we continued walking."
      options:
        - text: "Дарма що ми були втомлені, ми йшли далі."
          correct: true
        - text: "Факт що ми були втомлені, ми йшли далі."
          correct: false
        - text: "Поки що ми були втомлені, ми йшли далі."
          correct: false
        - text: "Тому що ми були втомлені, ми йшли далі."
          correct: false
      explanation: "'Дарма що' — це український відповідник допустової конструкції 'even though'."
    - source: "I will call you when I arrive."
      options:
        - text: "Я зателефоную тобі, коли приїду."
          correct: true
        - text: "Я зателефоную тобі, якщо приїду."
          correct: false
        - text: "Я зателефоную тобі, що приїду."
          correct: false
        - text: "Я зателефоную тобі, поки приїду."
          correct: false
      explanation: "Йдеться про гарантовану подію в часі, тому використовуємо 'коли'."
    - source: "We were working while it was raining."
      options:
        - text: "Ми працювали, поки йшов дощ."
          correct: true
        - text: "Ми працювали, до того як йшов дощ."
          correct: false
        - text: "Ми працювали, що йшов дощ."
          correct: false
        - text: "Ми працювали, якщо йшов дощ."
          correct: false
      explanation: "Сполучник 'поки' (while) підкреслює паралельність і тривалість обох подій."
    - source: "Before you sign, read the document."
      options:
        - text: "До того як ти підпишеш, прочитай документ."
          correct: true
        - text: "Після того як ти підпишеш, прочитай документ."
          correct: false
        - text: "Поки ти підпишеш, прочитай документ."
          correct: false
        - text: "Коли ти підпишеш, прочитай документ."
          correct: false
      explanation: "Конструкція 'до того як' чітко встановлює послідовність (передування) дій."

- type: quiz
  title: "Перевірка теоретичних знань"
  instruction: "Оберіть правильну відповідь на запитання щодо синтаксису."
  items:
    - question: "Яке слово використовується для констатації факту після дієслова 'знати'?"
      explanation: "Дієслова мислення та сприйняття вимагають з'ясувального сполучника 'що'."
      options:
        - text: "що"
          correct: true
        - text: "коли"
          correct: false
        - text: "який"
          correct: false
        - text: "якщо"
          correct: false
    - question: "Як уникнути фонетичного перевантаження речення словами 'такий', 'який', 'які'?"
      explanation: "Для збереження милозвучності (евфонії) займенник 'який' часто чергують із 'що'."
      options:
        - text: "Замінити частину з них на відносний займенник 'що'"
          correct: true
        - text: "Видалити ці слова з речення взагалі"
          correct: false
        - text: "Замінити 'який' на слово 'коли'"
          correct: false
        - text: "Поставити їх поруч"
          correct: false
    - question: "Яка конструкція є найкращою українською альтернативою канцелярському 'факт того, що'?"
      explanation: "Природна українська мова надає перевагу витонченій вказівній конструкції 'те, що'."
      options:
        - text: "те, що"
          correct: true
        - text: "через те, що"
          correct: false
        - text: "факт, який"
          correct: false
        - text: "коли"
          correct: false
    - question: "Що означає українська синтаксична конструкція 'дарма що'?"
      explanation: "Ця допустова конструкція означає, що певна перешкода чи обставина не завадила дії (despite the fact that)."
      options:
        - text: "Дія відбулася, незважаючи на перешкоду або обставину"
          correct: true
        - text: "Хтось даремно витратив свій час на роботу"
          correct: false
        - text: "Подія відбудеться тільки за певної гіпотетичної умови"
          correct: false
        - text: "Дія не мала жодного сенсу і результату"
          correct: false
    - question: "Яке слово найкраще підходить для вираження одночасності двох тривалих дій?"
      explanation: "Сполучники 'коли' та 'поки' у поєднанні з недоконаним видом передають одночасність процесів."
      options:
        - text: "поки"
          correct: true
        - text: "після того як"
          correct: false
        - text: "до того як"
          correct: false
        - text: "якщо"
          correct: false
    - question: "У якому випадку замість слова 'коли' необхідно використовувати слово 'якщо'?"
      explanation: "'Якщо' використовується, коли дія гіпотетична і не гарантована (умова)."
      options:
        - text: "Коли дія є неминучою подією в часі"
          correct: false
        - text: "Коли дія є лише гіпотетичною умовою, а не фактом"
          correct: true
        - text: "Коли дія вже завершилась у минулому"
          correct: false
        - text: "Коли дві події відбуваються паралельно"
          correct: false
    - question: "Яку вказівну конструкцію ми використовуємо для максимального узагальнення (everything that)?"
      explanation: "Конструкція 'все, що' охоплює всю сукупність без жодного винятку."
      options:
        - text: "все, що"
          correct: true
        - text: "те, що"
          correct: false
        - text: "все, коли"
          correct: false
        - text: "те, який"
          correct: false
    - question: "Чи змінюється відносний займенник 'що' за родами та числами (подібно до слова 'який')?"
      explanation: "Слово 'що' є незмінним, тому воно універсальне і ніколи не потребує узгодження за родом чи числом."
      options:
        - text: "Ні, слово 'що' завжди залишається незмінним"
          correct: true
        - text: "Так, воно має окрему форму жіночого роду"
          correct: false
        - text: "Так, воно змінюється виключно за числами"
          correct: false
        - text: "Так, воно повністю повторює форми 'який'"
          correct: false

- type: unjumble
  title: "Складіть складнопідрядні речення"
  instruction: "Зверніть увагу на пунктуацію під час складання речень."
  items:
    - words:
        - "Ми"
        - "розуміємо,"
        - "що"
        - "це"
        - "важливо."
      answer: "Ми розуміємо, що це важливо."
    - words:
        - "Я"
        - "зателефоную,"
        - "коли"
        - "приїду"
        - "додому."
      answer: "Я зателефоную, коли приїду додому."
    - words:
        - "Те,"
        - "що"
        - "ми"
        - "робимо,"
        - "має"
        - "сенс."
      answer: "Те, що ми робимо, має сенс."
    - words:
        - "Усе,"
        - "що"
        - "ти"
        - "бачиш,"
        - "нове."
      answer: "Усе, що ти бачиш, нове."
    - words:
        - "Вони"
        - "сміялися,"
        - "поки"
        - "йшов"
        - "фільм."
      answer: "Вони сміялися, поки йшов фільм."
    - words:
        - "Це"
        - "проблема,"
        - "що"
        - "потребує"
        - "часу."
      answer: "Це проблема, що потребує часу."
    - words:
        - "Ми"
        - "пішли,"
        - "після"
        - "того"
        - "як"
        - "повечеряли."
      answer: "Ми пішли, після того як повечеряли."
    - words:
        - "Дарма"
        - "що"
        - "дощ,"
        - "ми"
        - "йдемо"
        - "гуляти."
      answer: "Дарма що дощ, ми йдемо гуляти."

- type: match-up
  title: "Знайдіть правильне закінчення речення"
  instruction: "З'єднайте дві частини складнопідрядного речення."
  pairs:
    - left: "Ми обов'язково поговоримо про це,"
      right: "коли закінчиться нарада."
    - left: "Керівник одразу зрозумів,"
      right: "що цей план не спрацює."
    - left: "Найголовніше для нашої команди —"
      right: "те, що ми маємо спільну мету."
    - left: "Вони продовжили працювати над проєктом,"
      right: "дарма що фінансування скоротили."
    - left: "Ми були готові до зустрічі,"
      right: "ще до того як приїхали гості."
    - left: "Я готовий підтримати все,"
      right: "що сприятиме нашому розвитку."
    - left: "Це була та сама книга,"
      right: "що змінила мій погляд на світ."
    - left: "Ти можеш звертатися до мене,"
      right: "коли завгодно."

- type: true-false
  title: "Умова чи час?"
  instruction: "Визначте, чи є твердження правильним щодо значення речення."
  items:
    - statement: "Речення 'Я піду гуляти, коли закінчу роботу' означає, що закінчення роботи — це гарантована подія в майбутньому."
      correct: true
      explanation: "Слово 'коли' вказує на неминучий момент у часі, а не на гіпотетичну умову."
    - statement: "Речення 'Якщо ти прийдеш, ми подивимося фільм' означає, що прихід гостя є 100% гарантованим фактом."
      correct: false
      explanation: "Сполучник 'якщо' вказує на умову: дія може статися, а може й ні."
    - statement: "Конструкція 'дарма що' використовується для опису подій, які завадили головній дії і зупинили її."
      correct: false
      explanation: "'Дарма що' — це допустова конструкція. Вона означає, що обставина існувала, але дія все одно відбулася."
    - statement: "У реченні 'Я знаю, що ти правий' слово 'що' виконує роль сполучника для констатації факту."
      correct: true
      explanation: "Після дієслів мислення 'що' завжди є з'ясувальним сполучником."
    - statement: "У фразі 'люди, що зібралися на площі' слово 'що' можна замінити на слово 'які' без втрати змісту."
      correct: true
      explanation: "Тут 'що' — відносний займенник, і його можна чергувати з 'який' (які)."
    - statement: "В українській мові слово 'коли' можна використовувати замість 'якщо' для позначення гіпотетичних умов."
      correct: false
      explanation: "Це поширена помилка (калька з англійського when). В українській мові час і умова чітко розмежовані."
    - statement: "Конструкція 'те, що' використовується для фокусування уваги на абстрактній ідеї або проблемі."
      correct: true
      explanation: "Вказівне слово 'те' готує слухача до важливого абстрактного факту, який розкривається далі."
    - statement: "У реченні 'Поки я читав, вона готувала обід' описано дві події, які відбувалися одночасно."
      correct: true
      explanation: "Сполучник 'поки' у поєднанні з недоконаним видом дієслів вказує на паралельність дій."

- type: select
  title: "Оберіть усі правильні варіанти"
  instruction: "У кожному завданні може бути декілька правильних відповідей."
  items:
    - question: "Які слова чи фрази вказують на одночасність двох подій?"
      min_correct: 2
      options:
        - text: "поки"
          correct: true
        - text: "коли (з недоконаним видом)"
          correct: true
        - text: "після того як"
          correct: false
        - text: "якщо"
          correct: false
      explanation: "'Поки' і 'коли' (наприклад: коли я читав) показують паралельність дій."
    - question: "У яких реченнях 'коли' вказує на одночасність дій (можна замінити на 'поки')?"
      min_correct: 2
      options:
        - text: "Коли я читав, вона працювала."
          correct: true
        - text: "Ми розмовляли, коли йшов дощ."
          correct: true
        - text: "Коли він прийде, ми почнемо."
          correct: false
        - text: "Коли концерт закінчився, ми пішли."
          correct: false
      explanation: "Одночасність передається поєднанням 'коли' з недоконаним видом дієслів минулого або теперішнього часу."
    - question: "Які з цих дієслів зазвичай вимагають після себе з'ясувального сполучника 'що' (констатація факту)?"
      min_correct: 3
      options:
        - text: "знати"
          correct: true
        - text: "розуміти"
          correct: true
        - text: "бачити"
          correct: true
        - text: "йти"
          correct: false
        - text: "спати"
          correct: false
      explanation: "Дієслова мислення, мовлення та сприйняття вводять факти через 'що'."
    - question: "Які вирази допомагають структурувати розповідь у часі?"
      min_correct: 2
      options:
        - text: "з того часу, коли"
          correct: true
        - text: "на час, коли"
          correct: true
        - text: "дарма що"
          correct: false
        - text: "те, що"
          correct: false
      explanation: "Ці вирази встановлюють відправну точку або дедлайн у розповіді."
    - question: "Оберіть граматично правильні (природні) речення:"
      min_correct: 2
      options:
        - text: "Те, що ми перемогли, є важливим досягненням."
          correct: true
        - text: "Мене турбує те, що ти мовчиш."
          correct: true
        - text: "Факт того, що він прийшов, нас здивував."
          correct: false
        - text: "Все, який ти сказав, правда."
          correct: false
      explanation: "Конструкції 'те, що' є природними. 'Факт того, що' — це канцеляризм, а 'все, який' — граматична помилка."
    - question: "У яких реченнях 'що' виступає як відносний займенник (опис предмета, можна замінити на 'який')?"
      min_correct: 2
      options:
        - text: "Люди, що прийшли на концерт, були в захваті."
          correct: true
        - text: "Дорога, що веде до лісу, дуже вузька."
          correct: true
        - text: "Я бачу, що починається дощ."
          correct: false
        - text: "Він сказав, що скоро приїде."
          correct: false
      explanation: "У перших двох реченнях 'що' замінює предмети (люди, дорога) і виконує роль підмета."

- type: group-sort
  title: "Сполучник чи займенник?"
  instruction: "Розподіліть речення за синтаксичною роллю слова 'що'."
  groups:
    - name: "Сполучник (Констатація факту)"
      items:
        - "Вона думає, що це правильне рішення."
        - "Усі почули, що заграла музика."
        - "Я не знав, що ти вже повернувся."
        - "Ми помітили, що ціни змінилися."
    - name: "Займенник (Опис предмета)"
      items:
        - "Це будинок, що стоїть на розі вулиці."
        - "Студенти, що склали іспит, можуть відпочивати."
        - "Фільм, що ми подивилися, був неймовірним."
        - "Проєкт, що ми завершили, отримав нагороду."