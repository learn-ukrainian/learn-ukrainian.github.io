- type: fill-in
  title: "Заповніть пропуски: дієслова та інструменти"
  instruction: "Оберіть правильне слово для кожного речення."
  items:
    - sentence: "Мій брат чудово вміє грати на акустичній гітарі."
      answer: "гітарі"
      options: ["гітарі", "гітару", "гітара", "гітарою"]
      explanation: "Після грати на потрібен Місцевий відмінок."
    - sentence: "Кожного вікенду ми любимо грати в теніс."
      answer: "теніс"
      options: ["теніс", "тенісі", "тенісом", "тенісу"]
      explanation: "Після грати в для спорту потрібен Знахідний відмінок."
    - sentence: "Він дуже уважно слухає класичну музику."
      answer: "слухає"
      options: ["слухає", "чує", "грає", "співає"]
      explanation: "Слухати означає активний процес."
    - sentence: "У цій сучасній пісні звучить традиційна сопілка."
      answer: "сопілка"
      options: ["сопілка", "сопілку", "сопілці", "сопілкою"]
      explanation: "Тут потрібен Називний відмінок."
    - sentence: "Цей легендарний гурт збирає величезні стадіони."
      answer: "гурт"
      options: ["гурт", "група", "команда", "колектив"]
      explanation: "Слово гурт використовується для музичних колективів."
    - sentence: "Сьогодні ми йдемо на благодійний концерт."
      answer: "концерт"
      options: ["концерт", "альбом", "хіт", "жанр"]
      explanation: "Люди ходять на концерти."
    - sentence: "Цей виконавець написав дуже сумну пісню."
      answer: "виконавець"
      options: ["виконавець", "виконавиця", "співачка", "слухач"]
      explanation: "Слово виконавець чоловічого роду."
    - sentence: "Ця відома співачка випустила свій перший сольний альбом."
      answer: "альбом"
      options: ["альбом", "концерт", "гурт", "хіт"]
      explanation: "Артисти випускають альбоми."

- type: unjumble
