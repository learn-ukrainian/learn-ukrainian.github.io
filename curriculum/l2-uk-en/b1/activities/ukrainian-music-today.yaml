- type: error-correction
  title: "Виправте помилку: граматика та лексика"
  instruction: "Знайдіть та виправте одну помилку в кожному реченні."
  items:
    - sentence: "Моя музична група грає дуже добре."
      error: "музична група"
      answer: "музичний гурт"
      error_type: "phrase"
      options: ["музичний гурт", "музична компанія", "музична команда", "музичний співак"]
      explanation: "В українській мові для музикантів використовують слово гурт (чоловічого роду)."
    - sentence: "Вчора я спеціально увімкнув радіо і чув гарну музику."
      error: "чув"
      answer: "слухав"
      error_type: "word"
      options: ["слухав", "грав", "бачив", "розумів"]
      explanation: "Свідоме сприйняття музики — це слухати, а не чути."
    - sentence: "Мій найкращий друг чудово вміє грати на тенісі."
      error: "на тенісі"
      answer: "в теніс"
      error_type: "construction"
      options: ["в теніс", "у тенісі", "теніс", "тенісом"]
      explanation: "Для спортивних ігор використовують прийменник в та Знахідний відмінок."
    - sentence: "Вона щодня вчиться грати в піаніно у школі."
      error: "в піаніно"
      answer: "на піаніно"
      error_type: "construction"
      options: ["на піаніно", "піаніно", "піаніном", "у піаніно"]
      explanation: "Для інструментів використовують прийменник на та Місцевий відмінок."
    - sentence: "Це мій найулюбленіший пісня цього року."
      error: "мій найулюбленіший"
      answer: "моя найулюбленіша"
      error_type: "phrase"
      options: ["моя найулюбленіша", "моє найулюбленіше", "мої найулюбленіші", "мій улюблений"]
      explanation: "Слово пісня жіночого роду, тому прикметник і займенник мають бути жіночого роду."
    - sentence: "Ми довго слухали ця новий альбом."
      error: "ця новий"
      answer: "цей новий"
      error_type: "phrase"
      options: ["цей новий", "це нове", "ці нові", "цього нового"]
      explanation: "Слово альбом чоловічого роду, тому вказівний займенник і прикметник — чоловічого роду."

- type: quiz
