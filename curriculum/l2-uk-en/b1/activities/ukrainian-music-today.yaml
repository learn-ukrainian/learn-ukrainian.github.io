- type: quiz
  title: "Перевірте знання: Українська музика"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке слово ми використовуємо для позначення музичного колективу в українській мові?"
      explanation: "Правильне українське слово — гурт."
      options:
        - text: "гурт"
          correct: true
        - text: "група"
          correct: false
        - text: "компанія"
          correct: false
        - text: "команда"
          correct: false
    - question: "Яке дієслово ми використовуємо для активного, свідомого процесу сприйняття звуків?"
      explanation: "Дієслово слухати позначає активний процес, а чути — пасивний."
      options:
        - text: "слухати"
          correct: true
        - text: "чути"
          correct: false
        - text: "бачити"
          correct: false
        - text: "розуміти"
          correct: false
    - question: "Який традиційний український духовий інструмент став візитною карткою сучасної музики?"
      explanation: "Сопілка часто використовується у сучасних українських піснях."
      options:
        - text: "сопілка"
          correct: true
        - text: "гітара"
          correct: false
        - text: "барабан"
          correct: false
        - text: "скрипка"
          correct: false
    - question: "У якому відмінку стоїть іменник після конструкції грати на (про інструменти)?"
      explanation: "Для музичних інструментів використовується Місцевий відмінок."
      options:
        - text: "у Місцевому відмінку"
          correct: true
        - text: "у Знахідному відмінку"
          correct: false
        - text: "у Називному відмінку"
          correct: false
        - text: "у Родовому відмінку"
          correct: false
    - question: "Як правильно сказати українською про заняття великим тенісом?"
      explanation: "Для спортивних ігор використовуємо конструкцію грати в + Знахідний відмінок."
      options:
        - text: "грати в теніс"
          correct: true
        - text: "грати на тенісі"
          correct: false
        - text: "грати тенісом"
          correct: false
        - text: "грати до тенісу"
          correct: false
    - question: "Від якого слова утворено іменник співак за допомогою суфікса -ак?"
      explanation: "Слово співак походить від дієслова співати."
      options:
        - text: "від дієслова співати"
          correct: true
        - text: "від іменника спів"
          correct: false
        - text: "від прикметника співучий"
          correct: false
        - text: "від дієслова грати"
          correct: false
    - question: "Який рід має іменник альбом в українській граматиці?"
      explanation: "Слово альбом належить до чоловічого роду."
      options:
        - text: "чоловічий рід"
          correct: true
        - text: "жіночий рід"
          correct: false
        - text: "середній рід"
          correct: false
        - text: "спільний рід"
          correct: false
    - question: "Як називається найголовніший вокаліст або засновник музичної команди?"
      explanation: "Таку людину називають лідером гурту."
      options:
        - text: "лідер гурту"
          correct: true
        - text: "головний співак"
          correct: false
        - text: "директор гурту"
          correct: false
        - text: "керівник музики"
          correct: false

