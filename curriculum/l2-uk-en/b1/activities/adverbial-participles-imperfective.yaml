- type: true-false
  title: "Правда чи брехня?"
  instruction: "Визначте, чи є ці твердження про дієприслівники правильними."
  items:
    - statement: "Дієприслівники недоконаного виду утворюються від початкової форми дієслова (інфінітива)."
      correct: false
      explanation: "Вони утворюються виключно від форми третьої особи множини (вони)."
    - statement: "Дієприслівник завжди означає додаткову дію, яка відбувається одночасно з головною."
      correct: true
      explanation: "Це головна функція недоконаного виду — передавати паралельність дій."
    - statement: "Дієслова другої дієвідміни (наприклад, вони мовчать) отримують суфікс -ачи або -ячи."
      correct: true
      explanation: "Вони мовчать -> мовчачи, вони бачать -> бачачи."
    - statement: "У реченні дієприслівниковий зворот завжди виділяється комами з обох боків (або однією, якщо стоїть скраю)."
      correct: true
      explanation: "Незалежно від своєї позиції, зворот завжди пунктуаційно ізолюється."
    - statement: "Речення 'Читаючи книгу, мені стало сумно' є граматично абсолютно правильним."
      correct: false
      explanation: "Це безособове речення без підмета. Використання звороту тут є грубою помилкою."
    - statement: "Словосполучення 'не дивлячись на' часто означає абстрактне поняття 'незважаючи на щось' (despite)."
      correct: true
      explanation: "Це прийменникове використання, хоча стилістично краще казати 'незважаючи на'."
    - statement: "Від дієслова 'писати' за правилами утворюється дієприслівник 'писачи'."
      correct: false
      explanation: "Правильна форма утворюється так: вони пишуть -> пишучи."
    - statement: "Зворотні дієслова (з часткою -ся) повністю втрачають цю частку при творенні дієприслівника."
      correct: false
      explanation: "Частка зберігається, але часто змінює форму на '-сь' (сміються -> сміючись)."

- type: select
  title: "Оберіть правильні відповіді"
  instruction: "У кожному завданні є декілька правильних відповідей. Оберіть їх усі."
  items:
    - question: "Оберіть усі правильні форми дієприслівників першої дієвідміни (мають суфікси -учи/-ючи)."
      min_correct: 3
      options:
        - text: "знаючи"
          correct: true
        - text: "пишучи"
          correct: true
        - text: "бачачи"
          correct: false
        - text: "працюючи"
          correct: true
    - question: "Оберіть усі правильні форми дієприслівників другої дієвідміни (мають суфікси -ачи/-ячи)."
      min_correct: 3
      options:
        - text: "дивлячись"
          correct: true
        - text: "сидячи"
          correct: true
        - text: "читаючи"
          correct: false
        - text: "мовчачи"
          correct: true
    - question: "Які з цих речень порушують 'правило спільного підмета' (містять синтаксичну помилку)?"
      min_correct: 2
      options:
        - text: "Готуючи вечерю, у мене згорів пиріг."
          correct: true
        - text: "Готуючи вечерю, я спалив пиріг."
          correct: false
        - text: "Слухаючи музику, дівчина йшла через парк."
          correct: false
        - text: "Йдучи додому, почався дощ."
          correct: true
    - question: "Оберіть дієприслівники, які утворені без помилок."
      min_correct: 2
      options:
        - text: "пишучи"
          correct: true
        - text: "писачи"
          correct: false
        - text: "бачачи"
          correct: true
        - text: "бачучи"
          correct: false
    - question: "Які з цих фраз є популярними вставними конструкціями, що утворені від дієприслівників?"
      min_correct: 3
      options:
        - text: "чесно кажучи"
          correct: true
        - text: "інакше кажучи"
          correct: true
        - text: "м'яко кажучи"
          correct: true
        - text: "голосно кажучи"
          correct: false
    - question: "Які слова є русизмами, тому їх не можна використовувати в українській мові?"
      min_correct: 2
      options:
        - text: "кушаючи"
          correct: true
        - text: "їдячи"
          correct: false
        - text: "получаючи"
          correct: true
        - text: "отримуючи"
          correct: false