- type: fill-in
  title: "Заповніть пропуски"
  instruction: "Оберіть правильний дієприслівник недоконаного виду для кожного речення."
  items:
    - sentence: "Він працював над новим сценарієм, п'ючи каву."
      answer: "п'ючи"
      options:
        - "п'ючи"
        - "пити"
        - "пив"
        - "пивши"
    - sentence: "Читаючи цей текст, я уявляв себе відомим режисером."
      answer: "Читаючи"
      options:
        - "Читаючи"
        - "Читати"
        - "Читав"
        - "Читавши"
    - sentence: "Журналіст робив нотатки, уважно слухаючи міністра."
      answer: "слухаючи"
      options:
        - "слухаючи"
        - "слухати"
        - "слухав"
        - "слухавши"
    - sentence: "Дивлячись у вікно, вона думала про сюжет нового фільму."
      answer: "Дивлячись"
      options:
        - "Дивлячись"
        - "Дивитись"
        - "Дивилися"
        - "Дивлячи"
    - sentence: "Ми йшли парком, радісно говорячи про плани на майбутнє."
      answer: "говорячи"
      options:
        - "говорячи"
        - "говорити"
        - "говорючи"
        - "говорив"
    - sentence: "Йдучи додому, я постійно слухав музику в навушниках."
      answer: "Йдучи"
      options:
        - "Йдучи"
        - "Йти"
        - "Йшовши"
        - "Йдучись"
    - sentence: "Детектив стояв біля дверей, чекаючи на небезпеку."
      answer: "чекаючи"
      options:
        - "чекаючи"
        - "чекати"
        - "чекав"
        - "чекавши"
    - sentence: "Знаючи всю правду, він не міг більше знімати цей фільм."
      answer: "Знаючи"
      options:
        - "Знаючи"
        - "Знати"
        - "Знав"
        - "Знаючись"

- type: match-up
  title: "Знайдіть пару"
  instruction: "З'єднайте українські граматичні терміни з їхнім англійським перекладом."
  pairs:
    - left: "дієприслівник"
      right: "adverbial participle"
    - left: "недоконаний вид"
      right: "imperfective aspect"
    - left: "одночасність"
      right: "simultaneity"
    - left: "підмет"
      right: "subject"
    - left: "суфікс"
      right: "suffix"
    - left: "підрядне речення"
      right: "subordinate clause"
    - left: "трансформація"
      right: "transformation"
    - left: "дисбаланс підметів"
      right: "dangling participle"

- type: unjumble
  title: "Складіть речення"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити речення з дієприслівниковим зворотом."
  items:
    - words:
        - "Читаючи"
        - "новини,"
        - "ми"
        - "пили"
        - "каву."
      answer: "Читаючи новини, ми пили каву."
    - words:
        - "Знаючи"
        - "правду,"
        - "він"
        - "залишив"
        - "проект."
      answer: "Знаючи правду, він залишив проект."
    - words:
        - "Вона"
        - "йшла"
        - "вулицею,"
        - "слухаючи"
        - "подкаст."
      answer: "Вона йшла вулицею, слухаючи подкаст."
    - words:
        - "Готуючи"
        - "презентацію,"
        - "додайте"
        - "туди"
        - "графіки."
      answer: "Готуючи презентацію, додайте туди графіки."
    - words:
        - "Чесно"
        - "кажучи,"
        - "цей"
        - "фільм"
        - "був"
        - "нудним."
      answer: "Чесно кажучи, цей фільм був нудним."
    - words:
        - "Бачачи"
        - "проблему,"
        - "вони"
        - "почали"
        - "шукати"
        - "рішення."
      answer: "Бачачи проблему, вони почали шукати рішення."
    - words:
        - "Дивлячись"
        - "у"
        - "вікно,"
        - "я"
        - "мріяв."
      answer: "Дивлячись у вікно, я мріяв."
    - words:
        - "Працюючи"
        - "разом,"
        - "ми"
        - "швидко"
        - "закінчили."
      answer: "Працюючи разом, ми швидко закінчили."

- type: quiz
  title: "Перевірте знання"
  instruction: "Оберіть одну правильну відповідь на кожне граматичне запитання."
  items:
    - question: "Від якої форми дієслова утворюються дієприслівники недоконаного виду?"
      explanation: "Дієприслівник недоконаного виду завжди утворюється від форми 'вони' (теперішній час)."
      options:
        - text: "Від форми третьої особи множини (вони)"
          correct: true
        - text: "Від інфінітива (початкової форми)"
          correct: false
        - text: "Від форми першої особи однини (я)"
          correct: false
        - text: "Від форми минулого часу"
          correct: false
    - question: "Яке правило є найважливішим при використанні дієприслівникових зворотів у реченні?"
      explanation: "Головна дія і дія дієприслівника повинні виконуватися одним спільним підметом."
      options:
        - text: "Правило спільного підмета для обох дій"
          correct: true
        - text: "Дієприслівник має стояти тільки на початку речення"
          correct: false
        - text: "Дієприслівник не виділяється комами"
          correct: false
        - text: "Правило використання тільки доконаного виду"
          correct: false
    - question: "Який суфікс потрібно додати до основи дієслова другої дієвідміни?"
      explanation: "Дієслова II дієвідміни (вони бачать, сидять) отримують суфікси -ачи/-ячи."
      options:
        - text: "-ачи або -ячи"
          correct: true
        - text: "-учи або -ючи"
          correct: false
        - text: "-вши або -ши"
          correct: false
        - text: "-ти або -ть"
          correct: false
    - question: "Як правильно утворити дієприслівник недоконаного виду від дієслова 'бачити'?"
      explanation: "Вони бачать -> бача- + -чи -> бачачи."
      options:
        - text: "бачачи"
          correct: true
        - text: "бачучи"
          correct: false
        - text: "бачичи"
          correct: false
        - text: "бачивши"
          correct: false
    - question: "Як правильно утворити дієприслівник недоконаного виду від дієслова 'писати'?"
      explanation: "Вони пишуть -> пишу- + -чи -> пишучи."
      options:
        - text: "пишучи"
          correct: true
        - text: "писачи"
          correct: false
        - text: "писячи"
          correct: false
        - text: "писавши"
          correct: false
    - question: "У якому з цих речень допущено помилку 'дисбаланс підметів'?"
      explanation: "Дощ не може йти додому. Підмет головної дії (дощ) не співпадає з тим, хто йшов."
      options:
        - text: "Йдучи додому, почався дощ."
          correct: true
        - text: "Йдучи додому, я змок під дощем."
          correct: false
        - text: "Коли я йшов додому, почався дощ."
          correct: false
        - text: "Я йшов додому, слухаючи улюблену музику."
          correct: false
    - question: "Яку головну функцію виконує дієприслівник недоконаного виду в реченні?"
      explanation: "Недоконаний вид передає концепцію одночасності — дві дії існують паралельно."
      options:
        - text: "Показує дію, яка відбувається одночасно з головною"
          correct: true
        - text: "Описує зовнішність предмета або людини"
          correct: false
        - text: "Показує дію, яка повністю завершилася в минулому"
          correct: false
        - text: "Замінює головний іменник у безособовому реченні"
          correct: false
    - question: "Що відбувається з часткою '-ся' у зворотних дієсловах при творенні дієприслівника?"
      explanation: "Дивитися -> дивляться -> дивлячись (частка зберігається як -сь)."
      options:
        - text: "Вона змінюється на '-сь' і залишається в кінці слова"
          correct: true
        - text: "Вона зникає повністю і більше не використовується"
          correct: false
        - text: "Вона ставиться перед словом як окремий прийменник"
          correct: false
        - text: "Вона залишається без змін у формі '-ся'"
          correct: false

- type: group-sort
  title: "Розподіліть за дієвідмінами"
  instruction: "Розподіліть дієприслівники на дві групи залежно від суфікса (I або II дієвідміна)."
  groups:
    - name: "Суфікси -учи/-ючи (I дієвідміна)"
      items:
        - "працюючи"
        - "знаючи"
        - "пишучи"
        - "читаючи"
        - "малюючи"
        - "йдучи"
    - name: "Суфікси -ачи/-ячи (II дієвідміна)"
      items:
        - "бачачи"
        - "дивлячись"
        - "сидячи"
        - "говорячи"
        - "люблячи"
        - "мовчачи"

- type: error-correction
  title: "Виправте помилку"
  instruction: "Знайдіть та виправте помилку в утворенні дієприслівника або синтаксичну помилку в кожному реченні."
  items:
    - sentence: "Ми сиділи в кафе, писачи новий сценарій для фільму."
      error: "писачи"
      answer: "пишучи"
      error_type: "word"
      options:
        - "пишучи"
        - "писавши"
        - "пишючи"
        - "писати"
      explanation: "Писати у формі 'вони' - пишуть. Отже, суфікс -учи: пишучи."
    - sentence: "Вона йшла парком, бачучи красу осінніх дерев."
      error: "бачучи"
      answer: "бачачи"
      error_type: "word"
      options:
        - "бачачи"
        - "бачивши"
        - "бачичи"
        - "бачити"
      explanation: "Бачити у формі 'вони' - бачать. Отже, суфікс -ачи: бачачи."
    - sentence: "Кушаючи смачний борщ, він розповідав цікаву історію."
      error: "Кушаючи"
      answer: "Їдячи"
      error_type: "word"
      options:
        - "Їдячи"
        - "Ївши"
        - "Кушати"
        - "Їдучи"
      explanation: "Слово 'кушати' — це русизм. Правильно: їсти -> вони їдять -> їдячи."
    - sentence: "Читаючи цей текст, мені стало дуже сумно."
      error: "мені стало дуже сумно"
      answer: "я дуже засмутився"
      error_type: "construction"
      options:
        - "я дуже засмутився"
        - "мені було сумно"
        - "стало сумно"
        - "я був сумно"
      explanation: "Дієприслівник не можна використовувати в безособовому реченні. Потрібен реальний підмет у називному відмінку."
    - sentence: "Чесно говоря, цей фільм не дуже цікавий."
      error: "говоря"
      answer: "кажучи"
      error_type: "word"
      options:
        - "кажучи"
        - "говорячи"
        - "сказавши"
        - "казати"
      explanation: "В українській мові використовується стала вставна конструкція 'чесно кажучи'."
    - sentence: "Студенти робили нотатки, слухая лекцію професора."
      error: "слухая"
      answer: "слухаючи"
      error_type: "word"
      options:
        - "слухаючи"
        - "слухавши"
        - "слухуючи"
        - "слухачи"
      explanation: "Слухати у формі 'вони' - слухають. Отже, суфікс -ючи: слухаючи."

- type: mark-the-words
  title: "Знайдіть дієприслівники"
  instruction: "Знайдіть і позначте всі дієприслівники недоконаного виду в тексті."
  text: "Сценарист сидів за столом, редагуючи фінальний текст. П'ючи гарячу каву, він розмірковував про долю головного героя. Знаючи правду про злочин, детектив йшов містом, дивлячись на перехожих. Знімаючи цю сцену, режисер постійно давав поради акторам."
  answers:
    - "редагуючи"
    - "П'ючи"
    - "Знаючи"
    - "дивлячись"
    - "Знімаючи"

