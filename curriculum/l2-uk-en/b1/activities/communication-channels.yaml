- type: fill-in
  title: "Фрази для телефонної розмови"
  instruction: "Оберіть правильне слово, щоб доповнити типові фрази телефонного етикету."
  items:
    - sentence: "Алло, клініка Здоров'я, {слухаю} вас."
      answer: "слухаю"
      options: ["слухаю", "чую", "чекаю", "говорю"]
      explanation: "Слово 'слухаю' звучить більш професійно, ніж просто 'алло'."
    - sentence: "Добрий день, Олено Петрівно! Вас {турбує} Сергій."
      answer: "турбує"
      options: ["турбує", "дзвонить", "шукає", "кличе"]
      explanation: "Стандартна ввічлива форма для того, щоб представитися по телефону."
    - sentence: "Вибачте, у нас дуже поганий {зв'язок}, я вас майже не чую."
      answer: "зв'язок"
      options: ["зв'язок", "телефон", "інтернет", "звук"]
      explanation: "Слово 'зв'язок' є універсальним для проблем з мобільною мережею."
    - sentence: "Зв'язок постійно {переривається}, чи можу я вам передзвонити?"
      answer: "переривається"
      options: ["переривається", "ламається", "зупиняється", "зникає"]
    - sentence: "Вас зовсім не чути, здається, зник {зв'язок}."
      answer: "зв'язок"
      options: ["зв'язок", "голос", "телефон", "інтернет"]
    - sentence: "Зачекайте хвилинку, тут немає {мережі}."
      answer: "мережі"
      options: ["мережі", "антени", "хвилі", "інтернету"]
    - sentence: "Я хотів би {записатися} на консультацію до лікаря."
      answer: "записатися"
      options: ["записатися", "прийти", "подивитися", "спитати"]
    - sentence: "Будь ласка, {перезавантажте} ваш пристрій, ми перевіряємо лінію."
      answer: "перезавантажте"
      options: ["перезавантажте", "вимкніть", "увімкніть", "зламайте"]
    - sentence: "{Перепрошую}, я вас не розчув, повторіть ще раз."
      answer: "Перепрошую"
      options: ["Перепрошую", "Вибачаюсь", "Пробачтеся", "Жалію"]
      explanation: "Форма 'Перепрошую' є ввічливою та граматично правильною."
    - sentence: "Я {передзвоню}, як тільки буду виходити з офісу."
      answer: "передзвоню"
      options: ["передзвоню", "зателефоную", "наберу", "крикну"]
    - sentence: "Чи {зручно} вам зараз говорити?"
      answer: "зручно"
      options: ["зручно", "добре", "гарно", "можна"]
    - sentence: "Дякую за інформацію, будемо на {зв'язку}."
      answer: "зв'язку"
      options: ["зв'язку", "телефоні", "лінії", "дроті"]

- type: match-up
  title: "Цифровий сленг та термінологія"
  instruction: "З'єднайте сталі вирази та терміни з їхнім значенням."
  pairs:
    - left: "скинути лінк"
      right: "надіслати гіперпосилання на ресурс"
    - left: "бути на зв'язку"
      right: "залишатися доступним для спілкування"
    - left: "відписати"
      right: "дати текстову відповідь на повідомлення"
    - left: "перевірити скриньку"
      right: "переглянути вхідні електронні листи"
    - left: "закинути у вкладення"
      right: "додати файл до повідомлення"
    - left: "робочий чат"
      right: "простір для напівформального спілкування команди"
    - left: "голосове повідомлення"
      right: "аудіозапис, надісланий у месенджері"
    - left: "тема листа"
      right: "коротке резюме повідомлення електронної пошти"
    - left: "кличний відмінок"
      right: "форма іменника, що використовується для звертання"
    - left: "еліпсис"
      right: "пропуск слів у реченні для економії часу"
    - left: "Viber"
      right: "месенджер, популярний для родинних чатів та ОСББ"
    - left: "Telegram"
      right: "головний месенджер для корпоративних чатів та новин"
    - left: "Добрий день"
      right: "правильна форма привітання вдень"
    - left: "Доброго дня"
      right: "правильна форма побажання при прощанні"
    - left: "я вибачаюсь"
      right: "помилкова граматична форма самовиправдання"

- type: fill-in
  title: "Шаблони ділового листування"
  instruction: "Оберіть слова для заповнення прогалин в офіційних електронних листах."
  items:
    - sentence: "{Шановний} пане директоре!"
      answer: "Шановний"
      options: ["Шановний", "Дорогий", "Любий", "Поважаний"]
    - sentence: "Звертаємося до вас від {імені} нашої компанії."
      answer: "імені"
      options: ["імені", "особи", "фірми", "назви"]
    - sentence: "Детальний опис проєкту ви знайдете у {прикріпленому} файлі."
      answer: "прикріпленому"
      options: ["прикріпленому", "доданому", "цьому", "новому"]
    - sentence: "Будемо {вдячні} за можливість провести презентацію."
      answer: "вдячні"
      options: ["вдячні", "раді", "щасливі", "задоволені"]
    - sentence: "Усі необхідні документи знаходяться у {вкладенні}."
      answer: "вкладенні"
      options: ["вкладенні", "конверті", "додатку", "листі"]
    - sentence: "Прошу вас розглянути наш проєкт більш {детально}."
      answer: "детально"
      options: ["детально", "детальніше", "глибоко", "глибокіше"]
    - sentence: "З {повагою}, керівник відділу розвитку."
      answer: "повагою"
      options: ["повагою", "любов'ю", "вітанням", "шаною"]
    - sentence: "Буду вдячний, якщо ви зможете надіслати нам {копію} договору."
      answer: "копію"
      options: ["копію", "папір", "текст", "варіант"]
    - sentence: "Дозвольте висловити щиру {подяку} за вашу участь у конференції."
      answer: "подяку"
      options: ["подяку", "радість", "думку", "ідею"]
    - sentence: "Маємо {честь} запросити вас на урочисте відкриття."
      answer: "честь"
      options: ["честь", "право", "можливість", "нагоду"]
    - sentence: "Прошу надати мені щорічну {відпустку} терміном на 14 днів."
      answer: "відпустку"
      options: ["відпустку", "перерву", "паузу", "вихідний"]
    - sentence: "{Обов'язково} вкажіть тему листа перед відправкою."
      answer: "Обов'язково"
      options: ["Обов'язково", "Завжди", "Точно", "Мабуть"]

- type: quiz
  title: "Етикет комунікаційних каналів"
  instruction: "Оберіть правильний варіант відповіді для кожної ситуації."
  items:
    - question: "Який канал комунікації є найкращим для першого професійного контакту з незнайомою людиною?"
      explanation: "Електронна пошта створює безпечну дистанцію та є найвищим стандартом ділового етикету."
      options:
        - text: "Електронна пошта"
          correct: true
        - text: "Особистий Telegram"
          correct: false
        - text: "Дзвінок на мобільний"
          correct: false
        - text: "Повідомлення у Viber"
          correct: false
    - question: "Яка граматична форма є єдино правильною для офіційного привітання вдень?"
      explanation: "За Державним стандартом форма називного відмінка Добрий день! є єдиною правильною для привітання."
      options:
        - text: "Добрий день!"
          correct: true
        - text: "Доброго дня!"
          correct: false
        - text: "Добрий ранок!"
          correct: false
        - text: "Привіт усім!"
          correct: false
    - question: "У якому випадку використання голосових повідомлень у робочому чаті є виправданим?"
      explanation: "Голосові повідомлення без дозволу в робочому середовищі вважаються неповагою до часу колег."
      options:
        - text: "В екстреній ситуації, коли ви за кермом."
          correct: true
        - text: "Коли вам ліньки друкувати текст."
          correct: false
        - text: "Для передачі складних числових даних."
          correct: false
        - text: "Для першого знайомства з клієнтом."
          correct: false
    - question: "Який месенджер найчастіше використовується для будинкових чатів (ОСББ) в Україні?"
      explanation: "Viber традиційно використовується для локальних спільнот, таких як родинні групи."
      options:
        - text: "Viber"
          correct: true
        - text: "Telegram"
          correct: false
        - text: "WhatsApp"
          correct: false
        - text: "Signal"
          correct: false
    - question: "Як правильно ввічливо перервати людину або перепитати під час телефонної розмови?"
      explanation: "Форма 'я вибачаюсь' є неправильною (буквально 'я вибачаю себе'). Нормою є 'Перепрошую'."
      options:
        - text: "Перепрошую!"
          correct: true
        - text: "Я вибачаюсь!"
          correct: false
        - text: "Стійте!"
          correct: false
        - text: "Почекайте!"
          correct: false
    - question: "Що таке еліпсис у природному щоденному листуванні?"
      explanation: "Еліпсис робить мовлення економним, наприклад відповідь 'Мені також!' замість повного речення."
      options:
        - text: "Пропуск слів, які легко зрозуміти з контексту."
          correct: true
        - text: "Використання великої кількості емоджі."
          correct: false
        - text: "Написання всіх слів з великої літери."
          correct: false
        - text: "Розбивання одного слова на кілька повідомлень."
          correct: false
    - question: "Яка тема електронного листа є найкращою з точки зору ділового етикету?"
      explanation: "Тема листа повинна виконувати роль короткого та конкретного резюме всього повідомлення."
      options:
        - text: "Запит на фінансування проєкту"
          correct: true
        - text: "Важливо!!!"
          correct: false
        - text: "Питання"
          correct: false
        - text: "Проєкт"
          correct: false
    - question: "Яка форма порівняння є граматично правильною в українській мові?"
      explanation: "Подвійний ступінь порівняння ('більш детальніше') є серйозною стилістичною помилкою."
      options:
        - text: "Більш детально"
          correct: true
        - text: "Більш детальніше"
          correct: false
        - text: "Самий кращий"
          correct: false
        - text: "Самий успішніший"
          correct: false
    - question: "Що є найважливішим правилом щодо надсилання файлів електронною поштою?"
      explanation: "Порожній лист із файлом виглядає підозріло і може бути заблокований спам-фільтром."
      options:
        - text: "Вказати про наявність файлу в тексті листа."
          correct: true
        - text: "Надсилати файли без тексту для економії часу."
          correct: false
        - text: "Завжди архівувати файли з паролем."
          correct: false
        - text: "Надсилати файли тільки у форматі зображень."
          correct: false
    - question: "Як слід реагувати на повідомлення-інструкцію від керівника в робочому чаті?"
      explanation: "Реакції в робочому чаті допомагають підтвердити отримання інформації, не засмічуючи стрічку."
      options:
        - text: "Поставити реакцію на повідомлення."
          correct: true
        - text: "Написати окреме повідомлення 'Зрозумів'."
          correct: false
        - text: "Зателефонувати і підтвердити."
          correct: false
        - text: "Проігнорувати, якщо немає запитань."
          correct: false

- type: error-correction
  title: "Робота над типовими помилками"
  instruction: "Знайдіть і виправте типові помилки в діловому листуванні та спілкуванні."
  items:
    - sentence: "Доброго дня, пане директор! Я надіслав вам звіт."
      error: "директор"
      answer: "директоре"
      error_type: "word"
      options: ["директоре", "директору", "директором", "дирекції"]
      explanation: "В офіційному привітанні обов'язково використовується кличний відмінок для посади чи імені."
    - sentence: "Я вибачаюсь за те, що не відповів вчора."
      error: "вибачаюсь"
      answer: "перепрошую"
      error_type: "word"
      options: ["перепрошую", "вибачуся", "жалію", "вибачив"]
      explanation: "Форма 'я вибачаюсь' є зворотною. Ввічлива норма — 'перепрошую' або 'вибачте мені'."
    - sentence: "Прошу вас розглянути цей контракт більш детальніше."
      error: "детальніше"
      answer: "детально"
      error_type: "construction"
      options: ["детально", "детальну", "детальніший", "детальності"]
      explanation: "Фраза 'більш детальніше' — це стилістична помилка подвійного порівняння. Правильно: 'більш детально'."
    - sentence: "Це самий кращий варіант для нашої команди."
      error: "самий кращий"
      answer: "найкращий"
      error_type: "construction"
      options: ["найкращий", "кращий", "найбільш кращий", "краще"]
      explanation: "Конструкція з 'самий' є калькою. Найвищий ступінь порівняння утворюється за допомогою префікса 'най-'."
    - sentence: "Доброго дня, колеги! Починаємо нашу зустріч."
      error: "Доброго дня"
      answer: "Добрий день"
      error_type: "phrase"
      options: ["Добрий день", "Добрий ранок", "Доброї ночі", "Доброго ранку"]
      explanation: "При зустрічі вдень правильно використовувати називний відмінок: 'Добрий день!'."
    - sentence: "Чи ви можете скинути мені ссилку на цей документ?"
      error: "ссилку"
      answer: "посилання"
      error_type: "word"
      options: ["посилання", "лінковку", "адрес", "силку"]
      explanation: "Слово 'ссилка' є русизмом. Правильно: 'посилання' або в неформальному сленгу 'лінк'."
    - sentence: "Він приймав участь у вчорашній онлайн-конференції."
      error: "приймав участь"
      answer: "брав участь"
      error_type: "phrase"
      options: ["брав участь", "робив участь", "мав участь", "дав участь"]
      explanation: "Конструкція 'приймати участь' є лексичною калькою. Українською правильно казати 'брати участь'."
    - sentence: "Будь ласка, перевірте свою почту, там важливий лист."
      error: "почту"
      answer: "пошту"
      error_type: "word"
      options: ["пошту", "скриньку", "поштову", "почтову"]
      explanation: "Слово 'почта' є калькою. Правильно — 'пошта' або 'електронна скринька'."

- type: unjumble
  title: "Побудова ділових речень"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["Я", "надіслав", "вам", "файл", "у", "месенджер"]
      answer: "Я надіслав вам файл у месенджер"
    - words: ["Усі", "необхідні", "документи", "знаходяться", "у", "вкладенні"]
      answer: "Усі необхідні документи знаходяться у вкладенні"
    - words: ["Буду", "вдячний", "за", "можливість", "провести", "презентацію"]
      answer: "Буду вдячний за можливість провести презентацію"
    - words: ["Зачекайте", "хвилинку", "я", "перевірю", "наш", "графік"]
      answer: "Зачекайте хвилинку я перевірю наш графік"
    - words: ["Зв'язок", "постійно", "переривається", "я", "вам", "передзвоню"]
      answer: "Зв'язок постійно переривається я вам передзвоню"
    - words: ["Дозвольте", "висловити", "щиру", "подяку", "за", "участь"]
      answer: "Дозвольте висловити щиру подяку за участь"
    - words: ["Обов'язково", "вкажіть", "тему", "листа", "перед", "відправкою"]
      answer: "Обов'язково вкажіть тему листа перед відправкою"
    - words: ["Прошу", "вас", "розглянути", "цей", "проєкт", "детальніше"]
      answer: "Прошу вас розглянути цей проєкт детальніше"

- type: true-false
  title: "Правила ділового етикету"
  instruction: "Визначте, чи є твердження правильним (True) або помилковим (False)."
  items:
    - statement: "Електронна пошта є найкращим каналом для першого професійного контакту з незнайомою людиною."
      correct: true
      explanation: "Вона створює безпечну дистанцію та дозволяє відповісти у зручний час."
    - statement: "Використання фрази 'Доброго дня!' при зустрічі є граматично правильною літературною нормою."
      correct: false
      explanation: "Це поширена помилка. Правильно вітатися називним відмінком: 'Добрий день!'."
    - statement: "У діловому листуванні краще використовувати конструкцію 'більш детальніше' для підкреслення важливості."
      correct: false
      explanation: "Це граматичний абсурд (подвійне порівняння). Правильно: 'детальніше' або 'більш детально'."
    - statement: "Голосові повідомлення в робочому чаті можна надсилати без попередження, щоб зекономити час колег."
      correct: false
      explanation: "Голосові повідомлення без дозволу вважаються проявом неповаги до часу співрозмовника."
    - statement: "При офіційному звертанні до людини за іменем та по батькові обов'язково використовується кличний відмінок."
      correct: true
      explanation: "Наприклад: 'Олено Петрівно', 'Іване Миколайовичу'."
    - statement: "Еліпсис (пропуск очевидних слів) є нормальною практикою в щоденному українському спілкуванні."
      correct: true
