- type: cloze
  title: "Цифрова комунікація в Україні"
  instruction: "Заповніть пропуски в тексті відповідними словами."
  passage: "Сучасна українська комунікація дуже динамічна. У робочому середовищі важливо правильно обирати {{1}} зв'язку. Для першого контакту найкраще підходить офіційна електронна {{2}}. Коли ви пишете листа, завжди вказуйте його {{3}}, щоб співрозмовник зрозумів суть. Якщо ви додаєте документи, напишіть, що вони знаходяться у {{4}}. Для швидких робочих питань команди часто створюють робочий {{5}} у месенджері, найчастіше в {{6}}. Там спілкування є напівформальним. Замість того, щоб писати довгі слова подяки, колеги часто ставлять {{7}} під повідомленням. Дуже важливо не записувати {{8}} повідомлення без дозволу, адже їх неможливо швидко прослухати. Під час телефонної розмови завжди використовуйте {{9}} відмінок для звертання: 'Шановний пане {{10}}!'. Якщо мережа зникає і ви погано чуєте людину, скажіть, що у вас поганий {{11}}. І пам'ятайте про правильні вітання: завжди кажіть 'Добрий {{12}}!' замість помилкового 'Доброго дня!'. Якщо ж ви зробили помилку, скажіть ввічливе '{{13}}!' замість неправильної форми 'я {{14}}'."
  blanks:
    - id: 1
      answer: "канал"
      options: ["канал", "шлях", "метод", "спосіб"]
    - id: 2
      answer: "пошта"
      options: ["пошта", "скринька", "адреса", "лінія"]
    - id: 3
      answer: "тему"
      options: ["тему", "ідею", "думку", "назву"]
    - id: 4
      answer: "вкладенні"
      options: ["вкладенні", "листі", "файлі", "повідомленні"]
    - id: 5
      answer: "чат"
      options: ["чат", "блок", "клуб", "форум"]
    - id: 6
      answer: "Телеграмі"
      options: ["Телеграмі", "Вайбері", "Фейсбуці", "Інстаграмі"]
    - id: 7
      answer: "реакції"
      options: ["реакції", "оцінки", "картинки", "знаки"]
    - id: 8
      answer: "голосові"
      options: ["голосові", "звукові", "довгі", "шумні"]
    - id: 9
      answer: "кличний"
      options: ["кличний", "називний", "родовий", "давальний"]
    - id: 10
      answer: "директоре"
      options: ["директоре", "директор", "директору", "директором"]
    - id: 11
      answer: "зв'язок"
      options: ["зв'язок", "телефон", "сигнал", "звук"]
    - id: 12
      answer: "день"
      options: ["день", "ранку", "вечір", "дня"]
