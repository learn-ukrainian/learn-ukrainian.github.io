version: '1.0'
module: aspect-in-narration
level: b1
inline:
- id: quiz-aspect-analysis
  type: quiz
  instruction: Яку роль відіграє виділене дієслово в кожному реченні?
  items:
  - question: 'Яку роль відіграє дієслово «був» у реченні: «Був теплий вечір»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 0
  - question: 'Яку роль відіграє дієслово «сідало» у реченні: «Сонце повільно сідало
      за обрій»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 0
  - question: 'Яку роль відіграє дієслово «грала» у реченні: «Поки я читав, музика
      тихо грала»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 1
  - question: 'Яку роль відіграє дієслово «пролунав» у реченні: «Раптом пролунав страшний
      вибух»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 2
  - question: 'Яку роль відіграє дієслово «встав» у реченні: «Він швидко встав зі
      стільця»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 3
  - question: 'Яку роль відіграє дієслово «розбилася» у реченні: «Склянка впала і
      розбилася»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 3
  - question: 'Яку роль відіграє дієслово «пили» у реченні: «Ми неспішно пили холодний
      лимонад»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 1
  - question: 'Яку роль відіграє дієслово «закричав» у реченні: «Хтось несподівано
      закричав від жаху»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 2
  - question: 'Яку роль відіграє дієслово «йшов» у реченні: «У цей час на вулиці йшов
      сильний дощ»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 0
  - question: 'Яку роль відіграє дієслово «вийшов» у реченні: «Я одягнувся, вийшов
      з дому і сів у машину»?'
    options:
    - Тло (опис стану чи природи)
    - Тло (одночасна паралельна дія)
    - Подія (раптовий поворотний момент)
    - Подія (одна з послідовних дій)
    correct: 3
- id: match-narrative-function-impf
  type: match-up
  instruction: З'єднайте наративну функцію з відповідним видом дієслова.
  pairs:
  - left: Створення загальної атмосфери (декорації)
    right: Недоконаний вид (тло)
  - left: Опис двох або більше паралельних процесів
    right: Недоконаний вид (тло)
  - left: Регулярна рутина і звички в минулому
    right: Недоконаний вид (тло)
  - left: Внутрішній ментальний стан і почуття
    right: Недоконаний вид (тло)
  - left: Раптовий поворотний момент сюжету
    right: Доконаний вид (передній план)
  - left: Послідовний ланцюжок нових кроків
    right: Доконаний вид (передній план)
  - left: Фінальний результат або закінчення події
    right: Доконаний вид (передній план)
  - left: Швидке переривання довгої дії
    right: Доконаний вид (передній план)
- id: group-sort-connectors
  type: group-sort
  instruction: Розподіліть слова-конектори за їхньою типовою роллю в розповіді.
  groups:
  - label: Тло (Недоконаний вид)
    items:
    - тим часом
    - поки
    - у цей час
    - зазвичай
    - увесь час
  - label: Передній план (Доконаний вид)
    items:
    - раптом
    - потім
    - нарешті
    - після цього
    - спочатку
- id: fill-in-aspect-narrative
  type: fill-in
  instruction: Оберіть правильний вид дієслова для кожної частини розповіді.
  items:
  - sentence: Була пізня ніч, велике місто міцно ____.
    answer: спало
    options:
    - спало
    - заснуло
    - спати
    - поспало
  - sentence: Поки я ____ книгу, мій кіт Макс лежав поруч.
    answer: читав
    options:
    - читав
    - прочитав
    - читати
    - читаю
  - sentence: Раптом хтось дуже голосно ____ у мої двері.
    answer: постукав
    options:
    - постукав
    - стукав
    - стукати
    - постукає
  - sentence: Я швидко ____ від цього несподіваного звуку.
    answer: прокинувся
    options:
    - прокинувся
    - прокидався
    - прокинутися
    - прокидаюсь
  - sentence: Спочатку я обережно ____ до темного вікна.
    answer: підійшов
    options:
    - підійшов
    - підходив
    - підійти
    - підходить
  - sentence: Надворі дуже повільно ____ густий білий сніг.
    answer: йшов
    options:
    - йшов
    - пішов
    - йти
    - йде
  - sentence: Потім я повернувся і швидко ____ двері.
    answer: відчинив
    options:
    - відчинив
    - відчиняв
    - відчинити
    - відчиняє
  - sentence: Там нікого не було, і я нарешті ____.
    answer: заспокоївся
    options:
    - заспокоївся
    - заспокоювався
    - заспокоїтися
    - заспокоюсь
workbook:
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте дієслова недоконаного виду з їхніми парами доконаного виду.
  pairs:
  - left: виходити
    right: вийти
  - left: відчиняти
    right: відчинити
  - left: сідати
    right: сісти
  - left: прокидатися
    right: прокинутися
  - left: стукати
    right: постукати
  - left: підходити
    right: підійти
  - left: заспокоюватися
    right: заспокоїтися
  - left: вставати
    right: встати
- id: translate-aspect-sentences
  type: translate
  instruction: Оберіть правильний переклад речення, звертаючи особливу увагу на вид
    дієслова (тло чи подія).
  items:
  - source: We were sitting in a cafe and drinking lemonade.
    options:
    - text: Ми сиділи в кафе і пили лимонад.
      correct: true
    - text: Ми сіли в кафе і випили лимонад.
      correct: false
  - source: Suddenly, the music stopped.
    options:
    - text: Раптом музика змовкла.
      correct: true
    - text: Раптом музика замовкала.
      correct: false
  - source: While I was reading, he was cooking dinner.
    options:
    - text: Поки я читав, він готував вечерю.
      correct: true
    - text: Поки я прочитав, він приготував вечерю.
      correct: false
  - source: First he opened the door, then he entered the room.
    options:
    - text: Спочатку він відчинив двері, потім зайшов до кімнати.
      correct: true
    - text: Спочатку він відчиняв двері, потім заходив до кімнати.
      correct: false
  - source: The sun was shining brightly in the sky.
    options:
    - text: На небі яскраво світило сонце.
      correct: true
    - text: На небі яскраво засвітило сонце.
      correct: false
  - source: At last, we found a new job.
    options:
    - text: Нарешті ми знайшли нову роботу.
      correct: true
    - text: Нарешті ми знаходили нову роботу.
      correct: false
- type: essay-response
  prompt: Напишіть коротке оповідання (8-10 речень) про несподівану подію, яка трапилася
    з вами або вашим другом. Спочатку свідомо використайте дієслова недоконаного виду
    для створення тла і атмосфери, а потім дієслова доконаного виду для опису самих
    різких подій. Використайте хоча б кілька слів-конекторів (спочатку, раптом, потім,
    нарешті, тим часом).
  min_words: 50
  model_answer: Був теплий осінній вечір. Я сидів у своїй кімнаті і спокійно читав
    цікаву книгу. За вікном тихо шумів вітер, а на столі стояла гаряча кава. Тим часом
    мій кіт Макс солодко спав на старому дивані. Це була дуже приємна атмосфера. Раптом
    у темному коридорі пролунав гучний і страшний звук. Я здригнувся і швидко підвівся
    з крісла. Спочатку я обережно відчинив двері своєї кімнати. Потім я побачив, що
    моя улюблена велика ваза впала на підлогу і повністю розбилася. Макс перелякано
    побіг на кухню і сховався. Нарешті я зібрав усі дрібні уламки і заспокоїв кота.
    Після цього ми знову повернулися до кімнати відпочивати.
