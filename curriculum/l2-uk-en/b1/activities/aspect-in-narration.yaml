version: '1.0'
module: aspect-in-narration
level: b1
inline:
- id: quiz-aspect-analysis
  type: quiz
  instruction: Визначте наративну роль і граматичний вид виділеного дієслова у тексті.
  items:
  - question: Учора ввечері ми дуже довго і спокійно **сиділи** на відкритій терасі.
    options:
    - Недоконаний вид (атмосферне тло)
    - Доконаний вид (завершена подія)
    - Недоконаний вид (раптовий поворот)
    - Доконаний вид (одночасна дія)
    correct: 0
  - question: Раптом десь недалеко **пролунав** сильний і страшний вибух.
    options:
    - Недоконаний вид (атмосферне тло)
    - Доконаний вид (раптова подія)
    - Недоконаний вид (тривалий процес)
    - Доконаний вид (звичне тло)
    correct: 1
  - question: Моя склянка миттєво **розбилася** на дрібні гострі шматочки.
    options:
    - Доконаний вид (конкретний результат)
    - Недоконаний вид (емоційне тло)
    - Доконаний вид (паралельна дія)
    - Недоконаний вид (послідовна дія)
    correct: 0
  - question: Навколо тихо **грала** приємна джазова музика.
    options:
    - Недоконаний вид (декорація і тло)
    - Доконаний вид (послідовна подія)
    - Недоконаний вид (раптова зміна)
    - Доконаний вид (емоційний результат)
    correct: 0
  - question: Мій переляканий друг швидко **схопив** мене за руку.
    options:
    - Недоконаний вид (атмосферне тло)
    - Доконаний вид (поворотний момент)
    - Недоконаний вид (ментальне тло)
    - Доконаний вид (одночасна дія)
    correct: 1
  - question: Поки ми чекали на допомогу, сонце повільно **сідало** за далекий обрій.
    options:
    - Недоконаний вид (паралельний процес)
    - Доконаний вид (конкретний результат)
    - Недоконаний вид (раптова подія)
    - Доконаний вид (звичне тло)
    correct: 0
- id: match-narrative-function-impf
  type: match-up
  instruction: З'єднайте наративну функцію з правильним граматичним видом дієслова.
  pairs:
  - left: Створення загальної атмосфери (тло)
    right: Недоконаний вид
  - left: Опис раптової і несподіваної події
    right: Доконаний вид
  - left: Розповідь про паралельні дії (поки...)
    right: Недоконаний вид
  - left: Послідовний ланцюжок нових дій
    right: Доконаний вид
  - left: Довгий психологічний стан чи емоція
    right: Недоконаний вид
  - left: Досягнення фінального результату
    right: Доконаний вид
  - left: Опис регулярної минулої звички (рутина)
    right: Недоконаний вид
  - left: Несподіваний поворотний момент сюжету
    right: Доконаний вид
- id: group-sort-connectors
  type: group-sort
  instruction: Розподіліть слова-конектори за граматичним видом, з яким вони зазвичай
    використовуються.
  groups:
  - label: Тло (Недоконаний вид)
    items:
    - тим часом
    - поки
    - у цей час
    - зазвичай
    - часто
  - label: Передній план (Доконаний вид)
    items:
    - раптом
    - спочатку
    - потім
    - нарешті
    - після цього
- id: fill-in-aspect-narrative
  type: fill-in
  instruction: Оберіть дієслово правильного виду для цієї розповіді.
  items:
  - sentence: Був пізній вечір. Надворі тихо _____ густий сніг.
    answer: йшов
    options:
    - йшов
    - пішов
  - sentence: Ми з другом довго _____ в кімнаті і спокійно пили чай.
    answer: сиділи
    options:
    - сиділи
    - сіли
  - sentence: _____ в наші двері хтось голосно постукав.
    answer: Раптом
    options:
    - Раптом
    - Поки
  - sentence: Я швидко _____ з крісла і підійшов до великого вікна.
    answer: встав
    options:
    - встав
    - вставав
  - sentence: _____ я обережно відчинив двері, але там нікого не було.
    answer: Потім
    options:
    - Потім
    - Тим часом
  - sentence: Я полегшено зітхнув і зрозумів, що це мені тільки _____.
    answer: здалося
    options:
    - здалося
    - здавалося
  - sentence: Поки я стояв біля вікна, стара лампа в кімнаті все ще рівно _____.
    answer: світила
    options:
    - світила
    - засвітила
  - sentence: Я міцно зачинив важкі двері і _____ повернувся до своєї цікавої книги.
    answer: нарешті
    options:
    - нарешті
    - зазвичай
- id: error-correction-narrative
  type: error-correction
  instruction: Знайдіть і виправте помилку у використанні граматичного виду.
  items:
  - sentence: Була чудова погода, на безхмарному небі яскраво засвітило сонце.
    error: засвітило
    correction: світило
    error_type: word
    options:
    - світило
    - світитиме
    - посвітить
    explanation: Для створення описового тла і тривалої атмосфери потрібен недоконаний
      вид (світило).
  - sentence: Я повільно пив гарячу каву, як раптом мій телефон дзвонив.
    error: дзвонив
    correction: задзвонив
    error_type: word
    options:
    - задзвонив
    - подзвонить
    - дзвонитиме
    explanation: Слово 'раптом' вказує на нову несподівану подію, тому потрібен доконаний
      вид (задзвонив).
  - sentence: Поки вона готувала смачну вечерю, він прочитав цікаву книгу.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - прочитає
    - читатиме
    explanation: Дві дії відбуваються паралельно ('поки'), тому обидві мають бути
      недоконаного виду.
  - sentence: Учора я прокидався, швидко одягався і йшов на роботу.
    error: прокидався
    correction: прокинувся
    error_type: word
    options:
    - прокинувся
    - прокинеться
    - прокидатиметься
    explanation: Це послідовний ланцюжок унікальних подій, який вимагає доконаного
      виду для кожної швидкої дії.
  - sentence: Він зайшов у темну кімнату і повільно вмикав світло.
    error: вмикав
    correction: увімкнув
    error_type: word
    options:
    - увімкнув
    - увімкне
    - вмикає
    explanation: Дія повністю завершена і відбувається одразу після іншої події ('зайшов'),
      це передній план історії.
  - sentence: Ми дуже довго говорили, і після цього я нарешті розумів його серйозну
      проблему.
    error: розумів
    correction: зрозумів
    error_type: word
    options:
    - зрозумів
    - розумітиму
    - зрозуміє
    explanation: Слова 'після цього' і 'нарешті' чітко вказують на остаточний фінальний
      результат, тому потрібен доконаний вид.
- id: open-writing-narrative
  type: essay-response
  instruction: Напишіть коротке оповідання (8-10 речень) про несподівану подію у вашому
    житті.
  prompt: Свідомо використовуйте недоконаний вид дієслів для створення спокійного
    тла на самому початку розповіді та доконаний вид для динамічних подій переднього
    плану, коли ситуація раптом змінилася.
  min_words: 50
workbook:
- type: match-up
  instruction: З'єднайте недоконаний вид із доконаним (утворіть видові пари).
  pairs:
  - left: сидіти
    right: посидіти
  - left: вставати
    right: встати
  - left: виходити
    right: вийти
  - left: розуміти
    right: зрозуміти
  - left: дути
    right: подути
  - left: кидати
    right: кинути
  - left: зупинятися
    right: зупинитися
- type: group-sort
  instruction: Розподіліть дієслова за граматичним видом (доконаний чи недоконаний).
  groups:
  - label: Недоконаний вид
    items:
    - сидіти
    - вставати
    - світити
    - грати
    - чекати
    - розуміти
  - label: Доконаний вид
    items:
    - увімкнути
    - розбитися
    - схопити
    - вийти
    - подути
    - задзвонити
- type: true-false
  instruction: Правда чи ні? Оцініть ці твердження про роль граматичного виду в українській
    розповіді.
  items:
  - statement: Недоконаний вид використовується переважно для опису дуже динамічного
      переднього плану захопливої історії.
    correct: false
    explanation: Недоконаний вид створює широке і статичне тло, а доконаний вид —
      це динамічний передній план.
  - statement: Слова-конектори 'раптом' та 'нарешті' найчастіше вживаються саме з
      дієсловами доконаного виду.
    correct: true
    explanation: Вони чітко маркують несподівані поворотні моменти та логічні фінальні
      результати (передній план).
  - statement: Для точного опису кількох різних дій, що довго відбуваються одночасно
      ('поки'), потрібен виключно недоконаний вид.
    correct: true
    explanation: Паралельні одночасні дії — це завжди розтягнуті в часі процеси, які
      є типовими для недоконаного виду.
  - statement: Дуже швидкий послідовний ланцюжок нових сюжетних подій завжди будується
      за допомогою недоконаного виду.
    correct: false
    explanation: Ланцюжок остаточно завершених результатів (що йдуть строго одне за
      одним) — це завжди доконаний вид.
  - statement: Довгий внутрішній емоційний стан або глибокі переживання героя зазвичай
      передаються недоконаним видом.
    correct: true
    explanation: Внутрішній ментальний стан (наприклад, 'дуже хвилюватися') є тривалим
      атмосферним тлом для майбутніх подій.
  - statement: Щоб створити максимально напружену, швидку і цікаву історію, потрібно
      назавжди уникати дієслів недоконаного виду.
    correct: false
    explanation: Гарна історія критично потребує правильного чергування видів; без
      описового тла вона швидко стане схожою на сухий і нудний поліцейський звіт.
- type: order
  instruction: Розставте ці короткі речення в правильному логічному порядку, щоб утворити
    красиву атмосферну розповідь.
  items:
  - Був напрочуд теплий і дуже тихий вечір, на темному небі яскраво світили зорі.
  - Ми з моїми давніми друзями довго сиділи біля старого вогнища.
  - Поки ми спокійно розмовляли, навколо у лісі співали маленькі нічні пташки.
  - Раптом ми несподівано почули дуже дивний і гучний звук.
  - Ми всі швидко встали і дуже обережно підійшли до великих чорних дерев.
  - Нарешті ми побачили там дуже наляканого сусідського собаку.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
