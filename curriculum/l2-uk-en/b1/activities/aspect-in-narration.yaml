version: '1.0'
module: aspect-in-narration
level: b1
inline:
- id: quiz-aspect-analysis
  type: quiz
  instruction: Прочитайте речення. Визначте роль виділеного дієслова в розповіді.
  items:
  - question: Сонце повільно **сідало** за обрій.
    options:
    - тло (опис природи)
    - подія (раптова зміна)
    - тло (емоційний стан)
    - подія (фінальний результат)
    correct: 0
  - question: '**Був** теплий літній вечір.'
    options:
    - подія (конкретний крок)
    - тло (атмосферний фон)
    - тло (паралельна дія)
    - подія (точка неповернення)
    correct: 1
  - question: Раптом десь далеко **пролунав** вибух.
    options:
    - тло (постійний шум)
    - подія (паралельний процес)
    - подія (несподіване переривання)
    - тло (звичка)
    correct: 2
  - question: Люди за сусідніми столиками **розмовляли**.
    options:
    - подія (одноразовий крок)
    - тло (результат)
    - подія (різка зміна)
    - тло (паралельні дії)
    correct: 3
  - question: Вона **не розуміла**, що відбувається.
    options:
    - тло (емоційний або ментальний стан)
    - подія (швидка реакція)
    - тло (опис погоди)
    - подія (логічний фінал)
    correct: 0
  - question: Усі відвідувачі ресторану миттєво **підвелися**.
    options:
    - тло (статика)
    - подія (швидка реакція)
    - подія (тривалий процес)
    - тло (звичка)
    correct: 1
  - question: Раніше я завжди **вставав** о шостій годині ранку.
    options:
    - подія (раптовий факт)
    - тло (одночасність)
    - тло (звичка або рутина)
    - подія (результат)
    correct: 2
  - question: Після довгих роздумів він нарешті **ухвалив** рішення.
    options:
    - тло (роздуми)
    - подія (паралельна дія)
    - тло (опис інтер'єру)
    - подія (логічний результат)
    correct: 3
  - question: Поки я готував, мій брат **слухав** музику.
    options:
    - тло (паралельна дія)
    - подія (переривання)
    - тло (результат)
    - подія (рутина)
    correct: 0
  - question: Склянка впала і **розбилася**.
    options:
    - тло (атмосферний фон)
    - подія (завершений факт)
    - подія (звичка)
    - тло (паралельна дія)
    correct: 1
- id: group-sort-connectors
  type: group-sort
  instruction: 'Розподіліть часові конектори за категоріями: для фону або для ланцюжка
    подій.'
  groups:
  - label: Тло (недоконаний вид)
    items:
    - тим часом
    - поки
    - у цей час
    - зазвичай
    - увесь час
  - label: Передній план (доконаний вид)
    items:
    - потім
    - раптом
    - нарешті
    - спочатку
    - після цього
- id: fill-in-aspect-narrative
  type: fill-in
  instruction: Оберіть правильний вид дієслова для контексту розповіді.
  items:
  - sentence: Того вечора місто вже давно _____, було дуже тихо.
    answer: спало
    options:
    - спало
    - заснуло
    - поспало
    - спали
  - sentence: Ми гуляли порожнім парком, і раптом _____ сильний дощ.
    answer: пішов
    options:
    - ішов
    - пішов
    - йшли
    - пішли
  - sentence: Поки я готував вечерю, мій брат _____ телевізор.
    answer: дивився
    options:
    - подивився
    - дивився
    - подивилися
    - дивилися
  - sentence: Він відчинив двері, зайшов до хати і _____ світло.
    answer: увімкнув
    options:
    - вмикав
    - увімкнув
    - вмикали
    - увімкнули
  - sentence: Сонце повільно сідало за високі пагорби, і на вулицях _____ темніше.
    answer: ставало
    options:
    - ставало
    - стало
    - ставали
    - стали
  - sentence: Після довгих роздумів вона нарешті _____ рішення залишитися.
    answer: ухвалила
    options:
    - ухвалювала
    - ухвалила
    - ухвалювали
    - ухвалили
  - sentence: Раніше я зазвичай _____ о шостій годині ранку і бігав у парку.
    answer: вставав
    options:
    - вставав
    - встав
    - вставали
    - встали
  - sentence: Я миттю прокинувся, встав з ліжка і _____ до вікна.
    answer: підійшов
    options:
    - підходив
    - підійшов
    - підходили
    - підійшли
- id: match-aspect-logic
  type: match-up
  instruction: З'єднайте функцію розповіді з правильним видом дієслова.
  pairs:
  - left: Опис атмосфери та погоди
    right: Тло (опис, недоконаний)
  - left: Послідовний ланцюжок кроків
    right: Подія (кроки, доконаний)
  - left: Емоційний стан і думки
    right: Тло (емоції, недоконаний)
  - left: Логічний фінал і результат
    right: Подія (результат, доконаний)
  - left: Дві дії, що відбуваються одночасно
    right: Тло (паралельність, недоконаний)
  - left: Раптова, несподівана зміна
    right: Подія (зміна, доконаний)
  - left: Типова звичка у минулому
    right: Тло (звичка, недоконаний)
  - left: Точка неповернення в сюжеті
    right: Подія (фінал, доконаний)
workbook:
- type: group-sort
  instruction: 'Розподіліть дієслова на дві категорії: недоконаний вид (для опису
    тла) і доконаний вид (для ланцюжка подій).'
  groups:
  - label: Недоконаний вид (тло)
    items:
    - сидіти
    - пити
    - читати
    - світити
    - думати
    - розуміти
    - ставати
    - грати
  - label: Доконаний вид (передній план)
    items:
    - пролунати
    - впасти
    - розбитися
    - підвестися
    - увімкнути
    - ухвалити
    - прокинутися
    - зрозуміти
- type: fill-in
  instruction: Оберіть дієслово правильного виду (доконаного чи недоконаного) для
    кожного контексту.
  items:
  - sentence: Щовечора я _____ книгу перед сном, коли вдома було тихо.
    answer: читав
    options:
    - читав
    - прочитав
    - читали
    - прочитали
  - sentence: Учора я нарешті _____ цю довгу статтю до кінця.
    answer: прочитав
    options:
    - читав
    - прочитав
    - читали
    - прочитали
  - sentence: Студенти уважно _____ лекцію, поки викладач пояснював нову тему.
    answer: слухали
    options:
    - слухали
    - послухали
    - слухав
    - послухав
  - sentence: Він швидко _____ новини і вимкнув радіо.
    answer: послухав
    options:
    - слухав
    - послухав
    - слухали
    - послухали
  - sentence: Ми довго _____ в парку, бо була чудова погода.
    answer: гуляли
    options:
    - гуляли
    - погуляли
    - гуляв
    - погуляв
  - sentence: Вони _____ пів години на свіжому повітрі і повернулися додому.
    answer: погуляли
    options:
    - гуляли
    - погуляли
    - гуляв
    - погуляв
- type: essay-response
  prompt: Напишіть коротке оповідання (8-10 речень) про несподівану подію, яка трапилася
    з вами. Використовуйте недоконаний вид дієслів для опису тла (що відбувалося до
    події, атмосфера, ваші думки) і доконаний вид для самої події та послідовних реакцій
    на неї.
  min_words: 50
  evaluation_criteria:
  - Створення тла за допомогою 2-3 речень із дієсловами недоконаного виду.
  - Введення події за допомогою дієслова доконаного виду (зі словом «раптом»).
  - 'Опис послідовності кроків: 2-3 дієслова доконаного виду («спочатку», «потім»).'
  - Правильне використання часових конекторів («поки» для тла; «після цього» для подій).
