- id: fill-in-genitive-plural-in
  type: fill-in
  instruction: Напишіть форму родового відмінка множини (багато кого?).
  items:
  - sentence: У Києві живе багато ____.
    answer: киян
  - sentence: Держава захищає права своїх ____.
    answer: громадян
  - sentence: На ярмарку було багато місцевих ____.
    answer: селян
  - sentence: До міста приїхало багато ____.
    answer: львів'ян
  - sentence: На фестивалі виступало багато ____.
    answer: болгар
  - sentence: Але на виставці також було багато ____.
    answer: грузинів
  title: Напишіть форму родового відмінка множини (багато кого?).
- id: group-sort-ar-yar
  type: group-sort
  instruction: Розподіліть іменники за суфіксами.
  groups:
  - label: Суфікс -ар
    items:
    - лікар
    - кухар
    - бондар
    - кобзар
  - label: Суфікс -яр
    items:
    - школяр
    - каменяр
    - столяр
    - бджоляр
  - label: Суфікс -ин / -янин
    items:
    - киянин
    - селянин
    - громадянин
    - болгарин
  title: Розподіліть іменники за суфіксами.
workbook:
- type: fill-in
  instruction: Вставте правильну форму іменника в орудному або кличному відмінку.
  items:
  - sentence: Коли я виросту, я хочу стати ____.
    answer: лікарем
  - sentence: Шановний ____, покажіть ваш паспорт.
    answer: громадянине
  - sentence: Ми завжди пишалися цим відомим ____.
    answer: піснярем
  - sentence: Мій юний ____, не забувай читати книги.
    answer: школяре
  - sentence: Сьогодні він працює ____ у ресторані.
    answer: кухарем
  - sentence: Пане ____, вітаємо вас зі святом!
    answer: ювіляре
  - sentence: Мій прадід був місцевим ____.
    answer: бондарем
  - sentence: Шановний ____, як пройти до метро?
    answer: киянине
  title: Вставте правильну форму іменника в орудному або кличному відмінку.
