version: '1.0'
module: noun-subclasses-masculine
level: b1
inline:
- id: match-up-professions
  type: match-up
  instruction: З'єднайте назву людини за професією або походженням із базовим словом,
    від якого вона утворена
  pairs:
  - left: пекар
    right: пекти
  - left: школяр
    right: школа
  - left: киянин
    right: Київ
  - left: столяр
    right: стіл
  - left: лікар
    right: лікувати
  - left: львів'янин
    right: Львів
  - left: бондар
    right: бодна
  - left: бджоляр
    right: бджола
- id: fill-in-ar-declension
  type: fill-in
  instruction: Вставте правильну форму іменника на -ар (зверніть увагу на тверду чи
    м'яку групу)
  items:
  - sentence: Сьогодні на роботі немає головного ____.
    answer: лікаря
    options:
    - лікаря
    - лікара
    - лікарю
  - sentence: Він працює ____ у лікарні.
    answer: санітаром
    options:
    - санітаром
    - санітарем
    - санітарю
  - sentence: Шановний ____, допоможіть мені, будь ласка!
    answer: лікарю
    options:
    - лікарю
    - лікаре
    - лікар
  - sentence: Мій брат мріє працювати ____ у ресторані.
    answer: кухарем
    options:
    - кухарем
    - кухаром
    - кухарі
  - sentence: Ми довго розмовляли з місцевим ____.
    answer: столярем
    options:
    - столярем
    - столяром
    - столярі
  - sentence: Пане ____, вітаємо вас зі святом!
    answer: ювіляре
    options:
    - ювіляре
    - ювілярю
    - ювіляр
  - sentence: У нашій клініці працює багато ____.
    answer: лікарів
    options:
    - лікарів
    - лікарей
    - лікар
  - sentence: Я купив цей свіжий хліб у найкращого ____.
    answer: пекаря
    options:
    - пекаря
    - пекара
    - пекарі
- id: group-sort-ar-yar
  type: group-sort
  instruction: Розподіліть іменники за типом відмінювання (тверда, м'яка або мішана
    група)
  groups:
  - label: Тверда група
    items:
    - гончар
    - санітар
    - ювіляр
    - косар
  - label: М'яка група
    items:
    - лікар
    - пекар
    - токар
    - столяр
  - label: Мішана група
    items:
    - школяр
    - каменяр
    - бджоляр
    - пісняр
- id: quiz-plural-in
  type: quiz
  instruction: Оберіть правильну форму множини для іменників на -ин / -янин
  items:
  - question: киянин
    options:
    - кияни
    - киянини
    - киянин
    - кияні
    correct: 0
  - question: селянин
    options:
    - селяни
    - селянини
    - селяні
    - селян
    correct: 0
  - question: громадянин
    options:
    - громадяни
    - громадянини
    - громадяні
    - громадяне
    correct: 0
  - question: львів'янин
    options:
    - львів'яни
    - львів'янини
    - львів'яні
    - львів'яне
    correct: 0
  - question: болгарин
    options:
    - болгари
    - болгарини
    - болгарі
    - болгаре
    correct: 0
  - question: татарин
    options:
    - татари
    - татарини
    - татарі
    - татаре
    correct: 0
  - question: галичанин
    options:
    - галичани
    - галичанини
    - галичані
    - галичанє
    correct: 0
  - question: містянин
    options:
    - містяни
    - містянини
    - містяні
    - містян
    correct: 0
- id: fill-in-genitive-plural-in
  type: fill-in
  instruction: Утворіть форму родового відмінка множини (кого? чого? - багато...)
  items:
  - sentence: На площі зібралося багато ____.
    answer: громадян
    options:
    - громадян
    - громадянів
    - громадянинів
  - sentence: У столиці живе понад три мільйони ____.
    answer: киян
    options:
    - киян
    - киянів
    - киянинів
  - sentence: Він вивчає давні традиції українських ____.
    answer: селян
    options:
    - селян
    - селянів
    - селянинів
  - sentence: Серед студентів університету було багато ____.
    answer: львів'ян
    options:
    - львів'ян
    - львів'янів
    - львів'янинів
  - sentence: На міжнародний фестиваль приїхало багато ____.
    answer: болгар
    options:
    - болгар
    - болгарів
    - болгаринів
  - sentence: У цьому спальному районі мешкає кілька тисяч ____.
    answer: містян
    options:
    - містян
    - містянів
    - містянинів
- id: error-correction-in
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку у відмінюванні
  items:
  - sentence: Привіт, мій юний школярю!
    error: школярю
    correction: школяре
    error_type: word
    options:
    - школяре
    - школяра
    - школяром
    explanation: Слово 'школяр' належить до мішаної групи, тому в кличному відмінку
      обов'язково має закінчення -е.
  - sentence: На вулиці Хрещатик сьогодні дуже багато киянів.
    error: киянів
    correction: киян
    error_type: word
    options:
    - киян
    - кияни
    - киянами
    explanation: Іменники на -ин у родовому відмінку множини завжди мають нульове
      закінчення (суфікс зникає).
  - sentence: Мій дідусь усе життя працював столяром.
    error: столяром
    correction: столярем
    error_type: word
    options:
    - столярем
    - столярі
    - столяря
    explanation: Слово 'столяр' історично належить до м'якої групи, тому в орудному
      відмінку має закінчення -ем.
  - sentence: Усі ці люди — відповідальні громадянини України.
    error: громадянини
    correction: громадяни
    error_type: word
    options:
    - громадяни
    - громадян
    - громадянам
    explanation: У множині суфікс -ин випадає. Тому правильна форма — громадяни.
  - sentence: Він завжди мріяв стати відомим пекаром.
    error: пекаром
    correction: пекарем
    error_type: word
    options:
    - пекарем
    - пекарі
    - пекарю
    explanation: Слово 'пекар' належить до м'якої групи (родовий — пекаря), тому в
      орудному відмінку воно має закінчення -ем.
  - sentence: Я щиро пишаюся цим мужнім громадянинем.
    error: громадянинем
    correction: громадянином
    error_type: word
    options:
    - громадянином
    - громадяном
    - громадянами
    explanation: Слово 'громадянин' в однині належить до твердої групи другої відміни,
      тому в орудному відмінку має закінчення -ом.
workbook:
- type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про відмінювання іменників
    на -ар, -яр та -ин
  items:
  - statement: Слово 'лікар' в орудному відмінку однини має форму 'лікаром'.
    correct: false
    explanation: Слово 'лікар' належить до м'якої групи, тому правильна нормативна
      форма — 'лікарем'.
  - statement: У множині суфікс -ин (наприклад, у слові 'киянин') завжди зникає.
    correct: true
    explanation: Так, правильно казати 'кияни', 'селяни', 'громадяни'.
  - statement: Слово 'школяр' у кличному відмінку має форму 'школяре!'.
    correct: true
    explanation: Це слово належить до мішаної групи, тому в кличному відмінку отримує
      закінчення -е.
  - statement: Родовий відмінок множини від слова 'селянин' — 'селянів'.
    correct: false
    explanation: 'Ці слова мають нульове закінчення в родовому відмінку множини: багато
      ''селян'', ''громадян'', ''киян''.'
  - statement: Слово 'грузин' у родовому відмінку множини має форму 'грузинів'.
    correct: true
    explanation: Це важливий виняток. Суфікс -ин міцно зрісся з основою, тому слово
      зберігає закінчення -ів.
  - statement: Запозичені слова на -ар з постійним наголосом (наприклад, 'санітар')
      належать до м'якої групи.
    correct: false
    explanation: Запозичені слова з постійним наголосом на основі належать до твердої
      групи (санітаром, ювіляром).
- type: translate
  instruction: Оберіть правильний український переклад, звертаючи увагу на відмінки
    та форму слів
  items:
  - source: He works as a doctor.
    options:
    - text: Він працює лікарем.
      correct: true
    - text: Він працює як лікар.
      correct: false
    - text: Він працює лікаром.
      correct: false
  - source: There are many citizens here.
    options:
    - text: Тут багато громадян.
      correct: true
    - text: Тут багато громадянів.
      correct: false
    - text: Тут багато громадянинів.
      correct: false
  - source: Dear student!
    options:
    - text: Дорогий школяре!
      correct: true
    - text: Дорогий школярю!
      correct: false
    - text: Дорогий школяр!
      correct: false
  - source: My brother is a carpenter.
    options:
    - text: Мій брат — столяр.
      correct: true
    - text: Мій брат — тесляр.
      correct: false
    - text: Мій брат — слюсар.
      correct: false
  - source: They are from Kyiv.
    options:
    - text: Вони — кияни.
      correct: true
    - text: Вони — киянини.
      correct: false
    - text: Вони — київці.
      correct: false
  - source: I am talking to a Kyivan.
    options:
    - text: Я розмовляю з киянином.
      correct: true
    - text: Я розмовляю з киянинем.
      correct: false
    - text: Я розмовляю з киянами.
      correct: false
- type: unjumble
  instruction: Складіть правильне речення зі слів (зверніть увагу на відмінки професій)
  items:
  - words:
    - працює
    - Мій
    - лікарем.
    - батько
    correct_order:
    - Мій
    - батько
    - працює
    - лікарем.
  - words:
    - багато
    - В
    - громадян.
    - Україні
    - відповідальних
    correct_order:
    - В
    - Україні
    - багато
    - відповідальних
    - громадян.
  - words:
    - розмовляв
    - відомим
    - Я
    - з
    - кобзарем.
    correct_order:
    - Я
    - розмовляв
    - з
    - відомим
    - кобзарем.
  - words:
    - Школярі
    - нові
    - отримали
    - підручники.
    correct_order:
    - Школярі
    - отримали
    - нові
    - підручники.
  - words:
    - лікарю,
    - мені!
    - Шановний
    - допоможіть
    correct_order:
    - Шановний
    - лікарю,
    - допоможіть
    - мені!
  - words:
    - столярем.
    - Він
    - працював
    - ніколи
    - не
    correct_order:
    - Він
    - ніколи
    - не
    - працював
    - столярем.
