- type: group-sort
  instruction: До якої групи належать ці іменники? Згадайте правило про наголос та
    суфікси.
  groups:
  - label: Тверда група
    items:
    - ювіляр
    - столяр
    - громадянин
    - санітар
  - label: М'яка група
    items:
    - лікар
    - пекар
    - кобзар
    - косар
  - label: Мішана група
    items:
    - школяр
    - каменяр
    - пісняр
    - бджоляр
  title: До якої групи належать ці іменники? Згадайте правило про наголос та суфікси.
- type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в реченнях.
  items:
  - sentence: Він працює столярем на фабриці.
    error: столярем
    correction: столяром
    error_type: word
    options:
    - столяром
    - столярі
    - столяру
    explanation: Слово «столяр» має постійний наголос на корені і належить до твердої
      групи.
  - sentence: Дорогий лікаре, дякую за допомогу.
    error: лікаре
    correction: лікарю
    error_type: word
    options:
    - лікарю
    - лікарем
    - лікаря
    explanation: Слово «лікар» належить до м'якої групи, тому в кличному відмінку
      має закінчення -ю.
  - sentence: Усі мої друзі — львів'янини.
    error: львів'янини
    correction: львів'яни
    error_type: word
    options:
    - львів'яни
    - львів'ян
    - львів'янами
    explanation: Суфікс -ин випадає у множині.
  - sentence: Мій брат мріє стати кобзаром.
    error: кобзаром
    correction: кобзарем
    error_type: word
    options:
    - кобзарем
    - кобзарі
    - кобзаря
    explanation: Слово «кобзар» має рухомий наголос і належить до м'якої групи.
  - sentence: Шановний школярю, сідай за парту.
    error: школярю
    correction: школяре
    error_type: word
    options:
    - школяре
    - школярем
    - школяра
    explanation: Слово «школяр» належить до мішаної групи і в кличному відмінку має
      закінчення -е.
  - sentence: У парку гуляло багато міщанів.
    error: міщанів
    correction: міщан
    error_type: word
    options:
    - міщан
    - міщани
    - міщанами
    explanation: Слова на -ин/-янин у родовому відмінку множини мають нульове закінчення.
  title: Знайдіть і виправте граматичну помилку в реченнях.
