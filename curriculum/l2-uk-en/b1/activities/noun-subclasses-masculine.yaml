version: '1.0'
module: noun-subclasses-masculine
level: b1
inline:
- id: match-up-professions
  type: match-up
  instruction: З'єднайте слова, що позначають професії або походження, з їхніми базовими
    словами.
  pairs:
  - left: пекар
    right: пекти
  - left: лікар
    right: лікувати
  - left: столяр
    right: стіл
  - left: киянин
    right: Київ
  - left: полтавчанин
    right: Полтава
  - left: бондар
    right: бодня
  - left: бджоляр
    right: бджола
  - left: школяр
    right: школа
  title: З'єднайте слова, що позначають професії або походження, з їхніми базовими
    словам
- id: fill-in-ar-declension
  type: fill-in
  instruction: Вставте правильну форму слова в дужках (звертайте увагу на відмінок).
  items:
  - sentence: Він працює ____.
    answer: лікарем
  - sentence: Пане ____, дайте хліба.
    answer: пекарю
  - sentence: Мій дід був ____.
    answer: каменярем
  - sentence: Мій юний ____, вчися старанно!
    answer: школяре
  - sentence: Ми дуже поважаємо цього ____.
    answer: кобзаря
  - sentence: Мій брат хоче стати ____.
    answer: столяром
  - sentence: Сьогодні на роботі немає ____.
    answer: токаря
  - sentence: Він відомий на все село ____.
    answer: бджолярем
  title: Вставте правильну форму слова в дужках (звертайте увагу на відмінок).
