version: '1.0'
module: noun-subclasses-masculine
level: b1
workbook:
- type: fill-in
  instruction: Відміняйте іменники на -ар/-яр у вказаних відмінках. Вставте правильну
    форму.
  items:
  - sentence: Я хочу стати чудовим _____ (лікар).
    answer: лікарем
    options:
    - лікаром
    - лікарем
    - лікарю
  - sentence: У класі сьогодні немає жодного _____ (школяр).
    answer: школяра
    options:
    - школяра
    - школяру
    - школярем
  - sentence: На площі ми слухали старовинну пісню _____ (кобзар).
    answer: кобзаря
    options:
    - кобзаря
    - кобзарю
    - кобзарем
  - sentence: Пам'ятник видатному _____ (каменяр) Іванові Франку.
    answer: каменяреві
    options:
    - каменяру
    - каменяреві
    - каменярем
  - sentence: Він працює _____ (пекар) у новій міській пекарні.
    answer: пекарем
    options:
    - пекаром
    - пекарем
    - пекаря
  - sentence: На ярмарку ми купили глечик у місцевого _____ (гончар).
    answer: гончара
    options:
    - гончара
    - гончару
    - гончарем
  - sentence: Пане _____, допоможіть мені, будь ласка! (лікар)
    answer: лікарю
    options:
    - лікаре
    - лікарю
    - лікар
  - sentence: Мій дідусь був дуже хорошим _____ (бондар).
    answer: бондарем
    options:
    - бондарем
    - бондаром
    - бондарю
- type: quiz
  instruction: Оберіть правильну форму множини (називний відмінок).
  items:
  - question: киянин
    options:
    - киянини
    - кияни
    - киян
    - кияні
    correct: 1
  - question: громадянин
    options:
    - громадянини
    - громадян
    - громадяни
    - громадяне
    correct: 2
  - question: селянин
    options:
    - селяни
    - селянини
    - селян
    - селяне
    correct: 0
  - question: міщанин
    options:
    - міщан
    - міщанини
    - міщані
    - міщани
    correct: 3
  - question: львів'янин
    options:
    - львів'яни
    - львів'янини
    - львів'ян
    - львів'яне
    correct: 0
  - question: болгарин
    options:
    - болгарини
    - болгар
    - болгарі
    - болгари
    correct: 3
  - question: татарин
    options:
    - татарини
    - татари
    - татар
    - татаре
    correct: 1
  - question: харків'янин
    options:
    - харків'янини
    - харків'ян
    - харків'яни
    - харків'яне
    correct: 2
- type: fill-in
  instruction: Вставте правильну форму родового відмінка множини (багато/немає кого?).
  items:
  - sentence: На площі зібралося багато _____ (киянин).
    answer: киян
    options:
    - киян
    - киянів
    - киянинів
  - sentence: Держава повинна захищати всіх своїх _____ (громадянин).
    answer: громадян
    options:
    - громадян
    - громадянів
    - громадянинів
  - sentence: У цьому великому місті майже не залишилося корінних _____ (міщанин).
    answer: міщан
    options:
    - міщан
    - міщанів
    - міщанинів
  - sentence: Ми опитали понад сто місцевих _____ (харків'янин).
    answer: харків'ян
    options:
    - харків'ян
    - харків'янів
    - харків'янинів
  - sentence: У старому селі жило дуже мало _____ (селянин).
    answer: селян
    options:
    - селян
    - селянів
    - селянинів
  - sentence: Ми дуже поважаємо культуру та традиції _____ (грузин).
    answer: грузинів
    options:
    - грузин
    - грузинів
    - грузининів
- type: match-up
  instruction: З'єднайте професію або назву мешканця з базовим словом, від якого вона
    походить.
  pairs:
  - left: пекар
    right: пекти
  - left: школяр
    right: школа
  - left: киянин
    right: Київ
  - left: лікар
    right: лікувати
  - left: каменяр
    right: камінь
  - left: пісняр
    right: пісня
  - left: львів'янин
    right: Львів
  - left: кобзар
    right: кобза
- type: group-sort
  instruction: Розподіліть іменники за суфіксом (-ар, -яр або -ин/-янин).
  groups:
  - label: Суфікс -ар
    items:
    - пекар
    - лікар
    - кобзар
    - гончар
  - label: Суфікс -яр
    items:
    - школяр
    - каменяр
    - пісняр
    - сміттяр
  - label: Суфікс -ин / -янин
    items:
    - киянин
    - селянин
    - громадянин
    - міщанин
- type: error-correction
  instruction: Знайдіть і виправте помилку у відмінюванні іменників.
  items:
  - sentence: На вулиці ми побачили багато киянинів.
    error: киянинів
    correction: киян
    error_type: word
    options:
    - киян
    - кияни
    - киянам
    explanation: Іменники на -ин у родовому відмінку множини зазвичай мають нульове
      закінчення (киян).
  - sentence: Він працював пекарьом понад двадцять років.
    error: пекарьом
    correction: пекарем
    error_type: word
    options:
    - пекарем
    - пекаром
    - пекарю
    explanation: Слово 'пекар' належить до твердої групи, але в орудному відмінку
      обов'язково має закінчення -ем.
  - sentence: Ми пишаємося нашою країною, і всі громадянини мають рівні права.
    error: громадянини
    correction: громадяни
    error_type: word
    options:
    - громадяни
    - громадян
    - громадянам
    explanation: 'У множині суфікс -ин випадає: громадянин -> громадяни.'
  - sentence: Я дуже хочу стати хорошим лікаром.
    error: лікаром
    correction: лікарем
    error_type: word
    options:
    - лікарем
    - лікарю
    - лікаря
    explanation: Слово 'лікар' належить до м'якої групи, тому в орудному відмінку
      має закінчення -ем.
  - sentence: Привіт, школяре! Як твої успіхи в новій школі?
    error: школяре
    correction: школярю
    error_type: word
    options:
    - школярю
    - школяром
    - школярі
    explanation: Слово 'школяр' належить до м'якої групи і в кличному відмінку має
      закінчення -ю.
  - sentence: Я купив цей гарний глечик у місцевих селянів.
    error: селянів
    correction: селян
    error_type: word
    options:
    - селян
    - селяни
    - селянам
    explanation: 'У родовому відмінку множини іменники на -янин мають нульове закінчення:
      багато селян.'
