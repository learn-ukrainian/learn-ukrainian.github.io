version: '1.0'
module: adjectives-comparative
level: b1
inline:
- id: reading-intro-concepts
  type: reading
  passage: В українській мові вищий ступінь порівняння показує, що певна ознака в
    одному об'єкті виявляється більшою мірою, ніж в іншому. Проста форма утворюється
    синтетично, за допомогою суфіксів -іш- або -ш- і гнучко змінюється за родами,
    числами та відмінками. Складена (аналітична) форма використовує незмінні слова
    «більш» або «менш» разом із початковою словниковою формою прикметника. Важливо
    пам'ятати, що здатність утворювати ступені порівняння мають виключно якісні прикметники.
    Деякі слова (наприклад, «сліпий» або «порожній») позначають абсолютні ознаки і
    логічно не можуть порівнюватися.
  questions:
  - Що показує вищий ступінь порівняння?
  - Яка група прикметників здатна утворювати ступені порівняння?
  - Чому такі слова, як «сліпий» або «порожній», ніколи не утворюють ступенів порівняння?
  - Які допоміжні слова потрібні для утворення складеної форми?
- id: essay-comparative-sentences
  type: essay-response
  prompt: 'Напишіть 5 речень, порівнюючи два різних міста або дві різні професії.
    Використовуйте нову лексику з розділу «Проста форма вищого ступеня» (наприклад:
    ширший, дорожчий, тихіший, цікавіший).'
  min_words: 50
  model_answer: Київ набагато більший за Львів за площею. Проте життя у Львові трохи
    тихіше і спокійніше. Оренда квартири в центрі столиці значно дорожча, ніж на околицях.
    Центральні вулиці у Києві набагато ширші. Але архітектура у Львові здається мені
    цікавішою!
- id: error-correction-simple-form
  type: error-correction
  instruction: Знайдіть і виправте помилки у реченнях на тему «Проста форма вищого
    ступеня».
  items:
  - sentence: Він високший за свого брата.
    error: високший
    correction: вищий
    error_type: word
    options:
    - вищий
    - високіший
    - найвищий
    explanation: При додаванні суфікса -ш- основа 'висок-' втрачає частинку '-ок-',
      а [с] + [ш] утворюють звук [шч], що позначається літерою 'щ'.
  - sentence: Цей телефон більш дорожчий.
    error: більш дорожчий
    correction: більш дорогий
    error_type: construction
    options:
    - більш дорогий
    - дорогіший
    - найдорожчий
    explanation: Не можна поєднувати слово 'більш' і просту форму вищого ступеня.
      Це стилістична надмірність (плеоназм).
  - sentence: Ця кімната вузькіша.
    error: вузькіша
    correction: вужча
    error_type: word
    options:
    - вужча
    - вузкіша
    - найвужча
    explanation: Звук [з] перед суфіксом -ш- завжди переходить у комбінацію [жч] (вузький
      -> вужчий).
  - sentence: Цей рюкзак важкіший.
    error: важкіший
    correction: важчий
    error_type: word
    options:
    - важчий
    - тяжкіший
    - найважчий
    explanation: Суфікс -к- випадає, залишається основа на [ж]. При додаванні суфікса
      -ш- отримуємо 'важчий'.
  - sentence: Він самий розумний у нашому класі.
    error: самий розумний
    correction: найрозумніший
    error_type: construction
    options:
    - найрозумніший
    - більш розумніший
    - дуже розумний
    explanation: Слово 'самий' для утворення порівняння є русизмом. Використовуйте
      питомо український префікс 'най-'.
  - sentence: Твій шлях близькіший.
    error: близькіший
    correction: ближчий
    error_type: word
    options:
    - ближчий
    - ближкіший
    - найближчий
    explanation: Звук [з] перед суфіксом -ш- переходить у звук [жч] (близький -> ближчий).
- id: quiz-general-comparative
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Що таке
    ступені порівняння?».'
  items:
  - question: Який прикметник НЕ може утворювати ступені порівняння?
    options:
    - порожній
    - великий
    - холодний
    - широкий
    correct: 0
  - question: Яка форма є граматично правильною складеною формою від слова 'цікавий'?
    options:
    - більш цікавий
    - більш цікавіший
    - самий цікавий
    - цікавіший більш
    correct: 0
  - question: Як правильно утворити просту форму вищого ступеня від слова 'дорогий'?
    options:
    - дорожчий
    - дорогший
    - дорогіший
    - більш дорожчий
    correct: 0
  - question: Яке фонетичне явище відбувається при утворенні слова 'вужчий' від 'вузький'?
    options:
    - чергування приголосних
    - зміна роду
    - утворення складеної форми
    - додавання префікса
    correct: 0
  - question: Яке допоміжне слово використовується для утворення складеної форми вищого
      ступеня?
    options:
    - менш
    - най
    - дуже
    - набагато
    correct: 0
  - question: 'Оберіть повністю правильне українське речення:'
    options:
    - Він сильніший за мене.
    - Він сильніший мене.
    - Він більш сильніший.
    - Він самий сильний.
    correct: 0
- id: match-up-terminology
  type: match-up
  instruction: З'єднайте терміни з розділу «Проста форма вищого ступеня» з їхніми
    визначеннями.
  pairs:
  - left: проста форма
    right: утворюється за допомогою суфіксів -іш- або -ш-
  - left: складена форма
    right: утворюється за допомогою допоміжних слів більш або менш
  - left: чергування приголосних
    right: фонетична зміна звуків при додаванні суфікса (наприклад, [з] на [жч])
  - left: суфікс
    right: частина слова, що додається безпосередньо до основи
  - left: початкова форма
    right: базова словникова форма прикметника
  - left: якісний прикметник
    right: слово, що виражає ознаку і може утворювати ступені порівняння
- id: fill-in-comparative-constructions
  type: fill-in
  instruction: Вставте правильну граматичну форму у порівняльних конструкціях.
  items:
  - sentence: Петро вищий ____ Марію.
    answer: за
    options:
    - за
    - від
    - ніж
  - sentence: Сьогодні холодніше ____ учорашнього.
    answer: від
    options:
    - за
    - від
    - ніж
  - sentence: Цей шлях коротший, ____ той.
    answer: ніж
    options:
    - за
    - від
    - ніж
  - sentence: Новий комп'ютер ____ швидший за старий.
    answer: набагато
    options:
    - набагато
    - більш
    - най
  - sentence: ____ далі в ліс, тим більше дров.
    answer: Чим
    options:
    - Чим
    - Що
    - Як
  - sentence: Ця ранкова кава ____ солодша за вечірню.
    answer: дещо
    options:
    - дещо
    - більш
    - най
- id: match-up-adjectives-without-degrees
  type: match-up
  instruction: З'єднайте прикметники, які вказують на абсолютні ознаки і не мають
    ступенів порівняння, з їхніми англійськими перекладами.
  pairs:
  - left: сліпий
    right: blind
  - left: порожній
    right: empty
  - left: мертвий
    right: dead
  - left: німий
    right: mute
  - left: глухий
    right: deaf
  - left: лисий
    right: bald
- id: match-up-matching-proverbs-with-comparatives
  type: match-up
  instruction: З'єднайте частини українських прислів'їв та сталих виразів, що містять
    порівняння.
  pairs:
  - left: Свій хліб смачніший
    right: за чужий
  - left: Що темніша ніч
    right: то ясніші зорі
  - left: Старша розумом
    right: а не віком
  - left: Коротший за
    right: заячий хвіст
  - left: Чим далі в ліс
    right: тим більше дров
  - left: Чим дорожчий квиток
    right: тим кращий сервіс
workbook:
- type: true-false
  instruction: Визначте, чи є ці твердження про ступені порівняння правильними.
  items:
  - statement: Складена форма вищого ступеня утворюється за допомогою суфіксів -іш-
      або -ш-.
    correct: false
    explanation: Складена форма утворюється за допомогою слів 'більш' або 'менш'.
      Суфікси використовуються для утворення простої форми.
  - statement: Слова 'сліпий', 'глухий' та 'порожній' не утворюють ступенів порівняння.
    correct: true
    explanation: Ці слова позначають абсолютні ознаки, які існують або повністю, або
      їх немає взагалі.
  - statement: В українській мові цілком нормально казати конструкцію 'більш сильніший'.
    correct: false
    explanation: 'Це граматичний плеоназм (надмірність). Потрібно казати лише один
      варіант: або ''сильніший'', або ''більш сильний''.'
  - statement: Прикметник у простій формі вищого ступеня відмінюється за родами, числами
      та відмінками.
    correct: true
    explanation: Він повноцінно узгоджується з головним іменником, який безпосередньо
      описує.
  - statement: Фраза 'самий кращий' є правильною українською літературною нормою.
    correct: false
    explanation: Слово 'самий' для порівняння є типовим русизмом. Правильно використовувати
      префікс 'най-' (найкращий).
  - statement: У слові 'вищий' літера 'щ' з'явилася через фонетичне злиття звука [с]
      із суфіксом -ш-.
    correct: true
    explanation: Основа 'вис-' втрачає частинку '-ок-', а комбінація звуків [с] +
      [ш] перетворюється на [шч].
- type: group-sort
  instruction: Розподіліть прикметники на ті, що утворюють ступені порівняння, і ті,
    що ні.
  groups:
  - label: Можуть мати ступені порівняння (якісні)
    items:
    - розумний
    - сильний
    - холодний
    - цікавий
    - широкий
  - label: Не мають ступенів порівняння (абсолютні/відносні)
    items:
    - порожній
    - сліпий
    - дерев'яний
    - зимовий
    - живий
- type: translate
  instruction: Оберіть правильний український переклад для цих англійських порівняльних
    речень.
  items:
  - source: This apartment is much more expensive.
    options:
    - text: Ця квартира набагато дорожча.
      correct: true
    - text: Ця квартира більш дорожча.
      correct: false
    - text: Ця квартира сама дорога.
      correct: false
  - source: He is significantly older than me.
    options:
    - text: Він значно старший за мене.
      correct: true
    - text: Він значно старший мене.
      correct: false
    - text: Він набагато більш старший за мене.
      correct: false
  - source: The new computer is faster.
    options:
    - text: Новий комп'ютер швидший.
      correct: true
    - text: Новий комп'ютер більш швидший.
      correct: false
    - text: Новий комп'ютер швидкий.
      correct: false
  - source: This engineering project is somewhat more complex.
    options:
    - text: Цей інженерний проєкт дещо складніший.
      correct: true
    - text: Цей інженерний проєкт самий складний.
      correct: false
    - text: Цей інженерний проєкт набагато складніший.
      correct: false
  - source: Today the wind is a bit stronger.
    options:
    - text: Сьогодні вітер трохи сильніший.
      correct: true
    - text: Сьогодні вітер значно сильний.
      correct: false
    - text: Сьогодні вітер більш сильніший.
      correct: false
  - source: The further into the forest, the more firewood.
    options:
    - text: Чим далі в ліс, тим більше дров.
      correct: true
    - text: Що далі ліс, те більше дрова.
      correct: false
    - text: Більш далеко в ліс, більш дров.
      correct: false
- type: anagram
  instruction: Складіть правильне слово з літер (лексика модуля).
  items:
  - letters:
    - с
    - у
    - ф
    - і
    - к
    - с
    answer: суфікс
    hint: suffix
  - letters:
    - б
    - і
    - л
    - ь
    - ш
    answer: більш
    hint: more
  - letters:
    - м
    - е
    - н
    - ш
    answer: менш
    hint: less
  - letters:
    - н
    - і
    - ж
    answer: ніж
    hint: than
  - letters:
    - з
    - н
    - а
    - ч
    - н
    - о
    answer: значно
    hint: significantly
  - letters:
    - д
    - е
    - щ
    - о
    answer: дещо
    hint: somewhat
- type: unjumble
  instruction: Складіть правильні речення зі слів.
  items:
  - words:
    - Петро
    - Марію.
    - за
    - вищий
    correct_order:
    - Петро
    - вищий
    - за
    - Марію.
  - words:
    - ніж
    - той.
    - шлях
    - Цей
    - коротший,
    correct_order:
    - Цей
    - шлях
    - коротший,
    - ніж
    - той.
  - words:
    - тим
    - сервіс.
    - дорожчий
    - кращий
    - Чим
    - квиток,
    correct_order:
    - Чим
    - дорожчий
    - квиток,
    - тим
    - кращий
    - сервіс.
  - words:
    - за
    - ту.
    - машина
    - дорожча
    - Ця
    correct_order:
    - Ця
    - машина
    - дорожча
    - за
    - ту.
  - words:
    - набагато
    - Новий
    - комп'ютер
    - швидший.
    correct_order:
    - Новий
    - комп'ютер
    - набагато
    - швидший.
  - words:
    - вітер
    - сильніший.
    - Сьогодні
    - трохи
    correct_order:
    - Сьогодні
    - вітер
    - трохи
    - сильніший.
