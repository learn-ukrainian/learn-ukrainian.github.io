- type: fill-in
  title: "Оберіть правильне слово"
  instruction: "Виберіть відповідне просторове слово (де, куди або звідки) для кожного речення."
  items:
    - sentence: "Це старий готель, ... ми зупинилися на вихідні."
      answer: "де"
      options:
        - "де"
        - "куди"
        - "звідки"
        - "який"
      explanation: "Дієслово зупинилися означає статику, тому потрібне слово де."
    - sentence: "Місто, ... ми їдемо у відпустку, дуже старовинне."
      answer: "куди"
      options:
        - "куди"
        - "де"
        - "звідки"
        - "яке"
      explanation: "Дієслово їдемо вказує на напрямок руху, тому використовуємо куди."
    - sentence: "Країна, ... він родом, відома своєю смачною кухнею."
      answer: "звідки"
      options:
        - "звідки"
        - "де"
        - "куди"
        - "яка"
      explanation: "Фраза бути родом вказує на походження або джерело."
    - sentence: "Будь ласка, покажи мені вулицю, ... знаходиться ця аптека."
      answer: "де"
      options:
        - "де"
        - "куди"
        - "звідки"
        - "яку"
      explanation: "Аптека просто знаходиться там (статика)."
    - sentence: "Парк, ... кожного дня гуляють діти, був зовсім поруч."
      answer: "де"
      options:
        - "де"
        - "куди"
        - "звідки"
        - "який"
      explanation: "Прогулянка відбувається в межах парку (статика)."
    - sentence: "Маленьке село, ... нам привезли ці гриби, лежить високо в горах."
      answer: "звідки"
      options:
        - "звідки"
        - "де"
        - "куди"
        - "яке"
      explanation: "Гриби привезли з села, отже воно є точкою старту (джерелом)."
    - sentence: "Університет, ... я планую вступити наступного року, дуже престижний."
      answer: "куди"
      options:
        - "куди"
        - "де"
        - "звідки"
        - "який"
      explanation: "Вступ до університету — це рух, напрямок до мети."
    - sentence: "Будинок, ... я виріс, зараз належить зовсім іншій родині."
      answer: "де"
      options:
        - "де"
        - "куди"
        - "звідки"
        - "який"
      explanation: "Процес дорослішання відбувався в межах будинку (статика)."

- type: unjumble
  title: "Складіть речення"
  instruction: "Поставте слова у правильному порядку, щоб утворити складнопідрядні речення."
  items:
    - words:
        - "Це"
        - "будинок,"
        - "де"
        - "ми"
        - "живемо."
      answer: "Це будинок, де ми живемо."
    - words:
        - "Покажи"
        - "дорогу,"
        - "куди"
        - "нам"
        - "йти."
      answer: "Покажи дорогу, куди нам йти."
    - words:
        - "Місце,"
        - "звідки"
        - "почалася"
        - "наша"
        - "подорож."
      answer: "Місце, звідки почалася наша подорож."
    - words:
        - "Ми"
        - "поїдемо"
        - "туди,"
        - "куди"
        - "хочеш"
        - "ти."
      answer: "Ми поїдемо туди, куди хочеш ти."
    - words:
        - "Добре"
        - "там,"
        - "де"
        - "нас"
        - "немає."
      answer: "Добре там, де нас немає."
    - words:
        - "Я"
        - "поклав"
        - "ключі"
        - "десь"
        - "у"
        - "кімнаті."
      answer: "Я поклав ключі десь у кімнаті."
    - words:
        - "Вони"
        - "поїхали"
        - "туди,"
        - "де"
        - "тепло."
      answer: "Вони поїхали туди, де тепло."

- type: error-correction
  title: "Виправте помилки калькування"
  instruction: "Знайдіть і виправте помилки з подвійними прийменниками та неправильним вибором просторового слова."
  items:
    - sentence: "Це гарне місто, в де я зараз живу."
      error: "в де"
      answer: "де"
      options:
        - "де"
        - "в якому"
        - "куди"
        - "звідки"
      explanation: "Слово де вже містить у собі значення прийменника, дублювати його не можна."
      error_type: "word"
    - sentence: "Ми поїдемо на море, куди ми були минулого літа."
      error: "куди"
      answer: "де"
      options:
        - "де"
        - "на якому"
        - "яке"
        - "звідки"
      explanation: "Дієслово бути означає статичне перебування, тому потрібне слово де."
      error_type: "word"
    - sentence: "Покажи мені великий магазин, в куди ти вчора ходив."
      error: "в куди"
      answer: "куди"
      options:
        - "куди"
        - "до якого"
        - "в який"
        - "де"
      explanation: "Слово куди не потребує додаткового прийменника напрямку."
      error_type: "word"
    - sentence: "Він дуже довго дивився на стару фотографію, з куди дивився незнайомець."
      error: "з куди"
      answer: "звідки"
      options:
        - "звідки"
        - "де"
        - "з якої"
        - "яку"
      explanation: "Напрямок від джерела виражається одним словом звідки без прийменника."
      error_type: "word"
    - sentence: "Я хочу нарешті знайти місце, куди завжди дуже спокійно."
      error: "куди"
      answer: "де"
      options:
        - "де"
        - "яке"
        - "в якому"
        - "звідки"
      explanation: "Бути спокійним — це стан статики, тому використовується де."
      error_type: "word"
    - sentence: "Вони щасливі повернулися з лісу, де почалася їхня довга подорож."
      error: "де"
      answer: "звідки"
      options:
        - "звідки"
        - "з якого"
        - "куди"
        - "який"
      explanation: "Ліс є точкою старту подорожі, тому необхідно вжити звідки."
      error_type: "word"
    - sentence: "Це нове місто, до куди ми переїжджаємо наступного місяця."
      error: "до куди"
      answer: "куди"
      options:
        - "куди"
        - "до якого"
        - "в куди"
        - "де"
      explanation: "Слово куди вже має в собі значення напрямку до мети."
      error_type: "word"

- type: match-up
  title: "Знайдіть пару: Вказівні слова"
  instruction: "З'єднайте головне і підрядне речення, утворюючи правильні корелятивні пари."
  pairs:
    - left: "Добре завжди там,"
      right: "де нас зараз немає."
    - left: "Ми обов'язково підемо туди,"
      right: "куди веде ця стежка."
    - left: "Холодний вітер дме звідти,"
      right: "звідки ми нещодавно прийшли."
    - left: "Він залишив свою нову книгу десь,"
      right: "але абсолютно не пам'ятає де."
    - left: "Вони швидко кудись поїхали,"
      right: "але не сказали нам куди."
    - left: "Ця сумна мелодія лунала звідкись,"
      right: "хоча навколо нас нікого не було."
    - left: "Це саме те відоме кафе, де"
      right: "готують найсмачнішу у місті каву."
    - left: "Це південне місто, куди"
      right: "ми поїдемо у літню відпустку."

- type: group-sort
  title: "Розподіліть дієслова за векторами"
  instruction: "Розподіліть дієслова залежно від того, якого просторового слова (де, куди, звідки) вони вимагають."
  groups:
    - name: "Статика (де)"
      items:
        - "жити"
        - "знаходитися"
        - "розташовуватися"
        - "спати"
    - name: "Динаміка до (куди)"
      items:
        - "йти"
        - "їхати"
        - "прямувати"
        - "переїжджати"
    - name: "Динаміка від (звідки)"
      items:
        - "повертатися"
        - "виїжджати"
        - "походити"
        - "лунати"

- type: quiz
  title: "Перевірка просторової граматики"
  instruction: "Оберіть одну правильну відповідь на кожне запитання щодо теорії підрядних речень."
  items:
    - question: "Яке слово використовується виключно для опису нерухомого перебування в одній точці?"
      explanation: "Слово де відповідає за статику і постійну локацію."
      options:
        - text: "де"
          correct: true
        - text: "куди"
          correct: false
        - text: "звідки"
          correct: false
        - text: "який"
          correct: false
    - question: "Що саме означає просторове сполучне слово куди у підрядному реченні?"
      explanation: "Слово куди є маркером динаміки і вказує на кінцеву точку вашого руху."
      options:
        - text: "напрямок активного руху до мети"
          correct: true
        - text: "стабільне перебування на одному місці"
          correct: false
        - text: "точку повернення з далекої мандрівки"
          correct: false
        - text: "опис естетичної якості самого предмета"
          correct: false
    - question: "Для чого в сучасній українській мові використовується підсилювальна частка саме?"
      explanation: "Фрази де саме або куди саме вимагають від вашого співрозмовника дуже точної, конкретної відповіді."
      options:
        - text: "щоб підкреслити максимальну просторову точність"
          correct: true
        - text: "щоб зробити речення набагато більш офіційним"
          correct: false
        - text: "щоб механічно об'єднати два простих речення"
          correct: false
        - text: "щоб показати велику невпевненість мовця"
          correct: false
    - question: "Яке з цих поширених дієслів зазвичай вимагає обов'язкового використання сполучного слова звідки?"
      explanation: "Дієслово походити чітко вказує на історичне коріння або джерело."
      options:
        - text: "походити"
          correct: true
        - text: "перебувати"
          correct: false
        - text: "будувати"
          correct: false
        - text: "подорожувати"
          correct: false
    - question: "Чому коротка фраза Будинок, в де я живу є граматично абсолютно неправильною?"
      explanation: "Дублювання прийменників локації є грубою граматичною помилкою української мови."
      options:
        - text: "тому що слово де вже містить у собі значення прийменника"
          correct: true
        - text: "тому що завжди потрібно використовувати прийменник на"
          correct: false
        - text: "тому що слово де використовується лише для напрямку"
          correct: false
        - text: "тому що після де обов'язково має йти дієслово руху"
          correct: false
    - question: "Яка вказівна (корелятивна) просторова пара побудована граматично правильно?"
      explanation: "Правильна і логічна пара для статики — це конструкція там, де."
      options:
        - text: "там, де"
          correct: true
        - text: "туди, де"
          correct: false
        - text: "там, куди"
          correct: false
        - text: "звідти, куди"
          correct: false
    - question: "Яке просторове слово чи фраза найкраще підходить для використання в суворому офіційно-діловому стилі?"
      explanation: "У строгих юридичних документах частіше використовують займенник який з прийменником."
      options:
        - text: "в якому"
          correct: true
        - text: "де"
          correct: false
        - text: "куди"
          correct: false
        - text: "десь"
          correct: false
    - question: "Що саме виражають слова десь, кудись та звідкись в українському спілкуванні?"
      explanation: "Короткий суфікс -сь додає сильний відтінок невизначеності або повної відсутності інформації."
      options:
        - text: "невизначеність або таємничість локації"
          correct: true
        - text: "максимальну географічну точність маршруту"
          correct: false
        - text: "дуже офіційний діловий стиль спілкування"
          correct: false
        - text: "завершення будь-якої дії в минулому часі"
          correct: false

- type: select
  title: "Оберіть усі правильні варіанти"
  instruction: "У кожному завданні оберіть усі речення або твердження, які є граматично і логічно правильними."
  items:
    - question: "Оберіть усі речення з правильно використаним словом статики (де)."
      min_correct: 3
      explanation: "Слово де ідеально поєднується з дієсловами стану: народився, пили, стоїть."
      options:
        - text: "Це саме те місто, де я народився."
          correct: true
        - text: "Ось затишне кафе, де ми пили каву."
          correct: true
        - text: "Покажи мені ліс, де ми підемо завтра."
          correct: false
        - text: "Кімната, де стоїть великий стіл, дуже світла."
          correct: true
        - text: "Він забув адресу, де нам треба зараз їхати."
          correct: false
    - question: "Оберіть усі речення з правильно використаним словом напрямку (куди)."
      min_correct: 3
      explanation: "Слово куди завжди вживається з дієсловами руху до мети: поїдемо, вступити, прибули."
      options:
        - text: "Я знаю місце, куди ми поїдемо відпочивати."
          correct: true
        - text: "Це престижний університет, куди я хочу вступити."
          correct: true
        - text: "Ось дерев'яна полиця, куди лежить мій словник."
          correct: false
        - text: "Місто, куди ми успішно прибули вчора, було дуже гарним."
          correct: true
        - text: "Кімната, куди ми зараз знаходимося, дуже затишна."
          correct: false
    - question: "Оберіть усі граматично правильні вказівні (корелятивні) пари простору."
      min_correct: 3
      explanation: "Правильні та симетричні пари: там/де, туди/куди, звідти/звідки."
      options:
        - text: "Добре там, де нас зараз немає."
          correct: true
        - text: "Йди завжди туди, куди тобі дійсно треба."
          correct: true
        - text: "Швидко повертайся звідти, звідки ти прийшов."
          correct: true
        - text: "Ми сіли там, куди було абсолютно вільно."
          correct: false
        - text: "Сильний вітер дме туди, звідки ми прийшли."
          correct: false
    - question: "Які слова вказують на невизначений простір або абсолютно невідоме місце?"
      min_correct: 3
      explanation: "Спеціальний суфікс -сь ефективно утворює невизначені просторові прислівники."
      options:
        - text: "десь"
          correct: true
        - text: "кудись"
          correct: true
        - text: "звідкись"
          correct: true
        - text: "там"
          correct: false
        - text: "саме"
          correct: false
    - question: "В яких підрядних реченнях повністю відсутня прикра помилка подвійного прийменника?"
      min_correct: 3
      explanation: "Слова де, куди та звідки не потребують жодних додаткових прийменників."
      options:
        - text: "Це дивовижне місто, де я живу все життя."
          correct: true
        - text: "Ось висока будівля, в де я постійно працюю."
          correct: false
        - text: "Ми добре знаємо дорогу, куди нам потрібно іти."
          correct: true
        - text: "Він приїхав звідки завжди раніше приїжджає."
          correct: true
        - text: "Будь ласка, покажи напрямок, до куди треба їхати."
          correct: false
    - question: "Оберіть усі правильні лінгвістичні твердження про стилістичні реєстри та семантику."
      min_correct: 3
      explanation: "Слова де і в якому розрізняються за рівнем офіційності; частка саме сильно підсилює точність."
      options:
        - text: "Слово де дуже характерне для невимушеного розмовного стилю."
          correct: true
        - text: "Конструкція в якому органічно характерна для суворого ділового стилю."
          correct: true
        - text: "Слово куди категорично не можна використовувати в художній літературі."
          correct: false
        - text: "Частка саме додає вашому висловлюванню максимальної просторової точності."
          correct: true
        - text: "Слово десь означає дуже конкретну, перевірену адресу."
          correct: false

- type: true-false
  title: "Правда чи Брехня: Правила та факти"
  instruction: "Прочитайте твердження і визначте, чи є воно правдивим."
  items:
    - statement: "Просторове слово куди чітко вказує на стабільне розташування об'єкта."
      correct: false
      explanation: "Куди вказує на напрямок активного руху до певної мети, а не на статику."
    - statement: "В українській мові не можна вживати прийменник в безпосередньо перед словом де."
      correct: true
      explanation: "Це поширена помилка подвійного прийменника, оскільки де вже вказує на локацію."
    - statement: "Корелятивна вказівна пара туди, де є граматично правильною конструкцією."
      correct: false
      explanation: "Правильна і математично симетрична пара — це туди, куди."
    - statement: "Для офіційно-ділового стилю краще і доречніше використовувати конструкцію в якому замість простого де."
      correct: true
      explanation: "Займенник який з прийменником зберігає жорстке формальне керування в документах."
    - statement: "Слово звідкись означає, що мовець абсолютно точно знає джерело походження руху."
      correct: false
      explanation: "Суфікс -сь завжди вказує на невизначеність, таємничість або незнання точного джерела."
