version: '1.0'
module: participles-active
level: b1
inline:
- id: quiz-participle-definition-quiz-focus-on-identifying-participles-vs-adjectives-vs-verbs
  type: quiz
  instruction: Оберіть правильну характеристику слів.
  items:
  - question: До якої частини мови належить слово «квітучий»?
    options:
    - Дієприкметник
    - Звичайний прикметник
    - Дієслово
    - Іменник
    correct: 0
  - question: До якої частини мови належить слово «красивий»?
    options:
    - Звичайний прикметник
    - Дієприкметник
    - Дієслово
    - Іменник
    correct: 0
  - question: Слово «квітне» відповідає на питання «що робить?». Це...
    options:
    - Дієслово
    - Дієприкметник
    - Прикметник
    - Іменник
    correct: 0
  - question: Яке з цих слів є активним дієприкметником?
    options:
    - палаючий
    - гарячий
    - вогонь
    - палає
    correct: 0
  - question: Яке з цих слів є звичайним прикметником (називає постійну ознаку)?
    options:
    - красивий
    - зів'ялий
    - збудований
    - палаючий
    correct: 0
  - question: Дієприкметник «прочитана» (книга) є...
    options:
    - Пасивним
    - Активним
    - Звичайним прикметником
    - Дієсловом
    correct: 0
  title: Оберіть правильну характеристику слів.
- id: fill-in-present-formation
  type: fill-in
  instruction: Оберіть правильний активний дієприкметник або лексикалізовану форму.
  items:
  - sentence: Від дієслова «знати» утворюється форма «____».
    answer: знаючий
    options:
    - знаючий
    - знаючи
    - знаюча
    - знають
  - sentence: Під ____ камінь вода не тече.
    answer: лежачий
    options:
    - лежачий
    - лежучий
    - лежача
    - лежать
  - sentence: Він відчув страшний, ____ біль.
    answer: пекучий
    options:
    - пекучий
    - пекачий
    - пекуча
    - печучий
  - sentence: На плиті стоїть ____ чайник.
    answer: киплячий
    options:
    - киплячий
    - киплючий
    - кипляча
    - кипляче
  - sentence: У неї був тихий, ____ голос.
    answer: тремтячий
    options:
    - тремтячий
    - тремтучий
    - тремтяча
    - тремтять
  - sentence: Навесні ми дивилися на ____ сад.
    answer: квітучий
    options:
    - квітучий
    - квітучого
    - квітучим
    - квітне
  title: Оберіть правильний активний дієприкметник або лексикалізовану форму.
- id: match-up-definitions
  type: match-up
  instruction: З'єднайте терміни з їхніми визначеннями.
  pairs:
  - left: активний дієприкметник
    right: ознака за дією, яку предмет виконує сам
  - left: пасивний дієприкметник
    right: ознака за дією, яку над предметом виконує інший
  - left: звичайний прикметник
    right: постійна, незмінна характеристика предмета
  - left: дієслово
    right: чиста дія, відповідає на питання «що робить?»
  - left: лексикалізована форма
    right: дієприкметник, що став звичайним прикметником
  - left: описовий зворот
    right: конструкція зі словами «який» або «що»
  title: З'єднайте терміни з їхніми визначеннями.
- id: reading-comprehension-nature
  type: quiz
  instruction: Дайте відповіді на запитання за текстом про пейзаж Карпат.
  items:
  - question: Як оповідач описує оленя у тексті?
    options:
    - Олень, що біжить
    - Олень, що лежить
    - Олень, що спить
    - Олень, що стрибає
    correct: 0
  - question: Яку ознаку мають луки, що запрошують мандрівників?
    options:
    - Квітучі
    - Мандруючі
    - Сяючі
    - Зелені
    correct: 0
  - question: Що створює неймовірний шум на багато кілометрів навколо?
    options:
    - Водоспад, що падає
    - Олень, що біжить
    - Мандруючі хмари
    - Сяючі зорі
    correct: 0
  - question: Що роблять хмари над високими вершинами?
    options:
    - Повільно пливуть
    - Створюють шум
    - Обіцяють спокій
    - Падають зі скелі
    correct: 0
  - question: Яку дію виконують зорі на нічному небі?
    options:
    - Обіцяють спокій
    - Повільно пливуть
    - Відчувають свободу
    - Падають зі скелі
    correct: 0
  - question: Чому оповідач чергує підрядні речення та дієприкметники?
    options:
    - Щоб створити поетичний ритм
    - Щоб показати науковий стиль
    - Бо це офіційний звіт
    - Щоб навчити писати закони
    correct: 0
  title: Дайте відповіді на запитання за текстом про пейзаж Карпат.
