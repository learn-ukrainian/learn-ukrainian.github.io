version: '1.0'
module: participles-active
level: b1
inline:
- id: quiz-participle-definition-quiz-focus-on-identifying-participles-vs-adjectives-vs-verbs
  type: quiz
  instruction: 'Оберіть правильний варіант: визначте, де прикметник, дієслово чи дієприкметник.'
  items:
  - question: Яке з цих слів є дієприкметником?
    options:
    - зелений
    - зеленіє
    - зеленіючий
    - зелень
    correct: 2
  - question: Яке з цих слів позначає постійну ознаку (є звичайним прикметником)?
    options:
    - красивий
    - квітучий
    - палаючий
    - посивілий
    correct: 0
  - question: На які питання відповідає дієприкметник?
    options:
    - що робити? що зробити?
    - хто? що?
    - який? яка? яке? які?
    - як? де? коли?
    correct: 2
  - question: Яке слово позначає ознаку предмета за дією в минулому?
    options:
    - зів'ялий
    - в'яне
    - зів'янути
    - млявий
    correct: 0
  - question: Що обов'язково лежить в основі дієприкметника (наприклад, «зеленіючий»)?
    options:
    - тільки колір
    - корінь дієслова та суфікс часу
    - закінчення іменника
    - лише префікс
    correct: 1
  - question: Яке з цих слів є звичайним дієсловом?
    options:
    - читаюча
    - прочитаний
    - читатиме
    - читальний
    correct: 2
  title: 'Оберіть правильний варіант: визначте, де прикметник, дієслово чи дієприкметник.'
- id: fill-in-present-formation
  type: fill-in
  instruction: Вставте правильну форму активного дієприкметника теперішнього часу.
  items:
  - sentence: Він спостерігає за _____ світлом зорі.
    answer: тремтячим
    options:
    - тремтячим
    - тремтящим
    - тремтучим
    - тремтілим
  - sentence: Ми бачимо _____ обрій.
    answer: синіючий
    options:
    - синіючий
    - синіющий
    - синіший
    - синячий
  - sentence: Це дуже _____ фахівець.
    answer: знаючий
    options:
    - знаючий
    - знающий
    - значущий
    - значимий
  - sentence: Під _____ камінь вода не тече.
    answer: лежачий
    options:
    - лежачий
    - лежучий
    - лежний
    - лежовий
  - sentence: Мене турбує _____ біль у нозі.
    answer: пекучий
    options:
    - пекучий
    - печучий
    - пекачий
    - пекельний
  - sentence: На столі стоїть _____ чайник.
    answer: киплячий
    options:
    - киплячий
    - киплящий
    - кипючий
    - кипілий
  title: Вставте правильну форму активного дієприкметника теперішнього часу.
- id: match-up-definitions
  type: match-up
  instruction: З'єднайте граматичні терміни з їхніми визначеннями.
  pairs:
  - left: Дієприкметник
    right: Особлива форма, що виражає ознаку предмета за дією
  - left: Активний дієприкметник
    right: Називає ознаку предмета, який сам виконує дію
  - left: Пасивний дієприкметник
    right: Називає ознаку предмета, який зазнає дії іншого об'єкта
  - left: Описовий зворот
    right: Конструкція зі словом «який» або «що» (заміна кальок)
  - left: Лексикалізована форма
    right: Дієприкметник, що перетворився на звичайний прикметник
  - left: Перша дієвідміна
    right: Використовує суфікси -уч-, -юч- (наприклад, синіючий)
  - left: Друга дієвідміна
    right: Використовує суфікси -ач-, -яч- (наприклад, тремтячий)
  title: З'єднайте граматичні терміни з їхніми визначеннями.
- id: error-correction-calques
  type: error-correction
  instruction: Знайдіть і виправте російські кальки або неправильні форми.
  items:
  - sentence: У нас є діючий закон.
    error: діючий
    correction: чинний
    error_type: word
    options:
    - чинний
    - дієвий
    - активний
    explanation: «Діючий закон» — це калька. Правильно казати «чинний закон».
  - sentence: Хто слідуючий у черзі до каси?
    error: слідуючий
    correction: наступний
    error_type: word
    options:
    - наступний
    - після
    - останній
    explanation: Слово «слідуючий» є калькою (от слова следующий). Правильно — «наступний».
  - sentence: Чи є бажаючі відповідати на запитання?
    error: бажаючі
    correction: охочі
    error_type: word
    options:
    - охочі
    - бажані
    - добровольці
    explanation: «Бажаючі» — це штучний суржик. Природне українське слово — «охочі».
  - sentence: Я купила новий миючий засіб для посуду.
    error: миючий
    correction: мийний
    error_type: word
    options:
    - мийний
    - помийний
    - чистий
    explanation: Прикметник, що позначає призначення (для миття), — «мийний» (а не
      дієприкметник «миючий»).
  - sentence: Це написавший книгу автор.
    error: написавший
    correction: який написав
    error_type: phrase
    options:
    - який написав
    - написаний
    - написанний
    explanation: Форми на -вш- та -ш- є дуже грубим русизмом. Використовуйте описовий
      зворот «який написав».
  - sentence: Завідуючий відділом уже прийшов на роботу.
    error: Завідуючий
    correction: Завідувач
    error_type: word
    options:
    - Завідувач
    - Керуючий
    - Завідувачем
    explanation: «Завідуючий відділом» — радянська калька. Правильно використовувати
      іменник «завідувач відділу».
  title: Знайдіть і виправте російські кальки або неправильні форми.
- id: essay-response-nature
  type: essay-response
  prompt: Напишіть 5 речень про осінню або весняну природу, обов'язково використовуючи
    активні дієприкметники (наприклад, пожовклий, опалий, квітучий, зів'ялий).
  min_words: 50
  model_answer: Восени в парку на землі лежить опалий лист. Я дуже люблю гуляти, коли
    бачу пожовклий ліс навколо. Весною квітучий сад завжди запрошує мандрівників відпочити.
    На клумбі після перших морозів залишився лише один зів'ялий бутон. Природа постійно
    дивує своїми змінами та красою.
- id: reading-comprehension-nature
  type: quiz
  instruction: Дайте відповіді на запитання за текстом про документальний фільм.
  items:
  - question: Який дієприкметник описує хмари в тексті?
    options:
    - мандруючі
    - квітучі
    - опалі
    - побілілі
    correct: 0
  - question: Який описовий зворот використовується для опису оленя?
    options:
    - що біжить
    - який відпочиває
    - що летить
    - який впав
    correct: 0
  - question: Який стан каменя описується за допомогою дієприкметникового звороту?
    options:
    - побілілий від снігу
    - зігрітий сонцем
    - покритий мохом
    - омитий водою
    correct: 0
  - question: Яку функцію виконує дієприкметник «пожовклу» у творі Михайла Стельмаха?
    options:
    - описує завершену зміну стану соняшника
    - описує дію, що триває зараз
    - показує колір сонця
    - описує майбутній процес
    correct: 0
  - question: Чому слово «падаючий» є правильним у фразі «падаючий водоспад»?
    options:
    - це його постійна, характерна (лексикалізована) ознака
    - це випадкова і тимчасова дія
    - це наслідок минулої дії
    - це штучний русизм
    correct: 0
  - question: Як синтаксично виділяється дієприкметниковий зворот, якщо він стоїть
      після головного іменника?
    options:
    - обов'язково виділяється комами з обох боків
    - коми взагалі не ставляться
    - виділяється тире
    - ставиться крапка з комою
    correct: 0
  title: Дайте відповіді на запитання за текстом про документальний фільм.
