    її з '
- type: essay-response
  title: Опис природи
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Активні дієприкметники
    теперішнього та минулого часу».
  prompt: 'Опишіть весняний або осінній пейзаж, використовуючи активні дієприкметники
    (наприклад: зів''ялий, пожовклий, опалий, квітучий, тремтячий). Зверніть увагу
    на узгодження з іменниками. Напишіть мінімум 5 речень (близько 50-80 слів).'
  model_answer: У старому парку лежав зів'ялий листок. Опалий каштан нагадував про
    золоту осінь. Навесні тут був квітучий сад, який милував око. Тепер лише посивілий
    дід сидів на лавці біля алеї. Тремтячий від вітру кущ чекав першого снігу.
