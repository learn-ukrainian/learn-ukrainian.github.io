    - побілілі
    - від
    - снігу,
    - виднілися
    - вдалині.
  - words:
    - хлопець,
    - зайшов
    - До
    - кімнати
    - який
    - читав.
    correct_order:
    - До
    - кімнати
    - зайшов
    - хлопець,
    - який
    - читав.
  - words:
    - букет
    - зів'ялий
    - Я
    - на
    - столі.
    - бачу
    correct_order:
    - Я
    - бачу
    - зів'ялий
    - букет
    - на
    - столі.
  - words:
    - підхід
    - Панівний
    - швидких
    - вимагає
    - змін.
    correct_order:
    - Панівний
    - підхід
    - вимагає
    - швидких
    - змін.
  - words:
    - вода
    - не
    - Під
    - камінь
    - лежачий
    - тече.
    correct_order:
    - Під
    - лежачий
    - камінь
    - вода
    - не
    - тече.
  - words:
    - опалий
    - На
    - лежить
    - листок.
    - землі
    correct_order:
    - На
    - землі
    - лежить
    - опалий
    - листок.
  title: Складіть правильні речення зі словами та дієприкметниковими зворотами.
- id: true-false-participle-facts
  type: true-false
  instruction: Правда чи ні? Перевірте розуміння граматичних правил з тексту.
  items:
  - statement: Дієприкметник поєднує в собі риси дієслова та іменника.
    correct: false
    explanation: Він поєднує риси дієслова та прикметника.
  - statement: Активний дієприкметник позначає ознаку предмета, який сам виконує дію.
    correct: true
    explanation: 'Так, наприклад: палаючий вогонь.'
  - statement: Суфікси -уч-, -юч- використовуються виключно для дієслів другої дієвідміни.
    correct: false
    explanation: Вони використовуються для першої дієвідміни (наприклад, синіти ->
      синіють -> синіючий).
  - statement: Форми на -вш- та -ш- (наприклад, «прийшовший») є правильними в українській
      літературній мові.
    correct: false
    explanation: Це грубі русизми, яких слід категорично уникати. Краще використовувати
      описові звороти.
  - statement: Щоб утворити дієприкметник минулого часу від дієслова «посивіти», потрібно
      додати суфікс -л-.
    correct: true
    explanation: Так, ми отримуємо форму «посивілий».
  - statement: Дієприкметниковий зворот завжди виділяється комами, незалежно від його
      позиції в реченні.
    correct: false
    explanation: Він виділяється комами лише тоді, коли стоїть після головного слова.
  title: Правда чи ні? Перевірте розуміння граматичних правил з тексту.
- id: anagram-participle-vocab
  type: anagram
  instruction: Складіть питомі українські слова з поданих літер (уникайте кальок).
  items:
  - letters:
    - ч
    - и
    - н
    - н
    - и
    - й
    answer: чинний
    hint: current, valid law (not діючий)
  - letters:
    - м
    - и
    - й
    - н
    - и
    - й
    answer: мийний
    hint: cleaning agent (not миючий)
  - letters:
    - о
    - х
    - о
    - ч
    - и
    - й
    answer: охочий
    hint: willing person (not бажаючий)
  - letters:
    - п
    - е
    - к
    - у
    - ч
    - и
    - й
    answer: пекучий
    hint: burning pain (lexicalized participle)
  - letters:
    - о
    - п
    - а
    - л
    - и
    - й
    answer: опалий
    hint: fallen leaf (past participle)
  - letters:
    - н
    - а
    - я
    - в
    - н
    - и
    - й
    answer: наявний
    hint: existing, available (not існуючий)
  title: Складіть питомі українські слова з поданих літер (уникайте кальок).
- id: odd-one-out-participles
  type: odd-one-out
  instruction: Оберіть зайве слово в кожному рядку (русизм або слово з іншою граматичною
    природою).
  items:
  - words:
    - квітучий
    - палаючий
    - слідуючий
    - лежачий
    correct: 2
    explanation: «Слідуючий» — це русизм, решта — питомі українські слова.
  - words:
    - посивілий
    - зниклий
    - збудований
    - опалий
    correct: 2
    explanation: «Збудований» — це пасивний дієприкметник, решта — активні минулого
      часу.
  - words:
    - бажаючий
    - охочий
    - чинний
    - наступний
    correct: 0
    explanation: «Бажаючий» — це суржик, решта — правильні питомі замінники для поширених
      кальок.
  - words:
    - зелений
    - красивий
    - розумний
    - зеленіючий
    correct: 3
    explanation: «Зеленіючий» — це дієприкметник (ознака за дією), решта — звичайні
      прикметники (постійна ознака).
  - words:
    - читаюча
    - співаюча
    - танцююча
    - дівчина, яка читає
    correct: 3
    explanation: Це описовий зворот, а решта слів — важкі активні дієприкметники теперішнього
      часу.
  - words:
    - миючий
    - діючий
    - існуючий
    - панівний
    correct: 3
    explanation: «Панівний» — правильне українське слово, решта — штучні кальки з
      російської мови.
  title: Оберіть зайве слово в кожному рядку (русизм або слово з іншою граматичною
    природ
