version: '1.0'
module: participles-active
level: b1
inline:
- id: quiz-participle-definition
  type: quiz
  instruction: Оберіть правильне твердження про дієприкметник
  items:
  - question: Що таке дієприкметник?
    options:
    - Форма дієслова, що виражає ознаку предмета за дією
    - Форма прикметника, що називає постійну ознаку
    - Частина мови, що вказує на час і місце
    - Особливий вид іменника
    correct: 0
  - question: На які питання відповідає дієприкметник?
    options:
    - Який? Яка? Яке? Які?
    - Що робить? Що зробить?
    - Де? Коли? Куди? Звідки?
    - Хто? Що?
    correct: 0
  - question: Що успадковує дієприкметник від дієслова?
    options:
    - Час, вид та стан
    - Відмінок, число та рід
    - Здатність бути підметом
    - Постійну ознаку
    correct: 0
  - question: Яке слово є дієприкметником?
    options:
    - Тремтячий
    - Тремтливий
    - Тремтить
    - Тремтіння
    correct: 0
  - question: Що описує активний дієприкметник?
    options:
    - Предмет, який самостійно виконує дію
    - Предмет, який зазнає дії від іншого
    - Постійну властивість предмета
    - Місце виконання дії
    correct: 0
  - question: Який алгоритм допомагає розпізнати дієприкметник?
    options:
    - Відповідає на питання прикметника, але має дієслівний корінь і суфікс
    - Завжди закінчується на -ти або -ть
    - Не змінюється за відмінками
    - Завжди стоїть перед іменником
    correct: 0
- id: fill-in-present-formation
  type: fill-in
  instruction: Вставте правильну граматичну форму дієприкметника або замінника
  items:
  - sentence: Дієслова першої дієвідміни утворюють дієприкметники за допомогою суфіксів
      ____.
    answer: -уч- / -юч-
    options:
    - -уч- / -юч-
    - -ач- / -яч-
    - -л-
    - -вш- / -ш-
  - sentence: Від дієслова «лежати» утворюється форма ____.
    answer: лежачий
    options:
    - лежачий
    - лежучий
    - лежавший
    - леживший
  - sentence: Замість неприродного «читаючий учень» краще сказати «учень, ____».
    answer: який читає
    options:
    - який читає
    - що читаючий
    - читавший
    - прочитаний
  - sentence: Слово «квітучий» у словосполученні «____ сад» є лексикалізованою формою.
    answer: квітучий
    options:
    - квітучий
    - квітущий
    - квітнувший
    - розквітлий
  - sentence: В українській мові нові форми на -учий часто звучать як ____ з російської.
    answer: кальки
    options:
    - кальки
    - діалекти
    - архаїзми
    - неологізми
  - sentence: Для опису дії, що відбувається зараз, найприродніше використовувати
      описовий ____.
    answer: зворот
    options:
    - зворот
    - суфікс
    - корінь
    - префікс
- id: match-up-definitions
  type: match-up
  instruction: З'єднайте українські терміни з їхніми значеннями
  pairs:
  - left: описовий зворот
    right: конструкція зі словом «який» або «що»
  - left: активний дієприкметник
    right: форма, що описує предмет, який сам виконує дію
  - left: калька
    right: неприродне слово, скопійоване з іншої мови
  - left: лексикалізована форма
    right: дієприкметник, що перетворився на звичайний прикметник
  - left: перша дієвідміна
    right: основа для суфіксів -уч- / -юч-
  - left: друга дієвідміна
    right: основа для суфіксів -ач- / -яч-
- id: match-up-term-definitions
  type: match-up
  instruction: З'єднайте неправильні слова-кальки з правильними питомими відповідниками
  pairs:
  - left: миючий (засіб)
    right: мийний (засіб)
  - left: діючий (закон)
    right: чинний (закон)
  - left: бажаючий (щось зробити)
    right: охочий (зробити щось)
  - left: завідуючий (відділу)
    right: завідувач (відділу)
  - left: існуючий (план)
    right: наявний (план)
  - left: лідируючий (тренд)
    right: провідний (тренд)
- id: quiz-active-participles-review
  type: quiz
  instruction: Оберіть правильний варіант, спираючись на правила утворення активних
    дієприкметників
  items:
  - question: Як правильно утворити активний дієприкметник минулого часу від дієслова
      «посивіти»?
    options:
    - посивілий
    - посивівший
    - посивіючий
    - сивіючий
    correct: 0
  - question: Яке з цих слів є правильним українським дієприкметником минулого часу?
    options:
    - зів'ялий
    - зів'янутий
    - зів'янувший
    - зів'ялячий
    correct: 0
  - question: Що відбувається із суфіксом -ну- при творенні дієприкметника від слова
      «зникнути»?
    options:
    - Він випадає (зниклий)
    - Він залишається (зникнутий)
    - Він перетворюється на -вш- (зникнувший)
    - Він змінюється на -ач- (зникачий)
    correct: 0
  - question: Як правильно і природно перекласти «ученик, сделавший задание»?
    options:
    - учень, який зробив завдання
    - учень, зробивший завдання
    - учень, зробилий завдання
    - зроблений учень завдання
    correct: 0
  - question: 'Яке закінчення матиме дієприкметник у місцевому відмінку: «на (пожовклий)
      листі»?'
    options:
    - на пожовклому
    - на пожовклим
    - на пожовклий
    - на пожовклого
    correct: 0
  - question: Чому ми говоримо «опале листя», а не «опадаюче»?
    options:
    - Бо це результат завершеної дії
    - Бо це активна дія в теперішньому
    - Бо листя не може виконувати дію
    - Це просто виняток з правил
    correct: 0
workbook:
- type: translate
  instruction: Оберіть правильний український переклад, який відповідає стилістичним
    нормам.
  items:
  - source: A blooming garden
    options:
    - text: квітучий сад
      correct: true
    - text: квітнувший сад
      correct: false
    - text: квітуще сад
      correct: false
    - text: розквітлуючий сад
      correct: false
  - source: A bankrupt enterprise
    options:
    - text: збанкрутіле підприємство
      correct: true
    - text: збанкрутівше підприємство
      correct: false
    - text: збанкрутуюче підприємство
      correct: false
    - text: збанкрутілий підприємство
      correct: false
  - source: A roaring waterfall
    options:
    - text: ревучий водоспад
      correct: true
    - text: ревувший водоспад
      correct: false
    - text: ревуче водоспад
      correct: false
    - text: водоспадний рев
      correct: false
  - source: A boy running in the park
    options:
    - text: хлопчик, що біжить у парку
      correct: true
    - text: бігучий у парку хлопчик
      correct: false
    - text: хлопчик, який бігучий
      correct: false
    - text: біжачий хлопчик у парку
      correct: false
  - source: The victim of the accident
    options:
    - text: потерпілий від аварії
      correct: true
    - text: терплячий від аварії
      correct: false
    - text: потерпівший від аварії
      correct: false
    - text: аварійний терпілець
      correct: false
  - source: The current law
    options:
    - text: чинний закон
      correct: true
    - text: діючий закон
      correct: false
    - text: поточний закон
      correct: false
    - text: дійсний закон
      correct: false
- type: unjumble
  instruction: Складіть правильні речення з поданих слів (зверніть увагу на описові
    звороти та дієприкметники).
  items:
  - words:
    - учень,
    - завдання.
    - читає
    - який
    correct_order:
    - учень,
    - який
    - читає
    - завдання.
  - words:
    - купити
    - мийний
    - Треба
    - засіб.
    correct_order:
    - Треба
    - купити
    - мийний
    - засіб.
  - words:
    - закон
    - новий
    - Це
    - чинний
    correct_order:
    - Це
    - новий
    - чинний
    - закон
  - words:
    - опалий
    - на
    - Він
    - подивився
    - листок.
    correct_order:
    - Він
    - подивився
    - на
    - опалий
    - листок.
  - words:
    - зниклий
    - додому.
    - повернувся
    - кіт
    correct_order:
    - зниклий
    - кіт
    - повернувся
    - додому.
  - words:
    - ревучий
    - Ми
    - водоспад.
    - побачили
    correct_order:
    - Ми
    - побачили
    - ревучий
    - водоспад.
- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Активні дієприкметники
    теперішнього часу (-уч-/-юч-, -ач-/-яч-)».
  prompt: Опишіть природу або подію, використовуючи лексикалізовані дієприкметники
    (наприклад, пекучий, квітучий, ревучий) та описові звороти (який/що).
  min_words: 50
  model_answer: Сьогодні був дуже пекучий день. Ми пішли в квітучий сад, який знаходиться
    біля нашого будинку. Там ми почули ревучий струмок, що стікає з гір. На землі
    лежав опалий листок, який нагадував про осінь. Вода була холодна, але ми раділи,
    що маємо такий чудовий відпочинок у природі.
