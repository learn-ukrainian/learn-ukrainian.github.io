- id: unjumble-participle-phrases
  type: unjumble
  instruction: Складіть правильні речення зі словами та дієприкметниковими зворотами.
  items:
  - words:
    - Гори,
    - побілілі
    - від
    - снігу,
    - виднілися
    - вдалині.
    correct_order:
