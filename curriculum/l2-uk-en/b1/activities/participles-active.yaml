- type: fill-in
  instruction: Вставте правильну форму активного дієприкметника минулого часу, узгоджуючи
    її з іменником.
  items:
  - sentence: Я бачу ____ букет у вазі.
    answer: зів'ялий
    options:
    - зів'ялий
    - зів'ялого
    - зів'ялому
    - зів'ялим
  - sentence: Ми підійшли до дерева, покритого купкою ____ листя.
    answer: опалого
    options:
    - опалого
    - опалий
    - опалому
    - опалим
  - sentence: Вона довго розмовляла із ____ чоловіком.
    answer: посивілим
    options:
    - посивілим
    - посивілий
    - посивілого
    - посивілому
  - sentence: Вона ледве стояла на холодній, ____ землі.
    answer: змерзлій
    options:
    - змерзлій
    - змерзла
    - змерзлу
    - змерзлою
  - sentence: Світло весняного сонця падало на ____ дерева.
    answer: розквітлі
    options:
    - розквітлі
    - розквітлих
    - розквітлим
    - розквітлими
  - sentence: Волонтери вчора шукали ____ собаку.
    answer: зниклого
    options:
    - зниклого
    - зниклий
    - зниклому
    - зниклим
