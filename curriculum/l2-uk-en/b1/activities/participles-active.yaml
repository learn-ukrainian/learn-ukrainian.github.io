- type: error-correction
  instruction: Виправте помилки у творенні дієприкметників минулого часу.
  items:
  - sentence: Він подивився на зів'янулий листок.
    error: зів'янулий
    correction: зів'ялий
    options:
    - зів'ялий
    - зів'янулий
    - зів'ятий
    - зів'яючий
    error_type: word
    explanation: У дієсловах на -нути суфікс -ну- випадає (зів'янути → зів'ялий).
  - sentence: У саду стояв розквітнулий кущ троянд.
    error: розквітнулий
    correction: розквітлий
    options:
    - розквітлий
    - розквітнулий
    - квітучий
    - розквітаючий
    error_type: word
    explanation: Суфікс -ну- випадає (розквітнути → розквітлий).
  - sentence: Взимку ми бачили змерзнулий ставок.
    error: змерзнулий
    correction: змерзлий
    options:
    - змерзлий
    - змерзнулий
    - замерзлий
    - змерзаючий
    error_type: word
    explanation: Суфікс -ну- випадає (змерзнути → змерзлий).
  - sentence: На столі лежав засохнулий хліб.
    error: засохнулий
    correction: засохлий
    options:
    - засохлий
    - засохнулий
    - засихаючий
    - сухий
    error_type: word
    explanation: Суфікс -ну- випадає (засохнути → засохлий).
  - sentence: Потерпівший чоловік звернувся до поліції.
    error: Потерпівший
    correction: Потерпілий
    options:
    - Потерпілий
    - Потерпівший
    - Який потерпів
    - Потерпаючий
    error_type: word
    explanation: Русизм на -вш-. Правильно використовувати українську форму на -л-
      (потерпілий).
  - sentence: Це підприємство стало збанкрутівшим.
    error: збанкрутівшим
    correction: збанкрутілим
    options:
    - збанкрутілим
    - збанкрутівшим
    - банкрутом
    - яке збанкрутіло
    error_type: word
    explanation: Від дієслова збанкрутіти утворюється питома форма збанкрутілий.
  title: Виправте помилки у творенні дієприкметників минулого часу.
