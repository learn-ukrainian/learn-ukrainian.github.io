- type: fill-in
  title: 'Заповніть пропуски: ділові ситуації'
  items:
  - sentence: Ми змогли збільшити свій _____ цього року.
    answer: прибуток
    options:
    - прибуток
    - збиток
    - клієнт
    - продаж
  - sentence: Для нового проєкту нам потрібно залучити іноземні _____.
    answer: інвестиції
    options:
    - інвестиції
    - компанії
    - податки
    - зустрічі
  - sentence: Мій брат зареєструвався як приватний _____ і сплачує податки.
    answer: підприємець
    options:
    - підприємець
    - постачальник
    - клієнт
    - керівник
  - sentence: Директор має укласти нову _____ з партнерами.
    answer: угоду
    options:
    - угоду
    - фірму
    - послугу
    - зарплатню
  - sentence: Наша страхова _____ має чудову репутацію.
    answer: компанія
    options:
    - компанія
    - фірма
    - підприємство
    - організація
  - sentence: Ми повинні швидко покрити всі _____ після кризи.
    answer: збитки
    options:
    - збитки
    - податки
    - прибутки
    - інвестиції
  - sentence: Вони отримують хорошу _____ двічі на місяць.
    answer: зарплатню
    options:
    - зарплатню
    - перерву
    - договір
    - послугу
  - sentence: Керівник прийняв дуже _____ рішення.
    answer: правильне
    options:
    - правильне
    - вірне
    - чисте
    - постійне
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: quiz
  title: 'Перевірте знання: діловий контекст'
  items:
  - question: Яке слово найкраще підходить для позначення великого державного заводу?
    explanation: Слово підприємство має більш офіційний та індустріальний характер.
    options:
    - text: підприємство
      correct: true
    - text: компанія
      correct: false
    - text: фірма
      correct: false
    - text: відділ
      correct: false
  - question: Як правильно сказати про анулювання запланованої зустрічі?
    explanation: В українській мові зустрічі, рейси та плани скасовують.
    options:
    - text: скасувати зустріч
      correct: true
    - text: відмінити зустріч
      correct: false
    - text: змінити зустріч
      correct: false
    - text: зупинити зустріч
      correct: false
  - question: Що буквально означає вираз на протязі року?
    explanation: Слово протяг означає холодний вітер (draft), тому правильно казати
      протягом року.
    options:
    - text: сидіти на холодному вітрі цілий рік
      correct: true
    - text: працювати дуже швидко і багато
      correct: false
    - text: робити щось протягом усього року
      correct: false
    - text: продовжувати контракт щороку
      correct: false
  - question: Який відмінок обов'язково використовувати при звертанні в діловому листі?
    explanation: В українській мові для звертань завжди використовується кличний відмінок.
    options:
    - text: кличний відмінок
      correct: true
    - text: називний відмінок
      correct: false
    - text: родовий відмінок
      correct: false
    - text: давальний відмінок
      correct: false
  - question: Як правильно звернутися до директора на ім'я Максим у листі?
    explanation: Чоловічі імена на твердий приголосний мають закінчення -е у кличному
      відмінку.
    options:
    - text: Шановний Максиме
      correct: true
    - text: Шановний Максим
      correct: false
    - text: Шановний Максиму
      correct: false
    - text: Шановному Максиму
      correct: false
  - question: Що саме означає термін чистий прибуток компанії?
    explanation: Чистий прибуток — це гроші, які залишаються після сплати податків
      та всіх витрат.
    options:
    - text: гроші, що залишаються після сплати податків і витрат
      correct: true
    - text: всі гроші, які компанія отримує від клієнтів
      correct: false
    - text: гроші, які компанія платить державі
      correct: false
    - text: гроші, які компанія витрачає на маркетинг
      correct: false
  - question: Як саме розшифровується відома абревіатура ФОП в Україні?
    explanation: ФОП — це фізична особа-підприємець.
    options:
    - text: фізична особа-підприємець
      correct: true
    - text: фінансова організація підприємств
      correct: false
    - text: форма офіційного підприємства
      correct: false
    - text: фонд оплати праці
      correct: false
  - question: Яку синтаксичну конструкцію краще використовувати в діловому мовленні?
    explanation: Сучасний український бізнес цінує активність, тому краще використовувати
      активний стан.
    options:
    - text: активний стан (Ми підписали контракт)
      correct: true
    - text: пасивний стан (Контракт був підписаний)
      correct: false
    - text: безособові речення
      correct: false
    - text: складні підрядні речення
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Правда чи брехня: історія та етика бізнесу'
  items:
  - statement: Родина Симиренків фінансувала видання Кобзаря Тараса Шевченка.
    correct: true
    explanation: Платон Симиренко виділив 1100 рублів на видання Кобзаря.
  - statement: Термін фірма зазвичай використовується для опису великих державних
      заводів.
    correct: false
    explanation: Для державних заводів використовується термін підприємство.
  - statement: Родина Терещенків віддавала до 80 відсотків прибутку на благодійність.
    correct: true
    explanation: Вони керувалися девізом Прагнення до суспільної користі.
  - statement: Слово вірний є правильним вибором для опису успішного бізнес-рішення.
    correct: false
    explanation: Слово вірний стосується відданості, а рішення має бути правильним.
  - statement: ФОП є найпопулярнішою формою реєстрації для українських ІТ-фахівців.
    correct: true
    explanation: Ця форма має спрощену систему звітності та нижчі податки.
  - statement: Кличний відмінок від слова колега — це колегу.
    correct: false
    explanation: Жіночі та чоловічі іменники на -а (колега) мають закінчення -о (колего).
  - statement: В українській діловій мові рекомендується використовувати пасивний
      стан.
    correct: false
    explanation: Активний стан звучить значно професійніше і переконливіше.
  - statement: Обідня перерва зазвичай триває одну годину.
    correct: true
    explanation: Стандартна перерва триває рівно одну годину.
  instruction: Визначте, чи твердження правильне.
- type: error-correction
  title: 'Виправте помилки: ділова мова'
  items:
  - sentence: На жаль, ми змушені відмінити нашу завтрашню зустріч.
    error: відмінити
    answer: скасувати
    options:
    - скасувати
    - зупинити
    - змінити
    - перенести
    explanation: Слово відмінити стосується граматики, а зустрічі скасовують.
  - sentence: Директор прийняв дуже вірне рішення щодо нового проєкту.
    error: вірне
    answer: правильне
    options:
    - правильне
    - чисте
    - розумне
    - точне
    explanation: Рішення в бізнесі має бути правильним, а не вірним.
  - sentence: Шановний директор, ми надіслали вам звіт.
    error: директор
    answer: директоре
    options:
    - директоре
    - директору
    - директора
    - директором
    explanation: У звертаннях використовується кличний відмінок.
  - sentence: Я зроблю цей переклад на протязі наступного тижня.
    error: на протязі
    answer: протягом
    options:
    - протягом
    - за час
    - в період
    - під час
    explanation: Вираз на протязі означає in a draft. Правильно казати протягом.
  - sentence: Нами був підписаний новий договір з клієнтами.
    error: Нами був підписаний
    answer: Ми підписали
    options:
    - Ми підписали
    - Ми підписували
    - Нами підписувався
    - Підписався нами
    explanation: У діловій мові слід уникати пасивного стану і вживати активний.
  - sentence: Цей завод є великим державним компанією.
    error: компанією
    answer: підприємством
    options:
    - підприємством
    - фірмою
    - бізнесом
    - організацією
    explanation: Великий промисловий об'єкт держави називається підприємством.
