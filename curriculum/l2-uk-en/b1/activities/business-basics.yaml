- type: match-up
  title: 'Знайдіть пару: ділові словосполучення'
  instruction: З'єднайте слова так, щоб утворити правильні словосполучення.
  pairs:
  - left: заснувати
    right: компанію
  - left: чистий
    right: прибуток
  - left: залучати
    right: інвестиції
  - left: постійний
    right: клієнт
  - left: відділ
    right: продажу
  - left: приватний
