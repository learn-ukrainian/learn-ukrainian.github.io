- type: fill-in
  title: "Правила милозвучності (у або в)"
  instruction: "Оберіть правильний прийменник напрямку (у або в) відповідно до українських правил чергування звуків."
  items:
    - sentence: "Ми довго і дуже ретельно планували наш похід ___ Карпати."
      answer: "у"
      options:
        - "у"
        - "в"
        - "на"
        - "за"
      explanation: "Слово похід закінчується на приголосний, а Карпати починається на приголосний, тому між ними використовуємо голосний у."
    - sentence: "Вона вже багато років щасливо живе ___ гірському регіоні."
      answer: "в"
      options:
        - "в"
        - "у"
        - "на"
        - "за"
      explanation: "Слово живе закінчується на голосний, тому для плавності і милозвучності використовуємо приголосний в."
    - sentence: "Цей старий лісник завжди бере свій гострий ніж ___ ліс."
      answer: "у"
      options:
        - "у"
        - "в"
        - "до"
        - "на"
      explanation: "Між двома твердими приголосними звуками (ніж, ліс) потрібно ставити голосний прийменник у."
    - sentence: "Ми обережно поклали сухий теплий одяг ___ зручний наплічник."
      answer: "у"
      options:
        - "у"
        - "в"
        - "на"
        - "під"
      explanation: "Слово одяг закінчується на приголосний звук, тому ми ставимо далі голосний прийменник у."
    - sentence: "Після смачного обіду вони дуже швидко зібралися ___ похід."
      answer: "в"
      options:
        - "в"
        - "у"
        - "на"
        - "за"
      explanation: "Слово зібралися закінчується на голосний (я), тому тут використовуємо приголосний прийменник в."
    - sentence: "Мій дідусь колись виріс ___ цьому неймовірно красивому селі."
      answer: "у"
      options:
        - "у"
        - "в"
        - "на"
        - "за"
      explanation: "Між приголосними (виріс, цьому) ми обов'язково використовуємо голосний прийменник у для милозвучності."
    - sentence: "Мій неуважний друг випадково впав ___ холодну гірську річку."
      answer: "у"
      options:
        - "у"
        - "в"
        - "на"
        - "під"
      explanation: "Після приголосного (впав) перед приголосним (холодну) завжди ставимо голосний прийменник у."
    - sentence: "Я дуже часто зустрічаю її ___ горах на сонячних вихідних."
      answer: "в"
      options:
        - "в"
        - "у"
        - "на"
        - "за"
      explanation: "Після голосного звука (її) можна вільно ставити приголосний прийменник в."

