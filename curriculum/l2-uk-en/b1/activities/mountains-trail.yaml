- type: match-up
  title: "Знайдіть пару: туристичні терміни"
  instruction: "З'єднайте карпатський термін із його правильним значенням."
  pairs:
    - left: "наплічник"
      right: "зручна туристична сумка, яку носять на спині"
    - left: "намет"
      right: "тимчасове текстильне укриття для сну на природі"
    - left: "вогнище"
      right: "відкритий вогонь для обігріву та приготування їжі"
    - left: "стежка"
      right: "вузька ґрунтова дорога для пішохідного руху"
    - left: "вершина"
      right: "найвища точка будь-якої гори"
    - left: "маршрут"
      right: "заздалегідь спланований шлях руху мандрівника"
    - left: "рятувальник"
      right: "професіонал, який допомагає туристам у небезпеці"
    - left: "полонина"
      right: "відкрита високогірна ділянка для випасу тварин"
    - left: "спорядження"
      right: "спеціальний набір необхідних для мандрівки речей"
    - left: "двотисячник"
      right: "гора, висота якої перевищує дві тисячі метрів"

- type: true-false
  title: "Правда чи брехня"
  instruction: "Прочитайте твердження про Карпати і визначте, чи є вони правдивими."
  items:
    - statement: "Говерла та Петрос є єдиними горами-двотисячниками в Українських Карпатах."
      correct: false
      explanation: "В Україні є шість гір-двотисячників, і всі вони знаходяться на Чорногірському хребті."
    - statement: "Сучасні туристи все частіше віддають перевагу ультралегкому спорядженню."
      correct: true
      explanation: "Сьогодні туристи цінують мобільність, відмовляючись від надзвичайно важких старих рюкзаків."
    - statement: "На вузькій гірській стежці завжди обов'язково треба вітатися з іншими мандрівниками."
      correct: true
      explanation: "Це давнє і дуже суворе неписане правило карпатського етикету, яке демонструє взаємоповагу."
    - statement: "Знаменита обсерваторія Білий Слон розташована на найвищій вершині України."
      correct: false
      explanation: "Обсерваторія знаходиться на горі Піп Іван Чорногірський, а найвища вершина — це Говерла."
    - statement: "Традиційна українська культура вважає, що гори треба агресивно підкорювати."
      correct: false
      explanation: "З горами не можна боротися; у них можна лише ввічливо попросити дозволу на прохід."
    - statement: "Трейлраннінг — це просто звичайний похід у гори з легким наплічником."
      correct: false
      explanation: "Це складний біговий вид спорту, який вимагає іншої біомеханіки та спеціального екіпірування."
    - statement: "Перед складним походом група повинна обов'язково зареєструватися у рятувальників."
      correct: true
      explanation: "Ця дуже проста превентивна дія рятує десятки людських життів у горах щороку."
    - statement: "Згідно з екологічним стандартом Leave No Trace, залишки їжі можна кидати на траву."
      correct: false
      explanation: "Абсолютно все своє сміття, навіть органіку, потрібно забирати з собою у найближче місто."

- type: fill-in
  title: "Оберіть правильне дієслово руху (йти чи ходити)"
  instruction: "Прочитайте речення та оберіть дієслово йти або ходити відповідно до контексту (одномоментна дія чи звичка)."
  items:
    - sentence: "Ми дуже любимо українську природу, тому ___ у Карпати кожного літа."
      answer: "ходимо"
      options:
        - "ходимо"
        - "йдемо"
        - "підемо"
        - "йшли"
      explanation: "Дія повторюється щоліта, тому обов'язково використовуємо хабітуальне дієслово ходити."
    - sentence: "Подивись у вікно, он та велика група туристів зараз повільно ___ на Петрос."
      answer: "йде"
      options:
        - "йде"
        - "ходить"
        - "піде"
        - "ходили"
      explanation: "Група рухається прямо зараз у конкретному напрямку, тому потрібне дієслово йти."
    - sentence: "Мій старший брат професійно займається бігом і багато ___ складними гірськими маршрутами."
      answer: "ходить"
      options:
        - "ходить"
        - "йде"
        - "піде"
        - "йдуть"
      explanation: "Брат займається цим спортом регулярно, це його хобі, тому обираємо дієслово ходити."
    - sentence: "Алло, я зараз зовсім не можу розмовляти, я саме ___ крутою стежкою вгору."
      answer: "йду"
      options:
        - "йду"
        - "ходжу"
        - "піду"
        - "ходили"
      explanation: "Людина перебуває у процесі руху прямо під час телефонної розмови, тому треба казати йду."
    - sentence: "Досвідчені мандрівники ніколи не ___ в гори без попередньої реєстрації на рятувальній базі."
      answer: "ходять"
      options:
        - "ходять"
        - "йдуть"
        - "підуть"
        - "йшли"
      explanation: "Йдеться про загальне правило для всіх мандрівників у будь-який час, тому це регулярність (ходять)."
    - sentence: "Обережно, відійди вбік, прямо на нас ___ велика отара овець з полонини."
      answer: "йде"
      options:
        - "йде"
        - "ходить"
        - "підуть"
        - "ходили"
      explanation: "Отара наближається прямо зараз і рухається на нас, це односпрямований поточний процес (йде)."
    - sentence: "Цей старий і мудрий гуцульський пастух ___ на цю полонину вже понад п'ятдесят років."
      answer: "ходить"
      options:
        - "ходить"
        - "йде"
        - "піде"
        - "йшов"
      explanation: "Пастух робить це кожного сезону протягом багатьох років, це його багаторічна звичка (ходить)."
    - sentence: "Ми активно ___ маркованим туристичним маршрутом і бачимо попереду густий зелений ліс."
      answer: "йдемо"
      options:
        - "йдемо"
        - "ходимо"
        - "підемо"
        - "ходили"
      explanation: "Туристи рухаються вперед прямо зараз і описують те, що бачать перед собою (йдемо)."

- type: error-correction
  title: "Виправте мовні помилки (антисуржик)"
  instruction: "Знайдіть і виправте російські слова (суржик) у цих типових розмовних фразах туристів."
  items:
    - sentence: "Ввечері ми довго сиділи і грілися біля великого теплого костра."
      error: "костра"
      answer: "вогнища"
      error_type: "word"
      options:
        - "вогнища"
        - "каміна"
        - "полум'я"
        - "пожежі"
      explanation: "Слово костєр — це суржик. В українській мові правильно використовувати слово вогнище."
    - sentence: "Наш інструктор попросив поставити палатки ще до заходу сонця."
      error: "палатки"
      answer: "намети"
      error_type: "word"
      options:
        - "намети"
        - "будинки"
        - "шатра"
        - "курені"
      explanation: "Слово палатка походить з російської. Питоме українське слово для цього туристичного укриття — намет."
    - sentence: "Не забудь покласти пластикову бутилку з водою у бокову кишеню."
      error: "бутилку"
      answer: "пляшку"
      error_type: "word"
      options:
        - "пляшку"
        - "банку"
        - "склянку"
        - "флягу"
      explanation: "Бутилка є русизмом, чистою літературною мовою необхідно казати пляшка."
    - sentence: "Мій новий дорогий рюкзак має дуже зручну систему вентиляції спини."
      error: "рюкзак"
      answer: "наплічник"
      error_type: "word"
      options:
        - "наплічник"
        - "мішок"
        - "торбу"
        - "валізу"
      explanation: "Наплічник — це красиве питоме українське слово (від слів на плечі), яке свідомі туристи використовують замість німецького запозичення."
    - sentence: "Після дуже важкого переходу ми почали кушати приготовану кашу."
      error: "кушати"
      answer: "їсти"
      error_type: "word"
      options:
        - "їсти"
        - "ковтати"
        - "жувати"
        - "споживати"
      explanation: "Дієслово кушати — це яскравий маркер суржику. Українською мовою ми кажемо їсти."
    - sentence: "У цьому екстремальному змаганні приймали участь понад сотня атлетів."
      error: "приймали"
      answer: "брали"
      error_type: "phrase"
      options:
        - "брали"
        - "робили"
        - "мали"
        - "давали"
      explanation: "Українською мовою правильно казати брати участь. Калька приймати участь є поширеною помилкою."

- type: quiz
  title: "Перевірте свої знання про культуру Карпат"
  instruction: "Оберіть одну правильну відповідь на кожне запитання про українські гори."
  items:
    - question: "Чому українські гори сьогодні часто називають важливим терапевтичним простором?"
      explanation: "У горах людина повністю відключається від міського стресу та інформаційного шуму, що допомагає відновити ментальне здоров'я."
      options:
        - text: "Вони допомагають відновити ментальне здоров'я та відпочити від стресу"
          correct: true
        - text: "Там знаходяться найкращі та найсучасніші медичні клініки"
          correct: false
        - text: "Гірське повітря фізично лікує абсолютно всі відомі хвороби"
          correct: false
        - text: "У горах категорично заборонено користуватися будь-якими ліками"
          correct: false
    - question: "Хто за традиційними правилами повинен першим поступитися дорогою на вузькій стежці?"
      explanation: "Той, хто спускається, має поступитися дорогою тому, хто піднімається, бо підйом вимагає більше дихання і сил."
      options:
        - text: "Турист, який обережно спускається вниз"
          correct: true
        - text: "Турист, який важко піднімається вгору"
          correct: false
        - text: "Той мандрівник, чий наплічник є значно важчим"
          correct: false
        - text: "Молодший за віком турист завжди поступається старшому"
          correct: false
    - question: "Чому стару обсерваторію на горі Піп Іван неофіційно називають Білий Слон?"
      explanation: "Взимку будівля повністю вкривається товстим шаром снігу та льоду, дуже нагадуючи силует білого слона."
      options:
        - text: "Взимку під снігом і льодом вона нагадує силует великого слона"
          correct: true
        - text: "Там раніше дійсно жили привезені з далекої Африки слони"
          correct: false
        - text: "Будівля має дуже багато круглих куполів, схожих на слонів"
          correct: false
        - text: "Це було секретне кодове слово будівельників цієї обсерваторії"
          correct: false
    - question: "Що на практиці означає глобальний екологічний стандарт Leave No Trace?"
      explanation: "Цей стандарт вимагає забирати з гір абсолютно все сміття, включно з органічними залишками їжі."
      options:
        - text: "Забирати з собою у долину абсолютно все своє сміття"
          correct: true
        - text: "Ходити в гори босоніж, щоб не лишати слідів від важкого взуття"
          correct: false
        - text: "Ніколи не публікувати свої фотографії у соціальних мережах"
          correct: false
        - text: "Обережно закопувати пластик глибоко в землю подалі від стежки"
          correct: false
    - question: "Яка гірська вершина є найвищою точкою на всій території України?"
      explanation: "Гора Говерла має висоту 2061 метр і є найвищою точкою в Українських Карпатах."
      options:
        - text: "Гора Говерла"
          correct: true
        - text: "Гора Петрос"
          correct: false
        - text: "Гора Піп Іван Чорногірський"
          correct: false
        - text: "Гора Сивуля"
          correct: false
    - question: "Чим кардинально відрізняються гірські масиви Чорногора та Ґорґани?"
      explanation: "Чорногора вкрита м'якою альпійською травою, а Ґорґани — це суворе царство гострого та небезпечного каміння."
      options:
        - text: "Чорногора вкрита травою, а Ґорґани — слизьким гострим камінням"
          correct: true
        - text: "Чорногора дуже низька, а в Ґорґанах є багато двотисячників"
          correct: false
        - text: "У Чорногорі зовсім немає води, а в Ґорґанах багато озер"
          correct: false
        - text: "Масив Ґорґани значно безпечніший для туристів, ніж Чорногора"
          correct: false
    - question: "Що таке полонина в контексті української географії та культури?"
      explanation: "Полонина — це безліса високогірна ділянка, яка століттями використовується гуцульськими пастухами для випасу худоби."
      options:
        - text: "Відкрита високогірна ділянка для випасу овець та корів"
          correct: true
        - text: "Дуже глибока печера у самому центрі гірського масиву"
          correct: false
        - text: "Спеціальний гуцульський інструмент для швидкого орієнтування"
          correct: false
        - text: "Старий дерев'яний будинок, де живуть туристи та рятувальники"
          correct: false
    - question: "Для чого туристи мають обов'язково реєструватися у рятувальників перед походом?"
      explanation: "Реєстрація потрібна для того, щоб у разі втрати зв'язку рятувальники могли оперативно та точно розпочати пошук."
      options:
        - text: "Щоб рятувальники могли відразу почати пошук, якщо група зникне"
          correct: true
        - text: "Щоб отримати платний офіційний дозвіл на розпалювання багаття"
          correct: false
        - text: "Щоб безкоштовно орендувати найсучасніше гірське спорядження"
          correct: false
        - text: "Щоб забронювати собі гарантоване зручне місце у теплому наметі"
          correct: false

- type: unjumble
  title: "Складіть речення"
