version: '1.0'
module: simplification-consonants
level: b1
inline:
- id: match-up-base-derivative
  type: match-up
  instruction: З'єднайте базовий іменник із правильним похідним прикметником (зверніть
    увагу на спрощення)
  pairs:
  - left: проїзд
    right: проїзний
  - left: щастя
    right: щасливий
  - left: радість
    right: радісний
  - left: швидкість
    right: швидкісний
  - left: тиждень
    right: тижневий
  - left: честь
    right: чесний
  - left: лестощі
    right: улесливий
- id: fill-in-adjectives
  type: fill-in
  instruction: Вставте правильну форму прикметника. Зверніть увагу на спрощення!
  items:
  - sentence: Це був дуже _____ день для нас.
    answer: радісний
    options:
    - радістний
    - радісний
    - радісьний
  - sentence: Сьогодні курсує новий _____ поїзд до Києва.
    answer: швидкісний
    options:
    - швидкістний
    - швидкісний
    - швидкостний
  - sentence: Ми купили _____ проїзний квиток на трамвай.
    answer: тижневий
    options:
    - тиждневий
    - тижневий
    - тижньовий
  - sentence: Контролер перевірив мій _____ квиток.
    answer: проїзний
    options:
    - проїздний
    - проїзний
    - проїжджий
  - sentence: Її брат — дуже _____ хлопець, він ніколи не бреше.
    answer: чесний
    options:
    - честний
    - чесний
    - чісний
  - sentence: Він виграв у лотерею і тепер дуже _____.
    answer: щасливий
    options:
    - щастливий
    - щасливий
    - щаслівий
- id: quiz-keep-or-drop
  type: true-false
  instruction: Спрощення чи збереження? Чи пишеться літера «т» у цих словах?
  items:
  - statement: У слові «шістнадцять» (від числівника «шість») літера «т» зберігається
      на письмі.
    correct: true
    explanation: Літера «т» зберігається на письмі, хоча у швидкій вимові звук зникає.
  - statement: У слові «радісний» (від іменника «радість») літера «т» зберігається
      на письмі.
    correct: false
    explanation: Звук «т» випадає на письмі заради милозвучності (спрощення групи
      «стн»).
  - statement: У слові «агентство» (іншомовного походження) літера «т» зберігається
      на письмі.
    correct: true
    explanation: В іншомовних словах (агент, контраст) літера «т» залишається на своєму
      місці.
  - statement: У слові «щасливий» (від іменника «щастя») літера «т» зберігається на
      письмі.
    correct: false
    explanation: 'Спрощення закріплене на письмі: літера «т» зникає з групи «стл».'
  - statement: Слово «хвастливий» є винятком, тому літера «т» зберігається на письмі.
    correct: true
    explanation: Це слово є винятком. Воно не піддається спрощенню ні у вимові, ні
      на письмі.
  - statement: У слові «чесний» (від іменника «честь») літера «т» зберігається на
      письмі.
    correct: false
    explanation: Відбувається спрощення на письмі (зникає літера «т»).
- id: group-sort-simplification
  type: group-sort
  instruction: Розподіліть слова у дві групи за правилами спрощення.
  groups:
  - label: Літера випадає на письмі (закріплене спрощення)
    items:
    - щасливий
    - проїзний
    - тижневий
    - радісний
    - чесний
    - улесливий
  - label: Літера зберігається на письмі (винятки та іншомовні слова)
    items:
    - шістнадцять
    - контрастний
    - агентство
    - пестливий
    - туристський
    - хвастливий
