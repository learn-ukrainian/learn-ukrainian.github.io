version: '1.0'
module: simplification-consonants
level: b1
inline:
- id: match-up-base-derivative
  type: match-up
  instruction: З'єднайте базове слово з його похідним словом, у якому відбулося спрощення
  pairs:
  - left: радість
    right: радісний
  - left: щастя
    right: щасливий
  - left: тиждень
    right: тижневий
  - left: проїзд
    right: проїзний
  - left: швидкість
    right: швидкісний
  - left: честь
    right: чесний
  - left: масло
    right: масний
  - left: блиск
    right: блиснути
  title: З'єднайте базове слово з його похідним словом, у якому відбулося спрощення
- id: fill-in-adjectives
  type: fill-in
  instruction: Вставте правильну форму похідного прикметника
  items:
  - sentence: Це дуже _____ порада.
    answer: корисна
    options:
    - корисна
    - користна
    - корисне
    - користне
  - sentence: Він завжди чекає на _____ новину.
    answer: радісну
    options:
    - радісну
    - радістну
    - радісний
    - радістний
  - sentence: Ми купили _____ проїзний квиток.
    answer: тижневий
    options:
    - тижневий
    - тиждневий
    - тижнева
    - тижднева
  - sentence: Сьогодні він має дуже _____ вигляд.
    answer: щасливий
    options:
    - щасливий
    - щастливий
    - щасливе
    - щастливе
  - sentence: До Києва вирушив _____ поїзд.
    answer: швидкісний
    options:
    - швидкісний
    - швидкістний
    - швидкісна
    - швидкістна
  - sentence: Мій друг — винятково _____ людина.
    answer: чесна
    options:
    - чесна
    - честна
    - чесний
    - честний
  - sentence: У мене є _____ документ на метро.
    answer: проїзний
    options:
    - проїзний
    - проїздний
    - проїзна
    - проїздна
  - sentence: Ми приїхали в _____ центр.
    answer: обласний
    options:
    - обласний
    - областний
    - обласна
    - областна
  title: Вставте правильну форму похідного прикметника
- id: quiz-keep-or-drop
  type: quiz
  instruction: Оберіть правильне написання похідного слова. Чи випадає приголосний?
  items:
  - question: шість + -надцять =
    options:
    - шістнадцять
    - шіснадцять
    - шістнацять
    - шестнадцять
    correct: 0
  - question: контраст + -ний =
    options:
    - контрастний
    - контрасний
    - котрастний
    - контрастній
    correct: 0
  - question: лестощі + -лив- =
    options:
    - улесливий
    - улестливий
    - лестливий
    - улесливе
    correct: 0
  - question: пестити + -лив- =
    options:
    - пестливий
    - песливий
    - пестливе
    - песлива
    correct: 0
  - question: кістка + -ляв- =
    options:
    - кістлявий
    - кіслявий
    - кістявий
    - костлявий
    correct: 0
  - question: виїзд + -ний =
    options:
    - виїзний
    - виїздний
    - виїздна
    - виїздній
    correct: 0
  - question: хвастати + -лив- =
    options:
    - хвастливий
    - хвасливий
    - хвастлива
    - хваслива
    correct: 0
  - question: агент + -ств- =
    options:
    - агентство
    - агенство
    - агенцтво
    - агентсво
    correct: 0
  title: Оберіть правильне написання похідного слова. Чи випадає приголосний?
- id: group-sort-simplification
  type: group-sort
  instruction: 'Розподіліть слова у дві групи: де спрощення закріплене на письмі та
    винятки (де літера зберігається)'
  groups:
  - label: Спрощення закріплене на письмі
    items:
    - радісний
    - тижневий
    - щасливий
    - чесний
    - корисний
    - проїзний
  - label: Винятки (літера зберігається)
    items:
    - шістнадцять
    - контрастний
    - агентство
    - туристський
    - баластний
    - кістлявий
  title: 'Розподіліть слова у дві групи: де спрощення закріплене на письмі та винятки
    (де '
workbook:
- type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: He is a very honest person.
    options:
    - text: Він дуже чесна людина.
      correct: true
    - text: Він дуже честна людина.
      correct: false
    - text: Він дуже честьна людина.
      correct: false
    - text: Він дуже чесний людина.
      correct: false
  - source: We bought a weekly ticket.
    options:
    - text: Ми купили тижневий квиток.
      correct: true
    - text: Ми купили тиждневий квиток.
      correct: false
    - text: Ми купили тижневний квиток.
      correct: false
    - text: Ми купили тижня квиток.
      correct: false
  - source: She gave me useful advice.
    options:
    - text: Вона дала мені корисну пораду.
      correct: true
    - text: Вона дала мені користну пораду.
      correct: false
    - text: Вона дала мені корисна пораду.
      correct: false
    - text: Вона дала мені користний пораду.
      correct: false
  - source: The high-speed train arrived on time.
    options:
    - text: Швидкісний поїзд прибув вчасно.
      correct: true
    - text: Швидкістний поїзд прибув вчасно.
      correct: false
    - text: Швидкий поїзд прибув вчасно.
      correct: false
    - text: Швидкісний поїзд прибув вчасний.
      correct: false
  - source: They live in the regional center.
    options:
    - text: Вони живуть в обласному центрі.
      correct: true
    - text: Вони живуть в областному центрі.
      correct: false
    - text: Вони живуть в обласний центрі.
      correct: false
    - text: Вони живуть в обласнім центрі.
      correct: false
  - source: They were happy to see us.
    options:
    - text: Вони були щасливі бачити нас.
      correct: true
    - text: Вони були щастливі бачити нас.
      correct: false
    - text: Вони були щасливими бачити нас.
      correct: false
    - text: Вони були щасливий бачити нас.
      correct: false
  title: Оберіть правильний переклад речення
- type: unjumble
  instruction: Складіть правильне речення зі слів. Зверніть увагу на слова зі спрощенням
  items:
  - words:
    - дуже
    - чесна
    - Він
    - людина.
    correct_order:
    - Він
    - дуже
    - чесна
    - людина.
  - words:
    - квиток.
    - купив
    - Я
    - проїзний
    correct_order:
    - Я
    - купив
    - проїзний
    - квиток.
  - words:
    - зупинок.
    - без
    - поїзд
    - Швидкісний
    - їде
    correct_order:
    - Швидкісний
    - поїзд
    - їде
    - без
    - зупинок.
  - words:
    - радісну
    - звістку.
    - отримали
    - Ми
    correct_order:
    - Ми
    - отримали
    - радісну
    - звістку.
  - words:
    - вигляд.
    - має
    - щасливий
    - Вона
    correct_order:
    - Вона
    - має
    - щасливий
    - вигляд.
  - words:
    - написала
    - план.
    - Вчителька
    - тижневий
    correct_order:
    - Вчителька
    - написала
    - тижневий
    - план.
  title: Складіть правильне речення зі слів. Зверніть увагу на слова зі спрощенням
