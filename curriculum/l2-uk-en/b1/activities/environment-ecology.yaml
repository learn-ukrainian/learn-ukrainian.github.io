        - text: 'Сортування сміття'
          correct: false
        - text: 'Захист довкілля'
          correct: false
        - text: 'Збір відходів'
          correct: false
    - question: 'У якому відмінку має стояти слово після іменника забруднення?'
      explanation: 'Ми завжди кажемо: забруднення чого? Наприклад: забруднення повітря, води або ґрунту.'
      options:
        - text: 'У родовому відмінку'
          correct: true
        - text: 'У знахідному відмінку'
          correct: false
        - text: 'У місцевому відмінку'
          correct: false
        - text: 'В орудному відмінку'
