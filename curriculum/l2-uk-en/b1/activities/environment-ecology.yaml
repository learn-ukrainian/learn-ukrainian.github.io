          correct: false
        - text: 'Вона створює нові хороші робочі місця для місцевих'
          correct: false
    - question: 'Який сполучник причини є найкоротшим та найбільш розмовним?'
      explanation: 'Сполучник бо є дуже коротким динамічним і неймовірно поширеним у повсякденній розмовній мові.'
