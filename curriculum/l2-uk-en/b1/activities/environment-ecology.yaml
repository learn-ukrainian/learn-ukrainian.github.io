    - question: 'Чому купання туристів в гірському озері Синевир суворо заборонене?'
      explanation: 'Людина у воді може зруйнувати крихку екосистему та зашкодити рідкісним мікроорганізмам.'
      options:
        - text: 'Людина порушує хімічний баланс місцевої екосистеми'
          correct: true
