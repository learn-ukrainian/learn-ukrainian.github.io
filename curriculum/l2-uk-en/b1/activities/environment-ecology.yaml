  blanks:
    - id: 1
      answer: 'екосистема'
      options: ['екосистема', 'енергія', 'переробка', 'вирубка']
    - id: 2
      answer: 'ліс'
      options: ['ліс', 'ґрунт', 'завод', 'пластик']
    - id: 3
      answer: 'вирубка'
      options: ['вирубка', 'повінь', 'річка', 'охорона']
    - id: 4
      answer: 'повінь'
      options: ['повінь', 'гора', 'потепління', 'тварина']
    - id: 5
      answer: 'річку'
      options: ['річку', 'озеро', 'ліс', 'гору']
    - id: 6
      answer: 'тварини'
      options: ['тварини', 'люди', 'туристи', 'дерева']
    - id: 7
      answer: 'природу'
      options: ['природу', 'сміття', 'відходи', 'забруднення']
    - id: 8
      answer: 'заповідник'
      options: ['заповідник', 'парк', 'ліс', 'сад']
    - id: 9
      answer: 'сміття'
      options: ['сміття', 'дерева', 'тварин', 'воду']
    - id: 10
      answer: 'захист'
      options: ['захист', 'вирубка', 'викид', 'ґрунт']
    - id: 11
      answer: 'викиди'
      options: ['викиди', 'ліси', 'річки', 'озера']
    - id: 12
      answer: 'потепління'
      options: ['потепління', 'забруднення', 'сортування', 'збереження']
    - id: 13
      answer: 'відходи'
      options: ['відходи', 'ліси', 'гори', 'парки']
    - id: 14
      answer: 'енергію'
      options: ['енергію', 'воду', 'природу', 'переробку']

- type: unjumble
  title: 'Складіть речення: причини та наслідки'
  instruction: 'Відновіть правильний порядок слів у реченнях про екологію.'
  items:
    - words: ['Ми', 'сортуємо', 'побутові', 'відходи', 'щодня']
      answer: 'Ми сортуємо побутові відходи щодня'
    - words: ['Карпатські', 'ліси', 'називають', 'легенями', 'Європи']
      answer: 'Карпатські ліси називають легенями Європи'
    - words: ['Глобальне', 'потепління', 'швидко', 'змінює', 'клімат']
      answer: 'Глобальне потепління швидко змінює клімат'
    - words: ['Вторинна', 'переробка', 'зменшує', 'кількість', 'сміття']
      answer: 'Вторинна переробка зменшує кількість сміття'
    - words: ['Відновлювана', 'енергія', 'захищає', 'наше', 'довкілля']
      answer: 'Відновлювана енергія захищає наше довкілля'
    - words: ['Великі', 'звалища', 'отруюють', 'підземні', 'води']
      answer: 'Великі звалища отруюють підземні води'
    - words: ['Масова', 'вирубка', 'лісів', 'викликає', 'повені']
      answer: 'Масова вирубка лісів викликає повені'
    - words: ['Дикі', 'тварини', 'безпечно', 'живуть', 'там']
      answer: 'Дикі тварини безпечно живуть там'

- type: error-correction
  title: 'Виправте типові помилки'
  instruction: 'Знайдіть помилку в реченні і виберіть правильний варіант.'
  items:
    - sentence: 'Забруднення повітрям у нашому місті стало критичним.'
      error: 'повітрям'
      answer: 'повітря'
      options: ['повітрям', 'повітря', 'повітрі', 'повітрю']
      explanation: 'Після віддієслівного іменника забруднення завжди використовуємо родовий відмінок.'
    - sentence: 'Автомобілі щодня спричиняють сильне забруднення в повітрі.'
      error: 'в повітрі'
      answer: 'повітря'
      error_type: 'phrase'
      options: ['в повітрі', 'повітря', 'на повітря', 'до повітря']
      explanation: 'Правильна академічна конструкція звучить як забруднення повітря без жодного прийменника.'
    - sentence: 'Ця компанія успішно робить ресайклінг пластикових пляшок.'
      error: 'ресайклінг'
      answer: 'переробку'
      options: ['ресайклінг', 'переробку', 'вирубку', 'екологію']
      explanation: 'В українській мові значно краще та природніше використовувати слово переробка.'
    - sentence: 'Я завжди кушаю свіжі яблука з власного саду.'
      error: 'кушаю'
      answer: 'їм'
      options: ['кушаю', 'їм', 'зїдаю', 'харчуюсь']
      explanation: 'Слово кушати — це поширений русизм. Українською правильно казати їсти.'
    - sentence: 'Карпати дуже страждають через масову вирубку ліса браконьєрами.'
      error: 'ліса'
      answer: 'лісів'
      options: ['ліса', 'лісів', 'лісом', 'лісі']
      explanation: 'Правильна форма множини в родовому відмінку — лісів (вирубка лісів).'
    - sentence: 'Сьогоднішнє забруднення вода шкодить рідкісним рибам в озері Синевир.'
      error: 'вода'
      answer: 'води'
      options: ['вода', 'води', 'воду', 'воді']
      explanation: 'Слово вода обов’язково має стояти в родовому відмінку: забруднення чого.'
    - sentence: 'Річка вийшла з берегів, через те рясні дощі йшли цілий тиждень.'
      error: 'через те'
      answer: 'через те що'
      error_type: 'phrase'
      options: ['через те', 'через те що', 'тому', 'бо що']
      explanation: 'Повний складений сполучник причини складається з трьох слів — через те що.'
    - sentence: 'Усім треба сортувати побутове сміття, що це дуже важливо для майбутнього.'
      error: 'що'
      answer: 'бо'
      options: ['що', 'бо', 'як', 'коли']
      explanation: 'Для швидкого вказування причини в розмовній мові часто використовують сполучник бо.'

- type: mark-the-words
  title: 'Знайдіть екологічні терміни'
  instruction: 'Знайдіть і позначте всі ключові іменники, що стосуються екології, у цьому тексті.'
  text: 'Сьогодні захист природи став дуже важливим завданням. Забруднення повітря шкодить нашому здоров’ю. Великі підприємства генерують токсичні викиди газів. Сучасне довкілля потребує нашої негайної допомоги. Ми повинні щодня сортувати побутові відходи. Тільки масова переробка сміття та відновлювана енергія врятують планету.'
  answers: ['природи', 'Забруднення', 'повітря', 'викиди', 'довкілля', 'відходи', 'переробка', 'сміття', 'енергія']

