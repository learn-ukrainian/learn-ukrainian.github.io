- type: fill-in
  title: 'Вставте пропущене слово: практика'
  instruction: 'Оберіть найкраще слово для кожного речення.'
  items:
    - sentence: 'Ми повинні берегти наше _____ для майбутніх поколінь.'
      answer: 'довкілля'
      options: ['довкілля', 'середовище', 'приміщення', 'місце']
    - sentence: 'Пластикові пакети шкодять, тому краще використовувати _____ торбинки.'
      answer: 'багаторазові'
      options: ['багаторазові', 'токсичні', 'старі', 'шкідливі']
    - sentence: 'Масове _____ повітря у великих містах викликає захворювання.'
      answer: 'забруднення'
      options: ['забруднення', 'захист', 'сортування', 'відновлення']
    - sentence: 'Замість слова ресайклінг українською краще казати _____.'
      answer: 'переробка'
      options: ['переробка', 'викид', 'вирубка', 'екосистема']
    - sentence: 'Автомобілі постійно генерують шкідливі _____ газів у повітря.'
      answer: 'викиди'
      options: ['викиди', 'відходи', 'сміття', 'ліси']
    - sentence: 'Карпати часто називають _____ Європи бо вони продукують кисень.'
      answer: 'легенями'
      options: ['легенями', 'горами', 'озерами', 'річками']
    - sentence: 'Незаконна _____ лісів швидко призводить до сильних повеней.'
      answer: 'вирубка'
      options: ['вирубка', 'посадка', 'переробка', 'охорона']
    - sentence: 'Озеро Синевир дуже холодне, _____ воно живиться підземними джерелами.'
      answer: 'тому що'
      options: ['тому що', 'аби', 'щоб', 'хоча']
    - sentence: 'Сонячна та вітрова _____ допомагає зменшити вплив на клімат.'
      answer: 'енергія'
      options: ['енергія', 'вода', 'природа', 'гора']
    - sentence: 'Вони сортують сміття вдома, _____ щиро хочуть допомогти планеті.'
      answer: 'бо'
      options: ['бо', 'але', 'або', 'проте']
    - sentence: 'Карпатський _____ надійно охороняє рідкісні види диких тварин.'
      answer: 'заповідник'
      options: ['заповідник', 'лісник', 'турист', 'браконьєр']
    - sentence: 'Річки виходять з берегів _____ рясні дощі не припиняються.'
      answer: 'через те що'
      options: ['через те що', 'для того щоб', 'незважаючи на', 'ніби']

- type: quiz
