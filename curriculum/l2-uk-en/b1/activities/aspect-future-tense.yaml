version: '1.0'
module: aspect-future-tense
level: b1
inline:
- id: quiz-future-intuition
  type: quiz
  instruction: Оберіть найбільш природний варіант для кожної ситуації
  items:
  - question: 'Ви обіцяєте керівнику закінчити звіт до п''ятниці:'
    options:
    - я буду писати
    - я напишу
    - я писатиму
    - я буду написати
    correct: 1
  - question: 'Ви описуєте свій ідеальний вихідний (довгий приємний процес):'
    options:
    - я прочитаю
    - я зроблю
    - я буду читати
    - я закінчу
    correct: 2
  - question: 'Ви повідомляєте про чіткий план змінити локацію (результат):'
    options:
    - я поїду
    - я буду їхати
    - я їхатиму
    - я буду поїхати
    correct: 0
  - question: 'Ви говорите про тривалий процес у поетичному або писемному стилі:'
    options:
    - я буду працювати
    - я працюватиму
    - я попрацюю
    - я зроблю
    correct: 1
  - question: 'Ви даєте гарантію, що забронюєте готель сьогодні:'
    options:
    - я буду бронювати
    - я бронюватиму
    - я забронюю
    - я буду забронювати
    correct: 2
  - question: 'Ви говорите про свої старання (процесна обіцянка):'
    options:
    - я постараюся
    - я буду старатися
    - я зроблю
    - я вирішу
    correct: 1
  - question: Що з цього є неможливою граматичною формою (помилкою)?
    options:
    - я буду робити
    - я робитиму
    - я зроблю
    - я буду зробити
    correct: 3
  - question: 'Ви плануєте довго насолоджуватися природою:'
    options:
    - я насолоджуватимуся
    - я насолоджуся
    - я закінчу
    - я зроблю
    correct: 0
  - question: 'Ви підкреслюєте фінал вашої роботи (до кінця дня):'
    options:
    - я буду закінчувати
    - я закінчу
    - я працюватиму
    - я буду працювати
    correct: 1
  - question: Яка конструкція належить до доконаного виду?
    options:
    - складений час
    - синтетичний час
    - простий час
    - жодна з них
    correct: 2
- id: group-sort
  type: group-sort
  instruction: Розподіліть дієслова за трьома конструкціями майбутнього часу
  groups:
  - label: Складений (процес, розмовний)
    items:
    - буду читати
    - будуть працювати
    - будемо відпочивати
    - будеш планувати
  - label: Синтетичний (процес, писемний)
    items:
    - читатиму
    - працюватимуть
    - відпочиватимемо
    - плануватимеш
  - label: Простий (результат, доконаний)
    items:
    - прочитаю
    - попрацюють
    - відпочинемо
    - заплануєш
- id: fill-in
  type: fill-in
  instruction: Утворіть правильну форму майбутнього часу за контекстом
  items:
  - sentence: Завтра я обов'язково _____ (закінчити) цей проєкт.
    answer: закінчу
    options:
    - закінчу
    - буду закінчувати
    - закінчуватиму
  - sentence: Ввечері ми _____ (насолоджуватися) тишею в горах.
    answer: будемо насолоджуватися
    options:
    - будемо насолоджуватися
    - насолодимося
    - будемо насолодитися
  - sentence: Я _____ (забронювати) номер у готелі прямо зараз.
    answer: забронюю
    options:
    - забронюю
    - буду бронювати
    - бронюватиму
  - sentence: Цілий день вона _____ (працювати) над статтею.
    answer: працюватиме
    options:
    - працюватиме
    - попрацює
    - буде попрацювати
  - sentence: Ти точно _____ (пообіцяти) мені це зробити?
    answer: пообіцяєш
    options:
    - пообіцяєш
    - будеш обіцяти
    - обіцятимеш
  - sentence: Ми _____ (старатися) вчитися краще, це наша процесна обіцянка.
    answer: будемо старатися
    options:
    - будемо старатися
    - постараємося
    - будемо постаратися
  - sentence: Коли ти нарешті повністю _____ (написати) цей лист?
    answer: напишеш
    options:
    - напишеш
    - будеш писати
    - писатимеш
  - sentence: Вони _____ (планувати) свою відпустку цілий тиждень.
    answer: плануватимуть
    options:
    - плануватимуть
    - запланують
    - будуть запланувати
- id: error-correction-future
  type: error-correction
  instruction: Знайдіть і виправте логічні та граматичні помилки (неправильні конструкції)
  items:
  - sentence: Я буду написати тобі завтра вранці.
    error: буду написати
    correction: напишу
    error_type: construction
    options:
    - напишу
    - писатиму
    - буду писати
    explanation: 'Не можна поєднувати допоміжне слово ''буду'' з доконаним видом.
      Для результату використовуємо просту форму: напишу.'
  - sentence: Ми будемо зробити це складне завдання разом.
    error: будемо зробити
    correction: зробимо
    error_type: construction
    options:
    - зробимо
    - будемо робити
    - робитимемо
    explanation: 'Слово ''зробити'' — це доконаний вид (результат). Гібриду не існує,
      правильна форма: зробимо.'
  - sentence: Вона прочитає цю цікаву книгу цілий день.
    error: прочитає
    correction: читатиме
    error_type: construction
    options:
    - читатиме
    - буде читати
    - прочитала
    explanation: Маркер 'цілий день' вимагає процесу (недоконаний вид), а 'прочитає'
      — це миттєвий результат.
  - sentence: Я буду пообіцяти тобі свою допомогу.
    error: буду пообіцяти
    correction: пообіцяю
    error_type: construction
    options:
    - пообіцяю
    - обіцятиму
    - буду обіцяти
    explanation: Дієслово 'пообіцяти' належить до доконаного виду. Гібрид 'буду +
      доконаний вид' є грубою помилкою.
  - sentence: Вони будуть закінчити роботу о шостій.
    error: будуть закінчити
    correction: закінчать
    error_type: construction
    options:
    - закінчать
    - будуть закінчувати
    - закінчуватимуть
    explanation: Допоміжне дієслово 'будуть' категорично не використовується з інфінітивом
      доконаного виду ('закінчити').
  - sentence: Ти заплануєш свою весняну поїздку весь вечір?
    error: заплануєш
    correction: плануватимеш
    error_type: construction
    options:
    - плануватимеш
    - будеш планувати
    - сплануєш
    explanation: Словосполучення 'весь вечір' позначає тривалість, тому потрібен недоконаний
      вид (плануватимеш або будеш планувати).
- id: match-up
  type: match-up
  instruction: З'єднайте комунікативну ситуацію з найбільш природною формою
  pairs:
  - left: Тверда обіцянка результату
    right: Я обов'язково зроблю це.
  - left: Опис тривалого процесу (розмовний стиль)
    right: Я буду писати звіт.
  - left: Опис тривалого процесу (писемний стиль)
    right: Я працюватиму над статтею.
  - left: Процесна обіцянка (гарантія зусиль)
    right: Я буду дуже старатися.
  - left: Фокус на швидкому завершенні
    right: Я зараз швидко напишу.
  - left: Планування довгого відпочинку
    right: Ми будемо насолоджуватися природою.
  - left: Гарантія факту бронювання
    right: Я забронюю хороший готель.
  - left: Неможлива граматична форма
    right: Я буду прочитати книгу.
- id: open-writing-tomorrow-plan
  type: essay-response
  prompt: Напишіть свій план на завтра (Мій план на завтра). Використовуйте і процеси
    (складений або синтетичний час), і конкретні результати (простий час). Мінімум
    5 речень. Зверніть увагу на правильний вибір виду дієслова.
  min_words: 50
  model_answer: Завтра я прокинуся дуже рано. Зранку я буду довго і спокійно снідати.
    О дев'ятій годині я швидко поїду на роботу. Там я активно працюватиму до шостої
    вечора, бо маю багато важливих завдань. Я обов'язково закінчу свій новий проєкт.
    А ввечері я просто буду насолоджуватися приємним відпочинком удома.
  evaluation_criteria:
  - 'Студент використовує майбутній час доконаного виду для конкретних результатів
    (наприклад: прокинуся, поїду, закінчу).'
  - 'Студент використовує майбутній час недоконаного виду для тривалих процесів (наприклад:
    буду снідати, працюватиму, буду насолоджуватися).'
  - Немає грубих помилок типу 'буду + доконаний вид' (наприклад, 'буду зробити').
  - Текст звучить природно і логічно поєднує різні часові конструкції.
