version: '1.0'
module: aspect-future-tense
level: b1
inline:
- id: quiz-future-intuition
  type: quiz
  instruction: Оберіть найбільш природний варіант для кожної ситуації
  items:
  - question: 'Обіцянка керівнику: «Я обов''язково _____ цей звіт до п''ятниці.»'
    options:
    - закінчу
    - буду закінчувати
    - закінчуватиму
    - закінчив
    correct: 0
  - question: 'План на вечір: «Сьогодні я весь вечір _____ нову книгу.»'
    options:
    - читатиму
    - прочитаю
    - прочитав
    - прочитатиму
    correct: 0
  - question: 'Довгий процес: «Завтра з десятої до дванадцятої ми _____ цей важливий
      проєкт.»'
    options:
    - будемо обговорювати
    - обговоримо
    - обговорили
    - будемо обговорити
    correct: 0
  - question: 'Гарантований результат: «Я точно _____ квитки на потяг сьогодні ввечері.»'
    options:
    - забронюю
    - буду бронювати
    - бронюватиму
    - бронював
    correct: 0
  - question: 'Обіцянка: «Я _____ тобі, як тільки приїду додому.»'
    options:
    - напишу
    - буду писати
    - писатиму
    - написав
    correct: 0
  - question: 'Поетичний/писемний стиль (процес): «Наступного року я _____ в університеті.»'
    options:
    - навчатимуся
    - навчуся
    - буду навчитися
    - навчився
    correct: 0
  - question: 'Тривалий відпочинок: «На вихідних я просто _____ природою і нічого
      не робитиму.»'
    options:
    - насолоджуватимуся
    - насолоджуся
    - буду насолодитися
    - насолодився
    correct: 0
  - question: 'Конкретний план (результат): «Ми _____ нашу подорож до найменших деталей.»'
    options:
    - заплануємо
    - будемо планувати
    - плануватимемо
    - планували
    correct: 0
  - question: 'Обіцянка зусиль (процес): «Я _____ ніколи не запізнюватися на уроки.»'
    options:
    - старатимуся
    - постараюся
    - постарався
    - старався
    correct: 0
  - question: 'Передбачення результату: «Вона успішно _____ цей складний іспит.»'
    options:
    - складе
    - буде складати
    - складатиме
    - склала
    correct: 0
  title: Оберіть найбільш природний варіант для кожної ситуації
- id: group-sort
  type: group-sort
  instruction: Розподіліть дієслова за типами майбутнього часу (три конструкції)
  groups:
  - label: Складений майбутній час (процес)
    items:
    - буду працювати
    - будемо читати
    - будете планувати
    - будуть насолоджуватися
  - label: Синтетичний майбутній час (процес)
    items:
    - працюватиму
    - читатимемо
    - плануватимете
    - старатимуся
  - label: Простий майбутній час (результат)
    items:
    - зроблю
    - прочитаємо
    - заплануєте
    - пообіцяє
  title: Розподіліть дієслова за типами майбутнього часу (три конструкції)
- id: fill-in
  type: fill-in
  instruction: Вставте правильну форму дієслова в майбутньому часі
  items:
  - sentence: Я _____ тобі, що все буде добре.
    answer: пообіцяю
    options:
    - пообіцяю
    - буду обіцяти
    - обіцятиму
  - sentence: Завтра вранці я _____ смачною кавою.
    answer: насолоджуватимуся
    options:
    - насолоджуватимуся
    - буду насолоджуватися
    - насолоджуся
  - sentence: Ми обов'язково _____ цей проєкт вчасно.
    answer: закінчимо
    options:
    - закінчимо
    - будемо закінчувати
    - закінчуватимемо
  - sentence: Вони весь день _____ свою відпустку.
    answer: будуть планувати
    options:
    - будуть планувати
    - плануватимуть
    - запланують
  - sentence: Ти _____ готель на наступний тиждень?
    answer: забронюєш
    options:
    - забронюєш
    - будеш бронювати
    - бронюватимеш
  - sentence: Ви _____ говорити лише українською?
    answer: будете старатися
    options:
    - будете старатися
    - старатиметеся
    - постараєтеся
  - sentence: Я _____ тобі повідомлення ввечері.
    answer: напишу
    options:
    - напишу
    - буду писати
    - писатиму
  - sentence: Вона _____ цю статтю дуже довго.
    answer: читатиме
    options:
    - читатиме
    - буде читати
    - прочитає
  title: Вставте правильну форму дієслова в майбутньому часі
- id: match-up
  type: match-up
  instruction: З'єднайте початок і кінець речення, звертаючи увагу на вид дієслова
    (процес чи результат)
  pairs:
  - left: Я буду читати цю цікаву книгу...
    right: '...цілий вечір без зупинки.'
  - left: Я обов'язково прочитаю цю книгу...
    right: '...до завтрашнього ранку.'
  - left: Ми будемо довго планувати подорож...
    right: '...кілька годин поспіль.'
  - left: Ми швидко заплануємо подорож...
    right: '...і одразу купимо квитки.'
  - left: Вона старатиметься...
    right: '...працювати краще і швидше.'
  - left: Вона постарається...
    right: '...зробити це ідеально до п''ятниці.'
  - left: Вони будуть насолоджуватися...
    right: '...своїм відпочинком у Карпатах.'
  - left: Вони успішно закінчать...
    right: '...свою важку роботу о шостій.'
  title: З'єднайте початок і кінець речення, звертаючи увагу на вид дієслова (процес
