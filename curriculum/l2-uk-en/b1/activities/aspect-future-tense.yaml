workbook:
- type: translate
  instruction: Оберіть правильний переклад, звертаючи увагу на процес чи результат
    (вид дієслова)
  items:
  - source: I will read this book tomorrow (start to finish).
    options:
    - text: Я прочитаю цю книгу завтра.
      correct: true
    - text: Я буду читати цю книгу завтра.
      correct: false
  - source: I will be working all day.
    options:
    - text: Я працюватиму цілий день.
      correct: true
    - text: Я попрацюю цілий день.
      correct: false
  - source: We will book the hotel tonight.
    options:
    - text: Ми забронюємо готель сьогодні ввечері.
      correct: true
    - text: Ми будемо бронювати готель сьогодні ввечері.
      correct: false
  - source: They will be enjoying their vacation in the mountains.
    options:
    - text: Вони будуть насолоджуватися відпусткою в горах.
      correct: true
    - text: Вони насолодяться відпусткою в горах.
      correct: false
  - source: She will finish the project on time.
    options:
    - text: Вона закінчить проєкт вчасно.
      correct: true
    - text: Вона буде закінчувати проєкт вчасно.
      correct: false
  - source: I promise I will write to you.
    options:
    - text: Обіцяю, я напишу тобі.
      correct: true
    - text: Обіцяю, я писатиму тобі.
      correct: false
  title: Оберіть правильний переклад, звертаючи увагу на процес чи результат (вид
    дієслов
- type: essay-response
  prompt: Напишіть короткий текст «Мій план на завтра» (6-8 речень). Використайте
    принаймні три різні форми майбутнього часу. Свідомо комбінуйте процес (недоконаний
    вид) і гарантований результат (доконаний вид).
  min_words: 50
