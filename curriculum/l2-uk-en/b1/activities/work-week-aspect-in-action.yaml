- type: fill-in
  title: "Робочі звіти та правильний вид"
  instruction: "Оберіть правильне дієслово для кожної ситуації."
  items:
    - sentence: "Вчора я нарешті ___ цей важливий звіт."
      answer: "склав"
      options:
        - "склав"
        - "складав"
        - "складаю"
        - "складати"
    - sentence: "Щодня о дев'ятій ранку ми ___ планірку."
      answer: "проводимо"
      options:
        - "проводимо"
        - "проведемо"
        - "провели"
        - "провести"
    - sentence: "Якщо ти не хочеш ___ дедлайн, треба працювати швидше."
      answer: "пропустити"
      options:
        - "пропустити"
        - "пропускати"
        - "пропускаю"
        - "пропущу"
    - sentence: "Вони регулярно ___ складні технічні завдання від клієнтів."
      answer: "отримують"
      options:
        - "отримують"
        - "отримають"
        - "отримали"
        - "отримати"
    - sentence: "Я щойно ___ всі фінансові документи, помилок немає."
      answer: "перевірив"
      options:
        - "перевірив"
        - "перевіряв"
        - "перевіряю"
        - "перевірятиму"
    - sentence: "Минулого тижня наша команда успішно ___ великий проєкт."
      answer: "виконала"
      options:
        - "виконала"
        - "виконувала"
        - "виконує"
        - "виконуватиме"
    - sentence: "Зазвичай наші менеджери ___ з клієнтами в головному офісі."
      answer: "зустрічаються"
      options:
        - "зустрічаються"
        - "зустрінуться"
        - "зустрілися"
        - "зустрітися"
    - sentence: "Досвідчений колега завжди знає, як найкраще ___ свій робочий простір."
      answer: "організувати"
      options:
        - "організувати"
        - "організовувати"
        - "організує"
        - "організовує"
    - sentence: "Ніхто в нашому відділі не любить довго ___ звіти наприкінці місяця."
      answer: "складати"
      options:
        - "складати"
        - "скласти"
        - "складе"
        - "складав"
    - sentence: "Ми достроково ___ це термінове завдання і тепер можемо відпочити."
      answer: "виконали"
      options:
        - "виконали"
        - "виконували"
        - "виконуємо"
        - "виконуватимемо"
    - sentence: "Кожного понеділка директор ___ нові завдання для всіх відділів."
      answer: "ставить"
      options:
        - "ставить"
        - "поставить"
        - "поставив"
        - "ставитиме"
    - sentence: "Я обіцяю, що ___ цю презентацію до завтрашнього ранку."
      answer: "підготую"
      options:
        - "підготую"
        - "готую"
        - "готував"
        - "готуватиму"

- type: fill-in
  title: "Розповідь про робочий тиждень"
  instruction: "Заповніть пропуски відповідними словами, щоб завершити історію."
  items:
    - sentence: "Цей робочий тиждень був надзвичайно ___."
      answer: "насиченим"
      options:
        - "насиченим"
        - "порожнім"
        - "повільним"
        - "віддаленим"
    - sentence: "У понеділок мій керівник ___ нове стратегічне завдання."
      answer: "поставив"
      options:
        - "поставив"
        - "ставив"
        - "ставить"
        - "ставитиме"
    - sentence: "У вівторок і середу я без перерви ___ інформацію в інтернеті."
      answer: "шукав"
      options:
        - "шукав"
        - "знайшов"
        - "шукаю"
        - "знайти"
    - sentence: "Учора пізно ввечері я нарешті ___ усі потрібні дані."
      answer: "знайшов"
      options:
        - "знайшов"
        - "шукав"
        - "шукаю"
        - "знаходити"
    - sentence: "Після цього я одразу ___ детальний аналітичний звіт."
      answer: "склав"
      options:
        - "склав"
        - "складав"
        - "складаю"
        - "складати"
    - sentence: "Сьогодні цілий день я зосереджено ___ презентацію для команди."
      answer: "готую"
      options:
        - "готую"
        - "підготую"
        - "готував"
        - "підготував"
    - sentence: "Завтра я остаточно ___ останні слайди."
      answer: "підготую"
      options:
        - "підготую"
        - "готую"
        - "готував"
        - "підготовлюю"
    - sentence: "Потім ми зможемо успішно ___ нараду з керівництвом."
      answer: "провести"
      options:
        - "провести"
        - "проводити"
        - "проводимо"
        - "проведемо"
    - sentence: "Ми всі маємо обов'язково ___ в цей жорсткий дедлайн."
      answer: "вкластися"
      options:
        - "вкластися"
        - "вкладатися"
        - "вкладаємося"
        - "вкладемося"
    - sentence: "Наступного місяця я планую ___ у довгоочікувану відпустку."
      answer: "піти"
      options:
        - "піти"
        - "йти"
        - "іду"
        - "пішов"

- type: fill-in
