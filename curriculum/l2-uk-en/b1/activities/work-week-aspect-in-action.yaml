- type: quiz
  title: "Теорія: процес чи результат?"
  instruction: "Перевірте своє розуміння видів дієслова в офісному контексті."
  items:
    - question: "Яке дієслово позначає тривалий процес роботи?"
      explanation: "Недоконаний вид (виконувати) описує тривалість і процес, тоді як інші варіанти є доконаним видом."
      options:
        - text: "виконувати"
          correct: true
        - text: "виконати"
          correct: false
        - text: "зробити"
          correct: false
        - text: "написати"
          correct: false
    - question: "Що означає фраза 'Я писав звіт'?"
      explanation: "Це недоконаний вид. Витрачено час, дія була в процесі, але фінальний результат ще не готовий."
      options:
        - text: "Дія була в процесі, результат не гарантований"
          correct: true
        - text: "Звіт повністю готовий"
          correct: false
        - text: "Дія відбувається просто зараз"
          correct: false
        - text: "Це план на майбутнє"
          correct: false
    - question: "Виберіть дієслово доконаного виду з цього списку."
      explanation: "Слово 'підготувати' має префікс і позначає результат. Інші слова означають процес."
      options:
        - text: "підготувати"
          correct: true
        - text: "готувати"
          correct: false
        - text: "читати"
          correct: false
        - text: "шукати"
          correct: false
    - question: "Як правильно сказати про дію, що відбувається зараз?"
      explanation: "Для опису поточного моменту необхідно використовувати тільки недоконаний вид теперішнього часу."
      options:
        - text: "Я пишу звіт зараз."
          correct: true
        - text: "Я напишу звіт зараз."
          correct: false
        - text: "Я написав звіт зараз."
          correct: false
        - text: "Я писатиму звіт зараз."
          correct: false
    - question: "Яке з цих слів означає офіційну ділову зустріч?"
      explanation: "Нарада — це офіційна структурована зустріч колег чи керівництва."
      options:
        - text: "нарада"
          correct: true
        - text: "відпустка"
          correct: false
        - text: "розклад"
          correct: false
        - text: "завдання"
          correct: false
    - question: "Якого роду запозичене слово 'дедлайн' в українській мові?"
      explanation: "Слово 'дедлайн' закінчується на приголосний звук і автоматично набуває чоловічого роду."
      options:
        - text: "чоловічого"
          correct: true
        - text: "жіночого"
          correct: false
        - text: "середнього"
          correct: false
        - text: "спільного"
          correct: false
    - question: "Що ми використовуємо для опису регулярної щоденної рутини в офісі?"
      explanation: "Регулярні дії та офісна рутина завжди передаються недоконаним видом дієслова."
      options:
        - text: "недоконаний вид"
          correct: true
        - text: "доконаний вид"
          correct: false
        - text: "тільки інфінітив"
          correct: false
        - text: "тільки минулий час"
          correct: false
    - question: "Яке українське слово є синонімом до англійського запозичення 'дедлайн'?"
      explanation: "Слово 'реченець' є питомо українським замінником англіцизму 'дедлайн'."
      options:
        - text: "реченець"
          correct: true
        - text: "процес"
          correct: false
        - text: "звіт"
          correct: false
        - text: "колега"
          correct: false

- type: unjumble
  title: "Складіть робочі речення"
  instruction: "Розташуйте слова в правильному порядку, щоб утворити речення."
  items:
    - words: ["Ми", "маємо", "терміново", "скасувати", "цю", "зустріч"]
      answer: "Ми маємо терміново скасувати цю зустріч"
    - words: ["Учора", "я", "успішно", "склав", "фінансовий", "звіт"]
      answer: "Учора я успішно склав фінансовий звіт"
    - words: ["Вона", "завжди", "вчасно", "виконує", "свої", "завдання"]
      answer: "Вона завжди вчасно виконує свої завдання"
    - words: ["Наша", "команда", "працює", "за", "гнучким", "графіком"]
      answer: "Наша команда працює за гнучким графіком"
    - words: ["Кожного", "ранку", "ми", "проводимо", "коротку", "планірку"]
      answer: "Кожного ранку ми проводимо коротку планірку"
    - words: ["Директор", "планує", "піти", "у", "відпустку", "влітку"]
      answer: "Директор планує піти у відпустку влітку"

