- type: error-correction
  title: "Виправте офісні помилки"
  instruction: "Знайдіть помилку у використанні граматики та виберіть правильний варіант."
  items:
    - sentence: "Я зараз прочитаю цей великий документ."
      error: "прочитаю"
      answer: "читаю"
      options:
        - "читаю"
        - "прочитав"
        - "читатиму"
        - "почитаю"
      explanation: "Слово 'зараз' вимагає використання недоконаного виду теперішнього часу (процес)."
    - sentence: "Він щодня зробить ці нудні звіти."
      error: "зробить"
      answer: "робить"
      options:
        - "робить"
        - "робив"
        - "робитиме"
        - "зробив"
      explanation: "Регулярна рутина ('щодня') передається недоконаним видом."
    - sentence: "Вона завжди пропускає цю дедлайн."
      error: "цю"
      answer: "цей"
      options:
        - "цей"
        - "цього"
        - "це"
        - "цих"
      explanation: "Слово 'дедлайн' — чоловічого роду, тому потрібен займенник 'цей'."
    - sentence: "Ми достроково виконували наш план вчора."
      error: "виконували"
      answer: "виконали"
      options:
        - "виконали"
        - "виконуємо"
        - "виконати"
        - "виконуватимуть"
      explanation: "Результат ('достроково') передається доконаним видом у минулому часі."
    - sentence: "Наш бос зараз підготує презентацію для клієнта."
      error: "підготує"
      answer: "готує"
      options:
        - "готує"
        - "підготував"
        - "готуватиме"
        - "поготує"
      explanation: "Процес у даний момент часу ('зараз') вимагає недоконаного виду."
    - sentence: "Ми вчора вирішували цю проблему і тепер усе працює ідеально."
      error: "вирішували"
      answer: "вирішили"
      options:
        - "вирішили"
        - "вирішуємо"
        - "вирішуватимемо"
        - "повирішуємо"
      explanation: "Наявність фінального результату ('усе працює ідеально') вимагає доконаного виду."

