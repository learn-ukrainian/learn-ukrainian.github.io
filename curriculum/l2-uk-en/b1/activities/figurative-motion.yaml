version: '1.0'
module: figurative-motion
level: b1
inline:
- id: quiz-literal-vs-figurative
  type: quiz
  instruction: 'Прочитайте речення. Визначте, в якому значенні вжито дієслово руху:
    прямому чи переносному.'
  items:
  - question: Пташка високо летить у небі.
    options:
    - Пряме значення
    - Переносне значення
    - Стилістична помилка
    - Граматична помилка
    correct: 0
  - question: Цей тиждень летить просто як божевільний!
    options:
    - Пряме значення
    - Переносне значення
    - Стилістична помилка
    - Граматична помилка
    correct: 1
  - question: Діти йдуть до школи пішки.
    options:
    - Пряме значення
    - Переносне значення
    - Стилістична помилка
    - Граматична помилка
    correct: 0
  - question: На вулиці вже третю годину йде дощ.
    options:
    - Пряме значення
    - Переносне значення
    - Стилістична помилка
    - Граматична помилка
    correct: 1
  - question: Жовтий місяць повільно пливе серед зірок.
    options:
    - Пряме значення
    - Переносне значення
    - Стилістична помилка
    - Граматична помилка
    correct: 1
  - question: Спортсмен швидко біжить стадіоном.
    options:
    - Пряме значення
    - Переносне значення
    - Стилістична помилка
    - Граматична помилка
    correct: 0
- id: fill-in-iti-figurative
  type: fill-in
  instruction: Вставте правильну форму дієслова «іти» (або його префіксальні форми)
    у речення.
  items:
  - sentence: У цій статті мова _____ про нові технології.
    answer: йде
    options:
    - йде
    - ходить
    - летить
    - біжить
  - sentence: Після довгих роздумів я _____ до висновку, що треба змінити стратегію.
    answer: дійшов
    options:
    - пішов
    - зійшов
    - дійшов
    - прийшов
  - sentence: З цього тіста _____ чудовий пиріг!
    answer: вийшов
    options:
    - пішов
    - зійшов
    - вийшов
    - перейшов
  - sentence: Літо вже _____ до кінця, скоро почнеться осінь.
    answer: йде
    options:
    - йде
    - ходить
    - пливе
    - біжить
  - sentence: У новинах _____ про економічну кризу.
    answer: йдеться
    options:
    - йде
    - йдеться
    - ходиться
    - летить
  - sentence: Наш урок _____ вже тридцять хвилин.
    answer: іде
    options:
    - іде
    - ходить
    - біжить
    - виходить
- id: group-sort-motion-usage
  type: group-sort
  instruction: Розподіліть фрази за правильними категоріями залежно від характеру
    руху.
  groups:
  - label: Іти (стабільно, нейтрально)
    items:
    - дощ іде
    - час іде
    - справи йдуть
  - label: Летіти (швидко, стрімко)
    items:
    - час летить
    - ціни злетіли
    - новина облетіла
  - label: Пливти (плавно, повільно)
    items:
    - хмари пливуть
    - думки пливуть
    - мелодія пливе
- id: match-up-figurative-meanings
  type: match-up
  instruction: З'єднайте фрази з дієсловами руху з їхнім значенням.
  pairs:
  - left: час летить
    right: дуже швидко минає
  - left: думки пливуть
    right: повільно з'являються і зникають
  - left: дощ іде
    right: падають краплі води з неба
  - left: ціни злетіли
    right: вартість раптово зросла
  - left: вилетіти з роботи
    right: раптово втратити посаду
  - left: дійти до висновку
    right: прийняти рішення після роздумів
workbook:
- type: fill-in
  instruction: Вставте правильне дієслово руху в переносному значенні.
  items:
  - sentence: Коли я слухаю цю чудову музику, по шкірі _____ мурашки.
    answer: біжать
    options:
    - біжать
    - ідуть
    - летять
    - пливуть
  - sentence: Ми зараз _____ важливі переговори з партнерами.
    answer: ведемо
    options:
    - ведемо
    - несемо
    - ходимо
    - літаємо
  - sentence: Директор компанії повинен _____ відповідальність за свої рішення.
    answer: нести
    options:
    - нести
    - вести
    - водити
    - носити
  - sentence: Ця вулиця в Києві _____ ім'я Лесі Українки.
    answer: носить
    options:
    - носить
    - несе
    - веде
    - возить
  - sentence: Густий ранковий туман повільно _____ над річкою.
    answer: пливе
    options:
    - пливе
    - іде
    - біжить
    - летить
  - sentence: Діти, _____ себе чемно у школі!
    answer: ведіть
    options:
    - ведіть
    - несіть
    - ідіть
    - біжіть
- type: match-up
  instruction: З'єднайте початок і кінець фрази.
  pairs:
  - left: нести
    right: відповідальність
  - left: водити
    right: за ніс
  - left: вести
    right: переговори
  - left: дійти
    right: до висновку
  - left: обійтися
    right: без допомоги
  - left: йти на
    right: компроміс
- type: group-sort
  instruction: Розподіліть вислови за тематичними категоріями.
  groups:
  - label: Погода і природа
    items:
    - дощ іде
    - туман пливе
    - хмари пливуть
  - label: Час
    items:
    - роки йдуть
    - час летить
    - дні летять
  - label: Економіка та робота
    items:
    - ціни злетіли
    - вести переговори
    - справи йдуть
  - label: Емоції та думки
    items:
    - мурашки біжать
    - дах їде
    - думки пливуть
- type: error-correction
  instruction: Виправте стилістичні помилки та кальки в реченнях.
  items:
  - sentence: Цей светр тобі дуже іде.
    error: іде
    correction: пасує
    error_type: word
    options:
    - пасує
    - летить
    - підходить
    explanation: Про одяг правильно казати «пасує» або «личить».
  - sentence: Учора цілий вечір падав сніг.
    error: падав
    correction: ішов
    error_type: word
    options:
    - ішов
    - летів
    - плив
    explanation: Опади в українській мові «ідуть».
  - sentence: Фільм у кінотеатрі біжить уже годину.
    error: біжить
    correction: іде
    error_type: word
    options:
    - іде
    - летить
    - пливе
    explanation: Про кіно або вистави кажуть «фільм іде».
  - sentence: Мій годинник на руці не йде.
    error: не йде
    correction: стоїть
    error_type: phrase
    options:
    - стоїть
    - лежить
    - не біжить
    explanation: Коли механізм не працює, ми кажемо, що він «стоїть».
  - sentence: У цій статті мова біжить про нові автомобілі.
    error: біжить
    correction: йде
    error_type: word
    options:
    - йде
    - летить
    - стоїть
    explanation: Правильна конструкція — «мова йде про».
  - sentence: У супермаркеті ціни полетіли вгору.
    error: полетіли
    correction: злетіли
    error_type: word
    options:
    - злетіли
    - відлетіли
    - перелетіли
    explanation: Стрімке зростання цін описується дієсловом «злетіли».
- type: translate
  instruction: Оберіть правильний український переклад для англійських фраз.
  items:
  - source: It is raining outside.
    options:
    - text: Надворі іде дощ.
      correct: true
    - text: Надворі падає дощ.
      correct: false
    - text: Надворі біжить дощ.
      correct: false
    - text: Надворі летить дощ.
      correct: false
  - source: This shirt suits you.
    options:
    - text: Ця сорочка тобі пасує.
      correct: true
    - text: Ця сорочка тобі іде.
      correct: false
    - text: Ця сорочка тобі біжить.
      correct: false
    - text: Ця сорочка тобі летить.
      correct: false
  - source: Time flies!
    options:
    - text: Час летить!
      correct: true
    - text: Час біжить!
      correct: false
    - text: Час іде!
      correct: false
    - text: Час пливе!
      correct: false
  - source: The clock stopped.
    options:
    - text: Годинник стоїть.
      correct: true
    - text: Годинник не йде.
      correct: false
    - text: Годинник не біжить.
      correct: false
    - text: Годинник лежить.
      correct: false
  - source: They are conducting negotiations.
    options:
    - text: Вони ведуть переговори.
      correct: true
    - text: Вони несуть переговори.
      correct: false
    - text: Вони водять переговори.
      correct: false
    - text: Вони носять переговори.
      correct: false
  - source: The article is about history.
    options:
    - text: У статті йдеться про історію.
      correct: true
    - text: У статті мова летить про історію.
      correct: false
    - text: У статті носиться історія.
      correct: false
    - text: У статті ведеться історія.
      correct: false
- type: essay-response
  prompt: 'Напишіть короткий текст про те, як пройшов ваш тиждень. Використайте щонайменше
    5 дієслів руху в переносному значенні (наприклад: час летить, справи йдуть, дощ
    іде, думки пливуть, дійти до висновку тощо).'
  min_words: 50
  model_answer: Цей тиждень пролетів дуже швидко! Час летить, і я нічого не встигаю.
    На роботі справи йдуть добре, ми ведемо переговори з новими клієнтами. Але вчора
    цілий день ішов дощ, і мої думки пливли десь далеко. Я дійшов до висновку, що
    мені потрібен гарний відпочинок на вихідних.
  evaluation_criteria:
  - Текст містить не менше 50 слів.
  - Використано мінімум 5 дієслів руху в переносному значенні.
  - Дієслова вжиті доречно та без кальок.
