- type: error-correction
  title: Виправте помилки
  instruction: Знайдіть і виправте помилки у реченнях.
  items:
    - sentence: Завтра я буду приймати участь у конференції.
      error: приймати участь
      answer: брати участь
      error_type: phrase
      options:
        - брати участь
        - приймати участь
        - робити участь
        - мати участь
      explanation: Українською мовою ми завжди беремо участь.
    - sentence: Депутат вирішив підняти питання про нові податки.
      error: підняти
      answer: порушити
      error_type: word
      options:
        - порушити
        - підняти
        - зробити
        - поставити
      explanation: Питання для обговорення потрібно порушувати.
    - sentence: Цей канал буде перекладати матч наживо.
