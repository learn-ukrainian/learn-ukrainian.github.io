  instruction: Оберіть правильне слово для кожного речення.
  items:
    - sentence: Телеканал буде _____ цей матч завтра ввечері.
      answer: транслювати
      options:
        - транслювати
        - перекладати
        - повідомляти
        - висвітлювати
    - sentence: Мені потрібно _____ цю статтю з англійської.
      answer: перекласти
      options:
        - перекласти
        - транслювати
        - висвітлити
        - оприлюднити
    - sentence: Вона завжди активно _____ у наших дискусіях.
      answer: бере участь
      options:
        - бере участь
        - приймає участь
        - грає роль
        - має значення
    - sentence: Журналіст _____ дуже важливе питання про екологію.
      answer: порушив
      options:
        - порушив
        - підняв
        - зробив
        - створив
    - sentence: Ведучий _____ глядачам приємну новину.
      answer: повідомив
