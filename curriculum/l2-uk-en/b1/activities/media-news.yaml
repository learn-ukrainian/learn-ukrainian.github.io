- type: quiz
  title: Перевірка знань
  instruction: Оберіть одну правильну відповідь.
  items:
    - question: Яке слово означає процес передачі телевізійного сигналу?
      explanation: Транслювати стосується телебачення та радіо.
      options:
        - text: транслювати
          correct: true
        - text: перекладати
          correct: false
        - text: оприлюднювати
          correct: false
        - text: висвітлювати
          correct: false
    - question: Як правильно сказати українською to participate?
      explanation: Українською мовою ми завжди кажемо брати участь.
      options:
        - text: брати участь
          correct: true
        - text: приймати участь
          correct: false
        - text: робити участь
          correct: false
        - text: мати участь
          correct: false
    - question: Що означає вираз порушувати питання?
      explanation: Це означає привернути увагу до проблеми.
      options:
        - text: піднімати щось важке
          correct: false
        - text: привернути увагу до проблеми
          correct: true
        - text: забути про проблему
          correct: false
        - text: поставити запитання
          correct: false
    - question: Яке джерело інформації є найстарішим серед перелічених?
      explanation: Газета є традиційним друкованим виданням.
      options:
        - text: телеграм-канал
          correct: false
        - text: подкаст
          correct: false
        - text: газета
          correct: true
        - text: соціальна мережа
          correct: false
    - question: Хто такий військовий журналіст у сучасному медіапросторі?
      explanation: Цей фахівець працює у небезпечних зонах конфліктів.
      options:
        - text: людина яка пише про спорт
          correct: false
        - text: спеціаліст на фронті
          correct: true
        - text: редактор відділу культури
          correct: false
        - text: автор кулінарного блогу
          correct: false
    - question: Для чого сучасній людині дуже потрібна медіаграмотність?
      explanation: Щоб критично оцінювати інформацію та розпізнавати фейки.
      options:
        - text: щоб критично оцінювати інформацію
          correct: true
        - text: щоб швидко друкувати тексти
          correct: false
        - text: щоб працювати на телебаченні
          correct: false
        - text: щоб знімати якісні відео
          correct: false
    - question: Який відмінок потрібен після дієслова повідомити якщо йдеться про особу?
      explanation: Ми повідомляємо комусь, це давальний відмінок.
      options:
        - text: давальний відмінок
          correct: true
        - text: родовий відмінок
          correct: false
        - text: орудний відмінок
          correct: false
        - text: місцевий відмінок
          correct: false
    - question: Що саме означає термін стрічка новин у цифровому світі?
      explanation: Це потік текстових повідомлень на екрані вашого смартфона.
