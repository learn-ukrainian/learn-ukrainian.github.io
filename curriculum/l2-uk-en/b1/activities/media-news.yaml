        - повідомив
        - сказав
        - розповів
        - передав
    - sentence: Ми дуже любимо _____ цікаві історичні подкасти.
      answer: слухати
      options:
        - слухати
        - дивитися
        - читати
        - бачити
    - sentence: Мій дідусь щоранку любить _____ свіжу газету.
      answer: читати
      options:
        - читати
        - дивитися
        - слухати
        - писати
    - sentence: Ця програма створена, щоб об'єктивно _____ події.
