    - text: від власника
      correct: true
    - text: від рієлтора
      correct: false
    - text: для власника
      correct: false
  - source: lease agreement
    options:
    - text: договір оренди
      correct: true
    - text: завдаток
      correct: false
    - text: комунальні послуги
      correct: false
  - source: square meters
    options:
    - text: квадратні метри
      correct: true
    - text: перша здача
      correct: false
    - text: кімнати
      correct: false
