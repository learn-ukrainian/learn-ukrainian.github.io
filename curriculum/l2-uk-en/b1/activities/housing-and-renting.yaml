- id: free-write-rental-complaint
  type: essay-response
  prompt: Ви орендуєте квартиру, і у вас раптово зламався холодильник або протікає
    труба. Напишіть офіційне повідомлення орендодавцю (від 50 слів). Обов'язково використовуйте
    Кличний відмінок для звернення, опишіть проблему, поясніть її терміновість та
    попросіть надіслати майстра.
  min_words: 50
  model_answer: Шановний пане Олеже! Добрий день. Я пишу вам щодо квартири, яку я
    орендую. Учора пізно ввечері на нашій кухні раптово зламався холодильник. Ця ситуація
    є дуже критичною, бо всі продукти можуть зіпсуватися. Прошу вас якомога швидше
    надіслати майстра для того, щоб полагодити техніку. Буду вдячний за вашу швидку
    відповідь.
workbook:
- type: true-false
  instruction: Правда чи ні? Перевірте свої знання про оренду житла в Україні.
  items:
  - statement: Слово «меблі» в українській мові використовується тільки в множині.
    correct: true
    explanation: Так, ми кажемо «нові меблі», «старі меблі». Форми однини не існує.
  - statement: В Україні перший поверх часто називають нульовим.
    correct: false
    explanation: Ні, в Україні нумерація поверхів завжди починається з одиниці.
  - statement: Кімнати у квартирі завжди вимагають прийменника «у/в», без винятків.
    correct: false
    explanation: 'Є винятки: ми завжди кажемо «на кухні» та «на балконі».'
  - statement: Завдаток зазвичай дорівнює вартості одного місяця оренди.
    correct: true
    explanation: Так, це стандартна фінансова гарантія для власника житла.
  - statement: Комунальні послуги завжди входять у вказану ціну оренди.
    correct: false
    explanation: Найчастіше комунальні послуги оплачуються окремо за лічильниками.
  - statement: Термін «хрущовка» означає сучасну новобудову.
    correct: false
    explanation: Хрущовка — це старий п'ятиповерховий будинок, збудований у радянські
      часи.
- type: error-correction
  instruction: Знайдіть і виправте помилку у відмінках або прийменниках.
  items:
  - sentence: Ми любимо пити чай у кухні.
    error: у
    correction: на
    error_type: word
    options:
    - в
    - на
    - біля
    explanation: За традицією ми кажемо «на кухні».
  - sentence: Я живу на другому поверху.
    error: поверху
    correction: поверсі
    error_type: word
    options:
    - поверх
    - поверсі
    - поверхом
    explanation: 'У Місцевому відмінку відбувається чергування: х -> с (на поверсі).'
  - sentence: Ми орендували цю квартиру у рік.
    error: у
    correction: на
    error_type: word
    options:
    - в
    - на
    - за
    explanation: Для позначення запланованої тривалості використовуємо «на» + Знахідний
      відмінок (на рік).
  - sentence: Мені потрібна сантехнік, бо протікає кран.
    error: потрібна
    correction: потрібен
    error_type: word
    options:
    - потрібен
    - потрібне
    - потрібні
    explanation: Сантехнік — чоловічого роду, тому «потрібен».
  - sentence: Ми купили нову меблю для вітальні.
    error: нову меблю
    correction: нові меблі
    error_type: phrase
    options:
    - новий мебіль
    - нові меблі
    - нове меблі
    explanation: Слово «меблі» має тільки форму множини.
  - sentence: Шановний пан Олег, я пишу щодо оголошення.
    error: пан Олег
    correction: пане Олеже
    error_type: phrase
    options:
    - пане Олегу
    - пане Олеже
    - пану Олегу
    explanation: В офіційному звертанні використовується Кличний відмінок.
- type: group-sort
  instruction: Розподіліть слова та фрази за категоріями.
  groups:
  - label: Типи житла
    items:
    - квартира
    - гуртожиток
    - новобудова
    - приватний будинок
    - хрущовка
  - label: Приміщення
    items:
    - спальня
    - вітальня
    - передпокій
    - санвузол
    - кухня
  - label: Комунальні послуги
    items:
    - водопостачання
    - електрика
    - опалення
    - вивіз сміття
  - label: Проблеми
    items:
    - цвіль
    - шумні сусіди
    - протікає кран
    - зламався ліфт
- type: translate
  instruction: Оберіть правильний переклад для фраз з оголошень про оренду.
  items:
