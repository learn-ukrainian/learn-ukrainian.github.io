version: '1.0'
module: housing-and-renting
level: b1
inline:
- id: quiz-choose-correct-case-and-preposition-for-housing-descriptions
  type: quiz
  instruction: Оберіть правильний варіант для опису житла.
  items:
  - question: Ми з родиною часто збираємося _____.
    options:
    - у вітальні
    - на вітальні
    - у вітальню
    - на вітальню
    correct: 0
  - question: Я люблю пити ранкову каву _____.
    options:
    - у балконі
    - на балконі
    - в балконі
    - на балкон
    correct: 1
  - question: Моя подруга орендує квартиру на другому _____.
    options:
    - поверху
    - поверсі
    - поверх
    - поверхам
    correct: 1
  - question: Вони шукають квартиру площею п'ятдесят квадратних _____.
    options:
    - метри
    - метрам
    - метрів
    - метрами
    correct: 2
  - question: Нам потрібна квартира з сучасним _____.
    options:
    - ремонтом
    - ремонту
    - ремонт
    - ремонти
    correct: 0
  - question: Мама зараз готує вечерю _____.
    options:
    - у кухні
    - на кухні
    - в кухню
    - на кухню
    correct: 1
  - question: Я живу в будинку без _____.
    options:
    - ліфт
    - ліфта
    - ліфту
    - ліфтом
    correct: 1
- id: fill-in-complete-rental-ad-and-negotiation-dialogue-with-correct-forms
  type: fill-in
  instruction: Вставте правильні слова.
  items:
  - sentence: Здається 1к квартира, 35 _____, 2/5 поверх.
    answer: кв.м
  - sentence: Квартира повністю готова, здається під _____.
    answer: ключ
  - sentence: Шановний _____ Олеже! Мене цікавить ваша квартира.
    answer: пане
  - sentence: Чи входять комунальні _____ у вартість оренди?
    answer: послуги
  - sentence: Ні, опалення та електрика оплачуються _____ за лічильниками.
    answer: окремо
  - sentence: Квартира здається вперше, це перша _____.
    answer: здача
  - sentence: Людина, яка бере житло в оренду і платить гроші, називається _____.
    answer: орендар
  - sentence: Людина, яка дає нерухомість у тимчасове користування, — це _____.
    answer: орендодавець
- id: match-up-problem-phrase-match-housing-problem-to-correct-complaint-phrase
  type: match-up
  instruction: З'єднайте проблему з відповідною фразою або спеціалістом.
  pairs:
  - left: У ванній протікає кран.
    right: Мені терміново потрібен сантехнік.
  - left: Зникло світло, небезпечно іскрять старі розетки.
    right: Нам потрібен досвідчений електрик.
  - left: У кутку з'явилася чорна цвіль.
    right: Це через високу вологість.
  - left: Не працює опалення.
    right: У квартирі дуже холодно.
  - left: Раптово зламалася пральна машина.
    right: Мені потрібно викликати майстра.
  - left: Не працює ліфт на дев'ятий поверх.
    right: Це стає справжнім фізичним випробуванням.
  - left: Сильний витік води.
    right: Вам потрібна міська аварійна служба.
workbook:
- type: error-correction
  instruction: Знайдіть і виправте помилку у відмінках або прийменниках.
  items:
  - sentence: Ми любимо пити чай у кухні.
    error: у
    correction: на
    error_type: word
    options:
    - в
    - на
    - біля
    explanation: За традицією ми кажемо «на кухні».
  - sentence: Я живу на другому поверху.
    error: поверху
    correction: поверсі
    error_type: word
    options:
    - поверх
    - поверсі
    - поверхом
    explanation: 'У Місцевому відмінку відбувається чергування: х -> с (на поверсі).'
  - sentence: Ми орендували цю квартиру у рік.
    error: у
    correction: на
    error_type: word
    options:
    - в
    - на
    - за
    explanation: Для позначення запланованої тривалості використовуємо «на» + Знахідний
      відмінок (на рік).
  - sentence: Мені потрібна сантехнік, бо протікає кран.
    error: потрібна
    correction: потрібен
    error_type: word
    options:
    - потрібен
    - потрібне
    - потрібні
    explanation: Сантехнік — чоловічого роду, тому «потрібен».
  - sentence: Ми купили нову меблю для вітальні.
    error: нову меблю
    correction: нові меблі
    error_type: phrase
    options:
    - новий мебіль
    - нові меблі
    - нове меблі
    explanation: Слово «меблі» має тільки форму множини.
  - sentence: Шановний пан Олег, я пишу щодо оголошення.
    error: пан Олег
    correction: пане Олеже
    error_type: phrase
    options:
    - пане Олегу
    - пане Олеже
    - пану Олегу
    explanation: В офіційному звертанні використовується Кличний відмінок.
- type: group-sort
  instruction: Розподіліть слова та фрази за категоріями.
  groups:
  - label: Типи житла
    items:
    - квартира
    - гуртожиток
    - новобудова
    - приватний будинок
    - хрущовка
  - label: Приміщення
    items:
    - спальня
    - вітальня
    - передпокій
    - санвузол
    - кухня
  - label: Комунальні послуги
    items:
    - водопостачання
    - електрика
    - опалення
    - вивіз сміття
  - label: Проблеми
    items:
    - цвіль
    - шумні сусіди
    - протікає кран
    - зламався ліфт
- type: translate
  instruction: Оберіть правильний переклад для фраз з оголошень про оренду.
  items:
  - source: turnkey apartment
    options:
    - text: квартира під ключ
      correct: true
    - text: квартира з ключем
      correct: false
    - text: квартира для ключа
      correct: false
  - source: furnished apartment
    options:
    - text: вмебльована квартира
      correct: true
    - text: квартира з ремонтом
      correct: false
    - text: пуста квартира
      correct: false
  - source: utilities are paid separately
    options:
    - text: комунальні послуги оплачуються окремо
      correct: true
    - text: комунальні послуги входять у вартість
      correct: false
    - text: комунальні послуги не оплачуються
      correct: false
  - source: from the owner
    options:
    - text: від власника
      correct: true
    - text: від рієлтора
      correct: false
    - text: для власника
      correct: false
  - source: lease agreement
    options:
    - text: договір оренди
      correct: true
    - text: завдаток
      correct: false
    - text: комунальні послуги
      correct: false
  - source: square meters
    options:
    - text: квадратні метри
      correct: true
    - text: перша здача
      correct: false
    - text: кімнати
      correct: false
- type: essay-response
  prompt: Ви орендуєте квартиру, і у вас раптово зламався холодильник або протікає
    труба. Напишіть офіційне повідомлення орендодавцю (від 50 слів). Обов'язково використовуйте
    Кличний відмінок для звернення, опишіть проблему, поясніть її терміновість та
    попросіть надіслати майстра.
  min_words: 50
  model_answer: Шановний пане Олеже! Добрий день. Я пишу вам щодо квартири, яку я
    орендую. Учора пізно ввечері на нашій кухні раптово зламався холодильник. Ця ситуація
    є дуже критичною, бо всі продукти можуть зіпсуватися. Прошу вас якомога швидше
    надіслати майстра для того, щоб полагодити техніку. Буду вдячний за вашу швидку
    відповідь.
