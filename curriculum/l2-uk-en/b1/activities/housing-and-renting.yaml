version: '1.0'
module: housing-and-renting
level: b1
inline:
- id: quiz-choose-correct-case-and-preposition-for-housing-descriptions
  type: quiz
  instruction: Оберіть правильний варіант для опису житла.
  items:
  - question: Ми з родиною часто збираємося _____.
    options:
    - у вітальні
    - на вітальні
    - у вітальню
    - на вітальню
    correct: 0
  - question: Я люблю пити ранкову каву _____.
    options:
    - у балконі
    - на балконі
    - в балконі
    - на балкон
    correct: 1
  - question: Моя подруга орендує квартиру на другому _____.
    options:
    - поверху
    - поверсі
    - поверх
    - поверхам
    correct: 1
  - question: Вони шукають квартиру площею п'ятдесят квадратних _____.
    options:
    - метри
    - метрам
    - метрів
    - метрами
    correct: 2
  - question: Нам потрібна квартира з сучасним _____.
    options:
    - ремонтом
    - ремонту
    - ремонт
    - ремонти
    correct: 0
  - question: Мама зараз готує вечерю _____.
    options:
    - у кухні
    - на кухні
    - в кухню
    - на кухню
    correct: 1
  - question: Я живу в будинку без _____.
    options:
    - ліфт
    - ліфта
    - ліфту
    - ліфтом
    correct: 1
- id: fill-in-complete-rental-ad-and-negotiation-dialogue-with-correct-forms
  type: fill-in
  instruction: Вставте правильні слова.
  items:
  - sentence: Здається 1к квартира, 35 _____, 2/5 поверх.
    answer: кв.м
  - sentence: Квартира повністю готова, здається під _____.
    answer: ключ
  - sentence: Шановний _____ Олеже! Мене цікавить ваша квартира.
    answer: пане
  - sentence: Чи входять комунальні _____ у вартість оренди?
    answer: послуги
  - sentence: Ні, опалення та електрика оплачуються _____ за лічильниками.
    answer: окремо
  - sentence: Квартира здається вперше, це перша _____.
    answer: здача
  - sentence: Людина, яка бере житло в оренду і платить гроші, називається _____.
    answer: орендар
  - sentence: Людина, яка дає нерухомість у тимчасове користування, — це _____.
    answer: орендодавець
- id: dialogue-completion-complete-apartment-viewing-and-negotiation-dialogue
  type: order
  instruction: Розставте репліки діалогу під час перегляду квартири у правильному
    порядку.
  items:
  - — Добрий день! Проходьте, будь ласка, не роззувайтеся.
  - — Дякую. Ця світла квартира мені дійсно дуже подобається. Яка остаточна вартість
    оренди?
  - — П'ятнадцять тисяч гривень. Плюс усі комунальні послуги оплачуються окремо.
  - — Чи можлива невелика знижка, якщо я погоджуся підписати договір оренди прямо
    сьогодні?
  - — Добре, я можу скинути вам п'ятсот гривень.
  - — Я повністю згоден з ціною. А чи можна з тваринами?
  - — Добре, це звучить як розумний компроміс. Домовилися.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
- id: match-up-problem-phrase-match-housing-problem-to-correct-complaint-phrase
  type: match-up
  instruction: З'єднайте проблему з відповідною фразою або спеціалістом.
  pairs:
  - left: У ванній протікає кран.
    right: Мені терміново потрібен сантехнік.
  - left: Зникло світло, небезпечно іскрять старі розетки.
    right: Нам потрібен досвідчений електрик.
  - left: У кутку з'явилася чорна цвіль.
    right: Це через високу вологість.
  - left: Не працює опалення.
    right: У квартирі дуже холодно.
  - left: Раптово зламалася пральна машина.
    right: Мені потрібно викликати майстра.
  - left: Не працює ліфт на дев'ятий поверх.
    right: Це стає справжнім фізичним випробуванням.
  - left: Сильний витік води.
    right: Вам потрібна міська аварійна служба.
