- type: true-false
  title: 'Правда чи брехня?'
  instruction: 'Визначте, чи є твердження про майбутній час та українську культуру правильними.'
  items:
    - statement: 'Синтетична форма майбутнього часу використовується виключно з дієсловами доконаного виду.'
      correct: false
      explanation: 'Синтетична форма утворюється тільки від дієслів недоконаного виду, оскільки описує процес.'
    - statement: 'Українське прислів''я "Не кажи гоп, поки не перескочиш" радить не заявляти про результат до його фактичного досягнення.'
      correct: true
      explanation: 'Це відображає українську ментальність: обережність в обіцянках і фокус на реальному результаті.'
    - statement: 'Конструкція "я буду подивитися" є граматично правильною складеною формою.'
      correct: false
      explanation: 'Дієслово "бути" ніколи не поєднується з доконаним видом.'
    - statement: 'Фраза "мати намір" звучить більш формально і офіційно, ніж дієслово "збиратися".'
      correct: true
      explanation: '"Мати намір" використовується в новинах і діловому спілкуванні, а "збиратися" — у дружніх бесідах.'
    - statement: 'Простий майбутній час доконаного виду має закінчення, схожі на закінчення теперішнього часу.'
      correct: true
      explanation: 'Форми доконаного виду з особовими закінченнями (-ю, -єш) автоматично вказують на майбутній результат.'
    - statement: 'Ритуал "сплюнь і постукай по дереву" використовується, щоб гарантувати стовідсоткове виконання плану.'
      correct: false
      explanation: 'Цей ритуал використовується, щоб "не зурочити" план, тобто магічно захистити його від невдачі.'
    - statement: 'Дієслово "обіцяти" найкраще поєднується з недоконаним видом, щоб показати тривалість дії.'
      correct: false
      explanation: 'Обіцянка зазвичай стосується конкретного результату, тому найчастіше вживається з доконаним видом.'
    - statement: 'Складена та синтетична форми є граматично рівноправними способами вираження недоконаного виду в майбутньому.'
      correct: true
      explanation: 'Згідно з Державним стандартом, обидві форми є нормативними і можуть чергуватися для стилістичного балансу.'

