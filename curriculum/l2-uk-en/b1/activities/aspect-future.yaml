- type: fill-in
  title: 'Трансформуйте складену форму у синтетичну'
  instruction: 'Замініть аналітичну конструкцію (з дієсловом бути) на синтетичну форму (з афіксами -тиму, -тимеш).'
  items:
    - sentence: 'Я довго (буду думати) ___ про цю цікаву пропозицію.'
      answer: 'думатиму'
      options:
        - 'думатиму'
        - 'думаю'
        - 'подумаю'
        - 'буду подумати'
    - sentence: 'Ми (будемо боротися) ___ за наші права до самого кінця.'
      answer: 'боротимемося'
      options:
        - 'боротимемося'
        - 'боремося'
        - 'поборемося'
        - 'будемо побороти'
    - sentence: 'Фахівці (будуть обговорювати) ___ нові тенденції ринку.'
      answer: 'обговорюватимуть'
      options:
        - 'обговорюватимуть'
        - 'обговорюють'
        - 'обговорять'
        - 'обговорюватимемо'
    - sentence: 'Ти (будеш чекати) ___ на мене біля станції метро?'
      answer: 'чекатимеш'
      options:
        - 'чекатимеш'
        - 'почекаєш'
        - 'чекаєш'
        - 'чекатиме'
    - sentence: 'Вона (буде шукати) ___ нові шляхи вирішення проблеми.'
      answer: 'шукатиме'
      options:
        - 'шукатиме'
        - 'пошукає'
        - 'шукатимеш'
        - 'шукає'
    - sentence: 'Ви (будете працювати) ___ у ці вихідні?'
      answer: 'працюватимете'
      options:
        - 'працюватимете'
        - 'працюєте'
        - 'попрацюєте'
        - 'працюватимемо'
    - sentence: 'Я завжди (буду пам''ятати) ___ твою допомогу.'
      answer: 'пам''ятатиму'
      options:
        - 'пам''ятатиму'
        - 'запам''ятаю'
        - 'пам''ятаю'
        - 'пам''ятатимеш'
    - sentence: 'Вони (будуть дивитися) ___ новий український фільм.'
      answer: 'дивитимуться'
      options:
        - 'дивитимуться'
        - 'подивляться'
        - 'дивляться'
        - 'дивитиметься'
    - sentence: 'Ми (будемо слухати) ___ лекцію дуже уважно.'
      answer: 'слухатимемо'
      options:
        - 'слухатимемо'
        - 'послухаємо'
        - 'слухаємо'
        - 'слухатимуть'
    - sentence: 'Ти (будеш розповідати) ___ нам про свою подорож?'
      answer: 'розповідатимеш'
      options:
        - 'розповідатимеш'
        - 'розповіси'
        - 'розповідаєш'
        - 'розповідатиму'
    - sentence: 'Студенти (будуть писати) ___ модульну контрольну роботу.'
      answer: 'писатимуть'
      options:
        - 'писатимуть'
        - 'напишуть'
        - 'пишуть'
        - 'писатимете'
    - sentence: 'Він (буде грати) ___ на гітарі весь вечір.'
      answer: 'гратиме'
      options:
        - 'гратиме'
        - 'зіграє'
        - 'грає'
        - 'гратимуть'

- type: quiz
  title: 'Оберіть правильну форму дієслова'
  instruction: 'Проаналізуйте контекст (процес чи результат) і виберіть граматично правильний варіант майбутнього часу.'
  items:
    - question: 'До якої форми майбутнього часу належить слово "прочитаю"?'
      explanation: 'Слово "прочитаю" — це дієслово доконаного виду, яке означає результат. Це простий майбутній час.'
      options:
        - text: 'простий майбутній час'
          correct: true
        - text: 'аналітична форма'
          correct: false
        - text: 'синтетична форма'
          correct: false
        - text: 'складена форма'
          correct: false
    - question: 'Яка конструкція є грубою граматичною помилкою в українській мові?'
      explanation: 'Дієслово "бути" ніколи не поєднується з інфінітивами доконаного виду.'
      options:
        - text: 'я буду прочитати'
          correct: true
        - text: 'я буду читати'
          correct: false
        - text: 'я прочитаю'
          correct: false
        - text: 'я читатиму'
          correct: false
    - question: 'Яке слово найкраще підходить для обіцянки стовідсоткового результату?'
      explanation: 'Обіцянка результату вимагає доконаного виду без допоміжного дієслова.'
      options:
        - text: 'напишу'
          correct: true
        - text: 'буду писати'
          correct: false
        - text: 'писатиму'
          correct: false
        - text: 'збираюся писати'
          correct: false
    - question: 'Ви плануєте процес на весь завтрашній вечір. Яку форму краще обрати?'
      explanation: 'Для опису тривалого фонового процесу використовується недоконаний вид (синтетична або складена форма).'
      options:
        - text: 'я дивитимуся фільм'
          correct: true
        - text: 'я подивлюся фільм'
          correct: false
        - text: 'я зберуся подивитися фільм'
          correct: false
        - text: 'я маю намір подивитися фільм'
          correct: false
    - question: 'Як правильно запитати друга про його плани на вихідні в неформальній розмові?'
      explanation: 'Для дружньої розмови про плани ідеально підходить дієслово "збиратися".'
      options:
        - text: 'Що ти збираєшся робити?'
          correct: true
        - text: 'Що ти маєш намір зробити?'
          correct: false
        - text: 'Що ти обіцяєш зробити?'
          correct: false
        - text: 'Що ти будеш зробити?'
          correct: false
    - question: 'Як перекладається українське прислів''я про перешкоди у контексті планування?'
      explanation: 'Прислів''я вчить нас бути обережними з доконаним видом до моменту фактичного фіналу.'
      options:
        - text: 'не заявляй про результат до завершення дії'
          correct: true
        - text: 'ніколи не плануй майбутнє'
          correct: false
        - text: 'нічого не кажи друзям про свої наміри'
          correct: false
        - text: 'завжди обіцяй успішний результат'
          correct: false
    - question: 'Що означає форма "робитимемо" з точки зору української граматики?'
      explanation: 'Форми на -тиму, -тимеш є синтетичним майбутнім часом недоконаного виду.'
      options:
        - text: 'це синтетична форма недоконаного виду'
          correct: true
        - text: 'це складена форма недоконаного виду'
          correct: false
        - text: 'це простий майбутній час'
          correct: false
        - text: 'це доконаний вид'
          correct: false
    - question: 'Чому форма "я прочитаю зараз" є типовою логічною помилкою?'
      explanation: 'Доконаний вид означає фінал і межу, він катапультує дію в майбутнє, а не в поточний момент.'
      options:
        - text: 'доконаний вид не може описувати поточний момент'
          correct: true
        - text: 'це слово має писатися окремо'
          correct: false
        - text: 'треба використовувати дієслово "буду"'
          correct: false
        - text: 'це слово стосується тільки минулого'
          correct: false

- type: fill-in
  title: 'Вибір виду в майбутньому часі'
  instruction: 'Оберіть правильне дієслово залежно від того, що описує речення — тривалий процес чи гарантований фінал.'
  items:
    - sentence: 'Я обіцяю, що обов''язково ___ тобі з цим складним проєктом.'
      answer: 'допоможу'
      options:
        - 'допоможу'
        - 'буду допомагати'
        - 'допомагатиму'
        - 'допомагаю'
    - sentence: 'З дев''ятої до дванадцятої години Максим ___ фінальний звіт.'
      answer: 'писатиме'
      options:
        - 'писатиме'
        - 'напише'
        - 'буде написати'
        - 'написав'
    - sentence: 'Як тільки я приїду додому, я відразу ___ тобі.'
      answer: 'зателефоную'
      options:
        - 'зателефоную'
        - 'буду телефонувати'
        - 'телефонуватиму'
        - 'телефоную'
    - sentence: 'Поки дружина готуватиме вечерю, я ___ домашнє завдання дітей.'
      answer: 'буду перевіряти'
      options:
        - 'буду перевіряти'
        - 'перевірю'
        - 'перевірив'
        - 'буду перевірити'
    - sentence: 'Ми збираємося наполегливо працювати, і врешті-решт ми ___ всі труднощі.'
      answer: 'поборемо'
      options:
        - 'поборемо'
        - 'боротимемося'
        - 'будемо боротися'
        - 'боремося'
    - sentence: 'Завтра ввечері я зручно сяду в крісло і ___ новий український фільм.'
      answer: 'буду дивитися'
      options:
        - 'буду дивитися'
        - 'подивлюся'
        - 'подивився'
        - 'буду подивитися'
    - sentence: 'Компанія має серйозний намір і наступного року повністю ___ податкову систему.'
      answer: 'змінить'
      options:
        - 'змінить'
        - 'змінюватиме'
        - 'буде змінювати'
        - 'змінює'
    - sentence: 'Ми довго ___ над цим завданням, поки не знайдемо правильну відповідь.'
      answer: 'думатимемо'
      options:
        - 'думатимемо'
        - 'подумаємо'
        - 'будемо подумати'
        - 'подумали'

- type: error-correction
  title: 'Виправте типові помилки майбутнього часу'
  instruction: 'Знайдіть помилку в реченні (парадокс "буду прочитати" або використання майбутнього для поточного моменту) і виберіть правильний варіант.'
  items:
    - sentence: 'Я буду прочитати цю цікаву книгу завтра ввечері.'
      error: 'буду прочитати'
      answer: 'прочитаю'
      options:
        - 'прочитаю'
        - 'буду прочитав'
        - 'прочитав'
        - 'прочитатиму'
      explanation: 'Дієслово "бути" не поєднується з доконаним видом. Для результату використовуйте простий майбутній час.'
    - sentence: 'Ми будемо вирішити цю проблему на наступному засіданні.'
      error: 'будемо вирішити'
      answer: 'вирішимо'
      options:
        - 'вирішимо'
        - 'будемо вирішили'
        - 'буду вирішувати'
        - 'вирішуватиме'
      explanation: 'Для результату потрібен доконаний вид без слова "будемо".'
    - sentence: 'Вона обов''язково буде написати великого листа своїм батькам.'
      error: 'буде написати'
      answer: 'напише'
      options:
        - 'напише'
        - 'написатиме'
        - 'буде писати'
        - 'написала'
      explanation: 'Дія має результат, тому допоміжне дієслово "бути" тут зайве.'
    - sentence: 'Завтра я буду зустрітися з друзями в центрі міста.'
      error: 'буду зустрітися'
      answer: 'зустрінуся'
      options:
        - 'зустрінуся'
        - 'зустрічатимуся'
        - 'зустріну'
        - 'буду зустрічатися'
      explanation: 'Для одноразової завершеної події використовуємо форму без дієслова "бути".'
    - sentence: 'Я зараз прочитаю дуже цікаву статтю в журналі.'
      error: 'прочитаю'
      answer: 'читаю'
      options:
        - 'читаю'
        - 'буду читати'
        - 'читатиму'
        - 'читав'
      explanation: 'Доконаний вид не описує поточний момент. Якщо дія відбувається зараз, використовуємо теперішній час.'
    - sentence: 'Гадаю, він буде зателефонувати мені завтра вранці.'
      error: 'буде зателефонувати'
      answer: 'зателефонує'
      options:
        - 'зателефонує'
        - 'телефонуватиме'
        - 'буде телефонувати'
        - 'телефонує'
      explanation: 'Дзвінок — це одноразова завершена дія (результат), тому використовується простий майбутній час.'

