version: '1.0'
module: motion-prefixes-departure
level: b1
inline:
- id: group-sort
  type: group-sort
  instruction: 'Розподіліть дієслова руху за напрямком: початок руху (віддалення)
    чи кінець руху (прибуття).'
  groups:
  - label: Початок руху (пі-/по-, від-)
    items:
    - піти
    - поїхати
    - відійти
    - від'їхати
    - побігти
    - відлетіти
  - label: Кінець руху (при-, до-)
    items:
    - прийти
    - приїхати
    - дійти
    - доїхати
    - прибігти
    - прилетіти
- id: fill-in
  type: fill-in
  instruction: Вставте правильне дієслово відправлення в речення.
  items:
  - sentence: Він _____ додому пішки.
    answer: пішов
    options:
    - пішов
    - поїхав
    - відійшов
  - sentence: Завтра ми _____ в Карпати на поїзді.
    answer: поїдемо
    options:
    - підемо
    - поїдемо
    - від'їдемо
  - sentence: Мій старший брат _____ важку валізу на перон.
    answer: поніс
    options:
    - поніс
    - пішов
    - полетів
  - sentence: Пташка злякалася і _____ від кота.
    answer: відлетіла
    options:
    - відлетіла
    - полетіла
    - відбігла
  - sentence: Вона взяла дитину за руку і _____ її до школи.
    answer: повела
    options:
    - повела
    - пішла
    - відвела
  - sentence: Маленький дерев'яний човен тихо _____ від берега.
    answer: відплив
    options:
    - відплив
    - поплив
    - відійшов
  - sentence: Увага! Швидкісний поїзд на Київ _____ від другої платформи.
    answer: від'їжджає
    options:
    - від'їжджає
    - поїхав
    - відбуває
  - sentence: Будь ласка, обережно _____ від скляних дверей.
    answer: відійдіть
    options:
    - відійдіть
    - підіть
    - від'їдьте
- id: match-up
  type: match-up
  instruction: З'єднайте дієслова відправлення (віддалення) з їхніми парами прибуття.
  pairs:
  - left: піти
    right: прийти
  - left: поїхати
    right: приїхати
  - left: побігти
    right: прибігти
  - left: полетіти
    right: прилетіти
  - left: поплисти
    right: приплисти
  - left: віднести
    right: принести
  - left: відвести
    right: привести
  - left: відвезти
    right: привезти
- id: quiz
  type: quiz
  instruction: 'Оберіть правильний префікс: початок подорожі (пі-/по-) чи віддалення
    від об''єкта (від-).'
  items:
  - question: Вона _____ до магазину за хлібом.
    options:
    - пішла
    - відійшла
    - поїхала
    - від'їхала
    correct: 0
  - question: Автобус _____ від зупинки.
    options:
    - від'їхав
    - поїхав
    - пішов
    - відійшов
    correct: 0
  - question: Вони _____ в інше місто на вихідні.
    options:
    - поїхали
    - від'їхали
    - пішли
    - відійшли
    correct: 0
  - question: _____ від багаття, там дуже гаряче!
    options:
    - відійди
    - піди
    - поїдь
    - від'їдь
    correct: 0
  - question: Хлопчик взяв м'яч і _____ до друзів.
    options:
    - побіг
    - відбіг
    - відійшов
    - від'їхав
    correct: 0
  - question: Собака злякався машини і _____ від дороги.
    options:
    - відбіг
    - побіг
    - відійшов
    - пішов
    correct: 0
  - question: Мій брат _____ важку валізу прямо на перон.
    options:
    - поніс
    - відніс
    - поїхав
    - відійшов
    correct: 0
  - question: Коли я взяв камеру, пташка _____ від мене.
    options:
    - відлетіла
    - полетіла
    - відпливла
    - попливла
    correct: 0
workbook:
- type: fill-in
  instruction: Вставте правильну форму дієслова в майбутньому часі.
  items:
  - sentence: Завтра я _____ до нового магазину.
    answer: піду
    options:
    - піду
    - підеш
    - піде
  - sentence: Ми обов'язково _____ в гори влітку.
    answer: поїдемо
    options:
    - поїду
    - поїдемо
    - поїдуть
  - sentence: Ти _____ від комп'ютера чи ні?
    answer: відійдеш
    options:
    - відійдеш
    - відійду
    - відійде
  - sentence: Вона _____ ці книги в бібліотеку.
    answer: понесе
    options:
    - понесу
    - понесеш
    - понесе
  - sentence: Вони _____ від готелю о дев'ятій.
    answer: від'їдуть
    options:
    - від'їдуть
    - від'їдемо
    - від'їде
  - sentence: Ви _____ на човні до острова?
    answer: попливете
    options:
    - попливемо
    - попливете
    - попливуть
- type: match-up
  instruction: З'єднайте особовий займенник із правильною формою дієслова (майбутній
    час).
  pairs:
  - left: Я
    right: поїду
  - left: Ти
    right: підеш
  - left: Він
    right: відійде
  - left: Ми
    right: побіжимо
  - left: Ви
    right: понесете
  - left: Вони
    right: від'їдуть
- type: essay-response
  prompt: 'Уявіть, що ви проводжаєте друзів на вокзалі. Напишіть коротку розповідь
    про їхній від''їзд. Обов''язково використайте щонайменше 5 дієслів із префіксами
    пі-/по- та від- (наприклад: пішли, поїхали, відійшов, від''їжджає, поніс).'
  min_words: 50
  model_answer: Ми прийшли на вокзал дуже рано. Мої друзі взяли свої квитки і пішли
    на другий перон. Мій брат поніс їхню важку валізу. Коли ми стояли на пероні, інший
    поїзд повільно від'їхав від сусідньої платформи. Друзі сіли у вагон, і ми трохи
    відійшли від вікна. Через п'ять хвилин їхній поїзд поїхав. Вони обов'язково приїдуть
    знову!
