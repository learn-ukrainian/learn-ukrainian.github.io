version: '1.0'
module: possessive-adjectives
level: b1
inline:
- id: quiz-possessive-basics
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Присвійні
    прикметники: що це і навіщо».'
  items:
  - question: На яке конкретне питання відповідають присвійні прикметники?
    options:
    - який? яка? яке?
    - чий? чия? чиє?
    - хто? що?
    - де? куди?
    correct: 1
  - question: До якої групи прикметників належить слово «дідусів» у фразі «дідусів
      дім»?
    options:
    - до якісних
    - до відносних
    - до присвійних
    - до жодної з названих
    correct: 2
  - question: Слова «мій», «твій», «їхній» — це...
    options:
    - присвійні прикметники
    - присвійні займенники
    - якісні прикметники
    - іменники
    correct: 1
  - question: Що виражають присвійні прикметники?
    options:
    - пряму ознаку (розмір, вік)
    - відношення до матеріалу
    - належність конкретній особі або тварині
    - дію предмета
    correct: 2
  - question: Яка конструкція звучить більш природно в живій українській мові?
    options:
    - батьків дім
    - дім батька
    - обидві звучать однаково неприродно
    - дім батьковий
    correct: 0
  - question: Чому українська мова використовує присвійні прикметники так часто?
    options:
    - через вплив інших мов
    - щоб уникнути довгих речень
    - вони роблять мову виразною, персоналізованою та автентичною
    - це формальна вимога документів
    correct: 2
  title: 'Оберіть правильний варіант: лексика та граматика з розділу «Присвійні прикметник'
- id: match-up-masc-terms
  type: match-up
  instruction: 'З''єднайте терміни з розділу «Творення від II відміни: суфікси -ів/-їв»
    з їхніми правилами чи прикладами.'
  pairs:
  - left: Тверда основа (дід, брат)
    right: Додаємо суфікс -ів (дідів, братів)
  - left: Основа на звук [й] (Сергій, Юрій)
    right: Відкидаємо [й] і додаємо -їв (Сергіїв, Юріїв)
  - left: М'яка основа другої відміни (учитель, коваль)
    right: Зберігає твердий суфікс -ів у називному відмінку (учителів)
  - left: Чергування приголосних (Олег → Олегів)
    right: Не відбувається перед суфіксом -ів у чоловічих іменах
  - left: Пряма належність (Франко, Шевченко)
    right: Пишеться з великої літери (Франкова поезія)
  - left: Синтаксичне узгодження
    right: Прикметник копіює рід і відмінок предмета (Тарасова книжка)
  title: 'З''єднайте терміни з розділу «Творення від II відміни: суфікси -ів/-їв»
    з їхніми '
- id: fill-in-fem-formation
  type: fill-in
  instruction: 'Вставте правильну граматичну форму у реченнях на тему присвійні прикметники:
    що це і навіщо.'
  items:
  - sentence: Це ___ кімната, вона завжди чиста.
    answer: сестрина
  - sentence: Ми знайшли ___ зошит на столі.
    answer: Лесин
  - sentence: То була старовинна ___ хустка.
    answer: бабусина
  - sentence: Де лежить ___ телефон?
    answer: мамин
  - sentence: Я взяв ___ парасольку.
    answer: тітчину
  - sentence: Ми слухали цікаву ___ ідею.
    answer: Ольжину
  - sentence: Це був великий ___ секрет.
    answer: подружин
  - sentence: Де лежить ___ іграшка?
    answer: доччина
  - sentence: То була стара ___ хата.
    answer: Солошина
  - sentence: Це ___ зошит, передай їй.
    answer: Наталчин
  - sentence: Ось ___ брат, він щойно прийшов.
    answer: Маріїн
  - sentence: То була смачна ___ страва.
    answer: матусина
  title: 'Вставте правильну граматичну форму у реченнях на тему присвійні прикметники:
    що '
- id: quiz
  type: quiz
  instruction: 'Підсумковий тест: перевірте свої знання про присвійні прикметники.'
  items:
  - question: Яке закінчення матиме присвійний прикметник від слова «Микола»?
    options:
    - Миколин
    - Миколів
    - Миколаїв
    - Миколячий
    correct: 0
  - question: 'Оберіть правильну форму для слова «тітка»:'
    options:
    - тітчин
    - тіткин
    - тітков
    - тітків
    correct: 0
  - question: Як правильно утворити форму від імені «Марія»?
    options:
    - Маріїн
    - Марійов
    - Марієв
    - Маріин
    correct: 0
  - question: У чому особливість відмінювання присвійних прикметників?
    options:
    - Мають нульове закінчення в називному відмінку чоловічого роду
    - Не відмінюються за числами
    - Завжди мають закінчення -ий, -а, -е
    - Не змінюються за відмінками
    correct: 0
  - question: 'Оберіть правильну форму родового відмінка (від «батьків дім»):'
    options:
    - немає батькового дому
    - немає батьків дому
    - немає батькового діма
    - немає батьков дому
    correct: 0
  - question: Коли ми пишемо «шевченківський» з малої літери?
    options:
    - Коли це відносний прикметник (стиль, назва на честь)
    - Коли це пряма належність поета
    - Ніколи, завжди з великої
    - Коли він стоїть на початку речення
    correct: 0
  title: 'Підсумковий тест: перевірте свої знання про присвійні прикметники.'
workbook:
- type: fill-in
  instruction: Вставте правильну відмінкову форму присвійного прикметника.
  items:
  - sentence: У мене немає ___ номера телефону.
    answer: батькового
  - sentence: Я даю подарунок ___ сестрі.
    answer: материній
  - sentence: Ми бачили ___ брата на вулиці.
    answer: Олексієвого
  - sentence: Вона розмовляла з ___ сусідкою.
    answer: бабусиною
  - sentence: Книжка лежала на ___ столі.
    answer: дідусевому
  - sentence: Ми вивчаємо багату ___ спадщину.
    answer: Шевченкову
  title: Вставте правильну відмінкову форму присвійного прикметника.
- type: group-sort
  instruction: Розподіліть присвійні прикметники за суфіксами, які використовуються
    для їх утворення (відміна іменника).
  groups:
  - label: Суфікс -ів/-їв (II відміна)
    items:
    - батьків
    - Шевченків
    - Сергіїв
    - учителів
    - Марків
  - label: Суфікс -ин/-їн (I відміна)
    items:
    - мамин
    - сестрин
    - Ольжин
    - Маріїн
    - Миколин
  title: Розподіліть присвійні прикметники за суфіксами, які використовуються для
    їх утво
- type: error-correction
  instruction: Знайдіть і виправте помилки у формах присвійних прикметників.
  items:
  - sentence: Це дуже гарна бабусіна хустка.
    error: бабусіна
    correction: бабусина
    error_type: word
    options:
    - бабусина
    - бабусьова
    - бабусинова
    explanation: 'Суфікс -ин вимагає твердості попереднього приголосного: бабусина.'
  - sentence: Ми їдемо в тіткіне село.
    error: тіткіне
    correction: тітчине
    error_type: word
    options:
    - тітчине
    - тітков
    - тіткове
    explanation: 'Звук [к] чергується з [ч] перед суфіксом -ин: тітчине.'
  - sentence: Я бачив Наталкін зошит на столі.
    error: Наталкін
    correction: Наталчин
    error_type: word
    options:
    - Наталчин
    - Наталков
    - Натальчин
    explanation: 'Перед суфіксом -ин відбувається чергування [к] → [ч]: Наталчин.'
  - sentence: Ось матусіна чашка кави.
    error: матусіна
    correction: матусина
    error_type: word
    options:
    - матусина
    - матуськова
    - матусєва
    explanation: 'Після суфікса -ин звук [с] стає твердим: матусина.'
  - sentence: Це була Ольгина блискуча ідея.
    error: Ольгина
    correction: Ольжина
    error_type: word
    options:
    - Ольжина
    - Ольова
    - Ольгова
    explanation: 'Звук [г] обов''язково чергується з [ж]: Ольжина.'
  - sentence: То старий подругин секрет.
    error: подругин
    correction: подружин
    error_type: word
    options:
    - подружин
    - подругов
    - подруговий
    explanation: 'Звук [г] чергується з [ж] перед суфіксом: подружин.'
  title: Знайдіть і виправте помилки у формах присвійних прикметників.
