- type: essay-response
  instruction: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Творення
    від II відміни: суфікси -ів/-їв».'
  prompt: Складіть 5 речень, використовуючи присвійні прикметники, утворені від чоловічих
    імен або назв осіб (наприклад, батько, Сергій, Олексій, Андрій, учитель). Зверніть
    увагу на правильне узгодження з предметами власності.
  min_words: 50
  model_answer: 1. Це Андріїв комп'ютер, він залишив його на столі. 2. Учора ми відвідали
    батьків кабінет, щоб узяти документи. 3. Олексіїв брат навчається зі мною в одному
    класі. 4. Учителів журнал лежав на полиці біля дошки. 5. Ми читали Шевченкову
    поезію на уроці української літератури.
  title: Напишіть 5 речень, використовуючи нову лексику з розділу «Творення від II
    відмін
