- type: quiz
  title: "Перевірте знання: Центр України"
  instruction: "Виберіть правильну відповідь на кожне запитання."
  items:
    - question: "Яка річка об'єднує Лівобережжя та Правобережжя України?"
      explanation: "Дніпро — це головна водна артерія, яка зшиває країну."
      options:
        - text: "Дніпро"
          correct: true
        - text: "Дунай"
          correct: false
        - text: "Дністер"
          correct: false
        - text: "Десна"
          correct: false
    - question: "Яке місто вважається духовною столицею України?"
      explanation: "Полтава є символом автентичного українського духу."
      options:
        - text: "Полтава"
          correct: true
        - text: "Київ"
          correct: false
        - text: "Черкаси"
          correct: false
        - text: "Чигирин"
          correct: false
    - question: "Хто є автором поеми \"Енеїда\", опублікованої у 1798 році?"
      explanation: "Іван Котляревський написав поему народною мовою."
      options:
        - text: "Іван Котляревський"
          correct: true
        - text: "Тарас Шевченко"
          correct: false
        - text: "Богдан Хмельницький"
          correct: false
        - text: "Панас Мирний"
          correct: false
    - question: "Який діалект став основою для сучасної літературної мови?"
      explanation: "Саме полтавсько-київські говори стали нормою завдяки літературі."
      options:
        - text: "полтавський"
          correct: true
        - text: "київський"
          correct: false
        - text: "черкаський"
          correct: false
        - text: "львівський"
          correct: false
    - question: "Яке місто було столицею Гетьманщини за часів Хмельницького?"
      explanation: "Чигирин на Черкащині був політичним центром."
      options:
        - text: "Чигирин"
          correct: true
        - text: "Канів"
          correct: false
        - text: "Полтава"
          correct: false
        - text: "Київ"
          correct: false
    - question: "Де похований видатний український поет Тарас Шевченко?"
      explanation: "Прах Шевченка перевезли на Чернечу Гору в Каневі."
      options:
        - text: "у Каневі"
          correct: true
        - text: "в Києві"
          correct: false
        - text: "у Полтаві"
          correct: false
        - text: "в Черкасах"
          correct: false
    - question: "Ким був побудований Софійський собор у Києві?"
      explanation: "Храм був побудований у першій половині одинадцятого століття."
      options:
        - text: "Ярославом Мудрим"
          correct: true
        - text: "Богданом Хмельницьким"
          correct: false
        - text: "Іваном Мазепою"
          correct: false
        - text: "Остафієм Дашкевичем"
          correct: false
    - question: "Яка головна площа Києва стала символом громадянської активності?"
      explanation: "Майдан став серцем демократичної традиції."
      options:
        - text: "Майдан Незалежності"
          correct: true
        - text: "Софійська площа"
          correct: false
        - text: "Хрещатик"
          correct: false
        - text: "Поділ"
          correct: false

- type: match-up
  title: "Знайдіть пару: Міста та їхнє значення"
  instruction: "З'єднайте назву міста чи регіону з його історичною роллю."
  pairs:
    - left: "Київ"
      right: "Тисячолітня столиця та європейський мегаполіс"
    - left: "Полтавщина"
      right: "Колиска сучасної літературної мови"
    - left: "Черкащина"
      right: "Центр козацького всесвіту та гетьманської слави"
    - left: "Чигирин"
      right: "Столиця могутної Козацької держави"
    - left: "Канів"
      right: "Місто, де розташована Тарасова Гора"
    - left: "Майдан Незалежності"
      right: "Символ сучасної демократичної традиції"
    - left: "Софія Київська"
      right: "Грандіозний храм одинадцятого століття"
    - left: "Поділ"
      right: "Історичний район сучасної столиці"

- type: fill-in
  title: "Заповніть пропуски: Історичні факти"
  instruction: "Оберіть правильне слово для кожного речення."
  items:
    - sentence: "Центральна Україна — це насамперед басейн могутньої річки ..."
      answer: "Дніпро"
      options:
        - "Дніпро"
        - "Дунай"
        - "Десна"
        - "Буг"
      explanation: "Дніпро є головною річкою регіону."
    - sentence: "Місто Київ уособлює ... державності."
      answer: "спадщину"
      options:
        - "спадщину"
        - "літературу"
        - "вольницю"
        - "географію"
      explanation: "Київ символізує безперервну традицію державності."
    - sentence: "Романтичний образ українського села найчастіше асоціюється з ..."
      answer: "Полтавщиною"
      options:
        - "Полтавщиною"
        - "Київщиною"
        - "Черкащиною"
        - "Галичиною"
      explanation: "Полтавщина має класичний сільський пейзаж."
    - sentence: "Поема \"Енеїда\" стала грандіозною етнографічною ..."
      answer: "енциклопедією"
      options:
        - "енциклопедією"
        - "картою"
        - "історією"
        - "піснею"
      explanation: "Автор детально описав народні звичаї."
    - sentence: "Основою тогочасного суспільства була концепція \"козацької ...\""
      answer: "вольниці"
      options:
        - "вольниці"
        - "праці"
        - "літератури"
        - "архітектури"
      explanation: "Це означало особисту свободу."
    - sentence: "Богдан Хмельницький мав титул ..."
      answer: "гетьмана"
      options:
        - "гетьмана"
        - "князя"
        - "президента"
        - "короля"
      explanation: "Він керував Козацькою державою."
    - sentence: "Золоті Ворота — це головний парадний ... до стародавнього міста."
      answer: "вхід"
      options:
        - "вхід"
        - "вихід"
        - "храм"
        - "міст"
      explanation: "Вони підкреслювали багатство держави."
    - sentence: "Сучасні військові беруть почесні назви на честь славетних ..."
      answer: "гетьманів"
      options:
        - "гетьманів"
        - "письменників"
        - "художників"
        - "артистів"
      explanation: "Військові вшановують козацьку спадщину."

- type: unjumble
