version: '1.0'
module: checkpoint-cases
level: b1
inline:
- id: fill-in-cases-review
  type: fill-in
  instruction: 'Вставте правильну граматичну форму у реченнях на тему повторення:
    відмінки.'
  items:
  - sentence: Я попросив налити склянку _____.
    answer: води
    options:
    - вода
    - води
    - воду
  - sentence: У нас зараз немає вільного _____.
    answer: часу
    options:
    - час
    - часу
    - часом
  - sentence: Моєму найкращому _____ двадцять років.
    answer: другові
    options:
    - друг
    - друга
    - другові
  - sentence: Він зараз працює талановитим _____.
    answer: архітектором
    options:
    - архітектор
    - архітектора
    - архітектором
  - sentence: Зимове свято почнеться першого _____.
    answer: січня
    options:
    - січень
    - січня
    - січнем
  - sentence: Мені завжди дуже _____ взимку.
    answer: холодно
    options:
    - холодний
    - холодно
    - холодного
- id: match-up-prepositions-definitions
  type: match-up
  instruction: 'З''єднайте терміни з розділу «Повторення: прийменники» з їхніми визначеннями.'
  pairs:
  - left: через (Accusative)
    right: дія відбудеться після певного часу
  - left: за (Accusative)
    right: час, необхідний для завершення дії
  - left: протягом (Genitive)
    right: дія безперервно триває весь цей період
  - left: під час (Genitive)
    right: дія відбувається одночасно з іншою подією
  - left: перед (Instrumental)
    right: дія відбувається раніше за іншу подію
  - left: завдяки (Dative)
    right: причина з позитивним результатом або успіхом
- id: quiz-numerals-pronouns
  type: quiz
  instruction: Оберіть правильний варіант, звертаючи увагу на числівники та займенники.
  items:
  - question: У нашій групі навчається п'ять розумних _____.
    options:
    - студентів
    - студенти
    - студентами
    - студента
    correct: 0
  - question: Я бачу на вулиці два нові _____.
    options:
    - автомобілі
    - автомобілів
    - автомобіль
    - автомобілями
    correct: 0
  - question: Вчора він не розмовляв ні з _____.
    options:
    - ким
    - кимось
    - ніким
    - хто
    correct: 0
  - question: Я просто гуляю _____ по парку.
    options:
    - собі
    - себе
    - собою
    - себе ж
    correct: 0
  - question: Зустріч почнеться о _____ годині.
    options:
    - п'ятій
    - п'ять
    - п'ята
    - п'ятою
    correct: 0
  - question: Я буду чекати вас біля _____ поверху.
    options:
    - другого
    - другий
    - другому
    - другим
    correct: 0
- id: quiz-diagnostics-phase6
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Повторення:
    відмінки».'
  items:
  - question: Я завжди п'ю ранкову каву без _____.
    options:
    - цукру
    - цукра
    - цукор
    - цукром
    correct: 0
  - question: Ми поїдемо у відпустку _____ серпня.
    options:
    - сьомого
    - сьоме
    - сьомий
    - сьомим
    correct: 0
  - question: Вчора нам дуже _____ знайти вільне місце.
    options:
    - пощастило
    - пощастив
    - пощастила
    - пощастили
    correct: 0
  - question: Моя донька глибоко цікавиться _____.
    options:
    - історією
    - історії
    - історію
    - історія
    correct: 0
  - question: _____ успішному проєкту, ми отримали велику премію.
    options:
    - Завдяки
    - Через
    - Від
    - З
    correct: 0
  - question: Регулярна _____ дуже важлива для вашого прогресу.
    options:
    - самооцінка
    - рубрика
    - прогалина
    - аналіз
    correct: 0
workbook:
- type: fill-in
  instruction: Вставте правильне слово у речення.
  items:
  - sentence: Це дуже _____ підхід до вивчення граматики.
    answer: комплексний
    options:
    - комплексний
    - повторення
    - прогалина
  - sentence: Регулярна _____ допомагає знайти ваші слабкі місця.
    answer: діагностика
    options:
    - діагностика
    - рубрика
    - аналіз
  - sentence: Ми робимо глибокий _____ помилок після кожного тесту.
    answer: аналіз
    options:
    - аналіз
    - самооцінка
    - прогалина
  - sentence: Ця нова _____ в підручнику дуже цікава та корисна.
    answer: рубрика
    options:
    - рубрика
    - діагностика
    - комплексний
  - sentence: Ваша _____ знань з граматики заважає вільно говорити.
    answer: прогалина
    options:
    - прогалина
    - повторення
    - аналіз
  - sentence: Постійне _____ матеріалу — це головний ключ до успіху.
    answer: повторення
    options:
    - повторення
    - самооцінка
    - рубрика
