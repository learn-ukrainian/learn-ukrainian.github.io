- type: essay-response
  prompt: 'Напишіть формальний лист (5 речень) власнику квартири (пану Сидоренку),
    використовуючи лексику з розділу «Повторення: прийменники». Використайте кличний
    відмінок для привітання, прийменники причини та мети (для, протягом, через те
    що), а також числівники для вказівки вашого бюджету.'
  min_words: 50
