version: '1.0'
module: checkpoint-cases
level: b1
inline:
- id: fill-in-focus-on-correct-case-endings-for-genitive-dative-and-instrumental-semantic-roles
  type: fill-in
  instruction: Вставте правильну граматичну форму у реченнях на тему повторення (відмінки).
  items:
  - sentence: Він випив склянку ____ і пішов на роботу.
    answer: води
    options:
    - воду
    - води
    - воді
    - водою
  - sentence: Ми традиційно бажаємо вам великого ____.
    answer: успіху
    options:
    - успіх
    - успіху
    - успіха
    - успіхом
  - sentence: Сьогодні на вулиці дуже ____, тому я вдягнув теплу куртку.
    answer: холодно
    options:
    - холодний
    - холодно
    - холодом
    - холоду
  - sentence: Мій брат завжди мріяв працювати ____.
    answer: архітектором
    options:
    - архітектор
    - архітектора
    - архітектору
    - архітектором
  - sentence: Нам ____ чекати поїзд цілих дві години.
    answer: довелося
    options:
    - довелося
    - довівся
    - довелася
    - довели
  - sentence: Вони швидко їхали новою ____ додому.
    answer: дорогою
    options:
    - дорога
    - дороги
    - дорозі
    - дорогою
- id: error-correction-prepositions
  type: error-correction
  instruction: 'Знайдіть і виправте помилки у реченнях на тему повторення: прийменники.'
  items:
  - sentence: Я зателефоную тобі за годину, коли звільнюся.
    error: за
    correction: через
    error_type: word
    options:
    - через
    - після
    - протягом
    explanation: Для позначення часу, який має минути до початку дії, використовуємо
      «через».
  - sentence: Він написав цю статтю через тиждень роботи.
    error: через
    correction: за
    error_type: word
    options:
    - за
    - протягом
    - під час
    explanation: Для часу, який знадобився для повного виконання дії, використовуємо
      «за».
  - sentence: Наш рейс скасували із-за негоди.
    error: із-за
    correction: через
    error_type: word
    options:
    - через
    - завдяки
    - для
    explanation: Із-за вказує лише на просторовий напрямок. Для негативної причини
      використовуємо «через».
  - sentence: Проект став успішним через зусиллям команди.
    error: через
    correction: завдяки
    error_type: word
    options:
    - завдяки
    - із-за
    - для
    explanation: Для позитивної причини з Давальним відмінком використовуємо «завдяки».
  - sentence: Втомлений батько пішов у садок для дитиною.
    error: для
    correction: за
    error_type: word
    options:
    - за
    - по
    - до
    explanation: Коли мета — піти і забрати когось або принести щось, використовуємо
      «за» з Орудним відмінком.
  - sentence: Ми уважно повторили правила до уроком.
    error: до
    correction: перед
    error_type: word
    options:
    - перед
    - після
    - під час
    explanation: Орудний відмінок вимагає прийменника «перед» для позначення дії,
      що відбувається раніше.
- id: quiz-numerals-pronouns
  type: quiz
  instruction: Оберіть правильний варіант (числівники та займенники).
  items:
  - question: Як правильно звернутися до Івана Петровича?
    options:
    - Іван Петрович
    - Іване Петровичу
    - Івану Петровичу
    - Іваном Петровичем
    correct: 1
  - question: 'Оберіть правильний варіант: У кімнаті стоїть...'
    options:
    - два великих столи
    - два великі столи
    - два великих столів
    - два великі стола
    correct: 1
  - question: Скільки тут людей?
    options:
    - п'ять люди
    - п'ятеро людей
    - п'ять людей
    - п'ять людях
    correct: 1
  - question: 'Як правильно сказати: Я не говорив...'
    options:
    - з ніким
    - ні з ким
    - ні з кого
    - ніким
    correct: 1
  - question: 'Оберіть правильну форму дробу:'
    options:
    - півтора місяці
    - півтори місяця
    - півтора місяця
    - півтори місяці
    correct: 2
  - question: Який займенник підкреслює виконання дії для власного задоволення?
    options:
    - себе
    - собою
    - собі
    - собака
    correct: 2
- id: reading-housing-analysis
  type: reading
  passage: 'Прочитайте текст про повторення: відмінки (Житловий ринок сучасної України,
    наведений вище) і дайте відповіді на запитання. Це завдання — комплексна діагностика
    вашого розуміння.'
  questions:
  - Чому житловий ринок України переживає серйозні трансформації?
  - Що часто обирають робити молоді спеціалісти замість купівлі житла?
  - На який період зазвичай підписують договір оренди?
  - З якою метою орендарі часто шукають житло у Львові?
  - Скільки покупців розглядає квартири як інвестицію?
  - Який відмінок використано у словосполученні «стати орендарями» і чому?
- id: essay-response-housing
  type: essay-response
  prompt: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Повторення: прийменники».
    Уявіть, що ви шукаєте нове житло і пишете формальний лист потенційному орендодавцю
    (Пану Сидоренку). Обов''язково використовуйте Кличний відмінок, сполучники причини
    (через те що), прийменники часу (протягом) та мети (для).'
  min_words: 50
  model_answer: Шановний пане Сидоренку! Я звертаюся до вас, через те що шукаю нове
    житло для своєї родини. Ми плануємо орендувати вашу квартиру протягом одного року.
    Наш максимальний бюджет становить п'ятнадцять тисяч гривень. Сподіваюся, що між
    нами не буде жодних прогалин у розумінні. Дякую вам за увагу!
- id: quiz-diagnostics-phase6
  type: quiz
  instruction: 'Комплексна самооцінка: перевірте свої знання та оберіть правильний
    варіант (лексика та граматика з розділу «Повторення: відмінки»).'
  items:
  - question: Що означає дієслово «боятися» щодо керування відмінками?
    options:
    - Вимагає Знахідного відмінка
    - Вимагає Родового відмінка
    - Вимагає Давального відмінка
    - Вимагає Орудного відмінка
    correct: 1
  - question: 'Як правильно сказати: ми сміємося...'
    options:
    - над ним
    - з нього
    - від нього
    - на нього
    correct: 1
  - question: Яке слово вимагає після себе Давального відмінка?
    options:
    - навчатися
    - боятися
    - дякувати
    - шукати
    correct: 2
  - question: Який прийменник використовується з Орудним відмінком в офіційно-діловому
      стилі?
    options:
    - відповідно до
    - згідно з
    - завдяки
    - через
    correct: 1
  - question: 'Закінчення -у/-ю у Родовому відмінку мають:'
    options:
    - конкретні предмети
    - живі істоти
    - абстрактні поняття та речовини
    - назви міст
    correct: 2
  - question: 'Оберіть правильний варіант перекладу «due to the fact that»:'
    options:
    - через те що
    - із-за того що
    - завдяки тому що
    - для того щоб
    correct: 0
workbook:
- id: match-up-prepositions
  type: match-up
  instruction: 'З''єднайте терміни з розділу «Повторення: прийменники» з їхніми значеннями
    та граматичними ролями.'
  pairs:
  - left: через
    right: негативна або нейтральна причина
  - left: завдяки
    right: позитивна причина з хорошим результатом
  - left: за
    right: час, необхідний для повного завершення дії
  - left: протягом
    right: безперервна дія у виділений час
  - left: перед
    right: дія відбувається раніше за іншу
  - left: після
    right: подія стається пізніше за іншу
- id: true-false-cases
  type: true-false
  instruction: Правда чи ні? Проаналізуйте твердження щодо використання відмінків
    та числівників.
  items:
  - statement: Слово «дякувати» вимагає після себе Знахідного відмінка.
    correct: false
    explanation: Дієслово «дякувати» вимагає Давального відмінка (дякую вам).
  - statement: Збірний числівник «двоє» використовується зі словом «люди».
    correct: true
    explanation: Ми кажемо «двоє людей», «троє дітей».
  - statement: Родовий відмінок вживається при запереченні об'єкта (наприклад, «не
      маю часу»).
    correct: true
    explanation: Це класичне правило української мови для дієслів заперечення.
  - statement: Іменники чоловічого роду для назв міст мають у Родовому відмінку закінчення
      -у.
    correct: false
    explanation: Назви міст зазвичай мають конкретне закінчення -а/-я (Києва, Львова).
  - statement: Словосполучення «сміятися над кимось» є правильною українською формою.
    correct: false
    explanation: Це калька з російської; правильно «сміятися з когось».
  - statement: Прийменник «за» може позначати мету руху, наприклад, «піти за хлібом».
    correct: true
    explanation: Так, це правильна розмовна конструкція з Орудним відмінком.
- id: error-correction-ghosts
  type: error-correction
  instruction: Знайдіть і виправте лексичні помилки («лінгвістичні привиди» та росіянізми).
  items:
  - sentence: Він довго сміявся над своїм братом.
    error: над
    correction: з
    error_type: construction
    options:
    - з
    - від
    - на
    explanation: 'Правильно: сміятися з (когось).'
  - sentence: Я хочу щиро подякувати вас за допомогу.
    error: вас
    correction: вам
    error_type: word
    options:
    - вам
    - вами
    - вашим
    explanation: Дієслово дякувати вимагає Давального відмінка.
  - sentence: Студенти щодня навчаються музиці.
    error: музиці
    correction: музики
    error_type: word
    options:
    - музики
    - музику
    - музикою
    explanation: Дієслово навчатися керує Родовим відмінком.
  - sentence: Ми працюємо згідно плану.
    error: згідно
    correction: згідно з
    error_type: phrase
    options:
    - згідно з
    - відповідно
    - завдяки
    explanation: Конструкція «згідно» вимагає прийменника «з» та Орудного відмінка
      (згідно з планом).
  - sentence: Із-за сильного дощу ми залишилися вдома.
    error: Із-за
    correction: Через
    error_type: word
    options:
    - Через
    - Завдяки
    - Для
    explanation: Причина позначається прийменником «через». «Із-за» — це просторовий
      напрямок руху.
  - sentence: Він написав контрольну роботу після п'ять днів підготовки.
    error: п'ять
    correction: п'яти
    error_type: word
    options:
    - п'яти
    - п'ятьох
    - п'ятьом
    explanation: Після прийменника «після» числівник має стояти у Родовому відмінку
      (після п'яти).
- id: group-sort-genitive
  type: group-sort
  instruction: Розподіліть іменники за правильним закінченням у Родовому відмінку
    однини (-а/-я або -у/-ю).
  groups:
  - label: Закінчення -а/-я (конкретні предмети, міста, особи)
    items:
    - стіл
    - Київ
    - лікар
    - брат
  - label: Закінчення -у/-ю (абстрактні, речовини, процеси)
    items:
    - час
    - цукор
    - біль
    - футбол
- id: fill-in-vocab-review
  type: fill-in
  instruction: Вставте правильне слово, використовуючи нову лексику цього розділу.
  items:
  - sentence: Ця вправа — це ____ аналіз ваших знань.
    answer: комплексний
    options:
    - комплексний
    - прогалина
    - рубрика
  - sentence: Якщо ви маєте ____ у знаннях, варто повернутися до теорії.
    answer: прогалини
    options:
    - прогалини
    - повторення
    - рубрики
  - sentence: У журналі з'явилася нова ____ про нерухомість.
    answer: рубрика
    options:
    - рубрика
    - самооцінка
    - діагностика
  - sentence: Регулярне ____ матеріалу допомагає запам'ятати правила.
    answer: повторення
    options:
    - повторення
    - прогалина
    - аналіз
  - sentence: Наприкінці курсу обов'язкова чесна ____ своїх навичок.
    answer: самооцінка
    options:
    - самооцінка
    - рубрика
    - прогалина
  - sentence: Для оцінки прогресу проводиться детальна ____.
    answer: діагностика
    options:
    - діагностика
    - рубрика
    - прогалина
