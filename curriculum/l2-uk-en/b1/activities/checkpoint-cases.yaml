version: '1.0'
module: checkpoint-cases
level: b1
inline:
- id: fill-in-focus-on-correct-case-endings-for-genitive-dative-and-instrumental-semantic-roles
  type: fill-in
  instruction: Вставте правильну граматичну форму (семантичні ролі відмінків).
  items:
  - sentence: Студенти завжди бояться складного ____.
    answer: іспиту
    options:
    - іспиту
    - іспит
    - іспитом
  - sentence: Зараз мені дуже ____, тому я зачиню вікно.
    answer: холодно
    options:
    - холодно
    - холодний
    - холодом
  - sentence: Він мріє працювати ____ у великій компанії.
    answer: архітектором
    options:
    - архітектор
    - архітектора
    - архітектором
  - sentence: У мене сьогодні зовсім немає вільного ____.
    answer: часу
    options:
    - час
    - часу
    - часом
  - sentence: Ми хочемо випити склянку чистої ____.
    answer: води
    options:
    - вода
    - воду
    - води
  - sentence: Вона дуже цікавиться сучасним ____.
    answer: мистецтвом
    options:
    - мистецтво
    - мистецтва
    - мистецтвом
- id: quiz-numerals-pronouns
  type: quiz
  instruction: Оберіть правильний варіант для числівників та займенників.
  items:
  - question: Шановний ____, ми раді вас вітати.
    options:
    - Іван Петрович
    - Іване Петровичу
    - Івану Петровичу
    - Іване Петрович
    correct: 1
  - question: Ми купили для офісу п'ять нових ____.
    options:
    - столи
    - столів
    - стола
    - столом
    correct: 1
  - question: У нашого директора є троє ____.
    options:
    - діти
    - дітей
    - дитини
    - дітям
    correct: 1
  - question: Я вчора не говорив про це ____.
    options:
    - з ніким
    - ніким
    - ні з ким
    - ні з кими
    correct: 2
  - question: Цей проект буде тривати півтора ____.
    options:
    - місяці
    - місяців
    - місяця
    - місяць
    correct: 2
  - question: Мій брат купив ____ нову красиву машину.
    options:
    - собою
    - самому
    - себе
    - собі
    correct: 3
- id: reading-housing-analysis
  type: quiz
  instruction: Прочитайте текст про житловий ринок України та дайте відповіді на запитання.
  items:
  - question: Чому житловий ринок сучасної України переживає серйозні трансформації?
    options:
    - Завдяки великим європейським інвестиціям
    - Через війну та економічні зміни
    - Через нові закони про нерухомість
    - Завдяки туристичному буму в столиці
    correct: 1
  - question: Чому багато молодих спеціалістів у Києві свідомо обирають стати орендарями?
    options:
    - Вони взагалі не планують залишатися в Києві
    - У столиці зовсім немає нових гарних будинків
    - Бути власником квартири в центрі дуже дорого
    - Оренда зараз коштує понад дві тисячі доларів
    correct: 2
  - question: Що саме приваблює багатьох людей переїхати до Львова?
    options:
    - Відносна безпека та європейська атмосфера
    - Можливість зробити дуже дешевий ремонт
    - Неймовірно швидкий ритм сучасного життя
    - Великий вибір дешевих квартир у центрі
    correct: 0
  - question: Чому попит на безпечне житло у Львові зріс неймовірно швидко?
    options:
    - Завдяки великому студентському містечку
    - Через те що оренда стала дуже дешевою
    - Завдяки новим будівельним компаніям
    - Через велику кількість переміщених осіб
    correct: 3
  - question: Що близько третини покупців розглядає як надійний спосіб збереження
      капіталу?
    options:
    - Нові зошити для важливих записів
    - Сучасні квартири та нерухомість
    - Довгострокову оренду на один рік
    - Старі будинки без якісного ремонту
    correct: 1
  - question: Скільки часу сучасні інвестори цілком готові чекати на здачу нового
      будинку?
    options:
    - Один рік
    - Два роки
    - Півтора року
    - Півтора місяця
    correct: 2
- id: essay-response-housing
  type: fill-in
  instruction: Складіть формальний електронний лист пану Сидоренку, обравши правильні
    граматичні форми.
  items:
  - sentence: Шановний ____! Я звертаюся до вас щодо оренди житла.
    answer: пане Сидоренку
    options:
    - пане Сидоренку
    - пан Сидоренко
    - пане Сидоренко
  - sentence: Я пишу вам, ____ шукаю нову комфортну квартиру.
    answer: через те що
    options:
    - через те що
    - із-за того що
    - завдяки тому що
  - sentence: Я планую орендувати вашу квартиру ____ одного року.
    answer: протягом
    options:
    - протягом
    - за
    - через
  - sentence: Це просторе житло ідеально підходить ____.
    answer: для мене та моєї родини
    options:
    - для мене та моєї родини
    - мені та моїй родині
    - по мене та мою родину
  - sentence: Мій максимальний бюджет на оренду становить п'ятнадцять ____ гривень.
    answer: тисяч
    options:
    - тисяч
    - тисячі
    - тисяча
  - sentence: Я дуже хочу жити недалеко від ____ станції метро.
    answer: третьої
    options:
    - третьої
    - третя
    - третій
- id: quiz-diagnostics-phase6
  type: quiz
  instruction: 'Діагностика: оберіть правильний варіант (відмінки, займенники, прийменники).'
  items:
  - question: 'Якщо ви хочете пити, ви скажете: ''Дайте мені склянку ____''.'
    options:
    - вода
    - водою
    - воду
    - води
    correct: 3
  - question: Як правильно сказати, що вам бракує вільного часу?
    options:
    - Я маю не час
    - У мене немає час
    - Мені немає часу
    - У мене немає часу
    correct: 3
  - question: 'Виберіть правильне речення з прийменником причини:'
    options:
    - Він не прийшов із-за дощу
    - Він не прийшов через дощ
    - Він не прийшов завдяки дощу
    - Він не прийшов по дощ
    correct: 1
  - question: Як правильно висловити вдячність українською мовою?
    options:
    - Дякую вам
    - Дякую вас
    - Дякую для вас
    - Дякую до вас
    correct: 0
  - question: Яку граматичну форму вимагає дієслово 'навчатися'?
    options:
    - Знахідний відмінок
    - Давальний відмінок
    - Родовий відмінок
    - Орудний відмінок
    correct: 2
  - question: Як правильно побудувати конструкцію з 'згідно'?
    options:
    - Згідно закону
    - Відповідно із законом
    - Згідно до закону
    - Згідно із законом
    correct: 3
workbook:
- type: match-up
  instruction: З'єднайте терміни з їхніми визначеннями.
  pairs:
  - left: рубрика
    right: спеціальний розділ у тексті
  - left: аналіз помилок
    right: пошук і вивчення неправильних відповідей
  - left: прогалина
    right: відсутність знань з певної теми
  - left: повторення
    right: процес закріплення вивченого матеріалу
  - left: самооцінка
    right: перевірка власних результатів
  - left: комплексний
    right: той, що охоплює всі частини цілого
  - left: діагностика
    right: визначення рівня ваших знань
- type: group-sort
  instruction: Розподіліть прийменники залежно від того, яку причину вони позначають.
  groups:
  - label: Позитивна причина (Давальний відмінок)
    items:
    - завдяки зусиллям
    - завдяки лікарям
    - завдяки інвестиціям
  - label: Негативна або нейтральна причина (Знахідний відмінок)
    items:
    - через дощ
    - через негоду
    - через затори
- type: error-correction
  instruction: Знайдіть і виправте лексичні та граматичні помилки (росіянізми).
  items:
  - sentence: Він завжди сміється наді мною.
    error: наді мною
    correction: з мене
    error_type: phrase
    options:
    - з мене
    - про мене
    - за мене
    explanation: В українській мові ми сміємося 'з когось'.
  - sentence: Я хочу щиро подякувати вас за допомогу.
    error: вас
    correction: вам
    error_type: word
    options:
    - вам
    - до вас
    - для вас
    explanation: Дієслово 'дякувати' вимагає Давального відмінка.
  - sentence: Моя сестра зараз навчається музиці.
    error: музиці
    correction: музики
    error_type: word
    options:
    - музики
    - музику
    - музикою
    explanation: Дієслово 'навчатися' вимагає Родового відмінка.
  - sentence: Ми не поїхали на море із-за поганої погоди.
    error: із-за
    correction: через
    error_type: word
    options:
    - через
    - завдяки
    - для
    explanation: Для причини використовується прийменник 'через'.
  - sentence: Він швидко пішов у магазин за молоком.
    error: за молоком
    correction: по молоко
    error_type: phrase
    options:
    - по молоко
    - на молоко
    - до молока
    explanation: Мета руху (принести щось) позначається прийменником 'по' + Знахідний
      відмінок.
  - sentence: Вони працюють повністю згідно нових правил.
    error: згідно нових правил
    correction: згідно з новими правилами
    error_type: phrase
    options:
    - згідно з новими правилами
    - відповідно з новими правилами
    - згідно до нових правил
    explanation: 'Правильна конструкція: ''згідно з'' + Орудний відмінок.'
- type: unjumble
  instruction: Складіть правильні речення зі слів.
  items:
  - words:
    - з
    - мене.
    - Не
    - треба
    - сміятися
    correct_order:
    - Не
    - треба
    - сміятися
    - з
    - мене.
  - words:
    - завдяки
    - команди.
    - ми
    - перемогли
    - зусиллям
    - Сьогодні
    correct_order:
    - Сьогодні
    - ми
    - перемогли
    - завдяки
    - зусиллям
    - команди.
  - words:
    - У
    - мене
    - часу.
    - немає
    - сьогодні
    - вільного
    correct_order:
    - У
    - мене
    - сьогодні
    - немає
    - вільного
    - часу.
  - words:
    - пішла
    - магазин
    - Вона
    - хліб.
    - у
    - по
    correct_order:
    - Вона
    - пішла
    - у
    - магазин
    - по
    - хліб.
  - words:
    - дуже
    - мені
    - холодно.
    - сьогодні
    - Зранку
    correct_order:
    - Зранку
    - мені
    - сьогодні
    - дуже
    - холодно.
  - words:
    - законом.
    - із
    - працюємо
    - Ми
    - згідно
    - завжди
    correct_order:
    - Ми
    - завжди
    - працюємо
    - згідно
    - із
    - законом.
