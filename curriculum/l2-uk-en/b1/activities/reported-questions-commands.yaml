- type: select
  title: Виберіть правильні варіанти
  instruction: Уважно прочитайте запитання та оберіть усі правильні відповіді серед
    запропонованих варіантів.
  items:
    - question: Які з поданих речень є правильними для закритих загальних питань (відповідь
        "так" або "ні")?
      min_correct: 2
      options:
        - text: Він запитав, чи я йду в кіно.
          correct: true
        - text: Вона поцікавилася, чи є в мене час.
          correct: true
        - text: Брат запитав, що я купив хліб.
          correct: false
        - text: Друг спитав, щоб я пішов з ним.
          correct: false
      explanation: Закриті питання завжди вимагають підрядного сполучника "чи".
    - question: Які речення граматично правильно передають прохання чи наказ іншій
        особі?
      min_correct: 2
      options:
        - text: Мама попросила, щоб я прибрав кімнату.
          correct: true
        - text: Директор вимагав, щоб ми працювали швидше.
          correct: true
        - text: Лікар порадив, щоб я п'ю більше води.
          correct: false
        - text: Він запитав мене допомогти йому.
          correct: false
      explanation: Прохання вимагає конструкції "щоб" + дієслово в минулому часі.
        Дієслово "запитати" тут не підходить.
    - question: У яких реченнях абсолютно правильно збережено час та пунктуацію непрямої
        мови?
      min_correct: 2
      options:
        - text: Він поцікавився, коли приїде потяг.
          correct: true
        - text: Вона запитала, де знаходиться музей.
          correct: true
        - text: Клієнт запитав, скільки коштує товар?
          correct: false
        - text: Він спитав, чи він може зайти?
          correct: false
      explanation: У непрямих питаннях знак питання в кінці речення обов'язково зникає.
    - question: Які дієслова ідеально підходять для ввічливого прохання в діловому
        чи корпоративному контексті?
      min_correct: 2
      options:
        - text: попросити
          correct: true
        - text: звернутися з проханням
          correct: true
        - text: наказати
          correct: false
        - text: вимагати
          correct: false
        - text: заборонити
          correct: false
      explanation: Дієслова "наказати" і "вимагати" є занадто категоричними і можуть
        бути сприйняті як грубі.
    - question: 'Які речення містять правильну логічну зміну займенників (Оригінал
        прямої мови: "Я люблю свою роботу")?'
      min_correct: 2
      options:
        - text: Він сказав, що він любить свою роботу.
          correct: true
        - text: Вона сказала, що вона любить свою роботу.
          correct: true
        - text: Він сказав, що я люблю свою роботу.
          correct: false
        - text: Вона сказала, що він любить мою роботу.
          correct: false
      explanation: Коли ми передаємо чужі слова, ми маємо змінити перспективу першої
        особи ("я") на третю ("він/вона").
    - question: Які з наведених речень побудовані граматично неправильно і містять
        типові помилки?
      min_correct: 2
      options:
        - text: Він запитав, що я хочу їсти.
          correct: true
        - text: Мама сказала, щоб я іду додому.
          correct: true
        - text: Я поцікавився, чи буде завтра дощ.
          correct: false
        - text: Керівник попросив, щоб ми закінчили проєкт.
          correct: false
      explanation: Перше речення потребує "чи", друге речення потребує минулого часу
        "йшов".
- type: true-false
  title: Правда чи неправда
  instruction: Визначте, чи є наведене твердження правильним граматичним фактом.
  items:
    - statement: Для закритих питань (так/ні) завжди обов'язково використовується
        сполучник "чи".
      correct: true
      explanation: Сполучник "чи" є єдиним правильним варіантом для таких синтаксичних
        структур.
    - statement: Слово "що" можна вільно використовувати для всіх типів непрямих питань
        в українській мові.
      correct: false
      explanation: Слово "що" використовується виключно для фактів (стверджень), а
        не для питань.
    - statement: Після підрядного сполучника "щоб" завжди використовується дієслово
        у формі минулого часу.
      correct: true
      explanation: Це базове граматичне правило української мови для передачі спонукання
        чи прохання.
    - statement: Речення "Він запитав мене допомогти йому" є абсолютно правильним
        для щоденного використання.
      correct: false
      explanation: В українській мові ми використовуємо дієслово "попросити" для запиту
        на дію, а не "запитати".
    - statement: Знак питання завжди зберігається в кінці речення з непрямим питанням.
      correct: false
      explanation: Непряме питання є звичайним розповідним реченням, тому знак питання
        наприкінці зникає.
    - statement: Спеціальні відкриті питання (хто, де, коли) не потребують додавання
        "чи" або "що".
      correct: true
      explanation: У спеціальних питаннях саме питальне слово виконує повноцінну роль
        підрядного сполучника.
    - statement: Дієслово "наказати" є найкращим і найм'якшим вибором для спілкування
        з близькими друзями.
      correct: false
      explanation: Дієслово "наказати" є дуже суворим та авторитарним. З друзями набагато
        краще використовувати "попросити".
    - statement: При передачі прямих слів "Я дуже втомився" ми логічно змінюємо займенник
        "я" на "він" або "вона".
      correct: true
      explanation: Займенники в непрямій мові завжди змінюються відповідно до логіки
        розповіді оповідача.
    - statement: Непряме питання під час звичайної розмови вимовляється зі спокійною,
        рівною та спадною інтонацією.
      correct: true
      explanation: Так, оскільки це лише констатація факту розмови, а не справжнє
        питання до співрозмовника.
    - statement: Дієслово "вимагати" завжди звучить більш ввічливо, ніж просте дієслово
        "попросити".
      correct: false
      explanation: Навпаки, "вимагати" — це дуже сильне, категоричне дієслово, яке
        іноді межує з конфліктом.
    - statement: Речення "Оксана запитала, де знаходиться автобусна зупинка" побудовано
        граматично бездоганно.
      correct: true
      explanation: Питальне слово "де" ідеально поєднує головну і підрядну частини
        цього речення.
    - statement: В українській мові існує дуже суворе правило "узгодження часів",
        таке саме, як і в англійській граматиці.
      correct: false
      explanation: В українській мові немає жорсткого правила обов'язкового узгодження
        часів; ми зберігаємо теперішній час, якщо факт досі актуальний.
- type: translate
  title: Переклад англійських конструкцій
  instruction: Оберіть найбільш точний та правильний український переклад для кожного
    англійського речення.
  items:
    - source: He asked me if I wanted coffee.
      options:
        - text: Він запитав мене, чи я хочу кави.
          correct: true
        - text: Він запитав мене, що я хочу кави.
          correct: false
        - text: Він попросив мене, чи я хочу кави.
          correct: false
        - text: Він поцікавився, щоб я пив каву.
          correct: false
      explanation: Використовуємо "чи" для "if" та "запитати" для "asked".
    - source: The boss asked us to finish the report.
      options:
        - text: Шеф попросив, щоб ми закінчили звіт.
          correct: true
        - text: Шеф запитав нас закінчити звіт.
          correct: false
        - text: Шеф поцікавився, щоб ми закінчуємо звіт.
          correct: false
        - text: Шеф сказав, чи ми закінчимо звіт.
          correct: false
      explanation: Використовуємо дієслово "попросив", оскільки це прохання про дію,
        і обов'язково "щоб" + минулий час.
    - source: I wondered where she lived.
      options:
        - text: Я поцікавився, де вона живе.
          correct: true
        - text: Я поцікавився, чи де вона живе.
          correct: false
        - text: Я попросив, де вона живе.
          correct: false
        - text: Я запитав, щоб де вона жила.
          correct: false
      explanation: Дієслово "wondered" гарно перекладається як "поцікавився", а слово
        "where" (де) є сполучником.
    - source: They demanded that he return the money.
      options:
        - text: Вони вимагали, щоб він повернув гроші.
          correct: true
        - text: Вони вимагали, чи він повернув гроші.
          correct: false
        - text: Вони запитали, щоб він повертав гроші.
          correct: false
        - text: Вони умовляли, що він повернув гроші.
          correct: false
      explanation: Дієслово "demanded" перекладається як "вимагали", і вимагає структури
        "щоб" + минулий час ("повернув").
    - source: She asked him not to be late.
      options:
        - text: Вона попросила, щоб він не запізнювався.
          correct: true
        - text: Вона запитала його не запізнюватися.
          correct: false
        - text: Вона сказала, що він не запізнювався.
          correct: false
        - text: Вона попросила, щоб він не запізнюється.
          correct: false
      explanation: Негативне прохання потребує дієслова "попросити" та структури "щоб
        він не" з дієсловом минулого часу.
    - source: My friend asked me what I was doing.
      options:
        - text: Мій друг запитав мене, що я роблю.
          correct: true
        - text: Мій друг запитав мене, чи що я роблю.
          correct: false
        - text: Мій друг попросив мене, що я роблю.
          correct: false
        - text: Мій друг поцікавився, щоб я робив.
          correct: false
      explanation: Спеціальне питання зі словом "what" перекладається з використанням
        питального слова "що" без додаткових сполучників.
