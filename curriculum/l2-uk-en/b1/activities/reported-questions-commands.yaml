- type: fill-in
  title: Трансформація загальних питань та наказів
  instruction: Доповніть речення правильним сполучником або дієсловом, щоб перетворити
    пряму мову на непряму.
  items:
    - sentence: 'Вона сказала: "Допоможи мені". -> Вона попросила, ___ я допоміг їй.'
      answer: щоб
      options:
        - щоб
        - що
        - чи
        - як
    - sentence: 'Він запитав: "Ти прийдеш?" -> Він запитав, ___ я прийду.'
      answer: чи
      options:
        - чи
        - що
        - щоб
        - коли
    - sentence: 'Шеф сказав: "Зробіть звіт". -> Шеф вимагав, щоб ми ___ звіт.'
      answer: зробили
      options:
        - зробили
        - зробимо
        - зробіть
        - робимо
    - sentence: 'Мама сказала: "Не запізнюйся". -> Мама попросила, щоб я не ___.'
      answer: запізнювався
      options:
        - запізнювався
        - запізнююсь
        - запізнюватися
        - запізнюйся
    - sentence: 'Він запитав: "Де мій телефон?" -> Він запитав, ___ його телефон.'
      answer: де
      options:
        - де
        - чи де
        - що де
        - куди
    - sentence: 'Друг запитав: "Ти знаєш?" -> Друг поцікавився, ___ я знаю.'
      answer: чи
      options:
        - чи
        - що
        - щоб
        - як
    - sentence: 'Вона благала: "Купи це". -> Вона умовляла, щоб я ___ це.'
      answer: купив
      options:
        - купив
        - куплю
        - купую
        - купувати
    - sentence: 'Лікар сказав: "Пийте воду". -> Лікар порадив, щоб я ___ воду.'
      answer: пив
      options:
        - пив
        - п'ю
        - пити
        - пийте
    - sentence: 'Вчитель сказав: "Читайте текст". -> Вчитель попросив, щоб ми ___
        текст.'
      answer: читали
      options:
        - читали
        - читаємо
        - читати
        - читайте
    - sentence: 'Він запитав: "Коли зустріч?" -> Він запитав, ___ буде зустріч.'
      answer: коли
      options:
        - коли
        - що коли
        - чи коли
        - щоб коли
    - sentence: 'Колега сказав: "Надішліть файл". -> Колега попросив, щоб я ___ файл.'
      answer: надіслав
      options:
        - надіслав
        - надішлю
        - надсилаю
        - надіслати
    - sentence: 'Охоронець сказав: "Покажіть документи". -> Охоронець наказав, щоб
        ми ___ документи.'
      answer: показали
      options:
        - показали
        - покажемо
        - показуємо
        - показувати
- type: error-correction
  title: Виправте типові помилки
  instruction: Знайдіть та виправте граматичну помилку в кожному реченні з непрямою
    мовою.
  items:
    - sentence: Він запитав мене, що я хочу пити каву.
      error: що
      answer: чи
      error_type: word
      options:
        - чи
        - щоб
        - як
        - де
      explanation: Для загальних закритих питань (так/ні) завжди використовується
        сполучник "чи".
    - sentence: Директор наказав, щоб ми робимо звіт зараз.
      error: робимо
      answer: робили
      error_type: word
      options:
        - робили
        - робити
        - зробимо
        - робите
      explanation: Після сполучника "щоб" використовується дієслово в формі минулого
        часу.
    - sentence: Вона запитала мене допомогти їй з проєктом.
      error: запитала
      answer: попросила
      error_type: word
      options:
        - попросила
        - поцікавилася
        - сказала
        - дізналася
      explanation: Для запиту на дію (прохання) використовується дієслово "попросити".
    - sentence: Він поцікавився, чи де знаходиться найближча аптека.
      error: чи де
      answer: де
      error_type: phrase
      options:
        - де
        - що де
        - щоб де
        - куди
      explanation: У спеціальних питаннях додатковий сполучник "чи" не потрібен.
    - sentence: Мама сказала, щоб я прибираю в кімнаті.
      error: прибираю
      answer: прибирав
      error_type: word
      options:
        - прибирав
        - прибирати
        - приберу
        - прибирай
      explanation: Конструкція "щоб" завжди вимагає після себе минулого часу.
    - sentence: Клієнт вимагав, щоб менеджер повертає всі гроші.
      error: повертає
      answer: повернув
      error_type: word
      options:
        - повернув
        - повертати
        - поверне
        - повертай
      explanation: Непрямий наказ вимагає використання минулого часу після "щоб".
    - sentence: Брат запитав, що я бачив його ключі.
      error: що
      answer: чи
      error_type: word
      options:
        - чи
        - щоб
        - де
        - як
      explanation: Для загальних питань (чи бачив ти?) використовуємо "чи".
    - sentence: Вона запитала принести їй склянку свіжої води.
      error: запитала
      answer: попросила
      error_type: word
      options:
        - попросила
        - поцікавилася
        - наказала
        - вимагала
      explanation: Для прохання принести воду потрібне дієслово "попросити".
    - sentence: Лікар сказав, щоб пацієнт п'є більше води.
      error: п'є
      answer: пив
      error_type: word
      options:
        - пив
        - пити
        - вип'є
        - пий
      explanation: Після "щоб" потрібно вжити форму минулого часу.
    - sentence: Вчитель запитав студентів закрити двері в аудиторію.
      error: запитав
      answer: попросив
      error_type: word
      options:
        - попросив
        - поцікавився
        - наказав
        - вимагав
      explanation: Звернення про виконання дії потребує дієслова "попросити".
    - sentence: Друг спитав, що чи ми підемо в кіно.
      error: що чи
      answer: чи
      error_type: phrase
      options:
        - чи
        - що
        - щоб
        - як
      explanation: Сполучник "що" ніколи не ставиться перед сполучником "чи".
    - sentence: Керівник запитав, що я встигну зробити це до вечора.
      error: що
      answer: чи
      error_type: word
      options:
        - чи
        - щоб
        - коли
        - як
      explanation: Оскільки це загальне питання, правильний сполучник — "чи".
