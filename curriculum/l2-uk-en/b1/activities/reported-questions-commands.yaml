- type: quiz
  title: Теорія непрямої мови
  instruction: Дайте відповідь на запитання щодо правил перетворення прямої мови на
    непряму.
  items:
    - question: У якому випадку ми обов'язково використовуємо сполучник "чи"?
      options:
        - text: Для передачі закритих загальних питань.
          correct: true
        - text: Для передачі наказів та прохань.
          correct: false
        - text: Для констатації доконаних фактів.
          correct: false
        - text: Для передачі спеціальних питань з питальними словами.
          correct: false
      explanation: Сполучник "чи" використовується тільки для закритих питань, на
        які відповідають "так" або "ні".
    - question: Яке дієслово слід обрати, якщо ви хочете, щоб людина виконала якусь
        дію?
      options:
        - text: Попросити
          correct: true
        - text: Запитати
          correct: false
        - text: Поцікавитися
          correct: false
        - text: Дізнатися
          correct: false
      explanation: Дієслова "запитати" та "поцікавитися" використовуються для пошуку
        інформації, а не для спонукання до дії.
    - question: Яка форма дієслова завжди використовується після сполучника "щоб"
        у непрямих проханнях?
      options:
        - text: Форма минулого часу
          correct: true
        - text: Форма теперішнього часу
          correct: false
        - text: Інфінітив (початкова форма)
          correct: false
        - text: Форма майбутнього часу
          correct: false
      explanation: Українська граматика вимагає використання дієслова у формі минулого
        часу після підрядного сполучника "щоб".
    - question: Як правильно перетворити пряме питання "Ти будеш каву?" у непряме?
      options:
        - text: Він запитав мене, чи я буду каву.
          correct: true
        - text: Він запитав мене, що я буду каву.
          correct: false
        - text: Він запитав мене, щоб я пив каву.
          correct: false
        - text: Він попросив мене, чи я буду каву.
          correct: false
      explanation: Для закритого питання потрібен сполучник "чи", а головне дієслово
        має позначати питання (запитати).
    - question: Яке з цих слів виражає найбільш категоричну вимогу чи суворий наказ?
      options:
        - text: Вимагати
          correct: true
        - text: Просити
          correct: false
        - text: Умовляти
          correct: false
        - text: Поцікавитися
          correct: false
      explanation: Дієслово "вимагати" є дуже сильним і застосовується в категоричних
        або конфліктних ситуаціях.
    - question: Що обов'язково відбувається зі знаком питання при перетворенні прямої
        мови на непряму?
      options:
        - text: Він завжди зникає, бо речення стає розповідним.
          correct: true
        - text: Він залишається в самому кінці речення.
          correct: false
        - text: Він ставиться перед підрядним сполучником "чи".
          correct: false
        - text: Він замінюється на великий знак оклику.
          correct: false
      explanation: Складнопідрядне речення з непрямим питанням є лише констатацією
        факту питання, тому знак питання зникає.
    - question: Як правильно та ввічливо перекласти українською "He asked me to help
        him"?
      options:
        - text: Він попросив мене допомогти йому.
          correct: true
        - text: Він запитав мене допомогти йому.
          correct: false
        - text: Він поцікавився допомогти йому.
          correct: false
        - text: Він сказав мене допомогти йому.
          correct: false
      explanation: Для запиту на дію (допомогти) ми використовуємо виключно дієслово
        "попросити", а не "запитати".
    - question: Яке речення із наведених нижче є граматично абсолютно правильним?
      options:
        - text: Мама попросила, щоб я купив молоко.
          correct: true
        - text: Мама попросила, щоб я купую молоко.
          correct: false
        - text: Мама запитала, щоб я купив молоко.
          correct: false
        - text: Мама вимагала, що я купив молоко.
          correct: false
      explanation: Дієслово після "щоб" має обов'язково стояти в формі минулого часу.
    - question: Яке з цих дієслів найкраще підходить для ввічливого щоденного корпоративного
        спілкування?
      options:
        - text: Попросити
          correct: true
        - text: Наказати
          correct: false
        - text: Вимагати
          correct: false
        - text: Заборонити
          correct: false
      explanation: Дієслово "попросити" є справжнім золотим стандартом ввічливості
        в українському діловому етикеті.
    - question: Як правильно трансформувати фразу "Де знаходиться метро?" у формат
        непрямої мови?
      options:
        - text: Турист запитав, де знаходиться метро.
          correct: true
        - text: Турист запитав, чи де знаходиться метро.
          correct: false
        - text: Турист запитав, що де знаходиться метро.
          correct: false
        - text: Турист запитав, щоб де знаходиться метро.
          correct: false
      explanation: У спеціальних відкритих питаннях самостійне питальне слово (де,
        коли) вже слугує повноцінним сполучником.
    - question: Яка фонетична інтонація найбільш характерна для речень із непрямим
        питанням під час розмови?
      options:
        - text: Спокійна і плавно спадна в кінці речення.
          correct: true
        - text: Висхідна, з різким підвищенням голосу в кінці.
          correct: false
        - text: Дуже емоційна, гучна і нестабільна.
          correct: false
        - text: Запитальна інтонація виключно на останньому слові.
          correct: false
      explanation: Оскільки непряме питання є звичайним розповідним реченням, воно
        має повністю спокійну спадну інтонацію.
    - question: 'Як правильно змінюється особовий займенник в реченні: Олена сказала:
        "Я дуже хочу спати"?'
      options:
        - text: Олена сказала, що вона дуже хоче спати.
          correct: true
        - text: Олена сказала, що я дуже хочу спати.
          correct: false
        - text: Олена сказала, що ми дуже хочемо спати.
          correct: false
        - text: Олена сказала, чи вона хоче спати.
          correct: false
      explanation: При об'єктивній передачі чужих слів займенник першої особи "я"
        завжди логічно перетворюється на "він" або "вона".
- type: match-up
  title: Від прямої мови до непрямої
  instruction: 'Знайдіть пару: об''єднайте пряму мову з правильним варіантом непрямої
    мови.'
  pairs:
    - left: '"Ти хочеш кави?"'
      right: Він запитав, чи я хочу кави.
    - left: '"Зроби мені каву!"'
      right: Він наказав, щоб я зробив йому каву.
    - left: '"Будь ласка, зроби каву."'
      right: Він попросив, щоб я зробив каву.
    - left: '"Де моя кава?"'
      right: Він поцікавився, де його кава.
    - left: '"Чому ти не п''єш каву?"'
      right: Він запитав, чому я не п'ю каву.
    - left: '"Ти пив сьогодні каву?"'
      right: Він запитав, чи я пив сьогодні каву.
    - left: '"Кава дуже смачна."'
      right: Він сказав, що кава дуже смачна.
    - left: '"Хто купив цю каву?"'
      right: Він запитав, хто купив цю каву.
    - left: '"Не пий так багато кави!"'
      right: Він заборонив, щоб я пив так багато кави.
    - left: '"Ви можете принести каву?"'
