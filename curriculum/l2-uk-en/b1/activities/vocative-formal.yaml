      correct: true
    - text: Колего Шевченку,
      correct: false
    - text: Колега Шевченко,
      correct: false
  - source: Dear friends!
    options:
    - text: Дорогі друзі!
      correct: true
    - text: Дорогі другове!
      correct: false
    - text: Дорогі другам!
      correct: false
  - source: Mr. President!
    options:
    - text: Пане Президенте!
      correct: true
    - text: Пан Президент!
      correct: false
    - text: Пане Президент!
      correct: false
  title: Оберіть правильний переклад для ділових звертань.
- type: group-sort
  instruction: Розподіліть слова за їхнім правильним закінченням у кличному відмінку
    однини.
  groups:
  - label: Закінчення -о
    items:
    - Микола
    - Оксана
    - мама
    - колега
  - label: Закінчення -е або -є
    items:
    - Іван
    - Надія
    - Петро
    - радість
  - label: Закінчення -у або -ю
    items:
    - Сергій
    - Ігор
    - Тарасик
    - братик
  title: Розподіліть слова за їхнім правильним закінченням у кличному відмінку однини.
