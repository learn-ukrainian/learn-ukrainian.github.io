version: '1.0'
module: vocative-formal
level: b1
inline:
- id: reading-vocative-review
  type: reading
  instruction: 'Прочитайте текст про повторення: кличний відмінок і дайте відповіді
    на запитання.'
  passage: В українській мові кличний відмінок — це важливий інструмент. У першій
    відміні тверда основа отримує закінчення -о (Миколо), а м'яка та шипляча — -е
    або -є (Надіє, душе). У другій відміні тверда основа має -е (Іване), м'яка — -ю
    (Андрію). Гіпокористики на -ко чи -ик мають закінчення -у (Тарасику). Іменники
    жіночого роду третьої відміни отримують -е (радосте). У множині кличний відмінок
    здебільшого збігається з називним (колеги), за винятком слова «пан», яке має спеціальну
    форму «панове».
  questions:
  - Яке закінчення мають імена типу «Микола» або «Саша» у кличному відмінку?
  - Як правильно звернутися до чоловіка на ім'я Андрій?
  - Яке закінчення отримують пестливі слова на -ко або -ик (наприклад, Тарасик)?
  - Як звучить форма кличного відмінка слова «пан» у множині?
  - Як змінюється форма слова «колега» у кличному відмінку множини?
  - Яке закінчення має слово «радість» у кличному відмінку?
  title: 'Прочитайте текст про повторення: кличний відмінок і дайте відповіді на запитання'
- id: fill-in-vocative-review
  type: fill-in
  instruction: 'Вставте правильну граматичну форму у реченнях на тему повторення:
    кличний відмінок.'
  items:
  - sentence: Привіт, ____! Як твої справи?
    answer: Сергію
    options:
    - Сергіє
    - Сергію
    - Сергій
  - sentence: ____, ти вже зробила це завдання?
    answer: Надіє
    options:
    - Надіє
    - Надію
    - Надія
  - sentence: Дорогі ____! Запрошую вас на свято.
    answer: друзі
    options:
    - други
    - друзі
    - друже
  - sentence: Слухай, ____, принеси мені воду.
    answer: братику
    options:
    - братику
    - братико
    - братике
  - sentence: Шановний ____ директоре, добрий день!
    answer: пане
    options:
    - пан
    - пане
    - пану
  - sentence: ____, ми чекаємо тільки на тебе!
    answer: Оксано
    options:
    - Оксано
    - Оксане
    - Оксана
  title: 'Вставте правильну граматичну форму у реченнях на тему повторення: кличний
    відмін'
- id: quiz-vocative-review
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Повторення:
    кличний відмінок».'
  items:
  - question: Яку форму має слово «пан» у кличному відмінку множини?
    options:
    - панове
    - пани
    - панам
    - панами
    correct: 0
  - question: Як правильно звернутися до хлопця на ім'я Олександр?
    options:
    - Олександре
    - Олександру
    - Олександр
    - Олександро
    correct: 0
  - question: Яке закінчення у кличному відмінку отримує ім'я Ігор?
    options:
    - Ігорю
    - Ігоре
    - Ігоро
    - Ігор
    correct: 0
  - question: Яке закінчення отримують пестливі слова типу «братик» або «Тарасик»
      у кличному відмінку?
    options:
    - закінчення -у
    - закінчення -о
    - закінчення -е
    - закінчення -ю
    correct: 0
  - question: Яке закінчення мають іменники жіночого роду третьої відміни (наприклад,
      радість) у кличному відмінку?
    options:
    - закінчення -е
    - закінчення -о
    - закінчення -ю
    - закінчення -а
    correct: 0
  - question: Як правильно звернутися до групи студентів?
    options:
    - Студенти!
    - Студентове!
    - Студентам!
    - Студентами!
    correct: 0
  title: 'Оберіть правильний варіант: лексика та граматика з розділу «Повторення:
    кличний '
- id: match-up-formal-address
  type: match-up
  instruction: З'єднайте терміни з розділу «Офіційні звертання» з їхніми визначеннями.
  pairs:
  - left: офіційний
    right: формальний, пов'язаний з державною або діловою сферою
  - left: звертання
    right: слово або словосполучення, яким називають того, до кого говорять
  - left: по батькові
    right: частина повного імені, утворена від імені батька
  - left: прізвище
    right: родинне найменування, яке передається з покоління в покоління
  - left: посада
    right: службове становище, пов'язане з виконанням певних обов'язків
  - left: листування
    right: обмін письмовими повідомленнями, електронними або паперовими листами
  - left: панове
    right: універсальне, поважне колективне звертання до групи людей
  title: З'єднайте терміни з розділу «Офіційні звертання» з їхніми визначеннями.
- id: essay-formal-sentences
  type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Офіційні
    звертання».
  prompt: 'Складіть п''ять речень із такими словами: офіційний, по батькові, шановний,
    колега, добродій. Обов''язково використовуйте кличний відмінок.'
  min_words: 50
  model_answer: '1. Шановний Іване Петровичу, надсилаю вам офіційний лист.

    2. Добродію Сергію, дуже радий вас бачити.

    3. Моя колега не використовує по батькові у щоденному спілкуванні.

    4. Вельмишановна пані Олено, дякую за допомогу.

    5. Це дуже важливий офіційний документ.

    '
  title: Напишіть 5 речень, використовуючи нову лексику з розділу «Офіційні звертання».
- id: error-correction-formal
  type: error-correction
  instruction: Знайдіть і виправте помилки у реченнях на тему офіційні звертання.
  items:
  - sentence: Шановний Іван Петрович, добрий день!
    error: Іван Петрович
    correction: Іване Петровичу
    error_type: phrase
    options:
    - Іване Петровичу
    - Іван Петровичу
    - Іване Петрович
    explanation: Обидва слова (ім'я та по батькові) обов'язково стоять у кличному
      відмінку.
  - sentence: Шановному директору, звертаюся до вас із проханням.
    error: Шановному директору
    correction: Шановний директоре
    error_type: phrase
    options:
    - Шановний директоре
    - Шановному директоре
    - Шановний директору
    explanation: Прикметник (шановний) залишається у називному відмінку, а посада
      ставиться у кличний.
  - sentence: Пані Оксано Петрівна, коли буде готовий звіт?
    error: Петрівна
    correction: Петрівно
    error_type: word
    options:
    - Петрівно
    - Петрівну
    - Петрівні
    explanation: Жіночі імена по батькові у кличному відмінку завжди закінчуються
      на -о.
  - sentence: Пане Петренку, підпишіть цей документ.
    error: Петренку
    correction: Петренко
    error_type: word
    options:
    - Петренко
    - Петренка
    - Петренком
    explanation: Якщо звертання складається з титулу або слова «пан» і прізвища, прізвище
      залишається в називному відмінку.
  - sentence: Шановні пани, розпочинаємо нашу зустріч.
    error: пани
    correction: панове
    error_type: word
    options:
    - панове
    - панам
    - панами
    explanation: У множині слово «пан» має спеціальну форму кличного відмінка — «панове».
  - sentence: Лікарю Іван, потрібна ваша допомога.
    error: Іван
    correction: Іване
    error_type: word
    options:
    - Іване
    - Івану
    - Іванові
    explanation: При поєднанні професії та власного імені обидва слова ставляться
      у кличний відмінок.
  title: Знайдіть і виправте помилки у реченнях на тему офіційні звертання.
workbook:
- type: true-false
  instruction: Визначте, чи є твердження правдивим.
  items:
  - statement: 'У діловому листуванні прикметник «шановний» завжди стоїть у кличному
      відмінку (наприклад: шановному).'
    correct: false
    explanation: Прикметник завжди залишається у називному відмінку, змінюється лише
      іменник (Шановний пане!).
  - statement: 'Форма кличного відмінка жіночих імен по батькові завжди закінчується
      на -о (наприклад: Петрівно).'
    correct: true
    explanation: Так, жіночі імена по батькові у кличному відмінку мають закінчення
      -о.
  - statement: Якщо ви звертаєтеся до людини за посадою та називаєте її прізвище,
      ви повинні змінити обидва слова (Директоре Петренку).
    correct: false
    explanation: Тільки посада ставиться у кличний відмінок. Прізвище завжди залишається
      у називному (Директоре Петренко).
  - statement: Слово «пан» у множині має спеціальну форму кличного відмінка «панове».
    correct: true
    explanation: Це традиційне колективне звертання до аудиторії або групи людей.
  - statement: Гіпокористики (пестливі слова на -ко, -ик) завжди отримують закінчення
      -у в кличному відмінку.
    correct: true
    explanation: 'Наприклад: братику, Тарасику, Ільку.'
  - statement: 'Коли ви поєднуєте професію та власне ім''я (наприклад: лікар Петро),
      у кличний відмінок ставиться лише професія.'
    correct: false
    explanation: 'Обидва слова обов''язково ставляться у кличний відмінок: Лікарю
      Петре!'
  title: Визначте, чи є твердження правдивим.
- type: translate
  instruction: Оберіть правильний переклад для ділових звертань.
  items:
  - source: Dear Mr. Director!
