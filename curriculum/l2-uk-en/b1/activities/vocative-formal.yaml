      correct: true
    - text: Пані та пани!
      correct: false
    - text: Жінки та мужчини!
      correct: false
  - source: Respected Maria Stepanivna,
    options:
    - text: Шановна Маріє Степанівно,
      correct: true
    - text: Шановна Марія Степанівна,
      correct: false
    - text: Шановній Марії Степанівні,
      correct: false
  - source: Colleague Shevchenko,
    options:
