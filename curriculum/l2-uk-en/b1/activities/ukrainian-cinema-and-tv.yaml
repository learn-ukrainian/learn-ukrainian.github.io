- type: error-correction
  title: "Виправте граматичні та лексичні помилки"
  instruction: "Знайдіть помилку в реченні та оберіть правильний варіант."
  items:
    - sentence: "Я подобаю цю нову історичну драму."
      error: "подобаю"
