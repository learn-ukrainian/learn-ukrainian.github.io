      error: "На фільмі"
      answer: "У фільмі"
      options:
        - "У фільмі"
        - "В кіно"
        - "По фільму"
        - "За фільмом"
      explanation: "Українська мова використовує прийменник У або В з місцевим відмінком для подій на екрані."
    - sentence: "Мій улюблений актор зараз знімає у новому детективі."
      error: "знімає"
