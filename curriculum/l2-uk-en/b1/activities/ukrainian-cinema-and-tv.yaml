  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке слово використовують у журналістиці як синонім до слова фільм?"
      explanation: "Слово стрічка часто використовується в новинах та статтях."
      options:
        - text: "стрічка"
          correct: true
        - text: "серіал"
          correct: false
        - text: "кіно"
          correct: false
        - text: "екран"
          correct: false
    - question: "Який жанр базується виключно на реальних фактах та архівних матеріалах?"
      explanation: "Документальне кіно фіксує історичну правду та реальні події."
      options:
        - text: "документальний"
          correct: true
        - text: "бойовик"
          correct: false
        - text: "комедія"
          correct: false
        - text: "трилер"
          correct: false
    - question: "Що означає слово серія в контексті телевізійних проектів?"
      explanation: "Серія — це один конкретний епізод великого шоу."
      options:
        - text: "один епізод шоу"
          correct: true
        - text: "весь телевізійний проект"
          correct: false
        - text: "короткий художній фільм"
          correct: false
        - text: "перший показ фільму"
          correct: false
    - question: "Як правильно висловити свої вподобання українською мовою?"
      explanation: "Дієслово подобатися вимагає використання давального відмінка."
      options:
        - text: "мені подобається"
          correct: true
        - text: "я подобаю"
          correct: false
        - text: "я подобаюся"
          correct: false
        - text: "мене подобає"
          correct: false
    - question: "Який прийменник потрібно використовувати з місцевим відмінком для екранних подій?"
      explanation: "В українській мові події відбуваються у фільмі або в серіалі."
      options:
        - text: "у фільмі"
          correct: true
        - text: "на фільмі"
          correct: false
        - text: "по фільму"
          correct: false
        - text: "до фільму"
          correct: false
    - question: "Що робить актор на знімальному майданчику під час створення кіно?"
      explanation: "Актори знімаються в кіно, тоді як режисери знімають кіно."
      options:
        - text: "знімається в кіно"
          correct: true
        - text: "знімає кіно"
          correct: false
        - text: "робить дубляж"
          correct: false
        - text: "пише сюжет"
          correct: false
    - question: "Який американський серіал дав потужний старт українському дубляжу?"
      explanation: "Ситком Альф став класикою українського телевізійного перекладу."
      options:
        - text: "Альф"
          correct: true
        - text: "Слуга народу"
          correct: false
        - text: "Гра престолів"
          correct: false
        - text: "Друзі"
          correct: false
    - question: "Яка стрічка здобула першу премію Оскар в історії України?"
      explanation: "Документальна робота Мстислава Чернова 20 днів у Маріуполі здобула цю нагороду."
      options:
