        - "частину"
        - "стрічку"
      explanation: "Серіал — це весь проект, а серія — це лише один епізод шоу."
    - sentence: "Ця картина була знята молодим українським режисером."
      error: "була знята"
      answer: "зняв"
      options:
        - "зняв"
        - "робив"
        - "знімав"
        - "знялася"
      explanation: "В українській мові краще уникати пасивного стану. Використовуйте активний: режисер зняв."
    - sentence: "Він приймає участь у зйомках нового проекту."
      error: "приймає участь"
