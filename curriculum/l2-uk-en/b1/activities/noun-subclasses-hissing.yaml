- type: fill-in
  instruction: Вставте правильне закінчення в орудному або кличному відмінку однини.
  items:
  - sentence: Я щиро пишаюся своїм _____ (товариш).
    answer: товаришем
    options:
    - товаришем
    - товаришом
    - товаришу
  - sentence: Він обережно ріже хліб гострим _____ (ніж).
    answer: ножем
    options:
    - ножем
    - ножом
    - ножу
  - sentence: Шановний _____ (слухач), вітаємо вас у студії!
    answer: слухачу
    options:
    - слухачу
    - слухаче
    - слухачем
  - sentence: Пане _____ (сторож), відчиніть двері!
    answer: стороже
    options:
    - стороже
    - сторожу
    - сторожем
  - sentence: Вона сховалася від дощу під новим _____ (плащ).
    answer: плащем
    options:
    - плащем
    - плащом
    - плащу
  - sentence: Мій вірний _____ (читач), ця історія для тебе.
    answer: читачу
    options:
    - читачу
    - читаче
    - читачем
  - sentence: Хлопець насолоджується гарячим _____ (борщ).
    answer: борщем
    options:
    - борщем
    - борщом
    - борщу
  - sentence: Ти можеш пишатися своїм давнім _____ (прізвище).
    answer: прізвищем
    options:
    - прізвищем
    - прізвищом
    - прізвищу
- type: match-up
  instruction: З'єднайте називний відмінок із правильною формою орудного або кличного
    відмінка.
  pairs:
  - left: товариш
    right: товаришу (кличний)
  - left: слухач
    right: слухачу (кличний)
  - left: сторож
    right: стороже (кличний)
  - left: читач
    right: читачу (кличний)
  - left: ніж
    right: ножем (орудний)
  - left: плащ
    right: плащем (орудний)
  - left: борщ
    right: борщем (орудний)
  - left: пейзаж
    right: пейзажем (орудний)
- type: quiz
  instruction: Оберіть правильну форму орудного відмінка для іменників середнього
    роду.
  items:
  - question: озеро
    options:
    - озером (тверда група)
    - озерем (мішана група)
    - озером (мішана група)
    - озерам (тверда група)
    correct: 0
  - question: плече
    options:
    - плечем (мішана група)
    - плечом (мішана група)
    - плечем (м'яка група)
    - плечом (тверда група)
    correct: 0
  - question: поле
    options:
    - полем (м'яка група)
    - полом (тверда група)
    - полем (мішана група)
    - полям (м'яка група)
    correct: 0
  - question: прізвище
    options:
    - прізвищем (мішана група)
    - прізвищом (мішана група)
    - прізвищем (м'яка група)
    - прізвищом (тверда група)
    correct: 0
  - question: видовище
    options:
    - видовищем (мішана група)
    - видовищом (мішана група)
    - видовищами (мішана група)
    - видовищем (м'яка група)
    correct: 0
  - question: серце
    options:
    - серцем (м'яка група)
    - серцом (тверда група)
    - серцем (мішана група)
    - серцам (тверда група)
    correct: 0
- type: quiz
  instruction: Оберіть правильну форму іменника (зверніть увагу на чергування голосних).
  items:
  - question: У мене зараз немає гострого _____ (ніж).
    options:
    - ножа
    - ніжа
    - ножу
    - ніжу
    correct: 0
  - question: Він працює біля великого екскаваторного _____ (ківш).
    options:
    - ковша
    - ківша
    - ковшу
    - ківшу
    correct: 0
  - question: Я бачу пляму на цьому гострому _____ (ніж).
    options:
    - ножі
    - ніжі
    - ножу
    - ніжу
    correct: 0
  - question: Дайте мені, будь ласка, тарілку гарячого _____ (борщ).
    options:
    - борщу
    - бірщу
    - борща
    - бірща
    correct: 0
  - question: Я давно не бачив свого давнього _____ (товариш).
    options:
    - товариша
    - товориша
    - товаришу
    - твариша
    correct: 0
  - question: На цьому старому _____ (меч) є історичні написи.
    options:
    - мечі
    - мічі
    - мечу
    - мічу
    correct: 0
- type: error-correction
  instruction: Знайдіть і виправте помилку (русизм або неправильне закінчення).
  items:
  - sentence: Він постійно ріже хліб цим старим ножом.
    error: ножом
    correction: ножем
    error_type: word
    options:
    - ножем
    - ножами
    - ножі
    explanation: В орудному відмінку іменники мішаної групи завжди мають закінчення
      -ем.
  - sentence: Ми насолоджуємося смачним українським борщом.
    error: борщом
    correction: борщем
    error_type: word
    options:
    - борщем
    - борщі
    - борщами
    explanation: В орудному відмінку після шиплячих завжди пишемо -ем.
  - sentence: Вона накрила плечі своїм новим плащом.
    error: плащом
    correction: плащем
    error_type: word
    options:
    - плащем
    - плащі
    - плащами
    explanation: Іменники на шиплячий звук мають закінчення -ем в орудному відмінку
      однини.
  - sentence: Мій товарише, як твої справи?
    error: товарише
    correction: товаришу
    error_type: word
    options:
    - товаришу
    - товариші
    - товаришем
    explanation: Іменники із суфіксами та слово «товариш» у кличному відмінку мають
      закінчення -у.
  - sentence: Пане сторожу, відчиніть ворота!
    error: сторожу
    correction: стороже
    error_type: word
    options:
    - стороже
    - сторожі
    - сторожем
    explanation: Безсуфіксні іменники мішаної групи у кличному відмінку мають закінчення
      -е.
  - sentence: Я пишаюся своїм українським прізвищом.
    error: прізвищом
    correction: прізвищем
    error_type: word
    options:
    - прізвищем
    - прізвища
    - прізвищами
    explanation: Іменники середнього роду мішаної групи в орудному відмінку мають
      закінчення -ем.
- type: group-sort
  instruction: Розподіліть слова за граматичними групами другої відміни.
  groups:
  - label: Тверда група
    items:
    - завод
    - озеро
    - телефон
  - label: М'яка група
    items:
    - вчитель
    - серце
    - поле
  - label: Мішана група
    items:
    - товариш
    - борщ
    - слухач
    - плече
