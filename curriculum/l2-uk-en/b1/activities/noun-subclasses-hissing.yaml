version: '1.0'
module: noun-subclasses-hissing
level: b1
inline:
- id: quiz-identify-group
  type: quiz
  instruction: Визначте групу іменника
  items:
  - question: До якої групи належить іменник **завод**?
    options:
    - Тверда група
    - М'яка група
    - Мішана група
    - Особлива група
    correct: 0
  - question: До якої групи належить іменник **сторож**?
    options:
    - Тверда група
    - М'яка група
    - Мішана група
    - Особлива група
    correct: 2
  - question: До якої групи належить іменник **вчитель**?
    options:
    - Тверда група
    - М'яка група
    - Мішана група
    - Особлива група
    correct: 1
  - question: До якої групи належить іменник **ніж**?
    options:
    - Тверда група
    - М'яка група
    - Мішана група
    - Особлива група
    correct: 2
  - question: До якої групи належить іменник **батько**?
    options:
    - Тверда група
    - М'яка група
    - Мішана група
    - Особлива група
    correct: 0
  - question: До якої групи належить іменник **плащ**?
    options:
    - Тверда група
    - М'яка група
    - Мішана група
    - Особлива група
    correct: 2
  - question: До якої групи належить іменник **край**?
    options:
    - Тверда група
    - М'яка група
    - Мішана група
    - Особлива група
    correct: 1
  - question: До якої групи належить іменник **борщ**?
    options:
    - Тверда група
    - М'яка група
    - Мішана група
    - Особлива група
    correct: 2
- id: group-sort-nouns
  type: group-sort
  instruction: Розподіліть іменники за їхньою групою (тверда, м'яка, мішана)
  groups:
  - label: Тверда група
    items:
    - завод
    - батько
    - брат
    - стіл
  - label: М'яка група
    items:
    - вчитель
    - край
    - день
    - учень
  - label: Мішана група
    items:
    - сторож
    - кущ
    - читач
    - товариш
- id: match-up-nom-to-forms
  type: match-up
  instruction: З'єднайте називний відмінок із правильною формою (орудний або кличний
    відмінок)
  pairs:
  - left: ніж
    right: ножем (О. в.)
  - left: товариш
    right: товаришу (Кл. в.)
  - left: сторож
    right: стороже (Кл. в.)
  - left: слухач
    right: слухачем (О. в.)
  - left: плащ
    right: плащем (О. в.)
  - left: читач
    right: читачу (Кл. в.)
  - left: борщ
    right: борщем (О. в.)
  - left: меч
    right: мече (Кл. в.)
- id: fill-in-insert-the-correct-ending-for-nouns-in-sentences
  type: fill-in
  instruction: Вставте правильну форму іменника в речення
  items:
  - sentence: Ми завжди ріжемо хліб гострим ____.
    answer: ножем
    options:
    - ножом
    - ножем
    - ножі
  - sentence: Я дуже пишаюся своїм вірним ____.
    answer: товаришем
    options:
    - товаришем
    - товаришом
    - товариша
  - sentence: Він працює нічним ____ у школі.
    answer: сторожем
    options:
    - сторожом
    - сторожем
    - сторожі
  - sentence: Ми ховаємося від дощу під великим ____.
    answer: плащем
    options:
    - плащом
    - плащем
    - плащу
  - sentence: Воїн хоробро б'ється важким ____.
    answer: мечем
    options:
    - мечом
    - мечем
    - мечу
  - sentence: Шановний ____, дякуємо за вашу увагу!
    answer: слухачу
    options:
    - слухаче
    - слухачу
    - слухачем
  - sentence: Дорогий ____, ця книга для тебе!
    answer: читачу
    options:
    - читаче
    - читачу
    - читачем
  - sentence: Мій пане ____, відкрийте ворота!
    answer: стороже
    options:
    - стороже
    - сторожу
    - сторожем
workbook:
- id: workbook-fill-in-plurals
  type: fill-in
  instruction: Утворіть множину від поданих іменників мішаної групи
  items:
  - sentence: Це мій ніж. А це мої ____.
    answer: ножі
    options:
    - ножі
    - ножи
    - ножів
  - sentence: Це мій товариш. А це мої ____.
    answer: товариші
    options:
    - товариші
    - товариши
    - товаришів
  - sentence: Це мій плащ. А це мої ____.
    answer: плащі
    options:
    - плащі
    - плащи
    - плащів
  - sentence: Це зелений кущ. А це зелені ____.
    answer: кущі
    options:
    - кущі
    - кущи
    - кущів
  - sentence: Це уважний слухач. А це уважні ____.
    answer: слухачі
    options:
    - слухачі
    - слухачи
    - слухачів
  - sentence: Це швидкий м'яч. А це швидкі ____.
    answer: м'ячі
    options:
    - м'ячі
    - м'ячи
    - м'ячів
- id: workbook-group-sort-cases
  type: group-sort
  instruction: Розподіліть форми іменників за відмінками
  groups:
  - label: Орудний відмінок
    items:
    - сторожем
    - ножем
    - товаришем
  - label: Давальний відмінок
    items:
    - товаришу
    - слухачеві
    - читачу
  - label: Місцевий відмінок
    items:
    - на плечі
    - у борщі
    - на плащі
- id: workbook-match-up-adjectives
  type: match-up
  instruction: З'єднайте іменник мішаної групи із правильною формою прикметника
  pairs:
  - left: ніж
    right: гострий
  - left: плече
    right: широке
  - left: прізвище
    right: нове
  - left: слухач
    right: уважний
  - left: борщ
    right: смачний
  - left: кущ
    right: зелений
  - left: пейзаж
    right: красивий
  - left: плащ
    right: довгий
- id: workbook-error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінковому закінченні
  items:
  - sentence: Він знизав своїми плечами.
    error: плечами
    correction: плечима
    options:
    - плечима
    - плечі
    - плечу
    - плечей
    error_type: word
    explanation: Слово 'плече' в орудному відмінку множини має унікальну форму 'плечима'
      (залишок давньої двоїни).
  - sentence: Ми грілися перед вогнищом.
    error: вогнищом
    correction: вогнищем
    options:
    - вогнищем
    - вогнищу
    - вогнищі
    - вогнища
    error_type: word
    explanation: Іменники мішаної групи в орудному відмінку однини завжди мають закінчення
      -ем.
  - sentence: Вона пишається своїм прізвищом.
    error: прізвищом
    correction: прізвищем
    options:
    - прізвищем
    - прізвищу
    - прізвища
    - прізвищі
    error_type: word
    explanation: Прізвище належить до мішаної групи і в орудному відмінку однини вимагає
      м'якого закінчення -ем.
  - sentence: Смачна сметана у борщу.
    error: борщу
    correction: борщі
    options:
    - борщі
    - борщем
    - борща
    - борщів
    error_type: word
    explanation: Неістоти мішаної групи в місцевому відмінку зазвичай мають закінчення
      -і.
  - sentence: Шановний читаче, вітаємо тебе!
    error: читаче
    correction: читачу
    options:
    - читачу
    - читачем
    - читача
    - читачі
    error_type: word
    explanation: Слова із суфіксом -ач у кличному відмінку мають закінчення -у.
  - sentence: Я пишу лист своєму товарише.
    error: товарише
    correction: товаришу
    options:
    - товаришу
    - товариша
    - товаришем
    - товаришів
    error_type: word
    explanation: Слово 'товариш' у кличному відмінку має закінчення -у.
