version: '1.0'
module: noun-subclasses-hissing
level: b1
inline:
- id: quiz-identify-group
  type: quiz
  instruction: Оберіть іменник, який належить до мішаної групи.
  items:
  - question: Яке слово належить до мішаної групи?
    options:
    - сторож
    - завод
    - батько
    - вчитель
    correct: 0
  - question: 'Оберіть іменник мішаної групи:'
    options:
    - ніж
    - край
    - стіл
    - учень
    correct: 0
  - question: Яке слово належить до мішаної групи?
    options:
    - борщ
    - день
    - ліс
    - син
    correct: 0
  - question: 'Оберіть іменник мішаної групи:'
    options:
    - плащ
    - кіт
    - герой
    - лікар
    correct: 0
  - question: Яке слово належить до мішаної групи?
    options:
    - м'яч
    - брат
    - кінь
    - водій
    correct: 0
  - question: 'Оберіть іменник мішаної групи:'
    options:
    - читач
    - друг
    - хлопець
    - дід
    correct: 0
  - question: Яке слово належить до мішаної групи?
    options:
    - пейзаж
    - парк
    - місяць
    - рік
    correct: 0
  - question: 'Оберіть іменник мішаної групи:'
    options:
    - слухач
    - птах
    - звір
    - орел
    correct: 0
- id: group-sort-nouns
  type: group-sort
  instruction: Розподіліть іменники за групами (тверда, м'яка, мішана).
  groups:
  - label: Тверда група
    items:
    - завод
    - батько
    - ліс
  - label: М'яка група
    items:
    - вчитель
    - край
    - хлопець
  - label: Мішана група
    items:
    - сторож
    - товариш
    - борщ
    - кущ
- id: fill-in-singular-endings
  type: fill-in
  instruction: Вставте іменник у правильній формі однини.
  items:
  - sentence: Я розмовляю зі ____.
    answer: сторожем
    options:
    - сторожем
    - сторожом
    - сторожі
  - sentence: Туристи гріються перед гарячим ____.
    answer: вогнищем
    options:
    - вогнищем
    - вогнищом
    - вогнищу
  - sentence: Я передав лист моєму ____.
    answer: товаришу
    options:
    - товаришу
    - товариші
    - товаришем
  - sentence: Птах безпечно сидить на моєму ____.
    answer: плечі
    options:
    - плечі
    - плечу
    - плечем
  - sentence: Я ріжу хліб гострим ____.
    answer: ножем
    options:
    - ножем
    - ножом
    - ножі
  - sentence: Ми щиро радіємо новому грандіозному ____.
    answer: видовищу
    options:
    - видовищу
    - видовищі
    - видовищем
- id: match-up-nom-to-forms
  type: match-up
  instruction: З'єднайте початкову форму (називний) із формами орудного та кличного
    відмінків.
  pairs:
  - left: сторож
    right: сторожем, стороже
  - left: ніж
    right: ножем, ноже
  - left: меч
    right: мечем, мече
  - left: читач
    right: читачем, читачу
  - left: слухач
    right: слухачем, слухачу
  - left: товариш
    right: товаришем, товаришу
  - left: плече
    right: плечем, плече
  - left: прізвище
    right: прізвищем, прізвище
- id: reading-comprehension-plural-mixed
  type: quiz
  instruction: Прочитайте текст про нічних сторожів і дайте відповіді на запитання.
  items:
  - question: Хто тихо охороняє спокій великого міста?
    options:
    - Нічні сторожі
    - Уважні слухачі
    - Давні товариші
    - Маленькі коти
    correct: 0
  - question: Де ховався сильний осінній вітер?
    options:
    - У густих кущах
    - У довгих плащах
    - На високих деревах
    - За старою лавкою
    correct: 0
  - question: Чому сторожі залишалися сухими під час дощу?
    options:
    - Завдяки довгим плащам
    - Вони ховалися під деревами
    - Вони сиділи в кущах
    - Завдяки яскравим ліхтарикам
    correct: 0
  - question: Що швидко дістали сторожі, коли помітили дивні тіні?
    options:
    - Яскраві ліхтарики
    - Важкі ножі
    - Свій нічний обід
    - Старі ключі
    correct: 0
  - question: Для чого чоловікам були потрібні ці важкі ножі?
    options:
    - Для щоденної небезпечної роботи
    - Щоб розрізати хліб
    - Щоб сховатися від дощу
    - Для полювання на котів
    correct: 0
  - question: Кого чоловіки знайшли між мокрими деревами?
    options:
    - Маленьких котів
    - Інших сторожів
    - Своїх товаришів
    - Небезпечних злодіїв
    correct: 0
- id: quiz-identify-the-for-given-nouns
  type: quiz
  instruction: Оберіть правильну форму родового або місцевого відмінка (зверніть увагу
    на чергування голосних).
  items:
  - question: 'Родовий відмінок (немає...) для слова ''ніж'':'
    options:
    - ножа
    - ніжа
    - ножу
    - ніжу
    correct: 0
  - question: 'Родовий відмінок (немає...) для слова ''стіл'':'
    options:
    - стола
    - стіла
    - столу
    - стілу
    correct: 0
  - question: 'Родовий відмінок (немає...) для слова ''кіт'':'
    options:
    - кота
    - кіта
    - коту
    - кіту
    correct: 0
  - question: 'Родовий відмінок (немає...) для слова ''рік'':'
    options:
    - року
    - ріку
    - рокі
    - ріка
    correct: 0
  - question: 'Родовий відмінок (немає...) для слова ''ківш'':'
    options:
    - ковша
    - ківша
    - ковшу
    - ківшу
    correct: 0
  - question: 'Місцевий відмінок (на...) для слова ''ніж'':'
    options:
    - на ножі
    - на ніжі
    - на ножу
    - на ніжу
    correct: 0
- id: fill-in-insert-the-correct-ending-for-nouns-in-sentences
  type: fill-in
  instruction: Вставте правильну відмінкову форму для іменників мішаної групи.
  items:
  - sentence: Я бачу дуже уважного ____.
    answer: слухача
    options:
    - слухача
    - слухач
    - слухачу
  - sentence: Я купую нові довгі ____.
    answer: плащі
    options:
    - плащі
    - плащів
    - плаща
  - sentence: Вони поділилися їжею з цими ____.
    answer: слухачами
    options:
    - слухачами
    - слухацями
    - слухачів
  - sentence: Він майстерно володіє своїм важким ____.
    answer: мечем
    options:
    - мечем
    - мечом
    - мечу
  - sentence: Свіжа крапля води лежить на ____.
    answer: мечі
    options:
    - мечі
    - мечу
    - мечем
  - sentence: Сьогодні на лекції немає моїх ____.
    answer: товаришів
    options:
    - товаришів
    - товариші
    - товаришам
  - sentence: Ми постійно спілкуємося зі ____.
    answer: сторожами
    options:
    - сторожами
    - сторожів
    - сторожі
  - sentence: Я пишаюся своїм красивим ____.
    answer: прізвищем
    options:
    - прізвищем
    - прізвищом
    - прізвищу
workbook:
- type: group-sort
  instruction: Розподіліть іменники мішаної групи залежно від їхньої форми у знахідному
    відмінку (я бачу...).
  groups:
  - label: Збігається з називним (неістоти)
    items:
    - ніж
    - плащ
    - кущ
    - борщ
    - м'яч
    - меч
  - label: Збігається з родовим (істоти)
    items:
    - сторож
    - слухач
    - товариш
    - читач
- type: fill-in
  instruction: Вставте іменники мішаної групи в правильній формі множини.
  items:
  - sentence: У лісі росте багато зелених ____.
    answer: кущів
    options:
    - кущів
    - кущах
    - кущами
  - sentence: Ми щиро дякуємо нашим уважним ____.
    answer: слухачам
    options:
    - слухачам
    - слухачів
    - слухачами
  - sentence: Він здивовано потиснув своїми широкими ____.
    answer: плечима
    options:
    - плечима
    - плечами
    - плечам
  - sentence: На їхніх чоловічих ____ лежить велика відповідальність.
    answer: плечах
    options:
    - плечах
    - плечима
    - плечам
  - sentence: Ми швидко стали хорошими ____.
    answer: товаришами
    options:
    - товаришами
    - товаришів
    - товаришам
  - sentence: На столі лежать нові гострі ____.
    answer: ножі
    options:
    - ножі
    - ножів
    - ножами
