version: '1.0'
module: aspect-in-imperatives
level: b1
inline:
- id: diagnostic-aspect-quiz
  type: quiz
  instruction: Оберіть правильний варіант наказового способу для кожної ситуації
  items:
  - question: _______ вікно, тут холодно.
    options:
    - Закрий
    - Закривай
    - Не закрий
    - Не закривай
    correct: 0
  - question: _______ вікно, тут і так дуже холодно.
    options:
    - Відкрий
    - Відкривай
    - Не відкрий
    - Не відкривай
    correct: 3
  - question: Будь ласка, _______ за наш святковий стіл.
    options:
    - Сядьте
    - Сідайте
    - Не сядьте
    - Не сідайте
    correct: 1
  - question: Обережно, _______ на цій слизькій дорозі!
    options:
    - падай
    - впади
    - не падай
    - не впади
    correct: 3
  - question: Дивись, _______ свої нові ключі!
    options:
    - не губи
    - не загуби
    - губи
    - загуби
    correct: 1
  - question: Ніколи _______ свої цінні речі.
    options:
    - не забудь
    - не забувай
    - забудь
    - забувай
    correct: 1
  - question: Завтра іспит. _______ купити свіжий хліб!
    options:
    - Не забудь
    - Не забувай
    - Забудь
    - Забувай
    correct: 0
  - question: Спочатку _______ цибулю, а потім поклади на сковорідку.
    options:
    - наріж
    - ріж
    - не наріж
    - не ріж
    correct: 0
  - question: Пишіть акуратно, _______.
    options:
    - поспішіть
    - поспішайте
    - не поспішіть
    - не поспішайте
    correct: 3
  - question: _______ цей звіт до вечора.
    options:
    - Пиши
    - Напиши
    - Не пиши
    - Не напиши
    correct: 1
- id: positive-imperative-choice
  type: fill-in
  instruction: Вставте правильну форму позитивного наказового способу (команда чи
    запрошення)
  items:
  - sentence: Привіт! Проходьте і _______ за стіл.
    answer: сідайте
    options:
    - сядьте
    - сідайте
  - sentence: Мені потрібна сільниця. _______ її мені, будь ласка.
    answer: Подай
    options:
    - Подавай
    - Подай
  - sentence: Спочатку _______ цибулю, а потім поклади на сковорідку.
    answer: наріж
    options:
    - ріж
    - наріж
  - sentence: Не поспішайте, _______ акуратно і красиво.
    answer: пишіть
    options:
    - напишіть
    - пишіть
  - sentence: _______ цей звіт до вечора і поклади мені на стіл.
    answer: Напиши
    options:
    - Пиши
    - Напиши
  - sentence: Діти, завжди _______ один одному в колективі.
    answer: допомагайте
    options:
    - допоможіть
    - допомагайте
  - sentence: Шафа падає. Ой, обережно, _______ мені!
    answer: допоможи
    options:
    - допомагай
    - допоможи
  - sentence: Ви маєте годину на іспит. Час пішов. _______!
    answer: Починайте
    options:
    - Почніть
    - Починайте
- id: imperative-category-sort
  type: group-sort
  instruction: Розподіліть наказові речення за прагматичними категоріями
  groups:
  - label: Команда або інструкція (доконаний вид)
    items:
    - Відкрий вікно!
    - Напишіть звіт до вечора.
    - Подай мені сіль.
  - label: Запрошення або порада (недоконаний вид)
    items:
    - Заходьте і сідайте.
    - Починайте писати тест.
    - Завжди допомагайте друзям.
  - label: Заборона (не + недоконаний)
    items:
    - Не відкривай вікно!
    - Не запізнюйся на уроки.
  - label: Застереження (не + доконаний)
    items:
    - Обережно, не впади!
    - Дивись, не загуби ключі.
- id: match-up
  type: match-up
  instruction: З'єднайте життєву ситуацію з правильною формою наказового способу
  pairs:
  - left: Кулінарний крок (конкретна послідовна дія)
    right: Спочатку наріж цибулю
  - left: Загальне правило безпеки (заборона)
    right: Не запізнюйся на перші уроки
  - left: Застереження про випадковий наслідок
    right: Обережно, не загуби свої ключі
  - left: Дружнє та тепле запрошення до дому
    right: Заходьте, будь ласка, і сідайте
  - left: Сувора заборона поточного процесу
    right: Не відкривай зараз це велике вікно
  - left: Швидка команда (очікуємо конкретний результат)
    right: Напиши мені цей звіт до вечора
  - left: Авторизація та дозвіл почати процес
    right: Час пішов, починайте писати
  - left: Спонукання до спільної дії (замість «Давайте»)
    right: Ходімо в кіно
- id: error-correction-pragmatics
  type: error-correction
  instruction: Знайдіть і виправте помилку у виборі виду дієслова
  items:
  - sentence: Тут дуже холодно, не відкрий вікно.
    error: відкрий
    correction: відкривай
    error_type: word
    options:
    - відкривай
    - відкрити
    - відкриваєш
    explanation: Сувора заборона дії вимагає недоконаного виду (не відкривай).
  - sentence: Привіт! Заходь і сядь за наш стіл.
    error: сядь
    correction: сідай
    error_type: word
    options:
    - сідай
    - сиди
    - сядеш
    explanation: Тепле і ввічливе запрошення вимагає недоконаного виду (сідай).
  - sentence: Обережно, не падай на слизькій дорозі!
    error: падай
    correction: впади
    error_type: word
    options:
    - впади
    - впадеш
    - падати
    explanation: Емоційне застереження про випадковий наслідок вимагає доконаного
      виду (не впади).
  - sentence: Діти, не забудьте свої речі в класі щодня.
    error: забудьте
    correction: забувайте
    error_type: word
    options:
    - забувайте
    - забувати
    - забудете
    explanation: Постійне правило поведінки вимагає недоконаного виду (не забувайте).
  - sentence: Пиши мені цей звіт до вечора.
    error: Пиши
    correction: Напиши
    error_type: word
    options:
    - Напиши
    - Напишеш
    - Писати
    explanation: Команда на конкретний і швидкий результат вимагає доконаного виду
      (напиши).
  - sentence: Давайте читати цей текст разом.
    error: Давайте читати
    correction: Читаймо
    error_type: phrase
    options:
    - Читаймо
    - Прочитаємо
    - Читаємо
    explanation: Форма 'давайте + інфінітив' є калькою (суржиком). Треба використовувати
      синтетичну форму 'Читаймо'.
- id: guest-rules-writing
  type: essay-response
  prompt: 'Уявіть, що до вас приїжджає друг. Напишіть 6 коротких речень з правилами
    для вашого гостя. Використовуйте різні форми наказового способу: 1) дружнє запрошення
    (недоконаний вид), 2) конкретну команду (доконаний вид), 3) сувору заборону (не
    + недоконаний вид).'
  min_words: 50
  model_answer: 'Привіт! Заходь до кімнати і сідай на цей великий диван. Будь ласка,
    роздягайся, бо тут дуже тепло. Дай мені свій телефон. У моєму домі є одне суворе
    правило: не пий тут холодної води. Також, будь ласка, не відкривай це велике вікно,
    тут і так дуже холодно. Допоможи мені, подай сіль, і сідаймо за наш стіл!'
workbook:
- type: group-sort
  instruction: Доконаний чи недоконаний вид? Розподіліть дієслова за видом.
  groups:
  - label: Доконаний вид (perfective)
    items:
    - відкрити
    - написати
    - закрити
    - почати
    - загубити
    - впасти
    - забути
  - label: Недоконаний вид (imperfective)
    items:
    - відкривати
    - писати
    - закривати
    - починати
    - губити
    - падати
    - забувати
    - торкатися
- type: match-up
  instruction: З'єднайте українські терміни з їхніми англійськими відповідниками
  pairs:
  - left: заборона
    right: prohibition
  - left: застереження
    right: warning
  - left: дозвіл
    right: permission
  - left: прохання
    right: request
  - left: порада
    right: advice
  - left: наказовий спосіб
    right: imperative mood
  - left: ввічливий
    right: polite
  - left: категоричний
    right: categorical
  - left: інструкція
    right: instruction
- type: translate
  instruction: Оберіть правильний переклад українською мовою
  items:
  - source: Don't open the window! (prohibition to one person)
    options:
    - text: Не відкривай вікно!
      correct: true
    - text: Не відкрий вікно!
      correct: false
  - source: Come in and sit down! (polite, to guests)
    options:
    - text: Заходьте і сідайте!
      correct: true
    - text: Зайдіть і сядьте!
      correct: false
  - source: Write the report by evening. (command to an employee)
    options:
    - text: Напиши звіт до вечора.
      correct: true
    - text: Пиши звіт до вечора.
      correct: false
  - source: Careful, don't fall! (accidental warning)
    options:
    - text: Обережно, не впади!
      correct: true
    - text: Обережно, не падай!
      correct: false
  - source: Don't be late for the lesson. (general rule)
    options:
    - text: Не запізнюйся на урок.
      correct: true
    - text: Не запізнися на урок.
      correct: false
  - source: Let's read this text together. (suggestion)
    options:
    - text: Читаймо цей текст разом.
      correct: true
    - text: Давайте читати цей текст разом.
      correct: false
- type: unjumble
  instruction: Складіть правильні речення зі слів
  items:
  - words:
    - вікно,
    - тут
    - холодно.
    - Не
    - відкривай
    correct_order:
    - Не
    - відкривай
    - вікно,
    - тут
    - холодно.
  - words:
    - мені
    - Будь
    - звіт.
    - напиши
    - ласка,
    correct_order:
    - Будь
    - ласка,
    - напиши
    - мені
    - звіт.
  - words:
    - впади
    - Обережно,
    - дорозі!
    - слизькій
    - не
    - на
    correct_order:
    - Обережно,
    - не
    - впади
    - на
    - слизькій
    - дорозі!
  - words:
    - за
    - і
    - Проходьте
    - сідайте
    - стіл.
    correct_order:
    - Проходьте
    - і
    - сідайте
    - за
    - стіл.
  - words:
    - свої
    - Ніколи
    - речі!
    - не
    - забувай
    - цінні
    correct_order:
    - Ніколи
    - не
    - забувай
    - свої
    - цінні
    - речі!
  - words:
    - завжди
    - Читаймо.
    - суржику
    - кажіть
    - Замість
    correct_order:
    - Замість
    - суржику
    - завжди
    - кажіть
    - Читаймо.
