- type: quiz
  title: Оберіть правильний вид дієслова
  instruction: Прочитайте ситуацію та оберіть найбільш відповідну форму наказового
    способу.
  items:
  - question: Ви пропонуєте гостю сісти за стіл. Яку форму краще використати?
    explanation: Для ввічливого запрошення до процесу ми використовуємо недоконаний
      вид.
    options:
    - text: Сідайте
      correct: true
    - text: Сядьте
      correct: false
    - text: Сісти
      correct: false
    - text: Сядемо
      correct: false
  - question: Вам потрібно, щоб колега терміново зачинив вікно через протяг. Що ви
      скажете?
    explanation: Для одноразової інструкції на результат потрібен доконаний вид.
    options:
    - text: Зачини
      correct: true
    - text: Зачиняй
      correct: false
    - text: Зачиняти
      correct: false
    - text: Зачиняємо
      correct: false
  - question: 'Ви даєте загальну життєву пораду: ніколи не казати неправду. Яку форму
      обрати?'
    explanation: Глобальна заборона завжди вимагає недоконаного виду.
    options:
    - text: Не кажи
      correct: true
    - text: Не скажи
      correct: false
    - text: Не казати
      correct: false
    - text: Не сказати
      correct: false
  - question: Ви попереджаєте дитину про випадкову небезпеку на слизьких сходах.
    explanation: Для попередження про випадковий негативний результат використовуємо
      доконаний вид.
    options:
    - text: Не впади
      correct: true
    - text: Не падай
      correct: false
    - text: Не впасти
      correct: false
    - text: Не падаємо
      correct: false
  - question: Керівник вимагає, щоб ви негайно роздрукували звіт. Яке слово він використає?
    explanation: Терміновий наказ з очікуванням результату потребує доконаного виду.
    options:
    - text: Роздрукуй
      correct: true
    - text: Роздруковуй
      correct: false
    - text: Друкувати
      correct: false
    - text: Роздрукувати
      correct: false
  - question: Як правильно запросити друзів до квартири і створити атмосферу гостинності?
    explanation: Запрошення і дозвіл передаються дієсловами недоконаного виду.
    options:
    - text: Заходьте
      correct: true
    - text: Зайдіть
      correct: false
    - text: Зайти
      correct: false
    - text: Заходити
      correct: false
  - question: Ви просите підлеглого зупинити роботу і припинити суперечку на нараді.
    explanation: Дієслова припинення дії вимагають результату, тому вживаються в доконаному
      виді.
    options:
    - text: Припиніть
      correct: true
    - text: Припиняйте
      correct: false
    - text: Припиняти
      correct: false
    - text: Припиняємо
      correct: false
  - question: Ви заохочуєте студента продовжувати читати текст уголос.
    explanation: Після слова продовжуй наступне дієслово має бути в недоконаному виді.
    options:
    - text: Продовжуй читати
      correct: true
    - text: Продовжуй прочитати
      correct: false
    - text: Продовжуй прочитай
      correct: false
    - text: Продовжуй читаєш
      correct: false
  - question: Вам потрібно запам'ятати номер телефону. Яка форма є правильною?
    explanation: Конкретна інструкція до миттєвого результату фіксації вимагає доконаного
      виду.
    options:
    - text: Запам'ятай
      correct: true
    - text: Пам'ятай
      correct: false
    - text: Пам'ятати
      correct: false
    - text: Пам'ятаймо
      correct: false
  - question: Як найкраще сказати другові почекати на вас одну хвилину біля магазину?
    explanation: Коротка пауза перед результатом передається доконаним видом.
    options:
    - text: Зачекай
      correct: true
    - text: Чекай
      correct: false
    - text: Чекати
      correct: false
    - text: Чекаєш
      correct: false
  - question: Ви пропонуєте колезі разом піти на каву, використовуючи неформальний
      стиль.
    explanation: Для неформального запрошення до спільної дії використовуємо давай.
    options:
    - text: Давай підемо
      correct: true
    - text: Дай підемо
      correct: false
    - text: Підемо давай
      correct: false
    - text: Давай пішли
      correct: false
  - question: Яку синтетичну форму варто використати під час урочистої промови для
      заклику мріяти?
    explanation: Синтетичні форми на -мо звучать піднесено і дуже органічно.
    options:
    - text: Мріймо
      correct: true
    - text: Мріємо
      correct: false
    - text: Давай мріяти
      correct: false
    - text: Давайте мріємо
      correct: false
  - question: Батьки дають дитині філософську пораду завжди пам'ятати своє коріння.
    explanation: Тривалий стан свідомості та загальні поради передаються недоконаним
      видом.
    options:
    - text: Пам'ятай
      correct: true
    - text: Запам'ятай
      correct: false
    - text: Згадай
      correct: false
    - text: Нагадай
      correct: false
  - question: Ви просите друга передати вам сіль за обідом. Яку форму використати?
    explanation: Для виконання разової фізичної дії (прохання про послугу) потрібен
      доконаний вид.
    options:
    - text: Передай
      correct: true
    - text: Передавай
      correct: false
    - text: Передавати
      correct: false
    - text: Передаємо
      correct: false
  - question: Як правильно заборонити дитині бігати по кімнаті, щоб вона припинила
      цей процес?
    explanation: Глобальна заборона (не роби цього) вимагає недоконаного виду.
    options:
    - text: Не бігай
      correct: true
    - text: Не побіжи
      correct: false
    - text: Не пробіжи
      correct: false
    - text: Не збігай
      correct: false
- type: fill-in
  title: Вставте правильну форму дієслова
  instruction: Оберіть правильне дієслово для кожної комунікативної ситуації.
  items:
  - sentence: Будь ласка, обережно, не _____ цю вазу, вона дуже дорога.
    answer: розбий
    options:
    - розбий
    - розбивай
    - бити
    - розбити
    explanation: Для попередження про випадковий результат використовуємо доконаний
      вид.
  - sentence: Заходьте і _____ за цей великий стіл, місця вистачить усім.
    answer: сідайте
    options:
    - сідайте
    - сядьте
    - сісти
    - сядемо
    explanation: Гостинне запрошення вимагає недоконаного виду.
  - sentence: Терміново _____ мені звіт на електронну пошту, він потрібен на нараді.
    answer: надішли
    options:
    - надішли
    - надсилай
    - надіслати
    - надсилати
    explanation: Термінова інструкція до дії потребує доконаного виду.
  - sentence: Ніколи не _____ неправду своїм найкращим друзям.
    answer: кажи
    options:
    - кажи
    - скажи
    - казати
    - сказати
    explanation: Глобальна заборона завжди оформлюється дієсловом недоконаного виду.
  - sentence: Обов'язково _____ це правило, воно буде на завтрашньому екзамені.
    answer: запам'ятай
    options:
    - запам'ятай
    - пам'ятай
    - згадай
    - пам'ятати
    explanation: Інструкція зберегти факт у пам'яті вимагає доконаного виду.
  - sentence: Будь ласка, _____ мені цей цікавий документ, я хочу його швидко прочитати.
    answer: дай
    options:
    - дай
    - давай
    - давати
    - дати
    explanation: Прохання про конкретну разову фізичну дію.
  - sentence: Негайно _____ цю безглузду суперечку в моєму кабінеті!
    answer: припиніть
    options:
    - припиніть
    - припиняйте
    - припиняти
    - припинити
    explanation: Наказ припинити дію має на меті результат, тому доконаний вид.
  - sentence: Завжди _____ про тих, хто допомагав тобі у складні часи.
    answer: пам'ятай
    options:
    - пам'ятай
    - запам'ятай
    - згадай
    - нагадай
    explanation: Тривалий стан свідомості, загальна порада на все життя.
  - sentence: Беріть пиріжки, _____ чай і почувайтеся як удома.
    answer: пийте
    options:
    - пийте
    - випийте
    - пити
    - випити
    explanation: Пропозиція комфорту та частування.
  - sentence: Дивись, не _____ свої ключі на кухонному столі перед виходом.
    answer: забудь
    options:
    - забудь
    - забувай
    - забути
    - забувати
    explanation: Застереження від випадкової помилки.
  - sentence: _____ одну хвилину, я тільки візьму своє пальто з шафи.
    answer: зачекай
    options:
    - зачекай
    - чекай
    - почекати
    - зачекати
    explanation: Коротка пауза перед результатом вимагає доконаного виду.
  - sentence: Ви робите все правильно, _____ працювати в тому ж дусі.
    answer: продовжуйте
    options:
    - продовжуйте
    - продовжіть
    - продовжити
    - продовжувати
    explanation: Заохочення до безперервного процесу.
- type: fill-in
  title: 'Порада чи наказ: оберіть дієслово'
  instruction: Уважно прочитайте контекст речення та оберіть дієслово правильного
    виду.
  items:
  - sentence: Щоб бути здоровим, _____ свіжі фрукти кожного дня.
    answer: їж
    options:
    - їж
    - з'їж
    - їсти
    - з'їсти
    explanation: Регулярна, повторювана дія (порада) — недоконаний вид.
  - sentence: Ти виглядаєш хворим, _____ цю таблетку і лягай у ліжко.
    answer: випий
    options:
    - випий
    - пий
    - випити
    - пити
    explanation: Конкретна інструкція для разового результату — доконаний вид.
  - sentence: На цих курсах ми вчимося писати, тому _____ свої тексти уважно.
    answer: пишіть
    options:
    - пишіть
    - напишіть
    - писати
    - написати
    explanation: Процес роботи з текстом.
  - sentence: Ось анкета клієнта, _____ своє повне ім'я в цьому рядку.
    answer: напишіть
    options:
    - напишіть
    - пишіть
    - писати
    - написати
    explanation: Разова інструкція для заповнення форми.
  - sentence: Завжди _____ двері на замок, коли виходите з квартири.
    answer: зачиняйте
    options:
    - зачиняйте
    - зачиніть
    - зачиняти
    - зачинити
    explanation: Постійне правило поведінки.
  - sentence: У кімнаті страшенно холодно, _____ це вікно нарешті!
    answer: зачини
    options:
    - зачини
    - зачиняй
    - зачинити
    - зачиняти
    explanation: Терміновий наказ з очікуванням миттєвого результату.
  - sentence: Коли маєте вільний час, _____ цікаві історичні книги.
    answer: читайте
    options:
    - читайте
    - прочитайте
    - читати
    - прочитати
    explanation: Порада до тривалого процесу.
  - sentence: Завтра у нас семінар, обов'язково _____ цей важливий розділ підручника.
    answer: прочитай
    options:
    - прочитай
    - читай
    - прочитати
    - читати
    explanation: Конкретне завдання на результат до певного часу.
  - sentence: Ніколи не _____ гроші невідомим людям в інтернеті.
    answer: переказуй
    options:
    - переказуй
    - перекажи
    - переказувати
    - переказати
    explanation: Загальна глобальна заборона.
  - sentence: Обережно, не _____ їм випадково пароль від свого банківського рахунку.
    answer: скажи
    options:
    - скажи
    - кажи
    - сказати
    - казати
    explanation: Попередження про випадкову помилку.
- type: match-up
  title: 'Знайдіть відповідність: Ситуація та наказ'
  instruction: З'єднайте опис життєвої ситуації з правильною формою наказового способу.
  pairs:
  - left: Пропонуємо гостю сісти за стіл
    right: Сідайте, будь ласка
  - left: Просимо роздрукувати звіт негайно
    right: Роздрукуй цей документ
  - left: Попереджаємо про слизьку дорогу
    right: Обережно, не впади
  - left: Забороняємо дитині говорити неправду
    right: Ніколи не кажи брехні
  - left: Заохочуємо продовжувати читання тексту
    right: Продовжуй читати далі
  - left: Даємо завдання вивчити нове правило
    right: Запам'ятай цю інформацію
  - left: Радимо не забувати свої коріння
    right: Завжди пам'ятай про це
  - left: Просимо припинити кричати в кімнаті
    right: Перестань галасувати
  - left: Просимо друга передати сіль
    right: Дай мені сіль
  - left: Пропонуємо друзям піти в кіно (розмовно)
    right: Давай підемо в кіно
  - left: Урочистий заклик працювати разом (синтетично)
    right: Робімо нашу справу чесно
  - left: Просимо друга почекати хвилину на вулиці
    right: Зачекай мене тут
- type: unjumble
  title: Складіть речення з правильним порядком слів
  instruction: Розташуйте слова в правильному порядку, щоб утворити граматично коректне
    речення.
  items:
  - words:
    - Негайно
    - надішли
    - мені
    - цей
    - звіт
    answer: Негайно надішли мені цей звіт
  - words:
    - Не
    - забудь
    - свої
    - ключі
    - на
    - столі
    answer: Не забудь свої ключі на столі
  - words:
    - Проходьте
    - до
    - вітальні
    - і
    - сідайте
    answer: Проходьте до вітальні і сідайте
  - words:
    - Перестань
    - кричати
    - на
    - всю
    - вулицю
    answer: Перестань кричати на всю вулицю
  - words:
    - Давай
    - підемо
    - сьогодні
    - ввечері
    - в
    - кіно
    answer: Давай підемо сьогодні ввечері в кіно
  - words:
    - Завжди
    - пам'ятай
    - про
    - свої
    - обіцянки
    answer: Завжди пам'ятай про свої обіцянки
- type: error-correction
  title: Виправте граматичні та прагматичні помилки
  instruction: Знайдіть і виправте дієслово, яке вжите в неправильному виді або формі
    для даного контексту.
  items:
  - sentence: Сядьте за стіл і беріть пироги, дорогі гості!
    error: Сядьте
    answer: Сідайте
    error_type: register
    options:
    - Сідайте
    - Сядемо
    - Сісти
    - Сидіти
    explanation: Для гостинного запрошення ми використовуємо недоконаний вид, щоб
      зняти психологічний тиск.
  - sentence: Зачиняй вікно негайно, бо на вулиці сильний вітер.
    error: Зачиняй
    answer: Зачини
    error_type: word
    options:
    - Зачини
    - Зачиніть
    - Зачиняти
    - Зачиняємо
    explanation: Одноразова конкретна інструкція вимагає доконаного виду.
  - sentence: Ніколи не розбий мої улюблені чашки.
    error: розбий
    answer: розбивай
    error_type: word
    options:
    - розбивай
    - бити
    - розбивати
    - б'єш
    explanation: Глобальна заборона (ніколи не...) вимагає недоконаного виду.
  - sentence: Обережно на льоду, не падай сьогодні.
    error: падай
    answer: впади
    error_type: word
    options:
    - впади
    - впадеш
    - падати
    - впасти
    explanation: Попередження про випадкову небезпеку потребує доконаного виду.
  - sentence: Пам'ятай цей пароль, він потрібен прямо зараз для входу в систему.
    error: Пам'ятай
    answer: Запам'ятай
    error_type: word
    options:
    - Запам'ятай
    - Згадай
    - Нагадай
    - Запам'ятати
    explanation: Конкретна дія фіксації інформації вимагає дієслова доконаного виду.
  - sentence: Ми дуже цінуємо вашу допомогу, продовжуйте працюватиме в такому ж темпі.
    error: працюватиме
    answer: працювати
    error_type: construction
    options:
    - працювати
    - працюєте
    - попрацювати
    - працюй
    explanation: Після слова продовжуй використовується інфінітив недоконаного виду.
- type: unjumble
  title: Побудуйте заперечні речення
  instruction: Складіть правильні заперечення та застереження з поданих слів.
  items:
  - words:
    - Ніколи
    - не
    - кажи
    - мені
    - неправду
    answer: Ніколи не кажи мені неправду
  - words:
    - Не
    - відчиняйте
    - ці
    - двері
    - зараз
    answer: Не відчиняйте ці двері зараз
  - words:
    - Обережно,
    - не
    - розбий
    - цю
    - вазу
    answer: Обережно, не розбий цю вазу
  - words:
    - Гляди,
    - не
    - забудь
    - свій
    - телефон
    answer: Гляди, не забудь свій телефон
  - words:
    - Не
    - роби
    - цього
    - сьогодні
    - ввечері
    answer: Не роби цього сьогодні ввечері
  - words:
    - Одягайся
    - тепліше
    - і
    - не
    - застудися
    answer: Одягайся тепліше і не застудися
- type: error-correction
  title: 'Виправте помилки: Вид дієслова'
  instruction: Виправте дієслово в наказовому способі відповідно до ситуації.
  items:
