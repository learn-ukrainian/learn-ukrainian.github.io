      answer: "закінчив"
      options: ["закінчив", "закінчував", "закінчує", "закінчити"]
    - sentence: "Я буду повторювати це правило, ___ не запам'ятаю його назавжди."
      answer: "доки"
      options: ["доки", "коли", "як", "перш"]
    - sentence: "Не відкривай очі, ___ я не скажу тобі."
      answer: "поки"
      options: ["поки", "як", "коли", "щойно"]

- type: unjumble
  title: "Складні часові речення"
  instruction: "Побудуйте речення, звертаючи увагу на порядок слів та часові сполучники."
  items:
