- type: quiz
  title: "Перевірте свої знання: Теорія"
  items:
    - question: "Який сполучник найчастіше вказує на конкретну миттєву точку в часі?"
      explanation: "Слово 'коли' фіксує раптову подію або точний момент завершення дії."
      options:
        - text: "коли"
          correct: true
        - text: "поки"
          correct: false
        - text: "доки"
          correct: false
        - text: "щойно"
          correct: false
    - question: "Який вид дієслова використовується для опису тривалих паралельних фонових подій?"
      explanation: "Паралельні дії вимагають недоконаного виду, оскільки вони означають процес."
      options:
        - text: "недоконаний"
          correct: true
        - text: "доконаний"
          correct: false
        - text: "будь-який"
          correct: false
        - text: "тільки дієприкметник"
          correct: false
    - question: "Яка граматична форма є обов'язковою після сполучника 'після того як'?"
      explanation: "Цей сполучник показує завершеність першої дії перед початком другої, тому вимагає доконаного виду."
      options:
        - text: "доконаний вид"
          correct: true
        - text: "недоконаний вид"
          correct: false
        - text: "тільки інфінітив"
          correct: false
        - text: "поєднання видів"
          correct: false
    - question: "Що означає популярний український фразеологізм 'чекати з моря погоди'?"
      explanation: "Цей вислів означає пасивне очікування без активних дій і часто має негативне забарвлення."
      options:
        - text: "пасивно чекати без дій"
          correct: true
        - text: "уважно слідкувати за часом"
          correct: false
        - text: "швидко приймати рішення"
          correct: false
        - text: "насолоджуватися природою"
          correct: false
    - question: "Яка специфічна конструкція використовується для правильного перекладу англійського слова 'until'?"
      explanation: "В українській мові ми використовуємо 'поки не' разом із доконаним видом для позначення межі тривалої дії."
      options:
        - text: "поки не"
          correct: true
        - text: "до того як"
          correct: false
        - text: "поки що"
          correct: false
        - text: "відтоді як"
          correct: false
    - question: "Що виражає популярне українське прислів'я 'Усьому свій час'?"
      explanation: "Цей вислів підкреслює глибоку філософію терпіння та прийняття природних ритмів життя."
      options:
        - text: "прийняття природних ритмів"
          correct: true
        - text: "необхідність поспішати"
          correct: false
        - text: "страх перед майбутнім"
          correct: false
        - text: "цінність кожної секунди"
          correct: false
    - question: "Який з цих сполучників має значення блискавичної, миттєвої реакції або ланцюгової послідовності?"
      explanation: "Слово 'щойно' підкреслює абсолютну свіжість події, її прив'язку до поточного моменту."
      options:
        - text: "щойно"
          correct: true
        - text: "тим часом"
          correct: false
        - text: "відтоді як"
          correct: false
        - text: "доки"
          correct: false
    - question: "Який з цих виразів не з'єднує два речення, а лише вказує на тимчасовість ситуації в теперішньому часі?"
      explanation: "'Поки що' — це прислівниковий вираз, який описує стан справ на поточний момент ('for now')."
      options:
        - text: "поки що"
          correct: true
        - text: "поки не"
          correct: false
        - text: "як тільки"
          correct: false
        - text: "перш ніж"
          correct: false

- type: fill-in
  title: "Заповніть пропуски відповідними сполучниками"
  items:
    - sentence: "Я читав цікаву статтю, ___ вона дивилася свій улюблений фільм."
      answer: "поки"
      options: ["коли", "поки", "після того як", "як тільки"]
    - sentence: "___ ми прийшли в театр, вистава вже почалася п'ять хвилин тому."
      answer: "Коли"
      options: ["Коли", "Поки", "Доки", "Перш ніж"]
    - sentence: "Я буду чекати тебе тут, ___ ти не повернешся з роботи."
      answer: "поки"
      options: ["поки", "коли", "перш", "після"]
    - sentence: "Ми маємо купити ці квитки, ___ ніж вони закінчаться у касі."
      answer: "перш"
      options: ["перш", "після", "як", "доки"]
    - sentence: "___ того як ми зробили ремонт, квартира стала набагато світлішою."
      answer: "Після"
      options: ["Після", "До", "Під час", "Перш"]
    - sentence: "Я обов'язково зателефоную тобі, ___ тільки зможу це зробити."
      answer: "як"
      options: ["як", "так", "поки", "відтоді"]
    - sentence: "Він постійно скаржиться на життя, фактично чекаючи з моря ___."
      answer: "погоди"
      options: ["погоди", "вітру", "сонця", "хвиль"]
    - sentence: "___ він відчинив вікно, у кімнату відразу залетів маленький птах."
      answer: "Щойно"
      options: ["Щойно", "Поки", "Тим часом", "Відтоді"]
    - sentence: "Молодь активно використовує соціальні мережі, ___ часом як старше покоління надає перевагу телебаченню."
      answer: "тим"
      options: ["тим", "цим", "яким", "таким"]
    - sentence: "Ми плануємо купити власний будинок, але ___ що орендуємо невелику квартиру."
      answer: "поки"
      options: ["поки", "доки", "тільки", "ледь"]

- type: match-up
  title: "З'єднайте частини складнопідрядних речень"
  items:
    - premise: "Ми не почнемо нашу святкову вечерю,"
      response: "поки не прийдуть усі запрошені гості."
    - premise: "Він зателефонує тобі одразу,"
      response: "після того як повністю закінчить цю складну статтю."
    - premise: "Поки ми довго їхали в поїзді,"
      response: "за вікном постійно змінювалися чудові гірські пейзажі."
    - premise: "Добре подумай про наслідки,"
      response: "перш ніж сказати ці образливі слова."
    - premise: "Як тільки ранкове сонце зійшло,"
      response: "ми вирушили в далеку і захопливу дорогу."
    - premise: "Коли він нарешті відчинив двері,"
      response: "сильний вітер раптово задмухнув нашу єдину свічку."
    - premise: "Вони роками працюють на тій самій посаді,"
      response: "фактично чекаючи з моря погоди замість активних дій."
    - premise: "Поки що я не маю відповіді на ваше питання,"
      response: "але я обов'язково продовжу шукати правильне рішення."

- type: unjumble
  title: "Побудуйте правильні часові речення з поданих слів"
  items:
    - words: ["Я", "буду", "чекати", "поки", "ти", "не", "прийдеш"]
      answer: "Я буду чекати поки ти не прийдеш"
    - words: ["Усьому", "свій", "час", "сказала", "моя", "бабуся"]
      answer: "Усьому свій час сказала моя бабуся"
    - words: ["Ми", "не", "можемо", "чекати", "з", "моря", "погоди"]
      answer: "Ми не можемо чекати з моря погоди"
    - words: ["Поки", "він", "готував", "вечерю", "вона", "читала", "книгу"]
      answer: "Поки він готував вечерю вона читала книгу"
    - words: ["Перш", "ніж", "почати", "проєкт", "варто", "подумати"]
      answer: "Перш ніж почати проєкт варто подумати"
    - words: ["Щойно", "вона", "відчинила", "вікно", "почався", "сильний", "дощ"]
      answer: "Щойно вона відчинила вікно почався сильний дощ"

- type: error-correction
  title: "Виправте граматичні помилки в часових реченнях"
  items:
    - sentence: "Я працював над новим проєктом, після того як слухав класичну музику."
      error: "після того як"
      answer: "поки"
      options: ["поки", "перш ніж", "відтоді як", "як тільки"]
      explanation: "Слухання музики і робота — це дві паралельні дії, тому потрібен сполучник тривалості 'поки'."
    - sentence: "Ми будемо довго гуляти в цьому парку, поки дощ зупиниться."
      error: "поки"
      answer: "поки не"
      options: ["поки не", "після того як", "коли не", "як тільки"]
      explanation: "В українській мові конструкція 'until' перекладається як 'поки не' + доконаний вид дієслова."
    - sentence: "Я уважно читав велику статтю, коли вона дивилася цікавий фільм."
      error: "коли"
      answer: "поки"
      options: ["поки", "як тільки", "після того як", "щойно"]
      explanation: "Для позначення двох тривалих фонових подій, що відбуваються одночасно, використовується сполучник 'поки', а не точкове 'коли'."
    - sentence: "Перш ніж купувати дорогі квитки, ми уважно читали відгуки про виставу."
      error: "читали"
      answer: "прочитали"
      options: ["прочитали", "читаємо", "будемо читати", "прочитаємо"]
      explanation: "Сполучники послідовності (перш ніж, після того як) вимагають доконаного виду, оскільки дія має бути завершеною (прочитали)."
    - sentence: "Поки що я прийшов додому після роботи, я одразу відчинив вікно."
      error: "Поки що"
      answer: "Щойно"
      options: ["Щойно", "Тим часом", "Доки", "Відтоді як"]
      explanation: "Фраза 'поки що' означає 'for now'. Для вираження блискавичної послідовності дій слід використовувати сполучник 'щойно'."
    - sentence: "Він не міг заспокоїтися у своїй кімнаті, поки знайшов свої ключі від машини."
      error: "поки"
      answer: "поки не"
      options: ["поки не", "коли", "після того як", "доки"]
      explanation: "Дія не могла зупинитися до певного результату. Українська мова вимагає заперечної частки 'не' перед доконаним дієсловом, щоб показати цю межу."

- type: mark-the-words
  title: "Знайдіть часові маркери"
  instruction: "Знайдіть і позначте всі часові сполучники та слова, що вказують на час у цьому тексті."
  text: "Коли прийде тепла весна, природа швидко прокинеться. Ми будемо працювати, поки не виконаємо своє завдання. Доки грала приємна музика, усі гості весело танцювали у великому залі. Щойно вхідні двері зачинилися, він сів і почав швидко писати. Учні майже одночасно підняли руки, щоб відповісти на складне питання вчителя."
  answers: ["Коли", "поки", "Доки", "Щойно", "одночасно"]

