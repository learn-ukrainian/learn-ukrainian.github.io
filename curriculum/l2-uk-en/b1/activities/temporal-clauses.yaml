  title: "Знайдіть часові сполучники"
  instruction: "Уважно прочитайте текст та позначте всі часові сполучники."
  text: "Коли настав ранок, ми вирушили в дорогу. Перш ніж вийти, ми поснідали. Поки ми йшли лісом, я слухав спів птахів. Відтоді життя змінилося. Ми вирішили відпочити, доки світило сонце. Щойно ми сіли, почався дощ."
