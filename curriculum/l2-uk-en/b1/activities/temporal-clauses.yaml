- type: match-up
  title: "Знайдіть правильне закінчення речення"
  instruction: "З'єднайте частини речень, утворюючи логічні часові конструкції."
  pairs:
    - left: "Ми будемо працювати,"
      right: "поки не виконаємо все завдання."
    - left: "Коли я повернувся додому,"
      right: "всі вже лягли спати."
    - left: "Після того як закінчився фільм,"
      right: "ми обговорили його сюжет."
    - left: "Перш ніж купувати квитки,"
      right: "треба перевірити розклад."
    - left: "Як тільки він отримав листа,"
      right: "він одразу зателефонував мені."
    - left: "Поки мама готувала вечерю,"
      right: "діти гралися у своїй кімнаті."
    - left: "Тим часом як я працював над проектом,"
      right: "мої колеги відпочивали на морі."
    - left: "Відтоді як ми переїхали в нове місто,"
      right: "наше життя дуже змінилося."
    - left: "Я вирішив зателефонувати старому другові,"
      right: "коли мав кілька вільних хвилин."
    - left: "Доки діти гралися у саду,"
      right: "ми встигли приготувати смачний обід."
    - left: "Після того як закінчилася зустріч,"
      right: "ми підписали всі необхідні документи."
    - left: "Перш ніж вийти з квартири,"
      right: "я перевірив наявність ключів у кишені."


