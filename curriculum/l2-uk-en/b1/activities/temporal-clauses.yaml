- type: unjumble
  title: "Побудуйте складні часові речення"
  items:
    - words: ["Після", "того", "як", "гості", "пішли", "ми", "прибрали"]
      answer: "Після того як гості пішли ми прибрали"
    - words: ["Доки", "грала", "музика", "люди", "танцювали", "у", "залі"]
      answer: "Доки грала музика люди танцювали у залі"
    - words: ["Відтоді", "як", "він", "переїхав", "його", "життя", "змінилося"]
      answer: "Відтоді як він переїхав його життя змінилося"
    - words: ["Він", "читав", "книгу", "а", "тим", "часом", "стемніло"]
