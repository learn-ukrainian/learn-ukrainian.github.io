- type: fill-in
  title: "Виберіть правильний часовий сполучник"
  instruction: "Доповніть речення правильним сполучником, враховуючи тривалість або миттєвість дії."
  items:
    - sentence: "Я читав цікаву книгу, ___ мій брат дивився телевізор."
      answer: "поки"
      options: ["коли", "поки", "щойно", "перш ніж"]
    - sentence: "Ми вирушимо в подорож, ___ закінчиться дощ."
      answer: "як тільки"
      options: ["поки", "доки", "як тільки", "під час"]
    - sentence: "___ я був студентом, я часто ходив до бібліотеки."
      answer: "Коли"
      options: ["Коли", "Поки", "Доки", "Щойно"]
    - sentence: "Вони довго розмовляли ___ того, як ухвалили рішення."
      answer: "після"
      options: ["після", "до", "перш", "під час"]
    - sentence: "Я буду чекати на тебе тут, поки ти ___ повернешся."
      answer: "не"
      options: ["не", "ні", "так", "вже"]
    - sentence: "Подумай добре, ___ ніж давати остаточну відповідь."
      answer: "перш"
      options: ["перш", "після", "як", "коли"]
    - sentence: "___ грала тиха музика, гості поступово збиралися в залі."
      answer: "Доки"
      options: ["Доки", "Коли", "Щойно", "Після"]
    - sentence: "Він вийшов з кабінету, ___ тільки закінчилася зустріч."
      answer: "як"
      options: ["коли", "як", "поки", "доки"]

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Знайдіть і виправте помилку у вживанні часових сполучників або виду дієслова."
  items:
    - sentence: "Я буду чекати на станції, поки ти приїдеш."
      error: "ти приїдеш"
      answer: "ти не приїдеш"
      options: ["ти не приїдеш", "ти приїжджаєш", "ти не приїжджаєш", "ти приїхав"]
      explanation: "Для позначення межі очікування в українській мові використовується частка 'не' (поки не)."
    - sentence: "Я спав, коли вона готувала сніданок."
      error: "коли"
      answer: "поки"
      options: ["поки", "після", "щойно", "перш"]
      explanation: "Дві паралельні тривалі дії найкраще поєднувати сполучником 'поки'."
    - sentence: "Після того як я читав статтю, я написав звіт."
      error: "читав"
      answer: "прочитав"
      options: ["прочитав", "читаю", "читатиму", "прочитаю"]
      explanation: "Конструкція послідовності 'після того як' вимагає доконаного виду дієслова."
    - sentence: "Перш ніж виходити, він закривав усі вікна."
      error: "закривав"
      answer: "закрив"
      options: ["закрив", "закриє", "закриватиме", "закрити"]
      explanation: "Одноразова послідовна дія вимагає доконаного виду: 'закрив'."
    - sentence: "Коли ми їхали в автобусі, раптом починався дощ."
      error: "починався"
      answer: "почався"
      options: ["почався", "почнеться", "починається", "почати"]
      explanation: "Раптова коротка дія на фоні тривалого процесу вимагає доконаного виду."
    - sentence: "Поки музика грала, гості потанцювали."
      error: "потанцювали"
      answer: "танцювали"
      options: ["танцювали", "танцюють", "затанцюють", "танцюватимуть"]
      explanation: "Дві паралельні дії вимагають недоконаного виду: 'танцювали'."
    - sentence: "Як тільки він прийшов, ми починали вечеряти."
      error: "починали"
      answer: "почали"
      options: ["почали", "почнемо", "починаємо", "почати"]
      explanation: "Послідовні швидкі дії вимагають дієслів доконаного виду."
    - sentence: "Я слухав радіо під час того, коли я прибирав кімнату."
      error: "коли"
      answer: "як"
      options: ["як", "поки", "доки", "що"]
      explanation: "Правильна форма складного сполучника: 'під час того як'."

- type: unjumble
  title: "Побудуйте часові речення"
  instruction: "Розташуйте слова в правильному порядку, щоб утворити граматично правильні речення."
  items:
    - words: ["Ми", "разом", "весело", "танцювали", "у", "великому", "залі,", "доки", "грала", "ця", "чудова", "музика."]
      answer: "Ми разом весело танцювали у великому залі, доки грала ця чудова музика."
    - words: ["Я", "буду", "терпляче", "чекати", "на", "тебе", "в", "кафе,", "поки", "ти", "не", "прийдеш", "з", "роботи."]
      answer: "Я буду терпляче чекати на тебе в кафе, поки ти не прийдеш з роботи."
    - words: ["Коли", "ми", "нарешті", "приїхали", "на", "залізничну", "станцію,", "вже", "почався", "дуже", "сильний", "дощ."]
      answer: "Коли ми нарешті приїхали на залізничну станцію, вже почався дуже сильний дощ."
    - words: ["Перш", "ніж", "нарешті", "відповісти", "на", "це", "складне", "запитання,", "він", "глибоко", "і", "повільно", "вдихнув."]
      answer: "Перш ніж нарешті відповісти на це складне запитання, він глибоко і повільно вдихнув."
    - words: ["Вона", "одразу", "зателефонувала", "мені", "вчора", "ввечері,", "як", "тільки", "звільнилася", "від", "усіх", "своїх", "важливих", "справ."]
      answer: "Вона одразу зателефонувала мені вчора ввечері, як тільки звільнилася від усіх своїх важливих справ."
    - words: ["Після", "того", "як", "сонце", "остаточно", "зайшло", "за", "високі", "гори,", "надворі", "стало", "дуже", "холодно."]
      answer: "Після того як сонце остаточно зайшло за високі гори, надворі стало дуже холодно."

- type: quiz
  title: "Оберіть правильний варіант"
  instruction: "Перевірте своє розуміння різниці між одночасністю та послідовністю дій."
  items:
    - question: "Який сполучник найкраще підходить для двох тривалих паралельних дій?"
      options:
        - text: "поки"
          correct: true
        - text: "коли"
          correct: false
        - text: "перш ніж"
          correct: false
        - text: "як тільки"
          correct: false
      explanation: "Для паралельних тривалих дій найкраще використовувати сполучники 'поки' або 'доки'."
    - question: "Як правильно перекласти речення 'I will wait until you call'?"
      options:
        - text: "Я буду чекати, поки ти не зателефонуєш."
          correct: true
        - text: "Я буду чекати, поки ти зателефонуєш."
          correct: false
        - text: "Я буду чекати, коли ти зателефонуєш."
          correct: false
        - text: "Я буду чекати, доки ти зателефонуєш."
          correct: false
      explanation: "Українська мова вимагає використання заперечної частки 'не' (поки не) для позначення межі очікування."
    - question: "Який вид дієслова зазвичай використовується зі сполучником 'після того як'?"
      options:
        - text: "доконаний"
          correct: true
        - text: "недоконаний"
          correct: false
        - text: "тільки теперішній час"
          correct: false
        - text: "тільки наказовий спосіб"
          correct: false
      explanation: "Цей сполучник вказує на завершену подію в минулому, тому вимагає доконаного виду."
    - question: "До якої частини мови належить слово 'коли' у складному реченні?"
      options:
        - text: "сполучник"
          correct: true
        - text: "іменник"
          correct: false
        - text: "прикметник"
          correct: false
        - text: "дієслово"
          correct: false
      explanation: "Слово 'коли' у таких реченнях виступає як часовий підрядний сполучник."
    - question: "Яке з цих слів означає раптову або дуже швидку подію?"
      options:
        - text: "щойно"
          correct: true
        - text: "поки"
          correct: false
        - text: "доки"
          correct: false
        - text: "під час того як"
          correct: false
      explanation: "Слово 'щойно' (або 'як тільки') акцентує увагу на миттєвості та швидкості дії."
    - question: "Що означає відомий український фразеологізм 'чекати з моря погоди'?"
      options:
        - text: "пасивно чекати на зміни, нічого не роблячи"
          correct: true
        - text: "готуватися до шторму на кораблі"
          correct: false
        - text: "активно діяти та змінювати ситуацію"
          correct: false
        - text: "чекати на сонячний день"
          correct: false
      explanation: "Цей вислів означає марне та пасивне очікування без активних дій."
    - question: "Який складений сполучник додає відтінок контрасту при двох паралельних діях?"
      options:
        - text: "тим часом як"
          correct: true
        - text: "щойно"
          correct: false
        - text: "перш ніж"
          correct: false
        - text: "після того як"
          correct: false
      explanation: "Сполучник 'тим часом як' не лише показує одночасність, але й часто використовується для протиставлення."
    - question: "Яка комбінація видів дієслова є ідеальною для створення атмосфери в історії?"
      options:
        - text: "недоконаний + недоконаний"
          correct: true
        - text: "доконаний + доконаний"
          correct: false
        - text: "доконаний + недоконаний"
          correct: false
        - text: "тільки доконаний"
          correct: false
      explanation: "Для опису фону та створення атмосфери найкраще підходять паралельні дії недоконаного виду."

