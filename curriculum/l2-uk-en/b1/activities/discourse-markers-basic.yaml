- type: true-false
  title: 'Правда чи хиба: правила використання конекторів'
  instruction: Визначте, чи є ці твердження правильними.
  items:
    - statement: В українській мові кома перед сполучником тому що ставиться завжди.
      correct: true
      explanation: Це суворе пунктуаційне правило, кома ставиться завжди.
    - statement: Сполучник але означає додавання паралельних дій.
      correct: false
      explanation: Але означає контраст або суперечність. Для додавання використовується
        і.
    - statement: Вставне слово безумовно виділяється комами на письмі.
      correct: true
      explanation: Усі вставні слова вимагають ізоляції комами.
    - statement: Англійське слово so на початку речення завжди перекладається як так.
      correct: false
      explanation: Це поширена помилка. Краще використовувати отже або ну.
    - statement: Слова однак та проте мають формальний, книжний характер.
      correct: true
      explanation: Вони часто використовуються в новинах, есе та офіційних документах.
    - statement: Частка ж часто стоїть на самому початку речення для підсилення.
      correct: false
      explanation: Частка ж ніколи не починає речення, вона стоїть на другій позиції.
    - statement: Слово зокрема допомагає виділити один найважливіший елемент із загальної
        групи.
      correct: true
      explanation: Зокрема використовується для фокусування уваги на конкретній деталі.
    - statement: Вставні слова роблять текст сухим і роботизованим.
      correct: false
      explanation: Навпаки, вони є емоційним клеєм, який робить мову живою та емпатичною.
    - statement: Перед сполучниками але і проте кома не потрібна, якщо речення дуже
        коротке.
      correct: false
      explanation: Кома перед цими сполучниками ставиться завжди, незалежно від довжини
        речення.
    - statement: Конструкція крім того часто використовується для введення нового
        аргументу.
      correct: true
      explanation: Це чудовий інструмент для додавання вагомих фактів в есе чи презентації.
    - statement: Коли ми робимо фонетичну паузу перед вставним словом, ми сигналізуємо
        про своє ставлення.
      correct: true
      explanation: Паузи навколо вставних слів є важливою частиною природної інтонації.
    - statement: Слово тобто зазвичай використовується для вираження сильного контрасту.
      correct: false
      explanation: Тобто використовується для уточнення або перефразування.
