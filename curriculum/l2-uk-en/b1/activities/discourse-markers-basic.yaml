- type: match-up
  title: 'Знайдіть пару: маркер та його значення'
  instruction: З'єднайте дискурсивний маркер із його функцією.
  pairs:
    - left: також
      right: додавання інформації
    - left: але
      right: сильний контраст
    - left: однак
      right: формальний контраст
    - left: тому що
      right: пояснення причини
    - left: отже
      right: логічний висновок
    - left: наприклад
      right: ілюстрація думки
    - left: тобто
      right: уточнення або перефразування
    - left: зокрема
      right: виділення одного елемента
    - left: до речі
      right: зміна теми розмови
    - left: власне
      right: виправлення або точність
    - left: безумовно
      right: повна згода та емпатія
    - left: по-перше
      right: початок логічного переліку
- type: quiz
  title: Перевірте свої знання про дискурсивні маркери
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
    - question: Який сполучник найкраще виражає м'яке зіставлення без конфлікту?
      explanation: Сполучник а виражає м'яке зіставлення двох різних фактів.
      options:
        - text: а
          correct: true
        - text: але
          correct: false
        - text: і
          correct: false
        - text: та
          correct: false
    - question: Яке вставне слово найкраще підходить для формального академічного
        стилю?
      explanation: Слово зокрема ідеально підходить для ділового та академічного стилю.
      options:
        - text: зокрема
          correct: true
        - text: до речі
          correct: false
        - text: ну
          correct: false
        - text: коротше
          correct: false
    - question: Де завжди ставиться кома у складному реченні в українській мові?
      explanation: Перед сполучниками але, а, проте кома ставиться завжди.
      options:
        - text: перед сполучником але
          correct: true
        - text: після сполучника але
          correct: false
        - text: перед словом також
          correct: false
        - text: після слова також
          correct: false
    - question: Як правильно виділити вставне слово в середині речення на письмі?
      explanation: Вставне слово всередині речення завжди виділяється комами з обох
        боків.
      options:
        - text: комами з обох боків
          correct: true
        - text: комою тільки перед ним
          correct: false
        - text: комою тільки після нього
          correct: false
        - text: коми взагалі не потрібні
          correct: false
    - question: Яка частка ніколи не починає речення і стоїть на другій позиції?
      explanation: Частка ж є енклітикою і ніколи не починає речення, додаючи емоційного
        підсилення.
      options:
        - text: ж
          correct: true
        - text: ну
          correct: false
        - text: би
          correct: false
        - text: не
          correct: false
    - question: Який маркер найкраще використовувати для логічного підсумку сказаного?
      explanation: Слово отже сигналізує про логічний висновок або підсумок розмови.
      options:
        - text: отже
          correct: true
        - text: тому що
          correct: false
        - text: наприклад
          correct: false
        - text: але
          correct: false
    - question: Який маркер вказує на об'єктивну причину події в офіційному тексті?
      explanation: Сполучник через те що підкреслює об'єктивну причину в офіційному
        стилі.
      options:
        - text: через те що
          correct: true
        - text: тому що
          correct: false
        - text: бо
          correct: false
        - text: адже
          correct: false
    - question: Яке англійське слово часто неправильно перекладають як так на початку
        речення?
      explanation: Англійське so на початку речення краще перекладати як отже або
        ну, а не так.
      options:
        - text: so
          correct: true
        - text: and
          correct: false
        - text: but
          correct: false
        - text: well
          correct: false
    - question: Який синонім до слова однак часто використовується в письмових текстах?
      explanation: Проте є формальним синонімом до однак та але.
      options:
        - text: проте
          correct: true
        - text: також
          correct: false
        - text: тому
          correct: false
        - text: інакше
          correct: false
    - question: Яку головну функцію виконують дискурсивні маркери у живому спілкуванні?
      explanation: Маркери працюють як емоційний та логічний клей, який з'єднує думки.
      options:
        - text: з'єднують думки та показують емоції
          correct: true
        - text: засмічують мову словами-паразитами
          correct: false
        - text: роблять речення набагато коротшими
          correct: false
        - text: замінюють складні дієслова у реченні
          correct: false
    - question: Як правильно сказати про додатковий вагомий аргумент у презентації?
      explanation: Конструкція крім того ідеальна для введення нового аргументу.
      options:
        - text: крім того
          correct: true
        - text: також само
          correct: false
        - text: і ще
          correct: false
        - text: до речі
          correct: false
    - question: Який маркер найкраще використовувати для ввічливого перефразування
        думки колеги?
      explanation: Конструкція іншими словами допомагає ввічливо перефразувати сказане.
      options:
        - text: іншими словами
          correct: true
        - text: безумовно
          correct: false
        - text: зокрема
          correct: false
        - text: наприклад
          correct: false
- type: fill-in
  title: Вставте пропущені конектори
  instruction: Оберіть правильний маркер для кожного речення.
  items:
    - sentence: Я хотів піти в кіно, _____ забув купити квитки.
      answer: але
      options:
        - але
        - тому
        - однак
        - і
    - sentence: Він студент, _____ я викладач.
      answer: а
      options:
        - а
        - але
        - проте
        - або
    - sentence: Ми залишилися вдома, _____ що йшов сильний дощ.
      answer: тому
      options:
        - тому
        - через
        - так
        - отже
    - sentence: Ми обговорили бюджет, а _____ затвердили новий графік.
      answer: також
      options:
        - також
        - ще
        - знову
        - крім
    - sentence: Багато секторів економіки зростають, _____ слід виділити сферу ІТ.
      answer: зокрема
      options:
        - зокрема
        - наприклад
        - тобто
        - власне
    - sentence: Цей проєкт, _____, є дуже перспективним.
      answer: безумовно
      options:
        - безумовно
        - отже
        - тому
        - але
    - sentence: _____, ми можемо зробити висновок, що кампанія була успішною.
      answer: Отже
      options:
        - Отже
        - Проте
        - Наприклад
        - Тому
    - sentence: Я не планувала нічого писати, _____ сталася смішна ситуація.
      answer: але
      options:
        - але
        - отже
        - ну
        - тому
    - sentence: Рейс затримали через _____ що почалася завірюха.
      answer: те
      options:
        - те
        - це
        - все
        - так
    - sentence: _____, це дозволить суттєво зменшити викиди вуглекислого газу.
      answer: По-перше
      options:
        - По-перше
        - Також
        - Отже
        - Тобто
    - sentence: Кава там дійсно смачна, до _____.
      answer: речі
      options:
        - речі
        - слова
        - того
        - всього
    - sentence: Ми не маємо вихідних, _____ працюємо постійно.
      answer: тобто
      options:
        - тобто
        - зокрема
        - отже
        - проте
