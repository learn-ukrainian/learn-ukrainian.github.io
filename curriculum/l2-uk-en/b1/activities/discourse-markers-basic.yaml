- type: error-correction
  title: Виправте пунктуаційні та лексичні помилки
  instruction: Знайдіть помилку у використанні маркерів або розділових знаків.
  items:
    - sentence: Я не купив хліб тому що магазин був зачинений.
      error: хліб тому
      answer: хліб, тому
      error_type: phrase
      options:
        - хліб, тому
        - хліб тому,
        - хліб, тому,
        - хліб тому
      explanation: Перед сполучником тому що обов'язково ставиться кома.
    - sentence: Ми планували пікнік але почався дощ.
      error: пікнік але
      answer: пікнік, але
      error_type: phrase
      options:
        - пікнік, але
        - пікнік але,
        - пікнік, але,
        - пікнік але
      explanation: Перед сполучником але обов'язково ставиться кома.
    - sentence: Так, ми закінчили зустріч успішно.
      error: Так
      answer: Отже
      error_type: word
      options:
        - Отже
        - Тому
        - Але
        - Також
      explanation: Для підсумку розмови на початку речення використовується отже,
        а не калька так.
    - sentence: До речі я забув тобі сказати.
      error: речі я
      answer: речі, я
      error_type: phrase
      options:
        - речі, я
        - речі я,
        - речі, я,
        - речі я
      explanation: Вставне слово до речі на початку речення виділяється комою.
    - sentence: Він безумовно має рацію у цій ситуації.
      error: Він безумовно має
      answer: Він, безумовно, має
      error_type: phrase
      options:
        - Він, безумовно, має
        - Він безумовно, має
        - Він, безумовно має
        - Він безумовно має
      explanation: Вставне слово всередині речення виділяється комами з обох боків.
    - sentence: Цей текст дуже цікавий власне кажучи.
      error: цікавий власне
      answer: цікавий, власне
      error_type: phrase
      options:
        - цікавий, власне
        - цікавий власне,
        - цікавий власне
        - цікавий, власне,
      explanation: Вставне слово в кінці речення відокремлюється комою.
    - sentence: Я кушаю яблуко, тому що я голодний.
      error: кушаю
      answer: їм
      error_type: word
      options:
        - їм
        - їду
        - їжу
        - кусаю
      explanation: Слово кушати це русизм, правильно їсти.
    - sentence: Вона приймає участь у новому проєкті, до речі.
      error: приймає участь
      answer: бере участь
      error_type: phrase
      options:
        - бере участь
        - робить участь
        - має участь
        - грає участь
      explanation: Правильний вислів українською — брати участь.
    - sentence: Він самий кращий студент у групі, безумовно.
      error: самий кращий
      answer: найкращий
      error_type: phrase
      options:
        - найкращий
        - більш кращий
        - дуже кращий
        - самий хороший
      explanation: Форма самий кращий є калькою з російської, правильно утворювати
        найвищий ступінь префіксом най-.
    - sentence: Ми не пішли гуляти із-за того що був дощ.
      error: із-за того що
      answer: через те що
      error_type: phrase
      options:
        - через те що
        - тому що
        - заради того що
        - для того що
      explanation: Конструкція із-за того що це русизм, правильно казати через те
        що або тому що.
    - sentence: Але я просив тебе не робити цього!
      error: Але я
      answer: Але ж я
      error_type: phrase
      options:
        - Але ж я
        - Але ну я
        - Але так я
        - Але і я
      explanation: Для сильного емоційного підсилення після але використовується частка
        ж.
    - sentence: Проєкт дорогий, однак, ми маємо його зробити.
      error: дорогий, однак, ми
      answer: дорогий. Однак ми
      error_type: phrase
      options:
        - дорогий. Однак ми
        - дорогий однак, ми
        - дорогий, однак ми
        - дорогий однак ми
      explanation: Формальний сполучник однак зазвичай стоїть на початку нового речення,
        і після нього кома не ставиться.
- type: mark-the-words
  title: Знайдіть усі дискурсивні маркери
  instruction: Знайдіть і позначте всі вставні слова, сполучники та конектори в тексті.
  text: Економіка демонструє стабільне зростання. Однак експерти попереджають про
    ризики. Зокрема, аналітики зазначають проблеми. Уряд обіцяє інвестиції, проте
    терміни невідомі. Також важливо звернути увагу на інфраструктуру. Наприклад, дороги
    потребують ремонту. Отже, ситуація складна. Власне, ми не очікували швидких змін,
    але маємо надію. Безумовно, потрібен час. Тобто результатів відразу не буде. Тому
    ми повинні чекати. Адже реформи тривають.
  answers:
    - Однак
    - Зокрема
    - проте
    - Також
    - Наприклад
    - Отже
    - Власне
    - але
    - Безумовно
    - Тобто
    - Тому
    - Адже
- type: cloze
  title: Заповніть пропуски в тексті
  instruction: Оберіть правильний маркер для кожного пропуску, щоб зробити текст логічним.
  passage: Українська мовна традиція цінує емоційний зв'язок. {{1}} сухої передачі
    фактів, ми використовуємо маркери. {{2}}, слово безумовно показує впевненість.
    {{3}} слово мабуть залишає простір для іншої думки. Це дуже важливо, {{4}} українці
    не люблять категоричності. {{5}}, у діловому спілкуванні краще пом'якшувати критику.
    Ми можемо сказати я згоден, {{6}} краще використати безумовно. {{7}} ви хочете
    перефразувати думку, скажіть {{8}} словами. {{9}} ви будуєте аргументацію, використовуйте
    слова по-перше та {{10}}. {{11}} того, маркер отже ідеально підходить для логічного
    підсумку. {{12}}, правильний вибір слова залежить від ситуації. З друзями ми скажемо
    {{13}} речі, а на конференції — {{14}}.
  blanks:
    - id: 1
      answer: Замість
      options:
        - Замість
        - Для
        - Без
        - Після
    - id: 2
      answer: Наприклад
      options:
        - Наприклад
        - Зокрема
        - Також
        - Отже
    - id: 3
      answer: А
      options:
        - А
        - Але
        - І
        - Та
    - id: 4
      answer: тому що
      options:
        - тому що
        - через
        - так як
        - для того
    - id: 5
      answer: Тому
      options:
        - Тому
        - Отже
        - Проте
        - Однак
    - id: 6
      answer: але
      options:
        - але
        - і
        - а
        - тому
    - id: 7
      answer: Якщо
      options:
        - Якщо
        - Коли
        - Хоча
        - Щоб
    - id: 8
      answer: іншими
      options:
        - іншими
        - своїми
        - тими
        - цими
    - id: 9
