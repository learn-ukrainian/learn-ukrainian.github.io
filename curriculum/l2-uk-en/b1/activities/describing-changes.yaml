- type: match-up
  title: "Знайдіть пару: дієслова та їх значення"
  instruction: "З'єднайте українське дієслово з його англійським значенням."
  pairs:
    - left: "зростати"
      right: "to grow or increase (abstract)"
    - left: "зменшуватися"
      right: "to decrease gradually"
    - left: "змінюватися"
      right: "to change itself (intransitive)"
    - left: "перетворюватися на"
      right: "to transform into something"
    - left: "підвищуватися"
      right: "to rise (temperature, level)"
    - left: "розвиватися"
      right: "to develop"
    - left: "покращуватися"
      right: "to improve naturally"
    - left: "знижуватися"
      right: "to lower or decline"

- type: fill-in
  title: "Оберіть правильне дієслово за контекстом"
  instruction: "Прочитайте речення та оберіть дієслово, яке найкраще підходить за змістом."
  items:
    - sentence: "Економіка нашої країни поступово ___ після кризи."
      answer: "зростає"
      options: ["зростає", "росте", "збільшує", "стає"]
      explanation: "Для абстрактних економічних показників слід вживати слово зростає."
    - sentence: "Середньорічна температура на планеті стабільно ___."
      answer: "підвищується"
      options: ["підвищується", "збільшується", "росте", "змінюється"]
      explanation: "Коли мова йде про рівень або температуру на шкалі, використовується підвищується."
    - sentence: "Нові технології допомагають місту швидко ___."
      answer: "розвиватися"
      options: ["розвиватися", "рости", "розвивати", "збільшувати"]
      explanation: "Інновації та технології сприяють тому, що місто починає розвиватися."
    - sentence: "Хвойні дерева в цьому північному лісі ___ дуже повільно."
      answer: "ростуть"
      options: ["ростуть", "зростають", "збільшуються", "розвиваються"]
      explanation: "Для опису фізичного збільшення рослин використовується рости."
    - sentence: "Після офіційної заяви вартість акцій компанії різко ___."
      answer: "впала"
      options: ["впала", "знизила", "погіршилася", "стала"]
      explanation: "Вартість акцій може різко впасти (to fall)."
    - sentence: "Наш директор зараз ___ розклад роботи відділу."
      answer: "змінює"
      options: ["змінює", "змінюється", "перетворює", "покращується"]
      explanation: "Оскільки директор активно діє на об'єкт (розклад), потрібне перехідне дієслово змінює."
    - sentence: "Стара закинута індустріальна зона ___ на сучасний парк."
      answer: "перетворюється"
      options: ["перетворюється", "змінюється", "стає", "робиться"]
      explanation: "Глибока трансформація з одного стану в інший передається через перетворюватися на."
    - sentence: "Студенти щойно дізналися, що розклад екзаменів ___."
      answer: "змінюється"
      options: ["змінюється", "змінює", "перетворюється", "робиться"]
      explanation: "Якщо не вказано, хто саме це робить, розклад просто змінюється (рефлексивна форма)."

- type: unjumble
  title: "Складіть речення у правильному порядку"
  instruction: "Розташуйте слова так, щоб утворилося граматично правильне речення."
  items:
    - words: ["клімат", "нашої", "планети", "швидко", "змінюється"]
      answer: "Клімат нашої планети швидко змінюється"
    - words: ["суспільство", "поступово", "переходить", "на", "нові", "технології"]
      answer: "Суспільство поступово переходить на нові технології"
    - words: ["рівень", "інфляції", "в", "країні", "значно", "підвищується"]
      answer: "Рівень інфляції в країні значно підвищується"
    - words: ["погода", "навесні", "змінюється", "дуже", "часто"]
      answer: "Погода навесні змінюється дуже часто"
    - words: ["стара", "будівля", "перетворюється", "на", "сучасний", "музей"]
      answer: "Стара будівля перетворюється на сучасний музей"
    - words: ["наш", "ІТ-сектор", "стрімко", "розвивається", "останніми", "роками"]
      answer: "Наш ІТ-сектор стрімко розвивається останніми роками"

- type: quiz
  title: "Правила граматики та слововживання"
  instruction: "Оберіть одну правильну відповідь до кожного запитання."
  items:
    - question: "Яке дієслово слід використовувати для абстрактних понять, таких як економіка?"
      explanation: "Для абстрактних понять використовується дієслово зростати."
      options:
        - text: "зростати"
          correct: true
        - text: "рости"
          correct: false
        - text: "стати"
          correct: false
        - text: "бути"
          correct: false
    - question: "Яке дієслово є перехідним і вимагає прямого додатка у Знахідному відмінку?"
      explanation: "Дієслово змінювати вимагає прямого додатка (наприклад, змінювати план)."
      options:
        - text: "змінювати"
          correct: true
        - text: "змінюватися"
          correct: false
        - text: "ставати"
          correct: false
        - text: "перетворюватися"
          correct: false
    - question: "Як правильно українською сказати про зміни на гірше?"
      explanation: "Правильна форма українською — змінювати на гірше."
      options:
        - text: "змінювати на гірше"
          correct: true
        - text: "змінювати до гіршого"
          correct: false
        - text: "змінювати в гірше"
          correct: false
        - text: "робити до гіршого"
          correct: false
    - question: "Який прийменник має йти після дієслова перетворюватися?"
      explanation: "Після перетворюватися завжди має йти прийменник на (наприклад, перетворюватися на воду)."
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "до"
          correct: false
        - text: "у"
          correct: false
    - question: "Який прислівник найкраще описує раптову, несподівану зміну?"
      explanation: "Слово різко означає швидку та несподівану зміну."
      options:
        - text: "різко"
          correct: true
        - text: "поступово"
          correct: false
        - text: "повільно"
          correct: false
        - text: "гарно"
          correct: false
    - question: "Яка форма є суплетивною формою порівняння від слова гарно?"
      explanation: "Суплетивна форма слова гарно — це слово краще."
      options:
        - text: "краще"
          correct: true
        - text: "гарніше"
          correct: false
        - text: "більш гарно"
          correct: false
        - text: "найгарніше"
          correct: false
    - question: "Що часто означає дієслово із закінченням -ся, наприклад змінюватися?"
      explanation: "Рефлексивні дієслова часто описують автономний процес, що відбувається самостійно."
      options:
        - text: "автономний процес"
          correct: true
        - text: "дію над іншим об'єктом"
          correct: false
        - text: "завершену дію"
          correct: false
        - text: "фізичний ріст"
          correct: false
    - question: "Як найкраще і професійно описати збільшення цін у науковому звіті?"
      explanation: "У професійному контексті ціни зростають, а не ростуть."
      options:
        - text: "ціни зростають"
          correct: true
        - text: "ціни ростуть"
          correct: false
        - text: "ціни йдуть вгору"
          correct: false
        - text: "ціни стають великими"
          correct: false

- type: error-correction
  title: "Виправте граматичні та лексичні помилки"
  instruction: "У кожному реченні є одна помилка. Знайдіть її та оберіть правильний варіант."
  items:
    - sentence: "Ціни в магазинах постійно ростуть кожного місяця."
      error: "ростуть"
      answer: "зростають"
      error_type: "word"
      options: ["зростають", "стають", "підвищують", "падають"]
      explanation: "Для абстрактних економічних показників потрібно вживати зростати, а не рости."
    - sentence: "Ми вирішили змінювати розклад до гіршого."
      error: "до гіршого"
      answer: "на гірше"
      error_type: "phrase"
      options: ["на гірше", "в гірше", "у гірше", "до поганого"]
      explanation: "Українською правильно вживати конструкцію змінювати на гірше."
    - sentence: "Атмосферний тиск різко впав униз."
      error: "впав униз"
      answer: "впав"
      error_type: "phrase"
      options: ["впав", "зменшився", "поганів", "упав донизу"]
      explanation: "Слово падати вже містить ідею руху вниз, слово униз тут є зайвим."
    - sentence: "Новий зелений парк змінюється район на краще."
      error: "змінюється"
      answer: "змінює"
      error_type: "word"
      options: ["змінює", "перетворює", "стає", "робить"]
      explanation: "Оскільки парк змінює об'єкт (район), потрібно вживати перехідне дієслово змінювати."
    - sentence: "Ми сподіваємося, що погода покращить завтра."
      error: "покращить"
      answer: "покращиться"
      error_type: "word"
      options: ["покращиться", "гарнішає", "стає", "зростає"]
      explanation: "Погода є автономним явищем, тому дієслово має бути рефлексивним із часткою -ся."
    - sentence: "Старий лід швидко стає на воду навесні."
      error: "стає на воду"
      answer: "перетворюється на воду"
      error_type: "phrase"
      options: ["перетворюється на воду", "змінюється на воду", "робиться водою", "йде на воду"]
      explanation: "Для опису переходу з одного стану в інший вживається перетворюватися на."

