- type: fill-in
  title: "Доповніть речення з діалогів та текстів"
  instruction: "Вставте пропущене слово в речення."
  items:
    - sentence: "Бюрократичний процес отримання статусу ___ тривав з початку року."
      answer: "поступово"
      options: ["поступово", "різко", "стрімко", "значно"]
      explanation: "Процес був довгим і розтягнутим у часі, тому він тривав поступово."
    - sentence: "Закинуті індустріальні простори ___ на надсучасні концертні майданчики."
      answer: "перетворювалися"
      options: ["перетворювалися", "змінювалися", "зростали", "ставали"]
      explanation: "Відбулася глибока фізична трансформація простору."
    - sentence: "Незалежні музичні ініціативи ___ розвивалися завдяки підтримці громади."
      answer: "стрімко"
      options: ["стрімко", "поступово", "трохи", "менш"]
      explanation: "Позитивний і дуже швидкий розвиток ініціатив."
    - sentence: "Обличчя українських міст радикально ___, набуваючи автентичних рис."
      answer: "змінюється"
      options: ["змінюється", "змінює", "розвиває", "збільшує"]
      explanation: "Обличчя міст змінюється саме по собі як результат інших процесів."
    - sentence: "Загальна кількість активних користувачів додатку невпинно ___."
      answer: "зростає"
      options: ["зростає", "росте", "підвищує", "перетворює"]
      explanation: "Кількість — це статистичний показник, тому він зростає."
    - sentence: "Середній час для отримання документів значно ___."
      answer: "зменшується"
      options: ["зменшується", "падає", "знижує", "стає"]
      explanation: "Час поступово стає меншим (зменшується)."
    - sentence: "Рівень державного сервісу постійно ___ на наших очах."
      answer: "покращується"
      options: ["покращується", "змінює", "перетворюється", "збільшується"]
      explanation: "Сервіс стає кращим, тому він покращується."
    - sentence: "Ці зміни доводять, що країна може ефективно ___ кращою."
      answer: "ставати"
      options: ["ставати", "бути", "рости", "змінювати"]
      explanation: "Використовуємо дієслово ставати з порівняльними формами прикметників."

- type: mark-the-words
  title: "Знайдіть прислівники швидкості"
  instruction: "Знайдіть і позначте всі прислівники швидкості або масштабу в тексті."
  text: "Ситуація на ринку стрімко розвивається. Ціни різко впали вчора. Погода поступово покращується. Економіка значно виросла."
  answers: ["стрімко", "різко", "поступово", "значно"]

- type: quiz
  title: "Оберіть найбільш влучне слово для ситуації"
  instruction: "Виберіть одне дієслово чи прислівник, який найкраще підходить до описаної ситуації."
  items:
    - question: "Довгострокові глобальні кліматичні зрушення зазвичай відбуваються як?"
      explanation: "Кліматичні зміни — це повільний і довгостроковий процес, тому підходить слово поступово."
      options:
        - text: "поступово"
          correct: true
        - text: "різко"
          correct: false
        - text: "погано"
          correct: false
        - text: "короткочасно"
          correct: false
    - question: "Успішні сучасні стартапи та цифрові інновації розвиваються як?"
      explanation: "Слово стрімко описує позитивний і швидкий розвиток, що характерно для інновацій."
      options:
        - text: "стрімко"
          correct: true
        - text: "поступово"
          correct: false
        - text: "повільно"
          correct: false
        - text: "погано"
          correct: false
    - question: "Коли людина свідомо оновлює пароль на комп'ютері, ми використовуємо слово:"
      explanation: "Дія спрямована на об'єкт (пароль), тому вживається перехідне дієслово змінювати."
      options:
        - text: "змінювати"
          correct: true
        - text: "змінюватися"
          correct: false
        - text: "ставати"
          correct: false
        - text: "рости"
          correct: false
    - question: "Коли погода сама стає іншою протягом дня, ми кажемо, що вона:"
      explanation: "Погода є автономним явищем, тому вживаємо рефлексивне дієслово змінюватися."
      options:
        - text: "змінюється"
          correct: true
        - text: "змінює"
          correct: false
        - text: "перетворює"
          correct: false
        - text: "росте"
          correct: false
    - question: "Що кажуть, коли вартість акцій на біржі несподівано і сильно зменшується?"
      explanation: "Коли падіння є несподіваним і драматичним, кажуть різко падає."
      options:
        - text: "вона різко падає"
          correct: true
        - text: "вона поступово падає"
          correct: false
        - text: "вона стрімко зростає"
          correct: false
        - text: "вона добре падає"
          correct: false
    - question: "Для фізичного збільшення хвойних дерев у бідному ґрунті підходить слово:"
      explanation: "Дерева — це живі об'єкти, тому для них використовується дієслово рости."
      options:
        - text: "рости"
          correct: true
        - text: "зростати"
          correct: false
        - text: "розвиватися"
          correct: false
        - text: "підвищуватися"
          correct: false
    - question: "Що стається з рівнем світового океану через глобальне потепління?"
      explanation: "Рівень вимірюється на шкалі, тому він підвищується."
      options:
        - text: "він підвищується"
          correct: true
        - text: "він змінює"
          correct: false
        - text: "він робить"
          correct: false
        - text: "він стає"
          correct: false
    - question: "Як правильно утворити вищий ступінь порівняння від прислівника сучасно?"
      explanation: "Складені форми утворюються за допомогою слова більш: більш сучасно."
      options:
        - text: "більш сучасно"
          correct: true
        - text: "сучасніше"
          correct: false
        - text: "багато сучасно"
          correct: false
        - text: "краще сучасно"
          correct: false

- type: unjumble
  title: "Складіть правильні речення з діалогів"
  instruction: "Відновіть правильний порядок слів у реченнях, які обговорюють робочі проблеми."
  items:
    - words: ["базові", "ринкові", "умови", "різко", "змінилися"]
      answer: "Базові ринкові умови різко змінилися"
    - words: ["загальний", "рівень", "інфляції", "в", "країні", "підвищується"]
      answer: "Загальний рівень інфляції в країні підвищується"
