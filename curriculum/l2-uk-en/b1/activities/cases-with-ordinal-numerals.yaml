version: '1.0'
module: cases-with-ordinal-numerals
level: b1
inline:
- id: fill-in-declension
  type: fill-in
  instruction: Вставте правильну форму порядкового числівника.
  items:
  - sentence: Це мій _____ день у Києві.
    answer: п'ятий
    options:
    - п'ятий
    - п'ятого
    - п'ятому
  - sentence: Я не бачу _____ будинку.
    answer: другого
    options:
    - другий
    - другого
    - другому
  - sentence: Він дав словник _____ студентці.
    answer: першій
    options:
    - перша
    - першій
    - першої
  - sentence: Ми живемо у _____ столітті.
    answer: двадцять першому
    options:
    - двадцять першому
    - двадцять першої
    - двадцять першого
  - sentence: Вона читає _____ сторінку.
    answer: шосту
    options:
    - шоста
    - шостою
    - шосту
  - sentence: Він розмовляє з _____ учнем.
    answer: сьомим
    options:
    - сьомий
    - сьомим
    - сьомого
- id: quiz-declension
  type: quiz
  instruction: Оберіть правильний варіант відмінювання.
  items:
  - question: Вони живуть у _____ квартирі.
    options:
    - третій
    - третьою
    - третім
    - третьої
    correct: 0
  - question: Ми піднялися на _____ поверх.
    options:
    - восьмому
    - восьмого
    - восьмий
    - восьмим
    correct: 2
  - question: Це _____ книга цього автора.
    options:
    - сьома
    - сьому
    - сьомої
    - сьомою
    correct: 0
  - question: Я зустрів _____ хлопця.
    options:
    - другий
    - другому
    - другим
    - другого
    correct: 3
  - question: Вона прийшла після _____ уроку.
    options:
    - п'ятий
    - п'ятого
    - п'ятому
    - п'ятим
    correct: 1
  - question: Конференція відбувається в _____ кімнаті.
    options:
    - десятій
    - десята
    - десятою
    - десяту
    correct: 0
- id: match-up-dates
  type: match-up
  instruction: З'єднайте запитання з правильною граматичною формою дати.
  pairs:
  - left: Яке сьогодні число?
    right: Двадцять п'яте березня
  - left: Коли ти народився?
    right: Двадцять п'ятого березня
  - left: Який зараз рік?
    right: Дві тисячі двадцять четвертий
  - left: Коли закінчився проєкт?
    right: Дві тисячі двадцятого року
  - left: Яке вчора було число?
    right: Двадцять четверте березня
  - left: Коли він приїде до Києва?
    right: П'ятнадцятого серпня
- id: quiz-time
  type: quiz
  instruction: Оберіть правильний варіант позначення часу.
  items:
  - question: Як правильно сказати 10:00 (точно)?
    options:
    - о десятій
    - на десяту
    - в десять
    - десятої
    correct: 0
  - question: Як сказати 14:30 українською?
    options:
    - о пів на третю
    - половина третього
    - о пів на другу
    - тридцять хвилин другої
    correct: 0
  - question: Який варіант є правильним для 08:15?
    options:
    - п'ятнадцять хвилин на дев'яту
    - п'ятнадцять хвилин дев'ятого
    - чверть дев'ятого
    - чверть після восьми
    correct: 0
  - question: Як сказати 11:45 без російських кальок?
    options:
    - за п'ятнадцять хвилин дванадцята
    - без п'ятнадцяти дванадцять
    - за чверть до дванадцяти
    - одинадцять без чверті
    correct: 0
  - question: Який час відповідає 16:50?
    options:
    - за десять хвилин п'ята
    - без десяти п'ять
    - десять хвилин до п'яти
    - за десять хвилин четверта
    correct: 0
  - question: Як традиційно сказати 09:05?
    options:
    - п'ять хвилин на десяту
    - п'ять хвилин десятого
    - п'ять після дев'ятої
    - п'ять хвилин до десятої
    correct: 0
- id: fill-in-time
  type: fill-in
  instruction: Вставте правильний прийменник для позначення часу (о, об, на, за).
  items:
  - sentence: Зустріч розпочнеться _____ другій годині.
    answer: о
    options:
    - о
    - об
    - на
    - за
  - sentence: Зараз пів _____ третю.
    answer: на
    options:
    - на
    - до
    - за
    - в
  - sentence: Поїзд прибуває _____ одинадцятій.
    answer: об
    options:
    - об
    - о
    - на
    - за
  - sentence: Я буду вдома _____ десять хвилин сьома.
    answer: за
    options:
    - за
    - на
    - до
    - через
  - sentence: Зараз п'ятнадцять хвилин _____ дев'яту.
    answer: на
    options:
    - на
    - після
    - за
    - в
  - sentence: Він подзвонить _____ чверть десята.
    answer: за
    options:
    - за
    - на
    - об
    - о
- id: fill-in-order
  type: fill-in
  instruction: Вставте правильну форму числівника для позначення поверху чи століття.
  items:
  - sentence: Він працює на _____ поверсі.
    answer: сьомому
