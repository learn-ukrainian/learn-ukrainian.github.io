version: '1.0'
module: cases-with-ordinal-numerals
level: b1
inline:
- id: fill-in-declension
  type: fill-in
  instruction: Вставте правильну форму порядкового числівника.
  items:
  - sentence: Це наш _____ урок.
    answer: перший
    options:
    - перший
    - першого
    - першому
  - sentence: Ми живемо на _____ поверсі.
    answer: третьому
    options:
    - третьому
    - третій
    - третього
  - sentence: Я читаю _____ сторінку.
    answer: п'яту
    options:
    - п'ята
    - п'яту
    - п'ятій
  - sentence: Він приїхав _____ березня.
    answer: другого
    options:
    - другий
    - другого
    - другому
  - sentence: Вона вчиться у _____ класі.
    answer: сьомому
    options:
    - сьомий
    - сьомому
    - сьомого
  - sentence: Сьогодні _____ століття.
    answer: двадцять перше
    options:
    - двадцять перше
    - двадцять першого
    - двадцять першому
- id: quiz-declension
  type: quiz
  instruction: Оберіть правильний варіант відмінювання порядкових числівників.
  items:
  - question: Вона розповідає про свій _____ день.
    options:
    - перший
    - першого
    - першому
    - першим
    correct: 0
  - question: Я бачу _____ хлопця.
    options:
    - другого
    - другий
    - другому
    - другим
    correct: 0
  - question: Ми зустрілися на _____ поверсі.
    options:
    - п'ятому
    - п'ятий
    - п'ятого
    - п'ятим
    correct: 0
  - question: Це був мій _____ раз у Києві.
    options:
    - другий
    - другого
    - другому
    - другим
    correct: 0
  - question: Я дав книгу _____ студенту.
    options:
    - третьому
    - третій
    - третього
    - третім
    correct: 0
  - question: Я пишаюся своїм _____ сином.
    options:
    - першим
    - першого
    - першому
    - перший
    correct: 0
- id: match-up-dates
  type: match-up
  instruction: З'єднайте речення з їх правильним перекладом українською мовою.
  pairs:
  - left: Today is the first of January.
    right: Сьогодні перше січня.
  - left: He arrived on the fifth of March.
    right: Він приїхав п'ятого березня.
  - left: Independence Day is the twenty-fourth of August.
    right: День незалежності — двадцять четверте серпня.
  - left: The concert is on the tenth of October.
    right: Концерт десятого жовтня.
  - left: She was born in nineteen ninety-one.
    right: Вона народилася тисяча дев'ятсот дев'яносто першого року.
  - left: Today's date is the second of May.
    right: Сьогодні друге травня.
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант для позначення часу.
  items:
  - question: Який правильний варіант для часу 3:15?
    options:
    - чверть на четверту
    - чверть третьої
    - п'ятнадцять хвилин третьої
    - за чверть третя
    correct: 0
  - question: Який правильний варіант для часу 7:30?
    options:
    - о пів на восьму
    - о пів на сьому
    - сім тридцять хвилин
    - половина восьмої
    correct: 0
  - question: Який правильний варіант для часу 11:45?
    options:
    - за чверть дванадцята
    - чверть до дванадцятої
    - одинадцять сорок п'ята
    - без п'ятнадцяти дванадцять
    correct: 0
  - question: Який правильний варіант для часу 4:50?
    options:
    - за десять хвилин п'ята
    - без десяти п'ять
    - за десять п'ятої
    - десять хвилин до п'ятої
    correct: 0
  - question: Який правильний варіант для часу 1:00?
    options:
    - о першій годині
    - в одну годину
    - в першу годину
    - на першу годину
    correct: 0
  - question: Який правильний варіант для часу 6:05?
    options:
    - п'ять хвилин на сьому
    - п'ять хвилин сьомої
    - шість і п'ять
    - п'ять по шостій
    correct: 0
- id: fill-in
  type: fill-in
  instruction: Вставте правильні прийменники або слова для позначення часу.
  items:
  - sentence: Зустріч почнеться _____ третій годині.
    answer: о
    options:
    - о
    - в
    - на
  - sentence: Зараз чверть _____ п'яту.
    answer: на
    options:
    - на
    - до
    - за
  - sentence: Потяг прибуває _____ десять хвилин сьома.
    answer: за
    options:
    - за
    - через
    - без
  - sentence: Фільм закінчиться _____ на десяту.
    answer: о пів
    options:
    - о пів
    - половина
    - чверть
  - sentence: Ми прийшли _____ одинадцятій годині.
    answer: об
    options:
    - об
    - в
    - на
  - sentence: Зараз _____ на першу.
    answer: чверть
    options:
    - чверть
    - половина
    - третина
- id: match-up-match-ordinals-with-their-appropriate-usage-contexts
  type: match-up
  instruction: З'єднайте порядкові числівники з відповідним контекстом.
  pairs:
  - left: вдруге
    right: for the second time
  - left: утретє
    right: for the third time
  - left: в першу чергу
    right: first of all
  - left: на п'ятому поверсі
    right: on the fifth floor
  - left: з другого поверху
    right: from the second floor
  - left: у двадцять першому столітті
    right: in the twenty-first century
workbook:
- type: group-sort
  instruction: Розподіліть порядкові числівники за групами відмінювання.
  groups:
  - label: Тверда група
    items:
    - перший
    - четвертий
    - шостий
    - сьомий
    - двадцятий
    - сотий
  - label: М'яка група
    items:
    - третій
    - третя
    - третє
    - треті
    - третього
    - третім
- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Дати».
  prompt: Розкажіть про важливі дати у вашому житті (наприклад, день народження, свята)
    українською мовою.
  min_words: 50
  model_answer: Моє улюблене свято — Новий рік, який ми святкуємо першого січня. Мій
    день народження — п'ятого березня. Цього року я вдруге поїду до Києва двадцять
    четвертого серпня. Наша зустріч відбудеться десятого жовтня. Моя мама народилася
    тисяча дев'ятсот сімдесят п'ятого року.
  evaluation_criteria:
  - Правильне використання порядкових числівників у називному та родовому відмінках.
  - Правильне узгодження назв місяців.
  - Використання складених числівників для років.
