    - сьомому
    - сьомий
    - сьомого
  - sentence: Ми спустилися з _____ поверху.
    answer: третього
    options:
    - третього
    - третьому
    - третій
  - sentence: Ми живемо у _____ столітті.
    answer: двадцять першому
    options:
    - двадцять першому
    - двадцять першого
    - двадцять перший
  - sentence: Я чекаю на _____ тролейбус.
    answer: четвертий
    options:
    - четвертий
    - четвертого
    - четвертому
  - sentence: Будь ласка, йдіть на _____ поверх.
    answer: другий
    options:
    - другий
    - другому
    - другого
  - sentence: Організатори чекають у _____ кімнаті.
    answer: десятій
    options:
    - десятій
    - десята
    - десятою
