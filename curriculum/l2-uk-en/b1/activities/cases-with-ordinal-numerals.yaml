workbook:
- type: match-up
  instruction: З'єднайте цифри та їхнє словесне вираження в родовому відмінку (дати).
  pairs:
  - left: 1-го (січня)
    right: першого
  - left: 2-го (лютого)
    right: другого
  - left: 3-го (березня)
    right: третього
  - left: 10-го (квітня)
    right: десятого
  - left: 21-го (травня)
    right: двадцять першого
  - left: 31-го (грудня)
    right: тридцять першого
- type: group-sort
  instruction: Розподіліть форми порядкових числівників за відмінками.
  groups:
  - label: Називний (Н.в.)
    items:
    - двадцять п'яте
    - третя
    - перший
    - сьоме
  - label: Родовий (Р.в.)
    items:
    - п'ятого
    - третьої
    - восьмого
    - перших
  - label: Місцевий (М.в.)
    items:
    - на другому
    - у третьому
    - на сьомій
    - у п'ятім
- type: unjumble
  instruction: Складіть правильне речення зі слів (зверніть увагу на час та дати).
  items:
  - words:
    - зустрінемося
    - о
    - Ми
    - годині.
    - п'ятій
    correct_order:
    - Ми
    - зустрінемося
    - о
    - п'ятій
    - годині.
  - words:
    - сьогодні
    - Яке
    - число?
    correct_order:
    - Яке
    - сьогодні
    - число?
  - words:
    - закінчиться
    - Конференція
    - серпня.
    - двадцятого
    correct_order:
    - Конференція
    - закінчиться
    - двадцятого
    - серпня.
  - words:
    - пів
    - на
    - Зараз
    - о
    - десяту.
    correct_order:
    - Зараз
    - о
    - пів
    - на
    - десяту.
  - words:
    - з
    - Вона
    - поверху.
    - третього
    - спустилася
    correct_order:
    - Вона
    - спустилася
    - з
    - третього
    - поверху.
  - words:
    - друге
    - Сьогодні
    - листопада.
    correct_order:
    - Сьогодні
    - друге
    - листопада.
- type: error-correction
  instruction: Виправте помилки-кальки, пов'язані з часом.
  items:
  - sentence: Зараз половина п'ятого.
    error: половина п'ятого
    correction: о пів на п'яту
    error_type: construction
    options:
    - о пів на п'яту
    - п'ята з половиною
    - половина п'ятої
    explanation: Українською для позначення 16:30 традиційно кажуть «о пів на п'яту».
  - sentence: Я прийду в десять годин.
    error: в десять годин
    correction: о десятій годині
    error_type: construction
    options:
    - о десятій годині
    - в десятій
    - на десяту
    explanation: Для позначення точного часу використовують прийменник «о/об» та місцевий
      відмінок.
  - sentence: Зараз без десяти три.
    error: без десяти три
    correction: за десять хвилин третя
    error_type: construction
    options:
    - за десять хвилин третя
    - без десятьох три
    - до трьох десять
    explanation: Прийменник «без» для часу є російською калькою. Використовуйте конструкцію
      «за...».
  - sentence: Він буде тут в двадцять хвилин першого.
    error: в двадцять хвилин першого
    correction: двадцять хвилин на першу
    error_type: construction
    options:
    - двадцять хвилин на першу
    - у двадцять першого
    - двадцять після дванадцяти
    explanation: Для хвилин після рівної години традиційно вживається конструкція
      з прийменником «на» + знахідний відмінок.
  - sentence: Магазин закривається без п'ятнадцяти вісім.
    error: без п'ятнадцяти вісім
    correction: за чверть восьма
    error_type: construction
    options:
    - за чверть восьма
    - без чверті вісім
    - до восьми чверть
    explanation: «Без п'ятнадцяти» — це калька. Слід казати «за чверть восьма» або
      «за п'ятнадцять хвилин восьма».
  - sentence: Ми домовилися зустрітися в п'ять.
    error: в п'ять
    correction: о п'ятій
    error_type: construction
    options:
    - о п'ятій
    - у п'ять
    - на п'яту
    explanation: Правильна конструкція для часу вимагає порядкового числівника та
      прийменника «о».
- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Дати».
  prompt: Напишіть про свій день народження, дати важливих подій або яке сьогодні
    число, дотримуючись правил узгодження.
  min_words: 50
