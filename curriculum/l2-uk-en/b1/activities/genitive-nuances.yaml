version: '1.0'
module: genitive-nuances
level: b1
inline:
- id: reading-partitive-market
  type: reading
  instruction: Прочитайте текст про частковий родовий і дайте відповіді на запитання.
  passage: Сьогодні субота, і ми йдемо на Одеський ринок Привоз. Нам треба купити
    багато продуктів для борщу. Ми просимо кілограм картоплі, трохи капусти і шматок
    м'яса. Також нам потрібно багато часу, щоб знайти найсвіжіший домашній сир. Ми
    бажаємо знайти якісні продукти, бо вони варті нашої уваги. Вдома ми наллємо склянку
    холодної води після довгої прогулянки.
  questions:
  - Куди ми йдемо в суботу?
  - Скільки картоплі ми просимо в продавця?
  - Скільки м'яса ми хочемо купити?
  - Чого нам потрібно багато для пошуку сиру?
  - Чому ми шукаємо найсвіжіший сир?
  - Що ми наллємо вдома після прогулянки?
- id: fill-in-partitive-measures
  type: fill-in
  instruction: Вставте правильну граматичну форму у реченнях на тему частковий родовий.
  items:
  - sentence: Дайте мені, будь ласка, склянку холодної ____.
    answer: води
    options:
    - вода
    - води
    - воду
  - sentence: Ми купуємо кілограм червоних ____.
    answer: яблук
    options:
    - яблука
    - яблукам
    - яблук
  - sentence: Відріжте мені шматок свіжого ____.
    answer: хліба
    options:
    - хліб
    - хліба
    - хлібу
  - sentence: Для борщу треба купити пачку ____.
    answer: солі
    options:
    - сіль
    - солі
    - сіллю
  - sentence: У мене є тарілка гарячого ____.
    answer: борщу
    options:
    - борщ
    - борща
    - борщу
  - sentence: Дайте пів кілограма домашнього ____.
    answer: сиру
    options:
    - сир
    - сиру
    - сира
- id: quiz-partitive-quantifiers
  type: quiz
  instruction: Оберіть правильний варіант із квантифікаторами.
  items:
  - question: У мене зараз дуже мало вільного ____.
    options:
    - час
    - часу
    - часа
    - часом
    correct: 1
  - question: Вона щоранку п'є багато міцної ____.
    options:
    - кава
    - каву
    - каві
    - кави
    correct: 3
  - question: Додайте в цей пиріг ще трохи солодкого ____.
    options:
    - цукор
    - цукру
    - цукра
    - цукром
    correct: 1
  - question: На столі лежить чимало стиглих ____.
    options:
    - яблук
    - яблука
    - яблуки
    - яблуками
    correct: 0
  - question: Бармен поклав багато ____ у коктейль.
    options:
    - лід
    - ліда
    - льоду
    - льодом
    correct: 2
  - question: У мене є багато вірних ____.
    options:
    - друзі
    - друзів
    - друзям
    - друзями
    correct: 1
- id: essay-response-desires
  type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Родовий бажання,
    пошуку, досягнення».
  prompt: Складіть 5 речень, використовуючи дієслова бажати, потребувати, досягти,
    шукати або позбутися. Обов'язково використовуйте іменники в родовому відмінку.
  min_words: 50
  model_answer: 1. Я щиро бажаю вам великого щастя і здоров'я. 2. Наш новий проєкт
    потребує багато часу та зусиль. 3. Вона нарешті досягла своєї головної мети після
    довгих років праці. 4. Усе своє життя філософ шукав вічної правди. 5. Компанія
    намагається позбутися фінансової кризи.
- id: error-correction-genitive-verbs
  type: error-correction
  instruction: Знайдіть і виправте помилки у реченнях на тему родовий бажання, пошуку,
    досягнення.
  items:
  - sentence: Я щиро бажаю вам велике щастя.
    error: велике щастя
    correction: великого щастя
    error_type: phrase
    options:
    - великого щастя
    - великому щастю
    - великим щастям
    explanation: Дієслово «бажати» вимагає родового відмінка.
  - sentence: Цей новий проєкт потребує вільний час.
    error: вільний час
    correction: вільного часу
    error_type: phrase
    options:
    - вільного часу
    - вільному часу
    - вільним часом
    explanation: Дієслово «потребувати» вимагає родового відмінка.
  - sentence: Вона нарешті досягла свою головну мету.
    error: свою головну мету
    correction: своєї головної мети
    error_type: phrase
    options:
    - своєї головної мети
    - своїй головній меті
    - своєю головною метою
    explanation: Дієслово «досягти» вимагає родового відмінка.
  - sentence: Він щовечора шукає внутрішній спокій.
    error: внутрішній спокій
    correction: внутрішнього спокою
    error_type: phrase
    options:
    - внутрішнього спокою
    - внутрішньому спокою
    - внутрішнім спокоєм
    explanation: Абстрактні поняття після «шукати» стоять у родовому відмінку.
  - sentence: Він зміг позбутися свій найдавніший страх.
    error: свій найдавніший страх
    correction: свого найдавнішого страху
    error_type: phrase
    options:
    - свого найдавнішого страху
    - своєму найдавнішому страху
    - своїм найдавнішим страхом
    explanation: Дієслово «позбутися» вимагає родового відмінка.
  - sentence: Цей фільм справді вартий ваша увага.
    error: ваша увага
    correction: вашої уваги
    error_type: phrase
    options:
    - вашої уваги
    - вашій увазі
    - вашою увагою
    explanation: Прикметник «вартий» вимагає родового відмінка.
- id: match-up-desire-definitions
  type: match-up
  instruction: З'єднайте терміни з розділу «Родовий бажання, пошуку, досягнення» з
    їхніми перекладами.
  pairs:
  - left: бажати
    right: to wish / to desire
  - left: потребувати
    right: to need
  - left: досягти
    right: to achieve
  - left: позбутися
    right: to get rid of
  - left: набути
    right: to acquire
  - left: вартий
    right: worth / worthy of
- id: transformation-negation
  type: fill-in
  instruction: Змініть речення на заперечні. Вставте правильну форму слова.
  items:
  - sentence: У мене є вільний час. → У мене немає вільного ____.
    answer: часу
    options:
    - час
    - часу
    - часом
  - sentence: На столі є гарячий хліб. → На столі немає гарячого ____.
    answer: хліба
    options:
    - хліб
    - хлібу
    - хліба
  - sentence: Тут є моя сестра. → Тут немає моєї ____.
    answer: сестри
    options:
    - сестра
    - сестру
    - сестри
  - sentence: Вчора був сильний дощ. → Вчора не було сильного ____.
    answer: дощу
    options:
    - дощ
    - дощу
    - дощем
  - sentence: Завтра буде урок. → Завтра не буде ____.
    answer: уроку
    options:
    - урок
    - урока
    - уроку
  - sentence: Я бачив цього студента. → Я не бачив цього ____.
    answer: студента
    options:
    - студент
    - студенту
    - студента
