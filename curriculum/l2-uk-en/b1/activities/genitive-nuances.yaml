version: '1.0'
module: genitive-nuances
level: b1
inline:
- id: fill-in-partitive-measures
  type: fill-in
  instruction: Вставте правильну граматичну форму у реченнях на тему частковий родовий.
  items:
  - sentence: Дайте мені, будь ласка, склянку холодної ____.
    answer: води
    options:
    - вода
    - води
    - воду
  - sentence: Ми купуємо кілограм червоних ____.
    answer: яблук
    options:
    - яблука
    - яблукам
    - яблук
  - sentence: Відріжте мені шматок свіжого ____.
    answer: хліба
    options:
    - хліб
    - хліба
    - хлібу
  - sentence: Для борщу треба купити пачку ____.
    answer: солі
    options:
    - сіль
    - солі
    - сіллю
  - sentence: У мене є тарілка гарячого ____.
    answer: борщу
    options:
    - борщ
    - борща
    - борщу
  - sentence: Дайте пів кілограма домашнього ____.
    answer: сиру
    options:
    - сир
    - сиру
    - сира
- id: quiz-partitive-quantifiers
  type: quiz
  instruction: Оберіть правильний варіант із квантифікаторами.
  items:
  - question: У мене зараз дуже мало вільного ____.
    options:
    - час
    - часу
    - часа
    - часом
    correct: 1
  - question: Вона щоранку п'є багато міцної ____.
    options:
    - кава
    - каву
    - каві
    - кави
    correct: 3
  - question: Додайте в цей пиріг ще трохи солодкого ____.
    options:
    - цукор
    - цукру
    - цукра
    - цукром
    correct: 1
  - question: На столі лежить чимало стиглих ____.
    options:
    - яблук
    - яблука
    - яблуки
    - яблуками
    correct: 0
  - question: Бармен поклав багато ____ у коктейль.
    options:
    - лід
    - ліда
    - льоду
    - льодом
    correct: 2
  - question: У мене є багато вірних ____.
    options:
    - друзі
    - друзів
    - друзям
    - друзями
    correct: 1
- id: match-up-desire-definitions
  type: match-up
  instruction: З'єднайте терміни з розділу «Родовий бажання, пошуку, досягнення» з
    їхніми перекладами.
  pairs:
  - left: бажати
    right: to wish / to desire
  - left: потребувати
    right: to need
  - left: досягти
    right: to achieve
  - left: позбутися
    right: to get rid of
  - left: набути
    right: to acquire
  - left: вартий
    right: worth / worthy of
- id: transformation-negation
  type: fill-in
  instruction: Змініть речення на заперечні. Вставте правильну форму слова.
  items:
  - sentence: У мене є вільний час. → У мене немає вільного ____.
    answer: часу
    options:
    - час
    - часу
    - часом
  - sentence: На столі є гарячий хліб. → На столі немає гарячого ____.
    answer: хліба
    options:
    - хліб
    - хлібу
    - хліба
  - sentence: Тут є моя сестра. → Тут немає моєї ____.
    answer: сестри
    options:
    - сестра
    - сестру
    - сестри
  - sentence: Вчора був сильний дощ. → Вчора не було сильного ____.
    answer: дощу
    options:
    - дощ
    - дощу
    - дощем
  - sentence: Завтра буде урок. → Завтра не буде ____.
    answer: уроку
    options:
    - урок
    - урока
    - уроку
  - sentence: Я бачив цього студента. → Я не бачив цього ____.
    answer: студента
    options:
    - студент
    - студенту
    - студента
- id: quiz
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Частковий
    родовий».'
  items:
  - question: Немає мого старшого ____.
    options:
    - брата
    - брату
    - браті
    - братом
    correct: 0
  - question: На столі немає чистого ____.
    options:
    - зошиту
    - зошита
    - зошиті
    - зошитом
    correct: 1
  - question: Він щойно повернувся з ____.
    options:
    - Києва
    - Києву
    - Києві
    - Києвом
    correct: 0
  - question: Йому бракує життєвого ____.
    options:
    - досвіда
    - досвіду
    - досвідом
    - досвіді
    correct: 1
  - question: Вона не відчуває жодного ____.
    options:
    - страха
    - страху
    - страхом
    - страхі
    correct: 1
  - question: Ми купуємо кілограм ____.
    options:
    - цукра
    - цукру
    - цукром
    - цукрі
    correct: 1
- id: match-up-15
  type: match-up
  instruction: З'єднайте слово в називному відмінку з його формою в родовому відмінку
    однини.
  pairs:
  - left: студент
    right: студента
  - left: Київ
    right: Києва
  - left: зошит
    right: зошита
  - left: досвід
    right: досвіду
  - left: борщ
    right: борщу
  - left: Крим
    right: Криму
- id: fill-in-prepositions-complex
  type: fill-in
  instruction: Вставте правильний прийменник за змістом.
  items:
  - sentence: Я вип'ю чай ____ кави.
    answer: замість
    options:
    - замість
    - крім
    - серед
  - sentence: Працюють усі, ____ мене.
    answer: крім
    options:
    - крім
    - навколо
    - щодо
  - sentence: Сонце несподівано вийшло ____ хмар.
    answer: з-за
    options:
    - з-за
    - з-під
    - з-поміж
  - sentence: Кіт обережно виліз ____ столу.
    answer: з-під
    options:
    - з-під
    - з-за
    - з-поміж
  - sentence: Змагання скасували ____ поганої погоди.
    answer: внаслідок
    options:
    - внаслідок
    - щодо
    - навколо
  - sentence: Ми переклали текст ____ словника.
    answer: за допомогою
    options:
    - за допомогою
    - у разі
    - на відміну від
workbook:
- type: group-sort
  instruction: Розподіліть іменники за їхнім закінченням у родовому відмінку однини
    (-а/-я чи -у/-ю).
  groups:
  - label: Закінчення -а/-я (конкретні предмети, істоти)
    items:
    - брат
    - зошит
    - Київ
    - студент
    - автомобіль
    - ніж
  - label: Закінчення -у/-ю (абстрактні, речовини, регіони)
    items:
    - час
    - цукор
    - біль
    - борщ
    - вітер
    - Крим
- type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: I don't have free time.
    options:
    - text: У мене немає вільного часу.
      correct: true
    - text: У мене немає вільний час.
      correct: false
    - text: Я не маю вільний час.
      correct: false
  - source: There was no rain yesterday.
    options:
    - text: Вчора не було дощу.
      correct: true
    - text: Вчора не був дощ.
      correct: false
    - text: Вчора немає дощу.
      correct: false
  - source: He is looking for peace.
    options:
    - text: Він шукає спокою.
      correct: true
    - text: Він шукає спокій.
      correct: false
    - text: Він шукає спокоя.
      correct: false
  - source: This film is worth your attention.
    options:
    - text: Цей фільм вартий вашої уваги.
      correct: true
    - text: Цей фільм вартий ваша увага.
      correct: false
    - text: Цей фільм вартий вашу увагу.
      correct: false
  - source: She got rid of her fear.
    options:
    - text: Вона позбулася свого страху.
      correct: true
    - text: Вона позбулася свій страх.
      correct: false
    - text: Вона позбулася свого страха.
      correct: false
  - source: I wish you happiness.
    options:
    - text: Я бажаю вам великого щастя.
      correct: true
    - text: Я бажаю ви щастя.
      correct: false
    - text: Я бажаю вам великому щастю.
      correct: false
- type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - зустрінемося
    - наступного
    - Ми
    - вівторка.
    correct_order:
    - Ми
    - зустрінемося
    - наступного
    - вівторка.
  - words:
    - мене.
    - усі,
    - Працюють
    - крім
    correct_order:
    - Працюють
    - усі,
    - крім
    - мене.
  - words:
    - сонце
    - хмар.
    - з-за
    - Вийшло
    correct_order:
    - Вийшло
    - сонце
    - з-за
    - хмар.
  - words:
    - допомогою
    - за
    - словника.
    - Переклали
    correct_order:
    - Переклали
    - за
    - допомогою
    - словника.
  - words:
    - другого
    - Він
    - серпня.
    - народився
    correct_order:
    - Він
    - народився
    - другого
    - серпня.
  - words:
    - року.
    - минулого
    - до
    - Їздили
    - Карпат
    correct_order:
    - Їздили
    - до
    - Карпат
    - минулого
    - року.
- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Родовий бажання,
    пошуку, досягнення».
  prompt: Складіть 5 речень, використовуючи дієслова бажати, потребувати, досягти,
    шукати або позбутися. Обов'язково використовуйте іменники в родовому відмінку.
  min_words: 50
  model_answer: 1. Я щиро бажаю вам великого щастя і здоров'я. 2. Наш новий проєкт
    потребує багато часу та зусиль. 3. Вона нарешті досягла своєї головної мети після
    довгих років праці. 4. Усе своє життя філософ шукав вічної правди. 5. Компанія
    намагається позбутися фінансової кризи.
