- id: match-up-15
  type: match-up
  instruction: З'єднайте слово в називному відмінку з його формою в родовому відмінку
    однини.
  pairs:
  - left: студент
    right: студента
  - left: Київ
    right: Києва
  - left: зошит
    right: зошита
  - left: досвід
    right: досвіду
  - left: борщ
    right: борщу
  - left: Крим
    right: Криму
- id: fill-in-prepositions-complex
  type: fill-in
  instruction: Вставте правильний прийменник за змістом.
  items:
  - sentence: Я вип'ю чай ____ кави.
    answer: замість
    options:
    - замість
    - крім
    - серед
  - sentence: Працюють усі, ____ мене.
    answer: крім
    options:
    - крім
    - навколо
    - щодо
  - sentence: Сонце несподівано вийшло ____ хмар.
    answer: з-за
    options:
    - з-за
    - з-під
    - з-поміж
  - sentence: Кіт обережно виліз ____ столу.
    answer: з-під
    options:
    - з-під
    - з-за
    - з-поміж
  - sentence: Змагання скасували ____ поганої погоди.
    answer: внаслідок
    options:
    - внаслідок
    - щодо
    - навколо
  - sentence: Ми переклали текст ____ словника.
    answer: за допомогою
    options:
    - за допомогою
    - у разі
    - на відміну від
workbook:
- type: true-false
  instruction: Правда чи ні? Визначте, чи правильно використано родовий відмінок.
  items:
  - statement: «Сьогодні п'яте березня» — правильне речення.
    correct: true
    explanation: Число стоїть у називному відмінку, а місяць у родовому.
  - statement: «Моя відпустка починається десяте серпня» — правильне речення.
    correct: false
    explanation: 'Коли відповідаємо на запитання «коли?», і число, і місяць мають
      бути в родовому відмінку: «десятого серпня».'
  - statement: «Він народився у тисяча дев'ятсот дев'яностому році» — правильне речення.
    correct: false
    explanation: 'Для дат народження традиційно використовується родовий відмінок
      без прийменника «у»: «тисяча дев''ятсот дев''яностого року».'
  - statement: «Ми завершимо проєкт наступного тижня» — правильне речення.
    correct: true
    explanation: Слова з вказівними займенниками (цей, минулий, наступний) вимагають
      родового відмінка.
  - statement: «Ми зустрінемося наступного вівторка» — правильне речення.
    correct: true
    explanation: Для вказівки на конкретний «наступний» день тижня використовуємо
      родовий відмінок.
  - statement: 'У складених порядкових числівниках змінюються всі слова: «дві тисячі
      двадцять четвертого року».'
    correct: false
    explanation: Змінюється лише останнє слово (четвертого), решта залишаються у базовій
      формі.
- type: group-sort
  instruction: Розподіліть іменники за їхнім закінченням у родовому відмінку однини
    (-а/-я чи -у/-ю).
  groups:
  - label: Закінчення -а/-я (конкретні предмети, істоти)
    items:
    - брат
    - зошит
    - Київ
    - студент
    - автомобіль
    - ніж
  - label: Закінчення -у/-ю (абстрактні, речовини, регіони)
    items:
    - час
    - цукор
    - біль
    - борщ
    - вітер
    - Крим
