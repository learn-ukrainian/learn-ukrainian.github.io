  - sentence: Ми встигнемо на поїзд тільки якщо ти швидко збереш речі.
    error: поїзд тільки
    answer: поїзд, тільки
    options:
    - поїзд, тільки
    - поїзд тільки,
    - поїзд, тільки,
    - поїзд тільки
    explanation: Кома ставиться перед початком умовної частини.
    error_type: construction
  - sentence: Якщо ти хочеш навчитися добре говорити практикуйся щодня.
    error: говорити практикуйся
    answer: говорити, практикуйся
    options:
    - говорити, практикуйся
    - говорити практикуйся,
    - говорити, практикуйся,
    - говорити практикуйся
