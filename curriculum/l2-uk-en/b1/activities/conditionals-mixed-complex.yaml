- type: quiz
  title: 'Реальність чи гіпотеза: оберіть правильний варіант'
  instruction: Прочитайте опис ситуації та визначте, яке слово потрібно використати.
  items:
  - question: Яке слово ми використовуємо, коли подія є цілком реальною та можливою
      в майбутньому?
    explanation: Слово 'якщо' вказує на реальну умову.
    options:
    - text: якщо
      correct: true
    - text: якби
      correct: false
    - text: би
      correct: false
    - text: єслі
      correct: false
  - question: Як правильно висловити жаль з приводу події, яка не відбулася в минулому?
    explanation: Для нереальних, гіпотетичних умов ми використовуємо слово 'якби'.
    options:
    - text: використати слово 'якби'
      correct: true
    - text: використати слово 'якщо'
      correct: false
    - text: додати 'би' до 'якщо'
      correct: false
    - text: використати слово 'коли'
      correct: false
  - question: До якої частини мови або якого слова приєднується частка 'би' після
      приголосних?
    explanation: Частка 'би' ставиться після приголосних звуків для милозвучності.
    options:
    - text: до слова, що закінчується на приголосний
      correct: true
    - text: до слова, що закінчується на голосний
      correct: false
    - text: тільки до іменників
      correct: false
    - text: завжди на початку речення
      correct: false
  - question: Яке з цих слів є грубим русизмом і його слід обов'язково уникати?
    explanation: Слово 'єслі' — це російська калька, правильно українською — 'якщо'.
    options:
    - text: єслі
      correct: true
    - text: якщо
      correct: false
    - text: якби
      correct: false
    - text: коли
      correct: false
  - question: Чи потрібно ставити кому перед словом 'якщо', коли воно стоїть у середині
      речення?
    explanation: Так, кома перед умовною підрядною частиною ставиться завжди.
    options:
    - text: так, завжди потрібно
      correct: true
    - text: ні, ніколи не потрібно
      correct: false
    - text: тільки якщо речення довге
      correct: false
    - text: залежить від інтонації
      correct: false
  - question: Яка конструкція найкраще підходить для формальних ділових контрактів?
    explanation: В офіційно-діловому стилі найкраще використовувати конструкцію 'за
      умови'.
    options:
    - text: за умови
      correct: true
    - text: якщо
      correct: false
    - text: якби
      correct: false
    - text: єслі
      correct: false
  - question: Чи існує в українській мові правильна граматична конструкція 'якщо я
      би'?
    explanation: Ні, це груба помилка. Правильно казати 'якби'.
    options:
    - text: ні, це груба помилка
      correct: true
    - text: так, це літературна норма
      correct: false
    - text: так, але тільки в діловому стилі
      correct: false
    - text: так, тільки в розмовній мові
      correct: false
  - question: Яку частку треба використати у фразі 'вона читала [?]', щоб утворити
      умовний спосіб?
    explanation: Слово 'читала' закінчується на голосний, тому для милозвучності використовується
      частка 'б'.
    options:
    - text: б
      correct: true
    - text: би
      correct: false
    - text: же
      correct: false
    - text: то
      correct: false
  - question: Яким словом краще замінити розмовне 'якщо' в офіційному юридичному документі?
    explanation: В офіційно-діловому стилі перевага надається фразі 'за умови'.
    options:
    - text: за умови
      correct: true
    - text: коли
      correct: false
    - text: якби
      correct: false
    - text: доки
      correct: false
  - question: Чи змінюється форма дієслова в українській мові залежно від того, коли
      відбулася нереальна умова (вчора чи сьогодні)?
    explanation: Ні, форма дієслова (минулий час + би/б) залишається однаковою.
    options:
    - text: ні, форма однакова
      correct: true
    - text: так, існують різні часи
      correct: false
    - text: так, додається допоміжне дієслово
      correct: false
    - text: змінюється тільки закінчення
      correct: false
  - question: Як правильно передати англійське 'unless' в українському умовному реченні?
    explanation: Для обмеження використовується складений сполучник 'якщо не'.
    options:
    - text: якщо не
      correct: true
    - text: навіть якщо
      correct: false
    - text: доки
      correct: false
    - text: за умови
      correct: false
  - question: Яку функцію виконує кома в українському умовному реченні?
    explanation: Кома — це синтаксичний сигнал, що розділяє дві граматичні основи.
    options:
    - text: розділяє граматичні основи
      correct: true
    - text: показує емоцію мовця
      correct: false
    - text: ставиться за бажанням
      correct: false
    - text: відокремлює тільки вставні слова
      correct: false
- type: fill-in
  title: Оберіть правильний сполучник
  instruction: Доповніть речення правильним сполучником (якщо, якби, навіть якщо,
    якщо не, за умови).
  items:
  - sentence: '[answer] ми виграємо цей матч, ми станемо чемпіонами.'
    answer: Якщо
    options:
    - Якщо
    - Якби
    - За умови
    - Навіть якщо
    explanation: Це реальна умова в майбутньому.
  - sentence: Я б купив цей автомобіль, [answer] в мене були гроші.
    answer: якби
    options:
    - якби
    - якщо
    - за умови
    - якщо не
    explanation: Це нереальна, гіпотетична умова.
  - sentence: Ми гарантуємо доставку [answer] повної передоплати.
    answer: за умови
    options:
    - за умови
    - якщо
    - якби
    - доки
    explanation: В офіційно-діловому стилі перед іменником використовується 'за умови'.
  - sentence: Ми поїдемо на пікнік, [answer] піде дощ.
    answer: якщо не
    options:
    - якщо не
    - якби не
    - навіть якщо
    - за умови
    explanation: Це умова-обмеження.
  - sentence: '[answer] я знав правду, я б діяв інакше.'
    answer: Якби
    options:
    - Якби
    - Якщо
    - Доки
    - Навіть якщо
    explanation: Це нездійсненна умова в минулому.
  - sentence: Проект буде успішним, [answer] виникнуть проблеми.
    answer: навіть якщо
    options:
    - навіть якщо
    - за умови
    - якби
    - доки
    explanation: Тут підкреслюється рішучість і неминучість наслідку.
  - sentence: '[answer] ти закінчиш звіт, ми відправимо його клієнту.'
    answer: Якщо
    options:
    - Якщо
    - Якби
    - За умови
    - Навіть якби
    explanation: Реальна умова.
  - sentence: Ми чекатимемо тут, [answer] ви не повернетеся.
    answer: доки
    options:
    - доки
    - якщо
    - якби
    - за умови
    explanation: Часове обмеження.
  - sentence: Ми підпишемо цей контракт, [answer] ви зменшите ціну.
    answer: якщо
    options:
    - якщо
    - якби
    - навіть якщо
    - доки
    explanation: Реальна умова.
  - sentence: Він би з радістю допоміг, [answer] він не був таким зайнятим.
    answer: якби
    options:
    - якби
    - якщо
    - навіть якщо
    - доки
    explanation: Нереальна умова.
  - sentence: Конференція відбудеться онлайн, [answer] погіршення ситуації.
    answer: за умови
    options:
    - за умови
    - якщо
    - якби
    - доки
    explanation: Офіційний стиль.
  - sentence: Ми нічого не дізнаємося, [answer] не запитаємо його прямо.
    answer: якщо не
    options:
    - якщо не
    - якби не
    - навіть якщо
    - за умови
    explanation: Умова-обмеження.
