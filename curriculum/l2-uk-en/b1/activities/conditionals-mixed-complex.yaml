- type: quiz
  title: Логічні ланцюжки та діловий стиль
  items:
  - question: Яка з цих фраз є правильною формою для офіційного контракту?
    explanation: Конструкція 'за умови' є стандартом для ділового стилю.
    options:
    - text: за умови суворого дотримання
      correct: true
    - text: якщо ви будете суворо дотримуватися
      correct: false
    - text: єслі ви дотримаєтеся
      correct: false
    - text: коли ви дотримаєтеся
      correct: false
  - question: Який відмінок іменника завжди вимагає після себе конструкція 'за умови'?
    explanation: '''За умови'' вимагає родового відмінка (кого? чого?). Наприклад:
      за умови (чого?) фінансування.'
    options:
    - text: родовий відмінок
      correct: true
    - text: знахідний відмінок
      correct: false
    - text: давальний відмінок
      correct: false
    - text: називний відмінок
      correct: false
  - question: Як правильно почати логічний ланцюжок, щоб висловити дуже жорстке обмеження?
    explanation: Для жорсткого ультиматуму та обмеження використовують 'якщо не'.
    options:
    - text: якщо не
      correct: true
    - text: навіть якщо
      correct: false
    - text: за умови
      correct: false
    - text: доки
      correct: false
  - question: Який сполучник показує, що дія відбудеться попри будь-які перешкоди?
    explanation: '''Навіть якщо'' підкреслює непохитність наміру.'
    options:
    - text: навіть якщо
      correct: true
    - text: якщо не
      correct: false
    - text: якби
      correct: false
    - text: за умови
      correct: false
  - question: Що означає українське прислів'я 'Якби не макогін і качалка...' в контексті
      граматики?
    explanation: Воно демонструє коротку конструкцію 'якби не + іменник' для вказівки
      на причину чи перешкоду.
    options:
    - text: використання конструкції 'якби не'
      correct: true
    - text: використання ділового стилю
      correct: false
    - text: приклад реальної умови
      correct: false
    - text: правило написання коми
      correct: false
  - question: Чи можна замінити 'за умови' на 'якщо' у розмовній мові?
    explanation: Так, у побуті ми частіше кажемо 'якщо', але в документах — 'за умови'.
    options:
    - text: так, можна
      correct: true
    - text: ні, це категорично заборонено
      correct: false
    - text: тільки у письмових текстах
      correct: false
    - text: це змінить сенс речення
      correct: false
  - question: Як правильно сказати українською фразу 'If it weren't for the rain'?
    explanation: Конструкція 'якби не + іменник' є ідеальним перекладом.
    options:
    - text: якби не дощ
      correct: true
    - text: якщо не дощ
      correct: false
    - text: якби був не дощ
      correct: false
    - text: єслі не дощ
      correct: false
  - question: Що вказує на те, що подія в умовному реченні є суто гіпотетичною і не
      відбулася насправді?
    explanation: Частка 'би / б' перетворює реальний факт на ірреальну гіпотезу.
    options:
    - text: частка 'би / б'
      correct: true
    - text: сполучник 'якщо'
      correct: false
    - text: використання теперішнього часу
      correct: false
    - text: відсутність коми
      correct: false
  - question: Яка з цих конструкцій є найкращим прикладом умови-обмеження?
    explanation: Складений сполучник 'якщо не' встановлює жорстке обмеження для дії.
    options:
    - text: якщо не
      correct: true
    - text: якби
      correct: false
    - text: за умови
      correct: false
    - text: навіть якщо
      correct: false
  - question: Яке речення ілюструє змішаний тип 'минула умова — теперішній наслідок'?
    explanation: «Якби я тоді навчився, зараз я б знав».
    options:
    - text: Якби я вчора ліг раніше, зараз я б не хотів спати.
      correct: true
    - text: Якщо завтра буде сонце, ми підемо гуляти.
      correct: false
    - text: Я б допоміг тобі завтра, якби мав час.
      correct: false
    - text: Якби не дощ, ми б поїхали на озеро.
      correct: false
  - question: У якому стилі мовлення словосполучення 'за умови' є найбільш доречним?
    explanation: Ця конструкція є маркером офіційно-ділового стилю.
    options:
    - text: в офіційно-діловому стилі
      correct: true
    - text: у повсякденній розмові
      correct: false
    - text: у народних казках
      correct: false
    - text: у дружньому листуванні
      correct: false
  - question: Який розділовий знак є абсолютно обов'язковим для відділення умовної
      частини речення?
    explanation: В українському синтаксисі кома є обов'язковою.
    options:
    - text: кома
      correct: true
    - text: крапка
      correct: false
    - text: тире
      correct: false
    - text: двокрапка
      correct: false
