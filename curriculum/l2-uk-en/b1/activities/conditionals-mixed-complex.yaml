- type: fill-in
  title: Трансформація речень
  instruction: Доповніть друге речення так, щоб воно мало такий самий зміст, але з
    іншим сполучником.
  items:
  - sentence: Ми поїдемо в гори, тільки коли буде сонце. — Ми поїдемо в гори, [answer]
      буде сонце.
    answer: якщо
    options:
    - якщо
    - якби
    - доки
    - за умови
    explanation: Слово 'якщо' вводить реальну умову.
  - sentence: Без твоєї допомоги я б не впорався. — [answer] не твоя допомога, я б
      не впорався.
    answer: Якби
    options:
    - Якби
    - Якщо
