- type: error-correction
  title: 'Виправте помилки: русизми та кальки'
  instruction: Знайдіть і виправте одну помилку в кожному реченні. Оберіть правильний
    варіант.
  items:
  - sentence: Єслі ми виграємо матч, ми станемо чемпіонами.
    error: Єслі
    answer: Якщо
    options:
    - Якщо
    - Якби
    - Коли
    - Доки
    explanation: Слово 'єслі' — це грубий русизм. Правильно — 'якщо'.
    error_type: word
  - sentence: Я б із радістю поїхав, якщо я мав би час.
    error: якщо я мав би
    answer: якби я мав
    options:
    - якби я мав
    - єслі б я мав
    - якщо я маю
    - доки я маю
    explanation: Поєднання 'якщо' та 'би' — це калька. Правильно використовувати 'якби'.
    error_type: phrase
  - sentence: Будь-який студент складе іспит, єслі буде багато вчитися.
    error: єслі
    answer: якщо
    options:
    - якщо
    - якби
    - доки
    - навіть якщо
    explanation: Завжди використовуйте 'якщо' для реальних умов.
    error_type: word
  - sentence: Вона купила б цей будинок, якщо би в неї були гроші.
    error: якщо би
    answer: якби
    options:
    - якби
    - якщо
    - навіть якщо
    - за умови
    explanation: Замість монструозного 'якщо би' завжди кажіть 'якби'.
    error_type: word
  - sentence: Я допоміг би тобі, єслі б знав про твою проблему.
    error: єслі б
    answer: якби
    options:
    - якби
    - якщо
    - за умови
    - доки
    explanation: Подвійний русизм 'єслі б' слід замінити на українське 'якби'.
    error_type: word
  - sentence: Ми встигнемо на поїзд, якщо не будемо би затримуватися.
    error: будемо би
    answer: будемо
    options:
    - будемо
    - були б
    - були
    - будемо б
    explanation: У реальній умові ('якщо') частка 'би/б' не використовується взагалі.
    error_type: phrase
  - sentence: Якщо я мав би більше досвіду, я б отримав цю роботу.
    error: якщо я мав би
    answer: якби я мав
    options:
    - якби я мав
    - єслі б я мав
    - якщо маю
    - доки маю
    explanation: Правильна форма для нереальної умови — 'якби'.
    error_type: phrase
  - sentence: Він успішно складе тест, єслі підготується.
    error: єслі
    answer: якщо
    options:
    - якщо
    - якби
    - навіть якщо
    - доки
    explanation: Уникайте російського слова 'єслі'.
    error_type: word
  - sentence: Я б із радістю прочитав би цю статтю, якщо мав би час.
    error: якщо мав би
    answer: якби мав
    options:
    - якби мав
    - єслі мав
    - коли мав би
    - доки маю
    explanation: Гібрид 'якщо' і 'би' є помилкою.
    error_type: phrase
  - sentence: Якщо не було би дощу, ми б поїхали за місто.
    error: було би
    answer: було
    options:
    - було
    - був би
    - є
    - буде
    explanation: Слово 'якщо' вказує на реальність і не потребує частки 'би/б'.
    error_type: word
  - sentence: Я б зателефонував тобі, єслі б мав твій номер.
    error: єслі б
    answer: якби
    options:
    - якби
    - якщо
    - за умови
    - доки
    explanation: Використовуйте суто українське слово 'якби'.
    error_type: word
  - sentence: Вона прийде на зустріч, якщо тільки би не запізниться.
    error: тільки би
    answer: тільки
    options:
    - тільки
    - тільки б
    - тільки як
    - лише би
    explanation: Частка 'би' тут абсолютно зайва.
    error_type: phrase
- type: match-up
  title: Знайдіть логічний наслідок
  instruction: З'єднайте умову з її логічним наслідком.
  pairs:
  - left: Якби я знав, де впадеш,
    right: соломки підстелив би.
  - left: Якщо завтра буде гарна погода,
    right: ми обов'язково поїдемо в гори.
  - left: Якби не твій новий навігатор,
    right: ми б стовідсотково заблукали в лісі.
  - left: Я швидше закінчу цю важку роботу,
    right: якщо ти мені зараз допоможеш.
  - left: Я б учора дістав книгу з верхньої полиці,
    right: якби я був хоча б трохи вищим на зріст.
  - left: Цей міжнародний договір діятиме,
    right: виключно за умови дотримання всіх правил.
  - left: Я закінчу проект вчасно,
    right: навіть якщо ти мені взагалі не допоможеш.
  - left: Ми будемо чекати вас тут,
    right: доки ви не вирішите свої проблеми.
  - left: Я обов'язково виконаю цю обіцянку,
    right: навіть якщо це буде дуже важко.
  - left: Студент буде переведений на наступний курс,
    right: за умови успішного складання всіх іспитів.
  - left: Якби вони вчасно змінили стратегію,
    right: компанія не втратила б своїх клієнтів.
  - left: Ми не зможемо розпочати новий проект,
    right: якщо не отримаємо повного фінансування.
- type: fill-in
  title: 'Змішаний тип: підбір дієслів'
  instruction: Вставте правильну форму дієслова, звертаючи увагу на милозвучність
    (би/б).
  items:
  - sentence: Якби я вчора ліг спати раніше, я [answer] таким втомленим сьогодні.
    answer: не був би
    options:
    - не був би
    - не був б
    - не буду
    - не є
    explanation: Після приголосного 'в' ставимо 'би'.
  - sentence: Якби вони повірили в цю ідею раніше, вони [answer] мільйонерами зараз.
    answer: були б
    options:
    - були б
    - були би
    - будуть
    - є
    explanation: Після голосного 'и' ставимо 'б'.
  - sentence: Вона [answer] цю книгу з величезним задоволенням, якби мала час.
    answer: прочитала б
    options:
    - прочитала б
    - прочитала би
    - прочитає
    - прочитала
    explanation: Після голосного 'а' потрібна частка 'б'.
  - sentence: Студент [answer] домашнє завдання, якби зрозумів тему.
    answer: зробив би
    options:
    - зробив би
    - зробив б
    - зробить
    - робив
    explanation: Після приголосного 'в' потрібна частка 'би'.
  - sentence: Якби я був вищим, я б [answer] ту важку книгу з полиці.
    answer: дістав
    options:
    - дістав
    - дістану
    - діставав би
    - дістав б
    explanation: Частка 'б' вже стоїть перед дієсловом ('я б дістав').
  - sentence: Сестра обов'язково [answer] нам, якби ми її попросили.
    answer: допомогла б
    options:
    - допомогла б
    - допомогла би
    - допоможе
    - допомагала
    explanation: Після голосного 'а' пишемо 'б'.
  - sentence: Брат із радістю [answer] цей новий автомобіль.
    answer: купив би
    options:
    - купив би
    - купив б
    - купить
    - купував
    explanation: Після приголосного 'в' пишемо 'би'.
  - sentence: Якби не дощ, ми [answer] гуляти в парк.
    answer: пішли б
    options:
    - пішли б
    - пішли би
    - підемо
    - йдемо
    explanation: Після голосного 'и' використовуємо частка 'б'.
  - sentence: Якби я знав іноземні мови, я б [answer] за кордоном.
    answer: працював би
    options:
    - працював би
    - працював б
    - працюю
    - працюватиму
    explanation: Після приголосного 'в' потрібна частка 'би'.
  - sentence: Якби ми мали більше часу, ми [answer] ще один музей.
    answer: відвідали б
    options:
    - відвідали б
    - відвідали би
    - відвідаємо
    - відвідуємо
    explanation: Після голосного 'и' використовуємо частку 'б'.
  - sentence: Вони б з радістю [answer] на вашу пропозицію.
    answer: погодилися б
    options:
    - погодилися б
    - погодилися би
    - погодяться
    - погоджуються
    explanation: Після голосного 'я' потрібна частка 'б'.
  - sentence: Він [answer] лікарем, якби вступив до медичного університету.
    answer: став би
    options:
    - став би
    - став б
    - стане
    - стає
    explanation: Після приголосного 'в' використовується частка 'би'.
- type: error-correction
  title: 'Пунктуація: де сховалася кома?'
  instruction: Знайдіть і виправте синтаксичну помилку (додайте пропущену кому).
  items:
  - sentence: Ми поїдемо на пікнік якщо завтра не буде дощу.
    error: пікнік якщо
    answer: пікнік, якщо
    options:
    - пікнік, якщо
    - пікнік якщо,
    - пікнік, якщо,
    - пікнік якщо
    explanation: Кома перед підрядною умовною частиною ставиться ЗАВЖДИ.
    error_type: construction
  - sentence: Я б допоміг тобі з цим завданням якби мав вільний час.
    error: завданням якби
    answer: завданням, якби
    options:
    - завданням, якби
    - завданням якби,
    - завданням, якби,
    - завданням якби
    explanation: Підрядна частина з 'якби' завжди відокремлюється комою.
    error_type: construction
  - sentence: Проект буде успішним навіть якщо виникнуть проблеми.
    error: успішним навіть
    answer: успішним, навіть
    options:
    - успішним, навіть
    - успішним навіть,
    - успішним, навіть,
    - успішним навіть
    explanation: Кома ставиться перед усім складеним сполучником 'навіть якщо'.
    error_type: construction
  - sentence: Договір набуває чинності за умови що клієнт оплатить послугу.
    error: умови що
    answer: умови, що
    options:
    - умови, що
    - умови що,
    - умови, що,
    - умови що
    explanation: Перед словом 'що' у цій підрядній конструкції потрібна кома.
    error_type: construction
  - sentence: Я не зможу закінчити роботу якщо не отримаю допомогу.
    error: роботу якщо
    answer: роботу, якщо
    options:
    - роботу, якщо
    - роботу якщо,
    - роботу, якщо,
    - роботу якщо
