  instruction: Розташуйте слова у правильному порядку.
- type: true-false
  title: Правда чи брехня
  items:
  - statement: В українській мові після якщо можна використовувати теперішній час
      для опису майбутніх подій.
    correct: false
    explanation: Ні, умова в майбутньому завжди вимагає майбутнього часу.
  - statement: Сполучник коли вказує на те, що подія точно відбудеться.
    correct: true
    explanation: Так, коли використовується для подій, у яких мовець впевнений.
  - statement: Фраза що якщо часто використовується для пропозицій або припущень.
    correct: true
    explanation: Так, це природний спосіб почати дискусію про ймовірний сценарій.
  - statement: Слово наслідок завжди має позитивне значення.
    correct: false
    explanation: Слово наслідок частіше має нейтральне або негативне забарвлення.
  - statement: Для непрямих запитань треба використовувати частку чи, а не якщо.
    correct: true
    explanation: Сполучник якщо не використовується для запитань.
  - statement: Вираз у результаті є дуже природним для дружньої розмови.
    correct: false
    explanation: Це канцеляризм, краще використовувати через це або тому.
  - statement: Частка то у фразі якщо... то... підсилює логічний зв'язок між подіями.
    correct: true
    explanation: Так, вона робить акцент на результаті.
  - statement: Конструкція за умови вживається з іменником у родовому відмінку.
    correct: true
    explanation: 'Так, наприклад: за умови виконання.'
