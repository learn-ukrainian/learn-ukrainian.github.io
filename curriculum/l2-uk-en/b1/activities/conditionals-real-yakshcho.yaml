- type: quiz
  title: Граматика умовних речень
  items:
  - question: Який час дієслова використовується після слова якщо для подій у майбутньому?
    options:
    - text: майбутній
      correct: true
    - text: теперішній
      correct: false
    - text: минулий
      correct: false
    - text: будь-який
      correct: false
    explanation: В українській мові умова в майбутньому завжди вимагає майбутнього
      часу.
  - question: Яке слово вказує на абсолютну впевненість у тому, що подія відбудеться?
    options:
    - text: коли
      correct: true
    - text: якщо
      correct: false
    - text: чи
      correct: false
    - text: ніби
      correct: false
    explanation: Слово коли використовується для неминучих подій.
  - question: Для чого в реченні використовується подвійний сполучник якщо то?
    options:
    - text: для підсилення логічного зв'язку
      correct: true
    - text: для вираження сумніву
      correct: false
    - text: для створення запитання
      correct: false
    - text: для вираження нереальної умови
      correct: false
    explanation: Частка то акцентує увагу на результаті та підсилює зв'язок.
  - question: Яку частку треба використовувати замість якщо для створення непрямого
      запитання?
    options:
    - text: чи
      correct: true
    - text: то
      correct: false
    - text: що
      correct: false
    - text: би
      correct: false
    explanation: Непрямі запитання в українській мові вводяться часткою чи.
  - question: Який відтінок значення має словосполучення навіть якщо у складнопідрядному
      реченні?
    options:
    - text: поступки та невідворотності
      correct: true
    - text: повної неможливості
      correct: false
    - text: суворої заборони
      correct: false
    - text: часової послідовності
      correct: false
    explanation: Ця конструкція показує, що умова не змінить очікуваного результату.
  - question: Як найприродніше замінити формальне слово унаслідок у дружній розмові?
    options:
    - text: через це
      correct: true
    - text: за умови
      correct: false
    - text: у разі
      correct: false
    - text: згідно з
      correct: false
    explanation: У розмовному стилі краще використовувати простіші вирази, такі як
      через це або тому.
  - question: З яким іменником часто асоціюється слово результат у повсякденному спілкуванні?
    options:
    - text: з позитивним досягненням
      correct: true
    - text: з негативною проблемою
      correct: false
    - text: з неминучою катастрофою
      correct: false
    - text: з абстрактною ідеєю
      correct: false
    explanation: Слово результат зазвичай має позитивне забарвлення.
  - question: З якою інтонацією зазвичай вимовляється на початку речення фраза що
      якщо?
    options:
    - text: запитання або пропозиції
      correct: true
    - text: наказу або команди
      correct: false
    - text: ствердження факту
      correct: false
    - text: суворої заборони
      correct: false
    explanation: Ця фраза створює інтонацію запитання, пропозиції або легкого занепокоєння.
  instruction: Оберіть правильну відповідь.
- type: match-up
  title: Лексичні відповідники та колокації
  pairs:
  - left: позитивний
    right: результат
  - left: небезпечні
    right: наслідки
  - left: за умови
    right: виконання
  - left: у разі
    right: якщо
  - left: навіть
    right: якщо
  - left: ймовірний
    right: сценарій
  - left: реальна
    right: можливість
  - left: обов'язкова
    right: умова
  instruction: З'єднайте відповідні елементи.
- type: fill-in
  title: Вставте пропущене слово
  items:
  - sentence: Якщо завтра _____ дощ, ми залишимося вдома.
    answer: піде
    options:
    - піде
    - йде
    - йшов
    - пішов
  - sentence: Якщо ти _____ цей проєкт вчасно, то отримаєш премію.
    answer: закінчиш
    options:
    - закінчиш
    - закінчуєш
    - закінчив
    - закінчити
  - sentence: Я не знаю, _____ він зможе прийти на нашу зустріч.
    answer: чи
    options:
    - чи
    - якщо
    - коли
    - то
  - sentence: Ми завершимо будівництво вчасно, _____ що матеріали доставлять завтра.
    answer: за умови
    options:
    - за умови
    - у разі
    - через це
    - навіть якщо
  - sentence: _____ якщо квитки будуть дорогими, я піду на концерт.
    answer: Навіть
    options:
    - Навіть
    - Що
    - Коли
    - То
  - sentence: _____ ми спробуємо інший метод вирішення цієї проблеми?
    answer: Що якщо
    options:
    - Що якщо
    - За умови
    - У разі
    - Коли
  - sentence: _____ я закінчу писати звіт, я відразу відправлю його вам.
    answer: Коли
    options:
    - Коли
    - Якщо
    - Чи
    - Ніби
  - sentence: Ця помилка може мати дуже серйозні _____ для нашої компанії.
    answer: наслідки
    options:
    - наслідки
    - результати
    - умови
    - можливості
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: error-correction
  title: Виправте граматичні та лексичні помилки
  items:
  - sentence: Якщо ти приходиш завтра, ми зможемо обговорити всі деталі проєкту.
    error: приходиш
    answer: прийдеш
    options:
    - прийдеш
    - прийти
    - прийшов
    - приходячи
    explanation: Якщо дія стосується майбутнього, після якщо треба використовувати
      майбутній час.
  - sentence: Запитай у менеджера, якщо ми можемо взяти вихідний у п'ятницю.
    error: якщо
    answer: чи
    options:
    - чи
    - коли
    - щоб
    - ніби
    explanation: Непряме запитання вводиться часткою чи, а не сполучником якщо.
  - sentence: Пішов сильний сніг, і у результаті ми скасували нашу подорож.
    error: у результаті
    answer: через це
    error_type: phrase
    options:
    - через це
    - за умови
    - у разі
    - якщо
    explanation: У розмовному стилі краще уникати канцеляризму у результаті.
  - sentence: Коли завтра буде дощ, ми не поїдемо на природу.
    error: Коли
    answer: Якщо
    options:
    - Якщо
    - Чи
    - Що
    - То
    explanation: З явищами погоди, які не є абсолютно гарантованими, краще вживати
      якщо.
  - sentence: Ми дуже довго працювали і нарешті отримали чудовий наслідок.
    error: наслідок
    answer: результат
    options:
    - результат
    - варіант
    - сценарій
    - крок
    explanation: Для опису позитивного досягнення використовують слово результат.
  - sentence: Якщо я знаходжу твої ключі, я тобі відразу зателефоную.
    error: знаходжу
    answer: знайду
    options:
    - знайду
    - знайти
    - знаходив
    - знаходячи
    explanation: Процес знаходження в майбутньому вимагає дієслова в майбутньому часі.
