- type: quiz
  title: 'Теоретичні знання про дієприкметники'
  instruction: 'Оберіть правильну відповідь на запитання про українські дієприкметники.'
  items:
    - question: 'Який суфікс є ознакою нормативного активного дієприкметника минулого часу?'
      explanation: 'Суфікс -л- вказує на минулий час і є стилістично правильним.'
      options:
        - text: '-л-'
          correct: true
        - text: '-уч-'
          correct: false
        - text: '-ач-'
          correct: false
        - text: '-юч-'
          correct: false
    - question: 'Як правильно назвати людину, яка керує кафедрою в університеті?'
      explanation: 'Назви посад утворюються за допомогою суфікса -ач, а не -ючий.'
      options:
        - text: 'завідувач'
          correct: true
        - text: 'завідуючий'
          correct: false
        - text: 'завідувати'
          correct: false
        - text: 'керівний'
          correct: false
    - question: 'До якої частини мови історично належить слово родючий сьогодні?'
      explanation: 'Це слово втратило дієслівні ознаки і стало повноцінним прикметником.'
      options:
        - text: 'прикметник'
          correct: true
        - text: 'іменник'
          correct: false
        - text: 'дієслово'
          correct: false
        - text: 'прислівник'
          correct: false
    - question: 'Яка синтаксична конструкція найкраще замінює штучні дієприкметники теперішнього часу?'
      explanation: 'Відносне підрядне речення зі словом який є найкращою стилістичною заміною.'
      options:
        - text: 'відносне речення'
          correct: true
        - text: 'дієприслівник'
          correct: false
        - text: 'пасивний стан'
          correct: false
        - text: 'безособове речення'
          correct: false
    - question: 'Яке слово є найкращим відповідником до канцелярського вислову оточуюче середовище?'
      explanation: 'Довкілля — це влучний питомий іменник для цього поняття.'
      options:
        - text: 'довкілля'
          correct: true
        - text: 'природа'
          correct: false
        - text: 'атмосфера'
          correct: false
        - text: 'суспільство'
          correct: false
    - question: 'У яких категоріях дієприкметник обов''язково узгоджується з головним іменником?'
      explanation: 'Дієприкметник завжди узгоджується в роді, числі та відмінку.'
      options:
        - text: 'рід, число, відмінок'
          correct: true
        - text: 'час, особа, стан'
          correct: false
        - text: 'вид, рід, число'
          correct: false
        - text: 'відмінок, особа, час'
          correct: false
    - question: 'Як правильно перекласти українською мовою англійське словосполучення working group?'
      explanation: 'Робоча група — це єдиний правильний варіант в офіційно-діловому стилі.'
      options:
        - text: 'робоча група'
          correct: true
        - text: 'працююча група'
          correct: false
        - text: 'дієва група'
          correct: false
        - text: 'активна група'
          correct: false
    - question: 'Яке з цих слів належить до безпечного списку лексикалізованих форм?'
      explanation: 'Слово цілющий фіксує постійну рису і є літературною нормою.'
      options:
        - text: 'цілющий'
          correct: true
        - text: 'існуючий'
          correct: false
        - text: 'бажаючі'
          correct: false
        - text: 'оточуючий'
          correct: false

