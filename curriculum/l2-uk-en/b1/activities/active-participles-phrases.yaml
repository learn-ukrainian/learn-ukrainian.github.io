- type: fill-in
  title: 'Узгодження дієприкметників з іменниками'
  instruction: 'Оберіть правильну форму дієприкметника минулого часу для кожного речення.'
  items:
    - sentence: 'На землі лежало багато опалого листя.'
      answer: 'опалого'
      options:
        - 'опалого'
        - 'опалий'
        - 'опалим'
        - 'опалому'
      explanation: 'Слово листя стоїть у родовому відмінку однини, тому дієприкметник має закінчення -ого.'
    - sentence: 'Ми довго милувалися зжовклими деревами у нашому парку.'
      answer: 'зжовклими'
      options:
        - 'зжовклими'
        - 'зжовклі'
        - 'зжовклих'
        - 'зжовклим'
      explanation: 'Деревами — це орудний відмінок множини, закінчення дієприкметника має бути -ими.'
    - sentence: 'У цьому саду зібрали найкращі достиглі яблука.'
      answer: 'достиглі'
      options:
        - 'достиглі'
        - 'достиглих'
        - 'достиглими'
        - 'достигле'
      explanation: 'Яблука — це знахідний відмінок множини неістоти, форма збігається з називним.'
    - sentence: 'Вона обережно підняла з землі зів''ялий букет квітів.'
      answer: 'зів''ялий'
      options:
        - 'зів''ялий'
        - 'зів''ялого'
        - 'зів''ялому'
        - 'зів''ялим'
      explanation: 'Букет — це знахідний відмінок однини чоловічого роду неістоти.'
    - sentence: 'На посивілому волоссі дідуся блищали краплі ранкової роси.'
      answer: 'посивілому'
      options:
        - 'посивілому'
        - 'посивілим'
        - 'посивілого'
        - 'посивілий'
      explanation: 'Волоссі — місцевий відмінок однини середнього роду.'
    - sentence: 'Хлопець дивився на неї помарнілим від довгої хвороби обличчям.'
      answer: 'помарнілим'
      options:
        - 'помарнілим'
        - 'помарнілому'
        - 'помарнілого'
        - 'помарніле'
      explanation: 'Обличчям — орудний відмінок однини середнього роду.'
    - sentence: 'Ця цілюща вода допомагає від багатьох серйозних хвороб.'
      answer: 'цілюща'
      options:
        - 'цілюща'
        - 'цілющу'
        - 'цілющої'
        - 'цілющою'
      explanation: 'Вода — називний відмінок однини жіночого роду.'
    - sentence: 'Вони збудували новий дім на дуже родючій землі.'
      answer: 'родючій'
      options:
        - 'родючій'
        - 'родючу'
        - 'родючою'
        - 'родючої'
      explanation: 'Землі — місцевий відмінок однини жіночого роду.'

