- type: quiz
  title: Перевірте свої знання
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
  - question: Яке слово найкраще описує креативний задум або новий план дій?
    explanation: Ідея означає творчий задум, який можна втілити в життя.
    options:
    - text: ідея
      correct: true
    - text: думка
      correct: false
    - text: вигляд
      correct: false
    - text: аргумент
      correct: false
  - question: Як правильно описати зовнішність людини, яка гарно виглядає?
    explanation: Для опису фізичної зовнішності завжди використовується слово вигляд,
      а не погляд.
    options:
    - text: У неї гарний вигляд.
      correct: true
    - text: У неї гарний погляд.
      correct: false
    - text: У неї гарна думка.
      correct: false
    - text: У неї гарне бачення.
      correct: false
  - question: Яке слово ми використовуємо для позначення глибокої та твердої віри
      людини?
    explanation: Переконання — це сильна віра та основа моральних цінностей людини.
    options:
    - text: переконання
      correct: true
    - text: суперечка
      correct: false
    - text: погляд
      correct: false
    - text: гіпотеза
      correct: false
  - question: Яким суфіксом найчастіше утворюються академічні абстрактні іменники
      від дієслів?
    explanation: Суфікс -ння є найпродуктивнішим для створення абстрактних іменників
      (розуміти — розуміння).
    options:
    - text: суфіксом -ння
      correct: true
    - text: суфіксом -ка
      correct: false
    - text: без суфікса
      correct: false
    - text: суфіксом -ість
      correct: false
  - question: Яке слово означає спокійне логічне обґрунтування вашої позиції під час
      дискусії?
    explanation: Аргумент — це інструмент логіки, який не має негативного емоційного
      забарвлення.
    options:
    - text: аргумент
      correct: true
    - text: суперечка
      correct: false
    - text: переконання
      correct: false
    - text: ідеал
      correct: false
  - question: Як правильно українською мовою сказати фразу "in my opinion"?
    explanation: Стандартна українська конструкція звучить як на мою думку.
    options:
    - text: на мою думку
      correct: true
    - text: на мою ідею
      correct: false
    - text: на мій вигляд
      correct: false
    - text: за моїм аргументом
      correct: false
  - question: Яке абстрактне слово позначає моральне або конкретне етичне правило
      поведінки?
    explanation: Принцип — це конкретне правило або закон, за яким людина діє.
    options:
    - text: принцип
      correct: true
    - text: теорія
      correct: false
    - text: вигляд
      correct: false
    - text: осяяння
      correct: false
  - question: Як правильно сказати, якщо ваші ідеї з колегою зовсім не співпадають?
    explanation: Стійка колокація думки розбігаються означає наявність різних поглядів.
    options:
    - text: наші думки розбігаються
      correct: true
    - text: наші ідеї сваряться
      correct: false
    - text: ми маємо суперечку
      correct: false
    - text: ми пішли на принцип
      correct: false
- type: true-false
  title: Правда чи неправда
  instruction: Визначте, чи є твердження правильними.
  items:
  - statement: Слово суперечка означає конструктивне та спокійне логічне обґрунтування
      своєї позиції.
    correct: false
    explanation: Суперечка — це емоційний конфлікт. Логічне обґрунтування — це аргумент.
  - statement: 'В українській мові правильно говорити: У мене є ідея про цей новий
      фільм.'
    correct: false
    explanation: 'Правильно казати: У мене є думка про фільм. Ідея стосується створення
      чогось нового.'
  - statement: Слово погляд можна використовувати як для вираження думки, так і для
      опису фізичної зовнішності людини.
    correct: false
    explanation: Для опису зовнішності завжди використовується слово вигляд.
  - statement: Конструкція Я глибоко переконаний, що... використовується для вираження
      високого рівня впевненості.
    correct: true
    explanation: Ця фраза підкреслює сильну віру та непохитність вашої позиції.
  - statement: Слово принцип описує глобальний абстрактний ідеал, а цінність — конкретне
      правило поведінки.
    correct: false
    explanation: 'Навпаки: цінність — це абстрактний ідеал, а принцип — це правило
      поведінки.'
  - statement: Фраза втілювати ідею в життя означає успішно реалізовувати свій креативний
      задум на практиці.
    correct: true
    explanation: Це дуже поширена та правильна колокація в діловому та щоденному мовленні.
  - statement: 'Абстрактні іменники часто утворюються від дієслів, наприклад: розуміти
      стає іменником розуміння.'
    correct: true
    explanation: Суфікс -ння успішно перетворює дієслово на абстрактний академічний
      іменник.
  - statement: Філософ Григорій Сковорода створив концепцію сродної праці, яка означає
      роботу за внутрішнім покликанням.
    correct: true
    explanation: Ця концепція підкреслює важливість роботи, яка ідеально відповідає
      талантам людини.
