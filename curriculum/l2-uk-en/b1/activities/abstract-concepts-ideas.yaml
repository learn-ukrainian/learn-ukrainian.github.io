- type: cloze
  title: Заповніть пропуски
  instruction: Оберіть правильне слово для кожного пропуску в тексті.
  passage: Сучасне {{1}} постійно обговорює складні абстрактні поняття. Щоб створити
    щось принципово нове, людям потрібна креативна {{2}}. Водночас дуже важливо розуміти,
    що моя суб'єктивна {{3}} не завжди є абсолютною істиною для інших. Під час серйозної
    {{4}} люди часто висловлюють різний {{5}} на одну й ту саму проблему. Щоб переконати
    інших учасників, необхідно навести вагомий і логічний {{6}}, а не просто починати
