- type: match-up
  title: 'Знайдіть пару: концепція та її значення'
  instruction: Поєднайте кожне абстрактне поняття з його правильним описом.
  pairs:
  - left: ідея
    right: креативний задум або новий план дій
  - left: думка
    right: особиста суб'єктивна оцінка ситуації
  - left: переконання
    right: глибока і тверда моральна віра людини
  - left: цінність
    right: абстрактний ідеал, важливий для суспільства
  - left: принцип
    right: конкретне жорстке правило поведінки
  - left: аргумент
    right: логічне обґрунтування вашої позиції
  - left: суперечка
    right: емоційний конфлікт або гучна сварка
  - left: гіпотеза
    right: наукове припущення для подальшого дослідження
  - left: світогляд
    right: система уявлень і поглядів на життя
  - left: оцінка
    right: визначення вартості або значення чогось
  - left: бачення
    right: стратегічна перспектива розвитку подій
  - left: розуміння
    right: здатність осягнути глибокий зміст
- type: fill-in
  title: Вставте пропущене слово
  instruction: Оберіть правильний абстрактний іменник для кожного речення.
  items:
  - sentence: Я глибоко поважаю його демократичні ___.
    answer: переконання
    options:
    - переконання
    - вигляди
    - переконати
    - суперечки
    explanation: Тверда внутрішня віра людини називається переконанням.
  - sentence: Основна ___ нашого проєкту дуже проста та ефективна.
    answer: ідея
    options:
    - ідея
    - думка
    - оцінка
    - суперечка
    explanation: Креативний задум щодо проєкту — це ідея.
  - sentence: Ми довго дискутували і нарешті дійшли спільної ___.
    answer: думки
    options:
    - думки
    - ідеї
    - гіпотези
    - істини
    explanation: Спільне рішення або згода називається спільною думкою.
  - sentence: Ця інноваційна ___ повністю змінює наше розуміння історії.
    answer: концепція
    options:
    - концепція
    - бачення
    - вигляд
    - суперечка
    explanation: Система поглядів або стратегічний план — це концепція.
  - sentence: Він навів дуже вагомий ___ на користь своєї позиції.
    answer: аргумент
    options:
    - аргумент
    - принцип
    - вигляд
    - ідеал
    explanation: Логічне обґрунтування під час дискусії називається аргументом.
  - sentence: Моє стратегічне ___ розвитку компанії базується на інноваціях.
    answer: бачення
    options:
    - бачення
    - бачити
    - погляд
    - вигляд
    explanation: Від дієслова бачити утворюється іменник бачення.
  - sentence: Кожна людина має повне право зробити власний моральний ___.
    answer: вибір
    options:
    - вибір
    - вибирати
    - осяяння
    - аргумент
    explanation: Результат процесу вибирання — це вибір.
  - sentence: Вони постійно вступають у гарячу ___ замість спокійного діалогу.
    answer: суперечку
    options:
    - суперечку
    - аргумент
    - істину
    - гіпотезу
    explanation: Емоційний і часто негативний конфлікт — це суперечка.
