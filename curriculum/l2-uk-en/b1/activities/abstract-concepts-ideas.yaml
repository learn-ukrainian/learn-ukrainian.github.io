- type: error-correction
  title: Виправте помилки
  instruction: Знайдіть та виправте одне неправильно вжите слово в кожному реченні.
  items:
  - sentence: У мене є одна цікава ідея про твою нову зачіску.
    error: ідея
    answer: думка
    options:
    - думка
    - оцінка
    - гіпотеза
    - суперечка
    explanation: Коли ви оцінюєте щось наявне, ви висловлюєте думку, а не ідею.
  - sentence: Сьогодні ти маєш дуже красивий погляд у цій новій сукні.
    error: погляд
    answer: вигляд
    options:
    - вигляд
    - образ
    - стиль
    - смак
    explanation: Для опису фізичної привабливості чи зовнішності завжди використовується
      слово вигляд.
  - sentence: Вони почали великий аргумент на кухні через політику.
    error: аргумент
    answer: суперечку
    options:
    - суперечку
    - дебати
    - істину
    - теорію
    explanation: Емоційний та гучний конфлікт — це суперечка. Аргумент — це логічний
      довід.
  - sentence: Ми повинні реалізувати цю концепцію у життя якомога швидше.
    error: реалізувати
    answer: втілити
    options:
    - втілити
    - зробити
    - поставити
    - закінчити
    explanation: 'Стійка правильна колокація звучить як: втілювати ідею або концепцію
      в життя.'
  - sentence: Наші ідеї кардинально розбігаються у цьому надзвичайно складному питанні.
    error: ідеї
    answer: думки
    options:
    - думки
    - принципи
    - аргументи
    - бачення
    explanation: Українська стійка фраза звучить як думки розбігаються, коли люди
      не погоджуються.
  - sentence: Я глибоко вірю, що треба завжди йти на цінність і захищати свої права
      до кінця.
    error: цінність
    answer: принцип
    options:
    - принцип
    - суперечку
    - аргумент
    - справедливість
    explanation: 'Правильний вислів: піти на принцип, що означає твердо дотримуватися
      свого правила.'
- type: mark-the-words
  title: Знайдіть абстрактні іменники
