- type: quiz
  title: "Вибір прийменника напрямку"
  instruction: "Оберіть правильний варіант прийменника для кожного речення."
  items:
    - question: "Який прийменник потрібен у реченні: Я йду ___ лікаря?"
      options:
        - text: "до"
          correct: true
        - text: "в"
          correct: false
        - text: "на"
          correct: false
        - text: "у"
          correct: false
      explanation: "Рух до особи завжди вимагає прийменника до."
    - question: "Яке слово пропущене в цьому реченні: Вона сіла ___ автобус?"
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "у"
          correct: false
        - text: "до"
          correct: false
      explanation: "Для транспорту ми використовуємо конструкцію сісти на."
    - question: "Куди поїхали друзі на вихідні: Ми їдемо ___ море?"
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "до"
          correct: false
        - text: "у"
          correct: false
      explanation: "Відкриті поверхні та водойми вимагають прийменника на."
    - question: "Який прийменник вказує на закритий простір: Вони пішли ___ парк?"
      options:
        - text: "у"
          correct: true
        - text: "на"
          correct: false
        - text: "до"
          correct: false
        - text: "повз"
          correct: false
      explanation: "Парк розглядається як територія з межами (у/в парк)."
    - question: "Яке слово підходить для цього речення: Машина заїхала ___ гараж?"
      options:
        - text: "в"
          correct: true
        - text: "на"
          correct: false
        - text: "до"
          correct: false
        - text: "за"
          correct: false
      explanation: "Гараж — це закрите приміщення."
    - question: "Який прийменник використовується з відкритими поверхнями: Туристи піднялися ___ гору?"
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "до"
          correct: false
        - text: "у"
          correct: false
      explanation: "Гора — це поверхня, тому на гору."
    - question: "Що ми скажемо про подорож на вокзал: Він поїхав ___ вокзал?"
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "до"
          correct: false
        - text: "у"
          correct: false
      explanation: "Слово вокзал історично вимагає прийменника на."
    - question: "Який традиційний прийменник використовується тут: Я щоранку ходжу ___ пошту?"
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "до"
          correct: false
        - text: "у"
          correct: false
      explanation: "Пошта, як і вокзал та фабрика, вимагає на."
    - question: "Який прийменник вказує на наближення до іншого міста: Друзі поїхали ___ Київ?"
      options:
        - text: "до"
          correct: true
        - text: "в"
          correct: false
        - text: "на"
          correct: false
        - text: "у"
          correct: false
      explanation: "Коли ми акцентуємо маршрут до іншого населеного пункту, вживаємо до."
    - question: "Як правильно сказати про вхід у кімнату: Студенти зайшли ___ аудиторію?"
      options:
        - text: "в"
          correct: true
        - text: "на"
          correct: false
        - text: "до"
          correct: false
        - text: "біля"
          correct: false
      explanation: "Аудиторія — це приміщення (в/у)."
    - question: "Який прийменник потрібен для підземного транспорту: Ми спустилися ___ метро?"
      options:
        - text: "у"
          correct: true
        - text: "на"
          correct: false
        - text: "до"
          correct: false
        - text: "по"
          correct: false
      explanation: "Метро розглядається як закрита підземна система (у/в)."
    - question: "Що ми скажемо про зміну напрямку: Вона повернула ___ перехресті?"
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "у"
          correct: false
        - text: "до"
          correct: false
      explanation: "Місцезнаходження (де?) на перехресті."

- type: fill-in
  title: "Орієнтування в місті"
  instruction: "Доповніть речення словами для навігації."
  items:
    - sentence: "Пройдіть прямо і на другому перехресті поверніть _____."
      answer: "ліворуч"
      options:
        - "ліворуч"
        - "праворуч"
        - "назад"
        - "вгору"
    - sentence: "Щоб дійти до театру, вам треба йти _____ цією вулицею."
      answer: "прямо"
      options:
        - "прямо"
        - "криво"
        - "швидко"
        - "повільно"
    - sentence: "Зупинка автобуса знаходиться на _____."
      answer: "розі"
      options:
        - "розі"
        - "куті"
        - "краю"
        - "кінці"
    - sentence: "Спочатку перейдіть дорогу біля _____."
      answer: "світлофора"
      options:
        - "світлофора"
        - "магазину"
        - "дерева"
        - "парку"
    - sentence: "Потім спустіться у підземний _____."
      answer: "перехід"
      options:
        - "перехід"
        - "тунель"
        - "коридор"
        - "метро"
    - sentence: "Вам потрібно сісти _____ п'ятий трамвай."
      answer: "на"
      options:
        - "на"
        - "в"
        - "у"
        - "до"
    - sentence: "Вийдіть на третій _____."
      answer: "зупинці"
      options:
        - "зупинці"
        - "станції"
        - "платформі"
        - "площі"
    - sentence: "Якщо ви заблукаєте, запитайте _____ у перехожих."
      answer: "напрямок"
      options:
        - "напрямок"
        - "маршрут"
        - "шлях"
        - "дорогу"
    - sentence: "Ми вирішили прокласти новий _____, щоб уникнути заторів."
      answer: "маршрут"
      options:
        - "маршрут"
        - "план"
        - "шлях"
        - "графік"
    - sentence: "Будівля великого музею буде _____ від вас."
      answer: "праворуч"
      options:
        - "праворуч"
        - "ліворуч"
        - "прямо"
        - "ззаду"
    - sentence: "Не забудьте _____ на наступному перехресті."
      answer: "повернути"
      options:
        - "повернути"
        - "піти"
        - "зайти"
        - "стати"
    - sentence: "Ваша _____ пролягає через історичний центр міста."
      answer: "траєкторія"
      options:
        - "траєкторія"
        - "лінія"
        - "смуга"
        - "дорога"

- type: fill-in
  title: "Моя Одіссея: подорож у гори"
  instruction: "Вставте пропущені слова у розповідь про подорож."
  items:
    - sentence: "Минулого літа ми поїхали _____ Карпати."
      answer: "в"
      options:
        - "в"
        - "на"
        - "до"
        - "під"
    - sentence: "_____ ми купили квитки на нічний поїзд."
      answer: "Спочатку"
      options:
        - "Спочатку"
        - "Потім"
        - "Нарешті"
        - "Раптом"
    - sentence: "Ми вирішили не летіти літаком, а поїхати _____."
      answer: "поїздом"
      options:
        - "поїздом"
        - "на поїзді"
        - "поїзд"
        - "поїзду"
    - sentence: "Вранці ми прибули _____ станції у горах."
      answer: "до"
      options:
        - "до"
        - "на"
        - "в"
        - "біля"
    - sentence: "_____ ми знайшли наш готель і залишили речі."
      answer: "Потім"
      options:
        - "Потім"
        - "Спочатку"
        - "Нарешті"
        - "Ніколи"
    - sentence: "Наш готель знаходився високо _____ горі."
      answer: "на"
      options:
        - "на"
        - "в"
        - "під"
        - "над"
    - sentence: "Щоб дістатися туди, нам довелося довго _____ вгору."
      answer: "підніматися"
      options:
        - "підніматися"
        - "спускатися"
        - "йти"
        - "їхати"
    - sentence: "Наступного дня ми пішли _____ ліс збирати гриби."
      answer: "у"
      options:
        - "у"
        - "на"
        - "до"
        - "по"
    - sentence: "Увечері ми сиділи _____ вогнища і співали пісні."
      answer: "біля"
      options:
        - "біля"
        - "на"
        - "в"
        - "до"
    - sentence: "Через тиждень ми повернулися _____ додому."
      answer: "назад"
      options:
        - "назад"
        - "вперед"
        - "прямо"
        - "ліворуч"
    - sentence: "Це була найцікавіша _____ у моєму житті."
      answer: "подорож"
      options:
        - "подорож"
        - "поїздка"
        - "прогулянка"
        - "екскурсія"
    - sentence: "_____ ми зрозуміли, що хочемо повернутися сюди ще раз."
      answer: "Нарешті"
      options:
        - "Нарешті"
        - "Спочатку"
        - "Потім"
        - "Завжди"
    - sentence: "Це був мій улюблений туристичний _____."
      answer: "маршрут"
      options:
        - "маршрут"
        - "план"
        - "квиток"
        - "шлях"
    - sentence: "Ми обов'язково змінимо свій _____ наступного разу, щоб побачити нові місця."
      answer: "напрямок"
      options:
        - "напрямок"
        - "автобус"
        - "час"
        - "рік"
    - sentence: "Я завжди буду пам'ятати, як ми довго _____ на ту велику гору."
      answer: "піднімалися"
      options:
        - "піднімалися"
        - "спускатися"
        - "стояли"
        - "чекали"

- type: fill-in
  title: "Зміна маршруту"
  instruction: "Виберіть правильні слова для опису зміни планів і напрямку руху."
