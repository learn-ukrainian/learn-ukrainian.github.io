        - "складний"
        - "маршрут"
        - "завів"
        - "нас"
        - "у"
        - "глухий"
        - "кут"
      answer: "Цей складний маршрут завів нас у глухий кут"

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Знайдіть помилку в реченні та оберіть правильний варіант."
  items:
    - sentence: "Я дуже захворів і йду на лікаря."
      error: "на"
      answer: "до"
      options:
        - "до"
        - "в"
        - "у"
        - "за"
      explanation: "Рух до особи завжди вимагає прийменника до."
    - sentence: "Ми взяли автобус номер п'ять і поїхали."
      error: "взяли"
      answer: "сіли на"
      error_type: "phrase"
      options:
        - "сіли на"
        - "купили"
        - "поїхали"
        - "зайшли"
      explanation: "В українській мові транспорт не беруть, на нього сідають."
    - sentence: "Зараз вечір, і я повільно гуляю в парк."
      error: "парк"
      answer: "парку"
      options:
        - "парку"
        - "парком"
        - "парки"
