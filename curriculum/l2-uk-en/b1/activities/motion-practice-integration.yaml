      options:
        - "заїхав"
        - "зайшов"
        - "піднявся"
        - "спустився"
    - sentence: "Ми помилилися зупинкою і мусили _____ назад пішки."
      answer: "повернутися"
      options:
        - "повернутися"
        - "поїхати"
        - "піти"
        - "полетіти"
    - sentence: "Замість театру ми несподівано _____ в музей."
      answer: "пішли"
      options:
        - "пішли"
        - "прийшли"
        - "поїхали"
        - "дісталися"
    - sentence: "Якщо ви зайшли в _____, просто розверніться і йдіть назад."
      answer: "глухий кут"
      options:
        - "глухий кут"
        - "роздоріжжя"
        - "вулицю"
        - "площу"
    - sentence: "Ми довго стояли на _____, не знаючи куди йти далі."
      answer: "роздоріжжі"
      options:
        - "роздоріжжі"
        - "перехресті"
        - "розі"
        - "площі"
    - sentence: "Наш поїзд змінив _____ через ремонт колій."
      answer: "траєкторію"
      options:
        - "траєкторія"
        - "швидкість"
        - "час"
        - "дорогу"
    - sentence: "_____ ми хотіли піти в кіно, але потім передумали."
      answer: "Спочатку"
      options:
        - "Спочатку"
        - "Потім"
        - "Нарешті"
        - "Ніколи"
    - sentence: "Щоб вийти до річки, нам потрібно _____ вниз сходами."
      answer: "спуститися"
      options:
        - "спуститися"
        - "піднятися"
        - "обійти"
        - "перейти"

