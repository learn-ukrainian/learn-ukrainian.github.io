- id: fill-in-genitive
  type: fill-in
  instruction: Вставте правильну форму родового відмінка.
  items:
  - sentence: У мене із собою немає ____.
    answer: грошей
    options:
    - грошів
    - грошей
    - грошах
    - грішми
  - sentence: У цій кімнаті немає ____.
    answer: дверей
    options:
    - дверів
    - двері
    - дверей
    - дверям
  - sentence: Я не можу читати без ____.
    answer: окулярів
    options:
    - окулярів
    - окулярей
    - окуляр
    - окулярами
  - sentence: Ми стояли біля старих ____.
    answer: воріт
    options:
    - воротів
    - воріт
    - воротей
    - воротам
  - sentence: Діти з нетерпінням чекають літніх ____.
    answer: канікул
    options:
    - канікулів
    - канікулей
    - канікул
    - канікулам
  - sentence: У магазині був великий вибір нових ____.
    answer: меблів
    options:
    - меблей
    - меблів
    - мебел
    - меблям
  - sentence: Мені потрібно купити кілька дієвих ____.
    answer: ліків
    options:
    - ліків
    - лікей
    - лік
    - ліками
  - sentence: Вона купила флакон дорогих французьких ____.
    answer: парфумів
    options:
    - парфумей
    - парфумів
    - парфум
    - парфумами
- id: match-instrumental-forms
  type: match-up
  instruction: З'єднайте іменники в називному відмінку з їхніми правильними формами
    в орудному відмінку.
  pairs:
  - left: гроші
    right: грішми
  - left: ворота
    right: ворітьми
  - left: двері
    right: дверима
  - left: окуляри
    right: окулярами
  - left: ножиці
    right: ножицями
  - left: сани
    right: саньми
  - left: меблі
    right: меблями
  - left: ліки
    right: ліками
- id: group-sort-sort-nouns-into-pluralia-tantum-singularia-tantum-and-both-numbers
  type: group-sort
  instruction: Розподіліть іменники за їхніми категоріями.
  groups:
  - label: Pluralia tantum (тільки множина)
    items:
    - окуляри
    - гроші
    - ножиці
    - двері
  - label: Singularia tantum (тільки однина)
    items:
    - щастя
    - золото
    - молоко
    - листя
  - label: Обидва числа (однина і множина)
    items:
    - стіл
    - книга
    - шкарпетка
    - місто
workbook:
- type: translate
  instruction: Оберіть правильний переклад речення.
