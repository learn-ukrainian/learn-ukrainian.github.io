version: '1.0'
module: pluralia-tantum
level: b1
inline:
- id: quiz-identify-pluralia-tantum-which-nouns-exist-only-in
  type: quiz
  instruction: Оберіть іменник, який має лише форму множини (pluralia tantum).
  items:
  - question: Яке з цих слів не має форми однини?
    options:
    - канікули
    - свято
    - школа
    - урок
    correct: 0
  - question: 'Знайдіть слово, яке є pluralia tantum:'
    options:
    - ножиці
    - ніж
    - книга
    - масло
    correct: 0
  - question: Яке з цих слів вживається тільки у множині?
    options:
    - гроші
    - монета
    - банкнота
    - гаманець
    correct: 0
  - question: 'Оберіть географічну назву, що має тільки форму множини:'
    options:
    - Карпати
    - Говерла
    - місто
    - річка
    correct: 0
  - question: Яке слово принципово не має форми однини?
    options:
    - двері
    - вікно
    - дах
    - стіна
    correct: 0
  - question: 'Знайдіть іменник pluralia tantum:'
    options:
    - окуляри
    - око
    - обличчя
    - лінза
    correct: 0
  - question: Яке слово належить до іменників, що існують лише у множині?
    options:
    - штани
    - сорочка
    - куртка
    - сукня
    correct: 0
  - question: 'Оберіть слово без форми однини:'
    options:
    - меблі
    - диван
    - шафа
    - ліжко
    correct: 0
  title: Оберіть іменник, який має лише форму множини (pluralia tantum).
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть іменники pluralia tantum за семантичними групами.
  groups:
  - label: Парні предмети та інструменти
    items:
    - окуляри
    - ножиці
    - штани
    - сани
    - граблі
  - label: Речовини та масові поняття
    items:
    - гроші
    - дріжджі
    - парфуми
    - харчі
    - меблі
  - label: Події, ігри та часові періоди
    items:
    - канікули
    - іменини
    - вибори
    - шахи
    - жнива
  title: Розподіліть іменники pluralia tantum за семантичними групами.
- id: fill-in-genitive
  type: fill-in
  instruction: Вставте правильну форму родового відмінка (Кого? Чого немає?).
  items:
  - sentence: У цій кімнаті немає великих _____.
    answer: дверей
    options:
    - дверей
    - дверів
    - двірей
  - sentence: Для приготування цієї страви потрібно багато _____.
    answer: дріжджів
    options:
    - дріжджів
    - дріжджей
    - дріжджі
  - sentence: У мене зовсім немає готівкових _____.
    answer: грошей
    options:
    - грошей
    - грошів
    - грошам
  - sentence: Мені не вистачає _____, щоб розрізати цей папір.
    answer: ножиць
    options:
    - ножиць
    - ножиців
    - ножицей
  - sentence: Сонце занадто яскраве, а я не взяв темних _____.
    answer: окулярів
    options:
    - окулярів
    - окуляр
    - окулярей
  - sentence: Ми стояли біля великих дерев'яних _____.
    answer: воріт
    options:
    - воріт
    - воротів
    - воротей
  - sentence: Магазин нових _____ сьогодні зачинений.
    answer: меблів
    options:
    - меблів
    - меблей
    - мебель
  - sentence: Студенти з нетерпінням чекають на початок літніх _____.
    answer: канікул
    options:
    - канікул
    - канікулів
    - канікулей
  title: Вставте правильну форму родового відмінка (Кого? Чого немає?).
- id: match-instrumental-forms
  type: match-up
  instruction: З'єднайте іменник із його правильними формами в родовому (немає чого?)
    та орудному (чим?) відмінках.
  pairs:
  - left: гроші
    right: грошей, грішми / грошима
  - left: двері
    right: дверей, дверима / дверями
  - left: ворота
    right: воріт, ворітьми / воротами
  - left: окуляри
    right: окулярів, окулярами
  - left: ножиці
    right: ножиць, ножицями
  - left: сани
    right: саней, саньми / санями
  - left: штани
    right: штанів (штан), штанами
  - left: люди
    right: людей, людьми
  title: З'єднайте іменник із його правильними формами в родовому (немає чого?) та
    орудно
- id: fill-in-cases-of-pluralia-tantum-nouns
  type: fill-in
  instruction: Вставте правильну відмінкову форму слова з дужок.
  items:
  - sentence: Ми поїхали відпочивати високо в _____.
    answer: Карпати
    options:
    - Карпати
    - Карпат
    - Карпатах
  - sentence: На жаль, у мене зараз немає готівкових _____.
    answer: грошей
    options:
    - гроші
    - грошей
    - грошима
  - sentence: Туристи із задоволенням гуляють у красивих _____.
    answer: Чернівцях
    options:
    - Чернівці
    - Чернівців
    - Чернівцях
  - sentence: Я постійно користуюсь тільки цими гострими _____.
    answer: ножицями
    options:
    - ножиці
    - ножиць
    - ножицями
  - sentence: Мої батьки зараз живуть у _____.
    answer: Сумах
    options:
    - Суми
    - Сум
    - Сумах
  - sentence: Наш автомобіль зупинився перед великими _____.
    answer: ворітьми
    options:
    - ворота
    - воріт
    - ворітьми
  title: Вставте правильну відмінкову форму слова з дужок.
- id: group-sort-sort-nouns-into-pluralia-tantum-singularia-tantum-and-both-numbers
  type: group-sort
  instruction: Розподіліть слова на три групи за їхньою здатністю змінювати граматичне
    число.
  groups:
  - label: Pluralia tantum (тільки множина)
    items:
    - Карпати
    - канікули
    - меблі
    - окуляри
  - label: Singularia tantum (тільки однина)
    items:
    - щастя
    - молоко
    - студентство
    - золото
  - label: Мають обидві форми (однина і множина)
    items:
    - стіл
    - книга
    - людина
    - місто
  title: Розподіліть слова на три групи за їхньою здатністю змінювати граматичне число.
