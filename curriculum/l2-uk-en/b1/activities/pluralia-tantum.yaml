version: '1.0'
module: pluralia-tantum
level: b1
workbook:
- type: quiz
  instruction: Оберіть іменник, який вживається тільки у множині (pluralia tantum).
  items:
  - question: 'Оберіть pluralia tantum:'
    options:
    - книжка
    - стіл
    - окуляри
    - вікно
    correct: 2
  - question: 'Оберіть pluralia tantum:'
    options:
    - двері
    - кімната
    - будинок
    - дах
    correct: 0
  - question: 'Оберіть pluralia tantum:'
    options:
    - рукавиця
    - шапка
    - пальто
    - штани
    correct: 3
  - question: 'Оберіть pluralia tantum:'
    options:
    - гроші
    - монета
    - картка
    - гаманець
    correct: 0
  - question: 'Оберіть pluralia tantum:'
    options:
    - ліки
    - таблетка
    - сироп
    - рецепт
    correct: 0
  - question: 'Оберіть pluralia tantum:'
    options:
    - ножиці
    - ніж
    - виделка
    - ложка
    correct: 0
  - question: 'Оберіть pluralia tantum:'
    options:
    - місто
    - Київ
    - Карпати
    - село
    correct: 2
  - question: 'Оберіть pluralia tantum:'
    options:
    - радість
    - щастя
    - радощі
    - любов
    correct: 2
- type: fill-in
  instruction: Вставте правильну форму іменника в родовому відмінку (Genitive case).
  items:
  - sentence: У мене зараз немає готівкових ____.
    answer: грошей
    options:
    - грошей
    - грошів
    - гроші
  - sentence: Будь ласка, не зачиняйте цих ____.
    answer: дверей
    options:
    - дверей
    - дверів
    - двері
  - sentence: У цій шафі немає моїх улюблених чорних ____.
    answer: штанів
    options:
    - штанів
    - штаней
    - штань
  - sentence: На столі немає гострих ____.
    answer: ножиць
    options:
    - ножиць
    - ножиців
    - ножицей
  - sentence: Я ніколи не бачив таких високих і красивих ____.
    answer: Карпат
    options:
    - Карпат
    - Карпатів
    - Карпатей
  - sentence: Для випікання хліба нам не вистачає свіжих ____.
    answer: дріжджів
    options:
    - дріжджів
    - дріжджі
    - дріжджей
  - sentence: Сьогодні надворі немає снігу, тому ми не беремо зимових ____.
    answer: саней
    options:
    - саней
    - санів
    - сан
  - sentence: У мене немає сонцезахисних ____.
    answer: окулярів
    options:
    - окулярів
    - окулярей
    - окуляр
- type: group-sort
  instruction: Розподіліть іменники за граматичним числом (Number category).
  groups:
  - label: Тільки множина (Pluralia tantum)
    items:
    - окуляри
    - ножиці
    - ліки
    - парфуми
  - label: Тільки однина (Singularia tantum)
    items:
    - молоко
    - щастя
    - дерево
    - здоров'я
  - label: Однина і множина (Обидва числа)
    items:
    - книжка
    - стіл
    - рукавиця
    - місто
- type: match-up
  instruction: З'єднайте іменник у називному відмінку з його правильною формою (родовий
    або орудний відмінок).
  pairs:
  - left: гроші (Н.в.)
    right: грошей (Р.в.)
  - left: гроші (Ор.в.)
    right: грішми
  - left: ворота (Н.в.)
    right: воріт (Р.в.)
  - left: ворота (Ор.в.)
    right: ворітьми
  - left: двері (Н.в.)
    right: дверей (Р.в.)
  - left: двері (Ор.в.)
    right: дверима
  - left: окуляри (Н.в.)
    right: окулярів (Р.в.)
  - left: штани (Н.в.)
    right: штанів (Р.в.)
- type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні (Agreement error).
  items:
  - sentence: Мої великий двері відчинилися.
    error: великий
    correction: великі
    error_type: word
    options:
    - великі
    - велика
    - велике
    explanation: 'Двері — це іменник множини (pluralia tantum), тому прикметник має
      бути у множині: великі двері.'
  - sentence: Я купив один ножиці для паперу.
    error: один
    correction: одні
    error_type: word
    options:
    - одні
    - одно
    - одну
    explanation: 'З іменниками pluralia tantum використовуємо спеціальну форму числівника
      у множині: одні ножиці.'
  - sentence: Цей окуляри дуже дорогі.
    error: Цей
    correction: Ці
    error_type: word
    options:
    - Ці
    - Ця
    - Це
    explanation: 'Окуляри — множина, тому вказівний займенник має бути у множині:
      ці окуляри.'
  - sentence: Наші гроші закінчився дуже швидко.
    error: закінчився
    correction: закінчилися
    error_type: word
    options:
    - закінчилися
    - закінчилася
    - закінчилося
    explanation: 'Гроші — завжди множина, тому дієслово минулого часу теж має бути
      у множині: гроші закінчилися.'
  - sentence: Вона купила новий меблі для вітальні.
    error: новий
    correction: нові
    error_type: word
    options:
    - нові
    - нова
    - нове
    explanation: 'Меблі — множина, тому прикметник має бути у множині: нові меблі.'
  - sentence: Наші великі ворота зачинилася.
    error: зачинилася
    correction: зачинилися
    error_type: word
    options:
    - зачинилися
    - зачинився
    - зачинилося
    explanation: 'Ворота — pluralia tantum, дієслово має стояти у множині: ворота
      зачинилися.'
