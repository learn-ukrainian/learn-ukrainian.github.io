  instruction: З'єднайте українське слово pluralia tantum з його англійським перекладом.
  pairs:
  - left: вибори
    right: elections
  - left: харчі
    right: provisions
  - left: ліки
    right: medicine
  - left: заручини
    right: engagement
  - left: хитрощі
    right: tricks
  - left: радощі
    right: joys
  - left: жнива
    right: harvest
  - left: шахи
    right: chess
  title: З'єднайте українське слово pluralia tantum з його англійським перекладом.
- id: fill-in-adjectives
  type: fill-in
  instruction: Вставте правильну форму прикметника. Пам'ятайте, що слова pluralia
    tantum завжди вимагають множини!
  items:
  - sentence: Я вчора купив _____ окуляри.
    answer: нові
    options:
    - новий
    - нові
    - нова
  - sentence: Ці _____ меблі дуже важко переносити в іншу кімнату.
    answer: важкі
    options:
    - важкі
    - важкий
    - важка
  - sentence: Подивіться, які _____ двері у цьому старому будинку!
    answer: гарні
    options:
    - гарні
    - гарна
    - гарне
  - sentence: У нього на рахунку є _____ гроші.
    answer: великі
    options:
    - великі
    - великий
    - велике
  - sentence: Нарешті почалися _____ літні канікули.
    answer: довгі
    options:
    - довгий
    - довгі
    - довге
  - sentence: Аптекар дав мені дуже _____ ліки.
    answer: гіркі
    options:
    - гіркий
    - гіркі
    - гірке
  title: Вставте правильну форму прикметника. Пам'ятайте, що слова pluralia tantum
    завжди
- id: error-correction-cases-workbook
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінковому закінченні.
  items:
  - sentence: Мені терміново потрібно багато грошів.
    error: грошів
    correction: грошей
    error_type: word
    options:
    - грошам
    - грошей
    - грошами
    explanation: Правильна форма родового відмінка — грошей.
  - sentence: Минулого літа ми відпочивали в Карпатам.
    error: Карпатам
    correction: Карпатах
    error_type: word
    options:
    - Карпат
    - Карпатах
    - Карпатами
    explanation: У місцевому відмінку (де?) кажемо 'в Карпатах'.
  - sentence: Я дуже обережно ріжу папір цими гострими ножицами.
    error: ножицами
    correction: ножицями
    error_type: word
    options:
    - ножицями
    - ножицам
    - ножиці
    explanation: Орудний відмінок від 'ножиці' — 'ножицями'.
  - sentence: У нашому дворі немає дерев'яних воротів.
    error: воротів
    correction: воріт
    error_type: word
    options:
    - воріт
    - воротам
    - воротях
    explanation: Родовий відмінок від 'ворота' має нульове закінчення та історичне
      чергування о/і — 'воріт'.
  - sentence: Усі діти з нетерпінням чекають літніх канікулів.
    error: канікулів
    correction: канікул
    error_type: word
    options:
    - канікул
    - канікулам
    - канікулами
    explanation: Родовий відмінок від 'канікули' — 'канікул'.
  - sentence: Я абсолютно не можу жити і читати без своїх окулярей.
    error: окулярей
    correction: окулярів
    error_type: word
    options:
    - окулярів
    - окуляр
    - окулярам
    explanation: Правильне закінчення родового відмінка для слова 'окуляри' — '-ів'
      (окулярів).
  - sentence: У цьому палаці є дуже багато широких дверів.
    error: дверів
    correction: дверей
    error_type: word
    options:
    - дверей
    - дверям
    - дверми
    explanation: Родовий відмінок від 'двері' утворюється із закінченням '-ей' — 'дверей'.
  title: Знайдіть і виправте помилку у відмінковому закінченні.
- id: translate-sentences-workbook
  type: translate
  instruction: Оберіть правильний переклад речення українською мовою.
  items:
  - source: These are very beautiful doors.
    options:
    - text: Ці двері дуже красиві.
      correct: true
    - text: Ця двері дуже красива.
      correct: false
    - text: Це двері дуже красиве.
      correct: false
    - text: Цей двері дуже красивий.
      correct: false
  - source: I don't have money.
    options:
    - text: У мене немає грошей.
      correct: true
    - text: У мене немає гроші.
      correct: false
    - text: У мене немає грошів.
      correct: false
    - text: У мене немає грішми.
      correct: false
  - source: She uses scissors.
    options:
    - text: Вона користується ножицями.
      correct: true
    - text: Вона користується ножицям.
      correct: false
    - text: Вона користується ножиці.
      correct: false
    - text: Вона користується ножиць.
      correct: false
  - source: I am going to the Carpathians.
    options:
    - text: Я їду в Карпати.
      correct: true
    - text: Я їду в Карпатах.
      correct: false
    - text: Я їду в Карпат.
      correct: false
    - text: Я їду до Карпатів.
      correct: false
  - source: Where are my glasses?
    options:
    - text: Де мої окуляри?
      correct: true
    - text: Де мій окуляр?
      correct: false
    - text: Де моя окуляра?
      correct: false
    - text: Де моє окуляре?
      correct: false
  - source: We bought new furniture.
    options:
    - text: Ми купили нові меблі.
      correct: true
    - text: Ми купили нову меблю.
      correct: false
    - text: Ми купили новий мебль.
      correct: false
    - text: Ми купили нові меблей.
      correct: false
  title: Оберіть правильний переклад речення українською мовою.
