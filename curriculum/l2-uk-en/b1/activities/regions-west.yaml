- type: fill-in
  title: "Доповніть речення правильними словами"
  instruction: "Оберіть правильне слово для кожного речення."
  items:
    - sentence: "Юрій Кульчицький навчив європейців пити каву з цукром і гарячим молоком, створивши славнозвісний ____."
      answer: "меланж"
      options: ["меланж", "бограч", "регіон", "простір"]
      explanation: "Саме меланж (або кава по-віденськи) став винаходом Кульчицького."
    - sentence: "Львівська ____ є важливою соціальною інституцією, де зустрічаються митці."
      answer: "кав'ярня"
      options: ["кав'ярня", "ратуша", "площа", "трембіта"]
      explanation: "Кав'ярня у Львові відіграє роль не просто закладу харчування, а соціального простору."
    - sentence: "Місцевий галицький ____ зберігає багато давніх запозичень з інших мов."
      answer: "діалект"
      options: ["діалект", "регіон", "вплив", "бограч"]
      explanation: "Діалект містить багато унікальних слів та архаїзмів."
    - sentence: "У центрі міста розташована велична ____, біля якої збираються туристи."
      answer: "ратуша"
      options: ["ратуша", "спадщина", "кав'ярня", "традиція"]
      explanation: "Ратуша є головною будівлею центральної площі історичного міста."
    - sentence: "Для розвитку зеленого туризму критично важливо підтримувати ____ баланс у Карпатах."
      answer: "екологічний"
      options: ["екологічний", "етнічний", "мультикультурний", "затишний"]
      explanation: "Екологічний туризм передбачає збереження природи."
    - sentence: "М'який клімат південних схилів гір ідеально підходить для розвитку ____."
      answer: "виноробства"
      options: ["виноробства", "будівництва", "відродження", "мистецтва"]
      explanation: "На Закарпатті активно розвивається крафтове виноробство."
    - sentence: "Ми домовилися зустрітися з моєю новою ____ після роботи."
      answer: "коліжанкою"
      options: ["коліжанкою", "філіжанкою", "спадщиною", "кав'ярнею"]
      explanation: "Коліжанка — це місцеве слово на позначення подруги або колеги."
    - sentence: "Історична ____ міста дбайливо оберігається кожним його мешканцем."
      answer: "спадщина"
      options: ["спадщина", "традиція", "архітектура", "ідентичність"]
      explanation: "Спадщина є загальним терміном для культурного надбання минулого."

- type: error-correction
  title: "Виправте граматичні та лексичні помилки"
  instruction: "Знайдіть помилку в реченні та оберіть правильний варіант."
  items:
    - sentence: "Моя улюблена кава — міцний і солодка."
      error: "міцний"
      answer: "міцна"
      error_type: "word"
      options: ["міцна", "міцне", "міцні", "міцну"]
      explanation: "Слово кава має жіночий рід, тому прикметник також повинен бути жіночого роду."
    - sentence: "Моя бабуся народилася в Галичині багато років тому."
      error: "в Галичині"
      answer: "на Галичині"
      error_type: "phrase"
      options: ["на Галичині", "до Галичини", "по Галичині", "у Галичині"]
      explanation: "З назвами історичних земель, які не є сучасними адміністративними одиницями, вживаємо прийменник на."
    - sentence: "Батьки завжди стараються передати дітям свою національну ідентність."
      error: "ідентність"
      answer: "ідентичність"
      error_type: "word"
      options: ["ідентичність", "ідентифікацію", "спадщину", "культуру"]
      explanation: "Правильний термін українською мовою — ідентичність."
    - sentence: "Ми провели чудові вихідні в Закарпатті, куштуючи місцеві страви."
      error: "в Закарпатті"
      answer: "на Закарпатті"
      error_type: "phrase"
      options: ["на Закарпатті", "до Закарпаття", "у Закарпаття", "по Закарпатті"]
      explanation: "Як і з Галичиною, з історичним регіоном Закарпаття традиційно використовується прийменник на."
    - sentence: "Ця гаряча чорна кофе дуже швидко охолола."
      error: "кофе"
      answer: "кава"
      error_type: "word"
      options: ["кава", "напій", "чай", "меланж"]
      explanation: "Слово кофе — це русизм, українською правильно говорити кава."
    - sentence: "Закарпатський бограч прийнято варити на откритому вогні."
      error: "откритому"
      answer: "відкритому"
      error_type: "word"
      options: ["відкритому", "вільному", "чистому", "широкому"]
      explanation: "Слово откритий — це росіянізм, українською — відкритий."

- type: quiz
  title: "Перевірте свої знання про Західну Україну"
  instruction: "Перевірте, чи готові ви до кавового туру Західною Україною."
  items:
    - question: "Хто з українців навчив європейців пити каву з молоком та цукром?"
      options:
        - text: "Юрій Кульчицький"
          correct: true
        - text: "Андрей Шептицький"
          correct: false
        - text: "Тарас Шевченко"
          correct: false
        - text: "Іван Франко"
          correct: false
      explanation: "Юрій Кульчицький винайшов рецепт віденської кави під час облоги Відня у 1683 році."
    - question: "До якого роду належить слово кава в українській мові?"
      options:
        - text: "до жіночого роду"
          correct: true
        - text: "до чоловічого роду"
          correct: false
        - text: "до середнього роду"
          correct: false
        - text: "до спільного роду"
          correct: false
      explanation: "Слово кава має закінчення -а і завжди належить до жіночого роду."
    - question: "Який прийменник правильно вживати з назвою історичного регіону Волинь?"
      options:
        - text: "прийменник на"
          correct: true
        - text: "прийменник в"
          correct: false
        - text: "прийменник у"
          correct: false
        - text: "прийменник біля"
          correct: false
      explanation: "З історичними землями, такими як Волинь чи Галичина, традиційно використовується прийменник на."
    - question: "Що означає галицьке діалектне слово філіжанка?"
      options:
        - text: "порцелянову чашку для кави"
          correct: true
        - text: "жіночу сукню"
          correct: false
        - text: "назву кав'ярні"
          correct: false
        - text: "смачну місцеву страву"
          correct: false
      explanation: "Філіжанка — це маленька чашка, з якої зазвичай п'ють каву."
    - question: "Як називається традиційна закарпатська м'ясна страва?"
      options:
        - text: "бограч"
          correct: true
        - text: "меланж"
          correct: false
        - text: "борщ"
          correct: false
        - text: "куліш"
          correct: false
      explanation: "Бограч — це ситна м'ясна страва, яку часто готують на відкритому вогні на Закарпатті."
    - question: "Яка інституція відіграла ключову роль у збереженні українських традицій на Галичині?"
      options:
        - text: "Греко-католицька церква"
          correct: true
        - text: "Міська ратуша"
          correct: false
        - text: "Магістрат"
          correct: false
        - text: "Віденський університет"
          correct: false
      explanation: "УГКЦ та її священники підтримували національний рух та поширювали освіту."
    - question: "Яке місто вважається головним центром кавової культури та архітектурною перлиною?"
      options:
        - text: "місто Львів"
          correct: true
        - text: "місто Ужгород"
          correct: false
        - text: "місто Чернівці"
          correct: false
        - text: "місто Тернопіль"
          correct: false
      explanation: "Львів має унікальну кавову історію та історичний центр, занесений до списку ЮНЕСКО."
    - question: "Яка етнічна група Карпат славиться своєю майстерністю у різьбленні по дереву?"
      options:
        - text: "гуцули"
          correct: true
        - text: "бойки"
          correct: false
        - text: "лемки"
          correct: false
        - text: "волиняни"
          correct: false
      explanation: "Гуцули традиційно відомі як вправні різьбярі, гончарі та творці розкішних килимів."

- type: unjumble
  title: "Складіть правильні речення"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["Ця", "затишна", "кав'ярня", "працює", "щодня"]
      answer: "Ця затишна кав'ярня працює щодня"
    - words: ["Карпатські", "гори", "приваблюють", "тисячі", "туристів"]
      answer: "Карпатські гори приваблюють тисячі туристів"
    - words: ["Моя", "нова", "коліжанка", "любить", "каву"]
      answer: "Моя нова коліжанка любить каву"
    - words: ["Закарпаття", "славиться", "своїм", "мультикультурним", "характером"]
      answer: "Закарпаття славиться своїм мультикультурним характером"
    - words: ["Львівська", "архітектура", "вражає", "своєю", "красою"]
      answer: "Львівська архітектура вражає своєю красою"
    - words: ["Ми", "зустрілися", "на", "центральній", "площі"]
      answer: "Ми зустрілися на центральній площі"

- type: unjumble
  title: "Відновіть порядок слів"
  instruction: "Зберіть речення про культуру Західної України."
  items:
    - words: ["Юрій", "Кульчицький", "відкрив", "першу", "кав'ярню"]
      answer: "Юрій Кульчицький відкрив першу кав'ярню"
    - words: ["Галицький", "діалект", "зберігає", "унікальні", "слова"]
      answer: "Галицький діалект зберігає унікальні слова"
    - words: ["Традиційний", "бограч", "готують", "на", "вогні"]
      answer: "Традиційний бограч готують на вогні"
    - words: ["На", "Галичині", "дбайливо", "бережуть", "традиції"]
      answer: "На Галичині дбайливо бережуть традиції"
    - words: ["Гаряча", "чорна", "кава", "дуже", "смачна"]
      answer: "Гаряча чорна кава дуже смачна"
    - words: ["Цей", "прикордонний", "регіон", "має", "багату", "історію"]
      answer: "Цей прикордонний регіон має багату історію"

- type: mark-the-words
  title: "Знайдіть географічні назви"
  instruction: "Знайдіть і позначте всі власні назви (міста, регіони, гори) у тексті."
  text: "Західна Україна обіймає стратегічне положення. Волинь славиться густими лісами, а Закарпаття вражає мультикультурністю. Карпати захищають міста від вітрів, а Львів приваблює тисячі туристів своєю архітектурою. Також відома Буковина зі своїм центром у Чернівцях."
  answers: ["Україна", "Волинь", "Закарпаття", "Карпати", "Львів", "Буковина", "Чернівцях"]

- type: fill-in
  title: "Вставте правильні слова з діалекту та повсякденної мови"
  instruction: "Доповніть речення, як справжній львівський кавоман."
  items:
    - sentence: "Коли погода гарна, галичани часто кажуть, що надворі ____."
      answer: "файно"
      options: ["файно", "смачно", "міцно", "затишно"]
      explanation: "Слово файно є універсальним синонімом до добре або чудово."
    - sentence: "Щоб насолодитися ароматом, я замовив ще одну ____ кави."
      answer: "філіжанку"
      options: ["філіжанку", "трембіту", "ратушу", "спадщину"]
      explanation: "Філіжанка означає порцелянову чашку."
    - sentence: "Під час свята в горах лунав потужний звук дерев'яної ____."
      answer: "трембіти"
      options: ["трембіти", "кав'ярні", "мозаїки", "ідентичності"]
      explanation: "Трембіта — це традиційний гуцульський інструмент."
    - sentence: "Моя ____ порекомендувала мені чудовий ресторан у центрі міста."
      answer: "коліжанка"
      options: ["коліжанка", "філіжанка", "спадщина", "площа"]
      explanation: "Коліжанка означає подругу або колегу."
    - sentence: "На фестивалі ми скуштували гострий закарпатський ____ з паприкою."
      answer: "бограч"
      options: ["бограч", "меланж", "регіон", "вплив"]
      explanation: "Бограч — відома закарпатська м'ясна страва."
    - sentence: "Цей культурний ____ сформувався на перетині європейських шляхів."
      answer: "простір"
      options: ["простір", "діалект", "бограч", "меланж"]
      explanation: "Мова йде про культурний простір, де взаємодіють традиції."
    - sentence: "Відпочинок у лісі — це чудовий ____ туризм, який не шкодить природі."
      answer: "екологічний"
      options: ["екологічний", "етнічний", "мультикультурний", "гірський"]
      explanation: "Екологічний туризм дбає про захист довкілля."
    - sentence: "Мистецтво та ____ Галичини зберігають пам'ять про минулі століття."
      answer: "архітектура"
      options: ["архітектура", "ратуша", "трембіта", "філіжанка"]
      explanation: "Архітектура передає історію через старовинні будівлі."

