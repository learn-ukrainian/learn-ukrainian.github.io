- type: fill-in
  title: "Доповніть речення правильними словами"
  items:
    - sentence: "Наша команда успішно і вчасно завершила цей важливий ______."
      answer: "проєкт"
      options:
        - "проєкт"
        - "план"
        - "документ"
        - "звіт"
    - sentence: "На міжнародній конференції успішно виступили ______ експертів."
      answer: "двоє"
      options:
        - "двоє"
        - "два"
        - "дві"
        - "двоїх"
      explanation: "Для груп людей в офіційному стилі використовуються збірні числівники."
    - sentence: "Прибуток нашої компанії зріс на п'ять цілих і дві десятих ______."
      answer: "відсотка"
      options:
        - "відсотка"
        - "відсотків"
        - "відсоток"
        - "відсотки"
      explanation: "Після дробових числівників використовуємо родовий відмінок однини."
    - sentence: "Шановна Олено Іванівно, ______ вас розглянути ці матеріали до п'ятниці."
      answer: "прошу"
      options:
        - "прошу"
        - "будь ласка"
        - "хочу"
        - "вимагаю"
      explanation: "В офіційному листуванні конструкція прошу є ідеальною."
    - sentence: "Слухай, я трохи спізнююсь, ______ у великому заторі."
      answer: "застряг"
      options:
        - "застряг"
        - "зупинився"
        - "перебуваю"
        - "знаходжуся"
      explanation: "Для розмовної мови дієслово застряг є дуже природним."
    - sentence: "Зоря яскраво спалахнула на темному ______."
      answer: "небокраї"
      options:
        - "небокраї"
        - "горизонті"
        - "небі"
        - "обрії"
      explanation: "Небокрай — поетичне слово для емоційного опису."
    - sentence: "Сьогодні ввечері ми ______ нову станцію метро."
      answer: "відкриваємо"
      options:
        - "відкриваємо"
        - "відкривається"
        - "буде відкрито"
        - "відкрито"
    - sentence: "Президент офіційно ______ цей важливий указ вчора."
      answer: "підписав"
      options:
        - "підписав"
        - "підписує"
        - "підписував"
        - "підпише"
      explanation: "Доконаний вид вказує на завершений результат події."

