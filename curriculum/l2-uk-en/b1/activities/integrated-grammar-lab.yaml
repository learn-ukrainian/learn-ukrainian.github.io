- type: error-correction
  title: "Виправте канцеляризми та росіянізми"
  items:
    - sentence: "Даний проєкт дуже важливий для нашої компанії."
      error: "Даний"
      answer: "Цей"
      options:
        - "Цей"
        - "Наш"
        - "Такий"
        - "Сам"
      explanation: "Слово даний у значенні цей — це канцеляризм."
    - sentence: "Я приймав участь у великій науковій конференції."
      error: "приймав"
      answer: "брав"
      options:
        - "брав"
        - "робив"
        - "мав"
        - "давав"
      explanation: "Приймати участь — це російська калька, правильно брати участь."
    - sentence: "Нами планується велике оновлення системи наступного тижня."
      error: "Нами планується"
      answer: "Ми плануємо"
      options:
        - "Ми плануємо"
        - "Нам планується"
        - "Нами заплановано"
        - "Ми плануватимемо"
      explanation: "Краще використовувати активний стан замість пасивного канцеляриту."
    - sentence: "Він являється найкращим експертом у нашій команді."
      error: "являється"
      answer: "є"
      options:
        - "є"
        - "буде"
        - "став"
        - "виглядає"
      explanation: "Слово являється у значенні є — це калька, правильно використовувати є."
    - sentence: "Самі кращі результати ми побачимо наприкінці цього року."
      error: "Самі кращі"
      answer: "Найкращі"
      options:
        - "Найкращі"
        - "Дуже кращі"
        - "Найбільш кращі"
        - "Кращі самі"
      explanation: "Самі кращі — це росіянізм, правильно утворювати форму найкращі."
    - sentence: "Ми обговоримо це питання на слідуючій робочій зустрічі."
      error: "слідуючій"
      answer: "наступній"
      options:
        - "наступній"
        - "майбутній"
        - "другій"
        - "новій"
      explanation: "Слово слідуючий — це росіянізм, використовуйте наступний."

- type: quiz
  title: "Стилістична діагностика: оберіть правильний варіант"
  items:
    - question: "Який варіант речення найбільше підходить для офіційного звіту?"
      options:
        - text: "Ми успішно завершили цей проєкт вчасно."
          correct: true
        - text: "Проєкт був успішно завершений нами."
          correct: false
        - text: "Кидаю звіт про те, що ми закінчили."
          correct: false
        - text: "Даний проєкт успішно підійшов до кінця."
          correct: false
      explanation: "Офіційний стиль цінує активний стан і відсутність канцеляризмів."
    - question: "Яке слово з синонімічного ряду є найбільш нейтральним і науковим?"
      options:
        - text: "горизонт"
          correct: true
        - text: "обрій"
          correct: false
        - text: "небокрай"
          correct: false
        - text: "крайнебо"
          correct: false
      explanation: "Горизонт — це наукове і загальновживане слово."
    - question: "Як правильно синтезувати числівник і іменник у діловому стилі?"
      options:
        - text: "На конференції виступили двоє експертів."
          correct: true
        - text: "На конференції виступили два експертів."
          correct: false
        - text: "На конференції виступили двоє експерти."
          correct: false
        - text: "На конференції виступили два експертом."
          correct: false
      explanation: "Збірний числівник двоє вимагає іменника в родовому відмінку множини."
    - question: "Як правильно використати дробовий числівник у фінансовому звіті?"
      options:
        - text: "Прибуток зріс на п'ять цілих і дві десятих відсотка."
          correct: true
        - text: "Прибуток зріс на п'ять цілих і дві десятих відсотків."
          correct: false
        - text: "Прибуток зріс на п'ять і два відсотки."
          correct: false
        - text: "Прибуток зріс на п'ять цілих дві десятих відсоток."
          correct: false
      explanation: "Після дробових числівників іменник стоїть у родовому відмінку однини."
    - question: "Яка фраза є найбільш доречною для завершення офіційного електронного листа?"
      options:
        - text: "З повагою,"
          correct: true
        - text: "Бувай,"
          correct: false
        - text: "До зустрічі,"
          correct: false
        - text: "Щасливо,"
          correct: false
      explanation: "З повагою — це абсолютний стандарт українського ділового листування."
    - question: "Яка конструкція є типовим прикладом безособового речення в новинах?"
      options:
        - text: "Схвалено новий закон про освіту."
          correct: true
        - text: "Президент підписав новий закон."
          correct: false
        - text: "Депутати схвалили цей закон."
          correct: false
        - text: "Закон дуже важливий для нас."
          correct: false
      explanation: "Безособові конструкції на -но, -то часто використовуються в медіа."
    - question: "Який час дієслова часто використовується в новинах для опису минулих подій?"
      options:
        - text: "Теперішній час"
          correct: true
        - text: "Майбутній час"
          correct: false
        - text: "Давноминулий час"
          correct: false
        - text: "Умовний спосіб"
          correct: false
      explanation: "Історичний теперішній час робить новину більш актуальною."
    - question: "Яке слово є доречним демінутвом для неформальної бесіди?"
      options:
        - text: "кавочка"
          correct: true
        - text: "кава"
          correct: false
        - text: "напій"
          correct: false
        - text: "рідина"
          correct: false
      explanation: "Демінутиви (зменшувально-пестливі форми) створюють затишок у сімейних діалогах."

- type: unjumble
