- type: true-false
  title: "Правда чи неправда: правила стилістичної гнучкості"
  items:
    - statement: "Канцелярит — це природний і бажаний стиль для сучасної української ділової мови."
      correct: false
      explanation: "Канцелярит робить тексти важкими і штучними, сучасна мова прагне простоти."
    - statement: "В українській мові активний стан завжди має перевагу над пасивним."
      correct: true
      explanation: "Українська мова любить активну дію (Ми завершили проєкт, а не Проєкт був завершений)."
    - statement: "Демінутиви (зменшувально-пестливі форми) використовуються виключно для розмов з дітьми."
      correct: false
      explanation: "Вони активно використовуються в розмовах з дорослими для вираження теплоти."
    - statement: "Односкладні речення дуже часто зустрічаються в новинах та журналістиці."
      correct: true
      explanation: "Вони допомагають швидко передати суть події."
    - statement: "У розмовному стилі українці часто опускають особові займенники."
      correct: true
      explanation: "Замість я піду часто кажуть просто піду."
    - statement: "Слово горизонт є більш емоційним і поетичним, ніж обрій."
      correct: false
      explanation: "Горизонт — це найбільш нейтральне і наукове слово."
    - statement: "Історичний теперішній час використовується в новинах для опису подій минулого."
      correct: true
      explanation: "Це робить новину більш актуальною для читача."
    - statement: "У діловому електронному листі вираз кидаю звіт є доречним."
      correct: false
      explanation: "Це сленговий вираз, який підходить лише для неформального спілкування."

