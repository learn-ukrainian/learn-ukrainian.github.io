workbook:
- type: true-false
  instruction: Визначте, чи правдиве твердження про вживання займенників.
  items:
  - statement: Займенники «хто» і «що» мають форми чоловічого та жіночого роду.
    correct: false
    explanation: Займенники «хто» і «що» не мають граматичних ознак роду і числа,
      вони змінюються лише за відмінками.
  - statement: Займенник «котрий» використовується для запитання про точний порядок
      або час.
    correct: true
    explanation: 'Так, наприклад: «Котра година?» або «Котрий це вагон?».'
  - statement: Зворотний займенник «себе» має форму називного відмінка.
    correct: false
    explanation: Зворотний займенник «себе» принципово не має форми називного відмінка,
      оскільки завжди виступає в ролі додатка.
  - statement: Прийменник розриває заперечний займенник на три слова, наприклад «ні
      з ким».
    correct: true
    explanation: 'Це правило «префіксального розриву»: прийменник стає між часткою
      «ні» та займенником.'
  - statement: Займенник «сам» і «самий» означають одне й те саме.
    correct: false
    explanation: «Сам» означає самостійну дію («він сам зробив»), а «самий» використовується
      для підсилення («той самий чоловік»).
  - statement: Неозначені займенники з частками «будь-» та «-небудь» пишуться через
      дефіс.
    correct: true
    explanation: Частки будь-, -небудь, казна-, хтозна- завжди пишуться через дефіс
      (будь-хто, що-небудь).
- type: translate
  instruction: Оберіть правильний український переклад для англійських фраз із займенниками.
  items:
  - source: Nobody knows the answer.
    options:
    - text: Ніхто не знає відповіді.
      correct: true
    - text: Ніхто знає відповідь.
      correct: false
    - text: Хтось не знає відповіді.
      correct: false
  - source: I have nothing to do here.
    options:
    - text: Тут нічого робити.
      correct: true
    - text: Я нічого роблю тут.
      correct: false
    - text: Тут ніщо робити.
      correct: false
  - source: He talks to nobody.
    options:
    - text: Він ні з ким не розмовляє.
      correct: true
    - text: Він не розмовляє ні з ким.
      correct: false
    - text: Він розмовляє нізким.
      correct: false
  - source: Anyone can solve this task.
    options:
    - text: Будь-хто може вирішити цю задачу.
      correct: true
    - text: Хто-небудь може вирішити цю задачу.
      correct: false
    - text: Хтось може вирішити цю задачу.
      correct: false
  - source: She is proud of herself.
    options:
    - text: Вона пишається собою.
      correct: true
    - text: Вона пишається нею.
      correct: false
    - text: Вона пишається себе.
      correct: false
  - source: We were waiting the whole time.
    options:
    - text: Ми чекали увесь час.
      correct: true
    - text: Ми чекали всі час.
      correct: false
    - text: Ми чекали кожен час.
      correct: false
