version: '1.0'
module: advanced-pronouns
level: b1
inline:
- id: fill-in-interrogative-relative
  type: fill-in
  instruction: Вставте правильну граматичну форму питально-відносних займенників.
  items:
  - sentence: Це студент, ____ я дав книгу.
    answer: кому
    options:
    - кому
    - кого
    - ким
  - sentence: ____ ти сьогодні зустрів?
    answer: Кого
    options:
    - Хто
    - Кого
    - Кому
  - sentence: ____ книгу ти читаєш?
    answer: Яку
    options:
    - Яку
    - Яка
    - Якою
  - sentence: ____ зараз година?
    answer: Котра
    options:
    - Яка
    - Котра
    - Чия
  - sentence: Це тема, у ____ я добре розбираюся.
    answer: чому
    options:
    - що
    - чого
    - чому
  - sentence: Я знаю жінку, ____ дитина тут грається.
    answer: чия
    options:
    - чия
    - чию
    - чиїй
- id: quiz-interrogative-relative
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Питально-відносні
    займенники».'
  items:
  - question: Який займенник використовується для питання про час («___ зараз година?»)
    options:
    - Котра
    - Яка
    - Чия
    - Що
    correct: 0
  - question: У якому відмінку стоїть займенник «ким»?
    options:
    - Орудний
    - Знахідний
    - Давальний
    - Місцевий
    correct: 0
  - question: Як правильно запитати про належність речі?
    options:
    - Чия це книга?
    - Яка це книга?
    - Котра це книга?
    - Хто це книга?
    correct: 0
  - question: Який займенник вказує на неживі предмети?
    options:
    - Що
    - Хто
    - Котрий
    - Чий
    correct: 0
  - question: Яка форма місцевого відмінка для займенника «хто»?
    options:
    - на кому
    - на ким
    - у кого
    - на чому
    correct: 0
  - question: 'Оберіть правильне речення:'
    options:
    - Це проєкт, яким ми пишаємося.
    - Це проєкт, якого ми пишаємося.
    - Це проєкт, який ми пишаємося.
    - Це проєкт, чий ми пишаємося.
    correct: 0
- id: match-up-reflexive-self
  type: match-up
  instruction: З'єднайте терміни та вирази з розділу «Зворотний займенник себе» з
    їхніми значеннями.
  pairs:
  - left: сам по собі
    right: незалежний, існує окремо
  - left: так собі
    right: посередньої якості, не вражає
  - left: не по собі
    right: страшно або ніяково
  - left: само собою
    right: цілком очевидно, не потребує доказів
  - left: від себе
    right: від власного імені
  - left: почувати себе
    right: мати певний стан здоров'я
workbook:
- type: group-sort
  instruction: Розподіліть неозначені займенники за правилами правопису.
  groups:
  - label: Разом
    items:
    - хтось
    - дещо
    - абиякий
    - дехто
  - label: Через дефіс
    items:
    - будь-хто
    - хто-небудь
    - казна-чий
    - що-небудь
  - label: Окремо (три слова)
    items:
    - будь до кого
    - казна з чим
    - аби в чому
    - ні з ким
- type: fill-in
  instruction: Вставте правильну форму заперечного займенника. Зверніть увагу на прийменники!
  items:
  - sentence: Я ____ не бачу в цій темній кімнаті.
    answer: нічого
    options:
    - ніщо
    - нічого
    - ні з чим
  - sentence: Вона ____ не розмовляла про цей секрет.
    answer: ні з ким
    options:
    - з ніким
    - ні з ким
    - нізким
  - sentence: Мені ____ спитати дорогу, бо вулиця порожня.
    answer: нікого
    options:
    - нікого
    - нема кого
    - ні з ким
  - sentence: Цей зошит ____ не належить, він мій.
    answer: нікому
    options:
    - нікого
    - нікому
    - ні ким
  - sentence: Ми ____ не домовилися.
    answer: ні про що
    options:
    - про ніщо
    - ні про що
    - ніпрощо
  - sentence: На столі не було ____ слідів.
    answer: нічиїх
    options:
    - ніяких
    - нічиїх
    - нікому
- type: error-correction
  instruction: Знайдіть і виправте помилки, пов'язані з подвійним запереченням та
    правописом.
  items:
  - sentence: Ніхто знає правильну відповідь.
    error: знає
    correction: не знає
    error_type: construction
    options:
    - не знає
    - знають
    - не знають
    explanation: В українській мові обов'язкове подвійне заперечення (ніхто не знає).
  - sentence: Я розмовляв з ніким.
    error: з ніким
    correction: ні з ким
    error_type: phrase
    options:
    - ні з ким
    - нізким
    - ніким з
    explanation: Прийменник розриває заперечний займенник на три слова (ні з ким).
  - sentence: Будьхто може прийти на концерт.
    error: Будьхто
    correction: Будь-хто
    error_type: word
    options:
    - Будь-хто
    - Будь хто
    - Хто-будь
    explanation: Частка «будь-» завжди пишеться через дефіс.
  - sentence: Я не цікавлюся ні чим.
    error: ні чим
    correction: нічим
    error_type: word
    options:
    - нічим
    - ні з чим
    - ні про що
    explanation: Якщо немає прийменника, заперечний займенник пишеться разом.
  - sentence: Де-хто не розуміє цього правила.
    error: Де-хто
    correction: Дехто
    error_type: word
    options:
    - Дехто
    - Де хто
    - Хтось
    explanation: Частка «де-» з неозначеними займенниками пишеться разом.
  - sentence: Вона нікому довіряла свої секрети.
    error: довіряла
    correction: не довіряла
    error_type: construction
    options:
    - не довіряла
    - довіряє
    - вірила
    explanation: Потрібне дієслово із заперечною часткою «не».
- type: essay-response
  prompt: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Зворотний займенник
    себе» (наприклад: почувати себе, сам по собі, так собі, уявити собі, собою).'
  min_words: 50
