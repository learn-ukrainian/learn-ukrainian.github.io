version: '1.0'
module: advanced-pronouns
level: b1
inline:
- id: fill-in-fill-in-interrogative-relative
  type: fill-in
  instruction: Вставте правильну граматичну форму у реченнях на тему питально-відносні
    займенники.
  items:
  - sentence: ___ зараз година?
    answer: Котра
    options:
    - Яка
    - Котра
    - Що
    - Котрий
  - sentence: З ___ сестрою він розмовляє?
    answer: чиєю
    options:
    - чиєю
    - якою
    - чиїй
    - ким
  - sentence: Ось той старий будинок, у ___ ми колись жили.
    answer: якому
    options:
    - якому
    - чому
    - яким
    - котрому
  - sentence: ___ ти шукаєш у цьому натовпі?
    answer: Кого
    options:
    - Хто
    - Кого
    - Що
    - Ким
  - sentence: ___ ти найбільше цікавишся?
    answer: Чим
    options:
    - Ким
    - Чим
    - Що
    - Чому
  - sentence: Я знаю людину, ___ дитина тут грається.
    answer: чия
    options:
    - яка
    - чий
    - чия
    - чию
- id: quiz-quiz-interrogative-relative
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Питально-відносні
    займенники».'
  items:
  - question: Який займенник завжди вказує на неістот та абстрактні поняття?
    options:
    - що
    - хто
    - який
    - чий
    correct: 0
  - question: Який займенник використовується виключно для запитання про порядок предметів
      або про час?
    options:
    - котрий
    - який
    - чий
    - що
    correct: 0
  - question: 'У реченні «Людина, яка знає правду, мовчить» слово «яка» — це:'
    options:
    - відносний займенник
    - питальний займенник
    - особовий займенник
    - заперечний займенник
    correct: 0
  - question: 'Форма знахідного відмінка займенника «хто» повністю збігається з формою:'
    options:
    - родового відмінка (кого)
    - давального відмінка (кому)
    - орудного відмінка (ким)
    - місцевого відмінка (на кому)
    correct: 0
  - question: Як правильно запитати про час українською мовою?
    options:
    - Котра зараз година?
    - Яка зараз година?
    - Котрий зараз час?
    - Який зараз час?
    correct: 0
  - question: Якщо відносний займенник з'єднує підрядну частину з головною, від чого
      залежить його відмінок?
    options:
    - від його ролі у підрядному реченні
    - від слова-антецедента у головному реченні
    - завжди стоїть у називному відмінку
    - завжди збігається з родом і числом
    correct: 0
- id: match-up-reflexive-self
  type: match-up
  instruction: З'єднайте терміни з розділу «Зворотний займенник себе» з їхніми визначеннями.
  pairs:
  - left: почувати себе
    right: відчувати свій фізичний або моральний стан
  - left: сам по собі
    right: діяти ізольовано, без стороннього впливу
  - left: так собі
    right: результат не дуже хороший, але й не критично поганий
  - left: від себе
    right: сказати щось від власного імені або додати свої думки
  - left: не по собі
    right: внутрішній стан тривоги або дискомфорту
  - left: пишатися собою
    right: бути дуже задоволеним своїм результатом
workbook:
- type: fill-in
  instruction: Вставте правильний неозначений займенник, звертаючи увагу на контекст
    та правопис.
  items:
  - sentence: У двері ___ дзвонить, але я не бачу хто це.
    answer: хтось
    options:
    - хтось
    - хто-небудь
    - будь-хто
    - ніхто
  - sentence: Чи є тут ___ живий? Відгукніться!
    answer: хто-небудь
    options:
    - хтось
    - хто-небудь
    - дехто
    - ніщо
  - sentence: Цю просту задачу може розв'язати ___ з наших студентів.
    answer: будь-хто
    options:
    - хтось
    - будь-хто
    - абихто
    - ніщо
  - sentence: Він зробив цю роботу погано і використав ___ матеріали.
    answer: абиякі
    options:
    - абиякі
    - якісь
    - будь-які
    - ніякі
  - sentence: ___ з нас уже знає правильну відповідь, але ми поки мовчимо.
    answer: Дехто
    options:
    - Хтось
    - Дехто
    - Будь-хто
    - Увесь
  - sentence: Цей старий лист надійшов від ___, я навіть не можу прочитати ім'я.
    answer: казна-кого
    options:
    - казна-кого
    - когось
    - будь-кого
    - кожного
- type: error-correction
  instruction: Знайдіть і виправте синтаксичну помилку в заперечних реченнях (правило
    подвійного заперечення).
  items:
  - sentence: Ніхто знає правильну відповідь на це складне питання.
    error: знає
    correction: не знає
    error_type: construction
    options:
    - не знає
    - незнає
    - ні знає
    - не має
    explanation: 'В українській мові діє суворе правило подвійного заперечення: якщо
      є заперечний займенник, дієслово повинно мати частку «не».'
  - sentence: Я нічого розумію з цього філософського тексту.
    error: розумію
    correction: не розумію
    error_type: construction
    options:
    - не розумію
    - нерозумію
    - ні розумію
    - нічого розуміти
    explanation: Обов'язково додаємо заперечну частку «не» перед дієсловом.
  - sentence: Він нікому вірить у цій складній ситуації.
    error: вірить
    correction: не вірить
    error_type: construction
    options:
    - не вірить
    - невірить
    - ні вірить
    - не повірить
    explanation: 'Подвійне заперечення є обов''язковим: «нікому не вірить».'
  - sentence: Ми сьогодні нікуди йдемо, бо на вулиці сильний дощ.
    error: йдемо
    correction: не йдемо
    error_type: construction
    options:
    - не йдемо
    - нейдемо
    - ні йдемо
    - не підемо
    explanation: Дієслово повинно підтримувати заперечення часткою «не».
  - sentence: У цій темній кімнаті нікого є.
    error: є
    correction: немає
    error_type: construction
    options:
    - немає
    - не є
    - нема
    - нічого
    explanation: Замість дієслова «є» у заперечних конструкціях використовується слово
      «немає».
  - sentence: Ніщо привернуло моєї уваги відразу.
    error: привернуло
    correction: не привернуло
    error_type: construction
    options:
    - не привернуло
    - непривернуло
    - ні привернуло
    - не було
    explanation: Заперечний займенник «ніщо» вимагає частки «не» перед дієсловом.
- type: group-sort
  instruction: 'Розподіліть неозначені займенники за правилами правопису: разом чи
    через дефіс.'
  groups:
  - label: Пишемо разом (частки -сь, де-, аби-)
    items:
    - хтось
    - дещо
    - абиякий
    - дехто
    - щось
    - абихто
  - label: Пишемо через дефіс (частки будь-, -небудь, казна-, хтозна-)
    items:
    - будь-хто
    - що-небудь
    - казна-який
    - хтозна-що
    - будь-який
    - хто-небудь
- type: match-up
  instruction: З'єднайте розряд займенників з відповідним прикладом.
  pairs:
  - left: Питально-відносний
    right: хто, що, який, чий, котрий
  - left: Зворотний
    right: себе (собою, собі)
  - left: Неозначений
    right: хтось, будь-хто, дехто, абиякий
  - left: Заперечний
    right: ніхто, ніщо, ніякий, нічий
  - left: Означальний
    right: кожен, весь, сам, інший
  - left: Особовий
    right: я, ти, він, вона, ми, ви, вони
- type: fill-in
  instruction: Вставте правильний означальний займенник, звертаючи увагу на його значення.
  items:
  - sentence: ___ студент має право на власну думку.
    answer: Кожен
    options:
    - Кожен
    - Увесь
    - Сам
    - Самий
  - sentence: Він читав цю книгу ___ час, поки їхав у поїзді.
    answer: увесь
    options:
    - увесь
    - кожен
    - самий
    - будь-який
  - sentence: Я хочу почути ___ підхід до вирішення цієї проблеми.
    answer: інший
    options:
    - інший
    - кожен
    - сам
    - самий
  - sentence: Він ___ зробив цю складну роботу, без жодної сторонньої допомоги.
    answer: сам
    options:
    - сам
    - самий
    - кожен
    - увесь
  - sentence: Ми зустрілися вчора у тій ___ кімнаті.
    answer: самій
    options:
    - самій
    - самі
    - одній
    - своїй
  - sentence: Я розповів цю таємницю ___ своїм друзям.
    answer: всім
    options:
    - всім
    - кожним
    - самим
    - всіма
- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Зворотний
    займенник себе».
  prompt: Розкажіть про своє ставлення до себе або опишіть ситуацію з власного життя.
    Напишіть мінімум 5 речень (близько 50 слів), використовуючи різні відмінки зворотного
    займенника «себе» (себе, собі, собою, на собі). Також спробуйте використати стійкі
    вирази, такі як «почувати себе», «сам по собі», «від себе» або «не по собі».
  min_words: 50
  model_answer: Я намагаюся завжди бути чесним із собою. Коли я досягаю успіху, я
    щиро пишаюся собою і можу дозволити собі невеликий подарунок. Звісно, іноді я
    відчуваю себе не по собі у нових компаніях. Але я розумію, що впевненість не з'являється
    сама по собі. Тому я постійно працюю над собою, щоб ставати кращим.
