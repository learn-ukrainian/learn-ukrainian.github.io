version: '1.0'
module: advanced-pronouns
level: b1
inline:
- id: reading-reading-interrogative-relative
  type: reading
  passage: 'В українській мові питально-відносні займенники (хто, що, який, чий, котрий)
    відіграють подвійну роль. З одного боку, ми використовуємо їх для прямих запитань:
    «Хто прийшов?», «Що ти бачив?». З іншого боку, ці самі слова з''єднують частини
    складного речення, перетворюючись на відносні займенники: «Людина, яка знає правду,
    зазвичай мовчить». Займенники «хто» і «що» не мають роду чи числа, але відмінюються,
    причому «хто» вказує на істот, а «що» — на неістот.'
  questions:
  - Яку подвійну роль відіграють питально-відносні займенники?
  - Наведіть приклад прямого запитання із займенником «хто».
  - Чим відрізняється питальний займенник від відносного в реченні?
  - Що означають займенники «хто» та «що» щодо істот і неістот?
- id: fill-in-fill-in-interrogative-relative
  type: fill-in
  instruction: Вставте правильну граматичну форму питально-відносних займенників.
  items:
  - sentence: _____ ти бачив учора на вулиці?
    answer: Кого
    options:
    - Хто
    - Кого
    - Кому
  - sentence: Це саме те, _____ я шукав.
    answer: що
    options:
    - що
    - чого
    - чому
  - sentence: З _____ ти вчора розмовляв по телефону?
    answer: ким
    options:
    - ким
    - кому
    - кого
  - sentence: Людина, _____ знає правду, зазвичай мовчить.
    answer: яка
    options:
    - яка
    - яку
    - якою
  - sentence: _____ листа ти так уважно читаєш?
    answer: Чийого
    options:
    - Чийого
    - Чиєму
    - Чиїм
  - sentence: На _____ ти найбільше зосереджений зараз?
    answer: чому
    options:
    - чому
    - чим
    - що
- id: quiz-quiz-interrogative-relative
  type: quiz
  instruction: Оберіть правильний варіант відповіді для лексики та граматики розділу
    «Питально-відносні займенники».
  items:
  - question: Який займенник використовується виключно для запитання про точний порядок
      або час?
    options:
    - який
    - чий
    - котрий
    - що
    correct: 2
  - question: Який відмінок займенника «що» збігається з називним відмінком?
    options:
    - родовий
    - давальний
    - знахідний
    - орудний
    correct: 2
  - question: У реченні «Я знаю людину, чия дитина грається», від чого залежить рід
      займенника «чия»?
    options:
    - від слова «дитина»
    - від слова «людина»
    - від дієслова «знаю»
    - від дієслова «грається»
    correct: 1
  - question: Як правильно запитати про час?
    options:
    - Яка година?
    - Котра зараз година?
    - Що за година?
    - Коли година?
    correct: 1
  - question: Який займенник відмінюється як прикметник м'якої групи?
    options:
    - який
    - чий
    - котрий
    - що
    correct: 1
  - question: Що означає займенник «який» у запитанні?
    options:
    - питає про час
    - питає про характеристику чи якість
    - питає про приналежність
    - питає про кількість
    correct: 1
- id: essay-reflexive-self
  type: essay-response
  instruction: Напишіть 5 речень (не менше 50 слів), використовуючи зворотний займенник
    «себе» у різних відмінках та з прийменниками.
  prompt: 'Опишіть ситуацію, де ви подолали труднощі: як ви допомагали собі, чи пишаєтеся
    ви собою та чи знайшли ви себе у новій справі.'
  min_words: 50
  model_answer: Коли я почав нову роботу, мені було складно, але я намагався допомогти
    собі у цій складній ситуації. Я часто відчував невпевненість, але завжди брав
    відповідальність на себе. Я намагався знайти себе у цій новій професії, вивчаючи
    нові навички. Згодом я почав працювати краще і відчув задоволення собою. Тепер
    я пишаюся собою і тим, що зміг подолати ці труднощі.
- id: error-correction-reflexive-self
  type: error-correction
  instruction: Знайдіть і виправте помилки у використанні зворотного займенника «себе»
    або присвійного «свій».
  items:
  - sentence: Він дуже любить себе роботу.
    error: себе
    correction: свою
    error_type: word
    options:
    - свою
    - собою
    - собі
    explanation: «Робота» належить йому, тому потрібен присвійний займенник «свою»,
      а не об'єкт дії «себе».
  - sentence: Я часто бачу я у дзеркалі.
    error: я
    correction: себе
    error_type: word
    options:
    - мене
    - себе
    - собою
    explanation: Дія спрямована на підмет, тому використовується зворотний займенник
      «себе».
  - sentence: Вони допомагають них у складній ситуації.
    error: них
    correction: собі
    error_type: word
    options:
    - собі
    - себе
    - ними
    explanation: Дія спрямована на самих виконавців (вони), потрібен давальний відмінок
      зворотного займенника «собі».
  - sentence: Вона завжди пишається нею.
    error: нею
    correction: собою
    error_type: word
    options:
    - собою
    - себе
    - своєю
    explanation: Вона пишається власними досягненнями, тому потрібен орудний відмінок
      від «себе» — «собою».
  - sentence: Він приніс цю річ для самого.
    error: самого
    correction: себе
    error_type: word
    options:
    - себе
    - собі
    - нього
    explanation: Прийменник «для» вимагає родового відмінка зворотного займенника
      «себе».
  - sentence: Чи можеш уявити тебе таку ситуацію?
    error: тебе
    correction: собі
    error_type: word
    options:
    - собі
    - себе
    - собою
    explanation: Вираз «уявити собі» використовує давальний відмінок зворотного займенника.
- id: match-up-reflexive-self
  type: match-up
  instruction: З'єднайте сталі вирази з їхніми значеннями.
  pairs:
  - left: почувати себе
    right: мати певне самопочуття, стан здоров'я
  - left: сам по собі
    right: діяти ізольовано від інших, незалежно
  - left: так собі
    right: не дуже хороший результат, середній
  - left: від себе
    right: від власного імені
  - left: не по собі
    right: відчуття тривоги або дискомфорту
  - left: пишатися собою
    right: бути дуже задоволеним своїми досягненнями
- id: indefinite-pronoun-choice
  type: fill-in
  instruction: Вставте правильний неозначений займенник за контекстом.
  items:
  - sentence: У двері _____ дзвонить, я піду відчиню.
    answer: хтось
    options:
    - хтось
    - будь-хто
    - хто-небудь
  - sentence: Цю просту задачу може вирішити _____.
    answer: будь-хто
    options:
    - хтось
    - будь-хто
    - дехто
  - sentence: Чи є тут _____ живий?
    answer: хто-небудь
    options:
    - хтось
    - будь-хто
    - хто-небудь
  - sentence: _____ з нас уже знає правильну відповідь.
    answer: Дехто
    options:
    - Дехто
    - Хтось
    - Будь-хто
  - sentence: Він зробив цю роботу дуже погано, просто _____.
    answer: абияк
    options:
    - абияк
    - хтозна-як
    - якось
  - sentence: Цей старий лист надійшов від _____.
    answer: казна-кого
    options:
    - казна-кого
    - когось
    - кого-небудь
- id: fill-in-negative-pronouns-and-prepositions
  type: fill-in
  instruction: Вставте правильну форму заперечного займенника з прийменником. Пам'ятайте
    про правило розриву.
  items:
  - sentence: У цьому місті мені абсолютно _____ поговорити.
    answer: ні з ким
    options:
    - нізким
    - ні з ким
    - не з ким
  - sentence: Цей старий лист не стосується вас, він _____.
    answer: ні про що
    options:
    - ніпрощо
    - ні про що
    - не про що
  - sentence: Я не можу знайти допомогу, мені _____ звернутися.
    answer: ні до кого
    options:
    - ні до кого
    - нідокого
    - не до кого
  - sentence: Цей замок міцний, він не відчиниться _____ обставин.
    answer: ні за яких
    options:
    - ні за яких
    - нізаяких
    - не за яких
  - sentence: Ми повернулися з магазину _____, бо все було закрито.
    answer: ні з чим
    options:
    - ні з чим
    - нізчим
    - не з чим
  - sentence: Я _____ не залежу в цій ситуації.
    answer: ні від кого
    options:
    - ні від кого
    - нівідкого
    - не від кого
- id: self-check-classify-pronouns-by-type
