- type: fill-in
  title: "Вибір сполучника та форми дієслова"
  instruction: "Оберіть правильний варіант для заповнення пропуску."
  items:
    - sentence: "Ми вивчаємо граматику, _____ краще розуміти структуру мови."
      answer: "щоб"
      options:
        - "щоб"
        - "що"
        - "ніби"
        - "ніж"
    - sentence: "Вона прийшла до бібліотеки, щоб _____ нову книгу."
      answer: "взяти"
      options:
        - "взяти"
        - "взяла"
        - "брала"
        - "бере"
    - sentence: "Я дуже хочу, _____ ти прочитав цю статтю."
      answer: "щоб"
      options:
        - "щоб"
        - "аби"
        - "що"
        - "як"
    - sentence: "Студенти відкрили словники, _____ знайти переклад."
      answer: "аби"
      options:
        - "аби"
        - "або"
        - "що"
        - "чи"
    - sentence: "Уряд ухвалив закон, _____ підтримати економіку країни."
      answer: "для того щоб"
      options:
        - "для того щоб"
        - "за те що"
        - "тому що"
        - "через те що"
    - sentence: "Він щодня тренується, _____ виграти змагання."
      answer: "щоб"
      options:
        - "щоб"
        - "бо"
        - "тому"
        - "що"
    - sentence: "Вони поїхали в гори, щоб _____ на лижах."
      answer: "покататися"
      options:
        - "покататися"
        - "покаталися"
        - "катаються"
        - "каталися"
    - sentence: "Щоб _____ рибу, треба у воду лізти."
      answer: "їсти"
      options:
        - "їсти"
        - "з'їв"
        - "їв"
        - "їсть"

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Знайдіть і виправте помилку, пов'язану з надлишковою кон'югацією або лексичним суржиком."
  items:
    - sentence: "Я йду в супермаркет, щоб я купив свіжий хліб."
      error: "я купив"
      answer: "купити"
      error_type: "phrase"
      options:
        - "купити"
        - "купую"
        - "купував"
        - "купить"
      explanation: "Якщо підмет однаковий, використовуємо інфінітив без займенника."
    - sentence: "Вона приїхала до Києва, щоб вона відвідала конференцію."
      error: "вона відвідала"
      answer: "відвідати"
      error_type: "phrase"
      options:
        - "відвідати"
        - "відвідує"
        - "відвідає"
        - "відвідувала"
      explanation: "Правило однакового підмета вимагає інфінітива."
    - sentence: "Цей проєкт переслідує мету покращити освіту."
      error: "переслідує мету"
      answer: "має на меті"
      error_type: "phrase"
      options:
        - "має на меті"
        - "шукає ціль"
        - "йде за метою"
        - "біжить до мети"
      explanation: "Переслідувати мету — це калька. Правильно українською: мати на меті."
    - sentence: "Ми зібралися тут, щоб ми обговорили наші плани."
      error: "ми обговорили"
      answer: "обговорити"
      error_type: "phrase"
      options:
        - "обговорити"
        - "обговорюємо"
        - "обговоримо"
        - "обговорювали"
      explanation: "Займенник ми дублювати не потрібно. Використовуйте неозначену форму дієслова."
    - sentence: "Вони багато працюють, щоб вони стали незалежними."
      error: "вони стали"
      answer: "стати"
      error_type: "phrase"
      options:
        - "стати"
        - "стають"
        - "стануть"
        - "ставали"
      explanation: "Один підмет означає використання інфінітива в підрядній частині."
    - sentence: "Студент відкрив книгу, щоб він прочитав текст."
      error: "він прочитав"
      answer: "прочитати"
      error_type: "phrase"
      options:
        - "прочитати"
        - "прочитає"
        - "читає"
        - "прочитав"
      explanation: "Особа, яка відкрила книгу і яка буде читати, — одна й та сама. Потрібен інфінітив."

