- type: match-up
  title: "Знайдіть логічне продовження"
  instruction: "З'єднайте головну частину речення з підрядною частиною мети."
  pairs:
    - left: "Ми вивчаємо нові слова,"
      right: "щоб вільно спілкуватися."
    - left: "Я поставив будильник на сьому ранку,"
      right: "аби не запізнитися на потяг."
    - left: "Вони відкрили новий бізнес,"
      right: "щоб стати фінансово незалежними."
    - left: "Уряд ухвалив закон,"
      right: "для того щоб підтримати економіку."
    - left: "Вона часто телефонує батькам,"
      right: "щоб дізнатися останні новини."
    - left: "Я швидко йду в магазин,"
      right: "щоб купити свіжий хліб."
    - left: "Леся Українка сміялася,"
      right: "щоб не плакати."
    - left: "Ми ходимо в музеї Львова,"
      right: "щоб краще знати історію."

- type: quiz
  title: "Перевірка теоретичних знань"
  instruction: "Оберіть правильну відповідь на питання з граматики."
  items:
    - question: "Коли ми обов'язково використовуємо інфінітив після сполучника щоб?"
      explanation: "Правило однакового підмета вимагає вживання неозначеної форми дієслова."
      options:
        - text: "Коли підмет у головній і підрядній частинах однаковий."
          correct: true
        - text: "Коли підмети у двох частинах речення різні."
          correct: false
        - text: "Тільки коли ми говоримо про майбутній час."
          correct: false
        - text: "Тільки в офіційно-діловому стилі."
          correct: false
    - question: "Який сполучник мети вважається найбільш нейтральним і універсальним?"
      explanation: "Сполучник щоб є абсолютним лідером за частотністю і підходить для будь-яких ситуацій."
      options:
        - text: "щоб"
          correct: true
        - text: "аби"
          correct: false
        - text: "для того щоб"
          correct: false
        - text: "тому що"
          correct: false
    - question: "Який стилістичний відтінок має складений сполучник для того щоб?"
      explanation: "Складений сполучник використовується для логічного наголошення в офіційних документах."
      options:
        - text: "Офіційно-діловий та науковий."
          correct: true
        - text: "Розмовний та дружній."
          correct: false
        - text: "Поетичний та художній."
          correct: false
        - text: "Діалектний та застарілий."
          correct: false
    - question: "Як правильно сказати українською мовою замість кальки переслідувати мету?"
      explanation: "Автентичний український вираз — мати на меті або ставити за мету."
      options:
        - text: "мати на меті"
          correct: true
        - text: "шукати ціль"
          correct: false
        - text: "ловити мету"
          correct: false
        - text: "бігти за метою"
          correct: false
    - question: "Де в реченні може стояти підрядна частина мети?"
      explanation: "Український синтаксис гнучкий, проте найчастіше мета стоїть після головної дії."
      options:
        - text: "На початку, всередині або в кінці речення."
          correct: true
        - text: "Тільки в самому кінці речення."
          correct: false
        - text: "Тільки перед головною частиною."
          correct: false
        - text: "Тільки всередині головної частини."
          correct: false
    - question: "Що означає українське народне прислів'я щоб рибу їсти треба у воду лізти?"
      explanation: "Це прислів'я ілюструє українську етику праці: успіх вимагає важкої роботи."
      options:
        - text: "Хороший результат неможливий без зусиль."
          correct: true
        - text: "Рибу можна зловити тільки руками."
          correct: false
        - text: "Плавання дуже корисне для здоров'я."
          correct: false
        - text: "У воду краще не лізти без причини."
          correct: false
    - question: "Яке слово краще використовувати для абстрактних життєвих намірів?"
      explanation: "Слово ціль частіше вживається у спорті чи військовій справі, а для життєвих планів краще підходить мета."
      options:
        - text: "мета"
          correct: true
        - text: "ціль"
          correct: false
        - text: "мішень"
          correct: false
        - text: "кінець"
          correct: false
    - question: "Який розділовий знак завжди ставиться перед цільовим сполучником щоб?"
      explanation: "Підрядна частина мети завжди відокремлюється комою."
      options:
        - text: "кома"
          correct: true
        - text: "тире"
          correct: false
        - text: "крапка з комою"
          correct: false
        - text: "двокрапка"
          correct: false

- type: true-false
  title: "Правда чи хиба?"
  instruction: "Визначте, чи є ці граматичні твердження правильними."
  items:
    - statement: "Якщо підмети в головній та підрядній частинах збігаються, дієслово після щоб ставиться в неозначеній формі."
      correct: true
      explanation: "Це головне правило конструкції мети з одним суб'єктом."
    - statement: "Сполучники щоб та аби є абсолютними синонімами."
      correct: true
      explanation: "Так, вони взаємозамінні, хоча аби звучить більш літературно і м'яко."
    - statement: "Речення Я йду в магазин, щоб я купив хліб є граматично правильним."
      correct: false
      explanation: "Займенник я дублювати не потрібно. Правильно: Я йду, щоб купити хліб."
    - statement: "Слово інфінітив означає дієслово в минулому часі."
      correct: false
      explanation: "Інфінітив — це неозначена форма дієслова, яка відповідає на питання що робити/що зробити."
    - statement: "В українській мові слово ціль краще використовувати для спортивних результатів, а мета — для життєвих планів."
      correct: true
      explanation: "Це стилістичний нюанс української лексики."
    - statement: "Підрядна частина зі сполучником щоб може стояти на початку речення."
      correct: true
      explanation: "Наприклад: Щоб створити гру, я щодня вивчаю програмування."
    - statement: "Для вираження мети можна використовувати дієслова тільки доконаного виду."
      correct: false
      explanation: "Можна використовувати обидва види. Вибір залежить від того, чи важливий результат, чи процес."
    - statement: "Для того щоб є розмовним сполучником, який часто використовується з друзями."
      correct: false
      explanation: "Це складений сполучник офіційно-ділового стилю, він звучить важко у звичайній розмові."

