- type: quiz
  title: "Вибір правильного префікса напрямку"
  items:
    - question: "Який префікс ми використовуємо для позначення успішного прибуття на місце?"
      options:
        - text: "при-"
          correct: true
        - text: "по-"
          correct: false
        - text: "ви-"
          correct: false
        - text: "в-"
          correct: false
      explanation: "Префікс при- означає успішне досягнення мети."
    - question: "Яке дієслово найкраще означає залишення закритого простору пішки?"
      options:
        - text: "вийти"
          correct: true
        - text: "прийти"
          correct: false
        - text: "зайти"
          correct: false
        - text: "піти"
          correct: false
      explanation: "Префікс ви- вказує на рух назовні з приміщення."
    - question: "Який прийменник зазвичай використовується разом із дієсловом виїхати?"
      options:
        - text: "з"
          correct: true
        - text: "в"
          correct: false
        - text: "на"
          correct: false
        - text: "до"
          correct: false
      explanation: "Прийменник з (із) вказує на залишення місця або джерело руху."
    - question: "До якої частини мови належать слова вхід та вихід?"
      options:
        - text: "іменник"
          correct: true
        - text: "дієслово"
          correct: false
        - text: "прикметник"
          correct: false
        - text: "прислівник"
          correct: false
      explanation: "Це іменники, що походять від відповідних дієслів руху."
    - question: "Що означає дієслово поїхати у порівнянні з приїхати?"
      options:
        - text: "початок руху"
          correct: true
        - text: "результат руху"
          correct: false
        - text: "рух усередину"
          correct: false
        - text: "рух назовні"
          correct: false
      explanation: "Поїхати констатує початок подорожі, а не успішне прибуття."
    - question: "Як правильно сказати про те, що людина перетнула двері кімнати всередину?"
      options:
        - text: "вона увійшла"
          correct: true
        - text: "вона вийшла"
          correct: false
        - text: "вона прийшла"
          correct: false
        - text: "вона поїхала"
          correct: false
      explanation: "Префікс у-/в- означає рух усередину закритого простору."
    - question: "Який префікс найкраще описує рух із гаража або парковки назовні?"
      options:
        - text: "ви-"
          correct: true
        - text: "в-"
          correct: false
        - text: "при-"
          correct: false
        - text: "по-"
          correct: false
      explanation: "Ви- означає рух із закритого простору назовні."
    - question: "Яку форму дієслова треба використати для факту перетину кордону на машині?"
      options:
        - text: "в'їхати"
          correct: true
        - text: "увійти"
          correct: false
        - text: "приїхати"
          correct: false
        - text: "прийти"
          correct: false
      explanation: "В'їхати поєднує значення транспорту та руху всередину."
    - question: "Яке слово описує процес прибуття літака в аеропорт за розкладом?"
      options:
        - text: "прилетіти"
          correct: true
        - text: "вилетіти"
          correct: false
        - text: "полетіти"
          correct: false
        - text: "залетіти"
          correct: false
      explanation: "При- означає прибуття, летіти вказує на повітряний транспорт."
    - question: "Яку правильну фразу слід використати для успішного завершення подорожі на вокзалі?"
      options:
        - text: "ми приїхали"
          correct: true
        - text: "ми поїхали"
          correct: false
        - text: "ми вийшли"
          correct: false
        - text: "ми увійшли"
          correct: false
      explanation: "Приїхали означає, що рух транспортом успішно завершився."
    - question: "Якщо ви сидите вдома, яке дієслово опише візит вашого друга прямо зараз?"
      options:
        - text: "він прийшов"
          correct: true
        - text: "він приходив"
          correct: false
        - text: "він пішов"
          correct: false
        - text: "він вийшов"
          correct: false
      explanation: "Доконаний вид прийшов означає, що він фізично знаходиться тут."
    - question: "Що точно означає недоконаний вид дієслова приходити у минулому часі?"
      options:
        - text: "скасований результат"
          correct: true
        - text: "постійна присутність"
          correct: false
        - text: "рух назовні"
          correct: false
        - text: "початок подорожі"
          correct: false
      explanation: "Приходив означає, що людина була тут, але вже пішла."
    - question: "Чому ми зазвичай говоримо увійшла в кімнату замість увійшла у кімнату?"
      options:
        - text: "для милозвучності"
          correct: true
        - text: "це правило відмінків"
          correct: false
        - text: "це виняток"
          correct: false
        - text: "це помилка"
          correct: false
      explanation: "Ми чергуємо голосні та приголосні для плавного звучання мови."
    - question: "Як українською мовою правильно сказати англійську фразу she went out?"
      options:
        - text: "вона вийшла"
          correct: true
        - text: "вона прийшла"
          correct: false
        - text: "вона увійшла"
          correct: false
        - text: "вона поїхала"
          correct: false
      explanation: "Дієслово вийшла передає ідею залишення місця або будівлі."
    - question: "Яке дієслово підходить для опису великого поїзда, що зупиняється біля платформи?"
      options:
        - text: "прибуває"
          correct: true
        - text: "входить"
          correct: false
        - text: "виходить"
          correct: false
        - text: "поїхав"
          correct: false
      explanation: "Поїзд прибуває або приїжджає на залізничну станцію."

- type: fill-in
  title: "Вставте правильне дієслово"
  instruction: "Доповніть речення дієсловом, яке найкраще підходить за змістом."
  items:
    - sentence: "Кожного ранку я _____ з дому о восьмій годині."
      answer: "виходжу"
      options: ["виходжу", "приходжу", "заходжу", "входжу"]
    - sentence: "Наш поїзд _____ на центральний вокзал рівно за розкладом."
      answer: "прибув"
      options: ["прибув", "вибув", "перебув", "відбув"]
    - sentence: "Будь ласка, не забудьте _____ з системи після завершення роботи."
      answer: "вийти"
      options: ["вийти", "зайти", "увійти", "прийти"]
    - sentence: "Ми дуже втомилися, коли нарешті _____ до нашого готелю."
      answer: "приїхали"
      options: ["приїхали", "поїхали", "виїхали", "заїхали"]
    - sentence: "Коли директор _____ в кабінет, усі студенти раптово замовкли."
      answer: "увійшов"
      options: ["увійшов", "вийшов", "прийшов", "відійшов"]
    - sentence: "Машина обережно _____ у вузький двір старого будинку."
      answer: "в'їхала"
      options: ["в'їхала", "виїхала", "приїхала", "поїхала"]
    - sentence: "Щоб подихати свіжим повітрям, він _____ на балкон своєї квартири."
      answer: "вийшов"
      options: ["вийшов", "прийшов", "увійшов", "відійшов"]
    - sentence: "Літак з Польщі щойно _____ і пасажири чекають на свій багаж."
      answer: "прилетів"
      options: ["прилетів", "вилетів", "полетів", "залетів"]
    - sentence: "Мій брат _____ в гості вчора, але зараз він уже вдома."
      answer: "приходив"
      options: ["приходив", "прийшов", "виходив", "вийшов"]
    - sentence: "Нарешті мій друг _____ до мене, він зараз сидить на кухні."
      answer: "прийшов"
      options: ["прийшов", "приходив", "пішов", "вийшов"]
    - sentence: "Після довгого ремонту наш комп'ютер знову _____ з ладу."
      answer: "вийшов"
      options: ["вийшов", "увійшов", "прийшов", "відійшов"]
    - sentence: "Молода дівчина нещодавно _____ заміж за свого однокласника."
      answer: "вийшла"
      options: ["вийшла", "увійшла", "прийшла", "зійшла"]
    - sentence: "Відомий український письменник назавжди _____ в історію літератури."
      answer: "увійшов"
      options: ["увійшов", "вийшов", "прийшов", "пішов"]
    - sentence: "Вона дуже злякалася, але через декілька хвилин _____ до тями."
      answer: "прийшла"
      options: ["прийшла", "вийшла", "увійшла", "пішла"]
    - sentence: "Пташка залетіла в кімнату, а потім швидко _____ через відкрите вікно."
      answer: "вилетіла"
      options: ["вилетіла", "прилетіла", "влетіла", "злетіла"]

- type: fill-in
  title: "Зміна напрямку руху"
  instruction: "Виберіть антонім (протилежний напрямок) до логіки речення."
  items:
    - sentence: "Замість того, щоб увійти в кімнату, він вирішив _____ на вулицю."
      answer: "вийти"
      options: ["вийти", "зайти", "прийти", "пійти"]
    - sentence: "Якщо ви не хочете в'їхати в гараж, вам доведеться _____ з нього."
      answer: "виїхати"
      options: ["виїхати", "приїхати", "заїхати", "поїхати"]
    - sentence: "Після того, як гості успішно приїхали, настав час їм _____."
      answer: "поїхати"
      options: ["поїхати", "прийти", "увійти", "зайти"]
    - sentence: "Пташка не тільки залетіла в дім, але й одразу _____ назад."
      answer: "вилетіла"
      options: ["вилетіла", "прилетіла", "влетіла", "полетіла"]
    - sentence: "Це не вхід до великої будівлі, це запасний _____."
      answer: "вихід"
      options: ["вихід", "перехід", "підхід", "захід"]
    - sentence: "Ми не раділи прибуттю швидкого поїзда, а сумували через його _____."
      answer: "відправлення"
      options: ["відправлення", "прибуття", "зупинку", "станцію"]
    - sentence: "Щоб зрозуміти правило, треба не вийти з системи, а _____ в неї."
      answer: "увійти"
      options: ["увійти", "вийти", "піти", "прийти"]
    - sentence: "Вона не прийшла до мене в гості, а _____ додому дуже рано."
      answer: "пішла"
      options: ["пішла", "зайшла", "увійшла", "прийшла"]
    - sentence: "Машина не в'їхала на парковку, а швидко _____ звідти."
      answer: "виїхала"
      options: ["виїхала", "приїхала", "заїхала", "поїхала"]
    - sentence: "Ти можеш зайти до кабінету лікаря, або _____ в коридор і чекати."
      answer: "вийти"
      options: ["вийти", "прийти", "підійти", "відійти"]

- type: match-up
  title: "Знайдіть пару: дієслово та його значення"
  instruction: "З'єднайте дієслово з його правильним описом або значенням."
  pairs:
    - left: "прийти"
      right: "досягти мети пішки"
    - left: "вийти"
      right: "покинути закритий простір пішки"
    - left: "увійти"
      right: "перетнути кордон всередину будівлі"
    - left: "приїхати"
      right: "досягти мети на транспорті"
    - left: "виїхати"
      right: "покинути територію на транспорті"
    - left: "в'їхати"
      right: "потрапити транспортом всередину"
    - left: "прибути"
      right: "офіційне завершення подорожі"
    - left: "вийти заміж"
      right: "стати дружиною"
    - left: "прийти до тями"
      right: "повернути свідомість"
    - left: "увійти в історію"
      right: "стати історично видатним"
    - left: "вийти з ладу"
      right: "зламатися (про техніку)"
    - left: "приходити"
      right: "бувати регулярно або без результату"

- type: unjumble
  title: "Побудуйте речення з дієсловами руху"
  instruction: "Складіть слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["наш", "поїзд", "прибуває", "на", "першу", "колію"]
      answer: "Наш поїзд прибуває на першу колію."
    - words: ["студенти", "повинні", "прийти", "вчасно", "на", "лекцію"]
      answer: "Студенти повинні прийти вчасно на лекцію."
    - words: ["директор", "щойно", "вийшов", "зі", "свого", "кабінету"]
      answer: "Директор щойно вийшов зі свого кабінету."
    - words: ["великий", "автобус", "обережно", "в'їхав", "у", "двір"]
      answer: "Великий автобус обережно в'їхав у двір."
    - words: ["сестра", "мого", "друга", "нещодавно", "вийшла", "заміж"]
      answer: "Сестра мого друга нещодавно вийшла заміж."
    - words: ["після", "довгої", "дороги", "ми", "приїхали", "додому"]
      answer: "Після довгої дороги ми приїхали додому."

- type: error-correction
  title: "Виправте типові помилки напрямку"
  instruction: "Знайдіть помилку в реченні та оберіть правильний варіант."
  items:
    - sentence: "Ми поїхали на вокзалі, щоб зустріти друзів."
      error: "вокзалі"
      answer: "вокзал"
      options: ["вокзал", "вокзалом", "вокзалу", "вокзалах"]
      explanation: "Прийменник на з дієсловами напрямку вимагає знахідного відмінка (куди? на вокзал)."
    - sentence: "Вона вийшла в магазин за хлібом."
      error: "вийшла"
      answer: "увійшла"
      options: ["увійшла", "прийшла", "зійшла", "перейшла"]
      explanation: "Якщо прийменник в, дієслово має означати рух усередину."
    - sentence: "Я приїхав з Київ вчора ввечері."
      error: "Київ"
      answer: "Києва"
      options: ["Києва", "Києві", "Києвом", "Києву"]
      explanation: "Прийменник з (із) вказує на джерело і вимагає родового відмінка (з кого/чого? з Києва)."
    - sentence: "Мій новий комп'ютер прийшов з ладу і не працює."
      error: "прийшов"
      answer: "вийшов"
      options: ["вийшов", "пішов", "зійшов", "увійшов"]
      explanation: "Фразеологізм вийти з ладу означає зламатися."
    - sentence: "Великий літак вилетів в Нью-Йорк сьогодні вранці."
      error: "вилетів"
      answer: "полетів"
      options: ["полетів", "прилетів", "залетів", "злетів"]
      explanation: "Якщо ми акцентуємо увагу на місті призначення, логічніше використовувати полетів або прилетів."
    - sentence: "Я приїхати в готель дуже пізно вночі."
      error: "приїхати"
      answer: "приїхав"
      options: ["приїхав", "приїхала", "приїду", "приїхали"]
      explanation: "Дієслово має бути узгоджене в минулому часі з особою."
    - sentence: "Вона увійшла у кімнату швидко і тихо."
      error: "у"
      answer: "в"
      options: ["в", "до", "із", "з"]
      explanation: "Після слова, що закінчується на голосну, використовуємо прийменник в для милозвучності."
    - sentence: "Колега часто приїхав на таксі минулого року."
      error: "приїхав"
      answer: "приїжджав"
      options: ["приїжджав", "поїхав", "виїхав", "заїхав"]
      explanation: "Регулярна повторювана дія в минулому вимагає недоконаного виду."

- type: quiz
  title: "Культура та ідіоматика"
  instruction: "Оберіть правильну відповідь щодо культурних кодів руху."
  items:
    - question: "Що означає український фразеологізм вийти з ладу?"
      options:
        - text: "зламатися"
          correct: true
        - text: "вийти на вулицю"
          correct: false
        - text: "одружитися"
          correct: false
        - text: "заспокоїтися"
          correct: false
      explanation: "Це означає, що техніка або система перестала нормально працювати."
    - question: "Що українці роблять перед тим, як вийти з дому у довгу подорож?"
      options:
        - text: "сидять на дорогу"
          correct: true
        - text: "їдять коровай"
          correct: false
        - text: "п'ють воду"
          correct: false
        - text: "співають пісні"
          correct: false
      explanation: "Традиція посидіти на дорогу допомагає заспокоїтися перед виїздом."
    - question: "Що символізує традиція зустрічі гостей з хлібом-сіллю?"
      options:
        - text: "гостинність та мир"
          correct: true
        - text: "швидкий від'їзд"
          correct: false
        - text: "довгу подорож"
          correct: false
        - text: "багатство природи"
          correct: false
      explanation: "Коровай із сіллю показує, що гостям раді в цьому домі."
    - question: "Як українською мовою сказати про жінку, яка стала дружиною?"
      options:
        - text: "вона вийшла заміж"
          correct: true
        - text: "вона увійшла заміж"
          correct: false
        - text: "вона прийшла заміж"
          correct: false
        - text: "вона поїхала заміж"
          correct: false
      explanation: "Історично жінка виходила зі свого дому в нову родину."
    - question: "Яке значення має фраза прийти до тями після шоку?"
      options:
        - text: "повернути свідомість"
          correct: true
        - text: "прийти в гості"
          correct: false
        - text: "забути все"
          correct: false
        - text: "зламатися"
          correct: false
      explanation: "Це означає відновити здатність нормально мислити після шоку або травми."
    - question: "Що означає вислів увійти в історію для видатної людини?"
      options:
        - text: "стати видатним"
          correct: true
        - text: "вивчати історію"
          correct: false
        - text: "читати підручник"
          correct: false
        - text: "забути минуле"
          correct: false
      explanation: "Людина стає частиною історичного процесу завдяки своїм діям."
    - question: "Звідки походить традиційний тост на коня перед від'їздом?"
      options:
