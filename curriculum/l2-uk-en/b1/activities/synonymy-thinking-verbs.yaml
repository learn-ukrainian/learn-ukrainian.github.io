- type: match-up
  title: 'Знайдіть пару: дієслова та їх значення'
  instruction: 'Поєднайте дієслово з його точним значенням або контекстом використання.'
  pairs:
    - left: 'вважати'
      right: 'висловлювати обґрунтовану думку, офіційна позиція'
    - left: 'гадати'
      right: 'робити припущення, висувати гіпотезу'
    - left: 'міркувати'
      right: 'проводити логічний аналіз, зважувати всі за і проти'
    - left: 'рахувати'
      right: 'виконувати математичні дії з цифрами та грошима'
    - left: 'ворожити'
      right: 'передбачати майбутнє за допомогою містичних ритуалів'
    - left: 'усвідомлювати'
      right: 'глибоко розуміти значення події чи нової інформації'
    - left: 'осягати'
      right: 'повністю розуміти складну або абстрактну концепцію'
    - left: 'згадувати'
      right: 'відновлювати інформацію в пам''яті'

- type: quiz
  title: 'Перевірте свої знання'
  instruction: 'Оберіть одну правильну відповідь для кожного запитання.'
  items:
    - question: 'Який прийменник потрібен у реченні: Я часто думаю ... своє дитинство?'
      explanation: 'Конструкція "думати про" використовується для загальних думок та спогадів.'
      options:
        - text: 'про'
          correct: true
        - text: 'над'
          correct: false
        - text: 'за'
          correct: false
        - text: 'від'
          correct: false
    - question: 'Як правильно сказати в офіційному контексті: Я ..., що цей проєкт дуже успішний?'
      explanation: 'В офіційно-діловому стилі для вираження думки використовується дієслово "вважати".'
      options:
        - text: 'вважаю'
          correct: true
        - text: 'рахую'
          correct: false
        - text: 'гадаю'
          correct: false
        - text: 'думаю'
          correct: false
    - question: 'Яке дієслово означає процес вирішення складної проблеми або логічного аналізу?'
      explanation: 'Дієслово "міркувати" описує сам процес роботи мозку і логічний аналіз.'
      options:
        - text: 'міркувати'
          correct: true
        - text: 'гадати'
          correct: false
        - text: 'згадувати'
          correct: false
        - text: 'рахувати'
          correct: false
    - question: 'Яке слово потрібно використати у реченні: Касир ... решту покупцеві?'
      explanation: 'Слово "рахувати" використовується виключно для математичних обчислень.'
      options:
        - text: 'рахує'
          correct: true
        - text: 'вважає'
          correct: false
        - text: 'думає'
          correct: false
        - text: 'міркує'
          correct: false
    - question: 'Який фразеологічний вираз означає діяти дуже швидко, без зайвих вагань?'
      explanation: 'Український вираз "не довго думаючи й гадаючи" означає приймати рішення без довгих роздумів.'
      options:
        - text: 'не довго думаючи й гадаючи'
          correct: true
        - text: 'вважаючи за потрібне'
          correct: false
        - text: 'міркуючи вголос'
          correct: false
        - text: 'розуміючи з півслова'
          correct: false
    - question: 'Як перекладається відомий філософський вислів Рене Декарта Cogito, ergo sum?'
      explanation: 'В українській традиції використовується дієслово "мислити" для опису абстрактного пізнання.'
      options:
        - text: 'Я мислю, отже я існую'
          correct: true
        - text: 'Я вважаю, отже я є'
          correct: false
        - text: 'Я гадаю, тому живу'
          correct: false
        - text: 'Я рахую, значить існую'
          correct: false
    - question: 'Яке слово описує людину, яка передбачає майбутнє за допомогою карт?'
      explanation: 'В українській мові слово "ворожка" походить від дієслова "ворожити".'
      options:
        - text: 'ворожка'
          correct: true
        - text: 'мислитель'
          correct: false
        - text: 'касир'
          correct: false
        - text: 'дослідник'
          correct: false
    - question: 'Що означає популярний український вираз розуміти з півслова?'
      explanation: 'Цей вираз означає високий рівень емпатії, коли довгі пояснення не потрібні.'
      options:
        - text: 'розуміти дуже швидко і без довгих пояснень'
          correct: true
        - text: 'розуміти лише половину отриманої інформації'
          correct: false
        - text: 'не розуміти нічого з того, що кажуть'
          correct: false
        - text: 'говорити дуже тихо або пошепки'
          correct: false

- type: fill-in
  title: 'Вставте пропущене слово'
  instruction: 'Оберіть найбільш доречне дієслово для кожного контексту.'
  items:
    - sentence: 'Керівник компанії вирішив, що він _____ за потрібне змінити стратегію розвитку.'
      answer: 'вважає'
      options:
        - 'вважає'
        - 'рахує'
        - 'міркує'
        - 'ворожить'
      explanation: 'Сталий вираз "вважати за потрібне".'
    - sentence: 'Бухгалтер дуже уважно _____ гроші після закриття робочої зміни.'
      answer: 'рахує'
      options:
        - 'рахує'
        - 'вважає'
        - 'гадає'
        - 'мислить'
      explanation: 'Слово "рахувати" використовується для грошей і цифр.'
    - sentence: 'Я _____, що завтра буде сонячна погода, бо на небі зовсім немає хмар.'
      answer: 'гадаю'
      options:
        - 'гадаю'
        - 'вважаю'
        - 'рахую'
        - 'міркую'
      explanation: 'Для вираження припущення або гіпотези використовується "гадати".'
    - sentence: 'Студенти дуже довго _____ над цією складною математичною задачею на іспиті.'
      answer: 'думали'
      options:
        - 'думали'
        - 'вважали'
        - 'гадали'
        - 'розуміли'
      explanation: 'Конструкція "думати над" + орудний відмінок.'
    - sentence: 'Лише через кілька років він зміг повністю _____ масштаб цієї жахливої трагедії.'
      answer: 'усвідомити'
      options:
        - 'усвідомити'
        - 'порахувати'
        - 'поворожити'
        - 'згадати'
      explanation: 'Слово "усвідомити" означає глибоко зрозуміти значення чогось.'
    - sentence: 'Якщо ми будемо _____ логічно, то досить швидко знайдемо правильну відповідь.'
      answer: 'міркувати'
      options:
        - 'міркувати'
        - 'гадати'
        - 'рахувати'
        - 'вважати'
      explanation: 'Сталий вираз "міркувати логічно".'
    - sentence: 'Стара жінка на центральній площі _____ довірливим людям на кавовій гущі.'
      answer: 'ворожила'
      options:
        - 'ворожила'
        - 'гадала'
        - 'вважала'
        - 'міркувала'
      explanation: 'Містичні ритуали описуються словом "ворожити", а не "гадати".'
    - sentence: 'Вона постійно _____ про свою майбутню велику подорож до Європи.'
      answer: 'думає'
      options:
        - 'думає'
        - 'вважає'
        - 'міркує'
        - 'рахує'
      explanation: 'Конструкція "думати про" використовується для загальних думок.'

- type: error-correction
  title: 'Виправте типові помилки'
  instruction: 'Знайдіть та виправте лексичні помилки в реченнях. Зверніть увагу на кальки з російської мови.'
  items:
    - sentence: 'Я рахую, що це дуже погана ідея для нашого бізнесу.'
      error: 'рахую'
      answer: 'вважаю'
      options:
        - 'вважаю'
        - 'думаю'
        - 'міркую'
        - 'гадаю'
      explanation: 'Для вираження думки використовується слово вважати, а рахувати — виключно для цифр.'
    - sentence: 'Багато відомих експертів рахують цей новий закон неефективним.'
      error: 'рахують'
      answer: 'вважають'
      options:
        - 'вважають'
        - 'міркують'
        - 'думають'
        - 'ворожать'
      explanation: 'Експерти висловлюють офіційну позицію, тому треба вживати дієслово вважають.'
    - sentence: 'Ми думаємо над тебе кожного дня, коли ти далеко від дому.'
      error: 'над тебе'
      answer: 'про тебе'
      options:
        - 'про тебе'
        - 'до тебе'
        - 'за тебе'
        - 'на тебе'
      explanation: 'Коли йдеться про людину або загальні спогади, використовується конструкція думати про.'
    - sentence: 'Ворожка довго гадала мені по руці, розказуючи про майбутнє.'
      error: 'гадала'
      answer: 'ворожила'
      options:
        - 'ворожила'
        - 'вважала'
        - 'міркувала'
        - 'мислила'
      explanation: 'Для містичних ритуалів використовується слово ворожити, а гадати — це розумовий процес.'
    - sentence: 'Я вважаю над цією складною проблемою вже дві години поспіль.'
      error: 'вважаю'
      answer: 'думаю'
      options:
        - 'думаю'
        - 'міркую'
        - 'гадаю'
        - 'усвідомлюю'
      explanation: 'Для опису процесу пошуку рішення вживається дієслово думати над або міркувати над.'
    - sentence: 'На офіційній зустрічі директор серйозно сказав: Я думаю, нам треба підписати договір.'
      error: 'думаю'
      answer: 'вважаю'
      options:
        - 'вважаю'
        - 'гадаю'
        - 'міркую'
        - 'мислю'
      explanation: 'В офіційно-діловому стилі для висловлення твердої позиції краще використовувати дієслово вважати.'

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Розташуйте слова у правильному порядку, звертаючи увагу на сталі вирази.'
  items:
    - words:
        - 'Я'
        - 'вважаю'
        - 'за'
        - 'потрібне'
        - 'перевірити'
        - 'документи'
      answer: 'Я вважаю за потрібне перевірити документи'
    - words:
        - 'Інженери'
        - 'довго'
        - 'думали'
        - 'над'
        - 'цією'
        - 'проблемою'
      answer: 'Інженери довго думали над цією проблемою'
    - words:
        - 'Він'
        - 'не'
        - 'довго'
        - 'думаючи'
        - 'й'
        - 'гадаючи'
        - 'погодився'
      answer: 'Він не довго думаючи й гадаючи погодився'
    - words:
        - 'Справжні'
        - 'друзі'
        - 'розуміють'
        - 'одне'
        - 'одного'
        - 'з'
        - 'півслова'
      answer: 'Справжні друзі розуміють одне одного з півслова'
    - words:
        - 'Багато'
        - 'науковців'
        - 'вважають'
        - 'цей'
        - 'проєкт'
        - 'дуже'
        - 'перспективним'
      answer: 'Багато науковців вважають цей проєкт дуже перспективним'
    - words:
        - 'Людському'
        - 'розуму'
        - 'важко'
        - 'осягнути'
        - 'безмежність'
        - 'нашого'
        - 'Всесвіту'
      answer: 'Людському розуму важко осягнути безмежність нашого Всесвіту'

- type: true-false
  title: 'Правда чи хиба?'
  instruction: 'Визначте, чи є твердження правильним, враховуючи нюанси значень слів.'
  items:
    - statement: 'Дієслово "мислити" чудово підходить для опису щоденних побутових думок про вечерю.'
      correct: false
      explanation: 'Дієслово мислити використовується для опису абстрактного та філософського пізнання.'
    - statement: 'Конструкція "думати над" вимагає після себе слова в орудному відмінку.'
      correct: true
      explanation: 'Наприклад: думати над проблемою, думати над складним завданням.'
    - statement: 'В українській мові слово "рахувати" є повним і точним синонімом слова "вважати".'
      correct: false
      explanation: 'Слово рахувати використовується виключно для математичних дій та підрахунку грошей.'
    - statement: 'Дієслово "гадати" зазвичай висловлює припущення, а не стовідсоткову впевненість.'
      correct: true
      explanation: 'Це слово ідеально підходить для гіпотез, наприклад: Я гадаю, що сьогодні буде дощ.'
    - statement: 'У виразі "міркувати логічно" головний акцент робиться на сильному емоційному сприйнятті.'
      correct: false
      explanation: 'Це означає спиратися на факти та закони логіки, повністю відкидаючи емоції.'
    - statement: 'Український вираз "розуміти з півслова" означає найвищий рівень емпатії між людьми.'
      correct: true
      explanation: 'Це стан, коли люди настільки близькі, що розуміють одне одного миттєво і без пояснень.'
    - statement: 'Слово "ворожити" використовується для опису містичних ритуалів передбачення майбутнього.'
      correct: true
      explanation: 'Наприклад, люди можуть ворожити на картах таро або на кавовій гущі.'
    - statement: 'Дієслово "осягати" означає просто запам''ятати якийсь короткий історичний факт.'
      correct: false
      explanation: 'Дієслово осягати означає повністю і глибоко зрозуміти абстрактну чи дуже складну концепцію.'

- type: select
  title: 'Оберіть правильні варіанти'
  instruction: 'Для кожного запитання оберіть усі правильні відповіді. Зверніть увагу: правильних відповідей може бути декілька.'
  items:
    - question: 'Які дієслова підходять для опису тривалого процесу аналізу та роздумів?'
      min_correct: 2
      options:
        - text: 'міркувати'
          correct: true
        - text: 'обмірковувати'
          correct: true
        - text: 'розуміти'
          correct: false
        - text: 'згадувати'
          correct: false
      explanation: 'Слова міркувати та обмірковувати підкреслюють сам процес роботи мозку.'
    - question: 'Оберіть граматично та лексично правильні українські конструкції.'
      min_correct: 2
      options:
        - text: 'думати про своє майбутнє'
          correct: true
        - text: 'думати над цією складною проблемою'
          correct: true
        - text: 'думати за гроші'
          correct: false
        - text: 'думати від тебе'
          correct: false
        - text: 'рахувати, що це так'
          correct: false
        - text: 'ворожити, що піде дощ'
          correct: false
      explanation: 'Правильними є лише конструкції думати про (знахідний відмінок) та думати над (орудний відмінок).'
    - question: 'Які слова та вирази належать до офіційно-ділового стилю для вираження вашої думки?'
      min_correct: 2
      options:
        - text: 'вважати'
          correct: true
        - text: 'вважати за потрібне'
          correct: true
        - text: 'думати'
          correct: false
        - text: 'рахувати'
          correct: false
      explanation: 'В офіційному середовищі слід використовувати дієслово вважати та його похідні конструкції.'
    - question: 'Які дієслова використовуються для опису стану глибокого розуміння або засвоєння інформації?'
      min_correct: 3
      options:
        - text: 'усвідомлювати'
          correct: true
        - text: 'розуміти'
          correct: true
        - text: 'осягати'
          correct: true
        - text: 'гадати'
          correct: false
        - text: 'ворожити'
          correct: false
      explanation: 'Усвідомлювати, розуміти та осягати формують категорію слів, що фіксують факт засвоєння знань.'
    - question: 'Оберіть правильні синоніми до слова "вважати" (у значенні мати власну думку).'
      min_correct: 2
      options:
        - text: 'бути переконаним'
          correct: true
        - text: 'мати думку'
          correct: true
        - text: 'рахувати гроші'
          correct: false
        - text: 'обчислювати результати'
          correct: false
      explanation: 'Слово вважати є синонімом до бути переконаним та мати думку.'
    - question: 'Які дієслова безпосередньо пов''язані з когнітивними процесами людської пам''яті?'
      min_correct: 2
      options:
        - text: 'згадувати'
          correct: true
        - text: 'пам''ятати'
          correct: true
        - text: 'міркувати'
          correct: false
        - text: 'вважати'
          correct: false
      explanation: 'Згадувати та пам''ятати описують процеси збереження та відтворення інформації в мозку.'

- type: cloze
  title: 'Заповніть пропуски в тексті'
