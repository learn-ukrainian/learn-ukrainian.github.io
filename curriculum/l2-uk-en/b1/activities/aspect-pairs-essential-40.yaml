- type: true-false
  title: "Правда чи міф про видові пари"
  instruction: "Оцініть твердження про видові пари дієслів."
  items:
    - statement: "Дієслова доконаного виду можуть використовуватися у теперішньому часі."
      correct: false
      explanation: "Теперішній час в українській мові мають тільки дієслова недоконаного виду."
    - statement: "Допоміжне дієслово бути ніколи не вживається з дієсловами доконаного виду."
      correct: true
      explanation: "Слова буду, будеш використовуються тільки для творення майбутнього часу недоконаного виду."
    - statement: "Пара говорити і сказати утворена за допомогою префікса."
      correct: false
      explanation: "Це суплетивна пара, вона утворена від абсолютно різних коренів."
    - statement: "Слова закінчувати та закінчити є прикладом суфіксального творення."
      correct: true
      explanation: "Тут змінюється суфікс: -ува- на -и-."
    - statement: "В українській мові є три форми майбутнього часу, дві з яких належать до недоконаного виду."
      correct: true
      explanation: "Так, це складена (буду читати) і проста (читатиму) форми."
    - statement: "Речення Я буду прочитати цю книгу граматично правильне."
      correct: false
      explanation: "Це груба помилка. Правильно: Я прочитаю цю книгу або Я буду читати цю книгу."
    - statement: "Дієслово покласти означає дію розміщення предмета горизонтально."
      correct: true
      explanation: "Так, класти і покласти використовуються для горизонтального розміщення."
    - statement: "Прислів'я Вода камінь точить ілюструє завершеність дії."
      correct: false
      explanation: "Воно ілюструє силу безперервного, повторюваного процесу (недоконаний вид)."

- type: quiz
  title: "Оберіть правильний вид дієслова"
  instruction: "Прочитайте речення та оберіть граматично правильний варіант."
  items:
    - question: "Яке дієслово слід використати для опису дії, що відбувається прямо зараз?"
      options:
        - text: "роблю"
          correct: true
        - text: "зроблю"
          correct: false
        - text: "робив"
          correct: false
        - text: "буду робити"
          correct: false
      explanation: "Теперішній час вимагає виключно дієслів недоконаного виду."
    - question: "Оберіть правильну форму для речення: Завтра ввечері я ... телевізор."
      options:
        - text: "буду дивитися"
          correct: true
        - text: "подивлюся"
          correct: false
        - text: "буду подивитися"
          correct: false
        - text: "дивився"
          correct: false
      explanation: "Якщо дія триватиме певний час у майбутньому, використовуємо складений майбутній час недоконаного виду."
    - question: "Який варіант підкреслює результат дії у минулому часі?"
      options:
        - text: "Вчора я прочитав цікаву статтю."
          correct: true
        - text: "Вчора я читав цікаву статтю."
          correct: false
        - text: "Вчора я був читав статтю."
          correct: false
        - text: "Вчора я буду читати статтю."
          correct: false
      explanation: "Дієслово прочитав (доконаний вид) вказує на те, що дію завершено і є результат."
    - question: "Яким дієсловом найкраще заповнити пропуск: Вона ... мені дуже цікаву легенду."
      options:
        - text: "розповіла"
          correct: true
        - text: "розповідала"
          correct: false
        - text: "буде розповідати"
          correct: false
        - text: "розповідає"
          correct: false
      explanation: "Контекст передбачає одноразову завершену дію (результат)."
    - question: "Як правильно запитати дорогу на вулиці у перехожого?"
      options:
        - text: "Можна вас запитати?"
          correct: true
        - text: "Можна вас питати?"
          correct: false
        - text: "Можна вас буду запитати?"
          correct: false
        - text: "Можна вас питаю?"
          correct: false
      explanation: "У цьому контексті йдеться про одноразову коротку дію, тому доречний доконаний вид запитати."
    - question: "До якого типу утворення видової пари належать слова брати і взяти?"
      options:
        - text: "суплетивні форми"
          correct: true
        - text: "префіксація"
          correct: false
        - text: "суфіксація"
          correct: false
        - text: "закінчення"
          correct: false
      explanation: "Брати і взяти мають абсолютно різні корені, це суплетивна пара."
    - question: "Що означає приказка Зробив діло — гуляй сміло у контексті граматики?"
      options:
        - text: "Відпочивати можна лише після завершення дії."
          correct: true
        - text: "Відпочивати можна під час роботи."
          correct: false
        - text: "Працювати потрібно швидко і без зупинок."
          correct: false
        - text: "Робота важливіша за будь-який відпочинок."
          correct: false
      explanation: "Дієслово зробив вказує на досягнутий результат, після якого дозволяється дія відпочинку."
    - question: "З яким дієсловом ніколи не можна поєднувати слова буду, будеш, будемо?"
      options:
        - text: "з дієсловом доконаного виду"
          correct: true
        - text: "з дієсловом недоконаного виду"
          correct: false
        - text: "з іменником у знахідному відмінку"
          correct: false
        - text: "з прикметником жіночого роду"
          correct: false
      explanation: "Аналітична форма майбутнього часу утворюється тільки з інфінітивом недоконаного виду."

- type: unjumble
  title: "Складіть речення: процеси та результати"
  instruction: "Упорядкуйте слова так, щоб вийшло граматично правильне речення."
  items:
    - words: ["я", "вже", "написав", "цей", "важливий", "фінансовий", "звіт", "для", "нашого", "нового", "клієнта"]
      answer: "Я вже написав цей важливий фінансовий звіт для нашого нового клієнта"
    - words: ["студенти", "зараз", "уважно", "пишуть", "дуже", "складний", "граматичний", "тест", "у", "великій", "аудиторії"]
      answer: "Студенти зараз уважно пишуть дуже складний граматичний тест у великій аудиторії"
    - words: ["вона", "завжди", "із", "задоволенням", "починає", "свій", "робочий", "день", "з", "філіжанки", "міцної", "кави"]
      answer: "Вона завжди із задоволенням починає свій робочий день з філіжанки міцної кави"
    - words: ["ми", "обов'язково", "швидко", "і", "якісно", "зробимо", "цю", "складну", "роботу", "завтра", "до", "обіду"]
      answer: "Ми обов'язково швидко і якісно зробимо цю складну роботу завтра до обіду"
    - words: ["вчора", "я", "дуже", "довго", "і", "з", "великим", "інтересом", "читав", "цю", "захоплюючу", "історичну", "книгу"]
      answer: "Вчора я дуже довго і з великим інтересом читав цю захоплюючу історичну книгу"
    - words: ["він", "повільно", "відкрив", "велике", "вікно", "і", "уважно", "подивився", "на", "порожню", "нічну", "вулицю"]
      answer: "Він повільно відкрив велике вікно і уважно подивився на порожню нічну вулицю"
    - words: ["ти", "будеш", "пити", "гарячий", "чорний", "чай", "чи", "солодку", "каву", "з", "холодним", "молоком"]
      answer: "Ти будеш пити гарячий чорний чай чи солодку каву з холодним молоком"
    - words: ["вони", "часто", "і", "з", "великим", "задоволенням", "беруть", "активну", "участь", "у", "міжнародних", "спортивних", "змаганнях"]
      answer: "Вони часто і з великим задоволенням беруть активну участь у міжнародних спортивних змаганнях"

- type: fill-in
  title: "Виберіть дієслово у правильній формі"
  instruction: "Вставте у речення дієслово доконаного або недоконаного виду."
  items:
    - sentence: "Кожного ранку я _ зелений чай."
      answer: "п'ю"
      options: ["п'ю", "вип'ю", "буду пити", "випив"]
      explanation: "Регулярна повторювана дія в теперішньому часі вимагає недоконаного виду."
    - sentence: "Сьогодні я був дуже спраглий, тому швидко _ цілу склянку води."
      answer: "випив"
      options: ["випив", "пив", "п'ю", "буду пити"]
      explanation: "Завершена дія в минулому з результатом."
    - sentence: "Будь ласка, _ за собою двері, коли виходиш."
      answer: "закривай"
      options: ["закривай", "закрий", "закрив", "будеш закривати"]
      explanation: "Прохання про регулярну дію."
    - sentence: "Холодно! _ вікно, будь ласка."
      answer: "Закрий"
      options: ["Закрий", "Закривай", "Закрив", "Будеш закривати"]
      explanation: "Прохання про одноразову результативну дію прямо зараз."
    - sentence: "Вчора ми цілий вечір _ новий фільм."
      answer: "дивилися"
      options: ["дивилися", "подивилися", "дивимося", "будемо дивитися"]
      explanation: "Фокус на тривалості процесу в минулому."
    - sentence: "Вона нарешті _ цей фільм до кінця."
      answer: "подивилася"
      options: ["подивилася", "дивилася", "дивиться", "буде дивитися"]
      explanation: "Нарешті вказує на досягнутий результат."
    - sentence: "Я не можу говорити, я зараз _ домашнє завдання."
      answer: "роблю"
      options: ["роблю", "зроблю", "робив", "буду робити"]
      explanation: "Дія відбувається в момент мовлення."
    - sentence: "Я обіцяю, що _ це завдання завтра до обіду."
      answer: "зроблю"
      options: ["зроблю", "роблю", "робив", "буду робити"]
      explanation: "Обіцянка майбутнього результату вимагає доконаного виду."

- type: error-correction
  title: "Знайдіть і виправте помилку"
  instruction: "У кожному реченні є одна граматична помилка, пов'язана з вибором виду. Виправте її."
  items:
    - sentence: "Завтра я буду прочитати цю статтю."
      error: "буду прочитати"
      answer: "прочитаю"
      error_type: "construction"
      options: ["прочитаю", "буду читав", "прочитав", "буду прочитаю"]
      explanation: "Аналітична форма майбутнього часу не утворюється з доконаним видом."
    - sentence: "Я кушаю яблуко кожного ранку."
      error: "кушаю"
      answer: "їм"
      error_type: "word"
      options: ["їм", "з'їм", "з'їдаю", "буду їсти"]
      explanation: "Слово кушати — це русизм. Українською правильно казати їсти."
    - sentence: "Зараз я зроблю домашнє завдання."
      error: "зроблю"
      answer: "роблю"
      error_type: "word"
      options: ["роблю", "буду робити", "робив", "зробив"]
      explanation: "Якщо дія відбувається зараз, потрібно використовувати недоконаний вид."
    - sentence: "Він сказав дуже тихо, і я нічого не чув."
      error: "сказав"
      answer: "говорив"
      error_type: "word"
      options: ["говорив", "буде говорити", "каже", "розповідає"]
      explanation: "Тут описується процес мовлення впродовж певного часу, тому потрібне слово говорив."
    - sentence: "Я не побрав телефон зі столу."
      error: "побрав"
      answer: "взяв"
      error_type: "word"
      options: ["взяв", "поклав", "поставив", "брав"]
      explanation: "Доконаний вид від брати — це суплетивна форма взяти."
    - sentence: "Ми зазвичай купимо овочі на ринку."
      error: "купимо"
      answer: "купуємо"
      error_type: "word"
      options: ["купуємо", "будемо купувати", "купували", "купляємо"]
      explanation: "Регулярна дія (зазвичай) у теперішньому часі вимагає недоконаного виду."
    - sentence: "Він поклав вазу з квітами на підлогу."
      error: "поклав"
      answer: "поставив"
      error_type: "word"
      options: ["поставив", "покладе", "кладе", "ставить"]
      explanation: "Вазу ставлять вертикально, а не кладуть горизонтально."
    - sentence: "Не хвилюйся, я буду написати цей звіт вчасно."
      error: "буду написати"
      answer: "напишу"
      error_type: "construction"
      options: ["напишу", "буду писав", "написав", "буду пишу"]
      explanation: "Не можна змішувати слово буду та інфінітив доконаного виду."

- type: mark-the-words
  title: "Знайдіть дієслова доконаного виду"
  instruction: "Уважно прочитайте текст і позначте всі дієслова ДОКОНАНОГО виду (результат)."
  text: "Сьогодні я прокинувся рано. Я відкрив вікно і подивився на вулицю. Потім я пішов на кухню і зробив собі смачну каву. Я швидко випив її, взяв сумку і вийшов з дому. На роботі я закінчив звіт, а потім прочитав новини."
  answers:
    - "прокинувся"
    - "відкрив"
    - "подивився"
    - "пішов"
    - "зробив"
    - "випив"
    - "взяв"
    - "вийшов"
    - "закінчив"
    - "прочитав"

