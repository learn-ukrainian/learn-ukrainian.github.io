- type: error-correction
  title: "Виправте граматичні та лексичні помилки"
  instruction: "Знайдіть і виправте помилку в кожному реченні."
  items:
    - sentence: "Ми плануємо жити в півдні."
      error: "в"
      answer: "на"
      options:
        - "на"
        - "у"
        - "до"
        - "біля"
      explanation: "Зі сторонами світу завжди використовується прийменник на."
    - sentence: "Моя родина поїхала відпочивати до Одесси."
      error: "Одесси"
      answer: "Одеси"
      options:
        - "Одеси"
        - "Одесу"
        - "Одесі"
        - "Одесою"
      explanation: "Українською мовою назва міста пишеться з однією літерою с."
    - sentence: "Я кушаю найсолодші херсонські кавуни."
      error: "кушаю"
      answer: "їм"
      options:
        - "їм"
        - "їду"
        - "споживаю"
        - "смакую"
      explanation: "Слово кушати є русизмом, правильно використовувати дієслово їсти."
    - sentence: "Корабель прибув у острів вранці."
      error: "у"
      answer: "на"
      options:
        - "на"
        - "до"
        - "в"
        - "під"
      explanation: "Зі словом острів використовується прийменник на для позначення напрямку."
    - sentence: "Він працює на Миколаєві."
      error: "на"
      answer: "у"
      options:
        - "у"
        - "в"
        - "біля"
        - "коло"
      explanation: "Для назв міст використовується прийменник у або в."
    - sentence: "Вони подорожують в захід України."
      error: "в"
      answer: "на"
      options:
        - "на"
        - "у"
        - "до"
        - "крізь"
      explanation: "Зі сторонами світу завжди використовується прийменник на."
    - sentence: "Ми були в Миколаївщині минулого року."
      error: "в"
      answer: "на"
      options:
        - "на"
        - "у"
        - "біля"
        - "через"
      explanation: "З назвами регіонів (суфікс -щин-) використовується прийменник на."
    - sentence: "Цей курорт знаходиться на Херсоні."
      error: "на"
      answer: "в"
      options:
        - "в"
        - "на"
        - "біля"
        - "через"
      explanation: "З назвами міст використовується прийменник в."

