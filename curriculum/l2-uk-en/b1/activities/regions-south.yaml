        - "приїжджий"
        - "іноземний"
        - "новий"

- type: quiz
  title: "Перевірте знання про Південь"
  instruction: "Оберіть одну правильну відповідь."
  items:
    - question: "Яке море омиває південні береги України і є більш мілким та теплим?"
      explanation: "Азовське море є мілкішим і теплішим за Чорне."
      options:
        - text: "Азовське море"
          correct: true
        - text: "Чорне море"
          correct: false
        - text: "Середземне море"
          correct: false
        - text: "Червоне море"
          correct: false
    - question: "Що означає одеський вираз Вода не фонтан?"
      explanation: "Цей вираз означає погану якість."
      options:
        - text: "Щось дуже поганої якості"
          correct: true
        - text: "Відсутність води в місті"
          correct: false
        - text: "Красиву архітектурну споруду"
          correct: false
        - text: "Закритий міський басейн"
          correct: false
    - question: "Який прийменник використовується зі сторонами світу?"
      explanation: "Ми завжди використовуємо прийменник на: на півдні, на сході."
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "у"
          correct: false
        - text: "до"
          correct: false
    - question: "Що символізує розквітла троянда в орнаменті Орьнек?"
      explanation: "Троянда уособлює заміжню жінку."
      options:
        - text: "Заміжню жінку"
          correct: true
        - text: "Молодого хлопця"
          correct: false
        - text: "Літню людину"
          correct: false
        - text: "Маленьку дитину"
          correct: false
    - question: "Яке місто історично називають містом корабелів?"
      explanation: "Миколаїв був заснований як центр суднобудування."
      options:
        - text: "Миколаїв"
          correct: true
        - text: "Одесу"
          correct: false
        - text: "Херсон"
          correct: false
        - text: "Маріуполь"
          correct: false
    - question: "Що таке лиман у географії Півдня України?"
      explanation: "Лиман — це затока, де річка впадає в море."
      options:
        - text: "Мілководна затока біля моря"
          correct: true
        - text: "Великий піщаний бархан"
          correct: false
        - text: "Гірське солоне озеро"
          correct: false
        - text: "Штучно створений ліс"
          correct: false
    - question: "Для чого були висаджені штучні ліси на Херсонщині?"
      explanation: "Ліси зупинили поширення Олешківських пісків."
      options:
        - text: "Щоб зупинити поширення пісків"
          correct: true
        - text: "Для розвитку деревообробки"
          correct: false
        - text: "Для будівництва кораблів"
          correct: false
        - text: "Щоб створити новий курорт"
          correct: false
    - question: "У якому році відбулася примусова депортація кримських татар?"
      explanation: "Депортація відбулася у тисяча дев'ятсот сорок четвертому році."
      options:
        - text: "У тисяча дев'ятсот сорок четвертому"
          correct: true
        - text: "У дві тисячі чотирнадцятому"
          correct: false
        - text: "У тисяча дев'ятсот дев'яносто першому"
          correct: false
        - text: "У тисяча сімсот дев'яностому"
          correct: false

