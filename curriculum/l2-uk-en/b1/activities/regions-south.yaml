- type: fill-in
  title: "Заповніть пропуски: географія та напрямки"
  instruction: "Оберіть правильне слово для кожного речення."
  items:
    - sentence: "Влітку ми завжди відпочиваємо на _____."
      answer: "півдні"
      options:
        - "півдні"
        - "південь"
        - "півднем"
        - "півдню"
    - sentence: "Миколаїв — це відомий центр _____."
      answer: "суднобудування"
      options:
        - "суднобудування"
        - "сільського господарства"
        - "туризму"
        - "виноробства"
    - sentence: "Олешківські піски називають українською _____."
      answer: "Сахарою"
      options:
        - "Сахарою"
        - "пустелею"
        - "Амазонкою"
        - "рівниною"
    - sentence: "Перелітні птахи восени летять на _____."
      answer: "південь"
      options:
        - "південь"
        - "півдні"
        - "півднем"
        - "півдню"
    - sentence: "Найсолодші кавуни ростуть на _____."
