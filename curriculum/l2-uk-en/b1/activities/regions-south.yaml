      options:
        - "Херсонщині"
        - "Одещині"
        - "Миколаївщині"
        - "Київщині"
    - sentence: "Дніпровський _____ має велике екологічне значення."
      answer: "лиман"
      options:
        - "лиман"
        - "порт"
        - "бархан"
        - "степ"
    - sentence: "Правильно писати назву міста _____ з однією літерою с."
      answer: "Одеса"
      options:
        - "Одеса"
        - "Одесса"
        - "Одессі"
        - "Одесі"
    - sentence: "Кримські татари — це _____ народ України."
