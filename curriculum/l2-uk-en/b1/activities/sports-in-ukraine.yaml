  instruction: Розташуйте слова у правильному порядку.
- type: mark-the-words
  title: Знайдіть спортивні дієслова
  instruction: Знайдіть і позначте всі дієслова в тексті.
  text: Команда тренується перед складним матчем. Гравці хочуть перемогти у важкому
    фіналі. Воротар відбиває м'яч, а нападник біжить вперед. Ми віримо, що вони зможуть
    здобути кубок.
  answers:
  - тренується
  - хочуть
  - перемогти
  - відбиває
  - біжить
  - віримо
  - зможуть
  - здобути
- type: error-correction
  title: Виправте русизми та помилки
  items:
  - sentence: Наш спортсмен прийняв участь у змаганнях.
    error: прийняв участь
    answer: взяв участь
    options:
    - взяв участь
    - зробив участь
    - мав участь
    - дав участь
    explanation: Українською правильно казати брати участь, а не приймати участь.
  - sentence: Вони одержали перемогу в цьому матчі.
    error: одержали
    answer: здобули
    options:
    - здобули
    - взяли
    - зробили
    - знайшли
    explanation: Перемогу зазвичай здобувають, а не одержують.
  - sentence: Я дуже люблю кушати після тренування.
    error: кушати
    answer: їсти
    options:
    - їсти
    - харчувати
    - пити
    - смакувати
    explanation: Слово кушати — це русизм. Українською правильно — їсти.
  - sentence: Він самий кращий гравець у нашій команді.
    error: самий кращий
    answer: найкращий
    options:
    - найкращий
    - дуже кращий
    - більш кращий
    - кращий
    explanation: Ступені порівняння прикметників утворюються за допомогою префікса
      най-, а не слова самий.
  - sentence: Ми купили білети на сьогоднішній матч.
    error: білети
    answer: квитки
    options:
    - квитки
    - картки
    - папірці
    - перепустки
    explanation: На транспорт і заходи купують квитки. Білет буває екзаменаційний
      або банківський.
  - sentence: Вболівальники мішали гравцям зосередитися на грі.
    error: мішали
    answer: заважали
    options:
    - заважали
    - перебивали
    - робили
    - зупиняли
    explanation: Мішати можна цукор у чаї. Створювати перешкоди — це заважати.
  - sentence: Тренер дав команду починати ігру.
    error: ігру
    answer: гру
    options:
    - гру
    - грати
    - забаву
    - матч
    explanation: Російське слово игра українською перекладається як гра.
  - sentence: Рахунок матчу став два ноль.
    error: ноль
    answer: нуль
    options:
    - нуль
    - нічого
    - пусто
    - зеро
    explanation: Українською мовою правильно казати нуль, а не ноль.
