- type: quiz
  title: Перевірте знання спортивної лексики
  items:
  - question: Як називається людина, яка тренує спортсменів?
    explanation: Людина, яка тренує команду або спортсмена, називається тренером.
    options:
    - text: тренер
      correct: true
    - text: суддя
      correct: false
    - text: вболівальник
      correct: false
    - text: гравець
      correct: false
  - question: Що отримує спортсмен за перше місце на змаганнях?
    explanation: За перше місце спортсмени отримують золоту медаль.
    options:
    - text: золоту медаль
      correct: true
    - text: срібну медаль
      correct: false
    - text: бронзову медаль
      correct: false
    - text: жовту картку
      correct: false
  - question: Як називається фінальна частина спортивних змагань?
    explanation: Остання гра турніру називається фіналом.
    options:
    - text: фінал
      correct: true
    - text: півфінал
      correct: false
    - text: тайм
      correct: false
    - text: тренування
      correct: false
  - question: Хто захищає ворота у футбольній команді?
    explanation: Гравець, який стоїть на воротах, називається воротарем.
    options:
    - text: воротар
      correct: true
    - text: суддя
      correct: false
    - text: нападник
      correct: false
    - text: тренер
      correct: false
  - question: Як називається результат гри, коли немає переможця?
    explanation: Коли команди мають однаковий рахунок, це називається нічия.
    options:
    - text: нічия
      correct: true
    - text: поразка
      correct: false
    - text: перемога
      correct: false
    - text: рекорд
      correct: false
  - question: Яким словом називають фаната спортивної команди?
    explanation: Людина, яка підтримує команду, називається вболівальником.
    options:
    - text: вболівальник
      correct: true
    - text: суддя
      correct: false
    - text: тренер
      correct: false
    - text: воротар
      correct: false
  - question: Як називається головний арбітр на футбольному полі?
    explanation: Головний арбітр матчу називається суддею.
    options:
    - text: суддя
      correct: true
    - text: гравець
      correct: false
    - text: тренер
      correct: false
    - text: воротар
      correct: false
  - question: Що використовує суддя, щоб зупинити спортивну гру?
    explanation: Суддя використовує свисток для зупинки гри.
    options:
    - text: свисток
      correct: true
    - text: м'яч
      correct: false
    - text: рукавиці
      correct: false
    - text: таймер
      correct: false
