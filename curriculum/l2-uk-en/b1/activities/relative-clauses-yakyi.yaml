  blanks:
    - id: 1
      answer: 'інструмент'
      options: ['інструмент', 'документ', 'елемент', 'аргумент']
    - id: 2
      answer: 'спеціальний'
      options: ['спеціальний', 'нормальний', 'базовий', 'короткий']
    - id: 3
      answer: 'місток'
      options: ['місток', 'будинок', 'варіант', 'корінь']
    - id: 4
      answer: 'підрядне'
      options: ['підрядне', 'основне', 'велике', 'коротке']
    - id: 5
      answer: 'антецедент'
      options: ['антецедент', 'прецедент', 'інцидент', 'елемент']
    - id: 6
      answer: 'рід'
      options: ['рід', 'вид', 'тип', 'код']
    - id: 7
      answer: 'число'
      options: ['число', 'місце', 'слово', 'букву']
    - id: 8
      answer: 'відмінок'
      options: ['відмінок', 'порядок', 'зв''язок', 'напрямок']
    - id: 9
      answer: 'яку'
      options: ['яку', 'яка', 'якій', 'якою']
    - id: 10
      answer: 'знахідний'
      options: ['знахідний', 'називний', 'давальний', 'орудний']
    - id: 11
      answer: 'якому'
      options: ['якому', 'яке', 'яким', 'якого']
    - id: 12
      answer: 'місцевий'
      options: ['місцевий', 'родовий', 'орудний', 'називний']
    - id: 13
      answer: 'узгодження'
      options: ['узгодження', 'твердження', 'значення', 'читання']
    - id: 14
      answer: 'логіку'
      options: ['логіку', 'музику', 'фізику', 'лірику']

- type: mark-the-words
  title: 'Знайдіть форми займенника'
  instruction: 'Знайдіть і позначте всі відмінкові форми займенника який у цьому тексті.'
  text: 'Учора я зустрів свого давнього друга, якого не бачив багато років. Він розповів мені про нове місто, в якому зараз живе. Проекти, над якими вони працюють, здаються інноваційними. Я був дуже радий за компанію, якій він тепер допомагає. Це була зустріч, яка надовго запам''ятається.'
  answers: ['якого', 'якому', 'якими', 'якій', 'яка']

- type: select
  title: 'Оберіть правильні форми'
  instruction: 'Оберіть усі граматично та стилістично правильні варіанти продовження для кожного речення.'
  items:
    - question: 'Я зараз читаю нову статтю, ...'
      options:
        - text: 'яка дуже цікава і пізнавальна.'
          correct: true
        - text: 'яку мені вчора порадив мій колега.'
          correct: true
        - text: 'якій міститься багато складних термінів.'
          correct: false
        - text: 'в якій є багато корисної професійної інформації.'
          correct: true
      min_correct: 3
    - question: 'Це мій найкращий друг, ...'
      options:
