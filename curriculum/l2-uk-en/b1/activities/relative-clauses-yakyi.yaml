- type: fill-in
  title: 'Оберіть правильну форму займенника'
  instruction: 'Вставте правильну форму слова "який" у подані речення.'
  items:
    - sentence: 'Чоловік, _____ ми бачили вчора, мій брат.'
      answer: 'якого'
      options: ['якого', 'який', 'якому', 'яким']
      explanation: 'Чоловік є об''єктом нашої дії (ми бачили кого?), тому потрібен знахідний відмінок.'
    - sentence: 'Книга, _____ лежить на столі, дуже цікава.'
      answer: 'яка'
      options: ['яка', 'яку', 'якій', 'якою']
      explanation: 'Книга сама виконує дію (лежить), тому потрібен називний відмінок жіночого роду.'
    - sentence: 'Місто, в _____ я живу, дуже старе.'
      answer: 'якому'
      options: ['якому', 'яке', 'яким', 'якого']
      explanation: 'Прийменник "в" вказує на локацію і вимагає місцевого відмінка.'
    - sentence: 'Студенти, _____ я допомагаю, склали іспит.'
      answer: 'яким'
      options: ['яким', 'яких', 'які', 'якими']
      explanation: 'Дієслово "допомагаю" вимагає давального відмінка (кому?).'
    - sentence: 'Дівчина, з _____ ми говорили, працює тут.'
      answer: 'якою'
      options: ['якою', 'яку', 'якій', 'яка']
      explanation: 'Прийменник "з" (супровід) вимагає орудного відмінка жіночого роду.'
    - sentence: 'Будинок, _____ стоїть на розі, належить йому.'
      answer: 'який'
      options: ['який', 'якого', 'якому', 'яким']
      explanation: 'Будинок виконує дію (стоїть), це називний відмінок чоловічого роду.'
    - sentence: 'Історія, про _____ ти розповідав, вражає.'
      answer: 'яку'
      options: ['яку', 'яка', 'якій', 'якою']
      explanation: 'Прийменник "про" вимагає знахідного відмінка (про кого? про що?).'
    - sentence: 'Проект, над _____ ми працюємо, дуже важливий.'
      answer: 'яким'
      options: ['яким', 'якого', 'якому', 'який']
      explanation: 'Прийменник "над" вимагає орудного відмінка.'

- type: error-correction
  title: 'Виправте граматичні помилки'
  instruction: 'Знайдіть та виправте помилку в узгодженні відмінка, роду або числа.'
  items:
    - sentence: 'Я бачу ту дівчину, яку зараз стоїть біля входу.'
      error: 'яку'
      answer: 'яка'
      options: ['яка', 'якій', 'якою', 'якому']
      explanation: 'Дівчина у підрядному реченні сама стоїть (підмет), тому потрібен називний відмінок.'
    - sentence: 'Це директор компанії, який вчора отримала великий прибуток.'
      error: 'який'
      answer: 'яка'
      options: ['яка', 'яку', 'якою', 'які']
      explanation: 'Прибуток отримала компанія (жіночий рід), а не директор. Антецедентом є компанія.'
    - sentence: 'Ми гуляли вулицями, який ведуть до головної площі.'
      error: 'який'
      answer: 'які'
      options: ['які', 'яких', 'якими', 'яким']
      explanation: 'Антецедент вулицями стоїть у множині, тому потрібна форма які.'
    - sentence: 'Я завжди читаю ті контракти, що лежать на моєму столі.'
      error: 'що'
      answer: 'які'
      options: ['які', 'яких', 'якими', 'яким']
      error_type: 'register'
      explanation: 'У формальному та професійному стилі слід уникати незмінного розмовного що, використовуючи точний займенник.'
    - sentence: 'Я зустрів студента, якого ми дали нову книгу.'
      error: 'якого'
      answer: 'якому'
      options: ['якому', 'який', 'яким', 'якомусь']
      explanation: 'Дієслово дали вимагає давального відмінка (кому ми дали?).'
    - sentence: 'Дерево, під яка ми сиділи, було дуже старим.'
      error: 'яка'
      answer: 'яким'
      options: ['яким', 'якого', 'якому', 'які']
      explanation: 'Антецедент дерево середнього роду, а прийменник під вимагає орудного відмінка (під чим?).'

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Розташуйте слова у правильному порядку, пам''ятаючи про правило синтаксичної близькості.'
  items:
    - words: ['Це', 'мій', 'новий', 'колега,', 'який', 'добре', 'знає', 'програмування.']
      answer: 'Це мій новий колега, який добре знає програмування.'
    - words: ['Будинки,', 'які', 'розташовані', 'на', 'площі,', 'належать', 'до', 'спадщини.']
      answer: 'Будинки, які розташовані на площі, належать до спадщини.'
    - words: ['Вона', 'познайомилася', 'з', 'архітектором,', 'про', 'якого', 'писали', 'в', 'газеті.']
      answer: 'Вона познайомилася з архітектором, про якого писали в газеті.'
    - words: ['Я', 'читаю', 'цікаву', 'книгу,', 'яку', 'ти', 'рекомендував', 'вчора.']
      answer: 'Я читаю цікаву книгу, яку ти рекомендував вчора.'
    - words: ['Пані,', 'яку', 'ми', 'зустріли', 'сьогодні,', 'живе', 'в', 'сусідній', 'квартирі.']
      answer: 'Пані, яку ми зустріли сьогодні, живе в сусідній квартирі.'
    - words: ['Ми', 'знайшли', 'ресторан,', 'в', 'якому', 'готують', 'традиційний', 'український', 'борщ.']
      answer: 'Ми знайшли ресторан, в якому готують традиційний український борщ.'

- type: quiz
  title: 'Теоретичний тест: Правила узгодження'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'З яких двох кроків складається алгоритм узгодження займенника який?'
      options:
        - text: 'Визначення роду і числа за антецедентом, а відмінка за підрядним реченням.'
          correct: true
        - text: 'Визначення відмінка за антецедентом, а роду за підрядним реченням.'
          correct: false
        - text: 'Визначення всіх параметрів виключно за головним реченням.'
          correct: false
        - text: 'Визначення всіх параметрів виключно за підрядним реченням.'
          correct: false
      explanation: 'Алгоритм вимагає погляду назад для вибору роду і числа, та погляду вперед для вибору відмінка.'
    - question: 'Чому відмінок слова який не залежить від відмінка антецедента?'
      options:
        - text: 'Тому що займенник виконує власну синтаксичну роль у підрядному реченні.'
          correct: true
        - text: 'Тому що українська мова не має строгих правил узгодження у складних реченнях.'
          correct: false
        - text: 'Тому що антецедент завжди має стояти виключно у називному відмінку.'
          correct: false
        - text: 'Тому що всі займенники в українській мові не змінюються за відмінками.'
          correct: false
      explanation: 'Підрядне речення має свою окрему структуру, і займенник отримує відмінок відповідно до своєї ролі в ній.'
    - question: 'Яка форма займенника потрібна в реченні: Дівчина, ... стоїть там, моя сестра?'
      options:
        - text: 'яка'
          correct: true
        - text: 'яку'
          correct: false
        - text: 'якій'
          correct: false
        - text: 'якою'
          correct: false
      explanation: 'У підрядному реченні дівчина активно виконує дію (сама стоїть), тому це називний відмінок (підмет).'
    - question: 'Що означає правило синтаксичної близькості у складному реченні?'
      options:
        - text: 'Підрядне речення має стояти якомога ближче до антецедента.'
          correct: true
        - text: 'Головне речення завжди має бути коротшим за підрядне.'
          correct: false
        - text: 'Підрядне речення завжди стоїть на самому початку тексту.'
          correct: false
        - text: 'Всі слова у довгому реченні мають бути одного граматичного роду.'
          correct: false
      explanation: 'Це правило допомагає уникнути двозначності та плутанини в тому, яке саме слово ми описуємо.'
    - question: 'Яка найпоширеніша помилка виникає через так звану пастку ролі?'
      options:
        - text: 'Бездумне копіювання відмінка антецедента з головного речення.'
          correct: true
        - text: 'Неправильне використання чоловічого роду замість жіночого.'
          correct: false
        - text: 'Використання слова котрий у всіх можливих життєвих контекстах.'
          correct: false
        - text: 'Пропуск обов''язкової коми перед кожним підрядним реченням.'
          correct: false
      explanation: 'Студенти часто автоматично копіюють відмінок антецедента, ігноруючи нову роль слова у підрядному реченні.'
    - question: 'Коли стилістично доречно використовувати займенник котрий замість слова який?'
      options:
        - text: 'Коли ми запитуємо про вибір з обмеженого набору предметів або про точний час.'
          correct: true
        - text: 'Коли ми дуже детально і багатошарово описуємо характер нової людини.'
          correct: false
        - text: 'Коли ми пишемо дуже формальний і складний академічний текст.'
          correct: false
        - text: 'Коли наш головний антецедент стоїть виключно у формі множини.'
          correct: false
      explanation: 'Слово котрий суворо резервується для ситуацій вибірковості (котрий з двох?) або запитання про час.'
    - question: 'Чому постійне вживання незмінного що замість який є стилістичною проблемою?'
      options:
        - text: 'Це робить ваше мовлення занадто розмовним, фамільярним та бідним.'
          correct: true
        - text: 'Слово що взагалі історично не існує в сучасній українській мові.'
          correct: false
        - text: 'Це граматично занадто складно для розуміння іноземними студентами.'
          correct: false
        - text: 'Це абсолютно граматично неправильно у будь-якому можливому контексті.'
          correct: false
      explanation: 'Слово що цілком припустиме в швидкому побуті, але у формальному стилі воно звучить вкрай бідно.'
    - question: 'Яка правильна форма в реченні: Ми знайшли ресторан, в ... готують дуже смачно?'
      options:
        - text: 'якому'
          correct: true
        - text: 'який'
          correct: false
        - text: 'якого'
          correct: false
        - text: 'яким'
          correct: false
      explanation: 'Прийменник в чітко вказує на місце локації і жорстко вимагає місцевого відмінка (в кому? в чому?).'

- type: match-up
  title: 'Знайдіть логічну пару'
  instruction: 'З''єднайте початок фрази з правильним поясненням синтаксичної ролі займенника.'
  pairs:
    - left: 'Чоловік, який...'
      right: 'сам виконує дію (називний відмінок).'
    - left: 'Жінка, яку...'
      right: 'є пасивним об''єктом дії (знахідний відмінок).'
    - left: 'Місто, в якому...'
      right: 'є локацією для події (місцевий відмінок).'
    - left: 'Інструмент, яким...'
      right: 'є засобом виконання дії (орудний відмінок).'
    - left: 'Студент, якому...'
      right: 'є адресатом дії (давальний відмінок).'
    - left: 'Будинок, біля якого...'
      right: 'вимагає родового відмінка після прийменника.'
    - left: 'Проблема, про яку...'
      right: 'вимагає знахідного відмінка після прийменника.'
    - left: 'Колеги, з якими...'
      right: 'супроводжують виконання дії (орудний відмінок множини).'

- type: true-false
  title: 'Правда чи хиба?'
  instruction: 'Визначте, чи є ці твердження про складні речення правильними.'
  items:
    - statement: 'Відмінок займенника який завжди повністю збігається з відмінком антецедента у головному реченні.'
      correct: false
      explanation: 'Відмінок визначається виключно функцією займенника у підрядному реченні (крок 2 алгоритму).'
    - statement: 'Рід і число займенника який визначаються за антецедентом з головного речення.'
      correct: true
      explanation: 'Це перший крок алгоритму узгодження, так званий погляд назад.'
    - statement: 'У реченні Я бачу дівчину, яка стоїть там слово яка стоїть у називному відмінку.'
      correct: true
      explanation: 'Хоча слово дівчину — це знахідний відмінок, у підрядному реченні вона сама виконує дію (підмет).'
    - statement: 'Форма якою — це знахідний відмінок жіночого роду.'
      correct: false
      explanation: 'Форма якою — це орудний відмінок жіночого роду (відповідає на питання ким? чим?).'
    - statement: 'Слово який повністю відмінюється за парадигмою прикметників твердої групи.'
      correct: true
      explanation: 'Займенник який має абсолютно ідентичні до звичайних прикметників закінчення у всіх семи відмінках.'
    - statement: 'Правило синтаксичної близькості дозволяє ставити підрядне речення в будь-якому місці тексту.'
      correct: false
      explanation: 'Підрядне речення має стояти якомога ближче до антецедента, щоб надійно уникнути двозначності.'
    - statement: 'У формальному діловому стилі краще уникати частого вживання незмінного сполучника що.'
      correct: true
      explanation: 'Повноцінний займенник який робить загальний стиль тексту значно більш елегантним і професійним.'
    - statement: 'Слово котрий є повним, абсолютним і універсальним синонімом до слова який.'
      correct: false
      explanation: 'Слово котрий використовується переважно для запитання про точний час або про конкретний вибір з обмеженого набору.'

- type: cloze
