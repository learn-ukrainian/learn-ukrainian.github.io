    - запитував
    - стверджував
    - заявляв
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: error-correction
  title: Виправте поширені помилки
  items:
  - sentence: Він дуже добре говорить на українській мові.
    error: на українській мові
    answer: українською мовою
    error_type: construction
    options:
    - українською мовою
    - в українській мові
    - з українською мовою
    - про українську мову
    explanation: Мову спілкування завжди передаємо орудним відмінком без прийменника.
  - sentence: Вчора дідусь казав нам дуже довгу легенду про гори.
    error: казав
    answer: розповідав
    error_type: word
    options:
    - розповідав
    - говорив
    - повідомляв
    - спілкувався
    explanation: Легенда має складний сюжет, тому ми використовуємо дієслово розповідати.
  - sentence: Ми вчора дуже цікаво говорили з Оленою в теплому кафе.
    error: говорили
    answer: розмовляли
    error_type: word
    options:
    - розмовляли
    - казали
    - пояснювали
    - заявляли
    explanation: Для опису активного діалогу краще використовувати дієслово розмовляти.
  - sentence: Керівник казав, що звіт уже повністю готовий до відправки.
    error: казав
    answer: сказав
    error_type: word
    options:
    - сказав
    - говорив
    - балакав
    - розповідав
    explanation: Для повідомлення одноразового завершеного факту використовуємо доконаний
      вид сказав.
  - sentence: Ми довго пояснювалися з колегою після тієї неприємної ситуації.
    error: пояснювалися
    answer: розмовляли
    error_type: word
    options:
    - розмовляли
    - казалися
    - говорилися
    - спілкувалися б
    explanation: Слово пояснюватися в значенні з'ясовувати стосунки є суржиком. Краще
      сказати розмовляли або з'ясовували стосунки.
  - sentence: Вона приймала участь у дуже цікавій науковій дискусії.
    error: приймала участь
    answer: брала участь
    error_type: phrase
    options:
    - брала участь
    - мала участь
    - робила участь
    - давала участь
    explanation: Конструкція приймати участь — це калька. Правильно українською —
      брати участь.
