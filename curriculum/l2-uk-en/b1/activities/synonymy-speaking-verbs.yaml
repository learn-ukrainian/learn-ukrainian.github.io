    - шепотів
    - стверджував
    - балакав
    - запитував
  - sentence: Офіційний представник _, що нові правила діятимуть з понеділка.
    answer: повідомив
    options:
    - повідомив
    - розповів
    - прошепотів
    - розмовляв
  - sentence: Турист _ у перехожих, як найшвидше дійти до вокзалу.
    answer: запитував
    options:
