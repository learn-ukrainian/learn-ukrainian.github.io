  instruction: Розташуйте слова у правильному порядку.
- type: quiz
  title: Перевірте свої знання про дієслова мовлення
  items:
  - question: Яке дієслово має найбільш офіційний та формальний характер?
    explanation: Дієслово заявляти використовується в офіційних пресрелізах та новинах.
    options:
    - text: заявляти
      correct: true
    - text: говорити
      correct: false
    - text: розповідати
      correct: false
    - text: балакати
      correct: false
  - question: Як правильно сказати про мову нашого повсякденного спілкування?
    explanation: Українська граматика вимагає використання орудного відмінка без прийменника.
    options:
    - text: розмовляти українською мовою
      correct: true
    - text: розмовляти на українській мові
      correct: false
    - text: розмовляти по українськи
      correct: false
    - text: розмовляти в українській мові
      correct: false
  - question: Яке дієслово найкраще підходить для опису живої бесіди двох друзів?
    explanation: Дієслово розмовляти підкреслює активний двосторонній обмін інформацією.
    options:
    - text: розмовляти
      correct: true
    - text: повідомляти
      correct: false
    - text: стверджувати
      correct: false
    - text: казати
      correct: false
  - question: Що означає метафоричне дієслово щебетати у повсякденному житті?
    explanation: Слово щебетати використовується для опису швидкого, радісного та
      мелодійного мовлення.
    options:
    - text: швидко і радісно говорити
      correct: true
    - text: повільно і сумно розповідати
      correct: false
    - text: голосно і агресивно кричати
      correct: false
    - text: тихо і секретно шепотіти
      correct: false
  - question: Яке дієслово слід обрати для переказу довгого міфу або легенди?
    explanation: Для текстів із розгорнутим сюжетом ми завжди використовуємо дієслово
      розповідати.
    options:
    - text: розповідати
      correct: true
    - text: казати
      correct: false
    - text: повідомляти
      correct: false
    - text: заявляти
      correct: false
  - question: Яка форма є правильною для передачі одноразового факту в минулому?
    explanation: Для повідомлення конкретного завершеного результату потрібен доконаний
      вид сказав.
    options:
    - text: він вчора сказав
      correct: true
    - text: він вчора казав
      correct: false
    - text: він вчора говорив
      correct: false
    - text: він вчора балакав
      correct: false
  - question: Хто такі кобзарі в контексті української історичної традиції?
    explanation: Кобзарі були мандрівними музикантами, які усно розповідали історію
      народу.
    options:
    - text: мандрівні музиканти та оповідачі
      correct: true
    - text: офіційні державні літописці
      correct: false
    - text: автори перших друкованих книг
      correct: false
    - text: перекладачі іноземних текстів
      correct: false
  - question: Яке дієслово описує мовлення без використання голосових зв'язок?
    explanation: Коли ми хочемо зберегти секрет, ми дуже тихо шепочемо.
    options:
    - text: шепотіти
      correct: true
    - text: кричати
      correct: false
    - text: стверджувати
      correct: false
    - text: пояснювати
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: Визначте, чи є твердження правдивим
  items:
  - statement: Дієслово розповідати можна використовувати для передачі коротких сухих
      фактів.
    correct: false
    explanation: Для факту ми використовуємо сказати, а розповідати вимагає сюжету
      та деталей.
  - statement: Тавтологія — це стилістична помилка, якої можна уникнути за допомогою
      синонімів.
    correct: true
    explanation: Чергування різних дієслів мовлення робить текст багатшим і приємнішим
      для читання.
  - statement: Українська мова вимагає змінювати час дієслова при переказі чужих слів
      у минулому.
    correct: false
    explanation: В українській мові ми зберігаємо оригінальний час прямої мови.
  - statement: Слово балакати доречно вживати лише в неформальному колі друзів або
      родини.
    correct: true
    explanation: Це розмовне дієслово, яке абсолютно не підходить для офіційних ситуацій.
  - statement: Концепція солов'їної мови пояснює використання пташиних метафор, таких
      як щебетати.
    correct: true
    explanation: Українці часто порівнюють мелодійне мовлення з гарним співом птахів.
  - statement: Слово спілкуватися означає лише усну розмову між двома людьми в одній
      кімнаті.
    correct: false
    explanation: Це слово охоплює всі види взаємодії, включаючи листування в інтернеті.
  - statement: Для офіційного пресрелізу найкраще підійдуть дієслова повідомляти та
      заявляти.
    correct: true
    explanation: Ці слова формують офіційно-діловий та публіцистичний регістр.
  - statement: Конструкція говорити на українській мові є правильним літературним
      варіантом.
    correct: false
    explanation: Це типова помилка і калька; правильно говорити українською мовою
      без прийменника.
