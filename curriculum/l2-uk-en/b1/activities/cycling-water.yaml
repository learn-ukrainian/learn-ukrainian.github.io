- type: error-correction
  title: "Виправте граматичні помилки іноземців"
  instruction: "Знайдіть та виправте типові граматичні помилки, пов'язані з відмінками транспорту та дієсловами руху."
  items:
    - sentence: "Я щоранку їду велосипедом до свого офісу, щоб оминути затори."
      error: "велосипедом"
      answer: "на велосипеді"
      error_type: "construction"
      options:
        - "на велосипеді"
        - "велосипеду"
        - "в велосипеді"
        - "з велосипедом"
      explanation: "Засоби міського транспорту в українській мові завжди вживаються з прийменником 'на' у місцевому відмінку: їду на велосипеді, на машині, на автобусі."
    - sentence: "Кожної суботи ми довго пливемо у нашому міському басейні."
      error: "пливемо"
      answer: "плаваємо"
      error_type: "word"
      options:
        - "плаваємо"
        - "плисти"
        - "плавати"
        - "сплавляємось"
      explanation: "Для опису регулярної звички або тренування без конкретного, одного напрямку використовується багатоспрямоване дієслово 'плавати'."
    - sentence: "Наступного теплого літа ми обов'язково всією сім'єю поїдемо в море."
      error: "в море"
      answer: "на море"
      error_type: "construction"
      options:
        - "на море"
        - "у морі"
        - "до моря"
        - "морем"
      explanation: "Коли ми говоримо про вектор напрямку нашого руху до великої відкритої локації, ми традиційно використовуємо Знахідний відмінок із прийменником 'на': їдемо на море."
    - sentence: "Зараз наші друзі відпочивають на річці та радісно купаються на воді."
      error: "на воді"
      answer: "у воді"
      error_type: "construction"
      options:
        - "у воді"
        - "водою"
        - "до води"
        - "воді"
      explanation: "Коли ви перебуваєте безпосередньо глибоко всередині певного середовища (місце дії), використовується місцевий відмінок з прийменником 'у' або 'в': плавають у воді."
    - sentence: "Інструктор суворо сказав усім негайно одягнути рятувальний капелюх перед посадкою."
      error: "капелюх"
      answer: "жилет"
      error_type: "word"
      options:
        - "жилет"
        - "шолом"
        - "пояс"
        - "костюм"
      explanation: "На воді для індивідуального захисту завжди використовується рятівний жилет. Капелюх захищає лише від сонця."
    - sentence: "Для нашого складного гірського маршруту ми вчора орендували шосейний велосипед."
      error: "шосейний"
      answer: "гірський"
      error_type: "word"
      options:
        - "гірський"
        - "міський"
        - "дитячий"
        - "водний"
      explanation: "Для подолання важких лісових стежок та гірських спусків вам потрібен саме міцний гірський велосипед з амортизаторами."

