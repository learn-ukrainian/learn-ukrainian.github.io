- type: quiz
  title: "Оберіть правильне дієслово руху: плавати чи плисти?"
  instruction: "Уважно прочитайте речення та виберіть правильний варіант дієслова."
  items:
    - question: "Кожного ранку мій брат із задоволенням ___ у міському басейні."
      explanation: "Регулярна, звична дія без одного чіткого напрямку вимагає дієслова багатоспрямованого руху 'плавати'."
      options:
        - text: "плаває"
          correct: true
        - text: "пливе"
          correct: false
        - text: "плавати"
          correct: false
        - text: "пливти"
          correct: false
    - question: "Подивись! Той великий човен зараз дуже швидко ___ прямо до нашого берега."
      explanation: "Односпрямована дія, що відбувається в конкретний момент мовлення, вимагає дієслова 'плисти'."
      options:
        - text: "пливе"
          correct: true
        - text: "плаває"
          correct: false
        - text: "плавати"
          correct: false
        - text: "пливти"
          correct: false
    - question: "Моя сестра зовсім не вміє ___, тому завжди одягає рятівний жилет."
      explanation: "Загальна фізична навичка триматися на воді передається словом 'плавати'."
      options:
        - text: "плавати"
          correct: true
        - text: "плисти"
          correct: false
        - text: "плаває"
          correct: false
        - text: "пливе"
          correct: false
    - question: "Минулого літа ми часто їздили на озеро і довго там ___ до самого вечора."
      explanation: "Повторювана розслаблена дія в минулому часі вимагає слова 'плавати'."
      options:
        - text: "плавали"
          correct: true
        - text: "пливли"
          correct: false
        - text: "плавати"
          correct: false
        - text: "пливти"
          correct: false
    - question: "Спортсмен дуже втомився, але продовжує вперто ___ до омріяної фінішної лінії."
      explanation: "Це надзвичайно цілеспрямований рух до конкретної точки, тому використовуємо 'плисти'."
      options:
        - text: "плисти"
          correct: true
        - text: "плавати"
          correct: false
        - text: "пливе"
          correct: false
        - text: "плаває"
          correct: false
    - question: "Маленькі діти можуть цілими днями весело ___ у теплій літній річці."
      explanation: "Рух без конкретної мети заради задоволення описується дієсловом 'плавати'."
      options:
        - text: "плавати"
          correct: true
        - text: "плисти"
          correct: false
        - text: "плавають"
          correct: false
        - text: "пливуть"
          correct: false
    - question: "Зараз я не можу говорити по телефону, бо саме ___ на каяку на інший бік річки."
      explanation: "Це односпрямований процес, що відбувається прямо зараз."
      options:
        - text: "пливу"
          correct: true
        - text: "плаваю"
          correct: false
        - text: "плавати"
          correct: false
        - text: "пливти"
          correct: false
    - question: "Наш сімейний собака обожнює воду і може годинами ___ закинутою за палицею."
      explanation: "Багатоспрямований, активний рух у різних напрямках — це 'плавати'."
      options:
        - text: "плавати"
          correct: true
        - text: "плисти"
          correct: false
        - text: "плаває"
          correct: false
        - text: "пливе"
          correct: false

- type: fill-in
  title: "Заповніть пропуски: спорядження та умови оренди"
  instruction: "Оберіть найбільш влучне слово для кожного речення з контексту."
  items:
    - sentence: "Перед тим як сісти в спортивний човен, кожен зобов'язаний одягнути рятівний ___."
      answer: "жилет"
      options:
        - "жилет"
        - "шолом"
        - "пояс"
        - "костюм"
    - sentence: "Для екстремальної їзди гірськими стежками вам обов'язково знадобиться міцний захисний ___."
      answer: "шолом"
      options:
        - "шолом"
        - "капелюх"
        - "кепка"
        - "жилет"
    - sentence: "На вихідних ми плануємо орендувати двомісний ___ для приємної прогулянки річкою."
      answer: "каяк"
      options:
        - "каяк"
        - "велосипед"
        - "басейн"
        - "пляж"
    - sentence: "Ця велика міська станція прокату пропонує дуже зручну ___ оплату за свої послуги."
      answer: "погодинну"
      options:
        - "погодинну"
        - "щоденну"
        - "безкоштовну"
        - "заставну"
    - sentence: "Ми безпечно залишили свій екологічний двоколісний ___ на спеціальній парковці."
      answer: "транспорт"
      options:
        - "транспорт"
        - "шолом"
        - "жилет"
        - "договір"
    - sentence: "Щоб взяти цінне обладнання, клієнт має залишити свій документ або грошову ___."
      answer: "заставу"
      options:
        - "заставу"
        - "оренду"
        - "знижку"
        - "премію"
    - sentence: "Наша неймовірно захоплива водна ___ по річці тривала більше трьох годин."
      answer: "мандрівка"
      options:
        - "мандрівка"
        - "оренда"
        - "застава"
        - "доріжка"
    - sentence: "Київський оновлений міський ___ щодня запрошує всіх любителів швидкісної їзди."
      answer: "велотрек"
      options:
        - "велотрек"
        - "басейн"
        - "пляж"
        - "каяк"

- type: unjumble
  title: "Складіть речення: напрямок чи місце дії?"
  instruction: "Розташуйте переплутані слова у правильному порядку, щоб утворити граматично правильне речення."
  items:
    - words:
        - "Ми"
        - "швидко"
        - "дісталися"
        - "набережної"
        - "на"
        - "велосипедах"
