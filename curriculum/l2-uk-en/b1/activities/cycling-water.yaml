- type: quiz
  title: "Перевірка розуміння тексту: спорт та безпека"
  instruction: "Дайте правильні відповіді на запитання, які базуються на прочитаному матеріалі."
  items:
    - question: "Що є найголовнішим і абсолютно непорушним правилом безпеки перед вашою посадкою в каяк?"
      explanation: "На будь-якій відкритій воді надійний рятівний жилет є абсолютно обов'язковим для всіх пасажирів, незалежно від їхнього вміння плавати."
      options:
        - text: "Одягнути рятівний жилет"
          correct: true
        - text: "Залишити дорогу заставу"
          correct: false
        - text: "Взяти запасне весло"
          correct: false
        - text: "Одягнути захисний шолом"
          correct: false
    - question: "Яку саме важливу соціальну функцію щороку виконує Велодень в українських містах?"
      explanation: "Його головна мета — привернути увагу до безпечної екологічної інфраструктури та популяризація здорового міського руху."
      options:
        - text: "Привертає увагу влади до потреби у велоінфраструктурі"
          correct: true
        - text: "Це виключно спортивне змагання професіоналів"
          correct: false
        - text: "Це день безкоштовної оренди байків для студентів"
          correct: false
        - text: "Це грандіозне свято відкриття нових велотреків"
          correct: false
    - question: "Який саме тип транспорту ідеально і безпечно підходить для тривалих мандрівок Карпатами?"
      explanation: "Міцний гірський велосипед з потужними амортизаторами найкраще долає найскладніші кам'янисті маршрути."
      options:
        - text: "Міцний гірський велосипед"
          correct: true
