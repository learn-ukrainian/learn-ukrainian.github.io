    страв. Для традиційного українського борщу мама взяла {{3}} великої капустини.
    Вона також обережно додала {{4}} літра свіжого м'ясного бульйону. У старому рецепті
    було сказано, що треба варити все це {{5}} години. Поки гарячий борщ кипів на
    плиті, {{6}} дітей весело гралися у дворі. З ними радісно бігали {{7}} малих цуценят.
    Батько тим часом пішов до магазину, щоб терміново купити {{8}} нових дверей для
    нашої вітальні. На годиннику була вже {{9}} на шосту, коли несподівано приїхали
    гості. Їх загалом було {{10}} , і ми всі разом сіли за великий стіл. Лише {{11}}
