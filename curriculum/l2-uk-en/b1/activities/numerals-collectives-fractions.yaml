  instruction: Заповніть пропуски, обравши правильні слова.
- type: fill-in
  title: Дроби та відсотки в українській мові
  instruction: Оберіть абсолютно правильний варіант запису дробів та відсотків словами.
  items:
  - sentence: Загальна інфляція в цьому місяці склала 5,2 (_____) відсотка.
    answer: п'ять цілих дві десяті
    options:
    - п'ять цілих дві десяті
    - п'ять і два
    - п'ять цілих і два
    - п'ять цілих дві десятих
  - sentence: Ми успішно виконали наше завдання на 100 (____) .
    answer: відсотків
    options:
    - відсотків
    - відсотки
    - відсоток
    - відсотками
  - sentence: Після тренування він дуже швидко випив 1,5 (____) води.
    answer: півтора літра
    options:
    - півтора літра
    - півтори літра
    - півтора літрів
    - півтора літру
  - sentence: До початку зустрічі залишилася 0,5 (____) .
    answer: половина години
    options:
    - половина години
    - півтора години
    - одна друга годин
    - півтори годин
  - sentence: Вона була дуже голодна і з'їла 1/3 (____) пирога.
    answer: третину
    options:
    - третину
    - третина
    - третю
    - одна третя
  - sentence: Його фантастичний результат на фініші — 9,9 (____) секунди.
    answer: дев'ять цілих дев'ять десятих
    options:
    - дев'ять цілих дев'ять десятих
    - дев'ять і дев'ять
    - дев'ять цілих і дев'ять
    - дев'ять цілих дев'ять десяті
  - sentence: Банк пропонує взяти великий кредит під 12 (____) річних.
    answer: відсотків
    options:
