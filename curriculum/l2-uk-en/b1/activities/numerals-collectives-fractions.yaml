- type: fill-in
  title: Оберіть правильний числівник
  instruction: Вставте правильну форму числівника (кількісну або збірну) у речення.
  items:
  - sentence: У кімнаті сиділи ___ студентів і щось жваво обговорювали.
    answer: троє
    options:
    - троє
    - три
    - трьох
    - трьом
  - sentence: Ми купили ___ нові телефони для нашого офісу.
    answer: два
    options:
    - два
    - двоє
    - дві
    - двох
  - sentence: На столі лежали ___ бабусиних старих окулярів.
    answer: троє
    options:
    - троє
    - три
    - трьох
    - трьом
  - sentence: У дворі весело гралися ___ маленьких кошенят.
    answer: четверо
    options:
    - четверо
    - чотири
    - чотирьох
    - чотирьом
  - sentence: На зупинці стояли ___ жінки і чекали на автобус.
    answer: дві
    options:
    - дві
    - двоє
    - два
    - двох
  - sentence: Сьогодні нас ___ , тому ми можемо замовити велику піцу.
    answer: п'ятеро
    options:
    - п'ятеро
    - п'ять
    - п'ятьох
    - п'яти
  - sentence: Для цього проєкту нам потрібно терміново купити ___ нових дверей.
    answer: п'ятеро
    options:
    - п'ятеро
    - п'ять
    - п'ятьох
    - п'яти
  - sentence: Я бачив, як до аудиторії зайшли ___ нові викладачки.
    answer: дві
    options:
    - дві
    - двоє
    - два
    - двох
- type: quiz
  title: 'Перевірте знання: збірні числівники та дроби'
  items:
  - question: З яким із цих слів категорично не можна використовувати збірні числівники?
    explanation: Збірні числівники ніколи не вживаються з іменниками жіночого роду.
    options:
    - text: жінки
      correct: true
    - text: чоловіки
      correct: false
    - text: діти
      correct: false
    - text: окуляри
      correct: false
  - question: У якому відмінку обов'язково має стояти іменник після збірного числівника?
    explanation: Після збірних числівників іменник завжди стоїть у формі Родового
      відмінка множини.
    options:
    - text: у Родовому відмінку множини
      correct: true
    - text: у Називному відмінку множини
      correct: false
    - text: у Родовому відмінку однини
      correct: false
    - text: у Знахідному відмінку множини
      correct: false
  - question: Як правильно сказати про кількість часу, якщо це одна і половина години?
    explanation: Слово година жіночого роду, тому використовуємо форму півтори та
      Родовий відмінок однини.
    options:
    - text: півтори години
      correct: true
    - text: півтора години
      correct: false
    - text: півтори годин
      correct: false
    - text: півтора годин
      correct: false
  - question: Як правильно і гарно сказати про час, якщо зараз на годиннику 13:30?
    explanation: Для позначення половини години використовуємо просторову конструкцію
      о пів на та наступну годину.
    options:
    - text: о пів на другу
      correct: true
    - text: о пів на першу
      correct: false
    - text: половина після першої
      correct: false
    - text: пів до другої
      correct: false
  - question: Яким словом найкраще і найприродніше перекласти українською мовою вираз
      the three of us?
    explanation: Для позначення спільної дії рівно трьох осіб найчастіше використовується
      зручний прислівник утрьох.
    options:
    - text: утрьох
      correct: true
    - text: ми є три
      correct: false
    - text: нас три
      correct: false
    - text: три нас
      correct: false
  - question: З яким із цих іменників завжди і обов'язково треба використовувати збірний
      числівник?
    explanation: Слово ножиці має тільки форму множини (pluralia tantum), тому вимагає
      обов'язкового збірного числівника.
    options:
    - text: ножиці
      correct: true
    - text: столи
      correct: false
    - text: книги
      correct: false
    - text: студенти
      correct: false
  - question: Яке з цих слів позначає дитинча тварини і тому вимагає обов'язкового
      збірного числівника?
    explanation: Слово цуценя означає маля собаки, тому з ним завжди і без винятків
      вживаємо збірні числівники.
    options:
    - text: цуценя
      correct: true
    - text: собака
      correct: false
    - text: кіт
      correct: false
    - text: корова
      correct: false
  - question: Як правильно і красиво прочитати вголос десятковий дріб 2,5 відсотка
      українською мовою?
    explanation: 'Читаємо окремо цілі та десяті частини за правилами: дві цілих п''ять
      десятих.'
    options:
    - text: дві цілих п'ять десятих
      correct: true
    - text: два і п'ять
      correct: false
    - text: два цілих п'ять десятих
      correct: false
    - text: дві цілі п'ять десяті
      correct: false
  instruction: Оберіть правильну відповідь.
- type: match-up
  title: 'Знайдіть пару: числівник і правильний іменник'
  instruction: Поєднайте числівник із граматично правильною формою іменника.
  pairs:
  - left: двоє
    right: студентів
  - left: дві
    right: сестри
  - left: півтора
    right: місяця
  - left: півтори
    right: години
  - left: чверть
    right: населення
  - left: троє
    right: кошенят
  - left: п'ять
    right: відсотків
  - left: чотири
    right: дерева
- type: unjumble
  title: Складіть правильні речення
  items:
  - words:
    - У
    - кімнаті
    - нас
    - було
    - тільки
    - троє.
    answer: У кімнаті нас було тільки троє.
  - words:
    - Ми
    - чекали
    - на
    - автобус
    - півтори
    - години.
    answer: Ми чекали на автобус півтори години.
  - words:
    - Для
    - борщу
    - потрібна
    - половина
    - великої
    - капустини.
    answer: Для борщу потрібна половина великої капустини.
  - words:
    - На
    - столі
    - лежали
    - двоє
    - нових
    - окулярів.
    answer: На столі лежали двоє нових окулярів.
  - words:
    - Цей
    - цікавий
    - проєкт
    - тривав
    - півтора
    - року.
    answer: Цей цікавий проєкт тривав півтора року.
  - words:
    - Ми
    - вирішили
    - піти
    - на
    - концерт
    - утрьох.
    answer: Ми вирішили піти на концерт утрьох.
  instruction: Розташуйте слова у правильному порядку.
- type: group-sort
  title: Розподіліть іменники за групами
  instruction: Визначте, з якими словами треба вживати збірні числівники (двоє, троє),
    а з якими — кількісні (два, три).
  groups:
  - name: Збірні числівники (двоє, троє)
    items:
    - діти
    - студенти
    - ножиці
    - кошенята
    - двері
  - name: Кількісні числівники (два, три)
    items:
    - сестри
    - столи
    - телефони
    - жінки
    - дерева
- type: error-correction
  title: Виправте поширені помилки
  instruction: Знайдіть і виправте граматичні помилки у використанні числівників.
  items:
  - sentence: У нашій групі навчаються двоє талановитих студенток.
    error: двоє
    answer: дві
    options:
    - дві
    - двої
    - два
    - двом
    error_type: word
    explanation: З іменниками жіночого роду (студентки) ми використовуємо тільки звичайні
      кількісні числівники.
  - sentence: Я купив три нові ножиці для нашого офісу.
    error: три нові ножиці
    answer: троє нових ножиць
    options:
    - троє нових ножиць
    - трьох нових ножиць
    - трої нові ножиці
    - три нових ножиці
    error_type: phrase
    explanation: Слово ножиці має тільки форму множини, тому воно вимагає збірного
      числівника і Родового відмінка.
  - sentence: Він уважно працював над цим важливим завданням півтора годин.
    error: півтора годин
    answer: півтори години
    options:
    - півтори години
    - півтора години
    - півтори годин
    - півтора годину
    error_type: phrase
    explanation: Для жіночого роду завжди вживається форма півтори та Родовий відмінок
      однини.
  - sentence: Мій старий комп'ютер ремонтували в сервісі майже півтора місяців.
    error: місяців
    answer: місяця
    options:
    - місяця
    - місяці
    - місяць
    - місяцем
    error_type: word
    explanation: Після слова півтора іменник обов'язково стоїть у Родовому відмінку
      однини, а не множини.
  - sentence: У великому парку ми несподівано побачили троє високих дерев.
    error: троє
    answer: три
    options:
    - три
    - трьох
    - трьома
    - треті
    error_type: word
    explanation: Для звичайних неживих предметів середнього роду (дерево) ми використовуємо
      кількісні числівники.
  - sentence: Ми вчора пішли в кіно ми троє.
    error: ми троє
    answer: утрьох
    options:
    - утрьох
    - нас троє
    - у три
    - трьома
    error_type: phrase
    explanation: Для зручного вираження спільної дії трьох осіб найприродніше використовувати
      короткий прислівник утрьох.
- type: mark-the-words
  title: Знайдіть збірні та дробові числівники
  instruction: Знайдіть і уважно позначте всі збірні та дробові числівники у цьому
    короткому тексті.
  text: У нашій великій родині завжди було троє дітей. Минулого сніжного року ми купили
    двоє нових саней для зимових розваг. Зазвичай ми весело катаємося півтори години,
    а потім повертаємося додому. Половина нашого шляху пролягає через старий ліс.
    Сьогодні нас загалом четверо, бо ми запросили сусідського хлопчика.
  answers:
  - троє
  - двоє
  - півтори
  - Половина
  - четверо
- type: true-false
  title: 'Правда чи хиба: граматичні правила і традиції'
  items:
  - statement: Збірні числівники можна вільно використовувати з будь-якими іменниками,
      незалежно від їхнього роду та значення.
    correct: false
    explanation: Збірні числівники категорично не можна вживати з іменниками жіночого
      роду або звичайними неживими предметами.
  - statement: Після збірних числівників іменник обов'язково стоїть у Родовому відмінку
      множини.
    correct: true
    explanation: 'Це найголовніше правило граматичного узгодження для таких слів:
      двоє студентів, троє друзів.'
  - statement: Слово окуляри вимагає обов'язкового використання збірного числівника.
    correct: true
    explanation: Окуляри — це специфічний парний іменник, що має тільки форму множини
      (pluralia tantum).
  - statement: Фраза півтора літрів є граматично правильною в українській мові.
    correct: false
    explanation: 'Після слова півтора іменник має бути тільки в однині: півтора літра.'
  - statement: Для позначення часу 13:30 дуже правильно і природно казати о пів на
      другу.
    correct: true
    explanation: Це традиційна і найпоширеніша українська конструкція для позначення
      половини години.
  - statement: Число три не має жодного особливого культурного значення в українському
      багатому фольклорі.
    correct: false
    explanation: Число три є надзвичайно сакральним і постійно зустрічається в казках
      і відомих приказках.
  - statement: На Святий Вечір традиційно і обов'язково готують дванадцять пісних
      страв.
    correct: true
    explanation: Це давня українська глибока традиція, де число 12 символізує місяці
      року та біблійних апостолів.
  - statement: Слово відсоток ніколи не відмінюється за відмінками і завжди залишається
      незмінним.
    correct: false
    explanation: Слово відсоток відмінюється за всіма правилами як звичайний іменник
      чоловічого роду.
  instruction: Визначте, чи твердження правильне.
