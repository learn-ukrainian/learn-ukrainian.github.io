version: '1.0'
module: motion-base-review
level: b1
workbook:
- id: quiz-context-clues
  type: quiz
  instruction: Оберіть правильне дієслово руху за контекстом
  items:
  - question: Я _____ до магазину зараз.
    options:
    - іду
    - ходжу
    - ідеш
    - ходиш
    correct: 0
  - question: Він _____ на роботу автобусом щодня.
    options:
    - їде
    - їздить
    - їхав
    - їдуть
    correct: 1
  - question: Діти весело _____ по парку туди-сюди.
    options:
    - біжать
    - бігають
    - біжить
    - бігає
    correct: 1
  - question: Обережно, офіціант _____ гарячу каву!
    options:
    - носить
    - несе
    - несуть
    - носять
    correct: 1
  - question: Моя сестра чудово _____ автомобіль.
    options:
    - веде
    - водить
    - везе
    - возить
    correct: 1
  - question: Минулого літа ми _____ в гори.
    options:
    - їхали
    - їздили
    - їдуть
    - їздять
    correct: 1
  - question: Поїзд _____ до Києва рівно о сьомій.
    options:
    - відправляється
    - виїжджає
    - їздить
    - іде
    correct: 1
  - question: Вчора ввечері я _____ додому, коли почався дощ.
    options:
    - ходив
    - йшов
    - іде
    - ходить
    correct: 1
- id: fill-in-conjugation
  type: fill-in
  instruction: Вставте правильну форму дієслова руху в теперішньому часі
  items:
  - sentence: Я (іти) _____ додому пішки.
    answer: іду
  - sentence: Ти часто (їздити) _____ у відпустку?
    answer: їздиш
  - sentence: Вона щоранку (бігати) _____ для здоров'я.
    answer: бігає
  - sentence: Ми зараз (їхати) _____ на вокзал.
    answer: їдемо
  - sentence: Ви (водити) _____ машину?
    answer: водите
  - sentence: Вони (нести) _____ важкі валізи.
    answer: несуть
  - sentence: Я щодня (ходити) _____ на роботу.
    answer: ходжу
  - sentence: Таксі (везти) _____ нас в аеропорт.
    answer: везе
- id: match-up-pairs
  type: match-up
  instruction: З'єднайте односпрямовані дієслова з їхніми різноспрямованими парами
  pairs:
  - left: іти
    right: ходити
  - left: їхати
    right: їздити
  - left: бігти
    right: бігати
  - left: нести
    right: носити
  - left: вести
    right: водити
  - left: везти
    right: возити
  - left: летіти
    right: літати
  - left: пливти
    right: плавати
- id: group-sort-verbs
  type: group-sort
  instruction: Розподіліть дієслова на односпрямовані та різноспрямовані
  groups:
  - label: Односпрямовані (зараз, в один бік)
    items:
    - іду
    - їдемо
    - біжить
    - несе
    - везуть
  - label: Різноспрямовані (регулярно, туди-сюди)
    items:
    - ходжу
    - їздять
    - бігаєте
    - носить
    - водить
- id: error-correction-verbs
  type: error-correction
  instruction: Знайдіть і виправте помилку у виборі дієслова руху
  items:
  - sentence: Я іду в спортзал тричі на тиждень.
    error: іду
    correction: ходжу
    error_type: word
    options:
    - ходжу
    - йду
    - біжу
    explanation: Регулярна дія (тричі на тиждень) вимагає різноспрямованого дієслова
      'ходити'.
  - sentence: Вчора ми їхали в центр міста за покупками і повернулися ввечері.
    error: їхали
    correction: їздили
    error_type: word
    options:
    - їздили
    - їдемо
    - йшли
    explanation: Завершена поїздка туди і назад у минулому вимагає дієслова 'їздити'.
  - sentence: Подивись! Маленька дитина бігає прямо до нас!
    error: бігає
    correction: біжить
    error_type: word
    options:
    - біжить
    - йде
    - ходить
    explanation: Рух відбувається прямо зараз в одному напрямку, тому потрібно 'біжить'.
  - sentence: Мій брат професійний водій, він веде вантажівку.
    error: веде
    correction: водить
    error_type: word
    options:
    - водить
    - везе
    - возить
    explanation: Професія або навичка керувати транспортом передається дієсловом 'водити'.
  - sentence: Я маю поганий зір, тому завжди несу окуляри.
    error: несу
    correction: ношу
    error_type: word
    options:
    - ношу
    - воджу
    - везу
    explanation: Для носіння одягу чи аксесуарів використовується різноспрямоване
      дієслово 'носити'.
  - sentence: Мій поїзд відправляється о восьмій годині.
    error: відправляється
    correction: відбуває
    error_type: word
    options:
    - відбуває
    - їде
    - виходить
    explanation: Слово 'відправляється' щодо транспорту є калькою. Правильно 'відбуває'
      або 'виїжджає'.
- id: essay-response-routine
  type: essay-response
  prompt: Опишіть ваш звичайний день. Розкажіть, як ви рухаєтеся містом (пішки, на
    транспорті, що носите з собою, кого водите або підвозите). Використайте щонайменше
    4 різні пари дієслів руху.
  min_words: 50
  evaluation_criteria:
  - Використано мінімум 4 різні пари дієслів руху.
  - Правильно розмежовано односпрямовані та різноспрямовані форми (напр. 'іду' зараз
    vs 'ходжу' часто).
  - Правильно використано прийменники (в, на, до, з, від) та їх відмінки.
  model_answer: Мій звичайний день завжди починається дуже активно. Спочатку я веду
    молодшу сестру до дитячого садка, який знаходиться поруч. Потім я йду на автобусну
    зупинку. Зазвичай я їжджу на роботу автобусом, бо він возить пасажирів дуже швидко.
    На роботі я працюю за комп'ютером, але часто ходжу по офісу. Увечері, коли я повертаюся,
    я завжди заходжу в магазин. Тоді я несу важкі пакети з продуктами додому. На вихідних
    я дуже люблю бігати в парку для здоров'я.
