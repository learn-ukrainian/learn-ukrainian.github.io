version: '1.0'
module: motion-base-review
level: b1
inline:
- id: fill-in-conjugation-one-way
  type: fill-in
  instruction: Вставте правильну форму односпрямованого дієслова (іти, їхати, бігти)
    у теперішньому часі
  items:
  - sentence: Куди ви зараз _____?
    answer: ідете
    options:
    - ідемо
    - ідете
    - ідуть
  - sentence: Я _____ на роботу автобусом.
    answer: їду
    options:
    - їду
    - їдеш
    - їде
  - sentence: Чому він так швидко _____?
    answer: біжить
    options:
    - біжить
    - біжать
    - біжимо
  - sentence: Ми _____ до нового музею.
    answer: ідемо
    options:
    - іду
    - ідемо
    - ідуть
  - sentence: Вони _____ до Львова поїздом.
    answer: їдуть
    options:
    - їдуть
    - їдете
    - їде
  - sentence: Я _____ на зупинку, бо дуже спізнююся.
    answer: біжу
    options:
    - біжу
    - біжиш
    - біжать
  - sentence: Ти _____ додому пішки?
    answer: ідеш
    options:
    - іде
    - ідуть
    - ідеш
  - sentence: Вона _____ у довге відрядження.
    answer: їде
    options:
    - їдуть
    - їде
    - їдемо
- id: match-pairs
  type: match-up
  instruction: З'єднайте односпрямовані дієслова з їхніми різноспрямованими парами
  pairs:
  - left: іти
    right: ходити
  - left: їхати
    right: їздити
  - left: бігти
    right: бігати
  - left: нести
    right: носити
  - left: вести
    right: водити
  - left: везти
    right: возити
  - left: летіти
    right: літати
  - left: пливти
    right: плавати
- id: group-sort-direction
  type: group-sort
  instruction: Розподіліть дієслова за напрямком руху
  groups:
  - label: Односпрямовані (зараз / в один бік)
    items:
    - іду
    - їдемо
    - біжить
    - несуть
    - везеш
  - label: Різноспрямовані (регулярно / туди-сюди)
    items:
    - ходжу
    - їздять
    - бігаєте
    - носить
    - водять
- id: fill-in-prepositions-motion
  type: fill-in
  instruction: Оберіть правильний прийменник руху
  items:
  - sentence: Ми їдемо _____ центр міста.
    answer: в
    options:
    - в
    - на
    - до
  - sentence: Я йду _____ хорошого лікаря.
    answer: до
    options:
    - в
    - до
    - на
  - sentence: Молодий спортсмен біжить _____ стадіон.
    answer: на
    options:
    - в
    - на
    - через
  - sentence: Вони повертаються _____ роботи пішки.
    answer: з
    options:
    - від
    - з
    - до
  - sentence: Цей автобус зараз їде _____ великого вокзалу.
    answer: від
    options:
    - від
    - через
    - із
  - sentence: Ми дуже швидко йдемо _____ парк.
    answer: через
    options:
    - через
    - до
    - повз
- id: error-correction-motion
  type: error-correction
  instruction: Знайдіть і виправте помилку в дієслові руху
  items:
  - sentence: Я зараз ходжу на роботу.
    error: ходжу
    correction: іду
    error_type: word
    options:
    - іду
    - їду
    - бігаю
    explanation: Дія відбувається прямо зараз, тому потрібне односпрямоване дієслово
      'іти'.
  - sentence: Вчора ми їхали в кінотеатр і повернулися додому.
    error: їхали
    correction: їздили
    error_type: word
    options:
    - їздили
    - йшли
    - пішли
    explanation: Це завершена подорож туди-сюди, тому використовуємо різноспрямоване
      дієслово 'їздити'.
  - sentence: Він часто біжить у парку для здоров'я.
    error: біжить
    correction: бігає
    error_type: word
    options:
    - бігає
    - іде
    - їде
    explanation: Регулярна звичка (часто) і рух без конкретної мети вимагають 'бігати'.
  - sentence: Щодня мій брат іде до школи автобусом.
    error: іде
    correction: їздить
    error_type: word
    options:
    - їздить
    - їде
    - ходить
    explanation: Рух транспортом і регулярність (щодня) вимагають різноспрямованого
      'їздити'.
  - sentence: Подивись! Маленька дитина вже їде своїми ніжками!
    error: їде
    correction: ходить
    error_type: word
    options:
    - ходить
    - біжить
    - іде
    explanation: Для опису фізичної здатності самостійно пересуватися пішки використовується
      'ходити'.
  - sentence: Наш швидкісний поїзд відправляється о сьомій годині.
    error: відправляється
    correction: відбуває
    error_type: word
    options:
    - відбуває
    - їде
    - йде
    explanation: '''Відправляється'' — це калька з російської мови. Правильно сказати
      ''відбуває'' або ''відходить''.'
- id: quiz-choice-context
  type: quiz
  instruction: Оберіть правильне дієслово
  items:
  - question: Ми _____ в Карпати кожного літа.
    options:
    - їдемо
    - їздимо
    - ідемо
    - ходимо
    correct: 1
  - question: Ти зараз _____ до мене пішки?
    options:
    - ідеш
    - ходиш
    - їдеш
    - їздиш
    correct: 0
  - question: Куди він так швидко _____?
    options:
    - біжить
    - бігає
    - несе
    - носить
    correct: 0
  - question: Я часто _____ в басейні на вихідних.
    options:
    - пливу
    - плаваю
    - лечу
    - літаю
    correct: 1
  - question: Вчора ми пішки _____ в новий ресторан.
    options:
    - ходили
    - ідемо
    - ходять
    - ідуть
    correct: 0
  - question: Зараз вона _____ на роботу на велосипеді.
    options:
    - їздить
    - їде
    - іде
    - ходить
    correct: 1
  - question: Він ніколи не _____ класичний костюм.
    options:
    - носить
    - несе
    - водить
    - веде
    correct: 0
  - question: Дивись, таксі _____ нас прямо до готелю!
    options:
    - возить
    - везе
    - носить
    - несе
    correct: 1
- id: free-write-daily-routine
  type: essay-response
  prompt: 'Опишіть свій типовий день, звертаючи увагу на ваш рух. Використайте щонайменше
    4 різні пари дієслів руху (наприклад: іти/ходити, їхати/їздити, бігти/бігати,
    нести/носити). Звідки і куди ви рухаєтеся? Яким транспортом користуєтеся?'
  min_words: 50
  model_answer: Мій типовий день дуже активний і цікавий. Вранці я завжди бігаю в
    парку біля свого будинку, щоб мати міцне здоров'я. Потім я швидко снідаю і йду
    на зупинку. Зазвичай я їжджу на роботу міським автобусом, але сьогодні я їду з
    колегою в його комфортному автомобілі. Після важкої роботи я часто ходжу в улюблений
    супермаркет. Там я купую свіжі продукти і несу важкі пакети додому пішки. На вихідних
    ми з моїми друзями дуже любимо плавати у великому басейні або їздити за місто
    на природу.
workbook:
- type: translate
  instruction: Оберіть правильний український переклад
  items:
  - source: I walk to school every day.
    options:
    - text: Я ходжу до школи щодня.
      correct: true
    - text: Я іду до школи щодня.
      correct: false
    - text: Я їжджу до школи щодня.
      correct: false
    - text: Я їду до школи щодня.
      correct: false
  - source: He is driving to work right now.
    options:
    - text: Він зараз їде на роботу.
      correct: true
    - text: Він зараз їздить на роботу.
      correct: false
    - text: Він зараз іде на роботу.
      correct: false
    - text: Він зараз водить на роботу.
      correct: false
  - source: Are you carrying a heavy suitcase?
    options:
    - text: Ти несеш важку валізу?
      correct: true
    - text: Ти носиш важку валізу?
      correct: false
    - text: Ти везеш важку валізу?
      correct: false
    - text: Ти ведеш важку валізу?
      correct: false
  - source: We went to the cinema yesterday.
    options:
    - text: Вчора ми ходили в кіно.
      correct: true
    - text: Вчора ми йшли в кіно.
      correct: false
    - text: Вчора ми їздили в кіно.
      correct: false
    - text: Вчора ми їхали в кіно.
      correct: false
  - source: The dog is running under the table.
    options:
    - text: Собака біжить під стіл.
      correct: true
    - text: Собака біжить під столом.
      correct: false
    - text: Собака бігає під стіл.
      correct: false
    - text: Собака біжить на стіл.
      correct: false
  - source: I love flying.
    options:
    - text: Я люблю літати.
      correct: true
    - text: Я люблю летіти.
      correct: false
    - text: Я люблю плавати.
      correct: false
    - text: Я люблю пливти.
      correct: false
- type: order
  instruction: Розставте репліки діалогу в правильному порядку
  items:
  - — Привіт! Ти де? Я вже чекаю тебе біля кінотеатру.
  - — Привіт! Я вже їду в метро. Буду через десять хвилин.
  - — Добре, не поспішай. Я поки що сходжу за нашими квитками.
  - — Купи, будь ласка, попкорн. А я зараз несу нам смачну каву.
  - — Домовилися. Чекаю на тебе!
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
- type: true-false
  instruction: Правда чи Ні? Оцініть граматичні правила української мови
  items:
  - statement: Слово 'ходити' — це типове односпрямоване дієслово.
    correct: false
    explanation: Слово 'ходити' — різноспрямоване. Односпрямоване дієслово — це 'іти'.
  - statement: Якщо ви їдете автобусом на роботу прямо зараз, ви використовуєте слово
      'їхати'.
    correct: true
    explanation: Так, це конкретний односпрямований рух прямо зараз у певний пункт
      призначення.
  - statement: Слово 'носити' також використовується у значенні 'одягати' (to wear).
    correct: true
    explanation: 'Так, наприклад: ''Він завжди носить окуляри''.'
  - statement: Після прийменника 'з' або 'із' ми використовуємо знахідний відмінок.
    correct: false
    explanation: Після прийменника 'з/із' використовується родовий відмінок.
  - statement: Дієслово 'летіти' — це різноспрямований рух.
    correct: false
    explanation: '''Летіти'' — це рух в одному напрямку просто зараз. Різноспрямований
      варіант — ''літати''.'
  - statement: Використовувати слово 'відправлятися' для пасажирського поїзда — це
      правильно.
    correct: false
    explanation: Ні, це русизм. В українській мові поїзд 'відбуває' або 'відходить'.
