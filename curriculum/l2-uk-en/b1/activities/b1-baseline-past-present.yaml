version: '1.0'
module: b1-baseline-past-present
level: b1
inline:
- id: group-sort-distribute-verbs-between-i-and-ii-conjugation-classes
  type: group-sort
  instruction: Розподіліть дієслова за дієвідмінами (І чи ІІ)
  groups:
  - label: І дієвідміна (вони -уть/-ють)
    items:
    - писати
    - знати
    - читати
    - працювати
    - хотіти
  - label: ІІ дієвідміна (вони -ать/-ять)
    items:
    - робити
    - говорити
    - вчитися
    - бачити
    - стояти
  title: Розподіліть дієслова за дієвідмінами (І чи ІІ)
- id: fill-in-tense-forms
  type: fill-in
  instruction: Вставте правильну форму дієслова в теперішньому або минулому часі
  items:
  - sentence: Олексій _____ у видавництві минулого літа.
    answer: працював
    options:
    - працює
    - працював
    - працювали
    - працювала
  - sentence: Зараз він _____ велику статтю для журналу.
    answer: пише
    options:
    - писав
    - пише
    - пишуть
    - писала
  - sentence: Дарина _____ багато під час літньої відпустки.
    answer: подорожувала
    options:
    - подорожує
    - подорожував
    - подорожували
    - подорожувала
  - sentence: Ми _____ спеціальний випуск прямо зараз.
    answer: готуємо
    options:
    - готували
    - готуємо
    - готуєте
    - готують
  - sentence: Я бачу, що ти багато _____ про цю тему.
    answer: знаєш
    options:
    - знаю
    - знаєш
    - знає
    - знаєте
  - sentence: Минулого літа ми _____ до Львова.
    answer: їздили
    options:
    - їдемо
    - їздили
    - їхав
    - їхали
  - sentence: Ти _____ постійним автором у цьому журналі?
    answer: працюєш
    options:
    - працюю
    - працюєш
    - працює
    - працювали
  - sentence: Вони _____ книжку весь вчорашній вечір.
    answer: читали
    options:
    - читають
    - читав
    - читала
    - читали
  title: Вставте правильну форму дієслова в теперішньому або минулому часі
- id: quiz-aspect-id
  type: quiz
  instruction: Визначте час і вид дієслова у реченні
  items:
  - question: Я зараз пишу статтю.
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 0
  - question: Він прочитав книжку вчора.
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 3
  - question: Ми довго працювали над проєктом.
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 2
  - question: Вона написала лист другу.
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 3
  - question: Вони знають багато мов.
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 0
  - question: Вчора весь день йшов дощ.
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 2
  - question: Раптом я зустрів свого друга.
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 3
  - question: Ви бачите цей пам'ятник?
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 0
  - question: Ми вчора вчилися три години.
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 2
  - question: Вона готує вечерю зараз.
    options:
    - теперішній, недоконаний
    - теперішній, доконаний
    - минулий, недоконаний
    - минулий, доконаний
    correct: 0
  title: Визначте час і вид дієслова у реченні
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте видові пари (недоконаний ↔ доконаний вид)
  pairs:
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: робити
    right: зробити
  - left: говорити
    right: сказати
  - left: бачити
    right: побачити
  - left: брати
    right: взяти
  - left: готувати
    right: приготувати
  - left: вирішувати
    right: вирішити
  title: З'єднайте видові пари (недоконаний ↔ доконаний вид)
workbook:
- id: workbook-past-tense-irregular
  type: fill-in
  instruction: Утворіть правильну форму минулого часу для дієслів з основою на приголосний
  items:
  - sentence: Він _____ важку сумку.
    answer: ніс
    options:
    - ніс
    - несе
    - несла
    - несли
  - sentence: Вона _____ квіти в руках.
    answer: несла
    options:
    - ніс
    - несла
    - несло
    - несли
  - sentence: Ми _____ продукти додому.
    answer: несли
    options:
    - ніс
    - несла
    - несло
    - несли
  - sentence: Він не _____ прийти вчора.
    answer: міг
    options:
    - може
    - міг
    - могла
    - могли
  - sentence: Вона _____ вирішити це завдання.
    answer: могла
    options:
    - міг
    - могла
    - могло
    - могли
  - sentence: Вони швидко _____ до парку.
    answer: бігли
    options:
    - біг
    - бігла
    - бігли
    - біжать
  title: Утворіть правильну форму минулого часу для дієслів з основою на приголосний
- id: workbook-reflexive-conjugation
  type: match-up
  instruction: З'єднайте займенник із правильною формою дієслова 'вчитися'
  pairs:
  - left: Я
    right: вчуся
  - left: Ти
    right: вчишся
  - left: Він
    right: вчиться
  - left: Ми
    right: вчимося
  - left: Ви
    right: вчитеся
  - left: Вони
    right: вчаться
  title: З'єднайте займенник із правильною формою дієслова 'вчитися'
- id: workbook-unjumble-past
  type: unjumble
  instruction: Складіть речення з поданих слів у правильному порядку
  items:
  - words:
    - минулого
    - Я
    - працював
    - тижня.
    - багато
    correct_order:
    - Я
    - багато
    - працював
    - минулого
    - тижня.
  - words:
    - вона
    - Поки
    - читала,
    - спав.
    - кіт
    correct_order:
    - Поки
    - вона
    - читала,
    - кіт
    - спав.
  - words:
    - вирішили
    - Ми
    - зустрітися
    - вчора
    - ввечері.
    correct_order:
    - Ми
    - вирішили
    - зустрітися
    - вчора
    - ввечері.
  - words:
    - сонце
    - світило,
    - Коли
    - гуляли.
    - ми
    correct_order:
    - Коли
    - світило,
    - сонце
    - ми
    - гуляли.
  - words:
    - вже
    - Ви
    - написали
    - статтю?
    - цю
    correct_order:
    - Ви
    - вже
    - написали
    - цю
    - статтю?
  - words:
    - не
    - Я
    - міг
    - вчора.
    - зателефонувати
    correct_order:
    - Я
    - не
    - міг
    - зателефонувати
    - вчора.
  title: Складіть речення з поданих слів у правильному порядку
- type: essay-response
  prompt: Напишіть короткий текст (мінімум 50 слів) на тему 'Мій вчорашній день'.
    Опишіть, що ви робили тривалий час (недоконаний вид) і які конкретні дії ви завершили
    (доконаний вид). Обов'язково вживайте дієслова минулого часу та узгоджуйте їх
    за родом і числом.
  min_words: 50
  model_answer: Вчора був чудовий сонячний день. Сонце світило яскраво, і я вирішив
    піти в центр міста. Поки я гуляв вулицями, я побачив старого друга. Ми зайшли
    в кафе і випили кави. Ми довго спілкувалися про наше життя. Потім я повернувся
    додому і нарешті дочитав цікаву книжку, яку почав ще минулого тижня. Вечір пройшов
    спокійно.
