version: '1.0'
module: b1-baseline-past-present
level: b1
inline:
- id: group-sort
  type: group-sort
  instruction: Розподіліть дієслова за дієвідміною, орієнтуючись на їхні особові закінчення.
  groups:
  - label: І дієвідміна (-уть, -ють, -е, -є)
    items:
    - знають
    - пишемо
    - читають
    - несуть
    - хочуть
  - label: ІІ дієвідміна (-ать, -ять, -ить, -їть)
    items:
    - говорять
    - роблять
    - сплять
    - стоять
    - бояться
- id: fill-in-tense-forms
  type: fill-in
  instruction: Вставте дієслово в правильну форму минулого часу, звертаючи увагу на
    рід і число підмета.
  items:
  - sentence: Вчора Олексій ____ у відомому видавництві.
    answer: працював
    options:
    - працював
    - працювала
    - працювали
  - sentence: Вона довго ____ цікаву аналітичну статтю.
    answer: читала
    options:
    - читав
    - читала
    - читало
  - sentence: Сонце яскраво ____ над Києвом.
    answer: світило
    options:
    - світив
    - світило
    - світили
  - sentence: Минулого літа ми часто ____ до Львова.
    answer: їздили
    options:
    - їздив
    - їздила
    - їздили
  - sentence: Він обережно ____ гарячу каву.
    answer: ніс
    options:
    - несла
    - ніс
    - несли
  - sentence: Вони дуже швидко ____ на зустріч.
    answer: бігли
    options:
    - бігла
    - біг
    - бігли
  - sentence: Дарина ____ самостійно це зробити.
    answer: могла
    options:
    - міг
    - могла
    - могли
  - sentence: Мій друг впевнено ____ нову машину.
    answer: вів
    options:
    - вів
    - вела
    - вели
- id: quiz-aspect-id
  type: quiz
  instruction: Визначте час і вид виділеного дієслова.
  items:
  - question: Я **пишу** велику аналітичну статтю.
    options:
    - Теперішній час, недоконаний вид
    - Майбутній час, доконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    correct: 0
  - question: Вчора я **працював** над текстом до обіду.
    options:
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Теперішній час, недоконаний вид
    - Майбутній час, доконаний вид
    correct: 0
  - question: Олексій уже **написав** цю статтю.
    options:
    - Минулий час, доконаний вид
    - Минулий час, недоконаний вид
    - Теперішній час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 0
  - question: Вони **читають** свіжі новини.
    options:
    - Теперішній час, недоконаний вид
    - Теперішній час, доконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    correct: 0
  - question: Ми **вирішили** цю проблему вчора.
    options:
    - Минулий час, доконаний вид
    - Минулий час, недоконаний вид
    - Теперішній час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 0
  - question: Студенти **роблять** домашнє завдання.
    options:
    - Теперішній час, недоконаний вид
    - Майбутній час, недоконаний вид
    - Теперішній час, доконаний вид
    - Минулий час, доконаний вид
    correct: 0
  - question: Тарас **прочитав** цікаву книжку до кінця.
    options:
    - Минулий час, доконаний вид
    - Минулий час, недоконаний вид
    - Теперішній час, недоконаний вид
    - Майбутній час, доконаний вид
    correct: 0
  - question: Сонце довго **світило** у наше вікно.
    options:
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Теперішній час, недоконаний вид
    - Майбутній час, недоконаний вид
    correct: 0
  - question: Я вже **взяв** твій новий ноутбук.
    options:
    - Минулий час, доконаний вид
    - Минулий час, недоконаний вид
    - Теперішній час, доконаний вид
    - Теперішній час, недоконаний вид
    correct: 0
  - question: Вона **п'є** міцну чорну каву.
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Майбутній час, доконаний вид
    - Минулий час, доконаний вид
    correct: 0
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте недоконаний вид із відповідним доконаним видом (видові пари).
  pairs:
  - left: писати
    right: написати
  - left: робити
    right: зробити
  - left: читати
    right: прочитати
  - left: вирішувати
    right: вирішити
  - left: давати
    right: дати
  - left: брати
    right: взяти
  - left: говорити
    right: сказати
  - left: вмиватися
    right: вмитися
- id: error-correction-aspect
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні (неправильний вид дієслова).
  items:
  - sentence: Вчора я прочитав книжку цілих три години.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - прочитаю
    - читаю
    explanation: «Три години» вказує на тривалий процес, тому потрібен недоконаний
      вид (читав).
  - sentence: Я вчора писав важливий лист і одразу відправляв його клієнту.
    error: відправляв
    correction: відправив
    error_type: word
    options:
    - відправляв
    - відправив
    - відправляю
    explanation: Дія повністю завершилася та досягла мети, тому потрібен доконаний
      вид (відправив).
  - sentence: Вранці я прокидався, швидко встав з ліжка і вийшов з дому.
    error: прокидався
    correction: прокинувся
    error_type: word
    options:
    - прокидався
    - прокинувся
    - прокидаюся
    explanation: Послідовність коротких завершених подій передається доконаним видом
      (прокинувся).
  - sentence: Я спокійно поснідав, коли мені несподівано зателефонував Тарас.
    error: поснідав
    correction: снідав
    error_type: word
    options:
    - снідав
    - поснідав
    - снідаю
    explanation: Тут сніданок — це фонова тривала дія (недоконаний вид), яку раптом
      перервав дзвінок.
  - sentence: Ми доїхали в автобусі, і раптом він різко зупинявся посеред дороги.
    error: зупинявся
    correction: зупинився
    error_type: word
    options:
    - зупинявся
    - зупинився
    - зупиняється
    explanation: Раптова, завершена подія потребує доконаного виду (зупинився).
  - sentence: Поки я робив домашнє завдання, мій друг прочитав свіжі новини.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - прочитав
    - читав
    - прочитає
    explanation: Слово «поки» вказує на паралельні дії, тому обидва процеси мають
      бути недоконаного виду.
- id: open-writing-yesterday
  type: essay-response
  prompt: Напишіть короткий текст (50-80 слів) на тему «Мій вчорашній день». Використовуйте
    дієслова минулого часу, чергуючи доконаний вид (для послідовності дій, результатів)
    та недоконаний вид (для опису фону, тривалих процесів).
  min_words: 50
  model_answer: Вчора я прокинувся о сьомій годині ранку. Надворі було прохолодно,
    повільно йшов дощ. Я встав, швидко вмився і приготував каву. Поки я снідав, я
    читав новини в телефоні. О дев'ятій я вийшов з дому і поїхав на роботу. Там я
    працював над великим проєктом п'ять годин і врешті-решт написав важливу аналітичну
    статтю. Увечері я зустрівся з другом, ми довго гуляли містом і розмовляли. Я повернувся
    додому пізно і відразу заснув.
  rubric:
  - criteria: Узгодження минулого часу
    description: Дієслова минулого часу правильно узгоджуються з підметом у роді та
      числі (я встав / я встала, сонце світило).
  - criteria: Правильне вживання виду
    description: Доконаний вид використаний для результатів (написав, прокинувся),
      недоконаний — для тривалих фонових процесів (читав, працював, йшов).
workbook:
- type: fill-in
  instruction: 'Оберіть правильне закінчення для зворотних дієслів: м''який знак (-ться)
    для третьої особи чи його відсутність (-шся) для другої.'
  items:
  - sentence: Олено, чому ти так сильно ____ перед важливим іспитом?
    answer: хвилюєшся
    options:
    - хвилюється
    - хвилюєшся
  - sentence: Мій молодший брат завжди ____, коли дивиться комедії.
    answer: сміється
    options:
    - смієшся
    - сміється
  - sentence: Де ти ____ в цьому навчальному році?
    answer: навчаєшся
    options:
    - навчаєшся
    - навчається
  - sentence: Чомусь мені сьогодні вночі взагалі не ____.
    answer: спиться
    options:
    - спишся
    - спиться
  - sentence: Як ти ____ сьогодні вранці?
    answer: почуваєшся
    options:
    - почувається
    - почуваєшся
  - sentence: Вони часто ____ у центральному парку після роботи.
    answer: зустрічаються
    options:
    - зустрічаються
    - зустрічаєшся
  - sentence: Я впевнена, що нам обов'язково все ____.
    answer: вдасться
    options:
    - вдасться
    - вдашся
  - sentence: Ти дуже стильно ____ для цієї вечірки.
    answer: одягаєшся
    options:
    - одягаєшся
    - одягається
- type: match-up
  instruction: З'єднайте особовий займенник із правильною формою дієслова «робити»
    та «говорити» в теперішньому часі.
  pairs:
  - left: я
    right: роблю, говорю
  - left: ти
    right: робиш, говориш
  - left: він/вона
    right: робить, говорить
  - left: ми
    right: робимо, говоримо
  - left: ви
    right: робите, говорите
  - left: вони
    right: роблять, говорять
- type: error-correction
  instruction: Виправте граматичні помилки в реченнях (неправильне узгодження роду,
    числа або особи).
  items:
  - sentence: Моя сестра сказав мені про це вчора.
    error: сказав
    correction: сказала
    error_type: word
    options:
    - сказав
    - сказала
    - сказало
    explanation: «Сестра» — жіночого роду, тому дієслово минулого часу повинно мати
      закінчення -ла.
  - sentence: Студенти уважно слухав лекцію в аудиторії.
    error: слухав
    correction: слухали
    error_type: word
    options:
    - слухав
    - слухали
    - слухала
    explanation: «Студенти» — множина, тому в минулому часі ми використовуємо форму
      на -ли.
  - sentence: Він дуже швидко говоре українською мовою.
    error: говоре
    correction: говорить
    error_type: word
    options:
    - говоре
    - говорить
    - говорять
    explanation: Дієслово «говорити» належить до ІІ дієвідміни, тому в третій особі
      однини маємо закінчення -ить.
  - sentence: Вони хотять купити нову квартиру в центрі.
    error: хотять
    correction: хочуть
    error_type: word
    options:
    - хотять
    - хочуть
    - хочете
    explanation: Слово «хотіти» є винятком і належить до І дієвідміни, тому має форму
      «хочуть».
  - sentence: Мале дитя міцно спав у своїй кімнаті.
    error: спав
    correction: спало
    error_type: word
    options:
    - спав
    - спало
    - спала
    explanation: «Дитя» — слово середнього роду, тому в минулому часі використовується
      закінчення -ло.
  - sentence: 'Жінка впевнено сказала: «Я зробив домашнє завдання».'
    error: зробив
    correction: зробила
    error_type: word
    options:
    - зробив
    - зробила
    - зробили
    explanation: Коли жінки розповідають про себе особисто, вони завжди використовують
      жіночий рід минулого часу.
