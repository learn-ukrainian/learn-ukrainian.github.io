version: '1.0'
module: b1-baseline-past-present
level: b1
inline:
- id: group-sort-distribute-verbs-between-i-and-ii-conjugation-classes
  type: group-sort
  instruction: 'Розподіліть дієслова на першу та другу дієвідміну (I conjugation:
    -уть/-ють, II conjugation: -ать/-ять).'
  groups:
  - label: I дієвідміна
    items:
    - писати
    - читати
    - знати
    - хотіти
    - працювати
  - label: II дієвідміна
    items:
    - робити
    - говорити
    - стояти
    - сидіти
    - спати
  title: 'Розподіліть дієслова на першу та другу дієвідміну (I conjugation: -уть/-ють,
    II '
- id: fill-in-tense-forms
  type: fill-in
  instruction: Поставте дієслово в дужках у правильну форму теперішнього або минулого
    часу.
  items:
  - sentence: Зараз я _____ статтю.
    answer: пишу
  - sentence: Вчора Олексій _____ в бібліотеці.
    answer: працював
  - sentence: Минулого літа ми _____ до Львова.
    answer: їздили
  - sentence: Щодня вона уважно _____ новини.
    answer: читає
  - sentence: Ти _____, де він зараз живе?
    answer: знаєш
  - sentence: Вчора моя сестра _____, що приїде.
    answer: сказала
  - sentence: Зараз студенти _____ домашнє завдання.
    answer: роблять
  - sentence: Раптом він _____ телефон і зателефонував.
    answer: взяв
  title: Поставте дієслово в дужках у правильну форму теперішнього або минулого часу.
- id: quiz-aspect-id
