version: '1.0'
module: b1-baseline-past-present
level: b1
inline:
- id: group-sort
  type: group-sort
  instruction: Розподіліть дієслова за дієвідмінами
  groups:
  - label: I дієвідміна (-уть/-ють)
    items:
    - пишуть
    - співають
    - читають
    - п'ють
    - встають
  - label: II дієвідміна (-ать/-ять)
    items:
    - роблять
    - сплять
    - стоять
    - вчать
    - чистять
- id: quiz
  type: quiz
  instruction: Визначте час і вид дієслова
  items:
  - question: він пише
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 0
  - question: вона прочитала
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 3
  - question: ми гуляли
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 2
  - question: я розповідаю
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 0
  - question: вони закричали
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 3
  - question: ти стоїш
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 0
  - question: сонце зійшло
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 3
  - question: я готую
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 0
  - question: воно вчиться
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 0
  - question: дівчина взяла
    options:
    - теперішній час, недоконаний вид
    - теперішній час, доконаний вид
    - минулий час, недоконаний вид
    - минулий час, доконаний вид
    correct: 3
- id: match-up
  type: match-up
  instruction: 'З''єднайте видові пари: недоконаний ↔ доконаний'
  pairs:
  - left: писати
    right: написати
  - left: робити
    right: зробити
  - left: читати
    right: прочитати
  - left: вирішувати
    right: вирішити
  - left: давати
    right: дати
  - left: брати
    right: взяти
  - left: говорити
    right: сказати
  - left: шукати
    right: знайти
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилки у вживанні виду
  items:
  - sentence: Він написав лист цілу годину.
    error: написав
    correction: писав
    error_type: word
    options:
    - писав
    - напише
    - пише
    explanation: «Цілу годину» вказує на тривалий процес, тому потрібен недоконаний
      вид.
  - sentence: Я прочитав цікаву книгу три години.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - прочитаю
    - читаю
    explanation: Маркер часу «три години» вимагає недоконаного виду.
  - sentence: Учора я вирішив це складне завдання весь вечір.
    error: вирішив
    correction: вирішував
    error_type: word
    options:
    - вирішував
    - вирішую
    - вирішиш
    explanation: «Весь вечір» показує тривалість, тому вживаємо недоконаний вид.
  - sentence: Ми довго гуляли парком і раптом бачили нашого старого друга.
    error: бачили
    correction: побачили
    error_type: word
    options:
    - побачили
    - бачу
    - побачимо
    explanation: «Раптом» вказує на несподівану, коротку завершену дію (доконаний
      вид).
  - sentence: Вони зробили цей проєкт два дні, а потім відпочивали.
    error: зробили
    correction: робили
    error_type: word
    options:
    - робили
    - зроблять
    - роблять
    explanation: Тривалість «два дні» вимагає процесу (недоконаний вид).
  - sentence: Коли я написав довгу статтю, несподівано вимкнули світло.
    error: написав
    correction: писав
    error_type: word
    options:
    - писав
    - пишу
    - напишу
    explanation: Тло для перерваної дії завжди виражається недоконаним видом (процес).
- id: open-writing
  type: essay-response
  instruction: Напишіть 6 речень про свій вчорашній день, використовуючи послідовність
    (док.) та тло (недок.)
  prompt: Опишіть свій вчорашній день, чергуючи дієслова недоконаного виду (для опису
    тривалих процесів або фону) та доконаного виду (для завершених результатів і послідовних
    дій).
  min_words: 50
  model_answer: Вчора зранку яскраво світило сонце, і я пив каву. Потім я швидко зібрався
    і пішов на роботу. Я працював над проєктом три години. Коли я читав важливий документ,
    раптом задзвонив телефон. Увечері я зустрівся з друзями. Ми довго гуляли містом
    і розмовляли про життя.
  evaluation_criteria:
  - Використано мінімум 6 речень.
  - Присутні дієслова недоконаного виду для опису фону або процесу.
  - Присутні дієслова доконаного виду для послідовних або раптових дій.
- id: fill-in
  type: fill-in
  instruction: Поставте дієслово на -ся у правильну форму теперішнього часу
  items:
  - sentence: Кожного ранку я _____ (вмиватися) холодною водою.
    answer: вмиваюся
    options:
    - вмиваюся
    - вмиваєшся
    - вмивається
  - sentence: Чому ти так голосно _____ (сміятися)?
    answer: смієшся
    options:
    - сміюся
    - смієшся
    - сміється
  - sentence: Вона багато _____ (вчитися), щоб скласти іспит.
    answer: вчиться
    options:
    - вчиться
    - вчишся
    - вчуся
  - sentence: Ми часто _____ (зустрічатися) з друзями в цій кав'ярні.
    answer: зустрічаємося
    options:
    - зустрічаємося
    - зустрічаєтеся
    - зустрічаються
  - sentence: Ви дуже _____ (хвилюватися) перед цією презентацією?
    answer: хвилюєтеся
    options:
    - хвилюємося
    - хвилюєтеся
    - хвилюються
  - sentence: Вони завжди щиро _____ (усміхатися), коли бачать нас.
    answer: усміхаються
    options:
    - усміхаються
    - усміхаєтеся
    - усміхаємося
  - sentence: Мені сьогодні вночі зовсім не _____ (спатися).
    answer: спиться
    options:
    - спиться
    - сплюся
    - спляться
  - sentence: Ти часто _____ (дивуватися) дивним новинам?
    answer: дивуєшся
    options:
    - дивуюся
    - дивуєшся
    - дивується
workbook:
- type: fill-in
  instruction: Вставте правильну форму дієслова в теперішньому часі
  items:
  - sentence: Я щодня _____ (писати) листи клієнтам.
    answer: пишу
    options:
    - пишу
    - пишеш
    - пише
  - sentence: Ти дуже добре _____ (співати) українські пісні.
    answer: співаєш
    options:
    - співаєш
    - співає
    - співаю
  - sentence: Мій брат _____ (робити) домашнє завдання ввечері.
    answer: робить
    options:
    - роблю
    - робиш
    - робить
  - sentence: Ми разом _____ (вчити) нові слова.
    answer: вчимо
    options:
    - вчу
    - вчиш
    - вчимо
  - sentence: Ви _____ (стояти) на зупинці автобуса?
    answer: стоїте
    options:
    - стою
    - стоїш
    - стоїте
  - sentence: Студенти уважно _____ (читати) новий текст.
    answer: читають
    options:
    - читаю
    - читає
    - читають
  - sentence: Я завжди _____ (чистити) зуби двічі на день.
    answer: чищу
    options:
    - чищу
    - чистиш
    - чистить
  - sentence: Ти _____ (любити) пити каву з молоком?
    answer: любиш
    options:
    - люблю
    - любиш
    - любить
- type: match-up
  instruction: З'єднайте підмет із правильною формою дієслова в минулому часі
  pairs:
  - left: Сонце
    right: зійшло
  - left: Хлопець
    right: прийшов
  - left: Дівчина
    right: прийшла
  - left: Студенти
    right: склали
  - left: Дідусь
    right: міг
  - left: Сестра
    right: малювала
- type: true-false
  instruction: Оберіть, чи правдиве це твердження про граматику
  items:
  - statement: Дієслова доконаного виду мають форми теперішнього часу.
    correct: false
    explanation: Доконаний вид позначає результат. Дія не може бути завершеною прямо
      зараз, тому вона існує лише в минулому або майбутньому часі.
  - statement: У минулому часі дієслова змінюються за родами (в однині) та числами.
    correct: true
    explanation: У минулому часі ми звертаємо увагу на рід (він читав, вона читала)
      та число (вони читали).
  - statement: Дієслова першої дієвідміни завжди мають закінчення -ать або -ять у
      формі «вони».
    correct: false
    explanation: Дієслова першої дієвідміни мають закінчення -уть або -ють (пишуть,
      читають). Закінчення -ать/-ять — це ознака другої дієвідміни (роблять, стоять).
  - statement: Дієслова на -шся (наприклад, усміхаєшся) пишуться без м'якого знака.
    correct: true
    explanation: Форма для другої особи «ти» (що робиш?) завжди пишеться твердо, без
      м'якого знака.
  - statement: Тло (фон) у розповіді зазвичай описується дієсловами недоконаного виду.
    correct: true
    explanation: 'Недоконаний вид передає тривалий процес, який створює атмосферу
      або тло для раптових дій (наприклад: сонце світило, пташки співали).'
  - statement: Після слів «три години» або «цілий день» можна використовувати доконаний
      вид.
    correct: false
    explanation: Ці слова вказують на тривалість процесу, тому обов'язково вимагають
      дієслів недоконаного виду.
- type: order
  instruction: Розставте події в правильній послідовності, щоб утворилася розповідь
  items:
  - Спочатку я прокинувся о сьомій годині ранку.
  - Потім я швидко пішов у ванну і вмився.
  - Після цього я приготував смачний сніданок.
  - Я спокійно снідав і дивився новини.
  - Раптом мені зателефонував колега з роботи.
  - Я відразу взяв речі і побіг в офіс.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
- type: anagram
  instruction: Складіть інфінітиви дієслів із поданих літер
  items:
  - letters:
    - п
    - и
    - с
    - а
    - т
    - и
    answer: писати
    hint: I дієвідміна, створювати текст
  - letters:
    - р
    - о
    - б
    - и
    - т
    - и
    answer: робити
    hint: II дієвідміна, виконувати дію
  - letters:
    - ч
    - и
    - т
    - а
    - т
    - и
    answer: читати
    hint: I дієвідміна, сприймати текст
  - letters:
    - с
    - п
    - а
    - т
    - и
    answer: спати
    hint: II дієвідміна, відпочивати вночі
  - letters:
    - з
    - н
    - а
    - й
    - т
    - и
    answer: знайти
    hint: Доконаний вид від слова «шукати»
  - letters:
    - с
    - к
    - а
    - з
    - а
    - т
    - и
    answer: сказати
    hint: Доконаний вид від слова «говорити»
- type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I was reading a book for three hours.
    options:
    - text: Я читав книгу три години.
      correct: true
    - text: Я прочитав книгу три години.
      correct: false
    - text: Я був читав книгу три години.
      correct: false
  - source: He suddenly shouted.
    options:
    - text: Він раптом закричав.
      correct: true
    - text: Він раптом кричав.
      correct: false
    - text: Він раптом кричить.
      correct: false
  - source: They study at the university.
    options:
    - text: Вони вчаться в університеті.
      correct: true
    - text: Вони вчаться в університет.
      correct: false
    - text: Вони вчать в університеті.
      correct: false
  - source: You (singular) always smile.
    options:
    - text: Ти завжди усміхаєшся.
      correct: true
    - text: Ти завжди усміхається.
      correct: false
    - text: Ти завжди усміхаєся.
      correct: false
  - source: She wrote a letter and sent it.
    options:
    - text: Вона написала лист і відправила його.
      correct: true
    - text: Вона писала лист і відправляла його.
      correct: false
    - text: Вона пише лист і відправляє його.
      correct: false
  - source: We meet every day.
    options:
    - text: Ми зустрічаємося щодня.
      correct: true
    - text: Ми зустрічають щодня.
      correct: false
    - text: Ми зустрічаєтеся щодня.
      correct: false
