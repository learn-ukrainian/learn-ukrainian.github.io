    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 0
  - question: написав
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 2
  - question: сиділа
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 1
  - question: вирішили
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 2
  - question: працюють
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 0
  - question: знайде
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 3
  - question: зробив
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 2
  - question: читаємо
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 0
  - question: гуляли
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 1
  - question: приїхала
    options:
    - Теперішній час, недоконаний вид
    - Минулий час, недоконаний вид
    - Минулий час, доконаний вид
    - Майбутній час, доконаний вид
    correct: 2
  title: Визначте час і вид поданого дієслова.
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте видові пари (недоконаний вид ↔ доконаний вид).
  pairs:
  - left: робити
    right: зробити
  - left: писати
    right: написати
  - left: вирішувати
    right: вирішити
  - left: брати
    right: взяти
  - left: говорити
    right: сказати
  - left: показувати
    right: показати
  - left: читати
    right: прочитати
  - left: знаходити
    right: знайти
  title: З'єднайте видові пари (недоконаний вид ↔ доконаний вид).
workbook:
- type: fill-in
  instruction: Вставте правильну форму дієслова за особою та числом.
  items:
  - sentence: Я _____ дуже цікаву книжку.
    answer: читаю
  - sentence: Ти _____, де знаходиться бібліотека?
    answer: знаєш
  - sentence: Ми _____ домашнє завдання разом.
    answer: робимо
  - sentence: Ви часто _____ українською?
    answer: говорите
  - sentence: Вони _____ поїхати до Львова.
    answer: хочуть
  - sentence: Я не _____ тобі зараз допомогти.
    answer: можу
  - sentence: Вона дуже багато _____.
    answer: працює
  - sentence: Чому він завжди _____ тут?
    answer: стоїть
  title: Вставте правильну форму дієслова за особою та числом.
- type: match-up
  instruction: З'єднайте особові займенники з відповідними формами дієслова «писати».
  pairs:
  - left: Я
    right: пишу
  - left: Ти
    right: пишеш
  - left: Він
    right: пише
  - left: Ми
    right: пишемо
  - left: Ви
    right: пишете
  - left: Вони
    right: пишуть
  title: З'єднайте особові займенники з відповідними формами дієслова «писати».
- type: group-sort
  instruction: Розподіліть дієслова за видами.
  groups:
  - label: Доконаний вид (Perfective)
    items:
    - прочитати
    - зробити
    - написати
    - сказати
    - взяти
    - вирішити
  - label: Недоконаний вид (Imperfective)
    items:
    - читати
    - робити
    - писати
    - говорити
    - брати
    - вирішувати
  title: Розподіліть дієслова за видами.
- type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні минулого часу.
  items:
  - sentence: Моя сестра сказав мені цю новину.
    error: сказав
    correction: сказала
    error_type: word
    options:
    - сказав
    - сказала
    - сказали
    - скаже
    explanation: Дієслово в минулому часі має узгоджуватися з підметом жіночого роду
      (сестра).
  - sentence: Минулого тижня ми їздив до Львова.
    error: їздив
    correction: їздили
    error_type: word
    options:
    - їздив
    - їздила
    - їздили
    - їздитимемо
    explanation: Оскільки підмет «ми» (множина), дієслово теж має бути у формі множини.
  - sentence: Вона довго не міг знайти правильну відповідь.
    error: міг
    correction: могла
    error_type: word
    options:
    - міг
    - могла
    - могло
    - могли
    explanation: Підмет «вона» вимагає жіночого роду для дієслова (могла).
  - sentence: Вчора мої друзі прийшов до мене в гості.
    error: прийшов
    correction: прийшли
    error_type: word
    options:
    - прийшов
    - прийшла
    - прийшли
    - прийде
    explanation: Слово «друзі» стоїть у множині, тому дієслово теж має закінчуватися
      на «-ли».
  - sentence: Олексію, де ти була вчора ввечері?
    error: була
    correction: був
    error_type: word
    options:
    - був
    - була
    - було
    - були
    explanation: Звертання до чоловіка («Олексію») вимагає дієслова чоловічого роду.
  - sentence: Це нове правило працював дуже добре.
    error: працював
    correction: працювало
    error_type: word
    options:
    - працював
    - працювала
    - працювало
    - працювали
    explanation: Слово «правило» — середнього роду, тому потрібно закінчення «-о».
  title: Знайдіть і виправте помилку в узгодженні минулого часу.
- type: fill-in
  instruction: Оберіть правильну форму зворотного дієслова.
  items:
  - sentence: Ти завжди радісно _____, коли бачиш мене.
    answer: усміхаєшся
    options:
    - усміхаєшся
    - усміхається
  - sentence: Він уважно _____ новий український фільм.
    answer: дивиться
    options:
    - дивиться
    - дивишся
  - sentence: Вони так голосно _____, що всі їх чують.
    answer: сміються
    options:
    - сміються
    - смієтеся
  - sentence: Мені чомусь зовсім не _____ цієї ночі.
    answer: спиться
    options:
    - спиться
    - спить
  - sentence: Ми часто _____ в цьому затишному кафе.
    answer: зустрічаємося
    options:
    - зустрічаємося
    - зустрічаються
  - sentence: Як ти _____ сьогодні після іспиту?
    answer: почуваєшся
    options:
    - почуваєшся
    - почувається
  title: Оберіть правильну форму зворотного дієслова.
- type: essay-response
  prompt: Напишіть короткий текст (5-7 речень) про ваш вчорашній день. Спробуйте чергувати
    дієслова доконаного і недоконаного виду, щоб показати як загальний фон (що робили),
    так і конкретні результати (що зробили).
  min_words: 50
  model_answer: Вчора вранці надворі яскраво світило сонце, співали пташки, і я повільно
    пив свою ранкову каву на кухні. Потім я швидко зібрав речі, вийшов з дому і поїхав
    на роботу. Майже весь день я працював над новим і дуже цікавим проєктом для нашої
    компанії. Раптом мені зателефонував давній друг і запросив мене на спільний обід
    у затишне кафе. Поки ми смачно обідали, ми довго розмовляли про наші спільні плани
    на майбутні вихідні. Увечері я нарешті закінчив писати важливу статтю і відразу
    відправив її своєму редактору. Це був справді дуже продуктивний і приємний день.
