- type: quiz
  title: Теорія та прагматика демінутивів
  items:
  - question: Яка основна мета використання демінутивів у сучасній українській комунікації?
    options:
    - text: Встановлення емоційного контакту та демонстрація прихильності
      correct: true
    - text: Виключно вказівка на малий фізичний розмір предмета
      correct: false
    - text: Створення максимально офіційної атмосфери в бізнесі
      correct: false
    - text: Демонстрація високого рівня освіти мовця
      correct: false
    explanation: Демінутиви в українській мові слугують передусім для вираження емоцій
      та встановлення контакту.
  - question: Що означає філософський термін кордоцентризм в українській культурі?
    options:
    - text: Підхід, який визнає серце головним джерелом емоцій та сутності
      correct: true
    - text: Наука про лікування серцевих захворювань та їх профілактику
      correct: false
    - text: Стиль архітектури українських церков вісімнадцятого століття
      correct: false
    - text: Правило утворення нових слів від дієслів та прислівників
      correct: false
    explanation: Кордоцентризм — це філософія серця, яка пояснює емоційну глибину
      української мови та використання пестливих форм.
  - question: У якому соціальному регістрі ви найчастіше почуєте слова кавуся та десертик?
    options:
    - text: У сфері сучасного міського обслуговування та гостинності
      correct: true
    - text: На офіційних дипломатичних переговорах між країнами
      correct: false
    - text: У залі суду під час серйозного судового засідання
      correct: false
    - text: В академічній лекції з історії України
      correct: false
    explanation: Ці слова є типовими для сучасної міської кавової культури та загальної
      сфери гостинності.
  - question: Що таке десемантизація демінутива в сучасній українській мові?
    options:
    - text: Повна втрата первинного емоційного або пестливого значення суфікса
      correct: true
    - text: Процес утворення абсолютно нового слова від базового дієслова
      correct: false
    - text: Використання слова з метою дуже сильно образити людину
      correct: false
    - text: Додавання одразу кількох суфіксів до одного короткого кореня
      correct: false
    explanation: Десемантизація означає, що слово стає повністю нейтральним, як слово
      ручка для письма.
  - question: Коли використання демінутивів може бути небезпечним для вашої репутації?
    options:
    - text: Під час серйозних ділових переговорів або офіційних зустрічей
      correct: true
    - text: У розмові з маленькою дитиною або коханою людиною
      correct: false
    - text: Під час затишної родинної вечері зі своїми батьками
      correct: false
    - text: У неформальному спілкуванні з дуже близьким другом
      correct: false
    explanation: В офіційно-діловому стилі демінутиви звучать вкрай непрофесійно та
      інфантильно.
  - question: Як саме інтонація може змінити значення слова розумничок серед дорослих?
    options:
    - text: Холодна інтонація миттєво перетворює його на гострий сарказм
      correct: true
    - text: Вона робить це слово ще більш пестливим і дуже ніжним
      correct: false
    - text: Інтонація перетворює його на серйозний медичний термін
      correct: false
    - text: Вона робить слово абсолютно нейтральним у будь-якій ситуації
      correct: false
    explanation: Демінутиви дуже часто використовуються для вираження іронії та сарказму,
      якщо ситуація негативна.
  - question: Чому професійна медсестра каже дорослому пацієнту слово укольчик замість
      укол?
    options:
    - text: Щоб ефективно зменшити психологічний страх та заспокоїти пацієнта
      correct: true
    - text: Бо в сучасній лікарні використовують тільки дуже маленькі голки
      correct: false
    - text: Тому що вона просто не знає правильного офіційного медичного терміна
      correct: false
    - text: Щоб відверто показати свою велику зневагу до хворого пацієнта
      correct: false
    explanation: Медичний регістр свідомо використовує зменшувальні форми для швидкого
      психологічного заспокоєння.
  - question: Що таке тавтологія при використанні демінутивів у щоденній розмові?
    options:
    - text: Логічне дублювання значення малого розміру, наприклад, маленький килимок
      correct: true
    - text: Одночасне використання двох різних демінутивів в одному короткому реченні
      correct: false
    - text: Свідома неправильна вимова пестливого суфікса під час швидкого мовлення
      correct: false
    - text: Регулярне використання пестливих слів у суворому діловому спілкуванні
      correct: false
    explanation: Слово килимок вже самостійно означає малий розмір, тому додавати
      прикметник маленький є тавтологією.
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: Утворення та вживання демінутивів
  items:
  - sentence: Мамо, я дуже сильно хочу ________, давай підемо в ліжко.
    answer: спатоньки
    options:
    - спатоньки
    - спати
    - сон
    - поспати
    explanation: Дієслівний демінутив спатоньки ідеально підходить для теплого дитячого
      мовлення.
  - sentence: Ось ваша смачна і дуже гаряча ________ на мигдалевому молоці.
    answer: кавуся
    options:
    - кавуся
    - кава
    - напій
    - кавочка
    explanation: У сучасних міських кав"ярнях найчастіше використовують дуже гостинне
      слово кавуся.
  - sentence: Лікар попросив мене показати ________, щоб уважно послухати легені.
    answer: спинку
    options:
    - спинку
    - спину
    - хребет
    - тіло
    explanation: У медичному регістрі активно використовують демінутив спинка для
      заспокоєння дорослих пацієнтів.
  - sentence: Я вчора випадково купила новий ________ для нашої ванної кімнати.
    answer: килимок
    options:
    - килимок
    - килим
    - маленький килимок
    - малий килим
    explanation: Слово килимок самостійно передає малий розмір, тому уникайте типової
      тавтології маленький килимок.
  - sentence: Моя найрідніша ________, щиро вітаю тебе з днем народження!
    answer: матуся
    options:
    - матуся
    - мати
    - жінка
    - мамо
    explanation: Матуся — це дуже ніжне та емоційно тепле звертання до рідної матері.
  - sentence: Зроби це ________, будь ласка, бо в мене скоро дуже важлива зустріч.
    answer: швиденько
    options:
    - швиденько
    - швидко
    - скоро
    - поспіхом
    explanation: Прислівниковий демінутив швиденько звучить як приємне, дружнє прохання
      без жодної агресії.
  - sentence: Ну ти й справжній ________! Як ми тепер швидко виправимо цю серйозну
      помилку?
    answer: розумничок
    options:
    - розумничок
    - дурень
    - чоловік
    - молодець
    explanation: Слово розумничок у цьому негативному робочому контексті використовується
      як гострий сарказм.
  - sentence: Ця кулькова ________ дуже погано пише сьогодні, дайте мені, будь ласка,
      іншу.
    answer: ручка
    options:
    - ручка
    - рука
    - рученька
    - писалка
    explanation: Тут слово ручка є абсолютно десемантизованим і означає просто звичайний
      предмет для швидкого письма.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Побудуйте речення
  items:
  - words:
    - Ось
    - ваша
    - дуже
    - гаряча
    - кавуся
    answer: Ось ваша дуже гаряча кавуся
  - words:
    - Моя
    - люба
    - матуся
    - зараз
    - спить
    answer: Моя люба матуся зараз спить
  - words:
    - Зроби
    - це
    - дуже
    - швиденько
    answer: Зроби це дуже швиденько
  - words:
    - Лікар
    - акуратно
    - робить
    - маленький
    - укольчик
    answer: Лікар акуратно робить маленький укольчик
  - words:
    - Це
    - дуже
    - гарненько
    - було
    - написано
    answer: Це дуже гарненько було написано
  - words:
    - Маленькій
    - дитині
    - вже
    - час
    - спатоньки
    answer: Маленькій дитині вже час спатоньки
  - words:
    - Ну
    - ти
    - й
    - справжній
    - розумничок
    answer: Ну ти й справжній розумничок
  instruction: Розташуйте слова у правильному порядку.
- type: true-false
  title: Правда чи хибність
  items:
  - statement: Слово документики є цілком доречним на дуже серйозних ділових переговорах.
    correct: false
    explanation: Демінутиви категорично заборонені в офіційно-діловому стилі, оскільки
      вони руйнують репутацію.
  - statement: Слово ручка у значенні звичайного предмета для письма повністю втратило
      своє пестливе значення.
    correct: true
    explanation: Це класичний приклад процесу десемантизації, коли форма повністю
      втрачає свою первинну емоцію.
  - statement: Слово швиденько об"єктивно звучить значно менш агресивно і більш дружньо,
      ніж слово швидко.
    correct: true
    explanation: Демінутиви прислівників ефективно знімають зайву соціальну напругу
      та дуже м"яко пом"якшують прохання.
  - statement: Медичні працівники використовують зменшувальні слова виключно для того,
      щоб сильно образити дорослих пацієнтів.
    correct: false
    explanation: Спеціальний медичний регістр потрібен лише для того, щоб швидко зняти
      сильний стрес і заспокоїти людину.
  - statement: Сарказм у сучасній українській мові дуже часто будується саме за допомогою
      найніжніших пестливих слів.
    correct: true
    explanation: Гострий контраст між дуже позитивним словом і абсолютно негативною
      ситуацією створює потужну іронію.
  - statement: Слово килимок обов"язково необхідно завжди вживати разом із прикметником
      маленький.
    correct: false
    explanation: Це типова граматична тавтологія, бо суфікс -ок уже чітко вказує на
      малий розмір об"єкта.
  - statement: В українській граматиці абсолютно не існує жодних демінутивів для дієслів.
    correct: false
    explanation: 'Існують, наприклад: спатоньки, їстоньки. Вони є абсолютно унікальними
      для нашої мови.'
  - statement: Термін кордоцентризм безпосередньо означає зосередженість української
      традиційної культури на емоціях та серці.
    correct: true
    explanation: Ця глибока філософія чудово пояснює величезну кількість пестливих
      форм у нашій щоденній лексиці.
  instruction: Визначте, чи твердження правильне.
- type: error-correction
  title: Знайдіть та виправте помилку
  items:
  - sentence: Вчора ми купили в коридор маленький килимок.
    error: маленький килимок
    answer: гарний килимок
    error_type: phrase
    options:
    - гарний килимок
    - малий килимочок
    - величезний килимок
    - килимок маленький
    explanation: Використання прикметника малий з демінутивом килимок створює дуже
      неприємну тавтологію.
  - sentence: Шановний пане директоре, я вже підготував договірчик для вас.
    error: договірчик
    answer: договір
    error_type: register
    options:
    - договір
    - документик
    - папірець
    - контрактик
    explanation: У суворому діловому спілкуванні використання демінутивів є дуже грубим
      порушенням соціального регістру.
  - sentence: Директор попросив мене швиденько підписати цей важливий документик.
    error: документик
    answer: документ
    error_type: register
    options:
    - документ
    - папірчик
    - текстик
    - договірчик
    explanation: В офіційному робочому стилі треба завжди категорично уникати демінутивів.
  - sentence: Учора в нашого старого дерев"яного стола зламалася нога.
    error: нога
    answer: ніжка
    error_type: word
    options:
    - ніжка
    - ноженька
    - ножище
    - ручка
    explanation: Для опису частин меблів ми використовуємо виключно десемантизований
      демінутив ніжка.
  - sentence: Я обережно дивлюся в маленьке око на наших дверях.
    error: око
    answer: вічко
    error_type: word
    options:
    - вічко
    - очечко
    - вікно
    - оченятко
    explanation: Спеціальний малий отвір у вхідних дверях називається виключно десемантизованим
      словом вічко.
  - sentence: Маленькі діти, вам уже давно пора кушатоньки.
    error: кушатоньки
    answer: їстоньки
    error_type: word
    options:
    - їстоньки
    - їсти
    - поїсти
    - снідати
    explanation: Слово кушати — це грубий русизм. Справжня пестлива українська форма
      — це дієслово їстоньки.
  instruction: Знайдіть і виправте помилку в реченні.
- type: match-up
  title: Знайдіть відповідність між формою та її значенням
  pairs:
  - left: документики
    right: Грубе порушення суворого офіційного ділового стилю
  - left: кавуся
    right: Яскрава демонстрація міської гостинності та сучасного сервісу
  - left: ніжка
    right: Десемантизована форма, яка нейтрально позначає частину меблів
  - left: укольчик
    right: Ефективне використання медичного регістру для заспокоєння пацієнта
  - left: розумничок
    right: Слово, яке дуже часто використовується як гострий сарказм
  - left: їстоньки
    right: Унікальний український дієслівний демінутив для розмови з маленькими дітьми
  - left: маленький килимок
    right: Типова граматична тавтологія, якої обов"язково слід уникати
  - left: швиденько
    right: Прислівник, що приємно пом"якшує суворий наказ і робить його теплим проханням
  instruction: З'єднайте відповідні елементи.
- type: mark-the-words
  title: Знайдіть усі демінутиви
  instruction: Знайдіть і позначте всі зменшувально-пестливі слова (демінутиви) в
    цьому короткому тексті.
  text: Ясне сонечко світило зранку. Моя матуся смачно готує. Ми тихенько пили кавусю
    на кухні. На столі лежав свіжий хлібчик а поруч спав наш рудий котик без турбот.
  answers:
  - сонечко
  - матуся
  - тихенько
  - кавусю
  - хлібчик
  - котик
- type: group-sort
  title: Сортування демінутивів
  groups:
  - name: Щира емоція та пестливість
    items:
    - матуся
    - сонечко
    - спатоньки
    - їстоньки
    - швиденько
  - name: Десемантизація (повністю нейтральне значення)
    items:
    - вічко
    - ніжка
    - ручка
    - годинник
  instruction: Розподіліть елементи за групами.
- type: fill-in
  title: Оберіть правильний соціальний регістр
  items:
  - sentence: Доброго вам дня! Вам зараз приготувати вашу улюблену смачну ________?
    answer: кавусю
    options:
    - кавусю
    - каву
    - напій
    - кавочку
    explanation: У сучасній міській кав"ярні привітний бариста найімовірніше використає
      саме це гостинне слово.
  - sentence: Шановний пане директоре, я залишив новий фінансовий ________ на вашому
      великому столі.
    answer: звіт
    options:
    - звіт
    - звітик
    - папірець
    - документик
    explanation: В абсолютно офіційному діловому спілкуванні будь-які демінутиви категорично
      неприпустимі.
  - sentence: Моя найдорожча кохана, ти справді моє найяснішe ________ у цьому світі!
    answer: сонечко
    options:
    - сонечко
    - сонце
    - світло
    - зірка
    explanation: Слово сонечко — це найпопулярніше та найтепліше звертання до найближчої
      коханої людини.
  - sentence: Рідна сестричко, давай ________ приберемо в цій кімнаті, поки наша мама
      не прийшла.
    answer: швиденько
    options:
    - швиденько
    - швидко
    - раптово
    - скоро
    explanation: Прислівник швиденько чудово пом"якшує невелике прохання між дуже
      близькими родичами.
