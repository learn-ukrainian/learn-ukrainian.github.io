- type: quiz
  title: "Перевірте знання: Здоров'я та культура"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке дієслово використовується для опису вашого загального внутрішнього стану?"
      explanation: "Дієслово почуватися використовується разом із прислівниками для опису загального стану організму."
      options:
        - text: "почуватися"
          correct: true
        - text: "відчувати"
          correct: false
        - text: "хворіти"
          correct: false
        - text: "боліти"
          correct: false
    - question: "Як правильно сказати українською про факт конкретної інфекційної хвороби?"
      explanation: "Єдина нормативна конструкція — хворіти на плюс знахідний відмінок."
      options:
        - text: "хворіти на ангіну"
          correct: true
        - text: "хворіти ангіною"
          correct: false
        - text: "хворіти від ангіни"
          correct: false
        - text: "мати ангіну"
          correct: false
    - question: "Яка форма дієслова боліти є правильною, якщо у вас проблема з очима?"
      explanation: "Слово очі — це множина, тому дієслово має узгоджуватися і мати форму болять."
      options:
        - text: "у мене болять очі"
          correct: true
        - text: "у мене болить очі"
          correct: false
        - text: "мої очі болить"
          correct: false
        - text: "я болю очі"
          correct: false
    - question: "Що українці традиційно п'ють для швидкого зниження високої температури при застуді?"
      explanation: "Калина містить надзвичайно багато вітаміну С і традиційно використовується при осінній застуді."
      options:
        - text: "чай з калиною"
          correct: true
        - text: "каву з молоком"
          correct: false
        - text: "холодну воду"
          correct: false
        - text: "зелений чай"
          correct: false
    - question: "Що таке протяг, якого так масово бояться українці в громадському транспорті?"
      explanation: "Протяг — це холодний потік свіжого повітря між відкритими вікнами чи дверима."
      options:
        - text: "потік холодного повітря"
          correct: true
        - text: "висока температура"
          correct: false
        - text: "погана екологія міста"
          correct: false
        - text: "вірусна інфекція"
          correct: false
    - question: "Для чого українці найчастіше використовують цілющий відвар ромашки?"
      explanation: "Ромашка має антисептичні властивості, її міцним відваром часто полощуть горло."
      options:
        - text: "для полоскання горла"
          correct: true
        - text: "для покращення зору"
          correct: false
        - text: "від сильного болю в ногах"
          correct: false
        - text: "для підвищення тиску"
          correct: false
    - question: "Яку фразу ми завжди ввічливо кажемо, коли хтось поруч раптом чхає?"
      explanation: "Традиційно ми щиро бажаємо здоров'я людині, яка чхає, кажучи Будьте здорові."
      options:
        - text: "Будьте здорові!"
          correct: true
        - text: "На здоров'я!"
          correct: false
        - text: "Швидкого одужання!"
          correct: false
        - text: "Смачного!"
          correct: false
    - question: "Яке слово означає дуже тривалий та глобальний медичний стан всього організму?"
