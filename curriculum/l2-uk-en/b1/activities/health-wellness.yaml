- type: unjumble
  title: "Складіть правильні речення"
  instruction: "Відновіть правильний порядок слів у реченнях про здоров'я."
  items:
    - words: ["у", "мене", "дуже", "сильно", "болить", "горло"]
      answer: "У мене дуже сильно болить горло"
    - words: ["я", "побажав", "своєму", "колезі", "швидкого", "одужання"]
      answer: "Я побажав своєму колезі швидкого одужання"
    - words: ["восени", "багато", "людей", "хворіють", "на", "застуду"]
      answer: "Восени багато людей хворіють на застуду"
    - words: ["треба", "зайти", "в", "аптеку", "щоб", "купити", "ліки"]
      answer: "Треба зайти в аптеку щоб купити ліки"
    - words: ["в", "народній", "медицині", "часто", "використовують", "калину"]
      answer: "В народній медицині часто використовують калину"
    - words: ["лікар", "порадив", "мені", "здати", "аналізи", "вранці"]
      answer: "Лікар порадив мені здати аналізи вранці"

