version: '1.0'
module: society-and-media
level: b1
inline:
- id: reading-media-definition
  type: reading
  instruction: Прочитайте текст про те, що таке медіа, і дайте відповіді на запитання.
  passage: Медіа, або засоби масової інформації (ЗМІ), — це спеціальні засоби передавання,
    зберігання та відтворення інформації для великої кількості людей. До найвідоміших
    традиційних форматів сьогодні належать радіо, телебачення, класичне кіно, а також
    газети й журнали. Водночас електронні медіа охоплюють сучасні вебсайти та популярні
    соціальні мережі. Усі вони не лише оперативно інформують суспільство про важливі
    події, а й активно формують наше світобачення. Мова, якою говорять ЗМІ, — це публіцистичний
    стиль, що має на меті впливати на громадян.
  questions:
  - Що означає абревіатура ЗМІ?
  - Які формати належать до традиційних візуальних та аудіо медіа?
  - Яку головну мету має публіцистичний стиль мовлення?
- id: fill-in-media-grammar
  type: fill-in
  instruction: Вставте правильну граматичну форму (дієприкметник або дієприслівник)
    у реченнях на тему «Що таке медіа?».
  items:
  - sentence: Складний проєкт успішно ____.
    answer: реалізовано
    options:
    - реалізовано
    - реалізувати
    - реалізуючи
  - sentence: Новий закон вчора ____ парламентом.
    answer: прийнято
    options:
    - прийнято
    - прийнятий
    - приймаючи
  - sentence: Сучасний культурний центр ____ для нашої молоді.
    answer: відкрито
    options:
    - відкрито
    - відкритий
    - відкриваючи
  - sentence: ____ свій вечірній репортаж, журналіст помітив дуже важливу деталь.
    answer: Готуючи
    options:
    - Готуючи
    - Готовий
    - Готувати
  - sentence: ____ наше суспільство, ЗМІ щодня виконують свою головну місію.
    answer: Інформуючи
    options:
    - Інформуючи
    - Інформований
    - Інформувати
  - sentence: Ця скандальна новина вже масово ____ в усіх соціальних мережах.
    answer: поширена
    options:
    - поширена
    - поширено
    - поширюючи
- id: quiz-media-lexica
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Що таке
    медіа?».'
  items:
  - question: Яке слово або фраза означає «засоби передавання інформації для великої
      кількості людей»?
    options:
    - засоби масової інформації
    - соціальні мережі
    - публіцистичний стиль
    - громадська думка
    correct: 0
  - question: Який стиль мовлення традиційно використовують журналісти у своїх статтях?
    options:
    - публіцистичний
    - художній
    - науковий
    - офіційно-діловий
    correct: 0
  - question: Як називається коротка і дуже влучна фраза, яка починає новину?
    options:
    - заголовок
    - джерело
    - факт
    - подія
    correct: 0
  - question: Який термін означає «особиста оцінка конкретної події людиною»?
    options:
    - думка
    - факт
    - заява
    - повідомлення
    correct: 0
  - question: Що таке «факт» у професійній журналістиці?
    options:
    - об'єктивна і точна інформація
    - особисте ставлення автора
    - емоційний коментар
    - вставне слово
    correct: 0
  - question: Як називається перший абзац новини, який коротко відповідає на всі головні
      питання?
    options:
    - лід
    - допис
    - квота
    - фейк
    correct: 0
- id: essay-response-5
  type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Читання новин».
  prompt: 'Складіть 5 речень про те, як ви щодня читаєте українські новини. Обов''язково
    використайте слова: заголовок, факт, думка, джерело, подія.'
  min_words: 50
  model_answer: '[!model-answer] Я завжди починаю читати новини з яскравого заголовка,
    який одразу привертає мою увагу. Для мене дуже важливо знайти надійне джерело
    інформації, якому я можу повністю довіряти. Коли я читаю статтю про важливу подію
    в Україні, я намагаюся завжди відрізняти об''єктивний факт від емоцій. Іноді місцеві
    журналісти додають свою особисту думку, що далеко не завжди корисно. Загалом,
    розвинуте критичне читання допомагає мені набагато краще розуміти сучасні щоденні
    новини.

    '
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилки у реченнях на тему читання новин.
  items:
  - sentence: Згідно даним журналістів, цей новий закон уже прийнято.
    error: Згідно даним
    correction: Згідно з даними
    error_type: construction
    options:
    - Згідно з даними
    - Згідно даним
    - Згідно від даних
    - З даними
    explanation: Правильна конструкція в українській мові — «згідно з даними» (використовуємо
      прийменник «з» та орудний відмінок).
  - sentence: По словам експертів, політична ситуація в країні швидко змінюється.
    error: По словам
    correction: За словами
    error_type: construction
    options:
    - За словами
    - По словам
    - По словах
    - За словах
    explanation: Українською мовою правильно говорити та писати «за словами експертів».
  - sentence: Я хочу сказати по моїй думці про цю останню новину.
    error: по моїй думці
    correction: на мою думку
    error_type: construction
    options:
    - на мою думку
    - по моїй думці
    - за моєю думкою
    - на моїй думці
    explanation: Правильний український сталий вираз — «на мою думку».
  - sentence: Цей молодий хлопець являється кореспондентом відомої газети.
    error: являється
    correction: є
    error_type: word
    options:
    - є
    - являється
    - стає
    - буває
    explanation: Слово «являється» є типовим русизмом у такому значенні. Правильно
      використовувати дієслово «є».
  - sentence: Цей об'єктивний факт відіграє велике значення для нашого суспільства.
    error: значення
    correction: роль
    error_type: phrase
    options:
    - роль
    - значення
    - позицію
    - функцію
    explanation: В українській мові правильно казати «відігравати роль» або «мати
      значення». Не можна змішувати ці дві фрази.
  - sentence: Журналіст підняв дуже важливе питання у своїй аналітичній статті.
    error: підняв
    correction: порушив
    error_type: word
    options:
    - порушив
    - підняв
    - зробив
    - відкрив
    explanation: Питання (чи соціальну проблему) в українській мові «порушують», а
      не «піднімають».
- id: match-up
  type: match-up
  instruction: З'єднайте терміни з розділу «Читання новин» з їхніми правильними визначеннями.
  pairs:
  - left: Заголовок
    right: Коротка і влучна фраза, яка миттєво привертає увагу читача.
  - left: Лід
    right: Перший абзац новини, що відповідає на п'ять базових питань журналістики.
  - left: Джерело
    right: Місце або конкретна людина, від якої кореспондент отримує інформацію.
  - left: Факт
    right: Об'єктивна і точна інформація, яку будь-хто завжди може перевірити.
  - left: Думка
    right: Особиста, цілком суб'єктивна емоційна оцінка конкретної людини.
  - left: Подія
    right: Важлива чи дуже цікава ситуація в сучасному інформаційному просторі.
- id: short-answer-3
  type: essay-response
  instruction: Дайте короткі відповіді на 3 запитання щодо того, як самостійно аналізувати
    сумнівні медіатексти.
  prompt: 'Відповідаючи на запитання, поясніть: 1) Хто може бути справжнім автором
    маніпулятивного тексту? 2) Яка реальна мета яскравого клікбейту? 3) Чому варто
    завжди уникати текстів із занадто сильними емоційними словами?'
  min_words: 50
  model_answer: '[!model-answer] Справжнім автором маніпулятивного тексту часто є
    анонімна людина або невідомий канал, якщо це відвертий фейк, тоді як надійні традиційні
    ЗМІ завжди вказують реальні імена своїх кореспондентів. Реальна мета клікбейту
    — викликати сильну емоцію і змусити довірливу людину натиснути на посилання, а
    не проінформувати її. Занадто емоційних слів варто уникати, тому що вони є ефективним
    інструментом психологічного впливу та хитрого маніпулювання нашою громадською
    думкою.

    '
- id: reading
  type: reading
  instruction: Прочитайте текст про українську самоорганізацію і дайте відповіді на
    запитання.
  passage: Минулого тижня наша місцева громада успішно організувала великий соціальний
    проєкт. У центрі нашого міста є старий занедбаний парк без належного догляду.
    Місцеві активісти спільно вирішили, що їм зовсім не потрібен галасливий мітинг
    або політичний протест, щоб щось змінити. Вони просто опублікували оголошення
    в інтернеті, і вже в суботу сотні жителів прийшли прибирати територію. Це була
    справжня щира благодійність — люди безкоштовно віддали свій час та принесли інструменти.
    Цей реальний приклад чудово демонструє, що ініціативні громадяни здатні самостійно
    створювати комфортне середовище.
  questions:
  - Що успішно організувала місцева громада минулого тижня?
  - Де саме відбувалося добровільне прибирання території?
  - Що переконливо продемонстрував цей масштабний волонтерський проєкт?
- id: essay-response
  type: essay-response
  instruction: Уявіть, що ви — місцевий кореспондент. Напишіть коротку власну новину.
  prompt: 'Напишіть новину про важливу подію у вашій громаді (близько 60 слів). Ваша
    новина обов''язково повинна мати: заголовок, лід (хто, що зробив, де і коли) та
    кілька фактів. Використайте абревіатуру ЗМІ.'
  min_words: 50
  model_answer: '[!model-answer] Новий парк у центрі міста: чудова ініціатива місцевої
    молоді

    Сьогодні рано вранці студенти нашого університету успішно завершили масштабне
    прибирання старого парку в центрі міста. За словами головних організаторів, до
    цієї акції добровільно долучилося понад сто осіб. Ця подія одразу викликала великий
    інтерес, і місцеві ЗМІ повідомили про її результати. Тепер громада планує регулярно
    проводити такі благодійні заходи.

    '
- id: fill-in
  type: fill-in
  instruction: Вставте правильні вставні слова, щоб зробити ваш аналітичний коментар
    більш природним.
  items:
  - sentence: ____, цей об'єктивний факт має надзвичайно велике значення для нашої
      місцевої громади.
    answer: Без сумніву
    options:
    - Без сумніву
    - На мою
    - Згідно з
  - sentence: ____ експертів, ця масштабна урядова реформа буде дуже успішною.
    answer: На думку
    options:
    - На думку
    - Як відомо
    - Мабуть
  - sentence: ____, класичне телебачення досі залишається популярним ЗМІ серед старшого
      покоління.
    answer: Як відомо
    options:
    - Як відомо
    - На мою думку
    - За словами
  - sentence: Автор цієї сумнівної статті, ____, намагається маніпулювати нашими емоціями.
    answer: мабуть
    options:
    - мабуть
    - згідно
    - як відомо
  - sentence: ____ міністра, новий закон суттєво покращить життя усіх громадян.
    answer: За словами
    options:
    - За словами
    - На думку
    - Без сумніву
  - sentence: Це політичне рішення, ____, є найкращим логічним виходом із ситуації.
    answer: імовірно
    options:
    - імовірно
    - по словам
    - відповідно
workbook:
- type: group-sort
  instruction: 'Розподіліть речення за категоріями: це факт чи чиясь суб''єктивна
    думка?'
  groups:
  - label: Факт
    items:
    - Температура повітря сьогодні становить рівно 15 градусів.
    - Наш національний парламент учора ухвалив новий закон.
    - Міська рада зараз розглядає проєкт бюджету на наступний рік.
    - Евакуацію всіх людей було успішно завершено.
  - label: Думка
    items:
    - Це надзвичайно тепла погода для холодного березня.
    - Новий закон нарешті швидко змінить нашу застарілу систему.
    - Корумповані місцеві чиновники просто хочуть вкрасти наші гроші.
    - Без сумніву, це рішення є неймовірно важливим для суспільства.
- type: true-false
  instruction: Правда чи ні? Оцініть ці твердження про медіаманіпулювання.
  items:
  - statement: Маніпулювання зазвичай використовують виключно для того, щоб чесно
      інформувати громадян.
    correct: false
    explanation: Маніпулювання — це прихований психологічний вплив із певною корисливою
      метою, а зовсім не чесне інформування.
  - statement: Навішування агресивних ярликів дуже допомагає дискредитувати людину
      без жодних реальних доказів.
    correct: true
    explanation: Це справді надзвичайно поширений і брудний метод впливу на нашу свідомість.
  - statement: Вибіркове цитування взагалі не змінює початковий зміст сказаної кимось
      фрази.
    correct: false
    explanation: Слова повністю вириваються із загального контексту, через що їхній
      початковий зміст кардинально змінюється.
  - statement: Типовий клікбейт часто використовує занадто сильні емоційні слова та
      безліч окличних знаків.
    correct: true
    explanation: Клікбейт спеціально створений для того, щоб змусити вас швидко натиснути
      на посилання завдяки шоку.
  - statement: Фейк — це перевірена та абсолютно об'єктивна інформація з офіційного
      джерела.
    correct: false
    explanation: Фейк — це повністю неправдива або серйозно викривлена інформація.
  - statement: Українські медіа мають обов'язкові державні мовні квоти для захисту
      нашого інформаційного простору від пропаганди.
    correct: true
    explanation: Закон України справді встановлює мовні квоти для всіх радіостанцій
      і телебачення.
