- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Читання новин».
  prompt: 'Уявіть, що ви стали свідком цікавої суспільної події у вашому місті. Напишіть
    короткий лід новини (5 речень), даючи відповіді на питання: Хто? Що зробив? Де?
    Коли? Чому?'
  min_words: 50
  model_answer: Сьогодні вранці місцева громада організувала масштабне прибирання
    у центральному парку. Активні громадяни та волонтери зібрали все сміття, щоб ефективно
    покращити екологію нашого міста. Як повідомляють джерела, до цієї акції загалом
    долучилося понад сто небайдужих людей. Журналісти дуже швидко повідомили про цю
    подію у місцевих засобах масової інформації. Уряд також підтвердив, що офіційно
    підтримує такі корисні благодійні ініціативи суспільства.
