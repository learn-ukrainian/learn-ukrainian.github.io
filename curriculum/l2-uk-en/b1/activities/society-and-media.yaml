version: '1.0'
module: society-and-media
level: b1
inline:
- id: fill-in-media-grammar
  type: fill-in
  instruction: Вставте правильну граматичну форму (дієприкметник або безособову форму)
    у реченнях на тему медіа.
  items:
  - sentence: Новий закон успішно ____ парламентом минулого тижня.
    answer: ухвалено
    options:
    - ухвалив
    - ухвалено
    - ухвалена
  - sentence: Складний проєкт успішно ____ у нашому місті.
    answer: реалізовано
    options:
    - реалізований
    - реалізовано
    - реалізовують
  - sentence: Сучасний культурний центр вже ____ для прогресивної молоді.
    answer: відкрито
    options:
    - відкрито
    - відкритий
    - відкрити
  - sentence: Журналіст, ____ свій сюжет, помітив одну важливу деталь.
    answer: готуючи
    options:
    - готуючи
    - готував
    - готувати
  - sentence: Масштабну евакуацію з небезпечного регіону успішно ____.
    answer: завершено
    options:
    - завершено
    - завершили
    - завершити
  - sentence: Новий парламент, ____ на демократичних виборах, повинен негайно працювати.
    answer: обраний
    options:
    - обраний
    - обрав
    - обираючи
  - sentence: Кожен свідомий громадянин ____ до сучасного волонтерського руху.
    answer: залучений
    options:
    - залучений
    - залучив
    - залучати
  - sentence: ____ сильними емоціями читачів, автор намагається посіяти паніку.
    answer: Маніпулюючи
    options:
    - Маніпулюючи
    - Маніпулює
    - Маніпулювати
- id: quiz-media-lexica
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Що таке
    медіа?».'
  items:
  - question: Як називається мовний стиль, який найчастіше використовують журналісти?
    options:
    - Публіцистичний стиль
    - Науковий стиль
    - Художній стиль
    - Розмовний стиль
    correct: 0
  - question: Яке слово означає особисту суб'єктивну оцінку події, а не об'єктивну
      реальність?
    options:
    - Думка
    - Факт
    - Джерело
    - Лід
    correct: 0
  - question: Як називається перший, найважливіший абзац будь-якої новини?
    options:
    - Лід
    - Заголовок
    - Джерело
    - Факт
    correct: 0
  - question: Яке дієслово звучить найбільш нейтрально та об'єктивно в сучасних новинах?
    options:
    - Повідомити
    - Стверджувати
    - Зізнатися
    - Наголосити
    correct: 0
  - question: Як правильно розшифровується популярна абревіатура ЗМІ?
    options:
    - Засоби масової інформації
    - Засоби мобільної інформації
    - Закон про медіа і інтернет
    - Засоби маніпулювання інформацією
    correct: 0
  - question: Що в першу чергу означає сучасний термін «медіаграмотність»?
    options:
    - Вміння критично аналізувати інформацію
    - Вміння дуже швидко писати тексти
    - Вміння вільно користуватися комп'ютером
    - Вміння працювати професійним журналістом
    correct: 0
- id: match-up
  type: match-up
  instruction: З'єднайте терміни з розділу «Читання новин» з їхніми визначеннями.
  pairs:
  - left: Лід
    right: Перший і найважливіший абзац будь-якої новини
  - left: Джерело
    right: Місце, документ або особа, звідки журналіст отримує інформацію
  - left: Факт
    right: Об'єктивна і точна інформація, яку будь-хто може перевірити
  - left: Думка
    right: Особиста суб'єктивна оцінка конкретної події
  - left: Заголовок
    right: Коротка, влучна та інформативна фраза на початку статті
  - left: Фейк
    right: Повністю неправдива або навмисно викривлена інформація
  - left: Маніпулювання
    right: Прихований психологічний вплив на емоції читача
workbook:
- type: unjumble
  instruction: Складіть правильні речення зі слів, використовуючи публіцистичний стиль.
  items:
  - words:
    - успішно
    - проєкт
    - Складний
    - реалізовано.
    correct_order:
    - Складний
    - проєкт
    - успішно
    - реалізовано.
  - words:
    - ухвалено.
    - Новий
    - про
    - освіту
    - закон
    correct_order:
    - Новий
    - закон
    - про
    - освіту
    - ухвалено.
  - words:
    - джерело
    - завжди
    - Надійне
    - інформацію.
    - перевіряє
    correct_order:
    - Надійне
    - джерело
    - завжди
    - перевіряє
    - інформацію.
  - words:
    - відповідальний
    - Кожен
    - міністр
    - роботи.
    - за
    - сферу
    - свою
    correct_order:
    - Кожен
    - міністр
    - відповідальний
    - за
    - свою
    - сферу
    - роботи.
  - words:
    - поширюють
    - Соціальні
    - новини.
    - миттєво
    - мережі
    correct_order:
    - Соціальні
    - мережі
    - миттєво
    - поширюють
    - новини.
  - words:
    - маніпулювання.
    - розпізнавати
    - Медіаграмотність
    - допомагає
    - приховане
    correct_order:
    - Медіаграмотність
    - допомагає
    - розпізнавати
    - приховане
    - маніпулювання.
- type: group-sort
