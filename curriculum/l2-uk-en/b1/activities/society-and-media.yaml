  groups:
  - label: Нейтральні факти та дії
    items:
    - повідомити
    - підтвердити
    - інформувати
    - завершити
    - відкрити
    - ухвалити
  - label: Заяви або сумніви (особиста думка)
    items:
    - стверджувати
    - заявити
    - зізнатися
    - наголосити
    - попередити
    - вважати
