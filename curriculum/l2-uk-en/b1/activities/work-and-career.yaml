inline:
- id: vocab-match-up
  type: match-up
  instruction: З'єднайте слова з їхніми визначеннями
  pairs:
  - left: професія
    right: широкий рід занять, що вимагає спеціальної підготовки
  - left: фах
    right: вузька сфера вашої практичної експертизи
  - left: посада
    right: конкретне офіційне місце у компанії в даний момент
  - left: спеціальність
    right: кваліфікація, яку ви здобули після університету
  - left: вакансія
    right: відкрите робоче місце, на яке компанія шукає працівника
  - left: стажування
    right: період для студентів, щоб здобути перші практичні навички
  - left: резюме
    right: документ, у якому описано ваш досвід та освіту
  - left: співбесіда
    right: офіційна ділова розмова з майбутнім роботодавцем
  - left: підвищення
    right: перехід на вищу посаду з більшою зарплатою
  - left: звільнення
    right: припинення роботи та залишення компанії
