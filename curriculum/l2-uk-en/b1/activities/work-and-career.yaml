version: '1.0'
module: work-and-career
level: b1
inline:
- id: match-up-work-terms
  type: match-up
  instruction: З'єднайте терміни з їхніми визначеннями.
  pairs:
  - left: професія
    right: Широкий рід занять, що вимагає підготовки або освіти.
  - left: фах
    right: Конкретна галузь знань або спеціальність.
  - left: посада
    right: Конкретне місце роботи або роль у компанії.
  - left: спеціальність
    right: Офіційна кваліфікація, яка зазвичай зазначена в дипломі.
  - left: вакансія
    right: Вільне робоче місце, на яке компанія шукає працівника.
  - left: стажування
    right: Період навчання та практики на новому місці перед постійною роботою.
  - left: досвід
    right: Сукупність знань і навичок, отриманих на попередніх місцях роботи.
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть лексику за категоріями.
  groups:
  - label: Люди
    items:
    - керівник
    - колега
    - працівник
    - роботодавець
  - label: Місця
    items:
    - підприємство
    - компанія
    - офіс
    - відділ
  - label: Процеси
    items:
    - працевлаштування
    - співбесіда
    - стажування
    - звільнення
  - label: Документи
    items:
    - резюме
    - диплом
    - лікарняний
- id: fill-in-aspect-work
  type: fill-in
  instruction: Доповніть речення правильною формою дієслова (доконаний чи недоконаний
    вид).
  items:
  - sentence: Вона _____ на цій посаді вже три роки.
    answer: працювала
    options:
    - працювала
    - попрацювала
  - sentence: Учора мій колега нарешті _____ довгоочікуване підвищення.
    answer: отримав
    options:
    - отримував
    - отримав
  - sentence: Коли я шукав роботу, я _____ резюме майже щодня.
    answer: подавав
    options:
    - подавав
    - подав
  - sentence: Після успішного стажування я _____ у велику міжнародну компанію.
    answer: влаштувалася
    options:
    - влаштовувалася
    - влаштувалася
  - sentence: Чому молоді працівники так часто _____ з цього відділу?
    answer: звільняються
    options:
    - звільняються
    - звільняться
  - sentence: Я планую _____ документи на нову вакансію завтра вранці.
    answer: подати
    options:
    - подавати
    - подати
  - sentence: На цій посаді досвідчені спеціалісти зазвичай _____ високу зарплату.
    answer: отримують
    options:
    - отримують
    - отримають
- id: quiz-aspect-logic
  type: quiz
  instruction: Визначте вид дієслова у реченнях про кар'єру та оберіть правильне пояснення.
  items:
  - question: «Я працювала в міжнародній компанії, доки не отримала нову пропозицію.»
      Чому використано слово «працювала»?
    options:
    - Це тривалий стан, звичний професійний статус (недоконаний вид).
    - Це одноразова завершена дія (доконаний вид).
    - Це швидка послідовність подій.
    - Це раптова зміна у кар'єрі.
    correct: 0
  - question: «Вчора мій колега звільнився.» Чому обрано форму «звільнився»?
    options:
    - Це регулярна дія, яка повторюється кожного місяця.
    - Це факт досягнення результату, одноразова подія (доконаний вид).
    - Це тривалий процес передачі професійних обов'язків.
    - Це стан без чіткого результату.
    correct: 1
  - question: «Я щомісяця отримувала премію за хорошу роботу.» Який це вид і чому?
    options:
    - Доконаний вид, бо є конкретний результат.
    - Недоконаний вид, бо дія була регулярною і повторювалася.
    - Доконаний вид, бо це унікальна подія.
    - Недоконаний вид, бо це швидка зміна обставин.
    correct: 1
  - question: «Я успішно закінчив університет і пройшов складну співбесіду.» Чому
      тут доконаний вид?
    options:
    - Це опис щоденної рутини.
    - Це незавершені та тривалі процеси.
    - Це швидка послідовність завершених дій.
    - Це тривале тло професійної історії.
    correct: 2
  - question: «Я довго влаштовувалася на цю роботу, бо було кілька етапів відбору.»
      Яка роль слова «влаштовувалася»?
    options:
    - Воно фіксує раптовий кар'єрний результат.
    - Воно описує процес пошуку роботи та етапи відбору (недоконаний вид).
    - Воно означає, що роботу вже офіційно отримано.
    - Воно вказує на швидку та коротку дію.
    correct: 1
  - question: «Він отримав великий бонус за цей конкретний проєкт.» Чому використано
      «отримав», а не «отримував»?
    options:
    - Бо це регулярна виплата кожного місяця.
    - Бо дієслова «отримував» не існує в сучасній мові.
    - Бо це унікальна подія, одноразове досягнення з чітким результатом.
    - Бо це процес, який все ще триває зараз.
    correct: 2
workbook:
- type: error-correction
  instruction: Знайдіть і виправте граматичну помилку у реченнях (зверніть увагу на
    відмінки після професійних дієслів).
  items:
  - sentence: На цій посаді я відповідала за новим проєктом.
    error: новим проєктом
    correction: новий проєкт
    error_type: construction
    options:
    - новий проєкт
    - новому проєкту
    - нових проєктів
    explanation: Дієслово «відповідати за» вимагає знахідного відмінка (Accusative),
      а не орудного.
  - sentence: Мій брат успішно керує великий відділ.
    error: великий відділ
    correction: великим відділом
    error_type: construction
    options:
    - великим відділом
    - великого відділу
    - великому відділу
    explanation: Дієслово «керувати» вимагає орудного відмінка (Instrumental).
  - sentence: Вона все життя мріяла бути перекладач.
    error: перекладач
    correction: перекладачем
    error_type: word
    options:
    - перекладачем
    - перекладача
    - перекладачеві
    explanation: Після дієслів «бути», «стати» або «працювати» професія має стояти
      в орудному відмінку (Instrumental).
  - sentence: Ми щодня займаємося аналітика.
    error: аналітика
    correction: аналітикою
    error_type: construction
    options:
    - аналітикою
    - аналітику
    - аналітиці
    explanation: Дієслово «займатися» вимагає орудного відмінка (Instrumental).
  - sentence: Після університету він працював як економіст.
    error: як економіст
    correction: економістом
    error_type: phrase
    options:
    - економістом
    - економіста
    - на економісті
    explanation: 'В українській мові не використовують «як» для назви професії. Потрібен
      просто орудний відмінок: «працював економістом».'
  - sentence: Команда постійно працює з важливими клієнти.
    error: клієнти
    correction: клієнтами
    error_type: word
    options:
    - клієнтами
    - клієнтів
    - клієнтам
    explanation: Прийменник «з» (з ким/чим) вимагає орудного відмінка (Instrumental).
