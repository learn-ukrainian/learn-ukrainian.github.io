    - text: Я активно подаю документи на цю відкриту вакансію.
      correct: true
    - text: Я активно влаштувався на цю відкриту вакансію.
      correct: false
    - text: Я активно звільняюся з цієї відкритої вакансії.
      correct: false
  - source: My new experienced colleague effectively manages the whole team.
    options:
    - text: Мій новий досвідчений колега ефективно керує всією командою.
      correct: true
    - text: Мій новий досвідчений колега ефективно відповідає всією командою.
      correct: false
    - text: Мій новий досвідчений колега ефективно керує за всю команду.
      correct: false
  - source: I have more than five years of professional experience.
    options:
    - text: Я маю більше п'яти років професійного досвіду.
      correct: true
    - text: Я маю більше п'яти років професійного стажування.
      correct: false
    - text: Я маю більше п'яти років професійних обов'язків.
      correct: false
