- id: fill-in-aspect-work
  type: fill-in
  instruction: Доповніть речення правильною формою дієслова (доконаний чи недоконаний
    вид)
  items:
  - sentence: Я вже п'ять років стабільно _____ у цій міжнародній компанії.
    answer: працюю
    options:
    - працюю
    - попрацюю
    - працював
  - sentence: Вчора він успішно _____ на нову керівну посаду.
    answer: влаштувався
    options:
    - влаштовувався
    - влаштувався
    - влаштується
  - sentence: Кожного місяця вона регулярно _____ високу фінансову премію.
    answer: отримувала
    options:
    - отримувала
    - отримала
    - отримає
  - sentence: Після завершення складного проєкту ми нарешті _____ довгоочікуване підвищення.
    answer: отримали
    options:
    - отримували
    - отримали
    - отримають
  - sentence: Молоді фахівці часто довго і безуспішно _____ свої резюме в різні фірми.
    answer: подають
    options:
    - подають
    - подадуть
    - подали
  - sentence: Сьогодні вранці я вже _____ всі необхідні документи на цю вакансію.
    answer: подала
    options:
    - подавала
    - подала
    - подає
  - sentence: Втомлені працівники часто _____ через дуже низьку зарплату або токсичний
      колектив.
    answer: звільняються
    options:
    - звільняються
    - звільняться
    - звільнилися
  - sentence: Минулого тижня мій старший колега остаточно _____ за власним бажанням.
    answer: звільнився
    options:
    - звільнявся
    - звільнився
    - звільняється
- id: quiz-aspect-logic
  type: quiz
  instruction: Визначте логіку використання виду дієслова у реченнях про кар'єру та
    оберіть правильний варіант
  items:
  - question: Яке дієслово найкраще описує раптовий, фінальний результат успішного
      пошуку нової роботи?
    options:
    - Я вчора успішно влаштувався на посаду
    - Я зараз активно влаштовуюся на роботу
    - Я завжди легко влаштовуюся на нове місце
    - Я довго влаштовувався в цей офіс
    correct: 0
  - question: 'Оберіть речення, де дієслово (недоконаний вид) чітко описує тривалу
      регулярну рутину:'
    options:
    - Я отримала великий фінансовий бонус за цей проєкт.
    - Вона подала документи на цікаву вакансію.
    - Він швидко і успішно пройшов фінальну співбесіду.
    - Я щомісяця стабільно отримував високу премію.
    correct: 3
  - question: Який ланцюжок дієслів показує швидку кар'єрну послідовність (усі дії
      вже завершені)?
    options:
    - закінчив, подав, пройшов, влаштувався
    - закінчував, подавав, проходив, влаштовувався
    - закінчив, подавав, пройшов, влаштовувався
    - закінчував, подав, проходив, влаштувався
    correct: 0
  - question: 'Оберіть абсолютно правильне граматичне використання конструкції «відповідати
      за»:'
    options:
    - Я персонально відповідаю за цей складний проєкт.
    - Я персонально відповідаю за цим складним проєктом.
    - Я персонально відповідаю над цим складним проєктом.
    - Я персонально відповідаю за цього складного проєкту.
    correct: 0
  - question: В якому реченні правильно використано Орудний відмінок для назви вашої
      професії?
    options:
    - Вона успішно працює головною лікаркою в лікарні.
    - Вона успішно працює як головна лікарка в лікарні.
    - Вона успішно працює головна лікарка в лікарні.
    - Вона успішно працює на головній лікарці в лікарні.
    correct: 0
  - question: 'Оберіть правильну граматичну конструкцію з дієсловом «керувати»:'
    options:
    - Він дуже ефективно керує всім фінансовим відділом.
    - Він дуже ефективно керує весь фінансовий відділ.
    - Він дуже ефективно керує за всім фінансовим відділом.
    - Він дуже ефективно керує на весь фінансовий відділ.
    correct: 0
- id: role-play-interview
  type: order
  instruction: Розставте репліки ділової співбесіди в логічному і правильному порядку
  items:
  - — Доброго дня! Дозвольте представитися, мене звати Олексій, і я подавав своє резюме
    на вашу вакансію.
  - — Доброго дня, Олексію! Дуже дякую, що прийшли. Дозвольте запитати про ваш попередній
    досвід роботи.
  - — Я три роки стабільно працював у великому відділі маркетингу міжнародної компанії.
  - — Це дійсно цікаво. Чому ви вирішили змінити місце роботи і прийти саме до нас?
  - — Я хочу швидко професійно зростати, тому мене дуже зацікавила ваша відкрита керівна
    посада.
  - — А які саме щоденні обов'язки ви регулярно виконували на своїй попередній роботі?
  - — Я персонально відповідав за рекламу та успішно керував невеликою творчою командою.
  - — Усе зрозуміло. А які ваші зарплатні очікування на цьому початковому етапі?
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
- id: open-writing-bio
  type: essay-response
  prompt: 'Напишіть коротку кар''єрну біографію (5-8 речень), обов''язково чергуючи
    дієслова доконаного і недоконаного виду. Розкажіть, де ви стабільно працювали
    раніше (тло/процес), чому вирішили змінити роботу (подія), та які обов''язки маєте
    зараз на новій посаді. Використовуйте слова: досвід, вакансія, обов''язок, відповідати
    за.'
  min_words: 50
  model_answer: Після університету я три роки працювала менеджеркою у невеликій торговій
    компанії. Там я займалася фінансовою документацією та щодня спілкувалася з клієнтами.
    Це був дуже цікавий досвід, але я завжди хотіла професійно зростати. Тому минулого
    місяця я вирішила кардинально змінити сферу і подала своє резюме у велику ІТ-компанію.
    Я успішно пройшла складну співбесіду і отримала нову престижну посаду. Тепер я
    працюю молодшою аналітикинею. Я персонально відповідаю за глобальні дослідження
    ринку та пишу детальні аналітичні звіти. Мені надзвичайно подобаються мої нові
    щоденні обов'язки.
  evaluation_criteria:
  - Текст містить 5-8 повноцінних речень та відповідає мінімальній кількості слів.
  - Студент правильно чергує доконаний і недоконаний вид дієслів (напр., працювала
    - вирішила - пройшла).
  - Студент активно використав ключові слова з теми (досвід, вакансія, обов'язок).
  - Студент правильно вжив конструкцію «відповідати за» зі Знахідним відмінком.
  - Назви професій правильно вжиті в Орудному відмінку (без прийменника «як»).
workbook:
- type: error-correction
  instruction: Знайдіть і виправте типові граматичні та лексичні помилки в реченнях
    про роботу
  items:
  - sentence: Мій старший брат зараз дуже успішно працює як головний архітектор у
      столиці.
    error: як головний архітектор
    correction: головним архітектором
    error_type: construction
    options:
    - головним архітектором
    - на головного архітектора
    - за головного архітектора
    explanation: З дієсловом «працювати» назва вашої професії завжди стоїть в Орудному
      відмінку без жодних прийменників.
  - sentence: У цій міжнародній компанії я персонально відповідаю за фінансовим відділом.
    error: за фінансовим відділом
    correction: за фінансовий відділ
    error_type: construction
    options:
    - за фінансовий відділ
    - на фінансовий відділ
    - фінансовим відділом
    explanation: Конструкція «відповідати за» завжди і без винятків вимагає Знахідного
      відмінка (за кого? за що?).
  - sentence: Наша нова талановита колега ефективно керує весь великий проєкт компанії.
    error: весь великий проєкт
    correction: всім великим проєктом
    error_type: construction
    options:
    - всім великим проєктом
    - усім великим проєктом
    - на весь великий проєкт
    explanation: Дієслово «керувати» завжди вимагає Орудного відмінка (керувати ким/чим?).
  - sentence: Моя дружина працює в міській клініці, вона дуже хороший лікар і професіонал.
    error: хороший лікар
    correction: хороша лікарка
    error_type: word
    options:
    - хороша лікарка
    - хороше лікар
    - хорошій лікарці
    explanation: У сучасній українській мові необхідно завжди використовувати правильні
      жіночі форми (фемінітиви) для назв професій жінок.
  - sentence: Я вже майже цілих п'ять довгих років влаштовуюся на цю посаду у вашому
      офісі.
    error: влаштовуюся
    correction: працюю
    error_type: word
    options:
    - працюю
    - звільняюся
    - отримую
    explanation: Дієслово «влаштовуватися» означає сам короткий процес отримання роботи,
      а не тривалий п'ятирічний стан. Тут граматично потрібно «працюю».
  - sentence: Він щойно завершив університет і зараз пише своє перше резюме, але резюмея
      ще не готова.
    error: резюмея
    correction: резюме
    error_type: word
    options:
    - резюме
    - резюму
    - резюмою
    explanation: Слово «резюме» є абсолютно невідмінюваним в українській мові, воно
      ніколи не змінює своє закінчення.
- type: fill-in
  instruction: Вставте правильне професійне слово за змістом речення
  items:
  - sentence: За фахом він талановитий програміст, але зараз працює на _____ керівника
      відділу.
    answer: посаді
    options:
    - професії
    - посаді
    - вакансії
  - sentence: У кожній великій міжнародній компанії завжди є свій фінансовий _____.
    answer: відділ
    options:
    - офіс
    - відділ
    - кабінет
  - sentence: Сьогодні зранку я надіслав своє оновлене _____ на цю відкриту вакансію.
    answer: резюме
    options:
    - резюме
    - диплом
    - стажування
  - sentence: Після того як я успішно пройшов своє неоплачуване _____, мене нарешті
      запросили на роботу.
    answer: стажування
    options:
    - звільнення
    - стажування
    - підвищення
  - sentence: Мій головний щоденний робочий _____ — це ретельна перевірка всіх фінансових
      документів.
    answer: обов'язок
    options:
    - досвід
    - обов'язок
    - фах
  - sentence: Моя колега попросила директора підвищити їй _____ плату за її відмінні
      результати.
    answer: заробітну
    options:
    - робочу
    - заробітну
    - фінансову
- type: translate
  instruction: Оберіть правильний та найбільш природний український переклад для професійних
    фраз
  items:
  - source: She successfully works as a manager.
    options:
    - text: Вона успішно працює менеджеркою.
      correct: true
    - text: Вона успішно працює як менеджерка.
      correct: false
    - text: Вона успішно працює за менеджерку.
      correct: false
  - source: He is personally responsible for the international sales.
    options:
    - text: Він персонально відповідає за міжнародні продажі.
      correct: true
    - text: Він персонально відповідає міжнародними продажами.
      correct: false
    - text: Він персонально відповідає за міжнародними продажами.
      correct: false
  - source: They finally got a promotion yesterday.
    options:
    - text: Вчора вони нарешті отримали підвищення.
      correct: true
    - text: Вчора вони нарешті отримували підвищення.
      correct: false
    - text: Вчора вони нарешті взяли підвищення.
      correct: false
  - source: I am actively applying for this open job vacancy.
