- type: translate
  instruction: Оберіть правильний переклад англійських професійних фраз.
  items:
  - source: She works as a doctor.
    options:
    - text: Вона працює лікаркою.
      correct: true
    - text: Вона працює як лікарка.
      correct: false
    - text: Вона є лікарка.
      correct: false
  - source: I am responsible for the project.
    options:
    - text: Я відповідаю за проєкт.
      correct: true
    - text: Я відповідаю проєктом.
      correct: false
    - text: Я керую за проєкт.
      correct: false
  - source: He manages a large team.
    options:
    - text: Він керує великою командою.
      correct: true
    - text: Він керує велику команду.
      correct: false
    - text: Він займається великою командою.
      correct: false
  - source: I sent my resume.
    options:
    - text: Я надіслав моє резюме.
      correct: true
    - text: Я надіслав мого резюме.
      correct: false
    - text: Я надіслав моєму резюме.
      correct: false
  - source: We handle marketing.
    options:
    - text: Ми займаємося маркетингом.
      correct: true
    - text: Ми відповідаємо маркетингом.
      correct: false
    - text: Ми керуємо маркетингом.
      correct: false
  - source: She got a promotion.
    options:
    - text: Вона отримала підвищення.
      correct: true
    - text: Вона отримувала підвищення.
      correct: false
    - text: Вона подала підвищення.
      correct: false
- type: essay-response
  prompt: Напишіть коротку кар'єрну біографію (5-8 речень). Обов'язково чергуйте дієслова
    недоконаного (для опису рутини чи тривалої роботи) та доконаного виду (для результатів,
    зміни роботи чи підвищення). Використовуйте професійну лексику (посада, обов'язки,
    досвід тощо).
  min_words: 50
  model_answer: Після закінчення університету я довго шукала роботу і подавала резюме
    у різні компанії. Нарешті я успішно пройшла співбесіду і влаштувалася на посаду
    менеджера. Три роки я працювала у цій компанії. Я відповідала за комунікацію з
    клієнтами і щодня керувала невеликою командою. Це був цікавий процес, але я хотіла
    більшого. Тому минулого місяця я успішно завершила важливий проєкт і отримала
    довгоочікуване підвищення. Тепер моя нова спеціальність приносить мені не лише
    хороший досвід, але й високу зарплату.
