version: '1.0'
module: dative-nuances
level: b1
inline:
- id: reading
  type: quiz
  instruction: Дайте відповіді на запитання за текстом про родину.
  items:
  - question: Кому дуже холодно під час прогулянки?
    options:
    - Мамі
    - Синові
    - Батькові
    - Бабусі
    correct: 0
  - question: Чому синові не хочеться гуляти?
    options:
    - Йому холодно
    - Йому нудно
    - Йому важко
    - Йому сумно
    correct: 1
  - question: Що батько пропонує зробити?
    options:
    - Поїхати додому
    - Зайти в кафе
    - Швидше йти
    - Купити чай
    correct: 1
  - question: Кому вже важко ходити по снігу?
    options:
    - Мамі
    - Синові
    - Батькові
    - Бабусі
    correct: 3
  - question: Що цікаво робити бабусі?
    options:
    - Дивитися на студентів
    - Пити каву
    - Гуляти по снігу
    - Слухати сина
    correct: 0
  - question: Кому зараз весело, бо у них канікули?
    options:
    - Дітям
    - Студентам
    - Школярам
    - Мамі й тату
    correct: 1
  title: Дайте відповіді на запитання за текстом про родину.
- id: fill-in
  type: fill-in
  instruction: Вставте правильний займенник у давальному відмінку для вираження суб'єкта
    стану.
  items:
  - sentence: ____ сьогодні дуже сумно, бо йде дощ.
    answer: Мені
    options:
    - Я
    - Мені
    - Мене
  - sentence: Чи ____ цікаво читати цю книжку?
    answer: вам
    options:
    - ви
    - вас
    - вам
  - sentence: ____ стало соромно за свою поведінку.
    answer: Їй
    options:
    - Вона
    - Її
    - Їй
  - sentence: ____ абсолютно байдуже до цих проблем.
    answer: Їм
    options:
    - Вони
    - Їх
    - Їм
  - sentence: ____ важко зрозуміти це нове правило.
    answer: Йому
    options:
    - Він
    - Його
    - Йому
  - sentence: ____ було дуже весело на вчорашньому концерті.
    answer: Нам
    options:
    - Ми
    - Нас
    - Нам
  title: Вставте правильний займенник у давальному відмінку для вираження суб'єкта
    стану.
- id: essay-age-practice
  type: translate
  instruction: Оберіть правильний переклад речень про вік.
  items:
  - source: My mother is fifty-two years old.
    options:
    - text: Моїй мамі п'ятдесят два роки.
      correct: true
    - text: Моя мама п'ятдесят два роки.
      correct: false
  - source: My brother is almost twenty.
    options:
    - text: Моєму братові майже двадцять.
      correct: true
    - text: Мій брат майже двадцять.
      correct: false
  - source: When I was ten years old, we met.
    options:
    - text: Коли мені було десять років, ми познайомилися.
      correct: true
    - text: Коли я був десять років, ми познайомилися.
      correct: false
  - source: Next year she will be thirty.
    options:
    - text: Наступного року їй буде тридцять.
      correct: true
    - text: Наступного року вона буде тридцять.
      correct: false
  - source: He is over forty.
    options:
    - text: Йому за сорок.
      correct: true
    - text: Він за сорок.
      correct: false
  - source: I am close to fifty.
    options:
    - text: Мені під п'ятдесят.
      correct: true
    - text: Я під п'ятдесят.
      correct: false
  title: Оберіть правильний переклад речень про вік.
- id: match-age-terms
  type: match-up
  instruction: З'єднайте вирази про вік з їхніми значеннями.
  pairs:
  - left: Йому під п'ятдесят
    right: Йому скоро буде 50
  - left: Їй за тридцять
    right: Їй трохи більше ніж 30
  - left: Мені майже сорок
    right: Мені ще немає 40, але дуже близько
  - left: Братові двадцять один рік
    right: Точний вік закінчується на 1
  - left: Сестрі двадцять три роки
    right: Точний вік закінчується на 2, 3 або 4
  - left: Другові двадцять п'ять років
    right: Точний вік закінчується на 5 і більше
  title: З'єднайте вирази про вік з їхніми значеннями.
- id: quiz-impersonal-logic
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Давальний
    суб''єкта стану».'
  items:
  - question: Яке слово означає «is supposed to» і має офіційний характер?
    options:
    - належить
    - пощастило
    - вдалося
    - байдуже
    correct: 0
  - question: Як правильно сказати «I need to work» українською?
    options:
    - Мені потрібно працювати
    - Я потрібно працювати
    - Мене потрібно працювати
    - Мною потрібно працювати
    correct: 0
  - question: Яке дієслово описує ситуацію, коли обставини змусили вас щось зробити?
    options:
    - довелося
    - вдалося
    - пощастило
    - належить
    correct: 0
  - question: Яке слово ми використовуємо, коли даємо серйозну рекомендацію (should)?
    options:
    - слід
    - можна
    - вдалося
    - байдуже
    correct: 0
  - question: 'Оберіть речення, де людина отримала позитивний результат завдяки удачі:'
    options:
    - Студентові пощастило на іспиті.
    - Студентові довелося читати книгу.
    - Студентові належить знати правила.
    - Студентові соромно за поведінку.
    correct: 0
  - question: Як правильно сказати, що комусь соромно?
    options:
    - Їй соромно за ці слова.
    - Вона соромна за ці слова.
    - Її соромно за ці слова.
    - З нею соромно за ці слова.
    correct: 0
  title: 'Оберіть правильний варіант: лексика та граматика з розділу «Давальний суб''єкта
    с'
- id: dialogue-dative-advice
  type: order
  instruction: Розставте репліки діалогу в правильному порядку.
  items:
  - — Привіт! Ти виглядаєш зовсім виснаженим. Щось погане сталося?
  - — Привіт. Так, мені дуже важко зараз працювати. Сильно голова болить.
  - — Тобі неодмінно варто відпочити. Ця робота тобі тільки шкодить.
  - — Але я пообіцяв директорові закінчити проект. Я не можу йому відмовити.
  - — Я обов'язково тобі допоможу з проектом. А тобі слід зателефонувати лікарю.
  - — Щиро дякую тобі за підтримку. Мені справді потрібна була порада.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  title: Розставте репліки діалогу в правильному порядку.
- id: fill-in-dative-of-purpose-and-prepositions
  type: fill-in
  instruction: Вставте правильний прийменник (завдяки, наперекір, на зло) або іменник
    у давальному відмінку.
  items:
  - sentence: Ми виграли цей складний матч ____ усім прогнозам.
    answer: наперекір
    options:
    - завдяки
    - наперекір
    - через
  - sentence: Вона швидко вивчила українську мову ____ своїй наполегливості.
    answer: завдяки
    options:
    - наперекір
    - завдяки
    - на зло
  - sentence: Він спеціально зробив це ____ своїм ворогам.
    answer: на зло
    options:
    - на зло
    - завдяки
    - через
  - sentence: На площі міста стоїть пам'ятник Тарасові ____.
    answer: Шевченку
    options:
    - Шевченко
    - Шевченку
    - Шевченка
  - sentence: Собака раптово кинувся напереріз ____.
    answer: машині
    options:
    - машина
    - машину
    - машині
  - sentence: Я успішно закінчив університет ____ моїм батькам.
    answer: завдяки
    options:
    - завдяки
    - через
    - наперекір
  title: Вставте правильний прийменник (завдяки, наперекір, на зло) або іменник у
    давальн
- id: error-case-governance
  type: error-correction
  instruction: Знайдіть і виправте помилку в керуванні дієслів.
  items:
  - sentence: Я щиро дякую вас за цю чудову допомогу.
    error: вас
    correction: вам
    error_type: word
    options:
    - вам
    - вами
    - ви
    explanation: Дієслово «дякувати» завжди вимагає давального відмінка (кому?), а
      не знахідного.
  - sentence: Ця голосна музика заважає мене працювати.
    error: мене
    correction: мені
    error_type: word
    options:
    - мені
    - мною
    - я
    explanation: Дієслово «заважати» вимагає давального відмінка.
  - sentence: Ми завжди допомагаємо наших сусідів.
    error: наших сусідів
    correction: нашим сусідам
    error_type: phrase
    options:
    - нашим сусідам
    - наші сусіди
    - нашими сусідами
    explanation: Дієслово «допомагати» вимагає давального відмінка (кому?).
  - sentence: Я повністю довіряю мого лікаря.
    error: мого лікаря
    correction: моєму лікареві
    error_type: phrase
    options:
    - моєму лікареві
    - мій лікар
    - моїм лікарем
    explanation: Дієслово «довіряти» вимагає давального відмінка.
  - sentence: Куріння дуже шкодить ваше здоров'я.
    error: ваше здоров'я
    correction: вашому здоров'ю
    error_type: phrase
    options:
    - вашому здоров'ю
    - вашого здоров'я
    - вашим здоров'ям
    explanation: Дієслово «шкодити» вимагає давального відмінка.
  - sentence: Студент правильно відповідає вчительку.
    error: вчительку
    correction: вчительці
    error_type: word
    options:
    - вчительці
    - вчительки
    - вчителькою
    explanation: Дієслово «відповідати» вимагає давального відмінка адресата.
  title: Знайдіть і виправте помилку в керуванні дієслів.
workbook:
- type: error-correction
  instruction: Знайдіть і виправте помилки у реченнях на тему давальний у виразах
    віку.
  items:
  - sentence: Моя мама п'ятдесят років.
    error: Моя мама
    correction: Моїй мамі
    error_type: phrase
    options:
    - Моїй мамі
    - Мою маму
    - Моєю мамою
    explanation: Для вираження віку особа має стояти в давальному відмінку.
  - sentence: Моєму братові двадцять один років.
    error: років
    correction: рік
    error_type: word
    options:
    - рік
    - роки
    - роком
    explanation: Після числа 1 (один, двадцять один) використовується форма «рік».
  - sentence: Йому сорок три років.
    error: років
    correction: роки
    error_type: word
    options:
    - роки
    - рік
    - роками
    explanation: Після чисел 2, 3, 4 використовується форма називного відмінка множини
      — «роки».
  - sentence: Коли я була десять років, ми переїхали.
    error: я була
    correction: мені було
    error_type: phrase
    options:
    - мені було
    - мені була
    - мене було
    explanation: Вік виражається безособовою конструкцією з давальним відмінком та
      дієсловом «було» (середній рід).
  - sentence: Наступного року її буде тридцять.
    error: її
    correction: їй
    error_type: word
    options:
    - їй
    - вона
    - нею
    explanation: Потрібен давальний відмінок — «їй».
  - sentence: Мій друг майже тридцять.
    error: Мій друг
    correction: Моєму другові
    error_type: phrase
    options:
    - Моєму другові
    - Мого друга
    - Моїм другом
    explanation: Особа має стояти в давальному відмінку.
  title: Знайдіть і виправте помилки у реченнях на тему давальний у виразах віку.
