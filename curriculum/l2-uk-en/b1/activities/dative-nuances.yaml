    - батькам
    - батьків
    - батьками
    - батьки
    correct: 0
  - question: Я завжди телефоную своїй _____ у неділю.
    options:
    - бабусі
    - бабусю
    - бабусею
    - бабуся
    correct: 0
  - question: Ви дуже заважаєте _____ працювати.
    options:
    - колезі
    - колегу
    - колегою
    - колега
    correct: 0
  - question: Ця ситуація сприяє нашому _____.
