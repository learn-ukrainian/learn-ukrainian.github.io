version: '1.0'
module: imperative-nuances
level: b1
inline:
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть наказові форми дієслів за типом закінчення
  groups:
  - label: Закінчення -и / -іть
    items:
    - неси
    - пишіть
    - ідіть
  - label: Закінчення -й / -йте
    items:
    - читай
    - грайте
  - label: Потрібен м'який знак (ь)
    items:
    - будь
    - стань
    - лізь
  - label: М'який знак НЕ потрібен
    items:
    - постав
    - ріж
    - вір
- id: fill-in-imperative-forms
  type: fill-in
  instruction: Оберіть правильну форму наказового способу для кожного речення
  items:
  - sentence: ____ цю важку сумку, будь ласка.
    answer: Неси
    options:
    - Неси
    - Несіть
    - Несь
  - sentence: Діти, ____ цей текст виразно.
    answer: читайте
    options:
    - читайте
    - читають
    - читати
  - sentence: Іване, ____ дуже уважним на уроці!
    answer: будь
    options:
    - будь
    - буди
    - будеш
  - sentence: Будь ласка, ____ чашку гарячого чаю на стіл.
    answer: постав
    options:
    - постав
    - поставь
    - постави
  - sentence: Ніколи не ____ свої ключі від дому!
    answer: забувай
    options:
    - забувай
    - забудь
    - забути
  - sentence: ____ тут і трохи почекай мене.
    answer: Стань
    options:
    - Стань
    - Стан
    - Стани
  - sentence: Я кажу правду, просто ____ мені.
    answer: вір
    options:
    - вір
    - вірь
    - віри
  - sentence: Мамо, ____ свої речі в мою кімнату.
    answer: занось
    options:
    - занось
    - заноси
    - заносять
  - sentence: ____ цей свіжий хліб дуже обережно!
    answer: Ріж
    options:
    - Ріж
    - Ріжь
    - Ріжи
  - sentence: ____ на це старе сімейне фото.
    answer: Глянь
    options:
    - Глянь
    - Гляньте
    - Гляни
- id: match-up-situations
  type: match-up
  instruction: З'єднайте речення з часткою «хай» / «нехай» з його головною функцією
  pairs:
  - left: Хай дитина спокійно пограється.
    right: Дозвіл (Permission)
  - left: Хай вам завжди щастить!
    right: Традиційне побажання (Wish)
  - left: Хай він мені обов'язково подзвонить.
    right: Опосередкований наказ (Indirect command)
  - left: Хай собі думають, що хочуть.
    right: Байдужість / Поступка (Concession)
  - left: Нехай живе вільна Україна!
    right: Урочистий патріотичний заклик
  - left: Нехай вони вирішують цю проблему самі.
    right: Відмова від контролю над ситуацією
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть дієслово правильного виду (доконаний чи недоконаний) для кожної
    життєвої ситуації
  items:
  - question: Вам дуже душно в кімнаті, і ви просите друга відчинити вікно один раз
      просто зараз.
    options:
    - Відчини!
    - Відчиняй!
    - Відчиняти!
    - Відчините!
    correct: 0
  - question: Шкільний вчитель просить учнів про тривалий процес читання.
    options:
    - Читай текст виразно!
    - Прочитай текст виразно!
    - Дочитай текст виразно!
    - Зачитай текст виразно!
    correct: 0
  - question: Ви суворо і категорично забороняєте відчиняти вікно.
    options:
    - Не відчиняй вікно!
    - Не відчини вікно!
    - Не відчиніть вікно!
    - Відчиняй вікно!
    correct: 0
  - question: Ви просите свого знайомого виконати одну конкретну дію — купити свіжий
      хліб.
    options:
    - Купи свіжого хліба!
    - Купуй свіжого хліба!
    - Будеш купувати хліб!
    - Купуйте хліба!
    correct: 0
  - question: В інструкції до державного іспиту написано правило, яке діє весь час.
    options:
    - Пишіть акуратно!
    - Напишіть акуратно!
    - Запишіть акуратно!
    - Допишіть акуратно!
    correct: 0
  - question: Ви дуже гостинно і дружньо просите свого гостя сісти за стіл.
    options:
    - Сідайте, будь ласка!
    - Сядьте, будь ласка!
    - Сядь, будь ласка!
    - Посядьте, будь ласка!
    correct: 0
  - question: Ви просите людину швидко написати вашу адресу.
    options:
    - Напиши мою адресу!
    - Пиши мою адресу!
    - Записуй адресу!
    - Написуй адресу!
    correct: 0
  - question: Ви тепло і щиро заохочуєте співрозмовника почати довгу розмову за кавою.
    options:
    - Розповідай!
    - Розкажи!
    - Розказуйте!
    - Розкажіть!
    correct: 0
- id: sentence-builder-polite
  type: unjumble
  instruction: Складіть правильне ввічливе прохання або пропозицію зі слів
  items:
  - words:
    - відчинити
    - ви
    - вікно?
    - могли
    - Чи
    - не
    - б
    correct_order:
    - Чи
    - не
    - могли
    - б
    - ви
    - відчинити
    - вікно?
  - words:
    - будь
    - сіль.
    - ласка,
    - Передайте,
    correct_order:
    - Передайте,
    - будь
    - ласка,
    - сіль.
  - words:
    - завданням,
    - мені
    - Допоможи
    - ласка.
    - з
    - цим
    - будь
    correct_order:
    - Допоможи
    - мені
    - з
    - цим
    - завданням,
    - будь
    - ласка.
  - words:
    - проєкт.
    - обговоримо
    - детально
    - цей
    - Давайте
    correct_order:
    - Давайте
    - детально
    - обговоримо
    - цей
    - проєкт.
  - words:
    - новий
    - Ходімо
    - фільм!
    - подивимося
    - цей
    correct_order:
    - Ходімо
    - подивимося
    - цей
    - новий
    - фільм!
  - words:
    - приміщенні.
    - не
    - Прошу
    - палити
    - в
    - цьому
    correct_order:
    - Прошу
    - не
    - палити
    - в
    - цьому
    - приміщенні.
- id: error-correction-norm
  type: error-correction
  instruction: Знайдіть і виправте типову помилку у формі дієслова
  items:
  - sentence: Давай пішли швидше додому, бо вже пізно!
    error: пішли
    correction: ходімо
    error_type: word
    options:
    - ходімо
    - підемо
    - йдемо
    explanation: Слово 'пішли' як наказ — це калька російського минулого часу. Використовуйте
      правильну інклюзивну форму 'ходімо'.
  - sentence: Давайте детально обговорювати цей цікавий проєкт.
    error: обговорювати
    correction: обговоримо
    error_type: word
    options:
    - обговоримо
    - обговорюємо
    - обговорювали
    explanation: В українській мові слово 'давайте' не можна поєднувати з інфінітивом.
      Потрібно використовувати дієслово майбутнього часу.
  - sentence: Синку, ніколи не забудь свої ключі від дому!
    error: забудь
    correction: забувай
    error_type: word
    options:
    - забувай
    - забуваєш
    - забути
    explanation: Після заперечної частки 'не' слід використовувати дієслово недоконаного
      виду ('не забувай').
  - sentence: Хай він зробив цю важку вправу самостійно.
    error: зробив
    correction: зробить
    error_type: word
    options:
    - зробить
    - зробити
    - зроблять
    explanation: Частка 'хай' поєднується лише з формами теперішнього або майбутнього
      часу, а не минулого.
  - sentence: Будь ласка, акуратно поставь цю чашку на стіл.
    error: поставь
    correction: постав
    error_type: word
    options:
    - постав
    - постави
    - поставив
    explanation: Після губних приголосних (б, п, в, м, ф) м'який знак у формах наказового
      способу не пишеться.
  - sentence: Мамо, вірь мені, це абсолютна правда.
    error: вірь
    correction: вір
    error_type: word
    options:
    - вір
    - віри
    - вірите
    explanation: М'який знак ніколи не пишеться після літери 'р' у кінці українських
      слів.
- id: match-up-match-situations-recipe-step-classroom-rule-polite-request-wish-to-correct-imperative-form
  type: match-up
  instruction: З'єднайте життєву ситуацію або тип тексту з відповідним реченням
  pairs:
  - left: Крок кулінарного рецепта
    right: Дрібно наріжте всі свіжі овочі.
  - left: Загальне шкільне правило
    right: Завжди пишіть акуратно та розбірливо.
  - left: Дуже тактовне прохання до незнайомця
    right: Чи не могли б ви відчинити вікно?
  - left: Щире побажання успіху
    right: Хай щастить!
  - left: Прямий і суворий наказ
    right: Швидко вийди на центр нашої сцени!
  - left: Патріотичне суспільне гасло
    right: Нехай живе вільна Україна!
  - left: Тепле запрошення до спільної дії
    right: Заспіваймо нашу улюблену пісню!
  - left: Категорична заборона
    right: Не забувай свої ключі вдома!
- id: group-sort-sort-imperative-forms-into-and-direct-polite-categories
  type: group-sort
  instruction: Розподіліть наказові форми за відповідними категоріями
  groups:
  - label: Прямий наказ (ти/ви)
    items:
    - вийди
    - наріжте
    - додайте
  - label: Заборона / Тривалий процес (недоконаний вид)
    items:
    - не забувай
    - пишіть
    - читай
  - label: Спільна дія (Ми)
    items:
    - ходімо
    - обговорімо
  - label: Третя особа (Хай/нехай)
    items:
    - хай щастить
    - нехай грає
workbook:
- type: true-false
  instruction: Чи правильне це твердження про наказовий спосіб?
  items:
  - statement: Форма «ходімо» є правильною літературною нормою для заклику до спільної
      дії.
    correct: true
    explanation: Так, унікальні закінчення «-імо» / «-мо» створюють правильну інклюзивну
      форму першої особи множини.
  - statement: Ми завжди пишемо м'який знак після літери «р» в кінці слова (наприклад,
      «вірь»).
    correct: false
    explanation: 'Ні, після літери «р» м''який знак в кінці українських слів ніколи
      не пишеться: «вір», «перевір».'
  - statement: Заперечення з часткою «не» майже завжди вимагає використання дієслова
      недоконаного виду.
    correct: true
    explanation: 'Так, це золоте правило: замість доконаного «забудь» ми кажемо недоконане
      «не забувай».'
  - statement: Слово «прошу» робить наше звернення дуже грубим і неприємним.
    correct: false
    explanation: Ні, навпаки — воно робить прохання надзвичайно тактовним, гостинним
      і ввічливим.
  - statement: Частки «хай» та «нехай» можна використовувати лише для дозволу, але
      ніколи для побажань.
    correct: false
    explanation: 'Ні, вони також є основою для багатьох щирих побажань: «Хай щастить!»,
      «Хай Бог помагає».'
  - statement: Слово «давайте» категорично заборонено поєднувати з інфінітивом.
    correct: true
    explanation: Так, казати «давайте писати» — це груба помилка. Правильно казати
      «давайте напишемо».
- type: anagram
  instruction: Складіть правильні форми наказового способу з літер
  items:
  - letters:
    - х
    - о
    - д
    - і
    - м
    - о
    answer: ходімо
    hint: let's go
  - letters:
    - б
    - у
    - д
    - ь
    answer: будь
    hint: be! (ти)
  - letters:
    - ч
    - и
    - т
    - а
    - й
    answer: читай
    hint: read! (ти)
  - letters:
    - н
    - а
    - р
    - і
    - ж
    - т
    - е
    answer: наріжте
    hint: cut up! (ви)
  - letters:
    - п
    - и
    - ш
    - і
    - т
    - ь
    answer: пишіть
    hint: write! (ви)
  - letters:
    - п
    - о
    - с
    - т
    - а
    - в
    answer: постав
    hint: put! (ти)
