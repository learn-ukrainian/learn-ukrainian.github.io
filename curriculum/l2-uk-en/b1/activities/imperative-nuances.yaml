version: '1.0'
module: imperative-nuances
level: b1
workbook:
- type: fill-in
  instruction: Вставте правильну форму наказового способу
  items:
  - sentence: Іване, ____ цей текст на дошці.
    answer: пиши
    options:
    - пиши
    - пишіть
    - пишімо
    - писати
  - sentence: Маріє Василівно, будь ласка, ____ на цей стілець.
    answer: сядьте
    options:
    - сядьте
    - сядь
    - сядте
    - сяди
  - sentence: Хлопці, швиденько ____ на цю фотографію!
    answer: гляньте
    options:
    - глянте
    - гляньте
    - гляніть
    - глянути
  - sentence: Колеги, час іде, ____ нашу нараду!
    answer: починаймо
    options:
    - починаємо
    - починайте
    - починаймо
    - почати
  - sentence: Діти, ____ спокійно, не кричіть.
    answer: сидіть
    options:
    - сидіть
    - сидьте
    - сидімо
    - сидіти
  - sentence: Оксано, ____ книгу на стіл і ходи сюди.
    answer: постав
    options:
    - постав
    - поставь
    - поставе
    - поставити
  - sentence: Не бійся, ніколи не здавайся і завжди ____ у свої сили!
    answer: вір
    options:
    - вір
    - вірь
    - вірте
    - вірити
  - sentence: Ми українці, тож ____ нашу рідну мову!
    answer: бережімо
    options:
    - бережімо
    - бережемо
    - бережіть
    - берегти
  - sentence: Для салату ____ капусту та моркву, панове.
    answer: наріжте
    options:
    - наріжте
    - наріж
    - наріжіть
    - нарізати
  - sentence: У нас є чудова ідея. ____ новий рецепт разом!
    answer: спробуймо
    options:
    - спробуємо
    - спробуйте
    - спробуймо
    - спробувати
- type: quiz
  instruction: Оберіть правильний вид дієслова (доконаний чи недоконаний) за контекстом
  items:
  - question: Мені дуже жарко. Будь ласка, _____ вікно!
    options:
    - відчини
    - відчиняй
    - відчиняти
    - відчиняєш
    correct: 0
  - question: 'Вчитель сказав: «_____ домашнє завдання щодня».'
    options:
    - Зробіть
    - Робіть
    - Робити
    - Робимо
    correct: 1
  - question: Мамо, _____ свій найкращий пиріг на мій день народження!
    options:
    - печи
    - спечи
    - пекти
    - спечеш
    correct: 1
  - question: Обережно, лід дуже слизький! _____!
    options:
    - Не падай
    - Не впади
    - Не впадай
    - Не падали
    correct: 1
  - question: Студенти, ніколи _____ на мої заняття.
    options:
    - не запізнюйтеся
    - не спізніться
    - запізніться
    - не запізняться
    correct: 0
  - question: _____ мені цю ручку на хвилину, я маю підписати документ.
    options:
    - Давай
    - Дай
    - Давати
    - Даси
    correct: 1
  - question: ____ свої інструменти з собою щоразу, коли йдеш на роботу.
    options:
    - Візьми
    - Бери
    - Береш
    - Взяти
    correct: 1
  - question: Ми готові починати. _____ нам цей важливий документ.
    options:
    - Передавай
    - Передай
    - Передаєш
    - Передавати
    correct: 1
- type: unjumble
  instruction: Складіть правильне речення (ввічливе прохання)
  items:
  - words:
    - сіль.
    - ласка,
    - будь
    - Передайте,
    correct_order:
    - Передайте,
    - будь
    - ласка,
    - сіль.
  - words:
    - столу.
    - до
    - сідати
    - Прошу
    correct_order:
    - Прошу
    - сідати
    - до
    - столу.
  - words:
    - вікно?
    - відчинити
    - ви
    - б
    - могли
    - не
    - Чи
    correct_order:
    - Чи
    - не
    - могли
    - б
    - ви
    - відчинити
    - вікно?
  - words:
    - проблему.
    - цю
    - обговоримо
    - Давайте
    correct_order:
    - Давайте
    - обговоримо
    - цю
    - проблему.
  - words:
    - текст?
    - цей
    - перекласти
    - допомогти
    - ви
    - б
    - могли
    - не
    - Чи
    correct_order:
    - Чи
    - не
    - могли
    - б
    - ви
    - допомогти
    - перекласти
    - цей
    - текст?
  - words:
    - повільніше.
    - ласка,
    - будь
    - Говоріть,
    correct_order:
    - Говоріть,
    - будь
    - ласка,
    - повільніше.
- type: match-up
  instruction: З'єднайте ситуацію з відповідною формою наказового способу
  pairs:
  - left: Кулінарний рецепт
    right: наріжте буряк та моркву
  - left: Шкільне правило
    right: уважно слухайте вчителя
  - left: Заборона дії
    right: не запізнюйтеся на уроки
  - left: Застереження від небезпеки
    right: обережно, не впади!
  - left: Побажання іншій людині
    right: нехай щастить!
  - left: Ввічливе звернення
    right: прошу сідати до столу
  - left: Непрямий наказ
    right: хай вона зателефонує
  - left: Спільна дія (ми)
    right: починаймо нашу нараду
- type: error-correction
  instruction: Знайдіть і виправте помилку в наказовому способі
  items:
  - sentence: Ми дуже втомилися, тому пішли додому!
    error: пішли
    correction: ходімо
    error_type: word
    options:
    - підемо
    - пішли
    - ходімо
    - ходимо
    explanation: «Пішли» — це форма минулого часу. Для наказового способу (спільної
      дії) використовуємо «ходімо».
  - sentence: Ніколи не відчини це вікно, тут дуже дує.
    error: відчини
    correction: відчиняй
    error_type: construction
    options:
    - відчиняй
    - відчинив
    - відчиняти
    - відчини
    explanation: Із запереченням «не» для свідомих заборон завжди використовується
      недоконаний вид (що робити? – відчиняти).
  - sentence: Хлопці, поставь цю вазу на стіл.
    error: поставь
    correction: постав
    error_type: word
    options:
    - постав
    - поставе
    - постави
    - поставь
    explanation: 'Після губних приголосних (в, б, п, м, ф) м''який знак не пишеться:
      постав, сип, вір.'
  - sentence: Іване, сядте на цей стілець, будь ласка.
    error: сядте
    correction: сядьте
    error_type: word
    options:
    - сядьте
    - сядь
    - сяди
    - сядте
    explanation: 'Після зубних приголосних (д, т, з, с, ц, л, н) перед закінченням
      обов''язково пишемо м''який знак: сядьте, лізьте.'
  - sentence: Діти, не забудь свої зошити вдома!
    error: забудь
    correction: забувайте
    error_type: construction
    options:
    - забувайте
    - забудьте
    - забули
    - забудь
    explanation: 'По-перше, для множини потрібна форма на -те. По-друге, після «не»
      використовуємо недоконаний вид: «не забувайте».'
  - sentence: Хай вона пишуть цей звіт самостійно.
    error: пишуть
    correction: пише
    error_type: word
    options:
    - пише
    - писатиме
    - пишуть
    - писати
    explanation: 'Займенник «вона» вимагає дієслова у третій особі однини: «хай пише».'
- type: group-sort
  instruction: Розподіліть форми дієслова за особами та типами
  groups:
  - label: Прямий наказ (ти/ви)
    items:
    - читай
    - читайте
    - постав
    - сядьте
  - label: Спільна дія (ми)
    items:
    - читаймо
    - починаймо
    - ходімо
  - label: Непрямий наказ (він/вона/вони)
    items:
    - хай читає
    - нехай знають
    - хай буде
