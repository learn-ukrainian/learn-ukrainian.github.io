version: '1.0'
module: health-at-the-doctor
level: b1
inline:
- id: match-medical-word-families
  type: match-up
  instruction: З'єднайте слова з однієї лексичної родини
  pairs:
  - left: лікар
    right: лікарня
  - left: лікувати
    right: ліки
  - left: біль
    right: боліти
  - left: здоровий
    right: здоров'я
  - left: голова
    right: головний
  - left: аптека
    right: аптекар
- id: fill-in-doctor-patient-dialogue
  type: fill-in
  instruction: Вставте правильне слово, щоб доповнити діалог у лікаря
  items:
  - sentence: Доброго дня. На що ви _____ сьогодні?
    answer: скаржитеся
    options:
    - скаржитеся
    - хворієте
    - лікуєтеся
    - почуваєтеся
  - sentence: Лікарю, у мене дуже сильно _____ живіт.
    answer: болить
    options:
    - болять
    - болить
    - болю
    - хворіє
  - sentence: Скажіть, як давно ви так погано _____?
    answer: почуваєтеся
    options:
    - хворієте
    - скаржитеся
    - почуваєтеся
    - болите
  - sentence: Відкрийте рота. Я бачу, що у вас запалене горло — це звичайна _____.
    answer: застуда
    options:
    - застуда
    - алергія
    - травма
    - отруєння
  - sentence: Я зараз _____ вам електронний рецепт на антибіотики.
    answer: призначу
    options:
    - призначу
    - зроблю
    - огляну
    - лікую
  - sentence: Дякую! А де я можу купити ці _____?
    answer: ліки
    options:
    - ліки
    - краплі
    - таблетка
    - рецепт
- id: quiz-symptoms-specialist
  type: quiz
  instruction: До якого лікаря потрібно звернутися в цій ситуації?
  items:
  - question: У мене дуже сильно болить зуб і запалені ясна.
    options:
    - до стоматолога
    - до хірурга
    - до кардіолога
    - до дерматолога
    correct: 0
  - question: 'Моя маленька дитина захворіла: у неї висока температура і кашель.'
    options:
    - до педіатра
    - до терапевта
    - до окуліста
    - до невролога
    correct: 0
  - question: У пацієнта проблеми із серцем, йому потрібно зробити кардіограму.
    options:
    - до кардіолога
    - до психіатра
    - до хірурга
    - до дерматолога
    correct: 0
  - question: У мене з'явився дивний червоний висип на шкірі рук.
    options:
    - до дерматолога
    - до терапевта
    - до окуліста
    - до стоматолога
    correct: 0
  - question: Пацієнту потрібна термінова операція після складної травми.
    options:
    - до хірурга
    - до терапевта
    - до невролога
    - до педіатра
    correct: 0
  - question: Я хочу перевірити свій зір і підібрати нові окуляри.
    options:
    - до окуліста
    - до кардіолога
    - до хірурга
    - до психіатра
    correct: 0
