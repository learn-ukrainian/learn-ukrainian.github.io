version: '1.0'
module: health-at-the-doctor
level: b1
inline:
- id: match-medical-families
  type: match-up
  instruction: З'єднайте слова зі спільним коренем
  pairs:
  - left: біль
    right: боліти
  - left: лікар
    right: лікувати
  - left: ліки
    right: лікування
  - left: здоров'я
    right: здоровий
  - left: аптека
    right: аптекар
  - left: хвороба
    right: хворіти
- id: doctor-patient-cases
  type: fill-in
  instruction: Оберіть правильну форму для кожної фрази
  items:
  - sentence: Я вже три дні хворію ____.
    answer: на грип
    options:
    - на грип
    - грипом
    - від грипу
  - sentence: Моя бабуся довго лікувалася ____.
    answer: від застуди
    options:
    - від застуди
    - застудою
    - на застуду
  - sentence: Пацієнт постійно скаржиться ____ у животі.
    answer: на біль
    options:
    - на біль
    - від болю
    - болем
  - sentence: Дайте мені таблетки ____, будь ласка.
    answer: від кашлю
    options:
    - від кашлю
    - для кашлю
    - на кашель
  - sentence: Які у вас ____? Розкажіть детально.
    answer: симптоми
    options:
    - симптоми
    - діагнози
    - рецепти
  - sentence: У мене третій день дуже болить ____.
    answer: голова
    options:
    - голова
    - голову
    - голові
- id: match-specialists
  type: quiz
  instruction: Оберіть правильного медичного спеціаліста
  items:
  - question: У мене дуже болить зуб, і є карієс. До кого мені піти?
    options:
    - До стоматолога
    - До хірурга
    - До терапевта
    - До педіатра
    correct: 0
  - question: Мені потрібен рецепт на ліки від застуди. Хто мені допоможе?
    options:
    - Терапевт
    - Окуліст
    - Стоматолог
    - Хірург
    correct: 0
  - question: Моя п'ятирічна дитина має високу температуру і кашель. Кого викликати?
    options:
    - Педіатра
    - Аптекаря
    - Хірурга
    - Окуліста
    correct: 0
  - question: Я дуже погано бачу текст у книзі. Мені потрібні нові окуляри.
    options:
    - Окуліст
    - Терапевт
    - Хірург
    - Педіатр
    correct: 0
  - question: У пацієнта гострий апендицит. Йому потрібна термінова операція.
    options:
    - Хірург
    - Окуліст
    - Педіатр
    - Стоматолог
    correct: 0
  - question: Я маю рецепт на сильні ліки. Де я можу їх купити?
    options:
    - В аптеці
    - У поліклініці
    - У хірурга
    - У реєстратурі
    correct: 0
workbook:
- type: match-up
  instruction: З'єднайте частину тіла та відповідний симптом
  pairs:
  - left: голова
    right: головний біль
  - left: зуб
    right: карієс
  - left: ніс
    right: нежить
  - left: горло
    right: боляче ковтати
  - left: легені
    right: сильний кашель
  - left: шлунок
    right: мене нудить
- type: fill-in
  instruction: Вставте правильну форму слова
  items:
  - sentence: В аптеці немає цих ____.
    answer: ліків
    options:
    - ліки
    - ліків
    - лікам
  - sentence: Лікар виписав мені рецепт на ____ для носа.
    answer: краплі
    options:
    - краплі
    - крапель
    - краплям
  - sentence: У мене щось в ____, я не можу його відкрити.
    answer: оці
    options:
    - оку
    - оці
    - очах
  - sentence: Вона скаржиться на різкий біль у правому ____.
    answer: вусі
    options:
    - вуху
    - вусі
    - вухах
  - sentence: Пацієнту потрібно купити ці ____ в аптеці.
    answer: ліки
    options:
    - ліки
    - ліків
    - лікам
  - sentence: Лікар оглянув хворого і поставив точний ____.
    answer: діагноз
    options:
    - симптом
    - діагноз
    - аналіз
