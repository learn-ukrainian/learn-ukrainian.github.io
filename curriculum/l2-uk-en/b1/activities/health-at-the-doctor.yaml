- id: error-correction-case-government
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Пацієнт скаржиться від сильний біль.
    error: від
    correction: на
    error_type: word
    options:
    - від
    - на
    - про
    - з
    explanation: Дієслово «скаржитися» вимагає прийменника «на» + знахідний відмінок
      (скаржитися на біль).
  - sentence: Він часто хворіє ангіною.
    error: ангіною
    correction: на ангіну
    error_type: phrase
    options:
    - ангіною
    - на ангіну
    - від ангіни
    - з ангіною
    explanation: Українською мовою ми кажемо «хворіти на...» + знахідний відмінок
      (хворіти на ангіну).
  - sentence: Вона довго лікувалася на запалення легенів.
    error: на
    correction: від
    error_type: word
    options:
    - на
    - від
    - з
    - для
    explanation: Дієслово «лікуватися» вимагає прийменника «від» + родовий відмінок
      (лікуватися від запалення).
  - sentence: У мене сильно болять права рука.
    error: болять
    correction: болить
    error_type: word
    options:
    - болять
    - болить
    - боліло
    - захворіло
    explanation: «Рука» — це один орган (однина), тому дієслово має узгоджуватися
      у формі однини «болить».
  - sentence: Дайте мені, будь ласка, якісь хороші краплі від нежиті.
    error: нежиті
    correction: нежитю
    error_type: word
    options:
    - нежиті
    - нежитю
    - нежитя
    - нежитом
    explanation: Слово «нежить» — це іменник чоловічого роду (м'яка група). У родовому
      відмінку він має закінчення -ю.
  - sentence: Я йду до доктора, бо погано почуваюся.
    error: доктора
    correction: лікаря
    error_type: word
    options:
    - доктора
    - лікаря
    - терапевту
    - медика
    explanation: «Лікар» — це людина, яка вас лікує. «Доктор» — це вищий науковий
      ступінь.
workbook:
- id: true-false-medical-facts
  type: true-false
  instruction: Визначте, чи ці твердження правдиві
  items:
  - statement: В Україні з легкою застудою потрібно відразу їхати в лікарню.
    correct: false
    explanation: З легкою застудою чи для планової консультації звертаються до поліклініки,
      а лікарня — для важких станів та операцій.
  - statement: Слово «нежить» (runny nose) в українській мові належить до чоловічого
      роду.
    correct: true
    explanation: Так, це іменник чоловічого роду другої відміни (м'яка група), тому
      ми кажемо «сильний нежить».
  - statement: Англійську фразу «I have a headache» українською найкраще перекласти
      як «Я маю головний біль».
    correct: false
    explanation: 'Такий переклад є калькою і звучить штучно. Природно сказати: «У
      мене болить голова».'
  - statement: Слова «ліки» та «краплі» в медичному значенні існують лише у формі
      множини.
    correct: true
    explanation: Це так звані Pluralia Tantum — іменники, що не мають форми однини.
      Тому ми кажемо «ці дорогі ліки».
  - statement: Якщо людина працює в поліклініці і приймає пацієнтів, її професія називається
      «доктор».
    correct: false
    explanation: Ця професія називається «лікар». Слово «доктор» позначає лише академічний
      чи науковий ступінь.
  - statement: У словах «біль» та «ніс» звук [і] в закритому складі змінюється на
      [о] у відкритому (болю, носа).
    correct: true
    explanation: Так, це класичне історичне чергування [і] з [о] в українській мові.
