version: '1.0'
module: health-at-the-doctor
level: b1
inline:
- id: match-medical-families
  type: match-up
  instruction: З'єднайте пов'язані спільнокореневі слова
  pairs:
  - left: лікар
    right: лікувати
  - left: біль
    right: болить
  - left: здоров'я
    right: здоровий
  - left: ніс
    right: нежить
  - left: око
    right: в оці
  - left: аптека
    right: аптекар
- id: doctor-patient-cases
  type: fill-in
  instruction: Вставте правильну форму
  items:
  - sentence: Пацієнт скаржиться на ____.
    answer: сильний біль
    options:
    - сильний біль
    - сильного болю
    - сильному болю
  - sentence: Мій дідусь зараз лікується від ____.
    answer: високого тиску
    options:
    - високий тиск
    - високого тиску
    - високому тиску
  - sentence: Восени багато людей хворіють на ____.
    answer: грип
    options:
    - грип
    - грипом
    - грипу
  - sentence: Я купив в аптеці ліки від ____.
    answer: головного болю
    options:
    - головний біль
    - головного болю
    - головному болю
  - sentence: Моя дитина часто хворіє на ____.
    answer: застуду
    options:
    - застуда
    - застуду
    - застудою
  - sentence: Вона постійно скаржиться на ____.
    answer: слабкість
    options:
    - слабкість
    - слабкості
    - слабкістю
- id: match-specialists
  type: quiz
  instruction: Оберіть правильного лікаря для кожного пацієнта
  items:
  - question: У мене дуже болить зуб, і випала пломба.
    options:
    - хірург
    - терапевт
    - стоматолог
    - окуліст
    correct: 2
  - question: У мого п'ятирічного сина висока температура і сильний кашель.
    options:
    - хірург
    - педіатр
    - терапевт
    - стоматолог
    correct: 1
  - question: Я погано бачу текст, мені потрібні нові окуляри.
    options:
    - педіатр
    - терапевт
    - хірург
    - окуліст
    correct: 3
  - question: Мені потрібно накласти шви на глибоку рану.
    options:
    - хірург
    - педіатр
    - терапевт
    - окуліст
    correct: 0
  - question: У мене загальна слабкість, нежить і болить горло. До кого йти спочатку?
    options:
    - хірург
    - окуліст
    - стоматолог
    - терапевт
    correct: 3
  - question: Мені потрібно зробити планову операцію на серці.
    options:
    - стоматолог
    - терапевт
    - окуліст
    - хірург
    correct: 3
workbook:
- type: match-up
  instruction: З'єднайте слова з їхніми спільнокореневими формами
  pairs:
  - left: лікувати
    right: ліки
  - left: біль
    right: безболісний
  - left: вухо
    right: у вусі
  - left: одужати
    right: одужання
  - left: скаржитися
    right: скарга
  - left: запалення
    right: запалилися
- type: fill-in
  instruction: Оберіть правильний відмінок
  items:
  - sentence: Ці краплі від ____ дуже ефективні.
    answer: нежитю
    options:
    - нежить
    - нежитю
    - нежитем
  - sentence: Пацієнт скаржиться на ____.
    answer: високу температуру
    options:
    - висока температура
    - високу температуру
    - високої температури
  - sentence: Ми успішно лікуємося від ____.
    answer: алергії
    options:
    - алергія
    - алергії
    - алергію
  - sentence: Він захворів на ____.
    answer: вірусну інфекцію
    options:
    - вірусна інфекція
    - вірусну інфекцію
    - вірусної інфекції
  - sentence: Я попросив в аптеці сироп від ____.
    answer: кашлю
    options:
    - кашель
    - кашлю
    - кашлем
  - sentence: Вони скаржаться на ____ у шлунку.
    answer: біль
    options:
    - біль
    - болю
    - болем
- type: unjumble
  instruction: Відновіть правильний порядок слів у реченні
  items:
  - words:
    - пити
    - сироп?
    - Як
    - треба
    - цей
    - часто
    correct_order:
    - Як
    - часто
    - треба
    - пити
    - цей
    - сироп?
  - words:
    - правильне
    - тут
    - Яке
    - дозування?
    correct_order:
    - Яке
    - тут
    - правильне
    - дозування?
  - words:
    - потрібно
    - аналізи.
    - Мені
    - здати
    - терміново
    correct_order:
    - Мені
    - терміново
    - потрібно
    - здати
    - аналізи.
  - words:
    - таблетці
    - по
    - на
    - день.
    - Приймайте
    - одній
    - тричі
    correct_order:
    - Приймайте
    - по
    - одній
    - таблетці
    - тричі
    - на
    - день.
  - words:
    - ліки
    - Це
    - болю.
    - ефективні
    - від
    - дуже
    correct_order:
    - Це
    - дуже
    - ефективні
    - ліки
    - від
    - болю.
  - words:
    - в
    - наявності.
    - зараз
    - препарати
    - є
    - Ці
    correct_order:
    - Ці
    - препарати
    - зараз
    - є
    - в
    - наявності.
- type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я купила в аптеці ліки для кашлю.
    error: для
    correction: від
    error_type: word
    options:
    - від
    - на
    - з
    explanation: Правильно казати «ліки від» (чого?), а не «для».
  - sentence: Вона скаржиться про головний біль.
    error: про
    correction: на
    error_type: word
    options:
    - на
    - за
    - від
    explanation: Правильне керування — «скаржитися на» щось.
  - sentence: Ці краплі допомагають для нежитю.
    error: для
    correction: від
    error_type: word
    options:
    - від
    - проти
    - на
    explanation: Ми використовуємо прийменник «від» разом із назвами ліків (краплі
      від нежитю).
  - sentence: Пацієнтка скаржиться з високої температури.
    error: з
    correction: на
    error_type: word
    options:
    - на
    - від
    - про
    explanation: 'Слід запам''ятати: скаржитися можна лише «на» щось.'
  - sentence: Ми зараз лікуємося від грип.
    error: грип
    correction: грипу
    error_type: word
    options:
    - грипу
    - грипом
    - на грип
    explanation: Після прийменника «від» потрібно використовувати родовий відмінок
      (чого? грипу).
  - sentence: Мені потрібен один лік.
    error: один лік
    correction: одні ліки
    error_type: phrase
    options:
    - одні ліки
    - одна ліка
    - одно ліки
    explanation: Слово «ліки» вживається виключно у множині (pluralia tantum).
