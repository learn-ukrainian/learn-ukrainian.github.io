version: '1.0'
module: health-at-the-doctor
level: b1
inline:
- id: match-medical-families
  type: match-up
  instruction: З'єднайте пов'язані спільнокореневі слова
  pairs:
  - left: лікар
    right: лікувати
  - left: біль
    right: болить
  - left: здоров'я
    right: здоровий
  - left: ніс
    right: нежить
  - left: око
    right: в оці
  - left: аптека
    right: аптекар
- id: doctor-patient-cases
  type: fill-in
  instruction: Вставте правильну форму
  items:
  - sentence: Пацієнт скаржиться на ____.
    answer: сильний біль
    options:
    - сильний біль
    - сильного болю
    - сильному болю
  - sentence: Мій дідусь зараз лікується від ____.
    answer: високого тиску
    options:
    - високий тиск
    - високого тиску
    - високому тиску
  - sentence: Восени багато людей хворіють на ____.
    answer: грип
    options:
    - грип
    - грипом
    - грипу
  - sentence: Я купив в аптеці ліки від ____.
    answer: головного болю
    options:
    - головний біль
    - головного болю
    - головному болю
  - sentence: Моя дитина часто хворіє на ____.
    answer: застуду
    options:
    - застуда
    - застуду
    - застудою
  - sentence: Вона постійно скаржиться на ____.
    answer: слабкість
    options:
    - слабкість
    - слабкості
    - слабкістю
- id: match-specialists
  type: quiz
  instruction: Оберіть правильного лікаря для кожного пацієнта
  items:
  - question: У мене дуже болить зуб, і випала пломба.
    options:
    - хірург
    - терапевт
    - стоматолог
    - окуліст
    correct: 2
  - question: У мого п'ятирічного сина висока температура і сильний кашель.
    options:
    - хірург
    - педіатр
    - терапевт
    - стоматолог
    correct: 1
  - question: Я погано бачу текст, мені потрібні нові окуляри.
    options:
    - педіатр
    - терапевт
    - хірург
    - окуліст
    correct: 3
  - question: Мені потрібно накласти шви на глибоку рану.
    options:
    - хірург
    - педіатр
    - терапевт
    - окуліст
    correct: 0
  - question: У мене загальна слабкість, нежить і болить горло. До кого йти спочатку?
    options:
    - хірург
    - окуліст
    - стоматолог
    - терапевт
    correct: 3
  - question: Мені потрібно зробити планову операцію на серці.
    options:
    - стоматолог
    - терапевт
    - окуліст
    - хірург
    correct: 3
