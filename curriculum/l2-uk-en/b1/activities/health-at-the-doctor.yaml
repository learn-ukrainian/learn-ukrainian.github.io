    - швидкого
    - одужання!
- id: error-correction-medical
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в реченні
  items:
  - sentence: Пацієнт скаржиться від сильний біль у животі.
    error: від
    correction: на
    error_type: word
    options:
    - на
    - з
    - про
    explanation: Скаржитися завжди вимагає прийменника «на» та знахідного відмінка.
  - sentence: Він часто хворіє застудою восени.
    error: застудою
    correction: на застуду
    error_type: construction
    options:
    - на застуду
    - від застуди
    - з застудою
    explanation: В українській мові правильно казати «хворіти на» (плюс знахідний
      відмінок), а не використовувати орудний відмінок.
  - sentence: Дідусь лікується для високого тиску.
    error: для
    correction: від
    error_type: word
    options:
    - від
    - на
    - проти
    explanation: Дієслово «лікуватися» вимагає прийменника «від» та родового відмінка.
  - sentence: У мене дуже сильна біль.
    error: сильна
    correction: сильний
    error_type: word
    options:
    - сильний
    - сильне
    - сильні
    explanation: Слово «біль» в українській мові завжди чоловічого роду.
  - sentence: Він має жахливу нежить.
    error: жахливу
    correction: жахливий
    error_type: word
    options:
    - жахливий
    - жахливе
    - жахливі
    explanation: Слово «нежить» в українській мові — це іменник чоловічого роду.
  - sentence: Сьогодні я хворію вірусом.
    error: вірусом
    correction: на вірус
    error_type: construction
    options:
    - на вірус
    - від вірусу
    - з вірусом
    explanation: Правильна конструкція — «хворіти на» + знахідний відмінок.
workbook:
- type: match-up
  instruction: З'єднайте слова з їхніми спільнокореневими формами
  pairs:
  - left: лікувати
    right: ліки
  - left: біль
    right: безболісний
  - left: вухо
    right: у вусі
  - left: одужати
    right: одужання
  - left: скаржитися
    right: скарга
  - left: запалення
    right: запалилися
- type: fill-in
  instruction: Оберіть правильний відмінок
  items:
  - sentence: Ці краплі від ____ дуже ефективні.
    answer: нежитю
    options:
    - нежить
    - нежитю
    - нежитем
  - sentence: Пацієнт скаржиться на ____.
    answer: високу температуру
    options:
    - висока температура
    - високу температуру
    - високої температури
  - sentence: Ми успішно лікуємося від ____.
    answer: алергії
    options:
    - алергія
    - алергії
    - алергію
  - sentence: Він захворів на ____.
    answer: вірусну інфекцію
    options:
    - вірусна інфекція
    - вірусну інфекцію
    - вірусної інфекції
  - sentence: Я попросив в аптеці сироп від ____.
    answer: кашлю
    options:
    - кашель
    - кашлю
    - кашлем
  - sentence: Вони скаржаться на ____ у шлунку.
    answer: біль
    options:
    - біль
    - болю
    - болем
