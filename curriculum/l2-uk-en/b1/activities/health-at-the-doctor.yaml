- id: order-doctor-dialogue
  type: order
  instruction: Розставте репліки діалогу в правильному порядку
  items:
  - — Доброго дня! Проходьте, сідайте. На що ви скаржитеся сьогодні?
  - — Добрий день. У мене дуже сильно болить горло і тримається висока температура.
  - — Розумію. Скажіть, як давно ви так погано почуваєтеся?
  - — Усе почалося ще в понеділок вранці. З'явилася неймовірна слабкість.
  - — Відкрийте рота і скажіть «а-а-а». Так, горло запалене. Це вірусна застуда.
  - — Що мені тепер робити? Як правильно лікуватися?
  - — Я випишу вам електронний рецепт. Обов'язково пийте багато теплого чаю.
  - — Дуже дякую вам за допомогу, лікарю!
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
