version: '1.0'
module: motion-prefixes-arrival
level: b1
inline:
- id: match-perfective-imperfective
  type: match-up
  instruction: З'єднайте дієслова доконаного виду з їхніми парами недоконаного виду
  pairs:
  - left: прийти
    right: приходити
  - left: приїхати
    right: приїздити
  - left: принести
    right: приносити
  - left: дійти
    right: доходити
  - left: доїхати
    right: доїздити
  - left: прилетіти
    right: прилітати
  - left: прибігти
    right: прибігати
  - left: привести
    right: приводити
- id: fill-in-arrival-past
  type: fill-in
  instruction: Вставте правильне дієслово з префіксом «при-», описуючи факт успішного
    прибуття
  items:
  - sentence: Ми ____ пішки з вокзалу, бо була гарна погода.
    answer: прийшли
    options:
    - прийшли
    - приїхали
    - дійшли
  - sentence: Тітка Оксана ____ літаком з Києва ще вчора.
    answer: прилетіла
    options:
    - прилетіла
    - долетіла
    - приїхала
  - sentence: Наш новий кур'єр нарешті ____ цю велику коробку.
    answer: привіз
    options:
    - привіз
    - довіз
    - приніс
  - sentence: Мій собака перший ____ до нас вітатися!
    answer: прибіг
    options:
    - прибіг
    - добіг
    - прийшов
  - sentence: Ми ____ вам смачний торт на десерт!
    answer: привезли
    options:
    - привезли
    - довезли
    - принесли
  - sentence: Наші гості ____ на таксі десять хвилин тому.
    answer: приїхали
    options:
    - приїхали
    - доїхали
    - дійшли
- id: group-sort-prefixes
  type: group-sort
  instruction: 'Розподіліть дієслова за їхнім фокусом: прибуття (факт появи) чи досягнення
    мети (подолана дистанція)'
  groups:
  - label: Прибуття (при-)
    items:
    - прийти
    - приїхати
    - прилетіти
    - прибігти
    - принести
    - привести
    - привезти
  - label: Досягнення мети (до-)
    items:
    - дійти
    - доїхати
    - долетіти
    - добігти
    - донести
    - довести
    - довезти
- id: fill-in-reaching-future
  type: fill-in
  instruction: Вставте правильне дієслово з префіксом «до-» у майбутньому часі, акцентуючи
    на досягненні мети
  items:
  - sentence: Завтра я обов'язково ____ до Києва поїздом за п'ять годин.
    answer: доїду
    options:
    - доїду
    - приїду
    - доїдеш
  - sentence: Ми довго йтимемо, але точно ____ до вершини гори.
    answer: дійдемо
    options:
    - дійдемо
    - прийдемо
    - доїдемо
  - sentence: Ти впевнений, що ____ до зупинки за п'ять хвилин?
    answer: добіжиш
    options:
    - добіжиш
    - прибіжиш
    - дійдеш
  - sentence: Наші спортсмени ____ до фінішу найпершими.
    answer: добіжать
    options:
    - добіжать
    - прибіжать
    - дійдуть
  - sentence: Досвідчений гід безпечно ____ групу до табору.
    answer: доведе
    options:
    - доведе
    - приведе
    - донесе
  - sentence: Великий літак успішно ____ до Торонто ввечері.
    answer: долетить
    options:
    - долетить
    - прилетить
    - дійде
- id: quiz-semantic-choice
  type: quiz
  instruction: Оберіть найприродніший варіант, звертаючи увагу на контекст та префікси
  items:
  - question: Як найприродніше запитати друга про його успішну подорож?
    options:
    - Як ти приїхав?
    - Як ти доїхав?
    - Як була твоя дорога?
    - Як ти їхав?
    correct: 1
  - question: Яке дієслово найбільше акцентує увагу на подоланій відстані та витрачених
      зусиллях?
    options:
    - дійти
    - дойти
    - прийти
    - приходити
    correct: 0
  - question: 'Коли ви заходите в гості до друзів, ви скажете:'
    options:
    - Я дійшов
    - Я приїхав
    - Я прийшов
    - Я доходив
    correct: 2
  - question: Кур'єр піднявся на п'ятий поверх пішки без ліфта з важкою коробкою.
      Він...
    options:
    - довіз посилку до дверей
    - привіз посилку до дверей
    - приніс посилку в двері
    - доніс посилку до дверей
    correct: 3
  - question: Маленький птах раптово з'явився у вас на балконі. Ви скажете, що птах...
    options:
    - прилетів
    - долетів
    - літав
    - прибіг
    correct: 0
  - question: Марафонець дуже втомився після травми, але зміг...
    options:
    - прибігти на фініш
    - прийти до фінішу
    - добігти до фінішу
    - дійти до фінішу
    correct: 2
  - question: 'Ви їхали машиною цілий день і були дуже виснажені. Ви скажете:'
    options:
    - Ми ледве доїхали
    - Ми успішно приїхали
    - Ми приїжджали
    - Ми довго приїхали
    correct: 0
  - question: Який прийменник завжди вимагають дієслова з префіксом «до-»?
    options:
    - до
    - в
    - на
    - з
    correct: 0
- id: error-correction-arrival
  type: error-correction
  instruction: Знайдіть і виправте помилку у вживанні префіксів руху або прийменників
  items:
  - sentence: Він доїхав в Київ вчора.
    error: в
    correction: до
    error_type: word
    options:
    - до
    - на
    - з
    explanation: Дієслова досягнення мети з префіксом «до-» вимагають прийменника
      «до».
  - sentence: Ми довго йшли і нарешті дійшли на вершину гори.
    error: на
    correction: до
    error_type: word
    options:
    - до
    - в
    - під
    explanation: З дієсловом «дійти» ми завжди використовуємо прийменник «до».
  - sentence: Коли гості дійшли в наш дім, ми пили чай.
    error: дійшли
    correction: прийшли
    error_type: word
    options:
    - прийшли
    - доїхали
    - приїхали
    explanation: Тут важливий лише факт появи гостей (візит), а не їхня довга дистанція.
  - sentence: 'Після дуже довгої та важкої дороги я втомлено сказав: ми нарешті приїхали
      до мети!'
    error: приїхали
    correction: доїхали
    error_type: word
    options:
    - доїхали
    - дійшли
    - прийшли
    explanation: Щоб підкреслити подолану велику дистанцію, використовуємо префікс
      «до-».
  - sentence: Листоноша доносить свіжі газети кожного ранку.
    error: доносить
    correction: приносить
    error_type: word
    options:
    - приносить
    - носить
    - несе
    explanation: Для регулярної доставки (факту появи) використовуємо слово «приносить».
  - sentence: Мій собака добігає до мене, коли я відкриваю двері квартири.
    error: добігає
    correction: прибігає
    error_type: word
    options:
    - прибігає
    - бігає
    - приходить
    explanation: Собака радісно і несподівано з'являється (наближається), тут потрібен
      префікс «при-».
- id: free-write-travel-story
  type: essay-response
  prompt: Напишіть коротку розповідь (5-7 речень) про вашу подорож до іншого міста
    або країни. Обов'язково використайте щонайменше два дієслова з префіксом «при-»
    (наприклад, приїхати, прилетіти) та два дієслова з префіксом «до-» (наприклад,
    доїхати, дійти). Пам'ятайте про правильні прийменники («в/на» для «при-» та «до»
    для «до-»).
  min_words: 50
  model_answer: Минулого літа ми вирішили поїхати в гори. Ми довго їхали автомобілем
    і нарешті доїхали до Карпат. Наш готель був дуже високо, тому ми мусили дійти
    до нього пішки. Коли ми прийшли в нашу садибу, нас радісно зустріли господарі.
    Згодом туди приїхали наші друзі з іншого міста. Увечері веселий собака прибіг
    до нас на подвір'я. Це була чудова зустріч після того, як ми успішно доїхали до
    нашої великої мети.
workbook:
- type: true-false
  instruction: Визначте, чи є ці твердження про префікси правильними
  items:
  - statement: Префікс «до-» завжди вимагає обов'язкового використання прийменника
      «до» разом із родовим відмінком.
    correct: true
    explanation: 'Так, наприклад: доїхати до міста, дійти до вершини, долетіти до
      лісу.'
  - statement: Дієслова «приходити» і «доходити» — це дієслова доконаного виду.
    correct: false
    explanation: Ні, вони означають регулярну, повторювану дію, тому це дієслова недоконаного
      виду.
  - statement: Запитання «Як ти доїхав?» є найбільш природною українською фразою після
      чиєїсь довгої подорожі.
    correct: true
    explanation: Так, воно фокусується на успішному досягненні кінцевої мети.
  - statement: 'Слово «принести» має наголос на першому складі: прИнести.'
    correct: false
    explanation: 'Наголос у цьому слові завжди падає на останній склад: принестИ.'
  - statement: Щоб сказати, що ви успішно повернулися у своє житло, треба сказати
      «я прийшов додому».
    correct: true
    explanation: 'Це важливий виняток: ми використовуємо прислівник «додому» без додаткових
      прийменників.'
  - statement: Префікс «при-» акцентує увагу на довгій відстані та великих витрачених
      зусиллях.
    correct: false
    explanation: Префікс «при-» фокусується лише на самому факті прибуття (появи).
      На дистанції акцентує префікс «до-».
- type: translate
  instruction: Оберіть найточніший переклад англійських речень, звертаючи увагу на
    контекст та префікси
  items:
  - source: The courier delivered the package all the way to the door.
    options:
    - text: Кур'єр доніс посилку до дверей.
      correct: true
    - text: Кур'єр приніс посилку в двері.
      correct: false
    - text: Кур'єр доніс посилку в двері.
      correct: false
  - source: We finally reached the summit.
    options:
    - text: Ми нарешті дійшли до вершини.
      correct: true
    - text: Ми нарешті прийшли до вершини.
      correct: false
    - text: Ми нарешті дійшли на вершину.
      correct: false
  - source: The bird flew onto the balcony.
    options:
    - text: Птах прилетів на балкон.
      correct: true
    - text: Птах долетів до балкона.
      correct: false
    - text: Птах прилетів до балкона.
      correct: false
  - source: He safely arrived in Lviv.
    options:
    - text: Він приїхав до Львова.
      correct: true
    - text: Він доїхав на Львів.
      correct: false
    - text: Він приїхав на Львів.
      correct: false
  - source: My dog always comes running to the kitchen.
    options:
    - text: Мій собака завжди прибігає на кухню.
      correct: true
    - text: Мій собака завжди добігає до кухні.
      correct: false
    - text: Мій собака завжди бігає в кухню.
      correct: false
  - source: How was your trip? (idiomatic greeting)
    options:
    - text: Як ти доїхав?
      correct: true
    - text: Як була твоя поїздка?
      correct: false
    - text: Як ти приїхав?
      correct: false
- type: order
  instruction: Розставте репліки діалогу з кур'єром у правильному логічному порядку
  items:
  - — Добрий день! Це ваш кур'єр. Я вже під'їхав до вашого будинку.
  - — Добрий день! Чудово, я чекаю на посилку.
  - — Ви можете принести її на п'ятий поверх?
  - — На жаль, ліфт не працює. Я донесу її до ваших дверей сходами.
  - — Дуже вам дякую, що дійшли аж сюди!
  - — Будь ласка, ось ваша велика коробка. Гарного дня!
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
