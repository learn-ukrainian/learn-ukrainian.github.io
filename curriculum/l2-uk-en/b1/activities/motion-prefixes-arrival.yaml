version: '1.0'
module: motion-prefixes-arrival
level: b1
inline: []
workbook:
- id: quiz-prefixes
  type: quiz
  instruction: Оберіть правильне дієслово залежно від контексту (проста поява чи досягнення
    мети після довгого шляху).
  items:
  - question: Ми йшли цілий день і нарешті _____ до вершини гори.
    options:
    - дійшли
    - прийшли
    - доїхали
    - приїхали
    correct: 0
  - question: Мій літак _____ в аеропорт рівно о сьомій годині.
    options:
    - прилетів
    - долетів
    - приїхав
    - доїхав
    correct: 0
  - question: Через жахливий затор ми ледве _____ до вокзалу.
    options:
    - доїхали
    - приїхали
    - дійшли
    - прийшли
    correct: 0
  - question: Наш улюблений дядько щойно _____ до нас у гості.
    options:
    - приїхав
    - доїхав
    - прийшов
    - дійшов
    correct: 0
  - question: Я дуже втомився, поки _____ цей важкий рюкзак на п'ятий поверх.
    options:
    - доніс
    - приніс
    - довіз
    - привіз
    correct: 0
  - question: Листоноша _____ мені свіжу газету.
    options:
    - приніс
    - доніс
    - привіз
    - довіз
    correct: 0
  - question: Я ледве _____ до ліжка після важкого тренування.
    options:
    - дійшов
    - прийшов
    - добіг
    - прибіг
    correct: 0
  - question: Маленький кіт миттєво _____ на кухню, коли почув звук.
    options:
    - прибіг
    - добіг
    - прийшов
    - дійшов
    correct: 0
- id: fill-in-conjugation
  type: fill-in
  instruction: Вставте правильну форму дієслова (теперішній, минулий або майбутній
    час).
  items:
  - sentence: Завтра вранці ми _____ до кордону.
    answer: доїдемо
    options:
    - доїдемо
    - приїдемо
    - доїде
    - приїде
  - sentence: Я сподіваюся, що мій брат скоро _____ до Києва.
    answer: приїде
    options:
    - приїде
    - доїде
    - приїдемо
    - доїдемо
  - sentence: Учора кур'єр _____ мою нову посилку.
    answer: привіз
    options:
    - привіз
    - довіз
    - приніс
    - доніс
  - sentence: Якщо ти будеш бігти так швидко, ти першим _____ до фінішу.
    answer: добіжиш
    options:
    - добіжиш
    - прибіжиш
    - добіжить
    - прибіжить
  - sentence: Ми дуже втомилися, але врешті-решт _____ до нашого готелю.
    answer: дійшли
    options:
    - дійшли
    - прийшли
    - доїхали
    - приїхали
  - sentence: Зазвичай бабуся _____ до нас кожного літа.
    answer: приїздить
    options:
    - приїздить
    - доїжджає
    - приїхала
    - доїхала
  - sentence: Літак із Варшави _____ без жодних запізнень дві години тому.
    answer: прилетів
    options:
    - прилетів
    - долетів
    - прилітає
    - долітає
  - sentence: Туристична група _____ до іншого берега річки перед заходом сонця.
    answer: допливла
    options:
    - допливла
    - припливла
    - допливе
    - припливе
- id: match-up-aspect
  type: match-up
  instruction: З'єднайте дієслова доконаного виду (результат) з їхніми парами недоконаного
    виду (процес або регулярна дія).
  pairs:
  - left: прийти
    right: приходити
  - left: дійти
    right: доходити
  - left: приїхати
    right: приїздити
  - left: доїхати
    right: доїжджати
  - left: принести
    right: приносити
  - left: донести
    right: доносити
  - left: прилетіти
    right: прилітати
  - left: долетіти
    right: долітати
- id: group-sort-prefixes
  type: group-sort
  instruction: Розподіліть дієслова руху залежно від їхнього значення (проста поява
    на місці чи подолання довгого шляху).
  groups:
  - label: Прибуття (при-)
    items:
    - прийти
    - приїхати
    - прибігти
    - прилетіти
    - принести
  - label: Досягнення (до-)
    items:
    - дійти
    - доїхати
    - добігти
    - долетіти
    - донести
- id: error-correction-prefixes
  type: error-correction
  instruction: Знайдіть і виправте помилку у використанні префікса або прийменника
    в реченнях про подорож.
  items:
  - sentence: Ми довго йшли і нарешті прийшли до вершини гори.
    error: прийшли
    correction: дійшли
    error_type: word
    options:
    - дійшли
    - доїхали
    - приїхали
    - долетіли
    explanation: Якщо акцент на довгому та важкому процесі подолання дистанції, ми
      використовуємо префікс «до-» (дійти).
  - sentence: Мій літак долетів в аеропорт рівно за розкладом.
    error: долетів
    correction: прилетів
    error_type: word
    options:
    - прилетів
    - дійшов
    - прийшов
    - долетів
    explanation: Коли ми просто констатуємо факт появи в аеропорту без акценту на
      самому шляху, використовуємо префікс «при-».
  - sentence: Водій таксі успішно довіз нас в готель.
    error: в
    correction: до
    error_type: word
    options:
    - до
    - на
    - в
    - біля
    explanation: Дієслова з префіксом «до-» завжди вимагають після себе прийменника
      «до» + родовий відмінок («відлуння префікса»).
  - sentence: Дядько Олег нарешті приїхав до нашого села після важкої дороги під дощем.
    error: приїхав
    correction: доїхав
    error_type: word
    options:
    - доїхав
    - дійшов
    - прийшов
    - прилетів
    explanation: Складна дорога та подолання великої відстані вимагають дієслова «доїхати».
  - sentence: Кожного ранку листоноша доносить нам свіжі газети.
    error: доносить
    correction: приносить
    error_type: word
    options:
    - приносить
    - привозить
    - доводить
    - доносить
    explanation: Листоноша просто доставляє речі (поява об'єкта), тому потрібно використовувати
      дієслово «приносити».
  - sentence: Туристи ледве прийшли до свого табору через сильний снігопад.
    error: прийшли
    correction: дійшли
    error_type: word
    options:
    - дійшли
    - доїхали
    - допливли
    - прийшли
    explanation: Оскільки туристи йшли важко («ледве»), потрібно підкреслити подолання
      дистанції словом «дійшли».
- id: essay-response-travel
  type: essay-response
  prompt: Напишіть коротку розповідь (70-100 слів) про вашу недавню подорож або поїздку.
    Опишіть ваш маршрут і те, як ви діставалися до різних локацій. У своєму тексті
    ви повинні використати щонайменше чотири дієслова з префіксом «при-» та три дієслова
    з префіксом «до-».
  min_words: 50
  model_answer: Минулого місяця я вирішив поїхати до Одеси на вихідні. Я приїхав на
    залізничний вокзал дуже рано і довго чекав на свій потяг. Ми їхали всю ніч і вранці
    нарешті доїхали до сонячного міста біля моря. Коли я вийшов з вагона, я швидко
    прийшов на автобусну зупинку. Мій автобус приїхав через п'ять хвилин. Водій обережно
    довіз мене до центру міста. Я вийшов біля міського парку і пішки дійшов до свого
    невеликого готелю. Коли я відкрив двері, до мене радісно прибіг великий собака
    власника. Я залишив свої речі в кімнаті і пішов гуляти.
  evaluation_criteria:
  - Використано щонайменше 4 дієслова з префіксом «при-».
  - Використано щонайменше 3 дієслова з префіксом «до-».
  - Правильно вжито прийменник «до» після дієслів з префіксом «до-».
  - Логічний та зв'язний опис маршруту подорожі.
