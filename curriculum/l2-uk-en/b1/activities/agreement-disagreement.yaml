        - 'втратити'
        - 'сховати'
        - 'показати'
    - id: 6
      answer: 'спростовувати'
      options:
        - 'спростовувати'
        - 'погоджувати'
        - 'визнавати'
        - 'підтримувати'
    - id: 7
      answer: 'факти'
      options:
        - 'факти'
