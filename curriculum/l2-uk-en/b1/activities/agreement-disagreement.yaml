- type: quiz
  title: 'Перевірка розуміння'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'Який вираз означає головну причину конфлікту або суперечки?'
      options:
        - text: 'яблуко розбрату'
          correct: false
        - text: 'яблуко незгоди'
          correct: true
        - text: 'камінь згоди'
          correct: false
        - text: 'дерево конфлікту'
          correct: false
      explanation: 'Ідіома яблуко незгоди походить з античної міфології та означає предмет суперечки.'
    - question: 'Як правильно висловити згоду, якщо говорить жінка?'
      options:
        - text: 'Я є згоден.'
          correct: false
        - text: 'Я згоден.'
          correct: false
        - text: 'Я згодна.'
          correct: true
        - text: 'Я є згодна.'
          correct: false
      explanation: 'Жінки використовують форму з закінченням -а — я згодна.'
    - question: 'Яке слово слід використовувати для оцінки правильності математичної задачі?'
      options:
        - text: 'вірно'
          correct: false
        - text: 'правильно'
          correct: true
        - text: 'віддано'
          correct: false
        - text: 'чесно'
          correct: false
      explanation: 'Слово правильно стосується логіки та правил.'
    - question: 'Який сполучник допомагає висловити часткову згоду в дискусії?'
      options:
        - text: 'хоча'
          correct: true
        - text: 'тому що'
          correct: false
        - text: 'щоб'
          correct: false
        - text: 'ніби'
          correct: false
      explanation: 'Сполучник хоча дозволяє поєднати згоду та застереження.'
    - question: 'Що означає українська фраза ''не можу не погодитися''?'
      options:
        - text: 'Я категорично проти.'
          correct: false
        - text: 'Я абсолютно згоден.'
          correct: true
        - text: 'Я сумніваюся.'
          correct: false
        - text: 'Я частково згоден.'
          correct: false
      explanation: 'Це подвійна заперечна конструкція, яка означає сильну згоду.'
    - question: 'Яке дієслово використовується для офіційного відкидання логічних аргументів?'
      options:
        - text: 'спростовувати'
          correct: true
        - text: 'погоджуватися'
          correct: false
        - text: 'визнавати'
          correct: false
        - text: 'дійти'
          correct: false
      explanation: 'У формальних дебатах використовують дієслово спростовувати.'
    - question: 'Що в сучасному молодіжному сленгу означає символ ''+1''?'
      options:
        - text: 'Я додаю одного друга.'
          correct: false
        - text: 'Я підтримую цю ідею.'
          correct: true
        - text: 'Я не згоден.'
          correct: false
        - text: 'Я подумаю про це.'
          correct: false
      explanation: 'У месенджерах +1 означає підтримку ідеї або згоду приєднатися.'
    - question: 'Яке слово є типовим маркером абсолютної, стовідсоткової згоди?'
      options:
        - text: 'безперечно'
          correct: true
        - text: 'частково'
          correct: false
        - text: 'можливо'
          correct: false
        - text: 'ймовірно'
          correct: false
      explanation: 'Слово безперечно підкреслює, що сумнівів немає.'

