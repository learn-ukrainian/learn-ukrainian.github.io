- type: fill-in
  title: 'Вибір правильного слова в дискусії'
  instruction: 'Оберіть найбільш влучне слово для кожної ситуації.'
  items:
    - sentence: 'Нам потрібно _____ згоди щодо нового проєкту до п''ятниці.'
      answer: 'дійти'
      options:
        - 'піти'
        - 'дійти'
        - 'знайти'
        - 'зробити'
    - sentence: 'Експерт категорично _____ можливість швидкого завершення кризи.'
      answer: 'заперечував'
      options:
        - 'погоджувався'
        - 'заперечував'
        - 'визнавав'
        - 'спростовував'
    - sentence: 'Питання фінансування стало справжнім яблуком _____ між двома відділами.'
      answer: 'незгоди'
      options:
        - 'згоди'
        - 'незгоди'
        - 'суперечки'
        - 'компромісу'
    - sentence: 'Я _____ поділяю вашу думку, але фінансова частина викликає запитання.'
      answer: 'частково'
      options:
        - 'абсолютно'
        - 'безумовно'
        - 'частково'
        - 'безперечно'
    - sentence: 'Адвокат зміг повністю _____ всі звинувачення проти свого клієнта.'
      answer: 'спростувати'
      options:
        - 'визнати'
        - 'погодити'
        - 'спростувати'
        - 'заперечити'
    - sentence: 'Після тривалої дискусії він був змушений _____ правоту свого опонента.'
      answer: 'визнати'
      options:
        - 'визнати'
        - 'спростувати'
        - 'заперечити'
        - 'погодити'
    - sentence: 'Це рішення було прийнято за взаємною _____ обох сторін.'
      answer: 'згодою'
      options:
        - 'незгодою'
        - 'згодою'
        - 'правотою'
        - 'дискусією'
    - sentence: 'Я не стану _____, що цей рік був надзвичайно складним.'
      answer: 'заперечувати'
      options:
        - 'погоджуватися'
        - 'визнавати'
        - 'заперечувати'
        - 'спростовувати'
    - sentence: 'Ми _____ підтримуємо вашу ініціативу щодо захисту довкілля.'
      answer: 'безумовно'
      options:
        - 'частково'
        - 'безумовно'
        - 'категорично'
        - 'вірно'
    - sentence: 'Його мовчазна _____ свідчила про небажання сперечатися.'
      answer: 'згода'
      options:
        - 'згода'
        - 'незгода'
        - 'правота'
        - 'думка'

- type: error-correction
  title: 'Виправте типові помилки'
  instruction: 'Знайдіть і виправте граматичні та лексичні помилки в реченнях.'
  items:
    - sentence: 'Я є згоден з вашою пропозицією.'
      error: 'є згоден'
      answer: 'згоден'
      options:
        - 'є згоден'
        - 'згоден'
        - 'був згоден'
        - 'буду згоден'
      explanation: 'В українській мові дієслово-зв''язка бути у теперішньому часі опускається.'
    - sentence: 'Марія сказала, що вона згоден працювати на вихідних.'
      error: 'згоден'
      answer: 'згодна'
      options:
        - 'згоден'
        - 'згодна'
        - 'згодні'
        - 'є згодна'
      explanation: 'Оскільки Марія — жінка, короткий прикметник має закінчуватися на -а (згодна).'
    - sentence: 'Ви абсолютно вірно відповіли на запитання тесту.'
      error: 'вірно'
      answer: 'правильно'
      options:
        - 'вірно'
        - 'правильно'
        - 'згідно'
        - 'правдиво'
      explanation: 'Слово вірно означає емоційну відданість. Для оцінки логіки використовується правильно.'
    - sentence: 'Собака правильно чекав свого господаря біля магазину.'
      error: 'правильно'
      answer: 'вірно'
      options:
        - 'правильно'
        - 'вірно'
        - 'правдиво'
        - 'точно'
      explanation: 'Тут ідеться про відданість, тому потрібно використовувати слово вірно.'
    - sentence: 'Ми є згодні підписати цей важливий контракт.'
      error: 'є згодні'
      answer: 'згодні'
      options:
        - 'є згодні'
        - 'згодні'
        - 'згоден'
        - 'згодна'
      explanation: 'У теперішньому часі дієслово є перед згодні не вживається.'
    - sentence: 'Директор зазначила, що вона згоден з висновками звіту.'
      error: 'згоден'
      answer: 'згодна'
      options:
        - 'згоден'
        - 'згодна'
        - 'згодні'
        - 'погоджується'
      explanation: 'Директор у цьому реченні жіночого роду (зазначила), тому форма має бути згодна.'
    - sentence: 'Ваші розрахунки бюджету абсолютно вірні.'
      error: 'вірні'
      answer: 'правильні'
      options:
        - 'вірні'
        - 'правильні'
        - 'правдиві'
        - 'згодні'
      explanation: 'Математичні розрахунки можуть бути лише правильними, а не відданими (вірними).'
    - sentence: 'Ти вчинив дуже правильно, коли залишився підтримувати команду.'
      error: 'правильно'
      answer: 'вірно'
      options:
        - 'правильно'
        - 'вірно'
        - 'правдиво'
        - 'згідно'
      explanation: 'Тут акцент на емоційній відданості та принципах, тому краще сказати вірно.'

