- type: true-false
  title: 'Правила дискусії'
  instruction: 'Визначте, чи є ці твердження правдивими.'
  items:
    - statement: 'В українській культурі дискусія часто сприймається як інтелектуальний спорт.'
      correct: true
      explanation: 'Українці люблять дискутувати і вважають це нормальним процесом пошуку істини.'
    - statement: 'Використання прямого «ні» є найкращим способом зберегти гарні стосунки з колегами.'
      correct: false
      explanation: 'Пряме «ні» може звучати агресивно, краще використовувати стратегію м''якої відмови.'
    - statement: 'Конструкція «Я є згоден» є граматично правильною в сучасній українській мові.'
      correct: false
      explanation: 'Дієслово «є» в теперішньому часі потрібно опускати.'
    - statement: 'Чоловіки повинні використовувати форму «згоден», а жінки — «згодна».'
      correct: true
      explanation: 'Короткий прикметник обов''язково має узгоджуватися зі статтю мовця.'
    - statement: 'Слово «вірно» слід використовувати для оцінки математичних розрахунків.'
      correct: false
      explanation: 'Для логіки та розрахунків використовується слово «правильно».'
    - statement: 'Фраза «Цікава думка, однак...» допомагає пом''якшити вашу відмову.'
      correct: true
      explanation: 'Це класичний приклад дипломатичної незгоди, яка зберігає повагу до опонента.'
    - statement: 'Дієслово «спростовувати» означає підтверджувати чужу думку.'
      correct: false
      explanation: 'Спростовувати означає доводити помилковість чужої думки.'
    - statement: 'Сполучник «хоча» допомагає висловити часткову згоду.'
      correct: true
      explanation: '«Хоча» дозволяє визнати позитивний аспект і одночасно висловити сумнів.'

