- type: quiz
  title: 'Діагностичний тест: Спосіб, напрямок і час'
  items:
  - question: Яке дієслово означає регулярний рух пішки?
    explanation: Слово 'ходити' використовується для повторюваних дій або звичок без
      використання транспорту.
    options:
    - text: ходити
      correct: true
    - text: йти
      correct: false
    - text: їхати
      correct: false
    - text: їздити
      correct: false
  - question: Що ви скажете, якщо прямо зараз прямуєте до офісу?
    explanation: Односпрямований рух у момент мовлення вимагає дієслова 'йти'.
    options:
    - text: Я йду в офіс.
      correct: true
    - text: Я ходжу в офіс.
      correct: false
    - text: Я їду в офіс.
      correct: false
    - text: Я їжджу в офіс.
      correct: false
  - question: Яке дієслово потрібне для подорожі транспортним засобом?
    explanation: Транспортний засіб завжди вимагає використання 'їхати' або 'їздити'.
    options:
    - text: їхати
      correct: true
    - text: йти
      correct: false
    - text: ходити
      correct: false
    - text: бігти
      correct: false
  - question: Як правильно перекласти англійську фразу 'I cross the street'?
    explanation: Для перетину межі з одного боку на інший використовується префікс
      'пере-'.
    options:
    - text: Я переходжу вулицю.
      correct: true
    - text: Я обходжу вулицю.
      correct: false
    - text: Я входжу на вулицю.
      correct: false
    - text: Я підходжу до вулиці.
      correct: false
  - question: Який префікс позначає рух із закритого простору назовні?
    explanation: Префікс 'ви-' використовується для виходу з приміщень.
    options:
    - text: ви-
      correct: true
    - text: від-
      correct: false
    - text: за-
      correct: false
    - text: до-
      correct: false
  - question: Яке головне значення має префікс 'об-' у дієсловах руху?
    explanation: Він означає обережний рух навколо перешкоди, щоб уникнути її.
    options:
    - text: уникання перешкоди
      correct: true
    - text: подолання перешкоди
      correct: false
    - text: наближення до об'єкта
      correct: false
    - text: віддалення від об'єкта
      correct: false
  - question: Як граматично правильно описати сильний дощ в українській мові?
    explanation: Вислів 'дощ іде' є єдиним граматично вірним способом в українській
      мові.
    options:
    - text: дощ іде
      correct: true
    - text: дощ падає
      correct: false
    - text: дощ робить
      correct: false
    - text: дощ біжить
      correct: false
  - question: Яке дієслово ідеально підходить для речення 'Кожні вихідні ми ... в
      парк'?
    explanation: Слова 'кожні вихідні' вказують на регулярну звичку, тому потрібне
      різноспрямоване 'ходити'.
    options:
    - text: ходимо
      correct: true
    - text: йдемо
      correct: false
    - text: їдемо
      correct: false
    - text: заходимо
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Правда чи міф: Правила простору'
  instruction: Визначте, чи є ці граматичні твердження правильними.
  items:
  - statement: З прийменником 'в' для позначення напрямку (відповідь на питання 'куди?')
      завжди використовується знахідний відмінок.
    correct: true
    explanation: Знахідний відмінок є єдино правильним для вказівки на кінцеву ціль
      напрямку.
  - statement: Дієслово 'ходити' використовується для дії, яка відбувається прямо
      зараз і в одному конкретному напрямку.
    correct: false
    explanation: Для односпрямованого руху в момент мовлення використовується дієслово
      'йти', а не 'ходити'.
  - statement: Якщо ви їдете на метро або автобусі, ви повинні використовувати дієслово
      'йти'.
    correct: false
    explanation: Транспортний засіб вимагає дієслів 'їхати' або 'їздити', а не 'йти'.
  - statement: Префікс 'від-' в українській мові означає просте збільшення дистанції
      від якогось об'єкта.
    correct: true
    explanation: Цей префікс позначає віддалення від точки у просторі.
  - statement: Дієслово 'приїжджати' акцентує вашу увагу виключно на факті появи людини
      у місці призначення.
    correct: true
    explanation: На відміну від 'доїжджати', воно не фокусується на складнощах маршруту.
  - statement: Вираз 'час іде' вважається граматичною помилкою в сучасній українській
      мові.
    correct: false
    explanation: Це абсолютно правильна і дуже поширена метафора.
  - statement: Префікс 'під-' завжди означає повне і стовідсоткове досягнення кінцевої
      мети вашої подорожі.
    correct: false
    explanation: Префікс 'під-' означає лише наближення на коротку дистанцію, а не
      фінальне досягнення мети.
  - statement: В українській мові транспортний засіб як інструмент пересування зазвичай
      стоїть в орудному відмінку без жодного прийменника.
    correct: true
    explanation: 'Наприклад: їхати поїздом, їхати автомобілем.'
- type: fill-in
  title: Вставте правильне дієслово
  instruction: Оберіть правильне дієслово руху, враховуючи регулярність та спосіб
    пересування.
  items:
  - sentence: Я кожного ранку ... на роботу пішки.
    answer: ходжу
    options:
    - ходжу
    - йду
    - їду
    - їжджу
    explanation: Регулярна дія пішки вимагає 'ходжу'.
  - sentence: Зараз я швидко ... в університет на важливу лекцію.
    answer: йду
    options:
    - йду
    - ходжу
    - їду
    - їжджу
    explanation: Дія відбувається зараз пішки — використовуємо 'йду'.
  - sentence: Ми дуже часто ... в Карпати на нашому автомобілі.
    answer: їздимо
    options:
    - їздимо
    - їдемо
    - ходимо
    - йдемо
    explanation: Регулярна поїздка транспортом — це 'їздимо'.
  - sentence: Завтра мій старший брат ... до Києва вечірнім потягом.
    answer: їде
    options:
    - їде
    - йде
    - їздить
    - ходить
    explanation: Конкретна запланована поїздка в одному напрямку вимагає 'їде'.
  - sentence: Ви зазвичай ... в центральний супермаркет чи на ринок?
    answer: ходите
    options:
    - ходите
    - йдете
    - їдете
    - їздите
    explanation: Звичка ходити пішки позначається словом 'ходите'.
  - sentence: Подивись уважно! Наш жовтий автобус вже ... до зупинки.
    answer: під'їжджає
    options:
    - під'їжджає
    - від'їжджає
    - заїжджає
    - об'їжджає
    explanation: Наближення транспорту до об'єкта.
  - sentence: О котрій годині ти зазвичай ... додому після складної роботи?
    answer: приходиш
    options:
    - приходиш
    - підходиш
    - відходиш
    - доходиш
    explanation: Повернення до мети — це 'приходиш'.
  - sentence: Будь ласка, швидко ... в кімнату, ми вже починаємо нашу нараду!
    answer: заходьте
    options:
    - заходьте
    - виходьте
    - підходьте
    - відходьте
    explanation: Рух усередину приміщення позначається префіксом 'за-'.
- type: error-correction
  title: Виправте типові помилки
  instruction: Знайдіть і виправте одну просторову або граматичну помилку в кожному
    реченні.
  items:
  - sentence: Я йду в офіс щодня.
    error: йду
    answer: ходжу
    options:
    - ходжу
    - їду
    - приходжу
    - заходжу
    explanation: Слово 'щодня' вказує на регулярну звичку, тому використовуємо різноспрямоване
      дієслово 'ходити'.
  - sentence: Кожні вихідні ми йдемо в парк на прогулянку.
    error: йдемо
    answer: ходимо
    options:
    - ходимо
    - їдемо
    - приходимо
    - заходимо
    explanation: Звичка вимагає використання форми 'ходимо'.
  - sentence: Я часто їду в інше місто на автобусі.
    error: на автобусі
    answer: автобусом
    options:
    - автобусом
    - в автобус
    - автобуса
    - автобусу
    explanation: Транспортний засіб як інструмент пересування завжди стоїть в орудному
      відмінку без прийменника.
  - sentence: Ми швидко йдемо в великому магазині за покупками.
    error: великому магазині
    answer: великий магазин
    options:
    - великий магазин
    - великого магазину
    - великим магазином
    - велика магазин
    explanation: Напрямок руху (відповідає на запитання 'куди?') обов'язково вимагає
      використання знахідного відмінка.
  - sentence: Сьогодні сильний дощ падає з самого ранку.
    error: падає
    answer: іде
    options:
    - іде
    - ходить
    - біжить
    - летить
    explanation: В українській мові ми завжди кажемо 'дощ іде'.
  - sentence: Ми переїхали величезний затор сусідньою вузькою вулицею.
    error: переїхали
    answer: об'їхали
    options:
    - об'їхали
    - виїхали
    - заїхали
    - під'їхали
    explanation: Щоб уникнути перешкоди, залишаючи її збоку, ми обов'язково використовуємо
      префікс 'об-'.
- type: match-up
  title: 'Знайдіть пару: Ідіоми та метафори'
  instruction: З'єднайте метафоричні вирази з дієсловами руху з їхнім правильним значенням.
  pairs:
  - left: час біжить
    right: події розвиваються дуже стрімко
  - left: виходити на зв'язок
    right: встановлювати комунікацію з кимось
  - left: приходити на думку
    right: раптово з'являтися в голові (про ідею)
  - left: далеко піти
    right: досягти значного кар'єрного успіху
  - left: дощ іде
    right: стандартний граматичний опис опадів
  - left: переходити на українську
    right: змінювати основну мову спілкування
  - left: час іде
    right: повільний плин годин під час очікування
  - left: ходити по руках
    right: постійно змінювати власників (про річ)
- type: unjumble
  title: 'Складіть речення: Маршрути'
  instruction: Розташуйте слова у правильному порядку, щоб утворити логічні речення
    про рух.
  items:
  - words:
    - кожного
    - ранку
    - я
    - рано
    - виходжу
    - з
    - дому
    answer: Кожного ранку я рано виходжу з дому
  - words:
    - студенти
    - швидко
    - йдуть
    - в
    - сучасний
    - університет
    answer: Студенти швидко йдуть в сучасний університет
  - words:
    - мій
    - брат
    - їде
    - на
    - нову
    - роботу
    - поїздом
    answer: Мій брат їде на нову роботу поїздом
  - words:
    - великий
    - автобус
    - повільно
    - під'їжджає
    - до
    - зупинки
    answer: Великий автобус повільно під'їжджає до зупинки
  - words:
    - всі
    - пішоходи
    - мусили
    - обережно
    - обходити
    - велику
    - калюжу
    answer: Всі пішоходи мусили обережно обходити велику калюжу
  - words:
    - ця
    - геніальна
    - ідея
    - вчора
    - прийшла
    - мені
    - на
    - думку
    answer: Ця геніальна ідея вчора прийшла мені на думку
- type: group-sort
  title: Розподіліть за логікою руху
  instruction: Віднесіть кожне дієслово чи фразу до правильної категорії руху.
  groups:
  - name: Фізичний рух пішки
    items:
    - переходити вулицю
    - обходити калюжу
    - заходити в аудиторію
    - сходити вниз
  - name: Рух транспортом
    items:
    - їхати поїздом
    - об'їхати затор
    - доїхати до кордону
    - під'їхати до зупинки
  - name: Метафоричний рух
    items:
    - час біжить
    - дощ іде
    - далеко піти
    - виходити на зв'язок
- type: select
  title: Оберіть правильні варіанти
  instruction: Виберіть усі правильні відповіді на ці просторові та граматичні питання.
  items:
  - question: Які з цих дієслів означають рух в одному напрямку просто зараз?
    min_correct: 2
    options:
    - text: йти
      correct: true
    - text: ходити
      correct: false
    - text: їхати
      correct: true
    - text: їздити
      correct: false
    explanation: Дієслова 'йти' та 'їхати' є односпрямованими.
  - question: Які вирази використовують метафоричний рух в українській мові?
    min_correct: 2
    options:
    - text: час біжить
      correct: true
    - text: ідея прийшла на думку
      correct: true
    - text: їхати автобусом
      correct: false
    - text: переходити вулицю
      correct: false
    explanation: Час та ідеї метафорично пересуваються, використовуючи дієслова руху.
  - question: Які префікси означають напрямок руху від об'єкта або вихід із приміщення?
    min_correct: 2
    options:
    - text: ви-
      correct: true
    - text: від-
      correct: true
    - text: під-
      correct: false
    - text: при-
      correct: false
    explanation: Префікси 'ви-' (ізсередини) та 'від-' (від точки) позначають віддалення.
  - question: Які дієслова ідеально підходять для опису поїздки в київському метро?
    min_correct: 3
    options:
    - text: сходити вниз
      correct: true
    - text: переходити на іншу лінію
      correct: true
    - text: їхати поїздом
      correct: true
    - text: йти пішки на великі відстані
      correct: false
    explanation: У метро ми пересуваємося вертикально (ескалатор), переходимо між
      лініями та їдемо поїздом.
  - question: 'Які відмінки є абсолютно правильними у реченні про транспорт і напрямок:
      ''Я їду (чим?) (куди?)''?'
    min_correct: 2
    options:
    - text: орудний відмінок для транспорту
      correct: true
    - text: знахідний відмінок для напрямку
      correct: true
    - text: місцевий відмінок для транспорту
      correct: false
    - text: давальний відмінок для напрямку
      correct: false
    explanation: Транспорт як інструмент вимагає орудного, а напрямок — знахідного
      відмінка.
  - question: Які з цих дієслів означають успішне і повне досягнення кінцевої мети
      подорожі?
    min_correct: 2
    options:
    - text: доїхати
      correct: true
    - text: приїхати
      correct: true
    - text: під'їхати
      correct: false
    - text: від'їхати
      correct: false
    explanation: Префікси 'до-' та 'при-' позначають фінал маршруту.
- type: fill-in
  title: Заповніть пропуски префіксами
  instruction: Оберіть правильний просторовий префікс для кожного речення.
  items:
  - sentence: Ми повинні ...їхати цю велику яму на дорозі, щоб випадково не пошкодити
      колесо нашої машини.
    answer: об
    options:
    - об
    - пере
    - під
    - ви
    explanation: Уникання перешкоди вимагає префікса 'об-'.
  - sentence: Студенти почали дуже повільно ...ходити з просторої аудиторії після
      завершення довгої і цікавої лекції.
    answer: ви
    options:
    - ви
    - від
    - за
    - до
    explanation: Рух ізсередини приміщення назовні вимагає префікса 'ви-'.
  - sentence: Вам потрібно завжди обережно і уважно ...ходити вулицю тільки на зелене
      світло сучасного світлофора.
    answer: пере
    options:
    - пере
    - об
    - за
    - при
    explanation: Перетин межі дороги — це префікс 'пере-'.
  - sentence: Великий і сучасний швидкісний поїзд почав повільно ...їжджати від нашої
      старої залізничної станції.
    answer: від
    options:
    - від
    - ви
    - під
    - пере
    explanation: Збільшення дистанції від об'єкта вимагає префікса 'від-'.
  - sentence: Ви можете вільно ...йти до каси і запитати привітного менеджера про
      наявність вільних квитків.
    answer: під
    options:
    - під
    - від
    - за
    - ви
    explanation: Наближення на коротку дистанцію — це префікс 'під-'.
  - sentence: Коли саме ти плануєш остаточно і безпечно ...їхати до державного кордону
      на своєму новому автомобілі?
    answer: до
    options:
    - до
    - об
    - пере
    - від
    explanation: Досягнення кінцевої мети подорожі вимагає префікса 'до-'.
  - sentence: Усі зацікавлені студенти гучно і радісно почали ...ходити в аудиторію
      для прослуховування важливої доповіді.
    answer: за
    options:
    - за
    - ви
    - від
    - об
    explanation: Вхід всередину простору вимагає префікса 'за-'.
