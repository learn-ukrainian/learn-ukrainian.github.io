- type: true-false
  title: "Правда чи брехня: правила використання виду"
  instruction: "Визначте, чи є ці твердження про види дієслів правильними."
  items:
    - statement: "Для опису щоденних звичок у минулому завжди використовується недоконаний вид."
      correct: true
      explanation: "Слова-маркери частотності вимагають недоконаного виду, оскільки дія повторюється."
    - statement: "Слово 'раптом' зазвичай вимагає використання дієслова недоконаного виду."
      correct: false
      explanation: "Раптом вказує на несподівану швидку подію, тому вимагає доконаного виду."
    - statement: "В українській мові можна використовувати 'буду' разом з інфінітивом дієслова доконаного виду."
      correct: false
      explanation: "Це поширена помилка. Слово 'буду' використовується тільки з недоконаним видом."
    - statement: "Якщо дві дії відбуваються абсолютно паралельно, ми використовуємо недоконаний вид для обох."
      correct: true
      explanation: "Два дієслова недоконаного виду вказують на одночасність тривалих процесів."
    - statement: "Сполучник 'після того як' завжди вказує на повну одночасність процесів."
      correct: false
      explanation: "Цей сполучник означає строгу послідовність дій."
    - statement: "Конструкція 'поки не' встановлює чітку межу дії і вимагає доконаного виду."
      correct: true
      explanation: "Ця конструкція маркує результативну подію, яка зупиняє попередню тривалу дію."
    - statement: "Вираз 'в кінці кінців' є найкращою літературною нормою української мови."
      correct: false
      explanation: "Це калька. Правильно використовувати слова 'врешті-решт' або 'зрештою'."
    - statement: "Сполучник 'як тільки' описує миттєву реакцію або швидку зміну подій."
      correct: true
      explanation: "Він вказує на те, що між діями немає паузи, одна запускає іншу."
    - statement: "Слово 'коли' може використовуватися і для опису одночасності, і для послідовності подій."
      correct: true
      explanation: "Його значення залежить від того, які види дієслів стоять поруч у реченні."
    - statement: "Дієслова доконаного виду утворюють свій майбутній час самостійно, без слова 'буду'."
      correct: true
      explanation: "Вони просто змінюють свої закінчення (наприклад: напишу, зроблю)."
    - statement: "Слова 'спочатку', 'потім' та 'нарешті' допомагають створити логічний ланцюжок послідовних подій."
      correct: true
      explanation: "Ці маркери ідеально організовують історію у хронологічному порядку."
    - statement: "Фонова дія в розповіді завжди передається дієсловами доконаного виду."
      correct: false
      explanation: "Фон створюється за допомогою недоконаного виду, оскільки це тривалий процес."

- type: match-up
  title: "Знайдіть пару: маркери та їхнє значення"
  instruction: "З'єднайте часові маркери та сполучники з їхньою головною функцією в тексті."
  pairs:
    - left: "спочатку, потім, нарешті"
      right: "послідовний ланцюжок подій"
    - left: "кожного дня, завжди, часто"
      right: "регулярна звичка в минулому"
    - left: "поки, тим часом як"
      right: "паралельні тривалі процеси"
    - left: "як тільки"
      right: "миттєва реакція на подію"
    - left: "раптом, несподівано"
      right: "різке переривання фонової дії"
    - left: "поки не, доки не"
      right: "сувора межа тривалої дії"
    - left: "врешті-решт, зрештою"
      right: "підбиття фінального підсумку"
    - left: "перед тим як"
      right: "дія, що передує іншій дії"
    - left: "недоконаний вид"
      right: "опис атмосфери та фону історії"
    - left: "доконаний вид"
      right: "одноразовий результативний крок"
    - left: "буду + інфінітив"
      right: "майбутній тривалий процес"
    - left: "проста форма (я зроблю)"
      right: "майбутній завершений результат"

- type: quiz
  title: "Оберіть правильний варіант"
  instruction: "Виберіть найкраще пояснення або граматичну форму для кожного речення."
  items:
    - question: "Яке дієслово треба вставити: 'Кожного ранку він ... гарячу каву'?"
      explanation: "Словосполучення 'кожного ранку' вказує на регулярну звичку, тому потрібен недоконаний вид."
      options:
        - text: "пив"
          correct: true
        - text: "випив"
          correct: false
        - text: "попив"
          correct: false
        - text: "допив"
          correct: false
    - question: "Яке дієслово треба вставити: 'Вчора він нарешті ... цю складну статтю'?"
      explanation: "Слово 'нарешті' та контекст вказують на конкретний результат, тому потрібен доконаний вид."
      options:
        - text: "читав"
          correct: false
        - text: "прочитав"
          correct: true
        - text: "дочитував"
          correct: false
        - text: "перечитував"
          correct: false
    - question: "Яке дієслово правильно доповнює речення: 'Як тільки він ... додому, почався дощ'?"
      explanation: "Конструкція 'як тільки' вимагає доконаного виду для позначення швидкої реакції."
      options:
        - text: "приходив"
          correct: false
        - text: "йшов"
          correct: false
        - text: "прийшов"
          correct: true
        - text: "заходив"
          correct: false
    - question: "Як граматично правильно сказати про свої стовідсоткові плани на завтрашній вечір?"
      explanation: "Майбутній результат для доконаного виду утворюється без слова 'буду'."
      options:
        - text: "Я буду написати великий звіт."
          correct: false
        - text: "Я напишу великий звіт."
          correct: true
        - text: "Я буду написав великий звіт."
          correct: false
        - text: "Я є писати великий звіт."
          correct: false
    - question: "Який часовий сполучник найкраще підходить сюди: 'Вона читала книгу, ... він готував вечерю'?"
      explanation: "Тут дві паралельні дії, тому найкраще підходить сполучник 'тим часом як'."
      options:
        - text: "тим часом як"
          correct: true
        - text: "після того як"
          correct: false
        - text: "як тільки"
          correct: false
        - text: "перед тим як"
          correct: false
    - question: "Що насправді означає українське народне прислів'я 'Доки грім не гряне, рак не свисне'?"
      explanation: "Це прислів'я про ситуацію, коли людина нічого не робить до екстремального моменту."
      options:
        - text: "Люди завжди все планують заздалегідь."
          correct: false
        - text: "Дія не почнеться без критичної події-тригера."
          correct: true
        - text: "Погода дуже сильно впливає на тварин."
          correct: false
        - text: "Треба завжди радіти життю і відпочивати."
          correct: false
    - question: "Яке українське слово найкраще замінює неприродну кальку 'в кінці кінців'?"
      explanation: "Слово 'врешті-решт' є літературною нормою і звучить дуже природно та автентично."
      options:
        - text: "нарешті-то"
          correct: false
        - text: "у фіналі"
          correct: false
        - text: "на кінці"
          correct: false
        - text: "врешті-решт"
          correct: true
    - question: "Яку логічну функцію виконує дієслово 'зателефонував' у реченні 'Я гуляв парком, аж раптом він зателефонував'?"
      explanation: "Дієслово доконаного виду з маркером 'раптом' перериває тривалий фон розповіді."
      options:
        - text: "Описує довгий паралельний процес."
          correct: false
        - text: "Створює атмосферу для головної історії."
          correct: false
        - text: "Несподівано перериває тривалу фонову дію."
          correct: true
        - text: "Вказує на щоденну регулярну звичку."
          correct: false

- type: fill-in
  title: "Вставте правильне слово"
  instruction: "Оберіть правильний вид дієслова або часовий сполучник для кожного речення."
  items:
    - sentence: "Ми довго гуляли парком, аж раптом несподівано ________ сильний дощ."
      answer: "почався"
      options: ["почався", "починався", "буде починатися", "починається"]
    - sentence: "Вона дуже уважно ________ цікаву лекцію, тим часом як її сусід грав у гру на телефоні."
      answer: "слухала"
      options: ["слухала", "послухала", "дослухала", "заслухала"]
    - sentence: "Я буду працювати у своєму кабінеті, ________ ти не зателефонуєш мені."
      answer: "поки"
      options: ["поки", "після того як", "перед тим як", "як тільки"]
    - sentence: "________ я зайшов до теплої кімнати, я відразу побачив свого старого друга."
      answer: "Як тільки"
      options: ["Як тільки", "Тим часом як", "Поки", "Доки"]
    - sentence: "Спочатку він приготував смачну вечерю, а ________ помив увесь брудний посуд."
      answer: "потім"
      options: ["потім", "спочатку", "нарешті", "раптом"]
    - sentence: "Моя сестра ________ українську мову кожного дня протягом трьох років."
      answer: "вивчала"
      options: ["вивчила", "вивчала", "буде вивчити", "звивчала"]
    - sentence: "Я обіцяю, що обов'язково ________ цей складний річний звіт до завтрашнього ранку."
      answer: "напишу"
      options: ["напишу", "буду написати", "писав", "буду писав"]
    - sentence: "Вони дуже довго шукали цю маленьку вулицю і ________ знайшли потрібний будинок."
      answer: "врешті-решт"
      options: ["врешті-решт", "в кінці кінців", "поки що", "доки"]
    - sentence: "________ ми дуже повільно йшли додому, ми спокійно говорили про новий фільм."
      answer: "Коли"
      options: ["Коли", "Раптом", "Нарешті", "Зрештою"]
    - sentence: "Я з великою радістю допоможу тобі, ________ закінчу свою власну термінову роботу."
      answer: "після того як"
      options: ["після того як", "тим часом як", "одночасно", "поки що"]

- type: unjumble
  title: "Складіть речення з часовими конструкціями"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити логічні речення."
  items:
    - words: ["спочатку", "я", "приготував", "смачну", "вечерю"]
      answer: "Спочатку я приготував смачну вечерю"
    - words: ["потім", "ми", "разом", "дивилися", "цікавий", "фільм"]
      answer: "Потім ми разом дивилися цікавий фільм"
    - words: ["ми", "довго", "гуляли", "аж", "раптом", "почався", "дощ"]
      answer: "Ми довго гуляли аж раптом почався дощ"
    - words: ["як", "тільки", "він", "прийшов", "ми", "відразу", "почали"]
      answer: "Як тільки він прийшов ми відразу почали"
    - words: ["я", "буду", "довго", "чекати", "поки", "ти", "зателефонуєш"]
      answer: "Я буду довго чекати поки ти зателефонуєш"
    - words: ["вони", "довго", "сперечалися", "але", "врешті-решт", "домовилися"]
      answer: "Вони довго сперечалися але врешті-решт домовилися"
    - words: ["я", "обов'язково", "напишу", "тобі", "великого", "листа"]
      answer: "Я обов'язково напишу тобі великого листа"
    - words: ["він", "уважно", "читав", "тим", "часом", "як", "вона", "спала"]
      answer: "Він уважно читав тим часом як вона спала"

- type: cloze
  title: "Заповніть пропуски в історії"
  instruction: "Відновіть цілісність наративу, вибираючи правильні часові сполучники та форми дієслів."
  passage: "Учора в мене був дуже важкий робочий день. {{1}} я дуже рано прийшов до великого офісу і {{2}} свій робочий комп'ютер. Це була моя найперша результативна {{3}}. {{4}}, поки старий комп'ютер дуже повільно {{5}}, я пішов на маленьку кухню. Там я з великим задоволенням {{6}} собі гарячу чорну каву. Після того {{7}} я швидко випив цю каву, я негайно {{8}} активно працювати над складним фінансовим звітом. Я дуже наполегливо працював три години поспіль, {{9}} мій керівник несподівано не {{10}} мене на термінову фінансову нараду. Ця нарада стала суворою межею моєї самостійної роботи. Ми надзвичайно довго {{11}} складні фінансові питання компанії, але {{12}} ми спільно знайшли дуже гарне рішення. {{13}} пізно ввечері я дуже втомлений повернувся додому і просто довго {{14}} на дивані."
  blanks:
    - id: 1
      answer: "Спочатку"
      options: ["Спочатку", "Потім", "Нарешті", "Раптом"]
    - id: 2
      answer: "увімкнув"
      options: ["увімкнув", "вмикав", "вмикаю", "буду вмикати"]
    - id: 3
      answer: "дія"
      options: ["дія", "звичка", "пауза", "проблема"]
    - id: 4
      answer: "Потім"
      options: ["Потім", "Перед тим", "Спочатку", "Зрештою"]
    - id: 5
      answer: "завантажувався"
      options: ["завантажувався", "завантажився", "завантажиться", "завантажити"]
    - id: 6
      answer: "зробив"
      options: ["зробив", "робив", "роблю", "робитиму"]
    - id: 7
      answer: "як"
      options: ["як", "що", "коли", "поки"]
    - id: 8
      answer: "почав"
      options: ["почав", "починав", "починаю", "почну"]
    - id: 9
      answer: "доки"
      options: ["доки", "як тільки", "тим часом", "після"]
    - id: 10
      answer: "запросив"
      options: ["запросив", "запрошував", "просив", "просить"]
    - id: 11
      answer: "обговорювали"
      options: ["обговорювали", "обговорили", "поговорили", "говоримо"]
    - id: 12
      answer: "врешті-решт"
      options: ["врешті-решт", "спочатку", "тим часом", "в кінці кінців"]
    - id: 13
      answer: "Нарешті"
      options: ["Нарешті", "Раптом", "Коли", "Поки"]
    - id: 14
      answer: "відпочивав"
      options: ["відпочивав", "відпочив", "відпочину", "відпочиваю"]

- type: error-correction
  title: "Виправте граматичні та стилістичні помилки"
