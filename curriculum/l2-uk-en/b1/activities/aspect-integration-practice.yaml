      options: ["прийдеш", "прийшов", "приходив", "будеш приходити"]
      explanation: "Конструкція 'поки не' встановлює межу і вимагає майбутнього часу доконаного виду."
    - sentence: "Як тільки він відкривав двері, великий собака миттєво вибіг на вулицю."
      error: "відкривав"
      answer: "відкрив"
      error_type: "word"
      options: ["відкрив", "відкриє", "відкриватиме", "буде відкривати"]
      explanation: "Конструкція миттєвої реакції 'як тільки' вимагає доконаного виду для обох дій."
    - sentence: "Спочатку я купив квитки, а після того як ми швидко поїхали на вокзал."
      error: "після того як"
      answer: "потім"
      error_type: "phrase"
      options: ["потім", "нарешті", "тим часом", "раптом"]
      explanation: "Для простої послідовності незалежних дій краще використовувати 'потім'."
    - sentence: "Вони емоційно обговорювали новий проєкт, одночасно як пили гарячу каву."
      error: "одночасно як"
      answer: "тим часом як"
      error_type: "phrase"
      options: ["тим часом як", "після того як", "як тільки", "перед тим як"]
      explanation: "Для паралельних фонових дій використовується літературна конструкція 'тим часом як'."

