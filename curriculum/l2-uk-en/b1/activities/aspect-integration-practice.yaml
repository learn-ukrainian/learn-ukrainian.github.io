- type: mark-the-words
  title: "Знайдіть дієслова доконаного виду"
  instruction: "Знайдіть і позначте всі дієслова доконаного виду (одноразові завершені події) у цьому тексті."
  text: "Я повільно йшов вулицею і раптом побачив свого друга. Він дуже швидко підійшов до мене і міцно обійняв. Ми довго стояли і розмовляли, а потім вирішили піти в кафе. Там ми швидко випили каву і нарешті домовилися зустрітися завтра вранці."
  answers: ["побачив", "підійшов", "обійняв", "вирішили", "піти", "випили", "домовилися", "зустрітися"]

