version: '1.0'
module: word-formation-nouns
level: b1
workbook:
- id: quiz-suffixes
  type: quiz
  instruction: Визначте, який суфікс утворює назву особи або місця, та що він означає.
  items:
  - question: Який суфікс використовується у слові «викладач»?
    options:
    - -ач
    - -ч
    - -дач
    - -а
    correct: 0
  - question: Що зазвичай означає суфікс «-ня» у словах типу «пекарня» або «читальня»?
    options:
    - Місце або заклад
    - Дію або процес
    - Рису характеру
    - Абстрактне поняття
    correct: 0
  - question: Який із цих суфіксів є найпродуктивнішим для назв професій в сучасній
      мові (наприклад, «працівник»)?
    options:
    - -ник
    - -тель
    - -ар
    - -ець
    correct: 0
  - question: Який суфікс використовується у слові «журналіст»?
    options:
    - -іст
    - -ст
    - -ист
    - -аст
    correct: 0
  - question: Що позначає суфікс «-ище» у слові «сховище»?
    options:
    - Велике приміщення або простір
    - Маленький предмет
    - Дію
    - Жіночу професію
    correct: 0
  - question: Яким способом утворено слово «перехід»?
    options:
    - Безафіксним
    - Суфіксальним
    - Префіксальним
    - Складанням основ
    correct: 0
  - question: Як утворено назву регіону «Закарпаття»?
    options:
    - Префіксально-суфіксальним способом
    - Суфіксальним способом
    - Безафіксним способом
    - Префіксальним способом
    correct: 0
  - question: Що означає слово «студентство»?
    options:
    - Збірне поняття (усі студенти)
    - Одного студента
    - Місце, де вчаться
    - Процес навчання
    correct: 0
- id: fill-in-agent-nouns
  type: fill-in
  instruction: Утворіть назву особи (чоловічого або жіночого роду) від слова в дужках
    і вставте в речення.
  items:
  - sentence: Він перекладає тексти. Він — професійний _____.
    answer: перекладач
    options:
    - перекладач
    - перекладальник
    - перекладець
  - sentence: Ця _____ (вчитель) дуже цікаво пояснює граматику.
    answer: вчителька
    options:
    - вчителька
    - вчительниця
    - вчитиня
  - sentence: Яна дуже швидко плаває. Вона — справжня _____.
    answer: плавчиня
    options:
    - плавчиня
    - плавачка
    - плавець
  - sentence: Ця _____ (журналіст) написала чудову статтю.
    answer: журналістка
    options:
    - журналістка
    - журналістиня
    - журналістиця
  - sentence: Твій брат працює на залізниці? Він — _____.
    answer: залізничник
    options:
    - залізничник
    - залізничар
    - залізник
  - sentence: Ця _____ (пекар) випікає найсмачніші круасани.
    answer: пекарка
    options:
    - пекарка
    - пекарниця
    - пекариня
  - sentence: Наша нова _____ (працівник) дуже відповідальна.
    answer: працівниця
    options:
    - працівниця
    - працівничка
    - працівна
  - sentence: Вона працює у цій крамниці, вона — _____.
    answer: продавчиня
    options:
    - продавчиня
    - продавниця
    - продавця
- id: match-up-workplaces
  type: match-up
  instruction: З'єднайте назву професії з її традиційним робочим місцем.
  pairs:
  - left: лікар
    right: лікарня
  - left: пекар
    right: пекарня
  - left: читач
    right: читальня
  - left: вихователь
    right: дитячий садок
  - left: школяр
    right: школа
  - left: бібліотекарка
    right: бібліотека
  - left: пивовар
    right: пивоварня
  - left: продавець
    right: крамниця
- id: group-sort-derivation
  type: group-sort
  instruction: Розподіліть іменники за їхнім способом словотворення.
  groups:
  - label: Суфіксальний спосіб
    items:
    - читач
    - лікарня
    - будівництво
    - журналістка
  - label: Префіксально-суфіксальний спосіб
    items:
    - Прикарпаття
    - Закарпаття
    - Запоріжжя
    - Поділля
  - label: Безафіксний спосіб
    items:
    - підпис
    - перехід
    - біг
    - зліт
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильні речення зі слів.
  items:
  - words:
    - Він
    - лікар
    - і
    - працює
    - в
    - лікарні.
    correct_order:
    - Він
    - лікар
    - і
    - працює
    - в
    - лікарні.
  - words:
    - Моя
    - сестра
    - —
    - пекарка,
    - вона
    - відкрила
    - пекарню.
    correct_order:
    - Моя
    - сестра
    - —
    - пекарка,
    - вона
    - відкрила
    - пекарню.
  - words:
    - Цей
    - читач
    - постійно
    - сидить
    - у
    - читальні.
    correct_order:
    - Цей
    - читач
    - постійно
    - сидить
    - у
    - читальні.
  - words:
    - Нова
    - бібліотекарка
    - працює
    - у
    - нашій
    - бібліотеці.
    correct_order:
    - Нова
    - бібліотекарка
    - працює
    - у
    - нашій
    - бібліотеці.
  - words:
    - Молодий
    - вихователь
    - працює
    - в
    - дитячому
    - садку.
    correct_order:
    - Молодий
    - вихователь
    - працює
    - в
    - дитячому
    - садку.
  - words:
    - Продавчиня
    - в
    - цій
    - крамниці
    - дуже
    - ввічлива.
    correct_order:
    - Продавчиня
    - в
    - цій
    - крамниці
    - дуже
    - ввічлива.
- id: error-correction-feminines
  type: error-correction
  instruction: Знайдіть і виправте помилку в утворенні слова.
  items:
  - sentence: Вона дуже талановита плавець.
    error: плавець
    correction: плавчиня
    error_type: word
    options:
    - плавчиня
    - плавачка
    - плавниця
    explanation: Жіноча форма від «плавець» — «плавчиня».
  - sentence: Мій брат працює в пекарниці.
    error: пекарниці
    correction: пекарні
    error_type: word
    options:
    - пекарні
    - пекарі
    - пекарстві
    explanation: Місце, де печуть хліб, називається «пекарня» (суфікс -ня).
  - sentence: Ця продавець завжди дуже ввічлива.
    error: продавець
    correction: продавчиня
    error_type: word
    options:
    - продавчиня
    - продавниця
    - продавцівна
    explanation: Жіноча форма від «продавець» — «продавчиня».
  - sentence: Вони живуть на Прикарпатові.
    error: Прикарпатові
    correction: Прикарпатті
    error_type: word
    options:
    - Прикарпатті
    - Прикарпатстві
    - Прикарпатівці
    explanation: Регіон біля Карпат називається «Прикарпаття» (префікс При- і суфікс
      -я).
  - sentence: Вона найкраща вчитель у нашій школі.
    error: вчитель
    correction: вчителька
    error_type: word
    options:
    - вчителька
    - вчительниця
    - вчительня
    explanation: Жіноча форма від «вчитель» — «вчителька».
  - sentence: Цей лікар працює у новому лічнику.
    error: лічнику
    correction: лікарні
    error_type: word
    options:
    - лікарні
    - лікувальні
    - лікарстві
    explanation: Медичний заклад називається «лікарня».
