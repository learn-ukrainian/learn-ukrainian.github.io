- type: match-up
  title: 'Знайдіть пару: термін та його значення'
  pairs:
  - left: подорож
    right: тривале переміщення для дослідження нових місць
  - left: поїздка
    right: коротке переміщення з конкретною, часто прагматичною метою
  - left: мандрівка
    right: переміщення з пригодницьким або романтичним відтінком
  - left: відпустка
    right: період законного відпочинку для дорослих, які працюють
  - left: канікули
    right: період вільного від навчання часу для школярів та студентів
  - left: бронювати
    right: гарантувати собі місце в готелі, літаку або ресторані
  - left: аеропорт
    right: місце, звідки злітають і куди прибувають пасажирські літаки
  - left: курорт
    right: місцевість, спеціально облаштована для відпочинку та лікування
  instruction: З'єднайте відповідні елементи.
- type: fill-in
  title: Доповніть речення правильними словами
  items:
  - sentence: Моя ділова ___ триватиме лише два дні.
    answer: поїздка
    options:
    - поїздка
    - подорож
    - мандрівка
    - екскурсія
  - sentence: Ми вирішили вирушити в ___ навколо світу.
    answer: подорож
    options:
    - подорож
    - відпустку
    - мандрівку
    - канікули
  - sentence: Літня щорічна ___ дозволяє мені відпочити від офісної роботи.
    answer: відпустка
    options:
    - відпустка
    - поїздка
    - мандрівка
    - робота
  - sentence: Школярі дуже чекають на зимові ___.
    answer: канікули
    options:
    - канікули
    - відпустки
    - подорожі
    - роботи
  - sentence: Наша піша ___ лісами Карпат була неймовірною.
    answer: мандрівка
    options:
    - мандрівка
    - поїздка
    - робота
    - географія
  - sentence: Щоб не залишитися на вулиці, треба заздалегідь ___ готель.
    answer: бронювати
    options:
    - бронювати
    - купувати
    - робити
    - шукати
  - sentence: Символом висоти для українців є гора ___.
    answer: Говерла
    options:
    - Говерла
    - Карпати
    - Дніпро
    - Світязь
  - sentence: Влітку ми завжди їздимо відпочивати на ___.
    answer: море
    options:
    - море
    - гори
    - озеро
    - річку
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Складіть речення з поданих слів
  items:
  - words:
    - моя
    - ділова
    - поїздка
    - триватиме
    - два
    - дні
    answer: Моя ділова поїздка триватиме два дні
  - words:
    - школярі
    - дуже
    - чекають
    - на
    - зимові
    - канікули
    answer: Школярі дуже чекають на зимові канікули
  - words:
    - завтра
    - я
    - нарешті
    - йду
    - у
    - відпустку
    answer: Завтра я нарешті йду у відпустку
  - words:
    - ми
    - хочемо
    - заздалегідь
    - бронювати
    - готель
    - на
    - морі
    answer: Ми хочемо заздалегідь бронювати готель на морі
  - words:
    - наша
    - далека
    - подорож
    - почалася
    - минулого
    - тижня
    answer: Наша далека подорож почалася минулого тижня
  - words:
    - найвища
    - гора
    - України
    - називається
    - Говерла
    answer: Найвища гора України називається Говерла
  - words:
    - влітку
    - люди
    - часто
    - їдуть
    - на
    - море
    answer: Влітку люди часто їдуть на море
  - words:
    - ми
    - вирішили
    - вирушити
    - в
    - подорож
    - Європою
    answer: Ми вирішили вирушити в подорож Європою
  instruction: Розташуйте слова у правильному порядку.
- type: quiz
  title: 'Перевірте свої знання: лексика та граматика'
  items:
  - question: Яке слово найкраще підходить для опису щоденного шляху до офісу?
    explanation: Поїздка має прагматичну мету.
    options:
    - text: поїздка
      correct: true
    - text: подорож
      correct: false
    - text: мандрівка
      correct: false
    - text: екскурсія
      correct: false
  - question: Як правильно сказати про відпочинок дорослої людини, яка офіційно працює?
    explanation: Відпустка — це період законного відпочинку для працівників.
    options:
    - text: піти у відпустку
      correct: true
    - text: піти на канікули
      correct: false
    - text: піти в канікули
      correct: false
    - text: піти на відпустку
      correct: false
  - question: Який прийменник правильно використовувати зі словом море для позначення
      місця?
    explanation: Зі словом море використовуємо прийменник на.
    options:
    - text: на морі
      correct: true
    - text: у морі
      correct: false
    - text: в морі
      correct: false
    - text: біля морі
      correct: false
  - question: Яке слово означає тривале переміщення для дослідження нових місць?
    explanation: Подорож означає тривале та масштабне переміщення.
    options:
    - text: подорож
      correct: true
    - text: поїздка
      correct: false
    - text: канікули
      correct: false
    - text: відрядження
      correct: false
  - question: Який прийменник правильно використовувати зі словом гори для позначення
      місця?
    explanation: Зі словом гори використовуємо прийменник у.
    options:
    - text: у горах
      correct: true
    - text: на горах
      correct: false
    - text: в горах
      correct: false
    - text: біля горах
      correct: false
  - question: Що ми робимо, коли хочемо гарантувати собі столик у ресторані?
    explanation: Для цього використовують дієслово бронювати.
    options:
    - text: бронюємо
      correct: true
    - text: купуємо
      correct: false
    - text: продаємо
      correct: false
    - text: дивимося
      correct: false
  - question: Яке з цих слів використовується виключно у множині?
    explanation: Слово канікули завжди має форму множини.
    options:
    - text: канікули
      correct: true
    - text: відпустка
      correct: false
    - text: подорож
      correct: false
    - text: мандрівка
      correct: false
  - question: Яке слово має найяскравіший пригодницький та романтичний відтінок?
    explanation: Мандрівка ідеально описує емоційний та активний туризм.
    options:
    - text: мандрівка
      correct: true
    - text: поїздка
      correct: false
    - text: робота
      correct: false
    - text: відрядження
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Правда чи брехня: географія та подорожі'
  items:
  - statement: Слово канікули можна використовувати для опису відпочинку дорослих
      людей.
    correct: false
    explanation: Канікули — це відпочинок виключно для школярів та студентів.
  - statement: Слово поїздка має прагматичний відтінок і часто поєднується зі словом
      ділова.
    correct: true
    explanation: Так, поїздка зазвичай коротка і має конкретну мету.
  - statement: Українською правильно говорити я відпочиваю на горах.
    correct: false
    explanation: Правильно казати у горах.
  - statement: Говерла — це найвища точка України.
    correct: true
    explanation: Говерла має висоту 2061 метр над рівнем моря.
  - statement: Для резервації готелю використовують дієслово бронювати.
    correct: true
    explanation: Так, це стандартне дієслово для сервісних послуг.
  - statement: Слово мандрівка підходить для опису щоденного шляху з дому на роботу.
    correct: false
    explanation: Мандрівка має пригодницький відтінок. Для роботи краще слово поїздка.
  - statement: Україна — найбільша держава, чия територія повністю лежить у межах
      Європи.
    correct: true
    explanation: Це географічний факт.
  - statement: Дієслово вирушити означає почати подорож.
    correct: true
    explanation: Вирушити в подорож — це стандартна фраза для початку мандрів.
  instruction: Визначте, чи твердження правильне.
- type: group-sort
  title: Розподіліть локації за прийменниками
  groups:
  - name: Прийменник У/В (місце)
    items:
    - горах
    - аеропорту
    - місті
    - готелі
  - name: Прийменник НА (місце)
    items:
    - морі
    - курорті
    - роботі
    - узбережжі
  instruction: Розподіліть елементи за групами.
- type: error-correction
  title: Виправте помилки в реченнях
  items:
  - sentence: Минулого літа ми чудово відпочили на горах.
    error: на
    answer: у
    error_type: word
    options:
    - у
    - в
    - до
    - з
    explanation: Зі словом гори використовується прийменник у.
  - sentence: Мій батько взяв літні канікули на роботі.
    error: канікули
    answer: відпустку
    error_type: word
    options:
    - відпустку
    - поїздку
    - мандрівку
    - паузу
    explanation: Дорослі працівники беруть відпустку, а канікули бувають у школярів.
  - sentence: Моя щоденна мандрівка на роботу займає годину.
    error: мандрівка
    answer: поїздка
    error_type: word
    options:
    - поїздка
    - подорож
    - екскурсія
    - відпустка
    explanation: Для рутинного переміщення використовується слово поїздка.
  - sentence: Ми вирішили купувати столик у ресторані на вечір.
    error: купувати
    answer: бронювати
    error_type: word
    options:
    - бронювати
    - брати
    - робити
    - мати
    explanation: Столик у ресторані не купують, а бронюють.
  - sentence: Я дуже люблю приймати участь у гірських походах.
    error: приймати участь
    answer: брати участь
    error_type: phrase
    options:
    - брати участь
    - робити участь
    - мати участь
    - давати участь
    explanation: Правильна українська фраза — брати участь.
  - sentence: Ця ділова подорож була дуже прагматичною.
    error: подорож
    answer: поїздка
    error_type: word
    options:
    - поїздка
    - мандрівка
    - екскурсія
    - відпустка
    explanation: Слово ділова найкраще поєднується зі словом поїздка.
