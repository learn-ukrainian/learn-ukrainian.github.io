- type: quiz
  title: 'Перевірка знань: Вид дієслова'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'Який вид дієслова описує тривалі та незавершені дії в минулому часі?'
      explanation: 'Недоконаний вид завжди описує процес або розтягнуту в часі дію без чіткого кінця.'
      options:
        - text: 'недоконаний вид'
          correct: true
        - text: 'доконаний вид'
          correct: false
        - text: 'наказовий спосіб'
          correct: false
        - text: 'синтетична форма'
          correct: false
    - question: 'Який вид дієслова необхідно використати для суворої заборони певних дій?'
      explanation: 'Для заборони дії в українській мові використовується виключно недоконаний вид.'
      options:
        - text: 'тільки доконаний'
          correct: false
        - text: 'тільки недоконаний'
          correct: true
        - text: 'будь-який вид'
          correct: false
        - text: 'виключно інфінітив'
          correct: false
    - question: 'Яка форма майбутнього часу утворюється за допомогою допоміжного дієслова бути?'
      explanation: 'Складена або аналітична форма використовує дієслово бути та інфінітив.'
      options:
        - text: 'синтетична'
          correct: false
        - text: 'суплетівна'
          correct: false
        - text: 'аналітична'
          correct: true
        - text: 'регулярна'
          correct: false
    - question: 'Яка форма майбутнього часу є виразною ознакою високого українського стилю?'
      explanation: 'Синтетична форма (наприклад, читатиму) звучить дуже елегантно і часто вживається у літературі.'
      options:
        - text: 'складена'
          correct: false
        - text: 'аналітична'
          correct: false
        - text: 'синтетична'
          correct: true
        - text: 'доконана'
          correct: false
    - question: 'Який вид дієслова використовується для опису загальних істин та непорушних законів?'
      explanation: 'Загальні істини та закони природи завжди формулюються у недоконаному виді, оскільки вони позачасові.'
      options:
        - text: 'доконаний'
          correct: false
        - text: 'недоконаний'
          correct: true
        - text: 'тільки майбутній'
          correct: false
        - text: 'тільки минулий'
          correct: false
    - question: 'Що найчастіше вказує на приналежність дієслова до доконаного виду?'
      explanation: 'Наявність префіксів (з-, на-, по-, про-) часто є маркером доконаного виду, що позначає результат.'
      options:
        - text: 'довгий суфікс'
          correct: false
        - text: 'відсутність закінчення'
          correct: false
        - text: 'наявність префікса'
          correct: true
        - text: 'використання частки'
          correct: false
    - question: 'Як зробити прямий і жорсткий наказ набагато м"якшим та ввічливішим?'
      explanation: 'Щоб запрошення звучало м"якше (наприклад, сідайте замість сядьте), використовують недоконаний вид.'
      options:
        - text: 'використати недоконаний вид'
          correct: true
        - text: 'використати доконаний вид'
          correct: false
        - text: 'додати префікс'
          correct: false
        - text: 'забрати закінчення'
          correct: false
    - question: 'До якого виду належать дієслова з характерними довгими суфіксами -ува- або -юва-?'
      explanation: 'Ці довгі суфікси є надійним маркером тривалого процесу, тобто недоконаного виду.'
      options:
        - text: 'до доконаного'
          correct: false
        - text: 'до недоконаного'
          correct: true
        - text: 'до обох видів'
          correct: false
        - text: 'до суплетівних дієслів'
          correct: false

- type: true-false
  title: 'Правда чи хиба: Правила вживання виду'
  instruction: 'Визначте, чи є ці твердження про граматику правильними.'
  items:
    - statement: 'Дієслова доконаного виду можуть легко утворювати форми теперішнього часу.'
      correct: false
      explanation: 'Доконаний вид не має форм теперішнього часу, оскільки позначає завершений результат у минулому або обіцянку в майбутньому.'
    - statement: 'Для заборони дії в українській мові завжди використовується тільки недоконаний вид.'
      correct: true
      explanation: 'Заборона скасовує сам процес, тому частка не з наказовим способом вимагає недоконаного виду.'
    - statement: 'Синтетична форма майбутнього часу утворюється шляхом додавання суфіксів прямо до інфінітива.'
      correct: true
      explanation: 'Так, наприклад: працювати + му = працюватиму.'
    - statement: 'Форма слова прочитаю описує поточний процес, який відбувається просто зараз.'
      correct: false
      explanation: 'Прочитаю — це форма майбутнього часу, яка позначає твердий намір отримати результат.'
    - statement: 'Недоконаний вид дуже часто створює загальний фон для інших подій у довгій розповіді.'
      correct: true
      explanation: 'Недоконаний вид малює декорації (світило сонце, співали пташки), на тлі яких розгортаються основні результативні події.'
    - statement: 'Суфікс -овува- є надійним граматичним маркером дієслів доконаного виду.'
      correct: false
      explanation: 'Суфікси -ува-, -юва-, -овува- завжди вказують на розтягнутий у часі процес, тобто на недоконаний вид.'
    - statement: 'Аналітична і синтетична форми майбутнього часу недоконаного виду мають абсолютно однакове лексичне значення.'
      correct: true
      explanation: 'Вони абсолютно рівноцінні граматично і відрізняються лише стилістичними відтінками.'
    - statement: 'Для дуже ввічливого запрошення гостей до столу краще обрати категоричний доконаний вид.'
      correct: false
      explanation: 'Доконаний вид (сядьте) звучить як наказ. Для ввічливого запрошення використовується недоконаний вид (сідайте).'

- type: fill-in
  title: 'Заповніть пропуски: Вибір правильного виду'
  instruction: 'Оберіть найбільш підходящу форму дієслова для кожного речення.'
  items:
    - sentence: 'Студент дуже довго і зосереджено _____ складний академічний текст.'
      answer: 'читав'
      options:
        - 'читав'
        - 'прочитав'
        - 'читатиме'
        - 'прочитає'
      explanation: 'Слова дуже довго вказують на розтягнутий процес у минулому часі.'
    - sentence: 'Моя подруга нарешті _____ новий лист, заклеїла конверт і відправила його.'
      answer: 'написала'
      options:
        - 'написала'
        - 'писала'
        - 'писатиме'
        - 'напише'
      explanation: 'Ряд послідовних завершених дій (написала, заклеїла, відправила) вимагає доконаного виду.'
    - sentence: 'Він взагалі _____ цю товсту книгу, навіть не відкривав її обкладинку.'
      answer: 'не читав'
      options:
        - 'не читав'
        - 'не прочитав'
        - 'не читає'
        - 'не читатиме'
      explanation: 'Заперечення самого акту дії, процесу навіть не було.'
    - sentence: 'Вчора ввечері ми довго _____ цей будинок, але так і не встигли завершити роботу.'
      answer: 'будували'
      options:
        - 'будували'
        - 'побудували'
        - 'будуємо'
        - 'будуватимемо'
      explanation: 'Оскільки результату не досягнуто, перша дія була тривалим процесом.'
    - sentence: 'Сонце яскраво _____, а маленькі пташки голосно співали у нашому літньому саду.'
      answer: 'світило'
      options:
        - 'світило'
        - 'посвітило'
        - 'світить'
        - 'світитиме'
      explanation: 'Опис фону в розповіді вимагає недоконаного виду минулого часу.'
    - sentence: 'Ми дуже довго йшли темним лісом, поки нарешті _____ велике чисте озеро.'
      answer: 'побачили'
      options:
        - 'побачили'
        - 'бачили'
        - 'бачимо'
        - 'побачимо'
      explanation: 'Раптове досягнення результату після довгого процесу.'
    - sentence: 'Наша команда багато працювала, але так і _____ цей важливий проєкт вчасно.'
      answer: 'не завершила'
      options:
        - 'не завершила'
        - 'не завершувала'
        - 'не завершує'
        - 'не завершить'
      explanation: 'Заперечення очікуваного результату в минулому часі.'
    - sentence: 'Зараз я уважно _____ свій новий проєкт для нашої великої компанії.'
      answer: 'пишу'
      options:
        - 'пишу'
        - 'писав'
        - 'написав'
        - 'напишу'
      explanation: 'Поточний процес, який відбувається просто зараз, описується недоконаним видом теперішнього часу.'

- type: match-up
  title: 'Знайдіть пару: Концепції та приклади'
  instruction: 'З"єднайте граматичне поняття з відповідним прикладом речення.'
  pairs:
    - left: 'Доконаний вид (минулий час)'
      right: 'Ми швидко побудували новий дім.'
    - left: 'Недоконаний вид (минулий час)'
      right: 'Ми довго будували цей дім.'
    - left: 'Синтетична форма майбутнього'
      right: 'Я читатиму цю книгу завтра.'
    - left: 'Аналітична форма майбутнього'
      right: 'Я буду читати цю книгу завтра.'
    - left: 'Майбутній час (результат)'
      right: 'Я обов"язково прочитаю цю книгу.'
    - left: 'Ввічливе пом"якшене прохання'
      right: 'Сідайте, будь ласка, до столу.'
    - left: 'Категоричний прямий наказ'
      right: 'Сядьте негайно за цей стіл!'
    - left: 'Сувора заборона дії'
      right: 'Ніколи не відкривай це вікно!'

- type: error-correction
  title: 'Виправте помилки: Вибір виду дієслова'
  instruction: 'Знайдіть хибне слово в реченні та оберіть правильний варіант.'
  items:
    - sentence: 'Я зараз дуже швидко прочитаю цю цікаву книгу у своїй кімнаті.'
      error: 'прочитаю'
      answer: 'читаю'
      options:
        - 'читаю'
        - 'читав'
        - 'прочитав'
        - 'буду читати'
      explanation: 'Для процесу, який відбувається прямо зараз, потрібен теперішній час (недоконаний вид).'
    - sentence: 'Ніколи не відкрий це велике вікно у нашій холодній кімнаті!'
      error: 'не відкрий'
      answer: 'не відкривай'
      options:
        - 'не відкривай'
        - 'не відкриватимеш'
        - 'не будеш відкривати'
        - 'не відкрив'
      explanation: 'Для суворої заборони завжди використовується тільки недоконаний вид наказового способу.'
    - sentence: 'Він довго намагався, але так і не робив це складне завдання.'
      error: 'не робив'
      answer: 'не зробив'
      options:
        - 'не зробив'
        - 'не робитиме'
        - 'не робить'
        - 'не буде робити'
      explanation: 'Якщо процес був, але результату немає, використовуємо заперечення доконаного виду.'
    - sentence: 'Будь ласка, швидко сідайте сюди на цей невеликий стілець!'
      error: 'сідайте'
      answer: 'сядьте'
      options:
        - 'сядьте'
        - 'сиділи'
        - 'будете сидіти'
        - 'сидітимете'
      explanation: 'У поєднанні зі словом швидко це прямий і різкий наказ, який вимагає доконаного виду.'
    - sentence: 'Зазвичай ми вирішили такі дрібні питання дуже швидко і просто.'
      error: 'вирішили'
      answer: 'вирішуємо'
      options:
        - 'вирішуємо'
        - 'вирішуватимемо'
        - 'будемо вирішувати'
        - 'вирішимо'
      explanation: 'Слово зазвичай вказує на регулярну дію, тому потрібен недоконаний вид.'
    - sentence: 'Я буду допомогти тобі з цим складним домашнім завданням щодня.'
      error: 'допомогти'
      answer: 'допомагати'
      options:
        - 'допомагати'
        - 'допоможу'
        - 'допомагаю'
        - 'допомагав'
      explanation: 'Складена форма майбутнього часу утворюється з дієсловом бути та інфінітивом недоконаного виду.'

