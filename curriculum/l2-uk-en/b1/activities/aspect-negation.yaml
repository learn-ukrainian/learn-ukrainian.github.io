- type: quiz
  title: "Вид дієслова в запереченні: Перевірка правил"
  instruction: "Оберіть одну правильну відповідь на кожне запитання про використання виду дієслова."
  items:
    - question: "Який вид дієслова зазвичай використовується для констатації факту відсутності дії?"
      explanation: "Для опису загального заперечення завжди використовуємо недоконаний вид."
      options:
        - text: "недоконаний"
          correct: true
        - text: "доконаний"
          correct: false
        - text: "інфінітив"
          correct: false
        - text: "наказовий"
          correct: false
    - question: "Яка фраза є головним маркером очікуваної дії в заперечних реченнях?"
      explanation: "Словосполучення 'ще не' вказує на те, що дія планується і очікується."
      options:
        - text: "ще не"
          correct: true
        - text: "вже не"
          correct: false
        - text: "ніколи не"
          correct: false
        - text: "взагалі не"
          correct: false
    - question: "Який вид дієслова обов'язково вимагає фраза 'ще не' в українській мові?"
      explanation: "Фраза 'ще не' підкреслює очікування результату, тому вимагає доконаного виду."
      options:
        - text: "доконаний"
          correct: true
        - text: "недоконаний"
          correct: false
        - text: "активний"
          correct: false
        - text: "пасивний"
          correct: false
    - question: "Який вид дієслова використовується для вираження суворої заборони виконання дії?"
      explanation: "Заборона блокує сам процес виконання дії, тому використовується недоконаний вид."
      options:
        - text: "недоконаний"
          correct: true
        - text: "доконаний"
          correct: false
        - text: "зворотний"
          correct: false
        - text: "безособовий"
          correct: false
    - question: "У якому випадку доконаний вид дієслова використовується в заперечних наказах?"
      explanation: "Доконаний вид в наказах використовується для попередження про можливий випадковий негативний результат."
      options:
        - text: "попередження про небезпеку"
          correct: true
        - text: "сувора заборона дії"
          correct: false
        - text: "констатація відсутності факту"
          correct: false
        - text: "опис регулярної дії"
          correct: false
    - question: "Який відмінок прямого додатка є обов'язковим у типовому заперечному реченні?"
      explanation: "У заперечних конструкціях об'єкт дії має стояти у формі родового відмінка згідно зі стандартом."
      options:
        - text: "родовий відмінок"
          correct: true
        - text: "знахідний відмінок"
          correct: false
        - text: "давальний відмінок"
          correct: false
        - text: "місцевий відмінок"
          correct: false
    - question: "Що підкреслює використання доконаного виду замість недоконаного без слова 'ще'?"
      explanation: "Доконаний вид у запереченні часто свідчить про те, що дія планувалася, але не дала результату."
      options:
        - text: "невдалу спробу або відсутність результату"
          correct: true
        - text: "загальний факт відсутності дії"
          correct: false
        - text: "прохання виконати певну дію"
          correct: false
        - text: "регулярне повторення цієї дії"
          correct: false
    - question: "Скільки часток 'не' має бути в реченні зі словом 'ніколи' або 'нічого'?"
      explanation: "В українській мові слова на 'ні-' вимагають обов'язкової наявності частки 'не' перед дієсловом."
      options:
        - text: "одна перед самим дієсловом"
          correct: true
        - text: "дві перед дієсловом і підметом"
          correct: false
        - text: "жодної частки не потрібно"
          correct: false
        - text: "частка додається після дієслова"
          correct: false

- type: true-false
  title: "Правда чи хиба: Аналіз тверджень про заперечення"
  instruction: "Визначте, чи є наведені граматичні твердження правильними."
  items:
    - statement: "Для загальної констатації факту відсутності дії завжди використовується доконаний вид."
      correct: false
      explanation: "Загальне заперечення вимагає недоконаного виду, оскільки ми говоримо про відсутність процесу."
    - statement: "Фраза 'ще не' автоматично вимагає використання дієслова доконаного виду."
      correct: true
      explanation: "Ця фраза вказує на активне очікування результату в майбутньому."
    - statement: "У заперечних реченнях прямий додаток завжди зберігає форму знахідного відмінка."
      correct: false
      explanation: "Згідно з Державним стандартом, прямий додаток обов'язково змінює відмінок на родовий."
    - statement: "Подвійне заперечення зі словами на 'ні-' є суворим правилом української граматики."
      correct: true
      explanation: "Слова типу 'ніколи' або 'нічого' завжди вимагають додаткової частки 'не' перед дієсловом."
    - statement: "Речення 'Не забудь ключі!' виражає загальну і сувору заборону виконувати дію."
      correct: false
      explanation: "Це попередження про випадкову помилку, тому тут логічно використано доконаний вид."
    - statement: "В українській культурі коротка відповідь 'Ні' може звучати занадто різко та нечемно."
      correct: true
      explanation: "Часто використовується ритуал ввічливої відмови, щоб пом'якшити комунікацію."
    - statement: "Фраза 'Я б з радістю, але...' є дуже грубою формою відмови від пропозиції."
      correct: false
      explanation: "Навпаки, це дуже ввічлива конструкція, яка показує ваш позитивний намір."
    - statement: "Речення 'Я не прочитав статтю' та 'Я не читав статтю' мають абсолютно однакове значення."
      correct: false
      explanation: "Перше вказує на невдалу спробу, а друге — на констатацію загального факту."

- type: match-up
  title: "Знайдіть відповідність: Семантика та вид дієслова"
  instruction: "З'єднайте тип заперечення з відповідним граматичним правилом."
  pairs:
    - left: "Загальне заперечення факту"
      right: "недоконаний вид дієслова"
    - left: "Очікувана дія зі словом 'ще не'"
      right: "доконаний вид дієслова"
    - left: "Сувора заборона дії"
      right: "недоконаний вид у наказі"
    - left: "Попередження про небезпеку"
      right: "доконаний вид у наказі"
    - left: "Прямий додаток при запереченні"
      right: "форма родового відмінка"
    - left: "Подвійне заперечення"
      right: "слова на ні- плюс частка не"
    - left: "Ввічлива відмова"
      right: "фраза 'на жаль, ні'"
    - left: "Невдала спроба"
      right: "доконаний вид без слова 'ще'"

- type: fill-in
  title: "Вставте правильне дієслово: 'ще не' проти 'не'"
  instruction: "Оберіть дієслово правильного виду (доконаний чи недоконаний) для кожного речення."
  items:
    - sentence: "Я ще не ... цей звіт, але він обов'язково буде готовий завтра."
      answer: "написав"
      options: ["написав", "писав", "пишу", "напишу"]
      explanation: "Очікувана дія зі словом 'ще не' вимагає доконаного виду 'написав'."
    - sentence: "Сьогодні я взагалі ... новини, бо не мав вільного часу зранку."
      answer: "не читав"
      options: ["не читав", "не прочитав", "ще не читав", "ще не прочитав"]
      explanation: "Констатація факту абсолютної відсутності процесу вимагає недоконаного виду."
    - sentence: "Максим ще не ... цю проблему, він продовжує активно думати."
      answer: "вирішив"
      options: ["вирішив", "вирішував", "вирішує", "вирішу"]
      explanation: "Дія активно очікується в найближчому майбутньому, тому потрібен доконаний вид."
    - sentence: "Олено, ти ще не ... мою нову презентацію для важливого клієнта?"
      answer: "перевірила"
      options: ["перевірила", "перевіряла", "перевірить", "перевіряє"]
      explanation: "Запитання про очікуваний результат вимагає доконаного виду."
    - sentence: "Вона ніколи ... у Львові, але дуже хоче туди поїхати наступного місяця."
      answer: "не була"
      options: ["не була", "була", "не побувала", "побувала"]
      explanation: "Загальне заперечення досвіду зі словом 'ніколи' завжди вимагає недоконаного виду."
    - sentence: "Студенти ще не ... всі нові слова з цього складного граматичного уроку."
      answer: "вивчили"
      options: ["вивчили", "вчили", "вивчать", "вчать"]
      explanation: "Процес триває, очікується результат, тому обираємо доконаний вид."
    - sentence: "Ми вчора ... свіжий хліб у магазині, тому вдома його зараз немає."
      answer: "не купували"
      options: ["не купували", "не купили", "купували", "купили"]
      explanation: "Проста констатація факту (дія не мала місця) — використовуємо недоконаний вид."
    - sentence: "Директор ще не ... цей важливий фінансовий документ, він лежить на його столі."
      answer: "підписав"
      options: ["підписав", "підписував", "підпише", "підписує"]
      explanation: "Документ чекає на підпис, це очікуваний результат, тому доконаний вид."

- type: group-sort
  title: "Розподіліть фрази за видом дієслова"
  instruction: "Відсортуйте речення у дві категорії: ті, що вимагають недоконаного виду, і ті, що вимагають доконаного."
  groups:
    - name: "Недоконаний вид (факт, заборона)"
      items: ["Я ніколи не бачив", "Не відкривай вікно", "Він не писав листа", "Я не купував хліба"]
    - name: "Доконаний вид (очікування, попередження)"
      items: ["Я ще не подивився", "Обережно, не впади", "Ще не вивчили слова", "Дивись, не забудь"]

- type: fill-in
  title: "Трансформація: Знахідний відмінок у Родовий"
  instruction: "Заповніть пропуск, змінивши прямий додаток на правильну форму родового відмінка для заперечного речення."
  items:
    - sentence: "'Ствердження: Я маю новий телефон. Заперечення: Я не маю ...'"
      answer: "нового телефона"
      options: ["нового телефона", "новий телефон", "новому телефону", "новим телефоном"]
      explanation: "Прямий додаток при запереченні обов'язково змінюється на родовий відмінок."
    - sentence: "'Ствердження: Ми читаємо цікаву книгу. Заперечення: Ми не читаємо ...'"
      answer: "цікавої книги"
      options: ["цікавої книги", "цікаву книгу", "цікавій книзі", "цікавою книгою"]
      explanation: "Слово 'книгу' (знахідний) стає 'книги' (родовий), а 'цікаву' змінюється на 'цікавої'."
    - sentence: "'Ствердження: Він розуміє це слово. Заперечення: Він не розуміє ...'"
      answer: "цього слова"
      options: ["цього слова", "це слово", "цьому слову", "цим словом"]
      explanation: "Слово 'слово' змінюється на 'слова' у родовому відмінку."
    - sentence: "'Ствердження: Вона дивиться новий фільм. Заперечення: Вона не дивиться ...'"
      answer: "нового фільму"
      options: ["нового фільму", "новий фільм", "новому фільму", "новим фільмом"]
      explanation: "Іменник чоловічого роду отримує закінчення -у в родовому відмінку для абстрактних і деяких інших понять, але тут 'фільму'."
    - sentence: "'Ствердження: Я бачу твого брата. Заперечення: Я не бачу ...'"
      answer: "твого брата"
      options: ["твого брата", "твій брат", "твоєму брату", "твоїм братом"]
      explanation: "Для істот знахідний і родовий відмінки часто збігаються, тому форма залишається незмінною."
    - sentence: "'Ствердження: Вони вирішують цю проблему. Заперечення: Вони не вирішують ...'"
      answer: "цієї проблеми"
      options: ["цієї проблеми", "цю проблему", "цій проблемі", "цією проблемою"]
      explanation: "Жіночий рід однини: 'цю проблему' перетворюється на 'цієї проблеми'."
    - sentence: "'Ствердження: Студент знає правильну відповідь. Заперечення: Студент не знає ...'"
      answer: "правильної відповіді"
      options: ["правильної відповіді", "правильну відповідь", "правильній відповіді", "правильною відповіддю"]
      explanation: "Слово жіночого роду 'відповідь' у родовому відмінку закінчується на -і."
    - sentence: "'Ствердження: Я купую свіжий хліб. Заперечення: Я не купую ...'"
      answer: "свіжого хліба"
      options: ["свіжого хліба", "свіжий хліб", "свіжому хлібу", "свіжим хлібом"]
      explanation: "Чоловічий рід 'хліб' у родовому відмінку набуває форми 'хліба'."

- type: error-correction
  title: "Виправте поширені помилки: Подвійне заперечення та вид"
  instruction: "Знайдіть помилку в реченні, виберіть правильний варіант і проаналізуйте правило."
  items:
    - sentence: "Я ніколи був у Києві минулого року."
      error: "був"
      answer: "не був"
      options: ["не був", "буду", "бувати", "є"]
      explanation: "Слово 'ніколи' вимагає обов'язкового використання частки 'не' перед дієсловом (подвійне заперечення)."
      error_type: "construction"
    - sentence: "Я зовсім не розумію це складне правило."
      error: "це складне правило"
      answer: "цього складного правила"
      options: ["цього складного правила", "цьому складному правилу", "цим складним правилом", "на цьому складному правилі"]
      explanation: "Згідно зі стандартом, об'єкт дії під час заперечення повинен мати форму родового відмінка."
      error_type: "phrase"
    - sentence: "Вона бачила нікого в офісі вчора ввечері."
      error: "бачила"
      answer: "не бачила"
      options: ["не бачила", "побачила", "побачить", "бачить"]
      explanation: "Займенник 'нікого' вимагає подвійного заперечення з обов'язковою часткою 'не'."
      error_type: "word"
    - sentence: "Я ще не робив домашнє завдання на завтра."
      error: "робив"
      answer: "зробив"
      options: ["зробив", "робити", "зроблю", "роблю"]
      explanation: "Конструкція 'ще не' вимагає дієслова доконаного виду, оскільки ми очікуємо фінального результату."
      error_type: "word"
    - sentence: "Не відкрий це вікно, тут дуже холодно зараз!"
      error: "відкрий"
      answer: "відкривай"
      options: ["відкривай", "відкрити", "відкриє", "відкриєш"]
      explanation: "Сувора заборона дії (наказ зупинити процес) завжди виражається дієсловом недоконаного виду."
      error_type: "word"
    - sentence: "Ми зараз не маємо новий словник сленгу."
      error: "новий словник"
      answer: "нового словника"
      options: ["нового словника", "новому словнику", "новим словником", "на новому словнику"]
      explanation: "Заперечення вимагає зміни знахідного відмінка прямого додатка на родовий відмінок."
      error_type: "phrase"

- type: unjumble
  title: "Складіть правильні заперечні речення"
  instruction: "Упорядкуйте слова, щоб утворити граматично правильне українське речення."
  items:
    - words: ["я", "ніколи", "не", "був", "у", "Києві"]
      answer: "Я ніколи не був у Києві"
    - words: ["вона", "нікого", "не", "бачила", "в", "офісі"]
      answer: "Вона нікого не бачила в офісі"
    - words: ["він", "ще", "не", "написав", "цей", "звіт"]
      answer: "Він ще не написав цей звіт"
    - words: ["я", "б", "з", "радістю", "але", "не", "можу"]
      answer: "Я б з радістю але не можу"
    - words: ["студенти", "ще", "не", "вивчили", "нові", "слова"]
      answer: "Студенти ще не вивчили нові слова"
    - words: ["я", "не", "зрозумів", "цього", "складного", "правила"]
      answer: "Я не зрозумів цього складного правила"

- type: mark-the-words
  title: "Знайдіть родовий відмінок у запереченнях"
  instruction: "Знайдіть і позначте всі іменники в родовому відмінку, які є прямими додатками в заперечних конструкціях."
  text: "Я довго шукав книгу, але не знайшов потрібного видання. Сьогодні ми не маємо вільного часу для цієї розмови. Мій колега не зрозумів вашого завдання і не зробив презентації."
  answers: ["видання", "часу", "завдання", "презентації"]

- type: select
  title: "Культура та контекст: Множинний вибір"
  instruction: "Прочитайте запитання і виберіть усі правильні варіанти відповіді."
  items:
    - question: "Які фрази є ввічливими способами відмовитися від пропозиції? Оберіть усі правильні."
      min_correct: 3
      explanation: "В українській культурі відмова має бути пом'якшеною за допомогою подяки або пояснення причини."
      options:
        - text: "На жаль, ні"
          correct: true
        - text: "Я б з радістю, але..."
          correct: true
        - text: "Ні, я не буду"
          correct: false
        - text: "Дуже дякую, але я не зможу"
          correct: true
