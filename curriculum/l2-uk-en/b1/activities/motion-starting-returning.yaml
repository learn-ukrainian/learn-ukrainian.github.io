- type: quiz
  title: Оберіть правильне дієслово
  items:
  - question: Ви їдете до іншого міста автобусом. Яке дієслово описує початок цієї
      подорожі?
    explanation: Для поїздки транспортом ми завжди використовуємо корінь -їхати з
      префіксом по-.
    options:
    - text: поїхати
      correct: true
    - text: піти
      correct: false
    - text: заїхати
      correct: false
    - text: увійти
      correct: false
  - question: Ви вирішили відвідати друга по дорозі додому на п'ять хвилин.
    explanation: Заскочити означає зробити дуже короткий, швидкий та неформальний
      візит.
    options:
    - text: заскочити
      correct: true
    - text: поїхати
      correct: false
    - text: розійтися
      correct: false
    - text: піти
      correct: false
  - question: Студенти закінчили писати складний тест і залишають велику аудиторію
      пішки.
    explanation: Розійтися означає масове розходження пішки в різні боки.
    options:
    - text: розійтися
      correct: true
    - text: поїхати
      correct: false
    - text: роз'їхатися
      correct: false
    - text: зайти
      correct: false
  - question: Ви плануєте забрати свою колегу з дому на автомобілі перед роботою.
    explanation: Заїхати означає забрати когось на транспорті.
    options:
    - text: заїхати
      correct: true
    - text: зайти
      correct: false
    - text: поїхати
      correct: false
    - text: піти
      correct: false
  - question: Вам треба забрати друга, але ви йдете пішки до його будинку.
    explanation: Зайти за кимось використовується, коли ви йдете пішки.
    options:
    - text: зайти
      correct: true
    - text: поїхати
      correct: false
    - text: роз'їхатися
      correct: false
    - text: заїхати
      correct: false
  - question: Після гучного весілля багато гостей викликали різні машини таксі.
    explanation: Роз'їхатися означає розходження багатьох людей на транспорті.
    options:
    - text: роз'їхатися
      correct: true
    - text: розійтися
      correct: false
    - text: піти
      correct: false
    - text: зайти
      correct: false
  - question: Ви сіли в переповнену маршрутку і їдете на роботу.
    explanation: Поїхати використовується для початку руху на транспорті.
    options:
    - text: поїхати
      correct: true
    - text: заскочити
      correct: false
    - text: розійтися
      correct: false
    - text: увійти
      correct: false
  - question: Ви сховалися за будівлею, щоб вас ніхто не міг побачити.
    explanation: Зайти за кут або будівлю означає сховатися або переміститися за об'єкт.
    options:
    - text: зайти
      correct: true
    - text: поїхати
      correct: false
    - text: розійтися
      correct: false
    - text: піти
      correct: false
  - question: Ваш директор повільно і серйозно відкрив великі двері кабінету.
    explanation: Увійти - це формальне слово для позначення перетину порогу.
    options:
    - text: увійти
      correct: true
    - text: заскочити
      correct: false
    - text: роз'їхатися
      correct: false
    - text: поїхати
      correct: false
  - question: Ви просите друга підвезти вас, бо йде сильний холодний дощ.
    explanation: Заїхати за другом означає забрати його на автомобілі.
    options:
    - text: заїхати
      correct: true
    - text: розійтися
      correct: false
    - text: зайти
      correct: false
    - text: поїхати
      correct: false
  - question: Ви дуже швидко відвідуєте аптеку, щоб купити ліки від головного болю.
    explanation: Забігти означає дуже швидкий візит, часто в екстреній ситуації.
    options:
    - text: забігти
      correct: true
    - text: поїхати
      correct: false
    - text: роз'їхатися
      correct: false
    - text: піти
      correct: false
  - question: Собаки злякалися гучного звуку грому і почали бігти в різні боки.
    explanation: Розбігтися означає швидко розійтися, використовуючи біг.
    options:
    - text: розбігтися
      correct: true
    - text: заскочити
      correct: false
    - text: зайти
      correct: false
    - text: розійтися
      correct: false
  - question: Що ви кажете, коли пропонуєте випити останній келих перед тим, як залишити
      гостей?
    explanation: На коня - це традиційний український тост перед прощанням та розходженням.
    options:
    - text: на коня
      correct: true
    - text: за здоров'я
      correct: false
    - text: на щастя
      correct: false
    - text: за любов
      correct: false
  - question: Ви вирушаєте у свою літню відпустку літаком до іншої країни.
    explanation: Для повітряного транспорту ми використовуємо корінь -летіти з префіксом
      по-.
    options:
    - text: полетіти
      correct: true
    - text: піти
      correct: false
    - text: розійтися
      correct: false
    - text: заскочити
      correct: false
  - question: Що потрібно обов'язково зробити перед довгою мандрівкою за давньою українською
      традицією?
    explanation: Присісти на дорогу - це важливий психологічний та культурний ритуал
      перед виїздом.
    options:
    - text: присісти на дорогу
      correct: true
    - text: випити чаю
      correct: false
    - text: заспівати пісню
      correct: false
    - text: обійняти сусіда
      correct: false
  instruction: Оберіть правильну відповідь.
