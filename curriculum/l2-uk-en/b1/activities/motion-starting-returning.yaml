  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: Виправте помилки
  items:
  - sentence: Я дуже швидко кушаю свій сніданок і біжу на роботу.
    error: кушаю
    answer: їм
    error_type: word
    options:
    - їм
    - їду
    - їжу
    - кусаю
    explanation: Слово кушати є калькою з російської мови, правильно українською їсти.
