  instruction: Оберіть правильне слово для заповнення пропуску.
- type: true-false
  title: Правила та етикет
  items:
  - statement: В українському транспорті спочатку люди заходять всередину, а потім
      виходять ті, кому потрібно.
    correct: false
    explanation: 'Золоте правило українського транспорту стверджує: спочатку виходять,
      потім заходять.'
  - statement: Ритуал присісти на дорогу допомагає мандрівникам заспокоїтися перед
      довгою подорожжю.
    correct: true
    explanation: Цей старовинний ритуал сьогодні має важливу сучасну психологічну
      функцію зняття стресу.
  - statement: Тост на коня проголошують на самому початку вечірки, коли всі гості
      тільки прийшли.
    correct: false
    explanation: На коня - це традиційний фінальний тост, який проголошують перед
      прощанням та розходженням.
  - statement: Дієслово увійти є набагато більш формальним та офіційним, ніж дружнє
      дієслово зайти.
    correct: true
    explanation: Увійти фокусується на фізичному факті перетину межі, а зайти несе
      теплий соціальний компонент.
  - statement: Фраза піти до Львова є абсолютно правильною, якщо ви плануєте їхати
      туди швидким поїздом.
    correct: false
    explanation: Якщо відстань велика і вимагає транспорту, ви повинні використовувати
      дієслово поїхати.
  - statement: Слово заскочити використовується виключно в дуже серйозних, офіційних
      ділових розмовах.
    correct: false
    explanation: Заскочити - це яскраве розмовне слово, яке ідеально підходить для
      неформального спілкування.
  - statement: Якщо ви забираєте друга на власному автомобілі, ви повинні сказати
      я заїду за тобою.
    correct: true
    explanation: Заїхати за кимось чітко вказує на використання транспортного засобу.
  - statement: Після використання префікса роз- разом із часткою -ся завжди відбувається
      масове розпорошення.
    correct: true
    explanation: Дієслова розійтися та роз'їхатися означають рух багатьох об'єктів
      у різні боки від одного центру.
  instruction: Визначте, чи твердження правильне.
