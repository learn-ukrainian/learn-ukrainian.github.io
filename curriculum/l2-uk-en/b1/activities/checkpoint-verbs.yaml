version: '1.0'
module: checkpoint-verbs
level: b1
inline:
- id: quiz-identify-conditional-and-real-unreal-conditions-in-sentences
  type: quiz
  instruction: Оберіть правильний варіант, зважаючи на тип умови (реальна/нереальна)
    та правила милозвучності
  items:
  - question: _____ я матиму вільний час, я обов'язково зателефоную.
    options:
    - Якщо
    - Якби
    - Щоб
    - Хай
    correct: 0
  - question: _____ я знав про цю проблему раніше, я б ніколи цього не робив.
    options:
    - Якщо
    - Коли
    - Якби
    - Бо
    correct: 2
  - question: Я _____ замовити велику каву з молоком, будь ласка.
    options:
    - хотів би
    - хотів б
    - хотів
    - би хотів
    correct: 0
  - question: Чи не _____ ви надіслати цей файл до кінця дня?
    options:
    - могли б
    - могли би
    - могли
    - би могли
    correct: 0
  - question: _____ він сьогодні прийде в офіс, скажи йому зачекати.
    options:
    - Якби
    - Якщо
    - Щоб
    - Аби
    correct: 1
  - question: Вона _____ цю відповідь, якби уважно слухала.
    options:
    - знала би
    - знала б
    - знає
    - знатиме
    correct: 1
  - question: Якби не _____, ми б ніколи не закінчили проєкт вчасно.
    options:
    - ти
    - тобі
    - тебе
    - тобою
    correct: 0
  - question: _____ ж то в мене був такий потужний комп'ютер!
    options:
    - Якщо
    - Якби
    - Щоб
    - Чи
    correct: 1
  - question: Якби я _____ тобою зараз, я б негайно погодився.
    options:
    - був
    - буду
    - є
    - був би
    correct: 0
  - question: Ми _____ в кіно, якщо ти хочеш.
    options:
    - пішли
    - пішли б
    - підемо
    - підемо б
    correct: 2
  - question: Я _____ тобі допомогти, але в мене немає часу.
    options:
    - хотів би
    - хотів б
    - хотів
    - хотів бити
    correct: 0
  - question: _____ я не забув гаманець, я б купив каву.
    options:
    - Якщо
    - Якби
    - Щоб
    - Аби
    correct: 1
- id: fill-in-verb-forms
  type: fill-in
  instruction: Вставте правильну форму наказового способу
  items:
  - sentence: 'Замість «Давайте зробимо», краще сказати: «____ це!»'
    answer: Зробімо
    options:
    - Давайте зробимо
    - Зробимо
    - Зробімо
    - Робімо
  - sentence: ____ двері, будь ласка.
    answer: Відчини
    options:
    - Відкривай
    - Відчини
    - Відкриєш
    - Відчиняй
  - sentence: Не ____ вікно! Надворі холодно.
    answer: відчиняйте
    options:
    - відчиняйте
    - відчиніть
    - відкриєте
    - відкривайте
  - sentence: ____ студенти прочитають цей текст.
    answer: Хай
    options:
    - Хай
    - Нехай би
    - Щоб
    - Якби
  - sentence: Будь ласка, ____ мені з цим завданням.
    answer: допоможіть
    options:
    - допоможіть
    - допоможи
    - допоможімо
    - допомагаєте
  - sentence: ____! Я хочу тобі щось показати.
    answer: Глянь
    options:
    - Глянь
    - Гляніть
    - Глянемо
    - Глянеш
  - sentence: ____ за стіл і почнімо їсти.
    answer: Сядьте
    options:
    - Сядьте
    - Сідаєте
    - Сядете
    - Сядь
  - sentence: Не ____ про нашу зустріч завтра.
    answer: забувай
    options:
    - забудь
    - забудеш
    - забувай
    - забуватимеш
  - sentence: 'Замість «Давайте підемо», ми кажемо друзям: «____!»'
    answer: Ходімо
    options:
    - Ходімо
    - Пішли
    - Підемо
    - Йдемо
  - sentence: ____ хліб акуратно.
    answer: Ріж
    options:
    - Ріж
    - Ріжте
    - Ріжи
    - Ріжеш
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть слова та конструкції за граматичними категоріями
  groups:
  - label: Наказовий спосіб
    items:
    - ходімо
    - зробіть
    - хай читає
  - label: Умовний спосіб
    items:
    - якби я знав
    - я хотів би
    - знала б
  - label: Зворотні дієслова
    items:
    - зустрічатися
    - хвилюватися
    - вчимось
  - label: Віддієслівні іменники
    items:
    - читання
    - відкриття
    - підпис
- id: match-up-match-active-sentences-to-their-passive-or-conditional-transformations
  type: match-up
  instruction: Знайдіть відповідну трансформацію (пасивну, ввічливу або умовну) для
    кожного активного речення
  pairs:
  - left: Ми написали новий код.
    right: Новий код написано.
  - left: Команда розбила завдання на частини.
    right: Завдання розбито на частини.
  - left: Закрий двері!
    right: Чи не міг би ти закрити двері?
  - left: Якщо я матиму гроші, я куплю комп'ютер.
    right: Якби я мав гроші, я б купив комп'ютер.
  - left: Нам треба почати роботу.
    right: Почнімо роботу!
  - left: Студенти повинні прочитати текст.
    right: Хай студенти прочитають текст.
  - left: Маленька дитина миється.
    right: Мама миє дитину.
  - left: Ми зараз обговорюємо цю проблему.
    right: Відбувається обговорення проблеми.
  - left: Ця компанія активно будує новий дім.
    right: Дім швидко будується.
  - left: Я хочу каву з молоком.
    right: Я хотів би каву з молоком.
- id: reading-comprehension-it-interview
  type: quiz
  instruction: Дайте відповіді на запитання до діалогу-синтезу (IT-інтерв'ю)
  items:
  - question: Чому HR-менеджер використовує конструкцію «Якби ви отримали цей оффер...»?
    options:
    - Щоб перевірити гіпотетичне мислення кандидата
    - Бо він уже відмовив кандидату
    - Щоб дати прямий наказ
    - Бо це реальна умова
    correct: 0
  - question: Яку конструкцію використовує кандидат для звіту про завершений проєкт?
    options:
    - Пасивну безособову («програму розроблено»)
    - Активну з «давайте» («давайте розробимо»)
    - Наказову («розробіть програму»)
    - Умовну («я б розробив»)
    correct: 0
  - question: 'Який сполучник використовує кандидат для опису свого реального плану:
      «____ я пройду інтерв''ю...»?'
    options:
    - Якщо
    - Якби
    - Щоб
    - Аби
    correct: 0
  - question: Чому використання дієслів «перевірив» та «розроблено» (доконаний вид)
      важливе на співбесіді?
    options:
    - Вони демонструють орієнтацію на результат
    - Вони показують процес без завершення
    - Вони вказують на нереальну мрію
    - Вони звучать неформально
    correct: 0
  - question: Яке слово ввічливості правильно вживає кандидат?
    options:
    - Вибачте
    - Вибачаюся
    - Вибачаюсь
    - Пробачаюся
    correct: 0
  - question: Яку граматичну роль виконують слова «тестування», «планування» та «мислення»
      в діалозі?
    options:
    - Це віддієслівні іменники, які підвищують регістр
    - Це дієслова доконаного виду
    - Це зворотні дієслова
    - Це займенники множини
    correct: 0
  - question: Як HR-менеджер формулює пряме прохання до кандидата?
    options:
    - Напишіть
    - Напишемо
    - Хай напише
    - Написано
    correct: 0
  - question: Як кандидат пропонує автоматизувати технічний звіт?
    options:
    - «Хай система автоматично генерує...» (3-тя особа)
    - «Згенеруймо звіт...» (1-ша особа)
    - «Система згенерувала...» (минулий час)
    - «Згенеруй систему...» (2-га особа)
    correct: 0
