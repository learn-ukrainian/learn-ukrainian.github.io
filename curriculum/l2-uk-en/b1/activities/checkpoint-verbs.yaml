- type: translate
  instruction: Оберіть найбільш природний український переклад, уникаючи кальок
  items:
  - source: Let's go to the cinema!
    options:
    - text: Ходімо в кіно!
      correct: true
    - text: Давайте підемо в кіно!
      correct: false
    - text: Пішли в кіно!
      correct: false
  - source: I apologize.
    options:
    - text: Вибачте.
      correct: true
    - text: Я вибачаюся.
      correct: false
    - text: Пробачаюся.
      correct: false
  - source: Could you help me?
    options:
    - text: Чи не могли б ви мені допомогти?
      correct: true
    - text: Ви можете мені допомогти?
      correct: false
    - text: Чи могли би ви допомогти мені?
      correct: false
  - source: The house was built by us.
    options:
    - text: Ми збудували дім.
      correct: true
    - text: Дім був збудований нами.
      correct: false
    - text: Дім було збудовано нами.
      correct: false
  - source: I am learning the Ukrainian language.
    options:
    - text: Я вчу українську мову.
      correct: true
    - text: Я вчуся українську мову.
      correct: false
    - text: Я навчаюсь українську мову.
      correct: false
  - source: Let him read.
    options:
    - text: Хай читає.
      correct: true
    - text: Давай він читає.
      correct: false
    - text: Нехай читати.
      correct: false
