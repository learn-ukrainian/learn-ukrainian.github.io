version: '1.0'
module: checkpoint-verbs
level: b1
workbook:
- id: quiz-identify-structures
  type: quiz
  instruction: Прочитайте речення та визначте граматичну форму або структуру виділеного
    дієслова/слова.
  items:
  - question: «Якби ми підписали цей контракт, ми б отримали бонус».
    options:
    - Нереальна умова
    - Реальна умова
    - Наказовий спосіб
    - Пасивний стан
    correct: 0
  - question: «Якщо завтра буде гарна погода, ми підемо гуляти».
    options:
    - Реальна умова
    - Нереальна умова
    - Зворотне дієслово
    - Віддієслівний іменник
    correct: 0
  - question: «Будь ласка, перевірте цей модуль авторизації ще раз».
    options:
    - Наказовий спосіб
    - Зворотне дієслово
    - Пасивний стан
    - Нереальна умова
    correct: 0
  - question: «Новий мобільний застосунок уже успішно розроблено».
    options:
    - Пасивний стан (на -но/-то)
    - Активний стан
    - Наказовий спосіб
    - Віддієслівний іменник
    correct: 0
  - question: «Мені сьогодні зовсім не працюється».
    options:
    - Безособове зворотне дієслово
    - Взаємне зворотне дієслово
    - Пасивний стан
    - Наказовий спосіб
    correct: 0
  - question: «Команда швидко збирається на ранкову зустріч».
    options:
    - Власне зворотне дієслово
    - Взаємне зворотне дієслово
    - Пасивний стан
    - Безособове дієслово
    correct: 0
  - question: «Ми сподіваємося, що скоро зустрінемося».
    options:
    - Взаємне зворотне дієслово
    - Пасивний стан
    - Безособове дієслово
    - Віддієслівний іменник
    correct: 0
  - question: «Регулярне тестування системи проводиться щотижня».
    options:
    - Віддієслівний іменник
    - Пасивний стан на -но/-то
    - Дієприкметник
    - Зворотне дієслово (взаємне)
    correct: 0
  - question: «Ходімо на обід, я дуже зголоднів».
    options:
    - Наказовий спосіб (спільна дія)
    - Наказовий спосіб (2 особа)
    - Реальна умова
    - Пасивний стан
    correct: 0
  - question: «Чи не могли б ви зробити цей звіт швидше?»
    options:
    - Умовний спосіб (ввічливе прохання)
    - Наказовий спосіб (наказ)
    - Нереальна умова
    - Зворотне дієслово
    correct: 0
  - question: «Дім побудовано за найсучаснішими технологіями».
    options:
    - Пасивний стан (на -но/-то)
    - Пасивний стан (на -ся)
    - Віддієслівний іменник
    - Активний стан
    correct: 0
  - question: «Нехай вони самі вирішують цю проблему».
    options:
    - Наказовий спосіб (3 особа)
    - Умовний спосіб
    - Реальна умова
    - Пасивний стан
    correct: 0
- id: fill-in-mixed-text
  type: fill-in
  instruction: Вставте правильну форму дієслова, щоб доповнити текст.
  items:
  - sentence: Мій ідеальний день завжди _____ з міцної кави.
    answer: починається
    options:
    - починається
    - починаюся
    - починаються
  - sentence: Якщо я матиму чіткий план, я _____ дуже сфокусовано.
    answer: працюватиму
    options:
    - працюватиму
    - працював би
    - працюй
  - sentence: _____ наші головні завдання на сьогодні.
    answer: Обговорімо
    options:
    - Обговорімо
    - Давайте обговорити
    - Обговорюємо
  - sentence: Новий проєкт уже успішно _____.
    answer: завершено
    options:
    - завершено
    - завершили
    - завершилося
  - sentence: Якби я мав більше часу, я _____ набагато більше.
    answer: зробив би
    options:
    - зробив би
    - зроблю
    - зробив
  - sentence: Сьогодні мені зовсім не _____ сидіти в офісі.
    answer: хочеться
    options:
    - хочеться
    - хочуся
    - хочемося
  - sentence: Не _____ регулярно зберігати свої файли.
    answer: забувайте
    options:
    - забувайте
    - забудьте
    - забути
  - sentence: Сподіваюся, ми скоро _____ на конференції.
    answer: зустрінемося
    options:
    - зустрінемося
    - зустрінемось
    - зустрілися
  - sentence: Постійне _____ — це ключ до успіху в IT.
    answer: навчання
    options:
    - навчання
    - навчати
    - навчатися
  - sentence: Тож _____ разом і досягаймо нових висот!
    answer: працюймо
    options:
    - працюймо
    - працюйте
    - працюємо
- id: error-correction-phase3
  type: error-correction
  instruction: Знайдіть і виправте граматичні та стилістичні помилки в реченнях.
  items:
  - sentence: Пішли в кіно, сьогодні чудова погода!
    error: Пішли
    correction: Ходімо
    error_type: word
    options:
    - Ходімо
    - Підемо
    - Йдемо
    explanation: Для заклику до спільної дії використовуємо інклюзивну форму наказового
      способу 'ходімо', а не форму минулого часу 'пішли' (яка є калькою).
  - sentence: Якщо б я знав про це раніше, я б обов'язково допоміг.
    error: Якщо б
    correction: Якби
    error_type: word
    options:
    - Якби
    - Коли
    - Щоб
    explanation: Для вираження нереальної умови використовується спеціальний сполучник
      'якби', а не конструкція 'якщо б'.
  - sentence: Ця цікава стаття була написана мною вчора.
    error: була написана мною
    correction: я написав
    error_type: construction
    options:
    - я написав
    - була написана
    - написалася
    explanation: Українська мова віддає сильну перевагу активному стану. Пасивні конструкції
      з орудним відмінком діяча ('мною') звучать неприродно.
  - sentence: Я дуже вибачаюся за запізнення на зустріч.
    error: вибачаюся
    correction: вибачте
    error_type: word
    options:
    - вибачте
    - пробачаюся
    - вибачаюсь
    explanation: Дієслово 'вибачатися' має зворотне значення і буквально означає 'вибачати
      себе'. Правильно казати 'вибачте' або 'прошу вибачення'.
  - sentence: Сядте, будь ласка, і почекайте керівника.
    error: Сядте
    correction: Сядьте
    error_type: word
    options:
    - Сядьте
    - Сідайте
    - Сядіте
    explanation: У наказовому способі після м'якого [д'] перед закінченням -те обов'язково
      зберігається м'який знак.
  - sentence: Давайте підпишемо цей договір уже сьогодні.
    error: Давайте підпишемо
    correction: Підпишімо
    error_type: construction
    options:
    - Підпишімо
    - Хай підпишемо
    - Підписуємо
    explanation: Для заклику до спільної дії краще використовувати форму 1-ї особи
      множини наказового способу ('підпишімо'), а не розмовну конструкцію з 'давайте'.
  - sentence: Він зараз зовсім не хочеться вчитися.
    error: Він
    correction: Йому
    error_type: word
    options:
    - Йому
    - Ним
    - Його
    explanation: Безособові зворотні дієслова (такі як хочеться, спиться) описують
      неконтрольовані стани і вимагають суб'єкта в давальному відмінку ('йому'), а
      не в називному.
  - sentence: Будь ласка, не забудьте відправити листа сьогодні.
    error: забудьте
    correction: забувайте
    error_type: word
    options:
    - забувайте
    - забудете
    - забути
    explanation: 'У заперечних проханнях (із часткою ''не'') ми майже завжди використовуємо
      дієслова недоконаного виду: ''не забувайте''.'
- id: match-up-transformations
  type: match-up
  instruction: З'єднайте речення ліворуч із їхніми логічними граматичними трансформаціями
    або наслідками праворуч.
  pairs:
  - left: Менеджер підписав важливий контракт.
    right: Контракт успішно підписано.
  - left: Ми збудували новий великий дім.
    right: Новий великий дім збудовано.
  - left: Якщо завтра буде гарна погода...
    right: '...ми підемо гуляти в парк.'
  - left: Якби вчора не було дощу...
    right: '...ми б обов''язково пішли гуляти.'
  - left: Команда розробників тестує програму.
    right: Зараз триває тестування програми.
  - left: Ми плануємо новий масштабний проєкт.
    right: Наше планування займає багато часу.
  - left: Якщо ти допоможеш мені з проєктом...
    right: '...я пригощу тебе смачною кавою.'
  - left: Якби ти допоміг мені вчора...
    right: '...я б пригостив тебе смачною кавою.'
  - left: Студенти уважно читають текст.
    right: Це читання дуже корисне для студентів.
  - left: Компанія розробила новий застосунок.
    right: Новий застосунок розроблено.
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть дієслова та конструкції за їхніми граматичними категоріями
    Фази 3.
  groups:
  - label: Умовний спосіб
    items:
    - я б зробив
    - якби ми знали
    - чи не могли б ви
  - label: Наказовий спосіб
    items:
    - працюймо
    - не забувайте
    - хай щастить
  - label: Зворотне дієслово
    items:
    - зустрінемося
    - спиться
  - label: Пасивний стан
    items:
    - розроблено
    - підписано
  - label: Словотвір (віддієслівні)
    items:
    - тестування
    - пошук
- id: quiz-dialogue-comprehension
  type: quiz
  instruction: Прочитайте діалог між HR-менеджером та кандидатом і дайте відповіді
    на граматичні запитання.
  items:
  - question: Чому кандидат використовує фразу «Якби я щиро не любив програмування,
      я б ніколи не подавався»?
    options:
    - Щоб яскраво продемонструвати свою глибоку мотивацію та любов до професії.
    - Бо він насправді зовсім не любить програмування.
    - Щоб пояснити причину свого запізнення на співбесіду.
    - Бо це реальна умова для успішного підписання контракту.
    correct: 0
  - question: Яку граматичну конструкцію використовує HR-менеджер для ввічливого прохання
      на самому початку розмови?
    options:
    - Умовний спосіб з формотворчою часткою «б» (Чи не могли б ви...).
    - Прямий і різкий наказовий спосіб (Розкажіть мені...).
    - 'Дійсний спосіб майбутнього часу (Ви розкажете...). '
    - Пасивний стан (Вам розказано...).
    correct: 0
  - question: Яке віддієслівне слово використовує кандидат для опису своєї професійної
      сфери діяльності?
    options:
    - розробка
    - розробляти
    - розроблено
    - розробляється
    correct: 0
  - question: Що означає фраза «тестування проводиться щотижня» з погляду граматики?
    options:
    - Це пасивноподібне зворотне дієслово, що описує регулярний процес.
    - Це активний стан, де тестування саме себе проводить.
    - Це наказовий спосіб для команди інженерів.
    - Це віддієслівний іменник у кличному відмінку.
    correct: 0
  - question: Коли менеджер дає кандидату практичне технічне завдання, яку форму він
      обирає?
    options:
    - Прямий наказовий спосіб («Напишіть, будь ласка»).
    - Умовний спосіб («Ви б написали»).
    - Безособову форму («Написано»).
    - Пасивний стан («Хай буде написано»).
    correct: 0
  - question: 'У реченні «Нехай це буде базова функція» слово «нехай» використовується
      для:'
    options:
    - Утворення аналітичної форми наказового способу для третьої особи.
    - Суворої заборони виконувати вказану дію.
    - Формування нереальної умови у минулому часі.
    - Утворення безособового пасивного стану.
    correct: 0
  - question: Як кандидат коментує виконане завдання, фокусуючись на результаті?
    options:
    - 'Він використовує безособову форму: «Завдання виконано».'
    - 'Він використовує активний стан: «Я виконав завдання».'
    - 'Він використовує зворотне дієслово: «Завдання виконується».'
    - 'Він використовує наказовий спосіб: «Виконаймо завдання».'
    correct: 0
  - question: Чому кандидат наприкінці розмови каже «ми зустрінемося», а не «я зустріну
      вас»?
    options:
    - Це взаємне зворотне дієслово, яке стратегічно підкреслює рівноправну співпрацю.
    - Він просто забув, як правильно відмінювати перехідні дієслова.
    - Це безособове дієслово, бо він ніяк не контролює цю ситуацію.
    - Це віддієслівний іменник у множині.
    correct: 0
