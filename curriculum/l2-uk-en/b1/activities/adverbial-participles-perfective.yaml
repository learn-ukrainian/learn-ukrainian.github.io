- type: fill-in
  title: 'Логіка наслідків: оберіть правильну форму'
  instruction: 'Доповніть речення правильним дієприслівником доконаного виду.'
  items:
    - sentence: '_____ новину про новий закон, директор скликав нараду.'
      answer: 'Прочитавши'
      options: ['Прочитавши', 'Прочитати', 'Прочитав', 'Читаючи']
    - sentence: 'Лише _____ останню главу роману, письменник дозволив собі відпочити.'
      answer: 'написавши'
      options: ['написавши', 'написати', 'написав', 'пишучи']
    - sentence: '_____ глибокий вдих, співачка вийшла на велику сцену.'
      answer: 'Зробивши'
      options: ['Зробивши', 'Зробити', 'Зробив', 'Роблячи']
    - sentence: '_____ додому після важкого дня, я просто впав на диван.'
      answer: 'Прийшовши'
      options: ['Прийшовши', 'Прийти', 'Прийшов', 'Приходячи']
    - sentence: 'Він застиг від здивування, вперше _____ Карпати на власні очі.'
      answer: 'побачивши'
      options: ['побачивши', 'побачити', 'побачив', 'бачачи']
    - sentence: '_____ правду про своє походження, він поїхав шукати родичів.'
      answer: 'Дізнавшись'
      options: ['Дізнавшись', 'Дізнатися', 'Дізнався', 'Дізнаючись']
    - sentence: '_____ двері, він побачив порожню кімнату.'
      answer: 'Відкривши'
      options: ['Відкривши', 'Відкрити', 'Відкрив', 'Відкриваючи']
    - sentence: '_____ пальто, він вийшов на мороз.'
      answer: 'Одягнувши'
      options: ['Одягнувши', 'Одягнути', 'Одягнув', 'Одягаючи']

- type: fill-in
  title: 'Морфологія: вибір правильного суфікса'
  instruction: 'Оберіть правильну форму дієприслівника, зважаючи на основу дієслова.'
  items:
    - sentence: '_____ хворому, лікар швидко пішов до іншої палати.'
      answer: 'Допомігши'
      options: ['Допомігши', 'Допомогши', 'Допомогівши', 'Допомагаючи']
    - sentence: '_____ смачний торт, вона запросила сусідів на чай.'
      answer: 'Спікши'
      options: ['Спікши', 'Спіквши', 'Спекши', 'Спеквши']
    - sentence: '_____ всі необхідні документи, юрист завершив справу.'
      answer: 'Зібравши'
      options: ['Зібравши', 'Зібраши', 'Зібрати', 'Збираючи']
    - sentence: '_____ нові меблі, ми почали ремонт у квартирі.'
      answer: 'Привізши'
      options: ['Привізши', 'Привізвши', 'Привезивши', 'Привозячи']
    - sentence: '_____ у селі, він чудово розумівся на сільському господарстві.'
      answer: 'Вирісши'
      options: ['Вирісши', 'Вирісвши', 'Виростивши', 'Виростаючи']
    - sentence: '_____ кімнату, мама пішла готувати вечерю.'
      answer: 'Замівши'
      options: ['Замівши', 'Заміввши', 'Замети', 'Замітаючи']
    - sentence: '_____ про проблему, менеджер одразу запропонував рішення.'
      answer: 'Сказавши'
      options: ['Сказавши', 'Сказаши', 'Сказати', 'Кажучи']
    - sentence: '_____ важливу інформацію, шпигун непомітно зник.'
      answer: 'Зберігши'
      options: ['Зберігши', 'Зберігвши', 'Зберегши', 'Зберігаючи']

- type: quiz
  title: 'Теорія: розуміння попередності та видів'
  instruction: 'Дайте відповіді на теоретичні питання щодо дієприслівників доконаного виду.'
  items:
    - question: 'Яке головне граматичне значення передає дієприслівник доконаного виду?'
      explanation: 'Доконаний вид завжди вказує на завершену дію, яка відбулася до головної.'
      options:
        - text: 'Попередність і завершеність дії.'
          correct: true
        - text: 'Одночасність із головною дією.'
          correct: false
        - text: 'Дію, яка відбудеться в майбутньому.'
          correct: false
        - text: 'Процес без чіткого завершення.'
          correct: false
    - question: 'Від якої форми дієслова найпростіше утворити дієприслівник на -вши?'
      explanation: 'Найлегший алгоритм — взяти форму минулого часу чоловічого роду (наприклад, «сказав») і додати «-ши».'
      options:
        - text: 'Від форми минулого часу чоловічого роду.'
          correct: true
        - text: 'Від форми теперішнього часу.'
          correct: false
        - text: 'Від форми майбутнього часу.'
          correct: false
        - text: 'Від інфінітива недоконаного виду.'
          correct: false
    - question: 'Коли для утворення дієприслівника використовується суфікс -ши замість -вши?'
      explanation: 'Суфікс -ши використовується, коли основа дієслова минулого часу закінчується на приголосний (наприклад, приніс -> принісши).'
      options:
        - text: 'Коли основа дієслова закінчується на приголосний звук.'
          correct: true
        - text: 'Коли основа дієслова закінчується на голосний звук.'
          correct: false
        - text: 'Коли це дієслово недоконаного виду.'
          correct: false
        - text: 'Цей суфікс використовується тільки для множини.'
          correct: false
    - question: 'Яка синтаксична функція дієприслівникового звороту в реченні?'
      explanation: 'Він ускладнює просте речення, утворюючи просте ускладнене речення.'
      options:
        - text: 'Він утворює просте ускладнене речення.'
          correct: true
        - text: 'Він завжди є головним підметом.'
          correct: false
        - text: 'Він створює складнопідрядне речення.'
          correct: false
        - text: 'Він не впливає на синтаксис речення.'
          correct: false
    - question: 'Що таке правило єдиного підмета для дієприслівникового звороту?'
      explanation: 'Дія звороту і дія головного дієслова повинні виконуватися одним суб''єктом.'
      options:
        - text: 'Дії звороту і головного дієслова виконує одна особа.'
          correct: true
        - text: 'У реченні може бути тільки один дієприслівник.'
          correct: false
        - text: 'Дієприслівник завжди стоїть перед підметом.'
          correct: false
        - text: 'Підмет повинен бути виражений іменником.'
          correct: false
    - question: 'Чому речення «Відкриваючи двері, я зайшов» стилістично некоректне?'
      explanation: 'Суфікс -ючи (недоконаний вид) означає одночасність, тобто неможливо заходити в той самий момент, коли двері ще відкриваються.'
      options:
        - text: 'Бо ці дії не можуть відбуватися одночасно в реальності.'
          correct: true
        - text: 'Бо слово «відкриваючи» написано з помилкою.'
          correct: false
        - text: 'Бо в реченні немає дієслова в минулому часі.'
          correct: false
        - text: 'Бо це безособове речення.'
          correct: false
    - question: 'Яке прислів''я ілюструє необхідність попередньої підготовки перед дією?'
      explanation: 'Прислів''я «Сівши, не поїдеш» означає, що сама лише підготовка (посадка) не гарантує руху.'
      options:
        - text: 'Сівши, не поїдеш.'
          correct: true
        - text: 'Далеко сховавши, близько не знайдеш.'
          correct: false
        - text: 'Не посіявши, не пожнеш.'
          correct: false
        - text: 'Що посієш, те й пожнеш.'
          correct: false
    - question: 'З якими реченнями категорично заборонено вживати дієприслівниковий зворот?'
      explanation: 'З безособовими реченнями (де суб''єкт у давальному відмінку) зворот використовувати не можна.'
      options:
        - text: 'З безособовими реченнями (наприклад, «мені сумно»).'
          correct: true
        - text: 'З питальними реченнями.'
          correct: false
        - text: 'З реченнями в майбутньому часі.'
          correct: false
        - text: 'З реченнями, де є кілька додатків.'
          correct: false

- type: unjumble
  title: 'Наративна трансформація: створіть правильну послідовність'
  instruction: 'Складіть слова в правильне речення.'
  items:
    - words: ['Зайшовши', 'в', 'аудиторію,', 'студент', 'побачив', 'професора.']
      answer: 'Зайшовши в аудиторію, студент побачив професора.'
    - words: ['Сівши', 'на', 'місце,', 'він', 'почав', 'записувати', 'лекцію.']
      answer: 'Сівши на місце, він почав записувати лекцію.'
    - words: ['Прочитавши', 'цю', 'книгу,', 'ми', 'зробили', 'важливий', 'висновок.']
      answer: 'Прочитавши цю книгу, ми зробили важливий висновок.'
    - words: ['Дізнавшись', 'правду,', 'герой', 'одразу', 'змінив', 'свій', 'план.']
      answer: 'Дізнавшись правду, герой одразу змінив свій план.'
    - words: ['Зробивши', 'домашнє', 'завдання,', 'я', 'пішов', 'гуляти.']
      answer: 'Зробивши домашнє завдання, я пішов гуляти.'
    - words: ['Повернувшись', 'з', 'роботи,', 'батько', 'швидко', 'приготував', 'вечерю.']
      answer: 'Повернувшись з роботи, батько швидко приготував вечерю.'

- type: error-correction
  title: 'Синтаксичні пастки: відірваний дієприслівник'
  instruction: 'Виправте помилки узгодження підмета (Subject Mismatch). Хто насправді виконує дію?'
  items:
    - sentence: 'Прийшовши додому, почався дощ.'
      error: 'почався дощ'
      answer: 'я побачив дощ'
      error_type: 'phrase'
      options: ['я побачив дощ', 'почався дощ', 'дощ пішов', 'дощ почався']
      explanation: 'Дію «прийшовши» виконала людина, а не дощ. Підмет головного речення має бути «я».'
    - sentence: 'Зробивши помилку, комп''ютер завис.'
      error: 'комп''ютер завис'
      answer: 'програміст перезавантажив комп''ютер'
      error_type: 'phrase'
      options: ['програміст перезавантажив комп''ютер', 'комп''ютер завис', 'система дала збій', 'екран згас']
      explanation: 'Комп''ютер не міг «зробити помилку». Підметом має бути людина (програміст).'
    - sentence: 'Прочитавши листа, з моїх очей потекли сльози.'
      error: 'з моїх очей потекли сльози'
      answer: 'я розплакався'
      error_type: 'phrase'
      options: ['я розплакався', 'з моїх очей потекли сльози', 'сльози з''явилися', 'почали капати сльози']
      explanation: 'Сльози не можуть читати листа. Підметом має бути той, хто читав (я).'
    - sentence: 'Відкривши вікно, у кімнату залетів птах.'
      error: 'у кімнату залетів птах'
      answer: 'я побачив птаха'
      error_type: 'phrase'
      options: ['я побачив птаха', 'у кімнату залетів птах', 'птах з''явився', 'птах влетів']
      explanation: 'Птах не відкривав вікно. Підметом має бути той, хто відкрив (я).'
    - sentence: 'Побачивши ціни, нам перехотілося купувати машину.'
      error: 'нам перехотілося купувати'
      answer: 'ми передумали купувати'
      error_type: 'phrase'
      options: ['ми передумали купувати', 'нам перехотілося купувати', 'наш настрій зіпсувався', 'у нас зникло бажання']
      explanation: 'Дієприслівник не може використовуватися з безособовими конструкціями (нам перехотілося). Потрібен активний підмет (ми передумали).'
    - sentence: 'Дізнавшись про трагедію, йому стало сумно.'
      error: 'йому стало сумно'
      answer: 'він відчув сум'
      error_type: 'phrase'
      options: ['він відчув сум', 'йому стало сумно', 'настрій погіршився', 'йому було погано']
      explanation: 'Безособове речення з логічним суб''єктом у давальному відмінку (йому) не може мати дієприслівникового звороту. Потрібен активний підмет (він).'

- type: error-correction
  title: 'Одночасність чи попередність? (Aspect Mismatch)'
  instruction: 'Виправте помилки у виборі виду дієприслівника.'
  items:
    - sentence: 'Відкриваючи двері, я зайшов у кімнату.'
      error: 'Відкриваючи'
      answer: 'Відкривши'
      options: ['Відкривши', 'Відкриваючи', 'Відкрити', 'Відкривав']
      explanation: 'Форма на -ючи означає одночасність. Неможливо заходити, поки двері ще не відкриті. Дія має бути завершеною (доконаний вид).'
    - sentence: 'Одягаючи пальто, він вийшов на мороз.'
      error: 'Одягаючи'
      answer: 'Одягнувши'
      options: ['Одягнувши', 'Одягаючи', 'Одягнути', 'Одягав']
      explanation: 'Він спочатку завершив процес одягання, а потім вийшов. Потрібен доконаний вид (-вши).'
    - sentence: 'Роблячи домашнє завдання, я пішов гуляти.'
      error: 'Роблячи'
      answer: 'Зробивши'
      options: ['Зробивши', 'Роблячи', 'Зробити', 'Робив']
      explanation: 'Прогулянка почалася після повного завершення завдання. Потрібен доконаний вид (-вши).'
    - sentence: 'Читаючи цю книгу, ми зробили фінальний висновок.'
      error: 'Читаючи'
      answer: 'Прочитавши'
      options: ['Прочитавши', 'Читаючи', 'Прочитати', 'Читав']
      explanation: 'Фінальний висновок роблять після завершення процесу читання. Потрібен доконаний вид (-вши).'
    - sentence: 'Пишучи заяву на звільнення, вона пішла додому.'
      error: 'Пишучи'
      answer: 'Написавши'
      options: ['Написавши', 'Пишучи', 'Написати', 'Писала']
      explanation: 'Спочатку вона завершила написання заяви, а потім пішла додому. Потрібен доконаний вид (-вши).'
    - sentence: 'Купуючи квитки, вони сіли в поїзд.'
      error: 'Купуючи'
      answer: 'Купивши'
      options: ['Купивши', 'Купуючи', 'Купити', 'Купували']
      explanation: 'Посадка в поїзд відбувається після купівлі квитків. Це послідовні дії, тому потрібен доконаний вид (-вши).'

- type: mark-the-words
  title: 'Розпізнавання дієприслівників у тексті'
  instruction: 'Знайдіть і позначте всі дієприслівники доконаного виду в текстах.'
  text: |
    Прочитавши лист від брата, Тарас відчув неймовірне полегшення. Зробивши глибокий вдих, він повільно підійшов до відчиненого вікна.

    Прийшовши до тями після довгої і холодної зими, природа навколо почала швидко розквітати. Побачивши перші весняні проліски, молодий хлопець радісно усміхнувся.

    Написавши коротку відповідь своїм родичам, він вирішив нарешті вийти на вулицю. Дізнавшись цю дійсно чудову новину, уся родина довго раділа разом із ним.
  answers:
    - 'Прочитавши'
    - 'Зробивши'
    - 'Прийшовши'
    - 'Побачивши'
    - 'Написавши'
    - 'Дізнавшись'

- type: cloze
  title: 'Історія одного робочого дня'
  passage: 'Ранок розпочався дуже рано. {{1}} з ліжка, Олена пішла на кухню. {{2}} кави, вона почала збиратися. {{3}} тепле пальто, вона вийшла на вулицю. {{4}} на роботу, жінка одразу увімкнула комп''ютер. {{5}} перші електронні листи, вона зрозуміла, що день буде важким. {{6}} глибокий вдих, Олена почала працювати. {{7}} усі термінові звіти, вона пішла на обідню перерву. {{8}} смачний суп, вона відчула прилив енергії. {{9}} до офісу, Олена продовжила зустрічі з клієнтами. {{10}} про нові вимоги керівництва, вона швидко оновила план проекту. {{11}} свої ідеї колегам, вона отримала їхню повну підтримку. {{12}} фінальну презентацію, команда успішно завершила день. {{13}} робоче місце, Олена вирушила додому. Лише {{14}} на свій улюблений диван, вона дозволила собі справді відпочити.'
