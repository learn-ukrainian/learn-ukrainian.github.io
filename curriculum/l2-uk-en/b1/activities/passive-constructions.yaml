  instruction: "Заповніть пропуски відповідними термінами та правильними словами."
  passage: "В українській мові існує три типи пасивних конструкцій. Перший тип — це дієприкметниковий {{1}}, який описує поточний {{2}} предмета, наприклад, зачинений {{3}}. Він завжди узгоджується з іменником у {{4}}, числі та відмінку. Другий тип — це безособова {{5}} на -но/-то, яка констатує чистий {{6}} або результат дії. З цією формою категорично заборонено використовувати {{7}} дії в орудному відмінку. Третій тип — це зворотне {{8}} із суфіксом -ся, яке описує динамічний {{9}} або регулярну дію. Українська мова загалом віддає перевагу {{10}} стану, оскільки він звучить більш енергійно та природно. Надмірне використання пасивних конструкцій призводить до появи {{11}}, тобто штучного бюрократичного стилю. Коли ми говоримо, важливо правильно обирати {{12}} залежно від ситуації. В офіційних звітах часто звучить {{13}} пасив, а в дружній розмові переважає нормальна {{14}} мова."
  blanks:
    - id: 1
      answer: "пасив"
      options:
        - "пасив"
        - "актив"
        - "стан"
        - "стиль"
    - id: 2
      answer: "стан"
      options:
        - "стан"
        - "процес"
        - "факт"
        - "результат"
    - id: 3
      answer: "магазин"
      options:
        - "магазин"
        - "будинок"
        - "лист"
        - "закон"
    - id: 4
      answer: "роді"
      options:
        - "роді"
        - "часі"
        - "стані"
        - "виді"
    - id: 5
      answer: "форма"
      options:
        - "форма"
        - "буква"
        - "частина"
        - "частка"
    - id: 6
      answer: "факт"
      options:
        - "факт"
        - "процес"
        - "стан"
        - "наголос"
    - id: 7
      answer: "виконавця"
      options:
        - "виконавця"
        - "об'єкта"
        - "підмета"
        - "додатка"
    - id: 8
      answer: "дієслово"
      options:
        - "дієслово"
