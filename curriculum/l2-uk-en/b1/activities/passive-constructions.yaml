- type: quiz
  title: "Теорія пасивних конструкцій"
  instruction: "Перевірте своє розуміння теоретичного матеріалу щодо різних типів пасиву."
  items:
    - question: "Яка форма пасиву використовується для констатації чистого факту чи результату?"
      explanation: "Безособовий пасив на -но/-то фокусується виключно на об'єктивному факті."
      options:
        - text: "безособовий пасив на -но/-то"
          correct: true
        - text: "дієприкметниковий пасив"
          correct: false
        - text: "зворотний пасив на -ся"
          correct: false
        - text: "активний стан"
          correct: false
    - question: "Який тип пасиву ідеально підходить для опису фіксованого стану предмета?"
      explanation: "Дієприкметниковий пасив описує предмет, який набув певної якості після завершення дії."
      options:
        - text: "дієприкметниковий пасив"
          correct: true
        - text: "безособовий пасив на -но/-то"
          correct: false
        - text: "зворотний пасив на -ся"
          correct: false
        - text: "інфінітив"
          correct: false
    - question: "Яка пасивна конструкція використовується для опису регулярного процесу або явища?"
      explanation: "Зворотні дієслова на -ся ідеально підходять для опису динаміки чи розкладу."
      options:
        - text: "зворотний пасив на -ся"
          correct: true
        - text: "дієприкметниковий пасив"
          correct: false
        - text: "безособовий пасив на -но/-то"
          correct: false
        - text: "дієприслівник"
          correct: false
    - question: "У якому відмінку стоїть об'єкт перед безособовою формою на -но або -то?"
      explanation: "Синтаксично об'єкт при формі на -но/-то є прямим додатком у знахідному відмінку."
      options:
        - text: "у знахідному відмінку"
          correct: true
        - text: "у називному відмінку"
          correct: false
        - text: "в орудному відмінку"
          correct: false
        - text: "у родовому відмінку"
          correct: false
    - question: "Яке головне правило стосується виконавця дії у конструкціях на -но/-то?"
      explanation: "Виконавця (агента) в орудному відмінку додавати категорично заборонено."
      options:
        - text: "його категорично не можна додавати"
          correct: true
        - text: "він завжди стоїть у називному відмінку"
          correct: false
        - text: "він є обов'язковим елементом речення"
          correct: false
        - text: "його додають лише в офіційних документах"
          correct: false
    - question: "Як найприродніше українською мовою перекласти англійську фразу 'It was done by me'?"
      explanation: "Українська мова віддає перевагу активному стану."
      options:
        - text: "Я це зробив"
          correct: true
        - text: "Це було зроблено мною"
          correct: false
        - text: "Це зроблено мною"
          correct: false
        - text: "Це робилося мною"
          correct: false
    - question: "Що таке 'канцелярит' у контексті вивчення сучасної української мови та стилістики?"
      explanation: "Канцелярит — це штучний стиль, переобтяжений пасивними формами та відсутністю агента."
      options:
        - text: "бюрократичний стиль із надлишком пасиву"
          correct: true
        - text: "використання застарілих слів"
          correct: false
        - text: "надмірна емоційність тексту"
          correct: false
        - text: "стиль написання художніх творів"
          correct: false
    - question: "З чим завжди узгоджується пасивний дієприкметник у правильному українському реченні?"
      explanation: "Як і прикметник, він повністю узгоджується з іменником, до якого належить."
      options:
        - text: "з підметом у роді, числі та відмінку"
          correct: true
        - text: "з додатком лише у відмінку"
          correct: false
        - text: "з дієсловом-присудком у часі"
          correct: false
        - text: "він ніколи ні з чим не узгоджується"
          correct: false

- type: match-up
  title: "Трансформація активу в пасив"
  instruction: "Знайдіть відповідність між активним реченням та його найбільш природним пасивним аналогом."
  pairs:
    - left: "Робітники будують дім."
      right: "Будинок будується."
    - left: "Комісія ухвалила рішення."
      right: "Рішення успішно ухвалено."
    - left: "Автор написав статтю."
      right: "Ця стаття вже написана."
    - left: "Ми зачиняємо магазин."
      right: "Магазин зачиняється о вісімнадцятій."
    - left: "Вони відремонтували дорогу."
      right: "Дорогу успішно відремонтовано."
    - left: "Я відправив усі листи."
      right: "Усі листи вже відправлені."
    - left: "Студенти вивчають граматику."
      right: "Граматика активно вивчається."
    - left: "Керівництво заблокувало доступ."
      right: "Доступ тимчасово заблоковано."
    - left: "Він моніторить ситуацію."
      right: "Ситуація моніториться."
    - left: "Мер відкрив виставку."
      right: "Виставку відкрито достроково."
    - left: "Інженери вирішили проблему."
      right: "Проблема остаточно вирішена."
    - left: "Вони видають цей журнал."
      right: "Журнал видається щороку."

- type: fill-in
  title: "Оберіть правильну форму"
  instruction: "Заповніть пропуски, обираючи найбільш доречну граматичну форму відповідно до контексту."
  items:
    - sentence: "Цей геніальний вірш _____ видатний український поет."
      answer: "написав"
      options:
        - "написав"
        - "написано"
        - "написаний"
        - "написався"
      explanation: "Використовуйте активний стан, оскільки відомий виконавець дії (поет)."
    - sentence: "Новий житловий комплекс активно _____ на нашій вулиці."
      answer: "будується"
      options:
        - "будується"
        - "збудовано"
        - "збудований"
        - "будує"
      explanation: "Зворотний пасив на -ся описує динамічний процес, що триває зараз."
    - sentence: "Доступ до цієї інформації тимчасово _____ з міркувань безпеки."
      answer: "заблоковано"
      options:
        - "заблоковано"
        - "заблокований"
        - "блокується"
        - "заблокував"
      explanation: "Це офіційна констатація факту (форми на -но/-то)."
    - sentence: "Усі конфіденційні документи вже _____ генеральним директором."
      answer: "підписані"
      options:
        - "підписані"
        - "підписано"
        - "підписуються"
        - "підписав"
      explanation: "Описує поточний стан документів (дієприкметник)."
    - sentence: "Цей популярний журнал _____ великими тиражами вже десять років."
      answer: "видається"
      options:
        - "видається"
        - "видано"
        - "виданий"
        - "видає"
      explanation: "Регулярна, повторювана дія вимагає зворотного пасиву."
    - sentence: "Ми уважно _____ вашу скаргу і вирішили повернути гроші."
      answer: "розглянули"
      options:
        - "розглянули"
        - "розглянуто"
        - "розглянуті"
        - "розглядалися"
      explanation: "Природний активний стан кращий і динамічніший за безособову форму."
    - sentence: "Заняття в нашому центрі завжди _____ рівно о дев'ятій ранку."
      answer: "починаються"
      options:
        - "починаються"
        - "розпочато"
        - "розпочаті"
        - "починають"
      explanation: "Регулярна подія (розклад) вимагає зворотного дієслова."
    - sentence: "Проєкт повністю _____ і готовий до фінальної презентації."
      answer: "завершений"
      options:
        - "завершений"
        - "завершено"
        - "завершується"
        - "завершив"
      explanation: "Фіксований стан, що узгоджується з іменником 'проєкт'."
    - sentence: "Ця стаття була успішно _____ ще минулого тижня."
      answer: "написана"
      options:
        - "написана"
        - "написано"
        - "написаний"
        - "написав"
      explanation: "Слово 'стаття' жіночого роду, тому дієприкметник 'написана'."
    - sentence: "Вашу письмову скаргу _____ відповідним комітетом вчора."
      answer: "розглянуто"
      options:
        - "розглянуто"
        - "розглянута"
        - "розглядається"
        - "розглянув"
      explanation: "Офіційна констатація факту виражається формою на -но/-то."
    - sentence: "Рішення незалежної комісії вже остаточно _____."
      answer: "прийнято"
      options:
        - "прийнято"
        - "прийняте"
        - "прийнятий"
        - "прийняла"
      explanation: "Безособова форма на -но/-то передає категоричний факт."
    - sentence: "Наша нова лікарня зараз активно _____ для дітей."
      answer: "будується"
      options:
        - "будується"
        - "збудовано"
        - "збудована"
        - "збудував"
      explanation: "Процес, що триває в даний момент."

- type: unjumble
  title: "Структура пасивних речень"
  instruction: "Складіть слова в правильному порядку, щоб утворити граматично точні речення."
  items:
    - words:
        - "Ця"
        - "стара"
        - "дорога"
        - "зараз"
        - "активно"
        - "ремонтується"
      answer: "Ця стара дорога зараз активно ремонтується"
    - words:
        - "Великий"
        - "святковий"
        - "торт"
        - "було"
        - "успішно"
        - "замовлено"
      answer: "Великий святковий торт було успішно замовлено"
    - words:
        - "Усі"
        - "листи"
        - "успішно"
        - "відправлені"
        - "нашим"
        - "клієнтам"
      answer: "Усі листи успішно відправлені нашим клієнтам"
    - words:
        - "Рішення"
        - "незалежної"
        - "комісії"
        - "вже"
        - "остаточно"
        - "прийнято"
      answer: "Рішення незалежної комісії вже остаточно прийнято"
    - words:
        - "Нова"
        - "виставка"
        - "мистецтва"
        - "відкривається"
        - "сьогодні"
        - "вранці"
      answer: "Нова виставка мистецтва відкривається сьогодні вранці"
    - words:
        - "Український"
        - "парламент"
        - "вчора"
        - "ухвалив"
        - "важливий"
        - "закон"
      answer: "Український парламент вчора ухвалив важливий закон"
    - words:
        - "Усі"
        - "наші"
        - "проблеми"
        - "завжди"
        - "вирішуються"
        - "дуже"
        - "швидко"
      answer: "Усі наші проблеми завжди вирішуються дуже швидко"
    - words:
        - "Наш"
        - "відповідний"
        - "комітет"
        - "всебічно"
        - "розглянув"
        - "вашу"
        - "скаргу"
      answer: "Наш відповідний комітет всебічно розглянув вашу скаргу"

- type: error-correction
  title: "Виправте поширені помилки та русизми"
  instruction: "Знайдіть помилку або канцеляризм у реченні та оберіть правильний варіант заміни."
  items:
    - sentence: "Я завжди кушаю смачні яблука на сніданок перед роботою."
      error: "кушаю"
      answer: "їм"
      options:
        - "їм"
        - "кушаю"
        - "з'їдаю"
        - "їсту"
      explanation: "Слово кушати є русизмом, правильно українською їсти."
    - sentence: "Ця складна проблема була повністю рішена нашими інженерами."
      error: "рішена"
      answer: "вирішена"
      options:
        - "вирішена"
        - "рішена"
        - "порішена"
        - "вирішено"
      explanation: "Правильний дієприкметник від дієслова вирішити — вирішена."
    - sentence: "Ми з радістю приймаємо участь у цьому важливому проєкті."
      error: "приймаємо участь"
      answer: "беремо участь"
      error_type: "phrase"
      options:
        - "беремо участь"
        - "приймаємо участь"
        - "робимо участь"
        - "маємо участь"
      explanation: "Вислів приймати участь — це калька, українською правильно брати участь."
    - sentence: "Двері в магазин були відчинено охоронцем вранці."
      error: "були відчинено"
      answer: "відчинив"
      error_type: "phrase"
      options:
        - "відчинив"
        - "були відчинено"
        - "відчинені"
        - "відчиняються"
      explanation: "Не можна поєднувати 'були відчинено' з агентом в орудному відмінку (охоронцем). Найкраще сказати: Двері відчинив охоронець."
    - sentence: "Нами було прийнято рішення змінити графік роботи компанії."
      error: "Нами було прийнято"
      answer: "Ми прийняли"
      error_type: "phrase"
      options:
        - "Ми прийняли"
        - "Нами було прийнято"
        - "Нами прийнято"
        - "Ми було прийняли"
      explanation: "Використання нами було прийнято — це типовий канцелярит. Природніше використовувати активний стан: ми прийняли."
    - sentence: "Цей новий будинок являється найвищим у нашому рідному місті."
      error: "являється"
      answer: "є"
      options:
        - "є"
        - "являється"
        - "являє"
        - "буває"
      explanation: "Слово являється в такому значенні — калька з російської, правильно використовувати дієслово є або взагалі опускати його."
    - sentence: "Питання про зарплату піднімалося депутатами на сесії."
      error: "піднімалося депутатами"
      answer: "депутати підняли"
      error_type: "phrase"
      options:
        - "депутати підняли"
        - "піднімалося депутатами"
        - "було піднято депутатами"
        - "підняте депутатами"
      explanation: "Активний стан значно кращий за пасив із вказаним виконавцем дії."
    - sentence: "Ця цікава стаття являється найкращою в журналі."
      error: "являється"
      answer: "є"
      options:
        - "є"
        - "являється"
        - "являє"
        - "виявляється"
      explanation: "Уникайте використання слова 'являється' в значенні 'є'."

- type: mark-the-words
  title: "Знайдіть пасивні форми"
  instruction: "Знайдіть і позначте всі пасивні форми (дієприкметники, форми на -но/-то, зворотні дієслова) у тексті."
  text: "Цей новий магазин успішно відчинено сьогодні вранці. Усі товари вже акуратно розкладені на полицях. Двері автоматично відчиняються для кожного клієнта. Офіційне рішення про відкриття прийнято вчора, а необхідні документи вже підписані. Цей процес ретельно контролюється менеджерами."
  answers:
    - "відчинено"
    - "розкладені"
    - "відчиняються"
    - "прийнято"
    - "підписані"
    - "контролюється"

