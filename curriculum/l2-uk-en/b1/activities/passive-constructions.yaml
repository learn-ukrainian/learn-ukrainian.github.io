- type: fill-in
  title: "Звільнення від канцеляриту"
  instruction: "Оберіть активне дієслово, щоб виправити штучний бюрократичний пасив у реченні."
  items:
    - sentence: "Замість 'З боку керівництва було висловлено невдоволення' скажіть: Керівництво _____ невдоволення."
      answer: "висловило"
      options:
        - "висловило"
        - "висловлено"
        - "висловлене"
        - "висловлюється"
      explanation: "Активний стан одразу робить речення простішим і чіткішим."
    - sentence: "Замість 'Питання піднімалося депутатами на сесії' скажіть: Депутати _____ питання на сесії."
      answer: "підняли"
      options:
        - "підняли"
        - "піднято"
        - "підняті"
        - "піднімалися"
      explanation: "Уникайте орудного відмінка агента (депутатами) при пасиві."
    - sentence: "Замість 'Нами на регулярній основі здійснюється моніторинг' скажіть: Ми регулярно _____ ситуацію."
      answer: "моніторимо"
      options:
        - "моніторимо"
        - "здійснюємо"
        - "робимо"
        - "моніториться"
      explanation: "Використовуйте повноцінні дієслова замість віддієслівних іменників (моніторинг)."
    - sentence: "Замість 'Цей проєкт не було завершено нашою командою' скажіть: Наша команда не _____ проєкт вчасно."
      answer: "завершила"
      options:
        - "завершила"
        - "завершило"
        - "завершений"
        - "завершує"
      explanation: "Активний стан краще передає відповідальність."
    - sentence: "Замість 'Рішення щодо повернення коштів було прийнято комітетом' скажіть: Комітет _____ рішення."
      answer: "прийняв"
      options:
        - "прийняв"
        - "прийнято"
        - "прийняті"
        - "приймається"
      explanation: "Конкретний виконавець (комітет) має бути підметом."
    - sentence: "Замість 'Будинок було спроєктовано головним архітектором' скажіть: Головний архітектор _____ цей будинок."
      answer: "спроєктував"
      options:
        - "спроєктував"
        - "спроєктовано"
        - "спроєктований"
        - "проєктує"
      explanation: "Агент дії (архітектор) в орудному відмінку при формі на -но/-то — це помилка."
    - sentence: "Замість 'Звіт було підготовлено фінансовим відділом' скажіть: Фінансовий відділ _____ звіт."
      answer: "підготував"
      options:
        - "підготував"
        - "підготовлено"
        - "підготовлений"
        - "готується"
      explanation: "Повертаємо підмет на законне місце."
    - sentence: "Замість 'Лист був написаний моїм колегою' скажіть: Мій колега _____ цей лист."
      answer: "написав"
      options:
        - "написав"
        - "написано"
        - "написаний"
        - "пише"
      explanation: "Активний стан завжди звучить природніше і краще."
    - sentence: "Замість 'Було знайдено багато помилок' скажіть: Ми _____ багато помилок."
      answer: "знайшли"
      options:
        - "знайшли"
        - "знайдено"
        - "знайдені"
        - "знаходять"
      explanation: "Активна конструкція з прямою відповідальністю."
    - sentence: "Замість 'Відправлення документів здійснено' скажіть: Ми _____ документи."
      answer: "відправили"
      options:
        - "відправили"
        - "відправлено"
        - "відправлені"
        - "відправляють"
      explanation: "Уникайте порожніх віддієслівних іменників."
    - sentence: "Замість 'Нами забезпечується підтримка' скажіть: Ми _____ підтримку."
      answer: "забезпечуємо"
      options:
        - "забезпечуємо"
        - "забезпечено"
        - "забезпечена"
        - "забезпечили"
      explanation: "Відмова від агента в орудному відмінку 'нами'."
    - sentence: "Замість 'Ремонт виконується робітниками' скажіть: Робітники _____ ремонт."
      answer: "виконують"
      options:
        - "виконують"
        - "виконано"
        - "виконаний"
        - "виконувався"
      explanation: "Робітники є реальними активними суб'єктами дії."

- type: quiz
  title: "Стилістичні нюанси та розуміння контексту"
  instruction: "Оберіть правильну відповідь на основі теоретичного матеріалу модуля."
  items:
    - question: "Яке речення звучить найбільш природно в щоденному розмовному стилі?"
      explanation: "У розмовній мові ми віддаємо абсолютну перевагу активному стану."
      options:
        - text: "Я вже відправив усі документи."
          correct: true
        - text: "Усі документи успішно відправлено."
          correct: false
        - text: "Документи були відправлені мною."
          correct: false
        - text: "Відправлення документів здійснено."
          correct: false
    - question: "Яка форма пасиву найчастіше зустрічається на вуличних вивісках та офіційних попередженнях?"
      explanation: "Безособовий пасив ідеально підходить для коротких безкомпромісних констатацій (наприклад, 'Вхід заборонено')."
      options:
        - text: "Безособовий пасив на -но/-то."
          correct: true
        - text: "Зворотний пасив на -ся."
          correct: false
        - text: "Дієприкметниковий пасив."
          correct: false
        - text: "Активний стан."
          correct: false
    - question: "Чому використання агента в орудному відмінку вважається грубою синтаксичною помилкою?"
      explanation: "Тому що форма на -но/-то створена саме для того, щоб свідомо приховати виконавця дії."
      options:
        - text: "Бо форма на -но/-то створена саме для того, щоб приховати виконавця."
          correct: true
        - text: "Бо орудний відмінок використовується лише з прикметниками."
          correct: false
        - text: "Бо це правило англійської граматики."
          correct: false
        - text: "Бо так вимагає розмовний стиль."
          correct: false
    - question: "Яка форма дієслова ідеально підходить для опису постійної властивості певного предмета?"
      explanation: "Дієприкметниковий пасив працює як прикметник і описує стан."
      options:
        - text: "Дієприкметник."
          correct: true
        - text: "Дієприслівник."
          correct: false
        - text: "Інфінітив."
          correct: false
        - text: "Безособова форма."
          correct: false
    - question: "Яке з наведених речень містить яскраво виражений та типовий сучасний канцелярит?"
      explanation: "Це класичний приклад знеособлення дії, де можна було б просто сказати 'Ми вирішили'."
      options:
        - text: "Нами було прийнято рішення про виконання проєкту."
          correct: true
        - text: "Ми вирішили виконати цей проєкт."
          correct: false
        - text: "Проєкт уже виконується нашими колегами."
          correct: false
        - text: "Цей проєкт успішно виконано вчора."
          correct: false
    - question: "Яку головну історичну причину має надмірне використання пасиву в офіційній українській мові?"
      explanation: "Це наслідок тривалого впливу російського та радянського бюрократичного стилю."
      options:
        - text: "Це токсичний спадок радянського бюрократичного стилю."
          correct: true
        - text: "Це природний розвиток праслов'янської мови."
          correct: false
        - text: "Це вплив сучасної англійської мови."
          correct: false
        - text: "Це вимога нового Державного стандарту."
          correct: false
    - question: "Що означає речення 'Виставка відкривається о десятій' у даному конкретному контексті?"
      explanation: "Зворотний пасив передає регулярність дії або розклад подій."
      options:
        - text: "Це регулярний розклад або процес, який відбувається просто зараз."
          correct: true
        - text: "Виставка вже відкрита і працює повним ходом."
          correct: false
        - text: "Факт відкриття виставки остаточно зафіксовано."
          correct: false
        - text: "Виставку офіційно відкрив мер міста."
          correct: false
    - question: "Як правильно і природно перекласти українською фразу 'The law was passed by the parliament'?"
      explanation: "Якщо виконавець відомий, українська мова завжди віддає перевагу активному стану."
      options:
        - text: "Парламент ухвалив закон."
          correct: true
        - text: "Закон було ухвалено парламентом."
          correct: false
        - text: "Закон був ухвалений парламентом."
          correct: false
        - text: "Закон ухвалюється парламентом."
          correct: false

