    - words:
        - Цей
        - новий
        - завод
        - виробляє
        - якісні
        - деталі
        - для
        - автомобілів
      answer: Цей новий завод виробляє якісні деталі для автомобілів.
    - words:
        - Компанія
        - була
        - змушена
        - відмовитися
        - від
        - цього
        - ризикованого
        - проєкту
      answer: Компанія була змушена відмовитися від цього ризикованого проєкту.
    - words:
        - Студент
        - зміг
        - повністю
        - вивчити
        - складний
        - вірш
        - напам'ять
      answer: Студент зміг повністю вивчити складний вірш напам'ять.
    - words:
        - Шеф-кухар
        - планує
        - приготувати
        - особливий
        - сюрприз
        - для
        - гостей
      answer: Шеф-кухар планує приготувати особливий сюрприз для гостей.
    - words:
        - Ми
        - повинні
        - міцно
        - прив'язати
        - ці
        - показники
        - до
        - фінансів
      answer: Ми повинні міцно прив'язати ці показники до фінансів.
    - words:
        - Той
        - мовчазний
        - чоловік
        - у
        - темному
        - кутку
        - раптом
        - несподівано
        - заговорив
        - рідкісною
        - іноземною
        - мовою
      answer: Той мовчазний чоловік у темному кутку раптом несподівано заговорив рідкісною
        іноземною мовою.
    - words:
        - Вчені
        - змогли
        - відкрити
        - новий
        - закон
        - фізики
        - після
        - досліджень
      answer: Вчені змогли відкрити новий закон фізики після досліджень.
- type: error-correction
  title: 'Виправте помилку: точність префіксів'
  instruction: Знайдіть неправильне дієслово або русизм і виберіть коректний український
    варіант.
  items:
    - sentence: Мені потрібно написати твій номер телефону в блокнот.
      error: написати
      answer: записати
      options:
        - записати
        - переписати
        - виписати
        - дописати
      explanation: Написати означає створити текст. Для фіксації інформації використовують
        префікс ЗА- (записати).
    - sentence: Я не хочу відповідати назад на цей грубий електронний лист.
      error: відповідати назад
      answer: відповідати
      options:
        - відповідати
        - відповідати знову
        - писати назад
        - відмовляти
      explanation: Слово відповідати вже містить префікс ВІД- (зворотний рух). Слово
        назад створює тавтологію.
    - sentence: Наша команда змогла надійти до вирішення цієї складної проблеми.
      error: надійти
      answer: підійти
      options:
        - підійти
        - відійти
        - зайти
        - перейти
      explanation: Інтелектуальне наближення до суті питання передається метафоричним
        префіксом ПІД-.
    - sentence: Компанія проізводить дуже якісні деталі для електромобілів.
      error: проізводить
      answer: виробляє
      options:
        - виробляє
        - переробляє
        - заробляє
        - доробляє
      explanation: Проізводить — це русизм. Процес створення готової продукції українською
        — це виробляти.
    - sentence: Ми довго працювали над планом і нарешті змогли його завчити.
      error: завчити
      answer: виконати
      options:
        - виконати
        - перевчити
        - навчити
        - вивчити
      explanation: Досягнення фінального результату проєкту передається дієсловом
        виконати.
    - sentence: Вчора він так довго заговорив, що всі гості втомилися слухати.
      error: заговорив
      answer: проговорив
      options:
        - проговорив
        - відговорив
        - договорив
        - заговорився
      explanation: Заговорити маркує раптовий початок дії (інхоативність). Для тривалої
        розмови використовують інші слова.
    - sentence: Директор попросив нас передивитися цей фінансовий документ ще раз.
      error: передивитися
      answer: переглянути
      options:
        - переглянути
        - заглянути
        - доглянути
        - поглянути
      explanation: В офіційному стилі (особливо з документами) повторний аналіз описується
        дієсловом переглянути.
    - sentence: Після закінчення університету він має намір відслужити на новій роботі
        п'ять років.
      error: відслужити
      answer: пропрацювати
      options:
        - пропрацювати
        - вислужити
        - дослужити
        - заслужити
      explanation: Відслужити означає завершити обов'язок (часто в армії). Початок
        і тривалість кар'єри тут недоречні.
- type: mark-the-words
  title: Знайдіть дієслова з префіксом ВИ-
  instruction: Знайдіть і позначте всі дієслова з префіксом ВИ-, які позначають досягнення
    результату.
  text: Щоб успішно виконати цей складний проєкт, ми мусили повністю вивчити ринок.
    Наш відділ зміг випрацювати дуже ефективну стратегію. Тепер ми готові виробляти
    якісні продукти, плануємо випустити нову модель та впевнено виграти конкурентну
    боротьбу на міжнародному рівні.
  answers:
    - виконати
    - вивчити
    - випрацювати
    - виробляти
    - випустити
    - виграти
- type: group-sort
  title: Розподіліть за логікою префіксів
  instruction: Розподіліть дієслова на групи відповідно до базової логіки їхнього
    абстрактного префікса.
  groups:
    - name: Досягнення результату (ВИ-)
      items:
        - виконати
        - вивчити
        - виробити
    - name: Зміна або повторення (ПЕРЕ-)
      items:
        - переробити
        - переписати
        - переглянути
    - name: Фіксація чи раптовість (ЗА-)
      items:
        - записати
        - запам'ятати
        - заговорити
    - name: Реакція та віддалення (ВІД-)
      items:
        - відповісти
        - відмовитися
        - відкрити
- type: select
  title: Оберіть правильні синоніми
  instruction: Оберіть усі ситуації, де префікс несе необхідне значення.
  items:
    - question: У яких реченнях префікс ПЕРЕ- вказує на те, що межа норми була порушена
        (надмірність)?
      min_correct: 2
      explanation: Слова перепрацювати та переоцінити вказують на дію, яка перейшла
        за адекватну межу.
      options:
        - text: Він зміг переробити цей план.
          correct: false
        - text: Вона була хвора, бо встигла перепрацювати на заводі.
          correct: true
        - text: Керівник вирішив переглянути наші звіти.
          correct: false
        - text: Вони схильні переоцінити свої можливості перед іспитом.
          correct: true
    - question: Оберіть дієслова, де префікс ЗА- позначає надійну фіксацію інформації,
        а не раптовий початок дії.
      min_correct: 2
      explanation: Записати і запам'ятати зберігають інформацію в просторі чи пам'яті.
      options:
        - text: Заговорити
          correct: false
        - text: Заспівати
          correct: false
        - text: Записати
          correct: true
        - text: Запам'ятати
          correct: true
    - question: У яких випадках префікс ПРИ- вказує на приєднання до колективу або
        структури?
      min_correct: 2
      explanation: Приєднатися та прив'язати позначають щільний контакт та інтеграцію.
      options:
        - text: Приготувати вечерю для гостей.
          correct: false
        - text: Приєднатися до нової команди.
          correct: true
        - text: Прив'язати свої результати до успіху компанії.
          correct: true
        - text: Приїхати додому після роботи.
          correct: false
    - question: Оберіть речення, де дієслово з префіксом ВИ- демонструє абсолютне
        вичерпання ресурсу або успішне завершення.
      min_correct: 2
      explanation: Вивчити та виконати показують доведення дії до кінця, до результату.
      options:
        - text: Студент зміг повністю вивчити вірш напам'ять.
          correct: true
        - text: Він вийшов з темної кімнати на вулицю.
          correct: false
        - text: Компанія пообіцяла виконати всі умови контракту.
          correct: true
        - text: Ми вирішили перейти через широку дорогу.
          correct: false
    - question: Які дієслова використовують просторову логіку руху від центру назовні
        для позначення соціальної реакції?
      min_correct: 2
      explanation: ВІД- у словах відповісти і відмовитися означає віддалення або реакцію
        на запит.
      options:
        - text: Відповісти
          correct: true
        - text: Переробити
          correct: false
        - text: Відмовитися
          correct: true
        - text: Записати
          correct: false
    - question: Які дієслова з префіксом ПЕРЕ- позначають зміну або повторну модифікацію
        тексту чи об'єкта?
      min_correct: 3
      explanation: ПЕРЕ- означає зміну об'єкта або повторення дії.
      options:
        - text: Переписати есе
          correct: true
        - text: Переробити план
          correct: true
        - text: Перефарбувати стіну
          correct: true
        - text: Перейти вулицю
          correct: false
- type: fill-in
  title: 'Конструктор: змініть значення дієслова'
  instruction: Оберіть правильний префікс для дієслова, щоб утворити необхідне значення
    в реченні.
  items:
    - sentence: Після зауважень редактора письменник мусив переписати свою статтю.
      answer: переписати
      options:
        - переписати
        - записати
        - виписати
        - дописати
      explanation: Повторна дія для зміни тексту — префікс ПЕРЕ-.
    - sentence: Коли настав її день народження, вона несподівано заспівала від радості.
      answer: заспівала
      options:
        - заспівала
        - переспівала
        - виспівала
        - відспівала
      explanation: Раптовий початок дії (інхоатив) — префікс ЗА-.
    - sentence: Студент зміг повністю вивчити цей граматичний матеріал за тиждень.
      answer: вивчити
      options:
        - вивчити
        - завчити
        - довчити
        - привчити
      explanation: Досягнення фінального результату вимагає ВИ-.
    - sentence: Під час ділової зустрічі важливо професійно підійти до вирішення проблем.
      answer: підійти
      options:
        - підійти
        - зайти
        - перейти
        - відійти
      explanation: Аналітичне наближення — префікс ПІД-.
    - sentence: Вона швидко записала адресу в телефон, щоб не забути.
      answer: записала
      options:
        - записала
        - переписала
        - написала
        - виписала
      explanation: Фіксація інформації позначається префіксом ЗА-.
    - sentence: Ми змушені були відмовитися від цієї подорожі через погану погоду.
      answer: відмовитися
      options:
        - відмовитися
        - замовитися
        - домовитися
        - перемовитися
      explanation: Віддалення від пропозиції, скасування — префікс ВІД-.
    - sentence: Я обіцяю, що ми зможемо виконати цю роботу дуже якісно.
      answer: виконати
      options:
        - виконати
        - доконати
        - законати
        - переконати
      explanation: Повне завершення та реалізація — ВИ-.
    - sentence: Треба уважно переглянути цей договір перед тим, як його підписувати.
      answer: переглянути
      options:
        - переглянути
        - поглянути
        - заглянути
        - доглянути
      explanation: Повторний аналіз документа — ПЕРЕ-.
    - sentence: Він вирішив приєднатися до нашого благодійного проєкту вчора.
      answer: приєднатися
      options:
        - приєднатися
        - з'єднатися
        - об'єднатися
        - від'єднатися
      explanation: Наближення та входження в структуру — ПРИ-.
    - sentence: На жаль, він так і не зміг чесно відповісти на моє запитання.
      answer: відповісти
      options:
        - відповісти
        - заповісти
        - розповісти
        - доповісти
      explanation: Зворотна інформація, реакція — ВІД-.
    - sentence: Щоб здивувати маму, я планую приготувати великий торт.
      answer: приготувати
      options:
        - приготувати
        - доготувати
        - заготувати
        - виготувати
      explanation: Об'єднання інгредієнтів для результату — ПРИ-.
    - sentence: Якщо ви дуже втомлені, не варто так багато перепрацювати на роботі.
      answer: перепрацювати
      options:
        - перепрацювати
        - запрацювати
        - допрацювати
        - випрацювати
      explanation: Надмірність, подолання межі норми — ПЕРЕ-.
