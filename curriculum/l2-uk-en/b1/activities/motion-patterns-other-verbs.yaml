- type: match-up
  title: 'Знайдіть відповідність: значення префіксів'
  instruction: З’єднайте дієслово з абстрактним значенням його префікса.
  pairs:
    - left: вивчити
      right: досягнення результату, вичерпність дії
    - left: переробити
      right: докорінна зміна, трансформація
    - left: записати
      right: фіксація та збереження інформації
    - left: заговорити
      right: раптовий початок дії (інхоативність)
    - left: відповісти
      right: зворотна реакція на інформацію
    - left: відмовитися
      right: відокремлення, неприйняття пропозиції
    - left: підійти
      right: аналітичне наближення до проблеми
    - left: приєднатися
      right: додавання до групи чи структури
    - left: виконати
      right: повна реалізація потенціалу
    - left: переписати
      right: повторність дії з метою виправлення
    - left: перепрацювати
      right: подолання нормальної межі, надмірність
    - left: запам'ятати
      right: надійне збереження факту в пам'яті
- type: true-false
  title: 'Правда чи хиба: просторова логіка'
  instruction: Визначте, чи правильно описано значення дієслова через його префікс.
  items:
    - statement: Дієслово вивчити означає процес навчання без фінального результату.
      correct: false
      explanation: Префікс ВИ- вказує на досягнення фінального результату, вичерпання
        процесу.
    - statement: Записати номер телефону означає зафіксувати інформацію, щоб її не
        втратити.
      correct: true
      explanation: Префікс ЗА- тут виконує функцію фіксації та надійного збереження.
    - statement: Слово заговорити означає дуже довго розмовляти з кимось.
      correct: false
      explanation: 'Префікс ЗА- маркує раптовий початок дії: перехід від тиші до розмови.'
    - statement: Переробити проєкт означає взяти старий матеріал і суттєво його змінити.
      correct: true
      explanation: Префікс ПЕРЕ- вказує на зміну форми, перехід через перешкоду недосконалості.
    - statement: Відповісти на лист — це створити інформацію, яка рухається у зворотному
        напрямку.
      correct: true
      explanation: Префікс ВІД- означає реакцію, повернення інформації до її джерела.
    - statement: Приєднатися до команди означає аналізувати роботу цієї команди збоку.
      correct: false
      explanation: Префікс ПРИ- вказує на контакт і входження до структури, а не спостереження.
    - statement: Підійти до проблеми — це знайти спосіб інтелектуального наближення
        до її вирішення.
      correct: true
      explanation: Префікс ПІД- метафорично означає процес наближення до суті питання.
    - statement: Дієслово відслужити означає почати кар'єру в армії.
      correct: false
      explanation: Префікс ВІД- означає завершення обов'язку, віддалення від нього.
    - statement: Написати книгу і записати книгу — це абсолютно однакові за значенням
        фрази.
      correct: false
      explanation: Написати фокусується на створенні тексту, а записати — на фіксації
        даних.
    - statement: Перепрацювати означає подолати межу нормальної втоми.
      correct: true
      explanation: Префікс ПЕРЕ- тут означає надмірність, перехід за безпечну межу.
    - statement: Виробляти звичку означає швидко щось запам'ятати.
      correct: false
      explanation: Виробляти означає тривалий процес витягнення результату (звички).
    - statement: Відмовитися від допомоги означає відштовхнути пропозицію від себе.
      correct: true
      explanation: Префікс ВІД- вказує на просторовий рух геть від суб'єкта.
- type: fill-in
  title: 'Заповніть пропуски: вибір дієслова'
  instruction: Оберіть правильне дієслово з відповідним префіксом для кожного речення.
  items:
    - sentence: Студент мусив переписати есе, бо професор знайшов там багато помилок.
      answer: переписати
      options:
        - написати
        - переписати
        - записати
        - виписати
      explanation: Потрібно зробити дію повторно для виправлення — префікс ПЕРЕ-.
    - sentence: Під час тиші в аудиторії раптом заговорив іноземною мовою новий студент.
      answer: заговорив
      options:
        - заговорив
        - поговорив
        - виговорив
        - переговорив
      explanation: Раптовий початок дії позначається префіксом ЗА-.
    - sentence: Щоб оволодіти українською мовою, вам потрібно її вивчити, а не просто
        вчити.
      answer: вивчити
      options:
        - вивчити
        - завчити
        - навчити
        - перевчити
      explanation: Досягнення фінального результату вимагає префікса ВИ-.
    - sentence: Секретар швидко записав номер телефону клієнта у свій блокнот.
      answer: записав
      options:
        - написав
        - записав
        - переписав
        - виписав
      explanation: Фіксація інформації в просторі — це функція префікса ЗА-.
    - sentence: Після тривалих переговорів компанія вирішила відмовитися від цього
        проєкту.
      answer: відмовитися
      options:
        - відмовитися
        - домовитися
        - замовитися
        - перемовитися
      explanation: Віддалення, неприйняття пропозиції — префікс ВІД-.
    - sentence: Політик не захотів чесно відповісти на запитання журналіста під час
        інтерв'ю.
      answer: відповісти
      options:
        - відповісти
        - заповісти
        - переповісти
        - сповістити
      explanation: Зворотна реакція на інформацію передається префіксом ВІД-.
    - sentence: Архітектор вирішив повністю переробити старий план, бо він був небезпечним.
      answer: переробити
      options:
        - переробити
        - зробити
        - доробити
        - виробити
      explanation: Трансформація та докорінна зміна стану — префікс ПЕРЕ-.
    - sentence: Цей новий завод виробляє якісні деталі для електромобілів.
      answer: виробляє
      options:
        - виробляє
        - переробляє
        - заробляє
        - доробляє
      explanation: Тривалий процес із фінальним результатом — префікс ВИ-.
    - sentence: Новий фахівець вирішив приєднатися до нашого стартапу минулого місяця.
      answer: приєднатися
      options:
        - приєднатися
        - об'єднатися
        - роз'єднатися
        - від'єднатися
      explanation: Наближення та входження в структуру — префікс ПРИ-.
    - sentence: Ми повинні креативно підійти до вирішення цієї складної задачі.
      answer: підійти
      options:
        - підійти
        - надійти
        - зайти
        - відійти
      explanation: Інтелектуальне чи аналітичне наближення до проблеми — префікс ПІД-.
    - sentence: Шеф-кухар планує приготувати особливий сюрприз для своїх гостей.
      answer: приготувати
      options:
        - приготувати
        - підготувати
        - заготувати
        - виготувати
      explanation: Збирання компонентів для створення готового результату — префікс
        ПРИ-.
    - sentence: Вчені змогли відкрити новий закон фізики після багатьох років досліджень.
      answer: відкрити
      options:
        - відкрити
        - закрити
        - прикрити
        - перекрити
      explanation: Усунення перешкоди для отримання доступу — префікс ВІД-.
- type: quiz
  title: 'Тест: прогнозування значення'
  instruction: Використовуючи просторову логіку, оберіть правильне абстрактне значення
    дієслова.
  items:
    - question: Що найімовірніше означає дієслово відслужити у контексті армії?
      explanation: Префікс ВІД- означає завершення контакту та віддалення (завершити
        службу).
      options:
        - text: Успішно завершити термін служби
          correct: true
        - text: Тільки розпочати свою кар'єру
          correct: false
        - text: Служити дуже довго і багато
          correct: false
        - text: Служити повторно після перерви
          correct: false
    - question: Який відтінок значення додає префікс ЗА- до дієслова співати у слові
        заспівати?
      explanation: ЗА- тут є інхоативним префіксом, що маркує раптовий початок дії.
      options:
        - text: Раптово почати співати пісню
          correct: true
        - text: Співати пісню до самого кінця
          correct: false
        - text: Співати занадто голосно
          correct: false
        - text: Співати разом з іншими людьми
          correct: false
    - question: Що означає слово переглянути у реченні Директор попросив переглянути
        бюджет?
      explanation: Префікс ПЕРЕ- вказує на повторну дію для аналізу або виправлення.
      options:
        - text: Проаналізувати документ ще раз
          correct: true
        - text: Подивитися тільки на першу сторінку
          correct: false
        - text: Сховати документ від інших людей
          correct: false
        - text: Підписати документ без читання
          correct: false
    - question: Як ви зрозумієте дієслово випрацювати у фразі випрацювати нову стратегію?
      explanation: Префікс ВИ- показує тривалий процес, що завершується чітким результатом.
      options:
        - text: Створити результат через тривалу працю
          correct: true
        - text: Працювати занадто багато годин
          correct: false
        - text: Почати працювати дуже швидко
          correct: false
        - text: Працювати на вулиці, а не в офісі
          correct: false
    - question: Яке значення несе дієслово запрацюватися у вечірній час?
      explanation: Префікс ЗА- вказує на сильну фіксацію уваги на дії, аж до втрати
        відчуття часу.
      options:
        - text: Працювати так довго, що втратити лік часу
          correct: true
        - text: Раптово почати виконувати роботу
          correct: false
        - text: Повністю завершити всі робочі завдання
          correct: false
        - text: Працювати замість іншої людини
          correct: false
    - question: Що робить людина, коли вона вирішує прив'язати фінансовий бонус до
        результатів?
      explanation: Префікс ПРИ- означає щільний контакт і створення нерозривного зв'язку.
      options:
        - text: Створює нерозривну залежність між об'єктами
          correct: true
        - text: Скасовує будь-які бонуси для працівників
          correct: false
        - text: Повторно нараховує фінансовий бонус
          correct: false
        - text: Раптово починає думати про фінанси
          correct: false
    - question: Яка різниця між дієсловами робити та зробити в українській мові?
      explanation: З- вказує на об'єднання зусиль для отримання фінального завершеного
        результату.
      options:
        - text: Зробити акцентує увагу на завершеному результаті
          correct: true
        - text: Робити вказує на швидкість виконання процесу
          correct: false
        - text: Зробити означає почати процес роботи
          correct: false
        - text: Немає жодної різниці в їхньому значенні
          correct: false
    - question: Що означає дієслово розійтися в контексті особистих стосунків двох
        людей?
      explanation: Префікс РОЗ- означає рух у різні боки, втрату контакту та руйнування
        зв'язку.
      options:
        - text: Втратити емоційний зв'язок та інтерес
          correct: true
        - text: Почати жити разом у новому місці
          correct: false
        - text: Раптово закохатися одне в одного
          correct: false
        - text: Повторити стару романтичну зустріч
          correct: false
    - question: Що означає фраза зблизитися знову після тривалої емоційної сварки?
      explanation: Префікс З- вказує на рух назустріч одне одному, відновлення контакту.
      options:
        - text: Відновити емоційний контакт та порозуміння
          correct: true
        - text: Почати сваритися з новою силою
          correct: false
        - text: Написати одне одному багато листів
          correct: false
        - text: Змінити місце проживання після сварки
          correct: false
    - question: Яке значення має дієслово перефарбувати у контексті побутового ремонту
        квартири?
      explanation: Префікс ПЕРЕ- означає докорінну зміну стану або покриття (нанесення
        нового шару).
      options:
        - text: Змінити колір об'єкта на інший
          correct: true
        - text: Купити багато нової фарби в магазині
          correct: false
        - text: Почати фарбувати стіну дуже швидко
          correct: false
        - text: Завершити ремонт у всій квартирі
          correct: false
    - question: Що означає дієслово допрацювати наприкінці довгого робочого дня в
        офісі?
      explanation: Префікс ДО- позначає рух до кінцевої межі, завершення розпочатого
        процесу.
      options:
        - text: Завершити раніше розпочату роботу
          correct: true
        - text: Працювати набагато більше норми
          correct: false
        - text: Раптово почати виконувати нове завдання
          correct: false
        - text: Працювати гірше, ніж інші колеги
          correct: false
    - question: Що означає з'єднати дві шафи під час реорганізації простору кімнати?
      explanation: Префікс З- означає скорочення відстані між об'єктами до нуля, інтеграцію.
      options:
        - text: Зробити з двох об'єктів одну спільну конструкцію
          correct: true
        - text: Поставити об'єкти в різні кутки кімнати
          correct: false
        - text: Повністю зруйнувати старі меблі
          correct: false
        - text: Пофарбувати меблі в новий яскравий колір
          correct: false
- type: unjumble
  title: 'Складіть речення: професійний та емоційний контекст'
  instruction: Відновіть правильний порядок слів у реченнях.
  items:
