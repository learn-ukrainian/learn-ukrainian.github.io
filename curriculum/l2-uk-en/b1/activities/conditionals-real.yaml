version: '1.0'
module: conditionals-real
level: b1
workbook:
- type: quiz
  instruction: Визначте спосіб головного дієслова в реченні
  items:
  - question: Я хотів би завітати до вас на вихідних.
    options:
    - дійсний спосіб
    - умовний спосіб
    - наказовий спосіб
    - інфінітив
    correct: 1
  - question: Ми обов'язково встигнемо на поїзд.
    options:
    - дійсний спосіб
    - умовний спосіб
    - наказовий спосіб
    - інфінітив
    correct: 0
  - question: Зателефонуйте мені заздалегідь!
    options:
    - дійсний спосіб
    - умовний спосіб
    - наказовий спосіб
    - інфінітив
    correct: 2
  - question: Якщо буде нагода, я пораджу йому цю книгу.
    options:
    - дійсний спосіб
    - умовний спосіб
    - наказовий спосіб
    - інфінітив
    correct: 0
  - question: Вона з радістю допомогла б вам із розкладом.
    options:
    - дійсний спосіб
    - умовний спосіб
    - наказовий спосіб
    - інфінітив
    correct: 1
  - question: Чи не могли б ви відкрити вікно?
    options:
    - дійсний спосіб
    - умовний спосіб
    - наказовий спосіб
    - інфінітив
    correct: 1
  - question: Якщо не заперечуєте, я почекаю тут.
    options:
    - дійсний спосіб
    - умовний спосіб
    - наказовий спосіб
    - інфінітив
    correct: 0
  - question: Будь ласка, перевірте розклад на завтра.
    options:
    - дійсний спосіб
    - умовний спосіб
    - наказовий спосіб
    - інфінітив
    correct: 2
- type: group-sort
  instruction: Розподіліть речення за способом дієслова
  groups:
  - label: Дійсний спосіб (реальність)
    items:
    - Ми обов'язково встигнемо на зустріч.
    - Якщо буде нагода, ми поговоримо.
    - Він завжди перевіряє розклад поїздів.
    - Завтра я пораджу тобі хорошу статтю.
  - label: Умовний спосіб (бажання або ввічливість)
    items:
    - Я хотів би поїхати в Карпати.
    - Чи не могли б ви порадити книгу?
    - Вона з радістю завітала б до нас.
    - Було б чудово відпочити на вихідних.
- type: fill-in
  instruction: Оберіть правильну форму дієслова для реальної умови
  items:
  - sentence: Якщо погода _____ гарна, ми поїдемо в Карпати.
    answer: буде
    options:
    - буде
    - був би
    - будеш
    - бути
  - sentence: Якщо ми _____ в п'ятницю, то встигнемо до вечора.
    answer: виїдемо
    options:
    - виїдемо
    - виїхали б
    - виїжджали
    - виїдуть
  - sentence: Якщо я _____ квитки заздалегідь, я обов'язково їх куплю.
    answer: знайду
    options:
    - знайду
    - знайшов би
    - знайдете
    - знайшов
  - sentence: Якщо він _____ нагоду, він приєднається до нас на вихідних.
    answer: матиме
    options:
    - матиме
    - мав би
    - мали
    - матимеш
  - sentence: Ми підемо гуляти лісом, якщо не _____ дощ.
    answer: піде
    options:
    - піде
    - пішов би
    - піти
    - підуть
  - sentence: Якщо ти не _____, ми зустрінемося в центрі міста.
    answer: заперечуєш
    options:
    - заперечуєш
    - заперечував би
    - заперечуємо
    - заперечуєте
  - sentence: Якщо все _____ гаразд, ми повернемося в неділю.
    answer: буде
    options:
    - буде
    - було б
    - будуть
    - був
  - sentence: Ми піднімемося на Говерлу, якщо _____ рано-вранці.
    answer: прокинемося
    options:
    - прокинемося
    - прокинулися б
    - прокинутись
    - прокинуться
- type: match-up
  instruction: З'єднайте умову та результат
  pairs:
  - left: Якщо ви маєте нагоду,
    right: обов'язково відвідайте цей музей.
  - left: Якщо ти не заперечуєш,
    right: я відкрию вікно.
  - left: Якщо все буде гаразд,
    right: ми поїдемо в Карпати.
  - left: Якщо ви купите квитки заздалегідь,
    right: ви зекономите гроші.
  - left: Якщо зміниться розклад поїздів,
    right: зателефонуйте мені, будь ласка.
  - left: Якщо ми виїдемо о сьомій,
    right: то встигнемо до початку вистави.
  - left: Якщо хтось завітає до нас у гості,
    right: ми пригостимо їх чаєм.
  - left: Якщо вам потрібна допомога,
    right: я з радістю допоможу.
- type: error-correction
  instruction: Знайдіть і виправте граматичну чи орфографічну помилку
  items:
  - sentence: Я хотівби дізнатися розклад на завтра.
    error: хотівби
    correction: хотів би
    error_type: word
    options:
    - хотів би
    - хотіла б
    - хотів б
    explanation: Частка «би» завжди пишеться окремо від дієслова.
  - sentence: Вона з радістю прочитала би цю статтю.
    error: прочитала би
    correction: прочитала б
    error_type: phrase
    options:
    - прочитав би
    - прочитала б
    - прочитали б
    explanation: Після голосного звука використовується коротка форма частки — «б».
  - sentence: Якщо я мав би нагоду, я обов'язково відвідаю цей музей.
    error: мав би
    correction: матиму
    error_type: phrase
    options:
    - мав
    - матиму
    - мала б
    explanation: Після «якщо» для позначення реальної умови завжди вживається дійсний
      спосіб, а не умовний.
  - sentence: Чи не міг б ти порадити мені цікаву книгу?
    error: міг б
    correction: міг би
    error_type: phrase
    options:
    - могла б
    - міг би
    - могли б
    explanation: Після приголосного звука використовується повна форма частки — «би».
  - sentence: Якщо ви не заперечували б, ми зустрінемося ввечері.
    error: заперечували б
    correction: заперечуєте
    error_type: phrase
    options:
    - заперечуєте
    - заперечував би
    - заперечують
    explanation: У реальних умовних реченнях зі сполучником «якщо» використовується
      дійсний спосіб.
  - sentence: Ми встиглиб на поїзд, якщо виїдемо зараз.
    error: встиглиб
    correction: встигли б
    error_type: word
    options:
    - встигли би
    - встигли б
    - встигла б
    explanation: Частка «б» пишеться окремо, а після голосного звука вживається саме
      «б».
- type: unjumble
  instruction: Складіть ввічливі варіанти речень зі слів
  items:
  - words:
    - не
    - могли
    - ви
    - Чи
    - мені
    - меню?
    - дати
    - б
    correct_order:
    - Чи
    - не
    - могли
    - б
    - ви
    - дати
    - мені
    - меню?
    hint: Замість «Дайте мені меню.»
  - words:
    - хотіла
    - каву.
    - б
    - замовити
    - Я
    correct_order:
    - Я
    - хотіла
    - б
    - замовити
    - каву.
    hint: Замість «Я хочу каву.»
  - words:
    - порадити
    - ви
    - мені
    - могли
    - книгу?
    - б
    - не
    - Чи
    correct_order:
    - Чи
    - не
    - могли
    - б
    - ви
    - порадити
    - мені
    - книгу?
    hint: Замість «Порадьте мені книгу.»
  - words:
    - відкрию
    - заперечуєте,
    - я
    - Якщо
    - вікно.
    - не
    correct_order:
    - Якщо
    - не
    - заперечуєте,
    - я
    - відкрию
    - вікно.
    hint: Замість «Відкрийте вікно.»
  - words:
    - дізнатися
    - розклад
    - хотів
    - би
    - поїздів.
    - Я
    correct_order:
    - Я
    - хотів
    - би
    - дізнатися
    - розклад
    - поїздів.
    hint: Замість «Скажіть розклад поїздів.»
  - words:
    - допомогти?
    - ви
    - не
    - могли
    - Чи
    - б
    - мені
    correct_order:
    - Чи
    - не
    - могли
    - б
    - ви
    - мені
    - допомогти?
    hint: Замість «Допоможіть мені!»
