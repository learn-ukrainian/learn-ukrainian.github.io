version: '1.0'
module: conditionals-real
level: b1
inline:
- id: quiz-identify-vs-in-sentences
  type: quiz
  instruction: Визначте спосіб дієслова в кожному реченні.
  items:
  - question: Я б хотів завітати до вас на вихідних.
    options:
    - умовний спосіб
    - дійсний спосіб
    - наказовий спосіб
    - неозначена форма
    correct: 0
  - question: Ми обов'язково підемо в парк у суботу.
    options:
    - умовний спосіб
    - дійсний спосіб
    - наказовий спосіб
    - неозначена форма
    correct: 1
  - question: Якщо буде нагода, я куплю ці квитки.
    options:
    - умовний спосіб
    - дійсний спосіб
    - наказовий спосіб
    - неозначена форма
    correct: 1
  - question: Чи не могли б ви порадити гарний готель?
    options:
    - умовний спосіб
    - дійсний спосіб
    - наказовий спосіб
    - неозначена форма
    correct: 0
  - question: Вони поїхали б у Карпати із задоволенням.
    options:
    - умовний спосіб
    - дійсний спосіб
    - наказовий спосіб
    - неозначена форма
    correct: 0
  - question: Студентка читає новий розклад поїздів.
    options:
    - умовний спосіб
    - дійсний спосіб
    - наказовий спосіб
    - неозначена форма
    correct: 1
  - question: Скажіть, де знаходиться найближча станція метро?
    options:
    - умовний спосіб
    - дійсний спосіб
    - наказовий спосіб
    - неозначена форма
    correct: 2
  - question: Якщо все буде гаразд, ми встигнемо на поїзд.
    options:
    - умовний спосіб
    - дійсний спосіб
    - наказовий спосіб
    - неозначена форма
    correct: 1
- id: fill-in-conditional-formation
  type: fill-in
  instruction: Вставте правильну частку (б або би), пам'ятаючи про милозвучність.
  items:
  - sentence: Я хотів ____ дізнатися ваш розклад.
    answer: би
    options:
    - б
    - би
    - був би
    - була б
  - sentence: Вона завітала ____ до нас на вихідних.
    answer: б
    options:
    - б
    - би
    - був би
    - була б
  - sentence: Ми обов'язково встигли ____ на цей поїзд.
    answer: б
    options:
    - б
    - би
    - був би
    - була б
  - sentence: Якщо не заперечуєш, я ____ порадив цей ресторан.
    answer: б
    options:
    - б
    - би
    - був би
    - була б
  - sentence: Він купив ____ ці квитки заздалегідь.
    answer: би
    options:
    - б
    - би
    - був би
    - була б
  - sentence: Вони хотіли ____ поїхати в гори.
    answer: б
    options:
    - б
    - би
    - був би
    - була б
- id: match-up-real-conditionals
  type: match-up
  instruction: З'єднайте умову з логічним наслідком.
  pairs:
  - left: Якщо завтра буде гарна погода,
    right: ми підемо гуляти в парк.
  - left: Якщо ти купиш квитки заздалегідь,
    right: ми обов'язково поїдемо в гори.
  - left: Якщо ми виїдемо о шостій ранку,
    right: то точно встигнемо на цей поїзд.
  - left: Якщо у вас буде нагода,
    right: завітайте до нашого музею.
  - left: Якщо все буде гаразд,
    right: ми зможемо прочитати цей текст.
  - left: Якщо ти не заперечуєш,
    right: я зателефоную тобі завтра вранці.
  - left: Якщо піде сильний дощ,
    right: ми просто залишимося в колибі.
  - left: Якщо ти не знаєш розклад,
    right: я б порадив зателефонувати туди.
- id: fill-in-verb-forms
  type: fill-in
  instruction: Вставте дієслово в правильній формі для вираження реальної умови.
  items:
  - sentence: Якщо завтра ____ дощ, ми залишимося вдома.
    answer: буде
    options:
    - буде
    - був би
    - є
    - бути
  - sentence: Якщо ти ____ на поїзд, обов'язково зателефонуй мені.
    answer: встигнеш
    options:
    - встигнеш
    - встиг би
    - встиг
    - встигнути
  - sentence: Якщо ви ____ вільний час, завітайте до нас.
    answer: матимете
    options:
    - матимете
    - мали б
    - мати
    - мали
  - sentence: Якщо ти не ____, я куплю квитки на концерт.
    answer: заперечуєш
    options:
    - заперечуєш
    - заперечував би
    - заперечиш би
    - заперечити
  - sentence: Якщо він ____ до нас, ми підемо в парк.
    answer: завітає
    options:
    - завітає
    - завітав би
    - завітав
    - завітати
  - sentence: Якщо ви ____ розклад, ми зможемо планувати вихідні.
    answer: перевірите
    options:
    - перевірите
    - перевірили б
    - перевіряв би
    - перевіряти
  - sentence: Якщо я ____ ці нові слова, я успішно складу іспит.
    answer: вивчу
    options:
    - вивчу
    - вивчив би
    - вивчив
    - вчити
  - sentence: Якщо вона ____ квитки, ми підемо в театр.
    answer: купить
    options:
    - купить
    - купила б
    - купила
    - купувати
- id: fill-in-complete-a-conversation-between-friends-with-the-correct-conditional-or-indicative-forms
  type: fill-in
  instruction: Вставте правильні форми дієслів, щоб доповнити розмову друзів.
  items:
  - sentence: — Привіт! Я ____ запросити тебе в Карпати на вихідні.
    answer: хотів би
    options:
    - хотів би
    - хочу би
    - хотів
    - був би хотів
  - sentence: — Чудово! Якщо погода ____ гарною, ми підемо на Говерлу.
    answer: буде
    options:
    - буде
    - була б
    - є
    - була
  - sentence: — Але якщо ____ сильний дощ, що ми будемо робити?
    answer: піде
    options:
    - піде
    - пішов би
    - йтиме би
    - іти
  - sentence: — Якщо дощитиме, ми просто ____ в колибі.
    answer: залишимося
    options:
    - залишимося
    - залишилися б
    - залишитися
    - залишитись би
  - sentence: — Гаразд. Тоді я ____ нам купити квитки заздалегідь.
    answer: б порадив
    options:
    - б порадив
    - пораджу
    - радив
    - буду радити
  - sentence: — Якщо ти не ____, я перевірю розклад прямо зараз.
    answer: заперечуєш
    options:
    - заперечуєш
    - заперечував би
    - заперечиш би
    - заперечити
  - sentence: — Супер! Чи не ____ ти також подивитися готелі?
    answer: могла б
    options:
    - могла б
    - можеш
    - зможеш
    - змогла
  - sentence: — Звісно. Якщо я ____ щось цікаве, я одразу тобі напишу.
    answer: знайду
    options:
    - знайду
    - знайшла б
    - знаходити
    - знайшла
workbook:
- type: group-sort
  instruction: 'Розподіліть дієслова за способом: умовний чи дійсний.'
  groups:
  - label: Умовний спосіб
    items:
    - я б порадив
    - вона хотіла б
    - ми могли б
    - він завітав би
  - label: Дійсний спосіб
    items:
    - я пораджу
    - вона хоче
    - ми можемо
    - він завітає
- type: translate
  instruction: Оберіть правильний переклад для кожної фрази.
  items:
  - source: I would like a coffee, please.
    options:
    - text: Я хотів би кави, будь ласка.
      correct: true
    - text: Я хочу каву, будь ласка.
      correct: false
    - text: Я був би хотіти кави, будь ласка.
      correct: false
    - text: Дайте мені каву, будь ласка.
      correct: false
  - source: Could you tell me the schedule?
    options:
    - text: Чи не могли б ви підказати розклад?
      correct: true
    - text: Ви можете сказати мені розклад?
      correct: false
    - text: Чи ви моглиб сказати розклад?
      correct: false
    - text: Якщо ви можете, скажіть розклад.
      correct: false
  - source: If we have the opportunity, we will visit you.
    options:
    - text: Якщо ми матимемо нагоду, ми завітаємо до вас.
      correct: true
    - text: Якщо ми мали б нагоду, ми завітали б до вас.
      correct: false
    - text: Якщо ми маємо нагоду, ми завітали б до вас.
      correct: false
    - text: Коли ми маємо нагоду, ми завітати до вас.
      correct: false
  - source: If it rains tomorrow, we will stay home.
    options:
    - text: Якщо завтра піде дощ, ми залишимося вдома.
      correct: true
    - text: Якщо завтра пішов би дощ, ми залишилися б вдома.
      correct: false
    - text: Коли завтра йтиме дощ, ми б залишилися вдома.
      correct: false
    - text: Якщо завтра буде дощ, ми залишилися вдома.
      correct: false
  - source: I would advise buying tickets in advance.
    options:
    - text: Я б порадив купити квитки заздалегідь.
      correct: true
    - text: Я був би порадити купити квитки заздалегідь.
      correct: false
    - text: Я пораджу купити квитки заздалегідь.
      correct: false
    - text: Я раджу купити квитки потім.
      correct: false
  - source: If everything is fine, I will call you.
    options:
    - text: Якщо все буде гаразд, я зателефоную тобі.
      correct: true
    - text: Якщо все було б гаразд, я б зателефонував тобі.
      correct: false
    - text: Коли все гаразд, я зателефонував би тобі.
      correct: false
    - text: Якщо все буде добре, я дзвоню тобі.
      correct: false
