version: '1.0'
module: conditionals-unreal
level: b1
inline:
- id: quiz-condition-classification
  type: group-sort
  instruction: Визначте тип умови (реальна чи нереальна)
  groups:
  - label: Реальна умова (Якщо)
    items:
    - Якщо піде сильний дощ, ми залишимося вдома.
    - Якщо ти мені допоможеш, ми закінчимо швидше.
    - Якщо я побачу Олену, я передам їй цю книгу.
    - Якщо він знає відповідь, він нам скаже.
    - Якщо ми виграємо матч, ми поїдемо на фінал.
  - label: Нереальна умова (Якби)
    items:
    - Якби я мав час, я б прочитав цю книжку.
    - Якби я жив у Києві, я б ходив на Хрещатик.
    - Якби ми вийшли раніше, ми б встигли на потяг.
    - Якби ти мені допоміг, ми б уже закінчили.
    - Якби не цей дощ, ми б пішли до лісу.
  title: Визначте тип умови (реальна чи нереальна)
- id: fill-in-conditional-formation
  type: fill-in
  instruction: Доповніть речення правильними формами умовного способу
  items:
  - sentence: Якби він знав правду, він _____ нам.
    answer: сказав би
    options:
    - сказав би
    - сказав б
    - сказала б
  - sentence: Якби вона мала гроші, вона _____ квиток.
    answer: купила б
    options:
    - купила б
    - купив би
    - купила би
  - sentence: Якби я мав нагоду, я _____ на фестиваль.
    answer: пішов би
    options:
    - пішов би
    - пішла б
    - пішли б
  - sentence: Якби ми вийшли раніше, ми _____ на поїзд.
    answer: встигли б
    options:
    - встигли б
    - встигли би
    - встигнув би
  - sentence: Якби вони вчили слова, вони _____ тест.
    answer: здали б
    options:
    - здали б
    - здав би
    - здали би
  - sentence: Якби сонце світило, дитя _____ надворі.
    answer: гралося б
    options:
    - гралося б
    - гралося би
    - грався б
  - sentence: Якби я побачила Олену, я _____ їй книгу.
    answer: передала б
    options:
    - передала б
    - передала би
    - передав би
  - sentence: Якби студент уважно читав, він _____ більше слів.
    answer: знав би
    options:
    - знав би
    - знала б
    - знав б
  title: Доповніть речення правильними формами умовного способу
- id: match-logical-clauses
  type: match-up
  instruction: З'єднайте умову (якби) з логічним наслідком
  pairs:
  - left: Якби я виграв мільйон гривень,
    right: я б купив великий будинок у Карпатах.
  - left: Якби я знав історію свого роду краще,
    right: я б написав цікаву книгу про предків.
  - left: Якби не сильний дощ,
    right: ми б пішли гуляти до центрального парку.
  - left: Якби він тоді послухав батьків,
    right: його життя склалося б інакше.
  - left: Якби я ідеально знав п'ять мов,
    right: я б працював успішним дипломатом.
  - left: Якби Україна здобула незалежність раніше,
    right: ми б уникнули багатьох трагедій.
  - left: Якби я міг подорожувати в часі,
    right: я б поїхав у дев'ятнадцяте століття.
  - left: Якби ми вийшли з дому раніше,
    right: ми б обов'язково встигли на вранішній потяг.
  title: З'єднайте умову (якби) з логічним наслідком
workbook:
- type: translate
  instruction: Оберіть правильний український переклад для англійських речень
  items:
  - source: If only I knew!
    options:
    - text: Якби ж то я знав!
      correct: true
    - text: Якщо б я знаю!
      correct: false
    - text: Якби я буду знати!
      correct: false
    - text: Коли б я знати!
      correct: false
  - source: If it weren't for you, I wouldn't have managed.
    options:
    - text: Якби не ти, я б не впорався.
      correct: true
    - text: Якщо не ти, я не впораюся.
      correct: false
    - text: Якби ти ні, я б не впорався.
      correct: false
    - text: Аби не ти, я б не впорався б.
      correct: false
  - source: I would have gone if I had a ticket.
    options:
    - text: Я б пішов, якби мав квиток.
      correct: true
    - text: Я був би піти, якби мав квиток.
      correct: false
    - text: Я піду, якщо матиму квиток.
      correct: false
    - text: Я пішов би, якщо б мав би квиток.
      correct: false
  - source: If it rains, we will stay home.
    options:
    - text: Якщо піде дощ, ми залишимося вдома.
      correct: true
    - text: Якби йшов дощ, ми б залишилися вдома.
      correct: false
    - text: Якби піде дощ, ми б залишилися вдома.
      correct: false
    - text: Якщо йшов дощ, ми залишилися вдома.
      correct: false
  - source: If I were a bird, I would fly far away.
    options:
    - text: Якби я був пташкою, я б полетів дуже далеко.
      correct: true
    - text: Якщо я буду пташкою, я полечу далеко.
      correct: false
    - text: Якби я є пташкою, я б летів далеко.
      correct: false
    - text: Якби я був пташка, я полетів би далеко.
      correct: false
  - source: If he knew the answer, he would tell us.
    options:
    - text: Якби він знав правильну відповідь, він би нам сказав.
      correct: true
    - text: Якщо він знає відповідь, він нам скаже.
      correct: false
    - text: Якби він знає відповідь, він би сказав.
      correct: false
    - text: Якщо б він знав, він би говорить нам.
      correct: false
  title: Оберіть правильний український переклад для англійських речень
