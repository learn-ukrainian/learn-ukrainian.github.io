version: '1.0'
module: conditionals-unreal
level: b1
workbook:
- type: group-sort
  instruction: Розподіліть речення на реальні та нереальні умови
  groups:
  - label: Реальна умова (можлива)
    items:
    - Якщо я вивчу ці нові слова, я успішно складу іспит.
    - Якщо я зароблю достатньо грошей, я відкрию школу.
    - Якщо пошукаєш у книгах, знайдеш мудрість.
    - Якщо я матиму час, я вивчатиму іноземні мови.
    - Якщо я куплю квиток на концерт, я поїду.
  - label: Нереальна умова (контрфактична)
    items:
    - Якби я вчив ці слова минулого тижня, я б усе знав.
    - Якби не сильний дощ, ми б пішли в парк.
    - Якби Нестор жив сьогодні, він би писав блог.
    - Якби я виграв лотерею, я б купив будинок.
    - Якби я міг подорожувати в часі, я б відвідав Київ.
- type: fill-in
  instruction: Доповніть речення правильною формою дієслова або часткою
  items:
  - sentence: Якби я мала час, я _____ обов'язково пішла на фестиваль.
    answer: б
    options:
    - б
    - би
    - була
  - sentence: Якби він знав досконало українську, він _____ читав ці книги.
    answer: би
    options:
    - б
    - би
    - був
  - sentence: Якби не ти, ми б ніколи не _____ з цією перешкодою!
    answer: впоралися
    options:
    - впорався
    - впоралася
    - впоралися
  - sentence: Ми _____ квитки на фестиваль, якби мали нагоду.
    answer: купили б
    options:
    - купили б
    - купили би
    - купив би
  - sentence: Вона _____ цю книжку, якби знала автора.
    answer: прочитала б
    options:
    - прочитала б
    - прочитала би
    - прочитав би
  - sentence: Якби я _____ можливість, я б подорожував у дев'ятнадцяте століття.
    answer: мав
    options:
    - мав
    - мала
    - мали
  - sentence: Аби тільки здоров'я _____, а все інше обов'язково буде.
    answer: було
    options:
    - був
    - була
    - було
  - sentence: Якби він жив у Києві, він _____ на Хрещатик щодня.
    answer: ходив би
    options:
    - ходив би
    - ходив б
    - ходила б
- type: quiz
  instruction: Оберіть правильне перетворення реальної умови на нереальну (контрфактичну)
  items:
  - question: Якщо я матиму вільний час, я вивчатиму мови.
    options:
    - Якби я мав вільний час, я б вивчав мови.
    - Якби я матиму вільний час, я б вивчав мови.
    - Якби я мав вільний час, я вивчатиму мови.
    - Якщо я мав вільний час, я б вивчав мови.
    correct: 0
  - question: Якщо я куплю квиток, я піду на концерт.
    options:
    - Якби я куплю квиток, я б пішов на концерт.
    - Якби я купив квиток, я б пішов на концерт.
    - Якщо я купив квиток, я піду на концерт.
    - Якби я купив квиток, я піду на концерт.
    correct: 1
  - question: Якщо я зароблю гроші, я відкрию власну школу.
    options:
    - Якби я зароблю гроші, я б відкрив власну школу.
    - Якби я заробив гроші, я відкрию власну школу.
    - Якби я заробив гроші, я б відкрив власну школу.
    - Якщо я заробив гроші, я б відкрию власну школу.
    correct: 2
  - question: Якщо ти допоможеш мені, я впораюся.
    options:
    - Якби ти допоможеш мені, я б впорався.
    - Якби ти допоміг мені, я впораюся.
    - Якщо ти допоміг мені, я б впораюся.
    - Якби ти допоміг мені, я б впорався.
    correct: 3
  - question: Якщо дощу не буде, ми підемо в парк.
    options:
    - Якби дощу не було, ми б пішли в парк.
    - Якби дощу не буде, ми б пішли в парк.
    - Якби дощу не було, ми підемо в парк.
    - Якщо дощу не було, ми б підемо в парк.
    correct: 0
  - question: Якщо він прочитає статтю, він відповість на запитання.
    options:
    - Якби він прочитає статтю, він би відповів на запитання.
    - Якби він прочитав статтю, він би відповів на запитання.
    - Якби він прочитав статтю, він відповість на запитання.
    - Якщо він прочитав статтю, він би відповість на запитання.
    correct: 1
  - question: Якщо я матиму мільйон, я побудую школу.
    options:
    - Якби я матиму мільйон, я б побудував школу.
    - Якби я мав мільйон, я побудую школу.
    - Якби я мав мільйон, я б побудував школу.
    - Якщо я мав мільйон, я б побудую школу.
    correct: 2
  - question: Якщо студенти вивчать ці слова, вони складуть іспит.
    options:
    - Якби студенти вивчать ці слова, вони б склали іспит.
    - Якби студенти вивчили ці слова, вони складуть іспит.
    - Якщо студенти вивчили ці слова, вони б складуть іспит.
    - Якби студенти вивчили ці слова, вони б склали іспит.
    correct: 3
- type: match-up
  instruction: З'єднайте умову (якби) з логічним результатом
  pairs:
  - left: Якби я мав можливість подорожувати в часі,
    right: я б поїхав у дев'ятнадцяте століття.
  - left: Якби не твоя дружня підтримка,
    right: я б ніколи з цим не впорався.
  - left: Якби я знав усю правду раніше,
    right: я б не мовчав.
  - left: Якби ти купив квиток учора,
    right: ми б сьогодні пішли на концерт.
  - left: Якби знав, де впадеш,
    right: соломки б підстелив.
  - left: Якби розумні люди не винайшли інтернет,
    right: ми б і зараз читали паперові газети.
  - left: Якби я виграв у престижну лотерею,
    right: я б купив будинок у Карпатах.
  - left: Якби ми мали більше вільного часу,
    right: ми б досконало вивчили українську мову.
- type: error-correction
  instruction: Знайдіть і виправте помилку в умовному реченні
  items:
  - sentence: Якщо б я знав про це раніше, я б не прийшов.
    error: Якщо б
    correction: Якби
    error_type: word
    options:
    - Якби
    - Щоб
    - Аби
    explanation: Для нереальної умови використовується сполучник «якби» (або «коли
      б»), а не «якщо б».
  - sentence: Вона дуже хотіла б поїхати, якби мав більше грошей.
    error: мав
    correction: мала
    error_type: word
    options:
    - мала
    - мали
    - маю
    explanation: Дієслово в минулому часі має узгоджуватися з підметом жіночого роду
      (вона).
  - sentence: Я пішла би на фестиваль, якби не ця перешкода.
    error: би
    correction: б
    error_type: word
    options:
    - б
    - була
    - б то
    explanation: Після голосних звуків (пішл-а) для милозвучності пишеться коротка
      частка «б».
  - sentence: Він б обов'язково впорався з цим складним завданням.
    error: б
    correction: би
    error_type: word
    options:
    - би
    - був
    - би то
    explanation: Після приголосних звуків (ві-н) для милозвучності пишеться повна
      частка «би».
  - sentence: Якби вони знати ці правила, вони б не робили помилок.
    error: знати
    correction: знали
    error_type: word
    options:
    - знали
    - знають
    - знали б
    explanation: В умовній частині речення дієслово має стояти у формі минулого часу,
      а не в інфінітиві.
  - sentence: Якби не сильний дощ, ми підемо гуляти в парк.
    error: підемо
    correction: пішли б
    error_type: construction
    options:
    - пішли б
    - пішли
    - йдемо
    explanation: У наслідковій частині нереальної умови використовується дієслово
      в минулому часі з часткою б/би.
