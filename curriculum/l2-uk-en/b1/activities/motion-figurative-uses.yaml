    - words: [Ти, занадто, далеко, зайшов, у, своїх, безпідставних, та, образливих, звинуваченнях]
      answer: Ти занадто далеко зайшов у своїх безпідставних та образливих звинуваченнях
    - words: [Не, відходь, від, основної, теми, нашої, дуже, важливої, та, термінової, зустрічі]
      answer: Не відходь від основної теми нашої дуже важливої та термінової зустрічі
    - words: [Ми, нарешті, вийшли, на, зовсім, новий, рівень, професійного, розвитку, та, успіху]
      answer: Ми нарешті вийшли на зовсім новий рівень професійного розвитку та успіху
    - words: [Він, майстерно, обійшов, усі, гострі, кути, під, час, цієї, складної, розмови]
      answer: Він майстерно обійшов усі гострі кути під час цієї складної розмови
    - words: [Ця, геніальна, ідея, раптово, прийшла, йому, в, голову, під, час, ранкової, прогулянки]
      answer: Ця геніальна ідея раптово прийшла йому в голову під час ранкової прогулянки

