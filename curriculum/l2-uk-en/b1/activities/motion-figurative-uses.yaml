- type: error-correction
  title: Знайдіть мовну помилку
  instruction: Виправте помилки у використанні фразеологізмів, замінивши кальки на правильні українські вирази.
  items:
    - sentence: Ми нарешті прийшли до висновку, що план треба змінити.
      error: прийшли до висновку
      answer: дійшли висновку
      options: [дійшли висновку, зробили висновок, вивели висновок, зайшли до висновку]
      explanation: В українській мові правильно казати «дійти висновку», а не використовувати кальку з прийменником.
    - sentence: Тобі дуже сидять ці нові джинси.
      error: сидять
      answer: йдуть
      options: [йдуть, личать, пасують, дивляться]
      explanation: Про одяг, який гарно виглядає на людині, ми кажемо, що він їй «йде».
    - sentence: Він просто вийшов з себе від радості.
      error: з себе
      answer: із себе
      options: [із себе, од себе, від себе, в себе]
      explanation: Згідно з правилами милозвучності, після приголосного перед словом, що починається на с, краще вживати «із».
    - sentence: Директор рішив підійти до висновку.
      error: підійти до висновку
      answer: дійти висновку
      options: [дійшли висновку, вийти на висновок, зайти до висновку, прийти к висновку]
      explanation: «Підійти до питання» можна на початку, а в кінці ми «доходимо висновку».
    - sentence: Він відійшов від шоку дуже швидко.
      error: відійшов
      answer: прийшов до тями
      options: [прийшов до тями, вийшов, зайшов, перейшов]
      explanation: Хоча «відійшов від шоку» вживається, вираз «прийти до тями» є більш точним для опису повернення свідомості.
    - sentence: Час стоїть на місці, коли ми чекаємо.
      error: стоїть на місці
      answer: зупинився
      options: [зупинився, замерз, захолонув, впав]
      explanation: Метафора «час зупинився» є більш природною для літературної мови.

- type: unjumble
  title: Складіть вираз
  instruction: Поставте слова у правильному порядку, щоб отримати відомий фразеологізм.
  items:
    - words: [Ми, нарешті, дійшли, логічного, та, правильного, висновку, у, цій, справі]
