  title: Знайдіть метафори
  instruction: Позначте всі дієслова руху, які вжиті у переносному значенні.
  text: Коли я нарешті *дійшов* висновку, що час *іде* надто швидко, я вирішив *перейти* до справи. Моя ідея *вийшла* на ринок, хоча мені довелося *пройти* через важкі переговори. Ми *увійшли* в історію як смілива команда, що вміє *вийти* з будь-якої ситуації. Навіть коли ми *заходили* в глухий кут, ми не *впадали* духом. Кожен крок допомагав нам *вийти* на новий рівень.
  answers: [дійшов, іде, перейти, вийшла, пройти, увійшли, вийти, заходили, впадали, вийти]
