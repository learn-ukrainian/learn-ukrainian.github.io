- type: match-up
  title: Метафорична мандрівка
  instruction: Знайдіть відповідність між фразеологізмом та його значенням.
  pairs:
    - left: Зайти в глухий кут
      right: Опинитися в ситуації без виходу
    - left: Вийти з себе
      right: Дуже сильно розгніватися
    - left: Прийти до згоди
      right: Досягти компромісу
    - left: Перейти до справи
      right: Почати діяти після розмов
    - left: Дійти висновку
      right: Зробити логічний підсумок
    - left: Впасти духом
      right: Втратити надію та енергію
    - left: Відійти в минуле
      right: Стати неактуальним
    - left: Обійти гострі кути
      right: Уникнути конфлікту
    - left: Вийти на новий рівень
      right: Досягти якісного прогресу
    - left: До мене дійшло
      right: Я нарешті зрозумів
    - left: Йти назустріч
      right: Виявляти готовність до співпраці
    - left: Зайти за межу
      right: Порушити моральні норми

- type: fill-in
  title: Історія одного успіху
  instruction: Вставте пропущене слово у фразеологізм, щоб завершити речення.
  items:
    - sentence: Після довгих дебатів та суперечок ми нарешті ___ до згоди.
      answer: прийшли
      options: [прийшли, зайшли, вийшли, відійшли]
    - sentence: Не варто ___ від теми нашої зустрічі, у нас обмаль вільного часу.
      answer: відходити
      options: [відходити, заходити, підходити, проходити]
    - sentence: Компанія нарешті ___ на ринок із зовсім новим та інноваційним продуктом.
      answer: вийшла
      options: [вийшла, зайшла, перейшла, підійшла]
    - sentence: Він дуже глибоко ___ у роль свого складного та багатогранного персонажа.
      answer: увійшов
      options: [увійшов, підійшов, перейшов, зайшов]
    - sentence: Нам треба обов'язково ___ до цього питання максимально системно та виважено.
      answer: підійти
      options: [підійти, зайти, вийти, дійти]
    - sentence: Головне — ніколи не ___ духом, навіть у найскладніші часи вашого життя.
      answer: впадати
      options: [впадати, йти, виходити, заходити]
    - sentence: Нарешті до нього ___, що він зробив серйозну помилку у своїх розрахунках.
      answer: дійшло
      options: [дійшло, прийшло, пішло, зайшло]
    - sentence: Ви ___ занадто далеко у своїх безпідставних звинуваченнях на адресу колег.
      answer: зайшли
      options: [зайшли, перейшли, вийшли, пройшли]
    - sentence: Ці давні традиції вже остаточно та безповоротно ___ в далеке минуле.
      answer: відійшли
      options: [відійшли, вийшли, перейшли, зайшли]
    - sentence: Ми змогли успішно ___ всі гострі кути в цій складній та тривалій суперечці.
      answer: обійти
      options: [обійти, пройти, зайти, вийти]
    - sentence: Час ___ надзвичайно швидко, коли ми зосереджено працюємо над цікавим проектом.
      answer: летить
      options: [летить, іде, біжить, повзе]
    - sentence: Вона нарешті ___ до тями після пережитого сильного психологічного шоку.
      answer: прийшла
      options: [прийшла, зайшла, вийшли, дісталася]

