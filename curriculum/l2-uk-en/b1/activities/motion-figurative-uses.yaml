  blanks:
    - id: 1
      answer: перейшли
      options: [перейшли, зайшли, вийшли, підійшли]
    - id: 2
      answer: дійшли
      options: [дійшли, прийшли, пішли, зайшли]
    - id: 3
      answer: зайшли
      options: [зайшли, вийшли, підійшли, перейшли]
    - id: 4
      answer: вийшли
      options: [вийшли, зайшли, перейшли, підійшли]
    - id: 5
      answer: вийшов
      options: [вийшов, зайшов, підійшов, перейшов]
    - id: 6
      answer: дійшло
      options: [дійшло, прийшло, пішло, забігло]
    - id: 7
      answer: підійти
      options: [підійти, зайти, вийти, пройти]
    - id: 8
      answer: іде
      options: [іде, біжить, летить, стоїть]
    - id: 9
      answer: обійтися
      options: [обійтися, пройтися, зайтися, вийтися]
    - id: 10
