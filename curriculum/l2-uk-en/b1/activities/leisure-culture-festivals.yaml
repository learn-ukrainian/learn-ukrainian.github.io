  instruction: Вставте правильну форму слова «який».
  items:
  - sentence: Вистава, _____ ми бачили вчора, була дуже цікавою.
    answer: яку
    options:
    - який
    - яку
    - яка
  - sentence: Це ресторан, _____ славиться своїми рибними стравами.
    answer: який
    options:
    - який
    - якого
    - якому
  - sentence: Свято, _____ ми чекаємо весь рік, — це Різдво.
    answer: яке
    options:
    - яке
    - який
    - яку
  - sentence: Друзі, з _____ ми ходили в музей, дуже люблять мистецтво.
    answer: якими
    options:
    - якими
    - яких
    - яким
  - sentence: Місто, в _____ ми відпочивали, має багато пам'яток.
    answer: якому
    options:
    - якому
    - яке
    - яким
  - sentence: Книга, _____ я зараз читаю, розповідає про історію України.
    answer: яку
    options:
    - яка
    - яку
    - якій
- type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: We went to the restaurant because we were hungry.
    options:
    - text: Ми пішли в ресторан, тому що були голодні.
      correct: true
    - text: Ми пішли в ресторан, щоб були голодні.
      correct: false
  - source: Although the tickets were expensive, the concert was worth it.
    options:
    - text: Хоча квитки були дорогі, концерт був того вартий.
      correct: true
    - text: Якщо квитки були дорогі, концерт був того вартий.
      correct: false
  - source: He went to the forest to find the fern.
    options:
    - text: Він пішов у ліс, щоб знайти папороть.
      correct: true
    - text: Він пішов у ліс, бо знайшов папороть.
      correct: false
  - source: If you like modern art, you will love this exhibition.
    options:
    - text: Якщо ти любиш сучасне мистецтво, тобі сподобається ця виставка.
      correct: true
    - text: Хоча ти любиш сучасне мистецтво, тобі сподобається ця виставка.
      correct: false
  - source: The chef said that he uses a secret recipe.
    options:
    - text: Шеф-кухар сказав, що він використовує секретний рецепт.
      correct: true
    - text: Шеф-кухар спитав, що він використовує секретний рецепт.
      correct: false
  - source: I am convinced that culture is important.
    options:
    - text: Я переконаний, що культура є важливою.
      correct: true
    - text: Я переконаний, аби культура є важливою.
      correct: false
- type: error-correction
  instruction: Знайдіть і виправте помилку у написанні свят.
  items:
  - sentence: На новий рік ми завжди даруємо подарунки.
    error: новий рік
    correction: Новий рік
    error_type: phrase
    options:
    - Новий рік
    - Новий Рік
    - новий Рік
    explanation: У назві свята «Новий рік» з великої літери пишеться лише перше слово.
  - sentence: Діти чекають на день Святого Миколая.
    error: день
    correction: День
    error_type: word
    options:
    - День
    - Дні
    - Днем
    explanation: 'Офіційні назви свят з власними іменами починаються з великої літери:
      День Святого Миколая.'
  - sentence: На різдво українці готують смачну кутю.
    error: різдво
    correction: Різдво
    error_type: word
    options:
    - Різдво
    - Різдва
    - Різдвом
    explanation: Назви релігійних свят пишуться з великої літери.
  - sentence: На свято великдень люди печуть солодкі паски.
    error: великдень
    correction: Великдень
    error_type: word
    options:
    - Великдень
    - Великодня
    - Великоднем
    explanation: Великдень — це велике релігійне свято, назва пишеться з великої літери.
  - sentence: Ми вчора святкували день конституції.
    error: день конституції
    correction: День Конституції
    error_type: phrase
    options:
    - День Конституції
    - День конституції
    - день Конституції
    explanation: 'В офіційних назвах найважливіших державних свят з великої літери
      пишуться обидва слова: День Конституції.'
  - sentence: Улітку ми часто відзначаємо свято івана купала.
    error: івана купала
    correction: Івана Купала
    error_type: phrase
    options:
    - Івана Купала
    - Івана купала
    - івана Купала
    explanation: Власні імена в назвах свят завжди пишуться з великої літери.
- type: unjumble
  instruction: Складіть правильні складнопідрядні речення зі слів.
  items:
  - words:
    - дозвілля
    - найкраще
    - Я
    - вважаю,
    - що
    - —
    - це
    - спорт.
    correct_order:
    - Я
    - вважаю,
    - що
    - найкраще
    - дозвілля
    - —
    - це
    - спорт.
  - words:
    - тренуються,
    - Спортсмени
    - перемогти.
    - регулярно
    - щоб
    correct_order:
    - Спортсмени
    - регулярно
    - тренуються,
