version: '1.0'
module: leisure-culture-festivals
level: b1
inline:
- id: reading-leisure-habits
  type: true-false
  instruction: Прочитайте текст про дозвілля і позначте, які твердження є правдивими.
  items:
  - statement: Сьогодні дозвілля — це лише необхідна перерва між роботою.
    correct: false
    explanation: Сьогодні дозвілля — це важлива частина життя і спосіб самовираження.
  - statement: Настільні ігри допомагають розвивати логічне мислення.
    correct: true
    explanation: Людина, яка грає в настільні ігри, розвиває логіку.
  - statement: Волонтерство не є формою дозвілля.
    correct: false
    explanation: Волонтерство стало важливою формою суспільно корисного дозвілля.
  - statement: Андрій любить кіно, тому що воно допомагає розслабитися.
    correct: true
    explanation: 'Він каже: «Я люблю кіно, тому що воно допомагає мені розслабитися».'
  - statement: Справжня перемога в спорті — це лише блискуча медаль.
    correct: false
    explanation: Це насамперед перемога над власними слабкостями.
  - statement: Для вираження причини ми використовуємо сполучники «тому що» або «бо».
    correct: true
    explanation: Ці сполучники пояснюють мотивацію наших занять.
- id: fill-in-leisure-grammar
  type: fill-in
  instruction: Вставте правильний сполучник або сполучне слово.
  items:
  - sentence: Я люблю активний відпочинок, _____ він допомагає відновити сили.
    answer: тому що
    options:
    - тому що
    - хоча
    - аби
  - sentence: Мистецтво — це сфера, _____ об'єднує творчих людей.
    answer: яка
    options:
    - яка
    - яку
    - якому
  - sentence: Тренер сказав, _____ завтра буде інтенсивне тренування.
    answer: що
    options:
    - що
    - щоб
    - чи
  - sentence: Я не дуже вмію грати в теніс, _____ із задоволенням складу тобі компанію.
    answer: хоча
    options:
    - хоча
    - бо
    - який
  - sentence: Я щовечора гуляю в парку, _____ швидко зняти стрес після роботи.
    answer: щоб
    options:
    - щоб
    - що
    - тому що
  - sentence: Я не знаю, _____ у них є вільний час для нових захоплень.
    answer: чи
    options:
    - чи
    - що
    - якщо
- id: quiz-leisure-choice
  type: quiz
  instruction: Оберіть правильний варіант.
  items:
  - question: Яке слово означає «recreation, free time»?
    options:
    - робота
    - дозвілля
    - перемога
    - змагання
    correct: 1
  - question: Людина, яка регулярно грає в настільні ігри, розвиває логічне _____.
    options:
    - читання
    - мислення
    - тренування
    - захоплення
    correct: 1
  - question: Спортсмени беруть участь у міських марафонах, щоб перевірити свою _____.
    options:
    - витривалість
    - лінь
    - перемогу
    - фотографію
    correct: 0
  - question: Мій друг спитав, _____ я хочу піти з ним у кінотеатр.
    options:
    - чи
    - що
    - щоб
    - аби
    correct: 0
  - question: Ми йдемо на _____ з футболу.
    options:
    - змагання
    - мистецтво
    - виставку
    - виставу
    correct: 0
  - question: Пізно ввечері я дивлюся новий документальний фільм, _____ він допомагає
      мені розслабитися.
    options:
    - бо
    - щоб
    - який
    - хоч
    correct: 0
- id: essay-response-art-vocab
  type: essay-response
  instruction: Напишіть 5 речень про свої улюблені види мистецтва.
  prompt: 'Використовуйте слова: мистецтво, виставка, вистава, живопис, скульптура.'
  min_words: 50
  model_answer: Я дуже люблю сучасне мистецтво, тому що воно завжди відображає наші
    мрії. Минулого тижня я відвідав нову виставку в Києві, де був представлений сучасний
    живопис. Мені також подобається класична скульптура. Наступних вихідних ми з друзями
    плануємо піти на театральну виставу. Мистецтво допомагає мені знаходити цікавих
    однодумців.
- id: match-up-art-definitions
  type: match-up
  instruction: З'єднайте термін із його визначенням.
  pairs:
  - left: живопис
    right: мистецтво створення картин за допомогою фарб
  - left: скульптура
    right: об'ємний твір мистецтва, створений із глини або каменю
  - left: виставка
    right: публічний показ творів мистецтва
  - left: вистава
    right: театральна постановка для глядачів
  - left: музей
    right: заклад, де зберігають історичні та культурні пам'ятки
  - left: експозиція
    right: розміщення предметів для показу в музеї
- id: error-correction-culture-syntax
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в реченні.
  items:
  - sentence: Ми пішли в музей, тому що побачити нову експозицію.
    error: тому що
    correction: щоб
    error_type: word
    options:
    - щоб
    - хоча
    - бо
    explanation: Для вираження мети (purpose) використовується сполучник «щоб».
  - sentence: Виставка, який ми відвідали вчора, була дуже цікавою.
    error: який
    correction: яку
    error_type: word
    options:
    - яку
    - яка
    - якому
    explanation: Слово «виставка» — жіночого роду (знахідний відмінок — яку).
  - sentence: Я люблю сучасний живопис, щоб класичне мистецтво мені не подобається.
    error: щоб
    correction: хоча
    error_type: word
    options:
    - хоча
    - тому що
    - аби
    explanation: Тут є протиставлення, тому потрібен допустовий сполучник «хоча».
  - sentence: Моя подруга сказала, чи ця вистава — головна подія року.
    error: чи
    correction: що
    error_type: word
    options:
    - що
    - щоб
    - бо
    explanation: Для передачі розповідного речення в непрямій мові використовуємо
      «що».
  - sentence: Якщо ти любиш експерименти, ти обов'язково сподобається цей перформанс.
    error: ти
    correction: тобі
    error_type: word
    options:
    - тобі
    - тебе
    - тобою
    explanation: Дієслово «сподобатися» вимагає давального відмінка (кому? — тобі).
  - sentence: Хоча квитки були дорогі, проте подія було того варта.
    error: було
    correction: була
    error_type: word
    options:
    - була
    - був
    - були
    explanation: Слово «подія» — жіночого роду, тому «була».
- id: reading-holiday-traditions
  type: true-false
  instruction: Прочитайте про українські свята і позначте, чи правильні ці твердження.
  items:
  - statement: День Незалежності України — це велике релігійне свято.
    correct: false
    explanation: Це державне свято, а не релігійне.
  - statement: В офіційних назвах більшості державних свят з великої літери пишеться
      лише перше слово.
    correct: true
    explanation: 'Наприклад: День українського козацтва.'
  - statement: На Святвечір традиційно готують дванадцять пісних страв.
    correct: true
    explanation: Це давня традиція українського Різдва.
  - statement: Головна страва на Святвечір — це смажений чорноморський бичок.
    correct: false
    explanation: Головна страва — це солодка кутя з маком.
  - statement: Свято Івана Купала святкується взимку.
    correct: false
    explanation: Воно святкується на початку спекотного липня.
  - statement: Святий Миколай — це штучний вигаданий радянський персонаж.
    correct: false
    explanation: Він є реальним історичним персонажем, на відміну від Діда Мороза.
- id: reading-regional-cuisine
  type: true-false
  instruction: Прочитайте текст про гастрономію і позначте, чи правильні ці твердження.
  items:
  - statement: Львів славиться своїми рибними ресторанами на березі моря.
    correct: false
    explanation: Львів славиться кав'ярнями, а рибні ресторани — це Одеса.
  - statement: Банош — це традиційна страва, яку історично готували гуцульські пастухи.
    correct: true
    explanation: Так, це давня гуцульська страва, яку зараз подають у ресторанах.
  - statement: Борщ був включений до списку культурної спадщини ЮНЕСКО.
    correct: true
    explanation: Міжнародна спільнота включила борщ до списку ЮНЕСКО.
  - statement: В Україні не прийнято залишати чайові в ресторанах.
    correct: false
    explanation: В Україні прийнято залишати щедрі чайові за якісний сервіс.
  - statement: Кожна українська господиня готує борщ за однаковим стандартним рецептом.
    correct: false
    explanation: Кожна господиня має свій унікальний секретний рецепт.
  - statement: Фірмова страва допомагає ресторану вирізнятися серед конкурентів.
    correct: true
    explanation: Успішна фірмова страва — це унікальна пропозиція закладу.
- id: fill-in-restaurant-dialogue
  type: fill-in
  instruction: Доповніть діалог словами з теми «Ресторан».
  items:
  - sentence: Коли ви приходите в ресторан, офіціант пропонує вам детальне _____.
    answer: меню
    options:
    - меню
    - замовлення
    - дозвілля
  - sentence: Талановитий _____ створює справжні кулінарні шедеври.
    answer: шеф-кухар
    options:
    - офіціант
    - шеф-кухар
    - клієнт
  - sentence: 'Я із задоволенням зроблю _____: принесіть смажену рибу.'
    answer: замовлення
    options:
    - замовлення
    - мистецтво
    - свято
  - sentence: Ця рибна _____ дуже смачна.
    answer: страва
    options:
    - страва
    - вистава
    - колядка
  - sentence: Принесіть, будь ласка, _____, ми хочемо заплатити.
    answer: рахунок
    options:
    - рахунок
    - меню
    - замовлення
  - sentence: Якщо сервіс був якісним, гості залишають _____.
    answer: чайові
    options:
    - чайові
    - рахунок
    - страви
- id: quiz
  type: quiz
  instruction: Оберіть правильний сполучник або вступну фразу для аргументації.
  items:
  - question: «_____ мою думку, ця вистава є надзвичайно талановитою».
    options:
    - На
    - За
    - У
    - З
    correct: 0
  - question: Я переконаний, _____ кожен повинен знати свої традиції.
    options:
    - що
    - щоб
    - чи
    - який
    correct: 0
  - question: «_____ словами істориків, спадщина є надійним фундаментом».
    options:
    - За
    - На
    - З
    - До
    correct: 0
  - question: «Він співає так, _____ це співає справжній янгол».
    options:
    - неначе
    - тому що
    - хоча
    - якщо
    correct: 0
  - question: «_____ ми забудемо традиції, ми втратимо ідентичність».
    options:
    - Якщо
    - Бо
    - Дарма що
    - Аби
    correct: 0
  - question: Ця картина виглядає так, _____ вона справді жива.
    options:
    - мов
    - бо
    - хоча
    - щоб
    correct: 0
- id: essay-response
  type: essay-response
  instruction: Чи важливо активно підтримувати культуру під час війни?
  prompt: 'Напишіть кілька речень, аргументуючи свою думку. Використовуйте конструкції:
    «Я вважаю, що...», «Незважаючи на те що...».'
  min_words: 50
  model_answer: Я твердо переконаний, що підтримка культури є критично важливою сьогодні.
    Хоча наша економіка потребує багато ресурсів, ми не маємо морального права забувати
    про мистецтво. Якщо нація втрачає свою автентичну культуру, вона назавжди втрачає
    сенс своєї боротьби. Тому ми повинні відвідувати виставки та підтримувати митців.
workbook:
