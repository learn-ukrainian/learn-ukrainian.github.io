version: '1.0'
module: leisure-culture-festivals
level: b1
inline:
- id: fill-in-leisure-grammar
  type: fill-in
  instruction: Вставте правильну граматичну форму у реченнях на тему дозвілля і захоплення.
  items:
  - sentence: Мій друг сказав, ____ він дуже любить грати в настільні ігри.
    answer: що
    options:
    - що
    - щоб
    - бо
    - якщо
  - sentence: Я бігаю щоранку, ____ підтримувати своє тіло у гарній формі.
    answer: щоб
    options:
    - що
    - щоб
    - хоча
    - бо
  - sentence: ____ надворі йде дощ, ми все одно підемо в кінотеатр.
    answer: Хоча
    options:
    - Якщо
    - Бо
    - Хоча
    - Щоб
  - sentence: Ми зазвичай дивимося комедії, ____ вони допомагають нам розслабитися.
    answer: тому що
    options:
    - тому що
    - щоб
    - хоча
    - який
  - sentence: ____ у мене буде вільний час, я обов'язково піду на виставку.
    answer: Якщо
    options:
    - Хоча
    - Якщо
    - Щоб
    - Бо
  - sentence: Тренер, ____ працює у нашому клубі, має великий досвід.
    answer: який
    options:
    - який
    - що
    - щоб
    - якщо
- id: quiz-leisure-choice
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Дозвілля
    і захоплення».'
  items:
  - question: Він любить активний відпочинок, тому щодня ходить на _____.
    options:
    - мистецтво
    - тренування
    - дозвілля
    - читання
    correct: 1
  - question: Мій брат бере участь у міському марафоні, бо мріє про _____.
    options:
    - виставу
    - скульптуру
    - перемогу
    - меню
    correct: 2
  - question: Найкраще _____ для мене — це подорожі новими країнами.
    options:
    - захоплення
    - змагання
    - Різдво
    - замовлення
    correct: 0
  - question: У вільний час мої друзі часто грають у настільні _____.
    options:
    - книги
    - спорт
    - подорожі
    - ігри
    correct: 3
  - question: Він сказав, _____ завтра буде додаткове заняття з йоги.
    options:
    - щоб
    - що
    - якщо
    - хоча
    correct: 1
  - question: Ми йдемо в міський парк, _____ спокійно насолодитися красою природи.
    options:
    - щоб
    - бо
    - який
    - що
    correct: 0
- id: match-up-art-definitions
  type: match-up
  instruction: З'єднайте терміни з розділу «Культура і мистецтво» з їхніми правильними
    визначеннями.
  pairs:
  - left: живопис
    right: вид мистецтва, у якому створюють картини за допомогою фарб
  - left: скульптура
    right: об'ємний твір мистецтва, створений з глини, каменю чи металу
  - left: вистава
    right: театральна постановка, яку грають актори на сцені
  - left: експозиція
    right: розміщення картин або інших предметів мистецтва для показу глядачам
  - left: дозвілля
    right: вільний час, який людина використовує для відпочинку та розваг
  - left: захоплення
    right: улюблена справа, якою людина регулярно займається у вільний час
workbook:
- id: wb-unjumble-gastronomy
  type: unjumble
  instruction: Складіть правильне речення зі слів (Гастрономія і ресторанна культура).
  items:
  - words:
    - найкращий
    - Тут
    - у
    - готують
    - борщ
    - місті.
    correct_order:
    - Тут
    - готують
    - найкращий
    - борщ
    - у
    - місті.
  - words:
    - принесіть
    - нам
    - Будь
    - ласка,
    - меню.
    correct_order:
    - Будь
    - ласка,
    - принесіть
    - нам
    - меню.
  - words:
    - замовити
    - Я
    - хочу
    - смажену
    - рибу.
    correct_order:
    - Я
    - хочу
    - замовити
    - смажену
    - рибу.
  - words:
    - дуже
    - має
    - Цей
    - ресторан
    - смачні
    - страви.
    correct_order:
    - Цей
    - ресторан
    - має
    - дуже
    - смачні
    - страви.
  - words:
    - чудові
    - завжди
    - створює
    - Наш
    - шеф-кухар
    - страви.
    correct_order:
    - Наш
    - шеф-кухар
    - завжди
    - створює
    - чудові
    - страви.
  - words:
    - нам
    - наш
    - Можете
    - рахунок?
    - принести
    correct_order:
    - Можете
    - принести
    - нам
    - наш
    - рахунок?
- id: wb-translate-leisure
  type: translate
  instruction: Оберіть правильний переклад речень на тему дозвілля та мистецтво.
  items:
  - source: I really like reading in my free time.
    options:
    - text: Я дуже люблю читати у свій вільний час.
      correct: true
    - text: Я дуже люблю писати у свій вільний час.
      correct: false
    - text: Я часто дивлюся телевізор у свій вільний час.
      correct: false
    - text: Я не люблю читати у свій вільний час.
      correct: false
  - source: The guide said that this exhibition is very interesting.
    options:
    - text: Екскурсовод сказав, що ця виставка дуже цікава.
      correct: true
    - text: Екскурсовод сказав, щоб ця виставка дуже цікава.
      correct: false
    - text: Екскурсовод спитав, чи ця виставка дуже цікава.
      correct: false
    - text: Екскурсовод сказав, бо ця виставка дуже цікава.
      correct: false
  - source: Although the tickets were expensive, the concert was great.
    options:
    - text: Хоча квитки були дорогі, концерт був чудовим.
      correct: true
    - text: Тому що квитки були дорогі, концерт був чудовим.
      correct: false
    - text: Якщо квитки будуть дорогі, концерт буде чудовим.
      correct: false
    - text: Щоб квитки були дорогі, концерт був чудовим.
      correct: false
  - source: They went to the theatre to see a new performance.
    options:
    - text: Вони пішли в театр, щоб побачити нову виставу.
      correct: true
    - text: Вони пішли в театр, бо побачили нову виставу.
      correct: false
    - text: Вони пішли в театр, що побачити нову виставу.
      correct: false
    - text: Вони пішли в театр, якщо побачити нову виставу.
      correct: false
  - source: This is the restaurant which has the best chef.
    options:
    - text: Це ресторан, який має найкращого шеф-кухаря.
      correct: true
    - text: Це ресторан, що має найкращого шеф-кухаря.
      correct: false
    - text: Це ресторан, де має найкращого шеф-кухаря.
      correct: false
    - text: Це ресторан, щоб має найкращого шеф-кухаря.
      correct: false
  - source: If the weather is good, we will go to the park.
    options:
    - text: Якщо погода буде гарна, ми підемо в парк.
      correct: true
    - text: Хоча погода гарна, ми підемо в парк.
      correct: false
    - text: Бо погода гарна, ми підемо в парк.
      correct: false
    - text: Щоб погода була гарна, ми підемо в парк.
      correct: false
- type: essay-response
  prompt: 'Напишіть розгорнуту відповідь (мінімум 5 речень) про ваш останній візит
    до музею, театру або на виставку. Використовуйте нову лексику з розділу «Культура
    і мистецтво» (наприклад: мистецтво, виставка, живопис, скульптура), а також складіть
    щонайменше два складнопідрядні речення.'
  min_words: 50
  model_answer: Нещодавно я відвідав новий художній музей, щоб побачити сучасне українське
    мистецтво. Ця масштабна виставка була дуже цікавою, хоча квитки на неї коштували
    досить дорого. У головному залі була представлена унікальна скульптура, яка одразу
    вразила всіх відвідувачів своїми формами. Також я дуже люблю класичний живопис,
    тому що він завжди допомагає мені розслабитися. За словами професійних арт-критиків,
    ця експозиція є головною мистецькою подією цього року.
  evaluation_criteria:
  - Використано щонайменше 5 цілісних речень.
  - Присутня цільова лексика (мистецтво, виставка, живопис, скульптура тощо).
  - Правильно побудовано складнопідрядні речення.
