- id: workbook-essay-review
  type: essay-response
  prompt: 'Напишіть короткий відгук (5-7 речень) про ваше улюблене місто, фільм або
    книгу. Використайте щонайменше 3 прикметники у найвищому ступені порівняння (наприклад:
    найкращий, найбільш цікавий, якнайшвидше). Поясніть, чому ви вважаєте цей об''єкт
    таким особливим.'
  min_words: 50
  model_answer: Я дуже рекомендую відвідати Київ. Це найбільше місто в Україні та
    одне з найстаріших міст Європи. Київ має найцікавішу історію та багато красивих
    парків. На мою думку, це найбільш привабливе місто для туристів. Тут ви зможете
    скуштувати найсмачнішу українську кухню. Раджу приїхати сюди якнайшвидше, щоб
    отримати щонайкращі враження!
  rubric:
  - criteria: Використання найвищого ступеня
    description: У тексті є щонайменше 3 форми найвищого ступеня порівняння.
  - criteria: Обсяг тексту
    description: Текст містить 5-7 речень (не менше 50 слів).
  - criteria: Відсутність русизмів
    description: Слово «самий» не використовується для утворення ступенів порівняння.
