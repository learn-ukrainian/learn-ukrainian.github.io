workbook:
- type: group-sort
  instruction: Розподіліть прикметники за типом форми найвищого ступеня.
  groups:
  - label: Проста форма (з най-)
    items:
    - найвищий
    - найдовша
    - найкраще
    - найтепліший
  - label: Складена форма (найбільш/найменш)
    items:
    - найбільш цікавий
    - найменш складна
    - найбільш потужний
    - найменш відоме
  - label: Підсилена форма (що-/як-)
    items:
    - якнайшвидший
    - щонайкращий
    - якнайбільша
    - щонайдовший
  title: Розподіліть прикметники за типом форми найвищого ступеня.
- type: true-false
  instruction: Правда чи ні? Оцініть твердження про правила утворення ступенів порівняння.
  items:
  - statement: Слово 'самий' використовується для утворення найвищого ступеня в українській
      мові.
    correct: false
    explanation: Це російська калька. Правильно використовувати префікс 'най-' або
      слово 'найбільш'.
  - statement: Форма 'найбільш сильніший' є граматично правильною.
    correct: false
    explanation: Це подвійне маркування. Правильно або 'найсильніший', або 'найбільш
      сильний'.
  - statement: Префікси 'що-' та 'як-' завжди пишуться разом зі словом.
    correct: true
    explanation: Слова на зразок 'якнайшвидший' пишуться разом.
  - statement: Прикметник 'дорогий' у найвищому ступені має форму 'найдорогіший'.
    correct: false
    explanation: Відбувається чергування г/ж/з → жч, тому правильно 'найдорожчий'.
  - statement: Складена форма найвищого ступеня частіше використовується в офіційному
      стилі.
    correct: true
    explanation: Форми з 'найбільш' і 'найменш' характерні для книжного та офіційно-ділового
      стилів.
  - statement: Суфікс '-ок-' у слові 'широкий' випадає при утворенні ступенів порівняння.
    correct: true
    explanation: Тому ми кажемо 'найширший', а не 'найширокіший'.
  title: Правда чи ні? Оцініть твердження про правила утворення ступенів порівняння.
