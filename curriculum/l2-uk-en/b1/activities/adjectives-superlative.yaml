  title: З'єднайте початок та кінець сталих виразів у складеній формі найвищого ступеня.
- id: intensified-forms-drill
  type: fill-in
  instruction: Додайте префікси що- або як- до найвищого ступеня відповідно до контексту
    речення.
  items:
  - sentence: Знайдіть _____ шлях вирішення проблеми.
    answer: якнайшвидший
  - sentence: Обери _____ варіант із тих, що зараз доступні.
    answer: щонайкращий
  - sentence: Вона мріяла про подорож на _____ спортивній машині.
    answer: якнайшвидшій
  - sentence: Ми доклали _____ зусиль.
    answer: якнайбільших
  - sentence: Це був _____ день у моєму житті.
    answer: щонайдовший
  - sentence: Нам потрібен _____ маршрут.
    answer: якнайкоротший
  title: Додайте префікси що- або як- до найвищого ступеня відповідно до контексту
    реченн
