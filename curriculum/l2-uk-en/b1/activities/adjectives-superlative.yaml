    error_type: phrase
  - sentence: Вона вибрала як-найшвидший потяг.
    error: як-найшвидший
    correction: якнайшвидший
    error_type: word
  title: Знайдіть і виправте типові помилки (кальки з російської мови та подвійне
    маркува
- id: quiz-superlative-summary-check
  type: quiz
  instruction: 'Підсумковий тест: Оберіть правильний варіант для кожного запитання.'
  items:
  - question: Яке слово написано правильно?
