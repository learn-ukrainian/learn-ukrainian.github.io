version: '1.0'
module: adjectives-superlative
level: b1
inline:
- id: activity-1-simple-superlative
  type: quiz
  instruction: Оберіть правильну форму найвищого ступеня.
  items:
  - question: Говерла — це _____ гора в Україні.
    options:
    - найвища
    - сама висока
    - найвисока
    - найбільш вища
    correct: 0
  - question: Це був _____ день у моєму житті.
    options:
    - найкращий
    - самий кращий
    - більш кращий
    - самий хороший
    correct: 0
  - question: Озеро Світязь — _____ серед усіх українських водойм.
    options:
    - найглибше
    - саме глибоке
    - найглибокіше
    - найбільш найглибше
    correct: 0
  - question: Він мій _____ друг.
    options:
    - найближчий
    - самий близький
    - найблизькіший
    - найбільш ближчий
    correct: 0
  - question: Ця вулиця _____ у нашому місті.
    options:
    - найвужча
    - сама вузька
    - найвузькіша
    - найбільш вужча
    correct: 0
  - question: Це завдання було _____ на іспиті.
    options:
    - найважче
    - саме важке
    - найважкіше
    - більш найважче
    correct: 0
- id: activity-2-compound-superlative
  type: quiz
  instruction: Оберіть правильний варіант складеної форми найвищого ступеня.
  items:
  - question: Це _____ варіант звіту.
    options:
    - найбільш цікавий
    - найбільш цікавіший
    - самий цікавий
    - більш найцікавіший
    correct: 0
  - question: Ми обговорили _____ питання.
    options:
    - найбільш актуальні
    - найбільш найактуальніші
    - самі актуальні
    - найбільш актуальніші
    correct: 0
  - question: Це _____ маршрут для туристів.
    options:
    - найменш складний
    - найменш складніший
    - самий нескладний
    - найменш найскладніший
    correct: 0
  - question: Вони запропонували _____ метод лікування.
    options:
    - найбільш ефективний
    - найбільш ефективніший
    - самий ефективний
    - найбільше ефективний
    correct: 0
  - question: Це _____ результат експерименту.
    options:
    - найменш очікуваний
    - найменш очікуваніший
    - самий неочікуваний
    - більш найочікуваніший
    correct: 0
  - question: Для науки це _____ чинник глобального потепління.
    options:
    - найбільш вагомий
    - найбільш вагоміший
    - самий вагомий
    - найбільш найвагомий
    correct: 0
- id: activity-3-intensified-forms
  type: quiz
  instruction: Оберіть правильно написане слово.
  items:
  - question: Зробіть цю роботу _____.
    options:
    - якнайкраще
    - як найкраще
    - як-найкраще
    - щонай краще
    correct: 0
  - question: Ми маємо виконати це в _____ терміни.
    options:
    - якнайкоротші
    - як-найкоротші
    - як найкоротші
    - щонай коротші
    correct: 0
  - question: Це _____ ціна.
    options:
    - щонайменша
    - що найменша
    - що-найменша
    - як-найменша
    correct: 0
  - question: Бажаю вам _____ одужання.
    options:
    - якнайшвидшого
    - як найшвидшого
    - як-найшвидшого
    - що-найшвидшого
    correct: 0
  - question: Ми пропонуємо _____ стандарт якості.
    options:
    - щонайвищий
    - що-найвищий
    - що найвищий
    - як найвищий
    correct: 0
  - question: Тут на вас чекає _____ асортимент.
    options:
    - щонайширший
    - що-найширший
    - що найширший
    - як-найширший
    correct: 0
- id: activity-4-synonymous-expressions
  type: match-up
  instruction: З'єднайте форму найвищого ступеня з її стилістичним синонімом.
  pairs:
  - left: найкрасивіший
    right: прегарний
  - left: найдобріший
    right: предобрий
  - left: найбільш важливий
    right: надзвичайно важливий
  - left: найбільш необхідний
    right: вкрай необхідний
  - left: найбільш шановний
    right: вельми шановний
  - left: найчистіший
    right: чистесенький
- id: activity-5-context-quiz
  type: quiz
  instruction: Оберіть найкращий варіант за змістом і граматикою.
  items:
  - question: Модель «В» — це справжній флагман. Вона є _____ серед усіх представлених
      варіантів.
    options:
    - найдорожчою
    - більш дорогою
    - найдорогішою
    - самою дорогою
    correct: 0
  - question: З усіх скарбів світу _____ є молодість.
    options:
    - найбільш цінним
    - найбільш ціннішим
    - самим цінним
    - більш найціннішим
    correct: 0
  - question: Ан-225 «Мрія» був _____ транспортним літаком у світі.
    options:
    - найпотужнішим
    - найбільш потужнішим
    - самим потужним
    - більш найпотужнішим
    correct: 0
  - question: Олешківські піски — це _____ пустеля в Європі.
    options:
    - найбільша
    - сама велика
    - найбільш велика
    - більш найбільша
    correct: 0
  - question: Пилип Орлик уклав одну з _____ демократичних конституцій.
    options:
    - найдавніших
    - самих давніх
    - найбільш давніших
    - більш найдавніших
    correct: 0
  - question: Сергій Бубка залишається одним із _____ атлетів.
    options:
    - найуспішніших
    - самих успішних
    - найбільш успішніших
    - найбільш успішний
    correct: 0
- id: activity-6-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні.
  items:
  - sentence: Він мій самий кращий друг.
    error: самий кращий
    correction: найкращий
    error_type: phrase
    options:
    - кращий
    - добріший
    - найбільш кращий
    explanation: 'Слово «самий» не використовується для утворення ступенів порівняння.
      Правильно: найкращий.'
  - sentence: Це саме велике місто в країні.
    error: саме велике
    correction: найбільше
    error_type: phrase
    options:
    - велике
    - більше
    - найбільш велике
    explanation: Правильна проста форма утворюється за допомогою префікса най-.
  - sentence: Ми обговорили найбільш актуальніші питання.
    error: найбільш актуальніші
    correction: найбільш актуальні
    error_type: phrase
    options:
    - актуальніші
    - самі актуальні
    - більш актуальні
    explanation: 'Контамінація (подвійне маркування): складена форма використовується
      лише з початковою формою прикметника.'
  - sentence: Озеро Світязь — саме глибоке в Україні.
    error: саме глибоке
    correction: найглибше
    error_type: phrase
    options:
    - глибоке
    - глибше
    - найбільш глибоке
    explanation: Слово «саме» є русизмом у цьому контексті.
  - sentence: Він запропонував найбільш ефективніший метод.
    error: найбільш ефективніший
    correction: найбільш ефективний
    error_type: phrase
    options:
    - ефективніший
    - самий ефективний
    - більш ефективний
    explanation: Після слова «найбільш» прикметник має стояти у початковій формі.
  - sentence: Ця будівля — сама висока в місті.
    error: сама висока
    correction: найвища
    error_type: phrase
    options:
    - висока
    - вища
    - найбільш висока
    explanation: Для вираження найвищої ознаки використовуємо префікс най-.
workbook:
- id: workbook-fill-in-chain
  type: fill-in
  instruction: Утворіть просту форму найвищого ступеня за зразком.
  items:
  - sentence: Високий — вищий — _____.
    answer: найвищий
    options:
    - найвищий
    - самий високий
    - найбільш вищий
  - sentence: Дорогий — дорожчий — _____.
    answer: найдорожчий
    options:
    - найдорожчий
    - найдорогіший
    - самий дорогий
  - sentence: Добрий — кращий — _____.
    answer: найкращий
    options:
    - найкращий
    - самий кращий
    - добріший
  - sentence: Поганий — гірший — _____.
    answer: найгірший
    options:
    - найгірший
    - самий поганий
    - поганіший
  - sentence: Великий — більший — _____.
    answer: найбільший
    options:
    - найбільший
    - самий великий
    - великіший
  - sentence: Малий — менший — _____.
    answer: найменший
    options:
    - найменший
    - самий малий
    - маліший
  - sentence: Солодкий — солодший — _____.
    answer: найсолодший
    options:
    - найсолодший
    - найсолодкіший
    - самий солодкий
  - sentence: Близький — ближчий — _____.
    answer: найближчий
    options:
    - найближчий
    - найблизькіший
    - самий близький
