- id: reading-superlative-landmarks
  type: reading
  instruction: Прочитайте текст про рекорди України та дайте відповіді на запитання.
  passage: Україна багата на рекорди. Найвища гора країни — це Говерла в Карпатах,
    її висота 2061 метр. Найдовша та найширша річка — величний Дніпро. Найбільше місто
    за населенням — столиця Київ, але для багатьох найзатишнішим є старовинний Львів.
    Щодо природних водойм, то найглибше озеро — містичне озеро Синевир. У галузі авіації
    українці пишаються легендарним літаком Ан-225 «Мрія», який був найважчим у світі.
  questions:
  - Яка гора є найвищою в Україні?
  - Яка річка є найдовшою та найширшою?
  - Яке місто є найбільшим за населенням?
  - Яке озеро є найглибшим?
  - Який літак був найважчим у світі?
  title: Прочитайте текст про рекорди України та дайте відповіді на запитання.
- id: fill-in-simple-superlative
  type: fill-in
  instruction: Утворіть просту форму найвищого ступеня від поданих прикметників у
    дужках.
  items:
  - sentence: Це торт у цьому кафе.
    answer: найсмачніший
  - sentence: Говерла — гора України.
    answer: найвища
  - sentence: Він обрав шлях додому.
    answer: найкоротший
  - sentence: Це модель смартфона на ринку.
    answer: найновіша
  - sentence: Дніпро — річка в Україні.
    answer: найширша
  - sentence: Це озеро в регіоні.
    answer: найглибше
  - sentence: Ми знайшли квиток на потяг.
    answer: найдешевший
  - sentence: Це дерево в нашому місті.
    answer: найстарше
  title: Утворіть просту форму найвищого ступеня від поданих прикметників у дужках.
- id: quiz-superlative-basics
  type: quiz
  instruction: Оберіть правильну граматичну форму найвищого ступеня для кожного речення.
  items:
  - question: Яка форма є правильною?
    options:
    - найдорожчий
    - найдорогіший
    - самий дорогий
    - найбільш дорожчий
    correct: 0
  - question: Як правильно сказати «the widest»?
    options:
    - найширокіший
    - найширший
    - найширкіший
    - найширокий
    correct: 1
  - question: 'Випадання суфікса -ок- відбувається у слові:'
    options:
    - найвищий
    - найстаріший
    - найглибший
    - найновіший
    correct: 2
  - question: 'Чергування г/ж/з → жч є у слові:'
    options:
    - найтонший
    - найдорожчий
    - найвищий
    - наймолодший
    correct: 1
  - question: Яке слово утворено НЕПРАВИЛЬНО?
    options:
    - найсолодший
    - найшвидший
    - найдальший
    - найсолодкіший
    correct: 3
  - question: 'Наголос у слові «найдешевший» падає на склад:'
    options:
    - най
    - де
    - ше
    - вий
    correct: 2
  - question: 'Префікс «най-» завжди пишеться:'
    options:
    - разом зі словом
    - окремо від слова
    - через дефіс
    - через апостроф
    correct: 0
  - question: Яке речення граматично правильне?
    options:
    - Це самий кращий день.
    - Це найбільш найкращий день.
    - Це найкращий день.
    - Це кращий день всіх.
    correct: 2
  title: Оберіть правильну граматичну форму найвищого ступеня для кожного речення.
