- id: essay-response-comparison
  type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Складена
    форма найвищого ступеня».
  prompt: Порівняйте кілька предметів або явищ, які вас цікавлять (наприклад, книги,
    фільми, технології), використовуючи слова 'найбільш' та 'найменш'.
  min_words: 50
  model_answer: На мою думку, найбільш цікавою книжкою цього року є новий роман про
    космос. Це також найбільш популярна тема серед моїх друзів. З іншого боку, найменш
    привабливою для мене є історична література. Мій смартфон — це найбільш потужний
    пристрій, який я маю. А найменш відомий факт про мене — це те, що я люблю малювати.
  title: Напишіть 5 речень, використовуючи нову лексику з розділу «Складена форма
    найвищо
- id: error-correction-superlative
