- type: match-up
  title: "Знайдіть пару: терміни та їхні значення"
  instruction: "З'єднайте кожне слово з його правильним визначенням, спираючись на контекст соціальних зв'язків."
  pairs:
    - left: "стосунки"
      right: "особисті та емоційні контакти між людьми"
    - left: "відносини"
      right: "офіційні або формальні контакти між державами"
    - left: "взаємини"
      right: "глибокий, двосторонній та теплий родинний зв'язок"
    - left: "ставлення"
      right: "ваша особиста суб'єктивна думка або реакція на щось"
    - left: "куми"
      right: "духовні родичі після хрещення дитини"
    - left: "кохати"
      right: "відчувати дуже палку романтичну пристрасть до партнера"
    - left: "любити"
      right: "відчувати симпатію до родини, друзів або їжі"
    - left: "зворотний зв'язок"
      right: "конструктивні коментарі щодо виконаної роботи"
    - left: "одружитися"
      right: "офіційно створити нову сім'ю з партнером"
    - left: "знайомство"
      right: "перша зустріч і початок нових контактів"

- type: fill-in
  title: "Вставте пропущені слова"
  instruction: "Оберіть найбільш підхоже слово для кожної життєвої ситуації."
  items:
    - sentence: "Мої батьки мають дуже теплі і гармонійні взаємини."
      answer: "взаємини"
      options:
        - "взаємини"
        - "відносини"
        - "ставлення"
        - "зв'язки"
    - sentence: "Україна розірвала всі дипломатичні відносини з цією країною."
      answer: "відносини"
      options:
        - "відносини"
        - "стосунки"
        - "взаємини"
        - "шлюби"
    - sentence: "Я щиро люблю свою роботу і своїх веселих колег."
      answer: "люблю"
      options:
        - "люблю"
        - "кохаю"
        - "приятелюю"
        - "одружуюся"
    - sentence: "Вона дуже палко кохає свого нового хлопця."
      answer: "кохає"
      options:
        - "кохає"
        - "любить"
        - "спілкується"
        - "підтримує"
    - sentence: "Мій брат нарешті одружився з дуже розумною дівчиною."
      answer: "одружився з"
      options:
        - "одружився з"
        - "одружився на"
        - "взяв шлюб на"
        - "зробив шлюб з"
    - sentence: "Після переїзду я дуже боюся втратити зв'язок зі своїми старими друзями."
      answer: "втратити зв'язок"
      options:
        - "втратити зв'язок"
        - "розірвати стосунки"
        - "з'ясувати відносини"
        - "налагодити взаємини"
    - sentence: "Він має дуже серйозне та відповідальне ставлення до навчання в університеті."
      answer: "ставлення"
      options:
        - "ставлення"
        - "стосунки"
        - "відносини"
        - "знайомство"
    - sentence: "Сусіди знову почали голосно з'ясовувати стосунки прямо на вулиці."
      answer: "з'ясовувати стосунки"
      options:
        - "з'ясовувати стосунки"
        - "розірвати зв'язок"
        - "робити відносини"
        - "говорити взаємини"

- type: error-correction
  title: "Виправте помилки: Русизми та семантика"
  instruction: "Знайдіть і виправте лексичну або граматичну помилку в кожному реченні."
  items:
    - sentence: "Мій старший брат вчора женився на цій дівчині."
      error: "женився на цій дівчині"
      answer: "одружився з цією дівчиною"
      error_type: "construction"
      options:
        - "одружився з цією дівчиною"
        - "одружився на цій дівчині"
        - "взяв шлюб на цій дівчині"
        - "зробив шлюб з цією дівчиною"
      explanation: "Українською мовою правильно казати 'одружитися з кимось' (Орудний відмінок)."
    - sentence: "Я дуже сильно кохаю український червоний борщ з часником."
      error: "кохаю"
      answer: "люблю"
      error_type: "word"
      options:
        - "люблю"
        - "поважаю"
        - "приятелюю"
        - "спілкується"
      explanation: "Слово 'кохати' використовується тільки для романтичної пристрасті."
    - sentence: "Він має дуже погане відношення до сучасного вуличного мистецтва."
      error: "відношення"
      answer: "ставлення"
      error_type: "word"
      options:
        - "ставлення"
        - "стосунки"
        - "взаємини"
        - "знайомство"
      explanation: "Особиста думка чи позиція щодо чогось — це 'ставлення'."
    - sentence: "У нас з колегами на роботі дуже теплі романтичні відносини."
      error: "романтичні відносини"
      answer: "дружні стосунки"
      error_type: "phrase"
      options:
        - "дружні стосунки"
        - "офіційні зв'язки"
        - "романтичні взаємини"
        - "дипломатичні відносини"
      explanation: "З колегами на роботі будують 'дружні стосунки' або 'приятелюють'."
    - sentence: "Дві держави налагодили нові дипломатичні стосунки після світової кризи."
      error: "дипломатичні стосунки"
      answer: "дипломатичні відносини"
      error_type: "phrase"
      options:
        - "дипломатичні відносини"
        - "дипломатичні зв'язки"
        - "офіційні взаємини"
        - "державні стосунки"
      explanation: "Між державами існують офіційні 'відносини', а не 'стосунки'."
    - sentence: "Моя мама сказала, що я повинна частіше з нею з'ясовувати відносини."
      error: "з'ясовувати відносини"
      answer: "бути на зв'язку"
      error_type: "phrase"
      options:
        - "бути на зв'язку"
        - "робити відносини"
        - "мати зв'язок"
        - "розірвати стосунки"
      explanation: "Щоб підтримувати контакт, треба 'бути на зв'язку'. 'З'ясовувати стосунки' означає сваритися."

