- type: fill-in
  title: 'Оберіть правильну форму дієслова'
  instruction: 'Зверніть увагу на маркер часу в реченні.'
  items:
    - sentence: 'Ми _____ цей музей кожного літа.'
      answer: 'відвідували'
      options:
        - 'відвідували'
        - 'відвідали'
        - 'відвідаємо'
        - 'відвідати'
      explanation: 'Маркер кожного літа вимагає недоконаного виду.'
    - sentence: 'Того літа ми несподівано _____ на море.'
      answer: 'поїхали'
      options:
        - 'поїхали'
        - 'їздили'
        - 'їдемо'
        - 'їхати'
      explanation: 'Маркер того літа означає унікальну подію.'
    - sentence: 'Одного разу я _____ справжнє диво.'
      answer: 'побачив'
      options:
        - 'побачив'
        - 'бачив'
        - 'бачу'
        - 'бачити'
      explanation: 'Одного разу вимагає доконаного виду.'
    - sentence: 'Зазвичай вона _____ зелений чай зранку.'
      answer: 'пила'
      options:
        - 'пила'
        - 'випила'
        - 'п''є'
        - 'випити'
      explanation: 'Зазвичай вказує на регулярну звичку.'
    - sentence: 'Того дня вона _____ міцну чорну каву.'
      answer: 'випила'
      options:
        - 'випила'
        - 'пила'
        - 'п''є'
        - 'пити'
      explanation: 'Того дня вказує на разову подію.'
    - sentence: 'Ми часто _____ у футбол після школи.'
      answer: 'грали'
      options:
        - 'грали'
        - 'зіграли'
        - 'граємо'
        - 'зіграти'
      explanation: 'Часто вимагає недоконаного виду.'
    - sentence: 'Вчора він вперше _____ на великій сцені.'
      answer: 'зіграв'
      options:
        - 'зіграв'
        - 'грав'
        - 'грає'
        - 'грати'
      explanation: 'Вперше маркує унікальний досвід.'
    - sentence: 'Бабуся щонеділі _____ смачні великі пироги.'
      answer: 'пекла'
      options:
        - 'пекла'
        - 'спекла'
        - 'пече'
        - 'спекти'
      explanation: 'Щонеділі показує циклічність процесу.'
    - sentence: 'На свята ми завжди _____ разом за столом.'
      answer: 'збиралися'
      options:
        - 'збиралися'
        - 'зібралися'
        - 'збираємося'
        - 'зібратися'
      explanation: 'На свята асоціюється з постійними ритуалами.'
    - sentence: 'Того разу ми _____ дуже швидко.'
      answer: 'зібралися'
      options:
        - 'зібралися'
        - 'збиралися'
        - 'зберемося'
        - 'збиратися'
      explanation: 'Того разу вказує на одну завершену дію.'
    - sentence: 'Я ніколи не _____ такого дивного фрукта.'
      answer: 'їв'
      options:
        - 'їв'
        - 'з''їв'
        - 'їм'
        - 'їсти'
      explanation: 'Ніколи вказує на загальний фон без дії.'
    - sentence: 'Востаннє ми _____ багато років тому.'
      answer: 'зустрілися'
      options:
        - 'зустрілися'
        - 'зустрічалися'
        - 'зустрічаємося'
        - 'зустрітися'
      explanation: 'Востаннє фіксує конкретну результативну подію.'

- type: match-up
  title: 'Знайдіть логічну пару: маркер та дія'
  instruction: 'Поєднайте маркер часу з відповідним закінченням речення.'
  pairs:
    - left: 'Кожного літа ми...'
      right: '...їздили до бабусі в село.'
    - left: 'Того літа ми...'
      right: '...поїхали на море вперше.'
    - left: 'Зазвичай вона...'
      right: '...пила зелений чай зранку.'
    - left: 'Того дня вона...'
      right: '...випила міцну чорну каву.'
    - left: 'Одного разу я...'
      right: '...знайшов стару монету.'
    - left: 'Я часто...'
      right: '...шукав свої ключі вдома.'
    - left: 'Щонеділі бабуся...'
      right: '...пекла смачні великі пироги.'
    - left: 'Востаннє ми...'
      right: '...зустрілися п''ять років тому.'
    - left: 'Ми ніколи не...'
      right: '...бачили такого великого міста.'
    - left: 'Він постійно...'
      right: '...забував мій номер телефону.'
    - left: 'Того разу він...'
      right: '...згадав усе дуже швидко.'
    - left: 'На свята родина завжди...'
      right: '...збиралася за великим столом.'

- type: quiz
  title: 'Теорія: недоконаний чи доконаний вид?'
  instruction: 'Оберіть правильну відповідь на запитання про вид дієслова.'
  items:
    - question: 'Який маркер вимагає дієслова доконаного виду?'
      explanation: 'Маркер одного разу позначає унікальну результативну подію.'
      options:
        - text: 'одного разу'
          correct: true
        - text: 'зазвичай'
          correct: false
        - text: 'часто'
          correct: false
        - text: 'ніколи'
          correct: false
    - question: 'Як правильно перекласти англійську конструкцію used to play?'
      explanation: 'Для минулих звичок використовуємо недоконаний вид та маркер часто.'
      options:
        - text: 'часто грав'
          correct: true
        - text: 'зіграв'
          correct: false
        - text: 'граю'
          correct: false
        - text: 'пограв'
          correct: false
    - question: 'Який вид дієслова описує процес без акценту на результат?'
      explanation: 'Недоконаний вид описує тривалу дію або процес.'
      options:
        - text: 'недоконаний вид'
          correct: true
        - text: 'доконаний вид'
          correct: false
        - text: 'обидва види'
          correct: false
        - text: 'жоден з них'
          correct: false
    - question: 'Яке з цих слів ідеально підходить для дієслова прочитав?'
      explanation: 'Слово прочитав означає завершену дію, тому підходить того дня.'
      options:
        - text: 'того дня'
          correct: true
        - text: 'щодня'
          correct: false
        - text: 'постійно'
          correct: false
        - text: 'регулярно'
          correct: false
    - question: 'Чому у фразі я ніколи не їв сала використовується недоконаний вид?'
      explanation: 'Негативні маркери частотності вимагають недоконаного виду.'
      options:
        - text: 'бо описується стан уникнення дії'
          correct: true
        - text: 'бо сало було несмачне'
          correct: false
        - text: 'бо це одноразова подія'
          correct: false
        - text: 'бо дія успішно завершилася'
          correct: false
    - question: 'Який маркер вказує на регулярність процесу?'
      explanation: 'Слово щонеділі вказує на повторення дії кожного тижня.'
      options:
        - text: 'щонеділі'
          correct: true
        - text: 'вперше'
          correct: false
        - text: 'востаннє'
          correct: false
        - text: 'того разу'
          correct: false
    - question: 'Що означає речення Він вирішував проблему дві години?'
      explanation: 'Дієслово вирішував показує процес, але невідомо, чи є результат.'
      options:
        - text: 'процес тривав, результат невідомий'
          correct: true
        - text: 'він успішно вирішив проблему'
          correct: false
        - text: 'проблема більше не існує'
          correct: false
        - text: 'це відбувалося щодня'
          correct: false
    - question: 'Яке слово є тригером доконаного виду в традиційних українських казках?'
      explanation: 'Українські казки часто використовують одного разу для початку сюжету.'
      options:
        - text: 'одного разу'
          correct: true
        - text: 'жили собі'
          correct: false
        - text: 'кожного дня'
          correct: false
        - text: 'завжди'
          correct: false

