- type: error-correction
  title: 'Виправте помилки з видом дієслова'
  instruction: 'Знайдіть дієслово або маркер, які вжиті неправильно.'
  items:
    - sentence: 'Він прочитав цю книгу щодня.'
      error: 'прочитав'
      answer: 'читав'
      options:
        - 'читав'
        - 'прочитає'
        - 'читає'
        - 'прочитати'
      explanation: 'Слово щодня вимагає недоконаного виду (процес/регулярність).'
    - sentence: 'Того разу я довго вирішував цю складну задачу і знайшов правильну відповідь.'
      error: 'вирішував'
      answer: 'вирішив'
      options:
        - 'вирішив'
        - 'вирішує'
        - 'вирішить'
        - 'вирішувати'
      explanation: 'Результативна подія з маркером того разу вимагає доконаного виду.'
    - sentence: 'Я приймав участь у змаганнях завжди.'
      error: 'приймав участь'
      answer: 'брав участь'
      error_type: 'phrase'
      options:
        - 'брав участь'
        - 'приймав участь'
        - 'взяв участь'
        - 'зробив участь'
      explanation: 'В українській мові правильно казати брати участь.'
    - sentence: 'Ми неодноразово заявили про цю проблему вчора.'
      error: 'заявили'
      answer: 'заявляли'
      options:
        - 'заявляли'
        - 'заявляють'
        - 'заявляємо'
        - 'заявити'
      explanation: 'Слово неодноразово означає регулярність і вимагає недоконаного виду.'
    - sentence: 'Одного разу він зазвичай подзвонив мені ввечері.'
      error: 'зазвичай'
      answer: 'несподівано'
      options:
        - 'несподівано'
        - 'часто'
        - 'постійно'
        - 'регулярно'
      explanation: 'Маркер одного разу означає унікальну подію і не сумісний з зазвичай.'
    - sentence: 'Я ніколи не зіграв у цю популярну комп''ютерну гру.'
      error: 'зіграв'
      answer: 'грав'
      options:
        - 'грав'
        - 'граю'
        - 'грати'
        - 'зроблю грати'
      explanation: 'Слово ніколи малює розтягнутий в часі фон і вимагає недоконаного виду.'
    - sentence: 'Вона часто отримувала листи, але того дня вона получала дуже дивний конверт.'
      error: 'получала'
      answer: 'отримала'
      options:
        - 'отримала'
        - 'отримувала'
        - 'отримує'
        - 'отримати'
      explanation: 'Дія результативна (того дня) і слово получати є русизмом.'
    - sentence: 'Щонеділі ми пішли до старої церкви.'
      error: 'пішли'
      answer: 'ходили'
      options:
        - 'ходили'
        - 'йшли'
        - 'підемо'
        - 'ходити'
      explanation: 'Регулярні походи (щонеділі) вимагають недоконаного виду дієслова руху.'

