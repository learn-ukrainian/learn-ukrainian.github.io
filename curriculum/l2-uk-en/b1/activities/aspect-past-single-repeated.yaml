        - 'будує'
        - 'будувати'
      explanation: 'Процес будівництва розтягнутий у часі.'
    - sentence: 'Він нарешті _____ цей прекрасний будинок минулого року.'
      answer: 'побудував'
      options:
        - 'побудував'
        - 'будував'
        - 'будує'
        - 'будувати'
      explanation: 'Досягнення результату.'
