- type: error-correction
  title: 'Редактор: Знайдіть і виправте помилки'
  instruction: 'Відредагуйте текст, виправивши русизми та граматичні помилки з видом дієслова.'
  items:
    - sentence: 'Я ніколи не зрозумів цього складного математичного правила.'
      error: 'зрозумів'
      answer: 'розумів'
      options:
        - 'розумів'
        - 'розумію'
        - 'зрозумію'
        - 'розуміти'
      explanation: 'Після маркера ніколи слід вживати недоконаний вид.'
    - sentence: 'Одного разу ми зазвичай гуляли парком і знайшли цуценя.'
      error: 'зазвичай'
      answer: 'довго'
      options:
        - 'довго'
        - 'часто'
        - 'регулярно'
        - 'постійно'
      explanation: 'Одного разу несумісне із зазвичай. Підходить слово довго для процесу.'
    - sentence: 'Моя бабуся пекла пироги того разу.'
      error: 'пекла'
      answer: 'спекла'
      options:
        - 'спекла'
        - 'пекти'
        - 'пече'
        - 'спече'
      explanation: 'Маркер того разу вказує на разову подію, потрібен доконаний вид.'
    - sentence: 'Ми приймали участь у цьому важливому проєкті роками.'
      error: 'приймали участь'
      answer: 'брали участь'
      error_type: 'phrase'
      options:
        - 'брали участь'
        - 'приймали участь'
        - 'взяли участь'
        - 'зробили участь'
      explanation: 'Вираз приймати участь є русизмом, правильно казати брати участь.'
    - sentence: 'Він получав листи від коханої дуже часто в ті роки.'
      error: 'получав'
      answer: 'отримував'
      options:
        - 'отримував'
        - 'получав'
        - 'отримав'
        - 'отримати'
      explanation: 'Дієслово получати є русизмом. Правильно отримувати.'
    - sentence: 'Ми неодноразово вирішили цю проблему в минулому.'
      error: 'вирішили'
      answer: 'вирішували'
      options:
        - 'вирішували'
        - 'вирішують'
        - 'вирішити'
        - 'вирішимо'
      explanation: 'Маркер неодноразово означає регулярність і вимагає недоконаного виду.'
    - sentence: 'Я вперше слухав цю фантастичну симфонію до самого кінця.'
      error: 'слухав'
      answer: 'послухав'
      options:
