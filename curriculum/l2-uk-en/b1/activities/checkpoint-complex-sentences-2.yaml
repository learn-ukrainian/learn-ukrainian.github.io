- type: quiz
  title: 'Розуміння синтаксичних концепцій'
  instruction: 'Оберіть правильну відповідь для кожного запитання про складні речення.'
  items:
    - question: 'Який сполучник має найбільш емоційне та розмовне забарвлення?'
      options:
        - text: 'через те що'
          correct: false
        - text: 'тому що'
          correct: false
        - text: 'бо'
          correct: true
        - text: 'незважаючи на те що'
          correct: false
      explanation: 'Сполучник бо є дуже коротким і динамічним, ідеальним для розмовної мови.'
    - question: 'Яке слово ми завжди використовуємо для вираження логічного наслідку?'
      options:
        - text: 'тому що'
          correct: false
        - text: 'тому'
          correct: true
        - text: 'хоча'
          correct: false
        - text: 'через те що'
          correct: false
      explanation: 'Слово тому завжди вводить логічний наслідок, а тому що — причину.'
    - question: 'Що відбувається з часом дієслова в українській непрямій мові?'
      options:
        - text: 'Час завжди змінюється на минулий.'
          correct: false
        - text: 'Час змінюється на майбутній.'
          correct: false
        - text: 'Час залишається без змін.'
          correct: true
        - text: 'Завжди використовується інфінітив.'
          correct: false
      explanation: 'В українській мові немає правила узгодження часів, час залишається оригінальним.'
    - question: 'Яку частку використовують для передачі загального питання в непрямій мові?'
      options:
        - text: 'що'
          correct: false
        - text: 'як'
          correct: false
        - text: 'чи'
          correct: true
        - text: 'якщо'
          correct: false
      explanation: 'Частка чи використовується для непрямих питань, на які очікується відповідь так/ні.'
    - question: 'Який сполучник використовується для створення мʼякого прохання в непрямій мові?'
      options:
        - text: 'що'
          correct: false
        - text: 'щоб'
          correct: true
        - text: 'коли'
          correct: false
        - text: 'поки'
          correct: false
      explanation: 'Сполучник щоб у поєднанні з дієсловом у минулому часі передає ввічливе прохання.'
    - question: 'Який вид дієслова зазвичай використовується зі словом поки для опису фону?'
      options:
        - text: 'доконаний'
          correct: false
        - text: 'недоконаний'
          correct: true
        - text: 'обидва види'
          correct: false
        - text: 'інфінітив'
          correct: false
      explanation: 'Слово поки підкреслює тривалість процесу, тому вимагає недоконаного виду.'
    - question: 'Який знак пунктуації обовʼязково ставиться в кінці непрямого питання?'
      options:
        - text: 'знак питання'
          correct: false
        - text: 'крапка'
          correct: true
        - text: 'знак оклику'
          correct: false
        - text: 'кома'
          correct: false
      explanation: 'Складнопідрядне речення з непрямим питанням є розповідним, тому в кінці ставиться крапка.'
    - question: 'Яка синтаксична функція слова отже в тексті?'
      options:
        - text: 'введення причини'
          correct: false
        - text: 'введення часу'
          correct: false
        - text: 'введення логічного висновку'
          correct: true
        - text: 'введення прямої мови'
          correct: false
      explanation: 'Слово отже використовується для підбиття підсумків та формулювання фінальних висновків.'
    - question: 'Який сполучник має найвищу міру формальності?'
      options:
        - text: 'через те що'
          correct: true
        - text: 'бо'
          correct: false
        - text: 'тому що'
          correct: false
        - text: 'дарма що'
          correct: false
      explanation: 'Сполучник через те що є найдовшим і звучить дуже аналітично та офіційно.'
    - question: 'У чому полягає головна функція сполучника хоча?'
      options:
        - text: 'пояснення причини'
          correct: false
        - text: 'вираження дії всупереч перешкоді'
          correct: true
        - text: 'вказівка на час події'
          correct: false
        - text: 'формулювання наслідку'
          correct: false
      explanation: 'Слово хоча вказує на перешкоду, незважаючи на яку дія все ж відбувається.'

- type: match-up
  title: 'Логічні половинки складного речення'
  instruction: 'Зʼєднайте початок речення з його логічним та граматичним завершенням.'
  pairs:
    - left: 'Ми скасували нашу зустріч у центрі,'
      right: 'тому що почалася сильна злива.'
    - left: 'Я дуже багато працював на вихідних,'
      right: 'тому сьогодні почуваюся втомленим.'
    - left: 'Олена чудово розмовляє українською мовою,'
      right: 'дарма що почала її вивчати нещодавно.'
    - left: 'Усі фінансові показники компанії зросли,'
      right: 'незважаючи на те що на ринку була криза.'
    - left: 'Він уважно слухав новий подкаст,'
      right: 'поки готував собі смачну вечерю.'
    - left: 'Клієнт стурбовано запитав менеджера,'
      right: 'чи товар є на складі.'
    - left: 'Учитель суворо наказав студентам'
      right: 'негайно припинити розмови на уроці.'
    - left: 'Вона ввічливо попросила друга,'
      right: 'щоб він купив свіжого хліба.'
    - left: 'Керівник на нараді поцікавився,'
      right: 'коли ми завершимо цей проєкт.'
    - left: 'Хоча надворі було дуже холодно,'
      right: 'ми пішли на довгу прогулянку.'
    - left: 'Птахи відлітають у теплі краї,'
      right: 'коли настає сувора зима.'
    - left: 'Я не пʼю каву ввечері,'
      right: 'бо вона заважає мені спати.'

- type: fill-in
  title: 'Правильні сполучники'
  instruction: 'Оберіть правильний сполучник для кожного речення.'
  items:
    - sentence: 'Він залишився вдома, _____ почувався дуже погано.'
      answer: 'тому що'
      options:
        - 'тому що'
        - 'тому'
        - 'хоча'
        - 'щоб'
      explanation: 'Тут вказується причина дії, тому використовуємо сполучник тому що.'
    - sentence: 'Він почувався дуже погано, _____ залишився вдома.'
      answer: 'тому'
      options:
        - 'тому'
        - 'тому що'
        - 'бо'
        - 'поки'
      explanation: 'Тут вказується наслідок хвороби, тому використовуємо слово тому.'
    - sentence: 'Студент успішно склав складний іспит, _____ мав мало часу на підготовку.'
      answer: 'хоча'
      options:
        - 'хоча'
        - 'тому що'
        - 'коли'
        - 'чи'
      explanation: 'Це допустове речення: успіх всупереч перешкоді.'
    - sentence: 'Я буду працювати в кабінеті, _____ ти готуєш вечерю.'
      answer: 'поки'
      options:
        - 'поки'
        - 'якщо'
        - 'бо'
        - 'отже'
      explanation: 'Дві дії відбуваються паралельно протягом певного часу.'
    - sentence: 'Ми зустрінемося завтра, _____ закінчиться мій робочий день.'
      answer: 'коли'
      options:
        - 'коли'
        - 'поки'
        - 'щоб'
        - 'чи'
      explanation: 'Фіксація конкретного моменту в майбутньому.'
    - sentence: 'Вона запитала, _____ я вже бачив цей новий фільм.'
      answer: 'чи'
      options:
        - 'чи'
        - 'що'
        - 'як'
        - 'щоб'
      explanation: 'Це непряме загальне питання, яке вимагає частки чи.'
    - sentence: 'Директор попросив, _____ ми надіслали звіт до вечора.'
      answer: 'щоб'
      options:
        - 'щоб'
        - 'що'
        - 'коли'
        - 'як'
      explanation: 'Мʼяке прохання в непрямій мові передається через щоб.'
    - sentence: 'Рейс скасували _____ різко погіршилися погодні умови.'
      answer: 'через те що'
      options:
        - 'через те що'
        - 'тому'
        - 'хоча'
        - 'щоб'
      explanation: 'Формальне пояснення причини в офіційному стилі.'
    - sentence: 'Швидко візьми парасольку, _____ на вулиці дощ!'
      answer: 'бо'
      options:
        - 'бо'
        - 'отже'
        - 'хоча'
        - 'поки'
      explanation: 'Коротке та енергійне пояснення причини в розмовній мові.'
    - sentence: 'Проєкт успішний, всі задоволені. _____, ми можемо святкувати.'
      answer: 'Отже'
      options:
        - 'Отже'
        - 'Тому що'
        - 'Хоча'
        - 'Бо'
      explanation: 'Слово отже використовується для підбиття підсумків.'
    - sentence: 'Кава була смачною, _____ ми купили її на вулиці.'
      answer: 'дарма що'
      options:
        - 'дарма що'
        - 'тому що'
        - 'щоб'
        - 'чи'
      explanation: 'Емоційний розмовний допустовий сполучник.'
    - sentence: 'Він сказав, _____ обовʼязково допоможе нам.'
      answer: 'що'
      options:
        - 'що'
        - 'щоб'
        - 'чи'
        - 'як'
      explanation: 'Передача звичайного твердження в непрямій мові.'

- type: true-false
  title: 'Правила українського синтаксису'
  instruction: 'Визначте, чи є ці твердження про граматику правильними.'
  items:
    - statement: 'В українській мові час дієслова обовʼязково змінюється на минулий при перетворенні прямої мови на непряму.'
      correct: false
      explanation: 'В українській мові немає жорсткого узгодження часів, час залишається оригінальним.'
    - statement: 'Підрядна частина зі сполучником хоча завжди відокремлюється комою від головної.'
      correct: true
      explanation: 'Це залізне правило пунктуації: допустові частини завжди виділяються комою.'
    - statement: 'Сполучник тому що завжди вводить причину події.'
      correct: true
      explanation: 'Так, тому що пояснює причину (чому?), а тому вводить наслідок (і що з того?).'
    - statement: 'Кома завжди ставиться всередині сполучника тому що (між словами тому і що).'
      correct: false
      explanation: 'Кома зазвичай ставиться ПЕРЕД усім складеним сполучником, а не розриває його.'
    - statement: 'Непряме питання завжди закінчується знаком питання.'
      correct: false
      explanation: 'Складнопідрядне речення з непрямим питанням є розповідним і закінчується крапкою.'
    - statement: 'Сполучник бо найчастіше використовується в сухих офіційних документах.'
      correct: false
      explanation: 'Сполучник бо є розмовним та емоційним; для документів краще через те що.'
    - statement: 'Частка чи використовується для переказу питань, на які очікується відповідь так або ні.'
      correct: true
      explanation: 'Це правило трансформації загальних питань у непряму мову.'
    - statement: 'Для передачі жорсткого наказу можна використовувати слово наказав та інфінітив без сполучників.'
      correct: true
      explanation: 'Так, наприклад: офіцер наказав стояти.'
    - statement: 'При переказі чужих слів займенник першої особи (я) часто змінюється на займенник третьої особи (він, вона).'
      correct: true
      explanation: 'Це необхідно для збереження правильної логіки та перспективи в непрямій мові.'
    - statement: 'Слово поки завжди вказує на точковий момент у часі.'
      correct: false
      explanation: 'Слово поки вказує на тривалий фоновий процес, а не на точковий момент.'
    - statement: 'Сполучник дарма що має формальне і дипломатичне забарвлення.'
      correct: false
      explanation: 'Дарма що є емоційним і розмовним, а не дипломатичним.'
    - statement: 'Вставне слово отже завжди виділяється комою на початку речення.'
      correct: true
      explanation: 'Отже вимагає відокремлення комою, оскільки підсумовує думку.'

