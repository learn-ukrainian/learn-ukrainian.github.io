- type: error-correction
  title: 'Виправлення логічних та граматичних помилок'
  instruction: 'Знайдіть та виправте одну помилку в кожному реченні.'
  items:
    - sentence: 'Я дуже захворів вранці, тому що не пішов на роботу.'
      error: 'тому що'
      answer: 'тому'
      options:
        - 'тому'
        - 'бо'
        - 'хоча'
        - 'через те що'
      explanation: 'Тут іде мова про наслідок (не пішов на роботу), а не про причину хвороби.'
    - sentence: 'Директор вчора сказав, що я хочу терміново бачити цей звіт.'
      error: 'я'
      answer: 'він'
      options:
        - 'він'
        - 'ми'
        - 'вони'
        - 'ти'
      explanation: 'При переказі чужих слів у непрямій мові займенник я змінюється на він/вона.'
    - sentence: 'Офіцер суворо наказав усім щоб стояти на своїх місцях.'
      error: 'щоб стояти'
      answer: 'стояти'
      error_type: 'phrase'
      options:
        - 'стояти'
        - 'стоять'
        - 'стояли'
        - 'стоятимуть'
      explanation: 'Після слова наказати використовується прямий інфінітив без сполучника щоб.'
    - sentence: 'Менеджер запитав, де лежать важливі документи?'
      error: 'документи?'
      answer: 'документи.'
      error_type: 'phrase'
      options:
        - 'документи.'
        - 'документах?'
        - 'документом?'
        - 'документи!'
      explanation: 'Складнопідрядне речення з непрямим питанням є розповідним і закінчується крапкою.'
    - sentence: 'Вона запитала чоловіка, що він уже читав цю нову книгу.'
      error: 'що'
      answer: 'чи'
      options:
        - 'чи'
        - 'як'
        - 'щоб'
        - 'де'
      explanation: 'Для передачі загального питання (так/ні) використовується частка чи.'
    - sentence: 'Ми гуляли в парку, незважаючи на сильний дощ іде.'
      error: 'незважаючи на'
      answer: 'хоча'
      error_type: 'phrase'
      options:
        - 'хоча'
        - 'бо'
        - 'тому'
        - 'чи'
      explanation: 'Якщо далі йде повноцінне підрядне речення з дієсловом (іде), потрібен сполучник хоча.'
    - sentence: 'Я буду працювати, коли ти будеш спати.'
      error: 'коли'
      answer: 'поки'
      options:
        - 'поки'
        - 'якщо'
        - 'бо'
        - 'чи'
      explanation: 'Для позначення двох тривалих паралельних процесів використовується слово поки.'
    - sentence: 'Вечірній рейс до Лондона скасували, дарма що погодні умови погіршилися.'
      error: 'дарма що'
      answer: 'через те що'
      error_type: 'phrase'
      options:
        - 'через те що'
        - 'тому'
        - 'хоча'
        - 'щоб'
      explanation: 'Погіршення погоди — це причина скасування, а не допустова перешкода.'

- type: mark-the-words
  title: 'Пошук логічних сполучників'
  instruction: 'Знайдіть усі сполучники та слова-маркери, які організують логічні звʼязки у тексті.'
  text: 'Ми скасували пікнік, тому що раптово пішов сильний дощ. Хоча ми були дуже засмучені, ми все одно вирішили цікаво провести час вдома. Поки на вулиці довго вирувала страшна злива, ми весело грали в настільні ігри. Мій брат навіть запитав, чи ми будемо грати завтра. Ми дуже чудово провели час, отже наш спільний вихідний зовсім не був зіпсований, бо ми знайшли хорошу альтернативу.'
  answers:
    - 'тому що'
    - 'Хоча'
    - 'Поки'
    - 'чи'
    - 'отже'
    - 'бо'

- type: select
  title: 'Мульти-вибір: логіка та синтаксис'
  instruction: 'Уважно прочитайте питання і виберіть УСІ правильні варіанти відповідей.'
  items:
    - question: 'Які з цих сполучників вводять допустове підрядне речення (дію всупереч перешкодам)?'
