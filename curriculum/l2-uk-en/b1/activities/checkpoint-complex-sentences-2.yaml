- type: translate
  title: 'Переклад складнопідрядних конструкцій'
  instruction: 'Оберіть правильний український переклад для кожного англійського речення.'
  items:
    - source: 'I stayed at home because I got very sick.'
      options:
        - text: 'Я залишився вдома, тому що дуже захворів.'
          correct: true
        - text: 'Я залишився вдома, тому дуже захворів.'
          correct: false
        - text: 'Я залишився вдома, хоча дуже захворів.'
          correct: false
      explanation: 'Because перекладається як тому що.'
    - source: 'I got very sick, therefore I stayed at home.'
      options:
        - text: 'Я дуже захворів, тому що залишився вдома.'
          correct: false
        - text: 'Я дуже захворів, тому залишився вдома.'
          correct: true
        - text: 'Я дуже захворів, бо залишився вдома.'
          correct: false
      explanation: 'Therefore перекладається як тому (логічний наслідок).'
    - source: 'Even though it was raining, we went for a walk.'
      options:
        - text: 'Тому що йшов дощ, ми пішли гуляти.'
          correct: false
        - text: 'Хоча йшов дощ, ми пішли гуляти.'
          correct: true
        - text: 'Поки йшов дощ, ми пішли гуляти.'
          correct: false
      explanation: 'Even though передає допустовий звʼязок (хоча).'
    - source: 'He asked whether I had read this book.'
      options:
        - text: 'Він запитав, що я читав цю книгу.'
          correct: false
        - text: 'Він запитав, чи я читав цю книгу.'
          correct: true
        - text: 'Він запитав, як я читав цю книгу.'
          correct: false
      explanation: 'Whether у непрямих питаннях перекладається часткою чи.'
    - source: 'She asked me to close the window.'
      options:
        - text: 'Вона попросила, щоб я закрив вікно.'
          correct: true
        - text: 'Вона попросила, що я закрив вікно.'
          correct: false
        - text: 'Вона попросила, чи я закрив вікно.'
          correct: false
      explanation: 'Мʼяке прохання в непрямій мові часто передається через щоб + минулий час.'
    - source: 'The officer ordered to stand still.'
      options:
        - text: 'Офіцер наказав, щоб стояти на місці.'
          correct: false
        - text: 'Офіцер наказав стояти на місці.'
          correct: true
        - text: 'Офіцер наказав, чи стояти на місці.'
          correct: false
      explanation: 'Жорсткий наказ передається без сполучників за допомогою інфінітива.'
    - source: 'I will read while you cook.'
      options:
        - text: 'Я буду читати, коли ти готуєш.'
          correct: false
        - text: 'Я буду читати, поки ти готуєш.'
          correct: true
        - text: 'Я буду читати, хоча ти готуєш.'
          correct: false
      explanation: 'While для фонового тривалого процесу перекладається як поки.'
    - source: 'We have finished the project. Thus, we can relax.'
      options:
        - text: 'Ми завершили проєкт. Тому що ми можемо відпочити.'
          correct: false
        - text: 'Ми завершили проєкт. Отже, ми можемо відпочити.'
          correct: true
        - text: 'Ми завершили проєкт. Хоча ми можемо відпочити.'
          correct: false
      explanation: 'Thus або consequently перекладається вступним словом отже.'