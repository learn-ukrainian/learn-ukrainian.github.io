version: '1.0'
module: b1-baseline-future-aspect
level: b1
inline:
- id: quiz-aspect-identification
  type: quiz
  instruction: Визначте вид і час виділеного дієслова.
  items:
  - question: У суботу я **буду читати** цікаву книгу.
    options:
    - доконаний вид, майбутній час
    - недоконаний вид, майбутній час
    - недоконаний вид, теперішній час
    - доконаний вид, минулий час
    correct: 1
  - question: Завтра я **прочитаю** цей важливий розділ.
    options:
    - недоконаний вид, теперішній час
    - доконаний вид, минулий час
    - доконаний вид, майбутній час
    - недоконаний вид, майбутній час
    correct: 2
  - question: Сьогодні ввечері я **напишу** гарного листа.
    options:
    - доконаний вид, майбутній час
    - недоконаний вид, майбутній час
    - недоконаний вид, теперішній час
    - доконаний вид, минулий час
    correct: 0
  - question: Вона **малюватиме** нову афішу до півночі.
    options:
    - недоконаний вид, теперішній час
    - доконаний вид, майбутній час
    - доконаний вид, минулий час
    - недоконаний вид, майбутній час
    correct: 3
  - question: Ми **зробимо** це складне завдання завтра.
    options:
    - недоконаний вид, майбутній час
    - доконаний вид, майбутній час
    - доконаний вид, минулий час
    - недоконаний вид, теперішній час
    correct: 1
  - question: Студенти **обговорюють** новий проєкт прямо зараз.
    options:
    - доконаний вид, майбутній час
    - недоконаний вид, майбутній час
    - недоконаний вид, теперішній час
    - доконаний вид, минулий час
    correct: 2
  - question: Вони **сказали** правду ще вчора.
    options:
    - доконаний вид, минулий час
    - недоконаний вид, минулий час
    - доконаний вид, майбутній час
    - недоконаний вид, теперішній час
    correct: 0
  - question: Ти дуже добре **відповідаєш** на ці запитання.
    options:
    - доконаний вид, минулий час
    - недоконаний вид, майбутній час
    - доконаний вид, майбутній час
    - недоконаний вид, теперішній час
    correct: 3
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте дієслова недоконаного виду з їхніми парами доконаного виду.
  pairs:
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: робити
    right: зробити
  - left: малювати
    right: намалювати
  - left: відповідати
    right: відповісти
  - left: записувати
    right: записати
  - left: говорити
    right: сказати
  - left: брати
    right: взяти
- id: group-sort-future-forms
  type: group-sort
  instruction: Розподіліть дієслова за формою майбутнього часу.
  groups:
  - label: Проста форма (доконаний вид)
    items:
    - напишу
    - прочитаємо
    - зробить
    - попрошу
  - label: Складна форма (недоконаний вид)
    items:
    - читатиму
    - працюватимеш
    - малюватимемо
  - label: Складена форма (недоконаний вид)
    items:
    - буду писати
    - будете жити
    - будуть ходити
- id: fill-in-future-choice
  type: fill-in
  instruction: 'Вставте правильну форму дієслова в майбутньому часі (зверніть увагу
    на вид: тривала чи завершена дія).'
  items:
  - sentence: Я _____ цей підручник до п'ятниці.
    answer: прочитаю
    options:
    - буду читати
    - читатиму
    - прочитаю
  - sentence: Ми _____ кошти на концерт цілий тиждень.
    answer: будемо збирати
    options:
    - зберемо
    - будемо збирати
    - збереш
  - sentence: Завтра вранці я обов'язково _____ тобі цю книгу.
    answer: принесу
    options:
    - буду приносити
    - приноситиму
    - принесу
  - sentence: Він _____ над цим проєктом багато місяців.
    answer: працюватиме
    options:
    - попрацює
    - зробить
    - працюватиме
  - sentence: Ти _____ мені красиву афішу сьогодні ввечері?
    answer: намалюєш
    options:
    - будеш малювати
    - малюватимеш
    - намалюєш
  - sentence: Вони _____ тут довго і щасливо.
    answer: будуть жити
    options:
    - поживуть
    - будуть жити
    - проживуть
  - sentence: Я _____ на твоє питання трохи пізніше.
    answer: відповім
    options:
    - буду відповідати
    - відповідатиму
    - відповім
  - sentence: У суботу вранці студент _____ новий підручник з історії.
    answer: читатиме
    options:
    - прочитає
    - прочитають
    - читатиме
workbook:
- type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - я
    - завтра
    - книгу
    - прочитаю
    - цю
    correct_order:
    - завтра
    - я
    - прочитаю
    - цю
    - книгу
    hint: Tomorrow I will finish reading this book.
  - words:
    - будемо
    - проєкт
    - ми
    - новий
    - обговорювати
    correct_order:
    - ми
    - будемо
    - обговорювати
    - новий
    - проєкт
    hint: We will be discussing the new project.
  - words:
    - ти
    - мені
    - допомагатимеш
    - завтра?
    correct_order:
    - ти
    - допомагатимеш
    - мені
    - завтра?
    hint: Will you be helping me tomorrow?
  - words:
    - зустріч
    - вони
    - обов'язково
    - проведуть
    correct_order:
    - вони
    - обов'язково
    - проведуть
    - зустріч
    hint: They will definitely hold the meeting.
  - words:
    - напишу
    - сьогодні
    - звіт
    - ввечері
    - я
    correct_order:
    - сьогодні
    - ввечері
    - я
    - напишу
    - звіт
    hint: Tonight I will finish writing the report.
  - words:
    - працюватиму
    - весь
    - я
    - день
    correct_order:
    - я
    - працюватиму
    - весь
    - день
    hint: I will be working all day.
- type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: I will read a book tonight.
    options:
    - text: Я буду читати книгу сьогодні ввечері.
      correct: true
    - text: Я прочитаю книгу сьогодні ввечері.
      correct: false
  - source: I will finish reading a book tonight.
    options:
    - text: Я прочитаю книгу сьогодні ввечері.
      correct: true
    - text: Я буду читати книгу сьогодні ввечері.
      correct: false
  - source: We will write a report.
    options:
    - text: Ми напишемо звіт.
      correct: true
    - text: Ми будемо писати звіт.
      correct: false
  - source: He will be working all day tomorrow.
    options:
    - text: Він працюватиме весь день завтра.
      correct: true
    - text: Він попрацює весь день завтра.
      correct: false
  - source: Will you give me this document?
    options:
    - text: Ти даси мені цей документ?
      correct: true
    - text: Ти будеш давати мені цей документ?
      correct: false
  - source: They will live in Kyiv.
    options:
    - text: Вони житимуть у Києві.
      correct: true
    - text: Вони поживуть у Києві.
      correct: false
- type: essay-response
  prompt: Напишіть 5-7 речень про ваші плани на наступний тиждень. Використайте всі
    три форми майбутнього часу (просту, складну та складену) та обидва види дієслова.
  min_words: 50
  model_answer: Наступного тижня я буду багато працювати. У понеділок я напишу важливий
    звіт для керівника. У вівторок я читатиму нову книгу з історії. У середу ми з
    друзями підемо в кіно, і я куплю нам квитки. Я сподіваюся, що ми подивимося цікавий
    фільм. На вихідних я буду відпочивати і спатиму до обіду.
