version: '1.0'
module: b1-baseline-future-aspect
level: b1
workbook:
- type: quiz
  instruction: Визначте вид дієслова у реченні.
  items:
  - question: Він довго **писав** листа.
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 1
  - question: Завтра я **прочитаю** цю книгу.
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 0
  - question: Ми **будемо працювати** весь день.
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 1
  - question: Вона **відчинила** вікно.
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 0
  - question: Щовечора я **дивлюся** новини.
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 1
  - question: Вони **знайдуть** правильне рішення.
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 0
  - question: Ти **робитимеш** домашнє завдання?
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 1
  - question: Я обов'язково **візьму** твій телефон.
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 0
- type: match-up
  instruction: З'єднайте дієслова недоконаного виду з їхніми парами доконаного виду.
  pairs:
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: робити
    right: зробити
  - left: відповідати
    right: відповісти
  - left: показувати
    right: показати
  - left: брати
    right: взяти
  - left: говорити
    right: сказати
  - left: шукати
    right: знайти
- type: fill-in
  instruction: Оберіть правильну форму дієслова для кожного речення.
  items:
  - sentence: Завтра я обов'язково ____ цю статтю до кінця.
    answer: прочитаю
    options:
    - читав
    - читатиму
    - буду читати
    - прочитаю
  - sentence: Весь наступний тиждень ми ____ до іспиту.
    answer: будемо готуватися
    options:
    - готуємося
    - підготуємося
    - будемо готуватися
    - підготуються
  - sentence: Я обіцяю, що ____ тобі всю правду.
    answer: скажу
    options:
    - казав
    - говоритиму
    - буду говорити
    - скажу
  - sentence: Вони ____ в Києві багато років.
    answer: житимуть
    options:
    - жили
    - поживуть
    - житимуть
    - поживемо
  - sentence: Коли ти ____ це завдання, зателефонуй мені.
    answer: зробиш
    options:
    - робив
    - робитимеш
    - будеш робити
    - зробиш
  - sentence: Вона ____ нові слова щовечора, щоб краще їх запам'ятати.
    answer: буде вчити
    options:
    - вчить
    - вивчить
    - буде вчити
    - вивчать
  - sentence: Ми неодмінно ____ цікаве рішення для цієї проблеми.
    answer: знайдемо
    options:
    - шукаємо
    - шукатимемо
    - будемо шукати
    - знайдемо
  - sentence: Я із задоволенням ____ ескізи весь сьогоднішній вечір.
    answer: малюватиму
    options:
    - малював
    - намалюю
    - малюватиму
    - намалюють
- type: group-sort
  instruction: Розподіліть дієслова за формами майбутнього часу.
  groups:
  - label: Проста форма (доконаний вид)
    items:
    - напишу
    - зробимо
    - побачить
    - скажете
  - label: Складна форма (недоконаний вид)
    items:
    - працюватиму
    - читатимеш
    - житимуть
  - label: Складена форма (недоконаний вид)
    items:
    - буду знати
    - буде слухати
    - будуть дивитися
- type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в реченні.
  items:
  - sentence: Я зараз прочитаю дуже цікаву книгу.
    error: прочитаю
    correction: читаю
    error_type: word
    options:
    - читаю
    - читав
    - читатиму
    - буду читати
    explanation: Дія відбувається прямо зараз, тому використовуємо недоконаний вид
      у теперішньому часі.
  - sentence: Завтра я буду напишу листа другові.
    error: напишу
    correction: писати
    error_type: word
    options:
    - писати
    - писав
    - написати
    - пишу
    explanation: Після дієслова «бути» потрібно використовувати інфінітив недоконаного
      виду.
  - sentence: Ми будемо працюватимемо весь вечір.
    error: працюватимемо
    correction: працювати
    error_type: word
    options:
    - працювати
    - працюємо
    - попрацюємо
    - працювали
    explanation: 'Складена форма утворюється так: допоміжне дієслово «бути» + інфінітив
      (будемо працювати). Не змішуйте дві різні форми.'
  - sentence: Вона напише звіт весь наступний тиждень.
    error: напише
    correction: писатиме
    error_type: word
    options:
    - писатиме
    - написала
    - напишуть
    - пише
    explanation: Фраза «весь тиждень» вказує на тривалу дію (процес), тому нам потрібен
      недоконаний вид (писатиме або буде писати).
  - sentence: Вчора він дуже довго прочитав цю статтю.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - читає
    - буде читати
    - читатиме
    explanation: Слово «довго» вказує на тривалий процес у минулому, тому потрібен
      недоконаний вид (читав).
  - sentence: Я буду взяти з собою теплий одяг.
    error: взяти
    correction: брати
    error_type: word
    options:
    - брати
    - беру
    - візьму
    - брав
    explanation: Допоміжне дієслово «бути» поєднується тільки з інфінітивом недоконаного
      виду (буду брати).
- type: essay-response
  prompt: Напишіть 5-7 речень про ваші плани на наступний тиждень. Використайте всі
    три форми майбутнього часу та дієслова обох видів (доконаного і недоконаного).
  min_words: 50
  model_answer: Наступного тижня я буду багато працювати, бо маю дуже важливий проєкт.
    У понеділок я обов'язково напишу довгий звіт для свого керівника. Увечері я відпочиватиму
    вдома і читатиму нову цікаву книгу. У середу ми з друзями підемо в кіно і подивимося
    комедію. Я думаю, що ми будемо довго обговорювати цей фільм після сеансу. На вихідних
    я неодмінно зроблю генеральне прибирання у квартирі. Я щиро сподіваюся, що встигну
    успішно виконати всі свої плани.
  evaluation_criteria:
  - Використано просту форму майбутнього часу (доконаний вид).
  - Використано складну синтетичну форму майбутнього часу (недоконаний вид).
  - Використано складену аналітичну форму майбутнього часу (бути + інфінітив).
  - Текст містить мінімум 50 слів.
