version: '1.0'
module: b1-baseline-future-aspect
level: b1
inline:
- id: quiz-aspect-identification
  type: quiz
  instruction: 'Оберіть правильний вид дієслова для кожного речення: доконаний чи
    недоконаний?'
  items:
  - question: Завтра я буду читати новий роман. Який це вид?
    options:
    - Недоконаний вид
    - Доконаний вид
    - Двовидовий
    - Одновидовий
    correct: 0
  - question: Ми прочитаємо цю статтю до обіду. Який це вид?
    options:
    - Недоконаний вид
    - Доконаний вид
    - Двовидовий
    - Одновидовий
    correct: 1
  - question: Вона малюватиме картину весь день. Який це вид?
    options:
    - Недоконаний вид
    - Доконаний вид
    - Двовидовий
    - Одновидовий
    correct: 0
  - question: Художник намалює портрет до виставки. Який це вид?
    options:
    - Недоконаний вид
    - Доконаний вид
    - Двовидовий
    - Одновидовий
    correct: 1
  - question: Ми будемо обговорювати новий проект. Який вид має дієслово 'обговорювати'?
    options:
    - Недоконаний вид
    - Доконаний вид
    - Двовидовий
    - Одновидовий
    correct: 0
  - question: Ми обговоримо цей проект завтра. Який вид має дієслово 'обговорити'?
    options:
    - Недоконаний вид
    - Доконаний вид
    - Двовидовий
    - Одновидовий
    correct: 1
  - question: 'Я сподіваюся, що ми встигнемо. Дієслово ''сподіватися'' — це:'
    options:
    - Недоконаний вид
    - Доконаний вид
    - Одновидовий (тільки НДВ)
    - Двовидовий
    correct: 2
  - question: 'Нарешті він схаменувся. Дієслово ''схаменутися'' — це:'
    options:
    - Недоконаний вид
    - Одновидовий (тільки ДВ)
    - Двовидовий
    - Одновидовий (тільки НДВ)
    correct: 1
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте дієслова недоконаного виду з їхніми парами доконаного виду.
  pairs:
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: робити
    right: зробити
  - left: малювати
    right: намалювати
  - left: їсти
    right: поїсти
  - left: відповідати
    right: відповісти
  - left: говорити
    right: сказати
  - left: брати
    right: взяти
- id: group-sort-future-forms
  type: group-sort
  instruction: 'Розподіліть дієслова за формами майбутнього часу: проста, складна
    або складена.'
  groups:
  - label: Проста форма (доконаний вид)
    items:
    - напишу
    - прочитаємо
    - зробить
    - принесу
  - label: Складна форма (недоконаний вид)
    items:
    - писатиму
    - читатимемо
    - працюватимете
  - label: Складена форма (недоконаний вид)
    items:
    - буду писати
    - будемо читати
    - буде працювати
- id: fill-in-future-choice
  type: fill-in
  instruction: 'Вставте правильну форму дієслова, звертаючи увагу на контекст: тривала
    дія чи завершена дія?'
  items:
  - sentence: Завтра я цілий день ____ статтю.
    answer: писатиму
    options:
    - напишу
    - писатиму
    - напишемо
    - написав
  - sentence: Я обов'язково ____ цю статтю до вечора.
    answer: напишу
    options:
    - писатиму
    - буду писати
    - напишу
    - писав
  - sentence: Ми ____ до іспиту кожен вечір.
    answer: будемо готуватися
    options:
    - підготуємося
    - будемо готуватися
    - підготуємо
    - готуватимуся
  - sentence: Я сподіваюся, що ми ____ до іспиту і здамо його.
    answer: підготуємося
    options:
    - підготуємося
    - будемо готуватися
    - готуватимемося
    - підготуюся
  - sentence: Вона ____ цей светр щодня.
    answer: носитиме
    options:
    - принесе
    - носитиме
    - принесемо
    - носитимуть
  - sentence: Я ____ тобі цю книгу завтра, обіцяю.
    answer: принесу
    options:
    - носитиму
    - буду носити
    - принесу
    - принесеш
  - sentence: Художник ____ портрет кілька місяців.
    answer: буде малювати
    options:
    - намалює
    - буде малювати
    - намалюєш
    - намалюють
  - sentence: Коли ти прийдеш, я вже ____ вечерю.
    answer: зроблю
    options:
    - буду робити
    - зроблю
    - робитиму
    - зробимо
workbook:
- type: unjumble
  instruction: Складіть правильне речення зі слів. Зверніть увагу на форми майбутнього
    часу.
  items:
  - words:
    - прочитаю
    - до
    - Я
    - статтю
    - цю
    - вечора.
    correct_order:
    - Я
    - прочитаю
    - цю
    - статтю
    - до
    - вечора.
  - words:
    - тест
    - Ми
    - години.
    - писатимемо
    - дві
    correct_order:
    - Ми
    - писатимемо
    - тест
    - дві
    - години.
  - words:
    - вони
    - Коли
    - каву?
    - принесуть
    - нам
    correct_order:
    - Коли
    - вони
    - принесуть
    - нам
    - каву?
  - words:
    - щодня.
    - светр
    - цей
    - носитиме
    - Вона
    correct_order:
    - Вона
    - носитиме
    - цей
    - светр
    - щодня.
  - words:
    - обговорювати
    - тиждень.
    - проект
    - будемо
    - цілий
    - Ми
    correct_order:
    - Ми
    - будемо
    - обговорювати
    - проект
    - цілий
    - тиждень.
  - words:
    - ти
    - на
    - відповіси
    - всі
    - запитання?
    - Коли
    correct_order:
    - Коли
    - ти
    - відповіси
    - на
    - всі
    - запитання?
- type: translate
  instruction: Оберіть правильний переклад речення на українську мову.
  items:
  - source: I will write a letter to my friend tonight (focus on finishing).
    options:
    - text: Я напишу листа своєму другу сьогодні ввечері.
      correct: true
    - text: Я буду писати листа своєму другу сьогодні ввечері.
      correct: false
    - text: Я писатиму листа своєму другу сьогодні ввечері.
      correct: false
    - text: Я написав листа своєму другу сьогодні ввечері.
      correct: false
  - source: We will be discussing this project all day.
    options:
    - text: Ми будемо обговорювати цей проект цілий день.
      correct: true
    - text: Ми обговоримо цей проект цілий день.
      correct: false
    - text: Ми обговорювати цей проект цілий день.
      correct: false
    - text: Ми обговорили цей проект цілий день.
      correct: false
  - source: She will answer all the questions tomorrow.
    options:
    - text: Вона відповість на всі запитання завтра.
      correct: true
    - text: Вона відповідатиме на всі запитання завтра.
      correct: false
    - text: Вона буде відповідати на всі запитання завтра.
      correct: false
    - text: Вона відповіла на всі запитання завтра.
      correct: false
  - source: They will be reading for two hours.
    options:
    - text: Вони читатимуть дві години.
      correct: true
    - text: Вони прочитають дві години.
      correct: false
    - text: Вони читатимуть дві годин.
      correct: false
    - text: Вони читали дві години.
      correct: false
  - source: When will you give us the results?
    options:
    - text: Коли ви дасте нам результати?
      correct: true
    - text: Коли ви даватимете нам результати?
      correct: false
    - text: Коли ви будете давати нам результати?
      correct: false
    - text: Коли ви дали нам результати?
      correct: false
  - source: I will arrive on time.
    options:
    - text: Я прийду вчасно.
      correct: true
    - text: Я буду приходити вчасно.
      correct: false
    - text: Я приходитиму вчасно.
      correct: false
    - text: Я прийшов вчасно.
      correct: false
- type: essay-response
  prompt: 'Напишіть 5-7 речень про ваші плани на наступний тиждень. Використайте всі
    три форми майбутнього часу: просту (доконаний вид), складну та складену (недоконаний
    вид).'
  min_words: 50
  model_answer: Наступного тижня я багато працюватиму. Кожного ранку я буду пити каву
    і читатиму новини. У середу я напишу важливий звіт для роботи. Я сподіваюся, що
    я зроблю його швидко. У п'ятницю ввечері ми з друзями підемо в кіно. Я куплю квитки
    заздалегідь. У суботу я буду відпочивати цілий день.
  evaluation_criteria:
  - Використано просту форму майбутнього часу (наприклад, напишу, зроблю).
  - Використано складну форму майбутнього часу (наприклад, працюватиму, читатиму).
  - Використано складену форму майбутнього часу (наприклад, буду пити, буду відпочивати).
  - Текст має обсяг 5-7 речень і стосується планів на майбутній тиждень.
