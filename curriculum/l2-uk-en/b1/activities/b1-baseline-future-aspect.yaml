version: '1.0'
module: b1-baseline-future-aspect
level: b1
inline:
- id: quiz-aspect-identification
  type: quiz
  instruction: Оберіть правильний вид дієслова для кожної ситуації або слова.
  items:
  - question: Дієслово **написати** — це...
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 0
  - question: Дієслово **читати** — це...
    options:
    - недоконаний вид
    - доконаний вид
    - двовидовий
    - одновидовий
    correct: 0
  - question: Дієслово, яке позначає **тривалу дію** або процес — це...
    options:
    - недоконаний вид
    - доконаний вид
    - двовидовий
    - одновидовий
    correct: 0
  - question: Дієслово, яке позначає **завершену дію** або результат — це...
    options:
    - доконаний вид
    - недоконаний вид
    - двовидовий
    - одновидовий
    correct: 0
  - question: Дієслово **атакувати** — це...
    options:
    - двовидовий
    - доконаний вид
    - недоконаний вид
    - одновидовий
    correct: 0
  - question: Дієслово **сподіватися** — це...
    options:
    - одновидовий (тільки недоконаний)
    - доконаний вид
    - двовидовий
    - одновидовий (тільки доконаний)
    correct: 0
  - question: Яке питання ми ставимо до дієслова **доконаного виду**?
    options:
    - Що зробити?
    - Що робити?
    - Що робить?
    - Що робив?
    correct: 0
  - question: Яке питання ми ставимо до дієслова **недоконаного виду**?
    options:
    - Що робити?
    - Що зробити?
    - Що зробить?
    - Що зробив?
    correct: 0
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте дієслово недоконаного виду з його доконаною видовою парою.
  pairs:
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: робити
    right: зробити
  - left: малювати
    right: намалювати
  - left: їсти
    right: поїсти
  - left: відповідати
    right: відповісти
  - left: говорити
    right: сказати
  - left: брати
    right: взяти
- id: fill-in-simple-future
  type: fill-in
  instruction: Вставте правильну просту форму майбутнього часу (дієслова доконаного
    виду).
  items:
  - sentence: Завтра я обов'язково ____ (написати) цей електронний лист.
    answer: напишу
    options:
    - напишу
    - напишеш
    - напише
  - sentence: Ти ____ (зробити) домашнє завдання до вечора?
    answer: зробиш
    options:
    - зробиш
    - зробить
    - зроблю
  - sentence: Ми ____ (купити) квитки на поїзд до Харкова.
    answer: купимо
    options:
    - купимо
    - куплять
    - куплю
  - sentence: Вони ____ (виграти) цей важливий матч.
    answer: виграють
    options:
    - виграють
    - виграє
    - виграємо
  - sentence: Я обов'язково ____ (прийти) вчасно на зустріч.
    answer: прийду
    options:
    - прийду
    - прийдеш
    - прийде
  - sentence: Він ____ (сказати) нам усю правду.
    answer: скаже
    options:
    - скаже
    - скажу
    - скажеш
  - sentence: Я ____ (попросити) допомоги у свого друга.
    answer: попрошу
    options:
    - попрошу
    - попросиш
    - попросять
  - sentence: Ви ____ (дати) мені цю книгу завтра?
    answer: дасте
    options:
    - дасте
    - дамо
    - дадуть
- id: group-sort-future-forms
  type: group-sort
  instruction: Розподіліть дієслова за формою майбутнього часу.
  groups:
  - label: Проста форма (доконаний вид)
    items:
    - напишу
    - скажемо
    - прочитає
    - зроблять
  - label: Складна форма (недоконаний вид)
    items:
    - читатиму
    - працюватиме
    - житимемо
  - label: Складена форма (недоконаний вид)
    items:
    - буду читати
    - буде працювати
    - будуть жити
- id: fill-in-future-choice
  type: fill-in
  instruction: Оберіть правильну форму майбутнього часу, спираючись на контекст (завершена
    чи тривала дія).
  items:
  - sentence: Завтра вранці я ____ новий підручник з історії, це займе весь ранок.
    answer: буду читати
    options:
    - буду читати
    - прочитаю
    - прочитав
  - sentence: Я обіцяю, що до дванадцятої години дня я обов'язково ____ перший розділ.
    answer: прочитаю
    options:
    - прочитаю
    - буду читати
    - читав
  - sentence: Хто організує нашу подорож? Я ____ квитки на поїзд.
    answer: куплю
    options:
    - купуватиму
    - куплю
    - буду купувати
  - sentence: Наступного року я щотижня ____ на заняття в університет.
    answer: ходитиму
    options:
    - піду
    - ходитиму
    - прийду
  - sentence: Чудово! Тоді я також обов'язково ____ завтра на перший урок.
    answer: прийду
    options:
    - буду приходити
    - приходитиму
    - прийду
  - sentence: Ми ____ кошти для університету цілий тиждень.
    answer: будемо збирати
    options:
    - зберемо
    - будемо збирати
    - зібрали
  - sentence: Я досить добре малюю, тому швидко ____ велику афішу.
    answer: намалюю
    options:
    - намалюю
    - буду малювати
    - малюватиму
  - sentence: Взимку я завжди ____ теплу шапку, бо на вулиці холодно.
    answer: носитиму
    options:
    - поношу
    - принесу
    - носитиму
- id: error-correction-aspect-tense
  type: error-correction
  instruction: Знайдіть і виправте помилку у використанні виду або часу дієслова.
  items:
  - sentence: Я зараз прочитаю дуже цікаву книгу.
    error: прочитаю
    correction: читаю
    error_type: word
    options:
    - читаю
    - читав
    - прочитав
    explanation: Слово «зараз» вказує на теперішній час і процес, тому потрібен недоконаний
      вид у теперішньому часі.
  - sentence: Завтра я будуся повертати додому пізно.
    error: будуся повертати
    correction: буду повертатися
    error_type: word
    options:
    - буду повертатися
    - повернуся буду
    - повертатиму
    explanation: Зворотна частка «-ся» ніколи не ставиться після допоміжного дієслова
      «бути», вона завжди залишається з інфінітивом.
  - sentence: Ми напишемо ці звіти кожного дня наступного місяця.
    error: напишемо
    correction: писатимемо
    error_type: word
    options:
    - писатимемо
    - будемо написати
    - напишуть
    explanation: «Кожного дня» позначає повторювану дію, тому потрібен недоконаний
      вид («писатимемо» або «будемо писати»).
  - sentence: Я обіцяю, що я буду робити це завдання до вечора.
    error: буду робити
    correction: зроблю
    error_type: word
    options:
    - зроблю
    - робитиму
    - роблю
    explanation: Фраза «до вечора» і слово «обіцяю» вимагають фінального результату,
      тому потрібен доконаний вид.
  - sentence: Вона зараз напише листа своєму другу.
    error: напише
    correction: пише
    error_type: word
    options:
    - пише
    - написала
    - писатиме
    explanation: «Зараз» вимагає теперішнього часу (недоконаного виду). Доконаний
      вид не має теперішнього часу.
  - sentence: Взимку я завжди буду носитиму теплу куртку.
    error: буду носитиму
    correction: носитиму
    error_type: phrase
    options:
    - носитиму
    - буду поносити
    - поношу
    explanation: 'Не можна змішувати складену і складну форми. Правильно: «буду носити»
      або «носитиму».'
- id: free-write-future-plans
  type: essay-response
  prompt: Напишіть 5-7 речень про ваші плани на наступний тиждень. Обов’язково використайте
    всі три форми майбутнього часу (просту, складну та складену) та дієслова доконаного
    і недоконаного виду.
  min_words: 50
  model_answer: Наступного тижня я буду багато працювати над новим проєктом. Щоранку
    я питиму каву і читатиму новини. Я обіцяю, що до п'ятниці я обов'язково закінчу
    всі важливі завдання і напишу звіт. У суботу я поїду в центр міста і зустрінуся
    з друзями. Ми будемо гуляти в парку і розмовляти. Увечері я обов'язково зателефоную
    батькам.
  evaluation_criteria:
  - Використано просту форму майбутнього часу (доконаний вид).
  - Використано складну форму майбутнього часу (недоконаний вид).
  - Використано складену форму майбутнього часу (недоконаний вид).
  - Правильно обрано вид дієслова для процесу та результату.
  - Текст містить щонайменше 5 речень.
workbook:
- type: translate
  instruction: Оберіть правильний переклад речення українською мовою.
  items:
  - source: I will read a book tomorrow (process).
    options:
    - text: Завтра я буду читати книгу.
      correct: true
    - text: Завтра я прочитаю книгу.
      correct: false
    - text: Завтра я читаю книгу.
      correct: false
    - text: Завтра я читав книгу.
      correct: false
  - source: I will finish reading the book tomorrow (result).
    options:
    - text: Завтра я прочитаю книгу.
      correct: true
    - text: Завтра я буду читати книгу.
      correct: false
    - text: Завтра я читатиму книгу.
      correct: false
    - text: Завтра я читаю книгу.
      correct: false
  - source: Who will buy the tickets?
    options:
    - text: Хто купить квитки?
      correct: true
    - text: Хто буде купувати квитки?
      correct: false
    - text: Хто купуватиме квитки?
      correct: false
    - text: Хто купив квитки?
      correct: false
  - source: I will be waiting for you.
    options:
    - text: Я чекатиму на тебе.
      correct: true
    - text: Я почекаю на тебе.
      correct: false
    - text: Я зачекаю на тебе.
      correct: false
    - text: Я чекаю на тебе.
      correct: false
  - source: We will win the match.
    options:
    - text: Ми виграємо матч.
      correct: true
    - text: Ми будемо вигравати матч.
      correct: false
    - text: Ми виграватимемо матч.
      correct: false
    - text: Ми виграли матч.
      correct: false
  - source: He will answer the letter later.
    options:
    - text: Він відповість на лист пізніше.
      correct: true
    - text: Він буде відповідати на лист пізніше.
      correct: false
    - text: Він відповідатиме на лист пізніше.
      correct: false
    - text: Він відповів на лист пізніше.
      correct: false
- type: true-false
  instruction: Визначте, чи є твердження правдивим.
  items:
  - statement: 'Дієслова доконаного виду мають форми всіх трьох часів: минулого, теперішнього
      і майбутнього.'
    correct: false
    explanation: Дієслова доконаного виду не мають форм теперішнього часу, тільки
      минулого і майбутнього.
  - statement: Проста форма майбутнього часу утворюється тільки від дієслів доконаного
      виду.
    correct: true
    explanation: Так, ця форма позначає завершену дію в майбутньому.
  - statement: Дієслово «схаменутися» є одновидовим і має лише доконаний вид.
    correct: true
    explanation: Це слово позначає миттєву емоційну реакцію, тому не має недоконаного
      виду.
  - statement: У складеній формі «буду писати», особові закінчення отримує слово «писати».
    correct: false
    explanation: Основне дієслово завжди залишається в інфінітиві. Закінчення змінюються
      тільки у допоміжного слова «бути».
  - statement: Форми «я буду читати» та «я читатиму» є повними синонімами і позначають
      дію недоконаного виду.
    correct: true
    explanation: Це дві рівнозначні форми недоконаного виду майбутнього часу.
  - statement: Зворотна частка «-ся» у формі «буду повертатися» може стояти перед
      допоміжним дієсловом («ся буду повертати»).
    correct: false
    explanation: 'Частка «-ся» ніколи не відривається від інфінітива: «буду повертатися».'
- type: match-up
  instruction: З'єднайте дієслово недоконаного виду з його доконаною видовою парою.
  pairs:
  - left: записувати
    right: записати
  - left: купувати
    right: купити
  - left: запрошувати
    right: запросити
  - left: сидіти
    right: посидіти
  - left: летіти
    right: полетіти
  - left: замовляти
    right: замовити
  - left: організовувати
    right: організувати
  - left: повертатися
    right: повернутися
