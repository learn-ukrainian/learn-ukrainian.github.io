version: '1.0'
module: gerund-phrases
level: b1
inline:
- id: fill-in-gerund-form
  type: fill-in
  instruction: Вставте правильну граматичну форму дієприслівника за контекстом.
  items:
  - sentence: _____ книгу, я робив корисні нотатки.
    answer: Читаючи
    options:
    - Читаючи
    - Прочитавши
    - Читати
    - Читав
  - sentence: _____ перший крок, ви ніколи не досягнете мети.
    answer: Не зробивши
    options:
    - Не роблячи
    - Не зробивши
    - Зробивши
    - Роблячи
  - sentence: Спортсмен усміхався, _____ із відомими журналістами.
    answer: спілкуючись
    options:
    - спілкуючись
    - поспілкувавшись
    - спілкуватися
    - спілкувався
  - sentence: _____ головного суперника на останніх метрах, плавець здобув золоту
      медаль.
    answer: Випередивши
    options:
    - Випереджаючи
    - Випередивши
    - Випередити
    - Випередив
  - sentence: _____ грубою помилкою центрального захисника, нападник забив вирішальний
      гол.
    answer: Скориставшись
    options:
    - Користуючись
    - Скориставшись
    - Користуватися
    - Скористався
  - sentence: _____ подкаст, ми спокійно їхали в автомобілі.
    answer: Слухаючи
    options:
    - Слухаючи
    - Послухавши
    - Слухати
    - Слухав
- id: quiz-gerund-structure
  type: quiz
  instruction: Оберіть правильний варіант відповіді про будову дієприслівникового
    звороту.
  items:
  - question: Що таке дієприслівниковий зворот?
    options:
    - Дієприслівник із залежними словами.
    - Одиничний дієприслівник без інших слів.
    - Дієприкметник із залежними словами.
    - Просте речення без підмета.
    correct: 0
  - question: Яку синтаксичну роль у реченні завжди виконує дієприслівниковий зворот?
    options:
    - Обставина
    - Означення
    - Додаток
    - Підмет
    correct: 0
  - question: На які питання найчастіше відповідає дієприслівниковий зворот?
    options:
    - Як? Коли? Чому?
    - Який? Яка? Яке?
    - Хто? Що?
    - Кого? Чого?
    correct: 0
  - question: Що означає дієприслівник недоконаного виду (напр., «читаючи»)?
    options:
    - Дію, що відбувається одночасно з головною.
    - Дію, що завершилася до початку головної.
    - Дію, що обов'язково відбудеться в майбутньому.
    - Головну дію в реченні.
    correct: 0
  - question: Що означає дієприслівник доконаного виду (напр., «прочитавши»)?
    options:
    - Дію, що повністю завершилася до моменту початку головної дії.
    - Дію, що відбувається одночасно з головною.
    - Дію, що триватиме в майбутньому.
    - Ознаку предмета за дією.
    correct: 0
  - question: Яке з цих речень містить дієприслівниковий зворот?
    options:
    - Спілкуючись із друзями, я відпочиваю.
    - Я спілкуюся з друзями і відпочиваю.
    - Спілкуючись, я відпочиваю.
    - Мої друзі люблять спілкуватися.
    correct: 0
- id: match-up-punctuation-terms
  type: match-up
  instruction: З'єднайте терміни з розділу «Правила відокремлення» з їхніми характеристиками.
  pairs:
  - left: Дієприслівниковий зворот
    right: Завжди відокремлюється комами, незалежно від позиції в реченні.
  - left: Фразеологічний зворот
    right: Не відокремлюється комами, бо втратив дієслівне значення (наприклад, не
      покладаючи рук).
  - left: Підсилювальна частка «і/й»
    right: Скасовує кому перед зворотом (наприклад, виконати й не знаючи правил).
  - left: Однорідні звороти без сполучників
    right: Відокремлюються комами один від одного, описуючи послідовні дії.
  - left: Однорідні звороти зі сполучником «і»
    right: Не розділяються комою між собою.
  - left: Адвербіалізований дієприслівник
    right: Одиничний дієприслівник після присудка, що означає спосіб дії і не виділяється
      комою.
- id: quiz-participle-vs-gerund
  type: quiz
  instruction: Перевірте своє розуміння різниці між дієприкметниковим та дієприслівниковим
    зворотами.
  items:
  - question: Який зворот відповідає на питання «який? яка? яке? які?» і виступає
      в ролі означення?
    options:
    - Дієприкметниковий
    - Дієприслівниковий
    - Фразеологічний
    - Обставинний
    correct: 0
  - question: Який зворот відповідає на питання «як? коли? чому?» і підпорядковується
      дієслову-присудку?
    options:
    - Дієприслівниковий
    - Дієприкметниковий
    - Іменниковий
    - Означальний
    correct: 0
  - question: У реченні «Книга, прочитана студентом, лежала на столі» використано...
    options:
    - Дієприкметниковий зворот
    - Дієприслівниковий зворот
    - Одиничний дієприслівник
    - Фразеологізм
    correct: 0
  - question: У реченні «Студент, прочитавши книгу, успішно склав іспит» використано...
    options:
    - Дієприслівниковий зворот
    - Дієприкметниковий зворот
    - Одиничний дієприкметник
    - Фразеологізм
    correct: 0
  - question: Який зворот можна подумки замінити на підрядне речення зі словом «який»?
    options:
    - Дієприкметниковий зворот
    - Дієприслівниковий зворот
    - Дієслівний зворот
    - Обидва звороти
    correct: 0
  - question: Правило пунктуації якого звороту залежить від його позиції щодо іменника?
    options:
    - Дієприкметникового
    - Дієприслівникового
    - Жодного
    - Обох зворотів
    correct: 0
workbook:
- type: translate
  instruction: Оберіть правильний переклад речень з англійської на українську.
  items:
  - source: Having read the letter, Olenka became lost in thought.
    options:
    - text: Прочитавши листа, Оленка задумалася.
      correct: true
    - text: Читаючи листа, Оленка задумалася.
      correct: false
    - text: Прочитаний Оленкою лист змусив її задуматися.
      correct: false
    - text: Оленка задумалася, читаючи.
      correct: false
  - source: He worked tirelessly (without laying down his hands).
    options:
    - text: Він працював не покладаючи рук.
      correct: true
    - text: Він працював, не покладаючи рук.
      correct: false
    - text: Він працював без рук.
      correct: false
    - text: Він працював, працюючи.
      correct: false
  - source: This complex task can be done even without knowing all the rules.
    options:
    - text: Це складне завдання можна виконати й не знаючи всіх правил.
      correct: true
    - text: Це складне завдання можна виконати, й не знаючи всіх правил.
      correct: false
    - text: Це завдання можна виконати, не знаючи правил.
      correct: false
    - text: Це завдання роблять без правил.
      correct: false
  - source: It is harmful to read lying down.
    options:
    - text: Шкідливо читати лежачи.
      correct: true
    - text: Шкідливо читати, лежачи.
      correct: false
    - text: Лежати і читати шкідливо.
      correct: false
    - text: Шкідливо читати і лежати.
      correct: false
  - source: Having opened the door and having turned on the light, he looked around
      the room.
    options:
    - text: Відчинивши двері і ввімкнувши світло, він оглянув кімнату.
      correct: true
    - text: Відчинивши двері, і ввімкнувши світло, він оглянув кімнату.
      correct: false
    - text: Відчиняючи двері і вмикаючи світло, він оглянув кімнату.
      correct: false
    - text: Двері відчинені і світло ввімкнене, він оглянув кімнату.
      correct: false
  - source: While carefully reading the new book, I took useful notes.
    options:
    - text: Уважно читаючи нову книгу, я робив корисні нотатки.
      correct: true
    - text: Уважно прочитавши нову книгу, я робив корисні нотатки.
      correct: false
    - text: Нова книга, уважно читана, дала корисні нотатки.
      correct: false
    - text: Я робив нотатки і читав книгу.
      correct: false
