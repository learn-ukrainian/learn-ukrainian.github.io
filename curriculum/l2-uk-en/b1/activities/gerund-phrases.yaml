- type: true-false
  instruction: Правда чи ні? Оберіть правильну відповідь щодо правил.
  items:
  - statement: Дієприслівниковий зворот завжди виконує роль означення.
    correct: false
    explanation: Він виконує роль обставини.
  - statement: 'Фразеологічні звороти (наприклад: не покладаючи рук) ніколи не відокремлюються
      комами.'
    correct: true
    explanation: Вони стали неподільними висловами і втратили пряме дієслівне значення.
  - statement: Якщо зворот розриває головну частину речення, він виділяється комами
      з обох боків.
    correct: true
    explanation: Це абсолютне правило для дієприслівникових зворотів.
  - statement: Підсилювальна частка «і» або «й» перед зворотом вимагає ставити кому.
    correct: false
    explanation: Підсилювальна частка скасовує кому перед зворотом.
  - statement: 'Дієприслівниковий зворот відповідає на питання: який? яка? яке?'
    correct: false
    explanation: 'Він відповідає на питання: як? коли? чому? за яких умов?'
  - statement: Дія у звороті та головна дія мають виконуватися одним і тим самим підметом.
    correct: true
    explanation: Інакше виникає граматична помилка «звисаючий зворот».
- type: order
  instruction: Розставте речення в правильному порядку, щоб утворився логічний текст.
  items:
  - Прокинувшись рано-вранці, я відчув приємний аромат кави.
  - Зібравшись, я вийшов з дому на прогулянку.
  - Старовинні вулиці, яскраво освітлені теплим весняним сонцем, були ще зовсім порожніми.
  - Ідучи містом, я насолоджувався тишею і спокоєм.
  - Повернувшись додому, я відчув, що цей день почався ідеально.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
- type: fill-in
  instruction: Вставте правильні терміни з лексики модуля.
  items:
  - sentence: Синтаксично весь дієприслівниковий зворот виступає як одна неподільна
      _____.
    answer: обставина
    options:
    - обставина
    - означення
    - стилістика
  - sentence: Якщо зворот з часом перетворився на популярний _____, він пишеться без
      ком.
    answer: фразеологізм
    options:
    - фразеологізм
    - канцелярит
    - дієприкметник
  - sentence: Дієприкметниковий зворот завжди виступає в ролі _____ і відповідає на
      питання «який?».
    answer: означення
    options:
    - означення
    - обставини
    - підмета
  - sentence: Надмірне та штучне використання зворотів називають терміном _____.
    answer: канцелярит
    options:
    - канцелярит
    - адвербіалізація
    - стилістика
  - sentence: Якщо перед зворотом стоїть підсилювальна _____, кома не потрібна.
    answer: частка
    options:
    - частка
    - обставина
    - форма
  - sentence: Коли два звороти йдуть поспіль без сполучників, це _____ обставини.
    answer: однорідні
    options:
    - однорідні
    - підсилювальні
    - фразеологічні
- type: match-up
  instruction: З'єднайте початок і кінець речення.
  pairs:
  - left: Студенти слухали лекцію викладача
    right: затамувавши подих.
  - left: Він сумлінно працював над проєктом
    right: не покладаючи рук.
  - left: Переляканий хлопець швидко біг
    right: не чуючи ніг.
  - left: Це складне завдання можна виконати
    right: й не знаючи всіх правил.
  - left: Шкідливо для здоров'я читати
    right: лежачи на дивані.
  - left: Втомлений батько довго сидів
    right: задумавшись про життя.
- type: anagram
  instruction: Складіть слова з літер (терміни з модуля).
  items:
  - letters:
    - о
    - б
    - с
    - т
    - а
    - в
    - и
    - н
