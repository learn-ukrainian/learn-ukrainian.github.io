- type: group-sort
  instruction: 'Розподіліть фрази на дві категорії: ті, що виділяються комами, і ті,
    що ні (фразеологізми та адвербіалізація).'
  groups:
  - label: Відокремлюється комою
    items:
    - прочитавши цікавого листа
    - уважно читаючи нову книгу
    - побачивши давніх друзів
    - радісно усміхаючись журналістам
  - label: Не відокремлюється комою
    items:
    - працював не покладаючи рук
    - слухали затамувавши подих
    - шкідливо читати лежачи
    - біг не чуючи ніг
- type: essay-response
  instruction: Напишіть коротку розповідь (5-8 речень) про вашу ідеальну ранкову рутину
    або подорож до Львова.
  prompt: Використайте щонайменше три дієприслівникові звороти та два дієприкметникові
    звороти. Зверніть увагу на правильну пунктуацію.
  min_words: 50
  model_answer: Прокинувшись рано-вранці, я одразу відчув приємний аромат кави. Старовинні
    вулиці Львова, яскраво освітлені теплим весняним сонцем, були ще зовсім порожніми.
    Випивши філіжанку кави, я вирушив на прогулянку. Туристи, зачаровані красою міста,
    фотографували архітектуру. Гуляючи площею Ринок і насолоджуючись атмосферою, я
    зрозумів, що це ідеальний вихідний. Цей ранок, наповнений спокоєм, запам'ятається
    надовго.
  evaluation_criteria:
  - Використано щонайменше три дієприслівникові звороти.
  - Використано щонайменше два дієприкметникові звороти.
  - Дієприслівникові звороти правильно відокремлені комами.
  - Головна і додаткова дії виконуються одним підметом (немає «відірваних» зворотів).
