version: '1.0'
module: gerund-phrases
level: b1
inline:
- id: reading-gerund-structure
  type: reading
  instruction: 'Прочитайте текст про дієприслівниковий зворот: будова і дайте відповіді
    на запитання.'
  passage: 'Уявіть ситуацію: ви їдете в автомобілі, слухаючи подкаст. Коуч говорить:
    «Працюючи над собою щодня, ви зміните своє життя на краще. Не зробивши першого
    кроку, ви ніколи не досягнете своєї мети». Зверніть увагу на ці фрази. Вони не
    просто називають додаткову дію, а розгортають її, додаючи важливі деталі.'
  questions:
  - Яку функцію виконують дієприслівникові звороти в мовленні коуча?
  - Що означає фраза «не зробивши першого кроку»?
  - Від якого дієслова утворений дієприслівник «працюючи»?
- id: fill-in-gerund-form
  type: fill-in
  instruction: Вставте правильну граматичну форму дієприслівника.
  items:
  - sentence: _____ над собою щодня, ви зміните своє життя на краще.
    answer: Працюючи
    options:
    - Працюючи
    - Працювати
    - Працював
  - sentence: Не _____ першого кроку, ви ніколи не досягнете мети.
    answer: зробивши
    options:
    - зробивши
    - зробити
    - зробив
  - sentence: Спортсмен привітно усміхався, _____ із журналістами.
    answer: спілкуючись
    options:
    - спілкуючись
    - спілкуватися
    - спілкувався
  - sentence: _____ головного суперника, плавець здобув золоту медаль.
    answer: Випередивши
    options:
    - Випередивши
    - Випередити
    - Випередив
  - sentence: Уважно _____ нову книгу, я робив корисні нотатки.
    answer: читаючи
    options:
    - читаючи
    - читати
    - читав
  - sentence: _____ цю книгу до кінця, ви зрозумієте багато нового.
    answer: Прочитавши
    options:
    - Прочитавши
    - Прочитати
    - Прочитав
- id: quiz-gerund-structure
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Дієприслівниковий
    зворот: будова».'
  items:
  - question: На які питання відповідає дієприслівниковий зворот як обставина?
    options:
    - який? яка? яке?
    - як? коли? чому?
    - хто? що?
    - кого? чого?
    correct: 1
  - question: Що позначають дієприслівники недоконаного виду?
    options:
    - Дію, завершену до головної
    - Ознаку предмета
    - Дію, одночасну з головною
    - Дію, яка відбудеться в майбутньому
    correct: 2
  - question: Дієприслівниковий зворот — це дієприслівник разом із...
    options:
    - означуваним словом
    - головним дієсловом
    - залежними словами
    - підметом
    correct: 2
  - question: Яким членом речення завжди є дієприслівниковий зворот?
    options:
    - Означенням
    - Додатком
    - Підметом
    - Обставиною
    correct: 3
  - question: Як ми підкреслюємо дієприслівниковий зворот під час розбору?
    options:
    - Хвилястою лінією
    - Штрихпунктирною лінією
    - Однією лінією
    - Двома лініями
    correct: 1
  - question: Що вказує дієприслівник доконаного виду?
    options:
    - Дію, одночасну з головною
    - Властивість предмета
    - Напрямок руху
    - Додаткову дію, завершену до головної
    correct: 3
- id: match-up-punctuation-terms
  type: match-up
  instruction: З'єднайте терміни з розділу «Правила відокремлення» з їхніми визначеннями.
  pairs:
  - left: Дієприслівниковий зворот
    right: Група слів, що майже завжди відокремлюється комами
  - left: Фразеологічний зворот
    right: Сталий вислів, який не відокремлюється комами
  - left: Однорідні обставини
    right: Два звороти, з'єднані 'і', без коми між ними
  - left: Підсилювальна частка
    right: Слова 'і/й', які скасовують кому перед зворотом
  - left: Адвербіалізація
    right: Перетворення дієприслівника на звичайний прислівник
  - left: Канцелярит
    right: Надмірне та штучне використання зворотів у тексті
- id: error-correction-punctuation
  type: error-correction
  instruction: Знайдіть і виправте помилки у правилах відокремлення та фразеологізмах.
  items:
  - sentence: Це завдання можна виконати також не знаючи всіх правил.
    error: також
    correction: й
    error_type: word
    options:
    - й
    - бо
    - але
    explanation: Підсилювальна частка 'й' скасовує кому перед зворотом.
  - sentence: Він працював безвідповідально не покладаючи рук.
    error: безвідповідально
    correction: сумлінно
    error_type: word
    options:
    - сумлінно
    - ліниво
    - погано
    explanation: Фразеологізм 'не покладаючи рук' означає 'невтомно, дуже старанно'.
  - sentence: Хлопець біг не слухаючи ніг.
    error: слухаючи
    correction: чуючи
    error_type: word
    options:
    - чуючи
    - бачачи
    - відчуваючи
    explanation: 'Правильний фразеологізм: не чуючи ніг.'
  - sentence: Студенти слухали лекцію зупинивши подих.
    error: зупинивши
    correction: затамувавши
    error_type: word
    options:
    - затамувавши
    - сховавши
    - закривши
    explanation: 'Правильний фразеологізм: затамувавши подих.'
  - sentence: Він відчинив двері і, ввімкнувши світло, оглянув кімнату.
    error: відчинив
    correction: відчинивши
    error_type: word
    options:
    - відчинивши
    - відчиняти
    - відчинить
    explanation: Щоб не ставити кому перед 'і', потрібні однорідні дієприслівникові
      звороти.
  - sentence: Шкідливо читати сидіти.
    error: сидіти
    correction: лежачи
    error_type: word
    options:
    - лежачи
    - лежати
    - лежить
    explanation: Це адвербіалізований дієприслівник способу дії (виняток, без коми).
- id: quiz-participle-vs-gerund
  type: group-sort
  instruction: Розподіліть звороти на дієприкметникові та дієприслівникові.
  groups:
  - label: Дієприкметниковий зворот (Означення)
    items:
    - Книга, прочитана студентом
    - Лист, написаний другом
    - Двері, зачинені ввечері
  - label: Дієприслівниковий зворот (Обставина)
    items:
    - Прочитавши книгу, студент...
    - Написавши листа, друг...
    - Зачинивши двері, він...
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте стилістичні та логічні помилки (канцелярит або
    звисаючий зворот) у реченнях.
  items:
  - sentence: Перейшовши дорогу, мені стало легше.
    error: мені стало легше
    correction: я відчув полегшення
    error_type: phrase
    options:
    - я відчув полегшення
    - мені було легко
    - мене стало легше
    explanation: Головну і додаткову дію має виконувати один підмет.
  - sentence: Готуючи вечерю, кіт забіг на кухню.
    error: Готуючи вечерю
    correction: Коли я готував вечерю
    error_type: phrase
    options:
    - Коли я готував вечерю
    - Приготувавши вечерю
    - Готувати вечерю
    explanation: Дії виконуються різними суб'єктами, тому потрібне підрядне речення.
  - sentence: Я сидів, читаючи цікаву книгу.
    error: читаючи
    correction: і читав
    error_type: phrase
    options:
    - і читав
    - прочитавши
    - читати
    explanation: Питомій українській мові притаманна структура «дія плюс дія».
  - sentence: Прокинувшись, умившись, поснідавши, я вийшов з дому.
    error: Прокинувшись, умившись, поснідавши,
    correction: Я прокинувся, умився і поснідав. Потім
    error_type: phrase
    options:
    - Я прокинувся, умився і поснідав. Потім
    - Прокинувся, умиваючись, снідаючи,
    - Прокинутися, умитися, поснідати,
    explanation: Надмірне використання зворотів — це канцелярит.
  - sentence: Піднявшись на гору, туристам відкрився краєвид.
    error: туристам відкрився краєвид
    correction: туристи побачили краєвид
    error_type: phrase
    options:
    - туристи побачили краєвид
    - туристами відкрився краєвид
    - для туристів був краєвид
    explanation: Підмет має виконувати обидві дії (туристи піднялися і туристи побачили).
  - sentence: Читаючи книгу, вікно раптом відчинилося.
    error: Читаючи книгу
    correction: Коли я читав книгу
    error_type: phrase
    options:
    - Коли я читав книгу
    - Прочитавши книгу
    - Читати книгу
    explanation: Вікно не може читати книгу, потрібне підрядне речення.
- id: essay-gerund-narrative
  type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Правила відокремлення».
  prompt: 'Напишіть невелику розповідь (5-8 речень) про вашу ідеальну ранкову рутину
    або подорож. Обов''язково використайте принаймні три дієприслівникові звороти
    та нову лексику (наприклад: не покладаючи рук, затамувавши подих).'
  min_words: 50
  model_answer: Прокинувшись рано-вранці, я одразу відчув приємний аромат кави. Старовинні
    вулиці, яскраво освітлені теплим весняним сонцем, були ще зовсім порожніми. Вийшовши
    на балкон, я слухав спів птахів затамувавши подих. Потім я працював над своїм
    проєктом не покладаючи рук. Закінчивши всі справи, я пішов на прогулянку, насолоджуючись
    чудовим ранком. Цей день почався ідеально.
