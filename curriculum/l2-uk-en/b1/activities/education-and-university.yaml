version: '1.0'
module: education-and-university
level: b1
inline:
- id: reading-ua-system
  type: true-false
  title: Розуміння системи освіти
  instruction: Правда чи ні? Перевірте, як ви зрозуміли текст про освітню систему
    України.
  items:
  - statement: Українські діти обов'язково починають навчатися в школі у віці шести
      років.
    correct: true
    explanation: Так, освітній шлях кожної дитини обов'язково починається у віці шести
      років.
  - statement: Початкова школа в Україні триває п'ять років.
    correct: false
    explanation: Початкова школа триває з першого по четвертий клас, тобто чотири
      роки.
  - statement: Після дев'ятого класу учні отримують свідоцтво про базову середню освіту.
    correct: true
    explanation: Так, це перший офіційний документ підлітка.
  - statement: Нова українська школа передбачає загальне навчання протягом одинадцяти
      років.
    correct: false
    explanation: Завдяки реформі «Нова українська школа» навчання триватиме дванадцять
      років.
  - statement: Перший рівень вищої освіти в Україні називається магістратура.
    correct: false
    explanation: Перший рівень — це бакалаврат.
  - statement: Ступінь спеціаліста зараз є найвищим в українській системі освіти.
    correct: false
    explanation: Ступінь спеціаліста зараз офіційно скасований.
  - statement: Інститут зазвичай глибоко зосереджений на одній конкретній галузі знань.
    correct: true
    explanation: Наприклад, політехнічний інститут або інститут іноземних мов.
  - statement: Слово «виш» є абревіатурою, що означає вищий навчальний заклад.
    correct: true
    explanation: Це популярна українська абревіатура.
  - statement: Абітурієнти повинні складати вступні іспити безпосередньо в кожному
      університеті.
    correct: false
    explanation: Замість цього існує стандартизований тест (ЗНО або НМТ).
  - statement: Державне замовлення (бюджет) означає, що за навчання студента повністю
      платить держава.
    correct: true
    explanation: Це безкоштовне навчання для найрозумніших студентів.
  - statement: Студенти, які успішно вчаться «на бюджеті», отримують щомісячну стипендію.
    correct: true
    explanation: Держава виплачує їм стипендію за високі оцінки.
  - statement: Контрактна форма передбачає, що університет платить студенту гроші
      за навчання.
    correct: false
    explanation: На контрактній формі студент або його батьки самостійно оплачують
      навчання.
- id: quiz-edu-terms
  type: quiz
  title: Університетські терміни
  instruction: Оберіть правильний варіант для кожного запитання.
  items:
  - question: Яке слово використовують для позначення студента, що вивчає магістерську
      програму?
    options:
    - магістр
    - бакалавр
    - спеціаліст
    - абітурієнт
    correct: 0
    explanation: Студент магістратури отримує ступінь магістра.
  - question: Як називається фінансова допомога, яку отримують студенти бюджетної
      форми за високі оцінки?
    options:
    - зарплата
    - стипендія
    - премія
    - субсидія
    correct: 1
    explanation: Студенти отримують щомісячну стипендію.
  - question: Що пише молодий науковець в аспірантурі, щоб отримати найвищий ступінь
      доктора філософії?
    options:
    - курсову роботу
    - дипломну роботу
    - дисертацію
    - великий конспект
    correct: 2
    explanation: В аспірантурі пишуть дисертацію.
  - question: Який сучасний стандартизований тест складають абітурієнти для вступу
      до українського університету?
    options:
    - TOEFL
    - IELTS
    - ДПА
    - НМТ
    correct: 3
    explanation: Зараз школярі складають Національний мультипредметний тест (НМТ).
  - question: Хто такий науковий керівник?
    options:
    - Професор, який керує дослідженням
    - Студент першого курсу
    - Працівник деканату
    - Директор гуртожитку
    correct: 0
    explanation: Це професор або викладач, який керує вашою курсовою чи дисертацією.
  - question: Які закінчення найчастіше мають українські віддієслівні іменники (наприклад,
      вивчення)?
    options:
    - «-ичний» або «-чий»
    - «-ння» або «-ття»
    - «-учий» або «-ачий»
    - «-а» або «-я»
    correct: 1
    explanation: Процес вивчення, дослідження, оцінювання завжди має такі закінчення.
  - question: Як найкраще перекласти фразу «read textbook» українською мовою в науковому
      стилі?
    options:
    - читаючий підручник
    - підручник читання
    - прочитаний підручник
    - читати підручник
    correct: 2
    explanation: В академічному стилі використовують пасивні дієприкметники минулого
      часу.
  - question: Що точно означає словосолучення «державне замовлення» в освіті?
    options:
    - Студент самостійно купує підручники
    - Університет купує нові комп'ютери
    - Студент оплачує навчання
    - За навчання студента платить держава
    correct: 3
    explanation: Державне замовлення (або бюджет) означає безкоштовне навчання.
- id: match-disciplines
  type: match-up
  title: Навчальні дисципліни та спеціальності
  instruction: З'єднайте назву науки з її правильним поясненням.
  pairs:
  - left: філологія
    right: наука про мову, літературу та тексти
  - left: юриспруденція
    right: наука про право і державні закони
  - left: інженерія
    right: наука про проектування машин або будівель
  - left: медицина
    right: наука про лікування людей
  - left: інформатика
    right: наука про комп'ютери та сучасне програмування
  - left: біологія
    right: природнича наука про всі живі організми
  - left: економіка
    right: наука про гроші, фінанси та господарство
  - left: філософія
    right: наука про загальні закони розвитку світу і суспільства
  - left: психологія
    right: наука про поведінку та складний розум людини
  - left: історія
    right: наука про минуле людства та важливі події
  - left: математика
    right: точна наука про числа, формули і фігури
  - left: мистецтво
    right: творче відображення дійсності художніми образами
- id: essay-specialty
  type: essay-response
  title: Моя майбутня спеціальність
  instruction: Напишіть коротке есе про вашу спеціальність та університет.
  prompt: Напишіть 5-7 речень (мінімум 100 слів), використовуючи нову лексику з розділу
    «Навчальні дисципліни та спеціальності» (наприклад, кафедра, дослідження, бакалавр,
    магістр). Опишіть спеціальність, яку ви хочете обрати або вже вивчаєте. Використовуйте
    хоча б один дієприкметниковий зворот.
  min_words: 100
  model_answer: Я хочу успішно вступити до національного університету на філологічний
    факультет. Моя майбутня улюблена спеціальність — це сучасна філологія. Мені дуже
    подобається ця гуманітарна наука, тому що вона дозволяє глибоко досліджувати класичні
    та сучасні тексти. Наша кафедра відома своїми чудовими професорами, які постійно
    проводять важливі наукові дослідження у сфері мовознавства. Після успішно складеного
    випускного іспиту я нарешті зможу стати дипломованим бакалавром. А потім я серйозно
    планую написати велику наукову дисертацію і стати магістром філології. Ця опублікована
    мною наукова робота стане моїм першим кроком у велику українську науку.
- id: fill-in-academic-life
  type: fill-in
  title: Академічне середовище
  instruction: Вставте правильне слово в речення, вибираючи з варіантів.
  items:
  - sentence: Теоретичне заняття, де професор детально пояснює матеріал багатьом студентам,
      називається {лекція}.
    answer: лекція
    options:
    - семінар
    - лекція
    - сесія
    - іспит
  - sentence: Інтерактивне практичне заняття у невеликих студентських групах — це
      {семінар}.
    answer: семінар
    options:
    - лекція
    - семінар
    - інститут
    - гуртожиток
  - sentence: Студенти-медики обов'язково мають практичні заняття, що мають назву
      {лабораторна} робота.
    answer: лабораторна
    options:
    - курсова
    - лабораторна
    - сесійна
    - залікова
  - sentence: Найважливіший період семестру, коли всі студенти складають тести, —
      це {сесія}.
    answer: сесія
    options:
    - кафедра
    - сесія
    - лекція
    - стипендія
  - sentence: Форма швидкої перевірки знань без конкретної числової оцінки — це {залік}.
    answer: залік
    options:
    - іспит
    - залік
    - стипендія
    - диплом
  - sentence: Серйозна перевірка знань з оцінкою, що визначає ваш загальний рейтинг,
      — це {іспит}.
    answer: іспит
    options:
    - залік
    - іспит
    - семінар
    - конспект
  - sentence: Адміністративний центр факультету, куди ви звертаєтеся за довідками,
      — це {деканат}.
    answer: деканат
    options:
    - гуртожиток
    - деканат
    - читальний
    - кафедра
  - sentence: Місце, де працюють ваші викладачі одного фаху і планують нові курси,
      — це {кафедра}.
    answer: кафедра
    options:
    - деканат
    - гуртожиток
    - кафедра
    - читальний
  - sentence: Місце, де живуть і постійно спілкуються студенти з інших міст, називається
      {гуртожиток}.
    answer: гуртожиток
    options:
    - деканат
    - університет
    - гуртожиток
    - читальний
  - sentence: Перше серйозне наукове дослідження студента в університеті — це {курсова}
      робота.
    answer: курсова
    options:
    - лабораторна
    - курсова
    - залікова
    - дипломна
  - sentence: Офіційний документ, у якому фіксується вся історія оцінок студента,
      — це {залікова} книжка.
    answer: залікова
    options:
    - наукова
    - залікова
    - студентська
    - бібліотечна
  - sentence: Міжнародний захід, де молоді дослідники презентують свої проєкти, —
      це наукова {конференція}.
    answer: конференція
    options:
    - лекція
    - сесія
    - конференція
    - практика
- id: error-correction-participles
  type: error-correction
  title: Виправлення помилок академічного стилю
  instruction: Знайдіть і виправте помилку в кожному реченні. Зверніть увагу на використання
    кальок, активних дієприкметників та дієприслівникових зворотів.
  items:
  - sentence: Він дуже цікавий і багато читаючий студент на нашому факультеті.
    error: читаючий
    correction: який читає
    error_type: phrase
    options:
    - який читає
    - прочитаний
    - читаючи
    - читати
    explanation: Активні дієприкметники теперішнього часу (читаючий, працюючий) є
      калькою з російської мови.
  - sentence: Усі абітурієнти, бажаючі вступити до магістратури, повинні обов'язково
      скласти іспит.
    error: бажаючі
    correction: які бажають
    error_type: phrase
    options:
    - які бажають
    - бажані
    - бажаючи
    - бажати
    explanation: Слово «бажаючі» є невластивим українській мові. Завжди використовуйте
      конструкцію «ті, які бажають».
  - sentence: Підходячи до головного корпусу університету, у мене несподівано впав
      диплом.
    error: Підходячи
    correction: Коли я підходив
    error_type: phrase
    options:
    - Коли я підходив
    - Підійшовши
    - Підійти
    - Підходячий
    explanation: Дія в дієприслівниковому звороті і дія головного дієслова повинні
      виконуватися однією особою. Диплом не міг «підходити».
  - sentence: Це дуже добре досліджуюча наукова проблема в сучасній українській літературі.
    error: досліджуюча
    correction: досліджена
    error_type: word
    options:
    - досліджена
    - яка досліджує
    - досліджувана
    - дослідити
    explanation: Проблему хтось досліджує, тому слід використовувати пасивний дієприкметник
      — «досліджена» (або «досліджувана»).
  - sentence: Новий професор, читавший нам першу лекцію, відповів на всі складні запитання.
    error: читавший
    correction: який читав
    error_type: phrase
    options:
    - який читав
    - читаючий
    - прочитаний
    - читати
    explanation: Активні дієприкметники минулого часу на -вший краще замінювати підрядним
      реченням з «який».
  - sentence: Закінчуючи університет з відзнакою, йому запропонували престижну роботу
      в Києві.
    error: Закінчуючи
    correction: Коли він закінчував
    error_type: phrase
    options:
    - Коли він закінчував
    - Закінчивши
    - Закінчений
    - Закінчити
    explanation: Підмет головного речення («роботу») не може виконувати дію в дієприслівниковому
      звороті («закінчуючи»).
  - sentence: Для цього важливого біологічного дослідження мені терміново треба новий
      метод.
    error: треба
    correction: потрібен
    error_type: word
    options:
    - потрібен
    - потрібна
    - потрібно
    - требує
    explanation: В академічному стилі слово «потрібен» звучить набагато природніше
      і формальніше, ніж розмовне «треба».
  - sentence: Моя майбутня спеціальність на цьому великому факультеті — це юріспруденція.
    error: юріспруденція
    correction: юриспруденція
    error_type: word
    options:
    - юриспруденція
    - юреспруденція
    - юриспрудинція
    - юреспрюденція
    explanation: 'За правилом дев''ятки після «р» пишеться «и»: юриспруденція.'
