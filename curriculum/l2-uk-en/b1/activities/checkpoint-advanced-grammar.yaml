- type: quiz
  title: "Комплексний тест: Частина 1"
  instruction: "Оберіть правильну відповідь на запитання щодо просунутої граматики."
  items:
    - question: "Яке речення правильно ілюструє використання активного стану?"
      options:
        - text: "Комісія швидко розглянула всі питання."
          correct: true
        - text: "Всі питання були швидко розглянуті."
          correct: false
        - text: "Розгляд питань відбувся комісією."
          correct: false
        - text: "Питання розглянули швидко всіма."
          correct: false
      explanation: "Українська літературна мова завжди надає перевагу активним конструкціям над пасивними."
    - question: "Як правильно замінити російську кальку 'співаючий хлопчик'?"
      options:
        - text: "хлопчик, який співає"
          correct: true
        - text: "хлопчик, що співаючий"
          correct: false
        - text: "співучий хлопчик"
          correct: false
        - text: "хлопець співу"
          correct: false
      explanation: "Штучні активні дієприкметники теперішнього часу слід замінювати підрядним реченням з відносним займенником."
    - question: "Яка граматична форма вказує на результат дії без виконавця?"
      options:
        - text: "відчинено"
          correct: true
        - text: "відчинений"
          correct: false
        - text: "відчинили"
          correct: false
        - text: "відчиняючи"
          correct: false
      explanation: "Безособові результативні форми на -но, -то (наприклад, 'відчинено', 'зроблено') констатують факт."
    - question: "З якими іменниками можна використовувати числівник 'троє'?"
      options:
        - text: "хлопців"
          correct: true
        - text: "дівчат"
          correct: false
        - text: "автомобілів"
          correct: false
        - text: "ідей"
          correct: false
      explanation: "Збірні числівники вживаються з особами чоловічої статі, дитинчатами та іменниками pluralia tantum."
    - question: "Як правильно узгодити іменник з дробом 'одна друга'?"
      options:
        - text: "одна друга бюджету"
          correct: true
        - text: "одна друга бюджети"
          correct: false
        - text: "одна друга бюджетів"
          correct: false
        - text: "одна друга бюджетом"
          correct: false
      explanation: "Після дробового числівника іменник завжди вживається у формі родового відмінка однини."
    - question: "Що є грубою помилкою 'clashed agents' в українській мові?"
      options:
        - text: "Поєднання форми на -но з виконавцем в орудному відмінку."
          correct: true
        - text: "Відсутність підмета у простому реченні."
          correct: false
        - text: "Використання двох дієприслівників підряд."
          correct: false
        - text: "Неузгодження дієприкметника з іменником."
          correct: false
      explanation: "Безособові форми категорично заборонено поєднувати з вказівкою на конкретного виконавця."
    - question: "Знайдіть приклад активного дієприкметника минулого часу:"
      options:
        - text: "змарнілий"
          correct: true
        - text: "забутий"
          correct: false
        - text: "працюючий"
          correct: false
        - text: "відчинено"
          correct: false
      explanation: "Форми на -лий ('змарнілий', 'пожовклий') є питомими для української мови."
    - question: "В якому випадку дієприкметниковий зворот не виділяється комами на письмі?"
      options:
        - text: "Коли він стоїть перед іменником."
          correct: true
        - text: "Коли він стоїть після іменника."
          correct: false
        - text: "Коли він складається з одного слова."
          correct: false
        - text: "Коли він стоїть у кінці речення."
          correct: false
      explanation: "Якщо зворот позиціонується перед описуваним словом, коми не ставляться."

- type: quiz
  title: "Комплексний тест: Частина 2"
  instruction: "Перевірте знання прагматики та синтаксису."
  items:
    - question: "Що позначає термін 'кордоцентризм' у контексті української мови?"
      options:
        - text: "Осмислення дійсності через емоційну призму."
          correct: true
        - text: "Схильність до використання складних речень."
          correct: false
        - text: "Відмова від пасивних граматичних конструкцій."
          correct: false
        - text: "Перевага розмовного стилю над офіційним."
          correct: false
      explanation: "Кордоцентризм відображає 'філософію серця' українського народу."
    - question: "Яке дієслово містить унікальний демінутивний суфікс?"
      options:
        - text: "їстоньки"
          correct: true
        - text: "з'їсти"
          correct: false
        - text: "наїстися"
          correct: false
        - text: "їсти"
          correct: false
      explanation: "Дієслівні демінутиви з суфіксами -оньк-, -еньк- є екзотичним явищем у Європі."
    - question: "Яку прагматичну мету найчастіше має використання дієслівних демінутивів?"
      options:
        - text: "Створення атмосфери емоційної безпеки та інтимності."
          correct: true
        - text: "Надання тексту наукового та академічного звучання."
          correct: false
        - text: "Підкреслення важливості сказаного для слухача."
          correct: false
        - text: "Демонстрація високого соціального статусу."
          correct: false
      explanation: "Вони створюють затишний купол довіри у спілкуванні з близькими."
    - question: "Який збірний числівник правильно використано у реченні?"
      options:
        - text: "Нас у кімнаті було п'ятеро."
          correct: true
        - text: "Нас було п'ятеро дівчат."
          correct: false
        - text: "Я купив п'ятеро книг."
          correct: false
        - text: "Він має п'ятеро ідей."
          correct: false
      explanation: "Збірні числівники можуть вживатися самостійно або з іменниками чоловічого роду."
    - question: "Що позначають дієприслівники недоконаного виду на -учи, -ючи?"
      options:
        - text: "Одночасність додаткової та головної дії."
          correct: true
        - text: "Завершення додаткової дії перед головною."
          correct: false
        - text: "Ознаку предмета за його активною дією."
          correct: false
        - text: "Результат дії без вказівки на особу виконавця."
          correct: false
      explanation: "Вони вказують, що обидві дії відбуваються паралельно."
    - question: "Яке речення містить граматично правильний дієприслівниковий зворот?"
      options:
        - text: "Читаючи цікаву книгу, я завжди п'ю каву."
          correct: true
        - text: "Читаючи книгу, кава завжди випивається."
          correct: false
        - text: "Прочитавши книгу, було дуже цікаво."
          correct: false
        - text: "Йдучи додому, почався сильний дощ."
          correct: false
      explanation: "Додаткову дію (читаючи) і головну (п'ю) виконує один підмет (я)."
    - question: "Яка форма є граматично правильною для числівника у родовому відмінку?"
      options:
        - text: "не було трьох студентів"
          correct: true
        - text: "не було троє студентів"
          correct: false
        - text: "не було трьохох студентів"
          correct: false
        - text: "не було трьом студентів"
          correct: false
      explanation: "У непрямих відмінках збірні числівники перетворюються на кількісні форми."
    - question: "Яка стилістична функція слова 'проблемка' у діловій комунікації?"
      options:
        - text: "Пом'якшення психологічного шоку або приховування масштабів."
          correct: true
        - text: "Демонстрація поваги до колег та ділових партнерів."
          correct: false
        - text: "Вказівка на дуже маленький фізичний розмір явища."
          correct: false
        - text: "Створення сімейного, родинного затишку на роботі."
          correct: false
      explanation: "Суфікси часто використовуються як інструмент іронії або пом'якшення серйозності."

- type: fill-in
  title: "Заповніть пропуски: Граматичні трансформації 1"
  instruction: "Оберіть правильну форму слова, щоб завершити речення."
  items:
    - sentence: "Студенти, які уважно читають, можна описати конструкцією 'ті, _________ читають'."
      answer: "що"
      options: ["що", "хто", "які", "яких"]
      explanation: "Це найкращий спосіб уникнути використання кальки 'читаючі'."
    - sentence: "Дівчина повільно йшла містом, _________ свіжим вечірнім повітрям."
      answer: "насолоджуючись"
      options: ["насолоджуючись", "насолодившись", "насолоджуюча", "насолоджений"]
      explanation: "Дієприслівник недоконаного виду позначає паралельну дію."
    - sentence: "Листя, яке вже пожовкло, ми красиво називаємо _________ осіннім листям."
      answer: "пожовклим"
      options: ["пожовклим", "пожовтілим", "пожовтівшим", "пожовк"]
      explanation: "Це питомий активний дієприкметник минулого часу на -лий."
    - sentence: "До нашого столика підійшли _________ високих хлопців."
      answer: "четверо"
      options: ["четверо", "чотири", "четверті", "четверих"]
      explanation: "З іменниками чоловічого роду використовується збірний числівник."
    - sentence: "Для цього смачного рецепта потрібно рівно півтора _________ молока."
      answer: "літра"
      options: ["літра", "літри", "літрів", "літру"]
      explanation: "Після дробу іменник стоїть у родовому відмінку однини."
    - sentence: "Цей надзвичайно складний проєкт було успішно _________ ще вчора."
      answer: "затверджено"
      options: ["затверджено", "затверджений", "затвердили", "затверджена"]
      explanation: "Тут потрібна безособова форма на -но, що фіксує результат."
    - sentence: "Маленька дитина вже втомилася і дуже хоче _________."
      answer: "спатоньки"
      options: ["спатоньки", "спати", "поспати", "заснути"]
      explanation: "Це унікальний український дієслівний демінутив."
    - sentence: "Ця корпорація успішно викупила дві _________ відсотка акцій."
      answer: "треті"
      options: ["треті", "третіх", "третя", "третього"]
      explanation: "Це правильна форма дробового числівника 2/3."

- type: fill-in
  title: "Заповніть пропуски: Граматичні трансформації 2"
  instruction: "Вставте правильні слова або форми для завершення конструкцій."
  items:
    - sentence: "_________ своє складне завдання, він нарешті пішов додому."
      answer: "Виконавши"
      options: ["Виконавши", "Виконуючи", "Виконав", "Виконуючий"]
      explanation: "Дієприслівник доконаного виду вказує на послідовність дій."
    - sentence: "Питання, яке сильно наболіло, суспільство називає _________ питанням."
      answer: "наболілим"
      options: ["наболілим", "наболівшим", "наболіючим", "наболіло"]
      explanation: "Форма на -лий є абсолютно питомою для української мови."
    - sentence: "Коли вимкнули світло, нас у кімнаті було _________."
      answer: "четверо"
      options: ["четверо", "чотири", "четверті", "чотирьох"]
      explanation: "Збірні числівники часто і дуже природно використовуються самостійно."
    - sentence: "Усі ці чудові та якісні речі давно _________ в Україні."
      answer: "зроблено"
      options: ["зроблено", "зроблені", "зроблений", "зробили"]
      explanation: "Безособова форма фокусує увагу на якості товару, а не на робітниках."
    - sentence: "Наша комісія розглянула це питання і прийняла _________ рішення."
      answer: "остаточне"
      options: ["остаточне", "остаточно", "останнє", "остаточних"]
      explanation: "Активна конструкція з прямим порядком слів."
    - sentence: "Сьогодні я плідно працюю з _________ досвідченими фахівцями."
      answer: "п'ятьма"
      options: ["п'ятьма", "п'ятеро", "п'ятьох", "п'ять"]
      explanation: "В орудному відмінку збірні форми перетворюються на кількісні."
    - sentence: "Ми відвідали старовинний замок і побачили чудово _________ палац."
      answer: "відреставрований"
      options: ["відреставрований", "чудовий", "відреставрували", "чудового"]
      explanation: "Пасивний дієприкметник узгоджується з іменником 'палац'."
    - sentence: "Вона змогла написати великий звіт без _________ граматичної помилки."
      answer: "жодної"
      options: ["жодної", "жодного", "ніякої", "ніякого"]
      explanation: "Заперечний займенник посилює якість результату."

- type: match-up
  title: "Терміни та концепції: Знайдіть пару"
  instruction: "З'єднайте граматичні терміни з їхніми правильними характеристиками."
  pairs:
    - left: "Дієприслівник недоконаного виду"
      right: "Виражає паралельну одночасну дію"
    - left: "Дієприслівник доконаного виду"
      right: "Виражає логічну завершену послідовність"
    - left: "Dangling participle"
      right: "Помилка відірваного від підмета звороту"
    - left: "Активний стан"
      right: "Робить речення динамічним та енергійним"
    - left: "Форма на -но, -то"
      right: "Констатує результат без вказівки на особу"
    - left: "Clashed agents"
      right: "Помилка додавання виконавця до безособової форми"
    - left: "Калька дієприкметника"
      right: "Штучне слово на зразок 'бажаючий' або 'бігучий'"
    - left: "Кордоцентризм"
      right: "Осмислення світу через призму емоцій та серця"
    - left: "Збірний числівник"
      right: "Має суворі обмеження і не поєднується з жіночим родом"
    - left: "Дієслівний демінутив"
      right: "Пестлива форма дії, наприклад, 'їстоньки'"

- type: unjumble
  title: "Побудова ускладнених речень 1"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити грамотні українські речення."
  items:
    - words: ["Коли", "я", "йшов", "додому,", "почався", "сильний", "дощ."]
      answer: "Коли я йшов додому, почався сильний дощ."
    - words: ["Новий", "керівник", "успішно", "вирішив", "цю", "складну", "проблему."]
      answer: "Новий керівник успішно вирішив цю складну проблему."
    - words: ["Цю", "фінансову", "заяву", "написано", "без", "жодної", "помилки."]
      answer: "Цю фінансову заяву написано без жодної помилки."
    - words: ["У", "старому", "парку", "ми", "збирали", "пожовкле", "листя."]
      answer: "У старому парку ми збирали пожовкле листя."
    - words: ["У", "простору", "кімнату", "раптом", "зайшли", "троє", "друзів."]
      answer: "У простору кімнату раптом зайшли троє друзів."
    - words: ["Ми", "дуже", "плідно", "розмовляли", "з", "п'ятьма", "фахівцями."]
      answer: "Ми дуже плідно розмовляли з п'ятьма фахівцями."

- type: unjumble
  title: "Побудова ускладнених речень 2"
  instruction: "Продовжуйте конструювати речення з правильним використанням зворотів."
  items:
    - words: ["Студент", "читав", "конспект,", "виписуючи", "всі", "незрозумілі", "терміни."]
      answer: "Студент читав конспект, виписуючи всі незрозумілі терміни."
    - words: ["Зрозумівши", "свою", "помилку,", "юрист", "швидко", "виправив", "розрахунки."]
      answer: "Зрозумівши свою помилку, юрист швидко виправив розрахунки."
    - words: ["Ми", "підійшли", "до", "масивних", "зачинених", "дерев'яних", "дверей."]
      answer: "Ми підійшли до масивних зачинених дерев'яних дверей."
    - words: ["Розроблений", "нашими", "фахівцями", "проєкт", "отримав", "міжнародну", "нагороду."]
      answer: "Розроблений нашими фахівцями проєкт отримав міжнародну нагороду."
    - words: ["Наш", "малюк", "вже", "дуже", "сильно", "хоче", "спатоньки."]
      answer: "Наш малюк вже дуже сильно хоче спатоньки."
    - words: ["Вона", "витратила", "одну", "другу", "свого", "річного", "бюджету."]
      answer: "Вона витратила одну другу свого річного бюджету."

- type: error-correction
  title: "Редакторський контроль: Виправте помилки"
  instruction: "Знайдіть і виправте типові граматичні та стилістичні помилки в поданих реченнях."
  items:
    - sentence: "Розробляючи проєкт, студентами було враховано всі важливі деталі."
      error: "студентами було враховано"
      answer: "студенти врахували"
      options: ["студенти врахували", "студентам було враховано", "враховано студентами", "врахували студентами"]
      explanation: "Дієприслівниковий зворот має узгоджуватися з активним підметом."
    - sentence: "У великій залі сиділо багато читаючих студентів."
      error: "читаючих"
      answer: "які читали"
