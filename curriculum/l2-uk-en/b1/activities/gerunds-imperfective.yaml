version: '1.0'
module: gerunds-imperfective
level: b1
inline:
- id: fill-in-gerund-formation
  type: fill-in
  instruction: Вставте правильну форму дієприслівника недоконаного виду.
  items:
  - sentence: Вона працювала за комп'ютером, _____ гарячу каву.
    answer: п'ючи
    options:
    - п'ючи
    - п'юча
    - пити
  - sentence: _____ цікаву статтю, студент робив нотатки в зошиті.
    answer: читаючи
    options:
    - читаючи
    - читавши
    - читаючі
  - sentence: Ми гуляли містом, весело _____.
    answer: розмовляючи
    options:
    - розмовляючи
    - розмовлявши
    - розмовляючі
  - sentence: _____ на запитання викладача, він почувався дуже впевнено.
    answer: відповідаючи
    options:
    - відповідаючи
    - відповідавши
    - відповідаючі
  - sentence: Діти бігали подвір'ям, радісно _____.
    answer: усміхаючись
    options:
    - усміхаючись
    - усміхаючися
    - усміхавшися
  - sentence: Він довго стояв біля вікна, задумливо _____ на нічне місто.
    answer: дивлячись
    options:
    - дивлячись
    - дивлячися
    - дивившись
- id: match-gerund-conjugations
  type: match-up
  instruction: З'єднайте дієслово з правильною формою дієприслівника недоконаного
    виду.
  pairs:
  - left: читати
    right: читаючи
  - left: писати
    right: пишучи
  - left: говорити
    right: говорячи
  - left: стояти
    right: стоячи
  - left: сидіти
    right: сидячи
  - left: усміхатися
    right: усміхаючись
  - left: хвилюватися
    right: хвилюючись
  - left: дивитися
    right: дивлячись
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант відповіді на запитання з граматики.
  items:
  - question: Яку синтаксичну роль у реченні найчастіше виконує дієприслівник?
    options:
    - Підмет
    - Присудок
    - Означення
    - Обставина
    correct: 3
  - question: На яке запитання завжди відповідає дієприслівник недоконаного виду?
    options:
    - Який? Яка?
    - Що роблячи?
    - Що зробивши?
    - Що робити?
    correct: 1
  - question: За допомогою якого суфікса утворюється дієприслівник від дієслова «читати»?
    options:
    - -учи
    - -ючи
    - -ачи
    - -ячи
    correct: 1
  - question: Оберіть правильну форму дієприслівника від зворотного дієслова «усміхатися».
    options:
    - усміхаючися
    - усміхавшися
    - усміхаючись
    - усміхаючісь
    correct: 2
  - question: Що саме виражає дієприслівник недоконаного виду?
    options:
    - Дію, яка відбулася в далекому минулому
    - Додаткову дію, яка є одночасною з основною
    - Характерну ознаку предмета за певною дією
    - Дію, яка повністю завершилася до основної
    correct: 1
  - question: У якому з цих речень допущено грубу помилку (неузгодженість логічного
      підмета)?
    options:
    - Слухаючи музику, я інтенсивно працював.
    - Повертаючись додому, я зустрів старого друга.
    - Читаючи статтю, він робив детальні нотатки.
    - Відчинивши вікно, в кімнату залетів птах.
    correct: 3
workbook:
- id: wb-group-sort
  type: group-sort
  instruction: Розподіліть запропоновані слова на дієприслівники та дієприкметники.
  groups:
  - label: Дієприслівники (що роблячи?)
    items:
    - читаючи
    - пишучи
    - стоячи
    - усміхаючись
    - хвилюючись
  - label: Дієприкметники (який? які?)
    items:
    - читаючі
    - написаний
    - стоячий
    - усміхнений
    - схвильований
- id: wb-translate
  type: translate
  instruction: Оберіть найбільш влучний український переклад для англійської фрази
    з -ing.
  items:
  - source: while reading a book
    options:
    - text: читаючи книгу
      correct: true
    - text: читаючі книгу
      correct: false
    - text: прочитавши книгу
      correct: false
    - text: читати книгу
      correct: false
  - source: while listening to music
    options:
    - text: слухаючи музику
      correct: true
    - text: слухаючі музику
      correct: false
    - text: послухавши музику
      correct: false
    - text: слухати музику
      correct: false
  - source: while standing near the window
    options:
    - text: стоячи біля вікна
      correct: true
    - text: стояти біля вікна
      correct: false
    - text: постоявши біля вікна
      correct: false
    - text: стоячі біля вікна
      correct: false
  - source: while smiling happily
    options:
    - text: радісно усміхаючись
      correct: true
    - text: радісно усміхаючісь
      correct: false
    - text: радісно усміхнувшись
      correct: false
    - text: радісний усміхнений
      correct: false
  - source: while running in the park
    options:
    - text: біжучи в парку
      correct: true
    - text: бігаючи в парку
      correct: false
    - text: бігти в парку
      correct: false
    - text: біжучі в парку
      correct: false
  - source: while working at the office
    options:
    - text: працюючи в офісі
      correct: true
    - text: працювавши в офісі
      correct: false
    - text: попрацювавши в офісі
      correct: false
    - text: працювати в офісі
      correct: false
- id: wb-unjumble
  type: unjumble
  instruction: Складіть правильні речення з розкиданих слів. Зверніть увагу на пунктуацію
    (комами виділяється дієприслівниковий зворот).
  items:
  - words:
    - музику,
    - готувала
    - Марія,
    - слухаючи
    - обід.
    correct_order:
    - Марія,
    - слухаючи
    - музику,
    - готувала
    - обід.
    hint: Дієприслівниковий зворот виділяється комами з обох боків, якщо він стоїть
      усередині речення.
  - words:
    - у
    - Він
    - вікно.
    - каву,
    - пив
    - дивлячись
    correct_order:
    - Він
    - пив
    - каву,
    - дивлячись
    - у
    - вікно.
  - words:
    - додому,
    - я
    - друга.
    - зустрів
    - Йдучи
    correct_order:
    - Йдучи
    - додому,
    - я
    - зустрів
    - друга.
  - words:
    - ми
    - Відпочиваючи
    - води,
    - біля
    - шум
    - річки.
    - слухали
    correct_order:
    - Відпочиваючи
    - біля
    - води,
    - ми
    - слухали
    - шум
    - річки.
  - words:
    - в
    - новини.
    - автобусі,
    - я
    - читав
    - Їдучи
    correct_order:
    - Їдучи
    - в
    - автобусі,
    - я
    - читав
    - новини.
  - words:
    - радісно
    - Парком
    - дівчина,
    - йшла
    - усміхаючись.
    correct_order:
    - Парком
    - йшла
    - дівчина,
    - радісно
    - усміхаючись.
- type: essay-response
  prompt: 'Напишіть 5 речень, описуючи паралельні дії за допомогою нової лексики з
    розділу «Творення дієприслівників недоконаного виду» (наприклад: снідаючи, слухаючи,
    йдучи, працюючи).'
  min_words: 50
  model_answer: 1. Снідаючи, я завжди слухаю останні новини по радіо. 2. Ідучи на
    роботу, я часто слухаю улюблений плейлист у навушниках. 3. Працюючи за комп'ютером,
    він зазвичай п'є гарячу каву. 4. Читаючи цікаву книгу, вона абсолютно забуває
    про час. 5. Гуляючи великим міським парком, ми розмовляли про нашу майбутню відпустку.
  evaluation_criteria:
  - Правильне утворення дієприслівників недоконаного виду (суфікси -учи/-ючи, -ачи/-ячи,
    -сь).
  - Чітке дотримання правила спільного підмета для основної та додаткової дій.
  - Написано мінімум 5 речень.
