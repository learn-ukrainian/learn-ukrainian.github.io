version: '1.0'
module: gerunds-imperfective
level: b1
inline:
- id: reading-identifying-gerunds
  type: reading
  instruction: Прочитайте текст про дієприслівник і дайте відповіді на запитання.
  passage: 'Дієприслівник — це незмінювана форма дієслова, яка означає додаткову дію
    і пояснює, як, коли або чому відбувається основна дія. Вона завжди залежить від
    дієслова-присудка і відповідає на питання «що роблячи?». Найважливіше правило:
    дієприслівник і основне дієслово завжди повинні мати спільний логічний підмет.
    Наприклад: «Слухаючи музику, я не помічаю втоми».'
  questions:
  - Яку дію означає дієприслівник — основну чи додаткову?
  - На яке питання відповідає дієприслівник недоконаного виду?
  - Що таке правило спільного логічного підмета?
- id: fill-in-gerund-formation
  type: fill-in
  instruction: Вставте правильну граматичну форму дієприслівника недоконаного виду.
  items:
  - sentence: Вони пишуть лист, _____ про свої новини.
    answer: розповідаючи
    options:
    - розповідаючи
    - розповідати
    - розповідають
    - розповідавши
  - sentence: Дівчина йшла вулицею, радісно _____.
    answer: усміхаючись
    options:
    - усміхаючись
    - усміхаються
    - усміхаючися
    - усміхатися
  - sentence: Хлопець читав книгу, _____ на дивані.
    answer: сидячи
    options:
    - сидячи
    - сидіти
    - сидять
    - сидівши
  - sentence: _____ музику, я готував вечерю.
    answer: Слухаючи
    options:
    - Слухаючи
    - Слухати
    - Слухають
    - Слухавши
  - sentence: Він працював, _____ у вікно.
    answer: дивлячись
    options:
    - дивлячись
    - дивляться
    - дивлячися
    - дивитися
  - sentence: _____ додому, ми розмовляли про кіно.
    answer: Йдучи
    options:
    - Йдучи
    - Йти
    - Йдуть
    - Йшовши
- id: match-gerund-conjugations
  type: match-up
  instruction: З'єднайте дієслово з його формою дієприслівника недоконаного виду.
  pairs:
  - left: читати (читають)
    right: читаючи
  - left: писати (пишуть)
    right: пишучи
  - left: стояти (стоять)
    right: стоячи
  - left: бачити (бачать)
    right: бачачи
  - left: усміхатися (усміхаються)
    right: усміхаючись
  - left: хвилюватися (хвилюються)
    right: хвилюючись
- id: essay-gerund-situations
  type: essay-response
  instruction: Напишіть 5 речень про ваш ранок.
  prompt: 'Складіть п''ять речень про ваш звичайний ранок. У кожному реченні обов''язково
    використовуйте дієприслівник недоконаного виду (наприклад: прокидаючись, снідаючи,
    слухаючи).'
  min_words: 50
  model_answer: Прокидаючись рано-вранці, я одразу відчиняю вікно. Слухаючи радіо,
    я готую собі смачний сніданок. Снідаючи, я переглядаю останні новини в телефоні.
    Збираючись на роботу, я думаю про плани на день. Ідучи вулицею до зупинки, я насолоджуюся
    свіжим ранковим повітрям.
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте граматичні помилки в реченнях.
  items:
  - sentence: Вона радісно усміхалася, читаючі цікаву книгу.
    error: читаючі
    correction: читаючи
    error_type: word
    options:
    - читаючи
    - читавши
    - читаючий
    - читати
    explanation: Дієприслівники недоконаного виду є незмінюваними і закінчуються на
      'и' (суфікс -ючи).
  - sentence: Ми йшли парком, голосно сміючися.
    error: сміючися
    correction: сміючись
    error_type: word
    options:
    - сміючись
    - сміявся
    - сміявшись
    - сміються
    explanation: Зворотна частка '-ся' після голосної завжди перетворюється на коротку
      м'яку форму '-сь'.
  - sentence: Студенти відповідали на питання, стоячі біля дошки.
    error: стоячі
    correction: стоячи
    error_type: word
    options:
    - стоячи
    - стоявши
    - стоять
    - стояти
    explanation: Дієприслівник закінчується на 'и'. Форма на 'і' — це дієприкметник.
  - sentence: Він пив каву, дивлячися у вікно.
    error: дивлячися
    correction: дивлячись
    error_type: word
    options:
    - дивлячись
    - дивившись
    - дивлячі
    - дивитися
    explanation: Замість повної зворотної частки '-ся' використовується коротка '-сь'.
  - sentence: Вчитель пояснював правило, малюючі схему.
    error: малюючі
    correction: малюючи
    error_type: word
    options:
    - малюючи
    - малювавши
    - малюють
    - малювати
    explanation: Правильний суфікс дієприслівника — '-ючи', з літерою 'и' в кінці.
  - sentence: Діти бігали по двору, граючі у квача.
    error: граючі
    correction: граючи
    error_type: word
    options:
    - граючи
    - гравши
    - грають
    - грати
    explanation: Дієприслівник недоконаного виду завжди має літеру 'и' наприкінці.
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант.
  items:
  - question: Що обов'язково повинні мати дієприслівник і основне дієслово?
    options:
    - Спільний логічний підмет
    - Спільний час
    - Однакові закінчення
    - Один корінь
    correct: 0
  - question: Який суфікс використовується для дієслів першої дієвідміни після голосного
      (наприклад, 'читати' - 'читають')?
    options:
    - -учи
    - -ючи
    - -ачи
    - -ячи
    correct: 1
  - question: Як правильно утворити дієприслівник недоконаного виду від слова 'усміхатися'?
    options:
    - усміхаючі
    - усміхаючись
    - усміхаючися
    - усміхнувшись
    correct: 1
  - question: Який з цих прикладів містить типову синтаксичну помилку («висячий» дієприслівник)?
    options:
    - Йдучи додому, я зустрів друга.
    - Читаючи, він радісно усміхався.
    - Снідаючи, я слухаю новини.
    - Йдучи по вулиці, почався дощ.
    correct: 3
  - question: Який суфікс використовується для дієслів другої дієвідміни (наприклад,
      'сидіти' - 'сидять')?
    options:
    - -ячи
    - -учи
    - -ючи
    - -ачи
    correct: 0
  - question: Як найпростіше відрізнити дієприслівник від дієприкметника?
    options:
    - Він завжди має закінчення -ий, -а, -е.
    - Він відповідає на питання 'який?'.
    - Він абсолютно незмінюваний.
    - Він описує предмет, а не дію.
    correct: 2
workbook:
- id: wb-group-sort-conjugations
  type: group-sort
  instruction: Розподіліть дієприслівники за типами суфіксів (І та ІІ дієвідміна).
  groups:
  - label: Суфікси -учи / -ючи (І дієвідміна)
    items:
    - читаючи
    - пишучи
    - несучи
    - слухаючи
    - працюючи
    - знаючи
  - label: Суфікси -ачи / -ячи (ІІ дієвідміна)
    items:
    - сидячи
    - стоячи
    - бачачи
    - лежачи
    - дивлячись
    - говорячи
- id: wb-true-false
  type: true-false
  instruction: Визначте, чи є твердження правильними.
  items:
  - statement: Дієприслівник недоконаного виду означає дію, яка відбувається одночасно
      з основною.
    correct: true
    explanation: Форма недоконаного виду завжди виражає одночасність.
  - statement: Дієприслівник може змінюватися за родами та числами.
    correct: false
    explanation: Дієприслівник є абсолютно незмінюваною формою.
  - statement: У реченні дієприслівник завжди виконує роль обставини.
    correct: true
    explanation: Він пояснює як, коли або чому відбувається основна дія.
  - statement: Після голосних зворотна частка '-ся' зберігає свою повну форму.
    correct: false
    explanation: Вона перетворюється на коротку м'яку форму '-сь' (наприклад, усміхаючись).
  - statement: Дієприслівники від слів другої дієвідміни утворюються за допомогою
      суфіксів -ачи, -ячи.
    correct: true
    explanation: 'Наприклад: сидять -> сидячи.'
  - statement: Речення «Читаючи книгу, на вулиці стемніло» граматично правильне.
    correct: false
    explanation: Це помилка «висячого» дієприслівника, оскільки підмети (я і вулиця/темрява)
      не збігаються.
- id: wb-fill-in-aspects
  type: fill-in
  instruction: Доповніть речення правильними дієприслівниками з поданих варіантів.
  items:
  - sentence: _____ новий матеріал, вчитель наводив багато прикладів.
    answer: Пояснюючи
    options:
    - Пояснюючи
    - Пояснюють
    - Пояснити
    - Пояснювавши
  - sentence: Студенти уважно слухали, _____ нотатки в зошитах.
    answer: роблячи
    options:
    - роблячи
    - робити
    - роблять
    - робивши
  - sentence: _____ в парку, я зустрів свого давнього друга.
    answer: Гуляючи
    options:
    - Гуляючи
    - Гуляють
    - Гуляти
    - Гулявши
  - sentence: Вона дивилася цікавий фільм, _____ на дивані.
    answer: відпочиваючи
    options:
    - відпочиваючи
    - відпочивають
    - відпочивати
    - відпочивавши
  - sentence: _____ до іспиту, ми повторювали всі правила.
    answer: Готуючись
    options:
    - Готуючись
    - Готуватися
    - Готуються
    - Готуючися
  - sentence: Хлопчик біг додому, гірко _____.
    answer: плачучи
    options:
    - плачучи
    - плакати
    - плачуть
    - плакавши
- id: wb-translate
  type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: while reading
    options:
    - text: читаючи
      correct: true
    - text: читати
      correct: false
  - source: while listening
    options:
    - text: слухаючи
      correct: true
    - text: слухати
      correct: false
  - source: while standing
    options:
    - text: стоячи
      correct: true
    - text: стоять
      correct: false
  - source: while smiling
    options:
    - text: усміхаючись
      correct: true
    - text: усміхатися
      correct: false
  - source: while running
    options:
    - text: біжучи
      correct: true
    - text: бігти
      correct: false
  - source: while sitting
    options:
    - text: сидячи
      correct: true
    - text: сидіти
      correct: false
- id: wb-unjumble
  type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - музику,
    - я
    - Слухаючи
    - відпочиваю.
    correct_order:
    - Слухаючи
    - музику,
    - я
    - відпочиваю.
  - words:
    - усміхаючись.
    - на
    - Він
    - мене,
    - дивився
    correct_order:
    - Він
    - дивився
    - на
    - мене,
    - усміхаючись.
  - words:
    - вона
    - п'є
    - книгу,
    - Читаючи
    - каву.
    correct_order:
    - Читаючи
    - книгу,
    - вона
    - п'є
    - каву.
  - words:
    - ми
    - про
    - Йдучи
    - говорили
    - додому,
    - роботу.
    correct_order:
    - Йдучи
    - додому,
    - ми
    - говорили
    - про
    - роботу.
  - words:
    - сніданок.
    - я
    - готую
    - радіо,
    - Слухаючи
    correct_order:
    - Слухаючи
    - радіо,
    - я
    - готую
    - сніданок.
  - words:
    - телефон.
    - у
    - дивлячись
    - Вона
    - йшла,
    correct_order:
    - Вона
    - йшла,
    - дивлячись
    - у
    - телефон.
