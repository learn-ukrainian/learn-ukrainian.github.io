- type: select
  title: "Оберіть усі правильні відповіді"
  instruction: "У кожному завданні може бути кілька правильних відповідей. Знайдіть їх усі."
  items:
    - question: "Які з цих конструкцій виражають допустовий зв'язок (поступку)? Оберіть усі правильні."
      min_correct: 3
      explanation: "Слова 'незважаючи на', 'попри те що', 'хоча' виражають поступку."
      options:
        - text: "незважаючи на"
          correct: true
        - text: "завдяки тому що"
          correct: false
        - text: "попри те що"
          correct: true
        - text: "через те що"
          correct: false
        - text: "хоча"
          correct: true
    - question: "Які слова та фрази найкраще підходять для розмовного регістра?"
      min_correct: 3
      explanation: "Для розмовної мови типовими є короткі та емоційні фрази 'хоч би як', 'хоча б', 'все одно'."
      options:
        - text: "хоч би як"
          correct: true
        - text: "незважаючи на те що"
          correct: false
        - text: "хоча б"
          correct: true
        - text: "все одно"
          correct: true
        - text: "тим не менш"
          correct: false
    - question: "У яких реченнях слово 'незважаючи' / 'не зважаючи' написано ПРАВИЛЬНО?"
      min_correct: 2
      explanation: "Прийменник пишеться разом ('незважаючи на біль'), дієприслівник (ігноруючи) - окремо ('не зважаючи на калюжі')."
      options:
        - text: "Незважаючи на біль, він усміхався."
          correct: true
        - text: "Не зважаючи на біль, він усміхався."
          correct: false
        - text: "Вона йшла, не зважаючи на калюжі."
          correct: true
        - text: "Вона йшла, незважаючи на калюжі."
          correct: false
    - question: "Які прийменники є синонімами до слова 'попри'?"
      min_correct: 2
      explanation: "Синонімами є 'незважаючи на' та 'всупереч'."
      options:
        - text: "незважаючи на"
          correct: true
        - text: "всупереч"
          correct: true
        - text: "відповідно до"
          correct: false
        - text: "згідно з"
          correct: false
    - question: "Які парні сполучники є характерними для офіційного академічного стилю?"
      min_correct: 2
      explanation: "В академічному стилі часто використовують пари 'хоча ... проте' та 'хоча ... однак'."
      options:
        - text: "хоча ... проте"
          correct: true
        - text: "як ... так і"
          correct: false
        - text: "хоча ... однак"
          correct: true
        - text: "чим ... тим"
          correct: false
    - question: "Які з цих речень містять русизми або кальки?"
      min_correct: 2
      explanation: "Вирази 'не дивлячись на' (у значенні поступки) та 'самий кращий' є типовими помилками."
      options:
        - text: "Не дивлячись на погану погоду, ми поїхали на море."
          correct: true
