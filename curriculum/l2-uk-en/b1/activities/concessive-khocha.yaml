- type: quiz
  title: "Перевірте знання: допустові речення"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яке з цих слів є правильним прийменником для вираження поступки?"
      explanation: "Слово 'незважаючи' разом з 'на' утворює правильний прийменник допусту."
      options:
        - text: "незважаючи на"
          correct: true
        - text: "не дивлячись на"
          correct: false
        - text: "ігноруючи"
          correct: false
        - text: "хоча б"
          correct: false
    - question: "Який допустовий сполучник має виразний літературний або архаїчний відтінок?"
      explanation: "Сполучник 'дарма що' є стилістично маркованим і звучить дещо архаїчно."
      options:
        - text: "дарма що"
          correct: true
        - text: "хоча"
          correct: false
        - text: "попри"
          correct: false
        - text: "незважаючи на"
          correct: false
    - question: "Якого відмінка іменників вимагає після себе прийменник 'попри'?"
      explanation: "Прийменник 'попри' завжди вимагає знахідного відмінка."
      options:
        - text: "знахідного"
          correct: true
        - text: "родового"
          correct: false
        - text: "давального"
          correct: false
        - text: "орудного"
          correct: false
    - question: "Як правильно написати слово в дужках: (Не)зважаючи на дощ, ми пішли?"
      explanation: "У значенні прийменника допусту частка 'не' пишеться разом: 'незважаючи'."
      options:
        - text: "незважаючи"
          correct: true
        - text: "не зважаючи"
          correct: false
        - text: "не-зважаючи"
          correct: false
        - text: "не зважаю чи"
          correct: false
    - question: "Яка конструкція найкраще підходить для емоційного підсилення перешкоди?"
      explanation: "Фраза 'хоч би' (або 'хоч би як') надає висловлюванню сильного емоційного забарвлення."
      options:
        - text: "хоч би як"
          correct: true
        - text: "але"
          correct: false
        - text: "дарма що"
          correct: false
        - text: "проте"
          correct: false
    - question: "Що означає поширена розмовна конструкція 'хоча б' у реченні?"
      explanation: "Конструкція 'хоча б' використовується для вираження мінімальної прийнятної вимоги."
      options:
        - text: "мінімальну вимогу"
          correct: true
        - text: "абсолютну заборону"
          correct: false
        - text: "головну причину"
          correct: false
        - text: "логічний наслідок"
          correct: false
    - question: "З яким словом найчастіше утворює пару сполучник 'хоча' в офіційних текстах?"
      explanation: "В офіційному стилі часто використовують парний сполучник 'хоча ... проте'."
      options:
        - text: "проте"
          correct: true
        - text: "тому"
          correct: false
        - text: "наче"
          correct: false
        - text: "ніби"
          correct: false
    - question: "Яке з цих речень містить типову граматичну помилку (кальку)?"
      explanation: "Конструкція 'не дивлячись на' є калькою з російської. Правильно казати 'незважаючи на' або 'попри'."
      options:
        - text: "Не дивлячись на втому, він працював."
          correct: true
        - text: "Попри втому, він працював далі."
          correct: false
        - text: "Незважаючи на втому, він працював."
          correct: false
        - text: "Хоча він втомився, він працював."
          correct: false

- type: fill-in
  title: "Доповніть речення: сполучники та прийменники"
  instruction: "Оберіть правильне слово для кожного пропуску."
  items:
    - sentence: "Ми вирішили продовжити нашу подорож, незважаючи ___ сильний вітер."
      answer: "на"
      options: ["на", "в", "під", "через"]
      explanation: "Прийменник 'незважаючи на' завжди використовується разом із часткою 'на'."
    - sentence: "Цей кандидат отримав посаду, ___ те що мав мало досвіду."
      answer: "попри"
      options: ["попри", "хоча", "але", "тому"]
      explanation: "Конструкція 'попри те що' є правильною та часто використовується в офіційному стилі."
    - sentence: "Я зателефоную тобі ввечері, ___ б на кілька хвилин."
      answer: "хоча"
      options: ["хоча", "попри", "навіть", "дарма"]
      explanation: "Конструкція 'хоча б' виражає мінімальну умову."
    - sentence: "Проєкт буде завершено вчасно, ___ всі технічні труднощі."
      answer: "попри"
      options: ["попри", "проте", "однак", "хоч"]
      explanation: "Прийменник 'попри' вимагає після себе іменник у знахідному відмінку (труднощі)."
    - sentence: "Хоча вона дуже старалася, ___ результат був не найкращим."
      answer: "проте"
      options: ["проте", "тому", "попри", "ніби"]
      explanation: "Парний сполучник 'хоча ... проте' ідеально підходить для цього контрасту."
    - sentence: "Він пройшов повз мене, навіть не ___ на моє привітання."
      answer: "зважаючи"
      options: ["зважаючи", "незважаючи", "дивлячись", "бачачи"]
      explanation: "Тут дія означає 'ігнорувати', тому дієприслівник з часткою 'не' пишеться окремо."
    - sentence: "___ що він був молодим, його поважали всі в селі."
      answer: "Дарма"
      options: ["Дарма", "Попри", "Хоча", "Тільки"]
      explanation: "Літературний сполучник 'дарма що' часто зустрічається в художніх текстах."
    - sentence: "Ми маємо закінчити цей звіт сьогодні, хоч би ___ складно це було."
      answer: "як"
      options: ["як", "так", "що", "де"]
      explanation: "Конструкція 'хоч би як' використовується для емоційного підсилення."

- type: match-up
  title: "Знайдіть пару: початок і кінець речення"
  instruction: "З'єднайте частини речень так, щоб утворилися логічні допустові структури."
  pairs:
    - left: "Хоча йшов сильний сніг,"
      right: "транспорт продовжував працювати."
    - left: "Незважаючи на втому,"
      right: "студенти уважно слухали лекцію."
    - left: "Попри високу ціну,"
      right: "ми вирішили купити ці квитки."
    - left: "Хоча переговори були складними,"
      right: "сторони дійшли компромісу."
    - left: "Зателефонуй мені завтра,"
      right: "хоча б на п'ять хвилин."
    - left: "Хоч би як він старався,"
      right: "рішення комісії залишилося незмінним."
    - left: "Вона пройшла повз нас,"
      right: "не зважаючи на наші крики."
    - left: "Дарма що літо надворі,"
      right: "а вода в річці дуже холодна."

- type: unjumble
  title: "Складіть допустові речення"
  instruction: "Розташуйте слова в правильному порядку, щоб утворити речення."
  items:
    - words: ["Незважаючи", "на", "дощ,", "ми", "пішли", "гуляти."]
      answer: "Незважаючи на дощ, ми пішли гуляти."
    - words: ["Попри", "всі", "перешкоди,", "проєкт", "було", "успішно", "завершено."]
      answer: "Попри всі перешкоди, проєкт було успішно завершено."
    - words: ["Хоча", "було", "пізно,", "програмісти", "продовжували", "писати", "код."]
      answer: "Хоча було пізно, програмісти продовжували писати код."
    - words: ["Ми", "маємо", "захищати", "свою", "позицію,", "хоч", "би", "як", "складно", "це", "було."]
      answer: "Ми маємо захищати свою позицію, хоч би як складно це було."
    - words: ["Дарма", "що", "він", "молодий,", "а", "вже", "має", "багато", "досвіду."]
      answer: "Дарма що він молодий, а вже має багато досвіду."
    - words: ["Вона", "пройшла", "повз,", "абсолютно", "не", "зважаючи", "на", "мої", "слова."]
      answer: "Вона пройшла повз, абсолютно не зважаючи на мої слова."

- type: error-correction
  title: "Виправте помилки: кальки та орфографія"
  instruction: "Знайдіть помилку в реченні та оберіть правильний варіант."
  items:
    - sentence: "Не дивлячись на високу ціну, ми вирішили орендувати цей офіс."
      error: "Не дивлячись на"
      answer: "Незважаючи на"
      error_type: "phrase"
      options: ["Незважаючи на", "Дарма що", "Хоч би", "Проте"]
      explanation: "Вираз 'не дивлячись на' є калькою. Правильно використовувати 'незважаючи на' або 'попри'."
    - sentence: "Вона вийшла з кімнати, незважаючи на його запитання."
      error: "незважаючи"
      answer: "не зважаючи"
      error_type: "word"
      options: ["не зважаючи", "попри", "ігноруючи", "хоча"]
      explanation: "Тут дія означає ігнорувати обставини, тому дієприслівник з часткою 'не' пишеться окремо."
    - sentence: "Хоча на вулиці йшов сильний дощ, тому ми пішли на прогулянку."
      error: "тому"
      answer: "проте"
      error_type: "word"
      options: ["проте", "однак", "все одно", "ніби"]
      explanation: "Після 'хоча' в головному реченні доречно використовувати протиставний сполучник 'проте', а не причиновий 'тому'."
    - sentence: "Не дивлячись ні на що, наша команда здобула перше місце."
      error: "Не дивлячись ні на що"
      answer: "Попри все"
      error_type: "phrase"
      options: ["Попри все", "Дарма що", "Хоча б", "Тому що"]
      explanation: "Уникайте кальки 'не дивлячись ні на що'. Краще сказати сучасною мовою: 'попри все'."
    - sentence: "Дарма що економіка падає, ми маємо стабільний прибуток у цьому кварталі."
      error: "Дарма що"
      answer: "Хоча"
      error_type: "register"
      options: ["Хоча", "Ніби", "Тому", "Наче"]
      explanation: "'Дарма що' має архаїчний відтінок і не підходить для сучасного ділового стилю."
    - sentence: "Наступний проєкт буде успішним, не дивлячись на всі нинішні проблеми."
      error: "не дивлячись на"
      answer: "попри"
      error_type: "phrase"
      options: ["попри", "проте", "але", "дарма"]
      explanation: "Русизм 'не дивлячись на' необхідно замінити на 'попри' або 'незважаючи на'."

- type: true-false
  title: "Правда чи брехня: граматика та стилістика"
  instruction: "Визначте, чи є твердження правильним."
  items:
    - statement: "Прийменник 'попри' є сучасною та динамічною альтернативою конструкції 'незважаючи на'."
      correct: true
      explanation: "Слово 'попри' дійсно активно використовується в медіа та публіцистиці."
    - statement: "Слово 'незважаючи' завжди пишеться разом, незалежно від контексту."
      correct: false
      explanation: "Якщо це дієприслівник, що означає 'не звертаючи уваги', він пишеться окремо ('не зважаючи')."
    - statement: "Конструкція 'не дивлячись на' є правильною літературною формою для вираження поступки."
      correct: false
      explanation: "Це поширена помилка (калька з російської). Правильно: 'незважаючи на'."
    - statement: "Сполучник 'дарма що' найкраще підходить для використання в офіційних ділових звітах."
      correct: false
      explanation: "Цей сполучник має архаїчний і літературний відтінок, його уникають у діловодстві."
    - statement: "Парні сполучники 'хоча ... проте' допомагають створити логічний баланс в академічному стилі."
      correct: true
      explanation: "Вони ідеально підходять для складних дискусій та есе."
    - statement: "Фраза 'хоча б' використовується для вираження мінімальної вимоги або побажання."
      correct: true
      explanation: "Наприклад: 'Допоможи мені хоча б порадою'."
    - statement: "Після прийменника 'незважаючи на' завжди має йти підрядне речення з дієсловом."
      correct: false
      explanation: "Після 'незважаючи на' зазвичай іде іменник у знахідному відмінку (наприклад, 'незважаючи на втому')."
    - statement: "Вираз 'хоч би як' використовується для сильного емоційного підсилення перешкоди."
      correct: true
      explanation: "Наприклад: 'Хоч би як було важко'."

