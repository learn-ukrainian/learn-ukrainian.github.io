version: '1.0'
module: participles-passive
level: b1
inline:
- id: fill-in-participle-meaning
  type: fill-in
  instruction: Вставте правильну граматичну форму (пасивний дієприкметник) у речення.
  items:
  - sentence: Це дуже цікава, нещодавно _____ книга.
    answer: прочитана
  - sentence: Ми їхали через новий, сучасно _____ міст.
    answer: збудований
  - sentence: На столі лежав гарний, власноруч _____ рушник.
    answer: вишитий
  - sentence: Усі ці речі — це якісно _____ проєкти.
    answer: зроблені
  - sentence: Вона принесла мені смачно _____ каву.
    answer: зварену
  - sentence: Крамниця була вже _____ для покупців.
    answer: відкрита
  title: Вставте правильну граматичну форму (пасивний дієприкметник) у речення.
- id: match-up-formation-suffixes
  type: match-up
  instruction: З'єднайте інфінітив дієслова з правильним пасивним дієприкметником.
  pairs:
  - left: написати
    right: написаний
  - left: збудувати
    right: збудований
  - left: принести
    right: принесений
  - left: відкрити
    right: відкритий
  - left: пофарбувати
    right: пофарбований
  - left: вимити
    right: вимитий
  title: З'єднайте інфінітив дієслова з правильним пасивним дієприкметником.
- id: error-correction-alternations
  type: error-correction
  instruction: Знайдіть і виправте помилки у творенні пасивних дієприкметників (зверніть
    увагу на чергування).
  items:
  - sentence: Цей сад був посадений моїм дідусем.
    error: посадений
    correction: посаджений
    error_type: word
    explanation: Звук [д] змінюється на [дж] перед суфіксом -ен-.
  - sentence: Кран був міцно закрутений, тому я не зміг пустити воду.
    error: закрутений
    correction: закручений
    error_type: word
    explanation: Звук [т] перетворюється на [ч] перед суфіксом -ен-.
  - sentence: Він був дуже вразений цією несподіваною новиною.
    error: вразений
    correction: вражений
    error_type: word
    explanation: Звук [з] змінюється на шиплячий [ж] перед суфіксом -ен-.
  - sentence: Увесь газон був рівно скосений ще вранці.
    error: скосений
    correction: скошений
    error_type: word
    explanation: Звук [с] змінюється на шиплячий [ш] перед суфіксом -ен-.
  - sentence: Проєкт був зробений дуже швидко та якісно.
    error: зробений
    correction: зроблений
    error_type: word
    explanation: Після губних приголосних (б) з'являється звук [л].
  - sentence: Цей квиток був купений заздалегідь через інтернет.
    error: купений
    correction: куплений
    error_type: word
    explanation: Після губних приголосних (п) з'являється звук [л].
  title: 'Знайдіть і виправте помилки у творенні пасивних дієприкметників (зверніть
    увагу '
- id: fill-in-agreement-in-case
  type: fill-in
  instruction: Вставте пасивний дієприкметник у правильному відмінку, узгоджуючи його
    з іменником.
  items:
  - sentence: Я не бачив цих _____ дверей.
    answer: зачинених
  - sentence: Завдяки _____ мосту ми швидко переїхали річку.
    answer: збудованому
  - sentence: Вона милувалася _____ рушником.
    answer: вишитим
  - sentence: Ми довго гуляли по _____ палацу.
    answer: відреставрованому
  - sentence: Я хочу купити ту _____ картину.
    answer: намальовану
  - sentence: У мене немає тексту цього _____ листа.
    answer: прочитаного
  title: Вставте пасивний дієприкметник у правильному відмінку, узгоджуючи його з
    іменник
- id: reading-syntax-roles
  type: quiz
  instruction: Визначте синтаксичну роль (функцію) виділеного пасивного дієприкметника
    або конструкції в реченні.
  items:
  - question: Я бачу новий, нещодавно **збудований** міст. Яка роль слова «збудований»?
    options:
    - Означення
    - Присудок
    - Підмет
    - Обставина
    correct: 0
  - question: Цей міст був **збудований** минулого року. Яка роль слова «збудований»?
    options:
    - Іменна частина присудка
    - Означення
    - Додаток
    - Підмет
    correct: 0
  - question: Книгу **прочитано** студентом. Чим є форма «прочитано»?
    options:
    - Безособовою формою на -но
    - Активним дієприкметником
    - Означенням
    - Іменником
    correct: 0
  - question: Ми пишаємося **зробленими** проєктами. Яка роль слова «зробленими»?
    options:
    - Означення
    - Підмет
    - Присудок
    - Обставина
    correct: 0
  - question: Двері залишалися **зачиненими**. Яка роль слова «зачиненими»?
    options:
    - Іменна частина присудка
    - Підмет
    - Означення
    - Обставина
    correct: 0
  - question: Він довго дивився на **написаний** текст. Яка роль слова «написаний»?
    options:
    - Означення
    - Присудок
    - Підмет
    - Додаток
    correct: 0
  title: Визначте синтаксичну роль (функцію) виділеного пасивного дієприкметника або
    конс
- id: quiz-participle-vs-adjective
  type: quiz
  instruction: 'Визначте, чим є виділене слово: пасивним дієприкметником чи звичайним
    прикметником (ад''єктивація)?'
  items:
  - question: На столі лежала смачна **варена** картопля.
    options:
    - Прикметник
    - Пасивний дієприкметник
    - Активний дієприкметник
    - Іменник
    correct: 0
  - question: На вечерю була **зварена** мамою картопля.
    options:
    - Пасивний дієприкметник
    - Прикметник
    - Безособова форма
    - Активний дієприкметник
    correct: 0
  - question: У магазині продається **мелена** кава.
    options:
    - Прикметник
    - Пасивний дієприкметник
    - Дієслово
    - Іменник
    correct: 0
  - question: Це щойно **змелена** баристою кава.
    options:
    - Пасивний дієприкметник
    - Прикметник
    - Активний дієприкметник
    - Прислівник
    correct: 0
  - question: Він дуже **вчена** людина.
    options:
    - Прикметник
    - Пасивний дієприкметник
    - Безособова форма
    - Дієслово
    correct: 0
  - question: Цей вірш був швидко **вивчений** учнем.
    options:
    - Пасивний дієприкметник
    - Прикметник
    - Активний дієприкметник
    - Прислівник
    correct: 0
  title: 'Визначте, чим є виділене слово: пасивним дієприкметником чи звичайним прикметник'
- id: reading
  type: reading
  instruction: Прочитайте текст про пасивні дієприкметники та дайте відповіді на запитання.
  passage: Минулого літа ми відвідали нещодавно відреставрований палац у Києві. У
    парадних залах на нас чекали дбайливо збережені інтер'єри та майстерно відновлені
    розписи на стелі. Екскурсовод показала нам залишені імператорською родиною антикварні
    меблі. На жаль, деякі зали були тимчасово зачинені на планову реконструкцію. Але
    побаченого нам точно вистачило для яскравих вражень. Усі ці речі, створені талановитими
    майстрами минулого, нагадують про велику історію нашого народу.
  questions:
  - Який палац відвідали туристи?
  - Що чекало на туристів у парадних залах?
  - Що було відновлено майстрами на стелі?
  - Які меблі показала екскурсовод?
  - Чому деякі зали не можна було відвідати?
  - Ким були створені антикварні речі?
  title: Прочитайте текст про пасивні дієприкметники та дайте відповіді на запитання.
- id: essay-response-5
  type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Творення
    пасивних дієприкметників».
  prompt: 'Опишіть вашу кімнату або робоче місце, використовуючи щонайменше 5 пасивних
    дієприкметників (наприклад: збудований, пофарбований, зачинений, куплений, зроблений).'
  min_words: 50
  model_answer: Моя кімната дуже світла і затишна. Біля стіни стоїть великий стіл,
    зроблений з темного дерева. На столі лежить відкритий зошит і залишена мною ручка.
    Нещодавно куплений комп'ютер стоїть посередині. Вікно завжди зачинене ввечері,
    а на підлозі лежить подарований друзями килим.
  title: Напишіть 5 речень, використовуючи нову лексику з розділу «Творення пасивних
    дієп
workbook:
- type: group-sort
  instruction: Розподіліть пасивні дієприкметники за суфіксом, за допомогою якого
    вони утворені.
  groups:
  - label: Суфікс -н-
    items:
    - написаний
    - прочитаний
    - збудований
    - захований
  - label: Суфікс -ен- (-єн-)
    items:
    - принесений
    - зроблений
    - запрошений
    - напоєний
  - label: Суфікс -т-
    items:
    - відкритий
    - митий
    - битий
    - взутий
  title: Розподіліть пасивні дієприкметники за суфіксом, за допомогою якого вони утворені
- type: true-false
  instruction: Визначте, чи є ці твердження про пасивні дієприкметники правильними
    (Правда) чи ні (Неправда).
  items:
  - statement: Пасивні дієприкметники описують предмет, який сам виконує дію.
    correct: false
    explanation: Ні, вони виражають ознаку предмета за дією, якої він зазнає від іншого
      виконавця.
  - statement: В українській мові пасивні дієприкметники мають лише форму минулого
      часу.
    correct: true
    explanation: Так, вони вказують на дію, яка вже завершилася.
  - statement: При творенні дієприкметників із суфіксом -ен- часто відбувається чергування
      приголосних.
    correct: true
    explanation: 'Так, наприклад: звук [т] переходить у [ч], [д] — у [дж].'
  - statement: Пасивні дієприкметники відмінюються інакше, ніж звичайні прикметники.
    correct: false
    explanation: Ні, вони відмінюються абсолютно так само, як прикметники твердої
      групи.
  - statement: У пасивних дієприкметниках української мови ніколи не пишеться подвоєне
      «нн».
    correct: true
    explanation: Так, вони завжди пишуться з однією літерою «н».
  - statement: Слово «варена» у словосполученні «варена картопля» є дієприкметником.
    correct: false
    explanation: Це прикметник (відбулася ад'єктивація). Дієприкметником буде форма
      доконаного виду «зварена».
  title: 'Визначте, чи є ці твердження про пасивні дієприкметники правильними (Правда)
    чи '
