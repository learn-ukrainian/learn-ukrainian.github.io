version: '1.0'
module: participles-passive
level: b1
inline:
- id: fill-in
  type: fill-in
  instruction: Вставте правильний пасивний дієприкметник.
  items:
  - sentence: Це дуже відомий і давно ____ міст.
    answer: збудований
    options:
    - збудований
    - прочитаний
    - відкритий
  - sentence: Книга, яку я взяв учора, вже ____.
    answer: прочитана
    options:
    - написана
    - прочитана
    - вишита
  - sentence: Лист, який приніс поштар, був ____ англійською.
    answer: написаний
    options:
    - написаний
    - зроблений
    - принесений
  - sentence: Моя нова сорочка дуже красиво ____.
    answer: вишита
    options:
    - вишита
    - відкрита
    - заметена
  - sentence: Ця складна робота була ____ ще вчора.
    answer: зроблена
    options:
    - відкрита
    - збудована
    - зроблена
  - sentence: Усі вікна у цій кімнаті були ____.
    answer: відкриті
    options:
    - відкриті
    - прочитані
    - зроблені
- id: match-up
  type: match-up
  instruction: З'єднайте інфінітив перехідного дієслова з відповідним пасивним дієприкметником.
  pairs:
  - left: побачити
    right: побачений
  - left: написати
    right: написаний
  - left: мити
    right: митий
  - left: відкрити
    right: відкритий
  - left: принести
    right: принесений
  - left: пофарбувати
    right: пофарбований
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант. Зверніть увагу на різницю між прикметниками
    та пасивними дієприкметниками.
  items:
  - question: На столі лежить ____ мамою картопля.
    options:
    - зварена
    - варена
    - варити
    - варила
    correct: 0
  - question: Це звичайна ____ картопля без солі.
    options:
    - варена
    - зварена
    - варити
    - варила
    correct: 0
  - question: Цей хліб ____ відомим пекарем.
    options:
    - випечений
    - печений
    - пекти
    - пік
    correct: 0
  - question: Я дуже люблю свіжий ____ хліб.
    options:
    - печений
    - випечений
    - пекти
    - пік
    correct: 0
  - question: Цей рахунок був ____ ще вчора.
    options:
    - сплачений
    - плачений
    - сплатити
    - платити
    correct: 0
  - question: Це ____ лист, який я залишив на столі.
    options:
    - написаний
    - писаний
    - написати
    - писати
    correct: 0
workbook:
- type: fill-in
  instruction: Вставте пасивний дієприкметник у правильній формі (узгодження з іменником).
  items:
  - sentence: Я бачу ____ відомим художником картину.
    answer: написану
    options:
    - написана
    - написану
    - написаній
    - написаною
  - sentence: У цій ____ книзі є багато цікавих розповідей.
    answer: прочитаній
    options:
    - прочитана
    - прочитану
    - прочитаній
    - прочитаною
  - sentence: Він довго стояв перед цим ____ мостом.
    answer: збудованим
    options:
    - збудований
    - збудованим
    - збудованого
    - збудованому
  - sentence: Я поклав речі на ____ стіл.
    answer: пофарбований
    options:
    - пофарбований
    - пофарбованого
    - пофарбованим
    - пофарбованому
  - sentence: Ми зайшли в нещодавно ____ залу.
    answer: відкриту
    options:
    - відкрита
    - відкриту
    - відкритій
    - відкритою
  - sentence: На ній була дуже красива ____ сорочка.
    answer: вишита
    options:
    - вишита
    - вишитих
    - вишитим
    - вишиту
- type: unjumble
  instruction: Складіть правильні речення зі слів. Зверніть увагу на пасивні дієприкметники.
  items:
  - words:
    - картина
    - висить
    - стіні
    - На
    - написана
    correct_order:
    - На
    - стіні
    - висить
    - написана
    - картина
  - words:
    - відкрите
    - завжди
    - вікно
    - Це
    correct_order:
    - Це
    - вікно
    - завжди
    - відкрите
  - words:
    - стіл
    - У
    - пофарбований
    - кутку
    - стоїть
    correct_order:
    - У
    - кутку
    - стоїть
    - пофарбований
    - стіл
  - words:
    - вже
    - рахунок
    - Цей
    - сплачений
    correct_order:
    - Цей
    - рахунок
    - вже
    - сплачений
  - words:
    - ліпнина
    - зроблена
    - Ця
    - італійськими
    - майстрами
    correct_order:
    - Ця
    - ліпнина
    - зроблена
    - італійськими
    - майстрами
  - words:
    - збудований
    - міст
    - був
    - Цей
    - давно
    correct_order:
    - Цей
    - міст
    - був
    - давно
    - збудований
- type: essay-response
  prompt: Напишіть 5 речень, описуючи вашу улюблену кімнату або будівлю. Використовуйте
    нову лексику з розділу «Творення пасивних дієприкметників» (наприклад, пофарбований,
    написаний, збудований, відкритий, зроблений).
  min_words: 50
  model_answer: Моя улюблена кімната — це світла і простора вітальня у нашому родинному
    домі. У ній є велике вікно, яке завжди відкрите влітку для свіжого повітря. На
    стіні висить дуже красива картина, написана відомим місцевим художником багато
    років тому. У центрі кімнати стоїть старий стіл, зроблений з якісного темного
    дерева. На столі завжди лежить дуже гарна вишита скатертина, яку подарувала мені
    мама. Цей будинок був збудований моїм дідусем, і тут кожна деталь зберігає пам'ять.
