    Європейські {{4}} масово будували глибокі вугільні {{5}}, засновували металургійні
    комбінати та заводи. Важка {{6}} стала головною рушійною силою економіки. Сьогодні
    ми повинні оберігати цю унікальну індустріальну {{7}}, щоб зберегти національну
    пам'ять. Мешканці регіону мають міцну робітничу {{8}}, яка поважає чесну працю.
    Завдяки спільним зусиллям формується сучасна українська {{9}}. Особливо під час
