  instruction: З'єднайте відповідні елементи.
- type: fill-in
  title: 'Заповніть пропуски: Географія та історія Сходу'
  items:
  - sentence: Харківський національний університет має статус потужного _____ центру.
    answer: академічного
    options:
    - академічного
    - промислового
    - сільського
    - військового
    explanation: Університети формують академічне середовище міста.
  - sentence: Величезна будівля Держпрому у Харкові є шедевром стилю _____.
    answer: конструктивізм
    options:
    - конструктивізм
    - бароко
    - класицизм
    - модерн
    explanation: Держпром — це відома пам'ятка конструктивізму.
  - sentence: Джон Юз заснував на сході України великий _____ завод.
    answer: металургійний
    options:
    - металургійний
    - текстильний
    - хімічний
    - харчовий
    explanation: Він був британським промисловцем і займався металургією.
  - sentence: Донецька та Луганська області разом утворюють великий індустріальний
      _____.
    answer: регіон
    options:
    - регіон
    - район
    - округ
    - квартал
    explanation: Слово регіон використовується для опису великих територій.
  - sentence: Ми повинні берегти нашу індустріальну _____, бо це пам'ять поколінь.
    answer: спадщину
    options:
    - спадщину
    - культуру
    - економіку
    - політику
    explanation: Спадщина — це те, що передається від минулих поколінь.
  - sentence: Багато людей зі сходу зараз живуть у Києві, вони мають статус _____.
    answer: переселенців
    options:
    - переселенців
    - туристів
    - студентів
    - інвесторів
    explanation: Переселенці — це люди, які змушені були переїхати через війну.
  - sentence: Під час війни Харків продемонстрував неймовірну _____ та незламність.
    answer: стійкість
    options:
    - стійкість
    - слабкість
    - пасивність
    - агресію
    explanation: Стійкість означає здатність витримувати важкі випробування.
  - sentence: База економіки Донбасу — це потужна _____ промисловість.
    answer: важка
    options:
    - важка
    - легка
    - харчова
    - дерев'яна
    explanation: Видобуток вугілля та металургія — це важка промисловість.
  - sentence: Після виходу на пенсію мій дідусь розповідав про свою роботу на _____.
    answer: шахті
    options:
    - шахті
    - полі
    - фермі
    - морі
    explanation: Шахта — це місце видобутку вугілля, типове для Донбасу.
  - sentence: Козаки засновували нові _____, де жителі не платили податків.
    answer: слободи
    options:
    - слободи
    - міста
    - фортеці
    - замки
    explanation: Слобода — це поселення, звільнене від певних податків.
