- type: quiz
  title: 'Розуміння тексту: Східний регіон'
  items:
  - question: Яка річка є головною водною артерією східного регіону України?
    explanation: Сіверський Донець живить усю територію та формує унікальні ландшафти.
    options:
    - text: Сіверський Донець
      correct: true
    - text: Дніпро
      correct: false
    - text: Південний Буг
      correct: false
    - text: Десна
      correct: false
  - question: У який період місто Харків мало статус столиці України?
    explanation: Харків був столицею Української РСР з 1919 по 1934 рік.
    options:
    - text: з 1919 по 1934 рік
      correct: true
    - text: з 1900 по 1918 рік
      correct: false
    - text: з 1945 по 1960 рік
      correct: false
    - text: з 1991 по 2004 рік
      correct: false
  - question: Що означає слово слобода в історичному контексті регіону?
    explanation: Слобода — це поселення, жителі якого звільнялися від податків.
    options:
    - text: поселення, вільне від податків
      correct: true
    - text: велика військова фортеця
      correct: false
    - text: центр видобутку вугілля
      correct: false
    - text: місто з університетом
      correct: false
  - question: Хто такий Джон Юз і яку роль він відіграв у регіоні?
    explanation: Джон Юз — британський підприємець, який заснував металургійний завод
      і місто Юзівку (Донецьк).
    options:
    - text: британський підприємець, засновник металургійного заводу
      correct: true
    - text: український письменник з Будинку Слово
      correct: false
    - text: архітектор, який збудував Держпром у Харкові
      correct: false
    - text: козацький полковник Харківського полку
      correct: false
  - question: Який архітектурний стиль яскраво представляє харківський Держпром?
    explanation: Держпром — це видатна пам'ятка архітектурного стилю конструктивізму.
    options:
    - text: конструктивізм
      correct: true
    - text: бароко
      correct: false
    - text: класицизм
      correct: false
    - text: готика
      correct: false
  - question: Як правильно сказати українською про географічне розташування Донбасу?
    explanation: З назвами регіонів українська мова вимагає використання прийменника
      на.
    options:
    - text: на Донбасі
      correct: true
    - text: в Донбасі
      correct: false
    - text: у Донбасі
      correct: false
    - text: по Донбасу
      correct: false
  - question: Яка правильна форма родового відмінка для міста Харків?
    explanation: За правилом чергування голосних у відкритому складі і змінюється
      на о.
    options:
    - text: Харкова
      correct: true
    - text: Харківа
      correct: false
    - text: Харкові
      correct: false
    - text: Харкову
      correct: false
  - question: Кого об'єднував відомий Будинок Слово у Харкові у 1920-х роках?
    explanation: У цьому будинку жили видатні українські письменники, поети та режисери.
    options:
    - text: українських митців та письменників
      correct: true
    - text: європейських промисловців та інженерів
      correct: false
    - text: студентів Харківського університету
      correct: false
    - text: козацьких старшин Слобожанщини
      correct: false
  - question: Що таке розстріляне відродження в історії України?
    explanation: Це трагічний період 1930-х років, коли радянська влада знищила українську
      інтелігенцію.
    options:
    - text: репресії проти українських митців у 1930-х роках
      correct: true
    - text: відбудова заводів після Другої світової війни
      correct: false
    - text: процес заснування нових козацьких слобід
      correct: false
    - text: будівництво перших хмарочосів у Харкові
      correct: false
  - question: Який прийменник традиційно використовується з назвою регіону Слобожанщина?
    explanation: З назвами історичних земель українською мовою використовується прийменник
      на.
    options:
    - text: на Слобожанщині
      correct: true
    - text: в Слобожанщині
      correct: false
    - text: до Слобожанщини
      correct: false
    - text: у Слобожанщині
      correct: false
