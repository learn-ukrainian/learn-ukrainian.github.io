- type: true-false
  title: 'Правда чи хиба: Факти про Схід України'
  items:
  - statement: Джон Юз був російським інженером, який заснував завод на сході України.
    correct: false
    explanation: Джон Юз був британським підприємцем, а не російським інженером.
  - statement: Слово слобода походить від поняття звільнення від податків.
    correct: true
    explanation: Слобода — це поселення, жителі якого мали податкові пільги.
  - statement: Харків ніколи не був столицею України.
    correct: false
    explanation: Харків був столицею Української РСР з 1919 по 1934 рік.
  - statement: В українській мові правильно говорити в Донбасі.
    correct: false
    explanation: Правильно говорити на Донбасі, оскільки це назва регіону.
  - statement: Будинок Слово у Харкові був побудований для проживання українських
      митців.
    correct: true
    explanation: У ньому жили видатні українські письменники та режисери 1920-х років.
  - statement: Родовий відмінок назви міста Харків звучить як Харкова.
    correct: true
    explanation: У відкритому складі голосний і змінюється на о.
  - statement: Східні регіони України розвивалися ізольовано від решти країни.
    correct: false
    explanation: Вони завжди мали глибокий органічний зв'язок з іншими українськими
      землями.
  - statement: Будівля Держпрому у Харкові збудована у стилі бароко.
    correct: false
    explanation: Держпром є яскравим представником архітектурного стилю конструктивізм.
  - statement: Харків часто називають студентською столицею України.
    correct: true
    explanation: Завдяки великій кількості університетів місто має потужну академічну
      спільноту.
  - statement: Термін важка промисловість стосується виробництва одягу та їжі.
    correct: false
    explanation: Важка промисловість — це металургія, машинобудування та видобуток
      вугілля.
