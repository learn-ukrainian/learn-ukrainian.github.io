- type: fill-in
  title: "Виберіть правильну форму дієслова"
  instruction: "Оберіть дієслово, яке правильно узгоджується з новим підметом."
  items:
    - sentence: "Директор вимагає, щоб менеджер _____ звіт сьогодні."
      answer: "підготував"
      options: ["підготував", "підготувала", "підготували", "підготувати"]
      explanation: "Менеджер (він) - чоловічий рід, однина."
    - sentence: "Я хочу, щоб моя сестра _____ мені з перекладом."
      answer: "допомогла"
      options: ["допоміг", "допомогла", "допомогли", "допомагати"]
      explanation: "Сестра (вона) - жіночий рід, однина."
    - sentence: "Викладач просить, щоб студенти _____ домашнє завдання."
      answer: "зробили"
      options: ["зробив", "зробила", "зробили", "зробити"]
      explanation: "Студенти (вони) - множина."
    - sentence: "Мати має бажання, щоб дитина _____ багато свіжих фруктів."
      answer: "їла"
      options: ["їв", "їла", "їли", "їло"]
      explanation: "Дитина (вона) - жіночий рід, однина."
    - sentence: "Ми чекаємо, щоб сонце нарешті _____."
      answer: "вийшло"
      options: ["вийшов", "вийшла", "вийшло", "вийшли"]
      explanation: "Сонце (воно) - середній рід, однина."
    - sentence: "Лікар радить, щоб пацієнт _____ більше води."
      answer: "пив"
      options: ["пив", "пила", "пили", "пити"]
      explanation: "Пацієнт (він) - чоловічий рід, однина."
    - sentence: "Я дуже прошу, щоб ти (чоловік) _____ квитки заздалегідь."
      answer: "купив"
      options: ["купив", "купила", "купили", "купиш"]
      explanation: "Звернення до чоловіка вимагає форми 'купив'."
    - sentence: "Керівник має наказ, щоб команда _____ проєкт вчасно."
      answer: "завершила"
      options: ["завершив", "завершила", "завершило", "завершили"]
      explanation: "Команда (вона) - жіночий рід, однина."

- type: error-correction
  title: "Виправте помилки в реченнях"
  instruction: "Знайдіть і виправте граматичні помилки, пов'язані з використанням структури 'щоб'."
  items:
    - sentence: "Я хочу тебе йти додому."
      error: "тебе йти"
      answer: "щоб ти пішов"
      options: ["тебе йти", "щоб ти пішов", "тобі йти", "щоб ти йдеш"]
      explanation: "Українська мова вимагає підрядного речення 'щоб ти пішов' замість прямого додатка."
    - sentence: "Лікар радить, щоб пацієнт п'є ліки."
      error: "п'є"
      answer: "пив"
      options: ["п'є", "пив", "питиме", "пити"]
      explanation: "Після сполучника 'щоб' необхідно використовувати форму минулого часу."
    - sentence: "Брат просить, щоб сестра допоміг йому."
      error: "допоміг"
      answer: "допомогла"
      options: ["допоміг", "допомогла", "допомогли", "допоможе"]
      explanation: "Дієслово має узгоджуватися з новим підметом 'сестра' (вона)."
    - sentence: "Я маю велике бажання, що всі були здорові."
      error: "що"
      answer: "щоб"
      options: ["що", "щоб", "як", "якщо"]
      explanation: "Для вираження мети та бажання використовується сполучник 'щоб'."
    - sentence: "Вчитель вимагає студентам читати текст."
      error: "студентам читати"
      answer: "щоб студенти читали"
      options: ["студентам читати", "щоб студенти читали", "студентів читати", "щоб студенти читають"]
      explanation: "Дієслово 'вимагати' часто потребує підрядного речення з 'щоб'."
    - sentence: "Вона чекає на чоловіка, щоб він купує квіти."
      error: "купує"
      answer: "купив"
      options: ["купує", "купив", "купить", "купувати"]
      explanation: "Після 'щоб' завжди використовується форма минулого часу, яка утворює умовний спосіб."
    - sentence: "Ми хочемо спокій, щоб відпочити."
      error: "спокій"
      answer: "спокою"
      options: ["спокій", "спокою", "спокоєм", "на спокій"]
      explanation: "Дієслово 'хотіти' вимагає родового відмінка для абстрактних понять."
    - sentence: "Батько хоче, щоб я (дівчина) зробив це."
      error: "зробив"
      answer: "зробила"
      options: ["зробив", "зробила", "зробили", "зробити"]
      explanation: "Узгодження має бути з виконавцем дії (я - дівчина), а не з ініціатором (батько)."

- type: error-correction
  title: "Виправте помилки узгодження"
  instruction: "У кожному реченні є помилка в роді або числі дієслова. Знайдіть її та виправте."
  items:
    - sentence: "Директорка хоче, щоб секретар (чоловік) написала лист."
      error: "написала"
      answer: "написав"
      options: ["написала", "написав", "написали", "напише"]
      explanation: "Секретар - чоловік, тому дієслово має бути чоловічого роду."
    - sentence: "Клієнт вимагає, щоб компанія повернув гроші."
      error: "повернув"
      answer: "повернула"
      options: ["повернув", "повернула", "повернули", "повернути"]
      explanation: "Компанія - жіночий рід, однина."
    - sentence: "Батьки просять, щоб син зателефонували ввечері."
      error: "зателефонували"
      answer: "зателефонував"
      options: ["зателефонували", "зателефонував", "зателефонувала", "зателефонує"]
      explanation: "Син - однина, чоловічий рід, тому не можна використовувати форму множини."
    - sentence: "Я чекаю, щоб таксі приїхав швидше."
      error: "приїхав"
      answer: "приїхало"
      options: ["приїхав", "приїхала", "приїхало", "приїхали"]
      explanation: "Таксі - середній рід, однина."
    - sentence: "Мати радить, щоб доньки більше читала."
      error: "читала"
      answer: "читали"
      options: ["читала", "читав", "читало", "читали"]
      explanation: "Доньки - множина, тому дієслово також має бути у множині."
    - sentence: "Офіцер віддав наказ, щоб солдат зупинилися."
      error: "зупинилися"
      answer: "зупинився"
      options: ["зупинилися", "зупинився", "зупинилася", "зупиниться"]
      explanation: "Солдат - однина, чоловічий рід."

- type: translate
  title: "Переклад англійських конструкцій"
  instruction: "Оберіть правильний переклад речень з англійської."
  items:
    - source: "I want you to read this book."
      options:
        - text: "Я хочу тебе читати цю книгу."
          correct: false
        - text: "Я хочу, щоб ти прочитав цю книгу."
          correct: true
        - text: "Я хочу, щоб ти читаєш цю книгу."
          correct: false
        - text: "Я хочу тобі читати цю книгу."
          correct: false
      explanation: "Англійське 'want someone to do something' завжди перекладається через 'хотіти, щоб + минулий час'."
    - source: "The doctor advises the patient to drink water."
      options:
        - text: "Лікар радить пацієнту пити воду."
          correct: false
        - text: "Лікар радить, щоб пацієнт пив воду."
          correct: true
        - text: "Лікар радить пацієнта пити воду."
          correct: false
        - text: "Лікар радить, щоб пацієнт п'є воду."
          correct: false
      explanation: "Хоча варіант з інфінітивом можливий, більш природною і точною є конструкція 'радити, щоб'."
    - source: "She asked me to help."
      options:
        - text: "Вона просила мене допомогти."
          correct: false
        - text: "Вона просила, щоб я допоміг."
          correct: true
        - text: "Вона просила, щоб я допомагаю."
          correct: false
        - text: "Вона просила мене допоміг."
          correct: false
      explanation: "Конструкція 'просити, щоб + минулий час' є стандартом для вираження таких прохань."
    - source: "They expect us to finish the project."
      options:
        - text: "Вони чекають нас завершити проєкт."
          correct: false
        - text: "Вони чекають, щоб ми завершили проєкт."
          correct: true
        - text: "Вони чекають на нас завершити проєкт."
          correct: false
        - text: "Вони чекають, щоб ми завершити проєкт."
          correct: false
      explanation: "Дієслово 'чекати' використовується з підрядним реченням для вираження очікування від інших."
    - source: "My parents work hard so that I can have a better future."
      options:
        - text: "Мої батьки працюють багато, щоб я мав краще майбутнє."
          correct: true
        - text: "Мої батьки працюють багато, щоб я маю краще майбутнє."
          correct: false
        - text: "Мої батьки працюють багато, щоб мені мати краще майбутнє."
          correct: false
        - text: "Мої батьки працюють багато для мене мати краще майбутнє."
          correct: false
      explanation: "Складнопідрядне речення мети тут ідеально передає зміст 'so that'."
    - source: "I demand that he returns the money."
      options:
        - text: "Я вимагаю його повернути гроші."
          correct: false
        - text: "Я вимагаю, щоб він повернув гроші."
          correct: true
        - text: "Я вимагаю, щоб він поверне гроші."
          correct: false
        - text: "Я вимагаю йому повернути гроші."
          correct: false
      explanation: "Дієслово 'вимагати' дуже часто керує підрядним реченням зі 'щоб'."

- type: quiz
  title: "Перевірка граматичних правил"
  instruction: "Дайте відповіді на запитання щодо структури підрядних речень мети."
  items:
    - question: "Який сполучник є обов'язковим для введення підрядного речення мети при зміні суб'єкта?"
      options:
        - text: "що"
          correct: false
        - text: "щоб"
          correct: true
        - text: "як"
          correct: false
        - text: "якщо"
          correct: false
      explanation: "Саме сполучник 'щоб' вводить підрядне речення мети."
    - question: "У якій формі має стояти дієслово після сполучника 'щоб', якщо дія стосується іншої особи?"
      options:
        - text: "в інфінітиві"
          correct: false
        - text: "у формі минулого часу"
          correct: true
        - text: "у формі теперішнього часу"
          correct: false
        - text: "у формі майбутнього часу"
          correct: false
      explanation: "Форма минулого часу тут формує умовний спосіб."
    - question: "З яким словом узгоджується дієслово в підрядному реченні мети?"
      options:
        - text: "з підметом головного речення"
          correct: false
        - text: "з новим підметом у підрядному реченні"
          correct: true
        - text: "ні з чим не узгоджується"
          correct: false
        - text: "зі сполучником"
          correct: false
      explanation: "Дієслово завжди узгоджується з тим, хто безпосередньо виконує дію."
    - question: "Що означає використання доконаного виду дієслова після 'щоб' (наприклад, 'щоб ти прибрав')?"
      options:
        - text: "очікування регулярної дії"
          correct: false
        - text: "очікування одноразового, завершеного результату"
          correct: true
        - text: "дія вже відбулася в минулому"
          correct: false
        - text: "опис нереальної умови"
          correct: false
      explanation: "Доконаний вид завжди фокусується на конкретному результаті."
    - question: "Який відмінок зазвичай вимагає дієслово 'хотіти', коли йдеться про абстрактні поняття?"
      options:
        - text: "родовий відмінок"
          correct: true
        - text: "знахідний відмінок"
          correct: false
        - text: "давальний відмінок"
          correct: false
        - text: "орудний відмінок"
          correct: false
      explanation: "Наприклад: 'хотіти спокою', 'хотіти успіху'."
    - question: "Яке дієслово в головному реченні виражає найсильніший, безкомпромісний тиск?"
      options:
        - text: "просити"
          correct: false
        - text: "вимагати"
          correct: true
        - text: "радити"
          correct: false
        - text: "хотіти"
          correct: false
      explanation: "'Вимагати' несе авторитет і наполягання на виконанні дії."
    - question: "Як правильно сказати українською фразу 'I want you to listen'?"
      options:
        - text: "Я хочу тебе слухати."
          correct: false
        - text: "Я хочу, щоб ти слухав."
          correct: true
        - text: "Я хочу тобі слухати."
          correct: false
        - text: "Я хочу, що ти слухав."
          correct: false
      explanation: "Прямий переклад тут не працює; потрібна зміна структури."
    - question: "Який відмінок використовується після дієслова 'радити' щодо особи, якій дають пораду?"
      options:
        - text: "знахідний відмінок"
          correct: false
        - text: "давальний відмінок"
          correct: true
        - text: "місцевий відмінок"
          correct: false
        - text: "називний відмінок"
          correct: false
      explanation: "Ми радимо 'комусь' (давальний відмінок)."

- type: unjumble
  title: "Побудуйте правильні речення"
  instruction: "Складіть слова в правильному порядку, щоб утворити складнопідрядні речення."
  items:
    - words: ["хоче", "мати", "щоб", "добре", "син", "вчився"]
      answer: "Мати хоче щоб син добре вчився"
    - words: ["я", "щоб", "прошу", "вчасно", "ви", "прийшли"]
      answer: "Я прошу щоб ви прийшли вчасно"
    - words: ["вимагає", "директор", "щоб", "команда", "завершила", "проєкт"]
      answer: "Директор вимагає щоб команда завершила проєкт"
    - words: ["радить", "лікар", "щоб", "відпочивав", "пацієнт", "більше"]
      answer: "Лікар радить щоб пацієнт більше відпочивав"
    - words: ["маємо", "велике", "ми", "бажання", "щоб", "були", "всі", "здорові"]
      answer: "Ми маємо велике бажання щоб всі були здорові"
    - words: ["чекаю", "я", "на", "тебе", "щоб", "допоміг", "ти"]
      answer: "Я чекаю на тебе щоб ти допоміг"
    - words: ["моя", "хоче", "сестра", "щоб", "допомогла", "я"]
      answer: "Моя сестра хоче щоб я допомогла"
    - words: ["дуже", "менеджер", "просить", "щоб", "зробив", "це", "ти"]
      answer: "Менеджер дуже просить щоб ти зробив це"

- type: match-up
  title: "Знайдіть відповідність"
  instruction: "З'єднайте початок і кінець речень так, щоб вони мали логічний сенс."
  pairs:
    - left: "Я дуже хочу,"
      right: "щоб ти зрозумів цю тему."
    - left: "Клієнт вимагає,"
      right: "щоб ми повернули гроші."
    - left: "Батьки працюють багато,"
      right: "щоб діти мали краще майбутнє."
    - left: "Мій друг радить,"
      right: "щоб я прочитав цю нову книгу."
    - left: "Викладач має прохання,"
      right: "щоб студенти не запізнювалися."
    - left: "Офіцер віддав наказ,"
      right: "щоб солдати зупинилися."
    - left: "Ми маємо бажання,"
      right: "щоб наш проєкт став успішним."
    - left: "Існує необхідність,"
      right: "щоб фінансування надійшло вчасно."

- type: true-false
  title: "Правда чи хиба?"
  instruction: "Прочитайте твердження про граматику та визначте, чи є вони правдивими."
  items:
    - statement: "Після сполучника 'щоб' у цій конструкції дієслово завжди стоїть у формі минулого часу."
      correct: true
      explanation: "Так, це формує умовний спосіб для вираження бажання."
    - statement: "Форма минулого часу після 'щоб' означає, що дія вже відбулася вчора."
      correct: false
      explanation: "Ні, вона стосується потенційної або бажаної дії в майбутньому чи теперішньому."
    - statement: "Дієслово 'вимагати' є більш ввічливим, ніж дієслово 'просити'."
      correct: false
      explanation: "Навпаки, 'вимагати' є суворим і категоричним."
    - statement: "Можна дослівно перекласти 'I want you to do this' як 'Я хочу тебе робити це'."
      correct: false
      explanation: "Це поширена помилка. Українською треба використовувати підрядне речення."
    - statement: "Дієслово в підрядному реченні завжди узгоджується з підметом головного речення."
      correct: false
      explanation: "Воно узгоджується з новим підметом у підрядному реченні."
    - statement: "Дієслово 'хотіти' часто вимагає родового відмінка, коли йдеться про абстрактні поняття."
      correct: true
      explanation: "Наприклад: 'хотіти спокою', 'хотіти успіху'."
    - statement: "Дієслово 'радити' вимагає знахідного відмінка для особи, якій дають пораду."
      correct: false
      explanation: "Воно вимагає давального відмінка: радити братові, другові."
    - statement: "Використання дієслова недоконаного виду після 'щоб' підкреслює очікування регулярної дії."
      correct: true
      explanation: "Наприклад: 'Я хочу, щоб ти прибирав' (робив це регулярно)."

- type: select
  title: "Оберіть правильні варіанти дієслів"
  instruction: "У кожному питанні оберіть усі правильні форми, які можуть бути використані в контексті."
  items:
    - question: "Які дієслова-тригери зазвичай вимагають конструкції зі 'щоб', коли дія стосується іншої особи?"
      options:
        - text: "хотіти"
          correct: true
        - text: "знати"
          correct: false
        - text: "просити"
          correct: true
        - text: "вимагати"
