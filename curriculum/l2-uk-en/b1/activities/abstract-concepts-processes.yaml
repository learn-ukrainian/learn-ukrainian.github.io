- type: error-correction
  title: 'Виправте помилки: русизми та кальки'
  items:
  - sentence: Економічний ріст нашої країни значно прискорився у цьому році.
    error: ріст
    answer: зростання
    error_type: word
    options:
    - зростання
    - розвиток
    - спад
    - занепад
    explanation: Слово ріст стосується фізичних об'єктів (люди, дерева), для економіки
      використовується зростання.
  - sentence: Ваша кава готова, а ось ваша зміна — п'ятдесят гривень.
    error: зміна
    answer: решта
    error_type: word
    options:
    - решта
    - тенденція
    - зростання
    - еволюція
    explanation: Гроші, які повертає продавець, називаються решта, а зміна — це процес
      трансформації.
  - sentence: Після закриття ключового заводу в місті почався повний упадок.
    error: упадок
    answer: занепад
    error_type: word
    options:
    - занепад
    - розвиток
    - решта
    - зростання
    explanation: Слово упадок — це русизм. Українською правильно казати занепад.
  - sentence: Ми получаємо дуже гарні результати після впровадження цієї нової системи.
    error: получаємо
    answer: отримуємо
    error_type: word
    options:
    - отримуємо
    - здобуваємо
    - маємо
    - беремо
    explanation: Слово получати — це калька з російської мови. Правильно казати отримувати.
  - sentence: Він приймає активну участь у трансформації нашого міжнародного бізнесу.
    error: приймає
    answer: бере
    error_type: word
    options:
    - бере
    - робить
    - має
    - дає
    explanation: Вислів приймати участь — помилковий. Правильно — брати участь.
  - sentence: Наші корпоративні продажі ростуть кожного місяця завдяки рекламі.
