- type: quiz
  title: 'Перевірте знання: абстрактні концепції та їх значення'
  items:
  - question: Яке слово найкраще описує збільшення економічних показників або навичок?
    explanation: Для економіки та абстрактних понять ми завжди використовуємо слово
      зростання.
    options:
    - text: зростання
      correct: true
    - text: ріст
      correct: false
    - text: решта
      correct: false
    - text: занепад
      correct: false
  - question: Яке слово стосується виключно фізичного збільшення живих організмів?
    explanation: Ріст використовується для дерев, дітей та фізичних об'єктів.
    options:
    - text: ріст
      correct: true
    - text: зростання
      correct: false
    - text: розвиток
      correct: false
    - text: еволюція
      correct: false
  - question: Яке слово означає гроші, які продавець повертає покупцеві?
    explanation: Решта — це залишок грошей після покупки, а не абстрактна зміна.
    options:
    - text: решта
      correct: true
    - text: зміна
      correct: false
    - text: спад
      correct: false
    - text: темп
      correct: false
  - question: Яке слово найчастіше використовується для опису повільного та закономірного
      розвитку?
    explanation: Еволюція позначає поступовий, природний перехід від одного стану
      до іншого.
    options:
    - text: еволюція
      correct: true
    - text: зміна
      correct: false
    - text: спад
      correct: false
    - text: решта
      correct: false
  - question: Яке слово описує глибоку, системну кризу або руйнування?
    explanation: Занепад — це тривала криза і глибоке руйнування, на відміну від тимчасового
      спаду.
    options:
    - text: занепад
      correct: true
    - text: спад
      correct: false
    - text: зміна
      correct: false
    - text: розвиток
      correct: false
  - question: Яке слово означає перехід у принципово новий стан або зміну форми?
    explanation: Перетворення фокусується на зміні суті або форми об'єкта.
    options:
    - text: перетворення
      correct: true
    - text: застій
      correct: false
    - text: покращення
      correct: false
    - text: спад
      correct: false
  - question: За допомогою яких суфіксів найчастіше утворюються абстрактні іменники
      від дієслів?
    explanation: Дієслова недоконаного виду часто утворюють іменники процесів за допомогою
      суфіксів -ння та -ення.
    options:
    - text: -ння та -ення
      correct: true
    - text: -ість та -ота
      correct: false
    - text: -изм та -ізм
      correct: false
    - text: -ар та -яр
      correct: false
  - question: Як звучить Правило суб'єктності в українській мові при описі суспільних
      змін?
    explanation: 'Сучасний український стиль вимагає активної позиції: ми змінюємо,
      ми впроваджуємо, уникаючи пасивних конструкцій.'
    options:
    - text: Ми надаємо перевагу активним дієсловам і чіткому діячу
      correct: true
    - text: Ми завжди використовуємо пасивний стан для солідності
      correct: false
    - text: Ми уникаємо будь-яких дієслів, вживаючи лише іменники
      correct: false
    - text: Ми говоримо лише про минуле і ніколи про майбутнє
      correct: false
