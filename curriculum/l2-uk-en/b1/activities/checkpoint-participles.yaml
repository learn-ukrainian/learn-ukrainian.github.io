- id: informal-to-academic-rewrite
  type: match-up
  instruction: З'єднайте розмовне речення з його академічним відповідником.
  pairs:
  - left: Я багато читав і написав статтю.
    right: Опрацювавши літературу, автор написав статтю.
  - left: Це метод, який ми використовуємо найчастіше.
    right: Це метод, найчастіше використовуваний дослідниками.
  - left: Коли ми закінчили експеримент, ми записали дані.
    right: Завершивши експеримент, ми зафіксували дані.
  - left: Цей проєкт підтримало міністерство.
    right: Проєкт, підтриманий міністерством.
  - left: Студент добре написав роботу і захистив її.
    right: Якісно написана робота була успішно захищена.
  - left: Він вчиться в університеті.
    right: Він здобуває освіту у вищому навчальному закладі.
  title: З'єднайте розмовне речення з його академічним відповідником.
- id: academic-reading-analysis
  type: true-false
  instruction: Проаналізуйте використання академічних зворотів у тексті.
  items:
  - statement: Дієприкметникові звороти роблять текст лаконічнішим.
    correct: true
    explanation: Вони допомагають стискати інформацію.
