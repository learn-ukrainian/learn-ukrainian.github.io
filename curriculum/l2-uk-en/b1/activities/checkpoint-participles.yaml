version: '1.0'
module: checkpoint-participles
level: b1
inline:
- id: reading
  type: quiz
  instruction: Прочитайте текст про контрольну роботу та дайте відповіді на запитання.
  items:
  - question: Яка мета цієї контрольної роботи?
    options:
    - Перевірка знань зі складних форм дієслова
    - Отримати сертифікат
    - Вивчити нові слова
    - Написати дипломну роботу
    correct: 0
  - question: Що варто зробити, якщо результат менше 70%?
    options:
    - Повернутися для повторення матеріалу
    - Забути про це
    - Скласти тест ще раз
    - Запитати викладача
    correct: 0
  - question: Скільки критеріїв має система самооцінки?
    options:
    - Два
    - Три
    - Чотири
    - П'ять
    correct: 1
  - question: Що означає критерій «впевнено»?
    options:
    - Правило зрозуміле
    - Є сумніви
    - Тема надто складна
    - Потрібна допомога
    correct: 0
  - question: Які граматичні форми є візитною карткою академічної мови?
    options:
    - Дієприкметники та дієприслівники
    - Іменники та прикметники
    - Прийменники та сполучники
    - Числівники
    correct: 0
  - question: Як слід сприймати цю контрольну роботу?
    options:
    - Як корисний інструмент діагностики
    - Як стресовий іспит
    - Як покарання за помилки
    - Як звичайний урок
    correct: 0
  title: Прочитайте текст про контрольну роботу та дайте відповіді на запитання.
- id: formation-participles-drill
  type: fill-in
  instruction: Вставте правильний пасивний дієприкметник.
  items:
  - sentence: Це ____ мною текст.
    answer: прочитаний
    options:
    - прочитаний
    - прочитана
    - прочитане
  - sentence: Лист, ____ вчора, лежить на столі.
    answer: написаний
    options:
    - написаний
    - написана
    - написане
  - sentence: Цей посуд повністю ____.
    answer: розбитий
    options:
    - розбитий
    - розбита
    - розбите
  - sentence: Він був ____ цією новиною.
    answer: вражений
    options:
    - вражений
    - вражена
    - вражене
  - sentence: Студент був заздалегідь ____.
    answer: попереджений
    options:
    - попереджений
    - попереджена
    - попереджене
  - sentence: Цей сад був ____ минулого року.
    answer: саджений
    options:
    - саджений
    - саджена
    - саджене
  title: Вставте правильний пасивний дієприкметник.
- id: classify-and-detect-calques
  type: group-sort
  instruction: Розподіліть фрази на природні українські та російські кальки.
  groups:
  - label: Природні українські конструкції
    items:
    - студент, який працює
    - робочий процес
    - людина, яка бажає вчитися
    - зів'ялі квіти
  - label: Штучні кальки (росіянізми)
    items:
    - працюючий студент
    - оточуюче середовище
    - бажаючий вчитися
    - палаючий вогонь
  title: Розподіліть фрази на природні українські та російські кальки.
- id: edit-russian-calques
  type: error-correction
  instruction: Знайдіть і виправте російську кальку в реченні.
  items:
  - sentence: Кожен працюючий студент має право на відпочинок.
    error: працюючий студент
    correction: студент, який працює
    error_type: phrase
    options:
    - студент, який працює
    - студент, що працював
    - робочий студент
    explanation: Уникайте активних дієприкметників теперішнього часу.
  - sentence: Ми повинні берегти оточуюче середовище.
    error: оточуюче середовище
    correction: довкілля
    error_type: phrase
    options:
    - довкілля
    - оточуючий світ
    - середовище, що оточує
    explanation: «Оточуюче середовище» — це калька, краще використовувати питоме слово
      «довкілля».
  - sentence: Він був серед бажаючих виступити на семінарі.
    error: бажаючих
    correction: тих, хто бажав
    error_type: phrase
    options:
    - тих, хто бажав
    - бажаючими
    - охочих
    explanation: Краще використати займенник із підрядним реченням або іменник «охочих».
  - sentence: На вулиці багато поспішаючих людей.
    error: поспішаючих людей
    correction: людей, які поспішають
    error_type: phrase
    options:
    - людей, які поспішають
    - поспішаючими
    - тих, хто поспішав
    explanation: Замініть кальку на описову конструкцію з «які».
  - sentence: Усі відпочиваючі зібралися біля озера.
    error: відпочиваючі
    correction: ті, хто відпочиває
    error_type: phrase
    options:
    - ті, хто відпочиває
    - відпочиваючими
    - відпочившими
    explanation: В українській мові немає іменника «відпочиваючі».
  - sentence: На столі лежить палаюча свічка.
    error: палаюча
    correction: яка палає
    error_type: word
    options:
    - яка палає
    - що палала
    - палаючі
    explanation: Краще сказати «свічка, яка палає».
  title: Знайдіть і виправте російську кальку в реченні.
- id: punctuation-zvoroty-mastery
  type: true-false
  instruction: Чи правильно розставлені коми в цих реченнях?
  items:
  - statement: Книга, прочитана мною вчора, лежить на столі.
    correct: true
    explanation: Зворот стоїть після означуваного слова, тому виділяється комами.
  - statement: Прочитана мною вчора книга лежить на столі.
    correct: true
    explanation: Зворот перед означуваним словом, коми не потрібні.
  - statement: Вражений цією новиною, він раптово замовк.
    correct: true
    explanation: Якщо означуване слово — особовий займенник, кома ставиться завжди.
  - statement: Читаючи цю книгу, я пив каву.
    correct: true
    explanation: Дієприслівниковий зворот виділяється комою.
  - statement: Втомлений студент спав, сидячи.
    correct: false
    explanation: Одиничний дієприслівник способу дії після присудка не виділяється
      комою.
  - statement: Ми всі працювали, не покладаючи рук.
    correct: false
    explanation: Дієприслівниковий зворот-фразеологізм комою не виділяється.
  title: Чи правильно розставлені коми в цих реченнях?
- id: identify-and-rule-check
  type: quiz
  instruction: Оберіть речення з правильною пунктуацією.
  items:
  - question: Де правильно поставлені коми?
    options:
    - Лист, написаний братом, лежав на столі.
    - Лист написаний братом, лежав на столі.
    - Лист, написаний братом лежав на столі.
    - Лист написаний братом лежав на столі.
    correct: 0
  - question: Яке речення правильне?
    options:
    - Написаний братом лист лежить на столі.
    - Написаний братом лист, лежить на столі.
    - Написаний, братом лист лежить на столі.
    - Написаний братом, лист лежить на столі.
    correct: 0
  - question: 'Оберіть правильний варіант із займенником:'
    options:
    - Здивована результатом, вона посміхнулася.
    - Здивована результатом вона посміхнулася.
    - Здивована, результатом, вона посміхнулася.
    - Здивована результатом вона, посміхнулася.
    correct: 0
  - question: Де правильно виділено дієприслівниковий зворот?
    options:
    - Побачивши друзів, він зупинився.
    - Побачивши друзів він зупинився.
    - Побачивши, друзів він зупинився.
    - Побачивши друзів він, зупинився.
    correct: 0
  - question: 'Оберіть правильний варіант із фразеологізмом:'
    options:
    - Вони бігли не чуючи ніг.
    - Вони бігли, не чуючи ніг.
    - Вони, бігли не чуючи ніг.
    - Вони бігли не чуючи, ніг.
    correct: 0
  - question: Де правильно поставлені коми при однорідних зворотах?
    options:
    - Студент сидів, читаючи статтю і роблячи нотатки.
    - Студент сидів, читаючи статтю, і роблячи нотатки.
    - Студент сидів читаючи статтю і роблячи нотатки.
    - Студент сидів, читаючи статтю і, роблячи нотатки.
    correct: 0
  title: Оберіть речення з правильною пунктуацією.
