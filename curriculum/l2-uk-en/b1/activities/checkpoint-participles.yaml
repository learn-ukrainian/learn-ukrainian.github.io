version: '1.0'
module: checkpoint-participles
level: b1
inline:
- id: reading
  type: quiz
  instruction: 'Прочитайте текст про вступ: як працювати з контрольною і дайте відповіді
    на запитання.'
  items:
  - question: Яка головна мета цієї контрольної роботи?
    options:
    - Зробити об'єктивну самооцінку знань
    - Отримати найвищий бал для сертифіката
    - Вивчити абсолютно нові слова
    - Написати дипломну роботу
    correct: 0
  - question: Які граматичні форми переважно перевіряє цей тест?
    options:
    - Лише дієслова минулого часу
    - Дієприкметник та дієприслівник
    - Іменники та особові займенники
    - Лише короткі прикметники
    correct: 1
  - question: Що автор радить робити під час виконання завдань?
    options:
    - Писати максимально швидко
    - Слухати музику для фону
    - Уважно читати і не поспішати
    - Використовувати словник
    correct: 2
  - question: Скільки критеріїв самооцінки згадується в тексті?
    options:
    - Два
    - Чотири
    - П'ять
    - Три
    correct: 3
  - question: Що означає результат нижче сімдесяти відсотків?
    options:
    - Потрібне додаткове повторення матеріалу
    - Тест складений чудово
    - Ви вже маєте науковий ступінь
    - Потрібно почати вивчення мови з нуля
    correct: 0
  - question: Як автор радить ставитися до помилок на цьому етапі?
    options:
    - Як до серйозної проблеми
    - Як до нормальної частини навчання
    - Як до поганого знаку
    - Ігнорувати їх повністю
    correct: 1
- id: fill-in
  type: fill-in
  instruction: 'Вставте правильну граматичну форму у реченнях на тему вступ: як працювати
    з контрольною.'
  items:
  - sentence: Ця _____ є важливим підсумком сьомого модуля.
    answer: контрольна робота
    options:
    - контрольна робота
    - самооцінка
    - перевірка
  - sentence: Сьогодні відбудеться _____ ваших знань з граматики.
    answer: перевірка
    options:
    - перевірка
    - повторення
    - самооцінка
  - sentence: Якщо ви отримали низький бал, вам потрібне _____ матеріалу.
    answer: повторення
    options:
    - повторення
    - самооцінка
    - перевірка
  - sentence: Я почуваюся _____, бо добре вивчив усі правила.
    answer: впевнено
    options:
    - впевнено
    - повторення
    - самооцінка
  - sentence: Об'єктивна _____ допоможе вам зрозуміти свій рівень.
    answer: самооцінка
    options:
    - самооцінка
    - перевірка
    - контрольна робота
  - sentence: Цей _____ охоплює всі ключові граматичні теми.
    answer: тест
    options:
    - тест
    - повторення
    - перевірка
- id: quiz
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Вступ:
    як працювати з контрольною».'
  items:
  - question: Який суфікс характерний для пасивних дієприкметників?
    options:
    - -уч-, -юч-
    - -н-, -ен-, -т-
    - -ач-, -яч-
    - -л-, -вши-
    correct: 1
  - question: Що виражають дієприслівники недоконаного виду?
    options:
    - Різночасність
    - Пасивну дію
    - Одночасність
    - Коротку ознаку
    correct: 2
  - question: Який варіант є природним для української мови?
    options:
    - Студент, який читає текст
    - Читаючий текст студент
    - Студент, читаючий текст
    - Текст, читаючий студентом
    correct: 0
  - question: Як утворити пасивний дієприкметник від слова «попередити»?
    options:
    - Попережений
    - Попередитий
    - Попереджаючий
    - Попереджений
    correct: 3
  - question: Як правильно утворити дієприкметник від дієслова «написати»?
    options:
    - Написаний
    - Написавший
    - Написатий
    - Написуючий
    correct: 0
  - question: Яке слово використовується як короткий прикметник?
    options:
    - Потреба
    - Потрібний
    - Потрібен
    - Потрібно
    correct: 2
- id: match-up
  type: match-up
  instruction: 'З''єднайте терміни з розділу «Блок 1: Дієприкметники» з їхніми визначеннями.'
  pairs:
  - left: Дієприкметник
    right: Форма дієслова з ознаками прикметника
  - left: Дієприслівник
    right: Незмінна форма, що позначає додаткову дію
  - left: Короткий прикметник
    right: Усічена форма (наприклад, певен, потрібен)
  - left: Самооцінка
    right: Аналіз власних знань і навичок
  - left: Одночасність
    right: Паралельне виконання двох дій
  - left: Різночасність
    right: Послідовне виконання різних дій
workbook:
- type: group-sort
  instruction: 'Розподіліть дієприслівники за видом: одночасність (недоконаний) та
    різночасність (доконаний).'
  groups:
  - label: Одночасність (-учи/-ючи, -ачи/-ячи)
    items:
    - читаючи
    - працюючи
    - аналізуючи
    - стоячи
  - label: Різночасність (-вши/-ши)
    items:
    - прочитавши
    - написавши
    - проаналізувавши
    - ставши
- type: unjumble
  instruction: Складіть правильні речення зі зворотами, спираючись на правила пунктуації.
  items:
  - words:
    - читав
    - вчора.
    - Я
    - роботу,
    - написану
    correct_order:
    - Я
    - читав
    - роботу,
    - написану
    - вчора.
  - words:
    - додому,
    - я
    - друзів.
    - Ідучи
    - бачив
    correct_order:
    - Ідучи
    - додому,
    - я
    - бачив
    - друзів.
  - words:
    - новиною,
    - Вражений
    - замовк.
    - він
    - раптово
    correct_order:
    - Вражений
    - новиною,
    - він
    - раптово
    - замовк.
  - words:
    - Це
    - студентом.
    - написана
    - стаття,
    correct_order:
    - Це
    - стаття,
    - написана
    - студентом.
  - words:
    - я
    - дані,
    - почав
    - аналіз.
    - Зібравши
    correct_order:
    - Зібравши
    - дані,
    - я
    - почав
    - аналіз.
  - words:
    - безперечно
    - варто
    - Цей
    - фільм
    - подивитися.
    correct_order:
    - Цей
    - фільм
    - безперечно
    - варто
    - подивитися.
- type: error-correction
  instruction: Знайдіть і виправте типові помилки (кальки або неправильне узгодження).
  items:
  - sentence: Мені потрібна новий комп'ютер для навчання.
    error: потрібна
    correction: потрібен
    error_type: word
    options:
    - потрібен
    - потрібне
    - потрібні
    explanation: 'Слово «комп''ютер» — чоловічого роду, тому короткий прикметник:
      «потрібен».'
  - sentence: Це дуже оточуючий світ.
    error: оточуючий
    correction: навколишній
    error_type: word
    options:
    - навколишній
    - оточений
    - оточувати
    explanation: «Оточуючий» — калька. Українською правильно «навколишній світ» або
      «довкілля».
  - sentence: У нас є добре працюючий принтер.
    error: працюючий
    correction: робочий
    error_type: word
    options:
    - робочий
    - працював
    - робота
    explanation: Активні дієприкметники теперішнього часу неприродні. Використовуйте
      звичайний прикметник «робочий».
  - sentence: Побачивши друзів, він довго посміхався, вітаючись.
    error: Побачивши
    correction: Бачачи
    error_type: word
    options:
    - Бачачи
    - Побачити
    - Побачив
    explanation: 'Якщо дії відбувалися одночасно, потрібен недоконаний вид: «бачачи».'
  - sentence: Вона дуже певен у своїх силах.
    error: певен
    correction: певна
    error_type: word
    options:
    - певна
    - певні
    - певне
    explanation: 'Короткий прикметник узгоджується з підметом жіночого роду («вона»):
      «певна».'
  - sentence: Студент, бажаючий вчитися, завжди знайде можливість.
    error: бажаючий
    correction: охочий
    error_type: word
    options:
    - охочий
    - бажати
    - бажав
    explanation: Форми на -юч- (бажаючий) краще замінювати на питомі слова («охочий»)
      або підрядні речення («який бажає»).
- type: essay-response
  instruction: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Блок 1:
    Дієприкметники».'
  prompt: 'Напишіть 5 речень про вашу контрольну роботу або навчання в університеті.
    Обов''язково використайте щонайменше три пасивні дієприкметники (наприклад: прочитаний,
    написаний, вивчений) та слова «самооцінка» або «перевірка».'
  min_words: 50
