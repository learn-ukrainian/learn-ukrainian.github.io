    - читаючи
    - кричачи
    - сміючись
    - аналізуючи
  - label: 'Доконаний вид (різночасність: -вши/-ши)'
    items:
    - прочитавши
    - принісши
    - повернувшись
    - завершивши
  title: Розподіліть дієприслівники за видом (одночасність або різночасність).
- id: temporal-logic-choice
  type: fill-in
  instruction: Вставте правильний дієприслівник за логікою часу.
  items:
  - sentence: ____ додому, я бачив друзів.
    answer: Ідучи
    options:
    - Ідучи
    - Прийшовши
  - sentence: ____ додому, я почав обідати.
    answer: Прийшовши
    options:
    - Ідучи
    - Прийшовши
  - sentence: ____ текст, вона знайшла багато помилок.
    answer: Читаючи
    options:
    - Читаючи
    - Прочитавши
  - sentence: ____ текст до кінця, вона закрила книгу.
    answer: Прочитавши
    options:
    - Читаючи
    - Прочитавши
  - sentence: ____ статтю, я робив нотатки.
    answer: Пишучи
    options:
    - Пишучи
    - Написавши
  - sentence: ____ статтю, я надіслав її професору.
    answer: Написавши
    options:
    - Пишучи
    - Написавши
  title: Вставте правильний дієприслівник за логікою часу.
- id: dangling-gerund-fix
  type: error-correction
  instruction: Виправте речення з висячим дієприслівником.
  items:
  - sentence: Підходячи до школи, у мене впала шапка.
    error: Підходячи до школи, у мене впала шапка.
    correction: Коли я підходив до школи, у мене впала шапка.
    error_type: construction
    options:
    - Коли я підходив до школи, у мене впала шапка.
    - Підійшовши до школи, у мене впала шапка.
    - Підходячи до школи, я впустив шапку.
    explanation: Дієприслівник і присудок повинні стосуватися одного діяча.
  - sentence: Читаючи книгу, мені стало сумно.
    error: Читаючи книгу, мені стало сумно.
    correction: Коли я читав книгу, мені стало сумно.
    error_type: construction
    options:
    - Коли я читав книгу, мені стало сумно.
    - Прочитавши книгу, мені стало сумно.
    - Читаючи книгу, я зсумувався.
    explanation: Безособове речення не може мати дієприслівникового звороту.
  - sentence: Побачивши друзів, він посміхався (дії паралельні).
    error: Побачивши
    correction: Бачачи
    error_type: word
    options:
    - Бачачи
    - Побачивши
    - Побачити
    explanation: Для вираження одночасності потрібен недоконаний вид (бачачи).
  - sentence: Відкривши вікно, у кімнату залетів птах.
    error: Відкривши вікно, у кімнату залетів птах.
    correction: Коли я відкрив вікно, у кімнату залетів птах.
    error_type: construction
    options:
    - Коли я відкрив вікно, у кімнату залетів птах.
    - Відкриваючи вікно, залетів птах.
    - Відкривши вікно, птах залетів.
    explanation: Птах не відкривав вікно. Логічний підмет має бути один.
  - sentence: Вивчаючи українську мову, мені стало цікаво.
    error: Вивчаючи українську мову, мені стало цікаво.
    correction: Коли я вивчав українську мову, мені стало цікаво.
    error_type: construction
    options:
    - Коли я вивчав українську мову, мені стало цікаво.
    - Вивчивши мову, мені стало цікаво.
    - Вивчаючи мову, я зацікавився.
    explanation: У безособових реченнях із займенником у давальному відмінку зворот
      вживати не можна.
  - sentence: Збираючись на роботу, пішов дощ.
    error: Збираючись на роботу, пішов дощ.
    correction: Коли я збирався на роботу, пішов дощ.
    error_type: construction
    options:
    - Коли я збирався на роботу, пішов дощ.
    - Зібравшись на роботу, пішов дощ.
    - Дощ пішов, збираючись на роботу.
    explanation: Дощ не міг збиратися на роботу.
  title: Виправте речення з висячим дієприслівником.
