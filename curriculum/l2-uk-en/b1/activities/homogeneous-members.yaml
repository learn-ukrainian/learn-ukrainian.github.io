version: '1.0'
module: homogeneous-members
level: b1
inline:
- id: reading
  type: reading
  passage: 'Однорідні члени речення — це слова, які виконують однакову синтаксичну
    функцію, відповідають на те саме питання і залежать від того самого слова. Вони
    можуть поєднуватися сполучниками або інтонацією. Існують три типи сполучників:
    єднальні (і, й, та), протиставні (а, але, проте) та розділові (або, чи). Узагальнювальне
    слово може стояти перед однорідними членами (тоді ставимо двокрапку) або після
    них (тоді ставимо тире).'
  questions:
  - Що таке однорідні члени речення?
  - Від якого слова залежать однорідні члени?
  - Які існують три типи сполучників?
  - Коли ми ставимо двокрапку при узагальнювальному слові?
  - Який розділовий знак ставиться, якщо узагальнювальне слово йде після переліку?
  - Що таке перелічувальна інтонація?
- id: fill-in
  type: fill-in
  instruction: Вставте правильне слово (однорідний член), яке підходить за змістом
    і формою.
  items:
  - sentence: У саду ростуть яблуні, груші та ____.
    answer: сливи
    options:
    - сливи
    - слив
    - сливам
  - sentence: Він читав швидко, уважно і ____.
    answer: зосереджено
    options:
    - зосереджений
    - зосереджено
    - зосереджені
  - sentence: На столі лежать ручка, олівець і ____.
    answer: зошит
    options:
    - зошита
    - зошит
    - зошитом
  - sentence: Ми бачили і лисицю, і вовка, і ____.
    answer: зайця
    options:
    - заєць
    - зайця
    - зайцю
  - sentence: Вона купила червоні, жовті та ____ квіти.
    answer: білі
    options:
    - білі
    - біла
    - білих
  - sentence: Діти співали, танцювали й ____.
    answer: сміялися
    options:
    - сміялися
    - сміх
    - смішні
- id: essay-conjunctions
  type: essay-response
  prompt: Напишіть 5 речень про ваші інтереси чи плани, використовуючи різні типи
    сполучників (єднальні, протиставні, розділові) для з'єднання однорідних членів.
  min_words: 50
  model_answer: Я дуже люблю читати книги і дивитися фільми. Увечері я зазвичай п'ю
    чай або каву. Мені подобається спорт, але я не люблю бігати. На вихідних я то
    гуляю з друзями, то відпочиваю вдома. Я цікавлюся не тільки історією, а й географією.
    Мої улюблені жанри — це фантастика, детективи та пригоди.
- id: error-correction-conjunctions
  type: error-correction
  instruction: Знайдіть і виправте помилки у вживанні сполучників та розділових знаків.
  items:
  - sentence: Він розумний але дуже лінивий.
    error: розумний але
    correction: розумний, але
    error_type: construction
    explanation: Перед протиставним сполучником 'але' завжди ставиться кома.
  - sentence: Я купив яблука, груші, і банани.
    error: груші, і
    correction: груші і
    error_type: construction
    explanation: Перед неповторюваним єднальним сполучником 'і' кома не ставиться.
  - sentence: Ми поїдемо в Карпати, або на море.
    error: Карпати, або
    correction: Карпати або
    error_type: construction
    explanation: Перед неповторюваним розділовим сполучником 'або' кома не ставиться.
  - sentence: І сміх і гріх.
    error: сміх і
    correction: сміх, і
    error_type: construction
    explanation: При повторюваному сполучнику 'і... і...' перед другим 'і' ставиться
      кома.
  - sentence: Вона читає не тільки журнали а й книги.
    error: журнали а
    correction: журнали, а
    error_type: construction
    explanation: Перед другою частиною парного сполучника 'не тільки... а й' ставиться
      кома.
  - sentence: То дощ то сніг іде на вулиці.
    error: дощ то
    correction: дощ, то
    error_type: construction
    explanation: При повторюваному сполучнику 'то... то...' перед другим 'то' ставиться
      кома.
- id: quiz-syntax
  type: quiz
  instruction: Оберіть правильно побудоване речення.
  items:
  - question: Яке речення написано правильно?
    options:
    - Вона була красива, але сумна.
    - Вона була красива але сумна.
    - Вона була красива але, сумна.
    - Вона була, красива але сумна.
    correct: 0
  - question: 'Оберіть речення без пунктуаційної помилки:'
    options:
    - Я люблю і зиму, і літо, і осінь.
    - Я люблю і зиму і літо і осінь.
    - Я люблю, і зиму, і літо, і осінь.
    - Я люблю і зиму, і літо і осінь.
    correct: 0
  - question: Який сполучник є розділовим?
    options:
    - або
    - і
    - але
    - та
    correct: 0
  - question: Перед яким сполучником кома ставиться завжди?
    options:
    - проте
    - і
    - чи
    - й
    correct: 0
  - question: У якому реченні є однорідні підмети?
    options:
    - Брат і сестра пішли до школи.
    - Я люблю читати і писати.
    - Це великий, гарний будинок.
    - Він працює швидко і якісно.
    correct: 0
  - question: Що таке асиндетон?
    options:
    - Безсполучниковий зв'язок між однорідними членами.
    - Повторення сполучників перед кожним словом.
    - Тип протиставного сполучника.
    - Узагальнювальне слово в реченні.
    correct: 0
- id: match-up-terms
  type: match-up
  instruction: З'єднайте лінгвістичні терміни з їхніми визначеннями.
  pairs:
  - left: однорідний
    right: член речення, що виконує ту саму синтаксичну функцію
  - left: єднальний
    right: тип сполучника, що об'єднує елементи (і, й, та)
  - left: протиставний
    right: тип сполучника, що показує контраст (а, але, проте)
  - left: розділовий
    right: тип сполучника, що пропонує вибір (або, чи)
  - left: узагальнювальний
    right: слово, що є загальною назвою для перелічуваних предметів
  - left: асиндетон
    right: безсполучниковий зв'язок між словами
- id: fill-in-generalizing
  type: fill-in
  instruction: Вставте правильний розділовий знак (двокрапка або тире).
  items:
  - sentence: У лісі прокинулося все ____ дерева, кущі, квіти.
    answer: двокрапка
    options:
    - двокрапка
    - тире
    - кома
  - sentence: Дерева, кущі, квіти ____ усе прокинулося в лісі.
    answer: тире
    options:
    - двокрапка
    - тире
    - кома
  - sentence: Скрізь лежить сніг ____ на дахах, на деревах, на дорогах.
    answer: двокрапка
    options:
    - двокрапка
    - тире
    - кома
  - sentence: На дахах, на деревах, на дорогах ____ скрізь лежить сніг.
    answer: тире
    options:
    - двокрапка
    - тире
    - кома
  - sentence: Я купив різні фрукти ____ яблука, банани, апельсини.
    answer: двокрапка
    options:
    - двокрапка
    - тире
    - кома
  - sentence: Яблука, банани, апельсини ____ ці фрукти я купив сьогодні.
    answer: тире
    options:
    - двокрапка
    - тире
    - кома
- id: error-correction-logical-errors-and-case-agreement
  type: error-correction
  instruction: Знайдіть і виправте синтаксичні та логічні помилки (неправильний відмінок
    або змішування категорій).
  items:
  - sentence: Я люблю і пишаюся своїм містом.
    error: люблю і пишаюся своїм містом
    correction: люблю своє місто і пишаюся ним
    error_type: construction
    explanation: 'Дієслова вимагають різних відмінків: люблю (що?), пишаюся (чим?).'
  - sentence: Ми купили овочі, фрукти і продукти.
    error: овочі, фрукти і продукти
    correction: овочі, фрукти та інші продукти
    error_type: construction
    explanation: Не можна ставити в один ряд конкретні предмети та їхню загальну категорію
      без слова 'інші'.
  - sentence: Вона читає і захоплюється цією книгою.
    error: читає і захоплюється цією книгою
    correction: читає цю книгу і захоплюється нею
    error_type: construction
    explanation: Читає (що? знахідний відмінок), захоплюється (чим? орудний відмінок).
  - sentence: У кімнаті стояли стільці, столи і меблі.
    error: стільці, столи і меблі
    correction: стільці, столи та інші меблі
    error_type: construction
    explanation: Меблі — це узагальнювальне слово для стільців і столів.
  - sentence: Він цікавиться і вивчає математику.
    error: цікавиться і вивчає математику
    correction: цікавиться математикою і вивчає її
    error_type: construction
    explanation: Цікавиться (чим? орудний), вивчає (що? знахідний).
  - sentence: На парковці були форди, тойоти і автомобілі.
    error: форди, тойоти і автомобілі
    correction: форди, тойоти та інші автомобілі
    error_type: construction
    explanation: Автомобілі — це загальна категорія.
- id: quiz-final-self-check-on-homogeneous-members
  type: quiz
  instruction: 'Підсумковий тест: оберіть правильну відповідь.'
  items:
  - question: Які три умови потрібні для однорідних членів?
    options:
    - Залежать від одного слова, відповідають на те саме питання, однакова синтаксична
      функція.
    - Різні частини мови, різні питання, різна синтаксична функція.
    - Наявність сполучника, наявність коми, наявність інтонації.
    - Узагальнювальне слово, двокрапка, тире.
    correct: 0
  - question: Коли перед одиничним сполучником 'і' ставиться кома?
    options:
    - Ніколи.
    - Завжди.
    - Якщо він з'єднує підмети.
    - Якщо він з'єднує присудки.
    correct: 0
  - question: Який розділовий знак ставимо після переліку перед узагальнювальним словом?
    options:
    - Тире.
    - Двокрапку.
    - Кому.
    - Крапку з комою.
    correct: 0
  - question: Перед якими сполучниками кома ставиться завжди?
    options:
    - Перед протиставними (а, але, проте).
    - Перед єднальними (і, й, та).
    - Перед розділовими (або, чи).
    - Перед усіма сполучниками.
    correct: 0
  - question: Як називається безсполучниковий зв'язок між однорідними членами?
    options:
    - Асиндетон.
    - Полісиндетон.
    - Перелік.
    - Узагальнення.
    correct: 0
  - question: Що таке полісиндетон?
    options:
    - Повторення сполучників перед кожним однорідним членом.
    - Відсутність сполучників між однорідними членами.
    - Використання узагальнювального слова.
    - Помилка у керуванні відмінками.
    correct: 0
- id: essay-response-writing-practice-with-homogeneous-members
  type: essay-response
  prompt: Опишіть свій ідеальний вихідний день. Використовуйте якомога більше однорідних
    членів (підметів, присудків, додатків, означень) та хоча б одне речення з узагальнювальним
    словом.
  min_words: 50
  model_answer: 'Мій ідеальний вихідний починається пізно. Я прокидаюся, лежу в ліжку
    і читаю цікаву книгу. Потім я готую смачний, корисний і великий сніданок. На столі
    є все: кава, млинці, свіжі фрукти та мед. Після сніданку я зустрічаюся з друзями.
    Ми гуляємо в парку, йдемо в кіно або відвідуємо музей. Увечері я люблю слухати
    музику, малювати чи просто відпочивати. Цей день завжди проходить весело, активно
    і приємно.'
workbook:
- type: group-sort
  instruction: Розподіліть сполучники за їхнім типом.
  groups:
  - label: Єднальні
    items:
    - і
    - й
    - та (в значенні і)
  - label: Протиставні
    items:
    - а
    - але
    - проте
    - однак
  - label: Розділові
    items:
    - або
    - чи
    - то... то...
- type: true-false
  instruction: Визначте, чи є твердження правильним (Правда чи ні?).
  items:
  - statement: Однорідні члени речення завжди відповідають на одне й те саме питання.
    correct: true
    explanation: Це одна з трьох головних умов однорідності.
  - statement: Перед сполучником 'але' можна не ставити кому.
    correct: false
    explanation: Перед протиставним сполучником 'але' кома ставиться завжди.
  - statement: Узагальнювальне слово виконує ту саму синтаксичну функцію, що й однорідні
      члени після нього.
    correct: true
    explanation: Так, узагальнювальне слово і перелік є одним членом речення.
  - statement: Слово 'або' — це протиставний сполучник.
    correct: false
    explanation: '''Або'' — це розділовий сполучник.'
  - statement: Асиндетон — це використання великої кількості сполучників.
    correct: false
    explanation: Асиндетон — це безсполучниковий зв'язок.
  - statement: Якщо узагальнювальне слово стоїть перед переліком, ми ставимо двокрапку.
    correct: true
    explanation: Двокрапка попереджає про перелік.
- type: translate
  instruction: Оберіть правильний переклад речення.
  items:
  - source: He bought apples, pears, and bananas.
    options:
    - text: Він купив яблука, груші і банани.
      correct: true
    - text: Він купив яблука, груші, і банани.
      correct: false
    - text: Він купив яблука і груші і банани.
      correct: false
  - source: She is smart but lazy.
    options:
    - text: Вона розумна, але лінива.
      correct: true
    - text: Вона розумна але лінива.
      correct: false
    - text: Вона розумна, але, лінива.
      correct: false
  - source: 'Everything was ready: the table, the chairs, and the food.'
    options:
    - text: 'Усе було готове: стіл, стільці і їжа.'
      correct: true
    - text: Усе було готове — стіл, стільці і їжа.
      correct: false
    - text: Стіл, стільці і їжа — усе було готове.
      correct: false
  - source: We will go either to the park or to the cinema.
    options:
    - text: Ми підемо або в парк, або в кіно.
      correct: true
    - text: Ми підемо або в парк або в кіно.
      correct: false
    - text: Ми підемо, або в парк, або в кіно.
      correct: false
  - source: The wind, rain, and hail raged on the street.
    options:
    - text: На вулиці лютували вітер, дощ і град.
      correct: true
    - text: На вулиці лютували вітер дощ і град.
      correct: false
    - text: 'На вулиці лютували: вітер, дощ і град.'
      correct: false
  - source: I read, wrote, and drew all evening.
    options:
    - text: Я читав, писав і малював весь вечір.
      correct: true
    - text: Я читав, писав, і малював весь вечір.
      correct: false
    - text: Я читав і писав і малював весь вечір.
      correct: false
