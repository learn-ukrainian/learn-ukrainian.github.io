version: '1.0'
module: word-formation-adjectives
level: b1
inline:
- id: reading-suffixal-formation
  type: quiz
  instruction: Дайте відповіді на запитання за текстом про суфіксальне творення.
  items:
  - question: Який суфікс використовується для творення прикметника від слова «школа»?
    options:
    - -ськ-
    - -н-
    - -уват-
    - -еньк-
    correct: 1
  - question: Які суфікси роблять ознаку лагідною і приємною?
    options:
    - -юч-, -ющ-
    - -уват-, -юват-
    - -еньк-, -есеньк-
    - -ськ-, -зьк-
    correct: 2
  - question: Що означає прикметник із суфіксом -уват- (наприклад, «синюватий»)?
    options:
    - Дуже інтенсивну ознаку
    - Наближену, неповну ознаку
    - Належність людині
    - Географічне походження
    correct: 1
  - question: Який суфікс треба додати до слова «Париж», щоб утворити прикметник?
    options:
    - -ськ-
    - -зьк-
    - -цьк-
    - -н-
    correct: 1
  - question: Які суфікси додають слову найбільшої інтенсивності та сили?
    options:
    - -еньк-, -есеньк-
    - -юч-, -ющ-
    - -ськ-, -зьк-
    - -уват-, -юват-
    correct: 1
  - question: Яке чергування голосних відбувається у слові «шкільний» порівняно зі
      словом «школа»?
    options:
    - «о» переходить в «і»
    - «е» переходить в «і»
    - «а» переходить в «я»
    - «о» переходить в «е»
    correct: 0
  title: Дайте відповіді на запитання за текстом про суфіксальне творення.
- id: fill-in-possessive
  type: fill-in
  instruction: Вставте правильний присвійний прикметник.
  items:
  - sentence: Це ____ дім.
    answer: батьків
    options:
    - батьковий
    - батьків
    - батьківський
    - батька
  - sentence: Я чую ____ голос.
    answer: материн
    options:
    - мамин
    - материний
    - материн
    - материнський
  - sentence: Там лежить ____ олівець.
    answer: Сергіїв
    options:
    - Сергіїв
    - Сергієвий
    - Сергієв
    - Сергія
  - sentence: Це ____ зошит.
    answer: Маріїн
    options:
    - Маріїн
    - Маріїний
    - Марії
    - Марієв
  - sentence: Вона взяла ____ словник.
    answer: Миколин
    options:
    - Миколів
    - Миколи
    - Миколин
    - Миколиний
  - sentence: Я прочитав ____ книгу.
    answer: сестрину
    options:
    - сестрину
    - сестринську
    - сестри
    - сестрин
  title: Вставте правильний присвійний прикметник.
- id: quiz-focus-on-choosing-between-and-in-various-context-sentences
  type: quiz
  instruction: Оберіть правильний варіант написання прикметників.
  items:
  - question: Я п'ю ____ сік.
    options:
    - лимоний
    - лимонний
    - лимоняний
    - лимонаний
    correct: 1
  - question: У мене є гарний ____ посуд.
    options:
    - глиняний
    - глинний
    - глинняний
    - глиновий
    correct: 0
  - question: Сьогодні дуже ____ день.
    options:
    - туманий
    - тумановий
    - туманяний
    - туманний
    correct: 3
  - question: Це смачний ____ суп.
    options:
    - гречанний
    - гречаний
    - гречний
    - гречковий
    correct: 1
  - question: Який ____ вітер!
    options:
    - страшенний
    - страшений
    - страшенський
    - страшноватий
    correct: 0
  - question: Там стоїть ____ замок.
    options:
    - старинний
    - старовиний
    - старовинний
    - старий
    correct: 2
  title: Оберіть правильний варіант написання прикметників.
- id: match-formation-methods
  type: match-up
  instruction: З'єднайте слово та спосіб його творення.
  pairs:
  - left: шкільний
    right: суфіксальний (-н-)
  - left: прегарний
    right: префіксальний (пре-)
  - left: прибережний
    right: префіксально-суфіксальний (при-...-н-)
  - left: чорнобровий
    right: складання основ (з -о-)
  - left: безмежний
    right: префіксально-суфіксальний (без-...-н-)
  - left: надважливий
    right: префіксальний (над-)
  title: З'єднайте слово та спосіб його творення.
- id: error-correction-focus-on-fixing-adjectives-where-the-alternation-was-missed-e-g-instead-of
  type: error-correction
  instruction: Знайдіть і виправте помилку в чергуванні.
  items:
  - sentence: Це дуже давня книгна історія.
    error: книгна
    correction: книжна
    error_type: word
    options:
    - книжна
    - книжева
    - книгова
    explanation: 'Звук [г] переходить у [ж]: книга -> книжний.'
  - sentence: У нього дуже рукий собака.
    error: рукий
    correction: ручний
    error_type: word
    options:
    - ручний
    - руковий
    - рукний
    explanation: 'Звук [к] переходить у [ч]: рука -> ручний.'
  - sentence: Сьогодні такий сонцний день!
    error: сонцний
    correction: сонячний
    error_type: word
    options:
    - сонцевий
    - сонячний
    - сонцний
    explanation: 'Звук [ц] переходить у [ч], а також з''являється «я»: сонце -> сонячний.'
  - sentence: Це був осіний холодний ранок.
    error: осіний
    correction: осінній
    error_type: word
    options:
    - осінній
    - осіньовий
    - осінний
    explanation: 'Подвоєння «нн» та збереження «і» у закритому складі: осінь + н ->
      осінній.'
  - sentence: Вона купила гороховий костюм.
    error: гороховий
    correction: горошковий
    error_type: word
    options:
    - горошковий
    - горошний
    - горошиний
    explanation: 'Звук [х] переходить у [ш]: горох -> горошковий.'
  - sentence: Він має дуже ніжний папірний літачок.
    error: папірний
    correction: паперовий
    error_type: word
    options:
    - паперовий
    - папіровий
    - папірський
    explanation: 'У відкритому складі звук [і] переходить в [е], і використовується
      суфікс -ов-: папір -> паперовий.'
  title: Знайдіть і виправте помилку в чергуванні.
- id: essay-compound-adjectives-essay-response-focus-on-describing-a-favorite-landscape-or-person-using-at-least-5-compound-adjectives-minimum-150-words
  type: essay-response
  prompt: Напишіть невеликий твір (мінімум 150 слів), у якому опишіть ваш улюблений
    пейзаж або знайому людину. Обов'язково використайте щонайменше 5 складних прикметників
    (наприклад, чорнобровий, темно-зелений, правобережний тощо).
  min_words: 150
  model_answer: Мій улюблений пейзаж — це осінній ліс у Карпатах. Коли я гуляю там,
    мене завжди вражає різноманіття кольорів. Дерева вкриті темно-зеленим, яскраво-жовтим
    та вогняно-червоним листям. Небо над горами зазвичай ніжно-блакитне, з легкими
    білуватими хмарами. Це справжня казка! Я люблю сидіти біля гірської річки. Вода
    в ній кристально-чиста та холодна. На березі часто можна побачити чорнобрових
    місцевих жителів, які збирають гриби. Атмосфера тут неймовірно спокійна та умиротворена.
    Це ідеальне місце для відпочинку від міського шуму та повсякденних турбот. Природа
    тут здається вічно-молодою та недоторканою.
  rubric:
  - criteria: Використання складних прикметників
    description: У тексті є щонайменше 5 складних прикметників, утворених правильно
      (разом або через дефіс).
  - criteria: Орфографія
    description: Складні прикметники написані відповідно до правил (разом для підрядних
      словосполучень, через дефіс для рівноправних слів та кольорів).
workbook:
- id: wb-match-up-vocab
  type: match-up
  instruction: З'єднайте граматичні терміни з їхніми англійськими відповідниками.
  pairs:
  - left: словотвір
    right: word formation
  - left: твірна основа
    right: derivational base
  - left: сполучна голосна
    right: connecting vowel
  - left: присвійний прикметник
    right: possessive adjective
  - left: складний прикметник
    right: compound adjective
  - left: подвоєння
    right: doubling
  title: З'єднайте граматичні терміни з їхніми англійськими відповідниками.
- id: wb-group-sort-hyphen
  type: group-sort
  instruction: Розподіліть складні прикметники за правилом написання (разом чи через
    дефіс).
  groups:
  - label: Разом (solidly)
    items:
    - правобережний
    - сільськогосподарський
    - народнопісенний
    - працелюбний
    - західноукраїнський
  - label: Через дефіс (with a hyphen)
    items:
    - північно-західний
    - темно-зелений
    - кисло-солодкий
    - жовто-блакитний
    - гірко-солоний
  title: Розподіліть складні прикметники за правилом написання (разом чи через дефіс).
- id: wb-true-false-rules
  type: true-false
  instruction: Визначте, чи правильні ці твердження про словотвір прикметників.
  items:
  - statement: Суфікс -н- є найбільш продуктивним для творення відносних прикметників.
    correct: true
    explanation: Так, він найчастіше використовується (зима -> зимний, стіна -> стінний).
  - statement: Присвійні прикметники завжди мають закінчення -ий у називному відмінку
      чоловічого роду.
    correct: false
    explanation: Ні, вони мають коротку форму з нульовим закінченням (батьків, материн).
  - statement: Слово «лимонний» пишеться з двома літерами «н», бо основа закінчується
      на «н», а суфікс починається на «н».
    correct: true
    explanation: 'Так, це правило подвоєння: лимон + н = лимонний.'
  - statement: Складні прикметники, що позначають кольори, завжди пишуться разом.
    correct: false
    explanation: Ні, кольори пишуться через дефіс (темно-зелений, синьо-жовтий).
  - statement: Префікс «пре-» вказує на найвищий ступінь вияву ознаки (дуже).
    correct: true
    explanation: Наприклад, «прегарний» означає дуже гарний.
  - statement: Суфікси -уват- / -юват- показують збільшену інтенсивність ознаки.
    correct: false
    explanation: Ні, вони означають наближену, неповну ознаку (синюватий - трохи синій).
  title: Визначте, чи правильні ці твердження про словотвір прикметників.
- id: wb-fill-in-suffixes
  type: fill-in
  instruction: Вставте правильний прикметник із відповідним суфіксом.
  items:
  - sentence: Це не просто злий собака, він справді ____!
    answer: злющий
    options:
    - злющий
    - зленький
    - злуватий
    - зливий
  - sentence: Який милий і ____ котик!
    answer: малесенький
    options:
    - малесенький
    - малющий
    - малуватий
    - маливий
  - sentence: Він дуже ____ хлопець, завжди знайде вихід.
    answer: кмітливий
    options:
    - кмітливий
    - кмітлуватий
    - кмітленький
    - кмітлючий
  - sentence: Колір цієї стіни не ідеально білий, він ____.
    answer: білуватий
    options:
    - білуватий
    - біленький
    - білющий
    - біливий
  - sentence: Це був ____ дуб у центрі лісу.
    answer: здоровенний
    options:
    - здоровенний
    - здоровенький
    - здоровуватий
    - здоровивий
  - sentence: Чай був не дуже солодкий, лише ____.
    answer: солодкуватий
    options:
    - солодкуватий
    - солоденький
    - солодкучий
    - солоденний
  title: Вставте правильний прикметник із відповідним суфіксом.
- id: wb-essay-possessive
  type: essay-response
  prompt: Напишіть 5 речень, використовуючи нову лексику з розділу «Присвійні прикметники»
    (наприклад, батьків, материн, сестрин, Сергіїв тощо).
  min_words: 50
  model_answer: Сьогодні я взяв батьків телефон, щоб зателефонувати. Материн голос
    у слухавці був дуже радісним. Після роботи ми поїхали в Андріїв дім на вечерю.
    Там я побачив сестрин малюнок на стіні. Це був справді гарний Миколин портрет.
  rubric:
  - criteria: Використання присвійних прикметників
    description: У тексті є щонайменше 5 різних присвійних прикметників.
  - criteria: Правильність форм
    description: Присвійні прикметники мають правильні закінчення залежно від роду,
      числа та відмінка іменника, до якого вони належать.
