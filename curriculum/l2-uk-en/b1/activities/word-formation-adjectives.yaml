version: '1.0'
module: word-formation-adjectives
level: b1
workbook:
- id: quiz-suffixes
  type: quiz
  instruction: Оберіть правильний прикметник, утворений від поданого слова
  items:
  - question: Який прикметник походить від слова «ліс»?
    options:
    - лісовий
    - лісний
    - лісяний
    - лісоватий
    correct: 0
  - question: Який прикметник походить від слова «місто»?
    options:
    - міський
    - містовий
    - міственний
    - місткий
    correct: 0
  - question: 'Як правильно сказати: телефон, який належить Сашкові?'
    options:
    - Сашків
    - Сашков
    - Сашкін
    - Сашковий
    correct: 0
  - question: 'Як правильно сказати: книга, яка належить Ганні?'
    options:
    - Ганнин
    - Ганнів
    - Ганнова
    - Ганнін
    correct: 0
  - question: Який прикметник утворюється від слова «козак»?
    options:
    - козаський
    - козакський
    - козацький
    - козазький
    correct: 2
  - question: Який прикметник утворюється від назви міста Прага?
    options:
    - прагський
    - пражський
    - працький
    - празький
    correct: 3
  - question: Як правильно утворити прикметник від слова «Париж»?
    options:
    - паризький
    - парижський
    - парицький
    - париський
    correct: 0
  - question: 'Як правильно сказати: дім, який належить батькові?'
    options:
    - батьковий
    - батьків
    - батькін
    - батьков
    correct: 1
- id: fill-in-doubling
  type: fill-in
  instruction: Оберіть правильний варіант написання прикметника
  items:
  - sentence: Я дуже люблю пити ____ чай.
    answer: лимонний
    options:
    - лимонний
    - лимоний
  - sentence: Бджоли збирають ____ мед.
    answer: гречаний
    options:
    - гречаний
    - гречанний
    - гречковий
  - sentence: У мене сьогодні такий ____ настрій.
    answer: сонний
    options:
    - сонний
    - соний
  - sentence: Ми побачили в небі ____ ключ.
    answer: журавлиний
    options:
    - журавлиний
    - журавлинний
  - sentence: Це був дуже ____ ранок.
    answer: туманний
    options:
    - туманний
    - туманий
  - sentence: Ми пили смачний ____ сік.
    answer: журавлинний
    options:
    - журавлинний
    - журавлиний
  - sentence: У кімнаті стоїть ____ стіл.
    answer: дерев'яний
    options:
    - дерев'яний
    - дерев'янний
  - sentence: Це гарний ____ посуд.
    answer: скляний
    options:
    - скляний
    - склянний
- id: match-up-derivation
  type: match-up
  instruction: З'єднайте базове слово з похідним прикметником
  pairs:
  - left: море
    right: морський
  - left: літо
    right: літній
  - left: студент
    right: студентський
  - left: золото
    right: золотистий
  - left: розум
    right: розумний
  - left: вигадка
    right: вигадливий
  - left: Париж
    right: паризький
  - left: Одеса
    right: одеський
- id: group-sort-formation
  type: group-sort
  instruction: Розподіліть прикметники за способом творення
  groups:
  - label: Суфіксальний
    items:
    - морський
    - лісовий
    - книжковий
  - label: Префіксальний
    items:
    - прегарний
    - антивоєнний
    - надзвичайний
  - label: Префіксально-суфіксальний
    items:
    - приморський
    - підводний
    - закордонний
  - label: Складання основ
    items:
    - чорноокий
    - синьо-жовтий
    - правобережний
- id: error-correction-spelling
  type: error-correction
  instruction: Знайдіть і виправте помилку в написанні прикметника
  items:
  - sentence: Це був дуже туманий і холодний ранок.
    error: туманий
    correction: туманний
    error_type: word
    options:
    - туманний
    - туманий
    - тумановий
    explanation: Основа «туман-» + суфікс «-н-» = туманний.
  - sentence: Ми купили новий французський сир.
    error: французський
    correction: французький
    error_type: word
    options:
    - французький
    - французкий
    - француський
    explanation: Основа на [з] змінює суфікс -ськ- на -зьк-.
  - sentence: Ця пташка має солов'їнний голос.
    error: солов'їнний
    correction: солов'їний
    error_type: word
    options:
    - солов'їний
    - солов'янний
    - соловіний
    explanation: Суфікс -їн- (приналежність тварині) пишеться з однією літерою «н».
  - sentence: Ми пили дуже смачний лимоний сік.
    error: лимоний
    correction: лимонний
    error_type: word
    options:
    - лимонний
    - лимоновий
    - лимоннний
    explanation: Основа «лимон-» + суфікс «-н-» = лимонний.
  - sentence: Сьогодні справжній осіний день.
    error: осіний
    correction: осінній
    error_type: word
    options:
    - осінній
    - осінний
    - осіньовий
    explanation: Основа «осінь-» + суфікс «-н-» = осінній.
  - sentence: У музеї є козакська зброя.
    error: козакська
    correction: козацька
    error_type: word
    options:
    - козацька
    - козазька
    - козаська
    explanation: Основа на [к] (козак) змінює суфікс на -цьк-.
- id: fill-in-base-words
  type: fill-in
  instruction: Вставте базове слово (називний відмінок), від якого утворений прикметник
  items:
  - sentence: Базове слово для прикметника «ручний» — це ____.
    answer: рука
    options:
    - рука
    - ручка
    - ручити
  - sentence: Прикметник «очний» походить від слова ____.
    answer: око
    options:
    - око
    - окуляри
    - очі
  - sentence: Слово «сільський» утворене від іменника ____.
    answer: село
    options:
    - село
    - сіль
    - селити
  - sentence: Прикметник «шкільний» походить від слова ____.
    answer: школа
    options:
    - школа
    - школяр
    - школити
  - sentence: Слово «празький» утворене від географічної назви ____.
    answer: Прага
    options:
    - Прага
    - прагнення
    - порог
  - sentence: Прикметник «галицький» походить від назви міста ____.
    answer: Галич
    options:
    - Галич
    - Галичина
    - галка
- id: match-up-compounds
  type: match-up
  instruction: З'єднайте частини, щоб утворити правильний складний прикметник
  pairs:
  - left: чорні + очі
    right: чорноокий
  - left: Західна + Україна
    right: західноукраїнський
  - left: жовтий + гарячий
    right: жовтогарячий
  - left: сільське + господарство
    right: сільськогосподарський
  - left: синій + жовтий
    right: синьо-жовтий
  - left: червоний + чорний
    right: червоно-чорний
  - left: правий + берег
    right: правобережний
  - left: північ + захід
    right: північно-західний
