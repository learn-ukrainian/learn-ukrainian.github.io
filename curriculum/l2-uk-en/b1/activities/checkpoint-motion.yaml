  - question: 'Оберіть правильний відмінок після ''між'': ''Крісло стоїть між _____''.'
    options:
    - вікном і шафою
    - вікна і шафи
    - вікну і шафі
    - вікно і шафу
    correct: 0
  - question: Що означає префікс 'пере-' у слові 'перейти'?
    options:
    - Рух через перешкоду
    - Початок руху
    - Рух навколо об'єкта
    - Рух усередину
