  title: Розподіліть вирази на ті, що мають пряме та переносне значення
- id: error-correction-motion
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Я підійшов біля вікна, щоб подивитися на вулицю.
    error: біля
    correction: до
    error_type: word
    explanation: Префікс 'під-' завжди вимагає прийменника 'до' та родового відмінка
      (наближення).
  - sentence: Дівчина пішла в школу щодня.
    error: пішла
    correction: ходила
    error_type: word
    explanation: Маркер 'щодня' означає регулярну дію, тому потрібно використовувати
      різноспрямоване дієслово 'ходити'.
  - sentence: Час іде дуже бистро.
    error: бистро
    correction: швидко
    error_type: register
    explanation: '''Бистро'' — це русизм, українською правильно говорити ''швидко''.'
  - sentence: Машина переїхала повз автобусну зупинку.
    error: переїхала
    correction: проїхала
    error_type: word
    explanation: Прийменник 'повз' використовується з префіксом 'про-' (рух повз об'єкт).
  - sentence: Ми доїхали в місто дуже пізно ввечері.
    error: в
    correction: до
    error_type: word
    explanation: Дієслова з префіксом 'до-' (досягнення межі) вимагають прийменника
      'до'.
  - sentence: У мене голова кружиться від такої кількості інформації.
    error: кружиться
    correction: йде обертом
    error_type: phrase
    explanation: '''Голова кружиться'' — це калька, український фразеологізм — ''голова
      йде обертом''.'
  - sentence: Я ходжу на роботу саме зараз.
    error: ходжу
    correction: іду
    error_type: word
    explanation: Слово 'зараз' вказує на односпрямований рух у момент мовлення, тому
      потрібно 'іду'.
  - sentence: Корабель відлетів від причалу вчасно.
    error: відлетів
    correction: відплив
    error_type: word
    explanation: Для водного транспорту (корабель) ми використовуємо дієслова з коренем
      '-плив-'.
  title: Знайдіть і виправте помилку в реченні
- id: travel-comprehension-questions
  type: true-false
  instruction: Визначте, чи правдиві ці твердження за текстом подорожі
  items:
  - statement: Мандрівка автомобілем через Україну почалася пізно ввечері.
    correct: false
    explanation: Мандрівка почалася дуже рано (вдосвіта).
  - statement: Туристи доїхали до міста Рівне ближче до обіду.
    correct: true
    explanation: Так, вони пили каву біля сучасного кафе в Рівному.
  - statement: Автомобіль залишили на безпечній парковці навпроти готелю в Києві.
    correct: false
    explanation: Парковка та готель знаходилися у Львові.
  - statement: Поїзд номер 143 іде чітко за розкладом і не запізнюється.
    correct: true
    explanation: Касир підтвердив, що поїзд іде за розкладом.
  - statement: Касир радить пасажиру почекати в залі очікування.
    correct: false
    explanation: Касир радить перейти на платформу вже зараз, бо стоянка лише п'ять
      хвилин.
  - statement: Фінальною точкою автомобільної мандрівки було мальовниче місто Яремче.
    correct: true
    explanation: Так, мандрівники приїхали в Яремче і підійшли до гірської річки.
  title: Визначте, чи правдиві ці твердження за текстом подорожі
- id: fill-in-travel-narrative
  type: fill-in
  instruction: Вставте правильне дієслово руху в історію про подорож
  items:
  - sentence: Одного холодного ранку я вирішив, що мені терміново потрібно _____ далеко
      від галасливого міста.
    answer: поїхати
  - sentence: Я спакував свої речі, _____ з квартири...
    answer: вийшов
  - sentence: '...і швидким кроком _____ на найближчу автобусну зупинку.'
    answer: пішов
  - sentence: Коли я _____ до зупинки, мій автобус саме наближався.
    answer: підійшов
  - sentence: Я обережно _____ у салон автобуса.
    answer: зайшов
  - sentence: На вокзалі було багато людей, і мені довелося довго _____ між різними
      платформами.
    answer: ходити
  - sentence: Коли я знайшов свій вагон, потяг майже відразу _____ від перону.
    answer: від'їхав
  - sentence: Ми _____ дуже довго, мабуть, годин десять або більше.
    answer: їхали
  - sentence: Коли ми врешті-решт _____ в маленьке мальовниче містечко в Карпатах,
      надворі була ніч.
    answer: приїхали
  - sentence: Наступного ранку наша група туристів _____ через замерзлу гірську річку.
    answer: перейшла
  title: Вставте правильне дієслово руху в історію про подорож
- id: free-write-journey
  type: essay-response
  instruction: Напишіть коротку розповідь про подорож
  min_words: 50
  prompt: 'Напишіть детальний текст про вашу ідеальну поїздку Україною на найближчі
    вихідні. Обов''язково використовуйте нові слова: маршрут, розклад та замовити.
    Ваша розповідь має містити щонайменше вісім різних префіксальних дієслів руху,
    чотири просторові прийменники та п''ять слів, пов''язаних із транспортом.'
  model_answer: 'Моя ідеальна подорож почнеться в суботу вранці. Ми вирішили поїхати
    до Одеси. Спочатку я маю вийти з дому і підійти до метро. Я вже встиг замовити
    квитки онлайн, тому нам не треба стояти в черзі. Наш маршрут дуже цікавий: ми
    доїдемо до вокзалу, зайдемо у вагон і наш потяг швидко від''їде від перону. Розклад
    дуже зручний. Ми будемо їхати кілька годин, проїдемо повз гарні міста і села.
    Коли ми приїдемо в Одесу, ми одразу підемо на море. Там ми перейдемо через парк,
    щоб опинитися біля пляжу. Час летить дуже швидко, коли ми подорожуємо!'
  rubric:
  - criteria: Лексика
    description: Використано слова маршрут, розклад, замовити та транспортну лексику.
  - criteria: Граматика
    description: Правильно використано дієслова руху з префіксами та просторові прийменники.
  - criteria: Обсяг
    description: Текст містить мінімум 50 слів.
  title: Напишіть коротку розповідь про подорож
workbook:
- type: quiz
  instruction: 'Підсумкова контрольна робота: перевірте свої знання всіх тем (модулі
    27-36)'
  items:
  - question: 'Який прийменник потрібен у реченні: ''Собака спить _____ столом''?'
