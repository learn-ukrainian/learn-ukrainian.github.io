version: '1.0'
module: checkpoint-motion
level: b1
workbook:
- id: quiz-mixed-motion
  type: quiz
  instruction: Оберіть правильний варіант, щоб логічно та граматично доповнити речення
  items:
  - question: Я часто _____ на роботу до Києва.
    options:
    - їжджу
    - їду
    - ходжу
    - йду
    correct: 0
  - question: Вона поклала свій розклад _____ великий стіл.
    options:
    - під
    - в
    - до
    - з
    correct: 0
  - question: Ми швидко _____ до річки, але не стали її перепливати.
    options:
    - дійшли
    - прийшли
    - відійшли
    - зайшли
    correct: 0
  - question: 'Як каже народна мудрість: сім разів відміряй, один _____.'
    options:
    - відріж
    - переріж
    - заріж
    - виріж
    correct: 0
  - question: Я _____ з теплого дому о восьмій ранку, щоб почати подорож.
    options:
    - вийшов
    - пішов
    - зійшов
    - обійшов
    correct: 0
  - question: Мій друг дуже впевнено стоїть _____ мною.
    options:
    - поруч зі
    - біля
    - коло
    - неподалік
    correct: 0
  - question: Ми швидко _____ повз старий історичний театр.
    options:
    - проїхали
    - переїхали
    - об'їхали
    - під'їхали
    correct: 0
  - question: Наш туристичний автобус зупинився _____ центральної площі.
    options:
    - посеред
    - серед
    - навкруги
    - між
    correct: 0
  - question: Зараз я швидко _____ на важливу зустріч.
    options:
    - йду
    - ходжу
    - їжджу
    - ношу
    correct: 0
  - question: Після довгої подорожі наш літак нарешті _____ до аеропорту.
    options:
    - прилетів
    - долетів
    - пролетів
    - перелетів
    correct: 0
  - question: Його справи _____ дуже добре після успішної перевірки.
    options:
    - йдуть
    - ходять
    - біжать
    - їдуть
    correct: 0
  - question: Моя дорожня сумка спокійно лежить _____ столом.
    options:
    - під
    - в
    - на
    - до
    correct: 0
- id: fill-in-travel
  type: fill-in
  instruction: Вставте правильні дієслова руху та просторові прийменники, щоб завершити
    розповідь про подорож
  items:
  - sentence: Минулого тижня ми вирішили _____ у цікаву подорож до Карпат.
    answer: поїхати
    options:
    - поїхати
    - піти
    - приїхати
    - доїхати
  - sentence: Рано-вранці ми _____ з дому і впевнено сіли в нашу машину.
    answer: вийшли
    options:
    - вийшли
    - зайшли
    - прийшли
    - пішли
  - sentence: Спочатку ми дві години швидко _____ широкою трасою.
    answer: їхали
    options:
    - їхали
    - їздили
    - йшли
    - ходили
  - sentence: Потім ми _____ повз мальовниче гірське озеро.
    answer: проїхали
    options:
    - проїхали
    - переїхали
    - об'їхали
    - під'їхали
  - sentence: На старій дорозі була глибока яма, але водій її обережно _____.
    answer: об'їхав
    options:
    - об'їхав
    - під'їхав
    - переїхав
    - від'їхав
  - sentence: Коли ми нарешті _____ до лісу, ми зупинили машину.
    answer: приїхали
    options:
    - приїхали
    - доїхали
    - заїхали
    - виїхали
  - sentence: Ми залишили нашу машину _____ високих дерев.
    answer: біля
    options:
    - біля
    - на
    - під
    - між
  - sentence: Далі за нашим розкладом нам потрібно було _____ пішки.
    answer: іти
    options:
    - іти
    - ходити
    - їхати
    - їздити
  - sentence: Ми безпечно _____ через річку по старому дерев'яному мосту.
    answer: перейшли
    options:
    - перейшли
    - пройшли
    - обійшли
    - дійшли
  - sentence: Увечері ми успішно _____ до нашої туристичної бази.
    answer: дійшли
    options:
    - дійшли
    - відійшли
    - зайшли
    - пішли
- id: match-prefixes
  type: match-up
  instruction: З'єднайте префікси руху з їхнім детальним просторовим значенням
  pairs:
  - left: при-
    right: успішне прибуття до кінцевої мети
  - left: до-
    right: досягнення певної межі без проникнення всередину
  - left: від-
    right: рух від об'єкта на коротку відстань
  - left: пі- / по-
    right: початок довгої подорожі або зникнення з поля зору
  - left: за-
    right: рух всередину закритого простору або коротка зупинка
  - left: ви-
    right: активний рух із закритого внутрішнього простору назовні
  - left: пере-
    right: рух з одного боку на інший, подолання перешкоди
  - left: про-
    right: рух повз об'єкт або крізь нього без зупинки
  - left: під-
    right: максимальне наближення до конкретної цілі
  - left: об-
    right: обережний рух навколо проблеми чи перешкоди
- id: error-motion-verbs
  type: error-correction
  instruction: Знайдіть і виправте помилки у використанні дієслів руху та просторових
    прийменників
  items:
  - sentence: Зараз я впевнено ходжу в кав'ярню за кавою.
    error: ходжу
    correction: йду
    error_type: word
    options:
    - йду
    - їду
    - біжу
    explanation: Для конкретної одноразової дії, яка відбувається прямо зараз, ми
      використовуємо односпрямоване дієслово 'йду'.
  - sentence: Моя велика машина стоїть біля будинком.
    error: будинком
    correction: будинку
    error_type: word
    options:
    - будинку
    - будинкові
    - будинок
    explanation: Просторовий прийменник 'біля' завжди вимагає використання іменника
      в родовому відмінку.
  - sentence: Ми переїхали повз старий історичний театр під час нашої подорожі.
    error: переїхали
    correction: проїхали
    error_type: word
    options:
    - проїхали
    - об'їхали
    - під'їхали
    explanation: Спокійний рух повз об'єкт транзитом завжди описується префіксом 'про-'.
  - sentence: Я прийшов до річки, але не став її перепливати.
    error: прийшов
    correction: дійшов
    error_type: word
    options:
    - дійшов
    - зайшов
    - зійшов
    explanation: Якщо рух означає тільки фізичне досягнення певної межі без прибуття
      всередину, використовується префікс 'до-'.
  - sentence: Мій друг їзде до лікаря кожного тижня.
    error: їзде
    correction: їздить
    error_type: word
    options:
    - їздить
    - їхає
    - їде
    explanation: Правильна форма третьої особи однини від різноспрямованого дієслова
      'їздити' — 'їздить'.
  - sentence: Великий дерев'яний стіл стоїть між двох вікон.
    error: двох вікон
    correction: двома вікнами
    error_type: phrase
    options:
    - двома вікнами
    - два вікна
    - двом вікнам
    explanation: Прийменник 'між' завжди і без винятків вимагає орудного відмінка.
  - sentence: Сучасний пасажирський літак повільно пливе в небі.
    error: пливе
    correction: летить
    error_type: word
    options:
    - летить
    - іде
    - їде
    explanation: Для всього повітряного транспорту та переносного значення для часу
      ми обов'язково використовуємо дієслово 'летіти'.
  - sentence: Цей старий настінний годинник уже не ходить.
    error: ходить
    correction: іде
    error_type: word
    options:
    - іде
    - біжить
    - їздить
    explanation: В українській мові всі механізми (наприклад, годинники) 'ідуть' у
      переносному значенні, а не 'ходять'.
- id: group-prefixes
  type: group-sort
  instruction: Розподіліть дієслова за загальним просторовим значенням їхнього префікса
  groups:
  - label: Точка прибуття та наближення (при-, до-, під-)
    items:
    - приїхати
    - прийти
    - дійти
    - доїхати
    - підійти
  - label: Відправлення та залишення (пі-/по-, від-, ви-)
    items:
    - піти
    - поїхати
    - відійти
    - вийти
    - виїхати
  - label: Подолання перешкод та транзит (пере-, про-, об-)
    items:
    - перейти
    - переїхати
    - пройти
    - проїхати
    - об'їхати
  - label: Рух у закритий простір та коротка зупинка (за-)
    items:
    - зайти
    - заїхати
    - забігти
    - залетіти
    - занести
- id: essay-travel-story
  type: essay-response
  instruction: Напишіть коротку розповідь (мінімум 50 слів) про вашу уявну подорож
    Україною.
  prompt: 'Опишіть ваш ідеальний маршрут: звідки ви виїхали, яким транспортом користувалися,
    як ішов час у дорозі, що ви проїжджали та куди нарешті приїхали. Використайте
    переносне значення дієслів (наприклад, ''час летить''), щонайменше 5 різних префіксів
    руху та слова: подорож, маршрут, розклад.'
  min_words: 50
  model_answer: Моя велика подорож Україною почалася дуже рано. Згідно з нашим розкладом,
    ми вийшли з дому о шостій і сіли в машину. Спочатку ми швидко їхали трасою, час
    летів непомітно. Ми проїхали повз красиві ліси і згодом доїхали до Карпат. Наш
    маршрут був складним, довелося об'їхати кілька поганих доріг. Нарешті ми приїхали
    до Яремче. Готель знаходився поруч із річкою, куди ми відразу пішли гуляти.
  evaluation_criteria:
  - Текст містить мінімум 50 слів і логічно описує подорож.
  - 'Використано щонайменше 5 різних префіксів руху (наприклад: вийти, проїхати, доїхати,
    об''їхати, приїхати).'
  - Використано хоча б один вислів із переносним значенням (наприклад, 'час летить'
    або 'час іде').
  - 'Органічно використано цільову лексику: подорож, маршрут, розклад.'
