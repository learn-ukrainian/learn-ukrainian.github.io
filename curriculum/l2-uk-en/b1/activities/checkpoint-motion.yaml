  - sentence: Нам доведеться _____ усю площу, щоб знайти цей пам'ятник.
    answer: обійти
    options:
    - обійти
    - зайти
    - вийти
    - перейти
  - sentence: Ви повинні _____ з кімнати і зачекати в коридорі.
    answer: вийти
    options:
    - вийти
    - підійти
    - зайти
    - перейти
  - sentence: Сьогодні ми _____ три маленькі села, перш ніж побачили велике місто.
    answer: проїхали
    options:
    - проїхали
    - переїхали
    - об'їхали
    - виїхали
  - sentence: Він вирішив _____ до відкритого вікна, щоб подивитися на вулицю.
    answer: підійти
    options:
    - підійти
    - відійти
    - перейти
    - пройти
  - sentence: Ми обережно _____ через вузькі трамвайні колії.
    answer: перейшли
    options:
    - перейшли
    - зайшли
    - вийшли
    - підійшли
  title: Вставте правильне дієслово з префіксом (за-, ви-, пере-, про-, об-, під-)
- id: matching-prefix-meanings
  type: match-up
  instruction: З'єднайте префікси дієслів руху з їхнім просторовим значенням
  pairs:
  - left: при-
    right: прибуття на місце, фінальна точка
  - left: до-
    right: досягнення певної географічної межі
  - left: по-
    right: старт руху або початок подорожі
  - left: від-
    right: рух від об'єкта, збільшення дистанції
  - left: за-
    right: рух усередину або короткий візит по дорозі
  - left: ви-
    right: рух назовні, покидання закритого простору
  - left: пере-
    right: рух через лінію, бар'єр або перешкоду
  - left: про-
    right: швидкий рух повз об'єкт або крізь нього
  - left: об-
    right: рух навколо перешкоди
  - left: під-
    right: наближення до об'єкта на коротку дистанцію
  title: З'єднайте префікси дієслів руху з їхнім просторовим значенням
