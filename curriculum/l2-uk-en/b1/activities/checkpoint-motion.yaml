  - question: 'Яке дієслово підходить найкраще: ''Наш літак _____ в аеропорт вчасно''?'
    options:
    - прилетів
    - полетів
    - вилетів
    - перелетів
    correct: 0
  - question: 'Доповніть фразу: ''У мене дуже багато роботи, просто _____ йде обертом''.'
    options:
    - голова
    - час
    - думка
    - справа
    correct: 0
  - question: 'Оберіть правильну пару до дієслова ''приїхати'':'
    options:
    - приїжджати
    - доїжджати
    - виїжджати
    - їздити
    correct: 0
  - question: Яке дієслово означає 'регулярно пересуватися пішки'?
    options:
    - ходити
    - іти
    - їздити
    - бігати
    correct: 0
  - question: 'Який прийменник потрібен після ''підійти'': ''Я підійшов _____ дверей''?'
    options:
    - до
    - в
    - на
    - за
    correct: 0
  - question: 'Знайдіть речення з переносним значенням:'
    options:
    - Час летить дуже швидко.
    - Птах летить у небі.
    - Машина їде по дорозі.
    - Діти біжать до школи.
    correct: 0
  - question: Яке дієслово правильно описує рух корабля від берега?
    options:
    - відплив
    - приплив
    - відлетів
    - переплив
    correct: 0
  title: 'Підсумкова контрольна робота: перевірте свої знання всіх тем (модулі 27-36)'
