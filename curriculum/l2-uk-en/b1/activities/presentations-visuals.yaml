- type: match-up
  title: 'Знайдіть пару: терміни та їхні значення'
  instruction: Поєднайте слова з їхнім правильним визначенням у контексті презентації.
  pairs:
  - left: Презентація
    right: Візуальний інструмент психологічного та інтелектуального впливу на слухачів
  - left: Графік
    right: Зображення, яке показує динаміку змін певного показника у часі
  - left: Діаграма
    right: Малюнок, що показує внутрішнє співвідношення різних частин до єдиного цілого
  - left: Розклад
    right: План подій за часом, наприклад, розклад поїздів чи уроків
  - left: Аудиторія
    right: Група людей, які зібралися, щоб послухати вашу доповідь
  - left: Джерело
    right: Авторитетний текст чи документ, з якого ви берете факти для виступу
  - left: Частка
    right: Певна частина від загальної кількості на круговій діаграмі
  - left: Тенденція
    right: Загальний напрямок розвитку або зміни певного явища
- type: fill-in
  title: Вставте пропущені слова у фразах
  instruction: Оберіть правильне слово для кожної класичної фрази з презентації.
  items:
  - sentence: Перш за все, я хочу щиро ___ всім вам за можливість виступити.
    answer: подякувати
    options:
    - подякувати
    - сказати
    - попросити
    - запитати
  - sentence: Дозвольте сьогодні ___ вам ключові результати нашого дослідження.
    answer: представити
    options:
    - представити
    - написати
    - подумати
    - сховати
  - sentence: Головною ___ моєї сьогоднішньої доповіді є інноваційна стратегія розвитку.
    answer: темою
    options:
    - темою
    - думкою
    - картиною
    - книгою
  - sentence: Зверніть ___ на правий верхній кут екрана, де графік змінює напрямок.
    answer: увагу
    options:
    - увагу
    - очі
    - голову
    - думку
  - sentence: Важливо ___, що цей фінансовий результат є абсолютним рекордом.
    answer: наголосити
    options:
    - наголосити
    - промовчати
    - забути
    - перейти
  - sentence: А зараз давайте детальніше розглянемо інший ___ цієї складної проблеми.
    answer: аспект
    options:
    - аспект
    - момент
    - графік
    - секрет
  - sentence: Підсумовуючи все ___, я хочу ще раз підкреслити три найголовніші моменти.
    answer: сказане
    options:
    - сказане
    - написане
    - зроблене
    - почуте
  - sentence: На ___ нашої зустрічі я хочу ще раз подякувати вам за увагу.
    answer: завершення
    options:
    - завершення
    - початок
    - продовження
    - відкриття
- type: group-sort
  title: Розподіліть фрази за групами
  instruction: Розподіліть дієслова та фрази залежно від того, яку динаміку вони описують.
  groups:
  - name: Зростання показників
    items:
    - стрімко йти вгору
    - поступово збільшуватися
    - зрости на двадцять відсотків
    - сягнути максимуму
  - name: Спадання показників
    items:
    - різко впасти
    - поступово знижуватися
    - впасти до мінімуму
    - зменшитися вдвічі
  - name: Стабільна ситуація
    items:
    - залишатися без змін
    - бути стабільним
    - не зазнати суттєвих змін
    - зафіксуватися на рівні
- type: quiz
  title: Оберіть правильний варіант
  instruction: Виберіть граматично правильний варіант для кожної ситуації.
  items:
  - question: Який прийменник треба використати, якщо ми говоримо про різницю між
      початковим і кінцевим числом?
    explanation: Прийменник 'на' використовується для опису амплітуди зміни (різниці).
    options:
    - text: на (зросло на п'ять)
      correct: true
    - text: до (зросло до п'яти)
      correct: false
    - text: в (зросло в п'ять)
      correct: false
    - text: з (зросло з п'яти)
      correct: false
  - question: Який прийменник треба використати, щоб вказати фінальну точку на шкалі?
    explanation: Прийменник 'до' вказує на кінцевий результат або фінальну точку.
    options:
    - text: до (впало до нуля)
      correct: true
    - text: на (впало на нуль)
      correct: false
    - text: під (впало під нуль)
      correct: false
    - text: через (впало через нуль)
      correct: false
  - question: Як правильно сказати українською мовою 'according to the schedule'?
    explanation: Українською правильно казати 'відповідно до графіка' або 'згідно
      з графіком'.
    options:
    - text: відповідно до графіка
      correct: true
    - text: згідно графіку
      correct: false
    - text: згідно з графіку
      correct: false
    - text: у відповідності графіку
      correct: false
  - question: Який відмінок потрібен після конструкції 'згідно з'?
    explanation: Конструкція 'згідно з' завжди вимагає орудного відмінка (ким? чим?).
    options:
    - text: орудний (звітом)
      correct: true
    - text: давальний (звіту)
      correct: false
    - text: родовий (звіту)
      correct: false
    - text: знахідний (звіт)
      correct: false
  - question: Яке слово краще використати для графічного зображення часток єдиного
      цілого?
    explanation: Кругова діаграма найкраще показує внутрішнє співвідношення часток.
    options:
    - text: діаграма
      correct: true
    - text: графік
      correct: false
    - text: розклад
      correct: false
    - text: таблиця
      correct: false
  - question: Яке звертання найкраще підходить для серйозної наукової конференції
      в Україні?
    explanation: '''Шановне товариство'' або ''Шановні колеги'' є класичними формальними
      звертаннями.'
    options:
    - text: Шановне товариство
      correct: true
    - text: Привіт усім
      correct: false
    - text: Добрий день, друзі
      correct: false
    - text: Вітаю, народ
      correct: false
  - question: У якому реченні дієприслівниковий зворот вжито правильно?
    explanation: Головна та додаткова дія повинні виконуватися одним підметом.
    options:
    - text: Розглядаючи цей графік, ми маємо багато питань.
      correct: true
    - text: Розглядаючи цей графік, стає зрозуміло.
      correct: false
    - text: Розглядаючи графік, виникають проблеми.
      correct: false
    - text: Аналізуючи дані, нам стало сумно.
      correct: false
  - question: Як правильно підкреслити найбільшу частину в круговій діаграмі?
    explanation: Фразеологізм 'левова частка' означає найбільшу частину чого-небудь.
    options:
    - text: левова частка
      correct: true
    - text: слоняча частина
      correct: false
    - text: тигрова частка
      correct: false
    - text: велика половина
      correct: false
- type: error-correction
  title: Виправте типові помилки
  instruction: Знайдіть граматичну або лексичну помилку в реченні та виберіть правильний
    варіант.
  items:
  - sentence: Згідно графіку, наша презентація розпочнеться о десятій годині.
    error: Згідно графіку
    answer: Згідно з графіком
    options:
    - Згідно з графіком
    - Відповідно графіку
    - По графіку
    - За графіку
    explanation: Конструкція 'згідно' вимагає прийменника 'з' та орудного відмінка.
  - sentence: Цей графік поїздів дуже незручний для пасажирів.
    error: графік
    answer: розклад
    options:
    - розклад
    - діаграма
    - план
    - маршрут
    explanation: Коли йдеться про час відправлення транспорту або уроки, використовуємо
      слово 'розклад'.
  - sentence: Наш чистий прибуток швидко зріс в п'ятдесят відсотків.
    error: в п'ятдесят
    answer: на п'ятдесят
    options:
    - на п'ятдесят
    - до п'ятдесят
    - за п'ятдесят
    - через п'ятдесят
    explanation: Коли ми вказуємо різницю (амплітуду зміни), використовуємо прийменник
      'на'.
  - sentence: Аналізуючи ці дані, стає зрозуміло, що ми втрачаємо клієнтів.
    error: стає зрозуміло
    answer: ми розуміємо
    options:
    - ми розуміємо
    - було зрозуміло
    - стало видно
    - є зрозумілим
    explanation: Дієприслівник вимагає активного підмета (хто аналізує, той і розуміє).
  - sentence: Відповідно до нового звіту, інфляція впала на три відсотки і тепер становить
      три відсотки.
    error: на три
    answer: до трьох
    options:
    - до трьох
    - в три
    - біля трьох
    - з трьох
    explanation: Якщо три відсотки — це кінцевий результат, використовуємо прийменник
      'до'.
  - sentence: Згідно з новими дослідженнями, велика половина опитаних підтримує проєкт.
    error: велика половина
    answer: левова частка
    options:
    - левова частка
    - більша половина
    - найбільша половина
    - значна половина
    explanation: Половини завжди рівні. Правильно казати 'левова частка' або 'більшість'.
- type: true-false
  title: Правда чи хиба?
  instruction: Визначте, чи є ці твердження про презентації правдивими, чи хибними.
  items:
  - statement: В українському діловому етикеті прийнято починати офіційний виступ
      зі слова 'Привіт'.
    correct: false
    explanation: Офіційний етикет вимагає звертань 'Шановні колеги' або 'Пані та панове'.
  - statement: Слово 'Панство' є українським історичним звертанням до групи поважних
      людей.
    correct: true
    explanation: Це збірний іменник, який створює дуже шанобливу атмосферу.
  - statement: Кругова діаграма найкраще підходить для відображення динаміки зростання
      цін протягом року.
    correct: false
    explanation: Для динаміки у часі використовують лінійний графік, а кругова діаграма
      показує частки.
  - statement: Дієприслівниковий зворот завжди має стосуватися підмета в головному
      реченні.
    correct: true
    explanation: 'Так, інакше виникає граматична помилка (наприклад: ''аналізуючи
      графік, стає зрозуміло'').'
  - statement: Фраза 'згідно з планом' є калькою з російської мови.
    correct: false
    explanation: Це питомо українська конструкція. Калькою є фраза 'згідно плану'.
  - statement: Дискурсивні маркери допомагають утримувати увагу аудиторії та структурувати
      думку.
    correct: true
    explanation: Вони працюють як вказівники, що з'єднують частини виступу.
  - statement: Прийменник 'на' використовується, коли ми називаємо фінальну точку
      падіння чи зростання.
    correct: false
    explanation: Прийменник 'на' вказує на різницю. Для фінальної точки використовується
      'до'.
  - statement: У сучасній презентації кожне слово має підсилювати візуальний меседж
      на слайді.
    correct: true
    explanation: Слайд має містити одну думку, а слова презентатора її доповнюють
      і пояснюють.
- type: unjumble
  title: Складіть речення з розкиданих слів
  instruction: Правильно розставте слова, щоб утворити типові фрази з презентацій.
  items:
  - words:
    - доповіді
    - сьогоднішньої
    - темою
    - моєї
    - є
    - маркетинг
