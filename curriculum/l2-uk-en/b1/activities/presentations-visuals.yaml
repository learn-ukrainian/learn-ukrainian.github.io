- type: mark-the-words
  title: Знайдіть дієслова динаміки
  instruction: Знайдіть і позначте всі дієслова, які описують процеси зміни (зростання
    або спадання) у тексті.
  text: Протягом останнього кварталу наші доходи стрімко зростають кожного місяця.
    Однак витрати на маркетинг несподівано впали. Ми сподіваємося, що інфляція також
    знижуватиметься і ситуація стабілізується. Наступного року рівень безробіття має
    зменшитися.
  answers:
  - зростають
  - впали
  - знижуватиметься
  - зменшитися
