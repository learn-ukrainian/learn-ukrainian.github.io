- type: select
  title: Оберіть правильні фрази для презентації
  instruction: Для кожної мети виберіть усі правильні та доречні фрази з поданих.
  items:
  - question: Які фрази підходять для початку презентації?
    min_correct: 2
    options:
    - text: Шановні колеги та гості!
      correct: true
    - text: Темою моєї доповіді є...
      correct: true
    - text: На завершення хочу додати...
      correct: false
    - text: Таким чином ми бачимо...
      correct: false
  - question: Як правильно вказати на зміну графіка?
    min_correct: 2
    options:
    - text: Показники стрімко зростають.
      correct: true
    - text: Ситуація різко впала до мінімуму.
      correct: true
    - text: Ми маємо стабільний розклад.
      correct: false
    - text: Аналізуючи графік, стає зрозуміло.
      correct: false
  - question: Які вставні конструкції правильно посилаються на джерело?
    min_correct: 2
    options:
    - text: Згідно з останніми даними...
      correct: true
    - text: Відповідно до нового звіту...
      correct: true
    - text: Згідно графіку...
      correct: false
