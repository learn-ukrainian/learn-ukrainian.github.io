- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Відмінювання
    кількісних числівників».
  prompt: 'Опишіть своє улюблене свято або подію, використовуючи кількісні числівники
    (наприклад: скільки гостей прийшло, скільки страв приготували, скільки годин тривало
    свято). Використайте слова: **кілька**, **половина**, **понад**, **забагато**,
    **чимало**. Напишіть щонайменше 5 речень (не менше 50 слів).'
  min_words: 50
  model_answer: 'На моє свято прийшло близько тридцяти гостей. Ми запросили п''ятьох
    друзів зі школи та кілька родичів. На столі було понад десять страв: два салати,
    троє гарячих страв і один великий торт. На жаль, ми приготували забагато їжі,
    тому половина залишилася на завтра. Свято тривало півтори години, і всім було
    дуже весело.

    '
  title: Напишіть 5 речень, використовуючи нову лексику з розділу «Відмінювання кількісни
