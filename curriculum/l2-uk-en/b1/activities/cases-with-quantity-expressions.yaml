version: '1.0'
module: cases-with-quantity-expressions
level: b1
inline:
- id: reading-numeral-agreement
  type: quiz
  instruction: Дайте відповіді на запитання за текстом діалогу та першого розділу.
  items:
  - question: Скільки людей постійно живе у будинку господаря?
    options:
    - Троє
    - Четверо
    - П'ятеро
    - Десятеро
    correct: 2
  - question: Скільки гектарів поля має ця сільська родина?
    options:
    - Один гектар
    - Два гектари
    - П'ять гектарів
    - Тридцять п'ять гектарів
    correct: 1
  - question: Який відмінок іменника використовується після числівників «два», «три»,
      «чотири»?
    options:
    - Називний однини
    - Родовий однини
    - Називний множини
    - Родовий множини
    correct: 2
  - question: Який вислів є грубою граматичною помилкою (русизмом)?
    options:
    - Два студенти
    - Два студента
    - П'ять студентів
    - Один студент
    correct: 1
  - question: Яка форма іменника потрібна після складеного числа «сорок п'ять»?
    options:
    - Називний однини
    - Родовий однини
    - Називний множини
    - Родовий множини
    correct: 3
  - question: Яке слово у діалозі означає, що зараз у родини недостатньо худоби?
    options:
    - Багато
    - Чимало
    - Замало
    - Достатньо
    correct: 2
- id: match-up-collective
  type: match-up
  instruction: З'єднайте збірні числівники з відповідними іменниками, з якими вони
    можуть вживатися.
  pairs:
  - left: двоє
    right: ножиць
  - left: троє
    right: хлопців
  - left: четверо
    right: дверей
  - left: п'ятеро
    right: поросят
  - left: десятеро
    right: курчат
  - left: семеро
    right: козаків
- id: quiz-fractions
  type: quiz
  instruction: Оберіть правильний варіант узгодження дробів та мішаних чисел.
  items:
  - question: 'Як правильно сказати: 1.5 години?'
    options:
    - півтора години
    - півтори години
    - одна і пів години
    - півтори годин
    correct: 1
  - question: 'Як правильно написати: 1/2 яблука?'
    options:
    - пів-яблука
    - півяблука
    - пів яблука
    - пів'яблука
    correct: 2
  - question: Який відмінок потрібен після слова «чверть»?
    options:
    - Називний однини
    - Родовий однини
    - Родовий множини
    - Знахідний множини
    correct: 1
  - question: Як прочитати дріб 2/3 кілограма?
    options:
    - дві третіх кілограма
    - два третіх кілограми
    - дві треті кілограмів
    - двоє третіх кілограма
    correct: 0
  - question: 'Як правильно сказати: 2.5 кілометри?'
    options:
    - два з половиною кілометри
    - два з половиною кілометрів
    - дві з половиною кілометри
    - двоє з половиною кілометрів
    correct: 0
  - question: Який відмінок іменника вимагає слово «півтораста» (150)?
    options:
    - Називний однини
    - Родовий однини
    - Називний множини
    - Родовий множини
    correct: 3
- id: fill-in-indefinite-quantity
  type: fill-in
  instruction: Вставте правильне неозначено-кількісне слово за контекстом.
  items:
  - sentence: На площу прийшло _____ ста людей.
    answer: близько
    options:
    - близько
    - понад
    - забагато
  - sentence: Цей проєкт коштує _____ тисячу гривень.
    answer: понад
    options:
    - понад
    - близько
    - чимало
  - sentence: Мені _____ п'яти гривень для покупки, я позичу у друга.
    answer: бракує
    options:
    - бракує
    - достатньо
    - вдосталь
  - sentence: У мене _____ вільного часу, я дуже зайнятий.
    answer: замало
    options:
    - замало
    - чимало
    - вдосталь
  - sentence: На небі з'явилася _____ зірок.
    answer: безліч
    options:
    - безліч
    - кілька
    - жменя
  - sentence: Для повноцінного відпочинку нам _____ двох годин.
    answer: достатньо
    options:
    - достатньо
    - бракує
    - близько
workbook:
- type: fill-in
  instruction: Вставте іменник у правильній формі після числівника.
  items:
  - sentence: На столі лежать два великі _____.
    answer: столи
    options:
    - столи
    - стола
    - столів
  - sentence: У нашому місті є п'ять нових _____.
    answer: шкіл
    options:
    - шкіл
    - школи
    - школа
  - sentence: Ми купили двадцять один _____ на потяг.
    answer: квиток
    options:
    - квиток
    - квитки
    - квитків
  - sentence: На зустріч прийшли три розумні _____.
    answer: студенти
    options:
    - студенти
    - студента
    - студентів
  - sentence: Ця цікава книжка коштує сорок чотири _____.
    answer: гривні
    options:
    - гривні
    - гривень
    - гривня
  - sentence: Він уважно прочитав сто _____ тексту.
    answer: сторінок
    options:
    - сторінок
    - сторінки
    - сторінка
- type: match-up
  instruction: З'єднайте математичні вирази та числа з їхнім правильним прочитанням.
  pairs:
  - left: 1/2
    right: одна друга
  - left: 2/3
    right: дві третіх
  - left: '0.5'
    right: нуль цілих і п'ять десятих
  - left: '1.2'
    right: одна ціла і дві десятих
  - left: 4/5
    right: чотири п'ятих
  - left: 2.5 метри
    right: два з половиною метри
- type: error-correction
  instruction: Знайдіть і виправте граматичні помилки у вживанні числівників.
  items:
  - sentence: У мене є двоє нових комп'ютерів.
    error: двоє
    correction: два
    error_type: word
    options:
    - два
    - двої
    - двійко
    explanation: З неістотами чоловічого роду використовуються тільки кількісні числівники,
      а не збірні.
  - sentence: Вона купила на ринку біля ста яблук.
    error: біля
    correction: близько
    error_type: word
    options:
    - близько
    - понад
    - чимало
    explanation: Казати «біля ста» — це калька. Правильно вказувати приблизну кількість
      словом «близько».
  - sentence: На важливу зустріч прийшли троє жінок.
    error: троє
    correction: три
    error_type: word
    options:
    - три
    - трої
    - трійко
    explanation: Збірні числівники не можна вживати з іменниками жіночого роду.
  - sentence: Я працював над цим складним проєктом півтора години.
    error: півтора
    correction: півтори
    error_type: word
    options:
    - півтори
    - половину
    - одна
    explanation: Слово «година» належить до жіночого роду, тому використовується форма
      «півтори».
  - sentence: У нашому класі зараз навчається двадцять два учнів.
    error: учнів
    correction: учні
    error_type: word
    options:
    - учні
    - учня
    - учню
    explanation: Форму іменника визначає останнє слово «два», яке вимагає називного
      відмінка множини.
  - sentence: У нас залишилося дуже мало часу, немає навіть п'ятидесяти хвилин.
    error: п'ятидесяти
    correction: п'ятдесяти
    error_type: word
    options:
    - п'ятдесяти
    - п'ятидесят
    - п'ятдесятьох
    explanation: Перша частина числівника «п'ятдесят» ніколи не відмінюється.
- type: group-sort
  instruction: Розподіліть числівники та вирази залежно від того, якого відмінка іменника
    вони вимагають після себе.
  groups:
  - label: Називний множини
    items:
    - два
    - три
    - чотири
    - двадцять два
  - label: Родовий множини
    items:
    - п'ять
    - десять
    - багато
    - кілька
    - двоє
  - label: Родовий однини
    items:
    - половина
    - чверть
    - півтора
    - півтори
- type: essay-response
  prompt: Напишіть мінімум 5 речень про ваші щоденні покупки або рецепт улюбленої
    страви, використовуючи кількісні числівники, дроби (наприклад, півтора, половина)
    та неозначено-кількісні слова (забагато, достатньо, кілька).
  min_words: 50
  model_answer: Для приготування мого улюбленого пирога мені потрібно чимало свіжих
    інгредієнтів. Спочатку я беру півтора кілограма яблук і нарізаю їх дрібними шматочками.
    Потім додаю близько двохсот грамів цукру і дві третіх склянки борошна. Важливо
    не додати забагато солі, достатньо лише однієї чверті чайної ложки. На ринку я
    витратив на всі ці продукти понад сто п'ятдесят гривень, але пиріг вийшов дуже
    смачним.
