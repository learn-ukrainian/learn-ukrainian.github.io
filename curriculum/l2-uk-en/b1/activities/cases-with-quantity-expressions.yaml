version: '1.0'
module: cases-with-quantity-expressions
level: b1
inline:
- id: match-up-collective-usage
  type: match-up
  instruction: З'єднайте терміни з розділу «Відмінювання кількісних числівників» з
    їхніми визначеннями.
  pairs:
  - left: кількісний числівник
    right: позначає точну кількість, відповідає на питання «скільки?»
  - left: збірний числівник
    right: позначає кількість як єдине нероздільне ціле (наприклад, «двоє»)
  - left: неозначено-кількісне слово
    right: вказує на приблизну або неточну кількість (наприклад, «чимало»)
  - left: дробовий числівник
    right: позначає частину від цілого (наприклад, «половина»)
  - left: узгодження
    right: граматична залежність форми іменника від числівника
  - left: складений числівник
    right: складається з двох або більше окремих слів (наприклад, «сто двадцять»)
  title: З'єднайте терміни з розділу «Відмінювання кількісних числівників» з їхніми
    визна
- id: quiz-fraction-agreement
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Узгодження
    кількісних числівників з іменниками».'
  items:
  - question: Ми чекали _____ .
    options:
    - півтори години
    - півтора години
    - півтори годин
    - півтора годин
    correct: 0
  - question: Купіть, будь ласка, _____ яблук.
    options:
    - півтора кілограма
    - півтори кілограма
    - півтора кілограмів
    - півтори кілограм
    correct: 0
  - question: На столі лежить _____ .
    options:
    - чверть хлібини
    - чверть хлібина
    - четвертина хліб
    - чверть хлібину
    correct: 0
  - question: Він віддав на благодійність _____ свого прибутку.
    options:
    - половину
    - половина
    - половини
    - половиною
    correct: 0
  - question: У цьому розчині _____ солі.
    options:
    - п'ять цілих і сім десятих відсотка
    - п'ять цілих і сім десятих відсотків
    - п'ять цілих і сім десятих відсотку
    - п'ять цілі і сім десятих відсотка
    correct: 0
  - question: Спортсмен пробіг _____ .
    options:
    - два з половиною кілометри
    - два з половиною кілометра
    - дві з половиною кілометри
    - два з половиною кілометрів
    correct: 0
  title: 'Оберіть правильний варіант: лексика та граматика з розділу «Узгодження кількісни'
- id: fill-in-indefinite-quantity
  type: fill-in
  instruction: Вставте правильну граматичну форму у реченнях на тему узгодження кількісних
    числівників з іменниками.
  items:
  - sentence: На зустріч прийшло понад двісті _____.
    answer: людей
    options:
    - людей
    - людина
    - людини
  - sentence: У нас залишилося замало _____.
    answer: часу
    options:
    - часу
    - час
    - часом
  - sentence: Для цього проєкту потрібно чимало _____.
    answer: зусиль
    options:
    - зусиль
    - зусилля
    - зусиллями
  - sentence: Він заплатив близько _____ гривень.
    answer: тисячі
    options:
    - тисячі
    - тисяча
    - тисячею
  - sentence: У цьому рецепті забагато _____.
    answer: солі
    options:
    - солі
    - сіль
    - сіллю
  - sentence: Мені достатньо _____ годин для цієї роботи.
    answer: двох
    options:
    - двох
    - два
    - двома
  title: Вставте правильну граматичну форму у реченнях на тему узгодження кількісних
    числ
workbook:
- type: fill-in
  instruction: Вставте іменник у правильній відмінковій формі.
  items:
  - sentence: У кімнаті стоять два _____.
    answer: столи
    options:
    - столи
    - стола
    - столів
  - sentence: Ми прочитали п'ять _____.
    answer: книжок
    options:
    - книжок
    - книжки
    - книжці
  - sentence: На вулиці було троє _____.
    answer: студентів
    options:
    - студентів
    - студенти
    - студента
  - sentence: Я купив півтора _____ яблук.
    answer: кілограма
    options:
    - кілограма
    - кілограми
    - кілограмів
  - sentence: Для господарства потрібно дві _____.
    answer: корови
    options:
    - корови
    - корів
    - корову
  - sentence: Ми побачили близько ста _____.
    answer: озер
    options:
    - озер
    - озера
    - озерах
  title: Вставте іменник у правильній відмінковій формі.
- type: group-sort
  instruction: Розподіліть кількісні вирази за відмінком іменника, якого вони вимагають
    у називному відмінку.
  groups:
  - label: Називний відмінок множини
    items:
    - два столи
    - три вікна
    - чотири подруги
    - двадцять два дні
  - label: Родовий відмінок однини
    items:
    - півтори години
    - півтора метра
    - одна ціла і п'ять десятих кілограма
  - label: Родовий відмінок множини
    items:
    - п'ять книжок
    - десять метрів
    - двоє хлопців
    - кілька людей
  title: Розподіліть кількісні вирази за відмінком іменника, якого вони вимагають
    у назив
- type: translate
