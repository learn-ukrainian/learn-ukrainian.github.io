version: '1.0'
module: cases-with-quantity-expressions
level: b1
inline:
- id: reading-numeral-agreement
  type: quiz
  instruction: Оберіть правильний варіант відповіді за текстом діалогу.
  items:
  - question: Скільки людей постійно живе в будинку?
    options:
    - п'ятеро
    - троє
    - четверо
    - семеро
    correct: 0
  - question: Скільки дітей у родині?
    options:
    - двоє
    - троє
    - одне
    - п'ятеро
    correct: 0
  - question: Яка загальна площа будинку?
    options:
    - сто двадцять квадратних метрів
    - сто двадцять квадратні метри
    - двісті квадратних метрів
    - сто квадратних метрів
    correct: 0
  - question: Скільки гектарів поля має родина?
    options:
    - два гектари
    - два гектарів
    - п'ять гектарів
    - три гектари
    correct: 0
  - question: Скільки корів залишилося в господарстві?
    options:
    - дві корови
    - два корови
    - двоє корів
    - дві корів
    correct: 0
  - question: Скільки курей тримає родина?
    options:
    - близько двох десятків курей
    - рівно двадцять курей
    - понад двадцять курей
    - забагато курей
    correct: 0
- id: error-correction-declension
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в узгодженні чи відмінюванні
    числівників.
  items:
  - sentence: У нашій групі навчається двадцять два студента.
    error: студента
    correction: студенти
    error_type: word
    options:
    - студенти
    - студентів
    - студентом
    explanation: Після числівника «два» іменник стоїть у називному відмінку множини.
  - sentence: Для цього проєкту нам не вистачає п'ятидесяти тисяч гривень.
    error: п'ятидесяти
    correction: п'ятдесяти
    error_type: word
    options:
    - п'ятдесяти
    - п'ятдесятьма
    - п'ятьмадесяти
    explanation: У десятках від 50 до 80 відмінюється лише друга частина (п'ятдесяти).
      Форма «п'ятидесяти» — це типова помилка.
  - sentence: Мені потрібно купити три нових стола для офісу.
    error: стола
    correction: столи
    error_type: word
    options:
    - столи
    - столів
    - столам
    explanation: Після числівника «три» неістоти чоловічого роду стоять у називному
      відмінку множини.
  - sentence: Нам не вистачає чотирьохста гривень для покупки нового комп'ютера.
    error: чотирьохста
    correction: чотирьохсот
    error_type: word
    options:
    - чотирьохсот
    - чотириста
    - чотирьомстам
    explanation: 'У родовому відмінку сотень відмінюються обидві частини: чотирьохсот.'
  - sentence: Місто має близько сорок п'яти тисяч жителів.
    error: сорок
    correction: сорока
    error_type: word
    options:
    - сорока
    - сороку
    - сорокам
    explanation: У родовому відмінку числівник «сорок» має закінчення -а.
  - sentence: Я зустрівся з двохстами цікавими людьми на конференції.
    error: двохстами
    correction: двомастами
    error_type: word
    options:
    - двомастами
    - двомстам
    - двохсот
    explanation: В орудному відмінку сотень нормативною є форма «двомастами» (ким?
      чим?).
- id: match-up-collective
  type: match-up
  instruction: З'єднайте збірні числівники з відповідними іменниками за правилами
    граматики.
  pairs:
  - left: двоє
    right: хлопців
  - left: троє
    right: дверей
  - left: четверо
    right: поросят
  - left: п'ятеро
    right: студентів
  - left: обидві
    right: дівчини
  - left: семеро
    right: дітей
- id: quiz-fractions
  type: quiz
  instruction: Оберіть правильний варіант для дробових числівників та мішаних кількостей.
  items:
  - question: Як правильно сказати '1.5 hours' українською?
    options:
    - півтори години
    - півтора години
    - півтори годин
    - одна і пів години
    correct: 0
  - question: Як прочитати дріб '2/3'?
    options:
    - дві третіх
    - два третіх
    - дві треті
    - два три
    correct: 0
  - question: Яке закінчення має іменник після слова «половина»?
    options:
    - яблука
    - яблуко
    - яблуку
    - яблуком
    correct: 0
  - question: Як правильно записати '2.5 кілометра' словами у повсякденному мовленні?
    options:
    - два з половиною кілометри
    - два з половиною кілометра
    - дві з половиною кілометри
    - два з пів кілометра
    correct: 0
  - question: Який відмінок іменника використовується після слова «чверть»?
    options:
    - родовий однини
    - називний множини
    - родовий множини
    - давальний однини
    correct: 0
  - question: Як правильно написати 'half an apple' за новим правописом 2019 року?
    options:
    - пів яблука
    - пів'яблука
    - пів-яблука
    - півяблука
    correct: 0
- id: fill-in-indefinite-quantity
  type: fill-in
  instruction: Вставте правильну граматичну форму після неозначено-кількісних слів.
  items:
  - sentence: У нас залишилося дуже мало ____ для цього важливого проєкту.
    answer: часу
    options:
    - час
    - часу
    - часом
  - sentence: Він витратив на це складне завдання чимало ____.
    answer: зусиль
    options:
    - зусилля
    - зусиль
    - зусиллям
  - sentence: На центральну площу прийшло близько ____ людей.
    answer: ста
    options:
    - сто
    - ста
    - стам
  - sentence: Для приготування цієї страви такої кількості солі цілком ____.
    answer: достатньо
    options:
    - достатньо
    - близько
    - понад
  - sentence: У цьому невеликому місті живе понад ____ тисяч людей.
    answer: сорок
    options:
    - сорок
    - сорока
    - сорокам
  - sentence: Я маю кілька цікавих ____ для нашого обговорення.
    answer: ідей
    options:
    - ідеї
    - ідей
    - ідеям
- id: essay-response-contextual-quantity
  type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Відмінювання
    кількісних числівників».
  prompt: Опишіть ваше типове щоденне або щотижневе споживання продуктів чи витрачання
    часу. Використовуйте дроби (половина, чверть), збірні числівники та слова на зразок
    «забагато», «достатньо».
  model_answer: Щодня я випиваю півтора літра чистої води. На сніданок я з'їдаю половину
    яблука та випиваю чашку кави. Я витрачаю близько двох годин на дорогу до роботи.
    Іноді я купую понад кілограм фруктів на тиждень. Я вважаю, що в мене забагато
    роботи і замало вільного часу.
  min_words: 50
workbook:
- id: group-sort-noun-cases
  type: group-sort
  instruction: Розподіліть іменники залежно від того, з якими кількісними числівниками
    вони можуть поєднуватися.
  groups:
  - label: Після «два», «три», «чотири» (Називний множини)
    items:
    - роки
    - дні
    - студенти
    - книжки
    - будинки
    - столи
  - label: Після «п'ять» і більше (Родовий множини)
    items:
    - років
    - днів
    - студентів
    - книжок
    - будинків
    - столів
- id: true-false-grammar-rules
  type: true-false
  instruction: Визначте, чи правильні ці граматичні твердження про числівники в українській
    мові.
  items:
  - statement: Числівник «один» завжди узгоджується з іменником у роді, числі та відмінку.
    correct: true
    explanation: 'Так, він працює як прикметник: один стіл, одна книжка, одне вікно.'
  - statement: Після числівника «три» іменник стоїть у родовому відмінку однини.
    correct: false
    explanation: Після «два», «три», «чотири» іменник стоїть у називному відмінку
      множини (три столи).
  - statement: У складних числівниках від 50 до 80 відмінюється лише друга частина.
    correct: true
    explanation: 'Правильно: п''ятдесяти, шістдесятьом. Корінь залишається незмінним.'
  - statement: Слово «півтора» вільно використовується з іменниками жіночого роду.
    correct: false
    explanation: Для жіночого роду використовується лише спеціальна форма «півтори»
      (півтори години).
  - statement: Збірні числівники (двоє, троє) ніколи не вживаються з іменниками жіночого
      роду.
    correct: true
    explanation: Ми кажемо «дві дівчини», а не «двоє дівчат». Виняток — збірне слово
      «обидві».
  - statement: Прийменник «понад» вимагає після себе родового відмінка.
    correct: false
    explanation: Слово «понад» вимагає знахідного відмінка (понад тисячу гривень).
- id: translate-quantity-expressions
  type: translate
  instruction: Оберіть правильний український переклад для цих кількісних виразів.
  items:
  - source: two big houses
    options:
    - text: два великі будинки
      correct: true
    - text: два великих дома
      correct: false
    - text: двоє великих будинків
      correct: false
  - source: five beautiful girls
    options:
    - text: п'ять гарних дівчат
      correct: true
    - text: п'ятеро гарних дівчат
      correct: false
    - text: п'ять гарні дівчата
      correct: false
  - source: one and a half hours
    options:
    - text: півтори години
      correct: true
    - text: півтора години
      correct: false
    - text: одна і пів години
      correct: false
  - source: twenty-one pages
    options:
    - text: двадцять одна сторінка
      correct: true
    - text: двадцять одна сторінки
      correct: false
    - text: двадцять перша сторінка
      correct: false
  - source: about a hundred people
    options:
    - text: близько ста людей
      correct: true
    - text: біля ста людей
      correct: false
    - text: близько сто людей
      correct: false
  - source: too much time
    options:
    - text: забагато часу
      correct: true
    - text: занадто багато час
      correct: false
    - text: достатньо часу
      correct: false
