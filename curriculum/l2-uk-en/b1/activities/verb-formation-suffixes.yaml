version: '1.0'
module: verb-formation-suffixes
level: b1
inline:
- id: group-sort-sort-12-verbs-by-formation-method-e-g
  type: group-sort
  instruction: Розподіліть дієслова за способом творення
  groups:
  - label: Префіксальний (від дієслова)
    items:
    - написати
    - входити
    - виходити
    - перевірити
  - label: Суфіксальний (від іменника чи прикметника)
    items:
    - програмувати
    - будувати
    - білити
    - штовхнути
  - label: Префіксально-суфіксальний
    items:
    - заземлити
    - озброїти
    - освітлити
    - знешкодити
- id: fill-in-prefix-meaning
  type: fill-in
  instruction: Вставте правильне дієслово з відповідним префіксом за змістом речення
  items:
  - sentence: Я хочу ще раз [переписати] цей текст без помилок.
    answer: переписати
    options:
    - переписати
    - дописати
    - вписати
    - написати
  - sentence: Не забудь [вимкнути] комп'ютер після роботи.
    answer: вимкнути
    options:
    - вимкнути
    - увімкнути
    - перемкнути
    - зімкнути
  - sentence: Від гарних новин вона раптом [заспівала].
    answer: заспівала
    options:
    - заспівала
    - поспівала
    - відспівала
    - доспівала
  - sentence: Мені треба [дочитати] цю книгу до завтра.
    answer: дочитати
    options:
    - дочитати
    - перечитати
    - прочитати
    - вичитати
  - sentence: Щоб робота почалася, екран треба [увімкнути].
    answer: увімкнути
    options:
    - увімкнути
    - вимкнути
    - перемкнути
    - розімкнути
  - sentence: Цю деталь слід міцно [прикріпити] до стіни.
    answer: прикріпити
    options:
    - прикріпити
    - відкріпити
    - перекріпити
    - скріпити
  - sentence: Зайву частину тканини можна просто [відрізати].
    answer: відрізати
    options:
    - відрізати
    - розрізати
    - порізати
    - вирізати
- id: match-up-prefix-analysis
  type: match-up
  instruction: З'єднайте дієслово з правильним значенням його префікса
  pairs:
  - left: входити
    right: рух всередину
  - left: виходити
    right: рух назовні
  - left: дочитати
    right: доведення дії до кінця
  - left: недочути
    right: недостатність або дефіцит
  - left: перевтомитися
    right: надмірність дії
  - left: обговорити
    right: дія з усіх можливих боків
  - left: почекати
    right: дія, яка триває недовго
  - left: наготувати
    right: накопичення результату дії
- id: sentence-builder-suffixes
  type: fill-in
  instruction: Оберіть правильне дієслово, утворене за допомогою суфікса
  items:
  - sentence: Старий папір на сонці швидко [жовтіє].
    answer: жовтіє
    options:
    - жовтіє
    - жовтить
    - пожовтить
  - sentence: Щоб кімната стала світлішою, ми маємо її [білити].
    answer: білити
    options:
    - білити
    - біліти
    - побілити
  - sentence: Коли людина хвилюється, її обличчя [червоніє].
    answer: червоніє
    options:
    - червоніє
    - червонить
    - почервонить
  - sentence: Якщо ми створюємо новий софт, ми маємо його [програмувати].
    answer: програмувати
    options:
    - програмувати
    - запрограмувати
    - випрограмувати
  - sentence: Щоб вдарити щось лише один раз, треба сильно [штовхнути].
    answer: штовхнути
    options:
    - штовхати
    - штовхнути
    - поштовхати
  - sentence: Якщо нам потрібна нова будівля, ми будемо її [будувати].
    answer: будувати
    options:
    - будувати
    - збудувати
    - перебудувати
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть правильне префіксальне дієслово за змістом речення
  items:
  - question: Я не можу знайти свій улюблений канал, чи можеш ти _____ телевізор?
    options:
    - перемкнути
    - вимкнути
    - увімкнути
    - замкнути
    correct: 0
  - question: Вже дуже пізно і ми йдемо спати, будь ласка, _____ світло.
    options:
    - вимкни
    - увімкни
    - перемкни
    - примкни
    correct: 0
  - question: Я хочу послухати вечірні новини, _____ радіо.
    options:
    - увімкни
    - вимкни
    - перемкни
    - зімкни
    correct: 0
  - question: Цей текст написаний дуже погано. Тобі треба його ще раз _____.
    options:
    - переписати
    - дописати
    - виписати
    - написати
    correct: 0
  - question: Бабуся не зрозуміла останнє слово, мабуть, вона його _____.
    options:
    - недочула
    - перечула
    - вичула
    - дочула
    correct: 0
  - question: Цей фільм дуже довгий і нудний, я не зможу його _____ сьогодні.
    options:
    - додивитися
    - передивитися
    - задивитися
    - видивитися
    correct: 0
- id: match-up-match-prefixed-verbs-to-their-meanings-based-on-prefix-analysis
  type: match-up
  instruction: 'Розшифруйте складні дієслова: з''єднайте слово з його значенням'
  pairs:
  - left: перенавантажити
    right: дати занадто великий вантаж
  - left: розповсюдити
    right: поширити скрізь у різних напрямках
  - left: відтворити
    right: створити заново у попередньому вигляді
  - left: підсилити
    right: додати сили для міцності
  - left: знешкодити
    right: усунути небезпеку або шкоду
  - left: знебарвити
    right: позбавити природного кольору
  - left: освітлити
    right: забезпечити достатнім світлом
workbook:
- type: error-correction
  instruction: Знайдіть і виправте логічну помилку у виборі префікса або суфікса
  items:
  - sentence: Щоб зняти зайву тканину, її треба прирізати.
    error: прирізати
    correction: відрізати
    error_type: word
    options:
    - відрізати
    - дорізати
    - перерізати
    explanation: Префікс «від-» означає відділення або віддалення частини від цілого.
  - sentence: Сніг на сонці починає білити.
    error: білити
    correction: біліти
    error_type: word
    options:
    - біліти
    - побілити
    - відбілити
    explanation: Суфікс «-іти» вказує на природну зміну власного стану об'єкта.
  - sentence: Щоб почати дивитися кіно, треба вимкнути телевізор.
    error: вимкнути
    correction: увімкнути
    error_type: word
    options:
    - увімкнути
    - перемкнути
    - примкнути
    explanation: Префікс «уві-» (у-) вказує на рух всередину або початок роботи приладу.
  - sentence: Якщо занадто довго і тяжко працювати, людина може розслабитися.
    error: розслабитися
    correction: перевтомитися
    error_type: word
    options:
    - перевтомитися
    - попрацювати
    - відпочити
    explanation: Префікс «пере-» вказує на надмірність і вихід далеко за межі нормального
      стану.
  - sentence: Коли дідусь слухає новини занадто тихо, він може їх перечути.
    error: перечути
    correction: недочути
    error_type: word
    options:
    - недочути
    - почути
    - вичути
    explanation: Префікс «недо-» вказує на дефіцит або недостатність результату дії.
  - sentence: Я маю недочитати цю цікаву книгу до останньої сторінки сьогодні ввечері.
    error: недочитати
    correction: дочитати
    error_type: word
    options:
    - дочитати
    - перечитати
    - вичитати
    explanation: Префікс «до-» логічно сигналізує про успішне завершення тривалого
      процесу.
- type: true-false
  instruction: 'Оцініть твердження про словотворення дієслів: правда чи ні?'
  items:
  - statement: Дієслово «написати» утворено префіксальним способом від слова «писати».
    correct: true
    explanation: Ми додаємо префікс «на-» до вже існуючого дієслова недоконаного виду.
  - statement: Суфікс «-нути» в українській мові завжди вказує на дуже довгий та постійний
      процес.
    correct: false
    explanation: Суфікс «-нути» (як у слові «штовхнути») означає одну дуже коротку
      та швидку дію.
  - statement: Префікс «об-» (як у слові «обговорити») вказує на всебічне охоплення
      об'єкта з усіх боків.
    correct: true
    explanation: Такі дієслова описують дію, яка є максимально всебічною та вичерпною.
  - statement: Дієслово «заземлити» утворено префіксально-суфіксальним способом від
      іменника «земля».
    correct: true
    explanation: У цьому слові префікс «за-» та суфікс «-ити» додаються до кореня
      одночасно.
  - statement: Дієслова «програмувати» та «фотографувати» мають суфікс «-увати», який
      допомагає адаптувати запозичені слова.
    correct: true
    explanation: Цей універсальний суфікс часто використовується для утворення дієслів
      від іменників іноземного походження.
  - statement: Префікс «недо-» в українській мові означає максимально сильне та успішне
      виконання дії.
    correct: false
    explanation: Префікс «недо-» завжди вказує на дефіцит ресурсу або загальну недостатність
      виконаної дії (наприклад, «недочути»).
- type: group-sort
  instruction: Розподіліть дієслова за граматичним видом
  groups:
  - label: Недоконаний вид (тривалий процес)
    items:
    - читати
    - писати
    - ходити
    - стрибати
    - кричати
    - будувати
  - label: Доконаний вид (завершена або миттєва дія)
    items:
    - прочитати
    - переписати
    - вийти
    - стрибнути
    - крикнути
    - збудувати
