- type: quiz
  title: "Як діяти у складних ситуаціях"
  instruction: "Оберіть найкращу реакцію або відповідь для кожної комунікативної ситуації."
  items:
    - question: "Твій колега каже, що втратив важливий документ. Яка відповідь є проявом активного слухання?"
      options:
        - text: "Я розумію, це справді дуже неприємна ситуація."
          correct: true
        - text: "А я тобі казав, що треба робити резервні копії!"
          correct: false
        - text: "Не хвилюйся, пішли краще вип'ємо кави."
          correct: false
        - text: "Це твої проблеми, я тут ні до чого."
          correct: false
      explanation: "Активне слухання визнає почуття людини без знецінення."
    - question: "Що ти маєш сказати, якщо випадково штовхнув когось у метро?"
      options:
        - text: "Ой, я дуже перепрошую!"
          correct: true
        - text: "Я дуже сильно вибачаюся!"
          correct: false
        - text: "Я приношу вам свої вибачення!"
          correct: false
        - text: "Пробачте мене негайно!"
          correct: false
      explanation: "Для дрібних незручностей ідеально підходить слово 'перепрошую'."
    - question: "Як правильно запропонувати допомогу людині в шоковому стані?"
      options:
        - text: "Я можу зараз відвезти тебе додому."
          correct: true
        - text: "Чим я можу тобі допомогти в цій ситуації?"
          correct: false
        - text: "Ти мусиш мені все детально розповісти!"
          correct: false
        - text: "Не плач, все обов'язково буде добре!"
          correct: false
      explanation: "Людина в шоці потребує конкретних пропозицій, а не загальних питань."
    - question: "Яке побажання традиційно кажуть українці, виявляючи турботу під час прощання?"
      options:
        - text: "Бережи себе!"
          correct: true
        - text: "Хай щастить тобі завжди!"
          correct: false
        - text: "Не забувай мене ніколи!"
          correct: false
        - text: "Будь дуже обережним!"
          correct: false
      explanation: "'Бережи себе' несе величезний емоційний заряд турботи."
    - question: "Як офіційно висловити свою тривогу щодо певної події?"
      options:
        - text: "Ми виражаємо глибоке занепокоєння цією ситуацією."
          correct: true
        - text: "Ми дуже сильно боїмося цього всього."
          correct: false
        - text: "Нам надзвичайно страшно дивитися на це."
          correct: false
        - text: "Ми хочемо принести вам свої страхи."
          correct: false
      explanation: "В офіційному контексті вживається фраза 'виражати занепокоєння'."
    - question: "Що означає, коли людина каже 'у мене серце не на місці'?"
      options:
        - text: "Вона відчуває сильну тривогу або неспокій за когось."
          correct: true
        - text: "Вона має серйозні проблеми зі здоров'ям і потребує лікаря."
          correct: false
        - text: "Вона дуже радіє і не може приховати свого щастя."
          correct: false
        - text: "Вона щойно пробігла велику дистанцію і втомилася."
          correct: false
      explanation: "Це ідіома, що описує стан сильного хвилювання."
    - question: "Яка фраза є прикладом модального хеджування (пом'якшення) у розмові?"
      options:
        - text: "Я хотів би обговорити цей складний момент."
          correct: true
        - text: "Ми зараз же мусимо це негайно обговорити."
          correct: false
        - text: "Ти зобов'язаний вислухати мене до кінця."
          correct: false
        - text: "Я вимагаю пояснень цієї жахливої помилки."
          correct: false
      explanation: "Хеджування пом'якшує категоричність і створює простір для діалогу."
    - question: "Як правильно відреагувати на чиїсь щирі вибачення?"
      options:
        - text: "Я приймаю ваші щирі вибачення."
          correct: true
        - text: "Я забираю ваші вибачення собі."
          correct: false
        - text: "Я отримую ваші вибачення від вас."
          correct: false
        - text: "Я даю вам свої вибачення назад."
          correct: false
      explanation: "Вибачення українською мовою можна 'приймати'."
    - question: "Що найкраще допомагає відновити довіру після серйозної сварки?"
      options:
        - text: "Щира готовність визнати власні помилки минулого."
          correct: true
        - text: "Довге і вперте мовчання протягом кількох тижнів."
          correct: false
        - text: "Спроба перекласти всю провину на іншу людину."
          correct: false
        - text: "Фінансові подарунки без жодних розмов і пояснень."
          correct: false
      explanation: "Примирення можливе лише тоді, коли обидві сторони визнають провину."
    - question: "Як відреагувати, коли друг ділиться з тобою великою радістю?"
      options:
        - text: "Я щиро радію разом із тобою цій чудовій новині!"
          correct: true
        - text: "Ну і що тут такого особливого і дивного?"
          correct: false
        - text: "Це звичайна випадковість, не радій так сильно."
          correct: false
        - text: "У мене теж були такі ситуації, нічого нового."
          correct: false
      explanation: "За правилом 'поділена радість — подвійна', треба щиро її розділити."
    - question: "Чому не варто казати людині в глибокій депресії 'все буде добре'?"
      options:
        - text: "Це приклад токсичного позитиву, який знецінює реальні почуття."
          correct: true
        - text: "Людина може просто не повірити у ваші оптимістичні слова."
          correct: false
        - text: "Ця фраза граматично неправильна в українській мові."
          correct: false
        - text: "Депресію можна вилікувати лише таблетками, а не словами."
          correct: false
      explanation: "Порожні обіцянки часто дратують і не дають відчуття підтримки."
    - question: "Що є головним інструментом для підвищення рівня емоційного інтелекту?"
      options:
        - text: "Регулярна та чесна саморефлексія після емоційних ситуацій."
          correct: true
        - text: "Постійне читання великої кількості художньої літератури."
          correct: false
        - text: "Щоденні інтенсивні заняття спортом та правильне харчування."
          correct: false
        - text: "Ігнорування будь-яких конфліктів у повсякденному житті."
          correct: false
      explanation: "Аналіз власних реакцій допомагає не повторювати помилок."