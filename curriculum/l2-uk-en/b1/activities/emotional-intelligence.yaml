- type: match-up
  title: "Поняття емоційного інтелекту"
  instruction: "Знайдіть правильне визначення для кожного психологічного терміна."
  pairs:
    - left: "емоційний інтелект"
      right: "здатність розуміти та управляти своїми емоціями"
    - left: "емпатія"
      right: "вміння повністю відчути чужий біль або радість"
    - left: "співчуття"
      right: "висловлення жалю та турботи про іншу людину"
    - left: "саморефлексія"
      right: "глибокий самоаналіз власних вчинків та думок"
    - left: "кордоцентризм"
      right: "філософія, де серце є центром людського існування"
    - left: "активне слухання"
      right: "техніка зосередженої уваги на співрозмовнику"
    - left: "зворотний зв’язок"
      right: "надання конструктивної оцінки діям іншої людини"
    - left: "примирення"
      right: "процес подолання конфлікту та відновлення довіри"
    - left: "самоусвідомлення"
      right: "вміння чесно дивитися на свої власні вчинки"
    - left: "самоконтроль"
      right: "здатність не втрачати рівновагу під час стресу"
    - left: "моральна підтримка"
      right: "психологічна допомога у складній життєвій ситуації"
    - left: "вразливість"
      right: "відкритість та готовність показати свої слабкості"

- type: fill-in
  title: "Дієслова та емоції"
  instruction: "Оберіть правильне дієслово для кожної ситуації."
  items:
    - sentence: "Психологи радять активно _____ емоційний інтелект ще з дитинства."
      answer: "розвивати"
      options:
        - "розвивати"
        - "вивчати"
        - "читати"
        - "дивитися"
    - sentence: "Щоб допомогти другові у біді, потрібно щиро _____ емпатію."
      answer: "проявляти"
      options:
        - "проявляти"
        - "робити"
        - "віддавати"
        - "носити"
    - sentence: "Дозвольте _____ глибоке співчуття у зв'язку з вашою втратою."
      answer: "висловити"
      options:
        - "висловити"
        - "сказати"
        - "принести"
        - "віддати"
    - sentence: "Держава зобов'язана _____ турботу про найменш захищених громадян."
      answer: "виявляти"
      options:
        - "виявляти"
        - "робити"
        - "давати"
        - "нести"
    - sentence: "Його раптове зникнення починає _____ серйозне занепокоєння."
      answer: "викликати"
      options:
        - "викликати"
        - "робити"
        - "створювати"
        - "будувати"
    - sentence: "Ми завжди готові _____ моральну підтримку всім, хто цього потребує."
      answer: "надавати"
      options:
        - "надавати"
        - "робити"
        - "брати"
        - "нести"
    - sentence: "Після тривалої сварки вони вирішили _____ шляхи до примирення."
      answer: "шукати"
      options:
        - "шукати"
        - "дивитися"
        - "робити"
        - "брати"
    - sentence: "Він прийшов з квітами, щоб щиро _____ вибачення за свої слова."
      answer: "просити"
      options:
        - "просити"
        - "приносити"
        - "давати"
        - "казати"
    - sentence: "Вона була рада нарешті _____ його вибачення після інциденту."
      answer: "прийняти"
      options:
        - "прийняти"
        - "взяти"
        - "отримати"
        - "віддати"
    - sentence: "Для успіху проєкту нам дуже потрібен ваш _____ зворотний зв’язок."
      answer: "конструктивний"
      options:
        - "конструктивний"
        - "красивий"
        - "великий"
        - "високий"
    - sentence: "Вміння _____ пробачення є ознакою величезної внутрішньої сили."
      answer: "дарувати"
      options:
        - "дарувати"
        - "робити"
        - "віддавати"
        - "казати"
    - sentence: "Щовечора вона звикла _____ саморефлексією, аналізуючи свій день."
      answer: "займатися"
      options:
        - "займатися"
        - "робити"
        - "грати"
        - "працювати"

- type: error-correction
  title: "Виправте поширені помилки"
  instruction: "Знайдіть і виправте лексичні та граматичні помилки у реченнях."
  items:
    - sentence: "Я вибачаюся за те, що запізнився на зустріч."
      error: "вибачаюся"
      answer: "перепрошую"
      options:
        - "перепрошую"
        - "пробачаю"
        - "шкодую"
        - "жалію"
      explanation: "Форма 'я вибачаюся' означає 'я вибачаю себе', правильно казати 'перепрошую'."
    - sentence: "Ми маємо принести вибачення нашим новим клієнтам."
      error: "принести вибачення"
      answer: "просити вибачення"
      options:
        - "просити вибачення"
        - "дати вибачення"
        - "зробити вибачення"
        - "сказати вибачення"
      explanation: "Вибачення не можна 'принести', це російська калька."
    - sentence: "Він проявив велике співчуття, коли повністю відчув мій біль."
      error: "співчуття"
      answer: "емпатію"
      options:
        - "емпатію"
        - "радість"
        - "турботу"
        - "злість"
      explanation: "Повне емоційне занурення та спільне відчуття болю — це емпатія."
    - sentence: "Я приношу свої глибокі вибачення за цю жахливу помилку."
      error: "приношу"
      answer: "прошу"
      options:
        - "прошу"
        - "даю"
        - "роблю"
        - "кажу"
      explanation: "Українською мовою вибачення можна лише просити."
    - sentence: "Треба завжди давати зворотній зв’язок своїм колегам."
      error: "зворотній"
      answer: "зворотний"
      options:
        - "зворотний"
        - "задній"
        - "минулий"
        - "колишній"
      explanation: "Правильне написання цього прикметника — 'зворотний' (з твердим Н)."
    - sentence: "Ти мусиш мені розповісти все, що з тобою сталося!"
      error: "мусиш"
      answer: "можеш"
      options:
        - "можеш"
        - "повинен"
        - "зобов'язаний"
        - "маєш"
      explanation: "Делікатне спілкування (хеджування) уникає прямого тиску, краще сказати 'ти можеш'."
    - sentence: "Мій керівник має дуже великий емоційний інтелект."
      error: "великий"
      answer: "високий"
      options:
        - "високий"
        - "сильний"
        - "довгий"
        - "широкий"
      explanation: "Рівень емоційного інтелекту буває високим або низьким."
    - sentence: "Я беру близько до душі всі ці погані новини."
      error: "душі"
      answer: "серця"
      options:
        - "серця"
        - "голови"
        - "розуму"
        - "тіла"
      explanation: "Українська ідіома звучить як 'брати до серця'."
    - sentence: "Поділена радість завжди стає вдвічі більшою."
      error: "більшою"
      answer: "подвійною"
      options:
        - "подвійною"
        - "великою"
        - "сильною"
        - "довгою"
      explanation: "Народне прислів'я каже: 'Поділена радість — подвійна'."
    - sentence: "У мене сьогодні серце не на своєму місці через тривогу."
      error: "своєму місці"
      answer: "місці"
      options:
        - "місці"
        - "столі"
        - "стільці"
        - "кріслі"
      explanation: "Правильна форма ідіоми — 'серце не на місці'."
    - sentence: "Вона виражає велику емпатію до всіх тварин у притулку."
      error: "виражає"
      answer: "проявляє"
      options:
        - "проявляє"
        - "каже"
        - "робить"
        - "носить"
      explanation: "Емпатію та турботу ми зазвичай 'проявляємо'."
    - sentence: "Ми надали йому сильну моральну підтримку під час кризи."
      error: "сильну"
      answer: "щиру"
      options:
        - "щиру"
        - "міцну"
        - "важку"
        - "тверду"
      explanation: "Підтримка зазвичай буває 'щирою' або просто 'моральною'."

- type: unjumble
  title: "Складіть речення"
  instruction: "Відновіть правильний порядок слів у реченнях про міжособистісні стосунки."
  items:
    - words: ["Я", "щиро", "прошу", "вибачення", "за", "свої", "різкі", "слова."]
      answer: "Я щиро прошу вибачення за свої різкі слова."
    - words: ["Дозвольте", "висловити", "глибоке", "співчуття", "вашій", "родині."]
      answer: "Дозвольте висловити глибоке співчуття вашій родині."
    - words: ["Мій", "керівник", "має", "надзвичайно", "високий", "емоційний", "інтелект."]
      answer: "Мій керівник має надзвичайно високий емоційний інтелект."
    - words: ["Ми", "завжди", "готові", "надавати", "моральну", "підтримку", "колегам."]
      answer: "Ми завжди готові надавати моральну підтримку колегам."
    - words: ["Ця", "новина", "починає", "викликати", "серйозне", "занепокоєння", "суспільства."]
      answer: "Ця новина починає викликати серйозне занепокоєння суспільства."
    - words: ["Українська", "культура", "базується", "на", "глибокій", "філософії", "кордоцентризму."]
      answer: "Українська культура базується на глибокій філософії кордоцентризму."
    - words: ["Поділене", "горе", "завжди", "стає", "вдвічі", "меншим."]
      answer: "Поділене горе завжди стає вдвічі меншим."
    - words: ["Сподіваюся", "що", "в", "тебе", "зараз", "все", "гаразд."]
      answer: "Сподіваюся що в тебе зараз все гаразд."
    - words: ["Він", "вирішив", "шукати", "шлях", "до", "швидкого", "примирення."]
      answer: "Він вирішив шукати шлях до швидкого примирення."
    - words: ["Навички", "активного", "слухання", "допомагають", "вирішувати", "складні", "конфлікти."]
      answer: "Навички активного слухання допомагають вирішувати складні конфлікти."
    - words: ["Здатність", "до", "саморефлексії", "робить", "людину", "дуже", "зрілою."]
      answer: "Здатність до саморефлексії робить людину дуже зрілою."
    - words: ["Ніколи", "не", "варто", "брати", "ці", "коментарі", "до", "серця."]
      answer: "Ніколи не варто брати ці коментарі до серця."

- type: quiz
  title: "Теорія емоційного інтелекту"
  instruction: "Дайте відповіді на запитання на основі прочитаного матеріалу."
  items:
    - question: "Яка головна відмінність українського філософського терміна 'кордоцентризм'?"
      options:
        - text: "Серце вважається центром людського пізнання та сутності."
          correct: true
        - text: "Розум завжди домінує над усіма людськими емоціями."
          correct: false
        - text: "Люди повинні приховувати свої справжні глибокі почуття."
          correct: false
        - text: "Головною ціллю життя є досягнення матеріального багатства."
          correct: false
      explanation: "У системі кордоцентризму серце є центром емоцій та мудрості."
    - question: "Що означає психологічний термін 'емпатія' в міжособистісних стосунках?"
      options:
        - text: "Здатність повністю відчути біль або радість іншої людини."
          correct: true
        - text: "Бажання швидко дати правильну логічну пораду другу."
          correct: false
        - text: "Вміння ігнорувати негативні емоції співрозмовника."
          correct: false
        - text: "Формальне висловлення жалю з приводу поганої ситуації."
          correct: false
      explanation: "Емпатія — це здатність поставити себе на місце іншого."
    - question: "Чому форма 'я вибачаюся' вважається граматично некоректною українською?"
      options:
        - text: "Суфікс '-ся' означає дію, спрямовану на самого себе."
          correct: true
        - text: "Це слово має іншомовне походження і не є українським."
          correct: false
        - text: "Цю фразу використовують виключно в офіційних документах."
          correct: false
        - text: "Таке слово просто не існує в сучасних словниках."
          correct: false
      explanation: "Вибачатися буквально означає вибачати самого себе."
    - question: "Яку фразу краще використовувати замість кальки 'приносити вибачення'?"
      options:
        - text: "Просити вибачення у людини."
          correct: true
        - text: "Давати вибачення іншим людям."
          correct: false
        - text: "Робити вибачення всім навколо."
          correct: false
        - text: "Віддавати вибачення своєму колезі."
          correct: false
      explanation: "Вибачення абстрактні, тому їх просять, а не приносять."
    - question: "Що означає популярна українська ідіома 'брати до серця'?"
      options:
        - text: "Дуже глибоко та емоційно переживати через певну ситуацію."
          correct: true
        - text: "Уважно і довго слухати чиїсь цікаві розповіді."
          correct: false
        - text: "Намагатися запам'ятати багато нової складної інформації."
          correct: false
        - text: "Робити щось дуже відверто і без будь-якої фальші."
          correct: false
      explanation: "Ця фраза означає надмірно реагувати на неприємності."
    - question: "Яка головна мета використання техніки 'активного слухання' в діалозі?"
      options:
        - text: "Показати співрозмовнику свою повну присутність та увагу."
          correct: true
        - text: "Швидко переконати людину у власній абсолютній правоті."
          correct: false
        - text: "Непомітно змінити складну тему розмови на більш приємну."
          correct: false
        - text: "Дати якомога більше корисних порад за короткий час."
          correct: false
      explanation: "Активне слухання демонструє зосередженість на словах партнера."
    - question: "Що означає українське прислів'я 'поділена радість — подвійна'?"
      options:
        - text: "Коли ми ділимося щастям, ми отримуємо ще більше задоволення."
          correct: true
        - text: "Треба радіти тільки тоді, коли поруч є дуже багато людей."
          correct: false
        - text: "Завжди краще мовчати про свої особисті великі успіхи."
          correct: false
        - text: "Чужа радість часто може викликати заздрість у друзів."
          correct: false
      explanation: "Українська культура цінує вміння ділитися позитивними емоціями."
    - question: "Як правильно і делікатно надати моральну підтримку другу?"
      options:
        - text: "Запропонувати конкретну допомогу або просто уважно вислухати."
          correct: true
        - text: "Сказати, що його проблеми зовсім не є такими серйозними."
          correct: false
        - text: "Одразу дати багато інструкцій, що йому треба терміново робити."
          correct: false
        - text: "Заборонити йому плакати і наказати бути дуже сильним."
          correct: false
      explanation: "Найкраща підтримка — це готовність вислухати без зайвих порад."
    - question: "Яку функцію виконує процес 'саморефлексії' для розвитку особистості?"
      options:
        - text: "Допомагає свідомо проаналізувати свої власні реакції та емоції."
          correct: true
        - text: "Дозволяє швидко знайти помилки в поведінці інших людей."
          correct: false
        - text: "Навчає як правильно і красиво виступати перед публікою."
          correct: false
        - text: "Захищає від будь-якої конструктивної критики на роботі."
          correct: false
      explanation: "Це глибокий аналіз власних вчинків і думок."
    - question: "Чому важливо використовувати модальне хеджування під час конфлікту?"
      options:
        - text: "Воно пом'якшує фрази і знижує градус емоційної напруги."
          correct: true
        - text: "Воно допомагає швидше довести свою абсолютну правоту."
          correct: false
        - text: "Воно змушує іншу людину одразу визнати свою провину."
          correct: false
        - text: "Воно приховує ваші справжні і дуже сильні негативні емоції."
          correct: false
      explanation: "Пом'якшення (наприклад, 'я хотів би') створює безпечний простір."
    - question: "Що означає вираз 'від щирого серця' у щоденному українському спілкуванні?"
      options:
        - text: "Робити щось максимально відверто, без будь-якої прихованої вигоди."
          correct: true
        - text: "Робити подарунки тільки своїм найближчим родичам."
          correct: false
        - text: "Дуже сильно хвилюватися за здоров'я іншої людини."
          correct: false
        - text: "Уважно прислухатися до биття свого власного пульсу."
          correct: false
      explanation: "Ця ідіома описує справжню щирість намірів."
