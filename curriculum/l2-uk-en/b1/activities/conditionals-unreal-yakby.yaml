- type: quiz
  title: 'Основи нереальної умови'
  items:
    - question: 'Який сполучник використовується для створення нереальної умови в українській мові?'
      options:
        - text: 'якби'
          correct: true
        - text: 'якщо'
          correct: false
        - text: 'ніби'
          correct: false
        - text: 'коли'
          correct: false
      explanation: 'Сполучник якби є головним маркером ірреальності.'
    - question: 'У якому часі завжди стоїть дієслово після сполучника якби?'
      options:
        - text: 'у минулому часі'
          correct: true
        - text: 'у теперішньому часі'
          correct: false
        - text: 'у майбутньому часі'
          correct: false
        - text: 'у неозначеній формі'
          correct: false
      explanation: 'Після якби дієслово завжди стоїть у формі минулого часу.'
    - question: 'Яка частка додається до дієслова для утворення умовного способу після приголосного звука?'
      options:
        - text: 'би'
          correct: true
        - text: 'б'
          correct: false
        - text: 'же'
          correct: false
        - text: 'то'
          correct: false
      explanation: 'Після приголосних звуків для милозвучності пишеться повна частка би.'
    - question: 'Яка частка додається до дієслова для утворення умовного способу після голосного звука?'
      options:
        - text: 'б'
          correct: true
        - text: 'би'
          correct: false
        - text: 'хай'
          correct: false
        - text: 'нехай'
          correct: false
      explanation: 'Після голосних звуків для милозвучності пишеться коротка частка б.'
    - question: 'Який з цих виразів є грубою граматичною калькою, яку не варто використовувати?'
      options:
        - text: 'якщо б'
          correct: true
        - text: 'якби ж'
          correct: false
        - text: 'якби не'
          correct: false
        - text: 'якби тільки'
          correct: false
      explanation: 'Вираз якщо б є калькою з інших мов. Правильно казати якби.'
    - question: 'Як правильно висловити ввічливу пораду другу за допомогою умовного способу?'
      options:
        - text: 'було б краще'
          correct: true
        - text: 'є краще'
          correct: false
        - text: 'буде краще'
          correct: false
        - text: 'було краще'
          correct: false
      explanation: 'Конструкція було б краще є м''яким способом дати пораду.'
    - question: 'Який настрій найчастіше передають емфатичні конструкції "якби тільки" або "якби ж то"?'
      options:
        - text: 'емоційний жаль або глибоку мрію'
          correct: true
        - text: 'точний математичний розрахунок'
          correct: false
        - text: 'байдужість до ситуації'
          correct: false
        - text: 'реальний план на майбутнє'
          correct: false
      explanation: 'Ці форми використовуються для підсилення сили невиконаного бажання або жалю.'
    - question: 'Що означає популярна конструкція "якби не" у повсякденній розмові?'
      options:
        - text: 'підкреслює вирішальну роль обставини чи людини в минулому'
          correct: true
        - text: 'повністю заперечує попередній факт'
          correct: false
        - text: 'виражає згоду з думкою співрозмовника'
          correct: false
        - text: 'описує реальну умову в майбутньому'
          correct: false
      explanation: 'Конструкція якби не описує гіпотетичні наслідки відсутності певного фактора.'

- type: fill-in
  title: 'Від реальності до мрії: вставте правильне слово'
  items:
    - sentence: 'Якби я ___ більше грошей, я б купив новий комп''ютер.'
