      options:
        - 'мав'
        - 'маю'
        - 'матиму'
        - 'мати'
      explanation: 'Після якби завжди використовується минулий час.'
    - sentence: 'Якби ми ___ її адресу, ми б надіслали їй листа.'
      answer: 'знали'
      options:
        - 'знали'
        - 'знаємо'
        - 'знатимемо'
        - 'знати'
      explanation: 'Після якби використовується минулий час множини.'
    - sentence: 'Він б обов''язково допоміг, якби ти його ___ про це.'
      answer: 'попросив'
      options:
        - 'попросив'
        - 'попросиш'
        - 'просиш'
        - 'просити'
      explanation: 'Минулий час для дієслова чоловічого роду.'
    - sentence: 'Якби зараз не ___ такий сильний дощ, ми б пішли в парк.'
      answer: 'йшов'
      options:
        - 'йшов'
        - 'йде'
        - 'йтиме'
        - 'йти'
      explanation: 'Нереальна умова в теперішньому моменті вимагає минулого часу.'
    - sentence: 'Я б з радістю прочитав цю книгу, якби вона ___ перекладена українською.'
      answer: 'була'
      options:
        - 'була'
        - 'є'
        - 'буде'
        - 'бути'
      explanation: 'Жіночий рід, минулий час.'
    - sentence: 'Якби студенти ___ краще, вони б здали іспит без проблем.'
      answer: 'вчилися'
      options:
        - 'вчилися'
        - 'вчаться'
        - 'вчитимуться'
        - 'вчитися'
      explanation: 'Множина, минулий час.'
    - sentence: 'Якби ти ___ мені раніше, я б змінив свої плани.'
      answer: 'сказав'
      options:
        - 'сказав'
        - 'скажеш'
        - 'кажеш'
        - 'казати'
      explanation: 'Минулий час для гіпотетичної ситуації.'
    - sentence: 'Ми б замовили піцу, якби цей ресторан ще ___.'
      answer: 'працював'
      options:
        - 'працював'
        - 'працює'
        - 'працюватиме'
        - 'працювати'
      explanation: 'Минулий час для чоловічого роду.'
    - sentence: 'Якби літо ___ довшим, діти б більше відпочивали.'
      answer: 'було'
      options:
        - 'було'
        - 'є'
        - 'буде'
        - 'бути'
      explanation: 'Середній рід, минулий час.'
    - sentence: 'Якби я ___ ідеально готувати, я б відкрив ресторан.'
      answer: 'вмів'
      options:
        - 'вмів'
        - 'вмію'
        - 'вмітиму'
        - 'вміти'
      explanation: 'Минулий час.'
    - sentence: 'Якби вона ___ вільна сьогодні, ми б зустрілися.'
      answer: 'була'
      options:
        - 'була'
        - 'є'
        - 'буде'
        - 'бути'
      explanation: 'Минулий час, жіночий рід.'
    - sentence: 'Я б дуже зрадів, якби ти ___ до мене в гості.'
      answer: 'приїхав'
      options:
        - 'приїхав'
        - 'приїдеш'
        - 'приїжджаєш'
        - 'приїхати'
      explanation: 'Минулий час після якби.'

