version: '1.0'
module: motion-prefixes-transit
level: b1
workbook:
- id: match-up-figurative
  type: match-up
  instruction: З'єднайте дієслова з префіксом «пере-» у переносному (метафоричному)
    значенні з їхнім англійським перекладом.
  pairs:
  - left: переїхати в нове місто
    right: to relocate to a new city
  - left: перенести зустріч
    right: to reschedule a meeting
  - left: перевести статтю
    right: to translate an article
  - left: перейти на іншу роботу
    right: to transition / switch jobs
  - left: переробити завдання
    right: to redo a task
  - left: передати повідомлення
    right: to pass on a message
  - left: переказати гроші
    right: to transfer money
  - left: пережити стрес
    right: to survive / get through stress
- id: fill-in-transit-pro
  type: fill-in
  instruction: Вставте правильне дієслово з префіксом «про-» та відповідний прийменник
    (через, повз, по) за змістом речення.
  items:
  - sentence: Ми дуже швидко ____ ____ велике місто Житомир, навіть не зупиняючись.
    answer: проїхали через
    options:
    - проїхали через
    - переїхали через
    - проїхали повз
    - пройшли по
  - sentence: Вона дуже любить ____ ____ тихій вулиці після роботи.
    answer: пройти по
    options:
    - перейти через
    - пройти по
    - пройти повз
    - пройти через
  - sentence: Автомобіль випадково ____ ____ аптеку, бо водій шукав місце для паркування.
    answer: проїхав повз
    options:
    - проїхав повз
    - переїхав через
    - проїхав через
    - проїхав по
  - sentence: У великому натовпі на вокзалі було важко ____ велику валізу.
    answer: пронести
    options:
    - пронести
    - перенести
    - перевезти
    - провезти
  - sentence: Екскурсовод цікаво ____ туристів ____ історичний музей.
    answer: провів через
    options:
    - провів через
    - перевів через
    - провів по
    - перевіз через
  - sentence: Корабель тихо ____ ____ високий берег, і всі пасажири фотографували
      краєвид.
    answer: проплив повз
    options:
    - проплив повз
    - переплив через
    - проплив по
    - проплив через
  - sentence: Він дуже поспішав, тому просто ____ ____ мене і навіть не привітався.
    answer: пробіг повз
    options:
    - пробіг повз
    - перебіг через
    - пробіг по
    - пробіг через
  - sentence: Щоб швидше дістатися додому, ми вирішили обережно ____ ____ темний парк.
    answer: пройти через
    options:
    - пройти через
    - пройти повз
    - пройти по
    - перейти через
- id: quiz-prefix-choice
  type: quiz
  instruction: Оберіть правильний префікс («пере-» чи «про-») залежно від того, чи
    це перетинання межі, чи рух наскрізь або повз об'єкт.
  items:
  - question: Туристи хотіли ____ дорогу до супермаркету.
    options:
    - перейти
    - пройти
    - переїхати
    - проїхати
    correct: 0
  - question: Ми випадково ____ свій поворот на трасі, тому довелося довго шукати
      розворот.
    options:
    - переїхали
    - проїхали
    - перейшли
    - пройшли
    correct: 1
  - question: Літак має ____ океан за вісім годин.
    options:
    - пролетіти
    - перелетіти
    - проїхати
    - переїхати
    correct: 1
  - question: Щодня я ____ цей красивий парк дорогою на роботу, і завжди милуюся деревами
      з вікна машини.
    options:
    - переїжджаю
    - проїжджаю
    - переходжу
    - проходжу
    correct: 1
  - question: Дитина несподівано ____ вулицю у небезпечному місці.
    options:
    - пробігла
    - перебігла
    - переїхала
    - проїхала
    correct: 1
  - question: Я випадково ____ свою зупинку, бо читала цікаву книжку в автобусі.
    options:
    - переїхала
    - проїхала
    - перейшла
    - пройшла
    correct: 1
  - question: Водій вантажівки повинен легально ____ товар через кордон.
    options:
    - пронести
    - перенести
    - перевезти
    - провезти
    correct: 2
  - question: Птахи швидко ____ над нашим будинком і зникли в небі.
    options:
    - перелетіли
    - пролетіли
    - перебігли
    - пробігли
    correct: 1
- id: group-sort-motion-logic
  type: group-sort
  instruction: Розподіліть 14 дієслів руху за логічними групами їхніх префіксів (вхід/вихід,
    наближення/прибуття, транзит/перетинання, транзит/наскрізь).
  groups:
  - label: Вхід та вихід (Entry / Exit)
    items:
    - зайти
    - вийти
    - заїхати
    - виїхати
  - label: Наближення та прибуття (Approach / Arrival)
    items:
    - доїхати
    - приїхати
    - дійти
    - прийти
  - label: Транзит і перетинання (Transit / Crossing)
    items:
    - перейти
    - переїхати
    - перебігти
  - label: Транзит і рух повз/наскрізь (Transit / Passing)
    items:
    - пройти
    - проїхати
    - пробігти
- id: error-correction-transit-prefixes
  type: error-correction
  instruction: Знайдіть і виправте неправильний просторовий префікс у фрагментах блогу
    про подорожі.
  items:
  - sentence: Ми проїхали кордон без жодних проблем і швидко опинилися в Польщі.
    error: проїхали
    correction: переїхали
    error_type: word
    options:
    - переїхали
    - пройшли
    - перейшли
    explanation: Кордон (border) — це межа, яку ми перетинаємо з одного боку на інший,
      тому потрібен префікс «пере-».
  - sentence: Вчора ми нарешті проїхали в нове місто і тепер облаштовуємо нашу квартиру.
    error: проїхали
    correction: переїхали
    error_type: word
    options:
    - переїхали
    - пройшли
    - перейшли
    explanation: Зміна постійного місця проживання (relocation) передається дієсловом
      «переїхати».
  - sentence: Я так замислився, що переїхав свою зупинку і вийшов лише на наступній.
    error: переїхав
    correction: проїхав
    error_type: word
    options:
    - проїхав
    - пройшов
    - перейшов
    explanation: Пропустити зупинку означає проїхати повз неї, тобто залишити її позаду
      — префікс «про-».
  - sentence: Бабусі було складно, тому я допоміг їй провести через небезпечне перехрестя.
    error: провести
    correction: перевести
    error_type: word
    options:
    - перевести
    - перенести
    - пронести
    explanation: Перехрестя — це перешкода, яку долають з одного боку на інший (crossing),
      тому — «перевести».
  - sentence: Наш автобус швидко переїхав через усе місто, не роблячи жодних зупинок.
    error: переїхав
    correction: проїхав
    error_type: word
    options:
    - проїхав
    - перетнув
    - перевів
    explanation: Рух наскрізь через об'ємний простір (як місто чи парк) без зупинки
      — це префікс «про-».
  - sentence: Коли почалася злива, ми якраз перебігали повз старий музей.
    error: перебігали
    correction: пробігали
    error_type: word
    options:
    - пробігали
    - переходили
    - проходили
    explanation: Рух уздовж об'єкта («повз музей») вимагає префікса «про-».
- id: essay-response-travel-itinerary
  type: essay-response
  prompt: 'Напишіть короткий план туристичного маршруту в Києві (від Золотих Воріт
    до Майдану Незалежності) на 6 речень. Використайте щонайменше 3 різні транзитні
    дієслова з префіксами «пере-» та «про-» (наприклад: перейти, пройти, проїхати).'
  min_words: 50
  model_answer: Наша прогулянка почнеться біля Золотих Воріт. Спочатку ми пройдемо
    повз старовинні будинки на вулиці Володимирській. Потім нам треба обережно перейти
    через дорогу біля Оперного театру. Далі ми пройдемо по красивій вулиці Хрещатик.
    Якщо ми не захочемо йти пішки, можемо проїхати одну зупинку на метро. У кінці
    маршруту ми обережно перейдемо через підземний пішохідний перехід і вийдемо прямо
    на Майдан Незалежності.
  evaluation_criteria:
  - Текст містить мінімум 6 речень.
  - Використано щонайменше 3 транзитні дієслова руху.
  - Правильно вибрані префікси «пере-» (для перетинання) та «про-» (для руху повз/наскрізь).
  - Правильно вжиті прийменники (через, повз, по).
- id: fill-in-present-conjugation
  type: fill-in
  instruction: Вставте правильну форму дієслова теперішнього часу за особою та числом.
  items:
  - sentence: Я щодня ____ (проходити) повз цей музей дорогою на роботу.
    answer: проходжу
    options:
    - проходить
    - проходжу
    - проходимо
    - проходять
  - sentence: Вона завжди дуже обережно ____ (переходити) вулицю на зелене світло.
    answer: переходить
    options:
    - переходжу
    - переходиш
    - переходить
    - переходять
  - sentence: Ми часто ____ (проїжджати) через це красиве місто влітку.
    answer: проїжджаємо
    options:
    - проїжджаєте
    - проїжджає
    - проїжджаю
    - проїжджаємо
  - sentence: Чому ти так швидко ____ (перебігати) дорогу у недозволеному місці?
    answer: перебігаєш
    options:
    - перебігає
    - перебігаєш
    - перебігаю
    - перебігають
  - sentence: Студенти щоранку ____ (переїжджати) цей міст, щоб дістатися до університету.
    answer: переїжджають
    options:
    - переїжджають
    - переїжджаємо
    - переїжджає
    - переїжджаєте
  - sentence: Ви часто ____ (переносити) свої плани через погану погоду?
    answer: переносите
    options:
    - переносиш
    - переносите
    - переносимо
    - переносять
- id: quiz-address-forms-pronouns
  type: quiz
  instruction: Оберіть правильну форму звертання — неформальне (ти) чи ввічливе (Ви)
    — та відповідну форму дієслова.
  items:
  - question: Олено, чому ____ завжди ____ свою зупинку?
    options:
    - ти ... проїжджає
    - Ви ... проїжджаєте
    - ти ... проїжджаєш
    - Ви ... проїжджаєш
    correct: 2
  - question: Пане Іване, як часто ____ ____ через цей міст?
    options:
    - ти ... переїжджаєш
    - Ви ... переїжджаєте
    - він ... переїжджає
    - ми ... переїжджаємо
    correct: 1
  - question: Мамо, ____ вже ____ через дорогу?
    options:
    - Ви ... перейшли
    - ти ... перейшла
    - вона ... перейшла
    - ти ... перейшли
    correct: 1
  - question: Друзі, ____ ____ повз аптеку чи ні?
    options:
    - ти ... проїхав
    - ви ... проїхали
    - ми ... проїхали
    - вони ... проїхали
    correct: 1
  - question: Діти, як швидко ____ ____ цей текст?
    options:
    - Ви ... перевели
    - ви ... переклали
    - ти ... переклав
    - вони ... переклали
    correct: 1
  - question: Сергію, ____ часто ____ через цей парк?
    options:
    - Ви ... проходите
    - ти ... проходиш
    - ти ... проходять
    - ви ... проходиш
    correct: 1
