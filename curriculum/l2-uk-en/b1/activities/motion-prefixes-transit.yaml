version: '1.0'
module: motion-prefixes-transit
level: b1
inline:
- id: match-up-prefix-shift
  type: match-up
  instruction: З'єднайте дієслова з префіксами пере- та про- з їхнім точним значенням
    у контексті руху.
  pairs:
  - left: перейти (перетнути пішки)
    right: пройти (минути пішки)
  - left: переїхати (перетнути транспортом)
    right: проїхати (минути транспортом)
  - left: перебігти (швидко перетнути)
    right: пробігти (швидко минути)
  - left: перенести (перемістити об'єкт через бар'єр)
    right: пронести (перемістити об'єкт наскрізь)
  - left: перевести (допомогти перетнути дорогу)
    right: провести (бути гідом крізь територію)
  - left: перевезти (доставити вантаж на інший бік)
    right: провезти (транспортувати вантаж наскрізь)
  - left: перелетіти (подолати літаком перешкоду)
    right: пролетіти (минути повітрям)
  - left: переплисти (подолати річку до іншого берега)
    right: проплисти (минути водою)
- id: fill-in-transit-verbs
  type: fill-in
  instruction: Вставте правильне дієслово з префіксом пере- або про- та відповідний
    прийменник простору.
  items:
  - sentence: Щоб потрапити до музею, вам потрібно ____ широку вулицю на пішохідному
      переході.
    answer: перейти
    options:
    - пройти
    - перейти
    - відійти
  - sentence: Випадково ми не зупинилися і дуже швидко ____ нашу вулицю.
    answer: проїхали
    options:
    - переїхали
    - проїхали
    - виїхали
  - sentence: Машина не повернула, а просто швидко ____ це велике перехрестя по прямій.
    answer: проїхала
    options:
    - переїхала
    - проїхала
    - доїхала
  - sentence: Екскурсовод цікаво розповідав, поки ____ туристів по всьому старому
      місту.
    answer: провів
    options:
    - перевів
    - провів
    - довів
  - sentence: Я часто бачу, як вони швидко проїжджають ____ цей високий будинок.
    answer: повз
    options:
    - через
    - повз
    - наскрізь
  - sentence: Щоб побачити оперний театр, нам треба було обов'язково пройти ____ міський
      парк.
    answer: через
    options:
    - повз
    - через
    - до
  - sentence: Ти не знаєш, чи вони вже ____ кордон на своєму автомобілі?
    answer: переїхали
    options:
    - проїхали
    - переїхали
    - заїхали
  - sentence: Щоб швидше опинитися вдома, він вирішив небезпечно ____ дорогу на червоне
      світло.
    answer: перебігти
    options:
    - пробігти
    - перебігти
    - забігти
- id: quiz-crossing-or-passing
  type: quiz
  instruction: 'Оберіть правильний варіант опису руху: перетинання чи проходження
    повз?'
  items:
  - question: Ти не знаєш, де аптека? Здається, ми її щойно...
    options:
    - проїхали
    - переїхали
    - доїхали
    - виїхали
    correct: 0
  - question: Обережно, тут інтенсивний трафік! Нам треба безпечно...
    options:
    - перейти дорогу
    - пройти повз дорогу
    - підійти до дороги
    - відійти від дороги
    correct: 0
  - question: Наш швидкісний поїзд не зупинявся на маленьких станціях, він просто...
    options:
    - проїжджав повз них
    - переїжджав через них
    - приїжджав до них
    - заїжджав у них
    correct: 0
  - question: Минулого літа мій брат зміг самостійно...
    options:
    - переплисти на інший берег
    - проплисти повз берег
    - відплисти на інший берег
    - заплисти за інший берег
    correct: 0
  - question: Великий собака не звернув на нас уваги і дуже швидко...
    options:
    - пробіг повз
    - перебіг наскрізь
    - прибіг до нас
    - забіг повз
    correct: 0
  - question: Мій найкращий друг завтра планує...
    options:
    - переїхати в нову квартиру
    - проїхати в нову квартиру
    - доїхати наскрізь квартири
    - від'їхати до нової квартири
    correct: 0
  - question: Щоб опинитися на лівому березі Дніпра, вам обов'язково потрібно...
    options:
    - переїхати міст
    - проїхати повз міст
    - підійти до мосту
    - заїхати наскрізь мосту
    correct: 0
  - question: Я глибоко замислився, не помітив потрібний будинок і випадково...
    options:
    - пройшов повз нього
    - перейшов через нього
    - дійшов до нього
    - вийшов з нього
    correct: 0
- id: error-correction-navigation
  type: error-correction
  instruction: Знайдіть і виправте логічну або просторову помилку в реченнях.
  items:
  - sentence: Ми вчора перейшли повз великий історичний музей і навіть не зупинилися.
    error: перейшли
    correction: пройшли
    error_type: word
    options:
    - пройшли
    - забігли
    - доїхали
    explanation: Минали об'єкт без перетину його території, тому потрібен префікс
      про-.
  - sentence: Вона дуже неуважно читала книгу, тому випадково переїхала свою автобусну
      зупинку.
    error: переїхала
    correction: проїхала
    error_type: word
    options:
    - проїхала
    - виїхала
    - приїхала
    explanation: Зупинка залишилася позаду без зупинки транспорту, це транзит повз
      об'єкт.
  - sentence: Щоб потрапити на правий берег річки, нам треба проїхати довгий міст.
    error: проїхати
    correction: переїхати
    error_type: word
    options:
    - переїхати
    - доїхати
    - від'їхати
    explanation: Міст — це бар'єр, який потрібно успішно перетнути з одного боку на
      інший.
  - sentence: Студенти швидко перебігли повз мене у коридорі та не привіталися.
    error: перебігли
    correction: пробігли
    error_type: word
    options:
    - пробігли
    - вибігли
    - забігли
    explanation: Рух відбувався вздовж або поруч, без перетинання моєї лінії руху.
  - sentence: Маленька дитина злякалася і не змогла самостійно пройти на інший бік
      вулиці.
    error: пройти
    correction: перейти
    error_type: word
    options:
    - перейти
    - проїхати
    - підійти
    explanation: Вулиця — це смуга, яку слід перетнути, щоб опинитися на іншій стороні.
  - sentence: Туристи швидко пройшли через кордон без жодних проблем із документами.
    error: пройшли
    correction: перейшли
    error_type: word
    options:
    - перейшли
    - доїхали
    - від'їхали
    explanation: Кордон — це межа між державами, яку завжди перетинають (пере-).
- id: group-sort-prefixes
  type: group-sort
  instruction: Розподіліть дієслова за їхньою головною просторовою функцією (чотири
    логічні групи).
  groups:
  - label: Транзит (перетинання або проходження)
    items:
    - перейти
    - проїхати
    - перелетіти
    - пробігти
  - label: Прибуття (досягнення мети)
    items:
    - приїхати
    - доїхати
    - прийти
  - label: Відбуття (початок руху)
    items:
    - поїхати
    - від'їхати
    - піти
  - label: Інтер'єр (вхід або вихід)
    items:
    - зайти
    - виїхати
    - занести
    - винести
- id: free-write-travel-directions
  type: essay-response
  instruction: Опишіть міський маршрут.
  prompt: 'Уявіть, що ви працюєте місцевим гідом. Напишіть короткий маршрут від Золотих
    воріт до Майдану Незалежності для туриста. Використайте щонайменше 3 дієслова
    просторового руху з префіксами ''пере-'' або ''про-'' (наприклад: перейти, пройти
    повз, перехрестя, пішохідний перехід).'
  min_words: 50
  model_answer: Добрий день! Ваш маршрут буде дуже простим. Спочатку вам потрібно
    вийти від Золотих воріт і пройти вздовж вулиці Володимирської. Потім ви повинні
    перейти через широку дорогу на пішохідному переході біля Оперного театру. Далі
    йдіть прямо і швидко пройдіть повз старий музей. На великому перехресті обережно
    перейдіть вулицю Богдана Хмельницького на зелене світло. Після цього продовжуйте
    свій рух тільки прямо, поки не побачите великий Хрещатик. Щоб опинитися на Майдані
    Незалежності, вам треба буде обов'язково перейти через підземний перехід. Цей
    маршрут зазвичай займає близько п'ятнадцяти хвилин.
  evaluation_criteria:
  - Маршрут містить щонайменше 3 дієслова руху з префіксами пере- або про-.
  - Текст логічно описує послідовність дій.
  - Правильно використані просторові прийменники (через, повз, по).
workbook:
- type: match-up
  instruction: З'єднайте особові займенники з правильними формами майбутнього часу
    дієслів «перейти» та «проїхати».
  pairs:
  - left: я
    right: проїду
  - left: ти
    right: перейдеш
  - left: він
    right: проїде
  - left: ми
    right: перейдемо
  - left: ви
    right: проїдете
  - left: вони
    right: перейдуть
- type: quiz
  instruction: Оберіть правильний вид дієслова (доконаний чи недоконаний).
  items:
  - question: Кожного ранку я ____ цю вулицю дорогою на роботу.
    options:
    - переходжу
    - перейду
    - перейшов
    - перейти
    correct: 0
  - question: Вчора ми дуже швидко ____ через густий ліс і навіть не помітили цього.
    options:
    - пройшли
    - проходили
    - пройдемо
    - проходимо
    correct: 0
  - question: Поки ми повільно ____ цей довгий міст, несподівано почався сильний дощ.
    options:
    - переїжджали
    - переїхали
    - переїдемо
    - переїдуть
    correct: 0
  - question: Ой, я випадково ____ свою зупинку! Що мені тепер робити?
    options:
    - проїхав
    - проїжджав
    - проїду
    - проїжджаю
    correct: 0
  - question: Ці міські автобуси завжди ____ рівно кожні десять хвилин.
    options:
    - проходять
    - пройдуть
    - пройшли
    - пройти
    correct: 0
  - question: Мій колега успішно склав іспит і вирішив повністю ____ на українську
      мову.
    options:
    - перейти
    - переходити
    - перейшов
    - перейду
    correct: 0
- type: error-correction
  instruction: Виправте граматичну форму дієслова за його особою (теперішній або майбутній
    час).
  items:
  - sentence: Завтра я обов'язково перейдемо цю небезпечну вулицю на зелене світло.
    error: перейдемо
    correction: перейду
    error_type: word
    options:
    - перейду
    - перейдеш
    - перейде
    explanation: Займенник 'я' (1 особа однини) вимагає форми 'перейду'.
  - sentence: Ми щодня проходиш повз цей історичний музей.
    error: проходиш
    correction: проходимо
    error_type: word
    options:
    - проходимо
    - проходять
    - проходить
    explanation: Займенник 'ми' (1 особа множини) вимагає форми 'проходимо'.
  - sentence: Ти вже знаєш, коли вони переїде до нового великого офісу?
    error: переїде
    correction: переїдуть
    error_type: word
    options:
    - переїдуть
    - переїдемо
    - переїду
    explanation: Займенник 'вони' (3 особа множини) вимагає форми 'переїдуть'.
  - sentence: Зараз вона обережно переведіть літню людину через перехрестя.
    error: переведіть
    correction: переводить
    error_type: word
    options:
    - переводить
    - переводять
    - переводжу
    explanation: Займенник 'вона' (3 особа однини) вимагає дійсного способу 'переводить'.
  - sentence: Ми проїжджаю ваше рідне місто сьогодні ввечері.
    error: проїжджаю
    correction: проїжджаємо
    error_type: word
    options:
    - проїжджаємо
    - проїжджаєте
    - проїжджає
    explanation: Займенник 'ми' вимагає форми 'проїжджаємо'.
  - sentence: Ви зможете перенесемо нашу ділову зустріч на наступний тиждень?
    error: перенесемо
    correction: перенести
    error_type: word
    options:
    - перенести
    - перенесе
    - перенесу
    explanation: Після дієслова 'зможете' потрібен інфінітив 'перенести'.
- type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - швидко
    - повз
    - Вона
    - мене.
    - пройшла
    correct_order:
    - Вона
    - швидко
    - пройшла
    - повз
    - мене.
  - words:
    - через
    - перелітають
    - Птахи
    - гори.
    - часто
    correct_order:
    - Птахи
    - часто
    - перелітають
    - через
    - гори.
  - words:
    - перевести
    - гроші
    - Я
    - на
    - рахунок.
    - хочу
    correct_order:
    - Я
    - хочу
    - перевести
    - гроші
    - на
    - рахунок.
  - words:
    - автобусну
    - Він
    - зупинку.
    - випадково
    - проїхав
    correct_order:
    - Він
    - випадково
    - проїхав
    - автобусну
    - зупинку.
  - words:
    - цей
    - Як
    - перехід?
    - пішохідний
    - перейти
    correct_order:
    - Як
    - перейти
    - цей
    - пішохідний
    - перехід?
  - words:
    - через
    - наскрізь.
    - Вони
    - ліс
    - проїхали
    correct_order:
    - Вони
    - проїхали
    - через
    - ліс
    - наскрізь.
