- id: quiz-identifying-vs-simple-sentences-and-the-concept-of-equality
  type: quiz
  instruction: Визначте синтаксичну структуру речення. Зверніть увагу на наявність
    двох граматичних основ або однорідних членів.
  items:
  - question: Вітер дув, і дерева хилилися.
    options:
    - Складносурядне речення з єднальним сполучником
    - Просте речення з однорідними присудками
    - Просте речення з однорідними підметами
    - Складнопідрядне речення
    correct: 0
  - question: Вітер дув і свистів.
    options:
    - Складносурядне речення з єднальним сполучником
    - Просте речення з однорідними присудками
    - Просте речення з однорідними підметами
    - Складнопідрядне речення
    correct: 1
  - question: Коли сонце зайшло, стало темно.
    options:
    - Складносурядне речення
    - Просте речення з однорідними членами
    - Складнопідрядне речення
    - Складне безсполучникове речення
    correct: 2
  - question: Софія та Андрій зустрілися у кав'ярні.
    options:
    - Складносурядне речення
    - Просте речення з однорідними присудками
    - Просте речення з однорідними підметами
    - Складнопідрядне речення
    correct: 2
  - question: Сонце зайшло, і стало темно.
    options:
    - Складносурядне речення з єднальним сполучником
    - Складносурядне речення з протиставним сполучником
    - Просте речення з однорідними присудками
    - Складнопідрядне речення
    correct: 0
  - question: Я хочу піти в кіно, а ти мрієш про театр.
    options:
    - Складносурядне речення з протиставним сполучником
    - Складносурядне речення з розділовим сполучником
    - Просте речення з однорідними членами
    - Складнопідрядне речення
    correct: 0
- id: fill-in-conjunction-choice-focus-on-choosing-between-and-based-on-semantic-links
  type: fill-in
  instruction: Вставте правильний сполучник сурядності (і, а, але, або, зате, то)
    за змістом речення.
  items:
  - sentence: Сестра уважно читає книгу, ____ брат малює картину.
    answer: а
    options:
    - і
    - а
    - але
    - або
  - sentence: Я хотів прийти на вечірку, ____ раптом захворів.
    answer: але
    options:
    - і
    - а
    - але
    - чи
  - sentence: Пройшов теплий літній дощ, ____ дерева радісно заясніли.
    answer: і
    options:
    - і
    - а
    - але
    - або
  - sentence: Цей старий автомобіль їде повільно, ____ він ніколи не ламається.
    answer: зате
    options:
    - і
    - а
    - зате
    - чи
  - sentence: ____ ми підемо на виставку, або просто залишимося вдома і замовимо піцу.
    answer: Або
    options:
    - Або
    - Чи
    - То
    - І
  - sentence: ____ сонце усміхнеться крізь хмари, то дощик рясно землю полива.
    answer: То
    options:
    - То
    - Чи
    - Або
    - Ні
- id: reading-narrative-analysis-focus-on-identifying-and-classifying-10-compound-sentences-within-a-narrative-text-about-lviv
  type: quiz
  instruction: 'Прочитайте текст і дайте відповіді на запитання.


    Текст: Софія та Андрій зустрілися у затишній львівській кав''ярні, щоб обговорити
    свої плани. Спочатку вони пили смачну каву, і Софія розповідала про нову виставу.
    Андрій уважно слухав, а потім запропонував піти в Стрийський парк. Погода була
    чудова, і сонце яскраво світило крізь вікна. Раптом небо потемнішало, і почався
    сильний дощ. Або вони залишаться в кав''ярні, або їм доведеться бігти під дощем.
    У кав''ярні було тепло, зате на вулиці вирувала справжня буря.'
  items:
  - question: Який смисловий зв'язок між частинами речення «Спочатку вони пили смачну
      каву, і Софія розповідала про нову виставу»?
    options:
    - Одночасність
    - Послідовність
    - Протиставлення
    - Взаємовиключення
    correct: 0
  - question: Який сполучник використано в реченні «У кав'ярні було тепло, зате на
      вулиці вирувала справжня буря»?
    options:
    - Єднальний
    - Протиставний
    - Розділовий
    - Підрядний
    correct: 1
  - question: У якому реченні з тексту виражено взаємовиключення (альтернативу)?
    options:
    - Андрій уважно слухав, а потім запропонував піти в парк.
    - Або вони залишаться в кав'ярні, або їм доведеться бігти під дощем.
    - Погода була чудова, і сонце яскраво світило.
    - Раптом небо потемнішало, і почався сильний дощ.
    correct: 1
  - question: Скільки граматичних основ у реченні «Раптом небо потемнішало, і почався
      сильний дощ»?
    options:
    - Одна
    - Дві
    - Три
    - Жодної
    correct: 1
  - question: Яку синтаксичну функцію виконує сполучник «і» в реченні «Погода була
      чудова, і сонце яскраво світило крізь вікна»?
    options:
    - З'єднує однорідні члени простого речення
    - З'єднує дві рівноправні частини складного речення
    - Приєднує залежну підрядну частину до головної
    - Виражає сильне раптове протиставлення
    correct: 1
  - question: До якої граматичної групи сполучників сурядності належить парна конструкція
      «або...або»?
    options:
    - Єднальні
    - Протиставні
    - Розділові
    - Підрядні
    correct: 2
- id: match-up-focus-on-linking-terms-with-their-corresponding-conjunctions-and-rules
  type: match-up
  instruction: З'єднайте граматичні терміни з їхніми значеннями або прикладами сполучників.
  pairs:
  - left: Єднальні сполучники
    right: і, й, та (у значенні і), ні...ні
  - left: Протиставні сполучники
    right: а, але, зате, проте, однак
  - left: Розділові сполучники
    right: або, чи, то...то
  - left: Одночасність
    right: Дві незалежні дії відбуваються паралельно
  - left: Послідовність
    right: Одна дія повністю завершується, починається інша
  - left: Чергування
    right: Події періодично змінюють одна одну в часі (то...то)
  - left: Взаємовиключення
    right: Реалізується лише один варіант із можливих (або...або)
  - left: Спільний другорядний член
    right: Граматична причина скасувати кому перед єднальним сполучником
