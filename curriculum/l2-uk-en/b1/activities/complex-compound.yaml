version: '1.0'
module: complex-compound
level: b1
inline:
- id: quiz-identifying-vs-simple-sentences-and-the-concept-of-equality
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Що таке
    складносурядне речення?».'
  items:
  - question: Яке з поданих речень є складносурядним?
    options:
    - Вітер дув, і дерева хилилися.
    - Коли сонце зайшло, стало темно.
    - Вітер дув і сильно свистів.
    - Сонце швидко зайшло і сховалось за лісом.
    correct: 0
  - question: Що означає термін «рівноправний» у контексті складносурядного речення?
    options:
    - Жодна частина не залежить від іншої.
    - Друга частина завжди підпорядковується першій.
    - Обидві частини завжди мають один спільний підмет.
    - Речення має лише одну єдину граматичну основу.
    correct: 0
  - question: Який сполучник НЕ належить до сполучників сурядності?
    options:
    - Коли
    - Або
    - Проте
    - Та
    correct: 0
  - question: Який смисловий зв'язок виражає протиставний сполучник «але»?
    options:
    - Пряме протиріччя або несподіваний результат
    - Одночасність паралельних подій
    - Хронологічну послідовність дій
    - Постійне чергування в часі
    correct: 0
  - question: Що таке «спільний другорядний член» у складносурядному реченні?
    options:
    - Слово або фраза на початку, що граматично стосується обох частин.
    - Слово, яке завжди об'єднує два різні підмети в один.
    - Сполучник, який міцно з'єднує два прості речення.
    - Розділовий знак між незалежними частинами речення.
    correct: 0
  - question: У якому єдиному випадку перед єднальним сполучником «і» НЕ ставиться
      кома?
    options:
    - Коли на початку речення є спільний другорядний член.
    - Коли складносурядне речення є дуже коротким.
    - Коли обидві частини речення виражають чітку послідовність.
    - Кома перед цим сполучником ставиться завжди без жодних винятків.
    correct: 0
- id: essay-sentence-building-focus-on-building-5-8-compound-sentences-using-copulative-conjunctions-about-daily-routines
  type: essay-response
  prompt: Напишіть 5-8 складносурядних речень про вашу щоденну рутину. Використовуйте
    різні єднальні сполучники сурядності (і, й, та, ні...ні). Зверніть особливу увагу
    на правильну пунктуацію.
  min_words: 50
  model_answer: Я прокидаюся дуже рано кожного ранку, і мій новий день завжди починається
    з інтенсивного спорту. Спочатку я довго бігаю в міському парку, й свіже прохолодне
    повітря додає мені необхідної енергії на весь день. Потім я повертаюся додому
    та готую смачний сніданок, та мій старший брат робить запашну каву для нас обох.
    Ні я не люблю довго спати у вихідні дні, ні він ніколи не витрачає свій дорогоцінний
    час даремно вранці. Після цього ми швидко снідаємо разом, і кожен із нас одразу
    йде на свою улюблену роботу.
  evaluation_criteria:
  - Студент написав щонайменше 5 речень про щоденну рутину.
  - Використано різноманітні єднальні сполучники сурядності (і, й, та, ні...ні).
  - Речення є саме складносурядними (кожна частина має власну граматичну основу).
  - Правильно розставлені коми перед єднальними сполучниками (або їх відсутність обґрунтована
    спільним другорядним членом).
- id: fill-in-conjunction-choice-focus-on-choosing-between-and-based-on-semantic-links
  type: fill-in
  instruction: Вставте правильний сполучник сурядності у реченнях, зважаючи на смисловий
    зв'язок.
  items:
  - sentence: Я хочу піти в кіно, ____ мій друг мріє про театр.
    answer: а
    options:
    - а
    - але
    - і
  - sentence: Він дуже мало говорить на важливих зустрічах, ____ завжди багато і якісно
      робить.
    answer: зате
    options:
    - зате
    - чи
    - й
  - sentence: ____ ми підемо на цікаву виставку, ____ просто залишимося вдома.
    answer: Або
    options:
    - Або
    - То
    - Ні
  - sentence: Сьогодні ввечері ми подивимося новий фільм удома, ____ ти хочеш піти
      на довгу прогулянку парком?
    answer: чи
    options:
    - чи
    - або
    - та
  - sentence: Компанія показала хороший результат у цьому кварталі, ____ загальна
      економічна ситуація в країні залишається нестабільною.
    answer: однак
    options:
    - однак
    - зате
    - а
  - sentence: ____ яскраве весняне сонце привітно усміхнеться нам, ____ холодний дощик
      рясно землю полива.
    answer: То
    options:
    - То
    - Або
    - Ні
- id: error-correction-punctuation-focus-on-identifying-where-commas-are-needed-vs-where-they-must-be-removed-due-to-shared-members
  type: error-correction
  instruction: Знайдіть і виправте пунктуаційні та лексичні помилки у складносурядних
    реченнях.
  items:
  - sentence: Уночі вітер стих, і дощ перестав.
    error: стих, і
    correction: стих і
    error_type: construction
    explanation: Кома не ставиться, бо є спільний другорядний член «Уночі», який стосується
      обох дій.
  - sentence: Я пішов у магазин і я купив молоко.
    error: магазин і
    correction: магазин, і
    error_type: construction
    explanation: Це складносурядне речення з двома повноцінними основами, тому перед
      єднальним сполучником «і» обов'язково потрібна кома.
  - sentence: Один брат став лікарем, але другий обрав кар'єру вчителя.
    error: але
    correction: а
    error_type: word
    explanation: Тут відбувається паралельне зіставлення двох фактів, а не пряме протиріччя
      чи перешкода, тому стилістично правильно вжити сполучник «а».
  - sentence: Сонце яскраво світить на чистому небі і теплий весняний вітер віє над
      полем.
    error: небі і
    correction: небі, і
    error_type: construction
    explanation: Складносурядне речення без спільного другорядного члена на початку
      потребує коми перед єднальним сполучником.
  - sentence: Вона щиро посміхнулася, і напружена атмосфера в кімнаті миттєво потеплішала.
    error: і
    correction: й
    error_type: word
    explanation: Після слова, яке закінчується на голосний звук («посміхнулася»),
      для кращої милозвучності слід використовувати короткий приголосний сполучник
      «й».
  - sentence: Один стріл, і заєць ліг.
    error: стріл, і
    correction: стріл — і
    error_type: construction
    explanation: Для вираження надзвичайно різкого наслідку або блискавичної зміни
      подій у складносурядному реченні ставиться тире замість коми.
- id: reading-narrative-analysis-focus-on-identifying-and-classifying-10-compound-sentences-within-a-narrative-text-about-lviv
  type: reading
  instruction: Прочитайте текст про подорож до Львова та дайте відповіді на запитання.
  passage: 'Минулої п''ятниці ми вирішили поїхати до Львова, і ця мандрівка виявилася
    просто чудовою.  Зранку ми довго гуляли вузькими вуличками, а гаряче сонце безжально
    пекло згори.  Раптом з-за Високого Замку подув свіжий вітер, і дихати нам стало
    значно приємніше.  Ми могли зробити короткий привал біля кав''ярні, або нам довелося
    б іти до площі Ринок без відпочинку.  Всі ми неймовірно втомилися після складного
    підйому, зате вечірній краєвид навколо був фантастичним.  Або ми негайно знайдемо
    місце для вечері, або всі залишаться дуже голодними.  То яскраве сонце усміхалося
    нам, то холодний дощик рясно поливав мостову.  Увечері місто стихло і всі туристи
    розійшлися по готелях.  Ні сильний дощ не зіпсував нам настрою, ні втома не забрала
    наших вражень.

    '
  questions:
  - Знайдіть у тексті складносурядне речення з протиставним зв'язком, що виражає компенсацію
    за недолік, і назвіть цей сполучник.
  - Чому в реченні «Увечері місто стихло і всі туристи розійшлися по готелях» перед
    єднальним сполучником «і» немає обов'язкової коми?
  - Які саме розділові парні сполучники використані в тексті для вираження постійного
    чергування погодних умов?
  - Який парний єднальний сполучник підкреслює глибоке подвійне заперечення в останньому
    реченні тексту?
  - Поясніть синтаксичну роль протиставного сполучника «а» у реченні про вашу довгу
    прогулянку та гаряче сонце.
  - Який сполучник виражає логічний наслідок у реченні про свіжий вітер з-за Високого
    Замку?
- id: match-up-focus-on-linking-terms-with-their-corresponding-conjunctions-and-rules
  type: match-up
  instruction: З'єднайте граматичні терміни та поняття з їхніми визначеннями.
  pairs:
  - left: Складносурядне речення
    right: Складається з граматично рівноправних та незалежних частин.
  - left: Єднальні сполучники
    right: Виражають одночасність або послідовність подій (і, й, та, ні...ні).
  - left: Протиставні сполучники
    right: Виражають логічне зіставлення або пряме протиріччя (а, але, зате, проте).
  - left: Розділові сполучники
    right: Виражають періодичне чергування або суворе взаємовиключення (або, чи, то...то).
  - left: Спільний другорядний член
    right: Слово на початку речення, яке скасовує кому перед єднальним сполучником.
  - left: Тире у складносурядному реченні
    right: Ставиться замість коми для вираження раптової зміни або несподіваного наслідку.
workbook:
- type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про складносурядні речення.
  items:
  - statement: Частини складносурядного речення завжди структурно залежать одна від
      одної та мають сувору ієрархію.
    correct: false
    explanation: Вони є граматично рівноправними і незалежними. Жодна частина не підпорядковується
      іншій.
  - statement: Перед єднальним сполучником «і» у складносурядному реченні майже завжди
      ставиться кома, за винятком ситуації зі спільним другорядним членом.
    correct: true
    explanation: Наявність спільного другорядного члена на початку речення — це єдиний
      виняток, коли кома не ставиться.
  - statement: Протиставні сполучники «але» та «а» виконують абсолютно однакову функцію
      і можуть завжди вільно замінювати один одного.
    correct: false
    explanation: Сполучник «а» виражає м'яке паралельне зіставлення, тоді як «але»
      вказує на сильне пряме протиріччя або перешкоду.
  - statement: Сполучник «зате» у складносурядному реченні часто вводить своєрідну
      позитивну компенсацію за якийсь недолік у першій частині.
    correct: true
    explanation: 'Наприклад: «Цей старий автомобіль їде досить повільно, зате він
      ніколи не ламається в довгій дорозі».'
  - statement: Будь-яке просте речення з кількома однорідними присудками також вважається
      складносурядним реченням.
    correct: false
    explanation: Просте речення з однорідними членами має лише одну граматичну основу
      (один підмет), а складносурядне — дві або більше.
  - statement: Крапка з комою використовується між частинами складносурядного речення,
      коли вони дуже великі за обсягом або вже містять власні коми всередині.
    correct: true
    explanation: Крапка з комою допомагає краще та зрозуміліше структурувати складний
      і розлогий текст.
