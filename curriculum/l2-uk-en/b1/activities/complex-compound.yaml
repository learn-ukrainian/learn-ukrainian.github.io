- type: essay-response
  prompt: Напишіть 5-8 складносурядних речень про вашу щоденну рутину, використовуючи
    єднальні сполучники (і, й, та, ні...ні, як...так і). Покажіть одночасність або
    послідовність дій.
  min_words: 50
  model_answer: '> [!model-answer]

    > Щоранку я прокидаюся о сьомій годині, і мій кіт одразу починає голосно нявкати.
    Я йду на кухню, і ми разом снідаємо. Потім я швидко збираюся, і мій робочий день
    починається. Ні я не запізнююсь на роботу, ні мої колеги не приходять пізно. Я
    уважно читаю документи, і мій комп''ютер тихо працює. Увечері я повертаюся додому,
    і ми з родиною обговорюємо минулий день.'
