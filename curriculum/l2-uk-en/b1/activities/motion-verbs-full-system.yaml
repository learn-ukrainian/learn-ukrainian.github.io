- type: match-up
  title: "Знайдіть пару: вектор та цикл"
  instruction: "З'єднайте дієслово односпрямованого руху з відповідним дієсловом різноспрямованого руху."
  pairs:
    - left: "йти"
      right: "ходити"
    - left: "їхати"
      right: "їздити"
    - left: "бігти"
      right: "бігати"
    - left: "летіти"
      right: "літати"
    - left: "пливти"
      right: "плавати"
    - left: "нести"
      right: "носити"
    - left: "вести"
      right: "водити"
    - left: "везти"
      right: "возити"
    - left: "лізти"
      right: "лазити"
    - left: "повзти"
      right: "повзати"
    - left: "тягти"
      right: "тягати"
    - left: "брести"
      right: "бродити"
    - left: "котити"
      right: "качати"
    - left: "гнати"
      right: "ганяти"

- type: group-sort
  title: "Класифікація руху"
  instruction: "Розподіліть базові дієслова руху на односпрямовані (вектор) та різноспрямовані (цикл)."
  groups:
    - name: "Односпрямований рух"
      items:
        - "йти"
        - "їхати"
        - "бігти"
        - "летіти"
        - "пливти"
        - "нести"
        - "вести"
        - "везти"
    - name: "Різноспрямований рух"
      items:
        - "ходити"
        - "їздити"
        - "бігати"
        - "літати"
        - "плавати"
        - "носити"
        - "водити"
        - "возити"

- type: fill-in
  title: "Оберіть правильне дієслово"
  instruction: "Доповніть речення правильним дієсловом руху залежно від контексту."
  items:
    - sentence: "Сьогодні вранці я _____ на роботу пішки, бо погода була просто чудова."
      answer: "йшов"
      options: ["йшов", "ходив", "їхав", "їздив"]
      explanation: "Процес руху до мети в минулому (незавершений вектор)."
    - sentence: "Мій колега завжди _____ в офіс на своєму автомобілі."
      answer: "їздить"
      options: ["їде", "їздить", "йде", "ходить"]
      explanation: "Маркер 'завжди' вимагає використання різноспрямованого дієслова."
    - sentence: "Прямо зараз величезна фура _____ зерно до порту Одеси."
      answer: "везе"
      options: ["везе", "возить", "несе", "носить"]
      explanation: "Векторне транспортування товару механічним транспортним засобом."
    - sentence: "Вчора ми _____ в кінотеатр і подивилися новий цікавий фільм."
      answer: "ходили"
      options: ["йшли", "ходили", "їхали", "їздили"]
      explanation: "Завершений цикл у минулому часі (пішли і повернулися) вимагає дієслова 'ходити'."
    - sentence: "Птахи щоосені _____ у теплі краї, рятуючись від холоду."
      answer: "літають"
      options: ["летять", "літають", "їдуть", "їздять"]
      explanation: "Щорічна регулярна дія (цикл)."
    - sentence: "Дивіться, пасажирський літак _____ прямо над нашим будинком!"
      answer: "летить"
      options: ["летить", "літає", "їде", "біжить"]
      explanation: "Односпрямований рух просто зараз."
    - sentence: "Моя бабуся кожного ранку _____ свіже молоко з ринку в руках."
      answer: "носить"
      options: ["несе", "носить", "везе", "возить"]
      explanation: "Регулярна ручна логістика (транспортування людиною)."
    - sentence: "Я дуже поспішаю, тому зараз стрімко _____ на важливу зустріч."
      answer: "біжу"
      options: ["біжу", "бігаю", "йду", "їду"]
      explanation: "Інтенсивний векторний рух ногами просто зараз."
    - sentence: "Маленька дитина обережно _____ по килиму до своїх нових іграшок."
      answer: "повзе"
      options: ["повзе", "повзає", "йде", "ходить"]
      explanation: "Односпрямований рух всім тілом по поверхні."
    - sentence: "Восени старий поет дуже любить самотньо _____ вулицями міста."
      answer: "бродити"
      options: ["бродити", "брести", "йти", "їхати"]
      explanation: "Різноспрямований рух, повільне блукання без конкретної мети."
    - sentence: "Хлопчик дуже сильно _____ футбольний м'яч прямо до чужих воріт."
      answer: "котить"
      options: ["котить", "качає", "несе", "веде"]
      explanation: "Односпрямоване обертання об'єкта круглої форми."
    - sentence: "Сучасні кур'єри компанії щодня _____ тисячі посилок до клієнтів."
      answer: "розвозять"
      options: ["розвозять", "везуть", "їдуть", "йдуть"]
      explanation: "Регулярна циклічна доставка багатьох об'єктів транспортом."

- type: fill-in
  title: "Від події до звички"
  instruction: "Проаналізуйте першу частину речення та змініть односпрямоване дієслово на різноспрямоване у другій частині (створіть звичку)."
  items:
    - sentence: "Сьогодні він їде машиною, хоча зазвичай завжди _____ автобусом."
      answer: "їздить"
      options: ["їздить", "їде", "йде", "ходить"]
    - sentence: "Зараз ми йдемо в кіно, але взагалі ми дуже рідко _____ в театри."
      answer: "ходимо"
      options: ["ходимо", "йдемо", "їздимо", "їдемо"]
    - sentence: "Вона зараз несе цю важку сумку, але зазвичай _____ легкий рюкзак."
      answer: "носить"
      options: ["носить", "несе", "водить", "веде"]
    - sentence: "Птах летить на південь, тому що ці птахи постійно _____ туди восени."
      answer: "літають"
      options: ["літають", "летять", "плавають", "пливуть"]
    - sentence: "Він зараз біжить на свій поїзд, бо він часто _____ зранку для спорту."
      answer: "бігає"
      options: ["бігає", "біжить", "їздить", "їде"]
    - sentence: "Судно зараз пливе в Одесу, ці торгові кораблі постійно _____ цим довгим маршрутом."
      answer: "плавають"
      options: ["плавають", "пливуть", "летять", "літають"]
    - sentence: "Водій зараз везе важливий вантаж, адже він _____ ці товари щодня."
      answer: "возить"
      options: ["возить", "везе", "носить", "несе"]
    - sentence: "Мати зараз веде маленьку дитину в садок, вона _____ її туди кожного ранку."
      answer: "водить"
      options: ["водить", "веде", "носить", "несе"]
    - sentence: "Зараз дитина швидко повзе до мами, діти в цьому віці постійно _____ по підлозі."
      answer: "повзають"
      options: ["повзають", "повзуть", "лазять", "лізуть"]
    - sentence: "Він зараз обережно лізе на високе дерево, він просто обожнює _____ по гілках."
      answer: "лазити"
      options: ["лазити", "лізти", "ходити", "йти"]

- type: true-false
  title: "Правда чи неправда: правила логістики"
  instruction: "Визначте, чи правильне граматичне твердження щодо використання дієслів руху."
  items:
    - statement: "Дієслово 'йти' використовується для опису руху пасажирського транспорту."
      correct: false
      explanation: "Для механічного транспорту ми завжди використовуємо пару їхати/їздити."
    - statement: "Слово-маркер 'завжди' суворо вимагає використання різноспрямованого дієслова."
      correct: true
      explanation: "Завжди вказує на регулярну звичку, тобто замкнений життєвий цикл."
    - statement: "Якщо ви вчора з'їздили в магазин і успішно повернулися, треба сказати 'вчора я їхав у магазин'."
      correct: false
      explanation: "Для повністю завершеного циклу в минулому часі ми кажемо 'я їздив'."
    - statement: "Дієслово 'нести' описує ручну логістику, коли фізичний об'єкт знаходиться у вас в руках."
      correct: true
      explanation: "Це цілеспрямована дія з переміщення предмета пішки."
    - statement: "Векторний рух описується виключно різноспрямованими дієсловами."
      correct: false
      explanation: "Векторний рух (конкретна мета просто зараз) описується односпрямованими дієсловами."
    - statement: "Коли величезний корабель плавно рухається морем, ми використовуємо дієслова 'пливти/плавати'."
      correct: true
      explanation: "Ця пара дієслів чудово описує будь-який рух на відкритій воді."
    - statement: "Прийменник 'в' або 'у' зі Знахідним відмінком часто вказує на кінцевий пункт подорожі."
      correct: true
      explanation: "Ми йдемо 'в університет', чітко відповідаючи на запитання 'куди?'."
    - statement: "Студенти 'ганяють м'яча' означає, що вони рухаються в одному чіткому геометричному напрямку."
      correct: false
      explanation: "Фраза 'ганяти м'яча' передає хаотичний, різноспрямований та дуже емоційний рух."
    - statement: "Сучасні потяги Укрзалізниці 'везуть' наляканих пасажирів, а не 'несуть' їх."
      correct: true
      explanation: "Везти/возити використовується саме для складного транспортування механізмами."
    - statement: "Відомий вираз 'тягти час' використовується в прямому значенні величезної фізичної сили."
      correct: false
      explanation: "Це фігуративний фразеологізм, який означає навмисно уповільнювати хід якихось подій."
    - statement: "Слово 'розвозити' означає ефективне транспортування товару в багато різних місць."
      correct: true
      explanation: "Префікс 'роз-' органічно додає значення поширення в різні сторони від центру."
    - statement: "Коли ви повільно та важко йдете через глибокий сніг, ви використовуєте дієслово 'повзти'."
      correct: false
      explanation: "Рух пішки через складні перешкоди (сніг, вода) описується парою 'брести/бродити'."
    - statement: "Щоб описати загальну професійну навичку водія, ми кажемо 'він добре веде машину'."
      correct: false
      explanation: "Для опису загальної здатності або навички керування ми завжди кажемо 'він добре водить'."
    - statement: "Слово 'фура' часто означає велику вантажівку, яка перевозить товари між містами."
      correct: true
      explanation: "В сучасній українській логістиці це дуже популярне, загальноприйняте слово."

- type: unjumble
  title: "Побудуйте логістичні речення"
  instruction: "Розташуйте перемішані слова у правильному порядку, щоб утворити логічне речення про рух."
  items:
    - words: ["кожного", "ранку", "він", "їздить", "на", "роботу"]
      answer: "кожного ранку він їздить на роботу"
    - words: ["зараз", "я", "йду", "в", "магазин", "пішки"]
      answer: "зараз я йду в магазин пішки"
    - words: ["поїзди", "везуть", "пасажирів", "у", "безпечні", "міста"]
      answer: "поїзди везуть пасажирів у безпечні міста"
    - words: ["вільні", "птахи", "щоосені", "літають", "у", "краї"]
      answer: "вільні птахи щоосені літають у краї"
    - words: ["вона", "завжди", "носить", "важкі", "сумки", "сама"]
      answer: "вона завжди носить важкі сумки сама"
    - words: ["дитина", "швидко", "повзе", "по", "м'якому", "килиму"]
      answer: "дитина швидко повзе по м'якому килиму"
    - words: ["вчора", "ми", "ходили", "у", "великий", "музей"]
      answer: "вчора ми ходили у великий музей"
    - words: ["наш", "час", "летить", "дуже", "швидко", "сьогодні"]
      answer: "наш час летить дуже швидко сьогодні"

- type: error-correction
  title: "Виправте логістичні помилки"
  instruction: "Знайдіть і виправте граматичну помилку у виборі дієслова руху."
  items:
    - sentence: "Вчора я йшов у ресторан і з'їв там дуже смачну піцу."
      error: "йшов"
      answer: "ходив"
      error_type: "word"
      options: ["йшов", "ходив", "їхав", "бігав"]
      explanation: "Для завершеного циклу (пішов і успішно повернувся) в минулому часі ми обов'язково використовуємо різноспрямоване дієслово."
    - sentence: "Мій старший брат часто йде в басейн після важкої роботи."
      error: "йде"
      answer: "ходить"
      error_type: "word"
      options: ["йде", "ходить", "їде", "плаває"]
      explanation: "Слово-маркер 'часто' вказує на регулярну звичку, тому потрібне циклічне дієслово."
    - sentence: "Завтра вранці я йду в інше місто на швидкому поїзді."
      error: "йду"
      answer: "їду"
      error_type: "word"
      options: ["йду", "їду", "ходжу", "літаю"]
      explanation: "Рух за допомогою будь-якого транспорту (поїзда) описується дієсловами їхати/їздити, а не йти/ходити."
    - sentence: "Водій міського автобуса обережно несе пасажирів до центру Києва."
      error: "несе"
      answer: "везе"
      error_type: "word"
      options: ["несе", "везе", "водить", "носить"]
      explanation: "Транспортування людей транспортним засобом — це завжди везти/возити, а не нести в руках."
    - sentence: "Великий пасажирський літак дуже повільно їде високо в небі."
      error: "їде"
      answer: "летить"
      error_type: "word"
      options: ["їде", "летить", "пливе", "біжить"]
      explanation: "Рух високо в повітрі завжди передається дієсловами летіти/літати."
    - sentence: "Вона завжди несе гарну святкову сукню на свій день народження."
      error: "несе"
      answer: "носить"
      error_type: "word"
      options: ["несе", "носить", "везе", "одягає"]
      explanation: "У значенні 'бути одягненим у річ' завжди використовується дієслово носити."
    - sentence: "Прямо зараз я обережно їжджу на своїй машині прямо додому."
      error: "їжджу"
      answer: "їду"
      error_type: "word"
      options: ["їжджу", "їду", "йду", "ходжу"]
      explanation: "Векторний процес, що відбувається прямо зараз, завжди потребує односпрямованого дієслова."
    - sentence: "Величезне торгове судно дуже повільно плаває морем до порту просто зараз."
      error: "плаває"
      answer: "пливе"
      error_type: "word"
      options: ["плаває", "пливе", "їде", "йде"]
      explanation: "Односпрямований актуальний рух корабля до конкретної мети — це виключно пливти."

- type: quiz
  title: "Перевірка правил системи"
  instruction: "Дайте правильну відповідь на запитання щодо філософії використання дієслів руху."
  items:
    - question: "Яке дієслово ідеально описує цілеспрямований рух пішки прямо зараз?"
      options:
        - text: "ходити"
          correct: false
        - text: "йти"
          correct: true
        - text: "їхати"
          correct: false
        - text: "їздити"
          correct: false
      explanation: "Йти — це класичний односпрямований вектор для руху власними ногами."
    - question: "Яке дієслово слід обов'язково використати для перевезення речей у багажнику машини?"
      options:
        - text: "нести"
          correct: false
        - text: "носити"
          correct: false
        - text: "везти"
          correct: true
        - text: "вести"
          correct: false
      explanation: "Везти дуже точно описує транспортну логістику (рух об'єктів за допомогою механізмів)."
    - question: "Яка саме пара дієслів традиційно використовується для опису польоту диких птахів?"
      options:
        - text: "летіти / літати"
          correct: true
        - text: "пливти / плавати"
          correct: false
        - text: "бігти / бігати"
          correct: false
        - text: "гнати / ганяти"
          correct: false
      explanation: "Летіти/літати завжди описує рух високо в повітряному просторі."
    - question: "Яке з цих слів є яскравим маркером регулярної звички (вимагає різноспрямованого руху)?"
      options:
        - text: "зараз"
          correct: false
        - text: "сьогодні"
          correct: false
        - text: "щодня"
          correct: true
        - text: "завтра"
          correct: false
      explanation: "Щодня вказує на повторювану в часі дію, тобто формує замкнений цикл."
    - question: "Як граматично правильно сказати про повністю завершений візит у далекому минулому часі?"
      options:
        - text: "Вчора ввечері я йшов у парк."
          correct: false
        - text: "Вчора ввечері я ходив у парк."
          correct: true
        - text: "Вчора ввечері я їхав у парк пішки."
          correct: false
        - text: "Вчора ввечері я біг у парк."
          correct: false
      explanation: "Для абсолютно завершеного циклу ми використовуємо виключно різноспрямоване дієслово (ходив)."
    - question: "Що точно означає дуже популярний фразеологізм «тягти час» в українській мові?"
      options:
        - text: "Рухатися надзвичайно швидко вперед"
          correct: false
        - text: "Навмисно та свідомо уповільнювати події"
          correct: true
        - text: "Піднімати дуже важкі речі в залі"
          correct: false
        - text: "Постійно бігати по великому колу"
