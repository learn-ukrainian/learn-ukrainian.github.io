version: '1.0'
module: aspect-in-conditionals
level: b1
inline:
- id: quiz-real-vs-unreal
  type: quiz
  instruction: Оберіть правильну комбінацію сполучника та дієслова.
  items:
  - question: _____ ми сьогодні _____ цей проєкт, завтра будемо відпочивати.
    options:
    - Якщо / закінчимо
    - Якби / закінчили
    - Якщо / будемо закінчувати
    - Якби / закінчували
    correct: 0
  - question: _____ я _____ багато грошей учора, я б зараз купив великий будинок.
    options:
    - Якби / виграв
    - Якщо / виграю
    - Якби / виграю
    - Якщо / виграв
    correct: 0
  - question: _____ ти щодня _____ цю книгу, ти швидко її прочитаєш.
    options:
    - Якщо / читатимеш
    - Якби / читав
    - Якщо / прочитаєш
    - Якби / прочитав
    correct: 0
  - question: Я б із задоволенням подорожував цілим світом, _____ у мене _____ більше
      вільного часу.
    options:
    - якби / було
    - якщо / буде
    - як би / було
    - якщо / було
    correct: 0
  - question: _____ вона _____ йому вчора, він би обов'язково прийшов.
    options:
    - Якби / зателефонувала
    - Якщо / зателефонує
    - Якби / телефонує
    - Якщо / телефонувала
    correct: 0
  - question: Ми точно підемо гуляти в парк, _____ ти вчасно _____ свою роботу.
    options:
    - якщо / завершиш
    - якби / завершив
    - якщо / будеш завершувати
    - якби / завершуєш
    correct: 0
  - question: _____ він _____ таку гіпотетичну можливість, він би ніколи не відмовився.
    options:
    - Якби / мав
    - Якщо / матиме
    - Якби / матиме
    - Якщо / мав
    correct: 0
  - question: _____ я раптом _____ новим президентом, я б змінив цей закон.
    options:
    - Якби / став
    - Якщо / стану
    - Якби / стану
    - Якщо / ставав
    correct: 0
  - question: _____ ми _____ дешеві квитки сьогодні ввечері, ми обов'язково полетимо
      на море.
    options:
    - Якщо / знайдемо
    - Якби / знайшли
    - Якщо / будемо шукати
    - Якби / знайдемо
    correct: 0
  - question: _____ ти _____ мене по-справжньому, ти б так жахливо ніколи не робив.
    options:
    - Якби / кохав
    - Якщо / кохаєш
    - Якби / кохаєш
    - Якщо / кохав
    correct: 0
- id: fill-in-real-conditionals
  type: fill-in
  instruction: Вставте правильну форму дієслова.
  items:
  - sentence: Якщо ми ввечері _____ дешеві квитки, ми обов'язково поїдемо в Карпати.
    answer: знайдемо
    options:
    - знайдемо
    - знайшли б
    - шукатимемо
  - sentence: Якби Богдан мав вільний час, він би із задоволенням _____ усім світом.
    answer: подорожував
    options:
    - подорожував
    - буде подорожувати
    - подорожує
  - sentence: Якщо ти постійно і багато працюватимеш без вихідних, ти дуже швидко
      _____.
    answer: втомишся
    options:
    - втомишся
    - втомився б
    - втомлюватимешся
  - sentence: Якби я був справжнім мільйонером, я обов'язково _____ великий розкішний
      літак.
    answer: купив би
    options:
    - купив би
    - куплю
    - купуватиму
  - sentence: Якщо вона успішно і вчасно _____ цей проєкт, вона гарантовано отримає
      велику премію.
    answer: закінчить
    options:
    - закінчить
    - закінчила б
    - закінчує
  - sentence: Якби ти вчора уважно прочитав ці правила, ти _____ цю жахливу помилку
      сьогодні.
    answer: не зробив би
    options:
    - не зробив би
    - не зробиш
    - не робитимеш
  - sentence: Якщо він і далі постійно запізнюватиметься на зустрічі, його точно _____.
    answer: звільнять
    options:
    - звільнять
    - звільнили б
    - звільняють
  - sentence: Якби я напевне знав цю страшну правду, я б тобі обов'язково _____.
    answer: сказав
    options:
    - сказав
    - скажу
    - казатиму
- id: sort-aspect-unreal
  type: group-sort
  instruction: Розподіліть речення за типом умови.
  groups:
  - label: Реальна умова (можливо)
    items:
    - Якщо ми знайдемо квитки, поїдемо в Карпати.
    - Якщо ти постійно працюватимеш, ти швидко втомишся.
    - Якщо переїдеш до Львова, питимеш каву щодня.
    - Якщо ти напишеш звіт, я його негайно відправлю.
    - Якщо читатимеш новини, помітно поліпшиш вимову.
  - label: Нереальна умова (гіпотетично)
    items:
    - Якби ми були мільйонерами, купили б літак.
    - Якби я виграв у лотерею, я б купив великий дім.
    - Якби я вмів малювати, я б цілими днями створював картини.
    - Якби ти зателефонував вчора, я б обов'язково прийшов.
    - Якби я мав великі крила, я б полетів на південь.
- id: matching-scenarios
  type: match-up
  instruction: З'єднайте частини умовних речень.
  pairs:
  - left: Якщо ти уважно прочитаєш текст,
    right: ти відразу зрозумієш це нове правило.
  - left: Якби я раптом виграв мільйон,
    right: я б одразу купив новий будинок.
  - left: Якщо він щодня тренуватиметься,
    right: він дуже швидко схудне.
  - left: Якби ти вчасно зателефонував учора,
    right: я б обов'язково прийшов на ту зустріч.
  - left: Якщо ми сьогодні закінчимо цей проєкт,
    right: завтра ми всі будемо відпочивати.
  - left: Якби я вмів гарно малювати,
    right: я б цілими днями створював картини.
  - left: Якщо ти напишеш цей лист зараз,
    right: я його негайно відправлю клієнту.
  - left: Якби я жив біля теплого моря,
    right: я б щодня радісно плавав у хвилях.
workbook:
- type: match-up
  instruction: З'єднайте дієслова недоконаного та доконаного виду (утворіть видові
    пари).
  pairs:
  - left: вміти
    right: змогти
  - left: уявляти
    right: уявити
  - left: вигравати
    right: виграти
  - left: читати
    right: прочитати
  - left: писати
    right: написати
  - left: дзвонити
    right: зателефонувати
  - left: купувати
    right: купити
  - left: зустрічати
    right: зустріти
- type: essay-response
  prompt: Напишіть 4 речення про ваші реальні плани (використайте «якщо») та 4 речення
    про ваші мрії або гіпотетичні ситуації (використайте «якби»). Для кожного речення
    коротко поясніть, чому ви обрали доконаний чи недоконаний вид дієслова.
  min_words: 50
  model_answer: 1. Якщо я завтра успішно здам іспит, я піду святкувати з друзями (доконаний
    вид — швидкий результат). 2. Якщо я буду читати українською щодня, я швидко поліпшу
    свою вимову (недоконаний вид як тривала умова, доконаний як наслідок). 3. Якщо
    буде гарна погода, ми обов'язково поїдемо в Карпати. 4. Якщо я знайду вільний
    час, я допоможу тобі. 5. Якби я мав більше вільного часу, я б із задоволенням
    читав книжки щовечора (недоконаний вид — постійний процес і стан). 6. Якби я раптом
    виграв у лотерею мільйон, я б миттєво купив новий автомобіль (доконаний вид —
    конкретна подія в уявній ситуації). 7. Якби я народився видатним художником, я
    б створював шедеври. 8. Якби ти вчора зателефонував, я б обов'язково прийшов.
