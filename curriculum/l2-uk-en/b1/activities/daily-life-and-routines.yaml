version: '1.0'
module: daily-life-and-routines
level: b1
inline:
- id: daily-routine-fill-in
  type: fill-in
  instruction: Заповніть пропуски в тексті про розпорядок дня, обираючи правильні
    форми дієслів.
  items:
  - sentence: Щоранку мій будильник дзвонить о сьомій, і я повільно _____.
    answer: прокидаюся
    options:
    - прокидаюся
    - підводиться
    - вмивається
  - sentence: Після цього я йду у ванну кімнату і ретельно _____ холодною водою.
    answer: вмиваюся
    options:
    - вмиваюся
    - мию
    - миється
  - sentence: Я зазвичай _____ гарячою вівсянкою та п'ю каву.
    answer: снідаю
    options:
    - снідаю
    - снідає
    - поснідав
  - sentence: Завтра я маю важливу зустріч, тому я _____ набагато раніше.
    answer: поснідаю
    options:
    - поснідаю
    - снідаю
    - снідав
  - sentence: О восьмій годині я виходжу з дому, щоб вчасно _____ на роботу.
    answer: приїхати
    options:
    - приїхати
    - поїхати
    - їхати
  - sentence: Я ніколи не люблю _____ на зустрічі з колегами.
    answer: запізнюватися
    options:
    - запізнюватися
    - запізнитися
    - відкладати
- id: household-chores-match
  type: match-up
  instruction: З'єднайте хатні справи з їхнім правильним описом.
  pairs:
  - left: витирати пил
    right: прибирати бруд з поверхні меблів
  - left: пилососити килим
    right: чистити підлогу за допомогою пилососа
  - left: прати білизну
    right: робити брудний одяг чистим за допомогою води
  - left: помити посуд
    right: зробити чистими тарілки та чашки після їжі
  - left: виносити сміття
    right: викидати непотрібні речі з дому
  - left: прасувати одяг
    right: робити сорочки рівними гарячою праскою
- id: quiz-grammar-choice
  type: quiz
  instruction: Оберіть правильну граматичну форму (наказовий спосіб, пасивний стан
    або умовний спосіб) для кожної ситуації.
  items:
  - question: Вечерю вже _____, сідайте за стіл.
    options:
    - приготовлено
    - приготував
    - приготована
    - готує
    correct: 0
  - question: _____ мені, будь ласка, з цим фінансовим звітом.
    options:
    - Допоможіть
    - Допоможете
    - Допомагати
    - Допоміг би
    correct: 0
  - question: Якщо я матиму вільний час, я _____ цікаву книгу.
    options:
    - почитаю
    - читав би
    - читаю
    - почитати
    correct: 0
  - question: Увесь мій чистий одяг акуратно _____.
    options:
    - випрано
    - виправ
    - випраний
    - пре
    correct: 0
  - question: _____ сьогодні ввечері в затишному кафе!
    options:
    - Давайте зустрінемося
    - Зустрінемось би
    - Зустрілися
    - Зустрічатися
    correct: 0
  - question: Якби я не забув ключі, я _____ додому набагато швидше.
    options:
    - повернувся б
    - повернуся
    - повертаюся
    - повернувся
    correct: 0
workbook:
- type: fill-in
  instruction: Доповніть речення правильними дієсловами, щоб описати свій робочий
    день та відпочинок.
  items:
  - sentence: Моя сестра дуже любить довго _____ перед великим дзеркалом.
    answer: зачісуватися
    options:
    - зачісуватися
    - одягатися
    - вмиватися
  - sentence: Якщо я прокидаюся дуже пізно, мені доводиться сильно _____.
    answer: поспішати
    options:
    - поспішати
    - запізнюватися
    - встигати
  - sentence: Коли ми приходимо в офіс, ми одразу починаємо _____ нові проєкти.
    answer: обговорювати
    options:
    - обговорювати
    - відкладати
    - допрацьовувати
  - sentence: Ввечері мені часто доводиться _____ свої найважливіші завдання.
    answer: допрацьовувати
    options:
    - допрацьовувати
    - розважатися
    - мандрувати
  - sentence: Моя здібна колега швидко _____ цікавий фінансовий звіт.
    answer: підготувала
    options:
    - підготувала
    - перевіряла
    - готувала
  - sentence: Вдома на вихідних я нарешті можу розслабитися і просто _____.
    answer: відпочивати
    options:
    - відпочивати
    - відпочиватися
    - займатися
- type: match-up
  instruction: З'єднайте щоденні активності та хобі з їхнім значенням.
  pairs:
  - left: готувати їжу
    right: робити смачний сніданок, обід або вечерю
  - left: прибирати в кімнаті
    right: наводити загальний лад у своєму домі
  - left: займатися спортом
    right: робити фізичні вправи для здоров'я
  - left: мандрувати містом
    right: довго гуляти новими та цікавими вулицями
  - left: вирощувати квіти
    right: доглядати за красивими рослинами на балконі
  - left: писати звіт
    right: робити офіційний документ про результати роботи
- type: error-correction
  instruction: Виправте помилки у використанні відмінків та віддієслівних іменників.
  items:
  - sentence: Я їду на роботу на автобусі.
    error: на автобусі
    correction: автобусом
    error_type: phrase
    options:
    - автобусом
    - в автобусі
    - на автобус
    explanation: 'Для позначення транспорту природніше використовувати Орудний відмінок
      без прийменника: їду автобусом.'
  - sentence: Я маю багато хатніх справів.
    error: справів
    correction: справ
    error_type: word
    options:
    - справ
    - справи
    - справах
    explanation: Родовий відмінок множини від слова «справа» — «справ».
  - sentence: Ми завжди обговорюємо про нові проєкти.
    error: про нові проєкти
    correction: нові проєкти
    error_type: phrase
    options:
    - нові проєкти
    - нових проєктів
    - новим проєктам
    explanation: Дієслово «обговорювати» вимагає Знахідного відмінка без прийменника
      (обговорювати що?).
  - sentence: Мій колега запізнив на важливу співбесіду.
    error: запізнив
    correction: запізнився
    error_type: word
    options:
    - запізнився
    - запізнював
    - запізнилися
    explanation: Дієслово «запізнюватися/запізнитися» є зворотним і вимагає частки
      -ся.
  - sentence: Моє улюблене заняття — це малювати картин.
    error: малювати
    correction: малювання
    error_type: word
    options:
    - малювання
    - малюнок
    - малюю
    explanation: Для офіційнішого опису інтересу або процесу краще використовувати
      віддієслівний іменник «малювання».
  - sentence: Вона приїхала до офісу у восьмій годині.
    error: у восьмій годині
    correction: о восьмій годині
    error_type: phrase
    options:
    - о восьмій годині
    - в вісім годин
    - на восьму годину
    explanation: Для позначення точного часу в українській мові використовується прийменник
      «о/об» та Місцевий відмінок.
