- id: quiz-grammar-choice
  type: quiz
  instruction: Оберіть правильний граматичний варіант (умовний спосіб, наказовий спосіб,
    пасивний стан)
  items:
  - question: _____ мені, будь ласка, з цим складним звітом.
    options:
    - Допоможіть
    - Допомагати
    - Допоміг би
    - Допоможете
    correct: 0
  - question: 'Я нарешті закінчив роботу: увесь посуд успішно _____.'
    options:
    - помито
    - помив
    - помити
    - мити
    correct: 0
  - question: На вашому місці я _____ щоранку раніше.
    options:
    - прокидався б
    - прокидаюсь
    - прокидайся
    - буду прокидатися
    correct: 0
  - question: Шановні колеги, _____ нашу зустріч рівно о дев'ятій!
    options:
    - давайте почнемо
    - починати
    - почали б
    - починаємо
    correct: 0
  - question: Уся брудна білизна вже _____ та акуратно лежить у шафі.
    options:
    - випрано
    - прасувати
    - виправ
    - прати
    correct: 0
  - question: _____ більше вільного часу, я б обов'язково пішов у спортзал.
    options:
    - Якби я мав
    - Якщо я маю
    - Щоб я мав
    - Коли я матиму
    correct: 0
workbook:
- type: fill-in
  instruction: Утворіть правильну форму слова (віддієслівний іменник або префіксальне
    дієслово)
  items:
  - sentence: _____ мого домашнього завдання забирає багато часу.
    answer: Виконання
    options:
    - Виконання
    - Виконувати
    - Виконане
  - sentence: Моє улюблене заняття у вихідні — це _____ книжок.
    answer: читання
    options:
    - читання
    - читати
    - прочитати
  - sentence: Завтра я обов'язково _____ на роботу рівно о дев'ятій.
    answer: приїду
    options:
    - приїду
    - їду
    - поїхав
  - sentence: Нам треба _____ ці документи, щоб виправити помилки.
    answer: перевірити
    options:
    - перевірити
    - вірити
    - завірити
  - sentence: _____ нових іноземних мов — це дуже корисне хобі.
    answer: Вивчення
    options:
    - Вивчення
    - Вивчати
    - Вивчено
  - sentence: Ми завжди детально _____ всі важливі проблеми з керівником.
    answer: обговорюємо
    options:
    - обговорюємо
    - говоримо
    - договоримо
- type: group-sort
  instruction: Розподіліть дієслова за видом (доконаний чи недоконаний)
  groups:
  - label: Недоконаний вид (Imperfective)
    items:
    - прибирати
    - снідати
    - витирати
    - прати
  - label: Доконаний вид (Perfective)
    items:
    - прибрати
    - поснідати
    - витерти
    - випрати
- type: true-false
  instruction: Правда чи ні? Визначте, чи правильні ці твердження про щоденне життя
  items:
  - statement: Дієслово «відпочивати» завжди має зворотну частку «-ся».
    correct: false
    explanation: Дієслово «відпочивати» ніколи не буває зворотним.
  - statement: Російське слово «стирати» щодо одягу є калькою, правильно казати «прати
      білизну».
    correct: true
    explanation: Слово «стирати» можна використовувати для гумки, але одяг ми «перемо».
  - statement: Слово «вихідні» в українській мові використовується тільки у формі
      множини.
    correct: true
    explanation: Ми кажемо «довгі вихідні», це слово має лише форму множини (pluralia
      tantum).
  - statement: Для регулярних, щоденних звичок ми завжди використовуємо доконаний
      вид дієслова.
    correct: false
    explanation: Для постійних звичок і рутини використовується недоконаний вид.
  - statement: 'Слово «метро» змінюється за відмінками: «я їду метром».'
    correct: false
    explanation: 'Слово «метро» є незмінюваним: «я їду метро».'
  - statement: Конструкція з «якби... б» використовується для реальних планів на майбутнє.
    correct: false
    explanation: Вона використовується виключно для нереальних, гіпотетичних ситуацій.
- type: translate
  instruction: Оберіть правильний український переклад для кожної англійської фрази
  items:
  - source: I am vacuuming the floor.
    options:
    - text: Я пилосошу підлогу.
      correct: true
    - text: Я пилесошу підлогу.
      correct: false
    - text: Я мию підлогу.
      correct: false
    - text: Я витираю пил.
      correct: false
  - source: Let's meet at seven.
    options:
    - text: Давайте зустрінемося о сьомій.
      correct: true
    - text: Зустрічаємося сьомої.
      correct: false
    - text: Хай ми зустрінемося о сьомій.
      correct: false
    - text: Зустрітися о сьомій.
      correct: false
  - source: The dishes are washed.
    options:
    - text: Посуд помито.
      correct: true
    - text: Посуд мити.
      correct: false
    - text: Посуд миють.
      correct: false
    - text: Посуд миється.
      correct: false
  - source: If I had time, I would travel.
    options:
    - text: Якби я мав час, я б мандрував.
      correct: true
    - text: Якщо я маю час, я мандрую.
      correct: false
    - text: Щоб я мав час, я мандрував би.
      correct: false
    - text: Коли я матиму час, я мандруватиму.
      correct: false
  - source: I take the bus to work.
    options:
    - text: Я їду на роботу автобусом.
      correct: true
    - text: Я їду на роботу на автобусі.
      correct: false
    - text: Я йду на роботу автобусом.
      correct: false
    - text: Я мандрую на роботу автобус.
      correct: false
  - source: Job search
    options:
    - text: Пошук роботи
      correct: true
    - text: Шукати роботу
      correct: false
    - text: Робоче місце
      correct: false
    - text: Співбесіда
      correct: false
- type: order
  instruction: Розставте репліки діалогу в правильному порядку
  items:
  - — Привіт! Що ти плануєш робити на ці вихідні?
  - — Якщо буде гарна погода, я поїду за місто. А ти?
  - — Я ще не вирішив. Якби я мав компанію, пішов би в кіно.
  - — Тоді ходімо разом у суботу ввечері!
  - — Чудова ідея! Давайте зустрінемося о шостій біля метро.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
