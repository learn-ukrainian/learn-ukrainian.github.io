version: '1.0'
module: daily-life-and-routines
level: b1
inline:
- id: fill-in-routine-verbs-complete-a-daily-routine-text-with-correct-reflexive-and-prefixed-verb-forms
  type: fill-in
  instruction: Вставте правильну форму дієслова за контекстом (звертайте увагу на
    зворотні частки, вид та префікси).
  items:
  - sentence: Зазвичай я ________ дуже рано, о шостій ранку.
    answer: прокидаюся
    options:
    - прокидаюся
    - прокидаю
    - прокинуся
  - sentence: Я йду у ванну кімнату і ________ прохолодною водою.
    answer: вмиваюся
    options:
    - вмиваюся
    - вмиваю
    - вмиється
  - sentence: Потім я одягаюся і ________ перед дзеркалом.
    answer: зачісуюся
    options:
    - зачісуюся
    - зачісую
    - зачішуся
  - sentence: Я завжди збираюся швидко, тому ніколи не ________ на роботу.
    answer: запізнююся
    options:
    - запізнююся
    - запізнюся
    - запізнюю
  - sentence: Якщо я ________ встати раніше, ми встигнемо разом поснідати.
    answer: встану
    options:
    - встану
    - встаю
    - вставатиму
  - sentence: Коли я нарешті ________ на роботу, мій робочий день починається активно.
    answer: приїжджаю
    options:
    - приїжджаю
    - приїду
    - заїжджаю
  - sentence: Спочатку я ________ в офіс і вітаюся з усіма колегами.
    answer: заходжу
    options:
    - заходжу
    - приходжу
    - виходжу
  - sentence: Я вмикаю комп'ютер і ретельно ________ електронну пошту.
    answer: перевіряю
    options:
    - перевіряю
    - перевірю
    - вивіряю
  - sentence: Потім ми з колегами ________ наш план на день з усіх боків.
    answer: обговорюємо
    options:
    - обговорюємо
    - наговорюємо
    - договорюємо
  - sentence: Увечері я часто ________ важливі документи, щоб завершити всі завдання.
    answer: допрацьовую
    options:
    - допрацьовую
    - відпрацьовую
    - перепрацьовую
  - sentence: У вихідні я люблю просто ________ у парку після важкого тижня.
    answer: відпочивати
    options:
    - відпочивати
    - відпочиватися
    - відпочити
  - sentence: Якщо я хочу ________, я йду в кіно з друзями.
    answer: розважатися
    options:
    - розважатися
    - розважати
    - розважуватися
  title: Вставте правильну форму дієслова за контекстом (звертайте увагу на зворотні
    част
- id: match-up-chores
  type: match-up
  instruction: З'єднайте хатні справи та інші дії з їхнім значенням.
  pairs:
  - left: мити посуд
    right: робити тарілки чистими після сніданку
  - left: витирати пил
    right: прибирати бруд з меблів у кімнаті
  - left: пилососити
    right: чистити підлогу за допомогою спеціальної техніки
  - left: прати білизну
    right: робити одяг чистим у пральній машині
  - left: прасувати
    right: робити сухий одяг рівним і красивим
  - left: виносити сміття
    right: забирати непотрібні відходи з квартири
  - left: готувати їжу
    right: робити бутерброди або варити гарячу кашу
  - left: прибирати
    right: робити всю свою кімнату чистою
  - left: кататися на велосипеді
    right: їздити двоколісним транспортом у парку
  - left: розважатися
    right: весело проводити вільний час із друзями
  - left: відпочивати
    right: розслаблятися вдома після довгого робочого дня
  - left: планувати час
    right: складати розпорядок дня, щоб усе встигати
  title: З'єднайте хатні справи та інші дії з їхнім значенням.
- id: quiz-grammar-choice
  type: quiz
  instruction: Оберіть правильну граматичну структуру для кожної щоденної ситуації.
  items:
  - question: Як правильно сказати про завершену дію, наголошуючи на результаті?
    options:
    - Усю квартиру прибрано до свята.
    - Уся квартира прибирається до свята.
    - Уся квартира прибирала до свята.
    - Усю квартиру прибрати до свята.
    correct: 0
  - question: 'Виберіть правильний варіант умовного речення (нереальна умова):'
    options:
    - Якби я мав час, я б пішов з вами в кіно.
    - Якщо я маю час, я б пішов з вами в кіно.
    - Якби я маю час, я піду з вами в кіно.
    - Якщо я буду мати час, я б пішов з вами в кіно.
    correct: 0
  - question: Як ввічливо попросити колегу про допомогу зі звітом?
    options:
    - Чи не могли б ви допомогти мені зі звітом?
    - Чи не можете б ви допомогти мені зі звітом?
    - Чи можете ви допомогти би мені зі звітом?
    - Чи не могли ви допоможете мені зі звітом?
    correct: 0
  - question: Як правильно запропонувати друзям піти кудись разом?
    options:
    - Ходімо сьогодні ввечері на виставку!
    - Пішли би сьогодні ввечері на виставку!
    - Йдемо сьогодні ввечері на виставку!
    - Піти сьогодні ввечері на виставку!
    correct: 0
  - question: 'Оберіть правильне використання віддієслівного іменника:'
    options:
    - Виконання домашнього завдання займає багато часу.
    - Виконувати домашнього завдання займає багато часу.
    - Виконане домашнього завдання займає багато часу.
    - Виконати домашнього завдання займає багато часу.
    correct: 0
  - question: Яка фраза правильно описує спосіб пересування транспортом?
    options:
    - Щодня я їду на роботу швидкісним трамваєм.
    - Щодня я їду на роботу на швидкісному трамваї.
    - Щодня я їду на роботу у швидкісному трамваї.
    - Щодня я їду на роботу з швидкісним трамваєм.
    correct: 0
  - question: Як правильно передати наказ або побажання для третьої особи?
    options:
    - Нехай Марко сьогодні пропилососить у вітальні.
    - Давай Марко сьогодні пропилососить у вітальні.
    - Щоб Марко сьогодні пропилососив у вітальні.
    - Хотів би Марко сьогодні пропилососити у вітальні.
    correct: 0
  - question: 'Оберіть правильний префікс для дієслова «досягти місця транспортом»:'
    options:
    - Коли я приїжджаю на роботу, я вітаюся з колегами.
    - Коли я заїжджаю на роботу, я вітаюся з колегами.
    - Коли я виїжджаю на роботу, я вітаюся з колегами.
    - Коли я переїжджаю на роботу, я вітаюся з колегами.
    correct: 0
  - question: Яке дієслово вказує на регулярну, повторювану ранкову дію?
    options:
    - Зазвичай я прокидаюся о шостій ранку.
    - Зазвичай я прокинуся о шостій ранку.
    - Зазвичай я прокидався б о шостій ранку.
    - Зазвичай я прокидаюсь би о шостій ранку.
    correct: 0
  - question: Як правильно перекласти заклик «Let's meet» українською?
    options:
    - Давайте зустрінемося о шостій.
    - Давайте зустрічаємося о шостій.
    - Давайте зустрічатимемося о шостій.
    - Нехай зустрінемося о шостій.
    correct: 0
  - question: Що означає префікс «пере-» у слові «перевіряти» пошту?
    options:
    - Ретельний перегляд або повторне виконання дії.
    - Завершення дії до абсолютного кінця.
    - Дія, яка охоплює предмет з усіх боків.
    - Рух усередину приміщення.
    correct: 0
  - question: 'Оберіть правильну форму для надання поради другові:'
    options:
    - На вашому місці я б складав план на день.
    - На вашому місці я складу план на день.
    - На вашому місці я склав план на день.
    - На вашому місці я би складаю план на день.
    correct: 0
  title: Оберіть правильну граматичну структуру для кожної щоденної ситуації.
workbook:
- id: workbook-group-sort-aspect
  type: group-sort
  instruction: Розподіліть дієслова щоденної рутини за видом.
  groups:
  - label: Недоконаний вид (процес / регулярна дія)
    items:
    - прибирати
    - прати
    - готувати
    - снідати
    - читати
    - розважатися
  - label: Доконаний вид (результат / завершена дія)
    items:
    - прибрати
    - випрати
    - приготувати
    - поснідати
    - прочитати
    - розважитися
  title: Розподіліть дієслова щоденної рутини за видом.
- id: workbook-fill-in-possession
  type: fill-in
  instruction: Вставте правильний займенник у конструкцію володіння, щоб розповісти
    про обов'язки.
  items:
  - sentence: У ____ є багато хатніх справ на вихідних.
    answer: мене
    options:
    - мене
    - мені
    - я
  - sentence: Чи є у ____ час допомогти мені зі звітом?
    answer: вас
    options:
    - вас
    - вам
    - ви
  - sentence: У ____ завжди ідеально чисте робоче місце.
    answer: нього
    options:
    - нього
    - його
    - йому
  - sentence: Сьогодні у ____ важлива співбесіда.
    answer: неї
    options:
    - неї
    - її
    - ній
  - sentence: У ____ немає часу на розваги в будні дні.
    answer: нас
    options:
    - нас
    - нам
    - ми
  - sentence: У ____ зламався новий пилосос.
    answer: них
    options:
    - них
    - їх
    - їм
  title: Вставте правильний займенник у конструкцію володіння, щоб розповісти про
    обов'яз
- id: workbook-translate-phrases
  type: translate
  instruction: Оберіть правильний український переклад для цих корисних фраз.
  items:
  - source: Let's meet at six.
    options:
    - text: Давайте зустрінемося о шостій.
      correct: true
    - text: Давай зустрічаємося о шостій.
      correct: false
  - source: Could you help me?
    options:
    - text: Чи не могли б ви допомогти мені?
      correct: true
    - text: Чи ви можете допомогти мені?
      correct: false
  - source: I am going to work by tram.
    options:
    - text: Я їду на роботу трамваєм.
      correct: true
    - text: Я їду на роботу на трамваї.
      correct: false
  - source: If I finish early, I will help you.
    options:
    - text: Якщо я закінчу раніше, я допоможу вам.
      correct: true
    - text: Якби я закінчив раніше, я б допоміг вам.
      correct: false
  - source: Let Marko vacuum the living room.
    options:
    - text: Нехай Марко пропилососить у вітальні.
      correct: true
    - text: Давай Марко пропилососить у вітальні.
      correct: false
  - source: In your place, I would make a schedule.
    options:
    - text: На вашому місці я б складав розклад.
      correct: true
    - text: На вашому місці я складаю розклад.
      correct: false
  title: Оберіть правильний український переклад для цих корисних фраз.
- id: workbook-match-up-prefixes
  type: match-up
  instruction: З'єднайте дієслово з префіксом та його точне значення.
  pairs:
  - left: приїжджати
    right: успішно досягати місця призначення транспортом
  - left: заходити
    right: перетинати поріг кімнати або будівлі пішки
  - left: перевіряти
    right: ретельно і уважно щось переглядати
  - left: обговорювати
    right: розглядати тему або план з усіх боків
  - left: допрацьовувати
    right: доводити робоче завдання до абсолютного завершення
  - left: вмивати(ся)
    right: очищати обличчя прохолодною водою
  title: З'єднайте дієслово з префіксом та його точне значення.
