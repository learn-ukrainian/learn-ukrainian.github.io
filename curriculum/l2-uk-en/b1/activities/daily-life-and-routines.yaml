- type: group-sort
  instruction: Розподіліть дієслова за видами (недоконаний чи доконаний).
  groups:
  - label: Недоконаний вид (регулярна дія)
    items:
    - снідати
    - прибирати
    - витирати
    - прати
    - готувати
  - label: Доконаний вид (результат/одноразова дія)
    items:
    - поснідати
    - прибрати
    - витерти
    - випрати
    - приготувати
- type: match-up
  instruction: З'єднайте видові пари дієслів (недоконаний — доконаний).
  pairs:
  - left: снідати
    right: поснідати
  - left: прибирати
    right: прибрати
  - left: готувати
    right: приготувати
  - left: прати
    right: випрати
  - left: робити
    right: зробити
  - left: мити
    right: помити
