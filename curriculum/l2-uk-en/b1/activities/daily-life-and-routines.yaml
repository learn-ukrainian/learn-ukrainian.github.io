version: '1.0'
module: daily-life-and-routines
level: b1
inline:
- id: daily-routine-fill-in
  type: fill-in
  instruction: Вставте правильну форму дієслова, щоб описати ранкову рутину
  items:
  - sentence: О сьомій годині дзвонить будильник, і я _____.
    answer: прокидаюся
    options:
    - прокидаюся
    - прокидаю
    - відпочиваю
  - sentence: Я йду до ванної кімнати та _____ холодною водою.
    answer: вмиваюся
    options:
    - вмиваюся
    - мию
    - вмиваю
  - sentence: Перед великим дзеркалом я обов'язково _____.
    answer: зачісуюся
    options:
    - зачісуюся
    - зачісую
    - мандрую
  - sentence: Зазвичай я _____ теплою вівсяною кашею з ягодами.
    answer: снідаю
    options:
    - снідаю
    - поснідаю
    - вечеряю
  - sentence: Після сніданку я швидко _____ на роботу.
    answer: збираюся
    options:
    - збираюся
    - збираю
    - поспішаюся
  - sentence: Я дуже не люблю _____ на важливі зустрічі.
    answer: запізнюватися
    options:
    - запізнюватися
    - запізнювати
    - відкладати
- id: household-chores-match
  type: match-up
  instruction: З'єднайте хатню справу з її логічним результатом або процесом
  pairs:
  - left: витирати пил
    right: прибирати бруд з меблів
  - left: прасувати одяг
    right: робити сорочки рівними за допомогою гарячої праски
  - left: пилососити
    right: чистити килими спеціальним приладом
  - left: виносити сміття
    right: забирати непотрібні речі з дому на вулицю
  - left: прати білизну
    right: очищувати брудний одяг за допомогою води
  - left: мити посуд
    right: робити тарілки чистими після вечері
- id: daily-life-error-correction
  type: error-correction
  instruction: Знайдіть і виправте лексичну або граматичну помилку в реченні
  items:
  - sentence: У вихідні я люблю відпочиватися на природі.
    error: відпочиватися
    correction: відпочивати
    error_type: word
    options:
    - відпочивати
    - відпочиваюсь
    - відпочитись
    explanation: Дієслово «відпочивати» ніколи не буває зворотним і не має частки
      -ся.
  - sentence: Сьогодні мені треба стирати багато брудного одягу.
    error: стирати
    correction: прати
    error_type: word
    options:
    - прати
    - прасувати
    - пилососити
    explanation: Коли ми робимо одяг чистим, ми кажемо «прати». «Стирати» означає
      витирати текст гумкою.
  - sentence: Мій новий пилесос дуже добре чистить килими.
    error: пилесос
    correction: пилосос
    error_type: word
    options:
    - пилосос
    - порохотяг
    - праска
    explanation: Українською мовою цей прилад називається «пилосос», форма «пилесос»
      — це російська калька.
  - sentence: Кожного ранку я поснідаю дуже рано перед роботою.
    error: поснідаю
    correction: снідаю
    error_type: word
    options:
    - снідаю
    - снідав
    - снідати
    explanation: 'Для регулярних щоденних дій використовуємо недоконаний вид: «снідаю».'
  - sentence: Я часто їду на роботу на метро.
    error: на метро
    correction: метро
    error_type: phrase
    options:
    - метро
    - метром
    - в метро
    explanation: Слово «метро» не відмінюється, і ми кажемо «їду метро», а не «на
      метро».
  - sentence: Завтра вранці я снідаю раніше, ніж зазвичай, бо маю важливу співбесіду.
    error: снідаю
    correction: поснідаю
    error_type: word
    options:
    - поснідаю
    - снідав
    - буду снідати
    explanation: 'Для конкретного одноразового плану на майбутнє потрібен доконаний
      вид: «поснідаю».'
