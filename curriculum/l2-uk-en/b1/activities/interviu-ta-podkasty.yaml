- type: quiz
  title: 'Перевірте знання: Феномен подкастів'
  items:
  - question: Що означає слухати український подкаст у сучасному контексті?
    explanation: Слухати українські подкасти означає підтримувати національну культуру.
    options:
    - text: Підтримувати національну культуру
      correct: true
    - text: Просто витрачати вільний час
      correct: false
    - text: Вивчати тільки розважальний контент
      correct: false
    - text: Ігнорувати суспільні проблеми
      correct: false
  - question: Чому подкасти стали особливо важливими під час блекаутів в Україні?
    explanation: Вони стали засобом психологічної підтримки та зберігали емоційну
      рівновагу.
    options:
    - text: Вони допомагали зберігати емоційну рівновагу
      correct: true
    - text: Вони замінили читання паперових книг
      correct: false
    - text: Вони були єдиним джерелом новин
      correct: false
    - text: Вони транслювали лише музику
      correct: false
  - question: Який контент зараз найбільше шукають українські слухачі?
    explanation: Люди шукають глибокий аналіз суспільно-політичних тем.
    options:
    - text: Глибокий аналіз суспільно-політичних тем
      correct: true
    - text: Короткі гумористичні історії
      correct: false
    - text: Виключно спортивні новини
      correct: false
    - text: Програми про кулінарію
      correct: false
  - question: Що є першим етапом у циклі активного слухання?
    explanation: Перший етап активного слухання — це передбачення змісту.
    options:
    - text: Передбачення змісту за назвою
      correct: true
    - text: Написання детального транскрипту
      correct: false
    - text: Переклад кожного слова
      correct: false
    - text: Створення фінального резюме
      correct: false
  - question: Що таке глобальне розуміння тексту?
    explanation: Це здатність вихопити загальний зміст, спираючись на ключові слова.
    options:
    - text: Здатність зрозуміти загальний зміст
      correct: true
    - text: Дослівний переклад кожного речення
      correct: false
    - text: Розуміння абсолютно всіх слів
      correct: false
    - text: Запам'ятовування всіх імен та дат
      correct: false
  - question: Яку функцію виконують дискурсивні маркери у мовленні?
    explanation: Вони працюють як дорожні знаки, що структурують розмову.
    options:
    - text: Вони допомагають структурувати розмову
      correct: true
    - text: Вони є лише інформаційним шумом
      correct: false
    - text: Вони роблять мову менш зрозумілою
      correct: false
    - text: Вони завжди вказують на сарказм
      correct: false
  - question: Як зазвичай говорить професійний ведучий програми?
    explanation: Мова ведучого зазвичай є правильною та літературною.
    options:
    - text: Використовує правильну літературну мову
      correct: true
    - text: Постійно робить граматичні помилки
      correct: false
    - text: Говорить виключно суржиком
      correct: false
    - text: Часто забуває закінчити речення
      correct: false
  - question: З чого завжди починається класичне інтерв'ю?
    explanation: Воно починається з представлення гостя та теми.
    options:
    - text: З представлення гостя та теми
      correct: true
    - text: З короткого бліц-опитування
      correct: false
    - text: З підбиття фінальних підсумків
      correct: false
    - text: З реклами нових подкастів
      correct: false
  - question: Що таке формат бліц-опитування?
    explanation: Це коротка серія швидких запитань та лаконічних відповідей.
    options:
    - text: Серія швидких запитань і відповідей
      correct: true
    - text: Довга розповідь гостя про дитинство
      correct: false
    - text: Читання новин диктором
      correct: false
    - text: Повільний аналіз філософської проблеми
      correct: false
  - question: Як краще трансформувати пасивне слухання в активне?
    explanation: Потрібно сісти, робити нотатки та фокусуватися лише на аудіо.
    options:
    - text: Робити нотатки та повністю фокусуватися
      correct: true
    - text: Слухати подкаст під час пробіжки
      correct: false
    - text: Вмикати програми лише як фон
      correct: false
    - text: Паралельно гортати соціальні мережі
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Правда чи міф: Правила слухання'
  items:
  - statement: Щоб зрозуміти подкаст, потрібно зупиняти аудіо щоразу, коли ви чуєте
      незнайоме слово.
    correct: false
    explanation: Потрібно продовжувати слухати, щоб зрозуміти сенс із загального контексту.
  - statement: Подкасти допомагають українцям усвідомлювати свою ідентичність та історію.
    correct: true
    explanation: Це важливий інструмент культурного опору та деколонізації.
  - statement: Робити нотатки означає записувати абсолютно кожне слово, яке каже спікер.
    correct: false
    explanation: Нотатки повинні містити лише ключові слова, імена та головні ідеї.
  - statement: Дослівний переклад у голові заважає швидкому сприйняттю живого мовлення.
    correct: true
    explanation: Дослівний переклад уповільнює сприйняття, краще шукати глобальне
      розуміння.
  - statement: Гість студії завжди говорить ідеальною літературною мовою без жодної
      помилки.
    correct: false
    explanation: Гості часто використовують спонтанне мовлення, сленг або роблять
      паузи.
  - statement: Слово отже є дискурсивним маркером, який вказує на логічний висновок.
    correct: true
    explanation: Слово отже сигналізує, що зараз пролунає найважливіша інформація
      або підсумок.
  - statement: Фраза як на мене використовується для представлення об'єктивних історичних
      фактів.
    correct: false
    explanation: Ця фраза маркує суб'єктивну думку та особисте ставлення.
  - statement: Контекстуальне вгадування допомагає зрозуміти незнайоме слово без словника.
    correct: true
    explanation: Використання сусідніх слів та теми розмови допомагає здогадатися
      про значення.
  - statement: Резюме випуску повинно бути дуже довгим і займати кілька сторінок.
    correct: false
    explanation: Добре резюме є стислим і містить приблизно сто слів.
  - statement: Регулярне слухання на рівні B1 готує студента до розуміння складного
      темпу на B2.
    correct: true
    explanation: Щоденна практика необхідна для переходу на вищий рівень володіння
      мовою.
  instruction: Визначте, чи твердження правильне.
- type: match-up
  title: 'Знайдіть пару: Лексика медіа'
  pairs:
  - left: Новий випуск
    right: Свіжий епізод аудіопрограми
  - left: Запрошений гість
    right: Людина, яка відповідає на запитання
  - left: Ведучий програми
    right: Професіонал, який керує розмовою
  - left: Активне слухання
    right: Свідомий аналіз почутої інформації
  - left: Глобальне розуміння
    right: Здатність вихопити загальний зміст тексту
  - left: Посилання в описі
    right: Адреса сайту під відео або аудіо
  - left: Бліц-опитування
    right: Серія швидких запитань у кінці розмови
  - left: Дискурсивний маркер
    right: Слово, що допомагає структурувати текст
  - left: Стисле резюме
    right: Короткий підсумок головної ідеї
  - left: Живе обговорення
    right: Спонтанна розмова кількох людей
  instruction: З'єднайте відповідні елементи.
- type: fill-in
  title: 'Заповніть пропуски: Як працювати з аудіо'
  items:
  - sentence: Сьогодні ми раді вітати нашого спеціального гостя у цій чудовій ...
    answer: студії
    options:
    - студії
    - школі
    - книзі
    - кімнаті
    explanation: Інтерв'ю зазвичай записують у студії.
  - sentence: Під час блекаутів цікавий ... став справжньою підтримкою для багатьох
      людей.
    answer: подкаст
    options:
    - подкаст
    - текст
    - словник
    - зошит
    explanation: Подкасти допомагали зберігати спокій під час відсутності світла.
  - sentence: Якщо ви хочете підтримати авторів, ви можете ... на їхній канал.
    answer: підписатися
    options:
    - підписатися
    - подивитися
    - подумати
    - прочитати
    explanation: Слухачі часто підписуються на канали авторів.
  - sentence: Професійний ... завжди ретельно готується до ефіру та збирає інформацію.
    answer: ведучий
    options:
    - ведучий
    - слухач
    - глядач
    - студент
    explanation: Ведучий керує програмою та готує запитання.
  - sentence: Під час слухання дуже важливо робити короткі ..., щоб не забути факти.
    answer: нотатки
    options:
    - нотатки
    - переклади
    - вправи
    - помилки
    explanation: Нотатки допомагають фіксувати найважливіші деталі.
  - sentence: Часто експерт приходить, щоб дати ексклюзивне ... на актуальну тему.
    answer: інтерв'ю
    options:
    - інтерв'ю
    - завдання
    - рішення
    - правило
    explanation: Відомі люди дають інтерв'ю журналістам.
  - sentence: Він сказав важливу річ, а потім додав цікаве ... до своєї розповіді.
    answer: уточнення
    options:
    - уточнення
    - запитання
    - мовчання
    - заперечення
    explanation: Гості часто роблять уточнення своєї думки.
  - sentence: Новий ... нашого улюбленого шоу вийде вже наступного понеділка.
    answer: випуск
    options:
    - випуск
    - день
    - місяць
    - час
    explanation: Подкасти виходять окремими випусками.
  - sentence: Ця гостра соціальна ... викликала багато коментарів від слухачів.
    answer: тема
    options:
    - тема
    - пісня
    - музика
    - книга
    explanation: У програмах зазвичай обговорюється певна тема.
  - sentence: В кінці відео автори просять глядачів перейти за активним ...
    answer: посиланням
    options:
    - посиланням
    - мостом
    - кроком
    - шляхом
    explanation: У цифрових медіа часто використовують посилання.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: group-sort
  title: 'Розподіліть маркери: Факти чи думки'
  groups:
  - name: Об'єктивні факти
    items:
    - Як відомо з історії
    - Статистика показує
    - Було доведено науковцями
    - Офіційні документи свідчать
    - Дослідження підтверджують
  - name: Суб'єктивні думки
    items:
    - Мені особисто здається
    - Я глибоко переконаний
    - Як на мою думку
    - Я вважаю цю ідею
    - На моє переконання
  instruction: Розподіліть елементи за групами.
- type: unjumble
  title: 'Складіть речення: Вислови з інтерв''ю'
  items:
  - words:
    - Сьогодні
    - у
    - нашій
    - студії
    - відомий
    - історик
    answer: Сьогодні у нашій студії відомий історик
  - words:
    - Власне
    - кажучи
    - це
    - дуже
    - складне
    - запитання
    answer: Власне кажучи це дуже складне запитання
  - words:
    - До
    - речі
    - ми
    - забули
    - обговорити
    - цей
    - аспект
    answer: До речі ми забули обговорити цей аспект
  - words:
    - Отже
    - можемо
    - зробити
    - важливий
    - висновок
    - сьогодні
    answer: Отже можемо зробити важливий висновок сьогодні
  - words:
    - Я
    - радий
    - вітати
    - нашого
    - спеціального
    - гостя
    answer: Я радий вітати нашого спеціального гостя
  - words:
    - Тема
    - нашої
    - розмови
    - є
    - надзвичайно
    - актуальною
    answer: Тема нашої розмови є надзвичайно актуальною
  - words:
    - Ви
    - можете
    - знайти
    - посилання
    - в
    - описі
    answer: Ви можете знайти посилання в описі
  - words:
    - Ми
    - почули
    - багато
    - цікавих
    - думок
    - від
    - експерта
    answer: Ми почули багато цікавих думок від експерта
  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: 'Виправте помилку: Типові русизми'
  items:
  - sentence: Я завжди приймаю участь у живих обговореннях.
    error: приймаю участь
    answer: беру участь
    error_type: phrase
    options:
    - беру участь
    - роблю участь
    - даю участь
    - маю участь
    explanation: Правильний український вислів — брати участь.
  - sentence: Цей випуск получився дуже цікавим.
    error: получився
    answer: вийшов
    error_type: word
    options:
    - вийшов
    - зробився
    - стався
    - пішов
    explanation: Получився — це русизм, правильно казати вийшов або вдався.
  - sentence: Він сказав саму кращу ідею під час інтерв'ю.
    error: саму кращу
    answer: найкращу
    error_type: phrase
    options:
    - найкращу
    - дуже кращу
    - більш кращу
    - сильно кращу
    explanation: Ступінь порівняння утворюється префіксом най-, а не словом самий.
  - sentence: Ведучий задав гостю складне питання.
    error: задав
    answer: поставив
    error_type: word
    options:
    - поставив
    - зробив
    - кинув
    - сказав
    explanation: Українською мовою питання ставлять, а не задають.
  - sentence: Ми слухали подкаст на слідуючий день.
    error: слідуючий
    answer: наступний
    error_type: word
    options:
    - наступний
    - другий
    - пізніший
    - новий
    explanation: Слово слідуючий є русизмом, правильно використовувати наступний.
  - sentence: Ця інформація не співпадає з реальністю.
    error: співпадає
    answer: збігається
    error_type: word
    options:
    - збігається
    - падає разом
    - рівняється
    - зустрічається
    explanation: Українською факти збігаються, а не співпадають.
  - sentence: Давайте підведемо ітоги нашої довгої розмови.
    error: підведемо ітоги
    answer: підіб'ємо підсумки
    error_type: phrase
    options:
    - підіб'ємо підсумки
    - зробимо ітоги
    - напишемо кінці
    - скажемо фінал
    explanation: Правильно казати підбивати підсумки.
  - sentence: Гість студії був правий у своїх судженнях.
    error: був правий
    answer: мав рацію
    error_type: phrase
    options:
    - мав рацію
    - був правильним
    - робив правду
    - казав рацію
    explanation: Людина має рацію, а правильним може бути рішення або вчинок.
  instruction: Знайдіть і виправте помилку в реченні.
- type: mark-the-words
  title: 'Знайдіть терміни: Медіа'
  instruction: Знайдіть і позначте шість слів, які стосуються створення подкастів.
  text: Кожен аудіопростір потребує якісного контенту. Ми слухаємо новий подкаст,
    де ведучий та його відомий гість обговорюють суспільство. Наш улюблений випуск
    мав цікаве інтерв'ю.
  answers:
  - аудіопростір
  - подкаст
  - ведучий
  - гість
  - випуск
  - інтерв'ю
- type: select
  title: 'Оберіть правильні відповіді: Аналіз ситуації'
  items:
  - question: Які з цих слів є типовими дискурсивними маркерами?
    min_correct: 3
    explanation: Власне, отже та до речі — це маркери, що структурують мовлення.
    options:
    - text: Власне
      correct: true
    - text: Книга
      correct: false
    - text: Отже
      correct: true
    - text: До речі
      correct: true
    - text: Стіл
      correct: false
  - question: Що з цього є хорошими стратегіями активного слухання?
    min_correct: 3
    explanation: Робити нотатки, шукати контекст і передбачати зміст — це ефективні
      стратегії.
    options:
    - text: Переклад кожного слова
      correct: false
    - text: Створення коротких нотаток
      correct: true
    - text: Передбачення теми за назвою
      correct: true
    - text: Фокус на ключових концептах
      correct: true
    - text: Паніка через незнайоме слово
      correct: false
  - question: Які теми найчастіше обговорюють у глибоких українських подкастах зараз?
    min_correct: 3
    explanation: Суспільство, історія та культура є пріоритетними темами.
    options:
    - text: Суспільні зміни
      correct: true
    - text: Деколонізація історії
      correct: true
    - text: Розвиток культури
      correct: true
    - text: Лише кулінарні рецепти
      correct: false
    - text: Поради щодо макіяжу
      correct: false
