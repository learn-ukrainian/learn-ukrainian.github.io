- type: match-up
  title: 'Термінологія: Знайдіть визначення'
  items:
    - client: "Вид"
      target: "Категорія, що показує характер дії (процес чи результат)"
    - client: "Час"
      target: "Категорія, що вказує, коли відбувається дія"
    - client: "Спосіб"
      target: "Відношення дії до дійсності (факт, мрія, наказ)"
    - client: "Інфінітив"
      target: "Початкова форма дієслова (що робити?)"
    - client: "Парадигма"
      target: "Повний набір усіх форм одного слова"
    - client: "Дієвідмінювання"
      target: "Зміна дієслова за особами та числами"
    - client: "Доконаний вид"
      target: "Описує завершену дію та її результат"
    - client: "Недоконаний вид"
      target: "Описує дію як процес без вказівки на кінець"

- type: quiz
  title: 'Перевірка концепцій: Вид і Час'
  items:
    - question: "Яке питання ми ставимо до дієслова недоконаного виду?"
      explanation: "Недоконаний вид описує процес, тому питання просте: «що робити?»."
      options:
        - text: "що робити?"
          correct: true
        - text: "що зробити?"
          correct: false
        - text: "що зробив?"
          correct: false
        - text: "що зроблю?"
          correct: false
    - question: "Чи може дієслово доконаного виду стояти в теперішньому часі?"
      explanation: "Ні, результат не може тривати «зараз». Доконаний вид має лише минулий і майбутній час."
      options:
        - text: "Ні, ніколи"
          correct: true
        - text: "Так, завжди"
          correct: false
        - text: "Тільки в поезії"
          correct: false
        - text: "Тільки в запереченні"
          correct: false
    - question: "Що означає словосполучення «синтетична форма»?"
      explanation: "Синтетична форма — це коли два елементи злилися в одне слово (читати + му = читатиму)."
      options:
        - text: "Форма з одного слова (робитиму)"
          correct: true
        - text: "Форма з двох слів (буду робити)"
          correct: false
        - text: "Штучна форма"
          correct: false
        - text: "Неправильна форма"
          correct: false
    - question: "Якщо ми забороняємо дію (Don't do it!), який вид ми використовуємо?"
      explanation: "Для заборони ми використовуємо недоконаний вид (Не відкривай!), бо забороняємо процес."
      options:
        - text: "Недоконаний (Не роби)"
          correct: true
        - text: "Доконаний (Не зроби)"
          correct: false
        - text: "Інфінітив (Не робити)"
          correct: false
        - text: "Минулий час (Не робив)"
          correct: false
    - question: "Якщо ми попереджаємо про небезпеку (Watch out!), який вид ми використовуємо?"
      explanation: "Для попередження про випадковий результат ми використовуємо доконаний вид (Не впади!)."
      options:
        - text: "Доконаний (Не впади)"
          correct: true
        - text: "Недоконаний (Не падай)"
          correct: false
        - text: "Теперішній час (Не падаєш)"
          correct: false
        - text: "Майбутній час (Не впадеш)"
          correct: false
    - question: "Що таке «видова пара»?"
      explanation: "Це два слова, які мають однакове значення, але різний вид (читати/прочитати)."
      options:
        - text: "Два слова з різним видом, але одним значенням"
          correct: true
        - text: "Два синоніми"
          correct: false
        - text: "Теперішній і минулий час"
          correct: false
        - text: "Дієслово та іменник"
          correct: false
    - question: "Який вид позначає результат?"
      explanation: "Результат (крапка в дії) — це завжди доконаний вид."
      options:
        - text: "Доконаний"
          correct: true
        - text: "Недоконаний"
          correct: false
        - text: "Неозначений"
          correct: false
        - text: "Тривалий"
          correct: false
    - question: "Яка форма є аналогом англійського Continuous?"
      explanation: "Недоконаний вид описує процес і тривалість, що відповідає Continuous."
      options:
        - text: "Недоконаний вид"
          correct: true
        - text: "Доконаний вид"
          correct: false
        - text: "Синтетична форма"
          correct: false
        - text: "Наказовий спосіб"
          correct: false

- type: mark-the-words
  title: 'Полювання на синтетичну форму'
  instruction: "Знайдіть і позначте всі дієслова у СИНТЕТИЧНІЙ формі майбутнього часу (наприклад, «робитиму»)."
  text: "Завтра я прокинуся рано і одразу почну працювати. Я писатиму нову статтю до обіду. Мій колега буде перевіряти пошту, а я аналізуватиму дані. Потім ми обідатимемо разом у кафе. Ми говоритимемо про плани на тиждень. Я впевнений, що ми досягнемо успіху."
  answers: ["писатиму", "аналізуватиму", "обідатимемо", "говоритимемо"]

- type: error-correction
  title: 'Виправте помилки студента'
  items:
    - sentence: "Я буду прочитати цю книгу завтра."
      error: "буду прочитати"
      answer: "прочитаю"
      options: ["прочитаю", "читаю", "прочитав", "читатиму"]
      explanation: "Майбутній час доконаного виду утворюється просто (прочитаю), без слова «буду»."
    - sentence: "Слово «писати» — це доконаний вид."
      error: "доконаний"
      answer: "недоконаний"
      options: ["недоконаний", "минулий", "майбутній", "завершений"]
      explanation: "«Писати» відповідає на питання «що робити?» (процес), тому це недоконаний вид."
    - sentence: "Не відкрий вікно, тут дуже холодно!"
      error: "відкрий"
      answer: "відкривай"
      options: ["відкривай", "відкрив", "відкриєш", "відкривати"]
      explanation: "Це заборона (Don't do it), тому ми використовуємо недоконаний вид."
    - sentence: "Я читав цю книгу вчора і тепер знаю весь сюжет."
      error: "читав"
      answer: "прочитав"
      options: ["прочитав", "читаю", "буду читати", "читатиму"]
      explanation: "Якщо ви знаєте сюжет до кінця, це результат. Потрібен доконаний вид: «прочитав»."
    - sentence: "Я буду писатиму листа ввечері."
      error: "буду писатиму"
      answer: "писатиму"
      options: ["писатиму", "написатиму", "написав", "пишу"]
      explanation: "Не можна використовувати подвійне майбутнє. Або «буду писати», або «писатиму»."
    - sentence: "Теперішній час має доконаний вид."
      error: "має"
      answer: "не має"
      options: ["не має", "іноді має", "завжди має", "потребує"]
      explanation: "У теперішньому часі дія триває, тому вона не може бути завершеною (доконаною)."

- type: unjumble
  title: 'Відновіть граматичні правила'
  items:
    - words: ["Недоконаний", "вид", "описує", "дію", "як", "процес"]
      answer: "Недоконаний вид описує дію як процес"
    - words: ["Доконаний", "вид", "вказує", "на", "результат", "дії"]
      answer: "Доконаний вид вказує на результат дії"
    - words: ["Теперішній", "час", "має", "тільки", "недоконаний", "вид"]
      answer: "Теперішній час має тільки недоконаний вид"
    - words: ["Інфінітив", "відповідає", "на", "питання", "що", "робити"]
      answer: "Інфінітив відповідає на питання що робити"
    - words: ["Синтетична", "форма", "складається", "з", "одного", "слова"]
      answer: "Синтетична форма складається з одного слова"
    - words: ["Частка", "не", "з", "дієсловами", "пишеться", "окремо"]
      answer: "Частка не з дієсловами пишеться окремо"

- type: cloze
  title: 'Система дієслова: Підсумок'
  passage: "Українська система дієслова базується на категорії {{1}}. Вона поділяється на {{2}} та {{3}} види. Доконаний вид позначає {{4}}, а недоконаний — {{5}}. Категорія {{6}} вказує, коли відбувається дія. Ми розрізняємо {{7}}, {{8}} та {{9}} часи. Дієслова також мають {{10}}: дійсний, умовний та {{11}}. Початкова форма дієслова називається {{12}}. Вона відповідає на питання «що {{13}}?». Зміна дієслова за особами називається {{14}}."
  blanks:
    - id: 1
      answer: "виду"
      options: ["виду", "часу", "роду", "стану"]
    - id: 2
      answer: "доконаний"
      options: ["доконаний", "минулий", "складний", "простий"]
    - id: 3
      answer: "недоконаний"
      options: ["недоконаний", "майбутній", "теперішній", "активний"]
    - id: 4
      answer: "результат"
      options: ["результат", "процес", "дію", "стан"]
    - id: 5
      answer: "процес"
      options: ["процес", "результат", "кінець", "мету"]
    - id: 6
      answer: "часу"
      options: ["часу", "виду", "особи", "числа"]
    - id: 7
      answer: "минулий"
      options: ["минулий", "давній", "вчорашній", "колишній"]
    - id: 8
      answer: "теперішній"
      options: ["теперішній", "сьогоднішній", "актуальний", "сучасний"]
    - id: 9
      answer: "майбутній"
      options: ["майбутній", "завтрашній", "наступний", "прийдешній"]
    - id: 10
      answer: "спосіб"
      options: ["спосіб", "метод", "шлях", "стиль"]
    - id: 11
      answer: "наказовий"
      options: ["наказовий", "обов'язковий", "суворий", "важливий"]
    - id: 12
      answer: "інфінітив"
      options: ["інфінітив", "суфікс", "префікс", "корінь"]
    - id: 13
      answer: "робити"
      options: ["робити", "зробити", "роблю", "робив"]
    - id: 14
      answer: "дієвідмінювання"
      options: ["дієвідмінювання", "відмінювання", "зміна", "перетворення"]
