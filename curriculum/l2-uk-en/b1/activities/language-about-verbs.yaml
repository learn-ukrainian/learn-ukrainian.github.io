- type: match-up
  title: 'Знайдіть пару: термін та його значення'
  instruction: Дорогі сусіди, давайте перевіримо, як добре ви запам'ятали наші нові граматичні інструменти. Поєднайте український термін з його англійським еквівалентом.
  pairs:
    - left: вид
      right: aspect
    - left: доконаний вид
      right: perfective aspect
    - left: недоконаний вид
      right: imperfective aspect
    - left: теперішній час
      right: present tense
    - left: минулий час
      right: past tense
    - left: майбутній час
      right: future tense
    - left: процес
      right: process
    - left: результат
      right: result
    - left: тривалість
      right: duration
    - left: повторення
      right: repetition
    - left: заборона
      right: prohibition
    - left: застереження
      right: warning

- type: quiz
  title: Перевірка розуміння дієслівних категорій
  instruction: Оберіть одну правильну відповідь. Пам'ятайте, що розуміння цих термінів — це ваш ключ до автентичної української мови!
  items:
    - question: Яка граматична категорія показує характер дії в часі?
      options:
        - text: вид
          correct: true
        - text: час
          correct: false
        - text: рід
          correct: false
        - text: особа
          correct: false
      explanation: Вид — це фундаментальна категорія, що позначає характер протікання дії (процес чи результат).
    - question: Який вид дієслова вказує на завершену дію та конкретний результат?
      options:
        - text: доконаний
          correct: true
        - text: недоконаний
          correct: false
        - text: теперішній
          correct: false
        - text: майбутній
          correct: false
      explanation: Термін походить від слова доконати — тобто зробити до кінця, завершити.
    - question: Який вид дієслова описує тривалий процес без вказівки на його фінал?
      options:
        - text: недоконаний
          correct: true
        - text: доконаний
          correct: false
        - text: минулий
          correct: false
        - text: синтетичний
          correct: false
      explanation: Недоконаний вид ми використовуємо для опису процесів, тривалих або повторюваних дій.
    - question: Який час позначає дію, що відбувається саме в момент нашого мовлення?
      options:
        - text: теперішній
          correct: true
        - text: минулий
          correct: false
        - text: майбутній
          correct: false
        - text: доконаний
          correct: false
      explanation: Теперішній час — це події, що відбуваються тут і зараз.
    - question: Яка форма майбутнього часу обов'язково складається з двох слів?
      options:
        - text: складена
          correct: true
        - text: синтетична
          correct: false
        - text: проста
          correct: false
        - text: інфінітивна
          correct: false
      explanation: Складена форма (наприклад, буду робити) завжди складається з допоміжного дієслова та інфінітива.
    - question: Як називається початкова незмінна форма дієслова в українській мові?
      options:
        - text: інфінітив
          correct: true
        - text: основа
          correct: false
        - text: закінчення
          correct: false
        - text: дієвідміна
          correct: false
      explanation: Інфінітив — це словникова форма, що зазвичай закінчується на -ти.
    - question: Що саме ми зазвичай виражаємо недоконаним видом у реченнях із запереченням?
      options:
        - text: заборону
          correct: true
        - text: застереження
          correct: false
        - text: результат
          correct: false
        - text: початок дії
          correct: false
      explanation: Заборона (prohibition) в українській мові завжди потребує вживання недоконаного виду.
    - question: Яка граматична категорія змінюється в минулому часі замість категорії особи?
      options:
        - text: рід
          correct: true
        - text: вид
          correct: false
        - text: час
          correct: false
        - text: дієвідміна
          correct: false
      explanation: У минулому часі дієслова мають форми чоловічого, жіночого та середнього роду.

- type: fill-in
  title: Опишіть властивості дієслова українською
  instruction: Уявіть, що ви пояснюєте граматику другові. Вставте правильний термін у речення, щоб опис був точним.
  items:
    - sentence: Речення Я прочитав книгу має _____ вид.
      answer: доконаний
      options:
        - доконаний
        - недоконаний
        - теперішній
        - майбутній
    - sentence: Слово буду писати — це _____ форма майбутнього часу.
      answer: складена
      options:
        - складена
        - синтетична
        - проста
        - складна
    - sentence: Коли ми кажемо про тривалість дії, ми використовуємо _____ вид.
      answer: недоконаний
      options:
        - недоконаний
        - доконаний
        - теперішній
        - минулий
    - sentence: Термін застереження вимагає вживання _____ виду дієслова.
      answer: доконаного
      options:
        - доконаного
        - недоконаного
        - теперішнього
        - синтетичного
    - sentence: В українській мові в _____ часі ніколи не буває доконаного виду.
      answer: теперішньому
      options:
        - теперішньому
        - минулому
        - майбутньому
        - простому
    - sentence: Дієслово писатиму — це _____ форма майбутнього часу.
      answer: синтетична
      options:
        - синтетична
        - складена
        - проста
        - складна
    - sentence: Словосполучення не відкривай виражає граматичну _____
      answer: заборону
      options:
        - заборону
        - застереження
        - результат
        - процес
    - sentence: Дієслово прочитати — це _____ до слова читати.
      answer: видова пара
      options:
        - видова пара
        - інфінітив
        - основа
        - закінчення

- type: error-correction
  title: Виправте граматичні терміни та пояснення
  instruction: Навіть найкращі учні іноді помиляються. Знайдіть помилку в описі дієслівних категорій та виправте її.
  items:
    - sentence: Я написав лист дві години.
      error: написав
      answer: писав
      options:
        - написав
        - писав
        - пишу
        - писатиму
      explanation: При вказівці на тривалість дії (дві години) слід вживати недоконаний вид.
    - sentence: Ми кажемо, що читатиму — це складна форма майбутнього часу.
      error: складна
      answer: синтетична
      options:
        - складна
        - синтетична
        - проста
        - минулу
      explanation: Форма читатиму є синтетичною, бо вона складається з одного слова.
    - sentence: Заборона Не забудь ключ! вимагає недоконаного виду.
      error: забудь
      answer: забувай
      options:
        - забудь
        - забувай
        - забудемо
        - забуваєш
      explanation: Для вираження заборони в українській мові використовується недоконаний вид (Не забувай).
    - sentence: Теперішній час може мати доконаний вид.
      error: може
      answer: не може
      options:
        - може
        - не може
        - повинен
        - планує
      explanation: В українській мові доконаний вид існує тільки в минулому та майбутньому часах.
    - sentence: Закінчення дієслова в минулому часі залежить від особи.
      error: особи
      answer: роду
      options:
        - особи
        - роду
        - числа
        - виду
      explanation: У минулому часі українські дієслова змінюються за родами (чоловічий, жіночий, середній).
    - sentence: Складена форма майбутнього часу — це одне слово.
      error: одне слово
      answer: два слова
      options:
        - одне слово
        - два слова
        - префікс
        - закінчення
      explanation: 'Складена форма завжди складається з двох слів: допоміжного бути та інфінітива.'

- type: mark-the-words
  title: Знайдіть терміни в тексті
  instruction: Клацніть на всі граматичні терміни, що стосуються категорій дієслова, у наведеному нижче тексті.
  text: Граматичний вид дієслова буває доконаний та недоконаний. Коли ми описуємо результат, ми обираємо доконаний вид, а коли нас цікавить процес — недоконаний. Також важливо правильно визначити час дії.
  answers:
    - вид
    - доконаний
    - недоконаний
    - результат
    - процес
    - час
