version: '1.0'
module: places-and-locations
level: b1
inline:
- id: reading-identifying-geographic-terrain-water-vocabulary-in-a-short-descriptive-text-about-ukraine
  type: quiz
  instruction: Оберіть правильну відповідь за текстом вище.
  items:
  - question: Який рельєф переважає на території України?
    options:
    - Рівнинний
    - Гірський
    - Степовий
    - Лісовий
    correct: 0
  - question: Де розташована Подільська височина?
    options:
    - На заході та в центрі
    - На півночі
    - На півдні
    - На сході
    correct: 0
  - question: Чим славиться Поліська низовина?
    options:
    - Густими лісами та болотами
    - Високими горами
    - Глибокими каньйонами
    - Теплим морем
    correct: 0
  - question: Які гори розташовані на півдні України?
    options:
    - Кримські гори
    - Карпати
    - Пагорби
    - Альпи
    correct: 0
  - question: Яка найбільша річка ділить Україну на дві частини?
    options:
    - Дніпро
    - Дністер
    - Прут
    - Десна
    correct: 0
  - question: 'Якщо ділянка землі повністю оточена водою, це:'
    options:
    - Острів
    - Півострів
    - Височина
    - Містечко
    correct: 0
- id: essay-response-essay-response-locative
  type: essay-response
  prompt: Напишіть 5 речень, використовуючи нову лексику (рівнина, височина, гора,
    узбережжя, передмістя тощо) та місцевий відмінок (де?). Опишіть ваше улюблене
    місто або місце відпочинку.
  min_words: 50
- id: fill-in-fill-in-geography-forms
  type: fill-in
  instruction: Вставте правильну граматичну форму у реченнях (місцевий відмінок).
  items:
  - sentence: Моє рідне місто розташоване на мальовничій ____.
    answer: височині
    options:
    - височині
    - височину
    - височиною
  - sentence: Ми часто гуляємо в літньому ____.
    answer: парку
    options:
    - парку
    - паркі
    - парком
  - sentence: Вона відпочиває на Кримському ____.
    answer: півострові
    options:
    - півострові
    - півострів
    - півостріві
  - sentence: Київ розташований на ____ річки Дніпро.
    answer: березі
    options:
    - березі
    - берегу
    - берегом
  - sentence: Туристи люблять гуляти на ____.
    answer: площі
    options:
    - площі
    - площу
    - площею
  - sentence: Вони живуть у ____ біля столиці.
    answer: передмісті
    options:
    - передмісті
    - передмістю
    - передмістям
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилки у вживанні відмінків та прийменників.
  items:
  - sentence: Моя бабуся живе на Україні.
    error: на
    correction: в
    error_type: word
    options:
    - в
    - у
    - із
    explanation: З назвами незалежних держав використовується прийменник «в/у».
  - sentence: Ми зустрінемося у площі Філармонії.
    error: у
    correction: на
    error_type: word
    options:
    - на
    - біля
    - в
    explanation: З відкритими просторами (площа, вулиця) вживається «на».
  - sentence: Вона працює в Одесу.
    error: Одесу
    correction: Одесі
    error_type: word
    options:
    - Одесі
    - Одесою
    - Одеси
    explanation: Питання «де?» вимагає місцевого відмінка (в Одесі).
  - sentence: Влітку ми відпочивали у острові Хортиця.
    error: у
    correction: на
    error_type: word
    options:
    - на
    - в
    - до
    explanation: З островами та півостровами вживається прийменник «на».
  - sentence: Діти граються на берегі моря.
    error: берегі
    correction: березі
    error_type: word
    options:
    - березі
    - берегу
    - берегом
    explanation: Перед закінченням -і приголосний «г» змінюється на «з».
  - sentence: Він щойно повернувся із Київ.
    error: Київ
    correction: Києва
    error_type: word
    options:
    - Києва
    - Києві
    - Києвом
    explanation: Після прийменника «із» (звідки?) потрібен родовий відмінок.
- id: quiz-geo-vocab-grammar
  type: quiz
  instruction: Оберіть правильний варіант, що відповідає лексиці та граматиці розділу.
  items:
  - question: 'Велика ділянка суходолу з майже рівною поверхнею — це:'
    options:
    - рівнина
    - гора
    - долина
    - озеро
    correct: 0
  - question: 'Ділянка суходолу, яка оточена водою лише з трьох боків, це:'
    options:
    - півострів
    - острів
    - узбережжя
    - набережна
    correct: 0
  - question: 'Як правильно сказати: Я зараз відпочиваю...?'
    options:
    - в Одесі
    - на Одесі
    - у Одесу
    - до Одеси
    correct: 0
  - question: 'Оберіть правильну форму слова «Острог» у місцевому відмінку (де?):'
    options:
    - в Острозі
    - у Острогі
    - на Острожі
    - у Острогу
    correct: 0
  - question: 'Територія навколо великого міста називається:'
    options:
    - передмістя
    - центр
    - заповідник
    - площа
    correct: 0
  - question: 'Який прийменник традиційно використовуємо зі словом «вулиця» (де?):'
    options:
    - на
    - у
    - в
    - з
    correct: 0
- id: match-up-locative-definitions
  type: match-up
  instruction: З'єднайте географічні терміни з їхніми визначеннями.
  pairs:
  - left: височина
    right: підвищена ділянка рівнини (200-500 метрів)
  - left: низовина
    right: територія, розташована нижче 200 метрів над рівнем моря
  - left: долина
    right: простір між горами або пагорбами, де часто тече річка
  - left: заповідник
    right: територія, де суворо охороняється природа
  - left: околиця
    right: крайня частина міста, де воно переходить у поле чи ліс
  - left: орієнтир
    right: помітний об'єкт на місцевості, який допомагає знайти напрямок
workbook:
- type: fill-in
  instruction: Оберіть правильне слово для кожного пропуску.
  items:
  - sentence: Україна має дуже різноманітний ____.
    answer: рельєф
    options:
    - рельєф
    - район
    - орієнтир
  - sentence: На заході розташована Подільська ____.
    answer: височина
    options:
    - височина
    - долина
    - набережна
  - sentence: Між горами часто можна побачити глибоку ____.
    answer: долину
    options:
    - долину
    - площу
    - набережну
  - sentence: У Києві багато людей люблять гуляти вздовж води, там є красива ____.
    answer: набережна
    options:
    - набережна
    - околиця
    - провулок
  - sentence: Лінія, де земля зустрічається з водою, називається ____.
    answer: узбережжя
    options:
    - узбережжя
    - долина
    - степ
  - sentence: Сучасне суспільство створює ____ для збереження природи.
    answer: заповідники
    options:
    - заповідники
    - передмістя
    - пам'ятки
- type: group-sort
  instruction: Розподіліть слова за правильним прийменником у місцевому відмінку (де?).
  groups:
  - label: у / в (всередині, населені пункти)
    items:
    - Києві
    - лісі
    - парку
    - селі
  - label: на (відкриті простори, острови, вулиці)
    items:
    - площі
    - вулиці
    - острові
    - березі
- type: true-false
  instruction: Правда чи ні? Оцініть твердження за текстом.
  items:
  - statement: В Україні переважає гірський рельєф.
    correct: false
    explanation: Більшу частину території України займають рівнини.
  - statement: Кримські гори розташовані на півдні України.
    correct: true
    explanation: Так, на півдні розташовані Кримські гори.
  - statement: Півострів оточений водою з усіх боків.
    correct: false
    explanation: Острів повністю оточений водою, а півострів — лише з трьох боків.
  - statement: Ми завжди кажемо «в Україні», а не «на Україні».
    correct: true
    explanation: З назвами незалежних держав використовується прийменник «в».
  - statement: Для слова «площа» у місцевому відмінку правильно використовувати прийменник
      «в».
    correct: false
    explanation: З відкритими просторами, такими як площа, використовується прийменник
      «на» (на площі).
  - statement: Звук «к» у місцевому відмінку змінюється на «ц» (наприклад, ріка ->
      на ріці).
    correct: true
    explanation: 'Це правило чергування приголосних: г->з, к->ц, х->с.'
- type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - розташоване
    - Моє
    - на
    - місто
    - височині.
    correct_order:
    - Моє
    - місто
    - розташоване
    - на
    - височині.
  - words:
    - у
    - Вони
    - лісі.
    - гуляють
    - часто
    correct_order:
    - Вони
    - часто
    - гуляють
    - у
    - лісі.
  - words:
    - на
    - Я
    - березі
    - відпочиваю
    - моря.
    correct_order:
    - Я
    - відпочиваю
    - на
    - березі
    - моря.
  - words:
    - повернувся
    - з
    - Одеси.
    - щойно
    - Він
    correct_order:
    - Він
    - щойно
    - повернувся
    - з
    - Одеси.
  - words:
    - знаходиться
    - на
    - Хортиця
    - Дніпрі.
    - Острів
    correct_order:
    - Острів
    - Хортиця
    - знаходиться
    - на
    - Дніпрі.
  - words:
    - будемо
    - в
    - Ми
    - Україні.
    - жити
    correct_order:
    - Ми
    - будемо
    - жити
    - в
    - Україні.
