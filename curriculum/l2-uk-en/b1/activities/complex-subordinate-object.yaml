    - зачинив
    - двері.
- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «З'ясувальні
    підрядні частини».
  prompt: Напишіть 5 складнопідрядних речень. Використовуйте дієслова мовлення (сказати,
    повідомити) та мислення (думати, знати), а також сполучники 'що', 'щоб' і 'чи'.
    Поясніть свої думки, передайте непряме запитання або чиєсь прохання.
  min_words: 50
  model_answer: 1. Я впевнено думаю, що це складнопідрядне речення є дуже важливим
    для щоденного ефективного спілкування українською мовою. 2. Наш новий викладач
    чітко сказав, щоб ми дуже уважно прочитали цей великий текст вдома. 3. Вчора я
    запитав свого найкращого друга, чи він уже повністю зрозумів це складне нове граматичне
    правило. 4. Тепер усі студенти добре знають, що головна частина завжди містить
    основну думку всього висловлювання. 5. Ми дуже щиро хочемо, щоб підрядна частина
    була абсолютно правильно написана у кожному домашньому завданні.
