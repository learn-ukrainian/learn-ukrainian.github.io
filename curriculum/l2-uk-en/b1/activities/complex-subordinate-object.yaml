version: '1.0'
module: complex-subordinate-object
level: b1
inline:
- id: fill-in-complex-sentence-intro
  type: fill-in
  instruction: 'Вставте правильну граматичну форму (сполучник чи сполучне слово) у
    реченнях на тему «Складнопідрядне речення: вступ».'
  items:
  - sentence: Я думаю, ____ це чудова ідея.
    answer: що
    options:
    - що
    - щоб
    - чи
    - як
  - sentence: Мама завжди хоче, ____ ми були здорові.
    answer: щоб
    options:
    - що
    - щоб
    - чи
    - коли
  - sentence: Ми не знаємо, ____ завтра буде дощ.
    answer: чи
    options:
    - що
    - щоб
    - чи
    - як
  - sentence: Запитай його, ____ він уже виконав завдання.
    answer: чи
    options:
    - чи
    - якщо
    - що
    - щоб
  - sentence: Викладач пояснив, ____ ми маємо складнопідрядне речення.
    answer: що
    options:
    - що
    - щоб
    - чи
    - куди
  - sentence: Вона просить, ____ я допоміг їй з проєктом.
    answer: щоб
    options:
    - що
    - щоб
    - чи
    - хто
- id: quiz-complex-sentence-intro
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Складнопідрядне
    речення: вступ».'
  items:
  - question: Який сполучник ми використовуємо для передачі непрямого питання?
    options:
    - чи
    - що
    - щоб
    - якщо
    correct: 0
  - question: Що завжди стоїть перед підрядним сполучником в українській мові?
    options:
    - кома
    - крапка
    - тире
    - нічого не ставиться
    correct: 0
  - question: Яке слово найчастіше вказує на початок з'ясувальної підрядної частини?
    options:
    - пояснюване слово
    - сполучне слово
    - головна частина
    - непрямі відмінки
    correct: 0
  - question: Після якого дієслова ми найчастіше використовуємо сполучник «щоб»?
    options:
    - хотіти
    - думати
    - знати
    - бачити
    correct: 0
  - question: Яку функцію виконує з'ясувальне речення?
    options:
    - Відповідає на питання непрямих відмінків
    - Описує іменник у головній частині
    - Вказує на час або місце
    - З'єднує два рівноправні речення
    correct: 0
  - question: Яке з цих слів не може передавати непряме питання в українській мові?
    options:
    - якщо
    - чи
    - хто
    - де
    correct: 0
- id: match-up-object-clauses
  type: match-up
  instruction: З'єднайте терміни з розділу «З'ясувальні підрядні частини» з їхніми
    визначеннями.
  pairs:
  - left: складнопідрядне речення
    right: речення з нерівноправними частинами
  - left: головна частина
    right: незалежна частина, що містить основну думку
  - left: підрядна частина
    right: залежна частина, що пояснює іншу
  - left: з'ясувальне речення
    right: частина, що виконує роль звичайного додатка
  - left: сполучник підрядності
    right: слово, що механічно з'єднує дві частини
  - left: пояснюване слово
    right: слово в головній частині, яке потребує доповнення
  - left: непрямі відмінки
    right: всі відмінки, окрім називного
  - left: сполучне слово
    right: повноцінний член підрядної частини, що приєднує її
workbook:
- type: group-sort
  instruction: Розподіліть дієслова (пояснювані слова) залежно від того, який сполучник
    вони найчастіше вимагають у з'ясувальному реченні.
  groups:
  - label: Вимагають «що» (факт, думка)
    items:
    - знати
    - повідомити
    - бачити
    - пам'ятати
  - label: Вимагають «щоб» (бажання, наказ)
    items:
    - хотіти
    - вимагати
    - просити
    - радити
  - label: Вимагають «чи» (сумнів, питання)
    items:
    - запитати
    - сумніватися
    - не знати
    - не пам'ятати
- type: translate
  instruction: Оберіть правильний переклад складнопідрядних речень.
  items:
  - source: I don't know whether he will come.
    options:
    - text: Я не знаю, чи він прийде.
      correct: true
    - text: Я не знаю, якщо він прийде.
      correct: false
    - text: Я не знаю, що він прийде.
      correct: false
    - text: Я не знаю, щоб він прийде.
      correct: false
  - source: Mom wants you to call.
    options:
    - text: Мама хоче, щоб ти зателефонував.
      correct: true
    - text: Мама хоче тебе зателефонувати.
      correct: false
    - text: Мама хоче, що ти зателефонував.
      correct: false
    - text: Мама хоче, чи ти зателефонував.
      correct: false
  - source: He said that he bought the tickets.
    options:
    - text: Він сказав, що він купив квитки.
      correct: true
    - text: Він сказав, щоб він купив квитки.
      correct: false
    - text: Він сказав, чи він купив квитки.
      correct: false
    - text: Він сказав, як він купив квитки.
      correct: false
  - source: Ask whether the store is open.
    options:
    - text: Запитай, чи магазин працює.
      correct: true
    - text: Запитай, якщо магазин працює.
      correct: false
    - text: Запитай, що магазин працює.
      correct: false
    - text: Запитай, щоб магазин працює.
      correct: false
  - source: I think that it is good.
    options:
    - text: Я думаю, що це добре.
      correct: true
    - text: Я думаю, це добре.
      correct: false
    - text: Я думаю, чи це добре.
      correct: false
    - text: Я думаю, щоб це добре.
      correct: false
  - source: I don't remember if I locked the door.
    options:
    - text: Я не пам'ятаю, чи я зачинив двері.
      correct: true
    - text: Я не пам'ятаю, якщо я зачинив двері.
      correct: false
    - text: Я не пам'ятаю, щоб я зачинив двері.
      correct: false
    - text: Я не пам'ятаю, що я зачинив двері.
      correct: false
- type: unjumble
  instruction: Складіть правильне речення зі слів. Не забувайте про пунктуацію!
  items:
  - words:
    - що
    - знаю,
    - Я
    - він
    - вдома.
    correct_order:
    - Я
    - знаю,
    - що
    - він
    - вдома.
  - words:
    - щоб
    - хочу,
    - Я
    - ти
    - відпочив.
    correct_order:
    - Я
    - хочу,
    - щоб
    - ти
    - відпочив.
  - words:
    - запитала,
    - чи
    - будуть
    - вільні
    - Вона
    - місця.
    correct_order:
    - Вона
    - запитала,
    - чи
    - будуть
    - вільні
    - місця.
  - words:
    - що
    - сказав,
    - купив
    - Він
    - квитки.
    correct_order:
    - Він
    - сказав,
    - що
    - купив
    - квитки.
  - words:
    - порадив,
    - щоб
    - поїхав
    - я
    - туди.
    - Друг
    correct_order:
    - Друг
    - порадив,
    - щоб
    - я
    - поїхав
    - туди.
  - words:
    - чи
    - Не
    - зачинив
    - двері.
    - пам'ятаю,
    - я
    correct_order:
    - Не
    - пам'ятаю,
    - чи
