    - text: пане професоре
      correct: true
    - text: пані доцентко
      correct: true
    - text: шановний пане
      correct: true
    - text: привіт професор
      correct: false
    - text: викладач Іван
      correct: false
    min_correct: 3
  - question: Які терміни пов'язані з фінансами та оплатою?
    options:
    - text: стипендія
      correct: true
    - text: зарплатня
      correct: true
    - text: оплата праці
      correct: true
    - text: курсова робота
      correct: false
    - text: деканат
      correct: false
    min_correct: 3
  - question: Що обов'язково має бути в офіційному електронному листі?
    options:
    - text: тема повідомлення
      correct: true
    - text: офіційне привітання
      correct: true
    - text: формула прощання
      correct: true
