  instruction: З'єднайте відповідні елементи.
- type: fill-in
  title: 'Заповніть пропуски: на роботі'
  items:
  - sentence: Мій безпосередній _____ вчора схвалив цей проєкт.
    answer: керівник
    options:
    - керівник
    - колега
    - викладач
    - студент
  - sentence: Завтра о десятій у нас важлива _____ з партнерами.
    answer: нарада
    options:
    - нарада
    - лекція
    - відпустка
    - презентація
  - sentence: Я маю написати фінансовий _____ до кінця тижня.
    answer: звіт
    options:
    - звіт
    - протокол
    - договір
    - залік
  - sentence: Наша компанія пропонує підписати _____ на один рік.
    answer: договір
    options:
    - договір
    - звіт
    - протокол
    - гуртожиток
  - sentence: Мій досвідчений _____ допоміг мені вирішити це питання.
    answer: колега
    options:
    - колега
    - керівник
    - викладач
    - деканат
  - sentence: Наш маркетинковий _____ працює дуже ефективно.
    answer: відділ
    options:
    - відділ
    - університет
    - договір
    - гуртожиток
  - sentence: Ми маємо тісно _____ наші дії з іншими командами.
    answer: координувати
    options:
    - координувати
    - делегувати
    - навчатися
    - відпочивати
  - sentence: Директор вирішив _____ мені підготовку презентації.
    answer: делегувати
    options:
    - делегувати
    - обговорювати
    - вивчати
    - співпрацювати
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: 'Складіть речення: формальний регістр'
  items:
  - words:
    - добрий
    - день
    - шановний
    - пане
    - директоре
    - я
    - підготував
    - для
    - вас
    - свій
    - звіт
    answer: Добрий день, шановний пане директоре, я підготував для вас свій звіт
  - words:
    - ми
    - маємо
    - підписати
    - цей
    - договір
    - завтра
    - дуже
    - швидко
    - і
    - без
    - жодних
    - зайвих
    - непередбачуваних
    - труднощів
    - чи
    - проблем
    answer: Ми маємо підписати цей договір завтра дуже швидко і без жодних зайвих
      непередбачуваних труднощів чи проблем
  - words:
    - я
    - хочу
    - брати
    - участь
    - у
    - проєкті
    - дуже
    - швидко
    - і
    - без
    - жодних
    - зайвих
    - непередбачуваних
    - труднощів
    - чи
    - проблем
    answer: Я хочу брати участь у проєкті дуже швидко і без жодних зайвих непередбачуваних
      труднощів чи проблем
  - words:
    - мій
    - колега
    - підготував
    - детальний
    - фінансовий
    - звіт
    - дуже
    - швидко
    - і
    - без
    - жодних
    - зайвих
    - непередбачуваних
    - труднощів
    - чи
    - проблем
    answer: Мій колега підготував детальний фінансовий звіт дуже швидко і без жодних
      зайвих непередбачуваних труднощів чи проблем
  - words:
    - чи
    - можемо
    - ми
    - перейти
    - на
    - ти
    - дуже
    - швидко
    - і
    - без
    - жодних
    - зайвих
    - непередбачуваних
    - труднощів
    - чи
    - проблем
    answer: Чи можемо ми перейти на ти дуже швидко і без жодних зайвих непередбачуваних
      труднощів чи проблем
  - words:
    - я
    - щиро
    - дякую
    - вам
    - за
    - допомогу
    - дуже
    - швидко
    - і
    - без
    - жодних
    - зайвих
    - непередбачуваних
    - труднощів
    - чи
    - проблем
    answer: Я щиро дякую вам за допомогу дуже швидко і без жодних зайвих непередбачуваних
      труднощів чи проблем
  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: Виправте лексичні та граматичні помилки
  items:
  - sentence: Я хочу приймати участь у цій важливій конференції.
    error: приймати
    answer: брати
    options:
    - брати
    - робити
    - мати
    - давати
    explanation: Правильний літературний вислів — брати участь.
  - sentence: Ми щиро дякуємо вас за таку швидку відповідь.
    error: вас
    answer: вам
    options:
    - вам
    - вами
    - ваші
    - ви
    explanation: Дієслово дякувати вимагає давального відмінка.
  - sentence: Мій молодший брат вивчається в національному університеті.
    error: вивчається
    answer: навчається
    options:
    - навчається
    - вчиться
    - вивчає
    - вчить
    explanation: Коли говоримо про процес здобуття освіти в закладі, використовуємо
      слово навчатися.
  - sentence: Студенти нашого курсу навчаються складну вищу математику.
    error: навчаються
    answer: вивчають
    options:
    - вивчають
    - вчать
    - знають
    - розуміють
    explanation: Коли є конкретний об'єкт вивчення, використовується дієслово вивчати.
  - sentence: Добрий день, Іван Петрович, як ваші справи?
    error: Іван Петрович
    answer: пане Іване
    options:
    - пане Іване
    - пане Петрович
    - пан Іван
    - шановний Іван
    explanation: У сучасному діловому етикеті краще використовувати звертання пан/пані
      з іменем.
  - sentence: Директор урочисто подякував весь відділ за чудову роботу.
    error: весь відділ
    answer: всьому відділу
    options:
    - всьому відділу
    - всім відділом
    - весь відділ
    - всіх відділів
    explanation: Дієслово дякувати вимагає давального відмінка.
  instruction: Знайдіть і виправте помилку в реченні.
- type: true-false
  title: 'Правда чи брехня: правила етикету'
  items:
  - statement: В офіційному листуванні до однієї особи займенник Ви пишеться з великої
      літери.
    correct: true
    explanation: Це виражає глибоку повагу до конкретного адресата.
  - statement: Ініціативу переходу на ти завжди має проявляти молодший співробітник.
    correct: false
    explanation: Ініціатива переходу на неформальне спілкування належить старшому
      за віком або посадою.
  - statement: Звертання на ім'я та по батькові є найсучаснішим європейським стандартом.
    correct: false
    explanation: Це застаріла традиція. Сучасний стандарт — звертання пане/пані.
  - statement: Слова пан та пані при звертанні завжди ставляться у кличному відмінку.
    correct: true
    explanation: 'Наприклад: пане директоре, пані Олено.'
  - statement: Залік — це фінальна перевірка знань з оцінкою відмінно, добре або задовільно.
    correct: false
    explanation: Залік передбачає оцінку зараховано або не зараховано, а не бали.
  - statement: Екватор святкують наприкінці навчання в університеті, коли отримують
      диплом.
    correct: false
    explanation: Екватор символізує рівно середину навчання студентів.
  - statement: Дієслово вивчати вимагає після себе об'єкта у знахідному відмінку.
    correct: true
    explanation: Ми вивчаємо (що?) історію, мову, право.
  - statement: В українській мові слова зарплата і оплата праці можна використовувати
      в офіційних юридичних документах однаково.
    correct: false
    explanation: Оплата праці — офіційний термін для документів, а зарплата — розмовний
      варіант.
  instruction: Визначте, чи твердження правильне.
- type: select
  title: 'Оберіть правильні варіанти: термінологія'
  items:
  - question: Які з цих слів стосуються перевірки знань в університеті?
