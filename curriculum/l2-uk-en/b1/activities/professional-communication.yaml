  instruction: Оберіть усі правильні відповіді.
- type: quiz
  title: 'Тест: професійна комунікація'
  items:
  - question: Як правильно сказати українською "to participate"?
    options:
    - text: приймати участь
      correct: false
    - text: брати участь
      correct: true
    - text: робити участь
      correct: false
    - text: мати участь
      correct: false
    explanation: Брати участь — єдиний правильний літературний варіант.
  - question: Який відмінок потрібен після дієслова дякувати?
    options:
    - text: знахідний
      correct: false
    - text: давальний
      correct: true
    - text: орудний
      correct: false
    - text: родовий
      correct: false
    explanation: Дякувати відповідає на питання кому? чому? (давальний відмінок).
  - question: Яке слово означає функціональний структурний підрозділ компанії?
    options:
    - text: відділ
      correct: true
    - text: нарада
      correct: false
    - text: протокол
      correct: false
    - text: звіт
      correct: false
    explanation: Відділ позначає групу людей, що виконують схожі функції.
  - question: Що святкують українські студенти на своєму третьому курсі?
    options:
    - text: Екватор
      correct: true
    - text: Випускний
      correct: false
    - text: Вступ
      correct: false
    - text: Залік
      correct: false
    explanation: Екватор символізує хронологічну середину навчання студентів.
  - question: Яке дієслово означає передачу своїх обов'язків іншому фахівцю?
    options:
    - text: делегувати
      correct: true
    - text: координувати
      correct: false
    - text: співпрацювати
      correct: false
    - text: обговорювати
      correct: false
    explanation: Делегувати — свідомо передати частину роботи іншому.
  - question: Як правильно перекласти українською англійське слово "colleague"?
    options:
    - text: керівник
      correct: false
    - text: колега
      correct: true
    - text: студент
      correct: false
    - text: викладач
      correct: false
    explanation: Колега — людина, з якою ви щодня разом працюєте.
  - question: Яке слово ми використовуємо, коли говоримо про здобуття освіти загалом?
    options:
    - text: вивчати
      correct: false
    - text: навчатися
      correct: true
    - text: читати
      correct: false
    - text: розуміти
      correct: false
    explanation: Навчатися описує сам процес або вказує на загальне місце.
  - question: Як називається офіційний документ, у якому фіксуються рішення наради?
    options:
    - text: договір
      correct: false
    - text: звіт
      correct: false
    - text: протокол
      correct: true
    - text: презентація
      correct: false
    explanation: Протокол чітко фіксує всі прийняті під час зустрічі рішення.
