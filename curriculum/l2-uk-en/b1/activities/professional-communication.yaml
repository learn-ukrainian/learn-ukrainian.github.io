  instruction: Заповніть пропуски, обравши правильні слова.
- type: fill-in
  title: 'Заповніть пропуски: освітній процес'
  items:
  - sentence: Після лекції ми пішли на практичний _____.
    answer: семінар
    options:
    - семінар
    - гуртожиток
    - звіт
    - договір
  - sentence: Завтра я маю здавати дуже складний _____ з історії.
    answer: іспит
    options:
    - іспит
    - деканат
    - відділ
    - керівник
  - sentence: Якщо студент вчиться на відмінно, він отримує підвищену _____.
    answer: стипендію
    options:
    - стипендію
    - відпустку
    - договір
    - нараду
  - sentence: Наша академічна група святкуватиме свій _____ у грудні.
    answer: Екватор
    options:
    - Екватор
    - залік
    - протокол
    - звіт
  - sentence: Я написав викладачу, щоб записатися на індивідуальну _____.
    answer: консультацію
    options:
    - консультацію
    - лекцію
    - відпустку
    - роботу
  - sentence: У кінці третього курсу я маю захистити свою _____ роботу.
    answer: курсову
    options:
    - курсову
    - фінансову
    - робочу
