version: '1.0'
module: prepositions-cause-purpose
level: b1
inline:
- id: reading
  type: reading
  passage: Минулого місяця наша місцева команда планувала турнір. Перша гра не відбулася
    через сильний дощ. Деякі гравці також не приїхали через затори. Але ми не здалися.
    Завдяки наполегливості та завдяки допомозі наших тренерів, ми впевнено виграли
    наступний матч. Ми зрозуміли, що іноді через труднощі ми стаємо сильнішими.
  questions:
  - З якої об'єктивної причини перша гра команди не відбулася?
  - Що завадило деяким гравцям приїхати на гру?
  - Завдяки чому команда змогла виграти свій наступний матч?
  - Чому в тексті використано «через дощ», але «завдяки допомозі»?
  - Який позитивний висновок зробила команда з цієї складної ситуації?
  - Який відмінок використано у фразі «через сильний дощ» у тексті?
- id: fill-in
  type: fill-in
  instruction: Вставте правильний прийменник причини (через або завдяки).
  items:
  - sentence: Ми залишилися вдома _____ сильний дощ.
    answer: через
    options:
    - через
    - завдяки
  - sentence: Вона отримала цю престижну роботу _____ своїм знанням.
    answer: завдяки
    options:
    - через
    - завдяки
  - sentence: Мій комп'ютер раптово зламався _____ технічну помилку.
    answer: через
    options:
    - через
    - завдяки
  - sentence: Він запізнився на лекцію _____ затори на дорогах.
    answer: через
    options:
    - через
    - завдяки
  - sentence: Цей проєкт став дуже успішним _____ підтримці друзів.
    answer: завдяки
    options:
    - через
    - завдяки
  - sentence: Я не можу нормально спати _____ гучний шум на вулиці.
    answer: через
    options:
    - через
    - завдяки
- id: essay-response-5
  type: essay-response
  instruction: 'Напишіть 5 речень, використовуючи нову лексику з розділу «Причина:
    від та з».'
  prompt: 'Опишіть життєві ситуації, коли люди діють під впливом внутрішньої мотивації
    (використовуйте прийменник «з») або мають неконтрольовану реакцію на щось (використовуйте
    прийменник «від»). Обов''язково використайте слова: від радості, з цікавості,
    зі страху, від холоду, з поваги.'
  min_words: 50
  model_answer: '> [!model-answer]

    > 1. Я відкрив цю стару книгу просто з цікавості, щоб подивитися на картинки.

    > 2. Коли ми вийшли на вулицю взимку, ми одразу почали тремтіти від холоду.

    > 3. Маленький хлопчик не розповів правду зі страху перед покаранням батьків.

    > 4. Діти почали голосно кричати та стрибати від радості, коли побачили подарунки.

    > 5. Він завжди уважно слухає поради свого дідуся з великої поваги до його досвіду.'
- id: error-correction
  type: error-correction
  instruction: 'Знайдіть і виправте помилки у реченнях на тему причина: від та з.'
  items:
  - sentence: Він зробив це від великої поваги до вчителя.
    error: від
    correction: з
    error_type: word
    options:
    - з
    - через
    - завдяки
    explanation: Повага — це внутрішня свідома мотивація, тому правильно казати «з
      поваги».
  - sentence: Маленька дівчинка сильно тремтіла з холоду.
    error: з
    correction: від
    error_type: word
    options:
    - від
    - через
    - для
    explanation: Тремтіти — це фізіологічна реакція організму, тому її правильно поєднувати
      з прийменником «від» (від холоду).
  - sentence: Я прочитав твій лист тільки від цікавості.
    error: від
    correction: з
    error_type: word
    options:
    - з
    - за
    - по
    explanation: Цікавість — це свідомий внутрішній мотив людини, тому треба використовувати
      «з цікавості».
  - sentence: Вона раптом почервоніла з сорому перед великою аудиторією.
    error: з
    correction: від
    error_type: word
    options:
    - від
    - через
    - заради
    explanation: Почервоніти — це неконтрольована фізична реакція, тому правильно
      «від сорому».
  - sentence: Студент збрехав декану від страху.
    error: від
    correction: зі
    error_type: word
    options:
    - зі
    - з
    - через
    explanation: Страх як внутрішній психологічний мотив для брехні вимагає прийменника
      «зі страху».
  - sentence: Ми всі стрибали з радості, коли почули цю гарну новину.
    error: з
    correction: від
    error_type: word
    options:
    - від
    - за
    - завдяки
    explanation: Радість тут викликає миттєву фізичну реакцію (стрибати), тому правильно
      «від радості».
- id: match-up
  type: match-up
  instruction: З'єднайте прийменники причини та мети з їхніми граматичними та смисловими
    функціями.
  pairs:
  - left: через
    right: негативна або об'єктивна причина (+ Знахідний відмінок)
  - left: завдяки
    right: позитивна причина, сприяння успіху (+ Давальний відмінок)
  - left: від
    right: мимовільна фізична або емоційна реакція (+ Родовий відмінок)
  - left: з
    right: внутрішня свідома мотивація людини (+ Родовий відмінок)
  - left: для
    right: загальне призначення, мета, користь (+ Родовий відмінок)
  - left: заради
    right: висока, емоційна або жертовна мета (+ Родовий відмінок)
- id: fill-in
  type: fill-in
  instruction: Вставте правильне слово (для, заради, щоб, за, по).
  items:
  - sentence: Я купив цей новий словник _____ навчання.
    answer: для
    options:
    - для
    - заради
    - щоб
    - за
  - sentence: Батьки багато і важко працюють _____ своїх дітей.
    answer: заради
    options:
    - для
    - заради
    - щоб
    - за
  - sentence: Мій брат прийшов, _____ допомогти мені з комп'ютером.
    answer: щоб
    options:
    - для
    - заради
    - щоб
    - за
  - sentence: Мама попросила мене піти в магазин _____ хлібом.
    answer: за
    options:
    - для
    - заради
    - щоб
    - за
  - sentence: Робити ранкову гімнастику дуже корисно _____ здоров'я.
    answer: для
    options:
    - для
    - заради
    - щоб
    - по
  - sentence: Влітку в селі ми часто ходили до лісу _____ гриби.
    answer: по
    options:
    - для
    - заради
    - щоб
    - по
- id: quiz-cause-purpose-complex
  type: quiz
  instruction: Оберіть правильний варіант складної конструкції причини або мети.
  items:
  - question: 'Оберіть правильну конструкцію для офіційного тексту, щоб висловити
      негативну причину:'
    options:
    - Він запізнився через те, що на дорозі утворився затор.
    - Він запізнився завдяки тому, що на дорозі утворився затор.
    - Він запізнився бо на дорозі затор.
    - Він запізнився для того, щоб був затор.
    correct: 0
  - question: 'Як правильно і формально поєднати два речення: «Ми завершили проєкт.
      Вона допомогла нам.» (позитивна причина)?'
    options:
    - Ми завершили проєкт завдяки тому, що вона нам допомогла.
    - Ми завершили проєкт через те, що вона нам допомогла.
    - Ми завершили проєкт, щоб вона нам допомогла.
    - Ми завершили проєкт для того, щоб вона нам допомогла.
    correct: 0
  - question: Яке з цих речень виражає мету (відповідає на питання навіщо)?
    options:
    - Я уважно читаю цей текст, щоб добре зрозуміти тему.
    - Я читаю цей текст, через те що він цікавий.
    - Я читаю цей текст, бо він мені дуже подобається.
    - Я читаю цей текст завдяки пораді мого вчителя.
    correct: 0
  - question: 'Оберіть правильну форму з офіційним прийменником «з метою»:'
    options:
    - Уряд виділив кошти з метою підтримки малого бізнесу.
    - Уряд виділив кошти з метою підтримка малого бізнесу.
    - Уряд виділив кошти з метою на підтримку малого бізнесу.
    - Уряд виділив кошти з метою для підтримки малого бізнесу.
    correct: 0
  - question: Яке речення звучить найбільш природно та неформально у щоденній усній
      розмові?
    options:
    - Він запізнився, бо на дорозі був великий затор.
    - Він запізнився через те, що на дорозі був великий затор.
    - Він запізнився унаслідок того, що на дорозі був затор.
    - Він запізнився у зв'язку з великим затором на дорозі.
    correct: 0
  - question: Що граматично та стилістично виражає конструкція «заради того щоб»?
    options:
    - Високу емоційну мету, велику жертву або надзвичайно сильну мотивацію.
    - Неконтрольовану фізичну реакцію живого організму.
    - Об'єктивну негативну причину якоїсь проблеми.
    - Просторову траєкторію фізичного руху крізь щось.
    correct: 0
- id: reading
  type: reading
  passage: Минулого місяця активні мешканці нашого району зібралися разом для будівництва
    нового дитячого майданчика. Завдяки спільним зусиллям та фінансовій підтримці
    місцевих підприємців, робота йшла швидко. Проте через несподівані сильні дощі
    будівництво довелося повністю зупинити на кілька днів. Волонтери невтомно працювали
    навіть на вихідних, щоб встигнути завершити майданчик до літа. Вони робили все
    це заради безпеки та радості дітей. Зрештою, цей важливий проєкт був успішно завершений,
    бо кожен відчував свою відповідальність перед громадою.
  questions:
  - Яка була головна мета зборів активних мешканців району?
  - Яка позитивна причина допомогла роботі йти дуже швидко?
  - Що стало об'єктивною негативною причиною зупинки будівництва?
  - Для чого (з якою метою) волонтери працювали навіть на вихідних?
  - Заради чого волонтери докладали стільки зусиль і працювали на вихідних?
  - Чому (з якої внутрішньої причини) цей проєкт був успішно завершений?
workbook:
- type: true-false
  instruction: Правда чи ні? Перевірте свої знання правил про причину та мету.
  items:
  - statement: Прийменник «завдяки» можна використовувати для негативних подій та
      катастроф.
    correct: false
    explanation: «Завдяки» використовується виключно для позитивних причин (успіху,
      допомоги).
  - statement: Після прийменника «через» ми завжди ставимо слово у знахідний відмінок.
    correct: true
    explanation: 'Наприклад: через хворобу, через дощ, через війну.'
  - statement: Фраза «він залишився вдома завдяки хворобі» є правильною українською
      конструкцією.
    correct: false
    explanation: Це вважається грубою семантичною помилкою. Правильно казати «через
      хворобу».
  - statement: Прийменник «від» часто описує неконтрольовану фізичну або емоційну
      реакцію.
    correct: true
    explanation: 'Наприклад: тремтіти від холоду, плакати від болю, стрибати від радості.'
  - statement: Для поєднання двох дій у реченні (щоб показати мету) ми використовуємо
      сполучник «щоб».
    correct: true
    explanation: 'Наприклад: я прийшов, щоб допомогти.'
  - statement: В українській мові не можна сказати «піти по хліб», правильно лише
      «піти за хлібом».
    correct: false
    explanation: Обидві форми (піти за хлібом / піти по хліб) є правильними синонімами
      в українській мові.
- type: group-sort
  instruction: 'Розподіліть слова та фрази за категоріями: Причина чи Мета?'
  groups:
  - label: Причина
    items:
    - через хворобу
    - завдяки допомозі
    - від холоду
    - з цікавості
    - через затори
    - від сорому
  - label: Мета
    items:
    - для здоров'я
    - заради миру
    - піти за хлібом
    - піти по воду
    - щоб допомогти
    - для навчання
- type: odd-one-out
  instruction: Яке слово або фраза зайва? (Знайдіть логічну відмінність між варіантами)
  items:
  - words:
    - через
    - завдяки
    - бо
    - для
    correct: 3
    explanation: «Для» означає мету, а інші слова є маркерами причини.
  - words:
    - для
    - заради
    - щоб
    - через
    correct: 3
    explanation: «Через» означає причину, а всі інші слова вказують на мету дії.
  - words:
    - від радості
    - від холоду
    - від сорому
    - з поваги
    correct: 3
    explanation: «З поваги» — це свідома внутрішня мотивація (з + Родовий), а інші
      — неконтрольовані реакції тіла (від + Родовий).
  - words:
    - з цікавості
    - зі страху
    - з поваги
    - від болю
    correct: 3
    explanation: «Від болю» — це фізична реакція (від + Родовий), а інші — свідома
      внутрішня мотивація (з + Родовий).
  - words:
    - піти по воду
    - піти за хлібом
    - піти по гриби
    - піти для здоров'я
    correct: 3
    explanation: «Піти для здоров'я» має абстрактну мету; інші фрази означають рух,
      щоб щось взяти/принести (за/по + конкретний предмет).
  - words:
    - через помилку
    - через затори
    - через хворобу
    - завдяки другові
    correct: 3
    explanation: «Завдяки другові» — це позитивна причина, інші варіанти є виключно
      негативними причинами (через).
- type: translate
  instruction: Оберіть правильний переклад англійського речення українською мовою.
  items:
  - source: He was late because of the traffic jam.
    options:
    - text: Він запізнився через затор.
      correct: true
    - text: Він запізнився завдяки затору.
      correct: false
    - text: Він запізнився для затору.
      correct: false
  - source: We won thanks to our coach.
    options:
    - text: Ми перемогли завдяки нашому тренеру.
      correct: true
    - text: Ми перемогли через нашого тренера.
      correct: false
    - text: Ми перемогли від нашого тренера.
      correct: false
  - source: She is trembling from cold.
    options:
    - text: Вона тремтить від холоду.
      correct: true
    - text: Вона тремтить з холоду.
      correct: false
    - text: Вона тремтить через холод.
      correct: false
  - source: I asked this out of curiosity.
    options:
    - text: Я запитав це з цікавості.
      correct: true
    - text: Я запитав це від цікавості.
      correct: false
    - text: Я запитав це через цікавість.
      correct: false
  - source: He works hard for the sake of his children.
    options:
    - text: Він важко працює заради своїх дітей.
      correct: true
    - text: Він важко працює через своїх дітей.
      correct: false
    - text: Він важко працює завдяки своїм дітям.
      correct: false
  - source: I went to the store for bread.
    options:
    - text: Я пішов у магазин за хлібом.
      correct: true
    - text: Я пішов у магазин для хліба.
      correct: false
    - text: Я пішов у магазин через хліб.
      correct: false
