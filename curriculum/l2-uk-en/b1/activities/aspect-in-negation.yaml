version: '1.0'
module: aspect-in-negation
level: b1
inline:
- id: quiz-aspect-pragmatics
  type: quiz
  instruction: Оберіть правильний варіант заперечення залежно від контексту.
  items:
  - question: Колега запитує, чи готовий звіт. Ви зараз над ним працюєте.
    options:
    - Я ще не написав його.
    - Я не писав його.
    - Я ще не писав його.
    - Я не написав його.
    correct: 0
  - question: Ольга запитує, чи ти дивився цей фільм. Ти його ніколи не бачив.
    options:
    - Ні, я не дивився.
    - Ні, я ще не подивився.
    - Ні, я ще не дивився.
    - Ні, я не подивився.
    correct: 0
  - question: Ти працюєш над проєктом, більша частина готова, залишилася одна деталь.
    options:
    - Я ще не доробив.
    - Я не робив.
    - Я ще не робив.
    - Я не доробив.
    correct: 0
  - question: Клієнт питає, чи ви вже вирішили це питання. Ви плануєте зробити це
      сьогодні.
    options:
    - Ми ще не вирішили.
    - Ми не вирішували.
    - Ми ще не вирішували.
    - Ми не вирішили.
    correct: 0
  - question: Ти відповідаєш на запитання про те, чи ти їси м'ясо (констатація щоденної
      звички).
    options:
    - Я взагалі не їм.
    - Я ще не з'їв.
    - Я ще не їм.
    - Я взагалі не з'їм.
    correct: 0
  - question: Професор питає, чи ти написав перший розділ. Ти плануєш закінчити завтра.
    options:
    - Я ще не написав.
    - Я не писав.
    - Я ще не писав.
    - Я не написав.
    correct: 0
  - question: Студент пояснює, що тексту не було в бібліотеці, тому процес читання
      не відбувся.
    options:
    - Я не читав.
    - Я ще не прочитав.
    - Я ще не читав.
    - Я не прочитав.
    correct: 0
  - question: Ольга питає Михайла, чи він помив посуд. Залишилася лише одна тарілка.
    options:
    - Я ще не домив.
    - Я не мив.
    - Я ще не мив.
    - Я не домив.
    correct: 0
  - question: 'Ти констатуєш професійний факт: твій колега ігнорує листи (регулярна
      відсутність дії).'
    options:
    - Він не відповідав.
    - Він ще не відповів.
    - Він ще не відповідав.
    - Він не відповів.
    correct: 0
  - question: Ви читаєте цікаву книжку. Вас питають, чим вона закінчується.
    options:
    - Я ще не дочитав.
    - Я не читав.
    - Я ще не читав.
    - Я не дочитав.
    correct: 0
  title: Оберіть правильний варіант заперечення залежно від контексту.
- id: fill-in-factual-denial
  type: fill-in
  instruction: Вставте правильну форму дієслова (з часткою не або ще не) за змістом
    речення.
  items:
  - sentence: Я взагалі _____ м'ясо, це мій загальний життєвий факт.
    answer: не їм
    options:
    - не їм
    - ще не з'їв
    - не з'їм
    - ще не їм
  - sentence: Ми _____ це питання, але активно над ним працюємо.
    answer: ще не вирішили
    options:
    - ще не вирішили
    - не вирішували
    - ще не вирішували
    - не вирішили
  - sentence: Студент _____ цю статтю, бо не знайшов її в бібліотеці.
    answer: не читав
    options:
    - не читав
    - ще не прочитав
    - не прочитав
    - ще не читав
  - sentence: Колега _____ на мій лист, але я сподіваюся отримати відповідь завтра.
    answer: ще не відповів
    options:
    - ще не відповів
    - не відповідав
    - ще не відповідав
    - не відповів
  - sentence: Він ніколи _____ в Києві, це історичний факт.
    answer: не жив
    options:
    - не жив
    - ще не переїхав
    - не переїхав
    - ще не жив
  - sentence: Я _____ останній розділ проєкту, зараз закінчу.
    answer: ще не доробив
    options:
    - ще не доробив
    - не робив
    - ще не робив
    - не доробив
  - sentence: Ми _____ цю проблему вранці, тому в мене немає інформації.
    answer: не обговорювали
    options:
    - не обговорювали
    - ще не обговорили
    - не обговорили
    - ще не обговорювали
  - sentence: Я _____ посуд, залишилося кілька тарілок.
    answer: ще не домив
    options:
    - ще не домив
    - не мив
    - ще не мив
    - не домив
  title: Вставте правильну форму дієслова (з часткою не або ще не) за змістом речення.
- id: group-sort-negation-types
  type: group-sort
  instruction: Розподіліть речення за прагматичним значенням.
  groups:
  - label: Загальне заперечення (факт)
    items:
    - Ми не обговорювали це питання.
    - Він не жив у Києві.
    - Вона взагалі не дивилася телевізор.
    - Вона не прийшла в ресторан.
    - Я не читав цю статтю.
  - label: Очікуване завершення (намір)
    items:
    - Я ще не дочитав книжку.
    - Ми ще не вирішили проблему.
    - Він ще не відповів на повідомлення.
    - Я ще не доробив роботу.
    - Він ще не склав іспит.
  title: Розподіліть речення за прагматичним значенням.
- id: match-up-pragmatic-context
  type: match-up
  instruction: З'єднайте ситуацію з найбільш природною реакцією.
  pairs:
  - left: Керівник запитує про звіт, який ви зараз робите.
    right: Я ще не доробив.
  - left: Колега питає про фільм. Ви його ніколи не бачили.
    right: Я не дивився.
  - left: Ви майже прочитали книжку, потрібна ще хвилина.
    right: Я ще не дочитав.
  - left: Студент каже, що тексту не було в бібліотеці.
    right: Я не читав.
  - left: Ви обіцяли відповісти на лист колеги, але не встигли.
    right: Я ще не відповів.
  - left: Михайло питає Ольгу про ванну кімнату, це не її обов'язок.
    right: Я не прибирала.
  - left: Клієнт чекає на фінальний результат сьогодні.
    right: Ми ще не вирішили.
  - left: Ви повідомляєте, що ніколи в житті не працювали.
    right: Я не працював.
  title: З'єднайте ситуацію з найбільш природною реакцією.
workbook:
- type: group-sort
  instruction: Розподіліть дієслова за видами.
  groups:
  - label: Недоконаний вид (процес)
    items:
    - обговорювати
    - вирішувати
    - відповідати
    - робити
    - читати
    - мити
  - label: Доконаний вид (результат)
    items:
    - обговорити
    - вирішити
    - відповісти
    - зробити
    - прочитати
    - помити
    - домити
    - дочитати
    - доробити
  title: Розподіліть дієслова за видами.
- type: match-up
  instruction: З'єднайте видові пари (недоконаний — доконаний вид).
  pairs:
  - left: обговорювати
    right: обговорити
  - left: вирішувати
    right: вирішити
  - left: відповідати
    right: відповісти
  - left: робити
    right: зробити
  - left: читати
    right: прочитати
  - left: мити
    right: помити
  - left: писати
    right: написати
  title: З'єднайте видові пари (недоконаний — доконаний вид).
