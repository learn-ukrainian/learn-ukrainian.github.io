version: '1.0'
module: aspect-in-negation
level: b1
inline:
- id: quiz-choose-impf-or-pf-based-on-context
  type: quiz
  instruction: Оберіть правильний варіант заперечення для кожної ситуації
  items:
  - question: Керівник запитує про звіт, який ви мали здати вчора. Ви ще працюєте
      над ним.
    options:
    - Ще не написав
    - Не писав
    - Не пишу
    - Ніколи не писав
    correct: 0
  - question: Друг питає, чи дивилися ви старий французький фільм. Ви взагалі не любите
      кіно.
    options:
    - Не дивився
    - Ще не подивився
    - Не подивлюся
    - Не додивився
    correct: 0
  - question: Колега питає, чи ви вже пообідали, бо хоче запросити вас у кафе. Ви
      збиралися йти на обід.
    options:
    - Ще не пообідав
    - Не обідав
    - Не обідаю
    - Ніколи не обідав
    correct: 0
  - question: Ви питаєте знайомого, чи він був у Києві. Він там ніколи не був.
    options:
    - Не був
    - Ще не побував
    - Не побув
    - Не буду
    correct: 0
  - question: Викладач питає, чи ви прочитали статтю на сьогодні. Ви плануєте зробити
      це ввечері.
    options:
    - Ще не прочитав
    - Не читав
    - Не читаю
    - Ніколи не читав
    correct: 0
  - question: Мама питає, чи ти прибрав у ванній кімнаті. Ти якраз збирався це зробити.
    options:
    - Ще не прибрав
    - Не прибирав
    - Не прибираю
    - Ніколи не прибирав
    correct: 0
  - question: На співбесіді вас питають, чи ви працювали над цим дослідженням. Це
      не було у ваших обов'язках.
    options:
    - Не працював
    - Ще не попрацював
    - Не попрацюю
    - Не допрацював
    correct: 0
  - question: Колега питає, чи ви відповіли на важливий лист. Ви збираєтеся зробити
      це зараз.
    options:
    - Ще не відповів
    - Не відповідав
    - Не відповів би
    - Ніколи не відповідав
    correct: 0
  - question: Ви розповідаєте, що зовсім не любили читати в дитинстві.
    options:
    - Не читав
    - Ще не прочитав
    - Не прочитаю
    - Не дочитав
    correct: 0
  - question: Ви миєте посуд. Залишилася одна тарілка. Хтось питає, чи ви закінчили.
    options:
    - Ще не домив
    - Не мив
    - Не домивав
    - Ніколи не мив
    correct: 0
- id: fill-in-complete-negated-sentences-with-the-correct-aspect-form-based-on-the-speaker-s-attitude-neutral-fact
  type: fill-in
  instruction: Вставте правильну форму дієслова (не + недоконаний вид або ще не +
    доконаний вид)
  items:
  - sentence: Я взагалі _____ іспанську мову.
    answer: не вчив
    options:
    - не вчив
    - ще не вивчив
    - не вивчив
    - ще не вчив
  - sentence: Вибачте, я _____ ваш лист, але обов'язково зроблю це сьогодні.
    answer: ще не прочитав
    options:
    - не читав
    - ще не прочитав
    - не прочитав
    - ще не читав
  - sentence: Він ніколи _____ м'ясо, він вегетаріанець.
    answer: не їв
    options:
    - не їв
    - ще не з'їв
    - не з'їв
    - ще не їв
  - sentence: Ми _____ це питання на минулих зборах, це не була наша тема.
    answer: не обговорювали
    options:
    - не обговорювали
    - ще не обговорили
    - не обговорили
    - ще не обговорювали
  - sentence: Ми _____ цю ситуацію, але ми активно шукаємо рішення.
    answer: ще не вирішили
    options:
    - не вирішували
    - ще не вирішили
    - не вирішили
    - ще не вирішували
  - sentence: Я _____ цю курсову роботу, мені потрібна ще година.
    answer: ще не доробив
    options:
    - не робив
    - ще не доробив
    - не доробив
    - ще не робив
  - sentence: Ми часто _____ минулого року через складну ситуацію.
    answer: не зустрічалися
    options:
    - не зустрічалися
    - ще не зустрілися
    - не зустрілися
    - ще не зустрічалися
  - sentence: Вона _____ на мій лист, я все ще чекаю.
    answer: ще не відповіла
    options:
    - не відповідала
    - ще не відповіла
    - не відповіла
    - ще не відповідала
- id: group-sort-sort-negated-sentences-into-impf-and-pf
  type: group-sort
  instruction: 'Розподіліть речення за типом заперечення: загальне заперечення (нейтральний
    факт) або незавершене очікування (намір)'
  groups:
  - label: Загальне заперечення (факт)
    items:
    - Я не дивився цей фільм.
    - Ми ніколи не обговорювали це питання.
    - Він взагалі не снідає.
    - Вона не читала цю статтю.
    - Я не працював над цим дослідженням.
  - label: Незавершене очікування (намір)
    items:
    - Я ще не подивився цей фільм.
    - Ми ще не обговорили це питання.
    - Він ще не поснідав.
    - Вона ще не дочитала цю статтю.
    - Я ще не доробив цей звіт.
- id: error-correction-find-and-correct-aspect-errors-in-negated-sentences-without-context
  type: error-correction
  instruction: Знайдіть і виправте логічні помилки у вживанні виду дієслова із запереченням.
  items:
  - sentence: Я ще не читав цю книжку, але вона лежить на столі.
    error: читав
    correction: прочитав
    error_type: word
    options:
    - прочитав
    - дочитав
    - читаю
    - прочитаю
    explanation: Зі словом «ще» (очікування результату) потрібно використовувати доконаний
      вид.
  - sentence: Я взагалі ще не снідав у дитинстві.
    error: ще не снідав
    correction: не снідав
    error_type: phrase
    options:
    - не снідав
    - не поснідав
    - не снідаю
    - не снідавши
    explanation: Для констатації факту в минулому використовуємо просто «не» + недоконаний
      вид без «ще».
  - sentence: Вона ще не обговорювала це зі мною, але ми домовилися про зустріч завтра.
    error: обговорювала
    correction: обговорила
    error_type: word
    options:
    - обговорила
    - обговорить
    - обговорює
    - обговорюватиме
    explanation: Очікуваний результат у майбутньому вимагає доконаного виду.
  - sentence: Він не відповів на мій лист, хоча я відправив його лише п'ять хвилин
      тому.
    error: не відповів
    correction: ще не відповів
    error_type: phrase
    options:
    - ще не відповів
    - не відповідав
    - не відповідає
    - ніколи не відповів
    explanation: Якщо минуло мало часу і ми чекаємо на результат, потрібно додати
      «ще».
  - sentence: Я ще не робив цей звіт, мені залишилося написати трохи.
    error: робив
    correction: доробив
    error_type: word
    options:
    - доробив
    - зробив
    - робитиму
    - зроблю
    explanation: Коли залишилося зовсім трохи до фіналу, використовуємо доконаний
      вид з префіксом до- (доробив).
  - sentence: Ми ще не вирішували це питання, але обов'язково це зробимо на зборах.
    error: вирішували
    correction: вирішили
    error_type: word
    options:
    - вирішили
    - вирішуємо
    - вирішимо
    - вирішуватимемо
    explanation: Слово «ще» вказує на очікуваний результат, тому потрібен доконаний
      вид.
- id: match-up-match-pragmatic-situations-boss-asking-about-tasks-friend-asking-about-books-teacher-checking-homework-to-the-correct-negation-pattern
  type: match-up
  instruction: З'єднайте прагматичну ситуацію з найбільш природною формою заперечення
  pairs:
  - left: Керівник суворо запитує про звіт (ви запізнюєтеся)
    right: Я ще не написав звіт.
  - left: Друг питає, чи читали ви нову статтю (ви не планували)
    right: Я не читав статтю.
  - left: Викладач питає, чи ви написали розділ (ви в процесі)
    right: Я ще не доробив розділ.
  - left: Колега питає, чи ви обідали (ви взагалі не обідаєте на роботі)
    right: Я не обідаю.
  - left: Ви питаєте колегу, чи вона бачила ваші ключі (дуже ввічливо)
    right: Ви не бачили мої ключі?
  - left: Ви повідомляєте, що ніколи в житті не їли м'ясо
    right: Я ніколи не їв м'ясо.
  - left: Ви скаржитеся, що колега так і не виконав завдання
    right: Він так і не написав звіт!
  - left: Ви пояснюєте, що процес миття посуду ще триває
    right: Я ще не домив посуд.
- id: open-writing-progress-report-write-a-dialogue-where-one-person-asks-about-progress-on-several-tasks-use-impf-for-unstarted-tasks-and-pf-for-pending-tasks
  type: essay-response
  prompt: Напишіть короткий діалог (6-8 реплік) між керівником і працівником. Керівник
    запитує про прогрес щодо різних завдань (написати звіт, обговорити питання з клієнтом,
    відповісти на листи). Працівник повинен використовувати «не + недоконаний вид»
    для завдань, які він ще навіть не починав або які не є його роботою, та «ще не
    + доконаний вид» для завдань, які зараз у процесі і скоро будуть завершені.
  min_words: 50
  model_answer: '— Добрий день, Максиме! Ти вже написав фінансовий звіт за місяць?

    — Добрий день! Я ще не написав його, але вже зібрав усі цифри. Залишилося зробити
    висновки. До вечора дороблю.

    — Добре. А ти обговорив нове питання з клієнтом?

    — Ні, я не обговорював це з ним. Ви ж казали, що цим буде займатися колега з відділу
    маркетингу.

    — А, так, точно. Ти вже відповів на ранкові листи?

    — Ще не відповів на всі, залишилося три листи. Скоро допишу.

    — Чудово, дякую за роботу.

    '
workbook:
- type: true-false
  instruction: Чи правильні ці твердження про прагматику заперечення?
  items:
  - statement: Форма «не + недоконаний вид» часто використовується для констатації
      нейтрального факту.
    correct: true
    explanation: Так, це загальне заперечення, яке просто вказує на відсутність дії.
  - statement: Слово «ще» завжди використовується з недоконаним видом дієслова.
    correct: false
    explanation: Навпаки, в контексті очікування ми зазвичай використовуємо «ще не»
      з доконаним видом (ще не прочитав).
  - statement: Запитання «Ви не бачили мої ключі?» звучить більш ввічливо, ніж «Ви
      не знайшли мої ключі?».
    correct: true
    explanation: Недоконаний вид знімає психологічний тиск зі співрозмовника і звучить
      як м'яке запитання про факт.
  - statement: Фраза «Я ще не домив посуд» означає, що ви взагалі не збираєтеся його
      мити.
    correct: false
    explanation: Префікс до- і слово «ще» означають, що процес іде і ви обов'язково
      його завершите.
  - statement: У теперішньому часі ми завжди використовуємо недоконаний вид для заперечення.
    correct: true
    explanation: Так, оскільки доконаний вид в українській мові не має форм теперішнього
      часу.
  - statement: Слова «ніколи» та «взагалі» найчастіше притягують до себе доконаний
      вид.
    correct: false
    explanation: Ці слова позначають загальний факт, тому вони використовуються з
      недоконаним видом (ніколи не читав).
