- type: essay-response
  prompt: Напишіть діалог (мінімум 6 реплік), де колега запитує про ваш прогрес щодо
    кількох завдань на роботі. Використовуйте «не + недоконаний вид» для завдань,
    які ви не планували робити, та «ще не + доконаний вид» для завдань, які зараз
    у процесі.
  min_words: 50
  model_answer: '— Привіт! Ти вже прочитав ту статтю про прагматику? — Ні, я ще не
    дочитав її, залишилася одна сторінка. — А звіт вже писав? — Звіт я взагалі не
    писав, це завдання для Михайла. — Зрозуміло. А ми вже обговорювали новий проєкт?
    — Ні, ми не обговорювали його. Ми ще не вирішили, коли почнемо.

    '
