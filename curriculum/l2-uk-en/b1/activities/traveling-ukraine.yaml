version: '1.0'
module: traveling-ukraine
level: b1
inline:
- id: group-sort-transport-categories
  type: group-sort
  instruction: Розподіліть транспортні засоби за категоріями
  groups:
  - label: Залізничний (Railway)
    items:
    - потяг
    - поїзд
    - метро
    - трамвай
    - купе
    - плацкарт
  - label: Автомобільний (Road)
    items:
    - автобус
    - маршрутка
    - тролейбус
    - таксі
  - label: Повітряний (Air)
    items:
    - літак
  - label: Водний (Water)
    items:
    - пором
- id: quiz-motion-prefixes-context
  type: quiz
  instruction: Оберіть правильне дієслово руху з відповідним префіксом
  items:
  - question: Ми ____ з Києва о двадцять першій годині.
    options:
    - виїхали
    - доїхали
    - переїхали
    - об'їхали
    correct: 0
  - question: Потяг ____ до Івано-Франківська рівно за розкладом.
    options:
    - приїхав
    - відійшов
    - проїхав
    - переїхав
    correct: 0
  - question: Щоб сісти на метро, вам треба ____ за той старий кіоск.
    options:
    - зайти
    - обійти
    - перейти
    - підійти
    correct: 0
  - question: Туристи з гідом довго ____ навколо великого міського парку.
    options:
    - обійшли
    - перейшли
    - дійшли
    - зайшли
    correct: 0
  - question: Ми обережно ____ через широкий міст на інший берег річки.
    options:
    - переїхали
    - доїхали
    - виїхали
    - об'їхали
    correct: 0
  - question: Вночі ми дуже швидко ____ Вінницю без жодної зупинки.
    options:
    - проїхали
    - приїхали
    - заїхали
    - від'їхали
    correct: 0
- id: match-up-focus-matching-landmarks-with-their-respective-cities-and-regions
  type: match-up
  instruction: З'єднайте архітектурну пам'ятку чи локацію з містом або регіоном
  pairs:
  - left: Хрещатик
    right: Київ
  - left: Києво-Печерська Лавра
    right: Київ
  - left: Площа Ринок
    right: Львів
  - left: Високий Замок
    right: Львів
  - left: Потьомкінські сходи
    right: Одеса
  - left: Гора Говерла
    right: Карпати
  - left: Курорт Буковель
    right: Карпати
  - left: Андріївський узвіз
    right: Київ
- id: fill-in-focus-completing-navigation-dialogues-with-motion-verbs-and-spatial-prepositions
  type: fill-in
  instruction: Заповніть пропуски в навігаційних діалогах
  items:
  - sentence: Вибачте, чи не підкажете, як ____ до Оперного театру?
    answer: дістатися
  - sentence: Вам потрібно пройти ____ два квартали.
    answer: прямо
  - sentence: Потім поверніть ____ на проспект Свободи.
    answer: ліворуч
  - sentence: На якій ____ мені потрібно виходити?
    answer: станції
  - sentence: Вам потрібно зробити ____ на синю лінію метро.
    answer: пересадку
  - sentence: А скільки ____ мені ще їхати до вокзалу?
    answer: зупинок
