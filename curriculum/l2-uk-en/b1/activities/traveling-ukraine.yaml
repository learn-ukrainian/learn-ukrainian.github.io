version: '1.0'
module: traveling-ukraine
level: b1
inline:
- id: group-sort
  type: group-sort
  instruction: Розподіліть транспортні засоби за чотирма основними категоріями
  groups:
  - label: Залізничний транспорт
    items:
    - потяг
    - електричка
    - трамвай
  - label: Автомобільний транспорт
    items:
    - автобус
    - маршрутка
    - таксі
    - фура
  - label: Повітряний транспорт
    items:
    - літак
    - гелікоптер
  - label: Водний транспорт
    items:
    - корабель
    - пором
    - катер
- id: fill-in
  type: fill-in
  instruction: Доповніть діалоги правильними словами з контексту
  items:
  - sentence: Ми ____ з Києва пізно ввечері на автомобілі.
    answer: виїхали
    options:
    - виїхали
    - доїхали
    - пересіли
  - sentence: Нарешті ми щасливо ____ до нашого готелю в горах!
    answer: доїхали
    options:
    - доїхали
    - проїхали
    - виїхали
  - sentence: У Львові нам довелося змінити маршрут і ми ____ на інший автобус.
    answer: пересіли
    options:
    - пересіли
    - під'їхали
    - відійшли
  - sentence: Наш швидкісний поїзд ____ від перону рівно за розкладом.
    answer: відійшов
    options:
    - відійшов
    - зайшов
    - перейшов
  - sentence: Ми дуже поспішаємо, адже наш літак ____ вже через годину.
    answer: вилітає
    options:
    - вилітає
    - прилітає
    - перелітає
  - sentence: Щоб опинитися на іншому боці вулиці, ми швидко ____ дорогу.
    answer: перейшли
    options:
    - перейшли
    - обійшли
    - зійшли
  - sentence: Вони ____ повз старий банк, навіть не зупиняючись.
    answer: проїхали
    options:
    - проїхали
    - доїхали
    - переїхали
  - sentence: Ми довго ____ гірською стежкою вгору, щоб побачити озеро.
    answer: йшли
    options:
    - йшли
    - летіли
    - пливли
  - sentence: Будь ласка, зупиніть маршрутку на наступній ____.
    answer: зупинці
    options:
    - зупинці
    - станції
    - вокзалі
  - sentence: Дайте мені, будь ласка, квиток туди й ____.
    answer: назад
    options:
    - назад
    - обратно
    - додому
  - sentence: Візьміть сто гривень за проїзд, і передайте мені, будь ласка, ____.
    answer: решту
    options:
    - решту
    - здачу
    - остачу
  - sentence: Підкажіть, о котрій годині ____ мій автобус до Одеси?
    answer: приїжджає
    options:
    - приїжджає
    - відходить
    - вилітає
- id: match-up
  type: match-up
  instruction: З'єднайте відомі українські пам'ятки з містами або регіонами, де вони
    розташовані
  pairs:
  - left: Софія Київська
    right: Київ
  - left: Вулиця Хрещатик
    right: Київ
  - left: Києво-Печерська Лавра
    right: Київ
  - left: Площа Ринок
    right: Львів
  - left: Високий Замок
    right: Львів
  - left: Річка Смотрич
    right: Кам'янець-Подільський
  - left: Стара Фортеця
    right: Кам'янець-Подільський
  - left: Потьомкінські сходи
    right: Одеса
  - left: Морський порт
    right: Одеса
  - left: Гора Говерла
    right: Карпати
  - left: Озеро Синевир
    right: Карпати
  - left: Курорт Буковель
    right: Карпати
- id: quiz
  type: quiz
  instruction: Оберіть правильні дієслова руху та прийменники
  items:
  - question: Вибачте, як _____ до історичного центру міста?
    options:
    - дістатися
    - перейти
    - обійти
    - зупинитися
    correct: 0
  - question: Вам потрібно обережно пройти _____ цей великий парк відпочинку.
    options:
    - через
    - повз
    - вздовж
    - до
    correct: 0
  - question: Йдіть неспішно пішки _____ річки Дніпро аж до пішохідного мосту.
    options:
    - вздовж
    - через
    - навпроти
    - на
    correct: 0
  - question: Обережно проїдьте _____ старий національний банк і зупиніться.
    options:
    - повз
    - крізь
    - до
    - через
    correct: 0
  - question: Як найкраще _____ до головного залізничного вокзалу на автомобілі?
    options:
    - доїхати
    - долетіти
    - підійти
    - відійти
    correct: 0
  - question: Наша нова аптека розташована безпосередньо _____ двох вулиць.
    options:
    - на розі
    - на перехресті
    - вздовж
    - через
    correct: 0
  - question: Спочатку вам треба _____ широку вулицю по розміченому пішохідному переходу.
    options:
    - перейти
    - пройти
    - обійти
    - зійти
    correct: 0
  - question: Щоб повністю оглянути цю величну фортецю, ми вирішили _____ її з усіх
      боків.
    options:
    - обійти
    - перейти
    - підійти
    - відійти
    correct: 0
  - question: Конструкція «їхати до Києва» вказує на _____ вашого маршруту.
    options:
    - кінцевий пункт
    - загальний напрямок
    - швидкість руху
    - тип транспорту
    correct: 0
  - question: Який відмінок ми використовуємо в конструкції «подорожувати Україною»?
    options:
    - Орудний
    - Місцевий
    - Знахідний
    - Родовий
    correct: 0
  - question: Вам доведеться дуже обережно пройти _____ цей густий натовп туристів.
    options:
    - крізь
    - повз
    - вздовж
    - від
    correct: 0
  - question: Туристи вирішили сьогодні пішки _____ на знаменитий Високий Замок.
    options:
    - піднятися
    - спуститися
    - зійти
    - зайти
    correct: 0
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте типові русизми та кальки в реченнях про подорож
  items:
  - sentence: Наш потяг відправляється о сьомій годині.
    error: відправляється
    correction: відходить
    error_type: word
    options:
    - відходить
    - виїжджає
    - вилітає
    explanation: Традиційно поїзди та електрички 'відходять', а не 'відправляються'.
  - sentence: Автобус до Львова відправляється за розкладом.
    error: відправляється
    correction: виїжджає
    error_type: word
    options:
    - виїжджає
    - відходить
    - вилітає
    explanation: Колісний транспорт (автобуси, автомобілі) 'виїжджає'.
  - sentence: Мій літак відправляється через одну годину.
    error: відправляється
    correction: вилітає
    error_type: word
    options:
    - вилітає
    - відпливає
    - виїжджає
    explanation: Про літаки українською кажуть, що вони 'вилітають'.
  - sentence: Наша нова аптека знаходиться просто на углу вулиці.
    error: на углу
    correction: на розі
    error_type: phrase
    options:
    - на розі
    - на кутку
    - на перехресті
    explanation: Слово 'угол' — це русизм. Будівля на перетині вулиць розташована
      'на розі'.
  - sentence: Дайте мені, будь ласка, один квиток туди і обратно.
    error: обратно
    correction: назад
    error_type: word
    options:
    - назад
    - навпаки
    - додому
    explanation: Правильний український вислів — 'туди й назад' або 'зворотний квиток'.
  - sentence: Візьміть за проїзд. А де моя здача?
    error: здача
    correction: решта
    error_type: word
    options:
    - решта
    - остача
    - повернення
    explanation: Гроші, які вам повертають після оплати, називаються 'решта'.
  - sentence: Водію, зупиніть на слідуючій зупинці, будь ласка.
    error: слідуючій
    correction: наступній
    error_type: word
    options:
    - наступній
    - черговій
    - майбутній
    explanation: Українською мовою правильно казати 'наступна зупинка'.
  - sentence: Я хочу купити білет на швидкісний потяг Інтерсіті.
    error: білет
    correction: квиток
    error_type: word
    options:
    - квиток
    - пропуск
    - талон
    explanation: Для проїзду в громадському транспорті купують 'квиток', а не білет.
  - sentence: Де знаходиться найближчий ж/д вокзал?
    error: ж/д
    correction: залізничний
    error_type: word
    options:
    - залізничний
    - поїздовий
    - рейковий
    explanation: Абревіатура 'ж/д' походить від російського 'железнодорожный'. Українською
      — 'залізничний'.
  - sentence: В Івано-Франківську мені потрібно пересісти в інший автобус.
    error: в
    correction: на
    error_type: word
    options:
    - на
    - до
    - через
    explanation: 'Дієслово ''пересісти'' вимагає прийменника ''на'' та Знахідного
      відмінка: ''пересісти на інший автобус''.'
  - sentence: Ми доїхали в Київ дуже пізно вночі.
    error: в Київ
    correction: до Києва
    error_type: construction
    options:
    - до Києва
    - Києвом
    - по Києву
    explanation: 'Коли ми вказуємо на кінцевий пункт подорожі, використовуємо конструкцію
      ''до'' + Родовий відмінок: ''до Києва''.'
  - sentence: Ми з друзями довго мандрували по Карпатам.
    error: по Карпатам
    correction: Карпатами
    error_type: construction
    options:
    - Карпатами
    - в Карпати
    - через Карпати
    explanation: 'Для позначення маршруту природно використовувати Орудний відмінок
      без прийменника: ''мандрувати Карпатами''.'
- id: free-write
  type: essay-response
  instruction: Напишіть розповідь про свою подорож
  prompt: Напишіть розгорнуту історію про вашу поїздку до будь-якого українського
    міста. Опишіть свій маршрут, використавши щонайменше 5 видів транспорту та 10
    різних дієслів руху. Згадайте хоча б 3 відомі історичні пам'ятки та обов'язково
    використовуйте слова-маркери хронологічної послідовності (спочатку, потім, далі,
    нарешті).
  min_words: 50
