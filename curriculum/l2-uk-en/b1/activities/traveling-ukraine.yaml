- type: essay-response
  prompt: Напишіть коротку розповідь (10-15 речень) про вашу уявну подорож до одного
    з міст України. Обов'язково використайте принаймні 10 різних дієслів руху з префіксами
    (наприклад, виїхали, доїхали, обійшли тощо).
  min_words: 50
  model_answer: Минулого місяця ми з друзями вирішили поїхати до мальовничої Одеси.
    Наша подорож почалася ввечері, коли ми вийшли з дому і виїхали на залізничний
    вокзал. Ми швидко доїхали до платформи і сіли в наш потяг. Вночі ми проїхали багато
    маленьких сіл і міст. Вранці наш потяг нарешті приїхав до Одеси. Ми вийшли з вагона
    і відразу пішли до нашого готелю. Потім ми обійшли весь історичний центр міста
    і Дерибасівську вулицю. Ми також зайшли в гарну затишну кав'ярню. Після цього
    ми повільно спустилися Потьомкінськими сходами прямо до моря. Увечері ми поїхали
    назад на вокзал, щоб повернутися додому.
  evaluation_criteria:
  - Використання 10 і більше префіксальних дієслів руху
  - Логічна послідовність розповіді (планування, дорога туди, прогулянка, дорога назад)
  - Правильне використання відмінків для опису маршруту
