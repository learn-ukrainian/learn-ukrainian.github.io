    - код
    - звук
  - id: 4
    answer: факт
    options:
    - факт
    - міф
    - сон
    - жарт
  - id: 5
    answer: думки
    options:
    - думки
    - мови
    - гри
    - сили
  - id: 6
    answer: позиція
    options:
    - позиція
    - робота
    - книга
    - школа
  - id: 7
    answer: перевірку
    options:
    - перевірку
    - зупинку
    - доставку
    - оцінку
  - id: 8
    answer: журналіст
    options:
    - журналіст
    - водій
    - лікар
    - актор
  - id: 9
    answer: джерело
    options:
    - джерело
    - місце
    - слово
    - право
  - id: 10
    answer: видання
    options:
    - видання
    - дерево
    - місто
    - завдання
  - id: 11
    answer: джинсу
    options:
    - джинсу
    - правду
    - історію
    - науку
  - id: 12
    answer: редакція
    options:
    - редакція
    - фабрика
    - лікарня
    - станція
  - id: 13
    answer: актуальні
    options:
    - актуальні
