- type: match-up
  title: 'Знайдіть відповідники: терміни та їхні значення'
  pairs:
  - left: ЗМІ
    right: Засоби масової інформації, преса, телебачення, радіо
  - left: Джинса
    right: Прихована політична або комерційна реклама
  - left: Лід
    right: Перший абзац новини, який відповідає на головні питання
  - left: Шапка сайту
    right: Верхня частина вебсторінки з логотипом та меню
  - left: Стрічка новин
    right: Перелік коротких повідомлень у хронологічному порядку
  - left: Клікбейт
    right: Гучний заголовок, створений для привернення уваги
  - left: Анонімне джерело
    right: Інформатор, ім'я якого журналіст не розкриває
  - left: Редакція
    right: Колектив журналістів та редакторів, які створюють контент
  instruction: З'єднайте відповідні елементи.
- type: fill-in
  title: Доповніть речення
  items:
  - sentence: Журналісти завжди повинні перевіряти інформацію і посилатися на надійне
      джерело.
    answer: джерело
    options:
    - джерело
    - місце
    - питання
    - правило
    explanation: Інформація має походити з перевірених і надійних джерел.
  - sentence: Коли політик платить за позитивну статтю про себе, це називається джинса.
    answer: джинса
    options:
    - джинса
    - аналітика
    - огляд
    - правда
    explanation: Так називають приховану замовну рекламу.
  - sentence: Журналісти часто пишуть про актуальні події, тобто про те, що важливо
      саме сьогодні.
    answer: актуальні
    options:
    - актуальні
    - фактичні
    - історичні
    - майбутні
    explanation: Слово 'актуальний' українською означає 'сучасний', 'важливий'.
  - sentence: Для економії місця заголовок новини часто пишуть без дієслів.
    answer: заголовок
    options:
    - заголовок
    - словник
    - підпис
    - автор
    explanation: Це явище називається номінативним реченням.
  - sentence: Читати українські новини — це чудовий спосіб покращити своє розуміння
      мови.
    answer: новини
    options:
    - новини
    - думки
    - словники
    - питання
    explanation: Новини допомагають зрозуміти сучасну лексику та контекст.
  - sentence: Кожна якісна стаття повинна чітко розрізняти об'єктивний факт та суб'єктивну
      думку.
    answer: факт
    options:
    - факт
    - міф
    - план
    - текст
    explanation: Якісна журналістика завжди відокремлює факти від коментарів.
  - sentence: Щоб швидко знайти потрібну рубрику на сайті, подивіться на його шапку.
    answer: шапку
    options:
    - шапку
    - стрічку
    - статтю
    - панель
    explanation: Шапка сайту допомагає зрозуміти рубрикацію ресурсу.
  - sentence: Перший абзац статті, який називається лід, має дати відповіді на найважливіші
      питання.
    answer: лід
    options:
    - лід
    - фінал
    - висновок
    - коментар
    explanation: Лід — це серце матеріалу, яке має відповідати на п'ять фундаментальних
      питань.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Складіть речення з поданих слів
  items:
  - words:
    - Ми
    - читаємо
    - свіжі
    - новини
    - щодня
    answer: Ми читаємо свіжі новини щодня
  - words:
    - Ця
    - стаття
    - має
    - гучний
    - заголовок
    answer: Ця стаття має гучний заголовок
  - words:
    - Редакція
    - завжди
    - перевіряє
    - всі
    - факти
    answer: Редакція завжди перевіряє всі факти
  - words:
    - Я
    - не
    - довіряю
    - анонімним
    - джерелам
    answer: Я не довіряю анонімним джерелам
  - words:
    - Кожна
    - новина
    - має
    - бути
    - об'єктивною
    answer: Кожна новина має бути об'єктивною
  - words:
    - Це
    - дуже
    - відомі
    - незалежні
    - ЗМІ
    answer: Це дуже відомі незалежні ЗМІ
  - words:
    - Новини
    - завжди
    - треба
    - читати
    - уважно
    answer: Новини завжди треба читати уважно
  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: Виправте помилки в реченнях
  items:
  - sentence: Журналіст завжди має приймати участь у розслідуванні.
    error: приймати участь
    answer: брати участь
    options:
    - брати участь
    - робити участь
    - давати участь
    - мати участь
    explanation: Українською правильно казати 'брати участь'. 'Приймати участь' —
      це калька з російської.
  - sentence: Ця цифра — це актуальний факт про економіку.
    error: актуальний
    answer: фактичний
    options:
    - фактичний
    - правильний
    - сучасний
    - свіжий
    explanation: Англійське actual перекладається як 'фактичний' або 'справжній'.
      В українській мові 'актуальний' означає 'сучасний' або 'на часі'.
  - sentence: Сьогодні я получив дуже важливу інформацію від джерела.
    error: получив
    answer: отримав
    options:
    - отримав
    - взяв
    - купив
    - знайшов
    explanation: Слово 'получати' — це русизм. Правильно вживати дієслово 'отримувати'.
  - sentence: Самий кращий кореспондент працює у цьому виданні.
    error: Самий кращий
    answer: Найкращий
    options:
    - Найкращий
    - Більш кращий
    - Дуже кращий
    - Кращий самий
    explanation: Ступені порівняння з часткою 'самий' — це русизм. Правильно казати
      'найкращий'.
  - sentence: Вона відноситься до цієї новини дуже критично.
    error: відноситься
    answer: ставиться
    options:
    - ставиться
    - дивиться
    - бачить
    - робить
    explanation: Слово 'відноситися' вживається в математиці або коли йдеться про
      стосунки між речами. До новин чи подій людина 'ставиться'.
  - sentence: Він любить кушати і читати стрічку новин.
    error: кушати
    answer: їсти
    options:
    - їсти
    - пити
    - брати
    - готувати
    explanation: '''Кушати'' — це русизм. Українською правильно вживати дієслово ''їсти''.'
  instruction: Знайдіть і виправте помилку в реченні.
- type: true-false
  title: Правда чи брехня?
  items:
  - statement: Заголовки українських новин часто не мають дієслова.
    correct: true
    explanation: Так, це називається номінативним реченням, що робить заголовок коротким.
  - statement: Слово 'джинса' означає якісну аналітичну статтю.
    correct: false
    explanation: Ні, 'джинса' — це прихована замовна реклама або пропаганда.
  - statement: Читання лише заголовків є найкращим способом зрозуміти новину.
    correct: false
    explanation: Ні, заголовки часто використовують клікбейт і не передають повної
      картини.
  - statement: Правило трьох джерел означає, що новину треба перевірити в трьох різних
      місцях.
    correct: true
    explanation: Це золотий стандарт журналістики для уникнення фейків.
  - statement: Слово 'актуальний' українською означає те саме, що й actual англійською.
    correct: false
    explanation: Ні, це хибні друзі перекладача. 'Актуальний' означає сучасний, той,
      що на часі.
  - statement: Лід — це останній абзац новини, який підбиває підсумки.
    correct: false
    explanation: Лід — це перший абзац, який містить найважливішу інформацію.
  - statement: Офіційні ЗМІ в Україні не мають права критикувати владу.
    correct: false
    explanation: Незалежні ЗМІ та Суспільне мовлення активно критикують і контролюють
      дії влади.
  - statement: Активні дієприкметники часто використовуються в новинах для економії
      місця.
    correct: true
    explanation: Так, хоча вони є стилістично важкими, їх часто вживають у коротких
      повідомленнях.
  instruction: Визначте, чи твердження правильне.
- type: select
  title: Оберіть усі правильні відповіді
  items:
  - question: Які з цих слів є русизмами, яких треба уникати?
    options:
    - text: получати
      correct: true
    - text: отримувати
      correct: false
    - text: кушати
      correct: true
    - text: їсти
      correct: false
    min_correct: 2
    explanation: Слова 'получати' та 'кушати' є русизмами.
  - question: Що входить до обов'язкових елементів правила 'п'яти запитань' у ліді?
    options:
    - text: Хто?
      correct: true
    - text: Де?
      correct: true
    - text: Скільки коштує?
      correct: false
    - text: Коли?
      correct: true
    - text: Який колір?
      correct: false
    min_correct: 3
    explanation: 'Головні питання: Хто? Що? Де? Коли? Чому?'
  - question: Які характеристики притаманні надійному джерелу інформації?
    options:
    - text: Офіційні державні установи
      correct: true
    - text: Анонімні канали в месенджерах
      correct: false
    - text: Видання з високою репутацією
      correct: true
    - text: Сайти без вказаних авторів
      correct: false
    min_correct: 2
    explanation: Надійні джерела мають офіційний статус або перевірену репутацію.
  - question: Які дієслова можна використовувати для введення прямої мови в статті?
    options:
    - text: наголосив
      correct: true
    - text: зазначив
      correct: true
    - text: поїв
      correct: false
    - text: заявив
      correct: true
    min_correct: 3
    explanation: Це синоніми до слова 'сказав', які передають різні відтінки значення.
  - question: Що є типовими ознаками 'джинси' (замовної статті)?
    options:
    - text: Критика всіх політиків
      correct: false
    - text: Відсутність позначки про рекламу
      correct: true
    - text: Вихваляння однієї людини
      correct: true
    - text: Баланс двох протилежних думок
      correct: false
    min_correct: 2
    explanation: Джинса — це прихована реклама без критичного погляду.
  - question: Які слова є маркерами суб'єктивності (думки) в тексті?
    options:
    - text: можливо
      correct: true
    - text: очевидно
      correct: true
    - text: вчора
      correct: false
    - text: катастрофічний
      correct: true
    - text: опублікував
      correct: false
    min_correct: 3
    explanation: Оціночні та модальні слова показують особисте ставлення автора.
  instruction: Оберіть усі правильні відповіді.
- type: quiz
  title: Перевірте свої знання
  items:
  - question: Як українською мовою перекладається англійське слово headline?
    options:
    - text: заголовок
      correct: true
    - text: стаття
      correct: false
    - text: джерело
      correct: false
    - text: новина
      correct: false
    explanation: Заголовок — це назва статті, яка привертає увагу.
  - question: Що означає термін 'клікбейт' у сучасній журналістиці?
    options:
    - text: Гучний заголовок для привернення уваги
      correct: true
    - text: Коротка біографія автора тексту
      correct: false
    - text: Офіційне повідомлення від уряду
      correct: false
    - text: Перевірений науковий факт
      correct: false
    explanation: Клікбейт створюють, щоб змусити користувача натиснути на посилання.
  - question: Яка головна мета 'Суспільного мовлення' в Україні?
    options:
    - text: Об'єктивне інформування громадян без тиску
      correct: true
    - text: Продаж комерційної реклами в ефірі
      correct: false
    - text: Підтримка конкретної політичної партії
      correct: false
    - text: Публікація виключно позитивних новин
      correct: false
    explanation: Суспільне є незалежним мовником, який фінансується громадянами.
  - question: Яку частину новинного тексту журналісти називають словом 'лід'?
    options:
    - text: Перший абзац тексту
      correct: true
    - text: Фотографію до статті
      correct: false
    - text: Останнє речення матеріалу
      correct: false
    - text: Коментарі читачів
      correct: false
    explanation: Лід — це найважливіша частина тексту, що дає відповіді на основні
      питання.
  - question: Що в українській журналістиці називають сленговим словом 'джинса'?
    options:
    - text: Приховану замовну рекламу
      correct: true
    - text: Одяг для телевізійних репортерів
      correct: false
    - text: Стиль написання спортивних новин
      correct: false
    - text: Коротке повідомлення про погоду
      correct: false
    explanation: Це сленговий термін для недоброчесної оплаченої публікації.
  - question: Яке з цих слів означає об'єктивну подію, що реально відбулася?
    options:
    - text: факт
      correct: true
    - text: думка
      correct: false
    - text: позиція
      correct: false
    - text: оцінка
      correct: false
    explanation: Факт є об'єктивним, тоді як думка, позиція та оцінка — суб'єктивні.
  - question: Що означає слово 'актуальний' у сучасній українській мові?
    options:
    - text: Сучасний, важливий на цей момент
      correct: true
    - text: Фактичний, реальний у житті
      correct: false
    - text: Старий, забутий усіма людьми
      correct: false
    - text: Таємний, прихований від суспільства
      correct: false
    explanation: Актуальний — це той, що на часі. Це хибний друг англійського actual.
  - question: Як називається процес перевірки інформації перед її публікацією?
    options:
    - text: фактчекінг
      correct: true
    - text: клікбейт
      correct: false
    - text: джинса
      correct: false
    - text: еліпс
      correct: false
    explanation: Фактчекінг або перевірка фактів — це основа якісної журналістики.
  instruction: Оберіть правильну відповідь.
- type: cloze
  title: Заповніть пропуски
  passage: Читання українських {{1}} — це важливий крок до вільного володіння мовою.
    Спочатку зверніть увагу на {{2}} статті. Часто він написаний як номінативне речення
    без дієслова. Далі прочитайте {{3}}, тобто перший абзац тексту. У ньому міститься
    найважливіший {{4}} про подію. Намагайтеся відрізняти об'єктивну інформацію від
    авторської {{5}}. Якщо автор використовує емоційні слова, це його суб'єктивна
    {{6}}. Щоб не стати жертвою дезінформації, робіть {{7}} фактів. Кожен професійний
    {{8}} має підтверджувати свої слова. Для цього він використовує надійне {{9}}.
    Якщо ви бачите сумнівну новину, знайдіть інше незалежне {{10}}, щоб її перевірити.
    Оминайте сайти, які публікують так звану {{11}}, тобто приховану рекламу політика.
    Пам'ятайте, що якісна {{12}} не продає місце для новин. Завжди шукайте {{13}}
    новини, які розповідають про події об'єктивно. Читайте лише перевірені {{14}}
    масової інформації.
