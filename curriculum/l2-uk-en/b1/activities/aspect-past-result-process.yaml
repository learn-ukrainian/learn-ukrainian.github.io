- type: true-false
  title: 'Правила використання видів'
  instruction: 'Визначте, чи є твердження правильним.'
  items:
    - statement: 'Дієслова доконаного виду завжди описують тривалий процес.'
      correct: false
      explanation: 'Доконаний вид описує завершену дію та результат (точку), а не процес.'
    - statement: 'Маркер «вже» вимагає використання дієслова доконаного виду.'
      correct: true
      explanation: 'Слово вже констатує наявність результату, тому потрібен доконаний вид.'
    - statement: 'В українській мові минулий час утворюється за допомогою дієслова «бути» (наприклад, «я був читав»).'
      correct: false
      explanation: 'Український минулий час є синтетичним і не використовує допоміжного дієслова «бути».'
    - statement: 'У минулому часі дієслово узгоджується з родом підмета.'
      correct: true
      explanation: 'Так, чоловіки кажуть «я зробив», а жінки — «я зробила».'
    - statement: 'Недоконаний вид означає, що дія ніколи не закінчилася в реальності.'
      correct: false
      explanation: 'Це міф. Недоконаний вид просто залишає питання результату за кадром, фокусуючись на процесі.'
    - statement: 'Слова «можливо» та «ймовірно» допомагають пом''якшити висловлювання про результат.'
      correct: true
      explanation: 'Ці модальні слова роблять спілкування більш ввічливим і дипломатичним.'
    - statement: 'Для звіту керівнику краще використовувати недоконаний вид.'
      correct: false
      explanation: 'Керівники чекають результатів, тому професійний звіт будується на дієсловах доконаного виду.'
    - statement: 'Маркер «поступово» вказує на динаміку процесу і дружить з недоконаним видом.'
      correct: true
      explanation: 'Поступово описує розвиток дії в часі.'

- type: error-correction
  title: 'Виправлення типових помилок'
  instruction: 'Знайдіть граматичну помилку в реченні та оберіть правильний варіант.'
  items:
    - sentence: 'Я був читав цю цікаву книгу вчора ввечері.'
      error: 'був читав'
      answer: 'читав'
      options:
        - 'був читав'
        - 'читав'
        - 'був прочитав'
        - 'буду читав'
      explanation: 'Дієслово-зв''язка «був» є зайвим. Правильно використовувати синтетичну форму: читав.'
    - sentence: 'Ми нарешті вирішували цю складну математичну задачу.'
      error: 'вирішували'
      answer: 'вирішили'
      options:
        - 'вирішували'
        - 'вирішили'
        - 'рішали'
        - 'були вирішували'
      explanation: 'Маркер нарешті вимагає дієслова доконаного виду (результат): вирішили.'
    - sentence: 'Дівчина сказала: Я вже переклав цей текст.'
      error: 'переклав'
      answer: 'переклала'
      options:
        - 'переклав'
        - 'переклала'
        - 'переклали'
        - 'переклало'
      explanation: 'Жіночий рід у минулому часі вимагає закінчення -ла (переклала).'
    - sentence: 'Керівник запитав Де звіт?, а я відповів: Я його писав.'
      error: 'писав'
      answer: 'написав'
      options:
        - 'писав'
        - 'написав'
        - 'був писав'
        - 'пишу'
      explanation: 'Для підтвердження готового результату потрібен доконаний вид: написав.'
    - sentence: 'Я кушав смачний борщ на обід.'
      error: 'кушав'
      answer: 'їв'
      options:
        - 'кушав'
        - 'їв'
        - 'їду'
        - 'з''їв'
      explanation: 'Слово «кушати» — це русизм. Правильно українською: їсти (я їв).'
    - sentence: 'Він довго вирішив цю складну проблему.'
      error: 'вирішив'
      answer: 'вирішував'
      options:
        - 'вирішив'
        - 'вирішував'
        - 'був вирішив'
        - 'рішив'
      explanation: 'Слово довго вказує на тривалий процес, тому потрібен недоконаний вид: вирішував.'

- type: mark-the-words
  title: 'Пошук дієслів доконаного виду'
  instruction: 'Знайдіть усі дієслова доконаного виду (результат) у цьому тексті.'
  text: 'Учора ми весь день працювали над проєктом. Ближче до вечора ми нарешті спакували речі. Потім ми їхали в нову квартиру. Коли ми приїхали, ми швидко занесли коробки. Ми успішно підписали договір. Ми все зробили. Тепер я вже переїхав.'
  answers:
    - 'спакували'
    - 'приїхали'
    - 'занесли'
    - 'підписали'
    - 'зробили'
    - 'переїхав'

- type: select
  title: 'Оберіть правильні маркери результату'
  instruction: 'Які з цих слів є маркерами досягнутого результату і вимагають доконаного виду? Оберіть усі правильні варіанти.'
  items:
