- type: quiz
  title: 'Процес чи результат: перевірка розуміння'
  instruction: 'Оберіть правильний варіант відповіді для кожного запитання.'
  items:
    - question: 'Який вид дієслова фокусується на тривалості дії та її характері?'
      options:
        - text: 'недоконаний вид'
          correct: true
        - text: 'доконаний вид'
          correct: false
        - text: 'обидва види'
          correct: false
        - text: 'жоден з них'
          correct: false
      explanation: 'Недоконаний вид описує дію в її розвитку та відповідає на питання «Що робив?», фокусуючись на тривалості.'
    - question: 'Який маркер часу найчастіше використовується з дієсловами доконаного виду?'
      options:
        - text: 'нарешті'
          correct: true
        - text: 'довго'
          correct: false
        - text: 'весь день'
          correct: false
        - text: 'поступово'
          correct: false
      explanation: 'Слово нарешті показує, що результату чекали довго, і фіксує успішний фінал (доконаний вид).'
    - question: 'Як правильно сказати українською мовою "I wrote the report and sent it"?'
      options:
        - text: 'Я написав звіт і надіслав його.'
          correct: true
        - text: 'Я писав звіт і надсилав його.'
          correct: false
        - text: 'Я був писав звіт і надіслав.'
          correct: false
        - text: 'Я писав звіт і надіслав його.'
          correct: false
      explanation: 'В українській мові для звіту про успішно завершену дію використовується доконаний вид (написав, надіслав).'
    - question: 'Яку граматичну помилку містить речення «Я був робив домашнє завдання»?'
      options:
        - text: 'Зайве дієслово-зв''язка «був».'
          correct: true
        - text: 'Неправильне закінчення дієслова.'
          correct: false
        - text: 'Помилка в узгодженні роду.'
          correct: false
        - text: 'Неправильний порядок слів.'
          correct: false
      explanation: 'В українській мові минулий час є синтетичним і не потребує допоміжного дієслова «бути».'
    - question: 'Яке закінчення в минулому часі повинна використовувати жінка для слова «зробити»?'
      options:
        - text: '-ла (зробила)'
          correct: true
        - text: '-в (зробив)'
          correct: false
        - text: '-ло (зробило)'
          correct: false
        - text: '-ли (зробили)'
          correct: false
      explanation: 'Дієслово в минулому часі узгоджується з підметом у роді: жіночий рід має закінчення -ла.'
    - question: 'Яке дієслово в реченні «Минулої суботи ми збудували дитячий майданчик» показує зміну реальності?'
      options:
        - text: 'збудували'
          correct: true
        - text: 'минулої'
          correct: false
        - text: 'дитячий'
          correct: false
        - text: 'майданчик'
          correct: false
      explanation: 'Дієслово збудували (доконаний вид) фіксує перемогу та показує, що об''єкт готовий.'
    - question: 'Який маркер вказує на повільну динаміку розвитку дії (недоконаний вид)?'
      options:
        - text: 'поступово'
          correct: true
        - text: 'миттєво'
          correct: false
        - text: 'раптом'
          correct: false
        - text: 'вже'
          correct: false
      explanation: 'Слово поступово показує процес, який розгортається в часі, тому вимагає недоконаного виду.'
    - question: 'Чому речення «Студенти нарешті вирішували складну задачу» є граматично неправильним?'
      options:
        - text: 'Слово «нарешті» вимагає доконаного виду (вирішили).'
          correct: true
        - text: 'Слово «нарешті» вимагає майбутнього часу.'
          correct: false
        - text: 'Потрібно використовувати дієслово-зв''язку.'
          correct: false
        - text: 'Слово «задачу» стоїть у неправильному відмінку.'
          correct: false
      explanation: 'Маркер нарешті створює контекстний тиск на дієслово і вимагає результату (доконаний вид: вирішили).'

- type: fill-in
  title: 'Маркери тривалості та недоконаний вид'
  instruction: 'Доповніть речення правильним маркером або дієсловом недоконаного виду.'
  items:
    - sentence: 'Ми ремонтували машину _____ день, і дуже втомилися.'
      answer: 'весь'
      options:
        - 'весь'
        - 'вже'
        - 'нарешті'
        - 'успішно'
      explanation: 'Маркер весь день підкреслює, що дія (ремонтували) займала весь доступний час.'
    - sentence: 'Учені _____ досліджували цю складну академічну проблему.'
      answer: 'довго'
      options:
        - 'довго'
        - 'миттєво'
        - 'раптом'
        - 'до кінця'
      explanation: 'Слово довго вказує на тривалий процес (досліджували).'
    - sentence: 'Сніг _____ танув під яскравим весняним сонцем.'
      answer: 'поступово'
      options:
        - 'поступово'
        - 'успішно'
        - 'нарешті'
        - 'вже'
      explanation: 'Маркер поступово показує повільну динаміку процесу танення.'
    - sentence: 'Я чекав на тебе цілу _____, де ти був?'
      answer: 'годину'
      options:
        - 'годину'
        - 'миттєво'
        - 'до кінця'
        - 'нарешті'
      explanation: 'Слово годину зазначає точний відрізок часу, протягом якого тривав процес очікування.'
    - sentence: 'Діти гралися у дворі _____ час, поки не пішов дощ.'
      answer: 'тривалий'
      options:
        - 'тривалий'
        - 'вже'
        - 'раптом'
        - 'миттєво'
      explanation: 'Фраза тривалий час є формальним маркером довгого процесу.'
    - sentence: 'Ми _____ обговорювали новий контракт із нашими партнерами.'
      answer: 'весь тиждень'
      options:
        - 'весь тиждень'
        - 'нарешті'
        - 'вже'
        - 'успішно'
      explanation: 'Маркер весь тиждень добре поєднується з дієсловом обговорювали (процес).'
    - sentence: 'Вона _____ шукала свої ключі від квартири.'
      answer: 'дуже довго'
      options:
        - 'дуже довго'
        - 'миттєво'
        - 'раптом'
        - 'нарешті'
      explanation: 'Фраза дуже довго описує процес пошуку в недоконаному виді.'
    - sentence: 'Програмісти _____ писали новий код для нашого проєкту.'
      answer: 'всю ніч'
      options:
        - 'всю ніч'
        - 'вже'
        - 'нарешті'
        - 'до кінця'
      explanation: 'Маркер всю ніч підкреслює інтенсивний тривалий процес роботи.'

- type: fill-in
  title: 'Додавання маркера результату'
  instruction: 'Оберіть правильний маркер, який перетворює процес на досягнення результату (доконаний вид).'
  items:
    - sentence: 'Я _____ переклав цей складний текст на українську мову.'
      answer: 'вже'
      options:
        - 'вже'
        - 'довго'
        - 'поступово'
        - 'весь день'
      explanation: 'Маркер вже констатує, що факт перекладу відбувся і результат актуальний.'
    - sentence: 'Ми _____ знайшли правильну адресу після години пошуків.'
      answer: 'нарешті'
      options:
        - 'нарешті'
        - 'довго'
        - 'поступово'
        - 'тривалий час'
      explanation: 'Слово нарешті показує успішний фінал після довгих пошуків.'
    - sentence: 'Хірург _____ провів складну операцію.'
      answer: 'успішно'
      options:
        - 'успішно'
        - 'довго'
        - 'поступово'
        - 'годину'
      explanation: 'Маркер успішно дає якісну оцінку завершеній дії.'
    - sentence: 'Він додивився цікавий фільм _____.'
      answer: 'до кінця'
      options:
        - 'до кінця'
        - 'довго'
        - 'поступово'
        - 'весь день'
      explanation: 'Фраза до кінця показує абсолютну вичерпаність дії.'
    - sentence: 'Вона _____ згадала його ім''я, коли побачила фотографію.'
      answer: 'раптом'
      options:
        - 'раптом'
        - 'довго'
        - 'поступово'
        - 'весь день'
      explanation: 'Маркер раптом позначає швидкість досягнення результату (згадала).'
    - sentence: 'Я _____ зробив усі домашні завдання на завтра.'
      answer: 'вже'
      options:
        - 'вже'
        - 'довго'
        - 'поступово'
        - 'годину'
      explanation: 'Слово вже підтверджує, що всі завдання готові.'
    - sentence: 'Ми _____ підписали цей важливий контракт.'
      answer: 'нарешті'
      options:
        - 'нарешті'
        - 'довго'
        - 'поступово'
        - 'тривалий час'
      explanation: 'Слово нарешті підкреслює успіх після тривалих переговорів.'
    - sentence: 'Проблема була _____ вирішена нашою командою.'
      answer: 'миттєво'
      options:
        - 'миттєво'
        - 'довго'
        - 'поступово'
        - 'весь день'
      explanation: 'Слово миттєво акцентує на швидкому і успішному фіналі.'

- type: group-sort
  title: 'Процес чи результат?'
  instruction: 'Розподіліть дії у дві групи: ті, що означають процес, і ті, що означають результат.'
  groups:
    - name: 'Процес (Недоконаний вид)'
      items:
        - 'довго писав'
        - 'готував вечерю'
        - 'ми будували хату'
        - 'весь день читала'
        - 'поступово танув'
        - 'шукав ключі'
        - 'гралися у дворі'
        - 'обговорювали контракт'
    - name: 'Результат (Доконаний вид)'
      items:
        - 'вже написав'
        - 'приготував вечерю'
        - 'ми збудували хату'
        - 'нарешті прочитала'
        - 'успішно завершив'
        - 'знайшов ключі'
        - 'купив квитки'
        - 'підписали контракт'

- type: unjumble
  title: 'Побудова речень із маркерами часу'
  instruction: 'Складіть речення з поданих слів у правильному порядку.'
  items:
    - words: ['вчора', 'наша', 'велика', 'родина', 'дуже', 'активно', 'будувала', 'нову', 'хату', 'весь', 'день']
      answer: 'Вчора наша велика родина дуже активно будувала нову хату весь день'
    - words: ['головний', 'архітектор', 'нарешті', 'успішно', 'створив', 'геніальний', 'проєкт', 'для', 'цього', 'сучасного', 'міста']
      answer: 'Головний архітектор нарешті успішно створив геніальний проєкт для цього сучасного міста'
    - words: ['я', 'вже', 'повністю', 'переклав', 'цей', 'дуже', 'складний', 'технічний', 'текст', 'на', 'українську', 'мову']
      answer: 'Я вже повністю переклав цей дуже складний технічний текст на українську мову'
    - words: ['розумні', 'студенти', 'цього', 'університету', 'нарешті', 'разом', 'вирішили', 'дуже', 'складну', 'математичну', 'задачу']
      answer: 'Розумні студенти цього університету нарешті разом вирішили дуже складну математичну задачу'
    - words: ['молода', 'жінка', 'дуже', 'довго', 'та', 'уважно', 'шукала', 'свої', 'маленькі', 'ключі', 'від', 'квартири']
      answer: 'Молода жінка дуже довго та уважно шукала свої маленькі ключі від квартири'
    - words: ['наша', 'команда', 'розробників', 'минулого', 'тижня', 'успішно', 'завершила', 'цей', 'великий', 'та', 'важливий', 'проєкт']
      answer: 'Наша команда розробників минулого тижня успішно завершила цей великий та важливий проєкт'

