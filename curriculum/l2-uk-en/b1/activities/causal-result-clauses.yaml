      right: 'тому ми вирішили залишитися вдома.'
    - left: 'Оскільки ви не надали документи,'
      right: 'ми не можемо розглянути ваш запит.'
    - left: 'Проєкт був зданий вчасно'
      right: 'завдяки тому, що команда працювала на вихідних.'
    - left: 'Місто виглядає святково,'
      right: 'тому що наближається Різдво.'
    - left: 'Ти виконав усі завдання і пройшов тест,'
      right: 'отже, ти готовий до наступного рівня.'
    - left: 'Будівництво дороги призупинили'
