- type: fill-in
  title: 'Заповніть пропуски сполучниками'
  instruction: 'Оберіть правильний сполучник для кожного речення.'
  items:
    - sentence: 'Вчора цілий день ішов дощ, _____ ми залишилися вдома.'
      answer: 'тому'
      options:
        - 'тому'
        - 'бо'
        - 'оскільки'
        - 'що'
    - sentence: 'Я не прийшов на лекцію, _____ захворів.'
      answer: 'бо'
      options:
        - 'бо'
        - 'отже'
        - 'тому'
        - 'внаслідок'
    - sentence: '_____ ви не надали всі документи, ми відхиляємо заяву.'
      answer: 'Оскільки'
      options:
        - 'Оскільки'
        - 'Тому що'
        - 'Бо'
        - 'Тому'
    - sentence: 'Віктор не був на роботі, _____ він поїхав у відрядження.'
      answer: 'тому що'
      options:
        - 'тому що'
        - 'тому'
        - 'отже'
        - 'внаслідок'
    - sentence: 'Місто виглядає святково, _____ наближається Різдво.'
      answer: 'тому що'
      options:
        - 'тому що'
        - 'тому'
        - 'отже'
        - 'завдяки'
    - sentence: 'У нас є всі матеріали, _____, ми можемо починати експеримент.'
      answer: 'отже'
      options:
        - 'отже'
        - 'бо'
        - 'оскільки'
        - 'через те що'
    - sentence: 'Рейс скасували _____ видимість була нульовою.'
      answer: 'через те що'
      options:
        - 'через те що'
        - 'завдяки тому що'
        - 'отже'
        - 'тому'
    - sentence: '_____ сильного вітру кілька дерев впали на дорогу.'
      answer: 'Внаслідок'
      options:
        - 'Внаслідок'
        - 'Тому що'
        - 'Бо'
        - 'Оскільки'
    - sentence: 'Ми виграли цей матч _____ воротар здійснив неймовірний сейв.'
      answer: 'завдяки тому що'
      options:
        - 'завдяки тому що'
        - 'внаслідок того що'
        - 'через те що'
        - 'тому що'
    - sentence: 'Роботу лабораторії припинили _____ з відсутністю фінансування.'
      answer: 'у зв''язку'
      options:
        - 'у зв''язку'
        - 'завдяки'
        - 'тому'
        - 'отже'
    - sentence: 'Він дуже багато працював, _____ отримав підвищення.'
      answer: 'тому'
      options:
        - 'тому'
        - 'бо'
        - 'оскільки'
        - 'через те що'
    - sentence: '_____ погода різко погіршилася, концерт перенесли.'
      answer: 'Оскільки'
      options:
        - 'Оскільки'
        - 'Тому що'
        - 'Бо'
        - 'Тому'

- type: error-correction
  title: 'Виправте логічні та орфографічні помилки'
  instruction: 'Знайдіть та виправте помилку в кожному реченні.'
  items:
    - sentence: 'Він запізнився, томущо були великі затори.'
      error: 'томущо'
      answer: 'тому що'
      options:
        - 'тому що'
        - 'тому-що'
        - 'бо'
        - 'тому'
      explanation: 'Сполучник "тому що" завжди пишеться як два окремі слова.'
    - sentence: 'Я читаю цю книгу, тому-що вона дуже цікава.'
      error: 'тому-що'
      answer: 'тому що'
      options:
        - 'тому що'
        - 'томущо'
        - 'бо'
        - 'через те що'
      explanation: 'Використання дефіса в "тому що" є грубою орфографічною помилкою.'
    - sentence: 'Тому як ішов сильний дощ, ми залишилися вдома.'
      error: 'Тому як'
      answer: 'Оскільки'
      options:
        - 'Оскільки'
        - 'Тому як'
        - 'Тому що'
        - 'Бо'
      explanation: '"Тому як" — це русизм. На початку речення використовуємо "Оскільки".'
    - sentence: 'Завдяки пожежі наш старий будинок повністю згорів.'
      error: 'Завдяки'
      answer: 'Внаслідок'
      options:
        - 'Внаслідок'
        - 'Завдяки'
        - 'Оскільки'
        - 'Тому що'
      explanation: 'Сполучник "завдяки" використовується лише для позитивних наслідків.'
    - sentence: 'Дорогу перекрили завдяки тому що сталася серйозна аварія.'
      error: 'завдяки тому що'
      answer: 'через те що'
      options:
        - 'через те що'
        - 'завдяки тому що'
        - 'оскільки'
        - 'отже'
      explanation: 'Для нейтральних або негативних зовнішніх причин використовуємо "через те що" або "внаслідок того що".'
    - sentence: 'Вчора був вихідний, бо ми не працювали.'
      error: 'бо'
      answer: 'тому'
      options:
        - 'тому'
        - 'бо'
        - 'оскільки'
        - 'через те що'
      explanation: 'Ми не працювали — це наслідок того, що був вихідний день, використовуємо "тому".'
    - sentence: 'Він не прийшов на зустріч, томущо забув про неї.'
      error: 'томущо'
      answer: 'тому що'
      options:
        - 'тому що'
        - 'тому-що'
        - 'бо'
        - 'тому'
      explanation: 'Сполучник "тому що" пишеться окремо.'
    - sentence: 'Ми скасували змагання, завдяки поганій погоді.'
      error: 'завдяки'
      answer: 'через'
      options:
        - 'через'
        - 'завдяки'
        - 'внаслідок'
        - 'отже'
      explanation: 'Негативні причини не можуть починатися з "завдяки".'
    - sentence: 'Температура впала нижче нуля, бо вода в озері замерзла.'
      error: 'бо'
      answer: 'тому'
      options:
        - 'тому'
        - 'бо'
        - 'оскільки'
        - 'через те що'
      explanation: 'Замерзання води — це наслідок, а не причина.'
    - sentence: 'Тому що термін дії договору закінчився, ми підписуємо нову угоду.'
      error: 'Тому що'
      answer: 'Оскільки'
      options:
        - 'Оскільки'
        - 'Тому що'
        - 'Бо'
        - 'Через те що'
      explanation: 'На початку офіційного речення стилістично краще використовувати "Оскільки".'
    - sentence: 'Я купую квитки заздалегідь тому що, хочу мати гарні місця.'
      error: 'тому що,'
      answer: ', тому що'
      options:
        - ', тому що'
        - 'тому що,'
        - 'тому, що'
        - 'тому що'
      explanation: 'Кома ставиться обов''язково перед словом "тому".'
    - sentence: 'Диму без вогня не буває.'
      error: 'вогня'
      answer: 'вогню'
      options:
        - 'вогню'
        - 'вогня'
        - 'вогнем'
        - 'вогні'
      explanation: 'У родовому відмінку слово "вогонь" має закінчення -ю.'

