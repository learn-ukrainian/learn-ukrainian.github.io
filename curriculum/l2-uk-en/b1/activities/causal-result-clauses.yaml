- type: quiz
  title: 'Оберіть правильний сполучник'
  instruction: 'Дайте відповідь на запитання щодо правил використання сполучників.'
  items:
    - question: 'Який сполучник найкраще підходить для неформальної, дружньої розмови?'
      options:
        - text: 'бо'
          correct: true
        - text: 'оскільки'
          correct: false
        - text: 'внаслідок того що'
          correct: false
        - text: 'у зв''язку з'
          correct: false
      explanation: 'Сполучник "бо" є найшвидшим і найемоційнішим, ідеальним для розмовної мови.'
    - question: 'Яке слово потрібно поставити на початку офіційного речення замість русизму "тому як"?'
      options:
        - text: 'оскільки'
          correct: true
        - text: 'бо'
          correct: false
        - text: 'через'
          correct: false
        - text: 'завдяки'
          correct: false
      explanation: 'Єдиний правильний відповідник для початку логічної передумови — "оскільки".'
    - question: 'Як правильно написати найуніверсальніший причиновий сполучник в українській мові?'
      options:
        - text: 'тому що'
          correct: true
        - text: 'томущо'
          correct: false
        - text: 'тому-що'
          correct: false
        - text: 'тому що б'
          correct: false
      explanation: 'Займенник "тому" та сполучник "що" завжди пишуться як два окремі слова.'
    - question: 'Де обов''язково повинна стояти кома у складнопідрядному реченні з цим сполучником?'
      options:
        - text: 'перед словом "тому"'
          correct: true
        - text: 'після слова "що"'
          correct: false
        - text: 'перед словом "що"'
          correct: false
        - text: 'кома взагалі не потрібна'
          correct: false
      explanation: 'Кома ставиться перед початком підрядної частини, тобто перед "тому".'
    - question: 'Яку конструкцію варто використовувати для позначення події, що призвела до позитивного результату?'
      options:
        - text: 'завдяки тому що'
          correct: true
        - text: 'через те що'
          correct: false
        - text: 'внаслідок того що'
          correct: false
        - text: 'у зв''язку з тим що'
          correct: false
      explanation: 'Складений сполучник "завдяки тому що" використовується виключно для бажаних, хороших результатів.'
    - question: 'Який сполучник найкраще підкреслює логічний підсумок у кінці академічної дискусії?'
      options:
        - text: 'отже'
          correct: true
        - text: 'бо'
          correct: false
        - text: 'оскільки'
          correct: false
        - text: 'через те що'
          correct: false
      explanation: '"Отже" використовується для підбиття підсумків або формулювання логічного висновку.'
    - question: 'До якого стилю мовлення належить прийменник "внаслідок" у словосполученні "внаслідок аварії"?'
      options:
        - text: 'до офіційно-ділового та новинного'
          correct: true
        - text: 'до розмовного побутового'
          correct: false
        - text: 'до художнього поетичного'
          correct: false
        - text: 'до дитячого фольклору'
          correct: false
      explanation: 'Журналісти та державні службовці часто використовують "внаслідок" для об''єктивного інформування.'
    - question: 'Що означає відоме українське прислів''я "Диму без вогню не буває"?'
      options:
        - text: 'кожна подія або чутка має свою причину'
          correct: true
        - text: 'пожежі трапляються дуже часто'
          correct: false
        - text: 'наслідки завжди непередбачувані і небезпечні'
          correct: false
        - text: 'природа є сильнішою за людину'
          correct: false
      explanation: 'Ця народна мудрість стверджує, що будь-який видимий наслідок (дим) має приховану причину (вогонь).'
    - question: 'Який сполучник вказує на об''єктивну зовнішню перешкоду, яка завадила планам?'
      options:
        - text: 'через те що'
          correct: true
        - text: 'завдяки тому що'
          correct: false
        - text: 'отже'
          correct: false
        - text: 'тому'
          correct: false
      explanation: '"Через те що" часто має відтінок пояснення об''єктивних умов або перешкод.'
    - question: 'Чому сучасна українська мова надає перевагу активним граматичним конструкціям над пасивними?'
      options:
        - text: 'вони підкреслюють суб''єктність та відповідальність людини'
          correct: true
        - text: 'вони коротші і їх легше писати'
          correct: false
        - text: 'це вимога старих радянських стандартів'
          correct: false
        - text: 'вони звучать більш поетично і лірично'
          correct: false
      explanation: 'Перехід до активних конструкцій відображає сучасну українську ідентичність і здатність брати відповідальність.'

