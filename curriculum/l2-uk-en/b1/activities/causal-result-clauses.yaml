- type: error-correction
  title: 'Замініть пасивний стан на активний'
  instruction: 'Виправте речення, уникаючи пасивних конструкцій і фаталізму.'
  items:
    - sentence: 'Проєкт не було закінчено вчасно, тому що виникли обставини.'
      error: 'не було закінчено'
      answer: 'ми не закінчили'
      options:
        - 'ми не закінчили'
        - 'було не закінчено'
        - 'закінчили не ми'
        - 'не закінчилося'
      explanation: 'Сучасна українська мова надає перевагу активним конструкціям із чітким суб''єктом.'
    - sentence: 'Будинок було зруйновано, через те що сталася пожежа.'
      error: 'було зруйновано'
      answer: 'згорів'
      options:
        - 'згорів'
        - 'зруйнувався'
        - 'зруйновано було'
        - 'зруйнували'
      explanation: 'Використовуйте активні дієслова замість пасивних безособових форм для вираження причиновості.'
    - sentence: 'Так сталося, оскільки умови були несприятливі.'
      error: 'Так сталося'
      answer: 'Ми отримали такий результат'
      options:
        - 'Ми отримали такий результат'
        - 'Воно сталося'
        - 'Відбулося так'
        - 'Зробилося так'
      explanation: 'Уникайте фаталістичних фраз на кшталт "так сталося", беріть відповідальність на себе.'
    - sentence: 'Роботу було скасовано у зв''язку з браком фінансування.'
      error: 'було скасовано'
      answer: 'керівництво скасувало'
      options:
        - 'керівництво скасувало'
        - 'скасувалося'
        - 'скасували було'
        - 'скасовано було'
      explanation: 'Активний стан показує, хто саме ухвалив рішення про скасування.'
    - sentence: 'Дерево було повалене, бо дув сильний вітер.'
      error: 'було повалене'
      answer: 'впало'
      options:
        - 'впало'
        - 'повалилося'
        - 'повалене було'
        - 'впалося'
      explanation: 'Природні явища також краще описувати активними дієсловами.'
    - sentence: 'Рішення було прийнято тому що бракувало часу.'
      error: 'було прийнято'
      answer: 'ми прийняли'
      options:
        - 'ми прийняли'
        - 'прийнялося'
        - 'прийняли було'
        - 'прийнято було'
      explanation: 'Завжди вказуйте суб''єкта дії, який приймає рішення.'
    - sentence: 'Мені не вдалося прийти, бо доля така.'
      error: 'доля така'
      answer: 'я не розрахував час'
      options:
        - 'я не розрахував час'
        - 'така карма'
        - 'судилося так'
        - 'фатум такий'
      explanation: 'Сучасна комунікація вимагає особистої відповідальності замість посилань на сліпу долю.'
    - sentence: 'Зустріч скасовано, томущо директор захворів.'
      error: 'томущо'
      answer: 'тому що'
      options:
        - 'тому що'
        - 'тому-що'
        - 'бо'
        - 'тому'
      explanation: '"Тому що" завжди пишеться як два окремі слова.'

- type: quiz
  title: 'Стилістика та логіка мовлення'
  instruction: 'Оберіть правильну відповідь щодо стилістичних нюансів української мови.'
  items:
    - question: 'У якому стилі спілкування найчастіше використовується складений прийменник "у зв''язку з"?'
      options:
        - text: 'в офіційно-діловому та адміністративному'
          correct: true
        - text: 'у розмовному та побутовому'
          correct: false
        - text: 'у художньому та поетичному'
          correct: false
        - text: 'у фольклорі та казках'
          correct: false
      explanation: 'Ця конструкція належить до канцелярського, офіційного стилю.'
    - question: 'Який причиновий сполучник є ідеальним для неформального листування з друзями?'
      options:
        - text: 'бо'
          correct: true
        - text: 'оскільки'
          correct: false
        - text: 'у зв''язку з'
          correct: false
        - text: 'внаслідок того що'
          correct: false
      explanation: 'Сполучник "бо" є розмовним, швидким та емоційним.'
    - question: 'Чому початок речення зі слів "Тому що" вважається стилістично слабким на рівні B1?'
      options:
        - text: 'він створений для з''єднання частин всередині речення, а не для його початку'
          correct: true
        - text: 'це словосполучення є застарілим і більше не використовується'
          correct: false
        - text: 'воно звучить занадто офіційно для звичайної розмови'
          correct: false
        - text: 'це пряма калька з російської мови'
          correct: false
      explanation: 'Для початку речення українська мова пропонує елегантніші інструменти, наприклад, "Оскільки".'
    - question: 'Який наслідковий сполучник найчастіше використовується для підбиття логічного підсумку?'
      options:
        - text: 'отже'
          correct: true
        - text: 'бо'
          correct: false
        - text: 'тому що'
          correct: false
        - text: 'через те що'
          correct: false
      explanation: '"Отже" є сигналом для читача, що зараз буде головний висновок з усього сказаного вище.'
    - question: 'Що означає прислів''я "Хто полю годить, тому жито родить" у контексті логіки?'
      options:
        - text: 'наслідок є прямою та невідворотною винагородою за активну причину (працю)'
          correct: true
        - text: 'сільське господарство завжди було важливою частиною економіки'
          correct: false
        - text: 'погода дуже сильно впливає на врожайність полів'
          correct: false
        - text: 'іноді результати з''являються абсолютно випадково'
          correct: false
      explanation: 'Це прислів''я ілюструє український аграрний етос, де праця завжди зумовлює результат.'
    - question: 'Як зміна пасивного стану на активний у причинових реченнях впливає на їхній зміст?'
      options:
        - text: 'вона підкреслює особисту відповідальність та здатність до контролю'
          correct: true
        - text: 'вона робить речення довшим і складнішим для розуміння'
          correct: false
        - text: 'вона приховує справжню причину події від співрозмовника'
          correct: false
        - text: 'вона додає реченню відтінок фаталізму та безвиході'
          correct: false
      explanation: 'Використання активного стану з причиновими сполучниками робить мову сильною, впевненою та відповідальною.'
    - question: 'Яке слово слід використовувати замість русизму "тому як" на початку пояснювального речення?'
      options:
        - text: 'оскільки'
          correct: true
        - text: 'завдяки'
          correct: false
        - text: 'відтак'
          correct: false
        - text: 'бо'
          correct: false
      explanation: 'Питомо український відповідник для цієї структури — це "оскільки".'
    - question: 'В якому випадку доречно використати сполучник "завдяки тому що"?'
      options:
        - text: 'коли подія призвела до хорошого, бажаного результату'
          correct: true
        - text: 'коли трапилася серйозна аварія або катастрофа'
          correct: false
        - text: 'коли ми описуємо нейтральні природні явища'
          correct: false
        - text: 'коли ми хочемо зняти з себе відповідальність за помилку'
          correct: false
      explanation: 'Сполучник "завдяки" завжди вимагає подяки і використовується лише для позитивних подій.'
    - question: 'Який з цих сполучників має унікальну властивість дуже часто стояти на самому початку речення?'
      options:
        - text: 'оскільки'
          correct: true
        - text: 'бо'
          correct: false
        - text: 'отже'
          correct: false
        - text: 'тому'
          correct: false
      explanation: '"Оскільки" створює структуру, де ви спочатку задаєте передумову, а потім робите з неї логічний висновок.'
    - question: 'Чому фраза "Завдяки пожежі будинок згорів" є абсолютно неправильною стилістично?'
      options:
        - text: 'слово "завдяки" має позитивне забарвлення і не поєднується з трагедіями'
          correct: true
        - text: 'перед словом "завдяки" обов''язково потрібно ставити кому'
          correct: false
        - text: 'слово "пожежа" має використовуватися в знахідному відмінку'
          correct: false
        - text: 'у цьому реченні відсутній головний підмет і присудок'
          correct: false
      explanation: 'Для негативних подій слід використовувати нейтральне "через те що" або "внаслідок".'