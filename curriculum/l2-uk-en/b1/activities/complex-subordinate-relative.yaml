version: '1.0'
module: complex-subordinate-relative
level: b1
inline:
- id: reading-intro
  type: quiz
  instruction: Прочитайте діалог ботаніка та студента і дайте відповіді на запитання.
  items:
  - question: Скільки років росте дерево, про яке згадав ботанік?
    options:
    - десять років
    - п'ятдесят років
    - сто років
    - тисячу років
    correct: 2
  - question: З якої країни подарували рідкісну орхідею?
    options:
    - з Китаю
    - з Японії
    - з Індії
    - з Франції
    correct: 1
  - question: Що студент робить під час екскурсії?
    options:
    - малює квіти
    - фотографує дерева
    - записує назви рослин
    - відпочиває біля озера
    correct: 2
  - question: Де розташоване місце для відпочинку?
    options:
    - біля входу в сад
    - поруч із орхідеєю
    - біля прохолодного озера
    - на головній площі
    correct: 2
  - question: Хто, на думку ботаніка, обов'язково досягне успіху в науці?
    options:
    - досвідчений експерт
    - студент, який робить нотатки
    - кожен відвідувач саду
    - талановитий студент
    correct: 1
  - question: Яку характеристику орхідеї дав студент?
    options:
    - велика та міцна
    - яскрава та сонячна
    - крихка та ніжна
    - стара та велична
    correct: 2
- id: match-up-terms
  type: match-up
  instruction: З'єднайте граматичні терміни з їхніми визначеннями.
  pairs:
  - left: означуване слово
    right: іменник або займенник, який пояснює підрядне речення
  - left: сполучне слово
    right: який, що, де, куди, коли, чий
  - left: постпозиція
    right: розташування підрядної частини безпосередньо після іменника
  - left: означальне речення
    right: підрядна частина, що описує ознаку предмета
  - left: антецедент
    right: науковий синонім терміна «означуване слово»
  - left: відмінок
    right: граматична категорія, що визначає форму слова «який» у підрядному реченні
- id: fill-in-yakyj
  type: fill-in
  instruction: Вставте правильну форму займенника «який» у речення.
  items:
  - sentence: Книга, _____ я зараз читаю, дуже цікава.
    answer: яку
    options:
    - який
    - яку
    - якої
    - якій
  - sentence: Студент, _____ живе в гуртожитку, вивчає хімію.
    answer: який
    options:
    - який
    - яка
    - яке
    - які
  - sentence: Місто, в _____ ми народилися, розташоване на півдні.
    answer: якому
    options:
    - яке
    - якого
    - якому
    - яким
  - sentence: Люди, _____ я допомагав, подякували мені.
    answer: яким
    options:
    - яких
    - яким
    - якими
    - яке
  - sentence: Дівчина, з _____ я розмовляв, моя колега.
    answer: якою
    options:
    - яка
    - яку
    - якої
    - якою
  - sentence: Будинок, вікна _____ виходять на парк, дуже старий.
    answer: якого
    options:
    - який
    - якого
    - якому
    - яким
- id: quiz
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Означальні
    підрядні речення».'
  items:
  - question: Що таке «означальне речення»?
    options:
    - речення, що вказує на час дії
    - підрядна частина, що описує ознаку предмета
    - головна частина складного речення
    - речення без підмета і присудка
    correct: 1
  - question: Яке слово НЕ може бути сполучним словом в означальних реченнях?
    options:
    - який
    - що
    - де
    - тому що
    correct: 3
  - question: Де зазвичай стоїть означальне підрядне речення?
    options:
    - перед головною частиною
    - всередині головної частини перед іменником
    - одразу після означуваного слова
    - у самому кінці довгого тексту
    correct: 2
  - question: У якому випадку «що» НЕ МОЖНА використовувати замість «який»?
    options:
    - у називному відмінку
    - після прийменника
    - у знахідному відмінку
    - у розмовній мові
    correct: 1
  - question: 'Який відмінок займенника «який» потрібен у реченні: «Людина, ___ я
      захоплююся...»?'
    options:
    - називний
    - родовий
    - орудний
    - місцевий
    correct: 2
  - question: 'Слово «котрий» у сучасній мові вважається:'
    options:
    - єдино правильним варіантом
    - розмовним суржиком
    - книжним/літературним синонімом слова «який»
    - застарілим словом, яке не використовують
    correct: 2
- id: mark-phrase-parts
  type: match-up
  instruction: Визначте роль слова у словосполученні (головне чи залежне).
  pairs:
  - left: небо (у «високе небо»)
    right: головне слово
  - left: високе (у «високе небо»)
    right: залежне слово
  - left: читати (у «читати книжку»)
    right: головне слово
  - left: книжку (у «читати книжку»)
    right: залежне слово
  - left: швидко (у «дуже швидко»)
    right: головне слово
  - left: дуже (у «дуже швидко»)
    right: залежне слово
- id: find-grammatical-core
  type: quiz
  instruction: Знайдіть граматичну основу речення (підмет і присудок).
  items:
  - question: Старий ліс тихо шелестить.
    options:
    - старий ліс
    - ліс шелестить
    - тихо шелестить
    - старий шелестить
    correct: 1
  - question: Київ — столиця України.
    options:
    - Київ — столиця
    - столиця України
    - Київ — України
    - це столиця
    correct: 0
  - question: Сонце яскраво світить.
    options:
    - яскраво світить
    - сонце яскраво
    - сонце світить
    - світить сонце
    correct: 2
  - question: Вітер хилить високі клени.
    options:
    - хилить клени
    - високі клени
    - вітер хилить
    - вітер клени
    correct: 2
  - question: Книга лежить на столі.
    options:
    - лежить на столі
    - книга лежить
    - книга на столі
    - на столі лежить
    correct: 1
  - question: Життя — це великий виклик.
    options:
    - це виклик
    - великий виклик
    - життя — це виклик
    - життя великий
    correct: 2
- id: quiz-sentence-members
  type: quiz
  instruction: Визначте вид другорядного члена речення.
  items:
  - question: 'У реченні «Я читаю **книгу**» виділене слово — це:'
    options:
    - означення
    - додаток
    - обставина
    - присудок
    correct: 1
  - question: 'У реченні «**Цікава** книга лежить на столі» виділене слово — це:'
    options:
    - додаток
    - обставина
    - означення
    - підмет
    correct: 2
  - question: 'У реченні «Ми зустрілися **ввечері**» виділене слово — це:'
    options:
    - додаток
    - означення
    - обставина
    - підмет
    correct: 2
  - question: На які питання відповідає означення?
    options:
    - хто? що?
    - кого? чого?
    - який? чий?
    - де? куди?
    correct: 2
  - question: На які питання відповідає додаток?
    options:
    - який? яка?
    - непрямих відмінків (кого? кому? що? ...)
    - де? коли? як?
    - що робить?
    correct: 1
  - question: Чим підкреслюють обставину при синтаксичному розборі?
    options:
    - хвилястою лінією
    - пунктиром
    - однією прямою лінією
    - пунктиром з крапкою
    correct: 3
workbook:
- id: simple-vs-complex-sort
  type: group-sort
  instruction: 'Розподіліть речення за типом: просте чи складне.'
  groups:
  - label: Просте речення
    items:
    - Студент уважно читає нову книгу.
    - Київ — стародавнє місто на Дніпрі.
    - Веселі діти голосно співали пісню на вулиці.
  - label: Складне речення
    items:
    - Сонце зайшло, і на небі з'явилися зорі.
    - Настала осінь, птахи полетіли на південь.
    - Я читав книгу, а мій брат дивився цікавий фільм.
- id: fix-complex-punctuation
  type: error-correction
  instruction: Розставте розділові знаки у складних реченнях.
  items:
  - sentence: Я вивчаю мову і мій друг мені допомагає.
    error: мову і
    correction: мову, і
    error_type: construction
    explanation: Між частинами складного речення перед «і» потрібна кома.
  - sentence: Настала весна птахи повернулися з вирію.
    error: весна птахи
    correction: весна, птахи
    error_type: construction
    explanation: Безсполучникове складне речення вимагає коми між частинами.
  - sentence: Книга яку я купив лежить на столі.
    error: Книга яку я купив лежить
    correction: Книга, яку я купив, лежить
    error_type: construction
    explanation: Означальне підрядне речення всередині головного відокремлюється двома
      комами.
  - sentence: Він сказав що скоро прийде.
    error: сказав що
    correction: сказав, що
    error_type: construction
    explanation: Перед сполучником «що» у складному реченні завжди ставиться кома.
  - sentence: Сонце світить але на вулиці холодно.
    error: світить але
    correction: світить, але
    error_type: construction
    explanation: Перед протиставним сполучником «але» завжди ставиться кома.
  - sentence: Той хто шукає знайде відповідь.
    error: Той хто шукає знайде
    correction: Той, хто шукає, знайде
    error_type: construction
    explanation: Підрядне речення «хто шукає» має бути виділене комами.
- id: match-cases-to-questions
  type: match-up
  instruction: Зіставте відмінки з їхніми питаннями.
  pairs:
  - left: Називний (Н.в.)
    right: хто? що?
  - left: Родовий (Р.в.)
    right: кого? чого?
  - left: Давальний (Д.в.)
    right: кому? чому?
  - left: Знахідний (Зн.в.)
    right: кого? що?
  - left: Орудний (О.в.)
    right: ким? чим?
  - left: Місцевий (М.в.)
    right: на кому? на чому?
- type: essay-response
  instruction: Напишіть 5 речень, використовуючи займенник «який» у різних відмінках.
  prompt: 'Напишіть п''ять оригінальних речень, описуючи людей, місця чи речі, які
    для вас важливі. Використовуйте слово «який» у різних відмінках (наприклад: який,
    якого, якому, яку, яким, на якому).'
  min_words: 50
  model_answer: '> [!model-answer]

    1. Київ — це місто, **яке** я люблю всім серцем. (Зн.в.)

    2. Мій брат, **якому** я завжди довіряю, живе у Львові. (Д.в.)

    3. Книга, **яку** я прочитав минулого тижня, дуже змінила мої погляди. (Зн.в.)

    4. Вулиця, **на якій** розташований мій офіс, дуже затишна. (М.в.)

    5. Проєкт, **яким** я зараз займаюся, вимагає багато енергії та часу. (О.в.)

    '
