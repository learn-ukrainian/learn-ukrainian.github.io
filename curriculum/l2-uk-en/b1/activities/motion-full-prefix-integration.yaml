- type: quiz
  title: 'Перевірте знання префіксів'
  items:
    - question: 'Який префікс означає коротке відхилення від основного маршруту?'
      explanation: 'Префікс за- означає швидкий візит або відхилення.'
      options:
        - text: 'за-'
          correct: true
        - text: 'при-'
          correct: false
        - text: 'від-'
          correct: false
        - text: 'пере-'
          correct: false
    - question: 'Що означає дієслово піти у порівнянні з дієсловом походити?'
      explanation: 'Піти позначає енергійний початок руху вперед.'
      options:
        - text: 'піти — це старт дії'
          correct: true
        - text: 'піти — це довгий процес'
          correct: false
        - text: 'піти — це повторення дії'
          correct: false
        - text: 'піти — це зупинка руху'
          correct: false
    - question: 'Який префікс вимагає використання прийменника до та родового відмінка?'
      explanation: 'Дієслова з префіксом до- часто використовуються з прийменником до.'
      options:
        - text: 'до-'
          correct: true
        - text: 'в-'
          correct: false
        - text: 'за-'
          correct: false
        - text: 'об-'
          correct: false
    - question: 'Яке дієслово ми використовуємо для опису прибуття листа або новин?'
      explanation: 'Офіційні листи та новини завжди надходять.'
      options:
        - text: 'надійти'
          correct: true
        - text: 'прийти'
          correct: false
        - text: 'зайти'
          correct: false
        - text: 'дійти'
          correct: false
    - question: 'Яке переносне значення має фраза руки не доходять до справи?'
      explanation: 'Ця ідіома означає критичний брак часу на певну справу.'
      options:
        - text: 'не вистачає часу'
          correct: true
        - text: 'дуже болять руки'
          correct: false
        - text: 'робота вже закінчена'
          correct: false
        - text: 'абсолютно немає бажання'
          correct: false
    - question: 'Яке слово означає тривалий рух крізь обєкт або повз нього?'
      explanation: 'Префікс про- означає рух наскрізь або мимо.'
      options:
        - text: 'пройти'
          correct: true
        - text: 'перейти'
          correct: false
        - text: 'обійти'
          correct: false
        - text: 'дійти'
          correct: false
    - question: 'Який префікс вказує на стратегічне огинання перешкоди або уникнення контакту?'
      explanation: 'Префікс об- означає огинання або уникання фізичної перешкоди.'
      options:
        - text: 'об-'
          correct: true
        - text: 'пере-'
          correct: false
        - text: 'від-'
          correct: false
        - text: 'ви-'
          correct: false
    - question: 'Який префікс ми використовуємо для опису досягнення межі без проникнення?'
      explanation: 'Префікс до- фокусується на подоланні дистанції до межі.'
      options:
        - text: 'до-'
          correct: true
        - text: 'при-'
          correct: false
        - text: 'ви-'
          correct: false
        - text: 'за-'
          correct: false
    - question: 'Яка різниця між словами ввійти та зайти у повсякденному спілкуванні?'
      explanation: 'Зайти має теплий відтінок короткого спонтанного візиту.'
      options:
        - text: 'зайти — це короткий візит'
          correct: true
        - text: 'ввійти — це короткий візит'
          correct: false
        - text: 'це абсолютно однакові слова'
          correct: false
        - text: 'зайти — це дуже офіційно'
          correct: false
    - question: 'Яке дієслово використовується в українській мові для опису досягнення консенсусу?'
      explanation: 'Українці доходять згоди після довгих та складних переговорів.'
      options:
        - text: 'дійти'
          correct: true
        - text: 'прийти'
          correct: false
        - text: 'зайти'
          correct: false
        - text: 'вийти'
          correct: false
    - question: 'Що означає відомий фразеологізм вийти сухим із води в українській мові?'
      explanation: 'Ця ідіома описує хитре уникнення справедливого покарання.'
      options:
        - text: 'уникнути справедливого покарання'
          correct: true
        - text: 'навчитися дуже добре плавати'
          correct: false
        - text: 'успішно випрати свій одяг'
          correct: false
        - text: 'успішно завершити новий проєкт'
          correct: false
    - question: 'Який префікс вказує на успішне прибуття та фінальну присутність субєкта?'
      explanation: 'Префікс при- позначає появу у фінальній цільовій точці.'
      options:
        - text: 'при-'
          correct: true
        - text: 'до-'
          correct: false
        - text: 'в-'
          correct: false
        - text: 'за-'
          correct: false

- type: fill-in
  title: 'Вставте правильне дієслово'
  items:
    - sentence: 'Ми дуже втомилися, бо ледве змогли ___ до самої вершини гори.'
      answer: 'дійти'
      options:
        - 'дійти'
        - 'прийти'
        - 'зайти'
        - 'перейти'
      explanation: 'Фокус на досягненні складної межі після довгого шляху.'
    - sentence: 'По дорозі додому я хочу ___ в магазин за свіжим хлібом.'
      answer: 'зайти'
      options:
        - 'зайти'
        - 'ввійти'
        - 'увійти'
        - 'дійти'
      explanation: 'Коротке відхилення від основного маршруту вимагає префікса за-.'
    - sentence: 'Після тривалих дискусій політики нарешті змогли ___ згоди щодо закону.'
      answer: 'дійти'
      options:
        - 'дійти'
        - 'прийти'
        - 'знайти'
        - 'перейти'
      explanation: 'Згода — це межа, якої досягають після великих зусиль.'
    - sentence: 'Учора мені на пошту ___ дуже важливий офіційний лист від банку.'
      answer: 'надійшов'
      options:
        - 'надійшов'
        - 'прийшов'
        - 'дійшов'
        - 'зайшов'
      explanation: 'Новини, повідомлення та листи завжди надходять.'
    - sentence: 'Ми всі вирішили свідомо ___ на українську мову в нашому щоденному спілкуванні.'
      answer: 'перейти'
      options:
        - 'перейти'
        - 'вийти'
        - 'піти'
        - 'зайти'
      explanation: 'Перехід у новий стан або зовсім інший мовний простір.'
    - sentence: 'Мій брат має ___ в офіс о дев’ятій годині ранку на співбесіду.'
      answer: 'прийти'
      options:
        - 'прийти'
        - 'дійти'
        - 'походити'
        - 'відійти'
      explanation: 'Важлива присутність у фінальній цільовій точці.'
    - sentence: 'Коли почався дощ, ми вирішили ___ в невелике кафе перечекати його.'
      answer: 'зайти'
      options:
        - 'зайти'
        - 'підійти'
        - 'перейти'
        - 'обійти'
      explanation: 'Спонтанний, тимчасовий дружній візит.'
    - sentence: 'Щоб безпечно ___ цю широку вулицю, потрібно скористатися підземним переходом.'
      answer: 'перейти'
      options:
        - 'перейти'
        - 'пройти'
        - 'дійти'
        - 'обійти'
      explanation: 'Рух з одного боку перешкоди або вулиці на інший.'
    - sentence: 'Я вже давно хочу подивитися цей цікавий фільм, але в мене ___ не доходять.'
      answer: 'руки'
      options:
        - 'руки'
        - 'ноги'
        - 'очі'
        - 'думки'
      explanation: 'Ідіома руки не доходять означає хронічний брак вільного часу.'
    - sentence: 'Величезна вантажівка ніяк не змогла ___ у цей дуже вузький двір.'
      answer: 'в''їхати'
      options:
        - 'в''їхати'
        - 'заїхати'
        - 'доїхати'
        - 'приїхати'
      explanation: 'Нейтральне фізичне проникнення у закритий простір двору.'
    - sentence: 'Охоронці дуже суворо наказали всьому натовпу негайно ___ від палаючої будівлі.'
      answer: 'відійти'
      options:
        - 'відійти'
        - 'вийти'
        - 'піти'
        - 'обійти'
      explanation: 'Рух геть від небезпечного обєкта, збільшення дистанції.'
    - sentence: 'Розумний водій швидко вирішив ___ ранковий затор через маленькі вільні вулиці.'
      answer: 'об''їхати'
      options:
        - 'об''їхати'
        - 'переїхати'
        - 'доїхати'
        - 'заїхати'
      explanation: 'Огинання великої перешкоди без прямого контакту з нею.'

