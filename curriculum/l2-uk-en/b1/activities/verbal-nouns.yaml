version: '1.0'
module: verbal-nouns
level: b1
inline:
- id: nominalization-intro
  type: true-false
  instruction: Визначте, чи є ці твердження про номіналізацію правдивими.
  items:
  - statement: Номіналізація — це процес перетворення іменника на дієслово.
    correct: false
    explanation: Номіналізація — це навпаки, перетворення дієслова (дії) на іменник.
  - statement: Віддієслівний іменник допомагає зробити текст більш офіційним і професійним.
    correct: true
    explanation: Це головна функція номіналізації в академічному та діловому стилях.
  - statement: Слово «навчання» завжди означає лише процес, який триває в часі.
    correct: false
    explanation: Слово «навчання» може означати як процес, так і результат (наприклад,
      інституцію чи систему).
  - statement: У фразі «якісна освіта» ми фокусуємо увагу на результаті, а не на процесі.
    correct: true
    explanation: Саме так, це вже завершений результат або абстрактна система.
  - statement: Віддієслівний іменник має рід, відмінюється за відмінками та може бути
      підметом.
    correct: true
    explanation: Він набуває всіх граматичних ознак звичайного іменника.
  - statement: Ми повинні використовувати віддієслівні іменники якомога частіше у
      щоденних розмовах з друзями.
    correct: false
    explanation: Надмірне їх використання в розмові робить мову важкою та неприродною
      (канцелярит).
- id: suffix-practice
  type: match-up
  instruction: З'єднайте базове дієслово з відповідним віддієслівним іменником, звертаючи
    увагу на суфікс.
  pairs:
  - left: готувати
    right: готування
  - left: бачити
    right: бачення
  - left: розуміти
    right: розуміння
  - left: ходити
    right: ходіння
  - left: мислити
    right: мислення
  - left: звертатися
    right: звернення
- id: zero-derivation
  type: fill-in
  instruction: Утворіть короткий віддієслівний іменник безафіксним способом (без суфіксів).
  items:
  - sentence: Швидкий _____ дуже корисний для серця.
    answer: біг
    options:
    - бігання
    - біг
    - бігти
  - sentence: Цей _____ ключів зайняв десять хвилин.
    answer: пошук
    options:
    - пошук
    - шукання
    - шукати
  - sentence: Це справжній _____ для нашої команди.
    answer: виклик
    options:
    - викликання
    - виклик
    - викликати
  - sentence: Твій _____ професії був абсолютно правильним.
    answer: вибір
    options:
    - вибирання
    - вибір
    - вибирати
  - sentence: Я почув гучний _____ на вулиці.
    answer: крик
    options:
    - кричання
    - крик
    - кричати
  - sentence: Твій наступний _____ у цій грі.
    answer: хід
    options:
    - ходіння
    - хід
    - ходити
- id: sentence-transformation
  type: quiz
  instruction: Оберіть правильну форму родового відмінка об'єкта після віддієслівного
    іменника.
  items:
  - question: будувати дім -> будівництво...
    options:
    - дім
    - дому
    - домом
    - домові
    correct: 1
  - question: досліджувати проблему -> дослідження...
    options:
    - проблему
    - проблеми
    - проблем
    - проблемою
    correct: 1
  - question: збирати факти -> збирання...
    options:
    - факти
    - фактів
    - фактам
    - фактами
    correct: 1
  - question: вивчати мову -> вивчення...
    options:
    - мову
    - мови
    - мов
    - мовою
    correct: 1
  - question: писати лист -> написання...
    options:
    - лист
    - листа
    - листом
    - листу
    correct: 1
  - question: читати книгу -> читання...
    options:
    - книгу
    - книги
    - книг
    - книгою
    correct: 1
- id: news-analysis
  type: true-false
  instruction: 'Проаналізуйте тексти: визначте правильність тверджень про регістр
    та віддієслівні іменники.'
  items:
  - statement: У реченні «постійне вдосконалення цифрових навичок» слово «вдосконалення»
      — це віддієслівний іменник.
    correct: true
    explanation: Так, воно походить від дієслова «вдосконалювати».
  - statement: Слово «кроки» утворене суфіксальним способом.
    correct: false
    explanation: Воно утворене безафіксним способом від дієслова «крокувати».
  - statement: Номіналізація робить текст більш емоційним і суб'єктивним.
    correct: false
    explanation: Навпаки, вона робить його більш об'єктивним і відстороненим.
  - statement: Текст 1 написаний в інформаційному, офіційному стилі.
    correct: true
    explanation: Це типова новина з використанням академічного та ділового регістру.
  - statement: Безафіксні іменники роблять текст більш ритмічним та лаконічним.
    correct: true
    explanation: Короткі слова (біг, хід, пошук) додають динаміки порівняно з довгими
      іменниками на -ння.
  - statement: Слово «будівництво» повністю втратило будь-який зв'язок з дією.
    correct: false
    explanation: Воно зберігає внутрішній зміст дії (процес зведення будівлі).
workbook:
- id: workbook-fill-in
  type: fill-in
  instruction: Утворіть віддієслівний іменник від базового дієслова та вставте його
    в речення.
  items:
  - sentence: _____ звіту забрало багато часу.
    answer: Готування
    options:
    - Готування
    - Готуючи
    - Готувати
  - sentence: Економічний _____ країни дуже важливий.
    answer: розвиток
    options:
    - розвивати
    - розвиток
    - розвивання
  - sentence: Він підписав офіційне _____ до Президента.
    answer: звернення
    options:
    - звернення
    - звернутися
    - звертання
  - sentence: Завтра відбудеться _____ диплома.
    answer: захист
    options:
    - захищати
    - захищення
    - захист
  - sentence: Мій телефон вимагає системне _____.
    answer: оновлення
    options:
    - оновлювати
    - оновлення
    - оновлювання
  - sentence: Восени ми спостерігали _____ листя.
    answer: падіння
    options:
    - падіння
    - падати
    - падання
  - sentence: Після тієї події старі традиції пішли в повне _____.
    answer: забуття
    options:
    - забути
    - забування
    - забуття
  - sentence: Спортивне _____ дуже корисне для здоров'я.
    answer: ходіння
    options:
    - ходіння
    - хід
    - ходити
  - sentence: Вчора почалося _____ нового проєкту.
    answer: створення
    options:
    - створення
    - створювати
    - створити
  - sentence: Зараз твій _____ у грі.
    answer: хід
    options:
    - хід
    - ходіння
    - ходити
- id: workbook-match-up
  type: match-up
  instruction: З'єднайте дієслово з відповідним віддієслівним іменником.
  pairs:
  - left: читати
    right: читання
  - left: відкрити
    right: відкриття
  - left: бігти
    right: біг
  - left: розуміти
    right: розуміння
  - left: жити
    right: життя
  - left: знати
    right: знання
  - left: забути
    right: забуття
  - left: вибирати
    right: вибір
  - left: звертатися
    right: звернення
  - left: сміятися
    right: сміх
- id: workbook-group-sort
  type: group-sort
  instruction: Розподіліть віддієслівні іменники за способом їх утворення.
  groups:
  - label: Суфіксальний спосіб (-ння, -ття)
    items:
    - відкриття
    - знання
    - дослідження
    - життя
    - читання
  - label: Безафіксний спосіб (відкидання закінчення)
    items:
    - біг
    - хід
    - пошук
    - підпис
    - виклик
- id: workbook-error-correction
  type: error-correction
  instruction: 'Знайдіть і виправте граматичну помилку: пам''ятайте про родовий відмінок
    об''єкта.'
  items:
  - sentence: Вивчення українська мова потребує багато щоденного часу.
    error: українська мова
    correction: української мови
    error_type: phrase
    options:
    - української мови
    - українську мову
    - українською мовою
    explanation: Після віддієслівного іменника прямий об'єкт стає родовим відмінком
      (родовий об'єкта).
  - sentence: Будівництво новий дім тривало два довгих роки.
    error: новий дім
    correction: нового дому
    error_type: phrase
    options:
    - нового дому
    - новому дому
    - новим домом
    explanation: Будувати новий дім → будівництво (чого?) нового дому.
  - sentence: Збирання факти є дуже важливим етапом роботи журналіста.
    error: факти
    correction: фактів
    error_type: word
    options:
    - фактів
    - фактам
    - фактами
    explanation: Збирати факти → збирання (чого?) фактів (родовий відмінок множини).
  - sentence: Написання довгий лист забрало у мене весь вчорашній вечір.
    error: довгий лист
    correction: довгого листа
    error_type: phrase
    options:
    - довгого листа
    - довгому листу
    - довгим листом
    explanation: Писати довгий лист → написання (чого?) довгого листа.
  - sentence: Створення ця обкладинка — наш головний пріоритет на сьогодні.
    error: ця обкладинка
    correction: цієї обкладинки
    error_type: phrase
    options:
    - цієї обкладинки
    - цю обкладинку
    - цій обкладинці
    explanation: Створити обкладинку → створення (чого?) цієї обкладинки.
  - sentence: Обговорення новий проєкт відбудеться завтра вранці.
    error: новий проєкт
    correction: нового проєкту
    error_type: phrase
    options:
    - нового проєкту
    - новому проєкту
    - новим проєктом
    explanation: Обговорювати новий проєкт → обговорення (чого?) нового проєкту.
- id: workbook-register-quiz
  type: quiz
  instruction: 'Стилістика: оберіть правильний варіант, зважаючи на регістр (офіційний/неформальний)
    та уникаючи канцеляриту.'
  items:
  - question: Який варіант найкраще підходить для офіційного документа чи наукової
      статті?
    options:
    - Коли ми довго досліджували проблему, ми багато чого зрозуміли.
    - Наше дослідження проблеми дало нове розуміння.
    - Наше довге досліджування проблеми дало нові знання.
    - Ми зібралися і дослідили проблему повністю.
    correct: 1
  - question: Яке речення є прикладом важкої стилістичної помилки, яку називають «канцелярит»?
    options:
    - Ми плануємо обговорити фінансування проєкту.
    - Дирекція вирішила забезпечити виконання плану продажів.
    - Обговорення проєкту розпочнеться завтра вранці.
    - Заплановано початок процесу обговорення питання фінансування.
    correct: 3
  - question: Ви пишете неформальне повідомлення другу про свої ранкові тренування.
      Яке слово ви оберете?
    options:
    - бігання
    - перебігання
    - пробігання
    - біг
    correct: 3
  - question: Слово «розмова» є стилістично нейтральним. А яке слово з таким самим
      значенням звучить більш професійно та офіційно?
    options:
    - балаканина
    - спілкування
    - розмовляння
    - говоріння
    correct: 1
  - question: Як найкраще і найпростіше виправити канцелярську фразу «Дирекцією було
      прийнято рішення про виконання плану продажів»?
    options:
    - Дирекцією виконалося рішення про продажі.
    - Дирекція прийняла рішення про процес виконання.
    - Дирекція вирішила виконати план продажів.
    - Виконання плану було вирішено дирекцією.
    correct: 2
  - question: Який варіант звучить найбільш природно та живо для щоденної бесіди?
    options:
    - Я дуже довго шукав ключі в кімнаті.
    - Мій пошук ключів у кімнаті був довгим.
    - Процес пошуку ключів зайняв багато часу.
    - Шукання ключів у кімнаті було тривалим.
    correct: 0
  - question: 'У науковій доповіді про властивості металів доречно і професійно написати:'
    options:
    - Вивчання нових металів іде добре.
    - Ми довго вивчали нові метали і нарешті завершили.
    - Процес вивчання металів було закінчено.
    - Вивчення нових металів завершено успішно.
    correct: 3
  - question: 'Виберіть речення, у якому немає стилістичних помилок (канцеляриту):'
    options:
    - Було здійснено забезпечення швидкого відновлення інфраструктури.
    - Ми зробили кроки для процесу відновлення інфраструктури.
    - Відновлення інфраструктури було зроблене нами швидко.
    - Ми швидко відновили зруйновану інфраструктуру.
    correct: 3
