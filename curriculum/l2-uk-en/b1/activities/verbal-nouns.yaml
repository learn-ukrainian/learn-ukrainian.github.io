version: '1.0'
module: verbal-nouns
level: b1
inline:
- id: match-up-verb-noun-matching
  type: match-up
  instruction: З'єднайте дієслово з відповідним віддієслівним іменником
  pairs:
  - left: читати
    right: читання
  - left: відкрити
    right: відкриття
  - left: бігти
    right: біг
  - left: досліджувати
    right: дослідження
  - left: жити
    right: життя
  - left: створити
    right: створення
  - left: підписати
    right: підпис
  - left: шукати
    right: пошук
  - left: ходити
    right: хід
  - left: забути
    right: забуття
  title: З'єднайте дієслово з відповідним віддієслівним іменником
- id: group-sort-suffix-sort
  type: group-sort
  instruction: Розподіліть віддієслівні іменники за способом творення
  groups:
  - label: Суфіксальний (-ння, -ття)
    items:
    - навчання
    - знання
    - відкриття
    - спілкування
    - життя
  - label: Безафіксний (нульовий суфікс)
    items:
    - пошук
    - підпис
    - біг
    - перехід
    - крик
  title: Розподіліть віддієслівні іменники за способом творення
- id: quiz-register-quiz
  type: quiz
  instruction: Оберіть найбільш доречний віддієслівний іменник або конструкцію для
    кожного речення
  items:
  - question: 'Для офіційного звіту: Детальне _____ цієї проблеми зайняло два місяці.'
    options:
    - дослідження
    - досліджування
    - пошук
    - розмова
    correct: 0
  - question: 'Для дружньої бесіди: Який твій улюблений _____ у спорті?'
    options:
    - біг
    - бігання
    - перехід
    - рух
    correct: 0
  - question: 'Офіційна новина: Сьогодні відбулося урочисте _____ нового хабу.'
    options:
    - відкриття
    - відкривання
    - початок
    - відкрити
    correct: 0
  - question: 'Оберіть правильний варіант для академічного тексту:'
    options:
    - Навчання студентів є нашим пріоритетом.
    - Коли ми навчаємо студентів, це наш пріоритет.
    - Вчити студентів — це дуже пріоритетно.
    - Навчати студентів є пріоритетом.
    correct: 0
  - question: 'Як уникнути канцеляриту? Оберіть найкращий варіант замість «здійснення
      перевірки»:'
    options:
    - перевіряти
    - робити перевірку
    - виконання перевірки
    - забезпечення перевіряння
    correct: 0
  - question: Яке слово означає конкретний результат (completed study), а не процес?
    options:
    - вивчення
    - вивчання
    - навчання
    - читання
    correct: 0
  - question: Яке слово має правильний наголос?
    options:
    - навча́ння
    - на́вчання
    - навчання́
    - навч́ання
    correct: 0
  - question: Як правильно перекласти «I am tired of walking»?
    options:
    - Я втомився від ходіння.
    - Я втомився від ходити.
    - Я втомився ходити.
    - Я втомився за ходіння.
    correct: 0
  title: Оберіть найбільш доречний віддієслівний іменник або конструкцію для кожного
    рече
- id: phrase-transformation
  type: fill-in
  instruction: Перетворіть дієслівну фразу на іменникову конструкцію. Впишіть правильний
    віддієслівний іменник.
  items:
  - sentence: Ми довго обговорювали цю складну тему. → Довге ____ складної теми.
    answer: обговорення
  - sentence: Вони швидко вирішили це завдання. → Швидке ____ складного завдання.
    answer: вирішення
  - sentence: Ми глибоко досліджували цю проблему. → Глибоке ____ цієї проблеми.
    answer: дослідження
  - sentence: Компанія успішно відновила інфраструктуру. → Успішне ____ міської інфраструктури.
    answer: відновлення
  - sentence: Ми щоденно використовуємо нові технології. → Щоденне ____ нових технологій.
    answer: використання
  - sentence: Місто стабільно фінансує інноваційні ініціативи. → Стабільне ____ інноваційних
      ініціатив.
    answer: фінансування
  title: Перетворіть дієслівну фразу на іменникову конструкцію. Впишіть правильний
    віддіє
- id: noun-formation-fill-in
  type: fill-in
  instruction: Утворіть віддієслівний іменник від дієслова в дужках і впишіть його.
  items:
  - sentence: Моє улюблене хобі — це ____.
    answer: читання
  - sentence: Яке ваше ____ цієї складної ситуації?
    answer: бачення
  - sentence: ____ нових робочих місць є пріоритетом для економіки.
    answer: створення
  - sentence: Ми чекаємо на ваш швидкий ____ до нашого міста.
    answer: приїзд
  - sentence: Постійне ____ з інвесторами дає чудові результати.
    answer: спілкування
  - sentence: Вона поставила свій ____ на офіційному контракті.
    answer: підпис
  - sentence: Цей підземний ____ через дорогу дуже безпечний.
    answer: перехід
  - sentence: Його головна мета — якісне ____ молодих спеціалістів.
    answer: навчання
  - sentence: Урочисте ____ супермаркету відбудеться завтра вранці.
    answer: відкриття
  - sentence: Її ____ завжди дуже логічне та структуроване.
    answer: мислення
  title: Утворіть віддієслівний іменник від дієслова в дужках і впишіть його.
- id: text-analysis-comprehension-of-verbal-nouns-in-news-context
  type: true-false
  instruction: Прочитайте новину в тексті уроку та визначте, чи правдиві ці твердження.
  items:
  - statement: Слово «будівництво» в тексті описує зведення нових житлових та комерційних
      об'єктів.
    correct: true
    explanation: Так, у тексті згадується будівництво об'єктів за європейськими стандартами.
  - statement: У новині йдеться про закриття старого технологічного хабу.
    correct: false
    explanation: Ні, у тексті повідомляється про відкриття нового технологічного хабу.
  - statement: Головне завдання проєкту — це забезпечення економічного розвитку регіону.
    correct: true
    explanation: Так, надійне забезпечення стабільного економічного розвитку є головним
      завданням.
  - statement: Виробництво будівельних матеріалів буде екологічно чистим.
    correct: true
    explanation: У тексті зазначено, що матеріали допоможуть зберегти природу навколо
      міста.
  - statement: Спілкування з іноземними інвесторами ще не почалося.
    correct: false
    explanation: Ні, спілкування вже дає перші чудові результати.
  - statement: Навчання спеціалістів заплановане на наступний рік.
    correct: false
    explanation: Навчання молодих спеціалістів вже успішно розпочалося.
  title: Прочитайте новину в тексті уроку та визначте, чи правдиві ці твердження.
workbook:
- type: error-correction
  instruction: Знайдіть і виправте граматичну помилку, пов'язану з віддієслівними
    іменниками або відмінками.
  items:
  - sentence: Я втомився від ходити пішки.
    error: ходити
    correction: ходіння
    error_type: word
    options:
    - ходіння
    - хід
    - хожу
    explanation: Після прийменників в українській мові використовується віддієслівний
      іменник, а не інфінітив.
  - sentence: Відбулося відкриття новий супермаркет.
    error: новий супермаркет
    correction: нового супермаркету
    error_type: phrase
    options:
    - нового супермаркету
    - новому супермаркету
    - новим супермаркетом
    explanation: Після віддієслівного іменника залежні слова завжди стоять у родовому
      відмінку (чого?).
  - sentence: Я дякую вам за допомогти.
    error: допомогти
    correction: допомогу
    error_type: word
    options:
    - допомогу
    - допомога
    - допомозі
    explanation: Після прийменника 'за' потрібен іменник 'допомогу' у знахідному відмінку,
      а не інфінітив.
  - sentence: Після закінчення університет він знайшов роботу.
    error: університет
    correction: університету
    error_type: word
    options:
    - університету
    - університеті
    - університетом
    explanation: Залежне слово після віддієслівного іменника 'закінчення' має бути
      у родовому відмінку.
  - sentence: Його головне хобі — це малювати картин.
    error: малювати картин
    correction: малювання картин
    error_type: phrase
    options:
    - малювання картин
    - малювати картини
    - малюнки картин
    explanation: Конструкція вимагає використання іменника, а після 'малювання' потрібен
      родовий відмінок.
  - sentence: Ми здійснили забезпечення виконання цього плану.
    error: здійснили забезпечення виконання
    correction: забезпечили виконання
    error_type: register
    options:
    - забезпечили виконання
    - зробили забезпечення виконання
    - виконали забезпечення
    explanation: Нанизування віддієслівних іменників — це типовий канцелярит. Краще
      використати дієслово.
  title: Знайдіть і виправте граматичну помилку, пов'язану з віддієслівними іменниками
    аб
- type: translate
  instruction: Оберіть правильний переклад українською мовою.
  items:
  - source: The construction of the house took two years.
    options:
    - text: Будівництво будинку тривало два роки.
      correct: true
    - text: Будувати будинок тривало два роки.
      correct: false
    - text: Будування будинка тривало два роки.
      correct: false
    - text: Будівля будинку тривала два роки.
      correct: false
  - source: Reading books is my favorite hobby.
    options:
    - text: Читання книг — моє улюблене хобі.
      correct: true
    - text: Читати книг — моє улюблене хобі.
      correct: false
    - text: Читання книги є моє улюблене хобі.
      correct: false
    - text: Читанка книг — моє улюблене хобі.
      correct: false
  - source: We are waiting for your arrival.
    options:
    - text: Ми чекаємо на ваш приїзд.
      correct: true
    - text: Ми чекаємо на ваше приїхати.
      correct: false
    - text: Ми чекаємо на ваш приїжджання.
      correct: false
    - text: Ми чекаємо вашого приїзда.
      correct: false
  - source: The discovery of this rule is important.
    options:
    - text: Відкриття цього правила є важливим.
      correct: true
    - text: Відкривати це правило є важливим.
      correct: false
    - text: Відкриття цього правило є важливим.
      correct: false
    - text: Відкривання цього правила є важливе.
      correct: false
  - source: Thank you for understanding.
    options:
    - text: Дякую за розуміння.
      correct: true
    - text: Дякую за розуміти.
      correct: false
    - text: Дякую за зрозуміти.
      correct: false
    - text: Дякую за розум.
      correct: false
  - source: He put his signature on the document.
    options:
    - text: Він поставив свій підпис на документі.
      correct: true
    - text: Він поставив своє підписання на документі.
      correct: false
    - text: Він поставив своє підписати на документі.
      correct: false
    - text: Він поставив свій підписування на документ.
      correct: false
  title: Оберіть правильний переклад українською мовою.
- type: essay-response
  prompt: Уявіть, що ви журналіст. Напишіть коротку замітку (4-5 речень) про важливу
    подію у вашому місті чи компанії (наприклад, відкриття нової школи або дослідження
    ринку). Обов'язково використайте щонайменше три віддієслівні іменники.
  min_words: 50
  model_answer: Нещодавно в нашому місті відбулося офіційне відкриття нового медичного
    центру. Будівництво цієї інноваційної лікарні тривало майже три роки, і тепер
    вона готова приймати перших пацієнтів. Якісне забезпечення мешканців сучасним
    обладнанням є головним пріоритетом місцевої влади. Постійне навчання молодих лікарів
    допоможе значно покращити загальне здоров'я населення нашого регіону. Ми сподіваємося,
    що стабільне фінансування таких соціальних проєктів буде продовжуватися.
  evaluation_criteria:
  - Текст містить щонайменше 50 слів.
  - Використано щонайменше три віддієслівні іменники (наприклад, відкриття, будівництво,
    забезпечення, навчання).
  - Слова стилістично відповідають офіційному новинному регістру.
  - Правильно використано родовий відмінок після віддієслівних іменників.
