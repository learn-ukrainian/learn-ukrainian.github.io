- type: anagram
  instruction: Складіть слово з літер.
  items:
  - letters:
    - п
    - о
    - р
    - о
    - м
    answer: пором
    hint: ferry
  - letters:
    - к
    - а
    - ю
    - т
    - а
    answer: каюта
    hint: cabin (on a ship)
  - letters:
    - п
    - а
    - л
    - у
    - б
    - а
    answer: палуба
    hint: deck
  - letters:
    - п
    - р
    - и
    - ч
    - а
    - л
    answer: причал
    hint: pier/dock
  - letters:
    - ч
    - о
    - в
    - е
    - н
    answer: човен
    hint: boat
  - letters:
    - р
    - е
    - й
    - с
    answer: рейс
    hint: flight/route
- type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Слово «перепливти» звучить в українській мові природніше, ніж «переплисти».
    correct: false
    explanation: Навпаки, форма «переплисти» є стандартною та літературною, вона допомагає
      уникнути збігу приголосних.
  - statement: Дієслово «літати» описує регулярний, різноспрямований рух.
    correct: true
    explanation: Так, це різноспрямоване дієслово, яке вказує на звичку, професію
      або хаотичний рух.
  - statement: Ми кажемо «час летить», коли він минає дуже швидко.
    correct: true
    explanation: Це дуже популярний сталий вираз (метафора) в українській мові.
  - statement: Палуба — це спеціальний документ для проходу в літак.
    correct: false
    explanation: Документ називається «посадковий талон», а палуба — це відкрита верхня
      частина корабля.
  - statement: Вираз «пливти за течією» означає активно боротися з щоденними проблемами.
    correct: false
    explanation: 'Він означає протилежне: пасивно підкорятися обставинам і не боротися.'
  - statement: Дієслово «пливти» описує односпрямований рух до конкретної мети просто
      зараз.
    correct: true
    explanation: Так, це односпрямоване дієслово, яке вказує на конкретний процес
      у даний момент.
