      correct: true
    - text: прямий рейс
      correct: false
    - text: регулярний маршрут
      correct: false
  - source: boarding pass
    options:
    - text: посадковий талон
      correct: true
    - text: паспортний контроль
      correct: false
    - text: квиток на автобус
      correct: false
  - source: to fasten seatbelts
    options:
    - text: пристебнути паски безпеки
      correct: true
    - text: перевірити багаж
      correct: false
    - text: пройти огляд
      correct: false
  - source: time flies
    options:
    - text: час летить
      correct: true
    - text: роки летять
      correct: false
    - text: думки пливуть
      correct: false
  - source: to go with the flow
    options:
    - text: пливти за течією
      correct: true
    - text: летіти за вітром
      correct: false
    - text: плавати в морі
      correct: false
