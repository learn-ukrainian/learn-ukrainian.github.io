version: '1.0'
module: motion-flight-swim
level: b1
inline:
- id: quiz-focus-on-choosing-or-correct-prefixed-form
  type: quiz
  instruction: Оберіть правильний варіант дієслова.
  items:
  - question: Птахи _____ високо в небі.
    options:
    - літають
    - летять
    - літає
    - летить
    correct: 0
  - question: Дивись, той літак _____ прямо на нас!
    options:
    - літає
    - летить
    - летять
    - літають
    correct: 1
  - question: Наш рейс _____ з Києва о 7 ранку.
    options:
    - вилетів
    - залетів
    - прилетів
    - долетів
    correct: 0
  - question: Ми маємо _____ до Лондона за дві години.
    options:
    - перелетіти
    - вилетіти
    - долетіти
    - облетіти
    correct: 2
  - question: Метелик _____ у відкрите вікно кімнати.
    options:
    - вилетів
    - залетів
    - прилетів
    - відлетів
    correct: 1
  - question: Пілоти _____ майже кожного дня.
    options:
    - летять
    - лечу
    - літаємо
    - літають
    correct: 3
  - question: Літак успішно _____ через океан.
    options:
    - перелетів
    - облетів
    - підлетів
    - долетів
    correct: 0
  - question: Завтра мій брат _____ до мене в гості.
    options:
    - залетить
    - прилетить
    - відлетить
    - облетить
    correct: 1
- id: fill-in-swim-verbs
  type: fill-in
  instruction: Вставте правильне дієслово з префіксом.
  items:
  - sentence: Великий пором _____ від берега і почав свій маршрут.
    answer: відплив
    options:
    - відплив
    - приплив
    - доплив
  - sentence: Ми вирішили _____ це широке озеро.
    answer: переплисти
    options:
    - переплисти
    - обплисти
    - підплисти
  - sentence: Корабель має _____ до порту призначення ввечері.
    answer: доплисти
    options:
    - доплисти
    - відпливти
    - переплисти
  - sentence: Наша мета — _____ цей острів на човні з усіх боків.
    answer: обплисти
    options:
    - обплисти
    - заплисти
    - виплисти
  - sentence: Рятувальник швидко _____ до людини у воді.
    answer: підплив
    options:
    - підплив
    - відплив
    - переплив
  - sentence: З-під води раптом _____ велика риба.
    answer: випливла
    options:
    - випливла
    - запливла
    - припливла
  - sentence: Човен успішно _____ до дерев'яного причалу.
    answer: приплив
    options:
    - приплив
    - відплив
    - заплив
  - sentence: Мій собака дуже любить _____ у річці влітку.
    answer: плавати
    options:
    - плавати
    - пливти
    - переплисти
- id: match-up-transport-vocab
  type: match-up
  instruction: З'єднайте слова з їхніми значеннями.
  pairs:
  - left: пором
    right: Велике пасажирське судно, яке перевозить людей і машини
  - left: причал
    right: Місце в порту для стоянки кораблів і човнів
  - left: палуба
    right: Відкрита верхня частина судна
  - left: каюта
    right: Окрема кімната для пасажирів на кораблі
  - left: термінал
    right: Велика будівля в аеропорту для пасажирів
  - left: рейс
    right: Запланований маршрут літака або корабля
  - left: пересадка
    right: Зміна літака під час довгої подорожі
  - left: посадковий талон
    right: Документ, потрібний для проходу в літак
- id: group-sort-prefixes
  type: group-sort
  instruction: Розподіліть дієслова за значенням їхніх префіксів.
  groups:
  - label: Початок руху або рух назовні
    items:
    - вилетіти
    - виплисти
    - відлетіти
    - відпливти
  - label: Прибуття або досягнення мети
    items:
    - прилетіти
    - припливти
    - долетіти
    - доплисти
  - label: Рух через перешкоду або навколо
    items:
    - перелетіти
    - переплисти
    - облетіти
    - обплисти
- id: error-correction-motion
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні.
  items:
  - sentence: Він професійно пливе.
    error: пливе
    correction: плаває
    error_type: word
    options:
    - плаває
    - пливуть
    - плава
    explanation: Для опису загальної навички або спорту використовується різноспрямоване
      дієслово «плавати».
  - sentence: Птах прилітав до мого вікна вчора один раз.
    error: прилітав
    correction: прилетів
    error_type: word
    options:
    - прилетів
    - літав
    - прилетіла
    explanation: Одноразова завершена дія в минулому вимагає дієслова доконаного виду.
  - sentence: Ми змогли перепливти цю річку.
    error: перепливти
    correction: переплисти
    error_type: word
    options:
    - переплисти
    - пропливти
    - переплили
    explanation: В українській мові форма «переплисти» є стандартною літературною
      формою, щоб уникнути збігу приголосних.
  - sentence: Літак летить сюди щогодини.
    error: летить
    correction: прилітає
    error_type: word
    options:
    - прилітає
    - літає
    - долітає
    explanation: Для регулярної дії прибуття використовується недоконаний вид «прилітати».
  - sentence: Наш корабель відлетів від берега.
    error: відлетів
    correction: відплив
    error_type: word
    options:
    - відплив
    - приплив
    - доплив
    explanation: Корабель рухається по воді, тому використовуємо корінь -плив-.
  - sentence: Час швидко плаває.
    error: плаває
    correction: летить
    error_type: word
    options:
    - летить
    - пливе
    - літає
    explanation: В українській мові є популярний сталий вираз «час летить», що означає
      дуже швидкий рух часу.
- id: free-write-journey
  type: essay-response
  prompt: 'Напишіть коротку історію про вашу уявну подорож. Використайте щонайменше
    6 різних дієслів руху з префіксами (наприклад: вилетіти, припливти, переплисти)
    та слова з теми транспорту (аеропорт, пором, каюта).'
  min_words: 50
  model_answer: Минулого літа ми вирішили поїхати у велику подорож. Спочатку ми приїхали
    в аеропорт і швидко пройшли реєстрацію. Наш літак вилетів вчасно, і ми змогли
    долетіти до Італії за три години. Потім ми поїхали в порт, де на нас чекав великий
    пором. Ми зайшли на палубу, і пором повільно відплив від причалу. Нам треба було
    переплисти море. Поки ми пливли, над нами літали красиві птахи. Ввечері ми успішно
    припливли на острів.
workbook:
- type: fill-in
  instruction: Вставте правильну форму дієслова за особою.
  items:
  - sentence: Зараз я _____ до Парижа.
    answer: лечу
    options:
    - лечу
    - летять
    - летиш
  - sentence: Чому ти _____ так швидко?
    answer: пливеш
    options:
    - пливеш
    - пливемо
    - пливуть
  - sentence: Ми часто _____ у відпустку літаком.
    answer: літаємо
    options:
    - літаємо
    - літаєте
    - літають
  - sentence: Вони _____ у басейні щоранку.
    answer: плавають
    options:
    - плавають
    - плаваємо
    - плаває
  - sentence: Він _____ на дуже важливу зустріч.
    answer: летить
    options:
    - летить
    - лечу
    - летимо
  - sentence: Ви _____ до того острова чи до берега?
    answer: пливете
    options:
    - пливете
    - пливеш
    - пливу
