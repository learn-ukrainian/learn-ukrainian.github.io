version: '1.0'
module: motion-flight-swim
level: b1
workbook:
- id: quiz-verbs-prefixes
  type: quiz
  instruction: Оберіть правильний варіант дієслова
  items:
  - question: Птахи _____ на південь щоосені.
    options:
    - летять
    - літають
    - летите
    - літає
    correct: 1
  - question: Мій брат дуже боїться _____ літаком.
    options:
    - летіти
    - літати
    - летить
    - літає
    correct: 1
  - question: Наш рейс _____ абсолютно вчасно.
    options:
    - прилетів
    - прилітав
    - залетів
    - полетів
    correct: 0
  - question: Ми _____ з аеропорту Бориспіль о сьомій ранку.
    options:
    - вилетіли
    - відлетіли
    - злетіли
    - налетіли
    correct: 0
  - question: Великий нічний метелик _____ у відкрите вікно кімнати.
    options:
    - залетів
    - прилетів
    - налетів
    - долетів
    correct: 0
  - question: Жовте осіннє листя зараз повільно _____ на холодну землю.
    options:
    - летить
    - літає
    - літають
    - летять
    correct: 0
  - question: Туристичний вертоліт повільно _____ навколо високої гори.
    options:
    - облетів
    - перелетів
    - прилетів
    - налетів
    correct: 0
  - question: Сміливі пілоти змогли безпечно _____ Атлантичний океан.
    options:
    - перелетіти
    - облетіти
    - долетіти
    - залетіти
    correct: 0
- id: fill-in-maritime
  type: fill-in
  instruction: Вставте правильне дієслово з префіксом
  items:
  - sentence: Корабель абсолютно вчасно _____ до головного причалу.
    answer: приплив
    options:
    - приплив
    - відплив
    - переплисти
    - запливати
  - sentence: Вранці старий дерев'яний човен повільно _____ від берега.
    answer: відплив
    options:
    - приплив
    - відплив
    - підплив
    - доплив
  - sentence: Цього спекотного літа спортсмен дуже хоче самостійно _____ цю широку
      річку.
    answer: переплисти
    options:
    - виплив
    - відплив
    - переплисти
    - запливати
  - sentence: Рятувальники просять туристів ніколи не _____ за червоні буйки!
    answer: запливати
    options:
    - приплив
    - переплисти
    - запливати
    - виплив
  - sentence: Цікавий маленький дельфін дуже близько _____ до здивованих людей.
    answer: підплив
    options:
    - відплив
    - запливати
    - підплив
    - доплив
  - sentence: Вкрай стомлений плавець ледве _____ до рятувального буйка.
    answer: доплив
    options:
    - доплив
    - виплив
    - поплив
    - підплив
  - sentence: Маленький моторний катер обережно _____ з темної морської печери.
    answer: виплив
    options:
    - приплив
    - виплив
    - переплисти
    - запливати
  - sentence: Після посадки пасажирів великий пором _____ у своє перше плавання.
    answer: поплив
    options:
    - доплив
    - виплив
    - поплив
    - підплив
- id: match-up-vocab
  type: match-up
  instruction: З'єднайте авіаційну та морську лексику з її значенням
  pairs:
  - left: рейс
    right: Запланований регулярний маршрут літака
  - left: пором
    right: Широке судно для перевезення автомобілів на інший берег
  - left: причал
    right: Місце біля берега, де зупиняються кораблі
  - left: ілюмінатор
    right: Маленьке кругле вікно в пасажирському літаку або на кораблі
  - left: палуба
    right: Відкрита верхня частина корабля для прогулянок пасажирів
  - left: термінал
    right: Велика будівля в аеропорту, звідки відправляються літаки
  - left: каюта
    right: Невелика окрема кімната для сну та відпочинку на кораблі
  - left: пересадка
    right: Процес тимчасової зупинки та зміни літака в іншому місті
- id: group-sort-prefixes
  type: group-sort
  instruction: Розподіліть дієслова за категорією значення префікса
  groups:
  - label: Початок і кінець руху (Arrival/Departure)
    items:
    - прилетіти
    - вилетіти
    - припливти
    - відпливти
  - label: Рух через або навколо (Across/Around)
    items:
    - переплисти
    - перелетіти
    - облетіти
    - обплисти
  - label: Наближення або заглиблення (Approach/Inside)
    items:
    - залетіти
    - підлетіти
    - підплисти
    - заплисти
- id: error-correction-verbs
  type: error-correction
  instruction: Знайдіть і виправте помилку у вживанні дієслів руху
  items:
  - sentence: Спортсмен дуже хоче самостійно перепливти це широке озеро.
    error: перепливти
    correction: переплисти
    error_type: word
    options:
    - переплисти
    - плисти
    - допливти
    explanation: У словах з префіксом ми завжди використовуємо форму на -плисти (переплисти,
      доплисти), а не -пливти.
  - sentence: Минулого року мій брат дуже часто летів у відрядження.
    error: летів
    correction: літав
    error_type: word
    options:
    - літав
    - летить
    - літає
    explanation: Для регулярної дії, що повторювалася в минулому, ми використовуємо
      різноспрямоване дієслово «літав».
  - sentence: Маленька рибка пливе в домашньому акваріумі туди-сюди цілий день.
    error: пливе
    correction: плаває
    error_type: word
    options:
    - плаває
    - пливуть
    - плавають
    explanation: Хаотичний рух у різних напрямках (туди-сюди) без конкретної мети
      описується дієсловом «плаває».
  - sentence: Наш сучасний літак відлетів з аеропорту Бориспіль рівно за розкладом.
    error: відлетів
    correction: вилетів
    error_type: word
    options:
    - вилетів
    - долетів
    - налетів
    explanation: Коли літак залишає аеропорт і піднімається в небо, ми використовуємо
      префікс ви- (вилетів).
  - sentence: Корабель доплив навколо всього зеленого острова і повернувся в порт.
    error: доплив
    correction: обплив
    error_type: word
    options:
    - обплив
    - переплив
    - заплив
    explanation: Для опису кругового руху навколо якогось об'єкта використовується
      префікс об- (обплив).
  - sentence: Цей міжнародний рейс щодня прилетів до нашої столиці о п'ятій вечора.
    error: прилетів
    correction: прилітає
    error_type: word
    options:
    - прилітає
    - вилітає
    - летить
    explanation: Для опису регулярної дії (щодня) потрібне дієслово недоконаного виду
      «прилітає», а не форма минулого часу «прилетів».
- id: essay-response-story
  type: essay-response
  prompt: 'Напишіть коротку історію (6-8 речень) про вашу уявну подорож. У цій мандрівці
    ви повинні спочатку летіти літаком, а потім плисти на поромі або кораблі. Обов''язково
    використайте щонайменше 6 різних дієслів руху з префіксами (наприклад: вилетіти,
    прилетіти, переплисти, відпливти тощо) та лексику з модуля (аеропорт, рейс, порт,
    палуба).'
  min_words: 50
  model_answer: Минулого року я вирішив полетіти до Італії. Я приїхав у великий аеропорт,
    мій рейс не запізнився, і ми вилетіли вчасно. Літак летів дуже високо, і ми швидко
    перелетіли велику відстань. Коли ми прилетіли, я відразу поїхав у порт. Там на
    мене вже чекав великий пором. Наш пором повільно відплив від причалу. Я вийшов
    на палубу і захоплено дивився, як дельфіни підпливають до нашого корабля. За кілька
    годин ми успішно перепливли широку затоку і допливли до красивого зеленого острова.
- id: fill-in-conjugation
  type: fill-in
  instruction: Вставте правильну форму дієслова «пливти» або «плавати» у теперішньому
    часі
  items:
  - sentence: Я дуже швидко і впевнено _____ до берега.
    answer: пливу
    options:
    - пливу
    - пливеш
    - пливемо
    - пливуть
  - sentence: Куди ти так обережно _____ через холодну річку?
    answer: пливеш
    options:
    - пливеш
    - пливете
    - пливуть
    - пливу
  - sentence: Величезний корабель дуже повільно _____ по спокійному морю.
    answer: пливе
    options:
    - пливе
    - пливеш
    - пливемо
    - пливуть
  - sentence: Ми разом _____ на той далекий зелений острів.
    answer: пливемо
    options:
    - пливемо
    - пливете
    - пливу
    - пливуть
  - sentence: Діти, ви дуже добре _____ у цьому басейні!
    answer: плаваєте
    options:
    - плаваєте
    - плаваєш
    - плаваємо
    - плавають
  - sentence: Маленькі риби швидко _____ до свіжої їжі в акваріумі.
    answer: пливуть
    options:
    - пливуть
    - пливе
    - пливеш
    - пливу
- id: group-sort-conjugation-class
  type: group-sort
  instruction: Розподіліть дієслова за типом дієвідміни
  groups:
  - label: І дієвідміна (-уть/-ють, -е/-є)
    items:
    - пливуть
    - плавають
    - літає
    - пливеш
    - плаваємо
    - літають
  - label: ІІ дієвідміна (-ать/-ять, -и/-ї)
    items:
    - летять
    - летить
    - летиш
    - лечу
    - летимо
    - летите
- id: match-up-pronouns
  type: match-up
  instruction: З'єднайте особовий займенник із правильною формою дієслова «летіти»
  pairs:
  - left: я
    right: лечу
  - left: ти
    right: летиш
  - left: він/вона/воно
    right: летить
  - left: ми
    right: летимо
  - left: ви
    right: летите
  - left: вони
    right: летять
- id: error-correction-conjugation
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінюванні дієслів руху
  items:
  - sentence: Ти завжди пливиш так далеко у відкрите море!
    error: пливиш
    correction: пливеш
    error_type: word
    options:
    - пливеш
    - пливуть
    - пливемо
    explanation: Дієслово «пливти» належить до І дієвідміни, тому в другій особі однини
      має закінчення -еш.
  - sentence: Влітку діти плавуть у відкритому басейні щодня.
    error: плавуть
    correction: плавають
    error_type: word
    options:
    - плавають
    - плаваєте
    - плаваємо
    explanation: Правильна форма для третьої особи множини від «плавати» — вони плавають.
  - sentence: Біла пташка лете дуже високо в чистому небі.
    error: лете
    correction: летить
    error_type: word
    options:
    - летить
    - летять
    - летиш
    explanation: Дієслово «летіти» належить до ІІ дієвідміни, тому має закінчення
      -ить (він/вона/воно летить).
  - sentence: Цієї зими ми літим на відпочинок у теплі країни.
    error: літим
    correction: летимо
    error_type: word
    options:
    - летимо
    - літаємо
    - летите
    explanation: Правильна літературна форма від «летіти» для першої особи множини
      — ми летимо.
  - sentence: Великий вантажний корабель пливеть дуже швидко.
    error: пливеть
    correction: пливе
    error_type: word
    options:
    - пливе
    - пливеш
    - пливуть
    explanation: Форма для третьої особи однини — він/вона/воно пливе (завжди без
      м'якого знака).
  - sentence: Ви плавите у воді дуже професійно і красиво.
    error: плавите
    correction: плаваєте
    error_type: word
    options:
    - плаваєте
    - плаваємо
    - плавають
    explanation: Форма для другої особи множини від «плавати» — ви плаваєте.
- id: odd-one-out-vocab
  type: odd-one-out
  instruction: 'Четверте зайве: оберіть слово, що не належить до семантичної групи'
  items:
  - words:
    - аеропорт
    - рейс
    - літак
    - пором
    correct: 3
    explanation: Пором — це водний транспорт, а інші слова стосуються повітряного
      руху.
  - words:
    - палуба
    - каюта
    - причал
    - крило
    correct: 3
    explanation: Крило — це частина літака, а інші слова описують корабель та порт.
  - words:
    - човен
    - катер
    - яхта
    - літак
    correct: 3
    explanation: Літак пересувається у повітрі, тоді як усі інші — це водний транспорт.
  - words:
    - прилетіти
    - вилетіти
    - попливти
    - перелетіти
    correct: 2
    explanation: Дієслово «попливти» описує рух на воді, а всі інші — це форми дієслова
      «летіти».
  - words:
    - плавати
    - літати
    - обплисти
    - доплисти
    correct: 1
    explanation: Дієслово «літати» означає рух у повітрі, а інші описують рух у воді.
  - words:
    - термінал
    - літак
    - аеропорт
    - корабель
    correct: 3
    explanation: Корабель — це водний транспорт, а термінал, літак і аеропорт належать
      до авіації.
- id: anagram-vocab
  type: anagram
  instruction: Складіть слово з літер
  items:
  - letters:
    - п
    - а
    - л
    - у
    - б
    - а
    answer: палуба
    hint: Відкрита верхня частина корабля для прогулянок.
  - letters:
    - к
    - а
    - ю
    - т
    - а
    answer: каюта
    hint: Окрема невелика кімната для сну на кораблі.
  - letters:
    - р
    - е
    - й
    - с
    answer: рейс
    hint: Запланований маршрут літака.
  - letters:
    - п
    - о
    - р
    - о
    - м
    answer: пором
    hint: Велике судно, яке перевозить автомобілі та людей на інший берег.
  - letters:
    - ч
    - о
    - в
    - е
    - н
    answer: човен
    hint: Маленький традиційний водний транспорт (часто дерев'яний).
  - letters:
    - п
    - р
    - и
    - ч
    - а
    - л
    answer: причал
    hint: Місце біля берега, де надійно зупиняються кораблі.
- id: translate-phrases
  type: translate
  instruction: Оберіть правильний український переклад для англійської фрази
  items:
  - source: direct flight
    options:
    - text: прямий рейс
      correct: true
    - text: стикувальний рейс
      correct: false
    - text: швидкий політ
      correct: false
  - source: connecting flight
    options:
