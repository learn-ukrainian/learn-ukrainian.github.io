- type: quiz
  instruction: Оберіть правильний варіант написання складного чи складеного прийменника
  items:
  - question: Кіт обережно дивиться _____ дивана.
    options:
    - з-під
    - з під
    - зпід
    - спід
    correct: 0
  - question: Яскраве сонце визирнуло _____ хмар.
    options:
    - з-за
    - з за
    - зза
    - сза
    correct: 0
  - question: Вони спокійно гуляли _____ річкою.
    options:
    - понад
    - по-над
    - по над
    - піднад
    correct: 0
  - question: Нова кав'ярня знаходиться _____ парку.
    options:
    - неподалік від
    - не подалік від
    - неподаліквід
    - не-подалік від
    correct: 0
  - question: _____ усіх дерев у лісі це найстаріше.
    options:
    - З-поміж
    - З поміж
    - Зпоміж
    - Споміж
    correct: 0
  - question: _____ великої кімнати стояв круглий стіл.
    options:
    - Посеред
    - По-серед
    - По серед
    - Посереди
    correct: 0
- type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про прийменники
  items:
  - statement: Прийменник 'між' завжди вимагає родового відмінка (наприклад, 'між
      нас').
    correct: false
    explanation: Прийменник 'між' вимагає орудного відмінка (між нами, між вікнами).
  - statement: Слова 'довкола' та 'навколо' є абсолютними синонімами і вимагають родового
      відмінка.
    correct: true
    explanation: Обидва слова вказують на розташування по периметру і керують родовим
      відмінком.
  - statement: Слово 'навпроти' може бути як прийменником, так і прислівником, залежно
      від речення.
    correct: true
    explanation: Якщо після 'навпроти' є іменник (навпроти театру) - це прийменник,
      якщо воно стоїть самостійно (він сів навпроти) - прислівник.
  - statement: Прийменники 'під' та 'за' завжди вимагають орудного відмінка, незалежно
      від ситуації.
    correct: false
    explanation: Вони вимагають орудного відмінка для місця (де?), але знахідного
      для напрямку руху (куди?).
  - statement: Складні прийменники, утворені з прийменником 'з', завжди пишуться через
      дефіс (з-за, з-під).
    correct: true
    explanation: Це чітке і безвиняткове правило української орфографії.
  - statement: Слово 'обабіч' означає 'лише з лівого боку'.
    correct: false
    explanation: '''Обабіч'' означає ''по обох боках'' (наприклад, обабіч дороги).'
