version: '1.0'
module: prepositions-spatial-review
level: b1
inline:
- id: match-up-match-spatial-prepositions-to-their-synonyms
  type: match-up
  instruction: З'єднайте просторові прийменники з їхніми синонімами
  pairs:
  - left: біля
    right: коло
  - left: серед
    right: посеред
  - left: навколо
    right: довкола
  - left: перед
    right: попереду
  - left: за
    right: позаду
  - left: між
    right: поміж
  - left: над
    right: понад
  - left: поблизу
    right: неподалік
- id: quiz-case-choice
  type: quiz
  instruction: Оберіть правильний відмінок після просторового прийменника
  items:
  - question: Я чекаю тебе біля _____.
    options:
    - вокзалу
    - вокзалом
    - вокзал
    - вокзалі
    correct: 0
  - question: Кіт солодко спить під _____.
    options:
    - столом
    - стола
    - стіл
    - столі
    correct: 0
  - question: Хлопчик злякався і побіг за _____.
    options:
    - дерево
    - деревом
    - дерева
    - дереві
    correct: 0
  - question: Стіл стоїть між _____.
    options:
    - вікнами
    - вікон
    - вікна
    - вікнах
    correct: 0
  - question: Аптека знаходиться навпроти _____.
    options:
    - супермаркету
    - супермаркетом
    - супермаркет
    - супермаркеті
    correct: 0
  - question: Вона довго стояла перед _____.
    options:
    - дзеркалом
    - дзеркала
    - дзеркало
    - дзеркалі
    correct: 0
  - question: Маленька пташка літає над _____.
    options:
    - площею
    - площі
    - площу
    - площе
    correct: 0
  - question: Ми гуляли серед старих _____.
    options:
    - дерев
    - деревами
    - дерева
    - деревах
    correct: 0
- id: group-sort-cases
  type: group-sort
  instruction: Розподіліть прийменники за відмінком, якого вони вимагають
  groups:
  - label: Родовий відмінок
    items:
    - біля
    - серед
    - навпроти
    - довкола
    - обабіч
    - позаду
  - label: Орудний відмінок
    items:
    - між
    - над
    - перед
    - поруч з
  - label: Орудний або Знахідний (залежить від напрямку)
    items:
    - під
    - за
- id: fill-in-prepositions
  type: fill-in
  instruction: Доповніть речення правильним просторовим прийменником
  items:
  - sentence: Стіл стоїть _____ ліжком та шафою.
    answer: між
    options:
    - між
    - серед
    - біля
  - sentence: Аптека розташована прямо _____ супермаркету.
    answer: навпроти
    options:
    - навпроти
    - між
    - над
  - sentence: Туристи зібралися _____ пам'ятника.
    answer: біля
    options:
    - біля
    - між
    - під
  - sentence: Кіт злякався і заховався _____ диван.
    answer: під
    options:
    - під
    - над
    - перед
  - sentence: Він обережно дістав стару коробку _____ ліжка.
    answer: з-під
    options:
    - з-під
    - з-за
    - під
  - sentence: Сонце повільно сідає _____ темним лісом.
    answer: за
    options:
    - за
    - з-за
    - перед
  - sentence: _____ широкої дороги рясно цвіли жовті соняшники.
    answer: Обабіч
    options:
    - Обабіч
    - Між
    - Під
  - sentence: _____ великого озера ростуть старі верби.
    answer: Довкола
    options:
    - Довкола
    - Між
    - З-під
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінку після просторового прийменника
  items:
  - sentence: Я чекаю тебе біля школа.
    error: школа
    correction: школи
    error_type: word
    options:
    - школи
    - школою
    - школі
    explanation: Прийменник 'біля' вимагає родового відмінка.
  - sentence: Стіл стоїть між вікна.
    error: вікна
    correction: вікнами
    error_type: word
    options:
    - вікнами
    - вікон
    - вікнах
    explanation: Прийменник 'між' вимагає орудного відмінка.
  - sentence: Кіт солодко спить під стіл.
    error: стіл
    correction: столом
    error_type: word
    options:
    - столом
    - стола
    - столі
    explanation: Для опису місця (де?) з прийменником 'під' потрібен орудний відмінок.
  - sentence: Аптека знаходиться навпроти супермаркет.
    error: супермаркет
    correction: супермаркету
    error_type: word
    options:
    - супермаркету
    - супермаркетом
    - супермаркеті
    explanation: Прийменник 'навпроти' вимагає родового відмінка.
  - sentence: Ми зустрінемося перед кінотеатру.
    error: кінотеатру
    correction: кінотеатром
    error_type: word
    options:
    - кінотеатром
    - кінотеатр
    - кінотеатрі
    explanation: Прийменник 'перед' вимагає орудного відмінка.
  - sentence: Він впевнено йшов серед людьми.
    error: людьми
    correction: людей
    error_type: word
    options:
    - людей
    - людям
    - люди
    explanation: Прийменник 'серед' вимагає родового відмінка.
- id: free-write-description
  type: essay-response
  instruction: Опишіть вашу ідеальну кімнату або улюблену вулицю.
  prompt: 'Напишіть короткий текст (мінімум 50 слів). Використайте щонайменше 8 різних
    просторових прийменників (наприклад: посеред, біля, навпроти, між, під, над, поруч
    з, обабіч, за, перед).'
  min_words: 50
  model_answer: Моя ідеальна кімната дуже світла і простора. Посеред кімнати лежить
    м'який килим, на якому приємно сидіти. Біля вікна стоїть великий письмовий стіл
    для роботи. Навпроти столу розташоване зручне ліжко. Між ліжком та шафою є трохи
    вільного місця для моєї гітари. Над столом висять дерев'яні книжкові полиці. Під
    вікном ростуть красиві кімнатні рослини. Поруч з дверима висить велике дзеркало.
    За ліжком я поставив маленький світильник, щоб читати ввечері. Я дуже люблю проводити
    час у цій кімнаті, бо тут завжди затишно.
  evaluation_criteria:
  - Використано щонайменше 8 просторових прийменників.
  - Іменники після прийменників стоять у правильному відмінку.
  - Текст логічно та послідовно описує простір.
  - Довжина тексту — 50 або більше слів.
