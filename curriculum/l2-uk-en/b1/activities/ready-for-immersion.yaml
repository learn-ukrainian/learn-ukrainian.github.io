- type: match-up
  title: 'Граматичні терміни: Знайдіть пару'
  instruction: 'З’єднайте український граматичний термін з його визначенням.'
  pairs:
    - left: 'Іменник'
      right: 'Частина мови, що називає предмет (Хто? Що?)'
    - left: 'Дієслово'
      right: 'Частина мови, що означає дію або стан'
    - left: 'Прикметник'
      right: 'Частина мови, що виражає ознаку предмета'
    - left: 'Підмет'
      right: 'Головний член речення, виконавець дії'
    - left: 'Присудок'
      right: 'Головний член речення, що виражає дію підмета'
    - left: 'Доконаний вид'
      right: 'Категорія дієслова, що означає завершену дію (результат)'
    - left: 'Недоконаний вид'
      right: 'Категорія дієслова, що означає процес або тривалість'
    - left: 'Прийменник'
      right: 'Службова частина мови, що стоїть перед іменником'
    - left: 'Сполучник'
      right: 'Службова частина мови, що з’єднує слова або речення'
    - left: 'Частка'
      right: 'Службова частина мови, що додає смисловий відтінок'
    - left: 'Число'
      right: 'Граматична категорія, що показує кількість предметів (один чи багато)'
    - left: 'Рід'
      right: 'Граматична категорія іменника (чоловічий, жіночий, середній)'

- type: group-sort
  title: 'Частини мови: Самостійні чи Службові?'
  instruction: 'Розподіліть слова та категорії: самостійні частини мови (мають лексичне значення) або службові (з’єднують слова).'
  groups:
    - name: 'Самостійні частини мови'
      items:
        - 'іменник'
        - 'дієслово'
        - 'прикметник'
        - 'займенник'
        - 'числівник'
        - 'прислівник'
        - 'стіл (приклад)'
        - 'читати (приклад)'
        - 'гарний (приклад)'
        - 'швидко (приклад)'
    - name: 'Службові частини мови'
      items:
        - 'прийменник'
        - 'сполучник'
        - 'частка'
        - 'на (приклад)'
        - 'і (приклад)'
        - 'не (приклад)'
        - 'але (приклад)'

- type: fill-in
  title: 'Перевірка теорії'
  instruction: 'Впишіть пропущене слово, щоб завершити правило.'
  items:
    - sentence: 'Слово, яке відповідає на питання «Хто?» або «Що?», називається {{answer}}.'
      answer: 'іменник'
      options: ['іменник', 'підмет', 'займенник', 'додаток']
      explanation: 'Іменник називає предмети та особи.'
    - sentence: 'В українській мові є сім {{answer}}, які показують роль слова в реченні.'
      answer: 'відмінків'
      options: ['відмінків', 'родів', 'часів', 'дієслів']
      explanation: 'Категорія відмінка (case) має 7 форм.'
    - sentence: 'Слова «і», «але», «та» — це {{answer}}.'
      answer: 'сполучники'
      options: ['сполучники', 'прийменники', 'частки', 'вигуки']
      explanation: 'Сполучники (conjunctions) з’єднують слова або речення.'
    - sentence: 'Вид дієслова, що означає результат, називається {{answer}}.'
      answer: 'доконаний'
      options: ['доконаний', 'недоконаний', 'минулий', 'майбутній']
      explanation: 'Доконаний вид (perfective aspect) вказує на завершеність.'
    - sentence: 'Головні члени речення — це підмет і {{answer}}.'
      answer: 'присудок'
      options: ['присудок', 'додаток', 'означення', 'обставина']
      explanation: 'Граматична основа складається з підмета і присудка.'
    - sentence: 'Прикметник узгоджується з іменником у роді, числі та {{answer}}.'
      answer: 'відмінку'
      options: ['відмінку', 'особі', 'часі', 'виді']
      explanation: 'Прикметник копіює рід, число і відмінок іменника.'
    - sentence: 'Звук [ґ] в українській мові є {{answer}} і дзвінким.'
      answer: 'твердим'
      options: ['твердим', 'м’яким', 'глухим', 'шиплячим']
      explanation: 'Звук [ґ] (як у слові ґанок) — твердий.'
    - sentence: 'Скорочення «див.» означає {{answer}}.'
      answer: 'дивись'
      options: ['дивись', 'дивина', 'дивно', 'диван']
      explanation: '«Див.» — це скорочення від імператива «дивись» (see).'

- type: mark-the-words
  title: 'Знайдіть іменники'
  instruction: 'Знайдіть і позначте всі іменники (слова, що відповідають на питання Хто? Що?) у тексті.'
  text: 'Студенти вивчають нові слова щодня. Викладач пояснює складні правила на дошці. Книга лежить на столі в бібліотеці. Граматика — ключ до правильної мови.'
  answers:
    - 'Студенти'
    - 'слова'
    - 'Викладач'
    - 'правила'
    - 'дошці'
    - 'Книга'
    - 'столі'
    - 'бібліотеці'
    - 'Граматика'
    - 'ключ'
    - 'мови'

- type: error-correction
  title: 'Виправте помилки'
  instruction: 'Знайдіть граматичну або фактологічну помилку в реченні та виправте її.'
  items:
    - sentence: 'Слово «швидко» — це прикметник.'
      error: 'прикметник'
      answer: 'прислівник'
      options: ['прислівник', 'дієслово', 'іменник', 'займенник']
      explanation: 'Слово «швидко» відповідає на питання «як?» і не змінюється, отже це прислівник.'
    - sentence: 'В українській мові 5 відмінків.'
      error: '5'
      answer: '7'
      options: ['7', '6', '12', '3']
      explanation: 'Українська мова має 7 відмінків (включно з кличним).'
    - sentence: 'Дієслово «читати» — це доконаний вид.'
      error: 'доконаний'
      answer: 'недоконаний'
      options: ['недоконаний', 'минулий', 'майбутній', 'складний']
      explanation: 'Читати (що робити?) — це процес, отже недоконаний вид.'
    - sentence: 'Прийменник — це самостійна частина мови.'
      error: 'самостійна'
      answer: 'службова'
      options: ['службова', 'головна', 'складна', 'змінна']
      explanation: 'Прийменник не має лексичного значення, тому він службовий.'
    - sentence: 'Слово «стіл» має жіночий рід.'
      error: 'жіночий'
      answer: 'чоловічий'
      options: ['чоловічий', 'середній', 'спільний', 'ніякий']
      explanation: 'Стіл (він, мій) — чоловічого роду.'
    - sentence: 'Літера Ґ позначає м’який звук.'
      error: 'м’який'
      answer: 'твердий'
      options: ['твердий', 'глухий', 'шиплячий', 'голосний']
      explanation: 'Літера Ґ позначає твердий проривний звук [ɡ].'

- type: quiz
  title: 'Метамова та загальні поняття'
  instruction: 'Дайте відповідь на питання про структуру мови.'
  items:
    - question: 'Яка принципова різниця між звуком і буквою?'
      explanation: 'Букви ми пишемо і бачимо, а звуки вимовляємо і чуємо.'
      options:
        - text: 'Букву ми пишемо, а звук вимовляємо'
          correct: true
        - text: 'Букву ми чуємо, а звук бачимо'
          correct: false
        - text: 'Немає різниці, це одне й те саме'
          correct: false
        - text: 'Звуки існують тільки в піснях'
          correct: false
    - question: 'Яке скорочення використовується для слова «наприклад»?'
      explanation: 'Стандартне скорочення — напр.'
      options:
        - text: 'напр.'
          correct: true
        - text: 'нп.'
          correct: false
        - text: 'прик.'
          correct: false
        - text: 'нап.'
          correct: false
    - question: 'На яке питання відповідає додаток (object)?'
      explanation: 'Додаток відповідає на питання непрямих відмінків (Кого? Чого? Кому? Чому?...).'
      options:
        - text: 'Кого? Чого? Кому? Чому?'
          correct: true
        - text: 'Хто? Що?'
          correct: false
        - text: 'Який? Яка? Яке?'
          correct: false
        - text: 'Де? Коли? Як?'
          correct: false
    - question: 'Яка частина мови є незмінною (не має закінчення)?'
      explanation: 'Прислівник не змінюється за родами, числами чи відмінками.'
      options:
        - text: 'Прислівник'
          correct: true
        - text: 'Іменник'
          correct: false
        - text: 'Прикметник'
          correct: false
        - text: 'Дієслово'
          correct: false
    - question: 'Як ми називаємо науку, яка вивчає мову та її структуру?'
      explanation: 'Мовознавство (лінгвістика) — це наука про мову та її будову.'
      options:
        - text: 'Мовознавство (лінгвістика)'
          correct: true
        - text: 'Вміння гарно писати'
          correct: false
        - text: 'Мистецтво перекладу'
          correct: false
        - text: 'Вивчення літератури'
          correct: false
    - question: 'Яка функція закінчення у слові?'
      explanation: 'Закінчення служить для зв’язку слів у реченні та виражає граматичні значення.'
      options:
        - text: 'Зв’язує слова в реченні'
          correct: true
        - text: 'Утворює нові слова'
          correct: false
        - text: 'Несе основне лексичне значення'
          correct: false
        - text: 'Ніколи не змінюється'
          correct: false
    - question: 'Що вивчає розділ граматики, який ми називаємо «морфологія»?'
      explanation: 'Морфологія вивчає частини мови та будову слова.'
      options:
        - text: 'Розділ граматики про частини мови'
          correct: true
        - text: 'Розділ про звуки мови'
          correct: false
        - text: 'Розділ про розділові знаки'
          correct: false
        - text: 'Розділ про словниковий запас'
          correct: false
    - question: 'Яке дієслово належить до доконаного виду?'
      explanation: '«Написати» означає завершену дію (що зробити?), отже це доконаний вид.'
      options:
        - text: 'написати'
          correct: true
        - text: 'писати'
          correct: false
        - text: 'читати'
          correct: false
        - text: 'робити'
          correct: false
