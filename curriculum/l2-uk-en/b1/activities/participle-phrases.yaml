inline:
- id: quiz-focus-on-identifying-the-and-the-in-12-sentences
  type: quiz
  instruction: Визначте означуване слово або дієприкметниковий зворот у реченні
  items:
  - question: 'У реченні «Річка, що вийшла з берегів, затопила поля» означуваним словом
      є:'
    options:
    - річка
    - поля
    - берегів
    - вийшла
    correct: 0
  - question: Який фрагмент є дієприкметниковим зворотом у реченні «Будинки, пошкоджені
      повінню, обстежують інженери»?
    options:
    - обстежують інженери
    - пошкоджені повінню
    - будинки пошкоджені
    - будинки обстежують
    correct: 1
  - question: 'У реченні «Фільм, знятий в Україні, отримав нагороду» означуваним словом
      є:'
    options:
    - Україні
    - нагороду
    - отримав
    - фільм
    correct: 3
  - question: 'Визначте дієприкметниковий зворот у реченні «Книжка, написана відомим
      автором, лежала на столі»:'
    options:
    - написана відомим автором
    - лежала на столі
    - відомим автором
    - книжка написана
    correct: 0
  - question: 'У реченні «Рятувальники, викликані вранці, прибули вчасно» слово «рятувальники»
      є:'
    options:
    - дієприкметниковим зворотом
    - залежним словом
    - означуваним словом
    - обставиною
    correct: 2
  - question: Яку синтаксичну роль відіграє зворот «припорошена першим снігом» у реченні?
    options:
    - підмет
    - присудок
    - обставина
    - означення
    correct: 3
  - question: Скільки слів входить до дієприкметникового звороту в реченні «Стіна,
      побілена свіжим вапном, сяяла»?
    options:
    - одне
    - два
    - три
    - чотири
    correct: 2
  - question: Яке питання ми ставимо від означуваного слова до дієприкметникового
      звороту?
    options:
    - що робити?
    - який? (яка? яке? які?)
    - де?
    - чому?
    correct: 1
  title: Визначте означуване слово або дієприкметниковий зворот у реченні
- id: match-up-definitions-connect-terms-like-and-with-their-comma-rules-and-examples
  type: match-up
  instruction: З'єднайте граматичне поняття з його визначеннями або правилом відокремлення
  pairs:
  - left: Постпозиція
    right: Стан, коли зворот стоїть після означуваного слова (коми потрібні)
  - left: Препозиція
    right: Стан, коли зворот стоїть перед означуваним словом (коми зазвичай не потрібні)
  - left: Відокремлення
    right: Спеціальне виділення частини речення комами та інтонацією
  - left: Особовий займенник
    right: Означуване слово (я, ти, ми...), яке вимагає ком у будь-якій позиції
  - left: Означуване слово
    right: Іменник або займенник, від якого ставимо питання до звороту
  - left: Обставинне значення
    right: Додатковий відтінок причини, за якого коми ставляться і в препозиції
  title: З'єднайте граматичне поняття з його визначеннями або правилом відокремлення
- id: fill-in-form-insert-the-correctly-inflected-participle-into-a-phrase-based-on-the-noun-provided
  type: fill-in
  instruction: Вставте дієприкметник у правильній формі, узгоджуючи його з означуваним
    словом
  items:
  - sentence: Поля, ______ водою, нагадували велике озеро.
    answer: затоплені
    options:
    - затоплений
    - затоплена
    - затоплене
    - затоплені
  - sentence: Стіна, ______ свіжим вапном, яскраво сяяла.
    answer: побілена
    options:
    - побілений
    - побілена
    - побілене
    - побілені
  - sentence: Доповідь, ______ студентом, була відмінною.
    answer: написана
    options:
    - написаний
    - написана
    - написане
    - написані
  - sentence: Земля, ______ снігом, була білою.
    answer: припорошена
    options:
    - припорошений
    - припорошена
    - припорошене
    - припорошені
  - sentence: Собор, ______ Ярославом Мудрим, є святинею.
    answer: збудований
    options:
    - збудований
    - збудована
    - збудоване
    - збудовані
  - sentence: Книги, ______ при соборі, зберігалися ченцями.
    answer: засновані
    options:
    - заснований
    - заснована
    - засноване
    - засновані
  title: Вставте дієприкметник у правильній формі, узгоджуючи його з означуваним словом
- id: essay-response-sentences
  type: essay-response
  instruction: Напишіть 5 речень із дієприкметниковими зворотами
  prompt: 'Напишіть короткий текст (5 речень) про історичну пам''ятку або нещодавню
    подію. Використовуйте дієприкметникові звороти у різних позиціях: два речення
    з постпозицією (з комами), два — з препозицією (без ком), та одне речення з особовим
    займенником. Використовуйте слова: збудований, засіяний, наляканий, пошкоджений,
    прочитаний.'
  min_words: 50
  model_answer: '> [!model-answer]

    Збудований багато століть тому собор височіє над містом. Цей храм, пошкоджений
    часом, нещодавно відреставрували фахівці. Наляканий гучними звуками натовп швидко
    зібрався біля головного входу. Прочитана мною книга розповідає про всі таємниці
    цієї споруди. Вражений побаченим, я довго стояв на площі та розглядав чудову архітектуру.'
  title: Напишіть 5 речень із дієприкметниковими зворотами
- id: error-correction-punctuation
  type: error-correction
  instruction: Знайдіть і виправте пунктуаційну помилку в реченні із дієприкметниковим
    зворотом
  items:
  - sentence: Поле засіяне золотою пшеницею простягалося до самого горизонту.
    error: засіяне золотою пшеницею
    correction: ', засіяне золотою пшеницею,'
    error_type: phrase
    options:
    - ', засіяне золотою пшеницею,'
    - засіяне золотою пшеницею,
    - ', засіяне золотою пшеницею'
    explanation: Зворот стоїть у постпозиції після іменника 'поле', тому має виділятися
      комами з обох боків.
  - sentence: Стомлений довгою дорогою я миттєво заснув у ліжку.
    error: Стомлений довгою дорогою
    correction: Стомлений довгою дорогою,
    error_type: phrase
    options:
    - Стомлений довгою дорогою,
    - ', Стомлений довгою дорогою,'
    - Стомлений довгою дорогою
    explanation: Зворот стосується особового займенника 'я', тому відокремлюється
      комою навіть у препозиції.
  - sentence: Книга написана відомим автором, лежала на великому столі.
    error: Книга написана
    correction: Книга, написана
    error_type: phrase
    options:
    - Книга, написана
    - Книга написана,
    - Книга написана
    explanation: Потрібна кома перед зворотом у постпозиції.
  - sentence: Засіяне пшеницею, поле простягалося до горизонту.
    error: Засіяне пшеницею,
    correction: Засіяне пшеницею
    error_type: phrase
    options:
    - Засіяне пшеницею
    - Засіяне пшеницею,
    - ', Засіяне пшеницею'
    explanation: У препозиції перед звичайним іменником зворот зазвичай не відокремлюється
      комою.
  - sentence: Наляканий грозою кінь, раптом голосно заіржав.
    error: кінь,
    correction: кінь
    error_type: phrase
    options:
    - кінь
    - кінь,
    - ', кінь'
    explanation: Ми не ставимо кому між підметом і присудком, якщо зворот стоїть у
      препозиції.
  - sentence: Ми побачили фільм знятий в Україні минулого року.
    error: фільм знятий
    correction: фільм, знятий
    error_type: phrase
    options:
    - фільм, знятий
    - фільм знятий,
    - фільм знятий
    explanation: Потрібна кома перед зворотом 'знятий в Україні', що стоїть у постпозиції.
  title: Знайдіть і виправте пунктуаційну помилку в реченні із дієприкметниковим зворотом
- id: reading-comprehension
  type: quiz
  instruction: Дайте відповіді на запитання за змістом прочитаних текстів про повінь
    та Софійський собор
  items:
  - question: Яка головна причина повені, описаної в першому тексті?
    options:
    - Затяжні весняні зливи
    - Сильні снігові лавини
    - Зруйновані місцеві мости
    - Спеціальна евакуація мешканців
    correct: 0
  - question: Чому фраза «Повністю затоплені угіддя» не має ком після себе?
    options:
    - Бо зворот стоїть у постпозиції
    - Бо означуваним словом є займенник
    - Бо зворот стоїть у препозиції
    - Бо це виняток для новин
    correct: 2
  - question: Яке слово є означуваним для звороту «серйозно пошкоджені стихією»?
    options:
    - будинки
    - фахівці
    - збитки
    - влада
    correct: 0
  - question: Коли був збудований Софійський собор у Києві?
    options:
    - у 9 столітті
    - у 10 столітті
    - у першій половині 11 століття
    - у 12 столітті
    correct: 2
  - question: Хто заснував першу відому бібліотеку при соборі?
    options:
    - Володимир Великий
    - Ярослав Мудрий
    - візантійські майстри
    - освічені ченці
    correct: 1
  - question: До якого списку занесено Софійський собор сьогодні?
    options:
    - Червона книга
    - список ЮНЕСКО
    - список сучасних споруд
    - архів Києва
    correct: 1
  title: Дайте відповіді на запитання за змістом прочитаних текстів про повінь та
    Софійсь
