version: '1.0'
module: participle-phrases
level: b1
inline:
- id: quiz-focus-on-identifying-the-and-the-in-12-sentences
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Що таке
    дієприкметниковий зворот?».'
  items:
  - question: Яку роль найчастіше виконує дієприкметниковий зворот у реченні?
    options:
    - підмет
    - означення
    - обставина
    - додаток
    correct: 1
  - question: З чим завжди граматично узгоджується дієприкметниковий зворот?
    options:
    - з означуваним словом
    - з підметом
    - з присудком
    - з усіма членами речення
    correct: 0
  - question: Що таке означуване слово?
    options:
    - дієслово, яке описує дію
    - іменник або займенник, який описується зворотом
    - займенник, який вказує на предмет
    - прийменник, який стоїть перед зворотом
    correct: 1
  - question: З чого складається дієприкметниковий зворот?
    options:
    - з двох дієприкметників
    - з дієприкметника та залежних від нього слів
    - з іменника та прикметника
    - з підмета та присудка
    correct: 1
  - question: Чому дієприкметниковий зворот часто використовують замість підрядного
      речення в офіційних текстах?
    options:
    - він не потребує використання ком
    - він робить опис більш компактним і лаконічним
    - його значно легше вимовляти
    - він ніколи не змінює свій відмінок
    correct: 1
  - question: Що означає термін «залежні слова» в контексті звороту?
    options:
    - слова, які стоять перед зворотом
    - слова, до яких ми ставимо питання від дієприкметника
    - слова, які описують головний іменник
    - слова, які вказують на час основної дії
    correct: 1
- id: match-up-connect-terms-like-and-with-their-comma-rules-and-examples
  type: match-up
  instruction: З'єднайте терміни з розділу «Правила відокремлення» з їхніми визначеннями.
  pairs:
  - left: постпозиція
    right: зворот стоїть після означуваного слова і завжди виділяється комами
  - left: препозиція
    right: зворот стоїть перед означуваним словом
  - left: особовий займенник
    right: завжди вимагає коми біля звороту, незалежно від позиції
  - left: відокремлення
    right: виділення частини речення комами з обох боків
  - left: обставинне значення
    right: причина дії, яка змушує ставити кому навіть у препозиції
  - left: трансформація
    right: перетворення звороту на підрядне означальне речення
- id: fill-in-insert-the-correctly-inflected-participle-into-a-phrase-based-on-the-noun-provided
  type: fill-in
  instruction: Вставте правильну граматичну форму дієприкметника у речення.
  items:
  - sentence: Фільм, ____ в Україні, отримав найвищу нагороду.
    answer: знятий
    options:
    - знятий
    - знята
    - зняте
    - зняті
  - sentence: Книга, ____ відомим автором, стала справжнім бестселером.
    answer: написана
    options:
    - написана
    - написаний
    - написане
    - написані
  - sentence: Поле, ____ пшеницею, тягнулося до самого горизонту.
    answer: засіяне
    options:
    - засіяне
    - засіяна
    - засіяний
    - засіяні
  - sentence: Стіна, ____ вапном, сліпуче сяяла на яскравому сонці.
    answer: побілена
    options:
    - побілена
    - побілений
    - побілене
    - побілені
  - sentence: Земля, ____ першим снігом, виглядала надзвичайно святково.
    answer: припорошена
    options:
    - припорошена
    - припорошений
    - припорошене
    - припорошені
  - sentence: Зруйновані стихією мости ускладнюють роботу рятувальних служб та ____.
    answer: волонтерів
    options:
    - волонтерів
    - волонтери
    - волонтерам
    - волонтерами
workbook:
- type: translate
  instruction: Оберіть правильний переклад англійських речень з дієприкметниковими
    зворотами на українську мову.
  items:
  - source: The book written by a famous author lay on the table.
    options:
    - text: Книга, написана відомим автором, лежала на столі.
      correct: true
    - text: Книга написана відомим автором лежала на столі.
      correct: false
    - text: Написана відомим автором, книга лежала на столі.
      correct: false
  - source: The river, overfilled with rainwater, overflowed its banks.
    options:
    - text: Річка, переповнена дощовою водою, вийшла з берегів.
      correct: true
    - text: Переповнена дощовою водою, вийшла з берегів річка.
      correct: false
    - text: Річка переповнена дощовою водою вийшла з берегів.
      correct: false
  - source: Additional rescuers, called in the morning, arrived within an hour.
    options:
    - text: Додаткові рятувальники, викликані вранці, прибули за годину.
      correct: true
    - text: Викликані вранці додаткові рятувальники, прибули за годину.
      correct: false
    - text: Додаткові рятувальники викликані вранці прибули за годину.
      correct: false
  - source: Frightened by the thunderstorm, the horse neighed loudly.
    options:
    - text: Наляканий громовицею, кінь голосно заіржав.
      correct: true
    - text: Наляканий громовицею кінь голосно заіржав.
      correct: false
    - text: Кінь, наляканий громовицею голосно заіржав.
      correct: false
  - source: The destroyed bridges complicate the work of volunteers.
    options:
    - text: Зруйновані мости ускладнюють роботу волонтерів.
      correct: true
    - text: Мости зруйновані ускладнюють роботу волонтерів.
      correct: false
    - text: Зруйновані, мости ускладнюють роботу волонтерів.
      correct: false
  - source: Tired from the journey, I fell asleep immediately.
    options:
    - text: Стомлений дорогою, я заснув одразу.
      correct: true
    - text: Стомлений дорогою я заснув одразу.
      correct: false
    - text: Я стомлений дорогою заснув одразу.
      correct: false
- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Правила відокремлення».
  prompt: 'Складіть текст із 5 речень про вашу улюблену книгу або фільм. Обов''язково
    використайте щонайменше два дієприкметникові звороти: один у препозиції та один
    у постпозиції. Використовуйте терміни: пунктограма, стилістика, підрядне речення.'
  min_words: 50
  model_answer: Моя улюблена книга — це роман, написаний відомим українським автором.
    Ця книга, прочитана мною ще в дитинстві, залишила глибокий слід у моєму серці.
    Написаний легким стилем текст читається на одному подиху і захоплює з перших сторінок.
    Цікаво, що правильна стилістика дозволяє автору уникати надто довгих і складних
    підрядних речень. Відсутність зайвих ком — це важлива пунктограма, яку я помітив
    під час використання препозиції звороту.
  evaluation_criteria:
  - Текст містить мінімум 5 речень і 50 слів.
  - Використано щонайменше один зворот у препозиції.
  - Використано щонайменше один зворот у постпозиції.
  - 'Включено терміни: пунктограма, стилістика, підрядне речення.'
