- id: true-false-rules-workbook
  type: true-false
  instruction: Правда чи ні? Перевірте свої знання правил
  items:
  - statement: Дієприкметниковий зворот у препозиції перед іменником завжди відокремлюється.
    correct: false
    explanation: У препозиції перед звичайним іменником коми зазвичай не ставляться.
  - statement: Зворот, що стосується особового займенника, відокремлюється завжди.
    correct: true
    explanation: Це залізне правило пунктуації, незалежно від позиції звороту.
  - statement: Дієприкметник із залежними словами називається дієприкметниковим зворотом.
    correct: true
    explanation: Це і є визначення цієї граматичної конструкції.
  - statement: В українській мові активно вживаються дієприкметники на -вш-.
    correct: false
    explanation: Це русизми, яких слід уникати, замінюючи їх підрядними реченнями.
  - statement: Зворот з обставинним значенням причини відокремлюється навіть у препозиції.
    correct: true
    explanation: Якщо можна поставити питання 'чому?', кома потрібна.
  - statement: Дієприкметниковий зворот у реченні є одним членом речення — означенням.
    correct: true
    explanation: Весь зворот підкреслюється хвилястою лінією як цілісна група.
  title: Правда чи ні? Перевірте свої знання правил
- id: fill-in-transformation-workbook
  type: fill-in
  instruction: Трансформуйте підрядне речення на дієприкметниковий зворот
  items:
  - sentence: Поле, яке засіяли пшеницею, зеленіло. -> Поле, ______ пшеницею, зеленіло.
    answer: засіяне
    options:
    - засіяний
    - засіяна
    - засіяне
    - засіяні
  - sentence: Будинки, які пошкодила повінь, оглянули. -> Будинки, ______ повінню,
      оглянули.
    answer: пошкоджені
    options:
    - пошкоджений
    - пошкоджена
    - пошкоджене
    - пошкоджені
  - sentence: Книга, яку написав автор, стала популярною. -> Книга, ______ автором,
      стала популярною.
    answer: написана
    options:
    - написаний
    - написана
    - написане
    - написані
  - sentence: Майстри, яких запросили з Візантії, працювали довго. -> Майстри, ______
      з Візантії, працювали довго.
    answer: запрошені
    options:
    - запрошений
    - запрошена
    - запрошене
    - запрошені
  - sentence: Стіни, які прикрасили мозаїкою, були красиві. -> Стіни, ______ мозаїкою,
      були красиві.
    answer: прикрашені
    options:
    - прикрашений
    - прикрашена
    - прикрашене
    - прикрашені
  - sentence: Текст, який прочитали учні, був складним. -> Текст, ______ учнями, був
      складним.
    answer: прочитаний
    options:
    - прочитаний
    - прочитана
    - прочитане
    - прочитані
  title: Трансформуйте підрядне речення на дієприкметниковий зворот
