- id: error-correction-dangling-workbook
  type: error-correction
  instruction: Виправте логічну помилку в побудові речення (зміщений зв'язок)
  items:
  - sentence: Прочитана всіма учнями, бібліотекар забрала книгу.
    error: Прочитана всіма учнями, бібліотекар
    correction: Прочитану всіма учнями книгу бібліотекар
    error_type: construction
    explanation: Зворот 'прочитана' має стосуватися книги, а не бібліотекаря.
  - sentence: Збудований у минулому столітті, ми відвідали цей собор.
    error: Збудований у минулому столітті, ми
    correction: Ми відвідали цей собор, збудований у минулому столітті
    error_type: construction
    explanation: Збудованим є собор, а не 'ми'.
  - sentence: Написана відомим автором, я купив цю книжку.
    error: Написана відомим автором, я
    correction: Я купив цю книжку, написану відомим автором
    error_type: construction
    explanation: Написаною є книжка, а не 'я'.
  - sentence: Засіяне пшеницею, тракторист об'їхав поле.
    error: Засіяне пшеницею, тракторист
    correction: Тракторист об'їхав засіяне пшеницею поле
    error_type: construction
    explanation: Засіяним є поле, а не тракторист.
  - sentence: Пошкоджені повінню, інженери обстежили будинки.
    error: Пошкоджені повінню, інженери
    correction: Інженери обстежили пошкоджені повінню будинки
    error_type: construction
    explanation: Пошкодженими є будинки, а не інженери.
  - sentence: Наляканий грозою, пастух загнав коня в стайню.
    error: Наляканий грозою, пастух
    correction: Пастух загнав наляканого грозою коня в стайню
    error_type: construction
    explanation: Наляканим є кінь (якщо мова про причину його поведінки), або зворот
