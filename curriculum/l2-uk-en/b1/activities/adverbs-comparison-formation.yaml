version: '1.0'
module: adverbs-comparison-formation
level: b1
inline:
- id: quiz-formation-methods
  type: quiz
  instruction: 'Оберіть правильний варіант: способи творення прислівників.'
  items:
  - question: Від якої частини мови утворено прислівник «зранку»?
    options:
    - від іменника
    - від прикметника
    - від дієслова
    - від числівника
    correct: 0
  - question: Які префікс і суфікс має прислівник «по-українськи»?
    options:
    - префікс по- та суфікс -ськи
    - префікс по- та суфікс -ому
    - тільки суфікс -ськи
    - тільки префікс по-
    correct: 0
  - question: Яким способом утворився прислівник «праворуч»?
    options:
    - складанням основ
    - суфіксальним
    - префіксальним
    - суфіксально-префіксальним
    correct: 0
  - question: Як правильно пишеться прислівник «по-новому»?
    options:
    - через дефіс
    - разом
    - окремо
    - з апострофом
    correct: 0
  - question: Як пишеться прислівник «помалу»?
    options:
    - разом
    - через дефіс
    - окремо
    - з апострофом
    correct: 0
  - question: Що потрібно додати до прикметника «швидкий», щоб утворити прислівник
      «швидко»?
    options:
    - суфікс -о
    - суфікс -е
    - префікс най-
    - суфікс -іше
    correct: 0
- id: fill-in-comparison
  type: fill-in
  instruction: Вставте правильну форму вищого або найвищого ступеня прислівника.
  items:
  - sentence: Сьогодні сонце світить ____, ніж учора.
    answer: тепліше
    options:
    - тепліше
    - тепло
    - найтепліше
    - більш тепло
  - sentence: Цей спортсмен біжить ____ за всіх.
    answer: найшвидше
    options:
    - найшвидше
    - швидше
    - швидко
    - найшвидший
  - sentence: Цю вправу виконувати набагато ____.
    answer: важче
    options:
    - важче
    - важко
    - найважче
    - важчий
  - sentence: Птах злетів ще ____ у небо.
    answer: вище
    options:
    - вище
    - високо
    - найвище
    - вищий
  - sentence: Моя сестра співає значно ____ за мене.
    answer: краще
    options:
    - краще
    - добре
    - гарно
    - найкраще
  - sentence: Він пояснив матеріал ____ детально.
    answer: більш
    options:
    - більш
    - більше
    - найбільш
    - найбільше
- id: match-up-terms
  type: match-up
  instruction: З'єднайте граматичні терміни з їхніми визначеннями або прикладами.
  pairs:
  - left: прислівник
    right: незмінна частина мови, що описує дію
  - left: якісний прикметник
    right: слугує основою для утворення більшості прислівників
  - left: суплетивні форми
    right: змінюють корінь слова (добре — краще)
  - left: чергування приголосних
    right: злиття звуків, як у слові «важче» (ж + ш → жч)
  - left: складена форма
    right: утворюється за допомогою слів більш / менш
  - left: найвищий ступінь
    right: має префікс най- або частку якнай-
- id: sorting-comparability
  type: group-sort
  instruction: Розподіліть прислівники на ті, що утворюють ступені порівняння, і ті,
    що ні.
  groups:
  - label: Утворюють ступені порівняння
    items:
    - швидко
    - тепло
    - глибоко
    - тихо
  - label: Не утворюють ступенів порівняння
    items:
    - вчора
    - тут
    - пішки
    - по-українськи
workbook:
- type: unjumble
  instruction: Складіть правильні речення зі слів.
  items:
  - words:
    - чим
    - працюєш,
    - швидше
    - закінчиш.
    - тим
    - скоріше
    - ти
    correct_order:
    - чим
    - швидше
    - ти
    - працюєш,
    - тим
    - скоріше
    - закінчиш.
  - words:
    - стало
    - мені
    - краще.
    - значно
    - Сьогодні
    correct_order:
    - Сьогодні
    - мені
    - стало
    - значно
    - краще.
  - words:
    - він
    - найкраще
    - Змагання
    - пробіг
    - усіх.
    - показали,
    - що
    - з
    correct_order:
    - Змагання
    - показали,
    - що
    - він
    - пробіг
    - найкраще
    - з
    - усіх.
  - words:
    - високо
    - може
    - Цей
    - летіти
    - літак
    - дуже
    correct_order:
    - Цей
    - літак
    - може
    - летіти
    - дуже
    - високо
  - words:
    - я
    - вирішив
    - по-новому.
    - жити
    - Відтепер
    correct_order:
    - Відтепер
    - я
    - вирішив
    - жити
    - по-новому.
  - words:
    - закінчити
    - роботу
    - Ми
    - цю
    - якнайшвидше.
    - маємо
    correct_order:
    - Ми
    - маємо
    - закінчити
    - цю
    - роботу
    - якнайшвидше.
- type: fill-in
  instruction: Доповніть народні приказки та вислови правильними прислівниками.
  items:
  - sentence: Чим ____ в ліс, тим більше дров.
    answer: далі
    options:
    - далі
    - більше
    - глибше
    - гірше
  - sentence: Чим швидше поїдеш, тим ____ приїдеш.
    answer: скоріше
    options:
    - скоріше
    - швидше
    - краще
    - повільніше
  - sentence: Чим гірше, тим ____.
    answer: краще
    options:
    - краще
    - добріше
    - більше
    - менше
  - sentence: Чим більше працюєш, ____ кращий результат.
    answer: тим
    options:
    - тим
    - чим
    - там
    - тоді
  - sentence: Цей проєкт виконано ____ вдало з усіх.
    answer: найбільш
    options:
    - найбільш
    - більш
    - найкраще
    - саме
  - sentence: Потрібно завершити це важливе завдання ____.
    answer: якнайшвидше
    options:
    - якнайшвидше
    - найшвидший
    - більш швидше
    - самий швидкий
- type: essay-response
  prompt: 'Напишіть 5 речень про свої успіхи у вивченні української мови. Опишіть,
    що ви робите краще, швидше або впевненіше зараз, ніж рік тому. Використовуйте
    прислівники та їхні ступені порівняння (наприклад: краще, частіше, більш відповідально,
    по-українськи).'
  min_words: 50
  model_answer: Минулого року я читав тексти українською мовою дуже повільно. Зараз
    я читаю набагато швидше і розумію значно більше слів. Я частіше дивлюся українські
    фільми та намагаюся слухати діалоги якнайуважніше. Мені стало значно легше спілкуватися
    з друзями по-українськи. Я впевнений, що з часом буду говорити ще краще і писати
    більш впевнено.
