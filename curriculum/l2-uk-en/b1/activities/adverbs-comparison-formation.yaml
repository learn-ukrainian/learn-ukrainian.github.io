- type: fill-in
  instruction: Доповніть народні приказки та вислови правильними прислівниками.
  items:
  - sentence: Чим ____ в ліс, тим більше дров.
    answer: далі
    options:
    - далі
    - більше
    - глибше
    - гірше
  - sentence: Чим швидше поїдеш, тим ____ приїдеш.
    answer: скоріше
    options:
    - скоріше
    - швидше
    - краще
    - повільніше
  - sentence: Чим гірше, тим ____.
    answer: краще
    options:
    - краще
    - добріше
    - більше
    - менше
  - sentence: Чим більше працюєш, ____ кращий результат.
    answer: тим
    options:
    - тим
    - чим
    - там
    - тоді
  - sentence: Цей проєкт виконано ____ вдало з усіх.
    answer: найбільш
    options:
    - найбільш
    - більш
    - найкраще
    - саме
  - sentence: Потрібно завершити це важливе завдання ____.
    answer: якнайшвидше
    options:
    - якнайшвидше
    - найшвидший
    - більш швидше
    - самий швидкий
