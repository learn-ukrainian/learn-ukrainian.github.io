version: '1.0'
module: adverbs-comparison-formation
level: b1
workbook:
- id: adv-adj-quiz
  type: quiz
  instruction: 'Оберіть правильну форму: прислівник чи прикметник'
  items:
  - question: Сьогодні літак летить _____.
    options:
    - вище
    - вища
    - вищий
    - вищу
    correct: 0
  - question: Говерла — це _____ гора в Україні.
    options:
    - найвище
    - найвища
    - вища
    - найвищий
    correct: 1
  - question: Він говорить набагато _____ за свого брата.
    options:
    - тихіше
    - тихіший
    - тиха
    - тихіша
    correct: 0
  - question: Ця книжка значно _____.
    options:
    - цікавіше
    - цікавіша
    - цікаво
    - цікавий
    correct: 1
  - question: Моя сестра бігає _____.
    options:
    - швидше
    - швидша
    - швидкий
    - швидшу
    correct: 0
  - question: Це був мій _____ результат у цьому сезоні.
    options:
    - найкраще
    - кращий
    - найкращий
    - краще
    correct: 2
  - question: Працювати в команді завжди _____.
    options:
    - веселий
    - весела
    - веселіше
    - веселіша
    correct: 2
  - question: Цей шлях є значно _____.
    options:
    - довше
    - довший
    - довгий
    - довга
    correct: 1
- id: adv-form-fill
  type: fill-in
  instruction: Вставте правильну просту порівняльну форму прислівника
  items:
  - sentence: Говори, будь ласка, _____ (тихий).
    answer: тихіше
  - sentence: Мій брат бігає _____ (швидкий).
    answer: швидше
  - sentence: Сьогодні сонце гріє _____ (теплий).
    answer: тепліше
  - sentence: Він пояснив це правило _____ (зрозумілий).
    answer: зрозуміліше
  - sentence: Ця машина коштує _____ (дорогий).
    answer: дорожче
  - sentence: Птахи літають _____ (високий).
    answer: вище
  - sentence: Вона працює набагато _____ (продуктивний).
    answer: продуктивніше
  - sentence: Ти повинен відповідати _____ (ввічливий).
    answer: ввічливіше
- id: adv-formation-match
  type: match-up
  instruction: З'єднайте прислівник із методом його творення
  pairs:
  - left: швидко
    right: суфіксальний спосіб
  - left: по-українськи
    right: префіксально-суфіксальний спосіб
  - left: вночі
    right: від іменника
  - left: праворуч
    right: складання основ
  - left: по-новому
    right: префіксально-суфіксальний спосіб
  - left: тепло
    right: суфіксальний спосіб
  - left: зранку
    right: від іменника
  - left: мимоволі
    right: складання основ
- id: adv-compare-sort
  type: group-sort
  instruction: Розподіліть прислівники за категоріями
  groups:
  - label: Може утворювати ступені порівняння
    items:
    - тихо
    - швидко
    - низько
    - дорого
    - високо
    - тепло
  - label: НЕ може утворювати ступені порівняння
    items:
    - вчора
    - прегарно
    - пішки
    - по-братньому
    - додому
    - завжди
- id: adv-error-corr
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Він біжить більш швидше.
    error: більш швидше
    correction: швидше
    error_type: phrase
    options:
    - швидше
    - більш швидкий
    - найбільш швидше
    explanation: Не можна поєднувати слово «більш» із простою порівняльною формою
      на -ше.
  - sentence: Ми розмовляємо по українськи.
    error: по українськи
    correction: по-українськи
    error_type: word
    options:
    - по-українськи
    - поукраїнськи
    - по українському
    explanation: Прислівники з префіксом по- та суфіксом -ськи пишуться через дефіс.
  - sentence: Це завдання зроблено самий краще.
    error: самий краще
    correction: найкраще
    error_type: phrase
    options:
    - найкраще
    - найбільш краще
    - саме краще
    explanation: В українській мові найвищий ступінь утворюється префіксом най-, а
      не словом «самий».
  - sentence: Вона сьогодні співає більш гучніше.
    error: більш гучніше
    correction: гучніше
    error_type: phrase
    options:
    - гучніше
    - саме гучніше
    - більш гучніший
    explanation: Не можна використовувати одночасно «більш» і суфікс -іше.
  - sentence: Мій молодший брат читає текст швидший.
    error: швидший
    correction: швидше
    error_type: word
    options:
    - швидше
    - швидко
    - найшвидший
    explanation: Дієслово (читає) описується незмінним прислівником (швидше), а не
      прикметником.
  - sentence: На цьому проєкті вони працюють самий багато.
    error: самий багато
    correction: найбільше
    error_type: phrase
    options:
    - найбільше
    - саме більше
    - найбільш багато
    explanation: Найвищий ступінь від слова «багато» — це суплетивна форма «найбільше».
- id: adv-chim-tym-build
  type: unjumble
  instruction: Складіть правильне речення зі слів (конструкція чим...тим...)
  items:
  - words:
    - ми
    - розуміємо.
    - краще
    - більше
    - читаємо,
    - Чим
    - тим
    correct_order:
    - Чим
    - більше
    - ми
    - читаємо,
    - тим
    - краще
    - розуміємо.
  - words:
    - тим
    - швидше
    - ти
    - Чим
    - бігаєш.
    - тренуєшся,
    - частіше
    correct_order:
    - Чим
    - частіше
    - ти
    - тренуєшся,
    - тим
    - швидше
    - бігаєш.
  - words:
    - побачимо.
    - вийдемо,
    - раніше
    - більше
    - ми
    - Чим
    - тим
    correct_order:
    - Чим
    - раніше
    - ми
    - вийдемо,
    - тим
    - більше
    - побачимо.
  - words:
    - важче
    - вище
    - піднімаємося,
    - ми
    - тим
    - дихати.
    - Чим
    correct_order:
    - Чим
    - вище
    - ми
    - піднімаємося,
    - тим
    - важче
    - дихати.
  - words:
    - він
    - говорить,
    - голосніше
    - тим
    - чути.
    - його
    - Чим
    - далі
    correct_order:
    - Чим
    - голосніше
    - він
    - говорить,
    - тим
    - далі
    - його
    - чути.
  - words:
    - часу.
    - ми
    - менше
    - довше
    - Чим
    - чекаємо,
    - тим
    - маємо
    correct_order:
    - Чим
    - довше
    - ми
    - чекаємо,
    - тим
    - менше
    - маємо
    - часу.
