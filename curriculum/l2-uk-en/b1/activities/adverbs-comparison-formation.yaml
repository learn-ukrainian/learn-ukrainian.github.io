version: '1.0'
module: adverbs-comparison-formation
level: b1
inline:
- id: quiz-formation-methods
  type: quiz
  instruction: 'Оберіть правильний варіант: способи творення прислівників.'
  items:
  - question: Від якої частини мови утворено прислівник «зранку»?
    options:
    - від іменника
    - від прикметника
    - від дієслова
    - від числівника
    correct: 0
  - question: Які префікс і суфікс має прислівник «по-українськи»?
    options:
    - префікс по- та суфікс -ськи
    - префікс по- та суфікс -ому
    - тільки суфікс -ськи
    - тільки префікс по-
    correct: 0
  - question: Яким способом утворився прислівник «праворуч»?
    options:
    - складанням основ
    - суфіксальним
    - префіксальним
    - суфіксально-префіксальним
    correct: 0
  - question: Як правильно пишеться прислівник «по-новому»?
    options:
    - через дефіс
    - разом
    - окремо
    - з апострофом
    correct: 0
  - question: Як пишеться прислівник «помалу»?
    options:
    - разом
    - через дефіс
    - окремо
    - з апострофом
    correct: 0
  - question: Що потрібно додати до прикметника «швидкий», щоб утворити прислівник
      «швидко»?
    options:
    - суфікс -о
    - суфікс -е
    - префікс най-
    - суфікс -іше
    correct: 0
- id: fill-in-comparison
  type: fill-in
  instruction: Вставте правильну форму вищого або найвищого ступеня прислівника.
  items:
  - sentence: Сьогодні сонце світить ____, ніж учора.
    answer: тепліше
    options:
    - тепліше
    - тепло
    - найтепліше
    - більш тепло
  - sentence: Цей спортсмен біжить ____ за всіх.
    answer: найшвидше
    options:
    - найшвидше
    - швидше
    - швидко
    - найшвидший
  - sentence: Цю вправу виконувати набагато ____.
    answer: важче
    options:
    - важче
    - важко
    - найважче
    - важчий
  - sentence: Птах злетів ще ____ у небо.
    answer: вище
    options:
    - вище
    - високо
    - найвище
    - вищий
  - sentence: Моя сестра співає значно ____ за мене.
    answer: краще
    options:
    - краще
    - добре
    - гарно
    - найкраще
  - sentence: Він пояснив матеріал ____ детально.
    answer: більш
    options:
    - більш
    - більше
    - найбільш
    - найбільше
- id: match-up-terms
  type: match-up
  instruction: З'єднайте граматичні терміни з їхніми визначеннями або прикладами.
  pairs:
  - left: прислівник
    right: незмінна частина мови, що описує дію
  - left: якісний прикметник
    right: слугує основою для утворення більшості прислівників
  - left: суплетивні форми
    right: змінюють корінь слова (добре — краще)
  - left: чергування приголосних
    right: злиття звуків, як у слові «важче» (ж + ш → жч)
  - left: складена форма
    right: утворюється за допомогою слів більш / менш
  - left: найвищий ступінь
    right: має префікс най- або частку якнай-
- id: sorting-comparability
  type: group-sort
  instruction: Розподіліть прислівники на ті, що утворюють ступені порівняння, і ті,
    що ні.
  groups:
  - label: Утворюють ступені порівняння
    items:
    - швидко
    - тепло
    - глибоко
    - тихо
  - label: Не утворюють ступенів порівняння
    items:
    - вчора
    - тут
    - пішки
    - по-українськи
- id: reading-sports
  type: reading
  instruction: Прочитайте текст про марафон і дайте відповіді на запитання.
  passage: 'Ранковий Київ зустрічав учасників щорічного осіннього марафону ідеальною
    спортивною погодою. Сонце світило якнайяскравіше, освітлюючи золоті дерева, проте
    повітря залишалося приємно прохолодним. Тисячі людей зібралися в центрі міста,
    щоб перевірити свою витривалість і довести, що вони можуть бігти довше і швидше,
    ніж будь-коли раніше. Найбільш впевнено на складній трасі почувався торішній чемпіон
    змагань. Він навмисно розпочав забіг трохи повільніше за своїх головних конкурентів,
    розумно зберігаючи енергію для фінального прискорення. Коли перший переможець
    нарешті перетнув фінішну лінію, захоплений натовп зааплодував найсильніше. Він
    пробіг марафон набагато краще за свій власний минулорічний абсолютний рекорд.

    '
  questions:
  - Що хотіли довести учасники марафону?
  - Як світило сонце під час марафону?
  - Яку тактику використав торішній чемпіон на початку забігу?
  - Як зааплодував натовп, коли переможець фінішував?
  - Як пробіг марафон переможець порівняно зі своїм минулорічним рекордом?
  - Хто почувався найбільш впевнено на трасі?
- id: essay-response
  type: essay-response
  prompt: 'Напишіть 5 речень про свої успіхи у вивченні української мови. Опишіть,
    що ви робите краще, швидше або впевненіше зараз, ніж рік тому. Використовуйте
    прислівники та їхні ступені порівняння (наприклад: краще, частіше, більш відповідально,
    по-українськи).'
  min_words: 50
  model_answer: Минулого року я читав тексти українською мовою дуже повільно. Зараз
    я читаю набагато швидше і розумію значно більше слів. Я частіше дивлюся українські
    фільми та намагаюся слухати діалоги якнайуважніше. Мені стало значно легше спілкуватися
    з друзями по-українськи. Я впевнений, що з часом буду говорити ще краще і писати
    більш впевнено.
- id: error-correction-adverbs
  type: error-correction
  instruction: Знайдіть і виправте помилки у ступенях порівняння прислівників.
  items:
  - sentence: Він біжить більш швидше за мене.
    error: більш швидше
    correction: швидше
    error_type: word
    options:
    - швидше
    - швидший
    - найшвидше
    - більш швидко
    explanation: Неможливо поєднувати слово «більш» із суфіксом «-ше». Використовуйте
      лише просту форму «швидше» або складену «більш швидко».
  - sentence: Цей студент працює самий добре.
    error: самий добре
    correction: найкраще
    error_type: phrase
    options:
    - найкраще
    - самий кращий
    - найбільш добре
    - найдобріше
    explanation: Слово «самий» є русизмом. Для найвищого ступеня прислівника «добре»
      слід використовувати форму «найкраще».
  - sentence: Вона співає значно тихше, ніж її сестра.
    error: тихше
    correction: тихіше
    error_type: word
    options:
    - тихіше
    - більш тихо
    - тихо
    - найтихіше
    explanation: Від прислівника «тихо» вищий ступінь утворюється за допомогою суфікса
      «-іше» — «тихіше».
  - sentence: Він почав мислити більш по-новому.
    error: більш по-новому
    correction: по-новому
    error_type: phrase
    options:
    - по-новому
    - новіше
    - більш новіше
    - найбільш по-новому
    explanation: Прислівники з префіксом «по-» та суфіксом «-ому» не утворюють ступенів
      порівняння.
  - sentence: Цей автомобіль їде набагато найшвидше.
    error: найшвидше
    correction: швидше
    error_type: word
    options:
    - швидше
    - більш швидко
    - самий швидкий
    - якнайшвидше
    explanation: Слово «набагато» використовується з вищим ступенем порівняння («швидше»),
      а не з найвищим.
  - sentence: Вчора я виконав завдання поганіше, ніж сьогодні.
    error: поганіше
    correction: гірше
    error_type: word
    options:
    - гірше
    - погано
    - більш погано
    - найгірше
    explanation: Прислівник «погано» має суплетивну форму вищого ступеня — «гірше».
workbook:
- type: quiz
  instruction: Оберіть правильний варіант відповіді.
  items:
  - question: Яке з цих слів є прислівником?
    options:
    - швидко
    - швидкий
    - швидкість
    - швидкі
    correct: 0
  - question: Як правильно утворити найвищий ступінь від слова «дорого»?
    options:
    - найдорожче
    - саме дороге
    - найдорожчіше
    - більш дорожче
    correct: 0
  - question: Який із цих прислівників утворений способом складання?
    options:
    - мимоволі
    - по-українськи
    - зранку
    - швидко
    correct: 0
  - question: Що означає прислівник «самохіть»?
    options:
    - з власної волі
    - випадково
    - повільно
    - швидко
    correct: 0
  - question: У якому реченні виділене слово є прислівником?
    options:
    - Вона цікавіше розповіла історію.
    - Це була цікавіша історія.
    - Він вибрав найцікавіший фільм.
    - Це найцікавіша книга.
    correct: 0
  - question: Від якого слова утворено суплетивну форму «краще»?
    options:
    - добре
    - красиво
    - коротко
    - погано
    correct: 0
