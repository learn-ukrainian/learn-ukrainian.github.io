- type: match-up
  title: 'Термінологія: Знайдіть пару'
  instruction: 'З’єднайте граматичний термін з його визначенням.'
  pairs:
    - left: ‘Підмет’
      right: ‘Головний член речення, що вказує на діяча (хто? що?)’
    - left: ‘Присудок’
      right: ‘Головний член речення, що вказує на дію (що робить?)’
    - left: ‘Додаток’
      right: ‘Другорядний член, що означає об’єкт дії (кого? чого?)’
    - left: ‘Означення’
      right: ‘Другорядний член, що вказує на ознаку предмета (який? чий?)’
    - left: ‘Обставина’
      right: ‘Другорядний член, що вказує на місце, час або спосіб дії’
    - left: ‘Сполучник’
      right: ‘Службова частина мови для зв’язку слів і речень’
    - left: ‘Складне речення’
      right: ‘Речення, яке має дві або більше граматичних основ’
    - left: ‘Пунктуація’
      right: ‘Система правил вживання розділових знаків’
    - left: ‘Просте речення’
      right: ‘Речення з однією граматичною основою’
    - left: ‘Граматична основа’
      right: ‘Підмет і присудок разом’
    - left: ‘Інверсія’
      right: ‘Зміна стандартного порядку слів для логічного наголосу’
    - left: ‘Складносурядне речення’
      right: ‘Складне речення з рівноправними частинами’

- type: mark-the-words
  title: 'Знайдіть граматичну основу'
  instruction: 'Знайдіть і позначте тільки підмет (хто?) і присудок (що робить?).'
  text: 'Розумний студент читає цікаву книгу. Яскраве сонце світить у вікно. Ми старанно вивчаємо українську мову. Мій найкращий друг подарував мені телефон. Я дуже люблю чорну каву.'
  answers:
    - 'студент'
    - 'читає'
    - 'сонце'
    - 'світить'
    - 'Ми'
    - 'вивчаємо'
    - 'друг'
    - 'подарував'
    - 'Я'
    - 'люблю'

- type: quiz
  title: 'Аналіз речення'
  instruction: 'Визначте роль виділеного слова або тип речення.'
  items:
    - question: 'У реченні «Я читаю **книгу**» слово «книгу» — це:'
      explanation: 'Слово «книгу» відповідає на питання «що?» (знахідний відмінок) і позначає об’єкт дії, тому це додаток.'
      options:
        - text: 'додаток'
          correct: true
        - text: 'підмет'
          correct: false
        - text: 'обставина'
          correct: false
        - text: 'присудок'
          correct: false
    - question: 'У реченні «Ми гуляли **в парку**» слова «в парку» — це:'
      explanation: '«В парку» відповідає на питання «де?», тому це обставина місця.'
      options:
        - text: 'обставина'
          correct: true
        - text: 'додаток'
          correct: false
        - text: 'означення'
          correct: false
        - text: 'підмет'
          correct: false
    - question: 'У реченні «Це **цікава** історія» слово «цікава» — це:'
      explanation: '«Цікава» відповідає на питання «яка?» і описує іменник, тому це означення.'
      options:
        - text: 'означення'
          correct: true
        - text: 'присудок'
          correct: false
        - text: 'додаток'
          correct: false
        - text: 'обставина'
          correct: false
    - question: 'Речення «Сонце сідало, і місто запалювало вогні» є:'
      explanation: 'У цьому реченні дві граматичні основи: «сонце сідало» і «місто запалювало». Тому це складне речення.'
      options:
        - text: 'складним'
          correct: true
        - text: 'простим'
          correct: false
        - text: 'питальним'
          correct: false
        - text: 'безособовим'
          correct: false
    - question: 'У реченні «Я знаю, **що** ти прийдеш» слово «що» — це:'
      explanation: '«Що» з’єднує головну і підрядну частини речення, тому це сполучник.'
      options:
        - text: 'сполучник'
          correct: true
        - text: 'прийменник'
          correct: false
        - text: 'частка'
          correct: false
        - text: 'займенник'
          correct: false
    - question: 'У реченні «**Вчора** був гарний день» слово «Вчора» — це:'
      explanation: '«Вчора» відповідає на питання «коли?», тому це обставина часу.'
      options:
        - text: 'обставина'
          correct: true
        - text: 'підмет'
          correct: false
        - text: 'додаток'
          correct: false
        - text: 'означення'
          correct: false
    - question: 'Речення «Ми з братом купили квитки» є:'
      explanation: 'Тут одна граматична основа: «Ми з братом» (підмет) і «купили» (присудок). Це просте речення.'
      options:
        - text: 'простим'
          correct: true
        - text: 'складним'
          correct: false
        - text: 'безособовим'
          correct: false
        - text: 'неповним'
          correct: false
    - question: 'У реченні «Якщо буде дощ, ми не підемо» перша частина є:'
      explanation: 'Перша частина починається зі сполучника «Якщо» і вказує на умову, тому це підрядне речення.'
      options:
        - text: 'підрядним реченням'
          correct: true
        - text: 'головним реченням'
          correct: false
        - text: 'простим реченням'
          correct: false
        - text: 'вставним словом'
          correct: false

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Розташуйте слова у правильному порядку, щоб утворити граматично правильне речення.'
  items:
    - words:
        - 'Ми'
        - 'старанно'
        - 'вивчаємо'
        - 'українську'
        - 'мову'
        - 'в університеті'
      answer: 'Ми старанно вивчаємо українську мову в університеті'
    - words:
        - 'Розумний'
        - 'студент'
        - 'читає'
        - 'дуже'
        - 'цікаву'
        - 'книгу'
      answer: 'Розумний студент читає дуже цікаву книгу'
    - words:
        - 'Вчора'
        - 'увечері'
        - 'падав'
        - 'сильний'
        - 'осінній'
        - 'дощ'
      answer: 'Вчора увечері падав сильний осінній дощ'
    - words:
        - 'Я'
        - 'люблю'
        - 'каву'
        - 'а'
        - 'ти'
        - 'чай'
      answer: 'Я люблю каву, а ти чай'
    - words:
        - 'Мій'
        - 'старий'
        - 'друг'
        - 'приїхав'
        - 'вчора'
      answer: 'Мій старий друг приїхав вчора'
    - words:
        - 'Усі'
        - 'студенти'
        - 'склали'
        - 'цей'
        - 'іспит'
      answer: 'Усі студенти склали цей іспит'

- type: error-correction
  title: 'Редактор пунктуації'
  instruction: 'Знайдіть пунктуаційну помилку в реченні та виправте слово, після якого потрібен (або не потрібен) розділовий знак.'
  items:
    - sentence: 'Я знаю що ти прийдеш завтра.'
      error: 'знаю'
      answer: 'знаю,'
      error_type: 'construction'
      options:
        - 'знаю,'
        - 'знаю:'
        - 'знаю;'
        - 'знаю-'
      explanation: 'Перед сполучником «що», який приєднує підрядне речення, завжди ставиться кома.'
    - sentence: 'Він не прийшов бо забув про зустріч.'
      error: 'прийшов'
      answer: 'прийшов,'
      error_type: 'construction'
      options:
        - 'прийшов,'
        - 'прийшов-'
        - 'прийшов:'
        - 'прийшов;'
      explanation: 'Перед сполучником «бо» (причина) ставиться кома.'
    - sentence: 'Я купив хліб молоко і сир.'
      error: 'хліб'
      answer: 'хліб,'
      error_type: 'construction'
      options:
        - 'хліб,'
        - 'хліб:'
        - 'хліб-'
        - 'хліб;'
      explanation: 'Це однорідні члени речення (перелік) без сполучника, тому між ними потрібна кома.'
    - sentence: 'Я хочу піти в кіно але не маю часу.'
      error: 'кіно'
      answer: 'кіно,'
      error_type: 'construction'
      options:
        - 'кіно,'
        - 'кіно-'
        - 'кіно:'
        - 'кіно;'
      explanation: 'Перед сполучником «але» (протиставлення) завжди ставиться кома.'
    - sentence: 'Коли закінчився дощ ми пішли гуляти.'
      error: 'дощ'
      answer: 'дощ,'
      error_type: 'construction'
      options:
        - 'дощ,'
        - 'дощ-'
        - 'дощ:'
        - 'дощ;'
      explanation: 'Коли підрядне речення (Коли закінчився дощ) стоїть перед головним, воно відділяється комою.'
    - sentence: 'Вона думає, про літню відпустку.'
      error: 'думає,'
      answer: 'думає'
      error_type: 'construction'
      options:
        - 'думає'
        - 'думає:'
        - 'думає-'
        - 'думає;'
      explanation: 'Тут немає складного речення чи переліку. Кома між присудком і додатком («думає про») не потрібна.'

- type: fill-in
  title: 'Оберіть правильний сполучник'
  instruction: 'Вставте відповідний сполучник у речення.'
  items:
    - sentence: 'Я не пішов на роботу, ___ захворів.'
      answer: 'бо'
      options:
        - 'бо'
        - 'що'
        - 'де'
        - 'але'
      explanation: 'Сполучник «бо» вказує на причину.'
    - sentence: 'Він сказав, ___ прийде завтра вчасно.'
      answer: 'що'
      options:
        - 'що'
        - 'коли'
        - 'щоб'
        - 'якщо'
      explanation: 'Сполучник «що» використовується для з’ясування або пояснення.'
    - sentence: 'Ми підемо в парк, ___ буде гарна погода.'
      answer: 'якщо'
      options:
        - 'якщо'
        - 'що'
        - 'де'
        - 'але'
      explanation: 'Сполучник «якщо» вказує на умову.'
    - sentence: 'Я люблю каву, ___ мій брат любить чай.'
      answer: 'а'
      options:
        - 'а'
        - 'бо'
        - 'коли'
        - 'якщо'
      explanation: 'Сполучник «а» використовується для зіставлення (м’якого контрасту).'
    - sentence: 'Я хочу купити цю книгу, ___ вона занадто дорога.'
      answer: 'але'
      options:
        - 'але'
        - 'і'
        - 'тому що'
        - 'де'
      explanation: 'Сполучник «але» вказує на протиставлення або перешкоду.'
    - sentence: 'Зателефонуй мені, ___ ти приїдеш додому.'
      answer: 'коли'
      options:
        - 'коли'
        - 'де'
        - 'що'
        - 'бо'
      explanation: 'Сполучник «коли» вказує на час.'
    - sentence: 'Це складне, ___ дуже корисне завдання.'
      answer: 'але'
      options:
        - 'але'
        - 'бо'
        - 'якщо'
        - 'що'
      explanation: 'Сполучник «але» поєднує протилежні за оцінкою характеристики.'
    - sentence: 'Я хочу жити там, ___ є красивий парк.'
      answer: 'де'
      options:
        - 'де'
        - 'що'
        - 'коли'
        - 'якщо'
      explanation: 'Сполучник «де» вказує на місце.'

- type: true-false
  title: 'Правда чи ні: Структура речення'
  instruction: 'Визначте, чи є твердження правильним.'
  items:
    - statement: 'Підмет і присудок разом утворюють граматичну основу речення.'
      correct: true
      explanation: 'Так, граматична основа — це саме підмет (хто? що?) і присудок (що робить?).'
    - statement: 'У складному реченні завжди є лише одна граматична основа.'
      correct: false
      explanation: 'Ні, складне речення має дві або більше граматичних основ. Одна основа — це просте речення.'
    - statement: 'Сполучник «а» і сполучник «але» мають однакове значення в українській мові.'
      correct: false
      explanation: 'Ні, «а» вказує на м''яке зіставлення, а «але» — на сильний контраст або протиставлення.'
    - statement: 'Перед сполучником «що» у складнопідрядному реченні завжди ставиться кома.'
      correct: true
      explanation: 'Так, кома перед «що» є обов''язковою, коли воно приєднує підрядне речення до головного.'
    - statement: 'В українській мові порядок слів у реченні завжди фіксований.'
      correct: false
      explanation: 'Ні, українська має вільний порядок слів. Інверсія використовується для логічного наголосу.'
    - statement: 'Означення відповідає на питання «який?», «яка?», «яке?», «чий?».'
      correct: true
      explanation: 'Так, означення характеризує іменник і відповідає саме на ці питання.'
    - statement: 'У складносурядному реченні частини є рівноправними і незалежними одна від одної.'
      correct: true
      explanation: 'Так, сурядні сполучники (і, а, але, або) з''єднують рівноправні, незалежні частини.'
    - statement: 'Обставина відповідає на питання «кого?» або «що?».'
      correct: false
      explanation: 'Ні, на питання «кого?» і «що?» відповідає додаток. Обставина відповідає на питання «де?», «коли?», «як?».'