- type: match-up
  title: 'Синтаксичні пари: Термін та значення'
  instruction: 'З’єднайте граматичний термін з його визначенням або символом.'
  pairs:
    - left: 'Підмет'
      right: 'Головний член (хто? що?), одна риска'
    - left: 'Присудок'
      right: 'Головний член (що робить?), дві риски'
    - left: 'Означення'
      right: 'Другорядний член (який? чий?), хвиляста лінія'
    - left: 'Додаток'
      right: 'Другорядний член (кого? чого?), пунктирна лінія'
    - left: 'Обставина'
      right: 'Другорядний член (де? коли?), штрихпунктирна лінія'
    - left: 'Просте речення'
      right: 'Має одну граматичну основу'
    - left: 'Складне речення'
      right: 'Має дві або більше граматичних основ'
    - left: 'Сполучник'
      right: 'Слово, що з''єднує частини речення (і, а, але, що)'
    - left: 'Крапка'
      right: 'Знак у кінці розповідного речення'
    - left: 'Кома'
      right: 'Розділяє частини речення або однорідні члени'
    - left: 'Головне речення'
      right: 'Незалежна частина складного речення'
    - left: 'Підрядне речення'
      right: 'Залежна частина, яку приєднує сполучник'

- type: mark-the-words
  title: 'Знайдіть підмет'
  instruction: 'Знайдіть і позначте підмет (хто? що?) у кожному реченні.'
  text: "Студент читає цікаву книгу. Яскраве сонце світить у вікно. Ми вивчаємо українську граматику. На столі лежить новий зошит. Вчитель пояснює складну тему. Батьки купили великий торт. Київ — це стародавнє місто. Друзі пішли в кінотеатр."
  answers:
    - Студент
    - сонце
    - Ми
    - зошит
    - Вчитель
    - Батьки
    - Київ
    - Друзі

- type: quiz
  title: 'Аналіз речення'
  instruction: 'Виберіть правильну відповідь на питання про структуру речення.'
  items:
    - question: 'На яке питання відповідає означення?'
      options:
        - text: 'Який? Чий?'
          correct: true
        - text: 'Хто? Що?'
          correct: false
        - text: 'Що робить?'
          correct: false
        - text: 'Де? Коли?'
          correct: false
      explanation: 'Означення вказує на ознаку предмета і відповідає на питання "який?", "чий?".'
    - question: 'Яким графічним знаком позначається присудок у синтаксичному розборі?'
      options:
        - text: 'Двома рисками'
          correct: true
        - text: 'Однією рискою'
          correct: false
        - text: 'Хвилястою лінією'
          correct: false
        - text: 'Пунктирною лінією'
          correct: false
      explanation: 'Присудок підкреслюється двома паралельними рисками.'
    - question: 'Яке з наведених речень є складним за будовою?'
      options:
        - text: 'Я знаю, що ти прийдеш.'
          correct: true
        - text: 'Я читаю цікаву книгу.'
          correct: false
        - text: 'Ми купили хліб і молоко.'
          correct: false
        - text: 'Сонце світить яскраво.'
          correct: false
      explanation: 'Складне речення має дві граматичні основи: "я знаю" і "ти прийдеш".'
    - question: 'Який розділовий знак майже завжди ставиться перед "але"?'
      options:
        - text: 'Кома'
          correct: true
        - text: 'Крапка'
          correct: false
        - text: 'Тире'
          correct: false
        - text: 'Двокрапка'
          correct: false
      explanation: 'В українській мові перед протиставними сполучниками (а, але) завжди ставиться кома.'
    - question: 'Що означає термін "інверсія" у синтаксисі української мови?'
      options:
        - text: 'Зміна прямого порядку слів'
          correct: true
        - text: 'Відсутність підмета'
          correct: false
        - text: 'Граматична помилка'
          correct: false
        - text: 'Тип складного речення'
          correct: false
      explanation: 'Інверсія — це порушення звичайного порядку слів для емоційного виділення.'
    - question: 'Який член речення відповідає на питання "Де?" або "Коли"?'
      options:
        - text: 'Обставина'
          correct: true
        - text: 'Додаток'
          correct: false
        - text: 'Підмет'
          correct: false
        - text: 'Означення'
          correct: false
      explanation: 'Обставина вказує на місце, час, спосіб дії.'
    - question: 'Скільки граматичних основ у простому реченні?'
      options:
        - text: 'Одна'
          correct: true
        - text: 'Дві'
          correct: false
        - text: 'Три'
          correct: false
        - text: 'Жодної'
          correct: false
      explanation: 'Просте речення має лише одну граматичну основу (підмет + присудок).'
    - question: 'Як називається частина складного речення, яка залежить від головної?'
      options:
        - text: 'Підрядне речення'
          correct: true
        - text: 'Головне речення'
          correct: false
        - text: 'Просте речення'
          correct: false
        - text: 'Вставне слово'
          correct: false
      explanation: 'Підрядна частина залежить від головної і відповідає на питання від неї.'

- type: fill-in
  title: 'Заповніть пропуски термінами'
  instruction: 'Вставте правильний граматичний термін у речення.'
  items:
    - sentence: 'Головний член речення, що відповідає на питання «хто?», називається _____.'
      answer: 'підмет'
      options:
        - 'підмет'
        - 'присудок'
        - 'додаток'
        - 'сполучник'
      explanation: 'Підмет — це головний виконавець дії.'
    - sentence: 'Дія, яку виконує підмет, називається _____.'
      answer: 'присудок'
      options:
        - 'присудок'
        - 'підмет'
        - 'обставина'
        - 'означення'
      explanation: 'Присудок розповідає, що робить підмет.'
    - sentence: 'Частини складного речення з’єднує _____.'
      answer: 'сполучник'
      options:
        - 'сполучник'
        - 'прийменник'
        - 'іменник'
        - 'займенник'
      explanation: 'Сполучники (і, а, що, бо) з’єднують частини речення.'
    - sentence: 'Перед сполучником «що» майже завжди ставиться _____.'
      answer: 'кома'
      options:
        - 'кома'
        - 'крапка'
        - 'тире'
        - 'лапки'
      explanation: 'Це правило пунктуації: кома перед підрядною частиною.'
    - sentence: 'Слово, що відповідає на питання «який?», — це _____.'
      answer: 'означення'
      options:
        - 'означення'
        - 'додаток'
        - 'підмет'
        - 'обставина'
      explanation: 'Означення вказує на ознаку предмета.'
    - sentence: 'Слово, що вказує на час або місце дії, — це _____.'
      answer: 'обставина'
      options:
        - 'обставина'
        - 'додаток'
        - 'присудок'
        - 'підмет'
      explanation: 'Обставина відповідає на питання де? коли? як?'
    - sentence: 'Речення з однією граматичною основою називається _____.'
      answer: 'просте'
      options:
        - 'просте'
        - 'складне'
        - 'головне'
        - 'підрядне'
      explanation: 'Просте речення має один центр (підмет і присудок).'
    - sentence: 'Знак _____ ставиться в кінці питального речення.'
      answer: 'питання'
      options:
        - 'питання'
        - 'оклику'
        - 'крапки'
        - 'коми'
      explanation: 'Питальне речення закінчується знаком питання.'

- type: true-false
  title: 'Граматична правда чи брехня?'
  instruction: 'Визначте, чи є твердження правильним.'
  items:
    - statement: 'Підмет в українській мові завжди стоїть у називному відмінку.'
      correct: true
      explanation: 'Так, підмет відповідає на питання хто? що? (називний відмінок).'
    - statement: 'Просте речення не може бути довгим.'
      correct: false
      explanation: 'Просте речення може бути дуже довгим, якщо має багато другорядних членів.'
    - statement: 'Присудок відповідає на питання "Що робить підмет?".'
      correct: true
      explanation: 'Це основна функція присудка — називати дію.'
    - statement: 'Ми ніколи не ставимо кому перед сполучником "що".'
      correct: false
      explanation: 'Навпаки, перед "що" (that) майже завжди ставиться кома.'
    - statement: 'Додаток відповідає на питання "Де?" і "Коли?".'
      correct: false
      explanation: 'Це питання обставини. Додаток відповідає на питання відмінків (кого? чого? кому?).'
    - statement: 'Інверсія — це груба граматична помилка.'
      correct: false
      explanation: 'Інверсія — це стилістичний засіб зміни порядку слів для акценту.'
    - statement: 'Складне речення має дві або більше граматичних основ.'
      correct: true
      explanation: 'Це головна відмінність складного речення від простого.'
    - statement: 'Означення підкреслюється хвилястою лінією.'
      correct: true
      explanation: 'Так, це стандартне шкільне позначення.'
    - statement: 'Підрядне речення може існувати саме по собі як повна думка.'
      correct: false
      explanation: 'Підрядне речення залежить від головного і без нього звучить незавершено.'
    - statement: 'Слово "і" є сполучником.'
      correct: true
      explanation: 'Так, "і" (and) — це єднальний сполучник.'

- type: error-correction
  title: 'Знайди помилку в аналізі'
  instruction: 'Виправте помилки в аналізі речень або пунктуації.'
  items:
    - sentence: 'Я не пішов у кіно бо мав багато роботи.'
      error: 'кіно бо'
      answer: 'кіно, бо'
      options:
        - 'кіно бо'
        - 'кіно, бо'
        - 'кіно; бо'
        - 'кіно. Бо'
      explanation: 'Перед сполучником "бо" (because) завжди ставиться кома.'
    - sentence: 'Вчитель сказав що урок закінчився.'
      error: 'сказав що'
      answer: 'сказав, що'
      options:
        - 'сказав що'
        - 'сказав, що'
        - 'сказав - що'
        - 'сказав: що'
      explanation: 'Перед підрядною частиною, що починається зі "що", потрібна кома.'
    - sentence: 'Ми хотіли піти гуляти але почався дощ.'
      error: 'гуляти але'
      answer: 'гуляти, але'
      options:
        - 'гуляти але'
        - 'гуляти, але'
        - 'гуляти; але'
        - 'гуляти. Але'
      explanation: 'Перед протиставним сполучником "але" завжди ставиться кома.'
    - sentence: 'Підмет підкреслюється двома рисками.'
      error: 'двома'
      answer: 'однією'
      options:
        - 'двома'
        - 'однією'
        - 'хвилястою'
        - 'пунктирною'
      explanation: 'Підмет підкреслюється однією рискою, а присудок — двома.'
    - sentence: 'Мені холодно — тут підмет це слово "Мені".'
      error: 'підмет'
      answer: 'додаток'
      options:
        - 'підмет'
        - 'додаток'
        - 'присудок'
        - 'означення'
      explanation: '"Мені" — це давальний відмінок, тому це додаток, а не підмет.'
    - sentence: 'Обставина відповідає на питання "Який?".'
      error: 'Який?'
      answer: 'Де?'
      options:
        - 'Який?'
        - 'Де?'
        - 'Хто?'
        - 'Що?'
      explanation: 'На питання "Який?" відповідає означення. Обставина відповідає на "Де?", "Коли?", "Як?".'
