version: '1.0'
module: short-form-adjectives
level: b1
inline:
- id: quiz
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Повні
    та короткі форми прикметників».'
  items:
  - question: Який прикметник може мати коротку форму?
    options:
    - дрібний
    - залізний
    - дерев'яний
    - мамин
    correct: 0
  - question: Яка форма є правильною для жіночого роду від слова «годен»?
    options:
    - годна
    - годная
    - годену
    - годне
    correct: 0
  - question: У якому стилі переважно вживається форма «зелен»?
    options:
    - народнопоетичному
    - науковому
    - офіційно-діловому
    - публіцистичному
    correct: 0
  - question: Що є прикладом усіченого прикметника (не короткої форми)?
    options:
    - вечірня (від вечірняя)
    - повен (від повний)
    - певен (від певний)
    - зелен (від зелений)
    correct: 0
  - question: Яка граматична форма є абсолютним стандартом для ролі присудка в українській
      мові?
    options:
    - повний прикметник
    - короткий прикметник
    - усічений прикметник
    - іменник у знахідному відмінку
    correct: 0
  - question: З чим завжди узгоджуються сучасні предикативні форми (наприклад, «потрібен»)?
    options:
    - з підметом у роді та числі
    - з додатком у відмінку
    - з обставиною місця
    - з дієсловом у часі
    correct: 0
- id: fill-in
  type: fill-in
  instruction: Вставте правильну граматичну форму у реченнях на тему повні та короткі
    форми прикметників.
  items:
  - sentence: Мені терміново _____ ваша допомога.
    answer: потрібна
    options:
    - потрібен
    - потрібна
    - потрібні
  - sentence: Вона цілком _____ у своєму рішенні.
    answer: певна
    options:
    - певен
    - певна
    - певне
  - sentence: Цей новий фільм дійсно _____ нашої уваги.
    answer: варт
    options:
    - варт
    - варта
    - варте
  - sentence: Шумить і гуде, _____ дощик іде.
    answer: дрібен
    options:
    - дрібний
    - дрібен
    - дрібне
  - sentence: Олена дуже _____ бачити вас сьогодні.
    answer: рада
    options:
    - рада
    - рад
    - раді
  - sentence: Цей майстер _____ самостійно відремонтувати автомобіль.
    answer: годен
    options:
    - годен
    - годна
    - годні
- id: match-up
  type: match-up
  instruction: З'єднайте терміни з розділу «Які прикметники мають короткі форми?»
    з їхніми визначеннями.
  pairs:
  - left: Повний прикметник
    right: має повну парадигму відмінювання і виступає абсолютною нормою для присудка
  - left: Короткий прикметник
    right: існує лише в називному відмінку і є залишком давньої іменної відміни
  - left: Усічений прикметник
    right: має відкинутий кінцевий голосний задля збереження ритму вірша (наприклад,
      «вечірня»)
  - left: Якісний прикметник
    right: єдина група прикметників, від якої можуть утворюватися короткі форми
  - left: Відносний прикметник
    right: називає матеріал, час або місце і принципово не може мати короткої форми
  - left: Присудковий
    right: синтаксична роль таких популярних слів, як «потрібен», «певен» і «годен»
workbook:
- type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - мені
    - допомога.
    - Зараз
    - потрібна
    - дуже
    correct_order:
    - Зараз
    - мені
    - дуже
    - потрібна
    - допомога.
  - words:
    - переможемо.
    - певен,
    - Я
    - що
    - ми
    correct_order:
    - Я
    - певен,
    - що
    - ми
    - переможемо.
  - words:
    - ладна
    - зробити
    - Вона
    - це
    - завдання.
    correct_order:
    - Вона
    - ладна
    - зробити
    - це
    - завдання.
  - words:
    - фільм
    - варт
    - нашої
    - Цей
    - уваги.
    correct_order:
    - Цей
    - фільм
    - варт
    - нашої
    - уваги.
  - words:
    - бачити
    - рада
    - вас
    - сьогодні.
    - Я
    correct_order:
    - Я
    - рада
    - бачити
    - вас
    - сьогодні.
  - words:
    - цей
    - відремонтувати
    - Він
    - годен
    - автомобіль.
    correct_order:
    - Він
    - годен
    - відремонтувати
    - цей
    - автомобіль.
- type: translate
  instruction: Оберіть правильний переклад речень з використанням коротких форм.
  items:
  - source: Right now I really need your help.
    options:
    - text: Зараз мені дуже потрібна ваша допомога.
      correct: true
    - text: Зараз мені дуже потрібний ваша допомога.
      correct: false
    - text: Зараз я потрібна ваша допомога.
      correct: false
    - text: Зараз мені дуже потрібне ваша допомога.
      correct: false
  - source: I am certain that he will come on time. (Said by a man)
    options:
    - text: Я певен, що він прийде вчасно.
      correct: true
    - text: Я певна, що він прийде вчасно.
      correct: false
    - text: Мені певен, що він прийде вчасно.
      correct: false
    - text: Я певне, що він прийде вчасно.
      correct: false
  - source: She is willing to help us.
    options:
    - text: Вона ладна допомогти нам.
      correct: true
    - text: Вона ладен допомогти нам.
      correct: false
    - text: Вона ладне допомогти нам.
      correct: false
    - text: Їй ладна допомогти нам.
      correct: false
  - source: This film is worth your attention.
    options:
    - text: Цей фільм варт вашої уваги.
      correct: true
    - text: Цей фільм варта вашої уваги.
      correct: false
    - text: Цей фільм варті вашої уваги.
      correct: false
    - text: Цей фільм варте вашої уваги.
      correct: false
  - source: They urgently need money.
    options:
    - text: Їм терміново потрібні гроші.
      correct: true
    - text: Їм терміново потрібен гроші.
      correct: false
    - text: Їм терміново потрібна гроші.
      correct: false
    - text: Вони терміново потрібні гроші.
      correct: false
  - source: He is capable of repairing this car.
    options:
    - text: Він годен відремонтувати цей автомобіль.
      correct: true
    - text: Він годна відремонтувати цей автомобіль.
      correct: false
    - text: Йому годен відремонтувати цей автомобіль.
      correct: false
    - text: Він годні відремонтувати цей автомобіль.
      correct: false
- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Які прикметники
    мають короткі форми?».
  prompt: Використайте сучасні предикативні форми (потрібен, певен, ладен, годен,
    рад, варт) для опису ваших планів, потреб або емоційного стану.
  min_words: 50
  model_answer: 'Сьогодні мені дуже потрібен додатковий час, щоб завершити цей складний
    проєкт. Я цілком певен, що кінцевий результат буде чудовим. Мій колега ладен допомогти
    мені з цим важливим завданням у будь-яку хвилину. Я щиро рад бачити таку міцну
    підтримку від своєї команди. Наш спільний результат точно варт цієї важкої праці
    та зусиль.

    '
