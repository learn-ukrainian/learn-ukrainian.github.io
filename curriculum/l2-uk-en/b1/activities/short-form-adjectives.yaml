- type: essay-response
  instruction: Напишіть 5 речень, використовуючи нову лексику з розділу «Які прикметники
    мають короткі форми?».
  prompt: Опишіть ситуацію з вашого життя (наприклад, підготовку до важливої події
    або іспиту). Використайте сучасні короткі форми (потрібен, певен, годен, ладен,
    рад) та поясніть свій стан. Обсяг — мінімум 5 речень.
  min_words: 50
  model_answer: Завтра у мене дуже важливий іспит з української мови. Мені потрібен
    додатковий час, щоб повторити всі правила. Проте я цілком певен, що зможу скласти
    його успішно. Мій друг дуже добре знає граматику, і він ладен допомогти мені ввечері.
    Я буду дуже рад попрактикуватися з ним.
