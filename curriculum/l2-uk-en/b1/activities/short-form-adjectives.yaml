version: '1.0'
module: short-form-adjectives
level: b1
inline:
- id: reading
  type: reading
  passage: '— Привіт, Оксано! Я зараз читаю стару українську казку і знайшла тут дивну
    фразу: «вийшов хлопець у зелен сад». Чому «зелен», а не «зелений»?


    — Привіт! Це дуже цікаве граматичне явище. Слово «зелен» — це коротка форма прикметника.
    Вона була популярною сотні років тому, а зараз зберігається лише в народнопоетичному
    стилі.


    — Тобто я можу сказати своєму другу: «я купила зелен светр»?


    — Ні, в жодному разі! У сучасному розмовному чи офіційному стилі це буде помилкою.
    Ми використовуємо лише повні форми: «зелений светр». Короткі форми, як-от «зелен»,
    «ясен» або «дрібен», живуть переважно у віршах і піснях.


    — А вони змінюються за відмінками? Наприклад, «зеленом садом»?


    — Ні, і це їхня головна особливість! Ці архаїчні короткі прикметники назавжди
    застигли у називному відмінку чоловічого роду однини.


    — Зрозуміло. Але я часто чую слово «потрібен». Воно теж коротке?


    — Так! Це сучасна предикативна форма. Слова «потрібен», «певен», «годен» активно
    використовуються щодня. І на відміну від «зелен», вони змінюються за родами та
    числами: «потрібен», «потрібна», «потрібні».'
  questions:
  - Чому у казці використано форму «зелен сад» замість «зелений сад»?
  - У якому стилі найчастіше зустрічаються архаїчні короткі форми?
  - Чи можна використовувати слово «зелен» у щоденній розмові про купівлю светра?
  - Як змінюються за відмінками архаїчні короткі форми прикметників?
  - Які сучасні короткі форми згадує Оксана у діалозі?
  - Чим відрізняється сучасна форма «потрібен» від архаїчної «зелен» у плані словозміни?
- id: match-short-full
  type: match-up
  instruction: З'єднайте коротку форму прикметника з відповідною повною формою.
  pairs:
  - left: зелен
    right: зелений
  - left: ясен
    right: ясний
  - left: дрібен
    right: дрібний
  - left: повен
    right: повний
  - left: годен
    right: годний
  - left: потрібен
    right: потрібний
  - left: певен
    right: певний
  - left: ладен
    right: ладний
- id: identify-folk
  type: group-sort
  instruction: Розподіліть короткі прикметники на народнопоетичні та сучасні предикативні
    форми.
  groups:
  - label: Народнопоетичні форми
    items:
    - зелен
    - ясен
    - дрібен
    - повен
    - чорен
    - білен
  - label: Сучасні предикативні форми
    items:
    - потрібен
    - певен
    - годен
    - ладен
    - варт
    - рад
- id: fill-in-modern
  type: fill-in
  instruction: Вставте правильну сучасну коротку форму (потрібен, потрібна, потрібне,
    потрібні).
  items:
  - sentence: Мені дуже ____ твоя допомога.
    answer: потрібна
    options:
    - потрібен
    - потрібна
    - потрібні
  - sentence: Нам конче ____ новий телефон.
    answer: потрібен
    options:
    - потрібен
    - потрібне
    - потрібні
  - sentence: Їм терміново ____ гроші.
    answer: потрібні
    options:
    - потрібна
    - потрібне
    - потрібні
  - sentence: Для проєкту ____ швидке рішення.
    answer: потрібне
    options:
    - потрібен
    - потрібне
    - потрібні
  - sentence: Студентам ____ час на підготовку.
    answer: потрібен
    options:
    - потрібен
    - потрібна
    - потрібні
  - sentence: Мені ____ ця книжка для роботи.
    answer: потрібна
    options:
    - потрібна
    - потрібне
    - потрібні
- id: error-correction-forms
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні або використанні форми.
  items:
  - sentence: Мені потрібна новий словник.
    error: потрібна
    correction: потрібен
    error_type: word
    options:
    - потрібен
    - потрібне
    - потрібні
    explanation: Словник — іменник чоловічого роду, тому використовуємо форму 'потрібен'.
  - sentence: Нам потрібне нові комп'ютери.
    error: потрібне
    correction: потрібні
    error_type: word
    options:
    - потрібна
    - потрібен
    - потрібні
    explanation: Комп'ютери — це множина, тому форма має бути 'потрібні'.
  - sentence: Я певна, що він правилен.
    error: правилен
    correction: правильний
    error_type: register
    options:
    - правильна
    - правильний
    - правильно
    explanation: 'В українській мові ми не утворюємо коротких предикативних форм від
      усіх прикметників. Завжди використовуємо повну форму: ''правильний''.'
  - sentence: Ми гуляємо зеленою гаєм.
    error: зеленою
    correction: зеленим
    error_type: word
    options:
    - зеленим
    - зелен
    - зеленом
    explanation: 'Гай — чоловічого роду, орудний відмінок: ''зеленим гаєм''. Короткі
      форми не відмінюються.'
  - sentence: Сьогодні день дуже гарн.
    error: гарн
    correction: гарний
    error_type: register
    options:
    - гарна
    - гарний
    - гарно
    explanation: 'Спроба відкинути закінчення — це російська калька. Ми кажемо тільки
      повну форму: ''гарний''.'
  - sentence: Вона годен це зробити сама.
    error: годен
    correction: годна
    error_type: word
    options:
    - годна
    - годен
    - годне
    explanation: 'Форма узгоджується з підметом жіночого роду: ''вона годна''.'
- id: match-up
  type: match-up
  instruction: З'єднайте терміни з розділу з їхніми визначеннями.
  pairs:
  - left: короткий прикметник
    right: усічена форма, яка втратила закінчення у чоловічому роді
  - left: повний прикметник
    right: стандартна форма, яка вільно змінюється за родами та відмінками
  - left: якісний прикметник
    right: єдиний розряд прикметників, який може мати коротку форму
  - left: народнопоетичний
    right: стиль, у якому живуть архаїчні форми типу «дрібен» або «повен»
  - left: присудковий
    right: синтаксична роль таких сучасних коротких форм, як «потрібен»
  - left: усічений прикметник
    right: повна нестягнена форма, в якій для вірша відкинули голосний
workbook:
- type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Повні
    та короткі форми прикметників».'
  items:
  - question: Чому українською мовою не можна сказати «цей текст правилен»?
    options:
    - 'Бо в українській мові присудком є повна форма: «цей текст правильний».'
    - Бо слово «правилен» має бути жіночого роду.
    - Бо ця коротка форма використовується тільки в народних піснях.
    - Бо правильніше сказати «цей текст правильно».
    correct: 0
  - question: Які прикметники можуть мати короткі форми?
    options:
    - Лише якісні прикметники (наприклад, зелений -> зелен).
    - Лише відносні прикметники (наприклад, залізний -> залізен).
    - Лише присвійні прикметники (наприклад, мамин -> мами).
    - Будь-які прикметники, якщо відкинути закінчення.
    correct: 0
  - question: Що означає коротка форма «ладен» у реченні «Він ладен допомогти»?
    options:
    - Щире бажання або готовність діяти.
    - Фізичну здатність до роботи.
    - Потребу в чиїйсь допомозі.
    - Повну впевненість у результаті.
    correct: 0
  - question: Яку граматичну особливість мають поетичні короткі форми типу «ясен»
      чи «зелен»?
    options:
    - Вони ніколи не змінюються за відмінками.
    - Вони можуть стояти в усіх семи відмінках.
    - Вони змінюються лише в множині.
    - Вони мають спеціальні закінчення для жіночого роду.
    correct: 0
  - question: Що таке «усічені прикметники» (наприклад, «зелена» замість «зеленая»)?
    options:
    - Фонетично скорочені повні нестягнені форми для віршованого розміру.
    - Справжні історичні короткі форми прикметників.
    - Форми, запозичені з російської мови.
    - Присвійні прикметники.
    correct: 0
  - question: Як правильно сказати, якщо ви дуже впевнені у своєму другові (говорить
      чоловік)?
    options:
    - Я певен у ньому.
    - Я певна у ньому.
    - Мені потрібен він.
    - Я годен у ньому.
    correct: 0
- type: true-false
  instruction: Визначте, чи є твердження правдивим.
  items:
  - statement: Слово «зелен» активно використовується у сучасній офіційно-діловій
      мові.
    correct: false
    explanation: Ні, воно є застарілим і використовується лише в народнопоетичному
      стилі.
  - statement: Короткі архаїчні прикметники ніколи не змінюються за відмінками.
    correct: true
    explanation: Так, ці форми назавжди застигли у називному відмінку чоловічого роду
      однини.
  - statement: В українській мові ми можемо утворювати короткі форми від будь-якого
      прикметника.
    correct: false
    explanation: Короткі форми — це суворо закрита група. Спроба створити нову коротку
      форму (наприклад, «фільм цікав») є помилкою.
  - statement: Сучасна предикативна форма «потрібен» узгоджується з підметом у роді
      та числі.
    correct: true
    explanation: 'Так, форма змінюється: потрібен, потрібна, потрібне, потрібні.'
  - statement: Слово «дрібная» — це коротка форма прикметника.
    correct: false
    explanation: Ні, це повна нестягнена форма (з довгим закінчення -ая).
  - statement: Відносні прикметники (наприклад, «залізний» або «дерев'яний») не мають
      коротких форм.
    correct: true
    explanation: Лише якісні прикметники можуть мати короткі форми.
- type: fill-in
  instruction: Вставте правильний особовий займенник у давальному відмінку.
  items:
  - sentence: ____ конче потрібен новий телефон.
    answer: Мені
    options:
    - Мені
    - Мене
    - Мною
  - sentence: ____ потрібна допомога з цим складним завданням?
    answer: Тобі
    options:
    - Тобі
    - Тебе
    - Тобою
  - sentence: ____ потрібне швидке рішення проблеми.
    answer: Йому
    options:
    - Його
    - Йому
    - Ним
  - sentence: ____ дуже потрібні ці книги для навчання.
    answer: Їй
    options:
    - Її
    - Їй
    - Нею
  - sentence: ____ потрібен додатковий час на відпочинок.
    answer: Нам
    options:
    - Нас
    - Нам
    - Нами
  - sentence: ____ терміново потрібна достовірна інформація.
    answer: Їм
    options:
    - Їх
    - Їм
    - Ними
- type: translate
  instruction: Оберіть правильний український переклад, звертаючи увагу на короткі
    форми та займенники.
  items:
  - source: I need a new phone.
    options:
    - text: Мені потрібен новий телефон.
      correct: true
    - text: Я потрібен новий телефон.
      correct: false
    - text: Мені потрібна новий телефон.
      correct: false
  - source: She is capable of doing this.
    options:
    - text: Вона годна зробити це.
      correct: true
    - text: Вона годен зробити це.
      correct: false
    - text: Їй годна зробити це.
      correct: false
  - source: We are certain of our victory.
    options:
    - text: Ми певні нашої перемоги.
      correct: true
    - text: Ми певен нашої перемоги.
      correct: false
    - text: Нам певні нашої перемоги.
      correct: false
  - source: They are willing to help us.
    options:
    - text: Вони ладні допомогти нам.
      correct: true
    - text: Вони ладен допомогти нам.
      correct: false
    - text: Їм ладні допомогти нам.
      correct: false
  - source: He is glad to see you.
    options:
    - text: Він дуже рад вас бачити.
      correct: true
    - text: Йому дуже рад вас бачити.
      correct: false
    - text: Він дуже рада вас бачити.
      correct: false
  - source: This play is worth your attention.
    options:
    - text: Ця вистава дійсно варта вашої уваги.
      correct: true
    - text: Ця вистава дійсно варт вашої уваги.
      correct: false
    - text: Цій виставі дійсно варта вашої уваги.
      correct: false
- type: odd-one-out
  instruction: Знайдіть слово, яке НЕ є справжньою короткою формою (або не належить
    до групи).
  items:
  - words:
    - зелен
    - ясен
    - дрібний
    - повен
    correct: 2
    explanation: «Дрібний» — це повна форма прикметника, інші — короткі народнопоетичні.
  - words:
    - потрібен
    - певен
    - зелен
    - годен
    correct: 2
    explanation: «Зелен» — це архаїчна форма, інші — сучасні предикативні форми, які
      ми використовуємо щодня.
  - words:
    - ладний
    - ладен
    - варт
    - рад
    correct: 0
    explanation: «Ладний» — це повна форма прикметника, інші — короткі предикативні
      форми.
  - words:
    - потрібна
    - певна
    - зелена
    - годна
    correct: 2
    explanation: «Зелена» — це жіночий рід повної форми, вона відмінюється (зеленої,
      зеленій). Інші слова — жіночий рід сучасних предикативних коротких форм.
  - words:
    - зеленая
    - ясная
    - дрібная
    - повен
    correct: 3
    explanation: «Повен» — це коротка форма. Інші три — це повні нестягнені форми,
      які мають довге закінчення -ая.
  - words:
    - варта
    - варт
    - варті
    - вартий
    correct: 3
    explanation: «Вартий» — це повна форма (чоловічий рід). Інші слова — це форми
      короткого прикметника «варт» (вона варта, вони варті).
