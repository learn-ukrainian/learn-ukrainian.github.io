version: '1.0'
module: checkpoint-comparison
level: b1
inline:
- id: checkpoint-comparison-forms
  type: fill-in
  instruction: 'Вставте правильну граматичну форму у реченнях на тему повторення:
    ступені порівняння.'
  items:
  - sentence: Цей новий телефон дорогий, але він ____ за мій старий.
    answer: кращий
    options:
    - кращий
    - більш гарний
    - найкращий
  - sentence: Сьогодні погода ____, ніж була вчора.
    answer: тепліша
    options:
    - більш тепліша
    - тепліша
    - сама тепла
  - sentence: Київ значно ____ за Харків.
    answer: більший
    options:
    - більший
    - більше
    - самий великий
  - sentence: Ця книжка ____ з усіх, що я читав.
    answer: найцікавіша
    options:
    - сама цікава
    - найцікавіша
    - більш цікавіша
  - sentence: Будь ласка, зробіть це ____!
    answer: якнайшвидше
    options:
    - якнайшвидше
    - саме швидше
    - більш швидко
  - sentence: Її результати тесту ____ від моїх.
    answer: гірші
    options:
    - більш погані
    - поганіші
    - гірші
- id: checkpoint-comparison-quiz
  type: quiz
  instruction: 'Оберіть правильний варіант: лексика та граматика з розділу «Повторення:
    ступені порівняння».'
  items:
  - question: Яка форма є граматично ПРАВИЛЬНОЮ?
    options:
    - самий кращий
    - найкращий
    - більш кращий
    - самий хороший
    correct: 1
  - question: Як правильно порівняти два міста?
    options:
    - Львів старіше Києва
    - Львів більш старий Києва
    - Львів старіший за Київ
    - Львів самий старий за Київ
    correct: 2
  - question: 'Утворіть вищий ступінь від прикметника «високий»:'
    options:
    - високіший
    - вищий
    - більш високіший
    - вище
    correct: 1
  - question: Який ступінь порівняння використано у слові «щонайкращого»?
    options:
    - вищий проста форма
    - найвищий підсилена форма
    - вищий складена форма
    - найвищий складена форма
    correct: 1
  - question: Як правильно сказати про дію (прислівник)?
    options:
    - Він працює швидший, ніж я.
    - Він працює швидше, ніж я.
    - Він працює більш швидший.
    - Він працює самий швидко.
    correct: 1
  - question: Яке чергування приголосних відбувається у слові «дорожчий» (від «дорогий»)?
    options:
    - г - жч
    - к - ч
    - х - ш
    - г - з
    correct: 0
- id: checkpoint-word-formation-matching
  type: match-up
  instruction: 'З''єднайте терміни з розділу «Повторення: словотвір» з їхніми визначеннями.'
  pairs:
  - left: Словотвір
    right: Творення нових слів за допомогою суфіксів, префіксів тощо
  - left: Суфікс -ник
    right: Використовується для утворення назв професій (наприклад, будівельник)
  - left: Фемінітиви
    right: Слова жіночого роду на позначення професій (наприклад, лікарка)
  - left: Префікс най-
    right: Використовується для утворення найвищого ступеня порівняння
  - left: Подвоєння літер
    right: Орфографічне явище, як у слові «денний» (день + н)
  - left: Суфікс -ння
    right: Утворює іменники процесу від дієслів (наприклад, читання)
- id: checkpoint-word-formation-sentences
  type: essay-response
  instruction: 'Напишіть 5 розгорнутих речень, використовуючи нову лексику з розділу
    «Повторення: словотвір».'
  prompt: 'Напишіть 5 розгорнутих речень (мінімум 50 слів), використовуючи лексику
    з розділу «Повторення: словотвір». Обов''язково використайте слова: рубрика, аналіз
    помилок, комплексна самооцінка та діагностика.'
  min_words: 50
  model_answer: 1. Працівниця пошти дуже швидко оформила мою доставку сьогодні вранці.
    2. Цей будівельник зробив глибокий аналіз помилок у нашому проєкті, що допомогло
    уникнути зайвих витрат. 3. Новий київський лікар допоміг мені вилікувати хронічний
    кашель, він справжній професіонал. 4. Моє чекання на нову посилку було досить
    довгим, але результат того вартий. 5. Наша комплексна самооцінка та діагностика
    показали новий підхід до проблеми, і тепер ми маємо чітку рубрику для оцінювання.
- id: checkpoint-comparison-reading
  type: reading
  instruction: 'Прочитайте текст про повторення: ступені порівняння і дайте відповіді
    на запитання.'
  passage: Нещодавно ми провели комплексний аналіз і порівняли три кур'єрські компанії.
    Компанія «Блискавка» має найшвидшу доставку, але їхні послуги значно дорожчі за
    інші. «Національна пошта» пропонує найдешевше відправлення посилок, хоча їхня
    логістика повільніша, ніж у приватних сервісів. Компанія «Гарант» працює найбільш
    надійно і має зручніший мобільний додаток, відгуки про них найкращі. Для нашої
    роботи якість сервісу важливіша за економію, тому ми обрали «Гарант». Така діагностика
    допомагає нам працювати краще.
  questions:
  - Чому автор тексту вирішив обрати компанію «Гарант»?
  - Яка головна перевага компанії «Блискавка»?
  - Що автор каже про логістику «Національної пошти»?
  - Чому автор не обрав найдешевший сервіс?
  - Який критерій був найважливішим для автора при виборі сервісу?
  - Яку форму порівняння використано у слові «найдешевше»?
- id: checkpoint-word-formation-errors
  type: error-correction
  instruction: 'Знайдіть і виправте помилки у реченнях на тему повторення: словотвір.'
  items:
  - sentence: Вона дуже хороша лікар.
    error: лікар
    correction: лікарка
    error_type: word
    options:
    - лікарка
    - лікариня
    - лікарниця
    explanation: В українській мові активно використовуються фемінітиви для позначення
      професій жінок.
  - sentence: Це дуже гарний дерев'янний стіл.
    error: дерев'янний
    correction: дерев'яний
    error_type: word
    options:
    - дерев'яний
    - деревяний
    - деревний
    explanation: Суфікс -ян- не подвоює літеру «н», оскільки корінь «дерев-» не закінчується
      на «н».
  - sentence: Він постійний покупач у нашому магазині.
    error: покупач
    correction: покупець
    error_type: word
    options:
    - покупець
    - купівельник
    - покупник
    explanation: Той, хто купує товари, називається «покупець».
  - sentence: Ми купили новий склянний посуд.
    error: склянний
    correction: скляний
    error_type: word
    options:
    - скляний
    - скляной
    - склянний
    explanation: Суфікс -ян- вказує на матеріал і пишеться з однією літерою «н».
  - sentence: Мій брат — відомий читальник фантастики.
    error: читальник
    correction: читач
    error_type: word
    options:
    - читач
    - читаць
    - читель
    explanation: Особа, яка читає, правильно називається «читач».
  - sentence: Це був справжній осіній день.
    error: осіній
    correction: осінній
    error_type: word
    options:
    - осінній
    - осінний
    - осінняй
    explanation: Корінь «осінь» закінчується на «н», плюс суфікс «-н-», тому відбувається
      подвоєння.
- id: quiz-diagnostic-phase5-grammar
  type: quiz
  instruction: 'Діагностичний тест: перевірте свої знання граматики Фази 5.'
  items:
  - question: Яке з цих слів написано ПРАВИЛЬНО?
    options:
    - склянний
    - законний
    - дерев'янний
    - глинянний
    correct: 1
  - question: Як правильно утворити вищий ступінь від слова «поганий»?
    options:
    - поганіший
    - більш поганий
    - гірший
    - самий поганий
    correct: 2
  - question: 'Оберіть правильний варіант: «Ця книжка...»'
    options:
    - цікавіша від тієї
    - більш цікавіша за ту
    - цікавіше тієї
    - сама цікава з усіх
    correct: 0
  - question: Який фемінітив утворено ПРАВИЛЬНО?
    options:
    - працівниця
    - працівничка
    - працівниня
    - працівникша
    correct: 0
  - question: 'Як правильно сказати: «Він зробив це...»'
    options:
    - самий краще
    - найкраще
    - найкращий
    - самий кращий
    correct: 1
  - question: 'Знайдіть помилку в утворенні ступеня порівняння:'
    options:
    - ближчий
    - ширший
    - товстіший
    - вищий
    correct: 2
  - question: Як правильно написати прислівник від слова «український»?
    options:
    - по-українськи
    - по українськи
    - по-українському
    - поукраїнському
    correct: 0
  - question: 'Оберіть правильний варіант порівняння:'
    options:
    - Він старше брата.
    - Він старший брата.
    - Він старший за брата.
    - Він більш старший брата.
    correct: 2
  - question: Яке дієслово правильно поєднується зі словом «рахунок»?
    options:
    - робити рахунок
    - відкривати рахунок
    - оформлювати рахунок
    - відправляти рахунок
    correct: 1
  - question: Яке слово означає процес (віддієслівний іменник)?
    options:
    - читач
    - читання
    - читальний
    - читати
    correct: 1
workbook: []
