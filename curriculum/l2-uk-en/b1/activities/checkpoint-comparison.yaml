version: '1.0'
module: checkpoint-comparison
level: b1
workbook:
- id: quiz-comparison
  type: quiz
  instruction: Оберіть правильний варіант утворення вищого або найвищого ступеня порівняння.
  items:
  - question: Цей готель набагато _____, ніж попередній.
    options:
    - кращий
    - більш кращий
    - самий хороший
    - добріший
    correct: 0
  - question: Сьогодні день значно _____, ніж був учора.
    options:
    - тепліший
    - більш тепліший
    - самий теплий
    - тепло
    correct: 0
  - question: Це _____ пилотяг у нашому магазині.
    options:
    - найдорожчий
    - самий дорогий
    - найбільш дорожчий
    - дорожчий
    correct: 0
  - question: Дорога до лісу стала ще _____.
    options:
    - вужчою
    - більш вужчою
    - найвужча
    - вузчою
    correct: 0
  - question: Він намагається працювати _____.
    options:
    - щонайшвидше
    - самий швидко
    - більш швидше
    - найшвидший
    correct: 0
  - question: Цей комп'ютер має _____ процесор.
    options:
    - найпотужніший
    - самий потужний
    - найбільш потужніший
    - потужний
    correct: 0
  - question: Вона — моя _____ подруга.
    options:
    - найкраща
    - сама краща
    - більш найкраща
    - найдобріша
    correct: 0
  - question: Це завдання виявилося _____ за інші.
    options:
    - складнішим
    - більш складнішим
    - самим складним
    - складніше
    correct: 0
- id: fill-in-forms
  type: fill-in
  instruction: Вставте правильну форму слова (ступінь порівняння або утворений іменник/прикметник).
  items:
  - sentence: Наш новий _____ (працювати) дуже швидко розібрався із завданням.
    answer: робітник
    options:
    - робітник
    - робота
    - робітничий
  - sentence: Куртка, яку я купив, виявилася _____ (великий), ніж я думав.
    answer: більшою
    options:
    - більшою
    - найбільшою
    - самий великий
  - sentence: Ця дерев'яна шафа значно _____ (важкий) за пластикову.
    answer: важча
    options:
    - важча
    - більш важча
    - тяжкіша
  - sentence: Мені потрібна простора _____ (читати), щоб зосередитися на книзі.
    answer: читальня
    options:
    - читальня
    - читання
    - читач
  - sentence: У цій кав'ярні продається _____ (смак) кава в місті.
    answer: найсмачніша
    options:
    - найсмачніша
    - сама смачна
    - більш смачніша
  - sentence: Я завжди купую свіжий хліб у сусідній _____ (пекти).
    answer: пекарні
    options:
    - пекарні
    - пекарі
    - пекар
  - sentence: Він виконав своє завдання _____ (швидко) за всіх інших.
    answer: найшвидше
    options:
    - найшвидше
    - найшвидший
    - швидше
  - sentence: Ця _____ (помилитися) може коштувати нам дуже дорого.
    answer: помилка
    options:
    - помилка
    - помилковий
    - помилятися
- id: match-up-roots
  type: match-up
  instruction: З'єднайте початкову форму слова з її правильним вищим ступенем порівняння
    або утвореним іменником (назвою діяча).
  pairs:
  - left: дорогий
    right: дорожчий
  - left: високий
    right: вищий
  - left: гарний
    right: кращий
  - left: поганий
    right: гірший
  - left: близький
    right: ближчий
  - left: великий
    right: більший
  - left: купувати
    right: покупець
  - left: продавати
    right: продавець
  - left: читати
    right: читач
  - left: писати
    right: письменник
- id: error-correction-grammar
  type: error-correction
  instruction: Знайдіть і виправте граматичні помилки у ступенях порівняння та суфіксах.
  items:
  - sentence: Цей телевізор більш кращий, ніж той, що ми бачили вчора.
    error: більш кращий
    correction: кращий
    error_type: construction
    options:
    - кращий
    - самий кращий
    - найбільш кращий
    explanation: 'Не можна поєднувати складену і просту форми порівняння. Правильно:
      ''кращий'' або ''більш хороший''.'
  - sentence: Київ — це самий великий мегаполіс в Україні.
    error: самий великий
    correction: найбільший
    error_type: word
    options:
    - найбільший
    - найбільш великий
    - самий більший
    explanation: Слово 'самий' для найвищого ступеня — це калька з російської. Українською
      використовуємо префікс 'най-'.
  - sentence: Вона купила склянний стіл для вітальні.
    error: склянний
    correction: скляний
    error_type: word
    options:
    - скляний
    - сткляний
    - скляні
    explanation: У слові 'скляний' суфікс '-ян-', тому пишеться одна літера 'н'.
  - sentence: Мій брат — дуже хороший читатель.
    error: читатель
    correction: читач
    error_type: word
    options:
    - читач
    - читник
    - читанець
    explanation: Правильний український суфікс для утворення назви людини, яка читає,
      — '-ач' (читач).
  - sentence: Сьогодні на вулиці значно холоднішше, ніж учора.
    error: холоднішше
    correction: холодніше
    error_type: word
    options:
    - холодніше
    - більш холодніше
    - найхолодніше
    explanation: Ступінь порівняння утворюється суфіксом '-іш-' без подвоєння.
  - sentence: Я хочу знайти самий дешевший варіант ноутбука.
    error: самий дешевший
    correction: найдешевший
    error_type: construction
    options:
    - найдешевший
    - самий дешевий
    - найбільш дешевший
    explanation: Не можна казати 'самий дешевший', використовуємо префікс 'най-' з
      вищим ступенем.
  - sentence: Ми відпочивали на березі безмежнного океану.
    error: безмежнного
    correction: безмежного
    error_type: word
    options:
    - безмежного
    - безмежного
    - безміжнього
    explanation: Слово 'безмежний' має одну 'н', оскільки корінь 'меж' не закінчується
      на 'н'.
  - sentence: Твій проект є найменш гіршим серед усіх представлених.
    error: найменш гіршим
    correction: найменш поганим
    error_type: construction
    options:
    - найменш поганим
    - самим негіршим
    - менш гіршим
    explanation: Допоміжні слова 'найбільш/найменш' використовуються тільки з початковою
      формою прикметника.
- id: essay-response-review
  type: essay-response
  instruction: Напишіть власний огляд-порівняння двох пристроїв (смартфонів або ноутбуків).
  prompt: 'Уявіть, що ви технічний експерт. Напишіть детальний огляд-порівняння двох
    електронних пристроїв. Оцініть їх за 6 критеріями: дизайн, продуктивність, камера/екран,
    зручність, ціна, та ваш загальний висновок. Обов''язково використайте щонайменше
    п''ять прикметників у вищому ступені, три прикметники у найвищому ступені та чотири
    нові абстрактні іменники. Обсяг — від 10 розгорнутих речень.'
  min_words: 50
  model_answer: 'Сьогодні ми порівняємо дві найновіші моделі смартфонів: Альфа та
    Бета. Модель Альфа є значно дорожчою за свого конкурента, проте її загальна продуктивність
    також помітно вища. Дизайн смартфона Альфа виглядає набагато привабливішим завдяки
    скляному корпусу, який забезпечує елегантність. Натомість модель Бета є дешевшою
    і має кращу компактність, що робить її більш зручною для щоденного використання.
    Екран у моделі Альфа — це безперечно найкращий дисплей на ринку, який передає
    неймовірну яскравість і глибину кольорів. Проте камера в моделі Бета виявилася
    трохи кращою при зйомці вночі. Акумулятор смартфона Бета працює довше, що гарантує
    більшу надійність у подорожах. Модель Альфа є найшвидшим пристроєм у нашому тесті,
    хоча вона і найтепліша під час навантажень. Важлива перевага Бети — це її бездоганна
    зручність для користувачів з невеликими руками. Підсумовуючи, Альфа — це найпотужніший
    вибір для професіоналів, але для щоденного використання модель Бета є значно раціональнішою
    покупкою.'
  evaluation_criteria:
  - Текст містить щонайменше 10 речень.
  - Використано мінімум 5 прикметників у вищому ступені.
  - Використано мінімум 3 прикметники у найвищому ступені.
  - Вжито 4 або більше абстрактних іменників із суфіксами (наприклад, 'потужність',
    'надійність').
  - Охоплено всі 6 критеріїв оцінювання пристроїв.
  rubric:
  - criteria: Ступені порівняння
    description: Правильне використання простих і складених форм вищого і найвищого
      ступенів без кальок.
  - criteria: Словотвір
    description: Наявність новоутворених абстрактних іменників та правильне написання
      суфіксів.
- id: fill-in-dialogue
  type: fill-in
  instruction: Доповніть діалог між двома експертами про інфраструктуру міст, обравши
    правильні форми.
  items:
  - sentence: — Добрий день. Як ви оцінюєте інфраструктуру Львова? Вона стала значно
      _____ (хороший), ніж раніше.
    answer: кращою
    options:
    - кращою
    - більш кращою
    - самою хорошою
  - sentence: — Згоден. Але київське метро залишається _____ (великий) транспортною
      системою.
    answer: найбільшою
    options:
    - найбільшою
    - самою великою
    - більшою
  - sentence: — Проте в Одесі ми спостерігаємо _____ (швидкий) темпи розвитку туризму.
    answer: найшвидші
    options:
    - найшвидші
    - самі швидкі
    - швидші
  - sentence: — Так, але рівень інвестицій у Харкові зараз є трохи _____ (низький)
      через безпеку.
    answer: нижчим
    options:
    - нижчим
    - більш нижчим
    - найнижчим
  - sentence: — Дніпро також показує неймовірну _____ (потужний), яка робить його
      дуже перспективним.
    answer: потужність
    options:
    - потужність
    - потужно
    - потужним
  - sentence: — Кожне місто має свою унікальну _____ (привабливий).
    answer: привабливість
    options:
    - привабливість
    - привабливим
    - приваблення
- id: true-false-rules
  type: true-false
  instruction: Оцініть, чи правильні ці твердження щодо українського словотвору та
    ступенів порівняння.
  items:
  - statement: Слово 'самий' (наприклад, 'самий розумний') є правильним способом утворення
      найвищого ступеня порівняння в українській літературній мові.
    correct: false
    explanation: Це калька з російської мови. Правильно використовувати префікс 'най-'
      (найрозумніший).
  - statement: Складену форму вищого ступеня не можна поєднувати з простою (наприклад,
      'більш дорожчий' — це помилка).
    correct: true
    explanation: 'Правильно: ''більш дорогий'' або ''дорожчий''. Поєднання обох форм
      є грубою граматичною помилкою.'
  - statement: Вищий ступінь від слова 'поганий' — це 'гірший', оскільки це суплетивна
      форма.
    correct: true
    explanation: Це правильна форма винятку, коли корінь слова повністю змінюється.
  - statement: Прикметник 'дерев'янний' завжди пишеться з двома літерами 'н'.
    correct: false
    explanation: Суфікс '-ян-' пишеться з однією 'н', тому правильно 'дерев'яний'.
  - statement: Іменник 'читач' утворено за допомогою суфікса '-ач', який вказує на
      назву діяча.
    correct: true
    explanation: Суфікси '-ач', '-ець', '-ник' дуже продуктивні для утворення назв
      осіб за дією.
  - statement: Найвищий ступінь прислівника 'багато' — це 'найбагатіше'.
    correct: false
    explanation: Правильна суплетивна форма від 'багато' — 'найбільше'.
