- id: sentence-builder
  type: unjumble
  instruction: Складіть правильне речення зі слів (на основі діалогу)
  items:
  - words:
    - кімнаті
    - закінчилася
    - морська
    - У
    - маніпуляційній
    - сіль.
    correct_order:
    - У
    - маніпуляційній
    - кімнаті
    - закінчилася
    - морська
    - сіль.
  - words:
    - біля
    - електричної
    - Вона
    - шафу
    - печі.
    - перевірила
    correct_order:
    - Вона
    - перевірила
    - шафу
    - біля
    - електричної
    - печі.
  - words:
    - до
    - лікарні
    - дуже
    - Моя
    - складною.
    - подорож
    - була
    correct_order:
    - Моя
    - подорож
    - до
    - лікарні
    - була
    - дуже
    - складною.
  - words:
    - вічністю.
    - їхав
    - Я
    - сюди
    - цілою
    correct_order:
    - Я
    - їхав
    - сюди
