version: '1.0'
module: noun-subclasses-feminine
level: b1
inline:
- id: match-up
  type: match-up
  instruction: З'єднайте форму називного відмінка з правильною формою орудного відмінка
  pairs:
  - left: ніч
    right: ніччю
  - left: любов
    right: любов'ю
  - left: радість
    right: радістю
  - left: сіль
    right: сіллю
  - left: мати
    right: матір'ю
  - left: кров
    right: кров'ю
  - left: річ
    right: річчю
  - left: мудрість
    right: мудрістю
  title: З'єднайте форму називного відмінка з правильною формою орудного відмінка
- id: fill-in-instrumental
  type: fill-in
  instruction: Вставте іменник у формі орудного відмінка
  items:
  - sentence: Місто було вкрите темною ____.
    answer: ніччю
    options:
    - ніччю
    - ніч'ю
    - ночею
  - sentence: Мати дивилася на дитину з великою ____.
    answer: любов'ю
    options:
    - любов'ю
    - любоввю
    - любовю
  - sentence: Я поділилася з ним цікавою ____.
    answer: річчю
    options:
    - річчю
    - річею
    - річу
  - sentence: Вона з великою ____ зустріла гостей.
    answer: радістю
    options:
    - радісттю
    - радістю
    - радістей
  - sentence: Він завжди пишається своєю ____.
    answer: матір'ю
    options:
    - матерю
    - матір'ю
    - матірєю
  - sentence: Земля була полита ____ героїв.
    answer: кров'ю
    options:
    - кров'ю
    - кроввю
    - кровю
  - sentence: Суп треба приправити ____.
    answer: сіллю
    options:
    - сіллю
    - сілю
    - сілею
  - sentence: Я сховався від сонця за ____ дерева.
    answer: тінню
    options:
    - тінню
    - тінею
    - тіню
  title: Вставте іменник у формі орудного відмінка
- id: sort-doubling-rules
  type: group-sort
  instruction: Розподіліть слова за правилами утворення орудного відмінка однини
  groups:
  - label: Подвоєння приголосних (-ю)
    items:
    - ніч
    - подорож
    - міць
    - тінь
    - мідь
  - label: Без подвоєння (збіг приголосних)
    items:
    - радість
    - честь
    - мудрість
    - жовч
    - гордість
  - label: З апострофом
    items:
    - любов
    - кров
    - мати
  title: Розподіліть слова за правилами утворення орудного відмінка однини
- id: error-fix-instrumental
  type: error-correction
  instruction: Знайдіть і виправте помилку в орудному відмінку
  items:
  - sentence: Ми дуже пишаємося нашою креативною молодью.
    error: молодью
    correction: молоддю
    error_type: word
    options:
    - молоддю
    - молоді
    - молодой
    explanation: Слово 'молодь' закінчується на один приголосний, тому відбувається
      подвоєння — молоддю.
  - sentence: Він дивився на неї з великою любовю.
    error: любовю
    correction: любов'ю
    error_type: word
    options:
    - любов'ю
    - любові
    - любовой
    explanation: Після губного приголосного 'в' перед 'ю' завжди ставиться апостроф
      — любов'ю.
  - sentence: Вона відповіла з радісттю.
    error: радісттю
    correction: радістю
    error_type: word
    options:
    - радістю
    - радостю
    - радістой
    explanation: Слово 'радість' закінчується на два приголосних (-ст-), тому подвоєння
      не відбувається — радістю.
  - sentence: Місто заснуло під темною ніч'ю.
    error: ніч'ю
    correction: ніччю
    error_type: word
    options:
    - ніччю
    - ночею
    - ночою
    explanation: Слово 'ніч' закінчується на один шиплячий, тому відбувається подвоєння
      — ніччю. Апостроф не потрібен.
  - sentence: Ми насолоджувалися цією подорожжюєю.
    error: подорожжюєю
    correction: подорожжю
    error_type: word
    options:
    - подорожжю
    - подорожею
    - подорожу
    explanation: Орудний відмінок третьої відміни має закінчення -ю. Разом із подвоєнням
      виходить подорожжю.
  - sentence: Дідусь поділився з нами своєю мудрісттю.
    error: мудрісттю
    correction: мудрістю
    error_type: word
    options:
    - мудрістю
    - мудрістей
    - мудрістой
    explanation: Слово 'мудрість' має збіг приголосних (-ст-), тому подвоєння відсутнє
      — мудрістю.
  title: Знайдіть і виправте помилку в орудному відмінку
- id: quiz-determine-vidmina
  type: quiz
  instruction: Оберіть, до якої відміни належить іменник
  items:
  - question: ніч
    options:
    - III відміна (жіночий рід)
    - I відміна (жіночий рід)
    - II відміна (чоловічий рід)
    - II відміна (середній рід)
    correct: 0
  - question: гість
    options:
    - III відміна (жіночий рід)
    - I відміна (жіночий рід)
    - II відміна (чоловічий рід)
    - II відміна (середній рід)
    correct: 2
  - question: жінка
    options:
    - III відміна (жіночий рід)
    - I відміна (жіночий рід)
    - II відміна (чоловічий рід)
    - II відміна (середній рід)
    correct: 1
  - question: біль
    options:
    - III відміна (жіночий рід)
    - I відміна (жіночий рід)
    - II відміна (чоловічий рід)
    - II відміна (середній рід)
    correct: 2
  - question: сіль
    options:
    - III відміна (жіночий рід)
    - I відміна (жіночий рід)
    - II відміна (чоловічий рід)
    - II відміна (середній рід)
    correct: 0
  - question: олень
    options:
    - III відміна (жіночий рід)
    - I відміна (жіночий рід)
    - II відміна (чоловічий рід)
    - II відміна (середній рід)
    correct: 2
  - question: тінь
    options:
    - III відміна (жіночий рід)
    - I відміна (жіночий рід)
    - II відміна (чоловічий рід)
    - II відміна (середній рід)
    correct: 0
  - question: мати
    options:
    - III відміна (жіночий рід)
    - I відміна (жіночий рід)
    - II відміна (чоловічий рід)
    - II відміна (середній рід)
    correct: 0
  title: Оберіть, до якої відміни належить іменник
- id: sentence-builder
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - пишається
    - своєю
    - Він
    - матір'ю.
    correct_order:
    - Він
    - пишається
    - своєю
    - матір'ю.
  - words:
    - вкрите
    - Місто
    - було
    - ніччю.
    - темною
    correct_order:
    - Місто
    - було
    - вкрите
    - темною
    - ніччю.
  - words:
    - з
    - поділилася
    - радістю.
    - Я
    - цією
    - новиною
    correct_order:
    - Я
    - поділилася
    - цією
    - новиною
    - з
    - радістю.
  - words:
    - героїв.
    - Земля
    - кров'ю
    - полита
    correct_order:
    - Земля
    - полита
    - кров'ю
    - героїв.
  - words:
    - солі.
    - У
    - багато
    - супі
    - дуже
    correct_order:
    - У
    - супі
    - дуже
    - багато
    - солі.
  - words:
    - Я
    - подорожі.
    - від
    - цієї
    - в
    - захваті
    correct_order:
    - Я
    - в
    - захваті
    - від
    - цієї
    - подорожі.
  title: Складіть правильне речення зі слів
workbook:
- type: fill-in
  instruction: Вставте правильне закінчення для форми множини
  items:
  - sentence: У цьому місті багато старих ____.
    answer: печей
    options:
    - печей
    - печів
    - печах
  - sentence: Ми гуляли довгими літніми ____.
    answer: ночами
    options:
    - ночами
    - ноччю
    - ночями
  - sentence: Я бажаю вам багато ____ у житті.
    answer: радостей
    options:
    - радостей
    - радостів
    - радість
  - sentence: У кімнаті було багато зайвих ____.
    answer: речей
    options:
    - речей
    - речів
    - річей
  - sentence: Діти дуже люблять своїх ____.
    answer: матерів
    options:
    - матерів
    - матерей
    - матям
  - sentence: Ми довго милувалися цими чудовими ____.
    answer: подорожами
    options:
    - подорожами
    - подорожжями
    - подорожей
  title: Вставте правильне закінчення для форми множини
- type: true-false
  instruction: Правда чи ні? Визначте правила відмінювання.
  items:
  - statement: Слова третьої відміни мають закінчення -а або -я в називному відмінку.
    correct: false
    explanation: Вони мають нульове закінчення (закінчуються на приголосний).
  - statement: Слово 'мати' належить до третьої відміни.
    correct: true
    explanation: Це унікальне слово третьої відміни, яке змінює свою основу (додає
      -ер- або -ір-).
  - statement: В орудному відмінку всі слова третьої відміни мають подвоєння.
    correct: false
    explanation: Якщо слово закінчується на збіг приголосних або губний звук, подвоєння
      немає.
  - statement: Слово 'олень' належить до третьої відміни, бо закінчується на м'який
      приголосний.
    correct: false
    explanation: Це слово чоловічого роду, тому воно належить до другої відміни.
  - statement: У родовому, давальному та місцевому відмінках однини найчастіше вживається
      закінчення -і.
    correct: true
    explanation: 'Так, наприклад: немає ночі, завдяки ночі, у ночі.'
  - statement: Подвоєння в орудному відмінку зберігається і у множині (наприклад,
      ніччями).
    correct: false
    explanation: Подвоєння відбувається тільки в однині. У множині буде 'ночами'.
  title: Правда чи ні? Визначте правила відмінювання.
- type: quiz
