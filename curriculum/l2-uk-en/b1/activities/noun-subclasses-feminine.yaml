version: '1.0'
module: noun-subclasses-feminine
level: b1
inline:
- id: match-up
  type: match-up
  instruction: З'єднайте називний відмінок із формами родового та орудного відмінків
  pairs:
  - left: ніч
    right: ночі, ніччю
  - left: радість
    right: радості, радістю
  - left: кров
    right: крові, кров'ю
  - left: любов
    right: любові, любов'ю
  - left: сіль
    right: солі, сіллю
  - left: річ
    right: речі, річчю
  - left: піч
    right: печі, піччю
  - left: осінь
    right: осені, осінню
- id: fill-in-instrumental
  type: fill-in
  instruction: Вставте правильну форму орудного відмінка (Instrumental)
  items:
  - sentence: Я захоплююся її глибокою _____.
    answer: мудрістю
    options:
    - мудрістю
    - мудрісттю
    - мудрісстю
  - sentence: Вона завжди приправляє суп _____.
    answer: сіллю
    options:
    - сіллю
    - сілю
    - сіл'ю
  - sentence: Ми щиро насолоджуємося нашою _____.
    answer: подорожжю
    options:
    - подорожжю
    - подорожю
    - подорожу
  - sentence: Мати дивиться на сина з великою _____.
    answer: любов'ю
    options:
    - любов'ю
    - любовію
    - любоввю
  - sentence: Усе місто було вкрите темною _____.
    answer: ніччю
    options:
    - ніччю
    - ніч'ю
    - нічю
  - sentence: Він завжди пишається своєю розумною _____.
    answer: матір'ю
    options:
    - матір'ю
    - матірю
    - матірр'ю
  - sentence: Я ділюся цими новинами з великою _____.
    answer: радістю
    options:
    - радістю
    - радісттю
    - радіссю
  - sentence: Вороги завжди швидко тікали перед нашою _____.
    answer: люттю
    options:
    - люттю
    - лют'ю
    - лютю
- id: sort-doubling-rules
  type: group-sort
  instruction: 'Розподіліть іменники за правилом: є подвоєння чи немає подвоєння в
    орудному відмінку?'
  groups:
  - label: Є подвоєння (сіллю, ніччю)
    items:
    - ніч
    - мідь
    - тінь
    - сіль
    - мить
    - розкіш
    - подорож
  - label: Немає подвоєння (радістю, любов'ю)
    items:
    - кров
    - любов
    - радість
    - молодість
    - гордість
    - жовч
    - мати
- id: quiz-determine-vidmina
  type: quiz
  instruction: Оберіть правильну відповідь. Перевірте свої знання про відміни.
  items:
  - question: Яке з цих слів належить до ІІІ відміни (жіночий рід)?
    options:
    - ніч
    - гість
    - день
    - олень
    correct: 0
  - question: Яке з цих слів є іменником чоловічого роду (тобто ІІ відміна)?
    options:
    - біль
    - сіль
    - тінь
    - мідь
    correct: 0
  - question: 'Виберіть слово ІІІ відміни:'
    options:
    - радість
    - кінь
    - звір
    - степ
    correct: 0
  - question: Яке з цих слів НЕ належить до ІІІ відміни?
    options:
    - книга
    - подорож
    - піч
    - відповідь
    correct: 0
  - question: До якої відміни належить слово 'любов'?
    options:
    - До ІІІ відміни
    - До І відміни
    - До ІІ відміни
    - До IV відміни
    correct: 0
  - question: Яке слово має нульове закінчення і є жіночого роду?
    options:
    - осінь
    - жінка
    - гостя
    - подруга
    correct: 0
  - question: 'Особливе слово ''мати'' (mother) належить до:'
    options:
    - ІІІ відміни
    - І відміни
    - ІІ відміни
    - IV відміни
    correct: 0
  - question: 'Оберіть рядок, у якому всі слова є іменниками ІІІ відміни:'
    options:
    - річ, ніч, суміш
    - день, тінь, сіль
    - біль, гість, кінь
    - книга, осінь, пісня
    correct: 0
workbook:
- type: fill-in
  instruction: Вставте правильне закінчення для відмінків (родовий, давальний, місцевий)
  items:
  - sentence: У цій темній _____ є особлива магія.
    answer: ночі
    options:
    - ночі
    - нічі
    - ночу
  - sentence: Ми завдячуємо цій цікавій _____.
    answer: подорожі
    options:
    - подорожі
    - подорожу
    - подороже
  - sentence: Тут немає жодної корисної _____.
    answer: речі
    options:
    - речі
    - річі
    - речу
  - sentence: Вона ніколи не втрачає людської _____.
    answer: гідності
    options:
    - гідності
    - гідністі
    - гідностю
  - sentence: Хліб завжди печеться у гарячій _____.
    answer: печі
    options:
    - печі
    - пічі
    - печу
  - sentence: Ми щиро бажаємо вам багато щастя та _____.
    answer: радості
    options:
    - радості
    - радісті
    - радістю
- type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I season the dish with salt.
    options:
    - text: Я приправляю страву сіллю.
      correct: true
    - text: Я приправляю страву сілю.
      correct: false
    - text: Я приправляю страву солею.
      correct: false
    - text: Я приправляю страву сілью.
      correct: false
  - source: She is proud of her mother.
    options:
    - text: Вона пишається своєю матір'ю.
      correct: true
    - text: Вона пишається своєю мамою.
      correct: false
    - text: Вона пишається своєю матірю.
      correct: false
    - text: Вона пишається своєю матірр'ю.
      correct: false
  - source: They enjoy the journey.
    options:
    - text: Вони насолоджуються подорожжю.
      correct: true
    - text: Вони насолоджуються подорожю.
      correct: false
    - text: Вони насолоджуються подорожу.
      correct: false
    - text: Вони насолоджуються подорожею.
      correct: false
  - source: The city was covered by night.
    options:
    - text: Місто було вкрите ніччю.
      correct: true
    - text: Місто було вкрите ніч'ю.
      correct: false
    - text: Місто було вкрите нічю.
      correct: false
    - text: Місто було вкрите нічею.
      correct: false
  - source: We share our wisdom.
    options:
    - text: Ми ділимося нашою мудрістю.
      correct: true
    - text: Ми ділимося нашою мудрісттю.
      correct: false
    - text: Ми ділимося нашою мудростю.
      correct: false
    - text: Ми ділимося нашою мудріссю.
      correct: false
  - source: He answered with fury.
    options:
    - text: Він відповів із люттю.
      correct: true
    - text: Він відповів із лют'ю.
      correct: false
    - text: Він відповів із лютою.
      correct: false
    - text: Він відповів із лютю.
      correct: false
- type: group-sort
  instruction: Він чи Вона? Розподіліть іменники за граматичним родом.
  groups:
  - label: Чоловічий рід (ІІ відміна)
    items:
    - гість
    - біль
    - день
    - кінь
    - степ
    - звір
  - label: Жіночий рід (ІІІ відміна)
    items:
    - ніч
    - сіль
    - тінь
    - осінь
    - молодь
    - подорож
    - міць
