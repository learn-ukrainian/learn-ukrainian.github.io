version: '1.0'
module: noun-subclasses-feminine
level: b1
inline:
- id: match-up
  type: match-up
  instruction: З'єднайте називний відмінок із правильними формами родового та орудного
    відмінків
  pairs:
  - left: ніч
    right: ночі, ніччю
  - left: кров
    right: крові (крови), кров'ю
  - left: сіль
    right: солі (соли), сіллю
  - left: радість
    right: радості (радости), радістю
  - left: любов
    right: любові (любови), любов'ю
  - left: подорож
    right: подорожі, подорожжю
  - left: мідь
    right: міді, міддю
  - left: осінь
    right: осені (осени), осінню
- id: group-sort
  type: group-sort
  instruction: Розподіліть іменники залежно від того, чи є в них подвоєння в орудному
    відмінку
  groups:
  - label: Є подвоєння (наприклад, ніччю)
    items:
    - ніч
    - сіль
    - мідь
    - подорож
    - тінь
    - осінь
  - label: Немає подвоєння (наприклад, радістю)
    items:
    - кров
    - радість
    - любов
    - честь
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте орфографічну помилку у формі орудного відмінка
  items:
  - sentence: Вона поділилася зі мною своєю радіссттю.
    error: радіссттю
    correction: радістю
    error_type: word
    options:
    - радістю
    - радостю
    - радісттю
    - радіст'ю
    explanation: Слова на -ість не мають подвоєння в орудному відмінку через фізичний
      збіг приголосних.
  - sentence: Увесь лист був написаний кровю.
    error: кровю
    correction: кров'ю
    error_type: word
    options:
    - кров'ю
    - кроввю
    - кровію
    - кров'єю
    explanation: Після губного приголосного [в] перед буквою 'ю' обов'язково ставиться
      апостроф, подвоєння не відбувається.
  - sentence: Ми довго милувалися темною ніч'ю.
    error: ніч'ю
    correction: ніччю
    error_type: word
    options:
    - ніччю
    - нічю
    - ноччю
    - нічею
    explanation: Після шиплячого приголосного [ч] між двома голосними відбувається
      закономірне подвоєння.
  - sentence: Вони оточили дитину любоввю.
    error: любоввю
    correction: любов'ю
    error_type: word
    options:
    - любов'ю
    - любовю
    - любовію
    - любовею
    explanation: Після губного приголосного [в] подвоєння немає, натомість ставиться
      апостроф.
  - sentence: Він відповів йому з такою лють'ю.
    error: лють'ю
    correction: люттю
    error_type: word
    options:
    - люттю
    - лютью
    - лютою
    - лют'ю
    explanation: М'який приголосний [т] перед закінченням -ю в позиції між голосними
      обов'язково подвоюється.
  - sentence: Стежка була вкрита густою тінью.
    error: тінью
    correction: тінню
    error_type: word
    options:
    - тінню
    - тіною
    - тінь'ю
    - тінею
    explanation: М'який приголосний [н'] між голосними подовжується і на письмі передається
      подвоєнням.
- id: fill-in
  type: fill-in
  instruction: Вставте іменник у правильній формі орудного відмінка
  items:
  - sentence: Милуватися зоряною _____.
    answer: ніччю
    options:
    - ніччю
    - ніч'ю
    - нічу
    - нічею
  - sentence: Держава має пишатися сучасною _____.
    answer: молоддю
    options:
    - молоддю
    - молодью
    - молодістю
    - молодом
  - sentence: Цей договір був написаний _____.
    answer: кров'ю
    options:
    - кров'ю
    - кроввю
    - кровю
    - кровію
  - sentence: Вона поділилася зі мною великою _____.
    answer: радістю
    options:
    - радістю
    - радіссттю
    - радісттю
    - радість'ю
  - sentence: Я завжди захоплююся своєю _____.
    answer: матір'ю
    options:
    - матір'ю
    - матіррю
    - матірю
    - матю
  - sentence: Страву потрібно щедро посипати _____.
    answer: сіллю
    options:
    - сіллю
    - сілью
    - сіль'ю
    - сілею
  - sentence: Вони оточили дитину своєю _____.
    answer: любов'ю
    options:
    - любов'ю
    - любоввю
    - любовю
    - любовію
  - sentence: Ми дуже задоволені цією _____.
    answer: подорожжю
    options:
    - подорожжю
    - подорожю
    - подорожею
    - подорошшю
