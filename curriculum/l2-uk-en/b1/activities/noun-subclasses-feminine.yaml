    - ніч
    - —
    - найбільша
    correct_order:
    - Спокійна
    - ніч
    - —
    - це
    - найбільша
    - радість.
workbook:
- type: true-false
  instruction: Визначте, чи є твердження правильним
  items:
  - statement: Іменники третьої відміни мають виключно чоловічий рід.
    correct: false
    explanation: До третьої відміни належать виключно іменники жіночого роду (та єдине
      слово мати).
  - statement: Слово «мати» належить до третьої відміни і має свою унікальну парадигму
      відмінювання.
    correct: true
    explanation: Це слово історично відмінюється з розширенням основи за допомогою
      суфіксів -ер- або -ір-.
  - statement: Якщо основа іменника закінчується на два приголосні (як у слові радість),
      в орудному відмінку відбувається подвоєння.
    correct: false
    explanation: При збігу двох чи більше приголосних звуків подвоєння ніколи не відбувається
      (радістю).
  - statement: Слова «біль» та «степ» належать до третьої відміни, оскільки мають
      нульове закінчення.
    correct: false
    explanation: Це слова чоловічого роду, тому вони автоматично належать до другої
      відміни.
  - statement: Слово «ніч» в орудному відмінку завжди пишеться з подвоєнням (ніччю).
    correct: true
    explanation: Основа закінчується рівно на один приголосний звук, тому він закономірно
      подвоюється.
  - statement: Абстрактні іменники на -ть у родовому відмінку можуть мати паралельні
      закінчення -і або -и (радості/радости).
    correct: true
    explanation: Обидва варіанти (на -і та давнє на -и) є абсолютно правильними та
      рівноправними літературними нормами.
