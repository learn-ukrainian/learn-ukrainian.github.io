- id: character-traits-quiz
  type: quiz
  instruction: Оберіть правильний прикметник для опису характеру людини за наведеним
    описом.
  items:
  - question: Людина, яка ніколи не приховує своїх справжніх намірів і каже те, що
      дійсно відчуває.
    options:
    - щира
    - вередлива
    - замкнута
    - вперта
    correct: 0
  - question: Людина, яка завжди готова прийти на допомогу в тяжку хвилину і не байдужа
      до чужого болю.
    options:
    - чуйна
    - самовпевнена
    - лінива
    - кремезна
    correct: 0
  - question: Людина, яка легко адаптується в новому колективі, обожнює спілкування
      і легко знаходить друзів.
    options:
    - товариська
    - замкнута
    - вередлива
    - вродлива
    correct: 0
  - question: Студент, який дуже швидко знаходить правильне рішення навіть для найскладнішої
      проблеми.
    options:
    - кмітливий
    - впертий
    - лінивий
    - лагідний
    correct: 0
  - question: Людина з м'якою і спокійною вдачею, яка ніколи не підвищує голос на
      інших.
    options:
    - лагідна
    - вередлива
    - самовпевнена
    - товариська
    correct: 0
  - question: Особа, яка постійно і без вагомих причин змінює свої настрої, якій дуже
      важко догодити.
    options:
    - вередлива
    - щира
    - чуйна
    - кмітлива
    correct: 0
  - question: Людина, яка категорично відмовляється слухати логічні аргументи і наполягає
      лише на своєму.
    options:
    - вперта
    - лагідна
    - щира
    - товариська
    correct: 0
  - question: Той, хто тримає всі емоції глибоко всередині себе і дуже рідко ділиться
      ними з оточенням.
    options:
    - замкнутий
    - чуйний
    - кмітливий
    - товариський
    correct: 0
  - question: Особа, яка абсолютно безпідставно вважає себе набагато кращою за всіх
      інших людей.
    options:
    - самовпевнена
    - впевнена в собі
    - щира
    - лагідна
    correct: 0
  - question: Людина, яка має абсолютно здорову віру у власні сили та реальні практичні
      здібності.
    options:
    - впевнена в собі
    - самовпевнена
    - замкнута
    - вперта
    correct: 0
  - question: Той, хто не знає відпочинку і постійно працює від раннього ранку до
      пізньої ночі.
    options:
    - працьовитий
    - лінивий
    - вередливий
    - самовпевнений
    correct: 0
  - question: Людина, яка постійно шукає нових хитрих способів назавжди уникнути важкої
      роботи.
    options:
    - лінивий
    - працьовитий
    - щирий
    - чуйний
    correct: 0
- id: fill-in-portrait-family
  type: fill-in
  instruction: Вставте правильне слово в текст про родинну зустріч, доповнюючи словесний
    портрет.
  items:
  - sentence: Моя молодша сестра дуже ______, вона має тонку і витончену фігуру.
    answer: тендітна
    options:
    - тендітна
    - вродлива
    - кремезна
  - sentence: У нашій великій родині панують дуже теплі та ______ стосунки.
    answer: щирі
    options:
    - щирі
    - вередливі
    - замкнуті
  - sentence: Маленька донька мого рідного брата — це моя улюблена ______.
    answer: племінниця
    options:
    - племінниця
    - невістка
    - свекруха
  - sentence: Між моїми батьками за всі роки шлюбу склалися чудові ______.
    answer: стосунки
    options:
    - стосунки
    - відносини
    - взаємини
  - sentence: Мати мого чоловіка, тобто моя ______, завжди дає мені дуже мудрі поради.
    answer: свекруха
    options:
    - свекруха
    - теща
    - невістка
  - sentence: Чоловік моєї рідної сестри, тобто мій ______, працює головним лікарем.
    answer: зять
    options:
    - зять
    - свекор
    - тесть
  - sentence: У мого маленького племінника густе ______ волосся, як у його батька.
    answer: кучеряве
    options:
    - кучеряве
    - русяве
    - сиве
  - sentence: У моєї тітки великі й надзвичайно виразні ______ очі.
    answer: карі
    options:
    - карі
    - щирі
    - смагляві
  - sentence: Наш старенький дідусь завжди дуже ______ до всіх гостей у нашому домі.
    answer: привітний
    options:
    - привітний
    - вередливий
    - замкнутий
  - sentence: Мій дядько — ______ чоловік середнього зросту, який має велику фізичну
      силу.
    answer: кремезний
    options:
    - кремезний
    - тендітний
    - смаглявий
  - sentence: Мій двоюрідний брат дуже ______ — він легко знайомиться з новими колегами.
    answer: товариський
    options:
    - товариський
    - замкнутий
    - впертий
  - sentence: Моя невістка не лише дуже розумна, але й надзвичайно ______ жінка.
    answer: вродлива
    options:
    - вродлива
    - тендітна
    - кмітлива
- id: write-portrait-essay
  type: essay-response
  prompt: 'Напишіть структурований словесний портрет (8-10 речень) знайомої або вигаданої
    людини. Ваш текст обов''язково повинен мати три частини: зачин (хто ця людина),
    основну частину (детальний опис зовнішності з використанням епітетів, порівнянь
    або портретної деталі) та кінцівку (ваше враження від неї).'
  min_words: 50
  model_answer: Моя старша двоюрідна сестра Олена — це людина, якою я щиро захоплююся
    вже багато років. Вона тендітна молода жінка середнього зросту з неймовірно граціозною
    поставою. Її обличчя завжди прикрашає лагідна усмішка, яка робить її надзвичайно
    вродливою. Найбільше привертають увагу її великі карі очі, ясні й глибокі, мов
    осіннє лісове озеро. Олена має розкішне довге каштанове волосся, яке спадає на
    плечі м'якими хвилями. Вона зазвичай одягається дуже стримано, віддаючи перевагу
    елегантним сукням пастельних тонів. Її головна портретна деталь — це маленька
    симпатична родимка на лівій щоці, яка додає їй особливого шарму. За характером
    Олена дуже чуйна і щира, їй від природи властиво допомагати іншим у біді. Я дуже
    люблю свою сестру і завжди відчуваю радість і спокій, коли ми проводимо час разом.
  evaluation_criteria:
  - Текст має обсяг 8-10 речень (мінімум 50 слів).
  - 'Присутня чітка структура: зачин, основна частина, кінцівка.'
  - Використано різноманітну портретну лексику (зріст, статура, риси обличчя, волосся).
  - Присутні художні засоби (епітети, порівняння) або яскрава портретна деталь.
  - Текст логічний, побудований без грубих граматичних та лексичних помилок.
