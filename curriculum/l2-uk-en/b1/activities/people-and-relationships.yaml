    та характеру.
  pairs:
  - left: Зріст
    right: високий, приземкуватий
  - left: Постава
    right: тендітна, струнка
  - left: Статура
    right: кремезний
  - left: Волосся
    right: кучеряве, пряме
  - left: Колір волосся
    right: русяве, каштанове
  - left: Колір обличчя
    right: смагляве, бліде
  - left: Очі
    right: карі, розкосі
  - left: Вік
    right: зрілий, літній
