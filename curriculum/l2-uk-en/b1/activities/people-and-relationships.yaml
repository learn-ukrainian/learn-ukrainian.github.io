- type: essay-response
  prompt: Уявіть, що ви знайомите свого давнього друга з вашим керівником (формальний
    регістр). Потім ви знайомите цього ж друга зі своїм братом (неформальний регістр).
    Напишіть обидва варіанти представлення (3-4 речення загалом).
  model_answer: '> [!model-answer]

    > Формально: «Олександре Петровичу, дозвольте представити вам мого друга і колегу,
    Івана. Іване, це мій керівник, Олександр Петрович.»

    > Неформально: «Привіт, брате! Познайомся, це мій товариш Іван. Іване, це мій
    рідний брат Андрій.»

    '
- type: essay-response
  prompt: Напишіть структурований словесний портрет реальної або вигаданої людини
    (8-10 речень). Обов'язково використайте зачин, основну частину (зріст, статура,
    риси обличчя, волосся) та кінцівку (характер і загальне враження).
  min_words: 50
  model_answer: '> [!model-answer]

    > Я хочу розповісти про мого найкращого друга Максима. Ми познайомилися ще в університеті
    і з того часу дуже тісно товаришуємо. Максим — високий і широкоплечий хлопець
    із міцною статурою. У нього густе кучеряве каштанове волосся і дуже виразне, дещо
    смагляве обличчя. Його щирий погляд і привітна усмішка завжди викликають довіру
    в людей. За характером він надзвичайно відповідальний та працьовитий, завжди готовий
    допомогти. Водночас йому властиво бути дуже кмітливим і швидко вирішувати будь-які
    проблеми. Я глибоко поважаю Максима за його чуйність і вважаю нашу дружбу справжнім
    подарунком долі.

    '
