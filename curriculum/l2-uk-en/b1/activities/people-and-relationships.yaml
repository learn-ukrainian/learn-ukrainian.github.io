version: '1.0'
module: people-and-relationships
level: b1
inline:
- id: match-up-match-portrait-lexis-to-body-categories
  type: match-up
  instruction: З'єднайте портретну лексику з відповідними категоріями тіла та зовнішності.
  pairs:
  - left: високий
    right: зріст
  - left: кремезний
    right: статура
  - left: русяве
    right: колір волосся
  - left: кучеряве
    right: текстура волосся
  - left: смагляве
    right: колір обличчя
  - left: привітний
    right: погляд
  - left: літній
    right: вік
  - left: щирий
    right: характер
- id: quiz-character-valence-identify-character-traits-as-and-choose-the-correct-adjective-for-a-description
  type: quiz
  instruction: Визначте, яка риса характеру описана, і оберіть правильний прикметник.
  items:
  - question: Оксана завжди швидко знаходить вихід зі складної ситуації і легко вирішує
      несподівані проблеми. Яка вона?
    options:
    - кмітлива
    - вперта
    - чуйна
    - заздрісна
    correct: 0
  - question: Дмитро дуже емоційно реагує на чужий біль, уважно слухає інших і завжди
      готовий допомогти. Він...
    options:
    - чуйний
    - замкнутий
    - вередливий
    - самовпевнений
    correct: 0
  - question: Максим відмовляється слухати логічні аргументи і ніколи не йде на компроміс.
      У конфліктах він дуже...
    options:
    - впертий
    - наполегливий
    - працьовитий
    - щирий
    correct: 0
  - question: Марія зовсім не любить говорити про себе і тримає свої справжні емоції
      глибоко всередині. За характером вона...
    options:
    - замкнута
    - балакуча
    - привітна
    - лагідна
    correct: 0
  - question: Олександр завжди виконує свої обіцянки, на нього можна покластися в
      будь-якій ситуації. Він...
    options:
    - відповідальний
    - самовпевнений
    - лінивий
    - нетерплячий
    correct: 0
  - question: Іван постійно чимось незадоволений, швидко змінює свої бажання і вимагає
      надмірної уваги. Його поведінка...
    options:
    - вередлива
    - м'яка
    - чесна
    - кмітлива
    correct: 0
- id: fill-in-complete-a-portrait-description-by-filling-in-missing-adjectives-and-relationship-terms-in-a-text-about-a-family
  type: fill-in
  instruction: Доповніть опис родини, вставивши правильні прикметники та назви родичів.
  items:
  - sentence: Моя мама має темне хвилясте волосся, яке ми називаємо ____.
    answer: каштанове
    options:
    - русяве
    - каштанове
    - бліде
  - sentence: Мій рідний дядько має міцну фігуру, розвинені м'язи, він справді ____.
    answer: кремезний
    options:
    - тендітний
    - кремезний
    - худорлявий
  - sentence: Сестра моєї матері — це моя ____, і вона дуже привітна людина.
    answer: тітка
    options:
    - тітка
    - свекруха
    - невістка
  - sentence: Син мого дядька — це мій ____ брат, ми часто граємо у футбол.
    answer: двоюрідний
    options:
    - двоюрідний
    - троюрідний
    - рідний
  - sentence: Дружина мого старшого брата — дуже вродлива жінка. Для моєї мами вона
      — ____.
    answer: невістка
    options:
    - невістка
    - теща
    - свекруха
  - sentence: Батько моєї дружини дуже багато працює. Мій ____ — працьовитий чоловік.
    answer: тесть
    options:
    - тесть
    - свекор
    - зять
  - sentence: Мати мого чоловіка завжди готує смачні пироги. Моя ____ дуже турботлива.
    answer: свекруха
    options:
    - теща
    - свекруха
    - невістка
- id: group-sort-sort-relationship-vocabulary-into-categories
  type: group-sort
  instruction: 'Розподіліть слова за категоріями: родина, дружба, формальні стосунки.'
  groups:
  - label: Родина
    items:
    - свекруха
    - дядько
    - племінниця
    - подружжя
  - label: Дружба
    items:
    - товариш
    - підтримка
    - довіра
    - примирення
  - label: Формальні стосунки
    items:
    - колега
    - повага
    - відрекомендуватися
    - керівник
workbook:
- type: fill-in
  instruction: Вставте правильне закінчення прикметника.
  items:
  - sentence: Вона має ____ волосся.
    answer: русяве
    options:
    - русявий
    - русява
    - русяве
  - sentence: У нього дуже ____ характер.
    answer: впертий
    options:
    - впертий
    - вперта
    - вперте
  - sentence: Вони — дуже ____ молоде подружжя.
    answer: щасливе
    options:
    - щасливий
    - щаслива
    - щасливе
  - sentence: Вона ____ зросту.
    answer: середнього
    options:
    - середній
    - середнього
    - середньому
  - sentence: Він був хлопцем ____.
    answer: кремезним
    options:
    - кремезний
    - кремезна
    - кремезним
  - sentence: Її обличчя — дуже ____.
    answer: вродливе
    options:
    - вродливий
    - вродлива
    - вродливе
- type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні прикметника з іменником.
  items:
  - sentence: Вона дуже привітний людина.
    error: привітний
    correction: привітна
    error_type: word
    options:
    - привітна
    - привітне
    - привітні
    explanation: Людина is feminine, so привітна.
  - sentence: Мій брат — справжня широкоплечий козак.
    error: справжня
    correction: справжній
    error_type: word
    options:
    - справжній
    - справжнє
    - справжні
    explanation: Козак is masculine, so справжній.
  - sentence: У нього каштановий волосся.
    error: каштановий
    correction: каштанове
    error_type: word
    options:
    - каштанова
    - каштанове
    - каштанові
    explanation: Волосся is neuter, so каштанове.
  - sentence: Вона має дуже тендітний статуру.
    error: тендітний
    correction: тендітну
    error_type: word
    options:
    - тендітний
    - тендітна
    - тендітну
    explanation: Статура is feminine and in accusative case, so тендітну.
  - sentence: Ми познайомилися з її двоюрідна братом.
    error: двоюрідна
    correction: двоюрідним
    error_type: word
    options:
    - двоюрідний
    - двоюрідною
    - двоюрідним
    explanation: Братом is masculine instrumental, so двоюрідним.
  - sentence: Це дуже відповідальний робота.
    error: відповідальний
    correction: відповідальна
    error_type: word
    options:
    - відповідальна
    - відповідальне
    - відповідальні
    explanation: Робота is feminine, so відповідальна.
