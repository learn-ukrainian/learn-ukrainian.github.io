version: '1.0'
module: people-and-relationships
level: b1
inline:
- id: match-up-match-portrait-lexis-to-body-categories
  type: match-up
  instruction: З'єднайте слова з відповідними категоріями опису зовнішності
  pairs:
  - left: високий
    right: зріст
  - left: низький
    right: зріст
  - left: кремезний
    right: статура
  - left: тендітний
    right: статура
  - left: кучеряве
    right: волосся
  - left: русяве
    right: волосся
  - left: смагляве
    right: обличчя
  - left: вродливе
    right: обличчя
- id: quiz-character-valence-identify-character-traits-as-and-choose-the-correct-adjective-for-a-description
  type: quiz
  instruction: Оберіть правильний прикметник для кожної ситуації
  items:
  - question: Яка з цих рис характеру традиційно вважається дуже позитивною?
    options:
    - щирий
    - впертий
    - заздрісний
    - замкнутий
    correct: 0
  - question: Яка з цих рис описує людину, що швидко і легко вирішує несподівані проблеми?
    options:
    - кмітливий
    - лагідний
    - чуйний
    - вередливий
    correct: 0
  - question: Як назвати людину, яка уникає будь-якої праці?
    options:
    - лінивий
    - наполегливий
    - привітний
    - стриманий
    correct: 0
  - question: Яка риса є об'єктивно нейтральною, але може ускладнювати спілкування
      в колективі?
    options:
    - замкнутий
    - чуйний
    - чесний
    - ніжний
    correct: 0
  - question: Яке слово найкраще описує того, хто завжди емоційно реагує на чужий
      біль?
    options:
    - чуйний
    - впертий
    - м'який
    - самовпевнений
    correct: 0
  - question: Як можна описати дитину або дорослого, який постійно чимось незадоволений
      і вимагає надмірної уваги?
    options:
    - вередливий
    - лагідний
    - щирий
    - кмітливий
    correct: 0
- id: fill-in-complete-a-portrait-description-by-filling-in-missing-adjectives-and-relationship-terms-in-a-text-about-a-family
  type: fill-in
  instruction: Вставте правильне слово в текст про родину
  items:
  - sentence: Мій ______ — це батько моєї дружини, він дуже мудрий чоловік.
    answer: тесть
    options:
    - тесть
    - зять
    - свекор
  - sentence: У моєї дружини є сестра, вона моя ровесниця, і ми всі маємо чудові ______.
    answer: стосунки
    options:
    - стосунки
    - відносини
    - ставлення
  - sentence: Моя дружина має ______ статуру і дуже лагідний характер.
    answer: тендітну
    options:
    - тендітну
    - кремезну
    - приземкувату
  - sentence: Ми молоде ______, живемо разом у центрі міста.
    answer: подружжя
    options:
    - подружжя
    - родина
    - знайомство
  - sentence: Вона завжди ______ у своїх намірах і каже те, що думає.
    answer: щира
    options:
    - щира
    - замкнута
    - вередлива
  - sentence: Іноді вона буває трохи ______, коли хоче, щоб усе було ідеально, але
      ми швидко знаходимо компроміс.
    answer: вередлива
    options:
    - вередлива
    - кмітлива
    - русява
- id: group-sort-sort-relationship-vocabulary-into-categories
  type: group-sort
  instruction: Розподіліть слова за категоріями
  groups:
  - label: Родина
    items:
    - свекруха
    - невістка
    - зять
    - племінниця
  - label: Дружба
    items:
    - довіра
    - примирення
    - підтримка
    - товариш
  - label: Формальні стосунки
    items:
    - колега
    - керівник
    - відрекомендуватися
    - відносини
workbook:
- type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в узгодженні прикметника
  items:
  - sentence: У неї красивий постава.
    error: красивий
    correction: красива
    error_type: word
    explanation: Слово 'постава' жіночого роду (вона).
  - sentence: Це дуже вродливе дівчина.
    error: вродливе
    correction: вродлива
    error_type: word
    explanation: Слово 'дівчина' жіночого роду.
  - sentence: Він має кремезний статуру.
    error: кремезний
    correction: кремезну
    error_type: word
    explanation: У знахідному відмінку жіночого роду закінчення -у.
  - sentence: У нього темна волосся.
    error: темна
    correction: темне
    error_type: word
    explanation: Слово 'волосся' середнього роду (воно).
  - sentence: Вона людина чуйний.
    error: чуйний
    correction: чуйна
    error_type: word
    explanation: Слово 'людина' жіночого роду.
  - sentence: Вони дуже привітна подружжя.
    error: привітна
    correction: привітне
    error_type: word
    explanation: Слово 'подружжя' середнього роду.
- type: fill-in
  instruction: Вставте правильну форму займенника
  items:
  - sentence: ______ властиво завжди допомагати іншим.
    answer: Йому
    options:
    - Він
    - Його
    - Йому
  - sentence: ______ властиво швидко приймати важливі рішення.
    answer: Їй
    options:
    - Вона
    - Її
    - Їй
  - sentence: У ______ дуже щирий і лагідний характер.
    answer: неї
    options:
    - неї
    - їй
    - її
  - sentence: Ми довіряємо ______, бо він чесний.
    answer: йому
    options:
    - його
    - йому
    - він
  - sentence: Я глибоко поважаю ______ за цю працю.
    answer: їх
    options:
    - вони
    - їм
    - їх
  - sentence: Це ______ старший брат, познайомтеся.
    answer: мій
    options:
    - мене
    - мій
    - мені
- type: translate
  instruction: Оберіть правильний переклад для різних стилів представлення (формальний
    та неформальний)
  items:
  - source: Allow me to introduce my colleague. This is Maksym.
    options:
    - text: Дозвольте представити вам мого колегу. Це Максим.
      correct: true
    - text: Познайомтеся, будь ласка. Це Максим.
      correct: false
  - source: Please meet each other, this is my old friend.
    options:
    - text: Познайомтеся, будь ласка, це мій давній товариш.
      correct: true
    - text: Дозвольте відрекомендуватися, це мій давній товариш.
      correct: false
  - source: Very pleased to meet you.
    options:
    - text: Дуже приємно з вами познайомитися.
      correct: true
    - text: Це мій друг.
      correct: false
  - source: Thank you for your time.
    options:
    - text: Дякую, що приділили час.
      correct: true
    - text: Дозвольте представити.
      correct: false
  - source: Allow me to introduce myself, my name is Andriy.
    options:
    - text: Дозвольте відрекомендуватися, мене звати Андрій.
      correct: true
    - text: Це Андрій.
      correct: false
  - source: This is Andriy.
    options:
    - text: Це Андрій.
      correct: true
    - text: Дозвольте представити вам Андрія.
      correct: false
