version: '1.0'
module: people-and-relationships
level: b1
inline:
- id: match-up-match-portrait-lexis-to-body-categories
  type: match-up
  instruction: З'єднайте портретну лексику з відповідними категоріями
  pairs:
  - left: високий, низький
    right: зріст
  - left: кремезна, тендітна
    right: статура
  - left: кучеряве, русяве
    right: волосся
  - left: вродливе, бліде
    right: обличчя
  - left: щирий, лагідний
    right: характер
  - left: рівна, струнка
    right: постава
- id: quiz-character-valence-identify-character-traits-as-and-choose-the-correct-adjective-for-a-description
  type: quiz
  instruction: Оберіть правильний прикметник для опису риси характеру
  items:
  - question: Людина, яка завжди відкрита, правдива і не має жодних прихованих мотивів.
    options:
    - щира
    - кмітлива
    - вередлива
    - чуйна
    correct: 0
  - question: Людина, яка емоційно реагує на чужий біль і першою готова допомогти.
    options:
    - кмітлива
    - чуйна
    - лагідна
    - товариська
    correct: 1
  - question: Людина, яка швидко знаходить вихід із складної ситуації та вирішує проблеми.
    options:
    - стримана
    - чуйна
    - кмітлива
    - щира
    correct: 2
  - question: Людина, яка постійно чимось незадоволена, швидко змінює бажання і вимагає
      уваги.
    options:
    - вперта
    - вередлива
    - самовпевнена
    - замкнута
    correct: 1
  - question: Людина, яка категорично відмовляється слухати аргументи чи йти на компроміс.
    options:
    - лінива
    - замкнута
    - вередлива
    - вперта
    correct: 3
  - question: Людина, яка поводиться дуже спокійно, говорить тихо і не проявляє агресії.
    options:
    - лагідна
    - щира
    - кмітлива
    - товариська
    correct: 0
- id: fill-in-complete-a-portrait-description-by-filling-in-missing-adjectives-and-relationship-terms-in-a-text-about-a-family
  type: fill-in
  instruction: Вставте пропущені слова для завершення опису родини
  items:
  - sentence: Чоловік моєї рідної сестри — це мій ____.
    answer: зять
    options:
    - зять
    - тесть
    - свекор
    - сват
  - sentence: Моя старша сестра має красиве і темне ____ волосся.
    answer: каштанове
    options:
    - русяве
    - каштанове
    - кучеряве
    - смагляве
  - sentence: Це молоде ____ живе в історичному центрі міста у новій квартирі.
    answer: подружжя
    options:
    - подружжя
    - сімейство
    - покоління
    - знайомство
  - sentence: Мій брат багато займається спортом, тому має дуже міцну і ____ фігуру.
    answer: кремезну
    options:
    - кремезну
    - тендітну
    - струнку
    - вродливу
  - sentence: Мати мого чоловіка — це моя ____. Ми маємо з нею чудові стосунки.
    answer: свекруха
    options:
    - теща
    - невістка
    - свекруха
    - тітка
  - sentence: Її новий хлопець має дуже приємний і ____ погляд, що викликає довіру.
    answer: привітний
    options:
    - смаглявий
    - кремезний
    - привітний
    - вередливий
- id: group-sort-sort-relationship-vocabulary-into-categories
  type: group-sort
  instruction: Розподіліть лексику стосунків за правильними категоріями
  groups:
  - label: Родина
    items:
    - подружжя
    - свекруха
    - двоюрідний брат
    - невістка
    - дядько
  - label: Дружба
    items:
    - товариський
    - підтримка
    - довіра
    - примирення
    - щирий
  - label: Формальні стосунки
    items:
    - колега
    - відрекомендуватися
    - керівник
    - відносини
    - представити
- id: role-play-introductions
  type: essay-response
  prompt: 'Уявіть ситуацію: вам потрібно представити свого нового друга вашому старшому
    колезі по роботі. Напишіть дві репліки: спочатку представте його формально, а
    потім уявіть, що ви знайомите його з іншим другом у неформальному стилі.'
  model_answer: 'Формально: ''Дозвольте представити вам мого друга Андрія. Андрію,
    це мій керівник, Петро Іванович.'' Неформально: ''Привіт! Познайомтеся, це мій
    товариш Андрій. Андрію, це мій друг Максим.'''
- id: free-write-portrait
  type: essay-response
  prompt: Опишіть зовнішність вашого найкращого друга або подруги. Напишіть від п'яти
    до семи розгорнутих речень, обов'язково використовуючи правильну тричастинну структуру
    шкільного твору-опису (зачин, основна частина, кінцівка). Використайте хоча б
    одну портретну деталь.
  model_answer: Це мій найкращий друг Олександр. Він високого зросту і має міцну спортивну
    статуру. У нього коротке русяве волосся та дуже відкрите, вродливе обличчя. Його
    головна портретна деталь — це завжди усміхнені, щирі сірі очі, які миттєво викликають
    довіру. За характером він дуже лагідний і чуйний. Я неймовірно ціную нашу міцну
    дружбу і маю до нього глибоку повагу.
- id: group-sort
  type: group-sort
  instruction: Згрупуйте вивчені слова за п'ятьма основними категоріями
  groups:
  - label: Зовнішність
    items:
    - зріст
    - статура
    - постава
    - кремезний
    - тендітний
  - label: Характер
    items:
    - щирий
    - лагідний
    - кмітливий
    - вередливий
    - стриманий
  - label: Родина
    items:
    - подружжя
    - родичі
    - свекор
    - теща
    - племінниця
  - label: Стосунки
    items:
    - дружба
    - кохання
    - довіра
    - примирення
    - підтримка
  - label: Знайомство
    items:
    - відрекомендуватися
    - представлення
    - кличний відмінок
    - колега
    - зустріч
workbook:
- type: match-up
  instruction: З'єднайте родинні терміни з їхніми правильними значеннями
  pairs:
  - left: Син вашого дядька або тітки
    right: двоюрідний брат
  - left: Мати вашого чоловіка
    right: свекруха
  - left: Чоловік вашої дочки
    right: зять
  - left: Батько вашої дружини
    right: тесть
  - left: Дочка вашого брата
    right: племінниця
  - left: Дружина вашого сина
    right: невістка
- type: error-correction
  instruction: Знайдіть і виправте помилку в граматичному узгодженні або лексиці
  items:
  - sentence: У нас з колегами склалися дуже теплі і хороші відносини.
    error: відносини
    correction: стосунки
    error_type: word
    options:
    - стосунки
    - ставлення
    - взаємини
    - зв'язки
    explanation: Між людьми на роботі чи в житті бувають 'стосунки', а 'відносини'
      — між країнами або в математиці.
  - sentence: Ця дівчина має дуже високий статуру.
    error: високий
    correction: високу
    error_type: word
    options:
    - високу
    - високе
    - високі
    - висока
    explanation: Іменник 'статура' жіночого роду, тому прикметник має бути у формі
      жіночого роду — 'високу'.
  - sentence: Моя рідний брат працює інженером.
    error: Моя
    correction: Мій
    error_type: word
    options:
    - Мій
    - Моє
    - Мої
    - Мене
    explanation: Слово 'брат' чоловічого роду, тому займенник повинен бути у чоловічому
      роді.
  - sentence: Дякую, що приділили час, пане професор!
    error: професор
    correction: професоре
    error_type: word
    options:
    - професоре
    - професору
    - професором
    - професора
    explanation: При звертанні до людини слід обов'язково використовувати форму кличного
      відмінка.
  - sentence: Мій дідусь — людина дуже чуйний і добрий.
    error: чуйний
    correction: чуйна
    error_type: word
    options:
    - чуйна
    - чуйне
    - чуйні
    - чуйним
    explanation: Тут прикметники узгоджуються з іменником 'людина' (жіночий рід),
      тому 'чуйна і добра'.
  - sentence: За характером вона дуже замкнутий.
    error: замкнутий
    correction: замкнута
    error_type: word
    options:
    - замкнута
    - замкнуте
    - замкнуті
    - замкнутою
    explanation: Прикметник має узгоджуватися із займенником 'вона', тобто набувати
      форми жіночого роду.
- type: true-false
  instruction: Визначте, чи є ці твердження про український етикет і значення слів
    правдивими
  items:
  - statement: Під час офіційного знайомства молодшу за віком людину представляють
      старшій.
    correct: true
    explanation: Це класичне правило українського етикету, яке показує повагу до віку
      та досвіду.
  - statement: Слово 'відносини' можна використовувати, коли ви говорите про ваше
      романтичне кохання.
    correct: false
    explanation: Для опису зв'язку між людьми використовують слово 'стосунки'. 'Відносини'
      бувають між країнами.
  - statement: У повсякденному дружньому спілкуванні для знайомства ідеально підходить
      фраза 'Дозвольте відрекомендуватися'.
    correct: false
    explanation: 'Ця фраза дуже офіційна. Для друзів краще сказати: ''Познайомтеся,
      це...'''
  - statement: Слово 'невістка' використовується для позначення дружини сина або брата.
    correct: true
    explanation: Саме так. Історично це слово означало 'невідома жінка', яка прийшла
      в родину чоловіка.
  - statement: Звертаючись до людини на ім'я, можна використовувати базову словникову
      (називний відмінок) форму її імені.
    correct: false
    explanation: В українській мові при прямому звертанні обов'язково використовується
      форма кличного відмінка (наприклад, 'Маріє!').
  - statement: Слова 'чесний' та 'щирий' є абсолютними синонімами і не мають жодної
      різниці у значенні.
    correct: false
    explanation: Чесність стосується моральних правил (не бреше), а щирість — емоційної
      відкритості та справжності.
- type: unjumble
  instruction: Складіть правильні речення зі слів, враховуючи правила представлення
  items:
  - words:
    - вам
    - мого
    - нового
    - Дозвольте
    - колегу.
    - представити
    correct_order:
    - Дозвольте
    - представити
    - вам
    - мого
    - нового
    - колегу.
  - words:
    - з
    - познайомитися.
    - вами
    - Дуже
    - приємно
    correct_order:
    - Дуже
    - приємно
    - з
    - вами
    - познайомитися.
  - words:
    - будь
    - давній
    - Познайомтеся,
    - мій
    - ласка,
    - це
    - товариш.
    correct_order:
    - Познайомтеся,
    - будь
    - ласка,
    - це
    - мій
    - давній
    - товариш.
  - words:
    - звати
    - відрекомендуватися,
    - Дозвольте
    - мене
    - Олександр.
    correct_order:
    - Дозвольте
    - відрекомендуватися,
    - мене
    - звати
    - Олександр.
  - words:
    - приділили
    - що
    - Дякую,
    - час.
    correct_order:
    - Дякую,
    - що
    - приділили
    - час.
  - words:
    - Іванівно!
    - Тетяно
    - бачити,
    - вас
    - Радий
    correct_order:
    - Радий
    - вас
    - бачити,
    - Тетяно
    - Іванівно!
- type: translate
  instruction: Оберіть правильний український переклад для наведених англійських фраз
  items:
  - source: He is of average height.
    options:
    - text: Він середнього зросту.
      correct: true
    - text: Він має звичайний зріст.
      correct: false
    - text: Він середньо-високий.
      correct: false
  - source: She is a very sincere person.
    options:
    - text: Вона дуже щира людина.
      correct: true
    - text: Вона дуже чесний людина.
      correct: false
    - text: Вона є людина щиро.
      correct: false
  - source: They have a trusting relationship.
    options:
    - text: У них довірливі стосунки.
      correct: true
    - text: Вони мають довіру відносини.
      correct: false
    - text: У них довірливі взаємини.
      correct: false
  - source: My mother-in-law (husband's mother) is very gentle.
    options:
    - text: Моя свекруха дуже лагідна.
      correct: true
    - text: Моя теща дуже лагідна.
      correct: false
    - text: Моя свекруха є дуже м'якою.
      correct: false
  - source: Allow me to introduce myself.
    options:
    - text: Дозвольте відрекомендуватися.
      correct: true
    - text: Дозвольте представити себе.
      correct: false
    - text: Давайте познайомимось.
      correct: false
  - source: He has a sturdy, broad-shouldered build.
    options:
    - text: Він має кремезну, широкоплечу статуру.
      correct: true
    - text: Він міцний і має широку статуру.
      correct: false
    - text: Він є кремезним та широкоплечим фігурою.
      correct: false
