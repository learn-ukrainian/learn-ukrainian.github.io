version: '1.0'
module: people-and-relationships
level: b1
workbook:
- type: match-up
  instruction: З'єднайте портретну лексику з відповідними категоріями.
  pairs:
  - left: кремезний
    right: статура
  - left: високий
    right: зріст
  - left: тендітна
    right: статура
  - left: приземкуватий
    right: зріст
  - left: карі
    right: очі
  - left: смагляве
    right: обличчя
  - left: кучеряве
    right: волосся
  - left: русяве
    right: волосся
  - left: щирий
    right: характер
  - left: лагідний
    right: характер
  - left: кмітливий
    right: характер
  - left: вередливий
    right: характер
- type: quiz
  instruction: Оберіть прикметник, який найкраще описує характер людини в кожній ситуації.
  items:
  - question: Цей чоловік ніколи не приховує своїх справжніх намірів, завжди говорить
      від серця.
    options:
    - щирий
    - вередливий
    - замкнутий
    - впертий
    correct: 0
  - question: Вона від природи має м'яку вдачу, ніколи не підвищує голос на інших.
    options:
    - лагідна
    - самовпевнена
    - кмітлива
    - вередлива
    correct: 0
  - question: Мій друг дуже уважний до чужих проблем, завжди готовий прийти на допомогу.
    options:
    - чуйний
    - впертий
    - замкнутий
    - вередливий
    correct: 0
  - question: Студент швидко знаходить правильне рішення для найскладнішої проблеми.
    options:
    - кмітливий
    - щирий
    - самовпевнений
    - лагідний
    correct: 0
  - question: На вечірках вона завжди в центрі уваги, легко заводить нових друзів.
    options:
    - товариська
    - замкнута
    - вередлива
    - чуйна
    correct: 0
  - question: Ця людина завжди контролює свої емоції і ніколи не показує зайвого.
    options:
    - стримана
    - товариська
    - чуйна
    - вередлива
    correct: 0
  - question: Дитина постійно змінює свій настрій, їй дуже важко догодити.
    options:
    - вередлива
    - лагідна
    - щира
    - чуйна
    correct: 0
  - question: Він категорично відмовляється слухати аргументи інших і наполягає на
      своєму.
    options:
    - впертий
    - кмітливий
    - товариський
    - щирий
    correct: 0
  - question: Новий колега безпідставно вважає себе набагато кращим за всіх інших.
    options:
    - самовпевнений
    - кмітливий
    - щирий
    - впевнений у собі
    correct: 0
  - question: Спортсмен має здорову віру у власні сили без зайвої гордині.
    options:
    - впевнений у собі
    - самовпевнений
    - впертий
    - вередливий
    correct: 0
  - question: Вона завжди приязно вітається з усіма сусідами і щиро усміхається.
    options:
    - привітна
    - замкнута
    - вперта
    - самовпевнена
    correct: 0
  - question: Він працює з ранку до ночі, ніколи не знаючи відпочинку і спокою.
    options:
    - працьовитий
    - лінивий
    - лагідний
    - замкнутий
    correct: 0
- type: fill-in
  instruction: Доповніть розповідь про родину правильними словами.
  items:
  - sentence: Минулої неділі наша велика ____ зібралася разом за одним столом.
    answer: родина
    options:
    - родина
    - знайомство
    - постава
    - суперечка
  - sentence: Мій старший брат і його молода ____ приїхали найпершими.
    answer: дружина
    options:
    - дружина
    - свекруха
    - теща
    - знайомство
  - sentence: У них є маленька донька, тому тепер я маю чудову ____.
    answer: племінницю
    options:
    - племінницю
    - невістку
    - тітку
    - свекруху
  - sentence: Вона дуже мила і ____ дівчинка, яка любить танцювати.
    answer: тендітна
    options:
    - тендітна
    - кремезна
    - приземкувата
    - смаглява
  - sentence: Також приїхав мій ____, батько моєї мами.
    answer: дідусь
    options:
    - дідусь
    - свекор
    - тесть
    - зять
  - sentence: Він літній, але ще дуже міцний і ____ чоловік.
    answer: кремезний
    options:
    - кремезний
    - тендітний
    - виразний
    - кучерявий
  - sentence: Моя ____, сестра батька, привезла смачний торт.
    answer: тітка
    options:
    - тітка
    - теща
    - свекруха
    - невістка
  - sentence: У нас у родині завжди панують теплі та ____ стосунки.
    answer: щирі
    options:
    - щирі
    - вередливі
    - замкнуті
    - самовпевнені
  - sentence: Ми повністю ____ одне одному і ділимося всіма секретами.
    answer: довіряємо
    options:
    - довіряємо
    - знайомимося
    - сваримося
    - миримося
  - sentence: Іноді у нас виникає інтелектуальна ____ про політику.
    answer: суперечка
    options:
    - суперечка
    - сварка
    - постава
    - статура
  - sentence: Але ми ніколи не переходимо на особисті образи і не ____.
    answer: сваримося
    options:
    - сваримося
    - довіряємо
    - відрекомендовуємося
    - товаришуємо
  - sentence: Тому після таких розмов завжди настає швидке ____.
    answer: примирення
    options:
    - примирення
    - знайомство
    - кохання
    - ставлення
- type: essay-response
  prompt: 'Напишіть структурований словесний портрет (8-10 речень) вашого знайомого,
    друга або вигаданого персонажа. Ваш текст обов''язково повинен мати три частини:
    1. Зачин (хто ця людина). 2. Основну частину (зовнішність, риси обличчя, статура,
    одяг, характер). 3. Кінцівку (ваше загальне враження та ставлення до цієї людини).
    Використовуйте епітети та портретні деталі.'
  min_words: 80
  model_answer: 'Моя найкраща подруга Олена — надзвичайно цікава особистість. Ми товаришуємо
    вже більше п''яти років. Олена — дівчина середнього зросту з дуже стрункою і тендітною
    статурою. У неї густе кучеряве волосся темного каштанового кольору, яке завжди
    трохи неслухняне. Її обличчя має приємний смаглявий відтінок, а глибокі карі очі
    завжди випромінюють тепло. Найяскравіша портретна деталь Олени — це маленька родимка
    на лівій щоці, яка робить її усмішку особливою. За характером вона надзвичайно
    щира, чуйна і завжди готова допомогти у складній ситуації. Їй властиво швидко
    знаходити спільну мову з новими людьми, адже вона дуже товариська. Я дуже ціную
    нашу міцну дружбу і повністю довіряю Олені. Поруч із нею завжди відчуваєш себе
    спокійно і комфортно.

    '
- type: essay-response
  prompt: Уявіть дві різні соціальні ситуації. 1. Ви на офіційній конференції, і вам
    потрібно представити свого друга Андрія вашому колезі, професору Іваненку (формальний
    стиль). 2. Ви на веселій студентській вечірці і представляєте того ж Андрія своїй
    подрузі Марії (неформальний стиль). Напишіть репліки для обох ситуацій.
  min_words: 50
  model_answer: 'Ситуація 1 (Формальна):

    — Пане професоре, дозвольте представити вам мого друга і колегу. Це Андрій Шевченко,
    він чудовий спеціаліст у нашій сфері.

    — Дуже приємно познайомитися, Андрію.


    Ситуація 2 (Неформальна):

    — Привіт, Маріє! Познайомся, будь ласка, це мій новий товариш Андрій.

    — Привіт, Андрію! Рада познайомитися!

    '
- type: group-sort
  instruction: Розподіліть слова, що описують соціальні та родинні зв'язки, за трьома
    категоріями.
  groups:
  - label: Родина і родичі
    items:
    - свекруха
    - тесть
    - племінник
    - невістка
    - подружжя
    - зять
  - label: Дружба і кохання
    items:
    - товаришувати
    - щирість
    - довіряти
    - кохати
    - миритися
  - label: Офіційні та робочі відносини
    items:
    - відрекомендуватися
    - відносини
    - колега
    - представити
- type: error-correction
  instruction: Знайдіть і виправте граматичну або лексичну помилку в реченні.
  items:
  - sentence: Вона дуже вродливий дівчина з довгим волоссям.
    error: вродливий
    correction: вродлива
    error_type: word
    options:
    - вродлива
    - вродливе
    - вродливі
    explanation: «Дівчина» — це іменник жіночого роду, тому прикметник має закінчення
      -а.
  - sentence: Між нашими країнами встановлені теплі стосунки.
    error: стосунки
    correction: відносини
    error_type: word
    options:
    - відносини
    - взаємини
    - знайомства
    explanation: Для офіційних та міжнародних зв'язків між державами використовується
      слово «відносини».
  - sentence: Це мій старший сестра Марія.
    error: старший
    correction: старша
    error_type: word
    options:
    - старша
    - старше
    - найстарший
    explanation: 'Оскільки «сестра» жіночого роду, прикметник має бути у формі жіночого
      роду: «старша».'
  - sentence: Пане Іван, дозвольте вас запитати.
    error: Іван
    correction: Іване
    error_type: word
    options:
    - Іване
    - Івану
    - Іванові
    explanation: 'При звертанні потрібно обов''язково використовувати кличний відмінок:
      пане Іване.'
  - sentence: Ми дуже добре відносимося один до одного.
    error: відносимося
    correction: ставимося
    error_type: word
    options:
    - ставимося
    - стосуємося
    - товаришуємо
    explanation: В українській мові ми «ставимося» до когось (attitude), а не «відносимося».
  - sentence: Мій дідусь — людина кремезна статури.
    error: кремезна
    correction: кремезної
    error_type: word
    options:
    - кремезної
    - кремезний
    - кремезну
    explanation: Людина (якої?) статури — родовий відмінок вимагає відповідного закінчення
      прикметника -ої.
- type: true-false
  instruction: Оцініть твердження про правила знайомства, спілкування та родинні зв'язки
    в Україні.
  items:
  - statement: В українському етикеті молодшу за віком людину зазвичай представляють
      старшій.
    correct: true
    explanation: Так, це класичне правило поваги до старших у суспільстві.
  - statement: Слово «відносини» можна використовувати для опису щирого кохання між
      людьми.
    correct: false
    explanation: Ні, «відносини» вживаються для офіційних або міжнародних зв'язків.
      Для кохання використовують слово «стосунки».
  - statement: Дієслово «кохати» використовується тільки для глибоких романтичних
      почуттів до іншої людини.
    correct: true
    explanation: Так, «кохати» означає виключно романтичну любов до людини (на відміну
      від загального дієслова «любити»).
  - statement: Звертаючись до людини на ім'я, необхідно використовувати форму називного
      відмінка.
    correct: false
    explanation: Ні, для звертання обов'язково використовується спеціальна форма —
      кличний відмінок (наприклад, Іване, Маріє).
  - statement: Слово «теща» означає матір дружини.
    correct: true
    explanation: Так, мати дружини — це теща, а мати чоловіка — це свекруха.
  - statement: Фразу «Дозвольте відрекомендуватися» використовують у неформальному
      спілкуванні з близькими друзями.
    correct: false
    explanation: Ні, це дуже формальна і ввічлива фраза виключно для офіційних або
      ділових зустрічей.
- type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: He is a stocky man.
    options:
    - text: Він кремезний чоловік.
      correct: true
    - text: Він тендітний чоловік.
      correct: false
    - text: Він приземкуватий чоловік.
      correct: false
    - text: Він високий чоловік.
      correct: false
  - source: She has curly hair.
    options:
    - text: У неї кучеряве волосся.
      correct: true
    - text: У неї русяве волосся.
      correct: false
    - text: У неї пряме волосся.
      correct: false
    - text: У неї лисе волосся.
      correct: false
  - source: They reconciled after the quarrel.
    options:
    - text: Вони помирилися після сварки.
      correct: true
    - text: Вони посварилися після примирення.
      correct: false
    - text: Вони познайомилися після суперечки.
      correct: false
    - text: Вони відрекомендувалися після зустрічі.
      correct: false
  - source: She is very sociable and quickly makes friends.
    options:
    - text: Вона дуже товариська і швидко заводить друзів.
      correct: true
    - text: Вона дуже замкнута і швидко заводить друзів.
      correct: false
    - text: Вона дуже вередлива і швидко заводить друзів.
      correct: false
    - text: Вона дуже самовпевнена і швидко заводить друзів.
      correct: false
  - source: Allow me to introduce myself.
    options:
    - text: Дозвольте відрекомендуватися.
      correct: true
    - text: Дозвольте познайомитися.
      correct: false
    - text: Дозвольте представити вас.
      correct: false
    - text: Дозвольте посваритися.
      correct: false
  - source: It is characteristic of him to help others.
    options:
    - text: Йому властиво допомагати іншим.
      correct: true
    - text: Його характер допомагати іншим.
      correct: false
    - text: Він за характером допомагає іншим.
      correct: false
    - text: Він є людина допомагати іншим.
      correct: false
