version: '1.0'
module: people-and-relationships
level: b1
workbook:
- id: quiz-stress
  type: quiz
  instruction: Оберіть слово з правильним наголосом.
  items:
  - question: Як правильно наголосити слово 'кучерявий'?
    options:
    - кучеря́вий
    - ку́черявий
    - кучеряви́й
    - куче́рявий
    correct: 0
  - question: Де правильний наголос у слові 'статура'?
    options:
    - стату́ра
    - ста́тура
    - статура́
    - статура́й
    correct: 0
  - question: 'Оберіть правильний варіант наголосу:'
    options:
    - смагля́вий
    - сма́глявий
    - смагляви́й
    - сма́гляви́й
    correct: 0
  - question: Як наголошується слово 'привітний'?
    options:
    - приві́тний
    - при́вітний
    - привітни́й
    - приві́тни́й
    correct: 0
  - question: Який варіант є нормативним?
    options:
    - вродли́вий
    - вро́дливий
    - вродливи́й
    - вро́дливи́й
    correct: 0
  - question: 'Оберіть слово з правильним наголосом:'
    options:
    - тенді́тний
    - те́ндітний
    - тендітни́й
    - те́ндітни́й
    correct: 0
- id: odd-one-out-stress
  type: odd-one-out
  instruction: Знайдіть слово з іншою моделлю наголосу (на який склад падає наголос).
  items:
  - words:
    - щи́рий
    - ла́гідний
    - дя́дько
    - стату́ра
    correct: 3
    explanation: У слові 'стату́ра' наголос падає на другий склад, а в інших — на
      перший.
  - words:
    - ро́дичі
    - те́ща
    - кучеря́вий
    - све́кор
    correct: 2
    explanation: У слові 'кучеря́вий' наголос падає на третій склад, а в інших — на
      перший.
  - words:
    - креме́зний
    - тенді́тний
    - смагля́вий
    - брат
    correct: 3
    explanation: Слово 'брат' має лише один склад, а інші слова мають наголос на другому
      складі.
  - words:
    - знайо́мство
    - подру́жжя
    - обли́ччя
    - ро́дичі
    correct: 3
    explanation: У слові 'ро́дичі' наголос падає на перший склад, а в інших — на другий.
  - words:
    - приві́тний
    - чу́йний
    - дові́ра
    - стосу́нки
    correct: 1
    explanation: У слові 'чу́йний' наголос падає на перший склад, а в інших — на другий.
  - words:
    - коха́ння
    - вродли́вий
    - вередли́вий
    - мири́тися
    correct: 2
    explanation: У слові 'вередли́вий' наголос падає на третій склад, а в інших —
      на другий.
- id: fill-in-adjective-endings
  type: fill-in
  instruction: Вставте правильне закінчення прикметника за родом та числом іменника.
  items:
  - sentence: Він має дуже міцн____ статуру.
    answer: у
    options:
    - у
    - ий
    - е
    - і
  - sentence: У неї виразн____ обличчя.
    answer: е
    options:
    - е
    - ий
    - а
    - і
  - sentence: Мій старший брат — дуже працьовит____ чоловік.
    answer: ий
    options:
    - ий
    - а
    - е
    - і
  - sentence: Вони мають теплий і щир____ погляд.
    answer: ий
    options:
    - ий
    - а
    - е
    - і
  - sentence: У нашого старенького дідуся дуже лагідн____ вдача.
    answer: а
    options:
    - а
    - ий
    - е
    - і
  - sentence: Її очі дуже велик____ і карі.
    answer: і
    options:
    - і
    - ий
    - а
    - е
- id: error-correction-adjectives
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні прикметника й іменника.
  items:
  - sentence: Вона має дуже красивий зовнішність.
    error: красивий
    correction: красиву
    error_type: word
    options:
    - красиву
    - красива
    - красиве
    explanation: 'Зовнішність — це іменник жіночого роду (знахідний відмінок: красиву
      зовнішність).'
  - sentence: Його статура дуже міцний.
    error: міцний
    correction: міцна
    error_type: word
    options:
    - міцна
    - міцне
    - міцні
    explanation: Статура — іменник жіночого роду, тому прикметник має бути 'міцна'.
  - sentence: У неї щирий усмішка.
    error: щирий
    correction: щира
    error_type: word
    options:
    - щира
    - щире
    - щирі
    explanation: Усмішка — іменник жіночого роду.
  - sentence: Мій брат — дуже товариська чоловік.
    error: товариська
    correction: товариський
    error_type: word
    options:
    - товариський
    - товариське
    - товариські
    explanation: Чоловік — іменник чоловічого роду.
  - sentence: Це дуже вродливе жінка.
    error: вродливе
    correction: вродлива
    error_type: word
    options:
    - вродлива
    - вродливий
    - вродливі
    explanation: Жінка — іменник жіночого роду.
  - sentence: Він має кучерявий волосся.
    error: кучерявий
    correction: кучеряве
    error_type: word
    options:
    - кучеряве
    - кучерява
    - кучеряві
    explanation: Волосся — іменник середнього роду.
- id: match-up-adjective-noun
  type: match-up
  instruction: Зіставте іменники з правильними формами прикметників.
  pairs:
  - left: статура (жіночий рід)
    right: кремезна
  - left: обличчя (середній рід)
    right: бліде
  - left: характер (чоловічий рід)
    right: впертий
  - left: очі (множина)
    right: карі
  - left: постава (жіночий рід)
    right: струнка
  - left: волосся (середній рід)
    right: кучеряве
- id: fill-in-pronouns
  type: fill-in
  instruction: Вставте правильний особовий займенник (я, ти, він, вона, воно, ми,
    ви, вони).
  items:
  - sentence: _____ дуже товариський хлопець і має багато друзів.
    answer: він
    options:
    - він
    - вона
    - ми
    - я
  - sentence: _____ надзвичайно тендітна і вродлива дівчина.
    answer: вона
    options:
    - вона
    - він
    - ми
    - ти
  - sentence: _____ завжди довіряємо нашим батькам у складних ситуаціях.
    answer: ми
    options:
    - ми
    - ви
    - вони
    - я
  - sentence: Чому _____ так часто сваритеся зі своїми друзями?
    answer: ви
    options:
    - ви
    - ми
    - вони
    - ти
  - sentence: _____ щиро люблю свою велику українську родину.
    answer: я
    options:
    - я
    - ти
    - він
    - вона
  - sentence: _____ мають густе кучеряве волосся, як і їхня мати.
    answer: вони
    options:
    - вони
    - ми
    - ви
    - я
- id: match-up-pronoun-verb
  type: match-up
  instruction: З'єднайте особовий займенник із правильною формою дієслова (теперішній
    час).
  pairs:
  - left: я
    right: товаришую
  - left: ти
    right: дружиш
  - left: він
    right: довіряє
  - left: вона
    right: знайомиться
  - left: ми
    right: миримося
  - left: ви
    right: сваритеся
  - left: вони
    right: кохають
- id: group-sort-pronouns
  type: group-sort
  instruction: Розподіліть особові займенники на однину та множину.
  groups:
  - label: Однина
    items:
    - я
    - ти
    - він
    - вона
    - воно
  - label: Множина
    items:
    - ми
    - ви
    - вони
- id: quiz-ty-chy-vy
  type: quiz
  instruction: Оберіть правильну форму звертання — неформальне (ти) чи ввічливе (Ви).
  items:
  - question: Як ви звернетеся до свого рідного брата?
