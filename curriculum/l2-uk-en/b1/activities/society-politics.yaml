  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: Виправте лексичні помилки в реченнях
  instruction: Знайдіть русизми або кальки та замініть їх на правильні українські
    слова.
  items:
  - sentence: Ми завжди приймаємо участь у голосуванні.
    error: приймаємо
    answer: беремо
    options:
    - беремо
    - робимо
    - маємо
    - несемо
    explanation: Українською правильно говорити брати участь.
  - sentence: Вони живуть у громадянському шлюбі вже п'ять років.
    error: громадянському
    answer: цивільному
    options:
    - цивільному
    - громадському
    - державному
    - вільному
    explanation: Шлюб регулюється цивільним правом, тому він цивільний.
  - sentence: Я сьогодні їхав на роботу громадянським транспортом.
    error: громадянським
    answer: громадським
    options:
    - громадським
    - цивільним
    - суспільним
    - спільним
    explanation: Транспорт для всіх людей називається громадським.
  - sentence: Цей закон є самим кращим у нашій історії.
    error: самим кращим
    answer: найкращим
    options:
    - найкращим
    - дуже кращим
    - більш кращим
    - добрим
    explanation: Форма самий кращий — це русизм. Правильно утворювати найвищий ступінь
      префіксом най-.
  - sentence: Він порушив закон і мусить получати покарання.
    error: получати
    answer: отримувати
    options:
    - отримувати
    - брати
    - мати
    - здобувати
    explanation: Слово получати — це русизм, український відповідник — отримувати.
  - sentence: Вона дуже хороша політика, яка допомагає людям.
    error: політика
    answer: політик
    options:
    - політик
    - громадянин
    - особа
    - міністр
    explanation: Коли мова йде про людину, слід використовувати слово чоловічого роду
      політик.
