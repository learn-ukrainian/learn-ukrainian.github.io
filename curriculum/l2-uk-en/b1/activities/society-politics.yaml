      correct: false
    - text: робити
      correct: false
    - text: мати
      correct: false
    explanation: Українською правильно казати брати участь.
  - question: Що є головним документом, який захищає права громадян?
    options:
    - text: конституція
      correct: true
    - text: політика
      correct: false
    - text: парламент
      correct: false
    - text: вибори
      correct: false
    explanation: Конституція — це головний закон країни.
  - question: Яка інституція очолює виконавчу гілку влади?
    options:
    - text: уряд
      correct: true
    - text: парламент
      correct: false
