- type: true-false
  title: Правда чи неправда?
  items:
  - statement: Законодавча влада в Україні належить Кабінету Міністрів.
    correct: false
    explanation: Законодавча влада належить парламенту (Верховній Раді).
  - statement: Слово політика описує сферу діяльності, а не конкретну людину.
    correct: true
    explanation: Людина, яка цим займається, називається політик.
  - statement: У демократичній країні існує чіткий поділ влади на три незалежні гілки.
    correct: true
    explanation: Це законодавча, виконавча та судова гілки влади.
  - statement: Живий ланцюг 1990 року є прикладом активного громадянського суспільства.
    correct: true
    explanation: Мільйони людей об'єдналися заради спільної ідеї без примусу держави.
  - statement: В офіційному стилі новин часто використовують віддієслівні іменники.
    correct: true
    explanation: 'Наприклад: формування, ухвалення, розвиток.'
  - statement: Громадянин демократичної держави має тільки права, але не має обов'язків.
    correct: false
    explanation: Демократія вимагає балансу між правами та обов'язками громадян.
  - statement: Конституція Пилипа Орлика була написана у двадцятому столітті.
    correct: false
    explanation: Вона була написана у 1710 році.
  - statement: Місце, куди виборці приходять голосувати, називається виборча дільниця.
    correct: true
    explanation: Саме на виборчій дільниці відбувається таємне голосування.
  instruction: Визначте, чи твердження правильне.
