- type: fill-in
  title: Вставте пропущені слова
  items:
  - sentence: Новий закон має ухвалити український ... після дискусій.
    answer: парламент
    options:
    - парламент
    - уряд
    - суд
    - політик
    explanation: Саме парламент ухвалює закони.
  - sentence: Кабінет Міністрів — це вищий орган у системі виконавчої ... України.
    answer: влади
    options:
    - влади
    - політики
    - свободи
    - держави
    explanation: Виконавча влада реалізується через уряд.
  - sentence: У неділю люди підуть на виборчу ..., щоб проголосувати.
    answer: дільницю
    options:
    - дільницю
    - владу
    - державу
    - комісію
    explanation: Місце для голосування називається виборчою дільницею.
  - sentence: Захист своєї країни — це почесний громадянський ... кожного.
    answer: обов'язок
    options:
    - обов'язок
    - закон
    - уряд
    - шлюб
    explanation: Громадянин має певні права та обов'язки.
  - sentence: Демократична ... гарантує захист прав людини.
    answer: держава
    options:
    - держава
    - дільниця
    - свобода
    - влада
    explanation: Саме держава виступає гарантом прав людини.
  - sentence: Президент України є гарантом ..., він не належить до жодної з гілок
      влади.
    answer: конституції
    options:
    - конституції
    - парламенту
    - голосування
    - уряду
    explanation: Президент забезпечує виконання конституції.
  - sentence: Ми повинні діяти виключно згідно із ... у цій ситуації.
    answer: законом
    options:
    - законом
    - правом
    - обов'язком
    - голосом
    explanation: Словосполучення згідно із законом означає діяти легально.
  - sentence: Громадяни мають ... голосу з вісімнадцяти років.
    answer: право
    options:
    - право
    - закон
    - суд
    - уряд
    explanation: Можливість обирати називається правом голосу.
  instruction: Оберіть правильне слово для заповнення пропуску.
