- type: quiz
  title: Розуміння дискурсивних маркерів
  instruction: Оберіть правильну відповідь на кожне запитання.
  items:
    - question: Яке слово ми використовуємо щоб зробити загальний висновок з усього сказаного?
      options:
        - text: підсумовуючи
          correct: true
        - text: по-перше
          correct: false
        - text: з одного боку
          correct: false
        - text: передусім
          correct: false
      explanation: Слово підсумовуючи ідеально підходить для фінального формального висновку.
    - question: Який маркер найкраще підходить для введення додаткового сильного аргументу в доповіді?
      options:
        - text: крім того
          correct: true
        - text: проте
          correct: false
        - text: отже
          correct: false
        - text: насамкінець
          correct: false
      explanation: Фраза крім того додає нову інформацію до вже сказаного.
    - question: Яке слово є правильним українським відповідником до російського розмовного слова короче?
      options:
        - text: словом
          correct: true
        - text: вкоротше
          correct: false
        - text: коротко
          correct: false
        - text: отже
          correct: false
      explanation: Слово словом є чудовим варіантом для розмовної бесіди щоб резюмувати розповідь.
    - question: Яка пара дискурсивних маркерів є обов'язковою граматичною конструкцією для вираження контрасту?
      options:
        - text: з одного боку... з іншого боку
          correct: true
        - text: по-перше... по-друге
          correct: false
        - text: проте... отже
          correct: false
        - text: або... або
          correct: false
      explanation: Це класична пара яка не терпить розлуки в українській мові.
    - question: Який маркер має просторове значення і вказує на фізичний кінець предмета?
      options:
        - text: накінець
          correct: true
        - text: нарешті
          correct: false
        - text: підсумовуючи
          correct: false
        - text: насамкінець
          correct: false
      explanation: Накінець вказує на фізичний край, наприклад, накінець стола.
    - question: До якого мовного регістру належать такі слова як отже та підсумовуючи?
      options:
        - text: формальний
          correct: true
        - text: розмовний
          correct: false
        - text: художній
          correct: false
        - text: поетичний
          correct: false
      explanation: Ці слова підкреслюють логічну структуру і є обов'язковими для офіційних текстів.
    - question: Яке правило пунктуації застосовується до більшості дискурсивних маркерів на початку речення?
      options:
        - text: після них ставиться кома
          correct: true
        - text: перед ними ставиться кома
          correct: false
        - text: вони не виділяються комами
          correct: false
        - text: після них ставиться тире
          correct: false
      explanation: Вставні слова завжди виділяються комами на письмі.
    - question: Яке з цих слів не є вставним і зазвичай не виділяється комами?
      options:
        - text: особливо
          correct: true
        - text: проте
          correct: false
        - text: отже
          correct: false
        - text: безсумнівно
          correct: false
      explanation: Слово особливо зазвичай не є вставним якщо стоїть перед словом якого стосується.

- type: fill-in
  title: Додайте правильний маркер
  instruction: Вставте пропущений маркер у речення.
  items:
    - sentence: Ми довго обговорювали цей проект і, _____, вирішили його підтримати.
      answer: нарешті
      options:
        - нарешті
        - накінець
        - по-перше
        - з одного боку
    - sentence: У нас значно зросли витрати на логістику. _____, ми змушені переглянути цінову політику.
      answer: Таким чином
      options:
        - Таким чином
        - По-перше
        - Проте
        - Натомість
    - sentence: Цей закон вплине на багатьох громадян, _____ на тих, хто працює у сфері малого бізнесу.
      answer: особливо
      options:
        - особливо
        - загалом
        - словом
        - отже
    - sentence: Ми маємо амбітні плани щодо розвитку компанії, _____ реальність диктує свої суворі умови.
      answer: проте
      options:
        - проте
        - отже
        - крім того
        - таким чином
    - sentence: _____, хочу зазначити, що цей проект має величезний потенціал для нашого міста.
      answer: По-перше
      options:
        - По-перше
        - Підсумовуючи
        - Словом
        - Загалом
    - sentence: Ця технологія дозволяє економити ресурси підприємства. _____, вона є абсолютно безпечною для довкілля.
      answer: До того ж
      options:
        - До того ж
        - Проте
        - Натомість
        - З іншого боку
    - sentence: _____ кажучи, наша стратегія виявилася доволі успішною та ефективною в цьому кварталі.
      answer: Загалом
      options:
        - Загалом
        - Особливо
        - Передусім
        - Нарешті
    - sentence: Ми успішно завершили перший етап дослідження. _____, наша команда отримала додаткове фінансування.
      answer: Крім того
      options:
        - Крім того
        - Таким чином
        - Проте
        - Отже
    - sentence: Команда виконала всі поставлені завдання вчасно. _____, ми можемо спокійно переходити до наступного етапу.
      answer: Отже
      options:
        - Отже
        - По-друге
        - З одного боку
        - Загалом
    - sentence: _____ вищесказане, хочу наголосити на необхідності консолідації наших спільних зусиль.
      answer: Підсумовуючи
      options:
        - Підсумовуючи
        - Особливо
        - Передусім
        - З іншого боку
    - sentence: Ця проблема стосується _____ молоді, яка шукає своє перше робоче місце.
      answer: передусім
      options:
        - передусім
        - підсумовуючи
        - таким чином
        - отже
    - sentence: Багато хто вважав цей підхід застарілим, _____ він показав найвищу ефективність у кризовій ситуації.
      answer: натомість
      options:
        - натомість
        - крім того
        - по-перше
        - загалом

- type: match-up
  title: Знайдіть функцію маркера
  instruction: Поєднайте дискурсивний маркер з його роллю в тексті.
  pairs:
    - left: по-перше
      right: маркер послідовності
    - left: крім того
      right: маркер додавання
    - left: проте
      right: маркер контрасту
    - left: загалом
      right: маркер уточнення
    - left: таким чином
      right: маркер результату
    - left: підсумовуючи
      right: маркер формального підсумку
    - left: словом
      right: маркер розмовного підсумку
    - left: насамкінець
      right: маркер елегантного завершення
    - left: особливо
      right: маркер виділення найважливішого елемента
    - left: натомість
      right: маркер протиставлення ідей
    - left: отже
      right: універсальний маркер логічного висновку
    - left: до того ж
      right: маркер підсилення попередньої думки

- type: true-false
  title: Правила використання маркерів
  instruction: Визначте, чи є твердження правильним.
  items:
    - statement: Вставні слова в українській мові завжди виділяються комами на письмі.
      correct: true
      explanation: Це головне правило граматики для дискурсивних маркерів.
    - statement: Слово накінець є синонімом до слова нарешті і використовується для логічного підсумку.
      correct: false
      explanation: Слово накінець має просторове значення, а нарешті - часове або підсумкове.
    - statement: Конструкцію з одного боку можна використовувати без другої частини з іншого боку.
      correct: false
      explanation: Це граматична пара, пропуск другої частини руйнує логіку висловлювання.
    - statement: Слово особливо завжди виділяється комами, навіть якщо стоїть перед словом якого стосується.
      correct: false
      explanation: Слово особливо не є вставним і не виділяється комами в такій позиції.
    - statement: Слова отже та таким чином належать до формального та академічного регістру.
      correct: true
      explanation: Вони ідеально підходять для есе, ділових листів та презентацій.
    - statement: Українське слово словом є чудовим замінником російської кальки короче.
      correct: true
      explanation: Воно звучить стильно, природно і повністю відповідає духу української мови.
    - statement: Слова во-пєрвих та во-вторих є прийнятними в розмовному українському мовленні.
      correct: false
      explanation: Це грубі російські кальки, правильно казати по-перше та по-друге.
    - statement: Маркери додавання допомагають нашаровувати інформацію та нові факти.
      correct: true
      explanation: Вони діють як цемент, що скріплює різні блоки інформації.
    - statement: Слово проте є більш неформальним синонімом до слова але.
      correct: false
      explanation: Навпаки, проте є формальним і сильним синонімом, який надає реченню академічної ваги.
    - statement: Маркер передусім використовується для виділення найголовнішого пріоритету.
      correct: true
      explanation: Він ідеально підходить для початку переліку важливих пунктів.
    - statement: Використання дискурсивних маркерів зменшує когнітивне навантаження на слухача.
      correct: true
      explanation: Слухачеві не потрібно самостійно будувати зв'язки між реченнями.
    - statement: Слово насамкінець використовується для введення контраргументу.
      correct: false
      explanation: Це маркер підсумку та елегантного літературного завершення виступу.

- type: unjumble
  title: Складіть речення з маркерами
  instruction: Відновіть правильний порядок слів у реченні.
  items:
    - words:
        - По-перше,
        - маємо
        - ми
        - проблему
        - цю
        - обговорити
      answer: По-перше, ми маємо обговорити цю проблему.
    - words:
        - змінити
        - терміново
        - ми
        - компанії
        - Отже,
        - розвитку
        - стратегію
        - свою
        - повинні
      answer: Отже, ми повинні терміново змінити свою стратегію розвитку компанії.
    - words:
        - того,
        - він
        - Крім
        - нову
        - запропонував
        - абсолютно
        - відділу
        - для
        - нашого
        - ідею
      answer: Крім того, він запропонував абсолютно нову ідею для нашого відділу.
    - words:
        - результати,
        - Підсумовуючи
        - назвати
        - успішним
        - експеримент
        - можемо
        - ми
      answer: Підсумовуючи результати, ми можемо назвати експеримент успішним.
    - words:
        - рішення,
        - Проте,
        - складним
        - це
        - дуже
        - фірми
        - для
        - керівництва
        - нашої
        - було
      answer: Проте, це рішення було дуже складним для керівництва нашої фірми.
    - words:
        - стосується
        - передусім
        - Це
        - правило
        - зовсім
        - суворе
        - нове
        - нових
        - працівників
      answer: Це нове суворе правило стосується передусім зовсім нових працівників.
    - words:
        - чудово
        - Словом,
        - день
        - просто
        - пройшов
        - незважаючи
        - на
        - проблеми,
        - всі
        - наш
      answer: Словом, незважаючи на всі проблеми, наш день пройшов просто чудово.
    - words:
        - чином,
        - Таким
        - свою
        - довели
        - після
        - досліджень
        - довгих
        - сміливу
        - остаточно
        - гіпотезу
        - вчені
      answer: Таким чином, після довгих досліджень вчені остаточно довели свою сміливу гіпотезу.

- type: error-correction
  title: Виправте пунктуаційні та лексичні помилки
  instruction: Знайдіть помилку в реченні та оберіть правильний варіант.
  items:
    - sentence: Во-пєрвих, я хочу подякувати всім присутнім за увагу.
      error: Во-пєрвих
      answer: По-перше
      error_type: word
      options:
        - По-перше
        - По-друге
        - Нарешті
        - Отже
      explanation: Во-пєрвих — це російська калька, правильно українською — по-перше.
    - sentence: Він довго говорив і накінець завершив свою доповідь.
      error: накінець
      answer: нарешті
      error_type: word
      options:
        - нарешті
        - насамкінець
        - загалом
        - проте
      explanation: Накінець має просторове значення, для часу і підсумку використовується нарешті.
    - sentence: З одного боку, ми отримали прибуток. Короче, рік був успішним.
      error: Короче
      answer: Словом
      error_type: word
      options:
        - Словом
        - Загалом
        - Отже
        - Проте
      explanation: Короче — це розмовний суржик, краще використовувати словом або загалом.
    - sentence: Ми маємо багато роботи, але слідуючий тиждень буде легшим.
      error: слідуючий
      answer: наступний
      error_type: word
      options:
        - наступний
        - майбутній
        - другий
        - новий
      explanation: Слідуючий — типова калька, правильно казати наступний.
    - sentence: Цей проект самий кращий з усіх, які ми коли-небудь робили.
      error: самий кращий
      answer: найкращий
      error_type: phrase
      options:
        - найкращий
        - кращий
        - самий гарний
        - дуже добрий
      explanation: Форма самий кращий є калькою, в українській мові ступені порівняння утворюються префіксом най-.
    - sentence: Таким чином ми завершили перший етап нашого великого дослідження.
      error: Таким чином
      answer: 'Таким чином,'
      error_type: phrase
      options:
        - 'Таким чином,'
        - 'Таким чином -'
        - 'Таким чином:'
        - 'Таким чином!'
      explanation: Вставні конструкції на початку речення обов'язково виділяються комою.
    - sentence: Отже ми можемо переходити до обговорення наступного питання.
      error: Отже
      answer: 'Отже,'
      error_type: word
      options:
        - 'Отже,'
        - 'Отже -'
        - 'Отже:'
        - 'Отже!'
      explanation: Вставне слово отже на початку речення завжди вимагає коми після себе.
    - sentence: Ця тема відноситься до сфери міжнародного приватного права.
      error: відноситься
      answer: стосується
      error_type: word
      options:
        - стосується
        - належить
        - підходить
        - входить
      explanation: Відноситися у значенні мати відношення — це калька, правильно казати стосується.

- type: select
  title: Оберіть маркери за функцією
  instruction: Виберіть усі правильні варіанти.
  items:
    - question: Які з цих слів використовуються для підбиття формального підсумку?
      options:
        - text: підсумовуючи
          correct: true
        - text: таким чином
          correct: true
        - text: по-перше
          correct: false
        - text: словом
          correct: false
        - text: отже
          correct: true
      min_correct: 3
      explanation: Ці слова ідеально підходять для завершення ділової або академічної доповіді.
    - question: Які маркери виражають контраст або протиставлення думок?
      options:
        - text: проте
          correct: true
        - text: натомість
          correct: true
        - text: загалом
          correct: false
        - text: з іншого боку
          correct: true
        - text: до того ж
          correct: false
      min_correct: 3
      explanation: Ці маркери допомагають показати різні погляди на одну проблему.
    - question: Які з цих слів є правильними українськими відповідниками для вираження послідовності?
      options:
        - text: по-перше
          correct: true
        - text: по-друге
          correct: true
        - text: во-пєрвих
          correct: false
        - text: передусім
          correct: true
        - text: во-вторих
          correct: false
      min_correct: 3
      explanation: Українська мова використовує власні форми для нумерації аргументів.
    - question: Які маркери належать до розмовного регістру або напівформального спілкування?
      options:
        - text: словом
          correct: true
        - text: загалом
          correct: true
        - text: таким чином
          correct: false
        - text: ну знаєш
          correct: true
        - text: підсумовуючи
          correct: false
      min_correct: 3
      explanation: Ці слова роблять розмову більш невимушеною та емоційною.
    - question: Які слова додають нову інформацію до попередньої думки?
      options:
        - text: крім того
          correct: true
        - text: до того ж
          correct: true
        - text: також
          correct: true
        - text: однак
          correct: false
        - text: проте
          correct: false
      min_correct: 3
      explanation: Маркери додавання працюють як цемент для блоків інформації.
    - question: Які з наведених слів не є вставними і зазвичай не виділяються комами на початку уточнення?
      options:
        - text: особливо
          correct: true
        - text: навіть
          correct: true
        - text: приблизно
          correct: true
        - text: отже
          correct: false
        - text: по-перше
          correct: false
      min_correct: 3
      explanation: Ці слова підсилюють значення наступного слова, але не є самостійними вставними конструкціями у звичайній позиції.
