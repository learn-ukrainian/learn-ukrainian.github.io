  title: Оберіть правильний переклад речень з дієприслівниками доконаного виду.
- type: true-false
  instruction: Визначте, чи є ці твердження правильними щодо дієприслівників доконаного
    виду.
  items:
  - statement: Дієприслівник доконаного виду завжди відповідає на питання «що роблячи?».
    correct: false
    explanation: Він відповідає на питання «що зробивши?». На питання «що роблячи?»
      відповідає недоконаний вид.
  - statement: Доконаний вид виражає різночасність, тобто дію, яка повністю завершилася
      до початку основної.
    correct: true
    explanation: Саме це є головним значенням дієприслівників доконаного виду.
  - statement: Якщо основа дієслова закінчується на приголосний звук, ми додаємо суфікс
      -ши.
    correct: true
    explanation: 'Наприклад: принести (основа приніс) — принісши.'
  - statement: Дієприслівник у реченні може стосуватися іншого суб'єкта, ніж головне
      дієслово-присудок.
    correct: false
    explanation: Додаткову дію (дієприслівник) і основну дію (присудок) завжди має
      виконувати ОДНА Й ТА САМА особа.
  - statement: Форма «прочитавши» означає, що процес читання вже дав свій фінальний
      результат.
    correct: true
    explanation: Це завершена дія, що має логічний кінець.
  - statement: 'В українській мові можна вільно використовувати активні дієприкметники,
      наприклад: «прочитавший студент».'
    correct: false
    explanation: 'Такі форми є русизмами (кальками). Правильно казати: «студент, який
      прочитав».'
  title: Визначте, чи є ці твердження правильними щодо дієприслівників доконаного
    виду.
