version: '1.0'
module: gerunds-perfective
level: b1
inline:
- id: reading-reading-temporal-logic
  type: quiz
  instruction: Прочитайте діалог детектива в тексті вище та дайте відповіді на запитання.
  items:
  - question: Яка дія відбулася найпершою у кімнаті?
    options:
    - Детектив увійшов у кімнату.
    - Детектив побачив сліди.
    - Детектив зателефонував колегам.
    - Детектив оглянув місце події.
    correct: 0
  - question: Що означає форма «увійшовши» у звіті детектива?
    options:
    - Дія вже повністю завершилася до іншої (попередність).
    - Дія відбувається одночасно з іншою.
    - Детектив ще перебуває в процесі входження.
    - Ця дія відбудеться в найближчому майбутньому.
    correct: 0
  - question: Коли детектив зателефонував своїм колегам?
    options:
    - Тільки після того, як повністю оглянув місце події.
    - Одночасно з оглядом темної кімнати.
    - До того, як побачив підозрілі сліди.
    - Під час того, як повільно входив у кімнату.
    correct: 0
  - question: Хто саме оглянув місце події і хто потім зателефонував колегам?
    options:
    - Це зробила одна й та сама особа (детектив).
    - Це зробили дві зовсім різні особи.
    - Місце оглянув свідок, а зателефонував детектив.
    - Колеги оглянули місце після телефонного дзвінка.
    correct: 0
  - question: Яке слово з тексту діалогу є дієприслівником доконаного виду?
    options:
    - Дізнавшись
    - Сліди
    - Зателефонували
    - Почали
    correct: 0
  - question: Який точний часовий зв'язок між діями «дізнавшись правду» та «почали
      діяти»?
    options:
    - Різночасність (строго одна після одної).
    - Одночасність (відбуваються повністю разом).
    - Паралельність (дві незалежні лінії).
    - Незавершеність (процес ще триває).
    correct: 0
- id: fill-in-fill-in-temporal-sequence
  type: fill-in
  instruction: Вставте правильний дієприслівник доконаного виду, щоб показати різночасність
    дій.
  items:
  - sentence: ____ цікаву книгу, я із задоволенням віддав її другові.
    answer: Прочитавши
    options:
    - Прочитавши
    - Читаючи
    - Прочитав
  - sentence: ____ важливу новину, мати одразу зателефонувала рідним.
    answer: Дізнавшись
    options:
    - Дізнавшись
    - Дізнаючись
    - Дізналися
  - sentence: ____ додому пізно ввечері, я одразу ліг спати.
    answer: Повернувшись
    options:
    - Повернувшись
    - Повертаючись
    - Повернув
  - sentence: ____ двері навстіж, я несподівано побачив свого кота.
    answer: Відчинивши
    options:
    - Відчинивши
    - Відчиняючи
    - Відчинив
  - sentence: ____ складний звіт, детектив нарешті пішов відпочивати.
    answer: Написавши
    options:
    - Написавши
    - Пишучи
    - Написав
  - sentence: ____ головного підозрюваного, поліція швидко знайшла докази.
    answer: Заарештувавши
    options:
    - Заарештувавши
    - Арештовуючи
    - Заарештували
- id: quiz-quiz-perfective-basics
  type: quiz
  instruction: Оберіть правильний варіант, зважаючи на концепцію одночасності чи різночасності
    дій.
  items:
  - question: Яке з цих речень чітко показує одночасність (дві дії відбуваються паралельно)?
    options:
    - Читаючи книгу, я спокійно пив гарячу каву.
    - Прочитавши книгу, я одразу віддав її своєму другу.
    - Зробивши всю роботу, я з радістю пішов гуляти.
    - Умившись прохолодною водою, я витерся рушником.
    correct: 0
  - question: Яке запитання ми завжди ставимо до дієприслівника доконаного виду?
    options:
    - Що зробивши?
    - Що роблячи?
    - Що робивши?
    - Що зробить?
    correct: 0
  - question: Яке з речень містить правильний дієприслівник доконаного виду?
    options:
    - Побачивши старого друга, я привітно усміхнувся.
    - Бачачи старого друга, я привітно усміхався.
    - Я побачив свого старого друга на вулиці.
    - Він бачить свого друга кожного дня.
    correct: 0
  - question: Як у граматиці називається ситуація, коли одна дія повністю завершилася
      до початку основної дії?
    options:
    - Попередність (різночасність)
    - Одночасність
    - Паралельність
    - Тривалість
    correct: 0
  - question: 'Оберіть логічно правильне українське речення:'
    options:
    - Умившись прохолодною водою, я швидко витерся рушником.
    - Умиваючись прохолодною водою, я швидко витерся рушником.
    - Я витерся сухим рушником, умиваючись водою.
    - Умившись воду, я витираюся своїм рушником.
    correct: 0
  - question: Чому речення «Відчиняючи двері, я побачив кота» має зовсім інший зміст,
      ніж речення з формою «Відчинивши»?
    options:
    - Бо «відчиняючи» означає, що процес руху дверей ще триває.
    - Бо «відчиняючи» — це дія, яка вже повністю зупинилася.
    - Бо це просто різні за своїм лексичним значенням слова.
    - Бо «відчиняючи» означає дію в далекому майбутньому.
    correct: 0
- id: match-up-suffixes
  type: match-up
  instruction: З'єднайте початкову форму (інфінітив) із правильним дієприслівником
    доконаного виду.
  pairs:
  - left: прочитати
    right: прочитавши
  - left: написати
    right: написавши
  - left: зробити
    right: зробивши
  - left: побачити
    right: побачивши
  - left: принести
    right: принісши
  - left: умитися
    right: умившись
workbook:
- type: group-sort
  instruction: 'Розподіліть дієприслівники за видом: недоконаний (одночасність) чи
    доконаний (різночасність).'
  groups:
  - label: Недоконаний вид (одночасність / що роблячи?)
    items:
    - читаючи
    - пишучи
    - роблячи
    - бачачи
    - миючись
    - повертаючись
  - label: Доконаний вид (попередність / що зробивши?)
    items:
    - прочитавши
    - написавши
    - зробивши
    - побачивши
    - умившись
    - повернувшись
- type: translate
  instruction: Оберіть правильний український переклад для англійських речень із дієприслівниками.
  items:
  - source: Having read the book, I gave it to my friend.
    options:
    - text: Прочитавши книгу, я віддав її другу.
      correct: true
    - text: Читаючи книгу, я віддав її другу.
      correct: false
    - text: Прочитавший книгу, я віддав її другу.
      correct: false
    - text: Читавши книгу, я віддав її другу.
      correct: false
  - source: Having found out the truth, we started to act.
    options:
    - text: Дізнавшись правду, ми почали діяти.
      correct: true
    - text: Дізнаючись правду, ми почали діяти.
      correct: false
    - text: Дізнав правду, ми почали діяти.
      correct: false
    - text: Дізналися правду, ми почали діяти.
      correct: false
  - source: Having woken up early, Andrew had a tasty breakfast.
    options:
    - text: Прокинувшись рано-вранці, Андрій смачно снідав.
      correct: true
    - text: Прокидаючись рано-вранці, Андрій смачно снідав.
      correct: false
    - text: Прокинувши рано-вранці, Андрій смачно снідав.
      correct: false
    - text: Прокинувся рано-вранці, Андрій смачно снідав.
      correct: false
  - source: Having returned home, I called my brother.
    options:
    - text: Повернувшись додому, я зателефонував братові.
      correct: true
    - text: Повертаючись додому, я зателефонував братові.
      correct: false
    - text: Повернувся додому, я зателефонував братові.
      correct: false
    - text: Повернувши додому, я зателефонував братові.
      correct: false
  - source: Having washed his face with cold water, he wiped himself with a towel.
    options:
    - text: Умившись холодною водою, він витерся рушником.
      correct: true
    - text: Умиваючись холодною водою, він витерся рушником.
      correct: false
    - text: Миючись холодною водою, він витерся рушником.
      correct: false
    - text: Умивши холодною водою, він витерся рушником.
      correct: false
  - source: Having gathered together, we went to the park.
    options:
    - text: Зібравшись разом, ми пішли в парк.
      correct: true
    - text: Збираючись разом, ми пішли в парк.
      correct: false
    - text: Зібравши разом, ми пішли в парк.
      correct: false
    - text: Зібралися разом, ми пішли в парк.
      correct: false
- type: fill-in
  instruction: Перетворіть складнопідрядні речення (розмовний стиль) на речення з
    дієприслівником доконаного виду (книжний стиль).
  items:
  - sentence: Після того як я написав звіт, я пішов додому. -> ____ звіт, я пішов
      додому.
    answer: Написавши
    options:
    - Написавши
    - Написав
    - Пишучи
  - sentence: Коли ми дізналися новину, ми дуже зраділи. -> ____ новину, ми дуже зраділи.
    answer: Дізнавшись
    options:
    - Дізнавшись
    - Дізналися
    - Дізнаючись
  - sentence: Після того як він зробив завдання, він ліг спати. -> ____ завдання,
      він ліг спати.
    answer: Зробивши
    options:
    - Зробивши
    - Зробив
    - Роблячи
  - sentence: Коли я побачив свого друга, я підійшов до нього. -> ____ свого друга,
      я підійшов до нього.
    answer: Побачивши
    options:
    - Побачивши
    - Бачачи
    - Побачив
  - sentence: Після того як вона прочитала статтю, вона зробила нотатки. -> ____ статтю,
      вона зробила нотатки.
    answer: Прочитавши
    options:
    - Прочитавши
    - Читаючи
    - Прочитала
  - sentence: Коли він приніс важливі документи, він поклав їх на стіл. -> ____ важливі
      документи, він поклав їх на стіл.
    answer: Принісши
    options:
    - Принісши
    - Приніс
    - Приносячи
- type: match-up
  instruction: З'єднайте дієприслівник недоконаного виду (процес) з відповідним дієприслівником
    доконаного виду (результат).
  pairs:
  - left: читаючи
    right: прочитавши
  - left: пишучи
    right: написавши
  - left: миючись
    right: умившись
  - left: повертаючись
    right: повернувшись
  - left: збираючись
    right: зібравшись
  - left: дізнаючись
    right: дізнавшись
