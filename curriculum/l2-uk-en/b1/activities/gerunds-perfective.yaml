- id: reading-reading-temporal-logic
  type: reading
  passage: Прокинувшись о сьомій годині, я відразу пішов на кухню. Зробивши собі свіжу
    каву, я сів біля вікна і почав читати ранкові новини. Дізнавшись про важливу подію
    в місті, я вирішив зателефонувати своєму другові. Зустрівшись із ним у парку через
    годину, ми довго обговорювали наші плани на вихідні. Повернувшись додому, я відчував
    себе дуже енергійним.
  questions:
  - Що автор зробив відразу після того, як прокинувся?
  - Що відбулося перед тим, як автор зателефонував другу?
  - Де автор зустрівся з другом?
  - Як автор почувався наприкінці цієї історії?
- id: fill-in-fill-in-temporal-sequence
  type: fill-in
  instruction: Вставте правильний дієприслівник за змістом (послідовність подій).
  items:
  - sentence: _____ книгу, я віддав її другу.
    answer: Прочитавши
    options:
    - Прочитавши
    - Читаючи
    - Написавши
    - Пишучи
  - sentence: _____ новину, мати одразу зателефонувала.
    answer: Дізнавшись
    options:
    - Дізнавшись
    - Дізнаючись
    - Зробивши
    - Роблячи
  - sentence: _____ двері, я побачив кота на порозі.
    answer: Відчинивши
    options:
    - Відчинивши
    - Відчиняючи
    - Зустрівшись
    - Зустрічаючись
  - sentence: _____ додому, я зателефонував братові.
    answer: Повернувшись
    options:
    - Повернувшись
    - Повертаючись
    - Принісши
    - Приносячи
  - sentence: Увійшовши в кімнату, детектив побачив сліди, а _____ місце злочину,
      викликав поліцію.
    answer: оглянувши
    options:
    - оглянувши
    - оглядаючи
    - прокинувшись
    - прокидаючись
  - sentence: _____ з другом у парку, ми обговорили всі наші плани.
    answer: Зустрівшись
    options:
    - Зустрівшись
    - Зустрічаючись
    - Умившись
    - Умиваючись
  title: Вставте правильний дієприслівник за змістом (послідовність подій).
- id: quiz-quiz-perfective-basics
  type: quiz
  instruction: Оберіть правильний варіант відповіді про дієприслівники доконаного
    виду.
  items:
  - question: На яке питання завжди відповідає дієприслівник доконаного виду?
    options:
    - що зробивши?
    - що роблячи?
    - що робити?
    - що зробити?
    correct: 0
  - question: Яке часове співвідношення передає дієприслівник доконаного виду?
    options:
    - різночасність (попередність)
    - одночасність
    - майбутність
    - незавершеність
    correct: 0
  - question: Який суфікс використовується, якщо основа дієслова закінчується на голосний
      звук?
    options:
    - -вши
    - -ши
    - -учи
    - -ачи
    correct: 0
  - question: Що завжди має бути спільним для додаткової дії (дієприслівника) та головної
      (присудка)?
    options:
    - виконавець дії (підмет)
    - час виконання
    - вид дієслова
    - закінчення
    correct: 0
  - question: Як правильно утворити дієприслівник від слова «написати»?
    options:
    - написавши
    - написуючи
    - написаши
    - напишучи
    correct: 0
  - question: Яке з цих слів є дієприслівником доконаного виду?
    options:
    - зробивши
    - роблячи
    - зроблений
    - зробити
    correct: 0
  title: Оберіть правильний варіант відповіді про дієприслівники доконаного виду.
- id: essay-vocab-formation
  type: essay-response
  prompt: 'Напишіть 5 речень про ваш ранок або вчорашній день, використовуючи нову
    лексику з розділу «Творення дієприслівників доконаного виду» (наприклад: прокинувшись,
    умившись, принісши, зустрівшись, зібравшись).'
  min_words: 50
  model_answer: Прокинувшись о сьомій, я пішов на кухню. Умившись прохолодною водою,
    я відчув бадьорість. Принісши каву до кімнати, я сів працювати. Зустрівшись із
    колегами онлайн, ми обговорили плани. Зібравшись із думками, я успішно завершив
    свій проєкт.
- id: error-correction-formation
  type: error-correction
  instruction: Знайдіть і виправте помилки в утворенні дієприслівників.
  items:
  - sentence: Прочитаючи цю книгу, я багато зрозумів про історію.
    error: Прочитаючи
    correction: Прочитавши
    error_type: word
    options:
    - Прочитавши
    - Читаючи
    - Прочитати
    explanation: Дієприслівник доконаного виду від «прочитати» утворюється за допомогою
      суфікса -вши.
  - sentence: Зробиши домашнє завдання, він пішов гуляти з друзями.
    error: Зробиши
    correction: Зробивши
    error_type: word
    options:
    - Зробивши
    - Зробити
    - Роблячи
    explanation: Основа «зроби-» закінчується на голосний, тому додаємо -вши.
  - sentence: Принісвши смачну каву, офіціант привітно усміхнувся.
    error: Принісвши
    correction: Принісши
    error_type: word
    options:
    - Принісши
    - Приносячи
    - Принести
    explanation: Основа минулого часу «приніс» закінчується на приголосний, тому додаємо
      короткий суфікс -ши.
  - sentence: Дізнавшися правду, ми одразу почали діяти.
    error: Дізнавшися
    correction: Дізнавшись
    error_type: word
    options:
    - Дізнавшись
    - Дізнаючись
    - Дізнатися
    explanation: Після суфікса -вши зворотна частка завжди має скорочений вигляд -сь.
  - sentence: Напишучи довгого листа, вона одразу відправила його.
    error: Напишучи
    correction: Написавши
    error_type: word
    options:
    - Написавши
    - Пишучи
    - Написати
    explanation: Доконаний вид утворюється від основи інфінітива «написати» додаванням
      -вши. Форма на -учи є русизмом.
  - sentence: Повернувшися додому пізно, я просто відпочивав.
    error: Повернувшися
    correction: Повернувшись
    error_type: word
    options:
    - Повернувшись
    - Повертаючись
    - Повернутися
    explanation: Після голосного «и» (у суфіксі -вши) зворотна частка перетворюється
      на -сь.
  title: Знайдіть і виправте помилки в утворенні дієприслівників.
