- id: transformation-clause-gerund
  type: fill-in
  instruction: Трансформуйте підрядне речення в дієприслівниковий зворот.
  items:
  - sentence: Після того як я прочитав книгу, я дав її другу. ➔ _____ книгу, я дав
      її другу.
    answer: Прочитавши
    options:
    - Прочитавши
    - Читаючи
    - Написавши
    - Прочитав
  - sentence: Коли ми повернулися додому, ми зателефонували мамі. ➔ _____ додому,
      ми зателефонували мамі.
    answer: Повернувшись
    options:
    - Повернувшись
    - Повертаючись
    - Повернулися
    - Повернути
  - sentence: Коли він дізнався новину, він дуже зрадів. ➔ _____ новину, він дуже
      зрадів.
    answer: Дізнавшись
    options:
    - Дізнавшись
    - Дізнаючись
    - Дізнався
    - Дізнатися
  - sentence: Після того як я написав звіт, я пішов додому. ➔ _____ звіт, я пішов
      додому.
    answer: Написавши
    options:
    - Написавши
    - Пишучи
    - Написав
    - Написати
  - sentence: Коли я побачив ці сліди, я одразу зупинився. ➔ _____ ці сліди, я одразу
      зупинився.
    answer: Побачивши
    options:
    - Побачивши
    - Бачачи
    - Побачив
    - Побачити
  - sentence: Після того як вона знайшла ключі, вона відчинила двері. ➔ _____ ключі,
      вона відчинила двері.
    answer: Знайшовши
    options:
    - Знайшовши
    - Знаходячи
    - Знайшла
    - Знайти
  title: Трансформуйте підрядне речення в дієприслівниковий зворот.
- id: error-correction-dangling
  type: error-correction
  instruction: Знайдіть і виправте синтаксичні помилки («висячий дієприслівник»).
  items:
  - sentence: Повернувшись додому, несподівано почався сильний дощ.
    error: Повернувшись додому, несподівано почався сильний дощ.
    correction: Коли я повернувся додому, несподівано почався сильний дощ.
    error_type: construction
    options:
    - Коли я повернувся додому, несподівано почався сильний дощ.
    - Повернувшись додому, дощ почався несподівано.
    - Дощ почався, повернувшись додому несподівано.
    explanation: Дієприслівник не можна використовувати, якщо дії виконують різні
      підмети. Дощ не міг повертатися додому.
  - sentence: Закінчивши складний проєкт, вечір здався мені теплим.
    error: Закінчивши складний проєкт, вечір здався мені теплим.
    correction: Після того як ми закінчили складний проєкт, вечір здався мені теплим.
    error_type: construction
    options:
    - Після того як ми закінчили складний проєкт, вечір здався мені теплим.
    - Закінчивши проєкт, здався теплим вечір.
    - Вечір здався теплим, закінчивши складний проєкт.
    explanation: Вечір не міг закінчити проєкт. Суб'єкти дій різні.
  - sentence: Увійшовши в темну кімнату, світло раптом згасло.
    error: Увійшовши в темну кімнату, світло раптом згасло.
    correction: Коли я увійшов у темну кімнату, світло раптом згасло.
    error_type: construction
    options:
    - Коли я увійшов у темну кімнату, світло раптом згасло.
    - Світло згасло, увійшовши в темну кімнату.
    - Увійшовши в кімнату, раптом згасло світло.
    explanation: Світло не може увійти в кімнату. Цю дію виконала людина.
  - sentence: Прочитавши цей лист, велика радість переповнила мене.
    error: Прочитавши цей лист, велика радість переповнила мене.
    correction: Коли я прочитав цей лист, велика радість переповнила мене.
    error_type: construction
    options:
    - Коли я прочитав цей лист, велика радість переповнила мене.
    - Радість переповнила мене, прочитавши цей лист.
    - Прочитавши лист, мене переповнила велика радість.
    explanation: Радість не могла читати лист. Використовуйте підрядне речення.
  - sentence: Зібравшись разом, свято пройшло просто чудово.
    error: Зібравшись разом, свято пройшло просто чудово.
    correction: Після того як ми зібралися разом, свято пройшло просто чудово.
    error_type: construction
    options:
    - Після того як ми зібралися разом, свято пройшло просто чудово.
    - Свято пройшло чудово, зібравшись разом.
    - Зібравшись разом, чудово пройшло свято.
    explanation: Свято не могло збиратися разом. Це зробили люди.
  - sentence: Приїхавши на місце злочину, мене зустріли патрульні.
    error: Приїхавши на місце злочину, мене зустріли патрульні.
    correction: Коли я приїхав на місце злочину, мене зустріли патрульні.
    error_type: construction
    options:
    - Коли я приїхав на місце злочину, мене зустріли патрульні.
    - Мене зустріли патрульні, приїхавши на місце злочину.
    - Приїхавши на місце злочину, патрульні зустріли мене.
    explanation: Дія «приїхав» стосується детектива («мене»), а підметом речення є
      «патрульні».
  title: Знайдіть і виправте синтаксичні помилки («висячий дієприслівник»).
- id: essay-narrative-production
  type: essay-response
  prompt: Напишіть зв'язний текст про ваш найпродуктивніший ранок (7-10 речень). Опишіть
    свій ранковий розклад, використавши щонайменше 4 дієприслівники доконаного виду
    та 2 недоконаного для позначення послідовності і паралельності дій.
  min_words: 50
  model_answer: Прокинувшись о шостій годині ранку, я відчув неймовірний приплив бадьорої
    енергії. Зробивши гімнастику, я із задоволенням пішов на кухню. П'ючи міцну каву,
    я переглядав останні новини. Спланувавши свій день, я відкрив ноутбук. Слухаючи
    розслаблюючу музику, я працював над проєктом. Написавши аналітичний звіт, я з
    гордістю закрив програму. Завершивши роботу рано, я залишив час для відпочинку.
- id: match-up-definitions
  type: match-up
  instruction: З'єднайте граматичні терміни з їхніми правильними визначеннями.
  pairs:
  - left: дієприслівник доконаного виду
    right: форма дієслова, що означає завершену додаткову дію
  - left: різночасність
    right: часове співвідношення, коли дві дії відбуваються послідовно
  - left: одночасність
    right: часове співвідношення, коли дві дії відбуваються паралельно
  - left: попередність
