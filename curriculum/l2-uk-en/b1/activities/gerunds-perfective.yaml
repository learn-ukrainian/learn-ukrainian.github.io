  title: З'єднайте інфінітив із правильною формою дієприслівника доконаного виду.
- id: aspect-choice-quiz
  type: quiz
  instruction: Оберіть правильний вид дієприслівника (одночасність чи різночасність).
  items:
  - question: _____ сніданок, він уважно читав новини. (Дії відбуваються паралельно)
