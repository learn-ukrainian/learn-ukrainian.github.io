    - Написавши
    - Написати
    - Писати
    correct: 0
  title: Оберіть правильний вид дієприслівника (одночасність чи різночасність).
- id: fill-in-gerund-aspect
  type: fill-in
  instruction: Вставте дієприслівник правильного виду (доконаного чи недоконаного)
    за контекстом.
  items:
  - sentence: _____ книгу, я віддав її другу.
    answer: Прочитавши
    options:
    - Прочитавши
    - Читаючи
    - Прочитати
    - Прочитаний
  - sentence: _____ цікаву книгу, я пив каву.
    answer: Читаючи
    options:
    - Читаючи
    - Прочитавши
    - Читати
    - Читаний
  - sentence: _____ додому, я зателефонував братові.
    answer: Повернувшись
    options:
    - Повернувшись
    - Повертаючись
    - Повернутися
    - Повернений
  - sentence: _____ прохолодною водою, я витерся рушником.
    answer: Умившись
    options:
    - Умившись
    - Умиваючись
    - Умитися
