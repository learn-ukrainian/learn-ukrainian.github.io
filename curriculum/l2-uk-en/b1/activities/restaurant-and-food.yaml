    - будь
    - ласка,
    - рахунок.
  - words:
    - борщ.
    - замовити
    - Я
    - б
    - хотів
    correct_order:
    - Я
    - б
    - хотів
    - замовити
    - борщ.
  - words:
    - подається?
    - з
    - чим
    - це
    - А
    correct_order:
    - А
    - це
    - з
    - чим
    - подається?
  - words:
    - салаті
    - цьому
    - в
    - є
    - Чи
    - цибуля?
    correct_order:
    - Чи
    - є
    - в
    - цьому
    - салаті
    - цибуля?
  - words:
    - каву,
    - Можна
    - ласка?
    - будь
    - мені
    correct_order:
    - Можна
    - мені
    - каву,
    - будь
    - ласка?
  - words:
    - страва?
    - у
    - вас
    - фірмова
    - Яка
    correct_order:
    - Яка
    - у
    - вас
    - фірмова
    - страва?
  title: Складіть правильні речення з поданих слів (корисні фрази для спілкування
    в ресто
