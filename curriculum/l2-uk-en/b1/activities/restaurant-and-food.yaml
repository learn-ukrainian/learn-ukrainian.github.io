    - сиру
    - сиром
    correct: 2
  - question: Я з'їв скибочку ____.
    options:
    - помідору
    - помідором
    - помідора
    - помідор
    correct: 2
  - question: Дайте мені ложку ____.
    options:
    - меда
    - мед
    - медом
    - меду
    correct: 3
  - question: У мене немає жодного ____.
    options:
    - яблуку
    - яблуко
    - яблука
    - яблуком
    correct: 2
  title: 'Оберіть правильну форму іменника (зверніть увагу на родовий відмінок: злічувані '
- id: group-sort-categories
