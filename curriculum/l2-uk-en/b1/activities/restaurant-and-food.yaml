version: '1.0'
module: restaurant-and-food
level: b1
inline:
- id: match-dishes-descriptions
  type: match-up
  instruction: З'єднайте українські страви з їхніми правильними описами
  pairs:
  - left: борщ
    right: традиційний суп на основі буряка, капусти та картоплі
  - left: вареники
    right: напівкруглі шматочки тіста з різноманітною начинкою
  - left: деруни
    right: смажені оладки з тертої сирої картоплі
  - left: пампушки
    right: маленькі пухкі булочки з часником
  - left: сало
    right: культовий продукт зі свинини, який нарізають скибочками
  - left: узвар
    right: традиційний напій із висушених фруктів та ягід
  - left: галушки
    right: невеликі шматочки вареного тіста, які додають у суп або подають як гарнір
  - left: млинці
    right: тонкі вироби з рідкого тіста, які смажать на сковороді
  - left: кисіль
    right: густий напій желеподібної консистенції на основі фруктового відвару і крохмалю
  - left: квас
    right: освіжний газований напій із житнього хліба
  title: З'єднайте українські страви з їхніми правильними описами
- id: fill-in-restaurant-dialogue
  type: fill-in
  instruction: Доповніть речення правильними відмінковими формами слів у дужках
  items:
  - sentence: Що порадите на ____?
    answer: перше
    options:
    - перше
    - першого
    - першому
    - першим
  - sentence: Спробуйте наш борщ із ____.
    answer: пампушками
    options:
    - пампушки
    - пампушок
    - пампушками
    - пампушкам
  - sentence: Я візьму ____.
    answer: борщ
    options:
    - борщ
    - борщу
    - борщем
    - борщі
  - sentence: Мені, будь ласка, вареники з ____.
    answer: картоплею
    options:
    - картопля
    - картоплю
    - картоплею
    - картоплі
  - sentence: І ще склянку ____, будь ласка.
    answer: узвару
    options:
    - узвар
    - узвару
    - узваром
    - узварі
  - sentence: Ви вже куштували місцевий ____?
    answer: бануш
    options:
    - бануш
    - банушу
    - банушем
    - бануші
  - sentence: Принесіть, будь ласка, ____.
    answer: салат
    options:
    - салат
    - салату
    - салатом
    - салаті
  - sentence: Я буду чорну каву з ____.
    answer: молоком
    options:
    - молоко
    - молока
    - молоком
    - молоку
  - sentence: Можна мені чисту ____, будь ласка?
    answer: виделку
    options:
    - виделка
    - виделку
    - виделкою
    - виделці
  - sentence: Можна ____, будь ласка?
    answer: рахунок
    options:
    - рахунок
    - рахунку
    - рахунком
    - рахунки
  title: Доповніть речення правильними відмінковими формами слів у дужках
- id: quiz-genitive-partitive
