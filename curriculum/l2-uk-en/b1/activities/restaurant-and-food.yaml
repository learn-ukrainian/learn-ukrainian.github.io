version: '1.0'
module: restaurant-and-food
level: b1
inline:
- id: match-dishes-descriptions
  type: match-up
  instruction: З'єднайте українські страви з їхніми описами.
  pairs:
  - left: Червоний борщ
    right: Традиційний суп із буряка, капусти та м'яса.
  - left: Вареники з вишнями
    right: Напівкруглі шматочки тіста з солодкою ягідною начинкою.
  - left: Деруни
    right: Смажені оладки з тертої сирої картоплі.
  - left: Пампушки
    right: Маленькі пухкі булочки з часником до супу.
  - left: Узвар
    right: Традиційний солодкий напій із висушених фруктів.
  - left: Зелений борщ
    right: Суп, головним інгредієнтом якого є свіжий щавель.
  - left: Сало
    right: Культовий продукт зі свинини, буває солоне або копчене.
  - left: Галушки
    right: Невеликі шматочки вареного тіста, які додають у суп.
  - left: Млинці
    right: Тонкі вироби з рідкого тіста, які смажать на сковороді.
  - left: Капусняк
    right: Ситний суп із квашеної капусти та пшона.
- id: fill-in-restaurant-dialogue
  type: fill-in
  instruction: Доповніть діалог у ресторані правильними словами.
  items:
  - sentence: Добрий вечір! Ви готові зробити ____?
    answer: замовлення
    options:
    - замовлення
    - меню
    - рахунок
  - sentence: Так. Що ви ____ на перше?
    answer: порадите
    options:
    - порадите
    - принесете
    - замовите
  - sentence: Спробуйте наш традиційний ____ із пампушками.
    answer: борщ
    options:
    - борщ
    - борщу
    - борщем
  - sentence: Добре. А до нього можна ____?
    answer: сметану
    options:
    - сметана
    - сметану
    - сметаною
  - sentence: Звісно. А що бажаєте на ____?
    answer: друге
    options:
    - перше
    - друге
    - десерт
  - sentence: Я буду ____ з картоплею.
    answer: вареники
    options:
    - вареники
    - вареників
    - варениками
  - sentence: Бажаєте узвар чи мінеральну ____?
    answer: воду
    options:
    - вода
    - воду
    - води
  - sentence: Принесіть, будь ласка, склянку ____.
    answer: узвару
    options:
    - узвар
    - узвару
    - узваром
  - sentence: Чи все вам ____?
    answer: сподобалося
    options:
    - смачно
    - сподобалося
    - добре
  - sentence: Так, було дуже смачно! Можна ____, будь ласка?
    answer: рахунок
    options:
    - рахунок
    - меню
    - чайові
- id: quiz-genitive-partitive
  type: quiz
  instruction: Визначте правильну форму слова. Зверніть увагу на відмінки.
  items:
  - question: Я буду ____.
    options:
    - кава
    - каву
    - кави
    - кавою
    correct: 1
  - question: Налийте мені, будь ласка, трохи ____.
    options:
    - узвар
    - узвару
    - узвара
    - узваром
    correct: 1
  - question: Я не їм ____.
    options:
    - м'ясо
    - м'яса
    - м'ясу
    - м'ясом
    correct: 1
  - question: Дайте, будь ласка, глибоку тарілку ____.
    options:
    - борщ
    - борща
    - борщу
    - борщем
    correct: 2
  - question: Вона замовила половину ____.
    options:
    - вареник
    - вареника
    - варенику
    - вареником
    correct: 1
  - question: Чи є в цьому салаті ____?
    options:
    - цибуля
    - цибулю
    - цибулі
    - цибулею
    correct: 0
  - question: Я б хотів замовити ____ без цукру.
    options:
    - чай
    - чая
    - чаю
    - чаєм
    correct: 0
  - question: Він відрізав великий шматок ____.
    options:
    - сир
    - сира
    - сиру
    - сиром
    correct: 2
  - question: Принесіть, будь ласка, ще одну порцію ____.
    options:
    - деруни
    - дерунів
    - дерунам
    - дерунами
    correct: 1
  - question: Я завжди п'ю каву без ____.
    options:
    - молоко
    - молока
    - молоку
    - молоком
    correct: 1
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть слова за кулінарними категоріями.
  groups:
  - label: Перші страви
    items:
    - червоний борщ
    - капусняк
    - юшка
  - label: Другі страви
    items:
    - деруни
    - вареники з картоплею
    - галушки
  - label: Напої
    items:
    - узвар
    - квас
    - кисіль
  - label: Десерти
    items:
    - солодкі млинці
    - торт
    - тирамісу
  - label: Доповнення до страв
    items:
    - сметана
    - сало
    - пампушки
workbook:
- type: translate
  instruction: Оберіть правильний переклад речення.
  items:
  - source: Bring me a glass of water, please.
    options:
    - text: Принесіть мені, будь ласка, склянку води.
      correct: true
    - text: Принесіть мені, будь ласка, склянка вода.
      correct: false
    - text: Принесіть мені, будь ласка, склянку воду.
      correct: false
  - source: I will order baked fish with vegetables.
    options:
    - text: Я замовлю запечену рибу з овочами.
      correct: true
    - text: Я замовлю запечена риба з овочами.
      correct: false
    - text: Я замовлю запечену рибу без овочів.
      correct: false
  - source: What is your signature dish?
    options:
    - text: Яка у вас фірмова страва?
      correct: true
    - text: Яке у вас фірмове меню?
      correct: false
    - text: Що ви порадите на перше?
      correct: false
  - source: Can I have the bill, please?
    options:
    - text: Можна рахунок, будь ласка?
      correct: true
    - text: Дайте мені меню, будь ласка.
      correct: false
    - text: Можна чайові, будь ласка?
      correct: false
  - source: Try our traditional borscht with garlic rolls.
    options:
    - text: Спробуйте наш традиційний борщ із пампушками.
      correct: true
    - text: Замовте наш традиційний борщ зі сметаною.
      correct: false
    - text: Спробуйте наш традиційний суп із галушками.
      correct: false
  - source: I will pay with cash.
    options:
    - text: Я заплачу готівкою.
      correct: true
    - text: Я заплачу карткою.
      correct: false
    - text: Я залишу чайові готівкою.
      correct: false
- type: error-correction
  instruction: Знайдіть і виправте граматичну або лексичну помилку в реченні.
  items:
  - sentence: Принесіть мені тарілку гарячого борща.
    error: борща
    correction: борщу
    error_type: word
    options:
    - борщу
    - борщем
    - борщі
    explanation: Незлічувані речовини в родовому відмінку мають закінчення -у (борщу,
      сиру, цукру).
  - sentence: Ми замовили вареники з вишням.
    error: вишням
    correction: вишнями
    error_type: word
    options:
    - вишнями
    - вишні
    - вишень
    explanation: З прийменником «з» використовується орудний відмінок множини — з
      вишнями.
  - sentence: Я хочу замовити велику порцію деруни.
    error: деруни
    correction: дерунів
    error_type: word
    options:
    - дерунів
    - дерунам
    - дерунами
    explanation: 'Слово «порція» вимагає родового відмінка: порція (чого?) дерунів.'
  - sentence: Дайте мені, будь ласка, нову меню.
    error: нову
    correction: нове
    error_type: word
    options:
    - нове
    - новий
    - нові
    explanation: Слово «меню» належить до середнього роду і не відмінюється, тому
      прикметник має бути «нове».
  - sentence: Я буду кава і великий шматок торта.
    error: кава
    correction: каву
    error_type: word
    options:
    - каву
    - кави
    - кавою
    explanation: Прямий об'єкт після «я буду» стоїть у знахідному відмінку — каву.
  - sentence: А це з чим подається? З м'яса?
    error: м'яса
    correction: м'ясом
    error_type: word
    options:
    - м'ясом
    - м'ясо
    - м'ясу
    explanation: Після прийменника «з» обов'язково використовується орудний відмінок
      — з м'ясом.
- type: essay-response
  prompt: 'Уявіть, що ви відвідали новий український ресторан у вашому місті. Напишіть
    детальний відгук (5-8 речень). Опишіть: 1) які страви та напої ви замовили; 2)
    якими вони були на смак і як були приготовані; 3) рівень сервісу (офіціанти, меню,
    рахунок); 4) ваше загальне враження та чи залишили ви чайові. Використовуйте знахідний,
    родовий та орудний відмінки.'
  min_words: 50
  model_answer: Учора ми з друзями відвідали новий ресторан української кухні. Спочатку
    ми уважно прочитали велике меню і зробили замовлення. Я замовив велику порцію
    вареників з картоплею та склянку узвару. Моя подруга обрала традиційний червоний
    борщ із пампушками та сметаною. Усі страви були неймовірно смачними, свіжими та
    гарячими. Офіціант працював дуже швидко і був дуже ввічливим. Ми попросили рахунок
    і із задоволенням залишили йому щедрі чайові. Я обов'язково раджу всім скуштувати
    страви в цьому чудовому закладі!
