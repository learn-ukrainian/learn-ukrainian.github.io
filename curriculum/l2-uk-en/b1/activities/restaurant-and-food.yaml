- id: wb-fill-in-cooking
  type: fill-in
  instruction: Оберіть правильний прикметник або дієприкметник, який описує спосіб
    приготування
  items:
  - sentence: Картопля, яку довго готували в духовці, називається ____.
    answer: запечена
    options:
    - запечена
    - смажена
    - варена
    - тушкована
  - sentence: Сало, яке обробляли димом для збереження смаку, — це ____ сало.
    answer: копчене
    options:
    - копчене
    - варене
    - тушковане
    - смажене
  - sentence: Риба, яку готували на сковороді з додаванням олії, стає ____.
    answer: смажена
    options:
    - смажена
    - варена
    - запечена
    - копчена
  - sentence: М'ясо, яке довго готували з невеликою кількістю рідини, називається
      ____.
    answer: тушковане
    options:
    - тушковане
    - копчене
    - смажене
    - варене
  - sentence: Яйця, які просто готували у воді на вогні, — це ____ яйця.
    answer: варені
    options:
    - варені
    - запечені
    - смажені
    - тушковані
  - sentence: Овочі в салаті чи свіжий хліб цінуються, коли вони приємно ____.
    answer: хрусткі
    options:
    - хрусткі
    - ніжні
    - свіжі
    - гострі
  title: Оберіть правильний прикметник або дієприкметник, який описує спосіб приготування
- type: essay-response
  prompt: 'Напишіть відгук про ресторан: що ви замовили, як було приготовано (варене,
    смажене, запечене), і яке ваше загальне враження. Використовуйте знахідний, родовий
    та орудний відмінки (5-8 речень).'
  min_words: 50
  model_answer: Учора ми відвідали новий український ресторан. Спочатку ми довго читали
    велике меню. Я вирішив замовити тарілку гарячого борщу зі сметаною. Моя подруга
    взяла порцію смажених дерунів із м'ясом. Також ми замовили дві склянки солодкого
    узвару. Уся їжа була дуже смачною та свіжою. Наш офіціант швидко приніс рахунок,
    і ми залишили щедрі чайові.
