  instruction: Розподіліть лексику за правильними категоріями меню
  groups:
  - label: Перші страви
    items:
    - червоний борщ
    - зелений борщ
    - капусняк
    - юшка
  - label: Другі страви
    items:
    - вареники
    - деруни
    - галушки
    - бануш
  - label: Напої
    items:
    - узвар
    - компот
    - квас
    - кисіль
  - label: Десерти
    items:
    - млинці з вишнями
    - торт
    - солодкі вареники
    - тирамісу
  - label: Посуд і прилади
    items:
    - тарілка
    - склянка
    - виделка
    - ложка
  title: Розподіліть лексику за правильними категоріями меню
workbook:
- id: wb-error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку у реченнях (зверніть увагу на
    відмінки)
  items:
  - sentence: Я буду чорну каву з молоко.
    error: молоко
    correction: молоком
    error_type: word
    options:
    - молока
    - молоком
    - молоку
    - молоці
    explanation: Після прийменника «з» використовується орудний відмінок.
  - sentence: Дайте мені, будь ласка, склянку узвар.
    error: узвар
    correction: узвару
    error_type: word
    options:
    - узвара
    - узваром
    - узвару
    - узварі
    explanation: Для незлічуваних рідин у родовому відмінку використовується закінчення
      -у/-ю.
  - sentence: Я б хотів замовити тарілку борща.
    error: борща
    correction: борщу
    error_type: word
    options:
    - борщ
    - борщем
    - борщу
    - борщі
    explanation: Борщ — це незлічувана маса/рідина, тому в родовому відмінку має закінчення
      -у.
  - sentence: Принесіть салат без цибулею.
    error: цибулею
    correction: цибулі
    error_type: word
    options:
    - цибулю
    - цибулі
    - цибуля
    - цибулях
    explanation: Після прийменника «без» завжди використовується родовий відмінок.
  - sentence: Ми зараз сидимо в затишному кафею.
    error: кафею
    correction: кафе
    error_type: word
    options:
    - кафе
    - кафом
    - кафі
    - кафа
    explanation: Слово «кафе» є іншомовним і невідмінюваним.
  - sentence: Я з'їв лише половину яблуку.
    error: яблуку
    correction: яблука
    error_type: word
    options:
    - яблуко
    - яблуком
    - яблука
    - яблуках
    explanation: Слово «яблуко» (середній рід) у родовому відмінку має закінчення
      -а.
  title: Знайдіть і виправте граматичну помилку у реченнях (зверніть увагу на відмінки)
- id: wb-unjumble-phrases
  type: unjumble
  instruction: Складіть правильні речення з поданих слів (корисні фрази для спілкування
    в ресторані)
  items:
  - words:
    - рахунок.
    - будь
    - ласка,
    - Принесіть,
    correct_order:
