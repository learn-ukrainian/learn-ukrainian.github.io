  - question: Він відрізав шматочок ____.
    options:
    - деруну
    - деруна
    - дерун
    - деруном
    correct: 1
  - question: Покладіть, будь ласка, трохи ____ до супу.
    options:
    - сметани
    - сметану
    - сметаною
    - сметані
    correct: 0
  - question: Ми купили шматок свіжого ____.
    options:
    - сира
