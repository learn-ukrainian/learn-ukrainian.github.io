version: '1.0'
module: alternation-consonants-nouns
level: b1
inline:
- id: quiz-palatalization-type
  type: quiz
  instruction: Оберіть правильний варіант зміни приголосних при першій палаталізації
  items:
  - question: Які звуки є результатом першої палаталізації?
    options:
    - Шиплячі [ж], [ч], [ш]
    - Свистячі [з'], [ц'], [с']
    - Голосні [о], [е]
    - М'які [д'], [т']
    correct: 0
  - question: Який звук утворюється від [г] при першій палаталізації?
    options:
    - '[ж]'
    - '[ч]'
    - '[ш]'
    - '[з'']'
    correct: 0
  - question: Який звук утворюється від [к] при першій палаталізації?
    options:
    - '[ч]'
    - '[ш]'
    - '[ж]'
    - '[ц'']'
    correct: 0
  - question: Який звук утворюється від [х] при першій палаталізації?
    options:
    - '[ш]'
    - '[ж]'
    - '[ч]'
    - '[с'']'
    correct: 0
  - question: В якому відмінку ми найчастіше бачимо першу палаталізацію?
    options:
    - У кличному відмінку
    - У місцевому відмінку
    - У родовому відмінку
    - У називному відмінку
    correct: 0
  - question: При утворенні якого слова відбувається перша палаталізація?
    options:
    - Ручка
    - Руці
    - Руки
    - Руками
    correct: 0
- id: fill-in-vocative
  type: fill-in
  instruction: Вставте іменник у правильній формі кличного відмінка
  items:
  - sentence: Привіт, мій найкращий _____!
    answer: друже
    options:
    - друже
    - другу
    - друге
  - sentence: Дякую вам, добрий _____!
    answer: чоловіче
    options:
    - чоловіче
    - чоловіку
    - чоловіко
  - sentence: Терпи, _____, отаманом будеш.
    answer: козаче
    options:
    - козаче
    - козаку
    - козаке
  - sentence: Вчися, _____, знання — то велика сила.
    answer: юначе
    options:
    - юначе
    - юнаку
    - юнаке
  - sentence: Гей, _____, куди ти ведеш овець?
    answer: пастуше
    options:
    - пастуше
    - пастуху
    - пастухо
  - sentence: Слухай, _____, що я тобі скажу.
    answer: друже
    options:
    - друже
    - друг
    - другу
  - sentence: Заспівай нам пісню, _____!
    answer: козаче
    options:
    - козаче
    - козаку
    - козако
  - sentence: Скажіть, _____, котра зараз година?
    answer: чоловіче
    options:
    - чоловіче
    - чоловік
    - чоловіку
- id: fill-in-dative-locative
  type: fill-in
  instruction: Вставте іменник у місцевому відмінку (перед закінченням -і)
  items:
  - sentence: Я стою на одній _____.
    answer: нозі
    options:
    - нозі
    - ногі
    - ногу
  - sentence: Він тримає книгу в лівій _____.
    answer: руці
    options:
    - руці
    - рукі
    - руку
  - sentence: Я побачив мікроб на цій _____.
    answer: мусі
    options:
    - мусі
    - мухі
    - муху
  - sentence: Я знайшов це правило в новій _____.
    answer: книзі
    options:
    - книзі
    - книгі
    - книгу
  - sentence: Ми зустрілися на старій _____.
    answer: дорозі
    options:
    - дорозі
    - дорогі
    - дорогу
  - sentence: Я зараз відпочиваю у _____.
    answer: Празі
    options:
    - Празі
    - Прагі
    - Прагу
- id: match-up-forms
  type: match-up
  instruction: З'єднайте форму називного відмінка з формою місцевого або давального
    відмінка
  pairs:
  - left: Ольга
    right: Ользі
  - left: нога
    right: нозі
  - left: книга
    right: книзі
  - left: муха
    right: мусі
  - left: рука
    right: руці
  - left: дорога
    right: дорозі
  - left: Рига
    right: Ризі
  - left: Америка
    right: Америці
- id: fill-in-complete-the-table-of-alternation-types
  type: fill-in
  instruction: Доповніть форми чергування приголосних (вставте кличний або місцевий
    відмінок)
  items:
  - sentence: Гей, _____, допоможи мені!
    answer: хлопче
    options:
    - хлопче
    - хлопцю
    - хлопце
  - sentence: Ти справжній _____!
    answer: молодче
    options:
    - молодче
    - молодцю
    - молодецю
  - sentence: Мій великий _____!
    answer: княже
    options:
    - княже
    - князю
    - князе
  - sentence: Добрий день, _____!
    answer: шевче
    options:
    - шевче
    - швецю
    - швеце
  - sentence: 'Стара фольклорна форма: на _____.'
    answer: колішні
    options:
    - колішні
    - колесі
    - колесу
  - sentence: Цей розумний _____ сьогодні гарно працював.
    answer: хлопець
    options:
    - хлопець
    - хлопче
    - хлопцю
- id: quiz-identify-palatalization-type-first-or-second
  type: quiz
  instruction: Визначте, яка палаталізація (тип чергування) відбулася у поданому слові
  items:
  - question: друг -> друже
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 0
  - question: нога -> на нозі
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 1
  - question: хлопець -> хлопче
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 0
  - question: книга -> у книзі
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 1
  - question: козак -> козаче
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 0
  - question: муха -> мусі
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 1
  - question: рука -> ручка
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 0
  - question: дорога -> на дорозі
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 1
workbook:
- type: group-sort
  instruction: Розподіліть змінені слова за типом чергування приголосних
  groups:
  - label: Шиплячий звук [ж, ч, ш] (Перша палаталізація)
    items:
    - друже
    - козаче
    - пастуше
    - ручка
    - ніжка
    - книжковий
  - label: Свистячий звук [з', ц', с'] (Друга палаталізація)
    items:
    - нозі
    - руці
    - мусі
    - дорозі
    - Празі
    - Америці
- type: translate
  instruction: Оберіть правильний переклад речення українською мовою
  items:
  - source: He is resting in Prague.
    options:
    - text: Він відпочиває у Празі.
      correct: true
    - text: Він відпочиває у Прагі.
      correct: false
    - text: Він відпочиває на Празі.
      correct: false
  - source: Thank you, friend!
    options:
    - text: Дякую, друже!
      correct: true
    - text: Дякую, друг!
      correct: false
    - text: Дякую, другу!
      correct: false
  - source: She lives in America.
    options:
    - text: Вона живе в Америці.
      correct: true
    - text: Вона живе в Америкі.
      correct: false
    - text: Вона живе в Америку.
      correct: false
  - source: We met on the road.
    options:
    - text: Ми зустрілися на дорозі.
      correct: true
    - text: Ми зустрілися на дорогі.
      correct: false
    - text: Ми зустрілися у дорогу.
      correct: false
  - source: Hi, Oleh!
    options:
    - text: Привіт, Олеже!
      correct: true
    - text: Привіт, Олег!
      correct: false
    - text: Привіт, Олегі!
      correct: false
  - source: It is in the right hand.
    options:
    - text: Це у правій руці.
      correct: true
    - text: Це у правій рукі.
      correct: false
    - text: Це у правій руцю.
      correct: false
