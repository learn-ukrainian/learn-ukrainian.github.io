version: '1.0'
module: alternation-consonants-nouns
level: b1
inline:
- id: fill-in-vocative
  type: fill-in
  instruction: Напишіть правильну форму кличного відмінка (Vocative case) для цих
    іменників.
  items:
  - sentence: Привіт, мій дорогий _____!
    answer: друже
    options:
    - друже
    - другу
    - друзі
  - sentence: Слухай уважно, _____.
    answer: козаче
    options:
    - козаче
    - козаку
    - козаці
  - sentence: Добрий день, _____!
    answer: чоловіче
    options:
    - чоловіче
    - чоловіку
    - чоловіці
  - sentence: Де ти був, _____?
    answer: юначе
    options:
    - юначе
    - юнаку
    - юнаці
  - sentence: Я чекаю на тебе, _____.
    answer: Олеже
    options:
    - Олеже
    - Олегу
    - Олезі
  - sentence: Допоможи мені, _____.
    answer: пастуше
    options:
    - пастуше
    - пастуху
    - пастусі
  - sentence: Що ти робиш, _____?
    answer: хлопче
    options:
    - хлопче
    - хлопцю
    - хлопке
  - sentence: Ти справжній _____!
    answer: молодче
    options:
    - молодче
    - молодцю
    - молодеце
  title: Напишіть правильну форму кличного відмінка (Vocative case) для цих іменників.
- id: fill-in-dative-locative
  type: fill-in
  instruction: Вставте правильну форму іменника в давальному або місцевому відмінку
    (Dative/Locative).
  items:
  - sentence: Я тримаю цю ручку в правій _____.
    answer: руці
    options:
    - руці
    - рукі
    - ручі
  - sentence: Ця інформація є в новій _____.
    answer: книзі
    options:
    - книзі
    - книгі
    - книжі
  - sentence: Ми відпочиваємо у _____.
    answer: Празі
    options:
    - Празі
    - Прагі
    - Пражі
  - sentence: Він подарував квіти _____.
    answer: Ользі
    options:
    - Ользі
    - Ольгі
    - Ольжі
  - sentence: Вона відчула біль у лівій _____.
    answer: нозі
    options:
    - нозі
    - ногі
    - ножі
  - sentence: Павук сидить на _____.
    answer: мусі
    options:
    - мусі
    - мухі
    - муші
  title: Вставте правильну форму іменника в давальному або місцевому відмінку (Dative/Loc
- id: match-up-forms
  type: match-up
  instruction: З'єднайте початкову форму слова з формою після чергування приголосних.
  pairs:
  - left: книга
    right: у книзі
  - left: друг
    right: друже
  - left: рука
    right: у руці
  - left: хлопець
    right: хлопче
  - left: поріг
    right: на порозі
  - left: козак
    right: козаче
  - left: муха
    right: мусі
  - left: Америка
    right: в Америці
  title: З'єднайте початкову форму слова з формою після чергування приголосних.
- id: quiz-palatalization-type
  type: quiz
  instruction: Визначте, який тип фонетичного явища відбувається у кожній парі слів.
  items:
  - question: друг — друже
    options:
    - Перша палаталізація (г/к/х → ж/ч/ш)
    - Друга палаталізація (г/к/х → з'/ц'/с')
    - Чергування [ц'] → [ч]
    - Чергування не відбувається
    correct: 0
  - question: нога — на нозі
    options:
    - Перша палаталізація (г/к/х → ж/ч/ш)
    - Друга палаталізація (г/к/х → з'/ц'/с')
    - Чергування [ц'] → [ч]
    - Чергування не відбувається
    correct: 1
  - question: молодець — молодче
    options:
    - Перша палаталізація (г/к/х → ж/ч/ш)
    - Друга палаталізація (г/к/х → з'/ц'/с')
    - Чергування [ц'] → [ч]
    - Чергування не відбувається
    correct: 2
  - question: книга — книги (множина)
    options:
    - Перша палаталізація (г/к/х → ж/ч/ш)
    - Друга палаталізація (г/к/х → з'/ц'/с')
    - Чергування [ц'] → [ч]
    - Чергування не відбувається
    correct: 3
  - question: козак — козаче
    options:
    - Перша палаталізація (г/к/х → ж/ч/ш)
    - Друга палаталізація (г/к/х → з'/ц'/с')
    - Чергування [ц'] → [ч]
    - Чергування не відбувається
    correct: 0
  - question: Африка — в Африці
    options:
    - Перша палаталізація (г/к/х → ж/ч/ш)
    - Друга палаталізація (г/к/х → з'/ц'/с')
    - Чергування [ц'] → [ч]
    - Чергування не відбувається
    correct: 1
  - question: хлопець — хлопче
    options:
    - Перша палаталізація (г/к/х → ж/ч/ш)
    - Друга палаталізація (г/к/х → з'/ц'/с')
    - Чергування [ц'] → [ч]
    - Чергування не відбувається
    correct: 2
  - question: рука — руки (множина)
    options:
    - Перша палаталізація (г/к/х → ж/ч/ш)
    - Друга палаталізація (г/к/х → з'/ц'/с')
    - Чергування [ц'] → [ч]
    - Чергування не відбувається
    correct: 3
  title: Визначте, який тип фонетичного явища відбувається у кожній парі слів.
workbook:
- type: group-sort
  instruction: Чи відбувається чергування приголосних у поданих формах слів?
  groups:
  - label: Чергування відбувається
    items:
    - друже
    - на нозі
    - в Америці
    - Ользі
    - козаче
    - молодче
  - label: Чергування НЕ відбувається
    items:
    - ноги
    - у Бердянську
    - книги
    - немає друга
    - руки
    - товаришу
  title: Чи відбувається чергування приголосних у поданих формах слів?
- type: unjumble
  instruction: Складіть правильні речення зі слів. Зверніть увагу на відмінки та чергування.
  items:
  - words:
    - завжди
    - допомагаю
    - своєму
    - Я
    - другу.
    correct_order:
    - Я
    - завжди
    - допомагаю
    - своєму
    - другу.
    hint: У давальному відмінку чоловічого роду [г] не чергується.
  - words:
    - лежить
    - Ця
    - у
    - руці.
    - моїй
    - книга
    correct_order:
    - Ця
    - книга
    - лежить
    - у
    - моїй
    - руці.
  - words:
    - купив
    - у
    - Я
    - Ризі.
    - книгу
    - цю
    correct_order:
    - Я
    - купив
    - цю
    - книгу
    - у
    - Ризі.
  - words:
    - радий
    - тебе
    - бачити,
    - Я
    - друже!
    correct_order:
    - Я
    - радий
    - тебе
    - бачити,
    - друже!
  - words:
    - ти
    - Що
    - хочеш
    - хлопче?
    - сказати,
    correct_order:
    - Що
    - ти
    - хочеш
    - сказати,
    - хлопче?
  - words:
    - зустрінемося
    - Ми
    - порозі.
    - на
    - завтра
    correct_order:
    - Ми
    - зустрінемося
    - завтра
    - на
    - порозі.
  title: Складіть правильні речення зі слів. Зверніть увагу на відмінки та чергування.
