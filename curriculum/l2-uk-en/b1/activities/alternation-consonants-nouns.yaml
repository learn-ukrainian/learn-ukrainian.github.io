workbook:
- type: quiz
  instruction: Визначте, який тип чергування приголосних відбувається в поданих парах
    слів
  items:
  - question: друг — друже
    options:
    - Перша палаталізація (г, к, х → ж, ч, ш)
    - Друга палаталізація (г, к, х → з', ц', с')
    - Перехід ц' → ч
    - Чергування не відбувається
    correct: 0
  - question: нога — на нозі
    options:
    - Перша палаталізація (г, к, х → ж, ч, ш)
    - Друга палаталізація (г, к, х → з', ц', с')
    - Перехід ц' → ч
    - Чергування не відбувається
    correct: 1
  - question: хлопець — хлопче
    options:
    - Перша палаталізація (г, к, х → ж, ч, ш)
    - Друга палаталізація (г, к, х → з', ц', с')
    - Перехід ц' → ч
    - Чергування не відбувається
    correct: 2
  - question: Прага — у Празі
    options:
    - Перша палаталізація (г, к, х → ж, ч, ш)
    - Друга палаталізація (г, к, х → з', ц', с')
    - Перехід ц' → ч
    - Чергування не відбувається
    correct: 1
  - question: козак — козаче
    options:
    - Перша палаталізація (г, к, х → ж, ч, ш)
    - Друга палаталізація (г, к, х → з', ц', с')
    - Перехід ц' → ч
    - Чергування не відбувається
    correct: 0
  - question: рука — ручка
    options:
    - Перша палаталізація (г, к, х → ж, ч, ш)
    - Друга палаталізація (г, к, х → з', ц', с')
    - Перехід ц' → ч
    - Чергування не відбувається
    correct: 0
  - question: муха — мусі
    options:
    - Перша палаталізація (г, к, х → ж, ч, ш)
    - Друга палаталізація (г, к, х → з', ц', с')
    - Перехід ц' → ч
    - Чергування не відбувається
    correct: 1
  - question: маркетинг — маркетингу
    options:
    - Перша палаталізація (г, к, х → ж, ч, ш)
    - Друга палаталізація (г, к, х → з', ц', с')
    - Перехід ц' → ч
    - Чергування не відбувається
    correct: 3
- type: fill-in
  instruction: Вставте правильну форму кличного відмінка (звертання)
  items:
  - sentence: Дякую тобі за допомогу, (друг) ____!
    answer: друже
    options:
    - другу
    - друже
    - другові
    - друг
  - sentence: Слухай мене уважно, (хлопець) ____!
    answer: хлопче
    options:
    - хлопце
    - хлопцю
    - хлопче
    - хлопець
  - sentence: Куди ти прямуєш, (козак) ____?
    answer: козаче
    options:
    - козаку
    - козаче
    - козаці
    - козацю
  - sentence: Ти чудово впорався з цим складним завданням, (молодець) ____!
    answer: молодче
    options:
    - молодцю
    - молодце
    - молодче
    - молодець
  - sentence: Не підходь до мого дому, (ворог) ____!
    answer: вороже
    options:
    - ворогу
    - вороже
    - ворозі
    - ворог
  - sentence: Бережи свою отару, (пастух) ____!
    answer: пастуше
    options:
    - пастуху
    - пастуше
    - пастуші
    - пастушо
  - sentence: (Юнак) ____, допоможи мені перенести ці важкі речі.
    answer: юначе
    options:
    - юнаку
    - юначе
    - юнаці
    - юнак
  - sentence: Зший мені, (швець) ____, нові гарні чоботи.
    answer: шевче
    options:
    - шевцю
    - шевце
    - шевче
    - швецю
- type: fill-in
  instruction: Вставте правильну форму місцевого або давального відмінка для жіночих
    іменників
  items:
  - sentence: Минулого літа ми довго гуляли у старовинній (Прага) ____.
    answer: Празі
    options:
    - Прагі
    - Празі
    - Пражі
    - Прагу
  - sentence: Цей чудовий подарунок я купив моїй подрузі (Ольга) ____.
    answer: Ользі
    options:
    - Ольгі
    - Ольжі
    - Ользі
    - Ольгу
  - sentence: Вона обережно тримала маленьку пташку у правій (рука) ____.
    answer: руці
    options:
    - рукі
    - ручі
    - руці
    - руку
  - sentence: Мій брат зараз живе і працює в (Америка) ____.
    answer: Америці
    options:
    - Америкі
    - Америці
    - Америчі
    - Америку
  - sentence: У цій новій (книга) ____ є дуже багато цікавої інформації.
    answer: книзі
    options:
    - книгі
    - книжі
    - книзі
    - книгу
  - sentence: Після травми йому було важко стояти на лівій (нога) ____.
    answer: нозі
    options:
    - ногі
    - ножі
    - нозі
    - ногу
