version: '1.0'
module: alternation-consonants-nouns
level: b1
inline:
- id: quiz-palatalization-type
  type: quiz
  instruction: Оберіть правильний варіант зміни приголосних при першій палаталізації
  items:
  - question: Які звуки є результатом першої палаталізації?
    options:
    - Шиплячі [ж], [ч], [ш]
    - Свистячі [з'], [ц'], [с']
    - Голосні [о], [е]
    - М'які [д'], [т']
    correct: 0
  - question: Який звук утворюється від [г] при першій палаталізації?
    options:
    - '[ж]'
    - '[ч]'
    - '[ш]'
    - '[з'']'
    correct: 0
  - question: Який звук утворюється від [к] при першій палаталізації?
    options:
    - '[ч]'
    - '[ш]'
    - '[ж]'
    - '[ц'']'
    correct: 0
  - question: Який звук утворюється від [х] при першій палаталізації?
    options:
    - '[ш]'
    - '[ж]'
    - '[ч]'
    - '[с'']'
    correct: 0
  - question: В якому відмінку ми найчастіше бачимо першу палаталізацію?
    options:
    - У кличному відмінку
    - У місцевому відмінку
    - У родовому відмінку
    - У називному відмінку
    correct: 0
  - question: При утворенні якого слова відбувається перша палаталізація?
    options:
    - Ручка
    - Руці
    - Руки
    - Руками
    correct: 0
- id: fill-in-vocative
  type: fill-in
  instruction: Вставте іменник у правильній формі кличного відмінка
  items:
  - sentence: Привіт, мій найкращий _____!
    answer: друже
    options:
    - друже
    - другу
    - друге
  - sentence: Дякую вам, добрий _____!
    answer: чоловіче
    options:
    - чоловіче
    - чоловіку
    - чоловіко
  - sentence: Терпи, _____, отаманом будеш.
    answer: козаче
    options:
    - козаче
    - козаку
    - козаке
  - sentence: Вчися, _____, знання — то велика сила.
    answer: юначе
    options:
    - юначе
    - юнаку
    - юнаке
  - sentence: Гей, _____, куди ти ведеш овець?
    answer: пастуше
    options:
    - пастуше
    - пастуху
    - пастухо
  - sentence: Слухай, _____, що я тобі скажу.
    answer: друже
    options:
    - друже
    - друг
    - другу
  - sentence: Заспівай нам пісню, _____!
    answer: козаче
    options:
    - козаче
    - козаку
    - козако
  - sentence: Скажіть, _____, котра зараз година?
    answer: чоловіче
    options:
    - чоловіче
    - чоловік
    - чоловіку
- id: fill-in-dative-locative
  type: fill-in
  instruction: Вставте іменник у місцевому відмінку (перед закінченням -і)
  items:
  - sentence: Я стою на одній _____.
    answer: нозі
    options:
    - нозі
    - ногі
    - ногу
  - sentence: Він тримає книгу в лівій _____.
    answer: руці
    options:
    - руці
    - рукі
    - руку
  - sentence: Я побачив мікроб на цій _____.
    answer: мусі
    options:
    - мусі
    - мухі
    - муху
  - sentence: Я знайшов це правило в новій _____.
    answer: книзі
    options:
    - книзі
    - книгі
    - книгу
  - sentence: Ми зустрілися на старій _____.
    answer: дорозі
    options:
    - дорозі
    - дорогі
    - дорогу
  - sentence: Я зараз відпочиваю у _____.
    answer: Празі
    options:
    - Празі
    - Прагі
    - Прагу
- id: match-up-forms
  type: match-up
  instruction: З'єднайте форму називного відмінка з формою місцевого або давального
    відмінка
  pairs:
  - left: Ольга
    right: Ользі
  - left: нога
    right: нозі
  - left: книга
    right: книзі
  - left: муха
    right: мусі
  - left: рука
    right: руці
  - left: дорога
    right: дорозі
  - left: Рига
    right: Ризі
  - left: Америка
    right: Америці
- id: fill-in-complete-the-table-of-alternation-types
  type: fill-in
  instruction: Доповніть форми чергування приголосних (вставте кличний або місцевий
    відмінок)
  items:
  - sentence: Гей, _____, допоможи мені!
    answer: хлопче
    options:
    - хлопче
    - хлопцю
    - хлопце
  - sentence: Ти справжній _____!
    answer: молодче
    options:
    - молодче
    - молодцю
    - молодецю
  - sentence: Мій великий _____!
    answer: княже
    options:
    - княже
    - князю
    - князе
  - sentence: Добрий день, _____!
    answer: шевче
    options:
    - шевче
    - швецю
    - швеце
  - sentence: 'Стара фольклорна форма: на _____.'
    answer: колішні
    options:
    - колішні
    - колесі
    - колесу
  - sentence: Цей розумний _____ сьогодні гарно працював.
    answer: хлопець
    options:
    - хлопець
    - хлопче
    - хлопцю
- id: error-correction-sentences-find-and-fix-incorrect-consonant-alternations-in-sentences
  type: error-correction
  instruction: Знайдіть і виправте помилку в чергуванні приголосних
  items:
  - sentence: Я зараз відпочиваю у Прагі.
    error: Прагі
    correction: Празі
    error_type: word
    options:
    - Празі
    - Прагу
    - Пражі
    explanation: Звук [г] перед закінченням -і обов'язково переходить у [з'].
  - sentence: Привіт, Олег, як справи?
    error: Олег
    correction: Олеже
    error_type: word
    options:
    - Олеже
    - Оляже
    - Олегі
    explanation: Кличний відмінок для твердої групи вимагає закінчення -е та чергування
      [г] на [ж].
  - sentence: Терпи, козаке, отаманом будеш.
    error: козаке
    correction: козаче
    error_type: word
    options:
    - козаче
    - козажу
    - козацю
    explanation: Звук [к] у кличному відмінку переходить у твердий шиплячий [ч].
  - sentence: Я прочитав це у новій книгі.
    error: книгі
    correction: книзі
    error_type: word
    options:
    - книзі
    - книжі
    - книжу
    explanation: У місцевому відмінку [г] переходить у [з'] перед -і.
  - sentence: Він успішно живе в Америкі.
    error: Америкі
    correction: Америці
    error_type: word
    options:
    - Америці
    - Америші
    - Америку
    explanation: Перед закінченням -і звук [к] закономірно чергується з [ц'].
  - sentence: Ми гуляли у Ризі і Гаагі.
    error: Гаагі
    correction: Гаазі
    error_type: word
    options:
    - Гаазі
    - Гаажі
    - Гаагу
    explanation: Іноземні географічні назви на -га адаптуються та змінюються на -зі
      у місцевому відмінку.
- id: quiz-identify-palatalization-type-first-or-second
  type: quiz
  instruction: Визначте, яка палаталізація (тип чергування) відбулася у поданому слові
  items:
  - question: друг -> друже
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 0
  - question: нога -> на нозі
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 1
  - question: хлопець -> хлопче
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 0
  - question: книга -> у книзі
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 1
  - question: козак -> козаче
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 0
  - question: муха -> мусі
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 1
  - question: рука -> ручка
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 0
  - question: дорога -> на дорозі
    options:
    - Перша палаталізація (ж, ч, ш)
    - Друга палаталізація (з', ц', с')
    - Ніякого чергування
    - Чергування голосних
    correct: 1
workbook:
- type: group-sort
  instruction: Розподіліть змінені слова за типом чергування приголосних
  groups:
  - label: Шиплячий звук [ж, ч, ш] (Перша палаталізація)
    items:
    - друже
    - козаче
    - пастуше
    - ручка
    - ніжка
    - книжковий
  - label: Свистячий звук [з', ц', с'] (Друга палаталізація)
    items:
    - нозі
    - руці
    - мусі
    - дорозі
    - Празі
    - Америці
- type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про чергування приголосних
  items:
  - statement: Перед закінченням «-и» у множині (наприклад, «книги») завжди відбувається
      чергування.
    correct: false
    explanation: Звук [и] формується глибше і не викликає палаталізації, тому приголосний
      залишається твердим.
  - statement: Друга палаталізація часто зустрічається у давальному та місцевому відмінках
      однини.
    correct: true
    explanation: Зміна на свистячі звуки [з', ц', с'] є надійним маркером цих відмінків
      перед закінченням -і.
  - statement: Ім'я Олег у кличному відмінку має літературну форму «Олеже».
    correct: true
    explanation: Олег належить до твердої групи другої відміни, тому звук [г] органічно
      змінюється на [ж].
  - statement: Слова другої відміни завжди зберігають твердий корінь у всіх відмінках
      без винятку.
    correct: false
    explanation: У кличному відмінку чоловічого роду активно спрацьовує перша палаталізація
      (друг -> друже).
  - statement: Чергування приголосних зазвичай відбувається на початку слова.
    correct: false
    explanation: Чергування переважно відбувається на межі кореня та закінчення або
      нового суфікса.
  - statement: Слово «ніж» має твердий шиплячий звук [ж], тому в місцевому відмінку
      воно не змінюється.
    correct: true
    explanation: Оскільки [ж] вже є шиплячим звуком, у місцевому відмінку (на ножі)
      додаткового чергування не відбувається.
- type: translate
  instruction: Оберіть правильний переклад речення українською мовою
  items:
