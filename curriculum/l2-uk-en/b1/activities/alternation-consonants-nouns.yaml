- type: error-correction
  instruction: Знайдіть і виправте помилку в чергуванні приголосних звуків
  items:
  - sentence: Під час подорожі Європою ми зупинилися у Прагі.
    error: Прагі
    correction: Празі
    error_type: word
    options:
    - Празі
    - Пражі
    - Прагу
    explanation: У місцевому відмінку задньоязиковий [г] перед закінченням -і змінюється
      на м'який свистячий [з'].
  - sentence: Дякую тобі за підтримку у складний час, мій другу!
    error: другу
    correction: друже
    error_type: word
    options:
    - друже
    - другові
    - друзі
    explanation: У кличному відмінку іменників чоловічого роду (друг) приголосний
      [г] змінюється на шиплячий [ж] (перша палаталізація).
  - sentence: Вона стояла на одній ножі та намагалася втримати баланс.
    error: ножі
    correction: нозі
    error_type: word
    options:
    - ногі
    - нозі
    - ногу
    explanation: У місцевому відмінку слова «нога» приголосний [г] змінюється на свистячий
      [з'], а не на шиплячий [ж].
  - sentence: Молодець, хлопце, ти все зробив абсолютно правильно!
    error: хлопце
    correction: хлопче
    error_type: word
    options:
    - хлопцю
    - хлопче
    - хлопець
    explanation: Іменники на -ець у кличному відмінку змінюють м'який свистячий [ц']
      на твердий шиплячий [ч].
  - sentence: Я передав цей важливий документ Ольгі ще вчора.
    error: Ольгі
    correction: Ользі
    error_type: word
    options:
    - Ольжі
    - Ольгу
    - Ользі
    explanation: В українських іменах на -га у давальному відмінку [г] закономірно
      змінюється на м'який [з'].
  - sentence: Гей, козаке, куди твій швидкий кінь скаче?
    error: козаке
    correction: козаче
    error_type: word
    options:
    - козаку
    - козаче
    - козаці
    explanation: 'У кличному відмінку іменників на -к (козак) відбувається перша палаталізація:
      [к] переходить у [ч].'
