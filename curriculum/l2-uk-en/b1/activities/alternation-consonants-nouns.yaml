version: '1.0'
module: alternation-consonants-nouns
level: b1
inline: []
workbook:
- id: quiz-palatalization-type
  type: quiz
  instruction: Визначте тип чергування приголосних у поданій парі слів.
  items:
  - question: друг — друже
    options:
    - Перша палаталізація ([г] → [ж])
    - Друга палаталізація ([г] → [з'])
    - Перша палаталізація ([к] → [ч])
    - Чергування не відбувається
    correct: 0
  - question: нога — на нозі
    options:
    - Перша палаталізація ([г] → [ж])
    - Друга палаталізація ([г] → [з'])
    - Чергування [х] → [с']
    - Перша палаталізація ([к] → [ч])
    correct: 1
  - question: рука — у руці
    options:
    - Друга палаталізація ([к] → [ц'])
    - Перша палаталізація ([к] → [ч])
    - Друга палаталізація ([г] → [з'])
    - Чергування [х] → [с']
    correct: 0
  - question: козак — козаче
    options:
    - Перша палаталізація ([к] → [ч])
    - Друга палаталізація ([к] → [ц'])
    - Перша палаталізація ([х] → [ш])
    - Чергування не відбувається
    correct: 0
  - question: муха — на мусі
    options:
    - Друга палаталізація ([х] → [с'])
    - Перша палаталізація ([х] → [ш])
    - Друга палаталізація ([к] → [ц'])
    - Перша палаталізація ([г] → [ж])
    correct: 0
  - question: вухо — вушко
    options:
    - Перша палаталізація ([х] → [ш])
    - Друга палаталізація ([х] → [с'])
    - Друга палаталізація ([г] → [з'])
    - Чергування не відбувається
    correct: 0
  - question: парк — у парку
    options:
    - Чергування не відбувається
    - Друга палаталізація ([к] → [ц'])
    - Перша палаталізація ([к] → [ч])
    - Друга палаталізація ([г] → [з'])
    correct: 0
  - question: рік — у році
    options:
    - Друга палаталізація ([к] → [ц'])
    - Перша палаталізація ([к] → [ч])
    - Чергування не відбувається
    - Перша палаталізація ([г] → [ж])
    correct: 0
- id: fill-in-vocative
  type: fill-in
  instruction: Утворіть форму кличного відмінка (Vocative case) для поданих іменників
    чоловічого роду.
  items:
  - sentence: Привіт, мій найкращий ____ (друг)!
    answer: друже
    options:
    - друг
    - друже
    - другу
    - друзі
  - sentence: Слава тобі, ____ (козак)!
    answer: козаче
    options:
    - козак
    - козаче
    - козаку
    - козаці
  - sentence: Послухай мене, ____ (юнак).
    answer: юначе
    options:
    - юнаку
    - юнак
    - юначе
    - юнаці
  - sentence: О мій ____ (Бог)!
    answer: Боже
    options:
    - Бог
    - Боже
    - Богу
    - Бозі
  - sentence: Що ти робиш, ____ (чоловік)?
    answer: чоловіче
    options:
    - чоловік
    - чоловіче
    - чоловіку
    - чоловіці
  - sentence: Лети високо, вільний ____ (птах)!
    answer: пташе
    options:
    - птах
    - пташе
    - птаху
    - птасі
  - sentence: Як ваші справи, ____ (Олег)?
    answer: Олеже
    options:
    - Олег
    - Олеже
    - Олегу
    - Олезі
  - sentence: Слухай сюди, ____ (хлопець).
    answer: хлопче
    options:
    - хлопце
    - хлопцю
    - хлопче
    - хлопець
- id: fill-in-locative-dative
  type: fill-in
  instruction: Вставте іменники в давальному або місцевому відмінку, застосовуючи
    другу палаталізацію.
  items:
  - sentence: Вона міцно тримала телефон у правій ____ (рука).
    answer: руці
    options:
    - руці
    - рукі
    - ручці
    - руку
  - sentence: Я купив подарунок моїй найкращій ____ (подруга).
    answer: подрузі
    options:
    - подругі
    - подружі
    - подрузі
    - подругу
  - sentence: Ми зосередили увагу на цій ____ (муха).
    answer: мусі
    options:
    - мусі
    - мухі
    - муші
    - муху
  - sentence: Студенти готуються до іспиту у ____ (бібліотека).
    answer: бібліотеці
    options:
    - бібліотеці
    - бібліотекі
    - бібліотечі
    - бібліотеку
  - sentence: Будь обережним на слизькій ____ (дорога).
    answer: дорозі
    options:
    - дорогі
    - дорожі
    - дорозі
    - дорогу
  - sentence: Ліки можна купити в ____ (аптека).
    answer: аптеці
    options:
    - аптекі
    - аптеці
    - аптечі
    - аптеку
- id: match-up-alternation
  type: match-up
  instruction: З'єднайте початкову форму слова з його формою після чергування приголосних.
  pairs:
  - left: подруга
    right: подрузі
  - left: вухо
    right: вушко
  - left: пастух
    right: пастуше
  - left: Прага
    right: у Празі
  - left: дочка
    right: дочці
  - left: Америка
    right: в Америці
  - left: рух
    right: у русі
  - left: берег
    right: на березі
- id: error-correction-alternation
  type: error-correction
  instruction: Знайдіть і виправте помилку в чергуванні приголосних.
  items:
  - sentence: Я знайшов цю інформацію у старій книгі.
    error: книгі
    correction: книзі
    error_type: word
    options:
    - книзі
    - книжі
    - книгці
    - книгу
    explanation: Слово «книга» в місцевому відмінку (у чому?) має закінчення -і, що
      викликає другу палаталізацію ([г] → [з']).
  - sentence: Привіт, мій найкращий друге!
    error: друге
    correction: друже
    error_type: word
    options:
    - друже
    - друзі
    - другу
    - друг
    explanation: Слово «друг» у кличному відмінку має закінчення -е, що викликає першу
      палаталізацію ([г] → [ж]).
  - sentence: Ми сиділи на бережі річки.
    error: бережі
    correction: березі
    error_type: word
    options:
    - березі
    - берегу
    - бережці
    - бережі
    explanation: Слово «берег» у місцевому відмінку (на чому?) приймає закінчення
      -і, що викликає другу палаталізацію ([г] → [з']).
  - sentence: Слава тобі, козаке!
    error: козаке
    correction: козаче
    error_type: word
    options:
    - козаче
    - козацю
    - козаці
    - козаку
    explanation: Слово «козак» у кличному відмінку має закінчення -е, що викликає
      першу палаталізацію ([к] → [ч]).
  - sentence: Мати читає казку своїй маленькій дочкі.
    error: дочкі
    correction: дочці
    error_type: word
    options:
    - дочці
    - доччі
    - дочурці
    - дочку
    explanation: Слово «дочка» в давальному відмінку (кому?) має закінчення -і, що
      викликає другу палаталізацію ([к] → [ц']).
  - sentence: Життя полягає у постійному руші.
    error: руші
    correction: русі
    error_type: word
    options:
    - русі
    - руху
    - рухці
    - руші
    explanation: Слово «рух» у місцевому відмінку (у чому?) має закінчення -і, що
      викликає другу палаталізацію ([х] → [с']).
- id: group-sort-palatalization
  type: group-sort
  instruction: Розподіліть слова за типом чергування, що в них відбулося.
  groups:
  - label: Перша палаталізація (ж, ч, ш)
    items:
    - друже
    - книжка
    - ручка
    - Олеже
  - label: Друга палаталізація (з', ц', с')
    items:
    - на нозі
    - у руці
    - у Празі
    - на мусі
  - label: Без чергування (задній голосний)
    items:
    - у парку
    - на снігу
    - у Нью-Йорку
    - на льоду
- id: translate-cases
  type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: in the library
    options:
    - text: у бібліотеці
      correct: true
    - text: у бібліотекі
      correct: false
    - text: у бібліотечі
      correct: false
    - text: у бібліотеку
      correct: false
  - source: to the female friend (dative)
    options:
    - text: подрузі
      correct: true
    - text: подругі
      correct: false
    - text: подружі
      correct: false
    - text: подругу
      correct: false
  - source: on the floor
    options:
    - text: на поверсі
      correct: true
    - text: на поверхі
      correct: false
    - text: на поверші
      correct: false
    - text: на поверху
      correct: false
  - source: in the park
    options:
    - text: у парку
      correct: true
    - text: у парці
      correct: false
    - text: у паркі
      correct: false
    - text: у парчу
      correct: false
  - source: my friend (vocative)
    options:
    - text: мій друже
      correct: true
    - text: мій друге
      correct: false
    - text: мій друзі
      correct: false
    - text: мій другу
      correct: false
  - source: in America
    options:
    - text: в Америці
      correct: true
    - text: в Америкі
      correct: false
    - text: в Америчі
      correct: false
    - text: в Америку
      correct: false
- id: anagram-vocabulary
  type: anagram
  instruction: Складіть правильне слово з літер.
  items:
  - letters:
    - п
    - а
    - л
    - а
    - т
    - а
    - л
    - і
    - з
    - а
    - ц
    - і
    - я
    answer: палаталізація
    hint: softening of a consonant
  - letters:
    - ч
    - е
    - р
    - г
    - у
    - в
    - а
    - н
    - н
    - я
    answer: чергування
    hint: systematic sound change
  - letters:
    - з
    - а
    - к
    - і
    - н
    - ч
    - е
    - н
    - н
    - я
    answer: закінчення
    hint: inflectional morpheme at the end of a word
  - letters:
    - п
    - р
    - и
    - г
    - о
    - л
    - о
    - с
    - н
    - и
    - й
    answer: приголосний
    hint: consonant sound
  - letters:
    - ш
    - и
    - п
    - л
    - я
    - ч
    - и
    - й
    answer: шиплячий
    hint: hushing sound like ж, ч, ш
  - letters:
    - с
    - в
    - и
    - с
    - т
    - я
    - ч
    - и
    - й
    answer: свистячий
    hint: sibilant sound like з, ц, с
