      correct: true
    - text: Ми зустрілися на дорогі.
      correct: false
    - text: Ми зустрілися у дорогу.
      correct: false
  - source: Hi, Oleh!
    options:
    - text: Привіт, Олеже!
      correct: true
    - text: Привіт, Олег!
      correct: false
    - text: Привіт, Олегі!
      correct: false
  - source: It is in the right hand.
    options:
    - text: Це у правій руці.
      correct: true
    - text: Це у правій рукі.
      correct: false
    - text: Це у правій руцю.
      correct: false
