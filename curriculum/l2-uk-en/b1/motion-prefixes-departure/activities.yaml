version: '1.0'
module: motion-prefixes-departure
level: b1
inline:
  - id: act-1
    type: quiz
    title: Вирушання чи віддалення?
    instruction: Оберіть дієслово, яке найкраще відповідає фокусу речення.
    items:
      - question: "Після сніданку ми ____ з дому на вокзал."
        options:
          - пішли
          - відійшли
          - ходили
        correct: 0
        explanation: Тут фокус на початку маршруту пішки, тому пішли.
      - question: "Пасажири ____ від краю платформи після оголошення."
        options:
          - відійшли
          - пішли
          - прийшли
        correct: 0
        explanation: Від краю платформи означає створення дистанції від точки.
      - question: "Автобус ____ від зупинки без запізнення."
        options:
          - від'їхав
          - поїхав
          - прийшов
        correct: 0
        explanation: Від зупинки підказує віддалення від конкретної точки.
      - question: "У суботу ми ____ до Чернівців потягом."
        options:
          - поїхали
          - відійшли
          - пішли
        correct: 0
        explanation: Потягом і пункт призначення дають поїхали.
      - question: "Дитина ____ до мами, коли побачила її на пероні."
        options:
          - побігла
          - відбігла
          - поїхала
        correct: 0
        explanation: Рух до мами починається бігом, тому побігла.
      - question: "Діти ____ від дороги, коли почули сигнал."
        options:
          - відбігли
          - побігли
          - прибігли
        correct: 0
        explanation: Від дороги потребує дієслова віддалення від точки.
      - question: "Брат ____ валізу до камери схову."
        options:
          - поніс
          - відвіз
          - відійшов
        correct: 0
        explanation: Почав нести валізу в напрямку схову - поніс.
      - question: "Працівник ____ візок від дверей вагона."
        options:
          - відвіз
          - повіз
          - пішов
        correct: 0
        explanation: Від дверей вагона підкреслює віддалення візка.
      - question: "Човен ____ від берега після сигналу."
        options:
          - відплив
          - поплив
          - прилетів
        correct: 0
        explanation: Від берега дає відплив, тобто рух водою геть від точки.
      - question: "Літак ____ до Варшави о дев'ятій."
        options:
          - полетів
          - відлетів
          - поїхав
        correct: 0
        explanation: До Варшави фокусує маршрут, тому полетів до Варшави.
      - question: "Літак ____ від термінала, і посадку завершили."
        options:
          - відлетів
          - полетів
          - відплив
        correct: 0
        explanation: Від термінала фокусує рух геть від вихідної точки.
      - question: "Поїзд ____ зі Львова о двадцять першій."
        options:
          - відбуває
          - відправляється
          - прийде
        correct: 0
        explanation: Для розкладу транспорту нормативно й природно вживати відбувати або відходити.
  - id: act-2
    type: fill-in
    title: Форми пі-/по- і від-
    instruction: Заповніть пропуск правильною формою дієслова.
    items:
      - sentence: "Завтра я ____ з дому о сьомій. (піти)"
        answer: піду
        options:
          - піду
          - пішов
          - підеш
        explanation: Я і завтра потребують форми простого майбутнього піду.
      - sentence: "Вона вже ____ на перон проводжати друзів. (піти)"
        answer: пішла
        options:
          - пішла
          - піде
          - піду
        explanation: Вона й уже дають минулий результат пішла.
      - sentence: "Ми ____ до Ужгорода нічним потягом. (поїхати)"
        answer: поїхали
        options:
          - поїхали
          - пішли
          - від'їхали
        explanation: Потягом означає транспорт, а маршрут до міста - поїхали.
      - sentence: "Ти ____ від каси, коли купиш квиток? (відійти)"
        answer: відійдеш
        options:
          - відійдеш
          - відійшов
          - підеш
        explanation: Ти й майбутній контекст дають відійдеш.
      - sentence: "Пасажир ____ від краю платформи. (відійти)"
        answer: відійшов
        options:
          - відійшов
          - пішов
          - від'їхав
        explanation: Пасажир чоловічого роду й від краю платформи дають відійшов.
      - sentence: "Автобус ____ від зупинки о восьмій. (від'їхати)"
        answer: від'їхав
        options:
          - від'їхав
          - поїхав
          - відійшов
        explanation: Автобус транспортом віддалився від зупинки.
      - sentence: "Маршрутки ____ від автостанції щогодини. (від'їжджати)"
        answer: від'їжджають
        options:
          - від'їжджають
          - від'їхали
          - поїдуть
        explanation: Щогодини потребує недоконаної повторюваної форми.
      - sentence: "Дитина ____ від дороги. (відбігти)"
        answer: відбігла
        options:
          - відбігла
          - побігла
          - прибігла
        explanation: Дитина жіночого роду й від дороги дають відбігла.
      - sentence: "Я ____ рюкзак до камери схову. (понести)"
        answer: понесу
        options:
          - понесу
          - віднесу
          - відвезу
        explanation: До камери схову позначає напрямок маршруту з рюкзаком у руках, тому понесу.
      - sentence: "Водій ____ туристів від вокзалу до готелю. (відвезти)"
        answer: відвіз
        options:
          - відвіз
          - відніс
          - повів
        explanation: Водій перевозить людей транспортом, тому відвіз.
      - sentence: "Птахи ____ на південь у жовтні. (відлетіти)"
        answer: відлетіли
        options:
          - відлетіли
          - полетіли
          - поїхали
        explanation: Птахи віддалилися повітрям; форма множини минулого часу - відлетіли.
      - sentence: "Човен ____ від пристані після команди. (відпливти)"
        answer: відплив
        options:
          - відплив
          - поплив
          - полетів
        explanation: Човен віддалився водою від пристані.
  - id: act-3
    type: match-up
    title: Відправлення і прибуття
    instruction: Поєднайте форму відправлення або віддалення з найближчим контрастом прибуття чи досягнення.
    pairs:
      - left: піти
        right: прийти
      - left: поїхати
        right: приїхати
      - left: побігти
        right: прибігти
      - left: понести
        right: принести
      - left: повести
        right: привести
      - left: повезти
        right: привезти
      - left: полетіти
        right: прилетіти
      - left: поплисти
        right: припливти
      - left: відійти
        right: підійти
      - left: від'їхати
        right: під'їхати
      - left: віднести
        right: піднести
      - left: відвезти
        right: підвезти
  - id: act-4
    type: group-sort
    title: Пі-/по- чи від-
    instruction: Розподіліть фрази за головним просторовим фокусом.
    groups:
      - label: Вирушання до маршруту
        items:
          - ми пішли на вокзал
          - автобус поїхав до Чернівців
          - дитина побігла до мами
          - брат поніс валізу до схову
          - водій повіз групу до готелю
          - літак полетів до Варшави
      - label: Віддалення від точки
        items:
          - пасажир відійшов від краю
          - автобус від'їхав від зупинки
          - діти відбігли від дороги
          - мати відвела дитину від натовпу
          - таксі відвезло гостей від вокзалу
          - човен відплив від берега
  - id: act-5
    type: error-correction
    title: Виправте префікс і керування
    instruction: Виправте речення так, щоб дієслово, прийменник і відмінок відповідали ситуації.
    items:
      - sentence: "Я поїду з дому пішки."
        error: поїду
        correction: "Я піду з дому пішки."
        explanation: Пішки потребує піти, не поїхати.
      - sentence: "Ми пішли до Чернівців потягом."
        error: пішли
        correction: "Ми поїхали до Чернівців потягом."
        explanation: Потягом означає транспорт, тому поїхали.
      - sentence: "Пасажир пішов від краю платформи."
        error: пішов
        correction: "Пасажир відійшов від краю платформи."
        explanation: Від краю платформи підкреслює дистанцію від точки.
      - sentence: "Автобус поїхав від зупинки."
        error: поїхав
        correction: "Автобус від'їхав від зупинки."
        explanation: Від зупинки потребує фокуса віддалення.
      - sentence: "Вона від'їхала до Канади на навчання."
        error: від'їхала
        correction: "Вона поїхала до Канади на навчання."
        explanation: Далека поїздка до пункту призначення - поїхала; від- не є універсальним префіксом для еміграції чи мандрівки.
      - sentence: "Маршрутки відправляються від автостанції щогодини."
        error: відправляються
        correction: "Маршрутки від'їжджають від автостанції щогодини."
        explanation: Для розкладу транспорту краще вживати від'їжджають, відходять або відбувають.
      - sentence: "Він відїхав від офісу о шостій."
        error: відїхав
        correction: "Він від'їхав від офісу о шостій."
        explanation: Після префікса від- перед ї потрібен апостроф.
      - sentence: "Відійди з дверей, будь ласка."
        error: "з дверей"
        correction: "Відійди від дверей, будь ласка."
        explanation: Віддалення від точки потребує від + родовий.
      - sentence: "Водій відніс туристів від вокзалу."
        error: відніс
        correction: "Водій відвіз туристів від вокзалу."
        explanation: Людей транспортом відвозять, не відносять.
      - sentence: "Мати відвезла дитину від натовпу пішки."
        error: відвезла
        correction: "Мати відвела дитину від натовпу."
        explanation: Якщо супроводжує пішки, треба відвела.
      - sentence: "Човен відлетів від берега."
        error: відлетів
        correction: "Човен відплив від берега."
        explanation: Човен рухається водою, тому відплив.
      - sentence: "Поїзд відходить о шосту годину."
        error: "о шосту годину"
        correction: "Поїзд відходить о шостій годині."
        explanation: Для часу потрібна форма о шостій годині або о шостій.
workbook:
  - id: wb-1
    type: quiz
    title: Оберіть точний вектор
    instruction: Виберіть найприродніший варіант для речення.
    items:
      - question: "Після роботи я ____ додому пішки."
        options:
          - піду
          - поїду
          - відійду
        correct: 0
        explanation: Пішки потребує піду.
      - question: "Після роботи я ____ додому трамваєм."
        options:
          - поїду
          - піду
          - відбігу
        correct: 0
        explanation: Трамваєм потребує поїду.
      - question: "Пасажири ____ від дверей вагона."
        options:
          - відійшли
          - пішли
          - приїхали
        correct: 0
        explanation: Від дверей вагона означає віддалення.
      - question: "Поїзд ____ від третьої платформи о сьомій."
        options:
          - відходить
          - приходить
          - ходить
        correct: 0
        explanation: Для розкладу поїзда природно відходить.
      - question: "Автобус ____ від автостанції о восьмій."
        options:
          - від'їжджає
          - приходить
          - пішов
        correct: 0
        explanation: Автобус транспортом від'їжджає від точки.
      - question: "Діти ____ від дороги до тротуару."
        options:
          - відбігли
          - побігли
          - приїхали
        correct: 0
        explanation: Рух геть від дороги - відбігли.
      - question: "Брат ____ коробку від входу до складу."
        options:
          - відніс
          - відвіз
          - відійшов
        correct: 0
        explanation: Коробку руками відносять.
      - question: "Водій ____ машину від воріт."
        options:
          - відвіз
          - відніс
          - відійшов
        correct: 0
        explanation: Машину транспортом відвіз або від'їхав від воріт.
      - question: "Екскурсоводка ____ групу від натовпу."
        options:
          - відвела
          - віднесла
          - поїхала
        correct: 0
        explanation: Людей пішки відводять.
      - question: "Літак ____ від термінала після оголошення."
        options:
          - відлетів
          - відплив
          - відійшов
        correct: 0
        explanation: Літак рухається повітрям.
      - question: "Човен ____ від пристані."
        options:
          - відплив
          - відлетів
          - поїхав
        correct: 0
        explanation: Човен рухається водою.
      - question: "Від'їзд потяга ____ на табло."
        options:
          - показали
          - поїхали
          - відійшли
        correct: 0
        explanation: Іменник від'їзд може бути підметом або додатком; на табло його показують.
  - id: wb-2
    type: match-up
    title: Дієслово і природна конструкція
    instruction: Поєднайте дієслово з типовим словосполученням.
    pairs:
      - left: піти
        right: з дому пішки
      - left: поїхати
        right: до міста потягом
      - left: побігти
        right: до мами на пероні
      - left: понести
        right: валізу до схову
      - left: повести
        right: дитину до виходу
      - left: повезти
        right: туристів до готелю
      - left: відійти
        right: від краю платформи
      - left: від'їхати
        right: від зупинки
      - left: відбігти
        right: від дороги
      - left: віднести
        right: рюкзак від дверей
      - left: відвести
        right: групу від натовпу
      - left: відвезти
        right: гостей від вокзалу
  - id: wb-3
    type: group-sort
    title: Спосіб руху
    instruction: Розподіліть дієслова за способом руху.
    groups:
      - label: Пішки або бігом
        items:
          - піти
          - відійти
          - побігти
          - відбігти
      - label: Транспортом
        items:
          - поїхати
          - від'їхати
          - повезти
          - відвезти
      - label: Предмет або людина
        items:
          - понести
          - віднести
          - повести
          - відвести
  - id: wb-4
    type: fill-in
    title: Відмінки після з та від
    instruction: Заповніть пропуск потрібною формою іменника.
    items:
      - sentence: "Я піду з ____ о сьомій. (дім)"
        answer: дому
        options:
          - дому
          - дім
          - домі
        explanation: З дому - родовий відмінок.
      - sentence: "Ми поїхали зі ____ ранковим автобусом. (Львів)"
        answer: Львова
        options:
          - Львова
          - Львів
          - Львові
        explanation: Зі Львова - родовий відмінок.
      - sentence: "Пасажир відійшов від _____. (двері)"
        answer: дверей
        options:
          - дверей
          - двері
          - дверях
        explanation: Від дверей - родовий множини.
      - sentence: "Автобус від'їхав від _____. (зупинка)"
        answer: зупинки
        options:
          - зупинки
          - зупинку
          - зупинці
        explanation: Від зупинки - родовий відмінок.
      - sentence: "Діти відбігли від _____. (дорога)"
        answer: дороги
        options:
          - дороги
          - дорогу
          - дорозі
        explanation: Від дороги - родовий відмінок.
      - sentence: "Човен відплив від _____. (берег)"
        answer: берега
        options:
          - берега
          - берег
          - березі
        explanation: Від берега - родовий відмінок.
      - sentence: "Літак відлетів від _____. (термінал)"
        answer: термінала
        options:
          - термінала
          - термінал
          - терміналі
        explanation: Від термінала - родовий відмінок.
      - sentence: "Я віднесу рюкзак від _____. (вхід)"
        answer: входу
        options:
          - входу
          - вхід
          - вході
        explanation: Від входу - родовий відмінок.
      - sentence: "Мати відвела дитину від _____. (натовп)"
        answer: натовпу
        options:
          - натовпу
          - натовп
          - натовпі
        explanation: Від натовпу - родовий відмінок.
      - sentence: "Таксі відвезло гостей від _____. (вокзал)"
        answer: вокзалу
        options:
          - вокзалу
          - вокзал
          - вокзалі
        explanation: Від вокзалу - родовий відмінок.
      - sentence: "Вони пішли з _____. (перон)"
        answer: перону
        options:
          - перону
          - перон
          - пероні
        explanation: З перону - родовий відмінок.
      - sentence: "Поїзд відходить від третьої _____. (платформа)"
        answer: платформи
        options:
          - платформи
          - платформу
          - платформі
        explanation: Від третьої платформи - родовий відмінок.
  - id: wb-5
    type: cloze
    title: Проводи на вокзалі
    instruction: Заповніть пропуски формами з пі-/по- або від-.
    text: "У неділю ми {1} з дому на вокзал дуже рано. Брат {2} валізу до камери схову, а сестра {3} дітей до кав'ярні. Коли оголосили посадку, усі {4} на перон. Пасажири {5} від краю платформи, бо поїзд уже наближався. О сьомій поїзд {6} від третьої платформи. Наші друзі {7} до Чернівців нічним рейсом, а ми {8} від вагона після прощання. Біля виходу таксі {9} гостей від вокзалу до готелю. Один хлопчик {10} від дороги, коли почув сигнал автобуса. Пізніше літак {11} від термінала, а човен у порту {12} від берега."
    blanks:
      - id: 1
        answer: пішли
        options:
          - пішли
