  - id: wb-7
    type: error-correction
    title: Редагування від'їзду
    instruction: Виправте помилку в кожному реченні.
    items:
      - sentence: "Я поїхав на вокзал пішки."
        error: поїхав
        correction: "Я пішов на вокзал пішки."
        explanation: Пішки потребує піти.
      - sentence: "Вона пішла до Полтави автобусом."
        error: пішла
        correction: "Вона поїхала до Полтави автобусом."
        explanation: Автобусом означає транспорт.
      - sentence: "Відійдіть з краю платформи."
        error: "з краю"
        correction: "Відійдіть від краю платформи."
        explanation: Віддалення від точки потребує від + родовий.
      - sentence: "Автобус відїхав від зупинки."
        error: відїхав
        correction: "Автобус від'їхав від зупинки."
        explanation: Після префікса від- перед ї потрібен апостроф.
      - sentence: "Потяг відправляється зі Львова о дев'ятій."
        error: відправляється
        correction: "Потяг відбуває зі Львова о дев'ятій."
        explanation: У розкладі природніше відбувати, відходити або виїжджати.
      - sentence: "Діти побігли від дороги."
        error: побігли
        correction: "Діти відбігли від дороги."
        explanation: Від дороги підказує відбігли.
      - sentence: "Я відвіз коробку в руках від дверей."
        error: відвіз
        correction: "Я відніс коробку в руках від дверей."
        explanation: У руках означає нести.
      - sentence: "Водій відніс туристів до готелю."
        error: відніс
        correction: "Водій відвіз туристів до готелю."
        explanation: Водій перевозить пасажирів.
      - sentence: "Мати повезла дитину від натовпу пішки."
        error: повезла
        correction: "Мати відвела дитину від натовпу."
        explanation: Пішки й від натовпу потребують відвела.
      - sentence: "Човен полетів від берега."
        error: полетів
        correction: "Човен відплив від берега."
        explanation: Човен рухається водою і віддаляється від берега.
      - sentence: "Літак поплив від термінала."
        error: поплив
        correction: "Літак відлетів від термінала."
        explanation: Літак рухається повітрям.
      - sentence: "Відїзд потяга показали на табло."
        error: Відїзд
        correction: "Від'їзд потяга показали на табло."
        explanation: У слові від'їзд потрібен апостроф.
  - id: wb-8
    type: essay-response
    title: Сцена проводів
    instruction: Напишіть сцену проводів на вокзалі, використавши щонайменше п'ять дієслів відправлення або віддалення.
    min_words: 120
    prompt: "Опишіть, як люди вирушають у дорогу або відходять від певних місць на вокзалі. Згадайте спосіб руху, пункт відправлення, пункт призначення і розклад."
    model_answer: "У суботу ми пішли з дому на вокзал о шостій ранку, бо хотіли провести друзів до потяга. Брат поніс валізу до камери схову, а сестра повела дітей до кав'ярні біля перону. Коли оголосили посадку, пасажири відійшли від краю платформи, і провідниця попросила всіх триматися далі від дверей. Наші друзі поїхали до Чернівців нічним рейсом, а потяг відійшов від третьої платформи рівно о сьомій. Після прощання ми відійшли від вагона й повільно пішли до виходу. Біля вокзалу таксі відвезло бабусю від натовпу до готелю, а я відніс рюкзак від входу до машини. На дорозі дитина відбігла від автобуса, бо водій подав сигнал. Пізніше літак відлетів від термінала, а човен у порту відплив від берега. Уся сцена показала різницю між початком маршруту і віддаленням від конкретної точки."
    rubric:
      - criteria: дієслова відправлення
        description: Є щонайменше п'ять форм із пі-/по- або від-.
      - criteria: семантичний фокус
        description: Пі-/по- позначає початок маршруту, а від- - дистанцію від точки.
      - criteria: спосіб руху
        description: Пішки, транспортом, бігом, водою, повітрям і перенесення предметів не змішані.
      - criteria: керування
        description: Конструкції з/із + родовий, від + родовий і до/в/на для напрямку ужиті природно.
      - criteria: правопис
        description: Апостроф у від'їхати, від'їзд, від'їжджати написаний правильно.
