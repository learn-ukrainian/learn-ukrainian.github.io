  - id: wb-6
    type: translate
    title: "Переклад: leave, go, move away"
    instruction: Оберіть природний український переклад із дієсловом руху на пі-/по- або від-.
    items:
      - source: I will leave home on foot at seven.
        options:
          - text: Я піду з дому о сьомій.
