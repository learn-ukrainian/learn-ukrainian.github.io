version: '1.0'
module: checkpoint-comparison
level: b1
inline:
  - id: act-1
    type: quiz
    title: Вищий ступінь без кальок
    instruction: Оберіть природну форму або пояснення.
    items:
      - question: "Нормальна форма вищого ступеня від дорогий:"
        options:
          - дорожчий
          - дорогішийший
          - більш дорожчий
        correct: 0
        explanation: Дорогий має просту форму дорожчий; більш дорожчий дублює ступінь.
      - question: "Нормальна форма від близький:"
        options:
          - ближчий
          - близьчий
          - більш ближчий
        correct: 0
        explanation: Близький дає ближчий із чергуванням.
      - question: "Нормальна форма від вузький:"
        options:
          - вужчий
          - вузькішийший
          - більш вужчий
        correct: 0
        explanation: Вузький має форму вужчий.
      - question: "Нормальна форма від легкий:"
        options:
          - легший
          - легкішийший
          - більш легший
        correct: 0
        explanation: Легкий дає легший.
      - question: "Нормальна форма від високий:"
        options:
          - вищий
          - високішийший
          - більш вищий
        correct: 0
        explanation: Високий має суплетивно-історичну коротку форму вищий.
      - question: "Найприродніше речення:"
        options:
          - "Цей сервіс швидший за попередній."
          - "Цей сервіс більш швидший за попередній."
          - "Цей сервіс швидший від попереднього сервісу най."
        correct: 0
        explanation: Не поєднуємо більш із простою формою швидший.
      - question: "Що робить конструкція ніж?"
        options:
          - Вводить другу частину порівняння.
          - Завжди творить найвищий ступінь.
          - Замінює прикметник і прислівник.
        correct: 0
        explanation: Дешевший, ніж учора - це порівняння двох ситуацій.
      - question: "Форма краще в реченні 'Сервіс працює краще' є:"
        options:
          - прислівником у вищому ступені
          - прикметником чоловічого роду
          - назвою місця
        correct: 0
        explanation: Працює як? - краще, отже це прислівник.
      - question: "Нормальна пара для багато:"
        options:
          - більше
          - багатіше в кількості
          - більш багато
        correct: 0
        explanation: Для кількості використовуємо більше.
      - question: "Нормальна пара для поганий:"
        options:
          - гірший
          - поганішийший
          - більш гірший
        correct: 0
        explanation: Поганий має суплетивну форму гірший.
      - question: "Складена форма доречна, коли:"
        options:
          - треба нейтрально порівняти складний або книжний прикметник
          - уже є проста форма і треба її підсилити словом більш
          - треба створити найвищий ступінь словом самий
        correct: 0
        explanation: Більш ефективний може бути нейтральним, але більш кращий - помилка.
      - question: "Найкраще пояснення форми дешевший:"
        options:
          - це проста форма вищого ступеня від дешевий
          - це форма найвищого ступеня
          - це віддієслівний іменник
        correct: 0
        explanation: Дешевший порівнює два варіанти.
  - id: act-2
    type: fill-in
    title: Найвищий ступінь і межа групи
    instruction: Вставте форму, яка відповідає контексту.
    items:
      - sentence: "Це ____ тариф у цій таблиці. (вигідний)"
        answer: найвигідніший
        options:
          - найвигідніший
          - самий вигідний
          - більш вигідніший
        explanation: Най- творить нормативний найвищий ступінь.
      - sentence: "Цей спосіб доставки ____ для нашого офісу. (зручний)"
        answer: найзручніший
        options:
          - найзручніший
          - самий зручний
          - зручніший най
        explanation: Найзручніший називає максимум у межах групи.
      - sentence: "У звіті треба назвати ____ аргумент. (сильний)"
        answer: найсильніший
        options:
          - найсильніший
          - самий сильний
          - більш сильніший
        explanation: Для найвищого ступеня використовуємо най-.
      - sentence: "Цей відгук написано ____ з усіх. (детально)"
        answer: найдокладніше
        options:
          - найдокладніше
          - самий детально
          - більш докладніше
        explanation: Прислівник теж має найвищий ступінь.
      - sentence: "Мені потрібна ____ відповідь, яку ви можете дати. (швидкий)"
        answer: якнайшвидша
        options:
          - якнайшвидша
          - сама швидка
          - більш швидша
        explanation: Якнай- підсилює бажаний максимум.
      - sentence: "Виберіть ____ безпечний варіант для офіційного листа. (безпечний)"
        answer: найбезпечніший
        options:
          - найбезпечніший
          - самий безпечний
          - безпечніший най
        explanation: Найбезпечніший - нормативна форма.
      - sentence: "Ця помилка трапляється ____ серед початківців. (часто)"
        answer: найчастіше
        options:
          - найчастіше
          - самий часто
          - більш частіше
        explanation: Часто має форму найчастіше.
      - sentence: "У районі це ____ аптека за відгуками. (добрий)"
        answer: найкраща
        options:
          - найкраща
          - найдобріша для якості
          - сама добра
        explanation: У значенні якості добрий/гарний часто дає кращий, найкращий.
      - sentence: "Це ____ результат тесту в групі. (поганий)"
        answer: найгірший
        options:
          - найгірший
          - самий поганий
          - більш гірший
        explanation: Поганий має суплетивний ряд гірший, найгірший.
      - sentence: "Серед трьох варіантів це ____ ціна. (низький)"
        answer: найнижча
        options:
          - найнижча
          - сама низька
          - більш нижча
        explanation: Низький дає нижчий, найнижчий.
      - sentence: "Попросіть ____ точну інформацію про гарантію. (точний)"
        answer: найточнішу
        options:
          - найточнішу
          - саму точну
          - більш точнішу
        explanation: Форма узгоджується з інформацію.
      - sentence: "Для скарги потрібен ____ стиль. (офіційний)"
        answer: найбільш офіційний
        options:
          - найбільш офіційний
          - самий офіційний
          - більш офіційніший
        explanation: Для книжного прикметника складена найвища форма природна.
  - id: act-3
    type: match-up
    title: Словотвірна модель і значення
    instruction: Поєднайте слово з поясненням моделі.
    pairs:
      - left: міський
        right: прикметник із суфіксом -ськ- від місто
      - left: козацький
        right: прикметник із -цьк- після чергування
      - left: денний
        right: подвоєне -нн- через основу на -н- і суфікс -н-
      - left: безкоштовний
        right: прикметник із префіксом без-
      - left: надзвичайний
        right: прикметник із префіксом над-
      - left: темно-зелений
        right: складний прикметник із двома кольоровими частинами
      - left: швидко
        right: прислівник від прикметника швидкий
      - left: по-українськи
        right: прислівник із по- та суфіксом -и
      - left: уважно
        right: прислівник від уважний
      - left: домашній
        right: прикметник належності або зв'язку з домом
      - left: зимовий
        right: відносний прикметник від зима
      - left: гарантійний
        right: прикметник від іменника гарантія
  - id: act-4
    type: group-sort
    title: Іменники за способом творення
    instruction: Розподіліть іменники за словотвірним типом.
    groups:
      - label: "Назви діячів"
        items:
          - читач
          - продавець
          - перекладач
      - label: "Назви місць або приміщень"
        items:
          - кав'ярня
          - читальня
          - сховище
      - label: "Віддієслівні іменники"
        items:
          - обслуговування
          - повернення
          - відкриття
      - label: "Безафіксний спосіб"
        items:
          - підпис
          - обмін
          - огляд
  - id: act-5
    type: error-correction
    title: Редакторська діагностика
    instruction: Виправте одну головну помилку в кожному реченні.
    items:
      - sentence: "Цей магазин більш дешевший за той."
        error: більш дешевший
        correction: "Цей магазин дешевший за той."
        explanation: Не поєднуємо більш із простою формою вищого ступеня.
      - sentence: "Це самий зручний спосіб доставки."
        error: самий зручний
        correction: "Це найзручніший спосіб доставки."
        explanation: Нормативна форма найвищого ступеня має най-.
      - sentence: "Сервіс працює більш краще після оновлення."
        error: більш краще
        correction: "Сервіс працює краще після оновлення."
        explanation: Краще вже є формою вищого ступеня.
      - sentence: "Ця відповідь сама точна з усіх."
        error: сама точна
        correction: "Ця відповідь найточніша з усіх."
        explanation: Для найвищого ступеня потрібне най-.
      - sentence: "Він купив дену газету."
        error: дену
        correction: "Він купив денну газету."
        explanation: День + -н- дає денний із подвоєним -нн-.
      - sentence: "На вулиці відкрилася нова читачня."
        error: читачня
        correction: "На вулиці відкрилася нова читальня."
        explanation: Приміщення для читання - читальня.
      - sentence: "Продавецька пояснила умови гарантії."
        error: Продавецька
        correction: "Продавчиня пояснила умови гарантії."
        explanation: Для жінки-продавця природна назва продавчиня.
      - sentence: "Я оформив поверніння товару."
        error: поверніння
        correction: "Я оформив повернення товару."
        explanation: Нормативний іменник - повернення; у магазині його оформлюють.
      - sentence: "Обслугування було швидшим, ніж учора."
        error: Обслугування
        correction: "Обслуговування було швидшим, ніж учора."
        explanation: Нормативна форма - обслуговування; прикметник узгоджується з іменником.
      - sentence: "Цей тариф більш вигідніший для студентів."
        error: більш вигідніший
        correction: "Цей тариф вигідніший для студентів."
        explanation: Проста форма вищого ступеня не потребує більш.
      - sentence: "Пошта розташована близкіше до офісу."
        error: близкіше
        correction: "Пошта розташована ближче до офісу."
        explanation: Прислівникова форма - ближче; розташована природніше для місця.
      - sentence: "У банку курс сьогодні самий вигідний."
        error: самий вигідний
        correction: "У банку курс сьогодні найвигідніший."
        explanation: Найвигідніший - нормативний найвищий ступінь.
workbook:
  - id: wb-1
    type: quiz
    title: Комплексна діагностика блоку
    instruction: Оберіть правильну форму, модель або пояснення.
    items:
      - question: "Яке речення правильно порівнює дві ціни?"
        options:
          - "Ця ціна нижча за вчорашню."
          - "Ця ціна більш нижча за вчорашню."
          - "Ця ціна сама нижча за вчорашню."
        correct: 0
        explanation: Нижча за - правильна проста форма порівняння.
      - question: "Яке речення правильно називає максимум у групі?"
        options:
          - "Це найнижча ціна серед трьох магазинів."
          - "Це сама низька ціна серед трьох магазинів."
          - "Це більш нижча ціна серед трьох магазинів."
        correct: 0
        explanation: Найнижча має най- і межу групи.
      - question: "Який варіант є прислівником?"
        options:
          - "швидше"
          - "швидший"
          - "швидкісний"
        correct: 0
        explanation: Швидше відповідає на питання як.
      - question: "Який варіант є прикметником?"
        options:
          - "швидший"
          - "швидше"
          - "швидко"
        correct: 0
        explanation: Швидший узгоджується з іменником.
      - question: "Яке слово має подвоєне -нн-?"
        options:
          - "денний"
          - "водний"
          - "книжний"
        correct: 0
        explanation: День + -н- дає денний.
      - question: "Яке слово є назвою місця?"
        options:
          - "кав'ярня"
          - "продавець"
          - "повернення"
        correct: 0
        explanation: Кав'ярня - місце, де подають каву.
      - question: "Яке слово є назвою діяча?"
        options:
          - "читач"
          - "читальня"
          - "читання"
        correct: 0
        explanation: Читач - людина, яка читає.
      - question: "Яке слово є віддієслівним іменником?"
        options:
          - "обслуговування"
          - "обслуговий"
          - "службовецький"
        correct: 0
        explanation: Обслуговування називає процес або результат дії.
      - question: "Який варіант природний для відгуку?"
        options:
          - "Доставка швидша, але дорожча."
          - "Доставка більш швидша, але більш дорожча."
          - "Доставка сама швидка, але дорожче сервіс."
        correct: 0
        explanation: Дві прості форми вищого ступеня достатні.
      - question: "Яка форма найкраща для офіційного прохання?"
        options:
          - "Надайте якнайточнішу інформацію."
          - "Надайте саму точну інформацію."
          - "Надайте більш точнішу інформацію."
        correct: 0
        explanation: Якнайточнішу підсилює нормативний найвищий ступінь.
      - question: "Яке пояснення правильне для підписати - підпис?"
        options:
          - "це безафіксний спосіб"
          - "це присвійний прикметник"
          - "це складена форма порівняння"
        correct: 0
        explanation: У слові підпис немає доданого суфікса.
      - question: "Що треба перевірити в реченні з найкращий?"
        options:
          - "межу групи: серед кого або чого"
          - "наявність слова більш перед формою"
          - "чи можна додати самий"
        correct: 0
        explanation: Найвищий ступінь потребує зрозумілої групи порівняння.
  - id: wb-2
    type: cloze
    title: Відгук про сервіс
    instruction: Заповніть пропуски у відгуку про покупки і послуги.
    text: "Минулого тижня я порівнював два магазини електроніки. Перший був {1} до метро, але другий мав {2} ціну на навушники. Консультантка в першому магазині відповідала {3}, ніж онлайн-підтримка, зате доставка з другого сайту була {4}. Я зберіг {5}, бо без нього складніше оформити {6}. У гарантійному відділі пояснили, що бракований товар можна {7} або обміняти. У відгуку я написав, що обслуговування стало {8}, але сайт працює {9}. Найкориснішою була таблиця з {10}, бо вона показала {11} варіант для студента. Після цього я зробив коротку {12} своїх помилок у порівняннях."
    blanks:
      - id: 1
        answer: ближче
        options:
          - ближче
          - близкіше
          - більш близько
      - id: 2
        answer: нижчу
        options:
          - нижчу
          - більш нижчу
          - саму низьку
      - id: 3
        answer: швидше
        options:
          - швидше
          - швидший
          - найбільш швидший
      - id: 4
        answer: дешевшою
        options:
          - дешевшою
          - більш дешевшою
          - самою дешевою
      - id: 5
        answer: чек
        options:
          - чек
          - курс
          - переказ
      - id: 6
        answer: повернення
        options:
          - повернення
          - поверніння
          - повертання ціни
      - id: 7
        answer: повернути
        options:
          - повернути
          - повернити
          - вернути назад
      - id: 8
        answer: кращим
        options:
          - кращим
          - більш кращим
          - самим добрим
      - id: 9
        answer: повільніше
        options:
          - повільніше
          - повільніший
          - більш повільніше
      - id: 10
        answer: цінами
        options:
          - цінами
          - цінностями
          - цінниками як людьми
      - id: 11
        answer: найвигідніший
        options:
          - найвигідніший
          - самий вигідний
          - більш вигідніший
      - id: 12
        answer: діагностику
        options:
          - діагностику
          - діагностичність
          - діагностуванням
  - id: wb-3
    type: match-up
    title: Помилка і причина
    instruction: Поєднайте помилковий фрагмент із правильною діагностикою.
    pairs:
      - left: більш кращий
        right: дублювання вищого ступеня
      - left: самий великий
        right: калька замість найвищого ступеня
      - left: більш швидше
        right: більш не ставиться перед формою швидше
      - left: сама точна відповідь
        right: треба найточніша відповідь
      - left: денна норма написана як дена
        right: пропущено подвоєне -нн-
      - left: читачня
        right: для місця читання природно читальня
      - left: поверніння
