  - id: wb-5
    type: error-correction
    title: Фінальне редагування
    instruction: Виправте речення так, щоб воно було нормативним і природним.
    items:
      - sentence: "Цей тариф самий вигідний серед усіх."
        error: самий вигідний
        correction: "Цей тариф найвигідніший серед усіх."
        explanation: Найвищий ступінь утворюється за допомогою най-.
      - sentence: "Онлайн-підтримка відповіла більш швидше."
        error: більш швидше
        correction: "Онлайн-підтримка відповіла швидше."
        explanation: Швидше вже є формою вищого ступеня прислівника.
      - sentence: "Магазин пропонує саму низьку ціну."
        error: саму низьку
        correction: "Магазин пропонує найнижчу ціну."
        explanation: Для максимуму в групі потрібна форма найнижчу.
      - sentence: "Цей консультант більш уважніший до покупців."
        error: більш уважніший
        correction: "Цей консультант уважніший до покупців."
        explanation: Не дублюємо аналітичну й просту форми.
      - sentence: "У чеку є гарантийнний номер."
        error: гарантийнний
        correction: "У чеку є гарантійний номер."
        explanation: Нормативна форма - гарантійний.
      - sentence: "Після обмінення товару я написав відгук."
        error: обмінення
        correction: "Після обміну товару я написав відгук."
        explanation: У цьому контексті природний іменник обмін.
      - sentence: "Касирка дала здачю готівкою."
        error: здачю
        correction: "Касирка дала здачу готівкою."
        explanation: "Після ч у цій формі пишемо -у: здачу."
      - sentence: "Ця доставка дорожче, але швидша."
        error: дорожче
        correction: "Ця доставка дорожча, але швидша."
        explanation: Доставка - іменник жіночого роду, потрібен прикметник дорожча.
      - sentence: "Сервіс більш офіційніший у листуванні."
        error: більш офіційніший
        correction: "Сервіс офіційніший у листуванні."
        explanation: Можна сказати офіційніший або більш офіційний, але не разом.
      - sentence: "Це найкраще товар у магазині."
        error: найкраще
        correction: "Це найкращий товар у магазині."
        explanation: Із товар потрібен прикметник чоловічого роду найкращий.
      - sentence: "Відгук написаний детальніший, ніж попередній."
        error: детальніший
        correction: "Відгук написаний детальніше, ніж попередній."
        explanation: Після написаний як? потрібен прислівник детальніше.
      - sentence: "Для повернення потрібні чековий гарантія."
        error: чековий гарантія
        correction: "Для повернення потрібні чек і гарантія."
        explanation: Це два іменники, а не один штучний прикметниковий вислів.
