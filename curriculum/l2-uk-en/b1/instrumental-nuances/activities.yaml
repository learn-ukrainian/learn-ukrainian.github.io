version: '1.0'
module: instrumental-nuances
level: b1
inline:
  - id: act-1
    type: quiz
    title: Яка роль орудного?
    instruction: "Оберіть роль орудного відмінка в реченні."
    items:
      - question: "У реченні Вона працює лікаркою форма лікаркою показує:"
        options:
          - "професійну роль"
          - "засіб письма"
          - "місце після прийменника"
        correct: 0
        explanation: "Працювати ким? лікаркою - орудний професії."
      - question: "У фразі писати ручкою орудний означає:"
        options:
          - "знаряддя дії"
          - "адресата листа"
          - "час дії"
        correct: 0
        explanation: "Ручка є засобом письма."
      - question: "У реченні Ми йшли вулицею форма вулицею показує:"
        options:
          - "шлях руху"
          - "професію людини"
          - "отримувача дії"
        correct: 0
        explanation: "Іти яким шляхом? вулицею."
      - question: "У фразі з викладачем орудний ужито для:"
        options:
          - "сумісності або взаємодії"
          - "засобу дії без прийменника"
          - "віку людини"
        correct: 0
        explanation: "З ким? з викладачем."
      - question: "У реченні Я цікавлюся історією форма історією потрібна, бо:"
        options:
          - "цікавитися керує орудним"
          - "історія є прямим об'єктом"
          - "історія є адресатом"
        correct: 0
        explanation: "Цікавитися чим? історією."
      - question: "У реченні Лист підписано директором форма директором означає:"
        options:
          - "агента пасивної дії"
          - "інструмент письма"
          - "місце підпису"
        correct: 0
        explanation: "Хто підписав? директор; у пасиві агент стоїть в орудному."
      - question: "У фразі говорити українською орудний показує:"
        options:
          - "мову як засіб спілкування"
          - "співрозмовника"
          - "напрямок руху"
        correct: 0
        explanation: "Українською мовою - орудний засобу."
      - question: "У реченні Сергій став керівником форма керівником означає:"
        options:
          - "нову роль"
          - "транспорт"
          - "предмет у руці"
        correct: 0
        explanation: "Стати ким? керівником."
      - question: "У фразі між будинками прийменник між керує:"
        options:
          - "орудним"
          - "давальним"
          - "родовим"
        correct: 0
        explanation: "Між ким? чим? між будинками."
      - question: "У реченні Команда пишається результатом форма результатом потрібна, бо:"
        options:
          - "пишатися керує орудним"
          - "результат є адресатом"
          - "результат є місцевим відмінком"
        correct: 0
        explanation: "Пишатися чим? результатом."
      - question: "У реченні Ми приїхали потягом форма потягом показує:"
        options:
          - "засіб руху"
          - "людину-супутника"
          - "пункт призначення"
        correct: 0
        explanation: "Приїхати чим? потягом."
      - question: "У фразі перед лекцією форма лекцією показує:"
        options:
          - "часову межу з прийменником перед"
          - "професію"
          - "пасивного виконавця"
        correct: 0
        explanation: "Перед чим? перед лекцією."
  - id: act-2
    type: fill-in
    title: Професія і роль
    instruction: "Вставте форму орудного відмінка."
    items:
      - sentence: "Олена працює ____ у лікарні."
        answer: "лікаркою"
        options:
          - "лікаркою"
          - "лікарка"
          - "лікарку"
        explanation: "Працювати ким? лікаркою."
      - sentence: "Після виборів він став ____ громади."
        answer: "головою"
        options:
          - "головою"
          - "голова"
          - "голову"
        explanation: "Стати ким? головою."
      - sentence: "Київ є ____ України."
        answer: "столицею"
        options:
          - "столицею"
          - "столиця"
          - "столицю"
        explanation: "Є чим? столицею."
      - sentence: "Марина залишилася ____ навіть після переїзду."
        answer: "студенткою"
        options:
          - "студенткою"
          - "студентка"
          - "студентку"
        explanation: "Залишилася ким? студенткою."
      - sentence: "Цей досвід став важливим ____."
        answer: "уроком"
        options:
          - "уроком"
          - "урок"
          - "уроку"
        explanation: "Став чим? уроком."
      - sentence: "Його вважають добрим ____."
        answer: "фахівцем"
        options:
          - "фахівцем"
          - "фахівець"
          - "фахівця"
        explanation: "Вважають ким? фахівцем."
      - sentence: "Наша аудиторія стала ____ для зустрічей."
        answer: "простором"
        options:
          - "простором"
          - "простір"
          - "простору"
        explanation: "Стала чим? простором."
      - sentence: "Він працює ____ проєкту."
        answer: "координатором"
        options:
          - "координатором"
          - "координатор"
          - "координатора"
        explanation: "Працювати ким? координатором."
      - sentence: "Ця книжка вважається ____ жанру."
        answer: "класикою"
        options:
          - "класикою"
          - "класика"
          - "класику"
        explanation: "Вважається чим? класикою."
      - sentence: "Після практики вона стала ____ з комунікацій."
        answer: "консультанткою"
        options:
          - "консультанткою"
          - "консультантка"
          - "консультантку"
        explanation: "Стала ким? консультанткою."
      - sentence: "Цей приклад є ____ для всієї теми."
        answer: "ключем"
        options:
          - "ключем"
          - "ключ"
          - "ключа"
        explanation: "Є чим? ключем."
      - sentence: "Я залишаюся ____ цієї ідеї."
        answer: "прихильником"
        options:
          - "прихильником"
          - "прихильник"
          - "прихильника"
        explanation: "Залишаюся ким? прихильником."
  - id: act-3
    type: fill-in
    title: Засіб, транспорт, мова
    instruction: "Оберіть правильну форму для засобу дії."
    items:
      - sentence: "Я пишу нотатки ____."
        answer: "олівцем"
        options:
          - "олівцем"
          - "з олівцем"
          - "олівець"
        explanation: "Засіб письма: писати олівцем."
      - sentence: "Ми приїхали до Львова ____."
        answer: "потягом"
        options:
          - "потягом"
          - "з потягом"
          - "потяг"
        explanation: "Транспорт як засіб: потягом."
      - sentence: "У кав'ярні я заплатив ____."
        answer: "карткою"
        options:
          - "карткою"
          - "з карткою"
          - "картку"
        explanation: "Платити чим? карткою."
      - sentence: "Вона говорить ____ дуже впевнено."
        answer: "українською"
        options:
          - "українською"
          - "на українській"
          - "українську"
        explanation: "Говорити українською мовою."
      - sentence: "Відчиніть двері ____."
        answer: "ключем"
        options:
          - "ключем"
          - "з ключем"
          - "ключ"
        explanation: "Знаряддя дії: ключем."
      - sentence: "Текст набрано ____."
        answer: "латиницею"
        options:
          - "латиницею"
          - "на латиниці"
          - "латиницю"
        explanation: "Система письма як засіб: латиницею."
      - sentence: "Вони повернулися додому ____."
        answer: "таксі"
        options:
          - "таксі"
          - "з таксі"
          - "таксієм"
        explanation: "Таксі не змінюється, але виконує роль засобу руху."
      - sentence: "Мама нарізала хліб ____."
        answer: "ножем"
        options:
          - "ножем"
          - "з ножем"
          - "ніж"
        explanation: "Різати чим? ножем."
      - sentence: "Студенти користуються електронним ____."
        answer: "словником"
        options:
          - "словником"
          - "словник"
          - "словника"
        explanation: "Користуватися чим? словником."
      - sentence: "Він відповів спокійним ____."
        answer: "голосом"
        options:
          - "голосом"
          - "голос"
          - "голосу"
        explanation: "Спосіб дії: спокійним голосом."
      - sentence: "Ми доїхали до центру ____."
        answer: "метро"
        options:
          - "метро"
          - "з метро"
          - "метром"
        explanation: "Метро не змінюється; у реченні це засіб руху."
      - sentence: "Дитина малює ____."
        answer: "фарбами"
        options:
          - "фарбами"
          - "фарби"
          - "з фарбами"
        explanation: "Малювати чим? фарбами."
  - id: act-4
    type: group-sort
    title: Шість ролей орудного
    instruction: "Розсортуйте приклади за ролями орудного."
    groups:
      - label: "Професія / роль"
        items:
          - "працює лікарем"
          - "стала директоркою"
          - "є прикладом"
      - label: "Засіб / транспорт"
        items:
          - "писати ручкою"
          - "їхати трамваєм"
          - "говорити українською"
      - label: "Шлях руху"
        items:
          - "іти вулицею"
          - "плисти річкою"
          - "бігти парком"
      - label: "Керування / пасив"
        items:
          - "цікавитися історією"
          - "пишатися командою"
          - "лист підписано директором"
  - id: act-5
    type: error-correction
    title: Виправляємо кальки з орудним
    instruction: "Знайдіть і виправте помилку в кожному реченні."
    items:
      - sentence: "Вона працює лікарка в районній поліклініці."
        error: "лікарка"
        correction: "лікаркою"
        error_type: word
        explanation: "Працювати ким? лікаркою."
      - sentence: "Ми їхали з автобусом до центру."
        error: "з автобусом"
        correction: "автобусом"
        error_type: phrase
        explanation: "Транспорт як засіб руху стоїть в орудному без прийменника."
      - sentence: "Я пишу з ручкою, бо так зручніше."
        error: "з ручкою"
        correction: "ручкою"
        error_type: phrase
        explanation: "Засіб письма: писати ручкою."
      - sentence: "Студенти цікавляться в історії міста."
        error: "в історії"
        correction: "історією"
        error_type: phrase
        explanation: "Цікавитися чим? історією."
      - sentence: "Команда пишається про результат."
        error: "про результат"
        correction: "результатом"
        error_type: phrase
        explanation: "Пишатися чим? результатом."
      - sentence: "Ми йшли по вузькою вулицею до музею."
        error: "по вузькою вулицею"
        correction: "вузькою вулицею"
        error_type: phrase
        explanation: "Шлях руху можна передати орудним без прийменника."
      - sentence: "Лист підписано директор."
        error: "директор"
        correction: "директором"
        error_type: word
        explanation: "Агент пасиву стоїть в орудному."
      - sentence: "Він користується словник щодня."
        error: "словник"
        correction: "словником"
        error_type: word
        explanation: "Користуватися чим? словником."
      - sentence: "Після практики вона стала перекладачка."
        error: "перекладачка"
        correction: "перекладачкою"
        error_type: word
        explanation: "Стала ким? перекладачкою."
      - sentence: "Ми говоримо на українській на занятті."
        error: "на українській"
        correction: "українською"
        error_type: phrase
        explanation: "Мова як засіб: говорити українською."
      - sentence: "Викладач керує проєкт."
        error: "проєкт"
        correction: "проєктом"
        error_type: word
        explanation: "Керувати чим? проєктом."
      - sentence: "Згідно з розклад лекція починається о десятій."
        error: "розклад"
        correction: "розкладом"
        error_type: word
        explanation: "Згідно з чим? з розкладом."
workbook:
  - id: wb-1
    type: quiz
    title: Орудний чи інший відмінок?
    instruction: "Оберіть правильне пояснення форми."
    items:
      - question: "У фразі бачу лікаря форма лікаря не є орудним, бо:"
        options:
          - "бачити бере прямий об'єкт"
          - "лікар завжди має тільки орудний"
          - "це пасивна конструкція"
        correct: 0
        explanation: "Бачити кого? лікаря - знахідний."
      - question: "У фразі працюю лікарем форма лікарем є орудним, бо:"
        options:
          - "це професійна роль"
          - "це адресат"
          - "це родовий після числа"
        correct: 0
        explanation: "Працювати ким? лікарем."
      - question: "У реченні Я вивчаю історію форма історію є:"
        options:
          - "знахідним"
          - "орудним"
          - "давальним"
        correct: 0
        explanation: "Вивчати що? історію."
      - question: "У реченні Я цікавлюся історією форма історією є:"
        options:
          - "орудним після дієслова цікавитися"
          - "місцевим із прийменником"
          - "кличним"
        correct: 0
        explanation: "Цікавитися чим? історією."
      - question: "У фразі допомагати команді потрібний:"
        options:
          - "давальний"
          - "орудний"
          - "кличний"
        correct: 0
        explanation: "Допомагати кому? команді."
      - question: "У фразі керувати командою потрібний:"
        options:
          - "орудний"
          - "давальний"
          - "родовий"
        correct: 0
        explanation: "Керувати ким? командою."
      - question: "У реченні стою на вулиці форма вулиці є:"
        options:
          - "місцевим"
          - "орудним шляху"
          - "називним"
        correct: 0
        explanation: "На чому? на вулиці - місцевий."
      - question: "У реченні йду вулицею форма вулицею є:"
        options:
          - "орудним шляху"
          - "місцевим"
          - "давальним"
        correct: 0
        explanation: "Іти яким шляхом? вулицею."
      - question: "У фразі потребувати підтримки потрібний:"
        options:
          - "родовий"
          - "орудний"
          - "давальний"
        correct: 0
        explanation: "Потребувати чого? підтримки."
      - question: "У фразі користуватися підтримкою потрібний:"
        options:
          - "орудний"
          - "знахідний"
          - "кличний"
        correct: 0
        explanation: "Користуватися чим? підтримкою."
      - question: "У фразі під столом форма столом є:"
        options:
          - "орудним після прийменника під"
          - "місцевим після на"
          - "знахідним напрямку"
        correct: 0
        explanation: "Де? під столом; прийменник під у значенні місця бере орудний."
      - question: "У фразі під стіл форма стіл є:"
        options:
          - "знахідним напрямку"
          - "орудним місця"
          - "давальним адресата"
        correct: 0
        explanation: "Куди? під стіл - напрямок."
  - id: wb-2
    type: fill-in
    title: Дієслівне керування
    instruction: "Вставте форму, яку вимагає дієслово."
    items:
      - sentence: "Я захоплююся українською ____."
        answer: "музикою"
        options:
          - "музикою"
          - "музику"
          - "музиці"
        explanation: "Захоплюватися чим? музикою."
      - sentence: "Студент цікавиться сучасною ____."
        answer: "літературою"
        options:
          - "літературою"
          - "літературу"
          - "літератури"
        explanation: "Цікавитися чим? літературою."
      - sentence: "Ми користуємося новою ____."
        answer: "програмою"
        options:
          - "програмою"
          - "програму"
          - "програмі"
        explanation: "Користуватися чим? програмою."
      - sentence: "Команда пишається спільним ____."
        answer: "результатом"
        options:
          - "результатом"
          - "результат"
          - "результату"
        explanation: "Пишатися чим? результатом."
      - sentence: "Директор керує великим ____."
        answer: "відділом"
        options:
          - "відділом"
          - "відділ"
          - "відділу"
        explanation: "Керувати чим? відділом."
      - sentence: "Вона добре володіє ____."
        answer: "англійською"
        options:
          - "англійською"
          - "англійську"
          - "на англійській"
        explanation: "Володіти чим? англійською мовою."
      - sentence: "Не варто задовольнятися першим ____."
        answer: "варіантом"
        options:
          - "варіантом"
          - "варіант"
          - "варіанту"
        explanation: "Задовольнятися чим? варіантом."
      - sentence: "Місто славиться давньою ____."
        answer: "архітектурою"
        options:
          - "архітектурою"
          - "архітектуру"
          - "архітектурі"
        explanation: "Славитися чим? архітектурою."
      - sentence: "Викладач опікується студентським ____."
        answer: "проєктом"
        options:
          - "проєктом"
          - "проєкт"
          - "проєкту"
        explanation: "Опікуватися чим? проєктом."
      - sentence: "Група обмінюється корисними ____."
        answer: "матеріалами"
        options:
          - "матеріалами"
          - "матеріали"
          - "матеріалів"
        explanation: "Обмінюватися чим? матеріалами."
      - sentence: "Вони милуються вечірнім ____."
        answer: "містом"
        options:
          - "містом"
          - "місто"
