version: '1.0'
module: introductory-words
level: b1
inline:
  - id: act-1
    type: quiz
    title: Однорідні чи вставні
    instruction: Оберіть правильне пояснення.
    items:
      - question: Що таке однорідні члени речення?
        options:
          - члени речення, що відповідають на одне питання й залежать від одного слова
          - слова, що завжди стоять у дужках
          - тільки вставні слова на початку речення
          - будь-які слова після коми
        correct: 0
        explanation: Однорідні члени виконують однакову синтаксичну роль.
      - question: У якому реченні є однорідні додатки?
        options:
          - "Ми знайшли епітет, метафору й порівняння."
          - "Мабуть, ми знайшли епітет."
          - "На жаль, текст складний."
          - "Отже, почнімо аналіз."
        correct: 0
        explanation: Епітет, метафору й порівняння відповідають на питання що?
      - question: Яка пунктуація правильна?
        options:
          - "Усе: книжки, зошити, словники — лежало на столі."
          - "Усе книжки, зошити, словники лежало на столі."
          - "Усе — книжки: зошити, словники лежало на столі."
          - "Усе, книжки зошити словники — лежало на столі."
        correct: 0
        explanation: Після узагальнювального слова перед рядом ставимо двокрапку, після ряду може бути тире.
      - question: Яке слово в реченні "Мабуть, ми запізнимося" є вставним?
        options:
          - мабуть
          - ми
          - запізнимося
          - речення не має вставного слова
        correct: 0
        explanation: Мабуть показує невпевненість мовця.
  - id: act-2
    type: fill-in
    title: Коми в однорідному ряду
    instruction: Оберіть речення з правильною пунктуацією.
    items:
      - sentence: "Правильний варіант: ____"
        answer: "Ми читали, слухали й записували."
        options:
          - "Ми читали, слухали й записували."
          - "Ми читали слухали, й записували."
          - "Ми читали, слухали, й записували."
          - "Ми читали слухали й записували."
        explanation: Між першими двома однорідними присудками потрібна кома, перед одинарним й — ні.
      - sentence: "Правильний варіант: ____"
        answer: "Текст короткий, але виразний."
        options:
          - "Текст короткий, але виразний."
          - "Текст короткий але виразний."
          - "Текст, короткий але виразний."
          - "Текст короткий але, виразний."
        explanation: Перед протиставним але ставимо кому.
      - sentence: "Правильний варіант: ____"
        answer: "І Марко, і Олена прийшли вчасно."
        options:
          - "І Марко, і Олена прийшли вчасно."
          - "І Марко і Олена прийшли вчасно."
          - "І, Марко і Олена прийшли вчасно."
          - "І Марко і, Олена прийшли вчасно."
        explanation: Повторюване і... і потребує коми між однорідними членами.
      - sentence: "Правильний варіант: ____"
        answer: "Книжки, зошити, словники — усе лежало на столі."
        options:
          - "Книжки, зошити, словники — усе лежало на столі."
          - "Книжки зошити словники усе лежало на столі."
          - "Книжки, зошити, словники: усе лежало на столі."
          - "Книжки — зошити — словники усе лежало на столі."
        explanation: Якщо ряд стоїть перед узагальнювальним словом, перед ним ставимо тире.
  - id: act-3
    type: match-up
    title: Групи вставних слів
    instruction: Поєднайте вставне слово з його значенням.
    pairs:
      - left: безумовно
        right: упевненість
      - left: мабуть
        right: невпевненість
      - left: на жаль
        right: негативна емоція
      - left: на щастя
        right: позитивна емоція
      - left: за даними
        right: джерело інформації
      - left: по-перше
        right: порядок думок
      - left: наприклад
        right: ілюстрація
      - left: уяви собі
        right: привернення уваги
  - id: act-4
    type: error-correction
    title: Коми зі вставними словами
    instruction: Виправте пунктуацію або поясніть, чому кома не потрібна.
    items:
      - sentence: "Мабуть завтра буде дощ."
        error: "немає коми після вставного слова"
        correction: "Мабуть, завтра буде дощ."
        explanation: Мабуть стоїть на початку речення й виділяється комою.
      - sentence: "Завтра мабуть буде дощ."
        error: "немає ком навколо вставного слова"
        correction: "Завтра, мабуть, буде дощ."
        explanation: Вставне слово в середині речення виділяємо з обох боків.
      - sentence: "Адже, ми вже домовилися."
        error: "зайва кома після не вставного слова"
        correction: "Адже ми вже домовилися."
        explanation: Адже не є вставним словом.
      - sentence: "На мою думку цей уривок сильний."
        error: "немає коми після вставного словосполучення"
        correction: "На мою думку, цей уривок сильний."
        explanation: На мою думку називає джерело оцінки мовця.
workbook:
  - id: wb-1
    type: group-sort
    title: Вставне чи не вставне
    instruction: Розподіліть слова за B1-правилом.
    groups:
      - label: Виділяємо комами як вставні
        items:
          - мабуть
          - отже
          - по-перше
          - щоправда
          - на жаль
      - label: Не виділяємо як вставні
        items:
          - адже
          - навіть
          - принаймні
          - нібито
          - усе-таки
  - id: wb-2
    type: cloze
    title: Відгук із вставними словами
    instruction: Заповніть пропуски доречними вставними словами.
    text: "{1}, цей уривок має тривожний настрій. {2}, автор використовує порівняння \"лист важкий, як камінь\". {3}, герой боїться відкрити лист. {4}, текст легко обговорювати на рівні B1."
    blanks:
      - id: 1
        answer: На мою думку
        options:
          - На мою думку
          - Навіть
          - Адже
          - Нібито
      - id: 2
        answer: По-перше
        options:
          - По-перше
          - Принаймні
          - Усе-таки
          - Майже
      - id: 3
        answer: Мабуть
        options:
          - Мабуть
          - Навіть
          - Адже
          - Нібито
      - id: 4
        answer: Отже
        options:
          - Отже
          - Навіть
          - Адже
          - Принаймні
  - id: wb-3
    type: fill-in
    title: Здається чи здається
    instruction: Оберіть пояснення ролі слова здається.
    items:
      - sentence: "Здається, ми забули зошит."
        answer: вставне слово
        options:
          - вставне слово
          - присудок
          - однорідний додаток
          - узагальнювальне слово
        explanation: Можна вилучити здається, і базовий зміст лишиться.
      - sentence: "Цей шлях здається довгим."
        answer: присудок
        options:
          - присудок
          - вставне слово
          - однорідний підмет
          - джерело інформації
        explanation: Без здається речення руйнується.
      - sentence: "Мені здається, тут пропущено кому."
        answer: вставна конструкція
        options:
          - вставна конструкція
          - однорідні члени
          - графічне скорочення
          - узагальнювальне слово
        explanation: Конструкція м'яко подає думку мовця.
      - sentence: "Місто здається тихим після дощу."
        answer: присудок
        options:
          - присудок
          - вставне слово
          - епітет
          - частка
        explanation: Здається є частиною граматичної основи.
  - id: wb-4
    type: true-false
    title: Пунктуація й значення
    instruction: Визначте, чи твердження правильне.
    items:
      - statement: Вставне слово можна вилучити без руйнування основного змісту речення.
        correct: true
        explanation: Зникає ставлення мовця, але не основний факт.
      - statement: Слово навіть завжди виділяється комами як вставне.
        correct: false
        explanation: Навіть не є вставним словом у B1-правилі.
      - statement: По-перше зазвичай виділяємо комою.
        correct: true
        explanation: Воно організує порядок думок.
      - statement: Однорідні члени речення завжди мають різні питання.
        correct: false
        explanation: Вони відповідають на одне й те саме питання.
      - statement: Перед протиставним але між однорідними членами ставимо кому.
        correct: true
        explanation: Але вводить протиставлення.
  - id: wb-5
    type: translate
    title: Коментуємо думку
    instruction: Оберіть природний український варіант.
    items:
      - source: Unfortunately, the bus has already left.
        options:
          - text: "На жаль, автобус уже поїхав."
            correct: true
          - text: "Адже, автобус уже поїхав."
            correct: false
          - text: "Навіть, автобус уже поїхав."
            correct: false
          - text: "Автобус, адже, уже поїхав."
            correct: false
        explanation: На жаль виражає негативну емоцію й виділяється комою.
      - source: In my opinion, the excerpt is strong.
        options:
          - text: "На мою думку, уривок сильний."
            correct: true
          - text: "На думку, уривок сильний."
            correct: false
          - text: "У якості думки уривок сильний."
            correct: false
          - text: "Навіть, уривок сильний."
            correct: false
        explanation: На мою думку — природна вставна конструкція.
      - source: First, the text is short. Second, it is clear.
        options:
          - text: "По-перше, текст короткий. По-друге, він зрозумілий."
            correct: true
          - text: "Принаймні, текст короткий. Адже, він зрозумілий."
            correct: false
          - text: "Текст по-перше короткий по-друге зрозумілий."
            correct: false
          - text: "Навіть текст короткий по-друге він зрозумілий."
            correct: false
        explanation: По-перше і по-друге організують порядок думок.
  - id: wb-6
    type: error-correction
    title: Однорідні й узагальнювальні
    instruction: Виправте пунктуацію в реченнях.
    items:
      - sentence: "Автор використовує три засоби епітети, метафори й порівняння."
        error: "немає двокрапки після узагальнювального слова"
        correction: "Автор використовує три засоби: епітети, метафори й порівняння."
        explanation: Після узагальнювального слова перед рядом ставимо двокрапку.
      - sentence: "Епітети метафори порівняння — усі ці засоби створюють настрій."
        error: "немає ком між однорідними членами"
        correction: "Епітети, метафори, порівняння — усі ці засоби створюють настрій."
        explanation: Однорідні підмети без сполучників розділяємо комами.
      - sentence: "Текст був короткий але виразний."
        error: "немає коми перед протиставним але"
        correction: "Текст був короткий, але виразний."
        explanation: Перед але між однорідними означеннями потрібна кома.
      - sentence: "Ми і читали і обговорювали і писали відгук."
        error: "немає ком у повторюваному і... і"
        correction: "Ми і читали, і обговорювали, і писали відгук."
        explanation: Повторюваний сполучник потребує ком між однорідними присудками.
