- title: Заболотний Grade 8, вставні слова
  role: textbook
  notes: Визначення вставних слів, тест вилученням і приклади пунктуації.
- title: Авраменко Grade 8, вставні конструкції
  role: textbook
  notes: Списки завжди вставних і не вставних слів, зокрема мабуть, по-перше, адже, навіть.
- title: Ворон Grade 9, синтаксис і пунктуація
  role: textbook
  notes: Однорідні члени речення, узагальнювальні слова, двокрапка й тире.
- title: Глазова Grade 11, просте речення
  role: textbook
  notes: Систематизація груп вставних слів і складніші пунктуаційні випадки.
- title: Wiki grammar B1 introductory-words
  role: internal research
  notes: Вставні слова як інструменти ставлення, пастки для L2, здається як вставне й присудок.
