version: '1.0'
module: alternation-consonants-verbs
level: b1
inline:
  - id: act-1
    type: quiz
    title: Де працює чергування
    instruction: Оберіть правильне пояснення.
    items:
      - question: У парі "водити - воджу" чергування з'являється насамперед у формі...
        options:
          - я
          - ти
          - вони
        correct: 0
        explanation: Форма першої особи однини має воджу, а інші форми мають водиш, водить, водимо.
      - question: Яка пара найкраще показує, що чергування не переходить на всю парадигму?
        options:
          - я ношу - ти носиш
          - я ношу - я прошу
          - носити - ношений
        correct: 0
        explanation: Поруч стоять форма я з ш і форма ти з базовим с.
      - question: У формі "воджу" сполучення дж позначає...
        options:
          - один звук
          - дві окремі форми
          - помилку письма
        correct: 0
        explanation: Дж у цій формі є африкатою, а не випадковим збігом літер.
      - question: Яка форма правильна для "ти" від дієслова "водити"?
        options:
          - водиш
          - воджиш
          - водюєш
        correct: 0
        explanation: Чергування д - дж не переноситься на другу особу.
      - question: Яка форма правильна для "ми" від дієслова "робити"?
        options:
          - робимо
          - роблимо
          - роблюємо
        correct: 0
        explanation: Вставне л потрібне у формі я роблю, але не в ми робимо.
      - question: Що треба зробити з наказовим способом?
        options:
          - перевірити його окремо
          - завжди взяти основу з форми я
          - завжди додати щ
        correct: 0
        explanation: Носи, проси, води не будуються механічно з ношу, прошу, воджу.
      - question: Яка пара належить до словотворення виду, а не до форми я?
        options:
          - зарядити - заряджати
          - водити - воджу
          - робити - роблю
        correct: 0
        explanation: Заряджати є інфінітив недоконаного виду, а не форма першої особи.
      - question: Яке формулювання найточніше?
        options:
          - У багатьох дієсловах чергування цієї теми видно у формі я, але інші моделі треба перевіряти окремо.
          - В усіх дієсловах чергування буває тільки у формі я.
          - Якщо є чергування, воно має бути в кожній особі.
        correct: 0
        explanation: Пекти - печи показує, що наказовий спосіб може мати власну модель.
  - id: act-2
    type: fill-in
    title: Форма я
    instruction: Виберіть правильну форму першої особи однини.
    items:
      - sentence: "Я ____ машину вже п'ять років."
        answer: воджу
        options:
          - воджу
          - водю
          - водиш
        explanation: Водити дає форму я воджу.
      - sentence: "Я ____ ручку, але вона не відкривається."
        answer: кручу
        options:
          - кручу
          - крутю
          - крутиш
        explanation: Крутити дає форму я кручу.
      - sentence: "Я ____ дітей до школи щоранку."
        answer: вожу
        options:
          - вожу
          - возю
          - возиш
        explanation: Возити дає форму я вожу.
      - sentence: "Я ____ важкий рюкзак."
        answer: ношу
        options:
          - ношу
          - носю
          - носиш
        explanation: Носити дає форму я ношу.
      - sentence: "Я часто ____ трамваєм через центр."
        answer: їжджу
        options:
          - їжджу
          - їзджу
          - їздиш
        explanation: Їздити має нормативну форму я їжджу.
      - sentence: "Я ____ тобі цю помилку."
        answer: прощу
        options:
          - прощу
          - простю
          - простиш
        explanation: Простити дає форму я прощу.
      - sentence: "Я ____ зуби двічі на день."
        answer: чищу
        options:
          - чищу
          - чистю
          - чистиш
        explanation: Чистити дає форму я чищу.
      - sentence: "Я ____ прийти завтра."
        answer: можу
        options:
          - можу
          - могу
          - можеш
        explanation: Могти має форму я можу.
      - sentence: "Я ____ хліб у суботу."
        answer: печу
        options:
          - печу
          - пеку
          - печеш
        explanation: Пекти має форму я печу.
      - sentence: "Я ____ домашнє завдання."
        answer: роблю
        options:
          - роблю
          - робю
          - робиш
        explanation: Робити дає форму я роблю.
      - sentence: "Я ____ квитки онлайн."
        answer: куплю
        options:
          - куплю
          - купю
          - купиш
        explanation: Купити дає форму я куплю.
      - sentence: "Я ____ помилки в тексті."
        answer: ловлю
        options:
          - ловлю
          - ловю
          - ловиш
        explanation: Ловити дає форму я ловлю.
  - id: act-3
    type: group-sort
    title: Типи чергування
    instruction: Розподіліть пари за типом зміни.
    groups:
      - label: Д, т, з, с
        items:
          - водити - воджу
          - крутити - кручу
          - возити - вожу
          - носити - ношу
          - просити - прошу
      - label: Зд, ст
        items:
          - їздити - їжджу
          - простити - прощу
          - чистити - чищу
      - label: Г, к, х
        items:
          - могти - можу
          - пекти - печу
          - колихати - колишу
          - махати - машу
      - label: Губний + л
        items:
          - робити - роблю
          - купити - куплю
          - ловити - ловлю
          - любити - люблю
  - id: act-4
    type: match-up
    title: Видові пари
    instruction: Поєднайте доконаний і недоконаний вид.
    pairs:
      - left: зарядити
        right: заряджати
      - left: засудити
        right: засуджувати
      - left: знизити
        right: знижувати
      - left: погасити
        right: погашати
      - left: скоротити
        right: скорочувати
      - left: збагатити
        right: збагачувати
      - left: простити
        right: прощати
      - left: почистити
        right: чистити
  - id: act-5
    type: error-correction
    title: Не переносіть я-форму
    instruction: Знайдіть помилкову форму й подайте природний варіант.
    items:
      - sentence: "Ти воджиш машину обережно."
        error: воджиш
        correction: водиш
        error_type: word
        explanation: Чергування д - дж є у формі я воджу, але не в ти водиш.
      - sentence: "Він ношить рюкзак щодня."
        error: ношить
        correction: носить
        error_type: word
        explanation: "Форма він має базовий с: носить."
      - sentence: "Ми роблимо вправу разом."
        error: роблимо
        correction: робимо
        error_type: word
        explanation: Вставне л не потрібне в ми робимо.
      - sentence: "Ви куплите квитки завтра?"
        error: куплите
        correction: купите
        error_type: word
        explanation: У другій особі множини доконаного дієслова маємо купите.
      - sentence: "Вони воджать дітей до школи."
        error: воджать
        correction: водять
        error_type: word
        explanation: Форма вони від водити - водять.
      - sentence: "Просіть допомоги, не прошіть."
        error: прошіть
        correction: просіть
        error_type: word
        explanation: Наказовий спосіб від просити - просіть.
      - sentence: "Ношіть сумку двома руками."
        error: Ношіть
        correction: Носіть
        error_type: word
        explanation: Наказовий спосіб від носити - носіть.
      - sentence: "Воджи повільніше в дощ."
        error: Воджи
        correction: Води
        error_type: word
        explanation: Наказовий спосіб від водити - води.
      - sentence: "Я їзджу на роботу на метро."
        error: їзджу
        correction: їжджу
        error_type: word
        explanation: Нормативна форма - їжджу.
      - sentence: "Я робю це без підказки."
        error: робю
        correction: роблю
        error_type: word
        explanation: "Після б у формі я з'являється л: роблю."
workbook:
  - id: wb-1
    type: quiz
    title: Повна перевірка правила
    instruction: Оберіть правильну відповідь.
    items:
      - question: Яка форма правильна?
        options:
          - я воджу
          - я водю
          - я водиш
        correct: 0
        explanation: Водити має форму першої особи однини воджу.
      - question: Яка форма правильна?
        options:
          - ти водиш
          - ти воджиш
          - ти воджеш
        correct: 0
        explanation: У другій особі чергування д - дж не потрібне.
      - question: Яке дієслово дає форму "ношу"?
        options:
          - носити
          - возити
          - крутити
        correct: 0
        explanation: Носити - я ношу.
      - question: Яке дієслово дає форму "вожу"?
        options:
          - возити
          - водити
          - ловити
        correct: 0
        explanation: Возити - я вожу; водити - я воджу.
      - question: Яка форма є нормативною?
        options:
          - їжджу
          - їзджу
          - їжжу
        correct: 0
        explanation: Їздити має форму їжджу.
      - question: Яка пара показує ст - щ?
        options:
          - простити - прощу
          - возити - вожу
          - робити - роблю
        correct: 0
        explanation: У прощу видно результат групи ст.
      - question: Яка пара показує губний + л?
        options:
          - купити - куплю
          - носити - ношу
          - пекти - печу
        correct: 0
        explanation: П переходить у групу пл у формі куплю.
      - question: Який наказовий спосіб правильний для "носити"?
        options:
          - носи
          - ноши
          - нось
        correct: 0
        explanation: Наказова форма не будується від я ношу.
      - question: Який наказовий спосіб правильний для "пекти"?
        options:
          - печи
          - пеки
          - печу
        correct: 0
        explanation: Пекти має окрему наказову форму печи.
      - question: Яке пояснення підходить до "махати - машу"?
        options:
          - Це навчальний приклад х - ш, але в щоденному мовленні часто вживають я махаю.
          - Це єдина можлива сучасна форма.
          - Це форма другої особи.
        correct: 0
        explanation: Приклад треба знати, але безпечна повсякденна форма - махаю.
      - question: Яка пара належить до словотворення недоконаного виду?
        options:
          - погасити - погашати
          - пекти - печу
          - сидіти - сиджу
        correct: 0
        explanation: Погашати є інфінітив недоконаного виду.
      - question: Яке формулювання найкраще?
        options:
          - Не переносіть форму я автоматично на інші особи.
          - Усі особи мають ту саму основу, що форма я.
          - Наказовий спосіб завжди збігається з формою я.
        correct: 0
        explanation: Воджу, ношу, роблю треба зіставляти з водиш, носиш, робиш.
  - id: wb-2
    type: fill-in
    title: Я-форма в реченнях
    instruction: Доповніть речення правильною формою.
    items:
      - sentence: "Я ____ автобус, коли водій просить допомоги."
        answer: воджу
        options:
          - воджу
          - водю
          - водиш
        explanation: Водити - воджу.
      - sentence: "Я ____ колесо, щоб перевірити механізм."
        answer: кручу
        options:
          - кручу
          - крутю
          - крутиш
        explanation: Крутити - кручу.
      - sentence: "Я ____ продукти на склад."
        answer: вожу
        options:
          - вожу
          - возю
          - воджу
        explanation: Возити - вожу.
      - sentence: "Я ____ валізу на другий поверх."
        answer: ношу
        options:
          - ношу
          - носю
          - носиш
        explanation: Носити - ношу.
      - sentence: "Я ____ на велосипеді щовихідних."
        answer: їжджу
        options:
          - їжджу
          - їзджу
          - їздиш
        explanation: Їздити - їжджу.
      - sentence: "Я ____ тобі після розмови."
        answer: прощу
        options:
          - прощу
          - простю
          - простиш
        explanation: Простити - прощу.
      - sentence: "Я ____ овочі перед вечерею."
        answer: чищу
        options:
          - чищу
          - чистю
          - чистиш
        explanation: Чистити - чищу.
      - sentence: "Я ____ працювати після обіду."
        answer: можу
        options:
          - можу
          - могу
          - можеш
        explanation: Могти - можу.
      - sentence: "Я ____ пиріг для гостей."
        answer: печу
        options:
          - печу
          - пеку
          - печеш
        explanation: Пекти - печу.
      - sentence: "Я ____ лист сьогодні ввечері."
        answer: напишу
        options:
          - напишу
          - написю
          - напишеш
        explanation: Написати має форму напишу.
      - sentence: "Я ____ цей проєкт до п'ятниці."
        answer: зроблю
        options:
          - зроблю
          - зробю
          - зробиш
        explanation: Зробити - зроблю.
      - sentence: "Я ____ новий словник."
        answer: куплю
        options:
          - куплю
          - купю
          - купиш
        explanation: Купити - куплю.
      - sentence: "Я ____ рибу вранці."
        answer: ловлю
        options:
          - ловлю
          - ловю
          - ловиш
        explanation: Ловити - ловлю.
  - id: wb-3
    type: match-up
    title: Інфінітив і форма я
    instruction: Поєднайте інфінітив із правильною формою я.
    pairs:
      - left: водити
        right: воджу
      - left: крутити
        right: кручу
      - left: возити
        right: вожу
      - left: носити
        right: ношу
      - left: їздити
        right: їжджу
      - left: простити
        right: прощу
      - left: чистити
        right: чищу
      - left: могти
        right: можу
      - left: пекти
        right: печу
      - left: робити
        right: роблю
      - left: купити
        right: куплю
      - left: ловити
        right: ловлю
  - id: wb-4
    type: group-sort
    title: Звук і результат
    instruction: Розподіліть пари за результатом чергування.
    groups:
      - label: Дж
        items:
          - водити - воджу
          - ходити - ходжу
          - сидіти - сиджу
      - label: Ч
        items:
          - крутити - кручу
          - платити - плачу
          - пекти - печу
      - label: Ж або ждж
        items:
          - возити - вожу
          - могти - можу
          - їздити - їжджу
      - label: Ш або щ
        items:
          - носити - ношу
          - просити - прошу
          - простити - прощу
          - чистити - чищу
      - label: Губний + л
        items:
          - робити - роблю
          - купити - куплю
          - ловити - ловлю
  - id: wb-5
    type: error-correction
    title: Редагування особи
    instruction: Виправте форму дієслова.
    items:
      - sentence: "Я водю машину тільки в місті."
        error: водю
        correction: воджу
        error_type: word
        explanation: Водити - я воджу.
      - sentence: "Я носю із собою паспорт."
        error: носю
        correction: ношу
        error_type: word
        explanation: Носити - я ношу.
      - sentence: "Я простю тебе після вибачення."
        error: простю
        correction: прощу
        error_type: word
        explanation: Простити - я прощу.
      - sentence: "Я чистю взуття перед виходом."
        error: чистю
        correction: чищу
        error_type: word
        explanation: Чистити - я чищу.
      - sentence: "Я робю вправи ввечері."
        error: робю
        correction: роблю
        error_type: word
        explanation: Робити - я роблю.
      - sentence: "Я купю квиток після роботи."
        error: купю
        correction: куплю
        error_type: word
        explanation: Купити - я куплю.
      - sentence: "Ти роблиш це швидко."
        error: роблиш
        correction: робиш
        error_type: word
        explanation: У другій особі немає вставного л.
      - sentence: "Він ловлить рибу щоліта."
        error: ловлить
        correction: ловить
        error_type: word
        explanation: Форма він - ловить.
      - sentence: "Ми куплимо продукти дорогою."
        error: куплимо
        correction: купимо
        error_type: word
        explanation: Форма ми від купити - купимо.
      - sentence: "Ви прошите викладача повторити?"
        error: прошите
        correction: просите
        error_type: word
        explanation: Друга особа множини - просите.
      - sentence: "Вони їжджать до Львова щороку."
        error: їжджать
        correction: їздять
        error_type: word
        explanation: Форма вони від їздити - їздять.
      - sentence: "Сиди тут і не сиджи на холодній підлозі."
        error: сиджи
        correction: сиди
        error_type: word
        explanation: Наказова форма - сиди.
  - id: wb-6
    type: true-false
    title: Правда чи ні
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "У парі водити - воджу д переходить у дж."
        correct: true
        explanation: Це базовий приклад д - дж.
      - statement: "Правильно: ти воджиш."
        correct: false
        explanation: Треба ти водиш.
      - statement: "Носити має форму я ношу."
        correct: true
        explanation: С переходить у ш у формі я.
      - statement: "Возити і водити мають однакову форму я."
        correct: false
        explanation: Возити - вожу, водити - воджу.
      - statement: "Їздити має форму я їжджу."
        correct: true
        explanation: Нормативне написання має ждж.
      - statement: "Робити має форму я робю."
        correct: false
        explanation: Потрібно роблю.
      - statement: "Купити має форму я куплю."
        correct: true
        explanation: Після п з'являється л.
      - statement: "У формі ти купиш треба писати л."
        correct: false
        explanation: Правильно ти купиш.
      - statement: "Просити має наказову форму проси."
        correct: true
        explanation: Наказовий спосіб не бере форму прошу.
      - statement: "Пекти має наказову форму печи."
        correct: true
        explanation: Це окрема модель наказового способу.
      - statement: "Зарядити - заряджати є пара видових дієслів."
        correct: true
