version: '1.0'
module: traveling-ukraine
level: b1
inline:
  - id: act-1
    type: quiz
    title: Маршрут і фокус руху
    instruction: Оберіть природний варіант для ситуації подорожі.
    items:
      - question: "Уранці ми ____ зі Львова до Яремча."
        options:
          - поїхали
          - ходили
          - донесли
        correct: 0
        explanation: Маршрут транспортом починається дієсловом поїхали.
      - question: "Поїзд ____ від третього перону о двадцять першій."
        options:
          - відійшов
          - відбіг
          - відніс
        correct: 0
        explanation: Про поїзд природно сказати, що він відійшов від перону.
      - question: "До Івано-Франківська ми ____ вранці."
        options:
          - приїхали
          - прийшли
          - принесли
        correct: 0
        explanation: Приїхали означає прибуття транспортом.
      - question: "До села після пересадки ми ____ маршруткою."
        options:
          - доїхали
          - дійшли
          - донесли
        correct: 0
        explanation: Маршруткою означає транспорт, а доїхали підкреслює досягнення точки.
      - question: "У Тернополі ми ____ на інший потяг."
        options:
          - пересіли
          - перейшли
          - обійшли
        correct: 0
        explanation: Зміна транспорту - це пересісти.
      - question: "Автобус ____ центр і зупинився біля парку."
        options:
          - проїхав
          - прийшов
          - добіг
        correct: 0
        explanation: Проїхав означає проїхав через місце або повз нього.
      - question: "Після поселення ми ____ до музею."
        options:
          - пішли
          - поїли
          - понесли
        correct: 0
        explanation: Пішли означає вирушили пішки.
      - question: "Біля площі ми ____ до кав'ярні на десять хвилин."
        options:
          - зайшли
          - вийшли
          - від'їхали
        correct: 0
        explanation: Зайшли означає увійшли або коротко зупинилися всередині.
      - question: "На наступній зупинці треба ____ з трамвая."
        options:
          - вийти
          - прийти
          - довезти
        correct: 0
        explanation: З транспорту виходять.
      - question: "Увечері ми ____ старий центр міста."
        options:
          - обійшли
          - від'їхали
          - привезли
        correct: 0
        explanation: Обійшли означає пройшли навколо або різними вулицями центру.
      - question: "Підійдіть ____ каси номер два."
        options:
          - до
          - на
          - через
        correct: 0
        explanation: Підійти до каси - модель до + родовий.
      - question: "Ми подорожували ____."
        options:
          - Україною
          - Україну
          - Україні
        correct: 0
        explanation: "Маршрут територією можна передати орудним відмінком: Україною."
  - id: act-2
    type: fill-in
    title: Квитки й розклад
    instruction: Доповніть репліки природним словом або формою.
    items:
      - sentence: "Один ____ до Львова, будь ласка."
        answer: квиток
        options:
          - квиток
          - перон
          - багаж
        explanation: У касі купують квиток.
      - sentence: "Мені потрібен ____ квиток на неділю."
        answer: зворотний
        options:
          - зворотний
          - перонний
          - багажний
        explanation: Зворотний квиток - квиток назад.
      - sentence: "Де можна подивитися ____ руху?"
        answer: розклад
        options:
          - розклад
          - маршрутку
          - провулок
        explanation: Усталена фраза - розклад руху.
      - sentence: "Поїзд відходить з третьої ____."
        answer: платформи
        options:
          - платформи
          - валізи
          - пересадки
        explanation: "Після з потрібен родовий відмінок: з платформи."
      - sentence: "Пасажири вийшли на ____ після оголошення."
        answer: перон
        options:
          - перон
          - рейс
          - хостел
        explanation: Перон - місце посадки й виходу біля поїзда.
      - sentence: "До центру можна доїхати ____ номер шість."
        answer: маршруткою
        options:
          - маршруткою
          - купе
          - валізою
        explanation: Засіб пересування часто стоїть в орудному відмінку.
      - sentence: "У Тернополі в нас буде коротка ____."
        answer: пересадка
        options:
          - пересадка
          - пам'ятка
          - платформа
        explanation: Пересадка - зміна транспорту під час маршруту.
      - sentence: "Де ____ на рейс до Відня?"
        answer: реєстрація
        options:
          - реєстрація
          - екскурсія
          - зупинка
        explanation: В аеропорту питають про реєстрацію на рейс.
      - sentence: "Посадка ____ о чотирнадцятій тридцять."
        answer: починається
        options:
          - починається
          - відходить
          - доїжджає
        explanation: Посадка починається, а не відходить.
      - sentence: "Рейс ____ на сорок хвилин."
        answer: затримується
        options:
          - затримується
          - заходить
          - об'їжджає
        explanation: Про запізнення рейсу кажуть затримується.
      - sentence: "Ваш ____ можна здати біля стійки."
        answer: багаж
        options:
          - багаж
          - краєвид
          - маршрут
        explanation: У багаж здають речі для перевезення.
      - sentence: "Після прикордонного контролю покажіть ____ паспорт."
        answer: закордонний
        options:
          - закордонний
          - зворотний
          - сидячий
        explanation: Для міжнародної подорожі потрібен закордонний паспорт.
  - id: act-3
    type: match-up
    title: Пам'ятки й міста
    instruction: Поєднайте пам'ятку або місце з містом чи регіоном.
    pairs:
      - left: Софійський собор
        right: Київ
      - left: Хрещатик
        right: Київ
      - left: площа Ринок
        right: Львів
      - left: Високий Замок
        right: Львів
      - left: Приморський бульвар
        right: Одеса
      - left: Театр опери та балету
        right: Одеса
      - left: Говерла
        right: Карпати
      - left: водоспад Пробій
        right: Яремче
      - left: замок Паланок
        right: Мукачево
      - left: Ужгородський замок
        right: Ужгород
      - left: фортеця
        right: Кам'янець-Подільський
      - left: Антонієві печери
        right: Чернігів
  - id: act-4
    type: group-sort
    title: Транспортна лексика
    instruction: Розподіліть слова за сферою подорожі.
    groups:
      - label: Залізниця
        items:
          - купе
          - плацкарт
          - перон
      - label: Міський і автомобільний транспорт
        items:
          - маршрутка
          - тролейбус
          - таксі
      - label: Повітряна подорож
        items:
          - рейс
          - посадка
          - реєстрація
      - label: Вода і маршрут
        items:
          - пором
          - пристань
          - човен
  - id: act-5
    type: error-correction
    title: Редагування туристичної мови
    instruction: Знайдіть і виправте кальку або неприродний вислів у кожному реченні.
    items:
      - sentence: "Автобус відправляється з автостанції о сьомій."
        error: відправляється
        correction: "Автобус виїжджає з автостанції о сьомій."
        error_type: register
        explanation: Для автобуса природніше виїжджає або вирушає.
      - sentence: "Поїзд відправляється від третього перону."
        error: відправляється
        correction: "Поїзд відходить від третього перону."
        error_type: register
        explanation: "Для поїзда нормативно й природно: поїзд відходить."
      - sentence: "Ми їхали на поїзді до Львова."
        error: "на поїзді"
        correction: "Ми їхали поїздом до Львова."
        error_type: construction
        explanation: Засіб пересування часто передаємо орудним відмінком без прийменника.
      - sentence: "Вони подорожували на Україні два тижні."
        error: "на Україні"
        correction: "Вони подорожували в Україні два тижні."
        error_type: construction
        explanation: Для держави Україна потрібен прийменник в/у.
      - sentence: "З вікна готелю відкривався гарний вид на місто."
        error: вид
        correction: "З вікна готелю відкривався гарний краєвид на місто."
        error_type: word
        explanation: У туристичному описі природніше краєвид.
      - sentence: "У номері були всі удобства."
        error: удобства
        correction: "У номері були всі вигоди."
        error_type: word
        explanation: Слово удобства є росіянізмом; в українській мові використовують вигоди або зручності.
      - sentence: "Велике дякую за екскурсію."
        error: "Велике дякую"
        correction: "Дуже дякую за екскурсію."
        error_type: phrase
        explanation: "Дякую підсилюємо прислівником: дуже, щиро, красно."
      - sentence: "У даному випадку краще купити зворотний квиток."
        error: "У даному випадку"
        correction: "У цьому випадку краще купити зворотний квиток."
        error_type: phrase
        explanation: У цьому випадку - природна українська конструкція.
      - sentence: "Я прийшов до Одеси автобусом."
        error: прийшов
        correction: "Я приїхав до Одеси автобусом."
        error_type: word
        explanation: Автобусом означає транспорт, тому приїхав.
      - sentence: "Ми доїхали до Яремче."
        error: Яремче
        correction: "Ми доїхали до Яремча."
        error_type: word
        explanation: "Після до потрібен родовий відмінок: до Яремча."
      - sentence: "Підійдіть на касу номер два."
        error: "на касу"
        correction: "Підійдіть до каси номер два."
        error_type: construction
        explanation: Наближення до точки - до + родовий.
      - sentence: "Після пересадки ми перешли на інший автобус."
        error: перешли
        correction: "Після пересадки ми пересіли на інший автобус."
        error_type: word
        explanation: Зміна транспорту - пересіли; форма перешли ненормативна.
workbook:
  - id: wb-1
    type: cloze
    title: Подорожній день
    instruction: Заповніть пропуски дієсловами руху й транспортною лексикою.
    text: "У п'ятницю ми {{1}} з Києва вечірнім потягом. Поїзд {{2}} від перону вчасно, і ми швидко знайшли своє {{3}}. Уранці ми {{4}} до Івано-Франківська, а там {{5}} на автобус до Яремча. Автобус {{6}} кілька сіл і нарешті {{7}} до центру містечка. Від {{8}} ми пішли до готелю пішки, бо хотіли подивитися на річку. Після поселення {{9}} до кав'ярні, потім {{10}} старий центр і {{11}} до водоспаду. Увечері перевірили {{12}} руху на завтра."
    blanks:
      - id: 1
        answer: виїхали
        options:
          - виїхали
          - вийшли
          - винесли
      - id: 2
        answer: відійшов
        options:
          - відійшов
          - відбіг
          - відніс
      - id: 3
        answer: купе
        options:
          - купе
          - зупинку
          - рейс
      - id: 4
        answer: приїхали
        options:
          - приїхали
          - прийшли
          - принесли
      - id: 5
        answer: пересіли
        options:
          - пересіли
          - перейшли
          - перебігли
      - id: 6
        answer: проїхав
        options:
          - проїхав
          - прийшов
          - проплив
      - id: 7
        answer: доїхав
        options:
          - доїхав
          - дійшов
          - доніс
      - id: 8
        answer: зупинки
        options:
          - зупинки
          - пам'ятки
          - валізи
      - id: 9
        answer: зайшли
        options:
          - зайшли
          - заїхали
          - занесли
      - id: 10
        answer: обійшли
        options:
          - обійшли
          - об'їли
          - обнесли
      - id: 11
        answer: підійшли
        options:
          - підійшли
          - під'їли
          - піднесли
      - id: 12
        answer: розклад
        options:
          - розклад
          - квиток
          - перон
  - id: wb-2
    type: translate
    title: Фрази для подорожі
    instruction: Оберіть природний український переклад.
    items:
      - source: "We traveled across Ukraine by train."
        options:
          - text: "Ми подорожували Україною поїздом."
            correct: true
          - text: "Ми подорожували на Україні на поїзді."
            correct: false
        explanation: Україною та поїздом - природні орудні форми.
      - source: "How do I get to the railway station?"
        options:
          - text: "Як дістатися до вокзалу?"
            correct: true
          - text: "Як дістатися на вокзалі?"
            correct: false
        explanation: У нейтральному запитанні про пункт призначення правильна модель до + родовий або на + знахідний; на вокзалі означає місце, а не напрямок.
      - source: "The bus leaves the station at seven."
        options:
          - text: "Автобус виїжджає з автостанції о сьомій."
            correct: true
          - text: "Автобус відправляється з автостанції о сьомій."
            correct: false
        explanation: Виїжджає або вирушає краще для автобуса.
      - source: "The train departs from the third platform."
        options:
          - text: "Поїзд відходить від третьої платформи."
            correct: true
          - text: "Поїзд відправляється з третьої платформи."
            correct: false
        explanation: "Для поїзда природно: відходить."
      - source: "We changed trains in Ternopil."
        options:
          - text: "У Тернополі ми пересіли на інший потяг."
            correct: true
          - text: "У Тернополі ми перейшли на інший потяг."
            correct: false
        explanation: Зміна транспорту - пересісти.
      - source: "The flight is delayed for an hour."
        options:
          - text: "Рейс затримується на годину."
            correct: true
          - text: "Рейс запізнює на годину."
            correct: false
        explanation: Рейс затримується - природна форма.
      - source: "Boarding starts at two thirty."
        options:
          - text: "Посадка починається о другій тридцять."
            correct: true
          - text: "Посадка відходить о другій тридцять."
            correct: false
        explanation: Посадка починається.
      - source: "We reached Yaremche by minibus."
        options:
          - text: "Ми доїхали до Яремча маршруткою."
            correct: true
          - text: "Ми дійшли до Яремче маршруткою."
            correct: false
        explanation: Маршруткою - доїхали; після до - Яремча.
      - source: "Turn left at the intersection."
        options:
          - text: "На перехресті поверніть ліворуч."
            correct: true
          - text: "На перехресті поверніть наліво сторону."
            correct: false
        explanation: Повернути ліворуч - природна коротка інструкція.
      - source: "The hotel has all amenities."
        options:
          - text: "У готелі є номери з усіма вигодами."
            correct: true
          - text: "У готелі є номери з усіма удобствами."
            correct: false
        explanation: "Удобствами є росіянізмом; природно: з усіма вигодами або з усіма зручностями."
      - source: "We walked around the old city."
        options:
          - text: "Ми обійшли старе місто."
            correct: true
          - text: "Ми відійшли старе місто."
            correct: false
        explanation: Обійти місто - пройти різними місцями або навколо.
      - source: "Go straight and cross the road."
        options:
          - text: "Ідіть прямо й перейдіть дорогу."
            correct: true
          - text: "Ідіть прямо й переїдьте дорогу пішки."
            correct: false
        explanation: Пішки дорогу переходять, не переїжджають.
  - id: wb-3
    type: essay-response
    title: Власна подорож Україною
    instruction: Напишіть зв'язну розповідь про реальну або вигадану поїздку Україною.
    min_words: 180
    prompt: "Опишіть маршрут Україною: планування, квитки, дорогу, пересадку, орієнтування в місті, одну пам'ятку й повернення. Використайте щонайменше десять префіксальних дієслів руху, п'ять просторових прийменників і п'ять транспортних слів. Додайте слова подорож, мандрівка, подорожувати й мандрувати."
    model_answer: "Минулого літа ми вирішили подорожувати Україною й обрали маршрут Київ - Львів - Яремче - Чернівці. Спершу я купив квитки до Львова й одразу взяв зворотний квиток, щоб не хвилюватися перед поверненням. У п'ятницю ввечері ми виїхали з Києва потягом. Поїзд відійшов від перону вчасно, а вранці ми приїхали до Львова. Після сніданку зайшли до кав'ярні біля площі Ринок, обійшли старий центр і підійшли до Високого Замку. Потім пересіли на автобус до Яремча. Дорогою проїхали кілька містечок, переїхали через міст над річкою й доїхали до зупинки біля готелю. Увечері ми вийшли на прогулянку й дійшли до водоспаду Пробій. Наступного дня маршруткою поїхали до Чернівців, де оглянули університет і запитали, як дістатися до вокзалу. Назад повернулися нічним потягом, втомлені, але дуже задоволені мандрівкою."
    rubric:
      - criteria: маршрут
        description: "Є зрозумілий порядок: планування, дорога, місце призначення, повернення."
        points: 3
      - criteria: дієслова руху
        description: Використано щонайменше десять різних префіксальних дієслів руху.
        points: 4
      - criteria: транспортна лексика
        description: Є щонайменше п'ять слів про квитки, транспорт, розклад або пересадку.
        points: 3
      - criteria: просторові конструкції
        description: "Прийменники й відмінки працюють природно: до, з, у/в, на, через, біля."
        points: 4
      - criteria: природність
        description: Текст уникає кальок на кшталт відправляється для автобуса, на Україні, на поїзді.
        points: 3
