  - id: wb-5
    type: error-correction
    title: Підсумкова редактура
    instruction: Виправте речення так, щоб воно звучало природно й точно.
    items:
      - sentence: "Я був на музей і бачив експозиція."
        error: "Я був на музей і бачив експозиція."
        correction: "Я був у музеї і бачив експозицію."
        explanation: Для місця потрібен місцевий відмінок, а бачити вимагає знахідного.
      - sentence: "Мені сподобалося вистава, бо актори були природно."
        error: "Мені сподобалося вистава, бо актори були природно."
        correction: "Мені сподобалася вистава, бо актори були природні."
        explanation: Дієслово й прикметник узгоджуються з іменниками.
      - sentence: "На Різдво ми їмо писанки і паску."
        error: "На Різдво ми їмо писанки і паску."
        correction: "На Великдень пишуть писанки й печуть паску."
        explanation: Писанки пишуть, паску печуть; обидва слова належать до великоднього контексту.
      - sentence: "На Великдень ми співаємо колядки."
        error: "На Великдень ми співаємо колядки."
        correction: "На Різдво ми співаємо колядки."
        explanation: Колядки належать до різдвяного циклу.
      - sentence: "Я думаю що цей концерт варто побачити."
        error: "Я думаю що цей концерт варто побачити."
        correction: "Я думаю, що цей концерт варто побачити."
        explanation: Перед що потрібна кома.
      - sentence: "Я б порадила цей ресторан для всі люди."
        error: "Я б порадила цей ресторан для всі люди."
        correction: "Я б порадила цей ресторан людям, які люблять регіональну кухню."
        explanation: Рекомендацію краще адресувати конкретній групі.
      - sentence: "Принесіть, будь ласка, рахунок на початку, щоб вибрати страву."
        error: "Принесіть, будь ласка, рахунок на початку, щоб вибрати страву."
        correction: "Принесіть, будь ласка, меню, щоб вибрати страву."
        explanation: На початку замовлення потрібне меню, а рахунок просять наприкінці.
      - sentence: "Івана Купала відзначають зимою з кутею."
        error: "Івана Купала відзначають зимою з кутею."
        correction: "Івана Купала відзначають улітку; у традиції згадують воду, вогонь і вінки."
        explanation: Купала належить до літнього циклу, а кутя - до Святвечора.
      - sentence: "Усі українські свята однакові і мають ті самі страви."
        error: "Усі українські свята однакові і мають ті самі страви."
        correction: "Українські свята різні, а страви й звичаї залежать від родини та громади."
        explanation: Треба уникати некоректного узагальнення.
      - sentence: "Я захоплююся фотографія і відвідую виставки."
        error: "Я захоплююся фотографія і відвідую виставки."
        correction: "Я захоплююся фотографією і відвідую виставки."
        explanation: Захоплюватися чим? - орудний відмінок.
      - sentence: "У ресторані я замовив експозицію і аудіогід."
        error: "У ресторані я замовив експозицію і аудіогід."
        correction: "У ресторані я замовив регіональну страву й узвар."
        explanation: Експозиція й аудіогід належать до музею, не до ресторану.
      - sentence: "Ми святкували Свято івана купала біля річки."
        error: "Ми святкували Свято івана купала біля річки."
        correction: "Ми святкували свято Івана Купала біля річки."
        explanation: Родове слово свято може бути з малої, а власна назва Івана Купала пишеться з великих літер.
