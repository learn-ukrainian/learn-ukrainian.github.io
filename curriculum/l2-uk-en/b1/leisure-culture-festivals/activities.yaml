version: '1.0'
module: leisure-culture-festivals
level: b1
inline:
  - id: act-1
    type: quiz
    title: Дозвілля і захоплення
    instruction: Оберіть природний варіант для розмови про вільний час.
    items:
      - question: "Що найточніше означає дозвілля?"
        options:
          - "вільний час поза роботою або навчанням"
          - "обов'язкова частина робочого дня"
          - "офіційний документ про відпустку"
        correct: 0
        explanation: Дозвілля - це вільний час, який людина може організувати сама.
      - question: "Яке речення звучить як B1-відповідь про хобі?"
        options:
          - "Я захоплююся фотографією, бо вона вчить уважно дивитися на місто."
          - "Фотографія добре."
          - "Я фотографія завжди."
        correct: 0
        explanation: У відповіді є заняття і причина.
      - question: "Яке питання природно ставити про вільний час?"
        options:
          - "Чим ти захоплюєшся?"
          - "Де твій паспорт?"
          - "Скільки коштує кома?"
        correct: 0
        explanation: Захоплюватися чимось - нормальна модель для хобі.
      - question: "Що краще завершує речення: Я рідко ходжу на концерти, зате..."
        options:
          - "часто слухаю живі записи онлайн."
          - "концерт дуже зошит."
          - "ходив би музейний квиток."
        correct: 0
        explanation: Зате вводить протиставлення або компенсацію.
      - question: "Яке слово належить до спортивної лексики?"
        options:
          - змагання
          - експозиція
          - писанка
        correct: 0
        explanation: Змагання пов'язане зі спортом або конкурсом.
      - question: "Яке слово найкраще підходить до музею?"
        options:
          - експозиція
          - сметана
          - пересадка
        correct: 0
        explanation: Експозиція - організований показ у музеї або галереї.
      - question: "Яка фраза звучить м'яко як пропозиція?"
        options:
          - "Можемо піти на виставку."
          - "Ти мусиш виставку."
          - "Виставка наказує нам."
        correct: 0
        explanation: Можемо робить пропозицію дружньою, не наказовою.
      - question: "Яке речення має причину?"
        options:
          - "Я люблю театр, бо там є жива присутність акторів."
          - "Я люблю театр і крапка."
          - "Театр був у театрі."
        correct: 0
        explanation: Сполучник бо вводить причину.
      - question: "Що означає фраза це не зовсім мій стиль?"
        options:
          - "ввічлива часткова негативна оцінка"
          - "прохання принести рахунок"
          - "назва державного свята"
        correct: 0
        explanation: Так можна обережно сказати, що щось не дуже подобається.
      - question: "Яке речення поєднує хобі й результат?"
        options:
          - "Я вишиваю невеликі орнаменти, які потім дарую друзям."
          - "Я вишиванка у столі."
          - "Орнамент завжди ресторан."
        correct: 0
        explanation: Речення пояснює, що людина робить із результатом хобі.
      - question: "Яке слово описує враження після події?"
        options:
          - зворушливо
          - автостанція
          - відмінок
        correct: 0
        explanation: Зворушливо описує емоційне враження.
      - question: "Яке речення найприродніше для планування вихідних?"
        options:
          - "Якщо квитки ще є, підемо на виставу."
          - "Квитки, бо вистава якщо є."
          - "Вихідні стоять у меню."
        correct: 0
        explanation: Якщо вводить умову, а речення має природний порядок слів.
  - id: act-2
    type: fill-in
    title: Культурна подія
    instruction: Оберіть слово або фразу, яка природно доповнює речення.
    items:
      - sentence: "Нова ____ присвячена історії міста."
        answer: експозиція
        options:
          - експозиція
          - чайові
          - пересадка
        explanation: Експозиція - музейний або виставковий показ.
      - sentence: "Після ____ глядачі довго аплодували."
        answer: вистави
        options:
          - вистави
          - меню
          - змаганням
        explanation: Вистава відмінюється як іменник жіночого роду.
      - sentence: "У галереї показали сучасний ____."
        answer: живопис
        options:
          - живопис
          - узвар
          - рахунок
        explanation: Живопис - вид образотворчого мистецтва.
      - sentence: "Мені сподобалося, що ____ не перевантажена текстом."
        answer: експозиція
        options:
          - експозиція
          - ресторан
          - колядка
        explanation: Експозиція може бути легкою або перевантаженою.
      - sentence: "На концерті звучали народні пісні й сучасні ____."
        answer: аранжування
        options:
          - аранжування
          - замовлення
          - кошики
        explanation: Аранжування - музична обробка.
      - sentence: "Це не зовсім мій стиль, ____ я розумію, чому виставка популярна."
        answer: але
        options:
          - але
          - біля
          - чи
        explanation: Але вводить протиставлення.
      - sentence: "Я б ____ цю виставу людям, які люблять психологічні історії."
        answer: порадив
        options:
          - порадив
          - рахував
          - святкувався
        explanation: Я б порадив - умовна рекомендація.
      - sentence: "У музеї можна взяти ____ українською."
        answer: аудіогід
        options:
          - аудіогід
          - паску
          - перемогу
        explanation: Аудіогід допомагає слухати пояснення в музеї.
      - sentence: "Головна ____ була дуже сильна."
        answer: роль
        options:
          - роль
          - страва
          - зупинка
        explanation: У театрі говорять про роль актора або акторки.
      - sentence: "Я не все зрозумів, ____ вистава справила на мене враження."
        answer: проте
        options:
          - проте
          - меню
          - кутя
        explanation: Проте вводить контраст і продовжує думку.
      - sentence: "Книжковий ____ проходить у центрі міста."
        answer: ярмарок
        options:
          - ярмарок
          - кошик
          - шеф-кухар
        explanation: Ярмарок - подія або ринок із продажем і зустрічами.
      - sentence: "Екскурсовод ____ історію рушника в експозиції."
        answer: пояснила
        options:
          - пояснила
          - замовилася
          - відсвяткував
        explanation: Екскурсовод пояснює інформацію відвідувачам.
  - id: act-3
    type: match-up
    title: Свята і традиції
    instruction: З'єднайте слово з природним поясненням.
    pairs:
      - left: Різдво
        right: "зимове родинне й релігійне свято"
      - left: Святвечір
        right: "вечір перед Різдвом"
      - left: колядка
        right: "різдвяна пісня-побажання"
      - left: кутя
        right: "страва Святвечора"
      - left: Великдень
        right: "весняне свято, пов'язане з паскою і писанками"
      - left: писанка
        right: "розписане великоднє яйце"
      - left: паска
        right: "святковий великодній хліб"
      - left: Івана Купала
        right: "літнє свято з мотивами води, вогню і вінків"
      - left: вінок
        right: "сплетене коло з квітів або зелені"
      - left: рушник
        right: "вишитий обрядовий або родинний текстиль"
      - left: вишиванка
        right: "сорочка з вишитим орнаментом"
      - left: ярмарок
        right: "подія з продажем виробів, їжі або книжок"
  - id: act-4
    type: group-sort
    title: Де це доречно?
    instruction: Розподіліть слова й фрази за ситуацією.
    groups:
      - label: "Культурна подія"
        items:
          - експозиція
          - вистава
          - аудіогід
          - аплодисменти
      - label: "Свято і традиція"
        items:
          - колядка
          - писанка
          - рушник
          - Святвечір
      - label: "Ресторан"
        items:
          - меню
          - замовлення
          - рахунок
          - чайові
  - id: act-5
    type: error-correction
    title: Виправте культурну фразу
    instruction: Виправте одну лексичну, прийменникову або стилістичну помилку.
    items:
      - sentence: "Ми побачимося у Різдві."
        error: "Ми побачимося у Різдві."
        correction: "Ми побачимося на Різдво."
        explanation: Для свята як події вживаємо на + знахідний.
      - sentence: "На Великдень готують кутю як головну страву Святвечора."
        error: "На Великдень готують кутю як головну страву Святвечора."
        correction: "На Різдво готують кутю як страву Святвечора."
        explanation: Кутя пов'язана зі Святвечором, не з Великоднем.
      - sentence: "Писанка - це просто будь-яке яйце."
        error: "Писанка - це просто будь-яке яйце."
        correction: "Писанка - це розписане великоднє яйце."
        explanation: Писанка має орнамент і великодній контекст.
      - sentence: "Я був на виставці, але вона дуже меню."
        error: "Я був на виставці, але вона дуже меню."
        correction: "Я був на виставці, але вона була перевантажена текстом."
        explanation: Меню належить до ресторану, не до оцінки виставки.
      - sentence: "Принесіть, будь ласка, експозицію українською."
        error: "Принесіть, будь ласка, експозицію українською."
        correction: "Принесіть, будь ласка, меню українською."
        explanation: У ресторані просять меню; експозиція належить до музею.
      - sentence: "Я захоплююся спорт, бо він дає енергію."
        error: "Я захоплююся спорт, бо він дає енергію."
        correction: "Я захоплююся спортом, бо він дає енергію."
        explanation: Захоплюватися вимагає орудного відмінка.
      - sentence: "Вистава була цікаво, бо актори говорили природно."
        error: "Вистава була цікаво, бо актори говорили природно."
        correction: "Вистава була цікава, бо актори говорили природно."
        explanation: Прикметник узгоджується зі словом вистава.
      - sentence: "Я думаю що традиції важливі."
        error: "Я думаю що традиції важливі."
        correction: "Я думаю, що традиції важливі."
        explanation: Перед що в з'ясувальному реченні потрібна кома.
      - sentence: "На День незалежності ми святкуємо 24 серпня."
        error: "На День незалежності ми святкуємо 24 серпня."
        correction: "День Незалежності святкують 24 серпня."
        explanation: У назві свята пишемо Незалежності з великої, а речення краще перебудувати.
      - sentence: "Івана Купала - це зимове свято з колядками."
        error: "Івана Купала - це зимове свято з колядками."
        correction: "Івана Купала - це літнє свято з мотивами води, вогню і вінків."
        explanation: Купальська традиція належить до літнього циклу.
      - sentence: "Я б порадив ця виставка всім."
        error: "Я б порадив ця виставка всім."
        correction: "Я б порадив цю виставку тим, хто цікавиться фотографією."
        explanation: Порадити що? - знахідний відмінок, а адресата краще уточнити.
      - sentence: "Усі українці завжди святкують однаково."
        error: "Усі українці завжди святкують однаково."
        correction: "У різних родинах і громадах святкують по-різному."
        explanation: Уникайте надмірного культурного узагальнення.
workbook:
  - id: wb-1
    type: quiz
    title: Оцінка і рекомендація
    instruction: Оберіть фразу, яка найкраще відповідає ситуації.
    items:
      - question: "Ви не все зрозуміли на виставці, але вона вас зацікавила. Що сказати?"
        options:
          - "Я не все зрозумів, проте виставка справила на мене враження."
          - "Виставка нічого і назавжди."
          - "Я не розумів, тому вона не існує."
        correct: 0
        explanation: Проте дозволяє поєднати труднощі й позитивне враження.
      - question: "Як обережно порадити подію?"
        options:
          - "Я б порадив цю виставу людям, які люблять психологічні історії."
          - "Усі мусять негайно любити це."
          - "Ця вистава для кожен без винятку."
        correct: 0
        explanation: Рекомендація має адресата і не звучить категорично.
      - question: "Що найкраще пояснює традицію?"
        options:
          - "У нашій родині на Різдво готують кутю."
          - "Усі завжди однаково кутя."
          - "Кутя - це будь-який десерт у ресторані."
        correct: 0
        explanation: Фраза обмежує твердження родинним досвідом.
      - question: "Яке речення правильно говорить про День Незалежності?"
        options:
          - "День Незалежності святкують 24 серпня."
          - "День незалежності святкують у березні."
          - "Незалежність день у меню."
        correct: 0
        explanation: Дата 24 серпня стабільна, а назва пишеться з великої літери.
      - question: "Як попросити пораду в ресторані?"
        options:
          - "Що ви порадите?"
          - "Порадьте мене рахунок."
          - "Де вистава в тарілці?"
        correct: 0
        explanation: Це проста ввічлива формула.
      - question: "Що сказати, якщо страва має бути без молочного?"
        options:
          - "Мені не можна молочне, чи можна без сметани?"
          - "Молочне концерт мені."
          - "Я буду молочний музей."
        correct: 0
        explanation: Речення чітко пояснює потребу.
      - question: "Яка фраза корисна для часткової незгоди?"
        options:
          - "Я розумію, чому тобі сподобалося, але мені ближче інший стиль."
          - "Ти неправильно відчуваєш культуру."
          - "Інший стиль заборонено."
        correct: 0
        explanation: Часткова згода підтримує розмову.
      - question: "Яке слово найкраще описує глибоке позитивне враження?"
        options:
          - зворушливо
          - багажно
          - менюйно
        correct: 0
        explanation: Зворушливо означає емоційно сильно.
      - question: "Що правильно про Івана Купала?"
        options:
          - "У підручниках його описують через воду, вогонь і вінки."
          - "Це свято з паскою й кошиком."
          - "Це день відходу поїзда від перону."
        correct: 0
        explanation: Вода, вогонь і вінки - типові купальські мотиви в джерелах.
      - question: "Яке речення має добру B1-структуру думки?"
        options:
          - "Я вважаю, що традиції живуть тоді, коли люди розуміють їхній сенс."
          - "Традиції живуть сенс коли я вважаю."
          - "Я що традиції тому."
        correct: 0
        explanation: Речення має тезу і підрядну частину.
      - question: "Що краще для культурної обережності?"
        options:
          - "У багатьох родинах на Великдень печуть паску."
          - "Абсолютно всі завжди печуть однакову паску."
          - "Паска - не українське слово ніколи."
        correct: 0
        explanation: У багатьох родинах не робить надмірного узагальнення.
      - question: "Як завершити рекомендацію після музею?"
        options:
          - "Я б порадив цей музей тим, хто цікавиться історією повсякденного життя."
          - "Музей порадив я історію для всі."
          - "Після музею тільки рахунок."
        correct: 0
        explanation: Рекомендація має зрозумілого адресата.
  - id: wb-2
    type: cloze
    title: Один день культури
    instruction: Заповніть пропуски природними словами.
    text: "У суботу ми спланували культурний маршрут. Спочатку пішли до {1}, де відкрилася нова {2}. Мене здивувало, що в залі було багато молодих {3}. Потім ми купили квитки на {4}, хоча місць залишилося небагато. Після події зайшли в {5} біля театру. Офіціант приніс {6} і порадив регіональну {7}. Я замовив {8}, бо хотів спробувати щось карпатське. Подруга взяла {9}, але попросила без сметани. За столом ми говорили про {10}, яке в нашій родині має особливе значення. Я сказав, що на {11} ми часто печемо паску. Наприкінці я залишив {12}, бо обслуговування було уважне."
    blanks:
      - id: 1
        answer: музею
        options:
          - музею
          - рахунку
          - чайових
      - id: 2
        answer: експозиція
        options:
          - експозиція
          - пересадка
          - сметана
      - id: 3
        answer: відвідувачів
        options:
          - відвідувачів
          - кошиків
          - шеф-кухарів
      - id: 4
        answer: виставу
        options:
          - виставу
          - меню
          - писанку
      - id: 5
        answer: ресторан
        options:
          - ресторан
          - вінок
          - аудіогід
      - id: 6
        answer: меню
        options:
          - меню
          - виставу
          - колядку
      - id: 7
        answer: страву
        options:
          - страву
          - роль
          - скульптуру
      - id: 8
        answer: банош
        options:
          - банош
          - Святвечір
          - експозицію
      - id: 9
        answer: деруни
        options:
          - деруни
          - рушник
          - концерт
      - id: 10
        answer: Різдво
