version: '1.0'
module: comprehensive-b1-review
level: b1
inline:
  - id: act-1
    type: reading
    title: Діагностичний маршрут
    text: |
      Перед повторенням Олена переглянула свої старі тексти й помітила цікаву річ. Вона майже не помилялася у простих реченнях, але уникала умовного способу, дієприкметників і непрямої мови. У листах до викладачки вона писала грамотно, проте часто забувала кличний відмінок. У розповідях про подорожі вона використовувала багато дієслів руху, але не завжди розрізняла доїхати, приїхати й зайти. Тому Олена не стала повторювати весь B1 однаково. Вона склала коротку карту: що вміє впевнено, де має часткову готовність, а де бачить слабке місце.
    tasks:
      - Назвіть дві активні помилки або зони уникнення.
      - Поясніть, чому повне перечитування всіх модулів було б менш корисним.
      - Запишіть одну тему, яку Олена має повторити перед пробним екзаменом.
  - id: act-2
    type: quiz
    title: Швидка перевірка морфології
    instruction: Оберіть відповідь, яка найточніше пояснює форму.
    items:
      - question: Чому у формі "у книзі" з'являється з?
        options:
          - text: Через чергування г/з перед закінченням місцевого відмінка.
            correct: true
          - text: Бо слово завжди має основу на з.
            correct: false
          - text: Бо це форма множини.
            correct: false
          - text: Бо прийменник у змінює приголосний автоматично.
            correct: false
        explanation: Книга має чергування г/з у формі місцевого відмінка.
      - question: Яке словосполучення нормативно узгоджене?
        options:
          - text: з новим гуртожитком
            correct: true
          - text: з новий гуртожиток
            correct: false
          - text: з новому гуртожитку
            correct: false
          - text: з нового гуртожитком
            correct: false
        explanation: Після з у значенні сумісності або інструмента потрібен орудний.
      - question: Яка форма природна для звертання?
        options:
          - text: Пане Іване
            correct: true
          - text: Пан Іван
            correct: false
          - text: Пана Івана
            correct: false
          - text: Пану Івану
            correct: false
        explanation: У звертанні потрібен кличний відмінок.
  - id: act-3
    type: fill-in
    title: Вид і рух у контексті
    instruction: Оберіть форму, яка найкраще відповідає ситуації.
    items:
      - sentence: "Щосереди ми ____ до мовного клубу після роботи."
        answer: ходили
        options:
          - ходили
          - пішли
          - зайшли
          - дійшли
        explanation: Щосереди показує повторюваний рух.
      - sentence: "Учора ми нарешті ____ до нового корпусу університету."
        answer: дійшли
        options:
          - ходили
          - дійшли
          - виходили
          - переходили
        explanation: Дійшли означає досягли місця пішки.
      - sentence: "Якби я ____ більше часу, я повторив би умовний спосіб."
        answer: мав
        options:
          - мав
          - матиму
          - маю
          - мати
        explanation: Якби вводить нереальну умову з формою минулого часу.
      - sentence: "Будь ласка, ____ інструкцію перед початком роботи."
        answer: прочитайте
        options:
          - прочитайте
          - читати
          - читаєте
          - прочитали
        explanation: Ввічливе прохання потребує наказового способу.
  - id: act-4
    type: match-up
    title: Словотвір і функція
    instruction: Поєднайте форму зі значенням або моделлю.
    pairs:
      - left: читання
        right: віддієслівний іменник від читати
      - left: міський
        right: прикметник від іменника місто
      - left: найважливіший
        right: найвищий ступінь прикметника
      - left: швидше
        right: вищий ступінь прислівника
      - left: мамин
        right: присвійний прикметник
  - id: act-5
    type: group-sort
    title: Відмінкова рамка
    instruction: Розподіліть словосполучення за головним граматичним сигналом.
    groups:
      - name: Родовий
        items:
          - немає часу
          - до університету
          - біля бібліотеки
      - name: Давальний
        items:
          - мені двадцять років
          - завдяки підтримці
          - студентові потрібно повторити
      - name: Орудний
        items:
          - працюю перекладачем
          - з новим викладачем
          - перед заняттям
  - id: act-6
    type: error-correction
    title: Інтегроване редагування
    instruction: Знайдіть помилку й оберіть нормативний варіант.
    items:
      - sentence: "Якщо б я мав більше часу, я повторив би дієслова руху."
        error: "Якщо б"
        answer: "Якби я мав більше часу, я повторив би дієслова руху."
        options:
          - "Якби я мав більше часу, я повторив би дієслова руху."
          - "Якщо я мав більше часу, я повторив би дієслова руху."
          - "Якщо матиму більше часу, я повторив би дієслова руху."
        explanation: Для нереальної умови потрібне якби.
      - sentence: "Повертаючись додому, почався сильний дощ."
        error: "Повертаючись додому"
        answer: "Коли я повертався додому, почався сильний дощ."
        options:
          - "Коли я повертався додому, почався сильний дощ."
          - "Повернувшись додому, почався сильний дощ."
          - "Повертаючись додому, дощ починався сильний."
        explanation: Дієприслівниковий зворот має стосуватися суб'єкта основної дії.
      - sentence: "Шановний пан Іван, прошу надіслати довідку."
        error: "пан Іван"
        answer: "Шановний пане Іване, прошу надіслати довідку."
        options:
          - "Шановний пане Іване, прошу надіслати довідку."
          - "Шановного пана Івана, прошу надіслати довідку."
          - "Шановному пану Івану, прошу надіслати довідку."
        explanation: У звертанні потрібен кличний відмінок.
  - id: act-7
    type: essay-response
    title: Особиста карта повторення
    instruction: Складіть короткий план самодіагностики перед пробним екзаменом.
    source_reading: act-1
    prompt: "Напишіть 160-220 слів: що ви вже використовуєте впевнено, які дві-три теми є слабким місцем, як ви будете їх закріплювати протягом тижня. Використайте слова повторення, самодіагностика, інтегрований, прогалина, готовність."
    min_words: 160
    model_answer: "Після повторення я бачу, що впевнено використовую минулий і майбутній час, базові відмінки після частих прийменників і прості складнопідрядні речення з тому що та якщо. Моє слабке місце - дієслова руху з префіксами, особливо різниця між доїхати, приїхати й заїхати. Друга прогалина - кличний відмінок в офіційних листах. Третя зона - дієприслівникові звороти, бо я іноді не контролюю суб'єкт. Протягом тижня я хочу закріпити ці теми через інтегрований текст: напишу лист, коротку розповідь про маршрут і абзац із самодіагностикою. Потім перевірю кожну роботу за списком помилок. Такий план показує реальну готовність краще, ніж загальне перечитування всіх правил."
workbook:
  - id: wb-1
    type: quiz
    title: Що повторювати далі
    instruction: Оберіть найкращу дію після діагностики.
    items:
      - question: Учень правильно впізнає умовний спосіб, але не використовує його у власних текстах. Що робити?
        options:
          - text: Написати короткий текст із двома реальними й двома нереальними умовами.
            correct: true
          - text: Перечитати весь рівень B1 від початку.
            correct: false
          - text: Уникати умовних речень у пробному екзамені.
            correct: false
        explanation: Уникнення треба перетворити на контрольоване вживання.
      - question: У більшості помилок після прийменників неправильний відмінок. Який план найточніший?
        options:
          - text: Повторити прийменники разом із питаннями й власними прикладами.
            correct: true
          - text: Вчити лише називний відмінок.
            correct: false
          - text: Замінити всі прийменники простими реченнями.
            correct: false
        explanation: Помилка стосується рамки прийменника.
  - id: wb-2
    type: fill-in
    title: Числівники й займенники
    instruction: Оберіть правильну форму.
    items:
      - sentence: "У групі було двадцять два ____."
        answer: студенти
        options:
          - студенти
          - студентів
          - студентами
        explanation: Після двадцять два потрібна форма як після два.
      - sentence: "Ми говорили про ____ після заняття."
        answer: них
        options:
          - них
          - вони
          - їм
        explanation: Після прийменника про потрібен знахідний, для вони форма них.
      - sentence: "____ не відповів на повідомлення."
        answer: Ніхто
        options:
          - Ніхто
          - Нікого
          - Ніким
        explanation: У ролі підмета потрібен називний.
  - id: wb-3
    type: group-sort
    title: Стиль і регістр
    instruction: Розподіліть речення за регістром.
    groups:
      - name: Офіційний
        items:
          - Прошу зареєструвати мене на консультацію.
          - Відповідно до графіка зустріч відбудеться завтра.
          - З повагою, Олена Коваль.
      - name: Розмовний
        items:
          - Скинь мені, будь ласка, посилання.
          - Ого, я зовсім забув про дедлайн.
          - Давай зустрінемося після пари.
  - id: wb-4
    type: error-correction
    title: Типові B1-помилки
    instruction: Виберіть виправлений варіант.
    items:
      - sentence: "Це більш зручніший спосіб повторення."
        error: "більш зручніший"
        answer: "Це зручніший спосіб повторення."
        options:
          - "Це зручніший спосіб повторення."
          - "Це більш зручніший спосіб повторення."
          - "Це самий зручний спосіб повторення."
        explanation: Не поєднуємо просту й складену форми вищого ступеня.
      - sentence: "Я приймав участь у дискусії."
        error: "приймав участь"
        answer: "Я брав участь у дискусії."
        options:
          - "Я брав участь у дискусії."
          - "Я приймав участь у дискусії."
          - "Я прийняв участь у дискусії."
        explanation: Нормативна українська конструкція - брати участь.
  - id: wb-5
    type: essay-response
    title: Інтегрований абзац
    instruction: Напишіть і відредагуйте абзац із контрольними точками B1.
    prompt: "Напишіть 180-220 слів про підготовку до українського заходу. Використайте одне префіксальне дієслово руху, один числівник з іменником, одну нереальну умову, одне вставне слово, одне речення з непрямою мовою й одне офіційне або розмовне звертання."
    min_words: 180
    model_answer: "Минулого тижня наша група готувала зустріч для нових студентів. Спочатку ми зайшли до бібліотеки, бо хотіли знайти тиху аудиторію, але там уже працювали дві групи. Марко сказав, що може домовитися з адміністраторкою, а я підготувала коротку інструкцію для учасників. Якби ми почали підготовку раніше, то мали б більше часу на афішу. На щастя, викладачка порадила простий план: знайомство, практичні питання й коротка дискусія. У повідомленні я написала: Друзі, приходьте за десять хвилин до початку, щоб ми встигли роздати матеріали. Після зустрічі я перевірила текст і виправила два слабкі місця: форму числівника та кому після вставного слова."
