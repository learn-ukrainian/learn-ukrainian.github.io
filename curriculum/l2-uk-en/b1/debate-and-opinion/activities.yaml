version: '1.0'
module: debate-and-opinion
level: b1
inline:
  - id: act-1
    type: quiz
    title: Теза чи тема
    instruction: Оберіть варіант, який є тезою, а не просто темою.
    items:
      - question: Який варіант є тезою?
        options:
          - text: "Громадський транспорт."
            correct: false
          - text: "Місту потрібно збільшити кількість вечірніх рейсів громадського транспорту."
            correct: true
          - text: "Автобуси, тролейбуси, метро."
            correct: false
          - text: "Цікава проблема транспорту."
            correct: false
        explanation: Теза формулює позицію, яку можна доводити.
      - question: Яка теза найконкретніша?
        options:
          - text: "Освіта важлива."
            correct: false
          - text: "Університетам варто відкривати бібліотеки ввечері, бо багато студентів працюють удень."
            correct: true
          - text: "Бібліотеки."
            correct: false
          - text: "Навчання має багато сторін."
            correct: false
        explanation: Конкретна теза має дію, адресата і причину.
      - question: Яке речення більше схоже на аргумент?
        options:
          - text: "Велоінфраструктура потрібна, бо вона зменшує кількість коротких автомобільних поїздок."
            correct: true
          - text: "Велоінфраструктура - це велоінфраструктура."
            correct: false
          - text: "Я люблю велосипеди."
            correct: false
          - text: "Усі говорять про велосипеди."
            correct: false
        explanation: Аргумент пояснює, чому теза має сенс.
  - id: act-2
    type: fill-in
    title: Підрядні речення в аргументі
    instruction: Оберіть сполучник або конструкцію, яка найкраще передає зв'язок.
    items:
      - sentence: "Цю програму варто підтримати, ____ вона допомагає новим студентам швидше адаптуватися."
        answer: тому що
        options:
          - тому що
          - хоча
          - щоб
          - якщо
        explanation: Тут потрібна причина.
      - sentence: "Потрібно змінити графік, ____ працівники могли добиратися додому безпечно."
        answer: щоб
        options:
          - щоб
          - бо
          - хоча
          - попри те що
        explanation: Тут потрібна мета.
      - sentence: "____ бюджет обмежений, варто почати з найважливіших маршрутів."
        answer: Якщо
        options:
          - Якщо
          - Оскільки
          - Отже
          - По-перше
        explanation: Це умова, за якої пропонується рішення.
      - sentence: "____ ремонт дорогий, він підвищить безпеку."
        answer: Хоча
        options:
          - Хоча
          - Щоб
          - Тому що
          - Якщо
        explanation: Тут визнається перешкода, але позиція зберігається.
      - sentence: "Я вважаю, ____ ця пропозиція має практичний сенс."
        answer: що
        options:
          - що
          - якщо
          - щоб
          - хоча
        explanation: Після дієслова думки потрібен сполучник що.
  - id: act-3
    type: match-up
    title: Логічні помилки
    instruction: Поєднайте помилку з прикладом.
    pairs:
      - left: підміна тези
        right: Обговорюють бібліотеки, а відповідь переходить на любов до електронних книжок.
      - left: аргумент до особи
        right: Ти студент, тому твоя думка про транспорт неважлива.
      - left: хибна дилема
        right: Або будуємо нову дорогу, або місто зупиниться.
      - left: поспішне узагальнення
        right: Один автобус запізнився, отже весь транспорт не працює.
      - left: апеляція до більшості
        right: Усі так кажуть, отже це правда.
  - id: act-4
    type: error-correction
    title: Ремонт аргументу
    instruction: Знайдіть слабке місце і виберіть точніший варіант.
    items:
      - sentence: "Усі учні нічого не роблять через телефони."
        error: "Усі"
        correction: "частина учнів"
        error_type: word
        explanation: Абсолютне всі легко спростувати; точніше обмежити тезу.
      - sentence: "Ви не можете говорити про транспорт, бо ви студент."
        error: "бо ви студент"
        correction: "бо ваш приклад не показує загальної тенденції"
        error_type: phrase
        explanation: Треба відповідати на аргумент, а не атакувати людину.
      - sentence: "Або ми заборонимо всі телефони, або навчання зникне."
        error: "Або"
        correction: "Можна обмежити використання телефонів під час контрольних"
        error_type: phrase
        explanation: Є більше ніж два варіанти рішення.
      - sentence: "Моя подруга не отримала місця, отже система повністю провалилася."
        error: "повністю провалилася"
        correction: "має проблему, яку треба перевірити ширшими даними"
        error_type: phrase
        explanation: Один приклад показує проблему, але не доводить весь масштаб.
      - sentence: "В мою думку, це робить сенс."
        error: "В мою думку"
        correction: "На мою думку"
        error_type: phrase
        explanation: "Українською природно: на мою думку, це має сенс."
  - id: act-5
    type: select
    title: Відповіді в дискусії
    instruction: Оберіть відповідь, яка заперечує точно й без грубості.
    items:
      - question: Опонент каже, що вечірня бібліотека занадто дорога. Яка відповідь найкраща?
        options:
          - text: "Ви нічого не розумієте."
            correct: false
          - text: "Я погоджуюся, що бюджет важливий, але можна почати з двох вечорів на тиждень."
            correct: true
          - text: "Це дурниця."
            correct: false
          - text: "Усі нормальні люди підтримують бібліотеки."
            correct: false
        explanation: Відповідь визнає частину аргументу й пропонує межу.
      - question: Як коректно уточнити позицію опонента?
        options:
          - text: "Чи правильно я розумію, що ви проти цієї пропозиції через витрати?"
            correct: true
          - text: "Ви точно проти всього корисного."
            correct: false
          - text: "Я навіть не слухатиму цю позицію."
            correct: false
          - text: "Ви маєте погану думку."
            correct: false
        explanation: Уточнення допомагає не підмінити тезу.
      - question: Яке часткове погодження звучить природно?
        options:
          - text: "Загалом ви маєте рацію, але висновок потребує уточнення."
            correct: true
          - text: "Ви маєте рацію і не маєте рацію без причини."
            correct: false
          - text: "Я заперечую вас як людину."
            correct: false
          - text: "Ваш аргумент не існує."
            correct: false
        explanation: Часткове погодження називає межу незгоди.
  - id: act-6
    type: essay-response
    title: План есе-міркування
    instruction: Складіть план короткого есе за моделлю теза - аргументи - висновок.
    prompt: "Тема: Чи варто школам і університетам мати день без домашніх завдань? Складіть план на 120-160 слів: теза, два аргументи, приклад до кожного аргументу, можливе заперечення і висновок. Використайте принаймні дві конструкції: тому що, щоб, якщо, хоча."
    min_words: 120
    model_answer: "Теза: закладам освіти варто мати один день без домашніх завдань, якщо це не зменшує регулярну практику. Перший аргумент: такий день допомагає учням відпочити, тому що постійне перевантаження знижує увагу. Наприклад, після кількох вечорів із великими завданнями учень часто працює механічно. Другий аргумент: день без завдань можна використати для читання, спорту або сімейного часу, щоб навчання не витісняло інші потреби. Можливе заперечення: без домашньої роботи учні менше повторюватимуть матеріал. Відповідь: якщо завдання в інші дні короткі й продумані, практика залишиться регулярною. Висновок: важлива не щоденна кількість завдань, а баланс між навчанням і відновленням."
    peer_review_guidelines:
      - Перевірте, чи теза є позицією, а не темою.
      - Знайдіть два аргументи й приклади до них.
      - Перевірте, чи заперечення не руйнує, а уточнює позицію.
    rubric:
      - criteria: Структура
        description: Є теза, два аргументи, приклади і висновок.
        points: 4
      - criteria: Мовні засоби
        description: Використано підрядні речення і конектори.
        points: 3
      - criteria: Логіка
        description: Немає грубих логічних помилок і кальок.
        points: 3
workbook:
  - id: wb-1
    type: group-sort
    title: Частини аргументації
    instruction: Розподіліть речення за роллю.
    groups:
      - label: Теза
        items:
          - Місту варто відкрити більше безпечних веломаршрутів.
          - Домашні завдання мають бути короткими, але регулярними.
      - label: Аргумент
        items:
          - Це зменшить кількість коротких автомобільних поїздок.
          - Коротка практика допомагає закріпити матеріал без перевантаження.
      - label: Приклад
        items:
          - Наприклад, дорога до університету може займати 15 хвилин велосипедом.
          - П'ять вправ після уроку швидко показують, чи тему зрозуміли.
      - label: Висновок
        items:
          - Отже, важлива не кількість, а якість практики.
          - Саме тому веломаршрути є частиною зручного міста.
  - id: wb-2
    type: cloze
    title: Конектори в абзаці
    instruction: Заповніть пропуски логічними зв'язками.
    text: "{1}, місту потрібні вечірні бібліотеки. {2}, багато студентів працюють удень і можуть прийти лише після шостої. {3}, вечірній графік не обов'язково має бути щоденним. {4} бюджет обмежений, можна почати з двох вечорів на тиждень. {5}, така зміна зробить ресурси доступнішими."
    blanks:
      - id: 1
        answer: На мою думку
        options:
          - На мою думку
          - В мою думку
          - Через те
          - Якщо
      - id: 2
        answer: По-перше
        options:
          - По-перше
          - Хоча
          - Щоб
          - Натомість
      - id: 3
        answer: Водночас
        options:
          - Водночас
          - Тому що
          - Або
          - Ніхто
      - id: 4
        answer: Якщо
        options:
          - Якщо
          - Щоб
          - Бо
          - Отже
      - id: 5
        answer: Отже
        options:
          - Отже
          - Хоча
          - Якщо
          - Проте
  - id: wb-3
    type: translate
    title: Антикальки аргументації
    instruction: Оберіть природний український варіант.
    items:
      - source: In my opinion, this makes sense.
        options:
          - text: "На мою думку, це має сенс."
            correct: true
          - text: "В мою думку, це робить сенс."
            correct: false
          - text: "У моєму опініоні, це робить сенс."
            correct: false
        explanation: "Українською: на мою думку; має сенс."
      - source: We took part in the discussion.
        options:
          - text: "Ми брали участь у дискусії."
            correct: true
          - text: "Ми приймали участь у дискусії."
            correct: false
          - text: "Ми робили участь у дискусії."
            correct: false
        explanation: Нормативно - брати участь.
      - source: I disagree because the example does not prove the thesis.
        options:
          - text: "Я не погоджуюся, тому що приклад не доводить тезу."
            correct: true
          - text: "Я проти вас, бо ви неправильні."
            correct: false
          - text: "Я заперечую людину через приклад."
            correct: false
        explanation: Заперечуйте аргумент, а не людину.
  - id: wb-4
    type: true-false
    title: Дискусійна точність
    instruction: Визначте, чи твердження правильне.
    items:
      - statement: Теза має формулювати позицію, яку можна доводити.
        correct: true
        explanation: Тема лише називає сферу, теза захищає думку.
      - statement: Приклад завжди повністю доводить тезу без аргументу.
        correct: false
        explanation: Приклад підтримує аргумент, але не завжди достатній сам по собі.
      - statement: Допуст допомагає визнати складність питання.
        correct: true
        explanation: Хоча... проте... показує баланс.
      - statement: Аргумент до особи є сильною формою доведення.
        correct: false
        explanation: Він атакує людину замість думки.
      - statement: Точне заперечення може бути ввічливим і сильним водночас.
        correct: true
        explanation: Сила аргументу не потребує грубості.
  - id: wb-5
    type: essay-response
    title: Мініесе з аргументацією
    instruction: Напишіть коротке есе-міркування.
    prompt: "Напишіть 180-220 слів на тему: Чи варто містам робити більше безкоштовних громадських просторів для навчання і роботи? Використайте тезу, два аргументи, приклад, одне речення допусту з хоча або попри те що, одне речення умови з якщо, і висновок."
    min_words: 180
    model_answer: "На мою думку, містам варто створювати більше безкоштовних громадських просторів для навчання і роботи. По-перше, не всі люди мають тихе місце вдома. Наприклад, студент може жити з родиною в маленькій квартирі, де складно готуватися до іспиту. Якщо в районі є бібліотека або спільний простір, така людина отримує реальну можливість працювати спокійно. По-друге, такі місця створюють зв'язки між мешканцями. Люди бачать оголошення, беруть участь у подіях, знайомляться з сусідами. Хоча утримання простору потребує грошей, користь для освіти й громади може бути більшою за витрати. Звичайно, місто має планувати графік, правила і безпеку. Отже, безкоштовні громадські простори є не розкішшю, а частиною доступного міського життя."
    peer_review_guidelines:
      - Перевірте, чи обидва аргументи підтримують тезу.
      - Знайдіть речення з якщо і хоча.
      - Позначте одну фразу, яку можна зробити точнішою.
