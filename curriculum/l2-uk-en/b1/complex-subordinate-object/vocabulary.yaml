- lemma: складнопідрядне речення
  translation: "complex sentence with subordination"
  pos: phrase
  usage: "Складнопідрядне речення має головну частину і залежну підрядну частину."
- lemma: головна частина
  translation: "main clause"
  pos: phrase
  usage: "Від головної частини ставимо питання до підрядної."
- lemma: підрядна частина
  translation: "subordinate clause"
  pos: phrase
  usage: "Підрядна частина пояснює слово або зміст головної частини."
- lemma: з'ясувальне речення
  translation: "object clause, explanatory subordinate clause"
  pos: phrase
  usage: "З'ясувальне речення відповідає на питання що? кого? чого? про що?"
- lemma: підрядний зв'язок
  translation: "subordinate connection"
  pos: phrase
  usage: "Підрядний зв'язок означає, що одна частина залежить від іншої."
- lemma: сполучник підрядності
  translation: "subordinating conjunction"
  pos: phrase
  usage: "Сполучник підрядності з'єднує частини, але не є членом підрядної частини."
- lemma: сполучне слово
  translation: "connective word, relative word"
  pos: phrase
  usage: "Сполучне слово з'єднує частини і виконує роль члена речення."
- lemma: пояснюване слово
  translation: "explained word"
  pos: phrase
  usage: "Пояснюване слово в головній частині потребує розкриття змісту."
- lemma: непрямі відмінки
  translation: "indirect cases"
  pos: phrase
  usage: "З'ясувальні підрядні часто відповідають на питання непрямих відмінків."
- lemma: прямий відмінок
  translation: "direct case, nominative-like direct question in school terminology"
  pos: phrase
  usage: "У шкільному описі з'ясувальні частини можуть відповідати і на питання прямого відмінка."
- lemma: дієслово мовлення
  translation: "verb of speech"
  pos: phrase
  usage: "Після дієслів мовлення часто стоїть підрядна частина з що або чи."
- lemma: дієслово мислення
  translation: "verb of thought"
  pos: phrase
  usage: "Думати, знати, вважати - типові дієслова мислення."
- lemma: дієслово сприйняття
  translation: "verb of perception"
  pos: phrase
  usage: "Бачити, чути, помічати можуть вводити з'ясувальні підрядні."
