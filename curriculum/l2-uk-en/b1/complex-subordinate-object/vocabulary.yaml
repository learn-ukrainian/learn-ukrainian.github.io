  pos: conjunction
  usage: "Я хочу, щоб ти перевірив джерело."
- lemma: чи
  translation: "whether"
  pos: conjunction/particle
  usage: "Запитай, чи викладачка вже надіслала план."
- lemma: хто
  translation: "who"
  pos: pronoun
  usage: "Ніхто не знає, хто залишив повідомлення."
- lemma: який
  translation: "which, what kind of"
  pos: pronoun
  usage: "Поясни, який варіант краще звучить."
- lemma: де
  translation: "where"
  pos: adverb
  usage: "Скажи, де відбудеться зустріч."
- lemma: куди
  translation: "where to"
  pos: adverb
  usage: "Я не пам'ятаю, куди поклав квитки."
- lemma: коли
  translation: "when"
  pos: adverb
  usage: "Вона запитала, коли почнеться пара."
