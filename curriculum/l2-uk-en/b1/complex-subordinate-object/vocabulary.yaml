  usage: "Кома перед підрядною частиною показує межу між частинами."
- lemma: схема речення
  translation: "sentence scheme"
  pos: phrase
  usage: "Схема [ ], (що...) допомагає побачити залежність."
- lemma: головне слово
  translation: "head word, controlling word"
  pos: phrase
  usage: "Головне слово сказав відкриває місце для змісту повідомлення."
- lemma: зміст повідомлення
  translation: "content of a message"
  pos: phrase
  usage: "Підрядна частина розкриває зміст повідомлення."
