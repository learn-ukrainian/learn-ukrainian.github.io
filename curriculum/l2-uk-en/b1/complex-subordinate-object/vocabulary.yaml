  translation: "correlative, demonstrative word"
  pos: phrase
  usage: "У конструкції про те, що слово те бере на себе форму після прийменника."
- lemma: непряме питання
  translation: "indirect question"
  pos: phrase
  usage: "Я не знаю, чи він прийде - це непряме питання."
