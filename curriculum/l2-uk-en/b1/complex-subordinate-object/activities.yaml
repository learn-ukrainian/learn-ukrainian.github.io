version: '1.0'
module: complex-subordinate-object
level: b1
inline:
  - id: act-1
    type: quiz
    title: Упізнайте з'ясувальне речення
    instruction: "Оберіть правильне пояснення структури."
    items:
      - question: "У реченні Я знаю, що ти хвилюєшся підрядна частина відповідає на питання:"
        options:
          - "що?"
          - "коли?"
          - "який?"
        correct: 0
        explanation: "Підрядна частина розкриває зміст слова знаю."
      - question: "Яке речення є складнопідрядним з'ясувальним?"
        options:
          - "Студентка сказала, що лекція почнеться о третій."
          - "Почалася лекція, і студенти зайшли до аудиторії."
          - "Лекція, яку ми слухали, була корисною."
        correct: 0
        explanation: "Частина що лекція почнеться о третій пояснює, що саме сказала студентка."
      - question: "У реченні Запитай, чи він прийде слово чи вводить:"
        options:
          - "непряме питання так/ні"
          - "умову"
          - "означення до іменника"
        correct: 0
        explanation: "Чи використовується для непрямих загальних питань."
      - question: "Яке слово найчастіше відкриває місце для з'ясувальної підрядної?"
        options:
          - "сказав"
          - "зелений"
          - "швидко"
        correct: 0
        explanation: "Дієслова мовлення часто потребують змісту повідомлення."
      - question: "У реченні Мама хоче, щоб син відпочив сполучник щоб вводить:"
        options:
          - "бажану дію іншого виконавця"
          - "місце"
          - "рівноправну другу частину"
        correct: 0
        explanation: "Хоче що? - щоб син відпочив."
      - question: "Яке речення має помилку через кальку з англійської?"
        options:
          - "Я знаю він тут."
          - "Я знаю, що він тут."
          - "Я не знаю, де він."
        correct: 0
        explanation: "В українській потрібні сполучник що і кома."
      - question: "У реченні Ти знаєш, де вона живе? знак питання стоїть у кінці, бо:"
        options:
          - "головна частина є питанням"
          - "будь-яке слово де вимагає питання"
          - "підрядна частина стоїть після коми"
        correct: 0
        explanation: "Усе речення питає: ти знаєш?"
      - question: "У реченні Я не знаю, де вона живе в кінці треба:"
        options:
          - "крапка"
          - "знак питання"
          - "тире"
        correct: 0
        explanation: "Головна частина розповідна: повідомляє про незнання."
      - question: "Яке речення правильно передає I asked if she had time?"
        options:
          - "Я запитав, чи вона має час."
          - "Я запитав, якщо вона має час."
          - "Я запитав вона має час."
        correct: 0
        explanation: "Для непрямого питання так/ні потрібне чи."
      - question: "У реченні Ми говорили про те, що дедлайн перенесли слово те потрібне, бо:"
        options:
          - "дієслово говорили має прийменник про"
          - "що не може стояти після коми"
          - "усі з'ясувальні речення потребують те"
        correct: 0
        explanation: "Про те бере на себе форму після прийменника."
      - question: "Що відрізняє складнопідрядне речення від складносурядного?"
        options:
          - "залежність однієї частини від іншої"
          - "наявність будь-якого сполучника"
          - "обов'язково три частини"
        correct: 0
        explanation: "У складнопідрядному частини нерівноправні."
      - question: "Найкращий перший крок аналізу:"
        options:
          - "знайти пояснюване слово в головній частині"
          - "замінити всі сполучники на і"
          - "прибрати кому"
        correct: 0
        explanation: "Пояснюване слово показує, чому підрядна частина з'ясувальна."
  - id: act-2
    type: match-up
    title: Пояснюване слово і підрядна частина
    instruction: "Поєднайте головну частину з природним продовженням."
    pairs:
      - left: "Я знаю,"
        right: "що ти хвилюєшся."
      - left: "Викладачка повідомила,"
        right: "що консультація буде онлайн."
      - left: "Друг запитав,"
        right: "чи я вже купив квиток."
      - left: "Ми не пам'ятаємо,"
        right: "де залишили ключі."
      - left: "Поясни,"
        right: "як оформити список джерел."
      - left: "Студентка уточнила,"
        right: "скільки сторінок треба прочитати."
      - left: "Мама хоче,"
        right: "щоб син відпочив перед іспитом."
      - left: "Організатори нагадали,"
        right: "що реєстрація триває до шостої."
      - left: "Ніхто не знає,"
        right: "хто залишив повідомлення."
      - left: "Ми говорили про те,"
        right: "що розклад знову змінився."
      - left: "Я не розумію,"
        right: "чому поїзд затримався."
      - left: "Вона сподівається на те,"
        right: "що лист прийде сьогодні."
  - id: act-3
    type: group-sort
    title: Сполучник чи сполучне слово?
    instruction: "Розподіліть приклади за роллю слова зв'язку."
    groups:
      - label: "Сполучник що"
        items:
          - "Я думаю, що зустріч буде корисною."
          - "Вона сказала, що поїзд запізнився."
          - "Ми знаємо, що команда готова."
      - label: "Сполучник щоб"
        items:
          - "Я хочу, щоб ти відпочив."
          - "Важливо, щоб усі зареєструвалися."
          - "Викладачка просить, щоб група перечитала текст."
      - label: "Сполучник чи"
        items:
          - "Запитай, чи він прийде."
          - "Я не знаю, чи лекція буде сьогодні."
          - "Студенти уточнили, чи треба друкувати заяву."
      - label: "Сполучне слово"
        items:
          - "Скажи, де ти живеш."
          - "Поясни, як це працює."
          - "Ніхто не знає, хто це зробив."
  - id: act-4
    type: error-correction
    title: Виправте кальку або кому
    instruction: "Виправте одну головну помилку в кожному реченні."
    items:
      - sentence: "Я знаю він уже вдома."
        error: "Я знаю він уже вдома"
        correction: "Я знаю, що він уже вдома"
        error_type: construction
        explanation: "Потрібні що і кома перед підрядною частиною."
      - sentence: "Він запитав, якщо я маю час."
        error: "якщо"
        correction: "чи"
        error_type: word
        explanation: "Для непрямого питання так/ні потрібне чи."
      - sentence: "Ми не розуміємо чому зустріч перенесли."
        error: "розуміємо чому"
        correction: "розуміємо, чому"
        error_type: construction
        explanation: "Перед сполучним словом чому потрібна кома."
      - sentence: "Я хочу тебе допомогти мені."
        error: "тебе допомогти"
        correction: "щоб ти допоміг"
        error_type: construction
        explanation: "Для дії іншого виконавця потрібна підрядна частина з щоб."
      - sentence: "Викладач сказав, щоб консультація буде завтра."
        error: "щоб"
        correction: "що"
        error_type: word
        explanation: "Тут передається факт повідомлення, не бажана дія."
      - sentence: "Я не знаю, якщо він прийде."
        error: "якщо"
        correction: "чи"
        error_type: word
        explanation: "Непряме питання так/ні вводимо через чи."
      - sentence: "Ми говорили про що дедлайн змінився."
        error: "про що"
        correction: "про те, що"
        error_type: phrase
        explanation: "Після прийменника про потрібне вказівне слово те."
      - sentence: "Вона сподівається, що лист прийде."
        error: "сподівається, що"
        correction: "сподівається на те, що"
        error_type: construction
        explanation: "Сподіватися керує прийменником на; у точному письмі доречне на те, що."
      - sentence: "Я довів про те, що розрахунки правильні."
        error: "довів про те, що"
        correction: "довів, що"
        error_type: phrase
        explanation: "Довести керує прямим змістом, без про те."
      - sentence: "Поясни як оформити цитату."
        error: "Поясни як"
        correction: "Поясни, як"
        error_type: construction
        explanation: "Перед підрядною частиною потрібна кома."
      - sentence: "Ти знаєш де вона живе?"
        error: "знаєш де"
        correction: "знаєш, де"
        error_type: construction
        explanation: "Перед підрядною частиною з де потрібна кома; знак питання зберігається."
      - sentence: "Я не знаю де вона живе."
        error: "знаю де"
        correction: "знаю, де"
        error_type: construction
        explanation: "Перед сполучним словом де потрібна кома; крапка зберігається."
  - id: act-5
    type: fill-in
    title: Виберіть слово зв'язку
    instruction: "Заповніть пропуск правильним сполучником, сполучним словом або формою з те."
    items:
      - sentence: "Я думаю____ ця відповідь точна."
        answer: ", що"
        options:
          - ", що"
          - "що"
          - ", чи"
        explanation: "Потрібні кома і що для змісту думки."
      - sentence: "Запитай____ викладачка вже прийшла."
        answer: ", чи"
        options:
          - ", чи"
          - ", якщо"
          - "чи"
        explanation: "Непряме питання так/ні вводить чи."
      - sentence: "Поясни____ оформити список джерел."
        answer: ", як"
        options:
          - ", як"
          - ", що"
          - "якщо"
        explanation: "Як є сполучним словом способу."
      - sentence: "Ніхто не знає____ залишив повідомлення."
        answer: ", хто"
        options:
          - ", хто"
          - "хто"
          - ", що"
        explanation: "Хто є сполучним словом і підметом у підрядній частині."
      - sentence: "Я хочу____ ти відпочив перед дорогою."
        answer: ", щоб"
        options:
          - ", щоб"
          - ", що"
          - "щоб"
        explanation: "Бажана дія іншого виконавця вводиться через щоб."
      - sentence: "Ми говорили____ дедлайн перенесли."
        answer: "про те, що"
        options:
          - "про те, що"
          - "про що"
          - ", що"
        explanation: "Говорити про вимагає про те, що."
      - sentence: "Вона сподівається____ група встигне."
        answer: "на те, що"
        options:
          - "на те, що"
          - ", чи"
          - "про те, що"
        explanation: "Сподіватися на те, що."
      - sentence: "Студентка уточнила____ сторінок треба прочитати."
        answer: ", скільки"
        options:
          - ", скільки"
          - "скільки"
          - ", щоб"
        explanation: "Скільки вводить непряме спеціальне питання."
      - sentence: "Ми не розуміємо____ поїзд затримався."
        answer: ", чому"
        options:
          - ", чому"
          - ", що"
          - "чому"
        explanation: "Чому є сполучним словом причини, перед ним кома."
      - sentence: "Викладачка повідомила____ консультацію перенесли."
        answer: ", що"
        options:
          - ", що"
          - ", щоб"
          - "що"
        explanation: "Повідомила що? - що консультацію перенесли."
      - sentence: "Я впевнений____ команда готова."
        answer: "у тому, що"
        options:
          - "у тому, що"
          - "про те, що"
          - ", чи"
        explanation: "Впевнений у тому, що."
      - sentence: "Можеш сказати____ буде зустріч?"
        answer: ", де"
        options:
          - ", де"
          - "де"
          - ", що"
        explanation: "Головна частина питає, а де вводить непряме питання місця."
workbook:
  - id: wb-1
    type: quiz
    title: "Читання: телефонна розмова перед іспитом"
    instruction: "Прочитайте мінітекст і дайте відповіді. Мама зателефонувала синові в Одесу ввечері перед іспитом. Вона запитала, чи він уже повечеряв, і сказала, що дуже хвилюється. Студент відповів, що все добре, але визнав, що повторює тему складних речень. Мама хотіла, щоб він ліг спати раніше, бо вранці треба було бути уважним. Син пояснив, що викладачка надіслала список питань, і показав, де зберіг файл із конспектом. Він не пам'ятав, куди поклав студентський квиток, тому попросив сусіда перевірити, чи він не лежить на столі. Наприкінці розмови мама нагадала про те, що сніданок важливий, а студент пообіцяв, що напише після іспиту."
    items:
      - question: "Яка підрядна частина передає непряме питання так/ні?"
        options:
          - "чи він уже повечеряв"
          - "що дуже хвилюється"
          - "де зберіг файл"
        correct: 0
        explanation: "Чи вводить непряме питання так/ні."
      - question: "У реченні сказала, що дуже хвилюється підрядна частина пояснює слово:"
        options:
          - "сказала"
          - "мама"
          - "ввечері"
        correct: 0
        explanation: "Підрядна частина розкриває зміст того, що сказала мама."
      - question: "Яка підрядна частина залежить від слова хотіла?"
        options:
          - "щоб він ліг спати раніше"
          - "бо вранці треба було бути уважним"
          - "що повторює тему"
        correct: 0
        explanation: "Хотіла чого? - щоб він ліг спати раніше."
      - question: "Яке слово зв'язку показує місце?"
        options:
          - "де"
          - "куди"
          - "чи"
        correct: 0
        explanation: "Де зберіг файл - місце зберігання."
      - question: "Яке слово зв'язку показує напрям?"
        options:
          - "куди"
          - "де"
          - "що"
        correct: 0
        explanation: "Куди поклав студентський квиток - напрям дії."
      - question: "Де в тексті використано конструкцію з вказівним словом?"
        options:
          - "про те, що сніданок важливий"
          - "що все добре"
          - "чи він не лежить на столі"
        correct: 0
        explanation: "Про те, що показує керування після нагадала про."
      - question: "Чому перед чи потрібна кома?"
        options:
          - "бо починається підрядна частина"
          - "бо чи завжди стоїть після коми в будь-якому реченні"
          - "бо це сурядний сполучник"
        correct: 0
        explanation: "Кома відділяє головну частину від підрядної."
      - question: "Чому речення Вона запитала, чи він уже повечеряв закінчується крапкою?"
        options:
          - "головна частина розповідає про запит"
          - "українська не має знака питання"
          - "чи забороняє знак питання"
        correct: 0
        explanation: "Усе речення повідомляє, що вона запитала."
      - question: "Яке пояснюване слово стоїть перед що все добре?"
        options:
          - "відповів"
          - "все"
          - "добре"
        correct: 0
        explanation: "Студент відповів що? - що все добре."
      - question: "Яке пояснюване слово стоїть перед чи він не лежить на столі?"
        options:
          - "перевірити"
          - "попросив"
          - "поклав"
        correct: 0
        explanation: "Перевірити що? - чи він не лежить на столі."
      - question: "Який приклад залежить від дієслова пам'ятати?"
        options:
          - "куди поклав студентський квиток"
          - "що викладачка надіслала список"
          - "що напише після іспиту"
        correct: 0
        explanation: "Не пам'ятав що? - куди поклав квиток."
      - question: "Яке речення найпростіше перетворити на пряму мову Студент сказав: ...?"
        options:
          - "Студент відповів, що все добре."
          - "Мама нагадала про те, що сніданок важливий."
          - "Він не пам'ятав, куди поклав квиток."
        correct: 0
        explanation: "Пряма мова: Студент відповів: Все добре."
  - id: wb-2
    type: match-up
    title: Схеми з'ясувальних речень
    instruction: "Поєднайте схему з прикладом."
    pairs:
      - left: "[Я знаю], (що...)."
        right: "Я знаю, що група готова."
      - left: "[Запитай], (чи...)."
        right: "Запитай, чи двері вже відчинені."
      - left: "[Поясни], (як...)."
        right: "Поясни, як заповнити форму."
      - left: "[Скажи], (де...)."
        right: "Скажи, де буде консультація."
      - left: "[Не пам'ятаю], (куди...)."
        right: "Не пам'ятаю, куди поклав зошит."
      - left: "[Ніхто не знає], (хто...)."
        right: "Ніхто не знає, хто надіслав лист."
      - left: "[Я хочу], (щоб...)."
        right: "Я хочу, щоб ти відпочив."
      - left: "[Ми говорили про те], (що...)."
        right: "Ми говорили про те, що розклад змінився."
      - left: "[Вона сподівається на те], (що...)."
        right: "Вона сподівається на те, що лист прийде."
      - left: "[Уточни], (скільки...)."
        right: "Уточни, скільки коштує квиток."
      - left: "[Я не розумію], (чому...)."
        right: "Я не розумію, чому програма зависла."
      - left: "[Можеш сказати], (коли...)?"
        right: "Можеш сказати, коли почнеться зустріч?"
  - id: wb-3
    type: cloze
    title: Відновіть повідомлення
    instruction: "Заповніть 12 пропусків словами зв'язку або формами з те."
