  - id: wb-5
    type: essay-response
    title: Передайте новину з'ясувальними реченнями
    instruction: "Напишіть 7-9 речень про розмову, новину або навчальну ситуацію."
    prompt: "Напишіть 7-9 речень про розмову, новину або навчальну ситуацію. Використайте щонайменше два речення з що, два з чи або сполучними словами, одне речення з щоб і одне речення з про те, що / на те, що / у тому, що. Поясніть одну кому."
    min_words: 130
    model_answer: "Учора староста повідомила, що консультацію перенесли на п'ятницю. Вона запитала, чи всі бачили нове посилання в чаті. Я не знав, де лежить файл із завданням, тому попросив Олену пояснити, як його знайти. Викладачка хотіла, щоб ми перечитали статтю перед зустріччю. Ми говорили про те, що дедлайн став коротшим, але вирішили не панікувати. Я впевнений у тому, що група встигне підготувати питання. Кома в реченні Я не знав, де лежить файл потрібна, бо частина де лежить файл є підрядною і пояснює слово знав."
    rubric:
      - criteria: Обсяг
        description: Є 7-9 речень і щонайменше 130 слів.
      - criteria: Моделі
        description: Є потрібні моделі з що, чи або сполучними словами, щоб і формою з те.
      - criteria: Пунктуація
        description: Коми перед підрядними частинами поставлено правильно.
      - criteria: Пояснення
        description: Одну кому пояснено через головну і підрядну частини.
      - criteria: Природність
        description: Текст не калькує англійські конструкції з that, if або want you to.
