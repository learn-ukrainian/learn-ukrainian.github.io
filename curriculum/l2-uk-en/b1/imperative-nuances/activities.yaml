version: '1.0'
module: imperative-nuances
level: b1
inline:
  - id: act-1
    type: quiz
    title: Який це наказ?
    instruction: Оберіть граматичне пояснення для кожної репліки.
    items:
      - question: "Іване, вийди на сцену."
        options:
          - "2-га особа однини, доконаний вид"
          - "3-тя особа з хай"
          - "1-ша особа множини"
        correct: 0
        explanation: "Вийди звертається до однієї людини на ти і називає одну завершену дію."
      - question: "Ходімо від початку сцени."
        options:
          - "1-ша особа множини, спільна дія"
          - "2-га особа множини"
          - "інфінітив у значенні наказу"
        correct: 0
        explanation: "Ходімо означає let's go і включає мовця в дію."
      - question: "Нехай публіка зачекає."
        options:
          - "3-тя особа з нехай"
          - "2-га особа однини"
          - "калька з давай"
        correct: 0
        explanation: "Нехай + зачекає виражає спонукання до третьої особи."
      - question: "Будьте уважні."
        options:
          - "2-га особа множини або ввічлива форма"
          - "1-ша особа множини"
          - "3-тя особа множини"
        correct: 0
        explanation: "Будьте звертається до групи або до однієї людини на ви."
      - question: "Хай вони підготують столи."
        options:
          - "3-тя особа множини з хай"
          - "2-га особа множини з -іть"
          - "форма минулого часу"
        correct: 0
        explanation: "Хай + підготують спрямовує дію на вони."
      - question: "Не відчиняй вікно."
        options:
          - "заборона з недоконаним видом"
          - "побажання з хай"
          - "доконаний результат"
        correct: 0
        explanation: "Для звичайної заборони свідомої дії потрібен недоконаний вид."
      - question: "Запишіть адресу, будь ласка."
        options:
          - "ввічлива 2-га особа множини, доконаний вид"
          - "1-ша особа множини"
          - "форма з хай"
        correct: 0
        explanation: "Запишіть просить одну завершену дію у ввічливій формі."
      - question: "Читай голосніше."
        options:
          - "2-га особа однини, недоконаний вид"
          - "3-тя особа однини"
          - "інфінітив"
        correct: 0
        explanation: "Читай описує процес або спосіб виконання."
      - question: "Обговорімо план."
        options:
          - "1-ша особа множини, доконаний вид"
          - "2-га особа однини"
          - "помилкова форма з давай"
        correct: 0
        explanation: "Обговорімо - нормативне let's discuss."
      - question: "Прошу не шуміти."
        options:
          - "офіційне прохання з інфінітивом"
          - "3-тя особа з нехай"
          - "пряма форма на -мо"
        correct: 0
        explanation: "Прошу + інфінітив часто звучить формально або офіційно."
      - question: "Чи не могли б ви повторити питання?"
        options:
          - "дуже ввічливе прохання"
          - "пряма заборона"
          - "побажання"
        correct: 0
        explanation: "Умовна форма могли б пом'якшує прохання."
      - question: "Тримаймося разом."
        options:
          - "1-ша особа множини з -ся"
          - "2-га особа однини"
          - "форма 3-ї особи"
        correct: 0
        explanation: "Тримаймося означає спільний заклик до групи, у якій є мовець."
  - id: act-2
    type: fill-in
    title: Форма наказового способу
    instruction: Доповніть речення правильною формою наказового способу.
    items:
      - sentence: "Марку, ____ список учасників до репетиції. (принести)"
        answer: принеси
        options:
          - принеси
          - приносити
          - хай принесе
        explanation: "До однієї людини на ти потрібна форма принеси."
      - sentence: "Друзі, ____ план разом. (обговорити)"
        answer: обговорімо
        options:
          - обговорімо
          - давайте обговоримо
          - обговорити
        explanation: "Для спільної дії нормативна форма - обговорімо."
      - sentence: "Будь ласка, ____ тихіше. (говорити)"
        answer: говоріть
        options:
          - говоріть
          - говорити
          - хай говорять
        explanation: "Ввічлива форма або множина - говоріть."
      - sentence: "____ двері, бо в кімнаті душно. (відчинити)"
        answer: відчини
        options:
          - відчини
          - відчиняй
          - не відчиняй
        explanation: "Для одного конкретного результату потрібен доконаний вид."
      - sentence: "____ двері, коли починається вистава. (не відчиняти)"
        answer: не відчиняй
        options:
          - не відчиняй
          - не відчини
          - відчини
        explanation: "Звичайна заборона вимагає недоконаного виду."
      - sentence: "____ уважні під час інструктажу. (бути)"
        answer: будьте
        options:
          - будьте
          - будь
          - хай буде
        explanation: "До групи або ввічливо до однієї людини кажемо будьте."
      - sentence: "____ на це фото. (глянути)"
        answer: глянь
        options:
          - глянь
          - глян
          - гляньтеся
        explanation: "Після н у цій формі пишемо м'який знак."
      - sentence: "____ на сцену зліва. (вийти)"
        answer: вийди
        options:
          - вийди
          - виходити
          - хай вийдуть
        explanation: "Вийди - наказ одній людині виконати одну дію."
      - sentence: "____ ці квіти на підвіконня. (поставити, ми)"
        answer: поставмо
        options:
          - поставмо
          - поставьмо
          - поставімо
        explanation: "Після губного в м'який знак не пишемо."
      - sentence: "____ листа сьогодні до п'ятої. (надіслати, ви)"
        answer: надішліть
        options:
          - надішліть
          - надіслати
          - хай надішле
        explanation: "Ввічлива або множинна форма має закінчення -іть."
      - sentence: "____ вона сама зателефонує керівниці. (хай/нехай)"
        answer: нехай
        options:
          - нехай
          - давай
          - будь
        explanation: "Для третьої особи потрібне хай або нехай."
      - sentence: "____, будь ласка, на свої місця. (сідати, ви)"
        answer: сідайте
        options:
          - сідайте
          - сядь
          - сядьмо
        explanation: "Сідайте - ввічливе запрошення або звернення до групи."
  - id: act-3
    type: match-up
    title: Хай, нехай і функція
    instruction: Поєднайте репліку з її основною функцією.
    pairs:
      - left: "Хай він увійде."
        right: "дозвіл третій особі"
      - left: "Нехай щастить!"
        right: "побажання"
      - left: "Хай вона напише звіт."
        right: "непрямий наказ"
      - left: "Хай собі думає, що хоче."
        right: "допустовість"
      - left: "Нехай усі вимкнуть телефони."
        right: "організаційна вказівка групі"
      - left: "Хай живе Україна!"
        right: "урочистий заклик або побажання"
      - left: "Нехай діти пограють у дворі."
        right: "дозвіл або згода"
      - left: "Хай Петро купить квитки."
        right: "розподіл завдання"
      - left: "Нехай буде важко, ми спробуємо."
        right: "допустове значення"
      - left: "Хай вони зайдуть після перерви."
        right: "інструкція щодо третіх осіб"
      - left: "Нехай мама відпочине."
        right: "турботливе побажання"
      - left: "Хай кожен принесе один предмет."
        right: "правило для групової дії"
  - id: act-4
    type: group-sort
    title: Вид і функція наказу
    instruction: Розподіліть форми за головним значенням.
    groups:
      - label: "Доконаний результат"
        items:
          - "Запиши адресу."
          - "Відчини вікно."
          - "Прочитай повідомлення."
      - label: "Недоконаний процес або правило"
        items:
          - "Читай голосніше."
          - "Пишіть акуратно."
          - "Заходьте, будь ласка."
      - label: "Заборона"
        items:
          - "Не відчиняй вікно."
          - "Не поспішайте."
          - "Не переходьте на червоне."
      - label: "Застереження"
        items:
          - "Обережно, не впади."
          - "Не забудь паспорт."
          - "Дивись, не розлий чай."
  - id: act-5
    type: error-correction
    title: Виправте кальку або форму
    instruction: Замініть помилкову частину нормативною українською формою.
    items:
      - sentence: "Марино, пішли сьогодні в кіно."
        error: пішли
        correction: ходімо
        error_type: word
        explanation: "Для запрошення до спільної дії кажемо ходімо."
      - sentence: "Давайте читати текст уголос."
        error: Давайте читати
        correction: Читаймо
        error_type: phrase
        explanation: "Нормативна форма для let's read - читаймо."
      - sentence: "Хай він читати інструкцію."
        error: читати
        correction: читає
        error_type: word
        explanation: "Після хай потрібна форма 3-ї особи."
      - sentence: "Поставьмо стільці біля сцени."
        error: Поставьмо
        correction: Поставмо
        error_type: word
        explanation: "Після губного в м'який знак не пишемо."
      - sentence: "Плачьте тихіше, будь ласка."
        error: Плачьте
        correction: Плачте
        error_type: word
        explanation: "Після ч м'який знак не ставимо."
      - sentence: "Не відчини вікно, тут холодно."
        error: Не відчини
        correction: Не відчиняй
        error_type: phrase
        explanation: "Звичайна заборона потребує недоконаного виду."
      - sentence: "Пусть вони зайдуть після перерви."
        error: Пусть
        correction: Нехай
        error_type: word
        explanation: "Українські частки - хай або нехай."
      - sentence: "Ти зробити це завдання зараз."
        error: зробити
        correction: зроби
        error_type: word
        explanation: "Наказ до однієї людини має особову форму."
      - sentence: "Будь уважні, діти."
        error: Будь уважні
        correction: Будьте уважні
        error_type: phrase
        explanation: "До групи потрібна форма будьте."
      - sentence: "Давай обговорювати план на зборах."
        error: Давай обговорювати
        correction: Обговорімо
        error_type: phrase
        explanation: "Для спільної дії в стандартній українській уживаємо форму на -імо."
      - sentence: "Лізте швидко на сцену."
        error: Лізте
        correction: Лізьте
        error_type: word
        explanation: "Після з у цій формі пишеться м'який знак."
      - sentence: "Хай публіка зачекати п'ять хвилин."
        error: зачекати
        correction: зачекає
        error_type: word
        explanation: "Після хай потрібна форма 3-ї особи однини."
workbook:
  - id: wb-1
    type: quiz
    title: Парадигма і регістр
    instruction: Оберіть найточніший варіант.
    items:
      - question: "Яка форма є 1-ю особою множини від читати?"
        options:
          - читаймо
          - читати
          - хай читає
          - читайтеся
        correct: 0
        explanation: "Читаймо означає let's read."
      - question: "Яка форма правильно звертається до однієї людини на ти?"
        options:
          - пиши
          - пишіть
          - пишімо
          - хай пише
        correct: 0
        explanation: "Пиши - 2-га особа однини."
      - question: "Яка форма потрібна для третьої особи?"
        options:
          - нехай він скаже
          - скажи він
          - сказати він
          - він скажімо
        correct: 0
        explanation: "Для третьої особи вживаємо хай/нехай + 3-тя особа."
      - question: "Яке речення є ввічливим проханням?"
        options:
          - "Передайте, будь ласка, сіль."
          - "Передати сіль ти."
          - "Пусть сіль буде."
          - "Давай передати."
        correct: 0
        explanation: "Форма на ви плюс будь ласка створює ввічливе прохання."
      - question: "Яка форма правильно пишеться без м'якого знака?"
        options:
          - поставмо
          - поставьмо
          - поставь
          - поставьте
        correct: 0
        explanation: "Після губного в м'який знак не ставимо."
      - question: "Яка форма правильно має м'який знак?"
        options:
          - будьте
          - будте
          - будьти
          - будеьте
        correct: 0
        explanation: "Після д у цій формі пишемо ь."
      - question: "Що найкраще передає 'let's discuss'?"
        options:
          - Обговорімо.
          - Давай обговорювати.
          - Обговорити.
          - Хай обговорює.
        correct: 0
        explanation: "Обговорімо - нормативна форма спільної дії."
      - question: "Яка заборона нормативна?"
        options:
          - Не переходьте дорогу на червоне.
          - Не перейдіть дорогу на червоне.
          - Не перейти дорогу на червоне.
          - Хай не перейти дорогу.
        correct: 0
        explanation: "Для заборони свідомої дії потрібен недоконаний вид."
      - question: "Який варіант є застереженням, а не звичайною забороною?"
        options:
          - Обережно, не впади.
          - Не падай щодня.
          - Не падати ти.
          - Хай не падати.
        correct: 0
        explanation: "Не впади попереджає про небажаний випадковий результат."
      - question: "Яка фраза звучить дуже ввічливо?"
        options:
          - Чи не могли б ви повторити?
          - Повтори негайно.
          - Ти повторити.
          - Давай повторити.
        correct: 0
        explanation: "Умовна форма могли б пом'якшує прохання."
      - question: "Який варіант правильно замінює пусть?"
        options:
          - нехай
          - давай
          - будь
          - треба
        correct: 0
        explanation: "Українські відповідники - хай і нехай."
      - question: "Яка форма найкраще підходить для групового заклику?"
        options:
          - Бережімо мову.
          - Берегти мову ти.
          - Хай я бережу мову.
          - Давай берегти мову.
        correct: 0
        explanation: "Бережімо включає мовця і групу."
  - id: wb-2
    type: fill-in
    title: Дванадцять форм
    instruction: Вставте правильну форму наказового способу.
    items:
      - sentence: "____, будь ласка, це речення ще раз. (повторити, ви)"
        answer: повторіть
        options:
          - повторіть
          - повторити
          - повторімо
        explanation: "До ви потрібна форма повторіть."
      - sentence: "____ цей документ до вечора. (підписати, ти)"
        answer: підпиши
        options:
          - підпиши
          - підписати
          - хай підпише
        explanation: "Підпиши - 2-га особа однини."
      - sentence: "____ короткий план зустрічі. (скласти, ми)"
        answer: складімо
        options:
          - складімо
          - скласти
          - давай скласти
        explanation: "Для спільної дії потрібна форма на -імо."
      - sentence: "____ вони самі вирішать це питання. (хай/нехай)"
        answer: нехай
        options:
          - нехай
          - давай
          - будь
        explanation: "Для третьої особи потрібна частка нехай або хай."
      - sentence: "____ мені, будь ласка, за запізнення. (пробачити, ви)"
        answer: пробачте
        options:
          - пробачте
          - пробачити
          - пробачмо
        explanation: "Пробачте - ввічлива форма."
      - sentence: "____ біля входу після вистави. (зустрітися, ми)"
        answer: зустріньмося
        options:
          - зустріньмося
          - зустрітися
          - зустрінемосьмо
        explanation: "Зустріньмося - спільна дія з -ся."
      - sentence: "____ це слово у словнику. (перевірити, ти)"
        answer: перевір
        options:
          - перевір
          - перевірь
          - перевірити
        explanation: "Після р м'який знак не пишемо."
      - sentence: "____ на другий поверх обережно. (лізти, ви)"
        answer: лізьте
        options:
          - лізьте
          - лізте
          - лізіте
        explanation: "Після з у цій формі потрібен м'який знак."
      - sentence: "____ стіл ближче до вікна. (посунути, ти)"
        answer: посунь
        options:
          - посунь
          - посун
          - посунути
        explanation: "Після н пишемо м'який знак."
      - sentence: "____ усі телефони перед початком. (вимкнути, ви)"
        answer: вимкніть
        options:
          - вимкніть
          - вимикати
          - вимкнімо
        explanation: "Вимкніть просить конкретний результат."
      - sentence: "____ світло, коли виходиш. (не забувати вимикати)"
        answer: не забувай вимикати
        options:
          - не забувай вимикати
          - не забудь вимкнути
          - хай вимикати
        explanation: "Для правила-звички природний недоконаний вид."
      - sentence: "____ усі будуть готові до обговорення. (хай/нехай)"
        answer: хай
        options:
          - хай
          - давай
          - будь
        explanation: "Хай + будуть - форма третьої особи множини."
  - id: wb-3
    type: match-up
    title: Форма і категорія
    instruction: Поєднайте форму з граматичною категорією.
    pairs:
      - left: "неси"
        right: "2-га особа однини"
      - left: "несімо"
        right: "1-ша особа множини"
      - left: "несіть"
        right: "2-га особа множини або ввічлива форма"
      - left: "хай несе"
        right: "3-тя особа однини"
      - left: "хай несуть"
        right: "3-тя особа множини"
      - left: "будь"
        right: "наказова форма бути до ти"
