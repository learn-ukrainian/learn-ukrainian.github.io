  - id: wb-9
    type: essay-response
    title: Інструкція або прохання
    prompt: >
      Напишіть 130-160 слів українською. Оберіть одну ситуацію: інструкція для
      волонтерської команди, короткий рецепт або ввічливий лист із проханням.
      Використайте щонайменше шість форм наказового способу: одну форму 2-ї особи
      однини, одну форму 2-ї особи множини, одну форму 1-ї особи множини, одну форму
      з хай/нехай, одну заборону з недоконаним видом і одну ввічливу конструкцію.
    min_words: 130
    model_answer: |
      Друзі, завтра ми проводимо невеликий ярмарок для школи, тому обговорімо план сьогодні ввечері. Олено, принеси список учасників і перевір, чи всі підтвердили участь. Марку, будь ласка, напиши коротке оголошення для батьків. Нехай волонтери підготують столи, а технік нехай перевірить світло й звук. Уранці приходьте о дев'ятій і не запізнюйтеся, бо нам треба розкласти книжки до відкриття. Не ставте коробки біля входу і не залишайте дроти на підлозі. Якщо хтось має питання, зверніться до мене спокійно. Чи не могли б ви також принести кілька пляшок води для дітей? Після ярмарку підсумуймо результати, подякуймо всім помічникам і збережімо список контактів для наступної події. Будьте уважні, але не хвилюйтеся: якщо працюватимемо разом, усе вийде організовано й тепло.
    evaluation_criteria:
      - "130-160 слів українською"
      - "Щонайменше шість форм наказового способу"
      - "Є 2-га особа однини, 2-га особа множини, 1-ша особа множини і хай/нехай"
      - "Є заборона з недоконаним видом і ввічлива конструкція"
