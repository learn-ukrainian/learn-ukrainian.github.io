  - id: wb-10
    type: essay-response
    title: Портрет людини
    instruction: Напишіть зв'язний опис людини.
    prompt: >-
      Опишіть людину, з якою ви добре знайомі, або напишіть коротку сцену знайомства на родинній події. Дайте зовнішність, дві риси характеру, родинний чи дружній зв’язок, одну репліку звертання в кличному відмінку й один висновок без оцінних штампів.
    min_words: 120
    model_answer: >-
      Моя двоюрідна сестра Оксана живе у Вінниці й працює дизайнеркою. Вона
      невисока, з коротким каштановим волоссям і дуже уважними зеленими очима. На
      ній часто темно-синя сорочка й срібна брошка у формі листка. Саме ця брошка
      стала її портретною деталлю, бо Оксана любить рослини й уміє помічати красу
      в дрібницях. За характером вона чуйна й наполеглива. У родині з нею теплі
      стосунки: вона не говорить багато, зате завжди підтримує справою. Коли я
      представляю її друзям, кажу: познайомтеся, будь ласка, це моя двоюрідна
      сестра Оксана, дуже талановита й відповідальна людина.
    rubric:
      - criteria: структура
        description: Є зачин, основна частина, портретна деталь і кінцівка.
        points: 3
      - criteria: граматика
        description: Прикметники узгоджені, а конструкції з у нього / у неї вжиті природно.
        points: 3
      - criteria: лексика
        description: Використано слова про зовнішність, характер і стосунки.
        points: 2
      - criteria: стиль
        description: Опис делікатний, зв'язний і доречний для дорослого мовлення.
        points: 2
      - criteria: портретна точність
        description: Зовнішність, характер і стосунки не змішуються.
      - criteria: комунікативність
        description: Текст звучить як природний портрет або мінісцена знайомства.
