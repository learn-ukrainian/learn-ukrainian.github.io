- type: quiz
  title: Категорії портретної лексики
  instruction: Оберіть відповідь, яка найточніше пояснює слово в портреті.
  items:
    - question: Яке слово описує статуру?
      options:
        - text: кремезний
          correct: true
        - text: русявий
          correct: false
        - text: карий
          correct: false
        - text: кмітливий
          correct: false
      explanation: Кремезний описує міцну, широку статуру.
    - question: Яке слово найкраще описує волосся?
      options:
        - text: каштанове
          correct: true
        - text: рівна
          correct: false
        - text: товариський
          correct: false
        - text: наполеглива
          correct: false
      explanation: Каштанове називає колір волосся.
    - question: Який вислів описує поставу?
      options:
        - text: рівна постава
          correct: true
        - text: карі очі
          correct: false
        - text: щира розмова
          correct: false
        - text: двоюрідна сестра
          correct: false
      explanation: Постава стосується того, як людина тримає тіло.
    - question: Яке слово може описувати і погляд, і характер?
      options:
        - text: лагідний
          correct: true
        - text: сивий
          correct: false
        - text: приземкуватий
          correct: false
        - text: офіційний
          correct: false
      explanation: Лагідний погляд може натякати на лагідний характер.
- type: match-up
  title: Портретні колокації
  instruction: Поєднайте слово з природним іменником.
  pairs:
