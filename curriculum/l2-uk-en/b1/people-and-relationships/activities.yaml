- type: fill-in
  title: Узгодження прикметників
  instruction: Вставте форму прикметника, яка узгоджується з іменником.
  items:
    - sentence: У Софії ___ волосся.
      answer: хвилясте
      options:
        - хвилясте
        - хвиляста
        - хвилястий
        - хвилясті
      explanation: Волосся має форму середнього роду однини.
    - sentence: У Марка ___ очі.
      answer: уважні
      options:
        - уважні
        - уважний
        - уважна
        - уважне
      explanation: Очі стоять у множині.
    - sentence: На ній ___ куртка.
      answer: темна
      options:
        - темна
        - темний
        - темне
        - темні
      explanation: Куртка має жіночий рід.
    - sentence: У дідуся ___ погляд.
      answer: лагідний
      options:
        - лагідний
        - лагідна
        - лагідне
        - лагідні
      explanation: Погляд має чоловічий рід.
    - sentence: У моєї тітки ___ постава.
      answer: рівна
      options:
        - рівна
        - рівний
        - рівне
        - рівні
      explanation: Постава має жіночий рід.
