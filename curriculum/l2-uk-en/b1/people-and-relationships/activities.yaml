version: '1.0'
module: people-and-relationships
level: b1
inline:
  - type: quiz
    title: Категорії портретної лексики
    instruction: Оберіть відповідь, яка найточніше пояснює слово в портреті.
    items:
      - question: Яке слово описує статуру?
        options:
          - кремезний
          - русявий
          - карий
          - кмітливий
        explanation: Кремезний описує міцну, широку статуру.
        correct: 0
      - question: Яке слово найкраще описує волосся?
        options:
          - каштанове
          - рівна
          - товариський
          - наполеглива
        explanation: Каштанове називає колір волосся.
        correct: 0
      - question: Яке слово може описувати і погляд, і характер?
        options:
          - лагідний
          - сивий
          - приземкуватий
          - офіційний
        explanation: Лагідний погляд може натякати на лагідний характер.
        correct: 0
    id: act-1
  - type: match-up
    title: Портретні колокації
    instruction: Поєднайте слово з природним іменником.
    pairs:
      - left: русяве
        right: волосся
      - left: карі
        right: очі
      - left: рівна
        right: постава
    id: act-2
  - type: fill-in
    title: Узгодження прикметників
    instruction: Вставте форму прикметника, яка узгоджується з іменником.
    items:
      - sentence: У Софії ___ волосся.
        answer: хвилясте
        options:
          - хвилясте
          - хвиляста
          - хвилястий
          - хвилясті
        explanation: Волосся має форму середнього роду однини.
      - sentence: У Марка ___ очі.
        answer: уважні
        options:
          - уважні
          - уважний
          - уважна
          - уважне
        explanation: Очі стоять у множині.
      - sentence: У дідуся ___ погляд.
        answer: лагідний
        options:
          - лагідний
          - лагідна
          - лагідне
          - лагідні
        explanation: Погляд має чоловічий рід.
    id: act-3
  - type: match-up
    title: Родинні зв'язки коротко
    instruction: Поєднайте назву родича або родички з поясненням.
    pairs:
      - left: племінник
        right: син брата або сестри
      - left: теща
        right: мати дружини
      - left: свекруха
        right: мати чоловіка
    id: act-4
  - type: error-correction
    title: Редагування портрета
    instruction: Знайдіть неприродну або помилкову форму й оберіть виправлення.
    items:
      - sentence: У неї довгі волосся.
        error: довгі волосся
        options:
          - довге волосся
          - довга волосся
          - довгий волосся
          - довгі волосини
        explanation: Слово волосся має форму середнього роду однини; волосини було б інше слово.
        correction: довге волосся
      - sentence: Його очі є сині.
        error: Його очі є сині.
        options:
          - У нього сині очі.
          - На ньому сині очі.
          - Він є сині очі.
          - Йому сині очі.
        explanation: У портреті природна конструкція у нього; зайве є робить речення перекладним.
        correction: У нього сині очі.
      - sentence: На ній має синя сукня.
        error: має синя сукня
        options:
          - синя сукня
          - синю сукню
          - синій сукні
          - синє сукня
        explanation: У моделі на ній іменний присудок уживається без дієслова має.
        correction: синя сукня
    id: act-5
workbook:
  - type: quiz
    title: Стосунки чи відносини
    instruction: Оберіть найдоречніше слово для контексту.
    items:
      - question: У мене теплі ___ з бабусею.
        options:
          - стосунки
          - відносини
          - ставлення
          - відношення
        explanation: Особистий зв'язок із бабусею найприродніше назвати стосунками.
        correct: 0
      - question: Моє ___ до критики стало спокійнішим.
        options:
          - ставлення
          - подружжя
          - знайомство
          - родичі
        explanation: Ставлення називає позицію або оцінку.
        correct: 0
      - question: Україна розвиває міжнародні ___.
        options:
          - відносини
          - стосунки
          - родини
          - знайомства
        explanation: Міжнародний офіційний контекст потребує слова відносини.
        correct: 0
      - question: У команді здорові ___, бо люди чують одне одного.
        options:
          - взаємини
          - частини
          - риси
          - постаті
        explanation: Взаємини підкреслюють взаємний характер поведінки.
        correct: 0
      - question: Що природно сказати про дружбу?
        options:
          - дружні стосунки
          - дружні відношення
          - математичні стосунки
          - офіційний погляд
        explanation: Про людей кажемо стосунки або взаємини.
        correct: 0
      - question: Що природно сказати про числа?
        options:
          - відношення між величинами
          - стосунки між величинами
          - знайомство між величинами
          - родичі між величинами
        explanation: Відношення доречне в абстрактному або науковому значенні.
        correct: 0
      - question: Що означає «ставлення»?
        options:
          - позиція або оцінка людини
          - родинний зв’язок
          - колір волосся
          - форма обличчя
        explanation: Ставлення передає оцінку чи позицію.
        correct: 0
      - question: Яке слово підходить для взаємної прихильності?
        options:
          - взаємини
          - відношення
          - постава
          - статура
        explanation: Взаємини описують зв’язок між людьми.
        correct: 0
      - question: Яке речення нормативне?
        options:
          - У нас добрі стосунки.
          - У нас добрі відношення.
          - У нас добра статура.
          - У нас карі стосунки.
        explanation: Для людських зв’язків природне слово стосунки.
        correct: 0
      - question: Яке слово називає офіційний контакт між державами?
        options:
          - відносини
          - ставлення
          - волосся
          - постава
        explanation: Міждержавні контакти часто називають відносинами.
        correct: 0
      - question: Який вислів про особисту оцінку?
        options:
          - моє ставлення до колеги
          - мої стосунки до числа
          - моє волосся до родини
          - моя постава до друга
        explanation: Ставлення керує прийменником до.
        correct: 0
      - question: Яке слово нейтральне для сімейних зв’язків?
        options:
          - родичі
          - відношення
          - величини
          - постава
        explanation: Родичі — люди, пов’язані сім’єю.
        correct: 0
    id: wb-1
  - type: fill-in
    title: Родинні зв'язки
    instruction: Вставте точну назву родича або родички.
    items:
      - sentence: Син моєї сестри — мій ___.
        answer: племінник
        options:
          - племінник
          - свекор
          - тесть
          - зять
        explanation: Син брата або сестри — племінник.
      - sentence: Дочка мого дядька — моя ___ сестра.
        answer: двоюрідна
        options:
          - двоюрідна
          - свекрова
          - тещина
          - подружня
        explanation: Діти дядька або тітки — двоюрідні брати й сестри.
      - sentence: Мати мого чоловіка — моя ___.
        answer: свекруха
        options:
          - свекруха
          - теща
          - невістка
          - племінниця
        explanation: Свекруха — мати чоловіка.
      - sentence: Батько моєї дружини — мій ___.
        answer: тесть
        options:
          - тесть
          - свекор
          - зять
          - дядько
        explanation: Тесть — батько дружини.
      - sentence: Дружина мого брата — моя ___.
        answer: невістка
        options:
          - невістка
          - свекруха
          - тітка
          - прабабуся
        explanation: Невістка може називати дружину брата.
      - sentence: Чоловік моєї дочки — мій ___.
        answer: зять
        options:
          - зять
          - свекор
          - племінник
          - двоюрідний брат
        explanation: Зять може називати чоловіка дочки.
      - sentence: Батько моєї дружини — мій ___.
        answer: тесть
        options:
          - тесть
          - свекор
          - шурин
          - зять
      - sentence: Мати мого чоловіка — моя ___.
        answer: свекруха
        options:
          - свекруха
          - теща
          - невістка
          - кума
      - sentence: Син моєї сестри — мій ___.
        answer: племінник
        options:
          - племінник
          - дядько
          - зять
          - сват
      - sentence: Донька мого брата — моя ___.
        answer: племінниця
        options:
          - племінниця
          - тітка
          - невістка
          - свекруха
      - sentence: Брат моєї мами — мій ___.
        answer: дядько
        options:
          - дядько
          - кум
          - зять
          - тесть
      - sentence: Сестра мого батька — моя ___.
        answer: тітка
        options:
          - тітка
          - невістка
          - сваха
          - кума
    id: wb-2
  - type: true-false
    title: Етикет знайомства
    instruction: Позначте, чи правильне твердження.
    items:
      - statement: У формальній ситуації доречно починати з форми ви.
        correct: true
        explanation: Форма ви підтримує ввічливу дистанцію.
      - statement: У звертанні Андрій треба завжди залишати називний відмінок.
        correct: false
        explanation: У прямому звертанні природно Андрію.
      - statement: Дозвольте відрекомендуватися підходить для офіційного самопредставлення.
        correct: true
        explanation: Це формальна формула знайомства.
      - statement: Після представлення можна відповісти Дуже приємно.
        correct: true
        explanation: Це нейтральна ввічлива відповідь.
      - statement: Слово пані вимагає чоловічого роду.
        correct: false
        explanation: Пані вживається для жінки, а форма імені після нього має відповідати звертанню.
      - statement: У знайомстві доречно назвати своє ім’я й коротко пояснити зв’язок із подією.
        correct: true
        explanation: Так співрозмовнику легше зорієнтуватися.
      - statement: У першій розмові краще одразу критикувати зовнішність людини.
        correct: false
        explanation: Це порушує ввічливу дистанцію.
      - statement: Кличний відмінок допомагає звернутися природно.
        correct: true
        explanation: 'Наприклад: пані Олено, друже, Марку.'
    id: wb-3
  - type: match-up
    title: План портрета
    instruction: Поєднайте частину тексту з її роллю.
    pairs:
      - left: хто ця людина
        right: зачин
      - left: що найперше впадає в очі
        right: перше враження
      - left: зріст, постава, хода
        right: основна частина
      - left: старий годинник на руці
        right: портретна деталь
      - left: яке враження лишається
        right: кінцівка
      - left: щирий і відповідальний
        right: характер
      - left: перше враження
        right: постава й погляд
      - left: зовнішність
        right: волосся й очі
      - left: характер
        right: стриманість і щирість
      - left: стосунки
        right: родинний або дружній зв’язок
      - left: приклад
        right: коротка ситуація
      - left: висновок
        right: загальна оцінка без образ
    id: wb-4
  - type: mark-the-words
    title: Портретна лексика в тексті
    instruction: Позначте слова, що описують зовнішність.
    text: У моєї тітки **коротке** **сиве** **волосся**, **рівна** **постава** й **уважний** **погляд**. За характером вона чуйна, стримана й дуже **відповідальна**.
    target_words:
      - коротке
      - сиве
      - волосся
      - рівна
      - постава
      - уважний
      - погляд
    id: wb-5
  - type: cloze
    title: Знайомство на весіллі
    instruction: Вставте форму, яка найкраще пасує до діалогу.
    blanks:
      - id: 1
        answer: старший брат
        options:
          - старший брат
          - старша брат
          - старше брат
          - старші брат
      - id: 2
        answer: карі
        options:
          - карі
          - карий
          - кара
          - каре
      - id: 3
        answer: відповідальний
        options:
          - відповідальний
          - відповідальна
          - відповідальне
          - відповідальні
      - id: 4
        answer: приємно
        options:
          - приємно
          - стосунки
          - свекруха
          - постава
      - id: 5
        answer: подругою
        options:
          - подругою
          - поставою
          - статурою
      - id: 6
        answer: стосунки
        options:
          - стосунки
          - відношення
          - очі
      - id: 7
        answer: Марку
        options:
          - Марку
          - Марко
          - Марком
      - id: 8
        answer: теплий
        options:
          - теплий
          - тепла
          - тепле
    text: 'Маріє, познайомся, будь ласка. Це мій {1}. Його звати Андрій. У нього {2} очі й спокійна постава. За характером він {3}. Андрію, це моя тітка Галина. Дуже {4}. Пізніше Андрій назвав Олену {5}, бо вони давно підтримують {6}. Господиня звернулася до Марка: «{7}, проходьте до столу». У відповідь Марко подякував за {8} прийом.'
    id: wb-6
  - type: match-up
    title: Кого як назвати
    instruction: Поєднайте пояснення з родинною назвою.
    pairs:
      - left: мати чоловіка
        right: свекруха
      - left: мати дружини
        right: теща
      - left: батько чоловіка
        right: свекор
      - left: батько дружини
        right: тесть
      - left: син брата або сестри
        right: племінник
      - left: дочка брата або сестри
        right: племінниця
      - left: чоловік дочки
        right: зять
      - left: дружина брата або сина
        right: невістка
      - left: мати батька
        right: бабуся
      - left: батько матері
        right: дідусь
      - left: сестра батька
        right: тітка
      - left: брат матері
        right: дядько
    id: wb-7
  - type: group-sort
    title: Відтінки характеру
    instruction: Розподіліть риси за найімовірнішим відтінком у нейтральному описі.
    groups:
      - items:
          - щирий
          - чуйний
          - відповідальний
          - кмітливий
        label: переважно позитивні
      - items:
          - стриманий
          - упертий
          - балакучий
          - самовпевнений
        label: залежать від контексту
      - items:
          - вередливий
          - нетерплячий
          - заздрісний
          - замкнутий
        label: переважно складні
    id: wb-8
  - type: quiz
    title: Характер у контексті
    instruction: Оберіть рису, яка найточніше відповідає опису.
    items:
      - question: Вона завжди помічає, коли комусь потрібна підтримка.
        options:
          - чуйна
          - смаглява
          - двоюрідна
          - приземкувата
        explanation: Чуйна людина уважна до потреб інших.
        correct: 0
      - question: Він швидко розуміє складні ситуації й знаходить рішення.
        options:
          - кмітливий
          - русявий
          - літній
          - рум'яний
        explanation: Кмітливий означає швидкий і винахідливий у мисленні.
        correct: 0
      - question: Вона не перебиває, говорить коротко й контролює емоції.
        options:
          - стримана
          - хвиляста
          - тещина
          - сива
        explanation: Стримана людина контролює емоції й не говорить зайвого.
        correct: 0
      - question: Він виконує обіцянки й доводить справу до кінця.
        options:
          - відповідальний
          - каштановий
          - знайомий
          - блідий
        explanation: Відповідальна людина серйозно ставиться до зобов'язань.
        correct: 0
      - question: Що найкраще показує відповідальність?
        options:
          - вона завжди доводить справи до кінця
          - вона має карі очі
          - вона носить синій шарф
          - вона живе поруч
        explanation: Відповідальність видно з поведінки.
        correct: 0
      - question: Що найкраще показує стриманість?
        options:
          - він говорить спокійно й не перебиває
          - він високий на зріст
          - він має русяве волосся
          - він носить окуляри
        explanation: Стриманість — поведінкова риса.
        correct: 0
      - question: Що найкраще показує товариськість?
        options:
          - вона легко підтримує розмову
          - вона має рівну поставу
          - вона смаглява
          - вона двоюрідна сестра
        explanation: Товариська людина легко спілкується.
        correct: 0
      - question: Що найкраще показує наполегливість?
        options:
          - він не здається після першої помилки
          - він має сиві вуса
          - він низького зросту
          - він родич
        explanation: Наполегливість видно в діях.
        correct: 0
      - question: Що найкраще показує чуйність?
        options:
          - вона помічає, коли комусь потрібна допомога
          - вона має овальне обличчя
          - вона стоїть рівно
          - вона вища за брата
        explanation: Чуйність пов’язана з увагою до інших.
        correct: 0
      - question: Що найкраще показує відвертість?
        options:
          - він чесно пояснює свою думку
          - він носить темний піджак
          - він має коротке волосся
          - він двоюрідний брат
        explanation: Відвертість — спосіб говорити правду.
        correct: 0
      - question: Що найкраще показує лагідність?
        options:
