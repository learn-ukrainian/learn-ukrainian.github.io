- type: quiz
  title: Категорії портретної лексики
  instruction: Оберіть відповідь, яка найточніше пояснює слово в портреті.
  items:
  - question: Яке слово описує статуру?
    options:
    - text: кремезний
      correct: true
    - text: русявий
      correct: false
    - text: карий
      correct: false
    - text: кмітливий
      correct: false
    explanation: Кремезний описує міцну, широку статуру.
  - question: Яке слово найкраще описує волосся?
    options:
    - text: каштанове
      correct: true
    - text: рівна
      correct: false
    - text: товариський
      correct: false
    - text: наполеглива
      correct: false
    explanation: Каштанове називає колір волосся.
  - question: Який вислів описує поставу?
    options:
    - text: рівна постава
      correct: true
    - text: карі очі
      correct: false
    - text: щира розмова
      correct: false
    - text: двоюрідна сестра
      correct: false
    explanation: Постава стосується того, як людина тримає тіло.
  - question: Яке слово може описувати і погляд, і характер?
    options:
    - text: лагідний
      correct: true
    - text: сивий
      correct: false
    - text: приземкуватий
      correct: false
    - text: офіційний
      correct: false
    explanation: Лагідний погляд може натякати на лагідний характер.
  - question: Яке слово описує зріст?
    options:
    - text: високий
      correct: true
    - text: щирий
      correct: false
    - text: родинний
      correct: false
    - text: упертий
      correct: false
    explanation: Високий називає фізичну ознаку людини.
  - question: Яке слово описує колір очей?
    options:
    - text: сірі
      correct: true
    - text: товариські
      correct: false
    - text: низькі
      correct: false
    - text: двоюрідні
      correct: false
    explanation: Сірі може описувати очі.
  - question: Яке слово описує рису характеру?
    options:
    - text: відповідальний
      correct: true
    - text: русявий
      correct: false
    - text: кругле
      correct: false
    - text: смаглявий
      correct: false
    explanation: Відповідальний називає характер.
  - question: Який вислів описує обличчя?
    options:
    - text: овальне обличчя
      correct: true
    - text: міцна дружба
      correct: false
    - text: щира порада
      correct: false
    - text: двоюрідний брат
      correct: false
    explanation: Овальне обличчя — портретна ознака.
  - question: Яке слово описує вік?
    options:
    - text: літній
      correct: true
    - text: карий
      correct: false
    - text: кучерявий
      correct: false
    - text: уважний
      correct: false
    explanation: Літній називає старший вік.
  - question: Яке слово описує статуру?
    options:
    - text: худорлявий
      correct: true
    - text: лагідний
      correct: false
    - text: відвертий
      correct: false
    - text: сусідський
      correct: false
    explanation: Худорлявий описує будову тіла.
  - question: Яке слово описує манеру спілкування?
    options:
    - text: стриманий
      correct: true
    - text: смаглявий
      correct: false
    - text: сивий
      correct: false
    - text: низенький
      correct: false
    explanation: Стриманий може описувати поведінку в розмові.
  - question: Яке слово описує родинний зв’язок?
    options:
    - text: двоюрідна
      correct: true
    - text: рум’яна
      correct: false
    - text: щира
      correct: false
    - text: уважна
      correct: false
    explanation: Двоюрідна називає ступінь спорідненості.
