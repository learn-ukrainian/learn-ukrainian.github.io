version: '1.0'
module: people-and-relationships
level: b1
inline:
  - type: quiz
    title: Категорії портретної лексики
    instruction: Оберіть відповідь, яка найточніше пояснює слово в портреті.
    items:
      - question: Яке слово описує статуру?
        options:
          - кремезний
          - русявий
          - карий
          - кмітливий
        explanation: Кремезний описує міцну, широку статуру.
        correct: 0
      - question: Яке слово найкраще описує волосся?
        options:
          - каштанове
          - рівна
          - товариський
          - наполеглива
        explanation: Каштанове називає колір волосся.
        correct: 0
      - question: Який вислів описує поставу?
        options:
          - рівна постава
          - карі очі
          - щира розмова
          - двоюрідна сестра
        explanation: Постава стосується того, як людина тримає тіло.
        correct: 0
      - question: Яке слово може описувати і погляд, і характер?
        options:
          - лагідний
          - сивий
          - приземкуватий
          - офіційний
        explanation: Лагідний погляд може натякати на лагідний характер.
        correct: 0
      - question: Яке слово описує зріст?
        options:
          - високий
          - щирий
          - родинний
          - упертий
        explanation: Високий називає фізичну ознаку людини.
        correct: 0
      - question: Яке слово описує колір очей?
        options:
          - сірі
          - товариські
          - низькі
          - двоюрідні
        explanation: Сірі може описувати очі.
        correct: 0
      - question: Яке слово описує рису характеру?
        options:
          - відповідальний
          - русявий
          - кругле
          - смаглявий
        explanation: Відповідальний називає характер.
        correct: 0
      - question: Який вислів описує обличчя?
        options:
          - овальне обличчя
          - міцна дружба
          - щира порада
          - двоюрідний брат
        explanation: Овальне обличчя — портретна ознака.
        correct: 0
      - question: Яке слово описує вік?
        options:
          - літній
          - карий
          - кучерявий
          - уважний
        explanation: Літній називає старший вік.
        correct: 0
      - question: Яке слово описує статуру?
        options:
          - худорлявий
          - лагідний
          - відвертий
          - сусідський
        explanation: Худорлявий описує будову тіла.
        correct: 0
      - question: Яке слово описує манеру спілкування?
        options:
          - стриманий
          - смаглявий
          - сивий
          - низенький
        explanation: Стриманий може описувати поведінку в розмові.
        correct: 0
      - question: Яке слово описує родинний зв’язок?
        options:
          - двоюрідна
          - рум’яна
          - щира
          - уважна
        explanation: Двоюрідна називає ступінь спорідненості.
        correct: 0
    id: act-1
  - type: match-up
    title: Портретні колокації
    instruction: Поєднайте слово з природним іменником.
    pairs:
      - left: русяве
        right: волосся
      - left: карі
        right: очі
      - left: рівна
        right: постава
      - left: уважний
        right: погляд
      - left: худорляве
        right: обличчя
      - left: широка
        right: усмішка
      - left: спокійна
        right: хода
      - left: темно-зелений
        right: шарф
      - left: кучеряве
        right: пасмо
      - left: смаглява
        right: шкіра
      - left: струнка
        right: фігура
      - left: лагідний
        right: голос
    id: act-2
  - type: fill-in
    title: Узгодження прикметників
    instruction: Вставте форму прикметника, яка узгоджується з іменником.
    items:
      - sentence: У Софії ___ волосся.
        answer: хвилясте
        options:
          - хвилясте
          - хвиляста
          - хвилястий
          - хвилясті
        explanation: Волосся має форму середнього роду однини.
      - sentence: У Марка ___ очі.
        answer: уважні
        options:
          - уважні
          - уважний
          - уважна
          - уважне
        explanation: Очі стоять у множині.
      - sentence: На ній ___ куртка.
        answer: темна
        options:
          - темна
          - темний
          - темне
          - темні
        explanation: Куртка має жіночий рід.
      - sentence: У дідуся ___ погляд.
        answer: лагідний
        options:
          - лагідний
          - лагідна
          - лагідне
          - лагідні
        explanation: Погляд має чоловічий рід.
      - sentence: У моєї тітки ___ постава.
        answer: рівна
        options:
          - рівна
          - рівний
          - рівне
          - рівні
        explanation: Постава має жіночий рід.
      - sentence: У Марка ___ очі.
        answer: сірі
        options:
          - сірі
          - сірий
          - сіра
          - сіре
      - sentence: У тітки ___ постава.
        answer: рівна
        options:
          - рівна
          - рівний
          - рівне
          - рівні
      - sentence: Мій брат дуже ___.
        answer: товариський
        options:
          - товариський
          - товариська
          - товариське
          - товариські
      - sentence: Сестра здається ___ у новій компанії.
        answer: стриманою
        options:
          - стриманою
          - стриманий
          - стримане
          - стримані
      - sentence: У дідуся ___ вуса.
        answer: сиві
        options:
          - сиві
          - сивий
          - сива
          - сиве
      - sentence: Наталя має ___ усмішку.
        answer: щиру
        options:
          - щиру
          - щирий
          - щире
          - щирі
      - sentence: Це мій ___ брат.
        answer: двоюрідний
        options:
          - двоюрідний
          - двоюрідна
          - двоюрідне
          - двоюрідні
    id: act-3
  - type: group-sort
    title: Зовнішність і характер
    instruction: Розподіліть слова за групами.
    groups:
      - items:
          - русявий
          - кремезний
          - смаглявий
          - кучерявий
          - худорлявий
        label: зовнішність
      - items:
          - щирий
          - чуйний
          - кмітливий
          - стриманий
          - вередливий
        label: характер
      - items:
          - довіра
          - підтримка
          - суперечка
          - примирення
          - взаємини
        label: стосунки
    id: act-4
  - type: error-correction
    title: Редагування портрета
    instruction: Знайдіть неприродну або помилкову форму й оберіть виправлення.
    items:
      - sentence: У неї довгі волосся.
        error: довгі волосся
        options:
          - довге волосся
          - довга волосся
          - довгий волосся
          - довгі волосини
        explanation: Слово волосся має форму середнього роду однини; волосини було б інше слово.
        correction: довге волосся
      - sentence: Він має блакитні очі.
        error: має блакитні очі
        options:
          - у нього сині очі
          - на ньому сині очі
          - він є сині очі
          - йому сині очі
        explanation: У портреті природна конструкція у нього; колір очей часто називають синім.
        correction: у нього сині очі
      - sentence: На ній має синя сукня.
        error: має синя сукня
        options:
          - синя сукня
          - синю сукню
          - синій сукні
          - синє сукня
        explanation: У моделі на ній іменний присудок уживається без дієслова має.
        correction: синя сукня
      - sentence: Засмагнувший хлопець усміхався гостям.
        error: Засмагнувший
        options:
          - Засмаглий
          - Засмагнутий
          - Засмагавший
          - Засмагнути
        explanation: Для цієї ознаки нормативна форма засмаглий, а не калька на -вший.
        correction: Засмаглий
      - sentence: У мене хороші відносини з сестрою.
        error: відносини
        options:
          - стосунки
          - відношення
          - становища
          - реляції
        explanation: Для особистого спілкування природніше слово стосунки.
        correction: стосунки
      - sentence: У неї карий очі.
        error: карий
        correction: У неї карі очі.
        explanation: Прикметник узгоджується з множиною очі.
      - sentence: Мій сестра дуже відповідальна.
        error: Мій
        correction: Моя сестра дуже відповідальна.
        explanation: Сестра — жіночий рід, тому моя.
      - sentence: Він є дружній зі своїм братом.
        error: є дружній зі
        correction: Він дружить зі своїм братом.
        explanation: Для стосунків природніше вжити дієслово дружити.
    id: act-5
  - type: quiz
    title: Стосунки чи відносини
    instruction: Оберіть найдоречніше слово для контексту.
    items:
      - question: У мене теплі ___ з бабусею.
        options:
          - стосунки
          - відносини
          - ставлення
          - відношення
        explanation: Особистий зв'язок із бабусею найприродніше назвати стосунками.
        correct: 0
      - question: Моє ___ до критики стало спокійнішим.
        options:
          - ставлення
          - подружжя
          - знайомство
          - родичі
        explanation: Ставлення називає позицію або оцінку.
        correct: 0
      - question: Україна розвиває міжнародні ___.
        options:
          - відносини
          - стосунки
          - родини
          - знайомства
        explanation: Міжнародний офіційний контекст потребує слова відносини.
        correct: 0
      - question: У команді здорові ___, бо люди чують одне одного.
        options:
          - взаємини
          - частини
          - риси
          - постаті
        explanation: Взаємини підкреслюють взаємний характер поведінки.
        correct: 0
      - question: Що природно сказати про дружбу?
        options:
          - дружні стосунки
          - дружні відношення
          - математичні стосунки
          - офіційний погляд
        explanation: Про людей кажемо стосунки або взаємини.
        correct: 0
      - question: Що природно сказати про числа?
        options:
          - відношення між величинами
          - стосунки між величинами
          - знайомство між величинами
          - родичі між величинами
        explanation: Відношення доречне в абстрактному або науковому значенні.
        correct: 0
      - question: Що означає «ставлення»?
        options:
          - позиція або оцінка людини
          - родинний зв’язок
          - колір волосся
          - форма обличчя
        explanation: Ставлення передає оцінку чи позицію.
        correct: 0
      - question: Яке слово підходить для взаємної прихильності?
        options:
          - взаємини
          - відношення
          - постава
          - статура
        explanation: Взаємини описують зв’язок між людьми.
        correct: 0
      - question: Яке речення нормативне?
        options:
          - У нас добрі стосунки.
          - У нас добрі відношення.
          - У нас добра статура.
          - У нас карі стосунки.
        explanation: Для людських зв’язків природне слово стосунки.
        correct: 0
      - question: Яке слово називає офіційний контакт між державами?
        options:
          - відносини
          - ставлення
          - волосся
          - постава
        explanation: Міждержавні контакти часто називають відносинами.
        correct: 0
      - question: Який вислів про особисту оцінку?
        options:
          - моє ставлення до колеги
          - мої стосунки до числа
          - моє волосся до родини
          - моя постава до друга
        explanation: Ставлення керує прийменником до.
        correct: 0
      - question: Яке слово нейтральне для сімейних зв’язків?
        options:
          - родичі
          - відношення
          - величини
          - постава
        explanation: Родичі — люди, пов’язані сім’єю.
        correct: 0
    id: act-6
workbook:
  - type: fill-in
    title: Родинні зв'язки
    instruction: Вставте точну назву родича або родички.
    items:
      - sentence: Син моєї сестри — мій ___.
        answer: племінник
        options:
          - племінник
          - свекор
          - тесть
          - зять
        explanation: Син брата або сестри — племінник.
      - sentence: Дочка мого дядька — моя ___ сестра.
        answer: двоюрідна
        options:
          - двоюрідна
          - свекрова
          - тещина
          - подружня
        explanation: Діти дядька або тітки — двоюрідні брати й сестри.
      - sentence: Мати мого чоловіка — моя ___.
        answer: свекруха
        options:
          - свекруха
          - теща
          - невістка
          - племінниця
        explanation: Свекруха — мати чоловіка.
      - sentence: Батько моєї дружини — мій ___.
        answer: тесть
        options:
          - тесть
          - свекор
          - зять
          - дядько
        explanation: Тесть — батько дружини.
      - sentence: Дружина мого брата — моя ___.
        answer: невістка
        options:
          - невістка
          - свекруха
          - тітка
          - прабабуся
        explanation: Невістка може називати дружину брата.
      - sentence: Чоловік моєї дочки — мій ___.
        answer: зять
        options:
          - зять
          - свекор
          - племінник
          - двоюрідний брат
        explanation: Зять може називати чоловіка дочки.
      - sentence: Батько моєї дружини — мій ___.
        answer: тесть
        options:
          - тесть
          - свекор
          - шурин
          - зять
      - sentence: Мати мого чоловіка — моя ___.
        answer: свекруха
        options:
          - свекруха
          - теща
          - невістка
          - кума
      - sentence: Син моєї сестри — мій ___.
        answer: племінник
        options:
          - племінник
          - дядько
          - зять
          - сват
      - sentence: Донька мого брата — моя ___.
        answer: племінниця
        options:
          - племінниця
          - тітка
          - невістка
          - свекруха
      - sentence: Брат моєї мами — мій ___.
        answer: дядько
        options:
          - дядько
          - кум
          - зять
          - тесть
      - sentence: Сестра мого батька — моя ___.
        answer: тітка
        options:
          - тітка
          - невістка
          - сваха
          - кума
    id: wb-1
  - type: true-false
    title: Етикет знайомства
    instruction: Позначте, чи правильне твердження.
    items:
      - statement: У формальній ситуації доречно починати з форми ви.
        correct: true
        explanation: Форма ви підтримує ввічливу дистанцію.
      - statement: У звертанні Андрій треба завжди залишати називний відмінок.
        correct: false
        explanation: У прямому звертанні природно Андрію.
      - statement: Дозвольте відрекомендуватися підходить для офіційного самопредставлення.
        correct: true
        explanation: Це формальна формула знайомства.
      - statement: Після представлення можна відповісти Дуже приємно.
        correct: true
        explanation: Це нейтральна ввічлива відповідь.
      - statement: Слово пані вимагає чоловічого роду.
        correct: false
        explanation: Пані вживається для жінки, а форма імені після нього має відповідати звертанню.
      - statement: У знайомстві доречно назвати своє ім’я й коротко пояснити зв’язок із подією.
        correct: true
        explanation: Так співрозмовнику легше зорієнтуватися.
      - statement: У першій розмові краще одразу критикувати зовнішність людини.
        correct: false
        explanation: Це порушує ввічливу дистанцію.
      - statement: Кличний відмінок допомагає звернутися природно.
        correct: true
        explanation: 'Наприклад: пані Олено, друже, Марку.'
    id: wb-2
  - type: match-up
    title: План портрета
    instruction: Поєднайте частину тексту з її роллю.
    pairs:
      - left: хто ця людина
        right: зачин
      - left: що найперше впадає в очі
        right: перше враження
      - left: зріст, постава, хода
        right: основна частина
      - left: старий годинник на руці
        right: портретна деталь
      - left: яке враження лишається
        right: кінцівка
      - left: щирий і відповідальний
        right: характер
      - left: перше враження
        right: постава й погляд
      - left: зовнішність
        right: волосся й очі
      - left: характер
        right: стриманість і щирість
      - left: стосунки
        right: родинний або дружній зв’язок
      - left: приклад
        right: коротка ситуація
      - left: висновок
        right: загальна оцінка без образ
    id: wb-3
  - type: mark-the-words
    title: Портретна лексика в тексті
    instruction: Позначте слова, що описують зовнішність.
    text: У моєї тітки **коротке** **сиве** **волосся**, **рівна** **постава** й **уважний** **погляд**. За характером вона чуйна, стримана й дуже **відповідальна**.
    target_words:
      - коротке
      - сиве
      - волосся
      - рівна
      - постава
      - уважний
      - погляд
      - відповідальна
    id: wb-4
  - type: cloze
    title: Знайомство на весіллі
    instruction: Вставте форму, яка найкраще пасує до діалогу.
    blanks:
      - id: 1
        answer: старший брат
        options:
          - старший брат
          - старша брат
          - старше брат
          - старші брат
      - id: 2
        answer: карі
        options:
          - карі
          - карий
          - кара
          - каре
      - id: 3
        answer: відповідальний
        options:
          - відповідальний
          - відповідальна
          - відповідальне
          - відповідальні
      - id: 4
        answer: приємно
        options:
          - приємно
          - стосунки
          - свекруха
          - постава
      - id: 5
        answer: подругою
        options:
