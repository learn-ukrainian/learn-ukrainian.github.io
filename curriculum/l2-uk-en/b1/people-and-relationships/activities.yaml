  - id: wb-11
    type: error-correction
    title: Кальки в описі людини
    instruction: Виправте речення так, щоб опис звучав природно українською.
    items:
      - sentence: Його очі є сині.
        error: Його очі є сині.
        correction: У нього сині очі.
        options:
          - У нього сині очі.
          - Він має сині очі є.
          - На ньому сині очі.
          - Йому є сині очі.
        explanation: У портреті частини тіла часто описують моделлю у нього / у неї.
      - sentence: Я є високий.
        error: Я є високий.
        correction: Я високий.
        options:
          - Я високий.
          - Я маю високий.
          - Мені високий.
          - Я високість.
        explanation: У короткому описі рис слово є зазвичай зайве.
      - sentence: Я маю 25 років.
        error: Я маю 25 років.
        correction: Мені 25 років.
        options:
          - Мені 25 років.
          - Я є 25 років.
          - У мене 25 років є.
          - Я маю років 25 є.
        explanation: 'Вік українською природно подаємо через давальний відмінок: мені 25 років.'
      - sentence: Вона дивиться як її мама.
        error: дивиться як її мама
        correction: схожа на свою маму
        options:
          - схожа на свою маму
          - дивиться як своя мама
          - має вигляд як її мама
          - подібна як мама
        explanation: Для подібності кажемо схожа на когось, а не дивиться як.
      - sentence: Його волосся є довге і хвилясте.
        error: Його волосся є довге і хвилясте.
        correction: У нього довге, хвилясте волосся.
        options:
          - У нього довге, хвилясте волосся.
          - Його волосся має довге і хвилясте.
          - На ньому довге, хвилясте волосся.
          - Він є довге і хвилясте волосся.
        explanation: Конструкція у нього + ознака + частина тіла звучить природніше.
