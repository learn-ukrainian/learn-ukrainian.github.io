- type: error-correction
  title: Редагування портрета
  instruction: Знайдіть неприродну або помилкову форму й оберіть виправлення.
  items:
    - sentence: У неї довгі волосся.
      error: довгі волосся
      answer: довге волосся
      options:
        - довге волосся
        - довга волосся
        - довгий волосся
        - довгі волосини
      explanation: Слово волосся має форму середнього роду однини; волосини було б інше слово.
    - sentence: Він має блакитні очі.
      error: має блакитні очі
      answer: у нього сині очі
      options:
        - у нього сині очі
        - на ньому сині очі
        - він є сині очі
        - йому сині очі
      explanation: У портреті природна конструкція у нього; колір очей часто називають синім.
    - sentence: На ній має синя сукня.
      error: має синя сукня
      answer: синя сукня
      options:
        - синя сукня
        - синю сукню
        - синій сукні
        - синє сукня
      explanation: У моделі на ній іменний присудок уживається без дієслова має.
    - sentence: Засмагнувший хлопець усміхався гостям.
      error: Засмагнувший
      answer: Засмаглий
      options:
        - Засмаглий
        - Засмагнутий
        - Засмагавший
        - Засмагнути
      explanation: Для цієї ознаки нормативна форма засмаглий, а не калька на -вший.
    - sentence: У мене хороші відносини з сестрою.
      error: відносини
      answer: стосунки
      options:
        - стосунки
        - відношення
        - становища
        - реляції
      explanation: Для особистого спілкування природніше слово стосунки.
