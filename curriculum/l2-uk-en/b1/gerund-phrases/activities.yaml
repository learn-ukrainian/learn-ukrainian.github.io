version: '1.0'
module: gerund-phrases
level: b1
inline:
  - id: act-1
    type: quiz
    title: Знайдіть зворот
    instruction: Оберіть правильне пояснення структури.
    items:
      - question: "У реченні Прочитавши листа, Олена відповіла зворот - це:"
        options:
          - "Прочитавши листа"
          - "Олена відповіла"
          - "листа Олена"
        correct: 0
        explanation: Дієприслівник прочитавши разом із залежним словом листа утворює зворот.
      - question: "У фразі працюючи над проєктом щодня ядро звороту - це:"
        options:
          - "працюючи"
          - "проєктом"
          - "щодня"
        correct: 0
        explanation: Ядром є дієприслівник; інші слова залежать від нього.
      - question: "Дієприслівниковий зворот у реченні виконує роль:"
        options:
          - "обставини"
          - "означення"
          - "підмета"
        correct: 0
        explanation: "Він пояснює дію-присудок: як, коли, чому або за якої умови."
      - question: "Яке питання найкраще підходить до звороту Працюючи в архіві?"
        options:
          - "коли? за якої умови?"
          - "який?"
          - "чий?"
        correct: 0
        explanation: Зворот пояснює обставину дії, а не ознаку іменника.
      - question: "Яке речення має дієприслівниковий, а не дієприкметниковий зворот?"
        options:
          - "Прочитавши статтю, дослідниця зробила нотатки."
          - "Стаття, прочитана дослідницею, лежала на столі."
          - "Прочитана стаття лежала на столі."
        correct: 0
        explanation: Прочитавши статтю пояснює дію дослідниці.
      - question: "Яке речення має спільний підмет?"
        options:
          - "Підготувавши питання, ведучий відкрив запис."
          - "Підготувавши питання, запис почався."
          - "Підготувавши питання, стало тихо."
        correct: 0
        explanation: Ведучий підготував і ведучий відкрив.
      - question: "Який варіант правильно ремонтує Перейшовши дорогу, мені стало легше?"
        options:
          - "Коли я перейшов дорогу, мені стало легше."
          - "Перейшовши дорогу, легше стало мені."
          - "Дорогу перейшовши, легше стало."
        correct: 0
        explanation: Безособове мені стало краще передати підрядним реченням.
      - question: "Яке речення показує зворот у середині?"
        options:
          - "Марія, прочитавши повідомлення, усміхнулася."
          - "Прочитавши повідомлення, Марія усміхнулася."
          - "Марія усміхнулася, прочитавши повідомлення."
        correct: 0
        explanation: Зворот стоїть між підметом і присудком.
      - question: "Яке речення має фразеологічний виняток без ком?"
        options:
          - "Волонтери працювали не покладаючи рук."
          - "Волонтери, прочитавши лист, відповіли."
          - "Волонтери, працюючи в штабі, склали список."
        correct: 0
        explanation: Не покладаючи рук - сталий вислів.
      - question: "Який варіант пояснює читати лежачи?"
        options:
          - "одиничний дієприслівник способу дії після присудка"
          - "дієприкметниковий зворот"
          - "підрядне означальне речення"
        correct: 0
        explanation: Лежачи відповідає на питання як? яким способом?
      - question: "Яке речення правильно показує, що і не входить до звороту?"
        options:
          - "Він підвівся і, не прощаючись, вийшов."
          - "Він підвівся, і не прощаючись вийшов."
          - "Він підвівся і не, прощаючись, вийшов."
        correct: 0
        explanation: І з'єднує присудки, а зворот не прощаючись відокремлюється.
      - question: "Коли краще замінити зворот підрядним реченням?"
        options:
          - "коли підмети різні або головна частина безособова"
          - "коли зворот стоїть на початку"
          - "коли є залежне слово"
        correct: 0
        explanation: Підрядне речення безпечніше, якщо немає спільного підмета.
  - id: act-2
    type: fill-in
    title: Кома або без коми
    instruction: Оберіть варіант із правильною пунктуацією.
    items:
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Прочитавши повідомлення, Марія відповіла."
        options:
          - "Прочитавши повідомлення, Марія відповіла."
          - "Прочитавши повідомлення Марія відповіла."
          - "Прочитавши, повідомлення Марія відповіла."
        explanation: Звичайний зворот на початку відокремлюється комою.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Марія, прочитавши повідомлення, відповіла."
        options:
          - "Марія, прочитавши повідомлення, відповіла."
          - "Марія прочитавши повідомлення, відповіла."
          - "Марія, прочитавши повідомлення відповіла."
        explanation: Зворот у середині виділяється з обох боків.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Марія відповіла, прочитавши повідомлення."
        options:
          - "Марія відповіла, прочитавши повідомлення."
          - "Марія відповіла прочитавши повідомлення."
          - "Марія, відповіла прочитавши повідомлення."
        explanation: Зворот у кінці має кому перед собою.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Працюючи над проєктом, студенти знайшли помилку."
        options:
          - "Працюючи над проєктом, студенти знайшли помилку."
          - "Працюючи над проєктом студенти знайшли помилку."
          - "Працюючи, над проєктом студенти знайшли помилку."
        explanation: Повна межа звороту - працюючи над проєктом.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Студенти, працюючи над проєктом, знайшли помилку."
        options:
          - "Студенти, працюючи над проєктом, знайшли помилку."
          - "Студенти працюючи над проєктом знайшли помилку."
          - "Студенти, працюючи над проєктом знайшли помилку."
        explanation: Серединний зворот відкриваємо і закриваємо комами.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Волонтери працювали не покладаючи рук."
        options:
          - "Волонтери працювали не покладаючи рук."
          - "Волонтери працювали, не покладаючи рук."
          - "Волонтери, працювали не покладаючи рук."
        explanation: Не покладаючи рук - фразеологічний виняток.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Глядачі слухали затамувавши подих."
        options:
          - "Глядачі слухали затамувавши подих."
          - "Глядачі слухали, затамувавши подих."
          - "Глядачі, слухали затамувавши подих."
        explanation: Затамувавши подих тут сталий вислів.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Шкідливо читати лежачи."
        options:
          - "Шкідливо читати лежачи."
          - "Шкідливо читати, лежачи."
          - "Шкідливо, читати лежачи."
        explanation: Лежачи після читати означає спосіб дії.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Він підвівся і, не прощаючись, вийшов."
        options:
          - "Він підвівся і, не прощаючись, вийшов."
          - "Він підвівся і не прощаючись, вийшов."
          - "Він підвівся, і не прощаючись вийшов."
        explanation: І з'єднує присудки; зворот між ними відокремлюємо.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Вони боролися мужньо й не шкодуючи сил."
        options:
          - "Вони боролися мужньо й не шкодуючи сил."
          - "Вони боролися мужньо, й не шкодуючи сил."
          - "Вони боролися, мужньо й не шкодуючи сил."
        explanation: Це модель однорідних обставин способу.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Це можна виконати й не знаючи всіх правил."
        options:
          - "Це можна виконати й не знаючи всіх правил."
          - "Це можна виконати, й не знаючи всіх правил."
          - "Це можна, виконати й не знаючи всіх правил."
        explanation: Підсилювальна й перед зворотом належить до винятків.
      - sentence: "Оберіть правильний варіант: ____"
        answer: "Переконавшись, що небезпеки немає, команда вийшла."
        options:
          - "Переконавшись, що небезпеки немає, команда вийшла."
          - "Переконавшись що небезпеки немає команда вийшла."
          - "Переконавшись, що небезпеки немає команда вийшла."
        explanation: Кома після всієї початкової групи закриває зворот.
  - id: act-3
    type: match-up
    title: Терміни і рішення
    instruction: З'єднайте термін або приклад із правильним поясненням.
    pairs:
      - left: "дієприслівниковий зворот"
        right: "дієприслівник із залежними словами"
      - left: "обставина"
        right: "роль звороту в реченні"
      - left: "означення"
        right: "роль дієприкметникового звороту"
      - left: "Прочитавши листа"
        right: "звичайний зворот із комою"
      - left: "не покладаючи рук"
        right: "фразеологічний виняток"
      - left: "читати лежачи"
        right: "спосіб дії після присудка"
      - left: "мужньо й не шкодуючи сил"
        right: "однорідні обставини"
      - left: "й не знаючи правил"
        right: "підсилювальна частка перед зворотом"
      - left: "підвівся і, не прощаючись, вийшов"
        right: "і з'єднує присудки, зворот у комах"
      - left: "книга, прочитана студентом"
        right: "дієприкметниковий зворот"
      - left: "прочитавши книгу"
        right: "дієприслівниковий зворот"
      - left: "Коли я повернувся, стало тихо"
        right: "підрядна заміна для безособової головної частини"
  - id: act-4
    type: group-sort
    title: Коми, винятки, заміна
    instruction: Розподіліть приклади за редакторським рішенням.
    groups:
      - label: "Звичайний зворот: коми потрібні"
        items:
          - "Прочитавши листа, Олена відповіла."
          - "Олена, прочитавши листа, відповіла."
          - "Олена відповіла, прочитавши листа."
          - "Не гаючись, команда почала роботу."
      - label: "Виняток: без ком"
        items:
          - "Працювали не покладаючи рук."
          - "Слухали затамувавши подих."
          - "Шкідливо читати лежачи."
          - "Боролися мужньо й не шкодуючи сил."
      - label: "Краще підрядне речення"
        items:
          - "Перейшовши дорогу, мені стало легше."
          - "Готуючи вечерю, кіт забіг на кухню."
          - "Прочитавши інструкцію, стало зрозуміло."
          - "Повернувшись додому, почався дощ."
  - id: act-5
    type: error-correction
    title: Редагуємо звороти
    instruction: Виправте головну пунктуаційну або синтаксичну помилку.
    items:
      - sentence: "Прочитавши повідомлення Марія відповіла."
        error: "немає коми після звороту"
        correction: "Прочитавши повідомлення, Марія відповіла."
        explanation: Початковий зворот треба закрити комою.
      - sentence: "Марія прочитавши повідомлення, відповіла."
        error: "зворот у середині не відкритий комою"
        correction: "Марія, прочитавши повідомлення, відповіла."
        explanation: Серединний зворот відокремлюється з обох боків.
      - sentence: "Марія відповіла прочитавши повідомлення."
        error: "немає коми перед кінцевим зворотом"
        correction: "Марія відповіла, прочитавши повідомлення."
        explanation: Кінцевий зворот відокремлюється комою перед ним.
      - sentence: "Волонтери працювали, не покладаючи рук."
        error: "зайва кома у фразеологізмі"
        correction: "Волонтери працювали не покладаючи рук."
        explanation: Не покладаючи рук - сталий вислів.
      - sentence: "Глядачі слухали, затамувавши подих."
        error: "зайва кома у фразеологічному звороті"
        correction: "Глядачі слухали затамувавши подих."
        explanation: Затамувавши подих тут означає уважно, напружено.
      - sentence: "Шкідливо читати, лежачи."
        error: "зайва кома при способі дії"
        correction: "Шкідливо читати лежачи."
        explanation: Лежачи після читати відповідає на питання як?
      - sentence: "Він підвівся і не прощаючись, вийшов."
        error: "зворот між присудками не виділено з обох боків"
        correction: "Він підвівся і, не прощаючись, вийшов."
        explanation: І з'єднує присудки; зворот треба виділити.
      - sentence: "Вони боролися мужньо, й не шкодуючи сил."
        error: "зайва кома перед однорідною обставиною"
        correction: "Вони боролися мужньо й не шкодуючи сил."
        explanation: Мужньо й не шкодуючи сил разом описують спосіб боротьби.
      - sentence: "Перейшовши дорогу, мені стало легше."
        error: "немає спільного підмета"
        correction: "Коли я перейшов дорогу, мені стало легше."
        explanation: Безособове мені стало краще передати підрядним реченням.
      - sentence: "Готуючи вечерю, кіт забіг на кухню."
        error: "різні виконавці дії"
        correction: "Коли я готував вечерю, кіт забіг на кухню."
        explanation: Якщо вечерю готувала людина, потрібне підрядне речення.
      - sentence: "Прочитавши інструкцію, стало зрозуміло."
        error: "безособова головна частина"
        correction: "Після того як я прочитав інструкцію, стало зрозуміло."
        explanation: Треба назвати виконавця читання або змінити головну частину.
      - sentence: "Книга, прочитавши студентом, лежала на столі."
        error: "змішано дієприслівниковий і дієприкметниковий зворот"
        correction: "Книга, прочитана студентом, лежала на столі."
        explanation: Книга потребує дієприкметникового звороту, бо це означення.
workbook:
  - id: wb-1
    type: quiz
    title: Контроль M72
    instruction: Оберіть правильну відповідь.
    items:
      - question: "Що є дієприслівниковим зворотом?"
        options:
          - "працюючи над собою щодня"
          - "працьовитий студент"
          - "робота над собою"
        correct: 0
        explanation: Це дієприслівник працюючи із залежними словами.
      - question: "Яку роль виконує дієприслівниковий зворот?"
        options:
          - "обставина"
          - "означення"
          - "додаток"
        correct: 0
        explanation: Він пояснює дію-присудок.
      - question: "Яке речення правильно розставляє коми?"
        options:
          - "Працюючи над собою, ви змінюєте звички."
          - "Працюючи над собою ви змінюєте звички."
          - "Працюючи, над собою ви змінюєте звички."
        correct: 0
        explanation: Кома після всієї початкової групи.
      - question: "Який приклад є фразеологічним винятком?"
        options:
          - "сидіти склавши руки"
          - "сидіти, читаючи лист"
          - "сидіти, прочитавши лист"
        correct: 0
        explanation: Склавши руки в цьому значенні означає байдикувати.
      - question: "Яке речення краще виправляє Повернувшись додому, почався дощ?"
        options:
          - "Коли я повернувся додому, почався дощ."
          - "Повернувшись додому почався дощ."
          - "Дощ, повернувшись додому, почався."
        correct: 0
        explanation: Дощ не повертався; потрібне підрядне речення.
      - question: "Яке речення має дієприкметниковий зворот?"
        options:
          - "Лист, написаний олівцем, лежить на столі."
          - "Написавши листа, я перевірив адресу."
          - "Пишучи листа, я слухав музику."
        correct: 0
        explanation: Написаний олівцем пояснює іменник лист.
      - question: "Яка конструкція зазвичай без ком?"
        options:
          - "читати лежачи"
          - "лежачи на дивані, я читав"
          - "я, лежачи на дивані, читав"
        correct: 0
        explanation: Лежачи після читати означає спосіб дії.
      - question: "Що перевіряємо перед комами?"
        options:
          - "межу звороту"
          - "кількість літер"
          - "рід іменника після коми"
        correct: 0
        explanation: Кома має закривати всю групу звороту.
      - question: "Який варіант правильно передає однорідні звороти?"
        options:
          - "Відчинивши двері і ввімкнувши світло, охоронець оглянув кімнату."
          - "Відчинивши двері, і ввімкнувши світло охоронець оглянув кімнату."
          - "Відчинивши, двері і ввімкнувши, світло охоронець оглянув кімнату."
