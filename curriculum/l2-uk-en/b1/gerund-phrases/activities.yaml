        right: "Після того як завершите вправу, звірте відповіді."
      - left: "Отримавши повідомлення, команда виїхала."
        right: "Коли команда отримала повідомлення, вона виїхала."
      - left: "Переконавшись, що небезпеки немає, волонтери вийшли."
        right: "Після того як волонтери переконалися, що небезпеки немає, вони вийшли."
      - left: "Не гаючись, координаторка подзвонила медикам."
