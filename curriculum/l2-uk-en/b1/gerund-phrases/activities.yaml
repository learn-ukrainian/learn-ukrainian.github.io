        right: "Коли Олена повернулася додому, вона ввімкнула світло."
      - left: "Працюючи над проєктом, студенти знайшли помилку."
        right: "Коли студенти працювали над проєктом, вони знайшли помилку."
      - left: "Не зробивши першого кроку, нічого не досягнеш."
        right: "Якщо не зробиш першого кроку, нічого не досягнеш."
      - left: "Перейшовши дорогу, мені стало легше."
        right: "Коли я перейшов дорогу, мені стало легше."
      - left: "Готуючи вечерю, кіт забіг на кухню."
        right: "Коли я готував вечерю, кіт забіг на кухню."
      - left: "Прочитавши інструкцію, стало зрозуміло."
        right: "Після того як я прочитав інструкцію, стало зрозуміло."
