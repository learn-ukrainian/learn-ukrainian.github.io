  - id: wb-5
    type: error-correction
    title: Фінальна редактура M72
    instruction: Виправте речення так, щоб пунктуація, підмет і тип звороту були правильними.
    items:
      - sentence: "Працюючи над собою ви змінюєте звички."
        error: "немає коми після початкового звороту"
        correction: "Працюючи над собою, ви змінюєте звички."
        explanation: Зворот працюючи над собою закривається комою.
      - sentence: "Ви працюючи над собою, змінюєте звички."
        error: "зворот у середині не відкритий комою"
        correction: "Ви, працюючи над собою, змінюєте звички."
        explanation: Серединний зворот має дві коми.
      - sentence: "Ви змінюєте звички працюючи над собою."
        error: "немає коми перед кінцевим зворотом"
        correction: "Ви змінюєте звички, працюючи над собою."
        explanation: Зворот у кінці відокремлюється комою.
      - sentence: "Слухали, затамувавши подих."
        error: "зайва кома у фразеологізмі"
        correction: "Слухали затамувавши подих."
        explanation: Це сталий вислів.
      - sentence: "Він стояв, похилившись."
        error: "зайва кома при одиничному способі дії"
        correction: "Він стояв похилившись."
        explanation: Похилившись після стояв означає спосіб або позу.
      - sentence: "Це можна зробити, й не знаючи деталей."
        error: "зайва кома перед підсилювальною й"
        correction: "Це можна зробити й не знаючи деталей."
        explanation: У цій моделі й не знаючи деталей читається як виняток.
      - sentence: "Він встав і не дивлячись на нас, вийшов."
        error: "зворот між присудками не виділено правильно"
        correction: "Він встав і, не дивлячись на нас, вийшов."
        explanation: І з'єднує присудки, тому зворот має дві коми.
      - sentence: "Відчинивши двері, і ввімкнувши світло, охоронець оглянув кімнату."
        error: "зайва кома перед і між однорідними зворотами"
        correction: "Відчинивши двері і ввімкнувши світло, охоронець оглянув кімнату."
        explanation: Однорідні звороти з і не розділяємо комою.
      - sentence: "Дізнавшись результат, мені стало легше."
        error: "немає спільного підмета"
        correction: "Коли я дізнався результат, мені стало легше."
        explanation: Безособова головна частина потребує підрядної заміни.
      - sentence: "Повернувшись додому, вечеря вже стояла на столі."
        error: "підмет вечеря не повертався додому"
        correction: "Коли я повернувся додому, вечеря вже стояла на столі."
        explanation: Якщо повернувся я, треба назвати це в підрядному реченні.
      - sentence: "Лист, написавши студентом, лежав на столі."
        error: "дієприслівник помилково вжито замість дієприкметника"
        correction: "Лист, написаний студентом, лежав на столі."
        explanation: Зворот пояснює іменник лист, тому потрібен дієприкметник.
      - sentence: "Написаний студентом лист, викладач перевірив."
        error: "зайва кома після препозитивного дієприкметникового звороту"
        correction: "Написаний студентом лист викладач перевірив."
        explanation: "Це вже правило M67: зворот перед іменником у базовій моделі без коми."
