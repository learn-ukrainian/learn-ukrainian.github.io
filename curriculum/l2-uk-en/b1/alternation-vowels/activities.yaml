  - id: wb-10
    type: cloze
    title: Редакторський абзац
    instruction: Оберіть форму, яка найкраще відповідає контексту.
    text: "Учора я повернувся з {Києва|Київа|Кийова} і написав короткий звіт. У звіті я згадав старий {двір|двор|двур}, але в реченні з прийменником написав біля {двору|двіру|двіря}. Поруч стояв човен, а в описі берега треба було написати немає {човна|човена|човеня}. Потім я виправив форму {дня|деня|дена}, бо це родина день - дня. У нотатках про пору року я вибрав форму на початку {осені|осіні|осеня}. У кінці тексту було речення про {садок|садік|садек}, але після заперечення треба було написати немає {садка|садока|садіку}. У рецепті з'явилося {пшоно|пшено|пшино} і пакет {пшона|пшена|пшина}. Нарешті я змінив форму {допомагати|допомогати|допомігати} на правильну, а потім перевірив пару {стерти|стирти|стерати} - {стирати|стерати|стірати}."
  - id: wb-11
    type: essay-response
    title: Письмова самоперевірка
    instruction: Напишіть короткий текст і поясніть вибір форм.
    prompt: "Напишіть 120-160 слів українською. Частина 1: складіть коротку історію або опис дня і використайте щонайменше п'ять слів із чергуванням голосних. Частина 2: після тексту випишіть ці слова парами, наприклад день - дня або Київ - Києва. Частина 3: коротко поясніть дві помилки, яких ви хотіли уникнути."
    min_words: 120
    rubric:
      - criteria: Обсяг
        description: Текст має 120-160 слів і не розпадається на список окремих речень.
        points: 1
      - criteria: Сюжет
        description: Є зрозуміла ситуація, у якій форми потрібні природно.
        points: 1
      - criteria: П'ять форм
        description: Використано щонайменше п'ять слів із чергуванням голосних.
        points: 1
      - criteria: Пари форм
        description: Після тексту подано пари на зразок день - дня або Київ - Києва.
        points: 1
      - criteria: О/е - і
        description: Є принаймні одна правильна пара типу рік - року або піч - печі.
        points: 1
      - criteria: Біглий голосний
        description: Є принаймні одна правильна пара типу день - дня або садок - садка.
        points: 1
      - criteria: Е/о після шиплячих або й
        description: Правильно написано частотні слова на зразок вечеря, бджола, знайомий.
        points: 1
      - criteria: Дієслівна родина
        description: Якщо є дієслово з чергуванням, воно подане нормативно.
        points: 1
      - criteria: Пояснення
        description: Дві помилки пояснено через реальні пари форм.
        points: 1
      - criteria: Без штучних форм
        description: Немає форм на зразок Київа, садока, допомогати, осіні.
        points: 1
      - criteria: Регістр B1
        description: Мова проста, природна й доречна для навчального тексту.
        points: 1
      - criteria: Самоперевірка
        description: Учень може показати, як перевірив сумнівні форми.
        points: 1
