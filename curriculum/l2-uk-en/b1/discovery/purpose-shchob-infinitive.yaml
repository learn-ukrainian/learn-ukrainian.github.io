  text: "Синтаксична норма\n88\nте що, для того щоб, незважаючи на те що. Зробіть\
    \ висновок щодо того, як вибір \nсполучника змінює зміст речення. Назвіть серед\
    \ сполучників непохідні і похідні. Звіртеся з  поданою нижче інфор-\nмацією. За\
    \ походженням сполучники поділяють на непохідні і похідні. Непохідними є  сполучники,\
    \ які не співвідносяться з  іншими частинами \nмови: і (й), а, але, ні, чи, бо.\
    \ За будовою ці сполучники прості. Похідні сполучники утворилися зі слів інших\
    \ частин мови  — найчастіше \nпоєднанням"
