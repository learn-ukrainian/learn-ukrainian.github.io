- Підсумок
- Learner can express cause using через + Зн.в. (negative cause), завдяки + Д.в. (positive
  cause), від + Р.в. (emotional/physical cause), з + Р.в. (inner cause)
- Learner can distinguish завдяки (positive) from через (negative) causes and never
  mix them (*завдяки хворобі)
- Learner can express purpose using для + Р.в. (for/for the sake of), заради + Р.в.
  (for the sake of — emphatic), щоб + infinitive (in order to), за + Ор.в. (to fetch)
- Learner can use the constructions через те що, завдяки тому що, для того щоб in
  complex sentences (preview of Phase 8 subordination)
