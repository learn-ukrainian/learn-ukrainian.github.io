slug: aspect-integration-practice
title: 'Інтеграція виду: практика'
word_target: 4000
content_outline:
- section: Вступ та діагностика
  words: 600
  points:
  - 'H3: Правила занурення (Explicitly state that this is a 100% immersion module,
    and English is only allowed in the vocabulary table).'
  - 'H3: Базові концепції виду (Review of Perfective vs Imperfective foundational
    logic).'
  - 'H3: Діагностичне завдання (Test focusing on the ''Logic Switch'' metaphor: identifying
    simultaneous vs sequential actions).'
  - 'H3: Перевірка типової помилки (Addressing the confusion between habitual actions
    and one-time events, correcting errors like ''Кожного дня він прочитав новини'').'
- section: 'Поглиблення: Часові сполучники'
  words: 1000
  points:
  - 'H3: Сполучник «коли» (Detailed breakdown per State Standard §4.4.3: expressing
    simultaneity with Imp+Imp and sequentiality with Perf+Perf).'
  - 'H3: Межі дії: «доки» та «поки» (Semantic nuances of ''доки не''/''поки не'' as
    markers of a strict limit vs ongoing duration).'
  - 'H3: Миттєва реакція: «як тільки» (Instantaneous change using Perfective verbs).'
  - 'H3: Фонова дія: «тим часом як» (Contrasting continuous background actions using
    Imperfective).'
- section: 'Логічний перемикач: Послідовність чи одночасність'
  words: 900
  points:
  - 'H3: Алгоритм вибору виду (Visual flowchart metaphor for narrative planning: ''Did
    B start after A finished?'' vs ''Did B happen while A was in progress?'').'
  - 'H3: Раптові переривання дії (Using ''раптом'' as a Perfective trigger to interrupt
    an Imperfective background).'
  - 'H3: Зміна фокусу в історії (Analysis of aspect mixing in complex narrative patterns
    and how it signals a shift in focus).'
- section: Культурний контекст та типові помилки
  words: 800
  points:
  - 'H3: Народна мудрість (Analysis of the proverb «Доки грім не гряне, рак не свисне»
    and its aspectual logic with ''доки'' + Perfective).'
  - 'H3: Пастка майбутнього часу (Drill to eliminate the ''буду'' + Perfective infinitive
    error, reinforcing ''я напишу'' instead of ''я буду написати'').'
  - 'H3: Уникнення кальок (Replacing the unnatural ''в кінці кінців'' with authentic
    Ukrainian markers ''врешті-решт'' and ''зрештою'').'
- section: Практичне застосування та діалоги
  words: 700
  points:
  - 'H3: Наративна послідовність (Production task: using ''спочатку'', ''потім'',
    ''нарешті'' to structure a cohesive workday story).'
  - 'H3: Діалог 1: Планування вихідних (Integrating temporal connectors and high-frequency
    discourse markers in natural speech).'
  - 'H3: Діалог 2: Несподівана зустріч (Practicing sudden interruptions and aspect
    switching in a conversational context).'
