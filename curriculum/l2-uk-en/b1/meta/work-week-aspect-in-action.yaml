slug: work-week-aspect-in-action
title: 'Робочий тиждень: вид у дії'
word_target: 4000
content_outline:
- section: 'Вступ: Робота та вид дієслова'
  words: 600
  points:
  - Введення у тему «Робота» (§3.9) з фокусом на щоденні обов'язки та використання
    видів дієслова (§4.2.3.1).
  - 'Візуальна метафора для рівня B1: хвиляста лінія для недоконаного виду (процес,
    НДВ) та крапка/знак «Х» для доконаного (результат, ДВ).'
  - 'Діагностична вправа: розпізнавання різниці між «робив» (витрачав час) та «зробив»
    (досяг результату) на прикладі типових офісних ситуацій.'
- section: 'Презентація: Робочі завдання та звіти'
  words: 1000
  points:
  - Детальний розбір високочастотної лексики («завдання», «звіт») та їхніх видових
    колокацій (напр., складати/скласти звіт).
  - 'Граматика звітування: використання НДВ для опису рутини («подавати звіт щоп''ятниці»)
    та ДВ для завершених дій («подав звіт учора»).'
  - 'Культурний контекст: контраст між стандартним 40-годинним робочим тижнем та сучасним
    «гнучким графіком» і «віддаленою роботою» в українському IT.'
  - 'Форми майбутнього часу: планування робочого тижня за допомогою складеної/синтетичної
    форм НДВ (буду робити / робитиму) та простої форми ДВ (зроблю).'
- section: 'Аналіз помилок: Пастки для іноземців'
  words: 900
  points:
  - 'Типова помилка 1: використання ДВ у теперішньому часі. Корекція фраз типу «*Я
    напишу звіт зараз*» на правильне «Я пишу звіт зараз» (НДВ).'
  - 'Типова помилка 2: плутанина процесу та результату в минулому часі. Тренування
    на розрізнення «Я робив звіт» і «Я зробив звіт».'
  - 'Лінгвістичний нюанс: чоловічий рід слова «дедлайн» та правильне узгодження («жорсткий
    дедлайн», «вкластися в дедлайн»).'
  - 'Регістри мовлення: порівняння розмовного «планірка», сучасного «мітинг» та офіційного
    «нарада» (використання пари проводити/провести нараду).'
- section: Ділові ситуації та діалоги
  words: 1000
  points:
  - 'Автентичний діалог: обговорення термінів (дедлайн vs кінцевий термін vs реченець),
    пояснення стилістичної різниці між офіційним, пуристичним та сленговим вжитком.'
  - 'Ситуація «Планування»: колокації для зустрічей («призначити/скасувати/перенести
    зустріч») зі зміною виду залежно від статусу дії.'
  - 'Ситуація «Дедлайни»: лексика для опису успіхів та невдач («вкластися в термін»,
    «пропустити дедлайн»).'
  - 'Інтерактивний сценарій: нарада-звіт, де студент має перемикатися між описом минулих
    результатів (ДВ) та поточних або майбутніх процесів (НДВ).'
- section: Підсумок та професійна комунікація
  words: 500
  points:
  - 'Синтезувальне завдання: написання розповіді про робочий тиждень, що інтегрує
    всі видові контексти (минулі результати, поточні завдання, майбутні плани).'
  - Систематизація видових пар (НДВ/ДВ), які є критично важливими для професійної
    комунікації (з опорою на модуль b1-12).
  - 'Чекліст для самоконтролю: перевірка використання видів за фреймворком «Процес
    проти Результату».'
  - Короткий анонс модуля b1-61 (Професійна комунікація) для створення довгострокової
    мотивації.
