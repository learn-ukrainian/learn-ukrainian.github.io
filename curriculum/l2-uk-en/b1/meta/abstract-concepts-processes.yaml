slug: abstract-concepts-processes
title: 'Абстрактні концепції: процеси та зміни'
word_target: 4000
content_outline:
- section: Вступ
  words: 400
  points:
  - Establish the 'Business Consultant' persona to set a professional tone and introduce
    the temporal dimension of change (past, present, future vectors).
  - Introduce the 'Agency Rule', framing changes actively (e.g., 'Ми змінили країну')
    rather than passively, emphasizing Ukrainian agency and active participation.
- section: 'Основна лексика: Тренди та динаміка'
  words: 900
  points:
  - Present and categorize core process vocabulary into positive trends (розвиток,
    прогрес, зростання) and negative trends (занепад, спад, застій), using high-impact
    business contexts.
  - Provide a Cultural Hook box detailing the historic 88% growth in civil society
    trust vs. demographic decline since 1990, using 'зростання' and 'спад' in context.
  - Analyze 'перетворення' (transformation) and 'еволюція' (evolution) through the
    historic shift toward EU/NATO integration from 2003 to 2023, accompanied by contextual
    examples.
- section: Словотворення та граматичне вживання
  words: 800
  points:
  - Detail State Standard §4.3.4 by systematically explaining the formation of deverbal
    nouns using -ння/-ення suffixes (читати→читання, покращувати→покращення).
  - Contrast 'зростання' vs. 'ріст' and 'зростати' vs. 'рости', providing tables and
    clear examples to correct common learner calques related to physical vs. abstract
    growth.
  - Explain the pragmatic difference between 'зміна' (alteration/shift) and 'решта'
    (monetary change) with clear conversational examples to eliminate confusion.
- section: Аналітичне читання та аудіювання
  words: 1000
  points:
  - Provide a comprehensive economic review text focused on 'сталий розвиток' (sustainable
    development) and 'темпи зростання', demonstrating abstract vocabulary in a professional
    register.
  - Include a historical narrative detailing the 'еволюція поглядів' (evolution of
    views) in Ukraine, highlighting key geopolitical vector shifts to ground the vocabulary
    in reality.
  - Present an excerpt from a personal development blog that applies terms like 'особистісне
    зростання' and 'самовдосконалення' to individual processes, offering a varied
    context.
- section: Комунікація та обговорення
  words: 600
  points:
  - Create a simulated formal business meeting dialogue using professional collocations
    such as 'позитивна тенденція' and 'зберігається динаміка', providing clear conversational
    models.
  - Present an informal news discussion focusing on 'розвиток подій' concerning social
    and natural processes, showcasing register differences in vocabulary application.
- section: Підсумок та закріплення
  words: 300
  points:
  - Summarize the key 35+ process words, crucial verb-noun pairs, and the -ння/-ення
    suffix rules in a concise reference table.
  - Conclude with a guided reflection activity prompting learners to describe a significant
    social or personal change using the 'Agency Rule' and proper temporal markers.
