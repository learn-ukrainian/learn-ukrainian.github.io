slug: ready-for-immersion
title: Готові до занурення
word_target: 4000
content_outline:
- section: 'Вступ: Нові правила гри'
  words: 300
  points:
  - 'Welcome to the Airlock: Explicit warning that from M06 onwards, English disappears
    from explanations'
  - 'Proverb: «Слово — не горобець...» — accuracy and precision matter now'
  - 'Cultural Hook: The repression and rebirth of the letter ''Ґ'' as a symbol of
    linguistic identity'
  - 'English bridging: Maximum 2 paragraphs to explain the transition strategy'
- section: 'Діагностика: Що ми пам''ятаємо?'
  words: 250
  points:
  - Self-assessment checklist of metalanguage from M01-04
  - 'Identifying weak spots: Do you know the difference between ''відмінок'' and ''відміна''?'
  - 'Why terminology is not just pedantry: It''s the key to using the dictionary independent
    of English'
- section: 'Система мови: Частини мови'
  words: 500
  points:
  - 'Visual Analogy: The Tree of Speech (Дерево мови)'
  - 'Self-standing parts (Самостійнi): Іменник, Прикметник, Числівник, Займенник,
    Дієслово, Прислівник'
  - 'Service parts (Службові): Прийменник, Сполучник, Частка'
  - 'The Outlier: Вигук (Interjection)'
  - 'Common error warning: Confusing ''буква'' (letter) and ''звук'' (sound)'
- section: 'Дієслово: Час і Вид'
  words: 450
  points:
  - 'The engine of the sentence: Reviewing core verb terminology'
  - 'Aspect (Вид): Доконаний vs Недоконаний — how to spot them in dictionary pairs'
  - 'Tense (Час): Минулий, Теперішній, Майбутній (prostyj, skladnyj, skladenyj)'
  - 'Standard §4.2.3.1 alignment: Recognising synthetic vs analytic future forms'
- section: 'Стилістика: Як читати правила'
  words: 450
  points:
  - 'Decoding the Register: Formal Instructional Style (Standard §4.5.1)'
  - 'Key instructional verbs: вживається (is used), позначає (denotes), виражає (expresses)'
  - 'Abbreviation decoder: див. (see), пор. (compare), напр. (for example), і т.д.
    (etc.)'
  - 'Warning: Don''t speak like a textbook in real life (register awareness)'
- section: 'Синтаксис: Будова речення'
  words: 500
  points:
  - 'The Skeleton: Підмет (Subject) and Присудок (Predicate)'
  - 'The Flesh: Додаток (Object), Означення (Attribute), Обставина (Adverbial)'
  - 'Word Order: Why identifying the subject is harder in Ukrainian than English (flexible
    structure)'
  - 'Core A Requirement: Ensuring all 5 sentence members are defined and exemplified'
- section: 'Практика розуміння: Граматичний текст'
  words: 500
  points:
  - 'The Challenge: Reading a real (simplified) grammar explanation entirely in Ukrainian'
  - 'Topic: ''Чергування голосних'' (Vowel Alternation) — reading the rule about the
    rule'
  - 'Guided analysis: Highlighting terms, abbreviations, and instructional verbs'
  - 'Comprehension check: Questions in Ukrainian about the text'
- section: 'Практикум: Метамова в дії'
  words: 400
  points:
  - 'Describing words: How to explain ''стіл'' without saying ''table'''
  - 'Pop Culture Moment: Analyzing a famous song line or slogan using grammatical
    terms'
  - 'Error Correction: Using terms to explain WHY a sentence is wrong (e.g., ''Це
    знахідний відмінок, а не родовий'')'
- section: 'Ситуації: Урок української'
  words: 350
  points:
  - 'Classroom survival kit: Phrases for asking clarification'
  - «Як це пишеться?», «Що це означає?», «На який склад падає наголос?»
  - «Яка це частина мови?» — asking for grammatical context
- section: 'Підсумок: Готовність до занурення'
  words: 300
  points:
  - 'Final Readiness Checklist: Can you survive without English?'
  - 'The Pledge: Committing to reading grammar explanations in Ukrainian'
  - 'Motivational closing: ''Welcome to the Deep End'' — where real fluency begins'
