slug: indefinite-negative-pronouns
title: Невизначені та заперечні займенники
word_target: 4000
content_outline:
- section: 'Вступ: Логіка невизначеності'
  words: 600
  points:
  - 'Розкрити мету уроку: перехід від простих питальних займенників до складних логічних
    систем невизначеності.'
  - 'Ввести концепцію «точності невизначеності»: в українській мові вибір займенника
    залежить від рівня обізнаності мовця та реальності події.'
  - 'Представити персону (Ведучий логічних головоломок): вибір між частками — це стратегічна
    гра на знання та факти.'
- section: 'Реальна невизначеність: Займенники з часткою -сь'
  words: 850
  points:
  - 'Пояснити функцію серії на -сь (хтось, щось): агент або об''єкт реально існує,
    але є невідомим або спеціально не названим.'
  - 'Надати високочастотні приклади та словосполучення: «хтось дзвонив», «щось трапилось».'
  - 'Продемонструвати морфологію у таблицях: відмінюється лише корінь (когось, комусь),
    а частка -сь залишається незмінною.'
  - 'Сформулювати ключове правило: обов''язковість -сь для тверджень у минулому часі
    про фактичні події.'
- section: 'Гіпотетична та парціальна невизначеність: -небудь та де-'
  words: 850
  points:
  - 'Пояснити серію на -небудь: абсолютно невідомий, випадковий або гіпотетичний об''єкт
    (типово для запитань, майбутнього часу та умов).'
  - 'Наголосити на орфографії: обов''язкове написання через дефіс (хто-небудь).'
  - Ввести серію з де- (дехто, дещо, деякий) для позначення часткової кількості («певна
    частина з багатьох»).
  - 'Показати вжиток де- у формальному та академічному регістрах: конструкції на кшталт
    «дехто вважає, що...».'
- section: 'Абсолютне заперечення: Займенники з ні-'
  words: 900
  points:
  - 'Закріпити фундаментальне правило подвійного заперечення: конструкція «ніхто +
    не + дієслово» є обов''язковою.'
  - 'Візуалізувати морфологічне правило «розщеплення атома»: прийменник вклинюється
    між часткою ні- та займенником (ні з ким, ні до кого).'
  - 'Інтегрувати культурний контекст: використання слова «Ніхто» в українських прислів''ях
    як вираження абсолютної відсутності.'
  - Навести повну парадигму відмінювання заперечних займенників із фокусом на непрямі
    відмінки.
- section: 'Практикум: Контрасти та розв''язання помилок'
  words: 800
  points:
  - Запропонувати контрастивні ситуації для вибору між хтось, хто-небудь та дехто
    з детальним аналізом логіки.
  - Провести клініку «розщеплення прейменником» для відпрацювання правильної побудови
    фраз типу «ні про що».
  - Надати алгоритм (Logic Puzzle Flowchart) у вигляді тексту та пунктів для прийняття
    рішення щодо вибору правильної серії займенників.
  - Зробити підсумкову комплексну таблицю всіх серій займенників із їхніми семантичними
    обмеженнями.
