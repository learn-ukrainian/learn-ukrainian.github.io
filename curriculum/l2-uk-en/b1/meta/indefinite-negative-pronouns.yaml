slug: indefinite-negative-pronouns
title: Невизначені та заперечні займенники
word_target: 4000
content_outline:
  - section: 'Вступ: Логіка невизначеності (Introduction: The Logic of Uncertainty)'
    words: 600
    points:
      - 'State Standard alignment (§4.2.1.4): Expanding interrogative pronouns (хто,
        що) into the complex B1 systems of indefinite and negative pronouns.'
      - 'Cultural hook: The ''Precision of Uncertainty'' — explaining how Ukrainian
        semantic logic differs from English rule-based switching (someone vs. anyone).'
      - 'Persona introduction: The Logic Puzzle Host frames the choice between pronoun
        series as a strategic semantic game based on knowledge and certainty.'
  - section: 'Реальна невизначеність: Займенники з часткою -сь (Real Uncertainty:
      Pronouns with the Particle -сь)'
    words: 850
    points:
      - 'Usage of the -сь series (хтось, щось, якийсь): Expressing agents or objects
        known to exist but remaining unspecified or unnamed by the speaker.'
      - 'High-frequency collocations from research: ''хтось дзвонив'' (someone called),
        ''щось трапилось'' (something happened), ''хтось постукав'' (someone knocked).'
      - 'Morphology and declension: The base interrogative pronoun declines (когось,
        комусь) while the particle ''-сь'' remains invariable.'
      - 'Pedagogical rule: Why ''-сь'' is mandatory for past tense factual events
        where an agent clearly existed, contrasting with the ''-небудь'' error.'
  - section: 'Гіпотетична та парціальна невизначеність: -небудь та де- (Hypothetical
      and Partial Uncertainty: -небудь and де-)'
    words: 850
    points:
      - 'The -небудь series: Expressing truly random, hypothetical, or unknown agents
        in questions, future tense, and conditional statements.'
      - 'Spelling mastery: The mandatory hyphenation rule for all -небудь forms (хто-небудь,
        що-небудь) as a non-negotiable B1 literacy competency.'
      - 'The ''де-'' series (дехто, дещо, деякий): Semantic nuance of partial quantity
        (''some of many'') compared to the individual ''someone'' (хтось).'
      - 'Academic/Formal register: Using ''дехто вважає'' (some people think) as a
        standard rhetorical opener to introduce differing viewpoints.'
  - section: 'Абсолютне заперечення: Займенники з ні- (Absolute Negation: Pronouns
      with ні-)'
    words: 900
    points:
      - 'The Mandatory Double Negation Rule: Internalizing the ''ніхто + не + verb''
        structure to prevent English-transfer errors like ''*Ніхто прийшов''.'
      - 'The ''Splitting the Atom'' visual: Morphological rule where prepositions
        insert between ''ні-'' and the pronoun root (ні з ким, ні до кого, ні про
        що).'
      - 'Cultural resonance: Personification of ''Ніхто'' in proverbs and riddles
        (''Ніхто не знає, що нас чекає''), highlighting the concept of absolute absence.'
      - 'Declension patterns for negative pronouns: Mastering case changes (нікого,
        нікому) while maintaining the negative prefix.'
  - section: 'Практикум: Контрасти та розв''язання помилок (Workshop: Contrasts and
      Error Resolution)'
    words: 800
    points:
      - 'Contrastive analysis drills: Choosing between хтось, хто-небудь, and дехто
        in nuanced narrative contexts to develop native-like semantic intuition.'
      - 'Preposition split clinic: Intensive practice with ''ні з ким'' and ''ні про
        що'' to ensure correct spelling and morphological placement.'
      - 'The Logic Puzzle Flowchart: A definitive learner guide for selecting the
        correct pronoun series based on timeframe, certainty, and negation.'
      - 'Summary table: Comprehensive reference mapping of all indefinite and negative
        series with their corresponding usage constraints and case forms.'
