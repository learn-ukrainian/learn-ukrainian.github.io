slug: homonyms-paronyms
title: Омоніми та пароніми
word_target: 4000
content_outline:
- section: 'Вступ: Пастки мови'
  words: 400
  points:
  - Note 100% Ukrainian immersion policy for B1.1+; English is strictly forbidden
    in prose.
  - Define the difference between polysemy (багатозначність — related meanings) and
    homonymy (омонімія — unrelated meanings) using clear Ukrainian explanations.
  - Introduce the concept of paronyms (пароніми) as dangerous 'false twins' that sound
    similar but change the meaning of the sentence entirely.
- section: 'Омоніми: типи'
  words: 800
  points:
  - Create an H3 for 'Повні омоніми' (full homonyms) using the classic 'коса' example
    (braid, scythe, sand spit) with dictionary-style definitions.
  - Create an H3 for 'Омофони' (homophones) focusing on identical sound but different
    spelling (сонце / сон це, мене / мине) with sentence examples.
  - Create an H3 for 'Омографи' (homographs) showing how stress changes meaning (зАмок
    / замОк, мУка / мукА) with emphasis on pronunciation.
  - Create an H3 for 'Омоформи' (homoforms) that coincide in some grammatical forms
    only (мати — mother/verb; три — number/imperative verb).
- section: Омоніми в контексті
  words: 600
  points:
  - Explain that context is the only way to disambiguate homonyms in speech and reading.
  - 'Provide a cultural example: traditional wordplay and humor in Ukrainian folklore
    based on homonyms.'
  - Include a contextual analysis table using the word 'ключ' (від дверей, гарячий
    ключ, ключ журавлів) embedded in three distinct short narratives.
- section: 'Пароніми: слова-близнюки'
  words: 800
  points:
  - Define paronyms clearly. Explain why mixing them up is a common error among both
    native speakers and learners.
  - Create an H3 for 'Адрес чи адреса?' distinguishing location (адреса) from a formal
    greeting/document (адрес).
  - Create an H3 for 'Особовий чи особистий?' contextualizing personnel files (особова
    справа) vs private matters (особиста справа).
  - Create an H3 for 'Ефективний чи ефектний?' with a mini-dialogue demonstrating
    a business context.
  - Create an H3 for 'Громадський чи громадянський?' connecting to civic duty vs public
    spaces.
- section: Пароніми для тих, хто вивчає українську
  words: 800
  points:
  - Highlight learner-specific traps caused by L1 interference (e.g., компанія vs
    кампанія).
  - 'Provide a decolonized framing: Explain the strict difference between ''пам''ятка''
    (historical landmark/relic) and ''пам''ятник'' (monument/statue), which is often
    blurred in Russian.'
  - Present mnemonic devices (мнемонічні правила) to remember the correct paronym,
    using Ukrainian-centric associations.
  - 'Discuss register-specific paronyms: formal usage (економічний) vs everyday thrifty
    behavior (економний).'
- section: 'Практика: Точність слововживання'
  words: 600
  points:
  - Include an embedded text where learners must identify the incorrectly used paronym
    in a business email.
  - Provide context-clues practice sentences for disambiguating homonyms (e.g., identifying
    'мати' as a noun vs a verb).
  - Formulate a concluding summary emphasizing that precision in word usage is a mark
    of a B1-level speaker.
