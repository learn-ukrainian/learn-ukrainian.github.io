slug: novyny-yak-chytaty
title: 'Новини: як читати'
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - Пояснити роль медіа для мовного занурення згідно зі Стандартом §3.4 (інтернет,
    преса). Встановити 100% україномовний контекст уроку.
  - 'Розповісти про еволюцію незалежних медіа в Україні: від заснування «Української
    правди» до «Суспільного мовлення», фокусуючись на українській демократичній традиції.'
- section: 'Стратегії читання: Заголовки та ліди'
  words: 1100
  points:
  - 'Проаналізувати граматику заголовків: використання номінативних речень та еліпсу
    (пропущених дієслів) згідно зі стилістичними нормами §4.5.1.'
  - 'Розібрати структуру ліду: як швидко орієнтуватися в тексті, шукати підмет і присудок
    серед активних дієприкметників.'
  - 'Подати візуальний словник сайту новин: терміни «шапка», «стрічка новин», «бічна
    панель» із контекстними автентичними прикладами.'
- section: 'Медіаграмотність: Факти та маніпуляції'
  words: 1000
  points:
  - Навчити розрізняти об'єктивні новини та авторські колонки (op-eds) через аналіз
    маркерів суб'єктивності.
  - Розкрити поняття «джинса» (прихована політична або комерційна реклама) та пояснити,
    як громадянське суспільство вчиться її розпізнавати.
  - 'Описати правило «трьох джерел» для фактчекінгу, практикуючи лексику: «надійне
    джерело», «посилатися на джерело».'
- section: Лексичні пастки та автентичний контекст
  words: 900
  points:
  - 'Опрацювати типові помилки та хибних друзів перекладача: розрізнення «актуальний»
    (current) від actual, та «оперативний» (prompt) від operative.'
  - Ввести лексику офіційного стилю щодо суспільно-політичних подій (Стандарт §3.6),
    уникаючи русизмів (тільки «отримувати», а не «получати»).
  - 'Проілюструвати термінологію цитування: введення прямої та непрямої мови з посиланням
    на офіційні або анонімні джерела.'
- section: Продукція та підсумок
  words: 400
  points:
  - 'Організувати практику: міні-діалоги або дискусійні запитання для висловлення
    власної думки щодо прочитаних новин.'
  - Зробити підсумок «Читай, думай, перевіряй», згадати марафон «Єдині новини» як
    специфіку воєнного часу та заохотити до самостійного читання українських ЗМІ.
