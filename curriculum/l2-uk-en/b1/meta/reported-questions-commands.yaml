slug: reported-questions-commands
title: Непрямі питання та накази
word_target: 4000
content_outline:
- section: Діагностичний тест
  words: 500
  points:
  - 'Створити тест із 4-5 ситуативних речень для виявлення типової помилки: використання
    «що» замість «чи» у закритих загальних питаннях.'
  - Включити завдання на розрізнення дієслів «запитати» (пошук інформації) та «просити»
    (запит на дію).
  - Додати завдання на візуальне розпізнавання пунктуаційної помилки (збереження знака
    питання в кінці речення з непрямим питанням).
  - Надати короткий коментар до кожної помилки, щоб показати студенту його рівень
    володіння трансформацією прямої мови.
- section: Граматичне пояснення
  words: 1300
  points:
  - 'Виділити окремий H3 для загальних питань: пояснити обов''язкове використання
    сполучника «чи» та правило усунення «що».'
  - 'Виділити окремий H3 для спеціальних питань (хто, де, коли): показати трансформацію
    питальної інтонації на спадну розповідну та зняття знака питання (?).'
  - 'Виділити окремий H3 для непрямих наказів/прохань: детально розібрати конструкцію
    «просити/сказати» + «щоб» + дієслово в минулому часі. Пояснити логіку використання
    минулого часу для гіпотетичної майбутньої дії.'
  - 'Зробити лексичний аналіз регістрів: протиставити «наказати» (суворий, офіційний)
    та «вимагати» (категоричний) дієслову «просити» (ввічливий, стандартний).'
  - Надати таблицю зміни займенників та осіб при перетворенні прямої мови на непряму
    (наприклад, 'я' → 'він/вона', 'мій' → 'його/її').
- section: Практичні вправи
  words: 1000
  points:
  - 'Вправа на трансформацію: перетворення прямих імперативів на ввічливі непрямі
    прохання з конструкцією «просити, щоб».'
  - 'Вправа на змішане перетворення: переклад міксу прямих питань (загальних та спеціальних)
    у формат непрямої мови (складнопідрядні розповідні речення).'
  - 'Вправа на пошук та виправлення помилок (Error correction): текст із типовими
    помилками студентів (залишені знаки питання, неправильне використання «що» замість
    «чи», неправильний час після «щоб»).'
  - 'Завдання на доповнення речень: конструювання складнопідрядних речень за заданими
    робочими або побутовими ситуаціями.'
- section: Культурний контекст та діалоги
  words: 700
  points:
  - 'Дослідити концепт «ввічливого прохання» в українському суспільстві: пояснити,
    чому непрямі форми (''Чи не могли б ви...?'') переважають над прямими наказами.'
  - Проаналізувати різницю між звертаннями на «Ти» та «Ви» при передачі прохань у
    різних соціальних статусах (керівник та підлеглий, друзі).
  - 'Надати міні-діалоги з двох різних контекстів: формальна робоча нарада (де можуть
    вживати ''вимагати'' або ''просити'') та побутова розмова (неформальне ''попросити'').'
  - Включити опис правильної інтонації для фіксації спадної розповідної інтонації
    при читанні непрямих питань.
- section: Підсумок та самоперевірка
  words: 500
  points:
  - 'Створити зведену таблицю вибору сполучників: Запитання (Так/Ні) → чи; Запитання
    (Спеціальне) → питальне слово; Наказ/Прохання → щоб.'
  - Коротко резюмувати різницю між лексичним значенням «запитати» (інформація) та
    «попросити» (дія).
  - Подати чекліст готовності до модульного тесту (B1-41 Checkpoint) за темою перетворення
    всіх типів прямої мови.
  - 'Запропонувати відкрите рефлексивне завдання: описати недавнє складне прохання
    на роботі або вдома, використавши всі три ключові сполучники (що, чи, щоб).'
