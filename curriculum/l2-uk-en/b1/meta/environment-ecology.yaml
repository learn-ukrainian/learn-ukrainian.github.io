slug: environment-ecology
title: Довкілля та екологія
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - Introduce the modern Ukrainian concept of «еко-свідомість» (eco-consciousness)
    using the cultural hook of 'Rekava', the Lviv startup producing biodegradable
    coffee cups.
  - Detail the critical '7% Problem', explaining that landfills cover an area of Ukraine
    the size of Denmark, creating a massive ecological threat.
  - Establish the thematic setting of the Carpathians, framing them as the «легені
    Європи» (lungs of Europe) to highlight the importance of conservation.
- section: Словник та поняття
  words: 1000
  points:
  - Clarify the semantic differences between the natural «довкілля» (environment),
    the formal «навколишнє середовище», and «природа» (the natural world).
  - 'Integrate State Standard §3.14 vocabulary: list and provide examples for natural
    geographic objects (ліс, озеро, річка, гори) within the Carpathian context.'
  - 'Teach the grammatical requirement of the Genitive case with verbal nouns. Drill
    collocations: «забруднення повітря», «забруднення води», «забруднення ґрунту».'
  - 'Introduce waste management terms: «відходи», «сміття», and strongly recommend
    the native «вторинна переробка» over the borrowed «ресайклінг».'
- section: 'Природа України: Карпати'
  words: 1000
  points:
  - Provide a descriptive reading focus on the Carpathian ecosystem, featuring Lake
    Synevyr (the largest) and Lake Brebeneskul (the highest).
  - Discuss the severe ecological threat of «вирубка лісів» (deforestation) in the
    mountains and its direct impact on regional climate and flooding.
  - Detail the local biodiversity within the Carpathian Biosphere Reserve, incorporating
    State Standard §3.14 terms for flora and wild animals (дикі тварини).
- section: Причина і наслідок
  words: 800
  points:
  - 'Introduce State Standard §4.4.3 grammar: complex sentences using causal conjunctions
    «тому що», «через те що», and «бо».'
  - 'Provide syntactic models explaining ecological issues: e.g., ''Ліси зникають
    через те, що...'' or ''Ми сортуємо сміття, бо це важливо''.'
  - 'Map problem-to-solution vocabulary chains: link «викиди газів» to «глобальне
    потепління», and propose «відновлювана енергія» as the remedy.'
- section: Практика та підсумок
  words: 600
  points:
  - Write a dialogue between a Carpathian ecologist and a tourist discussing actionable
    steps to preserve the «крихка екосистема» (fragile ecosystem).
  - Simulate an 'eco-tips' poster (Еко-поради) that uses imperative or infinitive
    forms to encourage saving water and reducing plastic use.
  - Summarize the core vocabulary distinctions and reiterate the importance of individual
    contribution to the «захист довкілля».
