slug: motion-figurative-uses
title: Переносні значення дієслів руху
word_target: 4000
content_outline:
- section: 'Діагностика: Пряме та переносне значення'
  words: 500
  points:
  - Короткий діагностичний текст (100-150 слів) з насиченим вживанням переносних значень
    (напр., «час іде», «сонце сходить», «робота стала»).
  - 'Завдання на розрізнення: учні мають визначити, де дієслово описує фізичний рух,
    а де — метафоричний.'
  - 'Формулювання мети уроку: перехід від фізичної логіки переміщення до абстрактного
    мислення.'
- section: 'Аналіз: Логіка префіксів та культурний код'
  words: 1100
  points:
  - 'Детальний розбір просторової логіки українських префіксів в абстракції: «До-»
    як досягнення ліміту (дійти до висновку), «Ви-» як вирішення проблеми (вийти з
    ситуації, вийти на новий рівень), «Пере-» як зміна діяльності (перейти до справи).'
  - 'Презентація сталих виразів та фразеологізмів: етимологія та вживання виразів
    «Гоголем ходити», «П''ятами накивати», «Вискочити як Пилип з конопель» (пояснення
    без англійської мови).'
  - Окремий блок (callout) про те, як розшифровувати метафори, якщо їхнє пряме значення
    відоме.
- section: 'Поглиблення: Пастки переносних значень'
  words: 800
  points:
  - 'Аналіз типових помилок: чому «прийти до висновку» є калькою і чому українська
    логіка вимагає «дійти до висновку».'
  - 'Розбір пасток буквального перекладу (false friends): пояснення, чому не можна
    перекладати «go crazy» дослівно і як працює метафора «зійти з розуму».'
  - 'Таблиця-порівняння: коли використовувати дієслова руху в переносному значенні,
    а коли варто взяти спеціалізоване дієслово (напр., «проблема виникає» замість
    «проблема йде»).'
- section: 'Практика: Метафори в контексті'
  words: 900
  points:
  - 'Два міні-діалоги з життя: один у професійному контексті (підійти до питання,
    відійти від теми, перейти до справи), інший — у повсякденному емоційному (зайти
    в глухий кут, пройти через випробування).'
  - 'Аналіз колокацій: як правильно поєднувати ці вирази з прийменниками та іменниками
    в потрібних відмінках (напр., дійти + до + Р.в.).'
  - 'Вправа на підстановку: доповнення речень потрібними префіксальними дієсловами.'
- section: 'Підсумок: Читання та рефлексія'
  words: 700
  points:
  - Аналітична стаття «Метафори в нашому житті» з використанням цільової лексики модуля.
  - Аналіз газетних заголовків та реальних медіа-текстів («переговори зайшли в глухий
    кут»).
  - 'Підсумковий чек-лист: 5 ключових метафор, які студент має використовувати щодня.'
