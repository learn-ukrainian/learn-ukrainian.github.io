slug: checkpoint-motion-verbs
title: 'Контрольна точка: Дієслова руху'
word_target: 4000
content_outline:
- section: Вступ та діагностика
  words: 400
  points:
  - Створити вступний текст про значення дієслів руху як основи просторового мислення
    в українській мові.
  - Пояснити цілі контрольної точки відповідно до вимог Державного стандарту (§4.3.8).
  - Розробити масштабний діагностичний тест (до 25 питань) для перевірки базового
    розрізнення односпрямованих та різноспрямованих форм.
- section: 'Культурний контекст: Метро та залізниця'
  words: 800
  points:
  - Написати описовий наратив про станцію метро 'Арсенальна' (105.5 м), використовуючи
    дієслова вертикального та транзитного руху (сходити вниз, підніматися, переходити).
  - Описати діяльність Укрзалізниці ('Залізні люди') під час евакуації 2022 року.
  - Вбудувати в текст щонайменше 12 різних префіксальних дієслів руху, демонструючи
    контекст від'їзду (виїжджати, покидати) та прибуття (приїжджати).
- section: Аналіз та корекція типових помилок
  words: 800
  points:
  - Створити таблицю контрастивного порівняння для помилки односпрямованості (використання
    'йти' замість 'ходити' для регулярних дій).
  - 'Детально розібрати помилку транспорту: чітке розмежування ''йти'' (пішки) та
    ''їхати'' (транспортом) із прикладами подорожей Україною.'
  - 'Пояснити різницю між знахідним відмінком (напрямок/мета: куди?) та місцевим (локація:
    де?), розбираючи типову помилку ''йти в магазині''.'
- section: 'Префіксальна логіка: Простір та напрямок'
  words: 800
  points:
  - 'Провести контрастивний аналіз префіксів ''ви-'' та ''від-'': вихід із закритого
    простору (вийти з кімнати) проти віддалення від об''єкта (відійти від вікна).'
  - 'Пояснити просторові відношення подолання: перетин (переходити вулицю) та уникання
    (обходити перешкоду).'
  - 'Описати динаміку наближення: різниця між фазою наближення (підходити до) та фазою
    досягнення мети (доходити/доїжджати до).'
- section: Переносні значення та ідіоматика
  words: 800
  points:
  - Деталізувати соціолінгвістичний феномен 'переходити на українську' як глибоку
    особисту і суспільну трансформацію.
  - 'Навести таблицю абстрактних метафор із рухом: ''дощ іде'', ''час біжить'', ''справа
    йде на лад''.'
  - 'Описати ментальний рух і професійні ідіоми: ''приходити на думку'', ''виходити
    на зв''язок'' (для бізнесу), ''далеко піти'' (успіх).'
- section: Підсумок та інтеграційний наратив
  words: 400
  points:
  - Створити зразковий текст 'Мій маршрут', який об'єднує 10-15 префіксальних дієслів
    в одному логічному сюжеті.
  - 'Підсумувати вимоги щодо відмінків: знахідний для напрямку (в/на + Зн.в.), орудний
    для інструменту транспорту (поїздом, машиною).'
  - Підготувати фінальний блок вказівок для студентів щодо інтеграції цих навичок
    у щоденне мовлення.
