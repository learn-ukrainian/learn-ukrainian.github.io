slug: temporal-clauses
title: Часові підрядні речення
word_target: 4000
content_outline:
- section: Вступ та Діагностика
  words: 600
  points:
  - Introduce temporal clauses and their function in complex sentences according to
    State Standard §4.4.3.
  - Provide a diagnostic quiz focusing on the critical distinction between «коли»
    (point in time) and «поки» (duration/simultaneity).
  - Include a self-assessment on the «поки не» (until) negation trap to highlight
    English-to-Ukrainian transfer errors.
  - Set up the framework of simultaneous (одночасність) vs sequential (різночасовість)
    actions.
- section: 'Пояснення: Одночасність та Тривалість'
  words: 1000
  points:
  - Deep dive into «коли» vs «поки»/«доки» with a corrective drill (e.g., «Я читав,
    поки вона спала»).
  - 'Explain the grammar of simultaneous actions: emphasize that parallel background
    events require Imperfective aspect (Impf + Impf).'
  - Provide rich example tables demonstrating continuous background actions.
  - Introduce advanced B1 structures like «тим часом як» and «під час того як» for
    complex narrative layering.
- section: 'Пояснення: Послідовність та пастка «поки не»'
  words: 1000
  points:
  - 'Detail sequence connectors: «перш ніж», «після того як», «як тільки».'
  - 'Explain aspectual logic for sequencing: completed sequences require Perfective
    aspect (Perf + Perf).'
  - 'Deconstruct the ''Until'' Negation Trap: explicitly teach the rule of «поки не»
    + negative perfective verb as a boundary marker.'
  - Clarify the difference between «поки не» (until) and «поки що» (for now) with
    side-by-side comparative examples.
- section: 'Культурна перспектива: Час і Доля'
  words: 700
  points:
  - Explore the philosophical concept of «Усьому свій час» using temporal clauses
    to express general truths.
  - Analyze the idiom «Чекати з моря погоди» (passive waiting) versus actionable change
    using «як тільки».
  - 'Discuss linguistic elegance: how Ukrainian temporal markers create narrative
    depth and flow in storytelling.'
- section: Практика та Синтез
  words: 700
  points:
  - Provide sentence-building exercises ordering events with strict aspectual checks
    (Impf vs Perf).
  - Include an error-correction drill focused specifically on fixing aspectual mismatches
    and the «поки не» trap.
  - 'Set a narrative production task: learners write a short story incorporating at
    least 5 different temporal connectors and the idiom «Чекати з моря погоди».'
