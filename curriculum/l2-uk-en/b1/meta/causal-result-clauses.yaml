slug: causal-result-clauses
title: Причинові та наслідкові речення
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Діагностичний тест на причинові та наслідкові зв''язки: фокус на розрізненні
    розмовного «бо» та формального «оскільки».'
  - 'Аналіз типових орфографічних помилок: правило, що «тому що» завжди пишеться окремо
    (як два слова), ніколи не «томущо» чи «тому-що».'
  - 'Правила пунктуації: обов''язкова кома перед «тому що» для коректного з''єднання
    частин складного речення.'
- section: Причинові речення
  words: 1000
  points:
  - 'Імплементація Державного стандарту §4.4.3: детальне використання «тому що», «бо»
    та «через те що» як базова вимога для рівня B1.'
  - 'Регістри причинових сполучників: розрізнення «бо» (висока частотність, розмовний
    стиль, часто в кінці речення) та «тому що» (висока частотність, універсальний/нейтральний).'
  - 'Формальна логіка з «оскільки»: використання на початку речень в офіційних контекстах
    та активне витіснення русизму «тому як».'
  - 'Логіка «через те що»: середньочастотний нейтральний сполучник для позначення
    зовнішніх обставин на противагу позитивному «завдяки тому що».'
- section: Наслідкові речення
  words: 900
  points:
  - 'Наслідкові сполучники: «тому» (висока частотність), «отже» (логічний висновок)
    та «внаслідок» (низька частотність, формально-офіційний стиль).'
  - 'Формальні словосполучення: «Внаслідок аварії...», «Внаслідок того, що...» та
    їх використання в новинах і звітах.'
  - 'Оборотна логіка: використання діаграм Mermaid для ілюстрації зв''язку Причина
    ↔ Наслідок (А зумовлює Б, отже Б є наслідком А).'
  - 'Просунуті патерни: використання «завдяки тому що» для позитивних причиново-наслідкових
    зв''язків проти «у зв''язку з» для нейтрально-адміністративних.'
- section: Логіка та регістри
  words: 800
  points:
  - 'Стилістичні варіації: пояснення, чому варто уникати початку речень із «Тому що...»
    і надавати перевагу «Оскільки...» чи «Через те що...» у професійному мовленні.'
  - '«Аграрний етос» у логіці: розкриття культурного концепту «Хто полю годить, тому
    жито родить» як основи розуміння причини та наслідку.'
  - 'Причинові переконання: аналіз приказки «Диму без вогню не буває» як відображення
    глибокої української віри в причинність.'
- section: Агентність та практика
  words: 800
  points:
  - 'Історичний контекст агентності: перехід від сліпої «Долі» (фаталізму) до особистої
    відповідальності в українській літературі 19-20 століть.'
  - 'Творчість Франка («Лупайте сю скалу»): використання причинових структур для вираження
    необхідності активної дії («Ми робимо це, бо...»).'
  - 'Активний стан проти пасиву: підкреслення особистої відповідальності («Ми збудували
    це, тому що нам це було потрібно») як відображення сучасної української суб''єктності.'
  - 'Трансформаційна практика: вправи на перетворення пасивних, фаталістичних причин
    на активні наслідки, орієнтовані на результат.'
