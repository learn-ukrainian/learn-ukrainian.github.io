slug: motion-full-prefix-integration
title: 'Рух: інтеграція префіксів'
word_target: 4000
content_outline:
- section: Діагностичний тест
  words: 400
  points:
  - 'TTT (Test-Teach-Test) approach: Initial assessment of prefix choice (при- vs.
    до-, в- vs. за-) to identify individual friction points before formal explanation.'
  - 'Identification of aspectual shifts: diagnostic items to check if learners distinguish
    between ''походити'' (walk for a bit) and ''піти'' (set off/start going).'
- section: Система просторових префіксів
  words: 1000
  points:
  - 'Formal systematization based on §4.3.8 of the State Standard: the formation and
    usage of prefixed verbs from ''іти'' and ''їхати''.'
  - 'Spatial logic contrast: ''при-'' (arrival/presence) vs. ''до-'' (reaching a specific
    limit or edge), addressing a primary learner friction point.'
  - 'The nuances of entry: neutral entry ''в-/у-'' vs. ''за-'' (short visit, drop-by,
    or deviation from a path), emphasizing the ''brief visit'' semantics of ''за-''.'
  - 'Aspectual transformation: how prefixes change the lexical aspect and meaning
    of unidirectional and multidirectional bases.'
- section: Переносні значення та сталі вирази
  words: 800
  points:
  - 'High-frequency abstract uses: ''перейти на українську'' (language switch), ''перейти
    межу'' (crossing the line), and ''вийти заміж'' (marriage).'
  - 'Collocations of result and failure: ''нічого не вийшло'' (nothing worked out)
    vs. ''дійти згоди'' (reach an agreement) and ''прийти до висновку'' (conclude).'
  - 'Idiomatic expressions and register: ''вийти сухим із води'' (get away with it)
    and the cultural concept of ''руки не доходять'' (never getting around to something).'
- section: Урбаністика та легенди
  words: 1200
  points:
  - 'Cultural Hook — Kyiv Metro: Navigating Arsenalna (the deepest station in the
    world) using ''сходити'' (descend), ''виходити'' (exit), and ''переходити'' (transfer).'
  - 'Historical Narrative: The legend of Sultan Osman II at Kamianets-Podilskyi Castle,
    focusing on the tactical and metaphorical meaning of ''відійти'' (to retreat).'
  - The 'wet spot' of Khotyn and verbs of passing/shedding, integrating 'пройти' (pass
    through) as both a physical movement and a historical process.
- section: Практичне застосування та підсумок
  words: 600
  points:
  - 'Algorithm for prefix selection: a decision tree for learners based on Goal (при-)
    vs. Limit (до-) vs. Entry type (в- vs. за-).'
  - 'Production task: Creative storytelling or travel itinerary using at least 10
    different prefixed motion verbs to describe a complex historical route.'
  - 'Final review of the ''по-'' vs. ''пі-'' logic: ensuring learners avoid using
    multidirectional bases for ''setting off'' (піти vs. походити).'
