slug: phonetics-assimilation
title: 'Фонетика: асиміляція та спрощення'
word_target: 4000
content_outline:
- section: 'Вступ: Принцип милозвучності'
  words: 500
  points:
  - Explicitly introduce the concept of 'милозвучність' (euphony) as a core characteristic
    of the Ukrainian language that creates its 'singing' rhythm (співоча мова).
  - Connect this principle to State Standard §4.1.1, explaining that assimilation
    and simplification are not restrictions, but structural 'tools for harmony' that
    balance vowels and consonants.
  - Ensure 100% Ukrainian immersion in the introduction, setting a positive, native-centric
    tone without English scaffolding.
- section: Асиміляція за дзвінкістю та глухістю
  words: 800
  points:
  - 'Define regressive voicing assimilation clearly: a voiceless consonant becomes
    voiced before a voiced one (e.g., вокзал → [вогзал], боротьба → [бород''ба]).
    Provide visual phonetic equations like т + б = [дб].'
  - Explicitly address the critical error of devoicing final consonants (interference
    from other languages). Emphasize that Ukrainian strictly preserves final voiced
    sounds (хліб is [хл'іб], not [хл'іп]; дід is [дід], not [діт]).
  - Discuss progressive assimilation and the behavior of voicing pairs (з/с) depending
    on whether they precede vowels or consonants (зберегти vs списати).
- section: Асиміляція за м'якістю та вимова -ться
  words: 700
  points:
  - 'Explain softness assimilation: consonants soften when followed by another soft
    consonant (e.g., [с''в''іт], [з''н''ім]). Use high-frequency vocabulary to demonstrate
    this ''softness flow''.'
  - Provide intensive instruction on the reflexive ending '-ться'. Explicitly state
    it is pronounced as [ц'ц'а] and correct the common error of pronouncing it literally
    as [т'-с'а] or hard [ца].
  - Highlight the 'pure' native sound of soft pronunciation in reflexive verbs (сміється,
    навчаються), contrasting it with regional or foreign interferences.
- section: Спрощення в групах приголосних
  words: 700
  points:
  - 'Detail the specific cluster simplifications from State Standard §4.1.1: стн →
    сн (чесний), здн → зн (пізно), стл → сл (щасливий). Show clear ''before and after''
    word formations (честь → чесний).'
  - List high-frequency words where simplification is mandatory (серце, сонце, проїзний,
    виїзний) and instruct students to avoid 'Cluster Literalism' (pronouncing silent
    letters).
  - Frame these simplifications as practical mechanisms the language uses to 'clean
    up' awkward clusters, maintaining its characteristic rhythm and ease of breath.
- section: Чергування голосних та приголосних
  words: 800
  points:
  - Explain the alternation of vowels (о/і, е/і, and phonetic zero) in closed versus
    open syllables (e.g., стіл — столи, ніч — ночі, учень — учня) as a phonetic balancing
    mechanism.
  - 'Detail essential consonant alternations used in case endings and derivation:
    г/ж/з, к/ч/ц, х/ш/с (e.g., нога → ніжка / на нозі, рука → ручка / у руці). Frame
    these as historical harmony tools.'
  - Link these alternations back to the overarching principle of avoiding awkward
    consonant clusters and preserving euphony across word boundaries.
- section: Практика та запобігання помилкам
  words: 500
  points:
  - Outline minimal pair drills focusing on words that differ only by assimilation
    or end-voicing, to train auditory discrimination.
  - Include a dictation-style practice segment focusing on words where spelling and
    pronunciation differ significantly (like '-ться' verbs or simplified clusters)
    to prevent spelling errors based on pronunciation.
  - Integrate specific 'скоромовки' (tongue twisters) designed to target consonant
    clusters and soft assimilations, celebrating the musicality and articulatory agility
    of Ukrainian speech.
