slug: aspect-past-result-process
title: 'Вид у минулому: результат і процес'
word_target: 4000
content_outline:
- section: Діагностичний тест
  words: 600
  points:
  - Set immersion to 100% Ukrainian. Introduce the cultural concept of 'Толока' (traditional
    mutual aid) with an engaging narrative.
  - Provide a diagnostic text contrasting 'Ми будували хату' (the long, shared community
    process) with 'Ми збудували хату' (the final physical achievement).
  - 'Introduce a visual metaphor: Imperfective as a continuous wavy line (process),
    Perfective as a solid checkmark or point on a timeline (result).'
  - Include 3-4 diagnostic questions to check if learners correctly identify the completed
    action versus the ongoing action.
- section: Презентація та теорія
  words: 1000
  points:
  - Define Perfective Aspect (Result) using the cultural hook 'Зробив діло — гуляй
    сміло', explaining that rest comes only after a completed action.
  - Define Imperfective Aspect (Process) using the hook 'Тихіше їдеш — далі будеш',
    focusing on duration and manner.
  - Explain past tense formation rules matching State Standard §4.2.3.1 (хотів/хотіла/хотіли
    vs побачив/побачила/побачили), emphasizing gender/number agreement.
  - 'Create a comprehensive table of linguistic markers: Process markers (''весь день'',
    ''довго'', ''тривалий час'') vs. Result markers (''вже'', ''нарешті'', ''успішно'').'
- section: Порівняльний аналіз
  words: 800
  points:
  - 'Analyze the ''Toloka Paradigm'' in detail: how focusing on the social activity
    requires imperfective, while focusing on the physical building requires perfective.'
  - 'Contrast communication intents: A manager asking for results (''Що ви зробили?'')
    vs. a friend asking about the day''s activities (''Що ви робили?'').'
  - Show sentence pairs demonstrating how adding 'до кінця' or 'нарешті' forces a
    shift from imperfective to perfective verb forms.
  - Use modal hedging ('можливо', 'ймовірно') to explain nuanced context dependencies,
    elevating the text to B1 register.
- section: Практика та виправлення помилок
  words: 900
  points:
  - 'Address the ''Process for Result'' transfer error explicitly: explain why ''Я
    писав статтю'' is wrong when reporting a finished task, and correct it to ''Я
    написав статтю''.'
  - 'Address the ''був'' auxiliary error: explicitly correct the false structure ''Я
    був ходив'', reinforcing the synthetic past tense.'
  - 'Provide a ''Gender Mismatch Clinic'': a set of examples and rules ensuring female
    speakers use ''-ла'' and male speakers use ''-в'', avoiding phonetic merging.'
  - Include a narrative scenario where a student reports on exam preparation (process)
    and passing the exam (result).
- section: Діалоги та підсумок
  words: 700
  points:
  - 'Present a realistic workplace dialogue: an employee reporting to a result-oriented
    supervisor using perfective verbs.'
  - 'Present a social dialogue: friends discussing how they spent their weekend using
    imperfective verbs.'
  - Summarize the rules of past tense aspect choice in a clear, bulleted 'Підсумок'
    section.
  - Connect the grammar point to real-world Ukrainian communication, affirming the
    active role ('Ми збудували' instead of passive forms).
