slug: aspect-negation
title: Вид у запереченні
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - Provide a 100% Ukrainian introduction (no English scaffolding) framing negation
    not just as 'not doing' something, but as a spectrum from general denial to strict
    prohibition.
  - Include a diagnostic question set (intuition check) comparing affirmative and
    negative pairs to reveal learner assumptions.
  - 'Introduce State Standard §4.2.2.2.1: clearly explain the morphosyntactic rule
    where direct objects shift to the Genitive case under negation (e.g., ''Не зрозумів
    слóва'').'
- section: Пояснення граматики
  words: 1100
  points:
  - 'Create an H3 for ''Загальне заперечення'': detail the default rule for using
    the Imperfective aspect for general statements and facts (e.g., ''Я не читав книги'')
    with a comparative table.'
  - 'Create an H3 for ''Виняток: Ще не'': explain how the expectation of a completed
    result triggers the Perfective aspect (e.g., ''Я ще не прочитав''), using clear
    situational examples.'
  - 'Create an H3 for ''Заборони та попередження'': contrast general prohibitions
    (Imperfective: ''Не роби!'') with specific warnings meant to prevent a negative
    result (Perfective: ''Не зроби помилку!'').'
  - Include a contrastive semantics breakdown demonstrating the difference between
    a statement of fact ('не читав') and a failed attempt/missed result ('не прочитав').
- section: Практика та аналіз помилок
  words: 1000
  points:
  - Integrate a Mermaid flowchart illustrating the aspect decision algorithm (Fact?
    -> Imperfective; Not yet? -> Perfective; Warning? -> Perfective).
  - 'Address the ''Double Negation'' error: create a targeted drill explicitly showing
    the necessity of ''не'' alongside negative pronouns (''ніколи'', ''нічого'').'
  - 'Address ''Prohibition vs. Warning'' errors: explain why ''Не зроби'' is incorrect
    for general orders, reinforcing the Imperfective ''Не роби цього''.'
  - Include specific guided exercises converting affirmative Accusative objects into
    negative Genitive objects, practically applying the State Standard rule.
- section: Культура та діалоги
  words: 1000
  points:
  - 'Detail ''The Polite Refusal'' ritual: explain the cultural necessity of softening
    ''ні'' with gratitude or repetition (''Дякую, але я не можу'').'
  - Provide functional vocabulary and dialogue examples for softening refusals ('На
    жаль, ні', 'Я б з радістю, але...').
  - Write a situational dialogue in a bookstore highlighting Genitive object triggers
    ('немає книги', 'не бачив словника') and the use of 'взагалі не'.
  - Write an academic/workplace dialogue showing how to use 'ще не' + Perfective to
    excuse delays while signaling intended completion.
- section: Підсумок
  words: 400
  points:
  - Present a consolidated aspect usage matrix summarizing the correlation between
    negation type (prohibition, fact, expectation) and aspect.
  - Provide a clear, bulleted syntactic checklist verifying mastery of the Genitive
    object rule and double negation requirements.
