slug: aspect-future
title: Вид у майбутньому часі
word_target: 4000
content_outline:
- section: Діагностичний тест
  words: 600
  points:
  - Вступний текст (100% українською), що вводить у тему планування та майбутнього
    часу.
  - 'Діагностична вправа: розпізнавання доконаного та недоконаного виду в контексті
    обговорення планів на вихідні.'
  - 'Аналіз типової помилки: пояснення, чому не можна казати «я буду прочитати» і
    як англомовна логіка універсального ''will'' заважає правильному вибору виду.'
- section: Граматичне пояснення
  words: 1200
  points:
  - 'H3: Аналітична (складена) форма — структура «буду + інфінітив недоконаного виду»,
    таблиця відмінювання, акцент на тривалому процесі дії.'
  - 'H3: Синтетична форма — утворення за допомогою афіксів -тиму, -тимеш (напр., робитиму),
    позиціонування як органічного та природного стандарту сучасної української мови.'
  - 'H3: Простий майбутній час (доконаний вид) — утворення форм без дієслова «бути»
    (скажу, поборють), акцент на результаті; пояснення, чому закінчення теперішнього
    часу тут вказують на майбутнє.'
  - Порівняльна таблиця або Mermaid-схема вибору між трьома формами залежно від комунікативної
    мети (процес проти результату).
- section: Культурний та етнолінгвістичний контекст
  words: 800
  points:
  - 'H3: Українська ментальність і майбутнє — аналіз прислів''я «Не кажи гоп, поки
    не перескочиш» та фокусу на завершеному результаті.'
  - 'H3: Мовні ритуали обережності — використання фраз «сплюнь і постукай по дереву»
    при обговоренні планів, щоб не «зурочити».'
  - 'H3: Лексика намірів — порівняння через міні-діалоги розмовного «збиратися» та
    формального «мати намір».'
- section: Практика та корекція помилок
  words: 800
  points:
  - 'H3: Трансформація аналітичної форми на синтетичну (наприклад, «буду боротися»
    -> «боротимуся») для збагачення природності мовлення.'
  - 'H3: Виправлення помилок — розбір некоректного вживання доконаного виду в значенні
    поточного моменту (чому не можна казати «я зроблю зараз», коли дія вже триває).'
  - 'H3: Дрилінг парадигм відмінювання згідно з Державним стандартом 2024: відпрацювання
    форм «скажу», «закричите», «поборють» у контекстних реченнях.'
- section: Продукція та підсумок
  words: 600
  points:
  - 'H3: Рольова гра «Новорічні обіцянки» — вживання дієслова «обіцяти» виключно з
    доконаним видом майбутнього часу (обіцяю зробити/досягти).'
  - 'H3: Складання планів — активне використання слів «сподіватися» та «гадати» в
    розмовному контексті планування відпустки.'
  - Підсумкова порівняльна таблиця трьох способів вираження майбутнього з короткими
    правилами їхнього стилістичного та видового застосування.
