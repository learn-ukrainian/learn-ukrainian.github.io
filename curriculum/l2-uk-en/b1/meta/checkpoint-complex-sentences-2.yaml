slug: checkpoint-complex-sentences-2
title: 'Контрольна точка: складні речення (частина 2)'
word_target: 4000
content_outline:
- section: Огляд та цілі
  words: 400
  points:
  - 'Вступ до контрольної точки: визначення цілей рівня B1.3b та важливості підсумкового
    оцінювання згідно з Державним стандартом §4.4.3.'
  - Обговорення поняття «інтеграція» у контексті поєднання різних типів підрядних
    речень для побудови складних висловлювань.
  - 'Самоаналіз: ідентифікація сильних сторін та прогалин у знаннях синтаксису складного
    речення.'
- section: Допустові та часові зв'язки
  words: 1000
  points:
  - 'Допустові речення: ґрунтовна рекапітуляція використання сполучників «хоча», «дарма
    що», «незважаючи на те що».'
  - 'Культурний контекст: аналіз прислів''я «Вода камінь точить, хоча й м’яка» як
    приклад допустового зв''язку та цінності наполегливості.'
  - 'Часові речення: сполучне слово «коли» (одночасність) та «поки» (тривалість).
    Правила вживання видів дієслова в часових структурах.'
  - 'Практика: трансформація простих речень з прийменником «незважаючи на» у складнопідрядні
    з «хоча».'
- section: Причиново-наслідкова логіка
  words: 900
  points:
  - 'Аналіз причинових сполучників: «тому що», «бо», та офіційний варіант «через те
    що».'
  - 'Типова помилка: плутанина між причиною («тому що») та наслідком («тому»). Контрастний
    аналіз на детальних прикладах.'
  - 'Логіка та мудрість: розбір вислову «Не відкладай на завтра того, що можна зробити
    сьогодні, тому що завтра може бути пізно».'
  - Функціональне вживання «отже» для підбиття підсумків та формулювання висновків
    у текстах.
- section: Трансформація непрямої мови
  words: 1000
  points:
  - 'Твердження в непрямій мові: заміна займенників та вказівних слів. Усунення типової
    помилки збереження займенника першої особи.'
  - 'Непрямі питання: використання частки «чи» для загальних питань та збереження
    запитальних слів (де, коли, чому) для спеціальних питань.'
  - 'Синтаксична норма: відсутність знака питання та розповідна інтонація в непрямих
    питаннях.'
  - 'Накази та прохання: конструкція «попросив, щоб...» (+ минулий час) та «наказав»
    + інфінітив. Тренування з метамовою.'
- section: Комплексна практика та самоконтроль
  words: 700
  points:
  - 'Інтеграційне завдання: побудова речень з 2-3 підрядними частинами різних типів
    (наприклад, часове + причинове).'
  - 'Пунктуаційний практикум: розстановка ком у складних реченнях та при непрямій
    мові.'
  - 'Оцінювання прогресу: перевірка готовності до переходу на фазу B1.4. Фінальний
    зріз знань.'
  - Потрібно більше практики? Рекомендації щодо додаткових вправ на основі типових
    помилок.
