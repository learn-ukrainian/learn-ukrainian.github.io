slug: numerals-collectives-fractions
title: 'Числівники: збірні та дроби'
word_target: 4000
content_outline:
- section: Вступ та діагностика
  words: 500
  points:
  - 'Diagnostic cloze task: testing the distinction between ''два'' and ''двоє'' in
    conversational contexts (e.g., ''два студенти'' vs ''нас двоє'').'
  - 'Module objectives in Ukrainian: mastering collective and fractional numerals
    to achieve natural B1+ fluency in daily situations.'
  - 'Explicit reminder: 100% Ukrainian immersion, establishing the grammatical baseline.'
- section: Збірні числівники та «Пастки»
  words: 1200
  points:
  - 'The ''Who counts?'' logic (Flowchart/rules): identifying triggers for collectives,
    specifically living males (двоє хлопців), mixed groups, baby animals (четверо
    цуценят), and plurale tantum (троє дверей).'
  - 'Rule breakdown: mandatory Genitive Plural case agreement after collective numerals
    (двоє студентів, четверо коней) presented in a clear paradigm table.'
  - 'Addressing the ''Grandmother Trap'': explicit rule forbidding collectives with
    feminine animate nouns (must use ''три бабусі'').'
  - 'Addressing the ''Phone Trap'': explicit rule forbidding collectives with inanimate
    masculine nouns (must use ''два телефони'').'
- section: Дроби, відсотки та особливі форми
  words: 1000
  points:
  - 'Fractional numerals in daily life: половина, третина, чверть; emphasizing their
    integration into time-telling expressions (чверть на третю, о пів на другу).'
  - 'Mastering ''півтора/півтори'' (one and a half): high-frequency usage and the
    strict requirement for the following noun to be in Genitive Singular (півтора
    місяця, півтори години).'
  - 'Percentages and decimals: formation rules, reading format (нуль цілих п''ять
    десятих), and agreement with the Genitive case (п''ять відсотків).'
- section: 'Культурний контекст: Магія чисел'
  words: 800
  points:
  - 'Analysis of the magical number 3 in Ukrainian Folklore: exploring the proverb
    ''Бог трійцю любить'' and the recurrence of ''three brothers/tasks'' in traditional
    tales.'
  - 'The Holy Number 12 and the ''12 Dishes'': cultural anchoring of Christmas Eve
    (Святий Вечір) traditions, representing the apostles and the months of the year.'
  - Reading comprehension incorporating both collective numerals and cultural statistics.
- section: Мовленнєва практика та підсумок
  words: 500
  points:
  - 'Real-world social scenarios: mini-dialogues applying ''нас п''ятеро'' at a restaurant
    and discussing statistics using fractions.'
  - 'Mathematical contexts and recipes: applying fractional numerals to measurements
    with a focus on conversational fluidity.'
  - Summary table consolidating rules for cardinal vs. collective triggers and 'півтора'
    agreement.
