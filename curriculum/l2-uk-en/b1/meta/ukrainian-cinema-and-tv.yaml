slug: ukrainian-cinema-and-tv
title: Українське кіно та серіали
word_target: 4000
content_outline:
  - section: Вступ — Україна на екрані (Introduction — Ukraine on Screen)
    words: 500
    points:
      - Українське кіно як мистецтво та засіб самовираження; висвітлення теми дозвілля
        та хобі за Державним стандартом (§3.4).
      - 'Від Довженка до сьогодення: короткий огляд еволюції від німого кіно до сучасних
        стрімінгів.'
      - 'Термінологічна різниця: вживання лексем «кіно», «фільм» та синоніма «стрічка»
        (кінострічка) у журналістському контексті.'
  - section: Золота ера — Довженко і поетичне кіно (The Golden Era — Dovzhenko and
      Poetic Cinema)
    words: 800
    points:
      - 'Олександр Довженко та його шедевр «Земля»: візуальна мова та світове визнання.'
      - Українська школа поетичного кіно як опір радянському соцреалізму через фольклор
        та міфологію.
      - 'Культурний гачок: Сергій Параджанов і «Тіні забутих предків» (1965) — маніфест
        гуцульської культури та української ідентичності.'
  - section: Сучасне кіно та феномен дубляжу (Modern Cinema and the Dubbing Phenomenon)
    words: 900
    points:
      - 'Нова хвиля: «Атлантида» та «Погані дороги» — осмислення війни та посттравматичного
        досвіду через екран.'
      - 'Культурний феномен: історія успіху українського дубляжу (від «Альфа» до сучасних
        блокбастерів) як точки національної гордості.'
      - 'Комедії та серіали: «Слуга народу» та його вплив на реальну політику.'
      - 'Типова помилка: розрізнення понять «серіал» (TV series) та «серія» (episode)
        — «Дивлюся новий серіал» vs «Дивлюся нову серію».'
  - section: Документальне кіно та голос правди (Documentary Cinema and the Voice
      of Truth)
    words: 700
    points:
      - Роль документалістики у фіксації подій Майдану та повномасштабного вторгнення.
      - 'Тріумф «20 днів у Маріуполі» Мстислава Чернова: перший Оскар в історії України
        (2024) та документування воєнних злочинів.'
      - 'Дієслівне керування: вживання «знімати фільм» (shoot) та «зніматися в кіно»
        (act/appear).'
  - section: 'Як говорити про фільми: лексика та граматика (Talking About Movies:
      Vocab and Grammar)'
    words: 700
    points:
      - 'Лексика кінокритики: як описати сюжет, акторську гру та режисерську роботу.'
      - 'Граматична пастка: правильна структура з дієсловом «подобатися» — тренування
        моделі «Мені подобається цей фільм» (Dative subject) проти помилкового «Я
        подобаю...».'
      - 'Прийменниковий контроль: вживання «у фільмі» замість помилкового «на фільмі».'
      - 'Agency Pass: надання переваги активному стану («Режисер зняв фільм») над
        пасивним («Фільм був знятий...»).'
  - section: Підсумок — Дивись українською! (Summary — Watch in Ukrainian!)
    words: 400
    points:
      - 'Де дивитися: онлайн-платформи (Netflix, Takflix) та кінофестивалі (Одеський
        МКФ, «Молодість»).'
      - 'Рекомендації: створення власного списку перегляду (watchlist) та використання
        фразеології рецензування.'
  - section: Потрібно більше практики? (Need More Practice?)
    words: 0
    points:
      - Додаткові вправи на закріплення лексики кіно та відпрацювання давального відмінка.
