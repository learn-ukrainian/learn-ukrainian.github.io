slug: ukrainian-cinema-and-tv
title: Українське кіно та серіали
word_target: 4000
content_outline:
- section: Вступ — Україна на екрані
  words: 500
  points:
  - Розкрити тему дозвілля (кінотеатр, телебачення, стрімінги) згідно з Державним
    стандартом (§3.4).
  - Пояснити різницю між лексемами «фільм» (конкретний твір), «кіно» (мистецтво/заклад)
    та «стрічка» (публіцистичний синонім).
  - Дати короткий огляд еволюції українського кінематографа від класики до сучасного
    онлайн-перегляду.
- section: Золота ера — Довженко і поетичне кіно
  words: 800
  points:
  - Описати значення Олександра Довженка та його фільму «Земля» для світового кінематографа.
  - Пояснити феномен українського поетичного кіно як мистецький спротив соцреалізму
    через звернення до фольклору та міфології.
  - Навести приклад фільму «Тіні забутих предків» Сергія Параджанова як маніфесту
    національної ідентичності.
- section: Сучасне кіно та феномен дубляжу
  words: 900
  points:
  - Розповісти про історію успіху українського дубляжу (від перших кроків із серіалом
    «Альф» до сучасних блокбастерів) як точку національної гордості.
  - Оглянути сучасні художні фільми, що осмислюють війну та посттравматичний досвід
    (наприклад, «Атлантида», «Погані дороги»).
  - 'Пояснити типову лексичну помилку: різницю між «серіал» (ціле шоу) та «серія»
    (один епізод) з наведенням чітких прикладів.'
- section: Документальне кіно та голос правди
  words: 700
  points:
  - Підкреслити роль документалістики у фіксуванні історичної правди (Майдан, повномасштабна
    війна).
  - Розповісти про тріумф стрічки «20 днів у Маріуполі» (режисер Мстислав Чернов)
    та здобуття першого Оскара в історії України.
  - 'Пояснити дієслівне керування: різницю між активними діями «знімати фільм» (робити
    кіно) та «зніматися в кіно» (бути актором).'
- section: 'Як говорити про фільми: лексика та граматика'
  words: 700
  points:
  - 'Інтегрувати лексику кінокритики: сюжет, акторська гра, жанри, прем''єра, режисерська
    робота.'
  - 'Відпрацювати граматичну конструкцію з давальним відмінком: «Мені подобається
    цей фільм» (для уникнення помилки «Я подобаю»).'
  - Навчити правильного прийменникового керування («у фільмі», а не «на фільмі»).
  - Продемонструвати перевагу активного стану («Режисер зняв стрічку») над пасивним
    («Було знято»).
- section: Підсумок — Дивись українською!
  words: 400
  points:
  - Надати рекомендації щодо легального перегляду українського кіно (спеціалізовані
    онлайн-платформи, як Takflix, кінофестивалі).
  - Заохотити студентів до створення власного списку перегляду (watchlist).
  - Узагальнити вивчену лексику для написання коротких рецензій і відгуків.
- section: Потрібно більше практики?
  words: 0
  points:
  - Вказати на додаткові вправи для закріплення кінолексики та відпрацювання давального
    відмінка.
