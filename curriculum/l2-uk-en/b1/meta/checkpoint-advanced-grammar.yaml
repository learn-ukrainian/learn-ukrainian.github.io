slug: checkpoint-advanced-grammar
title: 'Контрольна точка: Просунута граматика'
word_target: 4000
content_outline:
- section: Вступ та огляд компетенцій
  words: 400
  points:
  - 'Привітання та огляд цілей модуля: перевірка граматичних навичок рівня B1.4 (дієприкметники,
    дієприслівники, безособові форми, числівники).'
  - Пояснення важливості просунутої граматики для вільного спілкування та переходу
    від базових структур до складних текстів.
  - Ознайомлення з концепцією 'простого ускладненого речення' згідно з вимогами стандарту.
- section: 'Дієприслівники: Динаміка та помилки'
  words: 600
  points:
  - 'Створення H3 для недоконаного виду (-учи/-ючи, -ачи/-ячи): детальне пояснення
    вираження одночасності дій з наочними прикладами.'
  - 'Створення H3 для доконаного виду (-вши, -ши): пояснення вираження послідовності
    дій з відповідними парадигмами.'
  - 'Створення H3 для типових помилок: глибокий розбір явища ''dangling participle''
    (неузгодженість підмета) та синтаксичних методів його уникнення.'
- section: 'Дієприкметники: Активні форми та запозичення'
  words: 600
  points:
  - 'Створення H3 для уникнення кальок: заміна штучних активних дієприкметників теперішнього
    часу на природні конструкції ''який/що + дієслово''.'
  - 'Створення H3 для активних дієприкметників минулого часу на -лий: правила їхнього
    утворення та вживання (наприклад, пожовкле листя).'
  - 'Створення H3 для узгодження з іменником: правила відмінювання, позиціонування
    дієприкметникового звороту та пунктуаційні норми.'
- section: Пасивні конструкції та безособові форми
  words: 600
  points:
  - 'Створення H3 для філософії активного стану: демонстрація переваг конструкцій
    ''депутати прийняли закон'' над штучними пасивними формами.'
  - 'Створення H3 для форм на -но, -то: алгоритм їхнього утворення та специфіка фокусування
    на результаті дії (наприклад, ''Зроблено в Україні'').'
  - 'Створення H3 для граматичної помилки ''clashed agents'': чітке пояснення заборони
    на додавання дійової особи в орудному відмінку до форм на -но/-то.'
- section: Демінутиви та мовна ментальність
  words: 600
  points:
  - 'Створення H3 для концепції кордоцентризму: дослідження того, як демінутиви відображають
    філософію ''мови серця'' та емоційну глибину мовця.'
  - 'Створення H3 для іменникових суфіксів (-ик, -ок, -очок, -еньк-): аналіз їхньої
    прагматичної ролі від вираження інтимності до створення іронії.'
  - 'Створення H3 для дієслівних демінутивів: розгляд унікальних українських форм
    (спатоньки, їстоньки) та стилістичних контекстів їхнього доречного вживання.'
- section: 'Числівники: Збірні та дробові'
  words: 600
  points:
  - 'Створення H3 для збірних числівників (двоє, троє): семантичні правила вживання
    та сувора заборона на поєднання з іменниками жіночого роду.'
  - 'Створення H3 для відмінювання збірних числівників: правила узгодження в непрямих
    відмінках (зустрів двох друзів, нас було п''ятеро).'
  - 'Створення H3 для дробових числівників: особливості читання математичних дробів
    та відсотків у статистичних і суспільно-політичних текстах.'
- section: Інтеграція та підсумок фази
  words: 600
  points:
  - 'Створення H3 для інтеграційного завдання: практичний аналіз тексту, переповненого
    канцеляризмами, з його подальшим перетворенням на живу мову.'
  - 'Створення H3 для комплексного самоконтролю: діагностика розуміння синтаксису
    ускладненого речення та засвоєних морфологічних норм.'
  - 'Створення H3 для підсумків: загальна оцінка прогресу студента та мотиваційний
    місток до вивчення абстрактних понять у модулі B1.5.'
