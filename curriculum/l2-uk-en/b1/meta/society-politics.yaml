slug: society-politics
title: Суспільство та політика
word_target: 4000
content_outline:
  - section: Вступ (Introduction)
    words: 500
    points:
      - 'Thematic alignment with State Standard §3.6 (Social Relations & State Structure):
        Why civic literacy and state structure vocabulary are essential for B1 learners.'
      - 'Historical Hook: Constitution of Pylyp Orlyk (1710) as one of the world''s
        first democratic documents, establishing the separation of powers before Montesquieu
        as evidence of early Ukrainian democratic traditions.'
      - 'Overview of the three branches of power in modern Ukraine: legislative, executive,
        and judicial.'
  - section: Політичні інституції та влада (Political Institutions & Power)
    words: 800
    points:
      - 'Official register focus: Analyzing news headlines using passive constructions
        and verbal nouns (e.g., ''формування уряду'', ''прийняття закону'').'
      - 'Learner error: Confusing ''Політика'' (the sphere/policy) with ''Політик''
        (the person/politician) – drill stress patterns and usage context.'
      - 'High-frequency collocations for power dynamics: ''прийти до влади'', ''органи
        державної влади'', ''поділ влади'', and ''голова уряду''.'
  - section: Громадянське суспільство та історія (Civil Society & History)
    words: 900
    points:
      - 'Engagement Hook: The Human Chain (1990) ''Українська хвиля'' – a narrative
        of civic unity and ''соборність'' involving millions of citizens from Kyiv
        to Lviv.'
      - 'Learner error: Distinguishing between ''Громадський'' (public transport/space)
        and ''Громадянський'' (civil society/rights) to avoid root-similarity confusion
        (Громадський транспорт vs Громадянське суспільство).'
      - 'Vocabulary expansion: ''Громадянин'' (citizen), their rights (''права''),
        and duties (''обов''язки'') in a democratic state.'
  - section: Демократичний процес та дискурс (Democratic Process & Discourse)
    words: 900
    points:
      - 'The vocabulary of elections: ''брати участь у виборах'', ''виборча дільниця'',
        ''день голосування'', and ''право голосу''.'
      - 'Syntactic focus: Constructing complex causal sentences using ''тому що''
        and ''через те що'' for political argumentation and justification of views.'
      - 'Register contrast: Distinguishing between the formal language of news broadcasts
        and ''kitchen table'' political discussions among citizens.'
  - section: Право, закон та громадянські права (Law, Legislation & Civil Rights)
    words: 700
    points:
      - 'Legal terminology in context: ''ухвалити закон'', ''порушувати закон'', ''згідно
        із законом'', and ''гарант конституції''.'
      - 'Learner error: Correcting the calque ''громадянський шлюб'' to the proper
        ''цивільний шлюб/кодекс'' (distinguishing civil law from civic/social status).'
      - 'Discussion of fundamental freedoms: ''свобода слова'', ''захищати права'',
        and ''принципи демократії''.'
  - section: Підсумок (Summary)
    words: 200
    points:
      - Synthesis of high-frequency civic collocations and summary of register distinctions
        (formal vs. informal political talk).
      - 'Practice recommendations: Encouraging learners to follow Ukrainian news to
        observe institutional vocabulary in real-time.'
