slug: society-politics
title: Суспільство та політика
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Вступ до теми суспільних відносин та державного устрою: пояснення важливості
    громадянської грамотності для рівня B1.'
  - 'Історичний контекст: Конституція Пилипа Орлика 1710 року як приклад ранніх українських
    демократичних традицій та поділу влади (законодавча, виконавча, судова).'
  - Огляд трьох гілок влади в сучасній Україні та їхніх основних функцій.
- section: Політичні інституції та влада
  words: 800
  points:
  - Аналіз офіційного стилю (новинних заголовків) з використанням віддієслівних іменників
    (наприклад, 'формування уряду', 'прийняття закону').
  - 'Розбір типової помилки: різниця між словами ''політика'' (сфера діяльності) та
    ''політик'' (особа) з наголосом на правильній вимові.'
  - 'Опрацювання високочастотних словосполучень: ''прийти до влади'', ''органи державної
    влади'', ''поділ влади'', ''голова уряду'' з прикладами в контексті.'
- section: Громадянське суспільство та історія
  words: 900
  points:
  - 'Історичний приклад соборності: Живий ланцюг «Українська хвиля» 1990 року як прояв
    громадянської єдності мільйонів українців.'
  - 'Лексичний розбір: чітке розмежування прикметників ''громадський'' (наприклад,
    транспорт, простір) та ''громадянський'' (суспільство, права, обов''язки).'
  - 'Розширення словникового запасу: поняття ''громадянин'', його ''права'' та ''обов''язки''
    в умовах демократичної держави.'
- section: Демократичний процес та дискурс
  words: 900
  points:
  - 'Лексика виборчого процесу: ''брати участь у виборах'', ''виборча дільниця'',
    ''день голосування'', ''право голосу''.'
  - 'Синтаксична конструкція: створення складних речень причини з використанням сполучників
    ''тому що'' та ''через те що'' для аргументації політичних поглядів.'
  - 'Стилістичний контраст: порівняння формальної мови телевізійних новин із розмовною
    лексикою побутових політичних дискусій.'
- section: Право, закон та громадянські права
  words: 700
  points:
  - 'Юридична термінологія у повсякденному вжитку: ''ухвалити закон'', ''порушувати
    закон'', ''згідно із законом'', ''гарант конституції''.'
  - 'Виправлення кальки: пояснення, чому слід вживати ''цивільний шлюб'' та ''цивільний
    кодекс'' замість помилкового ''громадянський шлюб''.'
  - 'Обговорення фундаментальних свобод: ''свобода слова'', ''захищати права людини''
    та ''принципи демократії'' з використанням автентичних прикладів.'
- section: Підсумок
  words: 200
  points:
  - Синтез ключових громадянських словосполучень та закріплення стилістичних відмінностей
    між формальним і неформальним спілкуванням.
  - 'Практичні рекомендації: поради щодо регулярного читання українських новин для
    спостереження за політичною лексикою в реальному часі.'
