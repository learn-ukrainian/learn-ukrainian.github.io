slug: b1-final-exam
title: Фінальний іспит B1
word_target: 4000
content_outline:
- section: 'Вступ: Структура іспиту та оцінювання'
  words: 600
  points:
  - Представлення екзаменатора та пояснення цілей фінального тестування рівня B1.
  - 'Огляд 12-бальної шкали оцінювання в Україні: розподіл на початковий (1-3), середній
    (4-6), достатній (7-9) та високий (10-12) рівні.'
  - 'Культурний контекст: відмова від радянської 5-бальної системи на користь сучасної,
    більш гнучкої та об''єктивної системи.'
  - 'Очікування від рівня B1: здатність розуміти головне та підтримувати комунікацію
    в непередбачуваних ситуаціях.'
- section: 'Читання та аудіювання: Академічний контекст'
  words: 800
  points:
  - 'Текст для читання про реалії вступної кампанії: формат НМТ (Національний мультипредметний
    тест) як комп''ютерна альтернатива ЗНО.'
  - 'Введення академічної лексики в контекст: «прохідний бал», «умови вступу», «завдання».'
  - 'Історія для аудіювання/читання про студентські забобони: ритуал закликання «Шари»
    опівночі та сон із підручником під подушкою.'
  - Вправи на перевірку розуміння тексту (діагностика TTT).
- section: 'Граматика та лексика: Аналіз типових помилок'
  words: 1000
  points:
  - 'Аналіз видів дієслів: контраст між процесом і результатом. Виправлення поширеної
    помилки (суржику) «я здавав іспит» на правильне «я складав іспит» (процес) та
    «я склав іспит» (результат).'
  - 'Диференціація дієслів руху в навчальному контексті: «йти в університет» (один
    раз, зараз) проти «ходити в університет» (регулярно).'
  - 'Лексичні помилки: заміна калькованого «получати оцінку» на нормативне «отримувати
    оцінку».'
  - 'Повторення складнопідрядних речень: правильне використання сполучників причини
    (тому що, через те що) та мети (для того щоб) при аргументації.'
- section: 'Продуктивні навички: Письмо та говоріння'
  words: 1000
  points:
  - 'Письмове завдання: написання короткого мотиваційного есе про плани після іспиту
    та академічні цілі, інтегруючи слова «вступ», «перевірка готовності».'
  - 'Критерії оцінювання письма: використання складних синтаксичних конструкцій та
    широкого спектру лексики.'
  - 'Усне мовлення: симуляція діалогу з екзаменатором про стрес перед тестуванням,
    методи підготовки та ставлення до забобонів.'
  - 'Вимога до говоріння: чітке висловлювання власної думки та аргументація.'
- section: Результати та перехід до рівня B2
  words: 600
  points:
  - 'Інтерпретація балів: що означає «середній бал» та «позитивний результат» для
    успішного закриття рівня B1.'
  - 'Рефлексія студента: заохочення оцінити свій прогрес від простих тем до складного
    граматичного аналізу.'
  - 'Огляд переходу до B2: анонс майбутніх тем (пасивний стан, дієприкметники, академічний
    та професійний стилі).'
  - 'Традиційне українське побажання успіху перед фінальним ривком: «Ні пуху, ні пера!»
    — «До біса!».'
