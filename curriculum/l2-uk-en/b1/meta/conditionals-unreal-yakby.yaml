slug: conditionals-unreal-yakby
title: 'Умовні речення: нереальна умова (якби)'
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - 'Діагностичний квіз із 4-5 питань: перевірка навичок розрізнення реальної умови
    («якщо») та нереальної («якби»).'
  - Введення концепції «Reality Check» (Реальність проти Фантазії/Мрії) для розуміння
    модальності без використання англійської мови.
  - 'Визначення ірреальної умови: як ми говоримо про те, чого немає, але чого ми дуже
    хочемо (відповідно до §4.4.3 Державного стандарту).'
- section: Граматика та правила
  words: 1200
  points:
  - 'Формула утворення умовного способу: поєднання дієслова у формі минулого часу
    з часткою «би» або «б».'
  - 'Аналіз сполучника «якби» як головного маркера нереальності та його підсилювальних
    (емфатичних) форм: «якби тільки», «якби ж то».'
  - 'Детальна контрастивна таблиця: порівняння конструкцій з «якщо» (реальні плани)
    та «якби» (ірреальні ситуації), з акцентом на використання виключно минулого часу.'
  - 'Правила української милозвучності: коли писати «би» (після приголосних), а коли
    «б» (після голосних).'
- section: Культурний контекст
  words: 800
  points:
  - 'Детальний аналіз знаменитої цитати Тараса Шевченка: «Якби ви вчились так, як
    треба, то й мудрость би була своя».'
  - 'Контекст послання «І мертвим, і живим...»: пояснення того, як граматична конструкція
    нереальної умови допомагає передати глибокий жаль та національний докір.'
  - 'Роль умовного способу в українській афористиці: розбір 2-3 відомих прислів''їв
    (наприклад, «Якби знав, де впадеш...»).'
- section: Практика та типові помилки
  words: 900
  points:
  - 'Виправлення найпоширенішої лексичної кальки: чому не варто казати «якщо б», і
    як правильно використовувати синтетичну форму «якби».'
  - 'Подолання часової невідповідності: розбір типових помилок іноземців типу «якби
    я маю» чи «якби я знатиму» та їхня корекція.'
  - 'Трансформаційні дрилі: серія прикладів, де реальні життєві обмеження перетворюються
    на гіпотетичні мрії (Я не маю грошей -> Якби я мав гроші...).'
- section: Діалоги та застосування
  words: 500
  points:
  - Мовленнєві моделі та міні-діалоги зі сценаріями «Якби не...» для обговорення альтернативних
    історій та важливих життєвих рішень.
  - 'Інтеграція цільової лексики: використання слів «мріяти», «уявляти», «шкодувати»
    в контексті гіпотетичних ситуацій.'
  - Корисні розмовні колокації («було б краще», «на жаль») для повсякденного спілкування
    та висловлення порад.
