slug: health-wellness
title: Здоров'я та самопочуття
word_target: 4000
content_outline:
  - section: Вступ (Introduction)
    words: 600
    points:
      - 'Introduction of the core concepts: ''здоров''я'' (health) vs. ''самопочуття''
        (well-being/state). Connect to module b1-62 by discussing how environmental
        factors like ecology impact one''s ''стан здоров''я''.'
      - 'Establish the ''Active Patient'' persona: learners practice asking ''Як ваше
        самопочуття?'' and ''На що ви скаржитеся?'' while taking an active role in
        describing their condition rather than passively receiving advice.'
  - section: Термінологія та симптоми (Terminology and Symptoms)
    words: 1000
    points:
      - 'Linguistic accuracy focus: Correction of the common Russism ''хворіти грипом''
        (Instrumental) to the correct Ukrainian construction ''хворіти на грип'' (на
        + Accusative). Drill with various diseases (кір, ангіна, застуда).'
      - 'Grammar of Sensation: Clarify the distinction between ''почуватися'' (to
        feel as a state) and ''відчувати'' (to sense/perceive). Explicitly correct
        the error ''Я відчуваю добре'' to ''Я почуваюся добре''.'
      - 'Pain Construction: Detailed drill on the structure [У мене] (Genitive) +
        [болить/болять] (Verb) + [частина тіла] (Nominative). Contrast with English
        ''I have a...'' to ensure proper syntax.'
  - section: 'Культурний контекст: Протяг та траволікування (Cultural Context: Drafts
      and Herbal Wisdom)'
    words: 800
    points:
      - 'The Cult of ''Protyah'': Explore the uniquely Ukrainian fear of drafts (''протяг'').
        Discuss social scenarios like closing windows in public transport and the
        belief that ''протяг'' is a primary cause of ''нездужання'' even in summer.'
      - 'Herbalism and Home Remedies: Introduction to ''народна медицина''. Focus
        on ''калина'' (viburnum) for colds, ''ромашка'' (chamomile) for inflammation,
        and ''м''ята'' (mint) for digestion. Note the ubiquity of pharmacies (''аптеки'')
        that sell these alongside modern drugs.'
  - section: 'Практика: У лікаря та в аптеці (Practice: At the Doctor and Pharmacy)'
    words: 1000
    points:
      - 'Medical Competencies (State Standard §3.7): Functional language for ''діагностика''
        (diagnostics), including ''здавати аналізи'' (to take tests) and ''проходити
        обстеження'' (to undergo examination).'
      - 'Register Differentiation: Practice formal interaction with a doctor (describing
        history, receiving a ''діагноз'') vs. informal registers (complaining to a
        friend or asking for advice on ''лікування'' at the pharmacy).'
      - 'Pharmacy Scenarios: Asking for ''ліки'' (medicine) and ''засоби профілактики''
        (preventative measures), focusing on ''зміцнення імунітету'' (strengthening
        immunity).'
  - section: Підсумок та поради (Summary and Advice)
    words: 600
    points:
      - 'Wellness Advice: Using ''варто/треба'' with health verbs. Focus on ''профілактика''
        as ''краще ніж лікування''. Discuss ''здорове харчування'' and ''режим дня''
        for ''міцне здоров''я''.'
      - 'Social Etiquette and Wishes: Proper use of the toast/response ''На здоров''я!''
        and the standard wish for a sick person ''Бажаю швидкого одужання!''.'
