slug: health-wellness
title: Здоров'я та самопочуття
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - Define and contrast the core concepts of «здоров'я» (general health status) and
    «самопочуття» (current physical/mental well-being) with contextual examples.
  - Connect to ecology (module b1-62) by explaining how environmental factors impact
    one's «стан здоров'я».
  - Introduce the 'Active Patient' persona, presenting introductory diagnostic questions
    («Як ваше самопочуття?», «На що ви скаржитеся?») and emphasizing active reporting.
- section: Термінологія та симптоми
  words: 1000
  points:
  - Provide a clear paradigm for «хворіти на...» (на + Accusative), actively highlighting
    it as the correct Ukrainian construction vs. incorrect instrumental usage. Give
    examples for кір, ангіна, застуда, грип.
  - 'Explain the Grammar of Sensation: delineate the usage of «почуватися» (state,
    paired with adverbs) and «відчувати» (perception, paired with nouns).'
  - 'Drill the pain construction: [У мене] + [болить/болять] + [Nominative body part],
    utilizing tables to show singular/plural verb agreement.'
- section: 'Культурний контекст: Протяг та траволікування'
  words: 800
  points:
  - Detail the cultural phenomenon of «протяг» (draft), its perceived role in causing
    «нездужання», and related social etiquette (e.g., closing windows in transport).
  - Explain the role of «народна медицина» (folk medicine), specifically detailing
    the use of «калина», «ромашка», and «м'ята» for treating colds and inflammation.
  - Discuss the integration of traditional herbal remedies within modern «аптеки»
    (pharmacies) in Ukraine.
- section: 'Практика: У лікаря та в аптеці'
  words: 1000
  points:
  - Present functional language for medical «діагностика» (diagnostics) based on State
    Standard §3.7, such as «здавати аналізи» and «проходити обстеження».
  - Provide dialogue examples distinguishing formal register with a doctor (describing
    medical history, receiving a «діагноз») and informal register with a friend.
  - Outline pharmacy interactions, focusing on requesting «ліки» and «засоби профілактики»
    for «зміцнення імунітету».
- section: Підсумок та поради
  words: 600
  points:
  - Summarize wellness advice using modal constructions «варто / треба» + infinitive
    health verbs.
  - Highlight the importance of «профілактика», «здорове харчування», and «режим дня»
    for maintaining «міцне здоров'я».
  - Present social etiquette phrases, including the toast «На здоров'я!» and the standard
    recovery wish «Бажаю швидкого одужання!».
