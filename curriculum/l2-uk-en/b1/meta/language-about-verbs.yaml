- section: "Вступ: Чому термінологія дієслів важлива"
  words: 250
  points:
  - "Пояснення важливості володіння граматичною метамовою для самостійного вивчення на рівні В1."
  - "Огляд основних дієслівних категорій, що будуть вивчені в модулі: вид, час, способи."
  - "Зв'язок метамовної компетентності з майстерністю оперування видом дієслова."
  - "Вимоги до іммерсії: українські терміни з англійськими еквівалентами в дужках при першому введенні, потім лише українські."
- section: "Вид дієслова: Доконаний та недоконаний"
  words: 400
  points:
  - "Визначення та розмежування термінів: 'вид', 'доконаний вид', 'недоконаний вид'."
  - "Аналіз поширеної помилки: плутанина між 'видом' і 'часом' дієслова, пояснення їх фундаментальної різниці."
  - "Детальне роз'яснення концепції 'виду' як показника завершеності/незавершеності дії."
  - "Практика ідентифікації виду дієслів у реченнях на основі контексту."
  - "Правильне використання української термінології ('доконаний', 'недоконаний') замість прямих перекладів з інших мов."
- section: "Концепції дії: Дія, процес, результат"
  words: 400
  points:
  - "Визначення ключових термінів: 'дія', 'процес', 'результат' та їх роль у виборі виду."
  - "Розмежування 'тривалості' та 'повторення' дії, їх зв'язок з недоконаним видом."
  - "Аналіз поширеної помилки: ігнорування концепцій 'процесу' та 'результату' при виборі виду."
  - "Розбір прикладів, що ілюструють, як ці концепції допомагають уникнути помилок."
  - "Створення чітких таблиць для візуалізації відмінностей між 'дія', 'процес', 'результат'."
- section: "Часи дієслова: Теперішній, минулий, майбутній"
  words: 350
  points:
  - "Визначення та роз'яснення термінів: 'час', 'теперішній час', 'минулий час', 'майбутній час'."
  - "Опис складних та синтетичних форм майбутнього часу, їх термінологічне розмежування."
  - "Практика розпізнавання часових форм у граматичних поясненнях та текстах."
  - "Використання 'моменту мовлення' як референтної точки для визначення часу."
- section: "Заперечення та його вираження"
  words: 350
  points:
  - "Визначення 'заперечення' та його форм в українській мові."
  - "Розгляд терміна 'загальне заперечення' та його вживання."
  - "Вплив заперечення на вибір виду дієслова."
  - "Аналіз 'очікуваної дії', 'попередження' та 'заборони' через призму дієслівних форм."
  - "Практичні приклади вживання заперечення в різних контекстах."
- section: "Додаткові дієслівні терміни: Спосіб, стан"
  words: 250
  points:
  - "Огляд основних способів дієслова: дійсний, наказовий, умовний."
  - "Зв'язок наказового способу з терміном 'наказова форма'."
  - "Введення термінів 'активний стан' та 'пасивний стан' дієслова."
  - "Коротке пояснення функцій кожного способу та стану."
- section: "Форми дієслова: Складна та синтетична"
  words: 350
  points:
  - "Детальне роз'яснення термінів: 'складна форма', 'синтетична форма', 'наказова форма'."
  - "Аналіз структури та використання 'дієвідмінювання' та 'парадигми' дієслова."
  - "Практика розпізнавання цих термінів у спеціалізованих граматичних текстах."
  - "Приклади відмінностей між складною та синтетичною формами майбутнього часу (буду читати vs читатиму)."
- section: "Практика читання граматичних пояснень"
  words: 200
  points:
  - "Методичні рекомендації щодо ефективного читання автентичних граматичних текстів."
  - "Розвиток навичок розпізнавання граматичних термінів та їх функцій у інструкціях."
  - "Виконання завдань на розуміння граматичних правил, сформульованих українською метамовою."
- section: "Діалоги та застосування термінів"
  words: 200
  points:
  - "Розробка міні-діалогів для закріплення дієслівних термінів у розмовній практиці."
  - "Моделювання ситуацій спілкування між викладачем та учнем, а також між студентами під час обговорення граматики."
  - "Використання термінології у питаннях та відповідях щодо дієслів."
- section: "Культурний контекст та підсумок"
  words: 250
  points:
  - "Інтеграція культурного аспекту: 'Багатство дієслівної системи' та 'Дієслово - душа мови' як відображення української ідентичності."
  - "Підведення підсумків з вивчених дієслівних термінів та їх систематизація."
  - "Перевірка готовності до засвоєння наступних модулів (особливо b1-03) через призму нової термінології."
  - "Коротка згадка про історичну та філософську роль дієслова в українській мові."
