id: 2
slug: 'language-about-verbs'
title: 'Мова про дієслова'
subtitle: 'Verb-specific terminology for aspect and tense'
version: '3.0'
phase: 'B1'
pedagogy: 'PPP'
duration: 75
transliteration: 'none'
tags: ['metalanguage', 'verbs', 'aspect', 'tense', 'bridge']
grammar: ['aspect-terms', 'tense-terms', 'verb-forms', 'negation-terminology']
word_target: 4000
immersion: 70
objectives:
  - 'Learner can name perfective and imperfective aspect in Ukrainian'
  - 'Learner can identify tense names in grammar explanations'
  - 'Learner can describe verb properties using Ukrainian terminology'
  - 'Learner can use negation terminology correctly'
  - 'Learner can identify different verb forms (compound, synthetic, imperative)'
content_outline:
  - section: "Система дієслова: Вступ"
    words: 411
    points:
      - "Значення дієслівної термінології для переходу на рівень B1 та самостійної роботи з українськими джерелами"
      - "Огляд структури модуля: вид, час, форма та категорії дії"
      - "Мовний міст: представлення термінів за схемою 'Український термін (English equivalent)' при першій появі"
      - "Мотивація: як знання 'мови про мову' допоможе уникнути типових помилок з видом дієслова"
  - section: "Вид дієслова: Доконаний та недоконаний"
    words: 308
    points:
      - "Визначення понять: вид, доконаний вид, недоконаний вид"
      - "Термінологічне розрізнення завершеності та незавершеності дії"
      - "Аналіз використання термінів у типових граматичних вправах (наприклад, 'Поставте дієслово у правильному виді')"
  - section: "Поняття дії: Процес та результат"
    words: 411
    points:
      - "Глибоке опрацювання термінів: дія, процес, результат"
      - "Категорії тривалості та повторення як ключі до розуміння недоконаного виду"
      - "Практика опису характеру дії за допомогою нових термінів"
      - "Попередження помилок: чому вказівка на тривалість виключає використання доконаного виду"
  - section: "Час дієслова: Граматична подорож"
    words: 616
    points:
      - "Термінологія часів: теперішній, минулий та майбутній"
      - "Опис специфіки минулого часу: втрата особи та перехід до категорії роду (чоловічий, жіночий, середній)"
      - "Категорична відсутність доконаного виду в теперішньому часі — пояснення терміном 'неможливість результату в момент мовлення'"
      - "Огляд багатства майбутнього часу: вступ до поняття складеної та синтетичної форм"
  - section: "Заперечення та його вплив на вид"
    words: 308
    points:
      - "Терміни: заперечення, загальне заперечення"
      - "Розмежування контекстів: очікувана дія, попередження (застереження) та заборона"
      - "Пояснення, як термін 'заборона' вимагає вживання недоконаного виду, а 'застереження' — доконаного"
  - section: "Додаткові дієслівні категорії"
    words: 308
    points:
      - "Поняття способу: наказовий (imperative) та умовний (conditional) способи"
      - "Термінологія стану: активний (active voice) та пасивний (passive voice)"
      - "Основи дієвідмінювання: інфінітив, основа дієслова, закінчення"
  - section: "Форми дієслова: Синтетична та складена"
    words: 513
    points:
      - "Визначення термінів: складна (складена) форма та синтетична (проста) форма"
      - "Аналіз синтетичної форми майбутнього часу (читатиму) як спадку давньої мови"
      - "Порівняння зі складеною формою (буду читати) за структурою та граматичним значенням"
      - "Наказова форма: особливості термінології для творення команд"
  - section: "Читання граматичних пояснень"
    words: 411
    points:
      - "Практична робота з автентичними уривками граматичних правил"
      - "Ідентифікація вивчених термінів (вид, час, форма) у тексті інструкцій"
      - "Аналіз логіки граматичного опису: від загального правила до прикладів"
  - section: "Міні-діалоги: Обговорення граматики"
    words: 513
    points:
      - "Сценарії взаємодії: 'Питання до вчителя' та 'Обговорення з колегою по навчанню'"
      - "Вживання термінів: 'Я не розумію цей вид', 'Яка це форма?', 'Це виняток?'"
      - "Використання культурного гачка про 'багатство майбутнього часу' в розмові"
  - section: "Підсумок та практичні поради"
    words: 201
    points:
      - "Резюме всіх ключових термінів та категорій дієслова"
      - "Рекомендації щодо ведення граматичного словника"
      - "Фінальна перевірка готовності до переходу до 100% україномовних пояснень у наступних модулях"
