slug: discourse-markers-basic
title: 'Дискурсивні маркери: базові конектори'
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - Introduce the 'Живе слово' (Living Word) concept from Skovoroda's philosophy,
    showing how discourse markers ('мабуть', 'власне') act as 'softeners' for polite,
    empathetic human connection.
  - Explain the core function of basic connectors as the 'glue' for B1 fluency, elevating
    speech from simple A2 coordination to nuanced logical and emotional discourse.
  - 'Outline State Standard alignment: highlight the difference between introductory
    words (вставні слова, §4.4.2) and complex sentence connectors (сполучники, §4.4.3).
    All theoretical explanations strictly in Ukrainian.'
- section: 'Презентація: Категорії та частотність'
  words: 700
  points:
  - 'Contrastive markers: Present a comparative table of high-frequency ''але'' versus
    the formal/written ''однак'' and ''проте'', including collocations like ''однак
    варто зазначити''.'
  - 'Cause and Effect: Detail the usage of ''тому що'' and ''через те що'', emphasizing
    ''саме тому що'' for adding emphasis in spoken and written registers.'
  - 'Learner error focus: Address the common ''і'' vs ''а'' vs ''але'' confusion using
    minimal pairs (e.g., ''Він студент, а я викладач'' vs ''Він студент, але він не
    вчиться'').'
- section: Граматика та пунктуація
  words: 800
  points:
  - 'Punctuation Blindness: Explicitly drill the mandatory comma rules in Ukrainian
    before ''але'', ''що'', ''бо'', and ''через те що'', which English speakers frequently
    omit.'
  - 'Sentence Positioning: Contrast structural rules, such as ''однак'' functioning
    at the start of clauses versus the enclitic ''ж'' which must occupy the second
    position for emphasis.'
  - 'Phonetic cues: Explain the critical role of intonation pauses for introductory
    words (вставні слова) to signal subjective attitude or probability to the listener.'
- section: Регістри та культура мовлення
  words: 700
  points:
  - 'Kyiv-Mohyla Rhetoric: Provide a historical hook on Feofan Prokopovych''s teachings,
    demonstrating that clear logical markers (''по-перше'', ''отже'') reflect intellectual
    discipline.'
  - 'Register split: Compare high-frequency spoken markers (''до речі'', ''коротше'')
    with formal academic or logical connectors (''зокрема'', ''внаслідок'').'
  - 'Refining ''So'': Address ''So'' overload by clearly distinguishing ''отже'' (logical
    conclusion), ''тому'' (cause-effect), and ''ну'' (spoken hesitation filler).'
- section: 'Практика: Читання та аналіз'
  words: 600
  points:
  - 'Media Literacy reading: Provide a news report style text analyzing the use of
    formal contrast markers (''однак'', ''проте'') in presenting balanced perspectives.'
  - 'Academic flow: Create a task focused on structured sequence markers (''по-перше'',
    ''по-друге'', ''по-третє'') to build a cohesive, persuasive argument.'
  - 'Blog analysis: Present a modern digital prose text where learners identify informal
    softeners and emotional connectors (''власне кажучи'', ''мені здається'').'
- section: 'Практика та продукція: Діалоги'
  words: 700
  points:
  - 'Workplace scenario: Feature a professional dialogue utilizing ''безумовно'' for
    emphatic agreement and ''власне кажучи'' for polite correction.'
  - 'Casual socialization: Present a casual conversation about weekend plans that
    naturally integrates ''до речі'' and ''ну'' for an authentic ''living word'' feel.'
  - 'Summary and Recap: Provide a final synthesis and reference table on choosing
    the correct connector based on desired emotional softening or logical precision.'
