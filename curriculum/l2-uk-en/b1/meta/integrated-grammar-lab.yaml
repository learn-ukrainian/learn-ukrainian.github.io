slug: integrated-grammar-lab
title: Інтегрована граматична лабораторія
word_target: 4000
content_outline:
- section: 'Вступний тест: Стилістична діагностика'
  words: 400
  points:
  - Create an H3 diagnostic test with 5 contrasting sentences comparing formal and
    informal contexts.
  - Provide an H3 'Аналіз результатів' with immediate feedback on register mismatch
    (e.g., using 'здійснити' instead of 'зробити' in a casual text).
  - 'Explicitly state the module''s goal: mastering stylistic flexibility and register
    switching in 100% Ukrainian.'
- section: 'Пояснення: Синтез і стилістична гнучкість'
  words: 600
  points:
  - Create an H3 'Проблема канцеляриту' explaining the cultural push towards active
    voice and natural phrasing over bureaucratic passive constructions.
  - Create an H3 'Синонімічні ряди' using a comparative table to show how synonyms
    calibrate tone (e.g., горизонт [neutral], обрій [poetic], небокрай [highly poetic]).
  - 'Include a callout box highlighting the rule: Active Agency (Ми ухвалили рішення,
    NOT Рішення було ухвалено).'
- section: 'Сценарій 1: Офіційно-діловий звіт'
  words: 600
  points:
  - Create an H3 'Активний стан у документах' demonstrating how to rewrite stiff passive
    sentences into modern, active Ukrainian business reports.
  - Create an H3 'Синтез числівників' showing how to smoothly integrate collective
    (двоє, троє) and fractional numerals into formal proposals.
  - Provide a brief model dialogue of a formal professional presentation.
- section: 'Сценарій 2: Неофіційна сімейна розмова'
  words: 600
  points:
  - Create an H3 'Емоційна лексика' showcasing the strategic use of diminutives (демінутиви)
    to build warmth without sounding childish.
  - Create an H3 'Синтез займенників' illustrating natural family dialogue that avoids
    stiff, repetitive noun phrases.
  - Include an engagement box with common colloquial phrases used in modern Ukrainian
    households.
- section: 'Сценарій 3: Новини та медіа'
  words: 600
  points:
  - Create an H3 'Односкладні речення' (introducing this B2 concept early) showing
    how media uses elliptical sentences for punchy, impactful headlines.
  - Create an H3 'Видові нюанси в новинах' demonstrating how perfective/imperfective
    aspect shifts the focus from an ongoing process to a finalized result.
  - Provide 3 examples of authentic-sounding news headlines.
- section: 'Практика: Лабораторія редагування'
  words: 600
  points:
  - Create an H3 'Трансформація тексту' guiding the learner to rewrite a single message
    (e.g., 'I am late') into an official memo, a text to a friend, and a news alert.
  - Create an H3 'Виправлення помилок' targeting the specific learner error of overusing
    the passive voice.
  - Provide clear, step-by-step model answers for the transformations.
- section: Діалоги та текстотворення
  words: 400
  points:
  - Create an H3 'Багаторівневий діалог' featuring a dynamic scenario where a character
    speaks to their boss (formal) and then immediately texts a friend (informal) about
    the same event.
  - Create an H3 'Самостійна робота' providing a prompt for learners to write a 5-sentence
    paragraph synthesizing numerals, aspect, and correct register.
- section: 'Підсумок: Потрібно більше практики?'
  words: 200
  points:
  - Create an H3 'Головні висновки' summarizing the importance of stylistic appropriateness
    and active agency.
  - Provide a bulleted checklist for learners to self-assess their register awareness.
  - Include a clear transition statement preparing the learner for the B1.5 vocabulary
    modules and the upcoming Checkpoint (M51).
