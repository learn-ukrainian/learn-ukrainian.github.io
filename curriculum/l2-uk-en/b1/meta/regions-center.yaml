slug: regions-center
title: 'Українські регіони: Центр'
word_target: 4000
content_outline:
  - section: 'Вступ: Центр — Серце та Колиска України (Introduction: The Center as
      the Heart and Cradle of Ukraine)'
    words: 400
    points:
      - 'Central Ukraine as a historical and cultural concept: exploring the lands
        of the former Hetmanate and their role in national formation.'
      - 'Overview of the three pillars of identity: Kyiv (the capital), Poltava (the
        language), and Cherkasy (the Cossack spirit).'
  - section: 'Полтавщина: Колиска літературної мови (Poltava Region: Cradle of the
      Literary Language)'
    words: 1000
    points:
      - 'Poltava as the ''spiritual capital'' and birthplace of modern Ukrainian:
        the legacy of Ivan Kotlyarevsky and the vernacular impact of ''Eneida'' (State
        Standard §3.15).'
      - The role of the Poltava dialect as the foundational standard for the national
        language; connecting the region's literary tradition to modern identity.
  - section: 'Черкащина: Козацьке серце та гетьманська слава (Cherkasy Region: Cossack
      Heart and Hetman Glory)'
    words: 1100
    points:
      - 'Cherkasy as the center of the Cossack state: exploring Chyhyryn as the strategic
        capital under Bohdan Khmelnytsky and the ''Hetmanate'' concept.'
      - The spiritual resting place of Taras Shevchenko in Kaniv (Tarasova Hora);
        defining the region as the 'Land of Bohdan and Taras' and its historical significance.
  - section: 'Київ: Від княжої столиці до європейського центру (Kyiv: From Princely
      Capital to European Center)'
    words: 900
    points:
      - 'Kyiv''s monuments and cultural heritage according to State Standard §3.13:
        the continuity from Kyivan Rus through Saint Sophia and the Golden Gate.'
      - 'Modern Kyiv: the symbol of resistance and democratic tradition (Maidan) and
        its evolution into a leading European metropolis.'
  - section: 'Практика: Робота над типовими помилками (Practice: Working on Common
      Learner Errors)'
    words: 400
    points:
      - 'Correcting Russianisms in toponyms: drill the pronunciation and spelling
        of ''Черкаси'' (not Черкасси) and the suffix ''-щина'' in ''Полтавщина'' (not
        Полтавщіна).'
      - 'Mastering prepositional patterns: drill ''їхати до Черкас'' (Genitive) versus
        ''бути в Черкасах'' (Locative) to prevent case-mismatch errors.'
  - section: 'Підсумок: Джерело української ідентичності (Summary: The Source of Ukrainian
      Identity)'
    words: 200
    points:
      - Synthesis of how Central Ukraine connects the Cossack past with the linguistic
        and political present of the nation.
