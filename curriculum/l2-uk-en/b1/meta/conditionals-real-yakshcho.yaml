slug: conditionals-real-yakshcho
title: 'Умовні речення: реальна умова (якщо)'
word_target: 4000
content_outline:
- section: 'Вступ: Реальні умови в мовленні'
  words: 600
  points:
  - 'Diagnostic quiz (TTT): 4 sentences where learners must identify whether an event
    is a certainty (коли) or a possibility (якщо) to establish baseline.'
  - 'Introduce the concept of real conditions (реальна умова) aligned with State Standard
    §4.4.3: complex sentences that express realistic possibilities.'
  - Analyze the diagnostic quiz and provide a concise rule definition in Ukrainian.
  - 'Cultural integration: Introduce the proverb «Якщо боятися труднощів, то не варто
    й починати» (resilience mindset) as the thematic anchor for the module.'
- section: 'Граматична презентація: Якщо та майбутній час'
  words: 1000
  points:
  - 'Core grammatical focus: The absolute rule of Future Tense in Ukrainian future
    conditions. Explicitly instruct that Ukrainian logic requires the future tense
    in the conditional clause for future events.'
  - 'Error correction table: Contrast incorrect forms («Якщо ти приходиш...») with
    correct forms («Якщо ти прийдеш...»).'
  - Analyze the structure of the correlative pair «якщо... то...» and explain when
    «то» is mandatory (for emphasis) and when it can be omitted.
  - Provide a grammar table demonstrating usage of «навіть якщо» (concessive condition)
    and «що якщо» (hypothetical inquiry).
- section: 'Семантичні нюанси: Якщо проти Коли'
  words: 800
  points:
  - 'Semantic deep dive: Contrast «якщо» (conditionality, fork in the road) vs. «коли»
    (temporal certainty, linear outcome).'
  - Provide a clear comparison or visualization to illustrate the difference in probability.
  - 'Error analysis box: Correct the common learner mistake of using «коли» for uncertain
    conditions (e.g. weather forecasts: «Якщо буде дощ...» vs «Коли буде дощ...»).'
  - 'Warning box: Briefly mention another common error of using «якщо» instead of
    «чи» for indirect questions (e.g. «Я не знаю, чи...»).'
- section: 'Практика: Культура, стилістика та лексика'
  words: 900
  points:
  - 'Cultural immersion block: Analyze the proverb «Взимку не зігрієшся, якщо літом
    не спітнієш» highlighting the future perfective verbs in the conditional clause.'
  - 'Vocabulary distinction table: Differentiate «результат» (positive/neutral outcome/achievement)
    and «наслідок» (causal link, often negative consequences).'
  - 'Stylistic advice (Register Note): Instruct learners to avoid bureaucratic «у
    результаті» in casual speech, replacing it with «через це» or «тому».'
  - 'Formal register expansion: Introduce «за умови» (on condition) and «у разі якщо»
    (in case) with 3-4 professional context examples.'
- section: Діалоги та вироблення навичок
  words: 700
  points:
  - 'Mini-dialogues: 2 realistic conversations (e.g., planning a weekend, discussing
    work scenarios) using correct tense sequences with «якщо».'
  - 'Production task (setup): Prompt learners to create ''If-Then'' statements about
    their personal goals to solidify the use of future perfective forms.'
  - 'Summary review: A concise recap of the State Standard §4.4.3 requirement (tense
    agreement and conjunction usage).'
  - 'Final checklist: Ensure learners understand register consistency and the strict
    future-tense rule for conditional clauses.'
