slug: purpose-shchob-infinitive
title: 'Підрядні речення мети: щоб + інфінітив'
word_target: 4000
content_outline:
- section: Вступ та діагностичний тест
  words: 600
  points:
  - Оголошення політики 100% занурення (українська мова як єдина мова інструкцій).
  - 'Діагностичне завдання (Test): 5 речень на вибір між ''що'' та ''щоб'', а також
    перевірка розпізнавання однакового підмета.'
  - 'Презентація еталонного прикладу з Державного стандарту (§4.4.3): «Ми ходимо в
    музеї Львова, щоб краще знати історію...» з візуальним розбором (один підмет ''ми'').'
- section: 'Граматика: Конструкція «щоб + інфінітив»'
  words: 1000
  points:
  - 'Аналіз (Teach): Чітке правило однакового підмета. Mermaid блок-схема: чи підмет
    один і той самий? -> Так -> щоб + інфінітив.'
  - 'Таблиця синонімів мети: порівняння стилістики ''щоб'' (нейтральний), ''аби''
    (літературно-розмовний) та ''для того щоб'' (офіційний).'
  - 'Синтаксис: позиція підрядного речення (на початку, всередині, вкінці) з прикладами
    та розділовими знаками (коми).'
  - 'Інтеграція з дієсловами руху (b1-16): таблиця конструкцій мети переміщення (напр.,
    ''Я йду в магазин, щоб купити...'').'
- section: Культурний контекст та стійкість
  words: 800
  points:
  - 'Аналіз вірша Лесі Українки «Як дитиною, бувало...»: розбір рядків «Щоб не плакать,
    я сміялась» та «Плачу я, щоб не сміятись» (заперечна мета).'
  - 'Народна мудрість: розбір граматики та сенсу прислів''я «Щоб рибу їсти, треба
    у воду лізти» (callout з культурним контекстом).'
  - 'Читання (Narrative): Текст про віртуальну подорож музеями Львова (Арсенал, Національний
    музей), насичений цільовими конструкціями (щоб зберегти спадщину, аби побачити).'
- section: Аналіз помилок та Практика
  words: 1000
  points:
  - 'Розбір типової помилки №1: надлишкова кон''югація (''щоб я допоміг'' замість
    ''щоб допомогти'').'
  - 'Розбір типової помилки №2: лексична інтерференція (суржик ''переслідувати мету''
    проти правильного ''мати на меті'').'
  - 'Контрольована практика (Test 2): 3 ситуативні міні-діалоги (''На роботі'', ''Спорт'',
    ''Навчання'') з пропусками для ''щоб/аби''.'
  - 'Вправа на трансформацію: перетворення громіздких речень з ''для того щоб'' у
    лаконічні розмовні форми з ''аби'' або ''щоб''.'
- section: Підсумок та застосування
  words: 600
  points:
  - 'Зведена таблиця-підсумок: коли використовувати інфінітив, а коли ні (місток до
    модуля b1-30).'
  - 'Комунікативне завдання (Production): Напишіть 5-7 речень про вашу мету вивчення
    української мови, використовуючи ''мати на меті'' та різні сполучники.'
  - 'Рекомендації автентичних ресурсів: посилання на поезію Лесі Українки та тексти
    про історію Львова.'
