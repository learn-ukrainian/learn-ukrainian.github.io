slug: sports-in-ukraine
title: Спорт в Україні
word_target: 4000
content_outline:
- section: Вступ — Спортивна нація
  words: 500
  points:
  - 'H3: Огляд видів спорту та спортивних споруд (стадіон, басейн, корт, ковзанка)
    у контексті українського суспільства.'
  - 'H3: Граматичний фокус — дієслово «займатися» + Орудний відмінок. Таблиця з 5+
    прикладами та поясненням, чому калька «робити спорт» є помилковою.'
  - 'H3: Базовий вокабуляр (тренування, змагання, спортзал) з контекстними реченнями.'
- section: Футбол — Релігія мільйонів
  words: 900
  points:
  - 'H3: Граматичний фокус — конструкції «грати у/в» (Знахідний відмінок) та «вболівати
    за» (Знахідний відмінок). Таблиця керування дієслів.'
  - 'H3: Андрій Шевченко та «Золотий м’яч» 2004 року як символ міжнародного тріумфу
    України.'
  - 'H3: Культура вболівання та протистояння грандів: «Динамо» (Київ) та «Шахтар»
    (Донецьк). Інтеграція термінів: воротар, нападник, забити гол.'
- section: Бокс — Сила та незламність
  words: 900
  points:
  - 'H3: Епоха братів Кличків. Розповідь про одночасне володіння всіма поясами у важкій
    вазі.'
  - 'H3: Сучасні абсолютні чемпіони — Олександр Усик та Василь Ломаченко. Акцент на
    абстрактну лексику (воля до перемоги, незламність, абсолютний чемпіон).'
  - 'H3: Словникова робота: боксерські рукавиці, ринг, нокаут. Міні-діалог між коментатором
    і глядачем для демонстрації розмовного регістру.'
- section: Олімпійська та паралімпійська слава
  words: 800
  points:
  - 'H3: Історія олімпійського золота. Від Оксани Баюл (1994) до стрибків Сергія Бубки
    (35 світових рекордів).'
  - 'H3: Сучасне покоління та Олімпіада-2024. Ярослава Магучіх та її світовий рекорд.'
  - 'H3: Паралімпійська збірна України. Розповідь про феноменальні досягнення атлетів
    на міжнародних змаганнях.'
- section: Спорт під час війни та дипломатія
  words: 600
  points:
  - 'H3: Спортивна дипломатія. Як перемоги на світовій арені стають майданчиком для
    просування українських інтересів.'
  - 'H3: Атлети-захисники та волонтери. Розповідь про спортсменів, які захищають країну
    або підтримують військових (на прикладі призових фондів).'
  - 'H3: Матчі на порожніх стадіонах. Лексика воєнного часу в спорті (порожній стадіон,
    повітряна тривога під час матчу).'
- section: Підсумок — Мовна норма та здобутки
  words: 300
  points:
  - 'H3: Зведена граматична таблиця (займатися + Instr., грати в + Acc., вболівати
    за + Acc.).'
  - 'H3: Три питання для саморефлексії та обговорення («Який ваш улюблений вид спорту?»,
    «За кого ви вболіваєте?»).'
