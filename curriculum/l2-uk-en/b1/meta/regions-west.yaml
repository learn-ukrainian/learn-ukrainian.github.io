slug: regions-west
title: 'Українські регіони: Захід'
word_target: 4000
content_outline:
  - section: 'Вступ: Захід як вікно в Європу (Introduction: The West as a Window to
      Europe)'
    words: 600
    points:
      - Географічне розташування Західної України як 'вікна в Європу' та прикордонного
        мозаїчного регіону.
      - 'Державний стандарт §3.13: Опис ландшафту, інституцій та громадських місць,
        що формують особливу ідентичність Заходу.'
      - 'Розвінчування міфу про однорідність: короткий огляд відмінностей між Галичиною,
        Волинню, Буковиною та Закарпаттям.'
  - section: Львів — місто кави та архітектури (Lviv — City of Coffee and Architecture)
    words: 1000
    points:
      - 'Історія львівської кави: Юрій Кульчицький, Віденська битва (1683) та перша
        кав''ярня ''Під синьою пляшкою''.'
      - 'Культурний гачок: Як Кульчицький винайшов рецепт кави з молоком та цукром,
        ставши символом європейської інтеграції Львова.'
      - 'Архітектурна спадщина: Львів як об''єкт Світової спадщини ЮНЕСКО (Державний
        стандарт §3.13).'
      - 'Робота над помилками: Жіночий рід слова ''кава'' в українській мові — вправи
        на узгодження прикметників (смачна кава, львівська кава).'
  - section: 'Галичина: Традиції та мовний колорит (Galicia: Traditions and Linguistic
      Flavor)'
    words: 800
    points:
      - 'Навчальна помилка: Правильне вживання прийменників з історичними регіонами
        — ''на Галичині'' (територія) замість ''в Галичині''.'
      - 'Галицький діалект як маркер ідентичності: вживання слів ''філіжанка'', ''коліжанка'',
        ''файно'' в автентичному контексті.'
      - 'Державний стандарт §3.15: Роль Греко-католицької церкви та місцевих звичаїв
        у збереженні українських традицій.'
  - section: Закарпаття — мозаїка культур та природи (Zakarpattia — A Mosaic of Cultures
      and Nature)
    words: 1000
    points:
      - 'Закарпаття як мультикультурне порубіжжя: суміш українських, угорських, румунських
        та словацьких впливів.'
      - 'Кулінарна дипломатія: традиції закарпатської кухні (бограч) та виноробства
        як частина туристичної привабливості.'
      - 'Карпатські гори: туризм, екологія та побут етнічних груп (гуцули, бойки,
        лемки) згідно зі стандартом §3.13.'
  - section: 'Підсумок: Захід у серці України (Summary: The West in the Heart of Ukraine)'
    words: 600
    points:
      - Роль Західної України у національному відродженні та сучасній культурній дипломатії.
      - Порівняння регіональних особливостей (Галичина vs Закарпаття) для підготовки
        до модуля B1-73 (Схід України).
      - Повторення стратегій розуміння автентичних текстів про пам'ятки культури та
        туристичні принади.
