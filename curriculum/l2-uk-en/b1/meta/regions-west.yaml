slug: regions-west
title: 'Українські регіони: Захід'
word_target: 4000
content_outline:
- section: 'Вступ: Захід як вікно в Європу'
  words: 600
  points:
  - Описати географічне розташування Західної України як європейського вікна та прикордонного
    мозаїчного регіону.
  - Інтегрувати лексику для опису ландшафту, інституцій та громадських місць (Державний
    стандарт §3.13).
  - Чітко розвінчати міф про однорідність регіону, вказавши на культурні та історичні
    відмінності між Галичиною, Волинню, Буковиною та Закарпаттям.
- section: Львів — місто кави та архітектури
  words: 1000
  points:
  - 'Розповісти про історію львівської кави: згадати героя Віденської битви (1683)
    Юрія Кульчицького та першу кав''ярню ''Під синьою пляшкою''.'
  - 'Подати культурний гачок: винахід рецепта кави з молоком та цукром як символ європейської
    інтеграції Львова.'
  - Описати Львів як об'єкт Світової спадщини ЮНЕСКО та видатну пам'ятку архітектури
    (відповідно до §3.13).
  - 'Провести роботу над поширеною граматичною помилкою: наголосити на жіночому роді
    слова ''кава'' в українській мові та відпрацювати узгодження прикметників (наприклад,
    ''смачна кава'', ''міцна кава'').'
- section: 'Галичина: Традиції та мовний колорит'
  words: 800
  points:
  - 'Пояснити навчальну помилку: правильне вживання прийменника ''на'' з історичними
    регіонами (''на Галичині'', ''на Волині'') замість ''в''.'
  - Подати галицький діалект як унікальний маркер місцевої ідентичності, використовуючи
    слова 'філіжанка', 'коліжанка', 'файно' в автентичному контексті.
  - Охарактеризувати роль Греко-католицької церкви та місцевих звичаїв у збереженні
    українських традицій під час бездержавності (§3.15).
- section: Закарпаття — мозаїка культур та природи
  words: 1000
  points:
  - Представити Закарпаття як мультикультурне порубіжжя із гармонійною сумішшю українських,
    угорських, румунських та словацьких впливів.
  - Розкрити тему 'кулінарної дипломатії' через традиції закарпатської кухні (зокрема
    бограч) та культуру виноробства.
  - Описати Карпатські гори (туризм, екологію) та унікальний побут місцевих етнічних
    груп — гуцулів, бойків, лемків (§3.13).
- section: 'Підсумок: Захід у серці України'
  words: 600
  points:
  - Узагальнити визначну роль Західної України у загальнонаціональному відродженні
    та формуванні сучасної культурної дипломатії.
  - Зробити порівняльний аналіз ключових особливостей Галичини та Закарпаття як підготовку
    до модуля B1-73 про Схід України.
  - Повторити та закріпити ключові стратегії читання й розуміння автентичних текстів
    про пам'ятки культури та туристичні принади.
