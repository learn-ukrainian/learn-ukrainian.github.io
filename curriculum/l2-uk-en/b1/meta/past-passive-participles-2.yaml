slug: past-passive-participles-2
title: 'Пасивні дієприкметники: коротка форма'
word_target: 4000
content_outline:
- section: 'Вступ: Оголошення навколо нас'
  words: 600
  points:
  - 'Сюжетний гачок: аналіз повсякденних вивісок («Вхід заборонено», «Зачинено», «Обережно,
    пофарбовано!») для демонстрації практичної користі коротких форм.'
  - 'Пояснення концепції безособового пасиву: фокусування на результаті дії, а не
    на її виконавцеві, для досягнення об''єктивності.'
  - 'Граматичне визначення (відповідно до §4.2.3.1): дієприкметник як особлива форма
    дієслова, що виражає завершену дію або стан.'
- section: 'Граматичний аналіз: Утворення та синтаксис'
  words: 1000
  points:
  - 'Правило утворення: суфікси -но/-то додаються виключно до основ дієслів доконаного
    виду (порівняння правильного «зроблено» з помилковим «роблено»).'
  - 'Синтаксичний зсув (The Syntax Shift): детальне пояснення, чому об''єкт вимагає
    Знахідного відмінка («Книгу написано»), а не Називного.'
  - 'Візуальна порівняльна таблиця: Особовий пасив («Двері зачинені» - Називний відмінок)
    проти Безособового («Двері зачинено» - Знахідний відмінок) для запобігання типовим
    помилкам.'
  - 'Корекція типової помилки: пояснення, чому допоміжне дієслово «було» є зайвим
    у теперішньому часі (заміна конструкції «це було зроблено зараз» на правильну
    «це зроблено»).'
- section: Культурний та історичний контекст
  words: 800
  points:
  - 'Офіційно-діловий стиль: аналіз того, чому українська бюрократія надає перевагу
    конструкціям на -но/-то для створення ефекту невідворотності («Рішення прийнято»).'
  - 'Історичний резонанс: дослідження державотворчої термінології в Універсалах Центральної
    Ради («Акт проголошено», «Універсал підписано»).'
  - 'Соціолінгвістичний нюанс: використання безособових форм для уникнення прямої
    індивідуальної відповідальності на користь інституційного факту.'
- section: 'Практика: Від теорії до автоматизму'
  words: 900
  points:
  - 'Вправи на трансформацію (у тексті): покрокове перетворення активних речень із
    підметом на безособові конструкції з правильним вживанням Знахідного відмінка.'
  - 'Лабораторія помилок: аналіз та виправлення типових синтаксичних розбіжностей
    та використання недоконаного виду в професійних контекстах.'
  - 'Контекстуальний вибір: практичні завдання на розрізнення повних форм (акцент
    на описі стану) та коротких форм (акцент на результаті).'
- section: Комунікативні вправи та підсумок
  words: 700
  points:
  - 'Рольова модель: використання лексики («відкрито», «завершено», «дозволено») у
    контексті організації публічного заходу чи відкриття магазину.'
  - 'Продуктивне завдання: створення переліку офіційних правил або оголошень для місцевої
    галереї з використанням високочастотних результативних дієслів.'
  - 'Підсумок: коротке повторення синтаксичних особливостей форм на -но/-то як базового
    етапу перед вивченням складних пасивних конструкцій (перехід до модуля B1-47).'
