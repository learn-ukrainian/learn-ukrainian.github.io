slug: mountains-trail
title: Гори та трейлраннінг
word_target: 4000
content_outline:
  - section: 'Вступ: Світ українських Карпат (Introduction: World of the Ukrainian
      Carpathians)'
    words: 600
    points:
      - 'Українські гори як терапевтичний простір та місце активного відпочинку —
        alignment: §3.14 (Природне середовище) та §3.4 (Дозвілля)'
      - 'Еволюція гірської культури в Україні: від класичного туризму до сучасного
        трейлраннінгу (гірського бігу)'
      - 'Вступне слово від персонажа ''Гірський провідник'': правила етикету в горах
        та повага до природи'
  - section: Вершини та легенди Чорногори (Summits and Legends of Chornohora)
    words: 1000
    points:
      - 'Найвищі точки України: Говерла (2061 м) та Петрос як головні виклики для
        мандрівників — collocations: підкорити вершину, найвища точка'
      - 'Культурний гачок: обсерваторія ''Білий Слон'' на горі Піп Іван Чорногірський
        — історія будівлі та її вигляд узимку під льодом і снігом'
      - 'Географічне розмежування: альпійські хребти Чорногори проти кам''янистих
        розсипів (ґорґанів) у центральних Карпатах'
      - 'Карпатські полонини як унікальний біоценоз та центр гуцульського вівчарства
        — collocations: вийти на полонину, зелена полонина, вівці на полонині'
  - section: 'Трейлраннінг: Спорт на межі (Trail Running: Sport on the Edge)'
    words: 800
    points:
      - 'Chornohora Sky Marathon: легендарний забіг через усі шість українських ''двотисячників''
        (60 км з великим набором висоти)'
      - 'Спільнота трейлраннерів в Україні: популярні старти та культура підготовки
        до змагань — context: growing community vocabulary'
      - 'Психологія бігу в горах: пошук натхнення та подолання власних меж на маркованих
        маршрутах'
  - section: Спорядження, мова та безпека (Equipment, Language, and Safety)
    words: 800
    points:
      - 'Аналіз спорядження: наплічник (purist alternative) проти рюкзака — collocations:
        складати наплічник, туристичне спорядження'
      - 'Рятувальні служби: обов''язкова реєстрація у гірських рятувальників перед
        виходом на складний маршрут'
      - 'Мовний фільтр (Anti-Russisms): викорінення суржику в гірському контексті
        — намет (not палатка), вогнище (not костєр), пляшка (not бутилка)'
      - 'Екологічна свідомість: правило ''забери сміття з собою'' та збереження чистоти
        гірських джерел'
  - section: Практична граматика та продукція (Practical Grammar and Production)
    words: 800
    points:
      - 'Дієслова руху: розрізнення односпрямованого ''йти'' та регулярного/хабітуального
        ''ходити'' — learner error: ''Я йду в гори щоліта'' (Incorrect) vs ''Я ходжу
        в гори щоліта'' (Correct)'
      - 'Правила милозвучності: вживання прийменника ''у'' після приголосного — learner
        error: ''похід в гори'' (Incorrect) vs ''похід у гори'' (Correct)'
      - 'Продукція: рольова гра ''Планування маршруту та перевірка спорядження'' між
        туристом і гірським рятувальником'
      - 'Підсумок: гори як місце сили та повернення до себе (терапевтичний ефект)'
