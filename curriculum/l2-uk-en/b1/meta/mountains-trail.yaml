slug: mountains-trail
title: Гори та трейлраннінг
word_target: 4000
content_outline:
- section: 'Вступ: Світ українських Карпат'
  words: 600
  points:
  - Описати українські гори як місце сили та терапевтичного простору для активного
    відпочинку (із посиланням на теми природи та дозвілля).
  - 'Прослідкувати еволюцію гірської культури в Україні: від класичного туризму з
    важкими рюкзаками до сучасного швидкого трейлраннінгу.'
  - 'Ввести голос ''Гірського провідника'': пояснити базовий етикет на стежці (вітання
    з іншими туристами) та абсолютну повагу до природи.'
- section: Вершини та легенди Чорногори
  words: 1000
  points:
  - Детально представити найвищі точки України (Говерла, Петрос), використовуючи цільові
    колокації ('підкорити вершину', 'найвища точка').
  - Інтегрувати культурний гачок про обсерваторію 'Білий Слон' на горі Піп Іван (історія
    будівництва, зимовий вигляд, сучасний пост рятувальників).
  - 'Провести географічне розмежування: чим альпійські хребти Чорногори відрізняються
    від кам''янистих ґорґанів.'
  - Описати карпатські полонини як унікальний біоценоз та історичний центр гуцульського
    вівчарства.
- section: 'Трейлраннінг: Спорт на межі'
  words: 800
  points:
  - Презентувати Chornohora Sky Marathon як легендарний забіг через усі шість українських
    'двотисячників' із великим набором висоти.
  - Описати сучасну спільноту трейлраннерів в Україні, культуру підготовки та специфіку
    забігів.
  - 'Розкрити психологію бігу в горах: медитативний стан, пошук натхнення та подолання
    власних меж на маркованих гірських маршрутах.'
- section: Спорядження, мова та безпека
  words: 800
  points:
  - 'Зробити детальний огляд спорядження: порівняти використання питомого слова ''наплічник''
    із запозиченим ''рюкзак''.'
  - 'Наголосити на мовному фільтрі (антисуржик): пояснити вживання слів ''намет''
    (а не палатка), ''вогнище'' (а не костєр), ''пляшка'' (а не бутилка) у контексті
    гірського табору.'
  - 'Пояснити правила безпеки: чому обов''язкова реєстрація у гірських рятувальників
    перед виходом на складний маршрут.'
  - 'Окреслити екологічну свідомість: правило ''забери сміття з собою'' (Leave No
    Trace) та збереження чистоти гірських джерел.'
- section: Практична граматика та продукція
  words: 800
  points:
  - 'Пояснити розрізнення дієслів руху: односпрямоване ''йти'' проти регулярного ''ходити''
    на прикладах гірських походів (''Я йду на Говерлу зараз'' vs ''Я ходжу в гори
    щоліта'').'
  - 'Продемонструвати правила милозвучності: вживання прийменника ''у'' після приголосного
    (наприклад, ''похід у гори'', щоб уникнути збігу приголосних).'
  - 'Створити завдання на продукцію: рольова гра (у вигляді модельного діалогу) ''Планування
    маршруту та перевірка спорядження'' між туристом і рятувальником.'
  - 'Підбити загальний підсумок модуля: гори як терапевтичний простір для відновлення
    ментального здоров''я.'
