slug: technology-and-startups
title: Технології та стартапи
word_target: 4000
content_outline:
- section: Вступ та історія українського IT
  words: 600
  points:
  - Представити Україну як глобальний технологічний хаб із глибоким історичним корінням
    (від перших ЕОМ до сучасного лідерства).
  - 'Ввести базову термінологію галузі: «технологія», «інновація», «комп''ютер» (звернути
    увагу на чоловічий рід та апостроф).'
  - Уникати російських кальок у термінології, одразу задаючи правильний український
    контекст.
- section: Українські єдинороги та історії успіху
  words: 1000
  points:
  - 'Детально описати історію Grammarly: створення в Києві у 2009 році та шлях до
    статусу «декакорна».'
  - Розповісти про GitLab (Дмитро Запорожець з Харкова) та концепцію глобальної all-remote
    компанії.
  - Навести приклад Ajax Systems як лідера у виробництві hardware та систем безпеки
    з R&D у Києві.
  - Використати видові пари дієслів (доконаний/недоконаний) для опису процесів розробки
    та фінальних досягнень.
- section: Дія — держава в смартфоні
  words: 800
  points:
  - Розкрити концепцію цифрової трансформації та створення унікального застосунку
    «Дія».
  - 'Підкреслити культурний факт: Україна першою у світі прирівняла цифрові паспорти
    до паперових (2021 рік).'
  - 'Лексичний фокус: чітко пояснити різницю між правильним терміном «застосунок»,
    помилковою калькою «додаток» та англіцизмом «аплікація».'
- section: Словотворення та назви професій
  words: 800
  points:
  - 'Пояснити §4.3.3 Державного стандарту: утворення назв осіб за діяльністю за допомогою
    суфіксів -ник (розробник, тестувальник) та -іст (програміст, спеціаліст).'
  - 'Пояснити §4.3.4 Державного стандарту: утворення віддієслівних іменників на позначення
    процесів (програмування, тестування, кодування).'
  - Надати чітку таблицю словотвірних моделей та приклади їх використання в повноцінних
    реченнях.
- section: Практика та типові помилки
  words: 400
  points:
  - 'Розібрати правильне використання дієслів: «завантажити» замість поширеного русизму
    «закачати».'
  - 'Проаналізувати використання дієслівних видів у контексті IT: тривала дія («писати
    код») проти результату («написати застосунок»).'
  - 'Пояснити відмінювання нових запозичень, зокрема слова «стартап» (наприклад, у
    місцевому відмінку: «працювати у стартапі»).'
- section: 'Підсумок: Технології під час війни та майбутнє'
  words: 400
  points:
  - Описати стійкість українського IT-сектору під час повномасштабного вторгнення
    (IT-фронт, волонтерські проєкти, кіберзахист).
  - Згадати про швидкий розвиток напрямку MilTech та використання технологій для захисту
    держави.
  - Підкреслити перспективи України як потужного європейського центру інновацій та
    розвитку штучного інтелекту.
