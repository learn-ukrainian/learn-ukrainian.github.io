slug: technology-and-startups
title: Технології та стартапи
word_target: 4000
content_outline:
  - section: Вступ та історія українського IT (Introduction and History of Ukrainian
      IT)
    words: 600
    points:
      - 'Еволюція галузі: від радянських ЕОМ (Київський інститут кібернетики) до незалежності
        та статусу глобального хабу аутсорсингу.'
      - 'Термінологічна база та рід іменників: правильне вживання слова «комп''ютер»
        (чоловічий рід) та базові поняття індустрії.'
  - section: Українські єдинороги та історії успіху (Ukrainian Unicorns and Success
      Stories)
    words: 1000
    points:
      - 'Кейс Grammarly: історія заснування Максимом Литвином та Олексієм Шевченком
        у 2009 році; шлях від стартапу до статусу «декакорна» ($13B+).'
      - 'GitLab та Дмитро Запорожець: історія першої версії коду, написаної в Харкові,
        та розвиток глобальної компанії з моделлю all-remote.'
      - 'Ajax Systems: український лідер у виробництві систем безпеки; поєднання локального
        R&D центру в Києві зі світовими амбіціями.'
  - section: Дія — держава в смартфоні (Diia — State in a Smartphone)
    words: 800
    points:
      - 'Цифрова трансформація України: концепція «держава у смартфоні» та світове
        лідерство у прирівнюванні цифрових паспортів до паперових (2021).'
      - 'Лексичний фокус: вживання терміна «застосунок» (mobile app) як офіційної
        назви замість кальки «додаток» або англіцизму «аплікація».'
  - section: Словотворення та назви професій (Word Formation and Profession Names)
    words: 800
    points:
      - 'Дотримання Державного стандарту (§4.3.3): утворення назв діячів за допомогою
        суфіксів -ник (розробник, тестувальник) та -іст (програміст).'
      - 'Дотримання Державного стандарту (§4.3.4): утворення віддієслівних іменників
        для опису процесів (програмування, кодування, тестування).'
  - section: Практика та типові помилки (Practice and Common Errors)
    words: 400
    points:
      - 'Аналіз аспектів дієслова: розрізнення тривалого процесу («писав код цілий
        день») та завершеного результату («написав новий застосунок»).'
      - 'Відмінювання запозичень: правильне вживання слова «стартап» у відмінкових
        формах (наприклад, місцевий відмінок: «працювати в стартапі»).'
  - section: 'Підсумок: Технології під час війни та майбутнє (Summary: Tech during
      War and the Future)'
    words: 400
    points:
      - 'IT-фронт: роль волонтерських технологічних проектів, кіберзахисту та підтримки
        економіки України в умовах повномасштабної війни.'
      - 'Перспективи: Україна як інтелектуальний центр Європи та розвиток напрямків
        штучного інтелекту та MilTech.'
