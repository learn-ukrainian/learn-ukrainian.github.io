slug: checkpoint-aspect-mastery
title: 'Контрольна точка: Опанування виду'
word_target: 4000
content_outline:
- section: Вступ та самоаналіз
  words: 500
  points:
  - 'Огляд контрольної точки: оцінка знань, здобутих у модулях M06-14, та підготовка
    до фази дієслів руху.'
  - 'Діагностика за критеріями B1: використання ''Can-do'' тверджень для визначення
    рівня володіння категорією виду.'
  - 'Вправа на самооцінку: адекватна самооцінка власних досягнень та виявлення слабких
    місць.'
- section: 'Навичка 1: Минулий час та народна мудрість'
  words: 700
  points:
  - 'Закріплення парадигми §4.2.3.1: родові та числові форми дієслів минулого часу
    обох видів.'
  - 'Культурний гачок: аналіз прислів''я ''Зробив діло — гуляй сміло'' як прикладу
    результативності доконаного виду.'
  - 'Робота над помилками: розрізнення заперечення процесу (не робив) та заперечення
    результату (не зробив).'
  - Поглиблений аналіз контекстуального розрізнення видів у складних наративних структурах.
- section: 'Навичка 2: Майбутній час — синтетика проти аналітики'
  words: 800
  points:
  - 'Порівняння форм майбутнього часу за стандартом: складена форма (буду боротися)
    проти синтетичної (боротимуся).'
  - 'Стилістичні особливості: використання синтетичної форми як ознаки високого стилю
    та природності української мови.'
  - 'Типова помилка: хибне вживання форм теперішнього часу доконаного виду для опису
    поточних процесів.'
  - 'Практикум: вибір правильного виду для вираження наміру, обіцянки або регулярного
    планування майбутнього.'
- section: 'Навичка 3: Наказовий спосіб та заборони'
  words: 700
  points:
  - 'Аналіз форм за §4.2.3.2: вибір виду залежно від контексту наказу (одноразовий
    проти повторюваного).'
  - 'Критична помилка: використання доконаного виду в заборонах (''Не зроби!'') замість
    обов''язкового недоконаного (''Не роби!'').'
  - 'Ввічливі прохання: використання недоконаного виду для пом''якшення наказу (Закривайте
    двері, будь ласка).'
  - Трансформація прямих наказів у непрямі та роль видових розрізнень у формуванні
    тону висловлювання.
- section: 'Навичка 4: Системність видових пар'
  words: 650
  points:
  - 'Систематизація 40 базових пар: словотвірні моделі (-ати/-ити, чергування голосних,
    префіксація).'
  - 'Тестування на автоматизм: швидке розпізнавання видової приналежності дієслова
    за маркерами.'
  - 'Контекстуальний підбір пари: заміна виду в реченні залежно від зміни часового
    акценту (процес -> результат).'
  - Аналіз суплетівних видових пар (брати - взяти, говорити - сказати) та їхніх особливостей
    словозміни.
- section: 'Інтеграція: Комплексна перевірка'
  words: 650
  points:
  - 'Аналіз загальних істин: використання недоконаного виду в прислів''ї ''Хто не
    робить, той не їсть''.'
  - 'Письмове завдання: розповідь про ''вчорашній день'' з інтеграцією всіх вивчених
    знань про вид.'
  - Підсумковий тест на готовність до наступної фази — дієслів руху, де вид є фундаментальним.
  - 'Фінальний зворотний зв''язок: стратегія роботи над прогалинами та інструкції
    щодо подальшого навчання.'
