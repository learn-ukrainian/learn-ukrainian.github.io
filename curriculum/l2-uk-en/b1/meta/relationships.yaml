slug: relationships
title: Стосунки та зв'язки
word_target: 4000
content_outline:
  - section: 'Вступ: Термінологія стосунків (Introduction: Relationship Terminology)'
    words: 600
    points:
      - 'State Standard §3.1 alignment: introduction to social and family relationships
        (родинні стосунки, взаємини з іншими людьми); distinguishing between personal
        and formal interactions.'
      - 'Deep dive into the hierarchy of relationship terms: «стосунки» (personal/emotional),
        «відносини» (formal/official), «взаємини» (reciprocal/warm), and «ставлення»
        (one-way attitude).'
      - 'Register distinction: explain why using «відносини» for a romantic partner
        sounds like a legal contract, whereas «стосунки» is the standard conversational
        choice.'
  - section: 'Читання та Культура: Інститут кумівства (Reading and Culture: The Institution
      of Godparenthood)'
    words: 900
    points:
      - 'Cultural hook: «куми» (godparents) as ''spiritual parents'' with a lifelong
        duty; explain the depth of this bond which often parallels blood kinship.'
      - Linguistic analysis of the proverb «Рідня до півдня, а куми — довіку» (Relatives
        are until noon, but godparents are forever) to illustrate social priorities.
      - 'Narrative text: a story about a family event where godparents play a central
        role, highlighting the transition from acquaintance to spiritual kin.'
  - section: 'Мовна тонкість: Любити чи Кохати? (Linguistic Nuance: To Love or To
      Love?)'
    words: 800
    points:
      - The strict semantic boundary between «любити» (family, friends, food, hobbies)
        and «кохати» (exclusive romantic passion for a partner).
      - 'Learner error clinic: correcting the overgeneralization of «кохати» (e.g.,
        «Я кохаю маму» or «Я кохаю борщ») with 5 natural substitution drills.'
      - 'Narrative illustration: a comical misunderstanding caused by a foreigner
        using the wrong ''love'' verb in a romantic versus a social setting.'
  - section: Граматика та типові помилки (Grammar and Common Errors)
    words: 900
    points:
      - 'Correction of Russian calque: replacing the incorrect «женився на ній» with
        the Ukrainian «одружився з нею» (verb + preposition «з» + Instrumental case).'
      - 'Drills for high-frequency B1+ collocations: «з’ясовувати стосунки» (to have
        it out), «налагодити стосунки» (to fix relationships), and «розірвати стосунки»
        (to break up).'
      - 'Usage of «зв''язок» (connection): collocations like «родинний зв''язок»,
        «бути на зв''язку», and the modern term «зворотний зв''язок» (feedback).'
  - section: 'Практика: Розмови про життя (Practice: Conversations About Life)'
    words: 800
    points:
      - 'Dialogue practice: two friends discussing their «взаємини» (reciprocal warmth)
        with parents versus their current «стосунки» with significant others.'
      - 'Vocabulary expansion: using «спілкуватися» (to communicate), «приятелювати»
        (to be on friendly terms), and «втратити зв''язок» (to lose touch) in a narrative
        about relocating.'
      - 'Interactive summary: discussing one''s «ставлення» (attitude) towards godparenthood
        and family traditions using the covered terminology.'
