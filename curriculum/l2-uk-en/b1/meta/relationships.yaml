slug: relationships
title: Стосунки та зв'язки
word_target: 4000
content_outline:
- section: 'Вступ: Термінологія стосунків'
  words: 800
  points:
  - Explicitly define the scope of §3.1 'родинні стосунки' та 'взаємини з іншими людьми'.
  - 'Deep dive into the semantic hierarchy: define ''стосунки'' (personal/emotional),
    ''відносини'' (formal/official), ''взаємини'' (reciprocal/warm), and ''ставлення''
    (one-way attitude) using clear Ukrainian explanations.'
  - 'Register distinction: explain why using ''відносини'' for a romantic partner
    sounds like a legal contract, whereas ''стосунки'' is the natural, conversational
    choice.'
- section: 'Читання та Культура: Інститут кумівства'
  words: 900
  points:
  - Introduce the cultural concept of 'куми' (godparents) as 'spiritual parents' (духовні
    батьки) with a lifelong duty, paralleling blood kinship.
  - Linguistic analysis of the proverb 'Рідня до півдня, а куми — довіку' to illustrate
    the enduring nature of this bond.
  - 'Narrative text (Reading): A story about a traditional family gathering where
    godparents play a central role, showing the transition from friends to spiritual
    kin.'
- section: 'Мовна тонкість: Любити чи Кохати?'
  words: 800
  points:
  - Explain the strict semantic boundary between 'любити' (used for family, friends,
    food, hobbies) and 'кохати' (reserved exclusively for romantic passion).
  - 'Learner error clinic: actively correct the overgeneralization of ''кохати'' (e.g.,
    ''Я кохаю маму'' or ''Я кохаю борщ'') with 5 natural substitution drills.'
  - 'Narrative illustration: a comical misunderstanding caused by a foreigner using
    the wrong ''love'' verb in a romantic versus a social setting.'
- section: Граматика та типові помилки
  words: 800
  points:
  - 'Decolonization highlight: teach the egalitarian Ukrainian ''одружитися з нею/ним''
    (verb + preposition ''з'' + Instrumental case) and actively correct the Russian
    calque ''женився на ній''.'
  - 'Drills for high-frequency B1 collocations: ''з’ясовувати стосунки'' (to clarify/argue
    relationships), ''налагодити стосунки'' (to mend relationships), and ''розірвати
    стосунки'' (to break up).'
  - 'Usage of ''зв''язок'' (connection): provide context and examples for collocations
    like ''родинний зв''язок'', ''бути на зв''язку'', and the modern professional
    term ''зворотний зв''язок'' (feedback).'
- section: 'Практика: Розмови про життя'
  words: 700
  points:
  - 'Dialogue practice: present a conversation between two friends discussing their
    ''взаємини'' (warm reciprocity) with their parents versus their current ''стосунки''
    with significant others.'
  - 'Vocabulary expansion: embed verbs like ''спілкуватися'' (to communicate), ''приятелювати''
    (to be on friendly terms), and ''втратити зв''язок'' (to lose touch) in a narrative
    about moving to a new city.'
  - 'Interactive summary: structured questions prompting the learner to discuss their
    ''ставлення'' (attitude) towards godparenthood and family traditions using the
    newly covered terminology.'
