slug: cycling-water
title: Велосипед та водні види
word_target: 4000
content_outline:
  - section: Вступ та цілі (Introduction and Objectives)
    words: 400
    points:
      - 'Цілі модуля: освоєння лексики для обговорення активного літнього відпочинку
        згідно з Держстандартом (§3.4, §3.14)'
      - 'Вступне слово від персонажа (Dnipro Kayak Guide): занурення в атмосферу річкового
        та велосипедного дозвілля'
      - Огляд природних об’єктів (річка, море, озеро) та спортивних споруд (басейн,
        велотрек) як контексту навчання
  - section: Велосипедна культура та інфраструктура (Cycling Culture and Infrastructure)
    words: 1000
    points:
      - 'Культурний гачок: історія київського Велотреку та щорічного свята «Велодень»
        (Veloden) як символу спільноти'
      - 'Сучасна оренда: практичне використання мобільних додатків Bikenow та Nextbike
        для пересування містом'
      - 'Інфраструктура: Труханів острів та Оболонська набережна як головні локації
        для безпечного катання'
      - 'Велотуризм: огляд популярних українських маршрутів та необхідного спорядження
        для тривалих поїздок'
      - 'Learner error: використання орудного відмінка «їду велосипедом» замість більш
        природного місцевого «їду на велосипеді»'
  - section: 'Водні види спорту: від Дніпра до Карпат (Water Sports: From Dnipro to
      Carpathians)'
    words: 1000
    points:
      - 'Каякінг у Києві: маршрути Гідропарку та Оболоні, унікальний вид на монумент
        «Батьківщина-Мати» з русла Дніпра'
      - 'SUP-серфінг: особливості нового тренду та техніка безпеки на відкритій воді
        від досвідченого гіда'
      - 'Карпатський рафтинг: сплави річками Черемош та Чорна Тиса як поєднання адреналіну
        та традиційного кемпінгу'
      - 'Триатлон в Україні: популяризація комплексного спорту та підготовка до змагань
        на відкритій воді'
      - 'Learner error: плутанина між напрямком «їдемо на море» (to the seaside) та
        місцем дії «купаємося в морі» (in the water)'
  - section: 'Практика: тонкощі дієслів руху (Practice: Nuances of Motion Verbs)'
    words: 800
    points:
      - 'Ключова концепція: розмежування «плавати» (багатоспрямовано/звичка) та «плисти»
        (односпрямовано/процес)'
      - 'Drill: виправлення помилки «Я пливу в басейні щосуботи» на правильне «Я плаваю
        в басейні щосуботи»'
      - 'Моделювання ситуацій: качка «пливе» до берега (unidirectional) vs професійний
        плавець «плаває» щодня (habitual)'
      - 'Інструктаж з безпеки: вживання лексики «рятівний жилет» (life jacket) та
        «шолом» (helmet) у реальних ситуаціях'
  - section: 'Продукція: планування активного відпочинку (Production: Planning Active
      Leisure)'
    words: 800
    points:
      - 'Ситуативний діалог: оренда каяка або велосипеда в пункті прокату, обговорення
        погодинної оплати та застави'
      - 'Творче завдання: розробка власного плану «Активного літа» в Україні з інтеграцією
        велотуризму та водних видів'
      - 'Підсумок: огляд лексичних надбань модуля та порад щодо вибору спорядження
        для початківців'
