slug: cycling-water
title: Велосипед та водні види
word_target: 4000
content_outline:
- section: Вступ та цілі
  words: 400
  points:
  - 'Вступне слово від персонажа (Dnipro Kayak Guide): занурення в атмосферу річкового
    та велосипедного дозвілля (урбаністичний тон).'
  - 'Чітке окреслення цілей модуля: освоєння лексики для обговорення активного літнього
    відпочинку згідно з Держстандартом (§3.4, §3.14).'
  - Огляд природних об’єктів (річка, море, озеро) та спортивних споруд (басейн, велотрек)
    як контексту для навчання.
- section: Велосипедна культура та інфраструктура
  words: 1000
  points:
  - 'Культурний гачок: історія київського Велотреку та щорічного свята «Велодень»
    як символу активної міської спільноти.'
  - 'Сучасна оренда: практичне використання мобільних додатків байкшерінгу (Bikenow,
    Nextbike) для пересування містом.'
  - 'Інфраструктура: Труханів острів та Оболонська набережна як головні локації для
    безпечного катання.'
  - 'Велотуризм: огляд популярних українських маршрутів та необхідного спорядження
    для тривалих поїздок.'
  - 'Граматичний розбір типової помилки: використання орудного відмінка («їду велосипедом»)
    замість більш природного місцевого («їду на велосипеді»).'
- section: 'Водні види спорту: від Дніпра до Карпат'
  words: 1000
  points:
  - 'Каякінг у Києві: маршрути Гідропарку та Оболоні, унікальний вид на монумент «Батьківщина-Мати»
    з русла Дніпра.'
  - 'SUP-серфінг: особливості тренду, лексика спорядження та техніка безпеки на відкритій
    воді від досвідченого гіда.'
  - 'Карпатський рафтинг: сплави гірськими річками (Черемош, Чорна Тиса) як поєднання
    адреналіну та традиційного кемпінгу.'
  - 'Триатлон в Україні: популяризація комплексного спорту та підготовка до змагань
    на відкритій воді.'
  - 'Граматичний розбір: плутанина між напрямком «їдемо на море» (Знахідний відмінок)
    та місцем дії «купаємося в морі» (Місцевий відмінок).'
- section: 'Практика: тонкощі дієслів руху'
  words: 800
  points:
  - 'Ключова концепція: детальне розмежування дієслів «плавати» (багатоспрямована
    дія, звичка) та «плисти» (односпрямована дія, процес).'
  - 'Моделювання ситуацій з чіткими прикладами: качка «пливе» до берега (unidirectional)
    vs професійний плавець «плаває» щодня (habitual).'
  - 'Drill-вправа (вбудована в текст): виправлення помилки «Я пливу в басейні щосуботи»
    на правильне «Я плаваю в басейні щосуботи».'
  - 'Інструктаж з безпеки: інтеграція лексики «рятівний жилет» та «шолом» у реальних
    ситуаціях на воді та під час їзди.'
- section: 'Продукція: планування активного відпочинку'
  words: 800
  points:
  - 'Ситуативний діалог: оренда каяка або велосипеда в пункті прокату, обговорення
    погодинної оплати, умов та застави.'
  - 'Творче завдання: інструкції для розробки власного плану «Активного літа» в Україні
    з поєднанням велотуризму та водних видів.'
  - 'Підсумок: структурований огляд ключових лексичних надбань модуля та граматичних
    конструкцій.'
  - Короткі поради щодо вибору першого спорядження для початківців.
