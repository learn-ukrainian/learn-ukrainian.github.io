slug: feedback-negotiation-complaints
title: Зворотний зв'язок, переговори, скарги
word_target: 4000
content_outline:
- section: 'Вступ: Культура фідбеку та переговорів'
  words: 500
  points:
  - Введення теми зворотного зв'язку та переговорів у професійному й повсякденному
    житті відповідно до вимог §1.4.1.2.1.
  - 'Культурний контекст: історичний перехід від радянської «Книги скарг та пропозицій»
    (скасованої у 2020 році) до сучасного цифрового фідбеку.'
  - Огляд нового Закону про захист прав споживачів (2024) та розвиток поняття «клієнтоорієнтованість»
    в Україні.
- section: Давати та отримувати зворотний зв'язок
  words: 800
  points:
  - Лексична різниця між поняттями «зворотний зв'язок» (структурований фідбек) та
    «відгук» (загальна оцінка або коментар).
  - 'Застосування «Сендвіч-методу»: структурування конструктивної критики між похвалою
    з використанням ввічливого регістру.'
  - 'Граматика в дії: використання умовного способу («Варто було б...», «Я б порадив...»)
    для пом''якшення критики.'
  - 'Фрази для адекватного сприйняття критики: використання маркерів на кшталт «Дякую
    за зауваження» та «Я обов''язково це врахую».'
- section: Мистецтво переговорів та компромісів
  words: 900
  points:
  - Лексика для виявлення справжніх інтересів сторін («Чого ви насправді очікуєте?»).
  - 'Корекція типових помилок: відпрацювання сталих висловів «йти на компроміс» та
    «приймати рішення» (уникнення кальки «робити компроміс»).'
  - 'Пом''якшення незгоди: перехід від прямого «Ні» до дипломатичних конструкцій («Я
    розумію вашу позицію, але...» або «З одного боку..., проте...»).'
  - 'Пропонування альтернатив: фрази для пошуку спільного рішення («Давайте знайдемо
    середину», «Ми могли б розглянути інший варіант»).'
- section: Ввічливі скарги та захист прав споживачів
  words: 1000
  points:
  - 'Стратегічна ввічливість: заміна агресивних імперативів («Дайте!», «Поверніть!»)
    на м''які прохання («Я хотів би повернути...», «Чи не могли б ви...?»).'
  - 'Корекція граматичних помилок: правильне використання знахідного відмінка у фразі
    «обговорювати проблему» (без прийменника «про»).'
  - 'Структура формальної скарги: констатація фактів («Справа в тому, що...»), висловлення
    очікувань («Я очікую на...») та вимога рішення («Прошу розглянути мою скаргу»).'
  - Моделювання ситуацій у сфері послуг (банки, пошта, магазини) згідно з компетенціями
    рівня B1.
- section: 'Практикум: Сценарії вирішення проблем'
  words: 800
  points:
  - 'Рольова гра 1: Надання зворотного зв''язку колезі щодо проєкту з використанням
    умовного способу.'
  - 'Рольова гра 2: Ведення переговорів про умови обслуговування або знижку в бізнес-середовищі.'
  - 'Рольова гра 3: Захист прав споживача в магазині у разі повернення неякісного
    товару.'
  - 'Фінальний синтез: закріплення використання модальних маркерів та ввічливих конструкцій
    для ефективної комунікації.'
