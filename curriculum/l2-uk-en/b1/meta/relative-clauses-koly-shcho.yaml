slug: relative-clauses-koly-shcho
title: 'Підрядні означальні: коли, що'
word_target: 4000
content_outline:
- section: Вступ та Культурний контекст
  words: 400
  points:
  - Представити українську філософію часу через метафору плинності води та інтегрувати
    цільову лексику (час, момент).
  - Окреслити функцію складнопідрядних речень для зв'язку подій і фактів, використовуючи
    виключно українську мову (без англійського скафолдингу).
  - Провести коротке діагностичне завдання (TTT) для перевірки інтуїтивного розуміння
    сполучників «коли» і «що».
- section: 'Часові підрядні: Коли'
  words: 900
  points:
  - Деталізувати синтаксичну роль «коли» для вираження одночасності та різночасовості
    (згідно зі стандартом §4.4.3).
  - 'Навести розширені таблиці прикладів зі сталими конструкціями: «з того часу, коли»,
    «на час, коли», «до того як», «після того як».'
  - Використати прислів'я «Час — не кінь...» як контекст для аналізу невідворотності
    подій у минулому й майбутньому.
  - Включити блок контрольованої практики на самостійну побудову часових речень.
- section: 'З''ясувальні та означальні речення: Що'
  words: 1100
  points:
  - 'Пояснити різницю: «що» як сполучник (констатація факту: я знаю, що...) проти
    «що» як відносного займенника (опис предмета: книга, що лежить...).'
  - Розібрати вказівні конструкції «те, що», «все, що», «дарма, що» з прив'язкою до
    абстрактних іменників.
  - 'Пояснити правила української евфонії: свідоме чергування «що» та «який» для уникнення
    тавтології та накопичення однакових приголосних.'
  - Надати схему-алгоритм для вибору оптимального сполучного слова при побудові складного
    речення.
- section: Порівняльний аналіз та типові помилки
  words: 800
  points:
  - 'Контрастний аналіз «коли» (час) та «якщо» (умова): детально розібрати типову
    помилку підміни умови часовим контекстом.'
  - Аналіз типових помилок узгодження при використанні займенника «який» та пояснення,
    коли доречніше замінити його на «що».
  - Додати рубрику «Культура мовлення» про уникнення синтаксичних кальок (русизмів)
    у складнопідрядних конструкціях.
- section: 'Практичне застосування: Діалоги'
  words: 800
  points:
  - 'Діалог 1 («Спогади»): інтеграція часових підрядних з «коли» для розповіді про
    вирішальні і слушні моменти минулого.'
  - 'Діалог 2 («Плани та факти»): використання з''ясувального «що» і вказівного «те,
    що» для обговорення незаперечних фактів та ідей.'
  - Завершити модуль підсумковим чек-листом (Summary) для самоперевірки засвоєних
    синтаксичних ролей та конструкцій.
