slug: motion-coming-going
title: 'Рух: Прибуття та вихід'
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Постановка педагогічної мети: концептуальне значення прибуття та виходу в українській
    картині світу (відповідно до §4.3.8).'
  - 'Первинне занурення: коротка історія (100% українською) про прибуття на залізничний
    вокзал, що ілюструє використання ''при-'' для досягнення пункту призначення.'
- section: Тест та діагностика
  words: 600
  points:
  - 'Діагностика префіксів: завдання на розрізнення ''при-'' (результат прибуття)
    та ''по-'' (початок руху).'
  - 'Перевірка інтуїції щодо прийменників: тестування пар ''в/на'' (куди?) проти ''з/із''
    (звідки?) для усунення типової помилки напрямку.'
- section: 'Граматична концепція: Префікси при-, ви-, в-'
  words: 1400
  points:
  - 'Візуальна семантика префіксів: детальне пояснення §4.3.8 з використанням текстової
    візуалізації або Mermaid-діаграми для ''при-'' (досягнення точки), ''ви-'' (рух
    із закритого простору) та ''в-/у-'' (рух усередину).'
  - 'Фокус на результаті для ''при-'': пояснення, чому ''Я приїхав'' означає фізичну
    присутність на місці (на противагу абстрактному процесу).'
  - 'Аспектні нюанси: порівняльна таблиця недоконаного ''приходив'' (процес/повторюваність/скасований
    результат) та доконаного ''прийшов'' (завершений результат) з 5 парами прикладів.'
  - 'Морфологічна милозвучність: пояснення чергування у/в у префіксах (увійти, в''їхати)
    як унікальної риси української мови.'
- section: Практика та усунення помилок
  words: 800
  points:
  - 'Контекстне застосування: вправи на вибір між ''при-'', ''ви-'' та ''в-'' залежно
    від фізичного результату руху у міні-діалогах.'
  - 'Лабораторія виправлення помилок: цілеспрямовані таблиці та пояснення для узгодження
    прийменників та префіксів напрямку.'
  - 'Продуктивне завдання: симуляція ''Адміністратор готелю'', який керує прибуттям
    гостей (прибуття), входом до номерів (вхід) та виїздом (виїзд).'
- section: Культурний код та ідіоматика
  words: 700
  points:
  - 'Культурні гачки: пояснення традицій ''Посидіти на дорогу'', ''Зустріч з хлібом-сіллю''
    та тосту ''На коня'' у контексті дієслів руху.'
  - 'Лексичне збагачення: детальний розбір високочастотних ідіом (''вийти заміж'',
    ''прийти до тями'', ''увійти в історію'', ''вийти з ладу'').'
  - 'Практика ідіом: ситуативні завдання на використання фразеологізмів у реальному
    житті.'
