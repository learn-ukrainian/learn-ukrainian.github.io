slug: regions-south
title: 'Українські регіони: Південь'
word_target: 4000
content_outline:
- section: 'Вступ: Море та Степ'
  words: 600
  points:
  - 'Представити Південь як регіон контрастів: поєднання Чорного та Азовського морів
    із безкрайнім Степом (§3.14).'
  - Дати визначення поняттю «Степ» та пояснити історичний концепт «Дикого Поля» як
    простору козацької свободи, а не «пустої землі».
  - Описати географічний феномен «лиманів» (напр., Дніпровський, Куяльницький) та
    їхню екологічну і туристичну цінність.
- section: Одеса — Перлина Чорного моря
  words: 1000
  points:
  - 'Розкрити багатокультурний ДНК Одеси: пояснити, як поєднання української, єврейської,
    грецької та італійської культур створило унікальний міський колорит.'
  - Пояснити історію виникнення одеського фразеологізму «Вода — не фонтан» та концепт
    одеської самоіронії.
  - 'Звернути увагу на правопис: пояснити, чому українською пишеться «Одеса» (з однією
    «с»), розвінчуючи російські імперські міфи про назву.'
- section: Від Миколаєва до Олешківських пісків
  words: 1000
  points:
  - Презентувати Миколаїв як місто-корабель («місто корабелів») та розповісти про
    його суднобудівну спадщину.
  - Описати Олешківські піски на Херсонщині — найбільший піщаний масив Європи, розкрити
    історію його утворення та стримування штучними лісами (§3.13, §3.14).
  - Згадати річкові порти Херсонщини як важливі транспортні й торговельні ворота України.
- section: Крим та кримськотатарська спадщина
  words: 800
  points:
  - Описати кримськотатарський орнамент «Орьнек» (спадщина ЮНЕСКО) та розшифрувати
    його головні символи (троянда, тюльпан, гвоздика).
  - Коректно та з повагою описати трагедію Депортації 1944 року як ключовий момент
    для розуміння національної пам'яті корінного народу.
  - 'Інтегрувати сучасний наратив: Крим як невід''ємна частина української родини,
    деокупація як національна мета.'
- section: Практика та мовні нюанси
  words: 400
  points:
  - Пояснити використання прийменника «на» зі сторонами світу («на півдні», «на південь»),
    навести контрастні приклади для уникнення типових помилок.
  - Протиставити використання відмінків для напрямку («Я їду на море» — Знахідний)
    та розташування («Я відпочиваю на морі» — Місцевий) за допомогою коротких діалогів.
  - Пояснити різницю між прийменниками для міста («в Одесі», «у Миколаєві») та регіону
    («на Одещині», «на Херсонщині»).
- section: 'Підсумок: Туристичні принади Півдня'
  words: 200
  points:
  - Підсумувати значення морських курортів і заповідників для сучасної України (§3.5,
    §3.13).
  - Завершити модуль від імені Гіда по Півдню (Persona), надихнувши студентів на майбутні
    подорожі до вільного і багатогранного українського Півдня.
