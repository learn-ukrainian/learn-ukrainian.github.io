slug: regions-south
title: 'Українські регіони: Південь'
word_target: 4000
content_outline:
  - section: 'Вступ: Море та Степ (Introduction: Sea and Steppe)'
    words: 600
    points:
      - Introduction to the Southern identity defined by the duality of the Black
        Sea (Chorne more) and the Sea of Azov (Azovske more) coasts (§3.14)
      - Defining the 'Steppe' (Степ) and its historical role as the 'Wild Field' (Дике
        Поле) — a land of freedom where the wind meets the waves
      - 'Geographic deep-dive: explaining ''Estuaries'' (Лимани) as a defining feature
        of the Southern landscape and their ecological importance'
  - section: Одеса — Перлина Чорного моря (Odesa — Pearl of the Black Sea)
    words: 1000
    points:
      - 'Odesa''s founding and its multicultural DNA: how Ukrainian, Jewish, Greek,
        and Italian influences created a unique linguistic melting pot'
      - 'Linguistic analysis of Odesa Humor: the story behind the phrase «Вода — не
        фонтан» and the role of paradoxical phrasing and self-irony (самоіронія)'
      - 'Spelling and identity: master the Ukrainian spelling ''Odesa'' (single ''s'')
        to avoid common learner errors based on Russian transliteration'
  - section: Від Миколаєва до Олешківських пісків (From Mykolaiv to Oleshky Sands)
    words: 1000
    points:
      - 'Mykolaiv as the ''City of Shipbuilders'' (корабели): the story of the frigate
        ''Saint Nicholas'' (1790) and the city''s maritime layout'
      - 'The ''Ukrainian Sahara'': exploring the Oleshky Sands (Олешківські піски)
        in the Kherson region, Europe''s largest sand mass with 5-meter dunes (§3.13)'
      - 'State Standard §3.13: Identification of key tourist attractions, from Kherson''s
        river ports to the unique flora of the artificially planted Southern forests'
  - section: Крим та кримськотатарська спадщина (Crimea and Crimean Tatar Heritage)
    words: 800
    points:
      - 'Crimean Tatar culture: the symbolic language of ''Ornek'' (UNESCO heritage)
        featuring the rose (woman), tulip (man), and carnation (elder) symbols'
      - 'Historical weight: a respectful discussion of the 1944 Deportation (депортація)
        and its impact on the region''s demography and national memory'
      - 'The contemporary narrative of de-occupation: why the return of Crimea to
        the Black Sea family is a central national goal'
  - section: Практика та мовні нюанси (Practice and Linguistic Nuances)
    words: 400
    points:
      - 'Learner error drill: master the preposition ''на'' for cardinal directions
        («на півдні») versus the incorrect usage of ''в'' («в півдні»)'
      - 'Directional cases mastery: contrast ''Я їду на море'' (Destination/Accusative)
        with ''Я на морі'' (Location/Locative) through 15 minimal-pair exercises'
      - 'Regional naming conventions: distinguishing ''В Одесі'' (City) from ''На
        Одещині'' (Region) to ensure proper prepositional agreement'
  - section: 'Підсумок: Туристичні принади Півдня (Summary: Tourist Attractions of
      the South)'
    words: 200
    points:
      - Synthesis of Southern 'Resorts' (Курорти) and their economic/cultural importance
        in modern Ukraine (§3.5)
      - 'Closing reflections: the persona (Odesa Tour Guide) invites the learner to
        see the South as Ukraine''s vibrant ''Window to the World'''
