slug: past-passive-participles-1
title: Пасивні дієприкметники минулого часу I
word_target: 4000
content_outline:
- section: Вступ та вступний тест
  words: 500
  points:
  - Пояснення пасивних дієприкметників як віддієслівних прикметників; фокус на об'єкті
    дії, а не на суб'єкті.
  - Оцінювання попередніх знань з модуля b1-44 (Активні дієприкметники) за допомогою
    короткого діагностичного тесту.
  - Демонстрація концепції 'пасивного' значення на контрастних прикладах (активна
    дія vs. пасивний стан).
- section: 'Творення: Логіка суфіксів та Чергування'
  words: 950
  points:
  - 'Правила вибору суфіксів: -ний (найпоширеніший), -ений (основа на приголосний)
    та -тий (односкладові основи, напр., ''мити'' -> ''митий'').'
  - 'Детальний розбір милозвучності та чергування приголосних: патерни [д//дж] (садити
    -> саджений) та [с//ш] (носити -> ношений).'
  - Презентація алгоритму (дерева рішень) для безпомилкового вибору правильного суфікса.
- section: Граматичне узгодження та типові помилки
  words: 850
  points:
  - Пояснення правил узгодження в роді, числі та відмінку з іменником; аналіз типової
    помилки 'Лист написана'.
  - 'Розвінчання пастки суфікса ''-мий'' (російський вплив): чому форми типу ''любимий''
    є неправильними та як використовувати ''улюблений''.'
  - Практичний розбір перехідних дієслів, від яких утворюється пасивний стан, та уникнення
    зворотних помилок.
- section: 'Синтаксис: Дієприкметниковий зворот та Агентність'
  words: 850
  points:
  - Вступ до дієприкметникового звороту згідно зі Стандартом §4.4.2 (напр., 'екскурсія,
    організована для учасників').
  - 'Пояснення правила ''агентності'' в розмовній мові: чому активна конструкція ''Я
    написав книгу'' є природнішою за пасивну.'
  - Аналіз впливу порядку слів (зворот перед іменником чи після нього) на зміщення
    смислового фокусу.
- section: 'Культурний контекст: Феномен «-но/-то»'
  words: 550
  points:
  - Огляд унікальних українських безособових форм на -но/-то (зроблено, написано)
    як маркера результату.
  - Культурний гачок 'Зроблено в Україні' та використання слова 'виконаний' в офіційних
    і ділових контекстах.
  - Контраст між високою частотністю дієприкметників у письмовому/офіційному стилі
    та їх рідшим вживанням у повсякденній розмові.
- section: Підсумок та практичні поради
  words: 300
  points:
  - Узагальнення стратегій запам'ятовування найбільш частотних дієприкметників (зроблений,
    відкритий, закритий).
  - 'Надання фінального чек-листа для самоперевірки: 1) суфікс, 2) чергування, 3)
    узгодження.'
