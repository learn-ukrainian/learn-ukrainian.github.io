slug: running-in-ukraine
title: Біг в Україні
word_target: 4000
content_outline:
  - section: 'Вступ: Розквіт бігової культури (Introduction: The Rise of Running Culture)'
    words: 600
    points:
      - Historical overview of running in Ukraine since 2010, aligning with State
        Standard §3.4 (Leisure and Hobbies)
      - Distinguishing between 'оздоровчий біг' (wellness running) and 'біг підтюпцем'
        (jogging) as accessible lifestyle choices
      - 'Hook: Running as a tool for mental health and resilience in contemporary
        Ukrainian society'
  - section: Головні події та соціальна місія (Main Events and Social Mission)
    words: 1000
    points:
      - 'Kyiv City Marathon: Iconic route landmarks including Kyiv Pechersk Lavra
        and the Motherland Monument'
      - 'The Mile of the Unbroken (Миля Незламних): Analyzing its role as a symbol
        of solidarity with veterans and military personnel'
      - 'Running during war: Wartime formats like ''The Longest Marathon'' and essential
        safety protocols (shelters, air raid rules)'
      - The distinction between a generic 'забіг' (race) and a technical 'марафон'
        (42.195 km) to avoid common terminology errors
  - section: Організація та підготовка (Organization and Preparation)
    words: 800
    points:
      - 'Registration process: Vocabulary for ''реєстраційний внесок'', ''пройти реєстрацію'',
        and ''бігун-аматор'' (amateur runner)'
      - 'Equipment and preparation: Tips on choosing ''бігові кросівки'' and the importance
        of ''розминка'' (warm-up)'
      - 'The Organizer''s perspective: Using the active voice to guide learners through
        event logistics and ''лінія фінішу'' requirements'
  - section: 'Мовний практикум: Типові помилки (Language Workshop: Common Errors)'
    words: 800
    points:
      - 'Grammar Drill: ''Бігти'' (actual motion) vs ''Бігати'' (habitual ability)
        — correcting the error ''Я люблю бігти вранці'''
      - 'Case Governance: Mastering ''брати участь у марафоні'' using the Locative
        case instead of Genitive'
      - 'Time and Duration: Distinguishing ''пробігти за годину'' (result) from ''бігати
        годину'' (process duration)'
  - section: Спільнота та бігова дипломатія (Community and Running Diplomacy)
    words: 600
    points:
      - 'Parkrun Ukraine and local running clubs like Run21 or Tribe 10: How they
        foster ''бігова спільнота'' (runner community)'
      - 'Running as diplomacy: Participation in international events to represent
        Ukraine and raise awareness'
      - 'Finding a club: Practical dialogues on joining local groups and ''тримати
        темп'' (keeping the pace) with others'
  - section: 'Підсумок: Ваш перший забіг (Summary: Your First Race)'
    words: 200
    points:
      - Encouraging final thoughts on setting an 'особистий рекорд' (personal best)
      - Preview of endurance concepts for the next module b1-82 (Mountains and Trail)
