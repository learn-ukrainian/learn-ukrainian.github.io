slug: media-news
title: Медіа та новини
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - Представити загальний медіаландшафт України (преса, радіо, телебачення, інтернет)
    як невід'ємну частину сучасного дозвілля згідно зі стандартом.
  - Ввести історичний факт про запуск першого радіо в Харкові у 1924 році та знакову
    фразу «Алло, алло, алло! Говорить Харків!».
  - Висвітлити заснування «Суспільного мовлення» (2017) як приклад розвитку незалежних
    та об'єктивних медіа.
- section: 'Презентація: Джерела та формати'
  words: 1000
  points:
  - Зіставити традиційні формати (газети, ЗМІ, ТБ) та сучасні цифрові джерела (Telegram-канали,
    подкасти).
  - 'Пояснити професійні ролі: редакція, військовий та спортивний журналіст, процес
    журналістського розслідування.'
  - Розкрити поняття «медіаграмотність» та надати базові критерії для перевірки джерел
    інформації.
- section: Лексика та культура мовлення
  words: 1100
  points:
  - Надати таблицю типових українських колокацій (свіжі новини, аналітична стаття,
    випуск новин).
  - Чітко розмежувати використання дієслів «транслювати» (вести ефір) та «перекладати»
    (змінювати мову тексту) з наочними прикладами.
  - 'Провести вправу з культури мовлення: обґрунтувати заміну кальок «приймати участь»
    на «брати участь», а «піднімати питання» на «порушувати питання».'
  - 'Розібрати граматичне керування дієслова «повідомляти»: поєднання зі знахідним
    (факт) та давальним (особа) відмінками.'
- section: 'Практика: Аналіз та дискусія'
  words: 800
  points:
  - Порівняти офіційний репортаж (пасивні конструкції, суворий стиль) із неформальним
    обговоренням подій у подкасті.
  - Надати учбовий текст (імітацію стрічки новин) для читання з пошуком фактчекінгової
    термінології та цільових дієслів.
  - Сформулювати дискусійні питання щодо звичок споживання інформації та впливу ЗМІ
    на суспільство.
- section: Підсумок
  words: 500
  points:
  - Узагальнити високочастотну лексику модуля (оприлюднювати, висвітлювати, ЗМІ, редакція).
  - Надати кілька фінальних фраз-кліше для самостійного коментування новин на рівні
    B1.
