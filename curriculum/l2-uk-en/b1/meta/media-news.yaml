slug: media-news
title: Медіа та новини
word_target: 4000
content_outline:
  - section: Вступ (Introduction)
    words: 600
    points:
      - 'Overview of the Ukrainian media landscape aligned with State Standard §3.4:
        press, radio, television, and internet as informational leisure.'
      - 'Historical cultural hook: The 1924 Kharkiv radio launch with the iconic phrase
        «Алло, алло, алло! Говорить Харків!» marking the start of broadcasting.'
      - 'Modern context: The 2017 creation of Suspilne (Public Broadcasting) as a
        reform toward independent, non-oligarchic media in Ukraine.'
  - section: 'Презентація: Джерела та Формати (Presentation: Sources and Formats)'
    words: 1000
    points:
      - 'Categorization of media: traditional (газети, ТБ) vs. digital (Telegram-канали,
        подкасти) reflecting modern Ukrainian reality.'
      - 'Professional vocabulary: roles in the editorial office (редакція), including
        specialized journalists (військовий/спортивний журналіст) and investigative
        reporting.'
      - 'Concept introduction: «медіаграмотність» (media literacy) and the importance
        of identifying reliable sources (джерела інформації).'
  - section: Лексика та Культура мовлення (Vocabulary and Speech Culture)
    words: 1100
    points:
      - 'Collocation mastery: forming natural pairs with «новини» (свіжі, термінові)
        and «стаття» (аналітична, автор статті).'
      - 'Learner error correction: drill to distinguish between «транслювати» (to
        broadcast) and «перекладати» (to translate) to avoid semantic confusion.'
      - 'Language purity drill: identifying and replacing Russianisms like «приймати
        участь» (use «брати участь») and «піднімати питання» (use «порушувати питання»).'
      - 'Grammar focus: mastering the case government of «повідомляти» — Accusative
        for the fact (повідомити новину) vs. Dative for the person (повідомити друзям).'
  - section: 'Практика: Аналіз та Дискусія (Practice: Analysis and Discussion)'
    words: 800
    points:
      - 'Register differentiation: analyzing formal news reports (passive constructions,
        formal lexis) vs. informal blog/podcast discussion styles.'
      - 'Reading activity: scanning a news feed (стрічка новин) for key events and
        practicing fact-checking terminology.'
      - 'Discussion: media consumption habits as part of leisure (дозвілля) and the
        role of ZMI (ЗМІ) in modern society.'
  - section: Підсумок (Summary)
    words: 500
    points:
      - Review of high-frequency media terminology (ЗМІ, редакція, висвітлювати, оприлюднювати)
        and their typical collocations.
      - 'Final synthesis: forming opinions on news items using B1-level reporting
        verbs and corrected phrases.'
