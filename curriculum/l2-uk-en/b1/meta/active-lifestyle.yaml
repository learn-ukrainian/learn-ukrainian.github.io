slug: active-lifestyle
title: Активний відпочинок
word_target: 4000
content_outline:
- section: Вступ
  words: 400
  points:
  - Розкрити концепцію активного відпочинку в Україні згідно з Державним стандартом
    (§3.4, §3.12), описуючи еволюцію від радянської 'фізкультури' до сучасного 'wellness'.
  - Від імені 'Wellness Coach' пояснити вплив руху на 'самопочуття' (§3.7) та представити
    активне дозвілля як вибір улюбленого хобі.
- section: Історія та культура
  words: 1000
  points:
  - 'Створити H3 про ''Качалку'' в Гідропарку: її поява в 1970-х з металобрухту як
    унікальний символ української винахідливості та народної фітнес-культури.'
  - 'Створити H3 про традиції карпатського туризму: піші походи (хайкінг) Чорногорою
    та Ґорганами як невід''ємну частину культури дозвілля.'
  - Пов'язати спорт із місцевими традиціями, акцентуючи на вільному пізнанні рідного
    краю (деколонізаційний фокус на українській агентності).
- section: Сучасний активний стиль життя
  words: 1000
  points:
  - 'Створити H3 про доступність спорту: сучасні фітнес-центри, вуличні ''воркаут-майданчики''
    та використання державних спортивних споруд (стадіон, басейн, корт).'
  - 'Створити H3 про розвиток велоінфраструктури та активного туризму: паркові зони,
    міські велодоріжки та вибір спорядження для походів.'
  - 'Створити H3 про здоровий спосіб життя (ЗОЖ) та регулярність: філософія малих
    кроків для досягнення довготривалих результатів.'
- section: Граматика та типові помилки
  words: 800
  points:
  - 'Створити H3 про дієслово ''займатися'': пояснити використання Орудного відмінка
    (займатися спортом, йогою) та виправити типову помилку з Знахідним. Навести наочну
    таблицю.'
  - 'Створити H3 про дієслова руху в спорті: чітко розрізнити односпрямоване ''йти''
    (дія зараз) та багатоспрямоване ''ходити'' (регулярні тренування).'
  - 'Створити H3 про прийменники місця: пояснити контраст між ''в'' (в спортзал, в
    басейн, в похід) та ''на'' (на стадіон, на майданчик, на корт) за допомогою порівняльної
    таблиці.'
- section: Практичні сценарії
  words: 600
  points:
  - 'Написати міні-діалог ''У спортзалі'': обговорення купівлі абонемента, вибір персональних
    тренувань та плану занять з тренером.'
  - 'Навести розгорнутий зразок розповіді про власний спортивний режим: ранкові тренування,
    регулярне плавання та підготовка до походу в гори.'
- section: Підсумок
  words: 200
  points:
  - 'Підбити підсумки модуля: активний відпочинок як невід''ємна частина повсякденного
    життя та важливість перебування на свіжому повітрі.'
  - Надати заключну мотивуючу пораду від Wellness Coach щодо збереження регулярності
    та гарного самопочуття.
