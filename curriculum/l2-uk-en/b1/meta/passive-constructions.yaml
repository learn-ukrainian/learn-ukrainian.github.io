slug: passive-constructions
title: 'Пасивні конструкції: повна система'
word_target: 4000
content_outline:
- section: Вступ та діагностичний тест
  words: 600
  points:
  - 'Огляд трьох типів пасиву: дієприкметниковий, безособовий на -но/-то та зворотний
    на -ся.'
  - 'Діагностична вправа: виявлення тенденції додавати агента дії в орудному відмінку
    (наприклад, «Мною було зроблено»).'
  - Пояснення формату 100% україномовного занурення.
- section: 'Граматична система: три типи пасиву'
  words: 1000
  points:
  - 'Дієприкметниковий пасив: опис стану або ознаки предметів («зачинений магазин»),
    правила узгодження.'
  - 'Безособовий пасив (-но/-то): глибокий аналіз констатації факту/результату («Вхід
    заборонено») та його офіційного тону.'
  - 'Зворотний пасив (-ся): вираження процесу або регулярної дії («магазин зачиняється
    о 18:00»).'
- section: 'Культурний контекст: боротьба з «канцеляритом»'
  words: 800
  points:
  - Визначення «канцеляриту» як залишку штучного бюрократичного стилю, що зловживає
    пасивом.
  - 'Деколонізаційний аспект: природна перевага активного стану в українській мові
    («Ми вирішили» замість «Нами було вирішено»).'
  - 'Аналіз типової помилки: чому форми на -но/-то категорично не можуть мати виконавця
    в орудному відмінку.'
- section: Практика та корекція помилок
  words: 900
  points:
  - 'Трансформаційна практика: перетворення активних речень у всі три типи пасивних
    конструкцій.'
  - Тренування мінімальних пар для розрізнення стану («Двері зачинені»), процесу («Двері
    зачиняються») і результату («Двері зачинено»).
  - Вправи на виявлення та виправлення канцеляризмів і англомовних кальок.
- section: Діалоги та застосування в мовленні
  words: 700
  points:
  - 'Ситуативні діалоги: контраст між офіційними оголошеннями (пасив) та повсякденною
    розмовою (актив).'
  - 'Матриця прийняття рішень: блок-схема вибору між активним і пасивним станом залежно
    від контексту та фокусу (дія чи результат).'
  - Підсумковий огляд застосування синтаксичних структур за Стандартом §4.4.2.
