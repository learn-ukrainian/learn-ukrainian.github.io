slug: motion-practice-integration
title: 'Дієслова руху: практика та інтеграція'
word_target: 4000
content_outline:
- section: 'Вступ: Перевірка та мотивація'
  words: 500
  points:
  - Провести діагностичний тест для перевірки базових навичок використання префіксальних
    дієслів руху з прийменниками напрямку.
  - 'Окреслити цілі модуля: перехід від простих речень до побудови складних наративів
    про подорожі (згідно з §3.5 «Подорожі» Державного стандарту).'
  - Пояснити логіку та важливість правильного вибору прийменника для позначення кінцевої
    мети руху в українській мові.
- section: 'Пояснення: Матриця навігації та прийменників'
  words: 1200
  points:
  - Створити детальну таблицю-матрицю сполучуваності дієслів «іти/прийти» та «їхати/приїхати»
    з прийменниками «в/у», «на», «до», «через» (на основі §4.2.2.4).
  - Проаналізувати семантичний контраст між Знахідним відмінком (куди? напрямок) та
    Місцевим відмінком (де? статика) за допомогою парних прикладів (наприклад, «йти
    в парк» проти «гуляти в парку»).
  - 'Систематизувати лексичні пастки: класифікувати локації, що традиційно вимагають
    прийменника «на» (вокзал, пошта, фабрика, площа) проти локацій з «в/у» (театр,
    ліс, місто).'
  - 'Спростувати поширені кальки з англійської: детально пояснити правило заміни помилкового
    «брати автобус» на нормативні українські варіанти «сісти на автобус» та «їхати
    автобусом/поїздом».'
- section: 'Культурний контекст: Шляхи та ідіоми'
  words: 800
  points:
  - Розповісти історичну довідку про Чумацький Шлях як ключовий давньоукраїнський
    торговельний маршрут за сіллю до Криму та його зв'язок з небесною навігацією.
  - 'Інтегрувати вивчення ідіоматики руху: надати контекстуальні приклади та пояснення
    для метафор «на роздоріжжі» (ситуація життєвого вибору) та «глухий кут» (безвихідне
    становище).'
  - 'Описати правила мовленнєвого етикету в місті: надати зразки того, як ввічливо
    запитувати та вказувати дорогу, використовуючи форми дієслів «дійти», «піднятися»,
    «пройти», «повернути».'
- section: 'Практика: Київська Одіссея'
  words: 1000
  points:
  - Побудувати текстову симуляцію реального туристичного маршруту від столичного Подолу
    до Верхнього міста через Андріївський узвіз, з акцентом на використання дієслів
    вертикального руху («піднятися», «спуститися»).
  - 'Проаналізувати міську логістику: описати функцію Київського фунікулера як специфічного
    виду транспорту для подолання складної топографії Києва.'
  - 'Розробити комунікативний діалоговий тренажер: симуляція розмови «таксист — пасажир»,
    що активно залучає лексику орієнтування («на розі», «на перехресті», «світлофор»,
    «прямо», «ліворуч»).'
- section: Підсумок та застосування
  words: 500
  points:
  - 'Систематизувати правила побудови складної інструкції або опису маршруту за допомогою
    маркерів послідовності подій: «спочатку», «потім», «нарешті».'
  - 'Запропонувати творче комунікативне завдання «Моя Одіссея»: написання розгорнутої
    розповіді про власну значущу поїздку з обов''язковою інтеграцією префіксальних
    дієслів руху та прийменників напрямку.'
  - Сформулювати фінальні поради щодо уникнення найпоширеніших морфолого-синтаксичних
    помилок у темі руху.
