slug: business-basics
title: Основи бізнесу
word_target: 4000
content_outline:
  - section: Вступ та історія (Introduction & History)
    words: 600
    points:
      - 'Historical ethical entrepreneurship: The Simirenko family legacy as sugar
        magnates who funded the 1860 edition of Taras Shevchenko''s ''Kobzar'' when
        state support failed.'
      - 'The Tereshchenko dynasty''s philanthropy: Establishing a model where 80%
        of profits went to hospitals and universities (KPI) under the motto ''Striving
        for public benefit''.'
      - Introduction to State Standard B1 competencies (§3.9, §3.12) regarding work,
        employment, and financial services as the foundation for modern professional
        life.
  - section: Структури та формати бізнесу (Business Structures & Formats)
    words: 800
    points:
      - 'Distinguishing lexical nuances: ''компанія'' (general/IT context), ''фірма''
        (smaller or more colloquial), and ''підприємство'' (formal industrial or state-owned
        unit).'
      - 'Modern Ukrainian business landscape: Introduction of ''ФОП'' (Фізична особа-підприємець)
        as the standard legal format for small businesses and the thriving IT sector.'
      - 'Core vocabulary presentation: ''заснувати компанію'', ''власний бізнес'',
        ''державне підприємство'' with focus on correct register usage.'
  - section: Професійна комунікація та етика (Professional Communication & Ethics)
    words: 1000
    points:
      - 'Learner Error Correction (Lexical Calques): Drill the distinction between
        ''скасувати зустріч'' (correct for cancelling) and ''відмінити'' (grammatical
        declension only).'
      - 'False Friend Alert: Correcting ''вірне рішення'' (faithful/loyal) to ''правильне
        рішення'' (correct/accurate) in a business decision-making context.'
      - 'Formal Correspondence Standards: Mandatory use of the Vocative case in address
        (e.g., ''Шановний Іване'', ''Пане директоре'') to avoid the common error of
        using the Nominative.'
      - 'Professional Time Expressions: Correcting the common ''на протязі року''
        (which means in a draft/breeze) to the professional ''протягом року'' (during
        the year).'
  - section: Офіційне працевлаштування та послуги (Official Employment & Services)
    words: 800
    points:
      - 'State Standard §3.9 Application: Vocabulary for official employment, contracts
        (''укласти угоду''), salary (''зарплатня''), and working hours (''обідня перерва'').'
      - 'State Standard §3.12 Services: Navigating interactions with banks, insurance
        companies (''страхова компанія''), and postal services in a business capacity.'
      - 'Emphasis on Active Agency: Promoting the natural Ukrainian preference for
        active constructions (''Ми підписали угоду'') over passive translations of
        ''The agreement was signed''.'
  - section: Інвестиції, прибуток та підсумок (Investment, Profit & Summary)
    words: 800
    points:
      - 'Financial concepts: Discussion of ''чистий прибуток'' (net profit), ''податок
        на прибуток'' (income tax), and strategies for ''залучати інвестиції'' (attracting
        investment).'
      - 'Risk Management: Discussing ''збитки'' (losses) and ''вигідна угода'' (profitable
        deal) within the context of market strategy and ''маркетинг''.'
      - 'Final synthesis: Review of professional register expressions and the cultural
        values of ''ethical entrepreneurship'' as a bridge to B2 Professional Track
        modules.'
