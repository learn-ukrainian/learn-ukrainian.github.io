slug: business-basics
title: Основи бізнесу
word_target: 4000
content_outline:
- section: Вступ та історія
  words: 800
  points:
  - 'Історичний приклад етичного підприємництва: спадщина родини цукрозаводчиків Симиренків,
    зокрема Платона Симиренка, який профінансував видання «Кобзаря» Тараса Шевченка
    1860 року.'
  - 'Меценатство родини Терещенків: фінансування будівництва лікарень (наприклад,
    дитячої лікарні «Охматдит») та заснування Київського політехнічного інституту
    під гаслом «Прагнення до суспільної користі».'
  - Огляд компетенцій Державного стандарту (рівень B1, §3.9, §3.12) щодо сфери роботи,
    працевлаштування та фінансових послуг як основи професійного життя.
- section: Структури та формати бізнесу
  words: 800
  points:
  - 'Лексичні відмінності: використання слова «компанія» (широкий контекст, ІТ), «фірма»
    (менший масштаб) та «підприємство» (офіційна юридична особа, промисловий об''єкт).'
  - 'Сучасний бізнес-ландшафт України: статус ФОП (Фізична особа-підприємець) як найпоширеніша
    правова форма для малого бізнесу та ІТ-сектору.'
  - 'Презентація ключової лексики: «заснувати компанію», «власний бізнес», «державне
    підприємство» з акцентом на правильний регістр та контекст.'
- section: Професійна комунікація та етика
  words: 800
  points:
  - 'Виправлення типових помилок (лексичні кальки): різниця між «скасувати зустріч»
    (правильно для скасування) та «відмінити» (стосується лише граматичного відмінювання).'
  - 'Обережно, хибні друзі перекладача: заміна скалькованого «вірне рішення» (віддане)
    на точне «правильне рішення» у контексті прийняття бізнес-рішень.'
  - 'Стандарти офіційного листування: обов''язкове використання кличного відмінка
    у звертаннях («Шановний Іване», «Пане директоре») замість називного.'
  - 'Професійне вираження часу: виправлення русизму «на протязі року» (на протязí
    — in a draft) на питомо українське «протягом року».'
- section: Офіційне працевлаштування та послуги
  words: 800
  points:
  - 'Впровадження лексики за §3.9 Державного стандарту: офіційне працевлаштування,
    контракти («укласти угоду»), оплата праці («зарплатня») та робочий час («обідня
    перерва»).'
  - 'Застосування лексики за §3.12 Державного стандарту: взаємодія з банками, страховими
    компаніями («страхова компанія») та поштовими послугами у бізнес-контексті.'
  - 'Акцент на українській агентності: перевага активних конструкцій («Ми підписали
    угоду») над пасивними перекладами (замість «Угода була підписана»).'
- section: Інвестиції, прибуток та підсумок
  words: 800
  points:
  - 'Базові фінансові поняття: обговорення термінів «чистий прибуток», «податок на
    прибуток» та стратегій для того, щоб «залучати інвестиції».'
  - 'Управління ризиками: обговорення понять «збитки» (зазнати збитків) та «вигідна
    угода» в контексті ринкової стратегії та маркетингу.'
  - 'Підсумковий синтез: закріплення лексики професійного регістру та повернення до
    культурних цінностей етичного підприємництва як містка до модулів рівня B2.'
