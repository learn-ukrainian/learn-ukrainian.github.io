slug: abstract-concepts-ideas
title: 'Абстрактні концепції: ідеї та думки'
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - Establish the transition from concrete A1/A2 descriptions to B1 intellectual discourse
    and abstract concepts.
  - Introduce the role of abstract vocabulary in expressing values, truth, and intellectual
    thought.
  - 'Provide syntactic padding templates for stating opinions confidently: «Я вважаю,
    що...», «На мою думку...», «Мені здається, що...».'
- section: Лексичний блок
  words: 1000
  points:
  - Contrast 'ідея' (creative concept/plan) and 'думка' (opinion), explicitly addressing
    the common learner error of using 'ідея' for opinions.
  - Group and define mental products (ідея, думка), beliefs and perspectives (переконання,
    погляд), frameworks (концепція, теорія), and core values (цінність, принцип).
  - Explain the false friend 'аргумент' (logical reason) versus 'суперечка' (quarrel),
    providing contextual examples for each.
  - Clarify the register and meaning difference between 'погляд' (view/opinion) and
    'вигляд' (appearance).
- section: Граматика та синтаксис
  words: 800
  points:
  - 'Demonstrate the formation of abstract nouns from verbs (State Standard §4.3.4):
    ''бачити – бачення'', ''думати – думка'', ''переконувати – переконання''.'
  - 'Present syntactic structures for expressing abstract ideas using subordinate
    clauses with ''що'' (State Standard §4.4.3): ''Я переконаний, що...'', ''Викладач
    сказав, що...''.'
  - 'Provide tables with high-frequency collocations: ''втілювати ідею в життя'',
    ''думки розбігаються'', ''на перший погляд'', ''дотримуватися принципів''.'
- section: Культурний контекст
  words: 900
  points:
  - Discuss Hryhorii Skovoroda's concept of 'сродна праця' and the core value (цінність)
    of inner freedom, citing his epitaph «Світ ловив мене, та не спіймав».
  - Analyze Taras Shevchenko's personification of philosophical reflection in his
    work «Думи мої, думи мої, лихо мені з вами!».
  - Explore Lesya Ukrainka's poem «Слово, чому ти не твердая криця...» to illustrate
    how abstract ideas and convictions (переконання) become tools for action.
- section: Практика та застосування
  words: 800
  points:
  - Contrast registers by analyzing vocabulary used in an academic text (теорія, концепція,
    теоретично обґрунтувати) versus a personal blog post (власна думка, поділяти погляди).
  - Provide a mini-dialogue simulating a formal work meeting (нова концепція, стратегічне
    бачення) compared to an informal news discussion (громадська думка).
  - Set up a synthesis task instructing the learner to draft a short reflection on
    a personal 'цінність' using the provided syntactic templates and core vocabulary.
