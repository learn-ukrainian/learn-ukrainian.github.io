slug: professional-communication
title: Професійна комунікація
word_target: 4000
content_outline:
  - section: Вступ (Introduction)
    words: 500
    points:
      - Overview of professional and educational communication needs per State Standard
        §3.9 and §3.8, covering official employment and educational organization.
      - 'The significance of formal register: The mandatory use of ''Ви'' (capitalized
        in writing) and the modern Ukrainian shift to ''Пане/Пані'' + [Title/Surname]
        as a marker of identity.'
      - 'Stylistic competence per §4.5.1: Introduction to address etiquette that distinguishes
        modern Ukrainian sectors from legacy naming conventions.'
  - section: Робоча комунікація та етикет (Workplace Communication & Etiquette)
    words: 1100
    points:
      - 'Core workplace vocabulary (колега, керівник, нарада, звіт) with essential
        collocations: ''шановний колега'', ''безпосередній керівник'', and ''річний
        звіт''.'
      - 'Navigating professional hierarchies: Explicit rules for the transition from
        ''Ви'' to ''Ти'', emphasizing that it must be invited by the senior person
        or mutually agreed upon.'
      - 'Official employment and labor conditions: Vocabulary for working hours (робочий
        час), vacation (відпустка), and salary (оплата праці) per Standard §3.9.'
      - 'Formal correspondence standards: Formatting emails and reports using professional
        address formulas like ''Пане Професоре'' or ''Пані Колего''.'
  - section: Освітня комунікація та традиції (Educational Communication & Traditions)
    words: 1000
    points:
      - Academic environment vocabulary (студент, викладач, лекція, семінар, консультація)
        and the organization of the educational process per Standard §3.8.
      - 'Assessment and milestones: Understanding the distinction between ''залік''
        (credit/pass) and ''іспит'' (exam) within the semester (семестр) structure.'
      - 'Cultural hook: The ''Екватор'' (Equator) tradition celebrating the midpoint
        of studies (winter of the 3rd year) as a major rite of passage for Ukrainian
        students.'
      - 'Communicating with instructors: Practical scenarios for seeking consultations
        and addressing academic staff using respectful vocative forms.'
  - section: Аналіз помилок та фразеологія (Error Analysis & Phraseology)
    words: 700
    points:
      - 'Correcting common calques: Explicit drill on ''брати участь'' (to participate)
        to replace the incorrect Russian-influenced ''приймати участь''.'
      - 'Verb differentiation: Minimal pairs and context drills to distinguish ''навчатися''
        (being a student) versus ''вивчати'' (learning a specific subject/object).'
      - 'Case mismatch correction: Addressing the learner error ''Дякую Вас'' (Acc)
        by enforcing the correct Dative form ''Дякую Вам''.'
      - 'Stylistic markers: Using antonyms and synonyms for professional nuance and
        modal hedging expressions per State Standard §4.5.1.'
  - section: Практика та підсумок (Practice & Summary)
    words: 700
    points:
      - 'Role-play simulation: An official employment interview and contract (договір)
        discussion using formal register and professional collocations.'
      - 'Writing workshop: Drafting a formal email or a academic term paper (курсова
        робота) proposal incorporating correct case usage and address etiquette.'
      - 'Final summary: Review of essential professional collocations and the ''Corporate
        HR Manager'' perspective on effective Ukrainian communication.'
