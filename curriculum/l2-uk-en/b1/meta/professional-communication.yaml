slug: professional-communication
title: Професійна комунікація
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - Представити комунікативні потреби для освіти та роботи згідно з Держстандартом
    (§3.8, §3.9).
  - 'Пояснити важливість формального регістру: обов''язкове використання «Ви» (з великої
    літери в офіційному листуванні).'
  - 'Описати сучасний український етикет звертання: використання «Пане/Пані» + ім''я
    або посада як європейський стандарт, що витісняє радянську традицію звертання
    по батькові.'
- section: Робоча комунікація та етикет
  words: 1100
  points:
  - Ввести ключову лексику (колега, керівник, нарада, звіт) з прикладами сталих словосполучень
    («шановний колега», «річний звіт»).
  - Пояснити правила переходу від «Ви» до «Ти» в професійному середовищі (ініціатива
    має належати старшому за посадою чи віком).
  - Надати словник для офіційного працевлаштування (робочий час, відпустка, оплата
    праці) згідно з §3.9.
  - Розібрати структуру офіційного електронного листа з професійними формулами привітання
    та прощання.
- section: Освітня комунікація та традиції
  words: 1000
  points:
  - Ввести академічну лексику (викладач, лекція, семінар, консультація) згідно з §3.8.
  - Пояснити різницю між «заліком» та «іспитом» у межах університетського семестру.
  - Розповісти про студентську традицію «Екватор» (святкування середини навчання).
  - Навести зразки міні-діалогів для звернення до викладачів та запису на консультацію.
- section: Аналіз помилок та фразеологія
  words: 700
  points:
  - Спростувати кальку «приймати участь», закріпити єдино правильний варіант «брати
    участь».
  - Провести чітку межу між дієсловами «навчатися» (процес/місце) та «вивчати» (конкретний
    предмет).
  - 'Виправити типову граматичну помилку: дієслово «дякувати» вимагає давального відмінка
    («дякую Вам», а не «Вас»).'
  - Навести синоніми та антоніми для професійного регістру, включаючи модальні слова
    для пом'якшення тону.
- section: Практика та підсумок
  words: 700
  points:
  - 'Створити рольову ситуацію: співбесіда та обговорення умов договору з використанням
    формального регістру.'
  - Запропонувати завдання на написання офіційного повідомлення або плану курсової
    роботи.
  - 'Підбити підсумки з позиції HR-менеджера компанії: поради щодо успішної комунікації
    в українському колективі.'
