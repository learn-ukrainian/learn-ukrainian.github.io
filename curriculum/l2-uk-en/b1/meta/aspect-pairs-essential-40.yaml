slug: aspect-pairs-essential-40
title: 'Видові пари: 40 найважливіших'
word_target: 4000
content_outline:
- section: Вступ та діагностика
  words: 600
  points:
  - Діагностичне завдання на розпізнавання видових пар.
  - 'Тестування інтуїції на типові помилки: пастка ''доконаного теперішнього'' (наприклад,
    ''Я зроблю це зараз'' замість ''Я роблю'').'
  - 'Перевірка розуміння форм майбутнього часу: розпізнавання помилки у конструкції
    ''Я буду прочитати'' (змішування складеного майбутнього та інфінітива доконаного
    виду).'
  - 'Початковий контраст нюансів минулого часу: процес (''was doing'') проти результату
    (''did'') на прикладі найуживаніших дієслів.'
- section: Морфологія та типи творення
  words: 800
  points:
  - 'Детальне пояснення правила: ''Теперішній час = ТІЛЬКИ недоконаний вид''. Доконаний
    вид не може виражати теперішній час.'
  - 'Розбір трьох основних моделей творення видових пар: префіксація (писати / написати).'
  - 'Суфіксація: зміна суфіксів у корені (відкривати / відкрити).'
  - 'Суплетивні форми: абсолютно різні корені (говорити / сказати, брати / взяти).'
  - Відповідність вимогам Державного стандарту B1 (§4.2.3.1) щодо дієвідмінювання.
- section: Системний огляд 40 пар
  words: 1000
  points:
  - 'Пріоритетний розбір ТОП-10/20 найчастотніших дієслів: робити/зробити, говорити/сказати,
    брати/взяти, давати/дати, бачити/побачити.'
  - 'Таблиці дієслів високої частотності з чіткими візуальними маркерами: 🔄 (процес)
    та ✅ (результат).'
  - 'Практичні приклади та ключові колокації для рівня B1 (наприклад: ''брати участь'',
    ''взяти до уваги'').'
  - 'Введення дієслів для повсякденних дій: їсти/з''їсти, пити/випити, писати/написати,
    читати/прочитати, вчити/вивчити.'
- section: Культурний та фразеологічний вимір
  words: 600
  points:
  - Аналіз прислів'я «Зробив діло — гуляй сміло» як квінтесенції доконаного виду (завершеність,
    результат).
  - Аналіз приказки «Вода камінь точить» для ілюстрації безперервної, повторюваної
    природи недоконаного виду.
  - Розбір виразу «Куй залізо, поки гаряче» для пояснення вибору виду у складнопідрядних
    реченнях та синхронності дій.
  - Використання врізок Engagement Boxes (наприклад, [!cultural]) для подачі цього
    матеріалу.
- section: Корекція типових помилок
  words: 600
  points:
  - 'Спеціальні вправи на усунення ''плутанини майбутнього часу'' (Future Tense Confusion):
    тренування вибору між ''буду робити'' / ''робитиму'' та ''зроблю''.'
  - 'Відпрацювання нюансів минулого часу: контекстуальний вибір між ''Вчора я читав''
    (фокус на процесі) та ''Вчора я прочитав'' (фокус на результаті).'
  - Мінімальні пари для усунення пастки 'теперішнього доконаного' — підкреслення,
    що 'Я роблю' єдиний правильний варіант для теперішнього моменту.
- section: Підсумок та практичне застосування
  words: 400
  points:
  - 'Синтез використання видових пар у природному діалозі: розповідь про завершений
    робочий день та плани на майбутнє.'
  - Фінальний чек-лист для самоперевірки на засвоєння найуживаніших дієслів та типів
    їх утворення.
  - Коротке резюме правил вибору між 🔄 та ✅.
