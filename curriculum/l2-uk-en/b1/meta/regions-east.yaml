slug: regions-east
title: 'Українські регіони: Схід'
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - Описати географічне розташування східних областей (Харківська, Донецька, Луганська)
    за допомогою лексики з §3.13 Державного стандарту.
  - Пояснити термін 'східний регіон' як нейтральне географічне поняття.
  - Зробити огляд трансформації від дикого степу до індустріальних центрів, використовуючи
    цільову лексику ('регіон', 'промисловість').
- section: 'Харків: Місто студентів, науки та архітектури'
  words: 1000
  points:
  - Описати Харківський національний університет імені В. Н. Каразіна та його роль
    у формуванні статусу 'студентської столиці'.
  - Виділити окремий підрозділ (H3) для розповіді про Будинок 'Слово' як осередок
    української інтелектуальної еліти 1920-х років, руйнуючи міфи про російськомовність
    міста.
  - Пояснити значення архітектурного ансамблю Держпрому (конструктивізм) в контексті
    урбаністики.
  - Охарактеризувати сучасний Харків як символ стійкості під час війни.
- section: Історія Слобожанщини та Донбасу
  words: 1000
  points:
  - Розкрити етимологію слова 'слобода' (свобода від податків) та пояснити процес
    заселення регіону вільними козацькими полками.
  - 'Присвятити підрозділ (H3) європейському корінню індустріалізації: розповісти
    про Джона Юза та заснування Юзівки (Донецька) у 1869 році.'
  - Описати робітничу культуру як частину унікальної регіональної ідентичності, що
    органічно пов'язана з усією Україною.
  - Спростувати радянські міфи про ізольований або 'суто російський' розвиток Сходу.
- section: Мовна практика та типові помилки
  words: 800
  points:
  - 'Створити таблицю прийменникового керування: пояснити й відпрацювати використання
    ''на Донбасі'' замість кальки ''в Донбасі''.'
  - Надати правило та приклади чергування голосних 'і/о' у власних назвах на прикладі
    відмінювання 'Харків — Харкова' (а не 'Харківа').
  - Включити міні-діалоги (H3) для практичного застосування лексики ('галузь', 'спадщина',
    'ідентичність').
  - Пояснити стилістичні відмінності вживання термінів для опису індустріальних процесів.
- section: 'Підсумок: Стійкість та єдність Сходу'
  words: 600
  points:
  - Окреслити концепцію стійкості (resilience) як визначальну рису сучасного українського
    Сходу.
  - Підкреслити невід'ємність регіону від загальноукраїнського культурного простору
    (звичаї, традиції за §3.15).
  - Підсумувати матеріал через призму майбутньої деокупації та відбудови регіону.
