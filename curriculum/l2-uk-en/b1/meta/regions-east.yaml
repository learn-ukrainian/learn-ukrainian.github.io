slug: regions-east
title: 'Українські регіони: Схід'
word_target: 4000
content_outline:
  - section: 'Вступ (Introduction: The Industrial and Intellectual Core)'
    words: 600
    points:
      - Географія та ландшафт східних областей України (Харківська, Донецька, Луганська)
        відповідно до Державного стандарту §3.13.
      - 'Трансформація від дикого степу до потужних індустріальних мегаполісів: баланс
        природи та індустрії.'
      - Визначення понять 'східний регіон' та 'східні області' як нейтральних географічних
        термінів.
  - section: 'Харків: Місто студентів, науки та архітектури (Kharkiv: City of Students,
      Science, and Architecture)'
    words: 900
    points:
      - 'Харків як радянська столиця (1919–1934): історичний контекст, архітектурний
        ансамбль Держпрому та розвиток конструктивізму.'
      - 'Харківський національний університет імені В. Н. Каразіна (заснований 1804):
        статус найстарішого освітнього центру та ''студентської столиці''.'
      - 'Інтелектуальний та культурний осередок: будинок ''Слово'', сучасний IT-сектор
        та літературні традиції міста.'
      - Сучасний Харків як символ незламності та стійкості під постійними обстрілами.
  - section: Історія Слобожанщини та Донбасу (History of Slobozhanshchyna and Donbas)
    words: 1000
    points:
      - 'Слобожанщина: етимологія слова ''слобода'' (свобода від податків) та історія
        заселення козацькими полками (Харківський, Сумський, Ізюмський).'
      - 'Європейське коріння Донбасу: роль британського підприємця Джона Юза (Юзівка/Донецьк)
        у заснуванні промислового центру в 1869 році.'
      - 'Робітнича культура та ідентичність: формування особливого характеру регіону
        через важку працю та індустріальну спадщину.'
      - Спростування радянських міфів про ізольований розвиток Сходу; наголос на його
        органічному зв'язку з рештою України.
  - section: Мовна практика та типові помилки (Language Practice and Common Errors)
    words: 800
    points:
      - 'Прийменникове керування: виправлення помилки ''в Донбасі'' (калька) на нормативне
        ''на Донбасі'' (відповідно до назв регіонів).'
      - 'Граматика власних назв: родовий відмінок назви міста — ''Харкова'' (не ''Харківа'')
        через чергування голосних і/о.'
      - 'Словникова робота: вживання термінів ''промисловість'' (важка/легка), ''галузь''
        та ''спадщина'' у професійному та культурному контекстах.'
      - Дискусія про національну та мовну ідентичність мешканців Сходу в умовах деколонізації.
  - section: 'Підсумок: Стійкість та єдність Сходу (Summary: Resilience and Unity
      of the East)'
    words: 700
    points:
      - 'Схід — це невід''ємна частина України: спільні традиції, звичаї та свята
        відповідно до стандарту §3.15.'
      - Концепція стійкості (resilience) як ключова характеристика сучасного українського
        Сходу.
      - 'Майбутнє регіону: відновлення, деокупація та збереження культурної спадщини.'
