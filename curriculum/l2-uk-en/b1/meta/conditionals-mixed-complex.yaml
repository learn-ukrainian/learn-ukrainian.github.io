slug: conditionals-mixed-complex
title: 'Умовні речення: змішані та складні умови'
word_target: 4000
content_outline:
- section: 'Тест: Перевірте себе'
  words: 400
  points:
  - Create a diagnostic quiz testing the distinction between 'якщо' (real) and 'якби'
    (unreal) contexts.
  - Include a self-assessment checklist for learners to identify confusion between
    real and unreal markers.
  - Design an error-spotting exercise targeting Russian interference ('єслі') and
    missing commas before 'якщо'.
- section: 'Пояснення: Змішані типи та складні умови'
  words: 1300
  points:
  - Explain the formation of the conditional mood with 'би/б' focusing on Type 1 (Past
    Condition, Present Result), using the proverb «Якби знав, де впадеш...» as a core
    example.
  - Explain Type 2 (Present Condition/General State, Past Result) with examples like
    «Якби я був розумнішим, я б не зробив цього».
  - Detail the formal register usage of 'за умови' (provided that) with collocations
    like 'за умови дотримання'.
  - 'Highlight syntax rules: explicitly state the mandatory comma rule before ''якщо'',
    ''якби'', and ''навіть якщо''.'
- section: 'Практика: Побудова логічних ланцюжків'
  words: 1000
  points:
  - Provide drills correcting the 'Якщо я був би' error into correct 'Якби я був'
    forms.
  - Create transformation exercises expanding simple conditions into complex ones
    using 'навіть якщо' and 'якщо не'.
  - Develop logic chain exercises linking multiple conditional steps (If A -> B ->
    If B -> C) using various conjunctions.
- section: 'Діалоги: Від макогона до історії'
  words: 900
  points:
  - Draft a conversation using the 'Якби не + Noun' pattern, centered around the proverb
    «Якби не макогін і качалка...».
  - Write a role-play scenario focusing on negotiating agreements in a semi-formal
    register using 'за умови, що...'.
  - Create a dialogue involving a hypothetical historical debate expressing 'what
    if' scenarios with complex conditional logic.
- section: Підсумок та рефлексія
  words: 400
  points:
  - Summarize the core pedagogical difference between real (якщо) and unreal (якби)
    logic.
  - Provide a final checklist reinforcing the comma rule and de-Russification (avoiding
    'єслі' and incorrect mixtures of 'якщо' + 'би').
