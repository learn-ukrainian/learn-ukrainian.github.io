slug: describing-changes
title: Опис змін
word_target: 4000
content_outline:
  - section: 'Вступ: Мова динаміки (Introduction: The Language of Dynamics)'
    words: 400
    points:
      - 'Introduction to the Climate Scientist persona: setting a professional tone
        for describing environmental and social shifts according to State Standard
        §3.14.'
      - Distinguishing between dynamic processes (*процес*) and static results (*результат*)
        in Ukrainian descriptive grammar.
      - 'Temporal perspectives: defining the scale of change from gradual (*поступово*)
        to sudden (*різко*) or rapid (*стрімко*).'
  - section: Презентація та граматичні нюанси (Presentation and Grammatical Nuances)
    words: 1000
    points:
      - 'Lexical groups for change: Motion, State, Quantity, Quality, and Abstract
        concepts as mandated by Standard §3.6.'
      - 'Comparison of adverbs: using *більш сучасно* or *менш холодно* to describe
        shifting states (State Standard §4.3.2).'
      - 'Learner Error Focus 1: Distinguishing *рости* (physical growth of plants/children)
        from *зростати* (abstract/statistical growth like *економіка зростає*).'
      - 'Learner Error Focus 2: Transitive *змінювати* (active agent) vs reflexive
        *змінюватися* (intransitive state); drill correct Accusative governance *змінювати
        план* vs incorrect *змінювати до плану*.'
      - 'Collocations with speed adverbs: *стрімко зростати*, *поступово змінюватися*,
        *різко падати*.'
  - section: 'Читання: Клімат та трансформація міст (Reading: Climate and City Transformation)'
    words: 1000
    points:
      - 'Climate Scientist Report: analytical text on environmental trends using *температура
        підвищується/знижується* and *клімат змінюється*.'
      - 'Cultural Hook: The transformation of Kyiv into a ''UNESCO City of Music''
        (2025) as a context for verbs of improvement (*покращуватися*, *розвиватися*).'
      - 'Social Context: De-russification and street renaming as an active process
        of *змінювати назви*, contrasting with how the urban landscape *змінюється*
        (passive/state).'
  - section: 'Діалоги: Від прогнозів до цифровізації (Dialogues: From Forecasts to
      Digitalization)'
    words: 800
    points:
      - 'Formal workplace dialogue: negotiating project changes and adjustments using
        transitive verbs and Accusative case.'
      - 'Informal weather discussion: practicing the distinction between *погода змінюється*
        (intransitive) and *вітер змінює напрямок* (transitive).'
      - 'Digital State Discussion: Cultural hook on how the ''Diia'' ecosystem *стрімко
        розвивається*, transforming bureaucratic processes into digital services.'
  - section: Виробництво та підсумок (Production and Summary)
    words: 800
    points:
      - 'Guided production: learners describe a significant change in their hometown
        or professional field using at least 10 verbs/adverbs from the required list.'
      - 'Refining nuances: choosing between *поступово*, *різко*, and *стрімко* to
        accurately convey the speed of transformation.'
      - Final recap of case governance (*перетворюватися на...*) and the contrast
        between physical and abstract growth verbs.
