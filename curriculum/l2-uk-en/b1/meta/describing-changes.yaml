slug: describing-changes
title: Опис змін
word_target: 4000
content_outline:
- section: 'Вступ: Мова динаміки'
  words: 500
  points:
  - 'Введення персони Climate Scientist: встановлення професійного тону для опису
    екологічних та суспільних зрушень (згідно зі стандартом §3.14).'
  - 'Концептуальне розмежування: динамічний процес (*процес*) на противагу статичному
    результату (*результат*).'
  - 'Шкала часу: класифікація швидкості змін від поступових (*поступово*) до раптових
    (*різко*) та швидких (*стрімко*).'
- section: Презентація та граматичні нюанси
  words: 1000
  points:
  - 'Ступені порівняння якісно-означальних прислівників (Стандарт §4.3.2): використання
    складених форм (*більш сучасно*, *менш холодно*) та суплетивних форм (*гарно -
    краще*, *погано - гірше*).'
  - 'Типова помилка 1: розрізнення фізичного росту (*рости* — діти, рослини) та абстрактного
    зростання (*зростати* — економіка, температура, попит).'
  - 'Типова помилка 2: перехідне дієслово *змінювати* (активна дія, вимагає Знахідного
    відмінка) проти рефлексивного *змінюватися* (стан, неперехідне); фокус на правильному
    керуванні (*змінювати план* замість *змінювати до плану*).'
  - 'Словосполучення з прислівниками швидкості: *стрімко зростати*, *поступово змінюватися*,
    *різко падати*.'
- section: 'Читання: Клімат та трансформація міст'
  words: 1000
  points:
  - 'Аналітичний звіт кліматолога (текст): використання лексики *температура підвищується/знижується*,
    *клімат змінюється*.'
  - 'Культурний контекст: отримання Києвом статусу «Міста музики ЮНЕСКО» у 2025 році
    як ілюстрація дієслів розвитку (*покращуватися*, *розвиватися*).'
  - 'Соціальний контекст: дерусифікація та перейменування вулиць як активний процес
    (*змінювати назви*), що контрастує із загальним станом (*місто змінюється*).'
- section: 'Діалоги: Від прогнозів до цифровізації'
  words: 800
  points:
  - 'Офіційний діалог у робочому середовищі: обговорення змін та адаптації проєкту
    з використанням перехідних дієслів та Знахідного відмінка.'
  - 'Неформальна розмова: обговорення змін погоди (практика розрізнення неперехідного
    *погода змінюється* та перехідного *вітер змінює напрямок*).'
  - 'Культурна вставка: обговорення екосистеми «Дія» як прикладу того, як державні
    сервіси *стрімко розвиваються*.'
- section: Виробництво та підсумок
  words: 700
  points:
  - 'Керована практика: студенти описують значні зміни у своєму рідному місті або
    професійній сфері, використовуючи щонайменше 10 дієслів/прислівників з цільового
    списку.'
  - 'Нюансування значень: практика вибору між *поступово*, *різко* та *стрімко* для
    точної передачі швидкості трансформацій.'
  - 'Фінальне резюме: керування відмінками (*перетворюватися на...*) та контраст між
    фізичними і абстрактними процесами.'
