slug: aspect-past-single-repeated
title: 'Вид у минулому: одного разу vs щодня'
word_target: 4000
content_outline:
- section: 'Тест: Два спогади'
  words: 600
  points:
  - Introduce the Memoirist persona contrasting a recurring childhood habit (imperfective)
    with a single, life-altering event (perfective).
  - Present an initial diagnostic task for identifying time markers like «щодня» vs
    «того разу» as aspect triggers.
  - 'Establish the core visual metaphor: ''Dots on a line'' for habits and ''One big
    X'' for specific events.'
- section: 'Презентація: Теорія та культурний контекст'
  words: 1200
  points:
  - Present State Standard §4.2.3.1 rules for past tense formation (хотів vs побачив).
  - 'Analyze the Folk Tale Hook: Explain how «Одного разу...» triggers the narrative
    storytelling mode.'
  - 'Analyze the Habitual Hospitality Hook: Detail how «щонеділі» and «на свята» anchor
    imperfective rituals.'
  - Provide a semantic contrast table comparing «читав» (process) and «прочитав» (achievement)
    using high-frequency collocations.
  - Deconstruct the English 'used to' concept, showing how Ukrainian past imperfective
    fully encompasses it natively.
- section: Грамматичні нюанси та типові помилки
  words: 800
  points:
  - Address the 'Perfective for Habituals' trap by prioritizing frequency markers
    over action completion.
  - Contrast process vs. achievement with clear narrative examples (e.g., «Я складав
    іспит» vs «Я склав іспит»).
  - Provide a step-by-step selection algorithm for choosing aspect based on adverbs
    of frequency vs. specific sequence markers.
  - Maintain 100% Ukrainian immersion for all grammatical explanations; explicitly
    avoid Russian comparative framing.
- section: 'Практика: Минуле в деталях'
  words: 900
  points:
  - Create a narrative fill-in-the-blanks contrasting a teacher's daily routine (habitual)
    with a graduation ceremony (single event).
  - 'Implement a transformation drill: convert a habitual description («Кожного літа
    ми їздили...») to a specific event narrative («Того літа ми поїхали...»).'
  - Provide a scenario-based professional memoir dialogue discussing repeated work
    tasks versus a single career milestone.
- section: 'Підсумок: Резюме маркерів'
  words: 500
  points:
  - Create a master table grouping frequency markers (завжди, часто) vs. event markers
    (одного разу, того дня) for quick reference.
  - Write a final persona reflection that weaves both aspects into a coherent storytelling
    flow.
  - Include a 10-item self-check assessment to verify understanding of narrative triggers.
