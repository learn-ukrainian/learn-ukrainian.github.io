slug: adverbial-participles-imperfective
title: Дієприслівники недоконаного виду
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - Пояснення поняття одночасності дій згідно з Державним стандартом §4.4.2 (дієприслівникові
    звороти як засіб ускладнення простого речення).
  - 'Демонстрація техніки «компресії речення»: перетворення довгого підрядного речення
    часу («Коли я йшов...») на елегантний дієприслівниковий зворот («Йдучи...»).'
  - 'Культурний гачок: концепт «Юлій Цезар по-українськи» як мотиватор для вивчення
    того, як граматично правильно описувати декілька дій, що відбуваються водночас.'
- section: 'Граматичне пояснення: Творення та вживання'
  words: 1000
  points:
  - Правила творення за допомогою суфіксів -учи/-ючи (I дієвідміна) та -ачи/-ячи (II
    дієвідміна) на основі форми 3-ї особи множини теперішнього часу.
  - 'Попередження типових помилок: детальне порівняння правильних форм («пишучи»,
    «бачачи») з частими учнівськими кальками чи хибними утвореннями («писачи», «бачучи»).'
  - 'Візуалізація одночасності: використання паралельної шкали часу для демонстрації
    одночасного перебігу основної та додаткової дій.'
  - 'Практичне засвоєння високочастотних вставних конструкцій: «чесно кажучи», «інакше
    кажучи», «м''яко кажучи».'
- section: Синтаксичні пастки та помилки
  words: 800
  points:
  - 'Аналіз проблеми «дисбалансу підметів»: детальний розбір помилкового речення «Йдучи
    додому, почався дощ» та пояснення правила обов''язкового збігу підмета.'
  - 'Заборона вживання в безособових реченнях: чому не можна казати «Читаючи цей текст,
    мені стало сумно» і як граматично коректно це трансформувати в особове речення
    («Читаючи... я засмутився»).'
  - 'Семантичне розрізнення: пряме значення дії «не дивлячись» (не спрямовуючи погляд)
    на противагу прийменниковому значенню «не дивлячись на» (незважаючи на щось).'
- section: Практика та культурний контекст
  words: 900
  points:
  - 'Культурний контекст: використання сюжету класичної комедії «За двома зайцями»
    для ілюстрації хаосу та комічних наслідків виконання кількох справ одночасно.'
  - 'Словникова практика з високочастотними колокаціями: відпрацювання фраз на зразок
    «читаючи новини», «йдучи вулицею», «знаючи правду».'
  - 'Трансформаційні діалоги: рольові сценарії багатозадачності на роботі, де учні
    мають перетворювати громіздкі пояснення на стислі дієприслівникові звороти.'
- section: Підсумок та самоконтроль
  words: 700
  points:
  - Синтезований огляд одночасності як головної ознаки недоконаного виду перед переходом
    до вивчення дієприслівників доконаного виду (b1-43).
  - 'Чекліст для самоперевірки («Same Subject Rule»): алгоритм перевірки збігу підмета
    та правильності вибору суфікса у власних текстах.'
  - 'Фінальне продуктивне завдання: опис хаотичної або багатозадачної сцени з фільму
    з використанням щонайменше п''яти дієприслівників недоконаного виду.'
