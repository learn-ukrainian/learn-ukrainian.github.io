slug: concessive-khocha
title: 'Допустові речення: хоча, незважаючи на'
word_target: 4000
content_outline:
- section: Вступ та діагностика
  words: 600
  points:
  - 'H3: Діагностичний тест. 5 запитань (Test phase of TTT) для перевірки інтуїтивного
    розуміння різниці між «але» та «хоча».'
  - 'H3: Аналіз прислів''я. Вступна розповідь навколо фрази «Хоч бачить око, та зуб
    не йме» для ілюстрації концепції бажання всупереч обставинам.'
  - 'H3: Текст для читання. Короткий текст (150 слів) про дебати, де студенти мають
    знайти високочастотні конструкції «хоча б» та «хоча й».'
- section: Граматичні основи та державний стандарт
  words: 1000
  points:
  - 'H3: Що таке допустове речення? Визначення за Державним стандартом (§4.4.3), пояснення
    концепції результату всупереч умові.'
  - 'H3: Сполучники «хоча» та «хоч». Таблиця з 4 прикладами, що демонструє використання
    з дієсловами та прикметниками.'
  - 'H3: Прийменник «незважаючи на». Синтаксичний розбір: використання з іменниками
    (Знахідний відмінок) проти конструкції «незважаючи на те, що» з підрядним реченням.'
  - 'H3: Парні сполучники. Офіційні конструкції «хоча... проте» та «хоча... однак»
    з 3 прикладами для ділового спілкування.'
- section: 'Стилістичні нюанси: попри та дарма що'
  words: 800
  points:
  - 'H3: Сучасний стиль: «попри». Представлення «попри» (+ Знахідний відмінок) як
    динамічної медійної альтернативи. Відпрацювання фраз «попри все», «попри очікування».'
  - 'H3: Літературний регістр: «дарма що». Пояснення архаїчного відтінку (Державний
    стандарт §4.4.3), попередження про уникнення в бізнес-контексті.'
  - 'H3: Поетичний приклад. Аналіз рядка Ліни Костенко «Не бійся правди, хоч яка гірка...»
    як прикладу емфатичного використання.'
  - 'H3: Емоційне підсилення: «хоч би як». Структура речень типу «Хоч би як він старався...»
    для надання емоційної ваги висловлюванню (3 приклади).'
- section: 'Практичний практикум: Робота над помилками'
  words: 800
  points:
  - 'H3: Типова помилка: калька. Візуальна таблиця для викорінення помилки «не дивлячись
    на» при вираженні допусту, заміна на «незважаючи на» / «попри».'
  - 'H3: Орфографія: разом чи окремо? Чітке правило написання: прийменник «незважаючи»
    (разом) проти дієприслівника «не зважаючи» (окремо, ігноруючи), з 4 контрастними
    прикладами.'
  - 'H3: Вибір регістру. Міні-діалог, що демонструє різницю між розмовним «хоч» та
    офіційним «незважаючи на те, що».'
  - 'H3: Трансформація речень. Вправа на перетворення 3 простих протиставних речень
    (з «але») на складні допустові (з «хоча»).'
- section: Культурна інтеграція та дебати
  words: 800
  points:
  - 'H3: Народна мудрість. Обговорення прислів''я «Хоч не з красою, аби з головою»
    (інтелект проти зовнішності) з використанням допустових структур.'
  - 'H3: Риторика дебатів. Шаблон аргументу (200 слів) на соціальну тему, що використовує
    «попри» та «хоча... проте» для роботи з контраргументами.'
  - 'H3: Підсумок модуля. Маркований список усіх маркерів допусту, поділений за регістрами
    (Розмовний, Офіційний, Літературний).'
  - 'H3: Самоперевірка. Чек-лист для студентів для перевірки здатності уникати кальок
    та правильно будувати допустові речення.'
