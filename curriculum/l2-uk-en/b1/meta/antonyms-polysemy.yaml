slug: antonyms-polysemy
title: Антоніми та багатозначність
word_target: 4000
content_outline:
- section: 'Вступ: Мова як система відношень'
  words: 400
  points:
  - Connection to State Standard §4.5.1.1 (lexical semantics and stylistics at B1)
  - 'The network of words: linking synonymy (covered previously) with antonymy (contrast)
    and homonymy (preview)'
  - The role of precision (antonyms) and richness (polysemy) in the Ukrainian lexicon
  - 'Diagnostic intro: evaluating a short text rich in contrasts and metaphors'
- section: 'Антоніми: типи та утворення'
  words: 800
  points:
  - 'Gradual antonyms (градація): scaling concepts like гарячий — теплий — прохолодний
    — холодний'
  - 'Complementary antonyms (доповнювані): binary states with no middle ground (живий
    — мертвий, правда — брехня)'
  - 'Converse antonyms (конверсиви): different perspectives of the same action (купувати
    — продавати, давати — брати)'
  - 'Formation by prefixes: focusing on precise Ukrainian pairs like в-/ви- (входити
    — виходити) and за-/від- (зачиняти — відчиняти)'
  - 'Warning against Russian calques: distinguishing відчиняти (doors) vs відкривати
    (discoveries)'
- section: Антоніми в тексті
  words: 700
  points:
  - Антитеза as a powerful stylistic and rhetorical device
  - 'Literary examples: «Руки в крові, а совість чиста» (contrast in poetry)'
  - 'Antonyms in Ukrainian proverbs: structural contrast in folk wisdom'
  - 'Oxymoron (оксиморон): deliberate contradiction for stylistic effect (гарячий
    сніг, живий труп)'
  - 'Discourse markers for contrast: structuring arguments (з одного боку... з іншого
    боку)'
- section: 'Багатозначність: одне слово — багато значень'
  words: 800
  points:
  - 'Defining polysemy: one word with multiple historically or logically related meanings
    (distinct from homonyms)'
  - 'The classic verb «іти»: іти додому (motion), час іде (time), дощ іде (weather),
    фільм іде (broadcast)'
  - 'The noun «земля»: планета, ґрунт (soil), батьківщина (homeland)'
  - 'The noun «рука»: анатомічна частина, почерк, впливова особа'
  - How context acts as the absolute disambiguator in natural speech
- section: Пряме та переносне значення
  words: 700
  points:
  - 'Пряме значення (direct): the literal, primary definition (золотий перстень)'
  - 'Переносне значення (figurative): metaphorical extensions (золоті руки, золоте
    серце)'
  - 'Метафора (metaphor) in daily life: personification of nature (дощ барабанить,
    вітер виє)'
  - 'Метонімія (metonymy): part for whole or author for work (читати Шевченка, випити
    цілу склянку)'
  - 'Recognizing figurative language in idioms: «мені тепло на душі»'
- section: 'Практика: Антоніми та контекст'
  words: 600
  points:
  - 'Controlled practice text: identify antonym pairs and polysemous words within
    a narrative'
  - 'Task: Form correct antonym chains using Ukrainian prefixes'
  - 'Task: Determine which meaning of a polysemous word (e.g., іти, земля) is active
    in specific sentences'
  - Summary and preview of the next topic (homonyms vs polysemy)
