slug: ukrainian-music-today
title: Українська музика сьогодні
word_target: 4000
content_outline:
  - section: 'Вступ: Музика як м''яка сила (Introduction: Music as Soft Power)'
    words: 500
    points:
      - Обговорення ролі музики як інструменту культурної дипломатії та ідентичності
        (identifying 'soft power').
      - Вживання терміна «гурт» замість росіянізму «група» в контексті музичних колективів.
      - 'Діалог про музичні вподобання: використання активного дієслова «слухати»
        (Active listening) замість «чути».'
  - section: Від Квітки до Євробачення (From Kvitka to Eurovision)
    words: 800
    points:
      - 'Постать Квітки Цісик (Kvitka Cisyk): її роль у збереженні української пісні,
        техніка «білого голосу» та альбоми «Квітка», «Два кольори».'
      - 'Історія тріумфів на Євробаченні: Руслана (2004) та Kalush Orchestra (2022)
        з піснею «Stefania».'
      - Синтез репу та фольклорних мотивів (сопілка) як сучасний тренд української
        естради.
  - section: Сучасна сцена та жанрове різноманіття (Contemporary Scene and Genre Diversity)
    words: 1000
    points:
      - 'Огляд топ-виконавців: Поп (Монатік), Реп (Alyona Alyona), Рок (Океан Ельзи,
        Бумбокс, Антитіла).'
      - 'Електронна та альтернативна музика: Електро-фолк (ONUKA) та етно-хаос (ДахаБраха).'
      - 'Утворення назв осіб за діяльністю (Держстандарт): від дієслова «співати»
        до іменника «співак/співачка».'
  - section: 'Символи незламності: Пісні про війну (Symbols of Resilience: Songs of
      War)'
    words: 800
    points:
      - Історія гімну Січових Стрільців (1914) «Ой у лузі червона калина» та її нове
        життя після виконання Андрієм Хливнюком у 2022 році.
      - Роль музики у підтримці духу армії та благодійні концерти як засіб збору коштів.
      - Аналіз тексту пісень, що стали символами опору, та їхнього впливу на світову
        спільноту.
  - section: 'Граматична майстерня: Граємо та слухаємо (Grammar Workshop: Playing
      and Listening)'
    words: 700
    points:
      - 'Керування дієслів: розрізнення конструкцій «грати на гітарі» (Locative case
        для інструментів) та «грати в футбол» (Accusative case для ігор).'
      - 'Узгодження роду іменників: типові помилки «мій пісня» → «моя пісня» (Feminine)
        та «ця альбом» → «цей альбом» (Masculine).'
      - 'Лексичні колоквіації: очолити хіт-парад, лідер гурту, видатний виконавець.'
  - section: 'Підсумок: Культурне дозвілля (Summary: Cultural Leisure)'
    words: 200
    points:
      - Обговорення способів проведення вільного часу (філармонія, фестивалі) згідно
        з Держстандартом §3.4.
      - 'Рефлексія: порівняння української музичної сцени з культурою країни студента.'
