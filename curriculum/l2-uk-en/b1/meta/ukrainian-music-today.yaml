slug: ukrainian-music-today
title: Українська музика сьогодні
word_target: 4000
content_outline:
- section: 'Вступ: Музика як м''яка сила'
  words: 500
  points:
  - Сформулювати концепцію 'м'якої сили' (soft power) на прикладі сучасної української
    музики.
  - 'Ввести лексичну різницю: вживання слова ''гурт'' для музичних колективів замість
    кальки ''група''.'
  - 'Представити міні-діалог про музичні смаки: пояснити різницю між активним процесом
    (''слухати музику'') та пасивним сприйняттям (''чути музику'').'
- section: Від Квітки до Євробачення
  words: 800
  points:
  - 'Розповісти історію Квітки Цісик: її внесок у збереження фольклору в діаспорі
    та унікальну техніку ''білого голосу'' (альбоми ''Квітка'', ''Два кольори'').'
  - 'Зробити хронологічний огляд тріумфів на Євробаченні: Руслана (2004) та Kalush
    Orchestra (2022).'
  - Проаналізувати тренд поєднання хіп-хопу/репу з автентичними інструментами (сопілка)
    як сучасну візитну картку України.
- section: Сучасна сцена та жанрове різноманіття
  words: 1000
  points:
  - 'Зробити огляд ключових виконавців: поп (Монатік), реп (Alyona Alyona), рок (Океан
    Ельзи, Бумбокс, Антитіла).'
  - Описати феномен 'етно-хаосу' (ДахаБраха) та електро-фолку (ONUKA) як унікальних
    експортних форматів.
  - 'Пояснити механізм утворення назв осіб за діяльністю: від дієслова ''співати''
    до ''співак/співачка'', від ''виконувати'' до ''виконавець''.'
- section: 'Символи незламності: Пісні про війну'
  words: 800
  points:
  - Розказати історію стрілецької пісні 'Ой у лузі червона калина' та її глобальне
    відродження у 2022 році завдяки Андрію Хливнюку.
  - 'Описати феномен музикантів-волонтерів: благодійні тури та культурна дипломатія
    під час повномасштабного вторгнення.'
  - Навести цитати з сучасних пісень спротиву та показати їхню функцію у підтримці
    морального духу нації.
- section: 'Граматична майстерня: Граємо та слухаємо'
  words: 700
  points:
  - 'Створити наочну таблицю для керування дієслів: ''грати на'' + Місцевий відмінок
    (на гітарі, на піаніно) для музичних інструментів.'
  - Протиставити з конструкцією 'грати в' + Знахідний відмінок (в теніс, у футбол)
    для спортивних ігор.
  - 'Надати практичні приклади узгодження роду іменників з прикметниками: ''цей альбом''
    (ч.р.), ''моя пісня'' (ж.р.).'
- section: 'Підсумок: Культурне дозвілля'
  words: 200
  points:
  - Узагальнити лексику щодо вільного часу (концерт, філармонія, фестиваль) з посиланням
    на тематику Держстандарту.
  - 'Запропонувати відкриті питання для рефлексії: порівняння української музичної
    сцени з музичною культурою країни студента.'
