slug: reading-grammar-rules
title: Читаємо граматичні правила
word_target: 4000
content_outline:
- section: 'Вступ: Читаємо граматику українською'
  words: 250
  points:
  - 'Why understanding instruction patterns matters (State Standard §3.8 alignment):
    navigating the educational process.'
  - 'English Scaffolding: Explicitly explain that from now on, grammar will be taught
    IN Ukrainian.'
  - 'The ''Textbook Look'': identifying bold terms, italics, and standard layouts.'
- section: Моделі граматичних пояснень
  words: 450
  points:
  - 'Pattern 1: Definition (''X — це...'').'
  - 'Pattern 2: Usage (''X використовується, коли...''). Collocations: *часто*, *зазвичай*.'
  - 'Pattern 3: Function (''X показує...'', ''X означає...'').'
  - 'Visualizing the rule: how arrows and bold text signal these patterns.'
- section: Слова-інструкції
  words: 350
  points:
  - 'Attention getters: ''Зверніть увагу'', ''Запам''ятайте''.'
  - 'Comparison commands: ''Порівняйте'', ''На відміну від''.'
  - 'Logical connectors in instructions: ''Наприклад'' (examples), ''Тобто'' (clarification),
    ''Отже'' (conclusion).'
- section: Моделі порівняння
  words: 350
  points:
  - 'Contrast: ''На відміну від...'' (Unlike...). Collocation: *суттєва відмінність*.'
  - 'Similarity: ''Подібно до...'', ''Так само, як...''.'
  - 'Analogy: ''Як і в англійській мові...'' (As in English...).'
- section: Дієслова в інструкціях до вправ
  words: 400
  points:
  - 'Action verbs: ''Виберіть'' (Choose), ''Знайдіть'' (Find), ''З''єднайте'' (Match).'
  - 'Production verbs: ''Перекладіть'' (Translate), ''Складіть'' (Compose/Make up),
    ''Доповніть'' (Complete).'
  - 'Digital actions (for apps/online): ''Натисніть'' (Click/Press), ''Введіть'' (Enter).'
  - 'Decoding the task: identifying the verb is 80% of success.'
- section: Аналітичні терміни
  words: 400
  points:
  - 'Context and usage: ''Контекст'', ''Ситуація'', ''Маркер''.'
  - 'Frequency terms: ''Частота'', ''Рідко'', ''Завжди''.'
  - 'Aspectual relations: ''Аспектуальна пара'' (Aspectual pair) — how textbooks link
    imperfective/perfective.'
  - 'Common error warning: ''Брати участь'' vs ''Приймати участь''.'
- section: Термінологія стилю та регістру
  words: 450
  points:
  - 'Register distinction (State Standard §4.5.1): ''Стиль'' (Style), ''Регістр''
    (Register).'
  - 'Types of language: ''Розмовна мова'' (Colloquial), ''Літературна мова'' (Literary/Standard),
    ''Формальна мова'' (Formal).'
  - 'Cultural Hook: Ivan Ohiienko and the standard language.'
- section: Терміни словотвору
  words: 400
  points:
  - 'Building blocks: ''Корінь'' (Root), ''Префікс'' (Prefix), ''Суфікс'' (Suffix).'
  - 'Cultural Hook: Meletius Smotrytsky and the codification of grammar.'
  - 'Structural terms: ''Основа'' (Stem), ''Закінчення'' (Ending).'
  - 'Instruction nuance: ''Утворіть'' (Form morphologically) vs ''Зробіть'' (Do general
    task).'
- section: Практика
  words: 350
  points:
  - Decoding authentic grammar explanations (reading snippets).
  - Matching instruction verbs to task types.
  - Identifying registers in sample texts.
- section: Діалоги
  words: 400
  points:
  - 'Dialogue 1: Teacher explaining a rule to a student (using ''використовується'').'
  - 'Dialogue 2: Students comparing answers (using ''порівняйте'', ''на відміну від'').'
  - 'Dialogue 3: Discussing mistakes (using ''виняток'', ''контекст'').'
  - 'Dialogue 4: Reading a textbook together (decoding symbols).'
  - 'Dialogue 5: Formal vs. Informal phrasing discussion.'
  - 'Dialogue 6: Computer lab instructions (digital verbs).'
- section: Підсумок
  words: 200
  points:
  - Recap of key instruction verbs.
  - 'Readiness check: Can you read the instruction for the next module?'
  - 'Transition to B1.1: Full immersion ahead.'
