slug: discourse-markers-advanced
title: 'Дискурсивні маркери II: складна організація'
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - Представити тему складної організації тексту та вставних слів (відповідно до §4.4.2
    Державного стандарту).
  - 'Ввести культурний контекст: традиції риторики Києво-Могилянської академії (Феофан
    Прокопович, Григорій Сковорода) та козацької ради як приклад важливості логічної
    аргументації.'
  - Сформувати персону 'Keynote Speaker' (Доповідач), використовуючи відповідний публічний
    регістр.
- section: Презентація лексики
  words: 1000
  points:
  - 'Згрупувати 25+ дискурсивних маркерів за 6 категоріями: Послідовність (по-перше),
    Додавання (крім того), Контраст (проте), Уточнення (загалом), Результат (таким
    чином), Підсумок (отже, нарешті).'
  - Пояснити обов'язкову парність маркерів 'з одного боку... з іншого боку' за допомогою
    наочних прикладів.
  - Створити схему-алгоритм (Mermaid flowchart) для вибору маркера залежно від комунікативного
    наміру (додавання, контраст чи висновок).
  - Навести таблицю типових сталих словосполучень (напр., 'по-перше, хочу зазначити',
    'підсумовуючи вищесказане').
- section: Граматика та вживання
  words: 1000
  points:
  - Чітко розмежувати формальний/академічний регістр (отже, таким чином) та розмовний
    (словом, до речі).
  - 'Детально розібрати правила пунктуації при вставних словах (обов''язкове виділення
    комами: ''По-перше, ...'').'
  - 'Рубрика ''Антисуржик'': заміна кальок ''во-пєрвих'' на ''по-перше'' та ''короче''
    на ''словом'' або ''загалом''.'
  - Проаналізувати різницю між часовим 'нарешті' та просторовим 'накінець', щоб уникнути
    поширених помилок.
- section: Аналіз та читання
  words: 1000
  points:
  - Надати текст статті 'Як перемогти в дебатах' або фрагмент виступу на конференції
    з використанням маркерів авторитетності ('шановне товариство', 'дозвольте зауважити').
  - 'Провести аналіз тексту: як дискурсивні маркери перетворюють набір простих речень
    на переконливий і структурований аргумент.'
  - Продемонструвати перехід від базових сполучників B1 до складних структур організації.
- section: Практика та підсумок
  words: 500
  points:
  - 'Запропонувати комунікативне завдання: побудова структурованого аргументу від
    імені ''Keynote Speaker'' з використанням вивчених маркерів.'
  - 'Провести міні-воркшоп із самокорекції: пошук помилок у регістрах, пропущених
    ком та розірваних парах у наданих зразках тексту.'
  - Підбити підсумки та зробити плавний логічний перехід до наступної теми (b1-58
    'Describing Changes').
