slug: emotional-intelligence
title: Емоційний інтелект та міжособистісні навички
word_target: 4000
content_outline:
- section: 'Вступ: Що таке емоційний інтелект?'
  words: 500
  points:
  - Provide a clear definition of EQ in Ukrainian, detailing its main components.
    Introduce core collocations (розвивати емоційний інтелект, високий/низький рівень
    EQ) with contextual examples.
  - Introduce the cultural hook of 'Кордоцентризм' (Philosophy of the Heart) and Hryhorii
    Skovoroda. Explain why the heart (серце) is viewed as the center of emotion and
    cognition in Ukrainian culture.
- section: 'Емпатія та співчуття: Розуміння серцем'
  words: 800
  points:
  - Differentiate 'емпатія' (sharing emotions, feeling with) and 'співчуття' (compassion,
    feeling for) through a comparison table and situational examples.
  - Present 4-5 Ukrainian idioms about the heart (брати до серця, від щирого серця,
    серце не на місці) with examples showing them in daily emotional contexts.
  - Analyze the proverb 'Поділена радість — подвійна, а поділене горе — вдвічі менше'
    and provide phrases for expressing shared emotions.
- section: Підтримка та турбота в міжособистісних навичках
  words: 700
  points:
  - Teach phrases to express care and concern based on the State Standard (виражати
    надію, турботу і занепокоєння). Give examples using 'сподіваюся', 'бережи себе',
    and 'виражати глибоке занепокоєння'.
  - Provide a structured guide on offering moral support delicately (надавати моральну
    підтримку, шукати взаємну підтримку) using the Conflict Mediator tone.
- section: Культура вибачення та подолання конфліктів
  words: 800
  points:
  - Correct the common learner error of using the reflexive 'я вибачаюся'. Teach the
    correct forms 'я перепрошую' and 'прошу вибачення' with appropriate register contexts.
  - Address the lexical calque 'приносити вибачення' and contrast it with the natural
    Ukrainian 'просити вибачення' and 'приймати вибачення'.
  - Introduce the proverb 'Добрий чоловік — надійніше кам’яного мосту' as a bridge
    to teaching reconciliation (примирення) vocabulary and restoring trust.
- section: 'Діалоги: Підтримка та делікатні розмови'
  words: 600
  points:
  - 'Present two mini-dialogues featuring a ''Conflict Mediator'' tone: one supporting
    a friend in distress and one resolving a misunderstanding. Use modal hedging.'
  - Highlight vocabulary for active listening (активне слухання) within the dialogues,
    showing how to engage naturally without interrupting.
- section: Саморефлексія та підсумок
  words: 600
  points:
  - Introduce vocabulary for self-reflection (саморефлексія) and giving/receiving
    feedback (зворотний зв’язок) to prepare learners for advanced modules.
  - Provide a summary of the module's key concepts and a mini-checkpoint checklist
    for B1.5-B1.6 vocabulary self-evaluation.
