slug: complex-sentence-integration
title: Інтеграція складних речень
word_target: 4000
content_outline:
- section: Діагностика та вступ
  words: 600
  points:
  - 'Діагностичне тестування: порівняння текстів із простих речень та майстерно побудованих
    складних речень для виявлення стилістичної різниці.'
  - 'Вправа на розрізнення регістрів: аналіз вживання сполучників «бо» (розмовний)
    та «тому що» (офіційний/нейтральний) у сучасних діалогах.'
- section: Граматичні основи та типи зв'язку
  words: 1000
  points:
  - Огляд типів складносурядних речень (єднальні, протиставні, розділові) та складнопідрядних
    речень згідно з Державним стандартом §4.4.3.
  - 'Аналіз типової помилки англомовних студентів: плутанина між сполучниками «і»
    (додавання) та «а» (протиставлення/зіставлення).'
  - 'Класифікація підрядних частин з прикладами: причини (тому що, бо), умови (якщо),
    мети (щоб) та допустові (хоча/хоч).'
- section: Культура, ритм та пунктуація
  words: 800
  points:
  - 'Культурний контекст: «Правило трьох» в українських народних казках та літературі
    як модель для органічної побудови багатокомпонентних речень.'
  - 'Поняття мелодійного синтаксису: як уникнути «стакато» (забагато коротких речень)
    та створити плинність тексту за допомогою сполучників.'
  - 'Суворі правила пунктуації: пояснення структурної ролі коми перед «що», «який»,
    «коли», «щоб» та розбір типових помилок.'
- section: Практичне застосування та стилістика
  words: 900
  points:
  - 'Архітектура складних структур: покрокова інструкція поєднання сурядності та підрядності
    в одному багатокомпонентному реченні.'
  - 'Усунення помилок узгодження: як правильно відмінювати відносний займенник «який»
    залежно від роду та відмінка замість зловживання незмінним «що».'
  - 'Стилістичні правки: усвідомлений вибір між короткими та довгими реченнями для
    досягнення необхідного динамічного ефекту в тексті.'
- section: Творча майстерня редактора
  words: 700
  points:
  - 'Рольова гра «Редактор роману»: практичне редагування сухого тексту для покращення
    його стилю та чіткості викладу думок через об''єднання речень.'
  - 'Сценарії багаторівневого діалогу: вибір відповідних конекторів залежно від соціального
    контексту (формальний лист vs. повідомлення в месенджері).'
  - 'Підсумковий огляд: фінальне закріплення навичок інтеграції складних речень у
    живе мовлення.'
