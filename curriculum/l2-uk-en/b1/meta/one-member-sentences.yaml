slug: one-member-sentences
title: Односкладні речення
word_target: 4000
content_outline:
- section: 'Вступ: Навіщо речення без підмета?'
  words: 600
  points:
  - Explicitly define 'односкладні речення' using 100% Ukrainian metalanguage.
  - 'Introduce the cultural hook: Ukrainian''s preference for experiencer-focused
    and impersonal expression, contrasting it structurally with dummy-subject languages.'
  - List the 4 types of one-member sentences with a summary table and one clear example
    for each.
  - Include a callout explaining that mastering these sentence types makes speech
    sound authentically Ukrainian.
- section: Означено-особові речення
  words: 700
  points:
  - 'Define definite-personal sentences: the subject is omitted but clearly implied
    by the 1st or 2nd person verb ending.'
  - Provide an H3 section for Present/Future tenses with examples showing verb endings
    taking the role of the subject.
  - Provide an H3 section for the Imperative mood, noting its frequency in everyday
    speech ('Читай!', 'Ходімо!').
  - Include a 'Common Error' tip box warning learners against overusing personal pronouns
    ('Я іду' vs 'Іду').
- section: Неозначено-особові речення
  words: 700
  points:
  - 'Define indefinite-personal sentences: 3rd person plural verbs where the agent
    is unknown or deliberately irrelevant.'
  - Provide an H3 for usage in news style, rumors, and general truths/proverbs ('Кажуть,
    що...', 'Передають...').
  - Create a table contrasting this structure with passive constructions.
  - Add an engagement box discussing when speakers use this to intentionally obscure
    the actor.
- section: Безособові речення
  words: 800
  points:
  - Define impersonal sentences as the most productive type, highlighting the total
    absence of a grammatical subject.
  - Provide an H3 for physical/emotional states and weather ('Холодно', 'Мені сумно')
    with a strict rule against using 'воно'.
  - Provide an H3 for modal verb constructions ('Треба працювати', 'Можна увійти').
  - Provide an H3 for predicate forms ending in -но/-то ('Написано', 'Зроблено').
  - Include an error-correction tip focusing on the Dative experiencer.
- section: Називні речення
  words: 600
  points:
  - 'Define nominal sentences: noun or noun phrase in the nominative case with zero
    verb.'
  - 'Provide an H3 for media usage: dynamic news headlines (''Нові санкції'', ''Рекордний
    урожай'').'
  - 'Provide an H3 for artistic/literary usage: scene setting and stage directions
    (''Ніч. Тиша. Місяць.'').'
  - Include a mini-dialogue or short atmospheric text showing how nominal sentences
    build dramatic tension.
- section: 'Практика: Від двоскладних до односкладних'
  words: 700
  points:
  - Provide a step-by-step flowchart/decision tree (Mermaid diagram) for identifying
    the type of a one-member sentence.
  - Include narrative transformation examples converting clunky two-member sentences
    into natural one-member formats.
  - Provide a reading comprehension excerpt (e.g., a weather report or news bulletin)
    analyzing the sentence types used within it.
  - Conclude with a comprehensive summary table of all 4 types and their primary stylistic
    registers.
