slug: motion-patterns-other-verbs
title: Префікси руху в інших дієсловах
word_target: 4000
content_outline:
- section: Тест
  words: 400
  points:
  - Вступне діагностичне тестування (на основі модуля b1-22) для перевірки розуміння
    просторової логіки префіксів руху.
  - Завдання на інтуїтивне декодування значення невідомих абстрактних дієслів (заспівати,
    відслужити) через їхні префікси.
- section: Пояснення
  words: 1600
  points:
  - 'Введення концепції ''Атомарного аналізу'': розбір дієслова на префікс та основу
    для виведення значення (ПЕРЕ- + ПИСАТИ).'
  - 'ПЕРЕ-: Аналіз значення подолання, зміни та повторності (переробити, переписати).
    Інтеграція культурного гачка (прислів''я ''Життя прожити...'').'
  - 'ЗА-: Розбір двох функцій: фіксація інформації (записати) та раптовий початок
    дії (заговорити). Використання культурного гачка (''Засвіт встали козаченьки'').'
  - 'ВИ-: Пояснення логіки вичерпності дії та досягнення результату (вивчити, випрацювати).'
  - 'ВІД-: Семантика реакції та повернення у спілкуванні/взаємодії (відповісти, відмовитися).'
  - 'ПІД- та ПРИ-: Логіка наближення, підтримки та приєднання в соціальних чи професійних
    контекстах (підійти до вирішення, приєднатися).'
- section: Практика
  words: 800
  points:
  - 'Теоретико-практичний блок ''Розрізаємо на атоми'': пояснення семантичного внеску
    префікса у відриві від кореня з наочними прикладами.'
  - 'Розбір типових лексичних помилок: контраст між ''написати'' (завершений результат)
    та ''записати'' (фіксація даних).'
  - 'Опрацювання полісемії: паралельне порівняння префікса у фізичному русі (перейти
    вулицю) та в абстрактній дії (переробити план).'
- section: Діалоги
  words: 900
  points:
  - 'Діалог 1 (Співбесіда): Використання ВИ- (виконали, вивчили) та ПІД- (підійшли)
    у формальному професійному спілкуванні з коментарем щодо регістру.'
  - 'Діалог 2 (Ремонт): Побутовий контекст із фокусом на ПЕРЕ- (перефарбувати) та
    З- (з’єднати) для опису змін і модифікацій.'
  - 'Діалог 3 (Емоційна розмова): Контрастне використання префіксів РОЗ- (руйнування,
    віддалення: розійтися, розізлитися) та З- (зближення).'
- section: Потрібно більше практики?
  words: 300
  points:
  - 'Формування підсумкової ментальної карти: зведення всіх абстрактних префіксів
    та їхніх просторових коренів.'
  - 'Творче письмове завдання: інструкція до написання звіту про професійні досягнення
    з обов''язковим використанням префіксів ВИ-, ПІД- та ЗА-.'
