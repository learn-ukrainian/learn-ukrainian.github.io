slug: purpose-shchob-past-form
title: 'Підрядні речення мети: щоб + минула форма'
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Забезпечити 100% українськомовне занурення: жодних англійських пояснень у тексті,
    лише в таблиці словника.'
  - 'Вступне слово про постановку цілей: як ми висловлюємо бажання, коли дія стосується
    іншої людини.'
  - Використання приказки «Щоб рибу їсти, треба у воду лізти» для переходу від конструкцій
    з інфінітивом до нових структур.
  - 'Концептуальний гачок: елегантність української мови у використанні підрядних
    речень замість прямого додатка з інфінітивом (контраст із прихованим англійським
    ''I want you to...'').'
- section: Граматична презентація
  words: 1000
  points:
  - 'Створення чіткої порівняльної таблиці: «Однойменний суб''єкт» (щоб + інфінітив)
    проти «Різнойменні суб''єкти» (щоб + минулий час) з трьома парами яскравих прикладів.'
  - 'Пояснення формули: Головне речення (суб''єкт 1) + щоб + підрядне речення (суб''єкт
    2) + дієслово в минулому часі. Делікатна згадка про умовний спосіб.'
  - Аналіз ключових дієслів волевиявлення (хотіти, просити, вимагати, радити, бажати,
    чекати) з прикладами в контексті.
  - 'Правило узгодження: наголосити, що дієслово в підрядному реченні завжди узгоджується
    в роді та числі з НОВИМ підметом.'
  - 'Блок [!analysis]: як змінюється зміст при використанні доконаного та недоконаного
    виду («хочу, щоб ти робив» — процес vs «хочу, щоб ти зробив» — результат).'
- section: Типові помилки та контраст
  words: 900
  points:
  - 'Подолання інтерференції: детальне пояснення, чому не можна перекладати дослівно
    структуру ''I want you to go''. Розбір правильної структури «щоб + минулий час».'
  - 'Проблема узгодження: візуальний акцент на помилках (наприклад, коли чоловік говорить
    про жінку: «Він хоче, щоб я написала...», а не «написав»).'
  - 'Керування дієслів: пояснення відмінків після головних дієслів («хотіти» + родовий
    відмінок для абстрактних понять; «чекати на» + знахідний відмінок).'
  - 'Блок [!warning]: наголосити, що минулий час у цій конструкції не означає дію
    в минулому, а є вимогою синтаксичної структури.'
- section: Культурний контекст та діалоги
  words: 1100
  points:
  - 'Культурний аспект (міні-текст на 150 слів): аналіз фрази «Батьки працюють, щоб
    діти мали краще майбутнє» як відображення українських цінностей та підтримки між
    поколіннями.'
  - 'Діалог 1 (На роботі): формальне спілкування між директором та підлеглим із використанням
    «вимагати» та «радити» (мінімум 8 реплік).'
  - 'Діалог 2 (У лікаря): поради фахівця щодо здоров''я, використання конструкцій
    на кшталт «лікар радить, щоб пацієнт дотримувався режиму» (6-8 реплік).'
  - 'Діалог 3 (Планування): дружня розмова про спільну подорож із вживанням приказки
    «Під лежачий камінь вода не тече» для мотивації до дії.'
- section: Практика та підсумок
  words: 500
  points:
  - 5 контекстних речень для самостійного аналізу (підготовка до вправ на переклад
    зі зміною суб'єкта).
  - 'Чек-лист для самоперевірки: 1) Чи різні люди виконують дії? 2) Чи є сполучник
    «щоб»? 3) Чи стоїть друге дієслово в минулому часі? 4) Чи правильне узгодження
    роду?'
  - Короткий підсумок та логічний місток до наступної теми (умовний спосіб та сполучники
    якщо/якби).
