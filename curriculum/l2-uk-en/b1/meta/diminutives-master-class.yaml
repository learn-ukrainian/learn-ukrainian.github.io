slug: diminutives-master-class
title: 'Демінутиви: майстер-клас'
word_target: 4000
content_outline:
- section: 'Вступ: Світ українських демінутивів'
  words: 500
  points:
  - Create an H3 section introducing diminutives as a powerful stylistic tool for
    expressing emotion, intimacy, and empathy.
  - Create an H3 section explaining the cultural concept of 'cordocentrism' (кордоцентризм)
    and how it drives the high frequency of diminutives in adult speech.
  - Create an H3 section highlighting the unique Ukrainian feature of forming diminutives
    from verbs (спатоньки) and adverbs (швиденько).
  - Include a [!cultural] box about Hryhorii Skovoroda and the 'philosophy of the
    heart' to anchor the lesson.
- section: 'Морфологія: Від іменників до дієслів'
  words: 1000
  points:
  - Create an H3 section for productive noun suffixes (-ик, -ок, -ець) with a paradigm
    table and contextual examples.
  - Create an H3 section for emotive noun suffixes (-очок, -ечк-, -оньк-) showing
    progression of affection (e.g., син -> синок -> синочок).
  - Create an H3 section for adjective diminutives (-еньк-), demonstrating their function
    as intensifiers (гарний vs. гарненький).
  - Create an H3 section for verb and adverb diminutives (їстоньки, тихесенько), explaining
    their grammatical boundaries and social usage.
  - Include a [!warning] box analyzing the common learner error of tautology (e.g.,
    'маленький килимок').
- section: Прагматика та соціальні регістри
  words: 1000
  points:
  - Create an H3 section decoding the 'hospital register', showing how medical staff
    use diminutives (укольчик, ручка) to reduce patient anxiety.
  - Create an H3 section on desemanticization, providing a table of words that have
    lost their diminutive meaning and become neutral nouns (ручка, ніжка).
  - Create an H3 section analyzing social pitfalls and register mismatches (e.g.,
    using 'документики' in a formal setting).
  - Include a mini-dialogue contrasting appropriate and inappropriate diminutive use
    in a professional context.
  - Add a [!note] box distinguishing sincere politeness from infantilizing 'over-sweetening'.
- section: Культурний код та іронія
  words: 1000
  points:
  - Create an H3 section exploring the ironic dimension, showing how diminutives combined
    with specific intonation signal sarcasm (e.g., 'Ну ти й розумничок!').
  - Create an H3 section on 'service industry diminutives', examining modern urban
    coffee culture (кавуся, хлібчик, рахуночок).
  - Create an H3 section outlining the 'Hierarchy of Endearment' in family terms (мати
    -> матуся -> матусенька -> матінка).
  - Include a [!perspective] box on how diminutives shape the lyricism and tenderness
    (ніжність) of Ukrainian folk songs and poetry.
- section: 'Підсумок: Мистецтво доречності'
  words: 500
  points:
  - Create an H3 section providing a 'Who-Where-Why' decision matrix or flowchart
    for deploying diminutives safely.
  - Create an H3 section summarizing the rules for distinguishing marketing/service
    use from genuine personal affection.
  - Include a final motivating [!tip] on integrating diminutives to achieve an authentic,
    natural-sounding B1 Ukrainian proficiency.
