slug: adverbial-participles-perfective
title: Дієприслівники доконаного виду
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - Представити дієприслівник доконаного виду як ефективний інструмент для побудови
    'простого ускладненого речення' (згідно з Державним стандартом §4.4.2).
  - 'Пояснити ключову функцію попередності (completed priority): дія, яка повністю
    завершилася ДО початку головної дії в наративі.'
  - Проаналізувати прислів'я «Далеко сховавши, близько не знайдеш», щоб наочно проілюструвати
    логіку завершеної дії та її невідворотних наслідків.
- section: 'Граматика: Формування та значення'
  words: 900
  points:
  - 'Деталізувати морфологічні правила додавання суфіксів до основи минулого часу:
    -вши (для основи на голосний, напр., прочита-вши) та -ши (для основи на приголосний,
    напр., приніс-ши).'
  - Підкреслити абсолютне домінування суфікса -вши у високочастотних дієсловах.
  - 'Візуалізувати часову послідовність дій (timeline): ''завершена крапка'' (доконаний
    вид) перед головною дією, на противагу ''одночасній лінії'' (недоконаний вид,
    вивчений у модулі b1-42).'
  - Навести структуровану таблицю прикладів творення від різних типів дієслів доконаного
    виду.
- section: Аналіз помилок та обмеження
  words: 1000
  points:
  - 'Детально розібрати помилку ''відірваний дієприслівник'' (Subject Mismatch): пояснити,
    чому речення «Прийшовши додому, почався дощ» є грубою помилкою, та закріпити правило
    єдиного підмета.'
  - 'Проаналізувати ''пастку безособових речень'': заборону використання зворотів
    з логічним підметом у давальному відмінку (неправильно: «мені стало сумно»), та
    надати правильні моделі висловлювання («я засмутився»).'
  - Забезпечити контрастивні приклади або міні-діалоги для чіткого розрізнення суфіксів
    -ючи (одночасна дія) та -вши (попередня завершена дія).
- section: Лексика та культурний контекст
  words: 1000
  points:
  - 'Заглибитися у використання шести високочастотних дієприслівників: прочитавши,
    написавши, зробивши, прийшовши, побачивши, дізнавшись.'
  - Продемонструвати їх функціонування у сталих виразах та наративних якорях (наприклад,
    «зробивши глибокий вдих», «прийшовши до тями»).
  - 'Інтегрувати глибокий аналіз мотиваційних прислів''їв: «Сівши, не поїдеш» та «Не
    розмовившись з головою, до чогось іншого не важся» як моделей української народної
    обережності та рішучості.'
  - Навести автентичні приклади з сучасних медіа або літератури, де ці форми структурують
    послідовність подій.
- section: Практичне застосування та підсумок
  words: 600
  points:
  - 'Запропонувати наративне завдання: продемонструвати трансформацію серії простих,
    ''рублених'' речень у плавний, зв''язний абзац за допомогою дієприслівникових
    зворотів.'
  - Підкреслити стилістичну елегантність і дорослість такого тексту для мовців рівня
    B1.
  - 'Зробити фінальне узагальнення алгоритму творення: знайти основу минулого часу
    -> ідентифікувати останній звук -> додати правильний суфікс.'
