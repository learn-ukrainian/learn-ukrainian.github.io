slug: ukrainski-sviata-ta-festyvali
title: Українські свята та фестивалі
word_target: 4000
content_outline:
- section: 'Вступ: Українські свята та календарна реформа'
  words: 500
  points:
  - 'H3: Поняття свята. Розмежування державних, релігійних та сімейних свят із наведенням
    типових прикладів.'
  - 'H3: Календарна реформа 2023 року. Пояснення переходу на новоюліанський календар
    (Різдво 25 грудня) як акту свідомого культурного вибору та розриву з російським
    імперським впливом.'
- section: 'Зимовий та весняний цикли: Різдво та Великдень'
  words: 1000
  points:
  - 'H3: Різдво та Дідух. Пояснення символіки Дідуха (дух предків, хліборобські корені)
    як автентичної української традиції на противагу радянській ялинці.'
  - 'H3: Вертеп. Опис театралізованого дійства, його персонажів та ролі в сучасному
    суспільстві.'
  - 'H3: Кулінарний код (зв''язок з B1-85). Значення куті на Святий Вечір та процес
    випікання паски на Великдень.'
  - 'H3: Великодні традиції. Символіка писанок (як мистецтва) та крашанок, обряд освячення
    великоднього кошика.'
  - 'H3: Традиційні вітання. Таблиця специфічних вітань-відповідей: «Христос народився!
    — Славімо Його!» та «Христос Воскрес! — Воістину Воскрес!».'
- section: 'Народна обрядовість: Маланка та Івана Купала'
  words: 800
  points:
  - 'H3: Маланка (Щедрий вечір). Опис яскравого народного карнавалу, костюмованих
    персонажів (Коза, Маланка, Василь) та традиції щедрування.'
  - 'H3: Івана Купала. Літній цикл, магічні обряди з плетінням вінків, стрибками через
    вогонь та єднанням з природою.'
  - 'H3: Збереження ідентичності. Роль цих дохристиянських традицій у сучасному культурному
    спротиві та їх популярність серед молоді.'
- section: 'Сучасна Україна: Державні свята та масштабні фестивалі'
  words: 900
  points:
  - 'H3: День Незалежності України. Еволюція свята від формальних парадів до глибокого
    усвідомлення ціни свободи в умовах сучасності.'
  - 'H3: Фестивальна культура. Огляд сучасних заходів (наприклад, Atlas Festival у
    Києві, Одеський міжнародний кінофестиваль) як частини глобального контексту.'
  - 'H3: Організація фестивалів (STEM-ready). Короткий огляд культурного менеджменту,
    інфраструктури та логістики масштабних подій в Україні.'
- section: 'Мовна практика: Етикет вітань та запобігання помилкам'
  words: 800
  points:
  - 'H3: Граматика вітань (Орудний відмінок). Пояснення правила використання орудного
    відмінка після прийменників з/зі (З Новим роком!, Зі святом!). Надання чіткої
    таблиці закінчень.'
  - 'H3: Аналіз типових помилок. Корекція частої помилки «Вітаю з свято!» (Називний)
    -> «Вітаю зі святом!» (Орудний).'
  - 'H3: Святкові кліше. Приклади побажань для листівок («Бажаю успіхів...», «Нехай
    збуваються мрії...») та пояснення використання Родового відмінка після дієслова
    «бажати».'
- section: 'Міні-чекпоінт: Культура B1.7'
  words: 0
  points:
  - 'H3: Самооцінка. Інтерактивний блок для перевірки загальних знань про сучасну
    Україну (за матеріалами модулів M72-86).'
  - 'H3: Культурний тест. Коротке тестування на знання традицій, регіональних особливостей
    та сучасної української культури.'
- section: Потрібно більше практики?
  words: 0
  points:
  - 'H3: Рекомендовані матеріали. Пропозиції для додаткового читання про регіональні
    фестивалі (наприклад, Львівський фестиваль кави, свято вина на Закарпатті).'
