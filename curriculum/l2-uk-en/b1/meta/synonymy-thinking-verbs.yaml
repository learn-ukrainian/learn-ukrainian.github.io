slug: synonymy-thinking-verbs
title: 'Синонімія I: Дієслова мислення'
word_target: 4000
content_outline:
- section: 'Вступ: Я мислю, отже я існую'
  words: 700
  points:
  - Introduce the philosophical concept of thinking via René Descartes («Я мислю,
    отже я існую») and establish the verb 'мислити'.
  - Explain why precision in 'thinking verbs' is crucial for expressing character
    traits and personal views, aligning with State Standard §3.1 'Людина'.
  - 'Categorize verbs into three functional tiers: cognitive processes (міркувати),
    expressing opinions (вважати), and states of understanding (розуміти).'
  - Ensure 100% Ukrainian immersion. All concepts must be defined clearly before appearing
    in examples.
- section: 'Словник думок: Від «думати» до «вважати»'
  words: 900
  points:
  - 'Deep dive into ''думати'': contrast ''думати про'' (general subject) with ''думати
    над'' (problem-solving) using a comparative table.'
  - 'Analyze ''вважати'': highlight its role in formal discussions and personal stances
    (e.g., ''я вважаю, що...'', ''вважати за потрібне'').'
  - 'Explore ''гадати'' (to suppose): introduce its use in suppositions and idiomatic
    expressions like ''не довго думаючи й гадаючи''.'
  - 'Explain ''міркувати'': present it as a deliberate, logical process, providing
    collocations like ''міркувати вголос'' and ''міркувати логічно''.'
- section: 'Аналіз помилок: Рахувати чи вважати?'
  words: 800
  points:
  - Address the common Russified calque 'Я рахую, що...'. Explicitly teach that 'рахувати'
    is strictly for mathematics/money, while 'вважати' is for opinions.
  - 'Disambiguate ''гадати'' vs. ''ворожити'': clarify that ''гадати'' is a mental
    supposition, not fortune-telling (e.g., ''ворожка ворожила'').'
  - Provide a diagnostic mini-dialogue demonstrating stylistic differentiation between
    the neutral 'я думаю' and the formal 'я вважаю' in social contexts.
  - Include a specific engagement box ('myth-buster' or 'warning') focusing on these
    common learner errors.
- section: Літературні думи та народна мудрість
  words: 900
  points:
  - 'Integrate Taras Shevchenko’s «Думи мої, думи мої...»: analyze ''дума'' as a symbol
    of profound reflection on fate and national identity.'
  - 'Incorporate folk wisdom: use the proverb «На те й голова, щоб у ній розум був»
    to discuss the cultural value of pragmatic intelligence.'
  - Explore deep cognition verbs like 'усвідомлювати' (to realize) and 'осягати' (to
    grasp) through short, philosophical, high-register excerpts.
  - Ensure all literary analysis is in 100% Ukrainian and highlights active Ukrainian
    intellectual agency.
- section: 'Практика та підсумок: Точність міркувань'
  words: 700
  points:
  - 'Present a scenario-based production task: choosing verbs for a workplace dialogue
    vs. a personal conversation.'
  - 'Connect thinking to speaking: prompt learners to express their cognitive process
    for solving a travel problem (building on module b1-67).'
  - Summarize the rules for choosing the correct synonym based on register and context,
    reinforcing State Standard §4.5.1.1 competencies.
  - Include an engagement box prompting reflection on the learner's own thinking process
    in Ukrainian.
