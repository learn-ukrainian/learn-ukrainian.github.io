slug: synonymy-thinking-verbs
title: 'Синонімія I: Дієслова мислення'
word_target: 4000
content_outline:
  - section: 'Вступ: Я мислю, отже я існую (Introduction: Cogito Ergo Sum)'
    words: 600
    points:
      - 'Cultural hook: Introduction to the philosophy of thinking through René Descartes’
        iconic quote «Я мислю, отже я існую» (Cognito, ergo sum) and its significance
        in Ukrainian intellectual tradition.'
      - 'The power of precision: Why choosing the right ''thinking'' verb matters
        for character traits and personal views, aligning with State Standard §3.1
        ''Людина''.'
      - 'Conceptual categorization: Distinguishing between cognitive processes (міркувати),
        expressing opinions (вважати), and pure states of understanding (розуміти).'
  - section: 'Словник думок: Від «думати» до «вважати» (Vocabulary: From Thinking
      to Opining)'
    words: 800
    points:
      - 'Semantic deep dive into ''Думати'': Neutral usage (''думати про'' for general
        thoughts) vs. problem-solving nuance (''думати над'' for puzzles and tasks).'
      - 'The ''Opinion'' Tier: Using ''Вважати'' for formal discussions and personal
        stances (e.g., ''я вважаю, що...''); mapping it to formal stylistic registers.'
      - 'The ''Supposition'' Tier: Exploring ''Гадати'' (to suppose/guess) and its
        idiomatic usage in ''не довго думаючи й гадаючи''.'
      - 'The ''Process'' Tier: ''Міркувати'' as a deliberate, logical activity (міркувати
        вголос, міркувати логічно).'
  - section: 'Аналіз помилок: Рахувати чи вважати? (Error Analysis: To Count or to
      Opine?)'
    words: 800
    points:
      - 'Critical correction of the common calque: Learner error ''Я рахую, що...''
        (from Russian) vs. correct Ukrainian ''Я вважаю, що...''. Rule: ''Рахувати''
        is strictly for numbers/money.'
      - 'Disambiguating ''Гадати'' vs. ''Ворожити'': Correcting the error ''Циганка
        гадала мені'' to ''Циганка ворожила мені'', clarifying that ''гадати'' is
        a mental act, not fortune-telling.'
      - 'State Standard §4.5.1.1 compliance: Exercises on stylistic differentiation
        between neutral ''я думаю'' and formal ''я вважаю'' in various social contexts.'
  - section: Літературні думи та народна мудрість (Literary Thoughts and Folk Wisdom)
    words: 900
    points:
      - 'Cultural hook: Taras Shevchenko’s ''Думи мої, думи мої...'' — analyzing the
        word ''думи'' as a symbol of sorrowful reflection on the nation''s fate.'
      - 'Folk wisdom integration: Analyzing ''На те й голова, щоб у ній розум був''
        to discuss the cultural value of pragmatic intelligence and comprehension
        (розуміти з півслова).'
      - 'Deep cognition: Exploring ''усвідомлювати'' (to realize) and ''осягати''
        (to grasp/comprehend) through short philosophical excerpts.'
  - section: 'Практика та підсумок: Точність міркувань (Practice and Summary: Precision
      of Reasoning)'
    words: 900
    points:
      - 'Scenario-based production: Choosing appropriate verbs for collocations like
        ''вважати за потрібне'' or ''дати зрозуміти'' in workplace vs. personal dialogues.'
      - 'Synthesis: Connecting thinking to speaking (preparing for b1-69); learners
        express their cognitive process for solving a travel problem (linked to b1-67).'
      - 'Final summary: Recap of the 10/12 rule (choosing the right synonym for the
        right register) and a check on the State Standard competencies for §4.5.1.1.'
