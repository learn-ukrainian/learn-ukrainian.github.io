slug: emotions-deep-dive
title: 'Емоції: глибоке занурення'
word_target: 4000
content_outline:
- section: Вступ
  words: 400
  points:
  - Представити персону психотерапевта, який запрошує студента дослідити свій внутрішній
    світ емоцій.
  - Ввести концепт 'кордоцентризму' (філософія Сковороди та Юркевича), пояснивши метафору
    'Слухай своє серце' як основу українського світосприйняття.
  - Окреслити зв'язок теми з описом рис характеру та взаємин (відповідно до §3 Державного
    стандарту).
- section: Лексико-граматичні нюанси
  words: 1000
  points:
  - Порівняти конструкції з давальним відмінком стану (Мені сумно, Тобі радісно) та
    називним відмінком дії (Я сумую, Ти радієш).
  - 'Пояснити використання родового відмінка причини (§4.2.2.2): ''стрибати з радості'',
    ''почервоніти від сорому''.'
  - 'Пояснити використання орудного відмінка об''єкта стану (§4.2.2.5): ''захоплюватися
    музикою'', ''захоплюватися мистецтвом''.'
  - 'Розмежувати інтенсивність станів на прикладах: загальний ''сум'', поетична ''туга''
    та абсолютний ''розпач''/''відчай''.'
- section: Тексти та культурний контекст
  words: 1200
  points:
  - Проаналізувати високочастотні стани ('радість', 'захоплення', 'тривога') у форматі
    коротких розповідей.
  - Протиставити історичне значення 'бити на сполох' і сучасний контекст 'повітряна
    тривога'.
  - Дослідити 'зажуру' як унікальний український культурний концепт (світлий смуток,
    зв'язок із пам'яттю), використовуючи фольклорні або літературні приклади.
  - Розібрати стилістичні нюанси виразів 'щира радість' та 'праведний гнів' на автентичних
    текстах.
- section: Комунікативна практика
  words: 1000
  points:
  - Чітко розмежувати дієслова 'відчувати' (щось) та 'почуватися' (як), виправивши
    типову помилку 'я відчуваю себе добре'.
  - Пояснити різницю між 'хвилюватися' (нервувати перед подією) та 'переживати' (глибоко
    страждати або проходити через важкий досвід).
  - 'Навчити градації вподобань: від ''Мені подобається'' (легка симпатія) до ''Я
    в захваті від...'' (сильне захоплення), уникаючи надмірного вживання ''Я люблю''.'
- section: Рефлексія та висновки
  words: 400
  points:
  - Завершити модуль 'терапевтичним' завданням-рефлексією, де студент відповідає на
    глибокі запитання (наприклад, 'Що приховує ваш гнів?', 'Коли ви відчуваєте щиру
    радість?').
  - Підбити підсумки ключових колокацій (світлий смуток, не приховувати захоплення).
  - Зробити фінальний акцент на українському емоційному інтелекті та важливості кордоцентризму.
