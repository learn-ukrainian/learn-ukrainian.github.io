slug: motion-starting-returning
title: 'Рух: початок і повернення'
word_target: 4000
content_outline:
- section: Вступ та Діагностика
  words: 600
  points:
  - 'H3: Ранкова метушня. A diagnostic narrative describing a chaotic morning commute:
    a character trying to ''зайти'' into a crowded marshrutka, ''заскочити'' to a
    kiosk for coffee, and finally ''поїхати'' to the office. Serves as authentic context.'
  - 'H3: Перевірка інтуїції. Diagnostic questions challenging the learner to distinguish
    between ''піти'' (walk) and ''поїхати'' (ride) as the initiation of movement,
    establishing a baseline before the B1 deep dive.'
  - 'H3: Геометрія руху. Introduce the module''s core concept: Ukrainian motion prefixes
    do not merely mean ''go''; they describe exact spatial trajectories (initiation,
    dropping in, scattering).'
- section: Семантика префіксів за державним стандартом
  words: 1000
  points:
  - 'H3: Префікс ПО- (Початок руху). Define ''по-'' as the definitive marker of initiating
    a trip. Contrast ''піти'' (set off on foot) with ''поїхати'' (set off by vehicle)
    using a clear comparative table.'
  - 'H3: Префікс ЗА- (Короткий візит). Explain ''за-'' as a spatial deviation from
    the main route to ''drop in''. Contrast the casual ''зайти до друга'' with the
    formal ''увійти в будівлю'' to build register awareness.'
  - 'H3: Префікс РОЗ- (Розходження). Explain ''роз- + -ся'' as the vector of dispersing
    in multiple directions from a central point. Contrast ''розійтися'' (guests leaving
    on foot) and ''роз''їхатися'' (leaving by cars).'
  - 'H3: Офіційна норма. Explicitly reference standard §4.3.8, providing the canonical
    prefixed pairs for ''іти'' and ''їхати'' to reinforce structural competency.'
- section: Мовні нюанси та запобігання помилкам
  words: 900
  points:
  - 'H3: Дистанція має значення. Analyze and correct the common error ''піти до Львова''.
    Enforce the rule that destinations naturally requiring transport MUST use ''поїхати/полетіти''.'
  - 'H3: Керування прийменниками із ЗА-. Detailed breakdown of ''зайти + прийменник'':
    ''зайти в'' (enter a space), ''зайти за будівлю'' (go behind), and the critical
    social phrase ''зайти за кимось'' (pick someone up).'
  - 'H3: Зайти чи заїхати за другом? Explain the social coordination logic: ''зайти
    за кимось'' implies walking together afterwards, while ''заїхати за кимось'' specifies
    picking them up in a vehicle.'
  - 'H3: Розмовний регістр: Заскочити. Introduce ''заскочити'' (to pop in) as a high-frequency
    colloquial alternative to ''зайти'' (e.g., ''заскочити на каву''), illustrating
    modern urban Ukrainian.'
- section: Культурний контекст та транспортний етикет
  words: 800
  points:
  - 'H3: Спочатку виходять, потім заходять. Explain the golden rule of Ukrainian public
    transit etiquette. Frame it as an unwritten social contract of shared urban spaces.'
  - 'H3: Присісти на дорогу. Dive into the pre-departure ritual before one decides
    to ''поїхати''. Explain its transition from folklore (appeasing the domovyk) to
    a modern psychological transition.'
  - 'H3: Традиція «На коня». Explore the ritual of the final toast before guests ''розходяться''
    (disperse). Connect it to Cossack history and modern hospitality norms.'
  - 'H3: Активна позиція. Highlight how Ukrainian phrases of movement emphasize active
    agency, community connection, and deliberate spatial navigation.'
- section: Комплексна практика та підсумок
  words: 700
  points:
  - 'H3: Сценарій зустрічі та прощання. A guided synthesis where learners track a
    group of friends who ''заскочили'' to a cafe, ''поїхали'' to a concert, and finally
    ''розійшлися'' home.'
  - 'H3: Аналіз контексту. Brief analytical exercises focusing on prefix selection
    (по-, за-, роз-) and root selection (іти vs їхати) based on situational prompts.'
  - 'H3: Головні висновки. Bulleted summary of the prefix rules, emphasizing the strict
    separation of foot and vehicle transport inherent in Ukrainian spatial logic.'
  - 'H3: Що далі? A brief segue connecting the concept of ''початок'' (starting) to
    the next module''s focus on ''наближення'' (approaching).'
