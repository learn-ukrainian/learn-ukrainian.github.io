slug: agreement-disagreement
title: Згода і незгода
word_target: 4000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Представлення теми: як українці висловлюють згоду та незгоду.'
  - 'Культурний контекст: приказка «Де два українці, там три гетьмани» та історичне
    коріння українського плюралізму.'
  - 'Роль ввічливості: чому пряме «ні» іноді звучить занадто грубо, і як дипломатія
    допомагає у спілкуванні.'
- section: Словник та фразеологія
  words: 900
  points:
  - 'Базова лексика: дієслова ''погоджуватися'' та ''заперечувати'' з прикладами у
    контексті.'
  - 'Іменники та сталі вирази: ''згода/незгода'', ''дати згоду'', ''мовчазна згода''.'
  - 'Ідіоми: пояснення виразів ''дійти згоди'' (знайти компроміс) та ''яблуко незгоди''
    (причина суперечки) з міні-діалогами.'
  - 'Маркери інтенсивності: ''безперечно'', ''безумовно'', ''абсолютно'', ''частково''.'
- section: Граматика та типові помилки
  words: 800
  points:
  - 'Проблема ''Я є згоден'': пояснення, чому англійська калька не працює в українській
    мові, і як використовувати ''Я згоден'' або ''Я погоджуюся''.'
  - 'Узгодження роду: чітке розрізнення коротких прикметників для чоловіків (''згоден'')
    та жінок (''згодна''). Таблиця з прикладами.'
  - 'Лексична чистота: різниця між ''правильно'' (correctly) та ''вірно'' (loyally).
    Чому в дискусії ми кажемо ''Ви правильно сказали''.'
- section: Стратегії ввічливої дискусії
  words: 1000
  points:
  - 'Відтінки згоди: як перейти від повної згоди до часткової за допомогою конструкцій
    ''хоча'' та ''але''.'
  - 'Дипломатична незгода: конструкції ''М''якої незгоди'' (''Цікава думка, однак...'',
    ''Можливо, ви маєте рацію, проте...'').'
  - 'Визнання аргументів: використання фраз на кшталт ''Не можу не погодитися з вашим
    аргументом...'''
  - 'Офіційний регістр: коли доречно використовувати ''категорично заперечувати''
    чи ''спростовувати думку''.'
- section: 'Практика: Дебати та месенджери'
  words: 600
  points:
  - 'Офіційна ситуація: робоча нарада (діалог з використанням термінології ''спростовувати'',
    ''визнавати правоту'').'
  - 'Неофіційна ситуація: спілкування в месенджерах (скорочення, емодзі, ''+1'', емоційні
    реакції ''Ти що!'', ''Та ні!'').'
  - 'Аналіз практичних ситуацій: розбір діалогів та вибір правильного регістру.'
- section: Підсумок
  words: 300
  points:
  - 'Самоперевірка: чи вміє студент висловлювати згоду, відмову та приймати пропозиції
    (згідно зі стандартом B1).'
  - Головні висновки про узгодження роду ('згоден/згодна') та вживання слова 'правильно'.
