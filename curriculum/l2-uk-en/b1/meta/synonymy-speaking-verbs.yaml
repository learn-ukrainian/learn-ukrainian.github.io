slug: synonymy-speaking-verbs
title: 'Синоніми II: дієслова мовлення'
word_target: 4000
content_outline:
  - section: Вступ (Introduction)
    words: 600
    points:
      - Lexical synonymy importance per Standard §4.5.1.1 to move beyond overused
        generic verbs like 'казати' and 'говорити'.
      - 'Register awareness: identifying the spectrum from formal ''повідомляти''
        (to inform) to informal ''балакати'' (to chat/babble).'
      - 'Categorization of verbs by interaction type: monologue-focused (говорити)
        vs. interactive dialogue (розмовляти, спілкуватися).'
  - section: Культурний контекст (Cultural Context)
    words: 800
    points:
      - 'The Kobzar Tradition: Exploring the oral historian role where history was
        ''told'' (розповідали) via ''dumy'' rather than read from books.'
      - 'Solov''ina Mova (Nightingale Language): Cultural value of bird metaphors
        like ''щебетати'' (to chirp) and ''воркувати'' (to coo) for melodic speech.'
      - Taras Shevchenko as 'The Great Kobzar' and the cultural weight of the verb
        'розповідати' in preserving national memory.
  - section: Лексичні нюанси та граматика (Lexical Nuances and Grammar)
    words: 1000
    points:
      - 'Semantic differentiation: when to use ''розповідати'' for narratives vs.
        ''казати'' for discrete content or simple reporting.'
      - 'Standard §4.4.3 implementation: Constructing indirect speech using ''що''
        clauses to report statements with varied introductory verbs.'
      - 'Manner of speech verbs: Introducing ''шепотіти'' (whisper) and ''кричати''
        (shout) to enhance descriptive depth in storytelling.'
      - 'Aspect nuance drill: ''казати'' (process/habitual) vs. ''сказати'' (result/single
        instance) in reporting contexts.'
  - section: Робота над помилками (Addressing Learner Errors)
    words: 800
    points:
      - 'Learner error: ''говорити на українській мові'' (wrong preposition) vs. correct
        instrumental ''говорити українською мовою''.'
      - 'Learner error: using ''казати'' for ''to tell a story'' (must be ''розповідати'')
        — drill with narrative contexts.'
      - 'Learner error: using generic ''говорити'' for interactive conversations where
        ''розмовляти'' is more natural and precise.'
      - 'Aspect error: using ''казати'' (impf) for a single completed info point instead
        of ''сказати'' (pf).'
  - section: Практика та застосування (Practice and Application)
    words: 800
    points:
      - 'Theater Actor role-play: expressing different emotions through manner of
        speech verbs (whispering secrets, shouting joy).'
      - 'Professional simulation: writing a formal update using ''повідомляти'' and
        ''заявляти'' vs. a casual coffee chat using ''балакати''.'
      - 'Reporting task: summarizing a conversation using ''він стверджував, що...''
        and ''вона пояснювала, що...'' to master indirect speech.'
