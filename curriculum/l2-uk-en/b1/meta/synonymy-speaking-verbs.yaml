slug: synonymy-speaking-verbs
title: 'Синоніми II: дієслова мовлення'
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - Поясніть важливість лексичної синонімії згідно зі Стандартом §4.5.1.1, щоб уникати
    надмірного використання базових дієслів «казати» та «говорити».
  - 'Представте концепцію регістру: від офіційного «повідомляти» до розмовного «балакати».'
  - 'Класифікуйте дієслова за типом взаємодії: монологічні (говорити) та діалогічні
    (розмовляти, спілкуватися), додавши контекст українського слововжитку.'
- section: Культурний контекст
  words: 800
  points:
  - 'Дослідіть традицію кобзарів: роль усних істориків, які «розповідали» історію
    через думи, зберігаючи національну пам''ять.'
  - Поясніть концепт «солов'їна мова» та культурну цінність метафор пташиного співу
    для мелодійного мовлення («щебетати», «воркувати»).
  - Згадайте Тараса Шевченка як Великого Кобзаря для ілюстрації ваги дієслова «розповідати»
    в українській ідентичності.
- section: Лексичні нюанси та граматика
  words: 1000
  points:
  - 'Диференціюйте значення: коли доречно вживати «розповідати» для довгих наративів,
    а коли «казати» для коротких повідомлень.'
  - 'Поясніть побудову непрямої мови за Стандартом §4.4.3: використання підрядних
    речень зі сполучником «що» та різними вступними дієсловами (стверджувати, пояснювати).'
  - Введіть дієслова манери мовлення («шепотіти», «кричати») для поглиблення описовості
    текстів.
  - 'Проаналізуйте видові нюанси: недоконаний «казати» (процес/звичка) проти доконаного
    «сказати» (результат/одноразова дія) у контексті репортування.'
- section: Робота над помилками
  words: 800
  points:
  - 'Виправте типову помилку з прийменниками: забороніть конструкцію «говорити на
    українській мові» та закріпіть правильну форму орудного відмінка «говорити українською
    мовою» або «говорити українською».'
  - Усуньте плутанину між «казати» та «розповідати» у контексті розповіді історій
    (storytelling).
  - Виправте використання загального «говорити» для інтерактивних діалогів, де природніше
    звучить «розмовляти» або «спілкуватися».
  - 'Пропрацюйте видову помилку: вживання «казати» замість «сказати» для непрямої
    мови про завершену дію.'
- section: Практика та застосування
  words: 800
  points:
  - 'Створіть діалог-рольову гру (Persona: Theater Actor), де персонажі виражають
    різні емоції через манеру мовлення (шепочуть секрети, кричать від радості).'
  - 'Створіть професійну симуляцію: порівняйте формальне оновлення статусу з використанням
    «повідомляти»/«заявляти» та неформальну бесіду за кавою з дієсловом «балакати».'
  - 'Створіть завдання на перетворення прямої мови на непряму: підсумуйте почуту розмову,
    використовуючи конструкції «він стверджував, що...» та «вона пояснювала, що...».'
