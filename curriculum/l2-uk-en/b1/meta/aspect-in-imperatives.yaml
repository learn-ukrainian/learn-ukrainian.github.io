slug: aspect-in-imperatives
title: Вид у наказовому способі
word_target: 4000
content_outline:
- section: Вступ та діагностика
  words: 500
  points:
  - Explicitly note 100% immersion standard (English in vocabulary tables only).
  - 'Diagnostic contrast based on State Standard §4.2.3.2: use verb pairs like ''кажіть/скажіть''
    and ''мрій/мріймо'' to test functional usage (process vs. result) beyond mere
    formation.'
  - 'Introduction to the ''Politeness Paradox'' — pose the question: which sounds
    more polite to a guest, ''Сядьте'' or ''Сідайте''? Use this to engage critical
    thinking about pragmatic register.'
- section: 'Граматика: Стверджувальні конструкції'
  words: 1200
  points:
  - НДВ commands (process, permission) — Detailed explanation of how Imperfective
    softens a command into a polite invitation ('Сідайте', 'Заходьте', 'Беріть');
    contrast with curt military-style Perfective orders.
  - ДВ commands (result, instruction) — Specific usage for one-time results. Address
    the common learner error of using 'Зачиняй' for a single request to 'Close the
    window' (should be 'Зачини').
  - Collective imperatives and register — Contrast standard synthetic forms like 'робімо',
    'ходімо', and 'пиймо' (per §4.2.3.2) with the high-frequency colloquial use of
    'давай(те)' + future/infinitive.
- section: 'Граматика: Заперечення та застереження'
  words: 1000
  points:
  - 'The Negation Flip Logic — Detailed rule: Prohibitions (general ''don''t do it'')
    almost always use Imperfective aspect (''Не роби'', ''Не кажи'').'
  - 'Warnings and Prevention — Usage of Perfective for specific warnings (''Не впади'',
    ''Гляди, не зроби''). Correction of learner error: using Perfective for general
    prohibitions.'
  - Semantic nuances with 'пам'ятай' (generic advice/ongoing state) vs. 'запам'ятай'
    (specific instruction to memorize a fact).
- section: Практика та розбір помилок
  words: 800
  points:
  - 'Decision-making framework — Interactive flowchart exercises: Affirmative? → Result
    (Pf) or Process/Invitation (Imp); Negative? → Prohibition (Imp) or Warning (Pf).'
  - The Politeness Trap drills — Exercises focused on converting curt Perfective commands
    into polite Imperfective invitations to avoid pragmatic failure in social situations.
  - Aspect selection for advice vs. commands — Practice using Imperfective for general
    lifelong advice vs. Perfective for immediate tactical instructions.
- section: Культурний код та діалоги
  words: 600
  points:
  - Proverbial wisdom analysis — Deep dive into the proverb 'Вік живи — вік учись'.
    Explain why НДВ verbs 'живи' and 'учись' are mandated for describing a continuous,
    lifelong process.
  - 5-6 Authentic dialogues — Scenarios contrasting formal invitations using 'будь
    ласка' and НДВ with urgent, high-stakes commands using 'негайно' or 'обов'язково'
    and ДВ.
  - Summary of functional usage — Final review of how aspect selection defines the
    tone of a Ukrainian sentence (invitation vs. order).
