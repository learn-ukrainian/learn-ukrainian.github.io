slug: motion-passing-crossing
title: 'Рух: перехід і обхід'
word_target: 4000
content_outline:
- section: Вступ
  words: 400
  points:
  - Set 100% Ukrainian immersion context; explicitly introduce the 'Kyiv Traffic Controller'
    (Київський регулювальник) persona.
  - 'Contextualize motion in an urban environment: the challenge of navigating physical
    barriers, rivers, and complex urban routes.'
  - Introduce the core prefixes (пере-, про-, об-) explicitly mapped to Ukrainian
    State Standard §4.3.8.
- section: Тест
  words: 500
  points:
  - 'Create 3 diagnostic visual scenarios: distinguishing direct crossing (пере-)
    from avoiding (об-) using everyday obstacles.'
  - 'Address the common calque error: test ''passing an exam'' to explicitly contrast
    ''скласти іспит'' versus the incorrect ''пройти''.'
  - 'Test intuitive routing: describe the trajectory across a major bridge (Міст Патона)
    versus going around a traffic jam (затор).'
- section: Пояснення
  words: 1100
  points:
  - 'Present structural Mermaid diagrams for trajectories: пере- (A → B across), про-
    (A → B through/past), and об- (A ↺ B around).'
  - 'Explain the syntax rule for ''пере-'': mastering the direct Accusative (перейти
    вулицю) without redundant prepositions, referencing standard §4.2.2.4.1.'
  - 'Contrast semantics: detail why ''обійти'' implies a longer, more cautious path
    compared to the direct traversal of ''перейти''.'
  - 'Emphasize decolonized framework: highlight Ukrainian prefix efficiency as a native,
    logical system.'
- section: Поглиблення
  words: 1100
  points:
  - 'Integrate cultural facts: usage of ''переїжджати'' vs ''проїжджати'' with the
    bascule Інгульський міст in Mykolaiv (one of Europe''s largest drawbridges).'
  - 'Describe aesthetic landmarks: a train crossing the valley via the picturesque
    Віадук у Плебанівці using precise motion verbs.'
  - 'Explain figurative nuances: distinguish physical bypassing from figurative meanings
    like ''обійти увагою'' (to overlook) or ''перейти межу'' (to cross the line).'
- section: Практика
  words: 500
  points:
  - 'Simulate route planning: draft a GPS navigation sequence in Kyiv, actively avoiding
    ''яма'' and ''затор''.'
  - 'Conduct error correction drill: identify and fix redundant usage of ''через''
    (e.g., correcting ''перейти через міст'' to ''перейти міст'').'
  - 'Present situational drills: choose between ''про-'' and ''об-'' when facing a
    crowd (''пройти крізь натовп'') vs. a physical barrier (''обійти перешкоду'').'
- section: Підсумок
  words: 400
  points:
  - 'Execute a roleplay summary: acting as a navigator giving final instructions to
    cross the Dnipro river.'
  - Reflect on the 'Theory-First' logic of prefixation as a powerful tool for precise
    professional communication.
  - Final synthesis mapping specific verbs to the core B1 requirements of describing
    complex city routes.
