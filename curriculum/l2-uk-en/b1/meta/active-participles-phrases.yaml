slug: active-participles-phrases
title: Активні дієприкметники та їхній стиль
word_target: 4000
content_outline:
- section: 'Вступ: Природа дієприкметника'
  words: 500
  points:
  - 'Ознайомлення з §4.2.3.1 Державного стандарту: концепція дієприкметника як вербального
    прикметника, що узгоджується в роді, числі та відмінку.'
  - 'Встановлення ''стилістичної жорсткої лінії'': пояснення, чому активні дієприкметники
    минулого часу (-лий) є нормативними, тоді як теперішнього (-учий/-ючий) — штучними
    та обмеженими у вжитку.'
  - 'Позиція Поета: захист природної, живої мови від штучних бюрократичних структур.'
  - Оскільки занурення 100%, попередити (у вступному слові), що всі пояснення будуть
    виключно українською мовою.
- section: Морфологія та мовна норма
  words: 900
  points:
  - 'Детальний розбір активних дієприкметників минулого часу із суфіксом -лий (наприклад:
    посивілий, зів''ялий, зжовклий), що позначають результативні стани.'
  - Аналіз фольклорної цитати «Не бійся гостя сидячого, а бійся стоячого» для демонстрації
    лексикалізованих (ад'єктивізованих) дієприкметників.
  - 'Створення ''Безпечного списку'': перелік повністю нормативних прикметників, що
    походять від дієприкметників (співучий, квітучий, родючий).'
  - 'Розбір типової помилки: відсутність узгодження з іменником (наприклад, чому форма
    ''палаючий очі'' є грубою помилкою і має бути ''палаючі очі'').'
- section: Боротьба з канцеляритом
  words: 1100
  points:
  - 'Культурний контекст: рух ''Антиканцелярит'' як зусилля з деколонізації мови,
    очищення від радянських бюрократичних штампів та російських кальок.'
  - 'Виправлення помилок (таблиця): заміна штучних активних дієприкметників теперішнього
    часу на нормативні українські відповідники (бажаючі → охочі, оточуюче середовище
    → довкілля).'
  - 'Назви професій: розмежування віддієслівних іменників та дієприкметників (Командуючий
    армією → Командувач армії, завідуючий кафедрою → завідувач кафедри).'
  - 'Аналіз слова «працюючий»: розрізнення контекстів ''працюючий телефон'' (неправильно,
    краще → справний) та ''працюючий пенсіонер'' (неправильно, краще → пенсіонер,
    який працює).'
- section: Синтаксис та трансформації
  words: 1000
  points:
  - 'Відповідно до §4.4.2: правила побудови дієприкметникового звороту в простому
    ускладненому реченні та його пунктуація.'
  - 'Стратегія заміни: покроковий алгоритм перетворення активних дієприкметників на
    підрядні означальні речення (''який...'', ''той, хто...'').'
  - Тренування трансформації типових кальок (наприклад, перетворення 'Я бачу йдучого
    чоловіка' на природне 'Я бачу чоловіка, який іде').
  - 'Стилістичні нюанси: коли краще обрати влучний іменник (довкілля) замість розгорнутої
    конструкції (навколишнє середовище).'
- section: Практика та стилістичний підсумок
  words: 500
  points:
  - 'Контрастивний аналіз: визначення різниці між поетичним/художнім ''палаючий''
    та неприродним бюрократичним ''працюючий''.'
  - Зведена довідкова таблиця винятків та ад'єктивізованих форм, якими студенти можуть
    безпечно користуватися.
  - Фінальний огляд правил узгодження та стилістичного маркування для закріплення
    матеріалу рівня B1.
