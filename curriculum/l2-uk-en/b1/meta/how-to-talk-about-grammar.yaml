id: 1
slug: 'how-to-talk-about-grammar'
title: 'Як говорити про граматику'
subtitle: 'Learning grammar terminology in Ukrainian'
version: '3.0'
phase: 'B1'
pedagogy: 'PPP'
duration: 75
transliteration: 'none'
tags: ['metalanguage', 'grammar', 'bridge']
grammar: ['parts-of-speech', 'cases', 'sentence-elements']
word_target: 4000
immersion: 70
objectives:
  - 'Learner can identify parts of speech using Ukrainian terminology'
  - 'Learner can name all seven grammatical cases in Ukrainian'
  - 'Learner can describe basic sentence elements using Ukrainian terms'
content_outline:
  - section: "Вступ: сила метамови"
    words: 550
    points:
      - "Scaffolding: English paragraph explaining the transition to 70% immersion and why metalanguage (метамова) is the 'skeleton' of B1 study"
      - "Introduction to core concepts: grammar (граматика), rule (правило), and example (приклад)"
      - "Linguistic Agency: How terminology enables learners to ask clarifying questions about language in Ukrainian"
      - "History Bite: Meletiy Smotrytsky (1619) and his 'Grammatika'—the first systematic study of Ukrainian grammar and the introduction of the letter 'ґ'"
  - section: "Частини мови: самостійні категорії"
    words: 750
    points:
      - "Exploration of the 6 independent parts of speech (самостійні частини мови)"
      - "H3 for each (іменник, дієслово, прикметник, прислівник, займенник, числівник) with English terms in parentheses"
      - "Etymological logic: Identifying POS through their names (e.g., 'іменник' from 'ім'я' for things that have a name)"
      - "Structure for each H3: Definition, core question (хто/що?, що робити?), 2+ clear examples, and a usage note"
  - section: "Частини мови: службові слова"
    words: 600
    points:
      - "Analysis of the 4 functional parts of speech (службові частини мови)"
      - "H3 for each (сполучник, прийменник, частка, вигук) with role-based definitions"
      - "Interactive explanation: How 'connecting' (сполучник) and 'positioning' (прийменник) words create logic in sentences"
      - "Examples highlighting the difference between a preposition and a particle (частка) in meaning modulation"
  - section: "Відмінки: сім ключів"
    words: 800
    points:
      - "Comprehensive review of the 7 cases (називний, родовий, давальний, знахідний, орудний, місцевий, кличний)"
      - "H3 for each case: Standard questions, primary semantic role (e.g., instrument, destination), and 2+ contextual examples"
      - "Case Mnemonic: Inclusion of the popular school rhyme 'Народив Роман Дитину, Зрубав Очеретину, М'ячик Кинув' (Н-Р-Д-З-О-М-К)"
      - "Deep Dive: 'Додаткова інформація' section for each case covering subtle B1-level nuances"
      - "Anti-Error Check: Debunking the 'Object Case' analogy (Accusative/Знахідний) to prevent English interference"
  - section: "Граматичні категорії та будова слова"
    words: 650
    points:
      - "H3: Морфеміка (Morphemics): Defining корінь (root), суфікс, префікс, and закінчення (ending) with visual word breakdowns"
      - "H3: Граматичні категорії: Explicit terminology for gender (рід), number (число), person (особа), tense (час), and aspect (вид)"
      - "H3: Синтаксис (Syntax): Introduction to sentence roles: subject (підмет), predicate (присудок), object (додаток), attribute (означення), and adverbial (обставина)"
      - "Visual aids: Diagramming a simple sentence using these Ukrainian terms"
  - section: "Практика: читаємо граматику українською"
    words: 400
    points:
      - "Grammar analysis: Reading real grammar rules sourced from textbooks and identifying terminology in action"
      - "Teacher-Student Dialogue: A script where a student asks for a rule 'українською мовою' using the new metalanguage"
      - "Literary Anchor: Parsing short quotes from Shevchenko and Franko for specific parts of speech"
      - "Cultural Insight: The importance of the Vocative (кличний) in authentic Ukrainian address vs. common learner omissions"
  - section: "Підсумок і самоперевірка"
    words: 250
    points:
      - "Vocabulary Table: Final check of all 20+ required/recommended metalanguage terms"
      - "Readiness Gate: Brief look ahead to M02 (Verbs) and why this terminology is essential for the next phase"
      - "Self-Assessment: 6+ specific questions (e.g., 'Які питання ставимо до орудного відмінка?') to verify comprehension"
