slug: aspect-complete-system
title: 'Вид дієслова: повна система'
word_target: 4000
content_outline:
- section: Розминка та Контекст
  words: 600
  points:
  - 'Метафора режисерського об''єктива: вид як вибір кута зору. Візуальна мова Сергія
    Параджанова у фільмі «Тіні забутих предків» як ілюстрація — динамічна камера (НДВ)
    проти статичних живописних кадрів (ДВ).'
  - 'Тест на інтуїцію та філософська диференціація: порівняння «Ти пекла торт?» (участь
    у стані) та «Ти спекла торт?» (зміна реальності). Визначення концепту «Video mode»
    (процес) проти «Photo mode» (результат).'
- section: 'Граматична Система: Форми та Функції'
  words: 1000
  points:
  - 'Відповідність Державному стандарту §4.2.3.1: утворення видових пар у минулому
    та майбутньому часах. Детальний розбір дієвідмінювання майбутнього часу: синтетична
    форма ДВ (скажу, поборють) проти аналітичної та синтетичної форм НДВ (буду казати,
    казатиму).'
  - 'Інгресивний вид (початок дії): роль префікса «по-» як маркера початку стану або
    руху (любити → полюбити, бігти → побігти). Уточнення, що в цьому контексті «по-»
    не є просто загальним показником результативності.'
- section: 'Глибинна Семантика: Процес та Результат'
  words: 800
  points:
  - 'Загальнофактичне значення НДВ: розбір складної для рівня B1 помилки — використання
    НДВ для позначення досвіду (напр., «Ти читав Кобзар?») проти ДВ для акценту на
    завершенні («Ти прочитав Кобзар?»).'
  - 'Народна мудрість як лінгвістичний якір: аналіз прислів''їв «Зробив діло — гуляй
    сміло» (ДВ: результат веде до свободи) та «Вік живи — вік учись» (НДВ: життя як
    безперервний процес).'
- section: Аналіз Помилок та Тонкощі
  words: 800
  points:
  - 'Пастка аналітичного майбутнього часу: виправлення типової помилки овергенералізації
    «буду + ДВ» (неправильно: «Я буду написати»; правильно: «Я напишу» або «Я буду
    писати»).'
  - 'Логіка заперечення: пояснення, чому українська мова часто віддає перевагу НДВ
    для заперечення самого факту дії (напр., «Я не бачив цей фільм»), замість очікуваного
    учнями ДВ для одноразових подій.'
  - 'Лексичні нюанси вибору: опозиція «спроба vs успіх» (здавати іспит vs здати іспит)
    та семельфактивні дії (стукати vs стукнути).'
- section: Практика та Мовленнєві Ситуації
  words: 800
  points:
  - 'Нарративна архітектура: використання виду для структурування розповіді. НДВ для
    створення фону («Я йшов, думав...») проти ДВ для позначення ключових подій («побачив,
    зупинився, привітався»).'
  - 'Алгоритм вибору виду: застосування 4 ключових питань у реальних ситуаціях (домашнє
    завдання, зустрічі, читання). Мапування часових маркерів: тривалість (НДВ) проти
    стадії завершення (ДВ).'
