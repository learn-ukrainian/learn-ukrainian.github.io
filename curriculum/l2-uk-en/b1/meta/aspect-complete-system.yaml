slug: aspect-complete-system
title: 'Вид дієслова: повна система'
word_target: 4000
content_outline:
- section: Розминка та Контекст
  words: 600
  points:
  - 'Діагностичне завдання (Test-Teach-Test): інтуїтивний вибір між «Ти пекла торт?»
    (участь у процесі) та «Ти спекла торт?» (результат і зміна реальності).'
  - 'Визначення концептів: недоконаний вид як «Video mode» (безперервний процес) та
    доконаний вид як «Photo mode» (статичний результат).'
  - 'Культурний контекст: метафора режисерського об''єктива на прикладі візуальної
    мови Сергія Параджанова у фільмі «Тіні забутих предків» (динамічна камера проти
    статичних кадрів).'
- section: 'Граматична Система: Форми та Функції'
  words: 1000
  points:
  - Пояснення утворення видових пар у минулому та майбутньому часах згідно з §4.2.3.1
    Державного стандарту.
  - 'Детальний розбір майбутнього часу у форматі порівняльної таблиці: аналітична/складена
    форма НДВ (буду казати), синтетична форма НДВ (казатиму) та проста форма ДВ (скажу).'
  - 'Розбір інгресивного виду: специфічна функція префікса «по-» як маркера початку
    стану або руху (любити → полюбити, бігти → побігти), а не просто завершеності.'
- section: 'Глибинна Семантика: Процес та Результат'
  words: 800
  points:
  - Пояснення загальнофактичного значення недоконаного виду для опису життєвого досвіду
    (наприклад, запитання «Ти читав Кобзар?»).
  - Протиставлення простого факту дії (досвіду) та акценту на її повному завершенні
    («Ти прочитав Кобзар?»).
  - 'Аналіз українських прислів''їв для концептуального закріплення семантики: «Зробив
    діло — гуляй сміло» (ДВ) та «Вік живи — вік учись» (НДВ).'
- section: Аналіз Помилок та Тонкощі
  words: 800
  points:
  - Виявлення та виправлення помилки овергенералізації аналітичного майбутнього часу
    (пастка структури «буду + написати»).
  - 'Особливості логіки заперечення: перевага недоконаного виду для глибокого заперечення
    самого факту дії (наприклад, «Я не бачив цей фільм»).'
  - 'Лексичні нюанси та опозиції: спроба проти успіху (здавати іспит vs здати іспит)
    та семельфактивні дії (стукати vs стукнути).'
- section: Практика та Мовленнєві Ситуації
  words: 800
  points:
  - 'Структурування розповіді за допомогою виду: використання НДВ для створення фону
    («Я йшов, думав...») та ДВ для ключових послідовних подій («побачив, привітався»).'
  - 'Покроковий алгоритм вибору виду за допомогою 4 ключових питань: тривалість, результат,
    повторення, намір.'
  - Мапування часових маркерів (завжди, довго vs раптом, нарешті) та інтегровані завдання
    на застосування видової системи у реальних комунікативних ситуаціях.
