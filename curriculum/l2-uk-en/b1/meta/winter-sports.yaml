slug: winter-sports
title: Зимові види спорту
word_target: 4000
content_outline:
- section: Вступ
  words: 500
  points:
  - Огляд тематики дозвілля та зимового спорту згідно з Державним стандартом §3.4.
  - Еволюція карпатського зимового туризму від автентичних традицій до сучасної гірськолижної
    індустрії (без колоніальних наративів).
  - 'Введення базової лексики: відмінність дієслів «кататися» та «їздити» в контексті
    зимового спорту.'
- section: 'Гірськолижні курорти: Буковель та Драгобрат'
  words: 1200
  points:
  - 'Детальний огляд Буковелю як найбільшого курорту Східної Європи: 68 км трас, Озеро
    Молодості та інфраструктура засніження.'
  - 'Драгобрат як українська мекка фрірайду: найвищий курорт масиву Свидовець, логістика
    на всюдиходах та природний сніг до травня.'
  - 'Порівняльний аналіз: європейський сервіс Буковелю проти дикої природи Драгобрату.'
  - Культурний феномен «колиби» як центру карпатської гастрономії та відпочинку після
    катання (Apres-ski по-українськи).
- section: Термінологія та типові помилки
  words: 1000
  points:
  - 'Лексичний блок: пріоритет питомого слова «витяг» (крісельний, бугельний) над
    російським калькованим «підйомник».'
  - 'Граматичний розбір: використання конструкції «кататися на + Місцевий відмінок»
    («на лижах», «на сноуборді») з відповідними парадигмами відмінювання.'
  - 'Безпека в горах: лексика для читання маркування трас (сині, червоні, чорні) та
    попереджень про лавини.'
- section: 'Практика: Бронювання та спорядження'
  words: 900
  points:
  - 'Логістична комунікація: купівля «ски-пасу», бронювання житла та замовлення трансферу
    до високогірних баз.'
  - 'Практичні діалоги для оренди спорядження: вибір лижних черевиків, шолома, палиць
    та підбір дошки для сноуборду.'
  - 'Моделювання роботи з інструктором: розуміння базових команд та інструкцій на
    навчальному схилі.'
- section: Продукція та підсумок
  words: 600
  points:
  - Аналіз автентичних звітів про стан снігу (snow reports) та прогнозів погоди в
    Карпатах.
  - 'Рольова гра: самостійне планування бюджету та логістики поїздки з урахуванням
    рівня катання.'
  - 'Заключний блок: корисні побажання для гірськолижників (наприклад, «Побачимось
    на схилі!») та підбиття підсумків.'
