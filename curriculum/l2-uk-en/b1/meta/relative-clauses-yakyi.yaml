slug: relative-clauses-yakyi
title: 'Підрядні означальні: який'
word_target: 4000
content_outline:
- section: Діагностичний тест
  words: 800
  points:
  - Вступний тест для перевірки інтуїтивного розуміння зв'язку між головним та підрядним
    реченнями (TTT-підхід)
  - Практичні завдання на поєднання двох простих речень в одне складне (напр. 'Це
    мій брат. Він живе в Києві') без попередніх інструкцій
  - 'Аналіз результатів: чому нам потрібне спеціальне слово для уникнення повторів
    та створення плавного тексту'
- section: Презентація та теорія
  words: 1000
  points:
  - 'Пояснення ''Алгоритму узгодження'': 1) Погляд НАЗАД (для визначення роду та числа
    антецедента); 2) Погляд ВПЕРЕД (для визначення відмінка за функцією у підрядному
    реченні)'
  - 'Таблиця: Повна парадигма відмінювання займенника ''який'' у всіх семи відмінках
    (із прикладами за Держстандартом §4.4.3)'
  - 'Аналіз еталонних прикладів: ''Пані, яку зустріли'' та ''Будинки, які належать
    до ЮНЕСКО'''
  - 'Стилістичне розмежування: пояснення домінування якісного ''який'' над вибірковим
    ''котрий'' у сучасній українській мові'
- section: 'Поглиблення: Культурний код'
  words: 800
  points:
  - 'Культурний гачок: Фольклорна модель ''Визначення героя''. Використання відносних
    речень в українських думах для створення епічного образу (''Козак, який...'')'
  - Поняття 'Антецедента' (слова, яке ми описуємо) та архітектура речення
  - 'Правило синтаксичної близькості: важливість розташування підрядного речення безпосередньо
    після іменника для уникнення двозначності (Ambiguous Antecedent)'
- section: Практика та аналіз помилок
  words: 800
  points:
  - 'Аналіз ''Пастки ролі'' (Case Logic Failure): детальний розбір типової помилки
    копіювання відмінка (''дівчину, яку стоїть'' замість ''яка'')'
  - Дрилі на виправлення 'Гендерного дисонансу' (Gender/Number Discord) у складних
    ланцюжках іменників
  - 'Стилістична критика надмірного вживання незмінного розмовного ''що'': вправи
    на його заміну точним займенником ''який'' у формальних контекстах'
- section: Діалоги та синтез
  words: 600
  points:
  - П'ять ситуативних діалогів (Колега, Подорож, Книга, Навчання, Ресторан), що демонструють
    сталі конструкції ('людина, яка...', 'місто, в якому...')
  - 'Творче завдання на побудову складних дескрипцій: використання ''який'' для опису
    професійних якостей колеги чи ідеального місця для життя'
  - Загальний підсумок граматичного матеріалу
