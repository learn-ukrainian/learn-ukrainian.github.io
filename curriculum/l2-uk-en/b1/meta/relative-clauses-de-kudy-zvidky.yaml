slug: relative-clauses-de-kudy-zvidky
title: 'Підрядні означальні: де, куди, звідки'
word_target: 4000
content_outline:
- section: Вступ та діагностика
  words: 500
  points:
  - 'Вступ до підрядних речень місця: функціональне застосування сполучних слів простору
    («місце, де...», «місто, куди...»)'
  - 'Діагностичний тест: 5-7 речень на перевірку розрізнення статичної локації (де)
    та напрямку (куди/звідки) у базових контекстах'
  - 'Постановка цілей: навчитися точно описувати географічні об''єкти та маршрути
    без калькованих помилок'
- section: 'Теорія: Тріада просторових відношень'
  words: 1000
  points:
  - 'Концепція трьох типів простору: пояснення Статики (📍 де), Напрямку (➡️ куди)
    та Джерела (⬅️ звідки) 100% українською мовою'
  - 'Синтаксична роль: як сполучні слова замінюють іменник головної частини та поєднують
    речення без додаткових прийменників'
  - 'Корелятивні пари: правила побудови та використання вказівних слів «там, де»,
    «туди, куди», «звідти, звідки» з прикладами'
  - 'Частотність і підсилення: використання частки «саме» для уточнення просторових
    відношень (де саме, куди саме)'
- section: Поглиблення та робота над помилками
  words: 1100
  points:
  - 'Аналіз типової помилки 1: плутанина між ''де'' та ''куди''. Пояснення різниці
    між статичним дієсловом (знаходитися) та динамічним (йти, їхати)'
  - 'Аналіз типової помилки 2: помилка подвійного прийменника (напр., ''місце, в де'').
    Чому ''де'' вже містить у собі значення прийменника місця'
  - 'Реєстрові відмінності: коли краще використовувати ''де'' у нейтральному мовленні
    (B1) проти більш офіційного ''в якому / на якому'''
  - 'Семантичний контраст: розрізнення опису місця дії («місто, де я живу») та опису
    якості («місто, яке мені подобається»)'
  - 'Вживання невизначених форм: короткий огляд ''десь'', ''кудись'', ''звідкись''
    у підрядних структурах'
- section: Культурна географія України
  words: 800
  points:
  - 'Київський метрополітен: розповідь про станцію ''Арсенальна'' як «місце, де починається
    найглибше метро у світі», з інтеграцією ''де/звідки'''
  - 'Закарпаття та Рахів: географічний центр Європи, використання означальних конструкцій
    для опису локацій та напрямків подорожей'
  - 'Печера Оптимістична (Тернопільщина): найдовша гіпсова печера як «джерело пригод,
    куди приїжджають спелеологи»'
  - Аналіз українських прислів'їв та сталих виразів про дім і подорожі з використанням
    вивчених просторових сполучних слів
- section: Практика та інтеграція
  words: 600
  points:
  - 'Серія міні-діалогів: реалістичні ситуації (переїзд у нове місто, планування маршруту),
    де активно вживаються ''де'', ''куди'', ''звідки'''
  - 'Вправа на трансформацію: перетворення простих речень у складні підрядні означальні
    з просторовими сполучниками'
  - 'Творче завдання (письмо/говоріння): опис улюбленого місця в Україні чи рідному
    краї з фокусом на місцезнаходження та шляхи до нього'
  - 'Підсумковий чек-ліст: самоперевірка засвоєння тріади просторових відношень та
    відсутності калькованих помилок'
