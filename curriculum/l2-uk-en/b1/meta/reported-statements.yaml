slug: reported-statements
title: 'Непряма мова: твердження'
word_target: 4000
content_outline:
- section: Вступ
  words: 400
  points:
  - Introduce reported speech (непряма мова) as an essential tool for sharing information,
    maintaining 100% Ukrainian immersion.
  - 'Present the cultural hook: the importance of ''Усна історія'' (Oral History)
    and the phrase ''Люди кажуть...'' as a historically trusted source of truth in
    Ukraine.'
- section: Діагностика
  words: 600
  points:
  - Provide a short, immersive reading passage containing both direct and indirect
    speech to test baseline comprehension.
  - Include an identification task where learners must spot the mandatory conjunction
    'що' in reported statements.
  - Assess learners' intuitive ability to recognize pronoun shifts (e.g., 'я' changing
    to 'він'/'вона') from direct to indirect speech.
- section: Граматичне пояснення
  words: 1300
  points:
  - 'Introduce the ''Time Travel'' metaphor: explain that Ukrainian preserves the
    exact tense of the original quote, completely avoiding the English tense backshift
    rule.'
  - Provide a structural breakdown emphasizing that the conjunction 'що' is mandatory
    in declarative reported speech and can never be dropped.
  - Present a clear paradigm table showing the necessary pronoun and perspective shifts
    (1st/2nd person to 3rd person).
  - Contrast neutral reporting verbs (сказати, розповісти) with formal and media-register
    verbs (стверджувати, заявити, повідомити).
- section: Практика трансформації
  words: 1000
  points:
  - 'Include controlled transformation exercises: converting direct quotes into indirect
    speech while strictly preserving the original verb tense.'
  - 'Create an error-correction drill focusing on common mistakes: missing ''що''
    and incorrect English-style tense backshifting.'
  - 'Provide a vocabulary variety task: rewriting sentences by replacing the repetitive
    verb ''сказати'' with context-appropriate alternatives like ''пояснити'' або ''зазначити''.'
- section: Комунікація та культура
  words: 700
  points:
  - Explore the cultural practice of citing authorities, practicing structures like
    'Як казав Шевченко...' in context.
  - Present a storytelling scenario where learners analyze how the choice of reporting
    verb (e.g., 'стверджувати' vs. 'говорити') changes the speaker's perceived certainty.
  - 'Include a final production task: summarizing a formal news update using a mix
    of neutral and formal reporting verbs.'
