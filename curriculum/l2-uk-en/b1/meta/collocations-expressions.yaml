slug: collocations-expressions
title: Колокації та вирази
word_target: 4000
content_outline:
- section: Вступ та теоретична основа
  words: 600
  points:
  - Визначення колокацій як сталих словосполучень та стилістичних засобів (Державний
    стандарт §4.5.1.1).
  - 'Культурний контекст: багатство української синонімії як інструмент точної та
    красивої мови (на прикладі ''горизонт'' – ''обрій'' – ''небокрай'').'
  - 'Концепція природного слововжитку: чому дослівний переклад (калькування) з інших
    мов руйнує автентичність звучання та стилістику тексту.'
- section: Основні дієслівні колокації
  words: 1000
  points:
  - 'Група ''Рішення'': різниця між ''приймати рішення'' та ''ухвалювати рішення''
    (офіційний стиль), вживання виразу ''остаточне рішення''.'
  - 'Група ''Участь'': виключно ''брати участь'' (не ''приймати''), а також ''активна
    участь'', ''відмовитися від участі''.'
  - 'Група ''Увага'': розрізнення ''звертати увагу'' та ''приділяти увагу'', а також
    використання ''заслуговувати на увагу''.'
  - 'Група ''Досвід'' та ''Слово'': ''набувати досвіду'' (з родовим відмінком), ''ділитися
    досвідом'', ''дотримувати слова'', ''дати чесне слово''.'
- section: Культура мовлення та боротьба з кальками
  words: 900
  points:
  - 'Проблема суржику та калькування: як деколонізувати своє мовлення, усвідомлено
    уникаючи російських синтаксичних та лексичних структур.'
  - 'Виправлення типових помилок: ''правильна відповідь'' (замість ''вірна''), ''вважати''
    (замість ''рахувати''), ''розплющувати очі'' (замість ''відкривати'').'
  - 'Функціональне розрізнення дієслів часу: ''проводити час'' (дозвілля), ''витрачати
    час'' (як ресурс) та ''гаяти час'' (марнування).'
  - 'Правильне керування відмінками у сталих виразах (Державний стандарт §4.2.2):
    наприклад, ''набувати'' (чого? родовий відмінок - досвіду), ''заслуговувати''
    (на що?).'
- section: 'Читання: Колокації в контексті'
  words: 800
  points:
  - 'Аналітичний текст про ''хибних друзів перекладача'': як англійські дієслова ''make''
    та ''do'' перекладаються абсолютно різними українськими колокаціями.'
  - 'Стилістичний аналіз художнього тексту: природне використання виразів ''справляти
    враження'' та ''ділитися враженнями'' у розповіді.'
  - 'Соціальні сценарії: моделювання діалогів з використанням фраз ''висловлювати
    думку'' та ''поділяти думку'' під час публічної дискусії.'
- section: Практика та комунікативна продукція
  words: 700
  points:
  - Інтерактивні таблиці 'Правильно/Неправильно' для візуального запам'ятовування
    найпоширеніших помилок та їх виправлення.
  - 'Сценарії для моделювання: створення природних словосполучень для ділового спілкування
    (встановлення контакту) та повсякденних ситуацій.'
  - 'Підсумок: лексична компетенція як уміння не лише знати окремі слова, але й природно
    їх поєднувати для стилістичної довершеності.'
