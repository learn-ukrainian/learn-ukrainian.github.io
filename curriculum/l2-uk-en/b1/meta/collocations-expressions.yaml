slug: collocations-expressions
title: Колокації та вирази
word_target: 4000
content_outline:
  - section: Вступ та теоретична основа (Introduction and Theoretical Foundation)
    words: 600
    points:
      - Definition of collocations (сталі словосполучення) as stylistic means per
        State Standard §4.5.1.1; focus on lexical competence and semantic precision.
      - 'Cultural hook: The richness of Ukrainian synonymy as a tool for precise collocations
        (e.g., the word ''горизонт'' and its 10+ synonyms like ''обрій'', ''небокрай'',
        ''видноколо'').'
      - 'The concept of ''Natural vs. Unnatural'' combinations: contrast literal translation
        (calquing) with authentic usage patterns.'
  - section: Основні дієслівні колокації (Core Verb-Noun Collocations)
    words: 1000
    points:
      - High-frequency clusters for 'Рішення' (приймати, ухвалювати, остаточне, скасувати)
        and 'Участь' (брати, активна, відмовитися від).
      - 'Collocations for ''Увага'': the distinction between ''звертати увагу'' (pay
        attention) and ''приділяти увагу'' (devote/allocate attention), plus ''заслуговувати
        на увагу''.'
      - 'Professional and educational collocations for ''Досвід'': ''набувати досвіду''
        (gain), ''ділитися досвідом'' (share), and ''життєвий досвід'' vs ''гіркий
        досвід''.'
      - 'Usage of ''Слово'': ''дотримувати слова'' (keep), ''дати слово'', and the
        fixed expression ''чесне слово''.'
  - section: Культура мовлення та боротьба з кальками (Speech Culture and Fighting
      Calques)
    words: 900
    points:
      - The problem of 'Surzhyk' arising from literal translation (calquing) of Russian
        and English structures; emphasis on linguistic decolonization.
      - 'Correcting common errors: ''Правильна відповідь'' (not вірна - loyal), ''Вважати,
        що...'' (not рахувати - count), and ''Розплющувати очі'' (not відкривати -
        door/bottle).'
      - 'Functional distinction in time verbs: ''проводити час'' (leisure), ''витрачати
        час'' (resource/spend), and ''гаяти час'' (waste/idle away).'
      - 'Case government awareness per State Standard §4.2.2: ensuring correct endings
        in complex collocations (e.g., ''набувати досвіду'' with Genitive).'
  - section: 'Читання: Колокації в контексті (Reading: Collocations in Context)'
    words: 800
    points:
      - 'Narrative text analyzing ''False Friends of the Translator'': comparing ''make/do''
        in English with the varied Ukrainian equivalents (''робити вибір'' vs ''приймати
        рішення'').'
      - 'Analysis of descriptive collocations in literature: using ''справляти враження''
        (make an impression) and ''ділитися враженнями'' within a narrative arc.'
      - 'Identifying collocations in social scenarios: scenarios involving ''висловлювати
        думку'' (express) and ''поділяти думку'' (share/agree).'
  - section: Практика та комунікативна продукція (Practice and Communicative Production)
    words: 700
    points:
      - 'Interactive exercise: ''Correct/Incorrect'' (Правильно/Неправильно) table
        drills focused on the 6 most frequent learner errors identified in research.'
      - 'Scenario-based production: forming natural word combinations for business
        (contact establishment) and daily life (keeping calm/keeping words).'
      - 'Summary: ''Vocabulary is not just words, but how they connect'' — final reflection
        on choosing the culturally precise word for stylistic elegance.'
