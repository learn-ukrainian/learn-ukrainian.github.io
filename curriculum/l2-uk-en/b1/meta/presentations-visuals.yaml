slug: presentations-visuals
title: Презентації та візуалізація
word_target: 4000
content_outline:
- section: Вступ
  words: 600
  points:
  - Окреслити роль презентацій у сучасному професійному та освітньому житті згідно
    зі стандартом (§3.8, §3.9).
  - 'Культурний контекст: контраст між сучасними форматами (наприклад, TEDxKyiv) та
    застарілою традицією читання доповіді «з папірця».'
  - Задати тон модулю через персону Креативного директора, наголошуючи на важливості
    візуалізації.
- section: Структура виступу та етикет
  words: 800
  points:
  - Пояснити важливість правильного звертання в українському бізнес-етикеті (шановні
    колеги, пані та панове, шановне товариство).
  - Надати таблицю мовних кліше для відкриття презентації (Дозвольте представити,
    Темою моєї доповіді є, Перш за все, хочу подякувати).
  - Описати логічні переходи (дискурсивні маркери) для підтримки уваги аудиторії.
- section: Опис візуальних даних
  words: 900
  points:
  - 'Розмежувати терміни у таблиці: графік (динаміка), діаграма (кругова/стовпчаста
    для часток), таблиця.'
  - 'Глибокий граматичний розбір різниці прийменників: «зрости на 10%» (амплітуда)
    проти «зрости до 10%» (кінцевий рівень).'
  - 'Лексика динаміки з прикладами: стрімко/поступово зростати, різко падати, залишатися
    стабільним.'
- section: Мовні засоби презентатора
  words: 700
  points:
  - 'Фрази для привернення уваги до екрана: Зверніть увагу на..., Подивіться на цей
    показник.'
  - 'Аналіз типової граматичної помилки: правильне використання дієприслівникових
    зворотів («Аналізуючи діаграму, ми бачимо...» замість калькованого «Аналізуючи
    діаграму, стає зрозуміло...»).'
  - 'Кліше для інтерпретації: Це означає, що..., Це свідчить про те, що...'
- section: Узагальнення та робота з джерелами
  words: 600
  points:
  - 'Вступні слова для посилань на джерела (вимоги CEFR B1): За даними..., Згідно
    з дослідженнями...'
  - 'Корекція російських кальок: чітке правило та приклади для «згідно з графіком»
    (орудний відмінок) та «відповідно до графіка» (родовий відмінок).'
  - 'Фрази для фіналізації: Отже..., Таким чином..., Підсумовуючи сказане...'
- section: 'Практика: Міні-презентація'
  words: 400
  points:
  - Описати симуляцію виступу (3-хвилинна презентація аналітичного звіту або рекламної
    кампанії).
  - Надати чекліст самооцінки на основі компетенцій Державного стандарту (§4.5.1)
    щодо офіційного спілкування та стилістики.
