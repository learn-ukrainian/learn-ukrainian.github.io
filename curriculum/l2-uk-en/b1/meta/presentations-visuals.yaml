slug: presentations-visuals
title: Презентації та візуалізація
word_target: 4000
content_outline:
  - section: Вступ (Introduction)
    words: 500
    points:
      - Роль презентацій у професійному та освітньому житті згідно з Державним стандартом
        (§3.9); перехід від традиційних доповідей «з папірця» до сучасного формату
        TEDxKyiv.
      - 'Культура публічних виступів в Україні: баланс між лаконічністю бізнес-форумів
        та академічною вимогливістю наукових кіл.'
  - section: Структура виступу та етикет (Presentation Structure & Etiquette)
    words: 800
    points:
      - 'Важливість офіційного звертання в українському контексті: використання фраз
        «шановні колеги», «пані та панове», «панство» для налаштування контакту.'
      - 'Мовні кліше для відкриття презентації: «Дозвольте представити...», «Темою
        моєї доповіді є...», «Перш за все, хочу подякувати...».'
      - 'Логічна побудова основної частини: використання переходів для підтримки уваги
        аудиторії та структурування аргументів.'
  - section: Опис візуальних даних (Describing Visual Data)
    words: 1000
    points:
      - 'Термінологічна точність: розрізнення понять «графік» (динаміка змін), «діаграма»
        (співвідношення часток) та «розклад» (schedule); робота з круговими та стовпчастими
        діаграмами.'
      - 'Граматична точність при описі тенденцій: критична різниця між «зрости на
        10%» (амплітуда зміни) та «зрости до 10%» (кінцевий рівень).'
      - 'Дієслова для опису динаміки: стрімко/поступово зростати, різко падати, знижуватися
        до мінімуму, залишатися стабільним.'
  - section: Мовні засоби презентатора (Linguistic Tools for Presenters)
    words: 700
    points:
      - 'Привернення та утримання уваги: використання конструкцій «Зверніть увагу
        на...», «Важливо наголосити, що...», «Подивіться на цей показник».'
      - 'Виправлення типової помилки з дієприслівниковими зворотами: drill конструкції
        «Аналізуючи діаграму, ми бачимо...» (суб''єкт — людина) замість помилкової
        «Аналізуючи діаграму, стає зрозуміло...».'
      - 'Пояснення та інтерпретація даних: фрази «Це означає, що...», «Це свідчить
        про те, що...», «З цього випливає...».'
  - section: Узагальнення та робота з джерелами (Summarizing & Working with Sources)
    words: 600
    points:
      - 'Синтез інформації з різних джерел згідно з вимогами CEFR B1: використання
        вставних слів «За даними...», «Згідно з дослідженнями...», «Відповідно до
        звіту...».'
      - 'Корекція калькування з російської: відпрацювання правильного вживання «згідно
        з графіком» (з орудним відмінком) або «відповідно до графіка» (з родовим відмінком)
        замість помилкового «згідно графіку».'
      - 'Ключові фрази для висновків та резюмування: «Отже...», «Таким чином...»,
        «Підсумовуючи сказане...», «На завершення хочу додати...».'
  - section: 'Практика: Міні-презентація (Practice: Mini-presentation)'
    words: 400
    points:
      - 'Симуляція виступу в ролі Креативного директора або Аналітика: підготовка
        та репетиція 3-хвилинної презентації з візуальним матеріалом.'
      - 'Чекліст самооцінки на основі компетенцій Державного стандарту (§4.5.1): перевірка
        дотримання літературних норм та стилістичної доречності.'
