version: '1.0'
module: text-compression
level: b1
inline:
  - id: act-1
    type: quiz
    title: Типи скорочень
    instruction: Оберіть правильне пояснення.
    items:
      - question: Що таке абревіатура?
        options:
          - слово або назва з початкових літер чи звуків кількох слів
          - будь-яке слово з емоційним забарвленням
          - речення без присудка
          - офіційна формула ввічливості
        correct: 0
        explanation: Абревіатура стискає довгу назву через літери або звуки.
      - question: Який приклад є складноскороченим словом із частин слів?
        options:
          - спецвипуск
          - ООН
          - вул.
          - 24.08.1991
        correct: 0
        explanation: Спецвипуск утворено від спеціальний випуск.
      - question: Яке скорочення пишемо без крапок між літерами?
        options:
          - ООН
          - О.О.Н.
          - О-О-Н.
          - О/О/Н
        correct: 0
        explanation: Ініціальні абревіатури українською пишемо без крапок.
      - question: Що означає розшифрувати абревіатуру?
        options:
          - назвати повну форму
          - поставити наголос
          - додати крапку
          - змінити регістр на розмовний
        correct: 0
        explanation: Розшифрувати означає відновити повну назву.
      - question: Який приклад є графічним скороченням?
        options:
          - вул.
          - ЗСУ
          - ЄС
          - Кабмін
        correct: 0
        explanation: Вул. існує як скорочення на письмі, а читається вулиця.
  - id: act-2
    type: match-up
    title: Розшифровуємо абревіатури
    instruction: Поєднайте скорочення з повною формою.
    pairs:
      - left: ЗСУ
        right: Збройні сили України
      - left: ООН
        right: Організація Об'єднаних Націй
      - left: ЗМІ
        right: засоби масової інформації
      - left: ЄС
        right: Європейський Союз
      - left: МВФ
        right: Міжнародний валютний фонд
      - left: СБУ
        right: Служба безпеки України
      - left: НБУ
        right: Національний банк України
      - left: ЦНАП
        right: центр надання адміністративних послуг
  - id: act-3
    type: fill-in
    title: Узгодження з абревіатурами
    instruction: Оберіть дієслово, яке граматично узгоджується з абревіатурою.
    items:
      - sentence: "ООН ____ про нову програму підтримки."
        answer: заявила
        options:
          - заявила
          - заявив
          - заявили
          - заявило
        explanation: Головне слово — організація, тому жіночий рід.
      - sentence: "ЄС ____ нові рекомендації."
        answer: ухвалив
        options:
          - ухвалив
          - ухвалила
          - ухвалили
          - ухвалило
        explanation: Головне слово — союз, тому чоловічий рід.
      - sentence: "ЗМІ ____ деталі події."
        answer: повідомили
        options:
          - повідомили
          - повідомила
          - повідомив
          - повідомило
        explanation: Засоби — множина.
      - sentence: "СБУ ____ про затримання."
        answer: повідомила
        options:
          - повідомила
          - повідомив
          - повідомили
          - повідомило
        explanation: Головне слово — служба, тому жіночий рід.
      - sentence: "ЗСУ ____ позиції."
        answer: утримали
        options:
          - утримали
          - утримала
          - утримав
          - утримало
        explanation: Сили — множина.
workbook:
  - id: wb-1
    type: group-sort
    title: Крапка чи без крапки
    instruction: Розподіліть скорочення за правилом написання.
    groups:
      - label: З крапкою
        items:
          - вул.
          - м.
          - с.
          - тис.
          - ст.
      - label: Без крапки
        items:
          - грн
          - кг
          - см
          - млн
          - км
  - id: wb-2
    type: cloze
    title: Новинний фрагмент
    instruction: Оберіть абревіатуру за змістом.
    text: "Українські {1} повідомили, що {2} ухвалив нові рекомендації. {3} заявила про підтримку гуманітарних програм, а {4} продовжили оборону міста."
    blanks:
      - id: 1
        answer: ЗМІ
        options:
          - ЗМІ
          - грн
          - вул.
          - кг
      - id: 2
        answer: ЄС
        options:
          - ЄС
          - б-ка
          - р-н
          - см
      - id: 3
        answer: ООН
        options:
          - ООН
          - ЦНАП
          - млн
          - ст.
      - id: 4
        answer: ЗСУ
        options:
          - ЗСУ
          - МВФ
          - вул.
          - грн
  - id: wb-3
    type: fill-in
    title: Читаємо числа
    instruction: Оберіть словесну форму, яка відповідає запису.
    items:
      - sentence: "1 грн = ____."
        answer: одна гривня
        options:
          - одна гривня
          - один гривень
          - одні гривні
          - одна гривень
        explanation: З числом 1 уживаємо форму одна гривня.
      - sentence: "2 грн = ____."
        answer: дві гривні
        options:
          - дві гривні
          - два гривня
          - дві гривень
          - двоє гривень
        explanation: Після 2 потрібна форма гривні.
      - sentence: "5 грн = ____."
        answer: п'ять гривень
        options:
          - п'ять гривень
          - п'ять гривні
          - п'ять гривня
          - п'ята гривня
        explanation: Після 5 — родовий множини гривень.
      - sentence: "70 кг = ____."
        answer: сімдесят кілограмів
        options:
          - сімдесят кілограмів
          - сімдесят кілограми
          - сімдесята кілограм
          - сімдесят кг.
        explanation: У вимові читаємо повну назву одиниці.
  - id: wb-4
    type: error-correction
    title: Виправляємо скорочення
    instruction: Виправте написання скорочень або узгодження.
    items:
      - sentence: "О.О.Н. заявила про підтримку."
        error: "крапки в абревіатурі"
        correction: "ООН заявила про підтримку."
        explanation: Ініціальні абревіатури пишемо без крапок.
      - sentence: "Квиток коштує 300 грн."
        error: "зайва крапка після грн"
        correction: "Квиток коштує 300 грн."
        explanation: Грн як валютне скорочення пишеться без крапки.
      - sentence: "Ми пройшли 10 км."
        error: "зайва крапка після км"
        correction: "Ми пройшли 10 км."
        explanation: Одиниці виміру пишуться без крапки.
      - sentence: "ЄС ухвалила рішення."
        error: "неправильне узгодження"
        correction: "ЄС ухвалив рішення."
        explanation: Європейський Союз — чоловічий рід.
      - sentence: "ЗМІ повідомило новину."
        error: "неправильне узгодження"
        correction: "ЗМІ повідомили новину."
        explanation: Засоби масової інформації — множина.
  - id: wb-5
    type: translate
    title: Скорочення в адресах і цінах
    instruction: Оберіть найкращий український запис.
    items:
      - source: 10 Shevchenko Street
        options:
          - text: "вул. Шевченка, 10"
            correct: true
          - text: "г. Шевченка, 10"
            correct: false
          - text: "вул Шевченка, 10 грн"
            correct: false
          - text: "км Шевченка, 10"
            correct: false
        explanation: В адресі вулиця скорочується як вул.
      - source: 250 hryvnias
        options:
          - text: "250 грн"
            correct: true
          - text: "250 грн."
            correct: false
          - text: "250 гривень грн"
            correct: false
          - text: "250 г."
            correct: false
        explanation: Грн пишемо без крапки й не дублюємо повну назву.
      - source: 15 centimeters
        options:
          - text: "15 см"
            correct: true
          - text: "15 см."
            correct: false
          - text: "15 с."
            correct: false
          - text: "15 м."
            correct: false
        explanation: См як одиниця виміру пишеться без крапки.
  - id: wb-6
    type: true-false
    title: Правила скорочень
    instruction: Визначте, чи твердження правильне.
    items:
      - statement: Графічне скорочення вул. під час читання вимовляємо як вулиця.
        correct: true
        explanation: Воно скорочене тільки на письмі.
      - statement: Скорочення кг пишеться з крапкою.
        correct: false
        explanation: Одиниці виміру пишуться без крапки.
      - statement: ООН узгоджується як жіночий рід, бо головне слово — організація.
        correct: true
        explanation: Тому природно ООН заявила.
      - statement: У даті 24 серпня слово серпня стоїть у родовому відмінку.
        correct: true
        explanation: Після числа в даті потрібен родовий місяця.
      - statement: ЗСУ в реченні зазвичай узгоджується як однина середнього роду.
        correct: false
        explanation: Збройні сили — множина.
