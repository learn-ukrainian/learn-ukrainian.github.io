version: '1.0'
module: prepositions-spatial-review
level: b1
inline:
  - id: act-1
    type: quiz
    title: Карта відмінків
    instruction: Оберіть правильне керування або форму після просторового прийменника.
    items:
      - question: Який відмінок потрібний після біля?
        options:
          - родовий
          - орудний
          - місцевий
        correct: 0
        explanation: Кажемо біля школи, біля вокзалу, біля мене.
      - question: Яке речення правильне?
        options:
          - Аптека навпроти вокзалу.
          - Аптека навпроти вокзал.
          - Аптека навпроти вокзалом.
        correct: 0
        explanation: Навпроти керує родовим відмінком.
      - question: Який відмінок потрібний після між у стандартному просторовому описі?
        options:
          - орудний
          - родовий
          - давальний
        correct: 0
        explanation: Кажемо між будинками, між нами, між аптекою і банком.
      - question: Де правильно показано місце?
        options:
          - Кіт сидить під столом.
          - Кіт сидить під стіл.
          - Кіт сидить під столу.
        correct: 0
        explanation: Питання де? після під дає орудний.
      - question: Де правильно показано напрямок?
        options:
          - Кіт заліз під стіл.
          - Кіт заліз під столом.
          - Кіт заліз під столу.
        correct: 0
        explanation: Питання куди? після під дає знахідний.
      - question: Яке речення правильно вживає поруч?
        options:
          - Поруч із будинком є сквер.
          - Поруч будинку є сквер.
          - Поруч із будинку є сквер.
        correct: 0
        explanation: У цьому модулі тримаємо нейтральну модель поруч із + орудний.
      - question: Яке речення має родовий після з-за?
        options:
          - Автобус виїхав з-за рогу.
          - Автобус виїхав з-за ріг.
          - Автобус виїхав з-за рогом.
        correct: 0
        explanation: З-за відповідає на питання звідки? і керує родовим.
      - question: Який варіант розрізняє простір і причину?
        options:
          - Сонце вийшло з-за хмар, але ми спізнилися через дощ.
          - Сонце вийшло через хмари, але ми спізнилися із-за дощу.
          - Сонце вийшло з-за хмара, але ми спізнилися з-за дощ.
        correct: 0
        explanation: З-за лишається просторовим, а причину краще передає через.
      - question: Де слово навпроти є прислівником?
        options:
          - Він сидів навпроти.
          - Він сидів навпроти школи.
          - Аптека навпроти вокзалу.
        correct: 0
        explanation: Прислівник стоїть самостійно, без керованого іменника.
      - question: Яке речення правильно описує простір навколо?
        options:
          - Навколо будинку є паркан.
          - Навколо будинок є паркан.
          - Навколо будинком є паркан.
        correct: 0
        explanation: Навколо керує родовим відмінком.
      - question: Де правильно вжито перед?
        options:
          - Перед входом стояла черга.
          - Перед входу стояла черга.
          - Перед вхід стояла черга.
        correct: 0
        explanation: Перед у просторовому значенні керує орудним.
      - question: Який варіант правильно описує країну?
        options:
          - Я живу в Україні і їду в Україну.
          - Я живу на Україні і їду на Україну.
          - Я живу при Україні і їду до Україну.
        correct: 0
        explanation: Для держави Україна вживаємо в Україні, в Україну, з України.
  - id: act-2
    type: fill-in
    title: Родовий простір
    instruction: Вставте форму, яка відповідає прийменнику з родовим відмінком.
    items:
      - sentence: "Біля ____ стоїть велосипед."
        answer: школи
        options:
          - школи
          - школа
          - школою
        explanation: Біля керує родовим.
      - sentence: "Навпроти ____ відкрили аптеку."
        answer: вокзалу
        options:
          - вокзалу
          - вокзал
          - вокзалом
        explanation: Навпроти вимагає родового.
      - sentence: "Серед ____ стояла стара лавка."
        answer: дерев
        options:
          - дерев
          - дерева
          - деревами
        explanation: Серед керує родовим множини.
      - sentence: "Посеред ____ лежав килим."
        answer: кімнати
        options:
          - кімнати
          - кімната
          - кімнатою
        explanation: Посеред керує родовим.
      - sentence: "Довкола ____ росли верби."
        answer: озера
        options:
          - озера
          - озеро
          - озером
        explanation: Довкола вимагає родового.
      - sentence: "Навколо ____ поставили паркан."
        answer: будинку
        options:
          - будинку
          - будинок
          - будинком
        explanation: Навколо керує родовим.
      - sentence: "Позаду ____ є тихий двір."
        answer: будинку
        options:
          - будинку
          - будинок
          - будинком
        explanation: Позаду з іменником керує родовим.
      - sentence: "Попереду ____ йшла екскурсоводка."
        answer: групи
        options:
          - групи
          - група
          - групою
        explanation: Попереду кого? чого? потребує родового.
      - sentence: "Обабіч ____ росли каштани."
        answer: дороги
        options:
          - дороги
          - дорога
          - дорогою
        explanation: Обабіч керує родовим.
      - sentence: "Неподалік від ____ є готель."
        answer: вокзалу
        options:
          - вокзалу
          - вокзал
          - вокзалом
        explanation: Від вимагає родового.
      - sentence: "З-під ____ вибіг кіт."
        answer: лавки
        options:
          - лавки
          - лавка
          - лавкою
        explanation: З-під керує родовим.
      - sentence: "З-поміж ____ видно купол."
        answer: будинків
        options:
          - будинків
          - будинки
          - будинками
        explanation: З-поміж відповідає на питання звідки? і бере родовий.
  - id: act-3
    type: group-sort
    title: Три просторові моделі
    instruction: Розподіліть фрази за моделлю керування.
    groups:
      - label: Родовий відмінок
        items:
          - біля вокзалу
          - серед дерев
          - навпроти школи
          - довкола озера
      - label: Орудний відмінок
        items:
          - між будинками
          - над столом
          - перед входом
          - поруч із нами
      - label: Знахідний для напрямку
        items:
          - під стіл
          - за будинок
          - у парк
          - на площу
  - id: act-4
    type: cloze
    title: Прийменник чи прислівник
    instruction: Оберіть слово або форму, яка робить текст граматично точним.
    text: "Навпроти {1} є маленька кав'ярня. Учора ми сиділи {2}, бо всі столики біля вікна були зайняті. Поруч {3} стояла синя шафа, а рюкзак лежав {4}. Позаду {5} висіла куртка. Коли ми зайшли {6}, офіціант попросив поставити сумку {7}. Довкола {8} росли каштани, але {9} було тихо. З-за {10} виїхав трамвай, а ми спізнилися не з-за погоди, а {11}. Наприкінці ми зустрілися {12}."
    blanks:
      - id: 1
        answer: вокзалу
        options:
          - вокзалу
          - вокзал
          - вокзалом
      - id: 2
        answer: навпроти
        options:
          - навпроти
          - навпроти вокзал
          - навпроти вокзалом
      - id: 3
        answer: із дверима
        options:
          - із дверима
          - дверей
          - двері
      - id: 4
        answer: під столом
        options:
          - під столом
          - під стіл
          - під столу
      - id: 5
        answer: дверей
        options:
          - дверей
          - двері
          - дверима
      - id: 6
        answer: у зал
        options:
          - у зал
          - у залі
          - залом
      - id: 7
        answer: під стіл
        options:
          - під стіл
          - під столом
          - під столу
      - id: 8
        answer: будинку
        options:
          - будинку
          - будинок
          - будинком
      - id: 9
        answer: довкола
        options:
          - довкола
          - довкола будинку
          - довкола будинком
      - id: 10
        answer: рогу
        options:
          - рогу
          - ріг
          - рогом
      - id: 11
        answer: через затор
        options:
          - через затор
          - із-за затору
          - з-за затор
      - id: 12
        answer: біля метро
        options:
          - біля метро
          - біля метром
          - поруч метро
  - id: act-5
    type: error-correction
    title: Редактор простору
    instruction: Знайдіть помилкову частину й замініть її правильною формою.
    items:
      - sentence: "Кав'ярня стоїть біля школа."
        error: школа
        correction: школи
        error_type: word
        explanation: Біля керує родовим.
      - sentence: "Аптека навпроти вокзал."
        error: вокзал
        correction: вокзалу
        error_type: word
        explanation: Навпроти керує родовим.
      - sentence: "Лавка стоїть між дерева."
        error: дерева
        correction: деревами
        error_type: word
        explanation: Між у стандартному просторовому описі керує орудним.
      - sentence: "Сумка лежить під стіл."
        error: під стіл
        correction: під столом
        error_type: phrase
        explanation: Лежить відповідає на питання де?, тому потрібен орудний.
      - sentence: "Постав сумку під столом."
        error: під столом
        correction: під стіл
        error_type: phrase
        explanation: Постав відповідає на питання куди?, тому потрібен знахідний.
      - sentence: "За будинок є сад."
        error: За будинок
        correction: За будинком
        error_type: phrase
        explanation: Є сад де? за будинком.
      - sentence: "Зайдіть за будинком."
        error: за будинком
        correction: за будинок
        error_type: phrase
        explanation: Зайдіть куди? за будинок.
      - sentence: "Перед входу стояла черга."
        error: входу
        correction: входом
        error_type: word
        explanation: Перед керує орудним.
      - sentence: "Поруч будинку є сквер."
        error: Поруч будинку
        correction: Поруч із будинком
        error_type: phrase
        explanation: Цільова нейтральна модель цього модуля - поруч із + орудний.
      - sentence: "Ми спізнилися із-за дощу."
        error: із-за дощу
        correction: через дощ
        error_type: phrase
        explanation: Причину передаємо через, а з-за лишається просторовим.
      - sentence: "Я живу на Україні."
        error: на Україні
        correction: в Україні
        error_type: phrase
        explanation: Для держави Україна вживаємо в Україні.
      - sentence: "З-під стіл витекла вода."
        error: стіл
        correction: столу
        error_type: word
        explanation: З-під керує родовим.
workbook:
  - id: wb-1
    type: quiz
    title: Вибір прийменника
    instruction: Оберіть найприродніший просторовий прийменник або пояснення.
    items:
      - question: Який прийменник найточніше означає "opposite the station"?
        options:
          - навпроти вокзалу
          - серед вокзалу
          - під вокзалом
        correct: 0
        explanation: Навпроти означає з протилежного боку.
      - question: Який варіант описує об'єкт у центрі кімнати?
        options:
          - посеред кімнати
          - попереду кімнати
          - з-під кімнати
        correct: 0
        explanation: Посеред підкреслює центр простору.
      - question: Що означає обабіч дороги?
        options:
          - по обидва боки дороги
          - під дорогою
          - далеко від дороги
        correct: 0
        explanation: Обабіч означає з двох боків.
      - question: Де прийменник показує джерело знизу?
        options:
          - з-під ліжка
          - під ліжком
          - під ліжко
        correct: 0
        explanation: З-під відповідає на питання звідки?
      - question: Де правильно передано "from behind the corner"?
        options:
          - з-за рогу
          - за рогом
          - за ріг
        correct: 0
        explanation: З-за рогу показує вихід з позиції позаду.
      - question: Який варіант має орудний після поруч із?
        options:
          - поруч із нами
          - поруч нас
          - поруч нам
        correct: 0
        explanation: З/із/зі в цій конструкції керує орудним.
      - question: Яке речення правильно розрізняє місце й напрямок?
        options:
          - Кіт сидить під ліжком, а потім заліз під ліжко.
          - Кіт сидить під ліжко, а потім заліз під ліжком.
          - Кіт сидить з-під ліжка, а потім заліз під ліжком.
        correct: 0
        explanation: Де? під ліжком; куди? під ліжко.
      - question: Де слово позаду є прийменником?
        options:
          - Позаду будинку є сад.
          - Сад був позаду.
          - Я йшов позаду.
        correct: 0
        explanation: Є кероване слово будинку.
      - question: Де слово навколо є прислівником?
        options:
          - Навколо було тихо.
          - Навколо будинку тихо.
          - Навколо площі їздять трамваї.
        correct: 0
        explanation: Немає керованого іменника.
      - question: Яке твердження правильне?
        options:
          - Якщо змінюємо біля на поруч із, часто змінюється і відмінок.
          - Біля і поруч із завжди мають однаковий відмінок.
          - Поруч із вимагає родового, бо означає близькість.
        correct: 0
        explanation: Біля бере родовий, а поруч із - орудний після із.
      - question: Де причина передана нормативно?
        options:
          - через затримку
          - із-за затримки
          - з-за затримка
        correct: 0
        explanation: Для причини використовуємо через.
      - question: Який варіант природний для держави?
        options:
          - подорожувати в Україну
          - подорожувати на Україну
          - подорожувати Україною в Україну до
        correct: 0
        explanation: Напрямок до держави Україна передаємо в Україну.
  - id: wb-2
    type: match-up
    title: Синоніми і відтінки
    instruction: Поєднайте прийменник або фразу з найточнішим поясненням.
    pairs:
      - left: біля школи
        right: нейтрально поряд зі школою
      - left: коло хати
        right: поряд із хатою, часто розмовно або регіонально
      - left: поблизу університету
        right: недалеко від університету
      - left: неподалік від вокзалу
        right: не на великій відстані від вокзалу
      - left: навпроти театру
        right: з протилежного боку від театру
      - left: серед людей
        right: усередині групи людей
      - left: посеред площі
        right: у центрі площі
      - left: довкола озера
        right: навкруг озера
      - left: обабіч дороги
        right: по обидва боки дороги
      - left: між будинками
        right: у проміжку між будинками
      - left: з-під ліжка
        right: з простору під ліжком
      - left: з-поміж дерев
        right: із групи або простору серед дерев
  - id: wb-3
    type: group-sort
    title: Прийменник чи прислівник
    instruction: Розподіліть речення за роллю виділеного просторового слова.
    groups:
      - label: Прийменник із родовим
        items:
          - Кав'ярня навпроти вокзалу.
          - Довкола хати росли квіти.
          - Попереду групи йшов гід.
          - Позаду будинку є двір.
      - label: Прийменникова конструкція з орудним
        items:
          - Поруч із вікном стоїть стіл.
          - Між шафою і дверима є прохід.
          - Переді мною сиділа студентка.
          - За нами стояла черга.
      - label: Прислівник без керованого слова
        items:
          - Він сів навпроти.
          - Сестра стояла поруч.
          - Довкола було тихо.
          - Я піду попереду.
  - id: wb-4
    type: fill-in
    title: Орудний і напрямок
    instruction: Оберіть форму, яка відповідає питанню де? або куди?
    items:
      - sentence: "Між ____ і банком є вузький прохід."
        answer: аптекою
        options:
          - аптекою
          - аптеки
          - аптеку
        explanation: Між керує орудним.
      - sentence: "Над ____ висить лампа."
        answer: столом
        options:
          - столом
          - столу
          - стіл
        explanation: Над керує орудним.
      - sentence: "Перед ____ стояла черга."
        answer: входом
        options:
          - входом
          - входу
          - вхід
        explanation: Перед керує орудним.
      - sentence: "Поруч із ____ стоїть велосипед."
        answer: дверима
        options:
          - дверима
          - дверей
          - двері
        explanation: Поруч із бере орудний після із.
      - sentence: "Сумка лежить під ____."
        answer: столом
        options:
          - столом
          - стіл
          - столу
        explanation: Лежить де? під столом.
      - sentence: "Поставте сумку під ____."
        answer: стіл
        options:
          - стіл
          - столом
          - столу
        explanation: Поставте куди? під стіл.
      - sentence: "За ____ починається парк."
        answer: школою
        options:
          - школою
          - школи
          - школу
        explanation: Починається де? за школою.
      - sentence: "Поверніть за ____."
        answer: ріг
        options:
          - ріг
          - рогу
          - рогом
        explanation: Поверніть куди? за ріг.
      - sentence: "Ми гуляли під ____."
        answer: мостом
        options:
          - мостом
          - міст
          - мосту
        explanation: Гуляли де? під мостом.
      - sentence: "Ми зайшли під ____."
        answer: міст
        options:
          - міст
          - мостом
          - мосту
        explanation: Зайшли куди? під міст.
      - sentence: "Понад ____ тягнулася стежка."
        answer: берегом
