  - id: wb-8
    type: essay-response
    title: Власна карта
    instruction: Опишіть реальну або уявну кімнату, вулицю чи маршрут.
    prompt: >
      Напишіть 140-180 слів українською. Використайте щонайменше десять різних
      просторових прийменників: три з родовим, три з орудним, одну пару місце /
      напрямок на зразок під столом / під стіл або за будинком / за будинок, одну
      форму з-під або з-за, і одну пару прийменник / прислівник на зразок
      навпроти школи / сидіти навпроти. Після тексту випишіть п'ять конструкцій
      і назвіть відмінок після прийменника.
    min_words: 140
    rubric:
      - criteria: Обсяг
        description: Текст має 140-180 слів і описує одну зрозумілу сцену або маршрут.
        points: 1
      - criteria: Родовий
        description: Є щонайменше три правильні конструкції з родовим.
        points: 1
      - criteria: Орудний
        description: Є щонайменше три правильні конструкції з орудним.
        points: 1
      - criteria: Місце і напрямок
        description: Є контраст де? / куди? з правильною зміною відмінка.
        points: 1
      - criteria: Складний прийменник
        description: Є правильна форма з-під, з-за або з-поміж.
        points: 1
      - criteria: Прийменник і прислівник
        description: Є одна пара, де просторове слово вжито з іменником і самостійно.
        points: 1
      - criteria: Самопояснення
        description: Після тексту виписано п'ять конструкцій і названо відмінки.
        points: 1
