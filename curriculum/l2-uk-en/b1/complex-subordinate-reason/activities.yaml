  - id: wb-5
    type: essay-response
    title: Обґрунтуйте рішення
    instruction: "Напишіть 8-10 речень українською."
    prompt: "Опишіть навчальну, робочу або громадську ситуацію, у якій план змінився. Поясніть причини змін. Використайте щонайменше п'ять причинних сполучників або фраз: бо, тому що, оскільки, через те що, завдяки тому що, у зв'язку з тим що, адже. Додайте одну пару, де ви розрізняєте причину й умову."
    min_words: 120
    model_answer: >-
      Наша команда спершу планувала провести зустріч у бібліотеці, але місце
      довелося змінити, тому що там почався ремонт. Оскільки дедлайн
      наближався, ми не стали чекати й одразу написали до молодіжного центру.
      Через те що частина учасників навчалася до третьої години, початок
      зустрічі перенесли на вечір. Я підтримав це рішення тому, що воно було
      реалістичне, а не тому, що мені просто хотілося пізніше прийти. Завдяки
      тому що координаторка мала список контактів, нову залу знайшли швидко.
      У зв'язку з тим що очікували багато людей, усіх попросили прийти раніше
      й допомогти з меблями. Ми не скасували подію, бо кожен узяв частину
      роботи на себе. Якщо завтра знову вимкнуть світло, ми перенесемо частину
      програми онлайн; але сьогодні ми змінили план не через умову, а через
      конкретну причину. Варто було все пояснити в листі, адже учасники краще
      реагують, коли розуміють підстави рішення.
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "8-10 речень і щонайменше 120 слів."
      - criteria: "Причинні сполучники"
        points: 3
        description: "Є щонайменше п'ять різних причинних сполучників або фраз."
      - criteria: "Стиль"
        points: 2
        description: "Сполучники відповідають ситуації: розмовній, нейтральній або офіційній."
      - criteria: "Причина і умова"
        points: 3
        description: "Є хоча б одна пара або пояснення, де причина відрізнена від умови."
      - criteria: "Пунктуація"
        points: 3
        description: "Коми перед причинними підрядними та в розщеплених конструкціях поставлено правильно."
