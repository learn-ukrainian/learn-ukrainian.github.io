version: '1.0'
module: complex-subordinate-reason
level: b1
inline:
  - id: act-1
    type: quiz
    title: "Читання: волонтерський ярмарок"
    instruction: "Прочитайте текст перед вправою і оберіть правильне пояснення."
    items:
      - question: "Чому першу зустріч перенесли?"
        options:
          - "Бо частина учасників не встигла повернутися з навчання"
          - "Бо афіші вже були готові"
          - "Бо ярмарок закінчився раніше"
        correct: 0
        explanation: "Бо вводить конкретну причину перенесення зустрічі."
      - question: "Який сполучник у тексті звучить офіційніше й стоїть на початку речення?"
        options:
          - "Оскільки"
          - "Бо"
          - "Коли"
        correct: 0
        explanation: "Оскільки часто відкриває офіційне або нейтрально-книжне пояснення."
      - question: "Через те що афіші надрукували з помилкою, дизайнерка:"
        options:
          - "підготувала новий макет"
          - "перенесла бібліотеку"
          - "скасувала список завдань"
        correct: 0
        explanation: "Через те що подає помилку як причину нової дії."
      - question: "Чому волонтери не панікували?"
        options:
          - "Тому що вже мали спільний список завдань"
          - "Тому що не було відвідувачів"
          - "Тому що залу не ремонтували"
        correct: 0
        explanation: "Тому що вводить нейтральне пояснення."
      - question: "Яка конструкція називає позитивну причину успіху?"
        options:
          - "Завдяки тому що сусіди принесли додаткові столи..."
          - "Через те що афіші надрукували з помилкою..."
          - "Бо частина учасників не встигла..."
        correct: 0
        explanation: "Завдяки тому що підкреслює позитивний чинник."
      - question: "У зв'язку з тим що очікували багато відвідувачів, координаторка:"
        options:
          - "попросила всіх прийти раніше"
          - "закрила молодіжний центр"
          - "переписала план курсу"
        correct: 0
        explanation: "Офіційна фраза пояснює організаційне рішення."
      - question: "Фраза не тому, що все було ідеально, а тому, що... показує:"
        options:
          - "розщеплену конструкцію з логічним наголосом"
          - "часову послідовність"
          - "означальну підрядну частину"
        correct: 0
        explanation: "Тому належить до головної частини, а кома стоїть перед що."
      - question: "Яке питання найкраще ставити до причинної підрядної частини?"
        options:
          - "Чому?"
          - "Коли?"
          - "Який?"
        correct: 0
        explanation: "Причинні речення відповідають на чому? через що? з якої причини?"
      - question: "Чому команда знайшла інше місце для ярмарку?"
        options:
          - "Оскільки залу в бібліотеці ремонтували"
          - "Оскільки презентацію зберегли"
          - "Оскільки поїзд зупинився"
        correct: 0
        explanation: "Підрядна частина з оскільки пояснює причину зміни місця."
      - question: "Який сполучник у тексті найкраще підходить для ділового повідомлення?"
        options:
          - "У зв'язку з тим що"
          - "Бо"
          - "Як тільки"
        correct: 0
        explanation: "У зв'язку з тим що належить до офіційного стилю."
      - question: "Що саме пояснює підрядна частина у причинному реченні?"
        options:
          - "Усю головну подію"
          - "Лише один іменник"
          - "Тільки майбутній час"
        correct: 0
        explanation: "Причина стосується головної частини в цілому."
      - question: "Який висновок робить команда наприкінці тексту?"
        options:
          - "Подія вдалася завдяки швидким поясненням причин і рішенням"
          - "Подія вдалася тому, що проблем не було"
          - "Подію перенесли на інший місяць"
        correct: 0
        explanation: "Текст підкреслює не ідеальність, а здатність пояснювати й вирішувати проблеми."
  - id: act-2
    type: quiz
    title: Сполучник і стиль
    instruction: "Оберіть найприродніший причинний сполучник для ситуації."
    items:
      - question: "Дружнє повідомлення: Не прийду, ____ ще на роботі."
        options:
          - "бо"
          - "у зв'язку з тим що"
          - "з тієї причини що"
        correct: 0
        explanation: "У короткому дружньому повідомленні найприродніше бо."
      - question: "Нейтральний лист викладачці: Прошу перенести консультацію, ____ маю медичний запис."
        options:
          - "тому що"
          - "коли"
          - "який"
        correct: 0
        explanation: "Тому що звучить нейтрально й доречно."
      - question: "Офіційне оголошення: ____ в будівлі триває ремонт, вхід перенесено."
        options:
          - "Оскільки"
          - "Бо"
          - "Поки"
        correct: 0
        explanation: "Оскільки добре працює на початку офіційного пояснення."
      - question: "Проблема як перешкода: ____ система не працювала, клієнти не могли оплатити квитки."
        options:
          - "Через те що"
          - "Завдяки тому що"
          - "Щойно"
        correct: 0
        explanation: "Через те що часто підкреслює перешкоду."
      - question: "Позитивна причина: ____ сусіди допомогли, ми швидко прибрали двір."
        options:
          - "Завдяки тому що"
          - "Через те що"
          - "Поки не"
        correct: 0
        explanation: "Завдяки тому що називає позитивний чинник."
      - question: "Дуже офіційне повідомлення: ____ систему оновлюють, сервіс тимчасово недоступний."
        options:
          - "У зв'язку з тим що"
          - "Бо"
          - "Доки"
        correct: 0
        explanation: "Це типова ділова формула."
      - question: "Аргумент у виступі: Варто перевірити адресу, ____ маршрут змінився."
        options:
          - "адже"
          - "коли"
          - "який"
        correct: 0
        explanation: "Адже додає аргумент або нагадує причину."
      - question: "Нейтральне пояснення: Команда змінила план, ____ нові дані суперечили старим."
        options:
          - "тому що"
          - "щоб"
          - "де"
        correct: 0
        explanation: "Тому що універсальне для нейтрального пояснення."
      - question: "Розмовна відповідь: Чому ти не відповів? - ____ був у метро."
        options:
          - "Бо"
          - "Оскільки"
          - "У зв'язку з тим що"
        correct: 0
        explanation: "Коротка відповідь природно починається з Бо."
      - question: "Академічний текст: ____ вибірка була невеликою, результати треба перевірити."
        options:
          - "Оскільки"
          - "Бо"
          - "Як тільки"
        correct: 0
        explanation: "Оскільки пасує до академічного регістру."
      - question: "Негативна причина: ____ сталася аварія, рух зупинили."
        options:
          - "Через те що"
          - "Завдяки тому що"
          - "Відколи"
        correct: 0
        explanation: "Для негативної причини не вживаємо завдяки."
      - question: "Пояснення з протиставленням: Я підтримав пропозицію ____ вона реалістична, а не популярна."
        options:
          - "тому, що"
          - "тому що"
          - "коли"
        correct: 0
        explanation: "Розщеплення підкреслює саме причину."
  - id: act-3
    type: match-up
    title: Сполучник і функція
    instruction: "Поєднайте речення з поясненням причинного зв'язку."
    pairs:
      - left: "Я залишився удома, бо захворів."
        right: "коротке повсякденне пояснення"
      - left: "Зустріч перенесли, тому що модераторка захворіла."
        right: "нейтральна причина факту"
      - left: "Оскільки документи неповні, заявку повернули."
        right: "офіційна причина перед головною частиною"
      - left: "Через те що дорогу ремонтували, автобус змінив маршрут."
        right: "причина як зовнішня перешкода"
      - left: "Завдяки тому що волонтери допомогли, залу підготували швидко."
        right: "позитивна причина результату"
      - left: "У зв'язку з тим що систему оновлюють, сервіс недоступний."
        right: "дуже офіційне повідомлення"
      - left: "Я зробив це тому, що це було необхідно."
        right: "розщеплена конструкція з наголосом"
      - left: "Матч перенесли через те, що поле було небезпечним."
        right: "розщеплення після через те"
      - left: "Не відкладайте реєстрацію, адже місць мало."
        right: "аргументативне пояснення"
      - left: "Ми не вийшли, бо почалася гроза."
        right: "причина, а не умова"
      - left: "Ми не вийдемо, якщо почнеться гроза."
        right: "умова, а не причина"
      - left: "Ми прийшли раніше, щоб підготувати залу."
        right: "мета, а не причина"
  - id: act-4
    type: fill-in
    title: Вставте причинний сполучник
    instruction: "Оберіть сполучник або сполучну фразу, що найкраще передає причину."
    items:
      - sentence: "Ми залишилися вдома, ____ почався сильний дощ."
        answer: "бо"
        options:
          - "бо"
          - "коли"
          - "щоб"
        explanation: "Бо вводить просту причину."
      - sentence: "Зустріч перенесли, ____ викладачка проводить іспит."
        answer: "тому що"
        options:
          - "тому що"
          - "поки"
          - "який"
        explanation: "Тому що нейтрально пояснює причину."
      - sentence: "____ дедлайн наближався, команда перевірила кожну таблицю."
        answer: "Оскільки"
        options:
          - "Оскільки"
          - "Бо"
          - "День"
        explanation: "Початкове оскільки природне в офіційному поясненні."
      - sentence: "____ дорогу ремонтували, автобус змінив маршрут."
        answer: "Через те що"
        options:
          - "Через те що"
          - "Завдяки тому що"
          - "Щойно"
        explanation: "Йдеться про перешкоду."
      - sentence: "____ сусіди допомогли, ми швидко прибрали подвір'я."
        answer: "Завдяки тому що"
        options:
          - "Завдяки тому що"
          - "Через те що"
          - "Поки не"
        explanation: "Допомога - позитивна причина."
      - sentence: "____ систему оновлюють, сервіс тимчасово недоступний."
        answer: "У зв'язку з тим що"
        options:
          - "У зв'язку з тим що"
          - "Бо"
          - "Як тільки"
        explanation: "Це офіційне повідомлення."
      - sentence: "Я підтримав рішення ____, що воно реалістичне."
        answer: "тому"
        options:
          - "тому"
          - "коли"
          - "доки"
        explanation: "Розщеплена конструкція: тому, що."
      - sentence: "Матч перенесли через ____, що поле було небезпечним."
        answer: "те"
        options:
          - "те"
          - "коли"
          - "щойно"
        explanation: "Через те, що - розщеплена модель із наголосом."
      - sentence: "Варто перепитати адресу, ____ маршрут змінився."
        answer: "адже"
        options:
          - "адже"
          - "поки"
          - "щоб"
        explanation: "Адже додає аргумент."
      - sentence: "Не пишіть завдяки тому що, якщо причина ____."
        answer: "негативна"
        options:
          - "негативна"
          - "позитивна"
          - "часова"
        explanation: "Для негативної причини краще через те що."
      - sentence: "Причинна підрядна частина відповідає на питання ____."
        answer: "чому?"
        options:
          - "чому?"
          - "коли?"
          - "який?"
        explanation: "Причина пояснює підставу дії."
      - sentence: "У реченні Візьми пальто, якщо буде холодно підрядна частина виражає ____."
        answer: "умову"
        options:
          - "умову"
          - "причину"
          - "означення"
        explanation: "Якщо вводить можливість, а не відому причину."
  - id: act-5
    type: error-correction
    title: Виправте причинові речення
    instruction: "Знайдіть помилку в кожному реченні й запишіть природний варіант."
    items:
      - sentence: "Я не прийшов бо захворів."
        error: "прийшов бо"
        correction: "прийшов, бо"
        error_type: construction
        explanation: "Перед бо потрібна кома."
      - sentence: "Бо захворів, я не прийшов."
        error: "Бо"
        correction: "Оскільки"
        error_type: word
        explanation: "На початку речення природніше оскільки."
      - sentence: "Ми змінили маршрут, якщо дорогу перекрили."
        error: "якщо"
        correction: "бо"
        error_type: word
        explanation: "Причина - відомий факт, не умова."
      - sentence: "Я прийшов раніше, бо підготувати залу."
        error: "бо"
        correction: "щоб"
        error_type: word
        explanation: "Тут потрібна мета, а не причина."
      - sentence: "Завдяки тому що сталася аварія, рух зупинили."
        error: "Завдяки тому що"
        correction: "Через те що"
        error_type: phrase
        explanation: "Завдяки тому що вживаємо для позитивної причини."
      - sentence: "Я підтримав рішення тому що воно реалістичне, а не популярне."
        error: "тому що"
        correction: "тому, що"
        error_type: construction
        explanation: "За протиставлення потрібна розщеплена конструкція."
      - sentence: "Оскільки дедлайн наближався команда перевірила таблиці."
        error: "наближався команда"
        correction: "наближався, команда"
        error_type: construction
        explanation: "Початкова підрядна частина відокремлюється комою."
      - sentence: "Не піду в кіно, у зв'язку з тим що втомився."
        error: "у зв'язку з тим що"
        correction: "бо"
        error_type: phrase
        explanation: "Для побутової розмови офіційна фраза занадто важка."
      - sentence: "Зустріч перенесли, тому, що модераторка захворіла."
        error: "тому, що"
        correction: "тому що"
        error_type: construction
        explanation: "Без логічного наголосу сполучник не розщеплюємо."
      - sentence: "Ми залишилися вдома, коли почався дощ."
        error: "коли"
        correction: "бо"
        error_type: word
        explanation: "Якщо треба пояснити рішення, потрібна причина."
      - sentence: "Через те що сусіди допомогли, ми швидко завершили ремонт."
        error: "Через те що"
        correction: "Завдяки тому що"
        error_type: phrase
        explanation: "Допомога є позитивною причиною."
      - sentence: "Причинна частина пояснює тільки слово зустріч."
        error: "тільки слово зустріч"
        correction: "всю головну частину"
        error_type: phrase
        explanation: "Питання ставимо до всієї події: чому?"
workbook:
  - id: wb-1
    type: group-sort
    title: Розсортуйте причинові зв'язки
    instruction: "Перетягніть речення до групи за значенням або стилем сполучника."
    groups:
      - label: "Розмовно або нейтрально"
        items:
          - "Я не відповів, бо був у метро."
          - "Ми зачекали, тому що поїзд запізнювався."
          - "Вона не прийшла, бо захворіла."
      - label: "Офіційно або книжно"
        items:
          - "Оскільки документи неповні, заявку повернули."
          - "У зв'язку з тим що систему оновлюють, сервіс недоступний."
          - "Оскільки вибірка невелика, висновки обережні."
      - label: "Перешкода або негативна причина"
        items:
          - "Через те що сервер не працював, користувачі чекали."
          - "Через те що поле було небезпечним, матч перенесли."
          - "Через те що дані надійшли пізно, звіт затримали."
      - label: "Позитивна причина"
        items:
          - "Завдяки тому що волонтери допомогли, ярмарок відкрився вчасно."
          - "Завдяки тому що сусіди принесли столи, усім вистачило місця."
          - "Завдяки тому що команда швидко відреагувала, проблему вирішили."
  - id: wb-2
    type: cloze
    title: Відновіть пояснення причин
    instruction: "Заповніть 12 пропусків причинними сполучниками або словами."
    text: "____ команда отримала нові дані, вона змінила план презентації. Ми не почали зустріч вчасно, ____ частина учасників запізнилася. Залу довелося шукати заново, ____ бібліотеку ремонтували. ____ сусіди принесли додаткові столи, ярмарок відкрився без затримки. ____ систему оновлюють, сервіс тимчасово недоступний. Я підтримав пропозицію ____, що вона реалістична, а не тому, що вона популярна. Матч перенесли через ____, що поле було небезпечним. Варто перевірити адресу, ____ маршрут змінився. Ми не вийшли на прогулянку, ____ почалася гроза. Ми не вийдемо, ____ почнеться гроза. Студентка попросила додатковий день, ____ не мала доступу до архіву. Не пишіть завдяки тому що, якщо причина ____."
    blanks:
      - id: 1
        answer: "Оскільки"
        options: ["Оскільки", "Коли", "Щоб"]
      - id: 2
        answer: "бо"
        options: ["бо", "поки", "який"]
      - id: 3
        answer: "через те що"
        options: ["через те що", "завдяки тому що", "щойно"]
      - id: 4
        answer: "Завдяки тому що"
        options: ["Завдяки тому що", "Через те що", "Поки не"]
      - id: 5
        answer: "У зв'язку з тим що"
        options: ["У зв'язку з тим що", "Бо", "Як тільки"]
      - id: 6
