  - id: wb-11
    type: essay-response
    title: Мій минулий тиждень
    instruction: Напишіть коротку розповідь із усвідомленим вибором виду.
    prompt: >-
      Опишіть минулий тиждень: дві звички або повторювані дії, три окремі завершені події, один контраст «процес — результат» і два часові маркери. Поясніть вибір виду через зміст, а не тільки через форму.
    min_words: 130
    model_answer: >-
      Минулого тижня я щодня читав новини українською і щоранку писав короткий
      план дня. У понеділок я довго готував презентацію, а ввечері нарешті
      підготував останній слайд. У вівторок я повторював нові слова перед роботою,
      але в середу вже вивчив найважчі дієслова і використав їх у листі. У середу
      я прочитав статтю про волонтерський проєкт і написав лист організаторам.
      Коли я готував вечерю, мені зателефонувала подруга, і ми обговорили поїздку.
      Зазвичай я лягав спати пізно, але в п'ятницю заснув раніше, бо дуже втомився.
      У суботу ми довго планували маршрут і нарешті спланували перший день
      подорожі. Я вибрав читав, бо це була щоденна звичка. Я вибрав підготував, бо
      презентація стала готовою. Я вибрав готував у реченні з дзвінком, бо це фон
      для події. Я вибрав спланували, бо після довгої розмови з'явився конкретний
      результат. Так видно, що один текст може мати і фон, і завершення.
    rubric:
      - criteria: вибір виду
        description: Доконаний і недоконаний вид відповідають процесу, результату, звичці й події.
        points: 4
      - criteria: зв'язність
        description: Текст має природний порядок подій і зрозумілі часові маркери.
        points: 2
      - criteria: пояснення
        description: Є щонайменше три короткі пояснення вибору виду.
        points: 2
      - criteria: мова
        description: Форми минулого часу узгоджені за родом і числом.
        points: 2
      - criteria: контраст процесу й результату
        description: Недоконаний і доконаний вид мають різні функції.
      - criteria: часові сигнали
        description: Маркери часу підтримують видовий вибір.
