- id: act-16
  type: essay-response
  title: Мій минулий тиждень
  instruction: Напишіть коротку розповідь із усвідомленим вибором виду.
  prompt: >-
    Напишіть текст про минулий тиждень. Використайте щонайменше три звичні дії
    з недоконаним видом, три завершені події з доконаним видом, одне речення з
    моделлю коли + процес, подія і одне речення, де процес переходить у
    результат. Після тексту коротко поясніть три свої вибори виду.
  min_words: 130
  model_answer: >-
    Минулого тижня я щодня читав новини українською і щоранку писав короткий
    план дня. У понеділок я довго готував презентацію, а ввечері нарешті
    підготував останній слайд. У середу я прочитав статтю про волонтерський
    проєкт і написав лист організаторам. Коли я готував вечерю, мені
    зателефонувала подруга, і ми обговорили поїздку. Зазвичай я лягав спати
    пізно, але в п'ятницю заснув раніше, бо дуже втомився. Я вибрав читав, бо
    це була щоденна звичка. Я вибрав підготував, бо презентація стала готовою.
    Я вибрав готував у реченні з дзвінком, бо це тло для події.
  rubric:
    - criteria: вибір виду
      description: Доконаний і недоконаний вид відповідають процесу, результату, звичці й події.
      points: 4
    - criteria: зв'язність
      description: Текст має природний порядок подій і зрозумілі часові маркери.
      points: 2
    - criteria: пояснення
      description: Є щонайменше три короткі пояснення вибору виду.
      points: 2
    - criteria: мова
      description: Форми минулого часу узгоджені за родом і числом.
      points: 2
