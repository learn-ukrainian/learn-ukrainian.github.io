version: '1.0'
module: aspect-past-tense
level: b1
inline:
  - id: act-1
    type: quiz
    title: Процес чи результат
    instruction: Оберіть пояснення, яке найточніше відповідає формі минулого часу.
    items:
      - question: Учора я читав статтю.
        options:
          - важливий процес читання, не обов'язково кінець
          - статтю точно завершено
          - дія повторювалася щодня
          - це наказ
        correct: 0
        explanation: Читав підкреслює процес або факт заняття.
      - question: Учора я прочитав статтю.
        options:
          - статтю завершено
          - я тільки почав читати
          - дія повторювалася багато разів
          - форма теперішнього часу
        correct: 0
        explanation: Прочитав показує результат, текст пройдено до кінця.
      - question: Вона цілий вечір писала лист.
        options:
          - тривалий процес письма
          - один короткий результат без процесу
          - майбутній план
          - наказова форма
        correct: 0
        explanation: Цілий вечір підказує тривалість, тому природний недоконаний вид.
      - question: Вона написала лист до вечора.
        options:
          - лист був готовий до певної межі
          - вона писала щодня
          - результат не важливий
          - дія ще триває
        correct: 0
        explanation: До вечора задає межу, а написала показує готовий результат.
      - question: Я цілий ранок готував сніданок.
        options:
          - тривалий процес
          - готовий результат без процесу
          - майбутня межа
          - наказ
        correct: 0
        explanation: Цілий ранок підкреслює процес.
      - question: Я приготував сніданок за пів години.
        options:
          - результат досягнуто
          - дія ще триває
          - повторювана звичка
          - теперішній час
        correct: 0
        explanation: За пів години задає межу й результат.
  - id: act-2
    type: match-up
    title: Видове питання
    instruction: Поєднайте форму з питанням і фокусом.
    pairs:
      - left: писав
        right: що робив? процес
      - left: написав
        right: що зробив? результат
      - left: читала
        right: що робила? процес
      - left: прочитала
        right: що зробила? завершення
      - left: готували
        right: що робили? тривалість
      - left: приготували
        right: що зробили? готова страва
      - left: відповідав
        right: що робив? перебіг відповіді
      - left: відповів
        right: що зробив? дав відповідь
      - left: шукав
        right: що робив? процес пошуку
      - left: знайшов
        right: що зробив? результат пошуку
      - left: зустрічалися
        right: що робили? повторювана дія
      - left: зустрілися
        right: що зробили? одна подія
  - id: act-3
    type: fill-in
    title: Часовий маркер і форма
    instruction: Вставте форму, яка найкраще відповідає контексту.
    items:
      - sentence: Учора я три години ___ статтю.
        answer: читав
        options:
          - читав
          - прочитав
          - прочитаю
          - читатиму
        explanation: Три години називає тривалість процесу.
      - sentence: За три години я ___ статтю до кінця.
        answer: прочитав
        options:
          - прочитав
          - читав
          - читала
          - читаю
        explanation: За три години показує межу й готовий результат.
      - sentence: Вона щодня ___ мамі після роботи.
        answer: телефонувала
        options:
          - телефонувала
          - зателефонувала
          - зателефонує
          - телефонувати
        explanation: Щодня означає повторювану дію.
      - sentence: Учора о п'ятій вона ___ мамі.
        answer: зателефонувала
        options:
          - зателефонувала
          - телефонувала
          - телефонує
          - телефонували
        explanation: Учора о п'ятій називає один конкретний дзвінок.
      - sentence: Ми довго ___ план, але ще не погодили його.
        answer: обговорювали
        options:
          - обговорювали
          - обговорили
          - обговорить
          - обговорено
        explanation: Довго і ще не погодили показують процес без завершення.
      - sentence: До обіду ми ___ план і розподілили завдання.
        answer: обговорили
        options:
          - обговорили
          - обговорювали
          - обговорює
          - обговорювати
        explanation: До обіду і розподілили завдання вказують на результат.
      - sentence: Щосереди ми ___ після роботи.
        answer: зустрічалися
        options:
          - зустрічалися
          - зустрілися
          - зустрінемося
          - зустрічаємося
        explanation: Щосереди вказує на звичку.
      - sentence: Одного вечора ми випадково ___.
        answer: зустрілися
        options:
          - зустрілися
          - зустрічалися
          - зустрічаємося
          - зустрічатимемося
        explanation: Одного вечора виділяє окремий випадок.
  - id: act-4
    type: group-sort
    title: Маркери виду
    instruction: Розподіліть маркери за найімовірнішим фокусом.
    groups:
      - label: процес або тривалість
        items:
          - довго
          - три години
          - цілий день
          - увесь вечір
      - label: повторюваність
        items:
          - щодня
          - завжди
          - часто
          - зазвичай
      - label: одна подія або результат
        items:
          - одного разу
          - раптом
          - нарешті
          - за годину
  - id: act-5
    type: error-correction
    title: Редагування виду
    instruction: Знайдіть конфлікт між маркером і видом, оберіть природне виправлення.
    items:
      - sentence: Я довго прочитав цей лист.
        error: довго прочитав
        correction: довго читав
        options:
          - довго читав
          - довго прочитаю
          - довго прочитати
          - довго читаю
        explanation: Довго описує процес, тому потрібен недоконаний вид.
      - sentence: Вона щодня приготувала сніданок.
        error: щодня приготувала
        correction: щодня готувала
        options:
          - щодня готувала
          - щодня приготує
          - щодня приготувати
          - щодня готую
        explanation: Щодня означає повторювану дію.
      - sentence: Ми нарешті робили вправу.
        error: нарешті робили
        correction: нарешті зробили
        options:
          - нарешті зробили
          - нарешті робимо
          - нарешті робити
          - нарешті робитимемо
        explanation: Нарешті вказує на досягнутий результат.
      - sentence: Одного разу він писав заяву й подав її.
        error: писав заяву
        correction: написав заяву
        options:
          - написав заяву
          - пише заяву
          - писатиме заяву
          - писати заяву
        explanation: Подав її показує, що заява була готова.
      - sentence: Я цілий вечір вивчив слова.
        error: цілий вечір вивчив
        correction: цілий вечір вчив
        options:
          - цілий вечір вчив
          - цілий вечір вивчу
          - цілий вечір вивчити
          - цілий вечір учу
        explanation: Цілий вечір називає тривалість навчання.
      - sentence: Щосуботи ми купили овочі на ринку.
        error: купили
        correction: купували
        options:
          - купували
          - купуємо
          - купимо
          - купувати
        explanation: Повторювана звичка потребує недоконаного виду.
      - sentence: Одного разу я купував квиток і одразу зайшов до зали.
        error: купував
        correction: купив
        options:
          - купив
          - куплю
          - купувати
          - купую
        explanation: Окремий завершений крок природніше передати доконаним видом.
      - sentence: Вона знайшла ключі десять хвилин.
        error: знайшла
        correction: шукала
        options:
          - шукала
          - знайде
          - шукатиме
          - знайти
        explanation: Десять хвилин називає тривалість процесу.
workbook:
  - id: wb-1
    type: cloze
    title: Фон і подія
    instruction: Вставте форми так, щоб розповідь чергувала фон і окрему подію.
    text: Учора я {1} вдома. За вікном {2} дощ, а я {3} звіт. О п'ятій раптом {4} телефон. Оксана {5} мене перевірити лист, і я швидко {6} помилку. Потім Оксана {7} листа до кінця, а я {8} відповідь редакторці.
    blanks:
      - id: 1
        answer: працював
        options:
          - працював
          - попрацював
          - працюю
          - працюватиму
      - id: 2
        answer: йшов
        options:
          - йшов
          - пішов
          - іде
          - піде
      - id: 3
        answer: писав
        options:
          - писав
          - написав
          - пишу
          - напишу
      - id: 4
        answer: задзвонив
        options:
          - задзвонив
          - дзвонив
          - дзвонить
          - дзвонити
      - id: 5
        answer: попросила
        options:
          - попросила
          - просила
          - просить
          - проситиме
      - id: 6
        answer: побачив
        options:
          - побачив
          - бачив
          - бачу
          - бачити
      - id: 7
        answer: прочитала
        options:
          - прочитала
          - читала
          - читатиме
      - id: 8
        answer: надіслав
        options:
          - надіслав
          - надсилав
          - надсилаю
  - id: wb-2
    type: true-false
    title: Самоперевірка правил
    instruction: Позначте, чи правильне твердження.
    items:
      - statement: Недоконаний вид у минулому може називати процес.
        correct: true
        explanation: Читав, писав, готувала часто показують перебіг дії.
      - statement: Доконаний вид у минулому завжди означає повторювану звичку.
        correct: false
        explanation: Повторювану звичку зазвичай передає недоконаний вид.
      - statement: Слова щодня і завжди часто підказують недоконаний вид.
        correct: true
        explanation: Вони відкривають багато повторених випадків.
      - statement: У реченні Я читав і прочитав лист обидві форми можуть бути потрібні.
        correct: true
        explanation: Перша форма показує процес, друга результат.
      - statement: Маркер довго завжди вимагає доконаного виду.
        correct: false
        explanation: Довго найчастіше називає тривалість процесу.
      - statement: Маркер «щодня» часто веде до недоконаного виду.
        correct: true
        explanation: Він позначає повторюваність.
      - statement: Маркер «за годину» часто веде до доконаного виду.
        correct: true
        explanation: Він задає межу результату.
      - statement: Форма «шукав» сама означає, що предмет точно знайшли.
        correct: false
        explanation: Шукав описує процес, а результат не гарантований.
  - id: wb-3
    type: match-up
    title: Видові відповідники в контексті
    instruction: Поєднайте недоконаний варіант із доконаним відповідником у типовому контексті. Не кожен рядок є універсальною словниковою парою для всіх значень.
    pairs:
      - left: писати
        right: написати
      - left: читати
        right: прочитати
      - left: робити
        right: зробити
      - left: говорити
        right: сказати
      - left: брати
        right: взяти
      - left: вчити
        right: вивчити
      - left: готувати
        right: приготувати
      - left: відповідати
        right: відповісти
      - left: телефонувати
        right: зателефонувати
      - left: запрошувати
        right: запросити
      - left: вирішувати
        right: вирішити
      - left: пояснювати
        right: пояснити
  - id: wb-4
    type: mark-the-words
    title: Недоконаний вид у звичному минулому
    instruction: Позначте дієслова, які створюють звичне минуле.
    text: У студентські роки ми часто **збиралися** на кухні, **готували** чай, **читали** новини й довго **говорили** про плани. Щоп’ятниці ми **дивилися** старі фільми, **обговорювали** музику, **запрошували** друзів і **поверталися** додому пізно. Одного вечора раптом зникло світло.
    target_words:
      - збиралися
      - готували
      - читали
      - говорили
      - дивилися
      - обговорювали
      - запрошували
      - поверталися
  - id: wb-5
    type: fill-in
    title: Звичка чи один випадок
    instruction: Вставте форму за контекстом.
    items:
      - sentence: У дитинстві ми щоліта ___ до бабусі.
        answer: їздили
        options:
          - їздили
          - поїхали
          - поїдемо
          - їдемо
        explanation: Щоліта показує повторювану дію.
      - sentence: Одного літа ми вперше ___ на море.
        answer: поїхали
        options:
          - поїхали
          - їздили
          - їздимо
          - їздити
        explanation: Одного літа називає окрему подію.
      - sentence: Дідусь часто ___ історії про місто.
        answer: розповідав
        options:
          - розповідав
          - розповів
          - розповість
          - розповісти
        explanation: Часто означає багато випадків.
      - sentence: Учора дідусь ___ одну важливу історію.
        answer: розповів
        options:
          - розповів
          - розповідав
          - розповідає
          - розповідати
        explanation: Учора і одну історію задають одну завершену подію.
      - sentence: Зазвичай він ___ блокнот із собою.
        answer: брав
        options:
          - брав
          - взяв
          - візьме
          - бере
        explanation: Зазвичай підказує звичку.
      - sentence: Того дня він ___ старий блокнот.
        answer: узяв
        options:
          - узяв
          - брав
          - бере
          - братиме
        explanation: Того дня виділяє один випадок.
      - sentence: Коли я був студентом, я часто ___ у бібліотеці.
        answer: працював
        options:
          - працював
          - попрацював
          - працюю
          - працюватиму
        explanation: Часто позначає звичку.
      - sentence: Минулої суботи я нарешті ___ статтю.
        answer: дописав
        options:
          - дописав
          - писав
          - пишу
          - писатиму
        explanation: Нарешті підкреслює результат.
  - id: wb-6
    type: quiz
    title: Намір мовця
    instruction: Оберіть, що найімовірніше хотів підкреслити мовець.
    items:
      - question: Я писав лист майже годину.
        options:
          - процес письма
          - тільки готовий лист
          - майбутній план
          - наказ
        correct: 0
        explanation: Майже годину підкреслює тривалість.
      - question: Я нарешті написав лист.
        options:
          - результат після очікування
          - звичну дію щодня
          - дію без межі
          - теперішній процес
        correct: 0
        explanation: Нарешті підсилює завершення.
      - question: Ми обговорювали план увесь ранок.
        options:
          - тривалий процес обговорення
          - уже погоджений результат як головне
          - одна раптова дія
          - майбутню дію
        correct: 0
        explanation: Увесь ранок називає перебіг.
      - question: Ми обговорили всі ризики.
        options:
          - тему пройдено повністю
          - обговорення тільки почалося
          - це була звичка
          - дія триває зараз
        correct: 0
        explanation: Усі ризики і доконаний вид показують завершений обсяг.
      - question: 'Мовець питає: «Що ти робив увечері?» Яка відповідь природна?'
        options:
          - писав звіт
          - написав звіт до кінця
          - напишу звіт
          - пиши звіт
        correct: 0
        explanation: Питання що робив? очікує процес.
      - question: 'Мовець питає: «Що ти зробив?» Яка відповідь природна?'
        options:
          - написав звіт
          - писав звіт
          - пишу звіт
          - писатиму звіт
        correct: 0
        explanation: Питання що зробив? очікує результат.
      - question: Який маркер сигналізує повторювану дію?
        options:
          - щовечора
          - раптом
          - за хвилину
          - нарешті
        correct: 0
        explanation: Щовечора означає регулярність.
      - question: Який маркер сигналізує один переломний момент?
        options:
          - раптом
          - зазвичай
          - часто
          - щодня
        correct: 0
        explanation: Раптом вводить подію переднього плану.
      - question: Яке речення лишає результат відкритим?
        options:
          - Я шукав адресу.
          - Я знайшов адресу.
          - Я записав адресу.
          - Я надіслав адресу.
        correct: 0
        explanation: Шукав не повідомляє, чи адресу знайдено.
      - question: Яке речення прямо називає результат?
        options:
          - Я виправив помилку.
          - Я виправляв помилку.
          - Я дивився на помилку.
          - Я шукав помилку.
        correct: 0
        explanation: Виправив означає, що помилку усунено.
  - id: wb-7
    type: group-sort
    title: Дві осі вибору
    instruction: Розподіліть речення за головним фокусом.
    groups:
      - label: процес
        items:
          - Я читав роман увечері.
          - Вона готувала вечерю дві години.
          - Ми обговорювали питання довго.
      - label: результат або подія
        items:
          - Я прочитав роман.
          - Вона приготувала вечерю до сьомої.
          - Ми обговорили всі питання.
          - Учора він зателефонував мамі.
          - Одного разу ми взяли каву біля ринку.
          - Того вечора вони зустрілися випадково.
      - label: повторюваність
        items:
          - Щодня він телефонував мамі.
          - Зазвичай ми брали каву біля метро.
