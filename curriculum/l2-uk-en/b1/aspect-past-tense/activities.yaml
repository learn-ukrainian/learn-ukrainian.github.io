      right: що зробив? результат
    - left: читала
      right: що робила? процес
    - left: прочитала
      right: що зробила? завершення
    - left: готували
      right: що робили? тривалість
    - left: приготували
      right: що зробили? готова страва
    - left: відповідав
      right: що робив? перебіг відповіді
    - left: відповів
      right: що зробив? дав відповідь
- id: act-3
  type: fill-in
  title: Часовий маркер і форма
  instruction: Вставте форму, яка найкраще відповідає контексту.
  items:
    - sentence: Учора я три години ___ статтю.
      answer: читав
      options:
        - читав
        - прочитав
        - прочитаю
        - читатиму
      explanation: Три години називає тривалість процесу.
    - sentence: За три години я ___ статтю до кінця.
      answer: прочитав
      options:
        - прочитав
        - читав
        - читала
        - читаю
      explanation: За три години показує межу й готовий результат.
    - sentence: Вона щодня ___ мамі після роботи.
      answer: телефонувала
      options:
        - телефонувала
        - зателефонувала
        - зателефонує
        - телефонувати
      explanation: Щодня означає повторювану дію.
    - sentence: Учора о п'ятій вона ___ мамі.
      answer: зателефонувала
      options:
        - зателефонувала
        - телефонувала
        - телефонує
        - телефонували
      explanation: Учора о п'ятій називає один конкретний дзвінок.
    - sentence: Ми довго ___ план, але ще не погодили його.
      answer: обговорювали
      options:
        - обговорювали
        - обговорили
        - обговорить
        - обговорено
      explanation: Довго і ще не погодили показують процес без завершення.
    - sentence: До обіду ми ___ план і розподілили завдання.
      answer: обговорили
      options:
        - обговорили
        - обговорювали
        - обговорює
        - обговорювати
      explanation: До обіду і розподілили завдання вказують на результат.
