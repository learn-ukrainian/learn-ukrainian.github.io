version: '1.0'
module: verbal-nouns
level: b1
inline:
  - id: act-1
    type: quiz
    title: Дія, процес чи результат
    instruction: Оберіть, що найточніше називає виділений віддієслівний іменник.
    items:
      - question: "Читання статті тривало пів години."
        options:
          - "процес дії"
          - "готовий предмет"
          - "особа, яка читає"
        correct: 0
        explanation: "Читання тут називає сам процес читати."
      - question: "Відкриття виставки відбудеться завтра."
        options:
          - "подія"
          - "місце"
          - "виконавець"
        correct: 0
        explanation: "Відкриття тут є календарною подією."
      - question: "Наукове відкриття змінило наше бачення."
        options:
          - "результат дослідження"
          - "процес відкривання дверей"
          - "правило правопису"
        correct: 0
        explanation: "Наукове відкриття - це результат інтелектуальної роботи."
      - question: "Знання правил допомагає писати краще."
        options:
          - "стан або результат навчання"
          - "процес запитування"
          - "безафіксний іменник"
        correct: 0
        explanation: "Знання називає те, що людина знає."
      - question: "Пошук квартири зайняв місяць."
        options:
          - "дія як процес"
          - "подвоєння н"
          - "особа, яка шукає"
        correct: 0
        explanation: "Пошук називає діяльність шукати."
      - question: "Підпис документа має бути чітким."
        options:
          - "графічний знак або результат підписування"
          - "дієслово в минулому часі"
          - "форма на -ття"
        correct: 0
        explanation: "Підпис тут є іменником, не процесом підписання."
      - question: "Спілкування з носіями мови допомагає говорити."
        options:
          - "нейтральна назва взаємодії"
          - "суто канцелярська форма"
          - "помилка від слова спілкуватися"
        correct: 0
        explanation: "Спілкування може бути живим і нейтральним словом."
      - question: "Здобуття освіти потребує часу."
        options:
          - "книжна назва процесу отримання"
          - "розмовна назва людини"
          - "активний стан"
        correct: 0
        explanation: "Здобуття звучить книжно й формально."
      - question: "Виробництво меблів зросло цього року."
        options:
          - "галузь або організований процес"
          - "короткий наказ"
          - "власне зворотна дія"
        correct: 0
        explanation: "Виробництво називає сферу або процес виробляти."
      - question: "Після завершення курсу буде сертифікат."
        options:
          - "етап у часі"
          - "назва викладача"
          - "форма кличного відмінка"
        correct: 0
        explanation: "Завершення називає момент або результат завершити."
      - question: "Говоріння тренують на мовному курсі."
        options:
          - "навичка говорити"
          - "усі види мовлення"
          - "безафіксний іменник"
        correct: 0
        explanation: "Говоріння часто означає speaking skill у навчанні мови."
      - question: "Мовлення учасників стало природнішим."
        options:
          - "ширша назва усного мовного прояву"
          - "помилка замість говоріння"
          - "форма на -ття"
        correct: 0
        explanation: "Мовлення ширше, ніж вузька навичка говоріння."
  - id: act-2
    type: match-up
    title: Дієслово і природний іменник
    instruction: З'єднайте дієслово з найприроднішим віддієслівним іменником.
    pairs:
      - left: "читати"
        right: "читання"
      - left: "знати"
        right: "знання"
      - left: "бачити"
        right: "бачення"
      - left: "відкрити"
        right: "відкриття"
      - left: "забути"
        right: "забуття"
      - left: "створити"
        right: "створення"
      - left: "відновити"
        right: "відновлення"
      - left: "ходити"
        right: "ходіння"
      - left: "говорити"
        right: "говоріння"
      - left: "спілкуватися"
        right: "спілкування"
      - left: "шукати"
        right: "пошук"
      - left: "приїхати"
        right: "приїзд"
  - id: act-3
    type: fill-in
    title: Утворіть форму
    instruction: Вставте природний віддієслівний іменник у контекст.
    items:
      - sentence: "____ сучасних текстів допомагає краще розуміти стиль."
        answer: "Читання"
        options:
          - "Читання"
          - "Читаня"
          - "Читати"
        explanation: "Потрібен іменник на -ння з подвоєнням."
      - sentence: "____ правил важливе для письма."
        answer: "Знання"
        options:
          - "Знання"
          - "Знаня"
          - "Знати"
        explanation: "Знання пишемо з подвоєним н."
      - sentence: "Моє ____ ситуації змінилося після розмови."
        answer: "бачення"
        options:
          - "бачення"
          - "бачіння"
          - "бачання"
        explanation: "Норма для бачити у цьому значенні - бачення."
      - sentence: "____ виставки відбудеться в суботу."
        answer: "Відкриття"
        options:
          - "Відкриття"
          - "Відкритя"
          - "Відкрити"
        explanation: "Відкриття пишемо з подвоєним т."
      - sentence: "____ сайту тривало два місяці."
        answer: "Створення"
        options:
          - "Створення"
          - "Створіння"
          - "Створити"
        explanation: "Створити дає створення."
      - sentence: "____ дороги почалося навесні."
        answer: "Відновлення"
        options:
          - "Відновлення"
          - "Відновління"
          - "Відновити"
        explanation: "Природна форма - відновлення."
      - sentence: "____ з друзями допомагає говорити."
        answer: "Спілкування"
        options:
          - "Спілкування"
          - "Спілкуваня"
          - "Спілкуватися"
        explanation: "Спілкування - нейтральний віддієслівний іменник."
      - sentence: "____ квартири зайняв місяць."
        answer: "Пошук"
        options:
          - "Пошук"
          - "Шукання"
          - "Шукати"
        explanation: "Пошук є найприроднішою короткою формою."
      - sentence: "____ гостей змінив наші плани."
        answer: "Приїзд"
        options:
          - "Приїзд"
          - "Приїжджання"
          - "Приїхати"
        explanation: "Приїзд - природний безафіксний іменник."
      - sentence: "____ договору відбудеться завтра."
        answer: "Підписання"
        options:
          - "Підписання"
          - "Підпис"
          - "Підписати"
        explanation: "Для юридичної події природне підписання договору."
      - sentence: "____ проєкту почалося в понеділок."
        answer: "Планування"
        options:
          - "Планування"
          - "Плануваня"
          - "Планувати"
        explanation: "Планування пишемо з подвоєнням н."
      - sentence: "____ системи триватиме два дні."
        answer: "Тестування"
        options:
          - "Тестування"
          - "Тестуваня"
          - "Тестувати"
        explanation: "Назва процесу - тестування."
  - id: act-4
    type: cloze
    title: Як читати довгі іменники
    instruction: Заповніть пропуски в поясненні.
    text: "Віддієслівний іменник називає {1} як предмет. Найчастіші суфікси цього модуля - {2}, -ення, -іння і {3}. У слові читання пишемо {4} н, а у слові відкриття - подвоєне {5}. Не кожна форма на -ння є канцеляритом: {6} з друзями може бути нейтральним словом. Якщо іменник ховає просту дію, можна повернути {7}: здійснити перевірку → {8}. Після іменника прямий об'єкт часто стає {9} відмінком: дослідження проблеми. Але прийменник може зберігатися: спілкування {10} друзями. Англійське -ing не завжди перекладається іменником: I like reading → я люблю {11}. Для B1 важливо не вгадувати, а вибирати {12} форму."
    blanks:
      - id: 1
        answer: "дію"
        options:
          - "дію"
          - "особу"
          - "наказ"
      - id: 2
        answer: "-ння"
        options:
          - "-ння"
          - "-ся"
          - "-ові"
      - id: 3
        answer: "-ття"
        options:
          - "-ття"
          - "-шся"
          - "-мо"
      - id: 4
        answer: "подвоєне"
        options:
          - "подвоєне"
          - "одне"
          - "м'яке"
      - id: 5
        answer: "т"
        options:
          - "т"
          - "н"
          - "с"
      - id: 6
        answer: "спілкування"
        options:
          - "спілкування"
          - "здійснення"
          - "виконання"
      - id: 7
        answer: "дієслово"
        options:
          - "дієслово"
          - "кличний"
          - "прикметник"
      - id: 8
        answer: "перевірити"
        options:
          - "перевірити"
          - "перевірка"
          - "перевірений"
      - id: 9
        answer: "родовим"
        options:
          - "родовим"
          - "кличним"
          - "місцевим"
      - id: 10
        answer: "з"
        options:
          - "з"
          - "до"
          - "без"
      - id: 11
        answer: "читати"
        options:
          - "читати"
          - "читання"
          - "прочитаний"
      - id: 12
        answer: "природну"
        options:
          - "природну"
          - "найдовшу"
          - "англійську"
  - id: act-5
    type: error-correction
    title: Правопис і природність
    instruction: Виправте помилку або неприродну номіналізацію.
    items:
      - sentence: "Читаня статті тривало годину."
        error: "Читаня"
        correction: "Читання"
        error_type: word
        explanation: "У формі на -ння потрібне подвоєння."
      - sentence: "Знаня правил допомагає."
        error: "Знаня"
        correction: "Знання"
        error_type: word
        explanation: "Знання пишемо з двома н."
      - sentence: "Відкритя центру буде завтра."
        error: "Відкритя"
        correction: "Відкриття"
        error_type: word
        explanation: "У формі на -ття потрібне подвоєння т."
      - sentence: "Моє бачіння ситуації змінилося."
        error: "бачіння"
        correction: "бачення"
        error_type: word
        explanation: "Для бачити в цьому значенні природна форма бачення."
      - sentence: "Вивчання мови потребує часу."
        error: "Вивчання"
        correction: "Вивчення"
        error_type: word
        explanation: "Базова природна форма для цього контексту - вивчення."
      - sentence: "Спілкування з друзями - це завжди канцелярит."
        error: "завжди канцелярит"
        correction: "може бути нейтральним словом"
        error_type: phrase
        explanation: "Саме слово спілкування не є автоматично канцелярським."
      - sentence: "Я люблю читання українською щодня."
        error: "люблю читання"
        correction: "люблю читати"
        error_type: phrase
        explanation: "Для I like reading природніше я люблю читати."
      - sentence: "Здійсніть перевірку цього слова швидко."
        error: "Здійсніть перевірку"
        correction: "Перевірте"
        error_type: phrase
        explanation: "Коротке дієслово ясніше в інструкції."
      - sentence: "Після завершити курсу буде сертифікат."
        error: "завершити"
        correction: "завершення"
        error_type: word
        explanation: "Після прийменника потрібен іменник."
      - sentence: "Дослідження проблему показало нові факти."
        error: "проблему"
        correction: "проблеми"
        error_type: word
        explanation: "Після дослідження залежне слово зазвичай у родовому."
      - sentence: "Спілкування друзями допомагає говорити."
        error: "друзями"
        correction: "з друзями"
        error_type: phrase
        explanation: "Зберігаємо прийменник: спілкування з друзями."
      - sentence: "Підпис договору відбудеться завтра."
        error: "Підпис договору"
        correction: "Підписання договору"
        error_type: phrase
        explanation: "Для самої юридичної події точніше підписання договору."
workbook:
  - id: wb-1
    type: quiz
    title: Тип творення
    instruction: Визначте тип або модель іменника.
    items:
      - question: "читання"
        options:
          - "суфіксальна форма на -ння"
          - "форма на -ття"
          - "безафіксний іменник"
        correct: 0
        explanation: "Читання має суфікс -ння."
      - question: "відкриття"
        options:
          - "форма на -ття"
          - "безафіксний іменник"
          - "форма на -іння"
        correct: 0
        explanation: "Відкриття пишемо з -ття."
      - question: "бачення"
        options:
          - "форма на -ення"
          - "форма на -іння"
          - "безафіксний іменник"
        correct: 0
        explanation: "Бачення має форму -ення."
      - question: "ходіння"
        options:
          - "форма на -іння"
          - "форма на -ття"
          - "активний дієприкметник"
        correct: 0
        explanation: "Ходіння пишемо через -іння."
      - question: "пошук"
        options:
          - "безафіксний іменник"
          - "форма на -ння"
          - "форма на -ття"
        correct: 0
        explanation: "У сучасному слові пошук немає суфікса -ння/-ття."
      - question: "приїзд"
        options:
          - "безафіксний іменник"
          - "форма на -ення"
          - "форма на -іння"
        correct: 0
        explanation: "Приїзд - короткий іменник без -ння/-ття."
      - question: "спілкування"
        options:
          - "форма на -ння"
          - "помилка від дієслова"
          - "суто канцелярит"
        correct: 0
        explanation: "Спілкування є нормальною формою на -ння."
      - question: "будівництво"
        options:
          - "назва процесу або галузі"
          - "форма на -ття"
          - "безособова форма"
        correct: 0
        explanation: "Будівництво часто називає процес або сферу."
      - question: "виробництво"
        options:
          - "організований процес або галузь"
          - "особа, яка виробляє"
          - "форма кличного відмінка"
        correct: 0
        explanation: "Виробництво називає процес або сферу виробляти."
      - question: "підписання"
        options:
          - "подія або дія підписати"
          - "тільки графічний знак"
          - "форма на -ття"
        correct: 0
        explanation: "Підписання називає дію, а підпис часто знак."
      - question: "підпис"
        options:
          - "короткий іменник; часто результат підписування"
          - "форма на -ння"
          - "помилка замість підписання"
        correct: 0
        explanation: "Підпис має своє значення і не є помилкою."
      - question: "канцелярит"
        options:
          - "надмірно важкий офіційний стиль"
          - "суфікс дієслова"
          - "тип відмінка"
        correct: 0
        explanation: "Канцелярит часто виникає через перевантаження номіналізаціями."
  - id: wb-2
    type: match-up
    title: Контекст і форма
    instruction: З'єднайте контекст із найприроднішою формою.
    pairs:
      - left: "study of Ukrainian"
        right: "вивчення української мови"
      - left: "opening of the museum"
        right: "відкриття музею"
      - left: "arrival of guests"
        right: "приїзд гостей"
      - left: "signing of the contract"
        right: "підписання договору"
      - left: "signature on a document"
        right: "підпис на документі"
      - left: "search for an answer"
        right: "пошук відповіді"
      - left: "communication with colleagues"
        right: "спілкування з колегами"
      - left: "restoration of the park"
        right: "відновлення парку"
      - left: "construction of the school"
        right: "будівництво школи"
      - left: "production of equipment"
        right: "виробництво обладнання"
      - left: "confirmation of receipt"
        right: "підтвердження отримання"
      - left: "discussion of results"
        right: "обговорення результатів"
  - id: wb-3
    type: group-sort
    title: Розподіліть за типом
    instruction: Розподіліть іменники за способом або моделлю творення.
    groups:
      - label: "-ння / -ення / -іння"
        items:
          - читання
          - бачення
          - ходіння
          - спілкування
      - label: "-ття"
        items:
          - відкриття
          - закриття
          - здобуття
          - забуття
      - label: "безафіксні або короткі форми"
        items:
          - пошук
          - біг
          - спів
          - приїзд
  - id: wb-4
    type: fill-in
    title: Керування після іменника
    instruction: Вставте правильну форму залежного слова.
    items:
      - sentence: "Дослідження ____ тривало рік."
        answer: "проблеми"
        options:
          - "проблеми"
          - "проблему"
          - "проблемою"
        explanation: "Після дослідження часто потрібен родовий."
      - sentence: "Вивчення ____ потребує практики."
        answer: "мови"
        options:
          - "мови"
          - "мову"
          - "мовою"
        explanation: "Вивчення чого? мови."
      - sentence: "Читання ____ зайняло годину."
        answer: "статті"
        options:
          - "статті"
          - "статтю"
          - "статтею"
        explanation: "Читання чого? статті."
      - sentence: "Відновлення ____ почалося навесні."
        answer: "парку"
        options:
          - "парку"
          - "парк"
          - "парком"
        explanation: "Відновлення чого? парку."
      - sentence: "Створення ____ тривало два місяці."
        answer: "сайту"
        options:
          - "сайту"
