  - id: wb-8
    type: essay-response
    title: Мінітекст із балансом стилю
    instruction: Напишіть 5-6 речень про навчання, роботу або місто. Використайте щонайменше три віддієслівні іменники і два живі дієслова. Потім додайте одне речення, де поясните, чому один іменник звучить краще за дієслово або навпаки.
    prompt: Опишіть навчання, роботу або місто. Додайте щонайменше три віддієслівні іменники, два активні дієслова, одну фразу з правильним керуванням і одне коротке пояснення вибору іменника або дієслова.
    min_words: 70
    model_answer: "Вивчення української мови потребує регулярної практики. Я читаю короткі новини щодня і записую нові слова. Спілкування з друзями допомагає мені говорити природніше. Після завершення курсу я хочу скласти іспит. Підготовка до іспиту вже почалася, але я не хочу писати занадто офіційно. У реченні я читаю новини дієслово краще за читання новин, бо я називаю конкретну дію."
    rubric:
      - criteria: "Іменники"
        description: "Є щонайменше три природні віддієслівні іменники."
        points: 3
      - criteria: "Дієслова"
        description: "Є щонайменше два активні дієслова, які не ховають просту дію."
        points: 2
      - criteria: "Правопис"
        description: "Правильно написано -ння/-ення/-іння/-ття."
        points: 2
      - criteria: "Керування"
        description: "Залежні слова після іменників мають природний відмінок або прийменник."
        points: 2
      - criteria: "Стиль"
        description: "Текст не перевантажений канцеляритом."
        points: 1
