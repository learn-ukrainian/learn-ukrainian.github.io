- title: "Вашуленко 3 клас, с.107"
  role: textbook
  notes: "Іменники можуть утворюватися від дієслів і називати дії: зустріч, плавання."
- title: "Голуб 6 клас, с.107"
  role: textbook
  notes: "Написання іменників із суфіксами -инн(я), -інн(я), -енн(я); орфографія подвоєння."
- title: "Литвінова 6 клас, с.83"
  role: textbook
  notes: "Безафіксний спосіб словотворення: пошук, підпис та інші іменники без видимого суфікса."
- title: "Заболотний 7 клас, с.136"
  role: textbook
  notes: "Віддієслівні іменники на -ння, -ття; книжне забарвлення і використання в офіційному та науковому стилях."
