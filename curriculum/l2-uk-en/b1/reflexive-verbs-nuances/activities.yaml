version: '1.0'
module: reflexive-verbs-nuances
level: b1
inline:
  - id: act-1
    type: quiz
    title: Що робить -ся?
    instruction: Оберіть найточніше пояснення форми.
    items:
      - question: "Олена вмивається перед заняттям."
        options:
          - "дія спрямована на саму Олену"
          - "Олена миє когось іншого"
          - "це пасивна інструкція"
        correct: 0
        explanation: "Вмиватися - власне зворотна дія: мити себе."
      - question: "Друзі зустрічаються біля метро."
        options:
          - "дія взаємна між людьми"
          - "кожен зустрічає самого себе"
          - "це безособова конструкція"
        correct: 0
        explanation: "Зустрічатися тут означає бачитися одне з одним."
      - question: "Мені не спиться через шум."
        options:
          - "безособовий стан із давальним"
          - "підмет виконує дію"
          - "звичайний наказ"
        correct: 0
        explanation: "Мені стоїть у давальному, а стан не має звичайного підмета."
      - question: "Двері не зачиняються."
        options:
          - "предмет у центрі пасивноподібної ситуації"
          - "двері зачиняють самі себе свідомо"
          - "це взаємна дія"
        correct: 0
        explanation: "Форма описує стан або властивість предмета."
      - question: "Я хвилююся перед іспитом."
        options:
          - "емоційний стан"
          - "дія між двома людьми"
          - "милозвучне скорочення"
        correct: 0
        explanation: "Хвилюватися називає стан мовця."
      - question: "Вони листуються вже рік."
        options:
          - "взаємна дія"
          - "безособовий стан"
          - "дія на себе"
        correct: 0
        explanation: "Листуватися означає писати одне одному."
      - question: "Ми збираємося на роботу."
        options:
          - "готуємо себе до виходу"
          - "збираємо предмети в коробку"
          - "пишемо правило"
        correct: 0
        explanation: "Збиратися може означати готуватися."
      - question: "Файл не відкривається."
        options:
          - "проблема з файлом або системою"
          - "файл відкриває інший файл"
          - "людина обов'язково винна"
        correct: 0
        explanation: "Зворотна форма переносить фокус на предмет."
      - question: "Я боюся темряви."
        options:
          - "дієслово треба вчити з -ся"
          - "можна сказати я бою темряви"
          - "це взаємна дія"
        correct: 0
        explanation: "Боятися не має простої незворотної форми в цьому значенні."
      - question: "Мені здається, що він правий."
        options:
          - "безособова рамка сприйняття"
          - "власне зворотна дія"
          - "прохання про вибачення"
        correct: 0
        explanation: "Здається часто працює як безособова конструкція."
      - question: "Студенти знайомляться одне з одним."
        options:
          - "взаємна соціальна дія"
          - "викладач знайомить студентів"
          - "пасивний результат"
        correct: 0
        explanation: "Знайомитися означає ставати знайомими між собою."
      - question: "Оплата здійснюється карткою."
        options:
          - "офіційна пасивноподібна формула"
          - "людина платить самій собі"
          - "форма майбутнього часу"
        correct: 0
        explanation: "Такі форми часто описують правило або спосіб у сервісному тексті."
  - id: act-2
    type: group-sort
    title: П'ять груп
    instruction: Розподіліть форми за семантичною групою.
    groups:
      - label: "Власне зворотні"
        items:
          - "митися"
          - "голитися"
          - "зачісуватися"
      - label: "Взаємні"
        items:
          - "зустрічатися"
          - "листуватися"
          - "обійматися"
      - label: "Стану та емоцій"
        items:
          - "хвилюватися"
          - "соромитися"
      - label: "Безособові"
        items:
          - "мені не спиться"
          - "нам хочеться кави"
      - label: "Пасивноподібні"
        items:
          - "будинок будується"
          - "двері зачиняються"
  - id: act-3
    type: fill-in
    title: -ся чи -сь?
    instruction: Оберіть форму, яка краще підтримує милозвучність.
    items:
      - sentence: "Ми маємо зустріти____ о восьмій."
        answer: сь
        options:
          - сь
          - ся
        explanation: "Наступне слово починається з голосного о."
      - sentence: "Треба повернути____ додому до десятої."
        answer: ся
        options:
          - ся
          - сь
        explanation: "Додому починається з приголосного д."
      - sentence: "Свято закінчило____ увечері."
        answer: сь
        options:
          - сь
          - ся
        explanation: "Увечері починається з голосного звука."
      - sentence: "Вони домовили____ про зустріч."
        answer: ся
        options:
          - ся
          - сь
        explanation: "Про починається з приголосного п."
      - sentence: "Хочу прогуляти____ озером."
        answer: сь
        options:
          - сь
          - ся
        explanation: "Озером починається з голосного о."
      - sentence: "Ми будемо катати____ на скейті."
        answer: ся
        options:
          - ся
          - сь
        explanation: "На починається з приголосного н."
      - sentence: "Вона хоче повернути____ уранці."
        answer: сь
        options:
          - сь
          - ся
        explanation: "Уранці починається з голосного у."
      - sentence: "Потрібно підготувати____ до презентації."
        answer: ся
        options:
          - ся
          - сь
        explanation: "До починається з приголосного д."
      - sentence: "Спробуй зосередити____ одразу."
        answer: сь
        options:
          - сь
          - ся
        explanation: "Одразу починається з голосного о."
      - sentence: "Вони мають зібрати____ біля входу."
        answer: ся
        options:
          - ся
          - сь
        explanation: "Біля починається з приголосного б."
      - sentence: "Домовмо____ із викладачем."
        answer: сь
        options:
          - сь
          - ся
        explanation: "Із починається з голосного і."
      - sentence: "Треба навчати____ щодня."
        answer: ся
        options:
          - ся
          - сь
        explanation: "Щодня починається з приголосного щ."
  - id: act-4
    type: match-up
    title: Пара і зміна значення
    instruction: Поєднайте форму з поясненням.
    pairs:
      - left: "вчити правило"
        right: "запам'ятовувати матеріал"
      - left: "вчитися в університеті"
        right: "бути студентом або навчатися"
      - left: "збирати документи"
        right: "класти або накопичувати предмети"
      - left: "збиратися на роботу"
        right: "готувати себе до виходу"
      - left: "повертати ключі"
        right: "віддавати ключі назад"
      - left: "повертатися додому"
        right: "йти або їхати назад"
      - left: "хвилювати мене"
        right: "викликати емоцію в мені"
      - left: "хвилюватися через новину"
        right: "переживати самому"
      - left: "знайомити студентів"
        right: "представляти людей одне одному"
      - left: "знайомитися зі студентами"
        right: "самому ставати знайомим"
      - left: "відчиняти двері"
        right: "активно відкривати двері"
      - left: "двері відчиняються"
        right: "двері переходять у стан відкриття"
  - id: act-5
    type: error-correction
    title: Виправте зворотну форму
    instruction: Замініть помилкову частину природною українською формою.
    items:
      - sentence: "Я бою темряви."
        error: "бою"
        correction: "боюся"
        error_type: word
        explanation: "Боятися в цьому значенні уживається з -ся."
      - sentence: "Ми зустріли біля метро вчора."
        error: "зустріли"
        correction: "зустрілися"
        error_type: word
        explanation: "Для взаємної зустрічі потрібна зворотна форма."
      - sentence: "Я дякуюся вам за допомогу."
        error: "дякуюся"
        correction: "дякую"
        error_type: word
        explanation: "Дякувати керує давальним і не потребує -ся."
      - sentence: "Їй не спить через шум."
        error: "не спить"
        correction: "не спиться"
        error_type: phrase
        explanation: "Безособовий стан має форму не спиться."
      - sentence: "Вони листували друзям щотижня."
        error: "листували"
        correction: "листувалися"
        error_type: word
        explanation: "Листуватися означає писати одне одному."
      - sentence: "Я радіюся цій новині."
        error: "радіюся"
        correction: "радію"
        error_type: word
        explanation: "Стандартна форма тут радію, без -ся."
      - sentence: "Ти смієшсь дуже голосно."
        error: "смієшсь"
        correction: "смієшся"
        error_type: word
        explanation: "Не скорочуємо особову форму так механічно."
      - sentence: "Документи подалися до п'ятниці."
        error: "подалися"
        correction: "подаються"
        error_type: word
        explanation: "Для правила або процедури природніше документи подаються."
      - sentence: "Мені здаюся, що він правий."
        error: "здаюся"
        correction: "здається"
        error_type: word
        explanation: "У безособовій рамці потрібна форма здається."
      - sentence: "Двері не зачиняють добре."
        error: "зачиняють"
        correction: "зачиняються"
        error_type: word
        explanation: "Йдеться про властивість дверей, а не про людей."
      - sentence: "Вона сподіває на відповідь."
        error: "сподіває"
        correction: "сподівається"
        error_type: word
        explanation: "Сподіватися в цьому значенні уживається з -ся."
      - sentence: "Чекаюся на автобус."
        error: "чекаюся"
        correction: "чекаю"
        error_type: word
        explanation: "У навчальному стандарті: чекаю на автобус."
workbook:
  - id: wb-1
    type: quiz
    title: Семантика зворотних форм
    instruction: Оберіть групу або пояснення.
    items:
      - question: "Яка група в реченні 'Марко голиться'?"
        options:
          - "власне зворотні"
          - "взаємні"
          - "безособові"
          - "пасивноподібні"
        correct: 0
        explanation: "Марко голить самого себе."
      - question: "Яка група в реченні 'Сусіди вітаються щоранку'?"
        options:
          - "взаємні"
          - "безособові"
          - "власне зворотні"
          - "пасивноподібні"
        correct: 0
        explanation: "Вітатися означає обмінюватися вітанням."
      - question: "Яка форма природна?"
        options:
          - "Я соромлюся помилки."
          - "Я соромлю помилки."
          - "Я соромлюся помилку."
          - "Я соромлюсься."
        correct: 0
        explanation: "Соромитися потребує -ся і родового додатка."
      - question: "Яке речення безособове?"
        options:
          - "Нам хочеться кави."
          - "Ми хочемо кави."
          - "Вони миються."
          - "Друзі листуються."
        correct: 0
        explanation: "Нам - давальний, а стан виражено без звичайного підмета."
      - question: "Яка форма пасивноподібна?"
        options:
          - "Квитки продаються онлайн."
          - "Я продаю квитки."
          - "Ми продаємо квитки."
          - "Продавець продає квитки."
        correct: 0
        explanation: "Квитки стоять у центрі процедури."
      - question: "Де -ся не потрібне?"
        options:
          - "Я дякую вам."
          - "Я боюся темряви."
          - "Ми зустрічаємося."
          - "Він хвилюється."
        correct: 0
        explanation: "Дякувати не є зворотним у цьому значенні."
      - question: "Що означає 'ми бачилися вчора'?"
        options:
          - "ми зустрілися"
          - "ми побачили предмет"
          - "ми дивилися фільм"
          - "нам не спалося"
        correct: 0
        explanation: "Бачитися означає мати зустріч або бачити одне одного."
      - question: "Що краще для офіційного вибачення?"
        options:
          - "Перепрошую за затримку."
          - "Я вибачаюся себе."
          - "Дякуюся за затримку."
          - "Соромлю затримку."
        correct: 0
        explanation: "Перепрошую або прошу вибачення є безпечними ввічливими формами."
      - question: "Яке речення описує проблему з предметом?"
        options:
          - "Файл не відкривається."
          - "Я не відкриваю файл."
          - "Я відкриваю файл."
          - "Відкрийте файл."
        correct: 0
        explanation: "Фокус на файлі або системі."
      - question: "Яка форма зберігає стандартне написання?"
        options:
          - "він навчається"
          - "він навчаєця"
          - "він навчаєтся"
          - "він навчаєсся"
        correct: 0
        explanation: "Пишемо -ться, хоч вимовляємо злитіше."
      - question: "Де потрібен давальний?"
        options:
          - "Мені не працюється."
          - "Я не працюється."
          - "Мене не працюється."
          - "Мною не працюється."
        correct: 0
        explanation: "Безособова конструкція ставить людину в давальному."
      - question: "Яке речення не треба розширювати в повний пасивний урок?"
        options:
          - "Будинок будується."
          - "Я будую будинок."
          - "Робітники будують будинок."
          - "План будівництва готовий."
        correct: 0
        explanation: "Це тільки місток до теми пасиву."
  - id: wb-2
    type: fill-in
    title: Доберіть форму
    instruction: Заповніть пропуск природною формою.
    items:
      - sentence: "Щоранку я ____ холодною водою. (вмиватися)"
        answer: вмиваюся
        options:
          - вмиваюся
          - вмиваю
          - вмиваюсься
        explanation: "Дія спрямована на самого мовця."
      - sentence: "Ми ____ з друзями щоп'ятниці. (зустрічатися)"
        answer: зустрічаємося
        options:
          - зустрічаємося
          - зустрічаємо
          - зустрічаємосься
        explanation: "Взаємна дія між людьми."
      - sentence: "Марко ____ перед презентацією. (хвилюватися)"
        answer: хвилюється
        options:
          - хвилюється
          - хвилює
          - хвилюєшся
        explanation: "Йдеться про стан Марка."
      - sentence: "____ не спиться через шум. (я)"
        answer: мені
        options:
          - мені
          - я
          - мене
        explanation: "Безособова конструкція потребує давального."
      - sentence: "Ці двері погано ____. (зачинятися)"
        answer: зачиняються
        options:
          - зачиняються
          - зачиняють
          - зачиняєшся
        explanation: "Предмет у центрі пасивноподібної ситуації."
      - sentence: "Вона ____ на швидку відповідь. (сподіватися)"
        answer: сподівається
        options:
          - сподівається
          - сподіває
          - сподіваєтьсяся
        explanation: "Сподіватися треба вчити з -ся."
      - sentence: "Потрібно повернути____ о сьомій."
        answer: сь
        options:
          - сь
          - ся
          - сся
        explanation: "О сьомій починається з голосного."
      - sentence: "Треба повернути____ додому раніше."
        answer: ся
        options:
          - ся
          - сь
          - сся
        explanation: "Додому починається з приголосного."
      - sentence: "Я ____ вашій новині. (радіти)"
        answer: радію
        options:
          - радію
          - радіюся
          - радіється
        explanation: "Стандартно: радіти без -ся."
      - sentence: "Ми ____ про умови оренди. (домовитися)"
        answer: домовилися
        options:
          - домовилися
          - домовили
          - домовилисся
        explanation: "Домовитися про щось - зворотне дієслово."
      - sentence: "Цей текст легко ____. (читатися)"
        answer: читається
        options:
          - читається
          - читає
          - читаєшся
        explanation: "Пасивноподібна властивість тексту."
      - sentence: "Я ____ за домом. (сумувати)"
        answer: сумую
        options:
          - сумую
          - сумуюся
          - сумиться
        explanation: "Сумувати не потребує -ся."
  - id: wb-3
    type: group-sort
    title: Побут, емоції, процедура
    instruction: Розподіліть речення за функцією зворотної форми.
    groups:
      - label: "Дія на себе"
        items:
          - "Іра одягається швидко."
          - "Данило голиться перед роботою."
          - "Марта зачісується біля дзеркала."
      - label: "Взаємна дія"
        items:
          - "Колеги листуються щодня."
          - "Ми знайомимося з сусідами."
          - "Друзі обіймаються на вокзалі."
      - label: "Стан"
        items:
          - "Я соромлюся цієї помилки."
          - "Він сердиться на брата."
      - label: "Безособова конструкція"
        items:
          - "Мені не спиться."
          - "Нам хочеться чаю."
      - label: "Пасивноподібна конструкція"
        items:
          - "Квартира здається з меблями."
          - "Реєстрація відкривається завтра."
  - id: wb-4
    type: match-up
    title: Керування і переклад
    instruction: Поєднайте українську модель з англійським змістом.
    pairs:
      - left: "боятися темряви"
        right: "to be afraid of the dark"
      - left: "соромитися помилки"
        right: "to be ashamed of a mistake"
      - left: "сердитися на друга"
        right: "to be angry with a friend"
      - left: "сподіватися на відповідь"
        right: "to hope for an answer"
      - left: "знайомитися з колегою"
        right: "to get acquainted with a colleague"
      - left: "листуватися з родичами"
        right: "to correspond with relatives"
      - left: "користуватися телефоном"
