version: '1.0'
module: participles-passive
level: b1
inline:
  - id: act-1
    type: quiz
    title: Хто виконує дію?
    instruction: Оберіть пояснення, яке правильно визначає пасивне значення.
    items:
      - question: "У словосполученні прочитана книга форма прочитана означає:"
        options:
          - книгу хтось прочитав
          - книга сама читала
          - книга звертається до читача
        correct: 0
        explanation: Предмет зазнав дії, тому це пасивний дієприкметник.
      - question: "Яка пара правильно розрізняє активне й пасивне значення?"
        options:
          - розквітлий сад - сад сам розквітнув; посаджений сад - сад хтось посадив
          - розквітлий сад - сад хтось розквітлив; посаджений сад - сад сам посадив себе
          - обидві форми завжди активні
        correct: 0
        explanation: Активна форма пов'язана з дією самого предмета, пасивна - з дією над ним.
      - question: "У фразі лист, написаний студенткою слово студенткою позначає:"
        options:
          - виконавця дії в орудному відмінку
          - головний іменник у називному
          - майбутній час дієслова
        correct: 0
        explanation: Виконавець пасивної дії часто стоїть в орудному відмінку.
      - question: "Який варіант є пасивним дієприкметником?"
        options:
          - вишита сорочка
          - зів'яла квітка
          - студент читає
        correct: 0
        explanation: Сорочку хтось вишив, отже предмет зазнав дії.
      - question: "Який варіант не є природним пасивним дієприкметником?"
        options:
          - приїханий гість
          - написаний лист
          - збудований міст
        correct: 0
        explanation: Гість сам приїхав; краще сказати гість, який приїхав.
      - question: "У реченні Книгу прочитано форма прочитано є:"
        options:
          - безособовою формою на -но/-то
          - жіночим дієприкметником
          - активним дієприкметником теперішнього часу
        correct: 0
        explanation: Прочитано не узгоджується з іменником і працює як безособовий присудок.
      - question: "Який варіант має правильне узгодження?"
        options:
          - прочитана книга
          - прочитаний книга
          - прочитане книга
        correct: 0
        explanation: Книга жіночого роду, тому потрібна форма прочитана.
      - question: "Яке речення найприродніше, коли важливий виконавець?"
        options:
          - Кураторка підготувала каталог.
          - Каталог був підготовлений кураторкою без потреби.
          - Підготовлено кураторкою каталогом.
        correct: 0
        explanation: Коли виконавець важливий, активне речення часто найприродніше.
      - question: "Який суфікс бачимо у формі митий?"
        options:
          - -т-
          - -уч-
          - -л-
        correct: 0
        explanation: Мити -> митий належить до групи з суфіксом -т-.
      - question: "Яка форма правильно передає чергування с -> ш?"
        options:
          - ношений одяг
          - носений одяг
          - носитий одяг
        correct: 0
        explanation: Носити дає ношений із чергуванням с -> ш.
      - question: "Яка форма правильно пов'язана з -но/-то?"
        options:
          - збудований -> збудовано
          - збудований -> збудувалося
          - збудований -> збудовуче
        correct: 0
        explanation: Пасивний дієприкметник збудований має предикативний відповідник збудовано.
      - question: "Що перевіряємо після вибору суфікса?"
        options:
          - чергування і прикметникове закінчення
          - тільки наголос в англійському перекладі
          - чи слово стоїть у кличному відмінку
        correct: 0
        explanation: Правильна форма потребує і творення, і узгодження.
  - id: act-2
    type: fill-in
    title: Утворіть нормативну форму
    instruction: Заповніть пропуски пасивними дієприкметниками в потрібній формі.
    items:
      - sentence: "На столі лежала ____ книга. (прочитати)"
        answer: прочитана
        options:
          - прочитана
          - прочитаний
          - прочитано
        explanation: Книга жіночого роду, тому прочитана.
      - sentence: "Через річку видно ____ міст. (збудувати)"
        answer: збудований
        options:
          - збудований
          - збудована
          - збудовано
        explanation: Міст чоловічого роду, тому збудований.
      - sentence: "У музеї показали ____ сорочку. (вишити)"
        answer: вишиту
        options:
          - вишиту
          - вишитий
          - вишито
        explanation: Сорочку в знахідному жіночого роду має форму вишиту.
      - sentence: "На дошці висіло ____ повідомлення. (написати)"
        answer: написане
        options:
          - написане
          - написаний
          - написано
        explanation: Повідомлення середнього роду, тому написане.
      - sentence: "Ми перевірили ____ завдання. (зробити)"
        answer: зроблене
        options:
          - зроблене
          - зробене
          - зроблений
        explanation: Зробити -> зроблений із б -> бл; завдання середнього роду.
      - sentence: "У коридорі стояли ____ документи. (принести)"
        answer: принесені
        options:
          - принесені
          - принесений
          - принестені
        explanation: Документи множини, тому принесені.
      - sentence: "Після ремонту ми побачили ____ двері. (відкрити)"
        answer: відкриті
        options:
          - відкриті
          - відкритий
          - відкривші
        explanation: Двері мають форму множини відкриті.
      - sentence: "До центру передали ____ одяг. (носити)"
        answer: ношений
        options:
          - ношений
          - носений
          - носитий
        explanation: Носити -> ношений із с -> ш.
      - sentence: "На полиці лежав ____ шнур. (закрутити)"
        answer: закручений
        options:
          - закручений
          - закрутений
          - закрутивший
        explanation: Закрутити -> закручений із т -> ч.
      - sentence: "Ми купили ____ яблука. (мити)"
        answer: миті
        options:
          - миті
          - мийні
          - митий
        explanation: Яблука в множині, тому миті.
      - sentence: "У дворі лежали ____ дрова. (колоти)"
        answer: колоті
        options:
          - колоті
          - колені
          - коловші
        explanation: Колоті дрова є усталеною нормативною формою.
      - sentence: "На тарілці була ____ картопля. (зварити)"
        answer: зварена
        options:
          - зварена
          - зварений
          - зварено
        explanation: Картопля жіночого роду, тому зварена.
  - id: act-3
    type: match-up
    title: Дієслово і дієприкметник
    instruction: Поєднайте дієслово з нормативною пасивною формою.
    pairs:
      - left: прочитати
        right: прочитаний
      - left: збудувати
        right: збудований
      - left: написати
        right: написаний
      - left: вишити
        right: вишитий
      - left: зробити
        right: зроблений
      - left: принести
        right: принесений
      - left: відкрити
        right: відкритий
      - left: носити
        right: ношений
      - left: закрутити
        right: закручений
      - left: побачити
        right: побачений
      - left: загоїти
        right: загоєний
      - left: замести
        right: заметений
  - id: act-4
    type: group-sort
    title: Суфіксальна група
    instruction: Розподіліть форми за основним суфіксом.
    groups:
      - label: "-н-"
        items:
          - прочитаний
          - написаний
          - посіяний
          - запланований
      - label: "-ен-/-єн-"
        items:
          - принесений
          - побачений
          - зроблений
          - загоєний
      - label: "-т-"
        items:
          - митий
          - битий
          - відкритий
          - колотий
  - id: act-5
    type: error-correction
    title: Виправте форму
    instruction: Знайдіть одну помилку в пасивному дієприкметнику або в узгодженні.
    items:
      - sentence: "На столі лежала прочитаний книга."
        error: прочитаний
        correction: прочитана
        explanation: Книга жіночого роду, тому прочитана.
      - sentence: "У звіті описано зробений проєкт."
        error: зробений
        correction: зроблений
        explanation: Зробити -> зроблений із б -> бл.
      - sentence: "До центру передали носений одяг."
        error: носений
        correction: ношений
        explanation: Носити -> ношений із с -> ш.
      - sentence: "На полиці був закрутений гвинт."
        error: закрутений
        correction: закручений
        explanation: Закрутити -> закручений із т -> ч.
      - sentence: "Ми слухали пісню, виконаний хором."
        error: виконаний
        correction: виконану
        explanation: Пісню в знахідному жіночого роду має форму виконану.
      - sentence: "У музеї бачили написане портрет."
        error: написане
        correction: написаний
        explanation: Портрет чоловічого роду; у знахідному для неістоти форма збігається з називним.
      - sentence: "У каталозі згадано збережений повідомлення."
        error: збережений
        correction: збережене
        explanation: Повідомлення середнього роду, тому збережене.
      - sentence: "У кімнату зайшов приїханий гість."
        error: приїханий гість
        correction: гість, який приїхав
        explanation: Гість сам приїхав, тому пасивна форма неприродна.
      - sentence: "Митий яблука поклали в миску."
        error: Митий
        correction: Миті
        explanation: Яблука множини, тому миті.
      - sentence: "Підписаний директоркою заяву передали в архів."
        error: Підписаний
        correction: Підписану
        explanation: Заяву в знахідному жіночого роду має форму підписану.
      - sentence: "У музеї показали вишитий сорочку."
        error: вишитий
        correction: вишиту
        explanation: Сорочку в знахідному жіночого роду має форму вишиту.
      - sentence: "Загоєний рана вже не боліла."
        error: Загоєний
        correction: Загоєна
        explanation: Рана жіночого роду, тому загоєна.
workbook:
  - id: wb-1
    type: quiz
    title: Нормативний вибір
    instruction: Оберіть природний і граматично правильний варіант.
    items:
      - question: "Який варіант правильно описує лист?"
        options:
          - написаний студентом лист
          - написана студентом лист
          - пишучий студентом лист
        correct: 0
        explanation: Лист чоловічого роду; дію виконав студент.
      - question: "Що краще для результату дії над завданням?"
        options:
          - виконане завдання
          - виконаний завдання
          - виконуюче завдання
        correct: 0
        explanation: Завдання середнього роду, тому виконане.
      - question: "Яка форма правильно пов'язана з вразити?"
        options:
          - вражений
          - вразений
          - вразитий
        correct: 0
        explanation: Вразити -> вражений із з -> ж.
      - question: "Який варіант є формою на -т-?"
        options:
          - відкритий
          - відкривший
          - відкриваний
        correct: 0
        explanation: Відкрити -> відкритий.
      - question: "Яка форма найкраща для дверей у множині?"
        options:
          - відкриті двері
          - відкритий двері
          - відкривші двері
        correct: 0
        explanation: Двері вживаються як множина, тому відкриті.
      - question: "Що природніше, якщо треба підкреслити виконавця?"
        options:
          - Архітектор збудував міст.
          - Міст був збудований архітектором у кожному контексті.
          - Збудовано архітектором мостом.
        correct: 0
        explanation: Коли виконавець важливий, активний стан часто кращий.
      - question: "Який варіант показує безособову форму?"
        options:
          - Листа надіслано.
          - Надісланий лист.
          - Лист надісланий студентом.
        correct: 0
        explanation: Надіслано не узгоджується з іменником.
      - question: "Який варіант правильно розгортає вишита сорочка?"
        options:
          - сорочка, яку хтось вишив
          - сорочка, яка сама вишивала
          - сорочка, що прийшла
        correct: 0
        explanation: Це дія над сорочкою.
      - question: "Яке словосполучення може бути лексикалізованим прикметником?"
        options:
          - варена картопля
          - написаний студентом лист
          - принесені документи
        correct: 0
        explanation: Варена картопля часто сприймається як назва способу приготування.
      - question: "Яка форма має чергування д -> дж?"
        options:
          - народжений
          - народений
          - народитий
        correct: 0
        explanation: Народити -> народжений.
      - question: "Який варіант правильно узгоджений?"
        options:
          - збережені документи
          - збережений документи
          - збережене документи
        correct: 0
        explanation: Документи множини, тому збережені.
      - question: "Який варіант не треба перетворювати на пасив?"
        options:
          - гість приїхав
          - лист написаний
          - двері відкриті
        correct: 0
        explanation: Приїхати не є дією над гостем.
  - id: wb-2
    type: cloze
    title: Музейний опис
    instruction: Заповніть пропуски нормативними пасивними формами.
    text: "У музеї показали {1} сорочку, {2} у XIX столітті портрет і {3} після пожежі фасад. На столі лежав {4} кураторкою каталог, поруч стояли {5} двері й {6} в архіві документи. У таблиці пояснили форму {7} як приклад чергування д -> дж. У майстерні лежали {8} яблука для частування. Біля печі були {9} дрова. У звіті згадали {10} проєкт, {11} гвинт і {12} рану після лікування."
    blanks:
      - id: 1
        answer: вишиту
        options:
          - вишиту
          - вишитий
          - вишито
      - id: 2
        answer: написаний
        options:
          - написаний
          - написана
          - написано
      - id: 3
        answer: відреставрований
        options:
          - відреставрований
          - відреставрована
          - відреставровано
      - id: 4
        answer: підготовлений
        options:
          - підготовлений
          - підготовлена
          - підготований
      - id: 5
        answer: відкриті
        options:
          - відкриті
          - відкритий
          - відкривші
      - id: 6
        answer: збережені
        options:
          - збережені
          - збережений
          - збережене
      - id: 7
        answer: воджений
        options:
          - воджений
          - водений
          - водитий
      - id: 8
        answer: миті
        options:
          - миті
          - митий
          - мийні
      - id: 9
        answer: колоті
        options:
          - колоті
          - колений
          - коловші
      - id: 10
        answer: зроблений
        options:
          - зроблений
          - зробений
          - зробитий
      - id: 11
        answer: закручений
        options:
          - закручений
          - закрутений
          - закрутивший
      - id: 12
        answer: загоєну
        options:
          - загоєну
          - загоєний
          - загоїту
  - id: wb-3
    type: match-up
    title: Перепишіть без пасиву
    instruction: Поєднайте пасивну фразу з активним розгортанням.
    pairs:
      - left: прочитана книга
        right: хтось прочитав книгу
      - left: збудований міст
        right: хтось збудував міст
      - left: вишита сорочка
        right: хтось вишив сорочку
      - left: написаний лист
        right: хтось написав лист
      - left: пофарбована лавка
        right: хтось пофарбував лавку
      - left: підписаний договір
        right: хтось підписав договір
      - left: збережене повідомлення
        right: хтось зберіг повідомлення
      - left: принесені документи
        right: хтось приніс документи
      - left: відкриті двері
        right: хтось відкрив двері
      - left: закручений гвинт
        right: хтось закрутив гвинт
      - left: заметена доріжка
        right: хтось замів доріжку
      - left: зварена картопля
        right: хтось зварив картоплю
  - id: wb-4
    type: group-sort
    title: Функція форми
    instruction: Розподіліть приклади за граматичною функцією.
    groups:
      - label: "Пасивний дієприкметник"
        items:
          - написаний лист
          - збудований міст
          - вишита сорочка
          - принесені документи
      - label: "Форма на -но/-то"
        items:
          - лист написано
          - міст збудовано
          - документи принесено
          - завдання виконано
      - label: "Краще активне речення"
        items:
          - кураторка підготувала каталог
          - студенти прочитали статтю
          - архітектор спроєктував будівлю
          - команда виконала роботу
  - id: wb-5
    type: error-correction
    title: Підсумкова редактура
    instruction: Виправте помилку й поясніть, чому форма має бути іншою.
    items:
      - sentence: "У залі стояла пофарбований шафа."
        error: пофарбований
        correction: пофарбована
        explanation: Шафа жіночого роду, тому пофарбована.
      - sentence: "Зробений звіт обговорять завтра."
        error: Зробений
        correction: Зроблений
        explanation: Зробити -> зроблений із б -> бл.
      - sentence: "Закрутений шнур лежав на підлозі."
        error: Закрутений
        correction: Закручений
        explanation: Закрутити -> закручений із т -> ч.
      - sentence: "Носений одяг передали до центру."
        error: Носений
        correction: Ношений
        explanation: Носити -> ношений із с -> ш.
      - sentence: "Побачена краєвид здивував туристів."
