      - criteria: "Складносурядне речення"
        description: "Є речення з рівноправними частинами й правильним сполучником."
        points: 3
      - criteria: "Складнопідрядні речення"
        description: "Є щонайменше два різні типи підрядних частин, які можна пояснити питанням."
