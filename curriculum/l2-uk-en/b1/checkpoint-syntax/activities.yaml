version: '1.0'
module: checkpoint-syntax
level: b1
inline:
  - id: act-1
    type: quiz
    title: Діагностика синтаксису
    instruction: Оберіть відповідь, яка найточніше пояснює структуру речення.
    items:
      - question: "У реченні Зал відчинили, і гості зайшли є:"
        options:
          - "складносурядне речення з єднальним зв'язком"
          - "складнопідрядне речення часу"
          - "просте речення з однорідними присудками"
        correct: 0
        explanation: "Є дві основи: зал відчинили і гості зайшли."
      - question: "У реченні Ми купили квитки і зайшли до зали кома перед і не потрібна, бо:"
        options:
          - "один підмет ми має два однорідні присудки"
          - "слово і ніколи не потребує коми"
          - "це речення допусту"
        correct: 0
        explanation: "Купили і зайшли належать до одного підмета ми."
      - question: "Який сполучник вводить причину?"
        options:
          - "бо"
          - "якщо"
          - "хоч"
        correct: 0
        explanation: "Бо відповідає на питання чому?"
      - question: "У реченні Якщо буде час, зайдемо на ярмарок підрядна частина є:"
        options:
          - "умовною"
          - "означальною"
          - "протиставною"
        correct: 0
        explanation: "Якщо буде час відповідає на питання за якої умови?"
      - question: "У реченні Це зал, де проходять камерні концерти підрядна частина пояснює:"
        options:
          - "іменник зал"
          - "причину дії"
          - "вибір між двома діями"
        correct: 0
        explanation: "Це означальна підрядна частина."
      - question: "Яке речення правильно передає непряме питання так або ні?"
        options:
          - "Олена запитала, чи ми маємо квитки."
          - "Олена запитала, якщо ми маємо квитки."
          - "Олена запитала, щоб ми маємо квитки."
        correct: 0
        explanation: "Непряме питання так або ні потребує чи."
      - question: "Який варіант правильно оформлює пряму мову після слів автора?"
        options:
          - "Ведуча сказала: «Показ починається»."
          - "Ведуча сказала, «Показ починається»."
          - "Ведуча сказала «Показ починається»,"
        correct: 0
        explanation: "Після слів автора перед прямою мовою ставимо двокрапку."
      - question: "Чому в реченні «Ви вже готові?» — запитала волонтерка немає коми перед тире?"
        options:
          - "знак питання уже стоїть у прямій мові"
          - "слова автора завжди починаються з великої літери"
          - "тире замінює лапки"
        correct: 0
        explanation: "Після питання або оклику кому перед тире не додаємо."
      - question: "Яке питання допомагає впізнати речення мети?"
        options:
          - "для чого?"
          - "чому?"
          - "незважаючи на що?"
        correct: 0
        explanation: "Мета відповідає на питання для чого? або навіщо?"
      - question: "Яке речення має допустове значення?"
        options:
          - "Хоч черга була довга, ми дочекалися входу."
          - "Бо черга була довга, ми дочекалися входу."
          - "Якщо черга буде довга, ми дочекалися входу."
        correct: 0
        explanation: "Хоч називає перешкоду, яка не зупинила дію."
  - id: act-2
    type: select
    title: Пунктуаційні рішення
    instruction: Позначте всі правильні пояснення або варіанти.
    items:
      - question: "Що правильно про речення Після концерту площа спорожніла і кав'ярні зачинилися?"
        options:
          - text: "Кома перед і не ставиться, бо після концерту є спільним елементом."
            correct: true
          - text: "Це складносурядне речення з єднальним зв'язком."
            correct: true
          - text: "Кома обов'язкова після і."
            correct: false
      - question: "Виберіть правильні варіанти з прямою мовою."
        options:
          - text: "Олена сказала: «Я прийду раніше»."
            correct: true
          - text: "«Я прийду раніше», — сказала Олена."
            correct: true
          - text: "«Я прийду раніше,» сказала Олена."
            correct: false
      - question: "Що правильно для речення Ми залишилися вдома, тому що почався дощ?"
        options:
          - text: "Кома стоїть перед усім сполучником тому що."
            correct: true
          - text: "Підрядна частина називає причину."
            correct: true
          - text: "Кома має стояти після що."
            correct: false
      - question: "Виберіть правильні непрямі питання."
        options:
          - text: "Вона запитала, чи я бачив афішу."
            correct: true
          - text: "Вона запитала, де я бачив афішу."
            correct: true
          - text: "Вона запитала, якщо я бачив афішу."
            correct: false
  - id: act-3
    type: classify
    title: Класифікуйте підрядні частини
    instruction: Розподіліть речення за типом підрядної частини.
    categories:
      - label: "З'ясувальна"
        symbol_hint: "що саме?"
        items:
          - "Кураторка пояснила, що виставка триватиме до неділі."
          - "Я не знав, чи залишилися місця на лекцію."
      - label: "Означальна"
        symbol_hint: "який?"
        items:
          - "Це фільм, який ми обговорювали після показу."
          - "Ми зайшли до зали, де проходила дискусія."
      - label: "Часу"
        symbol_hint: "коли?"
        items:
          - "Коли почався концерт, телефони вимкнули."
          - "Ми повернулися додому, щойно закінчилася зустріч."
      - label: "Причини"
        symbol_hint: "чому?"
        items:
          - "Ми залишилися, бо режисерка відповідала на питання."
          - "Оскільки почався дощ, показ перенесли в залу."
      - label: "Умови"
        symbol_hint: "за якої умови?"
        items:
          - "Якщо матимеш час, зайди на ярмарок."
          - "Якби квитки були дешевші, ми запросили б друзів."
      - label: "Мети"
        symbol_hint: "для чого?"
        items:
          - "Ми прийшли раніше, щоб знайти місця."
          - "Волонтери говорили повільно, аби всі зрозуміли правила."
      - label: "Допусту"
        symbol_hint: "попри що?"
        items:
          - "Хоч черга була довга, люди чекали спокійно."
          - "Попри те що було холодно, концерт відбувся надворі."
  - id: act-4
    type: error-correction
    title: Пряма і непряма мова
    instruction: Знайдіть головну помилку й запишіть нормативний варіант.
    items:
      - sentence: "Ведуча сказала, «Показ починається»."
        error: "сказала,"
        correction: "Ведуча сказала: «Показ починається»."
        error_type: construction
        explanation: "Після слів автора перед прямою мовою потрібна двокрапка."
      - sentence: "«Показ починається» сказала ведуча."
        error: "без коми й тире"
        correction: "«Показ починається», — сказала ведуча."
        error_type: construction
        explanation: "Коли слова автора стоять після прямої мови, потрібні кома й тире."
      - sentence: "«Коли початок?», — запитав Марко."
        error: "кома після знака питання"
        correction: "«Коли початок?» — запитав Марко."
        error_type: construction
        explanation: "Після знака питання кому перед тире не додаємо."
      - sentence: "Олена запитала, якщо ми маємо квитки."
        error: "якщо"
        correction: "Олена запитала, чи ми маємо квитки."
        error_type: word
        explanation: "Непряме питання так або ні вводить чи."
      - sentence: "Марко сказав, що я прийде пізніше."
        error: "я прийде"
        correction: "Марко сказав, що він прийде пізніше."
        error_type: phrase
        explanation: "Переказ змінює точку зору: я Марка стає він."
      - sentence: "Мама попросила: «Зателефонуй мені завтра». → Мама попросила, що я зателефоную їй наступного дня."
        error: "що я зателефоную"
        correction: "Мама попросила: «Зателефонуй мені завтра». → Мама попросила, щоб я зателефонував їй наступного дня."
        error_type: construction
        explanation: "Прохання в непрямій мові передаємо через щоб."
      - sentence: "— Я вже тут? — відповів Андрій."
        error: "знак питання і відповів"
        correction: "— Я вже тут, — відповів Андрій."
        error_type: construction
        explanation: "Це відповідь, а не питання; перед словами автора потрібна кома."
  - id: act-5
    type: match-up
    title: Короткий текст про фестиваль
    instruction: Поєднайте фрагмент із його граматичною роллю.
    pairs:
      - left: "Коли в місті відкрився фестиваль короткого кіно"
        right: "підрядна частина часу"
      - left: "Олена сказала, що хоче подивитися документальний блок"
        right: "непряма мова зі з'ясувальною частиною"
      - left: "Марко запропонував спершу зайти на виставку афіш"
        right: "простий інфінітив після дієслова запропонував"
      - left: "Хоч черга була довга"
        right: "підрядна частина допусту"
      - left: "волонтери швидко перевірили квитки, і глядачі зайшли до зали"
        right: "складносурядне речення з єднальним зв'язком"
      - left: "Ведуча запитала: «Який фільм ви хочете обговорити першим?»"
        right: "пряма мова після слів автора"
      - left: "бо режисерка пояснила"
        right: "підрядна причина"
      - left: "як вона працювала з архівними матеріалами"
        right: "з'ясувальна частина з питальним словом"
workbook:
  - id: wb-1
    type: quiz
    title: Швидка класифікація
    instruction: Оберіть тип речення або підрядної частини.
    items:
      - question: "Ми хотіли піти на концерт, але квитків уже не було."
        options:
          - "складносурядне протиставне"
          - "складнопідрядне причини"
          - "пряма мова"
        correct: 0
        explanation: "Але поєднує дві рівноправні частини з контрастом."
      - question: "Я пам'ятаю, що музей працює до восьмої."
        options:
          - "з'ясувальне"
          - "часу"
          - "допусту"
        correct: 0
        explanation: "Підрядна частина розкриває зміст того, що пам'ятають."
      - question: "Це книжка, яку радили на зустрічі клубу."
        options:
          - "означальне"
          - "умови"
          - "мети"
        correct: 0
        explanation: "Підрядна частина пояснює іменник книжка."
      - question: "Ми зайшли до кав'ярні, бо почався дощ."
        options:
          - "причини"
          - "умови"
          - "розділове складносурядне"
        correct: 0
        explanation: "Бо відповідає на питання чому?"
      - question: "Якщо відкриють додаткову залу, ми купимо квитки."
        options:
          - "умови"
          - "допусту"
          - "прямої мови"
        correct: 0
        explanation: "Якщо називає умову майбутньої дії."
      - question: "Ми прийшли раніше, щоб поговорити з організаторами."
        options:
          - "мети"
          - "причини"
          - "часу"
        correct: 0
        explanation: "Щоб поговорити відповідає на питання для чого?"
      - question: "Хоч фільм був довгий, обговорення тривало ще годину."
        options:
          - "допусту"
          - "з'ясувальне"
          - "єднальне складносурядне"
        correct: 0
        explanation: "Хоч називає перешкоду, яка не зупинила обговорення."
  - id: wb-2
    type: fill-in
    title: Кома, тире або сполучник
    instruction: Оберіть варіант, який робить речення граматично й пунктуаційно правильним.
    items:
      - sentence: "Гурт вийшов на сцену____ зал зааплодував."
        answer: ", і"
        options:
          - ", і"
          - "і,"
          - "тому що,"
        explanation: "Є дві основи без спільного елемента, тому потрібна кома перед і."
      - sentence: "Ми залишилися після показу____ режисерка відповідала на питання."
        answer: ", бо"
        options:
          - ", бо"
          - "бо,"
          - ", якщо"
        explanation: "Підрядна причина приєднується через бо."
      - sentence: "____ буде час, зайдемо на книжковий ярмарок."
        answer: "Якщо"
        options:
          - "Якщо"
          - "Бо"
          - "Хоч"
        explanation: "Йдеться про умову."
      - sentence: "Олена сказала____ «Я прийду раніше»."
        answer: ":"
        options:
          - ":"
          - ","
          - "—"
        explanation: "Після слів автора перед прямою мовою ставимо двокрапку."
      - sentence: "«Я прийду раніше»____ сказала Олена."
        answer: ", —"
        options:
          - ", —"
          - ":"
          - "—,"
        explanation: "Після розповідної прямої мови перед словами автора потрібні кома й тире."
      - sentence: "Вона запитала, ____ ми бачили афішу."
        answer: "чи"
        options:
          - "чи"
          - "якщо"
          - "щоб"
        explanation: "Непряме питання так або ні вводить чи."
  - id: wb-3
    type: match-up
    title: Сполучник і тип зв'язку
    instruction: З'єднайте засіб зв'язку з його типовою роллю в контрольній.
    pairs:
      - left: "і, й, та в значенні і"
        right: "єднальний сурядний зв'язок"
      - left: "але, проте, однак"
        right: "протиставний сурядний зв'язок"
      - left: "або...або, чи...чи"
        right: "розділовий сурядний зв'язок"
      - left: "що після сказати або знати"
        right: "з'ясувальна підрядна частина"
      - left: "який, яку, з якими"
        right: "означальна підрядна частина"
      - left: "коли, щойно, після того як"
        right: "підрядна частина часу"
      - left: "бо, тому що, оскільки"
        right: "підрядна частина причини"
      - left: "якщо, якби"
        right: "підрядна частина умови"
      - left: "щоб, аби, для того щоб"
        right: "підрядна частина мети"
      - left: "хоч, хоча, попри те що"
        right: "підрядна частина допусту"
  - id: wb-4
    type: error-correction
    title: Діалог після вистави
    instruction: Відредагуйте короткі репліки та перекази.
    items:
      - sentence: "Олег сказав: «Я купив мій квиток учора»."
        error: "мій"
        correction: "Олег сказав: «Я купив свій квиток учора»."
        error_type: word
        explanation: "У прямій мові Олег може сказати свій квиток; у переказі буде його або свій."
      - sentence: "Олег сказав, що я купив мій квиток учора."
        error: "я купив мій"
        correction: "Олег сказав, що він купив свій квиток учора."
        error_type: phrase
        explanation: "У непрямій мові слова Олега переказує інша людина."
      - sentence: "— Ти залишишся на обговорення, — запитала Марта."
        error: "кома в питальній репліці"
        correction: "— Ти залишишся на обговорення? — запитала Марта."
        error_type: construction
        explanation: "Питання потребує знака питання перед тире."
      - sentence: "— Так? — відповів Андрій."
        error: "знак питання після відповіді"
        correction: "— Так, — відповів Андрій."
        error_type: construction
        explanation: "Це відповідь, тому потрібна кома перед словами автора."
      - sentence: "Марта попросила, що Андрій зачекав біля входу."
        error: "що"
        correction: "Марта попросила, щоб Андрій зачекав біля входу."
        error_type: word
        explanation: "Прохання передаємо через щоб."
      - sentence: "Андрій запитав, щоб Марта бачила програму."
        error: "щоб"
        correction: "Андрій запитав, чи Марта бачила програму."
        error_type: word
        explanation: "Це непряме питання так або ні."
  - id: wb-5
    type: cloze
    title: Міні-текст про міське свято
    instruction: Заповніть пропуски сполучниками або словами для непрямої мови.
    text: "Коли в центрі міста почалося свято, ми пішли на площу, {1} послухати хор. Черга була довга, {2} волонтери працювали швидко. Олена сказала, {3} хоче побачити майстер-клас, а Марко запитав, {4} ми маємо достатньо часу. {5} почався дощ, концерт перенесли до будинку культури. {6} було тісно, люди залишилися до кінця."
    blanks:
      - id: 1
        answer: "щоб"
        options:
          - "щоб"
          - "бо"
          - "хоч"
        explanation: "Ми пішли для чого? щоб послухати хор."
      - id: 2
        answer: "але"
        options:
          - "але"
          - "тому що"
          - "якщо"
        explanation: "Друга частина протиставляє довгу чергу і швидку роботу."
      - id: 3
        answer: "що"
        options:
          - "що"
          - "чи"
          - "якщо"
        explanation: "Це повідомлення в непрямій мові."
      - id: 4
        answer: "чи"
        options:
          - "чи"
          - "щоб"
          - "бо"
        explanation: "Це непряме питання так або ні."
      - id: 5
        answer: "Оскільки"
        options:
          - "Оскільки"
          - "Якщо"
          - "Щоб"
        explanation: "Початкова підрядна частина називає причину."
      - id: 6
        answer: "Хоч"
        options:
          - "Хоч"
          - "Бо"
          - "Коли"
        explanation: "Перешкода не зупинила дію, тому це допуст."
  - id: wb-6
    type: essay-response
    title: Відгук про культурну подію
    instruction: Напишіть короткий текст і самостійно перевірте синтаксис.
    prompt: "Напишіть 6-8 речень про фестиваль, виставку, концерт, кінопоказ або книжкову зустріч. Використайте одне складносурядне речення, два різні типи складнопідрядних речень, одну репліку прямої мови й одну непряму мову. Після тексту назвіть одну свою сильну зону й одну помилку, яку треба перевірити."
    min_words: 90
    model_answer: "Коли в бібліотеці почалася книжкова зустріч, ми сіли ближче до сцени. Авторка читала уривок, і слухачі уважно записували питання. Після читання модератор сказав: «Тепер можна поставити запитання». Я запитав, чи авторка довго працювала з архівами. Вона пояснила, що шукала листи в кількох містах, бо хотіла відновити історію родини. Хоч зустріч тривала майже дві години, люди не поспішали виходити. Моя сильна зона - непряма мова; перед наступним текстом я ще раз перевірю коми в підрядних реченнях."
