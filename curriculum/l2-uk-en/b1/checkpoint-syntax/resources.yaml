- title: "B1.7: складне речення і чуже мовлення"
  role: curriculum
  notes: "Контрольна робота повторює сертифіковані модулі M75-M83: складносурядні речення, сім типів складнопідрядних речень, пряму й непряму мову."
- title: "План B1 M84: checkpoint-syntax"
  role: curriculum
  notes: "Джерело вимог до контрольної: класифікація складних речень, пунктуація, конструювання, пряма й непряма мова, дозвілля й культура."
  source_ref: curriculum/l2-uk-en/plans/b1/checkpoint-syntax.yaml
- title: "B1 M75: складносурядне речення"
  role: curriculum
  notes: "Джерело для єднальних, протиставних і розділових сполучників, двох граматичних основ і пунктуації між частинами."
  source_ref: curriculum/l2-uk-en/b1/complex-compound/module.md
- title: "B1 M76-M82: типи складнопідрядних речень"
  role: curriculum
  notes: "Джерело для з'ясувальних, означальних, часових, причинних, умовних, цільових і допустових підрядних частин."
  source_ref: curriculum/l2-uk-en/b1/complex-subordinate-object/module.md
- title: "B1 M83: пряма і непряма мова"
  role: curriculum
  notes: "Джерело для схем прямої мови, діалогічного тире, непрямої мови зі що, щоб, чи та зміни точки зору."
  source_ref: curriculum/l2-uk-en/b1/reported-speech/module.md
- title: "Research notes: checkpoint-syntax"
  role: research
  notes: "Використано B1-релевантні факти: рівноправність частин складносурядного речення, класифікацію підрядних частин, коми при складених сполучниках, пряму мову й непрямі питання з чи. Безсполучникові речення та літературні пунктуаційні винятки залишено за межами B1."
  source_ref: wiki/grammar/b1/checkpoint-syntax.md
- title: "Заболотний Grade 9, складне речення"
  role: textbook
  notes: "Підручникова база для відмінності простого й складного речення, складносурядного та складнопідрядного зв'язку."
  source_ref: wiki/grammar/b1/checkpoint-syntax.sources.yaml#S1
- title: "Заболотний Grade 9, складнопідрядне речення"
  role: textbook
  notes: "Підручникова база для головної й підрядної частин, сполучників і сполучних слів."
  source_ref: wiki/grammar/b1/checkpoint-syntax.sources.yaml#S4
- title: "Заболотний Grade 9, синтаксис і пунктуація"
  role: textbook
  notes: "Підручникова база для пунктуаційного аналізу складних речень і базової термінології."
  source_ref: wiki/grammar/b1/checkpoint-syntax.sources.yaml#S7
