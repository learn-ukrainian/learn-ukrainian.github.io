version: '1.0'
module: health-at-the-doctor
level: b1
inline:
  - id: act-1
    type: quiz
    title: Моделі самопочуття
    instruction: Оберіть природну модель для медичної ситуації.
    items:
      - question: Як найприродніше сказати про головний біль?
        options:
          - У мене болить голова.
          - Я болю голову.
          - Мені болить голови.
        correct: 0
        explanation: Частина тіла стоїть у називному відмінку після болить.
      - question: Яка фраза описує загальний стан?
        options:
          - Я погано почуваюся.
          - Я погано хворобу.
          - Я поганий здоров'я.
        correct: 0
        explanation: Почуватися описує загальне самопочуття.
      - question: Як природно сказати про нудоту?
        options:
          - Мене нудить.
          - У мене нудить.
          - Я нуджу.
        correct: 0
        explanation: Для нудоти природна модель мене нудить.
      - question: Яке словосполучення граматично правильне?
        options:
          - сильний біль
          - сильна біль
          - сильне біль
        correct: 0
        explanation: Біль - іменник чоловічого роду.
      - question: Яка форма правильна в медичній фразі?
        options:
          - краплі для носа
          - краплі для ніса
          - краплі для ніс
        correct: 0
        explanation: Ніс має форму родового відмінка носа.
      - question: Що краще сказати в анкеті або на сайті клініки?
        options:
          - сімейний лікар
          - сімейний доктор наук
          - сімейний доктор філософії
        correct: 0
        explanation: Лікар - нейтральне слово для медичного працівника.
      - question: Яка фраза потрібна для запису?
        options:
          - Хочу записатися до лікаря.
          - Хочу записатися від лікаря.
          - Хочу записати лікаря на мене.
        correct: 0
        explanation: Записатися до лікаря - природна адміністративна модель.
      - question: Яка фраза добре описує тривалість симптому?
        options:
          - Це триває третій день.
          - Це триває третє дня.
          - Це тривалість на третій.
        correct: 0
        explanation: Третій день - коротка природна відповідь на питання як давно.
  - id: act-2
    type: fill-in
    title: Керування в кабінеті
    instruction: Вставте правильний прийменник або форму.
    items:
      - sentence: "Пацієнт скаржиться ____ сильний кашель."
        answer: на
        options:
          - на
          - від
          - до
        explanation: Скаржитися на + знахідний відмінок.
      - sentence: "Вона хворіє ____ грип."
        answer: на
        options:
          - на
          - від
          - з
        explanation: Хворіти на + знахідний відмінок.
      - sentence: "Він лікується ____ застуди."
        answer: від
        options:
          - від
          - на
          - до
        explanation: Лікуватися від + родовий відмінок.
      - sentence: "Лікар призначив ____."
        answer: ліки
        options:
          - ліки
          - ліків
          - лікам
        explanation: Призначити потребує знахідного відмінка.
      - sentence: "У мене болить ____."
        answer: горло
        options:
          - горло
          - горла
          - горлу
        explanation: Після болить частина тіла стоїть у називному.
      - sentence: "Мені боляче ____."
        answer: ковтати
        options:
          - ковтати
          - ковтаю
          - ковтання
        explanation: Після боляче часто стоїть інфінітив.
      - sentence: "Температура піднялася ____."
        answer: ввечері
        options:
          - ввечері
          - вечір
          - вечора
        explanation: Ввечері відповідає на питання коли.
      - sentence: "Мене направили ____ хірурга."
        answer: до
        options:
          - до
          - від
          - на
        explanation: Направити до спеціаліста.
      - sentence: "Потрібно здати аналіз ____."
        answer: крові
        options:
          - крові
          - кров
          - кров'ю
        explanation: Аналіз чого? крові.
      - sentence: "Лікар порадив більше ____."
        answer: відпочивати
        options:
          - відпочивати
          - відпочинок
          - відпочив
        explanation: Після порадив може стояти інфінітив.
  - id: act-3
    type: match-up
    title: Спеціаліст і причина
    instruction: Поєднайте спеціаліста з найтиповішою причиною звернення.
    pairs:
      - left: сімейний лікар
        right: перший контакт із загальною скаргою
      - left: терапевт
        right: огляд дорослого пацієнта
      - left: педіатр
        right: консультація для дитини
      - left: хірург
        right: травма або гострий біль
      - left: стоматолог
        right: зубний біль
      - left: окуліст
        right: перевірка зору
      - left: лікар
        right: огляд і призначення
  - id: act-4
    type: group-sort
    title: Медичні словотвірні гнізда
    instruction: Розподіліть слова за родинами.
    groups:
      - label: Лік-
        items:
          - лікар
          - лікувати
          - лікування
          - ліки
      - label: Здоров-
        items:
          - здоров'я
          - здоровий
          - оздоровлення
          - оздоровчий
      - label: Одуж-
        items:
          - одужати
          - одужувати
      - label: Хвор-
        items:
          - хвороба
          - хворіти
          - хворий
      - label: Бол-
        items:
          - біль
          - болить
          - безболісний
  - id: act-5
    type: error-correction
    title: Редагування скарги
    instruction: Знайдіть помилку в медичній фразі й подайте природний варіант.
    items:
      - sentence: "Я скаржуся від кашлю."
        error: від кашлю
        correction: на кашель
        error_type: construction
        explanation: Скаржитися на + знахідний відмінок.
      - sentence: "Вона хворіє грипом."
        error: хворіє грипом
        correction: хворіє на грип
        error_type: construction
        explanation: Хворіти на + знахідний відмінок.
      - sentence: "Він лікується на застуду."
        error: на застуду
        correction: від застуди
        error_type: construction
        explanation: Лікуватися від + родовий відмінок.
      - sentence: "У мене болить голови."
        error: голови
        correction: голова
        error_type: word
        explanation: Після болить потрібен називний відмінок.
      - sentence: "Маю сильна нежить."
        error: сильна нежить
        correction: сильний нежить
        error_type: phrase
        explanation: Нежить - чоловічого роду.
      - sentence: "Цей лік допомагає."
        error: Цей лік
        correction: Ці ліки
        error_type: phrase
        explanation: Ліки - множинний іменник.
      - sentence: "Краплі на нежить закінчилися."
        error: на нежить
        correction: від нежитю
        error_type: construction
        explanation: У цьому значенні природно краплі від нежитю.
      - sentence: "Доктор філософії приймає пацієнтів у поліклініці."
        error: Доктор філософії
        correction: Лікар
        error_type: phrase
        explanation: Доктор філософії - науковий ступінь, не назва сімейного лікаря.
      - sentence: "Аналіз кров показав норму."
        error: кров
        correction: крові
        error_type: word
        explanation: Аналіз чого? крові.
      - sentence: "Як я приймаю ці ліки?"
        error: я приймаю
        correction: приймати
        error_type: phrase
        explanation: "У питанні про інструкцію природно: як приймати ці ліки?"
workbook:
  - id: wb-1
    type: quiz
    title: Симптоми і конструкції
    instruction: Оберіть правильну фразу або пояснення.
    items:
      - question: Як сказати, що симптом є у вас?
        options:
          - У мене нежить.
          - Мене нежить.
          - Я нежить.
        correct: 0
        explanation: У мене + іменник називає симптом.
      - question: Яка фраза граматично правильна?
        options:
          - сильний кашель
          - сильна кашель
          - сильне кашель
        correct: 0
        explanation: Кашель - іменник чоловічого роду.
      - question: Яке речення найточніше описує біль?
        options:
          - Болить у правому боці зранку.
          - Болю правий бік зранку.
          - Біль на правий бік зранку.
        correct: 0
        explanation: Фраза називає місце й час болю.
      - question: Що є симптомом, а не діагнозом?
        options:
          - кашель
          - грип
          - алергія
        correct: 0
        explanation: Кашель - симптом; грип і алергія можуть бути діагнозами.
      - question: Яка фраза природна після "болить"?
        options:
          - болить спина
          - болить спини
          - болить спиною
        correct: 0
        explanation: Спина стоїть у називному відмінку.
      - question: Як назвати прохання повторити дозування?
        options:
          - Повторіть, будь ласка, як приймати.
          - Повторіть, будь ласка, як приймаю.
          - Повторіть, будь ласка, як прийому.
        correct: 0
        explanation: Інфінітив приймати пасує до інструкції.
      - question: Яке слово найкраще для медичного працівника?
        options:
          - лікар
          - доктор наук
          - доктор філософії
        correct: 0
        explanation: Лікар - нейтральне слово для медичної професії.
      - question: Що означає "медичний висновок"?
        options:
          - короткий текст про огляд, діагноз і рекомендації
          - назва температури
          - вид кашлю
        correct: 0
        explanation: Медичний висновок стисло фіксує основну інформацію після огляду.
      - question: Яка форма правильна?
        options:
          - немає ліків
          - немає лік
          - немає ліка
        correct: 0
        explanation: Ліки мають родовий множини ліків.
      - question: Який вислів доречний в аптеці?
        options:
          - Чи можна оплатити карткою?
          - Чи можна оплатити картка?
          - Чи можна оплата карткою?
        correct: 0
        explanation: Оплатити карткою - природна модель.
      - question: Яке речення правильно описує алергію?
        options:
          - У мене алергія на цей препарат.
          - У мене алергія від цей препарат.
          - У мене алергія цим препаратом.
        correct: 0
        explanation: Алергія на + знахідний відмінок.
      - question: Яка фраза підходить для медичного документа?
        options:
          - Рекомендовано відпочинок.
          - Рекомендований я відпочинок.
          - Рекомендація мене відпочинок.
        correct: 0
        explanation: Рекомендовано - типова безособова форма в документах.
  - id: wb-2
    type: fill-in
    title: Діалог із лікарем
    instruction: Доповніть репліки правильними словами.
    items:
      - sentence: "Лікар: На що ви ____?"
        answer: скаржитеся
        options:
          - скаржитеся
          - хворієте
          - лікуєтеся
        explanation: Питання про скарги починається з На що скаржитеся?
      - sentence: "Пацієнт: Скаржуся ____ головний біль."
        answer: на
        options:
          - на
          - від
          - до
        explanation: Скаржитися на + знахідний.
      - sentence: "Лікар: Як давно це ____?"
        answer: триває
        options:
          - триває
          - лікує
          - призначає
        explanation: Тривати описує час симптому.
      - sentence: "Пацієнт: Це триває третій ____."
        answer: день
        options:
          - день
          - дня
          - днем
        explanation: Третій день - стала відповідь.
      - sentence: "Лікар: Температура ____?"
        answer: була
        options:
          - була
          - був
          - були
        explanation: Температура - жіночий рід.
      - sentence: "Пацієнт: Учора ____ 38,2."
        answer: була
        options:
          - була
          - був
          - були
        explanation: Підмет температура пропущено, але форма лишається жіночою.
      - sentence: "Лікар: Відкрийте ____, будь ласка."
        answer: рота
        options:
          - рота
          - рот
          - ротом
        explanation: У цій медичній інструкції природно відкрити рота.
      - sentence: "Лікар: Дихайте ____."
        answer: глибоко
        options:
          - глибоко
          - глибокий
          - глибина
        explanation: Потрібен прислівник.
      - sentence: "Лікар: Я ____ вам ліки."
        answer: призначу
        options:
          - призначу
          - призначення
          - призначений
        explanation: Лікар виконує дію призначити.
      - sentence: "Пацієнт: Скільки разів ____ день?"
        answer: на
        options:
          - на
          - у
          - від
        explanation: Стала фраза - разів на день.
      - sentence: "Лікар: Приймайте після ____."
        answer: їжі
        options:
          - їжі
          - їжа
          - їжею
        explanation: Після + родовий відмінок.
      - sentence: "Лікар: Потрібно зробити ____."
        answer: УЗД
        options:
          - УЗД
          - УЗДа
          - УЗДом
        explanation: УЗД як абревіатура в цій фразі не змінюється.
  - id: wb-3
    type: match-up
    title: Слово і функція
    instruction: Поєднайте слово з його роллю в медичній ситуації.
    pairs:
      - left: рецепт
        right: документ для отримання ліків
      - left: діагноз
        right: назва хвороби або стану
      - left: симптом
        right: ознака стану або хвороби
      - left: медичний висновок
        right: короткий опис огляду й рекомендацій
      - left: аналіз крові
        right: обстеження, результат якого показують лікарю
      - left: рентген
        right: обстеження за знімком
      - left: УЗД
        right: обстеження ультразвуком
      - left: тиск
        right: показник, який вимірюють тонометром
      - left: дозування
        right: кількість і частота прийому
      - left: побічна дія
        right: небажана реакція на препарат
      - left: алергія
        right: реакція організму на речовину
      - left: профілактика
        right: дії для запобігання хворобі
  - id: wb-4
    type: group-sort
    title: Керування і моделі
    instruction: Розподіліть фрази за граматичною моделлю.
    groups:
      - label: Скаржитися на
        items:
          - скаржитися на кашель
          - скаржитися на головний біль
          - скаржитися на нежить
      - label: Хворіти на
        items:
          - хворіти на грип
          - хворіти на ангіну
          - хворіти на алергію
      - label: Лікуватися від
        items:
          - лікуватися від застуди
          - лікуватися від грипу
          - лікуватися від запалення
      - label: У мене
        items:
          - у мене температура
          - у мене кашель
          - у мене запис до лікаря
      - label: Мені
        items:
          - мені боляче
          - мені погано
          - мені потрібен рецепт
      - label: Мене
        items:
          - мене нудить
  - id: wb-5
    type: error-correction
    title: Керування без кальки
    instruction: Виправте помилку в керуванні або роді.
    items:
      - sentence: "Скаржуся від головного болю."
        error: від головного болю
        correction: на головний біль
        error_type: construction
        explanation: Скаржитися на + знахідний.
      - sentence: "Хворію грипом уже третій день."
        error: Хворію грипом
        correction: Хворію на грип
        error_type: construction
        explanation: Хворіти на + знахідний.
      - sentence: "Лікуюся на алергію."
        error: на алергію
        correction: від алергії
        error_type: construction
        explanation: Лікуватися від + родовий.
      - sentence: "У мене сильна біль."
        error: сильна біль
        correction: сильний біль
        error_type: phrase
        explanation: Біль - чоловічого роду.
      - sentence: "У дитини сильна кашель."
        error: сильна кашель
        correction: сильний кашель
        error_type: phrase
        explanation: Кашель - чоловічого роду.
      - sentence: "Немає лік у цій аптеці."
        error: лік
        correction: ліків
        error_type: word
        explanation: Родовий множини від ліки - ліків.
      - sentence: "Користуйтеся краплі не довше п'яти днів."
        error: краплі
        correction: краплями
        error_type: word
        explanation: Користуватися чим? краплями.
      - sentence: "Аналіз сеча буде завтра."
        error: сеча
        correction: сечі
        error_type: word
        explanation: Аналіз чого? сечі.
      - sentence: "Запишіть мене на сімейного лікаря."
        error: на сімейного лікаря
        correction: до сімейного лікаря
        error_type: construction
        explanation: Записатися до лікаря.
      - sentence: "Після їжа приймайте таблетку."
        error: їжа
        correction: їжі
        error_type: word
        explanation: Після + родовий відмінок.
      - sentence: "Мене направили на хірурга."
        error: на хірурга
        correction: до хірурга
        error_type: construction
        explanation: Направити до спеціаліста.
      - sentence: "Я маю алергію від цей препарат."
        error: від цей препарат
        correction: на цей препарат
        error_type: construction
        explanation: Алергія на + знахідний.
  - id: wb-6
    type: true-false
    title: Аптека і ліки
    instruction: Позначте, чи твердження правильне.
    items:
      - statement: "Ліки - множинний іменник."
        correct: true
        explanation: Кажемо ці ліки, немає ліків.
      - statement: "Правильно: цей лік допомагає."
        correct: false
        explanation: У значенні медичного засобу треба ці ліки.
      - statement: "Краплі можна використовувати у фразі краплі для носа."
        correct: true
        explanation: Це природне словосполучення.
      - statement: "Після їжі означає до їжі."
        correct: false
        explanation: Після їжі означає, що препарат приймають не до їжі, а після неї.
      - statement: "Дозування пояснює, скільки і як часто приймати препарат."
        correct: true
        explanation: Це основне значення слова дозування.
      - statement: "Рецепт може бути потрібний для отримання ліків."
        correct: true
        explanation: Частина препаратів рецептурні.
      - statement: "Мазь зазвичай п'ють."
        correct: false
        explanation: Мазь наносять.
      - statement: "Спрей можна розпилювати."
        correct: true
        explanation: Це природне дієслово для спрею.
      - statement: "Інструкція до ліків може містити протипоказання."
        correct: true
        explanation: Протипоказання пояснюють, коли препарат не можна використовувати.
      - statement: "У фразі з іншими ліками слово ліками стоїть в орудному відмінку."
        correct: true
        explanation: З чим? з ліками.
      - statement: "Без рецепта означає, що рецепт обов'язково є."
        correct: false
        explanation: Без рецепта означає, що рецепт не потрібен.
      - statement: "Побічна дія - це небажана реакція."
        correct: true
        explanation: Це стандартне значення.
  - id: wb-7
    type: order
    title: Маршрут пацієнта
    instruction: Розташуйте кроки медичного візиту в логічному порядку.
    items:
      - Зателефонувати або записатися онлайн.
      - Назвати причину візиту.
      - Прийти до поліклініки.
      - Підтвердити запис на прийом.
      - Зайти до кабінету лікаря.
      - Описати скарги й симптоми.
      - Відповісти на питання про ліки та алергію.
      - Пройти огляд.
      - Отримати призначення й рекомендації.
      - Уточнити дозування в аптеці.
    correct_order:
