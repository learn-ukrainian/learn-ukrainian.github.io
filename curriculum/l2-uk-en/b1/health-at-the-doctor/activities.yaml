  - id: wb-8
    type: translate
    title: Переклад медичних фраз
    instruction: Оберіть природний український варіант.
    items:
      - source: I have a headache.
        options:
          - text: У мене головний біль.
            correct: true
          - text: Я маю біль голови.
            correct: false
        explanation: У мене головний біль - природна коротка фраза.
      - source: I complain of a cough.
        options:
          - text: Я скаржуся на кашель.
            correct: true
          - text: Я скаржуся від кашлю.
            correct: false
        explanation: Скаржитися на + знахідний.
      - source: She has the flu.
        options:
          - text: Вона хворіє на грип.
            correct: true
          - text: Вона хворіє грипом.
            correct: false
        explanation: Хворіти на + знахідний.
      - source: He is being treated for a cold.
        options:
          - text: Він лікується від застуди.
            correct: true
          - text: Він лікується на застуду.
            correct: false
        explanation: Лікуватися від + родовий.
      - source: Take the medicine after meals.
        options:
          - text: Приймайте ліки після їжі.
            correct: true
          - text: Приймайте лік після їжа.
            correct: false
        explanation: Ліки множинні; після їжі - родовий.
      - source: I am allergic to this medicine.
        options:
          - text: У мене алергія на ці ліки.
            correct: true
          - text: У мене алергія від ці ліки.
            correct: false
        explanation: Алергія на + знахідний.
      - source: I need to see a surgeon.
        options:
          - text: Мені треба звернутися до хірурга.
            correct: true
          - text: Мені треба звернутися на хірурга.
            correct: false
        explanation: Звернутися до спеціаліста.
      - source: The doctor prescribed drops.
        options:
          - text: Лікар призначив краплі.
            correct: true
          - text: Лікар призначив таблетку.
            correct: false
        explanation: Призначив і краплі - нормативні форми.
      - source: How many times a day?
        options:
          - text: Скільки разів на день?
            correct: true
          - text: Скільки рази в день?
            correct: false
        explanation: Стала фраза - разів на день.
      - source: I need to cancel the appointment.
        options:
          - text: Мені треба скасувати запис.
            correct: true
          - text: Мені треба відмінити записку.
            correct: false
        explanation: Скасувати запис - природна адміністративна фраза.
