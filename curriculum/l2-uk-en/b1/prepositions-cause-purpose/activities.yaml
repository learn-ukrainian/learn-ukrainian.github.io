version: '1.0'
module: prepositions-cause-purpose
level: b1
inline:
  - id: act-1
    type: quiz
    title: Причина чи мета?
    instruction: "Оберіть варіант, який точно передає логічний зв'язок."
    items:
      - question: "Яке питання ставимо до причини?"
        options:
          - "чому?"
          - "навіщо?"
          - "куди?"
        correct: 0
        explanation: "Причина пояснює, чому щось сталося."
      - question: "Яке питання ставимо до мети?"
        options:
          - "навіщо?"
          - "звідки?"
          - "коли?"
        correct: 0
        explanation: "Мета пояснює, для чого або з яким наміром людина діє."
      - question: "У реченні Через хворобу він пропустив лекцію виділена фраза виражає:"
        options:
          - "причину"
          - "мету"
          - "місце"
        correct: 0
        explanation: "Хвороба пояснює, чому він пропустив лекцію."
      - question: "У реченні Він прийшов, щоб поговорити з викладачкою виділена частина виражає:"
        options:
          - "мету"
          - "причину"
          - "шлях"
        correct: 0
        explanation: "Щоб поговорити відповідає на питання навіщо?"
      - question: "Який прийменник найкращий для негативної причини?"
        options:
          - "через"
          - "завдяки"
          - "заради"
        correct: 0
        explanation: "Через називає перешкоду або небажану причину."
      - question: "Який прийменник найкращий для позитивної причини?"
        options:
          - "завдяки"
          - "через"
          - "попри"
        correct: 0
        explanation: "Завдяки називає причину, що допомогла."
      - question: "Яке речення нормативно передає негативну причину?"
        options:
          - "Через хворобу він не прийшов."
          - "Завдяки хворобі він не прийшов."
          - "Для хвороби він не прийшов."
        correct: 0
        explanation: "Хвороба завадила, тому потрібне через."
      - question: "Яке речення нормативно передає позитивну причину?"
        options:
          - "Завдяки підтримці ми встигли."
          - "Через підтримку ми встигли."
          - "Від підтримки ми встигли."
        correct: 0
        explanation: "Підтримка допомогла, тому завдяки."
      - question: "Що виражає від у фразі тремтіти від холоду?"
        options:
          - "фізичну реакцію"
          - "мету руху"
          - "офіційний стиль"
        correct: 0
        explanation: "Від + родовий часто описує реакцію тіла або емоцій."
      - question: "Що виражає з у фразі зробити з цікавості?"
        options:
          - "внутрішню мотивацію"
          - "майбутній час"
          - "точний маршрут"
        correct: 0
        explanation: "З цікавості пояснює внутрішній мотив дії."
      - question: "Яка модель найкраща для мети-дії?"
        options:
          - "щоб + інфінітив"
          - "через + знахідний"
          - "від + родовий"
        correct: 0
        explanation: "Щоб допомогти, щоб подати, щоб отримати - це дія-мета."
      - question: "Яка модель найкраща для руху по документ?"
        options:
          - "по + знахідний"
          - "завдяки + давальний"
          - "у зв'язку з + орудний"
        correct: 0
        explanation: "Зайти по довідку означає рух із метою отримати документ."
  - id: act-2
    type: fill-in
    title: Оберіть прийменник
    instruction: "Заповніть пропуск причиновим або метовим засобом."
    items:
      - sentence: "____ хворобу студент пропустив лекцію."
        answer: "Через"
        options:
          - "Через"
          - "Завдяки"
          - "Для"
        explanation: "Хвороба - негативна причина."
      - sentence: "____ допомозі одногрупників він наздогнав матеріал."
        answer: "Завдяки"
        options:
          - "Завдяки"
          - "Через"
          - "Від"
        explanation: "Допомога сприяла доброму результату."
      - sentence: "Вона почервоніла ____ сорому."
        answer: "від"
        options:
          - "від"
          - "для"
          - "завдяки"
        explanation: "Почервоніти від сорому - емоційна реакція."
      - sentence: "Я відкрив архів ____ цікавості."
        answer: "з"
        options:
          - "з"
          - "через"
          - "для"
        explanation: "З цікавості показує внутрішню мотивацію."
      - sentence: "____ ремонтом аудиторії заняття перенесли."
        answer: "У зв'язку з"
        options:
          - "У зв'язку з"
          - "Заради"
          - "По"
        explanation: "У зв'язку з + орудний - офіційна причина."
      - sentence: "Цей посібник створено ____ студентів."
        answer: "для"
        options:
          - "для"
          - "через"
          - "від"
        explanation: "Для + родовий позначає призначення або користь."
      - sentence: "Команда працювала ____ спільної мети."
        answer: "заради"
        options:
          - "заради"
          - "від"
          - "через"
        explanation: "Заради підкреслює ціннісну мету."
      - sentence: "Я прийшов раніше, ____ допомогти з реєстрацією."
        answer: "щоб"
        options:
          - "щоб"
          - "тому що"
          - "завдяки"
        explanation: "Щоб + інфінітив виражає дію-мету."
      - sentence: "Студент зайшов до деканату ____ довідку."
        answer: "по"
        options:
          - "по"
          - "завдяки"
          - "від"
        explanation: "По довідку - мета руху отримати документ."
      - sentence: "____ зливи дорогу тимчасово перекрили."
        answer: "Унаслідок"
        options:
          - "Унаслідок"
          - "Для"
          - "По"
        explanation: "Унаслідок + родовий показує результат події."
      - sentence: "Ми говорили тихо ____ поваги до працівниць."
        answer: "з"
        options:
          - "з"
          - "від"
          - "через"
        explanation: "З поваги - внутрішній мотив поведінки."
      - sentence: "____ того щоб вступити, треба подати документи."
        answer: "Для"
        options:
          - "Для"
          - "Через"
          - "Від"
        explanation: "Для того щоб утворює складену конструкцію мети."
  - id: act-3
    type: match-up
    title: Модель і значення
    instruction: "Поєднайте фразу з її граматичною роллю."
    pairs:
      - left: "через затор"
        right: "негативна причина, через + знахідний"
      - left: "завдяки підтримці"
        right: "позитивна причина, завдяки + давальний"
      - left: "від холоду"
        right: "фізична реакція, від + родовий"
      - left: "з цікавості"
        right: "внутрішня мотивація, з + родовий"
      - left: "у зв'язку з ремонтом"
        right: "офіційна причина, орудний після з"
      - left: "унаслідок аварії"
        right: "результат події, унаслідок + родовий"
      - left: "для консультації"
        right: "нейтральна мета, для + родовий"
      - left: "заради дітей"
        right: "ціннісна мета, заради + родовий"
      - left: "щоб допомогти"
        right: "дія-мета через інфінітив"
      - left: "для того щоб подати заяву"
        right: "розгорнута конструкція мети"
      - left: "по довідку"
        right: "мета руху отримати документ"
      - left: "тому що захворів"
        right: "підрядна причина"
  - id: act-4
    type: group-sort
    title: Розподіліть фрази
    instruction: "Розкладіть фрази за типом значення."
    groups:
      - label: "Причина-перешкода"
        items:
          - "через хворобу"
          - "через помилку"
          - "через затримку"
      - label: "Причина-підтримка"
        items:
          - "завдяки допомозі"
          - "завдяки досвіду"
          - "завдяки команді"
      - label: "Реакція або мотивація"
        items:
          - "від радості"
          - "з цікавості"
          - "зі страху"
      - label: "Мета"
        items:
          - "для стипендії"
          - "щоб вступити"
          - "по довідку"
  - id: act-5
    type: error-correction
    title: Виправляємо причину й мету
    instruction: "Знайдіть і виправте одну помилку в кожному реченні."
    items:
      - sentence: "Завдяки хворобі він не прийшов на заняття."
        error: "Завдяки хворобі"
        correction: "Через хворобу"
        error_type: phrase
        explanation: "Хвороба завадила, тому потрібне через."
      - sentence: "Через допомозі друзів ми завершили проєкт."
        error: "Через допомозі"
        correction: "Завдяки допомозі"
        error_type: phrase
        explanation: "Допомога сприяла успіху; завдяки керує давальним."
      - sentence: "Я прийшов через консультацію, щоб поставити питання."
        error: "через консультацію"
        correction: "для консультації"
        error_type: phrase
        explanation: "Консультація є метою приходу, не причиною-перешкодою."
      - sentence: "Вона тремтіла з холоду."
        error: "з холоду"
        correction: "від холоду"
        error_type: phrase
        explanation: "Фізичну реакцію передає від + родовий."
      - sentence: "Він відкрив лист від цікавості."
        error: "від цікавості"
        correction: "з цікавості"
        error_type: phrase
        explanation: "Мотив дії передає з + родовий."
      - sentence: "У зв'язку з ремонт заняття перенесли."
        error: "з ремонт"
        correction: "з ремонтом"
        error_type: phrase
        explanation: "У зв'язку з керує орудним."
      - sentence: "Цей текст написано для пояснити правило."
        error: "для пояснити"
        correction: "щоб пояснити"
        error_type: phrase
        explanation: "Для дії потрібне щоб + інфінітив або для + іменник."
      - sentence: "Я пішов у крамницю за хлібом."
        error: "за хлібом"
        correction: "по хліб"
        error_type: phrase
        explanation: "Для руху з метою отримати річ навчальна норма дає по + знахідний."
      - sentence: "Для хвороби я залишився вдома."
        error: "Для хвороби"
        correction: "Через хворобу"
        error_type: phrase
        explanation: "Хвороба є причиною, а не метою."
      - sentence: "Ми працювали через майбутнє дітей."
        error: "через майбутнє"
        correction: "заради майбутнього"
        error_type: phrase
        explanation: "Майбутнє дітей є ціннісною метою."
      - sentence: "Я прийшов тому що допомогти."
        error: "тому що допомогти"
        correction: "щоб допомогти"
        error_type: phrase
        explanation: "Дія-мета потребує щоб + інфінітив."
      - sentence: "Студент залишився завдяки тому що мав питання."
        error: "завдяки тому що"
        correction: "тому що"
        error_type: phrase
        explanation: "Мати питання - нейтральна причина, не позитивна причина-підтримка."
workbook:
  - id: wb-1
    type: quiz
    title: Вибір за змістом
    instruction: "Оберіть найточніший варіант."
    items:
      - question: "Яке речення правильно пояснює запізнення?"
        options:
          - "Я запізнився через затор."
          - "Я запізнився завдяки затору."
          - "Я запізнився для затору."
        correct: 0
        explanation: "Затор є перешкодою."
      - question: "Яке речення правильно пояснює успіх?"
        options:
          - "Ми перемогли завдяки підтримці."
          - "Ми перемогли через підтримці."
          - "Ми перемогли від підтримки."
        correct: 0
        explanation: "Підтримка допомогла, тому завдяки + давальний."
      - question: "Який варіант має правильний відмінок після через?"
        options:
          - "через помилку"
          - "через помилки"
          - "через помилці"
        correct: 0
        explanation: "Через у причинному значенні керує знахідним."
      - question: "Який варіант має правильний відмінок після завдяки?"
        options:
          - "завдяки викладачеві"
          - "завдяки викладача"
          - "завдяки викладачем"
        correct: 0
        explanation: "Завдяки керує давальним."
      - question: "Який варіант найкраще передає реакцію тіла?"
        options:
          - "тремтіти від холоду"
          - "тремтіти для холоду"
          - "тремтіти завдяки холоду"
        correct: 0
        explanation: "Від + родовий передає реакцію."
      - question: "Який варіант найкраще передає мотив?"
        options:
          - "зробити з поваги"
          - "зробити від поваги"
          - "зробити для повагою"
        correct: 0
        explanation: "З поваги пояснює внутрішній мотив."
      - question: "Яка конструкція звучить офіційно?"
        options:
          - "у зв'язку з ремонтом"
          - "по ремонту"
          - "завдяки ремонтом"
        correct: 0
        explanation: "У зв'язку з + орудний - типова офіційна формула."
      - question: "Який варіант є нейтральною метою?"
        options:
          - "для навчання"
          - "через навчання"
          - "від навчання"
        correct: 0
        explanation: "Для + родовий позначає мету або користь."
      - question: "Який варіант підкреслює цінність?"
        options:
          - "заради справедливості"
          - "через справедливість"
          - "від справедливості"
        correct: 0
        explanation: "Заради має емоційно-ціннісний відтінок."
      - question: "Який варіант означає дію-мету?"
        options:
          - "щоб подати заяву"
          - "тому що подати заяву"
          - "через подати заяву"
        correct: 0
        explanation: "Щоб + інфінітив виражає мету."
      - question: "Який варіант означає рух отримати річ?"
        options:
          - "піти по воду"
          - "піти від води"
          - "піти завдяки воді"
        correct: 0
        explanation: "По воду - мета руху."
      - question: "Який варіант є підрядною причиною?"
        options:
          - "тому що захворів"
          - "щоб захворів"
          - "по захворів"
        correct: 0
        explanation: "Тому що вводить причину."
  - id: wb-2
    type: fill-in
    title: Деканат і розклад
    instruction: "Заповніть пропуски правильною конструкцією."
    items:
      - sentence: "Студент не був на лекції ____ хворобу."
        answer: "через"
        options:
          - "через"
          - "завдяки"
          - "заради"
        explanation: "Небажана причина - через."
      - sentence: "Він наздогнав тему ____ консультації."
        answer: "завдяки"
        options:
          - "завдяки"
          - "через"
          - "по"
        explanation: "Консультація допомогла."
      - sentence: "Викладачка усміхнулася ____ радості."
        answer: "від"
        options:
          - "від"
          - "для"
          - "у зв'язку з"
        explanation: "Реакція на емоцію - від радості."
      - sentence: "Я перечитав правила ____ цікавості."
        answer: "з"
        options:
          - "з"
          - "через"
          - "від"
        explanation: "Внутрішній мотив - з цікавості."
      - sentence: "____ оновленням сайту реєстрацію тимчасово закрили."
        answer: "У зв'язку з"
        options:
          - "У зв'язку з"
          - "Заради"
          - "По"
        explanation: "Офіційна причина з орудним."
      - sentence: "Заяву подають ____ отримання стипендії."
        answer: "для"
        options:
          - "для"
          - "через"
          - "від"
        explanation: "Отримання стипендії - мета."
      - sentence: "Група працює ____ спільного результату."
        answer: "заради"
        options:
          - "заради"
          - "через"
          - "від"
        explanation: "Спільний результат - ціннісна мета."
      - sentence: "Я зайшов до бібліотеки, ____ повернути книжку."
        answer: "щоб"
        options:
          - "щоб"
          - "тому що"
          - "завдяки"
        explanation: "Дія-мета - щоб + інфінітив."
      - sentence: "Вона пішла до деканату ____ довідку."
        answer: "по"
        options:
          - "по"
          - "з"
          - "від"
        explanation: "Рух по документ: по довідку."
      - sentence: "____ помилки в розкладі аудиторію змінили."
        answer: "Унаслідок"
        options:
          - "Унаслідок"
          - "Для"
          - "Заради"
        explanation: "Унаслідок + родовий показує результат."
      - sentence: "Він мовчав ____ страху."
        answer: "зі"
        options:
          - "зі"
          - "для"
          - "завдяки"
        explanation: "Зі страху - мотив поведінки."
      - sentence: "____ того, щоб скласти іспит, треба повторити всі теми."
        answer: "Для"
        options:
          - "Для"
          - "Через"
          - "Від"
        explanation: "Для того, щоб - розгорнута мета."
  - id: wb-3
    type: cloze
    title: Пояснення студента
    instruction: "Заповніть текст так, щоб причина й мета були точними."
