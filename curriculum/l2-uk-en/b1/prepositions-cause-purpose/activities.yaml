  - id: wb-8
    type: essay-response
    title: Пояснення причини й мети
    instruction: "Напишіть 6-8 речень українською."
    prompt: "Опишіть ситуацію в університеті, на роботі або в громадському проєкті. Використайте щонайменше дві конструкції причини і дві конструкції мети: через, завдяки, від, з, для, заради, щоб, у зв'язку з або по."
    min_words: 90
    model_answer: "У понеділок нашу зустріч перенесли у зв'язку з ремонтом аудиторії. Через цю зміну я прийшов до бібліотеки раніше, щоб знайти нове місце і підготувати питання. Спочатку я хвилювався зі страху помилитися, але завдяки підтримці одногрупників швидко заспокоївся. Ми залишилися після консультації для обговорення проєкту й для перевірки списку учасників. Потім я зайшов до деканату по довідку для стипендії, бо без неї заяву не приймали. Команда працювала заради спільного результату, тому всі розподілили завдання дуже уважно. Від радості після успішної презентації ми довго дякували викладачці і домовилися зустрітися знову для підготовки наступного етапу."
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "6-8 речень і щонайменше 90 слів."
      - criteria: "Причина"
        points: 3
        description: "Є щонайменше дві точні конструкції причини з правильним відмінком."
      - criteria: "Мета"
        points: 3
        description: "Є щонайменше дві точні конструкції мети з правильним відмінком або інфінітивом."
      - criteria: "Регістр"
        points: 1
        description: "Офіційні й розмовні конструкції використано доречно."
