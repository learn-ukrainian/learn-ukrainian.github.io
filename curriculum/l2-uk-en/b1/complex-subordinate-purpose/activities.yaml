  - id: wb-5
    type: essay-response
    title: "Поясніть мету дій"
    instruction: "Напишіть 8-10 речень українською."
    prompt: "Опишіть навчальну, робочу або громадську ситуацію, у якій люди виконують кілька дій з різною метою. Використайте щонайменше шість конструкцій: щоб + інфінітив, щоб + особова форма, для того щоб, аби, з тим щоб або з метою, а також одну пару, де ви розрізняєте мету і причину."
    min_words: 120
    model_answer: >-
      Наша група готує відкриту зустріч у бібліотеці. Я прийшов раніше, щоб
      перевірити проєктор і під'єднати ноутбук. Координаторка надіслала нагадування,
      щоб волонтери не забули про час початку. Для того щоб нові учасники швидко
      зрозуміли тему, ми підготували коротку інструкцію. Волонтери розставили столи
      півколом, аби люди бачили одне одного під час обговорення. Робочу таблицю
      створили з тим, щоб кожен бачив своє завдання. Ми перенесли зустріч в іншу
      залу, бо в першій ремонтували світло; це причина, а не мета. Водночас ми
      відкрили онлайн-посилання, щоб учасники з інших міст могли долучитися. Після
      зустрічі я залишився, щоб поговорити з викладачкою про наступний проєкт.
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "8-10 речень і щонайменше 120 слів."
      - criteria: "Конструкції мети"
        points: 3
        description: "Є щонайменше шість цільових конструкцій із завдання."
      - criteria: "Форма після щоб"
        points: 2
        description: "Правильно розрізнено інфінітив і особову форму."
      - criteria: "Мета і причина"
        points: 3
        description: "Є чітка пара, де причина не змішана з метою."
