version: '1.0'
module: complex-subordinate-purpose
level: b1
inline:
  - id: act-1
    type: quiz
    title: "Читання: майстерня в бібліотеці"
    instruction: "Прочитайте текст перед вправою і оберіть правильне пояснення речень мети."
    items:
      - question: "Для чого координаторка прийшла на годину раніше?"
        options:
          - "Щоб перевірити техніку"
          - "Бо техніка вже зламалася"
          - "Якщо учасники прийдуть раніше"
        correct: 0
        explanation: "Щоб перевірити техніку відповідає на питання для чого?"
      - question: "У реченні Волонтери розставили столи півколом, аби учасники бачили одне одного сполучник аби вводить:"
        options:
          - "мету"
          - "причину"
          - "умову"
        correct: 0
        explanation: "Аби тут близьке до щоб і називає мету розташування столів."
      - question: "Що підкреслює фраза для того щоб у тексті?"
        options:
          - "навчальну мету дії"
          - "час початку заняття"
          - "перешкоду, попри яку дія сталася"
        correct: 0
        explanation: "Для того щоб показати різницю пояснює, навіщо принесли газети."
      - question: "Яке питання ставимо до підрядної мети?"
        options:
          - "Для чого?"
          - "За якої умови?"
          - "Чому?"
        correct: 0
        explanation: "Для чого? навіщо? з якою метою? - питання мети."
      - question: "Чому речення Один студент відкрив спільний документ, щоб команда швидко записувала приклади має різні підмети?"
        options:
          - "Відкрив студент, а записувала команда"
          - "Студент і команда означають ту саму особу"
          - "У реченні немає підмета"
        correct: 0
        explanation: "Різні виконавці потребують особової форми після щоб."
      - question: "Яка конструкція в тексті звучить найофіційніше?"
        options:
          - "з тим щоб використати їх у шкільному проєкті"
          - "щоб перевірити техніку"
          - "щоб команда записувала приклади"
        correct: 0
        explanation: "З тим щоб має офіційно-діловий відтінок."
      - question: "Що називає підрядна мети?"
        options:
          - "бажаний результат головної дії"
          - "факт, який уже пояснює причину"
          - "часову межу події"
        correct: 0
        explanation: "Мета показує, навіщо виконано головну дію."
      - question: "Яке речення найкраще продовжує текст як мета?"
        options:
          - "Учасники записали правила, щоб використати їх у школі."
          - "Учасники записали правила, бо вони вже були в школі."
          - "Учасники записали правила, якщо вони будуть у школі."
        correct: 0
        explanation: "Щоб використати відповідає на питання навіщо записали?"
      - question: "Яка пара найкраще показує контраст M80/M81?"
        options:
          - "якщо = умова, щоб = мета"
          - "бо = мета, аби = причина"
          - "хоч = мета, якщо = допуст"
        correct: 0
        explanation: "M80 тренував умову, M81 тренує мету."
      - question: "Чому не досить знайти тільки сполучник щоб?"
        options:
          - "Треба ще поставити питання до головної дії"
          - "Щоб завжди означає лише з'ясувальне речення"
          - "Щоб ніколи не вводить мету"
        correct: 0
        explanation: "Один сполучник може працювати в різних типах підрядних речень."
      - question: "У реченні Бібліотекарка попросила всіх вимкнути звук, щоб ніхто не відволікався підрядна частина пояснює:"
        options:
          - "мету прохання"
          - "причину, яка вже сталася"
          - "умову майбутньої дії"
        correct: 0
        explanation: "Для чого попросила вимкнути звук? Щоб ніхто не відволікався."
      - question: "Яке твердження правильне?"
        options:
          - "Підрядна мети залежить від усієї головної дії"
          - "Підрядна мети завжди пояснює один іменник"
          - "Підрядна мети завжди стоїть перед головною"
        correct: 0
        explanation: "Підрядна мети стосується всієї дії головної частини."
  - id: act-2
    type: quiz
    title: "Інфінітив чи особова форма"
    instruction: "Оберіть форму, яка природно завершує речення мети."
    items:
      - question: "Я прийшов, щоб ____."
        options:
          - "допомогти"
          - "ти допоможеш"
          - "я допоміг би"
        correct: 0
        explanation: "Той самий виконавець: я прийшов і я допоможу."
      - question: "Я прийшов, щоб ти ____."
        options:
          - "допоміг"
          - "допоможеш"
          - "допомогти"
        correct: 0
        explanation: "Різні підмети: після щоб потрібна особова форма."
      - question: "Вона відкрила словник, щоб ____ наголос."
        options:
          - "перевірити"
          - "перевірила"
          - "перевірить"
        correct: 0
        explanation: "Та сама виконавиця, тому інфінітив."
      - question: "Вона відкрила словник, щоб брат ____ наголос."
        options:
          - "перевірив"
          - "перевірить"
          - "перевірити"
        correct: 0
        explanation: "Брат - інший виконавець, тому перевірив."
      - question: "Ми написали інструкцію, щоб нові волонтери ____ порядок дій."
        options:
          - "не забули"
          - "не забудуть"
          - "не забути"
        correct: 0
        explanation: "Після щоб із різними підметами не вживаємо простий майбутній час."
      - question: "Ми написали інструкцію, щоб ____ порядок дій."
        options:
          - "не забути"
          - "не забули"
          - "не забудемо"
        correct: 0
        explanation: "Той самий підмет ми, тому інфінітив."
      - question: "Координатор залишив нотатки, щоб група ____ дедлайн."
        options:
          - "не забула"
          - "не забуде"
          - "не забути"
        correct: 0
        explanation: "Група - підмет однини, тому не забула."
      - question: "Форму оновлено, щоб її ____ заповнювати з телефона."
        options:
          - "можна було"
          - "можна буде"
          - "можна бути"
        correct: 0
        explanation: "Можна було після щоб природно називає бажану можливість."
      - question: "Я вийшов раніше, щоб ____."
        options:
          - "не запізнитися"
          - "я не запізнився"
          - "не запізнюся"
        correct: 0
        explanation: "Той самий виконавець: інфінітив із не."
      - question: "Я вийшов раніше, щоб сестра ____."
        options:
          - "не запізнилася"
          - "не запізниться"
          - "не запізнитися"
        correct: 0
        explanation: "Інший підмет сестра потребує особової форми."
      - question: "Ми зберегли копію, щоб колеги ____ файл."
        options:
          - "не втратили"
          - "не втратять"
          - "не втратити"
        correct: 0
        explanation: "Колеги - інший виконавець, тому не втратили."
      - question: "Я залишився після заняття, щоб ____ з викладачкою."
        options:
          - "поговорити"
          - "я поговорив"
          - "поговорю"
        correct: 0
        explanation: "Природна модель з тим самим підметом - щоб + інфінітив."
  - id: act-3
    type: match-up
    title: "Цільове чи з'ясувальне щоб"
    instruction: "Поєднайте речення з правильним поясненням."
    pairs:
      - left: "Я хочу, щоб ти прийшов."
        right: "з'ясувальне: що хочу?"
      - left: "Я подзвонив, щоб ти прийшов."
        right: "мета: для чого подзвонив?"
      - left: "Вона попросила, щоб я перевірив текст."
        right: "зміст прохання"
      - left: "Вона приїхала, щоб я перевірив текст."
        right: "мета приїзду"
      - left: "Учителька сказала, щоб учні відкрили зошити."
        right: "зміст повідомлення або наказу"
      - left: "Учителька повторила інструкцію, щоб учні відкрили зошити правильно."
        right: "мета повторення"
      - left: "Ми домовилися, щоб волонтери прийшли о восьмій."
        right: "про що домовилися"
      - left: "Ми надіслали нагадування, щоб волонтери прийшли о восьмій."
        right: "для чого надіслали"
      - left: "Потрібно, щоб усі зареєструвалися до п'ятниці."
        right: "вимога або необхідність"
      - left: "Ми відкрили форму раніше, щоб усі зареєструвалися до п'ятниці."
        right: "мета відкриття форми"
      - left: "Я порадив, щоб студенти перевірили джерела."
        right: "зміст поради"
      - left: "Я надіслав список джерел, щоб студенти перевірили приклади."
        right: "мета надсилання списку"
  - id: act-4
    type: fill-in
    title: "Сполучники і стиль мети"
    instruction: "Оберіть слово або фразу, що найточніше завершує речення."
    items:
      - sentence: "____ скласти іспит, треба повторити всі теми."
        answer: "Для того щоб"
        options:
          - "Для того щоб"
          - "Бо"
          - "Якщо"
        explanation: "Для того щоб підкреслює мету."
      - sentence: "Я зайшов на кухню, ____ випити води."
        answer: "щоб"
        options:
          - "щоб"
          - "з тим щоб"
          - "тому що"
        explanation: "У побутовому реченні природне просте щоб."
      - sentence: "Робочу групу створили з тим, ____ перевірити якість матеріалів."
        answer: "щоб"
        options:
          - "щоб"
          - "бо"
          - "якщо"
        explanation: "З тим, щоб має офіційний відтінок."
      - sentence: "Волонтери говорили повільніше, ____ нові учасники все зрозуміли."
        answer: "аби"
        options:
          - "аби"
          - "бо"
          - "якщо"
        explanation: "Аби може вводити мету."
      - sentence: "Ми вивчаємо правило не для того, ____ зазубрити термін, а щоб писати точніше."
        answer: "щоб"
        options:
          - "щоб"
          - "бо"
          - "якщо"
        explanation: "Не для того, щоб вводить хибну мету."
      - sentence: "Комісію створено ____ перевірки якості."
        answer: "з метою"
        options:
          - "з метою"
          - "через"
          - "якщо"
        explanation: "З метою + родовий - формальна мета."
      - sentence: "Ми відкрили форму раніше, ____ учасники зареєструвалися без черги."
        answer: "щоб"
        options:
          - "щоб"
          - "бо"
          - "тому що"
        explanation: "Це мета відкриття форми."
      - sentence: "____ не запізнитися, ми вийшли раніше."
        answer: "Аби"
        options:
          - "Аби"
          - "Оскільки"
          - "Коли"
        explanation: "Аби не запізнитися означає з метою не запізнитися."
      - sentence: "Я відкрив ноутбук, ____ показати презентацію."
        answer: "щоб"
        options:
          - "щоб"
          - "якщо"
          - "бо"
        explanation: "Показати презентацію - мета дії."
      - sentence: "Для того ____ отримати сертифікат, учасник має виконати всі завдання."
        answer: "щоб"
        options:
          - "щоб"
          - "бо"
          - "якщо"
        explanation: "Для того щоб - складений сполучник мети."
      - sentence: "Я пишу, ____ уточнити час зустрічі."
        answer: "щоб"
        options:
          - "щоб"
          - "адже"
          - "якщо"
        explanation: "Це ввічлива мета повідомлення."
      - sentence: "У M82 ми вивчатимемо речення ____, які відповідають на питання попри що?"
        answer: "допусту"
        options:
          - "допусту"
          - "мети"
          - "умови"
        explanation: "Попри що? незважаючи на що? - питання допусту."
  - id: act-5
    type: error-correction
    title: "Виправте речення мети"
    instruction: "Знайдіть помилку в кожному реченні й запишіть природний варіант."
    items:
      - sentence: "Я прийшов, щоб ти допоможеш."
        error: "допоможеш"
        correction: "допоміг"
        error_type: word
        explanation: "Після щоб із різними підметами не вживаємо простий майбутній час."
      - sentence: "Вона відкрила словник, щоб перевірила наголос."
        error: "перевірила"
        correction: "перевірити"
        error_type: word
        explanation: "Той самий підмет потребує інфінітива."
      - sentence: "Ми написали інструкцію, щоб волонтери не забудуть дедлайн."
        error: "не забудуть"
        correction: "не забули"
        error_type: word
        explanation: "Після щоб потрібна форма минулого часу із бажаним значенням."
      - sentence: "Я подзвонив, бо ти прийшов."
        error: "бо"
        correction: "щоб"
        error_type: word
        explanation: "Якщо дзвінок мав мету, потрібне щоб: щоб ти прийшов."
      - sentence: "Ми прийшли раніше, якщо підготувати залу."
        error: "якщо"
        correction: "щоб"
        error_type: word
        explanation: "Підготувати залу - мета, а не умова."
      - sentence: "Я запізнився, щоб автобус застряг у заторі."
        error: "щоб"
        correction: "бо"
        error_type: word
        explanation: "Затор - причина запізнення, не мета."
      - sentence: "Для того, щоб, учні зрозуміли тему, учитель повторив правило."
        error: "Для того, щоб,"
        correction: "Для того щоб"
        error_type: construction
        explanation: "Не ставимо випадкові коми всередині складеного сполучника."
      - sentence: "Я хочу, щоб отримати консультацію."
        error: "щоб отримати"
        correction: "отримати"
        error_type: construction
        explanation: "Після хочу з тим самим підметом природно: хочу отримати."
      - sentence: "Ми відкрили форму раніше, щоб учасники зареєструються."
        error: "зареєструються"
        correction: "зареєструвалися"
        error_type: word
        explanation: "Після щоб не ставимо майбутній час у такій моделі."
      - sentence: "Я залишився після заняття щоб поговорити."
        error: "заняття щоб"
        correction: "заняття, щоб"
        error_type: construction
        explanation: "Підрядну мети відокремлюємо комою."
      - sentence: "Щоб поговорити з викладачкою я залишився після заняття."
        error: "викладачкою я"
        correction: "викладачкою, я"
        error_type: construction
        explanation: "Початкову підрядну частину закриваємо комою."
      - sentence: "З тим щоб узяти книжку, я зайшов до друга."
        error: "З тим щоб"
        correction: "Щоб"
        error_type: phrase
        explanation: "Для побутової ситуації краще просте щоб."
workbook:
  - id: wb-1
    type: group-sort
    title: "Розсортуйте речення з щоб"
    instruction: "Перетягніть речення до групи за значенням або граматичною моделлю."
    groups:
      - label: "Мета: той самий підмет"
        items:
          - "Я прийшов, щоб допомогти."
          - "Вона відкрила словник, щоб перевірити наголос."
          - "Ми зберегли копію, щоб не втратити файл."
      - label: "Мета: різні підмети"
        items:
          - "Я прийшов, щоб ти допоміг."
          - "Ми написали інструкцію, щоб волонтери не забули дедлайн."
          - "Форму відкрили раніше, щоб учасники зареєструвалися."
      - label: "З'ясувальне або волевиявне щоб"
        items:
          - "Я хочу, щоб ти прийшов."
          - "Викладачка сказала, щоб учні відкрили зошити."
          - "Потрібно, щоб усі зареєструвалися до п'ятниці."
      - label: "Інші сполучники мети"
        items:
          - "Аби не запізнитися, ми вийшли раніше."
          - "Для того щоб скласти іспит, треба тренуватися."
          - "Комісію створили з тим, щоб перевірити якість."
  - id: wb-2
    type: cloze
    title: "Відновіть план майстерні"
    instruction: "Заповніть 12 пропусків словами, формами або сполучниками мети."
    text: "Координаторка прийшла раніше, ____ перевірити техніку. Волонтери розставили столи півколом, ____ учасники бачили одне одного. Учителька принесла газети, для того ____ показати різницю між фактом і коментарем. Студент відкрив документ, щоб команда швидко ____ приклади. Бібліотекарка попросила вимкнути звук, щоб ніхто не ____. Ми написали інструкцію, щоб нові волонтери не ____ порядок дій. Я залишився після заняття, щоб ____ з викладачкою. Я залишив посилання, щоб можна ____ переглянути запис. Комісію створили з тим, ____ перевірити якість матеріалів. Ми вивчаємо граматику не для того, ____ зазубрити правила. Я подзвонив, ____ ти прийшов. У M82 ми перейдемо до речень ____."
    blanks:
      - id: 1
        answer: "щоб"
        options: ["щоб", "бо", "якщо"]
      - id: 2
        answer: "аби"
        options: ["аби", "бо", "якщо"]
      - id: 3
        answer: "щоб"
        options: ["щоб", "бо", "якщо"]
      - id: 4
        answer: "записувала"
        options: ["записувала", "записуватиме", "записувати"]
      - id: 5
        answer: "відволікався"
        options: ["відволікався", "відволікатиметься", "відволіктися"]
      - id: 6
        answer: "забули"
        options: ["забули", "забудуть", "забути"]
      - id: 7
        answer: "поговорити"
        options: ["поговорити", "поговорив", "поговорю"]
      - id: 8
        answer: "було"
        options: ["було", "буде", "бути"]
      - id: 9
        answer: "щоб"
