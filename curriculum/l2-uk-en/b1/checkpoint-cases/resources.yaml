- title: "B1.5: відмінки, прийменники, числівники й займенники"
  role: curriculum
  notes: "Контрольна робота повторює сертифіковані модулі B1.5: розширені значення родового, давального й орудного відмінків; офіційний кличний; часові та причиново-цільові прийменники; місця, дати, числівники й займенники в академічному та житловому контекстах."
