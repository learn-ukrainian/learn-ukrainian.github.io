version: '1.0'
module: checkpoint-cases
level: b1
inline:
  - id: act-1
    type: quiz
    title: Відмінкова діагностика
    instruction: Оберіть форму або пояснення, яке відповідає функції в реченні.
    items:
      - question: "У реченні Немає ____ для перенесення семінару потрібна форма:"
        options:
          - часу
          - час
          - часом
        correct: 0
        explanation: Немає вимагає родового; час у значенні абстрактної кількості має форму часу.
      - question: "У фразі \"склянка води\" працює:"
        options:
          - частковий родовий
          - орудний засобу
          - кличний відмінок
        correct: 0
        explanation: Склянка води називає частину від цілого.
      - question: "Природна форма для дати:"
        options:
          - п'ятнадцятого березня
          - п'ятнадцятий березень
          - п'ятнадцятим березнем
        correct: 0
        explanation: Дати відповідають на питання коли? і часто мають родовий.
      - question: "У реченні Студентам потрібно підготувати виступ слово студентам є:"
        options:
          - давальним суб'єкта потреби
          - родовим заперечення
          - орудним характеристики
        correct: 0
        explanation: У безособовій конструкції потрібно дія стосується студентів у давальному.
      - question: "Яка форма природна для віку?"
        options:
          - Марії двадцять один рік.
          - Марія двадцять один рік.
          - Марією двадцять один рік.
        correct: 0
        explanation: Вік в українській часто подається через давальний.
      - question: "У реченні Він працює викладачем форма викладачем є:"
        options:
          - орудним характеристики або професії
          - місцевим місця
          - родовим частини
        correct: 0
        explanation: Після працювати ким? потрібен орудний.
      - question: "У реченні Ми йшли центральною вулицею форма вулицею показує:"
        options:
          - шлях руху
          - адресата дії
          - кількість учасників
        correct: 0
        explanation: Орудний може позначати маршрут або шлях.
      - question: "Яке звертання формальне й нормативне?"
        options:
          - Пане професоре, дозвольте запитання.
          - Пан професор, дозвольте запитання.
          - Паном професором, дозвольте запитання.
        correct: 0
        explanation: У прямому звертанні потрібен кличний Пане професоре.
      - question: "У реченні Звіт підготовлено студентами слово студентами є:"
        options:
          - пасивним агентом в орудному
          - адресатом у давальному
          - датою в родовому
        correct: 0
        explanation: Орудний може називати виконавця в пасивній конструкції.
      - question: "Яка форма відповідає керуванню дієслова пишатися?"
        options:
          - пишатися результатом
          - пишатися результат
          - пишатися результату
        correct: 0
        explanation: Пишатися керує орудним.
      - question: "Яке речення має давальний адресата?"
        options:
          - Я написав орендодавцеві.
          - Я написав орендодавця.
          - Я написав орендодавцем.
        correct: 0
        explanation: Писати кому? вимагає давального.
      - question: "Яке пояснення найточніше для фрази багато часу?"
        options:
          - кількісний вираз із родовим
          - кличний у формальному звертанні
          - орудний засобу
        correct: 0
        explanation: Після багато іменник стоїть у родовому.
  - id: act-2
    type: fill-in
    title: Прийменники часу, причини і мети
    instruction: Вставте форму або конструкцію, яка відповідає змісту.
    items:
      - sentence: "Семінар почнеться ____. (через / тиждень)"
        answer: через тиждень
        options:
          - через тиждень
          - протягом тиждень
          - перед тижня
        explanation: Через + знахідний позначає час до події.
      - sentence: "Ми підготували презентацію ____. (за / три години)"
        answer: за три години
        options:
          - за три години
          - через трьох годин
          - після три години
        explanation: За + знахідний може називати тривалість, за яку виконано дію.
      - sentence: "Зустрінемося ____. (перед / консультація)"
        answer: перед консультацією
        options:
          - перед консультацією
          - перед консультації
          - через консультацією
        explanation: Перед керує орудним.
      - sentence: "Надішліть лист ____. (після / заняття)"
        answer: після заняття
        options:
          - після заняття
          - після заняттям
          - за заняття
        explanation: Після керує родовим.
      - sentence: "Оренду треба оплатити ____. (до / перше число)"
        answer: до першого числа
        options:
          - до першого числа
          - до перше число
          - перед першого числа
        explanation: До керує родовим, а порядковий числівник узгоджується з іменником.
      - sentence: "____ ми шукали квартиру біля університету. (протягом / місяць)"
        answer: протягом місяця
        options:
          - протягом місяця
          - протягом місяць
          - за місяцем
        explanation: Протягом керує родовим.
      - sentence: "Заняття перенесли ____ в аудиторії. (через / ремонт)"
        answer: через ремонт
        options:
          - через ремонт
          - завдяки ремонтом
          - для ремонту в значенні причини
        explanation: Через часто називає небажану причину.
      - sentence: "____ викладачки група швидко знайшла помилку. (завдяки / допомога)"
        answer: завдяки допомозі
        options:
          - завдяки допомозі
          - через допомогу
          - для допомоги
        explanation: Завдяки керує давальним і зазвичай має позитивний відтінок.
      - sentence: "Ми зібрали документи ____ договору. (для / оформлення)"
        answer: для оформлення
        options:
          - для оформлення
          - через оформлення
          - перед оформленням у значенні мети
        explanation: Для + родовий називає мету або призначення.
      - sentence: "Студенти працювали ____. (заради / спільний результат)"
        answer: заради спільного результату
        options:
          - заради спільного результату
          - через спільний результат
          - завдяки спільного результату
        explanation: Заради керує родовим і підкреслює мету.
      - sentence: "Я прийшов ____ подати заяву на гуртожиток. (щоб)"
        answer: щоб
        options:
          - щоб
          - через
          - перед
        explanation: Щоб вводить мету з дієсловом.
      - sentence: "____ частину групи перевели онлайн. (у зв'язку з / негода)"
        answer: у зв'язку з негодою
        options:
          - у зв'язку з негодою
          - у зв'язку з негоди
          - через негодою
        explanation: Складений прийменник у зв'язку з вимагає орудного.
  - id: act-3
    type: match-up
    title: Числівник, займенник і функція
    instruction: Поєднайте приклад із поясненням.
    pairs:
      - left: на третьому поверсі
        right: порядковий числівник у місцевому
      - left: п'ятого квітня
        right: дата з родовим відмінком
      - left: два студенти
        right: кількісний числівник 2 з називним множини
      - left: п'ять студентів
        right: кількісний числівник 5 з родовим множини
      - left: троє учасників
        right: збірний числівник з родовим множини
      - left: половина групи
        right: дріб або частина з родовим
      - left: півтори години
        right: кількісний вираз для жіночого роду
      - left: кому вдалося домовитися?
        right: питальний займенник у давальному
      - left: чий це конспект?
        right: питально-відносний займенник належності
      - left: хтось із мешканців
        right: неозначений займенник
      - left: ні з ким не домовилися
        right: заперечний займенник із розділеним прийменником
      - left: підготував для себе
        right: зворотний займенник
  - id: act-4
    type: group-sort
    title: Чотири зони контрольної
    instruction: Розподіліть приклади за темою, яку вони перевіряють.
    groups:
      - label: "Родовий"
        items:
          - немає часу
          - склянка води
          - п'ятнадцятого березня
      - label: "Давальний"
        items:
          - мені холодно
          - студентам потрібно
          - написати орендодавцеві
      - label: "Орудний"
        items:
          - працювати викладачем
          - їхати трамваєм
          - йти центральною вулицею
      - label: "Прийменники й займенники"
        items:
          - завдяки допомозі
          - після заняття
          - ні з ким
  - id: act-5
    type: error-correction
    title: Редакторська перевірка блоку
    instruction: Виправте одну головну помилку в кожному реченні.
    items:
      - sentence: "У нас немає час для підготовки."
        error: час
        correction: часу
        explanation: Після немає потрібен родовий; для абстрактного часу форма часу.
      - sentence: "У цьому поясненні немає правда."
        error: правда
        correction: правди
        explanation: Після немає потрібен родовий.
      - sentence: "Студенти зустрінуться п'ятнадцятий березень."
        error: п'ятнадцятий березень
        correction: п'ятнадцятого березня
        explanation: Дата має родовий.
      - sentence: "Ми зателефонували орендодавця."
        error: орендодавця
        correction: орендодавцеві
        explanation: Телефонувати кому? вимагає давального.
      - sentence: "Їй довелося чекати протягом дві години."
        error: протягом дві години
        correction: протягом двох годин
        explanation: Протягом керує родовим, а числівник має форму двох.
      - sentence: "Він працює викладача в університеті."
        error: викладача
        correction: викладачем
        explanation: Працювати ким? вимагає орудного.
      - sentence: "Пане професор, можна поставити запитання?"
        error: Пане професор
        correction: Пане професоре
        explanation: У формальному звертанні обидва слова мають кличну форму.
      - sentence: "Завдяки ремонт у гуртожитку нас переселили."
        error: Завдяки ремонт
        correction: Через ремонт
        explanation: Небажану причину природно позначаємо через + знахідний.
      - sentence: "Я прийшов для подати заяву."
        error: для подати
        correction: щоб подати
        explanation: З інфінітивом для замінюємо на щоб.
      - sentence: "На третій поверсі є вільна кімната."
        error: третій поверсі
        correction: третьому поверсі
        explanation: Після на в значенні місця потрібен місцевий.
      - sentence: "П'ять студенти підписали заяву."
        error: студенти
        correction: студентів
        explanation: Після п'ять потрібен родовий множини студентів.
      - sentence: "Ні зким не вдалося домовитися."
        error: Ні зким
        correction: Ні з ким
        explanation: У заперечних займенниках прийменник пишемо окремо між ні та займенником.
workbook:
  - id: wb-1
    type: quiz
    title: Комплексна контрольна діагностика
    instruction: Оберіть правильний варіант або найточніше пояснення.
    items:
      - question: "Яке речення правильно вживає частковий родовий?"
        options:
          - "Купіть хліба до вечері."
          - "Купіть хлібові до вечері."
          - "Купіть хлібом до вечері."
        correct: 0
        explanation: Хліба може називати невизначену кількість.
      - question: "Яке речення правильно передає заперечення?"
        options:
          - "У договорі немає цієї умови."
          - "У договорі немає ця умова."
          - "У договорі немає цією умовою."
        correct: 0
        explanation: Немає керує родовим.
      - question: "Яке речення правильно передає стан?"
        options:
          - "Мені не спиться перед іспитом."
          - "Я не спиться перед іспитом."
          - "Мною не спиться перед іспитом."
        correct: 0
        explanation: Стан подано через давальний мені.
      - question: "Яка форма правильна після вдалося?"
        options:
          - "Нам вдалося знайти кімнату."
          - "Нас вдалося знайти кімнату."
          - "Нами вдалося знайти кімнату."
        correct: 0
        explanation: У безособовій конструкції особа стоїть у давальному.
      - question: "Яке речення правильно використовує орудний засобу?"
        options:
          - "Заяву підписали електронним підписом."
          - "Заяву підписали електронного підпису."
          - "Заяву підписали електронний підпис."
        correct: 0
        explanation: Засіб дії часто стоїть в орудному.
      - question: "Яка форма правильна для офіційного звертання?"
        options:
          - "Шановна пані Олено, дякую за відповідь."
          - "Шановна пані Олена, дякую за відповідь."
          - "Шановною пані Олено, дякую за відповідь."
        correct: 0
        explanation: Ім'я у звертанні має кличну форму Олено.
      - question: "Який варіант правильно передає позитивну причину?"
        options:
          - "Завдяки підтримці викладача ми завершили звіт."
          - "Через підтримці викладача ми завершили звіт."
          - "Для підтримкою викладача ми завершили звіт."
        correct: 0
        explanation: Завдяки керує давальним і має позитивний відтінок.
      - question: "Який варіант правильно передає мету?"
        options:
          - "Ми зустрілися, щоб обговорити умови оренди."
          - "Ми зустрілися через обговорити умови оренди."
          - "Ми зустрілися перед обговорити умови оренди."
        correct: 0
        explanation: Щоб вводить цільову дію.
      - question: "Який варіант правильно узгоджує порядковий числівник?"
        options:
          - "на четвертому поверсі"
          - "на четвертий поверсі"
          - "на четвертим поверхом"
        correct: 0
        explanation: У значенні місця потрібен місцевий.
      - question: "Який варіант правильно використовує кількісний вираз?"
        options:
          - "півтори години"
          - "півтора години"
          - "півтори година"
        correct: 0
        explanation: З година вживаємо півтори години.
      - question: "Яке речення правильно пише заперечний займенник із прийменником?"
        options:
          - "Ні про що не треба хвилюватися."
          - "Ніпро що не треба хвилюватися."
          - "Ніщо про не треба хвилюватися."
        correct: 0
        explanation: "Прийменник стоїть окремо: ні про що."
      - question: "Яке речення правильно використовує зворотний займенник?"
        options:
          - "Я залишив копію договору для себе."
          - "Я залишив копію договору для мене себе."
          - "Я залишив копію договору для собі."
        correct: 0
        explanation: Після для потрібна форма себе.
  - id: wb-2
    type: cloze
    title: Лист орендодавцеві
    instruction: Заповніть пропуски у формальному листі про квартиру.
    text: "Шановний пане Іване, дякую за інформацію про квартиру на {1} поверсі. Мені {2} побачити помешкання цього тижня, але {3} я можу прийти тільки ввечері. Чи буде зручно зустрітися {4} заняття в четвер або {5} п'ятницю? Я шукаю кімнату для {6}, тому важливі тиша, інтернет і комунальні послуги. У квартирі немає {7} для письмового столу, але завдяки {8} до метро вона дуже зручна. Я хотів би домовитися про перегляд із {9} із мешканців. Якщо {10} не зможе прийти, напишіть, будь ласка, {11} звернутися. Копію паспорта я підготував для {12}."
    blanks:
      - id: 1
        answer: третьому
        options:
          - третьому
          - третій
          - третім
      - id: 2
        answer: потрібно
        options:
          - потрібно
          - потрібний
          - потрібним
      - id: 3
        answer: через заняття
        options:
          - через заняття
          - завдяки заняттям у значенні перешкоди
          - заради занять у значенні причини
      - id: 4
        answer: після
        options:
          - після
          - перед
          - завдяки
      - id: 5
        answer: у
        options:
          - у
          - протягом
          - завдяки
      - id: 6
        answer: навчання
        options:
          - навчання
          - навчанням
          - навчанню
      - id: 7
        answer: місця
        options:
          - місця
          - місце
          - місцем
      - id: 8
        answer: близькості
        options:
          - близькості
          - близькість
          - близькістю
      - id: 9
        answer: кимось
        options:
          - кимось
          - когось
          - комусь
      - id: 10
        answer: ніхто
        options:
          - ніхто
          - ні з ким
          - нічого
      - id: 11
        answer: до кого
        options:
          - до кого
          - кого до
          - ким до
      - id: 12
        answer: себе
        options:
          - себе
          - собі
          - собою
  - id: wb-3
    type: match-up
    title: Помилка і діагноз
    instruction: Поєднайте помилковий фрагмент із правилом, яке його виправляє.
    pairs:
      - left: немає час
        right: після немає потрібен родовий часу
      - left: студенти вдалося знайти
        right: після вдалося особа має стояти в давальному
      - left: працює лікаря
        right: професія після працювати стоїть в орудному
      - left: перед семінару
        right: перед керує орудним
      - left: завдяки ремонт
        right: завдяки керує давальним і не називає небажану причину
      - left: для подати
        right: із дієсловом мету вводить щоб
      - left: пане декан
        right: у звертанні другий компонент теж має кличну форму
      - left: на третій поверсі
        right: місце з на потребує місцевого третьому поверсі
      - left: п'ять студентка
        right: після п'ять потрібен родовий множини
      - left: півтора години
        right: із година потрібна форма півтори години
      - left: ні зким
