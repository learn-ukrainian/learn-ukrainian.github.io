  - id: wb-4
    type: group-sort
    title: Ролі в тексті про місто
    instruction: Розподіліть фрагменти з мініпрезентації за граматичною роллю.
    groups:
      - label: "Опис міста і місця"
        items:
          - у центрі міста
          - біля університету
          - на четвертому поверсі
      - label: "Причина і мета"
        items:
          - через затори
          - завдяки новому маршруту
          - щоб оглянути район
      - label: "Кількість і дата"
        items:
          - троє студентів
          - півтори години
          - двадцять першого травня
      - label: "Займенникові форми"
        items:
          - ні з ким
          - для себе
          - хтось із групи
  - id: wb-5
    type: error-correction
    title: Фінальне редагування листа і презентації
    instruction: Виправте речення так, щоб воно було нормативним і природним.
    items:
      - sentence: "Пане декан, ми підготували презентацію."
        error: Пане декан
        correction: Пане декане
        explanation: У формальному звертанні посада має кличну форму.
      - sentence: "Для мешканці Києва транспорт є важливою темою."
        error: Для мешканці
        correction: Для мешканців
        explanation: Для керує родовим множини.
      - sentence: "Завдяки затори ми запізнилися."
        error: Завдяки затори
        correction: Через затори
        explanation: Негативну причину позначаємо через + знахідний.
      - sentence: "Під час семінар ми обговорили житло."
        error: Під час семінар
        correction: Під час семінару
        explanation: Під час керує родовим.
      - sentence: "Студентам потрібні три кімнати для двоє людей."
        error: для двоє людей
        correction: для двох людей
        explanation: Після для потрібен родовий; двоє тут замінюємо на двох людей.
      - sentence: "Ми їхали центральна вулиця до гуртожитку."
        error: центральна вулиця
        correction: центральною вулицею
        explanation: Шлях руху може стояти в орудному.
      - sentence: "Олені двадцять один років."
        error: двадцять один років
        correction: двадцять один рік
        explanation: Після складеного числівника з один потрібна форма рік.
      - sentence: "На п'ятому поверх є вільна кімната."
        error: п'ятому поверх
        correction: п'ятому поверсі
        explanation: У значенні місця потрібен місцевий.
      - sentence: "Я не домовився ні зким із сусідів."
        error: ні зким
        correction: ні з ким
        explanation: Ні з ким пишеться окремо.
      - sentence: "Хтось залишив свої документи для собі."
        error: для собі
        correction: для себе
        explanation: Після для потрібна форма себе.
      - sentence: "Ми написали лист орендодавець."
        error: орендодавець
        correction: орендодавцеві
        explanation: Написати кому? вимагає давального.
      - sentence: "Презентація була підготовлена студентів."
        error: студентів
        correction: студентами
        explanation: Пасивний агент стоїть в орудному.
