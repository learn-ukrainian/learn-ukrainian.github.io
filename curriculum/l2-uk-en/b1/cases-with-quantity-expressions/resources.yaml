- title: "B1 M44: shopping and services"
  role: curriculum
  notes: "Покупки вже дали побутовий контекст для ваги, ціни й кількості; M62 додає точне узгодження числівника з іменником."
- title: "B1 M53: genitive nuances"
  role: curriculum
  notes: "Родовий відмінок із кількістю, частиною від цілого та неозначеними словами прямо підтримує правила багато, кілька, п'ять."
- title: "B1 M61: cases with ordinal numerals"
  role: curriculum
  notes: "Попередній модуль відрізнив порядкові числівники від кількісних; M62 переходить до форм після скільки?"
- title: "B1 M63: advanced pronouns"
  role: curriculum
  notes: "Наступний модуль закріпить займенникові слова на кшталт скільки, кілька, декілька у складніших синтаксичних контекстах."
- title: "Литвінова Grade 6, §51"
  role: textbook
  notes: "Пояснює узгодження: два, три, чотири + називний множини; п'ять-двадцять і тридцять + родовий множини; окремо застерігає про іменники на -ин- та IV відміну."
  source_ref: "6-klas-ukrmova-litvinova-2023, §51, pp.240-244"
- title: "Авраменко Grade 11, §11"
  role: textbook
  notes: "Подає складні випадки узгодження: один узгоджується як прикметникова форма; два, три, чотири беруть називний множини; п'ять і більше беруть родовий множини; складені числівники орієнтуються на останній компонент."
  source_ref: "11-klas-ukrajinska-mova-avramenko-2019, §11, p.34"
- title: "Заболотний Grade 6, §55"
  role: textbook
  notes: "Підтверджує, що в непрямих відмінках числівник та іменник стоять в одному відмінку; також подає правила для дробових числівників і півтора/півтори."
  source_ref: "6-klas-ukrmova-zabolotnyi-2020, §55, pp.179-187"
- title: "Голуб Grade 6, §59"
  role: textbook
  notes: "Подає таблиці відмінювання два/три/чотири та числівників 5-20, 30, 50-80 з паралельними формами."
  source_ref: "6-klas-ukrmova-golub-2023, §59, pp.155-165"
- title: "Караман Grade 10, §68"
  role: textbook
  notes: "Узагальнює типи відмінювання числівників, складені числівники, неозначено-кількісні форми кілька/декілька та збірні числівники."
  source_ref: "10-klas-ukrmova-karaman-2018, §68, pp.171-175"
- title: "Глазова Grade 11, §6-7"
  role: textbook
  notes: "Пояснює збірні числівники, обмеження їхнього вживання, узгодження в непрямих відмінках, а також відмінювання десятків, сотень і півтора/півтори."
  source_ref: "11-klas-ukrajinska-mova-glazova-2019, §6-7, pp.28-38"
