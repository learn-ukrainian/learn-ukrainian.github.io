  - id: wb-8
    type: essay-response
    title: Опис із кількісними виразами
    instruction: "Напишіть 7-9 речень українською."
    prompt: "Опишіть покупку, рецепт, статистику або родину під час перепису. Використайте щонайменше вісім кількісних виразів: один/два-чотири/п'ять+, складене число, збірний числівник, дробову кількість, неозначено-кількісне слово і приблизну кількість."
    min_words: 100
    model_answer: "Учора я готував вечерю для родини й уважно перевіряв кількісні форми. Спочатку купив два кілограми картоплі, п'ять яблук, один літр молока і триста грамів сиру. У магазині я витратив сто двадцять п'ять гривень, хоча планував витратити близько ста гривень. У рецепті було забагато солі, тому я додав тільки чверть ложки. Потім поклав півтора кілограма картоплі в каструлю і чекав півтори години, поки страва була готова. До нас прийшло п'ятеро гостей: троє дорослих і двоє дітей. На столі було кілька тарілок, достатньо води і двадцять дві серветки. Після вечері ми обговорили статистику: понад тисячу людей у місті вже користуються новим ринком."
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "7-9 речень і щонайменше 100 слів."
      - criteria: "Різноманітність кількостей"
        points: 3
        description: "Є точні, складені, збірні, дробові та неозначені кількості."
      - criteria: "Відмінки й узгодження"
        points: 3
        description: "Форми після один, два-чотири, п'ять+, близько, понад і дробів правильні."
      - criteria: "Комунікативність"
        points: 1
        description: "Текст звучить як реальний опис, а не як список ізольованих форм."
