version: '1.0'
module: cases-with-quantity-expressions
level: b1
inline:
  - id: act-1
    type: quiz
    title: Яка кількісна модель?
    instruction: "Оберіть правило або форму, яка пояснює кількісний вираз."
    items:
      - question: "На яке питання відповідає кількісний числівник?"
        options:
          - "скільки?"
          - "котрий?"
          - "чий?"
        correct: 0
        explanation: "Кількісний числівник називає кількість предметів."
      - question: "Яка форма правильна для числа 1?"
        options:
          - "один стіл"
          - "один столи"
          - "один столів"
        correct: 0
        explanation: "Один узгоджується з іменником у роді, числі й відмінку."
      - question: "Яка форма правильна з іменником жіночого роду?"
        options:
          - "дві книжки"
          - "два книжки"
          - "двоє книжок"
        correct: 0
        explanation: "З жіночим родом уживаємо дві, а книжки має називний множини."
      - question: "Яка форма правильна після п'ять?"
        options:
          - "п'ять студентів"
          - "п'ять студенти"
          - "п'ять студента"
        correct: 0
        explanation: "П'ять і більше вимагає родового множини."
      - question: "Що визначає форму іменника після складеного числа в називному?"
        options:
          - "останній компонент"
          - "перше слово"
          - "кількість складів"
        correct: 0
        explanation: "Двадцять два студенти, але двадцять п'ять студентів."
      - question: "Яка форма правильна?"
        options:
          - "двадцять дві сторінки"
          - "двадцять два сторінки"
          - "двадцять дві сторінок"
        correct: 0
        explanation: "Сторінка - жіночий рід; останній компонент дві."
      - question: "Яка форма правильна для 25%?"
        options:
          - "двадцять п'ять відсотків"
          - "двадцять п'ять відсотки"
          - "двадцять п'ять відсоток"
        correct: 0
        explanation: "Останній компонент п'ять вимагає родового множини."
      - question: "Який варіант показує особливість іменника на -ин-?"
        options:
          - "два громадянина"
          - "два громадяни"
          - "двоє громадянина"
        correct: 0
        explanation: "Громадянин втрачає суфікс -ин- у множині, тому після два можлива форма громадянина."
      - question: "Яка форма правильна після тисяча?"
        options:
          - "тисяча гривень"
          - "тисяча гривні"
          - "тисяча гривня"
        correct: 0
        explanation: "Тисяча як кількісне слово керує родовим множини."
      - question: "Де число є номером, а не кількістю?"
        options:
          - "автобус номер п'ять"
          - "п'ять автобусів"
          - "п'ять водіїв"
        correct: 0
        explanation: "Номер п'ять називає одиницю в системі номерів, не кількість автобусів."
      - question: "Яка форма правильна для 1.5 кг?"
        options:
          - "півтора кілограма"
          - "півтори кілограма"
          - "півтора кілограми"
        correct: 0
        explanation: "Кілограм - чоловічий рід; півтора + родовий однини."
      - question: "Яка форма правильна для приблизної кількості?"
        options:
          - "близько ста людей"
          - "близько сто людей"
          - "близько сотню людей"
        correct: 0
        explanation: "Близько вимагає родового відмінка."
  - id: act-2
    type: fill-in
    title: Виберіть форму іменника
    instruction: "Заповніть пропуск формою, яку вимагає кількісний вираз."
    items:
      - sentence: "У рецепті потрібен один ____ води."
        answer: "літр"
        options:
          - "літр"
          - "літри"
          - "літрів"
        explanation: "Один + називний однини."
      - sentence: "На столі лежать дві ____."
        answer: "книжки"
        options:
          - "книжки"
          - "книжок"
          - "книжка"
        explanation: "Дві + називний множини."
      - sentence: "У групі п'ять ____."
        answer: "студентів"
        options:
          - "студентів"
          - "студенти"
          - "студента"
        explanation: "П'ять + родовий множини."
      - sentence: "У місті двадцять один ____."
        answer: "район"
        options:
          - "район"
          - "райони"
          - "районів"
        explanation: "Останній компонент один."
      - sentence: "У звіті двадцять дві ____."
        answer: "сторінки"
        options:
          - "сторінки"
          - "сторінок"
          - "сторінка"
        explanation: "Останній компонент дві."
      - sentence: "У статті двадцять п'ять ____."
        answer: "прикладів"
        options:
          - "прикладів"
          - "приклади"
          - "приклада"
        explanation: "Останній компонент п'ять."
      - sentence: "Ми працювали з двома ____."
        answer: "групами"
        options:
          - "групами"
          - "групи"
          - "груп"
        explanation: "З + орудний: з двома групами."
      - sentence: "У звіті немає трьох ____."
        answer: "відповідей"
        options:
          - "відповідей"
          - "відповіді"
          - "відповідями"
        explanation: "Немає трьох чого? родовий множини."
      - sentence: "Завдяки чотирьом ____ проєкт завершили швидко."
        answer: "волонтерам"
        options:
          - "волонтерам"
          - "волонтери"
          - "волонтерами"
        explanation: "Завдяки + давальний: чотирьом волонтерам."
      - sentence: "На рахунку понад тисячу ____."
        answer: "гривень"
        options:
          - "гривень"
          - "гривні"
          - "гривня"
        explanation: "Понад ставить слово тисяча у знахідний: тисячу; слово гривень залежить від числівника тисяча й стоїть у родовому множини."
      - sentence: "У залі було близько ста ____."
        answer: "людей"
        options:
          - "людей"
          - "люди"
          - "людина"
        explanation: "Близько ста людей: близько + родовий."
      - sentence: "Додайте півтори ____ олії."
        answer: "ложки"
        options:
          - "ложки"
          - "ложок"
          - "ложка"
        explanation: "Ложка - жіночий рід; півтори + родовий однини."
  - id: act-3
    type: match-up
    title: Форма і правило
    instruction: "Поєднайте кількісний вираз із граматичним поясненням."
    pairs:
      - left: "один студент"
        right: "один узгоджується з чоловічим родом"
      - left: "одна гривня"
        right: "одна узгоджується з жіночим родом"
      - left: "дві книжки"
        right: "дві + називний множини"
      - left: "три кімнати"
        right: "три + називний множини"
      - left: "п'ять годин"
        right: "п'ять + родовий множини"
      - left: "двадцять один студент"
        right: "останній компонент один"
      - left: "двадцять дві студентки"
        right: "останній компонент дві"
      - left: "двадцять п'ять студентів"
        right: "останній компонент п'ять"
      - left: "з двома групами"
        right: "орудний відмінок після з"
      - left: "без п'яти сторінок"
        right: "родовий відмінок після без"
      - left: "півтора кілограма"
        right: "півтора + родовий однини"
      - left: "двоє дітей"
        right: "збірний числівник із назвою дітей"
  - id: act-4
    type: group-sort
    title: Розкладіть кількості
    instruction: "Розкладіть фрази за моделлю узгодження."
    groups:
      - label: "Один + однина"
        items:
          - "один літр"
          - "одна гривня"
          - "одне яблуко"
      - label: "2-4 + називний множини"
        items:
          - "два літри"
          - "три гривні"
          - "чотири яблука"
      - label: "5+ + родовий множини"
        items:
          - "п'ять літрів"
          - "десять гривень"
          - "двадцять яблук"
      - label: "Особлива кількість"
        items:
          - "двоє дітей"
          - "півтора літра"
          - "кілька сторінок"
  - id: act-5
    type: error-correction
    title: Виправляємо кількість
    instruction: "Знайдіть і виправте одну помилку у формі числівника або іменника."
    items:
      - sentence: "На столі лежать два книжки."
        error: "два книжки"
        correction: "дві книжки"
        error_type: phrase
        explanation: "Книжка - жіночий рід, тому дві."
      - sentence: "У групі було п'ять студент."
        error: "п'ять студент"
        correction: "п'ять студентів"
        error_type: phrase
        explanation: "П'ять + родовий множини."
      - sentence: "У звіті двадцять два сторінок."
        error: "двадцять два сторінок"
        correction: "двадцять дві сторінки"
        error_type: phrase
        explanation: "Сторінка - жіночий рід; останній компонент дві."
      - sentence: "У проєкті сорок один учасників."
        error: "сорок один учасників"
        correction: "сорок один учасник"
        error_type: phrase
        explanation: "Останній компонент один."
      - sentence: "Ми працювали з два групами."
        error: "з два групами"
        correction: "з двома групами"
        error_type: phrase
        explanation: "Після з потрібен орудний відмінок."
      - sentence: "У тексті немає п'ять прикладів."
        error: "п'ять прикладів"
        correction: "п'яти прикладів"
        error_type: phrase
        explanation: "Немає чого? числівник теж має родовий відмінок."
      - sentence: "У сумці було троє книжок."
        error: "троє книжок"
        correction: "три книжки"
        error_type: phrase
        explanation: "Звичайний іменник жіночого роду: три книжки."
      - sentence: "У коридорі були три двері."
        error: "три двері"
        correction: "троє дверей"
        error_type: phrase
        explanation: "Двері - pluralia tantum; природна нормативна форма зі збірним числівником."
      - sentence: "Ми чекали півтора години."
        error: "півтора години"
        correction: "півтори години"
        error_type: phrase
        explanation: "Година - жіночий рід, тому півтори."
      - sentence: "Купіть півтори кілограма картоплі."
        error: "півтори кілограма"
        correction: "півтора кілограма"
        error_type: phrase
        explanation: "Кілограм - чоловічий рід, тому півтора."
      - sentence: "У залі було близько сто людей."
        error: "близько сто"
        correction: "близько ста"
        error_type: phrase
        explanation: "Близько вимагає родового відмінка."
      - sentence: "На ремонт витратили понад тисячі гривень."
        error: "понад тисячі"
        correction: "понад тисячу"
        error_type: phrase
        explanation: "Понад у значенні більше ніж бере знахідний: понад тисячу."
workbook:
  - id: wb-1
    type: quiz
    title: Нормативна форма
    instruction: "Оберіть речення з правильною кількісною формою."
    items:
      - question: "Як правильно сказати про одну одиницю?"
        options:
          - "Один літр води потрібен для рецепта."
          - "Одна літр води потрібна для рецепта."
          - "Одне літри води потрібні для рецепта."
        correct: 0
        explanation: "Літр - чоловічий рід."
      - question: "Як правильно сказати про дві книжки?"
        options:
          - "Я купив дві книжки."
          - "Я купив два книжки."
          - "Я купив двоє книжок."
        correct: 0
        explanation: "Книжка - жіночий рід; уживаємо дві."
      - question: "Як правильно сказати про п'ять учасників?"
        options:
          - "П'ять учасників подали заяви."
          - "П'ять учасники подали заяви."
          - "П'ять учасника подали заяви."
        correct: 0
        explanation: "П'ять + родовий множини."
      - question: "Який варіант правильний для 21 сторінки?"
        options:
          - "двадцять одна сторінка"
          - "двадцять один сторінка"
          - "двадцять одна сторінок"
        correct: 0
        explanation: "Останній компонент одна."
      - question: "Який варіант правильний для 24 відсотків?"
        options:
          - "двадцять чотири відсотки"
          - "двадцять чотири відсотків"
          - "двадцять четверо відсотків"
        correct: 0
        explanation: "Останній компонент чотири."
      - question: "Який варіант правильний для 27 прикладів?"
        options:
          - "двадцять сім прикладів"
          - "двадцять сім приклади"
          - "двадцять сьомий приклад"
        correct: 0
        explanation: "Останній компонент сім вимагає родового множини."
      - question: "Як правильно сказати після прийменника з?"
        options:
          - "з трьома волонтерами"
          - "з три волонтерами"
          - "з трьох волонтерами"
        correct: 0
        explanation: "З + орудний відмінок."
      - question: "Яка форма правильна для pluralia tantum?"
        options:
          - "троє дверей"
          - "три двері"
          - "три дверя"
        correct: 0
        explanation: "Двері зручно рахувати збірним числівником."
      - question: "Який варіант правильний для 1.5 години?"
        options:
          - "півтори години"
          - "півтора години"
          - "півтори годин"
        correct: 0
        explanation: "Година - жіночий рід."
      - question: "Який варіант правильний для приблизної кількості?"
        options:
          - "близько трьох мільйонів мешканців"
          - "близько три мільйони мешканців"
          - "близько трьома мільйонами мешканців"
        correct: 0
        explanation: "Близько + родовий."
      - question: "Який варіант правильний зі словом понад?"
        options:
          - "понад тисячу гривень"
          - "понад тисячі гривень"
          - "понад тисяча гривень"
        correct: 0
        explanation: "Понад у значенні більше ніж бере знахідний."
      - question: "Який варіант показує неозначену кількість?"
        options:
          - "декілька сторінок"
          - "декілька сторінки"
          - "декілька сторінка"
        correct: 0
        explanation: "Декілька + родовий множини."
  - id: wb-2
    type: fill-in
    title: Рецепти, ціни, статистика
    instruction: "Виберіть форму, яка природно завершує речення."
    items:
      - sentence: "Купіть три ____ картоплі."
        answer: "кілограми"
        options:
          - "кілограми"
          - "кілограмів"
          - "кілограм"
        explanation: "Три + називний множини."
      - sentence: "Додайте п'ятсот ____ борошна."
        answer: "грамів"
        options:
          - "грамів"
          - "грами"
          - "грам"
        explanation: "П'ятсот закінчується моделлю 5+; потрібен родовий множини."
      - sentence: "У пляшці один ____ молока."
        answer: "літр"
        options:
          - "літр"
          - "літри"
          - "літрів"
        explanation: "Один + називний однини."
      - sentence: "Потрібні чотири ____ цукру."
        answer: "ложки"
        options:
          - "ложки"
          - "ложок"
          - "ложка"
        explanation: "Чотири + називний множини."
      - sentence: "У класі двадцять одна ____."
        answer: "дитина"
        options:
          - "дитина"
          - "дитини"
          - "дітей"
        explanation: "Останній компонент одна."
      - sentence: "У класі було ____ дітей."
        answer: "двоє"
        options:
          - "двоє"
          - "два"
          - "дві"
        explanation: "З дітьми природний збірний числівник двоє."
      - sentence: "Опитування заповнили двадцять п'ять ____."
        answer: "студентів"
        options:
          - "студентів"
          - "студенти"
          - "студента"
        explanation: "Останній компонент п'ять."
      - sentence: "У кімнаті стояли два ____."
        answer: "столи"
        options:
          - "столи"
          - "столів"
          - "стола"
        explanation: "Два + називний множини в основній моделі."
      - sentence: "У реченні бракує кількох ____."
        answer: "слів"
        options:
          - "слів"
          - "слова"
          - "словами"
        explanation: "Бракує кількох чого? родовий множини."
      - sentence: "Ми обговорили текст із кількома ____."
        answer: "прикладами"
        options:
          - "прикладами"
          - "прикладів"
          - "приклади"
        explanation: "Із + орудний: кількома прикладами."
      - sentence: "У місті живе близько трьох ____ мешканців."
        answer: "мільйонів"
        options:
          - "мільйонів"
          - "мільйони"
          - "мільйонами"
        explanation: "Близько + родовий."
      - sentence: "На ремонт витратили понад сорок ____ гривень."
        answer: "тисяч"
        options:
          - "тисяч"
          - "тисячі"
          - "тисяча"
        explanation: "Понад сорок тисяч гривень: після сорок іменник у родовому множини."
  - id: wb-3
    type: cloze
    title: Перепис і покупки
    instruction: "Заповніть текст кількісними формами."
    text: "У хаті живе {1} людей: {2} дорослих і {3} дітей. У них {4} кімнати, {5} дверей на подвір'я і {6} фруктових дерев. Господар купив {7} кілограми картоплі, {8} грамів сиру і {9} літр молока. На базарі він витратив {10} гривень, хоча планував витратити близько {11} гривень. Для пирога треба ще {12} години роботи."
    blanks:
      - id: 1
        answer: "п'ятеро"
        options:
