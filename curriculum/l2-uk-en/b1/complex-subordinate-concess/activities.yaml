  - id: wb-5
    type: essay-response
    title: "Побудуйте зважену позицію"
    instruction: "Напишіть 8-10 речень українською."
    prompt: "Опишіть навчальну, робочу або громадську ситуацію, у якій люди діяли попри труднощі. Використайте щонайменше шість конструкцій: хоч/хоча, дарма що, попри те що, незважаючи на те що, хай/нехай, хоч би як або попри + іменник. Додайте одну пару речень, де ви чітко розрізняєте причину, умову і допуст."
    min_words: 120
    model_answer: >-
      Наша група готувала дискусію про безпечний медіапростір і медіаграмотність
      у студентському просторі. Хоча часу було мало, ми не скасували подію і
      залишили головну програму. Дарма що частина учасників приєдналася в останній
      момент, волонтери швидко розподілили ролі. Попри те що техніка кілька разів
      не вмикалася, модераторка зберегла спокій і пояснила план. Незважаючи на те
      що залу довелося змінити, аудиторія швидко знайшла нове місце. Хай питання
      були гострі, дискусія залишалася ввічливою та конструктивною. Хоч би як ми
      поспішали, ми все одно перевірили джерела перед виступом і уточнили цитати.
      Ми перенесли частину вправ, бо не вистачило часу; це причина. Якщо наступного
      разу буде більше учасників, ми відкриємо додаткову реєстрацію; це умова.
      Хоч сьогодні було багато труднощів, зустріч допомогла нам краще підготувати
      наступний студентський проєкт.
    rubric:
      - criteria: "Обсяг"
        points: 1
        description: "8-10 речень і щонайменше 120 слів."
      - criteria: "Конструкції допусту"
        points: 3
        description: "Є щонайменше шість конструкцій із завдання."
      - criteria: "Логіка перешкоди"
        points: 2
        description: "Кожне допустове речення справді має перешкоду і результат."
      - criteria: "Причина, умова, допуст"
        points: 3
        description: "Окремо й правильно розрізнено причину, умову та допуст."
