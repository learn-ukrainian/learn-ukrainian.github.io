version: '1.0'
module: complex-subordinate-concess
level: b1
inline:
  - id: act-1
    type: quiz
    title: "Читання: дискусія студентської ради"
    instruction: "Прочитайте текст перед вправою і оберіть правильне пояснення речень допусту."
    items:
      - question: "Що показує речення Хоча часу залишалося небагато, команда не скасувала подію?"
        options:
          - "Перешкода не зупинила дію"
          - "Час був причиною скасування"
          - "Подія залежала від майбутньої умови"
        correct: 0
        explanation: "Брак часу міг завадити, але подію не скасували."
      - question: "На яке питання відповідає підрядна частина хоч усі вже втомилися?"
        options:
          - "Попри що підготували висновки?"
          - "Чому підготували висновки?"
          - "Для чого підготували висновки?"
        correct: 0
        explanation: "Втома є перешкодою, попри яку дію виконали."
      - question: "У реченні Попри те що техніка кілька разів не вмикалася, модераторка зберегла спокій сполучник вводить:"
        options:
          - "допуст"
          - "мету"
          - "час"
        correct: 0
        explanation: "Попри те що називає обставину всупереч очікуванню."
      - question: "Яка головна дія відбулася, дарма що частина учасників приєдналася в останній момент?"
        options:
          - "Волонтери розподілили ролі"
          - "Учасники скасували дискусію"
          - "Техніка не вмикалася"
        correct: 0
        explanation: "Пізнє приєднання було перешкодою, але ролі все одно розподілили."
      - question: "Який сполучник у тексті звучить найбільш офіційно?"
        options:
          - "незважаючи на те що"
          - "хоч"
          - "дарма що"
        correct: 0
        explanation: "Незважаючи на те що має офіційніший стиль."
      - question: "Чому речення з хоча не є реченням причини?"
        options:
          - "Підрядна частина називає перешкоду, а не причину результату"
          - "У ньому немає коми"
          - "Головна частина завжди стоїть першою"
        correct: 0
        explanation: "У допусті дія відбувається всупереч обставині."
      - question: "Яке питання найкраще перевіряє допуст?"
        options:
          - "Незважаючи на що?"
          - "Коли?"
          - "Для чого?"
        correct: 0
        explanation: "Незважаючи на що? і попри що? - питання допусту."
      - question: "Що робить слово все одно у допустовому реченні?"
        options:
          - "Підсилює думку, що перешкода не змінила результат"
          - "Замінює кому між частинами"
          - "Перетворює речення на умову"
        correct: 0
        explanation: "Все одно підтримує логіку: дія сталася попри перешкоду."
      - question: "Яке речення найкраще продовжує текст як допустове?"
        options:
          - "Хоч аудиторія була втомлена, вона поставила багато запитань."
          - "Бо аудиторія була втомлена, вона поставила багато запитань."
          - "Щоб аудиторія була втомлена, вона поставила багато запитань."
        correct: 0
        explanation: "Втома могла завадити питанням, але не завадила."
      - question: "Де ставиться кома, якщо підрядна допусту стоїть перед головною?"
        options:
          - "Після підрядної частини"
          - "Після кожного слова"
          - "Кома не потрібна"
        correct: 0
        explanation: "Хоч було складно, ми продовжили роботу."
      - question: "Що означає допустова логіка в тексті?"
        options:
          - "Перешкоди були, але результат відбувся"
          - "Перешкоди автоматично скасували дію"
          - "Дія сталася тільки за певної умови"
        correct: 0
        explanation: "Допуст підкреслює подолання або незважаючи-на-це результат."
      - question: "Яке твердження правильне?"
        options:
          - "Підрядна допусту пояснює всю головну частину"
          - "Підрядна допусту завжди пояснює один іменник"
          - "Підрядна допусту ніколи не має присудка"
        correct: 0
        explanation: "Допустова частина належить до обставинних і стосується всієї дії."
  - id: act-2
    type: quiz
    title: "Причина, умова чи допуст"
    instruction: "Оберіть тип підрядної частини або найточніший сполучник."
    items:
      - question: "Ми не пішли, бо було холодно."
        options:
          - "причина"
          - "умова"
          - "допуст"
        correct: 0
        explanation: "Бо відповідає на питання чому?"
      - question: "Якщо буде холодно, ми не підемо."
        options:
          - "умова"
          - "допуст"
          - "мета"
        correct: 0
        explanation: "Якщо відкриває сценарій за якої умови?"
      - question: "Хоч було холодно, ми пішли."
        options:
          - "допуст"
          - "причина"
          - "мета"
        correct: 0
        explanation: "Холод не завадив дії."
      - question: "____ завдання було складне, група виконала його."
        options:
          - "Хоча"
          - "Бо"
          - "Щоб"
        correct: 0
        explanation: "Складність була перешкодою, але група виконала завдання."
      - question: "Ми перенесемо зустріч, ____ техніка не працюватиме."
        options:
          - "якщо"
          - "хоча"
          - "дарма що"
        correct: 0
        explanation: "Це майбутня умова перенесення."
      - question: "Ми перенесли зустріч, ____ техніка не працювала."
        options:
          - "бо"
          - "хоча"
          - "попри те що"
        correct: 0
        explanation: "Технічна проблема пояснює причину перенесення."
      - question: "Ми провели зустріч, ____ техніка не працювала."
        options:
          - "хоча"
          - "бо"
          - "щоб"
        correct: 0
        explanation: "Техніка не працювала, але зустріч відбулася."
      - question: "Попри те що даних було мало, висновок був обережний."
        options:
          - "допуст"
          - "з'ясувальне речення"
          - "наслідок"
        correct: 0
        explanation: "Мала кількість даних не завадила зробити обережний висновок."
      - question: "Оскільки даних було мало, ми не зробили остаточного висновку."
        options:
          - "причина"
          - "допуст"
          - "умова"
        correct: 0
        explanation: "Оскільки пояснює причину рішення."
      - question: "Хоча аргумент сильний, він не враховує джерела."
        options:
          - "допуст у аргументації"
          - "мета дії"
          - "часова межа"
        correct: 0
        explanation: "Мовець визнає силу аргументу, але показує головний недолік."
      - question: "____ дощ не припинявся, лекцію провели офлайн."
        options:
          - "Незважаючи на те що"
          - "Для того щоб"
          - "Тому що"
        correct: 0
        explanation: "Дощ був перешкодою, але лекцію не перенесли."
      - question: "Яке речення має протиставне складносурядне, а не підрядне допустове?"
        options:
          - "Він хворів, але прийшов."
          - "Хоч він хворів, він прийшов."
          - "Попри те що він хворів, він прийшов."
        correct: 0
        explanation: "Але поєднує рівноправні частини складносурядного речення."
  - id: act-3
    type: match-up
    title: "Сполучники і відтінки допусту"
    instruction: "Поєднайте фразу з найточнішим поясненням."
    pairs:
      - left: "хоч"
        right: "короткий нейтральний або розмовніший сполучник допусту"
      - left: "хоча"
        right: "нейтральний сполучник для письма й усного мовлення"
      - left: "дарма що"
        right: "емоційніше підкреслює марність перешкоди"
      - left: "незважаючи на те що"
        right: "довша офіційна допустова фраза"
      - left: "попри те що"
        right: "природна сучасна фраза зі значенням попри факт"
      - left: "хай"
        right: "літературний або емоційний допуст"
      - left: "нехай"
        right: "урочистий або книжний варіант допусту"
      - left: "хоч би як"
        right: "узагальнює перешкоду: неважливо наскільки"
      - left: "як не"
        right: "модель на зразок як не старайся"
      - left: "проте"
        right: "співвідносне слово, що підсилює протиставлення"
      - left: "все ж"
        right: "показує, що дія відбулася незважаючи на перешкоду"
      - left: "попри + іменник"
        right: "прийменникова альтернатива без підрядної частини"
  - id: act-4
    type: fill-in
    title: "Вставте допустовий сполучник"
    instruction: "Оберіть слово або фразу, що найточніше завершує речення."
    items:
      - sentence: "____ було пізно, ми завершили вправу."
        answer: "Хоча"
        options:
          - "Хоча"
          - "Бо"
          - "Щоб"
        explanation: "Пізній час був перешкодою, але не зупинив дію."
      - sentence: "Команда працювала спокійно, ____ дедлайн наближався."
        answer: "хоча"
        options:
          - "хоча"
          - "тому що"
          - "для того щоб"
        explanation: "Дедлайн створював тиск, але команда працювала спокійно."
      - sentence: "____ питання були гострі, дискусія залишалася ввічливою."
        answer: "Дарма що"
        options:
          - "Дарма що"
          - "Коли"
          - "Оскільки"
        explanation: "Дарма що підкреслює, що гострі питання не зруйнували ввічливість."
      - sentence: "____ техніка не працювала, зустріч провели вчасно."
        answer: "Попри те що"
        options:
          - "Попри те що"
          - "Якщо"
          - "Щоб"
        explanation: "Це допуст: технічна проблема не зупинила зустріч."
      - sentence: "____ даних було мало, висновок сформулювали обережно."
        answer: "Незважаючи на те що"
        options:
          - "Незважаючи на те що"
          - "Бо"
          - "Для того щоб"
        explanation: "Довша фраза доречна у формальному стилі."
      - sentence: "____ дорога буде важка, ми дійдемо."
        answer: "Хай"
        options:
          - "Хай"
          - "Адже"
          - "Після того як"
        explanation: "Хай може мати допустове значення."
      - sentence: "____ часу небагато, варто почати сьогодні."
        answer: "Нехай"
        options:
          - "Нехай"
          - "Оскільки"
          - "Щоб"
        explanation: "Нехай додає емоційний або книжний відтінок."
      - sentence: "____ як ми поспішали, без перевірки легко помилитися."
        answer: "Хоч би"
        options:
          - "Хоч би"
          - "Тому"
          - "Для того"
        explanation: "Хоч би як означає неважливо наскільки."
      - sentence: "____ не перечитуй правило, без прикладів воно швидко забувається."
        answer: "Скільки"
        options:
          - "Скільки"
          - "Бо"
          - "Щоб"
        explanation: "Скільки не вводить узагальнений допуст."
      - sentence: "Хоч завдання складне, ____ його можна виконати."
        answer: "проте"
        options:
          - "проте"
          - "тому що"
          - "якщо"
        explanation: "Проте підсилює протиставлення в головній частині."
      - sentence: "Хоч аудиторія втомилася, вона ____ поставила запитання."
        answer: "все ж"
        options:
          - "все ж"
          - "для того"
          - "тому що"
        explanation: "Все ж підтримує думку про дію попри перешкоду."
      - sentence: "____ втому студенти продовжили обговорення."
        answer: "Попри"
        options:
          - "Попри"
          - "Щоб"
          - "Якщо"
        explanation: "Попри + іменник є прийменниковою альтернативою."
  - id: act-5
    type: error-correction
    title: "Виправте речення допусту"
    instruction: "Знайдіть помилку в кожному реченні й запишіть природний варіант."
    items:
      - sentence: "Бо було холодно, ми пішли на прогулянку."
        error: "Бо"
        correction: "Хоч"
        error_type: word
        explanation: "Якщо холод не завадив прогулянці, потрібен допуст."
      - sentence: "Якщо було пізно, ми завершили вправу."
        error: "Якщо"
        correction: "Хоч"
        error_type: word
        explanation: "Минулу реальну перешкоду краще передати допустом."
      - sentence: "Хоча завдання було складне ми виконали його."
        error: "складне ми"
        correction: "складне, ми"
        error_type: construction
        explanation: "Початкову підрядну частину треба закрити комою."
      - sentence: "Ми виконали завдання хоча воно було складне."
        error: "завдання хоча"
        correction: "завдання, хоча"
        error_type: construction
        explanation: "Перед підрядною допусту після головної потрібна кома."
      - sentence: "Дарма, що часу було мало, команда встигла."
        error: "Дарма, що"
        correction: "Дарма що"
        error_type: construction
        explanation: "Дарма що є цілісним сполучником."
      - sentence: "Попри те, що, техніка не працювала, зустріч провели."
        error: "те, що,"
        correction: "те що"
        error_type: construction
        explanation: "Не ставимо випадкову кому всередині сполучникової фрази."
      - sentence: "Незважаючи на те що дощ ішов лекцію провели офлайн."
        error: "ішов лекцію"
        correction: "ішов, лекцію"
        error_type: construction
        explanation: "Після початкової підрядної частини потрібна кома."
      - sentence: "Хоча цей аргумент сильний, тому він не враховує факти."
        error: "тому"
        correction: "проте"
        error_type: word
        explanation: "Після допусту потрібне протиставлення, а не наслідок."
      - sentence: "Ми не пішли, хоч було холодно."
        error: "хоч"
        correction: "бо"
        error_type: word
        explanation: "Якщо холод пояснює відмову, це причина."
      - sentence: "Попри те що було сонячно, ми пішли гуляти."
        error: "Попри те що"
        correction: "Оскільки"
        error_type: phrase
        explanation: "Сонячна погода не є перешкодою для прогулянки."
      - sentence: "Хоч дощ ішов, але, ми не скасували подію."
        error: "але,"
        correction: "але"
        error_type: construction
        explanation: "Не ставимо кому після але без окремої причини."
      - sentence: "Всупереч що часу було мало, ми встигли."
        error: "Всупереч що"
        correction: "Хоч"
        error_type: construction
        explanation: "Для підрядної частини потрібен сполучник, а не прийменник усупереч."
workbook:
  - id: wb-1
    type: group-sort
    title: "Розсортуйте складні речення"
    instruction: "Перетягніть речення до групи за типом зв'язку."
    groups:
      - label: "Допуст"
        items:
          - "Хоч було пізно, ми завершили вправу."
          - "Попри те що техніка не працювала, зустріч провели."
          - "Дарма що команда втомилася, вона все ж дописала звіт."
      - label: "Причина"
        items:
          - "Ми перенесли зустріч, бо техніка не працювала."
          - "Оскільки часу було мало, обговорення скоротили."
          - "Вона залишилася вдома, тому що захворіла."
      - label: "Умова"
        items:
          - "Якщо буде холодно, ми зустрінемося онлайн."
          - "Коли не буде зв'язку, надішліть повідомлення."
          - "Якби було більше часу, ми перевірили б джерела."
      - label: "Протиставне складносурядне"
        items:
          - "Було пізно, але ми завершили вправу."
          - "Техніка не працювала, проте зустріч провели."
          - "Команда втомилася, однак дописала звіт."
  - id: wb-2
    type: cloze
    title: "Відновіть аргументацію"
    instruction: "Заповніть 12 пропусків словами або фразами допусту."
    text: "____ тема складна, її можна пояснити простими прикладами. Попри те ____ часу мало, група почала з головного. Дарма ____ частина учасників запізнилася, дискусія була продуктивною. Незважаючи на ____ що техніка не працювала, модераторка зберегла спокій. Хай дорога ____ важка, ми дійдемо до мети. Хоч аргумент сильний, ____ він не враховує джерела. ____ втому студенти продовжили обговорення. Хоч би ____ складно було, треба перевірити факти. Скільки ____ перечитуй правило, без прикладів воно забувається. Ми провели зустріч, ____ залу довелося змінити. Команда все ____ завершила звіт. У M83 ми перейдемо до ____ і непрямої мови."
    blanks:
      - id: 1
        answer: "Хоча"
        options: ["Хоча", "Бо", "Щоб"]
      - id: 2
        answer: "що"
        options: ["що", "бо", "якщо"]
      - id: 3
        answer: "що"
        options: ["що", "бо", "якщо"]
      - id: 4
        answer: "те"
        options: ["те", "це", "там"]
      - id: 5
        answer: "буде"
        options: ["буде", "бути", "була"]
      - id: 6
        answer: "проте"
        options: ["проте", "тому", "щоб"]
      - id: 7
        answer: "Попри"
        options: ["Попри", "Якщо", "Для"]
      - id: 8
        answer: "як"
        options: ["як", "бо", "щоб"]
      - id: 9
        answer: "не"
        options: ["не", "бо", "для"]
      - id: 10
        answer: "хоча"
        options: ["хоча", "бо", "щоб"]
      - id: 11
        answer: "ж"
