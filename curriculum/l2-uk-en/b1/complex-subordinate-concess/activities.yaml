---
version: '1.0'
module: complex-subordinate-concess
level: b1
inline:
  - id: act-1
    type: quiz
    instruction: Визнач допустову (підрядну) частину в кожному реченні.
    items:
      - options:
          - хоч було холодно
          - ми пішли на прогулянку
        question: Яка частина підрядна в реченні «Хоч було холодно, ми пішли на прогулянку.»?
        correct: 0
        explanation: Підрядна допустова частина починається зі сполучника хоч і називає перешкоду.
      - options:
          - ми почекали на нього
          - хоча він запізнився
        question: Яка частина підрядна в реченні «Ми почекали на нього, хоча він запізнився.»?
        correct: 1
        explanation: Підрядна частина починається зі сполучника хоча й пояснює, попри що відбулася дія.
      - options:
          - незважаючи на те що потяг затримався
          - пасажири дочекалися
        question: Яка частина підрядна в реченні «Незважаючи на те що потяг затримався, пасажири дочекалися.»?
        correct: 0
        explanation: Складений сполучник незважаючи на те що вводить підрядну допустову частину з власним присудком.
    title: Знайди підрядну частину
  - id: act-2
    type: fill-in
    instruction: Встав сполучник хоча та, де треба, корелятив, щоб утворити допустове речення.
    items:
      - sentence: ____ часу мало, ми завершуємо проєкт.
        answer: Хоча
        options:
          - Хоча
          - Бо
          - Якщо
      - sentence: Хоч було холодно, ____ ми пішли на прогулянку.
        answer: проте
        options:
          - проте
          - тому що
          - щоб
      - sentence: ____ вона хворіла, та все ж прийшла на роботу.
        answer: Хоча
        options:
          - Хоча
          - Якщо
          - Бо
    title: Хоча і корелят
  - id: act-3
    type: true-false
    instruction: Познач, чи правильно поставлено кому й визначено межу частин.
    items:
      - statement: Перед допустовим сполучником хоч/хоча кому ставимо завжди.
        correct: true
      - statement: Якщо допустова частина стоїть перед головною, кома не потрібна.
        correct: false
      - statement: Корелятив але посилює протиставлення в допустовому реченні.
        correct: true
    title: Кома й порядок частин
  - id: act-4
    type: match-up
    instruction: Добери до кожного сполучника його стилістичний відтінок.
    pairs:
      - left: хоч/хоча
        right: нейтральний, універсальний засіб
      - left: дарма що
        right: живіший, підкреслює марність перешкоди
      - left: незважаючи на те що
        right: офіційніший, для документів
      - left: хай/нехай
        right: емоційний, публіцистичний відтінок
    title: Стильові відтінки сполучників
  - id: act-5
    type: quiz
    instruction: Обери правильний тип підрядної частини.
    items:
      - question: На яке питання відповідає речення «Хоч було холодно, ми пішли»?
        options:
          - незважаючи на що?
          - чому?
          - за якої умови?
        explanation: Перешкода (холодно) не зупинила дії — це допуст, питання «незважаючи на що?».
        correct: 0
      - question: Яка частина підрядна в реченні «Ми працюємо, хоча часу мало»?
        options:
          - хоча часу мало
          - ми працюємо
        explanation: Підрядна частина починається зі сполучника хоча й називає перешкоду.
        correct: 0
      - question: Чим різниться допуст від причини?
        options:
          - допуст обертає очікуваний зв'язок, перешкода не спиняє дії
          - допуст показує мету дії
          - допуст називає умову
        explanation: У причині обставина веде до наслідку, у допусті — дія відбувається всупереч обставині.
        correct: 0
    title: Допуст у дебатах
workbook:
  - id: wb-1
    type: error-correction
    title: Редагуємо допустові речення
    instruction: Знайди помилку в кожному реченні й запиши нормативний варіант.
    items:
      - sentence: Кома й межа частин у допустовому реченні.
        error: Я прийшов хоча я був хворий.
        correction: Я прийшов, хоча був хворий.
        explanation: Перед підрядною допустовою частиною потрібна кома, а займенник я не дублюємо.
      - sentence: Прийменник проти сполучника.
        error: Незважаючи на дощ іде, ми граємо.
        correction: Незважаючи на те що дощ іде, ми граємо.
        explanation: Перед присудком потрібен складений сполучник незважаючи на те що, а не прийменник.
      - sentence: Складений сполучник без внутрішньої коми.
        error: Попри те, що часу мало, ми працюємо.
        correction: Попри те що часу мало, ми працюємо.
        explanation: У складеному сполучнику попри те що внутрішню кому на цьому рівні краще не ставити.
      - sentence: Допуст потребує дії всупереч перешкоді.
        error: Хоча це складно, я не буду робити.
        correction: Хоча це складно, я зроблю спробу.
        explanation: Допуст вимагає дії всупереч перешкоді, а не простого підтвердження перешкоди.
      - sentence: Модель абсолютного допусту з часткою не.
        error: Скільки дивись, помилки лишаються.
        correction: Скільки не дивись, помилки лишаються.
        explanation: У моделі абсолютного допусту потрібна частка не.
      - sentence: Корелятив при допустовому реченні.
        error: Хоча пізно, ми продовжуємо.
        correction: Хоча пізно, але ми продовжуємо.
        explanation: Корелятив але/та/проте природний, якщо треба підсилити протиставлення.
  - id: wb-2
    type: cloze
    instruction: Встав пропущені допустові засоби.
    text: >-
      Хоча часу було мало, команда {{1}} проєкт. Попри {{2}}, ми пішли на
      репетицію. Скільки {{3}} дивись на цифри, висновок той самий. {{4}} що
      він старався, нічого не вийшло. Незважаючи на те {{5}} зв'язок
      нестабільний, дебати тривали.
    blanks:
      - answer: завершила
        options:
          - завершила
          - завершить
        id: 1
      - answer: втому
        options:
          - втому
          - втома
        id: 2
      - answer: не
        options:
          - не
          - ще
        id: 3
      - answer: Дарма
        options:
          - Дарма
          - Тому
        id: 4
      - answer: що
        options:
          - що
          - як
        id: 5
    title: Допустові засоби в тексті
  - id: wb-3
    type: fill-in
    instruction: Встав потрібний допустовий сполучник.
    items:
      - sentence: ____ погода погіршилася, захід відбувся.
        answer: Попри те що
        options:
          - Попри те що
          - Тому що
          - Якщо
      - sentence: ____ дорога важка, ми дійдемо.
        answer: Нехай
        options:
          - Нехай
          - Бо
          - Щоб
      - sentence: ____ він старався, нічого не вийшло.
        answer: Дарма що
        options:
          - Дарма що
          - Завдяки тому що
          - Для того щоб
      - sentence: ____ було важко, ми не здаємося.
        answer: Хоч би як
        options:
          - Хоч би як
          - Оскільки
          - Якби
    title: Встав допустовий засіб
  - id: wb-4
    type: quiz
    instruction: Обери доречний за стилем засіб.
    items:
      - question: Який сполучник доречний в офіційному документі?
        options:
          - незважаючи на те що
          - дарма що
          - хай
        explanation: Незважаючи на те що — офіційніший засіб для документів і публіцистики.
        correct: 0
      - question: Який засіб додає емоційного, публіцистичного забарвлення?
        options:
          - хай/нехай
          - хоч/хоча
          - попри те що
        explanation: Хай/нехай надають реченню урочистого, емоційного відтінку.
        correct: 0
      - question: Який сполучник підкреслює марність перешкоди?
        options:
          - дарма що
          - незважаючи на те що
          - хоч
        explanation: Дарма що показує, що зусилля чи обставина виявилися даремними.
        correct: 0
      - question: Що приєднує прийменник попри?
        options:
          - іменник
          - підрядну частину з присудком
        explanation: >-
          Прийменник попри керує іменником (попри дощ), а для підрядної частини
          потрібен сполучник попри те що.
        correct: 0
    title: Логіка допусту
  - id: wb-5
    type: match-up
    instruction: Добери до прийменникової форми відповідну сполучникову.
    pairs:
      - left: попри дощ
        right: попри те що дощ іде
      - left: незважаючи на втому
        right: незважаючи на те що ми втомилися
      - left: попри втому
        right: попри те що ми втомлені
      - left: незважаючи на затримку
        right: незважаючи на те що сталася затримка
    title: Пари прийменник-сполучник
  - id: wb-6
    type: group-sort
    instruction: Розподіли речення за типом підрядної частини.
    groups:
      - label: Допуст (незважаючи на що?)
        items:
          - Хоч було холодно, ми пішли.
          - Дарма що часу мало, ми встигли.
      - label: Причина (чому?)
        items:
          - Ми не пішли, бо було холодно.
          - Сад сумний, тому що немає птахів.
      - label: Умова (за якої умови?)
        items:
          - Ми підемо, якщо буде тепло.
          - Завершимо, якщо часу буде досить.
      - label: Мета (навіщо?)
        items:
          - Ми поспішаємо, щоб устигнути.
          - Він мовчав, щоб не заважати.
    title: Допуст, причина, умова, мета
  - id: wb-7
    type: quiz
    instruction: Визнач, яка частина головна, а яка підрядна, і де проходить межа.
    items:
      - options:
          - 'підрядна: хоча він запізнився'
          - 'підрядна: ми почекали на нього'
        question: Яка частина підрядна в реченні «Хоча він запізнився, ми почекали на нього.»?
        correct: 0
        explanation: Частина зі сполучником хоча називає перешкоду, тому вона підрядна допустова.
      - options:
          - 'підрядна: хоча часу мало'
          - 'підрядна: ми завершуємо проєкт'
        question: Яка частина підрядна в реченні «Ми завершуємо проєкт, хоча часу мало.»?
        correct: 0
        explanation: Частина хоча часу мало називає перешкоду й залежить від головної частини.
      - options:
          - 'підрядна: попри те що ресурсів мало'
          - 'підрядна: команда працює'
        question: Яка частина підрядна в реченні «Попри те що ресурсів мало, команда працює.»?
        correct: 0
        explanation: Складений сполучник попри те що вводить підрядну допустову частину.
      - options:
          - 'підрядна: нехай дорога важка'
          - 'підрядна: ми дійдемо'
        question: Яка частина підрядна в реченні «Нехай дорога важка, ми дійдемо.»?
        correct: 0
        explanation: Нехай вводить допустову підрядну частину й має емоційний відтінок.
      - options:
          - 'підрядна: скільки не дивись'
          - 'підрядна: помилки лишаються'
        question: Яка частина підрядна в реченні «Скільки не дивись, помилки лишаються.»?
        correct: 0
        explanation: Форма скільки не дивись утворює допустову підрядну частину з часткою не.
    title: Визнач тип підрядної частини
  - id: wb-8
    type: true-false
    instruction: Познач правильні твердження про допустові речення.
    items:
      - statement: Допустова частина відповідає на питання «незважаючи на що?».
        correct: true
      - statement: У допусті перешкода завжди зупиняє дію головної частини.
        correct: false
      - statement: Хоч і хоча — обидва нормативні сполучники.
        correct: true
      - statement: Прийменник попри керує цілою підрядною частиною з присудком.
        correct: false
      - statement: У моделі «скільки не дивись» частка не обов'язкова.
        correct: false
      - statement: Незважаючи на те що — єдиний правильний допустовий сполучник.
        correct: false
    title: Перевір твердження
  - id: wb-9
    type: odd-one-out
    instruction: Познач засіб, що не належить до групи.
    items:
      - explanation: Тому що — причинний сполучник, решта — допустові.
        words:
          - хоч
          - хоча
          - дарма що
          - тому що
        correct: 3
      - explanation: Якщо — умовний сполучник, решта виражають допуст.
        words:
          - попри те що
          - незважаючи на те що
          - якщо
          - хай
        correct: 2
      - explanation: Бо — причинний сполучник, а але/проте/однак — корелятиви протиставлення.
        words:
          - але
          - проте
          - однак
          - бо
        correct: 3
    title: Знайди зайве
  - id: wb-10
    type: mark-the-words
    instruction: Познач усі допустові сполучники в тексті.
    text: >-
      Хоча наш час обмежений, ми встигнемо. Дарма що завдання складне, команда
      працює. Незважаючи на те що зв'язок нестабільний, ми надсилаємо дані.
      Попри те що ресурсів мало, рішення вже ухвалене.
    target_words:
      - Хоча
      - Дарма що
      - Незважаючи на те що
      - Попри те що
    title: Познач допустові засоби
  - id: wb-11
    type: essay-response
    instruction: Напиши короткий аргументований відгук із допустовими реченнями.
    prompt: >-
      Сформулюй власну позицію щодо одного шкільного або громадського питання.
      Використай щонайменше три різні допустові сполучники (хоч/хоча, дарма що,
      незважаючи на те що, попри те що, хай/нехай) і хоча б один корелятив
      (але/проте/однак). Зроби поступку опонентові, а потім допустовим реченням
      обґрунтуй власний висновок.
    min_words: 90
    model_answer: >-
      Хоча багато людей вважають, що новий проєкт надто ризикований, я
      переконаний, що його варто розпочати. Дарма що ресурсів справді бракує,
      ми перерозподілимо завдання. Незважаючи на те що час обмежений, команда
      вже працює за чітким графіком. Попри те що зв'язок іноді нестабільний,
      дані надходять вчасно. Так, ризики є, проте вони не переважують головного
      аргументу: проєкт економить нам два тижні. Тому, хоч би як було складно,
      рішення варто ухвалити вже сьогодні.
    rubric:
      - criteria: Різні допустові сполучники
        points: 3
        description: Є щонайменше три різні допустові сполучники.
      - criteria: Корелятив
        points: 2
        description: Є хоча б один корелятив але/проте/однак.
      - criteria: Поступка опонентові
        points: 2
        description: Текст визнає контраргумент і переходить до власного висновку.
      - criteria: Пунктуація
        points: 2
        description: Коми на межі головної й підрядної частин поставлено правильно.
      - criteria: Логіка допусту
        points: 3
        description: У реченнях чітко видно логіку «перешкода — дія всупереч».
    title: Коротке есе з допустом
