- lemma: протиставлення
  translation: "contrast, opposition"
  pos: noun
  usage: "Допуст і протиставлення близькі за змістом, але мають різну синтаксичну будову."
- lemma: аргументація
  translation: "argumentation"
  pos: noun
  usage: "У B1 речення допусту допомагають будувати зважену аргументацію."
