- lemma: допуст
  translation: concession (clause type)
  pos: noun
  usage: Допуст показує перешкоду, яка не зупинила дії.
- lemma: підрядне обставинне допусту
  translation: concessive subordinate (adverbial) clause
  pos: phrase
  usage: Підрядне обставинне допусту відповідає на питання «незважаючи на що?».
- lemma: речення допусту
  translation: concessive sentence
  pos: phrase
  usage: У реченні допусту дія відбувається всупереч перешкоді.
- lemma: підрядна частина
  translation: subordinate clause
  pos: phrase
  usage: 'Підрядна частина називає перешкоду: «хоча часу мало».'
- lemma: головна частина
  translation: main clause
  pos: phrase
  usage: 'Головна частина називає дію: «ми завершуємо проєкт».'
- lemma: перешкода
  translation: obstacle
  pos: noun
  usage: Перешкода є реальною, але дію не спиняє.
- lemma: обставина
  translation: circumstance
  pos: noun
  usage: Допуст — це обставина, усупереч якій триває дія.
- lemma: очікування
  translation: expectation
  pos: noun
  usage: 'Допуст ламає очікування: перешкода є, а дія відбувається.'
- lemma: усупереч
  translation: contrary to, despite (+ Dat.)
  pos: prep
  usage: Усупереч холоду ми пішли гуляти.
- lemma: всупереч
  translation: contrary to (variant of усупереч)
  pos: prep
  usage: Всупереч прогнозу день видався теплий.
- lemma: попри
  translation: despite (+ Acc.)
  pos: prep
  usage: Попри дощ матч тривав.
- lemma: попри те що
  translation: despite the fact that
  pos: phrase
  usage: Попри те що погода погіршилася, захід відбувся.
- lemma: незважаючи на
  translation: despite (+ Acc.)
  pos: prep
  usage: Незважаючи на затримку, потяг прибув.
- lemma: незважаючи на те що
  translation: despite the fact that (formal)
  pos: phrase
  usage: Незважаючи на те що даних бракує, комітет ухвалює рішення.
- lemma: хоч
  translation: although (neutral, slightly colloquial)
  pos: conj
  usage: Хоч було холодно, ми пішли на прогулянку.
- lemma: хоча
  translation: although (neutral, slightly formal)
  pos: conj
  usage: Хоча він запізнився, ми почекали на нього.
- lemma: дарма що
  translation: even though (stresses futility)
  pos: phrase
  usage: Дарма що він старався, нічого не вийшло.
- lemma: хай
  translation: even if; let (concessive particle)
  pos: part
  usage: Хай лютує зима, а весна все одно прийде.
- lemma: нехай
  translation: even if; let (variant of хай)
  pos: part
  usage: Нехай дорога важка, ми дійдемо.
- lemma: проте
  translation: however, nevertheless (correlative)
  pos: conj
  usage: Хоч було холодно, проте ми пішли на прогулянку.
- lemma: однак
  translation: however (correlative)
  pos: conj
  usage: Хоч козацька держава існувала недовго, однак мала великий вплив.
- lemma: зате
  translation: but on the other hand (correlative)
  pos: conj
  usage: Хоч завдання складне, зате результат вартий зусиль.
- lemma: все ж
  translation: still, nevertheless
  pos: phrase
  usage: Хоча вона хворіла, та все ж прийшла на роботу.
- lemma: суперечність
  translation: contradiction
  pos: noun
  usage: Допуст тримається на суперечності між перешкодою й дією.
- lemma: поступка
  translation: concession (in argument)
  pos: noun
  usage: У дебатах допустове речення робить поступку опонентові.
- lemma: контраргумент
  translation: counterargument
  pos: noun
  usage: Я визнаю контраргумент, але мій аргумент сильніший.
- lemma: аргументація
  translation: argumentation
  pos: noun
  usage: Допустові речення роблять аргументацію гнучкою.
- lemma: дебати
  translation: debate (pl. only)
  pos: noun
  usage: У дебатах допуст допомагає визнати ризики й подолати їх.
- lemma: межа частин
  translation: boundary between clauses
  pos: phrase
  usage: Кому ставимо на межі частин складного речення.
- lemma: розділовий знак
  translation: punctuation mark
  pos: phrase
  usage: Розділовий знак — кома — відділяє підрядну частину від головної.
