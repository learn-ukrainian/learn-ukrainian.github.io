- lemma: речення допусту
  translation: "concessive clause"
  pos: phrase
  usage: "Речення допусту називає перешкоду, попри яку головна дія все одно відбувається."
- lemma: підрядна обставинна частина допусту
  translation: "adverbial subordinate clause of concession"
  pos: phrase
  usage: "Підрядна обставинна частина допусту відповідає на питання незважаючи на що? попри що?"
- lemma: допуст
  translation: "concession"
  pos: noun
  usage: "Допуст показує, що очікувана перешкода не зупинила дію."
- lemma: перешкода
  translation: "obstacle"
  pos: noun
  usage: "У допустовому реченні підрядна частина часто називає перешкоду."
- lemma: усупереч
  translation: "contrary to, despite"
  pos: preposition
  usage: "Усупереч труднощам команда завершила проєкт."
- lemma: всупереч
  translation: "contrary to, despite"
  pos: preposition
  usage: "Всупереч прогнозу зустріч відбулася вчасно."
- lemma: попри
  translation: "despite"
  pos: preposition
  usage: "Попри втому студенти продовжили обговорення."
- lemma: незважаючи на
  translation: "despite, notwithstanding"
  pos: preposition phrase
  usage: "Незважаючи на затримку, учасники не скасували подію."
- lemma: хоч
  translation: "although, even though"
  pos: conjunction
  usage: "Хоч було пізно, ми дописали звіт."
- lemma: хоча
  translation: "although"
  pos: conjunction
  usage: "Хоча завдання було складне, група виконала його."
- lemma: дарма що
  translation: "even though, despite the fact that"
