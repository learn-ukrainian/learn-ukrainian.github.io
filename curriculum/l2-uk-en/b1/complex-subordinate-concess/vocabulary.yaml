  translation: "despite the fact that"
  pos: conjunction phrase
  usage: "Попри те що аргумент здавався сильним, у ньому були слабкі місця."
- lemma: хай
  translation: "even if, let"
  pos: conjunction
  usage: "Хай дорога буде важка, ми дійдемо до мети."
- lemma: нехай
  translation: "even if, let"
  pos: conjunction
  usage: "Нехай часу небагато, варто спробувати."
- lemma: хоч би
  translation: "even if"
  pos: conjunction phrase
  usage: "Хоч би як складно було, треба перевірити факти."
- lemma: як не
  translation: "however much, no matter how"
  pos: conjunction phrase
  usage: "Як не поспішай, без плану легко пропустити важливу деталь."
- lemma: скільки не
  translation: "however much, no matter how much"
  pos: conjunction phrase
  usage: "Скільки не перечитуй текст, без прикладів правило важко запам'ятати."
- lemma: протиставне співвідносне слово
  translation: "adversative correlative word"
  pos: phrase
  usage: "Після початкової підрядної допусту може стояти проте, однак, але або все ж."
