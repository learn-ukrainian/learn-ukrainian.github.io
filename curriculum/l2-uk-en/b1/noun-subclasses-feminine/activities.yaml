version: '1.0'
module: noun-subclasses-feminine
level: b1
inline:
  - id: act-1
    type: quiz
    title: III відміна чи ні
    instruction: Оберіть правильну класифікацію і пояснення.
    items:
      - question: "Чому слово ніч належить до III відміни?"
        options:
          - Це жіночий рід із нульовим закінченням.
          - Це чоловічий рід із нульовим закінченням.
          - Це жіночий рід із закінченням -а.
        correct: 0
        explanation: III відміна має жіночий рід і нульове закінчення в називному.
      - question: "Чому слово гість не належить до III відміни?"
        options:
          - Воно чоловічого роду і належить до II відміни.
          - Воно має закінчення -а.
          - Воно не відмінюється.
        correct: 0
        explanation: Гість закінчується на приголосний, але має чоловічий рід.
      - question: "Яке слово належить до III відміни?"
        options:
          - подорож
          - подруга
          - день
        correct: 0
        explanation: Подорож - жіночий рід із нульовим закінченням.
      - question: "Яке слово належить до I відміни, а не до III?"
        options:
          - пісня
          - сіль
          - кров
        correct: 0
        explanation: Пісня має жіночий рід, але закінчення -я.
      - question: "Який іменник є особливим членом III відміни?"
        options:
          - мати
          - море
          - товариш
        correct: 0
        explanation: Мати має особливу парадигму з основою матер-/матір-.
      - question: "Яка форма показує родовий відмінок однини від сіль?"
        options:
          - солі
          - сіллю
          - сіль
        correct: 0
        explanation: Солі - нейтральна форма родового відмінка однини.
      - question: "Яка пара показує чергування голосного в III відміні?"
        options:
          - ніч - ночі
          - любов - любов'ю
          - радість - радістю
        correct: 0
        explanation: У парі ніч - ночі і переходить в о.
      - question: "Яка форма є родовим множини від ніч?"
        options:
          - ночей
          - нічів
          - нічами
        correct: 0
        explanation: Багато іменників III відміни мають родовий множини на -ей.
      - question: "Яка форма є орудним від тінь?"
        options:
          - тінню
          - тіню
          - тіні
        correct: 0
        explanation: Тінь має один кінцевий н, тому в орудному пишемо тінню.
      - question: "Чому слово день не належить до III відміни?"
        options:
          - Це чоловічий рід і II відміна.
          - Це жіночий рід із нульовим закінченням.
          - Це слово не відмінюється.
        correct: 0
        explanation: День закінчується на приголосний, але має чоловічий рід.
      - question: "Яка пара показує іменник на -ість без подвоєння?"
        options:
          - гордість - гордістю
          - мить - миттю
          - сіль - сіллю
        correct: 0
        explanation: У слові гордість є збіг ст, тому орудний без подвоєння.
      - question: "Яка форма є родовим від осінь?"
        options:
          - осені
          - осінню
          - осінь
        correct: 0
        explanation: Нейтральна форма родового однини - осені.
  - id: act-2
    type: fill-in
    title: Форми однини
    instruction: Виберіть форму, яка пасує до речення.
    items:
      - sentence: "До ____ залишилося дві години."
        answer: ночі
        options:
          - ночі
          - ніччю
          - ніч
        explanation: Після до потрібен родовий відмінок.
      - sentence: "У страві бракує ____."
        answer: солі
        options:
          - солі
          - сіллю
          - сіль
        explanation: Бракує чого? солі.
      - sentence: "Ми повернулися з довгої ____."
        answer: подорожі
        options:
          - подорожі
          - подорожжю
          - подорож
        explanation: Після з у значенні походження потрібен родовий відмінок.
      - sentence: "Вона пишається своєю ____."
        answer: гідністю
        options:
          - гідністю
          - гідністью
          - гідності
        explanation: Орудний від гідність не має подвоєння через збіг ст.
      - sentence: "Лікар цікавився результатами аналізу ____."
        answer: крові
        options:
          - крові
          - кров'ю
          - кров
        explanation: Аналіз чого? крові.
      - sentence: "Він ішов темною ____."
        answer: ніччю
        options:
          - ніччю
          - нічю
          - ночі
        explanation: Орудний від ніч має подвоєння.
      - sentence: "Біля ____ було тепло."
        answer: печі
        options:
          - печі
          - піччю
          - піч
        explanation: Біля чого? печі.
      - sentence: "Син пишався своєю ____."
        answer: матір'ю
        options:
          - матір'ю
          - матерю
          - матіррю
        explanation: Мати має форму орудного матір'ю без подвоєння.
      - sentence: "Кольори ____ були м'які."
        answer: осені
        options:
          - осені
          - осінню
          - осінь
        explanation: Кольори чого? осені.
      - sentence: "У кімнаті не було ____."
        answer: тіні
        options:
          - тіні
          - тінню
          - тінь
        explanation: Після не було потрібен родовий відмінок.
      - sentence: "Цією ____ користуються щодня."
        answer: річчю
        options:
          - річчю
          - річю
          - речі
        explanation: Орудний від річ має подвоєння чч.
      - sentence: "Після кількох ____ ми звикли до тиші."
        answer: ночей
        options:
          - ночей
          - нічів
          - ночами
        explanation: Після кількох потрібен родовий множини ночей.
  - id: act-3
    type: group-sort
    title: Орудний відмінок
    instruction: Розподіліть форми за причиною написання.
    groups:
      - label: Є подвоєння
        items:
          - ніччю
          - сіллю
          - тінню
          - міддю
          - подорожжю
          - річчю
          - відповіддю
          - миттю
      - label: Без подвоєння через збіг приголосних
        items:
          - радістю
          - гордістю
          - мудрістю
          - гідністю
          - ніжністю
          - щедрістю
      - label: Без подвоєння після б/п/в/м/ф/р
        items:
          - кров'ю
          - любов'ю
          - верф'ю
          - матір'ю
      - label: Не III відміна
        items:
          - гостем
          - днем
          - землею
          - піснею
  - id: act-4
    type: match-up
    title: Початкова форма і потрібна форма
    instruction: Поєднайте іменник із правильною формою.
    pairs:
      - left: ніч - орудний
        right: ніччю
      - left: сіль - орудний
        right: сіллю
      - left: кров - орудний
        right: кров'ю
      - left: любов - родовий
        right: любові або любови
      - left: радість - орудний
        right: радістю
      - left: подорож - родовий
        right: подорожі
      - left: річ - родовий множини
        right: речей
      - left: мати - орудний
        right: матір'ю
      - left: осінь - родовий
        right: осені або осени
      - left: тінь - орудний
        right: тінню
      - left: піч - родовий множини
        right: печей
      - left: гордість - орудний
        right: гордістю
  - id: act-5
    type: error-correction
    title: Редагуємо форми III відміни
    instruction: Знайдіть помилкову форму й подайте нормативний варіант.
    items:
      - sentence: "Ми їхали нічю до Львова."
        error: нічю
        correction: ніччю
        error_type: word
        explanation: Один кінцевий приголосний ч подвоюється.
      - sentence: "Салат посипали сілю."
        error: сілю
        correction: сіллю
        error_type: word
        explanation: Орудний від сіль має подвоєння лл.
      - sentence: "Він говорив із радісттю."
        error: радісттю
        correction: радістю
        error_type: word
        explanation: У слові радість є збіг ст, тому подвоєння немає.
      - sentence: "Лікар працює з кроввю."
        error: кроввю
        correction: кров'ю
        error_type: word
        explanation: Після кінцевого в подвоєння немає, потрібен апостроф.
      - sentence: "Вона пишалася матіррю."
        error: матіррю
        correction: матір'ю
        error_type: word
        explanation: Після р подвоєння немає, у формі матір'ю потрібен апостроф.
      - sentence: "Без любове текст звучить холодно."
        error: любове
        correction: любові
        error_type: word
        explanation: У родовому відмінку нейтральна форма любові.
      - sentence: "Після подорожи ми довго відпочивали."
        error: подорожи
        correction: подорожі
        error_type: word
        explanation: Родовий від подорож має форму подорожі.
      - sentence: "Орудний від гість - гісьтю."
        error: гісьтю
        correction: гостем
        error_type: word
        explanation: Гість - чоловічий рід II відміни, тому орудний гостем.
      - sentence: "Кольори осінню були яскраві."
        error: осінню
        correction: осені
        error_type: word
        explanation: Кольори чого? осені.
      - sentence: "Цією річю користуються щодня."
        error: річю
        correction: річчю
        error_type: word
        explanation: Один кінцевий ч подвоюється в орудному.
      - sentence: "У кімнаті не було тіню."
        error: тіню
        correction: тіні
        error_type: word
        explanation: Після не було потрібен родовий відмінок.
      - sentence: "Після кількох нічів ми повернулися додому."
        error: нічів
        correction: ночей
        error_type: word
        explanation: Родовий множини від ніч має форму ночей.
workbook:
  - id: wb-1
    type: quiz
    title: Діагностичний алгоритм
    instruction: Оберіть правильний крок або висновок.
    items:
      - question: "Що треба перевірити першим для III відміни?"
        options:
          - рід іменника
          - кількість складів
          - наголос
        correct: 0
        explanation: III відміна потребує жіночого роду, крім особливого слова мати.
      - question: "Який висновок правильний для слова біль?"
        options:
          - Це II відміна, бо слово чоловічого роду.
          - Це III відміна, бо слово закінчується на приголосний.
          - Це I відміна, бо слово називає стан.
        correct: 0
        explanation: Біль має чоловічий рід.
      - question: "Який висновок правильний для слова молодь?"
        options:
          - Це III відміна, бо жіночий рід і нульове закінчення.
          - Це II відміна, бо слово закінчується на приголосний.
          - Це I відміна, бо слово збірне.
        correct: 0
        explanation: Збірне значення не скасовує граматичної моделі.
      - question: "Чому подруга не є III відміною?"
        options:
          - Має закінчення -а.
          - Має жіночий рід.
          - Має два склади.
        correct: 0
        explanation: Жіночий рід із -а належить до I відміни.
      - question: "Яка форма правильна для орудного від любов?"
        options:
          - любов'ю
          - любоввю
          - любів'ю
        correct: 0
        explanation: Кінцевий в не подвоюється, перед ю пишемо апостроф.
      - question: "Яке слово має родовий множини на -ей?"
        options:
          - ніч - ночей
          - мати - матей
          - гість - гіщей
        correct: 0
        explanation: Ніч у множині має форму ночей.
      - question: "Яка пара містить нормативні паралельні форми родового однини?"
        options:
          - радості - радости
          - гостя - гости
          - землі - земли
        correct: 0
        explanation: Для іменників на -ть після приголосного можливі форми на -і і -и.
      - question: "Яке слово не варто брати як звичайний сучасний приклад теми?"
        options:
          - путь
          - осінь
          - сіль
        correct: 0
        explanation: Путь має архаїчне або поетичне забарвлення.
      - question: "Яка форма є родовим множини від подорож?"
        options:
          - подорожей
          - подорожів
          - подорожами
        correct: 0
        explanation: Багато подорожей - типова модель родового множини на -ей.
      - question: "Чому мрія не належить до III відміни?"
        options:
          - Має закінчення -я і належить до I відміни.
          - Має жіночий рід і нульове закінчення.
          - Має особливу основу матер-.
        correct: 0
        explanation: Жіночі іменники на -а/-я належать до I відміни.
      - question: "Яка форма орудного від відповідь?"
        options:
          - відповіддю
          - відповідю
          - відповід'ю
        correct: 0
        explanation: Відповідь має один кінцевий д, тому в орудному дд.
      - question: "Що зазвичай робимо з орудним слів на -ість?"
        options:
          - Не подвоюємо через збіг ст.
          - Завжди пишемо тт.
          - Переносимо слово до I відміни.
        correct: 0
        explanation: У словах на -ість перед закінченням уже є збіг приголосних.
  - id: wb-2
    type: fill-in
    title: Утворіть орудний
    instruction: Виберіть правильну форму орудного відмінка.
    items:
      - sentence: "Вони йшли темною ____."
        answer: ніччю
        options:
          - ніччю
          - нічю
          - ночею
        explanation: Ніч має подвоєння чч.
      - sentence: "Хліб пахне теплою ____."
        answer: піччю
        options:
          - піччю
          - пічю
          - печею
        explanation: Піч має подвоєння чч.
      - sentence: "Страву приправили ____."
        answer: сіллю
        options:
          - сіллю
          - сілю
          - солю
        explanation: Сіль має подвоєння лл і чергування і - о в інших формах.
      - sentence: "Місто пишалося своєю ____."
        answer: молоддю
        options:
          - молоддю
          - молодю
          - молодістю
        explanation: Молодь має один кінцевий д, тому в орудному дд.
      - sentence: "Автор відповів із ____."
        answer: гідністю
        options:
          - гідністю
          - гідністтю
          - гіднісцю
        explanation: Гідність має збіг ст, тому подвоєння немає.
      - sentence: "Він поділився своєю ____."
        answer: радістю
        options:
          - радістю
          - радісттю
          - радостю
        explanation: Радість має збіг ст, тому орудний радістю.
      - sentence: "Медсестра працювала з ____."
        answer: кров'ю
        options:
          - кров'ю
          - кроввю
          - кровью
        explanation: Після в подвоєння немає, потрібен апостроф.
      - sentence: "Лист був написаний із ____."
        answer: любов'ю
        options:
          - любов'ю
          - любоввю
          - любовлю
        explanation: Любов має кінцевий в, тому без подвоєння.
      - sentence: "Вона говорила з великою ____."
        answer: ніжністю
        options:
          - ніжністю
          - ніжністтю
          - ніжнісцю
        explanation: Ніжність має збіг ст, тому подвоєння немає.
      - sentence: "Розчин змішали з ____."
        answer: міддю
        options:
          - міддю
          - мідю
          - мідью
        explanation: Мідь має подвоєння дд.
      - sentence: "Учитель був задоволений її ____."
        answer: відповіддю
        options:
          - відповіддю
          - відповідю
          - відповід'ю
        explanation: Відповідь має подвоєння дд в орудному.
      - sentence: "З цією ____ пов'язано багато спогадів."
        answer: подорожжю
        options:
          - подорожжю
          - подорожю
          - подорожі
        explanation: Подорож має один кінцевий ж, тому в орудному жж.
  - id: wb-3
    type: match-up
    title: Форма і правило
    instruction: Поєднайте форму з точним поясненням.
    pairs:
      - left: ніччю
        right: подвоєння після одного кінцевого ч
      - left: сіллю
        right: подвоєння після одного кінцевого л
      - left: подорожжю
        right: подвоєння після одного кінцевого ж
      - left: відповіддю
        right: подвоєння після одного кінцевого д
      - left: радістю
        right: без подвоєння через збіг ст
      - left: мудрістю
        right: без подвоєння в іменнику на -ість
      - left: кров'ю
        right: без подвоєння після кінцевого в
      - left: матір'ю
        right: без подвоєння після кінцевого р
      - left: ночей
        right: родовий множини з -ей
      - left: матерів
        right: особливий родовий множини від мати
      - left: тінню
        right: подвоєння після одного кінцевого н
      - left: подорожей
        right: родовий множини з -ей від подорож
  - id: wb-4
    type: group-sort
    title: Відміни і пастки
    instruction: Розподіліть іменники за відміною або коментарем.
    groups:
      - label: III відміна
        items:
          - ніч
          - сіль
          - любов
          - осінь
          - подорож
          - радість
          - тінь
          - кров
          - мати
      - label: II відміна чоловічого роду
        items:
          - гість
          - день
          - кінь
          - олень
          - біль
          - степ
      - label: I відміна жіночого роду
        items:
          - земля
          - пісня
          - подруга
          - мрія
          - круча
          - межа
      - label: Інша модель або коментар
        items:
          - ім'я
          - плем'я
          - знання
          - путь
  - id: wb-5
    type: true-false
    title: Перевірка правил
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "III відміна не поділяється на тверду, м'яку й мішану групи."
        correct: true
        explanation: Групи характерні для I та II відмін.
