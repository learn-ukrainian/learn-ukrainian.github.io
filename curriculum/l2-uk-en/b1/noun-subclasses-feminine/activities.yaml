    title: Коротке пояснення правила
    instruction: Напишіть стислий навчальний коментар.
    prompt: "Поясніть різницю між формами ніччю, радістю, кров'ю і гостем. Згадайте відміну, рід і правило орудного відмінка."
    min_words: 80
    model_answer: "Ніч - іменник жіночого роду з нульовим закінченням, тому належить до III відміни. В орудному відмінку має форму ніччю, бо основа закінчується на один приголосний ч, і він подвоюється. Радість теж належить до III відміни, але форма радістю не має подвоєння, бо в основі є збіг ст. Кров - III відміна, але кров'ю пишемо без подвоєння після в і з апострофом перед ю. Гість не належить до III відміни, бо це чоловічий рід II відміни, тому орудний - гостем."
    rubric:
      - criteria: Класифікація
        description: Правильно визначено III і II відміни.
        points: 2
      - criteria: Орудний відмінок
        description: Пояснено подвоєння, відсутність подвоєння й апостроф.
        points: 3
      - criteria: Мова
        description: Відповідь написана природною українською без зайвих помилок.
        points: 2
