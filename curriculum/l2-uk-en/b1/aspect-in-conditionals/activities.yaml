version: '1.0'
module: aspect-in-conditionals
level: b1
inline:
  - id: act-1
    type: quiz
    title: Реальність і вид
    instruction: Оберіть речення або пояснення, яке правильно поєднує умову і вид.
    items:
      - question: Яке речення описує реальну умову з конкретним результатом?
        options:
          - Якщо напишеш мені ввечері, я відповім одразу.
          - Якби писав мені щодня, я відповідав би одразу.
          - Якщо будеш написати мені, я відповів би.
        correct: 0
        explanation: "Якщо + напишеш + відповім: реальна умова і два конкретні результати."
      - question: Де умова описує процес або звичку?
        options:
          - Якщо читатимеш щодня, краще розумітимеш тексти.
          - Якщо прочитаєш текст, напишеш переказ.
          - Якби прочитав текст, написав би переказ.
        correct: 0
        explanation: Слово щодня підказує недоконаний вид і повторення.
      - question: Яке речення є нереальною умовою з конкретним результатом?
        options:
          - Якби я знайшов ключі, відчинив би двері.
          - Якщо знайду ключі, відчиню двері.
          - Якщо шукатиму ключі, відчиняв би двері.
        correct: 0
        explanation: Якби + знайшов і відчинив би показують гіпотетичні завершені дії.
      - question: У якому реченні стан веде до конкретної дії?
        options:
          - Якби я знав адресу, приїхав би.
          - Якби я дізнався адресу, знав би.
          - Якщо я знатиму би адресу, приїду.
        correct: 0
        explanation: Знав - стан, приїхав би - конкретний гіпотетичний результат.
      - question: Яке речення виправляє помилку "якщо будеш написати"?
        options:
          - Якщо напишеш лист, я відповім.
          - Якщо будеш написати лист, я відповім.
          - Якщо написав би лист, я відповім.
        correct: 0
        explanation: Для завершеного результату потрібна форма напишеш.
      - question: Де правильно передано нереальну звичку?
        options:
          - Якби я мав більше часу, читав би щовечора.
          - Якщо я мав більше часу, читав би щовечора.
          - Якби я матиму більше часу, читатиму щовечора.
        correct: 0
        explanation: Якби + мав створює нереальну рамку, читав би показує уявну звичку.
      - question: Яке пояснення правильне?
        options:
          - Вид залежить від того, чи дія подана як результат, процес, звичка або стан.
          - Якщо завжди вимагає доконаного виду в обох частинах.
          - Якби завжди вимагає недоконаного виду в обох частинах.
        correct: 0
        explanation: Тип умови і вид - різні рішення.
      - question: Де результат відкриває тривалий стан?
        options:
          - Якщо вивчиш базові форми, краще розумітимеш тексти.
          - Якщо вчитимеш базові форми, вивчиш їх учора.
          - Якби вивчиш форми, розумів би тексти.
        correct: 0
        explanation: Вивчиш - завершений результат, розумітимеш - тривалий наслідок.
      - question: Де умова є процесом, а наслідок - конкретним результатом?
        options:
          - Якщо довго шукатимеш квитки, пропустиш дешеві місця.
          - Якщо знайдеш квитки, поїдеш у суботу.
          - Якби я знайшов квитки, поїхав би у суботу.
        correct: 0
        explanation: Шукатимеш - процес, пропустиш - конкретний результат.
      - question: Де результат у минулому відкриває тривалий уявний наслідок?
        options:
          - Якби ми купили квитки вчора, сьогодні спокійно планували б дорогу.
          - Якщо купимо квитки вчора, плануватимемо дорогу.
          - Якби купували квитки вчора, поїхали завтра.
        correct: 0
        explanation: Купили - гіпотетичний результат, планували б - тривалий наслідок.
      - question: Яке речення правильно уникає подвійного би після якби?
        options:
          - Якби я завершив проєкт, відпочив би.
          - Якби я завершив би проєкт, відпочив би.
          - Якщо завершив би проєкт, відпочину.
        correct: 0
        explanation: Після якби у частині умови не дублюємо би.
      - question: Де реальна умова має стан, а наслідок - один крок?
        options:
          - Якщо буде час, повторимо правило.
          - Якби буде час, повторили б правило.
          - Якщо був би час, повторимо правило.
        correct: 0
        explanation: Буде час - реальний стан, повторимо - конкретний майбутній крок.
  - id: act-2
    type: fill-in
    title: Реальна умова і вибір виду
    instruction: Вставте форму, яка відповідає реальній умові та значенню дії.
    items:
      - sentence: "Якщо ____ лист сьогодні, я відповім до вечора."
        answer: напишеш
        options:
          - напишеш
          - писатимеш
          - написав би
        explanation: Потрібен один готовий лист, тому доконаний вид.
      - sentence: "Якщо ____ українською щодня, швидше звикнеш до нових форм."
        answer: писатимеш
        options:
          - писатимеш
          - напишеш
          - написав би
        explanation: Щодня означає повторення, тому недоконаний вид.
      - sentence: "Якщо ми ____ проєкт до п'ятниці, відпочинемо у вихідні."
        answer: закінчимо
        options:
          - закінчимо
          - закінчуватимемо
          - закінчили б
        explanation: До п'ятниці вказує на завершений результат.
      - sentence: "Якщо ми ____ без перерви, швидко втомимося."
        answer: працюватимемо
        options:
          - працюватимемо
          - попрацюємо
          - працювали б
        explanation: Без перерви описує процес.
      - sentence: "Якщо клієнт ____ час зустрічі, підготуємо договір."
        answer: підтвердить
        options:
          - підтвердить
          - підтверджуватиме
          - підтвердив би
        explanation: Підтвердження - одна завершена умова.
      - sentence: "Якщо ____ інструкцію уважно, знайдеш менше помилок."
        answer: читатимеш
        options:
          - читатимеш
          - прочитаєш
          - читав би
        explanation: Уважно тут описує спосіб процесу.
      - sentence: "Якщо ____ інструкцію до кінця, налаштуєш застосунок."
        answer: прочитаєш
        options:
          - прочитаєш
          - читатимеш
          - прочитав би
        explanation: До кінця підказує доконаний результат.
      - sentence: "Якщо ____ квитки онлайн, поїдемо в суботу."
        answer: знайдемо
        options:
          - знайдемо
          - шукатимемо
          - знайшли б
        explanation: "Тут потрібен результат пошуку: квитки знайдено."
      - sentence: Якщо ____ продукти без списку, витратиш більше грошей.
        answer: купуватимеш
        options:
          - купуватимеш
          - купиш
          - купив би
        explanation: Без списку описує повторюваний спосіб купівлі.
      - sentence: Якщо ми ____ договір сьогодні, завтра почнемо співпрацю.
        answer: підпишемо
        options:
          - підпишемо
          - підписуватимемо
          - підписали б
        explanation: Підписання договору - конкретний завершений результат.
      - sentence: Якщо ____ форми щодня, говоритимеш упевненіше.
        answer: повторюватимеш
        options:
          - повторюватимеш
          - повториш
          - повторював би
        explanation: Щодня підказує процес або звичку.
      - sentence: Якщо ____ цю вправу до кінця, побачиш різницю між видами.
        answer: виконаєш
        options:
          - виконаєш
          - виконуватимеш
          - виконав би
        explanation: До кінця вимагає доконаного результату.
  - id: act-3
    type: group-sort
    title: Чотири моделі виду
    instruction: Розподіліть речення за моделлю виду в умові та наслідку.
    groups:
      - label: Реальна умова, результат + результат
        items:
          - Якщо знайдемо квитки, поїдемо в суботу.
          - Якщо підпишемо договір, почнемо співпрацю.
          - Якщо прочитаєш інструкцію, налаштуєш застосунок.
      - label: Реальна умова, процес або звичка
        items:
          - Якщо працюватимеш без перерви, швидко втомишся.
          - Якщо тренуватимешся щодня, говоритимеш упевненіше.
          - Якщо читатимеш уважно, знайдеш менше помилок.
      - label: Нереальна умова, конкретний результат
        items:
          - Якби я знайшов ключі, відчинив би двері.
          - Якби вона купила квиток учора, поїхала б сьогодні.
          - Якби ми закінчили раніше, відпочили б.
      - label: Нереальна умова, стан або звичка
        items:
          - Якби я жив ближче, ходив би пішки.
          - Якби вона знала адресу, не шукала б будинок.
          - Якби я мав більше часу, читав би щовечора.
  - id: act-4
    type: match-up
    title: Уявний сценарій і вид
    instruction: Поєднайте умову з наслідком, який логічно продовжує вибір виду.
    pairs:
      - left: Якби я знав раніше
        right: подзвонив би тобі вчора.
      - left: Якби я дізнався раніше
        right: змінив би час зустрічі.
      - left: Якби ми жили ближче
        right: бачилися б щотижня.
      - left: Якби ми переїхали ближче
        right: запросили б друзів на новосілля.
      - left: Якби я читав інструкцію уважніше
        right: не зробив би цієї помилки.
      - left: Якби я прочитав інструкцію до кінця
        right: налаштував би застосунок сам.
      - left: Якби я виграв у лотерею
        right: купив би квиток до Японії.
      - left: Якби я міг подорожувати без обмежень
        right: відвідував би нове місто щомісяця.
      - left: Якби я повторював форми щодня
        right: говорив би впевненіше.
      - left: Якби я повторив форми вчора
        right: легше виконав би тест.
      - left: Якби оплата пройшла вчора
        right: замовлення вже було б у дорозі.
      - left: Якби система працювала стабільніше
        right: клієнти не чекали б так довго.
  - id: act-5
    type: error-correction
    title: Виправте змішану умову
    instruction: Знайдіть помилкову частину й замініть її формою, яка відповідає реальності умови та виду.
    items:
      - sentence: "Якщо будеш написати лист, я відповім."
        error: будеш написати
        correction: напишеш
        error_type: phrase
        explanation: Для одного готового листа потрібен доконаний майбутній.
      - sentence: "Якби я знатиму адресу, приїхав би."
        error: знатиму
        correction: знав
        error_type: word
        explanation: Після якби потрібна минула форма.
      - sentence: "Якщо я зробив би це сьогодні, завтра відпочину."
        error: зробив би
        correction: зроблю
        error_type: phrase
        explanation: Реальна майбутня умова не має б/би.
      - sentence: "Якби я прочитав би інструкцію, налаштував би застосунок."
        error: прочитав би
        correction: прочитав
        error_type: phrase
        explanation: Після якби не дублюємо би в тій самій частині.
      - sentence: "Якщо вчитимеш правило один раз, вивчиш його."
        error: вчитимеш правило один раз
        correction: вивчиш правило
        error_type: phrase
        explanation: Один раз і готовий результат потребують доконаного виду.
      - sentence: "Якби я вигравав у лотерею вчора, купив би квиток до Японії."
        error: вигравав
        correction: виграв
        error_type: word
        explanation: Виграш у лотерею тут одна гіпотетична подія.
      - sentence: "Якби ми працювали проєкт учора, закінчили б його."
        error: працювали проєкт
        correction: працювали над проєктом
        error_type: phrase
        explanation: Працювати треба над проєктом; недоконаний вид показує процес.
      - sentence: "Якщо я мав би більше часу, читав би щовечора."
        error: Якщо я мав би
        correction: Якби я мав
        error_type: phrase
        explanation: Це нереальна теперішня умова, тому потрібне якби.
      - sentence: Якщо клієнт підтверджував би зустріч завтра, я повідомлю команду.
        error: підтверджував би
        correction: підтвердить
        error_type: phrase
        explanation: Завтра і повідомлю роблять умову реальною майбутньою.
      - sentence: Якби оплата проходитиме вчора, замовлення було б у дорозі.
        error: проходитиме
        correction: пройшла
        error_type: word
        explanation: Вчора і якби потребують минулої форми доконаного виду.
      - sentence: Якщо довго купимо квитки без плану, пропустимо дешеві місця.
        error: купимо
        correction: купуватимемо
        error_type: word
        explanation: Довго і без плану описують процес, не один результат.
      - sentence: Якби система працювала стабільніше, клієнти не почекали б так довго.
        error: не почекали б
        correction: не чекали б
        error_type: phrase
        explanation: Йдеться про тривале очікування клієнтів, тому потрібен недоконаний вид.
workbook:
  - id: wb-1
    type: quiz
    title: Основна логіка
    instruction: Оберіть правильне твердження або речення.
    items:
      - question: Що спершу треба визначити в умовному реченні?
        options:
          - Чи умова реальна, чи нереальна.
          - Чи речення довге, чи коротке.
          - Чи можна додати слово то.
        correct: 0
        explanation: Вибір якщо або якби залежить від реальності умови.
      - question: Що визначає вид дієслова?
        options:
          - Чи дія подана як результат, процес, звичка або стан.
          - Чи в реченні є кома.
          - Чи речення починається з підмета.
        correct: 0
        explanation: Вид показує спосіб бачити дію.
      - question: Яке речення має модель доконаний + доконаний?
        options:
          - Якщо знайдемо квитки, поїдемо в суботу.
          - Якщо шукатимемо квитки, будемо нервувати.
          - Якби ми жили ближче, бачилися б частіше.
        correct: 0
        explanation: Знайдемо і поїдемо - конкретні результати.
      - question: Яке речення має нереальну умову?
        options:
          - Якби я мав більше часу, читав би щовечора.
          - Якщо матиму час, читатиму ввечері.
          - Якщо буде час, прочитаю розділ.
        correct: 0
        explanation: Якби сигналізує уявну ситуацію.
      - question: Де правильно виправлено "якщо будеш написати"?
        options:
          - Якщо напишеш.
          - Якщо написав би.
          - Якби напишеш.
        correct: 0
        explanation: Будеш + доконаний інфінітив не є правильною моделлю.
      - question: Яка пара передає процес у реальній умові?
        options:
          - Якщо читатимеш уважно, менше помилятимешся.
          - Якщо прочитаєш уважно, налаштуєш застосунок.
          - Якби прочитав уважно, налаштував би застосунок.
        correct: 0
        explanation: Читатимеш і помилятимешся описують тривалу або повторювану дію.
      - question: Де результат відкриває тривалий наслідок?
        options:
          - Якби закінчив курс, упевненіше говорив би.
          - Якби ходив на курс, закінчив би його вчора.
          - Якщо ходив би на курс, говоритиму.
        correct: 0
        explanation: Закінчив - результат, говорив би - тривалий уявний стан.
      - question: Чому "якби я знатиму" помилкове?
        options:
          - Після якби потрібна минула форма, а не майбутній час.
          - Після якби завжди потрібен наказовий спосіб.
          - Після якби не може бути дієслова знати.
        correct: 0
        explanation: Нереальна умова використовує минулу форму.
      - question: Яке речення правильно показує реальний процес і конкретний результат?
        options:
          - Якщо оплата проходитиме довше, повідомимо вас окремо.
          - Якби оплата проходитиме довше, повідомимо вас окремо.
          - Якщо оплата пройшла б довше, повідомимо вас окремо.
        correct: 0
        explanation: Проходитиме - процес у реальній умові, повідомимо - конкретний крок.
      - question: Яке речення має нереальну модель доконаний + недоконаний?
        options:
          - Якби оплата пройшла вчора, ми вже працювали б над відправленням.
          - Якщо оплата пройде вчора, працювали б над відправленням.
          - Якби оплата проходитиме вчора, відправимо замовлення.
        correct: 0
        explanation: Пройшла - гіпотетичний результат, працювали б - тривалий наслідок.
      - question: Чому якщо напишеш і якщо писатимеш не взаємозамінні?
        options:
          - Перше називає результат, друге - процес або звичку.
          - Перше нереальне, друге реальне.
          - Перше має частку би, друге ні.
        correct: 0
        explanation: Обидва можуть бути реальними, але вид змінює картину дії.
      - question: Де правильно виправлено подвійне би?
        options:
          - Якби прочитав інструкцію, налаштував би застосунок.
          - Якби прочитав би інструкцію, налаштував би застосунок.
          - Якщо прочитав би інструкцію, налаштую застосунок.
        correct: 0
        explanation: Після якби у частині умови лишається прочитав без другого би.
  - id: wb-2
    type: fill-in
    title: Змішана практика
    instruction: Виберіть форму, яка відповідає змісту речення.
    items:
      - sentence: "Якщо я ____ адресу, приїду сам."
        answer: знатиму
        options:
          - знатиму
          - знав би
          - знаю би
        explanation: Це реальна майбутня умова.
      - sentence: "Якби я ____ адресу, приїхав би сам."
        answer: знав
        options:
          - знав
          - знатиму
          - знаю
        explanation: Це нереальна умова з минулою формою.
      - sentence: "Якщо ти ____ список до кінця, виконаєш вправу швидше."
        answer: прочитаєш
        options:
          - прочитаєш
          - читатимеш
          - читав би
        explanation: До кінця підказує завершення.
      - sentence: "Якщо ти ____ список щодня, слова поступово стануть автоматичними."
        answer: читатимеш
        options:
          - читатимеш
          - прочитаєш
          - прочитав би
        explanation: Щодня підказує повторення.
      - sentence: "Якби вона ____ квиток учора, поїхала б сьогодні."
        answer: купила
        options:
          - купила
          - купувала
          - купить
        explanation: Учора і поїхала б указують на конкретний минулий контрфакт.
      - sentence: "Якби вона ____ квитки щомісяця, більше подорожувала б."
        answer: купувала
        options:
          - купувала
          - купила
          - купить
        explanation: Щомісяця вимагає недоконаного виду.
      - sentence: "Якщо ми ____ проєкт сьогодні, завтра відпочинемо."
        answer: завершимо
        options:
          - завершимо
          - завершували б
          - завершуватимемо без кінця
        explanation: Потрібен готовий результат.
      - sentence: "Якби ми ____ спокійніше, не пропустили б цифру."
        answer: працювали
        options:
          - працювали
          - попрацювали
          - працюватимемо
        explanation: Спокійніше описує спосіб процесу.
      - sentence: Якщо банк ____ оплату сьогодні, відправимо замовлення завтра.
        answer: підтвердить
        options:
          - підтвердить
          - підтверджуватиме
          - підтвердив би
        explanation: Підтвердження оплати - один результат.
      - sentence: Якщо оплата ____ довше, повідомимо вас окремо.
        answer: проходитиме
        options:
          - проходитиме
          - пройде
          - пройшла б
        explanation: Довше показує процес.
      - sentence: Якби оплата ____ вчора, замовлення вже було б у дорозі.
        answer: пройшла
        options:
          - пройшла
          - проходитиме
          - проходила
        explanation: Вчора і вже було б указують на гіпотетичний завершений результат.
      - sentence: Якби система ____ стабільніше, клієнти не чекали б так довго.
        answer: працювала
        options:
          - працювала
          - спрацювала
          - працюватиме
        explanation: Стабільніше описує тривалий спосіб роботи системи.
  - id: wb-3
    type: group-sort
    title: Результат, процес, стан
    instruction: Розподіліть частини речень за тим, що вони показують.
