          - якщо тобі зручно
          - якби я знав адресу
          - якби ми жили ближче
  - id: wb-4
    type: match-up
    title: Умова і природний наслідок
    instruction: Поєднайте частини так, щоб вид і логіка речення збігалися.
    pairs:
      - left: Якщо напишеш звіт сьогодні
