        explanation: Буду не поєднується з доконаним інфінітивом прочитати.
      - sentence: "Якби я прочитаю текст, написав би переказ."
        error: прочитаю
        correction: прочитав
        error_type: word
        explanation: Після якби потрібна минула форма.
      - sentence: "Якщо вона знала би адресу завтра, приїде."
        error: знала би
        correction: знатиме
        error_type: phrase
        explanation: Завтра і приїде роблять умову реальною майбутньою.
      - sentence: "Якби вона знатиме адресу, приїхала б."
        error: знатиме
        correction: знала
        error_type: word
        explanation: Нереальна умова потребує минулої форми.
      - sentence: "Якщо ми працювали б без перерви, втомимося."
        error: працювали б
        correction: працюватимемо
        error_type: phrase
        explanation: Це реальна майбутня умова з процесом.
      - sentence: "Якби ми закінчимо раніше, відпочили б."
        error: закінчимо
        correction: закінчили
        error_type: word
        explanation: Якби вимагає минулої форми.
      - sentence: "Якби я мав більше часу, прочитав би щовечора."
        error: прочитав би щовечора
        correction: читав би щовечора
        error_type: phrase
        explanation: Щовечора показує звичку, тому потрібен недоконаний вид.
      - sentence: "Якщо я вчитиму правило один раз, знатиму його."
        error: вчитиму правило один раз
        correction: вивчу правило
        error_type: phrase
        explanation: Один раз і готове знання краще передаються доконаним видом.
      - sentence: Якщо банк підтверджував би оплату сьогодні, ми відправимо замовлення.
        error: підтверджував би
        correction: підтвердить
        error_type: phrase
        explanation: Це реальна майбутня умова з конкретним результатом.
