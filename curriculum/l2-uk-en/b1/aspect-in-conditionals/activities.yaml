      - left: Якби писав уважніше
        right: не пропустив би важливу цифру.
      - left: Якщо вивчиш ці форми
        right: легше складеш тест.
      - left: Якщо вчитимеш форми на прикладах
        right: швидше почнеш уживати їх автоматично.
      - left: Якби вивчив ці форми раніше
        right: краще склав би попередній тест.
      - left: Якби вчив ці форми щодня
        right: тепер почувався б упевненіше.
      - left: Якщо банк підтвердить оплату
        right: відправимо замовлення завтра.
      - left: Якщо оплата проходитиме довше
        right: повідомимо вас окремо.
      - left: Якби оплата пройшла вчора
        right: замовлення вже було б у дорозі.
      - left: Якби система працювала стабільніше
        right: клієнти не чекали б так довго.
  - id: wb-5
    type: error-correction
    title: Редагування кальок
    instruction: Виправте помилкову частину речення.
    items:
      - sentence: "Якщо я буду прочитати текст, напишу переказ."
        error: буду прочитати
