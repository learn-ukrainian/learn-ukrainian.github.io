          - як би
      - id: 2
        answer: якби
        options:
          - якби
          - якщо
          - коли
      - id: 3
        answer: доконаний
        options:
          - доконаний
          - недоконаний
          - наказовий
      - id: 4
        answer: недоконаний
        options:
          - недоконаний
          - доконаний
          - умовний
      - id: 5
        answer: напишеш
        options:
          - напишеш
          - писатимеш
          - написав би
      - id: 6
        answer: писатимеш
        options:
          - писатимеш
          - напишеш
          - написав би
      - id: 7
        answer: майбутній
        options:
          - майбутній
          - минулий
          - теперішній
      - id: 8
        answer: б
        options:
          - б
          - буде
          - був
      - id: 9
        answer: проходитиме
        options:
          - проходитиме
          - пройде
          - пройшла б
      - id: 10
        answer: пройшла
        options:
          - пройшла
          - проходитиме
          - пройде
      - id: 11
        answer: б
        options:
          - б
          - буде
          - якщо
      - id: 12
