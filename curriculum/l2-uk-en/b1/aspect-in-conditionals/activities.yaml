        error: пройде довго
        correction: проходитиме довше
        error_type: phrase
        explanation: Довший перебіг оплати - процес, тому потрібен недоконаний вид.
      - sentence: Якби оплата проходитиме вчора, замовлення було б у дорозі.
        error: проходитиме
        correction: пройшла
        error_type: word
        explanation: Для минулого контрфакту потрібна минула форма.
      - sentence: Якби система спрацювала стабільніше, клієнти не чекали б так довго.
        error: спрацювала
        correction: працювала
        error_type: word
        explanation: Стабільність системи - тривалий процес або стан, не разове спрацювання.
  - id: wb-6
    type: true-false
    title: Правда чи ні
    instruction: Визначте, чи твердження правильне.
    items:
      - statement: "Якщо відкриває реальну умову, а якби зазвичай відкриває нереальну умову."
        correct: true
        explanation: Це базове розмежування двох попередніх модулів.
      - statement: "Якщо завжди вимагає доконаного виду."
        correct: false
        explanation: "Умова може бути процесом або звичкою: якщо читатимеш."
      - statement: "Якби завжди вимагає недоконаного виду."
        correct: false
        explanation: "Нереальна умова може мати доконаний результат: якби купив."
      - statement: "У реченні Якщо прочитаєш інструкцію, налаштуєш застосунок обидві дії подані як результати."
        correct: true
        explanation: Прочитаєш і налаштуєш - доконані форми.
      - statement: "У реченні Якщо читатимеш уважно, менше помилятимешся умова є процесом."
        correct: true
        explanation: Читатимеш уважно описує спосіб читання.
      - statement: "Форма якщо будеш написати є доброю B1-моделлю для майбутнього результату."
        correct: false
        explanation: Треба сказати якщо напишеш.
      - statement: "У реченні Якби я знав адресу, приїхав би стан веде до конкретної дії."
        correct: true
        explanation: Знав - стан, приїхав би - результат.
      - statement: "Порядок частин змінює вид дієслова."
        correct: false
        explanation: "Вид лишається тим самим: якщо знайдемо - поїдемо або поїдемо - якщо знайдемо."
      - statement: У реченні Якщо оплата проходитиме довше, повідомимо вас окремо умова є процесом.
        correct: true
        explanation: Проходитиме довше описує перебіг, а повідомимо - конкретний крок.
      - statement: У реченні Якби оплата пройшла вчора, замовлення було б у дорозі умова є гіпотетичним результатом.
        correct: true
        explanation: Пройшла вчора - завершена подія, яка не сталася.
      - statement: Після якби природно ставити майбутню форму знатиму.
        correct: false
        explanation: 'Після якби потрібна минула форма: якби знав або якби знала.'
      - statement: Якщо клієнт підтвердить зустріч, я повідомлю команду має дві конкретні майбутні дії.
        correct: true
        explanation: Підтвердить і повідомлю називають окремі результати.
  - id: wb-7
