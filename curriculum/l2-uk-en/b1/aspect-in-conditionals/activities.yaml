  - id: wb-11
    type: essay-response
    title: План і уявний варіант
    prompt: >
      Напишіть 130-160 слів українською. Опишіть один реальний план з трьома
      реченнями якщо і один уявний варіант з трьома реченнями якби. У кожній
      частині використайте принаймні один доконаний результат і один недоконаний
      процес або звичку. Після тексту випишіть два речення й коротко поясніть
      вибір виду.
    min_words: 130
    model_answer: |
      Якщо завтра буде час, я прочитаю новий текст українською і випишу незнайомі слова. Якщо читатиму уважно, швидше побачу, де автор ставить умову, а де називає наслідок. Якщо вивчу десять нових форм, легше напишу короткий переказ. Але зараз я думаю і про інший варіант. Якби я почав цей курс раніше, уже читав би довші статті без словника. Якби я щодня слухав українські подкасти, краще розумів би швидке мовлення. Якби я знайшов мовного партнера минулого місяця, частіше говорив би наживо. У реченні "якщо вивчу" я вибрав доконаний вид, бо йдеться про готовий результат. У реченні "якби щодня слухав" я вибрав недоконаний вид, бо це уявна звичка.
    rubric:
      - criteria: Реальні умови
        description: Є три правильні речення з якщо і дійсним способом.
        points: 3
      - criteria: Нереальні умови
        description: Є три правильні речення з якби і формами б/би без дублювання.
        points: 3
      - criteria: Вид
        description: Є доконаний результат і недоконаний процес або звичка в кожній частині.
        points: 3
      - criteria: Пояснення
        description: Після тексту пояснено вибір виду у двох реченнях.
        points: 2
      - criteria: Мова
        description: Текст природний, без кальок типу якщо будеш написати або якби знатиму.
        points: 1
