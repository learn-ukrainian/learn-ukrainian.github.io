          - якби ми готувалися спокійніше
          - якби я читав інструкцію уважніше
      - label: Звичка або повторення
        items:
          - якщо тренуватимешся щодня
          - якщо писатимеш українською регулярно
          - якби я ходив на каву щоранку
          - якби вона купувала квитки заздалегідь
      - label: Стан
        items:
