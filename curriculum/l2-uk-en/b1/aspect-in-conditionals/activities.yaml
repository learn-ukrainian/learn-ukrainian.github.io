  - id: wb-9
    type: order
    title: Від діагностики до речення
    instruction: Упорядкуйте кроки редагування умовного речення.
    items:
      - Прочитати все речення без перекладу слова за словом.
      - Визначити, чи умова реальна або нереальна.
