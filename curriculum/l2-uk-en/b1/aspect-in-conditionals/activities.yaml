    text: "Спочатку визначаємо, чи умова реальна. Для реальної умови частіше вживаємо {1}, а для нереальної - {2}. Потім перевіряємо
      вид: результат часто має {3} вид, а процес або звичка - {4} вид. У реченні \"Якщо ти {5} лист, я відповім\" потрібен
      результат. У реченні \"Якщо ти {6} щодня, швидше звикнеш\" потрібна звичка. Після якби не ставимо {7} час. У частині
      наслідку нереальної умови потрібна частка {8} або би. Якщо оплата {9} довше, повідомимо вас окремо. Якби оплата {10}
      вчора, замовлення було б у дорозі. У реальній умові не додаємо частку {11}. Для звички або повторення потрібен {12}
      вид."
