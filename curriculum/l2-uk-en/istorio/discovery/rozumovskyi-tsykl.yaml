  text: "По-друге, романтичний період, що вбирає й\r\nпередромантичну фазу і припадає\
    \ приблизно на першу половину XIX ст. Третій\r\nперіод — постромантичний, і сягає\
    \ він, хоч як це, на перший погляд, і не\r\nдивно, аж другої світової війни. Четвертий,\
    \ і останній, — післявоєнний період.\n\nБільш ніж очевидно, що ці періоди цілком\
    \ різнорідні.\r\nРомантичний (і передромантичний) період, незважаючи на певну\
    \ внутрішню\r\nдиференціацію переважно завдяки \"спільній платформі\", що її\r\
    \nзабезпечували поетика, літературні посту"
