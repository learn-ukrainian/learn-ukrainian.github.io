  text: "Подальша еміграція, зокрема до Сполучених Штатів\r\nАмерики й Канади, але\
    \ також і до таких віддалених аванпостів, як Бразилія й\r\nАвстралія, спричинила\
    \ фізичне розпорошення і зникнення багатьох, хай і\r\nнедовговічних, періодичних\
    \ видань, груп та інститутів, що зародилися у таборах\r\nДіПі. Але така фрагментація\
    \ була зумовлена не фізичною відстанню, а\r\nсектантським світобаченням, глибокою\
    \ відцентровою тенденцією, що врешті-решт\r\nпризвела до появи відносно самодостатніх\
    \ й більш-менш герметичних «партій»"
