  text: "Еміґраційні хвилі прийшли в різні періоди часу з\r\nЦентр. та Сх. Земель\
    \ і з Галичини, вони прямували до різних країн, частина\r\nеміґрантів поверталася\
    \ на батьківщину, частина переходила з однієї країни до\r\nдругої. Це залежало\
    \ від політ. стану на батьківщині, від ситуації в країнах, де\r\nеміґрація тимчасово\
    \ перебувала, і від внутр. та екон. відносин серед самої\r\nеміґрації. Плинність\
    \ еміґрації була дуже інтенсивна, особливо в перші роки;\r\nвідносини стали стабілізуватися\
    \ від 1923 p., а ще більше після"
