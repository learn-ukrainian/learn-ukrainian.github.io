  text: "Біженці  — особи, які залишили країни \nсвого попереднього місця проживання\
    \ \nчерез дії нацистського або інших \nрежимів. DP-табори  — тимчасові табори\
    \ для \nпереміщених осіб. Репатріація  — повернення \nна  батьківщину з  поновленням\
    \ гро­\nмадянських прав військовополо­нених \nі  цивільних осіб, які під час війни\
    \ \nопинилися в  інших державах \nта  перебували там тривалий час. Радянські репатріанти\
    \ в  очікуванні \nповернення до СРСР. 1940-ві рр. Зверніть увагу\nБіженці та переміщені\
    \ особи  — саме \nтак у  "
  section_title: Сторінка 29
  grade: 11
  author: galimov
  page: ''
  trust_tier: 1
- score: 0.3333333432674408
  chunk_id: 11-klas-istoriya-ukr-gisem-2024_s0046
  text: "Однак фак-\nтично все контролювали окупаційні адміністрації. Радянська влада\
    \ намагалася вплинути на своїх \nгромадян, що опинилися в  західних DP-таборах,\
    \ \nбажаючи повернути якнайбільше людей. Уже з жов-\nтня 1944 р. в СРСР запрацювала\
    \ спеціальна репатріа­\nційна комісія. Переміщені особи — особи, які \nзаходами\
    \ нацистського режиму були \nвислані з країн свого попереднього \nмісця проживання\
    \ через расові, \nрелігійні й політичні причини або \nвивезені з метою використання\
    \ їх як \nдешевої робочої сили. Біж"
  section_title: Сторінка 26
  grade: 11
  author: gisem
  page: ''
  trust_tier: 1
- score: 0.25
  chunk_id: 11-klas-istoriya-ukr-gisem-2024_s0051
  text: "Цікаві факти\nУ 1946—1947 рр. в американській зоні \nокупації в таборах активно\
    \ проводили \nперевірки з метою позбавлення \nдопомоги осіб, які співпрацювали\
    \ \nз нацистами. «Люди хвилювалися за \nнайменшого натяку на перевірку. Позбутися\
    \ такого статусу [переміщеної \nособи] означало втратити й те \nмаленьке право\
    \ на життя, отримане \nзавдяки сильним світу цього», — писав \nу своїх спогадах\
    \ «Планета Ді-Пі» \nукраїнський письменник Улас Самчук, \nякий пройшов через такий\
    \ табір. Урешті-решт він опинився в Канад"
  section_title: Сторінка 29
  grade: 11
  author: gisem
  page: ''
  trust_tier: 1
- score: 0.20000000298023224
  chunk_id: 11-klas-istoriya-ukr-gisem-2024_s0045
  text: "Розділ І. Україна в повоєнний період\n24\n5\t \nПереміщені особи з  України.\
    \ Репатріація. ­Неповерненці. 1940-ві рр. стали «ерою перемі-\nщених осіб». Друга\
    \ світова війна дала поштовх \nмасштабній міграції. Її центром стали землі Німеч-\n\
    чини, на яких опинилося до 10  млн осіб, що зали-\nшили свої домівки через різні\
    \ обставини (із них \n5  млн осіб  — вихідці із СРСР). Це були біженці, \nвійськовополонені,\
    \ остарбайтери (вивезені на при-\nмусові роботи), в’язні нацистських таборів.\
    \ Одну \nз  найбільших етніч"
  section_title: Сторінка 26
  grade: 11
  author: gisem
  page: ''
  trust_tier: 1
- score: 0.1666666716337204
  chunk_id: 11-klas-istoriya-ukr-galimov-2024_s0046
  text: "Розділ І. Україна в повоєнний період\n26\nза вкладами від 3  до 10  тис.\
    \ руб. заощадження \nзменшувалися на третину, а понад 10 тис. руб. — на \nдві\
    \ третини. Особливо боляче реформа вдарила по селянству, \nяке знову було ошукане\
    \ режимом. За  відсутно­сті \nощадних кас у  селах обмін готівкових грошей, які\
    \ \nнаселення зберігало вдома, здійснювали у співвідно-\nшенні 1 : 10. Отже, заходи\
    \ влади лише відклали ви-\nрішення складних соціальних проблем. \e\n\e Працюємо\
    \ разом. За допомогою методу «Плакат \nдумок» гр"
  section_title: Сторінка 28
