  text: "На зламі століть, коли в суспільній атмосфері\r\nзагострилося чуття суб’єктивності,\
    \ Франко здійснює перегляд певних філософських\r\nнастанов, що зв’язували його\
    \ з позитивізмом і Драгомановим. «Особливо останнє\r\nдесятиліття XIX в. можна\
    \ назвати епохою реакції проти одностороннього\r\nМарксівського економічного матеріалізму\
    \ чи фаталізму», — пише він в статті\r\n«Поза межами можливого». Повернення до\
    \ ідеалу як головного рушія суспільного\r\nпрогресу, навіть виробництва, змушує\
    \ Франка зробити радикальні висно"
