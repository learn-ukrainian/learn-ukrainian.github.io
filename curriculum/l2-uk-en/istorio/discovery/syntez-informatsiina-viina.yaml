  text: "Доктрина «русского міра»  — \nідеологічна політика, яку використовує \nРосійська\
    \ Федерація для виправдання \nзбройної агресії, підтримання \nсепаратизму, поширення\
    \ свого впливу \nна інші країни тощо. Росія вважає себе \nцентром єдиного культурно-\n\
    цивілізаційного простору, до якого \nзараховує й  інші країни, населені \nнародами,\
    \ що мають історичні та \nкультурні зв’язки з  Росією. ПРИГАДАЙТЕ:  1. Коли відбувалася\
    \ «по-\nмаранчева революція»? 2. Які конфлік-\nти виникали між Росією та Україною\
    \ \nу  2000-х рр."
