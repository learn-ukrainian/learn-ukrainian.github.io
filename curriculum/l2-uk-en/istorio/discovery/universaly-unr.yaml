  text: "38\nРозділ II\n2 \nIII Універсал УЦР. Проголошення Української Народної Республіки\
    \ (УНР). Зазнавши поразки в  Києві, більшовики не збиралися відмовляти-\nся від\
    \ влади в  Україні. Упродовж листопада їм вдалося захопити владу \nв  Луганську,\
    \ деяких районах Донбасу й  кількох містах смуги Поділь-\nської та  Волинської\
    \ губерній. Також вони мали своє представництво \nв  інших радах, які після падіння\
    \ Тимчасового уряду взяли владу на \nмісцях у  свої руки. 17  листопада 1917 \
    \ р. на розширеному засіданні рад \n"
  section_title: Сторінка 38
  grade: 10
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.3333333432674408
  chunk_id: 10-klas-istorija-ukrajiny-gisem-2018_s0061
  text: "36\nРозділ II\n? Запитання та завдання\n\x8A\x8A\n1. Коли було оприлюднено\
    \ I  Універсал УЦР? 2. Хто очолив Генеральний Секре-\nтаріат у червні 1917 р.?\
    \ 3. Коли відбулося повстання полуботківців? 4. Що таке \nбільшовизація рад? 5.\
    \ Хто став командувачем Першого Українського корпусу? \x8E\n\x8E\n6. Охарактеризуйте\
    \ зміст I  Універсалу УЦР. 7. Назвіть основні положення комп-\nромісу між УЦР\
    \ та Тимчасовим урядом, закріплені в  II Універсалі. 8. Якими були \nнаслідки\
    \ прийняття II Універсалу? 9. Як вплинув на ситуацію в  Укр"
  section_title: Сторінка 36
  grade: 10
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.25
  chunk_id: 10-klas-istorija-ukrajiny-gisem-2018_s0072
  text: "Перша війна більшовицької Росії з УНР та проголошення \nнезалежності УНР\n\
    \e\n\e\n1. Коли і  як була встановлена більшовицька влада в  Росії? 2. Якими були\
    \ від-\nносини УНР та більшовиків? 3. Про що йшлося в  I, II та III Універсалах\
    \ УЦР? 1 \nПочаток агресії більшовицької Росії проти УНР. Проголошення III Уні-\n\
    версалу й  подальші державотворчі заходи УЦР призвели до роз-\nгортання конфлікту\
    \ з  РНК Росії, який УЦР не визнавала урядом усієї"
  section_title: Сторінка 41
  grade: 10
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.20000000298023224
  chunk_id: 10-klas-istorija-ukrajiny-gisem-2018_s0050
  text: "В Україні I  Універсал УЦР зустріли загалом схвально. Однак ви-\nконкоми\
    \ Рад робітничих і солдатських депутатів на спільному засіданні \nв Києві ухвалили\
    \ резолюцію, у якій засуджувалося проголошення авто-\nномії України до скликання\
    \ Всеросій-\nських Установчих зборів. У Петрограді \nпереважало несприйняття цього\
    \ кроку. Голова Тимчасового уряду Г. Львов за-\nкликав українців: «Не йдіть необачним\
    \ \nшляхом розпорошення сил визволеної \nРосії, не відривайтеся від загальної\
    \ \n18—23 червня 1917 р. у Києві зібр"
  section_title: Сторінка 30
  grade: 10
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.1666666716337204
  chunk_id: 10-klas-istorija-ukrajiny-gisem-2018_s0066
  text: "III Універсал визначав територію УНР, її владні \nоргани й  містив широку\
    \ програму соціально-економічних перетворень:\n\x17\n\x17 до Установчих зборів\
    \ уся влада в  Ук­ра­їні переходила до УЦР та \nГенерального Секретаріату; територія\
    \ УНР \nвизначалася в  межах Київщини, Поділля, \nВолині, Чернігівщини, Полтавщини,\
    \ Хар-\nківщини, Катеринославщини, Херсонщи-\nни, Таврії (без Криму). Остаточні\
    \ кордони \nУНР, а  також приєднання частини Кур-\nщини, Холмщини, Воронежчини,\
    \ як і  су-\nміжних областей, де більшість насе"
  section_title: Сторінка 38
  grade: 10
  author: gisem
  page: ''
  trust_tier: 2
