  text: "Шептицький порушував питання про запровадження \nзагального виборчого права,\
    \ реформування системи виборів до Галицького кра­\nйового сейму, створення українського\
    \ університету у  львові. Андрій Шептицький (1865—1944)  — просвітитель, громадсько­політичний\
    \ діяч, \nдоктор теології, архієпископ, що відіграв важливу роль в українському\
    \ національ­\nному русі. 17  грудня 1900  р. він був призначений митрополитом\
    \ греко­католиць­\nкої церкви (1900—1944). діяч доклав чимало зусиль для того,\
    \ щоб греко­католиць"
