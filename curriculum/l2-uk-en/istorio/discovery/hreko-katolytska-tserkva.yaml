  text: "250\nРозділ VII\nНа початку XX ст. греко-католицька церква, як і в попередньому\
    \ \nстолітті, відігравала важливу роль у житті українців Галичини й Закар-\nпаття.\
    \ Багато зробила вона для українського національного відродження, \nзахисту прав\
    \ та інтересів українців. Проте наприкінці XIX ст., коли \nукраїнський рух став\
    \ набувати переважно світського характеру, відно-\nсини між греко-католицькою\
    \ церквою та його провідниками загостри-\nлися. Ситуація змінилася, коли Галицьку\
    \ греко-католицьку митрополію \nочоли"
  section_title: Сторінка 250
  grade: 9
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.3333333432674408
  chunk_id: 9-klas-istorija-ukrajini-gisem-2017_s0453
  text: "251\nПрактичне заняття\nНовий митрополит поставив участь греко-католицького\
    \ духовен-\nства в українському русі в залежність від дотримання ним норм христи-\n\
    янської моралі. Замість старої ролі національного провідника церква ма-\nла виступати\
    \ духовним і моральним авторитетом українства в краї. Нова \nроль не відразу знайшла\
    \ розуміння в лідерів українського руху. Сама \nпостать А. Шептицького, що походив\
    \ із полонізованого роду, викликала \nв них сумніви. Проте наполегливість, із\
    \ якою митрополит реалізову"
  section_title: Сторінка 251
  grade: 9
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.25
  chunk_id: 9-klas-istorija-ukrajini-gisem-2017_s0454
  text: "Він також став ініціатором створення учительської семінарії для дівчат \n\
    в Ужгороді (1902 р.). Однак загалом греко-католицька церква в Закар-\nпатті відійшла\
    \ від участі в національній боротьбі русинів й дедалі біль-\nше перетворювалася\
    \ на провідника мадяризації. Реакцією на це стало \nзбільшення серед віруючих\
    \ прибічників православ’я. ? Запитання та завдання\n1. Чому греко-католицька церква\
    \ наприкінці XIX ст. втратила свій вплив на україн-\nський рух? 2. Яку нову роль\
    \ церкви визначив А. Шептицький в у"
  section_title: Сторінка 251
  grade: 9
  author: gisem
  page: ''
  trust_tier: 2
