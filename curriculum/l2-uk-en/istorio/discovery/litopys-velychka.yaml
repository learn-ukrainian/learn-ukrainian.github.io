  text: "Доведено, що Рігельман не був знайомий з такою\r\nважливою для висвітлення\
    \ подій історії України початку XVIII ст. історіографічною\r\nпам’яткою, як літопис\
    \ С. Величка. Разом з тим він, очевидно, користувався тим\r\nсамим джерелом, на\
    \ основі якого написав свій твір С. Величко. Про велику\r\nймовірність такого\
    \ припущення свідчить ряд документів, які зустрічаються і в\r\n«Літописній оповіді\
    \ про Малу Росію» і в літопису Величка: Білоцерківський\r\nуніверсал Б. Хмельницького;\
    \ перша грамота царя Олексія Михайлов"
