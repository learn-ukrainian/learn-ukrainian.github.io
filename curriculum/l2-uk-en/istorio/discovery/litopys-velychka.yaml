  text: "4. Найвизначніший та найбільший твір третього\r\nлітописця українського барока,\
    \ Самійла Величка; частини його, щоправда,\r\nстрачено, так що «Літопис» його\
    \ доходить до 1700 p., хоч автор, здається,\r\nдоводив його до 1720 р. Величко\
    \ навіть розвиває в передмовах до 1-го та 2-го\r\nтомів «Літопису» деякі основи\
    \ свого історичного світогляду та своєї історичної\r\n«методології». Джерела Величка\
    \ не менш різноманітні, аніж грабянківські (так\r\nсаме Пуфендорф), а вплив стилістики\
    \ римських істориків у нього ще зна"
