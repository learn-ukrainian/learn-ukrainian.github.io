  text: "Розділ IV. Козацька Україна наприкінці 50‑х рр. XVII — на початку XVIII ст.\
    \ 172\n1. Виникнення та розвиток \nСлобідської України\n\e\n\e Чому на Слобожанщині\
    \ сформувався козацький \nустрій? Із другої половини XVI  ст. на землях, \nде \
    \ сходилися кордони Речі Посполитої, Мос-\nковського царства і Кримського ханату,\
    \ актив-\nно розгортався процес колонізації. У  XVII  ст. він набув значних масштабів.\
    \ Основну роль \nу  ньому відігравали українські селяни й  ко-\nзаки з Лівобережної\
    \ і Правобережної Гетьман-\nщини."
