    \ границею, лежало багато порожніх московських земель,\r\nі тепер московський\
    \ уряд, щоб мати оборонну лінію проти татар, почав ці землі\r\nзаселювати. І тут\
    \ незабаром постало велике число слобід, цебто малих осель без\r\nцерков, від\
    \ чого й край цей був названий Слобожанщиною. Постал"
