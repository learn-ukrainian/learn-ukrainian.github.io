  text: "Українцям дозволяли користуватися правом займанщини (обирати \nдля володіння\
    \ будь-які вільні землі) і жити там за козацьким зви-\nчаєм: створювати полки\
    \ і сотні, користуватися власним судочинст-\nвом, не сплачувати податки. Поселенці\
    \ мали визнати зверхність \nмосковського царя і захищати край від набігів з півдня\
    \ османів та \nкримських татар. Права переселенців закріплювалися царськими \n\
    грамотами. Оскільки вільні поселення називали слободами, то і \nновий край стали\
    \ називати Слобожанщиною. 177 \nПересе"
