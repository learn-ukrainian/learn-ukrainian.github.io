  text: "Схожу історію \nзаснування мали Салтів, Мерефа, Охтирка, Балаклія, Ізюм \n\
    та багато інших міст. Разом із містами виникали й нові села. Засновані на нових\
    \ землях поселення звільнялися від \nподатків і тому називалися слободами (звідси\
    \ й назва Сло-\nбідська Україна). Права українських поселенців закріплю-\nвалися\
    \ царськими жалуваними грамотами. Свідченням \n­визнання влади царя була присяга,\
    \ яку складали ­поселенці. Одночасно Слобожанщину заселяли московські служилі\
    \ \nлюди, якими управляли царські воєвод"
