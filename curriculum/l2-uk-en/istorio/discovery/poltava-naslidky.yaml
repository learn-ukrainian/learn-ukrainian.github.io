  text: "138  Розділ IV. Козацька Україна наприкінці 50‑х рр. XVII — на початку XVIII ст.\
    \ 4. Полтавська битва та її наслідки. Навесні 1709  р. основні шведські сили й козаки\
    \ І. Мазепи підійшли до Пол-\nтави. Залога міста, що складалася з  козаків і \
    \ московських \nвоїнів, відмовилася здатися. Облога міста тривала три мі-\nсяці.\
    \ Тим часом до Полтави підійшли основні московські \nсили. Тут 27  червня 1709 \
    \ р. відбулася ключова битва Пів-\nнічної війни. Шведський король, який мав удвічі\
    \ менше сил, на-\nважився дат"
  section_title: Сторінка 138
