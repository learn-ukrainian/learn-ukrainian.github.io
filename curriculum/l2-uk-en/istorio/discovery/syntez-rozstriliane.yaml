    латинського слова, зв'язаного з поняттям обряду ("культ"). Існує і друге слово,
    що у деяких народів заміняє слово "культура" — це слово "цивілізація", зв'язане
    з латинський словом "цівітас" — місто. Ці два слова, властиво, окреслюють те саме.
    Під прийнятим у нас словом "культура" розуміємо все те, що створене людиною. Підкреслюємо
    створене, а не зроблене механічно, бо справжні культурні факти, є наслідком творчого'акту.
