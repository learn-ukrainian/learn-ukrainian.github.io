  chunk_id: 10-klas-istorija-ukrajiny-gisem-2018_s0271
  text: "Суд встановив, що Голодомор-геноцид здійснювався через такі ре-\nпресивні\
    \ механізми та способи: \n\x17\n\x17 встановлення для України завищеного плану\
    \ хлібозаготівель, який \nнеможливо було виконати; \n\x17\n\x17 занесення за рішенням\
    \ ЦК КП(б)У обкомів та райкомів партії ці-\nлих районів, населених пунктів, колгоспів,\
    \ сільських рад на так звані \n«чорні дошки», що означало блокування їх спецзагонами\
    \ та військами, \nнедопущення виїзду населення за межі цих територій, вилучення\
    \ всіх \nпродуктів харчування, заборону тор"
  section_title: Сторінка 142
  grade: 10
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.3333333432674408
  chunk_id: 10-klas-istorija-ukrajiny-gisem-2018_s0265
  text: "Комнезами й  від-\nряджені на хлібозаготівлі робітники \nз міст, яких запевняли,\
    \ що їхні сім’ї \nголодують через «куркульський сабо-\nтаж» хлібозаготівель, забирали\
    \ в  лю-\nдей запаси будь-яких продуктів і  все \nпродовольство, яким селяни мали\
    \ хар-\nчуватися до нового врожаю. Конфіска-\nція продовольства оголошувалася\
    \ по-\nкаранням за «куркульський саботаж». «Чорна дошка» в експозиції Лебединського\
    \ \nісторико-краєзнавчого музею\n«Чорна дошка» — статус села або району на \n\
    території УСРР, який передбачав за"
