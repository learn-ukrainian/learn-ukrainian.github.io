  text: "Таким чином, ідея з’єднання уніатів та православних у\r\nжиття втілена не\
    \ була. Щоправда, треба зазначити, що православні посильно\r\nзаймалися агітацією\
    \ між уніатським духовенством і мали тут певні успіхи.\r\nВиникла навіть потреба\
    \ у спеціальній формулі відречення священика від унії\r\nпісля повернення до православ’я,\
    \ а також формула єпископської грамоти\r\nсвященикам та дияконам, що навертаються\
    \ з унії. Їх склав відомий Сильвестр\r\nКосов, єпископ і майбутній київський митрополит,\
    \ що замістив П. Могилу.\r\n"
