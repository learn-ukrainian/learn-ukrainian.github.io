  text: "Мовою джерела. Витяг із Будапешт-\nського меморандуму від 5 грудня \n1994\
    \ року: \n«Поважати незалежність і суверенітет та \nіснуючі кордони України (стаття\
    \ 1); утримуватися \nвід загрози силою чи її використання проти \nтериторіальної\
    \ \nцілісності \nчи \nполітичної \nнеза-\nлежності України, і що ніяка їхня зброя\
    \ ніколи не \nбуде використовуватися проти України, крім цілей \nсамооборони або\
    \ будь-яким іншим чином згідно зі \nСтатутом \nООН \n(стаття 2); \nутримуватися\
    \ \nвід \nекономічного тиску, спрямованого на те,"
