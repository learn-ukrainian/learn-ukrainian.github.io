  text: "Якщо йдеться про верхню межу, то точно датовані події\r\nрозглядаються у\
    \ випадку, коли вони відбулися не пізніше 1647 р. Однак багато\r\nкультурних процесів\
    \ були тривалими, часто вони датуються цілими десятиріччями і\r\nстоліттями. До\
    \ того ж врахування пізніших явищ було необхідне і для висвітлення\r\nшляхом ретроспективного\
    \ аналізу процесів, які розгорталися впродовж попередніх\r\nісторичних періодів.\n\
    \nРізні сторони культурного життя і різні періоди\r\nвисвітлюються нерівномірно.\
    \ Джерельна база деяких з ни"
