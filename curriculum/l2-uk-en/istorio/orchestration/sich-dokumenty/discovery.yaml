- score: 0.5290766358375549
  chunk_id: c44f1207_c0957
  text: "Полїтична орґанїзація землї — її ідеальна схема. \r\nЗемська самоуправа,\
    \ віче на Українї. Функції віча: вибір і усуваннє князя в \r\nКиїві, ряд; неправильність\
    \ сеї вічевої функції й причини того; факти з иньших \r\nземель; відносини князїв\
    \ до сеї функції віча. Участь віча в иньших полїтичних \r\nсправах — на запитаннє\
    \ князя і з власної інїціативи. Город і пригороди. \r\nСтановище князїв супроти\
    \ віча. Склад віча, форми скликання і нарад віча, місця \r\nнарад і ставленнє\
    \ рішень."
