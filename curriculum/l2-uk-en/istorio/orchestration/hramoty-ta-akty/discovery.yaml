  text: "273\nТЕМА 19. ВИДИ ДІЛОВИХ ЛИСТІВ. \nЛИСТ-ЗАПРОШЕННЯ, ЛИСТ-ПОВІДОМЛЕННЯ \n\
    Одним із засобів обміну інформацією є лист. Листи можуть бути \nособистими або\
    \ діловими (службовими, офіційними). Особисті листи \nпишемо друзям / подругам,\
    \ рідним, знайомим. За допомогою ділових \nлистів обмінюються інформацією, наприклад,\
    \ установи й організації, \nа також ми можемо звертатися до якоїсь установи чи\
    \ навпаки.  \nПід час ділового листування потрібно дотримуватися вимог офі-\n\
    ційно-ділового стилю мовлення. Тобто викла"
