  text: "Якими \nбули особливості Першого зимового походу? 1 \nПередумови війни союзницьких\
    \ українсько-польських військ проти \nбільшовиків у  1920  р. Варшавська угода.\
    \ У  польському керівництві \nв  цей час переважала ідея експансії на Схід. При\
    \ цьому представники \nпоміркованого табору виступали за виведення зі сфери російського\
    \ впли-\nву Литви, Білорусі та України й  створення з  ними федерації. Прибіч-\n\
    ники більш рішучих дій прагнули включити території литовського,"
  section_title: Сторінка 91
  grade: 10
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.3333333432674408
  chunk_id: 10-klas-istorija-ukrajiny-gisem-2018_s0174
  text: "93\n§ 16. Україна навесні 1920  — у  1921  р. Згідно з  військовою конвенцією,\
    \ бойові дії обох сторін могли вес-\nтися тільки під польським командуванням.\
    \ Економічне життя України \nпереходило під контроль Польщі. Валюта мала бути\
    \ спільною. Польсько-\nму управлінню підпорядковувалися залізниці. Україна зобов’язувалася\
    \ \nзабеспечувати польське військо продуктами, а  також кіньми, волами, \nпідводами\
    \ тощо. Поляки зобов’язалися брати участь у  цих операціях \nлише до Дніпра, у \
    \ межах Правобережної України"
  section_title: Сторінка 93
  grade: 10
  author: gisem
  page: ''
  trust_tier: 2
- score: 0.25
  chunk_id: 10-klas-istorija-ukrajiny-gisem-2018_s0186
  text: "99\n§ 17. Розвиток культури в роки Першої світової війни та на початку Української\
    \ революції \n\x17\n\x17 Результати війни союзницьких українсько-польських військ\
    \ \nіз  більшовицькими силами в  1920  р. були закріплені Ризькою угодою. \x17\
    \n\x17 Після розгрому Збройних сил Півдня Росії та махновців більшо-\nвики перемогли\
    \ своїх противників на території України. \x17\n\x17 Другий зимовий похід став\
    \ подією, якою завершилася Українська \nреволюція 1917—1921  рр. \x17\n\x17 За\
    \ своїм історичним значенням Українська революція 1917—19"
  section_title: Сторінка 99
  grade: 10
  author: gisem
  page: ''
