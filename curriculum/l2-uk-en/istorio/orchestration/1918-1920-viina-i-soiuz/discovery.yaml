  text: "Бої за Львів. На час від\r\n22. XI. до кінця XII. 1918 р. припадає низка\
    \ місцевих операцій з обох сторін:\r\nпід Львовом та активніших на півн. відтинку\
    \ укр.-поль. фронту (Рава Руська,\r\nЛюбачів, Чесанів, Ярослав), як і на півдні\
    \ (Хирів, Перемишль). Ініціятива в цих\r\nдіях, ведених здебільша за здобуття\
    \ опанованих поляками міст та прикордонних\r\nсмуг, була в укр. руках, але укр.\
    \ операціям не вистачало систематичности й\r\nнаполегливости; їх здебільша вели\
    \ окремі групи без тісного оперативного пов’язання."
