- score: 0.20000000298023224
  chunk_id: 10-klas-istorija-ukrajiny-gisem-2018_s0133
  text: "У боях за Львів \nпольська сторона втратила загиблими 277 осіб, українська\
    \ — 250. Після \nвзяття Львова польськими військами \nв місті відбувся триденний\
    \ погром єв-\nрейського населення. Стався він за мов-\nчазної згоди польського\
    \ командування \nі був своєрідною помстою єврейському \nнаселенню за його невтручання\
    \ до поль-\nсько-українського протистояння в місті. Уряд ЗУНР отримав назву Тимчасовий\
    \ Державний Секретаріат, а  пізніше  — Рада\nДержавних Секретарів ЗУНР. Його першим\
    \ головою був К. Левицький. 9"
  section_title: Сторінка 72
  grade: 10
  author: gisem
