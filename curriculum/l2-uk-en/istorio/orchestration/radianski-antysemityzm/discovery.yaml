    \ загиблих заупокійною молитвою та покладанням вінків у \nрічницю \nїхньої \n\
    загибелі. Най-\nвідомішим з таких місць став \nБабин Яр у Києві. 29 вересня там\
    \ \nбагато років поспіль збиралися \nродичі й близькі розстріляних. З \nпочатком\
