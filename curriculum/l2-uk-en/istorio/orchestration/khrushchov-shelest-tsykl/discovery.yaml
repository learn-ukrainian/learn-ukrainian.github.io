  text: "Очевидно, це \nпояснюється тривалим проживанням Микити Хрущова в Україні\
    \ та його \nмайже 11-річним керуванням КП(б)У. Та й своєму підвищенні він \nвеликою\
    \ мірою завдячував підтримці українських партійних діячів. Політична підтримка\
    \ з боку українського керівництва не раз допомагала \nМикиті Хрущову в критичні\
    \ моменти, особливо в період боротьби за \nвладу 1954 року, а також у 1957 році,\
    \ коли частина партійного \nкерівництва намагалась усунути його від влади. Прихід\
    \ до влади Микити Хрущова ознаменувався"
