  text: "233 \nУ зовнішній політиці пріоритетним напрямком стала орієнтація \nна Російську\
    \ Федерацію. Її керівництво схиляло Віктора Януковича \nвступити в Митний союз,\
    \ що означало приєднання України до євра-\nзійського політико-економічного простору\
    \ і кінець двадцятирічним \nпотугам увійти в ЄС. Додатковим чинником тиску на\
    \ українське \nкерівництво з боку РФ була проблема російського Чорноморського\
    \ \nфлоту. Саме через свої збройні сили вона намагалася зберегти \nдомінуюче становище\
    \ на півострові. Україні не вда"
