  text: "Після розподілу кораблів Чорноморського флоту СрСр \nу 1992 р. корабель СКр­112 увійшов\
    \ до складу ВМС україни \nяк U­132\nЗВеРніть уВаГу\nЧорноморський флот російської\
    \ \nФедерації перетворився на головний \nдестабілізуючий чинник ситуації \nв Севастополі\
    \ й Криму та українсько­\nросійських відносин загалом."
