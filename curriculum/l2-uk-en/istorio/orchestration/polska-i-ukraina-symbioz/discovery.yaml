  text: "Загалом час від Люблінської унії до середини XVII ст.\r\nхарактеризується\
    \ пожвавленням господарської і політичної активності старих еліт\r\nі появою на\
    \ арені нової суспільної сили — козацтва. Стосовно політичного\r\nстатусу українських\
    \ земель, Люблінська унія була переломною подією, натомість,\r\nякщо йдеться про\
    \ культурне відродження, то істотні його вияви спостерігаються\r\nще до Люблінської\
    \ унії, а найінтенсивніший культурний рух починається не одразу\r\nпісля унії,\
    \ а наприкінці 70-х — 80-х рр. XVI ст.\n\n"
