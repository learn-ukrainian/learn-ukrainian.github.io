  text: '3. Прочитайте матеріал про козацькі літописи й законспектуйте

    його. КОЗАЦЬКІ ЛІТОПИСИ

    Літописання було характерне для літератури періоду Київ-

    ської Русі. Цей вид творчості розвивався й пізніше, зокрема в добу

    Хмельниччини — героїчного часу в житті українського народу. Ко-

    зацькі літописи — це твори, у яких подано характеристики видат-

    них діячів, описи важливих подій у хронологічній послідовності,

    тлумачення окремих періодів політичного життя. Вони належать

    до історично-мемуарної прози — творів'
  section_title: Сторінка 59
  grade: 9
