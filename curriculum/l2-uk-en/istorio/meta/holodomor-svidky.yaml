content_outline:
- section: Вступ — Голоси тих, хто пережив
  words: 600
  points:
  - Усна історія як інструмент протидії радянському 'архівоциду' та фальсифікаціям
  - 'Феномен ''змови мовчання'': страх репресій за розповіді про голод (до кінця 1980-х)'
  - Роль Комісії Конгресу США (Джеймс Мейс) у фіксації злочину через свідчення
  - 'Повернення пам''яті: масові записи свідчень в незалежній Україні (1990-2000-ні)'
- section: 'Теми свідчень: Механіка вбивства'
  words: 800
  points:
  - 'Технологія обшуків: використання металевих щупів для пошуку схованок'
  - 'Тотальна конфіскація: вилучення квасолі, картоплі, сушні та вареної їжі (дослідження
    Т. Боряк)'
  - 'Психологічний портрет ''активістів'': місцеві колаборанти, вчителі, комсомольці'
  - Руйнування житла та викидання людей на мороз як елемент терору
- section: 'Теми свідчень: Анатомія голоду та виживання'
  words: 900
  points:
  - 'Меню відчаю: сурогати (лобода, кора, макуха, перетерті жолуді, клей)'
  - 'Полювання на виживання: ховрашки, їжаки, ворони, молюски з річок'
  - 'Торгсіни: цинічний обмін родинних реліквій на мінімальну кількість борошна'
  - 'Фізіологія вмирання: набряки (''пухлі''), дистрофія, божевілля від голоду'
  - 'Трагедія канібалізму: втрата людської подоби як наслідок нестерпних мук'
- section: 'Фрагменти свідчень: Голоси жертв'
  words: 1000
  points:
  - 'Історія 1: Мати, яка жертвує собою заради дітей (стратегії розподілу мізерної
    їжі)'
  - 'Історія 2: Спроби втечі до міста або в Росію (загороджувальні загони, паспортизація)'
  - 'Історія 3: Свідчення про ''чорні дошки'' — повна ізоляція та вимирання сіл'
  - 'Мовні особливості свідчень: емоційні паузи, евфемізми, діалектна лексика болю'
- section: Дитячі спогади та трансгенераційна травма
  words: 900
  points:
  - 'Дитина як свідок: специфіка дитячого сприйняття (сенсорна пам''ять, страх втрати
    батьків)'
  - 'Сирітство: доля дітей, чиї батьки померли або були репресовані (патронати)'
  - 'Трансгенераційна травма: як страх голоду передався дітям і онукам (харчова поведінка)'
  - 'Постпам''ять (М. Хірш): переживання травми предків як власної'
- section: Методологічні питання усної історії
  words: 400
  points:
  - 'Проблема верифікації: співставлення спогадів з архівними даними'
  - 'Суб''єктивність та емоційна правда: свідчення як джерело про *переживання* події'
  - 'Етика інтерв''юера: як записувати свідчення, не травмуючи респондента повторно'
- section: 'Підсумок: Від мовчання до визнання'
  words: 400
  points:
  - Свідчення як доказова база у судовій справі про Геноцид (2009 рік)
  - Відновлення національної пам'яті як запобіжник повторення тоталітаризму
  - 'Моральний обов''язок нащадків: слухати, записувати, пам''ятати (''Never Again'')'
