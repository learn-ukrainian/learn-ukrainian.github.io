slug: syntez-serednovichni-dzherela
title: 'Синтез: Методи роботи з літописами'
word_target: 5000
content_outline:
- section: 'Вступ: Еволюція історичної пам''яті'
  words: 600
  points:
  - 'Від Нестора до Самовидця: тяглість української історичної традиції.'
  - 'Огляд вивченого: ПМЛ (ідеологія), ГВЛ (біографія), Патерик (духовність), Грамоти
    (право).'
  - 'Мета синтезу: чому одного джерела ніколи не достатньо для істини.'
  - Різниця між 'джерелом' (source) та 'історичною працею' (history).
- section: Типологія та порівняння джерел
  words: 800
  points:
  - 'Наративні джерела (літописи): суб''єктивність, емоційність, політичне замовлення.'
  - 'Документальні джерела (грамоти, метрики): юридична точність, сухість, фрагментарність.'
  - 'Агіографія та література (''Слово''): ідеалізація, метафоричність, складність
    датування.'
  - 'Таблиця верифікації: як один тип джерел перевіряє інший (перехресний допит).'
- section: 'Методологічний інструментарій: Критика джерел'
  words: 700
  points:
  - 'Зовнішня критика (Heuristics): палеографія, філіграні, встановлення авторства
    та часу.'
  - 'Внутрішня критика (Hermeneutics): виявлення ''тенденції'' (bias) автора.'
  - Питання 'Cui bono?' (кому вигідно) як головний інструмент історика.
  - 'Поняття автентичності та достовірності: чи може автентичне джерело бути недостовірним?'
- section: 'Методологічний інструментарій: Текстологія та контекст'
  words: 700
  points:
  - 'Текстологія Шахматова: пошук протографа, списки та редакції.'
  - 'Метод ''спільних помилок'': як довести, що два літописи списані з одного джерела.'
  - 'Компаративний метод: синхронізація з іноземними джерелами (польськими, візантійськими).'
  - 'Контекстуалізація: читання ''між рядків'' з урахуванням світогляду епохи.'
- section: Типові проблеми середньовічних джерел
  words: 600
  points:
  - 'Топіка мовчання: чому літописці ігнорують поразки своїх князів?'
  - 'Проблема пізніх списків: ПМЛ дійшла до нас у копіях XIV-XV ст. (через 300 років).'
  - 'Унікальні свідчення (hapax legomena): коли джерело лише одне (кейс ''Слова о
    полку Ігоревім'').'
  - 'Хронологічна плутанина: відсутність дат у ранньому ГВЛ та помилки пізніх редакторів.'
- section: 'Практикум: Облога Києва 1240 року'
  words: 1000
  points:
  - 'Подія-маркер: кінець однієї епохи і початок іншої.'
  - 'Версія Галицько-Волинського літопису: героїзація, деталі (воєвода Дмитро, Десятинна
    церква).'
  - 'Версія Суздальського/Лаврентіївського літопису: лаконічність, відстороненість,
    фокус на факту падіння.'
  - 'Археологічна верифікація: розкопки братських могил на дитинці як підтвердження
    жорстокості штурму.'
  - 'Синтез: реконструкція реального ходу подій на основі суперечливих даних.'
- section: 'Від Русі до козацтва: зміна парадигми'
  words: 600
  points:
  - 'Кінець епохи пергаменту: перехід до паперу та канцелярії (XVI ст.).'
  - 'Зміна мови: від церковнослов''янської до ''руської'' (староукраїнської) та польської/латини.'
  - 'Нові жанри: щоденники (діаріуші), мемуари, полемічна література.'
  - 'Підсумок курсу: як інструментарій медієвіста готує до роботи з джерелами ранньомодерної
    доби.'
