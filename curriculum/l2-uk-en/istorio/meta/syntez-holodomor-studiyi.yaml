slug: syntez-holodomor-studiyi
title: 'Синтез: Голодомор як об''єкт дослідження'
word_target: 5000
content_outline:
- section: 'Вступ: Від емоцій до аналізу'
  words: 400
  points:
  - 'Голодомор як комплексний об''єкт дослідження: перехід від опису страждань до
    аналізу механізмів.'
  - Огляд шляху, пройденого у попередніх модулях (від колективізації до наслідків).
  - 'Мета синтезу: об''єднати історичні факти, юридичні визначення та пам''ять у цілісну
    картину.'
- section: 'Історіографія: Еволюція правди'
  words: 800
  points:
  - 'Етап замовчування та брехні: радянська блокада інформації та роль Волтера Дюранті.'
  - 'Прорив у діаспорі: робота Джеймса Мейса та Роберта Конквеста («Жнива скорботи»).'
  - 'Рафаель Лемкін та його промова 1953 року: фундаментальне визначення українського
    геноциду.'
  - 'Період незалежності: відкриття архівів, закон 2006 року та формування національної
    школи досліджень (С. Кульчицький, В. Василенко).'
- section: 'Джерела та Механізми: Анатомія злочину'
  words: 800
  points:
  - 'Типологія джерел: партійні документи (намір), звіти ГПУ (реакція), его-документи
    (свідчення).'
  - 'Усна історія як джерело: проєкти зі збору свідчень (Uoral History) та їх верифікація.'
  - 'Інтеграція механізмів: як «чорні дошки», натуральні штрафи та паспортна система
    працювали як єдиний інструмент вбивства.'
  - 'Доказова база наміру: лист Сталіна Кагановичу (1932) про загрозу втрати України.'
- section: 'Ключові дебати: Геноцид і Демографія'
  words: 900
  points:
  - 'Природа злочину: дискусія «класицид» (проти селян) vs «геноцид» (проти нації).
    Аргументи Лемкіна про 4 вістря атаки.'
  - 'Битва цифр: науковий підхід (3.9 млн надсмертності + 0.6 млн дефіцит народжень)
    проти політичних оцінок (7-10 млн).'
  - 'Чому точність важлива: небезпека девальвації трагедії через перебільшення та
    важливість поіменних списків (Національна книга пам''яті).'
  - 'Географічний вимір дискусії: чому Схід і Південь постраждали найбільше (карта
    повстань).'
- section: 'Стан поля дослідження: Digital Humanities'
  words: 600
  points:
  - 'Нові методи: проєкт «МАПА» Гарвардського інституту (HURI) — GIS-аналіз голоду.'
  - 'Візуалізація терору: кореляція між зонами найактивнішого опору (1930–1932) та
    найвищої смертності.'
  - 'Лакуни в дослідженнях: історія виконавців, мікроісторія окремих сіл, гендерний
    вимір виживання.'
  - 'Молоде покоління дослідників: перехід від віктимності до вивчення стратегій опору
    та виживання.'
- section: 'Голодомор і Сучасність: Пам''ять як зброя'
  words: 800
  points:
  - 'Трансформація пам''яті: від «запали свічку» (скорбота) до «пам''ятаємо — перемагаємо»
    (стійкість).'
  - 'Паралелі з 2022 роком: термін «геноцид» у контексті російського вторгнення, викрадення
    зерна, риторика денацифікації.'
  - 'Політичний вимір: визнання Голодомору парламентами світу як акт солідарності
    з Україною.'
  - 'Постгеноцидний синдром: дискусія про вплив травми на сучасну політичну культуру
    та довіру в суспільстві.'
- section: Методологічні та Етичні уроки
  words: 400
  points:
  - 'Етика дослідника: як працювати з травмою, не ретравматизуючи суспільство.'
  - 'Відповідальність свідка: кейс Гарета Джонса як приклад журналістської чесності.'
  - 'Значення суб''єктності: повернення імен жертвам замість оперування лише статистикою.'
- section: 'Підсумок: Від знання до ідентичності'
  words: 300
  points:
  - 'Голодомор як точка неповернення в українській ідентичності: остаточний розрив
    з радянським спадком.'
  - 'Синтез: розуміння минулого як інструмент побудови безпечного майбутнього.'
  - 'Завдання покоління: збереження пам''яті та недопущення повторення («Ніколи знову»).'
