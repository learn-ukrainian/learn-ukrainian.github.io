slug: kozatski-litopysy-ohliad
title: 'Козацькі літописи: Огляд традиції'
word_target: 5000
content_outline:
- section: 'Вступ: Козацька історіографія як феномен українського бароко'
  words: 300
  points:
  - 'Визначення козацьких літописів: перехід від середньовічної хроніки до ранньомодерної
    історії.'
  - 'Зміна автора: від ченця в келії до військового канцеляриста з шаблею.'
  - 'Три головні пам''ятки («Велика трійка»): Самовидець, Граб''янка, Величко.'
  - 'Мета модуля: зрозуміти, як козацька еліта конструювала власну історію та ідентичність.'
- section: 'Історичний контекст: Гетьманщина та «Народ Козацький»'
  words: 400
  points:
  - 'Гетьманщина як держава: потреба в легітимації нової влади та соціальної ієрархії.'
  - 'Козацька старшина як нова шляхта: пошук «шляхетного» родоводу та історичних коренів.'
  - 'Освічена еліта: випускники Києво-Могилянської академії в генеральних канцеляріях.'
  - Концепція «Малоросії» у XVIII ст. як політичного терміну для позначення автономної
    «Patria».
- section: 'Історичний контекст: Криза автономії як рушій пам''яті'
  words: 400
  points:
  - 'Написання літописів на межі XVII–XVIII ст.: реакція на Руїну та обмеження автономії
    Петром I.'
  - Страх втрати ідентичності та історичного забуття.
  - Апологетика (виправдання) прав і вольностей Війська Запорозького перед лицем імперського
    наступу.
  - Формування історичного міфу як захисного механізму нації.
- section: 'Літопис Самовидця: Початок традиції та погляд очевидця'
  words: 500
  points:
  - 'Ймовірний автор: Роман Ракушка-Романовський, генеральний підскарбій.'
  - 'Хронологія та охоплення: від Хмельниччини до початку XVIII ст. (акцент на Руїні).'
  - 'Стилістика: лаконізм, фактографічність, мова наближена до народної та ділової.'
  - 'Особливості: детальний опис соціальних конфліктів, критика «черні» та міжусобиць.'
- section: 'Літопис Григорія Граб''янки: Гадяцький трактат і патріотичний міф'
  words: 500
  points:
  - 'Походження: Гадяцька полкова канцелярія, 1710 рік.'
  - 'Назва: «Дѣйствія преѕѣльной и отъ начала поляковъ крвавшои небывалой брани...».'
  - 'Стиль: високе бароко, складна риторика, віршовані панегірики.'
  - 'Ідеологія: героїзація Богдана Хмельницького, обґрунтування прав козацтва через
    «хозарський міф».'
  - 'Популярність: «бестселер» свого часу, що зберігся у численних списках.'
- section: 'Літопис Самійла Величка: Монументальність та документалістика'
  words: 600
  points:
  - 'Автор: Самійло Величко, канцелярист Генеральної Військової Канцелярії.'
  - 'Структура: 4 томи, монументальна праця життя.'
  - 'Новаторство: використання документів (універсалів, листів, договорів) як доказової
    бази.'
  - 'Концепція історії: історія як наука і мистецтво; критичне ставлення до іноземних
    джерел.'
  - 'Бароковий песимізм: роздуми про тлінність слави та занепад Гетьманщини.'
- section: 'Три літописи — порівняння: Від стилю до політичної позиції'
  words: 300
  points:
  - 'Порівняльна таблиця: Автор — Період — Стиль — Головна ідея.'
  - 'Еволюція жанру: від мемуарів (Самовидець) до історичної повісті (Граб''янка)
    та наукового трактату (Величко).'
  - Різні політичні орієнтації авторів та їх відображення в текстах.
- section: 'Спільні риси: Ідеологія козацького патріотизму та легітимація'
  words: 500
  points:
  - '«Козацький патріотизм»: любов до Вітчизни (Малоросійської України) як вища чеснота.'
  - 'Легітимація Гетьманщини: доведення рівності козацької старшини з польською шляхтою
    та російським дворянством.'
  - 'Критика Переяславської угоди (часто прихована): акцент на порушенні царем «статей»
    та прав.'
  - Антипольська та (місцями) антимосковська риторика в контексті захисту прав.
- section: 'Спільні риси: Образ Хмельницького та концепція «народу козацького»'
  words: 400
  points:
  - Богдан Хмельницький як центральна фігура («український Мойсей»).
  - 'Сакралізація Визвольної війни: війна за віру та вольності.'
  - 'Концепція «народу козацького»: виключення селянства («черні») з політичного тіла
    нації.'
  - 'Провіденціалізм: пояснення історичних подій (перемог і поразок) Божою волею.'
- section: 'Відмінності: Стилістика, джерела та ставлення до Москви'
  words: 500
  points:
  - 'Мова: від живої народної (Самовидець) до книжної слов''яноруської (Величко).'
  - 'Робота з джерелами: власна пам''ять vs. західні хроніки (Пуфендорф) vs. архівні
    документи.'
  - 'Ставлення до Москви: від стриманого нейтралітету до прихованої критики імперської
    політики (особливо у Величка).'
  - 'Різна оцінка Руїни: хто винен — народ, старшина чи сусіди?'
- section: 'Як читати козацькі літописи: Критичний підхід та упередження'
  words: 400
  points:
  - 'Розпізнавання упереджень: class bias (старшинський погляд) та political bias.'
  - 'Барокова риторика: вміння відрізняти гіперболу та метафору від факту.'
  - Проблема пізніших вставок та редагувань (цензура XVIII–XIX ст.).
  - 'Значення контексту: для кого і з якою метою писався текст (апологетика).'
- section: 'Підсумок: Значення традиції для формування модерної нації'
  words: 300
  points:
  - Козацькі літописи як фундамент для «Історії Русів» та модерної української історіографії.
  - Вплив на літературу XIX ст. (Шевченко, Куліш, Костомаров).
  - Збереження ідеї державності в умовах бездержавності.
  - 'Актуальність вивчення: розуміння генези української політичної культури.'
