slug: mekhanizm-kooptatsii
title: 'Механізм кооптації: Теоретична рамка'
word_target: 5000
content_outline:
- section: Вступ — Цикл, що повторюється
  words: 500
  points:
  - 'Що таке кооптація: залучення місцевих лідерів до панівної групи як інструмент
    безкровного імперського поглинання (за ЕСУ).'
  - 'Чому виникає цикл: історична повторюваність успішного застосування методу підкупу
    від XVIII століття до нашого часу.'
  - 'Російська специфіка: перетворення потенційних провідників нації на лояльних слуг
    режиму та їхня цілеспрямована денаціоналізація.'
  - 'Структура модуля: аналіз алгоритмів кооптації на прикладі трансформації української
    козацької еліти.'
- section: 'Теоретична модель: I — Підкуп і Залежність'
  words: 600
  points:
  - 'Підкуп (Bribe) як пропозиція привілеїв: гарантії збереження свобод та маєтностей,
    подібні до Березневих статей 1654 року.'
  - Залежність (Bind) як поступове обмеження суб'єктності через кар'єрні та економічні
    вигоди.
  - Запровадження Табеля про ранги (1722) як системний механізм втягування старшини
    в російську імперську ієрархію.
- section: 'Теоретична модель: II — Зрада і Знищення'
  words: 600
  points:
  - 'Зрада (Betray): одностороннє порушення домовленостей імперією, яскравим прикладом
    якого є скасування гетьманства у 1764 році.'
  - 'Знищення (Burn): фізична та юридична ліквідація автономії, остаточне закріпачення
    селян (1783).'
  - Модель BBBB (Bribe, Bind, Betray, Burn) як універсальний алгоритм інструменталізації
    та контролю над елітами.
- section: Порівняння з іншими імперіями
  words: 700
  points:
  - 'Британська модель непрямого управління (Indirect Rule): збереження місцевих ієрархій
    і делегування адміністративних функцій.'
  - 'Французька модель: прагнення до повної асиміляції та розчинення місцевих еліт
    у метрополітальній культурі.'
  - 'Російська модель: кооптація поєднана зі знищенням місцевої еліти та вимогою жорсткої
    уніфікації («обрусіння»).'
  - 'Причини різних підходів: нетерпимість Російської імперії до будь-якої форми лояльної
    автономії та необхідність гомогенізації простору.'
- section: Механізми кооптації
  words: 800
  points:
  - 'Спокуса еліт титулами, землями та грошима: автоматичне отримання статусу дворян
    через Табель про ранги.'
  - Використання обіцянок автономії та розширення прав для поступової нейтралізації
    спротиву.
  - Формування глибокої економічної залежності та біополітичний контроль (Таємний
    указ 1734 р. про шлюби з великоросами).
  - 'Точка неповернення: Жалувана грамота 1785 р., яка обміняла політичну суб''єктність
    старшини на монопольні привілеї.'
- section: Механізми знищення
  words: 700
  points:
  - 'Юридичне скасування автономних інституцій: ліквідація полково-сотенного устрою
    Лівобережжя (1781) та запровадження намісництв.'
  - 'Фізичні репресії: переслідування та ліквідація тих представників еліти, які чинили
    опір імперській інтеграції (доля мазепинців).'
  - 'Символічне перейменування простору: зміна історичних топонімів та стирання маркерів
    козацької державності.'
  - 'Історичне забуття: конструювання імперського міфу про «одвічну єдність», щоб
    приховати факт цілеспрямованої денаціоналізації.'
- section: Чому цикл повторюється
  words: 600
  points:
  - 'Ілюзія «цього разу інакше»: віра еліт у можливість зберегти статус-кво через
    черговий компроміс з імперією.'
  - 'Відсутність геополітичних альтернатив: пошук протекції від інших загроз ціною
    часткової втрати власного суверенітету.'
  - 'Коротка історична пам''ять: швидке забуття попередніх етапів порушення угод та
    актів зради імперією.'
  - 'Як розірвати цикл: необхідність формування стійкої національної свідомості та
    відмова від здачі політичної суб''єктності.'
- section: Підсумок
  words: 500
  points:
  - Кооптація як головний, безкровний, але руйнівний імперський інструмент денаціоналізації
    підкорених народів.
  - 'Український досвід: перетворення козацької старшини на імперське дворянство як
    наслідок свідомої біополітичної стратегії Росії.'
  - Застосування до конкретних історичних випадків та сучасні паралелі з контролем
    окупованих територій.
