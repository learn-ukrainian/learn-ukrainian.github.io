slug: povist-mynulykh-lit-i
title: 'Повість минулих літ I: Структура та автори'
word_target: 5000
content_outline:
- section: Вступ — Найстаріший літопис Русі
  words: 500
  points:
  - 'Що таке Повість минулих літ (ПМЛ): головне історичне джерело XI-XII ст., що дає
    цілісну картину ранньої історії.'
  - 'Парадокс оригіналу: оригінального тексту ПМЛ не існує, ми працюємо з копіями,
    зробленими через 300-400 років (списками XIV-XV ст.).'
  - 'Огляд редакцій: Лаврентіївська (суздальська традиція) та Іпатіївська (українська/південна
    традиція).'
  - 'Мета модуля: дослідження структури літопису, деконструкція міфу про єдиного автора
    та критичний аналіз тексту як політичного документа.'
- section: 'Структура літопису: I — Вступна та недатована частини'
  words: 600
  points:
  - 'Вступна космогонічна частина: вписання Русі у світову історію від Всесвітнього
    потопу (біблійна генеалогія від синів Ноя, Яфета).'
  - 'Етногеографія розселення: локалізація східнослов''янських племен (поляни, древляни,
    сіверяни) та чітке вирізнення «русі» (полян) від північних племен (словенів, кривичів).'
  - 'Легенда про заснування Києва: епос про Кия, Щека, Хорива та Либідь як ідеологічне
    обґрунтування київського першородства та державності.'
- section: 'Структура літопису: II — Датована частина та жанрова специфіка'
  words: 600
  points:
  - 'Датована частина: початок хронологічного викладу від 6360 (852) року за візантійською
    ерою («звідки пішла Руська земля»).'
  - 'Принцип «погодного запису» («В літо...»): специфіка фіксації подій та наявність
    «порожніх років», коли, на думку літописця, не відбувалося нічого значущого.'
  - 'Жанровий синкретизм: що включено до зведення (міжнародні договори з Візантією,
    житія святих, військові повісті) та що пропущено (фокусування переважно на князівській
    еліті).'
- section: 'Питання авторства: I — Традиція Нестора та гіпотеза Шахматова'
  words: 600
  points:
  - 'Нестор Літописець: традиційна атрибуція (за Печерським патериком) як автора першої
    редакції 1113 року, міфологізація його постаті в популярній історії.'
  - 'Деконструкція авторства: теорія нашарування академіка Олексія Шахматова, яка
    доводить, що ПМЛ — це не твір одного автора, а багатошаровий «літописний звід».'
  - 'Реконструкція ранніх шарів: Найдавніший Київський звід (бл. 1037 р.), Перший
    (1073 р.) та Другий (1093-1095 рр.) Києво-Печерські зводи як фундамент Повісті.'
- section: 'Питання авторства: II — Сильвестр та політичні замовники'
  words: 600
  points:
  - 'Роль ігумена Сильвестра (Видубицький монастир): переписування та редагування
    тексту у 1116 році, його особистий запис про створення книги.'
  - 'Політичні замовники: як зміна князівської влади в Києві впливала на текст (переписування
    кінцівки для звеличення Володимира Мономаха та применшення ролі Святополка Ізяславича).'
  - 'Літопис як ідеологічна зброя: розуміння того, що колективна праця кількох поколінь
    ченців-редакторів відбувалася під прямим контролем князівської влади.'
- section: 'Редакції та рукописи: I — Лаврентіївський список'
  words: 600
  points:
  - 'Лаврентіївський список (1377): найстаріший збережений рукопис, переписаний ченцем
    Лаврентієм для суздальського князя Дмитра.'
  - 'Характеристика тексту: відображає другу редакцію (Сильвестра 1116 року), містить
    суздальські (північні) мовні та політичні адаптації київського тексту.'
  - 'Унікальні вставки: наявність «Повчання Володимира Мономаха», яке збереглося виключно
    в цьому кодексі.'
- section: 'Редакції та рукописи: II — Іпатіївський список'
  words: 600
  points:
  - 'Іпатіївський список (XV ст., бл. 1425): знайдений у Костромі, але має чітке південно-руське
    (українське) походження.'
  - 'Зв''язок із редакціями: містить третю редакцію (1118 року, для Мстислава Володимировича).'
  - 'Структурна цінність: це трилогія, що включає ПМЛ, Київський літопис (XII ст.)
    та Галицько-Волинський літопис (XIII ст.).'
  - 'Збереження українського контексту: Іпатіївський список зберігає «живу» лексику
    та фразеологію півдня краще, ніж Лаврентіївський кодекс.'
- section: Мова літопису
  words: 500
  points:
  - 'Літературна основа: церковнослов''янська мова як офіційний стандарт писемності,
    духовенства та дипломатії середньовіччя.'
  - 'Давньоукраїнський живий субстрат: потужний вплив розмовної мови Русі-України
    на текст (особливо помітний в Іпатіївському списку).'
  - 'Приклади українізмів у ПМЛ: повноголосся (город, молоко), кличний відмінок (княже,
    брате), закінчення давального відмінка -ові/-еві.'
  - 'Специфічна лексика: фіксація слів «рілля», «соромитися», «тужити», «жито», «стріха»,
    «яруга», що доводять українське мовне підґрунтя київських книжників.'
- section: Чому важлива критика джерела
  words: 600
  points:
  - 'Деконструкція міфу про об''єктивність: літопис є політичним документом (PR-кампанією
    київських князів), а не неупередженою хронікою.'
  - 'Проблема ранньої хронології: дати подій IX століття є ретроспективними, вирахованими
    літописцями «заднім числом» за допомогою візантійських таблиць, і часто містять
    похибки.'
  - 'Легенди vs. Історичні факти: вставки фольклору (помста княгині Ольги, смерть
    Олега від коня) подаються як реальні події, що вимагає критичного розділення міфу
    та факту.'
  - 'Деколонізаційний контекст: відкидання імперського російського міфу про ПМЛ як
    початок «общерусской» історії та повернення її до києвоцентричного (українського)
    контексту.'
- section: Підсумок
  words: 300
  points:
  - ПМЛ як фундаментальний текст української ідентичності та державницької традиції,
    що фіксує світогляд середньовічного Києва.
  - 'Важливість критичного читання: розуміння того, хто, коли і з якою метою вносив
    зміни до тексту.'
  - 'Підготовка до наступного етапу (модулю): перехід від аналізу структури літопису
    до безпосереднього читання ключових фрагментів та перекладів.'
