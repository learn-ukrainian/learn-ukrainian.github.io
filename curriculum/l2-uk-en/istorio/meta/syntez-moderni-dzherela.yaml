slug: syntez-moderni-dzherela
title: 'Синтез: Джерела нової доби'
word_target: 5000
content_outline:
- section: Вступ — Від козаків до XX століття
  words: 600
  points:
  - 'Огляд еволюції джерел: від літописів XVII ст. до масової преси XX ст.'
  - 'Кількісний вибух: перехід від одиничних рукописів до мільйонних тиражів'
  - 'Нові типи носіїв: фотографія, кінохроніка, фонограми'
  - 'Мета синтезу: зрозуміти, як змінилася ''оптика'' історії'
- section: 'Типологія джерел XIX-XX ст.: I — Документи влади та опору'
  words: 800
  points:
  - Політичні маніфести та програми партій (РУП, ОУН) як дзеркало ідеологій
  - 'Імперські законодавчі акти: Валуєвський циркуляр та Емський указ як джерела колоніальної
    політики'
  - 'Публіцистика: роль преси у формуванні національної свідомості (Франко, Драгоманов)'
- section: 'Типологія джерел XIX-XX ст.: II — Особисті та архівні свідчення'
  words: 800
  points:
  - 'Усна історія: методологія запису свідчень (від етнографічних експедицій до Project
    Testimony)'
  - 'Архівні документи: специфіка роботи з фондами (метричні книги, діловодство)'
  - 'Его-документи: щоденники (Єфремов), листування, мемуари як психологічний портрет
    епохи'
  - 'Таблиця порівняння: офіційний документ vs особисте свідчення'
- section: Особливості модерних джерел
  words: 800
  points:
  - 'Демократизація історії: масова грамотність дає голос ''маленькій людині'''
  - 'Преса як ''четверта влада'' і історичне джерело: плюси та ризики (заангажованість)'
  - 'Візуальний поворот: фотографія та кіно як доказ і як маніпуляція'
  - 'Проблема надлишку: як історику не потонути в морі інформації'
- section: Джерела репресій
  words: 800
  points:
  - 'Імперські vs радянські репресивні документи: еволюція контролю'
  - 'Герменевтика брехні: як читати радянські протоколи допитів і звіти НКВС'
  - 'Голос жертви: де шукати правду, коли архіви мовчать (самвидав, еміграційна преса)'
  - Етичні питання роботи з документами жертв і катів
- section: Методологічні уроки
  words: 600
  points:
  - 'Критичний аналіз: розрізнення факту, пропаганди та інтерпретації'
  - 'Тріангуляція джерел: перевірка однієї події через різні типи документів'
  - 'Імперський дискурс: навички деконструкції колоніальних наративів у текстах'
  - Усна історія як інструмент заповнення білих плям (Голодомор, Голокост)
- section: 'Практикум: Комплексна реконструкція'
  words: 400
  points:
  - 'Кейс-стаді: реконструкція подій 1933 року через різні оптику'
  - 'Зіставлення: радянська газета ''Правда'' vs щоденник селянина vs звіт консула'
  - Створення матриці довіри до джерел
- section: Підсумок
  words: 200
  points:
  - Готовність до роботи з дисидентськими джерелами (наступні модулі)
