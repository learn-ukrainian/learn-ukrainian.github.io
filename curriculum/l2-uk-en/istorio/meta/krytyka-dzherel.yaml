slug: krytyka-dzherel
title: 'Критика джерел: Принципи та практика'
word_target: 5000
content_outline:
- section: Вступ — Чому джерела брешуть
  words: 600
  points:
  - 'Суб''єктивна природа будь-якого свідчення: ''Кожен бачить зі своєї дзвіниці'''
  - 'Історик як слідчий: перехід від довіри до верифікації'
  - Різниця між фактом (що сталося) та інтерпретацією (як це описано)
  - Необхідність критичного мислення в епоху інформаційних війн
- section: Типи історичних джерел
  words: 700
  points:
  - 'Класифікація джерел: письмові, речові, усні, візуальні, аудіовізуальні'
  - 'Ієрархія джерел: чому митний реєстр може бути правдивішим за мемуари'
  - Специфіка усних джерел в українській традиції (думи як історичні документи)
  - Цифрові джерела та виклики їхньої верифікації (метадані, цифрові сліди)
- section: Зовнішня критика (автентичність)
  words: 800
  points:
  - 'Мета зовнішньої критики: встановлення часу, місця та авторства'
  - 'Детективні методи: палеографія (письмо), сфрагістика (печатки), папір'
  - 'Кейс-стаді: Дискусія навколо автентичності ''Слова о полку Ігоревім'''
  - Аргументи 'за' і 'проти' у справі Мусіна-Пушкіна та втраченого оригіналу
- section: Внутрішня критика (достовірність)
  words: 800
  points:
  - 'Аналіз змісту: пошук упереджень, помилок та свідомих викривлень'
  - 'Тенденційність автора: політичні погляди, релігійна приналежність'
  - 'Кейс-стаді: Козацькі літописи (Самовидець, Граб''янка, Величко) — історія чи
    література?'
  - Бароковий 'сарматизм' та міфотворчість у джерелах XVIII століття
- section: П'ять ключових питань до джерела
  words: 600
  points:
  - ХТО? — Особа автора, його соціальний статус та доступ до інформації
  - 'КОЛИ? — Дистанція у часі: мемуари проти щоденників'
  - 'ДЛЯ КОГО? — Адресат тексту: звіт начальству чи лист дружині'
  - 'ЧОМУ? — Мотивація створення: виправдання, звинувачення, фіксація'
  - ЩО ОПУЩЕНО? — Інтерпретація мовчання та 'білих плям'
- section: Практикум — аналіз джерела
  words: 700
  points:
  - 'Алгоритм роботи з документом: від атрибуції до інтерпретації'
  - 'Розбір конкретного прикладу: Універсал Богдана Хмельницького'
  - Виокремлення формулярних кліше та реального змісту
  - Співставлення з іншими документами епохи (польськими, московськими)
- section: Особливості українських джерел
  words: 800
  points:
  - 'Трагічна дола українських архівів: війни, пожежі, репресії'
  - Цілеспрямоване знищення та вивезення документів до імперських центрів
  - Радянська 'спецсховна' система та засекречування історії
  - Роль діаспори та сучасна цифровізація у поверненні історичної пам'яті
