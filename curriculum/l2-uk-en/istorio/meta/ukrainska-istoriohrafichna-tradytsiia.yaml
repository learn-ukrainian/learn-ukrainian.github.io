version: "1.0"
title: Українська історіографічна традиція
word_target: 5000
content_outline:
- section: Вступ — Чому українська історіографія особлива?
  words: 400
  points:
  - Історія «бездержавної нації» (за концепцією В. Липинського)
  - Феномен написання історії під жорсткою забороною («заборона на пам'ять»)
  - Еміграція як ключовий інструмент збереження академічної традиції
  - Повернення національного наративу після здобуття незалежності 1991 року
- section: 'Михайло Грушевський — батько української історії: I — Архітектор нації'
  words: 600
  points:
  - 'Біографічний шлях: від навчання в Києві у В. Антоновича до очолення кафедри у
    Львові (1894)'
  - 'Революційна ідея: обґрунтування того, що народ є головним суб''єктом історії,
    а Україна — окремим актором'
  - '«Історія України-Руси» (10 томів, перший том вийшов у 1898): фундаментальний
    проєкт і «паспорт нації»'
  - 'Цитата зі вступу до праці, що визначає мету: створення національного наративу'
- section: 'Михайло Грушевський — батько української історії: II — Подолання імперської
    схеми'
  words: 600
  points:
  - Стаття 1904 року «Звичайна схема „русскої“ історії...» як теоретичний розрив з
    імперським баченням
  - Розвінчання міфу про «спільну колиску» та деконструкція концепції «общерусскую
    історію»
  - 'Схема Грушевського: безперервність українського процесу від антів через Київську
    Русь і Галицько-Волинську державу до козацтва'
  - 'Трагічна доля вченого: повернення до СРСР, репресії проти істориків та смерть
    у 1934 році'
- section: Львівська школа до 1939
  words: 500
  points:
  - Діяльність Наукового товариства імені Шевченка (НТШ) як прообразу української
    Академії наук
  - 'Ключові учні Грушевського: Іван Крип''якевич (популяризатор), Степан Томашівський
    (державник), Мирон Кордуба'
  - Галичина під австрійською конституційною свободою як єдиний можливий осередок
    вільної української науки (контраст із підросійським Києвом)
  - Трагічне знищення школи після радянської окупації Західної України в 1939 році
- section: 'Діаспорна історіографія (1945-1991): I — Персоналії та ідеї'
  words: 550
  points:
  - Дмитро Дорошенко та його роль як видатного популяризатора національної історії
    за кордоном
  - 'Наталія Полонська-Василенко: продовження академічної традиції Грушевського'
  - 'Олександр Оглоблин та державницька школа: акцент на ролі еліти (на противагу
    народникам) та дослідження козацької доби (зокрема, Мазепинства як боротьби за
    незалежність)'
- section: 'Діаспорна історіографія (1945-1991): II — Інституційний захист'
  words: 550
  points:
  - Створення та діяльність Української Вільної Академії Наук (УВАН) та НТШ у Нью-Йорку
  - Омелян Пріцак та його колосальна праця із заснування Українського наукового інституту
    Гарвардського університету (HURI) 1968 року
  - Легітимізація українознавства на Заході завдяки фінансовій підтримці (фонд катедр
    українознавства) простих українців діаспори
- section: Західні історики України
  words: 500
  points:
  - Злам 1980-90-х років та поява України на ментальній карті Заходу
  - 'Орест Субтельний та безпрецедентний успіх його бестселера «Ukraine: A History»
    в Україні 1991 року'
  - Пол Роберт Маґочі та його концепція мультикультурності й історії земель
  - 'Тімоті Снайдер («Криваві землі»): Україна в центрі європейської історії; важливість
    зовнішнього, об''єктивного погляду'
- section: 'Нова українська історіографія після 1991: I — Повернення пам''яті'
  words: 450
  points:
  - '1991 рік як початок «архівної революції»: відкриття спецсховищ КДБ та скасування
    цензури'
  - 'Переосмислення радянського періоду: деконструкція міфів про «возз''єднання» 1654
    року та «буржуазних націоналістів»'
  - 'Повернення заборонених імен: публікація праць Грушевського, Винниченка, діячів
    діаспори'
- section: 'Нова українська історіографія після 1991: II — Інституційне становлення'
  words: 450
  points:
  - Створення Інституту національної пам'яті як ключового органу формування державної
    політики
  - 'Дослідження нових, раніше заборонених тем: Голодомор як геноцид, історія ОУН-УПА,
    дисидентський рух'
  - Запровадження усної історії та нових методологій для подолання наслідків «архівоциду»
- section: Підсумок
  words: 400
  points:
  - Феноменальна безперервність української історіографічної традиції від козацьких
    літописів до сучасності попри переслідування
  - Тяглість від схеми Грушевського та інституцій діаспори до академічної науки незалежної
    України
  - Роль історії як зброї у війні за ідентичність та деколонізацію
