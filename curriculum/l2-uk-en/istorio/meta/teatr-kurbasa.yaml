slug: teatr-kurbasa
title: 'Театр Курбаса: Реформа і знищення'
word_target: 5000
content_outline:
- section: Вступ — Революціонер сцени
  words: 600
  points:
  - Лесь Курбас як режисер-новатор, філософ театру, поліглот та європеєць за світоглядом.
  - 'Суть театральної революції: перехід від сентиментально-етнографічної «шароварщини»
    до інтелектуального, філософського театру.'
  - 'Політичний вимір театру в УСРР: боротьба за масову свідомість; прагнення Курбаса
    виховувати вільних людей всупереч більшовицькій меті створення «слухняних гвинтиків».'
  - 'Огляд структури модуля: шлях від ранніх експериментів до фатального зіткнення
    з тоталітаризмом.'
- section: Шлях до "Березоля"
  words: 700
  points:
  - 'Формування світогляду: народження в Галичині (1887), навчання у Відні та Львові,
    всотування європейської філософії.'
  - Заснування «Молодого театру» в Києві (1917–1919) як перша спроба подолати етнографічну
    рутину та утвердити мистецтво ідеї.
  - Осмислення суспільних потрясінь Першої світової війни та революції через сценічну
    дію.
  - 'Створення Мистецького об''єднання «Березіль» у 1922 році: назва від Павла Тичини
    (символ очисної бурі), створення цілого театрального інституту.'
- section: 'Театральна реформа Курбаса: I — Нова система та естетика'
  words: 600
  points:
  - Безкомпромісна боротьба з «малоросійщиною», плаксивістю та примітивним побутовизмом
    старих труп.
  - 'Суть нової системи: концепція «перетворення», де сцена не копіює життя, а створює
    нову реальність через метафори.'
  - 'Використання елементів експресіонізму та конструктивізму: багатоярусні декорації,
    світлотіні, абстрактні конструкції.'
- section: 'Театральна реформа Курбаса: II — Актор майбутнього'
  words: 500
  points:
  - 'Концепція «синтетичного актора»: актор як інтелектуал із тренованим тілом (акробатика,
    ритміка за Далькрозом).'
  - 'Інтеграція в європейський авангард: переклади західної драматургії, робота на
    одному рівні з європейськими реформаторами (Крегом, Мейєргольдом).'
- section: 'Найважливіші постановки: I — Експресіонізм і нова драма'
  words: 600
  points:
  - 'Експресіоністський шедевр «Газ» за Г. Кайзером: масові сцени та ритмізовані рухи
    робітників-механізмів.'
  - 'Інновації у виставі «Джіммі Гіггінз»: перший в історії синтез театру і кінопроекції
    для показу потоку свідомості.'
  - 'Тандем Курбас-Куліш: вистава «Народний Малахій» як глибока критика наслідків
    революції та зіткнення ідеалізму з радянським бюрократизмом.'
- section: 'Найважливіші постановки: II — Сприйняття та критика'
  words: 500
  points:
  - 'Поляризація аудиторії: захоплення інтелігенції новими формами проти нерозуміння
    партійної преси, що вимагала «зрозумілості для пролетаріату».'
  - 'Наростання офіційної критики: звинувачення театру у відриві від мас та відмові
    ставити примітивні агітки.'
- section: Конфлікт із владою
  words: 600
  points:
  - Зростання тиску у 1930-ті роки на тлі згортання українізації та підготовки до
    монополії соціалістичного реалізму.
  - Використання ярлика «формалізм» як політичного вироку для знищення інакодумства.
  - Звільнення Курбаса з посади у 1933 році після розгромної кампанії у пресі та змушеного
    «покаяння» колективу.
  - Арешт у грудні 1933 року у Москві та вибиті тортурами зізнання в участі в Українській
    військовій організації (УВО).
- section: Загибель і пам'ять
  words: 600
  points:
  - Заслання на Соловки, де Курбас організував табірний театр і продовжував ставити
    вистави.
  - Розстріл 3 листопада 1937 року в урочищі Сандармох капітаном НКВС Матвєєвим.
  - Офіційна реабілітація у 1957 році, хоча правду про місце і обставини смерті приховували
    до кінця 1980-х.
  - 'Спадщина режисера: його методи випередили час і стали фундаментом для сучасного
    українського та європейського театру.'
- section: Підсумок
  words: 300
  points:
  - Лесь Курбас як символ трагедії Розстріляного відродження — інтелектуальний злет,
    брутально обірваний кулею.
  - 'Еволюція радянської системи: перетворення авангардного пошуку на кримінальний
    «державний злочин».'
  - 'Підготовка до механізму знищення: ліквідація Курбаса як цілеспрямований культуроцид
    вільної української нації.'
