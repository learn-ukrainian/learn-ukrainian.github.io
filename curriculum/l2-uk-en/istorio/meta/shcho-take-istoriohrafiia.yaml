slug: shcho-take-istorio
title: Що таке історіографія?
word_target: 5000
content_outline:
  - section: 'Вступ: Визначення та природа історіографії'
    words: 450
    points:
      - Історія (події) vs Історіографія (опис подій)
      - Чому минуле 'змінюється', хоча події залишаються тими ж
      - 'Історіографія як наукова дисципліна: предмет і методи'
  - section: 'Кейс-стаді: Переяславська рада як дзеркало інтерпретацій'
    words: 650
    points:
      - '1654 рік: одна подія — три правди (українська, російська, радянська)'
      - Як політична доцільність змінює історичні акценти (Тези 1954 року)
      - 'Проблема джерел: чому ми не маємо оригіналу угоди?'
      - Історична пам'ять vs історична реальність
  - section: 'Інструментарій історика: Наратив та джерела'
    words: 750
    points:
      - 'Поняття наративу: як ми будуємо розповідь'
      - 'Факти та їх інтерпретація: ''мішок'' Е. Карра'
      - Первинні джерела (архіви, літописи) vs вторинні (монографії)
      - 'Критика джерела: зовнішня та внутрішня'
  - section: 'Суб''єктивність в історії: Упередження та контекст'
    words: 650
    points:
      - Чи існує 'об'єктивна' історія?
      - Упередження (bias) як невід'ємна частина тексту
      - Вплив часу та контексту на автора (чому радянські історики писали так, як
        писали)
      - Свідомі та несвідомі викривлення
  - section: 'Творці минулого: Від літописців до академічних шкіл'
    words: 750
    points:
      - 'Літописці: між служінням Богу і князю'
      - Козацькі літописці як перші 'політологи' Гетьманщини
      - 'Народницька школа (Костомаров): історія бездержавного народу'
      - 'Державницька школа (Грушевський, Липинський): обґрунтування права на державу'
  - section: 'Історія як зброя: Держава, пропаганда та інформвійна'
    words: 650
    points:
      - 'Оруелівський принцип: контроль над минулим як контроль над майбутнім'
      - 'Історична політика Росії: привласнення спадщини Русі'
      - Радянські 'білі плями' та 'чорні діри' в пам'яті
      - Роль діаспори у збереженні альтернативного голосу
  - section: 'Практикум: Методологія аналізу історичного тексту'
    words: 750
    points:
      - Інтелектуальна самооборона читача
      - Алгоритм '5 питань до джерела' (Хто? Коли? Для кого? Навіщо? Що приховано?)
      - Як розпізнати пропагандистський наратив
      - Критичне мислення як запобіжник від маніпуляцій
  - section: 'Висновки: Історія як живий процес'
    words: 350
    points:
      - Історія — це діалог сучасності з минулим
      - Важливість власної національної візії
      - Відповідальність читача за споживання історичного контенту
