slug: valuevskyi-tsyrkuliar-tekst
title: 'Валуєвський циркуляр: Повний текст'
word_target: 5000
content_outline:
- section: Вступ — Заборона мови
  words: 500
  points:
  - '1863 рік: історичний поворот від «ліберальної весни» Олександра II до глухої
    реакції та репресій.'
  - 'Таємний характер розпорядження: це була інструкція для цензурних відомств, а
    не повноцінний закон.'
  - 'Квінтесенція заборони: проголошення тези про те, що української мови «немає і
    бути не може».'
  - 'Миттєвий ефект та значення: параліч друку навчальних книг, релігійної літератури
    і удар по недільних школах.'
- section: 'Історичний контекст: I — Повстання та українофільство'
  words: 450
  points:
  - Польське (Січневе) повстання 1863 року як катализатор параної імперії та появи
    міфу про «польську інтригу».
  - 'Українофільство: розгортання руху Громад («ходіння в народ») та просвітницької
    роботи серед селянства.'
  - Сприйняття українського руху імперськими шовіністами (М. Катков) як інструменту
    для розколу Росії.
- section: 'Історичний контекст: II — Загроза та персоналії'
  words: 450
  points:
  - Відкриття україномовних недільних шкіл як пряма загроза монополії імперії на освіту
    та думку народу.
  - Спроба Пилипа Морачевського видати переклад Євангелія як остання крапля, що спровокувала
    циркуляр.
  - 'Постать Петра Валуєва: міністр внутрішніх справ та ліберал-реформатор, що став
    автором акту державного лінгвоциду.'
- section: 'Текст циркуляра — повний аналіз: I — Структура та головна теза'
  words: 500
  points:
  - 'Структура документа: текст тісно спирається на доповідну записку київського цензора
    О. Новицького.'
  - 'Лінгвістичний шовінізм: імперський уряд перебирає на себе абсурдну функцію мовознавчої
    експертизи.'
  - 'Головна теза циркуляра: «ніякої окремої малоросійської мови не було, немає і
    бути не може» — заперечення факту її існування.'
- section: 'Текст циркуляра — повний аналіз: II — Межі заборони'
  words: 500
  points:
  - 'Що саме заборонили: категоричне припинення друку навчальної літератури та книг
    для початкового читання.'
  - 'Виключення релігійної літератури: заборона духовних видань через страх перед
    легітимізацією української мови у церкві.'
  - 'Пастка «красного письменства» та бюрократична мова: дозвіл лише на художню літературу
    задля маргіналізації мови.'
- section: 'Логіка заборони: I — Аргументи та статус мови'
  words: 450
  points:
  - Аргументація циркуляра базувалася на імперській концепції «триєдиного російського
    народу».
  - 'Офіційний статус «наріччя» vs. мова: принизливе таврування української як зіпсованого
    польським впливом діалекту.'
  - 'Політичний вимір: визнання української окремою мовою загрожувало б фундаменту
    імперії, визнаючи українців окремою нацією.'
- section: 'Логіка заборони: II — Сепаратизм та імперія'
  words: 450
  points:
  - Панічний страх влади перед пробудженням національної свідомості серед багатомільйонного
    українського селянства.
  - 'Сепаратизм — удаваний чи реальний: українофіли того часу здебільшого вимагали
    лише базових культурних прав.'
  - 'Імперська логіка виконання: покладання контролю на Київський, Московський та
    Петербурзький цензурні комітети.'
- section: 'Наслідки: I — Виконання та Галичинський П''ємонт'
  words: 450
  points:
  - 'Статистика катастрофи: як виконувався наказ — падіння кількості видань з 114
    до 24 одиниць за п''ять років.'
  - 'Культурний трансфер: вимушене перенесення центру українського інтелектуального
    життя до австрійської Галичини.'
  - Формування Галичини як «Українського П'ємонту», де продовжувалося вільне видання
    преси та книг.
- section: 'Наслідки: II — Опір та довготривалий вплив'
  words: 450
  points:
  - 'Опір системі: як обходили заборони через розвиток етнографії, археографії та
    історії.'
  - 'Довготривалий вплив: Валуєвський циркуляр успішно законсервував русифікацію освіти
    та церкви на десятиліття.'
  - 'Зворотний ефект репресій: заборона стимулювала кристалізацію модерної української
    ідентичності.'
- section: Критика джерела
  words: 400
  points:
  - 'Офіційний документ як доказ: імперія не мобілізувала б державний апарат для заборони
    того, чого «не існує».'
  - 'Що за ним стоїть: критика радянської історіографії, яка зводила циркуляр виключно
    до класової боротьби.'
  - Парадокс російського лібералізму, який закінчується на українському питанні.
- section: Підсумок
  words: 400
  points:
  - 'Від циркуляра до указу: Валуєвський циркуляр підготував ґрунт для більш драконівського
    Емського указу 1876 року.'
  - 'Мовна політика імперії: системне усвідомлення, що мова є фундаментом нації та
    інструментом суб''єктності.'
  - 'Зв''язок із сучасністю: історичні паралелі з політикою лінгвоциду сучасної Росії
    на окупованих територіях України.'
