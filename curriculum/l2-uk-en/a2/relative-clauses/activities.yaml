          - "напрямок"
        correct: 0
        explanation: "Який вводить опис фільму."
      - question: "Яка це кімната?"
        options:
          - "питання"
          - "опис"
          - "походження"
        correct: 0
        explanation: "Це питальне речення."
      - question: "Кімната, яка має балкон, світла."
        options:
          - "опис"
          - "питання"
          - "причина"
        correct: 0
        explanation: "Яка має балкон описує кімнату."
      - question: "Це місце, де тихо."
        options:
          - "опис місця"
          - "питання"
          - "причина"
        correct: 0
        explanation: "Де вводить опис місця."
      - question: "Куди ми йдемо?"
        options:
          - "питання"
          - "означальна частина"
          - "протиставлення"
        correct: 0
        explanation: "Це пряме питання про напрямок."
      - question: "Які це люди?"
        options:
          - "питання"
          - "опис"
          - "походження"
        correct: 0
        explanation: "Речення питає, хто це або які вони."
      - question: "Люди, які працюють разом, допомогли."
        options:
          - "опис"
          - "питання"
          - "напрямок"
        correct: 0
        explanation: "Які працюють разом описує людей."
