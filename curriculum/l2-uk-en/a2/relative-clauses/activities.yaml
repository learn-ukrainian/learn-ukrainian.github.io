inline:
  - id: act-1
    type: fill-in
    title: Який, яка, яке чи які?
    instruction: Оберіть форму, що узгоджується з іменником.
    items:
      - sentence: "Це квартира, ___ має балкон."
        answer: "яка"
        options:
          - "яка"
          - "який"
        explanation: "Квартира - жіночий рід."
      - sentence: "Ось стіл, ___ стоїть біля вікна."
        answer: "який"
        options:
          - "який"
          - "яке"
        explanation: "Стіл - чоловічий рід."
      - sentence: "Це місце, ___ мені подобається."
        answer: "яке"
        options:
          - "яке"
          - "яка"
        explanation: "Місце - середній рід."
      - sentence: "Це друзі, ___ живуть поруч."
        answer: "які"
        options:
          - "які"
          - "який"
        explanation: "Друзі - множина."
      - sentence: "Книжка, ___ лежить на столі, моя."
        answer: "яка"
        options:
          - "яка"
          - "яке"
        explanation: "Книжка - жіночий рід."
      - sentence: "Вікно, ___ виходить у двір, велике."
        answer: "яке"
        options:
          - "яке"
          - "який"
        explanation: "Вікно - середній рід."
      - sentence: "Сусід, ___ живе поруч, тихий."
        answer: "який"
        options:
          - "який"
          - "які"
        explanation: "Сусід - чоловічий рід."
      - sentence: "Кав'ярні, ___ працюють допізна, поруч."
        answer: "які"
        options:
          - "які"
          - "яка"
        explanation: "Кав'ярні - множина."
  - id: act-2
    type: quiz
    title: Де, куди чи звідки?
    instruction: Оберіть сполучне слово для місця.
    items:
      - question: "Це кафе, ___ ми зустрілися."
        options:
          - "де"
          - "куди"
          - "звідки"
        correct: 0
        explanation: "Зустрілися у місці: де."
      - question: "Ось парк, ___ ми йдемо гуляти."
        options:
          - "куди"
          - "де"
          - "звідки"
        correct: 0
        explanation: "Є напрямок руху: куди."
      - question: "Це станція, ___ їде автобус."
        options:
          - "звідки"
          - "куди"
          - "де"
        correct: 0
        explanation: "Автобус починає рух звідти."
      - question: "Це кімната, ___ можна працювати."
        options:
          - "де"
          - "куди"
          - "звідки"
        correct: 0
        explanation: "Можна працювати в кімнаті."
      - question: "Місто, ___ ми поїдемо влітку, має старий центр."
        options:
          - "куди"
          - "де"
          - "звідки"
        correct: 0
        explanation: "Поїдемо в напрямку міста."
      - question: "Країна, ___ вона приїхала, це Україна."
        options:
          - "звідки"
          - "куди"
          - "де"
        correct: 0
        explanation: "Приїхала з країни."
      - question: "Будинок, ___ живе мій друг, новий."
        options:
          - "де"
          - "куди"
          - "звідки"
        correct: 0
        explanation: "Жити в місці: де."
      - question: "Університет, ___ вступила Олена, у центрі."
        options:
          - "куди"
          - "де"
          - "звідки"
        correct: 0
        explanation: "Вступити кудись: куди."
  - id: act-3
    type: match-up
    title: Поєднайте два речення
    instruction: Знайдіть природне означальне підрядне речення.
    pairs:
      - left: "Це моя подруга. Вона живе у Львові."
        right: "Це моя подруга, яка живе у Львові."
      - left: "Ось будинок. Він стоїть на розі."
        right: "Ось будинок, який стоїть на розі."
      - left: "Це кафе. Ми там зустрілися."
        right: "Це кафе, де ми зустрілися."
      - left: "Я шукаю книжку. Я її читаю."
        right: "Я шукаю книжку, яку читаю."
      - left: "Це місто. Я його люблю."
        right: "Це місто, яке я люблю."
      - left: "Ось парк. Ми ходимо туди гуляти."
        right: "Ось парк, куди ми ходимо гуляти."
      - left: "Це студенти. Вони працюють разом."
        right: "Це студенти, які працюють разом."
      - left: "Це станція. Звідти їде автобус."
        right: "Це станція, звідки їде автобус."
  - id: act-4
    type: true-false
    title: Чи правильний опис?
    instruction: Визначте, чи речення правильне.
    items:
      - statement: "Це кімната, яка має балкон."
        correct: true
        explanation: "Кімната - жіночий рід, тому яка."
      - statement: "Ось стіл, яке стоїть біля вікна."
        correct: false
        explanation: "Стіл - чоловічий рід: який."
      - statement: "Це кафе, де ми зустрілися."
        correct: true
        explanation: "Де природно описує місце."
      - statement: "Це книжка, яка вона цікава."
        correct: false
        explanation: "Зайве вона: Це книжка, яка цікава."
      - statement: "Парк, куди ми йдемо, великий."
        correct: true
        explanation: "Куди показує напрямок."
      - statement: "Це друзі, який живуть поруч."
        correct: false
        explanation: "Друзі - множина: які."
      - statement: "Будинок, де живе мій брат, старий."
        correct: true
        explanation: "Для місця де звучить природно."
      - statement: "Це місто яке я люблю."
        correct: false
        explanation: "Потрібна кома: місто, яке..."
workbook:
  - type: fill-in
    title: Називний чи знахідний?
    instruction: Оберіть форму який у простих A2-реченнях.
    items:
      - sentence: "Людина, ___ мене зустріла, працює тут."
        answer: "яка"
        options:
          - "яка"
          - "яку"
        explanation: "Людина сама зустріла мене."
      - sentence: "Людина, ___ я зустрів, працює тут."
        answer: "яку"
        options:
          - "яка"
          - "яку"
        explanation: "Я зустрів людину, тому яку."
      - sentence: "Книжка, ___ лежить на столі, моя."
        answer: "яка"
        options:
          - "яка"
          - "яку"
        explanation: "Книжка сама лежить."
      - sentence: "Книжка, ___ я читаю, цікава."
        answer: "яку"
        options:
          - "яка"
          - "яку"
        explanation: "Я читаю книжку."
      - sentence: "Чоловік, ___ говорить з мамою, лікар."
        answer: "який"
        options:
          - "який"
          - "якого"
        explanation: "Чоловік сам говорить."
      - sentence: "Чоловік, ___ я бачу, мій сусід."
        answer: "якого"
        options:
          - "який"
          - "якого"
        explanation: "Я бачу чоловіка."
      - sentence: "Місто, ___ я люблю, біля моря."
        answer: "яке"
        options:
          - "яке"
          - "яка"
        explanation: "Місто - середній рід; знахідний збігається з називним."
      - sentence: "Друзі, ___ допомогли мені, живуть поруч."
        answer: "які"
        options:
          - "які"
          - "яких"
        explanation: "Друзі самі допомогли."
  - type: error-correction
    title: Виправте означальне речення
    instruction: Оберіть природне виправлення.
    items:
      - sentence: "Це книжка, яка вона цікава."
        error: "вона"
        correction: "Це книжка, яка цікава."
        options:
          - "Це книжка, яка цікава."
          - "Це книжка, де цікава."
        explanation: "Зайвий займенник не потрібен."
      - sentence: "Ось чоловік, який він живе поруч."
        error: "він"
        correction: "Ось чоловік, який живе поруч."
        options:
          - "Ось чоловік, який живе поруч."
          - "Ось чоловік, де живе поруч."
        explanation: "Який уже вказує на чоловіка."
      - sentence: "Це кафе, де ми там зустрілися."
        error: "там"
        correction: "Це кафе, де ми зустрілися."
        options:
          - "Це кафе, де ми зустрілися."
          - "Це кафе, куди ми зустрілися."
        explanation: "Після де не треба там."
      - sentence: "Кімната, який має балкон, світла."
        error: "який"
        correction: "Кімната, яка має балкон, світла."
        options:
          - "Кімната, яка має балкон, світла."
          - "Кімната, яке має балкон, світла."
        explanation: "Кімната - жіночий рід."
      - sentence: "Місто, яка біля моря, гарне."
        error: "яка"
        correction: "Місто, яке біля моря, гарне."
        options:
          - "Місто, яке біля моря, гарне."
          - "Місто, який біля моря, гарне."
        explanation: "Місто - середній рід."
      - sentence: "Друзі, який живуть поруч, допомогли."
        error: "який"
        correction: "Друзі, які живуть поруч, допомогли."
        options:
          - "Друзі, які живуть поруч, допомогли."
          - "Друзі, яка живуть поруч, допомогли."
        explanation: "Друзі - множина."
      - sentence: "Це будинок який стоїть на розі."
        error: "будинок який"
        correction: "Це будинок, який стоїть на розі."
        options:
          - "Це будинок, який стоїть на розі."
          - "Це будинок який, стоїть на розі."
        explanation: "Кома стоїть перед який."
      - sentence: "Парк, де ми йдемо, великий."
        error: "де"
        correction: "Парк, куди ми йдемо, великий."
        options:
          - "Парк, куди ми йдемо, великий."
          - "Парк, звідки ми йдемо, великий."
        explanation: "Йти в напрямку парку: куди."
  - type: unjumble
    title: Побудуйте опис
    instruction: Поставте слова в природний порядок.
    items:
      - words:
          - "Це"
          - "кімната,"
          - "де"
          - "можна"
          - "працювати"
        answer: "Це кімната, де можна працювати."
      - words:
          - "Ось"
          - "стіл,"
          - "який"
          - "стоїть"
          - "біля"
          - "вікна"
        answer: "Ось стіл, який стоїть біля вікна."
      - words:
          - "Це"
          - "подруга,"
          - "яка"
          - "живе"
          - "у"
          - "Львові"
        answer: "Це подруга, яка живе у Львові."
      - words:
          - "Я"
          - "шукаю"
          - "книжку,"
          - "яку"
          - "читаю"
        answer: "Я шукаю книжку, яку читаю."
      - words:
          - "Парк,"
          - "куди"
          - "ми"
          - "йдемо,"
          - "великий"
        answer: "Парк, куди ми йдемо, великий."
      - words:
          - "Це"
          - "місто,"
          - "яке"
          - "я"
          - "люблю"
        answer: "Це місто, яке я люблю."
      - words:
          - "Станція,"
          - "звідки"
          - "їде"
          - "автобус,"
          - "поруч"
        answer: "Станція, звідки їде автобус, поруч."
      - words:
          - "Це"
          - "люди,"
          - "які"
          - "працюють"
          - "разом"
        answer: "Це люди, які працюють разом."
  - type: quiz
    title: Питання чи опис?
    instruction: Виберіть функцію слова який.
    items:
      - question: "Який це фільм?"
