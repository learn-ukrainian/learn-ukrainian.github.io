inline:
  - id: act-1
    type: fill-in
    title: Утворіть родовий множини
    instruction: Оберіть правильну форму родового відмінка множини.
    items:
      - sentence: "У шафі багато (книга) ___."
        answer: книг
        options:
          - книг
          - книги
          - книгів
        explanation: Книга має коротку форму родового множини книг.
      - sentence: "На столі кілька (ложка) ___."
        answer: ложок
        options:
          - ложки
          - ложок
          - ложків
        explanation: "Ложка має вставний голосний о: ложок."
      - sentence: "У їдальні немає чистих (склянка) ___."
        answer: склянок
        options:
          - склянки
          - склянок
          - склянів
        explanation: Склянка у родовому множини - склянок.
      - sentence: "У групі п'ять (студент) ___."
        answer: студентів
        options:
          - студенти
          - студентів
          - студентами
        explanation: "Чоловічий рід часто має закінчення -ів: студентів."
      - sentence: "У будинку десять (вікно) ___."
        answer: вікон
        options:
          - вікна
          - вікон
          - вікнів
        explanation: "Середній рід часто має коротку форму: вікон."
      - sentence: "У Марії багато (сестра) ___."
        answer: сестер
        options:
          - сестри
          - сестер
          - сестрів
        explanation: "Сестра має вставний голосний е: сестер."
      - sentence: "На уроці кілька нових (пісня) ___."
        answer: пісень
        options:
          - пісні
          - пісень
          - піснів
        explanation: Пісня у родовому множини - пісень.
      - sentence: "У мене мало (гроші) ___."
        answer: грошей
        options:
          - гроші
          - грошей
          - грошів
        explanation: Гроші мають часту форму родового множини грошей.
  - id: act-2
    type: quiz
    title: Слово кількості
    instruction: Оберіть форму після слова кількості.
    items:
      - question: "Скільки ___ на столі?"
        options:
          - тарілок
          - тарілки
          - тарілками
        correct: 0
        explanation: "Після скільки потрібен родовий множини: тарілок."
      - question: "У місті багато ___."
        options:
          - людей
          - люди
          - людьми
        correct: 0
        explanation: Багато людей - готова часта форма.
      - question: "У мене мало ___."
        options:
          - гроші
          - грошей
          - грішми
        correct: 1
        explanation: Мало грошей - родовий множини.
      - question: "Це коштує п'ять ___."
        options:
          - гривні
          - гривнями
          - гривень
        correct: 2
        explanation: Після п'ять потрібна форма гривень.
      - question: "Після уроку є декілька ___."
        options:
          - питань
          - питання
          - питаннями
        correct: 0
        explanation: Декілька питань - родовий множини.
      - question: "У залі немає вільних ___."
        options:
          - місця
          - місць
          - місцями
        correct: 1
        explanation: Немає місць - родовий множини.
      - question: "Ми будемо тут сім ___."
        options:
          - днів
          - дні
          - днями
        correct: 0
        explanation: "Після сім потрібен родовий множини: днів."
      - question: "У мене є кілька добрих ___."
        options:
          - друзі
          - друзів
          - друзями
        correct: 1
        explanation: Кілька друзів - родовий множини.
  - id: act-3
    type: match-up
    title: Однина і родовий множини
    instruction: З'єднайте називний однини з родовим множини.
    pairs:
      - left: книга
        right: книг
      - left: сестра
        right: сестер
      - left: пісня
        right: пісень
      - left: стіл
        right: столів
      - left: гість
        right: гостей
      - left: вікно
        right: вікон
      - left: місто
        right: міст
      - left: гривня
        right: гривень
  - id: act-4
    type: true-false
    title: Чи правильна форма?
    instruction: Визначте, чи правильна форма родового множини.
    items:
      - statement: "багато книг"
        correct: true
        explanation: Книга - книг.
      - statement: "п'ять столів"
        correct: true
        explanation: Стіл - столів.
      - statement: "немає містів"
        correct: false
        explanation: Місто - міст.
      - statement: "кілька дітей"
        correct: true
        explanation: Дитина має форму дітей у родовому множини.
      - statement: "багато студентів"
        correct: true
        explanation: Студент - студентів.
      - statement: "десять вікон"
        correct: true
        explanation: Вікно - вікон.
      - statement: "мало грошей"
        correct: true
        explanation: Гроші - грошей.
      - statement: "кілька гривнів"
        correct: false
        explanation: "Правильно: кілька гривень."
