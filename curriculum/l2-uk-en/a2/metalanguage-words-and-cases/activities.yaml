inline:
  - id: act-1
    type: match-up
    title: Частина мови
    instruction: З'єднайте український термін з англійською підказкою.
    pairs:
      - left: "іменник"
        right: "noun"
      - left: "прикметник"
        right: "adjective"
      - left: "дієслово"
        right: "verb"
      - left: "займенник"
        right: "pronoun"
      - left: "числівник"
        right: "numeral"
      - left: "прислівник"
        right: "adverb"
      - left: "прийменник"
        right: "preposition"
      - left: "сполучник"
        right: "conjunction"
      - left: "частка"
        right: "particle"
      - left: "вигук"
        right: "interjection"
  - id: act-1b
    type: quiz
    title: Частина мови в реченні
    instruction: Оберіть частину мови виділеного слова.
    items:
      - question: "`книга` у реченні `Це книга`"
        options:
          - "іменник"
          - "дієслово"
          - "прикметник"
        correct: 0
        explanation: "`Книга` називає предмет, тому це іменник."
      - question: "`швидко` у реченні `Вона швидко читає`"
        options:
          - "прислівник"
          - "іменник"
          - "числівник"
        correct: 0
        explanation: "`Швидко` відповідає на питання як?"
      - question: "`мій` у реченні `Це мій словник`"
        options:
          - "займенник"
          - "сполучник"
          - "прийменник"
        correct: 0
        explanation: "`Мій` показує належність, тому це займенник."
      - question: "`новими` у фразі `з новими друзями`"
        options:
          - "прикметник"
          - "дієслово"
          - "займенник"
        correct: 0
        explanation: "`Новими` описує іменник `друзями`, тому це прикметник."
      - question: "`читаю` у реченні `Я читаю правило`"
        options:
          - "дієслово"
          - "прислівник"
          - "іменник"
        correct: 0
        explanation: "`Читаю` називає дію, тому це дієслово."
      - question: "`п'ять` у фразі `п'ять речень`"
        options:
          - "числівник"
          - "сполучник"
          - "прийменник"
        correct: 0
        explanation: "`П'ять` називає кількість."
      - question: "`але` у реченні `Я читаю, але не пишу`"
        options:
          - "сполучник"
          - "іменник"
          - "прикметник"
        correct: 0
        explanation: "`Але` з'єднує частини речення."
      - question: "`до` у фразі `до школи`"
        options:
          - "прийменник"
          - "прислівник"
          - "дієслово"
        correct: 0
        explanation: "`До` зв'язує слова і вимагає родового відмінка."
      - question: "`не` у реченні `Я не пишу`"
        options:
          - "частка"
          - "сполучник"
          - "прийменник"
        correct: 0
        explanation: "`Не` додає заперечення, тому це частка."
      - question: "`ой!` у реченні `Ой! Я забув словник`"
        options:
          - "вигук"
          - "прислівник"
          - "іменник"
        correct: 0
        explanation: "`Ой!` виражає реакцію, тому це вигук."
  - id: act-1c
    type: group-sort
    title: Частини мови в групах
    instruction: Розподіліть слова за частинами мови.
    groups:
      - label: "іменник"
        items:
          - "книга"
          - "місто"
          - "друг"
      - label: "прикметник"
        items:
          - "новий"
          - "гарна"
          - "тепле"
      - label: "дієслово"
        items:
          - "читати"
          - "написати"
          - "допомагаю"
      - label: "прислівник"
        items:
          - "швидко"
          - "тут"
          - "завтра"
      - label: "частка"
        items:
          - "не"
          - "лише"
          - "хай"
      - label: "вигук"
        items:
          - "ой!"
          - "ура!"
          - "алло!"
  - id: act-2
    type: fill-in
    title: Питання відмінків
    instruction: Оберіть правильну пару питань.
    items:
      - sentence: "Називний відмінок відповідає на питання ___?"
        answer: "хто? що?"
        options:
          - "хто? що?"
          - "кого? чого?"
          - "ким? чим?"
        explanation: "Називний називає особу, предмет або ідею."
      - sentence: "Родовий відмінок відповідає на питання ___?"
        answer: "кого? чого?"
        options:
          - "кого? чого?"
          - "кому? чому?"
          - "на кому? на чому?"
        explanation: "Родовий часто показує відсутність, кількість або належність."
      - sentence: "Давальний відмінок відповідає на питання ___?"
        answer: "кому? чому?"
        options:
          - "кому? чому?"
          - "кого? що?"
          - "хто? що?"
        explanation: "Давальний часто називає отримувача або того, кому щось потрібно."
      - sentence: "Знахідний відмінок відповідає на питання ___?"
        answer: "кого? що?"
        options:
          - "кого? що?"
          - "ким? чим?"
          - "кого? чого?"
        explanation: "Знахідний часто називає прямий об'єкт."
      - sentence: "Орудний відмінок відповідає на питання ___?"
        answer: "ким? чим?"
        options:
          - "ким? чим?"
          - "кому? чому?"
          - "хто? що?"
        explanation: "Орудний показує інструмент, супровід або роль."
      - sentence: "Місцевий відмінок відповідає на питання ___?"
        answer: "на кому? на чому?"
        options:
          - "на кому? на чому?"
          - "кого? що?"
          - "кому? чому?"
        explanation: "Місцевий уживаємо з прийменником."
      - sentence: "Кличний відмінок потрібен для ___."
        answer: "звертання"
        options:
          - "звертання"
          - "заперечення"
          - "порівняння"
        explanation: "Кличний - це форма прямого звертання: Олено!, друже!"
      - sentence: "У фразі 'немає часу' слово 'часу' відповідає на питання ___."
        answer: "чого?"
        options:
          - "чого?"
          - "чим?"
          - "хто?"
        explanation: "Немає чого? часу - родовий відмінок."
  - id: act-3
    type: group-sort
    title: Рід і число
    instruction: Розподіліть слова за граматичною групою.
    groups:
      - label: "чоловічий рід"
        items:
          - "стіл"
          - "музей"
          - "день"
          - "тато"
      - label: "жіночий рід"
        items:
          - "книга"
          - "пісня"
          - "ніч"
          - "школа"
      - label: "середній рід"
        items:
          - "місто"
          - "море"
          - "ім'я"
          - "вікно"
  - id: act-4
    type: quiz
    title: Опис слова
    instruction: Оберіть правильний граматичний опис.
    items:
      - question: "`книга`"
        options:
          - "іменник, жіночий рід, однина, називний"
          - "дієслово, минулий час"
          - "прикметник, множина"
        correct: 0
        explanation: "`Книга` - іменник жіночого роду в однині."
      - question: "`книг` у фразі `багато книг`"
        options:
          - "іменник, множина, родовий"
          - "іменник, однина, давальний"
          - "прийменник"
        correct: 0
        explanation: "Після багато часто маємо родовий множини."
      - question: "`швидко`"
        options:
          - "прислівник"
          - "іменник"
          - "числівник"
        correct: 0
        explanation: "`Швидко` відповідає на питання як?"
      - question: "`новими` у фразі `з новими друзями`"
        options:
          - "прикметник, множина, орудний"
          - "дієслово, теперішній час"
          - "займенник, називний"
        correct: 0
        explanation: "Прикметник узгоджується з іменником `друзями`."
      - question: "`п'ять`"
        options:
          - "числівник"
          - "сполучник"
          - "прийменник"
        correct: 0
        explanation: "`П'ять` називає кількість."
      - question: "`але`"
        options:
          - "сполучник"
          - "іменник"
          - "прикметник"
        correct: 0
        explanation: "`Але` з'єднує частини речення."
      - question: "`до`"
        options:
          - "прийменник"
          - "прислівник"
          - "дієслово"
        correct: 0
        explanation: "`До` зв'язує слова і вимагає родового відмінка."
      - question: "`мені`"
        options:
          - "займенник, давальний"
          - "іменник, називний"
          - "прислівник"
        correct: 0
        explanation: "`Мені` - форма займенника `я` у давальному відмінку."
workbook:
  - type: error-correction
    title: Виправте термін
    instruction: Оберіть правильне формулювання.
    items:
      - sentence: "`швидко` - це прикметник."
        error: "прикметник"
        correction: "`швидко` - це прислівник."
        options:
          - "`швидко` - це прислівник."
          - "`швидко` - це прийменник."
        explanation: "Прислівник відповідає на питання як?"
      - sentence: "`мій` - це іменник."
        error: "іменник"
        correction: "`мій` - це займенник."
        options:
          - "`мій` - це займенник."
          - "`мій` - це сполучник."
        explanation: "`Мій` замінює іменник або показує належність."
      - sentence: "Родовий відмінок має питання ким? чим?"
        error: "ким? чим?"
        correction: "Родовий відмінок має питання кого? чого?"
        options:
          - "Родовий відмінок має питання кого? чого?"
          - "Родовий відмінок має питання хто? що?"
        explanation: "Ким? чим? - це орудний."
      - sentence: "Однина означає багато предметів."
        error: "багато"
        correction: "Однина означає один предмет."
        options:
          - "Однина означає один предмет."
          - "Однина означає звертання."
        explanation: "Однина - singular."
      - sentence: "Кличний відмінок - це форма часу."
        error: "форма часу"
        correction: "Кличний відмінок - це форма звертання."
        options:
          - "Кличний відмінок - це форма звертання."
          - "Кличний відмінок - це форма множини."
        explanation: "Кличний уживаємо, коли звертаємося до людини."
      - sentence: "`добре` у реченні `Вона добре читає` - це прикметник."
        error: "прикметник"
        correction: "`добре` у реченні `Вона добре читає` - це прислівник."
        options:
          - "`добре` у реченні `Вона добре читає` - це прислівник."
          - "`добре` у реченні `Вона добре читає` - це іменник."
        explanation: "`Добре` відповідає на питання як?"
      - sentence: "Прикметник не узгоджується з іменником."
        error: "не узгоджується"
        correction: "Прикметник узгоджується з іменником."
        options:
          - "Прикметник узгоджується з іменником."
          - "Прикметник завжди має форму інфінітива."
        explanation: "Прикметник має форму, яка пасує до іменника."
      - sentence: "Множина означає один предмет."
        error: "один предмет"
        correction: "Множина означає багато предметів або осіб."
        options:
          - "Множина означає багато предметів або осіб."
          - "Множина означає питання хто? що?"
        explanation: "Один предмет - це однина; багато - множина."
  - type: translate
    title: Назвіть українською
    instruction: Оберіть український граматичний термін.
    items:
      - source: "noun"
        options:
          - text: "іменник"
            correct: true
          - text: "прикметник"
            correct: false
          - text: "сполучник"
            correct: false
        explanation: "Іменник називає особу, предмет або ідею."
      - source: "adjective"
        options:
          - text: "прикметник"
            correct: true
          - text: "прислівник"
            correct: false
          - text: "числівник"
            correct: false
        explanation: "Прикметник описує іменник."
      - source: "verb"
        options:
          - text: "дієслово"
            correct: true
          - text: "відмінок"
            correct: false
          - text: "рід"
            correct: false
        explanation: "Дієслово називає дію або стан."
      - source: "case"
        options:
          - text: "відмінок"
            correct: true
          - text: "однина"
            correct: false
          - text: "множина"
            correct: false
        explanation: "Відмінок показує граматичну роль слова."
      - source: "gender"
        options:
          - text: "рід"
            correct: true
          - text: "питання"
            correct: false
          - text: "частина мови"
            correct: false
        explanation: "Рід буває чоловічий, жіночий або середній."
      - source: "plural"
        options:
          - text: "множина"
            correct: true
          - text: "однина"
            correct: false
          - text: "називний"
            correct: false
        explanation: "Множина означає багато предметів або осіб."
      - source: "singular"
        options:
          - text: "однина"
            correct: true
          - text: "орудний"
            correct: false
          - text: "сполучник"
            correct: false
        explanation: "Однина означає один предмет або одну особу."
      - source: "preposition"
        options:
          - text: "прийменник"
            correct: true
          - text: "займенник"
            correct: false
          - text: "прикметник"
            correct: false
        explanation: "Прийменник зв'язує слова: до школи, у місті."
