inline:
  - id: act-1
    type: fill-in
    title: Заповни бланк
    instruction: Доповніть репліки на пошті правильною формою.
    items:
      - sentence: "Я хочу надіслати листа ___ (сестра)."
        answer: "сестрі"
        options:
          - "сестрі"
          - "сестру"
          - "сестра"
        explanation: "Для одержувача листа вживаємо давальний."
      - sentence: "Кому тут писати коротке повідомлення? ___ (Олена)."
        answer: "Олені"
        options:
          - "Олені"
          - "Олену"
          - "Олена"
        explanation: "Адресат повідомлення стоїть у давальному."
      - sentence: "Допоможіть ___, будь ласка, з індексом. (я)"
        answer: "мені"
        options:
          - "мені"
          - "мене"
          - "я"
        explanation: "Після допоможіть стоїть давальний."
      - sentence: "Покажіть ___ бланк, будь ласка. (я)"
        answer: "мені"
        options:
          - "мені"
          - "мене"
          - "я"
        explanation: "Показати комусь - давальний."
      - sentence: "Дякую ___ за терпіння. (ви)"
        answer: "вам"
        options:
          - "вам"
          - "вас"
          - "ви"
        explanation: "Дякувати керує давальним."
      - sentence: "Напишіть коротке повідомлення ___ (друг)."
        answer: "другові"
        options:
          - "другові"
          - "друга"
          - "другом"
        explanation: "Одержувач повідомлення стоїть у давальному."
      - sentence: "Передайте посилку ___ (працівниця)."
        answer: "працівниці"
        options:
          - "працівниці"
          - "працівницю"
          - "працівниця"
        explanation: "Передати комусь - давальний."
      - sentence: "Я хочу надіслати подарунок ___ (бабуся)."
        answer: "бабусі"
        options:
          - "бабусі"
          - "бабусю"
          - "бабуся"
        explanation: "Для бабусі - давальний."
  - id: act-2
    type: match-up
    title: Питання і відповідь
    instruction: Зіставте прохання або ввічливу репліку з природною відповіддю.
    pairs:
      - left: "Help me, please."
        right: "Допоможіть мені, будь ласка."
      - left: "Show me the form."
        right: "Покажіть мені бланк."
      - left: "Explain it to me."
        right: "Поясніть мені."
      - left: "Thank you."
        right: "Дякую вам."
      - left: "Address to sister Olena"
        right: "Дорогій сестрі Олені"
      - left: "Send the letter to a friend"
        right: "Надішліть листа другові"
      - left: "Give the parcel to the clerk"
        right: "Дайте посилку працівниці"
      - left: "Write to the recipient"
        right: "Напишіть одержувачеві коротке повідомлення"
  - id: act-3
    type: quiz
    title: Кому це?
    instruction: Визначте, для кого або до кого звернена фраза.
    items:
      - question: "У фразі `Дорогому другові Андрію` адресат стоїть у..."
        options:
          - "давальному"
          - "знахідному"
          - "родовому"
        correct: 0
        explanation: "Адреса в листі має форму давального."
      - question: "У фразі `Допоможіть мені, будь ласка` слово `мені` - це..."
        options:
          - "давальний"
          - "місцевий"
          - "кличний"
        correct: 0
        explanation: "Після прохання стоїть давальний."
      - question: "У фразі `Дякую вам` слово `вам` - це..."
        options:
          - "давальний"
          - "знахідний"
          - "називний"
        correct: 0
        explanation: "Дякувати керує давальним."
      - question: "У фразі `Я хочу надіслати листа сестрі` слово `сестрі` - це..."
        options:
          - "одержувач у давальному"
          - "прямий об'єкт у знахідному"
          - "місце"
        correct: 0
        explanation: "Сестра тут - адресат і одержувач."
      - question: "У фразі `Покажіть мені бланк` слово `мені` показує..."
        options:
          - "кому показати"
          - "що показати"
          - "де показати"
        correct: 0
        explanation: "Модель відповідає на питання кому?"
      - question: "У фразі `Надішліть листа другові` слово `другові` показує..."
        options:
          - "одержувача"
          - "тему"
          - "час"
        correct: 0
        explanation: "Другові - одержувач."
      - question: "У фразі `Шановному панові Петренку` слово `панові` стоїть у..."
        options:
          - "давальному"
          - "знахідному"
          - "місцевому"
        correct: 0
        explanation: "Формула звертання в адресі використовує давальний."
      - question: "У фразі `Заповніть бланк, будь ласка` слово `бланк` - це..."
        options:
          - "прямий об'єкт"
          - "адресат"
          - "місце"
        correct: 0
        explanation: "Бланк є тим, що заповнюють."
  - id: act-4
    type: group-sort
    title: Розклади фрази
    instruction: Розсортуйте фрази за типом сервісної ситуації.
    groups:
      - label: "прохання"
        items:
          - "Допоможіть мені"
          - "Покажіть мені бланк"
          - "Підкажіть мені індекс"
      - label: "подяка"
        items:
          - "Дякую вам"
          - "Дякую працівниці"
          - "Щиро дякую"
      - label: "адреса"
        items:
          - "Дорогій сестрі Олені"
          - "Любій бабусі Олені"
workbook:
  - id: act-5
    type: true-false
    title: Перевір поштові фрази
    instruction: Визначте, чи фраза природна для пошти.
    items:
      - statement: "Допоможіть мені, будь ласка."
        answer: true
        explanation: "Це природна ввічлива просьба."
      - statement: "Допоможіть мене, будь ласка."
        answer: false
        explanation: "Потрібно: мені."
      - statement: "Дякую вам."
        answer: true
        explanation: "Коротка природна подяка."
      - statement: "Я хочу надіслати листа сестрі."
        answer: true
        explanation: "Одержувач стоїть у давальному."
      - statement: "Я хочу надіслати листа сестру."
        answer: false
        explanation: "Потрібно: сестрі."
      - statement: "Дорогому другові Андрію."
        answer: true
        explanation: "Це правильна адресна форма."
      - statement: "Шановний Андрій."
        answer: false
        explanation: "У звертанні для адреси краще давальний: Андрію."
      - statement: "Напишіть одержувачеві коротке повідомлення."
        answer: true
        explanation: "Одержувачеві тут у давальному."
  - id: act-6
    type: error-correction
    title: Виправ сервісну репліку
    instruction: Знайдіть і виправте помилку в кожному реченні.
    items:
      - sentence: "Допоможіть мене, будь ласка."
        error: "мене"
        correction: "мені"
        options:
          - "Допоможіть мені, будь ласка."
          - "Допоможіть мене, будь ласка."
        explanation: "Після допоможіть потрібен давальний."
      - sentence: "Я хочу надіслати листа сестру."
        error: "сестру"
        correction: "сестрі"
        options:
          - "Я хочу надіслати листа сестрі."
          - "Я хочу надіслати листа сестру."
        explanation: "Одержувач листа стоїть у давальному."
      - sentence: "Дякую вас за допомогу."
        error: "вас"
        correction: "вам"
        options:
          - "Дякую вам за допомогу."
          - "Дякую вас за допомогу."
        explanation: "Дякувати керує давальним."
      - sentence: "Покажіть я бланк."
        error: "я"
        correction: "мені"
        options:
          - "Покажіть мені бланк."
          - "Покажіть я бланк."
        explanation: "Після покажіть потрібен давальний."
      - sentence: "Дорогий друг Андрій,"
        error: "Дорогий друг"
        correction: "Дорогому другові"
        options:
          - "Дорогому другові Андрію,"
          - "Дорогий друг Андрій,"
        explanation: "Адресна лінія вживає давальний."
      - sentence: "Напишіть коротке повідомлення одержувач."
        error: "одержувач"
        correction: "одержувачеві"
        options:
          - "Напишіть коротке повідомлення одержувачеві."
          - "Напишіть коротке повідомлення одержувач."
        explanation: "Одержувач у цій моделі стоїть у давальному."
      - sentence: "Шановний пан Петренко,"
        error: "Шановний пан"
        correction: "Шановному панові"
        options:
          - "Шановному панові Петренку,"
          - "Шановний пан Петренко,"
        explanation: "Для адресної лінії краще повна давальна форма: шановному панові Петренку."
      - sentence: "Передайте посилку працівницю."
        error: "працівницю"
        correction: "працівниці"
        options:
          - "Передайте посилку працівниці."
          - "Передайте посилку працівницю."
        explanation: "Передати комусь - давальний."
