inline:
  - id: act-1
    type: fill-in
    title: Подобається кому?
    instruction: Оберіть правильну давальну форму.
    items:
      - sentence: "___ подобається цей фільм."
        answer: "Мені"
        options:
          - "Мені"
          - "Я"
          - "Мене"
        explanation: "Подобатися вимагає давального: мені."
      - sentence: "___ подобається працювати вдома?"
        answer: "Тобі"
        options:
          - "Тобі"
          - "Ти"
          - "Тебе"
        explanation: "Питання до ти: тобі подобається?"
      - sentence: "___ більше подобається чай, ніж кава."
        answer: "Їй"
        options:
          - "Їй"
          - "Вона"
          - "Її"
        explanation: "Для вона потрібна давальна форма їй."
      - sentence: "___ подобається цей маршрут."
        answer: "Нам"
        options:
          - "Нам"
          - "Ми"
          - "Нас"
        explanation: "Для ми потрібна давальна форма нам."
      - sentence: "___ подобаються короткі зустрічі."
        answer: "Їм"
        options:
          - "Їм"
          - "Вони"
          - "Їх"
        explanation: "Для вони потрібна давальна форма їм."
      - sentence: "___ більше подобається читати, ніж дивитися фільм."
        answer: "Йому"
        options:
          - "Йому"
          - "Він"
          - "Його"
        explanation: "Для він потрібна давальна форма йому."
      - sentence: "___ не подобається цей варіант."
        answer: "Мені"
        options:
          - "Мені"
          - "Я"
          - "Мною"
        explanation: "Навіть у запереченні: мені не подобається."
      - sentence: "___ подобається українська музика."
        answer: "Марії"
        options:
          - "Марії"
          - "Марія"
          - "Марію"
        explanation: "Ім'я теж стоїть у давальному: Марії."
  - id: act-2
    type: quiz
    title: Яка сила думки?
    instruction: Оберіть фразу, яка відповідає опису.
    items:
      - question: "М'яка, не повністю впевнена думка"
        options:
          - "Мені здається, що..."
          - "Я переконаний, що..."
          - "Саме так."
        correct: 0
        explanation: "Мені здається пом'якшує позицію."
      - question: "Сильна впевнена думка"
        options:
          - "Я переконана, що..."
          - "Можливо, але..."
          - "Мені здається, що..."
        correct: 0
        explanation: "Переконана показує сильну впевненість."
      - question: "Нейтральне висловлення позиції"
        options:
          - "Я думаю, що..."
          - "Дозвольте не погодитися."
          - "По-перше..."
        correct: 0
        explanation: "Я думаю, що - нейтральна фраза для думки."
      - question: "Офіційніше або сильніше, ніж думаю"
        options:
          - "Я вважаю, що..."
          - "Я не зовсім згоден."
          - "Мені подобається..."
        correct: 0
        explanation: "Вважати звучить чіткіше й офіційніше."
      - question: "Початок структурованого аргументу"
        options:
          - "По-перше..."
          - "Навпаки..."
          - "Цілком погоджуюся."
        correct: 0
        explanation: "По-перше сигналізує першу причину."
      - question: "Причина після думки"
        options:
          - "тому що"
          - "ніж"
          - "будь-хто"
        correct: 0
        explanation: "Тому що вводить причину."
      - question: "Порівняння вподобань"
        options:
          - "більше... ніж..."
          - "ні з ким"
          - "саме так"
        correct: 0
        explanation: "Мені більше подобається X, ніж Y."
      - question: "М'який вступ до іншої позиції"
        options:
          - "Можливо, але..."
          - "Безумовно!"
          - "По-друге..."
        correct: 0
        explanation: "Можливо, але допомагає ввічливо заперечити."
  - id: act-3
    type: match-up
    title: Реакція на думку
    instruction: З'єднайте фразу з функцією.
    pairs:
      - left: "Я згоден."
        right: "пряма згода"
      - left: "Ви маєте рацію."
        right: "ввічлива згода"
      - left: "Це правда, але..."
        right: "часткова згода"
      - left: "З одного боку..."
        right: "перша сторона аргументу"
      - left: "З іншого боку..."
        right: "друга сторона аргументу"
      - left: "Я не зовсім згодна."
        right: "ввічлива незгода"
      - left: "Навпаки, я вважаю..."
        right: "протилежна позиція"
      - left: "Дозвольте не погодитися."
        right: "формальна незгода"
  - id: act-4
    type: group-sort
    title: Яка це частина аргументу?
    instruction: Розподіліть фрази за функціями.
    groups:
      - label: "вподобання"
        items:
          - "Мені більше подобається чай, ніж кава."
          - "Я волію зустрітися в суботу."
          - "Нам подобається цей формат."
          - "Вона воліє коротший маршрут."
      - label: "думка"
        items:
          - "На мою думку, це зручно."
          - "Я вважаю, що це важливо."
          - "Мені здається, що це дорого."
          - "Я переконаний, що це добрий план."
      - label: "згода"
        items:
          - "Я згодна."
          - "Ви маєте рацію."
          - "Саме так."
          - "Цілком погоджуюся."
      - label: "незгода"
        items:
          - "Я не зовсім згоден."
          - "Можливо, але..."
          - "Я думаю інакше."
          - "Дозвольте не погодитися."
workbook:
  - type: error-correction
    title: Виправте фразу думки
    instruction: Оберіть природний український варіант.
    items:
      - sentence: "Я подобається цей фільм."
        error: "Я подобається"
        correction: "Мені подобається цей фільм."
        options:
          - "Мені подобається цей фільм."
          - "Мене подобається цей фільм."
        explanation: "Подобатися потребує давального."
      - sentence: "Я більше люблю кава ніж чай."
        error: "кава ніж чай"
        correction: "Мені більше подобається кава, ніж чай."
        options:
          - "Мені більше подобається кава, ніж чай."
          - "Я більше подобається каву, ніж чай."
        explanation: "Порівняння вподобань: мені більше подобається X, ніж Y."
      - sentence: "Я не згоден. Це погано."
        error: "різка незгода"
        correction: "Я не зовсім згоден, тому що цей варіант дорогий."
        options:
          - "Я не зовсім згоден, тому що цей варіант дорогий."
          - "Ні. Погано."
        explanation: "Ввічлива незгода має причину."
      - sentence: "По-перше, це дешевше. На завершення."
        error: "немає другої причини"
        correction: "По-перше, це дешевше. По-друге, це ближче до дому."
        options:
          - "По-перше, це дешевше. По-друге, це ближче до дому."
          - "По-перше, це дешевше. По-перше, це ближче."
        explanation: "Після по-перше природно додати по-друге."
      - sentence: "Я вибираю про потяг."
        error: "про потяг"
        correction: "Я обираю потяг."
        options:
          - "Я обираю потяг."
          - "Я обираю про потяг."
        explanation: "Обирати вимагає знахідного без прийменника."
      - sentence: "Ви маєте правда."
        error: "маєте правда"
        correction: "Ви маєте рацію."
        options:
          - "Ви маєте рацію."
          - "Ви маєте правду."
        explanation: "Стала фраза: мати рацію."
      - sentence: "Я волію до читати."
        error: "до читати"
        correction: "Я волію читати."
        options:
          - "Я волію читати."
          - "Я волію до читання."
        explanation: "Після воліти може стояти інфінітив."
      - sentence: "На мій думка, це зручно."
        error: "На мій думка"
        correction: "На мою думку, це зручно."
        options:
          - "На мою думку, це зручно."
          - "На моя думка, це зручно."
        explanation: "Стійка форма: на мою думку."
  - type: fill-in
    title: Побудуйте аргумент
    instruction: Оберіть фразу, яка логічно завершує речення.
    items:
      - sentence: "Я обираю потяг, ___ він зручніший."
        answer: "тому що"
        options:
          - "тому що"
          - "ніж"
        explanation: "Потрібна причина."
      - sentence: "Мені більше подобається чай, ___ кава."
        answer: "ніж"
        options:
          - "ніж"
          - "адже"
        explanation: "Для порівняння потрібне ніж."
      - sentence: "___, це дешевше. По-друге, це ближче."
        answer: "По-перше"
        options:
          - "По-перше"
          - "Навпаки"
        explanation: "Це перший пункт аргументу."
      - sentence: "Ти маєш рацію, ___ я бачу інший ризик."
        answer: "але"
        options:
          - "але"
          - "ніж"
        explanation: "Але вводить часткову незгоду."
      - sentence: "___, я вважаю, що фільм слабший за книжку."
        answer: "Навпаки"
        options:
          - "Навпаки"
          - "Цілком"
        explanation: "Навпаки вводить протилежну позицію."
      - sentence: "___ не погодитися: цей формат занадто довгий."
        answer: "Дозвольте"
        options:
          - "Дозвольте"
          - "Подобається"
        explanation: "Дозвольте не погодитися - формальна незгода."
      - sentence: "___, це зручно. З іншого боку, це дорого."
        answer: "З одного боку"
        options:
          - "З одного боку"
          - "На завершення"
        explanation: "Це перша сторона аргументу."
      - sentence: "___, я б обрав коротший маршрут."
        answer: "На мою думку"
        options:
          - "На мою думку"
          - "По-друге"
        explanation: "Фраза вводить позицію мовця."
  - type: quiz
    title: Ввічливо чи різко?
    instruction: Оберіть ввічливішу репліку.
    items:
      - question: "Хтось пропонує дорогий ресторан."
        options:
          - "Я не зовсім згодна, бо це дорого."
          - "Ні, це погано."
        correct: 0
        explanation: "Перша репліка має м'яку незгоду і причину."
      - question: "Ви частково погоджуєтеся з ідеєю."
        options:
          - "Це правда, але є один ризик."
          - "Ти неправий."
        correct: 0
        explanation: "Це правда, але... зберігає контакт."
      - question: "Ви хочете показати дві сторони."
        options:
          - "З одного боку, це зручно. З іншого боку, це дорого."
          - "Це зручно і все."
        correct: 0
        explanation: "Дві сторони роблять думку збалансованою."
      - question: "Ви повністю погоджуєтеся."
        options:
          - "Цілком погоджуюся."
          - "Можливо, але..."
        correct: 0
        explanation: "Цілком погоджуюся - повна згода."
      - question: "Ви хочете запропонувати компроміс."
        options:
          - "Можемо почати з короткого розділу."
          - "Мій варіант єдиний правильний."
        correct: 0
        explanation: "Компроміс пропонує спільний шлях."
      - question: "Ви маєте іншу позицію."
        options:
          - "Я думаю інакше, тому що..."
          - "Ні."
        correct: 0
        explanation: "Інша позиція потребує пояснення."
      - question: "Ви підтримуєте думку іншого."
        options:
          - "Ви маєте рацію."
          - "Дозвольте не погодитися."
        correct: 0
        explanation: "Мати рацію - фраза згоди."
      - question: "Ви завершуєте аргумент."
        options:
          - "На завершення, це спокійніший варіант."
          - "По-перше, це останнє."
        correct: 0
        explanation: "На завершення сигналізує фінальну думку."
