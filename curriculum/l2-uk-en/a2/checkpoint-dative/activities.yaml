inline:
  - id: act-1
    type: quiz
    title: Що тут перевіряємо
    instruction: Оберіть, що саме тренує фраза.
    items:
      - question: "Мені двадцять вісім років."
        options:
          - "вік у моделі з давальним"
          - "місце на пошті"
          - "родовий після без"
        correct: 0
        explanation: "Мені + роки — це модель віку."
      - question: "Моїй новій вчительці."
        options:
          - "узгоджена група в давальному"
          - "називний без змін"
          - "родовий множини"
        correct: 0
        explanation: "Прикметник і іменник узгоджуються в давальному."
      - question: "Їй подобається чай."
        options:
          - "та, кому щось подобається"
          - "об'єкт у знахідному"
          - "місце події"
        correct: 0
        explanation: "Їй — це досвідник у давальному."
      - question: "На пошті мені зручно."
        options:
          - "місце"
          - "одержувач"
          - "відсутність"
        correct: 0
        explanation: "На пошті називає місце, не адресата."
      - question: "Допомагати сестрі."
        options:
          - "дієслово, що керує давальним"
          - "родовий після без"
          - "вік"
        correct: 0
        explanation: "Після допомагати стоїть давальний."
      - question: "Братові."
        options:
          - "чоловічий іменник у давальному"
          - "знахідний множини"
          - "прикметник у місцевому"
        correct: 0
        explanation: "Братові — типова форма чоловічого роду в давальному."
      - question: "Моїм друзям."
        options:
          - "давальний множини з узгодженням"
          - "родовий однини"
          - "називний множини"
        correct: 0
        explanation: "Моїм друзям — повна дативна форма множини."
      - question: "Мені потрібно відправити листа."
        options:
          - "безособова модель"
          - "діалог про місце"
          - "родовий після кількості"
        correct: 0
        explanation: "Мені потрібно — типова безособова конструкція."
      - question: "Мені холодно."
        options:
          - "безособовий стан з давальним"
          - "місце на пошті"
          - "знахідний прямий об'єкт"
        correct: 0
        explanation: "Людина, якій холодно, стоїть у давальному."
      - question: "Я бачу брата."
        options:
          - "знахідний, не давальний"
          - "давальний одержувач"
          - "місцевий контекст"
        correct: 0
        explanation: "Бачити кого? - брата, тобто це не давальний."
  - id: act-2
    type: fill-in
    title: Вибери форму
    instruction: Оберіть правильне слово або словосполучення.
    items:
      - sentence: "Я дякую ___ сестрі за пораду."
        answer: "моїй"
        options:
          - "моїй"
          - "мою"
          - "моя"
        explanation: "Сестрі — давальний, а прикметник має бути в давальному."
      - sentence: "Пані Оксано, ___ потрібен бланк."
        answer: "вам"
        options:
          - "вам"
          - "вас"
          - "вашими"
        explanation: "Потрібен адресат у давальному."
      - sentence: "___ подобається цей сервіс."
        answer: "Мені"
        options:
          - "Мені"
          - "Мене"
          - "Мною"
        explanation: "Мені — досвідник у давальному."
      - sentence: "Я допомагаю ___ працівникові."
        answer: "новому"
        options:
          - "новому"
          - "нового"
          - "новим"
        explanation: "Новому працівникові — давальний з узгодженням."
      - sentence: "___ двадцять шість років."
        answer: "Мені"
        options:
          - "Мені"
          - "Мене"
          - "Мною"
        explanation: "Вік у цій моделі теж стоїть із давальним."
      - sentence: "Я надсилаю посилку ___ подрузі."
        answer: "своїй"
        options:
          - "своїй"
          - "свою"
          - "своя"
        explanation: "Подрузі потрібен давальний, і займенник теж узгоджується."
      - sentence: "Я телефоную ___ братові."
        answer: "моєму"
        options:
          - "моєму"
          - "мою"
          - "моїм"
        explanation: "Братові — давальний, а займенник має бути в тій самій формі."
      - sentence: "___ пошті я отримую листа."
        answer: "На"
        options:
          - "На"
          - "До"
          - "З"
        explanation: "Тут потрібне місце, а не адресат."
      - sentence: "Я хочу подарувати книжку ___ братові."
        answer: "моєму"
        options:
          - "моєму"
          - "мого"
          - "мій"
        explanation: "Моєму братові - узгоджена давальна група."
      - sentence: "Потрібно надіслати листа ___ вчительці."
        answer: "новій"
        options:
          - "новій"
          - "нову"
          - "нова"
        explanation: "Новій вчительці - давальний після дії надсилання."
  - id: act-3
    type: match-up
    title: Форма і функція
    instruction: Зіставте фразу з її роллю.
    pairs:
      - left: "мені"
        right: "особовий займенник у давальному"
      - left: "сестрі"
        right: "іменник жіночого роду в давальному"
      - left: "братові"
        right: "іменник чоловічого роду в давальному"
      - left: "моїй новій наставниці"
        right: "узгоджена група в давальному"
      - left: "допомагати"
        right: "керує давальним"
      - left: "подобається"
        right: "досвідник у давальному"
      - left: "двадцять п'ять років"
        right: "вік"
      - left: "на пошті"
        right: "місце / місцевий"
      - left: "подарувати книжку подрузі"
        right: "подарунок + одержувач у давальному"
      - left: "надіслати листа бабусі"
        right: "сервісна дія + одержувач"
  - id: act-4
    type: error-correction
    title: Виправте речення
    instruction: Оберіть правильний варіант речення.
    items:
      - sentence: "Я дякую мою сестру за допомогу."
        error: "мою сестру"
        correction: "моїй сестрі"
        options:
          - "моїй сестрі"
          - "мою сестру"
        explanation: "Після дякувати потрібен давальний."
      - sentence: "Мені подобаються цей чай."
        error: "подобаються"
        correction: "подобається"
        options:
          - "подобається"
          - "подобаються"
        explanation: "Чай — один предмет, тому форма однини."
      - sentence: "На пошти я відправляю листа."
        error: "пошти"
        correction: "пошті"
        options:
          - "пошті"
          - "пошти"
        explanation: "Тут має бути місце з правильним місцевим закінченням."
      - sentence: "Вона допомагає новий працівник."
        error: "новий працівник"
        correction: "новому працівникові"
        options:
          - "новому працівникові"
          - "новий працівник"
        explanation: "Після допомагає потрібен давальний."
      - sentence: "Тобі двадцять сім рік."
        error: "рік"
        correction: "років"
        options:
          - "років"
          - "рік"
        explanation: "У моделі віку потрібна форма років."
      - sentence: "Подаруйте книжку нашій старший вчительці."
        error: "старший"
        correction: "старшій"
        options:
          - "старшій"
          - "старший"
        explanation: "Прикметник теж має бути в давальному."
      - sentence: "Я телефоную моєму брата."
        error: "брата"
        correction: "братові"
        options:
          - "братові"
          - "брата"
        explanation: "Після телефоную потрібен давальний."
      - sentence: "Йому подобаються ця нова послуга."
        error: "подобаються"
        correction: "подобається"
        options:
          - "подобається"
          - "подобаються"
        explanation: "Одна послуга — одна форма присудка."
      - sentence: "Мені холодний."
        error: "холодний"
        correction: "холодно"
        options:
          - "холодно"
          - "холодний"
        explanation: "Для стану людини потрібна безособова форма холодно."
      - sentence: "Я хочу подарувати книжку мою подругу."
        error: "мою подругу"
        correction: "моїй подрузі"
        options:
          - "моїй подрузі"
          - "мою подругу"
        explanation: "Одержувач подарунка стоїть у давальному."
workbook:
  - type: true-false
    title: Швидка перевірка
    instruction: Позначте, чи речення правильне.
    items:
      - statement: "Мені двадцять вісім років."
        correct: true
        explanation: "Модель віку тут правильна."
      - statement: '«На пошті» називає місце.'
        correct: true
        explanation: "Це місце, а не адресат."
      - statement: '«Допомагати» керує знахідним відмінком.'
        correct: false
        explanation: "Допомагати керує давальним."
      - statement: '«Моїй новій вчительці» — це узгоджена дативна група.'
        correct: true
        explanation: "Прикметник і іменник стоять у давальному."
      - statement: "Йому подобається ця книжка."
        correct: true
        explanation: "Це природна модель з давальним досвідника."
      - statement: '«Братові» — форма чоловічого роду в давальному.'
        correct: true
        explanation: "Так, це типова дативна форма."
      - statement: '«У відділенні» — це дативний адресат.'
        correct: false
        explanation: "Це місце, тобто місцевий контекст."
      - statement: '«Їм» — форма множини в давальному.'
        correct: true
        explanation: "Їм — одна з базових форм займенника в давальному."
