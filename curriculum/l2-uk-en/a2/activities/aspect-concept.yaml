- id: match-up-aspect-pairs-vocab
  type: match-up
  instruction: З'єднайте українські видові пари з їхнім англійським перекладом.
  pairs:
  - left: робити / зробити
    right: to do (process / result)
  - left: читати / прочитати
    right: to read
  - left: писати / написати
    right: to write
  - left: купувати / купити
    right: to buy
  - left: прибирати / прибрати
    right: to clean
  - left: дивитися / подивитися
    right: to watch / to look
  - left: допомагати / допомогти
    right: to help
  - left: грати / зіграти
    right: to play
- id: odd-one-out-aspect-groups
  type: odd-one-out
  instruction: Знайдіть зайве слово в кожному рядку (Зверніть увагу на вид дієслова!).
  items:
  - words:
    - робити
    - читати
    - написати
    - купувати
    correct: 2
    explanation: «написати» — це доконаний вид, інші слова — недоконаний вид.
  - words:
    - зробити
    - прибрати
    - забити
    - грати
    correct: 3
    explanation: «грати» — недоконаний вид, інші слова позначають результат.
  - words:
    - пити
    - бачити
    - дивитися
    - подивитися
    correct: 3
    explanation: «подивитися» — доконаний вид, інші дієслова — процеси.
  - words:
    - прочитати
    - купити
    - допомагати
    - передати
    correct: 2
    explanation: «допомагати» — недоконаний вид.
  - words:
    - завжди
    - часто
    - щодня
    - раптом
    correct: 3
    explanation: «раптом» — маркер доконаного виду (раптової дії), інші — маркери
      повторення.
  - words:
    - нарешті
    - вже
    - довго
    - щойно
    correct: 2
    explanation: «довго» — маркер процесу, інші слова позначають результат.
  - words:
    - результат
    - фінал
    - кінець
    - процес
    correct: 3
    explanation: «процес» позначає тривалу дію.
  - words:
    - тривалий
    - одноразовий
    - постійний
    - регулярний
    correct: 1
    explanation: «одноразовий» позначає щось, що сталося один раз і має результат.
- id: error-correction-workbook-advanced
  type: error-correction
  instruction: Знайдіть і виправте помилку у використанні виду дієслова.
  items:
  - sentence: Я вже три години прочитав цю статтю.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - прочитаю
    - читати
    explanation: Фраза «три години» вказує на тривалий процес (недоконаний вид).
  - sentence: Він нарешті робив своє завдання до кінця.
    error: робив
    correction: зробив
    error_type: word
    options:
    - зробив
    - робити
    - робить
    explanation: Слово «нарешті» означає фінальний результат (доконаний вид).
  - sentence: Учора я довго написав цей лист.
    error: написав
    correction: писав
    error_type: word
    options:
    - писав
    - напише
    - писати
    explanation: Слово «довго» показує процес у минулому (недоконаний вид).
  - sentence: Моя сестра завжди приготувала смачну каву.
    error: приготувала
    correction: готує
    error_type: word
    options:
    - готує
    - приготує
    - готувати
    explanation: Слово «завжди» — це регулярна дія (недоконаний вид).
  - sentence: Ми зараз подивилися телевізор у кімнаті.
    error: подивилися
    correction: дивимося
    error_type: word
    options:
    - дивимося
    - подивимося
    - дивитися
    explanation: Дія відбувається «зараз», це процес. Доконаний вид не має теперішнього
      часу.
  - sentence: Кожного ранку мій брат випив чорну каву.
    error: випив
    correction: п'є
    error_type: word
    options:
    - п'є
    - пив
    - вип'є
    explanation: «Кожного ранку» — це звичка, постійне повторення (недоконаний вид).
  - sentence: Футболіст раптом забивав красивий гол.
    error: забивав
    correction: забив
    error_type: word
    options:
    - забив
    - забиває
    - забити
    explanation: Слово «раптом» вимагає швидкої, одноразової дії з результатом (доконаний
      вид).
  - sentence: Вона щодня прибрала свою кімнату, тому там чисто.
    error: прибрала
    correction: прибирає
    error_type: word
    options:
    - прибирає
    - прибере
    - прибирати
    explanation: «Щодня» — це регулярне повторення (недоконаний вид).
