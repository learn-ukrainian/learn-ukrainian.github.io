  instruction: Доповніть видові пари (вставте дієслово доконаного або недоконаного
    виду у початковій формі).
  items:
  - sentence: робити — ____
    answer: зробити
    options:
    - зробити
    - робить
    - робив
  - sentence: читати — ____
    answer: прочитати
    options:
    - прочитати
    - читає
    - читав
  - sentence: писати — ____
    answer: написати
    options:
    - написати
    - пише
    - писав
  - sentence: ____ — прибрати
    answer: прибирати
    options:
    - прибирати
    - прибирає
    - прибирав
  - sentence: ____ — купити
    answer: купувати
    options:
    - купувати
    - купує
