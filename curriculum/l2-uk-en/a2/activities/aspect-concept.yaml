- id: translate-aspect-focus
  type: translate
  instruction: Оберіть правильний переклад речення, звертаючи увагу на вид дієслова.
  items:
  - source: I was reading a book yesterday.
    options:
    - text: Учора я читав книгу.
      correct: true
    - text: Учора я прочитав книгу.
      correct: false
    - text: Учора я читаю книгу.
      correct: false
    - text: Учора я прочитаю книгу.
      correct: false
  - source: I finally read the book to the end.
    options:
    - text: Я нарешті прочитав книгу до кінця.
      correct: true
    - text: Я нарешті читав книгу до кінця.
      correct: false
    - text: Я нарешті читаю книгу до кінця.
      correct: false
    - text: Я нарешті прочитаю книгу до кінця.
      correct: false
  - source: He was doing his homework.
    options:
    - text: Він робив домашнє завдання.
      correct: true
    - text: Він зробив домашнє завдання.
      correct: false
    - text: Він робить домашнє завдання.
      correct: false
    - text: Він зробити домашнє завдання.
      correct: false
  - source: He has already done his homework.
    options:
    - text: Він вже зробив домашнє завдання.
      correct: true
    - text: Він вже робив домашнє завдання.
      correct: false
    - text: Він вже робить домашнє завдання.
      correct: false
    - text: Він вже робитиме домашнє завдання.
      correct: false
  - source: They always buy fresh vegetables.
    options:
    - text: Вони завжди купують свіжі овочі.
      correct: true
    - text: Вони завжди купили свіжі овочі.
      correct: false
    - text: Вони завжди куплять свіжі овочі.
      correct: false
    - text: Вони завжди купувати свіжі овочі.
      correct: false
  - source: She was cleaning her room for a long time.
    options:
    - text: Вона довго прибирала свою кімнату.
      correct: true
    - text: Вона довго прибрала свою кімнату.
      correct: false
    - text: Вона довго прибирає свою кімнату.
      correct: false
    - text: Вона довго прибере свою кімнату.
      correct: false
  - source: Look, he is running fast!
    options:
    - text: Дивись, він швидко біжить!
      correct: true
    - text: Дивись, він швидко побіг!
      correct: false
    - text: Дивись, він швидко бігав!
      correct: false
    - text: Дивись, він швидко побіжить!
      correct: false
  - source: My sister has already cooked a delicious dinner.
    options:
    - text: Моя сестра вже приготувала смачну вечерю.
      correct: true
    - text: Моя сестра готувала смачну вечерю.
      correct: false
    - text: Моя сестра готує смачну вечерю.
      correct: false
    - text: Моя сестра приготує смачну вечерю.
      correct: false
- id: fill-in-aspect-missing-pair
