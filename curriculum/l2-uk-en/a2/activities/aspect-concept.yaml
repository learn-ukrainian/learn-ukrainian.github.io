version: '1.0'
module: aspect-concept
level: a2
inline: []
workbook:
- type: quiz
  instruction: 'Визначте вид дієслова у реченні: НВ (недоконаний) чи ДВ (доконаний)?'
  items:
  - question: Він біжить так швидко!
    options:
    - НВ (недоконаний)
    - ДВ (доконаний)
    correct: 0
  - question: Він передав м'яч!
    options:
    - НВ (недоконаний)
    - ДВ (доконаний)
    correct: 1
  - question: Вони грають добре сьогодні.
    options:
    - НВ (недоконаний)
    - ДВ (доконаний)
    correct: 0
  - question: О, вона забила гол!
    options:
    - НВ (недоконаний)
    - ДВ (доконаний)
    correct: 1
  - question: Ми щодня робили вправи.
    options:
    - НВ (недоконаний)
    - ДВ (доконаний)
    correct: 0
  - question: Він зробив домашнє завдання.
    options:
    - НВ (недоконаний)
    - ДВ (доконаний)
    correct: 1
  - question: Вона часто дзвонила бабусі.
    options:
    - НВ (недоконаний)
    - ДВ (доконаний)
    correct: 0
  - question: Нарешті! Ми виграли матч!
    options:
    - НВ (недоконаний)
    - ДВ (доконаний)
    correct: 1
- type: fill-in
  instruction: Оберіть правильну форму дієслова.
  items:
  - sentence: Вона довго _____ листа.
    answer: писала
    options:
    - писала
    - написала
    - пише
  - sentence: Телефон раптом _____.
    answer: задзвонив
    options:
    - дзвонив
    - задзвонив
    - дзвонитиме
  - sentence: Щодня я _____ нові слова.
    answer: вчив
    options:
    - вчив
    - вивчив
    - вчитиму
  - sentence: Нарешті вона _____ задачу.
    answer: зрозуміла
    options:
    - розуміла
    - зрозуміла
    - розуміє
  - sentence: Коли задзвонив телефон, я _____ книгу.
    answer: читав
    options:
    - читав
    - прочитав
    - прочитаю
  - sentence: Він за тиждень _____ цю книгу.
    answer: прочитав
    options:
    - читав
    - прочитав
    - читає
  - sentence: Вона завжди _____ перед сном.
    answer: читає
    options:
    - читає
    - прочитає
    - прочитала
  - sentence: Вчора я _____ домашнє завдання.
    answer: зробив
    options:
    - робив
    - зробив
    - роблю
- type: match-up
  instruction: З'єднайте речення з правильною формою дієслова.
  pairs:
  - left: Він _____ листа три години.
    right: писав
  - left: Вона нарешті _____ листа!
    right: написала
  - left: Ми _____ книгу за тиждень.
    right: прочитали
  - left: Щодня я _____ нові слова.
    right: вчив
  - left: Вчора він _____ домашнє завдання.
    right: зробив
  - left: Вона завжди _____ перед сном.
    right: читала
  - left: Раптом телефон _____.
    right: задзвонив
  - left: Борщ готовий — мама його _____.
    right: зварила
- type: error-correction
  instruction: Знайдіть і виправте помилку у виборі виду дієслова.
  items:
  - sentence: Він щодня зробив вправи.
    error: зробив
    correction: робив
    error_type: word
    options:
    - робив
    - зробить
    - зробити
    explanation: '«Щодня» вказує на повторення — потрібен НВ: «робив».'
  - sentence: Вона довго написала листа.
    error: написала
    correction: писала
    error_type: word
    options:
    - писала
    - пише
    - написала
    explanation: '«Довго» підкреслює тривалість процесу — потрібен НВ: «писала».'
  - sentence: Вони часто прочитали книги.
    error: прочитали
    correction: читали
    error_type: word
    options:
    - читали
    - прочитали
    - прочитають
    explanation: '«Часто» вказує на звичну повторювану дію — потрібен НВ: «читали».'
  - sentence: Вона нарешті писала листа!
    error: писала
    correction: написала
    error_type: word
    options:
    - написала
    - пише
    - писала
    explanation: '«Нарешті» вказує на завершення — потрібен ДВ: «написала».'
  - sentence: Я завжди прочитав перед сном.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - читаю
    - прочитав
    explanation: '«Завжди» означає звичку — потрібен НВ: «читав».'
  - sentence: Він за тиждень читав цю книгу.
    error: читав
    correction: прочитав
    error_type: word
    options:
    - прочитав
    - читає
    - читав
    explanation: '«За тиждень» вказує на завершення у конкретний термін — потрібен
      ДВ: «прочитав».'
- type: group-sort
  instruction: Розподіліть дієслова за видом.
  groups:
  - label: НВ (недоконаний вид)
    items:
    - читати
    - писати
    - робити
    - вчити
    - варити
    - дзвонити
  - label: ДВ (доконаний вид)
    items:
    - прочитати
    - написати
    - зробити
    - вивчити
    - зварити
    - задзвонити
- type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Недоконаний вид описує дію як процес або повторення.
    correct: true
    explanation: 'Правда. НВ відповідає на питання: що відбувалося? як довго? як часто?'
  - statement: Доконаний вид має справжній теперішній час в українській мові.
    correct: false
    explanation: 'Ні. Тільки НВ має теперішній час. ДВ у формі теперішнього часу означає
      майбутнє: «прочитаю» = «я прочитаю (у майбутньому)».'
  - statement: Слово «часто» є сигналом недоконаного виду.
    correct: true
    explanation: Правда. «Часто» вказує на повторення — це завжди НВ.
  - statement: «Він щодня зробив вправи» — це правильне речення.
    correct: false
    explanation: 'Ні. «Щодня» = повторення = НВ. Правильно: «Він щодня робив вправи.»'
  - statement: Слово «раптом» вказує на доконаний вид.
    correct: true
    explanation: Правда. «Раптом» вказує на одиничну миттєву подію — це ДВ.
  - statement: Вид дієслова і граматичний час — це одне й те саме.
    correct: false
    explanation: 'Ні. Час — це коли (вчора, зараз, завтра). Вид — це як: процес чи
      результат.'
