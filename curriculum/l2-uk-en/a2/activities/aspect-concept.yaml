version: '1.0'
module: aspect-concept
level: a2
workbook:
- id: quiz-aspect-sorting
  type: quiz
  instruction: Визначте вид дієслова або фокус дії
  items:
  - question: Який фокус має недоконаний вид дієслова?
    options:
    - Процес або повторення
    - Тільки результат
    - Одноразова дія
    - Завершена дія
    correct: 0
  - question: Який вид дієслова показує завершений результат?
    options:
    - Доконаний вид
    - Недоконаний вид
    - Обидва види
    - Жоден з них
    correct: 0
  - question: Яке з цих слів — маркер недоконаного виду (процесу)?
    options:
    - Часто
    - Раптом
    - Нарешті
    - Вже
    correct: 0
  - question: Яке з цих слів — маркер доконаного виду (результату)?
    options:
    - Вже
    - Завжди
    - Довго
    - Зазвичай
    correct: 0
  - question: Дієслово «зробити» — це який вид?
    options:
    - Доконаний
    - Недоконаний
    - Тривалий
    - Процес
    correct: 0
  - question: У якому часі доконаний вид НЕ існує?
    options:
    - У теперішньому
    - У минулому
    - У майбутньому
    - Він існує у всіх часах
    correct: 0
  - question: Дієслово «читати» — це який вид?
    options:
    - Недоконаний
    - Доконаний
    - Завершений
    - Одноразовий
    correct: 0
  - question: Що найкраще описує концепцію доконаного виду?
    options:
    - Це як фотографія результату
    - Це як довге відео
    - Це дія без кінця
    - Це щоденна звичка
    correct: 0
- id: fill-in-aspect
  type: fill-in
  instruction: Оберіть правильну форму дієслова за контекстом
  items:
  - sentence: Вчора ввечері я ____ книгу дві години.
    answer: читав
    options:
    - читав
    - прочитав
    - читаю
  - sentence: Ми часто ____ хліб тут.
    answer: купуємо
    options:
    - купуємо
    - купили
    - купимо
  - sentence: Він щойно ____ м'яч у центр.
    answer: передав
    options:
    - передавав
    - передав
    - передасть
  - sentence: Зазвичай я ____ вдома.
    answer: працюю
    options:
    - працюю
    - попрацюю
    - працював
  - sentence: Вона вже ____ домашнє завдання.
    answer: зробила
    options:
    - робила
    - зробила
    - зроблю
  - sentence: Раптом він ____.
    answer: впав
    options:
    - падав
    - впав
    - падає
  - sentence: Щодня я ____ вправи.
    answer: роблю
    options:
    - роблю
    - зроблю
    - зробив
  - sentence: Вона нарешті ____ це правило.
    answer: зрозуміла
    options:
    - розуміла
    - зрозуміла
    - розуміє
- id: match-up-aspect-context
  type: match-up
  instruction: З'єднайте частину речення з правильним дієсловом
  pairs:
  - left: Щодня він...
    right: робить вправи
  - left: Вчора він нарешті...
    right: зробив завдання
  - left: Ми часто...
    right: читаємо
  - left: Я вже...
    right: прочитав книгу
  - left: Раптом кіт...
    right: впав
  - left: Вони довго...
    right: працювали
  - left: Зазвичай я...
    right: купую хліб
  - left: Вона щойно...
    right: написала листа
- id: error-correction-aspect
  type: error-correction
  instruction: Знайдіть і виправте помилку у виборі виду дієслова
  items:
  - sentence: Я щодня зробив вправи.
    error: зробив
    correction: роблю
    error_type: word
    options:
    - роблю
    - робив
    - зроблю
    explanation: Маркер «щодня» означає повторення, тому потрібен недоконаний вид.
  - sentence: Вона довго написала листа.
    error: написала
    correction: писала
    error_type: word
    options:
    - писала
    - пише
    - напише
    explanation: Маркер «довго» показує тривалий процес, потрібен недоконаний вид.
  - sentence: Я вже робив це завдання, ось результат.
    error: робив
    correction: зробив
    error_type: word
    options:
    - зробив
    - роблю
    - зроблю
    explanation: Маркер «вже» і наявність результату вимагають доконаного виду.
  - sentence: Зазвичай ми купили хліб тут.
    error: купили
    correction: купуємо
    error_type: word
    options:
    - купуємо
    - купували
    - купимо
    explanation: Маркер «зазвичай» вказує на звичку, потрібен недоконаний вид (теперішній
      час).
  - sentence: Раптом він падав.
    error: падав
    correction: впав
    error_type: word
    options:
    - впав
    - падає
    - впаде
    explanation: Маркер «раптом» описує швидку одноразову дію (доконаний вид).
  - sentence: Вчора весь день я попрацювала.
    error: попрацювала
    correction: працювала
    error_type: word
    options:
    - працювала
    - працюю
    - попрацюю
    explanation: Маркер «весь день» робить акцент на тривалому процесі (недоконаний
      вид).
