version: '1.0'
module: aspect-concept
level: a2
inline:
- id: quiz-aspect-sorting
  type: quiz
  instruction: Оберіть правильне дієслово за контекстом (процес чи результат).
  items:
  - question: Я ____ книгу дві години.
    options:
    - читав
    - прочитав
    - прочитаю
    - прочитали
    correct: 0
  - question: Він нарешті ____ цікаву статтю.
    options:
    - писав
    - пишуть
    - написав
    - писатиме
    correct: 2
  - question: Моя сестра щодня ____ кімнату.
    options:
    - прибере
    - прибирає
    - прибрала
    - прибрати
    correct: 1
  - question: Ми довго ____ про футбол.
    options:
    - говорили
    - поговорили
    - поговорити
    - поговорять
    correct: 0
  - question: Завтра я ____ нову машину.
    options:
    - купую
    - купував
    - купуватиму
    - куплю
    correct: 3
  - question: Він завжди ____ свіжі новини.
    options:
    - прочитає
    - читає
    - прочитав
    - прочитати
    correct: 1
  - question: Вона вже ____ смачну вечерю.
    options:
    - готувала
    - готує
    - приготувала
    - готуватиме
    correct: 2
  - question: Зараз ми ____ цікавий матч.
    options:
    - подивимося
    - дивимося
    - подивилися
    - дивилися
    correct: 1
- id: fill-in-identify-the-aspect-in-sentences
  type: fill-in
  instruction: Вставте правильне дієслово (недоконаний або доконаний вид).
  items:
  - sentence: Учора я цілий вечір ____ книгу.
    answer: читав
    options:
    - читав
    - прочитав
    - читає
  - sentence: Сьогодні вранці я нарешті ____ цю книгу.
    answer: прочитав
    options:
    - читав
    - прочитав
    - читаю
  - sentence: Наш футболіст щойно ____ красивий гол!
    answer: забив
    options:
    - забивав
    - забив
    - забиває
  - sentence: Мій брат завжди ____ свіжі овочі на ярмарку.
    answer: купує
    options:
    - купить
    - купив
    - купує
  - sentence: Ми ____ в парку дві години, бо була чудова погода.
    answer: гуляли
    options:
    - гуляли
    - погуляли
    - гуляють
  - sentence: Раптом він ____ мені новий м'яч.
    answer: передав
    options:
    - передавав
    - передав
    - передає
  - sentence: Мама часто ____ смачну вечерю.
    answer: готує
    options:
    - готує
    - приготує
    - приготувала
  - sentence: Учень швидко ____ це складне завдання.
    answer: зробив
    options:
    - робив
    - зробив
    - робить
- id: match-up-choose-the-correct-aspect-context-based
  type: match-up
  instruction: З'єднайте частини речень.
  pairs:
  - left: Він довго писав...
    right: '...але ще не написав лист.'
  - left: Вона вже написала...
    right: '...довгий і цікавий лист.'
  - left: Я завжди купую...
    right: '...свіжі продукти тут.'
  - left: Я раптом купив...
    right: '...дуже дорогу книгу.'
  - left: Ми зараз дивимося...
    right: '...футбольний матч.'
  - left: Ми нарешті подивилися...
    right: '...цей новий фільм.'
  - left: Вони щодня роблять...
    right: '...ранкову зарядку.'
  - left: Вони вже зробили...
    right: '...своє завдання.'
workbook:
- id: true-false-aspect-theory
  type: true-false
  instruction: Правда чи ні? Визначте правильні твердження про вид дієслова.
  items:
  - statement: Слово «щодня» часто вказує на недоконаний вид.
    correct: true
  - statement: Дієслова доконаного виду мають теперішній час.
    correct: false
    explanation: Доконаний вид не може відбуватися прямо зараз, це завжди результат.
      Тому він використовує майбутній або минулий час.
  - statement: «Процес» — це головне значення недоконаного виду.
    correct: true
  - statement: Слово «раптом» або «нарешті» зазвичай вимагає доконаного виду.
    correct: true
  - statement: Слово «читати» показує фінальний результат.
    correct: false
    explanation: Читати — це процес. Фінальний результат — це слово «прочитати».
  - statement: «Я довго прибирав кімнату» означає, що кімната вже чиста.
    correct: false
    explanation: Недоконаний вид показує лише процес (прибирав). Ми не знаємо, який
      фінальний результат.
  - statement: Префікс (наприклад, на-, про-, з-) часто перетворює дієслово на доконаний
      вид.
    correct: true
  - statement: «Він забив гол» — це приклад тривалого процесу.
    correct: false
    explanation: Забити гол — це швидка дія і результат (доконаний вид).
- id: group-sort-aspect-pairs
  type: group-sort
  instruction: Розподіліть дієслова за видом.
  groups:
  - label: Недоконаний вид (процес / повторення)
    items:
    - робити
    - читати
    - писати
    - купувати
    - дивитися
  - label: Доконаний вид (результат)
    items:
    - зробити
    - прочитати
    - написати
    - купити
    - подивитися
