inline:
- id: fill-in-reading-comprehension
  type: fill-in
  instruction: Вставте правильне слово
  items:
  - sentence: Курс української мови починається п'ятнадцятого _____.
    answer: травня
    options:
    - квітня
    - травня
    - червня
    - серпня
  - sentence: Ранкова група займається о _____ годині.
    answer: десятій
    options:
    - сьомій
    - дев'ятій
    - десятій
    - першій
  - sentence: Вартість курсу становить дві _____ гривень за місяць.
    answer: тисячі
    options:
    - сотні
    - тисячі
    - тисяч
    - сотень
  - sentence: Андрій переїхав до Києва і працює в _____.
    answer: ІТ-компанії
    options:
    - школі
    - лікарні
    - ІТ-компанії
    - кафе
  - sentence: У неділю Андрій хоче поїхати за _____.
    answer: місто
    options:
    - кордон
    - місто
    - парком
    - містом
  - sentence: На Святвечір на столі має бути _____ пісних страв.
    answer: дванадцять
    options:
    - сім
    - десять
    - дванадцять
    - двадцять
  - sentence: Головна страва вечора, яку готують із пшениці та меду, — це _____.
    answer: кутя
    options:
    - борщ
    - кутя
    - вареники
    - узвар
  - sentence: Різдвяні пісні, які співають на Святвечір, називаються _____.
    answer: колядки
    options:
    - веснянки
    - щедрівки
    - колядки
    - вірші
- id: quiz-mixed-grammar
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: У мене немає _____ на відпочинок.
    options:
    - часу
    - час
    - часом
    - часі
    correct: 0
  - question: Завтра я йду до _____.
    options:
    - школи
    - школа
    - школу
    - школою
    correct: 0
  - question: Моя нова квартира знаходиться в _____.
    options:
    - центр
    - центру
    - центрі
    - центром
    correct: 2
  - question: Я бачу свого _____.
    options:
    - друг
    - другові
    - другом
    - друга
    correct: 3
  - question: Вчора Марія _____ мені правду.
    options:
    - сказав
    - сказала
    - сказали
    - сказало
    correct: 1
  - question: Наступного тижня я буду _____ іспит.
    options:
    - склав
    - складати
    - складаю
    - складе
    correct: 1
  - question: Він бере _____ зошит, а не мій.
    options:
    - свій
    - себе
    - моя
    - твоє
    correct: 0
  - question: Цей поїзд _____, ніж автобус.
    options:
    - швидкий
    - швидший
    - більш швидший
    - самий швидкий
    correct: 1
- id: true-false-grammar-accuracy
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Я йду в магазин.
    correct: true
    explanation: Прийменник «в/у» + знахідний відмінок для напрямку (куди?).
  - statement: Ми будемо працювати без перерва.
    correct: false
    explanation: 'Після прийменника «без» завжди використовуємо родовий відмінок:
      без перерви.'
  - statement: Сонце зійшла.
    correct: false
    explanation: Слово «сонце» — середнього роду, тому в минулому часі правильно «зійшло».
  - statement: Хтось стукає у двері.
    correct: true
    explanation: Неозначений займенник «хтось» вжито правильно для невідомої особи.
  - statement: Ця ідея набагато краща.
    correct: true
    explanation: Ступінь порівняння прикметника утворено правильно.
  - statement: Я бачу великого парка.
    correct: false
    explanation: 'Слово «парк» — неістота, тому в знахідному відмінку має форму називного:
      бачу великий парк.'
  - statement: Вони будуть писати довгий лист.
    correct: true
    explanation: 'Складений майбутній час утворено правильно: будуть + інфінітив.'
  - statement: Я дам тобі книгу.
    correct: true
    explanation: Форма неправильного дієслова «дати» у майбутньому часі (я дам) утворена
      правильно.
