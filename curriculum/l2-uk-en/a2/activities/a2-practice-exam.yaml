- id: true-false-reading-workbook
  type: true-false
  instruction: Правда чи ні? (За текстами з частини 1)
  items:
  - statement: Курс української мови починається п'ятнадцятого травня.
    correct: true
    explanation: Так, в оголошенні вказано саме цю дату.
  - statement: Заняття на курсі проходять два рази на тиждень.
    correct: false
    explanation: 'Ні, заняття проходять тричі на тиждень: у понеділок, середу та п''ятницю.'
  - statement: Перше заняття на мовних курсах коштує 2000 гривень.
    correct: false
    explanation: Ні, перше пробне заняття абсолютно безкоштовне.
  - statement: Андрій переїхав до Львова.
    correct: false
    explanation: Ні, Андрій переїхав до Києва.
  - statement: У неділю Андрій хоче поїхати за місто.
    correct: true
    explanation: Так, він планує побути на природі.
  - statement: Головна страва на Святвечір — це кутя.
    correct: true
    explanation: Так, це солодка пшенична каша з медом.
