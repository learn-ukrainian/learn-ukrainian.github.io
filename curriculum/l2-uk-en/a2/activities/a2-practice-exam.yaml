version: '1.0'
module: a2-practice-exam
level: a2
inline:
- id: fill-in-reading-comprehension
  type: fill-in
  instruction: Прочитайте тексти та вставте правильне слово
  items:
  - sentence: Курси української мови починаються _____ травня.
    answer: п'ятнадцятого
    options:
    - п'ятого
    - п'ятнадцятого
    - десятого
    - двадцятого
  - sentence: Перше пробне заняття на мовних курсах абсолютно _____.
    answer: безкоштовне
    options:
    - дороге
    - дешеве
    - безкоштовне
    - цікаве
  - sentence: Андрій переїхав до міста _____, тому що знайшов там нову роботу.
    answer: Києва
    options:
    - Львова
    - Одеси
    - Києва
    - Харкова
  - sentence: Андрій працює в _____ компанії в центрі міста.
    answer: ІТ
    options:
    - торговій
    - ІТ
    - будівельній
    - туристичній
  - sentence: У Святвечір на столі має бути _____ пісних страв.
    answer: дванадцять
    options:
    - дві
    - сім
    - десять
    - дванадцять
  - sentence: Головна страва різдвяного вечора — це _____.
    answer: кутя
    options:
    - борщ
    - кутя
    - вареники
    - риба
  - sentence: Різдвяні пісні, які співає родина, називаються _____.
    answer: колядки
    options:
    - казки
    - вірші
    - колядки
    - діалоги
  - sentence: Вартість курсу становить _____ тисячі гривень за місяць.
    answer: дві
    options:
    - одна
    - дві
    - три
    - п'ять
- id: quiz-mixed-grammar
  type: quiz
  instruction: Оберіть правильну граматичну форму
  items:
  - question: У мене сьогодні зовсім немає _____ на відпочинок.
    options:
    - час
    - часу
    - часом
    - часі
    correct: 1
  - question: Вона дуже любить _____ роботу.
    options:
    - себе
    - свою
    - свого
    - собі
    correct: 1
  - question: Завтра я _____ іспит з української мови.
    options:
    - складав
    - складати
    - буду складати
    - складемо
    correct: 2
  - question: Цей поїзд набагато _____, ніж старий автобус.
    options:
    - швидкий
    - швидше
    - швидшим
    - швидший
    correct: 3
  - question: Я не бачу свого _____ у цій кімнаті.
    options:
    - друг
    - друга
    - другу
    - другом
    correct: 1
  - question: Ми вже три _____ живемо в Одесі.
    options:
    - роки
    - років
    - року
    - рік
    correct: 0
  - question: Ти _____ сьогодні борщ на обід?
    options:
    - їсти
    - їдять
    - їси
    - їсте
    correct: 2
  - question: Вони _____ мені відповідь завтра.
    options:
    - дадуть
    - даси
    - дамо
    - дати
    correct: 0
- id: true-false-grammar-accuracy
  type: true-false
  instruction: Визначте, чи правильне речення з погляду граматики
  items:
  - statement: Я йду до школа.
    correct: false
    explanation: 'Після прийменника ''до'' використовується родовий відмінок: ''до
      школи''.'
  - statement: На столі лежить велика книга.
    correct: true
    explanation: Речення побудоване правильно у місцевому відмінку.
  - statement: У нас не було молока.
    correct: true
    explanation: Після слова 'не було' використовується родовий відмінок.
  - statement: Я бачу себе у дзеркалі.
    correct: true
    explanation: Зворотний займенник 'себе' вжито правильно.
  - statement: Київ більший за моє місто.
    correct: true
    explanation: Це правильна конструкція порівняння.
  - statement: Ми будемо працювати без перерва.
    correct: false
    explanation: 'Після прийменника ''без'' потрібен родовий відмінок: ''без перерви''.'
  - statement: П'ять років тому я жив у Львові.
    correct: true
    explanation: Після числівника 5 використовується родовий відмінок множини.
  - statement: Вона написав довгий лист.
    correct: false
    explanation: 'У минулому часі дієслово має узгоджуватися з родом: ''Вона написала''.'
workbook:
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте видові пари дієслів (недоконаний та доконаний вид)
  pairs:
  - left: складати
    right: скласти
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: їсти
    right: з'їсти
  - left: давати
    right: дати
  - left: відповідати
    right: відповісти
- id: group-sort-cases
  type: group-sort
  instruction: Розподіліть фрази за відмінками
  groups:
  - label: Родовий відмінок (Genitive)
    items:
    - без перерви
    - до школи
    - немає часу
    - п'ять років
  - label: Знахідний відмінок (Accusative)
    items:
    - бачу друга
    - у неділю
    - на роботу
    - їм яблуко
  - label: Місцевий відмінок (Locative)
    items:
    - в Одесі
    - на столі
    - у парку
    - на Заході
- id: fill-in-pronouns-cases
  type: fill-in
  instruction: Вставте правильну форму займенника
  items:
  - sentence: Це мій брат, я часто гуляю з _____ у парку.
    answer: ним
    options:
    - він
    - його
    - ним
    - ньому
  - sentence: Марія любить _____ нову квартиру.
    answer: свою
    options:
    - свій
    - свою
    - себе
    - моя
  - sentence: Я бачу _____ у дзеркалі кожного ранку.
    answer: себе
    options:
    - свій
    - себе
    - мене
    - собі
  - sentence: Ми йдемо до _____ в гості у суботу.
    answer: тебе
    options:
    - ти
    - тебе
    - тобою
    - тобі
  - sentence: Ви вже дали _____ відповідь?
    answer: їм
    options:
    - вони
    - їх
    - їм
    - ними
  - sentence: У _____ немає домашнього завдання сьогодні.
    answer: мене
    options:
    - я
    - мене
    - мною
    - мені
- id: unjumble-logical-connectors
