  instruction: Заповніть пропуски, обравши правильні слова.
- type: mark-the-words
  title: Знайдіть маркери думки та впевненості
  instruction: Знайдіть і позначте всі слова та фрази, що виражають думку або впевненість.
  text: Я вважаю, що ми готові до роботи. Мені здається, що цей варіант найкращий.
    Можливо, інші люди мають іншу позицію. Але на мою думку, ми маємо рацію. Я абсолютно
    впевнений у цьому.
  answers:
  - вважаю
  - здається
  - Можливо
  - думку
  - впевнений
- type: select
  title: Оберіть правильні речення
  items:
  - question: Які з цих речень граматично правильні (зверніть увагу на коми)? Оберіть
      усі правильні.
    min_correct: 2
    explanation: Перед що завжди потрібна кома.
    options:
    - text: Я вважаю, що це важливо.
      correct: true
    - text: Я вважаю що це важливо.
      correct: false
    - text: Він знає, що ми тут.
      correct: true
    - text: Він знає що ми тут.
      correct: false
  - question: У яких реченнях дієслово рахувати використано правильно?
    min_correct: 2
    explanation: Рахувати використовується тільки для математики.
    options:
    - text: Я вмію рахувати до ста.
      correct: true
    - text: Вчитель просить рахувати гроші.
      correct: true
    - text: Я рахую, що це погана ідея.
      correct: false
    - text: Ми рахуємо, що він правий.
      correct: false
  - question: Які жінки погоджуються правильно?
    min_correct: 2
    explanation: Жінки використовують форму згодна.
    options:
    - text: 'Марія: Я згодна з вами.'
      correct: true
    - text: 'Олена: Я повністю згодна.'
      correct: true
    - text: 'Анна: Я згоден з цим.'
      correct: false
    - text: 'Катя: Я згодні.'
      correct: false
  - question: Які конструкції використовуються для м'якої позиції або невпевненості?
    min_correct: 2
    explanation: Здаватися, можливо та сумніватися передають м'яку позицію.
    options:
    - text: Мені здається, що...
      correct: true
    - text: Я дуже сумніваюся, що...
      correct: true
    - text: Я абсолютно впевнений, що...
      correct: false
    - text: Я вважаю, що...
      correct: false
  - question: Як можна ввічливо почати не погоджуватися?
    min_correct: 2
    explanation: Вибачте, але та на жаль допомагають пом'якшити відмову.
    options:
    - text: Вибачте, але я думаю інакше.
      correct: true
    - text: На жаль, я маю іншу думку.
      correct: true
    - text: Ні, ти говориш дурниці.
      correct: false
    - text: Я абсолютно згоден.
      correct: false
  - question: Які з цих фраз є вступними конструкціями і потребують коми?
    min_correct: 2
    explanation: Фрази зі словом думка є вступними.
    options:
    - text: На мою думку, це так.
      correct: true
    - text: На думку експертів, це важливо.
      correct: true
    - text: Я довго думав про це.
      correct: false
    - text: Вона вважає інакше.
      correct: false
  instruction: Оберіть усі правильні відповіді.
- type: translate
  title: Оберіть правильний переклад
  items:
  - source: I consider that this is important.
    explanation: Для твердої думки використовуємо вважати.
    options:
    - text: Я вважаю, що це важливо.
      correct: true
    - text: Я рахую, що це важливо.
      correct: false
    - text: Я думаю про це важливо.
      correct: false
  - source: It seems to me that it is raining.
    explanation: It seems to me перекладається як мені здається.
    options:
    - text: Мені здається, що йде дощ.
      correct: true
    - text: Я вважаю, що йде дощ.
      correct: false
    - text: Я впевнений, що йде дощ.
      correct: false
  - source: Excuse me, but I disagree. (male speaker)
    explanation: Чоловік каже я не згоден.
    options:
    - text: Вибачте, але я не згоден.
      correct: true
    - text: Вибачте, але я не згодна.
      correct: false
    - text: На жаль, я сумніваюся.
      correct: false
  - source: In my personal opinion, we need more time.
    explanation: Вступна конструкція на мою особисту думку.
    options:
    - text: На мою особисту думку, нам потрібно більше часу.
      correct: true
    - text: Я вважаю, нам потрібно більше часу.
      correct: false
    - text: Мені здається, нам потрібно більше часу.
      correct: false
  - source: I am confident that we will win. (female speaker)
    explanation: Жінка каже я впевнена.
    options:
    - text: Я впевнена, що ми переможемо.
      correct: true
    - text: Я впевнений, що ми переможемо.
      correct: false
    - text: Я сумніваюся, що ми переможемо.
      correct: false
  - source: On the one hand, it is good.
    explanation: On the one hand перекладається як з одного боку.
    options:
    - text: З одного боку, це добре.
      correct: true
    - text: На мою думку, це добре.
      correct: false
    - text: Можливо, це добре.
      correct: false
  instruction: Оберіть правильний переклад.
- type: match-up
  title: Знайдіть логічне продовження речення
  pairs:
  - left: Я вважаю, що це важливо,
    right: тому що це допомагає людям.
  - left: Вибачте, але я не згоден,
    right: я маю іншу думку.
  - left: З одного боку, це швидко,
    right: а з іншого боку, це дорого.
  - left: Мені здається,
    right: що починається дощ.
  - left: Я не можу вам допомогти,
    right: на жаль.
  - left: Я абсолютно впевнена,
    right: що ми робимо правильний вибір.
  - left: На думку експертів,
    right: економіка буде зростати.
  - left: Він довго думав над цим,
    right: але не знайшов рішення.
  instruction: З'єднайте відповідні елементи.
