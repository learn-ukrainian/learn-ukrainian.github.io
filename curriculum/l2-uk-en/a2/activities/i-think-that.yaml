- type: quiz
  title: Оберіть правильне дієслово
  items:
  - question: Яке слово означає активний розумовий процес у голові?
    explanation: Думати використовується для опису процесу роздумів.
    options:
    - text: думати
      correct: true
    - text: вважати
      correct: false
    - text: здаватися
      correct: false
    - text: рахувати
      correct: false
  - question: Яке слово ми використовуємо, щоб висловити тверду думку?
    explanation: Вважати використовується для фінального висновку або переконання.
    options:
    - text: вважати
      correct: true
    - text: думати
      correct: false
    - text: здаватися
      correct: false
    - text: рахувати
      correct: false
  - question: Як правильно сказати англійське I consider, що це важливо?
    explanation: В українській мові для твердої думки використовується дієслово вважати.
    options:
    - text: я вважаю
      correct: true
    - text: я рахую
      correct: false
    - text: я думаю
      correct: false
    - text: мені здається
      correct: false
  - question: Яке слово передає м'яку позицію або ваше враження?
    explanation: Здаватися ідеально підходить для некатегоричної думки.
    options:
    - text: здаватися
      correct: true
    - text: вважати
      correct: false
    - text: думати
      correct: false
    - text: сумніватися
      correct: false
  - question: Як правильно погодитися з кимось, якщо ви чоловік?
    explanation: Чоловіки використовують форму згоден.
    options:
    - text: я згоден
      correct: true
    - text: я згодна
      correct: false
    - text: ми згодні
      correct: false
    - text: я згодне
      correct: false
  - question: Як правильно погодитися з кимось, якщо ви жінка?
    explanation: Жінки використовують форму згодна.
    options:
    - text: я згодна
      correct: true
    - text: я згоден
      correct: false
    - text: ми згодні
      correct: false
    - text: я згодне
      correct: false
  - question: Що обов'язково треба ставити перед сполучником що?
    explanation: В українській мові перед сполучником що у складному реченні завжди
      ставиться кома.
    options:
    - text: кому
      correct: true
    - text: крапку
      correct: false
    - text: тире
      correct: false
    - text: знак питання
      correct: false
  - question: Яке дієслово ми використовуємо тільки для математики?
    explanation: Слово рахувати означає один, два, три, його не можна використовувати
      для думки.
    options:
    - text: рахувати
      correct: true
    - text: вважати
      correct: false
    - text: думати
      correct: false
    - text: здаватися
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: Правда чи неправда?
  items:
  - statement: Перед сполучником що у складному реченні завжди потрібна кома.
    correct: true
    explanation: Це обов'язкове правило української пунктуації.
  - statement: Українці використовують слово рахувати, коли хочуть висловити свою
      думку.
    correct: false
    explanation: Слово рахувати використовується тільки для математики. Для думки
      треба казати вважати.
  - statement: Жінка повинна казати я згоден, коли підтримує чиюсь ідею.
    correct: false
    explanation: Жінка має казати я згодна.
  - statement: Фраза мені здається звучить більш м'яко, ніж я вважаю.
    correct: true
    explanation: Так, це чудовий спосіб уникнути конфлікту та показати м'яку позицію.
  - statement: Вступна конструкція на мою думку завжди виділяється комами на письмі.
    correct: true
    explanation: Вступні слова завжди виділяються комами.
  - statement: Слово напевно показує абсолютну, стовідсоткову впевненість у чомусь.
    correct: false
    explanation: Напевно показує середню впевненість, а не стовідсоткову.
  - statement: Фраза вибачте, але — це гарний спосіб ввічливо не погодитися з людиною.
    correct: true
    explanation: Це класичний інструмент для пом'якшення відмови.
  - statement: Дієслово думати описує фінальний результат або вашу тверду позицію.
    correct: false
    explanation: Думати описує процес. Для фінального результату ми використовуємо
      вважати.
  instruction: Визначте, чи твердження правильне.
- type: match-up
  title: 'Знайдіть пару: ступінь впевненості та функції фраз'
  pairs:
  - left: Я абсолютно впевнений.
    right: Висока впевненість (чоловік)
  - left: Вона абсолютно впевнена.
    right: Висока впевненість (жінка)
  - left: Цілком можливо, що так.
    right: Середня впевненість
  - left: Напевно, він забув.
    right: Припущення
  - left: Я дуже сумніваюся.
    right: Низька впевненість (сумнів)
  - left: На мою особисту думку
    right: Вступна фраза
  - left: З одного боку
    right: Початок збалансованого аргументу
  - left: Тому що
    right: Пояснення причини
  instruction: З'єднайте відповідні елементи.
- type: fill-in
  title: Вставте правильне слово
  items:
  - sentence: Я довго думав над цим питанням і тепер я впевнений, що маю рацію.
    answer: впевнений
    options:
    - впевнений
    - можливо
    - напевно
    - сумніваюся
    explanation: Він довго думав і тепер має тверду позицію.
  - sentence: Він сказав, що це дуже важливий проєкт.
    answer: що
    options:
    - що
    - як
    - де
    - коли
    explanation: Сполучник що об'єднує дві частини речення.
  - sentence: Я вважаю, що ми повинні починати роботу зараз.
    answer: вважаю
    options:
    - вважаю
    - рахую
    - здаюся
    - згоден
    explanation: Тверда думка висловлюється словом вважаю.
  - sentence: Мені здається, що на вулиці починається сильний дощ.
    answer: здається
    options:
    - здається
    - думати
    - вважає
    - згодна
    explanation: Безособова конструкція мені здається.
  - sentence: 'Оксана сказала: Я повністю згодна з вашим планом.'
    answer: згодна
    options:
    - згодна
    - згоден
    - згодні
    - згодне
    explanation: Оксана — це жінка, тому потрібна форма згодна.
  - sentence: Вибачте, але я маю іншу думку щодо цього питання.
    answer: але
    options:
    - але
    - тому
    - що
    - як
    explanation: 'Ввічлива незгода: вибачте, але.'
  - sentence: Ми робимо це зараз, тому що потім не буде часу.
    answer: тому
    options:
    - тому
    - що
    - але
    - як
    explanation: 'Сполучник причини: тому що.'
  - sentence: На мою думку, це найкращий варіант.
    answer: думку
    options:
    - думку
    - ідею
    - впевненість
    - сторону
    explanation: 'Вступна конструкція: на мою думку.'
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: error-correction
  title: Виправте помилки в реченнях
  items:
  - sentence: Я рахую, що нам потрібно більше часу на підготовку.
    error: рахую
    answer: вважаю
    error_type: word
    options:
    - вважаю
    - думаю
    - здаюся
    - роблю
    explanation: Для висловлення думки використовуємо вважати, а не рахувати.
  - sentence: 'Олена сказала: Я згоден з тобою.'
    error: згоден
    answer: згодна
    error_type: word
    options:
    - згодна
    - впевнена
    - згодні
    - права
    explanation: Олена — жінка, тому форма має бути згодна.
  - sentence: Він сказав що ми маємо рацію.
    error: сказав що
    answer: сказав, що
    error_type: phrase
    options:
    - сказав, що
    - 'сказав: що'
    - сказав; що
    - сказав. що
    explanation: Перед що обов'язково потрібна кома.
  - sentence: Вона сумніваюся, що цей план спрацює завтра.
    error: сумніваюся
    answer: сумнівається
    error_type: word
    options:
    - сумнівається
    - сумніваємося
    - сумніваєтеся
    - сумніваються
    explanation: Вона (третя особа однини) — сумнівається.
  - sentence: Мене здається, що це гарна ідея.
    error: Мене
    answer: Мені
    error_type: word
    options:
    - Мені
    - Я
    - Мною
    - Моя
    explanation: 'Правильна безособова конструкція у давальному відмінку: мені здається.'
  - sentence: З одного боку це добре, але з другий боку — дуже дорого.
    error: другий
    answer: іншого
    error_type: word
    options:
    - іншого
    - першого
    - третього
    - свого
    explanation: 'Стала фраза балансу: з одного боку... з іншого боку.'
  instruction: Знайдіть і виправте помилку в реченні.
- type: unjumble
  title: Складіть речення з поданих слів
  items:
  - words:
    - На
    - мою
    - думку,
    - це
    - чудова
    - ідея.
    answer: На мою думку, це чудова ідея.
  - words:
    - Я
    - вважаю,
    - що
    - ви
    - маєте
    - рацію.
    answer: Я вважаю, що ви маєте рацію.
  - words:
    - Мені
    - здається,
    - що
    - починається
    - дощ.
    answer: Мені здається, що починається дощ.
  - words:
    - Вибачте,
    - але
    - я
    - не
    - згодна.
    answer: Вибачте, але я не згодна.
  - words:
    - Ми
    - сумніваємося,
    - що
    - це
    - спрацює.
    answer: Ми сумніваємося, що це спрацює.
  - words:
    - Він
    - впевнений,
    - тому
    - що
    - знає
    - факти.
    answer: Він впевнений, тому що знає факти.
  instruction: Розташуйте слова у правильному порядку.
- type: group-sort
  title: Розподіліть слова та фрази за категоріями
  groups:
  - name: Тверда позиція
    items:
    - я вважаю
    - я впевнений
    - я впевнена
  - name: Враження або сумнів
    items:
    - мені здається
    - я сумніваюся
    - можливо
  - name: Початок думки
    items:
    - на мою думку
    - на думку експертів
    - на мою особисту думку
  instruction: Розподіліть елементи за групами.
- type: cloze
  title: Заповніть пропуски в діалозі
  passage: 'Олег: Привіт! Що ти {{1}} про наш новий проєкт? Анна: Привіт. На мою {{2}},
    це гарна ідея. Я {{3}}, що ми зможемо все зробити вчасно. Олег: {{4}}, але я не
    {{5}}. У нас дуже мало часу. Мені {{6}}, що ми не встигнемо. Анна: Я розумію.
    Але я {{7}}, що ми працюємо швидко. Олег: {{8}}, ти маєш рацію. Але я все одно
    {{9}} в цьому. Анна: З одного {{10}}, це ризик. Але ми маємо спробувати.'
  blanks:
