  instruction: "Знайдіть і позначте всі медичні команди (дієслова у наказовому способі) у тексті."
  text: "Лікар уважно подивився на пацієнта і сказав: Дихайте дуже глибоко і не рухайтеся. Тепер відкрийте рот ширше і покажіть ваш язик. Добре, тепер поверніться спиною до мене. Будь ласка, ляжте на кушетку для огляду."
  answers: ["Дихайте", "рухайтеся", "відкрийте", "покажіть", "поверніться", "ляжте"]