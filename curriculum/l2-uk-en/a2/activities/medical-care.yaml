- type: quiz
  title: "Перевірте знання: граматика і лексика"
  items:
    - question: "Як ми правильно говоримо українською мовою про біль?"
      explanation: "Ми завжди використовуємо конструкцію У мене болить плюс називний відмінок частини тіла."
      options:
        - text: "У мене болить голова"
          correct: true
        - text: "Я болю голову"
          correct: false
        - text: "Моя голова є біль"
          correct: false
        - text: "Я маю біль голови"
          correct: false
    - question: "Яке слово означає запалення горла, а не проблему з серцем?"
      explanation: "Ангіна — це проблема з горлом. Серцевий напад — це інфаркт."
      options:
        - text: "ангіна"
          correct: true
        - text: "інфаркт"
          correct: false
        - text: "отруєння"
          correct: false
        - text: "застуда"
          correct: false
    - question: "Що ви повинні обов'язково одягнути перед входом до медичного кабінету?"
      explanation: "Бахіли — це спеціальні сині пакети на взуття для підтримання чистоти."
      options:
        - text: "бахіли"
          correct: true
        - text: "шапку"
          correct: false
        - text: "рукавички"
          correct: false
        - text: "окуляри"
          correct: false
    - question: "Яка система дозволяє швидко записатися на прийом через мобільний додаток?"
      explanation: "Helsi — це головна електронна медична система в усій Україні."
      options:
        - text: "Helsi"
          correct: true
        - text: "Здоров'я"
          correct: false
        - text: "Лікар"
          correct: false
        - text: "Медицина"
          correct: false
    - question: "За яким номером телефону потрібно дзвонити для виклику швидкої допомоги?"
      explanation: "103 — це єдиний номер екстреної медичної допомоги в Україні."
      options:
        - text: "103"
          correct: true
        - text: "101"
          correct: false
        - text: "102"
          correct: false
        - text: "112"
          correct: false
    - question: "Хто дає вам електронне направлення до інших медичних спеціалістів?"
      explanation: "Тільки сімейний лікар створює направлення в комп'ютерній системі."
      options:
        - text: "сімейний лікар"
          correct: true
        - text: "адміністратор"
          correct: false
        - text: "аптекар"
          correct: false
        - text: "хірург"
          correct: false
    - question: "Як правильно сказати лікареві про свій загальний поганий фізичний стан?"
      explanation: "Для опису стану ми використовуємо давальний відмінок: Мені погано."
      options:
        - text: "Мені дуже погано"
          correct: true
        - text: "Я є дуже погано"
          correct: false
        - text: "Мене дуже погано"
          correct: false
        - text: "Я маю дуже погано"
          correct: false
    - question: "Який документ виписує сімейний лікар, щоб ви купили сильні антибіотики?"
      explanation: "Рецепт — це спеціальний електронний медичний документ для фармацевта в аптеці."
      options:
        - text: "рецепт"
          correct: true
        - text: "чек"
          correct: false
        - text: "лікарняний"
          correct: false
        - text: "декларацію"
          correct: false

- type: unjumble
  title: "Складіть правильні речення"
  items:
    - words: ["у", "мене", "дуже", "сильно", "болить", "горло"]
      answer: "У мене дуже сильно болить горло"
    - words: ["я", "хочу", "записатися", "на", "прийом", "до", "лікаря"]
      answer: "Я хочу записатися на прийом до лікаря"
    - words: ["сімейний", "лікар", "дав", "мені", "електронне", "направлення"]
      answer: "Сімейний лікар дав мені електронне направлення"
    - words: ["завтра", "пацієнт", "повинен", "здати", "аналіз", "крові"]
      answer: "Завтра пацієнт повинен здати аналіз крові"
    - words: ["мені", "сьогодні", "значно", "гірше", "ніж", "вчора"]
      answer: "Мені сьогодні значно гірше ніж вчора"
    - words: ["вам", "потрібно", "приймати", "ці", "таблетки", "двічі", "на", "день"]
      answer: "Вам потрібно приймати ці таблетки двічі на день"

- type: error-correction
  title: "Виправте типові помилки"
  items:
    - sentence: "Вчора я болів голову і мав високу температуру."
      error: "я болів голову"
      answer: "у мене боліла голова"
      options: ["у мене боліла голова", "моя голова боліла", "я мав біль голови", "мене боліла голова"]
      explanation: "Ми завжди кажемо У мене болить і додаємо частину тіла у називному відмінку."
    - sentence: "Лікар виписав мені електронний чек на сильні антибіотики."
      error: "чек"
      answer: "рецепт"
      options: ["рецепт", "квиток", "документ", "лист"]
      explanation: "Лікар виписує медичний рецепт (prescription), а чек (receipt) дають у магазині."
    - sentence: "Мій дідусь зараз у лікарні, тому що у нього ангіна серця."
      error: "ангіна серця"
      answer: "інфаркт"
      options: ["інфаркт", "грип", "застуда", "отруєння"]
      explanation: "Ангіна — це хвороба горла. Серцевий напад українською називається інфаркт."
    - sentence: "Вам обов'язково потрібно кушати ці ліки після сніданку."
      error: "кушати"
      answer: "приймати"
      options: ["приймати", "пити", "їсти", "брати"]
      explanation: "Медикаменти, таблетки та ліки ми маємо приймати. Слово кушати — це русизм."
    - sentence: "Коли ви відчуваєте себе погано, вам потрібен запис на прихід."
      error: "прихід"
      answer: "прийом"
      options: ["прийом", "візит", "огляд", "зустріч"]
      explanation: "Правильна і дуже поширена медична фраза — записатися на прийом."
    - sentence: "Лікар сказав пити ці білі таблетки три рази в день."
      error: "в день"
      answer: "на день"
      options: ["на день", "щодня", "за день", "в добу"]
      explanation: "В українській мові ми використовуємо прийменник на з частотою: двічі на день, тричі на день."

