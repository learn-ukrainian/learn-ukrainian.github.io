version: '1.0'
module: aspect-mastery
level: a2
inline:
- id: group-sort-sort-aspect-pairs-by-formation-pattern-prefix-suffix-stem-change-suppletive
  type: group-sort
  instruction: Розподіліть видові пари за способом утворення
  groups:
  - label: Додавання префікса
    items:
    - писати / написати
    - робити / зробити
  - label: Зміна суфікса
    items:
    - вирішувати / вирішити
    - записувати / записати
  - label: Чергування звуків
    items:
    - допомагати / допомогти
    - відповідати / відповісти
  - label: Абсолютно різні слова
    items:
    - брати / взяти
    - говорити / сказати
- id: match-up-match-imperfective-verbs-with-their-perfective-partners-from-the-30-pairs
  type: match-up
  instruction: З'єднайте дієслова недоконаного виду з їхніми парами доконаного виду
  pairs:
  - left: готувати
    right: приготувати
  - left: купувати
    right: купити
  - left: пояснювати
    right: пояснити
  - left: розуміти
    right: зрозуміти
  - left: починати
    right: почати
  - left: брати
    right: взяти
  - left: говорити
    right: сказати
  - left: дивитися
    right: подивитися
- id: fill-in-complete-sentences-by-choosing-the-correct-aspect-based-on-context-sequence-interruption-habit-single-event
  type: fill-in
  instruction: Оберіть правильний вид дієслова за контекстом
  items:
  - sentence: Вчора я довго _____ книгу.
    answer: читав
    options:
    - читав
    - прочитав
  - sentence: Я _____ книгу і дав її другу.
    answer: прочитав
    options:
    - читав
    - прочитав
  - sentence: Ми _____ обід, коли зателефонувала мама.
    answer: готували
    options:
    - готували
    - приготували
  - sentence: Вона зазвичай _____ каву вранці.
    answer: пила
    options:
    - пила
    - випила
  - sentence: Я _____ ключі! Ось вони!
    answer: знайшов
    options:
    - шукав
    - знайшов
  - sentence: Він завжди _____ своїм сусідам.
    answer: допомагав
    options:
    - допомагав
    - допоміг
  - sentence: Я _____ уроки за одну годину.
    answer: зробив
    options:
    - робив
    - зробив
  - sentence: Ти вже _____ квитки на поїзд?
    answer: купив
    options:
    - купував
    - купив
- id: quiz-read-a-mini-situation-and-choose-the-correct-aspect-form-with-justification
  type: quiz
  instruction: Прочитайте ситуацію та оберіть правильну форму дієслова
  items:
  - question: 'Ситуація: Ви хочете дізнатися, чи готовий обід. Ти вже _____ обід?'
    options:
    - приготував
    - готував
    - готуєш
    - готуватимеш
    correct: 0
  - question: 'Ситуація: Ви описуєте свою щоденну ранкову рутину в минулому. Кожного
      ранку я _____ каву.'
    options:
    - пив
    - випив
    - п'ю
    - вип'ю
    correct: 0
  - question: 'Ситуація: Ви розповідаєте про дії, які відбулися одна за одною. Я встав,
      вмився і _____ на роботу.'
    options:
    - пішов
    - йшов
    - йду
    - піду
    correct: 0
  - question: 'Ситуація: Ви описуєте довгий процес, який був перерваний. Я _____ телевізор,
      коли вона зайшла.'
    options:
    - дивився
    - подивився
    - дивлюся
    - подивлюся
    correct: 0
  - question: 'Ситуація: Ви кажете, що намагалися щось зробити, але не досягли результату.
      Я _____ це правило три години, але так і не зрозумів.'
    options:
    - вчив
    - вивчив
    - вчу
    - вивчу
    correct: 0
  - question: 'Ситуація: Ви радісно повідомляєте, що нарешті знайшли загублену річ.
      Ура! Я _____ свої ключі!'
    options:
    - знайшов
    - шукав
    - шукаю
    - знайду
    correct: 0
  - question: 'Ситуація: Ви питаєте друга про його плани на завтра, акцентуючи на
      результаті. Ти _____ це завдання завтра?'
    options:
    - зробиш
    - робитимеш
    - робив
    - зробив
    correct: 0
  - question: 'Ситуація: Ви пояснюєте, що ніколи навіть не починали певну дію. Я не
      _____ цю статтю, я навіть не бачив її.'
    options:
    - читав
    - прочитав
    - читаю
    - прочитаю
    correct: 0
workbook:
- type: error-correction
  instruction: Знайдіть і виправте помилку у виборі виду дієслова
  items:
  - sentence: Я буду прочитати цю книгу завтра.
    error: прочитати
    correction: читати
    error_type: word
    options:
    - читати
    - читав
    - прочитав
    explanation: Зі словом 'бути' в майбутньому часі вживається тільки недоконаний
      вид (буду читати).
  - sentence: Вчора я зробив уроки дві години.
    error: зробив
    correction: робив
    error_type: word
    options:
    - робив
    - роблю
    - зроблю
    explanation: Тривалість (дві години) вказує на процес, тому потрібен недоконаний
      вид.
  - sentence: Коли ти телефонував, я приготувала вечерю.
    error: приготувала
    correction: готувала
    error_type: word
    options:
    - готувала
    - готую
    - готуватиму
    explanation: Це фонова тривала дія, яка була перервана, тому потрібен недоконаний
      вид.
  - sentence: Він часто сказав мені приємні слова.
    error: сказав
    correction: говорив
    error_type: word
    options:
    - говорив
    - говорить
    - каже
    explanation: Слово 'часто' вказує на регулярну звичку, потрібен недоконаний вид.
  - sentence: Я вже купував квитки на концерт, вони у мене.
    error: купував
    correction: купив
    error_type: word
    options:
    - купив
    - купую
    - куплю
    explanation: Дія завершена і є конкретний результат (квитки у вас), потрібен доконаний
      вид.
  - sentence: Ми починали зустріч о десятій годині вчора.
    error: починали
    correction: почали
    error_type: word
    options:
    - почали
    - почнемо
    - починаємо
    explanation: Це одноразова конкретна і завершена подія вчора, потрібен доконаний
      вид.
- type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - вже
    - Я
    - написав
    - лист.
    - цей
    correct_order:
    - Я
    - вже
    - написав
    - цей
    - лист.
  - words:
    - буду
    - Я
    - книгу.
    - цю
    - читати
    correct_order:
    - Я
    - буду
    - читати
    - цю
    - книгу.
  - words:
    - знайшов
    - Нарешті
    - ключі!
    - я
    - свої
    correct_order:
    - Нарешті
    - я
    - знайшов
    - свої
    - ключі!
  - words:
    - і
    - вмився
    - встав,
    - Я
    - пішов.
    correct_order:
    - Я
    - встав,
    - вмився
    - і
    - пішов.
  - words:
    - не
    - правило.
    - Він
    - зрозумів
    - це
    correct_order:
    - Він
    - не
    - зрозумів
    - це
    - правило.
  - words:
    - допомагав
    - завжди
    - сусідам.
    - Він
    - своїм
    correct_order:
    - Він
    - завжди
    - допомагав
    - своїм
    - сусідам.
