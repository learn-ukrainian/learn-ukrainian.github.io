- id: wb-fill-in-2
  type: fill-in
  instruction: Вставте пропущені слова у діалогах
  items:
  - sentence: — Ти вже ____ домашнє завдання? — Ні, я ще пишу.
    answer: написав
    options:
    - писав
    - написав
    - напишу
  - sentence: — Я ____ книгу вже дві години! — Прочитай ще цей абзац.
    answer: читаю
    options:
