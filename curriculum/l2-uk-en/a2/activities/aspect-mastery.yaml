- id: wb-group-sort-usage
  type: group-sort
  instruction: 'Розподіліть дієслова: які вказують на процес, а які на результат?'
  groups:
  - label: Процес (Недоконаний вид)
    items:
    - довго пояснював
    - готувала вечерю
    - прибирала кімнату
    - вчили слова
    - завжди допомагала
  - label: Результат (Доконаний вид)
    items:
    - нарешті пояснив
    - зварив суп
    - прибрала кімнату
    - вивчили слова
    - допомогла вчора
