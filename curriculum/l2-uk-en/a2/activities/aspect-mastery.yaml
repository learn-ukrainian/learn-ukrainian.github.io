  - sentence: — Що ти ____ до п'ятниці? — Я закінчу проект.
    answer: зробиш
    options:
    - будеш робити
    - зробиш
    - робив
  - sentence: — Де мої ключі? Ти довго їх ____?
    answer: шукав
    options:
    - шукав
