version: '1.0'
module: aspect-mastery
level: a2
inline:
- id: group-sort-formation
  type: group-sort
  instruction: Розподіліть видові пари за способом утворення
  groups:
  - label: Додавання префікса
    items:
    - робити / зробити
    - читати / прочитати
    - їсти / з'їсти
  - label: Зміна або додавання суфікса
    items:
    - допомагати / допомогти
    - записувати / записати
    - пояснювати / пояснити
  - label: Зміна основи або наголосу
    items:
    - відповідати / відповісти
    - розрізати / розрізати
  - label: Різні корені (слова-винятки)
    items:
    - брати / взяти
    - говорити / сказати
    - шукати / знайти
    - ловити / піймати
- id: match-up-pairs
  type: match-up
  instruction: З'єднайте дієслова недоконаного та доконаного виду
  pairs:
  - left: готувати
    right: приготувати
  - left: варити
    right: зварити
  - left: прибирати
    right: прибрати
  - left: прасувати
    right: випрасувати
  - left: починати
    right: почати
  - left: закінчувати
    right: закінчити
  - left: купувати
    right: купити
  - left: платити
    right: заплатити
  - left: відкривати
    right: відкрити
- id: fill-in-context
  type: fill-in
  instruction: Вставте правильну форму дієслова (доконаний чи недоконаний вид)
  items:
  - sentence: Я довго ____ суп на обід.
    answer: варив
    options:
    - варив
    - зварив
    - варитиму
  - sentence: Нарешті я ____ його.
    answer: зварив
    options:
    - варив
    - зварив
    - зварю
  - sentence: Вчитель довго ____ правило.
    answer: пояснював
    options:
    - пояснював
    - пояснив
    - пояснює
  - sentence: Коли вона ____ кімнату, стало чисто.
    answer: прибрала
    options:
    - прибирала
    - прибрала
    - прибере
  - sentence: Кожного ранку я ____ магазин.
    answer: відкриваю
    options:
    - відкриваю
    - відкрию
    - відкривав
  - sentence: Учора було свято, тому я ____ його рано.
    answer: закрив
    options:
    - закривав
    - закрив
    - закрию
  - sentence: Я почав читати, але не ____ цю книгу до кінця.
    answer: прочитав
    options:
    - читав
    - прочитав
    - читаю
  - sentence: Моя сестра завжди ____ сусідам.
    answer: допомагала
    options:
    - допомагала
    - допомогла
    - допомагає
  - sentence: Але вчора вона ____ сусідці, бо та була хвора.
    answer: допомогла
    options:
    - допомагала
    - допомогла
    - допоможе
- id: quiz-read-a-mini-situation-and-choose-the-correct-aspect-form-with-justification
  type: quiz
  instruction: Прочитайте міні-ситуацію та оберіть правильну форму дієслова.
  items:
  - question: Ви описуєте процес прибирання, який тривав цілий ранок. Що ви скажете?
      «Моя сестра ____ кімнату цілий ранок».
    options:
    - прибрала
    - прибирала
    - прибере
    - прибирає
    correct: 1
  - question: Ви повідомляєте керівнику, що звіт повністю готовий. Яке слово підходить?
      «Я ____ звіт».
    options:
    - писав
    - пишу
    - написав
    - буду писати
    correct: 2
  - question: Ви розповідаєте про послідовність дій учора. «Я встав, вмився і ____
      поснідати».
    options:
    - починав
    - почав
    - починаю
    - почну
    correct: 1
  - question: Ви запитуєте колегу про його загальні плани на завтра. «Що ти ____ завтра?».
    options:
    - зробиш
    - будеш робити
    - робив
    - зробив
    correct: 1
  - question: Вас перебили під час розмови. «Коли я готувала вечерю, раптом ____ подруга».
    options:
    - дзвонила
    - подзвонила
    - дзвонить
    - буде дзвонити
    correct: 1
  - question: Ви пояснюєте, що не знаєте сюжету книги, бо взагалі її не брали до рук.
      «Я не ____ цю книгу».
    options:
    - прочитав
    - читав
    - прочитаю
    - читаю
    correct: 1
  - question: Ви обіцяєте керівнику результат до п'ятниці. «До п'ятниці я ____ цей
      проект».
    options:
    - закінчу
    - закінчував
    - буду закінчувати
    - закінчую
    correct: 0
  - question: Ви кажете, що намагалися, але не змогли закінчити читання. «Я почав,
      але не ____ до кінця».
    options:
    - прочитав
    - читав
    - прочитаю
    - читаю
    correct: 0
workbook:
- id: wb-error-correction-1
  type: error-correction
  instruction: Знайдіть і виправте помилку у виборі виду дієслова
  items:
  - sentence: Учора я швидко писав звіт і відправив його керівнику.
    error: писав
    correction: написав
    error_type: word
    options:
    - пишу
    - написав
    - напишу
    explanation: Дія завершена і є частиною послідовності доконаних дій (написав і
      відправив).
  - sentence: Моя сестра прибрала кімнату цілий ранок.
    error: прибрала
    correction: прибирала
    error_type: word
    options:
    - прибере
    - прибирає
    - прибирала
    explanation: Фраза «цілий ранок» вказує на тривалий процес, тому потрібен недоконаний
      вид.
  - sentence: Коли я готував вечерю, подруга раптом дзвонила.
    error: дзвонила
    correction: подзвонила
    error_type: word
    options:
    - подзвонить
    - подзвонила
    - дзвонить
    explanation: Раптова дія, яка перериває процес, має бути доконаного виду.
  - sentence: Кожного ранку я відкрию магазин о восьмій.
    error: відкрию
    correction: відкриваю
    error_type: word
    options:
    - відкрив
    - відкривав
    - відкриваю
    explanation: Словосполучення «кожного ранку» означає регулярну дію (недоконаний
      вид).
  - sentence: Вчитель довго пояснив граматику.
    error: пояснив
    correction: пояснював
    error_type: word
    options:
    - пояснить
    - пояснював
    - пояснює
    explanation: Слово «довго» вказує на тривалість, потрібен недоконаний вид.
  - sentence: Я буду закінчувати цей проект до п'ятниці, обіцяю!
    error: буду закінчувати
    correction: закінчу
    error_type: phrase
    options:
    - закінчив
    - закінчу
    - закінчую
    explanation: Обіцянка результату до певного часу (до п'ятниці) вимагає доконаного
      виду майбутнього часу.
  - sentence: Я взагалі не прочитав цю книгу, тому не знаю її сюжету.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читаю
    - прочитаю
    - читав
    explanation: Якщо дія взагалі не відбувалася (факт відсутності дії), використовується
      недоконаний вид.
  - sentence: Я довго шукав ключі, але так і не знаходив їх.
    error: знаходив
    correction: знайшов
    error_type: word
    options:
    - шукав
    - знайшов
    - знайду
    explanation: Недосягнення очікуваного результату після процесу передається запереченням
      доконаного дієслова.
