    - знайду
- id: wb-true-false-1
  type: true-false
  instruction: Правда чи ні? (Правила вживання видових пар)
  items:
  - statement: Недоконаний вид описує тривалий процес, звичку або повторювану дію.
    correct: true
    explanation: Так, це основна функція недоконаного виду.
  - statement: Доконаний вид може використовуватися для опису дій, що відбуваються
      прямо зараз.
    correct: false
    explanation: Дії прямо зараз — це процес, тому потрібен теперішній час недоконаного
      виду. Доконаний вид не має теперішнього часу.
  - statement: Якщо в реченні є слово «довго», зазвичай використовується доконаний
      вид.
    correct: false
    explanation: Слово «довго» вказує на тривалість процесу, тому використовується
      недоконаний вид.
  - statement: У послідовності завершених подій (встав, вмився, поснідав) ми використовуємо
      тільки доконаний вид.
    correct: true
    explanation: Для ланцюга завершених дій у минулому завжди вживається доконаний
      вид.
  - statement: Додавання префікса до недоконаного дієслова (писати → написати) зазвичай
      утворює доконаний вид.
    correct: true
    explanation: Це найпоширеніший спосіб утворення доконаного виду.
  - statement: Слова «брати» і «взяти» мають однаковий корінь.
    correct: false
    explanation: Це слова-винятки (суплетивні форми), вони мають абсолютно різні корені.
  - statement: Якщо ви не досягли результату і хочете це підкреслити, використовуйте
      заперечення «не» з доконаним видом.
    correct: true
    explanation: 'Наприклад: «Я почав читати, але не прочитав» (спроба була, результату
      немає).'
  - statement: Для опису фонової дії (сцени), яку перериває інша дія, завжди використовується
      доконаний вид.
    correct: false
    explanation: Фонова дія — це тривалий процес, тому використовується недоконаний
      вид (наприклад, «Коли я читав...»).
- id: wb-match-up-2
  type: match-up
  instruction: З'єднайте речення, які описують процес, з реченнями, які описують результат
  pairs:
  - left: Я довго варив суп.
    right: Я нарешті зварив суп.
  - left: Він пояснював правило годину.
    right: Він успішно пояснив правило.
  - left: Ми читали цю книгу вчора.
    right: Ми прочитали цю книгу до кінця.
  - left: Сестра прибирала кімнату.
    right: Сестра прибрала кімнату.
  - left: Я шукав свої ключі.
    right: Я знайшов свої ключі.
  - left: Студенти вчили нові слова.
    right: Студенти вивчили всі слова.
  - left: Я писав звіт увечері.
    right: Я написав звіт для керівника.
  - left: Ми готували вечерю разом.
    right: Ми приготували смачну вечерю.
