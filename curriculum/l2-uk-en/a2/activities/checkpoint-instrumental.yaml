version: '1.0'
module: checkpoint-instrumental
level: a2
inline:
- id: group-sort
  type: group-sort
  instruction: Розподіліть словосполучення за функцією орудного відмінка
  groups:
  - label: Інструмент (засіб)
    items:
    - писати ручкою
    - різати ножем
  - label: Супровід (компанія)
    items:
    - гуляти з собакою
    - кава з молоком
  - label: Професія
    items:
    - працювати лікарем
    - стати директором
  - label: Місце (простір)
    items:
    - під столом
    - перед школою
- id: fill-in
  type: fill-in
  instruction: Вставте правильну форму орудного відмінка
  items:
  - sentence: Я пишу (ручка) _______.
    answer: ручкою
    options:
    - ручкою
    - ручку
    - ручці
    - ручки
  - sentence: Ми гуляємо з (собака) _______.
    answer: собакою
    options:
    - собакою
    - собаку
    - собаці
    - собаки
  - sentence: Вона стала (лікарка) _______.
    answer: лікаркою
    options:
    - лікаркою
    - лікарку
    - лікарці
    - лікарки
  - sentence: Кіт спить під (стіл) _______.
    answer: столом
    options:
    - столом
    - столу
    - столі
    - стіл
  - sentence: Я розмовляю з (брат) _______.
    answer: братом
    options:
    - братом
    - брату
    - братові
    - брата
  - sentence: Ми граємо з (діти) _______.
    answer: дітьми
    options:
    - дітьми
    - дітям
    - дітей
    - дітями
  - sentence: Дерево росте перед (вікно) _______.
    answer: вікном
    options:
    - вікном
    - вікну
    - вікні
    - вікна
  - sentence: Я п'ю каву з (молоко) _______.
    answer: молоком
    options:
    - молоком
    - молоку
    - молоці
    - молока
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: Яке речення правильне для опису інструмента?
    options:
    - Я пишу ручкою.
    - Я пишу з ручкою.
    - Я пишу ручку.
    - Я пишу на ручці.
    correct: 0
  - question: 'Оберіть правильний варіант: ''Він працює...'''
    options:
    - директором.
    - директор.
    - з директором.
    - директору.
    correct: 0
  - question: Який прийменник означає 'under' і вимагає орудного відмінка?
    options:
    - під
    - над
    - перед
    - за
    correct: 0
  - question: Ми йдемо в кіно з...
    options:
    - новими друзями.
    - нові друзі.
    - нових друзів.
    - новим друзям.
    correct: 0
  - question: Яке закінчення має слово 'море' в орудному відмінку?
    options:
    - морем
    - мором
    - морею
    - мор'ям
    correct: 0
  - question: 'Оберіть правильну особливу форму в орудному відмінку множини:'
    options:
    - дітьми
    - дітями
    - друзями
    - братами
    correct: 0
  - question: Книга лежить...
    options:
    - під столом.
    - під стіл.
    - під столу.
    - під столі.
    correct: 0
  - question: Вона стала...
    options:
    - відомою акторкою.
    - відома акторка.
    - відому акторку.
    - відомій акторці.
    correct: 0
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я їм суп з ложкою.
    error: з ложкою
    correction: ложкою
    error_type: construction
    options:
    - ложкою
    - на ложці
    - ложку
    explanation: Для інструмента (tool) ми використовуємо орудний відмінок без прийменника
      'з'.
  - sentence: Він працює з лікарем.
    error: з лікарем
    correction: лікарем
    error_type: construction
    options:
    - лікарем
    - лікар
    - лікарю
    explanation: Професія після дієслова 'працювати' вимагає орудного відмінка без
      прийменника.
  - sentence: Ми гуляємо з дітями у парку.
    error: дітями
    correction: дітьми
    error_type: word
    options:
    - дітьми
    - дітям
    - дітей
    explanation: Слово 'діти' має особливу форму в орудному відмінку — 'дітьми'.
  - sentence: Кіт сидить під столі.
    error: столі
    correction: столом
    error_type: word
    options:
    - столом
    - стіл
    - столу
    explanation: Прийменник 'під' вимагає орудного відмінка ('столом'), а не місцевого
      ('столі').
  - sentence: Вона пише новий ручкою.
    error: новий
    correction: новою
    error_type: word
    options:
    - новою
    - новею
    - новим
    explanation: Прикметник жіночого роду в орудному відмінку має закінчення -ою ('новою').
  - sentence: Я п'ю чай з цукор.
    error: цукор
    correction: цукром
    error_type: word
    options:
    - цукром
    - цукру
    - цукрі
    explanation: Після прийменника 'з' (як інгредієнт) іменник чоловічого роду має
      закінчення -ом.
workbook:
- id: match-up-vocab
  type: match-up
  instruction: З'єднайте слово в називному відмінку з його особливою формою в орудному
    відмінку множини
  pairs:
  - left: діти
    right: дітьми
  - left: гроші
    right: грішми
  - left: кури
    right: курми
  - left: друзі
    right: друзями
  - left: руки
    right: руками
  - left: книги
    right: книгами
- id: translate-practice
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I write with a pen.
    options:
    - text: Я пишу ручкою.
      correct: true
    - text: Я пишу з ручкою.
      correct: false
    - text: Я пишу ручку.
      correct: false
    - text: Я пишу на ручці.
      correct: false
  - source: She works as a doctor.
    options:
    - text: Вона працює лікаркою.
      correct: true
    - text: Вона працює з лікаркою.
      correct: false
    - text: Вона працює лікарка.
      correct: false
    - text: Вона працює лікарку.
      correct: false
  - source: The cat sleeps under the table.
    options:
    - text: Кіт спить під столом.
      correct: true
    - text: Кіт спить під стіл.
      correct: false
    - text: Кіт спить під столі.
      correct: false
    - text: Кіт спить на столі.
      correct: false
  - source: We drink coffee with sugar.
    options:
    - text: Ми п'ємо каву з цукром.
      correct: true
    - text: Ми п'ємо каву цукром.
      correct: false
    - text: Ми п'ємо каву з цукру.
      correct: false
    - text: Ми п'ємо каву цукор.
      correct: false
  - source: They travel by bus.
    options:
    - text: Вони подорожують автобусом.
      correct: true
    - text: Вони подорожують з автобусом.
      correct: false
    - text: Вони подорожують на автобус.
      correct: false
    - text: Вони подорожують в автобусі.
      correct: false
  - source: I walk with my friend.
    options:
    - text: Я гуляю з другом.
      correct: true
    - text: Я гуляю другом.
      correct: false
    - text: Я гуляю з друга.
      correct: false
    - text: Я гуляю на другу.
      correct: false
