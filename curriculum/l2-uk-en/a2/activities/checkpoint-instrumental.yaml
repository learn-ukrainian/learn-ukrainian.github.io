version: '1.0'
module: checkpoint-instrumental
level: a2
inline:
- id: quiz-instrumental-mixed
  type: quiz
  instruction: Контрольна точка. Оберіть правильний варіант відповіді.
  items:
  - question: Ми йдемо в кіно з _____.
    options:
    - він
    - ним
    - нього
    - ньому
    correct: 1
  - question: Я завжди пишу синьою _____.
    options:
    - ручку
    - ручці
    - ручкою
    - ручка
    correct: 2
  - question: Вона багато років працює _____.
    options:
    - перекладачкою
    - перекладачка
    - перекладачку
    - перекладачці
    correct: 0
  - question: Чорна кішка спить під _____.
    options:
    - столу
    - стіл
    - столі
    - столом
    correct: 3
  - question: Мій брат дуже цікавиться українською _____.
    options:
    - історію
    - історії
    - історією
    - історія
    correct: 2
  - question: Я дуже сумую за _____.
    options:
    - ти
    - тебе
    - тобою
    - тобі
    correct: 2
  - question: Він часто розмовляє з _____.
    options:
    - матір'ю
    - мати
    - матері
    - матір
    correct: 0
  - question: Вони хочуть поїхати на море з _____.
    options:
    - нас
    - нами
    - ми
    - нам
    correct: 1
- id: fill-in-instrumental-transform
  type: fill-in
  instruction: 'Завдання: вставте слова в дужках у правильній формі орудного відмінка.'
  items:
  - sentence: Вона розмовляє з _____.
    answer: рідною сестрою
  - sentence: Кухар ріже овочі _____.
    answer: гострим ножем
  - sentence: Картина висить над _____.
    answer: моїм ліжком
  - sentence: Я цікавлюся _____.
    answer: сучасною літературою
  - sentence: Він їде на роботу _____.
    answer: швидким автобусом
  - sentence: Собака спить під _____.
    answer: круглим столом
  - sentence: Мати готує суп із _____.
    answer: свіжим м'ясом
  - sentence: Вони пишаються _____.
    answer: своїм сином
- id: group-sort-functions
  type: group-sort
  instruction: Розподіліть речення за функцією орудного відмінка.
  groups:
  - label: Інструмент або засіб
    items:
    - Кухар ріже овочі гострим ножем.
    - Ми їдемо в парк автобусом.
  - label: Супровід
    items:
    - Вона часто говорить з матір'ю.
    - Друзі обідають зі мною.
  - label: Місце
    items:
    - Дзеркало висить над умивальником.
    - Є прохід між шафою і ліжком.
  - label: Професія
    items:
    - Мій брат працює архітектором.
  - label: Час
    items:
    - Вона любить гуляти темною ніччю.
workbook:
- id: true-false-instrumental-rules
  type: true-false
  instruction: Чи правильні ці твердження про орудний відмінок?
  items:
  - statement: 'З інструментами завжди використовуємо прийменник ''з'' (наприклад:
      різати з ножем).'
    correct: false
    explanation: 'Інструмент завжди вживається без прийменника: різати ножем.'
  - statement: Після прийменника 'між' обов'язково має бути два або більше предметів.
    correct: true
    explanation: 'Так, наприклад: стояти між шафою і ліжком.'
  - statement: Словосполучення 'розмовляти на українській мові' є правильним.
    correct: false
    explanation: 'Це калька з російської. Правильно: розмовляти українською мовою.'
  - statement: З дієсловом 'цікавитися' ми не використовуємо прийменників.
    correct: true
    explanation: 'Так: цікавитися історією, музикою.'
  - statement: Займенник 'вона' після прийменника 'з' звучить як 'з нею'.
    correct: true
    explanation: 'Треба додавати букву ''н'': з нею.'
  - statement: Слова 'радість', 'сіль', 'ніч' в орудному відмінку не подвоюють приголосний.
    correct: false
    explanation: 'Ці слова мають подвоєння: радістю, сіллю, ніччю.'
- id: match-up-pronouns-instrumental
  type: match-up
  instruction: 'Вправа: з''єднайте займенник і правильну форму з прийменником.'
  pairs:
  - left: я
    right: зі мною
  - left: ти
    right: з тобою
  - left: він/воно
    right: з ним
  - left: вона
    right: з нею
  - left: ми
    right: з нами
  - left: вони
    right: з ними
- id: unjumble-instrumental-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - Я
    - ножем.
    - свіжий
    - ріжу
    - гострим
    - хліб
    correct_order:
    - Я
    - ріжу
    - свіжий
    - хліб
    - гострим
    - ножем.
  - words:
    - Картина
    - ліжком.
    - над
    - моїм
    - висить
    - велика
    correct_order:
    - Велика
    - картина
    - висить
    - над
    - моїм
    - ліжком.
  - words:
    - архітектором
    - Він
    - працює
    - компанії.
    - у
    - великій
    correct_order:
    - Він
    - працює
    - архітектором
    - у
    - великій
    - компанії.
  - words:
    - м'ясом.
    - суп
    - готує
    - смачний
    - Мати
    - із
    correct_order:
    - Мати
    - готує
    - смачний
    - суп
    - із
    - м'ясом.
  - words:
    - українською
    - Я
    - історією.
    - цікавлюся
    - дуже
    correct_order:
    - Я
    - дуже
    - цікавлюся
    - українською
    - історією.
  - words:
    - завжди
    - Батьки
    - сином.
    - своїм
    - пишаються
    correct_order:
    - Батьки
    - завжди
    - пишаються
    - своїм
    - сином.
- id: quiz-adjectives-instrumental
  type: quiz
  instruction: 'Описати предмет: визначте правильне закінчення прикметника.'
  items:
  - question: Я цікавлюся сучасн___ літературою.
    options:
    - сучасній
    - сучасним
    - сучасною
    - сучасну
    correct: 2
  - question: Кішка спить під кругл___ столом.
    options:
    - круглого
    - круглим
    - круглому
    - круглою
    correct: 1
  - question: Він їде швидк___ поїздом.
    options:
    - швидкому
    - швидкою
    - швидким
    - швидкий
    correct: 2
  - question: Вона гуляє з молодш___ братом.
    options:
    - молодшим
    - молодшому
    - молодшою
    - молодший
    correct: 0
  - question: Стежка йде сам___ краєм лісу.
    options:
    - самого
    - самому
    - самою
    - самим
    correct: 3
  - question: Ми живемо одні___ великою мрією.
    options:
    - однією
    - одним
    - одні
    - одній
    correct: 0
