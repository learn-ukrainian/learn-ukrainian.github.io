version: '1.0'
module: checkpoint-instrumental
level: a2
inline:
- id: quiz-instrumental-mixed
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: Я швидко пишу ____.
    options:
    - ручкою
    - ручка
    - ручку
    - з ручкою
    correct: 0
  - question: Ми кожного вечора гуляємо ____.
    options:
    - другом
    - з другом
    - друга
    - з друга
    correct: 1
  - question: Мій брат працює ____.
    options:
    - лікар
    - лікарю
    - лікарем
    - з лікарем
    correct: 2
  - question: Наш собака солодко спить ____.
    options:
    - під стіл
    - під столу
    - під столом
    - столом
    correct: 2
  - question: Ми завжди вечеряємо ____.
    options:
    - з їй
    - з нею
    - з вона
    - нею
    correct: 1
  - question: Дзеркало висить над ____.
    options:
    - умивальник
    - умивальнику
    - з умивальником
    - умивальником
    correct: 3
  - question: Вони дуже цікавляться ____.
    options:
    - історію
    - історією
    - історії
    - з історією
    correct: 1
  - question: Ми поїхали на пікнік ____.
    options:
    - автобус
    - автобусом
    - з автобусом
    - на автобусі
    correct: 1
- id: fill-in-instrumental-transform
  type: fill-in
  instruction: Вставте правильну форму орудного відмінка
  items:
  - sentence: Моя молодша сестра стала ____.
    answer: менеджеркою
    options:
    - менеджерка
    - менеджеркою
    - менеджерку
  - sentence: Я розмовляю ____.
    answer: українською мовою
    options:
    - українська мова
    - українською мовою
    - на українській мові
  - sentence: Він буде ____.
    answer: головним архітектором
    options:
    - головний архітектор
    - головним архітектором
    - головного архітектора
  - sentence: Ми дуже пишаємося ____.
    answer: розумними дітьми
    options:
    - розумні діти
    - розумними дітьми
    - розумних дітей
  - sentence: Я п'ю каву з ____.
    answer: холодним молоком
    options:
    - холодне молоко
    - холодним молоком
    - холодного молока
  - sentence: Її тепле взуття лежить під ____.
    answer: великим ліжком
    options:
    - велике ліжко
    - великим ліжком
    - великому ліжку
  - sentence: Вона обережно ріже свіжий хліб ____.
    answer: гострим ножем
    options:
    - гострий ніж
    - гострим ножем
    - гострого ножа
  - sentence: Я завжди сиджу між ____.
    answer: братом і сестрою
    options:
    - брат і сестра
    - братом і сестрою
    - брата і сестру
- id: group-sort-functions
  type: group-sort
  instruction: Розподіліть речення за функцією орудного відмінка
  groups:
  - label: Інструмент
    items:
    - Я пишу синьою ручкою.
    - Ми поїхали автобусом.
  - label: Супровід
    items:
    - Я гуляю з другом.
    - Вони їли бутерброди з ковбасою.
  - label: Професія чи стан
    items:
    - Вона працює лікаркою.
    - Цей день був найкращим!
  - label: Місце
    items:
    - Собака спить під столом.
    - Стіл стоїть між вікнами.
workbook:
- type: match-up
  instruction: З'єднайте дієслова або прийменники з правильною формою орудного відмінка
  pairs:
  - left: працювати
    right: лікарем
  - left: бути
    right: вчителем
  - left: цікавитися
    right: історією
  - left: пишатися
    right: дітьми
  - left: гуляти з
    right: другом
  - left: сумувати за
    right: домом
  - left: розмовляти
    right: українською мовою
- type: unjumble
  instruction: Складіть правильні речення зі слів
  items:
  - words:
    - працює
    - Він
    - лікарем.
    correct_order:
    - Він
    - працює
    - лікарем.
  - words:
    - собакою.
    - гуляємо
    - Ми
    - з
    correct_order:
    - Ми
    - гуляємо
    - з
    - собакою.
  - words:
    - лежить
    - взуття
    - ліжком.
    - Моє
    - під
    correct_order:
    - Моє
    - взуття
    - лежить
    - під
    - ліжком.
  - words:
    - братом
    - і
    - між
    - сиджу
    - сестрою.
    - Я
    correct_order:
    - Я
    - сиджу
    - між
    - братом
    - і
    - сестрою.
  - words:
    - сучасним
    - Вони
    - мистецтвом.
    - цікавляться
    correct_order:
    - Вони
    - цікавляться
    - сучасним
    - мистецтвом.
  - words:
    - тобою.
    - сумую
    - Я
    - за
    correct_order:
    - Я
    - сумую
    - за
    - тобою.
- type: true-false
  instruction: Прочитайте твердження про орудний відмінок і виберіть, чи вони правдиві
  items:
  - statement: 'Прийменник ''з'' використовується для інструментів (наприклад: ''писати
      з ручкою'').'
    correct: false
    explanation: 'Для інструментів використовується орудний відмінок без прийменників
      (наприклад: ''писати ручкою'').'
  - statement: Після прийменників займенник 'він' має форму 'ним'.
    correct: true
    explanation: Третя особа займенників після прийменників завжди починається на
      букву 'н' (з ним, над нею).
  - statement: Дієслова 'бути' та 'працювати' вимагають орудного відмінка.
    correct: true
    explanation: 'Наприклад: ''Він буде архітектором'', ''Вона працює лікаркою''.'
  - statement: Українською правильно говорити 'я розмовляю на українській мові'.
    correct: false
    explanation: 'Правильно: ''я розмовляю українською мовою'' (орудний відмінок без
      прийменника).'
  - statement: Дієслово 'цікавитися' вимагає орудного відмінка без прийменників.
    correct: true
    explanation: 'Наприклад: ''Я цікавлюся історією''.'
  - statement: Щоб сказати 'I miss you', ми говоримо 'Я сумую по тобі'.
    correct: false
    explanation: 'Правильна форма: ''Я сумую за тобою'' (за + орудний відмінок).'
