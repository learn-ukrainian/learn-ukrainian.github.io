- type: cloze
  title: "Заповніть пропуски в історії"
  passage: "Ця цікава історія сталася зі мною влітку. {{1}} разу ми з друзями поїхали відпочивати на море. {{2}} погода була дуже гарна, і ми довго плавали. {{3}} ми вирішили піти в ліс, який був біля нашого готелю. Ми гуляли там кілька годин і слухали, як співають птахи. {{4}} небо стало чорним і почалася жахлива буря! Ми дуже злякалися. {{5}} для нас, ця буря була дуже сильною. Ми побігли назад так швидко, як тільки могли. {{6}} ми побачили наш готель і сховалися всередині. Ця неприємна {{7}} дуже нас налякала. Але {{8}} ми зрозуміли, що це була весела пригода. Ми ще довго згадували цей день і розповідали цей {{9}} нашим колегам. Справжній {{10}} завжди знає, як зацікавити свою аудиторію."
  instruction: "Прочитайте цю історію і вставте пропущені слова, щоб вона була зв'язною та логічною."
  blanks:
    - id: 1
      answer: "Одного"
      options: ["Одного", "Два", "Першого", "Цього"]
    - id: 2
      answer: "Спочатку"
      options: ["Спочатку", "Потім", "Нарешті", "Раптом"]
    - id: 3
      answer: "Потім"
      options: ["Потім", "Раніше", "Давно", "З початку"]
    - id: 4
      answer: "Раптом"
      options: ["Раптом", "Спочатку", "Нарешті", "Недавно"]
    - id: 5
      answer: "Несподівано"
      options: ["Несподівано", "Спочатку", "Потім", "Нарешті"]
