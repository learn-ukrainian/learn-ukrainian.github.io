- type: match-up
  title: "Знайдіть переклад"
  instruction: "З'єднайте українські маркери часу з їхнім англійським перекладом."
  pairs:
    - left: "спочатку"
      right: "at first"
    - left: "потім"
      right: "then / afterwards"
    - left: "нарешті"
      right: "finally"
    - left: "раптом"
      right: "suddenly"
    - left: "одного разу"
      right: "once / one day"
    - left: "несподівано"
      right: "unexpectedly"
    - left: "казка"
      right: "fairytale"
    - left: "анекдот"
      right: "joke / short story"

- type: true-false
  title: "Правда чи брехня?"
  instruction: "Визначте, чи є ці твердження про маркери часу правильними."
  items:
    - statement: "Маркери часу в українській мові зазвичай стоять на самому початку речення."
      correct: true
      explanation: "Так, ці слова є темою речення, тому вони починають дію."
    - statement: "Стиль робота означає використання дуже складних граматичних слів."
      correct: false
      explanation: "Ні, стиль робота - це надмірне використання слова 'і' для кожної дії."
    - statement: "Слово 'нарешті' показує несподівану подію або сюрприз."
      correct: false
      explanation: "Ні, воно означає успішний фінал дуже довгого процесу."
    - statement: "Український сільський казкар завжди читав свої історії з великої книги."
      correct: false
      explanation: "Ні, казкар покладався на багату усну традицію, а не на книги."
    - statement: "Слово 'спочатку' відповідає на питання 'коли?' і завжди пишеться разом."
      correct: true
      explanation: "Так, це прислівник часу, який вказує на першу дію."
    - statement: "Фраза 'з початку' означає дію від стартової точки конкретного об'єкта."
      correct: true
      explanation: "Так, наприклад: 'прочитати текст з початку до кінця'."
    - statement: "Слово 'несподівано' є абсолютним синонімом до слова 'спочатку'."
      correct: false
      explanation: "Ні, ці слова мають абсолютно різне значення."
    - statement: "Знаменита фраза 'Одного разу' дуже часто починає звичайну історію з життя."
      correct: true
      explanation: "Так, це ідеальний класичний маркер для старту нової розповіді."

- type: fill-in
  title: "Оберіть правильне слово"
  instruction: "Заповніть пропуски відповідними маркерами часу, щоб історія була логічною."
  items:
    - sentence: "___ я швидко поїв, а потім пішов на свою роботу."
      answer: "Спочатку"
      options: ["Спочатку", "Нарешті", "Раптом", "З початку"]
    - sentence: "Він довго шукав свої ключі і ___ знайшов їх під столом."
      answer: "нарешті"
      options: ["нарешті", "спочатку", "потім", "раптом"]
    - sentence: "Ми спокійно гуляли в парку, як ___ почався сильний дощ."
      answer: "раптом"
      options: ["раптом", "потім", "нарешті", "раніше"]
    - sentence: "Прочитай цей складний текст ___ до самого кінця."
      answer: "з початку"
      options: ["з початку", "спочатку", "потім", "нарешті"]
    - sentence: "___ ми жили у великому Києві, а тепер живемо у Львові."
      answer: "Раніше"
      options: ["Раніше", "Спочатку", "Недавно", "Давно"]
    - sentence: "___ жарким влітку ми з друзями поїхали високо в гори."
      answer: "Одного разу"
      options: ["Одного разу", "Спочатку", "Раптом", "Нарешті"]
    - sentence: "Старі гості приїхали дуже ___, ми зовсім не були готові."
      answer: "несподівано"
      options: ["несподівано", "спочатку", "нарешті", "потім"]
    - sentence: "Розумний студент прочитав книгу, а ___ написав гарне есе."
      answer: "потім"
      options: ["потім", "спочатку", "з початку", "раптом"]

- type: error-correction
  title: "Виправте помилки в реченнях"
  instruction: "Знайдіть і виправте помилки у використанні маркерів часу."
  items:
    - sentence: "З початку я випив каву, а тоді пішов працювати."
      error: "З початку"
      answer: "Спочатку"
      options: ["Спочатку", "Потім", "Нарешті", "Раптом"]
      explanation: "Для послідовності дій ми завжди пишемо слово разом: спочатку."
    - sentence: "Він почав читати цю нудну книгу спочатку сторінки."
      error: "спочатку"
      answer: "з початку"
      options: ["з початку", "потім", "нарешті", "раніше"]
      explanation: "Від стартової точки об'єкта ми завжди пишемо окремо: з початку."
    - sentence: "Ми довго чекали наш автобус, і раптом він приїхав."
      error: "раптом"
      answer: "нарешті"
      options: ["нарешті", "спочатку", "потім", "недавно"]
      explanation: "Фінал довгого очікування - це слово 'нарешті', а не 'раптом'."
    - sentence: "Вона гуляла в парку, як нарешті побачила великого ведмедя."
      error: "нарешті"
      answer: "раптом"
      options: ["раптом", "спочатку", "потім", "давно"]
      explanation: "Несподівана подія або великий сюрприз - це завжди слово 'раптом'."
    - sentence: "Я прийшов додому і я випив чай."
      error: "і я випив"
      answer: "а потім випив"
      options: ["а потім випив", "і я спочатку", "і я раптом", "і нарешті я"]
      explanation: "Щоб уникнути стилю робота, використовуйте 'потім' замість постійного повторення 'і'."
    - sentence: "Він шукав свої втрачені ключі цілу годину і спочатку знайшов їх."
      error: "спочатку"
      answer: "нарешті"
      options: ["нарешті", "потім", "раптом", "раніше"]
      explanation: "Кінець довгого пошуку позначається словом 'нарешті'."

- type: quiz
  title: "Перевірте свої знання"
  instruction: "Дайте відповіді на запитання про правила побудови цікавої історії."
  items:
    - question: "Яке слово найкраще підходить для початку нової історії?"
      explanation: "Фраза 'одного разу' є традиційною для початку розповіді."
      options:
        - text: "одного разу"
          correct: true
        - text: "нарешті"
          correct: false
        - text: "потім"
          correct: false
        - text: "раптом"
          correct: false
    - question: "Яке слово допомагає створити емоційну напругу в тексті?"
      explanation: "Слово 'раптом' створює сюрприз та несподіванку."
      options:
        - text: "раптом"
          correct: true
        - text: "спочатку"
          correct: false
        - text: "потім"
          correct: false
        - text: "раніше"
          correct: false
    - question: "Де в українському реченні зазвичай стоять слова-маркери часу?"
      explanation: "Маркери часу є темою речення, тому вони стоять на першому місці."
      options:
        - text: "на початку речення"
          correct: true
        - text: "в кінці речення"
          correct: false
        - text: "тільки після дієслова"
          correct: false
        - text: "тільки перед іменником"
          correct: false
    - question: "Як уникнути нудного та монотонного 'стилю робота'?"
      explanation: "Дорожні знаки часу роблять текст живим і різноманітним."
      options:
        - text: "використовувати слова-зв'язки замість 'і'"
          correct: true
        - text: "говорити тільки дуже короткі речення"
          correct: false
        - text: "використовувати більше англійських слів"
          correct: false
        - text: "ніколи не робити паузи під час розмови"
          correct: false
    - question: "Як правильно написати: почав читати нову книгу ___?"
      explanation: "Якщо мова йде про об'єкт (книга), пишемо окремо: з початку."
      options:
        - text: "з початку"
          correct: true
        - text: "спочатку"
          correct: false
        - text: "зпочатку"
          correct: false
        - text: "с початку"
          correct: false
    - question: "Яке слово означає довгоочікуваний фінал дуже складного процесу?"
      explanation: "Слово 'нарешті' має сильне позитивне забарвлення завершення."
      options:
        - text: "нарешті"
          correct: true
        - text: "раптом"
          correct: false
        - text: "спочатку"
          correct: false
        - text: "недавно"
          correct: false
    - question: "Що в українській культурі означає традиційна фраза 'Жили-були'?"
      explanation: "Ця магічна фраза є класичним стартом для дитячих казок."
      options:
        - text: "початок народної казки"
          correct: true
        - text: "початок страшної історії"
          correct: false
        - text: "кінець смішного анекдоту"
          correct: false
        - text: "фінал довгої подорожі"
          correct: false
    - question: "Яке слово має граматичне та стилістичне значення, синонімічне до слова 'раптом'?"
      explanation: "Обидва слова показують несподівану або дуже різку подію."
      options:
        - text: "несподівано"
          correct: true
        - text: "давно"
          correct: false
        - text: "спочатку"
          correct: false
        - text: "нарешті"
          correct: false

- type: unjumble
  title: "Складіть правильні речення"
  instruction: "Поставте слова в правильному порядку. Пам'ятайте, де стоять маркери часу!"
  items:
    - words: ["Спочатку", "ми", "пили", "гарячу", "каву"]
      answer: "Спочатку ми пили гарячу каву"
    - words: ["Потім", "ми", "пішли", "в", "кінотеатр"]
      answer: "Потім ми пішли в кінотеатр"
    - words: ["Нарешті", "ми", "повернулися", "додому"]
      answer: "Нарешті ми повернулися додому"
    - words: ["Раптом", "почався", "дуже", "сильний", "дощ"]
      answer: "Раптом почався дуже сильний дощ"
    - words: ["Одного", "разу", "я", "поїхав", "у", "гори"]
      answer: "Одного разу я поїхав у гори"
    - words: ["Несподівано", "наш", "старий", "друг", "приїхав"]
      answer: "Несподівано наш старий друг приїхав"

