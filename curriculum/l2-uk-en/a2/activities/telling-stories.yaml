        - 'Я'
        - 'тут'
        - 'бачив.'
        - 'вже'
        - 'тебе'
        - 'дуже'
      answer: 'Я вже дуже давно тебе тут не бачив.'

- type: error-correction
  title: 'Редактор історій'
  instruction: 'Find and correct the mistake in each sentence. Look for wrong connectors or confused words.'
  items:
    - sentence: 'З початку я снідаю, а потім працюю.'
      error: 'З початку'
      answer: 'Спочатку'
      options:
        - 'Спочатку'
        - 'Раніше'
        - 'Нарешті'
        - 'Раптом'
      explanation: 'Use the adverb "Спочатку" (one word) for "At first". "З початку" means "from the start of something".'
    - sentence: 'Я пішов у магазин, і спочатку зустрів друга.'
      error: 'спочатку'
      answer: 'раптом'
      options:
        - 'раптом'
        - 'спочатку'
        - 'раніше'
        - 'давно'
      explanation: 'Meeting a friend unexpectedly usually requires "раптом" (suddenly) or "несподівано", not "at first".'
    - sentence: 'Нарешті ми жили у Києві, але тепер живемо тут.'
      error: 'Нарешті'
      answer: 'Раніше'
      options:
        - 'Раніше'
        - 'Нарешті'
        - 'Спочатку'
        - 'Раптом'
      explanation: 'To describe a past state (used to live), use "Раніше". "Нарешті" means "Finally".'
    - sentence: 'Я спочатку бачив цей фільм.'
      error: 'спочатку'
      answer: 'вже'
      options:
        - 'вже'
        - 'спочатку'
        - 'потім'
        - 'раптом'
      explanation: '"Спочатку" doesn''t fit here contextually if you mean you have seen it "already" (вже) or "previously" (раніше).'
      error_type: 'word'
    - sentence: 'Він несподівано поїхав, а потім повернувся.'
      error: 'несподівано'
      answer: 'спочатку'
      options:
        - 'спочатку'
        - 'несподівано'
        - 'раптом'
        - 'нарешті'
      explanation: 'If the sequence is "X, then Y", the first part usually starts with "Спочатку" (First he left, then he returned).'
    - sentence: 'Ми ледве встигли на поїзд, бо прийшли дуже рано.'
      error: 'рано'
      answer: 'пізно'
      options:
        - 'пізно'
        - 'рано'
        - 'швидко'
        - 'давно'
      explanation: 'If you "barely" (ледве) made it, you probably arrived "late" (пізно), not early.'

