- type: match-up
  title: 'Знайдіть пару: Слова-маркери'
  instruction: 'Match the Ukrainian connector with its English equivalent or function.'
  pairs:
    - left: 'спочатку'
      right: 'at first / initially'
    - left: 'потім'
      right: 'then / next'
    - left: 'нарешті'
      right: 'finally'
    - left: 'раптом'
      right: 'suddenly'
    - left: 'несподівано'
      right: 'unexpectedly'
    - left: 'раніше'
      right: 'earlier / used to'
    - left: 'недавно'
      right: 'recently / not long ago'
    - left: 'давно'
      right: 'long ago'
    - left: 'тільки-но'
      right: 'just as / as soon as'
    - left: 'ледве'
      right: 'barely / hardly'
    - left: 'жили-були'
      right: 'once upon a time (fairy tale)'
    - left: 'одного разу'
      right: 'one time (story opener)'

- type: group-sort
  title: 'Сортування: Типи конекторів'
  instruction: 'Sort the words into the correct category based on their function in a story.'
  groups:
    - name: 'Послідовність (Sequence)'
      items:
        - 'спочатку'
        - 'потім'
        - 'нарешті'
        - 'після цього'
        - 'згодом'
    - name: 'Драма і сюрприз (Drama)'
      items:
        - 'раптом'
        - 'несподівано'
        - 'аж раптом'
        - 'як тут'
    - name: 'Час (Relative Time)'
      items:
        - 'раніше'
        - 'недавно'
        - 'давно'
        - 'колись'

- type: quiz
  title: 'Перевірка правил: Як будувати історію'
  instruction: 'Choose the correct answer based on the rules of Ukrainian storytelling.'
  items:
    - question: 'Яка різниця між «спочатку» та «з початку»?'
      explanation: '«Спочатку» (at first) — це прислівник часу. «З початку» (from the start) — це прийменник з іменником.'
      options:
        - text: '«Спочатку» — це коли, а «з початку» — це звідки.'
          correct: true
        - text: 'Це синоніми, різниці немає.'
          correct: false
        - text: '«Спочатку» пишеться окремо.'
          correct: false
        - text: '«З початку» використовується тільки в минулому часі.'
          correct: false
    - question: 'Де найкраще ставити маркер часу (вчора, потім) у реченні для розповіді?'
      explanation: 'Для природної розповіді маркер часу ставиться на початок речення (тема).'
      options:
        - text: 'На початку речення.'
          correct: true
        - text: 'В кінці речення.'
          correct: false
        - text: 'Тільки після дієслова.'
          correct: false
        - text: 'Це не має значення.'
          correct: false
    - question: 'Яка фраза є класичним початком української казки?'
      explanation: '«Жили-були» — це традиційний початок казок.'
      options:
        - text: 'Жили-були...'
          correct: true
        - text: 'Привіт усім...'
          correct: false
        - text: 'Як справи...'
          correct: false
        - text: 'Слухайте сюди...'
          correct: false
    - question: 'Яке слово допомагає створити напругу або показати поворот сюжету?'
      explanation: '«Раптом» сигналізує про несподівану зміну подій.'
      options:
        - text: 'Раптом'
          correct: true
        - text: 'Спочатку'
          correct: false
        - text: 'Зазвичай'
          correct: false
        - text: 'Завжди'
          correct: false
    - question: 'Якщо ви хочете сказати, що подія сталася дуже давно, яке слово ви оберете?'
      explanation: '«Давно» означає довгий час тому.'
      options:
        - text: 'Давно'
          correct: true
        - text: 'Недавно'
          correct: false
        - text: 'Зараз'
          correct: false
        - text: 'Скоро'
          correct: false
    - question: 'Що саме означає українське слово «ледве»?'
      explanation: '«Ледве» означає, що дія відбулася з трудом або в останній момент (barely).'
      options:
        - text: 'Насилу, майже ні.'
          correct: true
        - text: 'Дуже легко.'
          correct: false
        - text: 'Швидко.'
          correct: false
        - text: 'Обов’язково.'
          correct: false
    - question: 'Як краще з’єднувати речення замість постійного «і»?'
      explanation: 'Використання слів «спочатку», «потім», «нарешті» робить мову багатшою.'
      options:
        - text: 'Використовувати «спочатку», «потім», «нарешті».'
          correct: true
        - text: 'Використовувати «або».'
          correct: false
        - text: 'Робити довгі паузи.'
          correct: false
        - text: 'Говорити дуже швидко.'
          correct: false
    - question: 'Який стиль зазвичай використовує слово «раптом» і теперішній час?'
      explanation: 'Анекдоти часто використовують «раптом» і теперішній час для динаміки.'
      options:
        - text: 'Анекдот.'
          correct: true
        - text: 'Офіційний звіт.'
          correct: false
        - text: 'Наукова стаття.'
          correct: false
        - text: 'Рецепт.'
          correct: false

- type: fill-in
  title: 'Конструктор історій'
  instruction: 'Complete the sentences with the correct sequencing word or time marker.'
  items:
    - sentence: '_____ ми купили квитки, а потім пішли на поїзд.'
      answer: 'Спочатку'
      options:
        - 'Спочатку'
        - 'Нарешті'
        - 'Раптом'
        - 'Давно'
      explanation: 'First we bought tickets... Use "Спочатку" for the first action.'
    - sentence: 'Ми довго чекали автобус і _____ він приїхав.'
      answer: 'нарешті'
      options:
        - 'нарешті'
        - 'спочатку'
        - 'раніше'
        - 'з початку'
      explanation: 'Finally it arrived. Use "нарешті" for the result after waiting.'
    - sentence: 'Ми гуляли в лісі, і _____ вибіг заєць.'
      answer: 'раптом'
      options:
        - 'раптом'
        - 'раніше'
        - 'давно'
        - 'спочатку'
      explanation: 'Suddenly a hare ran out. Use "раптом" for a surprise.'
    - sentence: '_____ тут був парк, а тепер тут будинок.'
      answer: 'Раніше'
      options:
        - 'Раніше'
        - 'Потім'
        - 'Нарешті'
        - 'Раптом'
      explanation: 'Earlier/Previously there was a park. Use "Раніше" for past states.'
    - sentence: 'Я _____ бачив твого брата, всього два дні тому.'
      answer: 'недавно'
      options:
        - 'недавно'
        - 'давно'
        - 'спочатку'
        - 'ледве'
      explanation: 'Recently (not long ago). Use "недавно".'
    - sentence: 'Ми _____ встигли на літак, двері вже зачинялися.'
      answer: 'ледве'
      options:
        - 'ледве'
        - 'давно'
        - 'спочатку'
        - 'раніше'
      explanation: 'Barely made it. Use "ледве".'
    - sentence: '_____ я зайшов у дім, задзвонив телефон.'
      answer: 'Тільки-но'
      options:
        - 'Тільки-но'
        - 'Давно'
        - 'Нарешті'
        - 'Раніше'
      explanation: 'Just as I entered. Use "Тільки-но" for simultaneous actions.'
    - sentence: 'Давай подивимося цей фільм _____.'
      answer: 'з початку'
      options:
        - 'з початку'
        - 'спочатку'
        - 'раптом'
        - 'нарешті'
      explanation: 'From the beginning (of the film). Use "з початку" (two words).'

