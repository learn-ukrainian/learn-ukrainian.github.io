- type: mark-the-words
  title: "Знайдіть маркери часу"
  instruction: "Знайдіть і позначте всі маркери часу та слова-зв'язки в тексті."
  text: "Раніше я ніколи не був у цьому місті. Спочатку воно здалося мені дуже великим. Потім я звик до його вулиць. Раптом я зрозумів, що люблю його. Нарешті я знайшов тут свій новий дім. Недавно я розповів про це своїм друзям."
  answers: ["Раніше", "Спочатку", "Потім", "Раптом", "Нарешті", "Недавно"]

