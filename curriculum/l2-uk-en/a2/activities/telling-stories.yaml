- type: true-false
  title: 'Міфи та правда про історії'
  instruction: 'Decide if the statement about storytelling in Ukrainian is true or false.'
  items:
    - statement: 'Слово "спочатку" пишеться разом.'
      correct: true
      explanation: 'Так, це прислівник (at first).'
    - statement: 'Слово "з початку" пишеться разом.'
      correct: false
      explanation: 'Ні, це прийменник "з" та іменник "початок" (from the start).'
    - statement: 'Щоб історія звучала динамічно, краще починати речення з часу.'
      correct: true
      explanation: 'Так, це встановлює сцену (Theme) перед дією (Rheme).'
    - statement: 'Анекдоти зазвичай розповідають у минулому часі.'
      correct: false
      explanation: 'Для динаміки анекдоти часто використовують теперішній час.'
    - statement: 'Слово "раптом" використовується для опису рутинних подій.'
      correct: false
      explanation: 'Ні, "раптом" (suddenly) сигналізує про несподіванку.'
    - statement: 'Фраза "Жили-були" типова для новин.'
      correct: false
      explanation: 'Ні, це класичний початок казок.'
    - statement: 'Слово "нарешті" означає "finally".'
      correct: true
      explanation: 'Так, воно підсумовує результат.'
    - statement: 'Можна використовувати "і... і... і..." скільки завгодно.'
      correct: false
      explanation: 'Це робить мову "роботизованою". Краще чергувати з "потім", "після цього".'

