          correct: true
        - text: 'Я'
          correct: false
        - text: 'Лікар'
          correct: false
        - text: 'Біль'
          correct: false
    - question: 'Як можна перекласти англійське слово «painkillers» українською мовою?'
      explanation: 'Знеболювальне — ліки проти болю.'
      options:
