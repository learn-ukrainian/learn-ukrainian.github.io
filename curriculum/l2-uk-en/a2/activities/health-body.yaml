      answer: 'Швидко купіть усі необхідні ліки в аптеці'

- type: quiz
  title: 'Перевірка знань: Здоров’я та Культура'
  instruction: 'Дайте відповідь на запитання про здоров’я та українські традиції.'
  items:
    - question: 'Що означає відоме прислів’я «У здоровому тілі — здоровий дух»?'
      explanation: 'Це означає зв’язок між фізичним та ментальним здоров’ям.'
      options:
        - text: 'Фізичне здоров’я впливає на настрій'
          correct: true
        - text: 'Тільки дух важливий'
          correct: false
        - text: 'Тіло не важливе'
          correct: false
        - text: 'Спорт — це погано'
          correct: false
    - question: 'Що таке «гірчичники» і як їх використовують в Україні?'
      explanation: 'Це засіб народної медицини для прогрівання.'
      options:
        - text: 'Папір з гірчицею для лікування'
          correct: true
        - text: 'Смачна їжа з гірчицею'
          correct: false
        - text: 'Вид спорту'
          correct: false
        - text: 'Назва лікаря'
          correct: false
    - question: 'Куди ми зазвичай йдемо, коли дуже сильно хворіємо?'
      explanation: 'Ми йдемо до людини (лікаря).'
      options:
        - text: 'До лікаря'
          correct: true
        - text: 'В лікаря'
          correct: false
        - text: 'На лікаря'
          correct: false
        - text: 'З лікарем'
          correct: false
    - question: 'Куди зазвичай їде машина швидкої допомоги з пацієнтом?'
      explanation: 'Швидка їде в місце (лікарню).'
      options:
        - text: 'В лікарню'
          correct: true
        - text: 'До лікарні'
          correct: false
        - text: 'На лікарню'
          correct: false
        - text: 'У лікаря'
          correct: false
    - question: 'Яка червона ягода найкраще допомагає від застуди в українській традиції?'
      explanation: 'Малина — найпопулярніший засіб.'
      options:
        - text: 'Малина'
          correct: true
        - text: 'Полуниця'
          correct: false
        - text: 'Вишня'
          correct: false
        - text: 'Кавун'
          correct: false
    - question: 'У граматичній конструкції «У мене болить голова», хто виконує дію?'
      explanation: 'Голова є підметом і виконує дію «болить».'
      options:
