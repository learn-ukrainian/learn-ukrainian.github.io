- type: fill-in
  title: 'Даємо поради: Треба чи варто?'
  instruction: 'Вставте правильне слово в речення, враховуючи тон поради (суворий чи дружній).'
  items:
    - sentence: 'Якщо у вас висока температура, вам обов''язково [blank] викликати лікаря.'
      answer: 'треба'
      options: ['треба', 'варто', 'можна', 'погано']
      explanation: 'Висока температура — це серйозно, тому використовуємо більш суворе «треба».'
    - sentence: 'Ви дуже втомлені. Я думаю, що вам [blank] взяти відпустку і поїхати в Карпати.'
      answer: 'варто'
      options: ['варто', 'треба', 'сильно', 'краще']
      explanation: 'Це дружня порада для покращення стану, тому використовуємо м''яке «варто».'
    - sentence: 'Для здорового серця і судин нам усім [blank] пити менше міцної кави.'
      answer: 'варто'
      options: ['варто', 'треба', 'холодно', 'жарко']
      explanation: 'Це загальна медична рекомендація для профілактики.'
    - sentence: 'У мене страшенно болить зуб, мені негайно [blank] йти в клініку.'
      answer: 'треба'
      options: ['треба', 'варто', 'боляче', 'швидко']
      explanation: 'Гострий біль вимагає термінових дій («треба»).'
    - sentence: 'Щоб зняти хронічний стрес, тобі [blank] спробувати ранкову йогу.'
      answer: 'варто'
      options: ['варто', 'треба', 'добре', 'сильно']
      explanation: 'Йога — це гарна ідея і м''яка пропозиція.'
    - sentence: 'Без рецепта ці сильні антибіотики вам не продадуть, [blank] йти до сімейного лікаря.'
      answer: 'треба'
      options: ['треба', 'варто', 'погано', 'можна']
      explanation: 'Це закон і сувора необхідність, обов''язкова дія.'
    - sentence: 'Твій сухий кашель не проходить вже тиждень. Тобі [blank] серйозно лікуватися.'
      answer: 'треба'
      options: ['треба', 'варто', 'краще', 'сильно']
      explanation: 'Довгий тривожний симптом вимагає обов''язкового лікування.'
    - sentence: 'На вулиці сьогодні чудовий весняний день. Нам [blank] піти на пробіжку.'
      answer: 'варто'
      options: ['варто', 'треба', 'жарко', 'холодно']
      explanation: 'Це пропозиція активного відпочинку на свіжому повітрі.'

- type: quiz
  title: 'Традиційна чи сучасна медицина?'
  instruction: 'Оберіть правильну відповідь на питання про українські традиції оздоровлення.'
  items:
    - question: 'Який традиційний український засіб найчастіше п''ють від високої температури?'
      explanation: 'Чай з малиною має природну саліцилову кислоту, яка м''яко знижує жар.'
      options:
        - text: 'чай з малиною'
          correct: true
        - text: 'чай з кавою'
          correct: false
        - text: 'холодну воду з льодом'
          correct: false
        - text: 'гаряче молоко з перцем'
          correct: false
    - question: 'Що таке скляні банки в старій українській народній медицині?'
      explanation: 'Це спеціальні скляні посудини, які ставлять на спину для покращення кровообігу.'
      options:
        - text: 'скляні посудини для лікування кашлю'
          correct: true
        - text: 'метал для вуличних тренажерів'
          correct: false
        - text: 'сучасні антибіотики в аптеці'
          correct: false
        - text: 'спеціальний вид українського чаю'
          correct: false
    - question: 'Для чого українці традиційно використовують гарячі гірчичники?'
      explanation: 'Гірчичники чудово прогрівають глибокі легені та спину при сильному кашлі.'
      options:
        - text: 'щоб гріти спину при сильному кашлі'
          correct: true
        - text: 'щоб знизити високу температуру'
          correct: false
        - text: 'щоб лікувати сильний стрес'
          correct: false
        - text: 'щоб краще спати вночі'
          correct: false
    - question: 'Що роблять з березовим віником в українській бані чи сауні?'
      explanation: 'Віником легко б''ють по розігрітому тілу як інтенсивний гарячий масаж.'
      options:
        - text: 'ним роблять інтенсивний гарячий масаж'
          correct: true
        - text: 'з нього роблять лікувальний чай'
          correct: false
        - text: 'його кладуть на голову від болю'
          correct: false
        - text: 'ним чистять вуличні тренажери'
          correct: false
    - question: 'Яку відому рослину українці використовують для зниження високого тиску крові?'
      explanation: 'Калина — це традиційна рослина, чиї гіркі ягоди допомагають знизити тиск.'
      options:
        - text: 'червону калину'
          correct: true
        - text: 'зелену капусту'
          correct: false
        - text: 'солодке яблуко'
          correct: false
        - text: 'чорну каву'
          correct: false
    - question: 'Де в сучасних українських містах можна знайти безкоштовні вуличні тренажери?'
      explanation: 'Вони часто стоять у звичайних дворах та міських зелених парках для всіх громадян.'
      options:
        - text: 'у зелених міських парках'
          correct: true
        - text: 'у кожній великій аптеці'
          correct: false
        - text: 'в кабінеті сімейного лікаря'
          correct: false
        - text: 'у кімнатах приватної клініки'
          correct: false
    - question: 'Що означає популярне українське прислів''я "Здоров''я — найбільше багатство"?'
      explanation: 'Це означає, що фізичне та ментальне благополуччя набагато важливіше за гроші.'
      options:
        - text: 'що здоров''я важливіше за гроші'
          correct: true
        - text: 'що лікарі дуже багаті люди'
          correct: false
        - text: 'що страхування коштує дуже дорого'
          correct: false
        - text: 'що здоровий спосіб життя це бізнес'
          correct: false
    - question: 'Як українські лікарі сьогодні комплексно розуміють концепцію здоров''я?'
      explanation: 'Здоров''я складається з трьох рівних частин: фізичного, ментального та духовного благополуччя.'
      options:
        - text: 'як гармонію тіла, розуму та душі'
          correct: true
        - text: 'як просту відсутність високої температури'
          correct: false
        - text: 'як можливість працювати без відпочинку'
          correct: false
        - text: 'як вміння швидко бігати на вулиці'
          correct: false

- type: fill-in
  title: 'У системі охорони здоров''я'
  instruction: 'Доповніть речення правильними словами з теми медицини.'
  items:
    - sentence: 'Для того щоб отримувати безкоштовні медичні послуги, вам потрібна [blank] з сімейним лікарем.'
      answer: 'декларація'
      options: ['декларація', 'аптека', 'рецепт', 'страхування']
    - sentence: 'Якщо ви маєте медичне [blank], ваша IT-компанія платить за візит до приватної клініки.'
      answer: 'страхування'
      options: ['страхування', 'нездужання', 'багатство', 'харчування']
    - sentence: 'Мій [blank] лікар знає мою історію хвороб і може дати направлення до вузького спеціаліста.'
      answer: 'сімейний'
      options: ['сімейний', 'приватний', 'черговий', 'хворий']
    - sentence: 'Я завжди купую ліки в цій аптеці, тому що вона [blank] і працює навіть вночі.'
      answer: 'цілодобова'
      options: ['цілодобова', 'розумна', 'здорова', 'ментальна']
    - sentence: 'У мене болить горло, тому завтра я обов''язково йду на огляд до [blank].'
      answer: 'лікаря'
      options: ['лікаря', 'лікарні', 'аптеки', 'бані']
    - sentence: 'Після складної автомобільної аварії мого сусіда забрали в центральну [blank] на операцію.'
      answer: 'лікарню'
      options: ['лікарню', 'поліклініку', 'аптеку', 'пробіжку']
    - sentence: 'Щоб купити сильні антибіотики в Україні, вам обов''язково треба отримати офіційний [blank].'
      answer: 'рецепт'
      options: ['рецепт', 'паспорт', 'чек', 'діагноз']
    - sentence: 'У цій великій приватній [blank] немає нудних черг і працює дуже привітний персонал.'
      answer: 'клініці'
      options: ['клініці', 'аптеці', 'бані', 'зарядці']

- type: unjumble
  title: 'Зберіть речення про здоровий спосіб життя'
  instruction: 'Розташуйте слова в правильному порядку, щоб утворити граматично коректні речення.'
  items:
    - words: ['мене', 'у', 'голова', 'болить', 'сьогодні', 'дуже']
      answer: 'Сьогодні у мене дуже болить голова'
    - words: ['до', 'піти', 'вам', 'сімейного', 'лікаря', 'варто']
      answer: 'Вам варто піти до сімейного лікаря'
    - words: ['піклується', 'своє', 'молодь', 'про', 'здоров''я', 'сучасна']
      answer: 'Сучасна молодь піклується про своє здоров''я'
    - words: ['я', 'високу', 'вчора', 'мав', 'температуру']
      answer: 'Вчора я мав високу температуру'
    - words: ['допомагає', 'стрес', 'роботи', 'йога', 'знімати', 'після']
      answer: 'Йога допомагає знімати стрес після роботи'
    - words: ['на', 'ліки', 'купив', 'я', 'грипу', 'від', 'аптеці', 'в']
      answer: 'Я купив ліки від грипу в аптеці'

- type: group-sort
  title: 'Болить чи болять?'
  instruction: 'Розподіліть частини тіла за правильною формою дієслова (однина чи множина).'
  groups:
    - name: 'У мене болить...'
      items: ['голова', 'спина', 'один зуб', 'живіт', 'горло', 'права нога']
    - name: 'У мене болять...'
      items: ['очі', 'зуби', 'дві ноги', 'руки', 'вуха', 'м''язи']

- type: error-correction
  title: 'Виправте типові помилки іноземців'
  instruction: 'Знайдіть граматичну чи лексичну помилку в реченні та оберіть правильний варіант.'
  items:
    - sentence: 'Вчора ввечері я болить живіт після того старого супу.'
      error: 'я болить'
      answer: 'у мене болів'
      error_type: 'construction'
      options: ['у мене болів', 'мені болить', 'мене болить', 'я мав біль']
      explanation: 'В українській мові ми завжди використовуємо конструкцію «у мене болить / у мене болів», а не «я болить».'
    - sentence: 'Моя бабуся каже, що мені треба більше кушати свіжих фруктів.'
      error: 'кушати'
      answer: 'їсти'
      error_type: 'word'
      options: ['їсти', 'пити', 'брати', 'робити']
      explanation: 'Слово «кушати» — це дуже популярний і небажаний русизм. Правильно українською казати «їсти».'
    - sentence: 'Після довгої роботи за комп''ютером у мене дуже болить очі.'
      error: 'болить очі'
      answer: 'болять очі'
      error_type: 'construction'
      options: ['болять очі', 'болить око', 'болють очі', 'є біль очей']
      explanation: 'Очі — це множина (дві штуки), тому дієслово також має бути у формі множини: «болять».'
    - sentence: 'У мене висока температура і сильний кашель, тому завтра я йду в лікарню на огляд.'
      error: 'в лікарню'
      answer: 'до лікаря'
      error_type: 'phrase'
      options: ['до лікаря', 'в аптеку', 'до лікарні', 'на лікарню']
      explanation: 'На звичайний огляд ми йдемо «до лікаря» або в поліклініку. В лікарню лягають на складні операції.'
    - sentence: 'Коли надворі сніг і зима, я дуже холодно без теплої куртки.'
      error: 'я дуже холодно'
      answer: 'мені дуже холодно'
      error_type: 'construction'
      options: ['мені дуже холодно', 'мене дуже холодно', 'я маю холодно', 'я є холодний']
      explanation: 'Для опису загального стану організму ми використовуємо давальний відмінок: «мені холодно», «йому жарко».'
    - sentence: 'Цей натуральний малиновий чай самий кращий за всі хімічні таблетки.'
      error: 'самий кращий'
      answer: 'найкращий'
      error_type: 'word'
      options: ['найкращий', 'самий хороший', 'більш кращий', 'дуже кращий']
      explanation: 'Форма «самий кращий» є русизмом. Правильний найвищий ступінь порівняння в українській мові — «найкращий».'

- type: true-false
  title: 'Правда чи міф: Здоров''я в Україні'
  instruction: 'Визначте, чи є ці твердження про українську медицину і культуру правильними.'
  items:
    - statement: 'Фраза "Здоров''я — найбільше багатство" означає, що лікування в Україні коштує дуже дорого.'
      correct: false
      explanation: 'Це старовинне прислів''я означає, що фізичний і духовний стан людини набагато важливіший за всі гроші світу.'
    - statement: 'В українській мові ми зазвичай використовуємо конструкцію "У мене болить", а не "Я маю біль".'
      correct: true
      explanation: 'Так, це головне і найприродніше граматичне правило для опису болю будь-якої частини тіла.'
    - statement: 'Сімейний лікар в Україні — це спеціаліст, який завжди приходить лікувати вас додому.'
      correct: false
      explanation: 'Сімейний лікар приймає пацієнтів у поліклініці або амбулаторії, і ви підписуєте з ним медичну декларацію.'
    - statement: 'Вуличні тренажери в зелених міських парках доступні абсолютно безкоштовно для всіх громадян.'
      correct: true
      explanation: 'Це популярний і масовий спосіб підтримувати активний спосіб життя для людей абсолютно різного віку.'
    - statement: 'Чай з малиною вважається традиційними українськими ліками для зниження високої температури тіла.'
      correct: true
      explanation: 'Малина містить природні активні речовини, які ефективно працюють як м''який і безпечний аспірин.'
    - statement: 'Слово "ліки" (medicine) в українській мові можна вільно використовувати як в однині, так і в множині.'
      correct: false
      explanation: 'Слово "ліки" завжди використовується тільки у формі множини (як слова "окуляри" або "гроші").'
    - statement: 'Для опису загального дискомфорту (наприклад, "I feel bad") українці використовують давальний відмінок: "Мені погано".'
      correct: true
      explanation: 'Це безсуб''єктний (безособовий) стан, тому ми завжди використовуємо займенники "мені", "тобі", "йому".'
    - statement: 'Гірчичники — це сучасні солодкі таблетки, які дуже люблять їсти маленькі діти.'
      correct: false
      explanation: 'Це старі жовті паперові пакетики з сухою гірчицею, які печуть шкіру. Діти їх зазвичай зовсім не люблять.'

- type: mark-the-words
  title: 'Знайдіть частини тіла'
  instruction: 'Уважно прочитайте текст і позначте всі слова, які означають частини тіла людини (в будь-якому відмінку чи формі).'
  text: 'Після довгого важкого тренування в спортивному залі у мене болить уся спина і ниють ноги. Мій живіт теж відчуває дискомфорт, бо я багато качав прес. Завтра я не зможу нормально підняти руки. Але добре, що моя голова ясна, і ніде не болить горло.'
  answers: ['спина', 'ноги', 'живіт', 'руки', 'голова', 'горло']

