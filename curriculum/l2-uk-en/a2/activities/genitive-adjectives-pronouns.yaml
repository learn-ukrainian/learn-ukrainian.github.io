version: '1.0'
module: genitive-adjectives-pronouns
level: a2
inline:
- id: fill-in-adj-noun
  type: fill-in
  instruction: Поставте прикметник та іменник у родовий відмінок (Genitive case).
  items:
  - sentence: Це подарунок для ____ (молода мама).
    answer: молодої мами
  - sentence: Ми стоїмо біля ____ (високе дерево).
    answer: високого дерева
  - sentence: Я не п'ю ____ (солодкий чай).
    answer: солодкого чаю
  - sentence: Вона читає сторінку з ____ (нова книга).
    answer: нової книги
  - sentence: Він вийшов з ____ (вечірня школа).
    answer: вечірньої школи
  - sentence: Тут немає ____ (гаряча кава).
    answer: гарячої кави
  - sentence: Я шукаю вікно з ____ (відкритий балкон).
    answer: відкритого балкону
  - sentence: У нього немає ____ (вчорашній хліб).
    answer: вчорашнього хліба
- id: quiz-possessive-choice
  type: quiz
  instruction: Оберіть правильний присвійний займенник.
  items:
  - question: Я не можу жити без _____ телефону.
    options:
    - мого
    - моєї
    - мій
    - моя
    correct: 0
  - question: Вона пішла додому без _____ дозволу.
    options:
    - твоєї
    - твого
    - твій
    - твоє
    correct: 1
  - question: Це олівець для _____ старшої сестри.
    options:
    - твого
    - твоєї
    - твій
    - твоя
    correct: 1
  - question: Ми йдемо до _____ вчительки.
    options:
    - їхнього
    - їхньої
    - їхній
    - їхня
    correct: 1
  - question: У _____ мами сьогодні день народження.
    options:
    - мого
    - моєї
    - мій
    - моя
    correct: 1
  - question: У _____ друга є новий підручник.
    options:
    - мого
    - моєї
    - мій
    - моя
    correct: 0
  - question: Ми їдемо з _____ міста до Києва.
    options:
    - нашого
    - нашої
    - наш
    - наша
    correct: 0
  - question: Це ключі від _____ квартири.
    options:
    - вашого
    - вашої
    - ваш
    - ваша
    correct: 1
- id: match-up-nom-gen
  type: match-up
  instruction: З'єднайте називний відмінок (Nominative) з родовим (Genitive).
  pairs:
  - left: новий комп'ютер
    right: нового комп'ютера
  - left: молода мама
    right: молодої мами
  - left: синій олівець
    right: синього олівця
  - left: вечірня школа
    right: вечірньої школи
  - left: старший брат
    right: старшого брата
  - left: важливий документ
    right: важливого документа
  - left: старий будинок
    right: старого будинку
  - left: гарна дівчина
    right: гарної дівчини
- id: fill-in-complex-phrases
  type: fill-in
  instruction: Доповніть фрази (вказівний займенник + прикметник + іменник) у родовому
    відмінку.
  items:
  - sentence: Я хочу жити біля ____ (цей новий будинок).
    answer: цього нового будинку
  - sentence: У мене немає ____ (той важливий документ).
    answer: того важливого документа
  - sentence: Ми їдемо від ____ (цей великий магазин).
    answer: цього великого магазину
  - sentence: Я не можу працювати без ____ (ця цікава книга).
    answer: цієї цікавої книги
  - sentence: Вона чекає після ____ (той останній урок).
    answer: того останнього уроку
  - sentence: Ти не бачив ____ (ця червона ручка)?
    answer: цієї червоної ручки
  - sentence: Ми стоїмо навпроти ____ (та стара школа).
    answer: тієї старої школи
  - sentence: Я не знаю ____ (цей молодий чоловік).
    answer: цього молодого чоловіка
- id: error-correction-agreement
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні прикметника чи займенника.
  items:
  - sentence: Я не бачу твого нова друга.
    error: нова
    correction: нового
    error_type: word
    options:
    - нового
    - нової
    - нове
    - новий
    explanation: Слово «друг» — чоловічого роду, тому в родовому відмінку прикметник
      має закінчення -ого.
  - sentence: У мене немає цієї важливого документа.
    error: цієї
    correction: цього
    error_type: word
    options:
    - цього
    - того
    - цей
    - ці
    explanation: Слово «документ» — чоловічого роду, тому вказівний займенник — «цього».
  - sentence: Вона читає сторінку з нового книги.
    error: нового
    correction: нової
    error_type: word
    options:
    - нової
    - нових
    - нову
    - нова
    explanation: Слово «книга» — жіночого роду, тому прикметник у родовому відмінку
      має закінчення -ої.
  - sentence: Ми живемо недалеко від синьої моря.
    error: синьої
    correction: синього
    error_type: word
    options:
    - синього
    - сині
    - синій
    - синє
    explanation: Слово «море» — середнього роду, тому прикметник має закінчення -ього.
  - sentence: Це подарунок для мого старої бабусі.
    error: мого
    correction: моєї
    error_type: word
    options:
    - моєї
    - моя
    - мою
    - моїх
    explanation: Слово «бабуся» — жіночого роду, тому присвійний займенник — «моєї».
  - sentence: Вони приїхали після ранкової дощу.
    error: ранкової
    correction: ранкового
    error_type: word
    options:
    - ранкового
    - ранковий
    - ранкову
    - ранкові
    explanation: Слово «дощ» — чоловічого роду, тому прикметник має закінчення -ого.
workbook:
- type: group-sort
  instruction: 'Розподіліть слова за групами: чоловічий та середній рід (-ого, -ього)
    чи жіночий рід (-ої, -ьої, -ньої).'
  groups:
  - label: Чоловічий та середній рід
    items:
    - нового комп'ютера
    - старого будинку
    - синього олівця
    - цього чоловіка
    - мого брата
  - label: Жіночий рід
    items:
    - нової книги
    - гарної дівчини
    - цієї ручки
    - моєї сестри
    - вечірньої школи
- type: fill-in
  instruction: Вставте правильні займенники («мене», «тебе», «нього», «неї», «нас»,
    «вас», «них»).
  items:
  - sentence: У ____ (я) немає цього важливого документа.
    answer: мене
  - sentence: У ____ (вона) немає червоної ручки.
    answer: неї
  - sentence: У ____ (він) немає старшого брата.
    answer: нього
  - sentence: У ____ (ми) немає нового підручника.
    answer: нас
  - sentence: У ____ (ви) немає гарячого чаю.
    answer: вас
  - sentence: У ____ (вони) немає вільного часу.
    answer: них
- type: true-false
  instruction: Правда чи ні? (Правила узгодження)
  items:
  - statement: Займенники «його» та «її» змінюють своє закінчення у родовому відмінку.
    correct: false
    explanation: Займенники «його» та «її» завжди залишаються незмінними.
  - statement: Прикметники твердої групи чоловічого роду мають закінчення -ого.
    correct: true
    explanation: 'Наприклад: новий → нового, старий → старого.'
  - statement: Вказівний займенник «ця» у родовому відмінку має форму «цієї».
    correct: true
    explanation: 'Наприклад: біля цієї школи.'
  - statement: Прикметники жіночого роду м'якої групи мають закінчення -ого.
    correct: false
    explanation: 'Жіночий рід має закінчення -ої (тверда) або -ьої (м''яка). Наприклад:
      синя → синьої.'
  - statement: Присвійний займенник «твій» для жіночого роду в родовому відмінку —
      «твого».
    correct: false
    explanation: 'Для жіночого роду правильно «твоєї» (наприклад: для твоєї подруги).'
  - statement: Займенник «їхній» відмінюється як прикметник м'якої групи.
    correct: true
    explanation: 'Наприклад: їхній → їхнього, їхня → їхньої.'
