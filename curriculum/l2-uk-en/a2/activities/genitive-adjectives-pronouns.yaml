- id: workbook-genitive-endings
  type: group-sort
  instruction: Розподіліть слова за закінченням
  groups:
  - label: -ого / -ього (Чоловічий і середній рід)
    items:
    - нового
    - великого
    - старого
    - синього
    - літнього
    - вчорашнього
  - label: -ої / -ьої (Жіночий рід)
    items:
    - нової
    - великої
    - старої
    - синьої
    - літньої
    - вчорашньої
