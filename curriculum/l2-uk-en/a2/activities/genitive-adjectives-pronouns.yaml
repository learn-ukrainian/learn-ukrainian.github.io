version: '1.0'
module: genitive-adjectives-pronouns
level: a2
inline:
- id: genitive-adjectives-fill
  type: fill-in
  instruction: Поставте прикметник та іменник у правильну форму (Родовий відмінок)
  items:
  - sentence: У мене немає _____ (новий підручник).
    answer: нового підручника
    options:
    - нового підручника
    - новий підручник
    - нової підручника
  - sentence: Вона живе біля _____ (старий парк).
    answer: старого парку
    options:
    - старого парку
    - старий парк
    - старої парку
  - sentence: Ми чекаємо _____ (літнє сонце).
    answer: літнього сонця
    options:
    - літнього сонця
    - літнє сонце
    - літньої сонця
  - sentence: Я не бачив _____ (молода дівчина).
    answer: молодої дівчини
    options:
    - молодої дівчини
    - молода дівчина
    - молодого дівчини
  - sentence: Він прийшов без _____ (синій олівець).
    answer: синього олівця
    options:
    - синього олівця
    - синій олівець
    - синьої олівця
  - sentence: Ми читаємо частину _____ (важливий документ).
    answer: важливого документа
    options:
    - важливого документа
    - важливий документ
    - важливої документа
  - sentence: Вони стояли біля _____ (велика школа).
    answer: великої школи
    options:
    - великої школи
    - велика школа
    - великого школи
  - sentence: Діти граються без _____ (старший брат).
    answer: старшого брата
    options:
    - старшого брата
    - старший брат
    - старшої брата
- id: possessive-pronouns-quiz
  type: quiz
  instruction: Оберіть правильний присвійний займенник
  items:
  - question: Це подарунок для _____ мами.
    options:
    - моєї
    - мого
    - моїх
    - мій
    correct: 0
  - question: Вона прийшла без _____ дозволу.
    options:
    - твого
    - твоєї
    - твій
    - твоїх
    correct: 0
  - question: Туристи стоять біля _____ готелю.
    options:
    - нашого
    - нашої
    - наш
    - наші
    correct: 0
  - question: Ми отримали листа від _____ вчительки.
    options:
    - вашої
    - вашого
    - ваша
    - ваші
    correct: 0
  - question: Я йду додому від _____ старшого брата.
    options:
    - його
    - нього
    - їхнього
    - йому
    correct: 0
  - question: Тут немає _____ старого автомобіля.
    options:
    - їхнього
    - їхньої
    - їх
    - них
    correct: 0
  - question: Кіт спить біля _____ маленької сестри.
    options:
    - її
    - неї
    - їхньої
    - його
    correct: 0
  - question: Де зараз собака _____ брата?
    options:
    - твого
    - твоєї
    - твій
    - тобі
    correct: 0
- id: genitive-phrases-match
  type: match-up
  instruction: З'єднайте фрази в називному відмінку з їхніми формами в родовому
  pairs:
  - left: молодий брат
    right: молодого брата
  - left: нова вчителька
    right: нової вчительки
  - left: мій олівець
    right: мого олівця
  - left: твоя книга
    right: твоєї книги
  - left: наш документ
    right: нашого документа
  - left: ваша машина
    right: вашої машини
  - left: їхнє місто
    right: їхнього міста
  - left: ця дівчина
    right: цієї дівчини
- id: demonstrative-adjective-noun-fill
  type: fill-in
  instruction: Утворіть повні фрази у родовому відмінку
  items:
  - sentence: Я не маю _____ (цей синій олівець).
    answer: цього синього олівця
    options:
    - цього синього олівця
    - цього синій олівець
    - цієї синього олівця
  - sentence: Вона живе біля _____ (той старий парк).
    answer: того старого парку
    options:
    - того старого парку
    - тієї старого парку
    - той старий парк
  - sentence: У нас немає _____ (ця важлива книга).
    answer: цієї важливої книги
    options:
    - цієї важливої книги
    - цього важливої книги
    - ця важлива книга
  - sentence: Він приїхав з _____ (та велика країна).
    answer: тієї великої країни
    options:
    - тієї великої країни
    - того великої країни
    - та велика країна
  - sentence: Ми стоїмо біля _____ (це велике дерево).
    answer: цього великого дерева
    options:
    - цього великого дерева
    - цієї великого дерева
    - це велике дерево
  - sentence: Вона не знає _____ (ця молода дівчина).
    answer: цієї молодої дівчини
    options:
    - цієї молодої дівчини
    - цього молодої дівчини
    - ця молода дівчина
  - sentence: Вони чекають біля _____ (той новий магазин).
    answer: того нового магазину
    options:
    - того нового магазину
    - тієї нового магазину
    - той новий магазин
  - sentence: У _____ (цей мій брат) є машина.
    answer: цього мого брата
    options:
    - цього мого брата
    - цієї мого брата
    - цей мій брат
- id: genitive-phrases-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні
  items:
  - sentence: У мене немає цієї нового друга.
    error: цієї
    correction: цього
    error_type: word
    options:
    - цього
    - це
    - цей
    explanation: «Друг» — чоловічого роду, тому вказуємо «цього».
  - sentence: Вони стоять біля великого школи.
    error: великого
    correction: великої
    error_type: word
    options:
    - великої
    - велика
    - велику
    explanation: «Школа» — жіночого роду, тому прикметник має закінчення -ої.
  - sentence: Я не можу працювати без синього ручки.
    error: синього
    correction: синьої
    error_type: word
    options:
    - синьої
    - синю
    - синя
    explanation: «Ручка» — жіночого роду, тому прикметник має закінчення -ьої.
  - sentence: Він іде до старого аптеки.
    error: старого
    correction: старої
    error_type: word
    options:
    - старої
    - стара
    - стару
    explanation: «Аптека» — жіночого роду, тому прикметник має закінчення -ої.
  - sentence: У неї немає того великої собаки.
    error: великої
    correction: великого
    error_type: word
    options:
    - великого
    - велику
    - велика
    explanation: Слово «собака» в українській мові — чоловічого роду, тому «великого
      собаки».
  - sentence: Ми працюємо без нашої нового плану.
    error: нашої
    correction: нашого
    error_type: word
    options:
    - нашого
    - наш
    - наші
    explanation: «План» — чоловічого роду, тому вказуємо «нашого».
workbook:
- id: workbook-genitive-translation
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I don't have a new textbook.
    options:
    - text: У мене немає нового підручника.
      correct: true
    - text: У мене немає новий підручник.
      correct: false
    - text: У мене немає нової підручника.
      correct: false
  - source: We live near the old park.
    options:
    - text: Ми живемо біля старого парку.
      correct: true
    - text: Ми живемо біля старий парк.
      correct: false
    - text: Ми живемо біля старого парка.
      correct: false
  - source: She came without her older sister.
    options:
    - text: Вона прийшла без своєї старшої сестри.
      correct: true
    - text: Вона прийшла без свою старшу сестру.
      correct: false
    - text: Вона прийшла без свого старшого сестри.
      correct: false
  - source: This is a gift for my new manager.
    options:
    - text: Це подарунок для мого нового менеджера.
      correct: true
    - text: Це подарунок для моїй новій менеджера.
      correct: false
    - text: Це подарунок для мій новий менеджер.
      correct: false
  - source: There is no clean water here.
    options:
    - text: Тут немає чистої води.
      correct: true
    - text: Тут немає чиста вода.
      correct: false
    - text: Тут немає чистого води.
      correct: false
  - source: I bought a ticket for the evening performance.
    options:
    - text: Я купив квиток для вечірньої вистави.
      correct: true
    - text: Я купив квиток для вечірнього вистави.
      correct: false
    - text: Я купив квиток для вечірня вистава.
      correct: false
