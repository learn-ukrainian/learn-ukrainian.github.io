- id: wb-group-sort-genitive
  type: group-sort
  instruction: Розподіліть форми прикметників і займенників за родом у родовому відмінку
  groups:
  - label: -ого / -ього (Чол. та Сер. рід)
    items:
    - великого
    - синього
    - мого
    - цього
    - їхнього
  - label: -ої / -ьої (Жіночий рід)
    items:
    - великої
    - синьої
    - моєї
    - цієї
    - їхньої
- id: wb-true-false-genitive
  type: true-false
  instruction: Правда чи ні? (Правила узгодження)
  items:
  - statement: Прикметник завжди має той самий рід, число та відмінок, що й іменник.
    correct: true
    explanation: Це правило узгодження в українській мові.
  - statement: Слово «їх» — це правильний присвійний займенник для родового відмінка
      (наприклад, «без їх дозволу»).
    correct: false
    explanation: Правильна форма — «їхнього». Використання «їх» для володіння — це
      росіянізм.
  - statement: Прийменники «без», «від», «для» та «біля» завжди вимагають родового
      відмінка.
    correct: true
    explanation: Після цих прийменників іменники та прикметники ставляться в родовий
      відмінок.
  - statement: Займенники «його» та «її» змінюють своє закінчення, коли іменник стоїть
      у родовому відмінку.
    correct: false
    explanation: Ці займенники залишаються незмінними. Ми говоримо «без його підручника».
  - statement: Закінчення -ого завжди читається з чітким звуком «г», а не «в».
    correct: true
    explanation: В українській мові звук «г» у закінченні -ого вимовляється чітко.
  - statement: Прикметники м'якої групи в чоловічому роді родового відмінка мають
      закінчення -ої.
    correct: false
    explanation: Вони мають закінчення -ього (наприклад, синього). Закінчення -ої
      використовується для жіночого роду твердої групи.
  - statement: У фразі «для цієї молодої дівчини» всі три слова стоять у родовому
      відмінку.
    correct: true
    explanation: Так, прийменник «для» вимагає родового відмінка для всієї фрази.
  - statement: Вказівний займенник жіночого роду «та» в родовому відмінку може мати
      форму як «тієї», так і «тої».
    correct: true
    explanation: Обидві форми правильні і часто використовуються.
- id: wb-odd-one-out-genitive
  type: odd-one-out
  instruction: Знайдіть слово, яке НЕ підходить за відмінком або родом
  items:
  - words:
    - нового
    - великого
    - молодого
    - синій
    correct: 3
    explanation: «Синій» — це називний відмінок, інші слова — у родовому (-ого).
  - words:
    - моєї
    - старої
    - твоя
    - нашої
    correct: 2
    explanation: «Твоя» — це називний відмінок жіночого роду.
  - words:
    - цього
    - того
    - мого
    - ця
    correct: 3
    explanation: «Ця» — називний відмінок, інші — вказівні та присвійні займенники
      в родовому.
  - words:
    - їхнього
    - вашого
    - нашого
    - їх
    correct: 3
    explanation: «Їх» — це особовий займенник знахідного/родового відмінка, а не присвійний.
      Для приналежності має бути «їхнього».
  - words:
    - брата
    - сестри
    - книга
    - міста
    correct: 2
    explanation: «Книга» — це називний відмінок, інші іменники — у родовому.
  - words:
    - великої
    - цієї
    - синього
    - моєї
    correct: 2
    explanation: «Синього» — це чоловічий/середній рід, інші — закінчення жіночого
      роду (-ої/-еї/-ієї).
  - words:
    - підручника
    - документа
    - стола
    - вікно
    correct: 3
    explanation: «Вікно» — це називний або знахідний відмінок, інші — родовий.
  - words:
    - синьої
    - молодої
    - важливого
    - старої
    correct: 2
    explanation: «Важливого» — чоловічий/середній рід, інші — жіночий рід.
