version: '1.0'
module: genitive-adjectives-pronouns
level: a2
inline:
- id: fill-in-adj-noun
  type: fill-in
  instruction: Вставте слова в дужках у правильній формі (родовий відмінок).
  items:
  - sentence: Я йду додому від ____.
    answer: старого лікаря
  - sentence: Він не може працювати без ____.
    answer: нового комп'ютера
  - sentence: Ми живемо недалеко від ____.
    answer: синього моря
  - sentence: Вона читає сторінку з ____.
    answer: нової книги
  - sentence: У мене немає ____.
    answer: червоного олівця
  - sentence: Це ліки для ____.
    answer: маленької дитини
  - sentence: Вони приїхали після ____.
    answer: ранкового дощу
  - sentence: Я не хочу жити без ____.
    answer: вільної України
  title: Вставте слова в дужках у правильній формі (родовий відмінок).
- id: quiz-possessive-choice
  type: quiz
  instruction: Оберіть правильну форму присвійного займенника.
  items:
  - question: Це кімната ____ (мій) брата.
    options:
    - мого
    - моєї
    - мій
    - моя
    correct: 0
  - question: У ____ (твоя) мами сьогодні день народження.
    options:
    - твоєї
    - твого
    - твоя
    - твій
    correct: 0
  - question: Я не можу знайти ____ (свій) телефону.
    options:
    - свого
    - своєї
    - свій
    - своя
    correct: 0
  - question: Ми граємо у футбол біля ____ (наш) нового стадіону.
    options:
    - нашого
    - нашої
    - наш
    - наші
    correct: 0
  - question: Він вийшов з кабінету ____ (їхній) лікаря.
    options:
    - їхнього
    - їхньої
    - їхній
    - їхня
    correct: 0
  - question: У мене немає ____ (ваша) нової книги.
    options:
    - вашої
    - вашого
    - ваша
    - ваш
    correct: 0
  - question: Я чекаю біля ____ (його) будинку.
    options:
    - його
    - нього
    - йому
    - ним
    correct: 0
  - question: Він не може працювати без ____ (її) комп'ютера.
    options:
    - її
    - неї
    - їй
    - нею
    correct: 0
  title: Оберіть правильну форму присвійного займенника.
- id: match-up-nom-gen
  type: match-up
  instruction: З'єднайте називний відмінок із родовим.
  pairs:
  - left: новий друг
    right: нового друга
  - left: стара книга
    right: старої книги
  - left: синє море
    right: синього моря
  - left: вечірня школа
    right: вечірньої школи
  - left: цей документ
    right: цього документа
  - left: та дівчина
    right: тієї дівчини
  - left: ваш олівець
    right: вашого олівця
  - left: їхня вчителька
    right: їхньої вчительки
  title: З'єднайте називний відмінок із родовим.
- id: fill-in-complex-phrases
  type: fill-in
  instruction: Вставте фрази в дужках у правильній формі (родовий відмінок).
  items:
  - sentence: Я хочу жити біля ____.
    answer: цього великого ринку
  - sentence: Я не можу працювати без ____.
    answer: цієї смачної кави
  - sentence: Він не знає ____.
    answer: тієї високої дівчини
  - sentence: Ми йдемо додому від ____.
    answer: цього нового вчителя
  - sentence: У нас немає ____.
    answer: того важливого документа
  - sentence: Вони живуть недалеко від ____.
    answer: цього старого лісу
  - sentence: Кіт спить біля ____.
    answer: цього великого вікна
  - sentence: Я чекаю після ____.
    answer: того останнього уроку
  title: Вставте фрази в дужках у правильній формі (родовий відмінок).
workbook:
- id: workbook-group-sort-genders
  type: group-sort
  instruction: Розподіліть слова за родом у родовому відмінку.
  groups:
  - label: Чоловічий / Середній рід (-ого, -ього)
    items:
    - нового
    - синього
    - ранкового
    - цього
    - мого
    - вашого
  - label: Жіночий рід (-ої, -ьої, -єї)
    items:
    - нової
    - вечірньої
    - цієї
    - моєї
    - нашої
    - гарної
  title: Розподіліть слова за родом у родовому відмінку.
- id: workbook-unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - немає
    - У
    - синього
    - мене
    - олівця.
    correct_order:
    - У
    - мене
    - немає
    - синього
    - олівця.
  - words:
    - сумку
    - Я
    - брата.
    - шукаю
    - старшого
    - мого
    correct_order:
    - Я
    - шукаю
    - сумку
    - мого
    - старшого
    - брата.
  - words:
    - його
    - йдемо
    - Ми
    - до
    - нової
    - квартири.
    correct_order:
    - Ми
    - йдемо
    - до
    - його
    - нової
    - квартири.
  - words:
    - дитини.
    - маленької
    - їхньої
    - Це
    - ліки
    - для
    correct_order:
    - Це
    - ліки
    - для
    - їхньої
    - маленької
    - дитини.
  - words:
    - нашого
    - додому
    - пішла
    - без
    - Вона
    - дозволу.
    correct_order:
    - Вона
    - пішла
    - додому
    - без
    - нашого
    - дозволу.
  - words:
    - вікна.
    - великого
    - спить
    - Кіт
    - біля
    - цього
    correct_order:
    - Кіт
    - спить
    - біля
    - цього
    - великого
    - вікна.
  title: Складіть правильне речення зі слів.
- id: workbook-true-false-rules
  type: true-false
  instruction: 'Виберіть: правда чи ні?'
  items:
  - statement: Прикметники чоловічого роду в родовому відмінку завжди мають закінчення
      -ої.
    correct: false
    explanation: Чоловічий рід має закінчення -ого або -ього (наприклад, нового, синього).
  - statement: Займенники «його» та «її» завжди залишаються незмінними.
    correct: true
    explanation: Ці займенники ніколи не змінюють свою форму.
  - statement: Слово «цього» — це вказівний займенник жіночого роду.
    correct: false
    explanation: Слово «цього» — чоловічого або середнього роду. Жіночий рід — «цієї».
  - statement: Прийменник «без» вимагає родового відмінка.
    correct: true
    explanation: Після «без», «від», «для», «біля» завжди вживається родовий відмінок.
  - statement: Жіночі прикметники м'якої групи в родовому відмінку закінчуються на
      -ьої (наприклад, вечірньої).
    correct: true
    explanation: М'яка група жіночого роду має закінчення -ьої або -ньої.
  - statement: Займенник «моєї» узгоджується з іменниками чоловічого роду.
    correct: false
    explanation: Займенник «моєї» — жіночого роду. Для чоловічого роду — «мого».
  title: 'Виберіть: правда чи ні?'
- id: workbook-quiz-stress
  type: odd-one-out
  instruction: Оберіть слово, яке має іншу модель наголосу (наголос падає на інший
    склад).
  items:
  - words:
    - ново́го
    - старо́го
    - си́нього
    correct: 2
    explanation: У слові «си́нього» наголос на першому складі, а в інших — на другому
      (ново́го, старо́го).
  - words:
    - цього́
    - того́
    - на́шого
    correct: 2
    explanation: У слові «на́шого» наголос на першому складі, а в інших — на другому
      (цього́, того́).
  - words:
    - моє́ї
    - твоє́ї
    - на́шої
    correct: 2
    explanation: У слові «на́шої» наголос на першому складі, а в інших — на другому
      (моє́ї, твоє́ї).
  - words:
    - ва́шого
    - старо́го
    - си́нього
    correct: 1
    explanation: У слові «старо́го» наголос на другому складі, а в інших — на першому
      (ва́шого, си́нього).
  - words:
    - тіє́ї
    - ціє́ї
    - си́ньої
    correct: 2
    explanation: У слові «си́ньої» наголос на першому складі, а в інших — на другому
      (тіє́ї, ціє́ї).
  - words:
    - мого́
    - твого́
    - ї́хнього
    correct: 2
    explanation: У слові «ї́хнього» наголос на першому складі, а в інших — на останньому
      (мого́, твого́).
  title: Оберіть слово, яке має іншу модель наголосу (наголос падає на інший склад).
