- id: wb-error-correction-possession
  type: error-correction
  instruction: Виправте помилку у вживанні займенників або прикметників
  items:
  - sentence: Вони працюють без їх дозволу.
    error: їх
    correction: їхнього
    error_type: word
    options:
    - їхнього
    - їм
    - їхньому
    explanation: Для позначення приналежності використовується змінюваний займенник
      «їхній» (у родовому — «їхнього»).
  - sentence: У мене немає мій олівця.
    error: мій
    correction: мого
    error_type: word
    options:
    - мого
    - моєму
    - мною
    explanation: 'Після слова «немає» потрібен родовий відмінок: мого олівця.'
  - sentence: Ми стояли біля наша нової школи.
    error: наша
    correction: нашої
    error_type: word
    options:
    - нашої
    - нашу
    - нашою
    explanation: 'Прийменник «біля» вимагає родового відмінка: нашої нової школи.'
  - sentence: Вона не знає телефона їїної сестри.
    error: їїної
    correction: її
    error_type: word
    options:
    - її
    - їй
    - неї
    explanation: Займенник «її» (для приналежності) не змінюється.
  - sentence: Це подарунок для йогового брата.
    error: йогового
    correction: його
    error_type: word
    options:
    - його
    - йому
    - ним
    explanation: Займенник «його» (для приналежності) не змінюється.
  - sentence: Я прийшов без твій підручника.
    error: твій
    correction: твого
    error_type: word
    options:
    - твого
    - твоєму
    - тобою
    explanation: 'Після прийменника «без» використовується родовий відмінок: твого
      підручника.'
  - sentence: Він вийшов з того великий будинку.
    error: великий
    correction: великого
    error_type: word
    options:
    - великого
    - великому
    - великим
    explanation: 'Узгодження вимагає однакового відмінка для всієї фрази: з того великого
      будинку.'
  - sentence: Ми не можемо жити без цеї проблеми.
    error: цеї
    correction: цієї
    error_type: word
    options:
    - цієї
    - цю
    - цією
    explanation: Правильна форма вказівного займенника жіночого роду в родовому відмінку
      — «цієї».
- id: wb-quiz-grammar-details
  type: quiz
  instruction: Перевірте свої знання граматики родового відмінка
  items:
  - question: Яке закінчення мають прикметники твердої групи чоловічого роду в родовому
      відмінку?
    options:
    - -ого
    - -ього
    - -ої
    - -ьої
    correct: 0
  - question: 'Як правильно сказати: «без ____ (їх) допомоги»?'
    options:
    - їхньої
    - їх
    - їхнього
    - їхній
    correct: 0
  - question: Яке з цих слів НЕ змінюється у родовому відмінку, коли означає приналежність?
    options:
    - її
    - їхній
    - мій
    - наш
    correct: 0
  - question: 'Оберіть правильну фразу в родовому відмінку:'
    options:
    - для тієї молодої дівчини
    - для та молода дівчина
    - для тієї молода дівчина
    - для ту молоду дівчину
    correct: 0
  - question: Який прийменник ЗАВЖДИ вимагає родового відмінка?
    options:
    - без
    - на
    - в
    - про
    correct: 0
  - question: Яка форма вказівного займенника «та» є правильною для жіночого роду
      в родовому відмінку?
    options:
    - і тієї, і тої
    - тільки тієї
    - тільки тої
    - тією
    correct: 0
