version: '1.0'
module: genitive-adjectives-pronouns
level: a2
inline:
- id: fill-in-genitive-adjectives
  type: fill-in
  instruction: Вставте правильну форму прикметника в родовому відмінку
  items:
  - sentence: У мене немає ____ підручника.
    answer: нового
    options:
    - новий
    - нового
    - нових
  - sentence: Ми прийшли без ____ брата.
    answer: старшого
    options:
    - старший
    - старшого
    - старшим
  - sentence: Вона шукає ключі біля ____ церкви.
    answer: старої
    options:
    - стара
    - старої
    - старою
  - sentence: Це ключі від ____ машини.
    answer: синьої
    options:
    - синя
    - синьої
    - синьою
  - sentence: Я не бачу ____ чемодану.
    answer: великого
    options:
    - великий
    - великого
    - великим
  - sentence: У нас немає ____ вчительки.
    answer: молодої
    options:
    - молода
    - молодої
    - молодою
  - sentence: Він працює без ____ документа.
    answer: важливого
    options:
    - важливий
    - важливого
    - важливим
  - sentence: Я малюю без ____ олівця.
    answer: синього
    options:
    - синій
    - синього
    - синім
- id: quiz-possessive-pronouns
  type: quiz
  instruction: Оберіть правильний присвійний займенник
  items:
  - question: Я йду на концерт без ____ брата.
    options:
    - мій
    - мого
    - моєму
    - мої
    correct: 1
  - question: Ми не можемо почати без ____ дозволу.
    options:
    - ваш
    - вашого
    - вашому
    - ваші
    correct: 1
  - question: Вона приїхала з ____ рідного міста.
    options:
    - її
    - їїного
    - їй
    - нею
    correct: 0
  - question: Вони приїхали на свято без ____ сина.
    options:
    - їх
    - їхнього
    - їхньому
    - їхні
    correct: 1
  - question: Я купив квіти для ____ молодої дівчини.
    options:
    - моя
    - мою
    - моєї
    - моєю
    correct: 2
  - question: Ми довго стояли біля ____ будинку.
    options:
    - їх
    - їхнього
    - їхньому
    - їхні
    correct: 1
  - question: Чому тут немає ____ великого чемодану?
    options:
    - наш
    - нашого
    - нашому
    - наші
    correct: 1
  - question: Це важливий документ для ____ вчителя.
    options:
    - твій
    - твого
    - твоєму
    - твої
    correct: 1
- id: match-up-nom-to-gen
  type: match-up
  instruction: З'єднайте називний відмінок з родовим
  pairs:
  - left: мій старший брат
    right: мого старшого брата
  - left: нова вчителька
    right: нової вчительки
  - left: їхній великий чемодан
    right: їхнього великого чемодану
  - left: синій олівець
    right: синього олівця
  - left: наша стара лікарня
    right: нашої старої лікарні
  - left: цей важливий документ
    right: цього важливого документа
  - left: твоя молода дівчина
    right: твоєї молодої дівчини
  - left: те велике місто
    right: того великого міста
- id: fill-in-demonstratives-full-phrases
  type: fill-in
  instruction: Вставте правильний вказівний займенник (цього, цієї, того, тієї)
  items:
  - sentence: Я не бачу ____ стола на плані.
    answer: цього
    options:
    - цей
    - цього
    - цій
  - sentence: Ми чекали біля ____ старого будинку.
    answer: того
    options:
    - той
    - того
    - тієї
  - sentence: Квіти для ____ молодої дівчини.
    answer: цієї
    options:
    - ця
    - цього
    - цієї
  - sentence: Після ____ довгого дня ми хотіли спати.
    answer: того
    options:
    - той
    - того
    - тому
  - sentence: Я не маю дозволу ____ вчительки.
    answer: тієї
    options:
    - та
    - того
    - тієї
  - sentence: Ми зустрілися біля ____ міського ринку.
    answer: цього
    options:
    - цей
    - цього
    - цьому
  - sentence: У мене немає копії ____ документа.
    answer: того
    options:
    - той
    - того
    - тим
  - sentence: Ми ще не читали ____ дуже цікавої книги.
    answer: тієї
    options:
    - та
    - того
    - тієї
