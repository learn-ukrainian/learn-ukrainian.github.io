- type: mark-the-words
  title: "Знайдіть спортивні слова"
  instruction: "Знайдіть і позначте всі види спорту та спортивні локації в тексті."
  text: "Щовихідних ми йдемо на великий стадіон. Хлопці дуже люблять грати у футбол. Дівчата часто відвідують сучасний спортзал. Я також обожнюю плавання, тому мій вибір — це басейн. Взимку нам подобається льодова ковзанка. Мій брат займається боксом і любить великий теніс."
  answers:
    - "стадіон"
    - "футбол"
    - "спортзал"
    - "плавання"
    - "басейн"
    - "ковзанка"
    - "боксом"
    - "теніс"

