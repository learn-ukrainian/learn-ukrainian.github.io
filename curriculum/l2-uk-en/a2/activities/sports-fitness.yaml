- type: true-false
  title: "Правда чи брехня?"
  instruction: "Визначте, чи є ці твердження правильними."
  items:
    - statement: "Після дієслова займатися ми використовуємо Знахідний відмінок."
      correct: false
      explanation: "Ми використовуємо Орудний відмінок."
    - statement: "Правильно говорити грати у футбол, а не грати футбол."
      correct: true
      explanation: "Спортивні ігри з м'ячем вимагають прийменника в/у."
    - statement: "Ковзанка — це місце, де люди зазвичай плавають."
      correct: false
      explanation: "На ковзанці катаються на ковзанах по льоду."
    - statement: "Київське Динамо — це легендарний футбольний клуб."
      correct: true
      explanation: "Це один з найвідоміших клубів України."
    - statement: "Дієслово гратися ми використовуємо для професійного спорту."
      correct: false
      explanation: "Гратися використовується для дитячих ігор. Для спорту — грати."
    - statement: "Олександр Усик — відомий український боксер."
      correct: true
      explanation: "Він є абсолютним чемпіоном світу з боксу."
    - statement: "Басейн — це ідеальне місце для плавання."
      correct: true
      explanation: "Саме туди ходять плавати."
    - statement: "Ми говоримо вболівати за команду, використовуючи Знахідний відмінок."
      correct: true
      explanation: "Прийменник за вимагає Знахідного відмінка."
    - statement: "Дієслово програвати є антонімом до дієслова вигравати."
      correct: true
      explanation: "Це прямі антоніми."
    - statement: "Йога і біг — це приклади командних видів спорту."
      correct: false
      explanation: "Це індивідуальні заняття."
    - statement: "Вболівальник — це людина, яка палко підтримує спортивну команду."
      correct: true
      explanation: "Так називають фанатів спорту."
    - statement: "Після дієслова грати з назвами спортивних ігор ми не використовуємо прийменники."
      correct: false
      explanation: "Ми обов'язково використовуємо прийменники в або у."

