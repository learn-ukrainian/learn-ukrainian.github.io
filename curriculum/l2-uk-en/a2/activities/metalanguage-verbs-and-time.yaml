version: '1.0'
module: metalanguage-verbs-and-time
level: a2
inline:
- id: match-up-verb-terms
  type: match-up
  instruction: З'єднайте граматичні терміни з їхнім значенням
  pairs:
  - left: дієслово
    right: частина мови, яка показує активну дію або стан
  - left: час
    right: категорія, яка показує, коли саме відбувається дія
  - left: недоконаний вид
    right: означає довгий процес або регулярну дію
  - left: доконаний вид
    right: означає фінальний результат або завершену дію
  - left: дійсний спосіб
    right: описує реальні факти (минуле, теперішнє, майбутнє)
  - left: наказовий спосіб
    right: використовуємо для наказів або корисних порад
  - left: умовний спосіб
    right: показує наші мрії або гіпотетичні ситуації
  - left: вид
    right: показує, як саме протікає дія
- id: group-sort-verb-tense
  type: group-sort
  instruction: Розподіліть дієслова за часом
  groups:
  - label: Минулий час
    items:
    - працював
    - читала
    - купили
  - label: Теперішній час
    items:
    - працюю
    - читає
    - купуємо
  - label: Майбутній час
    items:
    - попрацюю
    - купить
- id: quiz-quiz-dictionary-literacy
  type: quiz
  instruction: Прочитайте словникову статтю і дайте відповідь на запитання
  items:
  - question: Що означає скорочення «ім.» у словнику?
    options:
    - іменник
    - ім'я
    - імператив
    - імовірно
    correct: 0
  - question: Що означає скорочення «дієсл.»?
    options:
    - дієслово
    - дієвідміна
    - дійсний
    - дія
    correct: 0
  - question: Якщо ви бачите «недок.», який це вид?
    options:
    - недоконаний
    - доконаний
    - недосконалий
    - недостатній
    correct: 0
  - question: Що означає скорочення «ж. р.»?
    options:
    - жіночий рід
    - жіночий робочий
    - жива риба
    - журнальна робота
    correct: 0
  - question: Слово має позначку «мн.». Що це означає?
    options:
    - множина
    - минулий час
    - майбутній час
    - менше
    correct: 0
  - question: Що означає скорочення «прикм.»?
    options:
    - прикметник
    - прислівник
    - приклад
    - прийменник
    correct: 0
  - question: Як у словнику позначають чоловічий рід?
    options:
    - ч. р.
    - чол. р.
    - ч.
    - ч. рід
    correct: 0
  - question: Що означає скорочення «присл.»?
    options:
    - прислівник
    - прикметник
    - прийменник
    - приклад
    correct: 0
- id: fill-in-fill-in-metalanguage
  type: fill-in
  instruction: Вставте правильні граматичні терміни у речення
  items:
  - sentence: Слово, яке не змінюється і відповідає на питання «як?», це ____.
    answer: прислівник
    options:
    - прислівник
    - дієслово
    - іменник
  - sentence: Займенники «я» та «ми» — це перша ____.
    answer: особа
    options:
    - особа
    - дієвідміна
    - множина
  - sentence: Дієслова «читати» і «писати» мають недоконаний ____.
    answer: вид
    options:
    - вид
    - час
    - спосіб
  - sentence: Категорія, яка має однину та множину, це ____.
    answer: число
    options:
    - число
    - особа
    - рід
  - sentence: Слова «сьогодні», «завтра», «вчора» — це прислівники ____.
    answer: часу
    options:
    - часу
    - місця
    - способу дії
  - sentence: Якщо дієслово має в закінченні «и» або «ї», це друга ____.
    answer: дієвідміна
    options:
    - дієвідміна
    - особа
    - множина
  - sentence: Повний граматичний аналіз слова називається морфологічний ____.
    answer: розбір
    options:
    - розбір
    - словник
    - спосіб
  - sentence: У словнику ми бачимо спеціальні ____, щоб зекономити місце.
    answer: скорочення
    options:
    - скорочення
    - наголоси
    - закінчення
workbook:
- type: match-up
  instruction: З'єднайте прислівник із його типом
  pairs:
  - left: тут
    right: прислівник місця
  - left: сьогодні
    right: прислівник часу
  - left: швидко
    right: прислівник способу дії
  - left: всюди
    right: прислівник місця
  - left: вчора
    right: прислівник часу
  - left: уважно
    right: прислівник способу дії
- type: group-sort
  instruction: Розподіліть дієслова за дієвідміною (перша чи друга)
  groups:
  - label: Перша дієвідміна (-е/є, -уть/ють)
    items:
    - пишеш
    - читає
    - знаємо
    - пишуть
    - читають
  - label: Друга дієвідміна (-и/ї, -ать/ять)
    items:
    - говориш
    - стоїть
    - мовчимо
    - кричать
    - говорять
- type: error-correction
  instruction: Знайдіть і виправте логічну помилку в граматичному терміні
  items:
  - sentence: Слово «гарний» — це дієслово.
    error: дієслово
    correction: прикметник
    error_type: word
    options:
    - прикметник
    - іменник
    - прислівник
    explanation: Слово «гарний» відповідає на питання «який?», тому це прикметник.
  - sentence: Слово «вчора» означає майбутній час.
    error: майбутній
    correction: минулий
    error_type: word
    options:
    - минулий
    - теперішній
    - довгий
    explanation: Слово «вчора» показує дію, яка вже відбулася, тому це минулий час.
  - sentence: Займенник «вони» — це перша особа.
    error: перша
    correction: третя
    error_type: word
    options:
    - третя
    - друга
    - четверта
    explanation: Займенник «вони» — це третя особа множини. Перша особа — це «я» і
      «ми».
  - sentence: Дієслово «купувати» має доконаний вид.
    error: доконаний
    correction: недоконаний
    error_type: word
    options:
    - недоконаний
    - минулий
    - теперішній
    explanation: «Купувати» відповідає на питання «що робити?» і означає процес, тому
      це недоконаний вид.
  - sentence: Слово «швидко» — це прикметник.
    error: прикметник
    correction: прислівник
    error_type: word
    options:
    - прислівник
    - іменник
    - займенник
    explanation: Слово «швидко» не змінюється і відповідає на питання «як?», тому
      це прислівник.
  - sentence: Слова «я» і «ми» — це іменники.
    error: іменники
    correction: займенники
    error_type: word
    options:
    - займенники
    - прикметники
    - дієслова
    explanation: «Я» і «ми» замінюють імена, тому це займенники.
- type: true-false
  instruction: Правда чи ні? Перевірте свої знання про граматичні категорії.
  items:
  - statement: Дієслово завжди показує активну дію або стан.
    correct: true
    explanation: Так, це головна функція дієслова.
  - statement: Українська мова має чотири часи.
    correct: false
    explanation: 'Ні, українська мова має три часи: минулий, теперішній і майбутній.'
  - statement: Доконаний вид означає фінальний результат дії.
    correct: true
    explanation: 'Так, наприклад: «купив», «прочитав».'
  - statement: Прислівник завжди змінює свої закінчення.
    correct: false
    explanation: Ні, прислівник — це незмінне слово. Він ніколи не має закінчень.
  - statement: Займенники «ти» і «ви» — це друга особа.
    correct: true
    explanation: Так, ми використовуємо їх, коли говоримо з кимось прямо.
  - statement: Словники використовують скорочення, щоб зекономити місце.
    correct: true
    explanation: Так, наприклад «ім.» замість «іменник».
- type: fill-in
  instruction: Вставте правильну форму дієслова (теперішній час)
  items:
  - sentence: Я зараз ____ нову книгу.
    answer: читаю
    options:
    - читаю
    - читаєш
    - читає
  - sentence: Ти ____ дуже добре.
    answer: говориш
    options:
    - говорю
    - говориш
    - говорить
  - sentence: Ми ____ українську граматику.
    answer: вивчаємо
    options:
    - вивчаю
    - вивчаємо
    - вивчають
  - sentence: Ви ____ мене уважно?
    answer: слухаєте
    options:
    - слухаєш
    - слухаєте
    - слухають
  - sentence: Вона ____ в офісі.
    answer: працює
    options:
    - працюю
    - працює
    - працюють
  - sentence: Вони ____ цікавий текст.
    answer: пишуть
    options:
    - пишу
    - пишемо
    - пишуть
