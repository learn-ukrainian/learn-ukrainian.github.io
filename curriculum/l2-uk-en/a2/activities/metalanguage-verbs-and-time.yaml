version: '1.0'
module: metalanguage-verbs-and-time
level: a2
inline:
- id: match-up-verb-terms
  type: match-up
  instruction: З'єднайте граматичні терміни з їхнім значенням
  pairs:
  - left: дієслово
    right: показує активну дію або стан
  - left: час
    right: показує, коли саме відбувається дія
  - left: вид
    right: показує, як триває дія (процес чи результат)
  - left: спосіб
    right: емоційно показує відношення дії до реальності
  - left: доконаний вид
    right: означає фінальний результат або одноразову дію
  - left: недоконаний вид
    right: означає довгий процес або регулярну дію
  - left: дійсний спосіб
    right: описує реальні факти і завжди має час
  - left: наказовий спосіб
    right: використовується для наказів, прохань або порад
  title: З'єднайте граматичні терміни з їхнім значенням
- id: group-sort-verb-tense
  type: group-sort
  instruction: Розподіліть дієслова за часами
  groups:
  - label: Минулий час
    items:
    - працював
    - читала
    - купив
  - label: Теперішній час
    items:
    - працюю
    - читає
    - пишеш
  - label: Майбутній час
    items:
    - буду читати
    - попрацюю
    - зроблю
  title: Розподіліть дієслова за часами
- id: quiz-quiz-dictionary-literacy
  type: quiz
  instruction: Прочитайте словникові статті та дайте відповідь на запитання
  items:
  - question: Що означає запис «книга (ім., ж. р., одн.)»?
    options:
    - іменник, жіночий рід, однина
    - іменник, чоловічий рід, множина
    - дієслово, недоконаний вид
    - прислівник, середній рід
    correct: 0
  - question: 'Словник показує: «зробити (дієсл., док.)». Це означає, що слово:'
    options:
    - означає довгий процес
    - має фінальний результат
    - є іменником
    - ніколи не змінюється
    correct: 1
  - question: Яке скорочення показує, що це дієслово?
    options:
    - ім.
    - присл.
    - дієсл.
    - док.
    correct: 2
  - question: Яка позначка означає, що дієслово є довгим процесом, а не швидким результатом?
    options:
    - док.
    - недок.
    - ж. р.
    - дієсл.
    correct: 1
  - question: 'Словник дає позначку «мн.» біля слова «гроші». Це означає:'
    options:
    - чоловічий рід
    - однина
    - множина
    - місце
    correct: 2
  - question: Яке скорочення означає «жіночий рід»?
    options:
    - ч. р.
    - с. р.
    - ж. р.
    - ім.
    correct: 2
  - question: Яка частина мови має позначку «присл.» і ніколи не змінює своє закінчення?
    options:
    - дієслово
    - іменник
    - займенник
    - прислівник
    correct: 3
  - question: 'Словник каже: «брат (ім., ч. р., одн.)». Який рід має це слово?'
    options:
    - жіночий рід
    - середній рід
    - множина
    - чоловічий рід
    correct: 3
  title: Прочитайте словникові статті та дайте відповідь на запитання
- id: fill-in-fill-in-metalanguage
  type: fill-in
  instruction: Вставте правильний граматичний термін
  items:
  - sentence: Слово «читати» — це ____, бо воно показує активну дію.
    answer: дієслово
    options:
    - особа
    - прислівник
    - словник
    - дієслово
  - sentence: Минулий, теперішній і майбутній — це ____.
    answer: час
    options:
    - час
    - вид
    - спосіб
    - особа
  - sentence: Доконаний і недоконаний — це ____.
    answer: вид
    options:
    - час
    - дієвідміна
    - вид
    - спосіб
  - sentence: Дійсний і наказовий — це ____.
    answer: спосіб
    options:
    - особа
    - спосіб
    - час
    - вид
  - sentence: Перша і друга група закінчень дієслів — це ____.
    answer: дієвідміна
    options:
    - словник
    - дієвідміна
    - вид
    - час
  - sentence: Я, ти, він, ми, ви, вони — це ____.
    answer: особа
    options:
    - особа
    - час
    - спосіб
    - дієвідміна
  - sentence: Слово «швидко», яке ніколи не змінюється — це ____.
    answer: прислівник
    options:
    - дієслово
    - особа
    - вид
    - прислівник
  - sentence: Коли ми шукаємо невідоме слово або скорочення, ми відкриваємо ____.
    answer: словник
    options:
    - прислівник
    - словник
    - дієслово
    - особа
  title: Вставте правильний граматичний термін
workbook:
- type: match-up
  instruction: З'єднайте займенник із правильною формою дієслова (особа → форма)
  pairs:
  - left: я
    right: читаю
  - left: ти
    right: пишеш
  - left: він
    right: працює
  - left: вона
    right: стоїть
  - left: ми
    right: знаємо
  - left: ви
    right: говорите
  - left: вони
    right: купують
  - left: воно
    right: мовчить
  title: З'єднайте займенник із правильною формою дієслова (особа → форма)
- type: fill-in
  instruction: Вставте правильну форму дієслова в теперішньому часі
  items:
  - sentence: Ми зараз ____ нову книгу.
    answer: читаємо
    options:
    - читає
    - читають
    - читаємо
  - sentence: Ти часто ____ довгі листи?
    answer: пишеш
    options:
    - пишуть
    - пишеш
    - пишемо
  - sentence: Він ____ дуже швидко.
    answer: говорить
    options:
    - говорять
    - говориш
    - говорить
  - sentence: Я ____ каву кожного ранку.
    answer: купую
    options:
    - купую
    - купуємо
    - купує
  - sentence: Ви вже добре ____ це слово?
    answer: знаєте
    options:
    - знаємо
    - знають
    - знаєте
  - sentence: Вони завжди ____ вдома.
    answer: працюють
    options:
    - працює
    - працюють
    - працюємо
  title: Вставте правильну форму дієслова в теперішньому часі
- type: group-sort
  instruction: Розподіліть дієслова за типом дієвідміни
  groups:
  - label: Перша дієвідміна (-е-, -є-)
    items:
    - знаєш
    - читають
    - пишемо
    - працюєте
  - label: Друга дієвідміна (-и-, -ї-)
    items:
    - говориш
    - стоїть
    - мовчимо
    - кричать
  title: Розподіліть дієслова за типом дієвідміни
- type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Ми зараз читати цікаву книгу.
    error: читати
    correction: читаємо
    error_type: word
    options:
    - читаємо
    - читають
    - читаєте
    explanation: Для займенника «ми» (перша особа множини) потрібне закінчення «-ємо».
  - sentence: Давайте підемо в магазин після роботи.
    error: Давайте підемо
    correction: Ходімо
    error_type: phrase
    options:
    - Ходімо
    - Підемо
    - Йдемо
    explanation: Українська мова має власні форми наказового способу. «Давайте» —
      це російська калька.
  - sentence: Вони завжди мовчуть, коли вчитель говорить.
    error: мовчуть
    correction: мовчать
    error_type: word
    options:
    - мовчать
    - мовчимо
    - мовчите
    explanation: Це дієслово другої дієвідміни. У третій особі множини завжди використовується
      закінчення «-ать» або «-ять».
  - sentence: Я кожного ранку купує каву в кафе.
    error: купує
    correction: купую
    error_type: word
    options:
    - купую
    - купуємо
    - купуєш
    explanation: Для першої особи однини («я») потрібне закінчення «-ю» або «-у».
  - sentence: Давайте працювати разом над цим проєктом!
    error: Давайте працювати
    correction: Працюймо
    error_type: phrase
    options:
    - Працюймо
    - Працюємо
    - Працюють
    explanation: Замість конструкції з «давайте», використовуйте природну форму наказового
      способу «працюймо».
  - sentence: Ти дуже швидко пишете цей текст.
    error: пишете
    correction: пишеш
    error_type: word
    options:
    - пишеш
    - пише
    - пишуть
    explanation: Для другої особи однини («ти») потрібне закінчення «-єш» або «-иш».
  title: Знайдіть і виправте помилку в реченні
- type: true-false
  instruction: Правда чи ні? Перевірте, як ви зрозуміли теорію
  items:
  - statement: Дієслово показує активну дію або стан людини.
    correct: true
    explanation: Так, це справжнє серце кожного українського речення.
  - statement: Теперішній час показує дію, яка вже давно відбулася.
    correct: false
    explanation: Ні, теперішній час показує дію прямо зараз. Минулий час показує дію,
      яка вже відбулася.
  - statement: Доконаний вид завжди відповідає на питання «що робити?».
    correct: false
    explanation: Ні, доконаний вид відповідає на питання «що зробити?» і показує фінальний
      результат.
  - statement: Українська мова має три дієвідміни для дієслів.
    correct: false
    explanation: В українській мові є лише дві дієвідміни (перша і друга).
  - statement: Прислівник — це незмінне слово, яке ніколи не має відмінків.
    correct: true
    explanation: 'Так, він завжди залишається у своїй словниковій формі (наприклад:
      швидко, добре).'
  - statement: Замість «давайте підемо» українці природно кажуть «ходімо».
    correct: true
    explanation: Так, «ходімо» — це правильна синтетична форма наказового способу.
  title: Правда чи ні? Перевірте, як ви зрозуміли теорію
- type: group-sort
  instruction: Розподіліть дієслова за видами
  groups:
  - label: Недоконаний вид (довгий процес)
    items:
    - читати
    - купувати
    - працювати
    - писати
  - label: Доконаний вид (фінальний результат)
    items:
    - прочитати
    - купити
    - попрацювати
    - написати
  title: Розподіліть дієслова за видами
- type: fill-in
  instruction: Оберіть правильний вид дієслова за контекстом (процес чи результат?)
  items:
  - sentence: Вчора він довго ____ книгу, але не закінчив.
    answer: читав
    options:
    - читав
    - прочитав
  - sentence: Сьогодні я нарешті ____ цей цікавий текст до кінця.
    answer: прочитав
    options:
    - читав
    - прочитав
  - sentence: Ми кожного дня ____ свіжий хліб у сусідньому магазині.
    answer: купували
    options:
    - купували
    - купили
  - sentence: Вранці мама ____ молоко і принесла його додому.
    answer: купила
    options:
    - купувала
    - купила
  - sentence: Вони довго і важко ____ над цим новим проєктом.
    answer: працювали
    options:
    - працювали
    - попрацювали
  - sentence: Я швидко ____ цей лист і відправив його своєму другу.
    answer: написав
    options:
    - писав
    - написав
  title: Оберіть правильний вид дієслова за контекстом (процес чи результат?)
