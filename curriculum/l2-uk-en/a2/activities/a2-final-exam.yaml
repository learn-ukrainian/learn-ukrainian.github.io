- type: error-correction
  title: "Знайдіть та виправте помилку"
  items:
    - sentence: "Я дуже хвилююся, бо завтра я буду здавати іспит з математики."
      error: "здавати"
      answer: "складати"
      error_type: "word"
      options:
        - "складати"
        - "робити"
        - "брати"
        - "мати"
      explanation: "В українській мові іспити не здають, а складають. Це маркер правильної мови."
    - sentence: "Студент правильно відповідає на викладача."
      error: "на викладача"
      answer: "викладачу"
      error_type: "construction"
      options:
        - "викладачу"
        - "з викладачем"
        - "до викладача"
        - "від викладача"
      explanation: "Ми відповідаємо людині без прийменника, у давальному відмінку."
    - sentence: "Я вже три дні підготувався до цього важливого тесту."
      error: "підготувався"
      answer: "готувався"
      error_type: "word"
      options:
        - "готувався"
        - "вчився"
        - "читав"
        - "робив"
      explanation: "Три дні — це процес, тому потрібен недоконаний вид."
    - sentence: "Я дуже цікавлюся про нову систему оцінювання."
      error: "про нову систему"
      answer: "новою системою"
      error_type: "construction"
      options:
        - "новою системою"
        - "на нову систему"
        - "до нової системи"
        - "за новою системою"
      explanation: "Дієслово цікавитися вимагає орудного відмінка без прийменника."
    - sentence: "Університет пишається за своїх студентів."
      error: "за своїх студентів"
      answer: "своїми студентами"
      error_type: "construction"
      options:
        - "своїми студентами"
        - "на своїх студентів"
        - "своїх студентів"
        - "до своїх студентів"
      explanation: "Пишатися вимагає орудного відмінка."
    - sentence: "Мій брат вчить історію України в університеті."
      error: "вчить"
      answer: "вивчає"
      error_type: "word"
      options:
        - "вивчає"
        - "читає"
        - "дивиться"
        - "знає"
      explanation: "Коли ми говоримо про глибоке дослідження предмета в університеті, використовуємо вивчати."

- type: true-false
  title: "Правда чи брехня?"
  items:
