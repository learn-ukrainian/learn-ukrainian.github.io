- type: quiz
  title: "Перевірте ваші знання"
  items:
    - question: "Яке дієслово ми використовуємо для позначення серйозного, довгого дослідження предмета в університеті?"
      explanation: "Вивчати означає глибоке дослідження предмета, наприклад, в університеті."
      options:
        - text: "вивчати"
          correct: true
        - text: "вчити"
          correct: false
        - text: "вчитися"
          correct: false
        - text: "читати"
          correct: false
    - question: "Що означає словосполучення скласти іспит в українській мові?"
      explanation: "Скласти іспит означає успішно його завершити і отримати сертифікат або оцінку."
      options:
        - text: "успішно пройти тестування"
          correct: true
        - text: "процес написання тесту"
          correct: false
        - text: "провалити іспит"
          correct: false
        - text: "готуватися до тесту"
          correct: false
    - question: "Як правильно сказати про свою дію, якщо ви зараз сидите і пишете текст тесту?"
      explanation: "Складати — це процес (недоконаний вид), який відбувається прямо зараз."
      options:
        - text: "я складаю іспит"
          correct: true
        - text: "я склав іспит"
          correct: false
        - text: "я здам іспит"
          correct: false
        - text: "я складатиму іспит"
          correct: false
    - question: "Що означає абревіатура ЗНО в українській системі освіти?"
      explanation: "ЗНО — це Зовнішнє незалежне оцінювання."
      options:
        - text: "Зовнішнє незалежне оцінювання"
          correct: true
        - text: "Загальне національне опитування"
          correct: false
        - text: "Зовнішній новий огляд"
          correct: false
        - text: "Зручне незалежне оцінювання"
          correct: false
    - question: "Яка система оцінювання використовується в сучасних українських школах?"
      explanation: "У сучасних українських школах використовують дванадцятибальну систему."
      options:
        - text: "дванадцятибальна система"
          correct: true
        - text: "п'ятибальна система"
          correct: false
        - text: "стобальна система"
          correct: false
        - text: "десятибальна система"
          correct: false
    - question: "Який прийменник потрібен після дієслова готуватися, якщо ви говорите про тест?"
      explanation: "Дієслово готуватися вимагає прийменника до."
      options:
        - text: "до"
          correct: true
        - text: "на"
          correct: false
        - text: "для"
          correct: false
        - text: "про"
          correct: false
    - question: "Який відмінок ми використовуємо після дієслова відповідати, коли говоримо з викладачем?"
      explanation: "Ми відповідаємо кому? — викладачу. Це давальний відмінок без прийменника."
      options:
        - text: "давальний відмінок"
          correct: true
        - text: "знахідний відмінок"
          correct: false
        - text: "родовий відмінок"
          correct: false
        - text: "орудний відмінок"
          correct: false
    - question: "Яке слово ми використовуємо, щоб показати напрямок вперед без поворотів?"
      explanation: "Слово прямо означає рух вперед без поворотів."
      options:
        - text: "прямо"
          correct: true
        - text: "ліворуч"
          correct: false
        - text: "праворуч"
          correct: false
        - text: "назад"
          correct: false

