      correct: true
      explanation: "Так, це слово ідеально підходить для академічного контексту."
    - statement: "Фраза я складав іспит означає, що ви отримали успішний результат."
      correct: false
      explanation: "Складав — це процес. Ви писали тест, але результат ще невідомий."
    - statement: "В Україні іспити правильно складати, а не здавати."
      correct: true
      explanation: "Слово здавати у контексті іспитів є русизмом."
    - statement: "ЗНО та НМТ — це національні системи тестування в Україні."
      correct: true
      explanation: "Ці системи гарантують прозорість та чесність освіти."
    - statement: "Коли ми відповідаємо на питання, ми використовуємо давальний відмінок."
      correct: false
      explanation: "Для неживих об'єктів після відповідати на ми використовуємо знахідний відмінок."
    - statement: "Слово ліворуч означає рух прямо без поворотів."
      correct: false
      explanation: "Ліворуч означає напрямок лівої руки."
    - statement: "Дієслово прямувати вимагає прийменника до та родового відмінка."
      correct: true
      explanation: "Ми прямуємо до будівлі або до аудиторії."

