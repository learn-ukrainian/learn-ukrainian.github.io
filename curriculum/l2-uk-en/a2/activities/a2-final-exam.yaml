- type: fill-in
  title: "Заповніть пропуски: відмінки"
  items:
    - sentence: "Я дуже ретельно готуюся до фінального _____."
      answer: "іспиту"
      options:
        - "іспиту"
        - "іспит"
        - "іспитом"
        - "іспиті"
      explanation: "Після до потрібен родовий відмінок."
    - sentence: "Студент правильно відповідає на складне _____."
      answer: "запитання"
      options:
        - "запитання"
        - "запитанню"
        - "запитанням"
        - "запитань"
      explanation: "Відповідати на вимагає знахідного відмінка для неживих об'єктів."
    - sentence: "На іспиті вона чітко відповідала своєму _____."
      answer: "викладачу"
      options:
        - "викладачу"
        - "викладача"
        - "викладачем"
        - "викладачі"
      explanation: "Відповідати людині вимагає давального відмінка."
    - sentence: "Батьки дуже цікавляться моїм високим _____."
      answer: "результатом"
      options:
        - "результатом"
        - "результат"
        - "результату"
        - "результаті"
      explanation: "Цікавитися вимагає орудного відмінка."
    - sentence: "Ми чекаємо на гарний _____ тестування."
      answer: "результат"
      options:
        - "результат"
        - "результату"
        - "результатом"
        - "результаті"
      explanation: "Чекати на вимагає знахідного відмінка."
    - sentence: "Університет пишається новим _____ студентів."
      answer: "досягненням"
      options:
        - "досягненням"
        - "досягнення"
        - "досягненню"
        - "досягненнях"
      explanation: "Пишатися вимагає орудного відмінка."
    - sentence: "Маленька дитина швидко вчиться _____ і писати."
      answer: "читати"
      options:
        - "читати"
        - "читаю"
        - "читав"
        - "читає"
      explanation: "Вчитися робити щось вимагає інфінітива."
    - sentence: "Я хочу відповісти своєму _____ електронним листом."
      answer: "другу"
      options:
        - "другу"
        - "друга"
        - "другом"
        - "друг"
      explanation: "Відповідати кому вимагає давального відмінка."

