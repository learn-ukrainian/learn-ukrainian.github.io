        - "б"
        - "був"
        - "як"
      explanation: "Після приголосної літери в завжди пишемо повну частку би."
    - sentence: "Якщо я був дуже багатим, я б купив собі великий острів."
      error: "Якщо"
      answer: "Якби"
      options:
        - "Якби"
        - "Якщо"
        - "Коли"
        - "Що"
      explanation: "Для нереальної фантазії ми обов'язково використовуємо слово якби."
    - sentence: "Вона дуже хотіла би поїхати до красивого Львова."
      error: "би"
      answer: "б"
      options:
        - "б"
        - "би"
        - "була"
        - "якби"
      explanation: "Після голосної літери а завжди пишемо коротку частку б."
    - sentence: "Як я мав би багато грошей, я б відкрив свою кав'ярню."
      error: "Як"
      answer: "Якби"
      options:
