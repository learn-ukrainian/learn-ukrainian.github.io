- type: quiz
  title: "Перевірте знання: Умовний спосіб"
  items:
    - question: "Яке слово ми використовуємо для реальної умови, яка може статися в майбутньому?"
      explanation: "Слово якщо використовується для реальних планів і фактів."
      options:
        - text: "якщо"
          correct: true
        - text: "якби"
          correct: false
        - text: "коли"
          correct: false
        - text: "чи"
          correct: false
    - question: "Яке слово відкриває двері у світ чистих фантазій та неможливих ситуацій?"
      explanation: "Слово якби використовується для нереальних, гіпотетичних умов."
      options:
        - text: "якби"
          correct: true
        - text: "якщо"
          correct: false
        - text: "можливо"
          correct: false
        - text: "напевно"
          correct: false
    - question: "Який граматичний час обов'язково йде після слова якби?"
      explanation: "Після якби ми завжди використовуємо тільки дієслова в минулому часі."
      options:
        - text: "минулий час"
          correct: true
        - text: "теперішній час"
          correct: false
        - text: "майбутній час"
          correct: false
        - text: "будь-який час"
          correct: false
    - question: "Яку фонетичну форму частки ми ставимо після слова, що закінчується на голосну?"
      explanation: "Після голосних (наприклад, хотіла, знало) ми ставимо коротку форму б для милозвучності."
      options:
        - text: "б"
          correct: true
        - text: "би"
          correct: false
        - text: "бо"
          correct: false
        - text: "ба"
          correct: false
    - question: "Яку форму частки ми обираємо після приголосної літери?"
      explanation: "Після приголосних (наприклад, хотів, знав) потрібна повна форма би як місток."
      options:
        - text: "би"
          correct: true
        - text: "б"
          correct: false
        - text: "же"
          correct: false
        - text: "ж"
          correct: false
    - question: "Як правильно почати ввічливе прохання в ресторані, якщо ви чоловік?"
      explanation: "Чоловічий рід минулого часу (хотів) закінчується на приголосний, тому додаємо би."
      options:
        - text: "я хотів би"
          correct: true
        - text: "я хотіла б"
          correct: false
        - text: "я хочу"
          correct: false
        - text: "я хотів б"
          correct: false
    - question: "Що означає українське народне прислів'я про гриби в роті?"
      explanation: "Прислів'я 'Якби та аби, та виросли в роті гриби' сміється з порожніх мрій без дії."
      options:
        - text: "критика людей, які тільки мріють і нічого не роблять"
          correct: true
        - text: "рецепт приготування смачної страви"
          correct: false
        - text: "науковий факт про природу"
          correct: false
        - text: "порада збирати гриби в лісі"
          correct: false
    - question: "Як найввічливіше сказати 'Мені потрібна вода' без прямої вимоги?"
      explanation: "Безособова форма хотілося б є найбільш м'якою та вишуканою."
      options:
        - text: "мені хотілося б води"
          correct: true
        - text: "я дуже хочу воду"
          correct: false
        - text: "дайте мені воду"
          correct: false
        - text: "я вимагаю воду"
          correct: false

- type: true-false
  title: "Правда чи брехня"
  instruction: "Визначте, чи правильні ці твердження про умовний спосіб."
  items:
    - statement: "Слово якщо використовується для фантазій."
      correct: false
      explanation: "Слово якщо потрібне для реальних умов і фактів, а не для фантазій."
    - statement: "Після слова якби ніколи не можна ставити теперішній час."
      correct: true
      explanation: "Правильно, після якби завжди використовується тільки минулий час."
    - statement: "Слова 'як я був би' є граматично правильною конструкцією."
      correct: false
      explanation: "Слово якби не можна розривати. Правильно казати якби я був."
    - statement: "Після слова хотіла потрібно ставити коротку частку б."
      correct: true
      explanation: "Слово хотіла закінчується на голосну а, тому ми використовуємо коротку форму б."
    - statement: "Умовний спосіб допомагає бути більш ввічливим у розмові."
      correct: true
      explanation: "Фрази я б хотів чи мені б хотілося звучать набагато м'якше, ніж пряме я хочу."
    - statement: "В українській мові немає різниці між словами якщо та якби."
      correct: false
      explanation: "Різниця величезна: якщо для реальності, якби для уяви та мрій."
    - statement: "Дієслова минулого часу змінюються за родами: чоловічий, жіночий, середній."
      correct: true
      explanation: "Тому форма частки б або би також залежить від роду."
    - statement: "Якщо результат стоїть на першому місці в реченні, сенс змінюється."
      correct: false
      explanation: "Порядок частин у реченні можна вільно міняти, сенс залишається незмінним."

- type: fill-in
  title: "Оберіть правильну частку: б чи би?"
  instruction: "Подивіться на останню літеру попереднього слова і оберіть б або би."
  items:
    - sentence: "Я із задоволенням випив ___ гарячого чаю."
      answer: "би"
      explanation: "Слово випив закінчується на приголосну в."
      options: ["би", "б", "бо", "ба"]
    - sentence: "Вона хотіла ___ купити нову красиву сукню."
      answer: "б"
      explanation: "Слово хотіла закінчується на голосну а."
      options: ["б", "би", "бо", "ба"]
    - sentence: "Ми з радістю поїхали ___ у високі гори."
      answer: "б"
      explanation: "Слово поїхали закінчується на голосну и."
      options: ["б", "би", "бо", "ба"]
    - sentence: "Мій брат дуже хотів ___ мати нове авто."
      answer: "би"
      explanation: "Слово хотів закінчується на приголосну в."
      options: ["би", "б", "бо", "ба"]
    - sentence: "Вони могли ___ допомогти нам із цим завданням."
      answer: "б"
      explanation: "Слово могли закінчується на голосну и."
      options: ["б", "би", "бо", "ба"]
    - sentence: "Цей студент знав ___ правильну відповідь."
      answer: "би"
      explanation: "Слово знав закінчується на приголосну в."
      options: ["би", "б", "бо", "ба"]
    - sentence: "Маленьке кошеня гралося ___ цілий день."
      answer: "б"
      explanation: "Слово гралося закінчується на голосну о."
      options: ["б", "би", "бо", "ба"]
    - sentence: "Ти прочитав ___ цю книжку набагато швидше."
      answer: "би"
      explanation: "Слово прочитав закінчується на приголосну в."
      options: ["би", "б", "бо", "ба"]

- type: fill-in
  title: "Реальність чи уява: якщо чи якби?"
  instruction: "Зверніть увагу на час дієслова і контекст, щоб обрати правильне слово."
  items:
    - sentence: "___ завтра буде гарна погода, ми підемо в парк."
      answer: "Якщо"
      explanation: "Дієслово буде у майбутньому часі вказує на реальну умову."
      options: ["Якщо", "Якби", "Коли", "Хоча"]
    - sentence: "___ я мав мільйон доларів, я б купив великий будинок."
      answer: "Якби"
      explanation: "Дієслово мав у минулому часі та частка б вказують на фантазію."
      options: ["Якби", "Якщо", "Коли", "Хоча"]
    - sentence: "Я допоможу тобі з домашнім завданням, ___ ти цього хочеш."
      answer: "якщо"
      explanation: "Дієслово хочеш у теперішньому часі вказує на реальну умову."
      options: ["якщо", "якби", "коли", "хоча"]
    - sentence: "Ми б поїхали на море, ___ зараз було жарке літо."
      answer: "якби"
      explanation: "Дієслово було у минулому часі вказує на нереальну ситуацію."
      options: ["якби", "якщо", "коли", "хоча"]
    - sentence: "___ ти мене добре попросиш, вона тобі обов'язково допоможе."
      answer: "Якщо"
      explanation: "Дієслово попросиш у майбутньому часі вказує на реальну можливість."
      options: ["Якщо", "Якби", "Коли", "Хоча"]
    - sentence: "___ ти її добре попросив, вона обов'язково допомогла б тобі."
      answer: "Якби"
      explanation: "Дієслово попросив у минулому часі вказує на гіпотетичний сценарій."
      options: ["Якби", "Якщо", "Коли", "Хоча"]
    - sentence: "___ я маю вільний час, я завжди читаю книги."
      answer: "Якщо"
      explanation: "Дієслово маю у теперішньому часі описує реальний регулярний факт."
      options: ["Якщо", "Якби", "Коли", "Хоча"]
    - sentence: "Я спав би цілий день, ___ не мав так багато роботи сьогодні."
      answer: "якби"
      explanation: "Дієслово не мав у минулому часі вказує на уявну ситуацію."
      options: ["якби", "якщо", "коли", "хоча"]

