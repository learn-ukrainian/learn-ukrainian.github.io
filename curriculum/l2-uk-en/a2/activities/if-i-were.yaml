        - "Коли"
      explanation: "Правильне слово для гіпотетичної умови — це одне неподільне слово якби."
    - sentence: "Якби завтра буде тепле сонце, ми обов'язково підемо гуляти."
      error: "Якби"
      answer: "Якщо"
      options:
