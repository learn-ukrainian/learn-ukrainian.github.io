      answer: "Мій друг хотів би спробувати цей десерт"

- type: match-up
  title: "Знайдіть пару: Реальність та Фантазія"
  instruction: "З'єднайте речення, які описують реальну можливість, з їхніми уявними парами."
  pairs:
    - left: "Якщо в мене є гроші, я купую книги."
      right: "Якби я мав гроші, я б купив усі книги."
    - left: "Якщо завтра буде тепло, я піду гуляти."
      right: "Якби було тепло, я б пішов гуляти."
    - left: "Якщо ти попросиш, вона допоможе."
      right: "Якби ти попросив, вона б допомогла."
    - left: "Якщо я маю час, я читаю."
      right: "Якби я мав час, я б читав більше."
    - left: "Якщо ми прийдемо вчасно, ми побачимо фільм."
      right: "Якби ми прийшли вчасно, ми б побачили фільм."
    - left: "Якщо вона знає відповідь, вона скаже."
      right: "Якби вона знала відповідь, вона б сказала."
    - left: "Якщо виграю в лотерею, поїду в тур."
      right: "Якби я виграв у лотерею, я б поїхав у тур."
    - left: "Якщо ми хочемо їсти, ми йдемо в ресторан."
      right: "Якби ми хотіли їсти, ми б пішли в ресторан."

- type: error-correction
  title: "Виправте помилки"
  instruction: "Знайдіть і виправте типові помилки в умовних реченнях."
  items:
    - sentence: "Якби я маю вільний час, я б читав більше."
      error: "маю"
      answer: "мав"
      options: ["мав", "матиму", "буду мати", "маю"]
      explanation: "Після слова якби завжди потрібен минулий час (мав)."
    - sentence: "Вона хотіла би поїхати додому."
      error: "би"
      answer: "б"
      options: ["б", "бо", "ба", "же"]
      explanation: "Слово хотіла закінчується на голосну, тому потрібна коротка форма б."
    - sentence: "Як я був би багатим, я б багато подорожував."
      error: "Як я був би"
      answer: "Якби я був"
      error_type: "phrase"
      options: ["Якби я був", "Якщо я був би", "Якби був би", "Якщо би я був"]
      explanation: "Правильна нерозривна форма — якби я був. Розривати якби не можна."
    - sentence: "Якщо я був дуже багатим, я б купив острів."
      error: "Якщо"
      answer: "Якби"
      options: ["Якби", "Коли", "Хоча", "Чи"]
      explanation: "Для нереальної фантазії потрібне слово якби."
    - sentence: "Жінка каже: Я дуже хотів би випити гарячого чаю."
      error: "хотів"
      answer: "хотіла"
      options: ["хотіла", "хочу", "хотітиму", "бажаю"]
      explanation: "Жінка повинна використовувати форму жіночого роду (хотіла)."
    - sentence: "Він дуже хотів б купити цей светр."
      error: "б"
      answer: "би"
      options: ["би", "бо", "ба", "ж"]
      explanation: "Слово хотів закінчується на приголосну, тому потрібна повна форма би."

- type: group-sort
  title: "Розподіліть слова за часткою б або би"
