- type: mark-the-words
  title: "Знайдіть дієслова минулого часу"
  instruction: "Знайдіть і позначте всі дієслова у формі минулого часу в цьому абзаці."
  text: "Якби Тарас виграв цілий мільйон, він би одразу відкрив кав'ярню у центрі міста. Оксана обов'язково стала б його першою клієнткою. Вони б часто пили смачну каву і багато говорили про життя. Вона завжди хотіла мати таке місце."
  answers: ["виграв", "відкрив", "стала", "пили", "говорили", "хотіла"]

- type: select
  title: "Оберіть речення з уявними ситуаціями"
  instruction: "Які з цих речень описують нереальні фантазії (умовний спосіб)?"
