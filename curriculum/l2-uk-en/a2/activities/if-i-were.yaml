          correct: false
        - text: "Мені б хотілося подивитися меню."
          correct: true
        - text: "Дайте мені меню."
          correct: false
        - text: "Я б хотів замовити борщ."
          correct: true
        - text: "Принесіть мені борщ."
          correct: false
      explanation: "Умовний спосіб допомагає пом'якшити пряме прохання."
    - question: "Які з цих слів ми зазвичай використовуємо для нереальних фантазій і мрій?"
      min_correct: 3
      options:
        - text: "якби"
