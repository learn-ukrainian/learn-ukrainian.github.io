          correct: false
        - text: "Я хотіла б подивитися ваше меню."
          correct: true
        - text: "Дайте мені чорну каву."
          correct: false
        - text: "Мені дуже хотілося б забронювати номер."
          correct: true
        - text: "Ми хотіли б купити ці квитки."
