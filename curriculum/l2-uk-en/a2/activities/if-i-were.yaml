- type: true-false
  title: "Правда чи брехня?"
  instruction: "Прочитайте твердження про умовний спосіб і визначте, чи вони правдиві."
  items:
    - statement: "Слово якщо ми використовуємо для реальних планів і майбутнього."
      correct: true
      explanation: "Так, якщо означає реальну умову."
    - statement: "Після слова якби ми обов'язково використовуємо теперішній час."
      correct: false
      explanation: "Після якби ми завжди використовуємо минулий час."
    - statement: "Частку б ми ставимо тільки після приголосних звуків."
      correct: false
      explanation: "Частку б ми ставимо після голосних звуків (наприклад, хотіла б)."
    - statement: "Фраза я б хотіла звучить набагато ввічливіше, ніж просто я хочу."
      correct: true
      explanation: "Так, це дуже ввічлива форма для прохань."
    - statement: "В українській мові якби і би - це завжди окремі слова на початку речення."
      correct: false
      explanation: "Слово якби вже містить у собі умовну частку, їх не треба розділяти."
    - statement: "Слово якби чітко показує, що ситуація є неможливою або нереальною фантазією."
      correct: true
      explanation: "Це слово створене саме для світу мрій."
    - statement: "Після дієслова хотіла ми повинні обов'язково поставити повну частку би."
      correct: false
      explanation: "Слово хотіла закінчується на голосну, тому треба використовувати б."
    - statement: "Дієслова чоловічого роду в минулому часі зазвичай вимагають частку би."
      correct: true
      explanation: "Чоловічий рід часто закінчується на приголосний в, тому ми кажемо хотів би."

- type: group-sort
  title: "Правильна частка: б чи би?"
  instruction: "Розподіліть фрази у дві групи залежно від того, яка частка потрібна (після голосних чи приголосних)."
  groups:
    - name: "Коротка частка Б"
      items:
        - "вона хотіла"
        - "вони пішли"
        - "воно впало"
        - "ми знали"
        - "ти зробила"
    - name: "Повна частка БИ"
      items:
        - "він хотів"
        - "я міг"
        - "брат сказав"
        - "студент прочитав"
        - "батько купив"

- type: fill-in
  title: "Реальність чи фантазія?"
  instruction: "Оберіть правильне слово (якщо або якби) для кожної ситуації."
  items:
    - sentence: "____ завтра буде сильний дощ, я залишуся вдома."
      answer: "Якщо"
      options:
        - "Якщо"
        - "Якби"
        - "Що"
        - "Коли"
      explanation: "Дощ завтра цілком можливий, тому це реальна умова."
    - sentence: "____ я мав мільйон доларів, я купив би великий острів."
      answer: "Якби"
      options:
        - "Якби"
        - "Якщо"
        - "Коли"
        - "Щоб"
      explanation: "Мільйон доларів зараз — це фантазія, потрібен умовний спосіб."
    - sentence: "Ми підемо сьогодні в кіно, ____ ти купиш квитки."
      answer: "якщо"
      options:
        - "якщо"
        - "якби"
        - "тому"
        - "або"
      explanation: "Це реальний план на вечір."
    - sentence: "Вона допомогла б нам, ____ ми її попросили вчора."
      answer: "якби"
      options:
        - "якби"
        - "якщо"
        - "коли"
        - "як"
      explanation: "Ми її не попросили, ситуація гіпотетична."
    - sentence: "____ у мене був вільний час, я б читав набагато більше."
      answer: "Якби"
      options:
        - "Якби"
        - "Якщо"
        - "Коли"
        - "Що"
      explanation: "Це нездійсненна умова в теперішньому."
    - sentence: "Я обов'язково зателефоную тобі, ____ буду сьогодні вільний."
      answer: "якщо"
      options:
        - "якщо"
        - "якби"
        - "ніж"
        - "як"
      explanation: "Це цілком реальний розвиток подій."
    - sentence: "____ ти справді хочеш, ми можемо піти в цей ресторан разом."
      answer: "Якщо"
      options:
        - "Якщо"
        - "Якби"
        - "Хоча"
        - "Щоб"
      explanation: "Це реальна пропозиція."
    - sentence: "____ зараз було тепле літо, ми б поїхали відпочивати на море."
      answer: "Якби"
      options:
        - "Якби"
        - "Якщо"
        - "Коли"
        - "Ніж"
      explanation: "Зараз не літо, тому це чиста фантазія."

- type: quiz
  title: "Перевірка граматики"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Яку саме умовну частку треба додати до дієслова читав?"
      options:
        - text: "би"
          correct: true
        - text: "б"
          correct: false
        - text: "був"
          correct: false
        - text: "як"
          correct: false
      explanation: "Дієслово читав закінчується на приголосний звук."
    - question: "Яку умовну частку треба додати до дієслова читала?"
      options:
        - text: "б"
          correct: true
        - text: "би"
          correct: false
        - text: "була"
          correct: false
        - text: "якщо"
          correct: false
      explanation: "Дієслово читала закінчується на голосний звук."
    - question: "Який граматичний час дієслова використовується після слова якби?"
      options:
        - text: "минулий"
          correct: true
        - text: "теперішній"
          correct: false
        - text: "майбутній"
          correct: false
        - text: "інфінітив"
          correct: false
      explanation: "Після якби завжди йде минулий час."
    - question: "Як найкраще і найввічливіше сказати офіціанту про своє замовлення?"
      options:
        - text: "Я б хотів каву"
          correct: true
        - text: "Я хочу каву"
          correct: false
        - text: "Дайте мені каву"
          correct: false
        - text: "Принесіть каву"
          correct: false
      explanation: "Конструкція я б хотів є дуже ввічливою і м'якою."
    - question: "Яке слово означає абсолютно нереальну умову або фантазію?"
      options:
        - text: "якби"
          correct: true
        - text: "якщо"
          correct: false
        - text: "коли"
          correct: false
        - text: "тому що"
          correct: false
      explanation: "Слово якби використовується виключно для нереального світу мрій."
    - question: "Як граматично правильно сказати фразу If I had free time?"
      options:
        - text: "Якби я мав час"
          correct: true
        - text: "Якщо я маю час"
          correct: false
        - text: "Як я мав би час"
          correct: false
        - text: "Якщо я був би час"
          correct: false
      explanation: "Ми обов'язково використовуємо якби + минулий час."
    - question: "Як правильно перекласти фразу If the weather is nice tomorrow?"
      options:
        - text: "Якщо завтра буде тепло"
          correct: true
        - text: "Якби завтра було тепло"
          correct: false
        - text: "Якщо завтра було тепло"
          correct: false
        - text: "Якби завтра буде тепло"
          correct: false
      explanation: "Для реального майбутнього ми використовуємо якщо."
    - question: "Яке українське прислів'я каже про пусті мрії?"
      options:
        - text: "Якби та аби, та виросли гриби"
          correct: true
        - text: "Моя хата скраю"
          correct: false
        - text: "Що посієш, те й пожнеш"
          correct: false
        - text: "Не кажи гоп, поки не перескочиш"
          correct: false
      explanation: "Це прислів'я іронізує над тими, хто тільки мріє, але нічого не робить."

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Знайдіть і виправте одну помилку в кожному реченні."
  items:
    - sentence: "Якби я маю вільний час, я б пішов у міський парк."
      error: "маю"
      answer: "мав"
      options:
        - "мав"
        - "маю"
        - "матиму"
        - "мати"
      explanation: "Після слова якби ми завжди використовуємо минулий час дієслова."
    - sentence: "Я дуже хотів б випити чашку гарячого чорного чаю."
      error: "б"
      answer: "би"
      options:
