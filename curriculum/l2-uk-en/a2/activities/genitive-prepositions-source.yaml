workbook:
- id: true-false-grammar-prepositions
  type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про прийменники
  items:
  - statement: Ми використовуємо «від», щоб сказати, з якої ми країни.
    correct: false
    explanation: Для походження (країни, міста) ми використовуємо «з».
  - statement: Словосполучення «з брата» означає подарунок від людини.
    correct: false
    explanation: 'Для осіб (хто дає щось) ми використовуємо «від»: від брата.'
  - statement: Після прийменника «після» іменник завжди стоїть у родовому відмінку
      (Genitive).
    correct: true
    explanation: Прийменник «після» завжди вимагає родового відмінка.
  - statement: Для матеріалу (наприклад, дерево, скло) ми використовуємо прийменник
      «з».
    correct: true
    explanation: Матеріал позначається прийменником «з/із/зі» + родовий відмінок.
  - statement: Українці кажуть «ліки від болю», а не «ліки для болю».
    correct: true
    explanation: Ми використовуємо «від» для захисту чи лікування.
  - statement: Прийменник «зі» використовується перед голосними звуками.
    correct: false
    explanation: «Зі» використовується перед збігом приголосних (наприклад, зі школи).
  - statement: Після прийменників «з», «від» та «після» іменники змінюють своє закінчення.
    correct: true
    explanation: Усі ці прийменники вимагають родового відмінка (Genitive).
  - statement: Фраза «далеко з міста» є граматично правильною.
    correct: false
    explanation: 'Зі словами «далеко / недалеко» ми використовуємо «від»: далеко від
      міста.'
- id: error-correction-prepositions
  type: error-correction
  instruction: Знайдіть і виправте помилку у використанні прийменників або відмінків
  items:
  - sentence: Я отримав цікавий лист з моєї сестри.
    error: з
    correction: від
    error_type: word
    options:
    - від
    - із
    - після
    explanation: Коли ми отримуємо щось від людини, використовуємо «від».
  - sentence: Ми дуже далеко з нашого готелю.
    error: з
    correction: від
    error_type: word
    options:
    - від
    - після
    - до
    explanation: Зі словом «далеко» завжди використовується «від».
  - sentence: Ця красива ваза зроблена від скла.
    error: від
    correction: зі
    error_type: word
    options:
    - зі
    - після
    - до
    explanation: Матеріал позначається прийменником «з/із/зі».
  - sentence: Я чекаю на тебе після урок.
    error: урок
    correction: уроку
    error_type: word
    options:
    - уроку
    - урока
    - уроком
    explanation: Після «після» потрібен родовий відмінок (Genitive).
  - sentence: Вона повернулася додому з Італія.
    error: Італія
    correction: Італії
    error_type: word
    options:
    - Італії
    - Італію
    - Італією
    explanation: Країни на -я змінюються на -ї у родовому відмінку.
  - sentence: Мені потрібна парасолька для дощу.
    error: для
    correction: від
    error_type: word
    options:
    - від
    - з
    - після
    explanation: Для захисту ми кажемо «від дощу» (against the rain).
  - sentence: Студенти вийшли зі аудиторії.
    error: зі
    correction: з
    error_type: word
    options:
    - з
    - від
    - після
    explanation: Перед голосним (аудиторії) використовується звичайне «з».
  - sentence: Ми п'ємо каву після сніданок.
    error: сніданок
    correction: сніданку
    error_type: word
    options:
    - сніданку
    - сніданком
    - сніданка
    explanation: Після «після» потрібен родовий відмінок.
