version: '1.0'
module: genitive-prepositions-source
level: a2
inline:
- id: quiz-euphony-variants
  type: quiz
  instruction: Оберіть правильний варіант прийменника (з, із, зі) для милозвучності.
  items:
  - question: Я приїхав ___ Львова.
    options:
    - зі
    - з
    - із
    - від
    correct: 0
  - question: Вона повернулася ___ Одеси.
    options:
    - з
    - із
    - зі
    - від
    correct: 0
  - question: Це гарне кільце ___ золота.
    options:
    - із
    - з
    - зі
    - від
    correct: 0
  - question: Діти швидко йдуть ___ школи.
    options:
    - зі
    - з
    - із
    - від
    correct: 0
  - question: Цей новий студент родом ___ Швеції.
    options:
    - зі
    - з
    - із
    - від
    correct: 0
  - question: Він узяв свій зошит ___ стола.
    options:
    - зі
    - з
    - із
    - від
    correct: 0
  - question: Жінка ___ села привезла свіже молоко.
    options:
    - із
    - з
    - зі
    - від
    correct: 0
  - question: Наші друзі летять ___ Харкова.
    options:
    - з
    - із
    - зі
    - від
    correct: 0
  title: Оберіть правильний варіант прийменника (з, із, зі) для милозвучності.
- id: fill-in-focus-complete-sentences-with-or-correct-genitive-noun-form
  type: fill-in
  instruction: Вставте правильний прийменник (від або з/із/зі) та іменник у родовому
    відмінку.
  items:
  - sentence: Я отримав чудовий подарунок ________.
    answer: від друга
    options:
    - від друга
    - з друга
    - від другу
    - з другу
  - sentence: Цей великий стіл зроблений ________.
    answer: з дерева
    options:
    - з дерева
    - від дерева
    - з дереву
    - від дереву
  - sentence: Він зараз живе далеко ________.
    answer: від центру
    options:
    - від центру
    - з центру
    - від центра
    - з центра
  - sentence: Я взяв парасольку ________.
    answer: від дощу
    options:
    - від дощу
    - з дощу
    - від доща
    - з доща
  - sentence: Вона щойно повернулася ________.
    answer: з роботи
    options:
    - з роботи
    - від роботи
    - з робота
    - від робота
  - sentence: Це дуже красива сукня ________.
    answer: з шовку
    options:
    - з шовку
    - від шовку
    - із шовку
    - від шовка
  - sentence: Ми дуже чекаємо листа ________.
    answer: від сусіда
    options:
    - від сусіда
    - з сусіда
    - від сусіду
    - з сусіду
  - sentence: Мама приготувала салат ________.
    answer: з овочів
    options:
    - з овочів
    - від овочів
    - із овочів
    - від овоча
  title: Вставте правильний прийменник (від або з/із/зі) та іменник у родовому відмінку.
- id: match-up-preposition-meanings
  type: match-up
  instruction: З'єднайте українські фрази з їхнім англійським перекладом.
  pairs:
  - left: з дитинства
    right: since childhood
  - left: від сусіда
    right: from a neighbor
  - left: з шовку
    right: made of silk
  - left: після вечері
    right: after dinner
  - left: недалеко від школи
    right: not far from the school
  - left: з Лондона
    right: from London
  - left: від дощу
    right: from the rain
  - left: після канікул
    right: after the holidays
  title: З'єднайте українські фрази з їхнім англійським перекладом.
- id: group-sort-preposition-usage
  type: group-sort
  instruction: Розподіліть фрази за правильним прийменником, який ми використовуємо
    в цих ситуаціях.
  groups:
  - label: з / із / зі (Місце або Матеріал)
    items:
    - Києва
    - золота
    - школи
    - шовку
  - label: від (Людина, Захист або Відстань)
    items:
    - брата
    - сонця
    - сусіда
    - центру
  - label: після (Час, подія вже закінчилася)
    items:
    - сніданку
    - уроку
    - роботи
    - зустрічі
  title: Розподіліть фрази за правильним прийменником, який ми використовуємо в цих
    ситуа
workbook:
- type: true-false
  instruction: Правда чи ні? Визначте, чи правильні ці твердження про прийменники.
  items:
  - statement: Ми використовуємо прийменник «від» для матеріалів (наприклад, дерево,
      скло).
    correct: false
    explanation: Для матеріалів ми використовуємо «з», «із» або «зі» (з дерева, зі
      скла).
  - statement: Прийменники «з», «від» та «після» завжди вимагають родового відмінка.
    correct: true
    explanation: 'Це правило: з/від/після + родовий відмінок.'
  - statement: Правильно говорити «з Львова», а не «зі Львова».
    correct: false
    explanation: Правильно говорити «зі Львова» для милозвучності (перед збігом приголосних).
  - statement: Прийменник «після» показує час, коли дія або подія вже закінчилася.
    correct: true
    explanation: 'Наприклад: після уроку, після роботи.'
  - statement: Ми кажемо «парасолька від дощу», тому що парасолька захищає нас.
    correct: true
    explanation: Прийменник «від» використовується для захисту (від дощу, від сонця,
      від головного болю).
  - statement: Словосполучення «з України» є неправильним.
    correct: false
    explanation: Це єдина правильна форма. Вона походить від правильної форми місцевого
      відмінка «в Україні».
  title: Правда чи ні? Визначте, чи правильні ці твердження про прийменники.
- type: error-correction
  instruction: Знайдіть і виправте помилку в кожному реченні.
  items:
  - sentence: Я отримав довгий лист з мами.
    error: з
    correction: від
    error_type: word
    options:
    - від
    - до
    - після
    explanation: Для людей ми завжди використовуємо «від», а не «з».
  - sentence: Він зазвичай п'є каву після сніданок.
    error: сніданок
    correction: сніданку
    error_type: word
    options:
    - сніданку
    - сніданка
    - сніданком
    explanation: Після прийменника «після» потрібен родовий відмінок (сніданку).
  - sentence: Ця красива сукня від шовку.
    error: від
    correction: з
    error_type: word
    options:
    - з
    - до
    - із
    explanation: Для матеріалів ми використовуємо «з» або «із», а не «від».
  - sentence: Ми живемо недалеко з вокзалу.
    error: з
    correction: від
    error_type: word
    options:
    - від
    - до
    - після
    explanation: Зі словами відстані «далеко» і «недалеко» ми використовуємо «від».
  - sentence: Він пізно повернувся зі роботи.
    error: зі
    correction: з
    error_type: word
    options:
    - з
    - від
    - із
    explanation: Перед однією літерою «р» ми використовуємо «з», а не «зі».
  - sentence: Ми завжди спілкуємося після зустріч.
    error: зустріч
    correction: зустрічі
    error_type: word
    options:
    - зустрічі
    - зустріча
    - зустріччю
    explanation: Після «після» потрібен родовий відмінок. Для слова «зустріч» це «зустрічі».
  title: Знайдіть і виправте помилку в кожному реченні.
- type: translate
  instruction: Оберіть правильний переклад речення українською мовою.
  items:
  - source: She is from London.
    options:
    - text: Вона з Лондона.
      correct: true
    - text: Вона від Лондона.
      correct: false
    - text: Вона із Лондон.
      correct: false
    - text: Вона зі Лондону.
      correct: false
  - source: This table is made of wood.
    options:
    - text: Цей стіл з дерева.
      correct: true
    - text: Цей стіл від дерева.
      correct: false
    - text: Цей стіл з дерево.
      correct: false
    - text: Цей стіл від дереву.
      correct: false
  - source: I have a gift from a friend.
    options:
    - text: Я маю подарунок від друга.
      correct: true
    - text: Я маю подарунок з друга.
      correct: false
    - text: Я маю подарунок від друг.
      correct: false
    - text: Я маю подарунок із друга.
      correct: false
  - source: We rest after work.
    options:
    - text: Ми відпочиваємо після роботи.
      correct: true
    - text: Ми відпочиваємо до роботи.
      correct: false
    - text: Ми відпочиваємо після робота.
      correct: false
    - text: Ми відпочиваємо з роботи.
      correct: false
  - source: Is your house far from the center?
    options:
    - text: Ваш дім далеко від центру?
      correct: true
    - text: Ваш дім далеко з центру?
      correct: false
    - text: Ваш дім недалеко від центру?
      correct: false
    - text: Ваш дім далеко від центр?
      correct: false
  - source: He has been reading this book since morning.
    options:
    - text: Він читає цю книгу з ранку.
      correct: true
    - text: Він читає цю книгу від ранку.
      correct: false
    - text: Він читає цю книгу після ранку.
      correct: false
    - text: Він читає цю книгу з ранок.
      correct: false
  title: Оберіть правильний переклад речення українською мовою.
