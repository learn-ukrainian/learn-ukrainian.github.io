      correct: true
    - text: від дерева
      correct: false
    - text: після дерева
      correct: false
    - text: до дерева
      correct: false
  - source: since childhood
    options:
    - text: з дитинства
      correct: true
    - text: від дитинства
      correct: false
    - text: після дитинства
      correct: false
    - text: до дитинства
      correct: false
  - source: after work
