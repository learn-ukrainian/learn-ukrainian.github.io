    - коштів
    answer: Ми зробимо повернення ваших коштів
- type: quiz
  title: Перевірка розуміння тексту
  instruction: Дайте правильну відповідь на запитання щодо цифрових сервісів.
  items:
  - question: Що означає популярний концепт Держава у смартфоні в Україні?
    explanation: Цей концепт означає, що громадяни можуть отримувати всі державні
      послуги онлайн через смартфон.
    options:
    - text: Отримання всіх державних послуг онлайн
      correct: true
    - text: Безкоштовний телефон для кожного громадянина
      correct: false
    - text: Заборона використовувати паперові гроші
      correct: false
    - text: Спеціальний податок на мобільні телефони
      correct: false
  - question: Який офіційний статус має електронний паспорт у додатку Дія?
    explanation: В Україні електронний паспорт має стовідсоткову юридичну силу, як
      і традиційний паперовий документ.
    options:
    - text: Він має повну юридичну силу скрізь
      correct: true
    - text: Він діє тільки в касі супермаркету
      correct: false
    - text: Він не є офіційним документом
      correct: false
    - text: Його можна використовувати тільки в Києві
      correct: false
  - question: Що означає популярна фраза скинути на картку в Україні?
    explanation: Ця фраза означає зробити швидкий електронний переказ грошей іншій
      людині.
    options:
    - text: Зробити електронний грошовий переказ
      correct: true
    - text: Забути свою картку вдома
      correct: false
    - text: Кинути пластикову картку на стіл
      correct: false
    - text: Відкрити новий рахунок у банку
      correct: false
  - question: Якого граматичного роду є українське слово замовлення?
    explanation: Слово замовлення закінчується на -я і належить до середнього роду.
    options:
    - text: Це слово середнього роду
      correct: true
    - text: Це слово жіночого роду
      correct: false
    - text: Це слово чоловічого роду
      correct: false
    - text: Це слово не має роду
      correct: false
  - question: Що ви робите, коли натискаєте кнопку додати в кошик?
    explanation: Ви віртуально переміщуєте обраний товар для майбутньої покупки.
    options:
    - text: Ви обираєте товар для покупки
      correct: true
    - text: Ви одразу оплачуєте свій товар
      correct: false
    - text: Ви пишете скаргу менеджеру
      correct: false
    - text: Ви скасовуєте своє замовлення
      correct: false
  - question: Яка головна різниця між словами номер та кількість?
    explanation: Слово номер — це код ідентифікації, а кількість — це скільки фізичних
      штук товару ви маєте.
    options:
    - text: Номер ідентифікує, а кількість рахує об'єкти
      correct: true
    - text: Це абсолютно однакові слова синоніми
      correct: false
    - text: Номер рахує об'єкти, а кількість ідентифікує
      correct: false
    - text: Ці слова використовують тільки для грошей
      correct: false
  - question: Навіщо клієнтам потрібен спеціальний номер для відстеження під час шопінгу?
    explanation: Цей номер допомагає побачити точну географічну локацію вашого очікуваного
      пакунка під час доставки.
    options:
    - text: Щоб знати локацію пакунка
      correct: true
    - text: Щоб зателефонувати кур'єру
      correct: false
    - text: Щоб оплатити замовлення
      correct: false
    - text: Щоб залишити відгук
      correct: false
  - question: Яка головна функція віртуальної банки в додатку Monobank?
    explanation: Банка працює як зручна віртуальна скарбничка для швидкого збору грошей
      на благодійність.
    options:
    - text: Це скарбничка для благодійності
      correct: true
    - text: Це гра про танцюючого кота
      correct: false
    - text: Це місце для фотографій
      correct: false
    - text: Це список покупок
      correct: false
