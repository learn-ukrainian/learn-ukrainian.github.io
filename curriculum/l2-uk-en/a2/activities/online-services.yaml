- type: match-up
  title: 'Знайдіть пару: онлайн сервіси'
  instruction: З'єднайте українське слово з його правильним значенням.
  pairs:
  - left: замовлення
    right: ваш список обраних товарів для покупки
  - left: кошик
    right: віртуальне місце для товарів на сайті
  - left: доставка
    right: процес переміщення товару до ваших дверей
  - left: додаток
    right: спеціальна мобільна програма для смартфона
  - left: картка
    right: банківський пластиковий інструмент для оплати
  - left: переказ
    right: відправка ваших грошей іншій людині
  - left: баланс
    right: сума ваших доступних грошей на рахунку
  - left: скарга
    right: офіційне повідомлення про технічну помилку
- type: fill-in
  title: Заповніть пропуски в інструкціях
  items:
  - sentence: Мій віртуальний онлайн ... зараз абсолютно порожній.
    answer: кошик
    options:
    - кошик
    - номер
    - додаток
    - термінал
  - sentence: Вона радісно оформила своє перше велике ... в цьому магазині.
    answer: замовлення
    options:
    - замовлення
    - завдання
    - кошик
    - додаток
  - sentence: Сьогодні у нашому магазині діє абсолютно безкоштовна ... товарів.
    answer: доставка
    options:
    - доставка
    - оплата
    - картка
    - скарга
  - sentence: Вам потрібно терміново завантажити наш новий мобільний ... на телефон.
    answer: додаток
    options:
    - додаток
    - переказ
    - баланс
    - документ
  - sentence: Наша безконтактна ... банківською карткою пройшла успішно.
    answer: оплата
    options:
    - оплата
    - доставка
    - банка
    - скарга
  - sentence: Мені потрібно швидко перевірити мій поточний ... на телефоні.
    answer: баланс
    options:
    - баланс
    - переказ
    - додаток
    - кошик
  - sentence: Я зараз зроблю швидкий грошовий ... на твій рахунок.
    answer: переказ
    options:
    - переказ
    - додаток
    - баланс
    - кошик
  - sentence: Ми зробимо повне ... ваших коштів на вашу картку завтра.
    answer: повернення
    options:
    - повернення
    - замовлення
    - підтвердження
    - відстеження
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: error-correction
  title: Виправте граматичні помилки
  instruction: Знайдіть і виправте помилку в кожному реченні.
  items:
  - sentence: Моя нова замовлення вже їде додому.
    error: Моя
    answer: Моє
    options:
    - Моє
    - Мій
    - Мої
    - Мене
    explanation: Слово замовлення — це іменник середнього роду, тому правильно казати
      моє замовлення.
  - sentence: Яка точна номер товарів вам потрібна сьогодні?
    error: номер
    answer: кількість
    options:
    - кількість
    - сума
    - цифра
    - частина
    explanation: Коли ми рахуємо фізичні об'єкти, ми використовуємо слово кількість,
      а не номер.
  - sentence: Вона додала новий телефон у свій кошику.
    error: кошику
    answer: кошик
    options:
    - кошик
    - кошика
    - кошиком
    - кошиках
    explanation: 'Після прийменника у або в для напрямку руху ми використовуємо Знахідний
      відмінок: додати в кошик.'
  - sentence: Ці свіжі фрукти вже довго лежать в кошик.
    error: кошик
    answer: кошику
    options:
    - кошику
    - кошика
    - кошиком
    - кошики
    explanation: 'Для опису статичного місця ми використовуємо Місцевий відмінок:
      лежать у кошику.'
  - sentence: Сьогодні у нашому магазині діє безкоштовний доставка.
    error: безкоштовний
    answer: безкоштовна
    options:
    - безкоштовна
    - безкоштовне
    - безкоштовні
    - безкоштовну
    explanation: Слово доставка — це іменник жіночого роду, тому прикметник теж має
      бути жіночого роду.
  - sentence: Я зараз скину тобі гроші в картку.
    error: в
    answer: на
    options:
    - на
    - до
    - біля
    - за
    explanation: Популярна українська фраза для грошового переказу звучить як скинути
      на картку.
- type: group-sort
  title: Рух чи статична позиція?
  instruction: Розподіліть фрази за правильним граматичним відмінком.
  groups:
