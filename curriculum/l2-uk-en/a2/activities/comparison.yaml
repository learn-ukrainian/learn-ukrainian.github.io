    - найкращий
    - кращий
    - самий добрий
    correct: 2
  - question: Це _____ день у моєму житті, я втратив роботу і ключі.
    options:
    - гірший
    - найпоганіший
    - найгірший
    - самий поганий
    correct: 2
- id: error-correction-comparison-find-and-fix-wrong-comparative-and-superlative-forms-double-comparison-russianisms
  type: error-correction
  instruction: Знайдіть і виправте помилку в утворенні ступенів порівняння
  items:
  - sentence: Мій новий комп'ютер більш кращий, ніж старий.
    error: більш кращий
    correction: кращий
    error_type: construction
    options:
    - кращий
    - більш гарний
    - найкращий
    explanation: «Кращий» вже означає «better». Не можна використовувати «більш» разом
      із формою вищого ступеня (подвійне порівняння).
  - sentence: Ця книжка сама цікава в бібліотеці.
    error: сама цікава
    correction: найцікавіша
    error_type: word
    options:
    - найцікавіша
    - більш цікавіша
    - сама цікавіша
    explanation: Українська мова ніколи не використовує слово «самий» для порівняння.
      Завжди використовуйте префікс «най-».
  - sentence: Ця кімната більш тепліша, ніж та.
    error: більш тепліша
    correction: тепліша
    error_type: construction
    options:
    - тепліша
    - більш тепла
    - найтепліша
    explanation: 'Це подвійне порівняння. Правильно казати: або «тепліша», або «більш
      тепла».'
  - sentence: Київ — це самий великий мегаполіс України.
    error: самий великий
    correction: найбільший
    error_type: word
    options:
    - найбільший
    - самий більший
    - більший
    explanation: Слово «самий» — це русизм. Використовуйте форму «найбільший».
  - sentence: Сьогодні мій брат працює більш швидше.
    error: більш швидше
    correction: швидше
    error_type: construction
    options:
    - швидше
    - найшвидше
    - швидкіше
    explanation: Не можна поєднувати слово «більш» і форму вищого ступеня.
  - sentence: Це самий кращий ресторан у місті.
    error: самий кращий
    correction: найкращий
    error_type: word
    options:
    - найкращий
    - самий гарний
    - більш кращий
    explanation: «Самий» — русизм. Завжди використовуємо «найкращий».
