version: '1.0'
module: comparison
level: a2
inline:
- id: fill-in-comparative
  type: fill-in
  instruction: Вставте правильну форму прикметника (вищий ступінь)
  items:
  - sentence: Я думаю, що кава ____.
    answer: смачніша
    options:
    - смачніша
    - смачніший
    - смачніше
  - sentence: Зелений чай ____ за каву.
    answer: корисніший
    options:
    - корисніший
    - корисніша
    - корисніше
  - sentence: Сьогодні день ____, ніж учора.
    answer: тепліший
    options:
    - тепліший
    - тепліша
    - тепліше
  - sentence: Цей чай набагато ____.
    answer: дешевший
    options:
    - дешевший
    - дешевша
    - дешевше
  - sentence: Мій новий стіл ____ за старий.
    answer: більший
    options:
    - більший
    - більша
    - більше
  - sentence: Торт ____, ніж хліб.
    answer: солодший
    options:
    - солодший
    - солодша
    - солодше
  - sentence: Цей текст ____ для читання.
    answer: цікавіший
    options:
    - цікавіший
    - цікавіша
    - цікавіше
  - sentence: Мій телефон ____ за твій.
    answer: менший
    options:
    - менший
    - менша
    - менше
  title: Вставте правильну форму прикметника (вищий ступінь)
- id: true-false-constructions
  type: true-false
  instruction: Правда чи ні? Визначте, чи правильна граматична конструкція.
  items:
  - statement: Київ більший за Львів.
    correct: true
    explanation: Правильна конструкція з прийменником «за».
  - statement: Сталь міцніше міді.
    correct: false
    explanation: Неправильно. Треба казати «міцніша за мідь».
  - statement: Цей телефон менший, ніж мій.
    correct: true
    explanation: Правильна конструкція зі словом «ніж».
  - statement: Він вищий свого брата.
    correct: false
    explanation: Неправильно. Родовий відмінок без прийменника — це русизм.
  - statement: Вона старша від мене.
    correct: true
    explanation: Правильна конструкція з прийменником «від».
  - statement: Ця книга цікавіша, ніж та.
    correct: true
    explanation: Правильна конструкція зі словом «ніж».
  - statement: Мій стіл більший стола.
    correct: false
    explanation: Неправильно. Треба казати «більший за стіл».
  - statement: Кава смачніша за чай.
    correct: true
    explanation: Правильна конструкція з прийменником «за».
  title: Правда чи ні? Визначте, чи правильна граматична конструкція.
