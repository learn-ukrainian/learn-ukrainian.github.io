- id: fill-in-form-the-comparative-from-the-base-adjective
  type: fill-in
  instruction: Вставте правильну форму вищого ступеня
  items:
  - sentence: Цей чай солодкий, але той чай ____.
    answer: солодший
    options:
    - солодкіший
    - солодший
    - більш солодкіший
  - sentence: Ця книжка цікава, але нова книжка ____.
    answer: цікавіша
    options:
    - цікавіша
    - цікавша
    - більш цікавіша
  - sentence: Мій светр теплий, але твій светр ____.
    answer: тепліший
    options:
    - тепліший
    - тепльший
    - більш теплий
  - sentence: Цей телефон дорогий, але комп'ютер ____.
    answer: дорожчий
    options:
    - дорогіший
    - дорожчий
    - більш дорожчий
  - sentence: Брат високий, але його друг ще ____.
    answer: вищий
    options:
    - високіший
    - вищий
    - високший
  - sentence: Цей будинок гарний, але той ____.
    answer: гарніший
    options:
    - гарніший
    - гарнший
    - більш гарніший
  - sentence: Моя дорога коротка, але твоя ще ____.
    answer: коротша
    options:
    - короткіша
    - коротша
    - коротча
  - sentence: Цей магазин близький, але супермаркет ще ____.
    answer: ближчий
    options:
    - близькіший
    - ближчий
    - близчий
- id: true-false-identify-correct-and-incorrect-comparative-constructions-genitive-traps
  type: true-false
  instruction: Чи правильна ця конструкція порівняння?
  items:
  - statement: Цей телефон дорожчий, ніж той.
    correct: true
    explanation: Конструкція «ніж + називний відмінок» є правильною.
  - statement: Цей телефон дорожчий того.
    correct: false
    explanation: 'В українській мові ми не використовуємо родовий відмінок без прийменника.
      Правильно: дорожчий за той або дорожчий, ніж той.'
  - statement: Ця кімната більша за ту.
    correct: true
    explanation: Конструкція «за + знахідний відмінок» є правильною.
  - statement: Мій брат розумніший, ніж я.
    correct: true
    explanation: Конструкція «ніж + називний відмінок» (я) є правильною.
  - statement: Мій брат розумніший мене.
    correct: false
    explanation: Це калька з російської. В українській мові треба казати «розумніший
      за мене» або «розумніший, ніж я».
  - statement: Одеса тепліша Києва.
    correct: false
    explanation: 'Без прийменника це русизм. Правильно: тепліша за Київ або тепліша,
      ніж Київ.'
  - statement: Ця кава значно солодша за чай.
    correct: true
    explanation: Конструкція з підсилювачем «значно» і прийменником «за» є абсолютно
      правильною.
  - statement: Твій комп'ютер потужніший, ніж мій.
    correct: true
    explanation: Це правильна конструкція з «ніж» та називним відмінком.
