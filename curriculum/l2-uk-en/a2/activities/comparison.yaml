- id: true-false-comparative-constructions-identify-correct-and-incorrect-comparative-constructions
  type: true-false
  instruction: Правда чи ні? Визначте, чи правильно утворене порівняння.
  items:
  - statement: Моя кімната набагато більша за твою.
    correct: true
    explanation: Слово «набагато» правильно підсилює порівняння.
  - statement: Цей текст трохи цікавіший.
    correct: true
    explanation: Слово «трохи» правильно підсилює порівняння.
  - statement: Він бігає більш швидше за мене.
    correct: false
    explanation: «Більш швидше» — це неправильне подвійне порівняння.
  - statement: Київ значно більший, ніж Львів.
    correct: true
    explanation: Слово «значно» і сполучник «ніж» використані правильно.
  - statement: Це самий менший екран.
    correct: false
    explanation: Треба казати «найменший екран».
  - statement: Ця куртка трохи більша.
    correct: true
    explanation: Правильна конструкція.
  - statement: Працювати вдома значно приємніше.
    correct: true
    explanation: Правильна форма прислівника.
  - statement: Мій комп'ютер набагато кращий мого старого.
    correct: false
    explanation: 'Пропущений прийменник «за». Треба: «кращий за мій старий».'
  title: Правда чи ні? Визначте, чи правильно утворене порівняння.
- id: fill-in-comparative-form-the-comparative-from-the-base-adjective
