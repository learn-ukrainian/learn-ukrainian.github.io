    options:
    - набагато
    - трохи
    - ніж
  - sentence: Ця куртка ____ більша, тому вона сидить зручніше.
    answer: трохи
    options:
    - трохи
    - набагато
    - ніж
  - sentence: Львів ____ цікавіший для туристів.
    answer: значно
    options:
    - значно
    - трохи
    - ніж
  - sentence: Він знає ____ більше, ніж я.
    answer: набагато
    options:
    - набагато
    - значно
    - за
  - sentence: Сталь міцніша ____ мідь.
    answer: за
    options:
    - за
    - на
    - для
  - sentence: Цей варіант ____ кращий, ніж той.
    answer: значно
    options:
    - значно
    - набагато
    - за
  title: Вставте правильне слово (набагато, трохи, значно, ніж, за)
- id: true-false-rules
  type: true-false
  instruction: Правда чи ні? Визначте правильність твердження про правила порівняння.
  items:
  - statement: Слово «більший» — це вищий ступінь від слова «великий».
    correct: true
    explanation: Це особлива форма, яку треба запам'ятати.
  - statement: Слово «кращий» — це вищий ступінь від слова «поганий».
    correct: false
    explanation: «Кращий» утворено від «добрий» або «гарний».
  - statement: «Найкращий» означає абсолютний максимум якості.
    correct: true
    explanation: Префікс «най-» показує найвищий ступінь.
  - statement: В українській мові можна сказати «більш кращий».
    correct: false
    explanation: Це помилка. Треба казати або «кращий», або «більш хороший» (рідше).
  - statement: Слово «менший» — це вищий ступінь від слова «малий».
    correct: true
    explanation: Це правильна особлива форма.
  - statement: Російське слово «самий» можна вільно використовувати в українській
      мові для порівняння.
    correct: false
    explanation: Це русизм, який псує чистоту мови.
  - statement: Конструкція «більший за Львів» є абсолютно правильною.
    correct: true
    explanation: Прийменник «за» — це стандарт для порівняння.
  - statement: Форма «найгірший» утворена від слова «добрий».
    correct: false
    explanation: «Найгірший» утворено від слова «поганий».
  title: Правда чи ні? Визначте правильність твердження про правила порівняння.
