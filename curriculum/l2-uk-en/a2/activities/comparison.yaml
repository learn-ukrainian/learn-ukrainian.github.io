- id: workbook-error-correction-agreement
  type: error-correction
  instruction: Знайдіть помилку в узгодженні прикметника й іменника за родом/числом
  items:
  - sentence: Цей нова телефон значно швидший.
    error: нова
    correction: новий
    error_type: word
    options:
    - новий
    - нове
    - нові
    explanation: Телефон — це іменник чоловічого роду, тому прикметник має закінчення
      -ий.
  - sentence: Моя старий квартира була менша.
    error: старий
    correction: стара
    error_type: word
    options:
    - стара
    - старе
    - старі
    explanation: Квартира — це іменник жіночого роду.
  - sentence: Це найкращий рішення у моєму житті.
    error: найкращий
    correction: найкраще
    error_type: word
    options:
    - найкраще
    - найкраща
    - найкращі
    explanation: Рішення — середній рід.
  - sentence: Нове ресторан має тепліший атмосферу.
    error: Нове
    correction: Новий
    error_type: word
    options:
    - Новий
    - Нова
    - Нові
    explanation: Ресторан — чоловічий рід.
  - sentence: Ця екран набагато більший.
    error: Ця
    correction: Цей
    error_type: word
    options:
    - Цей
    - Це
    - Ці
    explanation: Екран — чоловічий рід.
  - sentence: Твої комп'ютер дуже старий.
    error: Твої
    correction: Твій
    error_type: word
    options:
    - Твій
    - Твоя
    - Твоє
    explanation: Комп'ютер — чоловічий рід, однина.
