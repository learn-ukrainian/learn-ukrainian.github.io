- id: error-correction-grammar
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Цей стіл самий великий.
    error: самий великий
    correction: найбільший
    error_type: construction
    options:
    - найбільший
    - найвеликіший
    - великий
    explanation: Використовуйте префікс «най-» замість «самий».
  - sentence: Вона більш краща за мене.
    error: більш краща
    correction: краща
    error_type: construction
    options:
    - краща
    - краще
    - найкраща
    explanation: Слово «краща» вже є порівнянням.
  - sentence: Цей фільм найбільш найцікавіший.
    error: найбільш найцікавіший
    correction: найцікавіший
    error_type: construction
    options:
    - найцікавіший
    - цікавіший
    - більш цікавіший
    explanation: Не можна об'єднувати дві форми найвищого ступеня.
  - sentence: Він вищий свого друга.
    error: свого друга
    correction: за свого друга
    error_type: construction
    options:
    - за свого друга
    - ніж свого друга
    - від свого друга
    explanation: Порівняння вимагає прийменника «за» або «від».
  - sentence: Залізо міцніше міді.
    error: міді
    correction: за мідь
    error_type: construction
    options:
    - за мідь
    - міддю
    - на мідь
    explanation: Не використовуйте родовий відмінок без прийменника.
  - sentence: Це самий поганий день.
    error: самий поганий
    correction: найгірший
    error_type: construction
    options:
    - найгірший
    - найпоганіший
    - гірший
    explanation: Слово «самий» — це помилка.
  - sentence: Моя кімната більш тепліша.
    error: більш тепліша
    correction: тепліша
    error_type: construction
    options:
    - тепліша
    - тепліше
    - найтепліша
    explanation: Подвійне порівняння є помилковим.
  - sentence: Він знає самий кращий маршрут.
    error: самий кращий
    correction: найкращий
    error_type: construction
    options:
    - найкращий
    - кращий
    - найбільш кращий
    explanation: Використовуйте префікс «най-».
  title: Знайдіть і виправте помилку
- id: translate-comparisons
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: This phone is bigger.
    options:
    - text: Цей телефон більший.
      correct: true
    - text: Цей телефон самий великий.
      correct: false
    - text: Цей телефон більш більший.
      correct: false
  - source: Coffee is better than tea.
    options:
    - text: Кава краща за чай.
      correct: true
    - text: Кава краща чаю.
      correct: false
    - text: Кава більш краща ніж чай.
      correct: false
  - source: This is the best option.
    options:
    - text: Це найкращий варіант.
      correct: true
    - text: Це самий кращий варіант.
      correct: false
    - text: Це більш кращий варіант.
      correct: false
  - source: He is smaller than me.
    options:
    - text: Він менший за мене.
      correct: true
    - text: Він менший мене.
      correct: false
    - text: Він більш менший ніж я.
      correct: false
  - source: This book is much more interesting.
    options:
    - text: Ця книга набагато цікавіша.
      correct: true
    - text: Ця книга трохи цікавіша.
      correct: false
    - text: Ця книга значно цікавіший.
      correct: false
  - source: The living room table is the biggest.
    options:
    - text: Стіл у вітальні — найбільший.
      correct: true
    - text: Стіл у вітальні — самий великий.
      correct: false
    - text: Стіл у вітальні — більший.
      correct: false
  - source: My mom cooks the best borscht.
    options:
    - text: Моя мама готує найкращий борщ.
      correct: true
    - text: Моя мама готує самий кращий борщ.
      correct: false
    - text: Моя мама готує кращий борщ.
      correct: false
  - source: This was the worst day.
    options:
    - text: Це був найгірший день.
      correct: true
    - text: Це був самий гірший день.
      correct: false
    - text: Це був гірший день.
      correct: false
  title: Оберіть правильний переклад речення
