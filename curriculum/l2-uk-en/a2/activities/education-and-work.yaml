version: '1.0'
module: education-and-work
level: a2
inline:
- id: fill-in-complex-education
  type: fill-in
  instruction: Вставте правильне слово
  items:
  - sentence: Я вчуся на програміста, _____ люблю писати код.
    answer: тому що
    options:
    - тому що
    - щоб
    - якщо
  - sentence: Він багато читає, _____ успішно скласти іспит.
    answer: щоб
    options:
    - тому що
    - щоб
    - хоча
  - sentence: Університет, _____ я навчаюся, знаходиться в центрі.
    answer: де
    options:
    - який
    - де
    - яка
  - sentence: _____ я закінчу проєкт, то отримаю премію.
    answer: Якщо
    options:
    - Хоча
    - Якщо
    - Щоб
  - sentence: Це компанія, _____ виробляє комп'ютери.
    answer: яка
    options:
    - яка
    - де
    - який
  - sentence: Вона змінила роботу, _____ мати кращу зарплату.
    answer: щоб
    options:
    - тому що
    - щоб
    - якщо
  - sentence: _____ ти хочеш стати директором, треба багато працювати.
    answer: Якщо
    options:
    - Якщо
    - Тому що
    - Щоб
  - sentence: Я обрав цей факультет, _____ він дуже престижний.
    answer: тому що
    options:
    - щоб
    - якщо
    - тому що
- id: match-up-education-scenarios
  type: match-up
  instruction: З'єднайте питання з відповідями
  pairs:
  - left: Чому ти вивчаєш економіку?
    right: Тому що я люблю працювати з цифрами.
  - left: Для чого ти шукаєш нову роботу?
    right: Щоб мати вищу зарплату.
  - left: Що буде, якщо ти складеш іспит?
    right: Якщо я складу іспит, то вступлю до магістратури.
  - left: Де працює твій керівник?
    right: В офісі, який знаходиться поруч.
  - left: Яка це компанія?
    right: Це компанія, де працює мій брат.
  - left: Що ти будеш робити після бакалаврату?
    right: Я буду вчитися далі, щоб отримати диплом магістра.
  - left: Чому він змінив професію?
    right: Тому що він хотів новий досвід.
  - left: Що робити, якщо не подобається спеціальність?
    right: Якщо тобі не подобається спеціальність, зміни її зараз.
