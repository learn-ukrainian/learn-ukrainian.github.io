- id: true-false-structure-culture
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Бакалаврат — це базова вища освіта, яку студенти отримують за чотири
      роки.
    correct: true
    explanation: Правильна інформація і правильне використання слова «яку».
  - statement: Студенти вступають до магістратури, тому що не отримати диплом.
    correct: false
    explanation: Ми кажемо «щоб отримати диплом» (мета).
  - statement: Якщо студент успішно складає іспит, то він може вчитися далі.
    correct: true
    explanation: Правильне використання умови «якщо..., то...».
  - statement: Багато студентів шукають роботу на частковий робочий день, щоб мати
      власні гроші.
    correct: true
    explanation: Правильне використання «щоб» для позначення мети.
  - statement: Люди змінюють роботу, тому що щоб мати меншу зарплату.
    correct: false
    explanation: Не можна використовувати два сполучники підряд («тому що щоб»). І
      зазвичай люди шукають вищу зарплату.
  - statement: Співбесіда — це зустріч, де ви розмовляєте з керівником про нову посаду.
    correct: true
    explanation: Правильне використання слова «де» для місця/ситуації.
  - statement: Хоча робота на повний день забирає багато часу, вона дає корисний досвід.
    correct: true
    explanation: Правильне використання «хоча» для протиставлення.
  - statement: Якщо ти працюєш вчителем, щоб тобі потрібна вища освіта.
    correct: false
    explanation: 'Правильно: «Якщо ти працюєш вчителем, то тобі потрібна вища освіта»
      (умова і наслідок).'
workbook:
- id: workbook-fill-in-adjectives
  type: fill-in
  instruction: Вставте правильну форму
  items:
  - sentence: Я навчаюся на _____ факультеті.
    answer: гуманітарному
    options:
    - гуманітарна
    - гуманітарному
    - гуманітарний
  - sentence: Вона отримала _____ освіту в Києві.
    answer: вищу
    options:
    - вищий
    - вищу
    - вища
  - sentence: Мій брат шукає _____ роботу.
    answer: нову
    options:
    - новий
    - нова
    - нову
  - sentence: Це дуже _____ спеціальність.
    answer: престижна
    options:
    - престижна
    - престижний
    - престижне
  - sentence: Ми вчора склали _____ іспит.
    answer: складний
    options:
    - складна
    - складну
    - складний
  - sentence: Наш _____ колектив дуже дружній.
    answer: великий
    options:
    - велика
    - велику
    - великий
- id: workbook-error-correction-adjectives
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні
  items:
  - sentence: Вона має новий роботу.
    error: новий
    correction: нову
    error_type: word
    options:
    - нову
    - нові
    - нове
    explanation: Слово «робота» (job) жіночого роду в знахідному відмінку.
  - sentence: Я вступив на престижна університет.
    error: престижна
    correction: престижний
    error_type: word
    options:
    - престижний
    - престижні
    - престижне
    explanation: Слово «університет» (university) чоловічого роду.
  - sentence: Мій керівник має велика досвід.
    error: велика
    correction: великий
    error_type: word
    options:
    - великий
    - великі
    - велику
    explanation: Слово «досвід» (experience) чоловічого роду.
  - sentence: Це дуже успішний фірма.
    error: успішний
    correction: успішна
    error_type: word
    options:
    - успішна
    - успішне
    - успішні
    explanation: Слово «фірма» (firm) жіночого роду.
  - sentence: Студенти складають складну іспит.
    error: складну
    correction: складний
    error_type: word
    options:
    - складний
    - складні
    - складне
    explanation: Слово «іспит» (exam) чоловічого роду.
  - sentence: У мене дуже зручна графік.
    error: зручна
    correction: зручний
    error_type: word
    options:
    - зручний
    - зручні
    - зручне
    explanation: Слово «графік» (schedule) чоловічого роду.
