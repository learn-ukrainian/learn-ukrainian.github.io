- id: true-false-culture-complex
  type: true-false
  instruction: Правда чи ні? Оцініть твердження про освіту та роботу.
  items:
  - statement: 'Ми використовуємо «тому що», коли говоримо про мету (наприклад: «я
      вчуся, тому що отримати диплом»).'
    correct: false
    explanation: 'Мету виражає сполучник «щоб». Правильно: «я вчуся, щоб отримати
      диплом».'
  - statement: В українській мові ми кажемо «навчатися на юриста», а не «вчуся для
      юриста».
    correct: true
    explanation: Правильно використовувати прийменник «на» + знахідний відмінок.
  - statement: 'Слово «де» допомагає описати місце, наприклад: «Університет, де я
      навчався».'
    correct: true
    explanation: «Де» чітко вказує на місцезнаходження будівлі або локації.
  - statement: 'Професії завжди використовуються у називному відмінку після дієслова
      «працювати» (наприклад: «Він працює лікар»).'
    correct: false
    explanation: 'Потрібно використовувати орудний відмінок (ким?): «працює лікарем».'
  - statement: Якщо ми пояснюємо причину нашого рішення, ми використовуємо сполучник
      «щоб».
    correct: false
    explanation: Причину пояснює сполучник «тому що».
  - statement: Українці кажуть «скласти іспит», а не «зробити іспит».
    correct: true
    explanation: «Скласти іспит» — це правильна стала фраза.
  - statement: Слово «який» узгоджується в роді та числі з іменником, який воно описує.
    correct: true
    explanation: 'Наприклад: «проєкт, який...», «компанія, яка...».'
  - statement: Після слова «щоб» зазвичай використовується інфінітив.
    correct: true
    explanation: 'Наприклад: «щоб знайти», «щоб стати».'
- id: match-up-match-education-career-situations-to-appropriate-responses-using-complex-sentences
  type: match-up
  instruction: З'єднайте частини складних речень про кар'єру та майбутнє.
  pairs:
  - left: Якщо я добре складу іспит,
    right: то вступлю до магістратури.
  - left: Якщо ти хочеш мати високу зарплату,
    right: розвивай свої навички щодня.
  - left: Якщо тобі не подобається нинішня посада,
    right: шукай іншу компанію.
  - left: Хоча я ще студент,
    right: я вже працюю на частковий робочий день.
  - left: Хоча вступний іспит був складним,
    right: більшість студентів отримали хороші оцінки.
  - left: Мені потрібен досвід,
    right: щоб стати справжнім професіоналом.
  - left: Я планую піти на співбесіду у компанію,
    right: яка має міжнародних клієнтів.
  - left: Якщо фірма запропонує мені роботу,
    right: я обов'язково погоджуся.
