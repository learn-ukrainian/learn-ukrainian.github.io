- id: wb-error-correction-professions
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку (професії та університет).
  items:
  - sentence: Він працює лікар.
    error: лікар
    correction: лікарем
    error_type: word
    options:
    - лікарем
    - лікаря
    - лікарю
    explanation: Після дієслова «працювати» професія завжди стоїть в орудному відмінку
      (ким?).
  - sentence: Я вчуся для юриста.
    error: для
    correction: на
    error_type: word
    options:
    - на
    - до
    - в
    explanation: Українською ми кажемо «навчатися на» + знахідний відмінок.
  - sentence: Вона вступила в університет.
    error: в
    correction: до
    error_type: word
    options:
    - до
    - на
    - за
    explanation: Ми завжди кажемо «вступати до».
  - sentence: Я закінчив з університету.
    error: з університету
    correction: університет
    error_type: phrase
    options:
    - університет
    - до університету
    - в університеті
    explanation: Дієслово «закінчити» вимагає прямого додатка у знахідному відмінку
      без прийменника.
  - sentence: Мій брат працює інженер.
    error: інженер
    correction: інженером
    error_type: word
    options:
    - інженером
    - інженера
    - інженеру
    explanation: Професія після «працювати» має бути в орудному відмінку (ким?).
  - sentence: Сестра навчається на програміст.
    error: програміст
    correction: програміста
    error_type: word
    options:
    - програміста
    - програмістом
    - програмісту
    explanation: Конструкція «навчатися на» вимагає знахідного відмінка.
  - sentence: Я працюю економіст.
    error: економіст
    correction: економістом
    error_type: word
    options:
    - економістом
    - економіста
    - економісту
    explanation: Орудний відмінок для професій після дієслова «працювати».
  - sentence: Ми успішно склали іспитом.
    error: іспитом
    correction: іспит
    error_type: word
    options:
    - іспит
    - іспиту
    - іспиті
    explanation: Ми кажемо «скласти» (що?) «іспит» (знахідний відмінок).
