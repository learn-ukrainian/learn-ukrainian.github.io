  instruction: З'єднайте відповідні елементи.
- type: fill-in
  title: Доповніть повідомлення
  items:
  - sentence: Я зараз на вулиці і не можу писати. Можна я запишу ____?
    answer: голосове
    options:
    - голосове
    - текст
    - відео
    - стікер
  - sentence: ____ мені той цікавий файл, бдлск.
    answer: Скинь
    options:
    - Скинь
    - Напиши
    - Прочитай
    - Зроби
  - sentence: Я вже успішно ____ твоє повідомлення.
    answer: отримав
    options:
    - отримав
    - написав
    - скинув
    - відправив
  - sentence: Вона дуже смішно відповіла і кинула новий ____.
    answer: стікер
    options:
    - стікер
    - чат
    - текст
    - телефон
  - sentence: Прив! Як твої справи сьогодні? — Все ____, працюю.
    answer: норм
    options:
    - норм
    - круто
    - погано
    - супер
  - sentence: Я обов"язково ____ тобі завтра вранці.
    answer: напишу
    options:
    - напишу
    - прочитаю
    - видалю
    - отримаю
  - sentence: Олено, велике ____ за твою допомогу!
    answer: дяк
    options:
    - дяк
    - прив
    - норм
    - бдлск
  - sentence: Чи ви можете ____ мені звіт на робочу пошту?
    answer: надіслати
    options:
    - надіслати
    - скинути
    - кинути
    - зробити
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: cloze
  title: Заповніть пропуски в діалозі
  passage: — {{1}}! Ти вже бачив мій новий проект? — Привіт! Так, подивився. Я зараз
