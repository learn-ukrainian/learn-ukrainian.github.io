    - text: прив
      correct: true
    - text: спс
      correct: false
    - text: дяк
      correct: true
    - text: бдлск
      correct: true
    - text: хорош
      correct: false
    explanation: Українці активно використовують прив, дяк та бдлск.
  - question: Які імена написані у правильному Кличному відмінку? Оберіть усі правильні.
    min_correct: 3
    options:
