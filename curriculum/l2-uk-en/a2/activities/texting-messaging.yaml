  - words:
    - Вона
    - завжди
    - швидко
    - читає
    - повідомлення
    answer: Вона завжди швидко читає повідомлення
  - words:
    - Будь
    - ласка
    - надішліть
    - фотографії
    - сьогодні
    answer: Будь ласка надішліть фотографії сьогодні
  - words:
    - Він
    - видалив
    - той
    - старий
    - чат
    answer: Він видалив той старий чат
  instruction: Розташуйте слова у правильному порядку.
- type: true-false
  title: Правила цифрового етикету
  items:
  - statement: В Україні завжди краще дзвонити без попередження, ніж писати повідомлення.
    correct: false
    explanation: Правило Краще напиши є дуже популярним. Раптові дзвінки можуть турбувати.
  - statement: Голосові повідомлення не варто надсилати у важливі робочі чати.
    correct: true
    explanation: Робоча інформація має бути текстовою для швидкого та зручного пошуку.
  - statement: Слово прив можна сміливо писати своєму викладачу або керівнику.
    correct: false
    explanation: Це скорочення використовується тільки для найближчих друзів.
  - statement: У неформальних чатах часто не використовують великі літери та крапки.
    correct: true
    explanation: Швидкість друкування часто перемагає формальні правила пунктуації.
  - statement: Кличний відмінок є необов"язковим у швидких повідомленнях.
    correct: false
    explanation: Кличний відмінок (Андрію, Олено) є обов"язковим навіть у дуже коротких
      чатах.
  - statement: Слово скинути є формальним синонімом до дієслова надіслати.
    correct: false
    explanation: Скинути — це дуже неформальне розмовне слово.
  - statement: Слово норм означає стабільність, а не фантастичний настрій.
    correct: true
    explanation: Норм — це популярна відповідь, яка означає, що все спокійно і під
      контролем.
  - statement: Telegram використовується в Україні тільки для дружнього спілкування.
    correct: false
    explanation: Він є головним джерелом новин та ідеальним інструментом для бізнесу.
  instruction: Визначте, чи твердження правильне.
- type: group-sort
  title: Офіційне чи неофіційне спілкування?
  groups:
  - name: Неформальний чат (друзі)
    items:
    - прив
    - дяк
    - скинути файл
    - кинути стікер
    - норм
  - name: Формальний чат (робота)
    items:
    - доброго дня
    - надіслати документ
    - отримати звіт
    - будь ласка
  instruction: Розподіліть елементи за групами.
- type: quiz
  title: Перевірте знання
  items:
  - question: Що означає золоте правило української цифрової комунікації?
    explanation: Сучасний етикет диктує спочатку писати повідомлення, щоб не турбувати
      людину.
    options:
    - text: Краще напиши
      correct: true
    - text: Краще подзвони
      correct: false
    - text: Ніколи не пиши
      correct: false
    - text: Пиши довгі листи
      correct: false
  - question: Яке слово використовують українці замість російського сленгу спс?
    explanation: Українці використовують коротке та стильне слово дяк.
    options:
    - text: дяк
      correct: true
    - text: будь ласка
      correct: false
    - text: прив
      correct: false
    - text: норм
      correct: false
  - question: Яке правильне закінчення для імені Максим у Кличному відмінку?
    explanation: Чоловічі імена на твердий приголосний мають закінчення -е.
    options:
    - text: Максиме
      correct: true
    - text: Максиму
      correct: false
    - text: Максимо
      correct: false
    - text: Максимі
      correct: false
  - question: Який додаток є найпопулярнішим джерелом новин в Україні?
    explanation: Telegram є основною платформою для новин, роботи та спілкування.
    options:
    - text: Telegram
      correct: true
    - text: Viber
      correct: false
    - text: WhatsApp
      correct: false
    - text: Signal
      correct: false
  - question: Що ми зазвичай робимо з цікавою новиною в чаті?
    explanation: Цікаві новини та повідомлення часто пересилають іншим.
    options:
    - text: пересилаємо друзям
      correct: true
    - text: видаляємо назавжди
      correct: false
    - text: ніколи не читаємо
      correct: false
    - text: архівуємо групу
      correct: false
  - question: Яке дієслово використовують друзі для обміну файлами?
    explanation: Дієслово скинути є дуже розмовним і неформальним.
    options:
    - text: скинути
      correct: true
    - text: надіслати
      correct: false
    - text: отримати
      correct: false
    - text: видалити
      correct: false
  - question: Що таке телефонофобія в сучасному цифровому світі?
    explanation: Це страх або дискомфорт перед несподіваними телефонними дзвінками.
    options:
    - text: страх перед дзвінками
      correct: true
    - text: любов до телефонів
      correct: false
    - text: бажання писати тексти
      correct: false
    - text: залежність від інтернету
      correct: false
  - question: Як розшифровується популярне скорочення бдлск?
    explanation: Це швидке написання ввічливої фрази будь ласка.
    options:
    - text: будь ласка
      correct: true
    - text: дуже добре
      correct: false
    - text: будемо бачитися
      correct: false
    - text: бажаю щастя
      correct: false
  instruction: Оберіть правильну відповідь.
- type: select
  title: Оберіть правильні відповіді
  items:
  - question: Які слова є популярними українськими цифровими скороченнями? Оберіть
      усі правильні.
    min_correct: 3
