  instruction: Заповніть пропуски, обравши правильні слова.
- type: error-correction
  title: Виправте помилки в чаті
  items:
  - sentence: Привіт, Антон! Як твої справи?
    error: Антон
    answer: Антоне
    options:
    - Антоне
    - Антону
    - Антоном
    - Антона
    explanation: Звертання завжди потребує Кличного відмінка.
  - sentence: Я отримав твій файл, велике спс!
    error: спс
    answer: дяк
    options:
    - дяк
    - норм
    - прив
    - бдлск
    explanation: Спс — це російський сленг. Українці пишуть дяк або дякую.
  - sentence: Олена, скинь мені фотографію, бдлск.
    error: Олена
    answer: Олено
    options:
    - Олено
    - Олені
    - Олену
    - Оленою
    explanation: Жіночі імена на -а у Кличному відмінку мають закінчення -о.
  - sentence: Привіт, Марія! Ти маєш вільний час?
    error: Марія
    answer: Маріє
    options:
    - Маріє
    - Марію
    - Марії
    - Марією
    explanation: Жіночі імена на -я у Кличному відмінку мають закінчення -є або -ю.
  - sentence: Андрій, ти сьогодні йдеш у кіно?
    error: Андрій
    answer: Андрію
    options:
    - Андрію
    - Андріє
    - Андрієм
    - Андрія
    explanation: Чоловічі імена на -й у Кличному відмінку мають закінчення -ю.
  - sentence: Директор, я скину вам звіт завтра.
    error: скину
    answer: надішлю
    options:
    - надішлю
    - кину
    - отримаю
    - перешлю
    explanation: У формальному спілкуванні використовуємо слово надіслати, а не скинути.
  instruction: Знайдіть і виправте помилку в реченні.
- type: unjumble
  title: Складіть речення
  items:
