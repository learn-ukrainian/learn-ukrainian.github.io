    - прочитаю
    - видалю
  - id: 6
    answer: дяк
    options:
    - дяк
    - прив
    - норм
    - бдлск
  - id: 7
    answer: чат
    options:
    - чат
    - стікер
    - смайлик
    - телефон
  - id: 8
    answer: надіслати
    options:
    - надіслати
    - отримати
    - видалити
    - прочитати
  - id: 9
    answer: отримав
    options:
