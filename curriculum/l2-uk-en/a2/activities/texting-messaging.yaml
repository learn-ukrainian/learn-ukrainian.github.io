      correct: true
    - text: отримати
      correct: true
    - text: видалити
      correct: true
    - text: переслати
      correct: true
    - text: випити
      correct: false
    explanation: Ми можемо надіслати, отримати, видалити або переслати повідомлення.
  - question: Що найчастіше надсилають у неформальних дружніх чатах? Оберіть усі правильні.
    min_correct: 3
    options:
    - text: стікери
      correct: true
    - text: голосові повідомлення
      correct: true
    - text: смайлики
      correct: true
    - text: офіційні звіти
      correct: false
    - text: ділові листи
      correct: false
    explanation: Неформальний чат завжди повний емоцій та медіа.
  - question: Які з цих слів означають позитивну реакцію? Оберіть усі правильні.
    min_correct: 3
    options:
    - text: прикольно
      correct: true
    - text: круто
      correct: true
    - text: супер
      correct: true
    - text: погано
      correct: false
    - text: жахливо
      correct: false
    explanation: Слова прикольно, круто та супер показують захоплення.
  - question: У яких ситуаціях дзвінок без повідомлення є прийнятним? Оберіть усі
      правильні.
    min_correct: 2
    options:
    - text: термінова критична ситуація
      correct: true
    - text: дзвінок найближчим родичам
      correct: true
    - text: ділова розмова з новим клієнтом
      correct: false
    - text: бажання просто поговорити з колегою
      correct: false
    - text: перший контакт із керівником
      correct: false
    explanation: Дзвонити без попередження можна тільки у надзвичайних випадках або
      близьким родичам.
  instruction: Оберіть усі правильні відповіді.
- type: mark-the-words
  title: Знайдіть сленг та скорочення
  instruction: Знайдіть і позначте всі неофіційні скорочення та сленгові слова в тексті.
  text: Прив Олено! Я подивився. Проект норм і це круто. Дяк за роботу! Скинь фінальний
    файл бдлск.
  answers:
  - Прив
  - норм
  - круто
  - Дяк
  - Скинь
  - бдлск
- type: translate
  title: Перекладіть фрази
