    зустрічаємося? — Давай о вісімнадцятій. Я створю новий {{7}} для нашої групи.
    — Домовилися. Можеш ще {{8}} мені фотографію розкладу? — Вже надіслав. Ти {{9}}
    файл? — Так, щойно. До зустрічі! (кидає {{10}} з псом Патроном)
