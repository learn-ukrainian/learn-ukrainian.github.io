- id: match-up-dative-cases
  type: match-up
  instruction: З'єднайте називний відмінок із формою давального
  pairs:
  - left: сестра
    right: сестрі
  - left: брат
    right: братові
  - left: подруга
    right: подрузі
  - left: немовля
    right: немовляті
  - left: слово
    right: слову
  - left: мати
    right: матері
  - left: товариш
    right: товаришеві
