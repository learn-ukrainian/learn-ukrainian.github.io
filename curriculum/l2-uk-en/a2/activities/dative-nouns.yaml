- id: tf-dative-rules
  type: true-false
  instruction: Правда чи ні? Оцініть граматичні правила
  items:
  - statement: Слова чоловічого роду в давальному відмінку можуть мати паралельні
      закінчення (-ові/-еві або -у/-ю).
    correct: true
    explanation: Українська мова дозволяє обидва варіанти, наприклад, 'братові' та
      'брату'.
  - statement: Якщо іменник закінчується на 'г', 'к', 'х', перед закінченням '-і'
      вони змінюються на 'з', 'ц', 'с'.
    correct: true
    explanation: 'Це обов''язкове чергування приголосних, наприклад: подруга -> подрузі.'
  - statement: Слово 'книга' у давальному відмінку буде 'книгі'.
    correct: false
    explanation: За правилом чергування 'г' змінюється на 'з', тому правильно 'книзі'.
  - statement: Іменники середнього роду на позначення малят (немовля, курча) у давальному
      відмінку мають суфікс '-ат-' або '-ят-' (немовляті).
    correct: true
    explanation: Ці слова приймають спеціальний суфікс перед закінченням '-і'.
  - statement: Слово 'батько' у давальному відмінку має форму 'батьку', але ніколи
      не 'батькові'.
    correct: false
    explanation: 'Слова на -о (батько, тато) надійно приймають закінчення ''-ові'':
      батькові.'
  - statement: Якщо в реченні є два іменники чоловічого роду підряд (наприклад, пан
      директор), краще використовувати однакові закінчення (панові директорові).
    correct: false
    explanation: 'Щоб уникнути монотонності, українці чергують закінчення: панові
      директору.'
  - statement: Давальний відмінок відповідає на питання 'кого? що?'.
    correct: false
    explanation: Давальний відмінок відповідає на питання 'кому? чому?'.
  - statement: Для вираження віку людини (наприклад, 'Йому 20 років') використовується
      давальний відмінок.
    correct: true
    explanation: Особа, що відчуває стан або має певний вік, ставиться у давальному
      відмінку.
