- id: odd-one-out-dative
  type: odd-one-out
  instruction: Оберіть зайве слово за граматичною ознакою
  items:
  - words:
    - братові
    - синові
    - сестрі
    - другові
    correct: 2
    explanation: «Сестрі» — це жіночий рід, інші слова — чоловічого роду.
  - words:
    - подрузі
    - руці
    - книзі
    - мамі
    correct: 3
    explanation: У слові «мамі» немає чергування приголосних, тоді як інші мають чергування
      (г->з, к->ц).
  - words:
    - студентові
    - братові
    - татові
    - лікареві
    correct: 3
    explanation: «Лікареві» має закінчення -еві (м'яка група), інші слова мають -ові
      (тверда група).
  - words:
    - місту
    - слову
    - морю
    - брату
    correct: 3
    explanation: «Брату» — це іменник чоловічого роду, інші слова — середнього.
  - words:
    - немовляті
    - курчаті
    - хлопцеві
    - імені
    correct: 2
    explanation: «Хлопцеві» — це чоловічий рід, інші слова — середній рід.
  - words:
    - ночі
    - любові
    - радості
    - книзі
    correct: 3
    explanation: «Книзі» — від слова «книга» (перша відміна), інші слова в називному
      відмінку закінчуються на приголосний (третя відміна).
  - words:
    - подрузі
    - мусі
    - доріжці
    - сестрі
    correct: 3
    explanation: «Сестрі» не має чергування, тоді як в інших є чергування г/х/к ->
      з/с/ц.
  - words:
    - вчителеві
    - лікареві
    - братові
    - видавцеві
    correct: 2
    explanation: «Братові» має закінчення -ові, а інші слова закінчуються на -еві.
