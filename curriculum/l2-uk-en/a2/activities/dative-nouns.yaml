workbook:
- id: err-corr-dative-forms
  type: error-correction
  instruction: Знайдіть і виправте помилку в давальному відмінку
  items:
  - sentence: Я даю книгу студент.
    error: студент
    correction: студентові
    error_type: word
    options:
    - студентові
    - студента
    - студентом
    - студенти
    explanation: Слово 'студент' має стояти в давальному відмінку (кому?).
  - sentence: Він хоче відповісти подругі.
    error: подругі
    correction: подрузі
    error_type: word
    options:
    - подрузі
    - подругу
    - подружі
    - подругою
    explanation: Перед закінченням -і літера 'г' змінюється на 'з' (подруга -> подрузі).
  - sentence: Ми маємо допомогти Андрій.
    error: Андрій
    correction: Андрієві
    error_type: word
    options:
    - Андрієві
    - Андрія
    - Андрієм
    - Андрії
    explanation: Слово 'Андрій' має стояти в давальному відмінку.
  - sentence: Вона вирішила показати фотографії своїй мати.
    error: мати
    correction: матері
    error_type: word
    options:
    - матері
    - матір
    - мамою
    - маму
    explanation: Іменник третьої відміни 'мати' у давальному відмінку має форму 'матері'.
  - sentence: Дідусь дуже подобається ця пісня.
    error: Дідусь
    correction: Дідусеві
    error_type: word
    options:
    - Дідусеві
    - Дідуся
    - Дідусем
    - Дідусі
    explanation: Особа, якій щось подобається, ставиться у давальному відмінку.
  - sentence: Студент треба написати текст.
    error: Студент
    correction: Студентові
    error_type: word
    options:
    - Студентові
    - Студента
    - Студентом
    - Студенти
    explanation: У безособових конструкціях (з 'треба') використовується давальний
      відмінок.
  - sentence: Вона завжди допомагає сестра.
    error: сестра
    correction: сестрі
    error_type: word
    options:
    - сестрі
    - сестру
    - сестрою
    - сестри
    explanation: Дієслово 'допомагати' вимагає давального відмінка.
  - sentence: Мати дає тепле молоко немовля.
    error: немовля
    correction: немовляті
    error_type: word
    options:
    - немовляті
    - немовлят
    - немовлям
    - немовляти
    explanation: Слова на позначення малят у давальному відмінку мають суфікс -ат-
      або -ят-.
