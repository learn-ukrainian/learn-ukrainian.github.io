    answer: студентові
    options:
    - студентові
    - студентом
    - студент
    - студента
  - sentence: Ми хочемо розповісти історію ____.
    answer: братові
    options:
    - братові
    - братом
    - брат
    - брата
  - sentence: Вона хоче відповісти ____.
    answer: вчителеві
    options:
    - вчителеві
    - вчителем
    - вчитель
    - вчителі
  - sentence: Треба допомогти ____.
