- id: translate-dative
  type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: He gives me a book.
    options:
    - text: Він дає мені книгу.
      correct: true
    - text: Він дає мене книгу.
      correct: false
  - source: We are telling you (informal) the truth.
    options:
    - text: Ми кажемо тобі правду.
      correct: true
    - text: Ми кажемо тебе правду.
      correct: false
  - source: It is cold for her.
    options:
    - text: Їй холодно.
      correct: true
    - text: Вона холодно.
      correct: false
  - source: They need to buy tickets.
    options:
    - text: Їм потрібно купити квитки.
      correct: true
    - text: Вони потрібно купити квитки.
      correct: false
  - source: I am showing him a photo.
    options:
    - text: Я показую йому фото.
      correct: true
    - text: Я показую його фото.
      correct: false
  - source: It is interesting for us to read.
    options:
    - text: Нам цікаво читати.
      correct: true
    - text: Ми цікаво читати.
      correct: false
  - source: Are you (plural) bored?
    options:
    - text: Вам нудно?
      correct: true
    - text: Ви нудно?
      correct: false
  - source: She helps them.
    options:
    - text: Вона допомагає їм.
      correct: true
    - text: Вона допомагає їх.
      correct: false
