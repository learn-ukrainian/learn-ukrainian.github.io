    right: мені приємно
  - left: Він сидить вдома сам.
    right: йому нудно
  - left: Вона грає з маленьким собакою.
    right: їй весело
  - left: Ти стоїш на вулиці взимку.
    right: тобі холодно
  - left: Вони працюють без нового комп'ютера.
