version: '1.0'
module: dative-pronouns
level: a2
inline:
- id: match-up-match-nominative-pronoun-to-its-dative-form
  type: match-up
  instruction: З'єднайте називний відмінок займенника з його давальним відмінком
  pairs:
  - left: я
    right: мені
  - left: ти
    right: тобі
  - left: він
    right: йому
  - left: вона
    right: їй
  - left: воно
    right: йому
  - left: ми
    right: нам
  - left: ви
    right: вам
  - left: вони
    right: їм
- id: fill-in-dative-pronouns
  type: fill-in
  instruction: Вставте правильний займенник
  items:
  - sentence: Я маю великий секрет. Я скажу _____ цей секрет.
    answer: йому
    options:
    - він
    - його
    - йому
  - sentence: Вчитель добре пояснює _____ нове правило.
    answer: нам
    options:
    - ми
    - нас
    - нам
  - sentence: Мама купує _____ смачний торт.
    answer: мені
    options:
    - я
    - мене
    - мені
  - sentence: Ми даруємо _____ красиві весняні квіти.
    answer: їй
    options:
    - вона
    - її
    - їй
  - sentence: Я щиро дякую _____ за вашу допомогу.
    answer: вам
    options:
    - ви
    - вас
    - вам
  - sentence: Чи можу я _____ допомогти сьогодні?
    answer: тобі
    options:
    - ти
    - тебе
    - тобі
  - sentence: Нам потрібно _____ швидко зателефонувати.
    answer: їм
    options:
    - вони
    - їх
    - їм
  - sentence: Я даю _____ синю ручку.
    answer: йому
    options:
    - він
    - його
    - йому
- id: true-false-impersonal
  type: true-false
  instruction: Правда чи ні? Оцініть безособові конструкції
  items:
  - statement: Я треба йти додому негайно.
    correct: false
    explanation: 'Для слова ''треба'' використовуємо давальний відмінок: Мені треба.'
  - statement: Взимку мені завжди дуже холодно.
    correct: true
    explanation: Правильно. Безособова конструкція з давальним відмінком.
  - statement: Вона сумно без друзів.
    correct: false
    explanation: 'Для безособового стану потрібен давальний відмінок: Їй сумно.'
  - statement: Йому цікаво читати цю нову книгу.
    correct: true
    explanation: Правильно. 'Йому цікаво' — це стан.
  - statement: Ми страшно дивитися цей новий фільм.
    correct: false
    explanation: 'Потрібен давальний відмінок для стану: Нам страшно.'
  - statement: Вам зручно сидіти на цьому старому кріслі?
    correct: true
    explanation: Правильно. Фізичний стан передається через давальний відмінок.
  - statement: Їм нудно сидіти вдома цілий день.
    correct: true
    explanation: Правильна безособова конструкція.
  - statement: Ти потрібно купити новий мобільний телефон.
    correct: false
    explanation: 'Після ''потрібно'' особа має бути в давальному відмінку: Тобі потрібно.'
- id: quiz-case-choice
  type: quiz
  instruction: Оберіть правильний відмінок займенника (Давальний чи Знахідний)
  items:
  - question: Я бачу _____ щодня.
    options:
    - тебе
    - тобі
    - ти
    - тобою
    correct: 0
  - question: Я кажу _____ правду.
    options:
    - тебе
    - тобі
    - ти
    - тобою
    correct: 1
  - question: Він добре знає _____.
    options:
    - їй
    - її
    - вона
    - нею
    correct: 1
  - question: Він часто дзвонить _____.
    options:
    - їй
    - її
    - вона
    - нею
    correct: 0
  - question: Ми слухаємо _____ уважно.
    options:
    - вам
    - вас
    - ви
    - вами
    correct: 1
  - question: Ми даємо _____ роботу.
    options:
    - вам
    - вас
    - ви
    - вами
    correct: 0
  - question: Я завжди допомагаю _____.
    options:
    - сестру
    - сестрі
    - сестра
    - сестрою
    correct: 1
  - question: Брат постійно заважає _____.
    options:
    - мене
    - мені
    - я
    - мною
    correct: 1
workbook:
- id: group-sort-dative-accusative
  type: group-sort
  instruction: Розподіліть форми займенників
  groups:
  - label: Давальний відмінок (Кому?)
    items:
    - мені
    - тобі
    - йому
    - їй
    - нам
    - вам
    - їм
  - label: Знахідний відмінок (Кого?)
    items:
    - мене
    - тебе
    - його
    - її
    - нас
    - вас
    - їх
- id: error-correction-dative-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Мені потрібна новий мобільний телефон.
    error: потрібна
    correction: потрібен
    error_type: word
    options:
    - потрібен
    - потрібне
    - потрібні
    explanation: Слово 'телефон' — чоловічого роду, тому має бути 'потрібен'.
  - sentence: Я цікаво читати цю нову книгу.
    error: Я
    correction: Мені
    error_type: word
    options:
    - Мені
    - Мене
    - Мною
    explanation: Для безособових станів ('цікаво') використовуємо давальний відмінок.
  - sentence: Ми хочемо подякувати вас за допомогу.
    error: вас
    correction: вам
    error_type: word
    options:
    - вам
    - ви
    - вами
    explanation: Дієслово 'дякувати' вимагає давального відмінка (кому?).
  - sentence: Вона дуже холодно взимку.
    error: Вона
    correction: Їй
    error_type: word
    options:
    - Їй
    - Її
    - Нею
    explanation: Фізичний стан ('холодно') передається через давальний відмінок.
  - sentence: Ми треба йти додому негайно.
    error: Ми
    correction: Нам
    error_type: word
    options:
    - Нам
    - Нас
    - Нами
    explanation: Після 'треба' логічний суб'єкт ставиться в давальному відмінку (кому
      треба?).
  - sentence: Брат постійно заважає мене працювати.
    error: мене
    correction: мені
    error_type: word
    options:
    - мені
    - я
    - мною
    explanation: Дієслово 'заважати' вимагає давального відмінка.
- id: fill-in-dative-verbs
  type: fill-in
  instruction: Оберіть правильний відмінок займенника після дієслова
  items:
  - sentence: Я хочу щиро подякувати _____ за подарунок.
    answer: їм
    options:
    - їм
    - їх
  - sentence: Брат постійно заважає _____ працювати.
    answer: мені
    options:
    - мене
    - мені
  - sentence: Вона із радістю допомагає _____ робити завдання.
    answer: нам
    options:
    - нам
    - нас
  - sentence: Я чудово знаю _____.
    answer: її
    options:
    - їй
    - її
  - sentence: Ми часто дзвонимо _____.
    answer: вам
    options:
    - вам
    - вас
  - sentence: Він часто заважає _____ спати.
    answer: йому
    options:
    - йому
    - його
  - sentence: Ти допомагаєш _____ читати?
    answer: їй
    options:
    - їй
    - її
  - sentence: Ми бачимо _____ щодня.
    answer: їх
    options:
    - їм
    - їх
- id: unjumble-dative-sentences
