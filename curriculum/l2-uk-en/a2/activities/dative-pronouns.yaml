- id: error-correction-impersonal
  type: error-correction
  instruction: Знайдіть і виправте помилку в безособовому реченні.
  items:
  - sentence: Я холодно стояти на вулиці.
    error: Я
    correction: Мені
    error_type: word
    options:
    - Мені
    - Мене
    - Мною
    explanation: Для фізичного стану використовуємо давальний відмінок «мені».
  - sentence: Ти цікаво читати цю нову книгу?
    error: Ти
    correction: Тобі
    error_type: word
    options:
    - Тобі
    - Тебе
    - Тобою
    explanation: У безособовому реченні потрібен давальний відмінок «тобі».
  - sentence: Він сумно, бо йде сильний дощ.
    error: Він
    correction: Йому
    error_type: word
    options:
    - Йому
    - Його
    - Ним
    explanation: Стан передається через давальний відмінок «йому».
  - sentence: Вона дуже важко працювати сьогодні.
    error: Вона
    correction: Їй
    error_type: word
    options:
    - Їй
    - Її
    - Нею
    explanation: Використовуємо давальний відмінок «їй» для стану.
  - sentence: Ми потрібно купити квитки на потяг.
    error: Ми
    correction: Нам
    error_type: word
    options:
    - Нам
    - Нас
    - Нами
    explanation: Слово «потрібно» вимагає давального відмінка «нам».
  - sentence: Ви приємно бачити всіх нас тут.
    error: Ви
    correction: Вам
    error_type: word
    options:
    - Вам
    - Вас
    - Вами
    explanation: У безособовій конструкції потрібен давальний відмінок «вам».
  - sentence: Вони весело грати разом у парку.
    error: Вони
    correction: Їм
    error_type: word
    options:
    - Їм
    - Їх
    - Ними
    explanation: Стан «весело» стосується осіб у давальному відмінку «їм».
  - sentence: Я потрібно закінчити цю роботу до вечора.
    error: Я
    correction: Мені
    error_type: word
    options:
    - Мені
    - Мене
    - Мною
    explanation: Слово «потрібно» вимагає давального відмінка.
