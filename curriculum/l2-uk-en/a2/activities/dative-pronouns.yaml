  - question: Він дуже добре знає ____.
    options:
    - її
    - їй
    - вона
    - неї
    correct: 0
  - question: Він дзвонить ____ кожного вечора.
    options:
    - її
    - їй
    - вона
    - неї
    correct: 1
  - question: Вони чують ____.
    options:
    - нас
    - нам
    - ми
    - нами
    correct: 0
  - question: Вони допомагають ____.
    options:
    - нас
    - нам
    - ми
    - нами
    correct: 1
  - question: Ми розуміємо ____.
    options:
    - вас
    - вам
    - ви
    - вами
    correct: 0
  - question: Ми дякуємо ____ за допомогу.
    options:
    - вас
    - вам
    - ви
    - вами
    correct: 1
workbook:
- id: cloze-impersonal
  type: fill-in
  instruction: Вставте правильне слово-стан.
  items:
  - sentence: На вулиці зима, мені дуже ____.
    answer: холодно
    options:
    - холодно
    - тепло
    - весело
  - sentence: У мене немає машини, мені ____ купити квитки на потяг.
    answer: потрібно
    options:
    - потрібно
    - цікаво
    - приємно
  - sentence: Це дуже гарна вистава, їй ____ дивитися.
    answer: цікаво
    options:
    - цікаво
    - сумно
    - важко
  - sentence: Йде дощ, і ми не йдемо в парк. Йому ____.
    answer: сумно
    options:
    - сумно
    - весело
    - приємно
  - sentence: Ця робота дуже складна, їм ____ працювати.
    answer: важко
    options:
    - важко
    - легко
    - весело
  - sentence: Дякую за подарунок! Мені дуже ____.
    answer: приємно
    options:
    - приємно
    - сумно
    - важко
  - sentence: Вдома немає води, тобі ____ піти в магазин.
    answer: потрібно
    options:
    - потрібно
    - цікаво
    - весело
  - sentence: Вони грають у нову гру, їм дуже ____.
    answer: весело
    options:
    - весело
    - сумно
    - важко
- id: error-correction-dative
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні.
  items:
  - sentence: Мама дає мене смачне яблуко.
    error: мене
    correction: мені
    error_type: word
    options:
    - мені
    - я
    - мною
    explanation: Після дієслова «давати» використовуємо давальний відмінок.
  - sentence: Що він дарує тебе на свято?
    error: тебе
    correction: тобі
    error_type: word
    options:
    - тобі
    - ти
    - тобою
    explanation: Отримувач подарунка стоїть у давальному відмінку.
  - sentence: Ми кажемо їх правду.
    error: їх
    correction: їм
    error_type: word
    options:
    - їм
    - вони
    - ними
    explanation: Після «казати» потрібен давальний відмінок «їм».
  - sentence: Вчитель показує нас нову школу.
    error: нас
    correction: нам
    error_type: word
    options:
    - нам
    - ми
    - нами
    explanation: Після «показувати» потрібен давальний відмінок «нам».
  - sentence: Я пишу її довгого листа.
    error: її
    correction: їй
    error_type: word
    options:
    - їй
    - вона
    - нею
    explanation: Отримувач листа стоїть у давальному відмінку «їй».
  - sentence: Вона купує його новий телефон.
    error: його
    correction: йому
    error_type: word
    options:
    - йому
    - він
    - ним
    explanation: Ми купуємо (для кого?) — давальний відмінок «йому».
  - sentence: Вони розповідають вас про цю подію.
    error: вас
    correction: вам
    error_type: word
    options:
    - вам
    - ви
    - вами
    explanation: Після «розповідати» використовуємо давальний відмінок «вам».
  - sentence: Брат допомагає мене робити завдання.
    error: мене
    correction: мені
    error_type: word
    options:
    - мені
    - я
    - мною
    explanation: Дієслово «допомагати» вимагає давального відмінка.
