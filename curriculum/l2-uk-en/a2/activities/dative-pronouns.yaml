version: '1.0'
module: dative-pronouns
level: a2
inline:
- id: match-up-match-nominative-pronoun-to-its-dative-form
  type: match-up
  instruction: З'єднайте називний відмінок (хто?) з формою давального відмінка (кому?).
  pairs:
  - left: я
    right: мені
  - left: ти
    right: тобі
  - left: він
    right: йому
  - left: вона
    right: їй
  - left: воно
    right: йому
  - left: ми
    right: нам
  - left: ви
    right: вам
  - left: вони
    right: їм
- id: fill-in-dative-pronouns
  type: fill-in
  instruction: Вставте правильний особовий займенник у давальному відмінку за змістом
    речення.
  items:
  - sentence: Це мій брат. Я купую ______ новий телефон.
    answer: йому
    options:
    - йому
    - їй
    - їм
    - нам
  - sentence: Де моя сестра? Я хочу дати ______ цю книгу.
    answer: їй
    options:
    - йому
    - їй
    - тобі
    - мені
  - sentence: Ми ваші найкращі друзі! Розкажіть ______ цей секрет.
    answer: нам
    options:
    - нам
    - вам
    - їм
    - йому
  - sentence: Я не знаю, де вони зараз. Напиши ______ коротке повідомлення.
    answer: їм
    options:
    - їй
    - йому
    - їм
    - нам
  - sentence: Ти дуже добра людина. Я щиро дякую ______ за допомогу.
    answer: тобі
    options:
    - мені
    - тобі
    - вам
    - їй
  - sentence: Це мій улюблений торт! Дай ______ цей великий шматок, будь ласка.
    answer: мені
    options:
    - мені
    - тобі
    - йому
    - нам
- id: true-false-impersonal
  type: true-false
  instruction: Прочитайте речення. Чи правильно використано безособову конструкцію
    (impersonal construction)?
  items:
  - statement: Мені дуже холодно взимку.
    correct: true
    explanation: Правильно. Для фізичних станів ми використовуємо давальний відмінок
      логічного суб'єкта.
  - statement: Я треба йти додому прямо зараз.
    correct: false
    explanation: 'Неправильно. Зі словом «треба» обов''язково використовуємо давальний
      відмінок: Мені треба.'
  - statement: Їй дуже цікаво читати цю нову книгу.
    correct: true
    explanation: Правильно. Зі словом стану «цікаво» використовується давальний відмінок.
  - statement: Вона сумно без своїх друзів.
    correct: false
    explanation: 'Неправильно. Зі словами емоційного стану (сумно) ми використовуємо
      давальний відмінок: Їй сумно.'
  - statement: Йому варто добре відпочити після важкої роботи.
    correct: true
    explanation: Правильно. Слово «варто» (should/worth doing) вимагає давального
      відмінка.
  - statement: Ми страшно дивитися цей новий фільм.
    correct: false
    explanation: 'Неправильно. Правильно казати: Нам страшно.'
  - statement: Вам зручно сидіти на цьому кріслі?
    correct: true
    explanation: Правильно. Зі словом стану «зручно» використовується давальний відмінок.
  - statement: Ти можна взяти ще один теплий десерт.
    correct: false
    explanation: 'Неправильно. Зі словом «можна» використовуємо давальний відмінок:
      Тобі можна.'
- id: quiz-case-choice
  type: quiz
  instruction: 'Оберіть правильний займенник. Зверніть увагу на дієслово: воно вимагає
    давального (кому?) чи знахідного (кого?) відмінка?'
  items:
  - question: Я часто бачу ______ біля метро.
    options:
    - тебе
    - тобі
    - ти
    - тобою
    correct: 0
  - question: Він завжди допомагає ______ робити домашнє завдання.
    options:
    - мене
    - мені
    - я
    - мною
    correct: 1
  - question: Директор уважно слухає ______ на зустрічі.
    options:
    - вам
    - вас
    - ви
    - вами
    correct: 1
  - question: Вчитель добре пояснює ______ нове граматичне правило.
    options:
    - їх
    - їм
    - вони
    - ними
    correct: 1
  - question: Я хочу щиро подякувати ______ за ці красиві квіти.
    options:
    - її
    - їй
    - вона
    - нею
    correct: 1
  - question: Чи ти добре знаєш ______?
    options:
    - йому
    - його
    - він
    - ним
    correct: 1
  - question: Мій брат постійно заважає ______ спокійно працювати.
    options:
    - нас
    - нам
    - ми
    - нами
    correct: 1
  - question: Мама зараз купує ______ смачний солодкий десерт.
    options:
    - його
    - йому
    - він
    - ним
    correct: 1
workbook:
- type: group-sort
  instruction: Розподіліть особові займенники у давальному відмінку за числом (однина
    чи множина).
  groups:
  - label: Однина (Singular)
    items:
    - мені
    - тобі
    - йому
    - їй
  - label: Множина (Plural)
    items:
    - нам
    - вам
    - їм
- type: fill-in
  instruction: Вставте правильний займенник, щоб утворити правильну безособову конструкцію
    зі словами стану та модальними словами.
  items:
  - sentence: Я дуже щаслива. ______ дуже приємно вас тут бачити сьогодні.
    answer: Мені
    options:
    - Мені
    - Тобі
    - Йому
    - Їй
  - sentence: Ти хочеш їсти? ______ можна взяти цей солодкий шоколад.
    answer: Тобі
    options:
    - Тобі
    - Мені
    - Йому
    - Нам
  - sentence: Він зараз один удома. ______ сумно без друзів.
    answer: Йому
    options:
    - Йому
    - Їй
    - Їм
    - Вам
  - sentence: Вона дуже втомлена. ______ важко працювати так багато годин.
    answer: Їй
    options:
    - Їй
    - Йому
    - Мені
    - Нам
  - sentence: Ми маємо великий проєкт. ______ треба багато працювати ввечері.
    answer: Нам
    options:
    - Нам
    - Вам
    - Їм
    - Мені
  - sentence: Вони не люблять кіно. ______ не цікаво дивитися цей фільм.
    answer: Їм
    options:
    - Їм
    - Нам
    - Вам
    - Їй
- type: error-correction
  instruction: Знайдіть і виправте граматичну помилку у використанні відмінка.
  items:
  - sentence: Я щиро дякую тебе за допомогу з проєктом.
    error: тебе
    correction: тобі
    error_type: word
    options:
    - тобі
    - ти
    - тобою
    explanation: Дієслово «дякувати» (to thank) вимагає давального відмінка.
  - sentence: Я треба купити новий зимовий телефон.
    error: Я
    correction: Мені
    error_type: word
    options:
    - Мені
    - Мене
    - Мною
    explanation: З модальним словом «треба» використовуємо давальний відмінок.
  - sentence: Вона дуже холодно у цій новій куртці.
    error: Вона
    correction: Їй
    error_type: word
    options:
    - Їй
    - Її
    - Нею
    explanation: Для опису безособових станів (холодно) потрібен давальний відмінок.
  - sentence: Ти часто заважаєш мене читати книгу.
    error: мене
    correction: мені
    error_type: word
    options:
    - мені
    - я
    - мною
    explanation: Дієслово «заважати» (to bother) вимагає давального відмінка.
  - sentence: Ми варто подивитися цей новий цікавий фільм.
    error: Ми
    correction: Нам
    error_type: word
    options:
    - Нам
    - Нас
    - Нами
    explanation: Зі словом «варто» (worth doing / should) використовуємо давальний
      відмінок.
  - sentence: Він дуже цікаво слухати цю стару історію.
    error: Він
    correction: Йому
    error_type: word
    options:
    - Йому
    - Його
    - Ним
    explanation: Зі словом стану «цікаво» потрібен давальний відмінок (Кому цікаво?).
- type: unjumble
  instruction: Складіть правильні речення зі слів. Пам'ятайте про логіку давального
    відмінка.
  items:
  - words:
    - потрібно
    - новий
    - шарф.
    - Мені
    - купити
    correct_order:
    - Мені
    - потрібно
    - купити
    - новий
    - шарф.
  - words:
    - красиві
    - Я
    - дарую
    - їй
    - квіти.
    correct_order:
    - Я
    - дарую
    - їй
    - красиві
    - квіти.
  - words:
    - у
    - куртці?
    - Тобі
    - цій
    - холодно
    correct_order:
    - Тобі
    - холодно
    - у
    - цій
    - куртці?
  - words:
    - друзям.
    - завжди
    - допомагаємо
    - нашим
    - Ми
    correct_order:
    - Ми
    - завжди
    - допомагаємо
    - нашим
    - друзям.
  - words:
    - правило.
    - Вчитель
    - добре
    - нам
    - пояснює
    correct_order:
    - Вчитель
    - добре
    - пояснює
    - нам
    - правило.
  - words:
    - читати
    - цю
    - книгу.
    - Йому
    - цікаво
