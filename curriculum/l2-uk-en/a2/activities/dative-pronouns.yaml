version: '1.0'
module: dative-pronouns
level: a2
inline:
- id: match-up-pronouns
  type: match-up
  instruction: З'єднайте займенник у називному відмінку з його формою у давальному.
  pairs:
  - left: я
    right: мені
  - left: ти
    right: тобі
  - left: він / воно
    right: йому
  - left: вона
    right: їй
  - left: ми
    right: нам
  - left: ви
    right: вам
  - left: вони
    right: їм
  - left: хто
    right: кому
- id: fill-in-dative-pronouns
  type: fill-in
  instruction: Вставте правильний займенник у давальному відмінку.
  items:
  - sentence: Я дарую ____ нову книгу.
    answer: йому
    options:
    - йому
    - їй
    - їм
  - sentence: Вчитель каже ____ правило.
    answer: нам
    options:
    - нам
    - вам
    - їм
  - sentence: Що вони дарують ____ на свято?
    answer: тобі
    options:
    - тобі
    - мені
    - вам
  - sentence: Ми даємо ____ квитки в театр.
    answer: їм
    options:
    - їм
    - йому
    - їй
  - sentence: Будь ласка, скажи ____ усю правду.
    answer: мені
    options:
    - мені
    - тобі
    - нам
  - sentence: Брат показує ____ нове фото.
    answer: їй
    options:
    - їй
    - йому
    - їм
  - sentence: Мама купує ____ теплий шарф.
    answer: вам
    options:
    - вам
    - нам
    - тобі
  - sentence: Вони пишуть ____ довгого листа.
    answer: нам
    options:
    - нам
    - вам
    - їм
- id: true-false-impersonal
  type: true-false
  instruction: Чи правильно побудоване безособове речення?
  items:
  - statement: Я дуже холодно на вулиці.
    correct: false
    explanation: 'Правильно: Мені дуже холодно.'
  - statement: Тобі цікаво читати цю книгу?
    correct: true
    explanation: Так, це правильна безособова конструкція.
  - statement: Вона сумно сьогодні.
    correct: false
    explanation: 'Правильно: Їй сумно сьогодні.'
  - statement: Нам потрібно купити квитки.
    correct: true
    explanation: Правильно, використовуємо давальний відмінок «нам».
  - statement: Ми важко працювати без комп'ютера.
    correct: false
    explanation: 'Правильно: Нам важко працювати.'
  - statement: Йому весело грати з собакою.
    correct: true
    explanation: Так, «йому» — давальний відмінок від «він».
  - statement: Ти приємно бачити друзів.
    correct: false
    explanation: 'Правильно: Тобі приємно бачити друзів.'
  - statement: Вам потрібно поспішати на потяг.
    correct: true
    explanation: Правильно, використовуємо «вам» для стану.
