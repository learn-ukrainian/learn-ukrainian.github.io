- type: quiz
  title: Оберіть правильний варіант
  items:
    - question: Як правильно назвати кімнату в готелі українською мовою?
      options:
        - text: номер
          correct: true
        - text: квартира
          correct: false
        - text: спальня
          correct: false
        - text: вітальня
          correct: false
      explanation: У професійному готельному бізнесі ми використовуємо спеціальне слово 'номер'.
    - question: Якого роду слово 'номер' в українській мові?
      options:
        - text: чоловічого
          correct: true
        - text: жіночого
          correct: false
        - text: середнього
          correct: false
        - text: спільного
          correct: false
      explanation: Слово 'номер' закінчується на приголосний, тому воно чоловічого роду.
    - question: Який прикметник граматично правильно підходить до слова 'номер'?
      options:
        - text: чистий
          correct: true
        - text: чиста
          correct: false
        - text: чисте
          correct: false
        - text: чисті
          correct: false
      explanation: Прикметник також повинен мати форму чоловічого роду.
    - question: Як ми називаємо процес, коли дія бронювання повністю завершена?
      options:
        - text: забронювати
          correct: true
        - text: бронювати
          correct: false
        - text: бронюю
          correct: false
        - text: буду бронювати
          correct: false
      explanation: Для опису гарантованого результату ми використовуємо дієслово доконаного виду 'забронювати'.
    - question: Який документ обов'язково потрібен для заселення в Україні?
      options:
        - text: паспорт
          correct: true
        - text: банківська картка
          correct: false
        - text: водійські права
          correct: false
        - text: студентський квиток
          correct: false
      explanation: Це пряма вимога українського законодавства.
    - question: 'Як правильно описати напрямок: Я зараз їду...'
      options:
        - text: в готель
          correct: true
        - text: у готелі
          correct: false
        - text: на готель
          correct: false
        - text: до готелі
          correct: false
      explanation: Дієслова руху вимагають Знахідного відмінка.
    - question: 'Як правильно описати ваше розташування: Я зараз відпочиваю...'
      options:
        - text: у готелі
          correct: true
        - text: в готель
          correct: false
        - text: на готелі
          correct: false
        - text: до готелю
          correct: false
      explanation: Дієслова статичного стану вимагають Місцевого відмінка.
    - question: Як ми ввічливо звертаємося до персоналу готелю?
      options:
        - text: на Ви
          correct: true
        - text: на ти
          correct: false
        - text: дружньо
          correct: false
        - text: по імені
          correct: false
      explanation: Це стандарт якісного сервісу та поваги.

- type: true-false
  title: 'Правда чи брехня: правила українських готелів'
  items:
    - statement: В Україні можна поселитися в готель, показавши тільки банківську картку.
      correct: false
      explanation: Обов'язково потрібен оригінал документа (паспорт).
    - statement: Електронний паспорт у додатку Дія має повну юридичну силу.
      correct: true
      explanation: Україна прирівняла електронні паспорти до паперових аналогів.
    - statement: Слово 'кімната' використовується тільки для житлового будинку або квартири.
      correct: true
      explanation: Для готелю завжди використовуємо слово 'номер'.
    - statement: Туристичний збір завжди включений у базову ціну номера на сайті.
      correct: false
      explanation: Він нараховується окремо і сплачується окремо.
    - statement: Адміністратор готелю - це людина, яка прибирає ваш номер.
      correct: false
      explanation: Прибиранням займається покоївка, а адміністратор працює на рецепції.
    - statement: Офіційний час заселення в українських готелях зазвичай починається о другій годині дня.
      correct: true
      explanation: До цього часу номер має бути підготовлений.
    - statement: Звичайне стверджувальне речення можна зробити питанням, просто змінивши інтонацію.
      correct: true
      explanation: Голос мелодійно йде вгору в кінці речення.
    - statement: Для спілкування з покоївкою можна використовувати неофіційне звертання на 'ти'.
      correct: false
      explanation: До всього персоналу потрібно звертатися виключно на 'Ви'.

- type: group-sort
  title: 'Рух чи розташування? Розподіліть фрази'
  instruction: Визначте, яка фраза вказує на напрямок руху, а яка — на статичне розташування.
  groups:
    - name: Напрямок (Знахідний відмінок)
      items:
        - я швидко їду в готель
        - ми повертаємося у свій номер
        - вона йде в готель після екскурсії
    - name: Розташування (Місцевий відмінок)
      items:
        - я спокійно сиджу у готелі
        - наші речі лежать у номері
        - ми знаходимося у готелі

- type: fill-in
  title: Доповніть речення правильними словами
  items:
    - sentence: Добрий день, я хочу ___ двомісний номер на три ночі.
      answer: забронювати
      options:
        - забронювати
        - бронювати
        - заселення
        - виселення
    - sentence: Дайте мені, будь ласка, мій електронний ___ від номера.
      answer: ключ
      options:
        - ключ
        - паспорт
        - рахунок
        - ліфт
    - sentence: Наш офіційний час ___ починається суворо о чотирнадцятій годині.
      answer: заселення
      options:
        - заселення
        - виселення
        - прибирання
        - реєстрації
    - sentence: Чи могли б ви дати мені ще один чистий ___ для обличчя?
      answer: рушник
      options:
        - рушник
        - шампунь
        - рахунок
        - паспорт
    - sentence: У моєму номері зараз дуже жарко, і не працює ___.
      answer: кондиціонер
      options:
        - кондиціонер
        - ліфт
        - ключ
        - адміністратор
    - sentence: Я хочу повністю оплатити мій ___ перед від'їздом.
      answer: рахунок
      options:
        - рахунок
        - паспорт
        - ключ
        - готель
    - sentence: Будь ласка, залиште ключ на стійці ___, коли будете йти гуляти.
      answer: адміністратора
      options:
        - адміністратора
        - готелю
        - ресторану
        - поверху
    - sentence: Підкажіть, о котрій годині у вашому ресторані починається ___?
      answer: сніданок
      options:
        - сніданок
        - прибирання
        - заселення
        - виселення

