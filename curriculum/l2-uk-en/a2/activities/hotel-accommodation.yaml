      answer: паспорт
      options:
        - паспорт
        - ключ
        - рахунок
        - рушник
    - id: 3
      answer: туристичний
      options:
        - туристичний
        - готельний
        - міський
        - великий
    - id: 4
      answer: ключ
      options:
        - ключ
        - паспорт
        - рахунок
        - поверх
    - id: 5
      answer: поверх
      options:
        - поверх
        - готель
        - номер
        - ліфт
    - id: 6
      answer: двомісний
      options:
        - двомісний
        - одномісний
        - великий
        - гарний
    - id: 7
      answer: сніданок
      options:
        - сніданок
        - обід
        - вечеря
        - чай
    - id: 8
      answer: прибирання
      options:
