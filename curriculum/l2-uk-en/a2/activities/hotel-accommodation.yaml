- type: error-correction
  title: Виправте типові помилки туристів
  items:
    - sentence: Я хочу орендувати кімнату у вашому готелі на два дні.
      error: кімнату
      answer: номер
      error_type: word
      options:
        - номер
        - квартиру
        - люкс
        - будинок
      explanation: Слово 'кімната' використовується тільки для приватного житла. Для готелю завжди використовуємо слово 'номер'.
    - sentence: Це дуже гарна номер з видом на море.
      error: гарна
      answer: гарний
      error_type: word
      options:
        - гарний
        - гарне
        - гарні
        - великий
      explanation: Слово 'номер' має чоловічий рід, тому прикметник також повинен бути чоловічого роду.
    - sentence: Я зараз дуже швидко йду у готелі.
      error: у готелі
      answer: в готель
      error_type: construction
      options:
        - в готель
        - на готелі
        - до готелі
        - через готель
      explanation: Дієслово 'йти' означає активний рух, тому ми використовуємо Знахідний відмінок для напрямку.
    - sentence: Мої важкі валізи зараз лежать в номер.
      error: в номер
      answer: у номері
      error_type: construction
      options:
        - у номері
        - на номер
        - до номера
        - за номером
      explanation: Дієслово 'лежати' описує статичне розташування, тому потрібен Місцевий відмінок.
    - sentence: Скажи мені, будь ласка, де знаходиться мій номер?
      error: Скажи
      answer: Скажіть
      error_type: register
      options:
        - Скажіть
        - Кажи
        - Сказав
        - Розповідай
      explanation: До персоналу готелю завжди потрібно звертатися на Ви у формальному стилі.
    - sentence: Я щойно успішно бронював чудовий номер у центрі міста.
      error: бронював
      answer: забронював
      error_type: word
      options:
        - забронював
        - бронюю
        - буду бронювати
        - забронюю
      explanation: Для опису успішно завершеного результату використовується дієслово доконаного виду 'забронювати'.

