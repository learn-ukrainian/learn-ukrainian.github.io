version: '1.0'
module: metalanguage-morphology
level: a2
inline:
- id: identify-morphemes
  type: quiz
  instruction: Яка морфема виділена великими літерами у слові?
  items:
  - question: 'У слові ПЕРЕхід:'
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
    correct: 1
  - question: 'У слові лісОВий:'
    options:
    - корінь
    - префікс
    - суфікс
    - основа
    correct: 2
  - question: 'У слові книгА:'
    options:
    - корінь
    - основа
    - суфікс
    - закінчення
    correct: 3
  - question: 'У слові ВОДний:'
    options:
    - корінь
    - префікс
    - суфікс
    - основа
    correct: 0
  - question: 'У слові ЗАйти:'
    options:
    - префікс
    - суфікс
    - закінчення
    - корінь
    correct: 0
  - question: 'У слові зеленІти:'
    options:
    - префікс
    - суфікс
    - закінчення
    - основа
    correct: 1
  - question: 'У слові ПІДВОДНий:'
    options:
    - корінь
    - суфікс
    - закінчення
    - основа
    correct: 3
  - question: Що має слово «альбом», чого ми не бачимо на письмі?
    options:
    - два корені
    - нульове закінчення
    - три суфікси
    - невидимий префікс
    correct: 1
  title: Яка морфема виділена великими літерами у слові?
- id: fill-in-analysis
  type: fill-in
  instruction: Вставте пропущену морфему або термін
  items:
  - sentence: У слові «полуниця» закінчення — це «____».
    answer: я
    options:
    - полун
    - иця
    - я
    - ця
  - sentence: Слово «метро» — незмінне, тому воно зовсім не має ____.
    answer: закінчення
    options:
    - кореня
    - префікса
    - закінчення
    - основи
  - sentence: Спільнокореневі слова завжди мають спільний ____.
    answer: корінь
    options:
    - префікс
    - суфікс
    - корінь
    - відмінок
  - sentence: У слові «перейти» морфема «пере-» — це ____.
    answer: префікс
    options:
    - префікс
    - суфікс
    - корінь
    - основа
  - sentence: У слові «котик» морфема «-ик-» — це ____.
    answer: суфікс
    options:
    - префікс
    - суфікс
    - закінчення
    - корінь
  - sentence: Основа слова — це частина слова без ____.
    answer: закінчення
    options:
    - кореня
    - закінчення
    - префікса
    - суфікса
  title: Вставте пропущену морфему або термін
- id: match-pos-questions
  type: match-up
  instruction: З'єднайте частину мови з її описом та питаннями
  pairs:
  - left: Іменник
    right: називає предмет (хто? що?)
  - left: Прикметник
    right: називає ознаку (який? чий?)
  - left: Дієслово
    right: називає дію (що робити?)
  - left: Прислівник
    right: називає обставину (як? де? коли?)
  - left: Числівник
    right: називає кількість (скільки? котрий?)
  - left: Займенник
    right: вказує на предмет, але не називає його
  title: З'єднайте частину мови з її описом та питаннями
- id: group-sort
  type: group-sort
  instruction: Розподіліть слова на самостійні та службові частини мови
  groups:
  - label: Самостійні слова
    items:
    - студент
    - сонячний
    - працювати
    - швидко
    - сім
  - label: Службові слова
    items:
    - на
    - і
    - не
    - до
    - щоб
  title: Розподіліть слова на самостійні та службові частини мови
workbook:
- type: fill-in
  instruction: Вставте правильний лінгвістичний термін
  items:
  - sentence: Морфологія — це наука, яка вивчає слова як ____ мови.
    answer: частини
    options:
    - частини
    - корені
    - закінчення
    - звуки
  - sentence: Частина слова без закінчення називається ____.
    answer: основа
    options:
    - основа
    - корінь
    - префікс
    - суфікс
  - sentence: Слова, які мають спільний корінь, називаються ____.
    answer: спільнокореневі
    options:
    - спільнокореневі
    - службові
    - самостійні
    - незмінні
  - sentence: Граматичне значення слова показує ____.
    answer: закінчення
    options:
    - закінчення
    - корінь
    - суфікс
    - основа
  - sentence: Службові частини мови — це прийменник, сполучник і ____.
    answer: частка
    options:
    - частка
    - вигук
    - прислівник
    - числівник
  - sentence: Дієслово називає дію і відповідає на питання «____?»
    answer: що робити
    options:
    - що робити
    - хто або що
    - який
    - як
  title: Вставте правильний лінгвістичний термін
- type: group-sort
  instruction: Розподіліть слова на змінні та незмінні (ті, що не мають закінчення)
  groups:
  - label: Змінні слова (мають закінчення)
    items:
    - книга
    - великий
    - стіл
    - перехідний
    - працюю
    - зима
  - label: Незмінні слова (тільки основа)
    items:
    - швидко
    - метро
    - учора
    - кіно
    - тут
    - таксі
  title: Розподіліть слова на змінні та незмінні (ті, що не мають закінчення)
- type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Спільнокореневі слова і форми одного слова — це одне й те саме.
    correct: false
    explanation: Форми слова мають те саме лексичне значення (ліс — лісу). Спільнокореневі
      слова мають різні лексичні значення (ліс — лісник).
  - statement: Нульове закінчення — це закінчення, якого ми не чуємо і не бачимо,
      але воно існує граматично.
    correct: true
    explanation: Наприклад, у слові «кінь» нульове закінчення, бо воно з'являється
      у формі «коня».
  - statement: Службові частини мови відповідають на питання «хто?» або «що?».
    correct: false
    explanation: Службові слова не мають лексичного значення і до них не можна поставити
      питання.
  - statement: Прийменник часто контролює відмінок наступного іменника.
    correct: true
    explanation: Наприклад, після прийменника «до» завжди йде родовий відмінок.
  - statement: Префікс завжди стоїть після кореня і змінює емоційне забарвлення слова.
    correct: false
    explanation: Після кореня стоїть суфікс. Префікс стоїть перед коренем.
  - statement: Вигуки (ой, ах, гей) не є ні самостійними, ні службовими частинами
      мови.
    correct: true
    explanation: Вигуки стоять окремо від усіх інших слів і лише виражають сильні
      емоції.
  title: Правда чи ні?
- type: error-correction
  instruction: Знайдіть і виправте помилку в термінах
  items:
  - sentence: Слово «безхмарний» має префікс «без-» і закінчення «-арний».
    error: закінчення
    correction: корінь
    error_type: word
    options:
    - корінь
    - суфікс
    - основа
    explanation: Частина «хмар» — це корінь слова (від слова «хмара»).
  - sentence: Займенник називає точну кількість предметів (сім, третій).
    error: Займенник
    correction: Числівник
    error_type: word
    options:
    - Числівник
    - Прикметник
    - Іменник
    explanation: Точну кількість або порядок при лічбі називає числівник.
  - sentence: Прислівник (наприклад, швидко) гнучко змінює свої закінчення.
    error: змінює свої закінчення
    correction: є незмінним словом
    error_type: phrase
    options:
    - є незмінним словом
    - змінює тільки корінь
    - має два закінчення
    explanation: Прислівник складається лише з основи і ніколи не має жодних закінчень.
  - sentence: Частка «не» з'єднує дві великі частини складного речення.
    error: Частка «не»
    correction: Сполучник
    error_type: word
    options:
    - Сполучник
    - Прийменник
    - Вигук
    explanation: Речення або слова з'єднує сполучник (наприклад, «і», «але», «бо»).
  - sentence: 'Дієслово має такі граматичні категорії: рід, число та відмінок.'
    error: відмінок
    correction: час
    error_type: word
    options:
    - час
    - сполучник
    - суфікс
    explanation: Дієслово має час, особу, число та вид. Відмінок має іменник і прикметник.
  - sentence: Суфікс «-ик-» у слові «котик» утворює дієслово.
    error: дієслово
    correction: іменник
    error_type: word
    options:
    - іменник
    - прикметник
    - прислівник
    explanation: «Котик» — це іменник, пестлива форма від слова «кіт».
  title: Знайдіть і виправте помилку в термінах
- type: translate
  instruction: Оберіть правильний український переклад граматичного терміна
  items:
  - source: Parts of speech
    options:
    - text: Частини мови
      correct: true
    - text: Частини слова
      correct: false
    - text: Самостійні слова
      correct: false
    - text: Словотвір
      correct: false
  - source: Noun
    options:
    - text: Іменник
      correct: true
    - text: Прикметник
      correct: false
    - text: Займенник
      correct: false
    - text: Дієслово
      correct: false
  - source: Adjective
    options:
    - text: Прикметник
      correct: true
    - text: Прислівник
      correct: false
    - text: Іменник
      correct: false
    - text: Числівник
      correct: false
  - source: Verb
    options:
    - text: Дієслово
      correct: true
    - text: Прислівник
      correct: false
    - text: Займенник
      correct: false
    - text: Прийменник
      correct: false
  - source: Prefix and Suffix
    options:
    - text: Префікс і суфікс
      correct: true
    - text: Корінь і закінчення
      correct: false
    - text: Основа і морфема
      correct: false
    - text: Сполучник і частка
      correct: false
  - source: Preposition
    options:
    - text: Прийменник
      correct: true
    - text: Займенник
      correct: false
    - text: Прислівник
      correct: false
    - text: Прикметник
      correct: false
  title: Оберіть правильний український переклад граматичного терміна
