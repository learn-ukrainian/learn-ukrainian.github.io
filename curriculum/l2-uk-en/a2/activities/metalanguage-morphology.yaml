version: '1.0'
module: metalanguage-morphology
level: a2
inline:
- id: identify-morphemes
  type: quiz
  instruction: Яка морфема виділена великими літерами у слові?
  items:
  - question: книгА
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
    correct: 3
  - question: ВИйти
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
    correct: 1
  - question: ВОДний
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
    correct: 0
  - question: котИК
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
    correct: 2
  - question: ПЕРЕхід
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
    correct: 1
  - question: школАР
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
    correct: 2
  - question: ДРУЖний
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
    correct: 0
  - question: полуницЮ
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
    correct: 3
- id: fill-in-analysis
  type: fill-in
  instruction: Вставте пропущену морфему (частину слова).
  items:
  - sentence: У слові «перехідний» корінь — це «-____-».
    answer: хід
    options:
    - пере
    - хід
    - н
    - ий
  - sentence: У слові «зайти» префікс — це «____-».
    answer: за
    options:
    - з
    - за
    - й
    - ти
  - sentence: У слові «котик» суфікс — це «-____-».
    answer: ик
    options:
    - кот
    - ик
    - к
    - тик
  - sentence: У слові «вулицею» закінчення — це «-____».
    answer: ею
    options:
    - я
    - ю
    - ею
    - і
  - sentence: У слові «безхмарний» префікс — це «____-».
    answer: без
    options:
    - б
    - без
    - хмар
    - ний
  - sentence: У слові «зимовий» основа — це «____».
    answer: зимов
    options:
    - зим
    - зимо
    - зимов
    - ий
- id: match-pos-questions
  type: match-up
  instruction: З'єднайте частину мови з її питаннями або описом.
  pairs:
  - left: Іменник
    right: хто? що?
  - left: Прикметник
    right: який? чий?
  - left: Дієслово
    right: що робити? що зробити?
  - left: Прислівник
    right: як? де? коли?
  - left: Числівник
    right: скільки? котрий?
  - left: Займенник
    right: вказує на предмет (я, він, цей)
  - left: Прийменник
    right: зв'язує слова (на, в, з, до)
  - left: Сполучник
    right: поєднує слова або речення (і, але, бо)
  - left: Частка
    right: додає відтінки значення (не, б, хай)
  - left: Вигук
    right: виражає емоції (ой! ах! гей!)
- id: group-sort
  type: group-sort
  instruction: Розподіліть слова на самостійні та службові частини мови.
  groups:
  - label: Самостійні слова
    items:
    - сонце
    - новий
    - працювати
    - швидко
    - сім
    - він
  - label: Службові слова
    items:
    - на
    - але
    - не
    - під
    - щоб
    - хай
    - в
    - бо
workbook:
- type: true-false
  instruction: Чи правильні ці твердження про будову слова та частини мови?
  items:
  - statement: Морфологія вивчає слово як частину мови.
    correct: true
    explanation: Морфологія пояснює, які є частини мови та як вони змінюються.
  - statement: Корінь — це змінна частина слова в кінці.
    correct: false
    explanation: Змінна частина в кінці слова — це закінчення. Корінь — це головна
      значуща частина.
  - statement: Слова «ліс» і «лісу» — це спільнокореневі слова.
    correct: false
    explanation: Це форми одного слова, бо змінилося лише закінчення.
  - statement: Незмінні слова, такі як «швидко» або «метро», не мають закінчення.
    correct: true
    explanation: Вони повністю складаються тільки з основи.
  - statement: Службові частини мови відповідають на питання «хто?» або «що?».
    correct: false
    explanation: Службові слова не відповідають на питання і не мають лексичного значення.
  - statement: Префікс завжди стоїть перед коренем і може змінювати значення слова.
    correct: true
    explanation: 'Наприклад: «йти» — «вийти» — «зайти».'
- type: fill-in
  instruction: Визначте частину мови для виділених слів.
  items:
  - sentence: Вона купила [новий] телефон.
    answer: прикметник
    options:
    - іменник
    - прикметник
    - дієслово
    - прислівник
  - sentence: '[Студент] уважно читає текст.'
    answer: іменник
    options:
    - іменник
    - займенник
    - дієслово
    - прийменник
  - sentence: Ми [працюємо] щодня.
    answer: дієслово
    options:
    - іменник
    - дієслово
    - числівник
    - сполучник
  - sentence: На вулиці дуже [сонячно].
    answer: прислівник
    options:
    - прикметник
    - прислівник
    - іменник
    - частка
  - sentence: Я бачу [п'ятнадцять] автомобілів.
    answer: числівник
    options:
    - числівник
    - іменник
    - прикметник
    - дієслово
  - sentence: '[Він] добре знає англійську мову.'
    answer: займенник
    options:
    - іменник
    - займенник
    - прикметник
    - сполучник
- type: match-up
  instruction: З'єднайте лінгвістичний термін із його значенням.
  pairs:
  - left: Морфологія
    right: вивчає слово як частину мови та правила його зміни
  - left: Словотвір
    right: вивчає те, як утворюються нові слова
  - left: Корінь
    right: головна частина слова, яка містить лексичне значення
  - left: Основа
    right: частина слова без закінчення
  - left: Закінчення
    right: змінна частина слова, яка виражає граматичне значення
  - left: Префікс
    right: значуща частина слова, яка стоїть перед коренем
  - left: Суфікс
    right: значуща частина слова, яка стоїть після кореня
