- type: fill-in
  title: 'Заповніть пропуски: Робота та техніка'
  instruction: 'Оберіть правильне слово для кожного речення.'
  items:
    - sentence: 'Мій старий робочий комп''ютер працює дуже повільно, тому мені потрібен новий пристрій.'
      answer: 'комп''ютер'
      options: ['комп''ютер', 'стіл', 'блок', 'дріт']
      explanation: 'Комп''ютер — це загальна назва для робочої техніки.'
    - sentence: 'Я беру свій легкий ноутбук і йду працювати в кафе.'
      answer: 'ноутбук'
      options: ['ноутбук', 'телефон', 'телевізор', 'екран']
      explanation: 'Ноутбук (laptop) — це портативний комп''ютер.'
    - sentence: 'Наші діти грають в ігри на великому сімейному планшеті кожного вечора.'
      answer: 'планшеті'
      options: ['планшеті', 'ноутбуці', 'смартфоні', 'годиннику']
      explanation: 'Планшет (tablet) — це екран без клавіатури, зручний для ігор.'
    - sentence: 'Мій новий смартфон має надзвичайно яскраву і якісну камеру.'
      answer: 'смартфон'
      options: ['смартфон', 'ноутбук', 'комп''ютер', 'планшет']
      explanation: 'Смартфон завжди в кишені і має гарну камеру.'
    - sentence: 'Тобі абсолютно точно потрібна платна підписка для читання сайту без реклами.'
      answer: 'підписка'
      options: ['підписка', 'книга', 'картка', 'пошта']
      explanation: 'Підписка (subscription) дає доступ до платного контенту.'
    - sentence: 'Мій телефон просить мене швидко завантажити нове велике оновлення системи.'
      answer: 'оновлення'
      options: ['оновлення', 'повідомлення', 'правило', 'фото']
      explanation: 'Оновлення (update) покращує роботу системи.'
    - sentence: 'Мені терміново треба перевірити мою робочу електронну пошту сьогодні.'
      answer: 'пошту'
      options: ['пошту', 'книгу', 'адресу', 'роботу']
      explanation: 'Електронна пошта (email) — важливий інструмент для офісу.'
    - sentence: 'Офіційний вебсайт нашого університету сьогодні зовсім не працює.'
      answer: 'вебсайт'
      options: ['вебсайт', 'додаток', 'телефон', 'інтернет']
      explanation: 'Вебсайт (website) може іноді не працювати через помилки.'

- type: cloze
  title: 'Заповніть пропуски: Розмова про додаток'
  instruction: 'Оберіть правильні слова, щоб завершити діалог про додаток "Дія".'
  passage: '— Олено, ти вже змогла {{1}} новий державний {{2}} на свій смартфон? \n— Так, я зробила це вчора. Мені дуже подобається ця {{3}}.\n— А ти вже створила там свій особистий {{4}}?\n— Звісно. Я придумала дуже надійний і складний {{5}}, щоб ніхто не знав мої дані.\n— Це правильно. Тепер твій електронний {{6}} завжди з тобою в телефоні.\n— Це так зручно! Мені більше не треба носити паперові документи. Я просто можу подивитися на {{7}} свого смартфона.\n— А якщо не буде працювати мобільна {{8}}?\n— Тоді я не зможу оновити інформацію, бо для цього потрібен стабільний {{9}}.\n— Добре, що зараз він є майже всюди. Я теж хочу {{10}} собі цю програму.'
  blanks:
    - id: 1
      answer: 'встановити'
      options: ['встановити', 'поставити', 'зробити', 'купити']
    - id: 2
      answer: 'додаток'
      options: ['додаток', 'документ', 'сайт', 'паспорт']
    - id: 3
      answer: 'програма'
      options: ['програма', 'машина', 'книга', 'гра']
    - id: 4
      answer: 'акаунт'
      options: ['акаунт', 'лист', 'пароль', 'номер']
    - id: 5
      answer: 'пароль'
      options: ['пароль', 'код', 'текст', 'телефон']
    - id: 6
      answer: 'паспорт'
      options: ['паспорт', 'додаток', 'квиток', 'комп''ютер']
    - id: 7
      answer: 'екран'
      options: ['екран', 'ноутбук', 'сайт', 'папір']
    - id: 8
      answer: 'мережа'
      options: ['мережа', 'система', 'пошта', 'робота']
    - id: 9
      answer: 'інтернет'
      options: ['інтернет', 'струм', 'пароль', 'час']
    - id: 10
      answer: 'завантажити'
      options: ['завантажити', 'скачати', 'знайти', 'побачити']

- type: quiz
  title: 'Виберіть правильний варіант: Прийменники та відмінки'
  instruction: 'Оберіть граматично правильне речення.'
  items:
    - question: 'Як правильно сказати про пошук інформації в мережі?'
      options:
        - text: 'Я прочитав ці новини в інтернеті.'
          correct: true
        - text: 'Я прочитав ці новини на інтернеті.'
          correct: false
        - text: 'Я прочитав ці новини по інтернету.'
          correct: false
        - text: 'Я прочитав ці новини з інтернету.'
          correct: false
      explanation: 'В українській мові ми використовуємо прийменник "в" (або "у") з місцевим відмінком: в інтернеті.'
    - question: 'Який варіант є граматично правильним для соціальних мереж?'
      options:
        - text: 'Моя сестра сидить у соціальній мережі.'
          correct: true
        - text: 'Моя сестра сидить на соціальній мережі.'
          correct: false
        - text: 'Моя сестра сидить при соціальній мережі.'
          correct: false
        - text: 'Моя сестра сидить за соціальною мережею.'
          correct: false
      explanation: 'Ми кажемо "у соціальній мережі" (Locative case).'
    - question: 'Як правильно сказати про повідомлення у програмі?'
      options:
        - text: 'Ми знайшли цю інформацію в нашому чаті.'
          correct: true
        - text: 'Ми знайшли цю інформацію на нашому чаті.'
          correct: false
        - text: 'Ми знайшли цю інформацію по нашому чату.'
          correct: false
        - text: 'Ми знайшли цю інформацію за нашим чатом.'
          correct: false
      explanation: 'Ми знаходимося "всередині" цифрового простору: в чаті.'
    - question: 'Як правильно відмінювати назви компаній кирилицею?'
      options:
        - text: 'Я знайшов цю статтю в ґуґлі.'
          correct: true
        - text: 'Я знайшов цю статтю на ґуґлі.'
          correct: false
        - text: 'Я знайшов цю статтю в ґуґль.'
          correct: false
        - text: 'Я знайшов цю статтю по ґуґлу.'
          correct: false
      explanation: 'Адаптовані назви відмінюються: в ґуґлі, у фейсбуці.'
    - question: 'Який варіант правильний, якщо ми зберігаємо англійську назву?'
      options:
        - text: 'Я знайшов цю інформацію в Google.'
          correct: true
        - text: 'Я знайшов цю інформацію в Googleі.'
          correct: false
        - text: 'Я знайшов цю інформацію на Google.'
          correct: false
        - text: 'Я знайшов цю інформацію по Google.'
          correct: false
      explanation: 'Оригінальні іншомовні назви не змінюють закінчення.'
    - question: 'Яке дієслово є правильним літературним перекладом "to download"?'
      options:
        - text: 'завантажити'
          correct: true
        - text: 'скачати'
          correct: false
        - text: 'викласти'
          correct: false
        - text: 'опублікувати'
          correct: false
      explanation: 'Слово "завантажити" є правильним стандартним терміном. "Скачати" — це розмовний русизм.'
    - question: 'Яке дієслово означає "to post" або "to upload"?'
      options:
        - text: 'викласти'
          correct: true
        - text: 'завантажити'
          correct: false
        - text: 'встановити'
          correct: false
        - text: 'ввести'
          correct: false
      explanation: 'Дієслово "викласти" (або "опублікувати") означає розмістити інформацію в інтернеті.'
    - question: 'Як сказати "state in a smartphone" українською?'
      options:
        - text: 'Держава в смартфоні'
          correct: true
        - text: 'Держава на смартфоні'
          correct: false
        - text: 'Держава із смартфоном'
          correct: false
        - text: 'Держава біля смартфона'
          correct: false
      explanation: 'Концепція називається "Держава в смартфоні", використовуючи прийменник "в".'

- type: error-correction
  title: 'Виправте помилки: Цифрова грамотність'
  instruction: 'Знайдіть та виправте граматичні або лексичні помилки в реченнях.'
  items:
    - sentence: 'Я завжди читаю ранкові новини на інтернеті під час сніданку.'
      error: 'на інтернеті'
      answer: 'в інтернеті'
      options: ['в інтернеті', 'по інтернету', 'з інтернетом', 'через інтернет']
      explanation: 'Завжди використовуємо "в/у" з цифровими просторами.'
      error_type: 'phrase'
    - sentence: 'Моя подруга опублікувала нове гарне фото на фейсбуці.'
      error: 'на фейсбуці'
      answer: 'у фейсбуці'
      options: ['у фейсбуці', 'в фейсбук', 'через фейсбук', 'біля фейсбуку']
      explanation: 'Ми кажемо "у фейсбуці" (Locative case).'
      error_type: 'phrase'
    - sentence: 'Де я можу швидко скачати цей офіційний мобільний додаток?'
      error: 'скачати'
      answer: 'завантажити'
      options: ['завантажити', 'відправити', 'викласти', 'знайти']
      explanation: 'Слово "скачати" — це розмовний русизм, літературна норма — "завантажити".'
      error_type: 'word'
    - sentence: 'Я хочу завантажити своє відео в інтернет, щоб усі його побачили.'
      error: 'завантажити'
      answer: 'викласти'
      options: ['викласти', 'відправити', 'зберегти', 'встановити']
      explanation: 'Якщо ви публікуєте щось в інтернет, треба казати "викласти" або "опублікувати". "Завантажити" означає "to download".'
      error_type: 'word'
    - sentence: 'Я побачив це дуже смішне відео на тіктоці.'
      error: 'на тіктоці'
      answer: 'в тіктоці'
      options: ['в тіктоці', 'через тікток', 'з тіктоку', 'біля тіктоку']
      explanation: 'Ми "знаходимося" всередині соціальної мережі: в тіктоці.'
      error_type: 'phrase'
    - sentence: 'Тобі потрібно придумати надійний і складний парола.'
      error: 'парола'
      answer: 'пароль'
      options: ['пароль', 'паролю', 'паролем', 'паролі']
      explanation: 'Слово "пароль" у знахідному відмінку для неістот (Accusative inanimate) має форму "пароль".'
      error_type: 'word'

