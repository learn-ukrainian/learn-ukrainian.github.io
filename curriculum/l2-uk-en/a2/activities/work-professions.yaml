- type: "fill-in"
  title: "Вставте правильне слово (чоловічі професії)"
  instruction: "Оберіть правильну форму слова в орудному відмінку."
  items:
    - sentence: "Він зараз успішно працює головним ... у цій компанії."
      answer: "інженером"
      options: ["інженером", "інженер", "інженера", "інженеру"]
    - sentence: "Мій сусід працює сімейним ... у місцевій поліклініці."
      answer: "лікарем"
      options: ["лікарем", "лікар", "лікаром", "лікарю"]
    - sentence: "Олег багато років був хорошим ... у школі."
      answer: "вчителем"
      options: ["вчителем", "вчитель", "вчителом", "вчителю"]
    - sentence: "Мій батько працює ... великого міського автобуса."
      answer: "водієм"
      options: ["водієм", "водій", "водійом", "водія"]
    - sentence: "Він хоче стати фінансовим ... після університету."
      answer: "директором"
      options: ["директором", "директор", "директора", "директору"]
    - sentence: "Антон працює ... у дуже великій міжнародній компанії."
      answer: "менеджером"
      options: ["менеджером", "менеджер", "менеджера", "менеджеру"]
    - sentence: "Вчора він був звичайним ..., а сьогодні вже керівник."
      answer: "підлеглим"
      options: ["підлеглим", "підлеглий", "підлеглого", "підлеглому"]
    - sentence: "Після захисту довгої дисертації він став поважним ..."
      answer: "професором"
      options: ["професором", "професор", "професора", "професору"]

- type: "fill-in"
  title: "Вставте правильне слово (жіночі професії)"
  instruction: "Оберіть правильну форму жіночої професії в орудному відмінку."
  items:
    - sentence: "Вона працює головною ... в нашій лікарні."
      answer: "лікаркою"
      options: ["лікаркою", "лікарка", "лікарку", "лікарки"]
    - sentence: "Моя молодша сестра мріє стати відомою ..."
      answer: "програмісткою"
      options: ["програмісткою", "програмістка", "програмістку", "програмістки"]
    - sentence: "Марія багато років працювала шкільною ..."
      answer: "вчителькою"
      options: ["вчителькою", "вчителька", "вчительку", "вчительки"]
    - sentence: "Вона була дуже хорошою ... для моїх маленьких дітей."
      answer: "нянею"
      options: ["нянею", "няня", "няню", "няні"]
    - sentence: "Олена стала найкращою ... на нашому університетському курсі."
      answer: "студенткою"
      options: ["студенткою", "студентка", "студентку", "студентки"]
    - sentence: "Вона працює ... у новому фінансовому відділі."
      answer: "директоркою"
      options: ["директоркою", "директорка", "директорку", "директорки"]
    - sentence: "Анна успішно працює ... великих міжнародних проектів."
      answer: "менеджеркою"
      options: ["менеджеркою", "менеджерка", "менеджерку", "менеджерки"]
    - sentence: "Його розумна дружина працює досвідченою ..."
      answer: "швачкою"
      options: ["швачкою", "швачка", "швачку", "швачки"]

- type: "unjumble"
  title: "Складіть речення: розповідь про роботу"
  instruction: "Поставте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["я", "активно", "шукаю", "нову", "роботу"]
      answer: "Я активно шукаю нову роботу"
    - words: ["мій", "керівник", "має", "десятьох", "підлеглих"]
      answer: "Мій керівник має десятьох підлеглих"
    - words: ["вона", "довго", "була", "шкільною", "вчителькою"]
      answer: "Вона довго була шкільною вчителькою"
    - words: ["програмісти", "дуже", "часто", "працюють", "віддалено"]
      answer: "Програмісти дуже часто працюють віддалено"
    - words: ["я", "вчора", "написав", "своє", "нове", "резюме"]
      answer: "Я вчора написав своє нове резюме"
    - words: ["завтра", "я", "буду", "проходити", "складну", "співбесіду"]
      answer: "Завтра я буду проходити складну співбесіду"

