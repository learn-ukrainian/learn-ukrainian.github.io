- type: "quiz"
  title: "Перевірте знання: Граматика та етикет"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який відмінок ми використовуємо після дієслова працювати?"
      explanation: "Дієслово працювати завжди вимагає орудного відмінка."
      options:
        - text: "Орудний відмінок"
          correct: true
        - text: "Називний відмінок"
