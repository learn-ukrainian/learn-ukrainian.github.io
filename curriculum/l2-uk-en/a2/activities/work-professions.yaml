- type: "match-up"
  title: "Знайдіть пару: професія та її опис"
  instruction: "Поєднайте назву професії з її описом."
  pairs:
    - left: "лікар"
      right: "лікує хворих пацієнтів у лікарні"
    - left: "вчитель"
      right: "працює в школі та навчає дітей"
    - left: "програміст"
      right: "створює комп'ютерні програми та додатки"
    - left: "бухгалтер"
      right: "працює з фінансами та податками компанії"
    - left: "керівник"
      right: "організовує роботу великої команди"
    - left: "підлеглий"
      right: "виконує важливі завдання свого менеджера"
    - left: "водій"
      right: "професійно керує автомобілем або автобусом"
    - left: "інженер"
      right: "проектує нові дуже складні системи"

- type: "match-up"
  title: "Знайдіть пару: чоловіча та жіноча форми"
