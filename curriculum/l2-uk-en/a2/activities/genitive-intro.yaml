version: '1.0'
module: genitive-intro
level: a2
inline:
- id: quiz-possession-vs-absence-drill-vs
  type: quiz
  instruction: Оберіть правильну форму слова (Є чи Немає?)
  items:
  - question: У мене є брат. У мене немає _____.
    options:
    - брат
    - брату
    - браті
    - брата
    correct: 3
  - question: Тут є стіл. Тут немає _____.
    options:
    - столу
    - стола
    - стіл
    - столі
    correct: 1
  - question: У мене є вода. У мене немає _____.
    options:
    - вода
    - воду
    - води
    - воді
    correct: 2
  - question: У нас є вікно. У нас немає _____.
    options:
    - вікна
    - вікну
    - вікно
    - вікні
    correct: 0
  - question: В офісі є директор. В офісі немає _____.
    options:
    - директору
    - директора
    - директор
    - директорі
    correct: 1
  - question: У тебе є кава? Ні, у мене немає _____.
    options:
    - каві
    - каву
    - кава
    - кави
    correct: 3
  - question: У мене є проблема. У мене немає _____.
    options:
    - проблема
    - проблеми
    - проблему
    - проблемі
    correct: 1
  - question: Тут є телевізор. Тут немає _____.
    options:
    - телевізора
    - телевізору
    - телевізор
    - телевізорі
    correct: 0
- id: fill-in-genitive-singular-formation
  type: fill-in
  instruction: Вставте правильне закінчення для родового відмінка однини
  items:
  - sentence: Сьогодні дуже поганий день, немає _____ (інтернет).
    answer: інтернету
    options:
    - інтернету
    - інтернета
    - інтернет
    - інтернеті
  - sentence: Вибачте, у мене немає _____ (час).
    answer: часу
    options:
    - час
    - часу
    - часа
    - часі
  - sentence: У каві немає _____ (цукор).
    answer: цукру
    options:
    - цукру
    - цукра
    - цукор
    - цукрі
  - sentence: Сьогодні на вулиці немає _____ (сонце).
    answer: сонця
    options:
    - сонця
    - сонце
    - сонцю
    - сонцем
  - sentence: У кімнаті немає _____ (шафа).
    answer: шафи
    options:
    - шафу
    - шафи
    - шафі
    - шафа
  - sentence: Тут немає сухої _____ (земля).
    answer: землі
    options:
    - землі
    - землю
    - земля
    - землею
  - sentence: У мене немає _____ (настрій) працювати.
    answer: настрою
    options:
    - настрою
    - настроя
    - настрій
    - настрої
  - sentence: У місті немає _____ (море).
    answer: моря
    options:
    - моря
    - море
    - морю
    - морем
- id: match-up-genitive-plural-quantity
  type: match-up
  instruction: З'єднайте кількість із правильною формою родового відмінка множини
  pairs:
  - left: багато (друг)
    right: багато друзів
  - left: кілька (машина)
    right: кілька машин
  - left: кілька (книжка)
    right: кілька книжок
  - left: багато (гроші)
    right: багато грошей
  - left: багато (студент)
    right: багато студентів
  - left: мало (місце)
    right: мало місць
  - left: багато (річ)
    right: багато речей
  - left: кілька (яблуко)
    right: кілька яблук
- id: match-up-translate-genitive
  type: match-up
  instruction: З'єднайте англійську фразу з українським перекладом
  pairs:
  - left: I don't have money.
    right: У мене немає грошей.
  - left: There is no time.
    right: Немає часу.
  - left: A lot of people.
    right: Багато людей.
  - left: How many friends?
    right: Скільки друзів?
  - left: A few questions.
    right: Кілька питань.
  - left: I don't have a car.
    right: У мене немає машини.
  - left: There are few trees here.
    right: Тут мало дерев.
  - left: I don't have a problem.
    right: У мене немає проблеми.
