workbook:
- id: workbook-fill-in-quantity
  type: fill-in
  instruction: Вставте правильну форму слова після слів кількості (багато, мало, кілька)
    або слова немає.
  items:
  - sentence: У місті є багато ____.
    answer: площ
    options:
    - площі
    - площ
    - площа
  - sentence: Тут дуже мало ____.
    answer: меблів
    options:
    - меблі
    - меблів
    - меблям
  - sentence: На столі лежить кілька ____.
    answer: зошитів
    options:
    - зошити
    - зошитів
    - зошита
  - sentence: У нас немає ____.
    answer: грошей
    options:
    - гроші
    - грошей
    - грошів
  - sentence: Скільки ____ до Києва?
    answer: кілометрів
    options:
    - кілометрів
    - кілометри
    - кілометра
  - sentence: Сьогодні в парку багато ____.
    answer: людей
    options:
    - люди
    - люд
    - людей
  - sentence: У мене немає ____.
    answer: настрою
    options:
    - настрою
    - настроя
    - настрій
  - sentence: Я бачу кілька ____.
    answer: трамваїв
    options:
    - трамваїв
    - трамваї
    - трамвая
- id: workbook-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінку
  items:
  - sentence: У мене немає брат.
    error: брат
    correction: брата
    error_type: word
    options:
    - брата
    - брату
    - брати
    explanation: Слово «брат» означає живу істоту (чоловічий рід), тому в родовому
      відмінку має закінчення -а.
  - sentence: Тут є багато машина.
    error: машина
    correction: машин
    error_type: word
    options:
    - машин
    - машини
    - машинів
    explanation: Після слова «багато» потрібен родовий відмінок множини. Для слова
      «машина» це нульове закінчення — «машин».
  - sentence: У нього немає гроші.
    error: гроші
    correction: грошей
    error_type: word
    options:
    - грошей
    - грошів
    - гроша
    explanation: Слово «гроші» в родовому відмінку завжди має форму «грошей».
  - sentence: Скільки кілометри до міста?
    error: кілометри
    correction: кілометрів
    error_type: word
    options:
    - кілометрів
    - кілометра
    - кілометр
    explanation: 'Після слова «скільки» ми використовуємо родовий відмінок множини:
      «кілометрів».'
  - sentence: У супі немає сіль.
    error: сіль
    correction: солі
    error_type: word
    options:
    - солі
    - сілі
    - сілю
    explanation: 'Слово «сіль» — жіночого роду на приголосний, у родовому відмінку
      має закінчення -і: «солі».'
  - sentence: Я маю кілька книга.
    error: книга
    correction: книжок
    error_type: word
    options:
    - книжок
    - книг
    - книги
    explanation: Після «кілька» потрібен родовий відмінок множини. Для слова «книжка»
      з'являється випадний голосний «о» — «книжок».
  - sentence: У мене немає час.
    error: час
    correction: часу
    error_type: word
    options:
    - часу
    - часа
    - часи
    explanation: Абстрактні поняття чоловічого роду зазвичай мають закінчення -у в
      родовому відмінку.
  - sentence: На вулиці мало люди.
    error: люди
    correction: людей
    error_type: word
    options:
    - людей
    - людів
    - люд
    explanation: 'Після слова «мало» потрібен родовий відмінок множини: «людей».'
- id: workbook-true-false
  type: true-false
  instruction: Правда чи ні? (Правила родового відмінка)
  items:
  - statement: Після слова «немає» ми завжди використовуємо родовий відмінок.
    correct: true
    explanation: Це головне правило для слова «немає».
  - statement: Слово «вікно» в родовому відмінку однини має форму «вікну».
    correct: false
    explanation: Слово «вікно» (середній рід) змінюється на «вікна».
  - statement: Після слів «багато» і «мало» іменники завжди змінюють свою форму.
    correct: true
    explanation: Ці слова вимагають родового відмінка множини (або однини для незліченних
      іменників).
  - statement: Слово «метро» змінюється на «метра» в родовому відмінку.
    correct: false
    explanation: Слово «метро» є незмінюваним і завжди залишається у формі «метро».
  - statement: Абстрактні поняття чоловічого роду часто мають закінчення -у або -ю
      в родовому відмінку.
    correct: true
    explanation: 'Наприклад: час — часу, вітер — вітру, прогрес — прогресу.'
  - statement: Слово «машина» в множині після слова «багато» має форму «машин».
    correct: true
    explanation: Для більшості слів жіночого роду на -а ми просто забираємо останню
      букву (нульове закінчення).
  - statement: Для слова «гроші» правильна форма родового відмінка — «грошів».
    correct: false
    explanation: Правильна форма, яку потрібно запам'ятати, — «грошей».
  - statement: Після слова «кілька» ми використовуємо називний відмінок.
    correct: false
    explanation: Після «кілька» ми також використовуємо родовий відмінок множини.
- id: workbook-group-sort
  type: group-sort
  instruction: Розподіліть іменники за їхнім закінченням у родовому відмінку однини
  groups:
  - label: Закінчення -а / -я
    items:
    - брат
    - стіл
    - вікно
    - море
  - label: Закінчення -у / -ю
    items:
    - час
    - вітер
    - цукор
    - настрій
  - label: Закінчення -и / -і / -ї
    items:
    - машина
    - сестра
    - земля
    - ніч
- id: workbook-translate
  type: translate
  instruction: Оберіть правильний український переклад речення
  items:
  - source: I don't have a car.
    options:
    - text: У мене немає машини.
      correct: true
    - text: У мене немає машина.
      correct: false
    - text: Я не маю машині.
      correct: false
  - source: There is no sugar in the coffee.
    options:
    - text: У каві немає цукру.
      correct: true
    - text: У каві немає цукор.
      correct: false
    - text: У каві немає цукра.
      correct: false
  - source: He has a lot of friends.
    options:
    - text: У нього є багато друзів.
      correct: true
    - text: У нього є багато друзі.
      correct: false
    - text: У нього немає друзів.
      correct: false
  - source: How much time do you have?
    options:
    - text: Скільки часу у тебе є?
      correct: true
    - text: Скільки час у тебе є?
      correct: false
    - text: Скільки часа у тебе є?
      correct: false
  - source: There are a few boxes.
    options:
    - text: Тут є кілька коробок.
      correct: true
    - text: Тут є кілька коробки.
      correct: false
    - text: Тут є мало коробок.
      correct: false
  - source: I don't have money.
    options:
    - text: У мене немає грошей.
      correct: true
    - text: У мене немає гроші.
      correct: false
    - text: У мене немає грошів.
      correct: false
  - source: There are few people on the street.
    options:
    - text: На вулиці мало людей.
      correct: true
    - text: На вулиці мало люди.
      correct: false
    - text: На вулиці багато людей.
      correct: false
  - source: She doesn't have a computer.
    options:
    - text: У неї немає комп'ютера.
      correct: true
    - text: У неї немає комп'ютеру.
      correct: false
    - text: У неї немає комп'ютер.
      correct: false
- id: workbook-odd-one-out
  type: odd-one-out
  instruction: Знайдіть слово, яке має інше закінчення або форму в родовому відмінку
  items:
  - words:
    - час
    - вітер
    - стіл
    - настрій
    correct: 2
    explanation: Слово «стіл» має закінчення -а (стола), інші слова — абстрактні поняття
      і мають закінчення -у (часу, вітру, настрою).
  - words:
    - машина
    - книга
    - кімната
    - ніч
    correct: 3
    explanation: Слово «ніч» має закінчення -і (ночі), інші закінчуються на -и (машини,
      книги, кімнати).
  - words:
    - брат
    - стіл
    - комп'ютер
    - цукор
    correct: 3
    explanation: Слово «цукор» (речовина) має закінчення -у (цукру), інші — конкретні
      предмети чи особи і мають закінчення -а.
  - words:
    - вікно
    - море
    - місто
    - гроші
    correct: 3
    explanation: Слово «гроші» вживається тільки у множині (грошей), інші — слова
      середнього роду однини (-а/-я).
  - words:
    - багато
    - мало
    - кілька
    - є
    correct: 3
    explanation: Після слова «є» ми вживаємо називний відмінок, після інших слів потрібен
      родовий відмінок.
  - words:
    - люди
    - гроші
    - гості
    - коробки
    correct: 3
    explanation: Слово «коробки» в родовому відмінку множини має нульове закінчення
      (коробок), інші закінчуються на -ей (людей, грошей, гостей).
  - words:
    - сестра
    - книга
    - вікно
    - брат
    correct: 3
    explanation: Слово «брат» у множині має закінчення -ів (братів), інші слова мають
      нульове закінчення або випадний голосний (сестер, книг, вікон).
  - words:
    - Київ
    - брат
    - стіл
    - час
    correct: 3
    explanation: Слово «час» має закінчення -у (часу), інші слова мають закінчення
      -а (Києва, брата, стола).
