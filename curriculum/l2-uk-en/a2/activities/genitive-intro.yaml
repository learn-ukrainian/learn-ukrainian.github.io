workbook:
- id: workbook-true-false-genitive
  type: true-false
  instruction: Правда чи ні? (Правила родового відмінка)
  items:
  - statement: Родовий відмінок часто показує відсутність (absence) або кількість
      (quantity).
    correct: true
    explanation: Так, слова 'немає', 'багато', 'мало' вимагають родового відмінка.
  - statement: Абстрактні іменники чоловічого роду в однині (як 'час' або 'досвід')
      мають закінчення -а.
    correct: false
    explanation: Абстрактні поняття чоловічого роду мають закінчення -у / -ю.
  - statement: Слово 'гроші' після слова 'багато' завжди має форму 'грошей'.
    correct: true
    explanation: Так, це родовий відмінок множини.
  - statement: Якщо іменник жіночого роду закінчується на -а (кава), у родовому відмінку
      він має закінчення -і.
    correct: false
    explanation: Іменники з твердим приголосним + -а мають закінчення -и (кави).
  - statement: Слова 'багато' та 'мало' злічуваних предметів вимагають родового відмінка
      множини.
    correct: true
    explanation: 'Наприклад: багато машин, мало дерев.'
  - statement: Іменники середнього роду на -о (вікно) змінюють закінчення на -у.
    correct: false
    explanation: Іменники середнього роду на -о змінюють закінчення на -а (вікна).
- id: workbook-group-sort-masculine
  type: group-sort
  instruction: 'Розподіліть іменники чоловічого роду (однина): яке закінчення вони
    матимуть після слова ''немає''?'
  groups:
  - label: Закінчення -а / -я (конкретні об'єкти)
    items:
    - стіл
    - брат
    - автобус
    - комп'ютер
    - телевізор
    - холодильник
  - label: Закінчення -у / -ю (абстрактні, речовини)
    items:
    - час
    - цукор
    - досвід
    - інтернет
    - настрій
    - чай
- id: workbook-error-correction-genitive
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: У мене немає комп'ютер.
    error: комп'ютер
    correction: комп'ютера
    error_type: word
    options:
    - комп'ютера
    - комп'ютеру
    - комп'ютері
    - комп'ютером
    explanation: Після 'немає' потрібен родовий відмінок.
  - sentence: Сьогодні зовсім немає час.
    error: час
    correction: часу
    error_type: word
    options:
    - часа
    - часу
    - часі
    - часом
    explanation: '''Час'' — абстрактне поняття, має закінчення -у.'
  - sentence: У нього є багато проблема.
    error: проблема
    correction: проблем
    error_type: word
    options:
    - проблеми
    - проблем
    - проблемів
    - проблемах
    explanation: '''Багато'' вимагає множини: багато проблем.'
  - sentence: Тут дуже мало місце.
    error: місце
    correction: місць
    error_type: word
    options:
    - місця
    - місць
    - місцьів
    - місцях
    explanation: '''Мало'' вимагає родового відмінка множини.'
  - sentence: У мене немає машина.
    error: машина
    correction: машини
    error_type: word
    options:
    - машини
    - машину
    - машині
    - машин
    explanation: Жіночий рід на -а (машина) змінюється на -и (машини).
  - sentence: Ми маємо кілька друг.
    error: друг
    correction: друзів
    error_type: word
    options:
    - друга
    - други
    - друзів
    - другами
    explanation: '''Друг'' у множині має неправильну форму — ''друзів''.'
- id: workbook-translate-genitive
  type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: I don't have a brother.
    options:
    - text: У мене немає брата.
      correct: true
    - text: У мене немає брат.
      correct: false
    - text: У мене є брата.
      correct: false
    - text: Я не маю брату.
      correct: false
  - source: There is no water.
    options:
    - text: Немає води.
      correct: true
    - text: Немає воду.
      correct: false
    - text: Немає вода.
      correct: false
    - text: Є води.
      correct: false
  - source: A lot of things.
    options:
    - text: Багато речей.
      correct: true
    - text: Багато речі.
      correct: false
    - text: Багато речах.
      correct: false
    - text: Багато річ.
      correct: false
  - source: How much money?
    options:
    - text: Скільки грошей?
      correct: true
    - text: Скільки гроші?
      correct: false
    - text: Скільки грошах?
      correct: false
    - text: Скільки грошів?
      correct: false
  - source: He has few friends.
    options:
    - text: Він має мало друзів.
      correct: true
    - text: Він має мало друга.
      correct: false
    - text: Він має мало друг.
      correct: false
    - text: Він має багато друзів.
      correct: false
  - source: I have no time.
    options:
    - text: У мене немає часу.
      correct: true
    - text: У мене немає час.
      correct: false
    - text: У мене немає часа.
      correct: false
    - text: У мене є час.
      correct: false
