version: '1.0'
module: genitive-intro
level: a2
inline:
- id: quiz-possession-vs-absence
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: У місті є новий _____.
    options:
    - театр
    - театру
    - театра
    - театрі
    correct: 0
  - question: У місті немає _____.
    options:
    - театру
    - театр
    - театра
    - театрі
    correct: 0
  - question: У мене є _____.
    options:
    - сестра
    - сестри
    - сестру
    - сестрою
    correct: 0
  - question: На кухні немає _____.
    options:
    - холодильника
    - холодильник
    - холодильнику
    - холодильники
    correct: 0
  - question: У кімнаті є великий _____.
    options:
    - стіл
    - стола
    - столу
    - столі
    correct: 0
  - question: У нас немає _____.
    options:
    - проблеми
    - проблема
    - проблему
    - проблемою
    correct: 0
  - question: Сьогодні у мене є _____.
    options:
    - час
    - часу
    - часа
    - часом
    correct: 0
  - question: У мене зовсім немає _____.
    options:
    - часу
    - час
    - часа
    - часом
    correct: 0
  title: Оберіть правильний варіант
- id: fill-in-genitive-singular
  type: fill-in
  instruction: Вставте іменник у формі родового відмінка (однина)
  items:
  - sentence: У нього зараз немає _____.
    answer: телефона
  - sentence: У каві зовсім немає _____.
    answer: цукру
  - sentence: На кухні немає _____.
    answer: кави
  - sentence: У цій кімнаті немає _____.
    answer: вікна
  - sentence: У цьому офісі немає _____.
    answer: принтера
  - sentence: Біля будинку немає _____.
    answer: вулиці
  - sentence: Без води немає _____.
    answer: життя
  - sentence: На столі немає _____.
    answer: комп'ютера
  title: Вставте іменник у формі родового відмінка (однина)
- id: match-up-genitive-plural-quantity
  type: match-up
  instruction: З'єднайте форму називного відмінка (однина) з правильною формою після
    слів кількості
  pairs:
  - left: одна книжка
    right: багато книжок
  - left: один друг
    right: багато друзів
  - left: одне вікно
    right: мало вікон
  - left: одна сестра
    right: кілька сестер
  - left: одне яблуко
    right: багато яблук
  - left: одна ідея
    right: багато ідей
  - left: один день
    right: кілька днів
  - left: одна машина
    right: мало машин
  title: З'єднайте форму називного відмінка (однина) з правильною формою після слів
    кільк
- id: match-up-translate-genitive
  type: match-up
  instruction: З'єднайте українські фрази з їхнім англійським перекладом
  pairs:
  - left: У мене немає часу.
    right: I have no time.
  - left: У мене немає грошей.
    right: I have no money.
  - left: Там є багато дерев.
    right: There are many trees.
  - left: Скільки книжок?
    right: How many books?
  - left: Кілька запитань.
    right: A few questions.
  - left: Багато друзів.
    right: A lot of friends.
  - left: У мене дуже багато книжок.
    right: I have a lot of books.
  - left: Скільки часу?
    right: How much time?
  title: З'єднайте українські фрази з їхнім англійським перекладом
workbook:
- type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: У мене немає час.
    error: час
    correction: часу
    error_type: word
    options:
    - часу
    - часа
    - часом
    explanation: Слово «немає» вимагає родового відмінка (чого? — часу).
  - sentence: Скільки у тебе книжки?
    error: книжки
    correction: книжок
    error_type: word
    options:
    - книжок
    - книжку
    - книжкою
    explanation: Після слова «скільки» потрібен родовий відмінок множини.
  - sentence: Я маю мало гроші.
    error: гроші
    correction: грошей
    error_type: word
    options:
    - грошей
    - грошів
    - грошам
    explanation: Слово «гроші» після слова «мало» має форму «грошей» (родовий відмінок
      множини).
  - sentence: У місті немає театр.
    error: театр
    correction: театру
    error_type: word
    options:
    - театру
    - театра
    - театрі
    explanation: Слово «театр» (місце) у родовому відмінку однини має закінчення -у.
  - sentence: Тут багато машина.
    error: машина
    correction: машин
    error_type: word
    options:
    - машин
    - машини
    - машиною
    explanation: Слово «багато» вимагає родового відмінка множини (нульове закінчення).
  - sentence: У нас немає вода.
    error: вода
    correction: води
    error_type: word
    options:
    - води
    - воду
    - водою
    explanation: Після слова «немає» потрібен родовий відмінок (води).
  title: Знайдіть і виправте помилку
- type: group-sort
  instruction: Розподіліть іменники за їхнім закінченням у родовому відмінку (однина)
  groups:
  - label: Закінчення -а / -я (конкретні предмети)
    items:
    - стіл
    - брат
    - метр
    - телефон
    - холодильник
    - автобус
  - label: Закінчення -у / -ю (абстрактні, речовини)
    items:
    - час
    - цукор
    - досвід
    - смуток
    - прогрес
    - сенс
  title: Розподіліть іменники за їхнім закінченням у родовому відмінку (однина)
- type: true-false
  instruction: Правда чи ні?
  items:
  - statement: В українській мові слово «гроші» завжди використовується у множині.
    correct: true
    explanation: Слово «гроші» (money) не має форми однини.
  - statement: Якщо ми маємо предмет, ми кажемо «У мене немає».
    correct: false
    explanation: Слово «немає» використовується для відсутності предмета. Для наявності
      кажемо «є».
  - statement: Після слова «багато» завжди використовується родовий відмінок множини.
    correct: true
    explanation: Слова кількості, такі як багато, мало, кілька, вимагають родового
      відмінка множини.
  - statement: Слова «час» і «досвід» мають закінчення -а у родовому відмінку.
    correct: false
    explanation: Це абстрактні поняття, тому вони мають закінчення -у (часу, досвіду).
  - statement: Після слова «немає» іменник стоїть у називному відмінку.
    correct: false
    explanation: Слово «немає» — це магніт, який завжди вимагає родового відмінка.
  - statement: Запитання «Скільки?» також вимагає використання родового відмінка для
      предметів, які ми рахуємо.
    correct: true
    explanation: 'Наприклад: Скільки книжок? Скільки часу? Усе це родовий відмінок.'
  title: Правда чи ні?
