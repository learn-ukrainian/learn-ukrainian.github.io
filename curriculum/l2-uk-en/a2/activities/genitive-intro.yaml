version: '1.0'
module: genitive-intro
level: a2
inline:
- id: possession-absence-drill
  type: quiz
  instruction: 'Оберіть правильний варіант: є чи немає?'
  items:
  - question: У мене _____ новий телефон.
    options:
    - є
    - немає
    - не має
    - мало
    correct: 0
  - question: У нього _____ комп'ютера.
    options:
    - є
    - немає
    - не має
    - багато
    correct: 1
  - question: У кімнаті _____ велике вікно.
    options:
    - є
    - немає
    - не має
    - кілька
    correct: 0
  - question: Тут _____ парку.
    options:
    - немає
    - є
    - не має
    - багато
    correct: 0
  - question: У мене _____ час.
    options:
    - є
    - немає
    - мало
    - багато
    correct: 0
  - question: На жаль, у нас _____ часу.
    options:
    - немає
    - є
    - не має
    - це
    correct: 0
  - question: У місті _____ нова школа.
    options:
    - є
    - немає
    - багато
    - кілька
    correct: 0
  - question: У селі _____ школи.
    options:
    - немає
    - є
    - не має
    - багато
    correct: 0
workbook:
- id: genitive-singular-formation
  type: fill-in
  instruction: Оберіть правильну форму родового відмінка однини
  items:
  - sentence: Тут є стіл. У кімнаті немає _____
    answer: стола
    options:
    - стола
    - столу
    - стіл
    - столів
  - sentence: Тут є цукор. У чаї немає _____
    answer: цукру
    options:
    - цукру
    - цукра
    - цукор
    - цукрів
  - sentence: Це моя машина. У мене немає _____
    answer: машини
    options:
    - машини
    - машину
    - машині
    - машина
  - sentence: Тут є пісня. Сьогодні немає _____
    answer: пісні
    options:
    - пісні
    - пісню
    - пісня
    - пісень
  - sentence: Тут є вікно. У кімнаті немає _____
    answer: вікна
    options:
    - вікна
    - вікно
    - вікну
    - вікон
  - sentence: Тут є море. Біля міста немає _____
    answer: моря
    options:
    - моря
    - море
    - морі
    - морів
  - sentence: Тут є брат. У мене немає _____
    answer: брата
    options:
    - брата
    - брату
    - брат
    - братів
  - sentence: У мене є час. На жаль, у нього немає _____
    answer: часу
    options:
    - часу
    - часа
    - час
    - часів
- id: genitive-plural-formation
  type: match-up
  instruction: З'єднайте слово в однині з його формою після слова «багато» (множина)
  pairs:
  - left: стіл
    right: багато столів
  - left: друг
    right: багато друзів
  - left: машина
    right: багато машин
  - left: місто
    right: багато міст
  - left: книжка
    right: багато книжок
  - left: долар
    right: багато доларів
  - left: музей
    right: багато музеїв
  - left: вікно
    right: багато вікон
- id: translate-sentences
  type: match-up
  instruction: З'єднайте українські речення з їхніми англійськими перекладами
  pairs:
  - left: У мене немає брата.
    right: I don't have a brother.
  - left: У кімнаті немає стола.
    right: There is no table in the room.
  - left: У нас є багато часу.
    right: We have a lot of time.
  - left: На жаль, у мене мало грошей.
    right: Unfortunately, I have little money.
  - left: У місті є кілька парків.
    right: There are several parks in the city.
  - left: Скільки студентів у класі?
    right: How many students are in the class?
  - left: У них немає вільного часу.
    right: They don't have free time.
  - left: У мене багато друзів.
    right: I have a lot of friends.
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - брата.
    - У
    - немає
    - мене
    correct_order:
    - У
    - мене
    - немає
    - брата.
  - words:
    - є
    - книжок.
    - багато
    - У
    - бібліотеці
    correct_order:
    - У
    - бібліотеці
    - є
    - багато
    - книжок.
  - words:
    - нього
    - часу.
    - У
    - мало
    correct_order:
    - У
    - нього
    - мало
    - часу.
  - words:
    - немає
    - каві
    - У
    - зовсім
    - цукру.
    correct_order:
    - У
    - каві
    - зовсім
    - немає
    - цукру.
  - words:
    - проблем.
    - нас
    - кілька
    - є
    - У
    correct_order:
    - У
    - нас
    - є
    - кілька
    - проблем.
  - words:
    - цей
    - грошей
    - Скільки
    - квиток?
    - коштує
    correct_order:
    - Скільки
    - грошей
    - коштує
    - цей
    - квиток?
