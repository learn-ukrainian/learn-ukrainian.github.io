version: '1.0'
module: metalanguage-sentences-and-classroom
level: a2
inline:
- id: match-up
  type: match-up
  instruction: З'єднайте член речення з його питанням
  pairs:
  - left: підмет (людина)
    right: хто?
  - left: підмет (предмет)
    right: що?
  - left: присудок (дія)
    right: що робить?
  - left: присудок (стан)
    right: який він є?
  - left: додаток
    right: кого? кому?
  - left: означення (якість)
    right: який? яка?
  - left: означення (належність)
    right: чий? чиє?
  - left: обставина
    right: де? коли? як?
- id: fill-in-morphemes
  type: fill-in
  instruction: Знайдіть правильну морфему в кожному слові
  items:
  - sentence: У слові «лісовий» корінь — це «____».
    answer: ліс
    options:
    - ліс
    - ов
    - ий
  - sentence: У слові «переходити» префікс — це «____».
    answer: пере
    options:
    - пере
    - ход
    - ити
  - sentence: У слові «рученька» суфікс — це «____».
    answer: еньк
    options:
    - руч
    - еньк
    - а
  - sentence: У слові «книга» закінчення — це «____».
    answer: а
    options:
    - книг
    - а
    - и
  - sentence: У слові «заходити» префікс — це «____».
    answer: за
    options:
    - за
    - ход
    - ити
  - sentence: У слові «лісник» суфікс — це «____».
    answer: ник
    options:
    - ліс
    - ник
    - і
  - sentence: У слові «ручний» основа слова — це «____».
    answer: ручн
    options:
    - ручн
    - ий
    - руч
  - sentence: У слові «тепло» корінь — це «____».
    answer: тепл
    options:
    - тепл
    - о
    - те
- id: group-sort-roots
  type: group-sort
  instruction: Розподіліть слова за їхнім спільним коренем
  groups:
  - label: Корінь «-ліс-»
    items:
    - лісник
    - лісовий
    - лісок
    - ліс
  - label: Корінь «-ход-»
    items:
    - заходити
    - виходити
    - приходити
    - переходити
- id: quiz-classroom-instructions
  type: quiz
  instruction: Що означають ці інструкції вчителя?
  items:
  - question: Що ви повинні зробити, коли бачите інструкцію «Вставте пропущені букви»?
    options:
    - Зробити помилку у тексті
    - Намалювати лінію під словом
    - Додати букви у слово
    - Прочитати текст вголос
    correct: 2
  - question: Що означає команда «Підкресліть підмет»?
    options:
    - Додати нове слово в речення
    - Намалювати лінію під словом
    - Визначити відмінок слова
    - Перевірити наголос у слові
    correct: 1
  - question: Як правильно виконати завдання «Прочитайте текст»?
    options:
    - Ознайомитися з текстом
    - Написати новий текст
    - Виправити всі помилки
    - Доповнити кожне речення
    correct: 0
  - question: Що від вас вимагає команда «Запишіть нові слова»?
    options:
    - Просто подивитися на них
    - Підкреслити їх двома лініями
    - Порівняти їх з іншими
    - Написати їх у свій зошит
    correct: 3
  - question: Команда «Визначте відмінок» просить вас...
    options:
    - Вставити закінчення у слово
    - Назвати правильний відмінок слова
    - Знайти головний член речення
    - Вибрати префікс для слова
    correct: 1
  - question: Коли вчитель каже «Порівняйте ці два речення», ви повинні...
    options:
    - Побачити різницю між ними
    - Написати нові довгі речення
    - Закреслити одне з речень
    - Додати нове слово у речення
    correct: 0
  - question: Інструкція «Доповніть речення» зазвичай означає, що...
    options:
    - У реченні є помилка
    - Треба підкреслити присудок
    - Речення не закінчене і треба додати слова
    - Треба швидко його прочитати
    correct: 2
  - question: Що ви робите за командою «Знайдіть помилку»?
    options:
    - Малюєте лінію під усім реченням
    - Шукаєте неправильне слово або форму
    - Просто читаєте текст далі
    - Записуєте своє ім'я у зошит
    correct: 1
workbook:
- type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Підмет і присудок — це головні члени речення.
    correct: true
    explanation: Вони утворюють граматичну основу речення.
  - statement: Означення відповідає на питання «хто?» або «що?».
    correct: false
    explanation: Означення відповідає на питання «який?», «яка?», «чиє?», а «хто/що»
      — це підмет.
  - statement: Префікс завжди стоїть після кореня слова.
    correct: false
    explanation: Префікс стоїть перед коренем, а після кореня стоїть суфікс.
  - statement: Закінчення слова змінюється залежно від відмінка чи числа.
    correct: true
    explanation: Закінчення — це змінна частина слова для правильної граматики.
  - statement: Споріднені слова завжди мають однаковий префікс.
    correct: false
    explanation: Споріднені слова мають спільний корінь, а не префікс.
  - statement: Просте речення має тільки одну граматичну основу.
    correct: true
    explanation: Якщо речення має дві або більше основ, воно називається складним.
- type: fill-in
  instruction: 'Прочитайте речення і визначте, яким членом речення є кожне слово:
    «Маленька дівчинка читає цікаву книгу.»'
  items:
  - sentence: Слово «Маленька» (яка?) — це ____.
    answer: означення
    options:
    - підмет
    - присудок
    - додаток
    - означення
    - обставина
  - sentence: Слово «дівчинка» (хто?) — це ____.
    answer: підмет
    options:
    - підмет
    - присудок
    - додаток
    - означення
    - обставина
  - sentence: Слово «читає» (що робить?) — це ____.
    answer: присудок
    options:
    - підмет
    - присудок
    - додаток
    - означення
    - обставина
  - sentence: Слово «цікаву» (яку?) — це ____.
    answer: означення
    options:
    - підмет
    - присудок
    - додаток
    - означення
    - обставина
  - sentence: Слово «книгу» (що? кого?) — це ____.
    answer: додаток
    options:
    - підмет
    - присудок
    - додаток
    - означення
    - обставина
  - sentence: А якщо додати слово «ввечері» (коли?), це буде ____.
    answer: обставина
    options:
    - підмет
    - присудок
    - додаток
    - означення
    - обставина
- type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Ми вивчаємо головний члени речення.
    error: головний
    correction: головні
    error_type: word
    options:
    - головні
    - головна
    - головне
    explanation: 'Слово «члени» стоїть у множині, тому прикметник також має бути у
      множині: головні.'
  - sentence: Підмет — це головна герой нашої історії.
    error: головна
    correction: головний
    error_type: word
    options:
    - головний
    - головне
    - головні
    explanation: 'Слово «герой» чоловічого роду, тому прикметник: головний.'
  - sentence: Присудок розказує, що роблять підмет.
    error: роблять
    correction: робить
    error_type: word
    options:
    - робить
    - робив
    - робити
    explanation: 'Підмет (він) стоїть в однині, тому дієслово: робить.'
  - sentence: Споріднені слова мають спільний коріння.
    error: коріння
    correction: корінь
    error_type: word
    options:
    - корінь
    - основа
    - префікс
    explanation: Морфема називається «корінь» (однина).
  - sentence: 'Вчитель просить нас: запиши ці нові слова.'
    error: запиши
    correction: запишіть
    error_type: word
    options:
    - запишіть
    - записати
    - записав
    explanation: 'Вчитель звертається до класу (множина/Ви), тому: запишіть.'
  - sentence: Доповніть це коротке реченнях.
    error: реченнях
    correction: речення
    error_type: word
    options:
    - речення
    - реченню
    - реченні
    explanation: 'Після слова «це» іменник має стояти у знахідному відмінку однини:
      речення.'
- type: unjumble
  instruction: Складіть правильне речення (інструкцію) зі слів
  items:
  - words:
    - пропущені
    - Вставте
    - у
    - букви
    - слово.
    correct_order:
    - Вставте
    - пропущені
    - букви
    - у
    - слово.
  - words:
    - члени
    - речення.
    - Підкресліть
    - головні
    correct_order:
    - Підкресліть
    - головні
    - члени
    - речення.
  - words:
    - помилку
    - у
    - тексті.
    - Знайдіть
    correct_order:
    - Знайдіть
    - помилку
    - у
    - тексті.
  - words:
    - слова
    - Розподіліть
    - за
    - коренем.
    correct_order:
    - Розподіліть
    - слова
    - за
    - коренем.
  - words:
    - варіант
    - правильний
    - Оберіть
    - відповіді.
    correct_order:
    - Оберіть
    - правильний
    - варіант
    - відповіді.
  - words:
    - іменника.
    - відмінок
    - Визначте
    correct_order:
    - Визначте
    - відмінок
    - іменника.
- type: match-up
  instruction: З'єднайте дієслово з правильним продовженням інструкції
  pairs:
  - left: Вставте
    right: пропущені букви
  - left: Підкресліть
    right: головні члени речення
  - left: Знайдіть
    right: помилку в тексті
  - left: Визначте
    right: відмінок іменника
  - left: Порівняйте
    right: ці два речення
  - left: Дайте відповідь
    right: на запитання вчителя
  - left: Запишіть
    right: нові слова у зошит
  - left: Прочитайте
    right: уважно текст
