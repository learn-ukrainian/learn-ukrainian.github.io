version: '1.0'
module: metalanguage-sentences-and-classroom
level: a2
inline:
- id: match-up
  type: match-up
  instruction: З'єднайте члени речення з їхніми питаннями або значенням
  pairs:
  - left: Підмет
    right: хто? що?
  - left: Присудок
    right: що робить? що зробив?
  - left: Додаток
    right: кого? що? кому?
  - left: Означення
    right: який? яка? чиє?
  - left: Обставина
    right: де? коли? як?
  - left: Граматична основа
    right: підмет і присудок
  - left: Просте речення
    right: має одну граматичну основу
  - left: Складне речення
    right: має дві або більше основ
- id: fill-in-morphemes
  type: fill-in
  instruction: Вставте правильну назву частини слова (морфеми)
  items:
  - sentence: Головна частина слова, яка має лексичне значення — це _____.
    answer: корінь
    options:
    - корінь
    - суфікс
    - закінчення
    - префікс
  - sentence: 'Ця коротка морфема стоїть прямо перед коренем: _____.'
    answer: префікс
    options:
    - суфікс
    - префікс
    - основа
    - закінчення
  - sentence: 'Ця морфема стоїть після кореня і може робити слово пестливим: _____.'
    answer: суфікс
    options:
    - корінь
    - префікс
    - суфікс
    - закінчення
  - sentence: 'Це змінна частина в кінці слова: _____.'
    answer: закінчення
    options:
    - основа
    - префікс
    - корінь
    - закінчення
  - sentence: Частина слова без закінчення називається _____.
    answer: основа
    options:
    - корінь
    - основа
    - суфікс
    - префікс
  - sentence: Слова, які мають один спільний корінь — це _____ слова.
    answer: споріднені
    options:
    - короткі
    - складні
    - споріднені
    - прості
  - sentence: Підмет зазвичай стоїть у _____ відмінку.
    answer: називному
    options:
    - називному
    - давальному
    - місцевому
    - знахідному
  - sentence: Закінчення ніколи не створює нових слів, воно лише _____ форму.
    answer: змінює
    options:
    - змінює
    - видаляє
    - читає
    - пояснює
- id: group-sort-roots
  type: group-sort
  instruction: Розподіліть споріднені слова за їхнім спільним коренем
  groups:
  - label: Корінь -ліс-
    items:
    - лісовий
    - лісник
    - лісок
    - пролісок
  - label: Корінь -книг- / -книж-
    items:
    - книга
    - книжка
    - книжковий
    - книгарня
  - label: Корінь -рук- / -руч-
    items:
    - рука
    - ручний
    - рученька
    - підручник
- id: quiz-classroom-instructions
  type: quiz
  instruction: Що означають ці інструкції? Оберіть правильну дію.
  items:
  - question: 'Вчитель каже: «Прочитайте текст». Що вам треба робити?'
    options:
    - Читати слова.
    - Писати в зошит.
    - Слухати аудіо.
    - Малювати лінію.
    correct: 0
  - question: 'Вчитель каже: «Запишіть нові слова». Що треба робити?'
    options:
    - Писати слова в зошит.
    - Читати вголос.
    - Дивитися на екран.
    - Шукати помилку.
    correct: 0
  - question: 'Вчитель каже: «Підкресліть підмет». Що треба робити?'
    options:
    - Намалювати лінію під словом.
    - Додати нову букву.
    - Сказати відповідь.
    - Закрити підручник.
    correct: 0
  - question: 'Вчитель каже: «Вставте пропущені букви». Що треба робити?'
    options:
    - Додати літери у неповне слово.
    - Знайти зайве слово.
    - Прочитати речення.
    - Викреслити слово.
    correct: 0
  - question: 'Вчитель каже: «Знайдіть помилку». Що треба робити?'
    options:
    - Шукати неправильне слово.
    - Написати своє речення.
    - Порівняти два тексти.
    - Відкрити словник.
    correct: 0
  - question: 'Вчитель каже: «Порівняйте два речення». Що треба робити?'
    options:
    - Шукати різницю між ними.
    - З'єднати їх в одне.
    - Прочитати їх швидко.
    - Підкреслити всі слова.
    correct: 0
  - question: 'Вчитель каже: «Виберіть правильну відповідь». Що треба робити?'
    options:
    - Обрати один варіант з кількох.
    - Написати новий текст.
    - Задати запитання вчителю.
    - Намалювати квадрат.
    correct: 0
  - question: 'Вчитель каже: «Дайте відповідь на запитання». Що треба робити?'
    options:
    - Сказати або написати свою відповідь.
    - Поставити питання студентам.
    - Перекласти запитання.
    - Пропустити це завдання.
    correct: 0
workbook:
- type: match-up
  instruction: З'єднайте інструкцію з її перекладом
  pairs:
  - left: Визначте
    right: Determine
  - left: Порівняйте
    right: Compare
  - left: Доповніть
    right: Complete
  - left: Вставте
    right: Insert
  - left: Підкресліть
    right: Underline
  - left: Знайдіть
    right: Find
  - left: Виберіть
    right: Choose
- type: true-false
  instruction: Правда чи ні? Прочитайте твердження про граматику.
  items:
  - statement: Підмет відповідає на питання «хто?» або «що?».
    correct: true
    explanation: Так, підмет — це головний герой речення.
  - statement: Присудок завжди підкреслюють однією прямою лінією.
    correct: false
    explanation: Ні, присудок підкреслюють двома лініями. Підмет — однією.
  - statement: Обставина відповідає на питання «де?», «коли?», «як?».
    correct: true
    explanation: Так, обставина показує місце, час або спосіб дії.
  - statement: Складне речення має лише одну граматичну основу.
    correct: false
    explanation: Ні, просте речення має одну основу. Складне — дві або більше.
  - statement: Корінь завжди стоїть у кінці слова.
    correct: false
    explanation: Ні, у кінці слова зазвичай стоїть закінчення.
  - statement: Суфікс стоїть одразу після кореня і може робити слово пестливим.
    correct: true
    explanation: Так, наприклад, суфікс -еньк- у слові «рученька».
  - statement: Закінчення допомагає створювати нові слова.
    correct: false
    explanation: Ні, закінчення лише змінює форму слова (відмінок, рід, число).
  - statement: Префікс стоїть перед коренем і змінює значення слова.
    correct: true
    explanation: 'Так, наприклад: заходити, виходити, приходити.'
- type: error-correction
  instruction: Знайдіть і виправте помилку в граматичному терміні або інструкції
  items:
  - sentence: Слово, яке означає дію героя — це підмет.
    error: підмет
    correction: присудок
    error_type: word
    options:
    - присудок
    - додаток
    - означення
    explanation: Підмет — це герой, а його дія — це присудок.
  - sentence: Змінна частина в кінці слова — це префікс.
    error: префікс
    correction: закінчення
    error_type: word
    options:
    - закінчення
    - корінь
    - суфікс
    explanation: Змінна частина в кінці — це закінчення.
  - sentence: Частина слова перед коренем — це суфікс.
    error: суфікс
    correction: префікс
    error_type: word
    options:
    - префікс
    - основа
    - закінчення
    explanation: Перед коренем стоїть префікс. Суфікс — після кореня.
  - sentence: Слова «ліс» і «лісовий» мають різний корінь.
    error: різний
    correction: спільний
    error_type: word
    options:
    - спільний
    - чужий
    - новий
    explanation: Вони мають однаковий (спільний) корінь -ліс-, тому це споріднені
      слова.
  - sentence: Щоб знайти підмет, треба поставити питання «коли?» або «де?».
    error: «коли?» або «де?»
    correction: «хто?» або «що?»
    error_type: phrase
    options:
    - «хто?» або «що?»
    - «який?» або «чия?»
    - «що робить?»
    explanation: Питання «де?» і «коли?» — це для обставини.
  - sentence: 'Вчитель каже: «Вставте помилку в тексті».'
    error: Вставте
    correction: Знайдіть
    error_type: word
    options:
    - Знайдіть
    - Підкресліть
    - Порівняйте
    explanation: Вчителі просять знайти помилку, а не вставити її.
- type: unjumble
