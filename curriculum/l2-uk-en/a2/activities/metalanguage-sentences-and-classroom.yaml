- type: translate
  instruction: Оберіть правильний український переклад для вчительської інструкції
  items:
  - source: Read the sentence.
    options:
    - text: Прочитайте речення.
      correct: true
    - text: Напишіть речення.
      correct: false
    - text: Підкресліть речення.
      correct: false
    - text: Доповніть речення.
      correct: false
  - source: Determine the case.
    options:
    - text: Визначте відмінок.
      correct: true
    - text: Порівняйте відмінок.
      correct: false
    - text: Виберіть відмінок.
      correct: false
    - text: Знайдіть відмінок.
      correct: false
  - source: Give an answer.
    options:
    - text: Дайте відповідь.
      correct: true
    - text: Візьміть відповідь.
      correct: false
    - text: Запишіть відповідь.
      correct: false
    - text: Прочитайте відповідь.
      correct: false
  - source: Insert the missing letters.
    options:
    - text: Вставте пропущені букви.
      correct: true
    - text: Підкресліть пропущені букви.
      correct: false
    - text: Знайдіть пропущені букви.
      correct: false
    - text: Викресліть букви.
      correct: false
  - source: Compare these texts.
    options:
    - text: Порівняйте ці тексти.
      correct: true
    - text: Прочитайте ці тексти.
      correct: false
    - text: Доповніть ці тексти.
      correct: false
    - text: Виберіть ці тексти.
      correct: false
  - source: Underline the subject.
    options:
    - text: Підкресліть підмет.
      correct: true
    - text: Знайдіть присудок.
      correct: false
    - text: Визначте додаток.
      correct: false
    - text: Вставте підмет.
      correct: false
- type: odd-one-out
  instruction: Знайдіть четверте зайве за наголосом. Яке слово має іншу модель наголосу?
  items:
  - words:
    - підмет
    - корінь
    - префікс
    - присудок
    correct: 3
    explanation: У слові «присудок» наголос на другий склад, а в інших — на перший.
  - words:
    - означення
    - додаток
    - основа
    - речення
    correct: 3
    explanation: У слові «речення» наголос на перший склад, а в інших — на другий.
  - words:
    - основа
    - префікс
    - суфікс
    - корінь
    correct: 0
    explanation: У слові «основа» наголос на другий склад, а в інших — на перший.
  - words:
    - закінчення
    - обставина
    - підручник
    - підмет
    correct: 3
    explanation: У слові «підмет» наголос на перший склад, а в інших — на другий.
  - words:
    - додаток
    - корінь
    - підручник
    - основа
    correct: 1
    explanation: У слові «корінь» наголос на перший склад, а в інших — на другий.
  - words:
    - присудок
    - означення
    - суфікс
    - обставина
    correct: 2
    explanation: У слові «суфікс» наголос на перший склад, а в інших — на другий.
