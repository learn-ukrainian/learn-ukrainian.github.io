  instruction: 'Розподіліть фрази: рух (напрямок) чи статика (місце)?'
  groups:
  - label: Напрямок (Куди? - Знахідний відмінок)
    items:
    - йти на роботу
    - їхати в магазин
    - покласти на стіл
    - поїхати в Київ
    - йти в кімнату
  - label: Місце (Де? - Місцевий відмінок)
    items:
    - бути на роботі
    - купувати в магазині
    - лежати на столі
    - жити в Києві
    - стояти в кімнаті
  title: 'Розподіліть фрази: рух (напрямок) чи статика (місце)?'
- id: wb-error-correction-time
  type: error-correction
  instruction: Виправте помилки у виразах часу та описі характеристик
  items:
  - sentence: Ми зустрінемося у наступного тижня.
    error: у наступного тижня
    correction: наступного тижня
    error_type: phrase
    explanation: Фрази зі словом «наступний» використовують родовий відмінок без прийменника.
  - sentence: Я був там минулий рік.
    error: минулий рік
    correction: минулого року
    error_type: phrase
    explanation: Фрази зі словом «минулий» використовують родовий відмінок.
  - sentence: Ми йдемо в кіно у середі.
    error: у середі
    correction: у середу
    error_type: phrase
    explanation: Дні тижня вимагають знахідного відмінка (у/в + що?).
  - sentence: Там стоїть хлопець у червоного светра.
    error: у червоного светра
    correction: у червоному светрі
    error_type: phrase
    explanation: Характеристики (як одяг) використовують місцевий відмінок (у/в +
      чому?).
  - sentence: Це сталося в 2014 рік.
    error: в 2014 рік
    correction: у 2014 році
    error_type: phrase
    explanation: Роки вимагають місцевого відмінка (у/в + якому році?).
  - sentence: Цю неділі я відпочиваю.
    error: Цю неділі
    correction: Цю неділю
    error_type: phrase
    explanation: Ця конструкція використовує знахідний відмінок без прийменника.
  - sentence: Поруч розмовляє жінка в білому пальто.
    error: в білому пальто
    correction: у білому пальті
    error_type: phrase
    explanation: 'Слово «пальто» в українській мові відмінюється: у пальті.'
  - sentence: Я любив грати у футбол у дитинство.
    error: у дитинство
    correction: у дитинстві
    error_type: phrase
    explanation: Періоди життя вимагають місцевого відмінка (у/в + чому?).
  title: Виправте помилки у виразах часу та описі характеристик
- id: wb-fill-in-algorithm
  type: fill-in
  instruction: Застосуйте алгоритм вибору відмінка. Вставте правильне слово.
  items:
  - sentence: Спочатку ми завжди шукаємо ____ у реченні.
    answer: прийменник
    options:
    - прийменник
    - алгоритм
    - контекст
  - sentence: Якщо прийменника немає, ми дивимося на головне ____.
    answer: дієслово
    options:
    - дієслово
    - місце
    - майбутнє
  - sentence: Дієслово часто керує іменником і вимагає конкретного ____.
    answer: відмінка
    options:
    - відмінка
    - напрямку
    - часу
  - sentence: Прийменник «на» дуже часто вказує на ____ або місце.
    answer: напрямок
    options:
    - напрямок
    - час
    - контекст
  - sentence: Коли ви активно рухаєтесь кудись, це напрямок, і вам потрібен ____ відмінок.
    answer: знахідний
    options:
    - знахідний
    - місцевий
    - родовий
  - sentence: Якщо ви вже там знаходитесь і дія статична, це ____.
    answer: місце
    options:
    - місце
    - напрямок
    - час
  - sentence: Тоді для опису статики вам потрібен ____ відмінок.
    answer: місцевий
    options:
    - місцевий
    - знахідний
    - орудний
  - sentence: Для опису одягу людини ми використовуємо ____ відмінок.
    answer: місцевий
    options:
    - місцевий
    - алгоритм
    - прийменник
  title: Застосуйте алгоритм вибору відмінка. Вставте правильне слово.
