- id: true-false-case-pairs
  type: true-false
  instruction: Правда чи ні? Чи правильно використано відмінок?
  items:
  - statement: «Я йду на роботу» — це напрямок, тому використовується знахідний відмінок.
    correct: true
    explanation: Дія спрямована на рух (куди?), тому потрібен знахідний відмінок.
  - statement: «Книга лежить на столу» — це правильна фраза для місця.
    correct: false
    explanation: 'Правильно: на столі (місцевий відмінок).'
  - statement: Дієслово «допомагати» завжди вимагає давального відмінка.
    correct: true
    explanation: Ми допомагаємо (кому?) — це давальний відмінок.
  - statement: Ми кажемо «думати в майбутньому», використовуючи місцевий відмінок.
    correct: false
    explanation: 'Правильно: думати про майбутнє (знахідний відмінок).'
  - statement: «Минулого року» — це родовий відмінок.
    correct: true
    explanation: Для фраз зі словом «минулий» використовується родовий відмінок.
  - statement: Для днів тижня (наприклад, середа) ми кажемо «у середі».
    correct: false
    explanation: 'Правильно: у середу (знахідний відмінок).'
  - statement: «Кава з молоком» вимагає орудного відмінка.
    correct: true
    explanation: Прийменник «з» у значенні «разом» вимагає орудного відмінка.
  - statement: «Вийти з дому» — це також орудний відмінок.
    correct: false
    explanation: Тут прийменник «з» вказує на походження (звідки?), тому це родовий
      відмінок.
  title: Правда чи ні? Чи правильно використано відмінок?
workbook:
- id: wb-error-correction-verbs
  type: error-correction
  instruction: Знайдіть і виправте помилку у реченні
  items:
  - sentence: Я допомагаю сестру.
    error: сестру
    correction: сестрі
    error_type: word
    explanation: Дієслово «допомагати» вимагає давального відмінка.
  - sentence: Він користується новим комп'ютер.
    error: комп'ютер
    correction: комп'ютером
    error_type: word
    explanation: Дієслово «користуватися» вимагає орудного відмінка.
  - sentence: Вона боїться темрява.
    error: темрява
    correction: темряви
    error_type: word
    explanation: Дієслово «боятися» вимагає родового відмінка.
  - sentence: Ми щиро дякуємо вчителів.
    error: вчителів
    correction: вчителям
    error_type: word
    explanation: Дієслово «дякувати» вимагає давального відмінка.
  - sentence: Директор керує велику компанію.
    error: велику компанію
    correction: великою компанією
    error_type: phrase
    explanation: Дієслово «керувати» вимагає орудного відмінка.
  - sentence: Я часто думаю про майбутньому.
    error: майбутньому
    correction: майбутнє
    error_type: word
    explanation: Дієслово «думати про» вимагає знахідного відмінка.
  - sentence: Проєкт потребує інвестиції.
    error: інвестиції
    correction: інвестицій
    error_type: word
    explanation: Дієслово «потребувати» вимагає родового відмінка.
  - sentence: Він телефонує батьки.
    error: батьки
    correction: батькам
    error_type: word
    explanation: Дієслово «телефонувати» вимагає давального відмінка.
  title: Знайдіть і виправте помилку у реченні
