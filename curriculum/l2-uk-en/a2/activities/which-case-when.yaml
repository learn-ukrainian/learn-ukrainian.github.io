version: '1.0'
module: which-case-when
level: a2
workbook:
- id: verb-government-quiz
  type: quiz
  instruction: Оберіть правильну форму слова після дієслова.
  items:
  - question: Студент добре розуміє цей _____.
    options:
    - контекст
    - контексту
    - контекстом
    - контексті
    correct: 0
  - question: На жаль, у мене зараз немає вільного _____.
    options:
    - час
    - часу
    - часом
    - часі
    correct: 1
  - question: Я часто телефоную своєму найкращому _____.
    options:
    - друг
    - друга
    - другові
    - другом
    correct: 2
  - question: Програміст користується новим _____.
    options:
    - алгоритм
    - алгоритму
    - алгоритмом
    - алгоритмі
    correct: 2
  - question: Ми завжди дякуємо нашій _____.
    options:
    - мама
    - маму
    - мамі
    - мамою
    correct: 2
  - question: Маленька дитина дуже боїться великого _____.
    options:
    - собака
    - собаку
    - собаки
    - собакою
    correct: 2
  - question: Директор успішно керує великою _____.
    options:
    - компанія
    - компанію
    - компанією
    - компанії
    correct: 2
  - question: Цей складний проєкт потребує нашої професійної _____.
    options:
    - допомога
    - допомогу
    - допомоги
    - допомогою
    correct: 2
- id: prepositions-cases-sort
  type: group-sort
  instruction: Розподіліть прийменники за відмінком, який вони вимагають у цьому контексті.
  groups:
  - label: Знахідний відмінок
    items:
    - 'в / у (напрямок: куди?)'
    - 'за (подяка: за що?)'
  - label: Місцевий відмінок
    items:
    - 'в / у (місце: де?)'
    - по (рух по чому?)
  - label: Родовий відмінок
    items:
    - 'з (назовні: звідки?)'
    - 'без (відсутність: без чого?)'
  - label: Орудний відмінок
    items:
    - 'з (разом: з ким?)'
    - 'за (позаду: за чим?)'
- id: mixed-cases-fill-in
  type: fill-in
  instruction: Вставте правильну форму слова (час, одяг, шлях).
  items:
  - sentence: Я працюю у _____, тому не можу піти в кіно.
    answer: середу
    options:
    - середа
    - середу
    - середі
  - sentence: Минулого _____ ми їздили в гори.
    answer: тижня
    options:
    - тиждень
    - тижня
    - тижнем
  - sentence: Та красива жінка у синій _____ — моя сестра.
    answer: сукні
    options:
    - сукня
    - сукню
    - сукні
  - sentence: Маленький хлопець у червоному _____ швидко біжить.
    answer: светрі
    options:
    - светр
    - светра
    - светрі
  - sentence: Ми дуже любимо гуляти по старому _____.
    answer: місту
    options:
    - місто
    - міста
    - місту
  - sentence: У _____ я хочу стати хорошим лікарем.
    answer: майбутньому
    options:
    - майбутнє
    - майбутнього
    - майбутньому
  - sentence: Мій брат народився у дві тисячі першому _____.
    answer: році
    options:
    - рік
    - року
    - році
  - sentence: Наступного _____ я хочу поїхати в Україну.
    answer: року
    options:
    - рік
    - року
    - році
- id: case-usage-true-false
  type: true-false
  instruction: Прочитайте речення і визначте, чи правильно використано відмінок.
  items:
  - statement: Я щодня йду на роботі о восьмій годині.
    correct: false
    explanation: 'Для напрямку (куди?) використовуємо Знахідний відмінок: на роботу.'
  - statement: Зараз він сидить у чорному капелюсі.
    correct: true
    explanation: Для опису одягу використовуємо Місцевий відмінок із прийменником
      у/в.
  - statement: Ми часто думаємо про нашій Україні.
    correct: false
    explanation: 'Після прийменника «про» завжди використовується Знахідний відмінок:
      про нашу Україну.'
  - statement: Я дуже дякую вас за допомогу.
    correct: false
    explanation: 'Дієслово «дякувати» вимагає Давального відмінка: дякую вам.'
  - statement: Вони зараз відпочивають на морі.
    correct: true
    explanation: Для статичного місця (де?) використовуємо Місцевий відмінок.
  - statement: Моя сестра цікавиться українською історією.
    correct: true
    explanation: Дієслово «цікавитися» правильно вимагає Орудного відмінка.
  - statement: У мене сьогодні немає вільний час.
    correct: false
    explanation: 'Слово «немає» вимагає Родового відмінка: немає вільного часу.'
  - statement: Я допомагаю свого молодшого брата.
    correct: false
    explanation: 'Дієслово «допомагати» вимагає Давального відмінка: допомагаю своєму
      молодшому брату (братові).'
