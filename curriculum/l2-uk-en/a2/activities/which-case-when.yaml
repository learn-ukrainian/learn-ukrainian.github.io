version: '1.0'
module: which-case-when
level: a2
inline:
- id: group-sort-sort-prepositions-by-which-case-s-they-govern-acc-gen-instr-loc
  type: group-sort
  instruction: Розподіліть фрази за відмінками
  groups:
  - label: Знахідний відмінок (Accusative)
    items:
    - покласти на стіл
    - йти в магазин
    - думати про план
    - подякувати за допомогу
  - label: Родовий відмінок (Genitive)
    items:
    - для журналістів
    - приїхати з Києва
    - минулого року
  - label: Орудний відмінок (Instrumental)
    items:
    - кава з молоком
    - сидіти за столом
    - користуватися комп'ютером
  - label: Місцевий відмінок (Locative)
    items:
    - лежати на столі
    - бути в магазині
    - бігати по кімнаті
  title: Розподіліть фрази за відмінками
