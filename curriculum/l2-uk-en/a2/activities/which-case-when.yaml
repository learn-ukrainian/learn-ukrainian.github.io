version: '1.0'
module: which-case-when
level: a2
inline:
- id: quiz-verb-case
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: Я бачу _____
    options:
    - друга
    - другу
    - другом
    - друг
    correct: 0
  - question: Вона допомагає _____
    options:
    - маму
    - мамі
    - мамою
    - мама
    correct: 1
  - question: Ми користуємося _____
    options:
    - комп'ютера
    - комп'ютер
    - комп'ютером
    - комп'ютеру
    correct: 2
  - question: Він боїться _____
    options:
    - вовку
    - вовка
    - вовком
    - вовк
    correct: 1
  - question: Я думаю про _____
    options:
    - майбутнє
    - майбутнього
    - майбутньому
    - майбутнім
    correct: 0
  - question: Ми дякуємо _____
    options:
    - вчителя
    - вчителем
    - вчитель
    - вчителю
    correct: 3
  - question: Брат цікавиться _____
    options:
    - історії
    - історію
    - історією
    - історія
    correct: 2
  - question: У мене немає _____
    options:
    - час
    - часом
    - часі
    - часу
    correct: 3
- id: group-sort-prepositions
  type: group-sort
  instruction: Розподіліть прийменники за відмінком, який вони вимагають
  groups:
  - label: Вимагає Родового відмінка (Кого? Чого?)
    items:
    - для
    - біля
    - до
    - без
  - label: Вимагає Місцевого відмінка (Де? По чому?)
    items:
    - по
    - в/у (місце)
    - на (місце)
  - label: Вимагає Знахідного відмінка (Кого? Що? Куди?)
    items:
    - про
    - через
    - за (ціна)
    - на (напрямок)
  - label: Вимагає Орудного відмінка (Ким? Чим?)
    items:
    - з/із (разом)
    - за (позаду)
- id: fill-in-mixed-triggers
  type: fill-in
  instruction: Вставте правильне слово
  items:
  - sentence: Ми зустрінемося у _____.
    answer: понеділок
    options:
    - понеділок
    - понеділку
    - понеділка
    - понеділком
  - sentence: Вона народилася у 2024 _____.
    answer: році
    options:
    - рік
    - році
    - роком
    - року
  - sentence: Хто ця дівчина в _____?
    answer: окулярах
    options:
    - окуляри
    - окулярах
    - окулярів
    - окулярами
  - sentence: Ми гуляємо по _____.
    answer: парку
    options:
    - парк
    - парку
    - парком
    - парки
  - sentence: Нам треба перейти через _____.
    answer: дорогу
    options:
    - дорога
    - дорозі
    - дорогу
    - дорогою
  - sentence: Я зроблю це за _____.
    answer: годину
    options:
    - годині
    - годину
    - години
    - годиною
  - sentence: _____ я сиджу вдома.
    answer: Цю неділю
    options:
    - Цієї неділі
    - Цій неділі
    - Цю неділю
    - Цією неділею
  - sentence: Я поїду туди наступного _____.
    answer: тижня
    options:
    - тиждень
    - тижню
    - тижня
    - тижнем
- id: true-false-case-logic
  type: true-false
  instruction: Правда чи ні? Чи правильно використаний відмінок?
  items:
  - statement: Я йду на роботі.
    correct: false
    explanation: 'Напрямок (куди?) вимагає Знахідного відмінка: на роботу.'
  - statement: Ми сидимо за столом.
    correct: true
    explanation: 'Місце (позаду) вимагає Орудного відмінка: за столом.'
  - statement: Кіт бігає по кімната.
    correct: false
    explanation: 'Прийменник «по» для руху вимагає Місцевого відмінка: по кімнаті.'
  - statement: Я дякую маму.
    correct: false
    explanation: 'Дієслово «дякувати» вимагає Давального відмінка: мамі.'
  - statement: Він боїться собаку.
    correct: false
    explanation: 'Дієслово «боятися» вимагає Родового відмінка: собаки.'
  - statement: Це подарунок для брата.
    correct: true
    explanation: Прийменник «для» завжди вимагає Родового відмінка.
  - statement: Вона цікавиться музикою.
    correct: true
    explanation: Дієслово «цікавитися» вимагає Орудного відмінка.
  - statement: Ми говоримо про політиці.
    correct: false
    explanation: 'Прийменник «про» вимагає Знахідного відмінка: про політику.'
workbook:
- id: match-up-verbs-cases
  type: match-up
  instruction: З'єднайте дієслово або прийменник з відмінком, який воно вимагає
  pairs:
  - left: дякувати
    right: Давальний (кому?)
  - left: користуватися
    right: Орудний (чим?)
  - left: боятися
    right: Родовий (кого?)
  - left: бачити
    right: Знахідний (кого?)
  - left: думати про
    right: Знахідний (що?)
  - left: допомагати
    right: Давальний (кому?)
- id: fill-in-cases-workbook
  type: fill-in
  instruction: Вставте іменник у правильній відмінковій формі
  items:
  - sentence: Він телефонує (сестра) _____.
    answer: сестрі
  - sentence: Я бачу (друг) _____.
    answer: друга
  - sentence: Ми цікавимося (історія) _____.
    answer: історією
  - sentence: У мене немає (час) _____.
    answer: часу
  - sentence: Діти йдуть в (школа) _____.
    answer: школу
  - sentence: Я працюю на (робота) _____.
    answer: роботі
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінку
  items:
  - sentence: Я допомагаю маму.
    error: маму
    correction: мамі
    error_type: word
    options:
    - мамі
    - мамою
    - мама
    explanation: Дієслово «допомагати» вимагає Давального відмінка (кому?).
  - sentence: Він користується ручка.
    error: ручка
    correction: ручкою
    error_type: word
    options:
    - ручку
    - ручкою
    - ручці
    explanation: Дієслово «користуватися» вимагає Орудного відмінка (чим?).
  - sentence: Ми дякуємо вчителя.
    error: вчителя
    correction: вчителю
    error_type: word
    options:
    - вчителю
    - вчителем
    - вчитель
    explanation: Дієслово «дякувати» вимагає Давального відмінка (кому?).
  - sentence: Кіт бігає по кімнату.
    error: кімнату
    correction: кімнаті
    error_type: word
    options:
    - кімнаті
    - кімнатою
    - кімната
    explanation: Прийменник «по» (рух поверхнею) вимагає Місцевого відмінка (по чому?).
  - sentence: Я думаю про майбутньому.
    error: майбутньому
    correction: майбутнє
    error_type: word
    options:
    - майбутнє
    - майбутнього
    - майбутнім
    explanation: Прийменник «про» вимагає Знахідного відмінка (про що?).
  - sentence: Це подарунок для мама.
    error: мама
    correction: мами
    error_type: word
    options:
    - мами
    - мамі
    - маму
    explanation: Прийменник «для» вимагає Родового відмінка (для кого?).
- id: unjumble-case-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - допомагаю
    - мамі
    - Я
    - вдома.
    correct_order:
    - Я
    - допомагаю
    - мамі
    - вдома.
  - words:
    - боїться
    - собаки.
    - Він
    - великої
    correct_order:
    - Він
    - боїться
    - великої
    - собаки.
  - words:
    - говоримо
    - Ми
    - про
    - майбутнє.
    correct_order:
    - Ми
    - говоримо
    - про
    - майбутнє.
  - words:
    - користується
    - новим
    - Вона
    - комп'ютером.
    correct_order:
    - Вона
    - користується
    - новим
    - комп'ютером.
  - words:
    - йду
    - Я
    - на
    - роботу.
    correct_order:
    - Я
    - йду
    - на
    - роботу.
  - words:
    - сидить
    - на
    - роботі.
    - Брат
    correct_order:
    - Брат
    - сидить
    - на
    - роботі.
