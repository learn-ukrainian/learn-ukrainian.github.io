  - left: керувати (чим?)
    right: компанією
  - left: платити (за що?)
    right: за квитки
  - left: заважати (кому?)
    right: брату
  title: З'єднайте дієслово з правильною формою іменника
- id: wb-fill-in-prepositions
  type: fill-in
  instruction: Вставте правильний прийменник (на, в, з, за, по, про, для)
  items:
  - sentence: Я щоранку йду ____ роботу.
    answer: на
    options:
    - на
    - в
    - до
  - sentence: Книга вже довго лежить ____ столі.
    answer: на
    options:
    - на
    - в
    - по
  - sentence: Маленькі діти люблять бігати ____ кімнаті.
    answer: по
    options:
    - по
    - на
    - в
  - sentence: Ми часто думаємо ____ майбутнє.
    answer: про
    options:
    - про
    - на
    - за
  - sentence: Я хочу подякувати ____ допомогу.
    answer: за
    options:
    - за
    - на
    - про
  - sentence: Це смачна кава ____ молоком.
    answer: з
    options:
    - з
    - від
    - для
  - sentence: Мій друг приїхав ____ Києва.
    answer: з
    options:
    - з
    - в
    - на
  - sentence: Цей зал підготували ____ журналістів.
    answer: для
    options:
    - для
    - про
    - на
  title: Вставте правильний прийменник (на, в, з, за, по, про, для)
- id: wb-group-sort-direction
