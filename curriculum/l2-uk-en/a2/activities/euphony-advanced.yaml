- id: quiz-concepts
  type: quiz
  instruction: Оберіть правильну відповідь на запитання про милозвучність.
  items:
  - question: Що означає слово «милозвучність»?
    options:
    - Мелодійність мови
    - Складна граматика
    - Швидкість мовлення
    - Правила пунктуації
    correct: 0
  - question: Яка головна мета чергування у/в та з/із/зі?
    options:
    - Уникати важких збігів звуків
    - Робити речення довшими
    - Змінювати значення слів
    - Показувати повагу
    correct: 0
  - question: Що відбувається з правилом після коми або крапки?
    options:
    - Фонетичний контекст оновлюється
    - Правило не працює
    - Завжди ставимо «в»
    - Завжди ставимо «з»
    correct: 0
  - question: Який сполучник ми використовуємо для філософських або контрастних понять
      (наприклад, добро ... зло)?
    options:
    - і
    - й
    - та
    - з
    correct: 0
  - question: Що означає термін «збіг» у контексті фонетики?
    options:
    - Скупчення однакових типів звуків
    - Швидка розмова
    - Закінчення речення
    - Правильний наголос
    correct: 0
  - question: Який сполучник ніколи не змінює свою форму і працює між будь-якими звуками?
    options:
    - та
    - і
    - й
    - у
    correct: 0
  - question: Чому ми кажемо «у вікно», а не «в вікно»?
    options:
    - Щоб уникнути збігу звуку «в»
    - Бо це виняток для іменників середнього роду
    - Бо слово коротке
    - Бо так красивіше на письмі
    correct: 0
  - question: 'Яку форму прийменника треба вжити: лист ___ Бразилії?'
    options:
    - із
    - з
    - зі
    - в
    correct: 0
