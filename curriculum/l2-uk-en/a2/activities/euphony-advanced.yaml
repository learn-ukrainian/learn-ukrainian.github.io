    answer: і
    options:
    - і
    - й
    - та
  - sentence: Він прийшов, ____ ми поїхали.
    answer: і
    options:
    - і
    - й
    - та
  - sentence: Вона заспівала, ____ усі заплакали.
    answer: і
    options:
    - і
    - й
    - та
  - sentence: Ми купили хліб ____ масло.
    answer: і
    options:
    - і
    - й
    - та
  - sentence: Я люблю каву ____ молоко.
    answer: й
    options:
    - і
    - й
    - та
  - sentence: 'Ми завжди кажемо: Одеса ____ Ялта.'
    answer: і
    options:
    - і
