version: '1.0'
module: euphony-advanced
level: a2
inline:
- id: quiz-euphony-variants
  type: quiz
  instruction: Оберіть правильний варіант (у чи в)
  items:
  - question: Де зараз Максим? Він _____ школі?
    options:
    - у
    - в
    - з
    - із
    correct: 0
  - question: Вона зараз живе _____ Італії.
    options:
    - у
    - в
    - із
    - зі
    correct: 1
  - question: Мій брат працює _____ великій фірмі.
    options:
    - у
    - в
    - і
    - й
    correct: 0
  - question: Я працюю _____ університеті.
    options:
    - в
    - у
    - зі
    - й
    correct: 0
  - question: Вони стояли _____ фоє.
    options:
    - у
    - в
    - із
    - зі
    correct: 0
  - question: Ми зустрінемося _____ понеділок.
    options:
    - в
    - у
    - з
    - і
    correct: 0
- id: fill-in-z-variants
  type: fill-in
  instruction: Вставте правильний прийменник (з, із чи зі)
  items:
  - sentence: Він швидко вийшов _____ кімнати.
    answer: з
    options:
    - з
    - із
    - зі
    - в
  - sentence: Це нова студентка _____ Франції.
    answer: із
    options:
    - з
    - із
    - зі
    - у
  - sentence: Вона забрала речі _____ столу.
    answer: зі
    options:
    - з
    - із
    - зі
    - в
  - sentence: Ви приїхали _____ Львова?
    answer: зі
    options:
    - з
    - із
    - зі
    - й
  - sentence: Поїдеш завтра _____ мною?
    answer: зі
    options:
    - з
    - із
    - зі
    - та
  - sentence: Він приїхав _____ Європи.
    answer: з
    options:
    - з
    - із
    - зі
    - і
- id: match-up-conjunctions
  type: match-up
  instruction: З'єднайте частини речення, звертаючи увагу на милозвучність
  pairs:
  - left: Ольга й
    right: Андрій ідуть у кіно.
  - left: Тут є кава і
    right: яблука.
  - left: Надворі тепло й
    right: затишно.
  - left: Вона співала, і
    right: всі слухали.
  - left: Там стоять мама та
    right: тато.
  - left: Її син і
    right: мати живуть тут.
workbook:
- type: group-sort
  instruction: Який прийменник треба вживати перед цими словами на початку речення?
  groups:
  - label: Пишемо «У»
    items:
    - Львові
    - Франції
    - школі
    - філармонії
  - label: Пишемо «В»
    items:
    - Одесі
    - Італії
    - Америці
    - університеті
- type: true-false
  instruction: Чи правильно вжито прийменники та сполучники? (Правда чи ні?)
  items:
  - statement: Я працюю в школі.
    correct: false
    explanation: 'Правильно: у школі.'
  - statement: Вона живе в Одесі.
    correct: true
    explanation: Між голосними пишемо «в».
  - statement: Вони вийшли із кімнати.
    correct: false
    explanation: 'Правильно: з кімнати (немає складного збігу).'
  - statement: Ти поїдеш зі мною?
    correct: true
    explanation: Форма «зі» розбиває важкий збіг «мн».
  - statement: Там є кава й яблука.
    correct: false
    explanation: Слово «яблука» має прихований звук [й], тому пишемо «і яблука».
  - statement: Брат і сестра ідуть додому.
    correct: true
    explanation: Між приголосними пишемо «і».
- type: unjumble
  instruction: Складіть правильне речення зі слів (зважайте на милозвучність)
  items:
  - words:
    - у
    - великій
    - Він
    - фірмі.
    - працює
    correct_order:
    - Він
    - працює
    - у
    - великій
    - фірмі.
  - words:
    - забрала
    - речі
    - Вона
    - зі
    - столу.
    correct_order:
    - Вона
    - забрала
    - речі
    - зі
    - столу.
  - words:
    - в
    - понеділок
    - Ми
    - повернемося
    - уранці.
    correct_order:
    - Ми
    - повернемося
    - в
    - понеділок
    - уранці.
  - words:
    - у
    - Ольга
    - й
    - Андрій
    - ідуть
    - кіно.
    correct_order:
    - Ольга
    - й
    - Андрій
    - ідуть
    - у
    - кіно.
  - words:
    - студентка
    - із
    - Це
    - Франції.
    - нова
    correct_order:
    - Це
    - нова
    - студентка
    - із
    - Франції.
  - words:
    - гуляю
    - з
    - Я
    - зараз
    - мамою.
    correct_order:
    - Я
    - зараз
    - гуляю
    - з
    - мамою.
- type: translate
  instruction: Оберіть правильний переклад, що зберігає милозвучність української
    мови
  items:
  - source: I study at school.
    options:
    - text: Я вчуся у школі.
      correct: true
    - text: Я вчуся в школі.
      correct: false
  - source: He is from Lviv.
    options:
    - text: Він зі Львова.
      correct: true
    - text: Він з Львова.
      correct: false
  - source: She is from France.
    options:
    - text: Вона із Франції.
      correct: true
    - text: Вона з Франції.
      correct: false
  - source: Will you go with me?
    options:
    - text: Ти підеш зі мною?
      correct: true
    - text: Ти підеш з мною.
      correct: false
  - source: Coffee and apples.
    options:
    - text: Кава і яблука.
      correct: true
    - text: Кава й яблука.
      correct: false
  - source: Odesa and Yalta.
    options:
    - text: Одеса і Ялта.
      correct: true
    - text: Одеса й Ялта.
      correct: false
