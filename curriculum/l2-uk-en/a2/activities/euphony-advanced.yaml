- id: match-up-match-sentence-beginnings-with-euphonically-correct-continuations
  type: match-up
  instruction: З'єднайте початок речення з правильним закінченням.
  pairs:
  - left: Мій брат зараз
    right: у школі.
  - left: Моя сестра живе
    right: в Одесі.
  - left: Студенти вчаться
    right: в університеті.
  - left: Ми довго дивилися
    right: у вікно.
  - left: Вчора він був
    right: у Львові.
  - left: Вона має успіх
    right: у творчості.
  - left: Зараз дуже тихо
    right: у лісі.
  - left: Він швидко увійшов
    right: до кімнати.
