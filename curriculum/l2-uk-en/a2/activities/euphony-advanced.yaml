- id: workbook-translate-euphony
  type: translate
  instruction: Оберіть правильний переклад, який відповідає правилам української милозвучності.
  items:
  - source: Where is Maksym now? Is he at school?
    options:
    - text: Де зараз Максим? Він у школі?
      correct: true
    - text: Де зараз Максим? Він в школі?
      correct: false
  - source: She read, the auditorium was quiet.
    options:
    - text: Вона читала, в аудиторії було тихо.
      correct: true
    - text: Вона читала, у аудиторії було тихо.
      correct: false
  - source: Are you walking with sister?
    options:
    - text: Ти гуляєш із сестрою?
      correct: true
    - text: Ти гуляєш з сестрою?
      correct: false
  - source: Are you walking from school now?
    options:
    - text: Ти зараз ідеш зі школи?
      correct: true
    - text: Ти зараз ідеш із школи?
      correct: false
  - source: This is Olena and her brother.
    options:
    - text: Це Олена і її брат.
      correct: true
    - text: Це Олена й її брат.
      correct: false
  - source: We finished, and the concert ended.
    options:
    - text: Ми закінчили, і концерт завершився.
      correct: true
    - text: Ми закінчили, й концерт завершився.
      correct: false
- id: workbook-odd-one-out-euphony
  type: odd-one-out
  instruction: Яка фраза порушує правила милозвучності (звучить неправильно)?
  items:
  - words:
    - був у парку
    - був в парку
    - була в парку
    correct: 1
    explanation: Після приголосного (був) перед приголосним (п) потрібно писати «у».
  - words:
    - у Львові
    - в Львові
    - до Львова
    correct: 1
    explanation: Перед «льв» завжди пишемо «у», щоб уникнути збігу «в льв».
  - words:
    - з школою
    - зі школою
    - до школи
    correct: 0
    explanation: Перед важким збігом «шк» потрібно писати «зі».
  - words:
    - Ольга й Андрій
    - Марія й Іван
    - Анна й Яна
    correct: 2
    explanation: 'Перед «я», «ю», «є», «ї» ми ніколи не ставимо «й». Правильно: «Анна
      і Яна».'
  - words:
    - читала вранці
    - пив вранці
    - пив уранці
    correct: 1
    explanation: Після приголосного (пив) перед приголосним (р) краще звучить «уранці».
  - words:
    - лист з Франції
    - лист із Франції
    - лист від Франції
    correct: 0
    explanation: Між приголосними та перед «ф» краще звучить «із».
- id: workbook-true-false-euphony
  type: true-false
  instruction: Правда чи ні? Перевірте свої знання правил милозвучності.
  items:
  - statement: Після коми ми завжди пишемо «й», якщо попереднє слово закінчується
      на голосний.
    correct: false
    explanation: Кома — це пауза, вона починає новий ритм, тому ми використовуємо
      «і».
  - statement: Слова «зі мною» та «зі школи» — це правильні форми, бо вони уникають
      важкого збігу приголосних.
    correct: true
    explanation: Форма «зі» пом'якшує важкі збіги приголосних.
  - statement: Перед словами, які починаються на «й», «я», «ю», «є», «ї», не можна
      ставити сполучник «й».
    correct: true
    explanation: Це правило забороненого збігу, ми завжди ставимо «і» перед цими літерами.
  - statement: Ми завжди пишемо «у» перед словами, що починаються на «в», «ф», «хв»,
      «св», «льв».
    correct: true
    explanation: Це обов'язкове правило, щоб уникнути складного звукового стику.
  - statement: Сполучник «та» не підпорядковується правилам чергування і може використовуватися
      в будь-якій позиції.
    correct: true
    explanation: «Та» — це стабільне слово, яке ідеально працює в будь-якому фонетичному
      середовищі.
  - statement: Українська мова уникає збігу голосних і приголосних, щоб звучати більш
      мелодійно.
    correct: true
    explanation: Саме це робить мову такою милозвучною (евфонічною).
