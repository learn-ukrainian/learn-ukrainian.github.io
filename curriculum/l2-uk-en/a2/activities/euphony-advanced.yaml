- id: group-sort-prepositions
  type: group-sort
  instruction: Розподіліть слова за формою прийменника, яку треба вжити перед ними.
  groups:
  - label: Форма «з»
    items:
    - братом
    - Оленою
    - Києва
    - міста
  - label: Форма «із»
    items:
    - села
    - Запоріжжя
    - Бразилії
    - Франції
  - label: Форма «зі»
    items:
    - школи
    - Львова
    - сходу
    - мною
- id: true-false-rules
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Ми завжди кажемо «в вікно».
    correct: false
    explanation: Слово починається на «в», тому завжди використовуємо «у вікно».
  - statement: Після коми ми завжди пишемо «і».
    correct: true
    explanation: Кома створює паузу, тому фонетичний контекст оновлюється.
  - statement: Правильно казати «зі мною».
    correct: true
    explanation: Скупчення «мн» незручне, тому обов'язково використовуємо форму «зі».
  - statement: Перед словом «Львів» ми можемо використовувати прийменник «в».
    correct: false
    explanation: Слово починається на важке скупчення з літерою «в» (льв), тому завжди
      використовуємо «у Львові».
  - statement: Сполучник «та» ніколи не змінює свою форму.
    correct: true
    explanation: Він працює між будь-якими звуками і не має чергування.
  - statement: Ми пишемо «Ольга й Андрій», бо тут є два голосні звуки.
    correct: true
    explanation: Між двома голосними використовуємо «й».
  - statement: Правильно казати «з школи».
    correct: false
    explanation: Слово починається на «ш» (шиплячий звук), тому треба казати «зі школи».
  - statement: Чергування у/в залежить від того, чи закінчується попереднє слово на
      голосний або приголосний.
    correct: true
    explanation: Саме так працює основне правило милозвучності.
- id: error-correction-more
  type: error-correction
  instruction: Знайдіть і виправте помилку.
  items:
  - sentence: Він працює в фірмі.
    error: в
    correction: у
    error_type: word
    options:
    - у
    - в
    - із
    explanation: Слово починається на «ф», тому використовуємо «у».
  - sentence: Вони живуть в Львові.
    error: в
    correction: у
    error_type: word
    options:
    - у
    - в
    - зі
    explanation: Слово починається на скупчення «Льв», тому використовуємо «у».
  - sentence: Син й мати.
    error: й
    correction: і
    error_type: word
    options:
    - і
    - й
    - та
    explanation: Між двома приголосними звуками ми використовуємо «і».
  - sentence: Ми поїдемо в Одесу й Ялту.
    error: й
    correction: і
    error_type: word
    options:
    - і
    - й
    - та
    explanation: Перед словами, що починаються на я, ю, є, ї, завжди ставимо «і».
  - sentence: Він прийшов, й ми сіли.
    error: й
    correction: і
    error_type: word
    options:
    - і
    - й
    - та
    explanation: Після коми або паузи потрібно вживати «і».
  - sentence: Ми говорили про добро й зло.
    error: й
    correction: і
    error_type: word
    options:
    - і
    - й
    - та
    explanation: Для контрастних або філософських понять зберігаємо «і».
  - sentence: Вона дивилася в вікно.
    error: в
    correction: у
    error_type: word
    options:
    - у
    - в
    - з
    explanation: Перед словом, що починається на «в», завжди ставимо «у».
  - sentence: Вони вийшли з школи.
    error: з
    correction: зі
    error_type: word
    options:
    - з
    - із
    - зі
    explanation: Перед «шк» завжди вживається «зі».
