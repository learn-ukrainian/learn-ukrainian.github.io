version: '1.0'
module: all-cases-practice
level: a2
workbook:
- id: quiz-cases
  type: quiz
  instruction: Визначте відмінок виділеного слова та поясніть чому
  items:
  - question: Ми йдемо до **лікарні**.
    options:
    - Родовий відмінок
    - Знахідний відмінок
    - Давальний відмінок
    - Місцевий відмінок
    correct: 0
    explanation: Прийменник «до» (куди?) завжди вимагає родового відмінка.
  - question: Лікар дав рецепт **пацієнту**.
    options:
    - Називний відмінок
    - Знахідний відмінок
    - Давальний відмінок
    - Орудний відмінок
    correct: 2
    explanation: Пацієнт — це отримувач дії (кому?), тому використовуємо давальний
      відмінок.
  - question: Вони милуються **Карпатами**.
    options:
    - Називний відмінок
    - Знахідний відмінок
    - Місцевий відмінок
    - Орудний відмінок
    correct: 3
    explanation: Дієслово «милуватися» (чим?) завжди вимагає орудного відмінка.
  - question: У мене немає **температури**.
    options:
    - Родовий відмінок
    - Давальний відмінок
    - Знахідний відмінок
    - Місцевий відмінок
    correct: 0
    explanation: Слово «немає» (кого/чого?) вимагає родового відмінка.
  - question: '**Оксано**, привіт!'
    options:
    - Називний відмінок
    - Давальний відмінок
    - Знахідний відмінок
    - Кличний відмінок
    correct: 3
    explanation: При звертанні до особи ми використовуємо кличний відмінок.
  - question: Ми їдемо до Києва **потягом**.
    options:
    - Родовий відмінок
    - Давальний відмінок
    - Знахідний відмінок
    - Орудний відмінок
    correct: 3
    explanation: Спосіб пересування (чим?) виражається орудним відмінком без прийменника.
  - question: '**Друзі** прийдуть о сьомій годині.'
    options:
    - Називний відмінок
    - Знахідний відмінок
    - Кличний відмінок
    - Місцевий відмінок
    correct: 0
    explanation: Підмет, який виконує дію (хто?), завжди стоїть у називному відмінку.
  - question: Я зараз у **лікарні**.
    options:
    - Родовий відмінок
    - Знахідний відмінок
    - Орудний відмінок
    - Місцевий відмінок
    correct: 3
    explanation: Розташування з прийменником «у/в» (де?) вимагає місцевого відмінка.
- id: fill-in-dialogue-cases
  type: fill-in
  instruction: Доповніть діалог словами у правильному відмінку
  items:
  - sentence: — Привіт, ____! Як справи?
    answer: Оксано
    options:
    - Оксана
    - Оксано
    - Оксані
    - Оксану
  - sentence: — Привіт! Я організовую ____ на вихідні.
    answer: вечірку
    options:
    - вечірка
    - вечірки
    - вечірку
    - вечіркою
  - sentence: — Класно! Але в мене немає ____ для іменинника.
    answer: подарунків
    options:
    - подарунки
    - подарунків
    - подарунками
    - подарунках
  - sentence: — Це не проблема. Головне — твоє ____.
    answer: здоров'я
    options:
    - здоров'я
    - здоров'ям
    - здоров'ю
    - здоров'ї
  - sentence: — Дякую! Я щойно розмовляла з ____.
    answer: лікарем
    options:
    - лікар
    - лікаря
    - лікарем
    - лікарю
  - sentence: — Він сказав, що мені треба відпочивати у ____.
    answer: ліжку
    options:
    - ліжко
    - ліжку
    - ліжком
    - ліжка
  - sentence: — Тоді я принесу ____ трохи фруктів.
    answer: тобі
    options:
    - ти
    - тебе
    - тобі
    - тобою
  - sentence: — Дякую! Я буду рада бачити ____!
    answer: друзів
    options:
    - друзі
    - друзів
    - друзям
    - друзями
- id: match-up-cases
  type: match-up
  instruction: З'єднайте частини речень так, щоб відмінки логічно збігалися
  pairs:
  - left: Лікар виписав рецепт
    right: хворому пацієнту.
  - left: Ми дуже любимо милуватися
    right: високими Карпатами.
  - left: В аптеці я купив багато
    right: ефективних ліків.
  - left: На вихідних ми організуємо
    right: велику вечірку.
  - left: Мій друг зараз знаходиться в
    right: сучасній лікарні.
  - left: У мене зовсім немає
    right: високої температури.
  - left: На свято ми запросили
    right: найкращих друзів.
  - left: Ми поїдемо до Києва
    right: нічним потягом.
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінку
  items:
  - sentence: Я допомагаю пацієнт знайти аптеку.
    error: пацієнт
    correction: пацієнту
    error_type: word
    options:
    - пацієнта
    - пацієнту
    - пацієнтом
    - пацієнті
    explanation: Дієслово «допомагати» вимагає давального відмінка (кому?).
  - sentence: У нас на вечірці було багато гості.
    error: гості
    correction: гостей
    error_type: word
    options:
    - гості
    - гостей
    - гостям
    - гостями
    explanation: Після слова «багато» використовуємо родовий відмінок множини (кого/чого?).
  - sentence: Ми довго милувалися Карпати.
    error: Карпати
    correction: Карпатами
    error_type: word
    options:
    - Карпат
    - Карпатам
    - Карпатами
    - Карпатах
    explanation: Дієслово «милуватися» вимагає орудного відмінка (ким/чим?).
  - sentence: Хворий чекає на лікаря у лікарня.
    error: лікарня
    correction: лікарні
    error_type: word
    options:
    - лікарню
    - лікарні
    - лікарнею
    - лікарнях
    explanation: Прийменник «у» (де?) вимагає місцевого відмінка (на/у кому/чому?).
  - sentence: Лікар, випишіть мені рецепт!
    error: Лікар
    correction: Лікарю
    error_type: word
    options:
    - Лікаря
    - Лікарю
    - Лікареві
    - Лікарем
    explanation: При звертанні потрібно використовувати кличний відмінок.
  - sentence: У пацієнта немає температура.
    error: температура
    correction: температури
    error_type: word
    options:
    - температура
    - температуру
    - температури
    - температурою
    explanation: При запереченні (немає) використовується родовий відмінок (кого/чого?).
  - sentence: Оксана організовує вечірка для друзів.
    error: вечірка
    correction: вечірку
    error_type: word
    options:
    - вечірка
    - вечірки
    - вечірку
    - вечіркою
    explanation: Прямий додаток (що організовує?) стоїть у знахідному відмінку (кого/що?).
