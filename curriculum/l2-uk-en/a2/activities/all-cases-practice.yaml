- type: quiz
  title: "Визначте відмінок"
  instruction: "До якого відмінка належить питання або функція?"
  items:
    - question: "На які питання відповідає називний відмінок?"
      explanation: "Називний відмінок відповідає на питання хто? що?"
      options:
        - text: "хто? що?"
          correct: true
        - text: "кого? чого?"
          correct: false
        - text: "кому? чому?"
          correct: false
        - text: "ким? чим?"
          correct: false
    - question: "Який відмінок відповідає на питання кого? чого?"
      explanation: "Родовий відмінок відповідає на питання кого? чого?"
      options:
        - text: "Родовий"
          correct: true
        - text: "Давальний"
          correct: false
        - text: "Орудний"
          correct: false
        - text: "Місцевий"
          correct: false
    - question: "Як запитати про давальний відмінок?"
      explanation: "Питання давального відмінка — кому? чому?"
      options:
        - text: "кому? чому?"
          correct: true
        - text: "на кому? на чому?"
          correct: false
        - text: "ким? чим?"
          correct: false
        - text: "кого? що?"
          correct: false
    - question: "Який відмінок ми використовуємо для прямого об'єкта (дія переходить на предмет)?"
      explanation: "Знахідний відмінок позначає прямий об'єкт."
      options:
        - text: "Знахідний"
          correct: true
        - text: "Орудний"
          correct: false
        - text: "Родовий"
          correct: false
        - text: "Кличний"
          correct: false
    - question: "Який відмінок відповідає на питання ким? чим?"
      explanation: "Орудний відмінок відповідає на питання ким? чим?"
      options:
        - text: "Орудний"
          correct: true
        - text: "Називний"
          correct: false
        - text: "Місцевий"
          correct: false
        - text: "Давальний"
          correct: false
    - question: "Який відмінок ЗАВЖДИ використовується з прийменником?"
      explanation: "Місцевий відмінок ніколи не вживається без прийменника."
      options:
        - text: "Місцевий"
          correct: true
        - text: "Знахідний"
          correct: false
        - text: "Родовий"
          correct: false
        - text: "Орудний"
          correct: false
    - question: "Який відмінок потрібен після слова 'немає'?"
      explanation: "Після слова 'немає' ми завжди використовуємо родовий відмінок."
      options:
        - text: "Родовий"
          correct: true
        - text: "Називний"
          correct: false
        - text: "Знахідний"
          correct: false
        - text: "Кличний"
          correct: false
    - question: "Який відмінок ми використовуємо для звертання до людини?"
      explanation: "Кличний відмінок служить тільки для звертання."
      options:
        - text: "Кличний"
          correct: true
        - text: "Називний"
          correct: false
        - text: "Давальний"
          correct: false
        - text: "Місцевий"
          correct: false
    - question: "У якому відмінку стоїть слово 'братом' у реченні 'Я говорю з братом'?"
      explanation: "Слово 'братом' відповідає на питання 'з ким?' — це орудний відмінок."
      options:
        - text: "Орудний"
          correct: true
        - text: "Давальний"
          correct: false
        - text: "Знахідний"
          correct: false
        - text: "Місцевий"
          correct: false
    - question: "У якому відмінку стоїть слово 'судді' у реченні 'Я даю паспорт судді'?"
      explanation: "Слово 'судді' відповідає на питання 'кому?' — це давальний відмінок."
      options:
        - text: "Давальний"
          correct: true
        - text: "Родовий"
          correct: false
        - text: "Місцевий"
          correct: false
        - text: "Називний"
          correct: false
    - question: "Як правильно вказати вік (наприклад, 25 років)?"
      explanation: "Для віку ми використовуємо давальний відмінок (Мені 25 років)."
      options:
        - text: "Мені 25 років"
          correct: true
        - text: "Я 25 років"
          correct: false
        - text: "Я є 25 років"
          correct: false
        - text: "Мене 25 років"
          correct: false
    - question: "Чому ми кажемо 'Я бачу друга', а не 'Я бачу друг'?"
      explanation: "Для живих істот чоловічого роду знахідний відмінок дорівнює родовому."
      options:
        - text: "Бо це жива істота"
          correct: true
        - text: "Бо це місцевий відмінок"
          correct: false
        - text: "Бо після слова бачу йде називний"
          correct: false
        - text: "Бо це жіночий рід"
          correct: false
    - question: "Яке з цих слів стоїть у кличному відмінку?"
      explanation: "'Друже' — це форма кличного відмінка від слова 'друг'."
      options:
        - text: "друже"
          correct: true
        - text: "друга"
          correct: false
        - text: "другові"
          correct: false
        - text: "другом"
          correct: false
    - question: "До якого відмінка належить питання на чому?"
      explanation: "Питання з прийменником (на чому?) вказує на місцевий відмінок."
      options:
        - text: "Місцевий"
          correct: true
        - text: "Родовий"
          correct: false
        - text: "Давальний"
          correct: false
        - text: "Орудний"
          correct: false
    - question: "Яку функцію в реченні виконує називний відмінок?"
      explanation: "Називний відмінок зазвичай є підметом (суб'єктом) у реченні."
      options:
        - text: "Суб'єкт (хто виконує дію)"
          correct: true
        - text: "Об'єкт (на кого діють)"
          correct: false
        - text: "Інструмент дії"
          correct: false
        - text: "Місце дії"
          correct: false

