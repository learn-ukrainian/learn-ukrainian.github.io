- type: error-correction
  title: "Знайдіть і виправте помилку"
  instruction: "У кожному реченні є помилка у використанні відмінка. Знайдіть її та виправте."
  items:
    - sentence: "Він працює лікарні кожного дня."
      error: "лікарні"
      answer: "у лікарні"
      error_type: "construction"
      options: ["у лікарні", "на лікарні", "лікарню", "в лікарню"]
      explanation: "Місцевий відмінок завжди потребує прийменника."
    - sentence: "Я бачу мій новий друг."
      error: "друг"
      answer: "друга"
      error_type: "word"
      options: ["друга", "другові", "другом", "друже"]
      explanation: "Для живих істот чоловічого роду знахідний відмінок має закінчення -а/-я."
    - sentence: "У мене немає документ."
      error: "документ"
      answer: "документа"
      error_type: "word"
      options: ["документа", "документу", "документом", "документі"]
      explanation: "Після слова 'немає' завжди вживається родовий відмінок."
    - sentence: "Брат є 30 років."
      error: "Брат є"
      answer: "Брату"
      error_type: "phrase"
      options: ["Брату", "Брата", "Братом", "Братові є"]
      explanation: "Вік виражається давальним відмінком без дієслова 'є'."
    - sentence: "Пане суддя, я маю питання."
      error: "суддя"
      answer: "судде"
      error_type: "word"
      options: ["судде", "судді", "суддю", "суддею"]
      explanation: "При звертанні потрібно використовувати кличний відмінок."
    - sentence: "Ми їдемо на таксією."
      error: "таксією"
      answer: "таксі"
      error_type: "word"
      options: ["таксі", "таксою", "таксію", "на таксім"]
      explanation: "Слово 'таксі' — іншомовне і не відмінюється."
    - sentence: "Я пишу синя ручка."
      error: "ручка"
      answer: "ручкою"
      error_type: "word"
      options: ["ручкою", "ручку", "ручці", "ручки"]
      explanation: "Інструмент дії виражається орудним відмінком."
    - sentence: "Я даю книга студенту."
      error: "книга"
      answer: "книгу"
      error_type: "word"
      options: ["книгу", "книги", "книгою", "книзі"]
      explanation: "Прямий об'єкт (що даю?) стоїть у знахідному відмінку."
    - sentence: "Сьогодні я вечеряв з мій брат."
      error: "мій брат"
      answer: "моїм братом"
      error_type: "phrase"
      options: ["моїм братом", "мого брата", "моєму брату", "моїм браті"]
      explanation: "Прийменник 'з' вимагає орудного відмінка."
    - sentence: "Олена, дай мені ручку!"
      error: "Олена"
      answer: "Олено"
      error_type: "word"
      options: ["Олено", "Олену", "Олені", "Оленою"]
      explanation: "Звертаючись до людини, використовуйте кличний відмінок."

- type: quiz
  title: "Ситуації та відмінки"
  instruction: "Який відмінок потрібен у цих ситуаціях?"
  items:
    - question: "Ви хочете звернутися до директора. Який відмінок ви використаєте для слова 'директор'?"
      explanation: "Для звертання використовується кличний відмінок."
