version: '1.0'
module: all-cases-practice
level: a2
inline:
- id: quiz-identify-which-case-a-highlighted-noun-is-in-and-explain-why-verb-or-preposition-trigger
  type: quiz
  instruction: Визначте відмінок виділеного слова та поясніть чому
  items:
  - question: У суботу буде **вечірка**. Який це відмінок і чому?
    options:
    - Називний (суб'єкт дії)
    - Знахідний (прямий об'єкт)
    - Родовий (відсутність)
    - Місцевий (місце дії)
    correct: 0
  - question: У нас немає **торта**. Який це відмінок і чому?
    options:
    - Називний (суб'єкт)
    - Родовий (слово «немає»)
    - Знахідний (об'єкт)
    - Орудний (інструмент)
    correct: 1
  - question: Я куплю **сік**. Який це відмінок і чому?
    options:
    - Називний (суб'єкт)
    - Родовий (відсутність)
    - Знахідний (прямий об'єкт)
    - Давальний (отримувач)
    correct: 2
  - question: Який подарунок купимо **Олені**? Який це відмінок і чому?
    options:
    - Називний (суб'єкт)
    - Родовий (кількість)
    - Давальний (отримувач дії)
    - Місцевий (місце)
    correct: 2
  - question: Ми підемо туди з **друзями**. Який це відмінок і чому?
    options:
    - Орудний (прийменник «з», супровід)
    - Давальний (отримувач)
    - Родовий (відсутність)
    - Місцевий (місце)
    correct: 0
  - question: Ми зустрінемося у **кафе**. Який це відмінок і чому?
    options:
    - Давальний (напрямок)
    - Місцевий (прийменник «у», місце)
    - Орудний (інструмент)
    - Родовий (напрямок)
    correct: 1
  - question: Треба написати **друзям**. Який це відмінок і чому?
    options:
    - Давальний (отримувач дії)
    - Місцевий (місце)
    - Орудний (супровід)
    - Знахідний (об'єкт)
    correct: 0
  - question: '**Оксано**, який подарунок купимо? Який це відмінок і чому?'
    options:
    - Називний (суб'єкт)
    - Кличний (пряме звертання)
    - Давальний (отримувач)
    - Знахідний (об'єкт)
    correct: 1
- id: match-up-health-cases
  type: match-up
  instruction: З'єднайте частини речень про здоров'я
  pairs:
  - left: У мене сильно болить
    right: голова.
  - left: У мене висока
    right: температура.
  - left: Купіть ці серйозні ліки
    right: за рецептом.
  - left: Нова аптека знаходиться біля
    right: лікарні.
  - left: Ви прийшли до мене з сильним
    right: кашлем.
  - left: Я чекаю вас на огляд через один
    right: тиждень.
  - left: Що я можу порадити
    right: пацієнтові?
  - left: Вам треба регулярно приймати ці
    right: ліки.
