version: '1.0'
module: all-cases-practice
level: a2
inline:
- id: quiz-identify-case-of-highlighted-nouns-in-the-birthday-dialogue-and-explain-the-trigger
  type: quiz
  instruction: Визначте відмінок виділеного слова.
  items:
  - question: Я можу купити **торт**.
    options:
    - Називний
    - Знахідний
    - Родовий
    - Орудний
    correct: 1
  - question: У нас зовсім немає **соку**.
    options:
    - Називний
    - Давальний
    - Родовий
    - Місцевий
    correct: 2
  - question: Я вже почала дзвонити **друзям**.
    options:
    - Знахідний
    - Давальний
    - Орудний
    - Місцевий
    correct: 1
  - question: Ми прийдемо з великою **компанією**.
    options:
    - Називний
    - Родовий
    - Давальний
    - Орудний
    correct: 3
  - question: Ми будемо зручно сидіти на **терасі**.
    options:
    - Знахідний
    - Родовий
    - Місцевий
    - Кличний
    correct: 2
  - question: Домовилися, **Оксано**!
    options:
    - Називний
    - Знахідний
    - Давальний
    - Кличний
    correct: 3
  - question: '**Іменинник** сам організовує свято.'
    options:
    - Називний
    - Знахідний
    - Родовий
    - Орудний
    correct: 0
  - question: Ми можемо подарувати **Олені** нову книгу.
    options:
    - Знахідний
    - Давальний
    - Родовий
    - Місцевий
    correct: 1
- id: fill-in-rewrite-dialogue-sentences-changing-singular-to-plural-e-g
  type: fill-in
  instruction: Прочитайте міні-діалог і вставте слово в дужках у правильній формі.
    Зверніть увагу на відмінок та множину.
  items:
  - sentence: — Привіт, ____! Як справи?
    answer: Андрію
  - sentence: — Хто прийде на свято? — Прийдуть усі наші ____.
    answer: друзі
  - sentence: — Де ми будемо святкувати? — Ми замовимо стіл у ____.
    answer: ресторані
  - sentence: — Що ти подаруєш Олені? — Я купив кілька цікавих ____.
    answer: книг
  - sentence: — Чим ви будете прикрашати кімнату? — Ми прикрасимо її ____.
    answer: кульками
  - sentence: — Кому ти зараз дзвониш? — Я дзвоню своїм ____.
    answer: друзям
  - sentence: — Скільки людей буде на вечірці? — У нас буде багато ____.
    answer: гостей
  - sentence: — Які у вас плани на літо? — Ми хочемо відвідати багато нових ____.
    answer: міст
- id: match-up-match-sentence-halves-ensuring-case-agreement-with-prepositions-verbs
  type: match-up
  instruction: З'єднайте частини речень, звертаючи увагу на відмінки.
  pairs:
  - left: Ми поїдемо до
    right: красивого Львова.
  - left: Я хочу відвідати
    right: стару Одесу.
  - left: Вони будуть відпочивати в
    right: високих Карпатах.
  - left: Ми гуляли по
    right: вузьких вулицях.
  - left: Петро записаний на
    right: десяту годину.
  - left: Оксана дзвонить
    right: своїм друзям.
  - left: Ми будемо подорожувати
    right: швидкими потягами.
  - left: У нас зовсім немає
    right: вільного часу.
workbook:
- type: group-sort
  instruction: Розподіліть іменники за відмінками на основі їхньої форми.
  groups:
  - label: Називний (Хто? Що?)
    items:
    - лікар
    - рецепт
    - вечірка
  - label: Родовий (Кого? Чого?)
    items:
    - лікарів
    - рецептів
    - вечірки
  - label: Давальний (Кому? Чому?)
    items:
    - лікарям
    - рецептам
    - вечірці
- type: unjumble
  instruction: Складіть правильне речення зі слів. Звертайте увагу на відмінки та
    прийменники.
  items:
  - words:
    - Ми
    - в
    - поїдемо
    - Карпати.
    correct_order:
    - Ми
    - поїдемо
    - в
    - Карпати.
  - words:
    - потрібно
    - Мені
    - ліки.
    - випити
    correct_order:
    - Мені
    - потрібно
    - випити
    - ліки.
  - words:
    - допоможе
    - Лікар
    - пацієнту.
    - своєму
    correct_order:
    - Лікар
    - допоможе
    - своєму
    - пацієнту.
  - words:
    - Олені
    - Ми
    - подарунок.
    - подаруємо
    - гарний
    correct_order:
    - Ми
    - подаруємо
    - Олені
    - гарний
    - подарунок.
  - words:
    - немає
    - на
    - У
    - часу
    - це.
    - нас
    correct_order:
    - У
    - нас
    - немає
    - часу
    - на
    - це.
  - words:
    - Андрій
    - вечірки.
    - торт
    - для
    - купив
    correct_order:
    - Андрій
    - купив
    - торт
    - для
    - вечірки.
- type: true-false
  instruction: Визначте, чи правильне твердження про відмінки.
  items:
  - statement: Слово 'багато' вимагає використання називного відмінка.
    correct: false
    explanation: Після слова 'багато' ми використовуємо родовий відмінок множини (наприклад,
      'багато друзів').
  - statement: З прийменниками 'в' або 'на' для позначення напрямку руху (куди?) використовується
      знахідний відмінок.
    correct: true
    explanation: 'Наприклад: ''Ми їдемо в місто'', ''Я йду на роботу''.'
  - statement: Коли ми описуємо свій фізичний стан ('мені холодно', 'мені погано'),
      ми використовуємо називний відмінок.
    correct: false
    explanation: Для опису фізичного стану використовується давальний відмінок ('мені').
  - statement: Дієслово 'допомагати' завжди вимагає давального відмінка.
    correct: true
    explanation: Ми кажеємо 'допомагати другові', 'допомагати сестрі'.
  - statement: Для позначення інструмента дії (наприклад, 'писати ручкою') використовується
      родовий відмінок.
    correct: false
    explanation: Для інструмента дії використовується орудний відмінок (Ким? Чим?).
  - statement: Особовий займенник після прийменника отримує літеру 'н' (наприклад,
      'без нього').
    correct: true
    explanation: Це правило діє для непрямих відмінків після прийменників ('до неї',
      'з ними').
