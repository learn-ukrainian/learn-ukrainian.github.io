    - sentence: "Ми часто думаємо про ..."
      answer: "роботу"
      options: ["робота", "роботи", "роботу", "роботою"]
    - sentence: "Сьогодні я вечеряв із ..."
      answer: "братом"
      options: ["брат", "брата", "брату", "братом"]
    - sentence: "Скажіть це моєму ..."
      answer: "колезі"
      options: ["колега", "колеги", "колегу", "колезі"]
    - sentence: "Там було дуже багато ..."
      answer: "людей"
      options: ["люди", "людей", "людям", "людьми"]
    - sentence: "Чи знаєте ви цього ..."
      answer: "чоловіка"
      options: ["чоловік", "чоловіка", "чоловіку", "чоловіком"]
    - sentence: "Ми були в новому ..."
      answer: "ресторані"
      options: ["ресторан", "ресторана", "ресторану", "ресторані"]
    - sentence: "Зараз я читаю цікаву ..."
      answer: "книгу"
      options: ["книга", "книги", "книгу", "книгою"]
    - sentence: "Привіт, мій найкращий ..."
      answer: "друже"
      options: ["друг", "друга", "другу", "друже"]

