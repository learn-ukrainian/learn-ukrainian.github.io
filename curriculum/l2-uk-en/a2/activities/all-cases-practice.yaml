    - Київ
    - Києва
    - Києву
  - sentence: Я хочу купити квитки до ____.
    answer: Львова
    options:
    - Львів
    - Львова
    - Львову
  - sentence: Ми поїдемо через ____.
    answer: Умань
    options:
    - Умань
    - Умані
    - Уманю
  - sentence: Краще поїхати ____.
    answer: потягом
    options:
    - потяг
    - потягом
    - на потязі
  - sentence: Ми зустрінемося у Львові на ____.
    answer: вокзалі
    options:
    - вокзал
    - вокзалу
    - вокзалі
  - sentence: Спочатку купимо сувеніри ____.
    answer: друзям
    options:
    - друзі
    - друзів
    - друзям
  - sentence: Потім гулятимемо по ____.
    answer: Хрещатику
    options:
    - Хрещатик
    - Хрещатика
    - Хрещатику
  - sentence: Ми будемо милуватися ____.
    answer: Карпатами
    options:
    - Карпати
    - Карпат
    - Карпатами
