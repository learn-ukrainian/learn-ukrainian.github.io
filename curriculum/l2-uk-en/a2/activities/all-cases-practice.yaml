- type: unjumble
  title: "Побудуйте речення"
  instruction: "Розташуйте слова в правильному порядку, звертаючи увагу на відмінки."
  items:
    - words: ["у", "мене", "немає", "документа"]
      answer: "У мене немає документа"
    - words: ["суддя", "уважно", "слухає", "свідка"]
      answer: "Суддя уважно слухає свідка"
    - words: ["ми", "працюємо", "з", "адвокатом"]
      answer: "Ми працюємо з адвокатом"
    - words: ["важливі", "документи", "лежать", "на", "столі"]
      answer: "Важливі документи лежать на столі"
    - words: ["наш", "перекладач", "допомагає", "судді"]
      answer: "Наш перекладач допомагає судді"
    - words: ["я", "даю", "свій", "паспорт", "офіцеру"]
      answer: "Я даю свій паспорт офіцеру"
    - words: ["йому", "двадцять", "п'ять", "років"]
      answer: "Йому двадцять п'ять років"
    - words: ["добрий", "день", "шановний", "пане", "судде"]
      answer: "Добрий день шановний пане судде"

- type: group-sort
  title: "Анімовані чи неанімовані?"
  instruction: "Розподіліть слова на дві групи за правилами знахідного відмінка."
  groups:
    - name: "Анімовані (Знахідний = Родовий)"
      items: ["студент", "друг", "лікар", "суддя", "адвокат", "перекладач", "свідок", "брат"]
    - name: "Неанімовані (Знахідний = Називний)"
      items: ["документ", "стіл", "паспорт", "ресторан", "автомобіль", "кабінет", "квиток", "будинок"]

- type: true-false
  title: "Правда чи брехня?"
  instruction: "Прочитайте твердження про відмінки і виберіть, правдиві вони чи ні."
  items:
    - statement: "Після слова 'немає' завжди використовується родовий відмінок."
      correct: true
      explanation: "Так, відсутність або заперечення вимагає родового відмінка."
    - statement: "Місцевий відмінок можна використовувати без прийменника."
      correct: false
      explanation: "Місцевий відмінок ЗАВЖДИ вимагає прийменника (в/у, на, по, при)."
    - statement: "Кличний відмінок використовується для звертання до людей."
      correct: true
      explanation: "Кличний відмінок призначений винятково для прямого звертання."
    - statement: "В українській мові 6 відмінків."
      correct: false
      explanation: "В українській мові 7 відмінків (включаючи кличний)."
    - statement: "Для живих істот знахідний відмінок має такі ж закінчення, як і родовий."
      correct: true
      explanation: "Це правило стосується істот чоловічого роду (бачу друга)."
    - statement: "Вік (наприклад, 20 років) завжди виражається називним відмінком."
      correct: false
      explanation: "Вік виражається давальним відмінком (Мені 20 років)."
    - statement: "Орудний відмінок відповідає на питання ким? чим?"
      correct: true
      explanation: "Так, він вказує на інструмент або супровід."
    - statement: "Слово 'що' — це питання родового відмінка."
      correct: false
      explanation: "Слово 'що' — це питання називного або знахідного відмінка."

- type: mark-the-words
  title: "Знайдіть іменники в місцевому відмінку"
  instruction: "Знайдіть і позначте іменники (без прийменників), які стоять у місцевому відмінку."
  text: "Сьогодні ми працюємо в суді. Документи лежать на столі. Ми читали про це у книзі. Вони зустрілися в ресторані. Важлива інформація є на сайті. Вона зараз у кабінеті."
  answers: ["суді", "столі", "книзі", "ресторані", "сайті", "кабінеті"]

