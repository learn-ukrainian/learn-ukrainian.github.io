      options: ["офіцер", "офіцера", "офіцеру", "офіцером"]
    - sentence: "Він працює з відомим ..."
      answer: "адвокатом"
      options: ["адвокат", "адвоката", "адвокату", "адвокатом"]
    - sentence: "Мої документи лежать на ..."
      answer: "столі"
      options: ["стіл", "стола", "столу", "столі"]
    - sentence: "Добрий день, пане ..."
      answer: "судде"
      options: ["суддя", "судді", "суддю", "судде"]
    - sentence: "Це кабінет нашого ..."
      answer: "директора"
