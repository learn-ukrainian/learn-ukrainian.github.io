- id: workbook-true-false-grammar
  type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень
  items:
  - statement: В українській мові ми кажемо «Я маю головний біль».
    correct: false
    explanation: Ми кажемо «У мене болить голова».
  - statement: Після слова «немає» завжди використовується родовий відмінок.
    correct: true
    explanation: Слово «немає» означає відсутність, тому вимагає родового відмінка
      (наприклад, немає торта).
  - statement: Дієслово «милуватися» вимагає орудного відмінка.
    correct: true
    explanation: Ми кажемо «милуватися Карпатами».
  - statement: Прийменник «по» вимагає давального відмінка.
    correct: false
    explanation: Прийменник «по» вимагає місцевого відмінка, наприклад «по Хрещатику».
  - statement: Місцевий відмінок завжди вживається з прийменниками.
    correct: true
    explanation: Це єдиний відмінок, який ніколи не вживається без прийменників.
  - statement: З дієсловом «допомагати» ми використовуємо знахідний відмінок.
    correct: false
    explanation: 'Ми використовуємо давальний відмінок: допомагати (кому?) другові.'
  - statement: Прийменник «через» (наприклад, через Умань) вимагає знахідного відмінка.
    correct: true
    explanation: Ми кажемо «їхати через Київ, через Умань».
  - statement: Слово «ліки» може бути в однині.
    correct: false
    explanation: Слово «ліки» вживається тільки у множині.
- id: workbook-error-correction-mixed
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Мені болить горло.
    error: Мені
    correction: У мене
    error_type: word
    options:
    - У мене
    - Я
    - Мене
    explanation: Щоб сказати про біль, використовуйте конструкцію «У мене болить...»
  - sentence: Я маю температуру.
    error: Я маю
    correction: У мене
    error_type: phrase
    options:
    - У мене
    - Мені
    - Я
    explanation: Ми не використовуємо дієслово «мати» для симптомів.
  - sentence: Ми їдемо по полям.
    error: полям
    correction: полях
    error_type: word
    options:
    - полях
    - полі
    - полями
    explanation: Прийменник «по» вимагає місцевого відмінка.
  - sentence: Купіть ліки з рецептом.
    error: з
    correction: за
    error_type: word
    options:
    - за
    - на
    - до
    explanation: 'Правильний вислів: «за рецептом».'
  - sentence: У нас немає торт.
    error: торт
    correction: торта
    error_type: word
    options:
    - торта
    - торту
    - тортом
    explanation: Після «немає» завжди іде родовий відмінок.
  - sentence: Я допомагаю пацієнт.
    error: пацієнт
    correction: пацієнтові
    error_type: word
    options:
    - пацієнтові
    - пацієнта
    - пацієнтом
    explanation: Дієслово «допомагати» вимагає давального відмінка.
  - sentence: Ми поїдемо через Львова.
    error: Львова
    correction: Львів
    error_type: word
    options:
    - Львів
    - Львові
    - Львовом
    explanation: Прийменник «через» вимагає знахідного відмінка.
  - sentence: Ми милуємося Карпати.
    error: Карпати
    correction: Карпатами
    error_type: word
    options:
    - Карпатами
    - Карпат
    - Карпатах
    explanation: Дієслово «милуватися» вимагає орудного відмінка.
