workbook:
- id: error-correction-plural
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: У кімнаті стоїть п'ять столов.
    error: столов
    correction: столів
    error_type: word
    options:
    - столів
    - столи
    - стіл
    explanation: Іменники чоловічого роду на твердий приголосний мають закінчення
      -ів.
  - sentence: У мене є кілька питання до викладача.
    error: питання
    correction: питань
    error_type: word
    options:
    - питань
    - питаннях
    - питаннів
    explanation: Слово «питання» (середній рід) має нульове закінчення.
  - sentence: У місті багато нових бібліотеков.
    error: бібліотеков
    correction: бібліотек
    error_type: word
    options:
    - бібліотек
    - бібліотеки
    - бібліотеках
    explanation: Слово «бібліотека» (жіночий рід) має нульове закінчення.
  - sentence: Я прочитав п'ять стаття.
    error: стаття
    correction: статей
    error_type: word
    options:
    - статей
    - статтів
    - статті
    explanation: Слово «стаття» є винятком і має закінчення -ей.
  - sentence: Скільки людин живе у цьому місті?
    error: людин
    correction: людей
    error_type: word
    options:
    - людей
    - люди
    - людям
    explanation: У родовому відмінку множини правильно казати «людей».
  - sentence: Там є дуже багато старих будинки.
    error: будинки
    correction: будинків
    error_type: word
    options:
    - будинків
    - будинок
    - будинках
    explanation: Після слова «багато» потрібен родовий відмінок множини.
  - sentence: Учитель дав нам десять нових завдання.
    error: завдання
    correction: завдань
    error_type: word
    options:
    - завдань
    - завданьів
    - завданнях
    explanation: Слово «завдання» (середній рід) має нульове закінчення.
  - sentence: Ми бачили багато красивих містів.
    error: містів
    correction: міст
    error_type: word
    options:
    - міст
    - міста
    - містах
    explanation: Слово «місто» (середній рід) має нульове закінчення.
