- id: true-false-rules
  type: true-false
  instruction: Правда чи ні? (Правила родового відмінка множини)
  items:
  - statement: Слово «люди» в родовому відмінку має форму «людей».
    correct: true
    explanation: Це слово є винятком, після слів «скільки» або «багато» ми кажемо
      «людей».
  - statement: Більшість іменників чоловічого роду мають нульове закінчення.
    correct: false
    explanation: Більшість іменників чоловічого роду на приголосний мають закінчення
      -ів (столів, студентів).
  - statement: Після слова «скільки» ми завжди використовуємо родовий відмінок множини.
    correct: true
    explanation: Так, для предметів, які можна порахувати, ми використовуємо родовий
      відмінок множини.
  - statement: Іменники «вікно» і «місто» мають закінчення -ів.
    correct: false
    explanation: 'Ці слова середнього роду мають нульове закінчення: вікон, міст.'
  - statement: Якщо слово жіночого роду закінчується на -а, ми зазвичай забираємо
      цю букву.
    correct: true
    explanation: Це називається нульове закінчення (книга -> книг, жінка -> жінок).
  - statement: Слово «завдання» в родовому відмінку множини буде «завдань».
    correct: true
    explanation: Слова середнього роду на -ння мають нульове закінчення і м'який знак.
  - statement: Форма «багато студентів» є неправильною.
    correct: false
    explanation: Це абсолютно правильна форма (студент -> студентів).
  - statement: Після числівника «п'ять» ми використовуємо родовий відмінок множини.
    correct: true
    explanation: Числа від п'яти і більше вимагають родового відмінка множини.
