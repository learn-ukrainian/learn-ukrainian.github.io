    - стаття
    - брат
    correct: 2
    explanation: Брат має закінчення -ів (братів), а сім'я і стаття мають закінчення
      -ей (сімей, статей).
  - words:
    - пляшка
    - сумка
    - олівець
    correct: 2
    explanation: Олівець має закінчення -ів (олівців), а пляшка і сумка мають нульове
      закінчення (пляшок, сумок).
  - words:
    - море
    - трамвай
    - місто
    correct: 2
    explanation: Місто має нульове закінчення (міст), а море і трамвай мають закінчення
      -ів (морів, трамваїв).
  - words:
    - сестра
    - жінка
    - герой
    correct: 2
    explanation: Герой має закінчення -їв (героїв), а сестра і жінка мають нульове
