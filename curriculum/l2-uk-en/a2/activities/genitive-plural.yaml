version: '1.0'
module: genitive-plural
level: a2
inline:
- id: group-sort
  type: group-sort
  instruction: Розподіліть форми Родового відмінка множини за типом закінчення
  groups:
  - label: Закінчення -ів / -їв
    items:
    - столів
    - братів
    - підручників
    - музеїв
  - label: Нульове закінчення (∅)
    items:
    - книг
    - газет
    - завдань
    - вікон
  - label: Закінчення -ей
    items:
    - статей
    - сімей
    - мишей
    - людей
- id: match-up
  type: match-up
  instruction: З'єднайте форму однини з формою Родового відмінка множини
  pairs:
  - left: стіл
    right: столів
  - left: книга
    right: книг
  - left: вікно
    right: вікон
  - left: сестра
    right: сестер
  - left: музей
    right: музеїв
  - left: ручка
    right: ручок
  - left: людина
    right: людей
  - left: завдання
    right: завдань
- id: fill-in
  type: fill-in
  instruction: Вставте іменник у формі Родового відмінка множини
  items:
  - sentence: У нас є кілька нових ____ (підручник).
    answer: підручників
    options:
    - підручників
    - підручник
    - підручники
  - sentence: Скільки ____ (день) ви будете в Києві?
    answer: днів
    options:
    - днів
    - день
    - дні
  - sentence: У цьому місті багато старих ____ (вулиця).
    answer: вулиць
    options:
    - вулиць
    - вулиців
    - вулиці
  - sentence: Він знає багато цікавих ____ (історія).
    answer: історій
    options:
    - історій
    - історійов
    - історії
  - sentence: Ми купили п'ять ____ (яблуко).
    answer: яблук
    options:
    - яблук
    - яблуків
    - яблука
  - sentence: Ми вивчили багато нових ____ (слово).
    answer: слів
    options:
    - слів
    - словів
    - слова
  - sentence: Скільки ____ (питання) на екзамені?
    answer: питань
    options:
    - питань
    - питання
    - питаннів
  - sentence: Тут стоїть десять ____ (автобус).
    answer: автобусів
    options:
    - автобусів
    - автобуса
    - автобуси
- id: quiz
  type: quiz
  instruction: Оберіть правильну форму Родового відмінка множини
  items:
  - question: Там стоїть багато _____ (стіл).
    options:
    - столів
    - столі
    - стола
    - стіл
    correct: 0
  - question: У мене є п'ять _____ (книга).
    options:
    - книгів
    - книг
    - книги
    - книгах
    correct: 1
  - question: Вона купила кілька _____ (сумка).
    options:
    - сумок
    - сумк
    - сумків
    - сумки
    correct: 0
  - question: У місті немає _____ (музей).
    options:
    - музей
    - музеїв
    - музеї
    - музеях
    correct: 1
  - question: Скільки тут _____ (людина)?
    options:
    - людин
    - людинів
    - людей
    - люди
    correct: 2
  - question: У нас десять _____ (завдання).
    options:
    - завдань
    - завдання
    - завданнів
    - завданнях
    correct: 0
  - question: Журналіст написав кілька _____ (стаття).
    options:
    - статт
    - статтів
    - статей
    - статті
    correct: 2
  - question: У мене немає зелених _____ (олівець).
    options:
    - олівців
    - олівець
    - олівці
    - олівця
    correct: 0
workbook:
- id: workbook-group-sort
  type: group-sort
  instruction: Розподіліть іменники за граматичним родом (це допоможе обрати правильне
    закінчення для множини)
  groups:
  - label: Чоловічий рід (Він)
    items:
    - стіл
    - брат
    - музей
    - олівець
    - герой
  - label: Жіночий рід (Вона)
    items:
    - книга
    - машина
    - ручка
    - сестра
    - стаття
  - label: Середній рід (Воно)
    items:
    - вікно
    - яблуко
    - завдання
    - море
    - місто
- id: workbook-quiz
  type: quiz
  instruction: Визначте відмінок і число виділеного іменника
  items:
  - question: У мене є п'ять **книг**.
    options:
    - Називний (однина)
    - Родовий (множина)
    - Знахідний (однина)
    - Називний (множина)
    correct: 1
  - question: Це цікава **книга**.
    options:
    - Називний (однина)
    - Родовий (множина)
    - Знахідний (однина)
    - Родовий (однина)
    correct: 0
  - question: Тут стоїть багато **столів**.
    options:
    - Називний (однина)
    - Родовий (множина)
    - Місцевий (множина)
    - Знахідний (однина)
    correct: 1
  - question: Я бачу новий **стіл**.
    options:
    - Називний (однина)
    - Родовий (множина)
    - Знахідний (однина)
    - Родовий (однина)
    correct: 2
  - question: У місті немає нових **шкіл**.
    options:
    - Родовий (множина)
    - Називний (множина)
    - Знахідний (однина)
    - Місцевий (однина)
    correct: 0
  - question: Ця **школа** дуже стара.
    options:
    - Називний (однина)
    - Родовий (множина)
    - Знахідний (однина)
    - Родовий (однина)
    correct: 0
- id: workbook-fill-in
  type: fill-in
  instruction: Вставте іменники у формі Родового відмінка множини
  items:
  - sentence: На столі лежить кілька ____ (яблуко).
    answer: яблук
  - sentence: У мене немає старших ____ (сестра).
    answer: сестер
  - sentence: Ми бачимо багато ____ (жінка) на вулиці.
    answer: жінок
  - sentence: Хлопець має десять ____ (гривня).
    answer: гривень
  - sentence: На площі зібралося багато ____ (громадянин).
    answer: громадян
  - sentence: Скільки ____ (стаття) ви прочитали?
    answer: статей
- id: workbook-unjumble
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - місті
    - багато
    - нових
    - шкіл.
    - У
    correct_order:
    - У
    - місті
    - багато
    - нових
    - шкіл.
  - words:
    - мене
    - п'ять
    - кольорових
    - олівців.
    - У
    - є
    correct_order:
    - У
    - мене
    - є
    - п'ять
    - кольорових
    - олівців.
  - words:
    - немає
    - книг.
    - бібліотеці
    - У
    - старих
    correct_order:
    - У
    - бібліотеці
    - немає
    - старих
    - книг.
  - words:
    - студентів
    - багато
    - Тут
    - з
    - університету.
    correct_order:
    - Тут
    - багато
    - студентів
    - з
    - університету.
  - words:
    - ми
    - Скільки
    - маємо?
    - днів
    - ще
    correct_order:
    - Скільки
    - днів
    - ми
    - ще
    - маємо?
  - words:
    - бачить
    - кілька
    - Він
    - крапель
    - на
    - склі.
    correct_order:
    - Він
    - бачить
    - кілька
    - крапель
    - на
    - склі.
- id: workbook-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: У місті багато машин і автобусав.
    error: автобусав
    correction: автобусів
    error_type: word
    options:
    - автобусів
    - автобусов
    - автобус
    explanation: Слово 'автобус' (чоловічий рід, твердий приголосний) у Родовому відмінку
      множини має закінчення -ів.
  - sentence: Я купив п'ять яблуков.
    error: яблуков
    correction: яблук
    error_type: word
    options:
    - яблук
    - яблука
    - яблуки
    explanation: Слово 'яблуко' (середній рід) має нульове закінчення у Родовому відмінку
      множини.
  - sentence: У неї немає сестрів.
    error: сестрів
    correction: сестер
    error_type: word
    options:
    - сестер
    - сестри
    - сестр
    explanation: Слово 'сестра' (жіночий рід) має нульове закінчення зі вставним голосним
      'е'.
  - sentence: Ми не знаємо цих людов.
    error: людов
    correction: людей
    error_type: word
    options:
    - людей
    - людинів
    - люди
    explanation: Це виняток. У Родовому відмінку множини слово 'людина' має форму
      'людей'.
  - sentence: Тут живе кілька сім'їв.
    error: сім'їв
    correction: сімей
    error_type: word
    options:
    - сімей
    - сім'я
    - сіми
    explanation: Слово 'сім'я' — це виняток із закінченням -ей.
  - sentence: Ми знаємо багато казоків.
    error: казоків
    correction: казок
    error_type: word
    options:
    - казок
    - казків
    - казки
    explanation: Слово 'казка' (жіночий рід) має нульове закінчення зі вставним голосним
      'о'.
