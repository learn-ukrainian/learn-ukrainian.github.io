- id: odd-one-out-endings
  type: odd-one-out
  instruction: Знайдіть слово, яке має ІНШЕ закінчення в родовому відмінку множини
  items:
  - words:
    - стіл
    - студент
    - книга
    correct: 2
    explanation: Книга має нульове закінчення (книг), а стіл і студент мають закінчення
      -ів (столів, студентів).
