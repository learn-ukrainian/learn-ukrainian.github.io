- id: quiz-holiday-traditions
  type: quiz
  instruction: Оберіть правильну відповідь про українські свята
  items:
  - question: Головна страва на Святий Вечір — це...
    options:
    - кутя
    - паска
    - писанка
    - вінок
    correct: 0
  - question: Коли сучасна Україна святкує Різдво?
    options:
    - першого жовтня
    - сьомого липня
    - двадцять п'ятого грудня
    - двадцять четвертого серпня
    correct: 2
  - question: Що дівчата пускають на воду на Івана Купала?
    options:
    - дідух
    - вінок
    - кутю
    - писанку
    correct: 1
  - question: Який традиційний солодкий хліб печуть на Великдень?
    options:
    - кутю
    - дідух
    - паску
    - млинець
    correct: 2
  - question: Яке велике свято відзначають першого жовтня?
    options:
    - Покрову
    - Великдень
    - Різдво
    - Івана Купала
    correct: 0
  - question: Що символізує традиційний сніп пшениці на Різдво?
    options:
    - паска
    - вінок
    - кутя
    - дідух
    correct: 3
  - question: На яке свято українці вітаються словами «Христос воскрес!»?
    options:
    - на Різдво
    - на Великдень
    - на Покрову
    - на Івана Купала
    correct: 1
  - question: Хто традиційно приносить подарунки дітям шостого грудня?
    options:
    - Святий Вечір
    - Святий Миколай
    - дідух
    - Іван Купала
    correct: 1
- id: fill-in-grammar-seasons
  type: fill-in
  instruction: Вставте правильне слово (пору року або дієслово)
  items:
  - sentence: Я дуже люблю відпочивати _____, тому що тепло.
    answer: влітку
    options:
    - влітку
    - літо
    - у літі
  - sentence: _____ природа прокидається і птахи повертаються додому.
    answer: Навесні
    options:
    - Навесні
    - Весна
    - У весні
  - sentence: Моя улюблена пора року — це золота _____.
    answer: осінь
    options:
    - осінь
    - восени
    - осені
  - sentence: Напередодні Різдва ми _____ кутю три години.
    answer: готували
    options:
    - готували
    - приготували
    - готуємо
  - sentence: Ми нарешті _____ дуже смачну святкову вечерю!
    answer: приготували
    options:
    - приготували
    - готували
    - готувати
  - sentence: Сніг _____ цілий день і не зупинявся.
    answer: падав
    options:
    - падав
    - упав
    - падає
  - sentence: Сніг нарешті _____, і прийшла тепла весна.
    answer: розтанув
    options:
    - розтанув
    - танув
    - танути
  - sentence: _____ ми часто катаємося на лижах у Карпатах.
    answer: Взимку
    options:
    - Взимку
    - Зима
    - Зимою
- id: true-false-culture
  type: true-false
  instruction: Правда чи ні? Визначте правильні твердження про українські традиції
  items:
  - statement: На Святий Вечір на столі обов'язково є дванадцять страв.
    correct: true
    explanation: За традицією, на столі має бути 12 страв, головна з яких — солодка
      кутя.
  - statement: Писанка — це головний символ Різдва.
    correct: false
    explanation: Писанка (decorated egg) — це символ Великодня, а не Різдва.
  - statement: На Івана Купала молодь стрибає через велике вогнище.
    correct: true
    explanation: Стрибати через вогнище (bonfire) — це давня традиція свята Івана
      Купала.
  - statement: День Незалежності України святкують взимку.
    correct: false
    explanation: День Незалежності України святкують влітку, двадцять четвертого серпня.
  - statement: Дідух — це традиційний український символ Різдва.
    correct: true
    explanation: Дідух — це сніп пшениці, який ставлять у кімнаті на Різдво.
  - statement: Козаки вірили, що Свята Покрова надійно захищає їх у бою.
    correct: true
    explanation: Козаки глибоко вірили у захист Святої Покрови, тому свято відзначають
      першого жовтня.
  - statement: Легенда каже, що цвіт папороті можна знайти кожної ночі.
    correct: false
    explanation: Кажуть, що ця магічна квітка цвіте тільки одну коротку ніч у році.
  - statement: Святий Миколай приносить подарунки дітям навесні.
    correct: false
    explanation: Святий Миколай приходить шостого грудня, тобто взимку.
