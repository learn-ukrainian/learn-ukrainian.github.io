- id: error-correction-seasons-grammar
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Я завжди відпочиваю у літі.
    error: у літі
    correction: влітку
    error_type: phrase
    options:
    - влітку
    - літо
    - на літі
    explanation: Українці кажуть «влітку», а не «у літі».
  - sentence: Сьогодні двадцять п'ять грудня.
    error: п'ять
    correction: п'яте
    error_type: word
    options:
    - п'яте
    - п'ятого
    - п'ята
    explanation: 'Ми використовуємо порядковий числівник у середньому роді: «двадцять
      п''яте».'
  - sentence: Свято буде перше вересня.
    error: перше
    correction: першого
    error_type: word
    options:
    - першого
    - першому
    - перший
    explanation: 'Коли ми відповідаємо на питання «коли?», ставимо фразу в родовий
      відмінок: «першого вересня».'
  - sentence: Осінь холодніше за літо.
    error: холодніше
    correction: холодніша
    error_type: word
    options:
    - холодніша
    - холодніший
    - найхолодніша
    explanation: 'Осінь (вона) — жіночий рід, тому прикметник має бути також жіночого
      роду: «холодніша».'
  - sentence: Ми святкуємо Великдень на весні.
    error: на весні
    correction: навесні
    error_type: phrase
    options:
    - навесні
    - у весні
    - весною
    explanation: Слово «навесні» пишеться разом.
  - sentence: Зима — холодніша пора року.
    error: холодніша
    correction: найхолодніша
    error_type: word
    options:
    - найхолодніша
    - холодніше
    - холодна
    explanation: Тут потрібен найвищий ступінь порівняння, бо зима найхолодніша з
      усіх пір року.
- id: translate-seasons-phrases
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: It is cold outside today.
    options:
    - text: Сьогодні на вулиці холодно.
      correct: true
    - text: Сьогодні вулиця холодна.
      correct: false
    - text: Сьогодні на вулиці морозно.
      correct: false
    - text: Мені сьогодні холодно.
      correct: false
  - source: Summer is warmer than spring.
    options:
    - text: Літо тепліше за весну.
      correct: true
    - text: Літо найтепліша весна.
      correct: false
    - text: Весна тепліша за літо.
      correct: false
    - text: Літо тепле як весна.
      correct: false
  - source: I would like to try kutia.
    options:
    - text: Я хотів би спробувати кутю.
      correct: true
    - text: Я хочу спробую кутю.
      correct: false
    - text: Я хотіла б готувати кутю.
      correct: false
    - text: Мені подобається кутя.
      correct: false
  - source: My favorite season is autumn.
    options:
    - text: Моя улюблена пора року — осінь.
      correct: true
    - text: Мій улюблений сезон — осінь.
      correct: false
    - text: Моя найкраща погода — осінь.
      correct: false
    - text: Я люблю золоту осінь.
      correct: false
  - source: In winter the days are shorter.
    options:
    - text: Взимку дні коротші.
      correct: true
    - text: У зимі дні короткі.
      correct: false
    - text: Взимку ночі довші.
      correct: false
    - text: Взимку дні найкоротші.
      correct: false
  - source: We are celebrating together.
    options:
    - text: Ми святкуємо разом.
      correct: true
    - text: Ми святкуємо з друзями.
      correct: false
    - text: Ми шануємо традиції разом.
      correct: false
    - text: Ми святкуємо один одного.
      correct: false
