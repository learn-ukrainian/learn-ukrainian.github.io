workbook:
- id: wb-translate-sentences
  type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: Every language requires time for review.
    options:
    - text: Кожна мова потребує часу на повторення.
      correct: true
    - text: Кожна мова потребує час для повторення.
      correct: false
  - source: I don't have free time right now.
    options:
    - text: У мене зараз немає вільного часу.
      correct: true
    - text: У мене зараз немає вільний час.
      correct: false
  - source: He arrived without his phone.
    options:
    - text: Він прийшов без свого телефона.
      correct: true
    - text: Він прийшов без свій телефон.
      correct: false
  - source: This is my older brother's car.
    options:
    - text: Це машина мого старшого брата.
      correct: true
    - text: Це машина мій старший брат.
      correct: false
  - source: I bought three interesting books.
    options:
    - text: Я купив три цікаві книги.
      correct: true
    - text: Я купив три цікавих книжок.
      correct: false
  - source: My neighbor has ten books.
    options:
    - text: Мій сусід має десять книжок.
      correct: true
    - text: Мій сусід має десять книги.
      correct: false
  - source: I very much need help.
    options:
    - text: Я дуже сильно потребую допомоги.
      correct: true
    - text: Я дуже сильно потребую допомогу.
      correct: false
  - source: She is taking a shower now.
    options:
    - text: Зараз вона бере душ.
      correct: true
    - text: Зараз вона приймає душ.
      correct: false
  - source: We are participating today.
    options:
    - text: Сьогодні ми беремо участь.
      correct: true
