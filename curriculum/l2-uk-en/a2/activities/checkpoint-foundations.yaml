- id: wb-true-false-grammar
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Після слова «немає» ми завжди використовуємо родовий відмінок.
    correct: true
    explanation: «Немає» вимагає родового відмінка (немає часу).
  - statement: Дієслово «брати» використовуємо у фразі «брати участь».
    correct: true
    explanation: Це правильна українська форма, а не «приймати участь».
  - statement: Дієслово «читати» — це доконаний вид.
    correct: false
    explanation: Це процес, отже це недоконаний вид.
  - statement: Ми кажемо «два брати», але «п'ять братів».
    correct: true
    explanation: Числа 2-4 вимагають називного множини, а 5+ родового.
  - statement: Словосполучення «без молока» стоїть у знахідному відмінку.
    correct: false
    explanation: Прийменник «без» вимагає родового відмінка.
  - statement: Дієслово «потребувати» вимагає знахідного відмінка.
    correct: false
    explanation: «Потребувати» завжди вимагає родового відмінка (потребувати допомоги).
  - statement: Якщо є слово «часто», ми зазвичай використовуємо недоконаний вид.
    correct: true
    explanation: «Часто» вказує на регулярну дію (процес).
  - statement: Якщо результат досягнуто швидко, використовуємо доконаний вид.
    correct: true
    explanation: Доконаний вид підкреслює результат дії.
  - statement: Форма «десять столів» є правильною для родового відмінка множини.
    correct: true
    explanation: Число 10 вимагає родового відмінка множини.
  - statement: Фраза «приймати душ» є правильною в українській мові.
    correct: false
    explanation: Правильно казати «брати душ».
- id: wb-match-up-aspect
  type: match-up
  instruction: З'єднайте видові пари дієслів (недоконаний — доконаний)
  pairs:
  - left: читати
    right: прочитати
  - left: писати
    right: написати
  - left: робити
    right: зробити
  - left: купувати
    right: купити
  - left: вчити
    right: вивчити
  - left: готувати
    right: приготувати
  - left: шукати
    right: знайти
  - left: дивитися
    right: подивитися
  - left: відпочивати
    right: відпочити
  - left: бачити
    right: побачити
- id: wb-group-sort-numbers
  type: group-sort
  instruction: Розподіліть числа та їх закінчення
  groups:
  - label: Один (Називний однини)
    items:
    - один стіл
    - один брат
    - одне яблуко
    - одна сестра
  - label: Два, три, чотири (Називний множини)
    items:
    - два столи
    - три брати
    - чотири яблука
    - дві сестри
  - label: П'ять і більше (Родовий множини)
    items:
    - п'ять столів
    - шість братів
    - сім яблук
    - вісім сестер
- id: wb-error-correction-grammar
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я довго прочитав цю книгу.
    error: прочитав
    correction: читав
    error_type: word
    explanation: Слово «довго» вказує на процес (недоконаний вид).
    options:
    - читав
    - читає
    - почитав
  - sentence: Він прийшов без свій телефон.
    error: свій телефон
    correction: свого телефона
    error_type: phrase
    explanation: Після «без» потрібен родовий відмінок.
    options:
    - свого телефона
    - своєму телефону
    - своїм телефоном
  - sentence: Ми часто купили тут каву.
    error: купили
    correction: купували
    error_type: word
    explanation: «Часто» вказує на регулярну дію (недоконаний вид).
    options:
    - купували
    - купуємо
    - купимо
  - sentence: У кімнаті є шість великих вікна.
    error: вікна
    correction: вікон
    error_type: word
    explanation: Після «шість» потрібен родовий відмінок множини.
    options:
    - вікон
    - вікно
    - вікнам
  - sentence: Він швидко робив домашнє завдання за п'ять хвилин.
    error: робив
    correction: зробив
    error_type: word
    explanation: Результат дії за короткий час вимагає доконаного виду.
    options:
    - зробив
    - робить
    - зробить
  - sentence: Я потребую вашу допомогу.
    error: вашу допомогу
    correction: вашої допомоги
    error_type: phrase
    explanation: Дієслово «потребувати» вимагає родового відмінка.
    options:
    - вашої допомоги
    - вашій допомозі
    - вашою допомогою
  - sentence: У мене немає вільний час.
    error: вільний час
    correction: вільного часу
    error_type: phrase
    explanation: Після «немає» завжди потрібен родовий відмінок.
    options:
    - вільного часу
    - вільному часу
    - вільним часом
  - sentence: Це нова машина мій брат.
    error: мій брат
    correction: мого брата
    error_type: phrase
    explanation: Для позначення власності використовуємо родовий відмінок.
    options:
    - мого брата
    - моєму брату
    - моїм братом
  - sentence: Я з'їв чотири солодких яблук.
    error: яблук
    correction: яблука
    error_type: word
    explanation: Після «чотири» потрібен називний відмінок множини.
    options:
    - яблука
    - яблуко
    - яблуку
  - sentence: Вчора вона довго приймала душ.
    error: приймала
    correction: брала
    error_type: word
    explanation: Українською правильно «брати душ».
    options:
    - брала
    - робила
    - мала
