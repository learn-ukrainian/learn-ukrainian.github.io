inline:
- id: quiz-mixed-grammar
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: У мене зараз немає ____ часу.
    options:
    - вільного
    - вільний
    - вільному
    - вільна
    correct: 0
  - question: Сьогодні вранці ми ____ яблучний сік.
    options:
    - купили
    - купували
    - купуємо
    - куплять
    correct: 0
  - question: Вона довго ____ довгого листа.
    options:
    - писала
    - написала
    - пише
    - напишу
    correct: 0
  - question: У кабінеті є п'ять старих ____.
    options:
    - столів
    - столи
    - стіл
    - столу
    correct: 0
  - question: Він прийшов на урок без ____.
    options:
    - телефона
    - телефон
    - телефону
    - телефоні
    correct: 0
  - question: Вчора він швидко ____ домашнє завдання.
    options:
    - зробив
    - робив
    - робить
    - зроблю
    correct: 0
  - question: У мого друга є три ____.
    options:
    - брати
    - братів
    - брат
    - брату
    correct: 0
  - question: Це велика машина мого старшого ____.
    options:
    - брата
    - брат
    - брату
    - браті
    correct: 0
  - question: Ми часто ____ свіже молоко тут.
    options:
    - купували
    - купили
    - купимо
    - купують
    correct: 0
  - question: Сьогодні немає гарної ____.
    options:
    - погоди
    - погода
    - погоду
    - погоді
    correct: 0
