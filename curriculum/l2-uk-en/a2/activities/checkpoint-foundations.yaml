version: '1.0'
module: checkpoint-foundations
level: a2
inline:
- id: exercise-1
  type: group-sort
  instruction: Розподіліть дієслова за видами
  groups:
  - label: Недоконаний вид (процес)
    items:
    - читати
    - писати
    - купувати
    - телефонувати
    - робити
    - вчити
  - label: Доконаний вид (результат)
    items:
    - прочитати
    - написати
    - купити
    - зателефонувати
    - зробити
    - вивчити
- id: exercise-2
  type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: У мене сьогодні немає нового _____.
    answer: олівця
    options:
    - олівця
    - олівець
    - олівцем
  - sentence: Він прийшов на урок без _____.
    answer: зошита
    options:
    - зошит
    - зошиту
    - зошита
  - sentence: Ми з родиною живемо біля великого _____.
    answer: парку
    options:
    - парк
    - парка
    - парку
  - sentence: На столі немає свіжого _____.
    answer: хліба
    options:
    - хліб
    - хліба
    - хлібом
  - sentence: Сьогодні вранці я не пив гарячої _____.
    answer: кави
    options:
    - кава
    - каву
    - кави
  - sentence: Завтра ми йдемо до нового _____.
    answer: музею
    options:
    - музей
    - музею
    - музеєм
- id: exercise-4
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: Вчора він довго _____ новий текст.
    options:
    - читав
    - прочитав
    - читаю
    - почитав
    correct: 0
  - question: Скільки у тебе _____?
    options:
    - брати
    - братам
    - братів
    - братами
    correct: 2
  - question: На столі лежить десять нових _____.
    options:
    - зошити
    - зошитах
    - зошит
    - зошитів
    correct: 3
  - question: Ти вже _____ складне домашнє завдання?
    options:
    - робив
    - зробив
    - роблю
    - робити
    correct: 1
  - question: На жаль, зараз у мене немає вільного _____.
    options:
    - час
    - часі
    - часом
    - часу
    correct: 3
  - question: Вона обов'язково _____ мені завтра ввечері.
    options:
    - зателефонує
    - телефонувала
    - телефонує
    - зателефонувати
    correct: 0
  - question: Сьогодні ми пішли в магазин і _____ новий стіл.
    options:
    - купували
    - купуємо
    - купили
    - купувати
    correct: 2
  - question: У нашому класі зараз навчається п'ятнадцять _____.
    options:
    - студенти
    - студентів
    - студентам
    - студентами
    correct: 1
workbook:
- id: wb-fill-1
  type: fill-in
  instruction: Змініть речення. Вставте правильне слово (дієслово або іменник).
  items:
  - sentence: Я маю вільний час. -> У мене немає вільного _____.
    answer: часу
  - sentence: Він пише текст. -> Вчора він довго _____ текст.
    answer: писав
  - sentence: Він пише текст. -> Вчора він швидко _____ текст.
    answer: написав
  - sentence: У нього є один олівець. -> У нього немає _____.
    answer: олівця
  - sentence: Тут стоїть новий стіл. -> Тут стоїть п'ять нових _____.
    answer: столів
  - sentence: Він купує каву щоранку. -> Вчора він _____ гарячу каву.
    answer: купив
  - sentence: Вона зараз читає книгу. -> Завтра вона _____ цікаву книгу.
    answer: прочитає
  - sentence: Ми маємо велике яблуко. -> У нас є десять великих _____.
    answer: яблук
- id: wb-fill-2
  type: fill-in
  instruction: Доповніть речення правильним словом.
  items:
  - sentence: Я буду читати книгу, але зараз у мене немає _____.
    answer: часу
  - sentence: Вчора ми готували вечерю без свіжого _____.
    answer: хліба
  - sentence: Він довго працював і нарешті _____ складне завдання.
    answer: зробив
  - sentence: У мене немає п'яти хвилин, щоб швидко _____ цей текст.
    answer: прочитати
  - sentence: Завтра я куплю новий стіл, бо в мене немає _____.
    answer: стола
  - sentence: Вона _____ мені ввечері, коли в неї був вільний час.
    answer: зателефонувала
- id: wb-error-1
  type: error-correction
  instruction: Знайдіть і виправте помилку у реченні.
  items:
  - sentence: У мене є п'ять брати.
    error: брати
    correction: братів
    error_type: word
    options:
    - братів
    - братам
    - братами
    explanation: Після числа 'п'ять' використовується родовий відмінок множини.
  - sentence: Я прочитав текст дві години.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - читаю
    - читати
    explanation: Дія тривала дві години (процес), тому потрібен недоконаний вид.
  - sentence: Він прийшов на урок без зошит.
    error: зошит
    correction: зошита
    error_type: word
    options:
    - зошита
    - зошиту
    - зошиті
    explanation: Після прийменника 'без' використовується родовий відмінок.
  - sentence: Завтра я буду зробити домашнє завдання.
    error: буду зробити
    correction: зроблю
    error_type: construction
    options:
    - зроблю
    - роблю
    - зробив
    explanation: Для доконаного виду майбутнього часу слово 'бути' не використовується.
  - sentence: На великому столі немає свіжого хліб.
    error: хліб
    correction: хліба
    error_type: word
    options:
    - хліба
    - хлібу
    - хлібом
    explanation: Слово 'немає' вимагає родового відмінка.
  - sentence: Вчора вона довго написала цей звіт.
    error: написала
    correction: писала
    error_type: word
    options:
    - писала
    - пише
    - напише
    explanation: Слово 'довго' вказує на процес, тому потрібен недоконаний вид.
