version: '1.0'
module: checkpoint-foundations
level: a2
inline:
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: У мене є два _____.
    options:
    - брати
    - братів
    - брата
    - братом
    correct: 0
  - question: Вона довго _____ цей текст.
    options:
    - читала
    - прочитала
    - читав
    - прочитав
    correct: 0
  - question: У мене немає вільного _____.
    options:
    - час
    - часу
    - часом
    - часі
    correct: 1
  - question: Учора він швидко _____ нове завдання.
    options:
    - робив
    - зробив
    - робила
    - зробила
    correct: 1
  - question: П'ять нових _____ лежать на столі.
    options:
    - книги
    - книг
    - книгах
    - книгами
    correct: 1
  - question: Ми _____ продукти на ринку весь ранок.
    options:
    - купували
    - купили
    - купував
    - купив
    correct: 0
  - question: Без _____ тут дуже сумно.
    options:
    - ти
    - тебе
    - тобі
    - тобою
    correct: 1
  - question: Вона нарешті написала правильну _____.
    options:
    - відповідь
    - відповіді
    - відповіддю
    - відповідям
    correct: 0
  title: Оберіть правильний варіант
- id: fill-in
  type: fill-in
  instruction: Напишіть правильну форму слова в дужках
  items:
  - sentence: У мене немає ____.
    answer: брата
  - sentence: Сьогодні не було свіжого ____.
    answer: хліба
  - sentence: Я чекаю свого старого ____.
    answer: друга
  - sentence: Ми йдемо до великого ____.
    answer: парку
  - sentence: У класі п'ять ____.
    answer: студентів
  - sentence: На столі лежать два ____.
    answer: столи
  - sentence: Вона прочитала три нові ____.
    answer: книги
  - sentence: Без вільного ____ складно відпочивати.
    answer: часу
  title: Напишіть правильну форму слова в дужках
- id: fill-in-2
  type: fill-in
  instruction: Напишіть правильне дієслово або форму слова
  items:
  - sentence: Що ви _____ вчора весь вечір?
    answer: робили
  - sentence: Вона швидко _____ довгу статтю.
    answer: написала
  - sentence: Сьогодні у нас важлива _____.
    answer: перевірка
  - sentence: Ми _____ продукти на ринку дві години.
    answer: купували
  - sentence: Студенти успішно виконали всі _____.
    answer: вправи
  - sentence: Ця _____ дуже важлива для нас.
    answer: контрольна точка
  title: Напишіть правильне дієслово або форму слова
workbook:
- id: aspect-sort
  type: group-sort
  instruction: Розподіліть дієслова за видами
  groups:
  - label: Недоконаний вид (процес)
    items:
    - робити
    - читати
    - писати
    - купувати
    - говорити
    - зустрічати
    - дивитися
  - label: Доконаний вид (результат)
    items:
    - зробити
    - прочитати
    - написати
    - купити
    - сказати
    - зустріти
    - подивитися
  title: Розподіліть дієслова за видами
- id: aspect-match
  type: match-up
  instruction: З'єднайте видові пари
  pairs:
  - left: робити
    right: зробити
  - left: читати
    right: прочитати
  - left: писати
    right: написати
  - left: купувати
    right: купити
  - left: говорити
    right: сказати
  - left: зустрічати
    right: зустріти
  - left: дивитися
    right: подивитися
  title: З'єднайте видові пари
- id: sentence-jumble
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - немає
    - часу.
    - мене
    - У
    - вільного
    correct_order:
    - У
    - мене
    - немає
    - вільного
    - часу.
  - words:
    - цей
    - прочитав
    - за
    - Він
    - текст
    - годину.
    correct_order:
    - Він
    - прочитав
    - цей
    - текст
    - за
    - годину.
  - words:
    - писали
    - Студенти
    - есе.
    - довго
    - складне
    correct_order:
    - Студенти
    - довго
    - писали
    - складне
    - есе.
  - words:
    - нові
    - Ми
    - вчора.
    - купили
    - книги
    correct_order:
    - Ми
    - купили
    - нові
    - книги
    - вчора.
  - words:
    - було
    - магазині
    - не
    - У
    - хліба.
    - свіжого
    correct_order:
    - У
    - магазині
    - не
    - було
    - свіжого
    - хліба.
  - words:
    - і
    - сестер?
    - Скільки
    - у
    - тебе
    - братів
    correct_order:
    - Скільки
    - у
    - тебе
    - братів
    - і
    - сестер?
  title: Складіть правильне речення зі слів
- id: translate-aspect
  type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: I was reading this book for three hours.
    options:
    - text: Я читав цю книгу три години.
      correct: true
    - text: Я прочитав цю книгу три години.
      correct: false
  - source: I finally finished reading this book.
    options:
    - text: Я нарешті прочитав цю книгу.
      correct: true
    - text: Я нарешті читав цю книгу.
      correct: false
  - source: He was doing his homework all evening.
    options:
    - text: Він робив своє завдання весь вечір.
      correct: true
    - text: Він зробив своє завдання весь вечір.
      correct: false
  - source: He got the task done in five minutes.
    options:
    - text: Він зробив завдання за п'ять хвилин.
      correct: true
    - text: Він робив завдання за п'ять хвилин.
      correct: false
  - source: We have no time for conversations.
    options:
    - text: У нас немає часу на розмови.
      correct: true
    - text: У нас немає час на розмови.
      correct: false
  - source: I met my brother today.
    options:
    - text: Сьогодні я зустрів брата.
      correct: true
    - text: Сьогодні я зустрічав брата.
      correct: false
  title: Оберіть правильний переклад
