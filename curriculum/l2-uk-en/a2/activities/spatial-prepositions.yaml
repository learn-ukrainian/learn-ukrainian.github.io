- type: fill-in
  title: 'Дайте команду (Give a command)'
  instruction: 'Complete the command to move an object to a specific place.'
  items:
    - sentence: 'Поставте вазу ___. Квіти будуть гарно виглядати.'
      answer: 'на стіл'
      explanation: 'Motion onto surface = Accusative.'
      options: ['на стіл', 'на столі', 'під стіл', 'за стіл']
    - sentence: 'Покладіть килим ___. Так буде тепліше.'
      answer: 'на підлогу'
      explanation: 'Motion onto surface = Accusative.'
      options: ['на підлогу', 'на підлозі', 'під підлогу', 'в підлогу']
    - sentence: 'Повісьте картину ___. Кімната буде красивішою.'
      answer: 'на стіну'
      explanation: 'Motion onto surface = Accusative.'
      options: ['на стіну', 'на стіні', 'під стіну', 'за стіну']
    - sentence: 'Покладіть ключі ___. Ви їх не загубите.'
      answer: 'в сумку'
      explanation: 'Motion into container = Accusative.'
      options: ['в сумку', 'в сумці', 'на сумку', 'під сумку']
    - sentence: 'Заховайте гроші ___. Там безпечно.'
      answer: 'під матрац'
      explanation: 'Motion to under = Accusative.'
      options: ['під матрац', 'під матрацом', 'на матрац', 'за матрац']
    - sentence: 'Сядьте ___ мамою та татом.'
      answer: 'між'
      explanation: 'Position between two people = Instrumental with між.'
      options: ['між', 'біля', 'перед', 'за']
    - sentence: 'Станьте ___. Подивіться на своє відображення.'
      answer: 'перед дзеркалом'
      explanation: 'Standing position (result) = Instrumental.'
      options: ['перед дзеркалом', 'перед дзеркала', 'перед дзеркалу', 'перед дзеркалі']
    - sentence: 'Йдіть ___. Там зупинка автобуса.'
      answer: 'до метро'
      explanation: 'Motion towards = Genitive.'
      options: ['до метро', 'в метро', 'на метро', 'під метро']

