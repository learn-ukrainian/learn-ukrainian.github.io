    - question: 'Я зараз вдома і відпочиваю після роботи.'
      explanation: 'Static position at home.'
      options:
        - text: 'Де? (Location)'
          correct: true
        - text: 'Куди? (Direction)'
          correct: false
        - text: 'Звідки? (Origin)'
          correct: false
        - text: 'Чому? (Reason)'
          correct: false
    - question: 'Ми їдемо з Києва до Львова поїздом.'
