- type: mark-the-words
  title: 'Знайдіть прийменники'
  instruction: 'Find and mark all spatial prepositions in the text.'
  text: 'Ми живемо в будинку біля парку. Напроти будинку є школа. За школою є великий стадіон. Перед входом ростуть квіти. Кіт любить спати на вікні або під столом. Вчора він заліз у шафу.'
  answers: ['в', 'біля', 'Напроти', 'За', 'Перед', 'на', 'під', 'у']

- type: true-false
  title: 'Логічна перевірка'
  instruction: 'Decide if the statement about Ukrainian grammar is true or false.'
  items:
    - statement: 'If I want to say "I am in the park", I use the Locative case.'
      correct: true
      explanation: 'Yes, static location uses Locative with "в".'
    - statement: 'If I want to say "I am going into the park", I use the Locative case.'
      correct: false
      explanation: 'No, motion into a space uses the Accusative case.'
    - statement: '"Під столом" (Instrumental) answers the question "Where is it located?".'
      correct: true
      explanation: 'Yes, "під" + Instrumental indicates static location under something.'
    - statement: '"Біля" requires the Accusative case.'
      correct: false
      explanation: 'No, "біля" always governs the Genitive case.'
    - statement: '"Напроти" implies being face-to-face or opposite something.'
      correct: true
      explanation: 'Yes, it means opposite or across from.'
    - statement: 'We use "в концерті" because a concert is an enclosed space.'
      correct: false
      explanation: 'No, for events we use "на" (на концерті).'
    - statement: '"До" implies motion towards a goal.'
      correct: true
      explanation: 'Yes, "до" means to or towards.'
    - statement: '"Між" is used when an object is located between two other objects.'
      correct: true
      explanation: 'Yes, "між" means between.'

- type: select
  title: 'Оберіть правильний прийменник'
  instruction: 'Select the most appropriate preposition for the context.'
  items:
    - question: 'Студент сидить ___ (at the table).'
      options:
        - text: 'за столом'
          correct: true
        - text: 'на столі'
          correct: false
        - text: 'під столом'
          correct: false
        - text: 'в столі'
          correct: false
      explanation: '"За столом" is the idiomatic way to say sitting at a table (literally behind/at).'
    - question: 'Картина висить ___ (above the sofa).'
      options:
        - text: 'над диваном'
          correct: true
        - text: 'на дивані'
          correct: false
        - text: 'під диваном'
          correct: false
        - text: 'перед диваном'
          correct: false
      explanation: '"Над" means above/over.'
    - question: 'Ми зустрінемося ___ (near the metro).'
      options:
        - text: 'біля метро'
          correct: true
        - text: 'в метро'
          correct: false
        - text: 'на метро'
          correct: false
        - text: 'під метро'
          correct: false
      explanation: '"Біля" means near/by.'
    - question: 'Машина стоїть ___ (in front of the house).'
      options:
        - text: 'перед будинком'
          correct: true
        - text: 'за будинком'
          correct: false
        - text: 'в будинку'
          correct: false
        - text: 'на будинку'
          correct: false
      explanation: '"Перед" means in front of.'
    - question: 'Я йду ___ (to the doctor).'
      options:
        - text: 'до лікаря'
          correct: true
        - text: 'в лікаря'
          correct: false
        - text: 'на лікаря'
          correct: false
        - text: 'під лікаря'
          correct: false
      explanation: 'Motion towards a person uses "до".'
    - question: 'Ми йдемо ___ (to the concert).'
      options:
        - text: 'на концерт'
          correct: true
        - text: 'в концерт'
          correct: false
        - text: 'до концерту'
          correct: false
        - text: 'під концерт'
          correct: false
      explanation: 'Events use "на".'