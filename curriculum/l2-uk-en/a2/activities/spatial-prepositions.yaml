- type: group-sort
  title: 'Сортування за відмінками'
  instruction: 'Sort the prepositions based on the case they strictly govern in this lesson context.'
  groups:
    - name: 'Орудний (Instrumental - Static)'
      items: ['під', 'над', 'перед', 'за', 'між']
    - name: 'Родовий (Genitive - Proximity/Motion)'
      items: ['біля', 'напроти', 'до', 'з', 'навколо']
    - name: 'Змінний (Locative or Accusative)'
      items: ['в', 'на']

- type: quiz
  title: 'Де кіт? (Статичне місце)'
  instruction: 'Choose the correct description of where the cat is located.'
  items:
    - question: 'Кіт сидить на поверхні столу. Де він?'
      explanation: 'На поверхні = на столі (Locative).'
      options:
        - text: 'на столі'
          correct: true
        - text: 'в столі'
          correct: false
        - text: 'під столом'
          correct: false
        - text: 'над столом'
          correct: false
    - question: 'Кіт сховався під ліжком. Де він?'
      explanation: 'Нижче об’єкта = під ліжком (Instrumental).'
      options:
        - text: 'під ліжком'
          correct: true
        - text: 'на ліжку'
          correct: false
        - text: 'за ліжком'
          correct: false
        - text: 'перед ліжком'
          correct: false
    - question: 'Кіт сидить між кріслами. Де він?'
      explanation: 'У просторі, що розділяє об’єкти = між кріслами (Instrumental).'
      options:
        - text: 'між кріслами'
          correct: true
        - text: 'біля крісел'
          correct: false
        - text: 'на кріслах'
          correct: false
        - text: 'під кріслами'
          correct: false
    - question: 'Кіт стоїть перед дверима. Де він?'
      explanation: 'Лицем до об’єкта = перед дверима (Instrumental).'
      options:
        - text: 'перед дверима'
          correct: true
        - text: 'за дверима'
          correct: false
        - text: 'в дверях'
          correct: false
        - text: 'на дверях'
          correct: false
    - question: 'Кіт сидить у коробці. Де він?'
      explanation: 'Всередині об’єкта = у коробці (Locative).'
      options:
        - text: 'у коробці'
          correct: true
        - text: 'на коробці'
          correct: false
        - text: 'під коробкою'
          correct: false
        - text: 'біля коробки'
          correct: false
    - question: 'Кіт сидить напроти дзеркала. Де він?'
      explanation: 'Візаві = напроти дзеркала (Genitive).'
      options:
        - text: 'напроти дзеркала'
          correct: true
        - text: 'біля дзеркала'
          correct: false
        - text: 'в дзеркалі'
          correct: false
        - text: 'за дзеркалом'
          correct: false
    - question: 'Кіт спить за диваном. Де він?'
      explanation: 'З іншого боку об’єкта = за диваном (Instrumental).'
      options:
        - text: 'за диваном'
          correct: true
        - text: 'на дивані'
          correct: false
        - text: 'перед диваном'
          correct: false
        - text: 'під диваном'
          correct: false
    - question: 'Кіт висить над підлогою (на люстрі). Де він?'
      explanation: 'Вище об’єкта = над підлогою (Instrumental).'
      options:
        - text: 'над підлогою'
          correct: true
        - text: 'на підлозі'
          correct: false
        - text: 'під підлогою'
          correct: false
        - text: 'в підлозі'
          correct: false

- type: fill-in
  title: 'Рух чи Місце? (Motion vs Location)'
  instruction: 'Choose the correct form based on whether the action implies motion (Accusative) or location (Locative).'
  items:
    - sentence: 'Я кладу книгу ___.'
      answer: 'на стіл'
      explanation: 'Action of placing = Motion -> Accusative.'
      options: ['на стіл', 'на столі', 'на столу', 'на стілець']
    - sentence: 'Книга лежить ___.'
      answer: 'на столі'
      explanation: 'State of lying = Location -> Locative.'
      options: ['на столі', 'на стіл', 'на столу', 'на столом']
    - sentence: 'Ми йдемо ___.'
      answer: 'в парк'
      explanation: 'Walking to a destination = Motion -> Accusative.'
      options: ['в парк', 'в парку', 'в парком', 'в парка']
    - sentence: 'Ми гуляємо ___.'
      answer: 'в парку'
      explanation: 'Walking around inside a place = Location -> Locative.'
      options: ['в парку', 'в парк', 'в парком', 'в парка']
    - sentence: 'Я вішаю картину ___.'
      answer: 'на стіну'
      explanation: 'Action of hanging onto = Motion -> Accusative.'
      options: ['на стіну', 'на стіні', 'на стіною', 'на стіни']
    - sentence: 'Картина висить ___.'
      answer: 'на стіні'
      explanation: 'State of hanging = Location -> Locative.'
      options: ['на стіні', 'на стіну', 'на стіною', 'на стіни']
    - sentence: 'Вона поклала ручку ___.'
      answer: 'в сумку'
      explanation: 'Action of putting into = Motion -> Accusative.'
      options: ['в сумку', 'в сумці', 'в сумкою', 'в сумки']
    - sentence: 'Ручка лежить ___.'
      answer: 'в сумці'
      explanation: 'State of lying inside = Location -> Locative.'
      options: ['в сумці', 'в сумку', 'в сумкою', 'в сумки']

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Reorder the words to form correct sentences about location and motion.'
  items:
    - words: ['Наш', 'сірий', 'кіт', 'завжди', 'спить', 'під', 'кухонним', 'столом']
      answer: 'Наш сірий кіт завжди спить під кухонним столом'
    - words: ['Ми', 'з', 'друзями', 'йдемо', 'в', 'новий', 'театр']
      answer: 'Ми з друзями йдемо в новий театр'
    - words: ['Красива', 'ваза', 'з', 'квітами', 'стоїть', 'на', 'вікні']
      answer: 'Красива ваза з квітами стоїть на вікні'
    - words: ['Я', 'завжди', 'ставлю', 'чашку', 'з', 'чаєм', 'на', 'стіл']
      answer: 'Я завжди ставлю чашку з чаєм на стіл'
    - words: ['Великий', 'банк', 'знаходиться', 'прямо', 'напроти', 'старої', 'пошти']
      answer: 'Великий банк знаходиться прямо напроти старої пошти'
    - words: ['Ми', 'з', 'родиною', 'живемо', 'біля', 'великого', 'парку']
      answer: 'Ми з родиною живемо біля великого парку'
    - words: ['Нова', 'яскрава', 'лампа', 'висить', 'прямо', 'над', 'диваном']
      answer: 'Нова яскрава лампа висить прямо над диваном'
    - words: ['Старе', 'високе', 'дерево', 'росте', 'прямо', 'перед', 'цим', 'будинком']
      answer: 'Старе високе дерево росте прямо перед цим будинком'

- type: error-correction
  title: 'Виправте помилки'
  instruction: 'Find and correct the error in preposition or case usage.'
  items:
    - sentence: 'Я йду в школі.'
      error: 'в школі'
      answer: 'в школу'
      options: ['в школу', 'на школу', 'до школи', 'зі школи']
      explanation: 'Motion towards a destination requires Accusative (в школу), not Locative (в школі).'
    - sentence: 'Книга лежить на стіл.'
      error: 'на стіл'
      answer: 'на столі'
      options: ['на столі', 'під столом', 'в столі', 'за столом']
      explanation: 'Static location requires Locative (на столі), not Accusative (на стіл).'
    - sentence: 'Ми стоїмо біля магазин.'
      error: 'магазин'
      answer: 'магазину'
      options: ['магазину', 'магазині', 'магазином', 'магазини']
      explanation: 'The preposition біля requires the Genitive case (магазину).'
    - sentence: 'Він живе в вулиці Франка.'
      error: 'в'
      answer: 'на'
      options: ['на', 'у', 'під', 'над']
      explanation: 'For streets (open surfaces), we use на, not в.'
    - sentence: 'Я йду до банку.'
      error: 'до банку'
      answer: 'в банк'
      options: ['в банк', 'на банк', 'під банк', 'за банк']
      explanation: 'While "до банку" implies approach, entering the building usually uses "в банк" (Accusative). If correct context implies entering.'
      error_type: 'construction'
    - sentence: 'Вона сидить між братом.'
      error: 'між братом'
      answer: 'між братами'
      options: ['між братами', 'між брата', 'між брату', 'між братів']
      explanation: 'Між implies "between" two or more things, so it usually requires a plural or two nouns.'
      error_type: 'construction'
    - sentence: 'Кіт заліз під ліжком.'
      error: 'під ліжком'
      answer: 'під ліжко'
      options: ['під ліжко', 'на ліжко', 'за ліжко', 'в ліжко']
      explanation: 'Motion (crawling under) requires Accusative (під ліжко), not Instrumental (під ліжком).'

