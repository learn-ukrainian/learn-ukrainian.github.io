- id: true-false-locative-rules
  type: true-false
  instruction: Правда чи ні? Оцініть граматичні правила
  items:
  - statement: Слово «робота» у місцевому відмінку завжди вживається з прийменником
      «на» (на роботі).
    correct: true
    explanation: Це фіксований вираз, ми ніколи не кажемо «у роботі».
  - statement: Щоб сказати «in childhood», ми говоримо «на дитинстві».
    correct: false
    explanation: 'Правильно: «у дитинстві», оскільки це життєвий період.'
  - statement: З місяцями ми використовуємо прийменник «на» (наприклад, на січні).
    correct: false
    explanation: З місяцями завжди використовується прийменник «у/в» (у січні, у травні).
  - statement: Щоб сказати «by phone», ми використовуємо прийменник «по» (по телефону).
    correct: true
    explanation: Канал або засіб зв'язку передається прийменником «по».
  - statement: Зі словом «тиждень» ми використовуємо прийменник «на» (на минулому
      тижні).
    correct: true
    explanation: Слово «тиждень» завжди вимагає прийменника «на».
  - statement: Для абстрактних сфер (наука, медицина) ми зазвичай використовуємо прийменник
      «у/в».
    correct: true
    explanation: 'Наприклад: в освіті, у науці, в медицині.'
  - statement: Дні тижня (наприклад, понеділок) також ставляться у місцевому відмінку.
    correct: false
    explanation: Дні тижня вимагають знахідного відмінка (у понеділок, у середу).
  - statement: Якщо слово жіночого роду закінчується на «-ка» (політика), у місцевому
      відмінку «-к» змінюється на «-ц» (у політиці).
    correct: true
    explanation: Це правило чергування приголосних.
- id: fill-in-locative-endings
  type: fill-in
  instruction: Вставте правильні закінчення іменників у місцевому відмінку
  items:
  - sentence: Вона працює в українській ____.
    answer: політиці
    options:
    - політиці
    - політикі
    - політику
  - sentence: В українській ____ є багато традицій.
    answer: культурі
    options:
    - культурі
    - культуру
    - культура
  - sentence: Ми читаємо про нові відкриття у ____.
    answer: науці
    options:
    - науці
    - наукі
    - науку
  - sentence: Я працюю в сучасній ____.
    answer: медицині
    options:
    - медицині
    - медицину
    - медицина
  - sentence: Зараз мій брат на ____.
    answer: роботі
    options:
    - роботі
    - роботу
    - робота
  - sentence: У моєму ____ є багато змін.
    answer: житті
    options:
    - житті
    - життя
    - життю
  - sentence: Я часто говорю з нею по ____.
    answer: телефону
    options:
    - телефону
    - телефоні
    - телефон
  - sentence: Він був у ____ минулого місяця.
    answer: відрядженні
    options:
    - відрядженні
    - відрядження
    - відрядженню
- id: odd-one-out-locative
  type: odd-one-out
  instruction: Знайдіть зайве слово в кожній групі (за граматичним правилом або значенням)
  items:
  - words:
    - у січні
    - у лютому
    - на тижні
    - у жовтні
    correct: 2
    explanation: «На тижні» вживається з прийменником «на», а всі місяці — з «у/в».
  - words:
    - в освіті
    - в медицині
    - у політиці
    - на роботі
    correct: 3
    explanation: «На роботі» вживається з «на», а інші сфери — з «у/в».
  - words:
    - по телефону
    - по радіо
    - у листі
    - по пошті
    correct: 2
    explanation: Усі інші слова позначають канал зв'язку з прийменником «по».
  - words:
    - наука
    - культура
    - медицина
    - дитинство
    correct: 3
    explanation: «Дитинство» — це віковий період, а інші слова позначають сфери діяльності.
  - words:
    - в історії
    - у березні
    - у травні
    - у серпні
    correct: 0
    explanation: «В історії» — абстрактна сфера, а інші — місяці (час).
  - words:
    - у дитинстві
    - у молодості
    - у майбутньому
    - по дорозі
    correct: 3
    explanation: «По дорозі» — засіб/шлях переміщення, а інші слова позначають час
      або вік.
  - words:
    - у політиці
    - науці
    - у думці
    - в архітектурі
    correct: 3
    explanation: В архітектурі немає чергування приголосних к→ц у місцевому відмінку,
      а в інших є (політика-політиці, наука-науці, думка-думці).
  - words:
    - місяць
    - тиждень
    - день
    - телефон
    correct: 3
    explanation: Телефон — це засіб зв'язку (предмет), а решта слів позначають проміжки
      часу.
- id: error-correction-locative-usage
  type: error-correction
  instruction: Виправте граматичні помилки у реченнях
  items:
  - sentence: У минулому тижні я був у відрядженні.
    error: У
    correction: На
    error_type: word
    options:
    - На
    - По
    - В
    explanation: Зі словом «тиждень» завжди вживається прийменник «на».
  - sentence: Ми часто говоримо в телефону.
    error: в
    correction: по
    error_type: word
    options:
    - по
    - на
    - з
    explanation: Канал зв'язку позначається прийменником «по».
  - sentence: Мій брат працює в наука.
    error: наука
    correction: науці
    error_type: word
    options:
    - науці
    - наукі
    - науку
    explanation: Після прийменника «в» потрібен місцевий відмінок з чергуванням (к
      → ц).
