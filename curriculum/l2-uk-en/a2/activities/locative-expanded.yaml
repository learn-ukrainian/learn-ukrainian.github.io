inline:
- id: quiz-identify-the-function-of-locative-in-each-sentence
  type: quiz
  instruction: Визначте функцію місцевого відмінка в кожному реченні
  items:
  - question: У минулому місяці я змінив роботу.
    options:
    - Фізичне місце
    - Абстрактна сфера
    - Часовий місцевий
    - Засіб / Канал
    correct: 2
  - question: Тепер я працюю в освіті.
    options:
    - Фізичне місце
    - Абстрактна сфера
    - Часовий місцевий
    - Засіб / Канал
    correct: 1
  - question: Вчора ми розмовляли по телефону.
    options:
    - Фізичне місце
    - Абстрактна сфера
    - Часовий місцевий
    - Засіб / Канал
    correct: 3
  - question: Книга лежить на столі.
    options:
    - Фізичне місце
    - Абстрактна сфера
    - Часовий місцевий
    - Засіб / Канал
    correct: 0
  - question: Ми плануємо подорож у травні.
    options:
    - Фізичне місце
    - Абстрактна сфера
    - Часовий місцевий
    - Засіб / Канал
    correct: 2
  - question: Мій тато багато років працює в медицині.
    options:
    - Фізичне місце
    - Абстрактна сфера
    - Часовий місцевий
    - Засіб / Канал
    correct: 1
  - question: Вони говорили про новий проєкт по дорозі в офіс.
    options:
    - Фізичне місце
    - Абстрактна сфера
    - Часовий місцевий
    - Засіб / Канал
    correct: 3
  - question: Ми зустрілися в парку.
    options:
    - Фізичне місце
    - Абстрактна сфера
    - Часовий місцевий
    - Засіб / Канал
    correct: 0
- id: fill-in-complete-sentences-with-the-correct-locative-form
  type: fill-in
  instruction: Вставте правильну форму слова
  items:
  - sentence: У минулому ____ я змінив роботу.
    answer: місяці
    options:
    - місяць
    - місяці
    - місяцю
  - sentence: Тепер я працюю в ____.
    answer: освіті
    options:
    - освіта
    - освіту
    - освіті
  - sentence: Він має великий досвід у ____.
    answer: політиці
    options:
    - політика
    - політиці
    - політику
  - sentence: Ми часто читаємо про нові відкриття у ____.
    answer: науці
    options:
    - наука
    - наукі
    - науці
  - sentence: У європейському ____ є багато різних стилів.
    answer: мистецтві
    options:
    - мистецтві
    - мистецтво
    - мистецтва
  - sentence: Зараз мій тато на ____.
    answer: роботі
    options:
    - робота
    - роботі
    - роботу
  - sentence: У моєму ____ я дуже любив малювати.
    answer: дитинстві
    options:
    - дитинстві
    - дитинство
    - дитинства
  - sentence: Ми хочемо купити нову машину у наступному ____.
    answer: місяці
    options:
    - місяць
    - місяці
    - місяцю
