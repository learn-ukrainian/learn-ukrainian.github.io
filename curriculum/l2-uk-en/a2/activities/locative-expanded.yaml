version: '1.0'
module: locative-expanded
level: a2
inline: []
workbook:
- id: quiz-locative-functions
  type: quiz
  instruction: Визначте функцію місцевого відмінка у реченні
  items:
  - question: Мій тато працює в освіті.
    options:
    - Місце
    - Час
    - Абстрактна сфера
    - Засіб
    correct: 2
  - question: Ми чули цю новину по радіо.
    options:
    - Місце
    - Час
    - Абстрактна сфера
    - Засіб
    correct: 3
  - question: Вони зустрілися у січні.
    options:
    - Місце
    - Час
    - Абстрактна сфера
    - Засіб
    correct: 1
  - question: Книга лежить на столі.
    options:
    - Місце
    - Час
    - Абстрактна сфера
    - Засіб
    correct: 0
  - question: Я часто говорю з мамою по телефону.
    options:
    - Місце
    - Час
    - Абстрактна сфера
    - Засіб
    correct: 3
  - question: Вона досягла великого успіху у політиці.
    options:
    - Місце
    - Час
    - Абстрактна сфера
    - Засіб
    correct: 2
  - question: На цьому тижні ми їдемо у подорож.
    options:
    - Місце
    - Час
    - Абстрактна сфера
    - Засіб
    correct: 1
  - question: Мій новий кабінет знаходиться в офісі.
    options:
    - Місце
    - Час
    - Абстрактна сфера
    - Засіб
    correct: 0
- id: fill-in-locative-forms
  type: fill-in
  instruction: Вставте іменник у правильній відмінковій формі
  items:
  - sentence: Вона працює в (освіта) ____.
    answer: освіті
    options:
    - освіта
    - освіті
    - освітою
  - sentence: Ми довго говорили по (телефон) ____.
    answer: телефону
    options:
    - телефон
    - телефоні
    - телефону
  - sentence: У минулому (місяць) ____ було багато проблем.
    answer: місяці
    options:
    - місяць
    - місяці
    - місяцю
  - sentence: На цьому (тиждень) ____ у нас цікава зустріч.
    answer: тижні
    options:
    - тиждень
    - тижні
    - тижню
  - sentence: У (дитинство) ____ я читав багато казок.
    answer: дитинстві
    options:
    - дитинство
    - дитинстві
    - дитинства
  - sentence: Мій друг дуже добре розуміється у (мистецтво) ____.
    answer: мистецтві
    options:
    - мистецтво
    - мистецтві
    - мистецтву
  - sentence: Ці новини показують по (телевізор) ____.
    answer: телевізору
    options:
    - телевізор
    - телевізорі
    - телевізору
  - sentence: Я багато подорожував у (молодість) ____.
    answer: молодості
    options:
    - молодість
    - молодості
    - молодістю
- id: match-up-locative-expressions
  type: match-up
  instruction: З'єднайте вирази з їхнім перекладом
  pairs:
  - left: у минулому місяці
    right: last month
  - left: на цьому тижні
    right: this week
  - left: по телефону
    right: by phone
  - left: в освіті
    right: in education
  - left: у дитинстві
    right: in childhood
  - left: у майбутньому
    right: in the future
  - left: по радіо
    right: on the radio
  - left: на роботі
    right: at work
- id: error-correction-prepositions
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Ми не можемо говорити, тому що ми у роботі.
    error: у роботі
    correction: на роботі
    error_type: phrase
    options:
    - на роботі
    - в роботі
    - по роботі
    explanation: Зі словом «робота» ми завжди використовуємо прийменник «на».
  - sentence: Я подзвоню тобі у телефоні.
    error: у телефоні
    correction: по телефону
    error_type: phrase
    options:
    - по телефону
    - на телефону
    - по телефоні
    explanation: Для засобів комунікації українською правильно казати «по телефону».
  - sentence: На минулому місяці ми були в театрі.
    error: На минулому місяці
    correction: У минулому місяці
    error_type: phrase
    options:
    - У минулому місяці
    - По минулому місяцю
    - При минулому місяці
    explanation: З місяцями використовується прийменник «у/в», а не «на».
  - sentence: У цьому тижні у мене багато проблем.
    error: У цьому тижні
    correction: На цьому тижні
    error_type: phrase
    options:
    - На цьому тижні
    - По цьому тижню
    - В цьому тижні
    explanation: Зі словом «тиждень» використовується прийменник «на».
  - sentence: Я почула ці новини на радіо.
    error: на радіо
    correction: по радіо
    error_type: phrase
    options:
    - по радіо
    - у радіо
    - з радіо
    explanation: Для засобів масової інформації використовується прийменник «по».
  - sentence: Моя сестра дуже хоче працювати на бізнесі.
    error: на бізнесі
    correction: у бізнесі
    error_type: phrase
    options:
    - у бізнесі
    - по бізнесі
    - до бізнесу
    explanation: Абстрактні сфери (бізнес, наука, мистецтво) вимагають прийменника
      «у/в».
  - sentence: Вона надіслала важливі документи в пошті.
    error: в пошті
    correction: по пошті
    error_type: phrase
    options:
    - по пошті
    - на пошті
    - через пошту
    explanation: Для засобів передачі інформації використовується «по» (по пошті).
  - sentence: На молодості він багато подорожував.
    error: На молодості
    correction: У молодості
    error_type: phrase
    options:
    - У молодості
    - В молодість
    - За молодості
    explanation: Для життєвих періодів (дитинство, молодість) використовується прийменник
      «у/в».
- id: group-sort-prepositions
  type: group-sort
  instruction: Розподіліть слова за прийменником, який вони вимагають
  groups:
  - label: потребує «у/в»
    items:
    - мистецтві
    - минулому місяці
    - дитинстві
    - думках
  - label: потребує «на»
    items:
    - роботі
    - цьому тижні
    - наступному тижні
    - столі
  - label: потребує «по»
    items:
    - телефону
    - радіо
    - телевізору
    - дорозі
