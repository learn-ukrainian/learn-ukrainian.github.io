  type: match-up
  instruction: З'єднайте українські вирази з їх англійськими відповідниками
  pairs:
  - left: у минулому місяці
    right: last month
  - left: на минулому тижні
    right: last week
  - left: працювати в освіті
    right: to work in education
  - left: працювати на роботі
    right: to be at work
  - left: говорити по телефону
    right: to speak by phone
  - left: почути по радіо
    right: to hear on the radio
  - left: надіслати по пошті
    right: to send by mail
  - left: у дитинстві
    right: in childhood
