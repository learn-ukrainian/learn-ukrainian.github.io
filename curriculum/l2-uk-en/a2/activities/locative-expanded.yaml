    - жовтні
    - жовтню
- id: quiz-locative-functions
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: Який прийменник використовується зі словом «робота» (наприклад, ____
      роботі)?
    options:
    - у
    - в
    - на
    - по
    correct: 2
  - question: Який прийменник використовується зі словом «тиждень» (наприклад, ____
      тижні)?
    options:
    - у
    - в
    - на
    - по
    correct: 2
  - question: Який прийменник ми використовуємо, коли говоримо про засіб зв'язку (наприклад,
      ____ телефону)?
    options:
    - у
    - в
    - на
    - по
    correct: 3
  - question: Який відмінок ми використовуємо для днів тижня (наприклад, у понеділок)?
    options:
    - Місцевий
    - Знахідний
    - Називний
    - Родовий
    correct: 1
  - question: Який відмінок ми використовуємо для місяців (наприклад, у січні)?
    options:
    - Місцевий
    - Знахідний
    - Називний
    - Родовий
    correct: 0
  - question: 'Як правильно сказати: «в минулому...»'
    options:
    - місяць
    - місяцю
    - місяці
    - місяця
    correct: 2
  - question: Як правильно сказати «by phone» українською?
    options:
    - в телефоні
    - на телефоні
    - по телефону
    - з телефоном
    correct: 2
  - question: 'Коли ми обговорюємо тему (наприклад, about music), ми використовуємо:'
    options:
    - по + місцевий
    - про + знахідний
    - у + місцевий
    - на + місцевий
    correct: 1
