version: '1.0'
module: locative-expanded
level: a2
workbook:
- id: quiz-locative-function
  type: quiz
  instruction: Визначте функцію місцевого відмінка в кожному реченні
  items:
  - question: Моя сестра працює у політиці.
    options:
    - фізичне місце
    - абстрактна сфера
    - час
    - засіб зв'язку
    correct: 1
  - question: Ми почули гарну пісню по радіо.
    options:
    - фізичне місце
    - абстрактна сфера
    - час
    - засіб зв'язку
    correct: 3
  - question: Що ви робите у травні?
    options:
    - фізичне місце
    - абстрактна сфера
    - час
    - засіб зв'язку
    correct: 2
  - question: Книжка лежить на столі.
    options:
    - фізичне місце
    - абстрактна сфера
    - час
    - засіб зв'язку
    correct: 0
  - question: Я шукаю нові ідеї у мистецтві.
    options:
    - фізичне місце
    - абстрактна сфера
    - час
    - засіб зв'язку
    correct: 1
  - question: Обережно, велика машина стоїть на дорозі.
    options:
    - фізичне місце
    - абстрактна сфера
    - час
    - засіб зв'язку
    correct: 0
  - question: Вона надіслала документи по пошті.
    options:
    - фізичне місце
    - абстрактна сфера
    - час
    - засіб зв'язку
    correct: 3
  - question: На минулому тижні ми були в театрі.
    options:
    - фізичне місце
    - абстрактна сфера
    - час
    - засіб зв'язку
    correct: 2
- id: fill-in-locative-forms
  type: fill-in
  instruction: Доповніть речення правильною формою місцевого відмінка
  items:
  - sentence: У ___ я любив грати у футбол.
    answer: дитинстві
    options:
    - дитинство
    - дитинстві
    - дитинству
    - дитинством
  - sentence: На цьому ___ у мене багато роботи.
    answer: тижні
    options:
    - тиждень
    - тижню
    - тижні
    - тижнем
  - sentence: Вони часто розмовляють по ___.
    answer: телефону
    options:
    - телефоні
    - телефону
    - телефон
    - телефоном
  - sentence: Мій друг працює у великому ___.
    answer: бізнесі
    options:
    - бізнесі
    - бізнесу
    - бізнес
    - бізнесом
  - sentence: Ми завжди відпочиваємо у ___.
    answer: серпні
    options:
    - серпень
    - серпню
    - серпні
    - серпнем
  - sentence: Я купив свіжий хліб по ___ додому.
    answer: дорозі
    options:
    - дорога
    - дорогу
    - дорозі
    - дорогою
  - sentence: Що ви робите у ___?
    answer: майбутньому
    options:
    - майбутнє
    - майбутньому
    - майбутні
    - майбутнім
  - sentence: На ___ було багато людей.
    answer: зустрічі
    options:
    - зустріч
    - зустрічі
    - зустріччю
    - зустрічей
- id: match-up-locative
  type: match-up
  instruction: З'єднайте українські вирази з їхніми англійськими перекладами
  pairs:
  - left: у минулому місяці
    right: in the previous month
  - left: по дорозі додому
    right: on the way home
  - left: на цьому тижні
    right: this week
  - left: працювати в освіті
    right: to work in education
  - left: почути по радіо
    right: to hear on the radio
  - left: у молодості
    right: in youth
  - left: на важливій зустрічі
    right: at an important meeting
  - left: багато проблем у житті
    right: many problems in life
- id: error-correction-prepositions
  type: error-correction
  instruction: Знайдіть і виправте помилку в прийменнику
  items:
  - sentence: Я зараз у роботі.
    error: у
    correction: на
    error_type: word
    options:
    - в
    - на
    - по
    explanation: Зі словом «робота» завжди використовується прийменник «на».
  - sentence: Ми говорили у телефону.
    error: у
    correction: по
    error_type: word
    options:
    - по
    - на
    - про
    explanation: Засіб зв'язку вимагає прийменника «по» (по телефону).
  - sentence: На минулому місяці мій брат купив машину.
    error: На
    correction: У
    error_type: word
    options:
    - У
    - В
    - По
    explanation: З назвами місяців і словом «місяць» використовується прийменник «у»
      або «в».
  - sentence: Вони працюють на бізнесі.
    error: на
    correction: у
    error_type: word
    options:
    - в
    - у
    - по
    explanation: Абстрактні сфери, як-от бізнес чи політика, вимагають «у»/«в».
  - sentence: У цьому тижні я дуже зайнятий.
    error: У
    correction: На
    error_type: word
    options:
    - На
    - В
    - По
    explanation: Зі словом «тиждень» завжди використовується прийменник «на».
  - sentence: Вона дивиться новини про телевізору.
    error: про
    correction: по
    error_type: word
    options:
    - по
    - на
    - у
    explanation: Канал зв'язку (телевізор, радіо) вимагає прийменника «по».
  - sentence: Я купив свіжий хліб у дорозі додому.
    error: у
    correction: по
    error_type: word
    options:
    - на
    - по
    - в
    explanation: Процес або шлях подорожі передається виразом «по дорозі».
  - sentence: Що ти робиш в наступному тижні?
    error: в
    correction: на
    error_type: word
    options:
    - у
    - на
    - по
    explanation: Зі словом «тиждень» завжди використовується прийменник «на».
