    options:
    - серпень
    - серпню
    - серпні
  - sentence: Ми плануємо нову подорож у ____.
    answer: травні
    options:
    - травень
    - травні
    - травню
  - sentence: Вони закінчили роботу на минулому ____.
    answer: тижні
