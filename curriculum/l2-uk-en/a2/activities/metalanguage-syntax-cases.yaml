version: '1.0'
module: metalanguage-syntax-cases
level: a2
inline:
- id: mark-the-words-core
  type: quiz
  instruction: Оберіть граматичну основу (підмет і присудок) у кожному реченні.
  items:
  - question: Молодий студент швидко читає нову книгу.
    options:
    - студент читає
    - молодий студент
    - читає книгу
    - швидко читає
    correct: 0
  - question: Осіннє сонце яскраво світить.
    options:
    - сонце світить
    - осіннє сонце
    - яскраво світить
    - сонце яскраво
    correct: 0
  - question: Веселі діти голосно співали пісню на вулиці.
    options:
    - діти співали
    - веселі діти
    - співали пісню
    - діти на вулиці
    correct: 0
  - question: Сильний вітер хилить високі клени.
    options:
    - вітер хилить
    - сильний вітер
    - хилить клени
    - вітер клени
    correct: 0
  - question: Маленька дитина дуже швидко росте.
    options:
    - дитина росте
    - маленька дитина
    - швидко росте
    - дуже швидко
    correct: 0
  - question: Наш двір прикрашає лелече гніздо.
    options:
    - гніздо прикрашає
    - двір прикрашає
    - наш двір
    - лелече гніздо
    correct: 0
  title: Оберіть граматичну основу (підмет і присудок) у кожному реченні.
- id: quiz-secondary
  type: quiz
  instruction: Яким членом речення є виділене слово?
  items:
  - question: Я читаю цікаву *книгу*.
    options:
    - додаток
    - підмет
    - означення
    - обставина
    correct: 0
  - question: '*Веселі* діти граються на вулиці.'
    options:
    - означення
    - підмет
    - додаток
    - обставина
    correct: 0
  - question: Ми зустрінемося *ввечері*.
    options:
    - обставина
    - присудок
    - додаток
    - означення
    correct: 0
  - question: Це *моя* нова кімната.
    options:
    - означення
    - підмет
    - додаток
    - обставина
    correct: 0
  - question: Брат написав лист *мамі*.
    options:
    - додаток
    - підмет
    - означення
    - обставина
    correct: 0
  - question: Вони живуть *у Києві*.
    options:
    - обставина
    - підмет
    - додаток
    - означення
    correct: 0
  title: Яким членом речення є виділене слово?
- id: group-sort-sentences
  type: group-sort
  instruction: Розподіліть речення на прості та складні.
  groups:
  - label: Просте речення
    items:
    - Я дуже люблю чорну каву.
    - Молодий студент швидко читає.
    - Сьогодні тепла осіння погода.
    - Наш двір прикрашає гніздо.
  - label: Складне речення
    items:
    - Сонце зайшло, і з'явилися зорі.
    - Я читаю, а брат дивиться телевізор.
    - Настала осінь, птахи відлетіли на південь.
    - Ми залишилися вдома, тому що йде дощ.
  title: Розподіліть речення на прості та складні.
- id: match-cases-to-questions
  type: match-up
  instruction: З'єднайте відмінок і його питання.
  pairs:
  - left: Називний відмінок
    right: хто? що?
  - left: Родовий відмінок
    right: кого? чого?
  - left: Давальний відмінок
    right: кому? чому?
  - left: Знахідний відмінок
    right: кого? що?
  - left: Орудний відмінок
    right: ким? чим?
  - left: Місцевий відмінок
    right: на кому? на чому?
  title: З'єднайте відмінок і його питання.
- id: fill-in-cases
  type: fill-in
  instruction: Визначте відмінок виділеного слова (вставте правильну абревіатуру).
  items:
  - sentence: Я уважно читаю нову.
    answer: Зн.в.
    options:
    - Н.в.
    - Р.в.
    - Д.в.
    - Зн.в.
    - О.в.
    - М.в.
  - sentence: Брат пише лист.
    answer: Д.в.
    options:
    - Н.в.
    - Р.в.
    - Д.в.
    - Зн.в.
    - О.в.
    - М.в.
  - sentence: Ми малюємо синьою.
    answer: О.в.
    options:
    - Н.в.
    - Р.в.
    - Д.в.
    - Зн.в.
    - О.в.
    - М.в.
  - sentence: швидко читає.
    answer: Н.в.
    options:
    - Н.в.
    - Р.в.
    - Д.в.
    - Зн.в.
    - О.в.
    - М.в.
  - sentence: У мене немає.
    answer: Р.в.
    options:
    - Н.в.
    - Р.в.
    - Д.в.
    - Зн.в.
    - О.в.
    - М.в.
  - sentence: Кішка спить на.
    answer: М.в.
    options:
    - Н.в.
    - Р.в.
    - Д.в.
    - Зн.в.
    - О.в.
    - М.в.
  title: Визначте відмінок виділеного слова (вставте правильну абревіатуру).
workbook:
- type: unjumble
  instruction: Складіть речення з поданих слів (звертайте увагу на граматичний зв'язок).
  items:
  - words:
    - швидко
    - студент
    - Молодий
    - книгу.
    - читає
    correct_order:
    - Молодий
    - студент
    - швидко
    - читає
    - книгу.
  - words:
    - двір
    - Наш
    - гніздо.
    - лелече
    - прикрашає
    correct_order:
    - Наш
    - двір
    - прикрашає
    - лелече
    - гніздо.
  - words:
    - яскраво
    - Осіннє
    - сонце
    - світить.
    correct_order:
    - Осіннє
    - сонце
    - яскраво
    - світить.
  - words:
    - йде
    - надворі
    - але
    - гуляти,
    - хочу
    - Я
    - дощ.
    correct_order:
    - Я
    - хочу
    - гуляти,
    - але
    - надворі
    - йде
    - дощ.
  - words:
    - на
    - працює
    - брат
    - Мій
    - роботі.
    correct_order:
    - Мій
    - брат
    - працює
    - на
    - роботі.
  - words:
    - ми
    - Сьогодні
    - цікавий
    - фільм.
    - дивилися
    correct_order:
    - Сьогодні
    - ми
    - дивилися
    - цікавий
    - фільм.
  title: Складіть речення з поданих слів (звертайте увагу на граматичний зв'язок).
- type: error-correction
  instruction: Знайдіть і виправте помилку у відмінку.
  items:
  - sentence: Я бачу красива дівчина.
    error: красива дівчина
    correction: красиву дівчину
    error_type: phrase
    options:
    - красиву дівчину
    - красивій дівчині
    - красивою дівчиною
    explanation: Додаток після 'бачу' має бути у знахідному відмінку (кого? що?).
  - sentence: Ми гуляли з мій брат.
    error: мій брат
    correction: моїм братом
    error_type: phrase
    options:
    - мого брата
    - моєму брату
    - моїм братом
    explanation: Прийменник 'з' вимагає орудного відмінка (з ким?).
  - sentence: Я купив подарунок для сестра.
    error: сестра
    correction: сестри
    error_type: word
    options:
    - сестри
    - сестрі
    - сестрою
    explanation: Прийменник 'для' вимагає родового відмінка (кого? чого?).
  - sentence: Кіт спить на диван.
    error: диван
    correction: дивані
    error_type: word
    options:
    - дивана
    - дивану
    - дивані
    explanation: Прийменник 'на' для місця вимагає місцевого відмінка (на чому?).
  - sentence: Це книга мій друг.
    error: мій друг
    correction: мого друга
    error_type: phrase
    options:
    - моєму другу
    - мого друга
    - моїм другом
    explanation: Щоб показати приналежність, потрібен родовий відмінок (кого? чого?).
  - sentence: Я даю яблуко дівчина.
    error: дівчина
    correction: дівчині
    error_type: word
    options:
    - дівчини
    - дівчині
    - дівчиною
    explanation: Дія спрямована на когось, потрібен давальний відмінок (кому?).
  title: Знайдіть і виправте помилку у відмінку.
- type: fill-in
  instruction: Вставте правильний сполучник у складне речення.
  items:
  - sentence: Я хочу піти в кіно, ____ у мене немає часу.
    answer: але
    options:
    - і
    - але
    - тому що
  - sentence: Ми залишилися вдома, ____ на вулиці йде дощ.
    answer: тому що
    options:
    - але
    - тому що
    - і
  - sentence: Сонце зайшло, ____ на небі з'явилися зорі.
    answer: і
    options:
    - але
    - тому що
    - і
  - sentence: Я читаю цікаву книгу, ____ мій брат дивиться телевізор.
    answer: а
    options:
    - а
    - бо
    - якщо
  - sentence: Він не прийшов на урок, ____ захворів.
    answer: бо
    options:
    - і
    - бо
    - але
  - sentence: Ми підемо гуляти, ____ завтра буде гарна погода.
    answer: якщо
    options:
    - якщо
    - але
    - і
  title: Вставте правильний сполучник у складне речення.
