version: '1.0'
module: metalanguage-syntax-cases
level: a2
inline:
- id: mark-the-words-combinations
  type: quiz
  instruction: Оберіть правильне словосполучення.
  items:
  - question: Яка пара слів є справжнім словосполученням?
    options:
    - осіннє небо
    - студент читає
    - на столі
    - ліс і поле
    correct: 0
  - question: Яка з цих конструкцій НЕ є словосполученням (це граматична основа)?
    options:
    - сонце світить
    - яскраве сонце
    - світить яскраво
    - дуже тепло
    correct: 0
  - question: У словосполученні «цікава книга», яке слово є головним?
    options:
    - книга
    - цікава
    - обидва слова
    - немає головного
    correct: 0
  - question: Яка пара слів є словосполученням?
    options:
    - швидко читати
    - брат і сестра
    - перед школою
    - вона йде
    correct: 0
  - question: Яке слово є залежним у словосполученні «швидко читати»?
    options:
    - швидко
    - читати
    - обидва слова
    - немає залежного
    correct: 0
  - question: Чому фраза «біля школи» не є словосполученням?
    options:
    - Бо прийменник не є самостійним словом.
    - Бо це підмет і присудок.
    - Бо тут два залежні слова.
    - Бо тут немає підмета.
    correct: 0
- id: mark-the-words-core
  type: quiz
  instruction: Визначте граматичну основу (підмет і присудок) у реченні.
  items:
  - question: «Маленька дитина дуже швидко росте.»
    options:
    - дитина росте
    - маленька дитина
    - швидко росте
    - дуже швидко
    correct: 0
  - question: «Сильний вітер хилить високі клени.»
    options:
    - вітер хилить
    - сильний вітер
    - хилить клени
    - високі клени
    correct: 0
  - question: «Високі клени хиляються від вітру.»
    options:
    - клени хиляються
    - високі клени
    - хиляються від
    - від вітру
    correct: 0
  - question: «Київ — столиця України.»
    options:
    - Київ — столиця
    - столиця України
    - Київ — України
    - Київ — це
    correct: 0
  - question: «Літнє сонце яскраво світить.»
    options:
    - сонце світить
    - літнє сонце
    - яскраво світить
    - сонце яскраво
    correct: 0
  - question: «Студент уважно читає нову книгу.»
    options:
    - Студент читає
    - уважно читає
    - читає книгу
    - нову книгу
    correct: 0
- id: quiz-secondary
  type: quiz
  instruction: Яким членом речення є виділене слово?
  items:
  - question: 'У реченні «Я пишу лист МАМІ», слово «мамі» — це:'
    options:
    - додаток
    - підмет
    - означення
    - обставина
    correct: 0
  - question: 'У реченні «Наш двір прикрашає ЛЕЛЕЧЕ гніздо», слово «лелече» — це:'
    options:
    - означення
    - додаток
    - присудок
    - підмет
    correct: 0
  - question: 'У реченні «Ми зустрінемося УЛІТКУ», слово «улітку» — це:'
    options:
    - обставина
    - додаток
    - підмет
    - означення
    correct: 0
  - question: 'У реченні «ВЕСЕЛІ діти голосно співали», слово «веселі» — це:'
    options:
    - означення
    - підмет
    - обставина
    - присудок
    correct: 0
  - question: 'У реченні «Студент уважно ЧИТАЄ», слово «читає» — це:'
    options:
    - присудок
    - підмет
    - додаток
    - обставина
    correct: 0
  - question: 'У реченні «ДІТИ голосно співали пісню», слово «діти» — це:'
    options:
    - підмет
    - додаток
    - означення
    - обставина
    correct: 0
- id: group-sort-sentences
  type: group-sort
  instruction: Розподіліть речення на прості та складні.
  groups:
  - label: Просте речення (одна основа)
    items:
    - Сонце повільно зайшло.
    - Я купив свіжий хліб і холодне молоко.
    - Веселі діти співали пісню.
    - Улітку ми поїдемо на море.
  - label: Складне речення (дві або більше основ)
    items:
    - Сонце зайшло, і з'явилися перші зорі.
    - Я читаю книгу, а брат дивиться телевізор.
    - Настала осінь, птахи відлетіли на південь.
    - Ми залишилися вдома, тому що почалася гроза.
- id: match-cases-to-questions
  type: match-up
  instruction: З'єднайте відмінок із його питаннями.
  pairs:
  - left: Називний відмінок
    right: хто? що?
  - left: Родовий відмінок
    right: кого? чого?
  - left: Давальний відмінок
    right: кому? чому?
  - left: Знахідний відмінок
    right: кого? що?
  - left: Орудний відмінок
    right: ким? чим?
  - left: Місцевий відмінок
    right: на кому? на чому?
  - left: Кличний відмінок
    right: не має питань
workbook:
- type: fill-in
  instruction: Визначте відмінок слова в дужках, поставивши до нього правильне питання.
  items:
  - sentence: Я уважно читаю нову.
    answer: знахідний
    options:
    - називний
    - родовий
    - знахідний
    - орудний
  - sentence: Я малюю красивою.
    answer: орудний
    options:
    - давальний
    - орудний
    - місцевий
    - називний
  - sentence: Ми подарували квіти.
    answer: давальний
    options:
    - родовий
    - давальний
    - знахідний
    - місцевий
  - sentence: На столі немає.
    answer: родовий
    options:
    - називний
    - родовий
    - давальний
    - орудний
  - sentence: швидко читає текст.
    answer: називний
    options:
    - називний
    - знахідний
    - давальний
    - місцевий
  - sentence: Кіт спить на теплому.
    answer: місцевий
    options:
    - родовий
    - знахідний
    - орудний
    - місцевий
- type: quiz
  instruction: Оберіть правильний синтаксичний термін.
  items:
  - question: Який розділ науки вивчає правила вживання розділових знаків?
    options:
    - пунктуація
    - синтаксис
    - фонетика
    - лексикологія
    correct: 0
  - question: Який розділ науки вивчає словосполучення і речення?
    options:
    - синтаксис
    - пунктуація
    - морфологія
    - орфографія
    correct: 0
  - question: Як називаються слова «і», «але», «тому що»?
    options:
    - сполучники
    - прийменники
    - займенники
    - іменники
    correct: 0
  - question: Який розділовий знак ми ставимо між підметом і присудком, якщо вони
      обидва є іменниками (Київ _ столиця)?
    options:
    - тире
    - кома
    - крапка
    - двокрапка
    correct: 0
  - question: Який відмінок ми використовуємо тільки для прямого ввічливого звертання?
    options:
    - кличний
    - називний
    - давальний
    - місцевий
    correct: 0
  - question: Як називається речення, яке має тільки одну граматичну основу?
    options:
    - просте речення
    - складне речення
    - словосполучення
    - другорядне речення
    correct: 0
- type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про синтаксис.
  items:
  - statement: Підмет і присудок разом утворюють словосполучення.
    correct: false
    explanation: Підмет і присудок — це граматична основа, вони є рівноправними партнерами,
      а не словосполученням.
  - statement: В українській мові порядок слів є абсолютно вільним.
    correct: true
    explanation: Так, на відміну від англійської, українська мова має вільний порядок
      слів завдяки відмінкам.
  - statement: Означення найчастіше виражається прикметником і відповідає на питання
      «який?» або «чий?».
    correct: true
    explanation: Означення описує ознаку предмета, тому прикметники ідеально підходять
      для цієї ролі.
  - statement: У складному реченні перед сполучником «і» ніколи не ставиться кома.
    correct: false
    explanation: 'Навпаки! Золоте правило пунктуації: між основами складного речення
      перед «і» кома ставиться обов''язково.'
  - statement: Прийменник з іменником (наприклад, «на столі») є повноцінним словосполученням.
    correct: false
    explanation: Ні, прийменник не є самостійним словом. Для словосполучення потрібно
      ще одне слово, наприклад «лежить на столі».
  - statement: Додаток завжди відповідає на питання непрямих відмінків (усіх, крім
      називного).
    correct: true
    explanation: Так, додаток вказує на об'єкт дії і відповідає на питання кого? чого?
      кому? чому? тощо.
- type: unjumble
  instruction: Складіть правильне речення зі слів. Звертайте увагу на логіку і пунктуацію!
  items:
  - words:
    - читає
    - Студент
    - нову
    - книжку.
    correct_order:
    - Студент
    - читає
    - нову
    - книжку.
  - words:
    - вітер
    - Сильний
    - високі
    - хилить
    - клени.
    correct_order:
    - Сильний
    - вітер
    - хилить
    - високі
    - клени.
  - words:
    - уважно
    - слухають
    - Діти
    - вчителя.
    correct_order:
    - Діти
    - уважно
    - слухають
    - вчителя.
  - words:
    - молоко.
    - холодне
    - і
    - хліб
    - свіжий
    - купив
    - Я
    correct_order:
    - Я
    - купив
    - свіжий
    - хліб
    - і
    - холодне
    - молоко.
  - words:
    - Київ
    - столиця
    - —
    - України.
    correct_order:
    - Київ
    - —
    - столиця
    - України.
  - words:
    - дощ.
    - але
    - гуляти,
    - хочу
    - йде
    - Я
    correct_order:
    - Я
    - хочу
    - гуляти,
    - але
    - йде
    - дощ.
