- type: quiz
  title: 'Перевірте знання: Часові сполучники'
  items:
  - question: Яке слово означає один конкретний момент у часі?
    options:
    - text: коли
      correct: true
    - text: поки
      correct: false
    - text: якщо
      correct: false
    - text: щойно
      correct: false
    explanation: Слово 'коли' працює як фотографія і фіксує один точний момент у часі.
  - question: Яке слово показує безперервний процес, який постійно триває?
    options:
    - text: поки
      correct: true
    - text: коли
      correct: false
    - text: якщо
      correct: false
    - text: щойно
      correct: false
    explanation: Слово 'поки' працює як відеокамера і показує процес, що триває.
  - question: Яку структуру ми використовуємо, коли говоримо про подію до основної
      дії?
    options:
    - text: перед тим як
      correct: true
    - text: після того як
      correct: false
    - text: перед
      correct: false
    - text: поки не
      correct: false
    explanation: Ми обов'язково використовуємо 'перед тим як' перед дієсловом.
  - question: Яку структуру ми використовуємо, коли говоримо про подію після основної
      дії?
    options:
    - text: після того як
      correct: true
    - text: перед тим як
      correct: false
    - text: після
      correct: false
    - text: щойно
      correct: false
    explanation: Перед наступним дієсловом обов'язково треба ставити 'після того як'.
  - question: Яке слово в українській мові стосується виключно непевної умови?
    options:
    - text: якщо
      correct: true
    - text: коли
      correct: false
    - text: поки
      correct: false
    - text: щойно
      correct: false
    explanation: Коли подія може і не відбутися (це лише варіант), ми кажемо 'якщо'.
  - question: Яка конструкція вимагає обов'язкового використання подвійного заперечення
      у реченні?
    options:
    - text: поки не
      correct: true
    - text: перед тим як
      correct: false
    - text: як тільки
      correct: false
    - text: після того як
      correct: false
    explanation: В українській мові ідея ліміту дії передається через 'поки не'.
  - question: Яке слово найкраще підходить для негайної дії або дуже швидкої послідовності?
    options:
    - text: щойно
      correct: true
    - text: поки
      correct: false
    - text: коли
      correct: false
    - text: якщо
      correct: false
    explanation: Слова 'щойно' та 'як тільки' показують, що дія відбулася негайно.
  - question: Яка структура ідеально описує наші звички та події, які регулярно повторюються?
    options:
    - text: кожного разу, коли
      correct: true
    - text: поки не
      correct: false
    - text: перед тим як
      correct: false
    - text: після того як
      correct: false
    explanation: Ця описова фраза найкраще підходить для регулярних, повторюваних
      подій.
  instruction: Оберіть правильну відповідь.
- type: unjumble
  title: Складіть правильні речення
  items:
  - words:
    - Коли
    - я
    - прийшов
    - додому,
    - я
    - приготував
    - вечерю.
    answer: Коли я прийшов додому, я приготував вечерю.
  - words:
    - Поки
    - ми
    - чекаємо
    - автобус,
    - ми
    - можемо
    - поговорити.
    answer: Поки ми чекаємо автобус, ми можемо поговорити.
  - words:
    - Перед
    - тим
    - як
    - вийти,
    - я
    - перевіряю
    - погоду.
    answer: Перед тим як вийти, я перевіряю погоду.
  - words:
    - Після
    - того
    - як
    - дощ
    - закінчився,
    - ми
    - пішли
    - гуляти.
    answer: Після того як дощ закінчився, ми пішли гуляти.
  - words:
    - Я
    - буду
    - довго
    - чекати,
    - поки
    - ти
    - не
    - прийдеш.
    answer: Я буду довго чекати, поки ти не прийдеш.
  - words:
    - Щойно
    - я
    - побачив
    - його,
    - я
    - відразу
    - зателефонував.
    answer: Щойно я побачив його, я відразу зателефонував.
  instruction: Розташуйте слова у правильному порядку.
- type: fill-in
  title: Оберіть правильний сполучник
  items:
  - sentence: Я завжди щиро радію, коли бачу своїх старих друзів.
    answer: коли
    options:
    - коли
    - поки
    - якщо
    - щойно
    explanation: Тут описується конкретний момент у часі, коли ви бачите друзів.
  - sentence: Поки я уважно читав книгу, мій брат слухав музику.
    answer: Поки
    options:
    - Поки
    - Коли
    - Якщо
    - Щойно
    explanation: Дві дії (читання і слухання музики) відбуваються паралельно.
  - sentence: Перед тим як почати новий проєкт, важливо добре відпочити.
    answer: Перед тим як
    options:
    - Перед тим як
    - Після того як
    - Поки
    - Якщо
    explanation: Відпочинок передує початку проєкту.
  - sentence: Вона змінила роботу після того як переїхала в нове місто.
    answer: після того як
    options:
    - після того як
    - перед тим як
    - поки не
    - якщо
    explanation: Переїзд відбувся до того, як вона змінила роботу.
  - sentence: Я буду дуже радий, якщо ти зможеш приїхати до мене.
    answer: якщо
    options:
    - якщо
    - коли
    - поки
    - щойно
    explanation: Приїзд друга не гарантований, це умовна ситуація.
  - sentence: Працюй над цим складним завданням, поки не знайдеш правильне рішення.
    answer: поки не
    options:
    - поки не
    - перед тим як
    - після того як
    - коли
    explanation: Знаходження рішення - це ліміт дії, який зупиняє роботу.
  - sentence: Щойно ми вийшли з поїзда, ми відразу відчули свіже повітря.
    answer: Щойно
    options:
    - Щойно
    - Поки
    - Якщо
    - Перед тим як
    explanation: Слово 'щойно' показує негайну реакцію відразу після виходу.
  - sentence: Кожного разу, коли починається сильний дощ, він бере свою парасольку.
    answer: Кожного разу, коли
    options:
    - Кожного разу, коли
    - Поки не
    - Перед тим як
    - Після того як
    explanation: Ця конструкція ідеально описує регулярну звичку.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: error-correction
  title: 'Виправте помилки: Загублений займенник'
  items:
  - sentence: Перед я вийшов з дому, я перевірив прогноз погоди.
    error: Перед
    answer: Перед тим як
    options:
    - Перед тим як
    - Після того як
    - Поки не
    - Щойно
    explanation: Слово 'перед' не може стояти прямо перед займенником 'я', потрібен
      граматичний місток 'перед тим як'.
  - sentence: Після він прочитав новий лист, він дуже довго мовчав.
    error: Після
    answer: Після того як
    options:
    - Після того як
    - Перед тим як
    - Як тільки
    - Поки
    explanation: Слово 'після' вимагає використання займенника-якоря 'того' перед
      дієсловом 'прочитав'.
  - sentence: Я буду терпляче чекати тут, поки ти прийдеш.
    error: поки
    answer: поки не
    options:
    - поки не
    - коли
    - якщо
    - щойно
    explanation: Українська структура ліміту дії ('until') обов'язково вимагає подвійного
      заперечення 'поки не'.
  - sentence: Перед ми почали їсти смачну вечерю, ми помили руки.
    error: Перед
    answer: Перед тим як
    options:
    - Перед тим як
    - Поки
    - Якщо
    - Коли
    explanation: Для з'єднання двох повноцінних дій з дієсловами потрібно використовувати
      структуру 'перед тим як'.
  - sentence: Вона радісно зателефонувала після вона приїхала в затишний готель.
    error: після
    answer: після того як
    options:
    - після того як
    - перед тим як
    - щойно
    - поки
    explanation: Коли друга частина речення має дієслово, ми обов'язково використовуємо
      повну форму 'після того як'.
  - sentence: Малі діти весело гралися на вулиці, поки стало зовсім темно.
    error: поки
    answer: поки не
    options:
    - поки не
    - після того як
    - коли
    - щойно
    explanation: Ліміт дії (настання темряви) вимагає негативної форми у структурі
      'поки не'.
  instruction: Знайдіть і виправте помилку в реченні.
- type: match-up
  title: 'Знайдіть пару: Сполучники та їх значення'
  pairs:
  - left: коли
    right: point in time (when)
  - left: поки
    right: continuous process (while)
  - left: перед тим як
    right: before doing something
  - left: після того як
    right: after doing something
  - left: якщо
    right: uncertain condition (if)
  - left: поки не
    right: limit of action (until)
  - left: щойно
    right: immediate action (just)
  - left: кожного разу, коли
    right: recurring habit
  instruction: З'єднайте відповідні елементи.
- type: true-false
  title: Правда чи брехня
  items:
  - statement: Слово 'коли' використовується для опису довгого і безперервного процесу.
    correct: false
    explanation: Слово 'коли' означає момент у часі. Для процесу ми використовуємо
      'поки'.
  - statement: Ми обов'язково додаємо слова 'тим' або 'того' до прийменників перед
      дієсловом.
    correct: true
    explanation: Ці займенники слугують граматичним якорем для нової частини речення.
  - statement: В українській мові слова 'коли' та 'якщо' мають абсолютно однакове
      значення.
    correct: false
    explanation: Це часта помилка! 'Коли' стосується часу, а 'якщо' — виключно умови.
  - statement: Слово 'якщо' використовується тільки тоді, коли ми говоримо про непевну
      умову.
    correct: true
    explanation: Ми вживаємо 'якщо', якщо подія є лише одним із можливих варіантів.
  - statement: Структура 'поки не' означає ліміт дії і вимагає подвійного заперечення.
    correct: true
    explanation: Це унікальна риса української логіки, де 'не' зупиняє тривалу дію.
  - statement: Слово 'щойно' використовується виключно для подій, які відбуваються
      дуже повільно.
    correct: false
    explanation: Навпаки, воно використовується для швидких, негайних дій.
  - statement: Прийменники 'перед' і 'після' завжди використовуються прямо перед дієсловом
      у реченні.
    correct: false
    explanation: Перед дієсловом ми повинні вживати сполучники 'перед тим як' та 'після
      того як'.
  - statement: Фраза 'кожного разу, коли' ідеально підходить для опису наших регулярних
      звичок.
    correct: true
    explanation: Ця конструкція передає частотність повторюваної дії.
  instruction: Визначте, чи твердження правильне.
- type: select
  title: Оберіть усі правильні варіанти
  items:
  - question: Які речення описують дві дії, що відбуваються абсолютно одночасно?
    options:
    - text: Поки я читав цікаву книгу, мій брат слухав музику.
      correct: true
    - text: Ми пили гарячу каву, поки чекали на наш автобус.
      correct: true
    - text: Коли я прийшов додому, мій брат уже давно спав.
      correct: false
    - text: Після того як він подзвонив, я почав збирати речі.
      correct: false
    min_correct: 2
    explanation: Слово 'поки' показує одночасність та паралельність дій.
  - question: У яких реченнях є типова граматична помилка 'загубленого займенника'?
    options:
    - text: Перед я пішов на нову роботу, я випив каву.
      correct: true
    - text: Після він прочитав цей важливий лист, він мовчав.
      correct: true
    - text: Перед тим як вийти з дому, я перевірив погоду.
      correct: false
    - text: Після того як ми смачно поїли, ми пішли гуляти.
      correct: false
    min_correct: 2
    explanation: Не можна вживати 'перед' або 'після' прямо перед займенниками, бракує
      'тим як' та 'того як'.
  - question: Які слова ми зазвичай використовуємо для дуже швидких, негайних дій?
    options:
    - text: щойно
      correct: true
    - text: як тільки
      correct: true
    - text: поки
      correct: false
    - text: кожного разу, коли
      correct: false
    min_correct: 2
    explanation: Слова 'щойно' і 'як тільки' передають динаміку і миттєвість реакції.
  - question: Які речення правильно використовують слово 'якщо' для опису умови?
    options:
    - text: Я буду дуже радий, якщо ти приїдеш до мене.
      correct: true
    - text: Якщо завтра не буде сильного дощу, ми підемо гуляти.
      correct: true
    - text: Коли я отримаю свою зарплату, я точно куплю телефон.
      correct: false
    - text: Я обов'язково зателефоную тобі, коли нарешті приїду додому.
      correct: false
    min_correct: 2
    explanation: Слово 'якщо' позначає подію, яка може не відбутися. Інші речення
      описують 100% гарантований час.
  - question: Які речення мають граматично правильну українську структуру 'until'?
    options:
    - text: Я буду терпляче чекати тут, поки ти не прийдеш.
      correct: true
    - text: Активно працюй над цим завданням, поки не знайдеш рішення.
      correct: true
    - text: Діти весело гралися на вулиці, поки стало зовсім темно.
      correct: false
    - text: Ми точно не почнемо нашу зустріч, поки всі зберуться.
      correct: false
    min_correct: 2
    explanation: 'Справжній ліміт дії завжди вимагає подвійного заперечення: ''поки
      не''.'
  - question: У яких реченнях правильно використовується звичайний прийменник з іменником?
    options:
    - text: Перед смачним сніданком я завжди ретельно мию руки.
      correct: true
    - text: Після важкої роботи я відразу йду відпочивати додому.
      correct: true
    - text: Перед тим як роботою я із задоволенням п'ю каву.
      correct: false
    - text: Після того як уроком ми довго і цікаво говоримо.
      correct: false
    min_correct: 2
    explanation: З іменниками (сніданок, робота) ми вживаємо прості 'перед' і 'після'.
  instruction: Оберіть усі правильні відповіді.
- type: group-sort
  title: 'Розподіліть слова: Іменники чи Дієслова?'
  groups:
  - name: Перед / Після (Іменники)
    items:
    - роботою
    - сніданком
    - сном
    - уроком
  - name: Перед тим як / Після того як (Дієслова)
    items:
    - почати працювати
    - поснідати
    - лягти спати
    - закінчити урок
  instruction: Розподіліть елементи за групами.
- type: fill-in
  title: Доповніть речення новими словами
  items:
  - sentence: Вона постійно працює в офісі і ніколи не має вільного часу.
    answer: часу
    options:
    - часу
    - моменту
    - процесу
    - ранку
    explanation: Фраза 'вільний час' (free time) використовується найчастіше.
  - sentence: Наш ідеальний ранок завжди починається рівно о сьомій годині.
    answer: ранок
    options:
    - ранок
    - вечір
    - сніданок
    - час
    explanation: О сьомій годині зазвичай починається ранок.
  - sentence: Моя минула подорож в Карпати була просто неймовірно чудовою.
    answer: подорож
    options:
    - подорож
    - подія
    - зустріч
    - робота
    explanation: Слово 'подорож' (trip) ідеально підходить для поїздки в гори.
  - sentence: Я дуже люблю цей тихий, теплий і абсолютно спокійний вечір.
    answer: вечір
    options:
    - вечір
    - сніданок
    - ранок
    - процес
    explanation: Після денних турбот настає спокійний вечір.
  - sentence: Ми можемо дуже довго чекати нашого друга біля станції метро.
    answer: чекати
    options:
    - чекати
    - починати
    - працювати
    - гуляти
    explanation: Коли хтось запізнюється, нам доводиться його чекати.
  - sentence: Вони хочуть успішно почати свій новий цікавий проєкт вже завтра.
    answer: почати
    options:
    - почати
    - закінчити
    - чекати
    - приїхати
    explanation: Новий проєкт зазвичай планують почати.
  - sentence: Він повинен повністю закінчити цю складну роботу до наступної п'ятниці.
    answer: закінчити
    options:
    - закінчити
    - почати
    - приїхати
    - гуляти
    explanation: Завдання потрібно саме завершити до дедлайну.
  - sentence: Ми щиро плануємо приїхати у це прекрасне велике місто знову.
    answer: приїхати
    options:
    - приїхати
    - закінчити
    - починати
    - чекати
    explanation: Слово 'приїхати' (to arrive) використовується для планування візиту.
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Складіть складніші речення
  items:
  - words:
    - Кожного
    - разу,
    - коли
    - йде
    - дощ,
    - я
    - довго
    - сплю.
    answer: Кожного разу, коли йде дощ, я довго сплю.
  - words:
    - Я
    - буду
    - чекати
    - тебе,
    - поки
    - ти
    - не
    - зателефонуєш.
    answer: Я буду чекати тебе, поки ти не зателефонуєш.
  - words:
    - Щойно
    - вона
    - вийшла
    - з
    - дому,
    - почався
    - сильний
    - дощ.
    answer: Щойно вона вийшла з дому, почався сильний дощ.
  - words:
    - Якщо
    - ти
    - матимеш
    - вільний
    - час,
    - будь
    - ласка,
    - зателефонуй
    - мені.
    answer: Якщо ти матимеш вільний час, будь ласка, зателефонуй мені.
  - words:
    - Перед
    - тим
    - як
    - їсти
    - яблуко,
    - треба
    - добре
    - помити
    - руки.
    answer: Перед тим як їсти яблуко, треба добре помити руки.
  - words:
    - Після
    - того
    - як
    - наш
    - урок
    - закінчився,
    - ми
    - пішли
    - додому.
    answer: Після того як наш урок закінчився, ми пішли додому.
  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: 'Виправте помилки: Коли чи Якщо?'
  items:
  - sentence: Коли завтра буде йти сильний дощ, ми обов'язково залишимося вдома.
    error: Коли
    answer: Якщо
    options:
    - Якщо
    - Поки
    - Щойно
    - Перед тим як
    explanation: Тут описується непевна умова (ми не знаємо точно, чи буде дощ), тому
      правильно використовувати 'якщо'.
  - sentence: Я буду дуже радий, коли ти зможеш допомогти мені завтра вранці.
    error: коли
    answer: якщо
    options:
    - якщо
    - поки
    - щойно
    - після того як
    explanation: Це умовна ситуація (допомога ще не гарантована), тому потрібно обрати
      слово 'якщо'.
  - sentence: Вона поїде високо в гори, коли у неї нарешті буде відпустка.
    error: коли
    answer: якщо
    options:
    - якщо
    - поки
    - поки не
    - перед тим як
    explanation: Відпустка тут розглядається як головна умова для поїздки, отже правильне
      слово — 'якщо'.
  - sentence: Коли я виграю в лотерею великі гроші, я відразу куплю новий будинок.
    error: Коли
    answer: Якщо
    options:
    - Якщо
    - Щойно
    - Поки
    - Як тільки
    explanation: Виграш у лотерею — це класична непевна умова, для якої підходить
      виключно слово 'якщо'.
  - sentence: Ми точно не підемо довго гуляти, коли на вулиці буде дуже холодно.
    error: коли
    answer: якщо
    options:
    - якщо
    - поки
    - поки не
    - щойно
    explanation: Холодна погода — це умова для того, щоб залишитися вдома, тому вживаємо
      'якщо'.
  - sentence: Коли ти зовсім не знаєш правильну відповідь, просто запитай свого викладача.
    error: Коли
    answer: Якщо
    options:
    - Якщо
    - Поки
    - Перед тим як
    - Після того як
    explanation: Незнання відповіді — це також умовна ситуація, тому ми повинні обов'язково
      використовувати 'якщо'.
  instruction: Знайдіть і виправте помилку в реченні.
- type: quiz
  title: Фінальна перевірка
  items:
  - question: До якої частини мови в українській граматиці належить слово 'поки'?
    options:
    - text: сполучник
      correct: true
    - text: іменник
      correct: false
    - text: дієслово
      correct: false
    - text: прикметник
      correct: false
    explanation: Слово 'поки' поєднує частини складного речення, тому це сполучник.
  - question: Який відмінок ми використовуємо після прийменника 'перед' у фразі 'перед
      тим як'?
    options:
    - text: орудний
      correct: true
    - text: родовий
      correct: false
    - text: давальний
      correct: false
    - text: називний
      correct: false
    explanation: Прийменник 'перед' завжди вимагає орудного відмінка (ким/чим -> тим).
  - question: Який відмінок ми використовуємо після прийменника 'після' у фразі 'після
      того як'?
    options:
    - text: родовий
      correct: true
    - text: орудний
      correct: false
    - text: знахідний
      correct: false
    - text: місцевий
      correct: false
    explanation: Прийменник 'після' завжди вимагає родового відмінка (кого/чого ->
      того).
  - question: Яка давня культурна традиція пов'язана зі структурою 'поки не' в Україні?
    options:
    - text: Свята Вечеря
      correct: true
    - text: Великдень
      correct: false
    - text: Івана Купала
      correct: false
    - text: Масниця
      correct: false
    explanation: Традиція чекати, 'поки не зійде перша зірка', стосується саме Різдвяного
      святвечора.
  - question: Яке динамічне слово означає абсолютно те ж саме, що і фраза 'як тільки'?
    options:
    - text: щойно
      correct: true
    - text: поки
      correct: false
    - text: коли
      correct: false
    - text: якщо
      correct: false
    explanation: Слова 'щойно' та 'як тільки' є абсолютними синонімами для негайних
      дій.
  - question: Яке специфічне слово ідеально описує дію, яка триває певний тривалий
      час?
    options:
    - text: поки
      correct: true
    - text: коли
      correct: false
    - text: щойно
      correct: false
    - text: як тільки
      correct: false
    explanation: Для процесів та тривалих паралельних дій ми завжди використовуємо
      'поки'.
  - question: Що саме ми обов'язково додаємо після прийменника 'перед', якщо далі
      йде дієслово?
    options:
    - text: тим як
      correct: true
    - text: того як
      correct: false
    - text: тому що
      correct: false
    - text: так як
      correct: false
    explanation: Слова 'тим як' створюють міцний граматичний місток для наступного
      дієслова.
  - question: Яке слово ми використовуємо виключно для подій, які ми не впевнені,
      чи стануться?
    options:
    - text: якщо
      correct: true
    - text: коли
      correct: false
    - text: поки
      correct: false
    - text: щойно
      correct: false
    explanation: Слово 'якщо' - це маркер невпевненості та можливої умови.
  instruction: Оберіть правильну відповідь.
