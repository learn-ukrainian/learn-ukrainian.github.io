- id: fill-in-mixed
  type: fill-in
  instruction: Вставте правильне дієслово з пари (процес чи результат).
  items:
  - sentence: Вам потрібно ____ цю інформацію в словнику.
    answer: знайти
    options:
    - знайти
    - шукати
    - знаходити
  - sentence: Учитель просить ____ на питання.
    answer: відповідати
    options:
    - відповідати
    - відповісти
    - запитати
  - sentence: Завтра я хочу ____ гарний портрет.
    answer: намалювати
    options:
    - малювати
    - намалювати
    - малюю
  - sentence: Вони люблять багато ____ про все на світі.
    answer: говорити
    options:
    - говорити
    - сказати
    - кажуть
  - sentence: Я забув ____ тобі про це вчора.
    answer: сказати
    options:
    - сказати
    - говорити
    - кажу
  - sentence: Цей студент може ____ дуже швидко.
    answer: відповісти
    options:
    - відповісти
    - відповідати
    - запитати
  - sentence: Кожного ранку вона ____ смачний сніданок.
    answer: готує
    options:
    - готує
    - приготує
    - приготувала
  - sentence: Я хочу ____ всі нові слова.
    answer: вивчити
    options:
    - вивчити
    - вчити
    - вчу
  title: Вставте правильне дієслово з пари (процес чи результат).
- id: odd-one-out-aspect
  type: odd-one-out
  instruction: Знайдіть зайве слово за видом дієслова.
  items:
  - words:
    - читати
    - писати
    - думати
    - зробити
    correct: 3
    explanation: «Зробити» — це доконаний вид, інші — недоконаний.
  - words:
    - сказати
    - взяти
    - піймати
    - ловити
    correct: 3
    explanation: «Ловити» — це недоконаний вид, інші — доконаний.
  - words:
    - допомагати
    - допомогти
    - вирішити
    - зварити
    correct: 0
    explanation: «Допомагати» — це недоконаний вид, інші — доконаний.
  - words:
    - зробити
    - зварити
    - сфотографувати
    - читати
    correct: 3
    explanation: Всі слова мають префікс і є доконаним видом, крім «читати».
  - words:
    - шукати
    - знаходити
    - відповідати
    - пошукати
    correct: 3
    explanation: «Пошукати» — доконаний вид.
  - words:
    - говорити
    - запитувати
    - вирішувати
    - відповісти
    correct: 3
    explanation: «Відповісти» — доконаний вид, інші — недоконаний з суфіксом або процеси.
  - words:
    - побачити
    - подумати
    - покласти
    - бачити
    correct: 3
    explanation: «Бачити» — недоконаний вид, інші мають префікс ПО- і є доконаним
      видом.
  - words:
    - намалювати
    - написати
    - готувати
    - прочитати
    correct: 2
    explanation: «Готувати» — недоконаний вид.
  title: Знайдіть зайве слово за видом дієслова.
- id: quiz-aspect
  type: quiz
  instruction: Оберіть правильний вид дієслова або правило для кожної ситуації.
  items:
  - question: 'Якщо ви хочете сказати про дію, яка триває довго, ви використовуєте:'
    options:
    - доконаний вид
    - недоконаний вид
    - тільки префікс
    - тільки суфікс
    correct: 1
  - question: Який префікс ми додаємо до слова «робити», щоб отримати результат?
    options:
    - по-
    - ви-
    - з-
    - с-
    correct: 2
  - question: Який префікс використовуємо зі словом «фотографувати»?
    options:
    - з-
    - с-
    - по-
    - на-
    correct: 1
  - question: Яке слово є парою до дієслова «брати»?
    options:
    - побрати
    - вибрати
    - взяти
    - збрати
    correct: 2
  - question: Що означає слово «сказати»?
    options:
    - довга розмова
    - конкретна інформація
    - дія без результату
    - процес
    correct: 1
  - question: Яке слово описує завершену дію (результат)?
    options:
    - вирішувати
    - запитувати
    - допомагати
    - допомогти
    correct: 3
  - question: 'Виберіть базову форму (недоконаний вид) дієслова:'
    options:
    - приготувати
    - намалювати
    - готувати
    - прочитати
    correct: 2
  - question: 'Дієслова «шукати» і «знайти»:'
    options:
    - це ідеальна граматична пара
    - це різні дієслова, а не пара
    - це один вид
    - мають однаковий корінь
    correct: 1
  title: Оберіть правильний вид дієслова або правило для кожної ситуації.
