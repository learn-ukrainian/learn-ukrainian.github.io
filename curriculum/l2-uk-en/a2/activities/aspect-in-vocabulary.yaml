- id: fill-in-categorize-by-formation-type
  type: fill-in
  instruction: Вставте правильне дієслово (процес або результат).
  items:
  - sentence: Я довго ____, що робити.
    answer: вирішував
    options:
    - вирішував
    - вирішив
  - sentence: Нарешті я ____ цю проблему.
    answer: вирішив
    options:
    - вирішував
    - вирішив
  - sentence: Він завжди ____ мені.
    answer: допомагав
    options:
    - допомагав
    - допоміг
  - sentence: Вона ____ мені вчора.
    answer: допомогла
    options:
    - допомагала
    - допомогла
  - sentence: Хто ____ вікно?
    answer: відчиняв
    options:
    - відчиняв
    - відчинив
  - sentence: Будь ласка, ____ двері.
    answer: відчинити
    options:
    - відчиняти
    - відчинити
  - sentence: Я постійно ____ про це.
    answer: запитував
    options:
    - запитував
    - запитав
  - sentence: Можна тебе ____?
    answer: запитати
    options:
    - запитувати
    - запитати
- id: match-up-fill-in-the-blanks-with-the-correct-pair
