version: '1.0'
module: aspect-in-vocabulary
level: a2
inline:
- id: quiz-find-partner
  type: quiz
  instruction: Оберіть доконаний вид (результат) для цього дієслова
  items:
  - question: читати (процес)
    options:
    - прочитати
    - зачитати
    - вичитати
    - дочитати
    correct: 0
  - question: писати (процес)
    options:
    - записати
    - написати
    - списати
    - виписати
    correct: 1
  - question: бачити (процес)
    options:
    - збачити
    - добачити
    - побачити
    - набачити
    correct: 2
  - question: робити (процес)
    options:
    - сробити
    - зробити
    - поробити
    - наробити
    correct: 1
  - question: казати (процес)
    options:
    - зказати
    - сказати
    - показати
    - виказати
    correct: 1
  - question: фотографувати (процес)
    options:
    - зфотографувати
    - сфотографувати
    - пофотографувати
    - нафотографувати
    correct: 1
  - question: пити (процес)
    options:
    - попити
    - напити
    - випити
    - спити
    correct: 2
  - question: вчити (процес)
    options:
    - вивчити
    - повчити
    - навчити
    - завчити
    correct: 0
- id: fill-in-categorize-formation
  type: fill-in
  instruction: Оберіть правильний спосіб утворення пари
  items:
  - sentence: Пара «читати — прочитати» має новий ____.
    answer: префікс
    options:
    - префікс
    - суфікс
    - корінь
  - sentence: Пара «вирішувати — вирішити» змінює ____ в кінці слова.
    answer: суфікс
    options:
    - префікс
    - суфікс
    - інше слово
  - sentence: 'Пара «допомагати — допомогти» змінює звук: це ____ слова.'
    answer: корінь
    options:
    - префікс
    - корінь
    - інше слово
  - sentence: Пара «брати — взяти» — це зовсім ____.
    answer: інші слова
    options:
    - інші слова
    - нові префікси
    - нові суфікси
  - sentence: Дієслово «стукнути» має ____, який показує коротку дію.
    answer: суфікс
    options:
    - префікс
    - суфікс
    - корінь
  - sentence: Пара «говорити — сказати» — це ____.
    answer: інші слова
    options:
    - інші слова
    - різні суфікси
    - різні префікси
  - sentence: У парі «казати — сказати» ми додали ____ «с-».
    answer: префікс
    options:
    - префікс
    - суфікс
    - корінь
  - sentence: Пара «купувати — купити» відкидає довгий ____.
    answer: суфікс
    options:
    - префікс
    - суфікс
    - інше слово
- id: match-up-blanks-pairs
  type: match-up
  instruction: З'єднайте недоконаний вид (процес) із доконаним (результат)
  pairs:
  - left: брати
    right: взяти
  - left: говорити
    right: сказати
  - left: шукати
    right: знайти
  - left: ловити
    right: піймати
  - left: купувати
    right: купити
  - left: відчиняти
    right: відчинити
  - left: вирішувати
    right: вирішити
  - left: допомагати
    right: допомогти
- id: fill-in-aspect-choice
  type: fill-in
  instruction: Оберіть правильний вид дієслова за контекстом
  items:
  - sentence: Я можу ____ цю книгу цілий день.
    answer: читати
    options:
    - читати
    - прочитати
  - sentence: Він зміг ____ завдання за п'ять хвилин.
    answer: вирішити
    options:
    - вирішувати
    - вирішити
  - sentence: Тобі обов'язково потрібно ____ за цей товар на касі.
    answer: заплатити
    options:
    - платити
    - заплатити
  - sentence: Вчора ми дуже довго ____ про нашу нову роботу.
    answer: говорили
    options:
    - говорили
    - сказали
  - sentence: Колега нарешті ____ мені головну новину.
    answer: сказав
    options:
    - говорив
    - сказав
  - sentence: Мій брат завжди готовий мені ____.
    answer: допомагати
    options:
    - допомагати
    - допомогти
  - sentence: Вітер може раптом ____ вікном один раз.
    answer: стукнути
    options:
    - стукати
    - стукнути
  - sentence: Я вже ____ десять вареників, дивись!
    answer: зліпила
    options:
    - ліпила
    - зліпила
workbook:
- type: group-sort
  instruction: Розподіліть дієслова за видами
  groups:
  - label: Недоконаний вид (Процес)
    items:
    - робити
    - читати
    - писати
    - вчити
    - купувати
    - допомагати
    - відчиняти
    - говорити
    - брати
    - шукати
  - label: Доконаний вид (Результат)
    items:
    - зробити
    - прочитати
    - написати
    - вивчити
    - купити
    - допомогти
    - відчинити
    - сказати
    - взяти
    - знайти
- type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Він зміг вирішувати цю проблему швидко.
    error: вирішувати
    correction: вирішити
    error_type: word
    options:
    - вирішити
    - допомогти
    - вирішив
    explanation: Після «зміг» потрібен доконаний вид, бо це готовий результат.
  - sentence: Я хочу купувати цю машину зараз, тримай гроші.
    error: купувати
    correction: купити
    error_type: word
    options:
    - купити
    - купую
    - брав
    explanation: Купівля тут — це одноразова успішна дія (результат).
  - sentence: Ми говорили цю новину всім нашим друзям.
    error: говорили
    correction: сказали
    error_type: word
    options:
    - сказали
    - говорити
    - сказати
    explanation: Донести конкретний факт (новину) — це доконана дія «сказати».
  - sentence: Кожен день я взяв каву в цьому кафе.
    error: взяв
    correction: брав
    error_type: word
    options:
    - брав
    - взяти
    - беру
    explanation: Регулярна дія (кожен день) вимагає недоконаного виду «брати».
  - sentence: Я довго шукав ключі і нарешті шукав їх.
    error: шукав
    correction: знайшов
    error_type: word
    options:
    - знайшов
    - шукати
    - знайти
    explanation: Успішний результат пошуку — це інше слово «знайти».
  - sentence: Він хотів піймати рибу цілий день.
    error: піймати
    correction: ловити
    error_type: word
    options:
    - ловити
    - знайти
    - піймав
    explanation: «Цілий день» — це тривалий процес, тому треба використовувати дієслово
      «ловити».
- type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: I was reading a book.
    options:
    - text: Я читав книгу.
      correct: true
    - text: Я прочитав книгу.
      correct: false
  - source: I have read the book.
    options:
    - text: Я прочитав книгу.
      correct: true
    - text: Я читав книгу.
      correct: false
  - source: He was speaking.
    options:
    - text: Він говорив.
      correct: true
    - text: Він сказав.
      correct: false
  - source: He said the truth.
    options:
    - text: Він сказав правду.
      correct: true
    - text: Він говорив правду.
      correct: false
  - source: We were buying food.
    options:
    - text: Ми купували їжу.
      correct: true
    - text: Ми купили їжу.
      correct: false
  - source: We bought food.
    options:
    - text: Ми купили їжу.
      correct: true
    - text: Ми купували їжу.
      correct: false
- type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - вже
    - прочитав
    - Я
    - текст.
    - цей
    correct_order:
    - Я
    - вже
    - прочитав
    - цей
    - текст.
  - words:
    - зміг
    - знайти
    - свої
    - Ти
    - ключі?
    correct_order:
    - Ти
    - зміг
    - знайти
    - свої
    - ключі?
  - words:
    - говорили
    - Ми
    - довго
    - це.
    - про
    correct_order:
    - Ми
    - довго
    - говорили
    - про
    - це.
  - words:
    - хоче
    - новий
    - Вона
    - купити
    - словник.
    correct_order:
    - Вона
    - хоче
    - купити
    - новий
    - словник.
  - words:
    - вікно!
    - відчинити
    - мені
    - Допоможи
    - це
    correct_order:
    - Допоможи
    - мені
    - відчинити
    - це
    - вікно!
  - words:
    - заплатити
    - товар.
    - Він
    - забув
    - за
    correct_order:
    - Він
    - забув
    - заплатити
    - за
    - товар.
- type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Слово «робити» означає готовий результат.
    correct: false
    explanation: Це недоконаний вид, він означає процес. Результат — це «зробити».
  - statement: Префікс «по-» часто робить з процесу короткий результат.
    correct: true
    explanation: 'Наприклад: снідати (процес) — поснідати (результат).'
  - statement: Пара до слова «брати» — це «побрати».
    correct: false
    explanation: 'Пара до слова «брати» — це зовсім інше слово: «взяти».'
  - statement: Суфікс «-увати» зазвичай показує довгий процес.
    correct: true
    explanation: Суфікси -ува- / -юва- роблять слово довшим і показують тривалість
      дії.
  - statement: Слово «сказати» — це недоконаний вид.
    correct: false
    explanation: «Сказати» — це доконаний вид (результат). Процес — це дієслово «говорити».
  - statement: Суфікс «-ну-» показує швидку, раптову дію.
    correct: true
    explanation: 'Наприклад: стукати (довго) — стукнути (один раз).'
