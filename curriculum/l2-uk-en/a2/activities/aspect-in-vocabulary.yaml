    right: вирішити
  - left: відповідати
    right: відповісти
  - left: допомагати
    right: допомогти
- id: fill-in-choose-the-correct-aspect-partner
  type: fill-in
  instruction: Оберіть правильне дієслово (недоконаний чи доконаний вид).
  items:
  - sentence: Щодня я ____ каву.
    answer: купую
    options:
    - купую
    - куплю
  - sentence: Завтра я ____ нову книгу.
    answer: куплю
    options:
    - купую
    - куплю
  - sentence: Він довго ____ ключі.
    answer: шукав
    options:
    - шукав
    - знайшов
  - sentence: Нарешті вона ____ свій телефон.
    answer: знайшла
    options:
    - шукала
    - знайшла
  - sentence: Ми часто ____ про мистецтво.
    answer: говорили
