- id: match-up-fill-in-the-blanks-with-the-correct-pair
  type: match-up
  instruction: З'єднайте дієслово недоконаного виду з його парою доконаного виду.
  pairs:
  - left: робити
    right: зробити
  - left: снідати
    right: поснідати
  - left: фотографувати
    right: сфотографувати
  - left: малювати
    right: намалювати
  - left: вирішувати
    right: вирішити
  - left: запитувати
    right: запитати
  - left: допомагати
    right: допомогти
  - left: відповідати
    right: відповісти
  title: З'єднайте дієслово недоконаного виду з його парою доконаного виду.
- id: fill-in-categorize
  type: fill-in
  instruction: Вставте правильне дієслово, щоб утворити пару за правилом.
  items:
  - sentence: 'Префікс З- або С-: робити — ____.'
    answer: зробити
    options:
    - зробити
    - сфотографувати
    - подумати
  - sentence: 'Префікс З- або С-: фотографувати — ____.'
    answer: сфотографувати
    options:
    - сфотографувати
    - зробити
    - написати
  - sentence: 'Префікс ПО-: думати — ____.'
    answer: подумати
    options:
    - подумати
    - прочитати
    - запитати
  - sentence: 'Префікс ПРО-: читати — ____.'
    answer: прочитати
    options:
    - прочитати
    - подумати
    - вирішити
  - sentence: 'Зміна суфікса: вирішити — ____.'
    answer: вирішувати
    options:
    - вирішувати
    - відповідати
    - зробити
  - sentence: 'Зміна суфікса: запитати — ____.'
    answer: запитувати
    options:
    - запитувати
    - вирішувати
    - сфотографувати
  - sentence: 'Інші слова: брати — ____.'
    answer: взяти
    options:
    - взяти
    - піймати
    - сказати
  - sentence: 'Інші слова: говорити — ____.'
    answer: сказати
    options:
    - сказати
    - покласти
    - взяти
  title: Вставте правильне дієслово, щоб утворити пару за правилом.
- id: fill-in-choose-partner
  type: fill-in
  instruction: Вставте правильне дієслово (процес або результат).
  items:
  - sentence: Я довго ____ книгу.
    answer: читав
    options:
    - читав
    - прочитав
    - прочитаю
  - sentence: Нарешті я ____ цю книгу!
    answer: прочитав
    options:
    - читав
    - прочитав
    - прочитаю
  - sentence: Бабуся просить ____ вареники.
    answer: ліпити
    options:
    - ліпити
    - зліпити
    - ліплю
  - sentence: Тобі треба ____ один вареник.
    answer: зліпити
    options:
    - ліпити
    - зліпити
    - ліплю
  - sentence: Вона дуже любить ____.
    answer: малювати
    options:
    - малювати
    - намалювати
    - малює
  - sentence: Вона змогла ____ гарну картину.
    answer: намалювати
    options:
    - малювати
    - намалювати
    - малює
  - sentence: Вчора весь день він ____ каву.
    answer: пив
    options:
    - пив
    - випив
    - пити
  - sentence: Вчора він ____ одну чашку кави дуже швидко.
    answer: випив
    options:
    - пив
    - випив
    - пити
  title: Вставте правильне дієслово (процес або результат).
workbook:
- id: group-sort-aspect
  type: group-sort
  instruction: Розподіліть дієслова за видами.
  groups:
  - label: Недоконаний вид (процес)
    items:
    - читати
    - писати
    - думати
    - робити
    - говорити
    - брати
    - шукати
    - ловити
  - label: Доконаний вид (результат)
    items:
    - прочитати
    - написати
    - подумати
    - зробити
    - сказати
    - взяти
    - знайти
    - піймати
  title: Розподіліть дієслова за видами.
- id: true-false-grammar
  type: true-false
  instruction: Правда чи ні? Прочитайте твердження про дієслова.
  items:
  - statement: Слово «сказати» — це недоконаний вид.
    correct: false
    explanation: «Сказати» — це доконаний вид (результат). Процес — це «говорити».
  - statement: Пара до слова «брати» — це «взяти».
    correct: true
    explanation: Це суплетивна пара (абсолютно різні слова).
  - statement: Префікс «с-» пишеться перед літерою «ф» у слові «сфотографувати».
    correct: true
    explanation: За правилом «Кафе Птах» ми використовуємо префікс «с-» перед к, п,
      т, ф, х.
  - statement: Дієслово «робити» має пару «поробити».
    correct: false
    explanation: Правильна пара — «зробити».
  - statement: Доконаний вид описує тривалий процес.
    correct: false
    explanation: Доконаний вид описує результат. Процес — це недоконаний вид.
  - statement: Слово «знайти» — це пара до слова «шукати».
    correct: false
    explanation: Вони не є граматичною парою. Пара до «шукати» — «пошукати».
  - statement: До дієслова «думати» пара утворюється за допомогою префікса «по-».
    correct: true
    explanation: 'Пара: думати — подумати.'
  - statement: Слово «вирішувати» — це процес (недоконаний вид)..
    correct: true
    explanation: Суфікс «-ува-» вказує на довгий процес.
  title: Правда чи ні? Прочитайте твердження про дієслова.
- id: error-correction-aspect
  type: error-correction
  instruction: Знайдіть і виправте помилку (неправильний вид дієслова).
  items:
  - sentence: Я хочу говорити тобі один секрет.
    error: говорити
    correction: сказати
    error_type: word
    options:
    - сказати
    - запитати
    - вирішити
    explanation: Секрет (одна інформація) — це конкретний результат (доконаний вид).
  - sentence: Вчора мій брат брав мою книгу, і тепер вона у нього.
    error: брав
    correction: взяв
    error_type: word
    options:
    - взяв
    - поклав
    - знайшов
    explanation: Він уже забрав книгу (результат).
  - sentence: Він хоче випити чай кожного дня.
    error: випити
    correction: пити
    error_type: word
    options:
    - пити
    - пив
    - п'є
    explanation: Регулярна дія (кожного дня) вимагає недоконаного виду.
  - sentence: Я довго знайшов свої ключі у кімнаті.
    error: знайшов
    correction: шукав
    error_type: word
    options:
    - шукав
    - запитував
    - ловив
    explanation: Дія «довго» — це процес (шукав).
  - sentence: Мама просить мене зліпити вареники цілий день.
    error: зліпити
    correction: ліпити
    error_type: word
    options:
    - ліпити
    - варити
    - робити
    explanation: Дія «цілий день» вказує на процес.
  - sentence: Я можу вирішувати цю проблему за одну хвилину.
    error: вирішувати
    correction: вирішити
    error_type: word
    options:
    - вирішити
    - вирішив
    - відповісти
    explanation: За одну хвилину — це швидкий результат.
  - sentence: Ти повинен зробити це фото, давай зфотографуємо!
    error: зфотографуємо
    correction: сфотографуємо
    error_type: word
    options:
    - сфотографуємо
    - фотографуємо
    - нафотографуємо
    explanation: 'Правило «Кафе Птах»: перед «ф» пишемо «с-».'
  - sentence: Дитина любить запитати дорослих про все.
    error: запитати
    correction: запитувати
    error_type: word
    options:
    - запитувати
    - відповідати
    - допомагати
    explanation: Любить робити це регулярно — це недоконаний вид.
  title: Знайдіть і виправте помилку (неправильний вид дієслова).
- id: translate-aspect
  type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: I read a book yesterday (and finished it).
    options:
    - text: Я прочитав книгу вчора.
      correct: true
    - text: Я читав книгу вчора.
      correct: false
  - source: She was making varenyky.
    options:
    - text: Вона ліпила вареники.
      correct: true
    - text: Вона зліпила вареники.
      correct: false
  - source: He helped me. (a single successful act)
    options:
    - text: Він допоміг мені.
      correct: true
    - text: Він допомагав мені.
      correct: false
  - source: They were drinking tea.
    options:
    - text: Вони пили чай.
      correct: true
    - text: Вони випили чай.
      correct: false
  - source: I need to take this pen.
    options:
    - text: Мені треба взяти цю ручку.
      correct: true
    - text: Мені треба брати цю ручку.
      correct: false
  - source: We will decide tomorrow.
    options:
    - text: Ми вирішимо завтра.
      correct: true
    - text: Ми будемо вирішувати завтра.
      correct: false
  - source: Are you drawing?
    options:
    - text: Ти малюєш?
      correct: true
    - text: Ти намалюєш?
      correct: false
  - source: I can't say that.
    options:
    - text: Я не можу сказати це.
      correct: true
    - text: Я не можу говорити це.
      correct: false
  title: Оберіть правильний переклад.
