version: '1.0'
module: aspect-in-vocabulary
level: a2
workbook:
- type: quiz
  instruction: Оберіть правильний доконаний вид — справжню видову пару до кожного
    дієслова
  items:
  - question: писати
    options:
    - написати
    - записати
    - підписати
    correct: 0
  - question: читати
    options:
    - відчитати
    - прочитати
    - перечитати
    correct: 1
  - question: бачити
    options:
    - передбачити
    - побачити
    - забачити
    correct: 1
  - question: їсти
    options:
    - поїсти
    - доїсти
    - з'їсти
    correct: 2
  - question: пити
    options:
    - відпити
    - поїсти
    - випити
    correct: 2
  - question: малювати
    options:
    - перемалювати
    - намалювати
    - замалювати
    correct: 1
  - question: готувати
    options:
    - заготувати
    - приготувати
    - підготувати
    correct: 1
  - question: вчити
    options:
    - завчити
    - навчити
    - вивчити
    correct: 2
- type: fill-in
  instruction: 'Визначте спосіб утворення видової пари. Підказка: Спосіб 1 = доданий
    префікс; Спосіб 2а = суфікс -ува-/-юва- в недоконаному; Спосіб 2б = чергування
    голосного в корені.'
  items:
  - sentence: 'Пара «писати / написати» утворена за: ___'
    answer: Спосіб 1 (префікс)
    options:
    - Спосіб 1 (префікс)
    - Спосіб 2а (суфікс -ува-)
    - Спосіб 2б (чергування)
  - sentence: 'Пара «запитувати / запитати» утворена за: ___'
    answer: Спосіб 2а (суфікс -ува-)
    options:
    - Спосіб 1 (префікс)
    - Спосіб 2а (суфікс -ува-)
    - Спосіб 2б (чергування)
  - sentence: 'Пара «допомагати / допомогти» утворена за: ___'
    answer: Спосіб 2б (чергування)
    options:
    - Спосіб 1 (префікс)
    - Спосіб 2а (суфікс -ува-)
    - Спосіб 2б (чергування)
  - sentence: 'Пара «читати / прочитати» утворена за: ___'
    answer: Спосіб 1 (префікс)
    options:
    - Спосіб 1 (префікс)
    - Спосіб 2а (суфікс -ува-)
    - Спосіб 2б (чергування)
  - sentence: 'Пара «вирішувати / вирішити» утворена за: ___'
    answer: Спосіб 2а (суфікс -ува-)
    options:
    - Спосіб 1 (префікс)
    - Спосіб 2а (суфікс -ува-)
    - Спосіб 2б (чергування)
  - sentence: 'Пара «забувати / забути» утворена за: ___'
    answer: Спосіб 2а (суфікс -ува-)
    options:
    - Спосіб 1 (префікс)
    - Спосіб 2а (суфікс -ува-)
    - Спосіб 2б (чергування)
  - sentence: 'Пара «готувати / приготувати» утворена за: ___'
    answer: Спосіб 1 (префікс)
    options:
    - Спосіб 1 (префікс)
    - Спосіб 2а (суфікс -ува-)
    - Спосіб 2б (чергування)
  - sentence: 'Пара «відповідати / відповісти» утворена за: ___'
    answer: Спосіб 2а (суфікс -ува-)
    options:
    - Спосіб 1 (префікс)
    - Спосіб 2а (суфікс -ува-)
    - Спосіб 2б (чергування)
- type: fill-in
  instruction: Вставте правильну форму дієслова. Зверніть увагу на контекст — тривалість
    чи завершений результат?
  items:
  - sentence: Ми ___ ключі цілу годину, але так і не знайшли.
    answer: шукали
    options:
    - шукали
    - знайшли
    - знайшов
  - sentence: Він нарешті ___ ключі під столом.
    answer: знайшов
    options:
    - шукав
    - знайшов
    - знаходив
  - sentence: Він довго ___ і потім нарешті сів.
    answer: говорив
    options:
    - говорив
    - сказав
    - скаже
  - sentence: Вона ___ мені лише одне слово і вийшла.
    answer: сказала
    options:
    - говорила
    - сказала
    - говорить
  - sentence: Щодня вона ___ книжки з полиці.
    answer: бере
    options:
    - бере
    - взяла
    - візьме
  - sentence: Вона ___ словник зі столу і вийшла.
    answer: взяла
    options:
    - брала
    - взяла
    - бере
  - sentence: Кіт ___ метелика в саду цілу годину.
    answer: ловив
    options:
    - ловив
    - зловив
    - зловить
  - sentence: Він нарешті ___ рибу!
    answer: зловив
    options:
    - ловив
    - зловив
    - ловить
- type: translate
  instruction: 'Оберіть правильний переклад. Зверніть увагу: який вид потрібен — недоконаний
    (тривалість, звичка) чи доконаний (завершений результат)?'
  items:
  - source: She was reading for an hour.
    options:
    - text: Вона читала годину.
      correct: true
    - text: Вона прочитала годину.
      correct: false
    - text: Вона читає годину.
      correct: false
  - source: He finally found his keys.
    options:
    - text: Він нарешті шукав ключі.
      correct: false
    - text: Він нарешті знайшов ключі.
      correct: true
    - text: Він нарешті шукає ключі.
      correct: false
  - source: They finished cooking the varenyky.
    options:
    - text: Вони варили вареники.
      correct: false
    - text: Вони зварили вареники.
      correct: true
    - text: Вони готували вареники.
      correct: false
  - source: We were helping all evening.
    options:
    - text: Ми допомогли весь вечір.
      correct: false
    - text: Ми допомагали весь вечір.
      correct: true
    - text: Ми допомагаємо весь вечір.
      correct: false
  - source: I wrote the letter (done — finished).
    options:
    - text: Я писала листа.
      correct: false
    - text: Я написала листа.
      correct: true
    - text: Я пишу листа.
      correct: false
  - source: She was always asking me questions.
    options:
    - text: Вона завжди запитала мене.
      correct: false
    - text: Вона завжди запитувала мене.
      correct: true
    - text: Вона завжди запитає мене.
      correct: false
  - source: She said one word and left.
    options:
    - text: Вона говорила одне слово і пішла.
      correct: false
    - text: Вона сказала одне слово і пішла.
      correct: true
    - text: Вона скаже одне слово і піде.
      correct: false
  - source: He was looking for his phone everywhere.
    options:
    - text: Він знайшов телефон всюди.
      correct: false
    - text: Він шукав телефон всюди.
      correct: true
    - text: Він знайде телефон всюди.
      correct: false
- type: match-up
  instruction: 'З''єднайте дієслова у видові пари: недоконаний вид — доконаний вид'
  pairs:
  - left: брати
    right: взяти
  - left: говорити
    right: сказати
  - left: шукати
    right: знайти
  - left: ловити
    right: зловити
  - left: допомагати
    right: допомогти
  - left: забувати
    right: забути
  - left: розповідати
    right: розповісти
  - left: відповідати
    right: відповісти
- type: error-correction
  instruction: У кожному реченні дієслово вжито не в тому виді. Знайдіть і виправте
    помилку.
  items:
  - sentence: Вона прочитала книжку цілий місяць.
    error: прочитала
    correction: читала
    error_type: word
    options:
    - читала
    - перечитала
    - читає
    explanation: '«Цілий місяць» — тривала дія без акценту на результаті. Потрібен
      недоконаний вид: читала.'
  - sentence: Він говорив лише одне слово і пішов.
    error: говорив
    correction: сказав
    error_type: word
    options:
    - сказав
    - говорить
    - говоритиме
    explanation: '«Лише одне слово» — одноразова завершена дія. Потрібен доконаний
      вид: сказав.'
  - sentence: Ми знайшли ключі цілу годину, але не могли.
    error: знайшли
    correction: шукали
    error_type: word
    options:
    - шукали
    - знайдемо
    - шукаємо
    explanation: '«Цілу годину, але не могли» — незавершений тривалий процес. Потрібен
      недоконаний вид: шукали.'
  - sentence: Вона щодня запитала мене про погоду.
    error: запитала
    correction: запитувала
    error_type: word
    options:
    - запитувала
    - запитує
    - запитуватиме
    explanation: '«Щодня» — звичайна повторювана дія. Потрібен недоконаний вид: запитувала.'
  - sentence: Він нарешті допомагав нам!
    error: допомагав
    correction: допоміг
    error_type: word
    options:
    - допоміг
    - допомагає
    - допоможе
    explanation: '«Нарешті» — сигнал завершеного результату. Потрібен доконаний вид:
      допоміг.'
  - sentence: Вони зварили вареники цілу годину.
    error: зварили
    correction: варили
    error_type: word
    options:
    - варили
    - зваримо
    - варять
    explanation: '«Цілу годину» — тривала дія. Потрібен недоконаний вид: варили.'
