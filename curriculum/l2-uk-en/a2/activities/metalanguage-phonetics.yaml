version: '1.0'
module: metalanguage-phonetics
level: a2
inline:
- id: quiz-classify-sounds
  type: quiz
  instruction: Визначте характеристику звука (оберіть правильний варіант)
  items:
  - question: 'Звук [а] — це:'
    options:
    - голосний звук
    - приголосний дзвінкий
    - приголосний глухий
    - приголосний сонорний
    correct: 0
  - question: 'Звук [б] — це:'
    options:
    - голосний звук
    - приголосний дзвінкий
    - приголосний глухий
    - приголосний сонорний
    correct: 1
  - question: 'Звук [с] — це:'
    options:
    - голосний звук
    - приголосний дзвінкий
    - приголосний глухий
    - приголосний сонорний
    correct: 2
  - question: 'Звук [м] — це:'
    options:
    - голосний звук
    - приголосний дзвінкий
    - приголосний глухий
    - приголосний сонорний
    correct: 3
  - question: 'Звук [т] — це:'
    options:
    - голосний звук
    - приголосний дзвінкий
    - приголосний глухий
    - приголосний сонорний
    correct: 2
  - question: 'Звук [о] — це:'
    options:
    - голосний звук
    - приголосний дзвінкий
    - приголосний глухий
    - приголосний сонорний
    correct: 0
  - question: 'Звук [з] — це:'
    options:
    - голосний звук
    - приголосний дзвінкий
    - приголосний глухий
    - приголосний сонорний
    correct: 1
  - question: 'Звук [л] — це:'
    options:
    - голосний звук
    - приголосний дзвінкий
    - приголосний глухий
    - приголосний сонорний
    correct: 3
- id: group-sort-sort-consonants-into-groups
  type: group-sort
  instruction: Розподіліть приголосні звуки за категоріями
  groups:
  - label: Дзвінкі приголосні
    items:
    - '[б]'
    - '[д]'
    - '[з]'
    - '[ж]'
  - label: Глухі приголосні
    items:
    - '[п]'
    - '[т]'
    - '[с]'
    - '[ш]'
  - label: Сонорні приголосні
    items:
    - '[м]'
    - '[н]'
    - '[л]'
    - '[р]'
- id: mark-the-sonorants
  type: quiz
  instruction: Який звук у цьому слові є сонорним?
  items:
  - question: 'У слові «сон» сонорний звук — це:'
    options:
    - '[с]'
    - '[о]'
    - '[н]'
    - немає сонорних
    correct: 2
  - question: 'У слові «ліс» сонорний звук — це:'
    options:
    - '[л'']'
    - '[і]'
    - '[с]'
    - немає сонорних
    correct: 0
  - question: 'У слові «сир» сонорний звук — це:'
    options:
    - '[с]'
    - '[и]'
    - '[р]'
    - немає сонорних
    correct: 2
  - question: 'У слові «вода» сонорний звук — це:'
    options:
    - '[в]'
    - '[о]'
    - '[д]'
    - '[а]'
    correct: 0
  - question: 'У слові «кіт» сонорний звук — це:'
    options:
    - '[к'']'
    - '[і]'
    - '[т]'
    - немає сонорних
    correct: 3
  - question: 'У слові «мир» сонорні звуки — це:'
    options:
    - '[м]'
    - '[и]'
    - '[р]'
    - і [м], і [р]
    correct: 3
- id: fill-in-complete-phonetic-transcription-of-words-fill-in-missing-sounds-marks
  type: fill-in
  instruction: Доповніть фонетичну транскрипцію слів (вставте пропущений звук або
    знак)
  items:
  - sentence: яблуко — [____а́блуко]
    answer: й
    options:
    - й
    - я
    - ь
  - sentence: щастя — [____ча́с'т'а]
    answer: ш
    options:
    - ш
    - щ
    - с
  - sentence: кінь — [к'і́____]
    answer: н'
    options:
    - н'
    - нь
    - н
  - sentence: любов — [л'____бо́в]
    answer: у
    options:
    - у
    - ю
    - йу
  - sentence: знання — [зна____а́]
    answer: 'н'':'
    options:
    - 'н'':'
    - нн
    - н'
  - sentence: джміль — [____м'і́л']
    answer: дж
    options:
    - дж
    - д
    - ж
- id: match-up-match-ukrainian-phonetic-terms-to-their-definitions
  type: match-up
  instruction: З'єднайте українські фонетичні терміни з їхніми значеннями
  pairs:
  - left: фонетика
    right: наука, що вивчає звуковий склад мови
  - left: звук
    right: те, що ми чуємо і вимовляємо
  - left: літера
    right: візуальний символ на папері, який ми бачимо і пишемо
  - left: фонема
    right: абстрактна одиниця мови, яка розрізняє значення слів
  - left: голосний звук
    right: звук, що утворюється тільки за допомогою голосу (без перешкод)
  - left: дзвінкий приголосний
    right: звук, який складається з голосу та шуму одночасно
  - left: глухий приголосний
    right: звук, який складається тільки з чистого шуму без голосу
  - left: транскрипція
    right: точний фонетичний запис того, що ми чуємо у квадратних дужках
workbook:
- type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про фонетику
  items:
  - statement: В українській мові завжди кількість звуків і літер збігається.
    correct: false
    explanation: Ні, літер 33, а звуків 38. Крім того, деякі літери позначають два
      звуки, а м'який знак не позначає жодного.
  - statement: Дзвінкі приголосні в українській мові не оглушуються в кінці слова.
    correct: true
    explanation: 'Це важливе правило орфоепії: слова на кшталт «дуб» або «мороз» завжди
      вимовляються дзвінко.'
  - statement: Сонорні приголосні не мають глухої пари.
    correct: true
    explanation: У сонорних звуках голос переважає над шумом, тому вони не мають глухих
      відповідників.
  - statement: Літера «я» завжди позначає тільки один звук.
    correct: false
    explanation: 'На початку слова або після голосного вона позначає два звуки: [й]
      та [а].'
  - statement: М'який знак (ь) позначає дуже м'який голосний звук.
    correct: false
    explanation: М'який знак взагалі не є звуком. Він тільки показує м'якість попереднього
      приголосного.
  - statement: Український наголос є вільним і рухомим.
    correct: true
    explanation: Він може падати на будь-який склад і легко змінювати своє місце при
      зміні форми слова.
- type: group-sort
  instruction: Розподіліть слова за останнім приголосним звуком
  groups:
  - label: Твердий звук у кінці
    items:
    - син
    - лис
    - сад
    - дуб
  - label: М'який звук у кінці
    items:
    - сіль
    - день
    - кінь
    - осінь
- type: odd-one-out
  instruction: Знайдіть зайве слово (з іншою моделлю наголосу)
  items:
  - words:
    - ма́ма
    - та́то
    - ка́ва
    - сестра́
    correct: 3
    explanation: У слові «сестра́» наголос падає на другий склад, а в інших — на перший.
  - words:
    - рука́
    - вода́
    - стіна́
    - о́ко
    correct: 3
    explanation: У слові «о́ко» наголос падає на перший склад, а в інших — на другий.
  - words:
    - я́блуко
    - де́рево
    - о́зеро
    - маши́на
    correct: 3
    explanation: У слові «маши́на» наголос падає на другий склад, а в інших — на перший.
  - words:
    - телефон
    - молоко
    - олівець
    - безпека
    correct: 3
    explanation: У слові «безпека» наголос на другому складі, а в інших — на третьому.
  - words:
    - соба́ка
    - робо́та
    - коро́ва
    - кі́шка
    correct: 3
    explanation: У слові «кі́шка» наголос на першому складі, а в інших — на другому.
  - words:
    - зима́
    - весна́
    - лі́то
    - ціна́
    correct: 2
    explanation: У слові «лі́то» наголос падає на перший склад, а в інших — на другий.
- type: unjumble
  instruction: Складіть правильні речення зі слів
  items:
  - words:
    - бачимо.
    - літери
    - Ми
    - пишемо
    - і
    correct_order:
    - Ми
    - бачимо
    - і
    - пишемо
    - літери.
  - words:
    - звуки.
    - чуємо
    - і
    - Ми
    - вимовляємо
    correct_order:
    - Ми
    - чуємо
    - і
    - вимовляємо
    - звуки.
  - words:
    - наука
    - про
    - Фонетика
    - звуки.
    - —
    - це
    correct_order:
    - Фонетика
    - —
    - це
    - наука
    - про
    - звуки.
  - words:
    - вільний.
    - українській
    - наголос
    - В
    - мові
    correct_order:
    - В
    - українській
    - мові
    - наголос
    - вільний.
  - words:
    - є
    - м'яким.
    - завжди
    - Звук
    - '[й]'
    correct_order:
    - Звук
    - '[й]'
    - завжди
    - є
    - м'яким.
  - words:
    - не
    - знак
    - звуком.
    - М'який
    - є
    correct_order:
    - М'який
    - знак
    - не
    - є
    - звуком.
