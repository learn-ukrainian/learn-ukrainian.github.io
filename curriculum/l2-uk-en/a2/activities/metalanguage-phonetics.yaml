version: '1.0'
module: metalanguage-phonetics
level: a2
inline:
- id: match-up-match-ukrainian-phonetic-terms-to-their-definitions
  type: match-up
  instruction: З'єднайте фонетичні терміни з їхніми значеннями
  pairs:
  - left: фонетика
    right: наука, що вивчає звуки мови
  - left: графіка
    right: наука про умовні знаки для письма
  - left: орфоепія
    right: правила правильної літературної вимови
  - left: фонема
    right: ідеальна абстрактна звукова одиниця
  - left: звук
    right: фізична вібрація, яку ми чуємо і вимовляємо
  - left: літера
    right: візуальний символ, який ми бачимо на папері
  - left: мовознавство
    right: серйозна велика наука про мову загалом
  - left: наголос
    right: сильна вимова одного зі складів у слові
- id: quiz-classify-sounds
  type: quiz
  instruction: Класифікуйте ці звуки (голосний чи приголосний? дзвінкий чи глухий?)
  items:
  - question: Звук [а] — це...
    options:
    - голосний звук
    - дзвінкий приголосний
    - глухий приголосний
    - сонорний приголосний
    correct: 0
  - question: Звук [б] — це...
    options:
    - дзвінкий приголосний
    - глухий приголосний
    - голосний звук
    - сонорний приголосний
    correct: 0
  - question: Звук [п] — це...
    options:
    - глухий приголосний
    - дзвінкий приголосний
    - сонорний приголосний
    - голосний звук
    correct: 0
  - question: Звук [м] — це...
    options:
    - сонорний приголосний
    - глухий приголосний
    - свистячий приголосний
    - голосний звук
    correct: 0
  - question: Звуки [ж], [ч], [ш], [дж] — це завжди...
    options:
    - шиплячі приголосні
    - свистячі приголосні
    - губні приголосні
    - м'які приголосні
    correct: 0
  - question: Звук [й] у будь-якій позиції завжди є...
    options:
    - м'яким приголосним
    - твердим приголосним
    - голосним звуком
    - глухим приголосним
    correct: 0
- id: group-sort-sort-consonants-into-groups
  type: group-sort
  instruction: Розподіліть ці приголосні звуки на три групи
  groups:
  - label: Дзвінкі приголосні
    items:
    - '[б]'
    - '[д]'
    - '[з]'
    - '[ж]'
  - label: Глухі приголосні
    items:
    - '[п]'
    - '[т]'
    - '[с]'
    - '[ш]'
  - label: Сонорні приголосні
    items:
    - '[м]'
    - '[н]'
    - '[л]'
    - '[р]'
- id: mark-the-sonorants
  type: quiz
  instruction: Оберіть слово, у якому абсолютно всі приголосні звуки є сонорними (згадайте
    слово «МіНеРаЛоВиЙ» або фразу «Ми винили рій»)
  items:
  - question: Яке слово має тільки сонорні приголосні?
    options:
    - малина
    - собака
    - кішка
    - риба
    correct: 0
  - question: Яке слово має тільки сонорні приголосні?
    options:
    - лимон
    - яблуко
    - груша
    - слива
    correct: 0
  - question: Яке слово має тільки сонорні приголосні?
    options:
    - ворон
    - сокіл
    - голуб
    - папуга
    correct: 0
  - question: Яке слово має тільки сонорні приголосні?
    options:
    - номер
    - намет
    - диван
    - крісло
    correct: 0
  - question: Яке слово має тільки сонорні приголосні?
    options:
    - мінерал
    - вітамін
    - метал
    - пластик
    correct: 0
  - question: Яке слово має тільки сонорні приголосні?
    options:
    - мільйон
    - тисяча
    - сотня
    - десяток
    correct: 0
- id: fill-in-complete-phonetic-transcription-of-words-fill-in-missing-sounds-marks
  type: fill-in
  instruction: Доповніть фонетичну транскрипцію (вставте пропущений звук або знак)
  items:
  - sentence: день -> [де____]
    answer: н'
    options:
    - н'
    - нь
    - н
    - н'ь
  - sentence: мрія -> [мр'і____а]
    answer: й
    options:
    - й
    - я
    - йа
    - ь
  - sentence: знання -> [зна____а́]
    answer: 'н'':'
    options:
    - 'н'':'
    - нн
    - нь
    - н'н'
  - sentence: сіль -> [с'і____]
    answer: л'
    options:
    - л'
    - ль
    - л
    - л'ь
  - sentence: щастя -> [____ча́с'т'а]
    answer: ш
    options:
    - ш
    - щ
    - шч
    - с
  - sentence: джміль -> [____м'і́л']
    answer: дж
    options:
    - дж
    - д
    - ж
    - д'ж
- id: error-correction-find-and-fix-mistakes-in-phonetic-transcriptions
  type: error-correction
  instruction: Знайдіть і виправте одну типову помилку у фонетичній транскрипції
  items:
  - sentence: '[я́блуко]'
    error: я́
    correction: йа́
    error_type: word
    options:
    - йа́
    - іа́
    - ьа́
    explanation: 'Літера «я» на початку слова обов''язково позначає два окремі звуки:
      [й] та [а].'
  - sentence: '[джмі́ль]'
    error: ль
    correction: л'
    error_type: word
    options:
    - л'
    - л
    - л'ь
    explanation: У транскрипції ми не пишемо м'який знак, а використовуємо скісну
      риску ['] для позначення м'якості.
  - sentence: '[ща́с''т''а]'
    error: щ
    correction: шч
    error_type: word
    options:
    - шч
    - ш
    - ч
    explanation: 'Літера «щ» завжди розкладається на два тверді звуки: [ш] і [ч].'
  - sentence: '[знанн''а́]'
    error: нн'
    correction: 'н'':'
    error_type: word
    options:
    - 'н'':'
    - н'
    - 'н:'
    explanation: Подовжений звук у транскрипції позначається спеціальним знаком —
      двокрапкою [:].
  - sentence: '[л''іс'']'
    error: с'
    correction: с
    error_type: word
    options:
    - с
    - сь
    - з
    explanation: Звук [с] тут твердий, адже після нього немає м'якого знака чи йотованих
      букв.
  - sentence: '[де́нь]'
    error: нь
    correction: н'
    error_type: word
    options:
    - н'
    - н
    - н'ь
    explanation: М'який знак — це не звук. М'якість попереднього звука позначаємо
      рискою ['].
workbook:
- type: true-false
  instruction: Чи є ці твердження про фонетику правдивими?
  items:
  - statement: В українській мові дзвінкі приголосні в кінці слова (наприклад, у слові
      «хліб») стають глухими.
    correct: false
    explanation: Це орфоепічна помилка. Українські дзвінкі приголосні в кінці слова
      ніколи не втрачають свою дзвінкість.
  - statement: Літера «м'який знак» (ь) ніколи не має власного окремого звуку.
    correct: true
    explanation: Він працює тільки як візуальний сигнал, що показує м'якість попереднього
      приголосного.
  - statement: Літери «я», «ю», «є» абсолютно завжди позначають два звуки.
    correct: false
    explanation: Вони позначають два звуки тільки на початку слова, після голосного
      або після апострофа. Після приголосного вони позначають один звук і м'якість.
  - statement: Український наголос є рухомим, тобто він може змінювати своє місце
      при зміні форми слова.
    correct: true
    explanation: Наприклад, «рука́» — «ру́ки». Наголос перемістився.
  - statement: Сонорні приголосні звуки завжди мають глуху пару.
    correct: false
    explanation: Сонорні приголосні (м, в, н, л, р, й) унікальні тим, що вони ніколи
      не мають глухої пари.
  - statement: Омографи — це слова, які пишуться однаково, але мають різний наголос
      і різне значення.
    correct: true
    explanation: Наприклад, «за́мок» (castle) і «замо́к» (lock).
- type: quiz
  instruction: Оберіть слово з правильним наголосом (згадайте про омографи)
  items:
  - question: Яке слово означає велику старовинну будівлю (castle)?
    options:
    - за́мок
    - замо́к
    - за́мки
    - замочки
    correct: 0
  - question: Яке слово означає металевий предмет на дверях (lock)?
    options:
    - замо́к
    - за́мок
    - замочки
    - за́мки
    correct: 0
  - question: Яке слово означає частину колеса (rim)?
    options:
    - о́бід
    - обі́д
    - о́біди
    - обіди́
    correct: 0
  - question: Яке слово означає час, коли ми їмо вдень (lunch)?
    options:
    - обі́д
    - о́бід
    - обіди́
    - о́біди
    correct: 0
  - question: Яке слово означає сильний моральний чи фізичний біль (torment)?
    options:
    - му́ка
    - мука́
    - му́ки
    - муки́
    correct: 0
  - question: Яке слово означає білий продукт із пшениці для хліба (flour)?
    options:
    - мука́
    - му́ка
    - муки́
    - му́ки
    correct: 0
- type: odd-one-out
  instruction: Знайдіть четверте зайве слово за характеристикою наголосу або складів
  items:
  - words:
    - мама
    - тато
    - баба
    - сестра
    correct: 3
    explanation: У слові «сестра» наголос падає на другий склад (се-стра́), а в інших
      трьох словах — на перший склад.
  - words:
    - стіл
    - кіт
    - ліс
    - вікно
    correct: 3
    explanation: Слово «вікно» має два склади, а всі інші слова мають лише один склад.
  - words:
    - молоко
    - дерево
    - яблуко
    - собака
    correct: 1
    explanation: У слові «дерево» наголос на першому складі (де́-ре-во), а в інших
      словах наголос падає не на перший склад.
  - words:
    - рука
    - нога
    - голова
    - вухо
    correct: 3
    explanation: У слові «вухо» наголос на першому складі (ву́-хо), а у словах «рука́»,
      «нога́», «голова́» наголос стоїть у кінці слова.
  - words:
    - вода
    - земля
    - небо
    - зима
    correct: 2
    explanation: У слові «небо» наголос на першому складі (не́-бо), а у словах «вода́»,
      «земля́», «зима́» — на другому.
  - words:
    - літера
    - фонема
    - правило
    - словник
    correct: 0
    explanation: У слові «літера» наголос на першому складі (лі́-те-ра), а в інших
      трьох словах — на другому складі.
