- type: true-false
  title: 'Метамова: правда чи брехня?'
  instruction: 'Оцініть, чи правильні ці граматичні твердження про українську мову.'
  items:
    - statement: 'Іменник — це частина мови, яка називає дію або стан предмета.'
      correct: false
      explanation: 'Іменник називає предмет або особу (Хто? Що?). Дію називає дієслово.'
    - statement: 'Дієслово завжди відповідає на питання «що робити?» або «що зробити?».'
      correct: true
      explanation: 'Так, це головні питання для дієслів.'
    - statement: 'Родовий відмінок дуже часто використовується після заперечення «не».'
      correct: true
      explanation: 'Заперечення створює відсутність обєкта, що вимагає Родового відмінка.'
    - statement: 'Милозвучність — це правило, яке робить мову важкою для швидкої вимови.'
      correct: false
      explanation: 'Навпаки, милозвучність полегшує вимову, уникаючи важких збігів звуків.'
    - statement: 'Кличний відмінок не має питань і використовується тільки для звертання.'
      correct: true
      explanation: 'Кличний відмінок унікальний, він служить лише для прямого звертання до особи.'
    - statement: 'Доконаний вид дієслова фокусується на тривалому процесі без результату.'
      correct: false
      explanation: 'Доконаний вид фокусується саме на успішному результаті або завершенні дії.'
    - statement: 'Місцевий відмінок завжди використовується тільки разом з прийменниками.'
      correct: true
      explanation: 'Це єдиний відмінок, який ніколи не вживається без прийменників (в, на, по, при).'
    - statement: 'Дієслова «іти» та «їхати» можна використовувати як синоніми в будь-якій ситуації.'
      correct: false
      explanation: 'Ні, «іти» — це рух пішки, а «їхати» — це рух транспортом.'

