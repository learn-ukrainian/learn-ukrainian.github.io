    - question: 'Мама ___ тато зараз дивляться телевізор.'
      explanation: 'Слово Мама закінчується на голосний, тому далі йде Й.'
      options:
        - text: 'й'
          correct: true
        - text: 'і'
          correct: false
        - text: 'з'
          correct: false
        - text: 'у'
          correct: false
    - question: 'Вона отримала довгий лист ___ Франції.'
