- type: select
  title: 'Аналіз речень: множинний вибір'
  instruction: 'Оберіть усі правильні варіанти для кожного граматичного запитання.'
  items:
    - question: 'У яких реченнях дієслово має доконаний вид (результат)?'
      explanation: 'Доконаний вид означає, що дія повністю завершена (купив, прочитав).'
      min_correct: 2
      options:
        - text: 'Він купив квіти і подарував їх.'
          correct: true
        - text: 'Я прочитав цю цікаву книгу.'
          correct: true
        - text: 'Вона довго вибирала подарунок.'
          correct: false
        - text: 'Ми часто купували свіжі фрукти.'
          correct: false
    - question: 'Які з цих слів є іменниками?'
      explanation: 'Іменники відповідають на питання Хто? або Що?.'
      min_correct: 3
      options:
        - text: 'правило'
          correct: true
        - text: 'помилка'
          correct: true
        - text: 'відмінок'
          correct: true
        - text: 'читати'
          correct: false
        - text: 'швидко'
          correct: false
    - question: 'У яких реченнях використано Кличний відмінок?'
      explanation: 'Кличний відмінок використовується для прямого звертання.'
      min_correct: 2
      options:
        - text: 'Добрий день, пане професоре!'
          correct: true
        - text: 'Мамо, я вже прийшов додому.'
          correct: true
        - text: 'Я бачу свого професора.'
          correct: false
        - text: 'Це машина моєї мами.'
          correct: false
    - question: 'Які речення демонструють правильну милозвучність?'
      explanation: 'Милозвучність уникає збігу приголосних або голосних звуків.'
      min_correct: 2
      options:
        - text: 'Він живе у великому Києві.'
          correct: true
        - text: 'Вона працює в школі.'
          correct: true
        - text: 'Він живе в Києві.'
          correct: false
        - text: 'Брат й сестра читають.'
          correct: false
    - question: 'Які форми є дієсловами руху пішки?'
      explanation: 'Іти та ходити означають рух за допомогою ніг.'
      min_correct: 2
      options:
        - text: 'іти'
          correct: true
        - text: 'ходити'
          correct: true
        - text: 'їхати'
          correct: false
        - text: 'їздити'
          correct: false
    - question: 'У яких реченнях є помилка з Родовим відмінком?'
      explanation: 'Після НЕ потрібен Родовий відмінок.'
      min_correct: 2
      options:
        - text: 'Я не маю час для цього.'
          correct: true
        - text: 'Він не бачить проблему.'
          correct: true
        - text: 'Я не маю часу для цього.'
          correct: false
        - text: 'Він не читає книги.'
          correct: false