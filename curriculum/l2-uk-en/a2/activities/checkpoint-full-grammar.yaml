    - question: 'Сніг ___ мороз прийшли в наше місто.'
      explanation: 'Слово сніг закінчується на приголосний, а мороз починається на приголосний. Потрібен голосний І.'
      options:
        - text: 'і'
          correct: true
        - text: 'й'
          correct: false
        - text: 'у'
          correct: false
        - text: 'в'
          correct: false
    - question: 'Я йду гуляти ___ своїм молодшим братом.'
      explanation: 'Перед звичайним приголосним після голосного ми використовуємо З.'
      options:
        - text: 'з'
          correct: true
        - text: 'зі'
          correct: false
        - text: 'із'
          correct: false
        - text: 'і'
          correct: false
    - question: 'Вона купила яблука, ___ ми почали готувати.'
      explanation: 'Після коми ми завжди використовуємо І, бо це початок нової думки.'
