  instruction: 'Заповніть пропуски відповідною формою слова, звертаючи увагу на контекст.'
  items:
    - sentence: 'Сьогодні я не маю вільного ___ для відпочинку.'
      answer: 'часу'
      explanation: 'Після заперечення НЕ ми використовуємо Родовий відмінок.'
      options:
        - 'час'
        - 'часу'
        - 'часом'
        - 'часі'
    - sentence: 'Вчора ми подарували нову книгу нашому ___.'
      answer: 'братові'
      explanation: 'Дія спрямована до особи, тому використовуємо Давальний відмінок.'
      options:
        - 'брат'
        - 'брата'
        - 'братові'
        - 'братом'
    - sentence: 'Студенти завжди пишуть тест синьою ___.'
      answer: 'ручкою'
      explanation: 'Інструмент дії виражається Орудним відмінком.'
      options:
        - 'ручка'
        - 'ручку'
        - 'ручкою'
        - 'ручці'
    - sentence: 'Мої друзі часто відпочивають у цьому великому ___.'
      answer: 'місті'
      explanation: 'Після прийменника У для позначення місця використовуємо Місцевий відмінок.'
      options:
        - 'місто'
        - 'міста'
        - 'містом'
        - 'місті'
    - sentence: 'Я бачу велику чорну ___ на нашій вулиці.'
      answer: 'машину'
      explanation: 'Прямий обєкт без заперечення вимагає Знахідного відмінка.'
      options:
        - 'машина'
        - 'машини'
        - 'машиною'
        - 'машину'
    - sentence: 'Де зараз працює твій старший ___?'
      answer: 'брат'
      explanation: 'Субєкт дії стоїть у Називному відмінку.'
      options:
        - 'брат'
        - 'брата'
        - 'братові'
        - 'братом'
    - sentence: 'Добрий день, пане ___! Як ваші справи?'
      answer: 'професоре'
      explanation: 'Для прямого звертання до особи використовується Кличний відмінок.'
      options:
        - 'професор'
        - 'професора'
        - 'професоре'
        - 'професором'
    - sentence: 'Ми обговорюємо нову проблему з важливим ___.'
      answer: 'клієнтом'
      explanation: 'Прийменник З вимагає Орудного відмінка для позначення сумісності.'
      options:
        - 'клієнт'
        - 'клієнта'
        - 'клієнтом'
        - 'клієнту'

- type: error-correction
  title: 'Виправте помилку: типові проблеми'
  instruction: 'Знайдіть та виправте одну граматичну помилку в кожному реченні.'
  items:
    - sentence: 'Він зовсім не має час для цієї складної роботи.'
      error: 'час'
      answer: 'часу'
      error_type: 'word'
      explanation: 'Після заперечення НЕ обєкт повинен стояти в Родовому відмінку (чого?).'
      options:
        - 'часу'
        - 'часом'
        - 'часі'
        - 'часа'
    - sentence: 'Зараз я йду в Київ на швидкому поїзді.'
      error: 'йду'
      answer: 'їду'
      error_type: 'word'
      explanation: 'Якщо ви використовуєте транспорт (поїзд), ви повинні їхати, а не йти пішки.'
      options:
        - 'їду'
        - 'ходжу'
        - 'лечу'
        - 'пливу'
    - sentence: 'Менеджер не бачить проблему в цьому новому проєкті.'
      error: 'проблему'
      answer: 'проблеми'
      error_type: 'word'
      explanation: 'Через заперечення НЕ слово проблема має змінити форму на Родовий відмінок.'
      options:
        - 'проблеми'
        - 'проблемою'
        - 'проблем'
        - 'проблема'
    - sentence: 'Я серйозно говорю з школярем про сучасну літературу.'
      error: 'з'
      answer: 'зі'
      error_type: 'word'
      explanation: 'Перед словом, яке починається на складну комбінацію (шк), використовуємо ЗІ для милозвучності.'
      options:
        - 'зі'
        - 'із'
        - 'в'
        - 'у'
    - sentence: 'Вчора Олег й Марія дуже довго читали книгу.'
      error: 'й'
      answer: 'і'
      error_type: 'word'
      explanation: 'Після приголосного звука (г) потрібно використовувати голосний сполучник І.'
      options:
        - 'і'
        - 'та'
        - 'але'
        - 'бо'
    - sentence: 'Моя родина живе в Львові вже багато років.'
      error: 'в'
      answer: 'у'
      error_type: 'word'
      explanation: 'Між двома приголосними (ве та Л) ми ставимо голосний У для милозвучності.'
      options:
        - 'у'
        - 'з'
        - 'на'
        - 'біля'

