- type: quiz
  title: 'Милозвучність: оберіть У чи В'
  instruction: 'Оберіть правильний варіант, щоб речення звучало мелодійно.'
  items:
    - question: 'Він живе ___ Києві вже два роки.'
      explanation: 'Слово Він закінчується на приголосний, а Київ починається на приголосний. Щоб уникнути збігу приголосних, використовуємо У.'
      options:
        - text: 'у'
          correct: true
        - text: 'в'
          correct: false
        - text: 'і'
          correct: false
        - text: 'й'
          correct: false
    - question: 'Вона живе ___ Одесі біля моря.'
      explanation: 'Слово Вона закінчується на голосний, а Одеса починається на голосний. Використовуємо В.'
      options:
        - text: 'в'
          correct: true
        - text: 'у'
          correct: false
        - text: 'з'
          correct: false
        - text: 'із'
          correct: false
    - question: '___ місті сьогодні дуже багато машин.'
      explanation: 'На початку речення перед приголосним звуком ми використовуємо У.'
      options:
        - text: 'У'
          correct: true
        - text: 'В'
          correct: false
        - text: 'І'
          correct: false
        - text: 'Й'
          correct: false
    - question: '___ Америці є дуже гарні національні парки.'
      explanation: 'На початку речення перед голосним звуком ми використовуємо В.'
      options:
        - text: 'В'
          correct: true
        - text: 'У'
          correct: false
        - text: 'З'
          correct: false
        - text: 'Із'
          correct: false
    - question: 'Наш брат пішов ___ великий магазин.'
      explanation: 'Слово пішов закінчується на приголосний, а великий починається на приголосний. Потрібен голосний місток У.'
      options:
        - text: 'у'
          correct: true
        - text: 'в'
          correct: false
        - text: 'і'
          correct: false
        - text: 'й'
          correct: false
    - question: 'Ми були ___ сучасному театрі вчора.'
      explanation: 'Слово були закінчується на голосний, тому використовуємо В перед приголосним.'
      options:
        - text: 'в'
          correct: true
        - text: 'у'
          correct: false
        - text: 'з'
          correct: false
        - text: 'із'
          correct: false
    - question: 'Мій тато працює ___ новій школі.'
      explanation: 'Слово працює закінчується на голосний, тому далі йде приголосний В.'
      options:
        - text: 'в'
          correct: true
        - text: 'у'
          correct: false
        - text: 'з'
          correct: false
        - text: 'і'
          correct: false
    - question: 'Студент читає книгу ___ бібліотеці.'
      explanation: 'Слово книгу закінчується на голосний, тому потрібен В.'
      options:
        - text: 'в'
          correct: true
        - text: 'у'
          correct: false
        - text: 'з'
          correct: false
        - text: 'і'
          correct: false

- type: quiz
  title: 'Милозвучність: оберіть І чи Й, З чи ЗІ'
  instruction: 'Знайдіть найкращий варіант для кожного речення.'
  items:
    - question: 'Брат ___ сестра читають дуже цікаву книгу.'
      explanation: 'Між двома приголосними звуками (т та с) ми використовуємо голосний І.'
      options:
