- type: mark-the-words
  title: "Знайдіть слова простору та напрямку"
  instruction: "Уважно прочитайте текст і позначте всі слова напрямку (ліворуч, прямо) та просторові прийменники (біля, перед, повз, через)."
  text: "Сьогодні ми гуляли містом. Щоб знайти музей, ми йшли прямо. Потім ми обережно повернули ліворуч. Ми пройшли повз красивий фонтан. Наша зупинка була розташована біля аптеки. Ми довго їхали через усе місто. Перед великим супермаркетом ми вийшли. Далі нам треба було йти праворуч. Ми зупинилися поруч із пам'ятником. Позаду нас залишився галасливий ринок. Попереду вже було видно море. Навпроти театру стояли вуличні музиканти. Всередині було дуже гарно."
  answers: ["прямо", "ліворуч", "повз", "біля", "через", "Перед", "праворуч", "поруч", "Позаду", "Попереду", "Навпроти", "Всередині"]

