- type: match-up
  title: "Словник транспорту та напрямків"
  instruction: "З'єднайте українські слова з їхнім англійським перекладом."
  pairs:
    - left: "йти пішки"
      right: "to go on foot"
    - left: "їхати автобусом"
      right: "to go by bus"
    - left: "повертати ліворуч"
      right: "to turn left"
    - left: "йти прямо"
      right: "to go straight"
    - left: "повертати праворуч"
      right: "to turn right"
    - left: "автобусна зупинка"
      right: "bus stop"
    - left: "кінцева зупинка"
      right: "terminal stop"
    - left: "робити пересадку"
      right: "to make a transfer"
    - left: "купити квиток"
      right: "to buy a ticket"
    - left: "швидкий трамвай"
      right: "fast tram"
    - left: "жовта маршрутка"
      right: "yellow minibus"
    - left: "розклад руху"
      right: "schedule"

- type: group-sort
  title: "Як ми рухаємося?"
  instruction: "Розподіліть слова та фрази за способом пересування: пішки або на транспорті."
  groups:
    - name: "Рух пішки (йти, ходити)"
      items: ["гуляти в парку", "йти прямо", "переходити через дорогу", "йти повз магазин", "ходити містом", "йти додому"]
    - name: "Рух транспортом (їхати, їздити)"
      items: ["сідати в трамвай", "купувати квиток", "робити пересадку", "їхати автобусом", "виходити на зупинці", "чекати маршрутку"]

- type: fill-in
  title: "Запитайте дорогу"
  instruction: "Вставте правильне слово у речення."
  items:
    - sentence: "Вибачте, ви не знаєте, де тут найближча автобусна ___?"
      answer: "зупинка"
      options: ["зупинка", "маршрутка", "пересадка", "каса"]
    - sentence: "Щоб дістатися до театру, вам потрібно йти ___."
      answer: "прямо"
      options: ["прямо", "швидко", "гарно", "ліворуч"]
    - sentence: "Одразу після світлофора вам треба повернути ___."
      answer: "праворуч"
      options: ["праворуч", "направоруч", "правіше", "право"]
    - sentence: "Я дуже втомився йти пішки, давайте поїдемо на ___."
      answer: "трамваї"
      options: ["трамваї", "автобус", "маршрутка", "метро"]
    - sentence: "Наша зустріч буде сьогодні ввечері ___ Оперного театру."
      answer: "біля"
      options: ["біля", "перед", "через", "повз"]
    - sentence: "Ця маршрутка їде ___ старий міст."
      answer: "через"
      options: ["через", "біля", "прямо", "перед"]
    - sentence: "Вам потрібно вийти, це вже ___ зупинка."
      answer: "кінцева"
      options: ["кінцева", "перша", "пряма", "швидка"]
    - sentence: "Туристи йшли ___ красивий пам'ятник, але не зупинилися."
      answer: "повз"
      options: ["повз", "через", "біля", "перед"]
    - sentence: "Ми зараз ___ в Одесу на швидкому поїзді."
      answer: "їдемо"
      options: ["їдемо", "йдемо", "їздимо", "ходимо"]
    - sentence: "Будь ласка, зупиніться ___ пішохідним переходом."
      answer: "перед"
      options: ["перед", "біля", "повз", "через"]
    - sentence: "Я щодня ___ на роботу на жовтій маршрутці."
      answer: "їжджу"
      options: ["їжджу", "їду", "ходжу", "йду"]
    - sentence: "Щоб купити ___, вам потрібно дати гроші водієві."
      answer: "квиток"
      options: ["квиток", "розклад", "маршрут", "зупинку"]

- type: unjumble
  title: "Складіть маршрут"
  instruction: "Розташуйте слова в правильному порядку, щоб утворити речення."
  items:
    - words: ["ви", "куди", "зараз", "їдете"]
      answer: "Куди ви зараз їдете?"
    - words: ["вам", "йти", "прямо", "потрібно"]
      answer: "Вам потрібно йти прямо."
    - words: ["зупинка", "знаходиться", "біля", "аптеки"]
      answer: "Зупинка знаходиться біля аптеки."
    - words: ["поверніть", "перед", "театром", "ліворуч"]
      answer: "Поверніть ліворуч перед театром."
    - words: ["я", "кожен", "день", "їжджу", "метро", "на"]
      answer: "Я кожен день їжджу на метро."
    - words: ["ми", "йшли", "повз", "старий", "парк"]
      answer: "Ми йшли повз старий парк."
    - words: ["маршрутка", "їде", "через", "місто"]
      answer: "Маршрутка їде через місто."
    - words: ["де", "тут", "найближчий", "вихід"]
      answer: "Де тут найближчий вихід?"
    - words: ["це", "кінцева", "зупинка", "трамвая"]
      answer: "Це кінцева зупинка трамвая."
    - words: ["я", "зараз", "йду", "пішки", "додому"]
      answer: "Я зараз йду пішки додому."
    - words: ["вони", "поїхали", "в", "центр", "автобусом"]
      answer: "Вони поїхали в центр автобусом."
    - words: ["вибачте", "як", "пройти", "на", "вокзал"]
      answer: "Вибачте, як пройти на вокзал?"

- type: error-correction
  title: "Виправте помилки туристів"
  instruction: "Знайдіть і виправте помилку в кожному реченні."
  items:
    - sentence: "Я зараз йду в Київ на машині."
      error: "йду"
      answer: "їду"
      error_type: "word"
      options: ["їду", "ходжу", "гуляю", "біжу"]
      explanation: "Ми використовуємо 'їхати' для пересування транспортом."
    - sentence: "Я йду в школу кожен день."
      error: "йду"
      answer: "ходжу"
      error_type: "word"
      options: ["ходжу", "гуляю", "їжджу", "крокую"]
      explanation: "Для регулярної дії пішки використовуємо дієслово 'ходити'."
    - sentence: "Мій друг щойно приїхав у магазин з дому."
      error: "приїхав"
      answer: "поїхав"
      error_type: "word"
      options: ["поїхав", "зайшов", "пішов", "виїхав"]
      explanation: "Префікс 'по-' означає початок руху. Він щойно стартував."
    - sentence: "Поверніть наліворуч біля старого дерева."
      error: "наліворуч"
      answer: "ліворуч"
      error_type: "word"
      options: ["ліворуч", "ліво", "наліво", "правіше"]
      explanation: "Правильні слова: 'ліворуч' або 'наліво'."
    - sentence: "Зупинка знаходиться через театру."
      error: "через"
      answer: "біля"
      error_type: "word"
      options: ["біля", "повз", "прямо", "перед"]
      explanation: "Якщо зупинка поруч із театром, використовуємо прийменник 'біля'."
    - sentence: "Вам потрібно йти ногами до центру."
      error: "ногами"
      answer: "пішки"
      error_type: "word"
      options: ["пішки", "швидко", "прямо", "довго"]
      explanation: "В українській мові ми не кажемо 'йти ногами', тільки 'йти пішки'."
    - sentence: "Автобус іде по цій вулиці."
      error: "іде"
      answer: "їде"
      error_type: "word"
      options: ["їде", "ходить", "їздить", "біжить"]
      explanation: "Транспорт 'їде', а не 'іде'."
    - sentence: "Ми поїхали у Київ і вже там."
      error: "поїхали"
      answer: "приїхали"
      error_type: "word"
      options: ["приїхали", "заїхали", "виїхали", "переїхали"]
      explanation: "Префікс 'при-' означає успішне завершення маршруту."
    - sentence: "Я дуже втомився і хочу поїхати пішки."
      error: "поїхати"
      answer: "піти"
      error_type: "word"
      options: ["піти", "ходити", "бігти", "гуляти"]
      explanation: "Пішки можна тільки 'йти' або 'піти'."
    - sentence: "Цей трамвай ходить через Привоз."
      error: "ходить"
      answer: "їздить"
      error_type: "word"
      options: ["їздить", "іде", "гуляє", "їде"]
      explanation: "Транспорт регулярно 'їздить', а не 'ходить'."
    - sentence: "Вам треба повернути право після світлофора."
      error: "право"
      answer: "праворуч"
      error_type: "word"
      options: ["праворуч", "направоруч", "правіше", "прямо"]
      explanation: "Правильне слово для напрямку — 'праворуч' (або 'направо')."
    - sentence: "Де найближча зупинка маршрутка?"
      error: "маршрутка"
      answer: "маршрутки"
      error_type: "word"
      options: ["маршрутки", "маршрутку", "маршруткою", "маршрутці"]
      explanation: "Після слова 'зупинка' потрібен родовий відмінок (чого?): зупинка маршрутки."

- type: true-false
  title: "Правила навігації: правда чи брехня?"
  instruction: "Визначте, чи правдиве кожне твердження згідно з правилами української мови та культури."
  items:
    - statement: "Слово 'прямо' в Одесі завжди означає ідеально пряму лінію."
      correct: false
      explanation: "В українському спілкуванні 'прямо' часто означає просто рух головною вулицею."
    - statement: "Ми використовуємо дієслово 'йти', коли рухаємося виключно власними ногами."
      correct: true
      explanation: "Дієслово 'йти' описує тільки рух пішки."
    - statement: "Фраза 'Я йду в Київ' є правильною, якщо ви летите літаком."
      correct: false
      explanation: "Для транспорту ми використовуємо тільки дієслово 'їхати'."
    - statement: "Слова 'ліворуч' і 'наліво' мають абсолютно однакове значення."
      correct: true
      explanation: "Це повні синоніми і вказують на рух у лівий бік."
    - statement: "Одесити ніколи не відповідають питанням на питання."
      correct: false
      explanation: "В Одесі це класичний стиль спілкування і спосіб встановити контакт."
    - statement: "Українці частіше орієнтуються за яскравими будівлями, ніж за компасом."
      correct: true
      explanation: "Орієнтація за візуальними орієнтирами (landmarks) є дуже типовою."
    - statement: "Прийменник 'біля' означає, що об'єкт знаходиться дуже близько."
      correct: true
      explanation: "Ми кажемо 'біля', щоб вказати на географічну близькість."
    - statement: "Дієслово 'ходити' описує регулярний або постійний рух пішки."
      correct: true
      explanation: "Наприклад: 'Я ходжу в школу щодня'."
    - statement: "Якщо ваш друг щойно сів у машину біля вашого дому, ви кажете 'Він приїхав'."
      correct: false
      explanation: "Ви кажете 'Він поїхав', тому що це лише початок його руху."
    - statement: "Слово 'маршрутка' походить від фрази 'маршрутне таксі'."
      correct: true
      explanation: "Це коротке слово стало справжнім символом міського транспорту."
    - statement: "Якщо ви рухаєтеся крізь парк, ви йдете 'через' парк."
      correct: true
      explanation: "Прийменник 'через' означає рух крізь простір."
    - statement: "Кінцева зупинка — це місце, де ви можете купити квиток."
      correct: false
      explanation: "Кінцева зупинка — це остання зупинка на маршруті, де всі виходять."

