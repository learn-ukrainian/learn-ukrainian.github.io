- type: fill-in
  title: "Одеські розмови на вулиці"
  instruction: "Доповніть фрази з розмов туристів та місцевих жителів."
  items:
    - sentence: "Скажіть, будь ласка, де тут ___ зупинка автобуса?"
      answer: "найближча"
      options: ["найближча", "швидка", "красива", "далека"]
    - sentence: "А навіщо вам туди ___ на трамваї, якщо це близько?"
      answer: "їхати"
      options: ["їхати", "йти", "ходити", "бігти"]
    - sentence: "Ви краще підіть пішки, там дуже гарний ___."
      answer: "парк"
      options: ["парк", "квиток", "розклад", "трамвай"]
    - sentence: "Вам потрібно сісти на жовту ___ номер сім."
      answer: "маршрутку"
      options: ["маршрутку", "зупинку", "кафе", "вулицю"]
    - sentence: "Щоб знайти Оперний театр, ідіть весь час ___."
      answer: "прямо"
      options: ["прямо", "швидко", "гарно", "потім"]
    - sentence: "Після великого перехрестя обережно поверніть ___."
      answer: "ліворуч"
      options: ["ліворуч", "наліворуч", "лівіше", "ліво"]
    - sentence: "Ви побачите старий ринок Привоз прямо ___ вами."
      answer: "перед"
      options: ["перед", "біля", "повз", "через"]
    - sentence: "Ми дуже втомилися і вирішили зробити ___ на інший автобус."
      answer: "пересадку"
      options: ["пересадку", "зупинку", "квиток", "маршрут"]
    - sentence: "Якщо ви заблукали, завжди запитуйте ___ у місцевих."
      answer: "дорогу"
      options: ["дорогу", "машину", "квиток", "погоду"]
    - sentence: "Одеський ___ дуже повільно їде вздовж моря."
      answer: "трамвай"
      options: ["трамвай", "літак", "маршрутка", "велосипед"]
    - sentence: "Вам краще вийти зараз, це вже ___ зупинка."
      answer: "кінцева"
      options: ["кінцева", "перша", "пряма", "швидка"]
    - sentence: "Купіть ___ у водія і передайте гроші."
      answer: "квиток"
      options: ["квиток", "розклад", "маршрут", "зупинку"]

