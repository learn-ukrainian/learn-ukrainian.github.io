  instruction: 'Доповніть діалог між клієнтом і магазином правильними словами.'
  items:
    - sentence: 'Добрий день! Мене цікавить ця чашка. Підкажіть, будь ласка, яка її ціна?'
      answer: 'ціна'
      options:
        - 'ціна'
        - 'сторінка'
        - 'світлина'
        - 'вподобайка'
    - sentence: 'Добрий день! Дуже дякуємо за запит. Пишіть у дірект, щоб дізнатися всі деталі.'
      answer: 'дірект'
      options:
        - 'дірект'
        - 'сайт'
        - 'канал'
        - 'стрічку'
    - sentence: 'Я щойно написала вам у приватні повідомлення.'
      answer: 'повідомлення'
