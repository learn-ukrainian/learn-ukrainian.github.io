        - 'репостять'

- type: error-correction
  title: 'Виправте помилки: Відмінки та слова'
  instruction: 'Знайдіть і виправте типові помилки в реченнях про соціальні мережі.'
  items:
    - sentence: 'Я маю дуже популярний сайт в інстаграмі.'
      error: 'сайт'
      answer: 'сторінку'
      error_type: 'word'
      options:
        - 'сайт'
        - 'сторінку'
        - 'канал'
        - 'стрічку'
      explanation: 'В соціальних мережах ми створюємо сторінку або профіль, а не сайт.'
    - sentence: 'Вчора я нарешті підписався на цьому каналі.'
      error: 'на цьому каналі'
      answer: 'на цей канал'
      error_type: 'phrase'
      options:
        - 'на цьому каналі'
        - 'на цей канал'
        - 'в цей канал'
        - 'у цьому каналі'
      explanation: 'Дієслово підписатися на вимагає Знахідного відмінка (куди?).'
    - sentence: 'Прошу вас перейти на моїй новій сторінці.'
      error: 'на моїй новій сторінці'
      answer: 'на мою нову сторінку'
      error_type: 'phrase'
      options:
        - 'на моїй новій сторінці'
        - 'на мою нову сторінку'
        - 'в моїй новій сторінці'
        - 'до моєї нової сторінки'
      explanation: 'Після перейти на використовуємо Знахідний відмінок: на мою нову сторінку.'
    - sentence: 'Я хочу поширити цей допис зі своїми друзями.'
      error: 'поширити цей допис'
      answer: 'поділитися цим дописом'
      error_type: 'phrase'
      options:
        - 'поширити цей допис'
        - 'поділитися цим дописом'
        - 'репостити цей допис'
        - 'лайкати цей допис'
      explanation: 'З друзями (з ким?) ми можемо поділитися, це вимагає Орудного відмінка.'
    - sentence: 'Я щоранку читаю свіжі новини на телеграмі.'
      error: 'на телеграмі'
      answer: 'в телеграмі'
      error_type: 'phrase'
      options:
        - 'на телеграмі'
        - 'в телеграмі'
        - 'у телеграм'
        - 'на телеграм'
      explanation: 'Коли ми говоримо про застосунок як місце (де?), ми використовуємо прийменник в або у.'
    - sentence: 'Моя компанія розробляє нову сторінку для глобального інтернету.'
      error: 'сторінку'
      answer: 'сайт'
      error_type: 'word'
      options:
        - 'сторінку'
        - 'сайт'
        - 'стрічку'
        - 'допис'
      explanation: 'Великий окремий ресурс у браузері правильно називати сайт.'

