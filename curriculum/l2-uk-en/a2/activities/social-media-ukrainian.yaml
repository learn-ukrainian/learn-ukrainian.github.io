        - 'дописи'
        - 'підписники'
    - sentence: 'Ця чашка коштує п’ятсот гривень. Ви хочете купити її?'
      answer: 'купити'
      options:
        - 'купити'
        - 'лайкати'
        - 'гортати'
        - 'репостити'
    - sentence: 'Так, я хочу її замовити. Ви можете скинути посилання на безпечну оплату?'
      answer: 'посилання'
      options:
        - 'посилання'
        - 'світлину'
        - 'накрутку'
        - 'вподобайку'
    - sentence: 'Звичайно! Ось ваше посилання. Чекаємо на оплату.'
      answer: 'посилання'
      options:
        - 'посилання'
        - 'допис'
        - 'канал'
        - 'профіль'
    - sentence: 'Дякую, я успішно оплатила. Буду чекати свою посилку.'
      answer: 'Дякую'
      options:
        - 'Дякую'
        - 'Прошу'
        - 'Вибачте'
        - 'Будь ласка'
    - sentence: 'Ми також будемо раді, якщо ви підпишетеся на нашу сторінку.'
