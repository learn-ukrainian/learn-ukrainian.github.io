- type: unjumble
  title: 'Складіть речення: Цифрове спілкування'
  instruction: 'Побудуйте правильні речення зі слів.'
  items:
    - words: ['я', 'хочу', 'підписатися', 'на', 'цю', 'нову', 'сторінку']
      answer: 'Я хочу підписатися на цю нову сторінку'
    - words: ['друзі', 'часто', 'поширюють', 'дуже', 'цікаві', 'дописи']
      answer: 'Друзі часто поширюють дуже цікаві дописи'
    - words: ['будь', 'ласка', 'пишіть', 'у', 'наш', 'дірект']
      answer: 'Будь ласка пишіть у наш дірект'
    - words: ['вчора', 'вона', 'скинула', 'мені', 'корисне', 'посилання']
      answer: 'Вчора вона скинула мені корисне посилання'
    - words: ['ми', 'завжди', 'читаємо', 'важливі', 'новини', 'в', 'телеграмі']
      answer: 'Ми завжди читаємо важливі новини в телеграмі'
    - words: ['мої', 'лояльні', 'підписники', 'залишають', 'багато', 'теплих', 'коментарів']
      answer: 'Мої лояльні підписники залишають багато теплих коментарів'

- type: cloze
  title: 'Заповніть пропуски: Ранкова рутина'
  instruction: 'Оберіть правильні слова, щоб доповнити текст про соціальні мережі.'
  passage: 'Кожного ранку я відкриваю свій улюблений застосунок і уважно гортаю {{1}}. Я маю свій особистий {{2}}, де публікую цікаві {{3}}. Спочатку я завжди перевіряю нові {{4}} від друзів. Якщо мені дуже подобається чиясь нова {{5}}, я натискаю на іконку серця, щоб поставити {{6}}. Іноді я хочу {{7}} цікавим відео з моєю сестрою. Якщо я бачу класний товар у магазині, я одразу пишу в {{8}}, щоб дізнатися ціну. Продавець зазвичай швидко відповідає і може скинути мені {{9}} на оплату. Так моє цифрове життя стає дуже зручним, і я ціную всіх своїх активних {{10}}.'
  blanks:
    - id: 1
      answer: 'стрічку'
      options: ['стрічку', 'кнопку', 'накрутку', 'посилання']
    - id: 2
      answer: 'профіль'
      options: ['профіль', 'сайт', 'дірект', 'браузер']
    - id: 3
      answer: 'дописи'
      options: ['дописи', 'вподобайки', 'кнопки', 'сповіщення']
    - id: 4
      answer: 'сповіщення'
      options: ['сповіщення', 'підписники', 'сторінки', 'посилання']
    - id: 5
      answer: 'світлина'
      options: ['світлина', 'стрічка', 'накрутка', 'кнопка']
    - id: 6
      answer: 'вподобайку'
      options: ['вподобайку', 'допис', 'сайт', 'дірект']
    - id: 7
      answer: 'поділитися'
      options: ['поділитися', 'підписатися', 'поширити', 'гортати']
    - id: 8
      answer: 'дірект'
      options: ['дірект', 'стрічку', 'профіль', 'сповіщення']
    - id: 9
      answer: 'посилання'
      options: ['посилання', 'допис', 'вподобайку', 'стрічку']
    - id: 10
      answer: 'підписників'
      options: ['підписників', 'дописи', 'сповіщення', 'сайти']

