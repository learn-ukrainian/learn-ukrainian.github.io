        - 'пощу'
        - 'постиш'
        - 'постить'
        - 'постять'
    - sentence: 'Ти часто лайкаєш пости абсолютно незнайомих людей?'
      answer: 'лайкаєш'
      options:
        - 'лайкаю'
        - 'лайкаєш'
