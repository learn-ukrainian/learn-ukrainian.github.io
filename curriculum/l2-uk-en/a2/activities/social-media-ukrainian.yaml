- type: quiz
  title: 'Розуміння тексту: Цифровий світ'
  instruction: 'Оберіть правильну відповідь на кожне запитання.'
  items:
    - question: 'Який застосунок українці найчастіше використовують для читання новин?'
      explanation: 'Телеграм є найпопулярнішим джерелом новин та сповіщень про тривогу в Україні.'
      options:
        - text: 'телеграм'
          correct: true
        - text: 'інстаграм'
          correct: false
        - text: 'фейсбук'
          correct: false
        - text: 'вайбер'
          correct: false
    - question: 'Яке слово правильно використовувати для особистого акаунта в соціальній мережі?'
      explanation: 'Слово сайт використовується для великих платформ, а для особистого акаунта правильно казати сторінка.'
      options:
        - text: 'сайт'
          correct: false
        - text: 'сторінка'
          correct: true
        - text: 'портал'
          correct: false
        - text: 'канал'
          correct: false
    - question: 'Що означає популярна фраза пишіть у дірект в українському інстаграмі?'
      explanation: 'Ця фраза означає, що магазин просить написати приватне повідомлення для замовлення.'
      options:
        - text: 'пишіть приватне повідомлення'
          correct: true
        - text: 'пишіть коментар під фото'
          correct: false
        - text: 'зателефонуйте нам'
          correct: false
        - text: 'перейдіть на сайт'
          correct: false
    - question: 'Яке автентичне українське слово можна використовувати замість слова лайк?'
      explanation: 'Вподобайка походить від дієслова вподобати і є українським відповідником слова лайк.'
      options:
        - text: 'допис'
          correct: false
        - text: 'світлина'
          correct: false
        - text: 'вподобайка'
          correct: true
        - text: 'стрічка'
          correct: false
    - question: 'Що таке накрутка в контексті соціальних мереж?'
      explanation: 'Накрутка — це штучна купівля фальшивих підписників, що вважається нечесною практикою.'
      options:
        - text: 'штучна купівля підписників'
          correct: true
        - text: 'створення нового каналу'
          correct: false
        - text: 'публікація багатьох фотографій'
          correct: false
        - text: 'написання довгих текстів'
          correct: false
    - question: 'Який відмінок ми використовуємо після дієслова підписатися на?'
      explanation: 'Ми використовуємо Знахідний відмінок, бо ця дія має напрямок (куди?).'
      options:
        - text: 'Називний відмінок'
          correct: false
        - text: 'Місцевий відмінок'
          correct: false
        - text: 'Знахідний відмінок'
          correct: true
        - text: 'Орудний відмінок'
          correct: false
    - question: 'Яке слово є гарним українським синонімом до слова фото?'
      explanation: 'Слово світлина є красивим українським синонімом до фото.'
      options:
        - text: 'допис'
          correct: false
        - text: 'сторіз'
          correct: false
        - text: 'стрічка'
          correct: false
        - text: 'світлина'
          correct: true
    - question: 'Що означає розмовна фраза скинути посилання під час покупки онлайн?'
      explanation: 'Скинути посилання означає надіслати лінк (адресу) для оплати або перегляду товару.'
      options:
        - text: 'надіслати адресу сторінки'
          correct: true
        - text: 'зробити знижку на товар'
          correct: false
        - text: 'написати коментар'
          correct: false
        - text: 'видалити допис'
          correct: false

