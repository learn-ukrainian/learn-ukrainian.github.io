    - ніж
    - за
    - як
    - так
    explanation: Використовуємо сполучник 'ніж' з Називним відмінком.
  - sentence: Ваш товар набагато дорожчий _ мій товар.
    answer: за
    options:
    - за
    - ніж
    - як
    - від
    explanation: Тут використовуємо прийменник 'за' + Знахідний відмінок.
  - sentence: Ці ягоди — це найкраща _ на всьому ринку.
    answer: якість
    options:
    - якість
    - ціна
