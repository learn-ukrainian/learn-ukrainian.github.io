    - кошик
    explanation: Ви просите про зниження ціни — знижку.
  - sentence: Я дав вам двісті гривень, а де моя _?
    answer: решта
    options:
    - решта
    - чек
    - знижка
    - ціна
    explanation: Гроші, що повертає продавець, — це решта.
  - sentence: Дякую за інформацію, але я ще _.
    answer: подумаю
    options:
    - подумаю
    - куплю
    - оформлю
    - заплачу
    explanation: 'Ввічлива відмова: ''я ще подумаю''.'
  - sentence: Цей пучок кропу більший, _ той маленький пучок.
    answer: ніж
