  instruction: Розподіліть елементи за групами.
- type: mark-the-words
  title: Знайдіть прикметники порівняння
  instruction: Знайдіть і позначте всі прикметники вищого ступеня в тексті.
  text: Сьогодні погода набагато тепліша, ніж була вчора. Цей продуктовий ринок ближчий
    до мого дому. Наш новий комп'ютер швидший і надійніший. Ці червоні яблука значно
    солодші за ті жовті груші. Ця куртка дешевша за ту.
  answers:
  - тепліша
  - ближчий
  - швидший
  - надійніший
  - солодші
  - дешевша
- type: quiz
  title: Оберіть правильний варіант порівняння
  items:
  - question: Як правильно сказати українською 'This jacket is cheaper'?
    explanation: Проста форма вищого ступеня від 'дешевий' — 'дешевший'.
    options:
    - text: Ця куртка дешевша.
      correct: true
    - text: Ця куртка більш дешевша.
      correct: false
    - text: Ця куртка дешева.
      correct: false
    - text: Ця куртка найдешевша.
      correct: false
  - question: Яка форма є суплетивною для прикметника 'хороший'?
    explanation: Прикметник 'хороший' має суплетивну форму 'кращий'.
    options:
    - text: кращий
      correct: true
    - text: хорошіший
      correct: false
    - text: більш хороший
      correct: false
    - text: найхороший
      correct: false
  - question: Який правильний варіант від слова 'дорогий' (expensive)?
    explanation: 'Приголосний ''г'' змінюється на ''жч'': дорогий — дорожчий.'
    options:
    - text: дорожчий
      correct: true
    - text: дорогший
      correct: false
    - text: дорожший
      correct: false
    - text: дорогий
      correct: false
  - question: Як правильно порівняти два об'єкти з прийменником 'за'?
    explanation: Після прийменника 'за' ми використовуємо Знахідний відмінок.
    options:
    - text: Він вищий за мене.
      correct: true
    - text: Він вищий за я.
      correct: false
    - text: Він вищий як я.
      correct: false
    - text: Він вищий за мені.
      correct: false
  - question: Що означає словосполучення 'свій продавець' на базарі?
    explanation: Це продавець, у якого ви регулярно купуєте продукти, тому маєте знижку.
    options:
    - text: Постійний продавець, якому ви довіряєте.
      correct: true
    - text: Продавець, який працює тільки в неділю.
      correct: false
    - text: Продавець із супермаркету.
      correct: false
    - text: Людина, яка продає ваш товар.
      correct: false
  - question: Яка міра традиційно використовується для свіжої зелені?
    explanation: Зелень (кріп, петрушку) традиційно вимірюють пучками.
    options:
    - text: пучок
      correct: true
    - text: стакан
      correct: false
    - text: кілограм
      correct: false
    - text: літр
      correct: false
  - question: Який варіант є грубою граматичною помилкою (подвійне порівняння)?
    explanation: Неможливо використовувати 'більш' разом із простою формою 'кращий'.
    options:
    - text: більш кращий
      correct: true
    - text: більш дешевий
      correct: false
    - text: дешевший
      correct: false
    - text: найкращий
      correct: false
  - question: Як правильно сказати 'the biggest' українською?
    explanation: Найвищий ступінь утворюється за допомогою префікса 'най-'.
    options:
    - text: найбільший
      correct: true
    - text: самий більший
      correct: false
    - text: більший
      correct: false
    - text: найбільш великий
      correct: false
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: 'Заповніть пропуски: фрази для шопінгу'
  items:
  - sentence: Продавець дав мені правильну _, коли я заплатив готівкою.
    answer: решту
    options:
    - решту
    - чек
    - знижку
    - ціну
    explanation: Коли ви платите більше, продавець дає вам решту (change).
  - sentence: Я завжди перевіряю касовий _ після покупки в супермаркеті.
    answer: чек
    options:
    - чек
    - решту
    - кошик
    - стакан
    explanation: Документ про покупку — це чек (receipt).
  - sentence: Сьогодні діє велика сезонна _ на зимовий одяг.
    answer: знижка
    options:
    - знижка
    - решта
    - ціна
    - доставка
    explanation: Зменшення ціни — це знижка (discount).
  - sentence: Я хочу оформити _ в цьому інтернет-магазині.
    answer: замовлення
    options:
    - замовлення
    - кошик
    - решту
    - пучок
    explanation: Процес покупки онлайн — це 'оформити замовлення' (checkout).
  - sentence: Ваш віртуальний _ зараз порожній, додайте туди товари.
    answer: кошик
    options:
    - кошик
    - чек
    - ринок
    - стакан
    explanation: Місце для товарів онлайн — це кошик (cart/basket).
  - sentence: Кур'єрська _ прибуде до вашого будинку завтра ввечері.
    answer: доставка
    options:
    - доставка
    - решта
    - знижка
    - ціна
    explanation: Транспортування товару — це доставка (delivery).
  - sentence: Я купив один великий _ свіжого кропу в бабусі.
    answer: пучок
    options:
    - пучок
    - стакан
    - кошик
    - чек
    explanation: Зелень традиційно вимірюється пучками (bunch).
  - sentence: Цей старий телефон гірший, _ мій новий телефон.
    answer: ніж
    options:
    - ніж
    - за
    - як
    - що
    explanation: Для прямого порівняння використовуємо сполучник 'ніж' (than).
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Побудуйте правильні речення
  items:
  - words:
    - Цей
    - ноутбук
    - швидший
    - за
    - старий
    - комп'ютер
    answer: Цей ноутбук швидший за старий комп'ютер
  - words:
    - Моя
    - нова
    - квартира
    - більша
    - ніж
    - стара
    answer: Моя нова квартира більша ніж стара
  - words:
    - Чи
    - можете
    - ви
    - надати
    - мені
    - знижку
    answer: Чи можете ви надати мені знижку
  - words:
    - Я
    - хочу
    - оформити
    - замовлення
    - в
    - інтернеті
    answer: Я хочу оформити замовлення в інтернеті
  - words:
    - Бабусі
    - продають
    - свіжі
    - домашні
    - продукти
    answer: Бабусі продають свіжі домашні продукти
  - words:
    - Він
    - знайшов
    - дешевший
    - варіант
    - на
    - ринку
    answer: Він знайшов дешевший варіант на ринку
  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: Виправте граматичні помилки
  items:
  - sentence: Я думаю, що цей новий телефон більш кращий.
    error: більш кращий
    answer: кращий
    error_type: construction
    options:
    - кращий
    - самий кращий
    - більш хороший
    - хороший
    explanation: Це подвійне порівняння. Правильно казати просто 'кращий'.
  - sentence: Сьогодні погода більш тепліша, ніж була вчора.
    error: більш тепліша
    answer: більш тепла
    error_type: construction
    options:
    - більш тепла
    - тепліша
    - найбільш тепла
    - тепла
    explanation: Після слова 'більш' прикметник має бути в початковій формі.
  - sentence: Центральний ринок ближший як наш супермаркет.
    error: як
    answer: ніж
    error_type: word
    options:
    - ніж
    - що
    - коли
    - тому що
    explanation: Для прямого порівняння ми ніколи не використовуємо 'як'. Тільки 'ніж'
      або 'за'.
  - sentence: Цей сучасний комп'ютер набагато дорожший.
    error: дорожший
    answer: дорожчий
    error_type: word
    options:
    - дорожчий
    - дорогший
    - дорогий
    - набагато дорогий
    explanation: 'Правильна фонетична зміна (г + ш) дає ''жч'': дорожчий.'
  - sentence: Моя сестра старша за я.
    error: за я
    answer: за мене
    error_type: construction
    options:
    - за мене
    - за мною
    - ніж мене
    - ніж я
    explanation: 'Після прийменника ''за'' ми використовуємо Знахідний відмінок: за
      мене.'
  - sentence: Вибачте, ви дали мені неправильну здачу.
    error: здачу
    answer: решту
    error_type: word
    options:
    - решту
    - знижку
    - чек
    - ціну
    explanation: Українською гроші, які повертає продавець, називаються 'решта', а
      не русизм 'здача'.
  instruction: Знайдіть і виправте помилку в реченні.
- type: select
  title: Оберіть правильні варіанти
  items:
  - question: Які з цих слів є простою формою вищого ступеня порівняння?
    options:
    - text: солодший
      correct: true
    - text: найбільший
      correct: false
    - text: дешевший
      correct: true
    - text: більш зручний
      correct: false
    min_correct: 2
    explanation: '''Солодший'' та ''дешевший'' утворені за допомогою суфікса -ш-.'
  - question: Які поняття пов'язані з онлайн-шопінгом?
    options:
    - text: доставка
      correct: true
    - text: пучок
      correct: false
    - text: оформити замовлення
      correct: true
    - text: базар
      correct: false
    min_correct: 2
    explanation: Доставка та оформлення замовлення — це цифрова комерція.
  - question: Які з цих прикметників мають суплетивні форми (змінюють корінь)?
    options:
    - text: хороший
      correct: true
    - text: солодкий
      correct: false
    - text: поганий
      correct: true
    - text: теплий
      correct: false
    min_correct: 2
    explanation: Хороший стає 'кращий', а поганий стає 'гірший'.
  - question: Які з цих фраз є ввічливими формами відмови на ринку?
    options:
    - text: Я ще подумаю.
      correct: true
    - text: Я хочу подивитися інші варіанти.
      correct: true
    - text: Я не буду це купувати.
      correct: false
    - text: Це дуже погано.
      correct: false
    min_correct: 2
    explanation: М'яка відмова дозволяє зберегти позитивні соціальні стосунки.
  - question: Що з цього можна традиційно купити 'на стакан' або 'пучками'?
    options:
    - text: малину
      correct: true
    - text: ноутбук
      correct: false
    - text: кріп
      correct: true
    - text: телевізор
      correct: false
    min_correct: 2
    explanation: Ягоди купують на стакан, а зелень — пучками.
  - question: Які речення граматично правильні?
    options:
    - text: Він вищий за мене.
      correct: true
    - text: Цей варіант більш кращий.
      correct: false
    - text: Цей варіант кращий.
      correct: true
    - text: Вона старша як я.
      correct: false
    min_correct: 2
    explanation: Подвійне порівняння та використання 'як' — це помилки.
  instruction: Оберіть усі правильні відповіді.
- type: true-false
  title: Правда чи брехня?
  items:
  - statement: На українському ринку завжди фіксована ціна.
    correct: false
    explanation: На ринку ціна часто є гнучкою, ви можете обговорювати знижку.
  - statement: '''Свій продавець'' — це людина, якій ви довіряєте і в якої регулярно
      купуєте.'
    correct: true
    explanation: Цей концепт допомагає отримувати кращі продукти та ціни без агресивного
      торгу.
  - statement: Домашні продукти від бабусі часто вважаються найякіснішими в Україні.
    correct: true
    explanation: Вони знаходяться на піку 'ієрархії свіжості'.
  - statement: Форма 'найкращий' є простою формою вищого ступеня.
    correct: false
    explanation: Префікс 'най-' вказує на найвищий ступінь порівняння (superlative).
  - statement: Правильна форма порівняння від слова 'великий' — 'більший'.
    correct: true
    explanation: 'Це суплетивна форма: великий — більший.'
  - statement: В українській мові можна казати 'більш дешевіший'.
    correct: false
    explanation: Це подвійне порівняння, що є грубою граматичною помилкою.
  - statement: Для порівняння можна використовувати конструкцію 'за + Знахідний відмінок'.
    correct: true
    explanation: 'Наприклад: ''Цей телефон дешевший за той телефон''.'
  - statement: Прикметник 'важкий' утворює порівняльну форму 'важчий'.
    correct: true
    explanation: Відбувається фонетична зміна приголосного перед суфіксом -ш-.
  instruction: Визначте, чи твердження правильне.
- type: translate
  title: Оберіть правильний переклад
  items:
  - source: Could you give me a discount?
    options:
    - text: Чи можете ви надати мені знижку?
      correct: true
    - text: Чи можете ви дати мені решту?
      correct: false
    - text: Чи можете ви видати мені чек?
      correct: false
    - text: Чи можете ви показати мені кошик?
      correct: false
    explanation: Знижка — це discount.
  - source: This jacket is warmer than that coat.
    options:
    - text: Ця куртка тепліша за те пальто.
      correct: true
    - text: Ця куртка більш тепліша за те пальто.
      correct: false
    - text: Ця куртка найтепліша.
      correct: false
    - text: Ця куртка тепла як те пальто.
      correct: false
    explanation: Тепліша за те пальто (warmer than that coat).
  - source: I am looking for a cheaper option.
    options:
    - text: Я шукаю дешевший варіант.
      correct: true
    - text: Я шукаю найдешевший варіант.
      correct: false
    - text: Я шукаю дорожчий варіант.
      correct: false
    - text: Я шукаю більший варіант.
      correct: false
    explanation: Дешевший — cheaper.
  - source: Please keep your receipt for 14 days.
    options:
    - text: Будь ласка, зберігайте ваш чек протягом 14 днів.
      correct: true
    - text: Будь ласка, зберігайте вашу решту 14 днів.
      correct: false
    - text: Будь ласка, зберігайте вашу знижку.
      correct: false
    - text: Будь ласка, зберігайте вашу доставку.
      correct: false
    explanation: Чек — це receipt.
  - source: Thank you for the help, but I will think about it.
    options:
    - text: Дякую за допомогу, але я ще подумаю.
      correct: true
    - text: Дякую за допомогу, я не хочу це.
      correct: false
    - text: Дякую за допомогу, дайте знижку.
      correct: false
    - text: Дякую, я хочу оформити замовлення.
      correct: false
    explanation: Я ще подумаю (I will think about it) — a polite refusal.
  - source: Your basket is currently empty.
    options:
    - text: Ваш кошик зараз порожній.
      correct: true
    - text: Ваше замовлення зараз порожнє.
      correct: false
    - text: Ваш чек зараз порожній.
      correct: false
    - text: Ваш стакан зараз порожній.
      correct: false
    explanation: Кошик — це basket/cart.
  instruction: Оберіть правильний переклад.
- type: cloze
  title: Заповніть пропуски в тексті
  passage: В Україні існують різні способи купувати продукти. Якщо ви хочете швидко
    купити все за один раз, ви йдете в {{1}}. Там завжди фіксована {{2}} і працюють
    автоматичні каси. Ви повинні перевірити {{3}} після покупки. Але якщо ви шукаєте
    живого спілкування, вам варто піти на традиційний {{4}}. Тут ви можете знайти
    {{5}}, у якого будете купувати свіжі продукти щотижня. Бабусі часто продають ягоди
    на {{6}}, а свіжу зелень, таку як кріп, вимірюють через {{7}}. Якщо ви хочете
    купити багато, ви можете попросити невелику {{8}}. Продавець візьме ваші гроші
    і дасть правильну {{9}}. Онлайн-шопінг теж дуже популярний. Ви додаєте товар у
    віртуальний {{10}}, потім вам потрібно {{11}} замовлення. Найкраще те, що адресна
    {{12}} привезе товар до вашого дому. Якщо цей новий комп'ютер {{13}} за мій старий
    ноутбук, я обов'язково його куплю. Це буде мій {{14}} вибір!
  blanks:
  - id: 1
    answer: супермаркет
    options:
    - супермаркет
    - парк
    - ресторан
    - кошик
  - id: 2
    answer: ціна
    options:
    - ціна
    - решта
    - доставка
    - бабуся
  - id: 3
    answer: чек
