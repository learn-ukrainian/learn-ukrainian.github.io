- type: fill-in
  title: "Знайдіть відповідний прийменник"
  instruction: "Fill in the blanks with the correct logical preposition."
  items:
    - sentence: "Усі студенти написали тест, ... Максима."
      answer: "крім"
      options: ["крім", "через", "завдяки", "про"]
      explanation: "'Крім' means 'except'."
    - sentence: "... кави я буду пити воду."
      answer: "замість"
      options: ["замість", "протягом", "для", "після"]
      explanation: "'Замість' means 'instead of'."
    - sentence: "Вони розмовляють ... історію України."
      answer: "про"
      options: ["про", "через", "від", "завдяки"]
      explanation: "'Про' means 'about'."
    - sentence: "Я отримав посилку ... моєї бабусі."
      answer: "від"
      options: ["від", "з", "для", "без"]
      explanation: "'Від' means 'from' a person."
    - sentence: "Ми не могли працювати ... відсутність інтернету."
      answer: "через"
      options: ["через", "завдяки", "для", "протягом"]
      explanation: "'Через' implies a negative cause."
    - sentence: "Цей словник дуже корисний ... перекладу текстів."
      answer: "для"
      options: ["для", "через", "від", "про"]
      explanation: "'Для' implies purpose."
    - sentence: "... твоєму плану ми закінчили роботу вчасно."
      answer: "завдяки"
      options: ["завдяки", "через", "замість", "протягом"]
      explanation: "'Завдяки' implies a positive cause."
    - sentence: "Ми чекали на автобус ... двох годин."
      answer: "протягом"
      options: ["протягом", "о", "після", "замість"]
      explanation: "'Протягом' indicates duration."