- type: quiz
  title: "Основи логіки та граматики"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Який сполучник найкраще підходить для розмови з друзями?"
      explanation: "Слово бо є найпопулярнішим у розмовному стилі."
      options:
        - text: "бо"
          correct: true
        - text: "оскільки"
          correct: false
        - text: "хоча"
          correct: false
        - text: "але"
          correct: false
    - question: "Який прийменник ми використовуємо для позитивних подій?"
      explanation: "Для успіхів та допомоги ми використовуємо завдяки."
      options:
        - text: "завдяки"
          correct: true
        - text: "через"
          correct: false
        - text: "тому що"
          correct: false
        - text: "бо"
          correct: false
    - question: "Яке слово означає 'although' англійською мовою?"
      explanation: "Слово хоча перекладається як although і показує допустовість."
      options:
        - text: "хоча"
          correct: true
        - text: "оскільки"
          correct: false
        - text: "але"
          correct: false
        - text: "тому що"
          correct: false
    - question: "Де ми маємо поставити кому в реченні зі словом 'тому що'?"
      explanation: "Кома завжди ставиться перед словом тому."
      options:
        - text: "перед словом тому"
          correct: true
        - text: "після слова що"
          correct: false
        - text: "між словами тому і що"
          correct: false
        - text: "кома не потрібна"
          correct: false
    - question: "З якого сполучника ми можемо починати офіційне речення?"
      explanation: "В офіційному стилі речення часто починається зі слова оскільки."
      options:
        - text: "оскільки"
          correct: true
        - text: "бо"
          correct: false
        - text: "тому що"
          correct: false
        - text: "але"
          correct: false
    - question: "Який відмінок ми використовуємо після прийменника 'через'?"
      explanation: "Прийменник через вимагає знахідного відмінка (кого? що?)."
      options:
        - text: "знахідний (Accusative)"
          correct: true
        - text: "давальний (Dative)"
          correct: false
        - text: "родовий (Genitive)"
          correct: false
        - text: "місцевий (Locative)"
          correct: false
    - question: "Який відмінок ми використовуємо після прийменника 'завдяки'?"
      explanation: "Прийменник завдяки вимагає давального відмінка (кому? чому?)."
      options:
        - text: "давальний (Dative)"
          correct: true
        - text: "знахідний (Accusative)"
          correct: false
        - text: "називний (Nominative)"
          correct: false
        - text: "орудний (Instrumental)"
          correct: false
    - question: "Який сполучник показує протиставлення або контраст?"
      explanation: "Слово але з'єднує дві протилежні ідеї."
      options:
        - text: "але"
          correct: true
        - text: "тому що"
          correct: false
        - text: "через"
          correct: false
        - text: "бо"
          correct: false

- type: match-up
  title: "Знайдіть логічну пару"
  instruction: "З'єднайте початок речення з його правильним завершенням."
  pairs:
    - left: "Я вивчаю українську мову,"
      right: "бо маю друзів в Україні."
    - left: "Оскільки почався сильний дощ,"
      right: "ми залишилися вдома."
    - left: "Ми виграли цей складний матч"
      right: "завдяки нашому тренеру."
    - left: "Сьогоднішній концерт скасували"
      right: "через погану погоду."
    - left: "Хоча на вулиці було холодно,"
      right: "ми все одно пішли гуляти."
    - left: "Я дуже хочу купити цей телефон,"
      right: "але він занадто дорогий."
    - left: "Вона запізнилася на важливу роботу"
      right: "через великі затори на дорогах."
    - left: "Він дуже швидко одужав"
      right: "завдяки своєчасній допомозі лікаря."

- type: fill-in
  title: "Оберіть правильне слово"
  instruction: "Заповніть пропуски відповідними сполучниками або прийменниками."
  items:
    - sentence: "Я не пішов на роботу, бо дуже захворів."
      answer: "бо"
      options: ["бо", "через", "завдяки", "але"]
    - sentence: "Цей проект був успішним завдяки нашій команді."
      answer: "завдяки"
      options: ["завдяки", "через", "хоча", "бо"]
    - sentence: "Ми запізнилися на літак через затори на дорозі."
      answer: "через"
      options: ["через", "завдяки", "оскільки", "тому що"]
    - sentence: "Оскільки директор у відрядженні, зустріч переноситься."
      answer: "Оскільки"
      options: ["Оскільки", "Тому що", "Бо", "Завдяки"]
    - sentence: "Мені подобається ця куртка, але немає мого розміру."
      answer: "але"
      options: ["але", "хоча", "бо", "через"]
    - sentence: "Хоча квитки були дуже дорогі, ми пішли на концерт."
      answer: "Хоча"
      options: ["Хоча", "Але", "Бо", "Оскільки"]
    - sentence: "Ми вивчаємо граматику, тому що хочемо говорити правильно."
      answer: "тому що"
      options: ["тому що", "завдяки", "через", "оскільки"]
    - sentence: "Вона не змогла прийти на вечірку через сімейні обставини."
      answer: "через"
      options: ["через", "завдяки", "бо", "хоча"]

- type: unjumble
  title: "Побудуйте речення"
  instruction: "Складіть слова в правильному порядку, щоб утворити логічне речення. Пам'ятайте про коми!"
  items:
    - words: ["Я", "п'ю", "каву,", "бо", "хочу", "спати"]
      answer: "Я п'ю каву, бо хочу спати"
    - words: ["Ми", "сидимо", "вдома,", "тому", "що", "йде", "дощ"]
      answer: "Ми сидимо вдома, тому що йде дощ"
    - words: ["Оскільки", "вже", "пізно,", "ми", "йдемо", "спати"]
      answer: "Оскільки вже пізно, ми йдемо спати"
    - words: ["Хоча", "було", "важко,", "вони", "завершили", "проект"]
      answer: "Хоча було важко, вони завершили проект"
    - words: ["Він", "швидко", "одужав", "завдяки", "допомозі", "лікаря"]
      answer: "Він швидко одужав завдяки допомозі лікаря"
    - words: ["Ми", "запізнилися", "на", "зустріч", "через", "затори"]
      answer: "Ми запізнилися на зустріч через затори"

- type: true-false
  title: "Правда чи брехня?"
  instruction: "Прочитайте твердження про правила граматики і визначте, чи вони правдиві."
  items:
    - statement: "Сполучник 'бо' найкраще використовувати в офіційних документах."
      correct: false
      explanation: "Слово бо використовується переважно в розмовній мові."
    - statement: "Сполучник 'оскільки' часто ставиться на самому початку речення."
      correct: true
      explanation: "Це поширена структура для ділового та формального стилів."
    - statement: "Перед словами 'але', 'бо', 'тому що' завжди ставиться кома."
      correct: true
      explanation: "Кома перед цими сполучниками є обов'язковою правилом пунктуації."
    - statement: "В українській мові цілком нормально починати розповідь зі слів 'Тому що'."
      correct: false
      explanation: "Головна думка (наслідок) завжди має йти першою, а вже потім пояснення причини."
    - statement: "Прийменник 'завдяки' використовується для пояснення негативних подій."
      correct: false
      explanation: "Слово завдяки має виключно позитивне значення (успіх, допомога)."
    - statement: "Після прийменника 'через' ми завжди використовуємо знахідний відмінок."
      correct: true
      explanation: "Наприклад: через дощ (Accusative), через помилку (Accusative)."
    - statement: "Прийменник 'завдяки' вимагає після себе давального відмінка."
      correct: true
      explanation: "Наприклад: завдяки лікарю (Dative), завдяки команді (Dative)."
    - statement: "Слово 'хоча' використовується для того, щоб показати прямий наслідок події."
      correct: false
      explanation: "Слово хоча показує допустовість (concession), дію всупереч обставинам."

- type: cloze
  title: "Складний день"
  instruction: "Прочитайте історію та заповніть пропуски правильними логічними словами."
  passage: "Сьогодні був дуже складний день. Вранці я запізнився на роботу {{1}} великі затори на дорогах. {{2}} я прийшов пізніше, мій керівник був дуже незадоволений. Я вибачився і пояснив, що це сталося {{3}} аварію на мосту. Потім ми мали важливу презентацію. Вона пройшла дуже успішно {{4}} нашій командній роботі. {{5}} проект був складним, ми встигли зробити все вчасно. Ми працювали допізна, {{6}} хотіли показати найкращий результат. Наш директор подякував нам і сказав: '{{7}} ви так добре попрацювали, завтра маєте вихідний'. Ми дуже зраділи, {{8}} всі були дуже втомлені. Я хотів піти в кіно ввечері, {{9}} сил вже не було. Тому я пішов додому, ліг у ліжко і швидко заснув, {{10}} день був справді довгим."
  blanks:
    - id: 1
      answer: "через"
      options: ["через", "завдяки", "бо", "але"]
    - id: 2
      answer: "Оскільки"
      options: ["Оскільки", "Тому що", "Завдяки", "Але"]
    - id: 3
      answer: "через"
      options: ["через", "завдяки", "хоча", "оскільки"]
    - id: 4
      answer: "завдяки"
      options: ["завдяки", "через", "тому що", "бо"]
    - id: 5
      answer: "Хоча"
      options: ["Хоча", "Але", "Бо", "Завдяки"]
    - id: 6
      answer: "тому що"
      options: ["тому що", "через", "завдяки", "оскільки"]
    - id: 7
      answer: "Оскільки"
      options: ["Оскільки", "Хоча", "Але", "Завдяки"]
    - id: 8
      answer: "бо"
      options: ["бо", "через", "завдяки", "хоча"]
    - id: 9
      answer: "але"
      options: ["але", "бо", "тому що", "оскільки"]
    - id: 10
      answer: "бо"
      options: ["бо", "але", "хоча", "завдяки"]

- type: error-correction
  title: "Виправте помилки логіки"
  instruction: "Знайдіть і виправте логічні помилки у вживанні сполучників та прийменників."
  items:
    - sentence: "Я успішно склав іспит через допомогу мого вчителя."
      error: "через"
      answer: "завдяки"
      error_type: "word"
      options: ["завдяки", "тому що", "бо", "оскільки"]
      explanation: "Для позитивних подій та досягнень ми використовуємо завдяки."
    - sentence: "Ми втратили майже весь врожай завдяки сильному шторму."
      error: "завдяки"
      answer: "через"
      error_type: "word"
      options: ["через", "тому що", "але", "хоча"]
      explanation: "Слово завдяки для негативних подій звучить як жорсткий сарказм. Правильно: через."
    - sentence: "Він не прийшов на важливу зустріч завдяки хворобі."
      error: "завдяки"
      answer: "через"
      error_type: "word"
      options: ["через", "бо", "тому що", "оскільки"]
      explanation: "Хвороба — це негативна обставина, тому використовуємо через."
    - sentence: "Завдяки поганій погоді ми залишилися сидіти вдома."
      error: "Завдяки"
      answer: "Через"
      error_type: "word"
      options: ["Через", "Тому що", "Бо", "Хоча"]
      explanation: "Погана погода — це перешкода, використовуємо через."
    - sentence: "Ми виграли цей надзвичайно складний матч через нашого тренера."
      error: "через"
      answer: "завдяки"
      error_type: "word"
      options: ["завдяки", "оскільки", "але", "тому що"]
      explanation: "Перемога в матчі — це успіх, тому використовуємо завдяки."
    - sentence: "Команда вчасно завершила проект через підтримку директора."
      error: "через"
      answer: "завдяки"
      error_type: "word"
      options: ["завдяки", "хоча", "але", "бо"]
      explanation: "Підтримка керівництва — це позитивний фактор, використовуємо завдяки."

- type: mark-the-words
  title: "Знайдіть логічні зв'язки"
  instruction: "Знайдіть і позначте всі сполучники та прийменники причини, допустовості та протиставлення в тексті."
  text: "Я люблю літо, бо дні довгі і теплі. Хоча іноді буває дуже спекотно, я все одно радію сонцю. Минулого року ми не поїхали на море через карантин, але цього року ми плануємо подорож. Ми купили квитки заздалегідь, бо так набагато дешевше. Завдяки нашим друзям ми знайшли чудовий готель. Оскільки відпустка вже скоро, ми починаємо збирати речі."
  answers: ["бо", "Хоча", "через", "але", "Завдяки", "Оскільки"]

