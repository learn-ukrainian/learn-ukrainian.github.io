version: '1.0'
module: because-and-although
level: a2
inline:
- id: match-up-match-two-halves-of-sentences-with-with
  type: match-up
  instruction: З'єднайте дві частини складного речення
  pairs:
  - left: Я не пішов гуляти,
    right: бо надворі був сильний дощ.
  - left: Хоча надворі був дощ,
    right: ми пішли гуляти.
  - left: Вона вивчає українську мову,
    right: тому що хоче краще розуміти друзів.
  - left: Хоч квитки були дуже дорогі,
    right: ми все одно поїхали на концерт.
  - left: Ми залишилися вдома,
    right: тому що погода була дуже погана.
  - left: Хоча він страшенно втомився,
    right: він продовжив працювати.
  - left: Я одягнув теплу куртку,
    right: бо на вулиці сильний вітер.
  - left: Хоча я вчу українську недовго,
    right: я вже розумію дуже багато.
- id: group-sort-sort-conjunctions-into-vs-vs
  type: group-sort
  instruction: Розподіліть слова та фрази за логічними категоріями
  groups:
  - label: Причина (тому що, бо)
    items:
    - тому що
    - бо
    - відповідає на питання Чому?
  - label: Допуст (хоча)
    items:
    - хоча
    - хоч
    - незважаючи на
  - label: Протиставлення (але, проте...)
    items:
    - але
    - проте
    - однак
    - зате
    - навпаки
- id: quiz-choose-the-correct-conjunction-to-complete-sentences
  type: quiz
  instruction: Оберіть правильний сполучник для речення
  items:
  - question: Я не купив хліб, _____ магазин був зачинений.
    options:
    - тому що
    - хоча
    - але
    - тому
    correct: 0
  - question: _____ магазин був зачинений, я знайшов хліб в іншому місці.
    options:
    - Тому що
    - Хоча
    - Бо
    - Тому
    correct: 1
  - question: Магазин був зачинений, _____ я не купив хліб.
    options:
    - тому
    - бо
    - хоча
    - але
    correct: 0
  - question: Я хотів купити хліб, _____ магазин був зачинений.
    options:
    - тому що
    - бо
    - але
    - тому
    correct: 2
  - question: _____ я був дуже втомлений, я пішов на лекцію.
    options:
    - Хоча
    - Бо
    - Тому
    - Проте
    correct: 0
  - question: Я пішов на лекцію, _____ завтра важлива контрольна.
    options:
    - хоча
    - бо
    - проте
    - тому
    correct: 1
  - question: Він дуже розумний, _____ іноді робить помилки.
    options:
    - тому що
    - бо
    - проте
    - тому
    correct: 2
  - question: _____ надворі холодно, ми не одягнули куртки.
    options:
    - Бо
    - Хоч
    - Тому
    - Однак
    correct: 1
- id: fill-in-complete-compound-sentences-by-adding-the-missing-clause-after-the-conjunction
  type: fill-in
  instruction: Оберіть логічне продовження для кожного речення
  items:
  - sentence: Я залишився вдома, тому що ____.
    answer: погода була погана
    options:
    - погода була погана
    - я пішов гуляти
    - хоча йшов дощ
  - sentence: Хоча погода була погана, ____.
    answer: ми пішли гуляти
    options:
    - ми пішли гуляти
    - ми залишилися вдома
    - тому що йшов дощ
  - sentence: Вона дуже радіє, бо ____.
    answer: склала важливий іспит
    options:
    - склала важливий іспит
    - вона втомилася
    - але в неї є час
  - sentence: Він хотів піти в кіно, але ____.
    answer: не мав часу
    options:
    - не мав часу
    - тому що він зайнятий
    - хоча квитки дешеві
  - sentence: Ми приїхали пізно, тому що ____.
    answer: на дорозі був великий затор
    options:
    - на дорозі був великий затор
    - ми вийшли дуже рано
    - проте ми встигли
  - sentence: Хоча він страшенно втомився, ____.
    answer: він продовжив працювати
    options:
    - він продовжив працювати
    - бо він багато працював
    - тому він відпочивав
  - sentence: Я не п'ю каву, бо ____.
    answer: вона мені не подобається
    options:
    - вона мені не подобається
    - хоча вона смачна
    - але я люблю чай
  - sentence: Сонце яскраво світить, однак ____.
    answer: вітер дуже холодний
    options:
    - вітер дуже холодний
    - тому що літо
    - бо надворі тепло
workbook:
- id: workbook-error-correction-conjunctions
  type: error-correction
  instruction: Знайдіть і виправте граматичну або логічну помилку в реченні
  items:
  - sentence: Вона вчить українську мову але хоче розуміти друзів.
    error: але
    correction: бо
    error_type: word
    options:
    - бо
    - хоча
    - проте
    explanation: Друга частина пояснює причину, тому потрібен сполучник «бо» або «тому
      що».
  - sentence: Хоча він втомився, але він продовжив працювати.
    error: але він
    correction: він
    error_type: construction
    options:
    - він
    - тому він
    - бо він
    explanation: Не використовуйте подвійну конструкцію «хоча... але». Потрібен лише
      один сполучник.
  - sentence: Він купив цю машину, вона була дуже стара хоча.
    error: стара хоча
    correction: хоча вона була дуже стара
    error_type: construction
    options:
    - хоча вона була дуже стара
    - вона хоча стара
    - хоча стара вона
    explanation: В українській мові сполучник «хоча» завжди стоїть на початку залежної
      частини речення.
  - sentence: Погода була погана, бо ми залишилися вдома.
    error: бо
    correction: тому
    error_type: word
    options:
    - тому
    - хоча
    - проте
    explanation: Друга частина — це наслідок (результат), тому використовуємо слово
      «тому».
  - sentence: Сонце світить, бо вітер дуже холодний.
    error: бо
    correction: але
    error_type: word
    options:
    - але
    - тому що
    - отже
    explanation: Тут є контраст між сонцем і холодним вітром, тому потрібен сполучник
      «але» або «та».
  - sentence: Я не піду на лекцію, хоча я дуже хворію.
    error: хоча
    correction: тому що
    error_type: word
    options:
    - тому що
    - проте
    - однак
    explanation: Хвороба — це причина, чому людина не йде на лекцію.
  - sentence: Він довго шукав свої ключі, зате так і не знайшов їх.
    error: зате
    correction: однак
    error_type: word
    options:
    - однак
    - тому що
    - бо
    explanation: '«Зате» має позитивний відтінок (компенсацію). Тут потрібен нейтральний
      контраст: «однак» або «але».'
  - sentence: Я одягнув теплу куртку, хоча надворі сильний вітер.
    error: хоча
    correction: бо
    error_type: word
    options:
    - бо
    - проте
    - зате
    explanation: Сильний вітер — це логічна причина одягнути теплу куртку.
- id: workbook-translate-conjunctions
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I didn't come because I was busy.
    options:
    - text: Я не прийшов, тому що був дуже зайнятий.
      correct: true
    - text: Я не прийшов, хоча був дуже зайнятий.
      correct: false
    - text: Я не прийшов, але був дуже зайнятий.
      correct: false
  - source: Although it's cold outside, we went for a walk.
    options:
    - text: Хоча надворі холодно, ми пішли гуляти.
      correct: true
    - text: Надворі холодно, хоча ми пішли гуляти.
      correct: false
    - text: Надворі холодно, бо ми пішли гуляти.
      correct: false
  - source: The weather was bad, therefore we stayed home.
    options:
    - text: Погода була погана, тому ми залишилися вдома.
      correct: true
    - text: Погода була погана, бо ми залишилися вдома.
      correct: false
    - text: Погода була погана, хоча ми залишилися вдома.
      correct: false
  - source: He was tired, but he continued to work.
    options:
    - text: Він втомився, але продовжив працювати.
      correct: true
    - text: Хоча він втомився, він продовжив працювати.
      correct: false
    - text: Він втомився, тому що продовжив працювати.
      correct: false
  - source: I put on a warm jacket, because there is a strong wind outside.
    options:
    - text: Я одягнув теплу куртку, бо надворі сильний вітер.
      correct: true
    - text: Я одягнув теплу куртку, хоча надворі сильний вітер.
      correct: false
    - text: Я одягнув теплу куртку, проте надворі сильний вітер.
      correct: false
  - source: Even though the tickets were expensive, we went to the concert.
    options:
    - text: Хоч квитки були дорогі, ми поїхали на концерт.
      correct: true
    - text: Квитки були дорогі, тому ми поїхали на концерт.
      correct: false
    - text: Ми поїхали на концерт, але квитки були дорогі.
      correct: false
  - source: She is studying Ukrainian, because she wants to understand her friends.
    options:
    - text: Вона вивчає українську, тому що хоче розуміти друзів.
      correct: true
    - text: Вона вивчає українську, тому хоче розуміти друзів.
      correct: false
    - text: Вона вивчає українську, хоча хоче розуміти друзів.
      correct: false
  - source: He looked for the keys for a long time, however he didn't find them.
    options:
    - text: Він довго шукав ключі, однак не знайшов їх.
      correct: true
    - text: Він довго шукав ключі, тому що не знайшов їх.
      correct: false
    - text: Він довго шукав ключі, хоча не знайшов їх.
      correct: false
