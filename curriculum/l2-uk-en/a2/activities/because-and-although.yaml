- id: workbook-match-up-synonyms-and-concepts
  type: match-up
  instruction: З'єднайте слова з їхніми синонімами або значенням
  pairs:
  - left: бо
    right: тому що (причина)
  - left: проте
    right: однак (сильний контраст)
  - left: хоча
    right: незважаючи на (допуст)
  - left: і
    right: та (у значенні єднання)
  - left: причина
    right: пояснення, чому це сталося
  - left: наслідок
    right: результат дії (вводиться словом «тому»)
  - left: допуст
    right: дія, яка відбувається всупереч обставинам
  - left: складне речення
    right: речення, яке має дві або більше частин
- id: workbook-odd-one-out-conjunctions
  type: odd-one-out
  instruction: Яке слово зайве в логічному ряду?
  items:
  - words:
    - але
    - проте
    - однак
    - бо
    correct: 3
    explanation: «Бо» означає причину, інші слова — протиставлення (контраст).
  - words:
    - хоча
    - хоч
    - незважаючи на
    - тому
    correct: 3
    explanation: «Тому» означає наслідок, інші слова — допуст.
  - words:
    - причина
    - допуст
    - сполучник
    - але
    correct: 3
    explanation: «Але» — це сам сполучник, інші слова — це граматичні терміни (іменники).
  - words:
    - зате
    - навпаки
    - однак
    - хоча
    correct: 3
    explanation: «Хоча» означає допуст, інші слова виражають сильний контраст.
  - words:
    - і
    - та
    - але
    - бо
    correct: 3
    explanation: «Бо» вводить залежну частину (причину), інші — це сполучники, які
      з'єднують дві рівні частини.
  - words:
    - тому що
    - бо
    - тому
    - проте
    correct: 3
    explanation: «Проте» виражає контраст, інші слова створюють логічний ланцюжок
      причини і наслідку.
  - words:
    - хоча
    - хоч
    - незважаючи на
    - проте
    correct: 3
    explanation: «Проте» — це протиставлення (but), інші слова — це допуст (although).
  - words:
    - причина
    - наслідок
    - допуст
    - навпаки
    correct: 3
    explanation: «Навпаки» — це слово, яке виражає прямий контраст. Інші слова — це
      абстрактні назви категорій.
- id: workbook-group-sort-sentences-by-meaning
  type: group-sort
  instruction: 'Визначте, що виражає це речення: причину, наслідок чи допуст?'
  groups:
  - label: Причина (Cause)
    items:
    - Я не прийшов на зустріч, тому що був зайнятий.
    - Вона вчить українську, бо хоче краще розуміти друзів.
    - Я одягнув теплу куртку, бо надворі сильний вітер.
  - label: Наслідок (Result)
    items:
    - Погода була дуже погана, тому ми залишилися вдома.
    - Надворі був сильний вітер, тому я одягнув куртку.
    - Я був дуже зайнятий на роботі, тому не прийшов.
  - label: Допуст (Concession)
    items:
    - Хоча я дуже втомився, я все одно піду на пару.
    - Ми пішли гуляти в парк, хоча йшов сильний дощ.
    - Хоч квитки були дуже дорогі, ми поїхали на концерт.
