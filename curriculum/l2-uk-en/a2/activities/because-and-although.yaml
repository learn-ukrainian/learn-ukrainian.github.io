- id: workbook-true-false-grammar-rules
  type: true-false
  instruction: Чи правильне це твердження про українську граматику?
  items:
  - statement: Кома ставиться всередині фрази «тому що» (тому, що).
    correct: false
    explanation: Кома завжди ставиться ПЕРЕД усією фразою «тому що».
  - statement: Слово «бо» — це неправильна мова або діалект.
    correct: false
    explanation: Слово «бо» — це питоме (справжнє) українське слово з давньою історією,
      яке часто використовують письменники.
  - statement: Слово «тому» вводить наслідок або результат дії, а не її причину.
    correct: true
    explanation: Слово «тому» означає therefore / as a result.
  - statement: Частина речення зі сполучником «хоча» може стояти як на початку, так
      і в другій половині складного речення.
    correct: true
    explanation: Складне речення з «хоча» має дуже гнучку структуру. Ви можете вільно
      змінювати порядок.
  - statement: 'Правильно говорити так: «Хоча він втомився, але він працював».'
    correct: false
    explanation: Це помилкова подвійна конструкція. Використовуйте лише один сполучник
      у такому реченні.
  - statement: Слово «хоча» (though) можна ставити в самому кінці речення, як в англійській
      мові.
    correct: false
    explanation: В українській мові «хоча» завжди відкриває нову думку і стоїть строго
      на початку залежної частини.
  - statement: Слова «проте» та «однак» використовуються для вираження контрасту і
      є синонімами до слова «але».
    correct: true
    explanation: Вони працюють так само, як «але», проте часто звучать більш літературно.
  - statement: Слово «бо» і фраза «тому що» мають однакове значення (because).
    correct: true
    explanation: Обидва сполучники означають причину. Різниця лише в тому, що «бо»
      звучить більш розмовно.
