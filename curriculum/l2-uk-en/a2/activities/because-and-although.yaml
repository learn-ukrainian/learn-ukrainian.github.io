      right: "завдяки своєму вчителю."
    - left: "Хоча на вулиці було холодно,"
      right: "ми пішли гуляти в парк."
    - left: "Я хочу купити цей телефон,"
      right: "але він дуже дорогий."
    - left: "Давай візьмемо таксі,"
      right: "бо ми запізнюємося."
    - left: "Я вивчаю українську мову,"
      right: "тому що маю родичів в Україні."

- type: group-sort
