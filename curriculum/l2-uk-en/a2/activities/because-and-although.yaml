        - text: "Через директор захворів, ми скасували зустріч."
          correct: false

- type: group-sort
  title: "Позитив чи негатив?"
  instruction: "Розподіліть фрази на дві групи: ті, що вказують на позитивну причину (допомогу), і ті, що вказують на негативну обставину."
  groups:
    - name: "Позитивна причина (завдяки)"
      items:
        - "допомозі лікаря"
        - "нашій команді"
        - "вашій підтримці"
        - "наполегливому тренуванню"
    - name: "Негативна або нейтральна обставина (через)"
      items:
        - "великі затори"
        - "сильний дощ"
        - "мою помилку"
        - "технічні проблеми"

- type: quiz
  title: "Глибоке розуміння теми"
  instruction: "Перевірте, як добре ви засвоїли культурні та стилістичні нюанси."
  items:
    - question: "Чому українці не люблять починати речення словами 'Тому що'?"
      explanation: "В українській мові логічний наслідок (головна думка) має йти перед поясненням."
      options:
        - text: "Бо головна думка (наслідок) має йти першою."
          correct: true
        - text: "Бо це звучить занадто офіційно."
          correct: false
        - text: "Бо це слово використовується тільки в кінці речення."
          correct: false
        - text: "Бо це вважається русизмом."
          correct: false
    - question: "Яке з цих слів вимагає після себе давального відмінка?"
      explanation: "Слово завдяки завжди керує давальним відмінком."
      options:
        - text: "завдяки"
          correct: true
        - text: "через"
          correct: false
        - text: "тому що"
          correct: false
        - text: "оскільки"
          correct: false
    - question: "Яке з цих слів означає 'despite the fact that'?"
      explanation: "Хоча вказує на допустовість, дію всупереч."
      options:
        - text: "хоча"
          correct: true
        - text: "але"
          correct: false
        - text: "бо"
          correct: false
        - text: "тому що"
          correct: false
    - question: "Яке речення є стилістичною помилкою (або звучить як жорсткий сарказм)?"
      explanation: "Використання слова завдяки для болючої події — це груба помилка."
      options:
        - text: "Я зламав ногу завдяки льоду."
          correct: true
        - text: "Я запізнився через затори."
          correct: false
        - text: "Ми виграли матч завдяки тренеру."
          correct: false
        - text: "Я залишився вдома через дощ."
          correct: false
    - question: "Як правильно написати речення з пунктуаційної точки зору?"
      explanation: "Кома ставиться тільки перед словом тому."
      options:
        - text: "Я вдома, тому що хворий."
          correct: true
        - text: "Я вдома тому що хворий."
          correct: false
        - text: "Я вдома, тому, що хворий."
          correct: false
        - text: "Тому що хворий я вдома."
          correct: false
    - question: "Яке слово найкраще підходить для ділового листа керівнику?"
      explanation: "Оскільки — це маркер високого офіційного стилю."
      options:
        - text: "оскільки"
          correct: true
        - text: "бо"
          correct: false
        - text: "тому що"
          correct: false
        - text: "через те що"
          correct: false
    - question: "Який відмінок ми використовуємо зі словом 'через'?"
      explanation: "Через завжди вимагає знахідного відмінка."
      options:
        - text: "знахідний (Accusative)"
          correct: true
        - text: "давальний (Dative)"
          correct: false
        - text: "родовий (Genitive)"
          correct: false
        - text: "місцевий (Locative)"
          correct: false
    - question: "Що з переліченого є прийменником (preposition), а не сполучником (conjunction)?"
      explanation: "Завдяки — це прийменник, після якого йде іменник або займенник."
      options:
        - text: "завдяки"
          correct: true
        - text: "хоча"
          correct: false
        - text: "але"
          correct: false
        - text: "оскільки"
          correct: false