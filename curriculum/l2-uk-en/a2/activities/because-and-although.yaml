version: '1.0'
module: because-and-although
level: a2
inline:
- id: quiz-cause-choice
  type: quiz
  instruction: Оберіть правильний сполучник для речення
  items:
  - question: Я залишаюся вдома, _____ надворі сильний дощ.
    options:
    - тому що
    - хоча
    - але
    - однак
    correct: 0
  - question: Він багато працює, _____ хоче купити новий комп'ютер.
    options:
    - бо
    - хоча
    - але
    - проте
    correct: 0
  - question: _____ я дуже втомився, я все одно піду на лекцію.
    options:
    - Хоча
    - Тому що
    - Бо
    - Але
    correct: 0
  - question: Вона успішно склала тест, _____ добре підготувалася.
    options:
    - тому що
    - хоча
    - але
    - зате
    correct: 0
  - question: Я поспішаю, _____ запізнююся на роботу.
    options:
    - бо
    - хоча
    - але
    - однак
    correct: 0
  - question: _____ було холодно, діти гралися в парку.
    options:
    - Хоча
    - Бо
    - Тому що
    - Проте
    correct: 0
  - question: Сергій хотів піти в кіно, _____ він не мав вільного часу.
    options:
    - але
    - бо
    - тому що
    - хоча
    correct: 0
  - question: Ми не пішли гуляти, _____ почалася гроза.
    options:
    - тому що
    - хоча
    - проте
    - однак
    correct: 0
- id: fill-in-cause-clauses
  type: fill-in
  instruction: Доповніть речення правильною частиною
  items:
  - sentence: Ми залишилися вдома, тому що _____.
    answer: пішов сильний дощ
    options:
    - пішов сильний дощ
    - була гарна погода
    - ми хотіли гуляти
  - sentence: Олена запізнилася на пару, бо _____.
    answer: не почула будильник
    options:
    - не почула будильник
    - прийшла дуже рано
    - читала книгу
  - sentence: Я п'ю гарячий чай, тому що _____.
    answer: у мене болить горло
    options:
    - у мене болить горло
    - я не люблю чай
    - зараз спекотне літо
  - sentence: Студенти уважно слухають, бо _____.
    answer: це дуже важлива тема
    options:
    - це дуже важлива тема
    - вони хочуть спати
    - лекція вже закінчилася
  - sentence: Він купив новий телефон, тому що _____.
    answer: старий телефон зламався
    options:
    - старий телефон зламався
    - він не любить техніку
    - у нього немає грошей
  - sentence: Діти дуже щасливі, бо _____.
    answer: завтра починаються канікули
    options:
    - завтра починаються канікули
    - вони йдуть до школи
    - на вулиці погана погода
  - sentence: Я не можу вам допомогти, тому що _____.
    answer: я зараз дуже зайнятий
    options:
    - я зараз дуже зайнятий
    - я маю багато вільного часу
    - я знаю цю тему
  - sentence: Ми купили квитки на поїзд, бо _____.
    answer: хочемо поїхати в Карпати
    options:
    - хочемо поїхати в Карпати
    - ми вже повернулися
    - поїзд не приїхав
- id: match-up-cause-concession
  type: match-up
  instruction: З'єднайте частини складних речень
  pairs:
  - left: Я прийшов на роботу,
    right: хоча почуваюся дуже погано.
  - left: Ми не пішли гуляти,
    right: тому що почався сильний дощ.
  - left: Хоча завдання було складним,
    right: студенти успішно його виконали.
  - left: Вона вивчає українську мову,
    right: бо хоче жити в Києві.
  - left: Хоч надворі вже тепло,
    right: я все ще ношу зимову куртку.
  - left: Петро купив новий комп'ютер,
    right: тому що старий зламався.
  - left: Я п'ю міцну каву,
    right: бо дуже хочу спати.
  - left: Хоча ми довго чекали,
    right: автобус так і не приїхав.
- id: group-sort-conjunctions
  type: group-sort
  instruction: Розподіліть сполучники за їхнім значенням
  groups:
  - label: Причина (Чому?)
    items:
    - тому що
    - бо
  - label: Допуст (Незважаючи на що?)
    items:
    - хоча
    - хоч
    - незважаючи на
  - label: Протиставлення (Але)
    items:
    - проте
    - однак
    - зате
    - навпаки
workbook:
- type: error-correction
  instruction: Знайдіть і виправте логічну або граматичну помилку в реченні
  items:
  - sentence: Я вчу українську мову, бо що мені це подобається.
    error: бо що
    correction: бо
    error_type: word
    options:
    - бо
    - тому
    - хоча
    explanation: Слово «бо» не потребує додавання «що». Форма «бо що» є калькою.
  - sentence: Бо надворі дощ, ми сьогодні сидимо вдома.
    error: Бо
    correction: Тому що
    error_type: word
    options:
    - Тому що
    - Але
    - Хоча
    explanation: Ми не можемо починати нове речення зі слова «бо». Краще використовувати
      «Тому що».
  - sentence: Студенти уважно слухають, бо що викладач розповідає цікаву історію.
    error: бо що
    correction: бо
    error_type: word
    options:
    - бо
    - тому
    - проте
    explanation: Ніколи не додавайте маленьке «що» до сполучника «бо».
  - sentence: Вона дуже втомлена, тому багато працювала.
    error: тому
    correction: тому що
    error_type: phrase
    options:
    - тому що
    - бо що
    - але
    explanation: 'Сполучник причини складається з двох слів: «тому що». Саме слово
      «тому» означає «therefore».'
  - sentence: Чому ти не прийшов? Бо я був дуже зайнятий.
    error: Бо
    correction: Тому що
    error_type: word
    options:
    - Тому що
    - Зате
    - Але
    explanation: У прямій відповіді на запитання «Чому?» речення завжди починається
      з «Тому що».
  - sentence: Ми залишилися вдома, тому що що йшов сильний дощ.
    error: тому що що
    correction: тому що
    error_type: phrase
    options:
    - тому що
    - бо що
    - хоча
    explanation: Тут є зайве слово «що». Правильний і повний сполучник — «тому що».
- type: true-false
  instruction: Оберіть, чи правильне твердження про українські сполучники
  items:
  - statement: Слово «бо» — це дуже популярний сполучник у розмовній українській мові.
    correct: true
    explanation: «Бо» є коротким, швидким і максимально прямим сполучником.
  - statement: Ви можете вільно починати будь-яке нове речення зі слова «бо».
    correct: false
    explanation: Ні, слово «бо» ніколи не починає речення. Воно стоїть тільки після
      головної інформації.
  - statement: Англійське «because» завжди слід перекладати як «бо що».
    correct: false
    explanation: Це поширена калька. Правильно казати просто «бо» або «тому що».
  - statement: Перед словами «тому що», «бо» та «хоча» в українській мові завжди ставиться
      кома.
    correct: true
    explanation: Це обов'язкове граматичне правило нашого синтаксису у складному реченні.
  - statement: Сполучник «хоча» показує справжню причину вашої дії.
    correct: false
    explanation: Ні, «хоча» показує допуст (concession) або контраст, несподіваний
      результат, а не причину.
  - statement: Слова «проте» та «однак» є більш елегантними синонімами до простого
      слова «але».
    correct: true
    explanation: Вони роблять вашу мову значно багатшою та професійнішою.
- type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I am reading a book because it is interesting.
    options:
    - text: Я читаю книгу, бо вона цікава.
      correct: true
    - text: Я читаю книгу, хоча вона цікава.
      correct: false
    - text: Я читаю книгу, бо що вона цікава.
      correct: false
    - text: Я читаю книгу, однак вона цікава.
      correct: false
  - source: Why are you here? Because I want to help.
    options:
    - text: Чому ти тут? Тому що я хочу допомогти.
      correct: true
    - text: Чому ти тут? Бо я хочу допомогти.
      correct: false
    - text: Чому ти тут? Хоча я хочу допомогти.
      correct: false
    - text: Чому ти тут? Зате я хочу допомогти.
      correct: false
  - source: Although I am tired, I will go to the lecture.
    options:
    - text: Хоча я втомився, я піду на лекцію.
      correct: true
    - text: Тому що я втомився, я піду на лекцію.
      correct: false
    - text: Бо я втомився, я піду на лекцію.
      correct: false
    - text: Проте я втомився, я піду на лекцію.
      correct: false
  - source: He wanted to sleep, however he had to work.
    options:
    - text: Він хотів спати, проте мусив працювати.
      correct: true
    - text: Він хотів спати, тому що мусив працювати.
      correct: false
    - text: Він хотів спати, бо мусив працювати.
      correct: false
    - text: Він хотів спати, бо що мусив працювати.
      correct: false
  - source: We stayed home because of the rain.
    options:
    - text: Ми залишилися вдома, тому що йшов дощ.
      correct: true
    - text: Ми залишилися вдома, хоча йшов дощ.
      correct: false
    - text: Ми залишилися вдома, але йшов дощ.
      correct: false
    - text: Ми залишилися вдома, бо що йшов дощ.
      correct: false
  - source: She is learning Ukrainian, although it is difficult.
    options:
    - text: Вона вивчає українську, хоча це складно.
      correct: true
    - text: Вона вивчає українську, бо це складно.
      correct: false
    - text: Вона вивчає українську, тому що це складно.
      correct: false
    - text: Вона вивчає українську, зате це складно.
      correct: false
- type: fill-in
  instruction: Вставте найбільш логічний сполучник
  items:
  - sentence: _____ я почуваюся погано, я все одно прийшов на лекцію.
    answer: Хоча
    options:
    - Хоча
    - Бо
    - Проте
    - Тому що
  - sentence: Ми довго гуляли містом, _____ зовсім не втомилися.
    answer: проте
    options:
    - проте
    - тому що
    - бо
    - навпаки
  - sentence: Сергій не прийшов на важливу зустріч, _____ він захворів.
    answer: бо
    options:
    - бо
    - хоча
    - проте
    - однак
  - sentence: Вона чудово малює, _____ ніколи не вчилася в художній школі.
    answer: хоча
    options:
    - хоча
    - бо
    - тому що
    - навпаки
  - sentence: Я купив цей новий телефон, _____ він дуже зручний.
    answer: тому що
    options:
    - тому що
    - однак
    - хоча
    - проте
  - sentence: Надворі йде сильний сніг, _____ діти радісно граються.
    answer: однак
    options:
    - однак
    - бо
    - тому що
    - тому
