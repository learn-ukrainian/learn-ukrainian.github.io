- type: quiz
  title: "Перевірте знання: Сполучники та прийменники"
  instruction: "Оберіть правильну відповідь на кожне запитання."
  items:
    - question: "Яке слово ми використовуємо для пояснення позитивної причини?"
      explanation: "Слово завдяки використовується тільки для позитивних наслідків."
      options:
        - text: "завдяки"
          correct: true
        - text: "через"
          correct: false
        - text: "тому що"
          correct: false
        - text: "хоча"
          correct: false
    - question: "Яке слово належить до розмовного стилю і означає тому що?"
      explanation: "Слово бо є розмовним варіантом тому що."
      options:
        - text: "бо"
          correct: true
        - text: "але"
          correct: false
        - text: "оскільки"
          correct: false
        - text: "через"
          correct: false
    - question: "Який сполучник найчастіше використовується в офіційних документах?"
      explanation: "Оскільки є формальним сполучником."
      options:
        - text: "оскільки"
          correct: true
        - text: "бо"
          correct: false
        - text: "тому що"
          correct: false
        - text: "завдяки"
          correct: false
    - question: "Що обов'язково треба ставити перед сполучниками тому що, але, бо?"
      explanation: "Перед цими сполучниками завжди ставиться кома."
      options:
        - text: "кому"
          correct: true
        - text: "крапку"
          correct: false
        - text: "знак питання"
          correct: false
        - text: "тире"
          correct: false
    - question: "З якого слова граматично неправильно починати розповідь?"
      explanation: "Починати речення з тому що є помилкою."
      options:
        - text: "тому що"
          correct: true
        - text: "хоча"
          correct: false
        - text: "оскільки"
          correct: false
        - text: "завдяки"
          correct: false
    - question: "Який відмінок ми використовуємо після слова завдяки?"
      explanation: "Завдяки вимагає після себе давального відмінка."
      options:
        - text: "давальний"
          correct: true
        - text: "знахідний"
          correct: false
        - text: "родовий"
          correct: false
        - text: "називний"
          correct: false
    - question: "Який відмінок ми використовуємо після прийменника через?"
      explanation: "Через вимагає після себе знахідного відмінка."
      options:
        - text: "знахідний"
          correct: true
        - text: "давальний"
          correct: false
        - text: "називний"
          correct: false
        - text: "місцевий"
          correct: false
    - question: "Який сполучник показує перешкоду, але дія все одно відбувається?"
      explanation: "Слово хоча показує допустовість (перешкоду)."
      options:
        - text: "хоча"
          correct: true
        - text: "тому що"
          correct: false
        - text: "через"
          correct: false
        - text: "бо"
          correct: false

- type: error-correction
  title: "Виправте помилки: Причини та наслідки"
  instruction: "Виберіть правильне слово замість помилкового."
  items:
    - sentence: "Я склав цей складний іспит через вчителя."
      error: "через"
      answer: "завдяки"
      options: ["завдяки", "бо", "хоча", "але"]
      explanation: "Успіх вимагає прийменника завдяки."
    - sentence: "Ми запізнилися на зустріч завдяки великим заторам."
      error: "завдяки"
      answer: "через"
      options: ["через", "оскільки", "тому", "бо"]
      explanation: "Затори — це проблема, використовуємо через."
    - sentence: "Бо я дуже втомився, я пішов спати раніше."
      error: "Бо"
      answer: "Оскільки"
      options: ["Оскільки", "Тому що", "Завдяки", "Через"]
      explanation: "На початку речення використовуємо офіційне оскільки."
    - sentence: "Команда виграла матч через щоденні тренування."
      error: "через"
      answer: "завдяки"
      options: ["завдяки", "але", "оскільки", "бо"]
      explanation: "Перемога — це досягнення, кажемо завдяки."
    - sentence: "Завдяки сильній хворобі він не прийшов до школи."
      error: "Завдяки"
      answer: "Через"
      options: ["Через", "Хоча", "Бо", "Оскільки"]
      explanation: "Хвороба — це негативна причина, кажемо через."
    - sentence: "Я не п'ю каву, завдяки я хочу спати."
      error: "завдяки"
      answer: "бо"
      options: ["бо", "через", "але", "хоча"]
      explanation: "Тут потрібен сполучник причини бо."

- type: unjumble
  title: "Побудуйте речення"
  instruction: "Розташуйте слова у правильному порядку."
  items:
    - words: ["Ми", "сидимо", "вдома", "бо", "йде", "сильний", "дощ"]
      answer: "Ми сидимо вдома бо йде сильний дощ"
    - words: ["Я", "купив", "телефон", "тому", "що", "він", "зручний"]
      answer: "Я купив телефон тому що він зручний"
    - words: ["Ми", "завершили", "проект", "завдяки", "вашій", "допомозі"]
      answer: "Ми завершили проект завдяки вашій допомозі"
    - words: ["Через", "великі", "затори", "автобус", "запізнився", "на", "годину"]
      answer: "Через великі затори автобус запізнився на годину"
    - words: ["Оскільки", "погода", "погіршилася", "ми", "скасували", "нашу", "зустріч"]
      answer: "Оскільки погода погіршилася ми скасували нашу зустріч"
    - words: ["Я", "розумію", "вашу", "позицію", "але", "не", "погоджуюся"]
      answer: "Я розумію вашу позицію але не погоджуюся"

- type: fill-in
  title: "Доповніть речення"
  instruction: "Виберіть правильне слово для кожного речення."
  items:
    - sentence: "Ми не змогли приїхати вчасно _____ затори на дорозі."
      answer: "через"
      options: ["через", "завдяки", "тому що", "хоча"]
      explanation: "Затори — це перешкода (Accusative)."
    - sentence: "Я добре склав іспит _____ допомозі мого вчителя."
      answer: "завдяки"
      options: ["завдяки", "через", "оскільки", "але"]
      explanation: "Допомога вчителя — це позитивна причина (Dative)."
    - sentence: "Я купив цю куртку, _____ вона дуже тепла і зручна."
      answer: "тому що"
      options: ["тому що", "через", "завдяки", "хоча"]
      explanation: "Після головної думки ми ставимо нейтральне пояснення."
    - sentence: "_____ на вулиці йде дощ, ми підемо на прогулянку."
      answer: "Хоча"
      options: ["Хоча", "Тому що", "Бо", "Завдяки"]
      explanation: "Слово хоча показує протиставлення (допустовість)."
    - sentence: "Він довго чекав на автобус, _____ той так і не приїхав."
      answer: "але"
      options: ["але", "тому що", "оскільки", "через"]
      explanation: "Слово але створює прямий контраст."
    - sentence: "_____ директор сьогодні захворів, ми скасовуємо зустріч."
      answer: "Оскільки"
      options: ["Оскільки", "Бо", "Тому що", "Але"]
      explanation: "На початку речення для причини ми використовуємо офіційне оскільки."
    - sentence: "Давай візьмемо таксі, _____ ми вже запізнюємося на концерт."
      answer: "бо"
      options: ["бо", "оскільки", "через", "завдяки"]
      explanation: "У розмовній мові між друзями ми використовуємо коротке бо."
    - sentence: "Усі ці досягнення стали можливими _____ вашим зусиллям."
      answer: "завдяки"
      options: ["завдяки", "через", "оскільки", "тому що"]
      explanation: "Досягнення — це результат успіху (Dative)."

- type: true-false
  title: "Правильно чи неправильно?"
  instruction: "Визначте, чи є ці твердження про граматику правильними."
  items:
    - statement: "Слово завдяки використовується тільки для позитивних подій."
      correct: true
      explanation: "Так, це слово показує подяку і використовується для успіху."
    - statement: "Ми можемо починати будь-яке речення зі слів тому що."
      correct: false
      explanation: "Ні, починати речення з тому що є помилкою. Головна думка має бути першою."
    - statement: "Сполучник бо найчастіше використовується в офіційних документах."
      correct: false
      explanation: "Ні, бо — це розмовний варіант для щоденного спілкування."
    - statement: "Перед сполучниками але, бо, тому що завжди ставиться кома."
      correct: true
      explanation: "Кома перед цими словами є обов'язковим правилом в українській мові."
    - statement: "Прийменник через вимагає знахідного відмінка (кого? що?)."
      correct: true
      explanation: "Правильно, наприклад: через дощ, через затори."
    - statement: "Слово оскільки є розмовним варіантом і використовується з друзями."
      correct: false
      explanation: "Ні, оскільки — це формальне слово для офіційного спілкування."
    - statement: "Сполучник хоча використовується для вираження допустовості або перешкоди."
      correct: true
      explanation: "Так, він показує, що дія відбувається всупереч обставинам."
    - statement: "Сказати «Я захворів завдяки дощу» — це правильна і логічна українська фраза."
      correct: false
      explanation: "Ні, хвороба — це негативна подія. Треба казати «через дощ»."

- type: match-up
  title: "Знайдіть причину і наслідок"
  instruction: "З'єднайте частини речень за логікою."
  pairs:
    - left: "Ми сидимо вдома,"
      right: "тому що йде сильний дощ."
    - left: "Концерт був скасований"
      right: "через погану погоду."
