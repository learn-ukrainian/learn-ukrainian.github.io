- type: quiz
  title: "Перевірте свої знання про префікси"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Що означає префікс пере- у слові переробити?"
      explanation: "Переробити означає зробити всю роботу знову, з самого початку."
      options:
        - text: "Зробити дію ще раз з початку"
          correct: true
        - text: "Завершити дію до кінця"
          correct: false
        - text: "Зробити дію дуже швидко"
          correct: false
        - text: "Почати нову дію"
          correct: false
    - question: "Яке дієслово ми використовуємо для фізичних дверей?"
      explanation: "Для фізичних об'єктів з петлями ми використовуємо відчинити."
      options:
        - text: "відчинити"
          correct: true
        - text: "відкрити"
          correct: false
        - text: "розкрити"
          correct: false
        - text: "зачинити"
          correct: false
    - question: "Що означає префікс до- у слові дописати?"
      explanation: "Дописати означає успішно завершити писати текст."
      options:
        - text: "Завершити дію до кінця"
          correct: true
        - text: "Написати текст ще раз"
          correct: false
        - text: "Почати писати новий текст"
          correct: false
        - text: "Писати дуже повільно"
          correct: false
    - question: "Який префікс означає, що дія триває недовго?"
      explanation: "Префікс по- означає коротку і приємну дію."
      options:
        - text: "по-"
          correct: true
        - text: "до-"
          correct: false
        - text: "за-"
          correct: false
        - text: "пере-"
          correct: false
    - question: "Як правильно сказати українською про банківський рахунок?"
      explanation: "Рахунок - це абстрактний процес, тому ми його відкриваємо."
      options:
        - text: "відкрити рахунок"
          correct: true
        - text: "відчинити рахунок"
          correct: false
        - text: "переписати рахунок"
          correct: false
        - text: "зачинити рахунок"
          correct: false
    - question: "Що означає слово загратися у цьому контексті?"
      explanation: "Префікс за- тут означає надмірність дії, тобто гратися занадто довго."
      options:
        - text: "Гратися занадто довго"
          correct: true
        - text: "Раптом почати гратися"
          correct: false
        - text: "Трохи погратися і закінчити"
          correct: false
        - text: "Завершити гратися"
          correct: false
    - question: "Як правильно перекласти фразу про повернення грошей?"
      explanation: "Повернути щось назад - це віддати."
      options:
        - text: "віддати гроші"
          correct: true
        - text: "передати гроші"
          correct: false
        - text: "задати гроші"
          correct: false
        - text: "додати гроші"
          correct: false
    - question: "Коли ми використовуємо дієслово зачинити у розмові?"
      explanation: "Зачинити використовується тільки для фізичних бар'єрів на петлях."
      options:
        - text: "Коли є фізичний бар'єр"
          correct: true
        - text: "Коли ми закінчуємо проект"
          correct: false
        - text: "Коли ми хочемо спати"
          correct: false
        - text: "Коли ми читаємо книгу"
          correct: false

- type: error-correction
  title: "Хаос в офісі: виправте помилки"
  instruction: "У кожному реченні є одна лексична помилка, пов'язана з префіксами. Виправте її."
  items:
    - sentence: "Секретар відкрила двері кабінету для нових гостей."
      error: "відкрила"
      answer: "відчинила"
      error_type: "word"
      options: ["відчинила", "зачинила", "переписала", "дописала"]
      explanation: "Двері мають петлі, тому ми їх відчиняємо, а не відкриваємо."
    - sentence: "Ми не можемо переписати звіт, залишився лише один короткий абзац."
      error: "переписати"
      answer: "дописати"
      error_type: "word"
      options: ["дописати", "написати", "прочитати", "переробити"]
      explanation: "Якщо залишається фінальна частина, це означає 'дописати'."
    - sentence: "Швидко закрий вікно, на вулиці починається сильний дощ!"
      error: "закрий"
      answer: "зачини"
      error_type: "word"
      options: ["зачини", "відчини", "відкрий", "передай"]
      explanation: "Вікно - це фізичний об'єкт, тому його треба зачинити."
    - sentence: "Директор відчинив новий бізнес у самому центрі нашого міста."
      error: "відчинив"
      answer: "відкрив"
      error_type: "word"
      options: ["відкрив", "дописав", "віддав", "зачинив"]
      explanation: "Бізнес - це абстрактний процес, тому ми його відкриваємо."
    - sentence: "Я хочу з'їсти цей суп повністю, до останньої ложки."
      error: "з'їсти"
      answer: "доїсти"
      error_type: "word"
      options: ["доїсти", "переїсти", "заїсти", "поїсти"]
      explanation: "З'їсти до кінця означає 'доїсти'."
    - sentence: "Вона відкрила велику шафу і швидко взяла своє тепле пальто."
      error: "відкрила"
      answer: "відчинила"
      error_type: "word"
      options: ["відчинила", "зачинила", "закрила", "переробила"]
      explanation: "Шафа - це фізичний предмет з дверцятами, тому ми її відчиняємо."

- type: fill-in
  title: "Заповніть пропуски в реченнях"
  instruction: "Оберіть правильне дієслово з префіксом для кожного речення."
  items:
    - sentence: "Мені треба негайно дописати цього довгого листа своєму найкращому другу сьогодні ввечері."
      answer: "дописати"
      options: ["переписати", "дописати", "написати", "записати"]
      explanation: "Завершити писати - це дописати."
    - sentence: "Будь ласка, відчиніть це велике вікно, тут зараз дуже душно і жарко."
      answer: "відчиніть"
      options: ["відкрийте", "відчиніть", "зачиніть", "закрийте"]
      explanation: "Вікно - фізичний бар'єр."
    - sentence: "Ми дуже хочемо відкрити новий сучасний магазин наступного теплого місяця."
      answer: "відкрити"
      options: ["відкрити", "відчинити", "закрити", "дописати"]
      explanation: "Новий магазин - абстрактний проект (бізнес)."
    - sentence: "Вона вирішила повністю переписати весь складний текст з самого початку."
      answer: "переписати"
      options: ["дописати", "переписати", "відписати", "записати"]
      explanation: "Зробити текст знову - це переписати."
    - sentence: "Ніколи не забудь надійно зачинити вхідні двері, коли будеш виходити з дому."
      answer: "зачинити"
      options: ["закрити", "зачинити", "відчинити", "відкрити"]
      explanation: "Двері - фізичний об'єкт."
    - sentence: "Наш центральний банк вирішив назавжди закрити цей старий неактивний рахунок."
      answer: "закрити"
      options: ["зачинити", "закрити", "відкрити", "переписати"]
      explanation: "Рахунок - це абстрактне поняття."
    - sentence: "Я дуже сильно втомився і хочу просто тихо посидіти на зручному дивані."
      answer: "посидіти"
      options: ["засидіти", "пересидіти", "досидіти", "посидіти"]
      explanation: "Посидіти - зробити коротку приємну дію."
    - sentence: "Маленька перелякана дитина раптом голосно заплакала від великого страху."
      answer: "заплакала"
      options: ["поплакала", "переплакала", "заплакала", "доплакала"]
      explanation: "Заплакала - раптовий початок емоції."

- type: match-up
  title: "Знайдіть логічну пару"
  instruction: "З'єднайте кожне дієслово з його правильним контекстом або значенням."
  pairs:
    - left: "відчинити вікно"
      right: "фізичний механізм з петлями"
    - left: "відкрити рахунок"
      right: "новий абстрактний процес"
    - left: "переписати звіт"
      right: "зробити роботу повністю з нуля"
    - left: "дописати статтю"
      right: "фінальний етап складної роботи"
    - left: "посидіти в кафе"
      right: "дуже коротка і приємна дія"
    - left: "закрити проект"
      right: "кінець абстрактної командної діяльності"
    - left: "засміятися голосно"
      right: "раптова сильна людська емоція"
    - left: "доїсти суп"
      right: "з'їсти страву повністю до останньої крихти"

- type: unjumble
  title: "Складіть речення (Частина 1)"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити правильне українське речення."
  items:
    - words: ["Будь", "ласка", "відчиніть", "ці", "великі", "двері"]
      answer: "Будь ласка відчиніть ці великі двері"
    - words: ["Ми", "хочемо", "відкрити", "новий", "банківський", "рахунок"]
      answer: "Ми хочемо відкрити новий банківський рахунок"
    - words: ["Я", "повинен", "нарешті", "дописати", "цей", "складний", "текст"]
      answer: "Я повинен нарешті дописати цей складний текст"
    - words: ["Вона", "вирішила", "переписати", "всю", "свою", "роботу"]
      answer: "Вона вирішила переписати всю свою роботу"
    - words: ["Ніколи", "не", "забудь", "зачинити", "вікно", "у", "кімнаті"]
      answer: "Ніколи не забудь зачинити вікно у кімнаті"
    - words: ["Вони", "повинні", "завтра", "здати", "цей", "важливий", "тест"]
      answer: "Вони повинні завтра здати цей важливий тест"

- type: group-sort
  title: "Відчинити чи відкрити?"
  instruction: "Розподіліть слова за двома групами: фізичні бар'єри та абстрактні поняття."
  groups:
    - name: "Відчинити (фізичні бар'єри)"
      items: ["двері", "вікно", "ворота", "кватирку", "шафу"]
    - name: "Відкрити (абстрактні процеси)"
      items: ["рахунок", "новий бізнес", "сезон", "душу"]

- type: true-false
  title: "Правда чи брехня?"
  instruction: "Визначте, чи є ці граматичні твердження правильними."
  items:
    - statement: "Слово 'відкрити' завжди правильно використовувати для фізичних дверей і вікон."
      correct: false
      explanation: "Для фізичних дверей ми використовуємо слово відчинити."
    - statement: "Дієслово 'переписати' означає скопіювати текст або написати його знову з початку."
      correct: true
      explanation: "Префікс пере- відповідає за копіювання або повторення."
    - statement: "Дієслово 'дописати' означає успішно завершити писати текст до самого кінця."
      correct: true
      explanation: "Префікс до- вказує на досягнення фінальної межі."
    - statement: "Ми кажемо 'зачинити бізнес', коли наша успішна компанія припиняє свою роботу."
      correct: false
      explanation: "Бізнес — це абстракція, тому ми його закриваємо."
    - statement: "Префікс по- зазвичай означає, що певна дія триває дуже довго і важко."
      correct: false
      explanation: "Префікс по- позначає коротку, часто приємну дію."
    - statement: "В українській мові ми активно використовуємо фразові дієслова, як в англійській мові."
      correct: false
      explanation: "Українська мова використовує префікси замість фразових дієслів."
    - statement: "Дієслово 'здати' можна сміливо використовувати, коли ви даєте тест своєму викладачу."
      correct: true
      explanation: "Здати тест — це абсолютно правильна конструкція."
    - statement: "Префікс за- може часто означати раптовий початок сильної емоції або гучного звуку."
      correct: true
      explanation: "Наприклад, засміятися або заспівати."

- type: cloze
  title: "Офісні історії: Робочий день"
  instruction: "Уважно прочитайте текст і заповніть пропуски правильними дієсловами з префіксами."
  passage: "Сьогодні в офісі був дуже важкий день. Спочатку наш директор сказав нам {{1}} новий великий проект. Потім мій колега попросив мене негайно {{2}} вікно, бо йому було занадто жарко. Я намагався швидко {{3}} свій фінансовий звіт, але несподівано зрозумів, що там багато помилок, і вирішив усе повністю {{4}}. В обід ми пішли в тихе кафе трохи {{5}} і попити смачної кави. Коли ми повернулися, нам потрібно було терміново {{6}} важливі документи нашому головному менеджеру. Увечері серйозний охоронець сказав нам не забути {{7}} всі вхідні двері. Наш шеф вирішив сьогодні {{8}} вечірнє засідання на годину раніше. Перед тим як іти додому, я зміг нарешті {{9}} свою важку роботу. Завтра зранку я маю {{10}} прочитану книжку в міську бібліотеку."
  blanks:
    - id: 1
      answer: "відкрити"
      options: ["відкрити", "відчинити", "переписати", "закрити"]
    - id: 2
      answer: "відчинити"
      options: ["відкрити", "відчинити", "дописати", "зачинити"]
    - id: 3
      answer: "дописати"
      options: ["віддати", "переписати", "дописати", "почитати"]
    - id: 4
      answer: "переписати"
      options: ["переписати", "закрити", "відкрити", "відчинити"]
    - id: 5
      answer: "посидіти"
      options: ["посидіти", "пересидіти", "досидіти", "засидіти"]
    - id: 6
      answer: "передати"
      options: ["передати", "віддати", "зачинити", "закрити"]
    - id: 7
      answer: "зачинити"
      options: ["закрити", "зачинити", "відчинити", "відкрити"]
    - id: 8
      answer: "закрити"
      options: ["зачинити", "закрити", "відкрити", "відчинити"]
    - id: 9
      answer: "доробити"
      options: ["доробити", "переробити", "поробити", "заробити"]
    - id: 10
      answer: "віддати"
      options: ["віддати", "передати", "задати", "подати"]

