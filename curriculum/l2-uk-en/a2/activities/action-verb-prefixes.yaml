- type: translate
  title: "Переклад англійською"
  instruction: "Оберіть правильний і точний український переклад для кожного англійського речення."
  items:
    - source: "I need to finish writing this long letter."
      explanation: "Finish writing always translates to дописати."
      options:
        - text: "Мені треба дописати цього довгого листа."
          correct: true
        - text: "Мені треба переписати цього довгого листа."
          correct: false
        - text: "Мені треба написати цього довгого листа."
          correct: false
        - text: "Мені треба відписати цього довгого листа."
          correct: false
    - source: "Please open the door, my hands are full."
      explanation: "Opening a physical door requires the verb відчинити."
      options:
        - text: "Будь ласка відчиніть двері."
          correct: true
        - text: "Будь ласка відкрийте двері."
          correct: false
        - text: "Будь ласка зачиніть двері."
          correct: false
        - text: "Будь ласка закрийте двері."
          correct: false
    - source: "We decided to open a new business today."
      explanation: "A business is an abstract concept, so we use відкрити."
      options:
        - text: "Ми вирішили відкрити новий бізнес."
          correct: true
        - text: "Ми вирішили відчинити новий бізнес."
          correct: false
        - text: "Ми вирішили закрити новий бізнес."
          correct: false
        - text: "Ми вирішили переробити новий бізнес."
          correct: false
    - source: "She copied the text into her small notebook."
      explanation: "To copy text means you have to переписати it."
      options:
        - text: "Вона переписала текст у свій зошит."
          correct: true
        - text: "Вона дописала текст у свій зошит."
          correct: false
        - text: "Вона відписала текст у свій зошит."
          correct: false
        - text: "Вона написала текст у свій зошит."
          correct: false
    - source: "I want to read for a little while."
      explanation: "Reading for a short, pleasant time is почитати."
      options:
        - text: "Я хочу трохи почитати."
          correct: true
        - text: "Я хочу дочитати текст."
          correct: false
        - text: "Я хочу перечитати текст."
          correct: false
        - text: "Я хочу зачитатися текстом."
          correct: false
    - source: "He suddenly started laughing at the funny joke."
      explanation: "A sudden start of emotion takes the prefix за- (засміятися)."
      options:
        - text: "Він раптом засміявся."
          correct: true
        - text: "Він раптом посміявся."
          correct: false
        - text: "Він раптом пересміявся."
          correct: false
        - text: "Він раптом досміявся."
          correct: false

- type: mark-the-words
  title: "Знайдіть дієслова з префіксами"
  instruction: "Знайдіть і позначте всі дієслова з префіксами в цьому короткому тексті."
  text: "Вчора я вирішив переписати старий текст. Я хотів дописати його швидко і без помилок. Потім я відчинив вікно для свіжого повітря. Мій брат попросив передати йому нову книгу. Пізніше ми хотіли відкрити рахунок у банку. Увечері ми вирішили трохи посидіти на дивані і додивитися цікавий фільм."
  answers: ["переписати", "дописати", "відчинив", "передати", "відкрити", "посидіти", "додивитися"]

- type: unjumble
  title: "Складіть речення (Частина 2)"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити правильне українське речення."
  items:
    - words: ["Він", "дуже", "втомився", "і", "раптом", "заснув"]
      answer: "Він дуже втомився і раптом заснув"
    - words: ["Ти", "повинен", "доїсти", "цей", "суп", "повністю"]
      answer: "Ти повинен доїсти цей суп повністю"
    - words: ["Ми", "можемо", "трохи", "посидіти", "в", "кафе"]
      answer: "Ми можемо трохи посидіти в кафе"
    - words: ["Директор", "вирішив", "закрити", "ці", "старі", "проекти"]
      answer: "Директор вирішив закрити ці старі проекти"
    - words: ["Я", "хочу", "віддати", "тобі", "твою", "книгу"]
      answer: "Я хочу віддати тобі твою книгу"
    - words: ["Вони", "занадто", "довго", "гралися", "і", "загралися"]
      answer: "Вони занадто довго гралися і загралися"