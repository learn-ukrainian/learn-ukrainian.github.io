- type: quiz
  title: 'Аналіз діалогу'
  instruction: 'Виберіть правильну відповідь на основі ситуацій.'
  items:
    - question: 'Якщо людина каже, що їй зараз дуже спокійно, який це стан?'
      explanation: 'Слово спокійно з давальним відмінком описує тимчасовий стан.'
      options:
        - text: 'Тимчасовий емоційний стан'
          correct: true
        - text: 'Постійна риса характеру'
          correct: false
        - text: 'Негативна емоція'
          correct: false
        - text: 'Фізична хвороба'
          correct: false
    - question: 'Коли актор довго чекає на важливий дзвінок, що він відчуває?'
      explanation: 'Очікування невідомого викликає стан тривоги.'
      options:
        - text: 'Йому стає дуже тривожно'
          correct: true
        - text: 'Він стає дуже веселий'
          correct: false
        - text: 'Йому завжди дуже тепло'
          correct: false
        - text: 'Він неймовірно щасливий'
          correct: false
    - question: 'Як точно описати персонажа, який дуже мало говорить і не усміхається?'
      explanation: 'Замкнені люди тримають почуття в собі.'
      options:
        - text: 'Він замкнена людина'
          correct: true
        - text: 'Він надзвичайно щедрий'
          correct: false
        - text: 'Він дуже веселий'
          correct: false
        - text: 'Він щирий і гостинний'
          correct: false
    - question: 'Як почувається типовий персонаж-інтроверт на великій гучній вечірці?'
      explanation: 'Гучне середовище часто викликає дискомфорт у замкнених людей.'
      options:
        - text: 'Йому там дуже некомфортно'
          correct: true
        - text: 'Йому там неймовірно весело'
          correct: false
        - text: 'Він почувається щасливим'
          correct: false
        - text: 'Йому тепло і спокійно'
          correct: false
    - question: 'Яке слово найкраще описує людину, яка завжди каже правду?'
      explanation: 'Чесність — це вміння завжди говорити правду.'
      options:
        - text: 'Чесний'
          correct: true
        - text: 'Лінивий'
          correct: false
        - text: 'Скупий'
          correct: false
        - text: 'Нервовий'
          correct: false
    - question: 'Якщо вчитель ніколи не кричить на учнів, який у нього характер?'
      explanation: 'Терпляча людина вміє спокійно чекати і не нервувати.'
      options:
        - text: 'Терплячий'
          correct: true
        - text: 'Злий'
          correct: false
        - text: 'Замкнений'
          correct: false
        - text: 'Лінивий'
          correct: false
    - question: 'Яке українське прислів''я каже, що внутрішній світ важливіший за зовнішність?'
      explanation: 'Це прислів''я означає, що розум важливіший за одяг.'
      options:
        - text: 'Не по одежині судять, а по розуму'
          correct: true
        - text: 'Злі язики завжди говорять'
          correct: false
        - text: 'Моя хата скраю'
          correct: false
        - text: 'Добрий день вам у хату'
          correct: false
    - question: 'Що означає популярна фраза бути скупим на слова у розмові?'
      explanation: 'Це метафора про людину, яка не любить багато спілкуватися.'
      options:
        - text: 'Людина говорить дуже мало'
          correct: true
        - text: 'Людина не має грошей'
          correct: false
        - text: 'Людина дуже щедра'
          correct: false
        - text: 'Людина говорить багато правди'
          correct: false

