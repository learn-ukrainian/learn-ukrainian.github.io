        - 'радісно'
        - 'тепло'
    - sentence: 'Вона сидить вдома сама і плаче, їй зараз дуже ___.'
      answer: 'сумно'
      options:
        - 'сумно'
        - 'весело'
        - 'тепло'
        - 'добре'
    - sentence: 'Він не розуміє цю складну ситуацію, йому дуже ___.'
      answer: 'дивно'
      options:
        - 'дивно'
        - 'спокійно'
        - 'тепло'
        - 'добре'
    - sentence: 'Ми п''ємо гарячий чай біля каміна, нам дуже ___.'
      answer: 'тепло'
      options:
        - 'тепло'
        - 'холодно'
        - 'сумно'
        - 'зло'
    - sentence: 'Коли вона гуляє в лісі, їй завжди дуже тихо і ___.'
      answer: 'спокійно'
      options:
        - 'спокійно'
        - 'нервово'
        - 'сумно'
        - 'зло'
    - sentence: 'Він не отримав свою зарплату, тому йому зараз дуже ___.'
      answer: 'зло'
      options:
        - 'зло'
        - 'весело'
        - 'добре'
        - 'тепло'

- type: error-correction
  title: 'Виправте граматичні помилки'
  instruction: 'Знайдіть і виправте помилку в реченні.'
  items:
    - sentence: 'Я нудний на цій довгій лекції, я хочу додому.'
      error: 'Я нудний'
      answer: 'Мені нудно'
      error_type: 'construction'
      options:
        - 'Мені нудно'
        - 'Мене нудно'
        - 'Я нудна'
        - 'Йому нудно'
      explanation: 'Для опису стану від ситуації використовуйте давальний відмінок: Мені нудно.'
    - sentence: 'Моя старша сестра дуже добрий і завжди допомагає всім.'
      error: 'добрий'
      answer: 'добра'
      error_type: 'word'
      options:
        - 'добра'
        - 'добре'
        - 'добрі'
        - 'доброго'
      explanation: 'Слово сестра — жіночого роду, тому прикметник має закінчення -а.'
    - sentence: 'Він холодний зараз, бо на вулиці дуже сильний зимовий вітер.'
      error: 'Він холодний'
      answer: 'Йому холодно'
      error_type: 'construction'
      options:
        - 'Йому холодно'
        - 'Його холодно'
        - 'Він холодно'
        - 'Йому холодний'
      explanation: 'Це тимчасовий стан від погоди, тому ми кажемо йому холодно.'
    - sentence: 'Цей лікар такий симпатичний, він завжди глибоко розуміє чуже горе.'
      error: 'симпатичний'
      answer: 'співчутливий'
      error_type: 'word'
      options:
        - 'співчутливий'
        - 'добрий'
        - 'веселий'
        - 'розумний'
      explanation: 'Симпатичний означає гарний. Для емпатії використовуємо слово співчутливий.'
    - sentence: 'Їй сумна сьогодні, тому що надворі йде сильний осінній дощ.'
      error: 'сумна'
      answer: 'сумно'
      error_type: 'word'
      options:
        - 'сумно'
        - 'сумний'
        - 'сумне'
        - 'сумні'
      explanation: 'Після давального відмінка ми завжди використовуємо прислівник на -о.'
    - sentence: 'Мій найкращий друг дуже лінива, він зовсім нічого не робить.'
      error: 'лінива'
      answer: 'лінивий'
      error_type: 'word'
      options:
        - 'лінивий'
        - 'ліниве'
        - 'ліниві'
        - 'ліниво'
      explanation: 'Друг — це чоловічий рід, тому закінчення прикметника має бути -ий.'

