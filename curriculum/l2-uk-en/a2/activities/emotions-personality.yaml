- type: quiz
  title: 'Перевірте знання: стани та якості'
  instruction: 'Виберіть одну правильну відповідь.'
  items:
    - question: 'Як правильно сказати I am bored українською мовою?'
      explanation: 'Для тимчасового стану ми використовуємо давальний відмінок та прислівник.'
      options:
        - text: 'Мені нудно'
          correct: true
        - text: 'Я нудний'
          correct: false
        - text: 'Мене нудно'
          correct: false
        - text: 'Я нудна'
          correct: false
    - question: 'Що означає українське слово симпатичний у нашій мові?'
      explanation: 'Це слово описує тільки приємну зовнішність людини.'
      options:
        - text: 'Гарний візуально'
          correct: true
        - text: 'Добрий'
          correct: false
        - text: 'Співчутливий'
          correct: false
        - text: 'Щирий'
          correct: false
    - question: 'Яка фраза є глибоким запитанням про емоційний стан?'
      explanation: 'Це традиційне українське запитання для щирої розмови.'
      options:
        - text: 'Що у тебе на душі?'
          correct: true
        - text: 'Як твої справи?'
          correct: false
        - text: 'Що ти робиш?'
          correct: false
        - text: 'Який ти сьогодні?'
          correct: false
    - question: 'Як правильно перекласти англійську фразу He feels cold?'
      explanation: 'Стан описується давальним відмінком. Він холодний означає людину без емоцій.'
      options:
        - text: 'Йому холодно'
          correct: true
        - text: 'Він холодний'
          correct: false
        - text: 'Його холодно'
          correct: false
        - text: 'Він холодно'
          correct: false
    - question: 'Яке правильне закінчення має прикметник у жіночому роді?'
      explanation: 'Для жіночого роду ми завжди використовуємо закінчення -а або -я.'
      options:
        - text: 'Вона розумна'
          correct: true
        - text: 'Вона розумний'
          correct: false
        - text: 'Вона розумне'
          correct: false
        - text: 'Вона розумні'
          correct: false
    - question: 'Як описати людину, яка дуже легко втрачає контроль?'
      explanation: 'Нервова людина часто має стрес і погано контролює емоції.'
      options:
        - text: 'Нервова'
          correct: true
        - text: 'Спокійна'
          correct: false
        - text: 'Терпляча'
          correct: false
        - text: 'Щира'
          correct: false
    - question: 'Яке слово є правильним антонімом до слова щирий?'
      explanation: 'Замкнена людина не любить показувати свої справжні почуття.'
      options:
        - text: 'Замкнений'
          correct: true
        - text: 'Щедрий'
          correct: false
        - text: 'Лінивий'
          correct: false
        - text: 'Добрий'
          correct: false
    - question: 'Яка фраза правильно описує постійну рису людського характеру?'
      explanation: 'Називний відмінок з прикметником (добра) описує характер.'
      options:
        - text: 'Вона дуже добра людина'
          correct: true
        - text: 'Їй дуже добре сьогодні'
          correct: false
        - text: 'Мені зараз дуже весело'
          correct: false
        - text: 'Йому завжди холодно'
          correct: false

- type: fill-in
  title: 'Тимчасові стани'
  instruction: 'Виберіть правильний прислівник для опису стану.'
  items:
    - sentence: 'На вулиці йде сніг, тому мені дуже ___.'
      answer: 'холодно'
      options:
        - 'холодно'
        - 'тепло'
        - 'весело'
        - 'розумно'
    - sentence: 'Ми виграли цей складний матч, нам неймовірно ___!'
      answer: 'весело'
      options:
        - 'весело'
        - 'сумно'
        - 'нудно'
        - 'холодно'
    - sentence: 'Цей новий фільм дуже довгий і нецікавий, усім глядачам ___.'
      answer: 'нудно'
      options:
        - 'нудно'
