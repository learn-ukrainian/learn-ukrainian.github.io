- type: quiz
  title: "Перевірте свої знання"
  instruction: "Оберіть правильне твердження."
  items:
    - question: "Що означають дієприкметники минулого часу (наприклад, написаний)?"
      explanation: "Вони означають, що хтось інший виконав дію над предметом."
      options:
        - text: "Пасивний стан (хтось інший виконав дію)"
          correct: true
        - text: "Активну дію (предмет сам виконує дію)"
          correct: false
        - text: "Одночасну дію"
          correct: false
        - text: "Властивість предмета від природи"
          correct: false
    - question: "Як змінюються дієприкметники в українській мові?"
      explanation: "Дієприкметники змінюються точно так само, як звичайні прикметники."
      options:
        - text: "За родами, числами та відмінками"
          correct: true
        - text: "Вони ніколи не змінюються"
          correct: false
        - text: "Тільки за числами"
          correct: false
        - text: "Тільки за родами"
          correct: false
    - question: "Де найчастіше використовуються форми на -но та -то (наприклад, відкрито)?"
      explanation: "Ці форми звучать професійно та об'єктивно, тому їх використовують на вивісках."
      options:
        - text: "В офіційних оголошеннях та написах"
          correct: true
        - text: "У розмовній мові з друзями"
          correct: false
        - text: "Тільки в українських піснях"
          correct: false
        - text: "У казках та легендах"
          correct: false
    - question: "Що описує суфікс -ючи (наприклад, читаючи) в реченні?"
      explanation: "Суфікс -ючи описує одночасну дію (теперішній час)."
      options:
        - text: "Одночасну дію (в той самий час)"
          correct: true
        - text: "Дію, яка вже закінчилася"
          correct: false
        - text: "Ознаку предмета"
          correct: false
        - text: "Майбутню дію"
          correct: false
    - question: "Що описує суфікс -вши (наприклад, написавши) в тексті?"
      explanation: "Це дієприслівник минулого часу, який показує попередню дію."
      options:
        - text: "Дію, яка завершилася перед головною дією"
          correct: true
        - text: "Одночасну дію"
          correct: false
        - text: "Дію, яка ніколи не відбудеться"
          correct: false
        - text: "Пасивний стан предмета"
          correct: false
    - question: "Чи узгоджується безособова форма (наприклад, зроблено) з іменником у реченні?"
      explanation: "Безособові форми на -но ніколи не змінюються і не узгоджуються з іменником."
      options:
        - text: "Ні, вона ніколи не змінюється"
          correct: true
        - text: "Так, завжди узгоджується"
          correct: false
        - text: "Узгоджується тільки в множині"
          correct: false
        - text: "Узгоджується тільки в жіночому роді"
          correct: false
    - question: "Як правильно перекласти фразу 'the reading boy' українською мовою?"
      explanation: "Правильно казати: хлопець, який читає. Активні дієприкметники — це калька."
      options:
        - text: "Хлопець, який читає"
          correct: true
        - text: "Читаючий хлопець"
          correct: false
        - text: "Прочитаний хлопець"
          correct: false
        - text: "Читавший хлопець"
          correct: false
    - question: "Яке Золоте правило існує для використання дієприслівників у реченні?"
      explanation: "Суб'єкт дієприслівника має бути тим самим, що і суб'єкт головного дієслова."
      options:
        - text: "Дії має виконувати один і той самий суб'єкт"
          correct: true
        - text: "Дії повинні виконувати різні люди"
          correct: false
        - text: "Дієприслівник має бути в кінці речення"
          correct: false
        - text: "Треба завжди використовувати слово коли"
          correct: false

