  instruction: "Оберіть правильну відповідь на запитання."
  items:
    - question: "До якої частини мови подібні дієприкметники минулого часу (наприклад, написаний)?"
      explanation: "Вони описують ознаку предмета і змінюються як прикметники."
      options:
        - text: "До прикметника"
          correct: true
        - text: "До прислівника"
          correct: false
        - text: "До іменника"
          correct: false
        - text: "До числівника"
          correct: false
    - question: "Яке закінчення має дієприкметник у реченні «Всі ці місця ...»?"
      explanation: "Місця — це множина, тому треба використовувати закінчення -і."
      options:
        - text: "зайняті"
          correct: true
        - text: "зайнятий"
          correct: false
        - text: "зайнята"
          correct: false
        - text: "зайняте"
          correct: false
    - question: "Яка граматична форма використовується для офіційних оголошень та вуличних написів?"
      explanation: "Безособові форми на -но та -то звучать офіційно і не змінюються."
      options:
        - text: "Безособова форма на -но, -то"
          correct: true
        - text: "Дієприкметник чоловічого роду"
          correct: false
        - text: "Дієприслівник"
          correct: false
        - text: "Звичайне дієслово"
          correct: false
    - question: "Що саме описує дієприслівник на -ючи (наприклад, читаючи) в тексті?"
      explanation: "Ця форма показує додаткову дію, яка відбувається в той самий момент."
      options:
        - text: "Одночасну дію"
          correct: true
        - text: "Попередню дію"
          correct: false
        - text: "Ознаку предмета"
          correct: false
        - text: "Майбутню дію"
          correct: false
    - question: "Яка форма є правильною для англійського вислову 'the reading boy'?"
      explanation: "Українська мова уникає форм на -учий. Використовуємо який + дієслово."
      options:
        - text: "хлопець, який читає"
          correct: true
        - text: "читаючий хлопець"
          correct: false
        - text: "читавший хлопець"
          correct: false
        - text: "прочитаний хлопець"
          correct: false
    - question: "Як правильно перекласти популярний вислів 'Made in Ukraine' українською мовою?"
      explanation: "Використовується безособова форма зроблено."
      options:
        - text: "Зроблено в Україні"
          correct: true
        - text: "Зроблений в Україні"
          correct: false
        - text: "Роблячи в Україні"
          correct: false
        - text: "Зробив в Україні"
          correct: false
    - question: "Яке головне правило використання дієприслівників (gerunds) в українській граматиці?"
      explanation: "Золоте правило: суб'єкт додаткової дії має бути тим самим, що і суб'єкт головної."
      options:
        - text: "Обидві дії виконує один суб'єкт"
          correct: true
        - text: "Дії виконують різні суб'єкти"
          correct: false
        - text: "Дієприслівник змінюється за відмінками"
          correct: false
        - text: "Дієприслівник завжди стоїть у кінці речення"
          correct: false
    - question: "Яке закінчення має дієприкметник у простому реченні «Моє вікно ...»?"
      explanation: "Вікно — це середній рід, правильне закінчення -е."
      options:
        - text: "відкрите"
          correct: true
        - text: "відкритий"
          correct: false
        - text: "відкрита"
          correct: false
        - text: "відкриті"
          correct: false