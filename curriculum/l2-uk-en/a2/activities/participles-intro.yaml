- type: error-correction
  title: "Виправте стилістичні помилки"
  instruction: "Знайдіть і виправте російські кальки або помилки з дієприслівниками."
  items:
    - sentence: "Я побачив читаючого хлопця."
      error: "читаючого хлопця"
      answer: "хлопця, який читає"
      options:
        - "хлопця, який читає"
        - "хлопця, який читав"
        - "хлопця, що читати"
        - "читаючого хлопчика"
      explanation: "Українська мова уникає активних дієприкметників. Використовуйте конструкцію який + дієслово."
    - sentence: "Я бачу сплячого кота."
      error: "сплячого кота"
      answer: "кота, який спить"
      options:
        - "кота, який спить"
        - "кота, який спав"
        - "кота, що спати"
        - "сплячого кота"
      explanation: "Слово сплячий — це калька. Правильно: кіт, який спить."
    - sentence: "Читаючи книгу, світло згасло."
      error: "Читаючи книгу, світло згасло."
      answer: "Коли я читав книгу, світло згасло."
      options:
        - "Коли я читав книгу, світло згасло."
        - "Світло згасло читаючи книгу."
        - "Читаючи книгу, світло вимкнулося."
        - "Світло, читаючи книгу, згасло."
      explanation: "Суб'єкт дії має бути один. Світло не може читати книгу."
    - sentence: "Він купив миючий засіб."
      error: "миючий засіб"
      answer: "засіб для миття"
      options:
        - "засіб для миття"
        - "миючий засіб"
        - "засіб, який миє"
        - "миючий"
      explanation: "Уникайте активних дієприкметників на -учий."
    - sentence: "Працюючи за комп'ютером, у нього заболіла голова."
      error: "Працюючи за комп'ютером, у нього заболіла голова."
      answer: "Коли він працював за комп'ютером, у нього заболіла голова."
      options:
        - "Коли він працював за комп'ютером, у нього заболіла голова."
        - "Працюючи, голова заболіла."
        - "Голова заболіла працюючи."
        - "Працюючи, у нього болить голова."
      explanation: "Голова не може працювати за комп'ютером. Потрібно використовувати підрядне речення."
    - sentence: "Я бачив бігучого собаку."
      error: "бігучого собаку"
      answer: "собаку, який біг"
      options:
        - "собаку, який біг"
        - "собаку, який біжить"
        - "собаку, що бігти"
        - "бігучого собаку"
      explanation: "Бігучий — це помилка. Використовуйте який + дієслово."

- type: mark-the-words
  title: "Знайдіть безособові форми"
  instruction: "Знайдіть і позначте всі безособові форми (на -но або -то) в тексті."
  text: "Сьогодні ми прийшли до банку, але на дверях висіла табличка: Вхід зачинено. Ми запитали охоронця, і він сказав, що роботу банку призупинено. Ми пішли в кафе поруч. Там було відкрито. На столику ми побачили меню, де було написано: Усі страви зроблено в Україні. Це дуже приємно читати."
  answers:
    - "зачинено"
    - "призупинено"
    - "відкрито"
    - "написано"
    - "зроблено"

- type: quiz
