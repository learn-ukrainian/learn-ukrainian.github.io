version: '1.0'
module: a2-finale
level: a2
inline:
- id: match-up-situations
  type: match-up
  instruction: З'єднайте ситуацію з відповідною фразою
  pairs:
  - left: Ви на вокзалі, хочете купити квиток.
    right: Дайте, будь ласка, один квиток.
  - left: Ви в готелі, хочете взяти ключ.
    right: У мене є бронювання.
  - left: Ви на ринку, запитуєте ціну.
    right: Скільки це коштує?
  - left: Ви в кафе, хочете замовити їжу.
    right: Що ви можете порадити?
  - left: Ви на вулиці, шукаєте зупинку.
    right: Де тут зупинка маршрутки?
  - left: Офіціант приніс не ту страву.
    right: Перепрошую, я замовляв інше.
  - left: Ви завершили рівень А2.
    right: Вітаємо!
  - left: Ви прощаєтеся з друзями ввечері.
    right: На добраніч! До завтра!
- id: fill-in-dialogues
  type: fill-in
  instruction: Вставте правильне слово в речення
  items:
  - sentence: Я хочу купити _____ на потяг до Києва.
    answer: квиток
    options:
    - квиток
    - будівлю
    - ринок
  - sentence: Де тут зупиняється _____ номер п'ять?
    answer: маршрутка
    options:
    - маршрутка
    - вокзал
    - прибуття
  - sentence: Що ви можете _____ на обід?
    answer: порадити
    options:
    - порадити
    - дізнатися
    - замовити
  - sentence: Я хочу _____ традиційний український борщ.
    answer: замовити
    options:
    - замовити
    - порадити
    - дізнатися
  - sentence: На Площі Ринок є дуже стара австрійська _____.
    answer: будівля
    options:
    - будівля
    - прогулянка
    - маршрутка
  - sentence: Які ваші перші _____ від міста Львів?
    answer: враження
    options:
    - враження
    - прибуття
    - квитки
  - sentence: Наша _____ містом була дуже довгою і цікавою.
    answer: прогулянка
    options:
    - прогулянка
    - маршрутка
    - будівля
  - sentence: Ми хочемо _____ більше про історію цього театру.
    answer: дізнатися
    options:
    - дізнатися
    - замовити
    - порадити
- id: quiz-integrated-grammar
  type: quiz
  instruction: Оберіть правильну граматичну форму
  items:
  - question: Дайте мені, будь ласка, п'ять _____.
    correct: 0
    options:
    - яблук
    - яблука
    - яблуко
    - яблуком
  - question: Сьогодні зранку мій потяг _____ на вокзал.
    correct: 0
    options:
    - прибув
    - прибував
    - прибула
    - прибувало
  - question: Ми дуже довго _____ сувеніри на базарі.
    correct: 0
    options:
    - вибирали
    - вибрали
    - вибирати
    - виберемо
  - question: Я чекаю на свою подругу _____.
    correct: 0
    options:
    - на вокзалі
    - на вокзал
    - у вокзалі
    - біля вокзалі
  - question: Ми підемо на _____ після сніданку.
    correct: 0
    options:
    - прогулянку
    - прогулянки
    - прогулянці
    - прогулянкою
  - question: Два _____ коштують сорок гривень.
    correct: 0
    options:
    - кілограми
    - кілограмів
    - кілограм
    - кілограмах
  - question: У мене немає _____ на цей потяг.
    correct: 0
    options:
    - квитка
    - квиток
    - квитку
    - квитком
  - question: Чи ви вже _____ свою вечерю?
    correct: 0
    options:
    - замовили
    - замовляли
    - замовити
    - замовляти
workbook:
- type: group-sort
  instruction: Розподіліть дієслова за видом (Доконаний чи недоконаний?)
  groups:
  - label: Недоконаний вид (процес)
    items:
    - купувати
    - читати
    - робити
    - вибирати
    - зупинятися
    - замовляти
  - label: Доконаний вид (результат)
    items:
    - купити
    - прочитати
    - зробити
    - вибрати
    - зупинитися
    - замовити
- type: fill-in
  instruction: Вставте слово в правильному відмінку
  items:
  - sentence: Сьогодні я був на головному _____.
    answer: вокзалі
    options:
    - вокзалі
    - вокзал
    - вокзалу
  - sentence: Скільки коштують ці червоні _____?
    answer: яблука
    options:
    - яблука
    - яблук
    - яблуками
  - sentence: Мені потрібен квиток на _____ номер три.
    answer: трамвай
    options:
    - трамвай
    - трамваю
    - трамваї
  - sentence: Вона любить пити каву з холодним _____.
    answer: молоком
    options:
    - молоком
    - молоко
    - молока
  - sentence: Офіціант приніс _____ з картоплею.
    answer: вареники
    options:
    - вареники
    - варениками
    - вареників
  - sentence: На площі є багато старовинних _____.
    answer: будівель
    options:
    - будівель
    - будівлі
    - будівлям
  - sentence: Ви вже _____ замовляти обід?
    answer: готові
    options:
    - готові
    - готовий
    - готова
- type: true-false
  instruction: Правда чи ні? (За текстом модуля)
  items:
  - statement: На львівському вокзалі завжди дуже тихо і мало людей.
    correct: false
    explanation: На вокзалі дуже багато людей, усі кудись поспішають.
  - statement: Турист чекатиме на трамвай номер дев'ять.
    correct: true
    explanation: Касирка сказала, що туристу потрібен трамвай номер дев'ять.
  - statement: У готелі була вільна кімната на третьому поверсі.
    correct: false
    explanation: Вільних номерів на третьому поверсі не було, тільки на другому.
  - statement: На ринку турист купив п'ять кілограмів яблук.
    correct: false
    explanation: Турист купив два кілограми яблук і п'ять помідорів.
  - statement: Офіціант переплутав замовлення і приніс грибний суп замість борщу.
    correct: true
    explanation: Турист замовляв борщ, а офіціант випадково приніс грибний суп.
  - statement: Увечері турист зустрівся зі своїми друзями в пабі.
    correct: true
    explanation: Вечір був ідеальним часом для зустрічі з українськими друзями в пабі.
- type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: What can you recommend?
    options:
    - text: Що ви можете порадити?
      correct: true
    - text: Що ви можете замовити?
      correct: false
    - text: Що ви будете робити?
      correct: false
    - text: Що ви хочете дізнатися?
      correct: false
  - source: I have a reservation.
    options:
    - text: У мене є бронювання.
      correct: true
    - text: У мене є кімната.
      correct: false
    - text: У мене немає номера.
      correct: false
    - text: У мене є квиток.
      correct: false
  - source: Where is the stop here?
    options:
    - text: Де тут зупинка?
      correct: true
    - text: Де тут вокзал?
      correct: false
    - text: Як доїхати до центру?
      correct: false
    - text: Де тут ринок?
      correct: false
  - source: I am waiting for the tram.
    options:
    - text: Я чекаю на трамвай.
      correct: true
    - text: Я чекаю трамваю.
      correct: false
    - text: Я чекаю на трамваї.
      correct: false
    - text: Я чекаю трамваєм.
      correct: false
  - source: Two kilograms of apples, please.
    options:
    - text: Два кілограми яблук, будь ласка.
      correct: true
    - text: Два кілограм яблука, будь ласка.
      correct: false
    - text: Дві кілограми яблук, будь ласка.
      correct: false
    - text: Два кілограми яблука, будь ласка.
      correct: false
  - source: Congratulations!
    options:
    - text: Вітаємо!
      correct: true
    - text: Підсумок!
      correct: false
    - text: Враження!
      correct: false
    - text: Прибуття!
      correct: false
