version: '1.0'
module: a2-finale
level: a2
inline:
- id: match-up-situations
  type: match-up
  instruction: З'єднайте ситуацію з відповідною фразою
  pairs:
  - left: Прибуття на вокзал
    right: Я на головному вокзалі!
  - left: Замовлення їжі
    right: Я хочу замовити борщ.
  - left: Купівля квитка
    right: Дайте, будь ласка, один квиток на трамвай.
  - left: Реєстрація у готелі
    right: У мене є бронювання на ім'я Джон.
  - left: Запитання на ринку
    right: Скільки коштують ці солодкі яблука?
  - left: Плани на завтра
    right: Завтра зранку ми будемо гуляти у парку.
  - left: Прощання з друзями
    right: Було надзвичайно приємно побачитися!
  - left: Порада офіціанта
    right: Наші вареники з картоплею просто чудові.
- id: fill-in-dialogues
  type: fill-in
  instruction: Вставте пропущене слово у діалог
  items:
  - sentence: — Добрий день! Скільки _____ яблука коштують?
    answer: ці
    options:
    - ці
    - той
    - ця
    - це
  - sentence: — Де тут _____? — Прямо, біля головного входу.
    answer: зупинка
    options:
    - зупинка
    - вокзал
    - ринок
    - поїзд
  - sentence: — Я хочу _____ традиційний обід. Що ви порадите?
    answer: замовити
    options:
    - замовити
    - замовляти
    - купити
    - купили
  - sentence: — У мене є бронювання на _____ Джон.
    answer: ім'я
    options:
    - ім'я
    - прізвище
    - номер
    - місто
  - sentence: — Дайте, будь ласка, один _____ на трамвай.
    answer: квиток
    options:
    - квиток
    - паспорт
    - сир
    - ключ
  - sentence: — Які у нас спільні _____ на завтра?
    answer: плани
    options:
    - плани
    - плану
    - планом
    - плані
  - sentence: — Це дуже стара _____. Хто її збудував?
    answer: будівля
    options:
    - будівля
    - вокзал
    - ринок
    - столик
  - sentence: — Як пройшов твій _____? Що ти бачив у місті?
    answer: день
    options:
    - день
    - дня
    - днем
    - дні
- id: quiz-integrated-grammar
  type: quiz
  instruction: Оберіть правильну граматичну форму
  items:
  - question: Ви будете чекати ____ трамвай.
    options:
    - на
    - в
    - з
    - під
    correct: 0
  - question: Сьогодні я багато ____ містом.
    options:
    - гуляв
    - погуляв
    - вигуляв
    - прогуляв
    correct: 0
  - question: Дайте мені, будь ласка, п'ять ____.
    options:
    - помідорів
    - помідор
    - помідори
    - помідору
    correct: 0
  - question: Нарешті я ____ гарний сувенір для мами.
    options:
    - купив
    - купував
    - купляв
    - викуповував
    correct: 0
  - question: Завтра зранку ми ____ у парку.
    options:
    - будемо гуляти
    - будемо гуляли
    - погуляємо
    - гуляємо
    correct: 0
  - question: Це подарунок для ____.
    options:
    - мами
    - мамою
    - маму
    - мамі
    correct: 0
  - question: Вибачте, ви ____ грибний суп замість борщу.
    options:
    - принесли
    - приносили
    - носитимуть
    - принесете
    correct: 0
  - question: Мій готель розташований ____ Львові.
    options:
    - у
    - на
    - до
    - від
    correct: 0
workbook:
- id: aspect-pairs-final
  type: match-up
  instruction: Знайдіть видову пару для дієслова
  pairs:
  - left: замовити
    right: замовляти
  - left: купити
    right: купувати
  - left: вибрати
    right: вибирати
  - left: порадити
    right: радити
  - left: дізнатися
    right: дізнаватися
  - left: збудувати
    right: будувати
  - left: прибути
    right: прибувати
  - left: відповісти
    right: відповідати
- id: category-sorting-situations
  type: group-sort
  instruction: Розподіліть слова та фрази за категоріями
  groups:
  - label: На вокзалі
    items:
    - перон
    - квиток
    - прибуття
    - чекати на поїзд
  - label: На ринку
    items:
    - свіжі яблука
    - кілограм
    - сорок гривень
    - продавець
  - label: У кафе
    items:
    - замовити обід
    - офіціант
    - борщ
    - порадити страву
- id: true-false-reading
  type: true-false
  instruction: Визначте, чи є твердження правильним за змістом тексту
  items:
  - statement: Турист приїхав на вокзал у Києві.
    correct: false
    explanation: Турист приїхав до Львова.
  - statement: Квиток на трамвай коштує вісімнадцять гривень.
    correct: true
  - statement: У готелі не було вільних номерів на третьому поверсі.
    correct: true
  - statement: Сніданок у готелі починається о десятій ранку.
    correct: false
    explanation: Сніданок о восьмій ранку.
  - statement: Червоні яблука на ринку солодші, ніж жовті.
    correct: false
    explanation: Продавчиня сказала, що жовті яблука найкращі та солодші.
  - statement: Офіціант спочатку приніс грибний суп замість борщу.
    correct: true
- id: unjumble-sentences-a2
  type: unjumble
  instruction: Складіть речення з поданих слів
  items:
  - words:
    - трамвай.
    - чекати
    - будете
    - Ви
    - на
    correct_order:
    - Ви
    - будете
    - чекати
    - на
    - трамвай.
  - words:
    - мені
    - яблук.
    - Дайте,
    - будь
    - ласка,
    - кілограм
    correct_order:
    - Дайте,
    - будь
    - ласка,
    - мені
    - кілограм
    - яблук.
  - words:
    - бронювання
    - ім'я
    - маю
    - Я
    - на
    - Джон.
    correct_order:
    - Я
    - маю
    - бронювання
    - на
    - ім'я
    - Джон.
  - words:
    - дізнався
    - багато
    - Я
    - нового
    - місто.
    - про
    correct_order:
    - Я
    - дізнався
    - багато
    - нового
    - про
    - місто.
  - words:
    - порадити
    - ви
    - можете
    - Що
    - мені?
    correct_order:
    - Що
    - ви
    - можете
    - мені
    - порадити?
  - words:
    - приємно
    - Було
    - побачитися!
    - надзвичайно
    correct_order:
    - Було
    - надзвичайно
    - приємно
    - побачитися!
- id: translation-practice-a2
  type: translate
  instruction: Оберіть правильний переклад українською мовою
  items:
  - source: I want to order a traditional lunch.
    options:
    - text: Я хочу замовити традиційний обід.
      correct: true
    - text: Я замовив традиційний обід.
      correct: false
    - text: Я буду замовляти обіду.
      correct: false
    - text: Я хочу замовлення обід.
      correct: false
  - source: How much do these apples cost?
    options:
    - text: Скільки коштують ці яблука?
      correct: true
    - text: Яка ціна ці яблук?
      correct: false
    - text: Скільки коштували цей яблуко?
      correct: false
    - text: Де купити ці яблука?
      correct: false
  - source: I have a reservation.
    options:
    - text: У мене є бронювання.
      correct: true
    - text: Я маю замовлення.
      correct: false
    - text: У мене була кімната.
      correct: false
    - text: Мені потрібно бронювати.
      correct: false
  - source: Wait for the tram.
    options:
    - text: Чекати на трамвай.
      correct: true
    - text: Чекати трамвая.
      correct: false
    - text: Почекати в трамваї.
      correct: false
    - text: Йти на трамвай.
      correct: false
  - source: What can you recommend?
    options:
    - text: Що ви можете порадити?
      correct: true
    - text: Яка ваша порада?
      correct: false
    - text: Що ви радите?
      correct: false
    - text: Як ви порадили?
      correct: false
  - source: It was very nice to see you!
    options:
    - text: Було дуже приємно побачитися!
      correct: true
    - text: Радий тебе бачити!
      correct: false
    - text: Приємно познайомитися!
      correct: false
    - text: Гарного вечора!
      correct: false
