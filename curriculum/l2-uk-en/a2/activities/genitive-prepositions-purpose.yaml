    right: for studying
  - left: для відпочинку
    right: for rest
  - left: для здоров'я
    right: for health
  - left: для роботи
    right: for work
  - left: для допомоги
    right: for help
  - left: для дітей
    right: for children
  - left: для зустрічей
    right: for meetings
  - left: для щастя
    right: for happiness
- id: fill-in-location
  type: fill-in
  instruction: Вставте правильну форму іменника
  items:
  - sentence: Наш готель знаходиться навпроти ____.
    answer: вокзалу
    options:
    - вокзал
    - вокзалу
    - вокзалом
    - вокзалі
  - sentence: Влітку ми часто відпочиваємо біля ____.
    answer: річки
    options:
    - річка
    - річку
    - річки
    - річкою
  - sentence: Нова кав'ярня відкрилася навпроти ____.
    answer: лікарні
    options:
    - лікарня
    - лікарні
    - лікарнею
    - лікарню
  - sentence: Я зараз стою біля ____ метро.
    answer: станції
    options:
    - станція
    - станції
    - станцією
    - станцію
  - sentence: У селі є старий сад коло ____.
    answer: хати
    options:
    - хата
    - хати
    - хатою
    - хату
  - sentence: Ми живемо в квартирі біля ____ моїх батьків.
    answer: будинку
    options:
    - будинок
    - будинку
    - будинком
    - будинки
  - sentence: Головний музей міста розташований біля ____.
    answer: площі
    options:
    - площа
    - площі
    - площею
    - площу
  - sentence: Вони зустрілися на площі навпроти ____.
    answer: церкви
    options:
    - церква
    - церкви
    - церквою
    - церкву
- id: quiz-prep-choice-choose-between-and-to-complete-everyday-sentences
  type: quiz
  instruction: Оберіть правильний прийменник
  items:
  - question: Я завжди п'ю каву ____ цукру.
    options:
    - без
    - для
    - біля
    - навпроти
    correct: 0
  - question: Цей новий телефон ____ друга.
    options:
    - для
    - без
    - коло
    - навпроти
    correct: 0
  - question: Ми зустрінемося завтра ____ станції метро.
    options:
    - біля
    - без
    - для
    - про
    correct: 0
  - question: Він швидко закінчив роботу ____ допомоги.
    options:
    - без
    - для
    - коло
    - навпроти
    correct: 0
  - question: У нас є нові книги ____ навчання.
    options:
    - для
    - без
    - коло
    - навпроти
    correct: 0
  - question: Жодна людина не живе довго ____ води.
    options:
    - без
    - для
    - біля
    - навпроти
    correct: 0
  - question: Я зараз стою ____ лікарні.
    options:
    - навпроти
    - для
    - без
    - з
    correct: 0
  - question: Це спеціальна кімната ____ зустрічей.
    options:
    - для
    - без
    - біля
    - коло
    correct: 0
- id: true-false-grammar
  type: true-false
  instruction: Правильно чи ні? Оцініть граматику
  items:
  - statement: для брату
    correct: false
    explanation: 'Слово «брат» у родовому відмінку має закінчення -а: для брата.'
  - statement: без солі
    correct: true
    explanation: Слово «сіль» у родовому відмінку має закінчення -і.
  - statement: біля зупинка
    correct: false
    explanation: 'Після прийменника «біля» потрібен родовий відмінок: біля зупинки.'
  - statement: навпроти лікарні
    correct: true
    explanation: Слово «лікарня» у родовому відмінку має закінчення -і.
  - statement: для здоров'я
    correct: true
    explanation: Слово «здоров'я» (середній рід) не змінює закінчення в родовому відмінку.
  - statement: без цукору
    correct: false
    explanation: 'У слові «цукор» літера «о» випадає в родовому відмінку: без цукру.'
  - statement: біля станції
    correct: true
    explanation: Слово «станція» у родовому відмінку має закінчення -ії.
  - statement: для Марія
    correct: false
    explanation: 'Після прийменника «для» потрібен родовий відмінок: для Марії.'
workbook:
- type: group-sort
  instruction: Називний чи Родовий відмінок?
  groups:
  - label: Називний відмінок (що?)
    items:
    - вода
    - сіль
    - комп'ютер
    - зупинка
    - цукор
    - парк
  - label: Родовий відмінок (для/без/біля чого?)
    items:
    - води
    - солі
    - комп'ютера
    - зупинки
    - цукру
    - парку
- type: error-correction
  instruction: Знайдіть і виправте помилку у відмінку
  items:
  - sentence: Цей подарунок для мама.
    error: мама
    correction: мами
    error_type: word
    options:
    - мами
    - мамі
    - маму
    - мамою
    explanation: Після «для» потрібен родовий відмінок (для кого?).
  - sentence: Ми живемо біля парк.
    error: парк
    correction: парку
    error_type: word
    options:
    - парку
    - парка
    - паркові
    - парком
    explanation: Після «біля» потрібен родовий відмінок (біля чого?).
  - sentence: Я п'ю каву без цукор.
    error: цукор
    correction: цукру
    error_type: word
    options:
    - цукру
    - цукору
    - цукром
    - цукрі
    explanation: Після «без» потрібен родовий відмінок, а «о» випадає.
  - sentence: Вона сидить навпроти вікно.
    error: вікно
    correction: вікна
    error_type: word
    options:
    - вікна
    - вікні
    - вікном
    - вікну
    explanation: Після «навпроти» потрібен родовий відмінок (навпроти чого?).
  - sentence: Це безпечна кімната для діти.
    error: діти
    correction: дітей
    error_type: word
    options:
    - дітей
    - дітям
    - дітьми
    - дітях
    explanation: Після «для» потрібен родовий відмінок множини.
  - sentence: У нас є хороші новини для друг.
    error: друг
    correction: друга
    error_type: word
    options:
    - друга
    - другу
    - другом
    - другові
    explanation: Після «для» потрібен родовий відмінок (для кого?).
