inline:
- id: quiz-choose-or-to-complete-everyday-sentences
  type: quiz
  instruction: Оберіть правильний прийменник для речення
  items:
  - question: Цей новий стіл — ____ роботи.
    options:
    - для
    - без
    - біля
    - навпроти
    correct: 0
  - question: Я завжди п'ю каву ____ молока.
    options:
    - без
    - для
    - біля
    - навпроти
    correct: 0
  - question: Ми поставимо намет ____ річки.
    options:
    - біля
    - для
    - без
    - навпроти
    correct: 0
  - question: Це дуже гарний подарунок ____ мами.
    options:
    - для
    - без
    - біля
    - коло
    correct: 0
  - question: Він вирішив це складне завдання ____ допомоги.
    options:
    - без
    - для
    - біля
    - навпроти
    correct: 0
  - question: Трамвайна зупинка знаходиться просто ____ вокзалу.
    options:
    - біля
    - для
    - без
    - навпроти
    correct: 0
  - question: Вони зробили цей сюрприз спеціально ____ нас.
    options:
    - для
    - без
    - біля
    - навпроти
    correct: 0
  - question: Я зовсім не можу жити ____ ранкової кави.
    options:
    - без
    - для
    - біля
    - коло
    correct: 0
  title: Оберіть правильний прийменник для речення
- id: true-false-judge-whether-preposition-noun-form-combinations-are-grammatically-correct
  type: true-false
  instruction: Чи правильно використано форму слова після прийменника?
  items:
  - statement: для відпочинку
    correct: true
    explanation: Прийменник «для» вимагає родового відмінка.
  - statement: без сумнів
    correct: false
    explanation: 'Потрібен родовий відмінок: без сумніву.'
  - statement: біля церква
    correct: false
    explanation: 'Потрібен родовий відмінок: біля церкви.'
  - statement: навпроти будинку
    correct: true
    explanation: Прийменник «навпроти» вимагає родового відмінка.
  - statement: для допомоги
    correct: true
    explanation: Прийменник «для» вимагає родового відмінка.
  - statement: коло річка
    correct: false
    explanation: 'Потрібен родовий відмінок: коло річки.'
  - statement: без зупинки
    correct: true
    explanation: Прийменник «без» вимагає родового відмінка.
  - statement: для брата
    correct: true
    explanation: Прийменник «для» вимагає родового відмінка.
  title: Чи правильно використано форму слова після прийменника?
- id: fill-in-complete-location-descriptions-with-correct-genitive-form
  type: fill-in
  instruction: Вставте правильну форму слова (родовий відмінок)
  items:
  - sentence: Ми живемо біля ____.
    answer: річки
    options:
    - річки
    - річку
    - річка
  - sentence: Аптека знаходиться навпроти ____.
    answer: лікарні
    options:
    - лікарні
    - лікарню
    - лікарня
  - sentence: Я чекаю тебе коло ____.
    answer: зупинки
    options:
    - зупинки
    - зупинку
    - зупинка
  - sentence: Вони зустрілися біля ____.
    answer: вокзалу
    options:
    - вокзалу
    - вокзал
    - вокзалом
  - sentence: Цей пам'ятник стоїть навпроти ____.
    answer: площі
    options:
    - площі
    - площу
    - площа
  - sentence: Новий магазин відкрили коло ____.
    answer: станції
    options:
    - станції
    - станцію
    - станція
  - sentence: Діти граються біля ____.
    answer: будинку
    options:
    - будинку
    - будинок
    - будинком
  - sentence: Студенти читають навпроти ____.
    answer: бібліотеки
    options:
    - бібліотеки
    - бібліотеку
    - бібліотека
  title: Вставте правильну форму слова (родовий відмінок)
- id: match-up-match-ukrainian-prepositional-phrases-to-their-english-equivalents
  type: match-up
  instruction: З'єднайте українські фрази з їхніми англійськими відповідниками
  pairs:
  - left: для відпочинку
    right: for rest
  - left: без сумніву
    right: without a doubt
  - left: біля річки
    right: near the river
  - left: навпроти лікарні
    right: opposite the hospital
  - left: для навчання
    right: for studying
  - left: коло зупинки
    right: by the stop
  - left: без допомоги
    right: without help
  - left: біля вокзалу
    right: near the train station
  title: З'єднайте українські фрази з їхніми англійськими відповідниками
workbook:
- id: wb-fill-in-genitive-endings
  type: fill-in
  instruction: Вставте правильну форму слова у родовому відмінку
  items:
  - sentence: Цей зошит потрібен для ____.
    answer: навчання
    options:
    - навчання
    - навчанню
    - навчанням
  - sentence: Я не можу працювати без ____.
    answer: комп'ютера
    options:
    - комп'ютера
    - комп'ютеру
    - комп'ютер
  - sentence: Ми купили квитки для ____.
    answer: друга
    options:
    - друга
    - другу
    - другом
  - sentence: Вона любить чай без ____.
    answer: цукру
    options:
    - цукру
    - цукра
    - цукром
  - sentence: Це чудове місце для ____.
    answer: відпочинку
    options:
    - відпочинку
    - відпочинка
    - відпочинком
  - sentence: Учень прийшов без ____.
    answer: олівця
    options:
    - олівця
    - олівцю
    - олівцем
  - sentence: Свіже повітря корисне для ____.
    answer: здоров'я
    options:
    - здоров'я
    - здоров'ю
    - здоров'ям
  - sentence: Суп був зовсім без ____.
    answer: солі
    options:
    - солі
    - сілі
    - сіллю
  title: Вставте правильну форму слова у родовому відмінку
- id: wb-error-correction-genitive
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я завжди п'ю каву без молоко.
    error: молоко
    correction: молока
    error_type: word
    options:
    - молока
    - молоку
    - молоком
    explanation: 'Прийменник «без» вимагає родового відмінка: без молока.'
  - sentence: Цей подарунок для мама.
    error: мама
    correction: мами
    error_type: word
    options:
    - мами
    - маму
    - мамі
    explanation: 'Прийменник «для» вимагає родового відмінка: для мами.'
  - sentence: Ми зустрінемося біля театр.
    error: театр
    correction: театру
    error_type: word
    options:
    - театру
    - театра
    - театром
    explanation: 'Прийменник «біля» вимагає родового відмінка: біля театру.'
  - sentence: Він вирішив це завдання без допомога.
    error: допомога
    correction: допомоги
    error_type: word
    options:
    - допомоги
    - допомогу
    - допомогою
    explanation: 'Прийменник «без» вимагає родового відмінка: без допомоги.'
  - sentence: Аптека знаходиться навпроти лікарня.
    error: лікарня
    correction: лікарні
    error_type: word
    options:
    - лікарні
    - лікарню
    - лікарнею
    explanation: 'Прийменник «навпроти» вимагає родового відмінка: навпроти лікарні.'
  - sentence: Ця кімната тільки для відпочинок.
    error: відпочинок
    correction: відпочинку
    error_type: word
    options:
    - відпочинку
    - відпочинка
    - відпочинком
    explanation: 'Прийменник «для» вимагає родового відмінка: для відпочинку.'
  - sentence: Туристи стоять біля площа.
    error: площа
    correction: площі
    error_type: word
    options:
    - площі
    - площу
    - площею
    explanation: 'Прийменник «біля» вимагає родового відмінка: біля площі.'
  - sentence: Я чекаю коло станція метро.
    error: станція
    correction: станції
    error_type: word
    options:
    - станції
    - станцію
    - станцією
    explanation: 'Прийменник «коло» вимагає родового відмінка: коло станції.'
  title: Знайдіть і виправте помилку
