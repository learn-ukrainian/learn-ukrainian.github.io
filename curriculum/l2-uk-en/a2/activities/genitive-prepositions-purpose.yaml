version: '1.0'
module: genitive-prepositions-purpose
level: a2
workbook:
- id: match-up-phrases
  type: match-up
  instruction: З'єднайте українські фрази з англійськими
  pairs:
  - left: для мами
    right: for mom
  - left: для відпочинку
    right: for rest
  - left: для навчання
    right: for studying
  - left: для роботи
    right: for work
  - left: для дітей
    right: for children
  - left: для тебе
    right: for you
  - left: для допомоги
    right: for help
  - left: для здоров'я
    right: for health
- id: tf-grammar-bez
  type: true-false
  instruction: Чи правильно утворена форма слова з прийменником 'без'?
  items:
  - statement: без цукру
    correct: true
    explanation: Слово 'цукор' має закінчення -у в родовому відмінку (Genitive).
  - statement: без цукору
    correct: false
    explanation: 'Голосна ''о'' випадає: цукор -> цукру.'
  - statement: без допомоги
    correct: true
    explanation: Слово 'допомога' має закінчення -и в родовому відмінку.
  - statement: без сумніва
    correct: false
    explanation: 'Абстрактний чоловічий іменник ''сумнів'' має закінчення -у: без
      сумніву.'
  - statement: без зупинки
    correct: true
    explanation: Слово 'зупинка' має закінчення -и в родовому відмінку.
  - statement: без сіль
    correct: false
    explanation: М'який жіночий іменник 'сіль' змінюється на 'солі' в родовому відмінку.
  - statement: без вікна
    correct: true
    explanation: Слово середнього роду 'вікно' має закінчення -а.
  - statement: без ліхтарика
    correct: true
    explanation: Слово 'ліхтарик' (конкретний предмет) має закінчення -а.
- id: fill-in-locations
  type: fill-in
  instruction: Доповніть речення правильною формою іменника в родовому відмінку
  items:
  - sentence: Моя хата знаходиться коло ____.
    answer: річки
    options:
    - річка
    - річку
    - річки
    - річкою
  - sentence: Ми зустрілися біля ____.
    answer: вокзалу
    options:
    - вокзал
    - вокзалу
    - вокзала
    - вокзалом
  - sentence: Новий банк збудували навпроти ____.
    answer: церкви
    options:
    - церква
    - церкву
    - церкви
    - церквою
  - sentence: Наша зупинка знаходиться біля ____.
    answer: лікарні
    options:
    - лікарня
    - лікарні
    - лікарню
    - лікарнею
  - sentence: Вони живуть навпроти ____.
    answer: бібліотеки
    options:
    - бібліотека
    - бібліотеки
    - бібліотеку
    - бібліотекою
  - sentence: Туристи гуляють коло ____.
    answer: площі
    options:
    - площа
    - площі
    - площу
    - площею
  - sentence: Машина стоїть біля ____.
    answer: будинку
    options:
    - будинок
    - будинку
    - будинка
    - будинком
  - sentence: Я чекаю на тебе навпроти ____ метро.
    answer: станції
    options:
    - станція
    - станції
    - станцію
    - станцією
- id: quiz-prepositions
  type: quiz
  instruction: Оберіть правильний прийменник (для, без, біля, навпроти) для кожного
    речення
  items:
  - question: Ця велика кімната — _____ дітей.
    options:
    - для
    - без
    - біля
    - коло
    correct: 0
  - question: Він, _____ сумніву, найкращий лікар у місті.
    options:
    - без
    - для
    - біля
    - навпроти
    correct: 0
  - question: Нова кав'ярня відкрилася _____ нашого офісу.
    options:
    - біля
    - для
    - без
    - із
    correct: 0
  - question: Цей зошит _____ навчання. Це його головне призначення.
    options:
    - для
    - без
    - коло
    - навпроти
    correct: 0
  - question: Я завжди п'ю каву _____ молока.
    options:
    - без
    - для
    - біля
    - коло
    correct: 0
  - question: Їхній балкон знаходиться прямо _____ нашого вікна.
    options:
    - навпроти
    - для
    - без
    - із
    correct: 0
  - question: Ми не можемо поїхати на відпочинок _____ машини.
    options:
    - без
    - для
    - біля
    - навпроти
    correct: 0
  - question: Ця робота дуже важлива, ми не зробимо її _____ вашої допомоги.
    options:
    - без
    - для
    - біля
    - навпроти
    correct: 0
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінковому закінченні (Genitive case)
  items:
  - sentence: Ця кімната для діти.
    error: діти
    correction: дітей
    error_type: word
    options:
    - дітей
    - дітям
    - дітьми
    explanation: Після 'для' іменник 'діти' має стояти в родовому відмінку (для дітей).
  - sentence: Я хочу чай без цукор.
    error: цукор
    correction: цукру
    error_type: word
    options:
    - цукру
    - цукору
    - цукром
    explanation: Після 'без' слово 'цукор' змінюється на 'цукру' (випадає 'о').
  - sentence: Наш намет стоїть біля річка.
    error: річка
    correction: річки
    error_type: word
    options:
    - річки
    - річку
    - річкою
    explanation: Після 'біля' жіночий іменник 'річка' має закінчення -и.
  - sentence: Ми домовилися зустрітися навпроти театр.
    error: театр
    correction: театру
    error_type: word
    options:
    - театру
    - театра
    - театром
    explanation: Після 'навпроти' чоловічий іменник 'театр' має закінчення -у.
  - sentence: Цей подарунок для тато.
    error: тато
    correction: тата
    error_type: word
    options:
    - тата
    - тату
    - татом
    explanation: Після 'для' слово 'тато' має закінчення -а.
  - sentence: Цей суп зовсім без сіль.
    error: сіль
    correction: солі
    error_type: word
    options:
    - солі
    - сілі
    - сіллю
    explanation: Після 'без' м'який іменник 'сіль' змінюється на 'солі'.
- id: group-sort-usage
  type: group-sort
  instruction: Розподіліть слова та фрази за категоріями
  groups:
  - label: Мета або отримувач (для)
    items:
    - для мами
    - для відпочинку
    - для здоров'я
  - label: Відсутність (без)
    items:
    - без цукру
    - без сумніву
    - без допомоги
  - label: Місцезнаходження (біля / навпроти)
    items:
    - біля річки
    - навпроти вокзалу
    - коло будинку
