- type: group-sort
  instruction: Розподіліть фрази за їхнім значенням
  groups:
  - label: Призначення (для кого/чого?)
    items:
    - для мами
    - для відпочинку
    - для здоров'я
  - label: Відсутність (без чого?)
    items:
    - без цукру
    - без проблем
    - без допомоги
  - label: Місцезнаходження (біля/навпроти/коло)
    items:
    - біля школи
    - навпроти банку
    - коло хати
- type: match-up
  instruction: З'єднайте запитання з правильною відповіддю
  pairs:
  - left: Для кого цей подарунок?
    right: Для мами.
  - left: Без чого ти п'єш каву?
    right: Без цукру.
  - left: Де знаходиться аптека?
    right: Біля ринку.
  - left: Навіщо нам цей великий стіл?
    right: Для комфорту.
  - left: Де ми поставимо намет?
    right: Біля річки.
  - left: Що відкрилося навпроти банку?
    right: Нова кав'ярня.
