version: '1.0'
module: plural-nominative-accusative
level: a2
inline:
- id: fill-in-nom-plural
  type: fill-in
  instruction: Напишіть правильну форму множини (називний відмінок)
  items:
  - sentence: Тут стоять нові ____.
    answer: столи
    options:
    - столи
    - столі
    - столів
    - столам
  - sentence: Це мої улюблені ____.
    answer: книжки
    options:
    - книжки
    - книжок
    - книжкам
    - книжками
  - sentence: Великі ____ завжди шумні.
    answer: міста
    options:
    - міста
    - місти
    - міст
    - містам
  - sentence: Мої ____ лежать тут.
    answer: речі
    options:
    - речі
    - річі
    - речей
    - речам
  - sentence: Це мої найкращі ____.
    answer: друзі
    options:
    - друзі
    - други
    - другів
    - друзів
  - sentence: Там граються ____.
    answer: діти
    options:
    - діти
    - дитини
    - дітей
    - дітям
  - sentence: Усі ____ йдуть на роботу.
    answer: люди
    options:
    - люди
    - людини
    - людей
    - людям
  - sentence: У нього блакитні ____.
    answer: очі
    options:
    - очі
    - ока
    - оків
    - очей
  title: Напишіть правильну форму множини (називний відмінок)
- id: sort-animate-inanimate
  type: group-sort
  instruction: Розподіліть слова за категоріями (живі істоти та неживі предмети)
  groups:
  - label: Живі істоти (Animate)
    items:
    - студенти
    - лікарі
    - коти
    - пінгвіни
  - label: Неживі предмети (Inanimate)
    items:
    - заводи
    - телефони
    - книжки
    - міста
  title: Розподіліть слова за категоріями (живі істоти та неживі предмети)
- id: quiz-acc-plural-choice
  type: quiz
  instruction: Оберіть правильну форму знахідного відмінка множини
  items:
  - question: Я бачу нові ____
    options:
    - столи
    - столів
    - столі
    - столам
    correct: 0
  - question: Вона добре знає цих ____
    options:
    - студенти
    - студентів
    - студентам
    - студентами
    correct: 1
  - question: Ми любимо читати цікаві ____
    options:
    - книжок
    - книжки
    - книжкам
    - книжками
    correct: 1
  - question: Він зустрічає своїх ____
    options:
    - друзі
    - друзів
    - другам
    - другами
    correct: 1
  - question: Я купую свіжі ____
    options:
    - овочі
    - овочів
    - овочам
    - овочами
    correct: 0
  - question: Вони годують маленьких ____
    options:
    - птахи
    - птахів
    - птахам
    - птахами
    correct: 1
  - question: Ми бачимо великі ____
    options:
    - міста
    - міст
    - містам
    - містами
    correct: 0
  - question: Олена шукає своїх ____
    options:
    - коти
    - котів
    - котам
    - котами
    correct: 1
  title: Оберіть правильну форму знахідного відмінка множини
workbook:
- id: wb-match-up-singular-plural
  type: match-up
  instruction: З'єднайте форму однини з формою множини
  pairs:
  - left: стіл
    right: столи
  - left: друг
    right: друзі
  - left: дитина
    right: діти
  - left: річ
    right: речі
  - left: місто
    right: міста
  - left: кінь
    right: коні
  title: З'єднайте форму однини з формою множини
- id: wb-true-false-grammar
  type: true-false
  instruction: Правда чи ні? (Правила знахідного відмінка)
  items:
  - statement: Знахідний відмінок для неживих предметів збігається з називним.
    correct: true
    explanation: Так, для неживих предметів ми завжди використовуємо форму називного
      відмінка.
  - statement: Слово «люди» — це множина від слова «любов».
    correct: false
    explanation: Ні, «люди» — це форма множини для слова «людина».
  - statement: Знахідний відмінок для живих істот повністю збігається з родовим відмінком.
    correct: true
    explanation: Так, це головне правило для живих істот у множині.
  - statement: У реченні «Я бачу столи» слово «столи» стоїть у називному відмінку.
    correct: false
    explanation: Ні, тут «столи» — це прямий додаток, тобто знахідний відмінок. Форма
      просто збігається з називним.
  - statement: Слово «друзі» має чергування приголосних (г → з).
    correct: true
    explanation: Так, у множині приголосний «г» змінюється на «з».
  - statement: У реченні «Студенти читають» слово «студенти» стоїть у знахідному відмінку.
    correct: false
    explanation: Ні, тут студенти виконують дію (це підмет), тому це чистий називний
      відмінок.
  title: Правда чи ні? (Правила знахідного відмінка)
- id: wb-unjumble-sentences
  type: unjumble
  instruction: Складіть правильні речення зі слів
  items:
  - words:
    - великі
    - Вони
    - бачать
    - міста.
    correct_order:
    - Вони
    - бачать
    - великі
    - міста.
  - words:
    - котів.
    - своїх
    - дуже
    - любить
    - Вона
    correct_order:
    - Вона
    - дуже
    - любить
    - своїх
    - котів.
  - words:
    - студенти
    - Ці
    - читають
    - книжки.
    - нові
    correct_order:
    - Ці
    - студенти
    - читають
    - нові
    - книжки.
  - words:
    - друзів.
    - Я
    - старих
    - зустрічаю
    - часто
    correct_order:
    - Я
    - часто
    - зустрічаю
    - старих
    - друзів.
  - words:
    - птахів
    - лісі.
    - Ми
    - в
    - шукаємо
    correct_order:
    - Ми
    - шукаємо
    - птахів
    - в
    - лісі.
  - words:
    - на
    - лежать
    - столі.
    - зошити
    - Мої
    correct_order:
    - Мої
    - зошити
    - лежать
    - на
    - столі.
  title: Складіть правильні речення зі слів
