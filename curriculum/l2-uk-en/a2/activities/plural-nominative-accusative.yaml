version: '1.0'
module: plural-nominative-accusative
level: a2
inline:
- id: nominative-plural-fill
  type: fill-in
  instruction: Оберіть правильну форму множини називного відмінка.
  items:
  - sentence: Моя розумна сестра тут, і її _____ також тут.
    answer: сестри
    options:
    - сестри
    - сестер
    - сестро
    - сестра
  - sentence: Головний кухар має професійні сталеві _____.
    answer: ножі
    options:
    - ножі
    - ножів
    - ножам
    - ніж
  - sentence: Усі великі й чисті _____ в будинку відкриті.
    answer: вікна
    options:
    - вікна
    - вікон
    - вікнам
    - вікно
  - sentence: Теплі літні _____ завжди дуже короткі.
    answer: ночі
    options:
    - ночі
    - ночей
    - ночам
    - ніч
  - sentence: Жовті _____ активно їдять свіже зерно.
    answer: курчата
    options:
    - курчата
    - курчат
    - курчатам
    - курча
  - sentence: На вулиці стоять незнайомі _____.
    answer: люди
    options:
    - люди
    - людей
    - людям
    - людина
  - sentence: Мої вірні старі _____ чекають мене на вулиці.
    answer: друзі
    options:
    - друзі
    - друзів
    - друзям
    - друг
  - sentence: Усі південні _____ світу прекрасні.
    answer: моря
    options:
    - моря
    - морів
    - морям
    - море
- id: accusative-animate-sort
  type: group-sort
  instruction: Розподіліть слова у множині на живі істоти та неживі предмети.
  groups:
  - label: Живі істоти (Animate)
    items:
    - студенти
    - коти
    - люди
    - друзі
    - курчата
    - діти
  - label: Неживі предмети (Inanimate)
    items:
    - столи
    - книги
    - міста
    - вікна
    - речі
    - очі
- id: accusative-plural-quiz
  type: quiz
  instruction: Оберіть правильну форму знахідного відмінка (Accusative plural).
  items:
  - question: Я часто згадую ці красиві _____.
    options:
    - очі
    - очей
    - очам
    - очами
    correct: 0
  - question: Ми ввечері обов'язково зустрінемо наших старших _____.
    options:
    - брати
    - братів
    - братам
    - братами
    correct: 1
  - question: Чорний кіт зараз ловить цих швидких _____.
    options:
    - миші
    - мишей
    - мишам
    - мишами
    correct: 1
  - question: Робітники зараз миють ці широкі _____.
    options:
    - вікна
    - вікон
    - вікнам
    - вікнами
    correct: 0
  - question: Вчителька зараз уважно кличе цих маленьких _____.
    options:
    - діти
    - дітей
    - дітям
    - дітьми
    correct: 1
  - question: Дівчинка дуже любить цих милих _____.
    options:
    - кошенята
    - кошенят
    - кошенятам
    - кошенятами
    correct: 1
  - question: Наші друзі часто відвідують ці великі _____.
    options:
    - магазини
    - магазинів
    - магазинам
    - магазинами
    correct: 0
  - question: Малі діти радісно годують цих веселих _____.
    options:
    - собаки
    - собак
    - собакам
    - собаками
    correct: 1
- id: nominative-accusative-context
  type: error-correction
  instruction: Знайдіть і виправте неправильну форму іменника.
  items:
  - sentence: Я добре бачу наші нові студенти в аудиторії.
    error: студенти
    correction: студентів
    error_type: word
    options:
    - студентів
    - студентам
    - студентами
    - студентах
    explanation: Студенти — це живі істоти, тому як додаток (object) ми використовуємо
      форму знахідного відмінка (студентів).
  - sentence: Туристи часто фотографують старі картин.
    error: картин
    correction: картини
    error_type: word
    options:
    - картини
    - картинам
    - картинах
    - картинами
    explanation: Картини — це неживі предмети, тому у знахідному відмінку форма збігається
      з називним.
  - sentence: У парку радісно граються маленькі дітей.
    error: дітей
    correction: діти
    error_type: word
    options:
    - діти
    - дітям
    - дітьми
    - дітях
    explanation: Тут діти самі граються (вони підмет), тому ми використовуємо називний
      відмінок.
  - sentence: Ми часто радо запрошуємо наші добрі сусіди у гості.
    error: сусіди
    correction: сусідів
    error_type: word
    options:
    - сусідів
    - сусідам
    - сусідами
    - сусідах
    explanation: Сусіди — це живі люди, які приймають дію (додаток), тому потрібна
      форма знахідного відмінка (сусідів).
  - sentence: Зелені дерев дають нам приємну тінь влітку.
    error: дерев
    correction: дерева
    error_type: word
    options:
    - дерева
    - деревам
    - деревах
    - деревами
    explanation: Дерева самі дають тінь (вони підмет), тому ми використовуємо називний
      відмінок.
  - sentence: Вона довго шукає своїх зниклих коти.
    error: коти
    correction: котів
    error_type: word
    options:
    - котів
    - котам
    - котами
    - котах
    explanation: Коти — це тварини (живі істоти), тому у знахідному відмінку множини
      вони мають закінчення -ів.
workbook:
- id: match-up-singular-plural
  type: match-up
  instruction: З'єднайте слова в однині з їхньою правильною формою множини.
  pairs:
  - left: стіл
    right: столи
  - left: жінка
    right: жінки
  - left: вікно
    right: вікна
  - left: ніч
    right: ночі
  - left: мати
    right: матері
  - left: друг
    right: друзі
  - left: дитина
    right: діти
  - left: курча
    right: курчата
- id: fill-in-workbook-cases
  type: fill-in
  instruction: Вставте правильну форму множини (називний чи знахідний відмінок) за
    контекстом.
  items:
  - sentence: Ці сучасні _____ працюють кожного дня.
    answer: магазини
    options:
    - магазини
    - магазинів
    - магазинам
    - магазинах
  - sentence: Наші друзі часто відвідують ці великі _____ після роботи.
    answer: магазини
    options:
    - магазини
    - магазинів
    - магазинам
    - магазинах
  - sentence: Молоді _____ зараз уважно слухають дуже цікаву лекцію.
    answer: студенти
    options:
    - студенти
    - студентів
    - студентам
    - студентами
  - sentence: Професор добре бачить усіх цих нових _____.
    answer: студентів
    options:
    - студенти
    - студентів
    - студентам
    - студентами
  - sentence: Маленькі веселі _____ дуже швидко бігають по парку.
    answer: собаки
    options:
    - собаки
    - собак
    - собакам
    - собаками
  - sentence: Малі діти радісно годують цих веселих _____.
    answer: собак
    options:
    - собаки
    - собак
    - собакам
    - собаками
- id: true-false-grammar
  type: true-false
  instruction: Правда чи ні? Прочитайте твердження про форми множини та оберіть правильну
    відповідь.
  items:
  - statement: Неживі предмети у знахідному відмінку множини завжди мають таку ж форму,
      як у називному відмінку.
    correct: true
    explanation: 'Так, для неживих предметів форма множини збігається в обох відмінках
      (наприклад: великі вікна).'
  - statement: Слово «студенти» граматично є неживим предметом.
    correct: false
    explanation: Студенти — це люди, тому вони належать до граматичної групи «живі
      істоти».
  - statement: Живі істоти у знахідному відмінку множини зазвичай мають закінчення
      -ів, -їв або -ей.
    correct: true
    explanation: 'Так, наприклад: братів, студентів, людей, котів.'
  - statement: У реченні «Я бачу великі столи» слово «столи» стоїть у називному відмінку.
    correct: false
    explanation: Ні, тут «столи» приймають дію (що я бачу?), тому це знахідний відмінок,
      який просто збігається за формою з називним.
  - statement: Слова «люди» та «діти» — це унікальні форми множини.
    correct: true
    explanation: 'Так, це особливі слова, де корінь змінюється в множині: людина ->
      люди, дитина -> діти.'
  - statement: Після прийменника «про» ми завжди використовуємо називний відмінок.
    correct: false
    explanation: 'Ні, прийменник «про» завжди вимагає знахідного відмінка (наприклад:
      говоримо про людей).'
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильні речення зі слів. Зверніть увагу на відмінки.
  items:
  - words:
    - фотографують
    - ці
    - Туристи
    - картини.
    - відомі
    - довго
    correct_order:
    - Туристи
    - довго
    - фотографують
    - ці
    - відомі
    - картини.
  - words:
    - кошенят.
    - любить
    - дуже
    - Дівчинка
    - цих
    - милих
    correct_order:
    - Дівчинка
    - дуже
    - любить
    - цих
    - милих
    - кошенят.
  - words:
    - чисті
    - світла.
    - вікна
    - пропускають
    - багато
    - Широкі
    correct_order:
    - Широкі
    - чисті
    - вікна
    - пропускають
    - багато
    - світла.
  - words:
    - ловить
    - кіт
    - швидких
    - мишей.
    - Чорний
    - цих
    correct_order:
    - Чорний
    - кіт
    - ловить
    - цих
    - швидких
    - мишей.
  - words:
    - статті
    - журналісти
    - про
    - людей.
    - Відомі
    - часто
    - пишуть
    correct_order:
    - Відомі
    - журналісти
    - часто
    - пишуть
    - статті
    - про
    - людей.
  - words:
    - на
    - вірні
    - вулиці.
    - чекають
    - друзі
    - Мої
    correct_order:
    - Мої
    - вірні
    - друзі
    - чекають
    - на
    - вулиці.
- id: order-dialogue
  type: order
  instruction: Розставте речення діалогу в правильному порядку.
  items:
  - — Тоді я швидко приготую холодні напої для всіх.
  - — Ми вже купили свіжі фрукти і смачні овочі.
  - — Прийдуть наші нові колеги та старі друзі.
  - — Чудово! А хто саме сьогодні прийде до нас у гості?
  correct_order:
  - 1
  - 3
  - 2
  - 0
