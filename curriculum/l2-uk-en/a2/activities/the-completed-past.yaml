- type: group-sort
  title: "Розподіліть за групами: Рід і число"
  instruction: "Розподіліть дієслова за правильним закінченням (чоловічий, жіночий, середній рід або множина)."
  groups:
    - name: "Чоловічий рід (-в)"
      items: ["зробив", "сказав", "написав", "пішов", "знайшов"]
    - name: "Жіночий рід (-ла)"
      items: ["зробила", "сказала", "написала", "пішла", "знайшла"]
    - name: "Середній рід (-ло)"
      items: ["спрацювало", "зникло", "пройшло", "зійшло", "сталося"]
    - name: "Множина (-ли)"
      items: ["зробили", "сказали", "написали", "пішли", "знайшли"]

- type: match-up
  title: "Знайдіть пару: Процес і результат"
  instruction: "З'єднайте дієслово процесу (недоконаний вид) з його результатом (доконаний вид)."
  pairs:
    - left: "робити"
      right: "зробити"
    - left: "писати"
      right: "написати"
    - left: "читати"
      right: "прочитати"
    - left: "йти"
      right: "піти"
    - left: "розуміти"
      right: "зрозуміти"
    - left: "шукати"
      right: "знайти"
    - left: "казати"
      right: "сказати"
    - left: "бачити"
      right: "побачити"

- type: fill-in
  title: "Оберіть правильне закінчення"
  instruction: "Доповніть речення правильним дієсловом, звертаючи увагу на того, хто виконує дію."
  items:
    - sentence: "Вчора мій брат ________ додому дуже пізно."
      answer: "пішов"
      options: ["пішов", "пішла", "пішли", "пішло"]
    - sentence: "Марія ________ цікаву книгу про історію."
      answer: "прочитала"
      options: ["прочитала", "прочитав", "прочитали", "прочитало"]
    - sentence: "Студенти нарешті ________ це складне правило."
      answer: "зрозуміли"
      options: ["зрозуміли", "зрозумів", "зрозуміла", "зрозуміло"]
    - sentence: "Сонце ________ сьогодні дуже рано."
      answer: "зійшло"
      options: ["зійшло", "зійшов", "зійшла", "зійшли"]
    - sentence: "Архіваріус ________ важливий історичний документ."
      answer: "знайшов"
      options: ["знайшов", "знайшла", "знайшли", "знайшло"]
    - sentence: "Моя колега ________ правду про цю ситуацію."
      answer: "сказала"
      options: ["сказала", "сказав", "сказали", "сказало"]
    - sentence: "Ми ________ правильний вибір."
      answer: "зробили"
      options: ["зробили", "зробив", "зробила", "зробило"]
    - sentence: "Правило ________ ідеально."
      answer: "спрацювало"
      options: ["спрацювало", "спрацював", "спрацювала", "спрацювали"]

- type: error-correction
  title: "Виправте подвійне минуле"
  instruction: "Виправте помилку в реченнях. В українській мові не використовується дієслово 'бути' як допоміжне для завершених дій."
  items:
    - sentence: "Я був зробив цю роботу ще вчора."
      error: "був зробив"
      answer: "зробив"
      error_type: "construction"
      options: ["зробив", "робив", "буду робити", "зробили"]
      explanation: "Для завершеної дії достатньо форми 'зробив'. Дієслово 'бути' не потрібне."
    - sentence: "Вона була написала звіт до кінця дня."
      error: "була написала"
      answer: "написала"
      error_type: "construction"
      options: ["написала", "написали", "писала", "буде писати"]
      explanation: "Допоміжне дієслово не використовується. Правильно: вона написала."
    - sentence: "Студенти були зрозуміли нову тему."
      error: "були зрозуміли"
      answer: "зрозуміли"
      error_type: "construction"
      options: ["зрозуміли", "розуміли", "зрозумів", "будуть розуміти"]
      explanation: "Слово 'зрозуміли' вже означає результат у минулому."
    - sentence: "Директор був сказав правду на зустрічі."
      error: "був сказав"
      answer: "сказав"
      error_type: "construction"
      options: ["сказав", "казав", "сказали", "сказала"]
      explanation: "Форма 'сказав' є самостійною і завершеною."
    - sentence: "Ми були знайшли старий лист у столі."
      error: "були знайшли"
      answer: "знайшли"
      error_type: "construction"
      options: ["знайшли", "шукали", "знайдемо", "знайшла"]
      explanation: "Зайве слово 'були'. Правильно просто 'знайшли'."
    - sentence: "Він був пішов додому раніше."
      error: "був пішов"
      answer: "пішов"
      error_type: "construction"
      options: ["пішов", "йшов", "пішли", "пішла"]
      explanation: "Допоміжне слово не потрібне. Правильно: він пішов."

- type: quiz
  title: "Процес чи результат?"
  instruction: "Оберіть правильне дієслово залежно від того, дія тривала чи завершилася."
  items:
    - question: "Вчора весь вечір я ______ цікаву статтю, але не закінчив."
      explanation: "Дія не завершена, це був процес. Тому використовуємо недоконаний вид."
      options:
        - text: "читав"
          correct: true
        - text: "прочитав"
          correct: false
        - text: "був читав"
          correct: false
        - text: "прочитали"
          correct: false
    - question: "Сьогодні вранці я нарешті ______ цю статтю."
      explanation: "Є результат — дія завершена."
      options:
        - text: "прочитав"
          correct: true
        - text: "читав"
          correct: false
        - text: "був прочитав"
          correct: false
        - text: "читаю"
          correct: false
    - question: "Що ти ______ вчора о п'ятій годині?"
      explanation: "Питання про процес у конкретний момент часу."
      options:
        - text: "робив"
          correct: true
        - text: "зробив"
          correct: false
        - text: "був робив"
          correct: false
        - text: "зробили"
          correct: false
    - question: "Ти вже ______ домашнє завдання?"
      explanation: "Питання про результат — чи є готове завдання."
      options:
        - text: "зробив"
          correct: true
        - text: "робив"
          correct: false
        - text: "був зробив"
          correct: false
        - text: "робиш"
          correct: false
    - question: "Ми довго ______ правильний документ в архіві."
      explanation: "Слово 'довго' вказує на тривалий процес пошуку."
      options:
        - text: "шукали"
          correct: true
        - text: "знайшли"
          correct: false
        - text: "були шукали"
          correct: false
        - text: "знайдемо"
          correct: false
    - question: "І раптом ми ______ той самий документ!"
      explanation: "Раптова зміна і успішний результат пошуку."
      options:
        - text: "знайшли"
          correct: true
        - text: "шукали"
          correct: false
        - text: "були знайшли"
          correct: false
        - text: "шукають"
          correct: false
    - question: "Вона ______ мені цю історію дві години."
      explanation: "Процес говоріння тривав дві години."
      options:
        - text: "розповідала"
          correct: true
        - text: "сказала"
          correct: false
        - text: "була казала"
          correct: false
        - text: "скаже"
          correct: false
    - question: "Вона ______ лише одне слово і пішла."
      explanation: "Одноразова, завершена дія."
      options:
        - text: "сказала"
          correct: true
        - text: "розповідала"
          correct: false
        - text: "казала"
          correct: false
        - text: "розповіла"
          correct: false

- type: unjumble
  title: "Побудуйте розповідь"
  instruction: "Складіть речення в правильному порядку, використовуючи маркери послідовності та доконані дієслова."
  items:
    - words: ["Спочатку", "до", "я", "прийшов", "архіву"]
      answer: "Спочатку я прийшов до архіву"
    - words: ["Потім", "стару", "я", "книгу", "відкрив"]
      answer: "Потім я відкрив стару книгу"
    - words: ["я", "уважно", "текст", "прочитав", "Потім"]
      answer: "Потім я уважно прочитав текст"
    - words: ["я", "в", "знайшов", "тексті", "помилку", "Потім"]
      answer: "Потім я знайшов помилку в тексті"
    - words: ["я", "правильний", "зробив", "висновок", "Нарешті"]
      answer: "Нарешті я зробив правильний висновок"
    - words: ["ми", "роботу", "закінчили", "Нарешті", "успішно"]
      answer: "Нарешті ми успішно закінчили роботу"

- type: fill-in
  title: "Слова-маркери у розповіді"
  instruction: "Вставте правильні маркери послідовності (спочатку, потім, нарешті), щоб створити логічну історію."
  items:
    - sentence: "________ ми зустрілися біля музею, бо це був початок нашого плану."
      answer: "Спочатку"
      options: ["Спочатку", "Потім", "Нарешті", "Завжди"]
    - sentence: "Ми подивилися одну виставку. ________ ми пішли в інший зал."
      answer: "Потім"
      options: ["Потім", "Спочатку", "Нарешті", "Ніколи"]
    - sentence: "Ми гуляли дуже довго і ________ побачили головну картину."
      answer: "нарешті"
      options: ["нарешті", "спочатку", "потім", "часто"]
    - sentence: "________ я не зрозумів ідею, але пізніше все стало ясно."
      answer: "Спочатку"
      options: ["Спочатку", "Потім", "Нарешті", "Знову"]
    - sentence: "Гість прийшов, а ________ почав розповідати цікаву історію."
      answer: "потім"
      options: ["потім", "спочатку", "нарешті", "довго"]
    - sentence: "Після багатьох годин роботи ми ________ знайшли потрібний документ."
      answer: "нарешті"
      options: ["нарешті", "спочатку", "потім", "ще"]
    - sentence: "Щоб зробити каву, ________ потрібно взяти чашку."
      answer: "спочатку"
      options: ["спочатку", "потім", "нарешті", "вже"]
    - sentence: "Він додав воду, а ________ випив напій."
      answer: "потім"
      options: ["потім", "спочатку", "нарешті", "зараз"]

- type: mark-the-words
  title: "Знайдіть завершені дії"
  instruction: "Знайдіть і позначте всі дієслова доконаного виду (результат) у тексті."
  text: "Вчора був складний день. Спочатку я прийшов на роботу дуже рано. Я довго читав старі листи. Потім я знайшов один цікавий факт. Я зрозумів, що це важливо. Я зробив каву. Нарешті я написав звіт і пішов додому."
  answers: ["прийшов", "знайшов", "зрозумів", "зробив", "написав", "пішов"]

- type: error-correction
  title: "Виправте русизми та помилки вибору виду"
  instruction: "Виправте помилки в реченнях: неправильний вид дієслова або русизм."
  items:
    - sentence: "Вона казала мені цю новину вчора ввечері, і я дуже здивувався."
      error: "казала"
      answer: "сказала"
      error_type: "word"
      options: ["сказала", "розповідала", "була казала", "каже"]
      explanation: "Передача новини — це завершена дія (результат). Потрібно використовувати доконаний вид."
    - sentence: "Я кушав яблуко і пішов на роботу."
      error: "кушав"
      answer: "з'їв"
      error_type: "word"
      options: ["з'їв", "їв", "з'їла", "їм"]
      explanation: "'Кушати' — це русизм, до того ж тут потрібен результат: з'їв."
    - sentence: "Ми робили вибір і купили ці квитки."
      error: "робили"
      answer: "зробили"
      error_type: "word"
      options: ["зробили", "робили", "зробив", "були зробили"]
      explanation: "Вибір — це остаточне рішення. Слід казати 'зробили вибір'."
    - sentence: "Після довгої дискусії я нарешті розумів це правило."
      error: "розумів"
      answer: "зрозумів"
      error_type: "word"
      options: ["зрозумів", "зрозуміла", "був розумів", "знаю"]
      explanation: "Для результату (осяяння, розуміння) використовуємо доконаний вид 'зрозумів'."
    - sentence: "Студент брав участь у конференції та отримав диплом."
      error: "брав"
      answer: "взяв"
      error_type: "word"
      options: ["взяв", "брав", "візьме", "бере"]
      explanation: "Як разова завершена подія краще звучить 'взяв участь'."
    - sentence: "Я шукав свої ключі, і раптом я їх шукав у кишені!"
      error: "шукав"
      answer: "знайшов"
      error_type: "word"
      options: ["знайшов", "шукав", "знайшли", "був знайшов"]
      explanation: "Результат процесу пошуку — це дія 'знайшов'."

- type: quiz
  title: "Точність висловлювання"
  instruction: "Оберіть речення, яке найкраще передає зазначений зміст."
  items:
    - question: "Ви хочете сказати, що успішно закінчили писати звіт. Яке речення правильне?"
      explanation: "Для підтвердження готового результату потрібен доконаний вид."
      options:
        - text: "Я написав звіт."
          correct: true
        - text: "Я писав звіт."
          correct: false
        - text: "Я був написав звіт."
          correct: false
        - text: "Я пишу звіт."
          correct: false
    - question: "Як сказати, що ваша сестра успішно дісталася додому?"
      explanation: "Дієслово має узгоджуватися з жіночим родом і передавати результат."
      options:
        - text: "Вона прийшла додому."
          correct: true
        - text: "Вона йшла додому."
          correct: false
        - text: "Вона прийшов додому."
          correct: false
        - text: "Вона була прийшла."
          correct: false
    - question: "Ви знайшли цікавий факт. Як повідомити про це колегам?"
      explanation: "Знаходження — це результат пошуку."
      options:
        - text: "Я знайшов цікавий факт."
          correct: true
        - text: "Я шукав цікавий факт."
          correct: false
        - text: "Я робив цікавий факт."
          correct: false
        - text: "Я був знайшов факт."
          correct: false
    - question: "Сонце з'явилося на небі. Як про це сказати?"
      explanation: "Слово 'сонце' — середнього роду, тому закінчення -ло."
      options:
        - text: "Сонце зійшло."
          correct: true
        - text: "Сонце зійшов."
          correct: false
        - text: "Сонце сходило."
          correct: false
        - text: "Сонце зійшла."
          correct: false
    - question: "Ви хочете почати розповідь про свій ранок. Яке слово краще використати?"
      explanation: "Маркер 'спочатку' вказує на першу дію у послідовності."
      options:
        - text: "Спочатку"
          correct: true
        - text: "Нарешті"
          correct: false
        - text: "Потім"
          correct: false
        - text: "Завжди"
          correct: false
    - question: "Що сказати, коли довгий і важкий проєкт успішно закінчився?"
      explanation: "Маркер 'нарешті' підкреслює фінальний успішний результат."
      options:
        - text: "Нарешті ми закінчили роботу."
          correct: true
        - text: "Спочатку ми закінчили роботу."
          correct: false
        - text: "Ми були закінчили роботу."
          correct: false
        - text: "Ми закінчували роботу."
          correct: false
    - question: "Як правильно повідомити, що ви зробили помилку в документі?"
      explanation: "Помилка тут — результат дії, потрібен доконаний вид."
      options:
        - text: "Я зробив помилку."
          correct: true
        - text: "Я робив помилку."
          correct: false
        - text: "Я був зробив помилку."
          correct: false
        - text: "Я роблю помилку."
          correct: false
    - question: "Як сказати, що багато людей покинули кімнату?"
      explanation: "Для множини використовуємо закінчення -ли."
      options:
        - text: "Люди пішли геть."
          correct: true
        - text: "Люди пішов геть."
          correct: false
        - text: "Люди йшли геть."
          correct: false
        - text: "Люди були пішли."
          correct: false

- type: group-sort
  title: "Дієслова для архіву"
  instruction: "Розподіліть дієслова за їхнім значенням: початок дії, передача інформації чи рух."
  groups:
    - name: "Рух (Motion)"
      items: ["пішов", "прийшов", "приїхав", "вийшов", "увійшов"]
    - name: "Робота з інформацією (Information)"
      items: ["сказав", "написав", "прочитав", "зрозумів", "запам'ятав"]
    - name: "Пошук та результат (Finding/Result)"
      items: ["знайшов", "загубив", "побачив", "зробив", "закінчив"]

- type: unjumble
  title: "Формуємо ідеальні речення"
  instruction: "Складіть речення так, щоб вони звучали природно."
  items:
    - words: ["він", "правду", "сказав", "директору", "Нарешті"]
      answer: "Нарешті він сказав правду директору"
    - words: ["час", "Я", "роботи", "для", "знайшов", "цієї"]
      answer: "Я знайшов час для цієї роботи"
    - words: ["Разом", "ми", "зробили", "правильний", "вибір"]
      answer: "Разом ми зробили правильний вибір"
    - words: ["Вчора", "документ", "вона", "прочитала", "важливий"]
      answer: "Вчора вона прочитала важливий документ"
    - words: ["Архіваріус", "на", "проблему", "відповідь", "дав"]
      answer: "Архіваріус дав відповідь на проблему"
    - words: ["Всі", "текст", "студенти", "написали", "успішно"]
      answer: "Всі студенти успішно написали текст"