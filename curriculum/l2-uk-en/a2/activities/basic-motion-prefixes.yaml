- type: group-sort
  title: "Розподіліть за групами простору"
  instruction: "Розподіліть слова залежно від того, означають вони рух всередину чи назовні."
  groups:
    - name: "Рух всередину (В-)"
      items:
        - "входити"
        - "увійти"
        - "в'їжджати"
        - "в'їхати"
        - "вхід"
    - name: "Рух назовні (Ви-)"
      items:
        - "виходити"
        - "вийти"
        - "виїжджати"
        - "виїхати"
        - "вихід"

- type: match-up
  title: "Знайдіть граматичну пару"
  instruction: "З'єднайте дієслово недоконаного виду (процес) з його парою доконаного виду (результат)."
  pairs:
    - left: "входити"
      right: "увійти (результат)"
    - left: "виходити"
      right: "вийти (результат)"
    - left: "в'їжджати"
      right: "в'їхати (результат)"
    - left: "виїжджати"
      right: "виїхати (результат)"
    - left: "вхід"
      right: "місце, де ми заходимо"
    - left: "вихід"
      right: "місце, де ми залишаємо приміщення"
    - left: "входити в моду"
      right: "ставати популярним"
    - left: "виходити заміж"
      right: "ставати дружиною"

- type: true-false
  title: "Правда чи брехня?"
  instruction: "Прочитайте твердження про дієслова руху і визначте, чи вони правдиві."
  items:
    - statement: "Префікс 'ви-' завжди означає рух назовні."
      correct: true
      explanation: "Так, префікс 'ви-' — це вектор залишення простору."
    - statement: "Після дієслова 'виходити' потрібно використовувати прийменник 'в'."
      correct: false
      explanation: "Ні, ми виходимо 'з' (out of), а не 'в'."
    - statement: "Слово 'в'їхати' пишеться з апострофом."
      correct: true
      explanation: "Апостроф потрібен для милозвучності та роздільної вимови."
    - statement: "Можна сказати 'машина входить у гараж'."
      correct: false
      explanation: "Машина не має ніг, вона може тільки 'в'їжджати'."
    - statement: "Дієслово 'увійти' означає завершений результат (доконаний вид)."
      correct: true
      explanation: "Так, 'увійти' — це доконаний вид, на відміну від 'входити'."
    - statement: "В Україні прийнято вітатися через поріг."
      correct: false
      explanation: "Це вважається поганою прикметою і порушенням етикету."
    - statement: "Слово 'вхід' можна побачити в метро там, де люди йдуть на вулицю."
      correct: false
      explanation: "Там, де люди йдуть на вулицю, висить напис 'Вихід'."
    - statement: "Дієслово 'входити' використовується для руху пішки."
      correct: true
      explanation: "Так, корінь '-ходити' означає рух за допомогою власних ніг."

- type: quiz
  title: "Оберіть правильний варіант"
  instruction: "Оберіть граматично правильне дієслово для кожної ситуації."
  items:
    - question: "Яке дієслово означає рух усередину пішки?"
      explanation: "'Входити' використовується для руху пішки всередину."
      options:
        - text: "входити"
          correct: true
        - text: "виходити"
          correct: false
        - text: "в'їжджати"
          correct: false
        - text: "виїжджати"
          correct: false
    - question: "Що ми кажемо, коли людина залишає кімнату?"
      explanation: "Вектор назовні пішки — це 'виходити'."
      options:
        - text: "Вона виходить з кімнати."
          correct: true
        - text: "Вона входить в кімнату."
          correct: false
        - text: "Вона виїжджає з кімнати."
          correct: false
        - text: "Вона в'їжджає в кімнату."
          correct: false
    - question: "Як правильно описати рух автобуса в місто?"
      explanation: "Автобус — це транспорт, тому використовуємо 'в'їжджає'."
      options:
        - text: "Автобус в'їжджає до міста."
          correct: true
        - text: "Автобус входить до міста."
          correct: false
        - text: "Автобус виїжджає до міста."
          correct: false
        - text: "Автобус виходить до міста."
          correct: false
    - question: "Який прийменник ми використовуємо з дієсловом 'виходити'?"
      explanation: "Вектор назовні завжди працює з прийменником 'з' або 'із'."
      options:
        - text: "з / із"
          correct: true
        - text: "в / у"
          correct: false
        - text: "на"
          correct: false
        - text: "до"
          correct: false
    - question: "Яке слово має доконаний вид (означає результат)?"
      explanation: "'Увійти' — це завершена дія (доконаний вид)."
      options:
        - text: "увійти"
          correct: true
        - text: "входити"
          correct: false
        - text: "виходити"
          correct: false
        - text: "ходити"
          correct: false
    - question: "Як правильно перекласти 'Emergency exit'?"
      explanation: "Правильний переклад — 'Запасний вихід'."
      options:
        - text: "Запасний вихід"
          correct: true
        - text: "Запасний вхід"
          correct: false
        - text: "Головний вихід"
          correct: false
        - text: "Екстрений вхід"
          correct: false
    - question: "Що означає ідіома 'входити в моду'?"
      explanation: "Ця ідіома означає 'ставати популярним'."
      options:
        - text: "ставати популярним"
          correct: true
        - text: "купувати новий одяг"
          correct: false
        - text: "працювати моделлю"
          correct: false
        - text: "забувати старі речі"
          correct: false
    - question: "Чому ми пишемо слово 'в'їхати' з апострофом?"
      explanation: "Апостроф розділяє приголосний та голосний для милозвучності."
      options:
        - text: "Для роздільної вимови звуків."
          correct: true
        - text: "Тому що це минулий час."
          correct: false
        - text: "Бо це іншомовне слово."
          correct: false
        - text: "Щоб показати доконаний вид."
          correct: false

- type: fill-in
  title: "Вставте пропущене слово"
  instruction: "Оберіть правильне дієслово для кожного речення."
  items:
    - sentence: "Кожного ранку я _____ з дому о восьмій годині."
      answer: "виходжу"
      options:
        - "виходжу"
        - "входжу"
        - "виїжджаю"
        - "в'їжджаю"
      explanation: "Пішки з дому назовні — це 'виходжу'."
    - sentence: "Мій колега щодня _____ на парковку біля офісу."
      answer: "в'їжджає"
      options:
        - "в'їжджає"
        - "входить"
        - "виїжджає"
        - "виходить"
      explanation: "На парковку (всередину) на транспорті — це 'в'їжджає'."
    - sentence: "Вибачте, ви _____ на наступній станції метро?"
      answer: "виходите"
      options:
        - "виходите"
        - "входите"
        - "виїжджаєте"
        - "в'їжджаєте"
      explanation: "У метро ми запитуємо 'виходите' (назовні пішки)."
    - sentence: "Я хочу _____ у цю кімнату, але двері зачинені."
      answer: "увійти"
      options:
        - "увійти"
        - "вийти"
        - "в'їхати"
        - "виїхати"
      explanation: "Рух усередину пішки (одноразова дія) — 'увійти'."
    - sentence: "Влітку моя сестра _____ заміж за українця."
      answer: "виходить"
      options:
        - "виходить"
        - "входить"
        - "виїжджає"
        - "в'їжджає"
      explanation: "'Виходити заміж' — це стала ідіома."
    - sentence: "Поїзд повільно _____ зі станції Київ-Пасажирський."
      answer: "виїжджає"
      options:
        - "виїжджає"
        - "виходить"
        - "в'їжджає"
        - "входить"
      explanation: "Поїзд — транспорт, рух назовні (звідки?) — 'виїжджає'."
    - sentence: "Широкі джинси знову _____ в моду цього року."
      answer: "входять"
      options:
        - "входять"
        - "виходять"
        - "в'їжджають"
        - "виїжджають"
      explanation: "Ідіома 'входити в моду'."
    - sentence: "Студенти _____ в аудиторію і сідають на свої місця."
      answer: "входять"
      options:
        - "входять"
        - "виходять"
        - "увійдуть"
        - "вийдуть"
      explanation: "Регулярний процес руху всередину — 'входять'."

- type: unjumble
  title: "Побудуйте речення"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["Я", "виходжу", "з", "дому", "рано"]
      answer: "Я виходжу з дому рано"
    - words: ["Він", "в'їжджає", "в", "гараж", "ввечері"]
      answer: "Він в'їжджає в гараж ввечері"
    - words: ["Вони", "входять", "у", "великий", "магазин"]
      answer: "Вони входять у великий магазин"
    - words: ["Машина", "швидко", "виїжджає", "на", "вулицю"]
      answer: "Машина швидко виїжджає на вулицю"
    - words: ["Ми", "хочемо", "увійти", "в", "цей", "музей"]
      answer: "Ми хочемо увійти в цей музей"
    - words: ["Сестра", "виходить", "заміж", "наступного", "літа"]
      answer: "Сестра виходить заміж наступного літа"

- type: error-correction
  title: "Виправте помилки в реченнях"
  instruction: "Знайдіть і виправте неправильне слово в кожному реченні."
  items:
    - sentence: "Я виходжу в магазину."
      error: "в"
      answer: "з"
      options: ["з", "на", "до", "під"]
      explanation: "Після дієслова 'виходити' використовуємо прийменник 'з'."
    - sentence: "Машина входить у гараж."
      error: "входить"
      answer: "в'їжджає"
      options: ["в'їжджає", "виходить", "заходить", "йде"]
      explanation: "Машина не ходить пішки, вона 'в'їжджає'."
    - sentence: "Він виїжджає на Києва."
      error: "на"
      answer: "з"
      options: ["з", "в", "у", "від"]
      explanation: "Рух назовні (звідки?) вимагає прийменника 'з'."
    - sentence: "Водій виходить з парковки на машині."
      error: "виходить"
      answer: "виїжджає"
      options: ["виїжджає", "в'їжджає", "йде", "входить"]
      explanation: "Якщо дія на машині, треба казати 'виїжджає'."
    - sentence: "Цей стиль одягу виходить в моду."
      error: "виходить"
      answer: "входить"
      options: ["входить", "йде", "їде", "в'їжджає"]
      explanation: "Правильна ідіома — 'входити в моду'."
    - sentence: "На дверях метро написано Вїзд."
      error: "Вїзд"
      answer: "Вхід"
      options: ["Вхід", "Вихід", "Прохід", "Захід"]
      explanation: "У метро пишуть 'Вхід' або 'Вихід'."

- type: select
  title: "Множинний вибір"
  instruction: "Оберіть всі правильні варіанти для кожного запитання."
  items:
    - question: "Які слова означають рух усередину?"
      min_correct: 2
      explanation: "Префікс в-/у- вказує на рух усередину."
      options:
        - text: "входити"
          correct: true
        - text: "увійти"
          correct: true
        - text: "виходити"
          correct: false
        - text: "виїхати"
          correct: false
    - question: "Які дієслова використовуються для руху на транспорті?"
      min_correct: 2
      explanation: "Корінь -їжджати/-їхати означає транспорт."
      options:
        - text: "в'їжджати"
          correct: true
        - text: "виїхати"
          correct: true
        - text: "входити"
          correct: false
        - text: "вийти"
          correct: false
    - question: "З якими прийменниками часто використовують префікс В-?"
      min_correct: 2
      explanation: "Вектор всередину працює з 'в/у' або 'на'."
      options:
        - text: "в / у"
          correct: true
        - text: "на"
          correct: true
        - text: "з / із"
          correct: false
        - text: "від"
          correct: false
    - question: "Які з цих слів означають завершений результат (доконаний вид)?"
      min_correct: 2
      explanation: "Слова 'увійти' та 'виїхати' означають результат."
      options:
        - text: "увійти"
          correct: true
        - text: "виїхати"
          correct: true
        - text: "входити"
          correct: false
        - text: "виїжджати"
          correct: false
    - question: "Які написи можна побачити на дверях у Києві?"
      min_correct: 2
      explanation: "На дверях пишуть 'Вхід' або 'Вихід'."
      options:
        - text: "Вхід"
          correct: true
        - text: "Вихід"
          correct: true
        - text: "В'їзд"
          correct: false
        - text: "Виїзд"
          correct: false
    - question: "Які фрази є українськими ідіомами?"
      min_correct: 2
      explanation: "'Входити в моду' та 'виходити заміж' — це ідіоми."
      options:
        - text: "входити в моду"
          correct: true
        - text: "виходити заміж"
          correct: true
        - text: "виходити в магазин"
          correct: false
        - text: "входити в кімнату"
          correct: false

- type: mark-the-words
  title: "Знайдіть дієслова руху з префіксами"
  instruction: "Прочитайте текст і позначте всі дієслова руху, які мають префікси в- або ви-."
  text: "О сьомій годині ранку я виходжу з квартири. Я сідаю в машину і виїжджаю на вулицю. Через двадцять хвилин я в'їжджаю на парковку біля офісу. Я залишаю авто, йду до дверей і входжу в будівлю. Ввечері ми виходимо з роботи і знову в'їжджаємо у свої двори."
  answers:
    - "виходжу"
    - "виїжджаю"
    - "в'їжджаю"
    - "входжу"
    - "виходимо"
    - "в'їжджаємо"

- type: translate
  title: "Перекладіть англійські фрази"
  instruction: "Оберіть правильний український переклад для кожної ситуації."
  items:
    - source: "He is entering the room."
      explanation: "Пішки всередину — 'входить'."
      options:
        - text: "Він входить у кімнату."
          correct: true
        - text: "Він виходить з кімнати."
          correct: false
        - text: "Він в'їжджає в кімнату."
