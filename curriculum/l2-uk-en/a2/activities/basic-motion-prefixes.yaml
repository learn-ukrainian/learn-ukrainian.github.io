        - text: "Він виїжджає з кімнати."
          correct: false
    - source: "She is exiting the building."
      explanation: "Пішки назовні — 'виходить'."
      options:
        - text: "Вона виходить з будівлі."
          correct: true
        - text: "Вона входить у будівлю."
          correct: false
        - text: "Вона виїжджає з будівлі."
          correct: false
        - text: "Вона в'їжджає в будівлю."
          correct: false
    - source: "The bus drives into the city."
      explanation: "Транспорт всередину — 'в'їжджає'."
      options:
        - text: "Автобус в'їжджає до міста."
          correct: true
        - text: "Автобус виїжджає з міста."
          correct: false
        - text: "Автобус входить у місто."
          correct: false
        - text: "Автобус виходить з міста."
          correct: false
    - source: "They are leaving the parking lot."
      explanation: "Транспорт назовні — 'виїжджають'."
      options:
        - text: "Вони виїжджають з парковки."
          correct: true
        - text: "Вони в'їжджають на парковку."
          correct: false
        - text: "Вони виходять з парковки."
          correct: false
        - text: "Вони входять на парковку."
          correct: false
    - source: "I entered the system (logged in)."
      explanation: "Доконаний вид (результат) — 'увійшов'."
      options:
        - text: "Я увійшов у систему."
          correct: true
        - text: "Я входжу в систему."
          correct: false
        - text: "Я вийшов з системи."
          correct: false
        - text: "Я виходжу з системи."
          correct: false
    - source: "Emergency exit"
      explanation: "Стандартний напис — 'запасний вихід'."
      options:
        - text: "Запасний вихід"
          correct: true
        - text: "Запасний вхід"
          correct: false
        - text: "Головний вихід"
          correct: false
        - text: "Головний вхід"
          correct: false

- type: fill-in
  title: "Вставте правильний прийменник"
  instruction: "Оберіть прийменник, який підходить до дієслова руху."
  items:
    - sentence: "Студенти входять _____ аудиторію."
      answer: "в"
      options:
        - "в"
        - "з"
        - "біля"
        - "під"
      explanation: "Рух у закритий простір вимагає прийменника 'в'."
    - sentence: "Я виходжу _____ магазину з покупками."
      answer: "з"
      options:
        - "з"
        - "в"
        - "на"
        - "до"
      explanation: "Рух назовні вимагає прийменника 'з'."
    - sentence: "Він виходить _____ балкон подихати повітрям."
      answer: "на"
      options:
        - "на"
        - "з"
        - "в"
        - "під"
      explanation: "Балкон — це відкрита поверхня, тому кажемо 'на балкон'."
    - sentence: "Ми в'їжджаємо _____ головну вулицю міста."
      answer: "на"
      options:
        - "на"
        - "з"
        - "в"
        - "до"
      explanation: "Вулиця — відкритий простір, тому 'на вулицю'."
    - sentence: "Вони виїжджають _____ парковки."
      answer: "з"
      options:
        - "з"
        - "на"
        - "в"
        - "до"
      explanation: "Рух назовні — прийменник 'з'."
    - sentence: "Жінка увійшла _____ кав'ярню."
      answer: "в"
      options:
        - "в"
        - "з"
        - "на"
        - "біля"
      explanation: "Кав'ярня — закритий простір, рух всередину ('в')."
    - sentence: "Поїзд виїхав _____ тунелю."
      answer: "з"
      options:
        - "з"
        - "в"
        - "на"
        - "до"
      explanation: "Рух назовні з тунелю — 'з'."
    - sentence: "Машина в'їхала _____ двір."
