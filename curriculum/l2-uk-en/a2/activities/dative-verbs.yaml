    - sentence: 'Нам ___ українська кухня.'
      answer: 'подобається'
      options: ['подобається', 'подобаються', 'подобаємо', 'любимо']
      explanation: 'Кухня — однина.'
    - sentence: 'Їй ___ ваші фотографії.'
      answer: 'подобаються'
      options: ['подобаються', 'подобається', 'подобають', 'люблять']
      explanation: 'Фотографії — множина.'
    - sentence: 'Вам ___ наше місто?'
      answer: 'подобається'
      options: ['подобається', 'подобаються', 'подобаєте', 'любите']
      explanation: 'Місто — однина.'
    - sentence: 'Йому не ___ шум.'
      answer: 'подобається'
      options: ['подобається', 'подобаються', 'подобає', 'любить']
      explanation: 'Шум — однина.'
    - sentence: 'Дітям ___ подарунки.'
      answer: 'подобаються'
      options: ['подобаються', 'подобається', 'подобають', 'люблять']
      explanation: 'Подарунки — множина.'
    - sentence: 'Мені ___ читати книги.'
      answer: 'подобається'
      options: ['подобається', 'подобаються', 'подобає', 'люблю']
      explanation: 'Інфінітив (читати) вимагає однини.'

