version: '1.0'
module: dative-verbs
level: a2
inline:
- id: fill-in-dative-verbs
  type: fill-in
  instruction: Вставте правильну форму слова
  items:
  - sentence: Я часто дзвоню ____.
    answer: другові
    options:
    - другові
    - друга
    - друг
  - sentence: Ми щиро дякуємо ____.
    answer: мамі
    options:
    - маму
    - мамі
    - мама
  - sentence: Цей шум заважає ____ працювати.
    answer: мені
    options:
    - мене
    - мені
    - я
  - sentence: Лікар радить ____ більше відпочивати.
    answer: братові
    options:
    - брата
    - братові
    - брат
  - sentence: Син завжди допомагає ____.
    answer: батькові
    options:
    - батька
    - батькові
    - батько
  - sentence: Студент швидко відповідає ____.
    answer: викладачеві
    options:
    - викладача
    - викладачеві
    - викладач
  - sentence: Ніколи не заважай ____.
    answer: їй
    options:
    - її
    - їй
    - вона
  - sentence: Вони завжди допомагають ____.
    answer: нам
    options:
    - нас
    - нам
    - ми
- id: match-up-podobatysia
  type: match-up
  instruction: З'єднайте речення з їхнім перекладом
  pairs:
  - left: Мені подобається це місто.
    right: I like this city.
  - left: Тобі подобається ця пісня?
    right: Do you like this song?
  - left: Йому не подобається чай.
    right: He does not like tea.
  - left: Їй подобаються квіти.
    right: She likes flowers.
  - left: Нам подобався цей фільм.
    right: We liked this film.
  - left: Вам подобалося море?
    right: Did you like the sea?
  - left: Їм подобалися ті фотографії.
    right: They liked those photographs.
  - left: Моєму другові подобається працювати вдома.
    right: My friend likes working at home.
- id: true-false-age
  type: true-false
  instruction: Правда чи ні? Оцініть граматичну правильність віку
  items:
  - statement: Моєму братові двадцять один роки.
    correct: false
    explanation: Після числа 1, 21, 31 тощо ми використовуємо слово «рік».
  - statement: Моїй сестрі двадцять два роки.
    correct: true
    explanation: Після чисел 2, 3, 4 ми використовуємо форму «роки».
  - statement: Дідусеві шістдесят п'ять років.
    correct: true
    explanation: Після числа 5 і більше ми використовуємо форму «років».
  - statement: Мені п'ятнадцять рік.
    correct: false
    explanation: Після чисел від 11 до 19 ми завжди використовуємо форму «років».
  - statement: Йому тільки чотири років.
    correct: false
    explanation: Після числа 4 ми використовуємо форму «роки».
  - statement: Цій дитині один рік.
    correct: true
    explanation: Після числа 1 використовується форма «рік».
  - statement: Моїй мамі сорок років.
    correct: true
    explanation: Для круглих десятків використовується форма «років».
  - statement: Нашому другові тридцять три років.
    correct: false
    explanation: Після числа 3 (і 33, 43 тощо) ми використовуємо форму «роки».
- id: quiz-dative-vs-accusative
  type: quiz
  instruction: 'Оберіть правильний відмінок: давальний чи знахідний?'
  items:
  - question: Я бачу ____ на вулиці.
    options:
    - мама
    - маму
    - мамі
    - мамою
    correct: 1
  - question: Я допомагаю ____ вдома.
    options:
    - мама
    - маму
    - мамі
    - мамою
    correct: 2
  - question: Він дуже любить ____.
    options:
    - брат
    - брата
    - братові
    - братом
    correct: 1
  - question: Він завжди радить ____.
    options:
    - брат
    - брата
    - братові
    - братом
    correct: 2
  - question: Ми чекаємо ____ біля школи.
    options:
    - сестра
    - сестру
    - сестрі
    - сестрою
    correct: 1
  - question: Ми дзвонимо ____ кожного вечора.
    options:
    - сестра
    - сестру
    - сестрі
    - сестрою
    correct: 2
  - question: Вона добре знає цього ____.
    options:
    - лікар
    - лікаря
    - лікареві
    - лікарем
    correct: 1
  - question: Вона щиро дякує ____.
    options:
    - лікар
    - лікаря
    - лікареві
    - лікарем
    correct: 2
