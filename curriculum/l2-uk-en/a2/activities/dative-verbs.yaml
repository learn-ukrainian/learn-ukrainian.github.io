workbook:
- id: wb-group-sort-cases
  type: group-sort
  instruction: 'Розподіліть дієслова: які вимагають давального відмінка, а які — знахідного?'
  groups:
  - label: Давальний відмінок (кому?)
    items:
    - допомагати
    - дякувати
    - дзвонити
    - радити
    - заважати
    - відповідати
  - label: Знахідний відмінок (кого? що?)
    items:
    - бачити
    - чекати
    - любити
    - знати
    - кликати
    - купувати
- id: wb-error-correction-dative
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Я дякую вас за допомогу.
    error: вас
    correction: вам
    error_type: word
    options:
    - вам
    - ви
    - вами
    explanation: 'Дієслово «дякувати» вимагає давального відмінка: дякую кому? — вам.'
  - sentence: Мені подобається ці красиві квіти.
    error: подобається
    correction: подобаються
    error_type: word
    options:
    - подобаються
    - подобаюся
    - подобаємося
    explanation: Слово «квіти» у множині, тому дієслово має бути у формі множини —
      «подобаються».
  - sentence: Моєму братові двадцять один роки.
    error: роки
    correction: рік
    error_type: word
    options:
    - рік
    - років
    - роком
    explanation: Для числа 21 використовується форма «рік».
  - sentence: Він часто дзвонить до мами.
    error: до мами
    correction: мамі
    error_type: construction
    options:
    - маму
    - мамі
    - на маму
    explanation: 'З дієсловом «дзвонити» ми використовуємо давальний відмінок без
      прийменника: дзвонить мамі.'
  - sentence: Вона дуже заважає мене.
    error: мене
    correction: мені
    error_type: word
    options:
    - мені
    - я
    - мною
    explanation: 'Дієслово «заважати» вимагає давального відмінка: заважає кому? —
      мені.'
  - sentence: Скільки ти років?
    error: ти
    correction: тобі
    error_type: word
    options:
    - тобі
    - тебе
    - тобою
    explanation: 'Для віку ми використовуємо давальний відмінок: тобі.'
