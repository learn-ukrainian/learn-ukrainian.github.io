- type: quiz
  title: 'Перевірка розуміння: Кому чи Кого?'
  instruction: 'Виберіть правильне запитання до виділеного слова. Це адресат дії (Кому?) чи об’єкт (Кого/Що?)?'
  items:
    - question: 'Я сьогодні ввечері телефоную своїй **мамі**.'
      explanation: 'Дієслово "телефонувати" вимагає Давального відмінка (адресат).'
      options:
        - text: 'Кому?'
          correct: true
        - text: 'Кого?'
          correct: false
        - text: 'Що?'
          correct: false
        - text: 'Хто?'
          correct: false
    - question: 'Ми щиро дякуємо нашим сміливим **волонтерам**.'
      explanation: 'Дієслово "дякувати" завжди вживається з Давальним відмінком.'
      options:
        - text: 'Кому?'
          correct: true
        - text: 'Кого?'
          correct: false
        - text: 'Ким?'
          correct: false
        - text: 'Чому?'
          correct: false
    - question: 'Вона часто бачить свою найкращу **подругу**.'
      explanation: 'Дієслово "бачити" вимагає Знахідного відмінка (прямий об’єкт).'
      options:
        - text: 'Кого?'
          correct: true
        - text: 'Кому?'
          correct: false
        - text: 'Ким?'
          correct: false
        - text: 'Чому?'
          correct: false
    - question: 'Ця дуже гучна музика заважає **сусідам**.'
      explanation: 'Дієслово "заважати" вимагає Давального відмінка.'
      options:
        - text: 'Кому?'
          correct: true
        - text: 'Кого?'
          correct: false
        - text: 'Хто?'
          correct: false
        - text: 'Що?'
          correct: false
    - question: 'Студент зараз читає дуже цікаву **книгу**.'
      explanation: 'Дієслово "читати" вимагає Знахідного відмінка.'
      options:
        - text: 'Що?'
          correct: true
        - text: 'Чому?'
          correct: false
        - text: 'Кому?'
          correct: false
        - text: 'Чим?'
          correct: false
    - question: 'Викладач детально пояснює нове правило **студентові**.'
      explanation: 'Студент є адресатом пояснення, тому вживаємо Давальний відмінок.'
      options:
        - text: 'Кому?'
          correct: true
        - text: 'Кого?'
          correct: false
        - text: 'Хто?'
          correct: false
        - text: 'Що?'
          correct: false
    - question: 'Я дуже люблю свою рідну **сестру**.'
      explanation: 'Дієслово "любити" вимагає Знахідного відмінка.'
      options:
        - text: 'Кого?'
          correct: true
        - text: 'Кому?'
          correct: false
        - text: 'Ким?'
          correct: false
        - text: 'Чому?'
          correct: false
    - question: 'Лікар допомагає хворому **пацієнтові** одужати.'
      explanation: 'Дієслово "допомагати" завжди вимагає Давального відмінка.'
      options:
        - text: 'Кому?'
          correct: true
        - text: 'Кого?'
          correct: false
        - text: 'Хто?'
          correct: false
        - text: 'Ким?'
          correct: false

- type: group-sort
  title: 'Сортування дієслів'
  instruction: 'Розподіліть дієслова на дві групи: ті, що вимагають Давального відмінка (Кому?), і ті, що вимагають Знахідного (Кого/Що?).'
