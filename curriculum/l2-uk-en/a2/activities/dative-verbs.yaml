- id: workbook-group-sort
  type: group-sort
  instruction: Розподіліть дієслова за відмінком, який вони вимагають
  groups:
  - label: Давальний (Dative)
    items:
    - допомагати
    - дякувати
    - дзвонити
    - радити
    - заважати
    - відповідати
  - label: Знахідний (Accusative)
    items:
    - бачити
    - знати
    - любити
    - чекати
- id: workbook-translate
  type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: He is twenty years old.
    options:
    - text: Йому двадцять років.
      correct: true
    - text: Він двадцять років.
      correct: false
    - text: Йому двадцять рік.
      correct: false
  - source: I like this book.
    options:
    - text: Мені подобається ця книга.
      correct: true
    - text: Я подобаю цю книгу.
      correct: false
    - text: Мені подобаються ця книга.
      correct: false
  - source: We thank you very much.
    options:
    - text: Ми дуже дякуємо вам.
      correct: true
    - text: Ми дуже дякуємо вас.
      correct: false
    - text: Ми дуже дякувати вам.
      correct: false
  - source: She calls her friend.
    options:
    - text: Вона дзвонить подрузі.
      correct: true
    - text: Вона дзвонить подругу.
      correct: false
    - text: Їй дзвонить подруга.
      correct: false
  - source: Do you like these mountains?
    options:
    - text: Вам подобаються ці гори?
      correct: true
    - text: Вам подобається ці гори?
      correct: false
    - text: Ви подобаєте ці гори?
      correct: false
  - source: I advise him to rest.
    options:
    - text: Я раджу йому відпочивати.
      correct: true
    - text: Я раджу його відпочивати.
      correct: false
    - text: Мені радить він відпочивати.
      correct: false
- id: workbook-match-up-vocab
  type: match-up
  instruction: З'єднайте дієслово з його англійським перекладом
  pairs:
  - left: довіряти
    right: to trust
  - left: вибачати
    right: to forgive
  - left: посміхатися
    right: to smile
  - left: співчувати
    right: to sympathize
  - left: заздрити
    right: to envy
  - left: заважати
    right: to bother
- id: workbook-fill-in-vocab
  type: fill-in
  instruction: Вставте правильне дієслово за змістом
  items:
  - sentence: Я завжди ______ своїй мамі.
    answer: довіряю
    options:
    - довіряю
    - заздрю
    - заважаю
  - sentence: Ти часто ______ друзям?
    answer: посміхаєшся
    options:
    - посміхаєшся
    - вибачаєш
    - радиш
  - sentence: Ми ______ людям, у яких проблеми.
    answer: співчуваємо
    options:
    - співчуваємо
    - заздримо
    - довіряємо
  - sentence: Вона ніколи не ______ успіхам інших.
    answer: заздрить
    options:
    - заздрить
    - вибачає
    - співчуває
  - sentence: Вчитель завжди ______ нам хороші книги.
    answer: радить
    options:
    - радить
    - заважає
    - вибачає
  - sentence: Ти завжди ______ мені працювати!
    answer: заважаєш
    options:
    - заважаєш
    - довіряєш
    - посміхаєшся
