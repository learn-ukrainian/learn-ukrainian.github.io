      answer: 'Я дякую тобі за твою допомогу'
    - words: ['не', 'Мені', 'фільм', 'цей', 'подобається', 'новий']
      answer: 'Мені не подобається цей новий фільм'
    - words: ['заважає', 'музика', 'спати', 'нашим', 'сусідам', 'Гучна']
      answer: 'Гучна музика заважає нашим сусідам спати'
