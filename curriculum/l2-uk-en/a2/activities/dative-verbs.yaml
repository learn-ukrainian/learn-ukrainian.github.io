- id: workbook-adjectives-error-correction
  type: error-correction
  instruction: Знайдіть помилку в узгодженні прикметника й іменника
  items:
  - sentence: Я дзвоню старший братові.
    error: старший
    correction: старшому
    error_type: word
    options:
    - старшому
    - старшого
    - старшим
    explanation: Прикметник має бути в давальному відмінку (якому?), як і іменник.
  - sentence: Мені подобається велика місто.
    error: велика
    correction: велике
    error_type: word
    options:
    - велике
    - великий
    - великі
    explanation: Слово «місто» — середнього роду, тому прикметник має бути «велике».
  - sentence: Тобі подобається новий квартира.
    error: новий
    correction: нова
    error_type: word
    options:
    - нова
    - нове
    - нові
    explanation: Слово «квартира» — жіночого роду.
  - sentence: Йому подобаються старий фільми.
    error: старий
    correction: старі
    error_type: word
    options:
    - старі
    - старого
    - старим
    explanation: Слово «фільми» — множина, тому прикметник має бути «старі».
  - sentence: Вона посміхається малий дитині.
    error: малий
    correction: малій
    error_type: word
    options:
    - малій
    - малу
    - малою
    explanation: Іменник «дитині» у давальному відмінку жіночого роду, тому потрібна
      форма «малій».
  - sentence: Ми дякуємо хороший вчителю.
    error: хороший
    correction: хорошому
    error_type: word
    options:
    - хорошому
    - хорошого
    - хорошим
    explanation: Прикметник узгоджується з іменником «вчителю» у давальному відмінку.
  title: Знайдіть помилку в узгодженні прикметника й іменника
