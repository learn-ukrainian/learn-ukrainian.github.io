- id: workbook-vocab-odd-one-out
  type: odd-one-out
  instruction: 'Четверте зайве: оберіть слово, що не належить до групи'
  items:
  - words:
    - допомагати
    - дякувати
    - дзвонити
    - бачити
    correct: 3
    explanation: «Бачити» вимагає знахідного відмінка, а інші — давального.
  - words:
    - рік
    - роки
    - років
    - вікно
    correct: 3
    explanation: «Вікно» не пов'язане з віком.
  - words:
    - мені
    - тобі
    - нас
    - йому
    correct: 2
    explanation: «Нас» — це знахідний відмінок, інші — давальний.
  - words:
    - братові
    - вчителю
    - другові
    - подругу
    correct: 3
    explanation: «Подругу» — знахідний відмінок, інші — давальний.
  - words:
    - подобається
    - подобаються
    - подобалася
    - допомагає
    correct: 3
    explanation: «Допомагає» — це інше дієслово, інші — форми «подобатися».
  - words:
    - один
    - двадцять
    - сорок
    - дуже
    correct: 3
    explanation: «Дуже» — це не числівник.
