- type: translate
  title: 'Переклад конструкцій "Мені подобається"'
  instruction: 'Виберіть правильний переклад англійського речення українською мовою.'
  items:
    - source: 'I like this book.'
      options:
        - text: 'Мені подобається ця книга.'
          correct: true
        - text: 'Я подобаю цю книгу.'
          correct: false
        - text: 'Я люблю ця книга.'
          correct: false
        - text: 'Мені любить ця книга.'
          correct: false
      explanation: 'В українській мові використовуємо конструкцію "Мені (Давальний) подобається (дієслово) книга (Називний)".'
    - source: 'Do you like Kyiv?'
      options:
        - text: 'Тобі подобається Київ?'
          correct: true
        - text: 'Ти подобаєш Київ?'
          correct: false
        - text: 'Тобі любить Київ?'
          correct: false
        - text: 'Ти любиш Київ?'
          correct: false
      explanation: 'Правильна форма запитання: "Тобі подобається...?"'
    - source: 'He likes cars.'
      options:
        - text: 'Йому подобаються машини.'
          correct: true
        - text: 'Він подобає машини.'
          correct: false
        - text: 'Йому подобається машини.'
          correct: false
        - text: 'Він любить машини.'
          correct: false
      explanation: 'Оскільки "машини" — множина, дієслово теж має бути у множині: "подобаються".'
    - source: 'We like Ukrainian music.'
      options:
        - text: 'Нам подобається українська музика.'
          correct: true
        - text: 'Ми подобаємо українську музику.'
          correct: false
        - text: 'Нас подобається українська музика.'
          correct: false
        - text: 'Нам любить українська музика.'
          correct: false
      explanation: 'Ми -> Нам (Давальний відмінок).'
    - source: 'She does not like rain.'
      options:
        - text: 'Їй не подобається дощ.'
          correct: true
        - text: 'Вона не подобає дощ.'
          correct: false
        - text: 'Її не подобається дощ.'
          correct: false
        - text: 'Їй не любить дощ.'
          correct: false
      explanation: 'Вона -> Їй (Давальний відмінок).'
    - source: 'They like gifts.'
      options:
        - text: 'Їм подобаються подарунки.'
          correct: true
        - text: 'Вони подобають подарунки.'
          correct: false
        - text: 'Їх подобаються подарунки.'
          correct: false
        - text: 'Їм подобається подарунки.'
          correct: false
      explanation: 'Вони -> Їм (Давальний відмінок).'

- type: mark-the-words
  title: 'Знайдіть адресата'
  instruction: 'Знайдіть і позначте всі слова, які стоять у Давальному відмінку (відповідають на питання Кому?).'
  text: 'Сьогодні свято. Я купив подарунок мамі та квіти сестрі. Тато телефонує братові, щоб привітати його. Ми всі дякуємо бабусі за смачний обід. Потім я допомагаю батькові мити посуд. Нам усім подобається цей день.'
  answers: ['мамі', 'сестрі', 'братові', 'бабусі', 'батькові', 'Нам']

- type: fill-in
  title: 'Займенники у Давальному відмінку'
  instruction: 'Вставте правильний займенник у Давальному відмінку (мені, тобі, йому, їй, нам, вам, їм).'
  items:
    - sentence: 'Я не розумію. Поясніть ___ це правило, будь ласка.'
      answer: 'мені'
      options: ['мені', 'мене', 'я', 'мною']
      explanation: 'Поясніть (кому?) мені.'
    - sentence: 'Привіт, Андрію! Як ___ цей фільм?'
      answer: 'тобі'
      options: ['тобі', 'ти', 'тебе', 'тобою']
      explanation: 'Звертаємося до друга на "ти", отже — тобі.'
    - sentence: 'Це Олена. ___ дуже подобається ця книга.'
      answer: 'Їй'
      options: ['Їй', 'Вона', 'Її', 'Нею']
      explanation: 'Олена (вона) -> Їй.'
    - sentence: 'Де директор? Я маю передати ___ документи.'
      answer: 'йому'
      options: ['йому', 'він', 'його', 'ним']
      explanation: 'Директор (він) -> йому.'
    - sentence: 'Ми волонтери. ___ потрібна ваша допомога.'
      answer: 'Нам'
      options: ['Нам', 'Ми', 'Нас', 'Нами']
      explanation: 'Ми -> Нам.'
    - sentence: 'Шановні колеги, я дякую ___ за роботу.'
      answer: 'Вам'
      options: ['Вам', 'Ви', 'Вас', 'Вами']
      explanation: 'Звертання до групи людей (Ви) -> Вам.'
    - sentence: 'Діти граються. ___ весело.'
      answer: 'Їм'
      options: ['Їм', 'Вони', 'Їх', 'Ними']
      explanation: 'Діти (вони) -> Їм.'
    - sentence: 'Вибачте, я ___ не заважаю?'
      answer: 'Вам'
      options: ['Вам', 'Ви', 'Вас', 'Вами']
      explanation: 'Ввічливе звертання (Ви) -> Вам.'

- type: fill-in
  title: 'Подобається чи Подобаються?'
