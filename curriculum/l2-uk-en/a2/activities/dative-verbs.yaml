    - тобі
    - ти
  - sentence: Вона часто посміхається ____.
    answer: йому
    options:
    - його
    - йому
    - він
  - sentence: Ми щиро співчуваємо ____.
    answer: їм
    options:
    - їх
    - їм
    - вони
  - sentence: Ніколи не заздри ____.
    answer: мені
    options:
    - мене
    - мені
    - я
  - sentence: Мама завжди вибачає ____.
    answer: нам
    options:
    - нас
    - нам
