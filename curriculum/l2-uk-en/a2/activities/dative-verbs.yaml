- type: fill-in
  title: 'Закінчення іменників'
  instruction: 'Впишіть правильне закінчення Давального відмінка (-ові/-еві для чоловічого роду, -і для жіночого).'
  items:
    - sentence: 'Я купую подарунок своєму брат___.'
      answer: 'братові'
      options: ['братові', 'брату', 'брата', 'браті']
      explanation: 'Брат (чоловічий рід) у Давальному відмінку має закінчення -ові (переважно).'
    - sentence: 'Ми допомагаємо мам___ на кухні.'
      answer: 'мамі'
      options: ['мамі', 'маму', 'мама', 'мамою']
      explanation: 'Мама (жіночий рід) у Давальному відмінку має закінчення -і.'
    - sentence: 'Студент відповідає викладач___.'
      answer: 'викладачеві'
      options: ['викладачеві', 'викладача', 'викладачу', 'викладачем']
      explanation: 'Викладач (чоловічий рід) у Давальному відмінку має закінчення -еві.'
    - sentence: 'Ти часто телефонуєш сестр___?'
      answer: 'сестрі'
      options: ['сестрі', 'сестру', 'сестра', 'сестрою']
      explanation: 'Сестра (жіночий рід) у Давальному відмінку має закінчення -і.'
    - sentence: 'Ми дякуємо друг___ за допомогу.'
      answer: 'другові'
      options: ['другові', 'друга', 'другу', 'другом']
      explanation: 'Друг (чоловічий рід) у Давальному відмінку має закінчення -ові.'
    - sentence: 'Офіціант несе каву клієнт___.'
      answer: 'клієнтові'
      options: ['клієнтові', 'клієнта', 'клієнту', 'клієнтом']
      explanation: 'Клієнт (чоловічий рід) у Давальному відмінку має закінчення -ові.'
    - sentence: 'Ми часто допомагаємо подруз___ з уроками.'
      answer: 'подрузі'
      options: ['подрузі', 'подругу', 'подруга', 'подругою']
      explanation: 'Подруга (жіночий рід) у Давальному відмінку має закінчення -і (г змінюється на з).'
    - sentence: 'Я обіцяю батьк___ приїхати завтра.'
      answer: 'батькові'
      options: ['батькові', 'батька', 'батьку', 'батьком']
      explanation: 'Батько (чоловічий рід) у Давальному відмінку має закінчення -ові.'

- type: error-correction
  title: 'Виправте помилки'
  instruction: 'Знайдіть та виправте помилку у вживанні відмінків.'
  items:
    - sentence: 'Я дуже дякую тебе за подарунок.'
      error: 'тебе'
      answer: 'тобі'
      options: ['тобі', 'ти', 'тобою', 'вас']
      explanation: 'Дієслово "дякувати" вимагає Давального відмінка (Кому?), а не Знахідного.'
    - sentence: 'Мені не подобаю цей новий фільм.'
      error: 'подобаю'
      answer: 'подобається'
      options: ['подобається', 'подобаються', 'люблю', 'хочу']
      explanation: 'Конструкція "Мені подобається" є безособовою. Форми "я подобаю" не існує в такому значенні.'
    - sentence: 'Ми допомагаємо наша бабуся в саду.'
      error: 'наша бабуся'
      answer: 'нашій бабусі'
      options: ['нашій бабусі', 'нашу бабусю', 'нашою бабусею', 'нашій бабуся']
      explanation: 'Допомагати кому? — Давальний відмінок: нашій бабусі.'
    - sentence: 'Шум заважає батько працювати.'
      error: 'батько'
      answer: 'батькові'
      options: ['батькові', 'батька', 'батьку', 'батьком']
      explanation: 'Заважати кому? — Давальний відмінок: батькові.'
    - sentence: 'Я телефоную брат кожен день.'
      error: 'брат'
      answer: 'братові'
      options: ['братові', 'брата', 'брату', 'братом']
      explanation: 'Телефонувати кому? — Давальний відмінок: братові.'
    - sentence: 'Вона дарує квіти мама.'
      error: 'мама'
      answer: 'мамі'
      options: ['мамі', 'маму', 'мамою', 'мамо']
      explanation: 'Дарувати кому? — Давальний відмінок: мамі.'

- type: unjumble
