- type: cloze
  title: 'Діалог: Толока'
  instruction: 'Заповніть пропуски у діалозі відповідними словами.'
  passage: 'Оксана: Привіт, Миколо! Тобі потрібна {{1}}? Микола: Привіт! Дякую {{2}}, але я сам. Оксана: Не кажи дурниць. Я можу допомогти {{3}}. Микола: Ну добре. Дай {{4}}, будь ласка, цвяхи. Оксана: Тримай. Я завжди рада допомогти {{5}}. Микола: Щиро {{6}} тобі! Без тебе було б важко. Оксана: Сьогодні я допомагаю {{7}}, а завтра ти допоможеш {{8}}. Микола: Звичайно! До речі, як {{9}} моя нова огорожа? Оксана: Мені дуже {{10}}. Ти майстер! Микола: Це приємно чути. Ходімо, я зроблю {{11}} чай. Оксана: О, чай {{12}} не завадить. Микола: Тобі {{13}} зелений чи чорний? Оксана: Чорний, будь ласка. Дякую {{14}}!'
  blanks:
