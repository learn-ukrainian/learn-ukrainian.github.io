    - тобі
    - ти
- id: error-correction-dative
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінку
  items:
  - sentence: Я завжди допомагаю маму.
    error: маму
    correction: мамі
    error_type: word
    options:
    - мама
    - мамі
    - мамою
    explanation: Дієслово «допомагати» вимагає давального відмінка.
  - sentence: Він часто дзвонить брата.
    error: брата
    correction: братові
    error_type: word
    options:
    - брат
    - братові
    - братом
    explanation: Дієслово «дзвонити» вимагає давального відмінка.
  - sentence: Ми щиро дякуємо вчителя.
    error: вчителя
    correction: вчителеві
    error_type: word
    options:
    - вчитель
    - вчителеві
    - вчителем
    explanation: Дієслово «дякувати» вимагає давального відмінка.
  - sentence: Цей шум заважає мене.
    error: мене
    correction: мені
    error_type: word
    options:
    - я
    - мені
    - мною
    explanation: Дієслово «заважати» вимагає давального відмінка.
  - sentence: Я раджу тебе прочитати цю книгу.
    error: тебе
    correction: тобі
    error_type: word
    options:
    - ти
    - тобі
    - тобою
    explanation: Дієслово «радити» вимагає давального відмінка.
  - sentence: Ніколи не заздри їх.
    error: їх
    correction: їм
    error_type: word
    options:
    - вони
    - їм
    - ними
    explanation: Дієслово «заздрити» вимагає давального відмінка.
  - sentence: Вона часто посміхається його.
    error: його
    correction: йому
    error_type: word
    options:
    - він
    - йому
    - ним
    explanation: Дієслово «посміхатися» вимагає давального відмінка.
  - sentence: Ми завжди довіряємо вас.
    error: вас
    correction: вам
    error_type: word
    options:
    - ви
    - вам
    - вами
    explanation: Дієслово «довіряти» вимагає давального відмінка.
