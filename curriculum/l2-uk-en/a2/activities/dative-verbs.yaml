- id: error-correction-podobatysia
  type: error-correction
  instruction: Знайдіть і виправте помилку узгодження (число або рід)
  items:
  - sentence: Мені подобається ці квіти.
    error: подобається
    correction: подобаються
    error_type: word
    options:
    - подобаюся
    - подобаються
    - подобаємося
    explanation: «Квіти» — це множина, тому дієслово має бути у формі множини (подобаються).
  - sentence: Тобі подобаються ця книга?
    error: подобаються
    correction: подобається
    error_type: word
    options:
    - подобаюся
    - подобається
    - подобаємося
    explanation: «Книга» — це однина, тому дієслово має бути у формі однини (подобається).
  - sentence: У дитинстві мені подобався ця гра.
    error: подобався
    correction: подобалася
    error_type: word
    options:
    - подобалася
    - подобалося
    - подобалися
    explanation: «Гра» — це жіночий рід, тому дієслово в минулому часі має закінчення
      -лася.
  - sentence: Йому дуже подобалося цей фільм.
    error: подобалося
    correction: подобався
    error_type: word
    options:
    - подобався
    - подобалася
    - подобалися
    explanation: «Фільм» — це чоловічий рід, тому дієслово в минулому часі має форму
      «подобався».
  - sentence: Нам подобалася тепле море.
    error: подобалася
    correction: подобалося
    error_type: word
    options:
    - подобався
    - подобалося
    - подобалися
    explanation: «Море» — це середній рід, тому дієслово в минулому часі має форму
      «подобалося».
  - sentence: Їй подобався старі фотографії.
    error: подобався
    correction: подобалися
    error_type: word
    options:
    - подобалася
    - подобалося
    - подобалися
    explanation: «Фотографії» — це множина, тому дієслово має форму «подобалися».
  - sentence: Вам подобаються працювати тут?
    error: подобаються
    correction: подобається
    error_type: word
    options:
    - подобаюся
    - подобається
    - подобаємося
    explanation: З інфінітивом (працювати) завжди використовується форма однини (подобається).
  - sentence: Моєму братові подобалися новий комп'ютер.
    error: подобалися
    correction: подобався
    error_type: word
    options:
    - подобався
    - подобалася
    - подобалося
    explanation: «Комп'ютер» — це чоловічий рід, тому дієслово має бути у формі «подобався».
