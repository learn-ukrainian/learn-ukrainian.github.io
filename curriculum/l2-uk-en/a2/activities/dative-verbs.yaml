- id: fill-in-focus-completing-sentences-with-correct-dative-noun-pronoun-forms-after-help-thank-call
  type: fill-in
  instruction: Вставте правильну форму займенника або іменника (давальний відмінок)
  items:
  - sentence: Я завжди допомагаю _____.
    answer: мамі
    options:
    - маму
    - мамі
    - мама
    - мамою
  - sentence: Ми щиро дякуємо _____.
    answer: вчителеві
    options:
    - вчителя
    - вчителеві
    - вчитель
    - вчителем
  - sentence: Подзвони _____ завтра вранці.
    answer: їй
    options:
    - її
    - їй
    - вона
    - нею
  - sentence: Цей шум дуже заважає _____.
    answer: мені
    options:
    - мене
    - мені
    - я
    - мною
  - sentence: Я часто дзвоню своєму _____.
    answer: другові
    options:
    - друга
    - другові
    - друг
    - другом
  - sentence: Він не відповідає _____.
    answer: нам
    options:
    - нас
    - нам
    - ми
    - нами
  - sentence: Вона радить _____ прочитати цю книгу.
    answer: сестрі
    options:
    - сестру
    - сестрі
    - сестра
    - сестрою
  - sentence: Я щиро дякую _____ за цю допомогу.
    answer: йому
    options:
    - його
    - йому
    - він
    - ним
- id: match-up-focus-matching-ukrainian-sentences-to-english-i-like-equivalents-to-cement-the-subject-object-shift
  type: match-up
  instruction: З'єднайте українські речення з їхніми англійськими перекладами
  pairs:
  - left: Мені подобається ця книга.
    right: I like this book.
  - left: Їй подобаються ці квіти.
    right: She likes these flowers.
  - left: Йому не подобається цей фільм.
    right: He doesn't like this movie.
  - left: Нам подобалася та стара квартира.
    right: We liked that old apartment.
  - left: Тобі подобається кава?
    right: Do you like coffee?
  - left: Їм подобалися ті яблука.
    right: They liked those apples.
  - left: Вам не подобається гучна музика.
    right: You (plural/formal) don't like loud music.
  - left: Мені подобалося солодке морозиво.
    right: I liked sweet ice cream.
- id: true-false-focus-judging-the-correctness-of-age-expressions-dative-form-correct-year-noun-agreement
  type: true-false
  instruction: Правда чи ні? Визначте, чи правильно написано вік.
  items:
  - statement: Моєму братові двадцять один роки.
    correct: false
    explanation: Для чисел, що закінчуються на 1 (крім 11), використовуємо форму «рік».
  - statement: Їй двадцять два роки.
    correct: true
    explanation: Для чисел, що закінчуються на 2, 3, 4 (крім 12, 13, 14), використовуємо
      форму «роки».
  - statement: Моїй мамі п'ятдесят років.
    correct: true
    explanation: Для чисел, що закінчуються на 5-9 та 0, використовуємо форму «років».
  - statement: Дідусеві вісімдесят рік.
    correct: false
    explanation: Для чисел, що закінчуються на 0, використовуємо форму «років».
  - statement: Мені тридцять три років.
    correct: false
    explanation: Для чисел, що закінчуються на 2, 3, 4 (крім 12, 13, 14), використовуємо
      форму «роки».
  - statement: Скільки йому років?
    correct: true
    explanation: У запитанні «скільки» завжди використовується родовий відмінок множини
      — «років».
  - statement: Моїй сестрі одинадцять рік.
    correct: false
    explanation: Для групи чисел від 11 до 19 використовуємо форму «років».
  - statement: Йому двадцять п'ять років.
    correct: true
    explanation: Для чисел, що закінчуються на 5, використовуємо форму «років».
