- id: match-up-focus-matching-ukrainian-sentences-to-english-i-like-equivalents-to-cement-the-subject-object-shift
  type: match-up
  instruction: З'єднайте українські речення з їхнім перекладом
  pairs:
  - left: Мені подобається ця пісня.
    right: I like this song.
  - left: Тобі подобається цей фільм.
    right: You like this movie.
  - left: Йому подобаються ці книги.
    right: He likes these books.
  - left: Їй подобається велике місто.
    right: She likes the big city.
  - left: Нам подобається гарячий чай.
    right: We like hot tea.
  - left: Вам подобаються ці квіти?
    right: Do you like these flowers?
  - left: Їм подобається гуляти в парку.
    right: They like to walk in the park.
  - left: Мені подобався цей довгий фільм.
    right: I liked this long movie.
  title: З'єднайте українські речення з їхнім перекладом
- id: true-false-focus-judging-the-correctness-of-age-expressions-dative-form-correct-year-noun-agreement
  type: true-false
  instruction: Правда чи ні? Оцініть правильність граматики віку.
  items:
  - statement: Моєму братові двадцять один роки.
    correct: false
    explanation: Неправильно. Для чисел, що закінчуються на 1 (але не 11), використовується
      форма «рік».
  - statement: Її сестрі тридцять два роки.
    correct: true
    explanation: Правильно. Для чисел, що закінчуються на 2, 3, 4 (але не 12, 13,
      14), ми використовуємо форму «роки».
  - statement: Моїй мамі сорок п'ять років.
    correct: true
    explanation: Правильно. Для чисел від 5 ми використовуємо форму «років».
  - statement: Моєму дідусеві шістдесят один років.
    correct: false
    explanation: Неправильно. Правильно «рік», бо число закінчується на 1.
  - statement: Мені двадцять років.
    correct: true
    explanation: Правильно. Число 20 вимагає форми «років».
  - statement: Йому вісімнадцять роки.
    correct: false
    explanation: Неправильно. Числа від 11 до 19 вимагають форми «років».
  - statement: Нашому татові п'ятдесят три роки.
    correct: true
    explanation: Правильно. Для числа 3 ми використовуємо форму «роки».
  - statement: Вашій бабусі сімдесят чотири років.
    correct: false
    explanation: Неправильно. Правильно «роки», бо число закінчується на 4.
  title: Правда чи ні? Оцініть правильність граматики віку.
- id: quiz-focus-choosing-between-dative-and-accusative-for-the-noun-pronoun-after-specific-verbs-e-g
  type: quiz
  instruction: 'Оберіть правильну форму: знахідний чи давальний відмінок?'
  items:
  - question: Я часто бачу _____ в парку.
    options:
    - маму
    - мамі
    - мама
    - мамою
    correct: 0
  - question: Я часто допомагаю _____ на кухні.
    options:
    - маму
    - мамі
    - мама
    - мамою
    correct: 1
  - question: Він дуже любить свою _____.
    options:
    - подругу
    - подрузі
    - подруга
    - подругою
    correct: 0
  - question: Він щодня дзвонить своїй _____.
    options:
    - подругу
    - подрузі
    - подруга
    - подругою
    correct: 1
  - question: Ми чекаємо _____ біля школи.
    options:
    - брата
    - братові
    - брат
    - братом
    correct: 0
  - question: Ми щиро дякуємо _____ за допомогу.
    options:
    - брата
    - братові
    - брат
    - братом
    correct: 1
  - question: Вона зустрічає _____ на вулиці.
    options:
    - вчителя
    - вчителеві
    - вчитель
    - вчителем
    correct: 0
  - question: Вона правильно відповідає _____ на уроці.
    options:
    - вчителя
    - вчителеві
    - вчитель
    - вчителем
    correct: 1
  title: 'Оберіть правильну форму: знахідний чи давальний відмінок?'
