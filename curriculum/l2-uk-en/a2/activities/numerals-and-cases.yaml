inline:
- id: fill-in-ordinals
  type: fill-in
  instruction: Вставте правильний порядковий числівник
  items:
  - sentence: Ми починаємо о ____ годині.
    answer: десятій
    options:
    - десятій
    - десятий
    - десятого
  - sentence: Сьогодні ____ березня.
    answer: двадцять першого
    options:
    - двадцять першого
    - двадцять перше
    - двадцять першим
  - sentence: Він вийшов з ____ кабінету.
    answer: п'ятого
    options:
    - п'ятого
    - п'ятий
    - п'ятому
  - sentence: Це наша ____ команда.
    answer: перша
    options:
    - перша
    - перше
    - першу
  - sentence: Я живу у ____ будинку.
    answer: третьому
    options:
    - третьому
    - третій
    - третього
  - sentence: Завтра буде ____ квітня.
    answer: другого
    options:
    - другого
    - другий
    - другому
  - sentence: Моя квартира — ____.
    answer: третя
    options:
    - третя
    - третій
    - третю
  - sentence: Ми зустрілися в ____ день.
    answer: перший
    options:
    - перший
    - першого
    - першому
