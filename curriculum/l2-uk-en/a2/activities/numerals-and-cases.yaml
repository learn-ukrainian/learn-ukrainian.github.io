- id: true-false-rules
  type: true-false
  instruction: Правда чи ні? (Правила числівників)
  items:
  - statement: Після числівника «два» ми використовуємо родовий відмінок однини (наприклад,
      два студента).
    correct: false
    explanation: 'В українській мові після «два» ми використовуємо називний відмінок
      множини: два студенти.'
  - statement: 'Слово «один» змінюється за родами: один, одна, одне.'
    correct: true
    explanation: Так, числівник «один» працює як прикметник і має форми для всіх трьох
      родів.
  - statement: Після числівника «п'ять» потрібен родовий відмінок множини (наприклад,
      п'ять яблук).
    correct: true
    explanation: Числа від 5 до 20 завжди вимагають родового відмінка множини.
  - statement: Слово «третій» має тверде закінчення.
    correct: false
    explanation: Числівник «третій» — це єдиний порядковий числівник із м'яким закінченням
      (-ій).
  - statement: Коли ми говоримо про дати, ми використовуємо кількісні числівники (наприклад,
      двадцять один березня).
    correct: false
    explanation: 'Для дат ми використовуємо порядкові числівники в родовому відмінку:
      двадцять першого березня.'
  - statement: Після числа «одинадцять» іменник стоїть у родовому відмінку множини.
    correct: true
    explanation: Слова одинадцять, дванадцять, тринадцять і чотирнадцять вимагають
      родового відмінка множини.
  - statement: Форма «одні» використовується з іменниками, які мають тільки форму
      множини (наприклад, одні окуляри).
    correct: true
    explanation: Так, для таких слів, як ножиці чи окуляри, ми використовуємо форму
      множини «одні».
  - statement: Для чоловічого та жіночого роду ми використовуємо однакову форму слова
      «обидва».
    correct: false
    explanation: Для чоловічого і середнього роду ми кажемо «обидва», а для жіночого
      — «обидві».
- id: odd-one-out-errors
  type: odd-one-out
  instruction: Знайдіть фразу або слово, яке має граматичну помилку чи не підходить
    до правила
  items:
  - words:
    - два студенти
    - три брати
    - чотири вікна
    - два брата
    correct: 3
    explanation: Правильно «два брати» (називний відмінок множини), а не «два брата».
  - words:
    - п'ять яблук
    - сім днів
    - десять студентів
    - шість гривні
    correct: 3
    explanation: Правильно «шість гривень» (родовий відмінок множини).
  - words:
    - одинадцять днів
    - дванадцять років
    - тринадцять вікон
    - чотирнадцять гривні
    correct: 3
    explanation: 'Числа 11-14 вимагають родового відмінка множини: чотирнадцять гривень.'
  - words:
    - перший
    - другий
    - п'ятий
    - третій
    correct: 3
    explanation: Числівник «третій» має м'яке закінчення, а всі інші — тверде.
  - words:
    - один стіл
    - одна книга
    - одне вікно
    - одні брат
    correct: 3
    explanation: Слово «брат» має форму однини, тому треба казати «один брат».
  - words:
    - обидва брати
    - обидва вікна
    - обидві сестри
    - обидва команди
    correct: 3
    explanation: Слово «команда» — це жіночий рід, тому треба казати «обидві команди».
  - words:
    - двадцять один рік
    - тридцять два роки
    - сорок п'ять років
    - п'ятдесят один років
    correct: 3
    explanation: 'Якщо число закінчується на один (51), ми використовуємо однину:
      п''ятдесят один рік.'
  - words:
    - першого березня
    - другого квітня
    - третього серпня
    - п'ятий березня
    correct: 3
    explanation: 'Для дат ми використовуємо родовий відмінок: п''ятого березня.'
