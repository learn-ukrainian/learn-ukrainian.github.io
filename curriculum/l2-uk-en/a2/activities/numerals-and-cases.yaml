    - одного
    - одним
- id: quiz-noun-agreement
  type: quiz
  instruction: Оберіть правильну форму іменника після числівника
  items:
  - question: У мене є два ____.
    options:
    - брати
    - брата
    - братів
    - братом
    correct: 0
  - question: Вона купила п'ять ____.
    options:
    - яблука
    - яблук
    - яблуки
    - яблуком
    correct: 1
  - question: Скільки ____ це коштує?
    options:
    - гривня
    - гривні
    - гривень
    - гривням
    correct: 2
  - question: На столі лежать три ____.
    options:
    - книги
    - книгу
    - книг
    - книгами
    correct: 0
  - question: Я бачу десять ____.
    options:
    - студенти
    - студентів
    - студента
    - студентам
    correct: 1
  - question: У нас є чотири ____.
    options:
    - огірки
    - огірків
    - огірка
    - огірком
    correct: 0
  - question: Він має одинадцять ____.
    options:
    - гривні
    - гривня
    - гривень
    - гривням
    correct: 2
  - question: Вони купили двадцять один ____.
    options:
    - кілограм
    - кілограми
    - кілограмів
    - кілограмом
    correct: 0
- id: sort-numeral-cases
  type: group-sort
  instruction: Розподіліть числівники за відмінком іменника, якого вони вимагають
  groups:
  - label: Називний відмінок однини (студент)
    items:
    - один
    - двадцять один
    - сорок один
  - label: Називний відмінок множини (студенти)
    items:
    - два
    - три
    - чотири
    - обидва
  - label: Родовий відмінок множини (студентів)
    items:
    - п'ять
    - десять
    - одинадцять
    - скільки
- id: match-up-expressions
  type: match-up
  instruction: З'єднайте цифри з їхнім правильним українським написанням
  pairs:
  - left: 1 яблуко
    right: одне яблуко
  - left: 2 яблука
    right: два яблука
  - left: 5 яблук
    right: п'ять яблук
  - left: 21 кілограм
    right: двадцять один кілограм
  - left: 3 кілограми
    right: три кілограми
  - left: 10 кілограмів
    right: десять кілограмів
  - left: 4 гривні
    right: чотири гривні
  - left: 12 гривень
    right: дванадцять гривень
workbook:
- id: error-correction-noun-agreement
  type: error-correction
  instruction: Знайдіть і виправте помилку у формі іменника або числівника
  items:
  - sentence: У мене є два брата.
    error: брата
    correction: брати
    error_type: word
    options:
    - брати
    - братів
    - братові
    explanation: 'Після числівника «два» ми використовуємо називний відмінок множини:
      брати.'
  - sentence: Вона купила п'ять яблука.
    error: яблука
    correction: яблук
    error_type: word
    options:
    - яблук
    - яблуки
    - яблуком
    explanation: 'Числа від 5 вимагають родового відмінка множини: п''ять яблук.'
  - sentence: Це коштує три гривень.
    error: гривень
    correction: гривні
    error_type: word
    options:
    - гривні
    - гривня
    - гривням
    explanation: 'Після «три» потрібен називний відмінок множини: гривні.'
  - sentence: Йому двадцять один років.
    error: років
    correction: рік
    error_type: word
    options:
    - рік
    - роки
    - рокові
    explanation: 'Якщо число закінчується на один (21), ми використовуємо називний
      відмінок однини: рік.'
  - sentence: Мені потрібен один кілограми цукру.
    error: кілограми
    correction: кілограм
    error_type: word
    options:
    - кілограм
    - кілограмів
    - кілограмом
    explanation: 'Після «один» ми використовуємо називний відмінок однини: кілограм.'
  - sentence: Вони мають дві сини.
    error: дві
    correction: два
    error_type: word
    options:
    - два
    - двох
    - двом
    explanation: Слово «сини» чоловічого роду, тому ми кажемо «два», а не «дві».
  - sentence: Обидва дівчини тут.
    error: Обидва
    correction: Обидві
    error_type: word
    options:
    - Обидві
    - Обидвох
    - Обом
    explanation: Слово «дівчини» жіночого роду, тому використовуємо форму «обидві».
  - sentence: У нього є одинадцять студенти.
    error: студенти
    correction: студентів
    error_type: word
    options:
    - студентів
    - студента
    - студентам
    explanation: 'Числа 11-14 вимагають родового відмінка множини: одинадцять студентів.'
