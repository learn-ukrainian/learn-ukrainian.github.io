    - до
    - потрібен
    - Києва.
    - квиток
    correct_order:
    - Мені
    - потрібен
    - один
    - квиток
    - до
    - Києва.
  - words:
    - одного
    - Ми
    - міста.
    - з
    correct_order:
    - Ми
    - з
    - одного
    - міста.
  - words:
    - поверсі.
    - Вона
    - живе
    - третьому
    - на
    correct_order:
    - Вона
    - живе
    - на
    - третьому
    - поверсі.
  - words:
    - буде
    - двадцять
    - Свято
    - серпня.
    - четвертого
    correct_order:
    - Свято
    - буде
    - двадцять
    - четвертого
    - серпня.
- id: fill-in-mixed
  type: fill-in
  instruction: Вставте правильну форму слова.
