- type: quiz
  title: "Оберіть правильний варіант"
  items:
    - question: "Як правильно і ввічливо запитати про товар на ринку?"
      explanation: "Фраза 'Чи є у вас...' є найбільш ввічливою формою."
      options:
        - text: "Чи є у вас свіжий хліб?"
          correct: true
        - text: "Ти маєш свіжий хліб?"
          correct: false
        - text: "У тебе є хліб?"
          correct: false
        - text: "Я хочу твій хліб."
          correct: false
    - question: "Який відмінок ми використовуємо для способу оплати?"
      explanation: "Ми платимо чим? Це інструмент, тому Орудний відмінок."
      options:
        - text: "Орудний відмінок"
          correct: true
        - text: "Знахідний відмінок"
          correct: false
        - text: "Місцевий відмінок"
          correct: false
        - text: "Називний відмінок"
          correct: false
    - question: "Як правильно сказати про оплату банківським пластиком?"
      explanation: "Слово 'картка' означає банківський інструмент."
      options:
        - text: "платити карткою"
          correct: true
        - text: "платити картою"
          correct: false
        - text: "платити карту"
          correct: false
        - text: "платити карточку"
          correct: false
    - question: "Ви йдете робити покупки. Який відмінок показує ваш напрямок?"
      explanation: "Активний рух відповідає на питання 'Куди?' — Знахідний відмінок."
      options:
        - text: "Я йду в магазин."
          correct: true
        - text: "Я йду в магазині."
          correct: false
        - text: "Я йду в магазину."
          correct: false
        - text: "Я йду в магазином."
          correct: false
    - question: "Що означає київська ідіома 'Дорого, як на Бессарабці'?"
      explanation: "Ця фраза означає дуже завищену та високу ціну."
      options:
        - text: "Надзвичайно висока ціна"
          correct: true
        - text: "Дуже велика знижка"
          correct: false
        - text: "Безкоштовний товар"
          correct: false
        - text: "Нормальна ціна на ринку"
          correct: false
    - question: "Де ви можете професійно почистити ваш діловий костюм?"
      explanation: "Хімчистка — це місце для професійного чищення складного одягу."
      options:
        - text: "у хімчистці"
          correct: true
        - text: "у перукарні"
          correct: false
        - text: "у супермаркеті"
          correct: false
        - text: "у ремонті взуття"
          correct: false
    - question: "Ви купуєте воду. У якому відмінку стоїть об'єкт дії?"
      explanation: "Прямий об'єкт дії (купую що?) стоїть у Знахідному відмінку."
      options:
        - text: "Я купую мінеральну воду."
          correct: true
        - text: "Я купую мінеральна вода."
          correct: false
        - text: "Я купую мінеральній воді."
          correct: false
        - text: "Я купую мінеральною водою."
          correct: false
    - question: "Яке дієслово ми використовуємо, коли даємо гроші за товар?"
      explanation: "Дієслово 'платити' означає процес фінансової оплати."
      options:
        - text: "платити"
          correct: true
        - text: "купувати"
          correct: false
        - text: "продавати"
          correct: false
        - text: "торгуватися"
          correct: false

- type: true-false
  title: "Правда чи брехня: Покупки в Україні"
  items:
    - statement: "У сучасних супермаркетах ви можете торгуватися з касиром."
      correct: false
      explanation: "У супермаркеті всі ціни суворо фіксовані на цінниках."
    - statement: "Бессарабський ринок — це відома архітектурна пам'ятка Києва."
      correct: true
      explanation: "Його побудували у 1912 році у красивому стилі модерн."
    - statement: "На українському ринку продавці часто дають скуштувати товар."
      correct: true
      explanation: "Це нормальна та очікувана практика на традиційних ринках."
    - statement: "Слово 'супермаркет' означає невелику місцеву крамницю."
      correct: false
      explanation: "Супермаркет — це великий магазин зручного самообслуговування."
    - statement: "Для вимірювання рідин українці зазвичай використовують літри."
      correct: true
      explanation: "Молоко чи сік завжди традиційно вимірюють у літрах."
    - statement: "Слово 'карта' — це найкращий переклад для банківського інструмента."
      correct: false
      explanation: "Правильне слово — 'картка'. 'Карта' — це географічна мапа."
    - statement: "Коли ви кажете 'Я йду в перукарню', ви використовуєте Знахідний відмінок."
      correct: true
      explanation: "Це активний напрямок (куди?), тому ми використовуємо Знахідний відмінок."
    - statement: "Решта паперових грошей на касі називається словом 'чек'."
      correct: false
      explanation: "Решта грошей називається 'здача'. Чек — це паперовий документ."

