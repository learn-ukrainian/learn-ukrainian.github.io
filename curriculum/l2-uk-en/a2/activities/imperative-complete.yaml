- id: match-up-vocative-wishes
  type: match-up
  instruction: З'єднайте звертання з відповідним побажанням
  pairs:
  - left: Оленко,
    right: будь щасливою!
  - left: Мамо,
    right: будь спокійною!
  - left: Діти,
    right: будьте уважними!
  - left: Друзі,
    right: будьте здоровими!
  - left: Дідусю,
    right: живи довго!
  - left: Друже,
    right: нехай здійсняться всі твої мрії!
  - left: Максиме,
    right: будь уважним!
  - left: Оксано,
    right: будь здоровою!
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть правильний вид дієслова (доконаний чи недоконаний) залежно
    від ситуації
  items:
  - question: Оленко, _____ цей текст до завтра! (конкретний результат)
    options:
    - Прочитай
    - Читай
    - Прочитайте
    - Читайте
    correct: 0
  - question: 'Лікар каже пацієнту (на Ви): «_____ більше води щодня!» (загальна порада)'
    options:
    - Пийте
    - Випийте
    - Пий
    - Випий
    correct: 0
  - question: 'Попередження про небезпеку (раптовий результат): «Обережно, не _____!»'
    options:
    - впади
    - падай
    - впадіть
    - падайте
    correct: 0
  - question: 'Мама просить сина: «_____ вікно, надворі холодно!» (разова дія)'
    options:
    - Закрий
    - Закривай
    - Закрийте
    - Закривайте
    correct: 0
  - question: 'Ввічливе запрошення для гостей: «_____, будь ласка, за стіл!»'
    options:
    - Сідайте
    - Сядьте
    - Сідай
    - Сядь
    correct: 0
  - question: 'Заборона (до групи людей): «Не _____ ці двері, там іде ремонт!»'
    options:
    - відкривайте
    - відкрийте
    - відкривай
    - відкрий
    correct: 0
  - question: 'Брат просить сестру: «_____ мені повідомлення ввечері!» (конкретна
      дія)'
    options:
    - Напиши
    - Пиши
    - Напишіть
    - Пишіть
    correct: 0
  - question: 'Загальна порада вчителя: «Учні, _____ українською мовою на уроці!»'
    options:
    - Говоріть
    - Скажіть
    - Говори
    - Скажи
    correct: 0
workbook:
- id: translate-imperatives
  type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: Let him read this text.
    options:
    - text: Хай він читає цей текст.
      correct: true
    - text: Давай він читає цей текст.
      correct: false
    - text: Хай він читати цей текст.
      correct: false
  - source: Let's go home.
    options:
    - text: Ходімо додому.
      correct: true
    - text: Давай йдемо додому.
      correct: false
    - text: Хай ми йдемо додому.
      correct: false
  - source: Mom, be calm!
    options:
    - text: Мамо, будь спокійною!
      correct: true
    - text: Мама, будь спокійна!
      correct: false
    - text: Мамо, хай спокійна!
      correct: false
  - source: Let all your dreams come true!
    options:
    - text: Нехай здійсняться всі ваші мрії!
      correct: true
    - text: Хай здійснювати всі ваші мрії!
      correct: false
    - text: Давайте здійсняться всі ваші мрії!
      correct: false
  - source: Let's talk about it tomorrow.
    options:
    - text: Поговорімо про це завтра.
      correct: true
    - text: Давайте поговоримо про це завтра.
      correct: false
    - text: Говорімо про це завтра.
      correct: false
  - source: Children, be attentive!
    options:
    - text: Діти, будьте уважними!
      correct: true
    - text: Діти, будь уважними!
      correct: false
    - text: Діти, хай уважні!
      correct: false
  - source: Don't open the door!
    options:
    - text: Не відкривай двері!
      correct: true
    - text: Не відкрий двері!
      correct: false
    - text: Не відкривайте двері!
      correct: false
  - source: Let the water boil.
    options:
    - text: Хай вода закипить.
      correct: true
    - text: Давай вода закипить.
      correct: false
    - text: Хай вода закипати.
      correct: false
- id: error-correction-imperatives
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Давайте поговоримо про цей проєкт.
    error: Давайте поговоримо
    correction: Поговорімо
    error_type: construction
    options:
    - Поговорімо
    - Давай поговорити
    - Хай поговоримо
    explanation: 'В українській мові для спільної дії використовується форма на -мо:
      поговорімо.'
  - sentence: Хай він читати цю книгу.
    error: читати
    correction: читає
    error_type: word
    options:
    - читає
    - читай
    - читайте
    explanation: Після 'хай' дієслово має бути у формі третьої особи (він читає),
      а не інфінітив.
  - sentence: Мама, будь спокійною!
    error: Мама
    correction: Мамо
    error_type: word
    options:
    - Мамо
    - Маму
    - Мамі
    explanation: 'При звертанні обов''язково використовується кличний відмінок: Мамо.'
  - sentence: Діти, будьте уважні!
    error: уважні
    correction: уважними
    error_type: word
    options:
    - уважними
    - уважного
    - уважному
    explanation: 'У побажаннях найкраще використовувати орудний відмінок: будьте уважними.'
  - sentence: Давай зробимо це разом.
    error: Давай зробимо
    correction: Зробімо
    error_type: construction
    options:
    - Зробімо
    - Зробимо
    - Хай зробимо
    explanation: 'Форма для першої особи множини утворюється за допомогою суфікса
      -мо: зробімо.'
  - sentence: Хай вони працювати швидше.
    error: працювати
    correction: працюють
    error_type: word
    options:
    - працюють
    - працюй
    - працюємо
    explanation: Після 'хай' потрібна форма третьої особи (вони працюють), а не інфінітив.
  - sentence: Не впадай, тут дуже слизько!
    error: впадай
    correction: впади
    error_type: word
    options:
    - впади
    - падай
    - падаєте
    explanation: 'Попередження про раптову небезпеку — це виняток, де використовується
      доконаний вид: не впади!'
  - sentence: Олена, хай тобі щастить!
    error: Олена
    correction: Оленко
    error_type: word
    options:
    - Оленко
    - Олену
    - Олені
    explanation: 'Звертання завжди стоїть у кличному відмінку: Оленко.'
