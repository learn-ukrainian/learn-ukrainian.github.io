version: '1.0'
module: imperative-complete
level: a2
inline:
- id: fill-in-3rd-person-imperative
  type: fill-in
  instruction: Оберіть правильну форму дієслова для третьої особи (хай / нехай).
  items:
  - sentence: Хай він _____ цей лист сьогодні.
    answer: напише
    options:
    - напише
    - напишуть
    - напиши
  - sentence: Нехай вона _____ правду.
    answer: знає
    options:
    - знає
    - знають
    - знай
  - sentence: Хай вони _____ завтра.
    answer: прийдуть
    options:
    - прийде
    - прийдуть
    - прийди
  - sentence: Хай дитина _____ на вулиці.
    answer: грається
    options:
    - грається
    - граються
    - грайся
  - sentence: Нехай батьки _____ вдома.
    answer: відпочинуть
    options:
    - відпочине
    - відпочинуть
    - відпочиньте
  - sentence: Хай вода _____ швидше.
    answer: закипить
    options:
    - закипить
    - закиплять
    - закипи
  - sentence: Нехай соус _____ десять хвилин.
    answer: настоїться
    options:
    - настоїться
    - настояться
    - настойся
  - sentence: Хай Оксана _____ цибулю.
    answer: наріже
    options:
    - наріже
    - наріжуть
    - наріж
- id: match-up-vocative-wishes
  type: match-up
  instruction: З'єднайте частини побажань (кличний відмінок + будь + орудний відмінок).
  pairs:
  - left: Оленко, будь
    right: щасливою!
  - left: Тату, будь
    right: здоровим!
  - left: Діти, будьте
    right: уважними!
  - left: Друже, хай тобі
    right: щастить!
  - left: Нехай здійсняться
    right: ваші мрії!
  - left: Хай наш борщ
    right: буде найсмачнішим!
  - left: Максиме, будь
    right: спокійним!
  - left: Колеги, будьте
    right: успішними!
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть правильний вид дієслова (недоконаний чи доконаний) для кожної
    ситуації.
  items:
  - question: Яке речення означає загальну пораду (регулярна дія)?
    options:
    - Читай більше!
    - Прочитай це зараз!
    - Напиши мені!
    - Зроби завдання!
    correct: 0
  - question: Як правильно дати конкретний наказ (разова дія)?
    options:
    - Напиши мені СМС!
    - Пиши коментарі щодня!
    - Читай книги!
    - Пий воду!
    correct: 0
  - question: Як правильно заборонити щось робити?
    options:
    - Не відкривай вікно!
    - Не відкрий вікно!
    - Не відкрийте вікно!
    - Не відкрийте!
    correct: 0
  - question: Яке речення означає термінову вимогу (доконаний вид)?
    options:
    - Закрий вікно!
    - Закривай вікно щодня!
    - Читай цей текст!
    - Пиши обережно!
    correct: 0
  - question: Як ввічливо запросити гостей у кімнату?
    options:
    - Сідайте, будь ласка.
    - Сядьте швидко.
    - Сядь зараз.
    - Не сідайте тут.
    correct: 0
  - question: Яке побажання містить дієслово доконаного виду?
    options:
    - Нехай здійсняться ваші мрії!
    - Хай він пише щодня.
    - Хай вона читає довго.
    - Живи довго!
    correct: 0
  - question: Що означає форма «Не впади!»?
    options:
    - Попередження про раптову небезпеку.
    - Постійну заборону.
    - Ввічливе запрошення.
    - Регулярну дію.
    correct: 0
  - question: Яка форма підходить для дії, що триває постійно?
    options:
    - Хай він пише щодня.
    - Хай він напише сьогодні.
    - Закрий двері.
    - Купімо квитки зараз!
    correct: 0
workbook:
- type: group-sort
  instruction: Розподіліть наказові форми дієслів за видом (Доконаний чи Недоконаний).
  groups:
  - label: Недоконаний вид (процес, регулярна дія)
    items:
    - Читай!
    - Пишіть!
    - Відкривай!
    - Сідайте!
    - Працюймо!
  - label: Доконаний вид (результат, разова дія)
    items:
    - Прочитай!
    - Напишіть!
    - Закрий!
    - Сядьте!
    - Зробімо!
- type: match-up
  instruction: З'єднайте видові пари дієслів у наказовому способі (недоконаний ↔ доконаний).
  pairs:
  - left: читай
    right: прочитай
  - left: пиши
    right: напиши
  - left: роби
    right: зроби
  - left: відкривай
    right: відкрий
  - left: сідай
    right: сядь
  - left: купуй
    right: купи
- type: fill-in
  instruction: Оберіть правильний вид дієслова для кожного речення.
  items:
  - sentence: 'Вчитель каже: _____ цю статтю до кінця.'
    answer: прочитай
    options:
    - читай
    - прочитай
  - sentence: 'Загальна порада: _____ коментарі щодня.'
    answer: пиши
    options:
    - пиши
    - напиши
  - sentence: Обережно, не _____!
    answer: впади
    options:
    - падай
    - впади
  - sentence: _____ мені одне повідомлення зараз.
    answer: напиши
    options:
    - пиши
    - напиши
  - sentence: Завжди _____ вікно.
    answer: закривай
    options:
    - закривай
    - закрий
  - sentence: _____ ці квитки зараз!
    answer: купімо
    options:
    - купуймо
    - купімо
- type: error-correction
  instruction: Знайдіть і виправте граматичні помилки (кальки або неправильні форми).
  items:
  - sentence: Давайте читати цю книгу разом.
    error: Давайте читати
    correction: Читаймо
    error_type: construction
    options:
    - Читаймо
    - Давайте читаємо
    - Читаємо
    explanation: В українській мові краще використовувати суфікс -мо (Читаймо!), а
      не кальку «давайте + інфінітив».
  - sentence: Пішли в кіно!
    error: Пішли
    correction: Ходімо
    error_type: word
    options:
    - Ходімо
    - Йдемо
    - Підемо
    explanation: «Пішли» — це минулий час. Для запрошення використовуйте «Ходімо!».
  - sentence: Олена, будь щасливою!
    error: Олена
    correction: Оленко
    error_type: word
    options:
    - Оленко
    - Олені
    - Оленою
    explanation: При звертанні потрібно використовувати кличний відмінок (Оленко).
  - sentence: Друже, будь успішний!
    error: успішний
    correction: успішним
    error_type: word
    options:
    - успішним
    - успішного
    - успішному
    explanation: Після слова «будь» використовуємо орудний відмінок (ким/чим? — успішним).
  - sentence: Давайте працювати щодня.
    error: Давайте працювати
    correction: Працюймо
    error_type: construction
    options:
    - Працюймо
    - Працюємо
    - Робимо
    explanation: Уникайте конструкції «давайте + інфінітив», використовуйте форму
      на -мо.
  - sentence: Хай він читати цей текст.
    error: читати
    correction: читає
    error_type: word
    options:
    - читає
    - читай
    - прочитати
    explanation: Після «хай» дієслово стоїть у формі теперішнього або майбутнього
      часу третьої особи (він читає).
- type: translate
  instruction: Оберіть правильний український переклад для кожної фрази.
  items:
  - source: Let him read.
    options:
    - text: Хай він читає.
      correct: true
    - text: Він читає.
      correct: false
    - text: Давай він читає.
      correct: false
  - source: Let's go to the cinema!
    options:
    - text: Ходімо в кіно!
      correct: true
    - text: Пішли в кіно!
      correct: false
    - text: Давайте йти в кіно!
      correct: false
  - source: May your dreams come true!
    options:
    - text: Нехай здійсняться ваші мрії!
      correct: true
    - text: Хай мріють ваші мрії!
      correct: false
    - text: Будьте ваші мрії!
      correct: false
  - source: Mom, be happy!
    options:
    - text: Мамо, будь щасливою!
      correct: true
    - text: Мама, будь щаслива!
      correct: false
    - text: Мамо, хай щаслива!
      correct: false
  - source: Let's do this task!
    options:
    - text: Зробімо це завдання!
      correct: true
    - text: Давайте робити це завдання!
      correct: false
    - text: Зробіть це завдання!
      correct: false
  - source: Don't open the window!
    options:
    - text: Не відкривай вікно!
      correct: true
    - text: Не відкрий вікно!
      correct: false
    - text: Не відкривати вікно!
      correct: false
- type: odd-one-out
  instruction: Оберіть слово або фразу, яка є зайвою у групі.
  items:
  - words:
    - Читаймо!
    - Пиймо!
    - Ходімо!
    - Давайте йти!
    correct: 3
    explanation: «Давайте йти» — це калька, інші слова мають правильний суфікс -мо.
  - words:
    - Хай він іде
    - Нехай вона знає
    - Хай вони прийдуть
    - Він читає
    correct: 3
    explanation: «Він читає» — це звичайне твердження, інші фрази — наказовий спосіб
      третьої особи з частками хай/нехай.
  - words:
    - Напиши
    - Зроби
    - Прочитай
    - Пиши
    correct: 3
    explanation: «Пиши» — дієслово недоконаного виду, інші — доконаного.
  - words:
    - щасливою
    - здоровим
    - уважними
    - спокійна
    correct: 3
    explanation: «спокійна» — називний відмінок, інші слова — орудний відмінок для
      побажань.
  - words:
    - Оленко
    - Максиме
    - Мамо
    - Син
    correct: 3
    explanation: «Син» — називний відмінок, інші слова — кличний відмінок (звертання).
  - words:
    - Не впади!
    - Не відкривай!
    - Не пиши!
    - Не слухай!
    correct: 0
    explanation: «Не впади» — попередження (доконаний вид), інші — звичайні заборони
      (недоконаний вид).
