- id: fill-in-form-the-correct-imperative-3rd-person-with-or-1st-plural-with-from-given-infinitives
  type: fill-in
  instruction: Вставте правильну форму дієслова після «хай» або «нехай»
  items:
  - sentence: Хай він ____ цей текст.
    answer: читає
    options:
    - читає
    - читати
    - читай
  - sentence: Нехай брат ____ додому.
    answer: іде
    options:
    - іде
    - йти
    - іди
  - sentence: Хай діти ____ надворі.
    answer: граються
    options:
    - граються
    - гратися
    - грай
  - sentence: Нехай Петро ____ свіжий хліб.
    answer: купить
    options:
    - купить
    - купити
    - купи
  - sentence: Хай вода ____ у великій каструлі.
    answer: закипить
    options:
    - закипить
    - закипіти
    - закипи
  - sentence: Нехай вона ____, сьогодні вихідний.
    answer: спить
    options:
    - спить
    - спати
    - спи
  - sentence: Хай вони ____ цей проєкт.
    answer: роблять
    options:
    - роблять
    - робити
    - роби
  - sentence: Нехай усі ваші мрії ____.
    answer: здійсняться
    options:
    - здійсняться
    - здійснитися
    - здійсніться
- id: fill-in-form-the-correct-imperative-3rd-person-with-or-1st-plural-with-from-given-infinitives
