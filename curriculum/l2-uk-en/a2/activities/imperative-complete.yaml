    - Випий ці ліки.
    - Скажи правду.
- id: true-false-imperative-rules
  type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про наказовий спосіб.
  items:
  - statement: Частка «нехай» є більш офіційною, ніж «хай».
    correct: true
    explanation: «Нехай» частіше вживається в літературі та офіційних промовах, а
      «хай» — у повсякденному спілкуванні.
  - statement: Після слова «хай» завжди йде інфінітив (наприклад, хай читати).
    correct: false
    explanation: 'Після «хай» дієслово завжди стоїть у формі третьої особи: хай він
      читає.'
  - statement: Фраза «Давайте поговоримо» є правильною і літературною.
    correct: false
    explanation: Це калька. Правильно казати «Поговорімо».
  - statement: У побажаннях прикметник часто стоїть в орудному відмінку (будь щасливою).
    correct: true
    explanation: Орудний відмінок — це класична і дуже правильна форма для таких побажань.
  - statement: Негативні накази майже завжди мають недоконаний вид (Не відкривай!).
    correct: true
    explanation: Заборона зупиняє процес, тому ми використовуємо недоконаний вид.
  - statement: Форма для групи «ми» завжди має суфікс -мо (ходімо, читаймо).
    correct: true
    explanation: Це основне правило утворення наказового способу для першої особи
      множини.
  - statement: Попередження про раптову небезпеку (Не впади!) використовує недоконаний
      вид.
    correct: false
    explanation: 'Це єдиний виняток: тут використовується доконаний вид (не впади,
      не забудь).'
  - statement: При звертанні ім'я не змінюється (Олена, будь щасливою).
    correct: false
    explanation: 'При звертанні ім''я обов''язково ставиться в кличний відмінок: Оленко.'
