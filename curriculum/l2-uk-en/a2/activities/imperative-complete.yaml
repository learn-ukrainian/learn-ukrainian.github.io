- id: group-sort-aspect-commands
  type: group-sort
  instruction: Розподіліть накази та поради за видом дієслова
  groups:
  - label: Загальна порада (недоконаний вид)
    items:
    - Читай більше!
    - Пишіть щодня!
    - Сідайте, будь ласка.
    - Пий багато води.
    - Говоріть українською.
  - label: Конкретне завдання (доконаний вид)
    items:
    - Прочитай статтю!
    - Напиши мені!
