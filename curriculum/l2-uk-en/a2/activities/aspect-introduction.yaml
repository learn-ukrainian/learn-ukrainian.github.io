- type: quiz
  title: "Процес чи результат?"
  instruction: "Перевірте свої знання про види дієслів."
  items:
    - question: "Яке дієслово описує тривалість дії?"
      explanation: "Недоконаний вид завжди фокусується на процесі та тривалості."
      options:
        - text: "недоконаний вид"
          correct: true
        - text: "доконаний вид"
          correct: false
        - text: "теперішній час"
          correct: false
        - text: "майбутній час"
          correct: false
    - question: "Яке дієслово описує завершення дії?"
      explanation: "Доконаний вид показує результат або завершення дії."
      options:
        - text: "доконаний вид"
          correct: true
        - text: "недоконаний вид"
          correct: false
        - text: "минулий час"
          correct: false
        - text: "процес"
          correct: false
    - question: "До якого виду належить слово написати?"
      explanation: "Слово написати означає досягнутий результат (доконаний вид)."
      options:
        - text: "доконаний вид"
          correct: true
        - text: "недоконаний вид"
          correct: false
        - text: "процес"
          correct: false
        - text: "повторення"
          correct: false
    - question: "До якого виду належить слово читати?"
      explanation: "Слово читати означає тривалий процес (недоконаний вид)."
      options:
        - text: "недоконаний вид"
          correct: true
        - text: "доконаний вид"
          correct: false
        - text: "результат"
          correct: false
        - text: "завершення"
          correct: false
    - question: "Чи має доконаний вид теперішній час?"
      explanation: "Доконаний вид описує завершений результат, тому він не може відбуватися зараз."
      options:
        - text: "ні, ніколи"
          correct: true
        - text: "так, завжди"
          correct: false
        - text: "тільки вранці"
          correct: false
        - text: "тільки іноді"
          correct: false
    - question: "Яке слово є маркером для недоконаного виду?"
      explanation: "Слово часто вказує на повторення, тому ми використовуємо недоконаний вид."
      options:
        - text: "часто"
          correct: true
        - text: "уже"
          correct: false
        - text: "нарешті"
          correct: false
        - text: "раптом"
          correct: false
    - question: "Яке слово є маркером для доконаного виду?"
      explanation: "Слово нарешті вказує на досягнутий результат (доконаний вид)."
      options:
        - text: "нарешті"
          correct: true
        - text: "довго"
          correct: false
        - text: "завжди"
          correct: false
        - text: "щодня"
          correct: false
    - question: "Яке дієслово є парою до слова говорити?"
      explanation: "Сказати — це доконаний вид для слова говорити."
      options:
        - text: "сказати"
          correct: true
        - text: "поговорити"
          correct: false
        - text: "наговорити"
          correct: false
        - text: "виговорити"
          correct: false
    - question: "Яке дієслово є парою до слова брати?"
      explanation: "Взяти — це доконаний вид для слова брати."
      options:
        - text: "взяти"
          correct: true
        - text: "забрати"
          correct: false
        - text: "набрати"
          correct: false
        - text: "вибрати"
          correct: false
    - question: "Що означає речення Я не робив вправи?"
      explanation: "Недоконаний вид із запереченням означає, що процес взагалі не відбувався."
      options:
        - text: "я взагалі цього не робив"
          correct: true
        - text: "я не закінчив вправи"
          correct: false
        - text: "я забув вправи"
          correct: false
        - text: "я скоро зроблю вправи"
          correct: false
    - question: "Що означає речення Я не зробив вправи?"
      explanation: "Доконаний вид із запереченням означає, що очікуваний результат не досягнуто."
      options:
        - text: "я не закінчив завдання"
          correct: true
        - text: "я взагалі нічого не робив"
          correct: false
        - text: "я не маю вправ"
          correct: false
        - text: "я не люблю вправи"
          correct: false
    - question: "Як сказати українською фразу I will write?"
      explanation: "Форма я напишу граматично є теперішнім часом доконаного виду, але має значення майбутнього."
      options:
        - text: "я напишу"
          correct: true
        - text: "я пишу"
          correct: false
        - text: "я писав"
          correct: false
        - text: "я написав"
          correct: false

