- id: fill-in-build-full-sentences-using-preposition-pronoun-adjective-noun-in-instrumental
  type: fill-in
  instruction: Оберіть правильну фразу для речення
  items:
  - sentence: 'Я вечеряю (з + мій + найкращий + друг): Я вечеряю ____.'
    answer: з моїм найкращим другом
    options:
    - з моїм найкращим другом
    - з моєю найкращою подругою
    - з мій найкращий друг
    - з моїм найкращий другом
  - sentence: 'Вона розмовляє (з + наша + нова + сусідка): Вона розмовляє ____.'
    answer: з нашою новою сусідкою
    options:
    - з нашою новою сусідкою
    - з нашим новим сусідом
    - з наша нова сусідка
    - з нашою новою сусідка
  - sentence: 'Собака спить (під + той + старий + стіл): Собака спить ____.'
    answer: під тим старим столом
    options:
    - під тим старим столом
    - під тією старою машиною
    - під той старий стіл
    - під тим старий столом
  - sentence: 'Машина стоїть (за + цей + великий + будинок): Машина стоїть ____.'
    answer: за цим великим будинком
    options:
    - за цим великим будинком
    - за цією великою школою
    - за цей великий будинок
    - за цим великий будинком
  - sentence: 'Я пишу (мій + синій + олівець): Я пишу ____.'
    answer: моїм синім олівцем
    options:
    - моїм синім олівцем
    - моєю синьою ручкою
    - мій синій олівець
    - моїм синій олівцем
  - sentence: 'Він гуляє (з + її + гарна + сестра): Він гуляє ____.'
    answer: з її гарною сестрою
    options:
    - з її гарною сестрою
    - з її гарним братом
    - з її гарна сестра
    - з її гарною сестра
  - sentence: 'Ми їдемо (ваша + нова + машина): Ми їдемо ____.'
    answer: вашою новою машиною
    options:
    - вашою новою машиною
    - вашим новим будинком
    - ваша нова машина
    - вашою новою машина
  - sentence: 'Вона малює (твоя + синя + ручка): Вона малює ____.'
    answer: твоєю синьою ручкою
    options:
    - твоєю синьою ручкою
    - твоїм синім олівцем
    - твоя синя ручка
    - твоєю синя ручкою
- id: error-correction-correct-errors-in-instrumental-agreement
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні
  items:
  - sentence: Я гуляю з моєю новим другом.
    error: моєю
    correction: моїм
    error_type: word
    options:
    - моїм
    - мій
    - моє
    - мої
    explanation: Друг — це чоловічий рід, тому використовуємо «моїм».
  - sentence: Вона пише синьою олівцем.
    error: синьою
    correction: синім
    error_type: word
    options:
    - синім
    - синій
    - синього
    - сині
    explanation: Олівець — це чоловічий рід, тому використовуємо «синім».
  - sentence: Ми розмовляємо з їїм братом.
    error: їїм
    correction: її
    error_type: word
    options:
    - її
    - їєю
    - їй
    - їїм
    explanation: Займенник «її» ніколи не змінює свою форму.
  - sentence: Собака спить за нашою будинком.
    error: нашою
    correction: нашим
    error_type: word
    options:
    - нашим
    - наш
    - наші
    - нашого
    explanation: Будинок — це чоловічий рід, тому використовуємо «нашим».
  - sentence: Я йду в кіно з тим найкращою подругою.
    error: тим
    correction: тією
    error_type: word
    options:
    - тією
    - той
    - тою
    - ті
    explanation: Подруга — це жіночий рід, тому використовуємо «тією».
  - sentence: Він працює з йогом колегою.
    error: йогом
    correction: його
    error_type: word
    options:
    - його
    - йому
    - йим
    - йогом
    explanation: Займенник «його» ніколи не змінює свою форму.
