- id: fill-in-build-full-sentences-using-preposition-pronoun-adjective-noun-in-instrumental
  type: fill-in
  instruction: Оберіть правильну фразу для речення
  items:
  - sentence: 'Я вечеряю: Я вечеряю ____.'
    answer: з моїм найкращим другом
    options:
    - з моїм найкращим другом
    - з моєю найкращою подругою
    - з мій найкращий друг
    - з моїм найкращий другом
  - sentence: 'Вона розмовляє: Вона розмовляє ____.'
    answer: з нашою новою сусідкою
    options:
    - з нашою новою сусідкою
    - з нашим новим сусідом
    - з наша нова сусідка
    - з нашою новою сусідка
  - sentence: 'Собака спить: Собака спить ____.'
    answer: під тим старим столом
    options:
    - під тим старим столом
    - під тією старою машиною
    - під той старий стіл
    - під тим старий столом
  - sentence: 'Машина стоїть: Машина стоїть ____.'
    answer: за цим великим будинком
    options:
    - за цим великим будинком
    - за цією великою школою
    - за цей великий будинок
    - за цим великий будинком
  - sentence: 'Я пишу: Я пишу ____.'
    answer: моїм синім олівцем
    options:
    - моїм синім олівцем
    - моєю синьою ручкою
    - мій синій олівець
    - моїм синій олівцем
  - sentence: 'Він гуляє: Він гуляє ____.'
    answer: з її гарною сестрою
    options:
    - з її гарною сестрою
    - з її гарним братом
    - з її гарна сестра
    - з її гарною сестра
  - sentence: 'Ми їдемо: Ми їдемо ____.'
    answer: вашою новою машиною
    options:
    - вашою новою машиною
    - вашим новим будинком
    - ваша нова машина
    - вашою новою машина
  - sentence: 'Вона малює: Вона малює ____.'
    answer: твоєю синьою ручкою
    options:
    - твоєю синьою ручкою
    - твоїм синім олівцем
    - твоя синя ручка
    - твоєю синя ручкою
