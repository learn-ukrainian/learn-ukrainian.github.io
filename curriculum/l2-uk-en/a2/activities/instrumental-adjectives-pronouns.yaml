version: '1.0'
module: instrumental-adjectives-pronouns
level: a2
inline:
- id: fill-in-add-correct-instrumental-adjective-endings-to-complete-noun-phrases
  type: fill-in
  instruction: Вставте правильну форму прикметника
  items:
  - sentence: Я гуляю з ____ другом.
    answer: новим
    options:
    - новим
    - новий
    - новою
  - sentence: Вона пише ____ олівцем.
    answer: синім
    options:
    - синім
    - синій
    - синьою
  - sentence: Ми розмовляємо з ____ сусідкою.
    answer: гарною
    options:
    - гарною
    - гарний
    - гарним
  - sentence: Кіт спить за ____ будинком.
    answer: великим
    options:
    - великим
    - великий
    - великою
  - sentence: Я йду в кіно з ____ подругою.
    answer: найкращою
    options:
    - найкращою
    - найкращий
    - найкращим
  - sentence: Вона малює ____ ручкою.
    answer: синьою
    options:
    - синьою
    - синій
    - синім
  - sentence: Ми сидимо під ____ деревом.
    answer: старим
    options:
    - старим
    - старий
    - старою
  - sentence: Я говорю з ____ сусідом.
    answer: добрим
    options:
    - добрим
    - добрий
    - доброю
- id: match-up-match-nominative-phrases-to-instrumental-forms
  type: match-up
  instruction: З'єднайте називний відмінок з відповідною фразою в орудному відмінку
  pairs:
  - left: мій новий друг
    right: з моїм новим другом
  - left: моя гарна сусідка
    right: з моєю гарною сусідкою
  - left: наш старий стіл
    right: за нашим старим столом
  - left: ця велика машина
    right: за цією великою машиною
  - left: твій синій олівець
    right: твоїм синім олівцем
  - left: той найкращий брат
    right: з тим найкращим братом
  - left: ваша нова школа
    right: за вашою новою школою
  - left: її старий будинок
    right: за її старим будинком
