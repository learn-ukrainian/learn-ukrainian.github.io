module: instrumental-adjectives-pronouns
level: a2
inline:
- id: fill-in-add-correct-instrumental-adjective-endings-to-complete-noun-phrases
  type: fill-in
  instruction: Вставте правильну форму прикметника
  items:
  - sentence: Я гуляю з (новий) ____ другом.
    answer: новим
    options:
    - новим
    - новий
    - новою
  - sentence: Вона пише (синій) ____ олівцем.
    answer: синім
    options:
    - синім
    - синій
    - синьою
  - sentence: Ми розмовляємо з (гарний) ____ сусідкою.
    answer: гарною
    options:
    - гарною
    - гарний
    - гарним
  - sentence: Кіт спить за (великий) ____ будинком.
    answer: великим
    options:
    - великим
    - великий
    - великою
  - sentence: Я йду в кіно з (найкращий) ____ подругою.
    answer: найкращою
    options:
    - найкращою
    - найкращий
    - найкращим
  - sentence: Вона малює (синій) ____ ручкою.
    answer: синьою
    options:
    - синьою
    - синій
    - синім
  - sentence: Ми сидимо під (старий) ____ деревом.
    answer: старим
    options:
    - старим
    - старий
    - старою
  - sentence: Я говорю з (добрий) ____ сусідом.
    answer: добрим
    options:
    - добрим
    - добрий
    - доброю
- id: match-up-match-nominative-phrases-to-instrumental-forms
