module: instrumental-adjectives-pronouns
level: a2
inline:
- id: fill-in-add-correct-instrumental-adjective-endings-to-complete-noun-phrases
  type: fill-in
  instruction: Вставте правильну форму прикметника
  items:
  - sentence: Я вчора розмовляв з ___ другом.
    answer: новим
    options:
    - новим
    - новою
    - новім
    - новий
  - sentence: Вона гуляє з ___ собакою.
    answer: гарною
    options:
    - гарною
    - гарним
    - гарна
    - гарне
  - sentence: Кіт спить за ___ будинком.
    answer: великим
    options:
    - великим
    - великою
    - великім
    - великий
  - sentence: Я малюю небо ___ олівцем.
    answer: синім
    options:
    - синім
    - синьою
    - синим
    - сині
  - sentence: Ми насолоджуємося теплим ___ вечором.
    answer: літнім
    options:
    - літнім
    - літньою
    - літним
    - літнього
  - sentence: Він прийшов з ___ сусідом.
    answer: добрим
    options:
    - добрим
    - доброю
    - добрім
    - добрий
  - sentence: Вона любить каву з ___ водою.
    answer: холодною
    options:
    - холодною
    - холодним
    - холодна
    - холодно
  - sentence: Я люблю гратися з ___ кішкою.
    answer: домашньою
    options:
    - домашньою
    - домашнім
    - домашною
    - домашня
  title: Вставте правильну форму прикметника
- id: match-up-nom-ins
  type: match-up
  instruction: З'єднайте називний відмінок (хто? що?) з орудним (з ким? чим?)
  pairs:
  - left: мій новий друг
    right: моїм новим другом
  - left: твоя старша сестра
    right: твоєю старшою сестрою
  - left: наш спільний проєкт
    right: нашим спільним проєктом
  - left: ваша нова ідея
    right: вашою новою ідеєю
  - left: його стара машина
    right: його старою машиною
  - left: її маленький син
    right: її маленьким сином
  - left: цей великий будинок
    right: цим великим будинком
  - left: та висока дівчина
    right: тією високою дівчиною
  title: З'єднайте називний відмінок (хто? що?) з орудним (з ким? чим?)
- id: quiz-pronoun-gender
  type: quiz
  instruction: Оберіть правильний займенник, що узгоджується з іменником
  items:
  - question: Я йду в кіно з ___ новим другом.
    options:
    - моїм
    - моєю
    - мій
    - моя
    correct: 0
  - question: Ми розмовляли з ___ старшою сестрою.
    options:
    - твоїм
    - твоєю
    - твоя
    - твій
    correct: 1
  - question: Він працює над ___ спільним проєктом.
    options:
    - своєю
    - своїм
    - свій
    - своя
    correct: 1
  - question: Я дуже задоволена ___ новою ідеєю.
    options:
    - вашою
    - вашим
    - ваша
    - ваш
    correct: 0
  - question: Вона гуляє з ___ маленькою собакою.
    options:
    - їхнім
    - їхньою
    - їхня
    - їхній
    correct: 1
  - question: Ми довго стояли перед ___ старою школою.
    options:
    - нашою
    - нашим
    - наша
    - наш
    correct: 0
  - question: Кіт любить спати за ___ великим будинком.
    options:
    - цією
    - цим
    - цей
    - ця
    correct: 1
  - question: Собака часто ховається під ___ старою ялинкою.
    options:
    - тією
    - тим
    - та
    - той
    correct: 0
  title: Оберіть правильний займенник, що узгоджується з іменником
- id: fill-in-full-chains
  type: fill-in
  instruction: Оберіть правильний варіант, щоб доповнити речення
  items:
  - sentence: Я часто гуляю ___ у парку.
    answer: з моїм найкращим другом
    options:
    - з моїм найкращим другом
    - з моєю найкращою другом
    - моїм найкращим другом
    - з мій найкращий друг
  - sentence: Учора я познайомився ___.
    answer: з моєю новою сусідкою
    options:
    - з моїм новим сусідкою
    - з моєю новою сусідкою
    - моєю новою сусідкою
    - з моя нова сусідка
  - sentence: Мій кіт часто спить ___.
    answer: за нашим великим будинком
    options:
    - за нашою великою будинком
    - за наш великий будинок
    - за нашим великим будинком
    - нашим великим будинком
  - sentence: Мій старший брат завжди пише ___.
    answer: цією новою ручкою
    options:
    - цією новою ручкою
    - цим новим ручкою
    - з цією новою ручкою
    - ця нова ручка
  - sentence: Я люблю малювати ___ у зошиті.
    answer: моїм синім олівцем
    options:
    - з моїм синім олівцем
    - моєю синьою олівцем
    - моїм синім олівцем
    - мій синій олівець
  - sentence: Вона вчора ходила в кіно ___.
    answer: з його старим другом
    options:
    - з йоговим старим другом
    - з його старою другом
    - з його старим другом
    - його старим другом
  - sentence: Ми сиділи в кафе ___.
    answer: з її молодшою сестрою
    options:
    - з її молодшою сестрою
    - з їїєю молодшою сестрою
    - з її молодшим сестрою
    - її молодшою сестрою
  - sentence: Вони часто гуляють ___.
    answer: з їхньою маленькою собакою
    options:
    - з їхнім маленьким собакою
    - з їхньою маленькою собакою
    - з їх маленькою собакою
    - їхньою маленькою собакою
  title: Оберіть правильний варіант, щоб доповнити речення
