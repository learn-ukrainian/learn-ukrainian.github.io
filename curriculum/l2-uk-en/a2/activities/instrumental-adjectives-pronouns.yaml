- type: true-false
  instruction: Оберіть, чи твердження є правильним (Правда) або хибним (Неправда)
  items:
  - statement: 'Займенник «його» змінюється в орудному відмінку (наприклад: з йоговим
      другом).'
    correct: false
    explanation: 'Слова «його» та «її» ніколи не змінюються. Правильно: з його другом.'
  - statement: 'Прикметники м''якої групи в чоловічому роді мають закінчення -ім (наприклад:
      синім).'
    correct: true
    explanation: Так, такі слова як синій, літній, останній отримують закінчення -ім.
  - statement: У виразі «з нашою новою сусідкою» всі слова стоять у правильній формі
      орудного відмінка жіночого роду.
    correct: true
    explanation: Так, усі слова узгоджуються з іменником жіночого роду (закінчення
      -ою).
  - statement: 'Слово «їх» (наприклад: з їх другом) є правильним і літературним.'
    correct: false
    explanation: 'Правильно використовувати змінний прикметник «їхній»: з їхнім другом.'
  - statement: 'Прикметники твердої групи в жіночому роді отримують закінчення -ою
      (наприклад: гарною).'
    correct: true
    explanation: Так, для твердої групи характерне закінчення -ою.
  - statement: 'Ми завжди додаємо прийменник «з», коли говоримо про інструмент (наприклад:
      я пишу з ручкою).'
    correct: false
    explanation: 'Коли ми говоримо про інструмент, ми не використовуємо прийменник:
      я пишу ручкою.'
  title: Оберіть, чи твердження є правильним (Правда) або хибним (Неправда)
