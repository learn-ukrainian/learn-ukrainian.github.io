version: '1.0'
module: instrumental-adjectives-pronouns
level: a2
inline: []
workbook:
- id: fill-in-adjectives
  type: fill-in
  instruction: Вставте правильне закінчення прикметника в орудному відмінку
  items:
  - sentence: Він гуляє з _____ (новий) другом.
    answer: новим
    options:
    - новим
    - новою
    - новім
  - sentence: Вона пише _____ (синій) ручкою.
    answer: синьою
    options:
    - синім
    - синьою
    - синою
  - sentence: Ми сидимо під _____ (старий) деревом.
    answer: старим
    options:
    - старим
    - старою
    - старім
  - sentence: Я часто говорю зі _____ (старий) сусідкою.
    answer: старою
    options:
    - старим
    - старою
    - старією
  - sentence: Собака спить за _____ (великий) будинком.
    answer: великим
    options:
    - великим
    - великою
    - величним
  - sentence: Ми розмовляємо з _____ (найкращий) лікарем.
    answer: найкращим
    options:
    - найкращим
    - найкращою
    - найкращем
  - sentence: Він працює над _____ (домашній) завданням.
    answer: домашнім
    options:
    - домашнім
    - домашньою
    - домашним
  - sentence: Вона милується _____ (літній) ніччю.
    answer: літньою
    options:
    - літнім
    - літньою
    - літнею
- id: match-up-phrases
  type: match-up
  instruction: З'єднайте форму називного відмінка з формою орудного
  pairs:
  - left: мій новий друг
    right: моїм новим другом
  - left: моя стара подруга
    right: моєю старою подругою
  - left: наш великий будинок
    right: нашим великим будинком
  - left: ваша нова школа
    right: вашою новою школою
  - left: цей синій олівець
    right: цим синім олівцем
  - left: та гарна дівчина
    right: тією гарною дівчиною
  - left: мій найкращий сусід
    right: моїм найкращим сусідом
  - left: наша домашня кухня
    right: нашою домашньою кухнею
- id: quiz-pronouns
  type: quiz
  instruction: Оберіть правильну форму займенника
  items:
  - question: Я часто гуляю в парку з _____ татом.
    options:
    - моїм
    - моєю
    - моєму
    - мій
    correct: 0
  - question: Вона любить розмовляти з _____ мамою.
    options:
    - твоїм
    - твоєю
    - твоя
    - твій
    correct: 1
  - question: Ми часто відпочиваємо за _____ будинком.
    options:
    - нашим
    - нашою
    - наш
    - наші
    correct: 0
  - question: Директор дуже задоволений _____ ідеєю.
    options:
    - вашим
    - вашою
    - ваша
    - ваш
    correct: 1
  - question: Я хочу поїхати додому _____ автобусом.
    options:
    - цим
    - цією
    - цей
    - ця
    correct: 0
  - question: Мій кіт любить спати за _____ стіною.
    options:
    - тим
    - тією
    - той
    - та
    correct: 1
  - question: Він працює над _____ складною проблемою.
    options:
    - твоїм
    - твоєю
    - твоє
    - твій
    correct: 1
  - question: Ми обов'язково зустрінемося _____ вечором.
    options:
    - цим
    - цією
    - цей
    - ця
    correct: 0
- id: fill-in-sentences
  type: fill-in
  instruction: Утворіть повні фрази в орудному відмінку (прийменник + займенник +
    прикметник + іменник)
  items:
  - sentence: Я гуляю _____ (з, мій, новий, сусід).
    answer: з моїм новим сусідом
  - sentence: Вона говорить _____ (з, твій, старий, друг).
    answer: з твоїм старим другом
  - sentence: Ми сидимо _____ (під, цей, великий, дуб).
    answer: під цим великим дубом
  - sentence: Собака спить _____ (за, той, старий, будинок).
    answer: за тим старим будинком
  - sentence: Машина стоїть _____ (перед, наш, новий, школа).
    answer: перед нашою новою школою
  - sentence: Він працює _____ (з, ваш, найкращий, лікар).
    answer: з вашим найкращим лікарем
  - sentence: Вона гуляє _____ (з, її, маленький, син).
    answer: з її маленьким сином
  - sentence: Я хочу поговорити _____ (з, їхній, новий, колега).
    answer: з їхнім новим колегою
- id: error-correction-agreement
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні
  items:
  - sentence: Я сьогодні гуляю з моїм новою другом.
    error: новою
    correction: новим
    error_type: word
    options:
    - новим
    - новім
    - новими
    explanation: Слово 'друг' — чоловічого роду, тому прикметник має закінчення -им.
  - sentence: Вона завжди пише цією синім ручкою.
    error: синім
    correction: синьою
    error_type: word
    options:
    - синьою
    - синою
    - синьої
    explanation: Слово 'ручка' — жіночого роду (м'яка група), тому прикметник має
      закінчення -ьою.
  - sentence: Ми довго сидимо під тим великою деревом.
    error: великою
    correction: великим
    error_type: word
    options:
    - великим
    - великім
    - велику
    explanation: Слово 'дерево' — середнього роду, тому прикметник має закінчення
      -им.
  - sentence: Вона довго розмовляє зі своїм старшою сестрою.
    error: своїм
    correction: своєю
    error_type: word
    options:
    - своєю
    - своїй
    - свою
    explanation: Слово 'сестра' — жіночого роду, тому займенник має форму 'своєю'.
  - sentence: Він наполегливо працює над твоєю важливим завданням.
    error: твоєю
    correction: твоїм
    error_type: word
    options:
    - твоїм
    - твою
    - твої
    explanation: Слово 'завдання' — середнього роду, тому займенник має форму 'твоїм'.
  - sentence: Кіт солодко спить за нашим новою школою.
    error: нашим
    correction: нашою
    error_type: word
    options:
    - нашою
    - нашій
    - нашу
    explanation: Слово 'школа' — жіночого роду, тому займенник має форму 'нашою'.
