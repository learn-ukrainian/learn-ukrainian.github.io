- id: group-sort-instrumental-gender
  type: group-sort
  instruction: Розподіліть слова за родом в орудному відмінку
  groups:
  - label: Чоловічий та середній рід (-им, -ім)
    items:
    - новим
    - старим
    - синім
    - моїм
    - вашим
    - цим
  - label: Жіночий рід (-ою, -ьою, -єю)
    items:
    - новою
    - старою
    - синьою
    - моєю
    - вашою
    - цією
- id: true-false-instrumental-rules
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Займенник «її» змінюється на «їєю» в орудному відмінку.
    correct: false
    explanation: Займенники «його» та «її» ніколи не змінюють свою форму.
  - statement: Прикметники жіночого роду твердої групи мають закінчення -ою (наприклад,
      новою).
    correct: true
    explanation: Так, -ою — це стандартне закінчення для твердої групи.
  - statement: Прикметники чоловічого роду м'якої групи мають закінчення -им (наприклад,
      синим).
    correct: false
    explanation: М'які прикметники мають закінчення -ім (наприклад, синім).
  - statement: У фразі «з моїм новим другом» усі три слова стоять в орудному відмінку.
    correct: true
    explanation: Так, займенник, прикметник і іменник завжди узгоджуються.
  - statement: Фраза «тим часом» означає «this evening».
    correct: false
    explanation: «Тим часом» означає «meanwhile». «Цим вечором» означає «this evening».
  - statement: Можна сказати «з його другом», і слово «його» не змінюється.
    correct: true
    explanation: Так, займенник «його» не змінюється.
