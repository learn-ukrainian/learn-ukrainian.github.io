- type: quiz
  title: "Perfective vs Imperfective"
  instruction: "Choose the correct verb or translation based on the meaning."
  items:
    - # item 1 of 8
      question: "Which verb focuses on the completed result of becoming something?"
      explanation: "'Стати' is the perfective verb for achieving a final result."
      options:
        - text: "стати"
          correct: true
        - text: "ставати"
          correct: false
        - text: "бути"
          correct: false
        - text: "працювати"
          correct: false
    - # item 2 of 8
      question: "Which verb describes the ongoing process of becoming or changing?"
      explanation: "'Ставати' is the imperfective verb for an ongoing process."
      options:
        - text: "ставати"
          correct: true
        - text: "стати"
          correct: false
        - text: "бути"
          correct: false
        - text: "мріяти"
          correct: false
    - # item 3 of 8
      question: "Choose the correct translation for 'to become a specialist' (result):"
      explanation: "Use the perfective verb 'стати' with the Instrumental case."
      options:
        - text: "стати спеціалістом"
          correct: true
        - text: "ставати спеціалістом"
          correct: false
        - text: "стати спеціаліст"
          correct: false
        - text: "ставати спеціаліст"
          correct: false
    - # item 4 of 8
      question: "Choose the correct translation for 'to be becoming better' (process):"
      explanation: "Use the imperfective verb 'ставати' for the ongoing process."
      options:
        - text: "ставати кращим"
