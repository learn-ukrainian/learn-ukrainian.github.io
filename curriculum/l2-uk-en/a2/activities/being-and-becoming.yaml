- type: true-false
  title: "Grammar Rules: True or False?"
  instruction: "Decide if the statement about Ukrainian grammar is true or false."
  items:
    - # item 1 of 8
      statement: "The word 'як' (as) is required when talking about your profession (e.g., працюю як менеджер)."
      correct: false
      explanation: "The Instrumental case alone means 'as a'. Using 'як' is a translation trap."
    - # item 2 of 8
      statement: "You must use the Nominative case after verbs like 'бути' (to be) and 'стати' (to become)."
      correct: false
      explanation: "These verbs require the Instrumental case because they describe a role or temporary state."
    - # item 3 of 8
      statement: "The feminine form of 'юрист' is 'юристка'."
      correct: true
      explanation: "This is a standard femininitiv ending in -ка."
    - # item 4 of 8
      statement: "To ask 'What do you work as?', you use the question 'Ким ти працюєш?'."
      correct: true
      explanation: "The question word 'ким' is in the Instrumental case."
    - # item 5 of 8
      statement: "If you say 'Я — лікар' (I am a doctor), you use the Instrumental case."
      correct: false
      explanation: "When stating present identity without a verb, you use the Nominative case."
    - # item 6 of 8
      statement: "The word 'айтівець' is a common colloquial term for an IT professional."
      correct: true
      explanation: "It is widely used to refer to people in the tech sector."
    - # item 7 of 8
      statement: "For masculine professions ending in a hard consonant, the Instrumental ending is '-ою'."
      correct: false
      explanation: "Masculine professions typically take '-ом' or '-ем', while feminine words take '-ою'."
    - # item 8 of 8
      statement: "The sentence 'Вона хороша лікарка' is grammatically correct."
      correct: true
      explanation: "Both the adjective and the noun match in the feminine gender."

