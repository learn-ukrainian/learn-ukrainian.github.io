- type: fill-in
  title: 'Минуле і Майбутнє'
  instruction: 'Complete the sentences using the correct form of "бути" (past or future) and the noun in the Instrumental case.'
  items:
    - sentence: 'Раніше я (бути) (студент).'
      answer: 'був студентом'
      options: ['був студентом', 'була студентом', 'буду студентом', 'є студентом']
      explanation: 'Past tense masculine (був) + Instrumental masculine (-ом).'
    - sentence: 'Леся Українка (бути) (письменниця).'
      answer: 'була письменницею'
      options: ['була письменницею', 'був письменницею', 'буде письменницею', 'були письменницею']
      explanation: 'Past tense feminine (була) + Instrumental feminine (-ею).'
    - sentence: 'Скоро ми (бути) (колеги).'
      answer: 'будемо колегами'
      options: ['будемо колегами', 'були колегами', 'є колегами', 'будете колегами']
      explanation: 'Future tense "we" (будемо) + Instrumental plural (-ами).'
    - sentence: 'Колись мій дідусь (бути) (лікар).'
      answer: 'був лікарем'
      options: ['був лікарем', 'була лікарем', 'буде лікарем', 'були лікарем']
      explanation: 'Past tense masculine (був) + Instrumental soft ending (-ем).'
    - sentence: 'Вона (бути) (хороша актриса).'
      answer: 'була хорошою актрисою'
      options: ['була хорошою актрисою', 'був хорошою актрисою', 'буде хорошою актрисою', 'є хорошою актрисою']
      explanation: 'Past tense feminine (була) + Adjective (-ою) + Noun (-ою).'
    - sentence: 'Я сподіваюся, ти (бути) (щаслива людина).'
      answer: 'будеш щасливою людиною'
      options: ['будеш щасливою людиною', 'була щасливою людиною', 'є щасливою людиною', 'буду щасливою людиною']
      explanation: 'Future tense "you" (будеш) + Instrumental feminine (-ою).'
    - sentence: 'Вони (бути) (найкращі друзі).'
      answer: 'були найкращими друзями'
      options: ['були найкращими друзями', 'будуть найкращими друзями', 'є найкращими друзями', 'було найкращими друзями']
      explanation: 'Past tense plural (були) + Adjective (-ими) + Noun irregular (-ями).'
    - sentence: 'Коли я виросту, я (бути) (директор).'
      answer: 'буду директором'
      options: ['буду директором', 'був директором', 'була директором', 'є директором']
      explanation: 'Future tense "I" (буду) + Instrumental masculine (-ом).'

- type: fill-in
  title: 'Мрії та Зміни'
  instruction: 'Complete the sentences using "стати" or "працювати" and the correct case ending.'
  items:
    - sentence: 'Я мрію стати (архітектор).'
      answer: 'архітектором'
      options: ['архітектором', 'архітектор', 'архітектора', 'архітектору']
      explanation: 'Masculine hard noun -> -ом.'
    - sentence: 'Вона хоче стати (співачка).'
      answer: 'співачкою'
      options: ['співачкою', 'співачка', 'співачки', 'співачці']
      explanation: 'Feminine hard noun -> -ою.'
    - sentence: 'Мій брат працює (програміст).'
      answer: 'програмістом'
      options: ['програмістом', 'програміст', 'програміста', 'програмісту']
      explanation: 'Masculine hard noun -> -ом.'
    - sentence: 'Зараз я працюю (менеджер), але хочу змін.'
      answer: 'менеджером'
      options: ['менеджером', 'менеджер', 'менеджера', 'менеджеру']
      explanation: 'Masculine hard noun -> -ом.'
    - sentence: 'Олена стала (відома журналістка).'
      answer: 'відомою журналісткою'
      options: ['відомою журналісткою', 'відома журналістка', 'відомій журналістці', 'відому журналістку']
      explanation: 'Adjective (-ою) + Noun (-ою).'
    - sentence: 'Він став (успішний бізнесмен).'
      answer: 'успішним бізнесменом'
      options: ['успішним бізнесменом', 'успішний бізнесмен', 'успішного бізнесмена', 'успішному бізнесмену']
      explanation: 'Adjective (-им) + Noun (-ом).'
    - sentence: 'Ми працюємо (партнери).'
      answer: 'партнерами'
      options: ['партнерами', 'партнери', 'партнерів', 'партнерам']
      explanation: 'Plural hard noun -> -ами.'
    - sentence: 'Ти хочеш стати (волонтер)?'
      answer: 'волонтером'
      options: ['волонтером', 'волонтер', 'волонтера', 'волонтеру']
      explanation: 'Masculine hard noun -> -ом.'

- type: error-correction
  title: 'Знайди помилку'
  instruction: 'Find and correct the grammar mistake in each sentence.'
  items:
    - sentence: 'Я працюю як вчитель у школі.'
      error: 'працюю як вчитель'
      answer: 'працюю вчителем'
      options: ['працюю вчителем', 'працюю вчителя', 'працюю вчителю', 'є вчитель']
      explanation: 'Never use "як" for "work as". Use працювати + Instrumental.'
    - sentence: 'Він хоче бути пилот.'
      error: 'пилот'
      answer: 'пілотом'
      options: ['пілотом', 'пілота', 'пілоту', 'пілоти']
      explanation: 'After "хоче бути" use Instrumental case. Also spelling: пілот.'
    - sentence: 'Вона була студентка минулого року.'
      error: 'студентка'
      answer: 'студенткою'
      options: ['студенткою', 'студентки', 'студентці', 'студентку']
      explanation: 'Past tense "була" requires Instrumental case.'
    - sentence: 'Ми станемо друзі назавжди.'
      error: 'друзі'
      answer: 'друзями'
      options: ['друзями', 'друзів', 'друзям', 'друзях']
      explanation: 'Plural Instrumental for friend is irregular: друзями.'
    - sentence: 'Мій тато працює інженери.'
      error: 'інженери'
      answer: 'інженером'
      options: ['інженером', 'інженера', 'інженеру', 'інженерах']
      explanation: 'Masculine singular Instrumental ends in -ом.'
    - sentence: 'Я мрію стати актриса.'
      error: 'актриса'
      answer: 'актрисою'
      options: ['актрисою', 'актриси', 'актрисі', 'актрису']
      explanation: 'Feminine singular Instrumental ends in -ою.'

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Rearrange the words to form correct sentences using the Instrumental case.'
  items:
    - words: ['найкращою', 'лікаркою', 'хоче', 'Україні', 'Вона', 'стати', 'в']
      answer: 'Вона хоче стати найкращою лікаркою в Україні'
    - words: ['був', 'Мій', 'дідусь', 'інженером', 'дуже', 'відомим', 'у', 'Києві']
      answer: 'Мій дідусь був дуже відомим інженером у Києві'
    - words: ['в', 'працює', 'Він', 'офісі', 'головним', 'менеджером', 'вже', 'три', 'роки']
      answer: 'Він вже три роки працює головним менеджером в офісі'
    - words: ['відомим', 'став', 'музикантом', 'успішним', 'та', 'Андрій', 'нещодавно']
      answer: 'Андрій нещодавно став успішним та відомим музикантом'
    - words: ['Ми', 'будемо', 'дуже', 'хорошими', 'колегами', "обов'язково"]
      answer: "Ми обов'язково будемо дуже хорошими колегами"
    - words: ['мрію', 'Я', 'стати', 'графічним', 'дизайнером', 'з', 'дитинства']
      answer: 'Я з дитинства мрію стати графічним дизайнером'

- type: mark-the-words
  title: 'Інструментальний детектив'
  instruction: 'Find and mark all words that are in the Instrumental case (look for endings -ом, -ем, -ою, -ею, -ами, -ями).'
  text: 'У дитинстві я хотів бути космонавтом. Але потім я став студентом університету. Зараз я працюю програмістом. Моя сестра працює лікаркою. Ми обоє стали спеціалістами у своїх сферах. Наші батьки були вчителями.'
  answers: ['космонавтом', 'студентом', 'програмістом', 'лікаркою', 'спеціалістами', 'вчителями']

- type: select
  title: 'Виберіть правильні речення'
  instruction: 'Select all sentences that are grammatically correct.'
  items:
    - question: 'Which sentences use the Instrumental case correctly?'
      options:
        - text: 'Він працює як лікар.'
          correct: false
        - text: 'Він працює лікарем.'
          correct: true
        - text: 'Вона хоче стати дизайнеркою.'
          correct: true
        - text: 'Вона хоче стати дизайнерка.'
          correct: false
      min_correct: 2
      explanation: '"Працює лікарем" and "хоче стати дизайнеркою" use the correct Instrumental forms. "Як лікар" is a mistake, and "дизайнерка" is Nominative.'
    - question: 'Select the sentences describing the past correctly.'
      options:
        - text: 'Я був студентом.'
          correct: true
        - text: 'Я був студент.'
          correct: false
        - text: 'Ми були друзями.'
          correct: true
        - text: 'Вона була вчителька.'
          correct: false
      min_correct: 2
      explanation: 'Past tense with "бути" requires Instrumental (-ом, -ами).'
    - question: 'Which sentences correctly describe future plans?'
      options:
        - text: 'Я буду актором.'
          correct: true
        - text: 'Ти станеш відомою співачкою.'
          correct: true
        - text: 'Я буду актор.'
          correct: false
        - text: 'Ти станеш відома співачка.'
          correct: false
      min_correct: 2
      explanation: 'Future tense and "стати" require Instrumental case.'
    - question: 'Select the sentences with correct feminitives.'
      options:
        - text: 'Моя мама — директорка.'
          correct: true
        - text: 'Вона працює менеджеркою.'
          correct: true
        - text: 'Вона є поетка.'
          correct: true
        - text: 'Ця жінка — автором книги.'
          correct: false
      min_correct: 3
      explanation: '"Автором" is correct Instrumental, but the sentence structure "Ця жінка — ..." requires Nominative (авторка) unless using "є" + Instrumental or past tense.'
    - question: 'Which sentences imply a change of state?'
      options:
        - text: 'Він став президентом.'
          correct: true
        - text: 'Вона стала мамою.'
          correct: true
        - text: 'Він є президентом.'
          correct: false
        - text: 'Вона була мамою.'
          correct: false
      min_correct: 2
      explanation: '"Став/стала" implies becoming (change). "Є" and "була" describe states.'
    - question: 'Which plural forms are correct in Instrumental?'
      options:
        - text: 'Ми були студентами.'
          correct: true
        - text: 'Вони стали друзями.'
          correct: true
        - text: 'Ми були студенти.'
          correct: false
        - text: 'Вони стали друзі.'
          correct: false
      min_correct: 2
      explanation: 'Plural Instrumental ends in -ами or -ями.'

- type: translate
  title: 'Переклад'
  instruction: 'Select the best translation for the English sentence.'
  items:
    - source: 'I want to become a lawyer.'
      options:
        - text: 'Я хочу стати юристом.'
          correct: true
        - text: 'Я хочу бути юрист.'
          correct: false
        - text: 'Я хочу стати юриста.'
          correct: false
        - text: 'Я працюю юристом.'
          correct: false
      explanation: 'Want to become = хочу стати + Instrumental (юристом).'
    - source: 'My sister works as a designer.'
      options:
        - text: 'Моя сестра працює дизайнеркою.'
          correct: true
        - text: 'Моя сестра працює як дизайнерка.'
          correct: false
        - text: 'Моя сестра є дизайнерка.'
          correct: false
        - text: 'Моя сестра стала дизайнеркою.'
          correct: false
      explanation: 'Works as = працює + Instrumental (дизайнеркою). No "як"!'
    - source: 'He was a good teacher.'
      options:
        - text: 'Він був хорошим вчителем.'
          correct: true
        - text: 'Він є хорошим вчителем.'
          correct: false
        - text: 'Він був хороший вчитель.'
          correct: false
        - text: 'Він буде хорошим вчителем.'
          correct: false
      explanation: 'Was = був + Instrumental (хорошим вчителем).'
    - source: 'They became friends.'
      options:
        - text: 'Вони стали друзями.'
          correct: true
        - text: 'Вони були друзями.'
          correct: false
        - text: 'Вони стали друзі.'
          correct: false
        - text: 'Вони є друзі.'
          correct: false
      explanation: 'Became = стали + Instrumental plural (друзями).'
    - source: 'I will be a programmer.'
      options:
        - text: 'Я буду програмістом.'
          correct: true
        - text: 'Я буду програміст.'
          correct: false
        - text: 'Я став програмістом.'
          correct: false
        - text: 'Я працюю програмістом.'
          correct: false
      explanation: 'Will be = буду + Instrumental (програмістом).'
    - source: 'Who does he work as?'
      options:
        - text: 'Ким він працює?'
          correct: true
        - text: 'Хто він працює?'
          correct: false
        - text: 'Як він працює?'
          correct: false
        - text: 'Де він працює?'
          correct: false
      explanation: '"As whom" corresponds to the Instrumental question word "Ким".'

