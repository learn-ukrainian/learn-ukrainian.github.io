- type: quiz
  title: 'Основи: Хто чи Ким?'
  instruction: 'Choose the correct answer based on the grammar rules for identity and roles.'
  items:
    - question: 'When do we use the Instrumental case for professions?'
      explanation: 'We use the Instrumental case when talking about a role, function, or temporary state in the past or future.'
      options:
        - text: 'With verbs like бути (past/future), стати, працювати'
          correct: true
        - text: 'Only in the present tense with бути'
          correct: false
        - text: 'When asking "Who is this?" (Хто це?)'
          correct: false
        - text: 'With the verb мати (to have)'
          correct: false
    - question: 'Which question does the Instrumental case answer?'
      explanation: 'Instrumental answers "As whom?" or "By whom?". Nominative answers "Who?".'
      options:
        - text: 'Ким? (Kym?)'
          correct: true
        - text: 'Хто? (Khto?)'
          correct: false
        - text: 'Що? (Shcho?)'
          correct: false
        - text: 'Кого? (Koho?)'
          correct: false
    - question: 'What is the correct ending for masculine hard nouns in the Instrumental case?'
      explanation: 'Hard masculine nouns like студент take -ом (студентом).'
      options:
        - text: '-ом'
          correct: true
        - text: '-ем'
          correct: false
        - text: '-ою'
          correct: false
        - text: '-ею'
          correct: false
    - question: 'What is the correct ending for feminine nouns ending in -а in the Instrumental case?'
      explanation: 'Feminine nouns ending in -а (мама, школа) change to -ою (мамою, школою).'
      options:
        - text: '-ою'
          correct: true
        - text: '-ею'
          correct: false
        - text: '-ом'
          correct: false
        - text: '-ами'
          correct: false
    - question: 'How do we translate "I work as a doctor"?'
      explanation: 'We use the verb працювати directly with the Instrumental case. We never use "як" for "as" in this context.'
      options:
        - text: 'Я працюю лікарем.'
          correct: true
        - text: 'Я працюю як лікар.'
          correct: false
        - text: 'Я працюю лікар.'
          correct: false
        - text: 'Я є лікар.'
          correct: false
    - question: 'Which verb expresses a transformation or change of state?'
      explanation: 'Стати (to become) implies a change from one state to another.'
      options:
        - text: 'Стати'
          correct: true
        - text: 'Бути'
          correct: false
        - text: 'Працювати'
          correct: false
        - text: 'Жити'
          correct: false
    - question: 'What is the feminine form of "студент"?'
      explanation: 'We add -ка to form the feminine: студент -> студентка.'
      options:
        - text: 'Студентка'
          correct: true
        - text: 'Студентиця'
          correct: false
        - text: 'Студентиня'
          correct: false
        - text: 'Студентеса'
          correct: false
    - question: 'Is "Він хоче бути лікар" correct?'
      explanation: 'No, after "хоче бути" we must use the Instrumental case: лікарем.'
      options:
        - text: 'No, it should be "лікарем".'
          correct: true
        - text: 'Yes, it is correct.'
          correct: false
        - text: 'No, it should be "лікаря".'
          correct: false
        - text: 'No, it should be "лікарі".'
          correct: false

