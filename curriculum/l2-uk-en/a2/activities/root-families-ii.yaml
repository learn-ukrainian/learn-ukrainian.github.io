- type: quiz
  title: "Тест: Нюанси значень"
  instruction: "Оберіть речення, яке має правильне значення."
  items:
    - question: "Яке речення описує активний процес отримання інформації через вуха?"
      explanation: "Слухати — це активний процес, коли ви направляєте свою увагу."
      options:
        - text: "Я слухаю нову музику."
          correct: true
        - text: "Я чую шум автомобілів."
          correct: false
        - text: "Я кажу нову інформацію."
          correct: false
        - text: "Я розмовляю про музику."
          correct: false
    - question: "Яке речення описує здатність розмовляти (ability to speak)?"
      explanation: "Дієслово говорити описує процес або фізичну здатність створювати слова."
      options:
        - text: "Вона говорить іспанською."
          correct: true
        - text: "Вона каже іспанською."
          correct: false
        - text: "Вона вважає іспанською."
          correct: false
        - text: "Вона чує іспанською."
          correct: false
    - question: "У якому реченні є обмін думками (діалог)?"
      explanation: "Префікс роз- у слові розмовляти вказує на взаємний обмін словами."
      options:
        - text: "Ми довго розмовляли вчора."
          correct: true
        - text: "Він довго думав учора."
          correct: false
        - text: "Вона довго мовчала."
          correct: false
        - text: "Я довго слухав."
          correct: false
    - question: "Яке речення передає конкретну інформацію (повідомлення)?"
      explanation: "Дієслово казати фокусується на змісті (що саме повідомили)."
      options:
        - text: "Президент казав, що реформи будуть."
          correct: true
        - text: "Президент довго говорив."
          correct: false
        - text: "Президент багато думав."
          correct: false
        - text: "Президент уважно слухав."
          correct: false
    - question: "У якому реченні людина виражає свою тверду позицію?"
      explanation: "Вважати означає мати чітку позицію після обдумування."
      options:
        - text: "Я вважаю, що це помилка."
          correct: true
        - text: "Я розмовляю про помилку."
          correct: false
        - text: "Я чую помилку."
          correct: false
        - text: "Я слухаю про помилку."
          correct: false
    - question: "Яке речення описує ситуацію, коли дитина робить те, що кажуть батьки?"
      explanation: "В українській мові концепція послуху походить від слова слухати (слухняний)."
      options:
        - text: "Ця дитина дуже слухняна."
          correct: true
        - text: "Ця дитина дуже мовчазна."
          correct: false
        - text: "Ця дитина багато говорить."
          correct: false
        - text: "Ця дитина постійно думає."
          correct: false
    - question: "Яке слово означає відсутність слів за власним вибором?"
      explanation: "Мовчання означає свідоме рішення не використовувати слова."
      options:
        - text: "мовчання"
          correct: true
        - text: "відмова"
          correct: false
        - text: "розмова"
          correct: false
        - text: "думка"
          correct: false
    - question: "Яке речення описує негативну відповідь на прохання?"
      explanation: "Відмова — це слова, які йдуть назад (refusal)."
      options:
        - text: "Я отримав офіційну відмову."
          correct: true
        - text: "Я почув офіційну розмову."
          correct: false
        - text: "Я маю цікаву думку."
          correct: false
        - text: "Я почав нову мову."
          correct: false

- type: fill-in
  title: "Заповніть пропуски: Іменники"
  instruction: "Оберіть правильний іменник для кожного речення."
  items:
    - sentence: "На мою _____, це дуже цікавий проєкт."
      answer: "думку"
      options:
        - "думку"
        - "мову"
        - "розмову"
        - "відмову"
    - sentence: "Українська _____ має багато красивих слів."
      answer: "мова"
      options:
        - "мова"
        - "думка"
        - "розмова"
        - "відмова"
    - sentence: "Учора у нас була довга і серйозна _____."
      answer: "розмова"
      options:
        - "розмова"
        - "мова"
        - "відмова"
        - "думка"
    - sentence: "Він просив гроші, але отримав _____."
      answer: "відмову"
      options:
        - "відмову"
        - "мову"
        - "розмову"
        - "думку"
    - sentence: "Іноді _____ — це найкраща відповідь на агресію."
      answer: "мовчання"
      options:
        - "мовчання"
        - "говоріння"
        - "слухання"
        - "слухняний"
    - sentence: "Його _____ про новий фільм була дуже критичною."
      answer: "думка"
      options:
        - "думка"
        - "розмова"
        - "мова"
        - "відмова"
    - sentence: "Англійська _____ дуже популярна у світі."
      answer: "мова"
