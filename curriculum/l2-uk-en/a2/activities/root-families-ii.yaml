- type: group-sort
  title: "Сортування: Кореневі родини"
  instruction: "Розподіліть слова за їхніми кореневими родинами."
  groups:
    - name: "Мислення (дум-)"
      items:
        - "думати"
        - "думка"
        - "вважати"
    - name: "Комунікація (мов-, говор-)"
      items:
        - "говорити"
        - "розмовляти"
        - "мова"
        - "розмова"
        - "відмова"
        - "казати"
        - "мовчання"
    - name: "Слухання (слух-)"
      items:
        - "слухати"
        - "слухняний"
        - "чути"

- type: match-up
  title: "Знайдіть пару: переклад"
  instruction: "З'єднайте українські слова з їхнім англійським перекладом."
  pairs:
    - left: "думати"
      right: "to think"
    - left: "думка"
      right: "thought, opinion"
    - left: "вважати"
      right: "to consider"
    - left: "говорити"
      right: "to speak"
    - left: "розмовляти"
      right: "to converse"
    - left: "мова"
      right: "language"
    - left: "розмова"
      right: "conversation"
    - left: "відмова"
      right: "refusal"
    - left: "слухати"
      right: "to listen"
    - left: "слухняний"
      right: "obedient"
    - left: "чути"
      right: "to hear"
    - left: "казати"
      right: "to say, tell"

- type: quiz
  title: "Тест: Концепції спілкування"
  instruction: "Оберіть правильну відповідь на запитання."
  items:
    - question: "Яке слово означає фізичний орган у роті, а не систему спілкування?"
      explanation: "Слово язик означає фізичний орган."
      options:
        - text: "язик"
          correct: true
        - text: "мова"
          correct: false
        - text: "розмова"
          correct: false
        - text: "слово"
          correct: false
    - question: "Яке дієслово ми використовуємо для непрямої мови (reported speech)?"
      explanation: "Дієслово казати фокусується на змісті і повідомленні."
      options:
        - text: "казати"
          correct: true
        - text: "говорити"
          correct: false
        - text: "розмовляти"
          correct: false
        - text: "слухати"
          correct: false
    - question: "Що буквально означає слово слухняний?"
      explanation: "Слово слухняний походить від дієслова слухати."
      options:
        - text: "той, хто слухає"
          correct: true
        - text: "той, хто мовчить"
          correct: false
        - text: "той, хто говорить"
          correct: false
        - text: "той, хто чує"
          correct: false
    - question: "Яке слово означає результат процесу мислення?"
      explanation: "Думка — це результат процесу мислення."
      options:
        - text: "думка"
          correct: true
        - text: "думати"
          correct: false
        - text: "вважати"
          correct: false
        - text: "мова"
          correct: false
    - question: "Яке дієслово ми використовуємо, коли говоримо про здатність спілкуватися українською?"
      explanation: "Для володіння мовою використовують говорити (говорити українською)."
      options:
        - text: "говорити"
          correct: true
        - text: "казати"
          correct: false
        - text: "мовчати"
          correct: false
        - text: "вважати"
          correct: false
    - question: "Яке слово означає відкидання слів (refusal)?"
      explanation: "Відмова буквально означає слова, які йдуть назад."
      options:
        - text: "відмова"
          correct: true
        - text: "розмова"
          correct: false
        - text: "мовчання"
          correct: false
        - text: "думка"
          correct: false
    - question: "Яка фраза є правильною для вираження 'in my opinion'?"
      explanation: "Автентична фраза — на мою думку."
      options:
        - text: "на мою думку"
          correct: true
        - text: "я маю думку"
          correct: false
        - text: "моя думка є"
          correct: false
        - text: "для моєї думки"
          correct: false
    - question: "Яке дієслово описує пасивний результат сприйняття звуку?"
      explanation: "Чути — це фізичне і пасивне сприйняття."
      options:
        - text: "чути"
          correct: true
        - text: "слухати"
          correct: false
        - text: "казати"
          correct: false
        - text: "вважати"
          correct: false

- type: fill-in
  title: "Заповніть пропуски: Дієслова"
  instruction: "Оберіть правильне дієслово для кожного речення."
  items:
    - sentence: "Ми вчора довго _____ про наші плани."
      answer: "розмовляли"
      options:
        - "розмовляли"
        - "вважали"
        - "чули"
        - "мовчали"
    - sentence: "Я часто _____ про свою родину."
      answer: "думаю"
      options:
        - "думаю"
        - "чую"
        - "кажу"
        - "відмовляю"
    - sentence: "Президент _____, що нові реформи будуть успішними."
      answer: "казав"
      options:
        - "казав"
        - "слухав"
        - "розмовляв"
        - "мовчав"
    - sentence: "Вона дуже добре _____ іспанською."
      answer: "говорить"
      options:
        - "говорить"
        - "каже"
        - "вважає"
        - "чує"
    - sentence: "Студенти уважно _____ лекцію професора."
      answer: "слухають"
      options:
        - "слухають"
        - "чують"
        - "кажуть"
        - "вважають"
    - sentence: "Вибачте, тут дуже шумно. Я вас не _____."
      answer: "чую"
      options:
        - "чую"
        - "слухаю"
        - "думаю"
        - "говорю"
    - sentence: "Я _____, що це найкраще рішення."
      answer: "вважаю"
      options:
        - "вважаю"
        - "слухаю"
        - "розмовляю"
        - "чую"
    - sentence: "Олена _____ мені правду про цей проєкт."
      answer: "казала"
      options:
        - "казала"
        - "думала"
        - "вважала"
        - "слухала"

- type: error-correction
  title: "Виправте помилки"
  instruction: "Знайдіть і виправте типові помилки в реченнях."
  items:
    - sentence: "Я вивчаю український язик."
      error: "язик"
      answer: "мову"
      error_type: "word"
      options:
        - "мову"
        - "розмову"
        - "думку"
        - "відмову"
      explanation: "Слово язик означає фізичний орган. Система спілкування — це мова."
    - sentence: "Я не слухав тебе через шум на вулиці."
      error: "слухав"
      answer: "чув"
      error_type: "word"
      options:
        - "чув"
        - "думав"
        - "вважав"
        - "казав"
      explanation: "Шум фізично блокує звук. Це пасивне сприйняття, тому використовуємо чув."
    - sentence: "Він казав українською мовою."
      error: "казав"
      answer: "говорив"
      error_type: "word"
      options:
        - "говорив"
        - "думав"
        - "вважав"
        - "слухав"
      explanation: "Коли ми описуємо здатність спілкуватися мовою, ми використовуємо дієслово говорити."
    - sentence: "Я маю таку думку про цю політику."
      error: "маю таку думку"
      answer: "на мою думку"
      error_type: "phrase"
      options:
        - "на мою думку"
        - "думаю про"
        - "вважаю про"
        - "слухаю про"
      explanation: "Автентична українська конструкція для 'in my opinion' — це на мою думку."
    - sentence: "Ти можеш вибрати любий варіант."
      error: "любий"
      answer: "будь-який"
      error_type: "word"
      options:
        - "будь-який"
        - "кожний"
        - "добрий"
        - "гарний"
      explanation: "Любий означає дорогий (beloved). Правильне слово — будь-який (any)."
    - sentence: "Він просив допомогу, але отримав розмову."
      error: "розмову"
      answer: "відмову"
      error_type: "word"
      options:
        - "відмову"
        - "мову"
        - "думку"
        - "мовчання"
      explanation: "Якщо хтось просить допомогу і йому кажуть ні, він отримує відмову."

- type: unjumble
  title: "Складіть речення: Думки та спілкування"
  instruction: "Побудуйте правильні речення зі слів."
  items:
    - words:
        - "На"
        - "мою"
        - "думку"
        - "це"
        - "дуже"
        - "цікава"
        - "ідея"
      answer: "На мою думку це дуже цікава ідея"
    - words:
        - "Він"
        - "часто"
        - "думає"
        - "про"
        - "свою"
        - "родину"
      answer: "Він часто думає про свою родину"
    - words:
        - "Учора"
        - "ми"
        - "довго"
        - "розмовляли"
        - "з"
        - "друзями"
      answer: "Учора ми довго розмовляли з друзями"
    - words:
        - "Українська"
        - "мова"
        - "має"
        - "багату"
        - "історію"
      answer: "Українська мова має багату історію"
    - words:
        - "Студенти"
        - "уважно"
        - "слухають"
        - "лекцію"
        - "професора"
      answer: "Студенти уважно слухають лекцію професора"
    - words:
        - "Ми"
        - "вважаємо"
        - "що"
        - "це"
        - "найкраще"
        - "рішення"
      answer: "Ми вважаємо що це найкраще рішення"
    - words:
        - "Він"
        - "отримав"
        - "категоричну"
        - "відмову"
        - "щодо"
        - "проєкту"
      answer: "Він отримав категоричну відмову щодо проєкту"
    - words:
        - "Слухняна"
        - "дитина"
        - "робить"
        - "усе"
        - "що"
        - "просять"
      answer: "Слухняна дитина робить усе що просять"

- type: mark-the-words
  title: "Знайдіть іменники комунікації"
  instruction: "Знайдіть і позначте всі слова, які є іменниками з родини спілкування."
  text: "Учора відбулася наша перша розмова про новий проєкт. Було довге мовчання. Українська мова дуже допомагає нам. Ми не отримаємо відмову."
  answers:
    - "розмова"
    - "мовчання"
    - "мова"
    - "відмову"

