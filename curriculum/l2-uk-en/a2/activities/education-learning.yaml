- type: fill-in
  title: "Вчитися чи вивчати?"
  instruction: "Оберіть правильне дієслово для кожного речення."
  items:
    - sentence: "Мій молодший брат зараз _____ в університеті."
      answer: "вчиться"
      options: ["вчиться", "вивчає", "навчає", "складає"]
      explanation: "Слово 'вчитися' вказує на місце (в університеті)."
    - sentence: "Ми дуже детально _____ історію України."
      answer: "вивчаємо"
      options: ["вчимося", "вивчаємо", "навчаємо", "пишемо"]
      explanation: "Слово 'вивчати' вимагає прямого додатка (історію)."
    - sentence: "Хороший професор _____ студентів критично мислити."
      answer: "навчає"
      options: ["вчиться", "вивчає", "навчає", "читає"]
      explanation: "Слово 'навчати' означає передавати знання іншим."
    - sentence: "Вона завжди _____ на відмінно."
      answer: "вчилася"
      options: ["вивчала", "вчилася", "навчала", "читала"]
      explanation: "Слово 'вчитися' вказує на спосіб дії (на відмінно)."
    - sentence: "Я дуже хочу серйозно _____ програмування."
      answer: "вивчати"
      options: ["вчитися", "вивчати", "навчати", "складати"]
      explanation: "Після слова 'вивчати' йде конкретний предмет (програмування)."
    - sentence: "Моя молодша сестра зараз _____ в школі."
      answer: "вчиться"
      options: ["вивчає", "навчає", "вчиться", "читає"]
      explanation: "Ми використовуємо 'вчитися', щоб вказати місце (у школі)."
    - sentence: "У сучасній школі учні обов'язково _____ математику."
      answer: "вивчають"
      options: ["вчаться", "вивчають", "навчають", "складають"]
      explanation: "Ми вивчаємо що? Математику (прямий додаток)."
    - sentence: "Тренер на стадіоні суворо _____ молодих спортсменів дисципліни."
      answer: "навчає"
      options: ["вивчає", "вчиться", "навчає", "працює"]
      explanation: "Тренер передає знання іншим людям, тому використовуємо 'навчає'."

- type: quiz
  title: "Прийменники місця: 'в/у' чи 'на'?"
  instruction: "Оберіть правильний прийменник для кожного речення."
  items:
    - question: "Який прийменник потрібен у реченні: Я щодня вчуся ... звичайній школі?"
      explanation: "Школа — це велика фізична інституція, тому використовуємо 'в/у'."
      options:
        - text: "у"
          correct: true
        - text: "на"
          correct: false
        - text: "за"
          correct: false
        - text: "до"
          correct: false
    - question: "Який прийменник потрібен у реченні: Усі студенти уважно сидять ... лекції?"
      explanation: "Лекція — це конкретна подія в розкладі, заняття, тому використовуємо 'на'."
      options:
        - text: "на"
          correct: true
        - text: "у"
          correct: false
        - text: "в"
          correct: false
        - text: "під"
          correct: false
    - question: "Який прийменник потрібен у реченні: Мій старший брат працює ... університеті?"
      explanation: "Університет — це великий заклад або організація, використовуємо 'в/у'."
      options:
        - text: "в"
          correct: true
        - text: "на"
          correct: false
        - text: "з"
          correct: false
        - text: "від"
          correct: false
    - question: "Який прийменник потрібен у реченні: Ми вчора познайомилися ... факультеті журналістики?"
      explanation: "Факультет — це менший структурний підрозділ, використовуємо 'на'."
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "у"
          correct: false
        - text: "для"
          correct: false
    - question: "Який прийменник потрібен у реченні: Учитель сказав не користуватися телефоном ... уроці?"
      explanation: "Урок — це подія в розкладі, використовуємо 'на'."
      options:
        - text: "на"
          correct: true
        - text: "у"
          correct: false
        - text: "в"
          correct: false
        - text: "за"
          correct: false
    - question: "Який прийменник потрібен у реченні: Вони випадково зустрілися ... старій бібліотеці?"
      explanation: "Бібліотека — це фізична будівля, тому 'в/у'."
      options:
        - text: "в"
          correct: true
        - text: "на"
          correct: false
        - text: "про"
          correct: false
        - text: "біля"
          correct: false
    - question: "Який прийменник потрібен у реченні: Я був учора ввечері ... довгому семінарі?"
      explanation: "Семінар — це практичне заняття або подія, використовуємо 'на'."
      options:
        - text: "на"
          correct: true
        - text: "в"
          correct: false
        - text: "у"
          correct: false
        - text: "до"
          correct: false
    - question: "Який прийменник потрібен у реченні: Усі мої друзі навчаються ... медичному коледжі?"
      explanation: "Коледж — це навчальний заклад, тому використовуємо 'в/у'."
      options:
        - text: "у"
          correct: true
        - text: "на"
          correct: false
        - text: "з"
          correct: false
        - text: "від"
          correct: false

- type: true-false
  title: "Правда чи неправда: українська освіта"
  instruction: "Визначте, чи є ці твердження правдивими."
  items:
    - statement: "Навчальний рік в Україні завжди починається першого вересня."
      correct: true
      explanation: "Цей осінній день офіційно називається День знань, і це велике свято."
    - statement: "Українські школи використовують стару п'ятибальну систему оцінювання."
      correct: false
      explanation: "В Україні діє сучасна європейська 12-бальна система оцінювання."
    - statement: "Дієслово 'вивчати' завжди вимагає після себе прямого додатка."
      correct: true
      explanation: "Ми завжди вивчаємо 'щось', наприклад, детально вивчаємо математику."
    - statement: "Англійську фразу 'to take an exam' треба буквально перекладати як 'брати іспит'."
      correct: false
      explanation: "Правильно говорити 'складати іспит' — це тривалий процес перевірки знань."
    - statement: "Профільний предмет — це спеціальний предмет, який учні вивчають більш детально."
      correct: true
      explanation: "Профільні предмети допомагають учням краще підготуватися до майбутньої професії."
    - statement: "Слово 'викладач' можна ввічливо використовувати для вчителя в початковій школі."
      correct: false
      explanation: "Викладач — це людина, яка працює в університеті, а в школі працює вчитель."
    - statement: "Стипендія — це щомісячна фінансова виплата успішним студентам від держави."
      correct: true
      explanation: "Її отримують лише ті студенти, які мають високі бали за іспити."
    - statement: "Найвища і найкраща оцінка в українській школі — це 10 балів."
      correct: false
      explanation: "Найвища оцінка у 12-бальній шкільній системі — це 12 балів."

- type: cloze
  title: "Діалог в університеті"
  instruction: "Заповніть пропуски правильними словами."
  passage: |
    — Привіт! Я зараз сиджу на {{1}} економіки. Дуже чекаю на останню {{2}} з математики.
    — У тебе сьогодні було багато пар?
    — Так, а завтра вранці у нас дуже важливий {{3}}. І я ще не читав новий {{4}} з філософії!
    — Співчуваю! Ти вже написав свою річну {{5}} роботу?
    — Майже. Мій суворий {{6}} прочитав її і сказав додати більше інформації.
    — Ти зараз живеш у {{7}}?
    — Так. Там весело, але іноді занадто гучно готуватися до {{8}}. Добре, що хоча б {{9}} стабільно отримую кожного місяця.
    — Ти обов'язково отримаєш високу {{10}}! Ти завжди маєш найкращий {{11}} у нашій малій групі.
    — Дуже дякую за підтримку! Ти дуже старанний {{12}}.
  blanks:
    - id: 1
      answer: "факультеті"
      options: ["факультеті", "школі", "лекції", "гуртожитку"]
    - id: 2
      answer: "лекцію"
      options: ["лекцію", "студентку", "стипендію", "оцінку"]
    - id: 3
      answer: "залік"
      options: ["залік", "зошит", "гуртожиток", "підручник"]
    - id: 4
      answer: "підручник"
      options: ["підручник", "зошит", "щоденник", "журнал"]
    - id: 5
      answer: "курсову"
      options: ["курсову", "шкільну", "маленьку", "розумну"]
    - id: 6
      answer: "викладач"
      options: ["викладач", "студент", "зошит", "словник"]
    - id: 7
      answer: "гуртожитку"
      options: ["гуртожитку", "факультеті", "семінарі", "школі"]
    - id: 8
      answer: "іспитів"
      options: ["іспитів", "студентів", "словників", "ручок"]
    - id: 9
      answer: "стипендію"
      options: ["стипендію", "лекцію", "оцінку", "школу"]
    - id: 10
      answer: "оцінку"
      options: ["оцінку", "лекцію", "ручку", "школу"]
    - id: 11
      answer: "бал"
      options: ["бал", "зошит", "олівець", "підручник"]
    - id: 12
      answer: "студент"
      options: ["студент", "викладач", "вчитель", "диплом"]

- type: error-correction
  title: "Виправте граматичні та лексичні помилки"
  instruction: "Знайдіть і виправте типові помилки в реченнях."
  items:
    - sentence: "Я зараз вчуся математику в школі."
      error: "вчуся"
      answer: "вивчаю"
      error_type: "word"
      options: ["вивчаю", "навчаю", "читаю", "знаю"]
      explanation: "Дієслово 'вчитися' не може мати прямого додатка. Треба використовувати перехідне 'вивчати'."
    - sentence: "Завтра вранці я буду брати іспит з історії."
      error: "брати"
      answer: "складати"
      error_type: "word"
      options: ["складати", "робити", "мати", "писати"]
      explanation: "Фраза 'take an exam' українською завжди перекладається як 'складати іспит'."
    - sentence: "Моя молодша сестра зараз вивчає в школі."
      error: "вивчає"
      answer: "вчиться"
      error_type: "word"
      options: ["вчиться", "навчає", "працює", "читає"]
      explanation: "Для вказівки на місце процесу (в школі) ми використовуємо неперехідне дієслово 'вчитися'."
    - sentence: "Наш вчитель в університеті дуже суворий."
      error: "вчитель"
      answer: "викладач"
      error_type: "word"
      options: ["викладач", "студент", "декан", "учень"]
      explanation: "В університетах працюють викладачі та професори, а в загальних школах — вчителі."
    - sentence: "Всі студенти уважно слухали професора в лекції."
      error: "в"
      answer: "на"
      error_type: "word"
      options: ["на", "у", "за", "біля"]
      explanation: "Лекція — це подія, тому ми завжди використовуємо прийменник 'на' (на лекції, на уроці)."
    - sentence: "Вона успішно склала школу десять років тому."
      error: "склала"
      answer: "закінчила"
      error_type: "word"
      options: ["закінчила", "вивчила", "почала", "зробила"]
      explanation: "Зі словом школа ми використовуємо фінальне дієслово 'закінчити' (закінчити школу)."

