- type: unjumble
  title: "Складіть правильні речення"
  instruction: "Розташуйте слова в правильному порядку."
  items:
    - words: ["мій", "брат", "ходить", "до", "школи"]
      answer: "Мій брат ходить до школи"
    - words: ["вона", "хоче", "вступити", "до", "університету"]
      answer: "Вона хоче вступити до університету"
    - words: ["я", "успішно", "склав", "цей", "складний", "іспит"]
      answer: "Я успішно склав цей складний іспит"
    - words: ["ми", "серйозно", "вивчаємо", "українську", "мову"]
      answer: "Ми серйозно вивчаємо українську мову"
    - words: ["мій", "улюблений", "предмет", "це", "історія"]
      answer: "Мій улюблений предмет це історія"
    - words: ["учні", "отримують", "дуже", "гарні", "оцінки"]
      answer: "Учні отримують дуже гарні оцінки"
    - words: ["я", "завжди", "пишу", "ручкою", "в", "зошиті"]
      answer: "Я завжди пишу ручкою в зошиті"
    - words: ["всі", "студенти", "сидять", "на", "довгій", "лекції"]
      answer: "Всі студенти сидять на довгій лекції"

