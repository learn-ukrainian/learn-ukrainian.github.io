      correct: true
    - text: Ми поїхали в гори, якщо було тепло.
      correct: false
    - text: Ми поїхали в гори, щоб було тепло.
      correct: false
    - text: Ми поїхали в гори, що було тепло.
      correct: false
  - source: She will read this book completely tomorrow.
    options:
    - text: Вона прочитає цю книгу завтра.
      correct: true
    - text: Вона читала цю книгу завтра.
      correct: false
    - text: Вона читає цю книгу завтра.
      correct: false
    - text: Вона читатиме цю книгу вчора.
      correct: false
  - source: I have no time.
    options:
    - text: Я не маю часу.
      correct: true
    - text: Я не маю час.
      correct: false
    - text: Я не маю часом.
      correct: false
