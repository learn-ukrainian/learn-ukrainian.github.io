version: '1.0'
module: a2-comprehensive-review
level: a2
inline:
- id: fill-in-mixed-cases
  type: fill-in
  instruction: Вставте слово в правильному відмінку
  items:
  - sentence: У мене немає вільного ____.
    answer: часу
    options:
    - час
    - часу
    - часом
  - sentence: Я бачу свого ____.
    answer: вчителя
    options:
    - вчитель
    - вчителя
    - вчителю
  - sentence: Вона дає книгу ____.
    answer: мамі
    options:
    - мама
    - мамі
    - мамою
  - sentence: Він пише новою ____.
    answer: ручкою
    options:
    - ручка
    - ручку
    - ручкою
  - sentence: Ми вчимося у цій ____.
    answer: школі
    options:
    - школа
    - школу
    - школі
  - sentence: ____, допоможи мені!
    answer: Друже
    options:
    - Друг
    - Друже
    - Другу
  - sentence: Мені подобається українська ____.
    answer: граматика
    options:
    - граматику
    - граматика
    - граматики
  - sentence: У нього немає ____.
    answer: впевненості
    options:
    - впевненість
    - впевненості
    - впевненістю
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть правильний вид дієслова (доконаний чи недоконаний)
  items:
  - question: Кожного ранку вона _____ каву.
    options:
    - пила
    - випила
    - попила
    - напилась
    correct: 0
  - question: Вчора ввечері я _____ цю книгу до кінця.
    options:
    - читав
    - прочитав
    - читала
    - читатиму
    correct: 1
  - question: Він _____ домашнє завдання дві години.
    options:
    - зробив
    - зробить
    - робив
    - зробиш
    correct: 2
  - question: Ти вже _____ тест?
    options:
    - писав
    - писати
    - написав
    - пишеш
    correct: 2
  - question: Ми щодня _____ свіжий хліб.
    options:
    - купували
    - купили
    - купимо
    - купив
    correct: 0
  - question: Я обов'язково _____ тобі правду.
    options:
    - говорив
    - скажу
    - говоритиму
    - кажу
    correct: 1
  - question: Що ви _____ минулого тижня?
    options:
    - зробили
    - робили
    - зроблять
    - робитимуть
    correct: 1
  - question: Він нарешті _____ новий телефон.
    options:
    - купував
    - купує
    - купуватиме
    - купив
    correct: 3
- id: group-sort-grammar-categories
  type: group-sort
  instruction: Розподіліть граматичні терміни за категоріями
  groups:
  - label: Відмінок
    items:
    - називний
    - орудний
  - label: Вид дієслова
    items:
    - доконаний
    - недоконаний
  - label: Порівняння
    items:
    - вищий
    - найвищий
  - label: Сполучник
    items:
    - тому що
    - щоб
workbook:
- type: match-up
  instruction: З'єднайте речення з правильним сполучником
  pairs:
  - left: Я вчу граматику, ____ добре говорити.
    right: щоб
  - left: Я не прийшов, ____ захворів.
    right: бо
  - left: ____ буде сонце, ми підемо гуляти.
    right: якщо
  - left: Я знаю, ____ це складний тест.
    right: що
  - left: Рейс скасували ____ почалася буря.
    right: через те що
  - left: Я читаю, ____ мені цікаво.
    right: тому що
- type: fill-in
  instruction: Вставте правильну форму прикметника або займенника
  items:
  - sentence: У мене є ____ словник.
    answer: новий
    options:
    - новий
    - нового
    - новому
  - sentence: Я не бачу ____ словника.
    answer: нового
    options:
    - новий
    - нового
    - новому
  - sentence: Ти написав це ____ ручкою.
    answer: синьою
    options:
    - синя
    - синю
    - синьою
  - sentence: Ми розмовляли про ____ друга.
    answer: мого
    options:
    - мій
    - мого
    - моєму
  - sentence: Вона подарувала квіти ____ мамі.
    answer: своїй
    options:
    - своя
    - свою
    - своїй
  - sentence: Я завжди роблю ____ роботу.
    answer: свою
    options:
    - моя
    - свою
    - моєю
- type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - новий
    - Слово
    - —
    - прикметник.
    - це
    correct_order:
    - Слово
    - новий
    - —
    - це
    - прикметник.
  - words:
    - займенник.
    - це
    - вона
    - Слово
    - —
    correct_order:
    - Слово
    - вона
    - —
    - це
    - займенник.
  - words:
    - має
    - Це
    - речення
    - помилку.
    correct_order:
    - Це
    - речення
    - має
    - помилку.
  - words:
    - зробити
    - граматики.
    - Нам
    - потрібно
    - повторення
    correct_order:
    - Нам
    - потрібно
    - зробити
    - повторення
    - граматики.
  - words:
    - У
    - впевненість
    - є
    - мене
    - собі.
    - в
    correct_order:
    - У
    - мене
    - є
    - впевненість
    - в
    - собі.
  - words:
    - складний
    - дуже
    - Це
    - тест.
    correct_order:
    - Це
    - дуже
    - складний
    - тест.
- type: true-false
  instruction: Правда чи неправда? (Граматичні правила)
  items:
  - statement: Після слова «немає» завжди використовуємо називний відмінок.
    correct: false
    explanation: Після слова «немає» завжди стоїть родовий відмінок.
  - statement: Недоконаний вид дієслова показує тривалий процес.
    correct: true
    explanation: Недоконаний вид означає тривалий процес або регулярну дію.
  - statement: Слово «більш кращий» — це правильна граматична форма.
    correct: false
    explanation: Правильно казати «кращий» або «найкращий». Це поширена помилка.
  - statement: Після прийменників ми додаємо букву «н» до займенників третьої особи.
    correct: true
    explanation: 'Наприклад: «з ним», «про нього».'
  - statement: Ми використовуємо кличний відмінок тільки для істот.
    correct: false
    explanation: 'Кличний відмінок також використовується для неістот, наприклад:
      «Україно!».'
  - statement: В українській мові ми обов'язково використовуємо подвійне заперечення.
    correct: true
    explanation: 'Наприклад: «Ніхто не знає».'
- type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I am giving the book to the teacher.
    options:
    - text: Я даю книгу вчителю.
      correct: true
    - text: Я даю книгу вчителя.
      correct: false
    - text: Я даю книгу вчитель.
      correct: false
    - text: Я даю книгу вчителем.
      correct: false
  - source: He is reading his own book.
    options:
    - text: Він читає свою книгу.
      correct: true
    - text: Він читає його книгу.
      correct: false
    - text: Він читає мою книгу.
      correct: false
    - text: Він читає її книгу.
