version: '1.0'
module: a2-comprehensive-review
level: a2
inline:
- id: fill-in-mixed-cases
  type: fill-in
  instruction: Вставте слово в правильному відмінку
  items:
  - sentence: У цьому тексті немає жодної ____.
    answer: помилки
    options:
    - помилка
    - помилки
    - помилку
  - sentence: Я зараз детально вивчаю українську ____.
    answer: граматику
    options:
    - граматика
    - граматику
    - граматикою
  - sentence: Студент активно цікавиться новим ____.
    answer: відмінком
    options:
    - відмінок
    - відмінку
    - відмінком
  - sentence: У цьому складному ____ є одна помилка.
    answer: реченні
    options:
    - речення
    - реченню
    - реченні
  - sentence: ____, перевірте, будь ласка, мій тест!
    answer: Вчителю
    options:
    - Вчитель
    - Вчителю
    - Вчителя
  - sentence: Ми додаємо букву «н» до ____ третьої особи.
    answer: займенника
    options:
    - займенник
    - займенника
    - займеннику
  - sentence: Ці маленькі слова з'єднують частини ____.
    answer: речення
    options:
    - речення
    - реченні
    - реченням
  - sentence: Для впевненості мені потрібне ____.
    answer: повторення
    options:
    - повторення
    - повторенню
    - повторенням
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть дієслово правильного виду (доконаний чи недоконаний)
  items:
  - question: Я щодня ____ свіжі новини.
    options:
    - читав
    - прочитав
    - прочитаю
    - буду читати
    correct: 0
  - question: Учора ввечері він нарешті ____ цю книгу.
    options:
    - читав
    - прочитав
    - буде читати
    - читатиме
    correct: 1
  - question: Вона завжди ____ каву з молоком.
    options:
    - купувала
    - купила
    - купить
    - купував
    correct: 0
  - question: Завтра я точно ____ це важливе завдання.
    options:
    - робив
    - робитиму
    - зробив
    - зроблю
    correct: 3
  - question: Ми довго ____ про українську граматику.
    options:
    - сказали
    - говорили
    - скажуть
    - скажемо
    correct: 1
  - question: Учитель ____, що це помилка.
    options:
    - говорив
    - сказав
    - буде говорити
    - говорить
    correct: 1
  - question: Коли я ____ українську, я часто слухав пісні.
    options:
    - вивчив
    - вивчав
    - вивчить
    - вивчу
    correct: 1
  - question: Ти вже ____ лист своєму другу?
    options:
    - писав
    - написав
    - пишеш
    - будеш писати
    correct: 1
- id: group-sort-grammar-categories
  type: group-sort
  instruction: Розподіліть граматичні терміни за їхніми категоріями
  groups:
  - label: Відмінок
    items:
    - називний
    - знахідний
  - label: Вид
    items:
    - доконаний
    - недоконаний
  - label: Порівняння
    items:
    - вищий
    - найвищий
  - label: Сполучник
    items:
    - тому що
    - якщо
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в реченні
  items:
  - sentence: Я не маю час на повторення.
    error: час
    correction: часу
    error_type: word
    options:
    - часу
    - часом
    - часі
    explanation: Після заперечення «не маю» або слова «немає» використовуємо родовий
      відмінок.
  - sentence: Він зараз читає його книгу.
    error: його
    correction: свою
    error_type: word
    options:
    - свою
    - своя
    - своє
    explanation: Коли предмет належить підмету («він читає»), використовуємо зворотний
      займенник «свій».
  - sentence: Ми часто говорили про його.
    error: його
    correction: нього
    error_type: word
    options:
    - нього
    - ним
    - ньому
    explanation: Після прийменника до займенників третьої особи завжди додаємо літеру
      «н».
  - sentence: Вона п'є каву без молоко.
    error: молоко
    correction: молока
    error_type: word
    options:
    - молока
    - молоком
    - молоці
    explanation: Прийменник «без» завжди вимагає родового відмінка.
  - sentence: Мій брат вищий мене.
    error: мене
    correction: за мене
    error_type: construction
    options:
    - за мене
    - від мене
    - ніж мене
    explanation: Для порівняння використовуємо прийменник «за» + знахідний відмінок
      або сполучник «ніж» + називний відмінок.
  - sentence: Я читаю цей текст, бо знати нові слова.
    error: бо
    correction: щоб
    error_type: word
    options:
    - щоб
    - якщо
    - тому що
    explanation: Для вираження мети (для чого?) використовуємо сполучник «щоб». «Бо»
      показує причину.
- id: error-correction-final-review
  type: error-correction
  instruction: Знайдіть і виправте помилку (фінальне повторення)
  items:
  - sentence: Ти бачиш цей великий помилка?
    error: помилка
    correction: помилку
    error_type: word
    options:
    - помилку
    - помилки
    - помилкою
    explanation: Дієслово «бачити» вимагає знахідного відмінка. «Помилка» — це іменник
      жіночого роду.
  - sentence: Я знаю, щоб ти вже тут.
    error: щоб
    correction: що
    error_type: word
    options:
    - що
    - бо
    - якщо
    explanation: Тут потрібен сполучник «що» для констатації факту. «Щоб» вказує на
      мету або бажання.
  - sentence: Він не знає ніщо про цю проблему.
    error: ніщо
    correction: нічого
    error_type: word
    options:
    - нічого
    - нічим
    - нічому
    explanation: У родовому відмінку (після заперечення «не знає») займенник «ніщо»
      має форму «нічого».
  - sentence: Три зошитів лежать на столі.
    error: зошитів
    correction: зошити
    error_type: word
    options:
    - зошити
    - зошиті
    - зошитом
    explanation: Після числівників 2, 3, 4 ми використовуємо називний відмінок множини.
  - sentence: Друг, допоможи мені з граматикою!
    error: Друг
    correction: Друже
    error_type: word
    options:
    - Друже
    - Друга
    - Другом
    explanation: При звертанні завжди використовуємо форму кличного відмінка.
  - sentence: У моїй рукі новий телефон.
    error: рукі
    correction: руці
    error_type: word
    options:
    - руці
    - руку
    - рукою
    explanation: Перед закінченням «-і» у місцевому відмінку приголосний «к» змінюється
      на «ц» (чергування).
workbook:
- type: match-up
  instruction: З'єднайте назву відмінка з його роллю або питанням
  pairs:
  - left: Називний відмінок
    right: базова форма, підмет
  - left: Родовий відмінок
    right: належність або відсутність чогось
  - left: Знахідний відмінок
    right: прямий об'єкт дії
  - left: Давальний відмінок
    right: адресат дії
  - left: Орудний відмінок
    right: інструмент або спільна дія
  - left: Місцевий відмінок
    right: місце дії, завжди з прийменником
  - left: Кличний відмінок
    right: використовується виключно для звертання
- type: unjumble
  instruction: Складіть правильне складне речення зі слів
  items:
  - words:
    - мову,
    - тому
    - люблю
    - Я
    - вчу
    - що
    - українську
    - Україну.
    correct_order:
    - Я
    - вчу
    - українську
    - мову,
    - тому
    - що
    - люблю
    - Україну.
  - words:
    - відмінок.
    - знаю,
    - складний
    - що
    - це
    - Я
    - дуже
    correct_order:
    - Я
    - знаю,
    - що
    - це
    - дуже
    - складний
    - відмінок.
  - words:
    - ми
    - час,
    - дієслова.
    - буде
    - повторимо
    - Якщо
    correct_order:
    - Якщо
    - буде
    - час,
    - ми
    - повторимо
    - дієслова.
  - words:
    - робити
    - Вона
    - читає
    - текст,
    - помилок.
    - щоб
    - не
    correct_order:
    - Вона
    - читає
    - текст,
    - щоб
    - не
    - робити
    - помилок.
  - words:
    - бо
    - урок,
    - Я
    - не
    - на
    - захворів.
    - прийшов
    correct_order:
    - Я
    - не
    - прийшов
    - на
    - урок,
    - бо
    - захворів.
  - words:
    - де
    - знає,
    - книга.
    - не
    - моя
    - Ніхто
    correct_order:
    - Ніхто
    - не
    - знає,
    - де
    - моя
    - книга.
- type: true-false
  instruction: Чи правильні ці твердження про українську граматику?
  items:
  - statement: Усі відмінки, крім називного, називаються непрямими.
    correct: true
    explanation: Називний — прямий відмінок, усі інші шість — непрямі.
  - statement: Слово «немає» завжди вимагає знахідного відмінка.
    correct: false
    explanation: Слово «немає» завжди вимагає родового відмінка (немає часу).
  - statement: Прикметник завжди має однаковий рід, число та відмінок з іменником.
    correct: true
    explanation: Так, прикметники завжди узгоджуються з іменниками (наприклад, «новий
      стіл», «нового стола»).
  - statement: Дієслова доконаного виду означають завершену дію або результат.
    correct: true
    explanation: Доконаний вид показує результат дії (наприклад, «прочитав»).
  - statement: Займенник «свій» показує, що предмет належить іншій особі, а не підмету.
    correct: false
    explanation: Зворотний займенник «свій» показує, що предмет належить саме підмету
      (виконавцю дії).
  - statement: В українській мові обов'язкове подвійне заперечення.
    correct: true
    explanation: Так, ми обов'язково використовуємо частку «не» перед дієсловом, навіть
      якщо є заперечний займенник (ніхто не знає).
- type: translate
  instruction: Оберіть правильний переклад речення українською мовою
  items:
  - source: I am learning Ukrainian in order to know more.
    options:
    - text: Я вчу українську, щоб знати більше.
      correct: true
    - text: Я вчу українську, тому що знати більше.
      correct: false
    - text: Я вчу українську, якщо знати більше.
      correct: false
  - source: He is taller than me.
    options:
    - text: Він вищий за мене.
      correct: true
    - text: Він більш вищий мене.
      correct: false
    - text: Він найвищий мене.
      correct: false
  - source: She gave the book to her (own) teacher.
    options:
    - text: Вона дала книгу своєму вчителю.
      correct: true
    - text: Вона дала книгу її вчителю.
      correct: false
    - text: Вона дала книгу своєю вчителю.
      correct: false
  - source: No one knows where the mistake is.
    options:
    - text: Ніхто не знає, де помилка.
      correct: true
    - text: Ніхто знає, де помилка.
      correct: false
    - text: Хтось не знає, де помилка.
      correct: false
  - source: If there is time, we will do the review.
    options:
    - text: Якщо буде час, ми зробимо повторення.
      correct: true
    - text: Щоб був час, ми зробимо повторення.
      correct: false
    - text: Тому що буде час, ми зробимо повторення.
      correct: false
  - source: I read this book every day.
    options:
    - text: Я щодня читав цю книгу.
      correct: true
    - text: Я щодня прочитав цю книгу.
      correct: false
    - text: Я щодня прочитаю цю книгу.
      correct: false
