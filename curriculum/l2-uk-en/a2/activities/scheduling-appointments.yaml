- type: match-up
  title: "Знайдіть переклад корисних фраз"
  pairs:
    - left: "записатися на прийом"
      right: "book an appointment"
    - left: "домовитися про зустріч"
      right: "arrange a meeting"
    - left: "вільний час"
      right: "free time"
    - left: "скасувати запис"
      right: "cancel an appointment"
    - left: "перенести на завтра"
      right: "reschedule for tomorrow"
    - left: "підтвердити зустріч"
      right: "confirm a meeting"
    - left: "о котрій годині?"
      right: "at what time?"
    - left: "на котру годину?"
      right: "for what time?"

- type: true-false
  title: "Культура планування в Україні"
  items:
    - statement: "В Україні більшість людей записується до лікаря через текстові месенджери."
      correct: true
      explanation: "Месенджери стали найпопулярнішим і найшвидшим способом для запису на різні послуги."
    - statement: "Запізнення на 15 хвилин до лікаря або на ділову зустріч є нормальним."
      correct: false
      explanation: "Для медичних та серйозних ділових зустрічей сувора пунктуальність є критично важливою."
    - statement: "Академічна чверть чудово працює для неформальних зустрічей із друзями."
      correct: true
      explanation: "Невелике запізнення на дружню зустріч часто вважається цілком нормальним."
    - statement: "Офіційні заклади використовують переважно дванадцятигодинний формат часу."
      correct: false
      explanation: "Офіційні розклади та медичні клініки завжди використовують 24-годинний формат часу."
    - statement: "Фраза 'пів на четверту' означає 15:30."
      correct: true
      explanation: "Пів на четверту буквально означає половину шляху до четвертої години."
    - statement: "Українці регулярно кажуть AM та PM для позначення часу в розмові."
      correct: false
      explanation: "В українській мові немає прямих аналогів цим словам, ми кажемо 'ранку', 'дня' або 'вечора'."
    - statement: "Для організації неформальної зустрічі з другом ми кажемо 'записатися'."
      correct: false
      explanation: "Для зустрічей із друзями ми завжди використовуємо дієслово 'домовитися'."
    - statement: "У месенджері дуже зручно підтвердити деталі майбутньої зустрічі."
      correct: true
      explanation: "Це надійний спосіб зберігати точну інформацію про час і обрану дату."

- type: fill-in
  title: "Оберіть правильне слово"
  items:
    - sentence: "Я хотів би _____ на прийом до стоматолога."
      answer: "записатися"
      options: ["записатися", "домовитися", "перенести", "скасувати"]
      explanation: "Для візиту до лікаря ми обов'язково використовуємо дієслово записатися."
    - sentence: "Ми _____ про зустріч завтра о шостій."
      answer: "домовилися"
      options: ["домовилися", "записалися", "перенесли", "зустріли"]
      explanation: "Для дружніх або рівноправних робочих зустрічей ми кажемо домовитися."
    - sentence: "Скажіть, будь ласка, чи є у вас _____ час на п'ятницю?"
      answer: "вільний"
      options: ["вільний", "зайнятий", "робочий", "пізній"]
      explanation: "При плануванні ми запитуємо адміністратора про вільний час спеціаліста."
    - sentence: "На жаль, головний лікар зараз повністю _____."
      answer: "зайнятий"
      options: ["зайнятий", "вільний", "пунктуальний", "ранній"]
      explanation: "Якщо спеціаліст не може вас прийняти, він вважається зайнятим."
    - sentence: "Я не можу прийти сьогодні, давайте _____ нашу зустріч на завтра."
      answer: "перенесемо"
      options: ["перенесемо", "скасуємо", "підтвердимо", "запишемо"]
      explanation: "Зміна дати або часу без повного відмінення події — це перенесення зустрічі."
    - sentence: "Мені потрібно терміново _____ мій сьогоднішній візит до перукаря."
      answer: "скасувати"
      options: ["скасувати", "перенести", "підтвердити", "домовитися"]
      explanation: "Якщо ви не можете прийти взагалі, ви скасовуєте свій запис."
    - sentence: "Будь ласка, обов'язково перевірте ваш Вайбер, щоб _____ точний час."
      answer: "підтвердити"
      options: ["підтвердити", "скасувати", "перенести", "записати"]
      explanation: "Деталі зустрічі часто просять підтвердити коротким текстовим повідомленням."
    - sentence: "У мене є офіційний запис на манікюр на _____ на третю."
      answer: "пів"
      options: ["пів", "чверть", "годину", "хвилину"]
      explanation: "Традиційна українська конструкція часу — 'пів на', що означає половину години."

- type: quiz
  title: "Перевірка розуміння часу та зустрічей"
  items:
    - question: "Який точний час означає розмовний вираз 'пів на сьому'?"
      options:
        - text: "18:30"
          correct: true
        - text: "19:30"
          correct: false
        - text: "17:30"
          correct: false
        - text: "18:00"
          correct: false
      explanation: "Пів на сьому означає 30 хвилин сьомої години, тобто 18:30 або 6:30 ранку."
    - question: "Як правильно запитати про точний час початку цікавого фільму в кінотеатрі?"
      options:
        - text: "О котрій годині?"
          correct: true
        - text: "На котру годину?"
          correct: false
        - text: "За якою годиною?"
          correct: false
        - text: "У скільки часу?"
          correct: false
      explanation: "Для конкретного моменту події ми завжди використовуємо питання 'О котрій'."
    - question: "Як граматично правильно запитати про бронювання столика в ресторані на певний час?"
      options:
        - text: "На котру годину?"
          correct: true
        - text: "О котрій годині?"
          correct: false
        - text: "В котру годину?"
          correct: false
        - text: "Коли годиною?"
          correct: false
      explanation: "Для офіційного бронювання або дедлайнів ми кажемо 'На котру'."
    - question: "Що точно означає корисне дієслово 'скасувати'?"
      options:
        - text: "Повністю відмінити зустріч"
          correct: true
        - text: "Змінити час зустрічі"
          correct: false
        - text: "Підтвердити час зустрічі"
          correct: false
        - text: "Призначити нову зустріч"
          correct: false
      explanation: "Скасувати означає назавжди видалити візит із системи розкладу."
    - question: "Що означає слово 'перенести' під час щоденного планування?"
      options:
        - text: "Змінити час зустрічі"
          correct: true
        - text: "Повністю відмінити зустріч"
          correct: false
        - text: "Забути про зустріч"
          correct: false
        - text: "Запізнитися на зустріч"
          correct: false
      explanation: "Перенести означає обрати інший день або час для вашого візиту."
    - question: "Який реальний час означає фраза адміністратора 'шістнадцята сорок п'ять'?"
      options:
        - text: "16:45"
          correct: true
        - text: "04:45"
          correct: false
        - text: "18:45"
          correct: false
        - text: "14:45"
          correct: false
      explanation: "Шістнадцята година дорівнює четвертій годині дня."
    - question: "Що означає ситуація, коли необхідний вам спеціаліст є 'зайнятим'?"
      options:
        - text: "Не має вільного часу"
          correct: true
        - text: "Має багато вільного часу"
          correct: false
        - text: "Є повністю вільним"
          correct: false
        - text: "Перебуває на відпочинку"
          correct: false
      explanation: "Зайнятий спеціаліст не має вільних місць у своєму робочому графіку."
    - question: "Як граматично правильно сказати про фізичну зустріч людини на вокзалі?"
      options:
        - text: "Я зустріну тебе"
          correct: true
        - text: "Я зустрінуся з тобою"
          correct: false
        - text: "Я запишуся до тебе"
          correct: false
        - text: "Я домовлюся з тобою"
          correct: false
      explanation: "Для фізичного прибуття когось ми кажемо 'зустріти', без прийменника 'з'."

- type: unjumble
  title: "Побудуйте ввічливі речення для планування"
  items:
    - words: ["Я", "хотів", "би", "записатися", "на", "прийом"]
      answer: "Я хотів би записатися на прийом"
    - words: ["Чи", "могли", "б", "ви", "перенести", "зустріч"]
      answer: "Чи могли б ви перенести зустріч"
    - words: ["У", "мене", "запис", "до", "лікаря", "на", "п'яту"]
      answer: "У мене запис до лікаря на п'яту"
    - words: ["Ми", "домовилися", "про", "каву", "на", "вихідних"]
      answer: "Ми домовилися про каву на вихідних"
    - words: ["Давайте", "запишемо", "мене", "на", "пів", "на", "п'яту"]
      answer: "Давайте запишемо мене на пів на п'яту"
    - words: ["Я", "зустріну", "тебе", "сьогодні", "на", "вокзалі"]
      answer: "Я зустріну тебе сьогодні на вокзалі"
    - words: ["Я", "дуже", "хочу", "зустрітися", "з", "тобою", "завтра"]
      answer: "Я дуже хочу зустрітися з тобою завтра"

- type: error-correction
  title: "Виправте типові помилки студентів"
  items:
    - sentence: "Я хочу зустріти з тобою завтра в нашому улюбленому кафе."
      error: "зустріти"
      answer: "зустрітися"
      options: ["зустрітися", "побачити", "знайти", "чекати"]
      explanation: "Для спільної зустрічі з друзями використовуємо зворотне дієслово 'зустрітися'."
      error_type: "word"
    - sentence: "Я точно прийду на п'яту годину, щоб подивитися цей фільм."
      error: "на п'яту"
      answer: "о п'ятій"
      options: ["о п'ятій", "у п'яту", "до п'ятої", "з п'ятої"]
      explanation: "Для точного часу фізичної дії використовуємо місцевий відмінок з прийменником 'о'."
      error_type: "phrase"
    - sentence: "На котру годині зазвичай починається ваш улюблений фільм?"
      error: "На котру"
      answer: "О котрій"
      options: ["О котрій", "У якій", "За якою", "В яку"]
      explanation: "Питання про точний час початку якоїсь події — 'О котрій'."
      error_type: "phrase"
    - sentence: "Я дуже хочу домовитися на манікюр сьогодні ввечері."
      error: "домовитися"
      answer: "записатися"
      options: ["записатися", "скасувати", "перенести", "підтвердити"]
      explanation: "Для отримання професійних послуг ми завжди кажемо 'записатися'."
      error_type: "word"
    - sentence: "Ми записалися з нашими друзями на каву на вихідних."
      error: "записалися"
      answer: "домовилися"
      options: ["домовилися", "скасували", "перенесли", "зустрілися"]
      explanation: "Для неформальних планів зі знайомими та друзями ми кажемо 'домовилися'."
      error_type: "word"
    - sentence: "Давай скасуємо нашу зустріч на завтра, бо я не можу прийти сьогодні."
      error: "скасуємо"
      answer: "перенесемо"
      options: ["перенесемо", "підтвердимо", "запишемо", "організуємо"]
      explanation: "Якщо ми просто змінюємо день, ми 'переносимо' зустріч, а не скасовуємо її повністю."
      error_type: "word"

