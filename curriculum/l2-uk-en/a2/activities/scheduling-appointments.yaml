- type: cloze
  title: "Заповніть пропуски в розмові з клінікою"
  passage: "Адміністратор: Клініка, добрий день! Пацієнт: Добрий день. Я хотів би {{1}} на прийом до {{2}}. Адміністратор: Звісно. Чи знаєте ви, на який день? Пацієнт: Чи є у вас {{3}} місця на п'ятницю? Адміністратор: На п'ятницю є вільний {{4}} лише о 14:00 та о 16:30. Пацієнт: Давайте запишемо мене на {{5}} на п'яту. Адміністратор: Добре, я {{6}} вас до лікаря на 16:30. Ми надішлемо вам повідомлення, щоб {{7}} ваш візит. Будь ласка, перевірте ваш {{8}} завтра. Якщо ваші плани раптово зміняться, ви завжди можете {{9}} візит на інший день або повністю його {{10}}."
  blanks:
    - id: 1
      answer: "записатися"
      options: ["записатися", "домовитися", "побачити", "відповісти"]
    - id: 2
      answer: "лікаря"
      options: ["лікаря", "приятеля", "знайомого", "друга"]
    - id: 3
      answer: "вільні"
      options: ["вільні", "зайняті", "порожні", "швидкі"]
    - id: 4
      answer: "час"
      options: ["час", "день", "місяць", "рік"]
    - id: 5
      answer: "пів"
      options: ["пів", "чверть", "половину", "третину"]
    - id: 6
      answer: "записую"
      options: ["записую", "домовляюся", "зустрічаю", "питаю"]
    - id: 7
      answer: "підтвердити"
      options: ["підтвердити", "скасувати", "перенести", "відмінити"]
    - id: 8
      answer: "Вайбер"
      options: ["Вайбер", "документ", "паспорт", "квиток"]
    - id: 9
      answer: "перенести"
      options: ["перенести", "зустріти", "прийти", "записати"]
    - id: 10
      answer: "скасувати"
      options: ["скасувати", "підтвердити", "зберегти", "перевірити"]

