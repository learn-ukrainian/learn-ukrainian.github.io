    - left: "Афіша фестивалю"
      right: "Яскравий плакат з розкладом та описом усіх подій"

- type: fill-in
  title: "Доповніть речення: Читання та інформація"
  instruction: "Оберіть правильне слово для кожного пропуску в реченнях."
  items:
    - sentence: "Коли я швидко дивлюся розклад автобусів, я використовую пошукове читання, щоб знайти потрібну мені ___."
      answer: "деталь"
      options: ["деталь", "ідею", "стратегію", "книгу"]
      explanation: "Розклад автобусів містить конкретні факти, тобто деталі."
    - sentence: "Щоб добре зрозуміти, про що ця нова стаття, мені потрібно знайти її ___ ідею."
      answer: "головну"
      options: ["головну", "швидку", "пасивну", "другорядну"]
      explanation: "Словосполучення головна ідея означає основний сенс тексту."
    - sentence: "Моя улюблена ___ читання — це швидкий перегляд перших речень у кожному новому абзаці."
      answer: "стратегія"
      options: ["стратегія", "відповідь", "інформація", "лекція"]
      explanation: "Метод або розумний підхід до справи називається стратегією."
    - sentence: "Я завжди підкреслюю ___ слова червоним маркером, коли читаю цей складний підручник."
      answer: "ключові"
      options: ["ключові", "оглядові", "відомі", "вільні"]
      explanation: "Найважливіші слова, які передають суть тексту, називаються ключовими словами."
    - sentence: "Цей довгий рекламний ___ на вулиці має приблизно п'ятдесят різних слів."
      answer: "текст"
      options: ["текст", "звук", "інструмент", "словник"]
      explanation: "Друкована інформація на вулиці або в книзі — це текст."
    - sentence: "Студенти роблять дуже короткий ___, коли уважно слухають свого старого професора."
      answer: "конспект"
      options: ["конспект", "диктант", "форум", "квиток"]
      explanation: "Швидкий запис лекції для навчання називається конспектом."
    - sentence: "В інтернеті сьогодні є надзвичайно велика кількість корисної ___ для студентів."
      answer: "інформації"
      options: ["інформації", "радості", "книгарні", "погоди"]
      explanation: "Будь-які факти та дані — це корисна інформація."
    - sentence: "Ми часто відвідуємо Львівський книжковий ___, щоб купити нові цікаві романи."
      answer: "форум"
      options: ["форум", "вокзал", "ресторан", "центр"]
      explanation: "Велика книжкова подія у місті Львові — це форум."
    - sentence: "Я уважно дивлюся на цю яскраву ___, щоб дізнатися час початку вечірнього концерту."
      answer: "афішу"
      options: ["афішу", "каву", "книгу", "зупинку"]
      explanation: "Великий паперовий плакат з анонсом події — це афіша."
    - sentence: "Щоб вільно читати українською, вам не потрібно перекладати кожне окреме ___."
      answer: "слово"
      options: ["слово", "букву", "питання", "заняття"]
      explanation: "Будь-який текст завжди логічно складається зі слів."
    - sentence: "Коли ми постійно використовуємо ___ читання, ми хочемо зрозуміти лише загальну тему."
      answer: "оглядове"
      options: ["оглядове", "пошукове", "активне", "робоче"]
      explanation: "Skimming українською мовою — це оглядове читання."
    - sentence: "Останній ___ цього тексту містить найголовніший фінальний висновок автора."
      answer: "абзац"
      options: ["абзац", "маркер", "словник", "автограф"]
      explanation: "Частина тексту між логічними відступами — це абзац."

- type: mark-the-words
  title: "Знайдіть усі дієслова"
  instruction: "Знайдіть і позначте всі дієслова (слова, що описують дію) в цих коротких ситуаціях."
  text: "Я щодня читаю короткі новини в інтернеті. Мій колега уважно слухає українське радіо вранці. Ми завжди шукаємо тільки найважливішу інформацію. Ви добре бачите цю велику червону афішу? Вони часто ставлять дуже складні запитання. Професор довго відповідає на ці запитання. Ми активно обговорюємо це екологічне питання. Вона раптом чує гучний шум на темній вулиці. Студенти швидко пишуть свій короткий конспект. Я чудово розумію головну ідею цього нового тексту. Він купує квитки на цікавий вечірній концерт. Ти використовуєш нову ефективну стратегію читання."
  answers: ["читаю", "слухає", "шукаємо", "бачите", "ставлять", "відповідає", "обговорюємо", "чує", "пишуть", "розумію", "купує", "використовуєш"]

- type: group-sort
  title: "Розподіліть ситуації за значенням"
  instruction: "Прочитайте короткі ситуації та розподіліть їх у дві правильні групи залежно від того, яке дієслово тут потрібно використати."
  groups:
    - name: "Слухати (активний процес)"
      items:
        - "Уважно сприймати ранкові новини по радіо"
        - "Насолоджуватися новим музичним альбомом гурту"
        - "Концентрувати увагу на лекції професора в аудиторії"
        - "Сидіти на довгому цікавому інтерв'ю з режисером"
        - "Робити короткий конспект під час виступу спікера"
        - "Намагатися зрозуміти кожне слово іноземця на вулиці"
    - name: "Чути (пасивна здатність)"
      items:
        - "Раптово звернути увагу на гучний звук мотора машини"
        - "Мати дуже поганий зв'язок по старому мобільному телефону"
        - "Несподівано прокинутися від дуже гучного ранкового будильника"
        - "Сприймати звуки сусідського ремонту о восьмій годині ранку"
        - "Звернути увагу на веселий спів маленьких птахів за вікном"
        - "Фізично сприймати будь-який випадковий шум на темній вулиці"

- type: unjumble
  title: "Складіть речення: Стратегії комунікації"
  instruction: "Розташуйте слова в правильному порядку, щоб утворити логічні та граматично правильні речення."
  items:
    - words: ["уважно", "ми", "новини", "слухаємо", "ранкові"]
      answer: "Ми уважно слухаємо ранкові новини"
    - words: ["цей", "дуже", "я", "текст", "добре", "розумію"]
      answer: "Я дуже добре розумію цей текст"
    - words: ["погано", "тебе", "я", "зараз", "чую"]
      answer: "Я зараз погано тебе чую"
    - words: ["важливе", "це", "студенти", "питання", "обговорюють"]
      answer: "Студенти обговорюють це важливе питання"
    - words: ["до", "одне", "запитання", "мене", "вас", "є", "у"]
      answer: "У мене є до вас одне запитання"
    - words: ["головну", "треба", "тексту", "знайти", "ідею"]
      answer: "Треба знайти головну ідею тексту"
    - words: ["деталі", "я", "записую", "тільки", "найважливіші"]
      answer: "Я записую тільки найважливіші деталі"
    - words: ["дуже", "є", "інформація", "корисною", "ця"]
      answer: "Ця інформація є дуже корисною"
    - words: ["ключові", "ми", "тексті", "слова", "шукаємо", "у"]
      answer: "Ми шукаємо ключові слова у тексті"
    - words: ["нашу", "змінити", "повинні", "ми", "стратегію"]
      answer: "Ми повинні змінити нашу стратегію"
    - words: ["відповідь", "правильну", "знайшов", "студент", "швидко"]
      answer: "Студент швидко знайшов правильну відповідь"
    - words: ["книжковий", "дуже", "це", "форум", "популярний"]
      answer: "Це дуже популярний книжковий форум"

- type: error-correction
  title: "Виправте мовні помилки"
  instruction: "Знайдіть і виправте одну типову логічну або лексичну помилку в кожному реченні."
  items:
    - sentence: "Я маю одне маленьке питання до нашого шановного викладача."
      error: "питання"
      answer: "запитання"
      error_type: "word"
      options: ["запитання", "інформацію", "відповідь", "деталь"]
      explanation: "Коли ви хочете щось спитати в людини, ви ставите їй запитання."
    - sentence: "Уряд нашої країни зараз вирішує дуже складне запитання."
      error: "запитання"
      answer: "питання"
      error_type: "word"
      options: ["питання", "слово", "радіо", "стратегію"]
      explanation: "Складна масштабна проблема чи тема для обговорення — це питання."
    - sentence: "Я щовечора уважно чую популярні подкасти в інтернеті."
      error: "чую"
      answer: "слухаю"
      error_type: "word"
      options: ["слухаю", "бачу", "знаю", "читаю"]
      explanation: "Активний та повністю свідомий процес сприйняття звуку — це дієслово слухати."
    - sentence: "Він говорить дуже тихо, тому я його досить погано слухаю."
      error: "слухаю"
      answer: "чую"
      error_type: "word"
      options: ["чую", "розумію", "відчуваю", "бачу"]
      explanation: "Фізична якість звуку та здатність його сприймати — це дієслово чути."
    - sentence: "Будь ласка, дайте мені правильну розповідь на мій тест."
      error: "розповідь"
      answer: "відповідь"
      error_type: "word"
      options: ["відповідь", "питання", "інформацію", "ідею"]
      explanation: "Реакція на запитання у тесті традиційно називається відповідь."
    - sentence: "Ми були на концерті і там дуже голосно грала музична графіка."
      error: "графіка"
      answer: "музика"
      error_type: "word"
      options: ["музика", "афіша", "книга", "робота"]
      explanation: "На вечірньому концерті завжди гучно грає музика."
    - sentence: "Щоб знайти час поїзда, я роблю оглядове читання табло."
      error: "оглядове"
      answer: "пошукове"
      error_type: "word"
      options: ["пошукове", "активне", "головне", "пасивне"]
      explanation: "Коли ви шукаєте конкретний факт чи цифру, це пошукове читання."
    - sentence: "Центральна ідея цього нового історичного роману дуже цікава."
      error: "Центральна"
      answer: "Головна"
      error_type: "word"
      options: ["Головна", "Перша", "Сильна", "Складна"]
      explanation: "Найважливіша думка тексту завжди називається головна ідея."
    - sentence: "Студенти швидко пишуть довгий концерт на лекції професора."
      error: "концерт"
      answer: "конспект"
      error_type: "word"
      options: ["конспект", "журнал", "форум", "вокзал"]
      explanation: "Короткий і змістовний запис лекції називається конспект."
    - sentence: "Я завжди шукаю в тексті закриті слова, щоб швидко його зрозуміти."
      error: "закриті"
      answer: "ключові"
      error_type: "word"
      options: ["ключові", "оглядові", "вільні", "активні"]
      explanation: "Важливі слова, що розкривають суть всього тексту, називаються ключовими словами."
    - sentence: "Ця велика книжкова афіша має дуже багато зайвих звуків."
      error: "звуків"
      answer: "деталей"
      error_type: "word"
      options: ["деталей", "відповідей", "питань", "інструментів"]
      explanation: "Будь-яка афіша містить текстову інформацію або візуальні деталі, а не звуки."
    - sentence: "Я ніяк не можу знайти правильну інтонацію про цю подію."
      error: "інтонацію"
      answer: "інформацію"
      error_type: "word"
      options: ["інформацію", "афішу", "ідею", "стратегію"]
      explanation: "Корисні факти та дані про нову подію — це інформація."

- type: quiz
  title: "Перевірте знання: Спілкування в реальному житті"
  instruction: "Оберіть найбільш логічну реакцію або твердження для кожної описаної ситуації."
  items:
    - question: "Ви бачите великий розклад автобусів на зупинці. Що ви робите?"
      explanation: "Для швидкого пошуку часу потрібного автобуса ви використовуєте пошукове читання."
      options:
        - text: "Я швидко сканую текст, щоб знайти свій потрібний час"
          correct: true
        - text: "Я дуже повільно читаю вголос кожне слово в розкладі"
          correct: false
        - text: "Я повністю ігнорую всі цифри та шукаю тільки букви"
          correct: false
        - text: "Я перекладаю всі слова зі словником у своєму телефоні"
          correct: false
    - question: "Ваш найкращий друг хоче розповісти вам дуже важливу історію. Що ви йому скажете?"
      explanation: "Слухати — це активний процес повної концентрації уваги на своєму співрозмовнику."
      options:
        - text: "Я тебе дуже уважно слухаю зараз"
          correct: true
        - text: "Я тебе зараз зовсім погано чую"
          correct: false
        - text: "Я постійно вирішую це складне питання"
          correct: false
        - text: "Я хочу знайти головну ідею твого тексту"
          correct: false
    - question: "Ви сидите в кав'ярні, і хтось дуже гучно сміється за сусіднім столом. Яке слово описує цю ситуацію?"
      explanation: "Слово чути описує повністю пасивний фізичний процес сприйняття звуку."
      options:
        - text: "Я дуже добре чую цей гучний сміх"
          correct: true
        - text: "Я дуже уважно слухаю цей сміх"
          correct: false
        - text: "Я постійно ставлю запитання про цей сміх"
          correct: false
        - text: "Я роблю короткий конспект цього сміху"
          correct: false
    - question: "На уроці ви не розумієте нове граматичне правило. Що ви робите?"
      explanation: "Щоб отримати пояснення від свого викладача, ви ставите йому запитання."
      options:
        - text: "Я піднімаю руку і ставлю своє запитання викладачу"
          correct: true
        - text: "Я швидко вирішую це складне питання абсолютно сам"
          correct: false
        - text: "Я просто ігнорую всі ключові слова на шкільній дошці"
          correct: false
        - text: "Я дуже уважно слухаю своє власне незрозуміле запитання"
          correct: false
    - question: "Ваш керівник на роботі каже, що компанія має фінансову проблему. Як він це назве?"
      explanation: "Складна проблема або тема для серйозного обговорення завжди називається питанням."
      options:
        - text: "Ми маємо дуже серйозне фінансове питання"
          correct: true
        - text: "Я маю до вас одне термінове фінансове запитання"
          correct: false
        - text: "Ми шукаємо маленьку фінансову деталь у цьому тексті"
          correct: false
        - text: "Це найкраща фінансова відповідь для нашого банку"
          correct: false
    - question: "Ви відкриваєте нову сторінку в інтернеті з великою статтею. З чого ви починаєте?"
      explanation: "Оглядове читання завжди починається з перегляду великих заголовків та перших речень."
      options:
        - text: "Я швидко читаю головний заголовок і перші речення"
          correct: true
        - text: "Я відразу знаходжу маленьку деталь у кінці статті"
          correct: false
        - text: "Я уважно слухаю, як інші люди обговорюють цю статтю"
          correct: false
        - text: "Я повільно виписую кожне друге слово в свій зошит"
          correct: false
    - question: "Що найкраще допомагає швидко зрозуміти загальний зміст невідомого українського тексту?"
      explanation: "Ключові слова завжди працюють як яскраві маяки і допомагають зрозуміти суть."
      options:
        - text: "Активний пошук і аналіз кількох ключових слів"
          correct: true
        - text: "Ідеальний літературний переклад кожного речення"
          correct: false
        - text: "Уважне читання тексту з самого кінця до його початку"
          correct: false
        - text: "Дуже гучне читання тексту перед дзеркалом у кімнаті"
          correct: false
    - question: "Яку інформацію ми зазвичай записуємо під час розумного конспектування лекції?"
      explanation: "Під час конспектування ми ігноруємо зайві слова і записуємо тільки конкретні факти та цифри."
      options:
        - text: "Тільки найважливіші факти, цифри та ключові слова"
          correct: true
        - text: "Кожне довге граматичне речення нашого розумного лектора"
          correct: false
        - text: "Всі жарти та дуже емоційні коментарі присутніх студентів"
          correct: false
        - text: "Тільки красиві поетичні описи з відомих українських романів"
          correct: false
    - question: "Як ви дізнаєтеся точний час вечірнього концерту на великій рекламній афіші?"
      explanation: "Щоб швидко знайти точну цифру або час, ми використовуємо метод пошукового читання."
      options:
        - text: "Я швидко сканую текст очима в пошуках знайомих цифр"
          correct: true
        - text: "Я роблю оглядове читання всього тексту від початку до кінця"
          correct: false
        - text: "Я дуже уважно аналізую головну ідею цієї рекламної афіші"
          correct: false
        - text: "Я вирішую це складне культурне питання разом зі своїм другом"
          correct: false
    - question: "Що ми зазвичай очікуємо почути, коли ставимо запитання іншій людині?"
      explanation: "Будь-яке пряме запитання вимагає від людини конкретної та швидкої відповіді."
      options:
        - text: "Ми очікуємо отримати від людини швидку та пряму відповідь"
          correct: true
        - text: "Ми очікуємо почути довгу лекцію про історію нашої країни"
          correct: false
        - text: "Ми чекаємо, що ця людина буде вирішувати наше питання"
          correct: false
        - text: "Ми просто терпляче чекаємо на появу нових ключових слів"
          correct: false
    - question: "Що саме відбувається під час щорічного Радіодиктанту національної єдності?"
      explanation: "Під час диктанту українці одночасно слухають радіо та уважно пишуть текст на папері."
      options:
        - text: "Люди уважно слухають текст по радіо і швидко пишуть його"
          correct: true
        - text: "Усі люди голосно читають власні тексти на великій вулиці"
          correct: false
        - text: "Студенти ставлять дуже багато запитань відомому письменнику"
          correct: false
        - text: "Викладачі перевіряють знання студентів у великих університетах"
          correct: false
    - question: "Чому ми іноді просимо нашого друга повторити свою фразу по телефону?"
      explanation: "Якщо телефонний зв'язок поганий, ми погано чуємо (сприймаємо) слова нашого друга."
      options:
        - text: "Тому що ми дуже погано чуємо його голос через поганий зв'язок"
          correct: true
        - text: "Тому що ми зовсім не хочемо уважно слухати його нову історію"
          correct: false
        - text: "Тому що ми використовуємо неправильну активну стратегію читання"
          correct: false
        - text: "Тому що ми зовсім не маємо швидкої відповіді на його питання"
          correct: false

- type: fill-in
  title: "Вставте правильні слова: Чути, слухати, питання, запитання"
  instruction: "Доповніть кожне речення правильним словом із запропонованих варіантів."
  items:
    - sentence: "У нас раптом виникло одне серйозне юридичне ___, яке треба вирішити до завтра."
      answer: "питання"
      options: ["питання", "запитання", "рішення", "бажання"]
      explanation: "Проблема або складна справа для обговорення та вирішення — це питання."
    - sentence: "Молодий журналіст поставив дуже провокаційне ___ відомому політику."
      answer: "запитання"
      options: ["запитання", "питання", "слово", "радіо"]
      explanation: "Коротка фраза, на яку чекають негайної словесної відповіді, — це запитання."
    - sentence: "Я щоранку дуже уважно ___ свіжі подкасти про сучасну культуру, коли їду в метро."
      answer: "слухаю"
      options: ["слухаю", "чую", "бачу", "працюю"]
      explanation: "Цілеспрямований активний процес сприйняття аудіоінформації — це дієслово слухати."
    - sentence: "Ти мене зараз добре ___? Бо тут на цій вулиці дуже гучно працюють машини!"
      answer: "чуєш"
      options: ["чуєш", "слухаєш", "читаєш", "розумієш"]
      explanation: "Коли ми говоримо про фізичну можливість сприймати звук, ми використовуємо дієслово чути."
    - sentence: "Ми дуже довго чекали на вашу офіційну ___ на наш вчорашній електронний лист."
      answer: "відповідь"
      options: ["відповідь", "афішу", "ідею", "деталь"]
      explanation: "Очікувана реакція на лист чи запит завжди називається відповідь."
    - sentence: "Вона дуже уважно ___ свого маленького сина, який розповідав довгий вірш."
      answer: "слухала"
      options: ["слухала", "чула", "читала", "знала"]
      explanation: "Повна концентрація уваги на співрозмовнику — це дієслово слухати."
    - sentence: "Вони зовсім не ___ будильника і тому дуже сильно запізнилися на свій ранковий поїзд."
      answer: "чули"
      options: ["чули", "слухали", "вирішували", "писали"]
      explanation: "Сприйняття звуку будильника — це пасивний фізичний процес (чути)."
    - sentence: "Ця глобальна зміна клімату — це найважливіше екологічне ___ цього століття."
      answer: "питання"
      options: ["питання", "запитання", "текст", "конспект"]
      explanation: "Велика масштабна глобальна проблема — це питання."
    - sentence: "Чи можу я поставити вам одне особисте ___ про вашу нову роботу?"
      answer: "запитання"
      options: ["запитання", "питання", "відповідь", "стратегію"]
      explanation: "Коли ви хочете щось дізнатися у людини напряму, ви ставите їй запитання."
    - sentence: "Коли я часто гуляю в лісі, я дуже люблю ___ спів маленьких лісових птахів."
      answer: "слухати"
      options: ["слухати", "чути", "бачити", "вирішувати"]
      explanation: "Коли ви отримуєте велике естетичне задоволення і концентруєтеся на звуці, це слухати."
    - sentence: "Мій дідусь уже досить старий, тому він іноді дуже погано ___."
      answer: "чує"
      options: ["чує", "слухає", "працює", "пише"]
      explanation: "Погана фізична здатність сприймати звук описується дієсловом чути."
    - sentence: "Наш уряд повинен терміново вирішити це фінансове ___ до кінця цього року."
      answer: "питання"
      options: ["питання", "запитання", "радіо", "слово"]
      explanation: "Глобальна проблема, яку серйозно вирішує уряд, є питанням."

