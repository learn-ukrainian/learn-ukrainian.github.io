- type: quiz
  title: "Перевірте свої знання: Стратегії читання"
  instruction: "Оберіть правильну відповідь на кожне запитання про стратегії читання та слухання."
  items:
    - question: "Що таке оглядове читання (skimming) у повсякденному житті?"
      explanation: "Оглядове читання допомагає дуже швидко зрозуміти загальну тему великого тексту."
      options:
        - text: "Швидкий перегляд тексту для розуміння головної ідеї"
          correct: true
        - text: "Повільне читання кожного слова з великим словником"
          correct: false
        - text: "Довгий пошук одного конкретного слова у тексті"
          correct: false
        - text: "Читання всього тексту вголос для тренування вимови"
          correct: false
    - question: "Коли ми зазвичай використовуємо пошукове читання (scanning)?"
      explanation: "Пошукове читання потрібне для пошуку конкретних дрібних фактів, наприклад, часу або ціни."
      options:
        - text: "Коли нам потрібна дуже конкретна деталь чи факт"
          correct: true
        - text: "Коли ми читаємо цікавий детективний роман перед сном"
          correct: false
        - text: "Коли ми дуже хочемо зрозуміти головну ідею тексту"
          correct: false
        - text: "Коли ми уважно вивчаємо нові складні граматичні правила"
          correct: false
    - question: "Де найчастіше можна легко знайти головну ідею у великому абзаці?"
      explanation: "Головна ідея найчастіше логічно ховається в першому або останньому реченні абзацу."
      options:
        - text: "У першому або останньому реченні цього абзацу"
          correct: true
        - text: "Завжди тільки в самому центрі великого абзацу"
          correct: false
        - text: "У кожному другому реченні цього нового тексту"
          correct: false
        - text: "Тільки в самому маленькому та короткому реченні"
          correct: false
    - question: "Яке з цих слів є дієсловом, що описує свідомий активний процес?"
      explanation: "Слово слухати описує активний, повністю свідомий процес сприйняття будь-якого звуку."
      options:
        - text: "Слухати"
          correct: true
        - text: "Чути"
          correct: false
        - text: "Бачити"
          correct: false
        - text: "Відчувати"
          correct: false
    - question: "Яке слово означає абсолютно пасивну біологічну здатність приймати звук?"
      explanation: "Слово чути описує повністю пасивну фізичну людську здатність."
      options:
        - text: "Чути"
          correct: true
        - text: "Слухати"
          correct: false
        - text: "Розуміти"
          correct: false
        - text: "Читати"
          correct: false
    - question: "Яке слово ми завжди використовуємо, коли говоримо про широку проблему чи тему?"
      explanation: "Слово питання означає серйозну проблему або загальну тему для довгої дискусії."
      options:
        - text: "Питання"
          correct: true
        - text: "Запитання"
          correct: false
        - text: "Відповідь"
          correct: false
        - text: "Деталь"
          correct: false
    - question: "Яке слово ми використовуємо, коли звертаємося до людини з метою отримати інформацію?"
      explanation: "Запитання — це конкретна фраза, яка вимагає негайної словесної відповіді від іншої людини."
      options:
        - text: "Запитання"
          correct: true
        - text: "Питання"
          correct: false
        - text: "Інформація"
          correct: false
        - text: "Ідея"
          correct: false
    - question: "Чому Радіодиктант національної єдності є надзвичайно важливою подією?"
      explanation: "Це величезний культурний флешмоб, який потужно об'єднує націю."
      options:
        - text: "Він об'єднує всіх українців і показує повагу до рідної мови"
          correct: true
        - text: "Він дуже допомагає студентам складати складні шкільні іспити"
          correct: false
        - text: "Це просто нудний шкільний тест на знання теоретичної граматики"
          correct: false
        - text: "Він потрібен тільки для професійних українських журналістів"
          correct: false
    - question: "Яке головне і найважливіше правило швидкого конспектування довгої лекції?"
      explanation: "Під час розумного конспектування треба писати тільки короткі та змістовні фрази."
      options:
        - text: "Записувати тільки ключові слова та найважливіші деталі"
          correct: true
        - text: "Писати абсолютно всі слова лектора красивими повними реченнями"
          correct: false
        - text: "Ніколи не використовувати свої власні короткі скорочення слів"
          correct: false
        - text: "Записувати всі емоційні коментарі та жарти присутніх студентів"
          correct: false
    - question: "Як найкраще швидко ідентифікувати ключові слова під час оглядового читання?"
      explanation: "Ключові слова часто мають велику літеру або логічно повторюються кілька разів."
      options:
        - text: "Шукати слова з великої літери та жирний чорний шрифт"
          correct: true
        - text: "Звертати свою увагу тільки на найменші та найкоротші слова"
          correct: false
        - text: "Повільно перекладати кожне третє слово в новому реченні"
          correct: false
        - text: "Повністю ігнорувати всі іменники та шукати тільки нові дієслова"
          correct: false
    - question: "Що ми обов'язково повинні робити під час пошукового читання (scanning)?"
      explanation: "Під час пошукового читання ми ігноруємо іншу текстову інформацію і шукаємо деталі."
      options:
        - text: "Шукати візуальний образ нашого потрібного слова чи цифри"
          correct: true
        - text: "Уважно і довго читати весь текст зліва направо як звичайну книгу"
          correct: false
        - text: "Дуже повільно аналізувати кожне складне речення в новому абзаці"
          correct: false
        - text: "Ретельно виписувати всі незнайомі слова у свій електронний словник"
          correct: false
    - question: "Яка дія зовсім не підходить для ефективного активного слухання розмови?"
      explanation: "Активне слухання завжди означає концентрацію, а не пасивне нудне чекання."
      options:
        - text: "Пасивне очікування, поки нові слова самі поллються у вуха"
          correct: true
        - text: "Постійний пошук спеціальних маркерів часу в швидкій мові"
          correct: false
        - text: "Уважний аналіз емоцій та ключових інтонацій у чужому голосі"
          correct: false
        - text: "Свідоме передбачення того, що інша людина скаже вам далі"
          correct: false

- type: match-up
  title: "Знайдіть логічну пару"
  instruction: "З'єднайте українське слово з його правильним визначенням або типовим контекстом."
  pairs:
    - left: "Оглядове читання"
      right: "Швидкий пошук головної ідеї всьому тексті"
    - left: "Пошукове читання"
      right: "Сканування тексту для пошуку конкретної цифри"
    - left: "Ключове слово"
      right: "Важливе слово, яке повторюється кілька разів"
    - left: "Головна ідея"
