    - left: "Слухати радіо"
      right: "Активний та повністю свідомий людський процес"
    - left: "Чути шум"
      right: "Пасивна фізична здатність приймати зовнішній звук"
    - left: "Вирішувати питання"
      right: "Тривале обговорення великої і складної проблеми"
    - left: "Ставити запитання"
      right: "Звернення до людини, щоб отримати швидку відповідь"
    - left: "Короткий конспект"
      right: "Запис тільки найважливішої інформації під час лекції"
