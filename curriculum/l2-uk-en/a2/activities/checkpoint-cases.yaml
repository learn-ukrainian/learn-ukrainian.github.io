inline:
- id: group-sort-cases
  type: group-sort
  instruction: Розподіліть слова за відмінками
  groups:
  - label: Називний відмінок
    items:
    - столи
    - діти
    - землі
  - label: Родовий відмінок
    items:
    - книг
    - людей
    - років
  - label: Давальний відмінок
    items:
    - сестрі
    - батькові
    - нареченій
  - label: Знахідний відмінок
    items:
    - будинок
    - школу
    - Київ
  - label: Орудний відмінок
    items:
    - словником
    - молоком
    - комп'ютерами
  - label: Місцевий відмінок
    items:
    - сумці
    - Чернівцях
    - весіллі
  - label: Кличний відмінок
    items:
    - мамо
    - пане
    - Олено
- id: fill-in-mixed-cases
  type: fill-in
  instruction: Вставте правильну форму слова
  items:
  - sentence: Вони живуть у ____.
    answer: Чернівцях
    options:
    - Чернівцях
    - Чернівці
    - Чернівцями
  - sentence: Я гуляю з ____.
    answer: друзями
    options:
    - друзями
    - друзі
    - друзях
  - sentence: У нас немає ____.
    answer: грошей
    options:
    - грошей
    - гроші
    - грошам
  - sentence: Вона допомагає ____.
    answer: батькові
    options:
    - батькові
    - батько
    - батьком
  - sentence: Я бачу великий ____.
    answer: будинок
    options:
    - будинок
    - будинку
    - будинком
  - sentence: Ми зустрінемося у ____.
    answer: четвер
    options:
    - четвер
    - четверга
    - четверзі
  - sentence: У класі мало ____.
    answer: учнів
    options:
    - учнів
    - учні
    - учням
  - sentence: Жінка у червоній ____ — моя мама.
    answer: сукні
    options:
    - сукні
    - сукню
    - сукнею
  - sentence: ____, де мої ключі?
    answer: Мамо
    options:
    - Мамо
    - Мама
    - Мамі
  - sentence: Діти швидко йдуть в ____.
    answer: школу
    options:
    - школу
    - школі
    - школою
