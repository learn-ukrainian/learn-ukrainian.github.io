  - source: I cannot see without glasses.
    options:
    - text: Я не бачу без окулярів.
      correct: true
    - text: Я не бачу без окуляри.
      correct: false
  - source: The woman in the red dress is my mom.
    options:
    - text: Жінка у червоній сукні — моя мама.
      correct: true
    - text: Жінка у червоною сукнею — моя мама.
      correct: false
  - source: Mom, where are my keys?
    options:
    - text: Мамо, де мої ключі?
      correct: true
    - text: Мама, де мої ключі?
      correct: false
  - source: We bought many sweet apples.
    options:
    - text: Ми купили багато солодких яблук.
      correct: true
    - text: Ми купили багато солодкі яблука.
      correct: false
  - source: I am walking with my best friends.
    options:
    - text: Я гуляю з найкращими друзями.
      correct: true
    - text: Я гуляю з найкращі друзі.
      correct: false
  - source: He arrived from a big city.
    options:
    - text: Він приїхав з великого міста.
      correct: true
    - text: Він приїхав з велике місто.
      correct: false
