- type: true-false
  instruction: Правда чи ні?
  items:
  - statement: У Родовому відмінку множини слово 'книга' має форму 'книгів'.
    correct: false
    explanation: Слово 'книга' (жіночий рід) у Родовому відмінку множини має нульове
      закінчення — 'книг'.
  - statement: Дієслово 'дякувати' вимагає Знахідного відмінка (Accusative).
    correct: false
    explanation: 'Дієслово ''дякувати'' вимагає Давального відмінка (Dative): дякувати
      батькам.'
  - statement: Слова 'гроші' та 'окуляри' мають тільки форму множини.
    correct: true
    explanation: Так, це іменники, які вживаються лише в множині (Pluralia Tantum).
  - statement: Прийменник 'з' з Орудним відмінком (Instrumental) означає компанію
      (наприклад, 'з братом').
    correct: true
    explanation: Так, 'з братом' означає 'with brother'. З Родовим відмінком 'з' означає
      напрямок (з України).
  - statement: Слово 'людина' у множині — це 'людини'.
    correct: false
    explanation: Це неправильна форма. Множина від 'людина' — 'люди'.
  - statement: У формі Кличного відмінка слово 'мама' буде 'мамо'.
    correct: true
    explanation: Так, Кличний відмінок для іменників на -а часто має закінчення -о.
