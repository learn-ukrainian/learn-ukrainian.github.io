- id: mixed-error-hunt
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Ми часто дякуємо батьків.
    error: батьків
    correction: батькам
    error_type: word
    options:
    - батькам
    - батьками
    - батьки
    explanation: Дієслово 'дякувати' вимагає Давального відмінка.
  - sentence: Вона користується телефон.
    error: телефон
    correction: телефоном
    error_type: word
    options:
    - телефоном
    - телефону
    - телефоні
    explanation: Дієслово 'користуватися' вимагає Орудного відмінка.
  - sentence: Книги лежать на полицю.
    error: полицю
    correction: полиці
    error_type: word
    options:
    - полиці
    - полицею
    - полиць
    explanation: На питання 'Де?' з прийменником 'на' відповідає Місцевий відмінок.
  - sentence: Я йду з брат.
    error: брат
    correction: братом
    error_type: word
    options:
    - братом
    - брата
    - брату
    explanation: На питання 'З ким?' відповідає Орудний відмінок.
  - sentence: У кімнаті багато студенті.
    error: студенті
    correction: студентів
    error_type: word
    options:
    - студентів
    - студенти
    - студентам
    explanation: Слово 'багато' вимагає Родового відмінка множини.
  - sentence: Я люблю моїх друзі.
    error: друзі
    correction: друзів
    error_type: word
    options:
    - друзів
    - друзям
    - друзями
    explanation: Для назв істот Знахідний відмінок множини має форму, як у Родовому
      (друзів).
