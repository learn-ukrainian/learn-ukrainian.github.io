- id: translate-sentences
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I have five years of experience.
    options:
    - text: У мене є п'ять років досвіду.
      correct: true
    - text: У мене є п'ять роки досвіду.
      correct: false
  - source: They live in Chernivtsi.
    options:
    - text: Вони живуть у Чернівцях.
      correct: true
    - text: Вони живуть у Чернівці.
      correct: false
  - source: She uses a new dictionary.
    options:
    - text: Вона користується новим словником.
      correct: true
