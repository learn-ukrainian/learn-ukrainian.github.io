- id: match-up-genitive
  type: match-up
  instruction: З'єднайте іменник із правильною формою Родового відмінка множини (багато...)
  pairs:
  - left: стіл
    right: столів
  - left: книга
    right: книг
  - left: місто
    right: міст
  - left: людина
    right: людей
  - left: студент
    right: студентів
  - left: гість
    right: гостей
  - left: річ
    right: речей
  - left: око
    right: очей
  - left: день
    right: днів
  - left: ніч
    right: ночей
- id: true-false-cases
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Після слова «багато» ми використовуємо Називний відмінок.
    correct: false
  - statement: Слово «окуляри» має тільки форму множини.
    correct: true
  - statement: Слово «гроші» у Родовому відмінку буде «грошей».
    correct: true
  - statement: Після прийменника «без» завжди йде Знахідний відмінок.
    correct: false
  - statement: Якщо ми йдемо «в школу», це Знахідний відмінок (напрямок).
    correct: true
  - statement: Форма «п'ять студенти» — правильна.
    correct: false
  - statement: Для звертання до людини ми використовуємо Кличний відмінок.
    correct: true
  - statement: Дієслово «допомагати» вимагає Знахідного відмінка.
    correct: false
  - statement: Дієслово «користуватися» вимагає Орудного відмінка.
    correct: true
  - statement: Множина від слова «друг» — «други».
    correct: false
