    - речі
    - лежать
    - там.
  - words:
    - У
    - багато
    - бібліотеці
    - книг.
    correct_order:
    - У
    - бібліотеці
    - багато
    - книг.
  - words:
    - знаємо
    - морів.
    - назви
    - Ми
    - п'яти
