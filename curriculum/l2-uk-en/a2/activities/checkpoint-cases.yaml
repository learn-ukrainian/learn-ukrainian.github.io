- type: quiz
  title: 'Загальні питання про відмінки'
  instruction: 'Дайте відповідь на запитання про українські відмінки.'
  items:
    - question: 'Який відмінок ми використовуємо, коли говоримо про професію?'
      options:
        - text: 'орудний'
          correct: true
        - text: 'давальний'
          correct: false
        - text: 'знахідний'
          correct: false
        - text: 'називний'
          correct: false
      explanation: 'Для професії з дієсловами бути, стати, працювати використовується орудний відмінок.'
    - question: 'Який відмінок ми використовуємо після слова "немає"?'
      options:
        - text: 'родовий'
          correct: true
        - text: 'називний'
          correct: false
        - text: 'знахідний'
          correct: false
        - text: 'місцевий'
          correct: false
      explanation: 'Заперечення відсутності завжди вимагає родового відмінка.'
    - question: 'Який відмінок ми використовуємо для вираження напрямку руху ("куди?")?'
      options:
        - text: 'знахідний'
          correct: true
        - text: 'місцевий'
          correct: false
        - text: 'називний'
          correct: false
        - text: 'давальний'
          correct: false
      explanation: 'Напрямок руху завжди вимагає знахідного відмінка (в банк, на пошту).'
    - question: 'Який відмінок ми використовуємо для статичного розташування ("де?")?'
      options:
        - text: 'місцевий'
          correct: true
        - text: 'знахідний'
          correct: false
        - text: 'орудний'
          correct: false
        - text: 'родовий'
          correct: false
      explanation: 'Статичне розташування вимагає місцевого відмінка (в банку, на пошті).'
    - question: 'Який відмінок ми використовуємо для звертання до іншої людини?'
      options:
        - text: 'кличний'
          correct: true
        - text: 'називний'
          correct: false
        - text: 'давальний'
          correct: false
        - text: 'орудний'
          correct: false
      explanation: 'Кличний відмінок використовується виключно для прямого звертання.'
    - question: 'Який відмінок ми використовуємо, щоб сказати свій вік?'
      options:
        - text: 'давальний'
          correct: true
        - text: 'називний'
          correct: false
        - text: 'родовий'
          correct: false
        - text: 'знахідний'
          correct: false
      explanation: 'Вік виражається давальним відмінком особи (моєму дідусеві 80 років).'
    - question: 'Який відмінок ми використовуємо для інструмента або засобу (чим?)?'
      options:
        - text: 'орудний'
          correct: true
        - text: 'знахідний'
          correct: false
        - text: 'давальний'
          correct: false
        - text: 'місцевий'
          correct: false
      explanation: 'Інструмент дії завжди стоїть в орудному відмінку (писати ручкою).'
    - question: 'Який відмінок ми використовуємо, коли говоримо про точну дату?'
      options:
        - text: 'родовий'
          correct: true
        - text: 'місцевий'
          correct: false
        - text: 'знахідний'
          correct: false
        - text: 'називний'
          correct: false
      explanation: 'Точна дата (день місяця) вимагає родового відмінка (першого січня).'
    - question: 'Який відмінок найчастіше виконує роль головного суб’єкта в реченні?'
      options:
        - text: 'називний'
          correct: true
        - text: 'знахідний'
          correct: false
        - text: 'давальний'
          correct: false
        - text: 'родовий'
          correct: false
      explanation: 'Називний відмінок — це відмінок підмета (головної дійової особи).'
    - question: 'Який відмінок ми використовуємо для вираження емоцій та станів ("мені сумно")?'
      options:
        - text: 'давальний'
          correct: true
        - text: 'називний'
          correct: false
        - text: 'орудний'
          correct: false
        - text: 'місцевий'
          correct: false
      explanation: 'Фізичні та емоційні стани вимагають давального відмінка для особи.'
    - question: 'Який відмінок завжди йде після прийменника "через" (через дорогу)?'
      options:
        - text: 'знахідний'
          correct: true
        - text: 'родовий'
          correct: false
        - text: 'давальний'
          correct: false
        - text: 'місцевий'
          correct: false
      explanation: 'Прийменник через завжди керує знахідним відмінком.'
    - question: 'Який відмінок завжди йде після прийменників "до", "для", "з" (звідки)?'
      options:
        - text: 'родовий'
          correct: true
        - text: 'давальний'
          correct: false
        - text: 'знахідний'
          correct: false
        - text: 'орудний'
          correct: false
      explanation: 'Ці прийменники вимагають родового відмінка.'

- type: match-up
  title: 'Прийменники та відмінки'
  instruction: 'З’єднайте прийменник із правильним відмінком.'
  pairs:
    - left: 'для (for)'
      right: 'родовий відмінок'
    - left: 'без (without)'
      right: 'родовий відмінок'
    - left: 'через (because of)'
      right: 'знахідний відмінок'
    - left: 'в / у (into - motion)'
      right: 'знахідний відмінок'
    - left: 'в / у (in - static)'
      right: 'місцевий відмінок'
    - left: 'з / із (with - accompaniment)'
      right: 'орудний відмінок'
    - left: 'з / із (from - origin)'
      right: 'родовий відмінок'
    - left: 'після (after)'
      right: 'родовий відмінок'
    - left: 'на (on - static)'
      right: 'місцевий відмінок'
    - left: 'біля (near)'
      right: 'родовий відмінок'
    - left: 'до (to / until)'
      right: 'родовий відмінок'
    - left: 'на (onto - motion)'
      right: 'знахідний відмінок'

- type: fill-in
  title: 'Заповніть пропуски'
  instruction: 'Виберіть правильну форму слова для кожного речення.'
  items:
    - sentence: 'Я завжди допомагаю своїй мамі і своєму _________.'
      answer: 'другові'
      options: ['друг', 'друга', 'другові', 'другом']
      explanation: 'Дієслово допомагати вимагає давального відмінка.'
    - sentence: 'Моєму дідусеві вісімдесят _________.'
      answer: 'років'
      options: ['рік', 'роки', 'років', 'рокам']
      explanation: 'Після вісімдесят використовується родовий відмінок множини.'
    - sentence: 'Вона зараз працює _________ у великій компанії.'
      answer: 'менеджеркою'
      options: ['менеджерка', 'менеджерки', 'менеджеркою', 'менеджерці']
      explanation: 'Професія з дієсловом працювати вимагає орудного відмінка.'
    - sentence: 'Ми з братом подорожуємо _________.'
      answer: 'поїздом'
      options: ['поїзд', 'поїзда', 'поїздом', 'поїзду']
      explanation: 'Інструмент або засіб транспорту стоїть в орудному відмінку без прийменника.'
    - sentence: 'Сьогодні на уроці немає _________.'
      answer: 'студента'
      options: ['студент', 'студента', 'студенту', 'студентом']
      explanation: 'Слово немає вимагає родового відмінка.'
    - sentence: 'Я йду в _________, щоб відкрити рахунок.'
      answer: 'банк'
      options: ['банк', 'банку', 'банка', 'банком']
      explanation: 'Напрямок руху (куди?) вимагає знахідного відмінка.'
    - sentence: 'Гроші вже лежать у _________ на рахунку.'
      answer: 'банку'
      options: ['банк', 'банку', 'банка', 'банком']
      explanation: 'Статичне розташування (де?) вимагає місцевого відмінка.'
    - sentence: 'Мій брат зараз на _________.'
      answer: 'пошті'
      options: ['пошта', 'пошту', 'поштою', 'пошті']
      explanation: 'Статичне розташування на пошті (місцевий відмінок).'
    - sentence: 'Я хочу відправити цей лист _________.'
      answer: 'поштою'
      options: ['пошта', 'пошту', 'поштою', 'пошті']
      explanation: 'Засіб відправлення (чим?) вимагає орудного відмінка.'
    - sentence: 'Дякую тобі, _________, за допомогу.'
      answer: 'друже'
      options: ['друг', 'друга', 'друже', 'другові']
      explanation: 'При звертанні використовується кличний відмінок.'
    - sentence: 'Ми зустрічаємося першого _________.'
      answer: 'січня'
      options: ['січень', 'січня', 'січнем', 'січні']
      explanation: 'Точна дата вимагає родового відмінка для місяця.'
    - sentence: 'Цей подарунок я купив для _________.'
      answer: 'мами'
      options: ['мама', 'маму', 'мами', 'мамі']
      explanation: 'Прийменник для вимагає родового відмінка.'

- type: error-correction
  title: 'Виправте типові помилки'
  instruction: 'Знайдіть граматичну помилку і виберіть правильний варіант.'
  items:
    - sentence: 'Я пишу цей лист ручка.'
      error: 'ручка'
      answer: 'ручкою'
      error_type: 'word'
      options: ['ручку', 'ручкою', 'ручки', 'ручці']
      explanation: 'Інструмент дії завжди стоїть в орудному відмінку (чим?).'
    - sentence: 'У мене немає гроші на цей квиток.'
      error: 'гроші'
      answer: 'грошей'
      error_type: 'word'
      options: ['грошам', 'грошима', 'грошах', 'грошей']
      explanation: 'Слово немає вимагає родового відмінка.'
    - sentence: 'Сергій, привіт! Як твої справи?'
      error: 'Сергій'
      answer: 'Сергію'
      error_type: 'word'
      options: ['Сергія', 'Сергієві', 'Сергієм', 'Сергію']
      explanation: 'При звертанні потрібно використовувати кличний відмінок.'
    - sentence: 'Олена, чи можеш ти мені допомогти?'
      error: 'Олена'
      answer: 'Олено'
      error_type: 'word'
      options: ['Олену', 'Олени', 'Оленою', 'Олено']
      explanation: 'Для жіночих імен при звертанні використовується кличний відмінок.'
    - sentence: 'Ми йдемо в банку, щоб обміняти долари.'
      error: 'в банку'
      answer: 'в банк'
      error_type: 'phrase'
      options: ['в банк', 'на банк', 'до банку', 'в банком']
      explanation: 'Напрямок руху (куди?) вимагає знахідного відмінка (в банк).'
    - sentence: 'Я зараз знаходжусь в банк.'
      error: 'в банк'
      answer: 'в банку'
      error_type: 'phrase'
      options: ['в банку', 'на банку', 'до банку', 'банком']
      explanation: 'Статичне розташування (де?) вимагає місцевого відмінка.'
    - sentence: 'Я кушаю яблуко кожен день.'
      error: 'кушаю'
      answer: 'їм'
      error_type: 'word'
      options: ['їм', 'їду', 'їжу', 'кусаю']
      explanation: 'Слово кушати — це русизм. Українською правильно казати їсти.'
    - sentence: 'Я хочу стати програміст у майбутньому.'
      error: 'програміст'
      answer: 'програмістом'
      error_type: 'word'
      options: ['програміста', 'програмістом', 'програмісту', 'програмісті']
      explanation: 'Професія з дієсловом стати вимагає орудного відмінка.'
    - sentence: 'Вона п’є каву без цукор.'
      error: 'цукор'
      answer: 'цукру'
      error_type: 'word'
      options: ['цукру', 'цукром', 'цукрі', 'цукрові']
      explanation: 'Прийменник без вимагає родового відмінка.'
    - sentence: 'Я не можу прийти із-за роботи.'
      error: 'із-за роботи'
      answer: 'через роботу'
      error_type: 'phrase'
      options: ['через роботу', 'від роботи', 'для роботи', 'після роботи']
      explanation: 'Замість русизму із-за використовуємо прийменник через + знахідний відмінок.'
    - sentence: 'Моя сестра двадцять років.'
      error: 'Моя сестра'
      answer: 'Моїй сестрі'
      error_type: 'phrase'
      options: ['Моїй сестрі', 'Моєю сестрою', 'Моєї сестри', 'Моя сестро']
      explanation: 'Для вираження віку потрібен давальний відмінок: кому? — моїй сестрі.'
    - sentence: 'Я дуже холодно в цьому кабінеті.'
      error: 'Я'
      answer: 'Мені'
      error_type: 'word'
      options: ['Мені', 'Мене', 'Мною', 'На мені']
      explanation: 'Фізичний стан виражається давальним відмінком (мені холодно).'

- type: unjumble
  title: 'Складіть речення'
  instruction: 'Розташуйте слова у правильному порядку.'
  items:
    - words: ['мені', 'дуже', 'подобається', 'це', 'старе', 'місто']
      answer: 'Мені дуже подобається це старе місто'
    - words: ['мій', 'брат', 'хоче', 'бути', 'програмувальником']
      answer: 'Мій брат хоче бути програмувальником'
    - words: ['я', 'часто', 'допомагаю', 'мамі', 'на', 'кухні']
      answer: 'Я часто допомагаю мамі на кухні'
    - words: ['вона', 'зараз', 'працює', 'менеджеркою', 'у', 'банку']
      answer: 'Вона зараз працює менеджеркою у банку'
    - words: ['сьогодні', 'у', 'нас', 'немає', 'часу']
      answer: 'Сьогодні у нас немає часу'
    - words: ['ми', 'зустрічаємося', 'десятого', 'березня', 'біля', 'пошти']
      answer: 'Ми зустрічаємося десятого березня біля пошти'
    - words: ['я', 'хочу', 'відправити', 'цю', 'посилку', 'поштою']
      answer: 'Я хочу відправити цю посилку поштою'
    - words: ['він', 'завжди', 'пише', 'листи', 'чорною', 'ручкою']
      answer: 'Він завжди пише листи чорною ручкою'
    - words: ['моєму', 'дідусеві', 'вже', 'вісімдесят', 'років']
      answer: 'Моєму дідусеві вже вісімдесят років'
    - words: ['дівчина', 'приїхала', 'з', 'Києва', 'вчора', 'ввечері']
      answer: 'Дівчина приїхала з Києва вчора ввечері'
    - words: ['студентам', 'було', 'дуже', 'цікаво', 'читати', 'статтю']
      answer: 'Студентам було дуже цікаво читати статтю'
    - words: ['пан', 'директор', 'відкрив', 'новий', 'рахунок', 'сьогодні']
      answer: 'Пан директор відкрив новий рахунок сьогодні'

- type: group-sort
  title: 'Куди чи Де?'
  instruction: 'Розподіліть фрази залежно від того, означають вони напрямок (знахідний відмінок) чи статичне розташування (місцевий відмінок).'
  groups:
    - name: 'Напрямок руху (Куди? - Знахідний)'
      items: ['йти в банк', 'їхати на пошту', 'заходити в кімнату', 'класти на стіл', 'поспішати в школу', 'дивитися на картину']
    - name: 'Статичне розташування (Де? - Місцевий)'
      items: ['працювати в банку', 'стояти на пошті', 'жити в кімнаті', 'лежати на столі', 'вчитися в школі', 'бути на картині']

- type: true-false
  title: 'Правильно чи неправильно?'
  instruction: 'Визначте, чи є твердження про відмінки правильними.'
  items:
    - statement: 'Щоб сказати про вік людини, ми використовуємо називний відмінок.'
      correct: false
      explanation: 'Ми використовуємо давальний відмінок (Моєму дідусеві 80 років).'
    - statement: 'Слово "немає" завжди вимагає родового відмінка.'
      correct: true
      explanation: 'Заперечення наявності завжди йде з родовим відмінком (немає часу).'
    - statement: 'Прийменник "без" використовується зі знахідним відмінком.'
      correct: false
      explanation: 'Прийменник "без" вимагає родового відмінка (без цукру).'
    - statement: 'Коли ми називаємо свою професію з дієсловом "працювати", ми використовуємо орудний відмінок.'
      correct: true
      explanation: 'Наприклад: "Я працюю вчителем" (орудний відмінок).'
    - statement: 'Кличний відмінок використовується тільки для чоловічих імен.'
      correct: false
      explanation: 'Кличний відмінок використовується для звертання до будь-якої людини (Олено, Сергію, мамо).'
    - statement: 'Прийменник "через" завжди вимагає знахідного відмінка.'
      correct: true
      explanation: 'Наприклад: через дощ, через дорогу, через тиждень.'
    - statement: 'Фізичні стани, такі як "холодно" або "тепло", вимагають називного відмінка для особи.'
      correct: false
      explanation: 'Вони вимагають давального відмінка: мені холодно, йому тепло.'
    - statement: 'Точні дати (день місяця) завжди стоять у родовому відмінку.'
      correct: true
      explanation: 'Наприклад: першого січня, десятого березня.'
    - statement: 'Інструмент дії (наприклад, писати ручкою) завжди має прийменник "з".'
      correct: false
      explanation: 'Інструмент дії стоїть в орудному відмінку БЕЗ прийменника (пишу ручкою).'
    - statement: 'Відповідь на питання "куди?" часто вимагає знахідного відмінка.'
      correct: true
      explanation: 'Напрямок руху (йти в банк) — це знахідний відмінок.'
    - statement: 'Дієслово "допомагати" вимагає знахідного відмінка.'
      correct: false
      explanation: 'Воно вимагає давального відмінка (допомагати другові).'
    - statement: 'Відмінки допомагають показати зв’язок між словами в українському реченні.'
      correct: true
      explanation: 'Це головна функція системи відмінків.'

- type: match-up
  title: 'Дієслова та їхні відмінки'
  instruction: 'З’єднайте дієслово з питанням або відмінком, який воно вимагає.'
  pairs:
    - left: 'допомагати (кому?)'
      right: 'давальний відмінок'
    - left: 'подобатися (кому?)'
