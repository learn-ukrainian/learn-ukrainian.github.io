version: '1.0'
module: checkpoint-cases
level: a2
inline:
- id: group-sort
  type: group-sort
  instruction: Розподіліть іменники за відмінками
  groups:
  - label: Називний
    items:
    - друзі
    - брати
  - label: Родовий
    items:
    - ночей
  - label: Давальний
    items:
    - вчителеві
  - label: Знахідний
    items:
    - сукню
  - label: Орудний
    items:
    - автобусом
  - label: Місцевий
    items:
    - у школі
  - label: Кличний
    items:
    - Олено
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант, щоб виправити виділену помилку
  items:
  - question: Я бачу нових *студенти*.
    options:
    - студентам
    - студентів
    - студентами
    - студентах
    correct: 1
  - question: Це подарунок для *брат*.
    options:
    - брата
    - брату
    - братом
    - браті
    correct: 0
  - question: Він іде на *роботі*.
    options:
    - робота
    - роботу
    - роботою
    - роботах
    correct: 1
  - question: Ми цікавимося *історія*.
    options:
    - історії
    - історію
    - історією
    - історіях
    correct: 2
  - question: Я п'ю каву з *молоко*.
    options:
    - молока
    - молоку
    - молоком
    - молоці
    correct: 2
  - question: У мене багато *гроші*.
    options:
    - грошей
    - грошам
    - грошима
    - грошах
    correct: 0
  - question: У кімнаті немає *вікна*.
    options:
    - вікно
    - вікон
    - вікнам
    - вікнами
    correct: 1
  - question: Учні дякують *вчитель*.
    options:
    - вчителя
    - вчителеві
    - вчителем
    - вчителі
    correct: 1
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Я бачу високий будинок і нові студентів.
    error: нові
    correction: нових
    error_type: word
    options:
    - нових
    - нове
    - нова
    explanation: З істотами в Знахідному відмінку множини прикметник має форму Родового
      відмінка (нових).
  - sentence: Ми їдемо у Київ автобус.
    error: автобус
    correction: автобусом
    error_type: word
    options:
    - автобуса
    - автобусом
    - автобусу
    explanation: Транспортний засіб вимагає Орудного відмінка.
  - sentence: Це подарунок для моя сестра.
    error: сестра
    correction: сестри
    error_type: word
    options:
    - сестру
    - сестрі
    - сестри
    explanation: Прийменник «для» вимагає Родового відмінка.
  - sentence: У місті немає готелі.
    error: готелі
    correction: готелів
    error_type: word
    options:
    - готель
    - готелів
    - готелям
    explanation: Слово «немає» вимагає Родового відмінка.
  - sentence: Вона завжди допомагає мама.
    error: мама
    correction: мамі
    error_type: word
    options:
    - маму
    - мамі
    - мамою
    explanation: Дієслово «допомагати» вимагає Давального відмінка.
  - sentence: Він дуже любить свою сестра.
    error: сестра
    correction: сестру
    error_type: word
    options:
    - сестри
    - сестру
    - сестрі
    explanation: Дієслово «любити» вимагає Знахідного відмінка.
- id: fill-in
  type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: У мене багато ____ (друг).
    answer: друзів
    options:
    - друзі
    - друзів
    - друзям
  - sentence: Я пишу синьою ____ (ручка).
    answer: ручкою
    options:
    - ручку
    - ручки
    - ручкою
  - sentence: Вона йде на ____ (робота).
    answer: роботу
    options:
    - роботі
    - роботу
    - роботою
  - sentence: Ми зараз у ____ (школа).
    answer: школі
    options:
    - школу
    - школі
    - школою
  - sentence: Це подарунок для ____ (брат).
    answer: брата
    options:
    - брата
    - брату
    - братом
  - sentence: Вони цікавляться ____ (історія).
    answer: історією
    options:
    - історію
    - історії
    - історією
  - sentence: Я бачу нових ____ (студент).
    answer: студентів
    options:
    - студенти
    - студентів
    - студентами
  - sentence: Учні дякують ____ (вчитель).
    answer: вчителеві
    options:
    - вчителя
    - вчителеві
    - вчителем
workbook:
- id: match-up-singular-plural
  type: match-up
  instruction: З'єднайте форму однини з формою множини
  pairs:
  - left: одна людина
    right: багато людей
  - left: моя дитина
    right: мої діти
  - left: праве око
    right: мої очі
  - left: ліве вухо
    right: мої вуха
  - left: мій друг
    right: мої друзі
  - left: велике місто
    right: великі міста
- id: group-sort-genitive-plural
  type: group-sort
  instruction: Розподіліть іменники за закінченням у Родовому відмінку множини
  groups:
  - label: Закінчення -ів
    items:
    - братів
    - готелів
    - студентів
  - label: Закінчення -ей
    items:
    - ночей
    - грошей
    - людей
  - label: Нульове закінчення
    items:
    - міст
    - книг
    - вікон
- id: true-false-case-rules
  type: true-false
  instruction: Правда чи ні? Перевірте свої знання правил
  items:
  - statement: Для напрямку руху (куди?) з прийменниками «в» і «на» ми використовуємо
      Знахідний відмінок.
    correct: true
    explanation: 'Правильно: Я іду в школу (Знахідний).'
  - statement: Дієслова «допомагати» і «дякувати» вимагають Родового відмінка.
    correct: false
    explanation: 'Ці дієслова вимагають Давального відмінка: допомагати мамі, дякувати
      вчителеві.'
  - statement: Після слова «багато» та цифр 5 і більше завжди використовується Родовий
      відмінок множини.
    correct: true
    explanation: 'Правильно: п''ять братів, багато вікон.'
  - statement: У Знахідному відмінку множини неживі предмети мають таку ж форму, як
      у Родовому відмінку.
    correct: false
    explanation: Неживі предмети у Знахідному відмінку множини мають форму Називного
      відмінка (бачу нові столи).
  - statement: Орудний відмінок часто використовується без прийменника для транспорту
      чи інструменту.
    correct: true
    explanation: 'Правильно: їхати автобусом, писати ручкою.'
  - statement: Прийменник «з» завжди використовується тільки з Орудним відмінком.
    correct: false
    explanation: Він використовується з Орудним (з молоком) і з Родовим (зі школи).
- id: quiz-verb-government
  type: quiz
  instruction: Оберіть правильне слово після дієслова
  items:
  - question: Вона дуже любить свою _____
    options:
    - сестра
    - сестрі
    - сестру
    - сестрою
    correct: 2
  - question: Ми часто допомагаємо _____
    options:
    - мама
    - маму
    - мамі
    - мамою
    correct: 2
  - question: Він професійно займається _____
    options:
    - спорт
    - спорту
    - спортом
    - спорті
    correct: 2
  - question: Студенти цікавляться _____
    options:
    - історія
    - історії
    - історію
    - історією
    correct: 3
  - question: Я бачу високий _____
    options:
    - будинок
    - будинку
    - будинком
    - будинки
    correct: 0
  - question: Учні завжди дякують _____
    options:
    - вчитель
    - вчителя
    - вчителеві
    - вчителем
    correct: 2
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - у
    - немає
    - братів.
    - мене
    correct_order:
    - У
    - мене
    - немає
    - братів.
  - words:
    - п'ю
    - з
    - каву
    - Я
    - молоком.
    correct_order:
    - Я
    - п'ю
    - каву
    - з
    - молоком.
  - words:
    - допомагаю
    - завжди
    - Я
    - мамі.
    correct_order:
    - Я
    - завжди
    - допомагаю
    - мамі.
  - words:
    - багато
    - У
    - вікон.
    - кімнаті
    correct_order:
    - У
    - кімнаті
    - багато
    - вікон.
  - words:
    - цікавимося
    - історією.
    - Ми
    correct_order:
    - Ми
    - цікавимося
    - історією.
  - words:
    - бачу
    - студентів.
    - нових
    - Я
    correct_order:
    - Я
    - бачу
    - нових
    - студентів.
