- type: fill-in
  title: "Однина чи множина?"
  instruction: "Оберіть правильну форму дієслова."
  items:
    - sentence: "У мене болить нога."
      answer: "болить"
      options: ["болить", "болять", "хворий", "погано"]
      explanation: "Слово 'нога' — це однина."
    - sentence: "У нього болять очі."
      answer: "болять"
      options: ["болять", "болить", "здорові", "хворіє"]
      explanation: "Слово 'очі' — це множина."
    - sentence: "У дідуся болять зуби."
      answer: "болять"
      options: ["болять", "болить", "болю", "погано"]
      explanation: "Слово 'зуби' — це множина."
    - sentence: "У мене дуже болить горло."
      answer: "болить"
      options: ["болить", "болять", "хворе", "червоне"]
      explanation: "Слово 'горло' — це однина."
    - sentence: "У неї болять руки після роботи."
      answer: "болять"
      options: ["болять", "болить", "болю", "хворіють"]
      explanation: "Слово 'руки' — це множина."
    - sentence: "У дитини болить живіт."
      answer: "болить"
      options: ["болить", "болять", "болю", "погано"]
      explanation: "Слово 'живіт' — це однина."
    - sentence: "У студента болить спина."
      answer: "болить"
      options: ["болить", "болять", "болю", "добре"]
      explanation: "Слово 'спина' — це однина."
    - sentence: "У мене болять вуха від холоду."
      answer: "болять"
      options: ["болять", "болить", "болю", "погано"]
      explanation: "Слово 'вуха' — це множина."

- type: fill-in
  title: "Хворіти чи боліти?"
  instruction: "Оберіть правильне слово для кожного речення."
  items:
    - sentence: "Я хворію на грип."
      answer: "хворію"
      options: ["хворію", "болю", "болить", "хворі"]
      explanation: "Ми використовуємо 'хворіти на' для загальних хвороб."
    - sentence: "У мене болить серце."
      answer: "болить"
      options: ["болить", "хворіє", "болю", "болять"]
      explanation: "Для болю в частинах тіла ми використовуємо 'У мене болить'."
    - sentence: "Моя донька часто хворіє восени."
      answer: "хворіє"
      options: ["хворіє", "болить", "болять", "болю"]
      explanation: "Дієслово 'хворіти' у третій особі однини."
    - sentence: "Він хворіє на застуду."
      answer: "на"
      options: ["на", "від", "у", "за"]
      explanation: "Конструкція: хворіти на + Знахідний відмінок."
    - sentence: "У спортсмена болять ноги."
      answer: "болять"
      options: ["болять", "болить", "хворіють", "болю"]
      explanation: "Слово 'ноги' — це множина, тому 'болять'."
    - sentence: "Ми хворіємо на ангіну."
      answer: "хворіємо"
      options: ["хворіємо", "болімо", "болять", "хворі"]
      explanation: "Ми хворіємо."
    - sentence: "У мене болить права рука."
      answer: "болить"
      options: ["болить", "болять", "хворіє", "болю"]
      explanation: "Слово 'рука' — це однина."
    - sentence: "Вона ніколи не хворіє на грип."
      answer: "хворіє"
      options: ["хворіє", "болить", "болять", "болю"]
      explanation: "Вона хворіє."

- type: fill-in
  title: "Ваш фізичний стан"
  instruction: "Доповніть речення словами у правильній формі."
  items:
    - sentence: "Мені дуже погано сьогодні."
      answer: "Мені"
      options: ["Мені", "Я", "У мене", "Моє"]
      explanation: "Для опису стану ми використовуємо Давальний відмінок: Мені."
    - sentence: "Йому холодно, він має високу температуру."
      answer: "холодно"
      options: ["холодно", "холодний", "холодна", "холод"]
      explanation: "Використовуємо прислівник 'холодно' для стану."
    - sentence: "Коли я вдома, мені добре."
      answer: "добре"
      options: ["добре", "добрий", "добра", "хороший"]
      explanation: "Стан виражається прислівником 'добре'."
    - sentence: "Пацієнту важко дихати."
      answer: "Пацієнту"
      options: ["Пацієнту", "Пацієнт", "У пацієнта", "Пацієнтом"]
      explanation: "Давальний відмінок від слова 'пацієнт' — пацієнту."
    - sentence: "Їй спекотно на сонці."
      answer: "спекотно"
      options: ["спекотно", "спекотна", "спекотний", "добре"]
      explanation: "Прислівник стану 'спекотно'."
    - sentence: "Дідусю погано, він лежить у ліжку."
      answer: "погано"
      options: ["погано", "поганий", "погана", "хворий"]
      explanation: "Стан: дідусю погано."
    - sentence: "У кімнаті спекотно, відчиніть вікно."
      answer: "спекотно"
      options: ["спекотно", "добре", "холодно", "погано"]
      explanation: "Опис умов у кімнаті."
    - sentence: "Тобі погано? Викликати лікаря?"
      answer: "погано"
      options: ["погано", "поганий", "хворий", "добре"]
      explanation: "Запитання про стан: Тобі погано?"

- type: quiz
  title: "Медична культура в Україні"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "Що українці найчастіше п'ють під час застуди?"
      explanation: "Традиційний засіб від застуди в Україні — це гарячий чай з малиною."
      options:
        - text: "гарячий чай з малиною"
          correct: true
        - text: "холодну воду"
          correct: false
        - text: "гарячий курячий бульйон"
          correct: false
        - text: "каву з молоком"
          correct: false
    - question: "Хто такий сімейний лікар в Україні?"
      explanation: "Сімейний лікар — це ваш персональний лікар у поліклініці."
      options:
        - text: "особистий лікар для всіх медичних питань"
          correct: true
        - text: "лікар тільки для дітей"
          correct: false
        - text: "лікар який робить операції"
          correct: false
        - text: "лікар який працює тільки вночі"
          correct: false
    - question: "Куди ви йдете, якщо маєте нежить і легкий кашель?"
      explanation: "Для легких хвороб і консультацій ми йдемо в поліклініку."
      options:
        - text: "у поліклініку"
          correct: true
        - text: "у лікарню"
          correct: false
        - text: "в аптеку до лікаря"
          correct: false
        - text: "на роботу"
          correct: false
    - question: "Який медичний заклад продає ліки?"
      explanation: "Ліки можна купити тільки в аптеці."
      options:
        - text: "аптека"
          correct: true
        - text: "поліклініка"
          correct: false
        - text: "лікарня"
          correct: false
        - text: "швидка допомога"
          correct: false
    - question: "Яку фразу потрібно сказати диспетчеру в екстреній ситуації?"
      explanation: "В екстреній ситуації ми просимо викликати швидку допомогу."
      options:
        - text: "Викличте швидку!"
          correct: true
        - text: "Дайте ліки!"
          correct: false
        - text: "Я хочу чай!"
          correct: false
        - text: "Де поліклініка?"
          correct: false
    - question: "Що означає фраза «підписати декларацію»?"
      explanation: "Декларація — це офіційний документ, який ви підписуєте з сімейним лікарем."
      options:
        - text: "обрати свого сімейного лікаря"
          correct: true
        - text: "купити ліки в аптеці"
          correct: false
        - text: "викликати швидку"
          correct: false
        - text: "піти в лікарню"
          correct: false
    - question: "Що каже лікар, коли хоче подивитися ваше горло?"
      explanation: "Лікар просить відкрити рот, щоб оглянути горло."
      options:
        - text: "Відкрийте рот!"
          correct: true
        - text: "Дихайте!"
          correct: false
        - text: "Не дихайте!"
          correct: false
        - text: "Пийте ліки!"
          correct: false
    - question: "Що українці бажають один одному на свята?"
      explanation: "Найпопулярніший тост і побажання в Україні — це «Міцного здоров'я!»."
      options:
        - text: "Міцного здоров'я!"
          correct: true
        - text: "Багато ліків!"
          correct: false
        - text: "Хорошої лікарні!"
          correct: false
        - text: "Швидкої допомоги!"
          correct: false

- type: error-correction
  title: "Виправте помилки"
  instruction: "Знайдіть і виправте граматичні помилки у реченнях."
  items:
    - sentence: "Я болю живіт після обіду."
      error: "Я болю"
      answer: "У мене болить"
      error_type: "construction"
      options: ["У мене болить", "Я болить", "Мені болить", "Я хворію"]
      explanation: "Ми не використовуємо 'я болю' для фізичного болю. Правильно: 'У мене болить живіт'."
    - sentence: "У мене болить ноги після спорту."
      error: "болить"
      answer: "болять"
      error_type: "word"
      options: ["болять", "болю", "болімо", "хворіють"]
      explanation: "Слово 'ноги' — це множина, тому дієслово має бути 'болять'."
    - sentence: "Я погано сьогодні вранці."
      error: "Я погано"
      answer: "Мені погано"
      error_type: "construction"
      options: ["Мені погано", "У мене погано", "Я поганий", "Я хворію"]
      explanation: "Для опису фізичного стану ми використовуємо Давальний відмінок: 'Мені погано'."
    - sentence: "Брат болить на грип уже тиждень."
      error: "болить"
      answer: "хворіє"
      error_type: "word"
      options: ["хворіє", "болять", "болю", "погано"]
      explanation: "Ми хворіємо на грип (загальна хвороба), а не болімо."
    - sentence: "Дайте мені ліки для нежитю, будь ласка."
      error: "для"
      answer: "від"
      error_type: "word"
      options: ["від", "на", "з", "до"]
      explanation: "В українській мові ми кажемо 'засоби / ліки від нежитю'."
    - sentence: "Лікар сказав мені приймати ліки кожного дня."
      error: "приймати"
      answer: "пити"
      error_type: "word"
      options: ["пити", "їсти", "брати", "робити"]
      explanation: "В Україні ми 'п'ємо' ліки, навіть якщо це таблетки."

- type: unjumble
  title: "Складіть речення"
  instruction: "Побудуйте правильні речення з цих слів."
  items:
    - words: ["мене", "болить", "у", "голова"]
      answer: "У мене болить голова"
    - words: ["на", "я", "грип", "хворію"]
      answer: "Я хворію на грип"
    - words: ["швидку", "викличте", "допомогу", "для", "дідуся"]
      answer: "Викличте швидку допомогу для дідуся"
    - words: ["дуже", "мені", "погано", "сьогодні"]
      answer: "Сьогодні мені дуже погано"
    - words: ["у", "температура", "висока", "неї"]
      answer: "У неї висока температура"
    - words: ["лікар", "слухає", "мої", "легені"]
      answer: "Лікар слухає мої легені"

- type: mark-the-words
  title: "Знайдіть частини тіла"
  instruction: "Знайдіть і позначте всі частини тіла в тексті."
  text: "Коли я хворію, у мене часто болить голова. Іноді також болить горло і спина. Вчора я грав у футбол, і тепер моя права нога і ліва рука теж дуже втомилися. Але серце працює добре!"
  answers: ["голова", "горло", "спина", "нога", "рука", "серце"]

