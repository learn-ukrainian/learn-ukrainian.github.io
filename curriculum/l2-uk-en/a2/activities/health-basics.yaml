- type: true-false
  title: "Правда чи брехня?"
  instruction: "Визначте, чи є ці твердження правильними."
  items:
    - statement: "Фраза «Мені погано» означає, що ви погана людина."
      correct: false
      explanation: "Ця фраза означає, що ви відчуваєте себе хворим."
    - statement: "В Україні сімейний лікар може приїхати до пацієнта додому."
      correct: true
      explanation: "Так, це популярна практика, коли у пацієнта висока температура."
    - statement: "Слово «рука» в українській мові означає тільки кисть."
      correct: false
      explanation: "Слово 'рука' означає і кисть, і всю кінцівку повністю."
    - statement: "Множина від слова «око» — це «очі»."
      correct: true
      explanation: "Так, це неправильна форма множини: око — очі."
    - statement: "Ми кажемо «У мене болить ноги», тому що це множина."
      correct: false
      explanation: "Ми повинні казати 'У мене болять ноги' (дієслово у множині)."
    - statement: "Замість таблеток українці часто п'ють гарячий чай з малиною."
      correct: true
      explanation: "Це найпопулярніший засіб народної медицини від застуди."
    - statement: "Ліки можна купити у поліклініці."
      correct: false
      explanation: "Ліки продаються тільки в аптеці."
    - statement: "Якщо у вас нежить, вам потрібно їхати в лікарню."
      correct: false
      explanation: "З нежитем ми йдемо в поліклініку до сімейного лікаря. Лікарня — для важких випадків."

