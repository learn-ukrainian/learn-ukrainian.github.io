    explanation: «зробив» — це доконаний вид, інші — недоконаний.
  - words:
    - прочитаю
    - напишу
    - приготую
    - буду читати
    correct: 3
    explanation: «буду читати» — аналітична форма, інші — синтетична.
  - words:
    - іти
    - їхати
    - поїхати
    - ходити
    correct: 2
    explanation: «поїхати» — дієслово доконаного виду, інші — недоконаного.
  - words:
    - роби
    - читай
    - пиши
    - читає
    correct: 3
    explanation: «читає» — це теперішній час, інші — наказовий спосіб.
  - words:
    - поїзд
    - гори
    - ліс
    - море
    correct: 0
    explanation: «поїзд» — це транспорт, інші — місця природи.
  - words:
    - до
    - на
    - з
    - швидко
    correct: 3
    explanation: «швидко» — це прислівник, інші — прийменники.
  - words:
    - завтра
    - ввечері
    - вранці
    - робити
    correct: 3
    explanation: «робити» — дієслово, інші — прислівники часу.
  - words:
