version: '1.0'
module: checkpoint-verbs
level: a2
inline:
- id: group-sort-verb-forms
  type: group-sort
  instruction: Розподіліть форми дієслів за категоріями
  groups:
  - label: Минулий час (недоконаний вид)
    items:
    - робив
    - читав
    - готував
    - писав
  - label: Минулий час (доконаний вид)
    items:
    - зробив
    - прочитав
    - приготував
    - написав
  - label: Майбутній час (аналітичний)
    items:
    - буду читати
    - будеш працювати
    - будемо робити
  - label: Майбутній час (синтетичний)
    items:
    - прочитаю
    - напишу
    - зроблю
    - поїду
  - label: Наказовий спосіб
    items:
    - читай
    - робіть
    - ходімо
    - хай знає
- id: fill-in-mixed-drill
  type: fill-in
  instruction: Вставте правильну форму дієслова
  items:
  - sentence: Кожного літа ми ____ в Карпати.
    answer: їздимо
    options:
    - їздимо
    - їдемо
    - підемо
    - ходимо
  - sentence: Завтра я ____ листа мамі.
    answer: напишу
    options:
    - напишу
    - писав
    - буду написати
    - написав
  - sentence: Вчора він довго ____ обід.
    answer: готував
    options:
    - готував
    - приготував
    - готує
    - буде готувати
  - sentence: Тарасе, ____ квитки на поїзд!
    answer: візьми
    options:
    - візьми
    - береш
    - будеш брати
    - взяти
  - sentence: Олено, ____ в гори у суботу!
    answer: ходімо
    options:
    - ходімо
    - давай підемо
    - ідемо
    - пішли
  - sentence: Я ____ цю книгу цілий тиждень.
    answer: читав
    options:
    - читав
    - прочитав
    - читаю
    - буду читати
  - sentence: Вона ____ до Києва у вівторок.
    answer: поїде
    options:
    - поїде
    - поїхала
    - їздить
    - їде
  - sentence: У суботу ми швидко ____ смачний борщ.
    answer: приготували
    options:
    - приготували
    - готували
    - готуємо
    - будемо готувати
  - sentence: Хай він ____ цю історію.
    answer: знає
    options:
    - знає
    - знати
    - знатиме
    - знав
  - sentence: Кожного ранку я ____ до університету.
    answer: ходжу
    options:
    - ходжу
    - іду
    - йду
    - піду
- id: quiz-error-correction
  type: quiz
  instruction: Знайдіть помилку і оберіть правильний варіант речення
  items:
  - question: 'Помилка: «Я буду прочитати книгу.» Оберіть правильний варіант.'
    options:
    - Я прочитаю книгу.
    - Я буду прочитав книгу.
    - Я прочитатиму книгу.
    - Я прочитав книгу.
    correct: 0
  - question: 'Помилка: «Ми ідемо в гори кожного літа.»'
    options:
    - Ми їздимо в гори кожного літа.
    - Ми підемо в гори кожного літа.
    - Ми їдемо в гори кожного літа.
    - Ми ходимо в гори кожного літа.
    correct: 0
  - question: 'Помилка: «Давай підемо купувати квитки!»'
    options:
    - Ходімо купувати квитки!
    - Пішли купувати квитки!
    - Йдемо купувати квитки!
    - Будемо йти купувати квитки!
    correct: 0
  - question: 'Помилка: «Він щодня зробив ці завдання.»'
    options:
    - Він щодня робив ці завдання.
    - Він щодня зробить ці завдання.
    - Він щодня буде зробити ці завдання.
    - Він щодня робити ці завдання.
    correct: 0
  - question: 'Помилка: «Завтра ввечері я буду написати листа.»'
    options:
    - Завтра ввечері я напишу листа.
    - Завтра ввечері я написав листа.
    - Завтра ввечері я буду написав листа.
    - Завтра ввечері я пишу листа.
    correct: 0
  - question: 'Помилка: «Ми йдемо туди кожного літа відпочивати.»'
    options:
    - Ми їздимо туди кожного літа відпочивати.
    - Ми поїдемо туди кожного літа відпочивати.
    - Ми їдемо туди кожного літа відпочивати.
    - Ми ходимо туди кожного літа відпочивати.
    correct: 0
  - question: 'Помилка: «Я довго прочитав цю книгу.»'
    options:
    - Я довго читав цю книгу.
    - Я довго буду читати цю книгу.
    - Я довго прочитаю цю книгу.
    - Я довго читаю цю книгу.
    correct: 0
  - question: 'Помилка: «Оксано, будь щаслива!»'
    options:
    - Оксано, будь щасливою!
    - Оксана, будь щаслива!
    - Оксано, бути щаслива!
    - Оксана, будь щасливою!
    correct: 0
  - question: 'Помилка: «Завтра вони приїхали до Львова.»'
    options:
    - Завтра вони приїдуть до Львова.
    - Завтра вони приїдуть в Львова.
    - Завтра вони їдуть до Львова.
    - Завтра вони їздять до Львова.
    correct: 0
  - question: 'Помилка: «Хай він читати цей текст.»'
    options:
    - Хай він читає цей текст.
    - Хай він читав цей текст.
    - Хай він прочитати цей текст.
    - Хай він буде читає цей текст.
    correct: 0
workbook:
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте недоконаний і доконаний вид дієслів
  pairs:
  - left: робити
    right: зробити
  - left: читати
    right: прочитати
  - left: готувати
    right: приготувати
  - left: писати
    right: написати
  - left: їхати
    right: поїхати
  - left: іти
    right: піти
  - left: брати
    right: взяти
  - left: купувати
    right: купити
  - left: говорити
    right: поговорити
  - left: гуляти
    right: погуляти
- id: true-false-grammar-rules
  type: true-false
  instruction: Правда чи ні? Перевірте свої знання правил
  items:
  - statement: Дієслово «іти» означає рух пішки в одному напрямку.
    correct: true
    explanation: «Іти» — це односпрямований рух пішки.
  - statement: Ми можемо використовувати «буду» з доконаним видом (наприклад, «буду
      прочитати»).
    correct: false
    explanation: З дієсловом «бути» використовується тільки недоконаний вид («буду
      читати»).
  - statement: Слово «щодня» часто використовується з дієсловами доконаного виду.
    correct: false
    explanation: «Щодня» вказує на регулярність, тому потрібен недоконаний вид.
  - statement: Форма «ходімо» — це наказовий спосіб для «ми».
    correct: true
    explanation: Закінчення -імо використовується для спільних дій (1-ша особа множини).
  - statement: Дієслово «їздити» означає рух транспортом у різних напрямках або регулярно.
    correct: true
    explanation: «Їздити» — це різноспрямований рух транспортом.
  - statement: Префікс «по-» у дієсловах руху означає прибуття на місце.
    correct: false
    explanation: Префікс «по-» означає початок руху («поїхав»), а прибуття — це «при-»
      («приїхав»).
  - statement: Щоб дати пораду другу, ми використовуємо наказовий спосіб.
    correct: true
    explanation: Наказовий спосіб ідеально підходить для порад та інструкцій.
  - statement: У реченні «Я довго читав книгу» дієслово «читав» має доконаний вид.
    correct: false
    explanation: Слово «довго» вказує на процес, тому «читав» — це недоконаний вид.
  - statement: З дієсловами руху ми використовуємо прийменник «на» + знахідний відмінок
      для подій або відкритих місць.
    correct: true
    explanation: 'Наприклад: іти на концерт, їхати на роботу.'
  - statement: Російська калька «давай поговоримо» є правильною українською формою.
    correct: false
    explanation: Правильна українська форма — «поговорімо» (без слова «давай»).
