version: '1.0'
module: checkpoint-verbs
level: a2
inline:
- id: group-sort-verb-forms
  type: group-sort
  instruction: Розподіліть форми дієслів за категоріями
  groups:
  - label: Минулий час (недоконаний вид)
    items:
    - довго писав
    - щовечора читала
  - label: Минулий час (доконаний вид)
    items:
    - нарешті написав
    - прочитала за ніч
  - label: Майбутній час (аналітичний)
    items:
    - буду працювати
    - будемо готувати
  - label: Майбутній час (синтетичний)
    items:
    - працюватиму
    - житимуть
  - label: Наказовий спосіб
    items:
    - читайте!
    - зробімо!
- id: fill-in-aspect-choice
  type: fill-in
  instruction: Оберіть правильний вид дієслова для кожного речення
  items:
  - sentence: Вчора я довго ____ статтю.
    answer: писав
    options:
    - писав
    - написав
  - sentence: Я нарешті ____ статтю для університету.
    answer: написав
    options:
    - писав
    - написав
  - sentence: Завтра о п'ятій я ____ вдома.
    answer: буду працювати
    options:
    - буду працювати
    - попрацюю
  - sentence: Ми ____ обід дуже швидко.
    answer: приготуємо
    options:
    - будемо готувати
    - приготуємо
  - sentence: Вона ____ книгу щовечора.
    answer: читала
    options:
    - читала
    - прочитала
  - sentence: Я гарантую, що ____ цю роботу до вечора.
    answer: зроблю
    options:
    - робитиму
    - зроблю
- id: motion-verb-preposition-match
  type: match-up
  instruction: З'єднайте речення з правильним прийменником та місцем
  pairs:
  - left: Ми їдемо
    right: до Львова
  - left: Він іде
    right: зі школи
  - left: Я йду
    right: на роботу
  - left: Вона заходить
    right: в магазин
  - left: Вони їдуть
    right: на концерт
  - left: Ходімо
    right: на перерву
- id: imperative-formation-drill
  type: quiz
  instruction: Оберіть правильну форму наказового способу
  items:
  - question: 'Оберіть форму для ''Ти'' (читати цей текст):'
    options:
    - Читай!
    - Читайте!
    - Читаймо!
    - Хай читає!
    correct: 0
  - question: 'Оберіть форму для ''Ви'' (писати):'
    options:
    - Пиши!
    - Пишіть!
    - Пишімо!
    - Хай пишуть!
    correct: 1
  - question: 'Оберіть форму для ''Ми'' (Let''s do it):'
    options:
    - Зроби!
    - Зробіть!
    - Зробімо!
    - Давай зробимо!
    correct: 2
  - question: 'Оберіть форму для ''Ми'' (Let''s go):'
    options:
    - Пішли!
    - Давай підемо!
    - Ходімо!
    - Ідіть!
    correct: 2
  - question: 'Оберіть форму для ''Він'' (Let him read):'
    options:
    - Читай!
    - Читайте!
    - Читаймо!
    - Хай читає!
    correct: 3
  - question: 'Оберіть правильне побажання (Maria, be happy!):'
    options:
    - Маріє, будьмо щасливими!
    - Маріє, будь щасливою!
    - Маріє, будьте щасливою!
    - Марія, будь щаслива!
    correct: 1
- id: quiz-verb-errors
  type: quiz
  instruction: Знайдіть і виправте граматичні помилки (російські кальки, неправильний
    вид чи час)
  items:
  - question: 'Виправте помилку: ''Я іду на роботу на автобусі.'''
    options:
    - Я іду на роботу автобусом.
    - Я їду на роботу автобусом.
    - Я їжджу на роботу на автобусі.
    - Я іду автобусом на роботу.
    correct: 1
  - question: 'Виправте помилку: ''Завтра я буду прочитати книгу.'''
    options:
    - Завтра я прочитаю книгу.
    - Завтра я буду прочитала книгу.
    - Завтра я буду читаю книгу.
    - Завтра я читаю книгу.
    correct: 0
  - question: 'Виправте помилку: ''Давай підемо в кіно!'''
    options:
    - Ходімо в кіно!
    - Давай ходити в кіно!
    - Пішли в кіно давай!
    - Підемо в кіно!
    correct: 0
  - question: 'Виправте помилку: ''Ми часто їдемо в Карпати.'''
    options:
    - Ми часто їздимо в Карпати.
    - Ми часто ідемо в Карпати.
    - Ми часто ходимо в Карпати.
    - Ми часто їхатимемо в Карпати.
    correct: 0
  - question: 'Виправте помилку: ''Він ішов у магазин на машині.'''
    options:
    - Він їхав у магазин машиною.
    - Він ходив у магазин машиною.
    - Він ішов машиною у магазин.
    - Він їздив у магазин на машині.
    correct: 0
  - question: 'Виправте помилку: ''Я вчора нарешті писав есе.'''
    options:
    - Я вчора нарешті написав есе.
    - Я вчора нарешті буду писати есе.
    - Я вчора нарешті писатиму есе.
    - Я вчора нарешті напишу есе.
    correct: 0
  - question: 'Виправте помилку: ''Я буду працюватиму завтра.'''
    options:
    - Я працюватиму завтра.
    - Я буду працюю завтра.
    - Я працювати завтра.
    - Я попрацюватиму завтра.
    correct: 0
  - question: 'Виправте помилку: ''Друзі, будьте готовий!'''
    options:
    - Друзі, будьте готові!
    - Друзі, будь готові!
    - Друзі, будьмо готовий!
    - Друзі, будьте готовим!
    correct: 0
- id: error-correction-integrated
  type: error-correction
  instruction: Знайдіть і виправте помилку в кожному реченні
  items:
  - sentence: Я щодня іду до парку.
    error: іду
    correction: ходжу
    error_type: word
    options:
    - ходжу
    - їду
    - ішов
    explanation: Для регулярної дії пішки (щодня) використовуємо багатонаправлене
      'ходити', а не 'іти'.
  - sentence: Завтра о п'ятій я буду попрацювати.
    error: попрацювати
    correction: працювати
    error_type: word
    options:
    - працювати
    - працюю
    - працюватиму
    explanation: Аналітичний майбутній час (буду + інфінітив) вимагає недоконаного
      виду.
  - sentence: Давай зробимо це завдання разом!
    error: Давай зробимо
    correction: Зробімо
    error_type: construction
    options:
    - Зробімо
    - Хай зробимо
    - Робимо
    explanation: Конструкція 'давай + дієслово' — це російська калька. Правильно використовувати
      закінчення -мо/-імо.
  - sentence: Він їде до школи пішки.
    error: їде
    correction: іде
    error_type: word
    options:
    - іде
    - ходить
    - пішов
    explanation: Пішки (by foot) вимагає дієслів 'іти/ходити', а не 'їхати'.
  - sentence: Вчора я нарешті робив цю роботу.
    error: робив
    correction: зробив
    error_type: word
    options:
    - зробив
    - робитиму
    - буду робити
    explanation: Для завершеного результату в минулому потрібен доконаний вид (зробити).
  - sentence: Хай вона читати цей текст.
    error: читати
    correction: читає
    error_type: word
    options:
    - читає
    - читай
    - читайте
    explanation: Після частки 'хай/нехай' використовується форма дієслова в теперішньому
      або майбутньому часі, а не інфінітив.
- id: story-completion-verbs
  type: fill-in
  instruction: Вставте правильні форми дієслів, щоб доповнити розповідь
  items:
  - sentence: Улітку мій друг ____ до Києва.
    answer: приїхав
    options:
    - приїхав
    - приходив
    - прийшов
  - sentence: У перший день він просто ____ вулицями.
    answer: йшов
    options:
    - йшов
    - їхав
    - ходив
  - sentence: 'Він сказав: ''Завтра я ____ місто цілий день''.'
    answer: оглядатиму
    options:
    - оглядатиму
    - огляну
    - буду оглянув
  - sentence: 'Я відповів: ''Звичайно, я ____ тобі найкращі місця''.'
    answer: покажу
    options:
    - покажу
    - показуватиму
    - буду показувати
  - sentence: Ми ____ в Карпати потягом у п'ятницю.
    answer: поїдемо
    options:
    - поїдемо
    - підемо
    - ходитимемо
  - sentence: Обов'язково ____ карту і теплий одяг!
    answer: візьми
    options:
    - візьми
    - візьміть
    - брати
  - sentence: Друзі, ____ готові до нашої подорожі!
    answer: будьмо
    options:
    - будьмо
    - будьте
    - бути
  - sentence: А зараз ____ на перерву!
    answer: ходімо
    options:
    - ходімо
    - давай підемо
    - пішли
workbook:
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте дієслова недоконаного (процес) і доконаного (результат) виду
  pairs:
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: робити
    right: зробити
  - left: готувати
    right: приготувати
  - left: купувати
    right: купити
  - left: брати
    right: взяти
- id: true-false-grammar-rules
  type: true-false
  instruction: Правда чи ні? Перевірте свої знання правил
  items:
  - statement: Синтетичний майбутній час (наприклад, 'працюватиму') утворюється тільки
      для дієслів недоконаного виду.
    correct: true
    explanation: Синтетична форма ('-му', '-меш') завжди описує процес, тому вживається
      лише з недоконаним видом.
  - statement: Конструкція 'давай підемо' є правильним українським варіантом наказового
      способу.
    correct: false
    explanation: 'Це калька. Правильно використовувати закінчення ''-мо'' або ''-імо'':
      ''ходімо'', ''підемо''.'
  - statement: Аналітичний майбутній час складається з дієслова 'бути' та інфінітива.
    correct: true
    explanation: 'Наприклад: ''буду працювати'', ''будемо читати''.'
  - statement: Дієслово 'ходити' описує рух в одному напрямку в конкретний момент
      часу.
    correct: false
    explanation: '''Ходити'' описує багатонаправлений або регулярний рух. Для руху
      в одному напрямку вживається ''іти''.'
  - statement: Щоб показати завершений результат у майбутньому, ми використовуємо
      доконаний вид.
    correct: true
    explanation: Доконаний вид завжди фокусується на результаті або завершенні дії
      (наприклад, 'зроблю').
  - statement: Після дієслів руху з прийменником 'до' (наприклад, 'іти до') іменник
      стоїть у знахідному відмінку.
    correct: false
    explanation: Прийменник 'до' завжди вимагає родового відмінка (до школи, до Києва).
- id: unjumble-sentences-motion
  type: unjumble
  instruction: Складіть правильні речення зі слів. Зверніть увагу на форми дієслів!
  items:
  - words:
    - допомагає
    - знайти
    - Ця
    - самоперевірка
    - кожну
    - помилку.
    correct_order:
    - Ця
    - самоперевірка
    - допомагає
    - знайти
    - кожну
    - помилку.
    hint: This self-check helps...
  - words:
    - наказовий
    - впевнено
    - я
    - утворюю
    - Тепер
    - спосіб.
    correct_order:
    - Тепер
    - я
    - впевнено
    - утворюю
    - наказовий
    - спосіб.
  - words:
    - Карпати
    - часто
    - Ми
    - в
    - їздимо
    - автобусом.
    correct_order:
    - Ми
    - часто
    - їздимо
    - в
    - Карпати
    - автобусом.
  - words:
    - до
    - Хай
    - читає
    - цей
    - він
    - текст
    - кінця.
    correct_order:
    - Хай
    - він
    - читає
    - цей
    - текст
    - до
    - кінця.
  - words:
    - Друзі,
    - на
    - перерву!
    - ходімо
    correct_order:
    - Друзі,
    - ходімо
    - на
    - перерву!
  - words:
    - місто
    - оглядатиму
    - Завтра
    - я
    - цілий
    - день.
    correct_order:
    - Завтра
    - я
    - оглядатиму
    - місто
    - цілий
    - день.
- id: translate-checkpoint
  type: translate
  instruction: Оберіть правильний переклад речень
  items:
  - source: This checkpoint is a good review.
    options:
    - text: Ця контрольна точка — хороша перевірка.
      correct: true
    - text: Ця контрольна точка є хороша завдання.
      correct: false
    - text: Ця контрольна точка — хороша вид.
      correct: false
  - source: I wrote the article for a long time.
    options:
    - text: Я довго писав статтю.
      correct: true
    - text: Я довго написав статтю.
      correct: false
    - text: Я нарешті написав статтю.
      correct: false
  - source: Tomorrow I will be working at home.
    options:
    - text: Завтра я працюватиму вдома.
      correct: true
    - text: Завтра я попрацюю вдома.
      correct: false
    - text: Завтра я працював вдома.
      correct: false
  - source: We are going to work by car today.
    options:
    - text: Сьогодні ми їдемо на роботу машиною.
      correct: true
    - text: Сьогодні ми йдемо на роботу машиною.
      correct: false
    - text: Сьогодні ми їздимо на роботу машиною.
      correct: false
  - source: Let's go on break!
    options:
    - text: Ходімо на перерву!
      correct: true
    - text: Давай підемо на перерву!
      correct: false
    - text: Ідіть на перерву!
      correct: false
  - source: He will do this work by evening.
    options:
    - text: Він зробить цю роботу до вечора.
      correct: true
    - text: Він буде робити цю роботу до вечора.
      correct: false
    - text: Він робитиме цю роботу до вечора.
      correct: false
