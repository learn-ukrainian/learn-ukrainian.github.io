inline:
- id: quiz-possessive-choice
  type: quiz
  instruction: Оберіть правильний варіант (свій або мій/його/її)
  items:
  - question: Він щодня читає _____ нову книгу.
    options:
    - свою
    - його
    - її
    - їхню
    correct: 0
  - question: Анна дуже любить _____ роботу.
    options:
    - свій
    - свою
    - своє
    - свої
    correct: 1
  - question: Це _____ новий кабінет. Я працюю тут.
    options:
    - свій
    - мій
    - свою
    - своє
    correct: 1
  - question: Вони з радістю чекають _____ гостей.
    options:
    - своїх
    - їхніх
    - свої
    - свій
    correct: 0
  - question: Ти знову забув _____ телефон вдома.
    options:
    - свій
    - себе
    - свою
    - свої
    correct: 0
  - question: Мама сказала, що Олег взяв не _____ светр, а светр брата.
    options:
    - свого
    - її
    - свій
    - мій
    correct: 2
  - question: Вона подзвонила _____ подрузі.
    options:
    - своєї
    - своїй
    - своєму
    - своїх
    correct: 1
  - question: Ми завжди паркуємо _____ машину біля дому.
    options:
    - свою
    - свій
    - свої
    - свого
    correct: 0
- id: true-false-sviy-grammar
  type: true-false
  instruction: Чи правильно використано слова «свій» та «його/її»?
  items:
  - statement: Він дуже любить його дружину.
    correct: false
    explanation: 'Слово «його» тут означає дружину іншого чоловіка. Правильно сказати:
      «свою дружину».'
  - statement: Олег забув свій телефон вдома.
    correct: true
    explanation: Власник (Олег) і підмет — це одна особа, тому ми кажемо «свій».
  - statement: Вони чекають їхніх гостей.
    correct: false
    explanation: 'Правильно: «своїх гостей», тому що це гості підмета (вони).'
  - statement: Я дуже люблю мою маму.
    correct: true
    explanation: Для 1-ї особи (я) можна казати і «мою», і «свою».
  - statement: Марія взяла свою парасольку.
    correct: true
    explanation: Власниця і підмет — це одна особа (Марія), тому використовуємо «свою».
  - statement: Ти завжди забуваєш твій гаманець.
    correct: true
    explanation: Для 2-ї особи (ти) можна казати і «твій», і «свій».
  - statement: Цей чоловік читає його нову книгу.
    correct: false
    explanation: Слово «його» означає книгу іншого чоловіка. Треба сказати «свою».
  - statement: Це свій великий кабінет.
    correct: false
    explanation: Тут слово «свій» неправильне. Треба казати «мій», «твій» або «його»
      кабінет.
- id: fill-in-sebe-cases
  type: fill-in
  instruction: Вставте правильну форму займенника «себе» (себе, собі, собою)
  items:
  - sentence: Я купив _____ новий великий телефон.
    answer: собі
    options:
    - себе
    - собі
    - собою
  - sentence: Вона склала іспит і задоволена _____.
    answer: собою
    options:
    - себе
    - собі
    - собою
  - sentence: Він дуже любить тільки _____.
    answer: себе
    options:
    - себе
    - собі
    - собою
  - sentence: Ти взагалі можеш _____ це уявити?
    answer: собі
    options:
    - себе
    - собі
    - собою
  - sentence: Ми взяли парасольку із _____.
    answer: собою
    options:
    - себе
    - собі
    - собою
  - sentence: Бережи _____!
    answer: себе
    options:
    - себе
    - собі
    - собою
  - sentence: Вона робить _____ дуже смачний сніданок.
    answer: собі
    options:
    - себе
    - собі
    - собою
  - sentence: Я часто дивлюся на _____ у дзеркало.
    answer: себе
    options:
    - себе
    - собі
    - собою
- id: match-up-sebe-idioms
  type: match-up
  instruction: З'єднайте вирази з їхніми значеннями
  pairs:
  - left: у свій час
    right: у правильний момент
  - left: мати свою думку
    right: думати самостійно
  - left: знати своє місце
    right: не бути занадто гордим
  - left: свої люди
    right: однодумці, близькі друзі
  - left: почувати себе
    right: мати фізичний стан
  - left: вести себе
    right: поводитися в суспільстві
  - left: уявити собі
    right: створити образ у голові
  - left: сам по собі
    right: самостійно, один
