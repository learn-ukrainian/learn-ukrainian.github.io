- id: w-true-false-grammar
  type: true-false
  instruction: Правда чи ні? Визначте, чи правильне твердження про граматику.
  items:
  - statement: Слово «себе» має форму називного відмінка.
    correct: false
    explanation: Займенник «себе» не має форми називного відмінка і ніколи не буває
      підметом.
  - statement: Займенник «свій» завжди узгоджується з родом, числом і відмінком іменника,
      до якого належить.
    correct: true
    explanation: Так, як і звичайні прикметники, «свій» змінює закінчення залежно
      від слова після нього.
  - statement: Форма «собі» — це давальний відмінок.
    correct: true
    explanation: Так, ми кажемо «купити собі», що відповідає на питання «кому?».
  - statement: Щоб сказати «I did it myself», ми використовуємо вираз «я зробив це
      себе».
    correct: false
    explanation: Для значення самостійної дії без допомоги використовується слово
      «сам» або «сама».
  - statement: Займенник «себе» не змінюється за родами чи числами.
    correct: true
    explanation: Так, форма «себе» залишається однаковою для «я», «ти», «він» або
      «вони».
  - statement: Речення «Я почуваю себе» є абсолютно правильним і повним.
    correct: false
    explanation: Після «почувати себе» обов'язково потрібен прислівник стану, наприклад,
      «добре» або «погано».
  - statement: Якщо чоловік читає власну книгу, правильно сказати «він читає свою
      книгу».
    correct: true
    explanation: Підмет «він» є власником книги, тому використовується «свою».
  - statement: Слово «собою» використовується в орудному відмінку.
    correct: true
    explanation: Так, дієслово «пишатися» або вираз «взяти з собою» вимагає орудного
      відмінка — «собою».
- id: w-odd-one-out-forms
  type: odd-one-out
  instruction: Знайдіть слово, яке не належить до групи за граматичною формою або
    значенням.
  items:
  - words:
    - свою
    - мою
    - твою
    - своїм
    correct: 3
    explanation: «Своїм» — це орудний відмінок або чоловічий/середній рід, а решта
      — жіночий рід у знахідному відмінку.
  - words:
    - себе
    - собі
    - собою
    - свій
    correct: 3
    explanation: «Свій» — це присвійний займенник, а решта — форми зворотного займенника
      «себе».
  - words:
    - сам
    - сама
    - самостійно
    - себе
    correct: 3
    explanation: «Себе» — це зворотний займенник, а інші слова означають самостійну
      дію без допомоги.
  - words:
    - своя
    - своєї
    - свою
    - своє
    correct: 3
    explanation: «Своє» — це середній рід, а всі інші форми належать до жіночого роду.
  - words:
    - собі
    - мені
    - тобі
    - собою
    correct: 3
    explanation: «Собою» — це орудний відмінок, а інші займенники стоять у давальному/місцевому
      відмінку.
  - words:
    - свої
    - мої
    - твої
    - своя
    correct: 3
    explanation: «Своя» — це однина (жіночий рід), а всі інші займенники мають форму
      множини.
  - words:
    - дзеркало
    - парасолька
    - звичка
    - себе
    correct: 3
    explanation: «Себе» — це займенник, а інші слова — іменники з лексики цього модуля.
  - words:
    - своїм
    - моїм
    - нашим
    - своїх
    correct: 3
    explanation: «Своїх» — це родовий чи знахідний відмінок множини, а інші стоять
      в орудному відмінку.
- id: w-error-correction-usage
  type: error-correction
  instruction: Виправте помилки у використанні займенників
  items:
  - sentence: Ми дуже гордимося себе.
    error: себе
    correction: собою
    error_type: word
    options:
    - собою
    - собі
    - свої
    explanation: Дієслово «гордитися» вимагає орудного відмінка.
  - sentence: Вона довго дивиться на її у дзеркало.
    error: її
    correction: себе
    error_type: word
    options:
    - себе
    - собою
    - свою
    explanation: Дія спрямована на саму людину, тому потрібен зворотний займенник
      «себе».
  - sentence: Я купив себе нову цікаву книгу.
    error: себе
    correction: собі
    error_type: word
    options:
    - собі
    - собою
    - свою
    explanation: Для значення «купив для себе» використовується давальний відмінок
      «собі».
  - sentence: Він читає його книгу, яку купив учора.
    error: його
    correction: свою
    error_type: word
    options:
    - свою
    - свій
    - свого
    explanation: Книга належить підмету (він), тому треба використовувати «свою».
  - sentence: Діти, ви повинні вести собі добре щодня.
    error: собі
    correction: себе
    error_type: word
    options:
    - себе
    - собою
    - свої
    explanation: Правильний сталий вираз — «вести себе».
  - sentence: Вони хочуть зробити це самі себе.
    error: самі себе
    correction: самі
    error_type: phrase
    options:
    - самі
    - самі собі
    - самостійно себе
    explanation: Для значення дії без допомоги («without help») достатньо слова «самі».
  - sentence: Вона взяла свій велику сумку і пішла.
    error: свій
    correction: свою
    error_type: word
    options:
    - свою
    - своя
    - своєї
    explanation: Іменник «сумка» жіночого роду (знахідний відмінок), тому потрібна
      форма «свою».
  - sentence: Ти можеш уявити себе такий ідеальний день?
    error: себе
    correction: собі
    error_type: word
    options:
    - собі
    - собою
    - свої
    explanation: Правильний вираз — «уявити собі» (давальний відмінок).
