inline:
- id: quiz-sviy-vs-possessive
  type: quiz
  instruction: Оберіть правильний займенник
  items:
  - question: Марія забула ____ парасольку вдома.
    options:
    - свою
    - її
    - його
    - мою
    correct: 0
  - question: Я добре знаю Тараса. Це ____ новий светр.
    options:
    - його
    - свій
    - її
    - їхній
    correct: 0
  - question: Хлопці довго шукали і нарешті знайшли ____ старі іграшки.
    options:
    - свої
    - їхні
    - його
    - її
    correct: 0
  - question: Олена зараз розмовляє з подругою. Це ____ найкраща подруга.
    options:
    - її
    - своя
    - його
    - їхня
    correct: 0
  - question: Він ніколи не дає іншим ____ особисті речі.
    options:
    - свої
    - його
    - її
    - їхні
    correct: 0
  - question: Микола бере сумку Оксани. Він тримає ____ сумку.
    options:
    - її
    - свою
    - його
    - їхню
    correct: 0
  - question: Студенти самостійно роблять ____ щоденне завдання.
    options:
    - своє
    - їхнє
    - його
    - її
    correct: 0
  - question: Діти дивляться на вчителя. Це ____ новий вчитель.
    options:
    - їхній
    - свій
    - його
    - її
    correct: 0
- id: true-false-sviy-cases
  type: true-false
  instruction: Правда чи ні? Визначте, чи правильно використано займенник «свій».
  items:
  - statement: Він любить його дружину. (Мається на увазі власна дружина)
    correct: false
    explanation: Якщо це власна дружина (дружина підмета), треба казати «свою дружину».
  - statement: Я особисто купила цю книгу собі.
    correct: true
    explanation: Зворотний займенник «собі» використано правильно для дії, спрямованої
      на себе.
  - statement: Вони завжди беруть свої парасольки.
    correct: true
    explanation: Підмет «вони» є власником парасольок, тому «свої» — правильний вибір.
  - statement: Брат не хоче читати свою книгу, він читає його книгу. (Книгу друга)
    correct: true
    explanation: Перша книга належить брату («свою»), а друга — комусь іншому («його»).
  - statement: Мама сказала, що вона забула її сумку. (Мамину сумку)
    correct: false
    explanation: Оскільки мама — це підмет, яка забула власну сумку, має бути «свою
      сумку».
  - statement: Студенти роблять їхні завдання самостійно.
    correct: false
    explanation: Студенти (підмет) роблять власні завдання, тому правильно казати
      «свої завдання».
  - statement: Ми часто говоримо про своє рідне місто.
    correct: true
    explanation: Для першої особи множини «своє» є дуже природним і правильним вибором.
  - statement: Вона дуже пишається своєю молодшою сестрою.
    correct: true
    explanation: Займенник «своєю» правильно узгоджується з іменником «сестрою» в
      орудному відмінку.
- id: fill-in-insert-the-correct-case-form-of
  type: fill-in
  instruction: Вставте правильну форму займенника «себе»
  items:
  - sentence: Я хочу купити ____ нову парасольку.
    answer: собі
    options:
    - себе
    - собі
    - собою
  - sentence: Діти зовсім не вміють вести ____ тихо.
    answer: себе
    options:
    - себе
    - собі
    - собою
  - sentence: Вона завжди дуже пишається ____.
    answer: собою
    options:
    - себе
    - собі
    - собою
  - sentence: Він довго дивився на ____ у велике дзеркало.
    answer: себе
    options:
    - себе
    - собі
    - собою
  - sentence: Як ти ____ почуваєш сьогодні?
    answer: себе
    options:
    - себе
    - собі
    - собою
  - sentence: Можеш уявити ____ ідеальний день?
    answer: собі
    options:
    - себе
    - собі
    - собою
  - sentence: Ми обов'язково взяли з ____ теплі речі.
    answer: собою
    options:
    - себе
    - собі
    - собою
  - sentence: Вона зробила ____ смачний ранковий сніданок.
    answer: собі
    options:
    - себе
    - собі
    - собою
- id: match-up-match-expressions-with-to-their-meanings
  type: match-up
  instruction: З'єднайте українські вирази з їхнім значенням
  pairs:
  - left: почувати себе
    right: to feel (physically or emotionally)
  - left: вести себе
    right: to behave in a certain way
  - left: горджуся собою
    right: to be proud of oneself
  - left: уявити собі
    right: to imagine something
  - left: дивитися на себе
    right: to look at oneself (e.g., in a mirror)
  - left: купити собі
    right: to buy for oneself
  - left: взяти з собою
    right: to take with oneself
  - left: мати свою думку
    right: to have one's own opinion
