- id: quiz-nom-vs-inst
  type: quiz
  instruction: 'Оберіть правильний відмінок: називний чи орудний'
  items:
  - question: Він — дуже хороший ____.
    options:
    - лікар
    - лікарем
    - лікаря
    - лікарю
    correct: 0
  - question: Колись вона була ____.
    options:
    - вчителька
    - вчителькою
    - вчительки
    - вчительці
    correct: 1
  - question: Моя сестра працює ____.
    options:
    - журналістка
    - журналісткою
    - журналістки
    - журналістку
    correct: 1
  - question: Мій тато — ____.
    options:
    - програміст
    - програмістом
    - програміста
    - програмісту
    correct: 0
  - question: Він мріє стати ____.
    options:
    - кухар
    - кухарем
    - кухаря
    - кухарю
    correct: 1
  - question: Моя мама — ____ у школі.
    options:
    - директорка
    - директоркою
    - директорки
    - директорку
    correct: 0
  - question: Я буду ____.
    options:
    - інженер
    - інженером
    - інженера
    - інженеру
    correct: 1
  - question: За фахом він — ____.
    options:
    - юрист
    - юристом
    - юриста
    - юристу
    correct: 0
- id: fill-in-answer-questions-about-professions-using-full-instrumental-sentences
  type: fill-in
  instruction: Дайте відповідь на запитання
  items:
  - sentence: — Ким він працює? — Він працює ____.
    answer: кухарем
    options:
    - кухар
    - кухарем
    - кухарю
  - sentence: — Ким ти хочеш стати? — Я хочу стати ____.
    answer: музикантом
    options:
    - музикант
    - музикантом
    - музиканту
  - sentence: — Ким працює твоя сестра? — Вона працює ____.
    answer: юристкою
    options:
    - юристка
    - юристкою
    - юристки
  - sentence: — Ким вона була раніше? — Вона була ____.
    answer: менеджеркою
    options:
    - менеджерка
    - менеджеркою
    - менеджерки
  - sentence: — Ким він став? — Він став відомим ____.
    answer: художником
    options:
    - художник
    - художником
    - художнику
  - sentence: — Ким працює ваш син? — Він працює ____.
    answer: водієм
    options:
    - водій
    - водієм
    - водію
  - sentence: — Ким ви працюєте? — Я працюю ____.
    answer: будівельницею
    options:
    - будівельниця
    - будівельницею
    - будівельниці
  - sentence: — Ким хоче стати твоя подруга? — Вона хоче стати ____.
    answer: програмісткою
    options:
    - програмістка
    - програмісткою
    - програмістки
workbook:
- id: group-sort-endings
  type: group-sort
  instruction: Розподіліть чоловічі професії за закінченням в орудному відмінку (-ом
    чи -ем)
  groups:
  - label: Закінчення -ом
    items:
    - інженер
    - програміст
    - директор
    - музикант
    - юрист
    - архітектор
  - label: Закінчення -ем
    items:
    - вчитель
    - лікар
    - кухар
    - перукар
    - водій
    - викладач
- id: error-correction-professions
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я працюю як програміст.
    error: як програміст
    correction: програмістом
    error_type: phrase
    options:
    - програміст
    - програмістом
    - програмісту
    explanation: Дієслово «працювати» з професією вимагає орудного відмінка без слова
      «як».
  - sentence: Він довго був лікар.
    error: лікар
    correction: лікарем
    error_type: word
    options:
    - лікарем
    - лікару
    - лікаря
    explanation: Дієслово «бути» в минулому часі вимагає орудного відмінка.
  - sentence: Вона захоплюється історія.
    error: історія
    correction: історією
    error_type: word
    options:
    - історію
    - історії
    - історією
    explanation: Дієслово «захоплюватися» завжди вимагає орудного відмінка.
  - sentence: Мій брат працює вчительом.
    error: вчительом
    correction: вчителем
    error_type: word
    options:
    - вчителю
    - вчителем
    - вчителя
    explanation: Слово «вчитель» належить до м'якої групи, тому закінчення -ем.
  - sentence: Моя сестра хоче стати юристка.
    error: юристка
    correction: юристкою
    error_type: word
    options:
    - юристкою
    - юристку
    - юристки
    explanation: Дієслово «стати» завжди вимагає орудного відмінка.
  - sentence: Він цікавиться спорт.
    error: спорт
    correction: спортом
    error_type: word
    options:
    - спорту
    - спортом
    - спорта
    explanation: Дієслово «цікавитися» завжди вимагає орудного відмінка.
- id: true-false-instrumental-rules
  type: true-false
  instruction: Чи правильні ці твердження про граматику?
  items:
  - statement: У реченні «Він — лікар» використовується орудний відмінок.
    correct: false
    explanation: Ні, тут використовується називний відмінок для простої ідентифікації
      в теперішньому часі.
  - statement: Дієслово «працювати» з професією вимагає орудного відмінка.
    correct: true
    explanation: Так, ми кажемо «працювати лікарем», «працювати інженером».
  - statement: Дієслово «бути» в минулому часі з професіями використовує називний
      відмінок.
    correct: false
    explanation: Ні, дієслово «бути» в минулому і майбутньому часі вимагає орудного
      відмінка (Він був лікарем).
  - statement: В українській мові правильно казати «Я працюю як менеджер».
    correct: false
    explanation: Ні, це калька. Правильно казати «Я працюю менеджером».
  - statement: Дієслова «захоплюватися» та «цікавитися» вимагають орудного відмінка.
    correct: true
    explanation: Так, ці дієслова завжди працюють з орудним відмінком.
  - statement: Жіночі професії в орудному відмінку мають закінчення -ою або -ею.
    correct: true
    explanation: 'Так, наприклад: лікаркою, будівельницею.'
