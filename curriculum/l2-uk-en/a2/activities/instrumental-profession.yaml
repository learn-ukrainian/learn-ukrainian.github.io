- id: quiz-nom-vs-inst
  type: quiz
  instruction: 'Оберіть правильний відмінок: називний чи орудний.'
  items:
  - question: Мій брат — ____.
    options:
    - програміст
    - програмістом
    - програміста
    - програмісту
    correct: 0
  - question: Моя сестра працює ____.
    options:
    - вчителька
    - вчителькою
    - вчительки
    - вчительці
    correct: 1
  - question: За фахом він ____.
    options:
    - юрист
    - юристом
    - юриста
    - юристу
    correct: 0
  - question: У минулому році вона була ____.
    options:
    - менеджерка
    - менеджеркою
    - менеджерки
    - менеджерці
    correct: 1
  - question: Він хоче стати відомим ____.
    options:
    - художник
    - художником
    - художника
    - художнику
    correct: 1
  - question: Його дружина — талановита ____.
    options:
    - лікарка
    - лікаркою
    - лікарки
    - лікарці
    correct: 0
  - question: Після університету він став ____.
    options:
    - музикант
    - музикантом
    - музиканта
    - музиканту
    correct: 1
  - question: Моя найкраща подруга — ____.
    options:
    - журналістка
    - журналісткою
    - журналістки
    - журналістці
    correct: 0
  title: 'Оберіть правильний відмінок: називний чи орудний.'
