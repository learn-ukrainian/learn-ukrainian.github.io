workbook:
- type: error-correction
  instruction: Знайдіть і виправте помилку в реченні.
  items:
  - sentence: Вона працює як менеджерка в офісі.
    error: як менеджерка
    correction: менеджеркою
    error_type: construction
    options:
    - як менеджеркою
    - менеджеркою
    - менеджерка
    explanation: З дієсловом «працювати» не потрібно використовувати слово «як». Ми
      відразу використовуємо орудний відмінок.
  - sentence: Він був талановитий лікар.
    error: лікар
    correction: лікарем
    error_type: word
    options:
    - лікаром
    - лікарем
    - лікарю
    explanation: Після дієслова «бути» в минулому часі професія має стояти в орудному
      відмінку.
  - sentence: Моя сестра цікавиться історія.
    error: історія
    correction: історією
    error_type: word
    options:
    - історію
    - історією
    - історії
    explanation: Дієслово «цікавитися» завжди вимагає орудного відмінка.
  - sentence: Він мріє стати програміст.
    error: програміст
    correction: програмістом
    error_type: word
    options:
    - програмістом
    - програміста
    - програмісту
    explanation: Дієслово «стати» завжди вимагає орудного відмінка.
  - sentence: Олена пишається син.
    error: син
    correction: сином
    error_type: word
    options:
    - сину
    - сином
    - сина
    explanation: Дієслово «пишатися» завжди вимагає орудного відмінка.
  - sentence: Мій брат — водієм.
    error: водієм
    correction: водій
    error_type: word
    options:
    - водій
    - водія
    - водію
    explanation: Для простої ідентифікації в теперішньому часі (без дієслова) використовується
      називний відмінок.
  - sentence: За фахом вона є лікаркою.
    error: є лікаркою
    correction: лікарка
    error_type: construction
    options:
    - лікарка
    - лікаркою
    - лікар
    explanation: У теперішньому часі ми зазвичай кажемо «Вона — лікарка» (називний
      відмінок), а не «є лікаркою».
  - sentence: Я захоплююся класична музика.
    error: класична музика
    correction: класичною музикою
    error_type: phrase
    options:
    - класичною музикою
    - класичної музики
    - класичну музику
    explanation: Дієслово «захоплюватися» завжди вимагає орудного відмінка.
  title: Знайдіть і виправте помилку в реченні.
- type: group-sort
  instruction: Розподіліть слова за закінченням в орудному відмінку (чоловічий рід).
