version: '1.0'
module: instrumental-profession
level: a2
inline:
- id: fill-in-put-profession-nouns-into-instrumental-after
  type: fill-in
  instruction: Вставте правильну форму професії в орудному відмінку
  items:
  - sentence: Вона працює ____ у школі.
    answer: вчителькою
    options:
    - вчителька
    - вчителькою
    - вчительки
  - sentence: Мій брат став успішним ____.
    answer: програмістом
    options:
    - програміст
    - програмістом
    - програмісту
  - sentence: Він довго був ____ у цій лікарні.
    answer: лікарем
    options:
    - лікар
    - лікарем
    - лікаром
  - sentence: Я хочу стати ____.
    answer: архітектором
    options:
    - архітектор
    - архітектором
    - архітектору
  - sentence: Моя подруга працює ____ в салоні краси.
    answer: перукаркою
    options:
    - перукарка
    - перукаркою
    - перукарки
  - sentence: Завтра він буде новим ____ компанії.
    answer: директором
    options:
    - директор
    - директором
    - директору
  - sentence: Його друг працює ____.
    answer: інженером
    options:
    - інженер
    - інженером
    - інженеру
  - sentence: Його батько працює ____.
    answer: водієм
    options:
    - водій
    - водієм
    - водію
