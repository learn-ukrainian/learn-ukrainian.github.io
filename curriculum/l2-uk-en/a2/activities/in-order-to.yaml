- type: true-false
  title: 'Правда чи хиба: Аналіз правил'
  instruction: Визначте, чи є ці граматичні твердження правильними.
  items:
  - statement: Перед словом щоб не потрібно ставити кому.
    correct: false
    explanation: Кома перед щоб є обов'язковою в українській мові.
  - statement: Фраза Я йду в магазин для купити хліб є граматично правильною.
    correct: false
    explanation: 'Після слова для не можна ставити дієслово. Правильно: щоб купити.'
  - statement: Якщо дію планує і виконує одна людина, ми використовуємо слово щоб
      і дієслово в інфінітиві.
    correct: true
    explanation: Це класичне правило однакового суб'єкта.
  - statement: Якщо я хочу, щоб дію виконав хтось інший, я маю використати минулий
      час дієслова.
    correct: true
    explanation: Зміна суб'єкта завжди вимагає використання минулого часу.
  - statement: Прийменник для завжди використовується з дієсловами.
    correct: false
    explanation: Прийменник для вимагає після себе іменник або займенник.
  - statement: Слово аби є дуже формальним та офіційним словом.
    correct: false
    explanation: Аби - це неформальне слово, яке часто використовується в живій розмові.
  - statement: У реченні Я хочу, щоб ти читав використано правильну форму дієслова.
    correct: true
    explanation: Суб'єкти різні (я і ти), тому правильно використовується минулий
      час.
  - statement: Конструкція для того щоб додає реченню серйозності та використовується
      в офіційному стилі.
    correct: true
    explanation: Це офіційна версія слова щоб.
- type: error-correction
  title: 'Виправте помилки: Знаходимо кальку'
  instruction: Знайдіть і виправте одну помилку в кожному реченні.
  items:
  - sentence: Я йду в магазин для купити молоко.
    error: для
    answer: щоб
    error_type: word
    options:
    - щоб
    - що
    - аби
    - бо
    explanation: Після слова для не можна використовувати дієслово. Потрібно використовувати
      щоб.
  - sentence: Він відкрив зошит щоб записати правило.
    error: зошит щоб
    answer: зошит, щоб
    error_type: phrase
    options:
    - зошит, щоб
    - зошит. щоб
    - зошит - щоб
    - зошит щоб
    explanation: Перед словом щоб завжди обов'язково ставиться кома.
  - sentence: Я дуже хочу, щоб ти читати цю нову книгу.
    error: читати
    answer: читав
    error_type: word
    options:
    - читав
    - читаєш
    - читатимеш
    - читай
    explanation: Суб'єкти різні (я і ти), тому в залежній частині потрібно використовувати
      минулий час.
  - sentence: Директор хоче, щоб ми працювати більше.
    error: працювати
    answer: працювали
    error_type: word
    options:
    - працювали
    - працюємо
    - працюватимемо
    - працюйте
    explanation: Оскільки директор і ми - різні суб'єкти, потрібно використовувати
      минулий час.
  - sentence: Ми приїхали в мальовничі гори для кататися на лижах.
    error: для
    answer: щоб
    error_type: word
    options:
    - щоб
    - що
    - бо
    - тому
    explanation: Перед дієсловом в інфінітиві ми використовуємо щоб, а не для.
  - sentence: Мені потрібна велика кімната щоб роботи.
    error: щоб
    answer: для
    error_type: word
    options:
    - для
    - що
    - аби
    - на
    explanation: Слово роботи - це іменник у родовому відмінку, тому перед ним потрібно
      використовувати прийменник для.
- type: match-up
  title: 'Знайдіть пару: З''єднайте частини речень'
