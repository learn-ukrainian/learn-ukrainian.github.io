- type: quiz
  title: 'Перевірте свої знання: Мета і пунктуація'
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
  - question: Який розділовий знак завжди ставиться перед словом щоб?
    explanation: Перед словом щоб завжди ставиться кома. Це залізне правило.
    options:
    - text: кома
      correct: true
    - text: крапка
      correct: false
    - text: тире
      correct: false
    - text: знак питання
      correct: false
  - question: Яку форму дієслова ми використовуємо, коли суб'єкт в обох частинах речення
      однаковий?
    explanation: Якщо дію планує і виконує та сама людина, ми використовуємо інфінітив.
    options:
    - text: інфінітив
      correct: true
    - text: минулий час
      correct: false
    - text: теперішній час
      correct: false
    - text: майбутній час
      correct: false
  - question: 'Яку форму дієслова ми використовуємо, якщо суб''єкти в реченні різні
      (наприклад: Я хочу, щоб ти...)?'
    explanation: При зміні суб'єкта завжди використовується форма минулого часу.
    options:
    - text: минулий час
      correct: true
    - text: інфінітив
      correct: false
    - text: теперішній час
      correct: false
    - text: майбутній час
      correct: false
  - question: З якою частиною мови завжди використовується прийменник для?
    explanation: Прийменник для вимагає після себе іменник або займенник.
    options:
    - text: з іменником або займенником
      correct: true
    - text: з дієсловом
      correct: false
    - text: з прикметником
      correct: false
    - text: з прислівником
      correct: false
  - question: У якому відмінку має стояти іменник після прийменника для?
    explanation: Після прийменника для завжди йде родовий відмінок.
    options:
    - text: у родовому відмінку
      correct: true
    - text: у знахідному відмінку
      correct: false
    - text: у давальному відмінку
      correct: false
    - text: у називному відмінку
      correct: false
  - question: Як українською мовою правильно перекладається фраза in order to?
    explanation: In order to перекладається як щоб.
    options:
    - text: щоб
      correct: true
    - text: для
      correct: false
    - text: тому що
      correct: false
    - text: бо
      correct: false
  - question: Яке з цих слів є популярним розмовним синонімом до слова щоб?
    explanation: Слово аби часто використовується в неформальній розмові як синонім
      до щоб.
    options:
    - text: аби
      correct: true
    - text: для
      correct: false
    - text: якщо
      correct: false
    - text: коли
      correct: false
  - question: В якому стилі мовлення найчастіше використовується конструкція для того
      щоб?
    explanation: Для того щоб додає серйозності та використовується в офіційному або
      діловому стилі.
    options:
    - text: в офіційному стилі
      correct: true
    - text: у неформальному спілкуванні
      correct: false
    - text: у розмовному стилі
      correct: false
    - text: у щоденних діалогах
      correct: false
- type: fill-in
  title: 'Заповніть пропуски: Щоб чи Для?'
  instruction: Оберіть правильне слово для кожного речення.
  items:
  - sentence: Ми вивчаємо українську мову, щоб вільно розмовляти з друзями.
    answer: щоб
    options:
    - щоб
    - для
    - аби
    - що
    explanation: Перед дієсловом розмовляти використовується щоб.
  - sentence: Я купив цей гарний подарунок для тебе.
    answer: для
    options:
    - для
    - щоб
    - що
    - аби
    explanation: Перед займенником тебе потрібен прийменник для.
  - sentence: Студенти багато читають, щоб знати більше цікавих фактів.
    answer: щоб
    options:
    - щоб
    - для
    - бо
    - тому
    explanation: Перед дієсловом знати потрібно ставити щоб.
  - sentence: Ця світла кімната створена спеціально для нашого відпочинку.
    answer: для
    options:
    - для
    - щоб
    - аби
    - що
    explanation: Відпочинок - це іменник, тому використовуємо для.
  - sentence: Активний спорт - це дуже корисно для здоров'я.
    answer: для
    options:
    - для
    - щоб
    - що
    - як
    explanation: Перед іменником здоров'я ми ставимо для.
  - sentence: Я йду в сусідній магазин, щоб купити свіжий хліб.
    answer: щоб
    options:
    - щоб
    - для
    - аби
    - що
    explanation: Перед інфінітивом купити використовуємо щоб.
  - sentence: Він постійно працює, щоб заробити гроші на нове авто.
    answer: щоб
    options:
    - щоб
    - для
    - що
    - як
    explanation: Перед дієсловом заробити використовуємо щоб.
  - sentence: Мені потрібна велика перерва для обіду.
    answer: для
    options:
    - для
    - щоб
    - що
    - аби
    explanation: Обід - це іменник, тому потрібен прийменник для.
