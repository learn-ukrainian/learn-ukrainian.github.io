      correct: true
    - text: Це дорогий подарунок для тебе.
      correct: true
    - text: Я йду додому щоб відпочити.
      correct: false
    - text: Ми зібралися тут для роботи.
      correct: true
    min_correct: 3
    explanation: Слово для правильно вживається з іменниками та займенниками.
  - question: Оберіть речення, у яких використовується неформальне слово АБИ.
    options:
    - text: Я зроблю це зараз, аби мати вільний вечір.
      correct: true
    - text: Візьму таксі, аби не спізнитися.
      correct: true
    - text: Будь ласка, зроби це, аби ми відпочили.
      correct: true
    - text: Я працюю кожен день, щоб жити.
      correct: false
    min_correct: 3
    explanation: Аби - це неформальний синонім до слова щоб.
  - question: Які слова найчастіше виражають мету або призначення в українській мові?
    options:
    - text: щоб
