  - source: I took a taxi just so I do not miss the train.
    options:
    - text: Я взяв таксі, аби не спізнитися на поїзд.
      correct: true
    - text: Я взяв таксі, щоб не поїзд.
      correct: false
    - text: Я взяв таксі для не спізнитися.
      correct: false
    explanation: Слово аби - це розмовний варіант слова щоб, який означає just so
