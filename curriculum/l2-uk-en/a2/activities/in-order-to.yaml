- type: select
  title: Оберіть усі правильні відповіді
  instruction: Уважно прочитайте речення і оберіть усі правильні варіанти.
  items:
  - question: Які з цих речень є граматично правильними?
    options:
    - text: Я йду, щоб працювати.
      correct: true
    - text: Я йду для працювати.
      correct: false
    - text: Мені потрібен час для роботи.
