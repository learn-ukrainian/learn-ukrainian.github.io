    - text: для
      correct: true
    - text: аби
      correct: true
    - text: але
      correct: false
    min_correct: 3
    explanation: Слова щоб, для та аби вказують на мету або призначення.
- type: mark-the-words
  title: Знайдіть слова мети
  instruction: Знайдіть і позначте всі слова, які вказують на мету або призначення
    (щоб, для, аби).
  text: Ми кожного дня багато працюємо, щоб мати стабільний дохід. Ця нова програма
    створена спеціально для нашого офісу. Я візьму таксі, аби вчасно приїхати на зустріч.
    Директор хоче, щоб ми закінчили цей проєкт завтра. Нам потрібен час, щоб відпочити.
    Вони купили цей подарунок для нас.
  answers:
  - щоб
  - для
  - аби
  - щоб
  - щоб
  - для
