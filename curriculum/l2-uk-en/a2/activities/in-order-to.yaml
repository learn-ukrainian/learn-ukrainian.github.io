  - source: Mom asks that we clean the room.
    options:
    - text: Мама просить, щоб ми прибрали кімнату.
      correct: true
    - text: Мама просить, щоб ми прибирати кімнату.
      correct: false
    - text: Мама просить для ми прибрали кімнату.
      correct: false
    explanation: Суб'єкти різні (Мама і ми), тому потрібне слово щоб і дієслово в
