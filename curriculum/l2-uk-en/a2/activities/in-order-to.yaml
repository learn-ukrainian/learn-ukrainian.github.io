  - source: I bought this gift for you.
    options:
    - text: Я купив цей подарунок для тебе.
      correct: true
    - text: Я купив цей подарунок щоб тебе.
      correct: false
    - text: Я купив цей подарунок що тебе.
      correct: false
    explanation: З займенником у родовому відмінку обов'язково використовуємо прийменник
