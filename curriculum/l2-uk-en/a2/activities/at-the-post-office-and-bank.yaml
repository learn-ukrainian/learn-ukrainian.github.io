- type: fill-in
  title: "Заповніть пропуски: банк і пошта (відмінки)"
  instruction: "Оберіть правильну форму слова, зважаючи на те, чи це місцезнаходження, чи напрямок руху."
  items:
    - sentence: "Ми зараз у ... ."
      answer: "банку"
      options:
        - "банку"
        - "банк"
        - "банком"
        - "банка"
      explanation: "Місцезнаходження (де?) вимагає місцевого відмінка: у банку."
    - sentence: "Я йду в ... ."
      answer: "банк"
      options:
        - "банк"
        - "банку"
        - "банком"
        - "банка"
      explanation: "Напрямок (куди?) вимагає знахідного відмінка: в банк."
    - sentence: "Вона зараз на ... ."
      answer: "пошті"
      options:
        - "пошті"
        - "пошту"
        - "поштою"
        - "пошта"
      explanation: "Місцезнаходження (де?) вимагає місцевого відмінка: на пошті."
    - sentence: "Він іде на ... ."
      answer: "пошту"
      options:
        - "пошту"
        - "пошті"
        - "поштою"
        - "пошта"
      explanation: "Напрямок (куди?) вимагає знахідного відмінка: на пошту."
    - sentence: "Я б хотів відправити ... ."
      answer: "посилку"
      options:
        - "посилку"
        - "посилка"
        - "посилкою"
        - "посилці"
      explanation: "Прямий об'єкт вимагає знахідного відмінка (посилка -> посилку)."
    - sentence: "Мені потрібно купити ... ."
      answer: "марку"
      options:
        - "марку"
        - "марка"
        - "маркою"
        - "марці"
      explanation: "Прямий об'єкт вимагає знахідного відмінка (марка -> марку)."
    - sentence: "Вона хоче відкрити ... ."
      answer: "рахунок"
      options:
        - "рахунок"
        - "рахунку"
        - "рахунком"
        - "рахунка"
      explanation: "Прямий об'єкт вимагає знахідного відмінка. Чоловічий неістотний рід не змінюється: рахунок."
    - sentence: "Ми маємо відправити ... сьогодні."
      answer: "листа"
      options:
        - "листа"
        - "листі"
        - "листом"
        - "листу"
      explanation: "Це традиційний виняток: для слова лист часто використовується закінчення -а у знахідному відмінку."
    - sentence: "Я пишу адресу на ... ."
      answer: "конверті"
      options:
        - "конверті"
        - "конверт"
        - "конвертом"
        - "конверту"
      explanation: "Тут відповідаємо на питання де?, тому потрібен місцевий відмінок: на конверті."
    - sentence: "Ти хочеш отримати грошовий ... ?"
      answer: "переказ"
      options:
        - "переказ"
        - "переказу"
        - "переказом"
        - "переказі"
      explanation: "Прямий об'єкт. Чоловічий неістотний рід не змінюється: переказ."
    - sentence: "Де я можу зняти ... ?"
      answer: "готівку"
      options:
        - "готівку"
        - "готівка"
        - "готівкою"
        - "готівці"
      explanation: "Прямий об'єкт вимагає знахідного відмінка (готівка -> готівку)."
    - sentence: "Я хочу покласти ... на рахунок."
      answer: "гроші"
      options:
        - "гроші"
        - "грошей"
        - "грошима"
        - "грошам"
      explanation: "Слово гроші завжди вживається у множині. У знахідному відмінку воно залишається як гроші."

