    answer: де
    options:
    - де
    - куди
    - звідки
  - sentence: Магазин, ____ ми йдемо, новий.
    answer: куди
    options:
    - де
    - куди
    - звідки
  - sentence: Місто, ____ вона приїхала, дуже старе.
    answer: звідки
    options:
    - де
    - куди
    - звідки
  - sentence: Парк, ____ грають діти, великий.
    answer: де
    options:
    - де
    - куди
    - звідки
  - sentence: Університет, ____ він іде на лекцію, близько.
    answer: куди
    options:
    - де
    - куди
    - звідки
  - sentence: Країна, ____ вони повернулися, цікава.
    answer: звідки
    options:
    - де
    - куди
    - звідки
  - sentence: Ресторан, ____ ми вечеряли, затишний.
    answer: де
    options:
    - де
    - куди
    - звідки
  - sentence: Театр, ____ ми купили квитки, відомий.
    answer: куди
    options:
