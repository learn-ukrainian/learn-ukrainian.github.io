version: '1.0'
module: relative-clauses
level: a2
inline:
- id: fill-in-yakiy-agreement
  type: fill-in
  instruction: Вставте правильну форму займенника (який, яка, яке, які)
  items:
  - sentence: Це той новий будинок, _____ стоїть біля метро.
    answer: який
    options:
    - який
    - яка
    - яке
    - які
  - sentence: Ось маленька кімната, _____ має велике вікно.
    answer: яка
    options:
    - який
    - яка
    - яке
    - які
  - sentence: Де ті ключі, _____ лежать на столі?
    answer: які
    options:
    - який
    - яка
    - яке
    - які
  - sentence: Це гарне місто, _____ знаходиться на півдні.
    answer: яке
    options:
    - який
    - яка
    - яке
    - які
  - sentence: Хто ці люди, _____ працюють тут щодня?
    answer: які
    options:
    - який
    - яка
    - яке
    - які
  - sentence: Мій брат купив новий телефон, _____ дуже добре працює.
    answer: який
    options:
    - який
    - яка
    - яке
    - які
  - sentence: Це нова машина, _____ стоїть на вулиці.
    answer: яка
    options:
    - який
    - яка
    - яке
    - які
  - sentence: Я люблю це тихе місце, _____ знаходиться біля парку.
    answer: яке
    options:
    - який
    - яка
    - яке
    - які
- id: true-false-comma-agreement
  type: true-false
  instruction: Правда чи ні? Зверніть увагу на коми та узгодження.
  items:
  - statement: Машина яка стоїть там, дуже стара.
    correct: false
    explanation: Перед словом «яка» обов'язково потрібна кома.
  - statement: Це новий ресторан, який ми вчора відвідали.
    correct: true
    explanation: Кома стоїть правильно, а «який» узгоджується зі словом «ресторан»
      (чоловічий рід).
  - statement: Ось цікава книга, який я зараз читаю.
    correct: false
    explanation: Слово «книга» жіночого роду, тому потрібно використовувати форму
      «яку» (Знахідний відмінок).
  - statement: Хто ті люди, які стоять біля нашого будинку?
    correct: true
    explanation: Для множини («люди») правильно використовується форма «які», кома
      стоїть.
  - statement: Це гарне місце яке знаходиться біля парку.
    correct: false
    explanation: Пропущена кома перед словом «яке».
  - statement: Ось мій друг, якого я чекаю.
    correct: true
    explanation: Кома є, а для істоти чоловічого роду в Знахідному відмінку використовується
      форма «якого».
  - statement: Де ключі, яка лежать на столі?
    correct: false
    explanation: Слово «ключі» — це множина, тому потрібно «які», а не «яка».
  - statement: Це велике вікно, яке виходить на вулицю.
    correct: true
    explanation: Кома на місці, «яке» узгоджується з іменником середнього роду «вікно».
- id: quiz-place-connectors
  type: quiz
  instruction: 'Оберіть правильне слово: де, куди або звідки'
  items:
  - question: Це той самий ресторан, _____ ми вчора обідали.
    options:
    - де
    - куди
    - звідки
    - коли
    correct: 0
  - question: Ми вибрали місто, _____ поїдемо у відпустку.
    options:
    - де
    - куди
    - звідки
    - що
    correct: 1
  - question: Ось те маленьке село, _____ привезли це молоко.
    options:
    - де
    - куди
    - звідки
    - яке
    correct: 2
  - question: Я покажу тобі великий будинок, _____ працює мій брат.
    options:
    - де
    - куди
    - звідки
    - хто
    correct: 0
  - question: Це новий магазин, _____ вона швидко зайшла.
    options:
    - де
    - куди
    - звідки
    - яка
    correct: 1
  - question: Я хочу побачити країну, _____ він приїхав.
    options:
    - де
    - куди
    - звідки
    - коли
    correct: 2
  - question: Де парк, _____ ми можемо піти погуляти?
    options:
    - де
    - куди
    - звідки
    - який
    correct: 1
  - question: Я люблю місця, _____ є така затишна атмосфера.
    options:
    - де
    - куди
    - звідки
    - які
    correct: 0
- id: match-up-sentence-combine
  type: match-up
  instruction: З'єднайте частини складнопідрядного речення
  pairs:
  - left: Це новий будинок,
    right: який стоїть біля метро.
  - left: Ось цікава книга,
    right: яку я зараз читаю.
  - left: Де ті ключі,
    right: які лежали на столі?
  - left: Це те місто,
    right: де ми вчора гуляли.
  - left: Я знаю магазин,
    right: звідки привезли цей хліб.
  - left: Ми вибрали парк,
    right: куди підемо на вихідних.
  - left: Хто ці люди,
    right: які стоять на вулиці?
  - left: Це тиха кімната,
    right: яка виходить на парк.
