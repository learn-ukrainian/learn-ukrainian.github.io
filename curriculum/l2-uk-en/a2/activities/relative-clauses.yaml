    - звідки
- id: error-correction-relative-clauses
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Це студент, яка добре вчиться.
    error: яка
    correction: який
    error_type: word
    options:
    - який
    - яке
    - які
    explanation: «Студент» — чоловічий рід, тому потрібно «який».
  - sentence: Ось вікно, який я відкрив.
    error: який
    correction: яке
    error_type: word
    options:
    - яка
    - яке
    - які
    explanation: «Вікно» — середній рід, тому потрібно «яке».
  - sentence: Там люди, яке чекають на нас.
    error: яке
    correction: які
    error_type: word
    options:
    - який
    - яка
    - які
    explanation: «Люди» — множина, тому потрібно «які».
  - sentence: Місто, куди я живу, велике.
    error: куди
    correction: де
    error_type: word
    options:
    - де
    - звідки
    - яке
    explanation: «Живу» — це статична дія (місце), тому потрібно використовувати «де».
  - sentence: Парк, де ми йдемо, дуже гарний.
    error: де
    correction: куди
    error_type: word
    options:
    - куди
    - звідки
    - який
    explanation: «Йдемо» — це рух (напрямок), тому потрібно використовувати «куди».
  - sentence: Країна, де він приїхав, далеко.
    error: де
    correction: звідки
    error_type: word
    options:
    - звідки
    - куди
    - яка
    explanation: «Приїхав» вказує на походження (з якого місця), тому потрібно «звідки».
  - sentence: Це дівчина, який читає книгу.
    error: який
    correction: яка
    error_type: word
    options:
    - яка
    - яке
    - які
    explanation: «Дівчина» — жіночий рід, тому потрібно «яка».
  - sentence: Ось кафе, яка знаходиться поруч.
    error: яка
    correction: яке
    error_type: word
    options:
    - який
    - яке
    - які
    explanation: «Кафе» — середній рід, тому потрібно «яке».
