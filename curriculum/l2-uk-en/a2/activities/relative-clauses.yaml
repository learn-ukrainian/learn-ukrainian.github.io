- id: error-correction-agreement
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Це та нова книга, яку я читав її вчора.
    error: читав її
    correction: читав
    error_type: construction
    options:
    - читав
    - читав її
    - її читав
    explanation: Слово «яку» вже замінює слово «книга». Ніколи не додавайте зайві
      слова «його», «її» або «їх» після «який/яка/яке/які».
  - sentence: Мій брат, який працює лікарем, він живе у Польщі.
    error: він живе
    correction: живе
    error_type: construction
    options:
    - живе
    - він живе
    - вони живуть
    explanation: Зайвий займенник «він». Головне речення — «Мій брат живе у Польщі».
  - sentence: Це новий будинок, яка стоїть біля метро.
    error: яка
    correction: який
    error_type: word
    options:
    - який
    - яке
    - які
    explanation: Слово «будинок» чоловічого роду, тому потрібна форма «який».
  - sentence: Де ті ключі, яка лежать на столі?
    error: яка
    correction: які
    error_type: word
    options:
    - який
    - яке
    - які
    explanation: Слово «ключі» у множині, тому потрібна форма «які».
  - sentence: Я знаю магазин, де вона пішла.
    error: де
    correction: куди
    error_type: word
    options:
    - куди
    - звідки
    - який
    explanation: Дієслово руху «пішла» вимагає слова «куди» (напрямок).
  - sentence: Це мій друг, який я бачив вчора.
    error: який
    correction: якого
    error_type: word
    options:
    - якого
    - яку
    - яке
    explanation: «Друг» є об'єктом дії (я бачив кого?), тому використовуємо Знахідний
      відмінок для істот — «якого».
