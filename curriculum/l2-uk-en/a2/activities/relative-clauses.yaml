- id: match-up-combine-two-simple-sentences-into-one-using-a-relative-clause
  type: match-up
  instruction: З'єднайте частини речень
  pairs:
  - left: Це мій друг. Він живе у Києві.
    right: Це мій друг, який живе у Києві.
  - left: Ось книга. Вона дуже цікава.
    right: Ось книга, яка дуже цікава.
  - left: Це вікно. Воно велике.
    right: Це вікно, яке велике.
  - left: Там люди. Вони чекають на нас.
    right: Там люди, які чекають на нас.
  - left: Це ресторан. Ми там вечеряли.
    right: Це ресторан, де ми вечеряли.
  - left: Ось парк. Ми туди йдемо.
    right: Ось парк, куди ми йдемо.
  - left: Це місто. Я звідти приїхав.
    right: Це місто, звідки я приїхав.
  - left: Ось студент. Я його знаю.
    right: Ось студент, якого я знаю.
- id: true-false-judge-whether-relative-clauses-have-correct-agreement-and-comma-placement
  type: true-false
  instruction: Правда чи ні? Визначте, чи правильне речення.
  items:
  - statement: Книга, яка лежить на столі, дуже цікава.
    correct: true
    explanation: Правильне узгодження (книга — яка) і є кома.
  - statement: Це мій брат який живе у Києві.
    correct: false
    explanation: Перед словом «який» обов'язково має бути кома.
  - statement: Дерево, яке росте біля будинку, старе.
    correct: true
    explanation: Правильне узгодження (дерево — яке) і є кома.
  - statement: Студенти, яка вчаться тут, розумні.
    correct: false
    explanation: «Студенти» — це множина, тому потрібно використовувати «які».
  - statement: Місто де я живу, велике.
    correct: false
    explanation: Перед словом «де» обов'язково має бути кома.
  - statement: Це парк, куди ми йдемо гуляти.
    correct: true
    explanation: Правильно вжито «куди» (напрямок дії) і є кома.
  - statement: Жінка, який стоїть там, моя мама.
    correct: false
    explanation: «Жінка» — це жіночий рід, тому потрібно використовувати «яка».
  - statement: Це телефон, який я купив учора.
    correct: true
    explanation: Правильне узгодження (телефон — який) і є кома.
