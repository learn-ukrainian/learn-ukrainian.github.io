    - кафе
    - вікно
    - книга
    correct: 3
    explanation: «Книга» — це слово жіночого роду, а інші — середнього.
  - words:
    - друзі
    - діти
    - студенти
    - дівчина
    correct: 3
    explanation: «Дівчина» — це слово в однині, а інші стоять у множині.
  - words:
