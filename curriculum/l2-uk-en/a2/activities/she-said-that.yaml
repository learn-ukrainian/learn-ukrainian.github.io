  instruction: Оберіть правильне слово для заповнення пропуску.
- type: error-correction
  title: Виправте граматичні помилки з часом (The Backshift Trap)
  items:
  - sentence: Іван сказав, що він був дуже зайнятий сьогодні.
    error: був
    answer: є
    options:
    - є
    - буде
    - бути
    - було
    explanation: В українській мові час зберігається таким, яким він був у прямій
      мові (Honest Tense).
  - sentence: Олена сказала, що вона хотіла спати зараз.
    error: хотіла
    answer: хоче
    options:
    - хоче
    - хотітиме
    - хотіти
    - хотіла б
    explanation: Олена оригінально сказала 'Я хочу спати', тому ми обов'язково зберігаємо
      теперішній час.
  - sentence: Він вчора запитав, чи я мав гроші.
    error: мав
    answer: маю
    options:
    - маю
    - матиму
    - мати
    - мав би
    explanation: Оригінальне питання звучало 'Ти маєш гроші?', тому час залишається
      теперішнім.
  - sentence: Колега сказав, що він зробив це завтра.
    error: зробив
    answer: зробить
    options:
    - зробить
    - робить
    - робитиме
    - робити
    explanation: Якщо дія точно відбудеться в майбутньому (завтра), дієслово має бути
      в майбутньому часі.
  - sentence: Вона спитала, чи я любив чорну каву.
    error: любив
    answer: люблю
    options:
    - люблю
    - любитиму
    - любити
    - любив би
    explanation: 'Оригінально було: ''Ти любиш чорну каву?''. Залишаємо теперішній
      час.'
  - sentence: Студент сказав, що він розумів це правило зараз.
    error: розумів
    answer: розуміє
    options:
    - розуміє
    - розумітиме
    - розуміти
    - розумів би
    explanation: Оскільки зараз він його розуміє, час має бути теперішнім.
  instruction: Знайдіть і виправте помилку в реченні.
- type: error-correction
  title: Виправте помилки із займенниками та сполучниками
  items:
  - sentence: 'Жінка каже: ''Я люблю квіти''. Непряма мова: Вона каже, що я люблю
      квіти.'
    error: я
    answer: вона
    options:
    - вона
    - ти
    - він
    - ми
    explanation: Треба змінити займенник 'я' на 'вона', щоб правильно передати особу.
  - sentence: Він запитав мене, якщо я маю вільний час.
    error: якщо
    answer: чи
    options:
    - чи
    - що
    - щоб
    - де
    explanation: Для непрямих питань потрібно використовувати 'чи', а не умовне слово
      'якщо'.
  - sentence: Вчитель суворо попросив, що ми уважно читали текст.
    error: що
    answer: щоб
    options:
    - щоб
    - чи
    - якщо
    - де
    explanation: Дієслово 'попросити' чітко виражає прохання чи наказ, тому потрібен
      сполучник 'щоб'.
  - sentence: 'Чоловік сказав про свого брата: Чоловік сказав, що мій брат зараз тут.'
    error: мій
    answer: його
    options:
    - його
    - твій
    - її
    - їхній
    explanation: Якщо чоловік говорив про свого брата, ми повинні сказати 'його брат'.
  - sentence: Вони завжди питають нас, якщо ми йдемо в кіно сьогодні ввечері.
    error: якщо
    answer: чи
    options:
    - чи
    - що
    - щоб
    - куди
    explanation: Це загальне питання. Використовуйте сполучник 'чи'.
  - sentence: Вона часто говорить, що завтра буде дуже тепло.
    error: говорить
    answer: каже
    options:
    - каже
    - розмовляє
    - запитує
    - відповідає
    explanation: Для переказу конкретного твердження краще використовувати дієслово
      'каже'.
  instruction: Знайдіть і виправте помилку в реченні.
- type: group-sort
  title: Розподіліть слова за їх функцією у реченні
  groups:
  - name: Дієслова для розмови
    items:
    - казати
    - говорити
    - питати
    - відповідати
  - name: Сполучники для переказу
    items:
    - що
    - чи
    - щоб
    - якщо
  instruction: Розподіліть елементи за групами.
- type: select
  title: Оберіть усі правильні речення з непрямою мовою
  items:
  - question: Які з цих речень граматично правильні в українській мові?
    min_correct: 2
    explanation: В українській мові ми ніколи не робимо зсув часів (backshifting)
      і використовуємо 'чи' для питань.
    options:
    - text: Він сказав, що він зараз багато працює.
      correct: true
    - text: Він сказав, що він тоді багато працював зараз.
      correct: false
    - text: Вона спитала, чи я маю вільний час.
      correct: true
    - text: Вона спитала, якщо я маю вільний час.
      correct: false
  - question: Оберіть абсолютно правильні перекази суворого наказу 'Читай книгу!'
    min_correct: 2
    explanation: Для наказів ми обов'язково використовуємо 'щоб' і дієслово в минулому
      часі.
    options:
    - text: Вчитель суворо сказав, щоб я читав книгу.
      correct: true
    - text: Вчитель суворо сказав, що я читаю книгу.
      correct: false
    - text: Вчитель суворо попросив, щоб ми читали книгу.
      correct: true
    - text: Вчитель суворо попросив, чи ми читаємо книгу.
      correct: false
  - question: 'Які речення правильно використовують займенники (пряма мова Анни: ''Мій
      брат тут'')?'
    min_correct: 2
    explanation: Вам обов'язково треба змінити 'мій' на 'її', бо ці слова говорить
      Анна.
    options:
    - text: Анна сказала, що її брат зараз тут.
      correct: true
    - text: Анна сказала, що мій брат зараз тут.
      correct: false
    - text: Анна радісно каже, що її брат зараз тут.
      correct: true
    - text: Анна радісно каже, що твій брат зараз тут.
      correct: false
  - question: Оберіть правильне граматичне вживання дієслів 'казати' та 'говорити'
    min_correct: 2
    explanation: Слово 'Казати' використовується для конкретних повідомлень (що),
      а 'говорити' для процесу розмови (про).
    options:
    - text: Він каже, що завтра буде гарний вихідний.
      correct: true
    - text: Він говорить, що завтра буде гарний вихідний.
      correct: false
    - text: Ми довго і цікаво говорили про нову книгу.
      correct: true
    - text: Ми довго і цікаво казали про нову книгу.
      correct: false
  - question: Які з цих непрямих питань побудовані правильно?
    min_correct: 2
    explanation: Питальні слова (де, куди) самі працюють як сполучники. 'Чи' використовується
      без них.
    options:
    - text: Він питає, де саме знаходиться старий вокзал.
      correct: true
    - text: Він питає, чи де саме знаходиться старий вокзал.
      correct: false
    - text: Я зовсім не знаю, чи він зараз вдома.
      correct: true
