  instruction: З'єднайте відповідні елементи.
- type: true-false
  title: Правильно чи неправильно?
  items:
  - statement: В українській мові ми змінюємо час дієслова при переказі (backshifting).
    correct: false
    explanation: В українській мові діє правило 'Чесного часу', час зберігається оригінальним.
  - statement: Для загальних питань (Так/Ні) ми завжди використовуємо сполучник 'чи'.
    correct: true
  - statement: Ми використовуємо слово 'якщо' для непрямих питань.
    correct: false
    explanation: Слово 'якщо' використовується тільки для жорстких умов. Для питань
      потрібне 'чи'.
  - statement: Після дієслова 'казати' ми зазвичай використовуємо сполучник 'що'.
    correct: true
  - statement: Дієслово 'говорити' фокусується на конкретному змісті повідомлення.
    correct: false
    explanation: Воно фокусується на самому процесі розмови. На конкретному змісті
      фокусується 'казати'.
  - statement: У непрямих питаннях повністю зберігається прямий порядок слів.
    correct: true
  - statement: Для наказів ми використовуємо 'щоб' плюс дієслово в минулому часі.
    correct: true
  - statement: При переказі чужих слів потрібно обов'язково логічно змінювати займенники.
    correct: true
  instruction: Визначте, чи твердження правильне.
- type: quiz
  title: Оберіть правильний варіант
  items:
  - question: Який сполучник найкраще підходить для переказу звичайного твердження?
    explanation: Для тверджень ми обов'язково використовуємо сполучник 'що'.
    options:
    - text: що
      correct: true
    - text: чи
      correct: false
    - text: щоб
      correct: false
    - text: якщо
      correct: false
  - question: Яке слово ми використовуємо для переказу питання 'Він вдома?'
    explanation: Для загальних питань (Так/Ні) ми завжди використовуємо 'чи'.
    options:
    - text: чи
      correct: true
    - text: що
      correct: false
    - text: щоб
      correct: false
    - text: якщо
      correct: false
  - question: Що ми використовуємо для переказу суворого наказу 'Прибери кімнату!'?
    explanation: Для наказів потрібен сполучник 'щоб' і дієслово обов'язково в минулому
      часі.
    options:
    - text: щоб
      correct: true
    - text: що
      correct: false
    - text: чи
      correct: false
    - text: якщо
      correct: false
  - question: 'Яке дієслово ідеально підходить для переказу: ''Він ..., що завтра
      дощ''?'
    explanation: Дієслово 'казати' фокусується на самому інформаційному повідомленні.
    options:
    - text: каже
      correct: true
    - text: говорить
      correct: false
    - text: розмовляє
      correct: false
    - text: питає
      correct: false
  - question: Що саме означає українське дієслово 'говорити' в контексті розмови?
    explanation: Воно означає процес розмови (to speak або to talk).
    options:
    - text: процес розмови
      correct: true
    - text: передачу конкретної інформації
      correct: false
    - text: постановку питання
      correct: false
    - text: надання відповіді
      correct: false
  - question: Який сполучник категорично не можна використовувати для непрямих питань?
    explanation: Слово 'якщо' використовується тільки для жорстких умов.
    options:
    - text: якщо
      correct: true
    - text: чи
      correct: false
    - text: де
      correct: false
    - text: коли
      correct: false
  - question: Як правильно змінити займенник 'Я', якщо слова переказує інша людина
      про Петра?
    explanation: Особовий займенник логічно змінюється з 1-ї особи на 3-ю.
    options:
    - text: він
      correct: true
    - text: я
      correct: false
    - text: ти
      correct: false
    - text: ми
      correct: false
  - question: Який прийменник традиційно використовується з дієсловом 'відповідати'?
    explanation: В українській мові ми обов'язково кажемо 'відповідати на питання'.
    options:
    - text: на
      correct: true
    - text: за
      correct: false
    - text: в
      correct: false
    - text: до
      correct: false
