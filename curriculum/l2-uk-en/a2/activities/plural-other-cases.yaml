- id: fill-in-plural-forms-focus-put-the-noun-in-parentheses-into-the-correct-plural-case-dat-or-instr-based-on-context
  type: fill-in
  instruction: Вставте іменник у правильній формі множини (давальний або орудний відмінок).
  items:
  - sentence: Ми завжди даємо гарні подарунки нашим.
    answer: друзям
    options:
    - друзям
    - друзях
    - друзями
    - друзі
  - sentence: Діти люблять гратися з новими у дворі.
    answer: друзями
    options:
    - друзями
    - друзям
    - друзях
    - друзі
  - sentence: Вчитель чітко пояснює нові правила всім.
    answer: студентам
    options:
    - студентам
    - студентах
    - студентами
    - студенти
  - sentence: Завтра ми їдемо на екскурсію великими.
    answer: автобусами
    options:
    - автобусами
    - автобусам
    - автобусах
    - автобуси
  - sentence: Хороші батьки часто допомагають робити завдання.
    answer: дітям
    options:
    - дітям
    - дітях
    - дітьми
    - діти
  - sentence: Ввечері вона розмовляла з про проєкт.
    answer: колегами
    options:
    - колегами
    - колегам
    - колегах
    - колеги
  - sentence: Ми щиро хочемо подякувати за допомогу.
    answer: лікарям
    options:
    - лікарям
    - лікарях
    - лікарями
    - лікарі
  - sentence: Молодші школярі часто малюють яскравими.
    answer: олівцями
    options:
    - олівцями
    - олівцям
    - олівцях
    - олівці
  title: Вставте іменник у правильній формі множини (давальний або орудний відмінок).
workbook:
- type: true-false
  instruction: Правда чи ні? (True or false?)
  items:
  - statement: У давальному відмінку множини всі іменники мають закінчення «-ам» або
      «-ям».
    correct: true
    explanation: Це дуже регулярний відмінок для всіх родів.
  - statement: Орудний відмінок іменника відповідає на питання «кого? що?».
    correct: false
    explanation: Орудний відмінок відповідає на питання «ким? чим?».
  - statement: Місцевий відмінок множини завжди використовується з прийменником.
    correct: true
    explanation: Ми завжди використовуємо його з прийменниками у/в, на, по.
  - statement: Правильна форма орудного відмінка слова «діти» — це «дітьми».
    correct: true
    explanation: Це важливий виняток, який треба запам'ятати.
  - statement: Українською мовою ми кажемо «гуляти по паркам».
    correct: false
    explanation: 'Після прийменника «по» ми використовуємо місцевий відмінок (на -ах,
      -ях): по парках.'
  - statement: Слово «люди» в орудному відмінку має форму «людями».
    correct: false
    explanation: Правильна форма — «людьми».
  title: Правда чи ні? (True or false?)
