version: '1.0'
module: plural-other-cases
level: a2
inline:
- id: match-up-plural-cases
  type: match-up
  instruction: З'єднайте форму множини з правильним відмінком
  pairs:
  - left: студентам
    right: Давальний (кому? чому?)
  - left: друзям
    right: Давальний (кому? чому?)
  - left: дітям
    right: Давальний (кому? чому?)
  - left: містах
    right: Місцевий (де? на чому?)
  - left: полицях
    right: Місцевий (де? на чому?)
  - left: квітами
    right: Орудний (ким? чим?)
  - left: людьми
    right: Орудний (ким? чим?)
  - left: грошима
    right: Орудний (ким? чим?)
- id: fill-in-plural-forms-focus-put-the-noun-in-parentheses-into-the-correct-plural-case-dat-or-instr-based-on-context
  type: fill-in
  instruction: Вставте іменник у правильній формі (давальний або орудний відмінок)
  items:
  - sentence: Я пишу коротке повідомлення _____
    answer: батькам
  - sentence: Вчитель пояснює нові правила _____
    answer: учням
  - sentence: Ми любимо гуляти з _____
    answer: друзями
  - sentence: Вона довго розмовляла з _____
    answer: колегами
  - sentence: Діти малюють яскравими _____
    answer: фарбами
  - sentence: Ми їдемо на екскурсію великими _____
    answer: автобусами
  - sentence: Ми завжди допомагаємо маленьким _____
    answer: дітям
  - sentence: Я щиро дякую _____
    answer: лікарям
- id: quiz-preposition-case-focus-choose-the-correct-preposition-and-plural-case-ending-to-complete-the-sentence
  type: quiz
  instruction: Оберіть правильний прийменник і форму слова
  items:
  - question: Іноземні туристи люблять ходити _____ магазинах.
    options:
    - по
    - у
    - на
    - з
    correct: 0
  - question: Важливі документи лежать _____ полицях.
    options:
    - по
    - в
    - на
    - з
    correct: 2
  - question: Школярі активно відпочивають _____ горах.
    options:
    - по
    - в
    - на
    - із
    correct: 1
  - question: Ми часто гуляємо _____ міських парках.
    options:
    - по
    - у
    - на
    - із
    correct: 0
  - question: Багато людей живуть _____ великих містах.
    options:
    - по
    - у
    - на
    - з
    correct: 1
  - question: Вони із задоволенням катаються _____ конях.
    options:
    - по
    - в
    - на
    - з
    correct: 2
  - question: Ми завжди зустрічаємося з родиною _____ вихідних.
    options:
    - по
    - у
    - на
    - з
    correct: 2
  - question: Студенти уважно слухають _____ заняттях.
    options:
    - по
    - у
    - на
    - з
    correct: 2
