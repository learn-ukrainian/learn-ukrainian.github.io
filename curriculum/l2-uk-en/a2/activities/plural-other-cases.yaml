version: '1.0'
module: plural-other-cases
level: a2
inline:
- id: match-up-plural-cases
  type: match-up
  instruction: З'єднайте форму множини з правильним відмінком
  pairs:
  - left: студентам
    right: Давальний (кому? чому?)
  - left: друзям
    right: Давальний (кому? чому?)
  - left: дітям
    right: Давальний (кому? чому?)
  - left: містах
    right: Місцевий (де? на чому?)
  - left: полицях
    right: Місцевий (де? на чому?)
  - left: квітами
    right: Орудний (ким? чим?)
  - left: людьми
    right: Орудний (ким? чим?)
  - left: грошима
    right: Орудний (ким? чим?)
- id: fill-in-plural-forms-focus-put-the-noun-in-parentheses-into-the-correct-plural-case-dat-or-instr-based-on-context
  type: fill-in
  instruction: Вставте іменник у правильній формі (давальний або орудний відмінок)
  items:
  - sentence: Я пишу коротке повідомлення (батьки) _____
    answer: батькам
  - sentence: Вчитель пояснює нові правила (учні) _____
    answer: учням
  - sentence: Ми любимо гуляти з (друзі) _____
    answer: друзями
  - sentence: Вона довго розмовляла з (колеги) _____
    answer: колегами
  - sentence: Діти малюють яскравими (фарби) _____
    answer: фарбами
  - sentence: Ми їдемо на екскурсію великими (автобуси) _____
    answer: автобусами
  - sentence: Ми завжди допомагаємо маленьким (діти) _____
    answer: дітям
  - sentence: Я щиро дякую (лікарі) _____
    answer: лікарям
- id: quiz-preposition-case-focus-choose-the-correct-preposition-and-plural-case-ending-to-complete-the-sentence
  type: quiz
  instruction: Оберіть правильний прийменник і форму слова
  items:
  - question: Іноземні туристи люблять ходити _____ магазинах.
    options:
    - по
    - у
    - на
    - з
    correct: 0
  - question: Важливі документи лежать _____ полицях.
    options:
    - по
    - в
    - на
    - з
    correct: 2
  - question: Школярі активно відпочивають _____ горах.
    options:
    - по
    - в
    - на
    - із
    correct: 1
  - question: Ми часто гуляємо _____ міських парках.
    options:
    - по
    - у
    - на
    - із
    correct: 0
  - question: Багато людей живуть _____ великих містах.
    options:
    - по
    - у
    - на
    - з
    correct: 1
  - question: Вони із задоволенням катаються _____ конях.
    options:
    - по
    - в
    - на
    - з
    correct: 2
  - question: Ми завжди зустрічаємося з родиною _____ вихідних.
    options:
    - по
    - у
    - на
    - з
    correct: 2
  - question: Студенти уважно слухають _____ заняттях.
    options:
    - по
    - у
    - на
    - з
    correct: 2
- id: error-correction-plural-focus-identify-and-fix-incorrect-plural-case-endings-in-a-short-text-about-a-trip
  type: error-correction
  instruction: Знайдіть і виправте неправильне закінчення множини
  items:
  - sentence: Ми їдемо на екскурсію з друзям.
    error: друзям
    correction: друзями
    error_type: word
    explanation: 'Орудний відмінок: з ким? -> з друзями.'
    options:
    - друзями
    - друзях
    - друзі
  - sentence: Я сьогодні купив гарні подарунки дітями.
    error: дітями
    correction: дітям
    error_type: word
    explanation: 'Давальний відмінок: кому? -> дітям.'
    options:
    - дітям
    - дітях
    - дітей
  - sentence: Ми чудово відпочивали в Карпатами минулого року.
    error: Карпатами
    correction: Карпатах
    error_type: word
    explanation: 'Місцевий відмінок: де? -> у Карпатах.'
    options:
    - Карпатах
    - Карпатам
    - Карпати
  - sentence: Маленькі учні у школі пишуть олівцям.
    error: олівцям
    correction: олівцями
    error_type: word
    explanation: 'Орудний відмінок: чим? -> олівцями.'
    options:
    - олівцями
    - олівцях
    - олівці
  - sentence: Вчитель довго розповідає батьками про поїздку.
    error: батьками
    correction: батькам
    error_type: word
    explanation: 'Давальний відмінок: кому? -> батькам.'
    options:
    - батькам
    - батьках
    - батьки
  - sentence: Студенти багато читають на канікулами.
    error: канікулами
    correction: канікулах
    error_type: word
    explanation: 'Місцевий відмінок: на чому? (коли?) -> на канікулах.'
    options:
    - канікулах
    - канікулам
    - канікули
