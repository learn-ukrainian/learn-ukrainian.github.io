    - Орудний
    - Місцевий
    - Називний
    correct: 1
  - question: Важливі робочі папери лежать на **полицях**.
    options:
    - Давальний
    - Орудний
    - Місцевий
    - Називний
    correct: 2
- type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: Я часто даю гарні подарунки _____
    answer: друзям
    options:
    - друзям
    - друзями
    - друзях
  - sentence: Сьогодні ми всі їдемо в школу _____
    answer: автобусами
    options:
    - автобусам
    - автобусами
    - автобусах
  - sentence: Люди зараз масово живуть у великих _____
    answer: містах
    options:
    - містам
    - містами
    - містах
  - sentence: Я завжди раджу цим _____ відвідати центр.
    answer: туристам
    options:
    - туристам
    - туристами
    - туристах
  - sentence: Ми щиро мріємо подорожувати по _____ Європи.
    answer: країнах
    options:
    - країнам
    - країнами
    - країнах
  - sentence: В азійському ресторані вони їдять суші _____
    answer: паличками
    options:
    - паличкам
    - паличками
    - паличках
- type: true-false
  instruction: Чи правильно використано відмінок і прийменник?
  items:
  - statement: «Я гуляю з друзями» — це правильна форма орудного відмінка.
    correct: true
    explanation: Орудний відмінок для множини після «з» має закінчення -ами/-ями (з
      друзями).
  - statement: Форма «з дітьми» є граматичною помилкою, завжди треба казати «з дітями».
    correct: false
    explanation: Слово «діти» в орудному відмінку має історичне коротке закінчення
      «дітьми», і це абсолютно правильно.
  - statement: 'Слово «гроші» може мати дві правильні форми в орудному відмінку: «грішми»
      та «грошима».'
    correct: true
    explanation: Обидві ці форми є стандартними і дуже часто звучать у повсякденних
      розмовах.
  - statement: Місцевий відмінок множини в українській мові часто використовується
      без прийменників.
    correct: false
    explanation: Місцевий відмінок ніколи не працює без прийменників (у, в, на, по).
  - statement: «Я завжди допомагаю цим людям» — тут використано давальний відмінок
      множини.
    correct: true
    explanation: Дієслово «допомагати» вимагає давального відмінка (кому?).
  - statement: Коли ми говоримо про прогулянку парком, українською мовою треба казати
      «гуляти по паркам».
    correct: false
    explanation: В українській мові рух по поверхні завжди вимагає місцевого відмінка
      (по парках), а не давального.
