version: '1.0'
module: plural-other-cases
level: a2
workbook:
- id: fill-in-cases-mixed
  type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: Я часто телефоную _______ (друзі).
    answer: друзям
    options:
    - друзям
    - друзями
    - друзях
  - sentence: Ми прикрашаємо кімнату _______ (квіти).
    answer: квітами
    options:
    - квітам
    - квітами
    - квітах
  - sentence: Цікаві книжки лежать на _______ (полиці).
    answer: полицях
    options:
    - полицям
    - полицями
    - полицях
  - sentence: Батьки завжди допомагають _______ (діти).
    answer: дітям
    options:
    - дітям
    - дітьми
    - дітях
  - sentence: Ми любимо гуляти по _______ (парки).
    answer: парках
    options:
    - паркам
    - парками
    - парках
  - sentence: Вчитель пояснює правила _______ (учні).
    answer: учням
    options:
    - учням
    - учнями
    - учнях
  - sentence: Туристи спілкуються з місцевими _______ (жителі).
    answer: жителями
    options:
    - жителям
    - жителями
    - жителях
  - sentence: Ми часто їздимо по _______ (міста).
    answer: містах
    options:
    - містам
    - містами
    - містах
- id: match-up-instrumental
  type: match-up
  instruction: З'єднайте називний відмінок із формою орудного відмінка
  pairs:
  - left: діти
    right: дітьми
  - left: люди
    right: людьми
  - left: коні
    right: кіньми
  - left: гості
    right: гістьми
  - left: квіти
    right: квітами
  - left: друзі
    right: друзями
  - left: студенти
    right: студентами
  - left: мови
    right: мовами
- id: quiz-locative-prepositions
  type: quiz
  instruction: Оберіть правильний прийменник із місцевим відмінком
  items:
  - question: Діти вчаться _____.
    options:
    - у школах
    - на школах
    - по школах
    - школами
    correct: 0
  - question: Картини висять _____.
    options:
    - у стінах
    - на стінах
    - по стінах
    - стінах
    correct: 1
  - question: На вихідних ми любимо гуляти _____.
    options:
    - у парках
    - на парках
    - по парках
    - парках
    correct: 2
  - question: Документи лежать _____.
    options:
    - у столах
    - на столах
    - по столах
    - столами
    correct: 1
  - question: Восени ми збираємо гриби _____.
    options:
    - у лісах
    - на лісах
    - по лісах
    - лісами
    correct: 0
  - question: Студенти багато пишуть _____.
    options:
    - у заняттях
    - на заняттях
    - по заняттях
    - заняттями
    correct: 1
  - question: Туристи люблять їздити _____ Європи.
    options:
    - у містах
    - на містах
    - по містах
    - містами
    correct: 2
  - question: Ввечері ми дивимося вистави _____.
    options:
    - у театрах
    - на театрах
    - по театрах
    - театрами
    correct: 0
- id: error-correction-children-party
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Ми допомагаємо дітями організувати свято.
    error: дітями
    correction: дітям
    error_type: word
    options:
    - дітям
    - дітях
    - з дітьми
    explanation: Дієслово 'допомагати' вимагає давального відмінка (кому?).
  - sentence: Ми прикрашаємо всі кімнати квітам.
    error: квітам
    correction: квітами
    error_type: word
    options:
    - квітами
    - квітах
    - з квітами
    explanation: Інструмент дії (чим?) вимагає орудного відмінка.
  - sentence: Подарунки вже лежать на столами.
    error: столами
    correction: столах
    error_type: word
    options:
    - столах
    - столам
    - зі столами
    explanation: Прийменник 'на' (де?) вимагає місцевого відмінка.
  - sentence: Батьки з радістю грають з дітям.
    error: дітям
    correction: дітьми
    error_type: word
    options:
    - дітьми
    - дітями
    - дітях
    explanation: Прийменник 'з' (з ким?) вимагає орудного відмінка. Слово 'дитина'
      у множині має виняткову форму 'дітьми'.
  - sentence: Діти дуже радіють новим подарунках.
    error: подарунках
    correction: подарункам
    error_type: word
    options:
    - подарункам
    - подарунками
    - у подарунках
    explanation: Дієслово 'радіти' вимагає давального відмінка (чому?).
  - sentence: Ввечері гості розходяться по домівкам.
    error: домівкам
    correction: домівках
    error_type: word
    options:
    - домівках
    - домівками
    - у домівках
    explanation: Прийменник 'по' (де?) вимагає місцевого відмінка.
- id: unjumble-cases-practice
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - подарунками.
    - Я
    - дітям
    - з
    - допомагаю
    correct_order:
    - Я
    - допомагаю
    - дітям
    - з
    - подарунками.
  - words:
    - по
    - Вони
    - вулицях.
    - гуляють
    - часто
    correct_order:
    - Вони
    - часто
    - гуляють
    - по
    - вулицях.
  - words:
    - людьми.
    - Вона
    - з
    - новими
    - спілкується
    correct_order:
    - Вона
    - спілкується
    - з
    - новими
    - людьми.
  - words:
    - радити
    - колегам.
    - люблю
    - проєкти
    - Я
    - нові
    correct_order:
    - Я
    - люблю
    - радити
    - нові
    - проєкти
    - колегам.
  - words:
    - школах.
    - вчаться
    - у
    - Діти
    - завжди
    correct_order:
    - Діти
    - завжди
    - вчаться
    - у
    - школах.
  - words:
    - квітами.
    - кімнати
    - свої
    - Люди
    - прикрашають
    correct_order:
    - Люди
    - прикрашають
    - свої
    - кімнати
    - квітами.
