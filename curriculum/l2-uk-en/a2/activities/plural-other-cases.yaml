- type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: Я часто даю гарні подарунки (друзі) _____
    answer: друзям
    options:
    - друзям
    - друзями
    - друзях
  - sentence: Сьогодні ми всі їдемо в школу (автобуси) _____
    answer: автобусами
    options:
    - автобусам
    - автобусами
    - автобусах
  - sentence: Люди зараз масово живуть у великих (міста) _____
    answer: містах
