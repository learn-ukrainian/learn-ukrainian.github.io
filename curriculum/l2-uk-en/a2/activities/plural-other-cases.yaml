- type: order
  instruction: Розставте речення в правильному порядку
  items:
  - — Привіт! Ти пам'ятаєш про свято у школі завтра?
  - — Так, звісно, пам'ятаю. Кому ми даруємо подарунки на цьому тижні?
  - — Тільки нашим вчителям і хорошим друзям.
  - — Добре, зрозумів. А з ким ти йдеш на це свято?
  - — Я йду з моїми старшими братами.
  - — Чудово! Тоді зустрінемося там.
