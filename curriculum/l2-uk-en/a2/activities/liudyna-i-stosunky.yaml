version: '1.0'
module: liudyna-i-stosunky
level: a2
inline:
- id: match-character-traits
  type: match-up
  instruction: З'єднайте риси характеру з їхніми значеннями
  pairs:
  - left: щирий
    right: відкрита людина, яка каже правду
  - left: привітний
    right: завжди радий бачити інших людей
  - left: чуйний
    right: завжди готовий вислухати і допомогти
  - left: працьовитий
    right: любить працювати і не сидить без діла
  - left: відповідальний
    right: завжди робить те, що обіцяв
  - left: терплячий
    right: може спокійно чекати або долати труднощі
  - left: наполегливий
    right: не здається і йде до своєї мети
  - left: ледачий
    right: не хоче працювати або щось робити
- id: quiz-character-choice
  type: quiz
  instruction: Оберіть правильний прикметник для опису людини
  items:
  - question: Він завжди допомагає людям і уважно їх слухає. Він дуже _____.
    options:
    - чуйний
    - ледачий
    - сумний
    - серйозний
    correct: 0
  - question: Вона не хоче працювати і спить цілий день. Вона _____.
    options:
    - відповідальна
    - щира
    - ледача
    - терпляча
    correct: 2
  - question: Мій сусід завжди робить те, що обіцяв. Він _____.
    options:
    - тихий
    - впертий
    - лінивий
    - відповідальний
    correct: 3
  - question: Ця дівчина завжди посміхається і рада бачити гостей. Вона _____.
    options:
    - привітна
    - серйозна
    - висока
    - русява
    correct: 0
  - question: Вчитель може довго і спокійно пояснювати одне і те ж правило. Він _____.
    options:
    - високий
    - старий
    - терплячий
    - працьовитий
    correct: 2
  - question: Він не здається, коли складно, і завжди отримує результат. Він _____.
    options:
    - наполегливий
    - чуйний
    - ледачий
    - щирий
    correct: 0
  - question: Вона відкрита людина, нічого не приховує і завжди каже правду. Вона
      _____.
    options:
    - тиха
    - щира
    - відповідальна
    - вперта
    correct: 1
  - question: Мій брат багато працює, він ніколи не сидить без діла. Він _____.
    options:
    - працьовитий
    - тихий
    - серйозний
    - добрий
    correct: 0
- id: fill-in-adjective-agreement
  type: fill-in
  instruction: Оберіть правильне закінчення прикметника
  items:
  - sentence: Це мій _____ знайомий.
    answer: новий
    options:
    - новий
    - нова
    - нове
  - sentence: Моя двоюрідна сестра дуже _____.
    answer: висока
    options:
    - високий
    - висока
    - високе
  - sentence: Він має _____ волосся.
    answer: світле
    options:
    - світлий
    - світла
    - світле
  - sentence: Наш сусід — _____ чоловік.
    answer: серйозний
    options:
    - серйозний
    - серйозна
    - серйозне
  - sentence: Вона має _____ очі.
    answer: карі
    options:
    - карий
    - каре
    - карі
  - sentence: Ця студентка — дуже _____ дівчина.
    answer: працьовита
    options:
    - працьовитий
    - працьовита
    - працьовите
  - sentence: Мій найкращий друг дуже _____.
    answer: щирий
    options:
    - щирий
    - щира
    - щире
  - sentence: Моя тітка — _____ і чуйна людина.
    answer: добра
    options:
    - добрий
    - добра
    - добре
- id: group-sort-traits
  type: group-sort
  instruction: Розподіліть риси характеру
  groups:
  - label: Позитивні риси
    items:
    - щирий
    - привітний
    - працьовитий
    - терплячий
  - label: Складні або нейтральні риси
    items:
    - ледачий
    - впертий
    - серйозний
    - тихий
workbook:
- id: wb-true-false
  type: true-false
  instruction: Правда чи ні? (Прочитайте і вирішіть)
  items:
  - statement: Щира людина завжди каже правду.
    correct: true
    explanation: Щирий означає відкритий і чесний.
  - statement: Чуйна людина ніколи не допомагає іншим.
    correct: false
    explanation: Чуйний означає той, хто завжди допомагає і розуміє інших.
  - statement: Працьовитий студент ніколи не робить домашнє завдання.
    correct: false
    explanation: Працьовитий студент любить працювати і завжди робить завдання.
  - statement: Знайомий — це людина, з якою ви дуже близькі і давно дружите.
    correct: false
    explanation: Знайомий — це просто людина, яку ви знаєте, але ще не ваш друг.
  - statement: Терпляча людина може спокійно чекати.
    correct: true
    explanation: Бути терплячим — значить вміти чекати і не сердитися.
  - statement: Відповідальний працівник часто забуває про свої обіцянки.
    correct: false
    explanation: Відповідальні люди завжди роблять те, що обіцяють.
- id: wb-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні
  items:
  - sentence: Мій брат — дуже привітна чоловік.
    error: привітна
    correction: привітний
    error_type: word
    options:
    - привітний
    - привітне
    - привітні
    explanation: Чоловік — це чоловічий рід (masculine), тому 'привітний'.
  - sentence: Ця студентка завжди робить завдання, вона ледача.
    error: ледача
    correction: працьовита
    error_type: word
    options:
    - працьовита
    - чуйна
    - серйозна
    explanation: Якщо людина завжди працює, вона працьовита.
  - sentence: Моя тітка дуже високий.
    error: високий
    correction: висока
    error_type: word
    options:
    - висока
    - високе
    - високі
    explanation: Тітка — це жіночий рід (feminine), тому 'висока'.
  - sentence: Його дідусь має світлий волосся.
    error: світлий
    correction: світле
    error_type: word
    options:
    - світле
    - світла
    - світлі
    explanation: Волосся — це середній рід (neuter), тому 'світле'.
  - sentence: Мій сусіди завжди допомагають мені.
    error: Мій
    correction: Мої
    error_type: word
    options:
    - Мої
    - Моя
    - Моє
    explanation: Сусіди — це множина (plural), тому 'Мої'.
  - sentence: Вона має красиве очі.
    error: красиве
    correction: красиві
    error_type: word
    options:
    - красиві
    - красива
    - красивий
    explanation: Очі — це множина (plural), тому 'красиві'.
- id: wb-unjumble
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - довге
    - має
    - волосся.
    - Вона
    - темне
    correct_order:
    - Вона
    - має
    - довге
    - темне
    - волосся.
  - words:
    - сусід
    - Мій
    - чоловік.
    - дуже
    - —
    - серйозний
    correct_order:
    - Мій
    - сусід
    - —
    - дуже
    - серйозний
    - чоловік.
  - words:
    - карі
    - У
    - великі
    - нього
    - очі.
    correct_order:
    - У
    - нього
    - великі
    - карі
    - очі.
  - words:
    - щира
    - привітна
    - Вона
    - людина.
    - і
    correct_order:
    - Вона
    - щира
    - і
    - привітна
    - людина.
  - words:
    - брат
    - двоюрідний
    - Мій
    - наполегливий.
    - дуже
    correct_order:
    - Мій
    - двоюрідний
    - брат
    - дуже
    - наполегливий.
  - words:
    - завжди
    - нашим
    - довіряємо
    - друзям.
    - Ми
    correct_order:
    - Ми
    - завжди
    - довіряємо
    - нашим
    - друзям.
