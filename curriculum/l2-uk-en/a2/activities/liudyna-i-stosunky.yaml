version: '1.0'
module: liudyna-i-stosunky
level: a2
inline:
- id: match-character-traits
  type: match-up
  instruction: З'єднайте рису характеру з описом людини.
  pairs:
  - left: Він завжди багато працює і любить свою роботу.
    right: працьовитий
  - left: Вона завжди каже правду.
    right: щира
  - left: Він не любить працювати і уникає завдань.
    right: ледачий
  - left: Вона ніколи не здається і йде до своєї мети.
    right: наполеглива
  - left: Він завжди допомагає своїм друзям у біді.
    right: чуйний
  - left: Вона спокійно пояснює правила кілька разів і не нервує.
    right: терпляча
  - left: Він завжди каже «добрий ранок» і посміхається.
    right: привітний
  - left: Вона завжди все робить вчасно і правильно.
    right: відповідальна
- id: quiz-character-choice
  type: quiz
  instruction: Оберіть правильний прикметник для опису людини.
  items:
  - question: Він завжди допомагає людям, коли у них проблеми. Він дуже ___.
    options:
    - чуйний
    - ледачий
    - тихий
    - серйозний
    correct: 0
  - question: Вона цілий день дивиться телевізор і не хоче працювати. Вона ___.
    options:
    - наполеглива
    - ледача
    - відповідальна
    - щира
    correct: 1
  - question: Мій знайомий ніколи не обманює, він завжди ___.
    options:
    - високий
    - впертий
    - щирий
    - молодий
    correct: 2
  - question: Дідусь мало говорить і рідко жартує. Він ___ чоловік.
    options:
    - серйозний
    - привітний
    - веселий
    - чуйний
    correct: 0
  - question: Моя нова сусідка завжди вітається з усіма і радіє гостям. Вона дуже
      ___.
    options:
    - ледача
    - привітна
    - тиха
    - вперта
    correct: 1
  - question: Молодший син відмовляється слухати інших і робить тільки по-своєму.
      Він дуже ___.
    options:
    - працьовитий
    - чуйний
    - терплячий
    - впертий
    correct: 3
  - question: Студент довго вчить складні правила і не здається. Він ___.
    options:
    - наполегливий
    - тихий
    - ледачий
    - серйозний
    correct: 0
  - question: Колега завжди купує квитки заздалегідь і не спізнюється. Вона ___.
    options:
    - чуйна
    - висока
    - відповідальна
    - щира
    correct: 2
- id: fill-in-adjective-agreement
  type: fill-in
  instruction: Оберіть прикметник у правильній формі.
  items:
  - sentence: Мій новий сусід дуже ____.
    answer: привітний
    options:
    - привітний
    - привітна
    - привітне
    - привітні
  - sentence: Її найкраща подруга завжди ____.
    answer: щира
    options:
    - щирий
    - щира
    - щире
    - щирі
  - sentence: Його дідусь має ____ волосся.
    answer: сиве
    options:
    - сивий
    - сива
    - сиве
    - сиві
  - sentence: У моєї сестри великі ____ очі.
    answer: карі
    options:
    - карий
    - кара
    - каре
    - карі
  - sentence: Мій двоюрідний брат дуже ____.
    answer: високий
    options:
    - високий
    - висока
    - високе
    - високі
  - sentence: Наша керівниця справедлива, але іноді дуже ____.
    answer: серйозна
    options:
    - серйозний
    - серйозна
    - серйозне
    - серйозні
  - sentence: У цього хлопця ____ обличчя.
    answer: кругле
    options:
    - круглий
    - кругла
    - кругле
    - круглі
  - sentence: Вони дуже ____ і приємні люди.
    answer: відповідальні
    options:
    - відповідальний
    - відповідальна
    - відповідальне
    - відповідальні
- id: group-sort-traits
  type: group-sort
  instruction: Розподіліть риси характеру за категоріями.
  groups:
  - label: Позитивні риси (Positive traits)
    items:
    - щирий
    - працьовитий
    - чуйний
    - привітний
    - терплячий
    - відповідальний
  - label: Складні риси (Challenging traits)
    items:
    - ледачий
    - впертий
workbook:
- id: error-correction-gender
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні.
  items:
  - sentence: Моя сусідка дуже привітний людина.
    error: привітний
    correction: привітна
    error_type: word
    options:
    - привітна
    - привітне
    - привітні
    explanation: Слово «людина» (person) жіночого роду (feminine), тому прикметник
      має закінчення -а.
  - sentence: У нього темний волосся.
    error: темний
    correction: темне
    error_type: word
    options:
    - темне
    - темна
    - темні
    explanation: Слово «волосся» (hair) середнього роду (neuter), тому прикметник
      має закінчення -е.
  - sentence: Її чоловік має зелене очі.
    error: зелене
    correction: зелені
    error_type: word
    options:
    - зелені
    - зелена
    - зелений
    explanation: Слово «очі» (eyes) у множині (plural), тому прикметник має закінчення
      -і.
  - sentence: Вона дуже красивий дівчина.
    error: красивий
    correction: красива
    error_type: word
    options:
    - красива
    - красиве
    - красиві
    explanation: Слово «дівчина» (girl) жіночого роду (feminine), тому прикметник
      має закінчення -а.
  - sentence: Наш дядько дуже працьовита.
    error: працьовита
    correction: працьовитий
    error_type: word
    options:
    - працьовитий
    - працьовиті
    - працьовите
    explanation: Слово «дядько» (uncle) чоловічого роду (masculine), тому прикметник
      має закінчення -ий.
  - sentence: Моя брат дуже високий.
    error: Моя
    correction: Мій
    error_type: word
    options:
    - Мій
    - Моє
    - Мої
    explanation: Слово «брат» (brother) чоловічого роду (masculine), тому займенник
      має форму «мій».
- id: true-false-character
  type: true-false
  instruction: Правда чи ні? Прочитайте твердження про зовнішність та характер.
  items:
  - statement: Слово «зовнішність» описує, як людина виглядає.
    correct: true
    explanation: Зовнішність (appearance) включає обличчя, фігуру, зріст і волосся.
  - statement: Слово «красивий» ми використовуємо, коли говоримо про характер людини.
    correct: false
    explanation: Слово «красивий» використовується для зовнішності. Для характеру
      кажуть «гарна людина».
  - statement: Сусід — це людина, з якою ви працюєте в офісі.
    correct: false
    explanation: Сусід — це людина, яка живе поруч із вами. Людина на роботі — це
      колега.
  - statement: Щира людина завжди каже правду і нічого не приховує від друзів.
    correct: true
    explanation: Щирий означає sincere, genuine.
  - statement: Людина, яка не любить працювати, — це працьовита людина.
    correct: false
    explanation: Людина, яка не любить працювати, — ледача.
  - statement: «Сиве волосся» зазвичай буває у старших людей.
    correct: true
    explanation: Сиве волосся (grey hair) часто з'являється з віком.
