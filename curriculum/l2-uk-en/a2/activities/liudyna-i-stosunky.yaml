- type: true-false
  instruction: Правда чи ні? Оцініть твердження про риси характеру
  items:
  - statement: Щира людина часто бреше.
    correct: false
    explanation: Щира людина завжди говорить правду.
  - statement: Ледачий хлопець любить багато працювати.
    correct: false
    explanation: Ледачий зовсім не любить працювати.
  - statement: Чуйна людина завжди допомагає іншим.
    correct: true
    explanation: Чуйні люди люблять допомагати і підтримувати.
  - statement: Терплячий колега швидко злиться.
    correct: false
    explanation: Терплячий може довго чекати і не злитися.
  - statement: Працьовитий чоловік має багато роботи.
    correct: true
    explanation: Працьовитий дуже любить працювати.
  - statement: Відповідальна дівчина не забуває про завдання.
    correct: true
    explanation: Відповідальні люди завжди виконують свої обов'язки.
  - statement: Привітний сусід ніколи не вітається.
    correct: false
    explanation: Привітний сусід завжди радий бачити людей і вітатися.
  - statement: Вперта людина швидко змінює свою думку.
    correct: false
    explanation: Вперта людина робить те, що хоче, і не змінює думку.
