version: '1.0'
module: liudyna-i-stosunky
level: a2
inline:
- id: fill-in
  type: fill-in
  instruction: Вставте правильну форму прикметника, щоб описати зовнішність людини
    (узгодження за родом).
  items:
  - sentence: Це моя сестра. Вона ____.
    answer: висока
    options:
    - високий
    - висока
    - високе
  - sentence: Це мій брат. Він ____.
    answer: темноволосий
    options:
    - темноволосий
    - темноволоса
    - темноволосе
  - sentence: Це мій дідусь. Він ____.
    answer: старий
    options:
    - старий
    - стара
    - старе
  - sentence: Ця жінка ____.
    answer: повна
    options:
    - повний
    - повна
    - повне
  - sentence: Цей чоловік ____.
    answer: молодий
    options:
    - молодий
    - молода
    - молоде
  - sentence: Ця дівчинка ____.
    answer: кароока
    options:
    - кароокий
    - кароока
    - карооке
  - sentence: Цей хлопчик ____.
    answer: низький
    options:
    - низький
    - низька
    - низьке
  - sentence: Моя подруга ____.
    answer: худа
    options:
    - худий
    - худа
    - худе
- id: match-up
  type: match-up
  instruction: З'єднайте опис людини з відповідною рисою характеру.
  pairs:
  - left: Він багато працює і не любить відпочивати.
    right: працьовитий
  - left: Вона завжди каже правду.
    right: щира
  - left: Він часто допомагає людям і підтримує їх.
    right: чуйний
  - left: Вона ніколи не поспішає і вміє чекати.
    right: терпляча
  - left: Він швидко вчиться і багато знає.
    right: розумний
  - left: Вона завжди вітається і посміхається.
    right: привітна
  - left: Він не хоче працювати і любить довго спати.
    right: ледачий
  - left: Вона не любить змінювати свою думку.
    right: вперта
- id: group-sort
  type: group-sort
  instruction: Розподіліть риси характеру на позитивні та складні.
  groups:
  - label: Позитивні риси
    items:
    - щирий
    - працьовитий
    - терплячий
    - привітний
    - чуйний
    - відповідальний
  - label: Складні риси
    items:
    - сумний
    - ледачий
    - впертий
    - серйозний
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант, щоб доповнити опис людини або стосунків.
  items:
  - question: Це людина, яка живе поруч зі мною у будинку. Хто це?
    options:
    - сусід
    - колега
    - брат
    - дядько
    correct: 0
  - question: Ми працюємо разом в одному офісі. Вона моя ___.
    options:
    - подруга
    - колега
    - сусідка
    - тітка
    correct: 1
  - question: Мій батько, моя мати, бабуся і дідусь — це мої ___.
    options:
    - друзі
    - знайомі
    - родичі
    - колеги
    correct: 2
  - question: Людина, яку я знаю, але ми не є близькими друзями. Хто це?
    options:
    - друг
    - товариш
    - знайомий
    - дідусь
    correct: 2
  - question: Цей чоловік завжди всім допомагає і підтримує. Він дуже ___.
    options:
    - ледачий
    - сумний
    - чуйний
    - впертий
    correct: 2
  - question: Моя сестра ніколи не обманює і завжди говорить те, що думає. Яка вона?
    options:
    - щира
    - серйозна
    - ледача
    - тиха
    correct: 0
  - question: Ця дитина має ___ очі.
    options:
    - блакитні
    - блакитний
    - блакитна
    - блакитне
    correct: 0
  - question: У нього ___ волосся.
    options:
    - темні
    - темний
    - темна
    - темне
    correct: 3
workbook:
- id: workbook-true-false
  type: true-false
  instruction: Правда чи ні? Прочитайте твердження і визначте, чи воно правильне.
  items:
  - statement: Друг — це людина, яку я знаю дуже добре, і ми близькі.
    correct: true
    explanation: Так, друг — це близька і довірена людина.
  - statement: Знайомий — це ваш дуже близький родич.
    correct: false
    explanation: Ні, знайомий — це людина, яку ви знаєте, але не обов'язково близька.
  - statement: Якщо людина багато і сумлінно працює, вона працьовита.
    correct: true
    explanation: Так, працьовита людина любить працювати.
  - statement: Слово 'зовнішність' означає, який у людини внутрішній світ і характер.
    correct: false
    explanation: Ні, зовнішність — це те, як людина виглядає фізично.
  - statement: Сусід — це людина, яка живе поруч із вами.
    correct: true
    explanation: Так, сусід живе в сусідньому будинку або квартирі.
  - statement: Щира людина завжди намагається вас обдурити.
    correct: false
    explanation: Ні, щира людина чесна і каже правду.
  - statement: Колега — це людина, з якою ви працюєте разом.
    correct: true
    explanation: Так, колеги — це працівники однієї компанії.
  - statement: Ледача людина завжди першою починає робити складну роботу.
    correct: false
    explanation: Ні, ледача людина не любить працювати.
- id: workbook-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні або граматиці.
  items:
  - sentence: Це моя нова колега. Вона дуже привітний.
    error: привітний
    correction: привітна
    error_type: word
    options:
    - привітна
    - привітне
    - привітні
    explanation: Колега (жінка) — це жіночий рід, тому прикметник має закінчуватися
      на -а (привітна).
  - sentence: Мій дідусь старий, але дуже активна.
    error: активна
    correction: активний
    error_type: word
    options:
    - активний
    - активне
    - активні
    explanation: Дідусь — це чоловічий рід, тому прикметник має бути чоловічого роду
      (активний).
  - sentence: Це висока дівчина з карими очі.
    error: очі
    correction: очима
    error_type: word
    options:
    - очами
    - очима
    - очей
    explanation: 'Після прийменника ''з'' (зі) використовується орудний відмінок:
      з карими очима.'
  - sentence: Вона має світлим волосся.
    error: світлим
    correction: світле
    error_type: word
    options:
    - світлий
    - світла
    - світле
    explanation: 'Після дієслова ''мати'' використовується знахідний відмінок без
      прийменника: має світле волосся.'
  - sentence: Він дуже ледача хлопець і не хоче вчитися.
    error: ледача
    correction: ледачий
    error_type: word
    options:
    - ледачий
    - ледаче
    - ледачі
    explanation: Хлопець — це чоловічий рід, тому прикметник має бути чоловічого роду
      (ледачий).
  - sentence: Я бачу чоловіка зі темне волоссям.
    error: темне
    correction: темним
    error_type: word
    options:
    - темний
    - темним
    - темною
    explanation: 'В орудному відмінку прикметник чоловічого і середнього роду має
      закінчення -им: зі темним волоссям.'
- id: workbook-unjumble
  type: unjumble
  instruction: Складіть правильне речення зі слів. Зверніть увагу на порядок слів.
  items:
  - words:
    - високий.
    - Цей
    - дуже
    - чоловік
    correct_order:
    - Цей
    - чоловік
    - дуже
    - високий.
  - words:
    - очі.
    - подруга
    - має
    - карі
    - Моя
    correct_order:
    - Моя
    - подруга
    - має
    - карі
    - очі.
  - words:
    - дуже
    - Він
    - працьовитий.
    - розумний
    - і
    correct_order:
    - Він
    - дуже
    - розумний
    - і
    - працьовитий.
  - words:
    - десять
    - років.
    - дружимо
    - вже
    - Ми
    correct_order:
    - Ми
    - дружимо
    - вже
    - десять
    - років.
  - words:
    - і
    - дуже
    - дівчина
    - щира.
    - Ця
    - привітна
    correct_order:
    - Ця
    - дівчина
    - дуже
    - привітна
    - і
    - щира.
  - words:
    - друзям.
    - своїм
    - Він
    - завжди
    - допомагає
    correct_order:
    - Він
    - завжди
    - допомагає
    - своїм
    - друзям.
- id: workbook-translate
  type: translate
  instruction: Оберіть правильний переклад речення українською мовою.
  items:
  - source: She is a very cheerful person.
    options:
    - text: Вона дуже весела людина.
      correct: true
    - text: Вона дуже сумна людина.
      correct: false
    - text: Вона дуже ледача людина.
      correct: false
    - text: Вона дуже серйозна людина.
      correct: false
  - source: He has blue eyes.
    options:
    - text: Він має блакитні очі.
      correct: true
    - text: Він має карі очі.
      correct: false
    - text: Він має світле волосся.
      correct: false
    - text: Він має темне волосся.
      correct: false
  - source: My neighbor is a hardworking man.
    options:
    - text: Мій сусід — працьовитий чоловік.
      correct: true
    - text: Мій сусід — ледачий чоловік.
      correct: false
    - text: Мій знайомий — працьовитий чоловік.
      correct: false
    - text: Мій сусід — серйозний чоловік.
      correct: false
  - source: This is my best friend.
    options:
    - text: Це мій найкращий друг.
      correct: true
    - text: Це мій новий знайомий.
      correct: false
    - text: Це мій близький родич.
      correct: false
    - text: Це мій добрий товариш.
      correct: false
  - source: They often help us.
    options:
    - text: Вони часто нам допомагають.
      correct: true
    - text: Вони рідко нам допомагають.
      correct: false
    - text: Вони часто нас поважають.
      correct: false
    - text: Вони часто нас розуміють.
      correct: false
  - source: We met at the university.
    options:
    - text: Ми познайомилися в університеті.
      correct: true
    - text: Ми працюємо в університеті.
      correct: false
    - text: Ми зустрілися в університеті.
      correct: false
    - text: Ми дружимо в університеті.
      correct: false
- id: workbook-quiz-aspect
  type: quiz
  instruction: 'Оберіть правильне дієслово: недоконаний вид (регулярна дія) чи доконаний
    вид (конкретна дія в минулому).'
  items:
  - question: Мій колега дуже працьовитий. Він завжди ___ багато.
    options:
    - працює
    - попрацював
    - працюватиме
    - працював
    correct: 0
  - question: Моя сусідка чуйна. Учора вона ___ мені з важкою валізою.
    options:
    - допомагала
    - допомогла
    - допомагає
    - допомагатиме
    correct: 1
  - question: Наш керівник дуже відповідальний. Він завжди ___ роботу вчасно.
    options:
    - робить
    - зробив
    - зробити
    - робив
    correct: 0
  - question: Ця жінка привітна. Вона щодня ___ зі всіма колегами.
    options:
    - вітала
    - привіталася
    - вітається
    - привітати
    correct: 2
  - question: Він завжди був дуже щирим. Учора він ___ мені всю правду про цей проєкт.
    options:
    - казав
    - скаже
    - каже
    - сказав
    correct: 3
  - question: Вона дуже розумна. На минулому тижні вона швидко ___ цю складну проблему.
    options:
    - вирішує
    - вирішила
    - вирішувала
    - вирішуватиме
    correct: 1
  - question: Він завжди ___ людям, тому всі вважають його доброю людиною.
    options:
    - допомагає
    - допоміг
    - допоможе
    - допомогти
    correct: 0
  - question: Оксана сьогодні вранці швидко ___ всю роботу, вона дуже працьовита.
    options:
    - робила
    - зробила
    - робить
    - робитиме
    correct: 1
- id: workbook-order
  type: order
  instruction: Розставте репліки діалогу в правильному порядку.
  items:
  - — Це мій дядько. Він живе поруч.
  - — Який він?
  - — Він мій найкращий друг. Він мене поважає і завжди слухає.
  - — А хто це на фотографії?
  correct_order:
  - 3
  - 0
  - 1
  - 2
