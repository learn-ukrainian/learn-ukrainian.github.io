- id: translate-descriptions
  type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: He is a very hardworking person.
    options:
    - text: Він дуже працьовитий чоловік.
      correct: false
    - text: Він дуже працьовита людина.
      correct: true
    - text: Він дуже працьовитий людина.
      correct: false
  - source: My neighbor has a straight nose and round face.
    options:
    - text: Мій сусід має прямий ніс і кругле обличчя.
      correct: true
    - text: Мій сусід має пряме ніс і круглий обличчя.
      correct: false
    - text: Мій сусід має круглий ніс і пряме обличчя.
      correct: false
  - source: She is blue-eyed, just like my father.
    options:
    - text: Вона кароока, як мій батько.
      correct: false
    - text: Вона блакитноока, як і мій батько.
      correct: true
    - text: Вона зеленоока, як мій батько.
      correct: false
  - source: I trust my friend because he is sincere.
    options:
    - text: Я довіряю своєму другові, тому що він щирий.
      correct: true
    - text: Я допомагаю своєму другові, тому що він щирий.
      correct: false
    - text: Я довіряю своєму другові, тому що він ледачий.
      correct: false
  - source: For true friends, appearance does not have a great meaning.
    options:
    - text: Для знайомих зовнішність має велике значення.
      correct: false
    - text: Для справжніх друзів характер не має значення.
      correct: false
    - text: Для справжніх друзів зовнішність не має великого значення.
      correct: true
  - source: My cousin is a determined student.
    options:
    - text: Мій двоюрідний брат — наполегливий студент.
      correct: true
    - text: Мій двоюрідний брат — тихий студент.
      correct: false
    - text: Мій двоюрідний брат — вперта людина.
      correct: false
