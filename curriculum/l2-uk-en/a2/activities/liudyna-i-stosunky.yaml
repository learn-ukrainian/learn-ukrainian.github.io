inline:
- id: fill-in-complete-sentences-describing-people-with-the-correct-adjective-form-agreement-for-gender
  type: fill-in
  instruction: Вставте правильну форму прикметника
  items:
  - sentence: Мій новий сусід — дуже ____ чоловік.
    answer: високий
    options:
    - високий
    - висока
    - високе
  - sentence: Її сестра — ____ дівчина з карими очима.
    answer: світловолоса
    options:
    - світловолоса
    - світловолосий
    - світловолосе
  - sentence: Цей хлопчик ще дуже ____.
    answer: молодий
    options:
    - молодий
    - молода
    - молоде
  - sentence: Моя бабуся — дуже ____ жінка.
    answer: терпляча
    options:
    - терпляча
    - терплячий
    - терпляче
  - sentence: У неї кругле обличчя і ____ волосся.
    answer: темне
    options:
    - темне
    - темний
    - темна
  - sentence: Наш керівник — серйозна ____.
    answer: людина
    options:
    - людина
    - люди
    - людину
  - sentence: Це дуже ____ хлопець.
    answer: худий
    options:
    - худий
    - худа
    - худе
  - sentence: Моя подруга — ____ дівчина.
    answer: синьоока
    options:
    - синьоока
    - синьоокий
    - синьооке
- id: group-sort-traits
  type: group-sort
  instruction: Розподіліть риси характеру за категоріями
  groups:
  - label: Позитивні риси
    items:
    - привітний
    - щирий
    - працьовитий
    - терплячий
    - чуйний
    - відповідальний
  - label: Складні риси
    items:
    - ледачий
    - впертий
    - сумний
    - серйозний
    - суворий
- id: match-up-definitions
  type: match-up
  instruction: З'єднайте рису характеру з її описом
  pairs:
  - left: працьовитий
    right: завжди багато працює
  - left: щирий
    right: завжди говорить правду
  - left: ледачий
    right: не хоче працювати
  - left: привітний
    right: приємно спілкується з людьми
  - left: розумний
    right: багато знає і знаходить рішення
  - left: терплячий
    right: може довго чекати і не злитися
  - left: впертий
    right: робить тільки те, що хоче
  - left: чуйний
    right: любить допомагати іншим
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть правильне дієслово за контекстом (доконаний чи недоконаний
    вид)
  items:
  - question: Мій колега щирий, він ніколи не ____.
    options:
    - бреше
    - збрехав
    - збреше
    - брехатиме
    correct: 0
  - question: Сусід дуже хороший, учора він ____ мені з валізою.
    options:
    - допомагав
    - допоміг
    - допомагає
    - допоможе
    correct: 1
  - question: Вона завжди ____ новим працівникам.
    options:
    - підказує
    - підказала
    - підкаже
    - підказувала
    correct: 0
  - question: Яка розумна людина! Вона швидко ____ мені рішення вчора.
    options:
    - знаходить
    - знайшла
    - знаходитиме
    - знаходив
    correct: 1
  - question: Наш керівник відповідальний, він ____ багато кожного дня.
    options:
    - працював
    - попрацював
    - працює
    - попрацює
    correct: 2
  - question: Цей хлопець дуже привітний, він постійно приємно ____ зі мною.
    options:
    - спілкувався
    - поспілкувався
    - спілкується
    - спілкуватиметься
    correct: 2
  - question: Мій друг дуже чуйний, він завжди ____ іншим.
    options:
    - допоможе
    - допомагав
    - допомагає
    - допоміг
    correct: 2
  - question: Вона дуже розумна, бо вчора ____ правильне рішення.
    options:
    - знаходила
    - знайшла
    - знаходить
    - знайде
    correct: 1
- id: fill-in-sentence-completion-with-adjectives
  type: fill-in
  instruction: Доповніть речення прикметниками, що описують людину
  items:
  - sentence: Мій сусід завжди допомагає, він дуже ____ чоловік.
    answer: чуйний
    options:
    - чуйний
    - ледачий
    - сумний
  - sentence: Вона ніколи не бреше, вона дуже ____ дівчина.
    answer: щира
    options:
    - щира
    - вперта
    - худа
  - sentence: Мій керівник дуже багато працює, він ____.
    answer: працьовитий
    options:
    - працьовитий
    - тихий
    - високий
  - sentence: Наша знайома приємно спілкується, вона дуже ____.
    answer: привітна
    options:
    - привітна
    - стара
    - низька
  - sentence: Брат не злиться, коли довго чекає, він дуже ____.
    answer: терплячий
    options:
    - терплячий
    - серйозний
    - кароокий
  - sentence: Дідусь ніколи не забуває про роботу, він дуже ____.
    answer: відповідальний
    options:
    - відповідальний
    - молодий
    - темноволосий
  - sentence: Мій дядько завжди сміється, він такий ____.
    answer: веселий
    options:
    - веселий
    - сумний
    - високий
  - sentence: Цей хлопець робить тільки те, що хоче — він такий ____.
    answer: впертий
    options:
    - впертий
    - чуйний
    - розумний
workbook:
- type: error-correction
  instruction: Знайдіть і виправте помилку в описі зовнішності та характеру
  items:
  - sentence: Моя сестра дуже високий.
    error: високий
    correction: висока
    error_type: word
    options:
    - висока
    - високе
    - високі
    explanation: Сестра — це жіночий рід.
  - sentence: Він має синіми очима.
    error: синіми очима
    correction: сині очі
    error_type: phrase
    options:
    - сині очі
    - синіми очами
    - синіх очей
    explanation: Після дієслова «мати» використовуємо знахідний відмінок.
  - sentence: Вона дівчина з темне волосся.
    error: темне волосся
    correction: темним волоссям
    error_type: phrase
    options:
    - темним волоссям
    - темне волоссю
    - темного волосся
    explanation: Після прийменника «з» використовуємо орудний відмінок.
  - sentence: Мій сусід дуже привітна.
    error: привітна
    correction: привітний
    error_type: word
    options:
    - привітний
    - привітне
    - привітні
    explanation: Сусід — це чоловічий рід.
  - sentence: Брат завжди допомагає, він дуже сумна людина.
    error: сумна
    correction: чуйна
    error_type: word
    options:
    - чуйна
    - ледача
    - серйозна
    explanation: Якщо людина завжди допомагає, вона чуйна, а не сумна.
  - sentence: Ця жінка — мій найкращий друг.
    error: найкращий друг
    correction: найкраща подруга
    error_type: phrase
    options:
    - найкраща подруга
    - найкраще подруга
    - найкращі подруги
    explanation: Для жінки ми використовуємо слово «подруга».
  - sentence: Мій дідусь ще молода.
    error: молода
    correction: молодий
    error_type: word
    options:
    - молодий
    - молоді
    - молоде
    explanation: Дідусь — це чоловічий рід.
  - sentence: Дядько дуже веселий, вона завжди жартує.
    error: вона
    correction: він
    error_type: word
    options:
    - він
    - воно
    - вони
    explanation: Дядько — це чоловік, тому займенник «він».
