version: '1.0'
module: purpose-clauses
level: a2
inline:
- id: fill-in-schob-forms
  type: fill-in
  instruction: Вставте правильну форму дієслова після «щоб»
  items:
  - sentence: Я йду в магазин, щоб ____ хліб.
    answer: купити
    options:
    - купити
    - купив
    - купила
  - sentence: Мама хоче, щоб я ____ кімнату.
    answer: прибрав
    options:
    - прибрав
    - прибрати
    - прибере
  - sentence: Ми вчимо українську, щоб ____ друзів.
    answer: розуміти
    options:
    - розуміти
    - розуміли
    - розуміє
  - sentence: Директор просить, щоб ми ____ раніше.
    answer: прийшли
    options:
    - прийшли
    - прийти
    - прийдемо
  - sentence: Він п'є воду, щоб не ____ пити.
    answer: хотіти
    options:
    - хотіти
    - хотів
    - хоче
  - sentence: Вчитель пояснює, щоб учні все ____.
    answer: зрозуміли
    options:
    - зрозуміли
    - зрозуміти
    - зрозуміють
  - sentence: Я залишив гроші, щоб ти ____ молоко.
    answer: купив
    options:
    - купив
    - купити
    - купиш
  - sentence: Вона читає, щоб ____ нові слова.
    answer: знати
    options:
    - знати
    - знала
    - знає
- id: quiz-tomuscho-vs-schob
  type: quiz
  instruction: 'Оберіть правильний сполучник: тому що або щоб'
  items:
  - question: Він п'є воду, ____ хоче пити.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 0
  - question: Ми йдемо в магазин, ____ купити хліб.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 1
  - question: Я зателефонував, ____ дізнатися новини.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 1
  - question: Вона запізнилася, ____ були великі затори.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 0
  - question: Тато дав гроші, ____ я купив квитки.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 1
  - question: Ми залишилися вдома, ____ йшов сильний дощ.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 0
  - question: Я написав повідомлення, ____ ти не хвилювалася.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 1
  - question: Брат не пішов на роботу, ____ він хворий.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 0
- id: match-up-reported-speech
  type: match-up
  instruction: З'єднайте пряму мову та непряму мову
  pairs:
  - left: «Я прийду завтра»
    right: Він сказав, що прийде завтра.
  - left: «Де мій телефон?»
    right: Вона запитала, де її телефон.
  - left: «Ти будеш вдома?»
    right: Він запитав, чи я буду вдома.
  - left: «Купи молоко!»
    right: Мама сказала, щоб я купив молоко.
  - left: «Ми хочемо їсти»
    right: Вони сказали, що хочуть їсти.
  - left: «Я дуже зайнятий»
    right: Брат відповів, що він дуже зайнятий.
  - left: «Прийдіть раніше!»
    right: Директор попросив, щоб ми прийшли раніше.
  - left: «Чому ти запізнився?»
    right: Вчитель запитав, чому я запізнився.
- id: quiz-choose-between-and-to-complete-sentences
