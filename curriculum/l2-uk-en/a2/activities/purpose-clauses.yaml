    - що
    - чи
    correct: 0
- id: match-up-transform-direct-speech-into-reported-speech-match-the-original-quote-to-its-indirect-version
  type: match-up
  instruction: З'єднайте пряму мову з непрямою
  pairs:
  - left: Я прийду завтра на роботу.
    right: Він сказав, що прийде завтра на роботу.
  - left: Ми тут у ресторані.
    right: Вони сказали, що вони тут у ресторані.
  - left: Я дуже хочу їсти.
    right: Вона сказала, що дуже хоче їсти.
  - left: Ти будеш пити каву?
    right: Він запитав, чи я буду пити каву.
  - left: Ви знаєте це гарне місто?
    right: Вона запитала, чи ми знаємо це гарне місто.
  - left: Прийди сьогодні.
    right: Він сказав, щоб я прийшов сьогодні.
  - left: Купи молоко.
    right: Вона сказала, щоб я купив молоко.
  - left: Я маю вільний час.
    right: Вона сказала, що має вільний час.
