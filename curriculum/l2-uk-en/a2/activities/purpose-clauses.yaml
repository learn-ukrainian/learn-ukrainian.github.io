workbook:
- type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я хочу, щоб ти читаєш книгу.
    error: читаєш
    correction: читав
    error_type: word
    options:
    - читав
    - читати
    - читає
    explanation: Після «щоб» ми використовуємо дієслово у формі минулого часу.
  - sentence: Він сказав, щоб я прийду додому.
    error: прийду
    correction: прийшов
    error_type: word
    options:
    - прийшов
    - прийти
    - прийдеш
    explanation: Для наказів і прохань після «щоб» використовується минулий час.
  - sentence: Вона хоче, щоб ми приходимо в гості.
    error: приходимо
    correction: прийшли
    error_type: word
    options:
    - прийшли
    - прийти
    - приходять
    explanation: Конструкція «хочу, щоб» вимагає дієслова в минулому часі.
  - sentence: Я зателефонував, щоб ти знаєш про зустріч.
    error: знаєш
    correction: знала
    error_type: word
    options:
    - знала
    - знати
    - знає
    explanation: Суб'єкти різні, тому після «щоб» потрібен минулий час.
  - sentence: Вчитель пояснив правило, щоб учні розуміють його.
    error: розуміють
    correction: зрозуміли
    error_type: word
    options:
    - зрозуміли
    - зрозуміти
    - розуміє
    explanation: Мета для когось іншого передається через «щоб» + минулий час.
  - sentence: Директор хоче, щоб ви робите цей проєкт.
    error: робите
    correction: зробили
    error_type: word
    options:
    - зробили
    - зробити
    - роблять
    explanation: Після конструкції «хочу, щоб» ніколи не буває теперішнього або майбутнього
      часу.
- type: group-sort
  instruction: Факт чи прохання/наказ? Розподіліть речення
  groups:
  - label: Факт (що)
    items:
    - Мама сказала, що вона купила хліб.
    - Колега написав, що ми маємо зустріч.
    - Лікар сказав, що я п'ю мало води.
    - Він пояснив, що це нове правило.
  - label: Прохання або наказ (щоб)
    items:
    - Мама сказала, щоб я купив хліб.
    - Колега написав, щоб я підготував документи.
    - Лікар сказав, щоб я пив більше води.
    - Він попросив, щоб я передав повідомлення.
- type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: He asked if I have free time.
    options:
    - text: Він запитав, чи я маю вільний час.
      correct: true
    - text: Він запитав, що я маю вільний час.
      correct: false
    - text: Він запитав, щоб я мав вільний час.
      correct: false
    - text: Він запитав, тому що я маю вільний час.
      correct: false
  - source: She explained that she could not come.
    options:
    - text: Вона пояснила, що не може прийти.
      correct: true
    - text: Вона пояснила, щоб не може прийти.
      correct: false
    - text: Вона пояснила, чи не може прийти.
      correct: false
    - text: Вона пояснила, бо не може прийти.
      correct: false
  - source: They said to buy milk.
    options:
    - text: Вони сказали, щоб я купив молоко.
      correct: true
    - text: Вони сказали, що я купив молоко.
      correct: false
    - text: Вони сказали, чи я купив молоко.
      correct: false
    - text: Вони сказали, купити молоко.
      correct: false
  - source: I want you to do your homework.
    options:
    - text: Я хочу, щоб ти зробив домашнє завдання.
      correct: true
    - text: Я хочу тебе зробити домашнє завдання.
      correct: false
    - text: Я хочу, що ти зробиш домашнє завдання.
      correct: false
    - text: Я хочу, чи ти зробив домашнє завдання.
      correct: false
  - source: We went to Kyiv to see the city.
    options:
    - text: Ми поїхали в Київ, щоб побачити місто.
      correct: true
    - text: Ми поїхали в Київ, що побачити місто.
      correct: false
    - text: Ми поїхали в Київ, бо побачили місто.
      correct: false
    - text: Ми поїхали в Київ, щоб побачили місто.
      correct: false
  - source: I read the news in order to know the situation.
    options:
    - text: Я читаю новини, щоб знати ситуацію.
      correct: true
    - text: Я читаю новини, щоб знав ситуацію.
      correct: false
    - text: Я читаю новини, що знати ситуацію.
      correct: false
    - text: Я читаю новини, чи знати ситуацію.
      correct: false
