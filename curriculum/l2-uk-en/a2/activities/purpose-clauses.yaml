  - source: They asked when we will be free.
    options:
    - text: Вони запитали, коли ми будемо вільні.
      correct: true
    - text: Вони запитали, чи коли ми будемо вільні.
      correct: false
    - text: Вони запитали, що коли ми будемо вільні.
      correct: false
  - source: The teacher explained that this is an exception.
    options:
    - text: Вчитель пояснив, що це виняток.
      correct: true
    - text: Вчитель пояснив, щоб це виняток.
      correct: false
    - text: Вчитель пояснив, чи це виняток.
      correct: false
  - source: He called so that she would know the news.
    options:
    - text: Він зателефонував, щоб вона знала новини.
      correct: true
    - text: Він зателефонував, щоб вона знати новини.
      correct: false
    - text: Він зателефонував, що вона знала новини.
      correct: false
  - source: I read texts because I want to know new words.
    options:
    - text: Я читаю тексти, бо хочу знати нові слова.
      correct: true
    - text: Я читаю тексти, щоб хочу знати нові слова.
      correct: false
    - text: Я читаю тексти, чи хочу знати нові слова.
      correct: false
- id: workbook-true-false-rules
  type: true-false
  instruction: Чи правильні ці твердження про граматику?
  items:
  - statement: 'Після «щоб», якщо підмет однаковий, ми використовуємо інфінітив (наприклад:
      Я йду, щоб купити).'
    correct: true
    explanation: Правильно. Якщо дію виконує та сама особа, використовується інфінітив.
  - statement: В українській мові можна сказати «Я хочу тебе прийти» (I want you to
      come).
    correct: false
    explanation: 'Ні, це калька з англійської. Правильно: «Я хочу, щоб ти прийшов».'
  - statement: Для передачі закритого питання (так/ні) в непрямій мові ми використовуємо
      слово «чи».
    correct: true
    explanation: Так, «чи» працює як англійське if/whether.
  - statement: Слово «щоб» відповідає на питання «чому?» і вказує на причину.
    correct: false
    explanation: Слово «щоб» відповідає на питання «для чого?» або «навіщо?» і вказує
      на мету.
  - statement: Якщо в реченні інший підмет, після «щоб» дієслово стоїть у формі минулого
      часу.
    correct: true
    explanation: 'Так, це спеціальна конструкція (наприклад: Я хочу, щоб ти знав).'
  - statement: Речення непрямої мови з питанням завжди закінчуються знаком питання
      (?).
    correct: false
    explanation: Непряме питання — це розповідне речення, тому воно закінчується крапкою.
  - statement: Для передачі наказу або прохання в непрямій мові використовується сполучник
      «щоб».
    correct: true
    explanation: 'Так, наприклад: «Мама сказала, щоб я прибрав».'
  - statement: Для прямої констатації факту ми також використовуємо «щоб».
    correct: false
    explanation: 'Для фактів ми використовуємо «що», наприклад: «Він сказав, що купив
      хліб».'
- id: workbook-odd-one-out
  type: odd-one-out
  instruction: Оберіть зайве слово або речення, яке не підходить за граматикою чи
    змістом
  items:
  - words:
    - що
    - чи
    - де
    - тому що
    correct: 3
    explanation: «Тому що» — це сполучник причини, а решта використовуються для передачі
      непрямої мови (факт, питання).
  - words:
    - щоб купити
    - щоб знати
    - щоб мати
    - щоб купив
    correct: 3
    explanation: «щоб купив» — це конструкція для іншого підмета (минулий час), решта
      — інфінітиви для одного підмета.
  - words:
    - запитати
    - відповісти
    - пояснити
    - бігати
    correct: 3
    explanation: «Бігати» — дієслово руху, а решта — дієслова спілкування, які використовуються
      для непрямої мови.
  - words:
    - Він хоче, щоб я прийшов.
    - Мама просить, щоб ти допоміг.
    - Я йду, щоб купити хліб.
    - Директор наказав, щоб ми здали звіт.
    correct: 2
    explanation: Третє речення має один підмет (Я йду, щоб купити), решта мають різні
      підмети в головній та підрядній частинах.
  - words:
    - Вона сказала, що прийде.
    - Він відповів, що зайнятий.
    - Брат додав, що буде пізно.
    - Я запитав, чи він вдома.
    correct: 3
    explanation: Останнє речення — це непряме питання (чи), решта — непрямі розповідні
      речення (що).
  - words:
    - мета
    - повідомлення
    - пряма мова
    - стіл
    correct: 3
    explanation: «Стіл» — це меблі, решта — терміни, пов'язані з комунікацією та наміром.
  - words:
    - навіщо
    - для чого
    - з якою метою
    - коли
    correct: 3
    explanation: «Коли» запитує про час, решта фраз запитують про мету.
  - words:
    - бо
    - тому що
    - через те що
    - щоб
    correct: 3
    explanation: «Щоб» — сполучник мети, решта — синонімічні сполучники причини.
- id: workbook-quiz-reported-speech
  type: quiz
  instruction: Оберіть правильний варіант непрямої мови
  items:
  - question: 'Пряма мова: «Я дуже хочу спати». Як сказати це непрямою мовою?'
    options:
    - Він сказав, що він дуже хоче спати.
    - Він сказав, щоб він дуже хотів спати.
    - Він сказав, чи він дуже хоче спати.
    - Він запитав, що він хоче спати.
    correct: 0
  - question: 'Пряма мова: «Ти купив молоко?». Як передати це питання?'
    options:
    - Вона запитала, чи я купив молоко.
    - Вона запитала, що я купив молоко.
    - Вона запитала, щоб я купив молоко.
    - Вона запитала, де я купив молоко.
    correct: 0
  - question: 'Пряма мова: «Зателефонуй бабусі!». Як передати це прохання?'
    options:
    - Мама сказала, щоб я зателефонував бабусі.
    - Мама сказала, що я зателефонував бабусі.
    - Мама сказала, чи я зателефонував бабусі.
    - Мама запитала, щоб я зателефонував бабусі.
    correct: 0
  - question: 'Пряма мова: «Де мій зошит?». Як передати це?'
    options:
    - Він запитав, де його зошит.
    - Він запитав, чи де його зошит.
    - Він запитав, що де його зошит.
    - Він запитав, щоб де його зошит.
    correct: 0
  - question: 'Пряма мова: «Я не знаю цього правила». Як передати?'
    options:
    - Учень відповів, що він не знає цього правила.
    - Учень відповів, щоб він не знав цього правила.
    - Учень відповів, чи він не знає цього правила.
    - Учень запитав, що він не знає цього правила.
    correct: 0
  - question: 'Пряма мова: «Ми будемо чекати». Як передати?'
    options:
    - Вони додали, що вони будуть чекати.
    - Вони додали, щоб вони будуть чекати.
    - Вони додали, чи вони будуть чекати.
    - Вони додали, що ми будемо чекати.
    correct: 0
  - question: 'Пряма мова: «Коли закінчиться урок?». Як передати?'
    options:
    - Вона запитала, коли закінчиться урок.
    - Вона запитала, чи коли закінчиться урок.
    - Вона запитала, що коли закінчиться урок.
