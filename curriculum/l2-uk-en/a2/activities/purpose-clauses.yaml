    - що
    - чи
    correct: 0
  - question: Вона не пішла гуляти, _____ йде дощ.
    options:
    - бо
    - щоб
    - що
    - чи
    correct: 0
  - question: Вона взяла парасольку, _____ не бути мокрою.
    options:
    - щоб
    - бо
    - що
    - чи
    correct: 0
  - question: Ми приїхали рано, _____ була велика проблема.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 0
  - question: Ми приїхали рано, _____ допомогти вам.
    options:
    - щоб
