    correct: 0
workbook:
- id: workbook-error-correction-speech
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Вона запитала, що я буду на роботі.
    error: що
    correction: чи
    error_type: word
    options:
    - чи
    - щоб
    - тому що
    explanation: Для запитань типу так/ні в непрямій мові використовуємо «чи», а не
      «що».
  - sentence: Я хочу, щоб ти прийти сьогодні.
    error: прийти
    correction: прийшов
    error_type: word
    options:
    - прийшов
    - прийдеш
    - приходжу
    explanation: Після «щоб» з іншим підметом використовуємо дієслово в минулому часі.
  - sentence: Він сказав, щоб я вже прийшов.
    error: щоб
    correction: що
    error_type: word
    options:
    - що
    - чи
    - бо
    explanation: Для констатації факту використовуємо «що», а не «щоб».
  - sentence: Ми працюємо для мати гроші.
    error: для
    correction: щоб
    error_type: word
    options:
    - щоб
    - тому що
    - що
    explanation: Для вираження мети з дієсловом використовуємо «щоб», а не «для».
  - sentence: Мама сказала, що я прибрав кімнату.
    error: що
    correction: щоб
    error_type: word
    options:
    - щоб
    - чи
    - бо
    explanation: Для передачі наказу або прохання використовуємо «щоб».
  - sentence: Вона запитала, чи де працює мій брат.
    error: чи де
    correction: де
    error_type: construction
    options:
    - де
    - що де
    - чи
    explanation: Якщо є питальне слово (де), частка «чи» не потрібна.
  - sentence: Я вчу українську, тому що розуміти друзів.
    error: тому що
    correction: щоб
    error_type: word
    options:
    - щоб
    - що
    - чи
    explanation: «Тому що» вказує на причину, а для мети (розуміти) використовуємо
      «щоб».
  - sentence: Вчитель просить, щоб ми слухати уважно.
    error: слухати
    correction: слухали
    error_type: word
    options:
    - слухали
    - слухаємо
    - слухають
    explanation: Після «щоб» з іншим підметом (ми) дієслово має бути в минулому часі.
- id: workbook-fill-in-verbs
  type: fill-in
  instruction: Вставте правильну форму дієслова (інфінітив або минулий час)
  items:
  - sentence: Я читаю тексти, щоб ____ нові слова.
    answer: знати
    options:
    - знати
    - знав
    - знала
  - sentence: Мама купила квитки, щоб діти ____ на море.
    answer: поїхали
    options:
    - поїхати
    - поїхали
    - поїдуть
  - sentence: Ми поїхали в Київ, щоб ____ місто.
    answer: побачити
    options:
    - побачити
    - побачили
    - побачимо
  - sentence: Він довго пояснював правило, щоб учні все ____.
    answer: зрозуміли
    options:
    - зрозуміти
    - зрозуміли
    - зрозуміють
  - sentence: Я хочу, щоб війна швидко ____.
    answer: закінчилася
    options:
    - закінчитися
    - закінчилася
    - закінчиться
  - sentence: Студенти слухають аудіо, щоб краще ____ мову.
    answer: розуміти
    options:
    - розуміти
    - розуміли
    - розуміють
  - sentence: Брат просить, щоб я ____ йому з роботою.
    answer: допоміг
    options:
    - допомогти
    - допоміг
    - допоможу
  - sentence: Вона прийшла додому, щоб ____ брату.
    answer: допомогти
    options:
    - допомогти
    - допомогла
    - допоможе
- id: workbook-group-sort-purpose-vs-cause
  type: group-sort
  instruction: 'Розподіліть речення: де причина (тому що), а де мета (щоб)?'
  groups:
  - label: Причина (Тому що / Бо)
    items:
    - Я п'ю воду, бо хочу пити.
    - Вона запізнилася, тому що були затори.
    - Ми вдома, бо йде дощ.
    - Він спить, тому що втомився.
  - label: Мета (Щоб)
    items:
    - Я п'ю воду, щоб не хотіти пити.
    - Вона вийшла раніше, щоб не запізнитися.
    - Ми взяли парасолю, щоб не бути мокрими.
    - Він ліг спати, щоб відпочити.
- id: workbook-translate-reported
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: He asked if I was at home.
    options:
    - text: Він запитав, чи я вдома.
