    - що
    - чи
    correct: 0
  - question: Секретарка відповіла, ____ директор зараз на зустрічі.
    options:
    - що
    - щоб
    - чи
    - тому що
    correct: 0
  - question: Мама зателефонувала, ____ я не хвилювався.
    options:
    - щоб
    - що
    - чи
    - тому що
    correct: 0
  - question: Новий сусід запитав, ____ знаходиться банк.
    options:
    - де
    - що
    - щоб
