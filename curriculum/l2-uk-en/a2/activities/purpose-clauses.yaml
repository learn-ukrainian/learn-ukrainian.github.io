version: '1.0'
module: purpose-clauses
level: a2
inline:
- id: fill-in-purpose-clauses-with-correct-form-after
  type: fill-in
  instruction: Вставте правильну форму дієслова
  items:
  - sentence: Я йду в магазин, щоб ____ хліб.
    answer: купити
    options:
    - купити
    - купив
    - купила
  - sentence: Я хочу, щоб ти ____ хліб.
    answer: купив
    options:
    - купити
    - купив
    - купило
  - sentence: Ми відкрили вікно, щоб кіт ____.
    answer: вийшов
    options:
    - вийти
    - вийшов
    - вийшла
  - sentence: Вона зателефонувала, щоб ____ про новини.
    answer: запитати
    options:
    - запитати
    - запитала
    - запитав
  - sentence: Директор хоче, щоб ми ____ проєкт.
    answer: зробили
    options:
    - зробити
    - зробили
    - зробив
  - sentence: Вони приїхали в Київ, щоб ____ місто.
    answer: побачити
    options:
    - побачити
    - побачили
    - побачив
  - sentence: Вчитель пояснив правило, щоб учні його ____.
    answer: зрозуміли
    options:
    - зрозуміти
    - зрозуміли
    - зрозуміла
  - sentence: Мама дала синові гроші, щоб він ____ воду.
    answer: купив
    options:
    - купити
    - купив
    - купила
- id: quiz-distinguish-cause-from-purpose-using-or
  type: quiz
  instruction: Оберіть правильне слово
  items:
