    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 0
  - question: Він взяв воду, _____ пити в дорозі.
    options:
    - щоб
    - тому що
    - що
    - чи
    correct: 0
  - question: Я вчу українську, _____ мені цікаво.
    options:
    - тому що
    - щоб
    - що
    - чи
    correct: 0
  - question: Я вчу українську, _____ працювати в Києві.
    options:
    - щоб
