version: '1.0'
module: vocative-expanded
level: a2
inline:
- id: fill-in
  type: fill-in
  instruction: Утворіть правильну форму професійного або офіційного звертання.
  items:
  - sentence: Добрий день, пане ____ !
    answer: директоре
    options:
    - директор
    - директору
    - директоре
  - sentence: Добрий день, пані ____ !
    answer: вчителько
    options:
    - вчителька
    - вчителю
    - вчителько
  - sentence: Зупиніть тут, пане ____ !
    answer: водію
    options:
    - водій
    - водіє
    - водію
  - sentence: Вельмишановний пане ____ !
    answer: професоре
    options:
    - професору
    - професоре
    - професор
  - sentence: Добрий день, пані ____ !
    answer: журналістко
    options:
    - журналістка
    - журналістку
    - журналістко
  - sentence: Заходьте, пане ____ .
    answer: Коваленку
    options:
    - Коваленко
    - Коваленку
    - Коваленка
  - sentence: Сідайте, пані ____ .
    answer: Шевченко
    options:
    - Шевченко
    - Шевченку
    - Шевченка
  - sentence: Дякую, пане ____ .
    answer: секретарю
    options:
    - секретар
    - секретарю
    - секретаре
- id: match-up
  type: match-up
  instruction: З'єднайте форму називного відмінка з правильною формою кличного відмінка.
  pairs:
  - left: лікар
    right: лікарю
  - left: вчитель
    right: вчителю
  - left: інженер
    right: інженере
  - left: майстер
    right: майстре
  - left: директорка
    right: директорко
  - left: колега
    right: колего
  - left: професор
    right: професоре
  - left: водій
    right: водію
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку у звертанні.
  items:
  - sentence: Привіт, мій друже!
    error: мій друже
    correction: друже мій
    error_type: construction
    options:
    - друже мій
    - мій друг
    - друг мій
    explanation: В емоційному звертанні займенник «мій» завжди стоїть після іменника.
  - sentence: Привіт, друже моя!
    error: друже моя
    correction: подруго моя
    error_type: word
    options:
    - подруго моя
    - друже мій
    - моя подруга
    explanation: До жінки ми кажемо «подруго», а не «друже».
  - sentence: Добрий день, пані лікар!
    error: лікар
    correction: лікарко
    error_type: word
    options:
    - лікарю
    - лікарко
    - лікарка
    explanation: 'Зі словом «пані» ми використовуємо фемінітив у кличному відмінку:
      пані лікарко.'
  - sentence: Добрий день, пане вчитель!
    error: вчитель
    correction: вчителю
    error_type: word
    options:
    - вчителю
    - вчителю мій
    - вчителька
    explanation: Після слова «пане» професія обов'язково стоїть у кличному відмінку.
  - sentence: Моя люба, як твої справи?
    error: Моя люба
    correction: Люба моя
    error_type: construction
    options:
    - Люба моя
    - Люба
    - Моя любов
    explanation: Займенник «моя» має стояти після іменника (або прикметника-звертання).
  - sentence: Боже моя, що сталося?
    error: моя
    correction: мій
    error_type: word
    options:
    - мій
    - моє
    - наш
    explanation: Слово «Бог» чоловічого роду, тому кажемо «Боже мій».
  - sentence: Тарас! Іди сюди!
    error: Тарас
    correction: Тарасе
    error_type: word
    options:
    - Тарасе
    - Тарасу
    - Тарасю
    explanation: 'Імена людей також мають стояти у кличному відмінку: Тарасе.'
  - sentence: Доброго ранку, пані Коваленку!
    error: Коваленку
    correction: Коваленко
    error_type: word
    options:
    - Коваленко
    - Коваленка
    - Ковалю
    explanation: Жіночі прізвища на -ко не змінюються у кличному відмінку.
- id: quiz
  type: quiz
  instruction: Оберіть правильний регістр звертання для кожної ситуації.
  items:
  - question: Офіційний лист міністру
    options:
    - Вельмишановний пане міністре,
    - Пан міністр,
    - Шановний міністр,
    - 'Міністру:'
    correct: 0
  - question: Привітання з сусідом
    options:
    - Сусіде!
    - Пане сусіду!
    - Пан сусід!
    - Сусіду мій!
    correct: 0
  - question: Дзвінок найкращому другові
    options:
    - Пан друг!
    - Мій друже!
    - Друже мій!
    - Пане друже!
    correct: 2
  - question: Звертання до судді в суді
    options:
    - Пане суддю!
    - Пане суддя!
    - Пан суддя!
    - Суддю!
    correct: 0
  - question: Розмова з домашнім котом
    options:
    - Пане коте!
    - Коте мій!
    - Пан кіт!
    - Кіт мій!
    correct: 1
  - question: Привітання з колегою на роботі
    options:
    - Пане колего!
    - Колего!
    - Пан колега!
    - Моя колего!
    correct: 1
  - question: Прохання про допомогу до лікаря
    options:
    - Пане лікарю, допоможіть!
    - Пан лікар, допоможіть!
    - Пане лікар, допоможіть!
    - Лікарю мій, допоможіть!
    correct: 0
  - question: Звертання до офіціанта в ресторані
    options:
    - Пане!
    - Друже!
    - Гей, ти!
    - Пан!
    correct: 0
- id: group-sort
  type: group-sort
  instruction: Розподіліть форми звертання за їхнім стилем.
  groups:
  - label: Формальний / Офіційний
    items:
    - пане Президенте
    - пане Ковалю
    - пані директорко
  - label: Професійний / Нейтральний
    items:
    - лікарю
    - вчителько
  - label: Емоційний / Близький
    items:
    - донечко
    - люба моя
    - серденько
workbook:
- id: wb-true-false-rules
  type: true-false
  instruction: Правда чи ні? Виберіть правильне твердження про кличний відмінок.
  items:
  - statement: Слово «пані» ніколи не змінює свою форму.
    correct: true
    explanation: 'Слово «пані» незмінне: пані вчителько, пані Оксано.'
  - statement: Правильно казати «пан директор».
    correct: false
    explanation: 'Обидва слова мають бути у кличному відмінку: «пане директоре».'
  - statement: Чоловічі прізвища змінюються після слова «пане».
    correct: true
    explanation: 'Наприклад: пане Ковальчуку, пане Шевченку.'
  - statement: В українській мові правильно казати «мій друже».
    correct: false
    explanation: 'Займенник має стояти після іменника: «друже мій».'
  - statement: Жіночі професії на -а у кличному відмінку закінчуються на -о.
    correct: true
    explanation: Лікарка → лікарко, вчителька → вчителько.
  - statement: Слово «колега» має різні форми кличного відмінка для чоловіків та жінок.
    correct: false
    explanation: 'Це слово спільного роду: завжди «колего».'
- id: wb-unjumble-dialogue
  type: unjumble
  instruction: Складіть правильні речення зі слів. Пам'ятайте про порядок слів в емоційному
    звертанні!
  items:
  - words:
    - мій!
    - Привіт,
    - друже
    correct_order:
    - Привіт,
    - друже
    - мій!
  - words:
    - лікарю,
    - допоможіть!
    - Пане
    correct_order:
    - Пане
    - лікарю,
    - допоможіть!
  - words:
    - моя,
    - справи?
    - як
    - Люба
    correct_order:
    - Люба
    - моя,
    - як
    - справи?
  - words:
    - зупиніть
    - Пане
    - тут.
    - водію,
    correct_order:
    - Пане
    - водію,
    - зупиніть
    - тут.
  - words:
    - моє,
    - сонечко
    - плач.
    - Не
    correct_order:
    - Не
    - плач,
    - сонечко
    - моє.
  - words:
    - день,
    - Ковальчуку.
    - Добрий
    - пане
    correct_order:
    - Добрий
    - день,
    - пане
    - Ковальчуку.
- id: wb-order-clinic
  type: order
  instruction: Розставте репліки діалогу у правильному порядку.
  items:
  - — Що вас турбує?
  - — У мене дуже болить голова і горло.
  - — Добрий день, пане лікарю!
  - — Дякую, пане лікарю. До побачення!
  - — Добрий день, пане Шевченку. Проходьте, сідайте.
  - — Ось ваш рецепт. Пийте ці ліки.
  correct_order:
  - 2
  - 4
  - 0
  - 1
  - 5
  - 3
