version: '1.0'
module: vocative-expanded
level: a2
inline:
- id: fill-in-formal-vocative
  type: fill-in
  instruction: Вставте правильну форму професії або імені
  items:
  - sentence: Добрий день, пане _____!
    answer: директоре
    options:
    - директоре
    - директор
    - директору
  - sentence: Шановна пані _____!
    answer: вчителько
    options:
    - вчителько
    - вчителька
    - вчителю
  - sentence: Добрий вечір, пане _____!
    answer: лікарю
    options:
    - лікарю
    - лікаре
    - лікар
  - sentence: Вітаю вас, пане _____!
    answer: Шевченку
    options:
    - Шевченку
    - Шевченко
    - Шевченка
  - sentence: Добрий день, пані _____!
    answer: Шевченко
    options:
    - Шевченко
    - Шевченку
    - Шевченка
  - sentence: Шановний пане _____!
    answer: професоре
    options:
    - професоре
    - професорю
    - професор
  - sentence: Пане _____, принесіть меню, будь ласка.
    answer: офіціанте
    options:
    - офіціанте
    - офіціант
    - офіціанту
  - sentence: Доброго ранку, пане _____!
    answer: водію
    options:
    - водію
    - водіє
    - водій
  title: Вставте правильну форму професії або імені
- id: match-professions-vocative
  type: match-up
  instruction: З'єднайте називний відмінок із правильним офіційним чи емоційним звертанням
  pairs:
  - left: лікар
    right: лікарю
  - left: вчитель
    right: вчителю
  - left: директор
    right: директоре
  - left: вчителька
    right: вчителько
  - left: офіціант
    right: офіціанте
  - left: колега
    right: колего
  - left: друг
    right: друже
  - left: суддя
    right: суддю
  title: З'єднайте називний відмінок із правильним офіційним чи емоційним звертанням
- id: quiz-focus-choose-the-correct-vocative-register-for-a-given-social-situation
  type: quiz
  instruction: Оберіть правильне ввічливе чи емоційне звертання для кожної ситуації
  items:
  - question: Як звернутися до чоловіка-лікаря?
    options:
    - Пане лікарю
    - Пан лікар
    - Лікаре
    - Лікар
    correct: 0
  - question: Як звернутися до жінки-вчителя?
    options:
    - Пані вчителько
    - Пані вчителька
    - Вчителько
    - Пан вчитель
    correct: 0
  - question: Як дуже ніжно назвати кохану людину?
    options:
    - Серденько
    - Серце
    - Колега
    - Пане
    correct: 0
  - question: Як ввічливо звернутися до групи чоловіків?
    options:
    - Панове
    - Пани
    - Друзі
    - Колеги
    correct: 0
  - question: Як емоційно та правильно звернутися до свого друга чоловічої статі?
    options:
    - Друже мій
    - Мій друг
    - Друже моя
    - Друг мій
    correct: 0
  - question: Ви пишете офіційний лист. Як найкраще почати?
    options:
    - Шановний добродію
    - Привіт, друже
    - Добрий день, пане
    - Шановний пан
    correct: 0
  - question: Як звернутися до сусіда на ім'я Степан (який старший за вас)?
    options:
    - Пане Степане
    - Пан Степан
    - Степане
    - Степан
    correct: 0
  - question: Як звернутися до чоловіка на прізвище Шевченко?
    options:
    - Пане Шевченку
    - Пане Шевченко
    - Пан Шевченко
    - Шевченко
    correct: 0
  title: Оберіть правильне ввічливе чи емоційне звертання для кожної ситуації
- id: group-sort-focus-sort-vocative-forms-by-register-formal-professional-emotional
  type: group-sort
  instruction: Розподіліть звертання за стилем (регістром)
  groups:
  - label: Офіційний (Formal)
    items:
    - пане Коваленку
    - пані Шевченко
    - шановний добродію
    - добродійко
  - label: Професійний (Professional)
    items:
    - пане директоре
    - пані вчителько
    - пане лікарю
    - колего
  - label: Емоційний (Emotional)
    items:
    - друже мій
    - люба моя
    - серденько
    - сонечко
  title: Розподіліть звертання за стилем (регістром)
workbook:
- id: workbook-group-sort-hard-soft
  type: group-sort
  instruction: Яке закінчення буде в кличному відмінку? Розподіліть професії чоловічого
    роду.
  groups:
  - label: Закінчення -е (твердий приголосний)
    items:
    - директор
    - інженер
    - професор
    - майстер
  - label: Закінчення -ю (м'який приголосний)
    items:
    - лікар
    - вчитель
    - перукар
    - водій
  title: Яке закінчення буде в кличному відмінку? Розподіліть професії чоловічого
    роду.
- id: workbook-fill-in-pronouns
  type: fill-in
  instruction: Вставте правильний займенник або прикметник
  items:
  - sentence: Друже _____, як ти?
    answer: мій
    options:
    - мій
    - моя
    - моє
  - sentence: Подруго _____, де ти була?
    answer: моя
    options:
    - мій
    - моя
    - моє
  - sentence: _____ моя, я так за тобою сумую!
    answer: Люба
    options:
    - Люба
    - Любий
    - Любо
  - sentence: _____ мій, уяви собі!
    answer: Любий
    options:
    - Любий
    - Люба
    - Любе
  - sentence: Боже _____!
    answer: мій
    options:
    - мій
    - моя
    - моє
  - sentence: Мамо _____, я люблю тебе!
    answer: моя
    options:
    - мій
    - моя
    - моє
  title: Вставте правильний займенник або прикметник
- id: workbook-true-false-rules
  type: true-false
  instruction: Правда чи ні? (Правила кличного відмінка)
  items:
  - statement: Слово «пані» ніколи не змінює свою форму.
    correct: true
    explanation: Слово «пані» незмінне, але професія після нього має бути в кличному
      відмінку.
  - statement: Після слова «пані» жіноче прізвище завжди стоїть у кличному відмінку.
    correct: false
    explanation: Жіночі прізвища (особливо на -о) після «пані» зазвичай залишаються
      в називному відмінку (пані Коваленко).
  - statement: Чоловічі прізвища після «пане» повинні мати форму кличного відмінка.
    correct: true
    explanation: Так, ми завжди кажемо «пане Коваленку» або «пане Шевченку».
  - statement: Прикметники (наприклад, «любий») змінюються у кличному відмінку.
    correct: false
    explanation: 'Прикметники та займенники завжди залишаються в називному відмінку:
      «друже мій», «люба моя».'
  - statement: Слово «колега» має закінчення «-о» і для чоловіків, і для жінок.
    correct: true
    explanation: Слово «колега» — це іменник спільного роду, воно завжди стає «колего».
  - statement: Українці завжди кажуть «мій друже» замість «друже мій».
    correct: false
    explanation: 'Українці частіше ставлять займенник після іменника для емоційності:
      «друже мій».'
  title: Правда чи ні? (Правила кличного відмінка)
