version: '1.0'
module: services-and-communication
level: a2
workbook:
- id: fill-in-dative-dialogues
  type: fill-in
  instruction: Доповніть репліки діалогу правильними формами слів
  items:
  - sentence: Я хочу надіслати цю бандероль моєму старшому ____.
    answer: братові
    options:
    - брат
    - брата
    - братові
  - sentence: Надішліть цю посилку моїй ____ в Канаду.
    answer: сестрі
    options:
    - сестра
    - сестру
    - сестрі
  - sentence: Працівник пошти допомагає ____ заповнити бланк.
    answer: клієнту
    options:
    - клієнт
    - клієнта
    - клієнту
  - sentence: Скажіть ____, де тут індекс.
    answer: мені
    options:
    - мене
    - я
    - мені
  - sentence: Я завжди дякую ____ за допомогу.
    answer: працівникові
    options:
    - працівник
    - працівника
    - працівникові
  - sentence: Підкажіть ____ правила відправлення посилки.
    answer: їй
    options:
    - її
    - вона
    - їй
  - sentence: Я раджу ____ відправити цей лист авіапоштою.
    answer: вам
    options:
    - ви
    - вас
    - вам
  - sentence: Покажіть ____ нові міжнародні конверти.
    answer: нам
    options:
    - ми
    - нас
    - нам
- id: match-up-requests
  type: match-up
  instruction: З'єднайте прохання клієнта та відповідь працівника
  pairs:
  - left: Допоможіть мені заповнити цей бланк.
    right: Звичайно, пишіть адресу тільки англійською мовою.
  - left: Я хочу відправити цю важку посилку.
    right: Добре, зараз я маю зважити її на вагах.
  - left: Дайте мені три святкові марки, будь ласка.
    right: Ось ваші марки. Скільки конвертів вам потрібно?
  - left: Скільки з мене за цю бандероль?
    right: З вас сорок п'ять гривень. Платите готівкою?
  - left: Підкажіть нам, де тут індекс.
    right: Індекс — це п'ять цифр у правому куті конверта.
  - left: Покажіть йому міжнародні конверти.
    right: Ось вони, подивіться. Вони більші, ніж звичайні.
  - left: Коли мій брат отримає цей лист?
    right: Він отримає його приблизно через два тижні.
  - left: Поясніть їй правила відправлення за кордон.
    right: Так, обов'язково потрібен митний документ.
- id: quiz-dative-address
  type: quiz
  instruction: Оберіть правильну форму для адреси на конверті
  items:
  - question: Я пишу лист...
    options:
    - дорогому другові
    - дорогий другові
    - дорогому друг
    - дорогий друг
    correct: 0
  - question: Надсилаю подарунок...
    options:
    - любій мамі
    - люба мамі
    - любій мама
    - любою мамою
    correct: 0
  - question: Ця посилка для...
    options:
    - шановного директора
    - шановному директору
    - шановний директор
    - шановним директором
    correct: 1
  - question: Відправляю бандероль...
    options:
    - старшому брату
    - старший брату
    - старшому брат
    - старшим братом
    correct: 0
  - question: Пишу офіційний лист...
    options:
    - шановній колезі
    - шановна колезі
    - шановній колега
    - шановною колегою
    correct: 0
  - question: Надсилаю листівку...
    options:
    - моїй бабусі
    - моя бабусі
    - моїй бабуся
    - моєю бабусею
    correct: 0
  - question: Цей конверт...
    options:
    - новому клієнту
    - новий клієнту
    - новому клієнт
    - новим клієнтом
    correct: 0
  - question: Я відправляю документи...
    options:
    - відомому професорові
    - відомий професорові
    - відомому професор
    - відомим професором
    correct: 0
- id: group-sort-phrases
  type: group-sort
  instruction: Розподіліть фрази за категоріями
  groups:
  - label: Прохання
    items:
    - Допоможіть мені, будь ласка.
    - Підкажіть нам індекс.
    - Поясніть їй правила.
  - label: Подяка
    items:
    - Дякую працівникові за роботу.
    - Дуже вам дякую!
    - Я подякував їм за допомогу.
  - label: Давання
    items:
    - Дайте мені квитанцію.
    - Ось ваші нові марки.
    - Покажіть йому конверти.
- id: true-false-post
  type: true-false
  instruction: Правда чи ні? Прочитайте твердження про пошту
  items:
  - statement: Щоб відправити лист, вам обов'язково потрібен конверт і марка.
    correct: true
    explanation: Марка і конверт — це базові речі для відправлення листа.
  - statement: Бандероль часто використовують для дуже важких речей.
    correct: false
    explanation: Бандероль використовують для маленьких предметів або книг. Для важких
      речей потрібна посилка.
  - statement: Одержувач — це людина, яка приносить посилку на пошту.
    correct: false
    explanation: Людина, яка приносить посилку на пошту — це відправник. Одержувач
      чекає на посилку.
  - statement: Дієслово «дякувати» завжди вимагає використання давального відмінка.
    correct: true
    explanation: Ми кажемо «дякувати (кому?) працівникові», а не «працівника».
  - statement: Ім'я людини на конверті завжди пишеться в давальному відмінку.
    correct: true
    explanation: Українська адреса відповідає на питання «Кому ви надсилаєте?».
  - statement: Слово «листоноша» може позначати тільки чоловіка.
    correct: false
    explanation: Це слово може позначати і чоловіка, і жінку.
  - statement: Дієслова «надіслати» і «відправити» — це синоніми.
    correct: true
    explanation: Вони мають абсолютно однакове значення і використовуються дуже часто.
  - statement: Листоноша завжди шукає вашу адресу, починаючи з вашого імені.
    correct: false
    explanation: Листоноша спочатку дивиться на індекс та місто, а вже потім на вулицю
      та ім'я.
- id: error-correction-dative
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченнях
  items:
  - sentence: Я хочу надіслати цей лист друга.
    error: друга
    correction: другові
    error_type: word
    options:
    - другові
    - другу
    - другом
    explanation: Дієслово «надіслати» вимагає давального відмінка для одержувача (кому?).
  - sentence: Він допомагає бабуся нести важку посилку.
    error: бабуся
    correction: бабусі
    error_type: word
    options:
    - бабусі
    - бабусю
    - бабусею
    explanation: Дієслово «допомагати» завжди вимагає давального відмінка.
  - sentence: Я завжди дякую працівника пошти за допомогу.
    error: працівника
    correction: працівникові
    error_type: word
    options:
    - працівникові
    - працівником
    - працівник
    explanation: В українській мові ми дякуємо «кому?», а не «кого?».
  - sentence: Дайте я дві святкові марки, будь ласка.
    error: я
    correction: мені
    error_type: word
    options:
    - мені
    - мене
    - мною
    explanation: Потрібно використовувати займенник у давальному відмінку.
  - sentence: Вона пише офіційний лист шановна колезі.
    error: шановна
    correction: шановній
    error_type: word
    options:
    - шановній
    - шановну
    - шановної
    explanation: Прикметник повинен узгоджуватися з іменником у давальному відмінку
      (шановній колезі).
  - sentence: Покажіть ми нові міжнародні конверти.
    error: ми
    correction: нам
    error_type: word
    options:
    - нам
    - нас
    - нами
    explanation: Займенник «ми» у давальному відмінку має форму «нам».
- id: translate-phrases
  type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: I want to send a parcel.
    options:
    - text: Я хочу відправити посилку.
      correct: true
    - text: Я хочу отримати посилку.
      correct: false
    - text: Я хочу відправити конверт.
      correct: false
    - text: Я хочу купити посилку.
      correct: false
  - source: How much do I owe?
    options:
    - text: Скільки з мене?
      correct: true
    - text: Скільки тобі?
      correct: false
    - text: Скільки я плачу?
      correct: false
    - text: Скільки це є?
      correct: false
  - source: Help me fill out the form.
    options:
    - text: Допоможіть мені заповнити бланк.
      correct: true
    - text: Допоможіть мене заповнити квитанцію.
      correct: false
    - text: Допоможіть йому заповнити бланк.
      correct: false
    - text: Підкажіть мені заповнити бланк.
      correct: false
  - source: The recipient will get the letter.
    options:
    - text: Одержувач отримає лист.
      correct: true
    - text: Відправник отримає лист.
      correct: false
    - text: Листоноша отримає посилку.
      correct: false
    - text: Одержувач надішле лист.
      correct: false
  - source: Thank the worker.
    options:
    - text: Подякуйте працівникові.
      correct: true
    - text: Подякуйте працівника.
      correct: false
    - text: Допоможіть працівникові.
      correct: false
    - text: Покажіть працівникові.
      correct: false
  - source: I need three stamps.
    options:
    - text: Мені потрібні три марки.
      correct: true
    - text: Я потребую три марки.
      correct: false
    - text: Мені треба три конверти.
      correct: false
    - text: Я маю три марки.
      correct: false
