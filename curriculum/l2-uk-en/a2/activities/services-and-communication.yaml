- id: wb-true-false-facts
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Ви повинні писати адресу одержувача на конверті.
    correct: true
    explanation: Правильна адреса допомагає листу швидко знайти дорогу.
  - statement: Слово «адреса» українською означає те саме, що й «адрес».
    correct: false
    explanation: «Адреса» — це місце, куди надсилають лист. «Адрес» — це письмове
      привітання.
  - statement: Дієслово «дякувати» вимагає після себе давального відмінка.
    correct: true
    explanation: Ми завжди кажемо «дякую вам» або «дякую тобі».
  - statement: Відправник — це людина, яка отримує посилку вдома.
    correct: false
    explanation: Відправник надсилає посилку. Отримує її одержувач.
  - statement: Щоб відправити листівку, достатньо просто кинути її в поштову скриньку.
    correct: true
    explanation: Так, якщо на ній є марка та правильна адреса.
  - statement: Квитанція потрібна для того, щоб знати, де зараз ваша посилка.
    correct: true
    explanation: На квитанції є спеціальний номер для пошуку посилки.
  - statement: Фраза «надіслати по адресу» є правильною українською.
    correct: false
    explanation: 'Це калька з російської. Українською правильно: «надіслати за адресою».'
  - statement: Усі слова у фразі «дорогому братові Михайлові» стоять у давальному
      відмінку.
    correct: true
    explanation: При звертанні на конверті всі слова узгоджуються в давальному відмінку.
- id: wb-odd-one-out-vocab
  type: odd-one-out
  instruction: Оберіть зайве слово
  items:
  - words:
    - конверт
    - марка
    - поштова скринька
    - яблуко
    correct: 3
    explanation: Яблуко — це їжа. Інші слова пов'язані з листами.
  - words:
    - відправник
    - одержувач
    - листоноша
    - квитанція
    correct: 3
    explanation: Квитанція — це документ. Інші слова означають людей.
  - words:
    - надіслати
    - відправити
    - отримати
    - заповнити
    correct: 2
    explanation: Отримати означає взяти щось. Надіслати і відправити означають дати/послати.
  - words:
    - мені
    - вам
    - нас
    - йому
    correct: 2
    explanation: «Нас» — це родовий або знахідний відмінок. Інші — давальний.
  - words:
    - бандероль
    - посилка
    - пакунок
    - індекс
    correct: 3
    explanation: Індекс — це цифри. Інші слова означають речі, які ми надсилаємо.
  - words:
    - Київ
    - Польща
    - Канада
    - адреса
    correct: 3
    explanation: Адреса — це загальне слово. Інші — це назви міст або країн.
  - words:
    - допоможіть
    - підкажіть
    - покажіть
    - пошта
    correct: 3
    explanation: Пошта — це іменник. Інші слова — дієслова у формі прохання.
  - words:
    - братові
    - сестрі
    - бабуся
    - другові
    correct: 2
    explanation: «Бабуся» — називний відмінок. Інші слова стоять у давальному.
