- type: translate
  instruction: Оберіть правильний переклад фраз із давальним відмінком
  items:
  - source: Help me, please.
    options:
    - text: Допоможіть мені, будь ласка.
      correct: true
    - text: Допоможіть мене, будь ласка.
      correct: false
    - text: Допоможіть я, будь ласка.
      correct: false
    - text: Допоможіть мною, будь ласка.
      correct: false
  - source: I am sending a parcel to my brother.
    options:
    - text: Я надсилаю посилку моєму братові.
      correct: true
    - text: Я надсилаю посилку мій брат.
      correct: false
    - text: Я надсилаю посилку мого брата.
      correct: false
    - text: Я надсилаю посилку моїм братом.
      correct: false
  - source: Thank you for the help.
    options:
    - text: Дякую вам за допомогу.
      correct: true
    - text: Дякую вас за допомогу.
      correct: false
    - text: Дякую ви за допомогу.
      correct: false
    - text: Дякую вами за допомогу.
      correct: false
  - source: Show us where the postbox is.
    options:
    - text: Покажіть нам, де поштова скринька.
      correct: true
    - text: Покажіть нас, де поштова скринька.
      correct: false
    - text: Покажіть ми, де поштова скринька.
      correct: false
    - text: Покажіть нами, де поштова скринька.
      correct: false
  - source: I advise you to check the postal code.
    options:
    - text: Раджу тобі перевірити індекс.
      correct: true
    - text: Раджу тебе перевірити індекс.
      correct: false
    - text: Раджу ти перевірити індекс.
      correct: false
    - text: Раджу тобою перевірити індекс.
      correct: false
  - source: Give her the envelope.
    options:
    - text: Дайте їй конверт.
      correct: true
    - text: Дайте її конверт.
      correct: false
    - text: Дайте вона конверт.
      correct: false
    - text: Дайте нею конверт.
      correct: false
- type: error-correction
  instruction: Знайдіть і виправте помилку у вживанні відмінка
  items:
  - sentence: Дякую вас за допомогу.
    error: вас
    correction: вам
    error_type: word
    options:
    - вам
    - ви
    - вами
    explanation: 'Дієслово «дякувати» вимагає давального відмінка: дякувати (кому?)
      вам.'
  - sentence: Допоможіть я заповнити цей бланк.
    error: я
    correction: мені
    error_type: word
    options:
    - мені
    - мене
    - мною
    explanation: 'Дієслово «допомагати» вимагає давального відмінка: допомогти (кому?)
      мені.'
  - sentence: Я хочу надіслати лист сестра.
    error: сестра
    correction: сестрі
    error_type: word
    options:
    - сестрі
    - сестру
    - сестрою
    explanation: Ми надсилаємо (кому?) сестрі — це давальний відмінок.
  - sentence: Скажіть ми, скільки коштує марка.
    error: ми
    correction: нам
    error_type: word
    options:
    - нам
    - нас
    - нами
    explanation: 'Дієслово «казати» вимагає давального відмінка: сказати (кому?) нам.'
  - sentence: Раджу ти відправити це авіапоштою.
    error: ти
    correction: тобі
    error_type: word
    options:
    - тобі
    - тебе
    - тобою
    explanation: 'Дієслово «радити» вимагає давального відмінка: радити (кому?) тобі.'
  - sentence: Покажіть клієнт, де стоїть поштова скринька.
    error: клієнт
    correction: клієнту
    error_type: word
    options:
    - клієнту
    - клієнта
    - клієнтом
    explanation: 'Дієслово «показувати» вимагає давального відмінка: показати (кому?)
      клієнту.'
