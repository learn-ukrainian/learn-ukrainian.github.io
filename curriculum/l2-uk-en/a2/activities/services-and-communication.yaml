version: '1.0'
module: services-and-communication
level: a2
inline:
- id: fill-in-complete-post-office-dialogue-lines-with-correct-dative-forms
  type: fill-in
  instruction: Вставте правильну форму слова
  items:
  - sentence: Допоможіть ____ заповнити бланк, будь ласка.
    answer: мені
    options:
    - мені
    - я
    - мене
  - sentence: Працівник дає квитанцію ____.
    answer: відправнику
    options:
    - відправнику
    - відправник
    - відправника
  - sentence: Я хочу надіслати посилку ____.
    answer: сестрі
    options:
    - сестрі
    - сестра
    - сестру
  - sentence: Підкажіть ____, де можна купити марку?
    answer: нам
    options:
    - нам
    - ми
    - нас
  - sentence: Що працівник пошти сказав ____?
    answer: йому
    options:
    - йому
    - він
    - його
  - sentence: Ми дуже дякуємо ____ за допомогу.
    answer: листоноші
    options:
    - листоноші
    - листоноша
    - листоношу
  - sentence: Я раджу ____ відправити це бандероллю.
    answer: вам
    options:
    - вам
    - ви
    - вас
  - sentence: Покажіть ____, де поштова скринька.
    answer: їй
    options:
    - їй
    - вона
    - її
- id: group-sort-service-phrases
  type: group-sort
  instruction: Розподіліть фрази за категоріями
  groups:
  - label: Прохання
    items:
    - Допоможіть мені, будь ласка.
    - Дайте мені конверт.
    - Покажіть нам, де скринька.
  - label: Подяка
    items:
    - Дякую вам за допомогу.
    - Дуже дякую листоноші.
    - Дякуємо працівнику пошти.
  - label: Давання та порада
    items:
    - Раджу вам надіслати листа.
    - Ось ваші марки.
    - Працівник дає квитанцію.
- id: match-up-requests-responses
  type: match-up
  instruction: З'єднайте запит із відповіддю
  pairs:
  - left: Я хочу надіслати листа.
    right: Ось конверт і марка.
  - left: Де можна надіслати листівку?
    right: Киньте її в поштову скриньку.
  - left: Скільки коштує відправити бандероль?
    right: Триста гривень.
  - left: Допоможіть мені заповнити бланк.
    right: Звичайно, що писати тут?
  - left: Куди ви надсилаєте листи?
    right: Один у Київ, а другий за кордон.
  - left: Що таке індекс?
    right: Це цифри для вашої адреси.
  - left: Хто такий одержувач?
    right: Це людина, яка чекає на посилку.
  - left: Я хочу забрати посилку.
    right: Дайте мені вашу квитанцію.
- id: quiz-dative-address-forms
  type: quiz
  instruction: Оберіть правильну форму для адреси
  items:
  - question: Я надсилаю лист ____
    options:
    - дорогому братові
    - дорогий брат
    - дорогого брата
    - дорогому брат
    correct: 0
  - question: Я відправляю подарунок ____
    options:
    - моя найкраща подруга
    - мою найкращу подругу
    - моїй найкращій подрузі
    - моєї найкращої подруги
    correct: 2
  - question: Ми пишемо лист ____
    options:
    - шановний професор
    - шановному професорові
    - шановного професора
    - шановним професором
    correct: 1
  - question: Надішліть цю бандероль ____
    options:
    - наш новий сусід
    - нашого нового сусіда
    - нашим новим сусідом
    - нашому новому сусідові
    correct: 3
  - question: Я хочу подякувати ____
    options:
    - цей працівник
    - цьому працівнику
    - цього працівника
    - цим працівником
    correct: 1
  - question: Листоноша приніс пакунок ____
    options:
    - моїй бабусі
    - моя бабуся
    - мою бабусю
    - моєю бабусею
    correct: 0
  - question: Він допомагає заповнити бланк ____
    options:
    - цей клієнт
    - цього клієнта
    - цьому клієнтові
    - цим клієнтом
    correct: 2
  - question: Я пишу адресу ____
    options:
    - мій дорогий друг
    - мого дорогого друга
    - моїм дорогим другом
    - моєму дорогому другові
    correct: 3
workbook:
- id: wb-error-correction-dative
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Дякую тебе за допомогу.
    error: тебе
    correction: тобі
    error_type: word
    options:
    - тобі
    - ти
    - тобою
    explanation: Дієслово «дякувати» вимагає давального відмінка (кому?).
  - sentence: Допоможіть мене заповнити цей бланк.
    error: мене
    correction: мені
    error_type: word
    options:
    - мені
    - я
    - мною
    explanation: Дієслово «допомагати» вимагає давального відмінка.
  - sentence: Я хочу надіслати лист по адресу.
    error: по адресу
    correction: за адресою
    error_type: construction
    options:
    - за адресою
    - на адресу
    - в адресу
    explanation: Українською правильно казати «надіслати за адресою».
  - sentence: Я даю квитанцію моя сестра.
    error: моя сестра
    correction: моїй сестрі
    error_type: phrase
    options:
    - моїй сестрі
    - моєї сестри
    - моєю сестрою
    explanation: Дієслово «давати» вимагає давального відмінка для одержувача.
  - sentence: Підкажіть нас, де можна купити марку.
    error: нас
    correction: нам
    error_type: word
    options:
    - нам
    - ми
    - нами
    explanation: Дієслово «підказати» вимагає давального відмінка.
  - sentence: Він пише лист дорогий друг.
    error: дорогий друг
    correction: дорогому другові
    error_type: phrase
    options:
    - дорогому другові
    - дорогого друга
    - дорогим другом
    explanation: Одержувач листа завжди пишеться в давальному відмінку.
  - sentence: Відправник дає пакунок працівника пошти.
    error: працівника
    correction: працівнику
    error_type: word
    options:
    - працівнику
    - працівник
    - працівником
    explanation: Кому дає? Працівнику (давальний відмінок).
  - sentence: Раджу вас надіслати це бандероллю.
    error: вас
    correction: вам
    error_type: word
    options:
    - вам
    - ви
    - вами
    explanation: Дієслово «радити» вимагає давального відмінка.
