version: '1.0'
module: services-and-communication
level: a2
inline:
- id: fill-in-complete-post-office-dialogue-lines-with-correct-dative-forms
  type: fill-in
  instruction: Доповніть речення правильними формами займенників та іменників у давальному
    відмінку
  items:
  - sentence: Дайте ____, будь ласка, дві марки по Україні.
    answer: мені
    options:
    - мені
    - мене
    - я
  - sentence: Я хочу надіслати цю посилку моєму ____.
    answer: братові
    options:
    - братові
    - брата
    - братом
  - sentence: Допоможіть ____, будь ласка, заповнити цей бланк.
    answer: нам
    options:
    - нам
    - нас
    - ми
  - sentence: Покажіть ____, де потрібно писати індекс.
    answer: йому
    options:
    - йому
    - його
    - він
  - sentence: Дякую ____ за швидку роботу!
    answer: вам
    options:
    - вам
    - вас
    - ви
  - sentence: Скажіть ____, скільки коштує відправити листівку.
    answer: їй
    options:
    - їй
    - її
    - вона
  - sentence: Раджу ____ надіслати ці документи авіапоштою.
    answer: тобі
    options:
    - тобі
    - тебе
    - ти
  - sentence: Поясніть ____ нові правила відправлення бандеролей.
    answer: їм
    options:
    - їм
    - їх
    - вони
- id: match-up-service-requests
  type: match-up
  instruction: З'єднайте прохання на пошті з логічною відповіддю оператора
  pairs:
  - left: Дайте мені, будь ласка, два конверти.
    right: Звичайно, ось вони. Вам потрібні марки?
  - left: Допоможіть мені заповнити цей бланк.
    right: Пишіть номер телефону одержувача ось тут, унизу.
  - left: Я хочу надіслати цю посилку братові.
    right: Добре. Що знаходиться всередині?
  - left: Скажіть мені, скільки це коштує?
    right: Це коштує сорок гривень. Ось ваша квитанція.
  - left: Де можна надіслати гарну листівку?
    right: Ви можете зробити це у другому вікні.
  - left: Покажіть мені, де стоїть поштова скринька.
    right: Вона стоїть на вулиці, біля входу у відділення.
  - left: Дякую вам за допомогу!
    right: Будь ласка! Гарного вам дня.
  - left: Принесіть їй ще один великий конверт.
    right: Хвилинку, зараз принесу зі складу.
- id: group-sort-dative-functions
  type: group-sort
  instruction: 'Розподіліть фрази за їхньою метою: прохання, подяка або надання і
    поради'
  groups:
  - label: Прохання про допомогу (Requesting help)
    items:
    - Допоможіть мені заповнити бланк
    - Покажіть клієнту, де скринька
    - Скажіть нам свій індекс
  - label: Подяка (Thanking)
    items:
    - Дякую вам за допомогу
    - Дякуємо оператору
    - Дякую тобі
  - label: Надання речей та поради (Giving and advising)
    items:
    - Надсилаю посилку братові
    - Раджу вам це зробити
- id: quiz-address-agreement
