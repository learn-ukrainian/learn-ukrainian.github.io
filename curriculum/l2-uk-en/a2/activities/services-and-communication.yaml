  instruction: Оберіть правильну форму для заповнення поля «Кому» на конверті
  items:
  - question: _____ братові Михайлові.
    options:
    - Моєму дорогому
    - Мій дорогий
    - Мого дорогого
    - Моїм дорогим
    correct: 0
  - question: _____ подрузі Олені.
    options:
    - Дорогій
    - Дорога
    - Дорогу
    - Дорогою
    correct: 0
  - question: _____ вчителю Іванові.
    options:
    - Шановному
    - Шановний
    - Шановного
    - Шановним
    correct: 0
  - question: _____ бабусі Наталі.
    options:
    - Моїй любій
    - Моя люба
    - Мою любу
    - Моєю любою
    correct: 0
  - question: _____ дідусеві Петру.
    options:
    - Моєму улюбленому
    - Мій улюблений
    - Мого улюбленого
    - Моїм улюбленим
    correct: 0
  - question: _____ професорові.
    options:
    - Шановному
    - Шановна
    - Шановну
    - Шановним
    correct: 0
  - question: _____ сестрі Марії.
    options:
    - Найкращій
    - Найкраща
    - Найкращу
    - Найкращою
    correct: 0
  - question: _____ другові Сергієві.
    options:
    - Моєму найкращому
    - Мій найкращий
    - Мого найкращого
    - Моїм найкращим
    correct: 0
workbook:
- type: fill-in
  instruction: Вставте правильне слово за змістом
  items:
  - sentence: Щоб відправити лист, вам потрібен паперовий ____.
    answer: конверт
    options:
    - конверт
    - марка
    - індекс
  - sentence: На конверт обов'язково треба наклеїти ____.
    answer: марку
    options:
    - марку
    - квитанцію
    - бандероль
  - sentence: Людина, яка приносить пошту до вашого дому, — це ____.
    answer: листоноша
    options:
    - листоноша
    - відправник
    - одержувач
  - sentence: Якщо ви надсилаєте книги або журнали, це ____.
    answer: бандероль
    options:
    - бандероль
    - марка
    - листівка
  - sentence: Короткий номер, який допомагає знайти відділення, — це ____.
    answer: індекс
    options:
    - індекс
    - адреса
    - бланк
  - sentence: Той, хто має забрати посилку на пошті, — це ____.
    answer: одержувач
    options:
    - одержувач
    - відправник
    - оператор
  - sentence: Після того, як ви відправили посилку, вам дають ____.
    answer: квитанцію
    options:
    - квитанцію
    - марку
    - листівку
  - sentence: Якщо ви хочете надіслати теплий зимовий одяг, це велика ____.
    answer: посилка
    options:
    - посилка
    - бандероль
    - марка
- type: true-false
  instruction: Правда чи ні? Перевірте, як ви зрозуміли текст
  items:
  - statement: В Україні головна поштова служба називається Укрпошта.
    correct: true
    explanation: Так, Укрпошта — це національна поштова служба.
  - statement: Щоб відправити лист, марка не обов'язкова.
    correct: false
    explanation: Без марки ваш лист не поїде до адресата.
  - statement: Бандероль зазвичай легша і дешевша за посилку.
    correct: true
    explanation: Бандероль використовують для книг або документів, вона легша за посилку.
  - statement: Людина, яка отримує посилку, називається відправник.
    correct: false
    explanation: Той, хто отримує посилку, — це одержувач. Відправник — це той, хто
      надсилає.
  - statement: У полі «Кому» на конверті ми завжди використовуємо давальний відмінок.
    correct: true
    explanation: Поле «Кому» відповідає на питання давального відмінка.
  - statement: Індекс — це довгий текст з назвою вулиці та міста.
    correct: false
    explanation: Індекс — це короткий номер, який допомагає швидко знайти правильне
      відділення.
