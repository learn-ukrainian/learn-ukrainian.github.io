- type: quiz
  title: "Загальний тест"
  instruction: "Перевірте, як ви засвоїли матеріал цього уроку."
  items:
    - question: "Як правильно сказати українською: 'I am writing with a pen'?"
      explanation: "Ми не використовуємо прийменник 'з' для інструмента."
      options:
        - text: "Я пишу ручкою."
          correct: true
        - text: "Я пишу з ручкою."
          correct: false
        - text: "Я пишу на ручці."
          correct: false
        - text: "Я пишу ручку."
          correct: false
    - question: "Як правильно запитати про транспорт: '_____ ти дістався додому?'"
      explanation: "Для транспорту ми ставимо запитання 'Чим?'."
      options:
        - text: "Чим"
          correct: true
        - text: "Як"
          correct: false
        - text: "Куди"
          correct: false
        - text: "Що"
          correct: false
    - question: "Яке закінчення має слово 'комп'ютер' в орудному відмінку?"
      explanation: "Це тверда група, тому закінчення -ом."
      options:
        - text: "-ом (комп'ютером)"
          correct: true
        - text: "-ем (комп'ютерем)"
          correct: false
        - text: "-ям (комп'ютерям)"
          correct: false
        - text: "-ам (комп'ютерам)"
          correct: false
    - question: "Як правильно перекласти: 'We travel by metro'?"
      explanation: "Слово метро — незмінюване."
      options:
        - text: "Ми подорожуємо метро."
          correct: true
        - text: "Ми подорожуємо метром."
          correct: false
        - text: "Ми подорожуємо на метро."
          correct: false
        - text: "Ми подорожуємо з метро."
          correct: false
    - question: "Виберіть правильне речення про роботу:"
      explanation: "Користуватися вимагає орудного відмінка без прийменників."
      options:
        - text: "Він користується новим телефоном."
          correct: true
        - text: "Він користується новий телефон."
          correct: false
        - text: "Він користується з новим телефоном."
          correct: false
        - text: "Він користується на новому телефоні."
          correct: false
    - question: "Що насправді означає фраза 'Я йду з ручкою'?"
      explanation: "Прийменник 'з' позначає компанію, отже ви йдете поруч із ручкою."
      options:
        - text: "Я йду поруч із ручкою, як із супутником."
          correct: true
        - text: "Я використовую ручку для ходьби."
          correct: false
        - text: "Я пишу ручкою просто зараз."
          correct: false
        - text: "Ручка — це мій інструмент."
          correct: false
    - question: "Як правильно сказати українською: 'I cut with a knife'?"
      explanation: "Основа слова закінчується на ж (мішана), тому закінчення -ем."
      options:
        - text: "Я ріжу ножем."
          correct: true
        - text: "Я ріжу ножом."
          correct: false
        - text: "Я ріжу з ножем."
          correct: false
        - text: "Я ріжу на ножі."
          correct: false
    - question: "Яка форма орудного відмінка множини від слова 'око' (eye)?"
      explanation: "Очі (око в множині) має форму очима."
      options:
        - text: "очима"
          correct: true
        - text: "очами"
          correct: false
        - text: "оком"
          correct: false
        - text: "оцями"
          correct: false