    - left: "різати м'ясо"
      right: "гострим ножем"
    - left: "їсти салат"
      right: "виделкою"
    - left: "мішати чай"
      right: "ложкою"
    - left: "працювати в офісі"
      right: "потужним комп'ютером"
    - left: "розмовляти"
      right: "мобільним телефоном"
    - left: "вишивати сорочку"
      right: "тонкою голкою"

- type: quiz
  title: "Як чи Чим?"
  instruction: "Прочитайте речення і визначте, на яке запитання відповідає виділене слово."
  items:
    - question: "На яке запитання відповідає слово в реченні: Він малює ДУЖЕ КРАСИВО?"
      explanation: "Слово красиво - це прислівник, воно описує якість дії (Як?)."
      options:
        - text: "Як?"
          correct: true
        - text: "Чим?"
          correct: false
        - text: "Ким?"
          correct: false
        - text: "Що?"
          correct: false
    - question: "На яке запитання відповідає слово в реченні: Я пишу ОЛІВЦЕМ?"
      explanation: "Олівцем - це інструмент в орудному відмінку (Чим?)."
      options:
        - text: "Як?"
          correct: false
        - text: "Чим?"
          correct: true
        - text: "Де?"
          correct: false
        - text: "Куди?"
          correct: false
    - question: "На яке запитання відповідає фраза: Ми дісталися ШВИДКИМ ПОЇЗДОМ?"
      explanation: "Поїзд - це транспортний засіб (Чим?)."
      options:
        - text: "Як?"
          correct: false
        - text: "Чим?"
          correct: true
        - text: "Коли?"
          correct: false
        - text: "З ким?"
          correct: false
    - question: "На яке запитання відповідає слово в реченні: Студент читає УВАЖНО?"
      explanation: "Уважно - це прислівник (Як?)."
      options:
        - text: "Як?"
          correct: true
        - text: "Чим?"
          correct: false
        - text: "Чому?"
          correct: false
        - text: "Що?"
          correct: false
    - question: "На яке запитання відповідає слово: Я користуюсь НОВИМ КОМП'ЮТЕРОМ?"
      explanation: "Дієслово користуватися вимагає орудного відмінка (Чим?)."
      options:
        - text: "Що?"
          correct: false
        - text: "Чим?"
          correct: true
        - text: "Як?"
          correct: false
        - text: "Куди?"
          correct: false
    - question: "На яке запитання відповідає слово: Він співає НАДЗВИЧАЙНО ГОЛОСНО?"
      explanation: "Голосно - це прислівник способу дії (Як?)."
      options:
        - text: "Як?"
          correct: true
        - text: "Чим?"
          correct: false
        - text: "Де?"
          correct: false
        - text: "З ким?"
          correct: false
    - question: "На яке запитання відповідає слово: Вона ріже хліб ГОСТРИМ НОЖЕМ?"
      explanation: "Ніж - це інструмент для дії (Чим?)."
      options:
        - text: "Як?"
          correct: false
        - text: "Чим?"
          correct: true
        - text: "Який?"
          correct: false
        - text: "Що?"
          correct: false
    - question: "На яке запитання відповідає слово: Вони подорожують ЛІТАКОМ?"
      explanation: "Літак - це транспортний засіб (Чим?)."
      options:
        - text: "Як?"
          correct: false
        - text: "Чим?"
          correct: true
        - text: "Куди?"
          correct: false
        - text: "Кого?"
          correct: false

- type: fill-in
