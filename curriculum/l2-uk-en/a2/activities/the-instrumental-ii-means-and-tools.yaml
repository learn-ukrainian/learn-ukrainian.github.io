- type: true-false
  title: "Правда чи міф?"
  instruction: "Перевірте свої знання про орудний відмінок."
  items:
    - statement: "Ми використовуємо прийменник 'з', коли говоримо про інструмент дії."
      correct: false
      explanation: "Ні, для інструмента ми використовуємо орудний відмінок без прийменника."
    - statement: "Слова 'метро' та 'таксі' ніколи не змінюють свої закінчення."
      correct: true
      explanation: "Правильно. Це незмінювані слова іншомовного походження."
    - statement: "Слово 'олівець' в орудному відмінку має форму 'олівецом'."
      correct: false
      explanation: "Неправильно. Олівець має м'яку основу, тому правильно 'олівцем'."
    - statement: "Транспортні засоби в українській мові відповідають на питання 'Чим?'."
      correct: true
      explanation: "Так, ми ставимося до транспорту як до великого інструмента для подорожі."
    - statement: "Дієслово 'користуватися' вимагає після себе знахідного відмінка."
      correct: false
      explanation: "Неправильно. Користуватися вимагає орудного відмінка (користуватися чим?)."
    - statement: "В українській мові частини тіла можуть бути інструментами, наприклад: дивитися очима."
      correct: true
      explanation: "Так, це дуже природна українська конструкція."
    - statement: "Слово 'ніж' в орудному відмінку має закінчення '-ом' (ножом)."
      correct: false
      explanation: "Неправильно. Літера 'ж' позначає мішаний звук, тому ми пишемо 'ножем'."
    - statement: "Коли ми подорожуємо разом із другом, ми використовуємо прийменник 'з' (з другом)."
      correct: true
      explanation: "Так, для компанії (accompaniment) прийменник потрібен."

- type: unjumble
  title: "Складіть речення"
  instruction: "Побудуйте речення з правильним порядком слів."
  items:
    - words:
        - "я"
        - "пишу"
        - "лист"
        - "синьою"
        - "ручкою"
      answer: "Я пишу лист синьою ручкою"
    - words:
        - "ми"
        - "дісталися"
        - "до"
        - "Львова"
        - "поїздом"
      answer: "Ми дісталися до Львова поїздом"
    - words:
        - "він"
        - "завжди"
        - "подорожує"
        - "власною"
        - "машиною"
      answer: "Він завжди подорожує власною машиною"
    - words:
        - "діти"
        - "люблять"
        - "малювати"
        - "кольоровим"
        - "олівцем"
      answer: "Діти люблять малювати кольоровим олівцем"
    - words:
        - "вона"
        - "дуже"
        - "швидко"
        - "ріже"
        - "ножем"
      answer: "Вона дуже швидко ріже ножем"
    - words:
        - "батько"
        - "їде"
        - "на"
        - "роботу"
        - "автобусом"
      answer: "Батько їде на роботу автобусом"

- type: error-correction
  title: "Виправте помилки"
  instruction: "Знайдіть і виправте неправильну форму слова або зайвий прийменник."
  items:
    - sentence: "Я пишу цей тест з ручкою."
      error: "з ручкою"
      answer: "ручкою"
      error_type: "phrase"
      options:
        - "ручкою"
        - "з ручкою"
        - "ручку"
        - "на ручці"
      explanation: "Для інструмента ми використовуємо орудний відмінок без прийменника."
    - sentence: "Він дуже часто їздить метром на роботу."
      error: "метром"
      answer: "метро"
      error_type: "word"
      options:
        - "метро"
        - "метром"
        - "на метро"
        - "в метро"
      explanation: "Слово метро ніколи не змінюється."
    - sentence: "Дитина малює красивий будинок олівецом."
      error: "олівецом"
      answer: "олівцем"
      error_type: "word"
      options:
        - "олівцем"
        - "олівецом"
        - "з олівцем"
        - "олівець"
      explanation: "Олівець має м'яку основу, тому закінчення -ем."
    - sentence: "Ми вчора дісталися додому з таксі."
      error: "з таксі"
      answer: "таксі"
      error_type: "phrase"
      options:
        - "таксі"
        - "з таксі"
        - "таксією"
        - "на таксі"
      explanation: "Слово таксі незмінюване і прийменник 'з' тут зайвий."
    - sentence: "Моя мама завжди ріже хліб ножом."
      error: "ножом"
      answer: "ножем"
      error_type: "word"
      options:
        - "ножем"
        - "ножом"
        - "з ножом"
        - "з ножем"
      explanation: "Після шиплячих (ж, ч, ш) пишемо закінчення -ем."
    - sentence: "Я щодня працюю з комп'ютером у своєму кабінеті."
      error: "з комп'ютером"
      answer: "комп'ютером"
      error_type: "phrase"
      options:
        - "комп'ютером"
        - "з комп'ютером"
        - "комп'ютер"
        - "на комп'ютері"
      explanation: "Прийменник 'з' означає компанію. Комп'ютер — це інструмент."

