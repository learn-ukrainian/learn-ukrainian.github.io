- type: fill-in
  title: "Як ми дістанемося до Карпат?"
  instruction: "Оберіть правильний транспорт в орудному відмінку. Пам'ятайте про незмінювані слова!"
  items:
    - sentence: "Ми вирішили поїхати до Львова нічним _____."
      answer: "поїздом"
      options:
        - "поїздом"
        - "поїзд"
        - "з поїздом"
        - "поїзду"
    - sentence: "Моя родина завжди подорожує власною _____."
      answer: "машиною"
      options:
        - "машиною"
        - "машину"
        - "з машиною"
        - "машині"
    - sentence: "Він швидко дістався на вокзал _____."
      answer: "метро"
      options:
        - "метро"
        - "метром"
        - "на метро"
        - "з метро"
    - sentence: "Чи зручно їхати до центру _____?"
      answer: "автобусом"
      options:
        - "автобусом"
        - "автобус"
        - "автобусі"
        - "з автобусом"
    - sentence: "Завтра ми полетимо великим _____."
      answer: "літаком"
      options:
        - "літаком"
        - "літаку"
        - "літак"
        - "з літаком"
    - sentence: "Туристи доїхали до музею _____."
      answer: "таксі"
      options:
        - "таксі"
        - "таксією"
        - "на таксі"
        - "з таксі"
    - sentence: "Студенти часто їздять старим _____."
      answer: "трамваєм"
      options:
        - "трамваєм"
        - "трамвай"
        - "трамваю"
        - "з трамваєм"
    - sentence: "Я люблю подорожувати швидким _____."
      answer: "тролейбусом"
      options:
        - "тролейбусом"
        - "тролейбус"
        - "тролейбусі"
        - "з тролейбусом"

- type: match-up
  title: "У моїй майстерні"
  instruction: "Знайдіть логічну пару: що ми робимо і чим ми це робимо."
  pairs:
