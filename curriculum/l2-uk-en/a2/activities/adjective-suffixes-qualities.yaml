- type: true-false
  title: 'Правда чи неправда: факти про суфікси'
  instruction: Прочитайте твердження та визначте, чи є вони правдивими (True) чи хибними
    (False).
  items:
  - statement: В українській мові суфікс -еньк- використовується лише для опису дуже
      маленького фізичного розміру предмета.
    correct: false
    explanation: Цей суфікс також передає повагу, близькість, любов та позитивні емоції
      до людини чи об'єкта.
  - statement: Використання пестливих форм (наприклад, підписочок) у розмові з директором
      є професійним і завжди ввічливим.
    correct: false
    explanation: Це створює серйозну невідповідність регістру (Register Mismatch).
      В офіційному спілкуванні слід використовувати нейтральні слова.
  - statement: Прикметник страшенний означає гіперболу та дуже велику інтенсивність
      ознаки.
    correct: true
    explanation: Суфікси -енн- та -езн- працюють як граматичне збільшувальне скло
      для емоцій та розмірів.
  - statement: Відносні прикметники з суфіксами -ов-, -ян- (наприклад, паперовий,
      дерев'яний) ніколи не мають ступенів порівняння.
    correct: true
    explanation: Вони вказують на пряме відношення до матеріалу і не можуть бути більш
      дерев'яними чи менш дерев'яними.
  - statement: Прикметник від слова Прага утворюється за допомогою суфікса -ськ- і
      завжди пишеться як пражський.
    correct: false
    explanation: Коли основа закінчується на Г, Ж, З, додавання суфікса -ськ- створює
      милозвучне закінчення -зьк- (празький).
  - statement: Слово козацький утворено абсолютно правильно за правилом чергування
      приголосних (К + ськ = цьк).
    correct: true
    explanation: Це правильне написання, яке гарантує красиве звучання і легку вимову
      слова.
  - statement: Суфікс -есеньк- вказує на нейтральне, спокійне і беземоційне ставлення
      до певного об'єкта.
    correct: false
    explanation: Цей суфікс означає найвищий ступінь пестливості або абсолютну ідеальну
      ознаку (наприклад, чистесенький).
  - statement: Українська мова використовує зміну форми слова (суфікси), щоб передати
      інтенсивність, замість додаткових слів на зразок дуже.
    correct: true
    explanation: Це одна з головних і найсильніших особливостей мови — використання
      морфології замість синтаксису.
