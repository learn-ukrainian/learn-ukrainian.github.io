- type: quiz
  title: 'Перевірте знання: правила суфіксів'
  instruction: Оберіть правильну відповідь на кожне запитання про українські суфікси.
  items:
  - question: Який суфікс найчастіше використовують для створення теплих пестливих
      форм?
    explanation: Суфікс -еньк- (наприклад, маленький) є найпопулярнішим для вираження
      любові та тепла.
    options:
    - text: -еньк-
      correct: true
    - text: -енн-
      correct: false
    - text: -езн-
      correct: false
    - text: -ськ-
      correct: false
  - question: Який суфікс додають до прикметника, щоб створити гіперболу або показати
      гігантський розмір?
    explanation: Суфікс -енн- (наприклад, страшенний) створює гіперболу і означає
      щось величезне.
    options:
    - text: -енн-
      correct: true
    - text: -еньк-
      correct: false
    - text: -есеньк-
      correct: false
    - text: -ськ-
      correct: false
  - question: Який варіант написання прикметника від географічної назви міста Прага
      є правильним?
    explanation: Оскільки Прага закінчується на Г, за правилом чергування утворюється
      суфікс -зьк- (празький).
    options:
    - text: празький
      correct: true
    - text: пражський
      correct: false
    - text: працький
      correct: false
    - text: прагський
      correct: false
  - question: Як правильно утворити та написати відносний прикметник від слова козак?
    explanation: Оскільки козак закінчується на К, за правилом чергування утворюється
      суфікс -цьк- (козацький).
    options:
    - text: козацький
      correct: true
    - text: козакський
      correct: false
    - text: козазький
      correct: false
    - text: козаський
      correct: false
  - question: Яку функцію виконують відносні прикметники з суфіксами -ов-, -ян-, -н-?
    explanation: Вони вказують на пряме відношення до матеріалу, групи чи поняття
      (наприклад, дерев'яний стіл).
    options:
    - text: відносні прикметники (relational adjectives)
      correct: true
    - text: пестливі форми для дітей
      correct: false
    - text: гіпербола та інтенсивність
      correct: false
    - text: дієприкметники (passive participles)
      correct: false
  - question: Чому використання слова підписочок під час офіційної ділової зустрічі
      є серйозною помилкою?
    explanation: Пестливі форми руйнують професійну дистанцію і створюють невідповідність
      регістру (Register Mismatch).
    options:
    - text: це створює невідповідність регістру
      correct: true
    - text: це показує велику повагу до директора
      correct: false
    - text: це означає, що документ маленький
      correct: false
    - text: це завжди доречно в українській мові
      correct: false
  - question: Який суфікс використовується для утворення прикметника від іменника
      студент?
    explanation: Для утворення приналежності до соціальної групи чи професії використовується
      суфікс -ськ- (студентський).
    options:
    - text: студентський
      correct: true
    - text: студенський
      correct: false
    - text: студенцький
      correct: false
    - text: студентний
      correct: false
  - question: Який суфікс вказує на найвищу міру пестливості або абсолютну ідеальність
      ознаки?
    explanation: Суфікс -есеньк- (наприклад, чистесенький) вказує на найсильнішу та
      найсвітлішу емоцію.
    options:
    - text: -есеньк-
      correct: true
    - text: -еньк-
      correct: false
    - text: -енн-
      correct: false
    - text: -езн-
      correct: false
- type: error-correction
  title: 'Виправте помилки: регістр та орфографія'
  instruction: Знайдіть і виправте помилки у використанні суфіксів або порушення офіційного
    регістру.
  items:
  - sentence: Будь ласка, поставте ваш підписочок на цьому важливому документі.
    error: підписочок
    answer: підпис
    error_type: register
    options:
    - підпис
    - підпису
    - підписі
    - підписом
    explanation: Слово підписочок має пестливий суфікс, який є недоречним у діловій
      ситуації. Потрібно використовувати нейтральне слово підпис.
  - sentence: Цей новий корпоративний контракт — дуже важливенький документ для нашої
      компанії.
    error: важливенький
    answer: важливий
    error_type: register
    options:
    - важливий
    - важливого
    - важливому
    - важливим
    explanation: В офіційному контексті слід використовувати нейтральні прикметники
      (важливий), а не пестливі форми.
  - sentence: Я купила смачний пражський торт у місцевій кондитерській вчора ввечері.
    error: пражський
    answer: празький
    error_type: word
    options:
    - празький
    - праський
    - працький
    - пражеський
    explanation: За правилами української мови, при додаванні суфікса -ськ- до кореня,
      що закінчується на г (Прага), утворюється зьк (празький).
  - sentence: На весняному фестивалі ми довго дивилися справжній козакський танець.
    error: козакський
    answer: козацький
    error_type: word
    options:
    - козацький
    - козаський
    - козазький
    - козакеський
    explanation: Якщо корінь закінчується на к (козак), при додаванні -ськ- утворюється
      цьк (козацький).
  - sentence: Це дуже страшенний котик, він такий маленький, пухнастий і милий!
    error: страшенний
    answer: гарненький
    error_type: word
    options:
    - гарненький
    - страшний
    - величезний
    - здоровенний
    explanation: Суфікс -енн- використовується для лякаючих об'єктів. Для милого котика
      підійде слово гарненький.
  - sentence: Мій улюблений напій вранці — це свіжа львівський кава з молоком.
    error: львівський
    answer: львівська
    error_type: word
    options:
    - львівська
    - львівське
    - львівські
    - львівську
    explanation: Слово кава жіночого роду, тому прикметник має бути у формі жіночого
      роду — львівська.
