    - sentence: 'Наша спортивна команда завтра буде грати ___ великий футбол.'
      answer: 'у'
      options:
        - 'у'
        - 'на'
        - 'за'
        - 'під'
      explanation: 'Ми кажемо грати у футбол, використовуючи знахідний відмінок.'
    - sentence: 'Мій найкращий друг дуже цікавиться сучасною фотографі___.'
      answer: 'єю'
