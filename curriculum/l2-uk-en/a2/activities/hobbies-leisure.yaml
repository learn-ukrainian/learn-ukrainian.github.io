- type: true-false
  title: 'Правда чи брехня: Українське дозвілля'
  instruction: 'Визначте, чи правдиві ці твердження про українську культуру та дозвілля.'
  items:
    - statement: 'Тихе полювання — це справжнє полювання на тварин у лісі зі зброєю.'
      correct: false
      explanation: 'Тихе полювання — це абсолютно мирний процес збирання лісових грибів.'
    - statement: 'Вишивання має глибоке символічне і загальнокультурне значення для українців.'
      correct: true
      explanation: 'Вишивання століттями допомагало зберігати національну ідентичність.'
    - statement: 'Українці дуже часто і правильно кажуть я граю спорт.'
      correct: false
      explanation: 'Українці завжди кажуть я займаюся спортом. Грати спорт — це помилка.'
    - statement: 'Слово шахи в сучасній українській мові завжди вживається тільки у множині.'
      correct: true
      explanation: 'Слова шахи в однині просто фізично не існує в словниках.'
    - statement: 'Для гри на музичних інструментах ми завжди використовуємо дієслово грати на.'
      correct: true
      explanation: 'Наприклад: грати на гітарі, грати на піаніно, грати на скрипці.'
    - statement: 'Українці дуже рідко ходять у глибокий ліс за грибами восени.'
      correct: false
      explanation: 'Це надзвичайно популярна осіння традиція для тисяч сучасних людей.'
    - statement: 'Універсальне дієслово займатися завжди вимагає орудного відмінка.'
      correct: true
      explanation: 'Наприклад: займатися спортом, займатися йогою, займатися фотографією.'
    - statement: 'Після фрази грати у слова футбол і теніс змінюють своє закінчення.'
      correct: false
      explanation: 'Для неістот чоловічого роду форма знахідного відмінка повністю збігається з називним.'

- type: fill-in
  title: 'Заповніть пропуски: Відмінки та прийменники'
  instruction: 'Виберіть правильне закінчення або потрібний прийменник.'
  items:
