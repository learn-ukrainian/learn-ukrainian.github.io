- type: true-false
  instruction: Чи логічний цей результат для такої умови?
  items:
  - statement: Якщо на вулиці йде дощ, ми візьмемо парасольку.
    correct: true
    explanation: Дощ означає, що парасолька нам справді потрібна.
  - statement: Якщо болить голова, я буду голосно слухати музику.
    correct: false
    explanation: Це погана ідея. Краще випити таблетку і відпочити в тиші.
  - statement: Якщо в мене є вільний час, я прочитаю нову книгу.
    correct: true
    explanation: Це логічний і дуже приємний план на вільний час.
  - statement: Якщо ти не поспішиш, ти обов'язково прийдеш вчасно.
    correct: false
    explanation: Якщо не поспішати, то ти навпаки запізнишся.
  - statement: Якщо завтра буде хороша погода, ми залишимося вдома.
    correct: false
    explanation: Зазвичай у хорошу сонячну погоду люди йдуть гуляти.
  - statement: Якщо я не знаю граматичне правило, я запитаю викладача.
    correct: true
    explanation: Це найкраща і найефективніша порада для студентів.
  - statement: Якщо ми купимо квитки, ми підемо в кіно.
    correct: true
    explanation: Квитки потрібні для того, щоб піти в кіно.
  - statement: Якщо ти одягнеш теплу куртку, ти дуже змерзнеш.
    correct: false
    explanation: Тепла куртка якраз допомагає людині не змерзнути на вулиці.
