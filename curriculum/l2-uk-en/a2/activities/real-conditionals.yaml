inline:
- id: fill-in-real-conditionals
  type: fill-in
  instruction: Вставте правильну форму дієслова
  items:
  - sentence: Якщо завтра ____ хороша погода, ми підемо гуляти.
    answer: буде
    options:
    - буде
    - була
    - є
  - sentence: Якщо ти хочеш спати, ____ в ліжко.
    answer: іди
    options:
    - іди
    - пішов
    - йду
  - sentence: Якщо ти ____ час, допоможи мені.
    answer: маєш
    options:
    - маєш
    - мав
    - мати
  - sentence: Я зроблю чай, якщо ти ____ торт.
    answer: принесеш
    options:
    - принесеш
    - приносити
    - приніс
  - sentence: Якщо ти не знаєш правило, то ____ викладача.
    answer: запитай
    options:
    - запитай
    - запитував
    - запитати
  - sentence: Ми не поїдемо на море, якщо погода ____ погана.
    answer: буде
    options:
    - буде
    - була
    - є
  - sentence: Якщо ти не візьмеш парасольку, ти точно ____.
    answer: змокнеш
    options:
    - змокнеш
    - змокнув
    - змокнути
  - sentence: Якщо ви вже ____, ми можемо починати урок.
    answer: готові
    options:
    - готові
    - були
    - бути
- id: match-up-logical-results
  type: match-up
  instruction: З'єднайте умову (якщо) з логічним результатом
  pairs:
  - left: Якщо завтра буде сонце,
    right: ми посадимо помідори.
  - left: Якщо піде сильний дощ,
    right: ми маємо залишитися вдома.
  - left: Якщо в магазині є свіжий хліб,
    right: купи, будь ласка.
  - left: Якщо в мене буде вільний час,
    right: я прочитаю цю книгу.
  - left: Якщо болить голова,
    right: випий таблетку і відпочинь.
  - left: Якщо не поспішиш,
    right: ти запізнишся на поїзд.
  - left: Якщо ти не візьмеш парасольку,
    right: ти точно змокнеш під дощем.
  - left: Якщо ти допоможеш мені з текстом,
    right: я допоможу з презентацією.
- id: quiz-yakscho-vs-yakby
