version: '1.0'
module: real-conditionals
level: a2
inline:
- id: fill-in-conditional-verbs
  type: fill-in
  instruction: Вставте правильну форму дієслова
  items:
  - sentence: Якщо сьогодні _____ сонце, ми підемо гуляти.
    answer: буде
    options:
    - буде
    - є
    - бути
    - було
  - sentence: Якщо ти _____ насіння, я підготую грядку.
    answer: купиш
    options:
    - купиш
    - купуєш
    - купуватимеш
    - купив
  - sentence: Якщо ти маєш вільний час, _____ на поїзд.
    answer: поспіши
    options:
    - поспіши
    - поспішити
    - поспішиш
    - поспішати
  - sentence: Ми залишимося вдома, якщо _____.
    answer: дощитиме
    options:
    - дощитиме
    - дощить
    - дощити
    - дощило
  - sentence: Якщо вода _____, вона гаряча.
    answer: кипить
    options:
    - кипить
    - кипітиме
    - буде кипіти
    - закипить
  - sentence: Я зателефоную тобі, якщо _____ час.
    answer: матиму
    options:
    - матиму
    - маю
    - матимеш
    - мав
  - sentence: Якщо ти хочеш гуляти з друзями, спочатку _____ домашнє завдання.
    answer: зроби
    options:
    - зроби
    - зробиш
    - робитимеш
    - робити
  - sentence: Якщо все буде добре, ми _____ у відпустку влітку.
    answer: поїдемо
    options:
    - поїдемо
    - їдемо
    - поїхати
    - поїхали
- id: match-condition-to-result
  type: match-up
  instruction: З'єднайте умову з її логічним результатом
  pairs:
  - left: Якщо буде гарна погода,
    right: ми поїдемо на море.
  - left: Якщо ти не візьмеш парасольку,
    right: ти обов'язково змокнеш.
  - left: Якщо ти завжди запізнюєшся на роботу,
    right: люди не хочуть з тобою працювати.
  - left: Якщо твоя зустріч закінчиться вчасно,
    right: я прийду в кафе.
  - left: Якщо у тебе болить голова,
    right: випий таблетку.
  - left: Якщо ти допоможеш мені сьогодні,
    right: я допоможу тобі завтра.
  - left: Якщо я отримаю премію на роботі,
    right: ми підемо в ресторан.
  - left: Якщо ти хочеш вивчити нову мову,
    right: говори нею щодня.
- id: choose-if-style-yakshcho-yakby
  type: quiz
  instruction: 'Оберіть правильне слово: реальна чи нереальна умова?'
  items:
  - question: _____ ти хочеш, я допоможу тобі підготувати грядку.
    options:
    - Якщо
    - Якби
    - То
    - Тому що
    correct: 0
  - question: _____ я знав відповідь, я б тобі сказав, але я не знаю.
    options:
    - Якщо
    - Якби
    - Коли
    - Щоб
    correct: 1
  - question: _____ завтра буде сонце, ми поїдемо у відпустку.
    options:
    - Якщо
    - Якби
    - Хоча
    - Бо
    correct: 0
  - question: 'Він сказав: «_____ я мав мільйон доларів, я б купив острів».'
    options:
    - Якщо
    - Якби
    - Коли
    - Тому що
    correct: 1
  - question: _____ ти маєш вільний час, поспіши на поїзд.
    options:
    - Якщо
    - Якби
    - То
    - Щоб
    correct: 0
  - question: _____ ми швидко закінчимо роботу, то ввечері будемо пити чай.
    options:
    - Якщо
    - Якби
    - Або
    - Хоча
    correct: 0
  - question: _____ тільки я міг літати, як птах!
    options:
    - Якщо
    - Якби
    - То
    - Бо
    correct: 1
  - question: Я обов'язково зателефоную тобі, _____ моя зустріч закінчиться вчасно.
    options:
    - якщо
    - якби
    - коли
    - то
    correct: 0
workbook:
- type: true-false
  instruction: Правда чи ні? (Правила використання реальної умови)
  items:
  - statement: Слово «якщо» використовується для фантастичних і неможливих ситуацій.
    correct: false
    explanation: Слово «якщо» показує реальну умову. Для фантазій є слово «якби».
  - statement: Після слова «якщо» в реальній умові ми ніколи не використовуємо частку
      «б/би».
    correct: true
    explanation: Частка «б/би» працює тільки з «якби» для нереальних умов.
  - statement: Слово «то» часто стоїть перед умовою (після слова якщо).
    correct: false
    explanation: Слово «то» стоїть перед результатом, у другій частині речення.
  - statement: Якщо результат стоїть на першому місці в реченні, ми ставимо кому перед
      словом «якщо».
    correct: true
    explanation: Так, кома завжди відокремлює дві частини складного речення.
  - statement: Для загальних істин (фізичних фактів) ми завжди використовуємо тільки
      майбутній час.
    correct: false
    explanation: Для фактів ми використовуємо теперішній час в обох частинах речення
      (Якщо вода кипить, вона гаряча).
  - statement: У реченнях-порадах ми часто використовуємо теперішній час в умові та
      наказовий спосіб у результаті.
    correct: true
    explanation: 'Наприклад: «Якщо у тебе болить голова, випий таблетку».'
