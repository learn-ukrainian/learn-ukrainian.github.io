    - Якби
    - Тому що
    - Але
    correct: 1
  - question: Я не піду в кіно, ____ у мене немає часу.
    options:
    - якщо
    - якби
    - тому що
    - але
    correct: 2
  - question: ____ я був птахом, я б літав високо в небі.
    options:
    - Якщо
    - Якби
    - Тому що
    - Бо
    correct: 1
  - question: ____ ти хочеш спати, іди в ліжко.
    options:
    - Якщо
    - Якби
    - Тому що
    - Хоча
    correct: 0
  - question: Він дуже сумний. ____ я тільки знав усю правду!
    options:
    - Якщо
    - Якби
    - Тому що
    - То
    correct: 1
  - question: Я дуже втомився, ____ хочу лягти спати.
    options:
    - якщо
    - якби
    - тому що
    - тоді
    correct: 2
  - question: ____ ви не будете слухати команди, то заблукаєте в лісі.
    options:
    - Якщо
    - Якби
    - Тому що
    - Але
    correct: 0
workbook:
- type: true-false
  instruction: 'Правда чи неправда: правила використання умовних речень'
  items:
  - statement: Слово «якщо» використовується для реальних планів і ситуацій.
    correct: true
    explanation: «Якщо» вказує на реальну умову, яка може відбутися.
  - statement: Ми використовуємо фантазії та мрії після слова «якщо».
    correct: false
    explanation: Для нереальних умов (мрій) ми використовуємо слово «якби».
  - statement: Перед другою частиною умовного речення завжди ставлять кому.
    correct: true
    explanation: 'Кома візуально ділить речення на дві логічні частини: умову та результат.'
  - statement: Слово «якби» показує реальну умову, яка може статися завтра.
    correct: false
    explanation: «Якби» показує тільки фантазію або гіпотетичну ситуацію.
  - statement: У реченнях зі словом «якщо» часто використовують майбутній час.
    correct: true
    explanation: Оскільки мова йде про плани, ми часто використовуємо майбутній час.
  - statement: Ми ставимо кому перед «якщо», коли воно стоїть посередині речення.
    correct: true
    explanation: Так, кома завжди стоїть між частинами складного речення.
  - statement: У частині з умовою (якщо) ми зазвичай використовуємо минулий час для
      майбутніх подій.
    correct: false
    explanation: В українській мові ми використовуємо теперішній або майбутній час
      для реальної умови.
  - statement: Слово «то» часто використовують перед результатом, щоб зробити зв'язок
      сильнішим.
    correct: true
    explanation: «То» працює як логічний місток між умовою та її наслідком.
