- type: error-correction
  instruction: Знайдіть і виправте нелогічне слово у цих умовних реченнях
  items:
  - sentence: Якщо я матиму вільний погода, я піду в кіно.
    error: погода
    correction: час
    error_type: word
    options:
    - час
    - робота
    - результат
    explanation: Ми кажемо «вільний час», а не «вільна погода».
  - sentence: Якщо завтра буде сильний сонце, ми візьмемо парасольку.
    error: сонце
    correction: дощ
    error_type: word
    options:
    - дощ
    - вітер
    - сніг
    explanation: Парасолька потрібна від дощу.
  - sentence: Якщо в мене болить голова, я вип'ю торт.
    error: торт
    correction: таблетку
    error_type: word
    options:
    - таблетку
    - чай
    - воду
    explanation: Від болю в голові п'ють таблетку.
  - sentence: Якщо ти поспішиш, ти точно запізнишся на поїзд.
    error: поспішиш
    correction: не поспішиш
    error_type: phrase
    options:
    - не поспішиш
    - допоможеш
    - будеш
    explanation: Людина запізнюється, якщо вона НЕ поспішає.
  - sentence: Якщо ти візьмеш парасольку, ти точно змокнеш.
    error: візьмеш
    correction: не візьмеш
    error_type: phrase
    options:
    - не візьмеш
    - купиш
    - маєш
    explanation: Людина змокає під дощем, якщо вона забула парасольку вдома.
  - sentence: Якщо ти не знаєш правило, запитай лікаря.
    error: лікаря
    correction: викладача
    error_type: word
    options:
    - викладача
    - брата
    - студента
    explanation: Правила з граматики пояснює викладач.
  - sentence: Якщо вам буде гірше, зателефонуйте вчителю.
    error: вчителю
    correction: лікарю
    error_type: word
    options:
    - лікарю
    - офіціанту
    - колезі
    explanation: Коли людина хворіє (стає гірше), вона дзвонить лікарю.
  - sentence: Якщо все буде погано, ми разом поїдемо у відпустку.
    error: погано
    correction: добре
    error_type: word
    options:
    - добре
    - сумно
    - повільно
    explanation: Відпустка — це хороший план, тому ми кажемо «якщо все буде добре».
