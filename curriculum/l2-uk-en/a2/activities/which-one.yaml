      answer: 'Дайте ті яблука, які дуже солодкі.'

- type: quiz
  title: 'Перевірка знань: Правила та форми'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'Що означає правило дзеркала для слова який?'
      explanation: 'Слово який копіює рід і число іменника з головного речення.'
      options:
        - text: 'Воно копіює рід і число іменника.'
          correct: true
        - text: 'Воно завжди має чоловічий рід.'
          correct: false
        - text: 'Воно копіює відмінок іменника.'
          correct: false
        - text: 'Воно ніколи не змінюється.'
          correct: false
    - question: 'Від чого залежить відмінок слова який за правилом хамелеона?'
      explanation: 'Відмінок залежить від ролі слова всередині підрядного речення.'
      options:
        - text: 'Від ролі в підрядному реченні.'
          correct: true
        - text: 'Від ролі в головному реченні.'
          correct: false
        - text: 'Тільки від роду іменника.'
          correct: false
        - text: 'Від бажання мовця.'
          correct: false
    - question: 'Яку форму знахідного відмінка має слово який для чоловічого роду істот (наприклад, чоловік)?'
      explanation: 'Для чоловічого роду істот використовується форма якого.'
      options:
        - text: 'якого'
          correct: true
        - text: 'який'
          correct: false
        - text: 'яку'
          correct: false
        - text: 'які'
          correct: false
    - question: 'Яку форму знахідного відмінка має слово який для чоловічого роду неістот (наприклад, стіл)?'
      explanation: 'Для чоловічого роду неістот форма збігається з називним відмінком — який.'
      options:
        - text: 'який'
          correct: true
        - text: 'якого'
          correct: false
        - text: 'яку'
          correct: false
        - text: 'які'
          correct: false
    - question: 'Який розділовий знак обов''язково ставиться перед словом який?'
      explanation: 'Перед відносним займенником який завжди ставиться кома.'
      options:
        - text: 'кома'
          correct: true
        - text: 'крапка'
          correct: false
        - text: 'тире'
          correct: false
        - text: 'двокрапка'
          correct: false
    - question: 'Яке слово правильно використовувати для опису людини (наприклад: Чоловік, ___ читає)?'
      explanation: 'В українській мові слово який використовується і для речей, і для людей.'
      options:
        - text: 'який'
          correct: true
        - text: 'хто'
          correct: false
        - text: 'що'
          correct: false
        - text: 'чий'
          correct: false
    - question: 'Яка форма потрібна у реченні: Я бачу сукню, ___ висить у вітрині?'
      explanation: 'Сукня — жіночий рід, називний відмінок у підрядному реченні (вона висить).'
      options:
        - text: 'яка'
          correct: true
        - text: 'яку'
          correct: false
        - text: 'який'
          correct: false
        - text: 'які'
          correct: false
    - question: 'Яка форма потрібна у реченні: Я купую сукню, ___ я бачила вчора?'
      explanation: 'Сукня — жіночий рід, але в підрядному реченні це об''єкт (знахідний відмінок).'
