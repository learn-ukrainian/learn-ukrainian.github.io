- type: match-up
  title: 'З''єднайте половинки речень'
  instruction: 'Утворіть правильні складні речення, перевіряючи узгодження роду та числа.'
  pairs:
    - left: 'Я купив куртку,'
      right: 'яку ми бачили вчора.'
    - left: 'Ми зустріли туриста,'
      right: 'який шукав дорогу до центру.'
    - left: 'Мені не сподобався фільм,'
      right: 'який ми дивилися вчора.'
