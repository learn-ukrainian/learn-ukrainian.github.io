- type: quiz
  title: "Оберіть правильну реакцію в діалозі"
  instruction: "Як ви відреагуєте на слова фармацевта?"
  items:
    - question: "Фармацевт каже: 'Який саме у вас кашель? Сухий чи вологий?' Що ви відповісте?"
      explanation: "Ви маєте описати свій симптом."
      options:
        - text: "Він сухий. Мені потрібен сироп."
          correct: true
        - text: "Я не люблю пити сироп."
          correct: false
        - text: "Дайте мені таблетки від голови."
          correct: false
        - text: "У мене немає кашлю."
          correct: false
    - question: "Ви хочете запитати фармацевта про натуральні ліки. Як це зробити?"
      explanation: "Фітотерапія або трав'яні збори — це натуральні засоби."
      options:
        - text: "У вас є якийсь трав'яний збір?"
          correct: true
        - text: "Дайте мені найсильніші антибіотики."
          correct: false
        - text: "Я хочу хімічні препарати."
          correct: false
        - text: "Які побічні ефекти має цей сироп?"
          correct: false
    - question: "Фармацевт питає: 'У вас є електронний рецепт від лікаря?' Якщо його немає, ви скажете..."
      explanation: "Без рецепта ви не можете купити рецептурні препарати."
      options:
        - text: "Ні, дайте мені щось безрецептурне."
          correct: true
        - text: "Так, але я його загубив."
          correct: false
        - text: "Я сам собі лікар."
          correct: false
        - text: "Рецепт не потрібен для антибіотиків."
          correct: false
    - question: "Ви читаєте інструкцію і бачите слово 'протипоказання'. Що ви там шукаєте?"
      explanation: "Протипоказання вказують, кому не можна приймати ці ліки."
      options:
        - text: "Чи можна мені пити ці ліки, якщо у мене є алергія."
          correct: true
        - text: "Скільки разів на день пити сироп."
          correct: false
        - text: "Яка ціна у цих ліків."
          correct: false
        - text: "Де знаходиться аптека."
          correct: false
    - question: "Ви хочете запитати про частоту прийому ліків. Що ви скажете?"
      explanation: "Запитання про дозування та час прийому."
      options:
        - text: "Як правильно приймати цей сироп?"
          correct: true
        - text: "Скільки коштує цей сироп?"
          correct: false
        - text: "З чого зроблений цей сироп?"
          correct: false
        - text: "У вас є інший сироп?"
          correct: false
    - question: "Фармацевт каже: 'Приймайте по одній таблетці до їди.' Коли ви маєте її пити?"
      explanation: "До їди означає перед прийомом їжі."
      options:
        - text: "За тридцять хвилин перед тим, як я буду їсти."
          correct: true
        - text: "Разом зі сніданком."
          correct: false
        - text: "Відразу після того, як я поїм."
          correct: false
        - text: "Тільки ввечері перед сном."
          correct: false
    - question: "Як попросити засіб від головного болю українською мовою?"
      explanation: "Конструкція 'від' + родовий відмінок."
      options:
        - text: "Дайте мені таблетки від голови."
          correct: true
        - text: "Дайте мені таблетки для голови."
          correct: false
        - text: "Я хочу таблетки на голову."
          correct: false
        - text: "Мені потрібні таблетки з головою."
          correct: false
    - question: "Фармацевт попереджає: 'Цей препарат викликає сонливість.' Що це означає?"
      explanation: "Сонливість — це стан, коли хочеться спати, це побічний ефект."
      options:
        - text: "Це побічний ефект. Краще не сідати за кермо."
          correct: true
        - text: "Це означає, що ліки дуже смачні."
          correct: false
        - text: "Ліки можна приймати тільки вранці."
          correct: false
        - text: "Ці ліки допомагають від безсоння."
          correct: false