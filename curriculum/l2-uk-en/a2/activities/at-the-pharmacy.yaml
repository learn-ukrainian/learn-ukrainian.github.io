- type: quiz
  title: "Перевірте знання: правила в українській аптеці"
  instruction: "Оберіть правильну відповідь на кожне запитання."
  items:
    - question: "Що означає зелений хрест, який світиться вночі?"
      explanation: "Це чергова аптека, яка працює цілодобово."
      options:
        - text: "Це чергова аптека."
          correct: true
        - text: "Це лікарня."
          correct: false
        - text: "Це супермаркет."
          correct: false
        - text: "Це відділ фітотерапії."
          correct: false
    - question: "Яке слово є правильним в українській мові для 'medicine'?"
      explanation: "Слово 'ліки' є єдиним правильним. 'Лікарство' — це калька з російської мови."
      options:
        - text: "ліки"
          correct: true
        - text: "лікарство"
          correct: false
        - text: "лікування"
          correct: false
        - text: "лікарні"
          correct: false
    - question: "Що потрібно мати, щоб купити антибіотики в Україні?"
      explanation: "Для антибіотиків обов'язково потрібен електронний рецепт."
      options:
        - text: "Електронний рецепт."
          correct: true
        - text: "Паперовий лист."
          correct: false
        - text: "Багато грошей."
          correct: false
        - text: "Дозвіл фармацевта."
          correct: false
    - question: "Якого роду слово 'біль' в українській мові?"
      explanation: "Слово 'біль' — чоловічого роду."
      options:
        - text: "Чоловічого роду."
          correct: true
        - text: "Жіночого роду."
          correct: false
        - text: "Середнього роду."
          correct: false
        - text: "Це слово завжди у множині."
          correct: false
    - question: "Яке дієслово використовується в офіційних медичних інструкціях замість розмовного 'пити'?"
      explanation: "В інструкціях завжди використовується офіційне слово 'приймати'."
      options:
        - text: "приймати"
          correct: true
        - text: "їсти"
          correct: false
        - text: "ковтати"
          correct: false
        - text: "брати"
          correct: false
    - question: "Що означає інструкція 'двічі на добу'?"
      explanation: "Доба — це двадцять чотири години."
      options:
        - text: "Два рази за двадцять чотири години."
          correct: true
        - text: "Два рази на тиждень."
          correct: false
        - text: "Кожні дві години."
          correct: false
        - text: "Два дні підряд."
          correct: false
    - question: "Яка форма ліків є густою рідиною, яку часто дають дітям?"
      explanation: "Сироп — це солодка і густа рідина."
      options:
        - text: "сироп"
          correct: true
        - text: "мазь"
          correct: false
        - text: "таблетка"
          correct: false
        - text: "капсула"
          correct: false
    - question: "Що означає приймати ліки 'натщесерце' або 'до їди'?"
      explanation: "Це означає, що ліки треба приймати перед тим, як ви будете їсти."
      options:
        - text: "Перед прийомом їжі."
          correct: true
        - text: "Разом з їжею."
          correct: false
        - text: "Після прийому їжі."
          correct: false
        - text: "Тільки ввечері."
          correct: false

- type: true-false
  title: "Правда чи брехня: факти про ліки та аптеки"
  instruction: "Визначте, чи є ці твердження правдивими."
  items:
    - statement: "Слово 'ліки' завжди вживається тільки у множині."
      correct: true
      explanation: "Так, це слово pluralia tantum."
    - statement: "В Україні ви можете купити антибіотики без рецепта, якщо у вас висока температура."
      correct: false
      explanation: "Ні, антибіотики продаються виключно за електронним рецептом."
    - statement: "Фітотерапія — це лікування за допомогою хімічних таблеток."
      correct: false
      explanation: "Фітотерапія — це лікування натуральними травами."
    - statement: "Розділ 'протипоказання' в інструкції описує ситуації, коли не можна приймати препарат."
      correct: true
      explanation: "Так, це інформація про те, кому заборонено ці ліки."
    - statement: "В українській мові правильно казати 'ліки для кашлю'."
      correct: false
      explanation: "Неправильно. Правильно казати 'ліки від кашлю'."
    - statement: "Чергова аптека зазвичай працює двадцять чотири години на добу."
      correct: true
      explanation: "Так, чергові аптеки працюють цілодобово."
    - statement: "Слово 'мазь' в українській мові належить до чоловічого роду."
      correct: false
      explanation: "Ні, слово 'мазь' — жіночого роду."
    - statement: "Побічні ефекти — це небажані наслідки від прийому препарату."
      correct: true
      explanation: "Так, це негативні реакції організму."

