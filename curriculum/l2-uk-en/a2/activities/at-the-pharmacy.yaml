- type: error-correction
  title: "Виправте граматичні та лексичні помилки"
  instruction: "Знайдіть і виправте помилку в кожному реченні."
  items:
    - sentence: "Я купив нове лікарство від застуди."
      error: "нове лікарство"
      answer: "нові ліки"
      error_type: "phrase"
      options:
        - "нові ліки"
        - "новий препарат"
        - "нові таблетки"
        - "нову мазь"
      explanation: "Слово 'лікарство' — це русизм. В українській мові використовується слово 'ліки', яке завжди має форму множини."
    - sentence: "Мені потрібні таблетки для голови."
      error: "для голови"
      answer: "від голови"
      error_type: "phrase"
      options:
        - "від голови"
        - "до голови"
        - "на голову"
        - "з головою"
      explanation: "Коли ми говоримо про хворобу або симптом, ми використовуємо прийменник 'від'."
    - sentence: "В інструкції написано пити по одній капсулі."
      error: "пити"
      answer: "приймати"
      error_type: "register"
      options:
        - "приймати"
        - "вживати"
        - "їсти"
        - "ковтати"
      explanation: "В офіційному медичному стилі (в інструкціях) використовується дієслово 'приймати', а не 'пити'."
    - sentence: "Це ліки дуже дороге."
      error: "Це ліки дуже дороге"
      answer: "Ці ліки дуже дорогі"
      error_type: "phrase"
      options:
        - "Ці ліки дуже дорогі"
        - "Ці ліки дорогий"
        - "Цей ліки дорогий"
        - "Ця ліки дорога"
      explanation: "Іменник 'ліки' вживається тільки у множині, тому всі пов'язані слова теж мають бути у множині."
    - sentence: "Лікар дав мені рецепт на антибіотик для кашлю."
      error: "для кашлю"
      answer: "від кашлю"
      error_type: "phrase"
      options:
        - "від кашлю"
        - "проти кашлю"
        - "на кашель"
        - "з кашлем"
      explanation: "Правильна конструкція українською мовою — 'від кашлю'."
    - sentence: "Я приймаю цей сироп два рази на день після їжі."
      error: "після їжі"
      answer: "після їди"
      error_type: "phrase"
      options:
        - "після їди"
        - "після обіду"
        - "після сніданку"
        - "після вечері"
      explanation: "У медичному контексті (в інструкціях) використовується термін 'після їди' (процес споживання), а не 'після їжі' (самі продукти)."

