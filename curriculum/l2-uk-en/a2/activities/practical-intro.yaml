- type: quiz
  title: 'Граматичний тест: правила в дії'
  instruction: Оберіть одну правильну відповідь.
  items:
    - question: Який відмінок ми використовуємо для заперечення після слова не?
      options:
        - text: Родовий відмінок
          correct: true
        - text: Знахідний відмінок
          correct: false
        - text: Давальний відмінок
          correct: false
        - text: Місцевий відмінок
          correct: false
      explanation: Після частки не прямий об'єкт стає родовим.
    - question: Який відмінок потрібен при офіційному звертанні (наприклад, слово пан)?
      options:
        - text: Кличний відмінок
          correct: true
        - text: Називний відмінок
          correct: false
        - text: Родовий відмінок
          correct: false
        - text: Орудний відмінок
          correct: false
      explanation: Слово пан або пані завжди вимагає кличного відмінка.
    - question: Як правильно відповісти на питання Дати кому?
      options:
        - text: Давальний відмінок
          correct: true
        - text: Знахідний відмінок
          correct: false
        - text: Місцевий відмінок
          correct: false
        - text: Називний відмінок
          correct: false
      explanation: Давальний відмінок показує активного отримувача.
    - question: Яке дієслово ми використовуємо для руху пішки?
      options:
        - text: йти
          correct: true
        - text: їхати
          correct: false
        - text: летіти
          correct: false
        - text: плисти
          correct: false
      explanation: Слово йти використовується для переміщення власними ногами.
    - question: Яке дієслово позначає рух транспортом?
      options:
        - text: їхати
          correct: true
        - text: йти
          correct: false
        - text: бігти
          correct: false
        - text: крокувати
          correct: false
      explanation: Слово їхати використовується для машин, автобусів, поїздів.
    - question: Який сполучник краще використовувати в неофіційній розмові для пояснення причини?
      options:
        - text: бо
          correct: true
        - text: щоб
          correct: false
        - text: якщо
          correct: false
        - text: тому що
          correct: false
      explanation: Слово бо — це енергійний розмовний варіант для пояснення причини.
    - question: Який вид дієслова треба використовувати зі словом зараз?
      options:
        - text: недоконаний
          correct: true
        - text: доконаний
          correct: false
        - text: обидва варіанти правильні
          correct: false
        - text: жоден із варіантів
          correct: false
      explanation: Недоконаний вид описує дію в процесі просто зараз.
    - question: Який вид дієслова показує завершену дію та результат?
      options:
        - text: доконаний
          correct: true
        - text: недоконаний
          correct: false
        - text: тривалий
          correct: false
        - text: постійний
          correct: false
      explanation: Доконаний вид фокусується на фінальному результаті дії.

