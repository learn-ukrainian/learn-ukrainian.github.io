- type: error-correction
  title: 'Складні речення: сполучники'
  instruction: Виправте логічні помилки зі сполучниками.
  items:
    - sentence: Я вчу українську щоб я живу в Києві.
      error: щоб
      answer: бо
      options:
        - щоб
        - бо
        - але
        - чи
      explanation: Тут вказана причина, а не мета.
    - sentence: Ми не пішли гуляти, якщо почався дощ.
      error: якщо
      answer: бо
      options:
        - якщо
        - бо
        - щоб
        - але
      explanation: Дощ — це причина, чому ми не пішли гуляти.
    - sentence: Вона читає щодня, тому знати більше.
      error: тому
      answer: щоб
      options:
        - тому
        - щоб
        - бо
        - якщо
      explanation: Знати більше — це мета дії.
    - sentence: Я подзвоню тобі, щоб матиму вільний час.
      error: щоб
