- type: mark-the-words
  title: 'Дієслова руху в тексті'
  instruction: Знайдіть і позначте всі дієслова руху в тексті.
  text: Ми часто йдемо в парк пішки. Вчора він їхав на роботу машиною. Завтра вони знову підуть у кіно. Я завжди їду в метро дуже швидко. Увечері діти радісно біжать додому. Улітку ми полетимо літаком на відпочинок.
  answers:
    - йдемо
    - їхав
    - підуть
    - їду
    - біжать
    - полетимо

