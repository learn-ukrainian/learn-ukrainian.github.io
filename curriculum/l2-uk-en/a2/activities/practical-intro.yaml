- type: error-correction
  title: 'Типові помилки: відмінки та вид'
  instruction: Знайдіть і виправте одну граматичну помилку в кожному реченні.
  items:
    - sentence: Я зовсім не бачу цю книгу.
      error: книгу
      answer: книги
      options:
        - книгу
        - книги
        - книзі
        - книгою
      explanation: Після заперечення не потрібен родовий відмінок.
    - sentence: Добрий день, пан Юрій!
      error: пан
      answer: пане
      options:
        - пан
        - пане
        - пана
        - пану
      explanation: При звертанні використовуємо кличний відмінок.
    - sentence: Я зараз прочитаю цю статтю.
      error: прочитаю
      answer: читаю
      options:
        - прочитаю
        - читаю
        - читав
        - читатиму
      explanation: Для процесу просто зараз використовується недоконаний вид.
    - sentence: Ми довго зробили це завдання.
      error: зробили
      answer: робили
      options:
        - зробили
        - робили
        - зробимо
        - робитимемо
      explanation: Слово довго вказує на процес, тому потрібен недоконаний вид.
    - sentence: Сьогодні я їду в магазин пішки.
      error: їду
      answer: йду
      options:
        - їду
        - йде
        - йду
        - йдемо
      explanation: Пішки ми йдемо, а не їдемо.
    - sentence: Я п'ю каву, щоб я хочу спати.
      error: щоб
      answer: бо
      options:
        - щоб
        - бо
        - якщо
        - але
      explanation: Тут вказана причина, а не мета.

