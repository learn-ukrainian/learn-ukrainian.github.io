- type: true-false
  title: 'Правда чи міф про граматику'
  instruction: Прочитайте твердження та визначте, чи це правда.
  items:
    - statement: Дієслово доконаного виду може мати форму теперішнього часу.
      correct: false
      explanation: Доконаний вид має тільки минулий і майбутній час.
    - statement: Кличний відмінок показує повагу до людини.
      correct: true
      explanation: Це унікальний культурний знак поваги в українській мові.
    - statement: Після частки не ми часто використовуємо родовий відмінок.
      correct: true
      explanation: Для заперечення об'єкта ми використовуємо родовий відмінок.
    - statement: Сполучник щоб використовується для пояснення мети.
      correct: true
      explanation: Він показує, для чого ми виконуємо певну дію.
    - statement: Слова йти і їхати — це одне й те саме слово для будь-якого руху.
      correct: false
      explanation: Йти — це рух пішки, а їхати — рух транспортом.
    - statement: Перед сполучниками бо, тому що, якщо, щоб завжди ставиться кома.
      correct: true
      explanation: Це важливе правило побудови складного речення.
    - statement: Суржик — це цілком природний етап вивчення мови.
      correct: true
      explanation: Це нормальний перехідний етап для багатьох студентів.
    - statement: Порядок слів в українському реченні дуже строгий і не гнучкий.
      correct: false
      explanation: Завдяки відмінкам порядок слів є дуже вільним і залежить від емоцій.

