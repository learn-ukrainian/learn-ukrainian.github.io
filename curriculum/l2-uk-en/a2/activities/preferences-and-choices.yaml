- type: unjumble
  title: "Складіть речення: Вибір та порівняння"
  instruction: "Поставте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["мені", "дуже", "ця", "подобається", "пісня"]
      answer: "Мені дуже подобається ця пісня."
    - words: ["я", "хотів", "замовити", "би", "борщ"]
      answer: "Я хотів би замовити борщ."
    - words: ["кава", "краща", "чай", "ніж"]
      answer: "Кава краща ніж чай."
    - words: ["йому", "подобається", "не", "чорне", "пальто", "це"]
      answer: "Йому не подобається це чорне пальто."
    - words: ["ми", "віддаємо", "традиціям", "перевагу"]
      answer: "Ми віддаємо перевагу традиціям."
    - words: ["на", "і", "смак", "колір", "не", "товариш", "всяк"]
      answer: "На колір і смак товариш не всяк."
    - words: ["яку", "вибираєте", "каву", "ви"]
      answer: "Яку каву ви вибираєте?"
    - words: ["ця", "менш", "книжка", "цікава"]
      answer: "Ця книжка менш цікава."

- type: error-correction
  title: "Виправте помилки: Називний перевантаження"
  instruction: "Знайдіть і виправте граматичні помилки у вживанні дієслова подобатися та порівнянь."
  items:
    - sentence: "Я подобається ця львівська кава."
      error: "Я"
      answer: "Мені"
      options: ["Мені", "Мене", "Мною", "Моя"]
      explanation: "Дієслово подобатися вимагає давального відмінка для особи експерієнсера."
    - sentence: "Він подобається читати книжки ввечері."
      error: "Він"
      answer: "Йому"
      options: ["Його", "Йому", "Ним", "Він"]
      explanation: "Потрібен давальний відмінок для особи: йому."
    - sentence: "Мені подобається цю нову куртку."
      error: "цю нову куртку"
      answer: "ця нова куртка"
      error_type: "phrase"
      options: ["ця нова куртка", "цієї нової куртки", "цій новій куртці", "цією новою курткою"]
      explanation: "Предмет, який подобається, є підметом і має стояти в називному відмінку."
    - sentence: "Вона віддає перевага зеленому чаю."
      error: "перевага"
      answer: "перевагу"
      options: ["переваги", "перевазі", "перевагу", "перевагою"]
      explanation: "Вираз віддавати перевагу вимагає знахідного відмінка для слова перевага."
    - sentence: "Київ більший як Львів."
      error: "як"
      answer: "ніж"
      options: ["ніж", "що", "чи", "або"]
      explanation: "Для прямого порівняння використовується слово ніж."
    - sentence: "Я хочу би замовити десерт."
      error: "хочу"
      answer: "хотів"
      options: ["хотів", "хотіти", "хоч", "хотіли"]
      explanation: "Правильна форма для ввічливого прохання — я хотів би (для чоловіка) або я хотіла би (для жінки)."
    - sentence: "Ми подобаємося цей старий фільм."
      error: "Ми подобаємося"
      answer: "Нам подобається"
      error_type: "phrase"
      options: ["Нам подобається", "Ми любимо", "Нас подобається", "Ми подобається"]
      explanation: "Особа має бути в давальному відмінку (нам), а дієслово узгоджується з підметом (фільм - подобається)."
    - sentence: "Ця пісня більш краща."
      error: "більш краща"
      answer: "краща"
      error_type: "phrase"
      options: ["краща", "більш хороша", "найбільш краща", "дуже краща"]
      explanation: "Слово краща вже містить порівняння, тому додавати слово більш не потрібно."

- type: mark-the-words
  title: "Знайдіть займенники"
  instruction: "Знайдіть і позначте всі займенники в давальному відмінку експерієнсери."
  text: "Мені дуже подобається це місто. Тобі подобається львівська кава? Йому не подобається цей чорний чай. Нам подобається гуляти в парку. Вам подобається українська музика? Їй подобається читати, а їм подобається спорт."
  answers:
    - "Мені"
    - "Тобі"
    - "Йому"
    - "Нам"
    - "Вам"
    - "Їй"
    - "їм"

- type: true-false
  title: "Правда чи брехня: Правила та культура"
  instruction: "Визначте, чи є ці твердження правильними чи хибними."
  items:
    - statement: "Дієслово подобатися використовується з називним відмінком особи, наприклад Я подобається."
      correct: false
      explanation: "Ні, воно використовується з давальним відмінком, правильно казати Мені подобається."
    - statement: "Фраза я хотів би робить ваше прохання більш ввічливим у ресторані."
      correct: true
      explanation: "Так, це пом'якшує ваше прохання і є культурним стандартом."
    - statement: "У Львові традиційну чашку кави називають філіжанка."
      correct: true
      explanation: "Так, це традиційне галицьке слово для чашки."
    - statement: "Дієслово любити краще використовувати для швидкого вибору десерту в кафе."
      correct: false
      explanation: "Для швидкого естетичного вибору краще використовувати дієслово подобатися."
    - statement: "Приказка На колір і смак товариш не всяк означає, що всі люди мають однакові смаки."
      correct: false
      explanation: "Вона означає протилежне: смаки у всіх різні (To each their own)."
    - statement: "Слово краще може бути як прикметником, так і прислівником."
      correct: true
      explanation: "Так, воно може описувати і предмет (краща книжка), і дію (краще зробити)."
    - statement: "У реченні Мені подобається музика слово музика стоїть у знахідному відмінку."
      correct: false
      explanation: "Воно стоїть у називному відмінку, оскільки є підметом, який виконує дію."
    - statement: "Вираз віддавати перевагу використовується для формального або обдуманого вибору."
      correct: true
      explanation: "Так, це більш формальний аналог слова подобатися."
    - statement: "Жінка повинна казати я хотів би замовити каву."
      correct: false
      explanation: "Жінка використовує форму жіночого роду: я хотіла би."
    - statement: "Слово ніж використовується для порівняння двох предметів."
      correct: true
      explanation: "Так, воно є частиною конструкції краще ніж."
    - statement: "Кава на піску готується дуже швидко в сучасній машині."
      correct: false
      explanation: "Вона готується повільно в спеціальній турці на гарячому піску."
    - statement: "Дієслово вибирати вимагає знахідного відмінка, наприклад вибирати книжку."
      correct: true
      explanation: "Так, це стандартне перехідне дієслово."

