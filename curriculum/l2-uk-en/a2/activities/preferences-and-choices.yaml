version: '1.0'
module: preferences-and-choices
level: a2
inline:
- id: quiz-choose-the-appropriate-preference-choice-verb
  type: quiz
  instruction: Оберіть правильне дієслово або фразу для ситуації
  items:
  - question: Мені ____ подобається кава, ніж чай.
    options:
    - більше
    - дуже
    - багато
    - сильно
    correct: 0
  - question: Ми ____ йти пішки, ніж їхати автобусом.
    options:
    - воліємо
    - обираємо
    - подобаємося
    - вирішуємо
    correct: 0
  - question: 'Марко каже: «Я ____ кіно».'
    options:
    - обираю
    - волію
    - вважаю
    - вирішив
    correct: 0
  - question: Ви ____ рацію, це дуже цікаво.
    options:
    - маєте
    - є
    - були
    - робите
    correct: 0
  - question: Друзі ____ залишитися вдома.
    options:
    - вирішили
    - обрали
    - вважали
    - подобалися
    correct: 0
  - question: Вона ____ дивитися новий фільм, а не йти в парк.
    options:
    - воліє
    - обирає
    - подобається
    - має
    correct: 0
  - question: Мені ____, що завтра буде дощ.
    options:
    - здається
    - вважається
    - воліється
    - думається
    correct: 0
  - question: Я ____ цей фах, бо він перспективний.
    options:
    - обираю
    - вирішую
    - волію
    - здаюся
    correct: 0
- id: fill-in-focus-complete-opinion-sentences-with-correct-connectors-and-instrumental-case-endings
  type: fill-in
  instruction: Вставте правильну форму слова (зверніть увагу на Орудний відмінок та
    сполучники)
  items:
  - sentence: Я вважаю його своїм найкращим ____.
    answer: другом
    options:
    - другом
    - друг
    - друга
  - sentence: Ми вважаємо цей проєкт ____.
    answer: успішним
    options:
    - успішним
    - успішний
    - успішного
  - sentence: Вона вважає себе справжньою ____.
    answer: українкою
    options:
    - українкою
    - українка
    - українку
  - sentence: Я вважаю себе великим ____.
    answer: оптимістом
    options:
    - оптимістом
    - оптиміст
    - оптиміста
  - sentence: Я обираю зелений чай, ____ він гарячий.
    answer: бо
    options:
    - бо
    - ніж
    - але
  - sentence: Я вважаю, що це важливо, ____ що це впливає на наше майбутнє.
    answer: тому
    options:
    - тому
    - бо
    - адже
  - sentence: Мені більше подобається гуляти в парку, ____ сидіти в темному залі.
    answer: ніж
    options:
    - ніж
    - але
    - бо
  - sentence: Я вважаю, що цей телефон чудовий. ____, він має красивий дизайн.
    answer: Крім того
    options:
    - Крім того
    - Тому що
    - Оскільки
- id: match-up-focus-match-agreement-disagreement-phrases-to-various-social-debate-situations
  type: match-up
  instruction: З'єднайте ситуацію з відповідною фразою для дискусії
  pairs:
  - left: Повна згода (емоційно)
    right: Безумовно!
  - left: Поважна згода (формально)
    right: Цілком погоджуюся.
  - left: Згода жінки
    right: Я згодна.
  - left: Ввічлива незгода
    right: Я не зовсім згоден.
  - left: Часткова згода (компроміс)
    right: Можливо, але...
  - left: Сильна незгода (виправлення помилки)
    right: Навпаки, я вважаю...
  - left: Дуже офіційна незгода
    right: Дозвольте не погодитися.
  - left: Баланс двох сторін
    right: З одного боку... З іншого боку...
workbook:
- id: pronoun-verb-match
  type: match-up
  instruction: З'єднайте особовий займенник із правильною формою дієслова «обирати»
  pairs:
  - left: Я
    right: обираю
  - left: Ти
    right: обираєш
  - left: Він / Вона
    right: обирає
  - left: Ми
    right: обираємо
  - left: Ви
    right: обираєте
  - left: Вони
    right: обирають
- id: pronoun-number-sort
  type: group-sort
  instruction: Розподіліть займенники на однину та множину
  groups:
  - label: Однина (Singular)
    items:
    - я
    - ти
    - він
    - вона
    - воно
    - мене
    - мені
  - label: Множина (Plural)
    items:
    - ми
    - ви
    - вони
    - нас
    - нам
    - їх
- id: adjective-noun-instrumental-match
  type: match-up
  instruction: З'єднайте слова у правильні словосполучення в Орудному відмінку (після
    слова «вважати»)
  pairs:
  - left: найкращим
    right: другом
  - left: справжньою
    right: українкою
  - left: успішним
    right: проєктом
  - left: красивим
    right: дизайном
  - left: великим
    right: містом
  - left: цікавою
    right: повістю
  - left: темним
    right: залом
  - left: зеленим
    right: чаєм
- id: unjumble-opinions
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - Мені
    - більше
    - кава,
    - ніж
    - подобається
    - чай.
    correct_order:
    - Мені
    - більше
    - подобається
    - кава,
    - ніж
    - чай.
  - words:
    - вважаю,
    - що
    - важливо.
    - це
    - Я
    correct_order:
    - Я
    - вважаю,
    - що
    - це
    - важливо.
  - words:
    - З
    - боку,
    - дорого.
    - одного
    - це
    correct_order:
    - З
    - одного
    - боку,
    - це
    - дорого.
  - words:
    - волію
    - Я
    - ввечері.
    - читати
    - книги
    correct_order:
    - Я
    - волію
    - читати
    - книги
    - ввечері.
  - words:
    - вважає
    - другом.
    - Він
    - її
    - своїм
    - найкращим
    correct_order:
    - Він
    - вважає
    - її
    - своїм
    - найкращим
    - другом.
  - words:
    - На
    - думку,
    - це
    - вибір.
    - найкращий
    - мою
    correct_order:
    - На
    - мою
    - думку,
    - це
    - найкращий
    - вибір.
- id: true-false-preferences
  type: true-false
  instruction: Правда чи ні? (Граматика та лексика модуля)
  items:
  - statement: Після дієслова «подобатися» ми використовуємо Знахідний відмінок.
    correct: false
    explanation: 'Ми використовуємо Давальний відмінок: «Мені подобається», а не «Мене
      подобається».'
  - statement: Правильно говорити «Я считаю», коли висловлюєш думку.
    correct: false
    explanation: '«Я считаю» — це суржик. Завжди правильно: «Я вважаю».'
  - statement: Після дієслова «воліти» зазвичай іде інфінітив дієслова.
    correct: true
    explanation: 'Наприклад: «Я волію читати книги», а не «Я волію книгу».'
  - statement: Перед словами «тому що», «бо», «ніж» ми завжди ставимо кому.
    correct: true
    explanation: Кома перед цими словами є обов'язковою в українській мові.
  - statement: 'Жінка повинна сказати: «Я переконаний, що це так».'
    correct: false
    explanation: 'Жінка обов''язково скаже з закінченням жіночого роду: «Я переконана».'
  - statement: Після конструкції «вважати когось» ми використовуємо Орудний відмінок
      для характеристики.
    correct: true
    explanation: 'Наприклад: «Я вважаю його своїм найкращим другом».'
