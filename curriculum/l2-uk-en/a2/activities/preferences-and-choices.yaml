version: '1.0'
module: preferences-and-choices
level: a2
inline:
- id: quiz-choose-the-appropriate-preference-choice-verb
  type: quiz
  instruction: Оберіть правильне дієслово за контекстом
  items:
  - question: Мені більше _____ зелений чай, ніж кава.
    options:
    - подобається
    - обирає
    - воліє
    - вирішує
    correct: 0
  - question: Вона _____ поїхати в гори, а не на море.
    options:
    - подобається
    - воліє
    - обирається
    - думає
    correct: 1
  - question: 'Що ти _____ на десерт: торт чи морозиво?'
    options:
    - вирішуєш
    - здається
    - обираєш
    - подобається
    correct: 2
  - question: Він _____ залишитися вдома і читати книгу.
    options:
    - обирає
    - подобається
    - вирішив
    - вважає
    correct: 2
  - question: Їм більше _____ дивитися комедії, ніж драми.
    options:
    - подобається
    - воліють
    - обирають
    - вирішують
    correct: 0
  - question: На сніданок я зазвичай _____ вівсянку.
    options:
    - волію
    - обираю
    - подобається
    - здається
    correct: 1
  - question: Ми _____ піти пішки, а не їхати на таксі.
    options:
    - подобається
    - вважаємо
    - воліємо
    - обираємо
    correct: 2
  - question: Тобі _____ жити в місті чи в селі?
    options:
    - вирішуєш
    - більше подобається
    - краще волієш
    - обираєш
    correct: 1
- id: fill-in-focus-complete-opinion-sentences-with-correct-connectors-and-instrumental-case-endings
  type: fill-in
  instruction: Вставте правильне слово
  items:
  - sentence: Я вважаю його найкращим _____.
    answer: другом
    options:
    - друг
    - другом
    - другу
    - друга
  - sentence: Вона вважає себе _____.
    answer: оптимісткою
    options:
    - оптимістка
    - оптимістці
    - оптимісткою
    - оптимістку
  - sentence: Ми вважаємо цей проєкт _____.
    answer: успішним
    options:
    - успішний
    - успішному
    - успішним
    - успішного
  - sentence: На _____ думку, українська мова дуже красива.
    answer: мою
    options:
    - моя
    - моїй
    - мою
    - моєю
  - sentence: Я обираю зелений чай, _____ він гарячий.
    answer: бо
    options:
    - бо
    - ніж
    - тому
    - але
  - sentence: Мені _____, що завтра буде хороша погода.
    answer: здається
    options:
    - вважається
    - здається
    - думається
    - переконаний
  - sentence: Він переконаний, _____ ми переможемо.
    answer: що
    options:
    - бо
    - тому що
    - що
    - якщо
  - sentence: Я вважаю, що це важливо, _____ це наше майбутнє.
    answer: тому що
    options:
    - тому що
    - щоб
    - ніж
    - хоча
- id: match-up-focus-match-agreement-disagreement-phrases-to-various-social-debate-situations
  type: match-up
  instruction: З'єднайте ситуацію з правильною реакцією
  pairs:
  - left: Коли ви повністю підтримуєте ідею (офіційно)
    right: Цілком погоджуюся
  - left: Коли ви абсолютно впевнені (емоційно)
    right: Безумовно!
  - left: Коли ви хочете сказати, що співрозмовник правий
    right: Ви маєте рацію
  - left: Коли ви хочете ввічливо сказати «ні»
    right: Я не зовсім згоден
  - left: Коли ви бачите і плюси, і мінуси
    right: З одного боку... з іншого боку...
  - left: Коли ви вважаєте, що людина дуже помиляється
    right: Навпаки
  - left: Коли ви погоджуєтеся, але є одне «але»
    right: Це правда, але...
  - left: Коли ви не згодні (дуже офіційно)
    right: Дозвольте не погодитися
workbook:
- type: fill-in
  instruction: Вставте правильне слово в діалог
  items:
  - sentence: — Ти маєш _____.
    answer: рацію
    options:
    - правду
    - рацію
    - думку
    - згоду
  - sentence: — Мені _____, що він не прийде.
    answer: здається
    options:
    - вважається
    - думається
    - здається
    - бачиться
  - sentence: — Я не зовсім _____, це занадто дорого.
    answer: згодна
    options:
    - згоден
    - згодна
    - згодні
    - згодне
  - sentence: — Я _____, що нам треба їхати.
    answer: вважаю
    options:
    - вважаю
    - считаю
    - вирішую
    - обираю
  - sentence: — _____, це чудова ідея!
    answer: Безумовно
    options:
    - Навпаки
    - Інакше
    - Безумовно
    - По-перше
  - sentence: — На мою _____, ця книга краща.
    answer: думку
    options:
    - думка
    - думку
    - думці
    - думкою
- type: group-sort
  instruction: Розподіліть фрази на згоду та незгоду
  groups:
  - label: Згода
    items:
    - Безумовно!
    - Ви маєте рацію
    - Саме так!
    - Я згоден
    - Цілком погоджуюся
  - label: Незгода
    items:
    - Я думаю інакше
    - Я не зовсім згодна
    - Дозвольте не погодитися
    - Навпаки
    - Можливо, але...
- type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - думку,
    - На
    - це
    - мою
    - гарно.
    correct_order:
    - На
    - мою
    - думку,
    - це
    - гарно.
  - words:
    - більше
    - Мені
    - подобається
    - чай.
    - зелений
    correct_order:
    - Мені
    - більше
    - подобається
    - зелений
    - чай.
  - words:
    - себе
    - вважаю
    - Я
    - оптимістом.
    correct_order:
    - Я
    - вважаю
    - себе
    - оптимістом.
  - words:
    - згоден
    - Я
    - тобою.
    - не
    - зовсім
    - з
    correct_order:
    - Я
    - не
    - зовсім
    - згоден
    - з
    - тобою.
  - words:
    - переконана,
    - Вона
    - це
    - що
    - правильно.
    correct_order:
    - Вона
    - переконана,
    - що
    - це
    - правильно.
  - words:
    - правда,
    - Це
    - занадто
    - але
    - це
    - дорого.
    correct_order:
    - Це
    - правда,
    - але
    - це
    - занадто
    - дорого.
- type: true-false
  instruction: Правда чи ні? (Правила української мови)
  items:
  - statement: Слово «считаю» — це правильне українське слово.
    correct: false
    explanation: Ні, це типовий російський суржик. Правильно казати «вважаю».
  - statement: Дієслово «подобатися» використовується з давальним відмінком.
    correct: true
    explanation: 'Так, ми завжди кажемо: мені (Давальний відмінок) подобається.'
  - statement: 'Жінка каже: «я згоден», а чоловік: «я згодна».'
    correct: false
    explanation: 'Навпаки: чоловік — «я згоден», жінка — «я згодна».'
  - statement: Після «вважати себе» ми використовуємо орудний відмінок (наприклад,
      оптимістом).
    correct: true
    explanation: Так, ця конструкція обов'язково вимагає орудного відмінка.
  - statement: 'Ми кажемо: «я обираю поїхати в кіно».'
    correct: false
    explanation: 'Ні, з дієсловами краще використовувати «вирішити»: я вирішив поїхати.'
  - statement: Слово «навпаки» означає, що ви повністю не згодні.
    correct: true
    explanation: Так, це сильне слово для висловлення протилежної думки.
- type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: '— Тобі подобається ця пісня?

      — _____, вона чудова!'
    options:
    - Безумовно
    - Навпаки
    - Інакше
    - По-перше
    correct: 0
  - question: '— Я думаю, що це погана ідея.

      — _____, я вважаю, що вона геніальна.'
    options:
    - Безумовно
    - Навпаки
    - Саме так
    - З одного боку
    correct: 1
  - question: Я _____ працювати в тиші.
    options:
    - волію
    - здається
    - подобаюся
    - вважаю
    correct: 0
  - question: Він _____ себе хорошим лікарем.
    options:
    - вважає
    - обирає
    - воліє
    - думає
    correct: 0
  - question: _____, жити в місті краще.
    options:
    - На мою думку
    - Мені здається
    - Я згодна
    - Ви маєте рацію
    correct: 0
  - question: Я не погоджуюся, я думаю _____.
    options:
    - інакше
    - навпаки
    - безумовно
    - тому що
    correct: 0
