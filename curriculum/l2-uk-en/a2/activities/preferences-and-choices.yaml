- type: quiz
  title: "Граматика: Подобатися чи любити?"
  instruction: "Оберіть правильну відповідь на кожне запитання про вираження вподобань."
  items:
    - question: "Який відмінок потрібен для особи, яка відчуває вподобання з дієсловом подобатися?"
      explanation: "Дієслово подобатися вимагає давального відмінка для особи експерієнсера."
      options:
        - text: "Називний (я, ти, він)"
          correct: false
        - text: "Знахідний (мене, тебе, його)"
          correct: false
        - text: "Давальний (мені, тобі, йому)"
          correct: true
        - text: "Місцевий (на мені, на тобі)"
          correct: false
    - question: "Який відмінок потрібен для предмета, який подобається?"
      explanation: "Предмет, який подобається, є підметом, тому він стоїть у називному відмінку."
      options:
        - text: "Знахідний відмінок"
          correct: false
        - text: "Називний відмінок"
          correct: true
        - text: "Родовий відмінок"
          correct: false
        - text: "Орудний відмінок"
          correct: false
    - question: "Як правильно сказати I like this book українською мовою?"
      explanation: "Особа (мені) в давальному, предмет (ця книжка) в називному."
      options:
        - text: "Я подобаюся цю книжку."
          correct: false
        - text: "Я люблю ця книжка."
          correct: false
        - text: "Мені подобається цю книжку."
          correct: false
        - text: "Мені подобається ця книжка."
          correct: true
    - question: "Яке дієслово краще використовувати для глибокої, тривалої прихильності?"
      explanation: "Дієслово любити описує глибоку, стабільну любов."
      options:
        - text: "подобатися"
          correct: false
        - text: "любити"
          correct: true
        - text: "вибирати"
          correct: false
        - text: "хотіти"
          correct: false
    - question: "Як правильно перекласти фразу I would like to order coffee (male)?"
      explanation: "Чоловік каже я хотів би."
      options:
        - text: "Я хочу замовляю каву."
          correct: false
        - text: "Я хотіла би замовити каву."
          correct: false
        - text: "Я хотів би замовити каву."
          correct: true
        - text: "Мені хотіти замовити каву."
          correct: false
    - question: "Що означає формальне словосполучення віддавати перевагу?"
      explanation: "Віддавати перевагу означає робити свідомий, обдуманий вибір."
      options:
        - text: "Робити спонтанний вибір дуже швидко."
          correct: false
        - text: "Робити свідомий, обдуманий вибір."
          correct: true
        - text: "Не любити щось дуже сильно."
          correct: false
        - text: "Замовляти каву у відомому кафе."
          correct: false
    - question: "Яке слово використовується як міст для порівняння двох предметів?"
      explanation: "Слово ніж використовується для порівняння (краще ніж)."
      options:
        - text: "або"
          correct: false
        - text: "ніж"
          correct: true
        - text: "як"
          correct: false
        - text: "чи"
          correct: false
    - question: "Як українською мовою буде приказка To each their own?"
      explanation: "Приказка звучить На колір і смак товариш не всяк."
      options:
        - text: "На колір і смак товариш не всяк."
          correct: true
        - text: "Кава краща ніж чай завжди."
          correct: false
        - text: "Кожен любить своє місто найбільше."
          correct: false
        - text: "Мені подобається все нове і цікаве."
          correct: false

- type: fill-in
  title: "Вставте пропущене слово: Вподобання"
  instruction: "Оберіть правильне слово, щоб доповнити речення."
  items:
    - sentence: "Я хотів _____ замовити філіжанку кави."
      answer: "би"
      options: ["би", "б", "був", "бути"]
    - sentence: "_____ подобається ця нова пісня."
      answer: "Мені"
      options: ["Я", "Мені", "Мене", "Мною"]
    - sentence: "Чи _____ подобається Львівська кава?"
      answer: "тобі"
      options: ["ти", "тебе", "тобі", "тобою"]
    - sentence: "Ця книжка _____ ніж той старий журнал."
      answer: "краща"
      options: ["краще", "кращий", "краща", "кращі"]
    - sentence: "Мені подобається чай більше _____ кава."
      answer: "ніж"
      options: ["ніж", "як", "що", "або"]
    - sentence: "Він віддає _____ класичній музиці."
      answer: "перевагу"
      options: ["вибір", "перевагу", "смак", "колір"]
    - sentence: "Я глибоко _____ свою сім'ю."
      answer: "люблю"
      options: ["подобаюся", "люблю", "вибираю", "хочу"]
    - sentence: "Йому не дуже _____ це чорне пальто."
      answer: "подобається"
      options: ["любить", "подобається", "хоче", "вибирає"]
    - sentence: "На колір і _____ товариш не всяк."
      answer: "смак"
      options: ["запах", "вибір", "смак", "звук"]
    - sentence: "Квартира в центрі _____ велика, ніж у передмісті."
      answer: "менш"
      options: ["краще", "більш", "менш", "дуже"]
    - sentence: "Я _____ би вибрати десерт, будь ласка."
      answer: "хотіла"
      options: ["хотів", "хотіла", "хочу", "хотіти"]
    - sentence: "Нам _____ подобається це тихе місто."
      answer: "дуже"
      options: ["багато", "дуже", "краще", "більш"]

