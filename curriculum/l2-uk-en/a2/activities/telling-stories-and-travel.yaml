- id: wb-group-sort-motion-verbs
  type: group-sort
  instruction: Розподіліть дієслова на ті, що описують процес (недоконаний вид), і
    ті, що вказують на завершену дію (доконаний вид).
  groups:
  - label: Процес / Фон (Недоконаний)
    items:
    - їхати
    - їздити
    - ходити
    - сидіти
    - чекати
    - пити
  - label: Результат / Раптова дія (Доконаний)
    items:
