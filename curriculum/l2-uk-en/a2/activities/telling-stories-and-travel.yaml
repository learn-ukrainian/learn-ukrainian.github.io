inline:
- id: quiz-past-trip-comprehension
  type: quiz
  instruction: Дайте відповідь на запитання за текстом про подорож Андрія.
  items:
  - question: Що вчора трапилося на вокзалі?
    options:
    - Андрій зустрів старого друга.
    - Андрій загубив квиток на потяг.
    - Андрій запізнився на потяг.
    - Андрій довго шукав свій вагон.
    correct: 0
  - question: Що Андрій робив, коли подзвонив друг?
    options:
    - Сидів на вокзалі і пив каву.
    - Купував квиток на потяг.
    - Сів у потяг і читав книгу.
    - Гуляв поруч з вокзалом.
    correct: 0
  - question: Куди вирішив поїхати герой тексту минулого тижня?
    options:
    - До Києва.
    - До Одеси.
    - В Карпати.
    - До Львова.
    correct: 0
  - question: Що він зробив спочатку?
    options:
    - Купив квиток і зібрав речі.
    - Приїхав на вокзал.
    - Сів у вагон.
    - Почитав книгу.
    correct: 0
  - question: Що робили інші люди, тим часом як він читав книгу?
    options:
    - Шукали місця, а діти сміялися.
    - Пили чай і дивилися у вікно.
    - Спали у вагоні.
    - Купували сувеніри.
    correct: 0
  - question: Яке дієслово показує раптову подію у тексті?
    options:
    - Потяг рушив.
    - Діти сміялися.
    - Я читав книгу.
    - Люди шукали місця.
    correct: 0
  - question: Що герой зробив після того, як потяг рушив?
    options:
    - Дивився у вікно і пив чай.
    - Купив квиток.
    - Зібрав речі.
    - Приїхав на вокзал.
    correct: 0
  - question: Які враження залишилися після поїздки?
    options:
    - Йому все дуже сподобалося.
    - Він не хотів зупинятися у друзів.
    - Він загубив квиток.
    - Подорож була нецікава.
    correct: 0
- id: match-up-match-travel-situations-with-the-correct-motion-verb-and-preposition-combination-gen-acc
  type: match-up
  instruction: З'єднайте дієслово руху та транспорт із правильним напрямком.
  pairs:
  - left: ми поїдемо автобусом
    right: до Києва
  - left: вони полетять літаком
    right: на море
  - left: завтра я поїду потягом
    right: до брата
  - left: моя сестра прилетіла
    right: з Лондона
  - left: сьогодні ввечері ми поїдемо
    right: на вокзал
  - left: влітку ми поїдемо потягом
    right: в Карпати
  - left: вчора туристи приїхали
    right: до готелю
  - left: минулого тижня вони літали
    right: до Парижа
- id: fill-in-complete-a-travel-narrative-by-choosing-the-correct-verb-form-aspect-and-motion-verb-type-for-each-blank
  type: fill-in
  instruction: Вставте правильне дієслово, звертаючи увагу на вид (доконаний / недоконаний).
  items:
  - sentence: Минулого літа я ____ до Львова і вже повернувся.
    answer: їздив
    options:
    - їздив
    - поїхав
    - доїхав
  - sentence: Спочатку ми сіли у потяг і змогли ____ туди дуже швидко.
    answer: доїхати
    options:
    - доїхати
    - їхати
    - поїхати
  - sentence: У місті ми вирішили ____ в маленькому готелі.
    answer: зупинитися
    options:
    - зупинитися
    - зупинятися
    - стояти
  - sentence: Ми багато ____ містом і фотографували старі будинки.
    answer: ходили
    options:
    - ходили
    - пішли
    - йшли
  - sentence: Наступного дня ми ____ сувеніри для друзів.
    answer: купили
    options:
    - купили
    - купували
    - купували б
  - sentence: Також ми ____ найсмачніший український борщ.
    answer: з'їли
    options:
    - з'їли
    - їли
    - їстимемо
  - sentence: З нами ____ дуже цікава історія на вокзалі.
    answer: трапилася
    options:
    - трапилася
    - траплялася
    - трапилося
  - sentence: Мені дуже ____ ця подорож, і я хочу поїхати ще раз.
    answer: сподобалася
    options:
    - сподобалася
    - подобалася
    - сподобалося
