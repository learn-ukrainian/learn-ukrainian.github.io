- id: wb-error-correction-aspects-motion
  type: error-correction
  instruction: Знайдіть і виправте помилку вживання дієслів або прийменників.
  items:
  - sentence: Я вирішив поїхати в Карпати і зупинятися у друзів.
    error: зупинятися
    correction: зупинитися
    error_type: word
    options:
    - зупинитися
    - стояти
    - залишатися
    explanation: Для одноразової, запланованої дії після «вирішив» використовується
      дієслово доконаного виду «зупинитися».
  - sentence: Зазвичай ми поїдемо туди щоліта.
    error: поїдемо
    correction: їздимо
    error_type: word
    options:
    - їздимо
    - їхали
    - приїдемо
    explanation: Зі словами «зазвичай» і «щоліта» потрібно використовувати дієслово
      недоконаного виду для повторюваних поїздок («їздимо»).
  - sentence: Вона прилетіла на Іспанії.
    error: на Іспанії
    correction: з Іспанії
    error_type: phrase
    options:
    - з Іспанії
    - до Іспанії
    - в Іспанії
    explanation: Щоб сказати, звідки людина прибула, потрібен прийменник «з» + родовий
      відмінок.
  - sentence: Тим часом потяг рушав.
    error: рушав
    correction: рушив
    error_type: word
    options:
    - рушив
    - рушає
    - рушать
    explanation: Зазвичай відправлення потяга описується як раптова, завершена подія,
      тому використовуємо доконаний вид «рушив» (або «раптом рушив»).
  - sentence: Ми купимо квиток на вокзалу.
    error: на вокзалу
    correction: на вокзалі
    error_type: phrase
    options:
    - на вокзалі
    - у вокзал
    - з вокзалу
    explanation: Для позначення місця дії (де?) використовується прийменник «на» +
      місцевий відмінок («на вокзалі»).
  - sentence: Я сидів у вагоні і прочитав книгу.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - прочитаю
    - читаю
    explanation: «Сидів» — це процес (недоконаний вид), тому паралельна дія також
      має бути недоконаного виду («читав»).
  - sentence: Моя подорож починала тоді, коли я купив квиток.
    error: починала
    correction: почалася
    error_type: word
    options:
    - почалася
    - починає
    - почне
    explanation: «Купив» — доконаний вид (результат), отже подорож «почалася» (теж
      доконаний вид, раптова зміна стану).
  - sentence: Вони хочуть розповісти про їх подорож.
    error: їх
    correction: свою
    error_type: word
    options:
    - свою
    - свої
    - свій
    explanation: В українській мові, якщо займенник відноситься до підмета речення
      («Вони»), використовується займенник «свій» (про свою подорож).
