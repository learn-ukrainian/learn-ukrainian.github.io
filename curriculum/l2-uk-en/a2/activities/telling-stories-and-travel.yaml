    - приїхати
    - зупинитися
    - рушити
    - купити
- id: wb-true-false-verbs-of-motion
  type: true-false
  instruction: Правда чи ні? Визначте, чи правильно пояснено використання дієслів
    руху.
  items:
  - statement: Речення «Я їздив до Києва» означає, що поїздка вже закінчилася, і ви
      повернулися.
    correct: true
    explanation: Дієслово «їздив» використовується для завершеної подорожі туди й
      назад.
  - statement: Речення «Мій брат поїхав до Києва» означає, що він вже повернувся додому.
    correct: false
    explanation: «Поїхав» означає, що він вирушив, і, можливо, досі там. Для завершеної
      поїздки використовують «їздив».
  - statement: Дієслова «був», «сидів», «пив» — це дієслова недоконаного виду, які
      створюють фон для історії.
    correct: true
    explanation: Так, ці дієслова описують процес і створюють картину подій.
  - statement: Ми кажемо «ми поїдемо літаком», використовуючи орудний відмінок для
      транспорту.
    correct: true
    explanation: 'Транспортний засіб завжди ставиться в орудному відмінку (ким? чим?):
      літаком, потягом, автобусом.'
  - statement: Для напрямку до міста використовується прийменник «на» (наприклад,
      на Київ).
    correct: false
    explanation: 'З містами та країнами використовується прийменник «до» + родовий
      відмінок: до Києва, до Львова.'
  - statement: Щоб описати раптову подію, ми використовуємо дієслова недоконаного
      виду.
    correct: false
    explanation: Для раптових подій і результатів потрібні дієслова доконаного виду
      (наприклад, подзвонив, рушив).
  - statement: Слово «тим часом» допомагає показати паралельні дії, які відбуваються
      одночасно.
    correct: true
    explanation: Це слово з'єднує події, що тривають в один і той самий час.
  - statement: Фраза «Мені дуже сподобалось» містить дієслово доконаного виду, що
      підсумовує враження.
    correct: true
    explanation: Дієслово «сподобалось» показує фінальний результат ваших вражень
      від подорожі.
