version: '1.0'
module: telling-stories-and-travel
level: a2
inline:
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть правильний вид дієслова (доконаний чи недоконаний) за контекстом.
  items:
  - question: Вчора ввечері ми довго _____ телевізор.
    options:
    - дивилися
    - подивилися
    - подивимося
    - дивитися
    correct: 0
  - question: Раптом хтось гучно _____ у двері.
    options:
    - постукав
    - стукав
    - стукатиме
    - стукати
    correct: 0
  - question: Нарешті я _____ свій загублений квиток!
    options:
    - знайшов
    - шукав
    - знаходив
    - шукати
    correct: 0
  - question: Розкажи мені, що _____ на вокзалі?
    options:
    - трапилося
    - траплялося
    - трапитися
    - траплятися
    correct: 0
  - question: Ми повільно _____ по місту і розмовляли.
    options:
    - гуляли
    - погуляли
    - погуляти
    - гулятимемо
    correct: 0
  - question: Коли я побачив море, я дуже _____.
    options:
    - здивувався
    - дивувався
    - дивуюся
    - здивуюся
    correct: 0
- id: match-up-travel-verbs
  type: match-up
  instruction: З'єднайте життєву ситуацію з правильною фразою.
  pairs:
  - left: Рух до столиці України
    right: їхати до Києва
  - left: Відпочинок біля води влітку
    right: їхати на море
  - left: Купити пропуск на потяг
    right: йти на вокзал
  - left: Почати свою подорож з міста
    right: виїхати зі Львова
  - left: Подорожувати високо в небі
    right: летіти літаком
  - left: Подорожувати по залізниці
    right: їхати потягом
- id: fill-in-travel-narrative
  type: fill-in
  instruction: Вставте правильне дієслово або слово-зв'язку у розповідь про подорож.
  items:
  - sentence: Минулого року я _____ на море потягом.
    answer: їздив
    options:
    - їздив
    - поїхав
    - ходив
    - пішов
  - sentence: Спочатку ми довго _____ до нового міста.
    answer: їхали
    options:
    - їхали
    - доїхали
    - ходили
    - летіли
  - sentence: Коли ми нарешті _____, ми швидко знайшли свій готель.
    answer: приїхали
    options:
    - приїхали
    - їхали
    - ходили
    - поїхали
  - sentence: Вдень ми багато _____ по пляжу і просто дивилися на воду.
    answer: ходили
    options:
    - ходили
    - пішли
    - їздили
    - поїхали
  - sentence: _____ хтось гучно постукав у наші двері.
    answer: Раптом
    options:
    - Раптом
    - Спочатку
    - Тим часом
    - Нарешті
  - sentence: Мені дуже _____ ця коротка подорож!
    answer: сподобалася
    options:
    - сподобалася
    - подобалася
    - подобатися
    - сподобатися
workbook:
- id: true-false-reading
  type: true-false
  instruction: Прочитайте текст про подорож Марка та визначте, чи правдиві твердження.
    «Влітку Марко їздив на море. Він довго їхав потягом. Спочатку він вирішив зупинитися
    в готелі біля пляжу. Кожного дня Марко багато ходив і дивився на хвилі. Раптом
    одного вечора пішов сильний дощ. Але Марко не злякався. Нарешті, він купив сувеніри
    і повернувся додому. Ця подорож йому дуже сподобалася!»
  items:
  - statement: Марко подорожував до моря літаком.
    correct: false
    explanation: Марко їхав потягом, а не літаком.
  - statement: Марко їздив на море влітку.
    correct: true
    explanation: Так, текст починається зі слова «Влітку».
  - statement: Він зупинився у своїх друзів.
    correct: false
    explanation: Марко вирішив зупинитися в готелі біля пляжу.
  - statement: Кожного дня Марко багато ходив.
    correct: true
    explanation: У тексті написано, що він багато ходив і дивився на хвилі.
  - statement: Погода завжди була сонячна і тепла.
    correct: false
    explanation: Раптом одного вечора пішов сильний дощ.
  - statement: Марко купив сувеніри в кінці своєї подорожі.
    correct: true
    explanation: Так, нарешті він купив сувеніри і повернувся додому.
- id: group-sort-aspects
  type: group-sort
  instruction: 'Розподіліть дієслова за видом: недоконаний (довгий процес) чи доконаний
    (швидкий результат).'
  groups:
  - label: Доконаний вид (Результат)
    items:
    - поїхати
    - зупинитися
    - розповісти
    - трапитися
    - доїхати
    - сподобатися
  - label: Недоконаний вид (Процес)
    items:
    - їхати
    - зупинятися
    - розповідати
    - траплятися
    - доїжджати
    - подобатися
