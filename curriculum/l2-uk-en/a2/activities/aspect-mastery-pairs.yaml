  title: Знайдіть пару - недоконаний і доконаний вид
  pairs:
  - left: готувати
    right: приготувати
  - left: мити
    right: помити
  - left: дзвонити
    right: подзвонити
  - left: купувати
    right: купити
  - left: знаходити
    right: знайти
  - left: забувати
    right: забути
  - left: будувати
    right: побудувати
  - left: питати
    right: запитати
  - left: відповідати
