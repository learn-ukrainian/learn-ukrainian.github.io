  instruction: Розподіліть елементи за групами.
- type: error-correction
  title: Знайдіть і виправте помилки у формах
  items:
  - sentence: Я хочу зговорити тобі правду.
    error: зговорити
    answer: сказати
    error_type: word
    options:
    - сказати
    - говорити
    - кажу
    - скажу
    explanation: Доконаний вид від дієслова 'говорити' - 'сказати'.
  - sentence: Ти можеш побрати мій олівець.
    error: побрати
    answer: взяти
    error_type: word
    options:
    - взяти
    - брати
    - візьму
    - беру
    explanation: Доконаний вид від дієслова 'брати' - 'взяти'.
  - sentence: Ми довго пошукали правильну дорогу.
    error: пошукали
    answer: шукали
    error_type: word
    options:
    - шукали
    - знайшли
    - шукаємо
    - шукати
    explanation: Слово 'довго' вимагає недоконаного виду.
  - sentence: Я раптом відповідав на всі питання.
    error: відповідав
    answer: відповів
    error_type: word
    options:
    - відповів
    - відповідаю
    - відповім
    - відповісти
    explanation: Слово 'раптом' вказує на результат, потрібен доконаний вид.
  - sentence: Вона забуває мій номер вчора.
    error: забуває
    answer: забула
    error_type: word
    options:
    - забула
    - забуде
    - забувала
    - забути
    explanation: У минулому часі про один факт використовуємо форму 'забула'.
  - sentence: Ми будемо побудувати новий магазин.
    error: побудувати
    answer: будувати
    error_type: word
    options:
    - будувати
    - побудуємо
    - будували
    - будуємо
    explanation: Зі словом 'будемо' використовується тільки недоконаний вид.
  instruction: Знайдіть і виправте помилку в реченні.
