- type: mark-the-words
  title: Знайдіть дієслова доконаного виду
  instruction: Прочитайте текст і знайдіть усі дієслова доконаного виду (результат).
  text: Вчора я пішов на ринок і купив свіжі продукти. Потім я повернувся додому і
    приготував смачну вечерю. Мої друзі прийшли в гості, і ми чудово провели час.
    Я нарешті відпочив.
  answers:
  - пішов
  - купив
  - повернувся
  - приготував
  - прийшли
  - провели
  - відпочив
- type: fill-in
  title: Доповніть діалог правильними дієсловами
  items:
  - sentence: 'Олена: Ти вже подзвонив мамі? Тарас: Ні, ще не подзвонив.'
    answer: подзвонив
    options:
    - подзвонив
    - дзвонив
    - подзвоню
    - дзвоню
  - sentence: 'Тарас: А ти часто дзвониш їй? Олена: Так, кожен день.'
    answer: дзвониш
    options:
    - дзвониш
    - подзвониш
    - дзвонив
    - подзвонив
  - sentence: 'Олена: Ми довго вибирали місце для будинку. Тарас: І нарешті вибрали?'
    answer: вибрали
    options:
    - вибрали
    - вибирали
    - виберемо
    - вибираємо
  - sentence: 'Тарас: Я буду допомагати вам у суботу. Олена: Дякую!'
    answer: допомагати
    options:
    - допомагати
    - допомогти
    - допомагаю
    - допоможу
  - sentence: 'Олена: Ми плануємо побудувати дім швидко. Тарас: Це чудово.'
    answer: побудувати
    options:
    - побудувати
    - будувати
    - побудували
    - будували
  - sentence: 'Тарас: Ти пам''ятаєш її номер? Олена: Ой, я забула!'
    answer: забула
    options:
    - забула
    - забувала
    - забуду
    - забуваю
  - sentence: 'Олена: Чому ти не купив хліб? Тарас: Я забув.'
    answer: купив
    options:
    - купив
    - купував
    - купить
    - купує
  - sentence: 'Тарас: Завтра я обов''язково куплю все необхідне. Олена: Добре.'
    answer: куплю
    options:
    - куплю
    - купую
    - купив
    - купував
