  instruction: З'єднайте відповідні елементи.
- type: group-sort
  title: Розподіліть дієслова за видом
  groups:
  - name: Недоконаний вид (процес)
    items:
    - робити
    - писати
    - купувати
    - мити
    - знаходити
  - name: Доконаний вид (результат)
    items:
    - зробити
    - написати
    - купити
    - помити
    - знайти
  instruction: Розподіліть елементи за групами.
- type: fill-in
  title: Вставте правильне дієслово (теперішній чи майбутній час)
  items:
  - sentence: Зараз я готую вечерю, а завтра я приготую обід.
    answer: приготую
    options:
    - приготую
    - готую
    - приготував
    - готував
  - sentence: Кожен день вона купує каву, але сьогодні вона купить чай.
    answer: купить
    options:
    - купить
    - купує
    - купила
    - купувала
  - sentence: Ми довго будували дім, і нарешті ми побудували його.
    answer: побудували
    options:
    - побудували
    - будували
    - побудуємо
    - будуємо
  - sentence: Я часто забуваю паролі, але цей я точно не забуду.
    answer: забуду
    options:
    - забуду
    - забуваю
    - забув
    - забував
  - sentence: Він завжди знаходить цікаві книги, і вчора він знайшов ще одну.
    answer: знайшов
    options:
    - знайшов
    - знаходить
    - знаходив
    - знайде
  - sentence: Зазвичай я дзвоню мамі вранці, але завтра я подзвоню ввечері.
    answer: подзвоню
    options:
    - подзвоню
    - дзвоню
    - подзвонив
    - дзвонив
  - sentence: Вони зараз миють посуд, а потім помиють вікна.
    answer: помиють
    options:
    - помиють
    - миють
    - помили
    - мили
  - sentence: Ти часто питаєш про це, але завтра ти запитаєш вчителя.
    answer: запитаєш
    options:
    - запитаєш
    - питаєш
    - запитав
    - питав
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: error-correction
  title: Виправте помилки - теперішній час або префікси
  items:
  - sentence: Зараз я зроблю домашнє завдання.
    error: зроблю
    answer: роблю
    error_type: word
    options:
    - роблю
    - зробив
    - робив
    - зробити
    explanation: Доконаний вид не вживається в теперішньому часі для процесу.
  - sentence: Кожного ранку вона купить свіже молоко.
    error: купить
    answer: купує
    error_type: word
    options:
    - купує
    - купила
    - купувала
    - купити
    explanation: Для регулярних дій використовуємо недоконаний вид.
  - sentence: Він раптом знаходить ключі на столі.
    error: знаходить
    answer: знайшов
    error_type: word
    options:
    - знайшов
    - знайде
    - знаходив
    - знайти
    explanation: Слово 'раптом' вказує на результат у минулому, потрібен доконаний
      вид.
  - sentence: Вона хоче змалювати гарну картину.
    error: змалювати
    answer: намалювати
    error_type: word
    options:
    - намалювати
    - малювати
    - намалює
    - малює
    explanation: Префікс 'з-' не універсальний. Доконаний вид від 'малювати' - 'намалювати'.
  - sentence: Я буду написати листа завтра.
    error: написати
    answer: писати
    error_type: word
    options:
    - писати
    - напишу
    - писав
    - пишу
    explanation: Після слова 'буду' використовується тільки недоконаний вид.
  - sentence: Ми змиємо посуд після вечері.
    error: змиємо
    answer: помиємо
    error_type: word
    options:
    - помиємо
    - миємо
    - змили
    - мили
    explanation: Доконаний вид від дієслова 'мити' - 'помити', а не 'змити'.
  instruction: Знайдіть і виправте помилку в реченні.
- type: quiz
  title: Оберіть правильний вид дієслова за контекстом
  items:
  - question: Яке слово вказує на те, що дія відбувається регулярно?
    explanation: Слово 'часто' вказує на регулярність і потребує недоконаного виду.
    options:
    - text: часто
      correct: true
    - text: раптом
      correct: false
    - text: вже
      correct: false
    - text: нарешті
      correct: false
  - question: Якщо ви описуєте результат, який вид ви використовуєте?
    explanation: Доконаний вид завжди описує результат дії.
    options:
    - text: доконаний вид
      correct: true
    - text: недоконаний вид
      correct: false
    - text: теперішній час
      correct: false
    - text: майбутній час
      correct: false
  - question: Яке речення правильне для опису дії в процесі в минулому?
    explanation: Речення 'Я готував вечерю' описує тривалий процес у минулому.
    options:
    - text: Я готував вечерю.
      correct: true
    - text: Я приготував вечерю.
      correct: false
    - text: Я приготую вечерю.
      correct: false
    - text: Я буду приготувати вечерю.
      correct: false
  - question: Доконаний вид від дієслова 'брати' — це...
    explanation: Слово 'взяти' - це доконаний вид для дієслова 'брати'.
    options:
    - text: взяти
      correct: true
    - text: побрати
      correct: false
    - text: зібрати
      correct: false
    - text: набрати
      correct: false
  - question: Як правильно сказати 'I will read' (focus on process)?
    explanation: Для процесу в майбутньому використовується конструкція 'буду' + недоконаний
      вид.
    options:
    - text: я буду читати
      correct: true
    - text: я прочитаю
      correct: false
    - text: я буду прочитати
      correct: false
    - text: я читаю
      correct: false
  - question: Яке дієслово неможливо використати в теперішньому часі?
    explanation: Слово 'купити' - це доконаний вид, воно не має форми теперішнього
      часу.
    options:
    - text: купити
      correct: true
    - text: купувати
      correct: false
    - text: робити
      correct: false
    - text: мити
      correct: false
  - question: Який префікс утворює доконаний вид дієслова 'мити'?
    explanation: Доконаний вид — 'помити'.
    options:
    - text: по-
      correct: true
    - text: з-
      correct: false
    - text: на-
      correct: false
    - text: при-
      correct: false
  - question: Якщо дія тривала дві години, який вид потрібно вибрати?
    explanation: Для позначення тривалості (довго, дві години) використовують недоконаний
      вид.
    options:
    - text: недоконаний вид
      correct: true
    - text: доконаний вид
      correct: false
    - text: будь-який вид
      correct: false
    - text: тільки минулий час
      correct: false
