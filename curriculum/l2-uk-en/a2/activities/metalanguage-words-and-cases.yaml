version: '1.0'
module: metalanguage-words-and-cases
level: a2
inline:
- id: match-up-match-ukrainian-grammar-terms-to-their-english-equivalents
  type: match-up
  instruction: З'єднайте граматичні терміни з їхніми перекладами
  pairs:
  - left: іменник
    right: noun
  - left: прикметник
    right: adjective
  - left: дієслово
    right: verb
  - left: однина
    right: singular
  - left: множина
    right: plural
  - left: чоловічий рід
    right: masculine gender
  - left: жіночий рід
    right: feminine gender
  - left: середній рід
    right: neuter gender
- id: group-sort-sort-words-into-parts-of-speech-imennyk-prykmetnyk-diieslovo-etc
  type: group-sort
  instruction: Розподіліть слова за частинами мови
  groups:
  - label: Іменник (Noun)
    items:
    - місто
    - лікар
    - брат
  - label: Прикметник (Adjective)
    items:
    - теплий
    - новий
    - великий
  - label: Дієслово (Verb)
    items:
    - читати
    - знати
    - працювати
  - label: Займенник (Pronoun)
    items:
    - ми
    - я
    - цей
  - label: Прислівник (Adverb)
    items:
    - швидко
    - тут
    - завтра
- id: fill-in-complete-case-questions-rodovyi
  type: fill-in
  instruction: Вставте правильні питання для кожного відмінка
  items:
  - sentence: Називний відмінок — хто? ____?
    answer: що
    options:
    - що
    - чого
    - чому
    - чим
  - sentence: Родовий відмінок — кого? ____?
    answer: чого
    options:
    - що
    - чого
    - чому
    - чим
  - sentence: Давальний відмінок — ____? чому?
    answer: кому
    options:
    - хто
    - кого
    - кому
    - ким
  - sentence: Знахідний відмінок — кого? ____?
    answer: що
    options:
    - що
    - чого
    - чому
    - чим
  - sentence: Орудний відмінок — ким? ____?
    answer: чим
    options:
    - що
    - чого
    - чому
    - чим
  - sentence: Місцевий відмінок — на кому? на ____?
    answer: чому
    options:
    - що
    - чого
    - чому
    - чим
  - sentence: Кличний відмінок — це форма для звертання. Він ____ питань.
    answer: не має
    options:
    - не має
    - має два
    - має три
    - має багато
  - sentence: Ми завжди ставимо питання від ____ до іменника.
    answer: дієслова
    options:
    - дієслова
    - прикметника
    - займенника
    - прислівника
- id: quiz-identify-the-part-of-speech-of-underlined-words-in-ukrainian-sentences
  type: quiz
  instruction: Визначте частину мови виділеного слова
  items:
  - question: Він любить **читати** книги.
    options:
    - дієслово
    - іменник
    - прикметник
    - займенник
    correct: 0
  - question: У мене є **великий** собака.
    options:
    - прикметник
    - іменник
    - дієслово
    - прислівник
    correct: 0
  - question: '**Я** бачу кота.'
    options:
    - займенник
    - іменник
    - прийменник
    - сполучник
    correct: 0
  - question: На **столі** немає книг.
    options:
    - іменник
    - прикметник
    - дієслово
    - прислівник
    correct: 0
  - question: Ми працюємо **швидко**.
    options:
    - прислівник
    - прикметник
    - дієслово
    - іменник
    correct: 0
  - question: Він живе **у** Києві.
    options:
    - прийменник
    - сполучник
    - займенник
    - прислівник
    correct: 0
  - question: Мама **і** тато вдома.
    options:
    - сполучник
    - прийменник
    - займенник
    - прислівник
    correct: 0
  - question: У мене **п'ять** яблук.
    options:
    - числівник
    - іменник
    - прикметник
    - займенник
    correct: 0
workbook:
- id: group-sort-gender
  type: group-sort
  instruction: Розподіліть іменники за граматичним родом
  groups:
  - label: Чоловічий рід (Він)
    items:
    - брат
    - стіл
    - парк
    - лікар
  - label: Жіночий рід (Вона)
    items:
    - сестра
    - мама
    - радість
    - родина
  - label: Середній рід (Воно)
    items:
    - вікно
    - море
    - місто
    - сонце
- id: true-false-grammar-facts
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Іменник відповідає на питання «хто?» або «що?».
    correct: true
    explanation: Іменник називає предмет або істоту.
  - statement: Прикметник завжди має такий самий рід, число і відмінок, як і іменник.
    correct: true
    explanation: Прикметник завжди узгоджується з іменником, до якого належить.
  - statement: Дієслова не можуть змінювати свою форму.
    correct: false
    explanation: Дієслова постійно змінюються за особами та часами.
  - statement: Рід іменника (чоловічий, жіночий, середній) може постійно змінюватися.
    correct: false
    explanation: Рід іменника — це постійна граматична ознака слова.
  - statement: Ми можемо легко зробити з однини множину.
    correct: true
    explanation: Число може змінюватися, на відміну від роду.
  - statement: Форма знахідного відмінка для неістот часто збігається з формою називного
      відмінка.
    correct: true
    explanation: 'Наприклад: ''стіл'' (Називний) і ''бачу стіл'' (Знахідний).'
- id: match-up-cases-abbreviations
  type: match-up
  instruction: З'єднайте відмінок із його питаннями
  pairs:
  - left: Називний (Н.)
    right: хто? що?
  - left: Родовий (Р.)
    right: кого? чого?
  - left: Давальний (Д.)
    right: кому? чому?
  - left: Знахідний (Зн.)
    right: кого? що?
  - left: Орудний (Ор.)
    right: ким? чим?
  - left: Місцевий (М.)
    right: на кому? на чому?
- id: translate-parts-of-speech
  type: translate
  instruction: Оберіть правильний переклад термінів
  items:
  - source: noun
    options:
    - text: іменник
      correct: true
    - text: прикметник
      correct: false
    - text: дієслово
      correct: false
    - text: займенник
      correct: false
  - source: adjective
    options:
    - text: прикметник
      correct: true
    - text: прислівник
      correct: false
    - text: іменник
      correct: false
    - text: числівник
      correct: false
  - source: verb
    options:
    - text: дієслово
      correct: true
    - text: іменник
      correct: false
    - text: прийменник
      correct: false
    - text: сполучник
      correct: false
  - source: pronoun
    options:
    - text: займенник
      correct: true
    - text: прикметник
      correct: false
    - text: прислівник
      correct: false
    - text: іменник
      correct: false
  - source: adverb
    options:
    - text: прислівник
      correct: true
    - text: займенник
      correct: false
    - text: прикметник
      correct: false
    - text: дієслово
      correct: false
  - source: preposition
    options:
    - text: прийменник
      correct: true
    - text: сполучник
      correct: false
    - text: числівник
      correct: false
    - text: прислівник
      correct: false
  - source: conjunction
    options:
    - text: сполучник
      correct: true
    - text: прийменник
      correct: false
    - text: займенник
      correct: false
    - text: прислівник
      correct: false
- id: error-correction-grammar
  type: error-correction
  instruction: Знайдіть і виправте помилку в термінології
  items:
  - sentence: Слово «великий» — це іменник.
    error: іменник
    correction: прикметник
    error_type: word
    options:
    - прикметник
    - дієслово
    - займенник
    explanation: Слово «великий» відповідає на питання «який?» і показує ознаку предмета.
  - sentence: Слово «читати» — це прикметник.
    error: прикметник
    correction: дієслово
    error_type: word
    options:
    - дієслово
    - іменник
    - прислівник
    explanation: Слово «читати» показує дію предмета.
  - sentence: Питання «кого? що?» належать до родового відмінка.
    error: родового
    correction: знахідного
    error_type: word
    options:
    - знахідного
    - місцевого
    - давального
    explanation: Родовий відмінок має питання «кого? чого?», а «кого? що?» — це знахідний.
  - sentence: Слово «швидко» — це числівник.
    error: числівник
    correction: прислівник
    error_type: word
    options:
    - прислівник
    - прийменник
    - сполучник
    explanation: Слово «швидко» відповідає на питання «як?».
  - sentence: 'В українській мові є три числа: однина, двоїна і множина.'
    error: три
    correction: два
    error_type: word
    options:
    - два
    - п'ять
    - сім
    explanation: 'В українській мові є тільки два числа: однина і множина.'
  - sentence: Слово «вікно» має чоловічий рід.
    error: чоловічий
    correction: середній
    error_type: word
    options:
    - середній
    - жіночий
    - спільний
    explanation: Слово закінчується на «-о», тому це середній рід.
- id: quiz-case-logic
  type: quiz
  instruction: Оберіть правильну відповідь за логікою відмінків
  items:
  - question: Щоб знайти відмінок слова в реченні, треба ставити питання від...
    options:
    - дієслова
    - прикметника
    - займенника
    - прислівника
    correct: 0
  - question: Який відмінок ми шукаємо, коли питаємо «кому?»
    options:
    - Давальний
    - Родовий
    - Місцевий
    - Знахідний
    correct: 0
  - question: Який відмінок показує інструмент дії (питання «ким? чим?»)
    options:
    - Орудний
    - Місцевий
    - Давальний
    - Називний
    correct: 0
  - question: Як ми знайдемо відмінок слова «братові» в реченні «даю подарунок братові»?
    options:
    - даю (кому?)
    - подарунок (кому?)
    - даю (ким?)
    - подарунок (кого?)
    correct: 0
  - question: Яке з цих слів стоїть у місцевому відмінку?
    options:
    - на столі
    - до столу
    - під столом
    - стіл
    correct: 0
  - question: Слово «мама» в Називному відмінку відповідає на питання...
    options:
    - хто?
    - що?
    - кого?
    - кому?
    correct: 0
