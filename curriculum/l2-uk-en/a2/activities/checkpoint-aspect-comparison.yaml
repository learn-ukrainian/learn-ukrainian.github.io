      right: "цікавіший"

- type: group-sort
  title: "Розподіліть слова за відмінками (Правило 1-2-5)"
  instruction: "Розподіліть словосполучення з числівниками за їхнім правильним граматичним відмінком."
  groups:
    - name: "Називний однини (після числа 1)"
      items: ["один стіл", "двадцять одна гривня", "один квиток", "тридцять один день"]
    - name: "Називний множини (після 2, 3, 4)"
      items: ["два столи", "три дні", "чотири брати", "двадцять два квитки"]
    - name: "Родовий множини (після 5 і більше)"
      items: ["п'ять столів", "десять днів", "двадцять братів", "п'ятдесят гривень"]

- type: fill-in
  title: "Заповніть пропуски: Модальність та числівники"
  instruction: "Виберіть правильний граматичний варіант для кожного речення."
  items:
    - sentence: "Якби я мав вільний час, я ___ у кіно."
      answer: "пішов би"
      options: ["пішов би", "піду", "пішов", "йшов"]
      explanation: "Для гіпотетичної ситуації використовуємо умовний спосіб (минулий час + би)."
    - sentence: "Вона із задоволенням ___ цю нову книгу."
      answer: "прочитала б"
      options: ["прочитала б", "прочитає", "читає", "прочитала"]
      explanation: "Умовний спосіб 'прочитала б' виражає бажання за певних умов."
    - sentence: "Ми маємо для роботи тільки ___."
      answer: "три години"
      options: ["три години", "три годин", "три годину", "трьох годин"]
      explanation: "Після числа 3 використовуємо називний відмінок множини."
    - sentence: "Вони дуже хочуть купити ___."
      answer: "п'ять квитків"
      options: ["п'ять квитків", "п'ять квитки", "п'ять квиток", "п'ятьма квитками"]
      explanation: "Після числа 5 вимагається родовий відмінок множини."
    - sentence: "Я ___ замовити велику каву, будь ласка."
      answer: "хотів би"
      options: ["хотів би", "хочу би", "хотів", "буду хотіти"]
      explanation: "Це класична конструкція ввічливого прохання в ресторані."
    - sentence: "Якби ми мали гроші, ми ___ новий комп'ютер."
      answer: "купили б"
      options: ["купили б", "купимо", "купували", "купили"]
      explanation: "Для умовного способу використовуємо минулий час і частку 'б'."
    - sentence: "У нашому сучасному місті є ___."
      answer: "два великі парки"
      options: ["два великі парки", "двох великих парків", "дві великі парки", "двоє великі парки"]
      explanation: "Після числа 2 іменник стоїть у називному відмінку множини."
    - sentence: "Наш новий колега працює там уже ___."
      answer: "десять років"
      options: ["десять років", "десять роки", "десять рік", "десятьма роками"]
      explanation: "Число 10 вимагає родового відмінка множини."

- type: unjumble
  title: "Складіть речення: Модальність і числа"
  instruction: "Розташуйте слова в правильному порядку."
  items:
    - words: ["я", "хотів", "би", "замовити", "велику", "каву"]
      answer: "Я хотів би замовити велику каву."
    - words: ["якби", "ми", "мали", "час", "ми", "зробили", "б", "це"]
      answer: "Якби ми мали час ми зробили б це."
    - words: ["один", "квиток", "коштує", "рівно", "п'ятсот", "гривень"]
      answer: "Один квиток коштує рівно п'ятсот гривень."
    - words: ["читайте", "цю", "цікаву", "книгу", "дуже", "уважно"]
      answer: "Читайте цю цікаву книгу дуже уважно."
    - words: ["давай", "зробимо", "це", "разом", "після", "обіду"]
      answer: "Давай зробимо це разом після обіду."
    - words: ["краще", "пізно", "ніж", "ніколи", "але", "краще", "вчасно"]
      answer: "Краще пізно ніж ніколи але краще вчасно."

- type: error-correction
  title: "Виправте помилки: Зіткнення числівників"
  instruction: "Знайдіть і виправте помилки узгодження числівників з іменниками (Правило 1-2-5)."
  items:
    - sentence: "Я зроблю це завдання прямо зараз."
      error: "зроблю"
      answer: "роблю"
      options: ["роблю", "робити", "зробив", "робив"]
      explanation: "У теперішньому часі (прямо зараз) використовується лише недоконаний вид."
    - sentence: "Він купить каву в цей самий момент."
      error: "купить"
      answer: "купує"
      options: ["купує", "купувати", "купив", "купував"]
      explanation: "Не можна використовувати доконаний вид для дії, яка відбувається зараз."
    - sentence: "У моїй кімнаті стоять два столів."
      error: "столів"
      answer: "столи"
      options: ["столи", "стіл", "столом", "столах"]
      explanation: "Після числа 2 іменник має стояти в називному відмінку множини."
    - sentence: "Ми чекаємо на вас уже три годин."
      error: "годин"
      answer: "години"
      options: ["години", "годину", "година", "годинах"]
      explanation: "Після числа 3 потрібен називний відмінок множини."
    - sentence: "На столі лежать чотири книг."
      error: "книг"
      answer: "книги"
      options: ["книги", "книга", "книгою", "книгах"]
      explanation: "Після числа 4 використовується називний відмінок множини."
    - sentence: "Вони купили п'ять квитки на сьогодні."
      error: "квитки"
      answer: "квитків"
      options: ["квитків", "квиток", "квитка", "квитками"]
      explanation: "Після числа 5 і більше необхідний родовий відмінок множини."

