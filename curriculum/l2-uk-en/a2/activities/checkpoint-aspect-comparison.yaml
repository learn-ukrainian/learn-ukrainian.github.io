- type: quiz
  title: "Перевірте знання: Час, якість та числа"
  instruction: "Дайте відповіді на ці запитання щодо основних граматичних правил чекпойнту."
  items:
    - question: "Який вид дієслова ми завжди використовуємо в українському теперішньому часі?"
      explanation: "Теперішній час завжди має недоконаний вид, оскільки описує процес, який триває."
      options:
        - text: "недоконаний вид"
          correct: true
        - text: "доконаний вид"
          correct: false
        - text: "обидва види"
          correct: false
        - text: "жоден з них"
          correct: false
    - question: "Яке слово є типовим маркером для доконаного виду та означає 'on time'?"
      explanation: "Слово 'вчасно' вказує на досягнутий результат до певного моменту часу."
      options:
        - text: "вчасно"
          correct: true
        - text: "завжди"
          correct: false
        - text: "часто"
          correct: false
        - text: "довго"
          correct: false
    - question: "Як правильно сказати українською мовою: Ця цікава книга..."
      explanation: "Не можна казати 'більш краща' (це подвійне порівняння). Правильно казати просто 'краща'."
      options:
        - text: "краща"
          correct: true
        - text: "більш краща"
          correct: false
        - text: "сама краща"
          correct: false
        - text: "краще"
          correct: false
    - question: "Який граматичний відмінок ми використовуємо після числівників два, три та чотири?"
      explanation: "Після чисел 2, 3 і 4 завжди використовується називний відмінок множини."
      options:
        - text: "Називний множини"
          correct: true
        - text: "Родовий множини"
          correct: false
        - text: "Називний однини"
          correct: false
        - text: "Родовий однини"
          correct: false
    - question: "Який відмінок ми використовуємо після числівників п'ять, шість та більше?"
      explanation: "Після числа 5 і більше вимагається використання родового відмінка множини."
      options:
        - text: "Родовий множини"
          correct: true
        - text: "Називний множини"
          correct: false
        - text: "Називний однини"
          correct: false
        - text: "Родовий однини"
          correct: false
    - question: "Як правильно і гостинно запросити нових друзів до свого дому?"
      explanation: "В українській культурі для теплого запрошення використовують недоконаний вид."
      options:
        - text: "Приходьте, будь ласка!"
          correct: true
        - text: "Прийдіть, будь ласка!"
          correct: false
        - text: "Зайдіть, будь ласка!"
          correct: false
        - text: "Прийшли, будь ласка!"
          correct: false
    - question: "Що найкраще виражає умовний спосіб дієслова з часткою 'би' або 'б'?"
      explanation: "Умовний спосіб ідеальний для вираження ввічливих прохань або гіпотетичних ситуацій."
      options:
        - text: "гіпотетичну ситуацію"
          correct: true
        - text: "точний історичний факт"
          correct: false
        - text: "строгий офіційний наказ"
          correct: false
        - text: "дію в теперішньому часі"
          correct: false
    - question: "Яке дієслово чітко означає фінальний та успішно завершений результат написання тексту?"
      explanation: "Дієслово 'написати' (доконаний вид) означає успішний і завершений результат."
      options:
        - text: "написати"
          correct: true
        - text: "писати"
          correct: false
        - text: "пишу"
          correct: false
        - text: "писав"
          correct: false

- type: fill-in
  title: "Заповніть пропуски: Процес чи результат"
  instruction: "Виберіть правильне дієслово: 'робити' чи 'зробити', 'писати' чи 'написати'."
  items:
    - sentence: "Щодня я обов'язково ___ ранкову гімнастику."
      answer: "роблю"
      options: ["роблю", "зроблю", "робити", "зробити"]
      explanation: "Слово 'щодня' вказує на регулярний процес, тому використовуємо недоконаний вид."
    - sentence: "Вчора ввечері він успішно ___ цей проєкт."
      answer: "зробив"
      options: ["зробив", "робив", "зробить", "робить"]
      explanation: "Слово 'успішно' вказує на досягнутий результат у минулому."
    - sentence: "Зараз я уважно ___ цей важливий лист."
      answer: "пишу"
      options: ["пишу", "напишу", "писав", "написав"]
      explanation: "Дія відбувається прямо 'зараз', тому це процес (недоконаний вид)."
    - sentence: "Вона точно ___ цю статтю до завтрашнього ранку."
      answer: "напише"
      options: ["напише", "пише", "писала", "писати"]
      explanation: "Дія буде завершена до певного моменту в майбутньому."
    - sentence: "Ми мусимо дуже швидко ___ цю складну роботу."
      answer: "зробити"
      options: ["зробити", "робити", "робимо", "зробимо"]
      explanation: "Фокус на швидкому отриманні фінального результату."
    - sentence: "Мій брат дуже любить ___ ліричні вірші."
      answer: "писати"
      options: ["писати", "написати", "пишу", "напишу"]
      explanation: "Тут фокус на хобі або процесі, який подобається брату."
    - sentence: "Вони довго думали, як правильно ___ вибір."
      answer: "зробити"
      options: ["зробити", "робити", "роблять", "зроблять"]
      explanation: "Сталий вираз 'зробити вибір' завжди вимагає доконаного виду."
    - sentence: "Я справді хочу ___ тобі невеликий подарунок."
      answer: "зробити"
      options: ["зробити", "робити", "роблю", "зроблю"]
      explanation: "Фокус на результаті: створення подарунка."

- type: unjumble
  title: "Складіть речення: Вид дієслова"
  instruction: "Розташуйте слова у правильному порядку."
  items:
    - words: ["зараз", "я", "роблю", "це", "важливе", "завдання"]
      answer: "Зараз я роблю це важливе завдання."
    - words: ["він", "робив", "домашнє", "завдання", "весь", "вечір"]
      answer: "Він робив домашнє завдання весь вечір."
    - words: ["вона", "успішно", "зробила", "все", "абсолютно", "вчасно"]
      answer: "Вона успішно зробила все абсолютно вчасно."
    - words: ["ми", "завжди", "раді", "запросити", "гостей", "додому"]
      answer: "Ми завжди раді запросити гостей додому."
    - words: ["приходьте", "до", "нас", "на", "вечерю", "сьогодні"]
      answer: "Приходьте до нас на вечерю сьогодні."
    - words: ["я", "швидко", "напишу", "цей", "короткий", "лист"]
      answer: "Я швидко напишу цей короткий лист."

- type: error-correction
  title: "Виправте помилки: Порівняння"
  instruction: "Знайдіть і виправте помилку подвійного порівняння в кожному реченні."
  items:
    - sentence: "Цей новий дизайн комп'ютера більш сучасніший."
      error: "більш сучасніший"
      answer: "сучасніший"
      options: ["сучасніший", "більш сучасний", "найсучасніший", "сучасно"]
      explanation: "Не можна поєднувати 'більш' і суфікс '-іш-'. Використовуйте тільки одне."
    - sentence: "Це ділове рішення більш краще для нашої компанії."
      error: "більш краще"
      answer: "краще"
      options: ["краще", "більш добре", "найкраще", "добре"]
      explanation: "'Більш краще' — це груба помилка. Правильно казати просто 'краще'."
    - sentence: "Моя нова кімната більш менша, ніж твоя стара."
      error: "більш менша"
      answer: "менша"
      options: ["менша", "більш мала", "найменша", "маліша"]
      explanation: "Використовуйте неправильну форму порівняння 'менша' без додаткових слів."
    - sentence: "Цей ранковий чай більш гарячіший за мою вчорашню каву."
      error: "більш гарячіший"
      answer: "гарячіший"
      options: ["гарячіший", "більш гарячий", "гаряче", "гарячий"]
      explanation: "Слово 'гарячіший' вже має вищий ступінь, 'більш' тут зайве."
    - sentence: "Сьогодні погода більш гірша, ніж ми всі очікували."
      error: "більш гірша"
      answer: "гірша"
      options: ["гірша", "більш погана", "найгірша", "гірше"]
      explanation: "Слово 'гірша' є самостійною формою вищого ступеня порівняння."
    - sentence: "Наш новий співробітник більш сильніший у цій сфері."
      error: "більш сильніший"
      answer: "сильніший"
      options: ["сильніший", "більш сильний", "сильно", "найсильніший"]
      explanation: "Правильна форма: сильніший (або більш сильний)."

- type: match-up
  title: "Знайдіть пару: Неправильні порівняння та види дієслів"
  instruction: "Поєднайте базове слово з його правильною формою або парою."
  pairs:
