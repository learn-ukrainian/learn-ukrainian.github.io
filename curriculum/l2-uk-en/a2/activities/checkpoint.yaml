    - через
    - хворобу
    answer: Вона не працює через хворобу
  instruction: Розташуйте слова у правильному порядку.
- type: error-correction
  title: Виправте типові помилки
  items:
  - sentence: Я беру ліки кожного ранку.
    error: беру
    answer: приймаю
    error_type: word
    options:
    - приймаю
    - робив
    - слухаю
    - бачу
    explanation: Українською ми кажемо "приймати ліки" або "пити ліки", а не "брати".
  - sentence: Я п'ю чай, що б бути здоровим.
    error: що б
    answer: щоб
    error_type: word
    options:
    - щоб
    - бо
    - тому
    - як
    explanation: 'Сполучник мети пишеться разом: "щоб".'
  - sentence: Він дає сироп, щоб ми не хворіємо.
    error: хворіємо
    answer: хворіли
    error_type: construction
    options:
    - хворіли
    - хворіти
    - хворіють
    - хворітимемо
    explanation: Коли суб'єкти відрізняються, після "щоб" використовується минулий
      час.
  - sentence: У мене дуже великий застуда.
    error: великий
    answer: велика
    error_type: construction
    options:
    - велика
    - велике
    - великі
    - сильна
    explanation: Слово "застуда" — жіночого роду, тому прикметник має бути "велика".
  - sentence: Це нова таблетка, який мені дав лікар.
    error: який
    answer: яку
    error_type: construction
    options:
    - яку
    - яка
    - яке
    - які
    explanation: Таблетка — жіночого роду, у знахідному відмінку буде "яку".
  - sentence: Моя лівий рука дуже болить після роботи.
    error: лівий
    answer: ліва
    error_type: construction
    options:
    - ліва
    - ліве
    - ліві
    - права
    explanation: Рука — жіночого роду, тому "ліва".
