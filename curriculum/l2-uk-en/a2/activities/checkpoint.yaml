    - завжди
    - п'ю
    - ці
    - ліки
    answer: Я завжди п'ю ці ліки
  - words:
    - лікар
    - виписав
    - сироп
    - від
    - застуди
    answer: Лікар виписав сироп від застуди
  - words:
    - ми
    - робимо
    - чай
    - з
    - малиною
    answer: Ми робимо чай з малиною
  - words:
