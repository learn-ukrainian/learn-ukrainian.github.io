- type: quiz
  title: Перевірте знання граматики
  items:
  - question: Яке слово ми найчастіше використовуємо для пояснення причини в щоденній
      розмові?
    explanation: Слово "бо" є найприроднішим для розмовного стилю.
    options:
    - text: бо
      correct: true
    - text: щоб
      correct: false
    - text: який
      correct: false
    - text: поки
      correct: false
  - question: Яке слово вказує на конкретну мету нашої дії?
    explanation: Сполучник "щоб" використовується для вираження мети (in order to).
    options:
    - text: щоб
      correct: true
    - text: бо
      correct: false
    - text: коли
      correct: false
    - text: який
      correct: false
  - question: Який прийменник ми використовуємо перед іменником, щоб вказати на причину
      (наприклад, хворобу)?
    explanation: Ми кажемо "через застуду" або "через дощ".
    options:
    - text: через
      correct: true
    - text: для
      correct: false
    - text: в
      correct: false
    - text: на
      correct: false
  - question: 'Як правильно сказати: лікар дав сироп, ___ я швидко одужав?'
    explanation: Після сполучника "щоб", якщо суб'єкти різні, використовується дієслово
      в минулому часі.
    options:
    - text: щоб
      correct: true
    - text: бо
      correct: false
    - text: який
      correct: false
    - text: тому що
      correct: false
  - question: Який відносний займенник ми використовуємо для опису іменника в реченні?
    explanation: Займенник "який" (which/who/that) використовується для опису предметів
      чи людей.
    options:
    - text: який
      correct: true
    - text: що
      correct: false
    - text: хто
      correct: false
    - text: де
      correct: false
  - question: Яке слово показує одночасність двох дій або що дія триває певний час?
    explanation: Слово "поки" означає "while" або "as long as".
    options:
    - text: поки
      correct: true
    - text: через
      correct: false
    - text: бо
      correct: false
    - text: щоб
      correct: false
  - question: Яку фразу ми використовуємо для вказівки на чітку хронологічну послідовність
      дій?
    explanation: Фраза "після того як" означає "after" і показує послідовність подій.
    options:
    - text: після того як
      correct: true
    - text: тому що
      correct: false
    - text: що б
      correct: false
    - text: який
      correct: false
  - question: Яке дієслово ми повинні використовувати разом зі словом "ліки" в офіційній
      ситуації?
    explanation: В українській мові ми "приймаємо" ліки, а не "беремо" їх.
    options:
    - text: приймати
      correct: true
    - text: брати
      correct: false
    - text: мати
      correct: false
    - text: робити
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: Медичні факти та правила мови
  items:
  - statement: Слово "бо" використовується виключно в офіційних медичних документах.
    correct: false
    explanation: Слово "бо" є найкращим для щоденних розмов.
  - statement: Після сполучника "щоб" завжди використовується інфінітив, навіть якщо
      суб'єкти дії різні.
    correct: false
    explanation: Якщо суб'єкти різні, після "щоб" використовується минулий час.
  - statement: Слова "щоб" і "що б" мають абсолютно однакове значення в українській
      мові.
    correct: false
    explanation: '"Щоб" - це мета (in order to), а "що б" - це питання або умова (what
      would).'
  - statement: Українці кажуть "я беру ліки", коли п'ють таблетки вдома.
    correct: false
    explanation: Це калька з англійської. Українці "п'ють" або "приймають" ліки.
  - statement: Дієслово "приймати" використовується для серйозних, формальних медичних
      ситуацій.
    correct: true
    explanation: Це правильне дієслово для офіційного контексту.
  - statement: Традиційний український гарячий чай від застуди часто роблять з малиною.
    correct: true
    explanation: Малина - популярний народний засіб.
  - statement: Слово "калина" є важливим культурним та національним символом в Україні.
    correct: true
    explanation: Калина символізує життя та зв'язок з рідною землею.
  - statement: Тост "Будьмо!" означає щире побажання міцного здоров'я та сили.
    correct: true
    explanation: Це традиційне українське побажання.
  instruction: Визначте, чи твердження правильне.
- type: match-up
  title: 'Знайдіть пару: словник здоров''я'
  pairs:
  - left: у мене болить голова
    right: my head hurts
  - left: маю червоне горло
    right: I have a sore throat
  - left: у нього висока температура
    right: he has a high fever
  - left: приймати ліки
    right: to take medicine
  - left: мати сильну застуду
    right: to have a bad cold
  - left: піти до лікаря
    right: to go to the doctor
  - left: пити чай з медом
    right: to drink tea with honey
  - left: народна медицина
    right: traditional medicine
  instruction: З'єднайте відповідні елементи.
- type: fill-in
  title: Доповніть речення сполучниками
  items:
  - sentence: Я йду в аптеку, ___ купити вітаміни.
    answer: щоб
    options:
    - щоб
    - бо
    - через
    - який
  - sentence: Ми п'ємо гарячий чай, ___ на вулиці холодно.
    answer: бо
    options:
    - бо
    - щоб
    - який
    - поки
  - sentence: Він не працює сьогодні ___ застуду.
    answer: через
    options:
    - через
    - тому що
    - бо
    - щоб
  - sentence: Ось лікар, ___ працює в нашій лікарні.
    answer: який
    options:
    - який
    - яка
    - яке
    - які
  - sentence: Я п'ю таблетку, ___ моя голова дуже болить.
    answer: тому що
    options:
    - тому що
    - щоб
    - через
    - який
  - sentence: Я обов'язково подзвоню тобі, ___ прийду додому.
    answer: коли
    options:
    - коли
    - поки
    - який
    - через
  - sentence: Почитай цікаву книгу, ___ чекаєш на лікаря.
    answer: поки
    options:
    - поки
    - коли
    - бо
    - який
  - sentence: Ми підемо гуляти ___ закінчиться сильний дощ.
    answer: після того як
    options:
    - після того як
    - поки
    - через
    - тому що
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Складіть речення з медичних термінів
  items:
  - words:
    - у
    - мене
    - сьогодні
    - болить
    - голова
    answer: У мене сьогодні болить голова
  - words:
