- type: mark-the-words
  title: 'Знайдіть займенники в Давальному відмінку'
  instruction: 'Highlight all pronouns in the Dative case (Recipients). Do not highlight Subject pronouns (Nominative).'
  text: 'Привіт, як ти? Мені дуже сумно сьогодні. Я хочу піти в кіно, але йому не цікаво. Може, тобі подобається цей фільм? Нам треба відпочити. Вона каже, що їй весело, але мені здається, що це не так.'
  answers: ['Мені', 'йому', 'тобі', 'Нам', 'їй', 'мені']

- type: quiz
  title: 'Культурний контекст'
  instruction: 'Choose the culturally appropriate action or phrase.'
  items:
    - question: 'Ви прийшли в гості. Господар пропонує хліб і сіль. Що ви робите?'
      explanation: 'Refusing bread and salt is considered an insult to the host.'
      options:
        - text: 'Приймаю з подякою'
          correct: true
        - text: 'Відмовляюся, я на дієті'
          correct: false
        - text: 'Прошу тільки сіль'
          correct: false
        - text: 'Даю гроші за це'
          correct: false
    - question: 'Ви даруєте подарунок другу. Де ви його передаєте?'
      explanation: 'Never hand anything across the threshold (через поріг).'
      options:
        - text: 'Заходжу в кімнату, потім даю'
          correct: true
        - text: 'Через поріг дверей'
          correct: false
        - text: 'Кидаю через вікно'
          correct: false
        - text: 'Залишаю під дверима'
          correct: false
    - question: 'Вас познайомили з колегою. Що ви скажете?'
      explanation: '"Мені приємно" is the standard polite phrase.'
      options:
        - text: 'Мені приємно'
          correct: true
        - text: 'Я приємний'
          correct: false
        - text: 'Мені подобається'
          correct: false
        - text: 'Мені треба'
          correct: false
    - question: 'Ви купуєте квіти на день народження. Скільки купите?'
      explanation: 'For living people, always odd numbers (3, 5, 7...).'
      options:
        - text: '5 троянд'
          correct: true
        - text: '4 троянди'
          correct: false
        - text: '6 троянд'
          correct: false
        - text: '2 троянди'
          correct: false
    - question: 'Друг каже "Мені холодно". Що ви запропонуєте?'
      explanation: 'Offering tea or a blanket is the culturally appropriate caring response.'
      options:
        - text: 'Чай або ковдру'
          correct: true
        - text: 'Морозиво'
          correct: false
        - text: 'Відкрити вікно'
          correct: false
        - text: 'Піти гуляти'
          correct: false
    - question: 'Що означає "Вам зручно?" в гостях?'
      explanation: 'Hosts constantly check the guest''s comfort.'
      options:
        - text: 'Are you comfortable?'
          correct: true
        - text: 'Are you convenient?'
          correct: false
        - text: 'Do you like furniture?'
          correct: false
        - text: 'Are you rich?'
          correct: false
    - question: 'Коли використовують "Ви" і "Вам"?'
      explanation: 'Plural and formal address (strangers, elders, groups).'
      options:
        - text: 'До старших або незнайомих'
          correct: true
        - text: 'До дітей'
          correct: false
        - text: 'До тварин'
          correct: false
        - text: 'Тільки до королів'
          correct: false
    - question: 'Як правильно українською мовою побажати комусь щастя та успіху?'
      explanation: 'Wishes use Dative: "I wish TO YOU".'
      options:
        - text: 'Бажаю вам щастя'
          correct: true
        - text: 'Я хочу щастя'
          correct: false
        - text: 'Ви маєте щастя'
          correct: false
        - text: 'Щастя є'
          correct: false

- type: fill-in
  title: 'Змішана практика'
  instruction: 'Complete the sentences using the correct vocabulary and grammar.'
  items:
    - sentence: 'Вибачте, ___ вже треба йти додому.'
      answer: 'мені'
      options: ['мені', 'я', 'мене', 'моя']
      explanation: 'Polite excuse for leaving uses Dative.'
    - sentence: 'Цей колір ___ дуже пасує, друже.'
      answer: 'тобі'
      options: ['тобі', 'ти', 'тебе', 'твоє']
      explanation: '"Пасує" (suits) takes Dative.'
    - sentence: 'Ми слухаємо уважно, бо ___ дуже цікаво.'
      answer: 'Нам'
      options: ['Нам', 'Ми', 'Нас', 'Нами']
      explanation: '"We are interested" -> "To us is interesting".'
    - sentence: 'Він чекає. Скажи ___ правду.'
      answer: 'йому'
      options: ['йому', 'він', 'його', 'ним']
      explanation: '"Tell him" -> "Tell to him".'
    - sentence: 'Мамі дуже ___ ці червоні квіти.'
      answer: 'подобаються'
      options: ['подобаються', 'подобається', 'подобаю', 'любить']
      explanation: '"Flowers" is plural, so "подобаються".'
    - sentence: 'Я бачу проблему. Чи можу я ___?'
      answer: 'допомогти'
      options: ['допомогти', 'помагати', 'допомога', 'поміч']
      explanation: 'Standard phrase "Can I help?".'
    - sentence: 'Я думаю, ні, мені навіть ___, що це помилка.'
      answer: 'здається'
      options: ['здається', 'здаю', 'здавалося', 'здати']
      explanation: '"It seems to me" -> "Мені здається".'
    - sentence: 'Він бере телефон і ___ їй щодня.'
      answer: 'дзвонить'
      options: ['дзвонить', 'дзвони', 'дзвонити', 'дзвінок']
      explanation: 'He calls (present tense).'
