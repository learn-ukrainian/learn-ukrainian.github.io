- type: unjumble
  title: 'Складіть речення'
  instruction: 'Складіть речення (Arrange the words to form correct sentences using the Dative case).'
  items:
    - words: ['Дай', 'мені', 'будь ласка', 'цю', 'синю', 'ручку']
      answer: 'Дай мені, будь ласка, цю синю ручку'
    - words: ['Скажи', 'нам', 'правду', 'про', 'цей', 'цікавий', 'фільм']
      answer: 'Скажи нам правду про цей цікавий фільм'
    - words: ['Допоможіть', 'їй', 'з', 'цим', 'важким', 'завданням', 'сьогодні']
      answer: 'Допоможіть їй з цим важким завданням сьогодні'
    - words: ['Я', 'даю', 'тобі', 'цю', 'цікаву', 'нову', 'книгу']
      answer: 'Я даю тобі цю цікаву нову книгу'
    - words: ['Вам', 'потрібна', 'наша', 'допомога', 'зараз', 'чи', 'потім?']
      answer: 'Вам потрібна наша допомога зараз чи потім?'
    - words: ['Їм', 'треба', 'багато', 'працювати', 'кожного', 'дня', 'тут']
      answer: 'Їм треба багато працювати кожного дня тут'

- type: quiz
  title: 'Оберіть правильний займенник'
  instruction: 'Оберіть правильний займенник (Choose the correct pronoun for each situation).'
  items:
    - question: 'У цій кімнаті дуже ___ холодно.'
      explanation: 'To express a physical state like being cold, we use the Dative case (To me it is cold).'
      options:
        - text: 'мені'
          correct: true
        - text: 'я'
          correct: false
        - text: 'мене'
          correct: false
        - text: 'мною'
          correct: false
    - question: 'Скажи мені, чи ___ подобається ця сучасна музика?'
      explanation: 'The verb подобатися requires the Dative case for the person who likes something.'
      options:
        - text: 'тобі'
          correct: true
        - text: 'ти'
          correct: false
        - text: 'тебе'
          correct: false
        - text: 'тобою'
          correct: false
    - question: 'Офіціанте, принесіть ___ гарячу каву, будь ласка.'
      explanation: 'The recipient of the coffee must be in the Dative case.'
      options:
        - text: 'нам'
          correct: true
        - text: 'ми'
          correct: false
        - text: 'нас'
          correct: false
        - text: 'нами'
          correct: false
    - question: 'Це гарний подарунок для Олени. Будь ласка, дай це ___.'
      explanation: 'Olena is "she" (вона). In the Dative case, "to her" is їй.'
      options:
        - text: 'їй'
          correct: true
        - text: 'вона'
          correct: false
        - text: 'неї'
          correct: false
        - text: 'її'
          correct: false
    - question: 'Вже пізно, тому ___ терміново треба йти додому.'
      explanation: 'To express necessity (need to go), use Dative + треба.'
      options:
        - text: 'йому'
          correct: true
        - text: 'він'
          correct: false
        - text: 'його'
          correct: false
        - text: 'ним'
          correct: false
    - question: 'Студентам дуже ___ весело на цій гучній вечірці.'
      explanation: 'To express "having fun" (state), use the Dative case.'
      options:
        - text: 'їм'
          correct: true
        - text: 'вони'
          correct: false
        - text: 'їх'
          correct: false
        - text: 'ними'
          correct: false
    - question: 'Розкажіть нам, як ___ живеться в прекрасному Києві?'
      explanation: 'Asking "How is it for you?" requires the Dative case.'
      options:
        - text: 'вам'
          correct: true
        - text: 'ви'
          correct: false
        - text: 'вас'
          correct: false
        - text: 'вами'
          correct: false
    - question: 'Чесно кажучи, ___ здається, що це дуже гарна ідея.'
      explanation: '"It seems to me" uses Dative + здається.'
      options:
        - text: 'мені'
          correct: true
        - text: 'я'
          correct: false
        - text: 'мене'
          correct: false
        - text: 'мною'
          correct: false

- type: fill-in
  title: 'Що їм подобається?'
  instruction: 'Доповніть речення (Complete the sentences using the correct Dative pronoun based on the context).'
  items:
    - sentence: '(Я) ___ подобається джаз.'
      answer: 'Мені'
      options: ['Мені', 'Я', 'Мене', 'Мною']
      explanation: 'Dative for "I" is Мені.'
    - sentence: '(Ти) ___ подобається цей фільм?'
      answer: 'Тобі'
      options: ['Тобі', 'Ти', 'Тебе', 'Тобою']
      explanation: 'Dative for "you" (sg) is Тобі.'
    - sentence: '(Він) ___ не подобається спорт.'
      answer: 'Йому'
      options: ['Йому', 'Він', 'Його', 'Ним']
      explanation: 'Dative for "he" is Йому.'
    - sentence: '(Вона) ___ подобаються квіти.'
      answer: 'Їй'
      options: ['Їй', 'Вона', 'Неї', 'Її']
      explanation: 'Dative for "she" is Їй.'
    - sentence: '(Ми) ___ подобається українська мова.'
      answer: 'Нам'
      options: ['Нам', 'Ми', 'Нас', 'Нами']
      explanation: 'Dative for "we" is Нам.'
    - sentence: '(Ви) ___ подобається ваша робота?'
      answer: 'Вам'
      options: ['Вам', 'Ви', 'Вас', 'Вами']
      explanation: 'Dative for "you" (pl) is Вам.'
    - sentence: '(Вони) ___ подобається відпочивати тут.'
      answer: 'Їм'
      options: ['Їм', 'Вони', 'Їх', 'Ними']
      explanation: 'Dative for "they" is Їм.'
    - sentence: '(Я) ___ дуже цікаво.'
      answer: 'Мені'
      options: ['Мені', 'Я', 'Мене', 'Мною']
      explanation: 'For "I am interested" (state), use Мені.'

- type: mark-the-words
  title: 'Знайдіть Давальний відмінок'
  instruction: 'Знайдіть займенники (Find and mark all pronouns in the Dative case in the text).'
  text: 'Привіт! Як тобі тут? Мені дуже подобається це місто. Нам тут весело. Я думаю, що вам теж сподобається. Ми хочемо показати їм центр міста. А потім я даю їй подарунок.'
  answers: ['тобі', 'Мені', 'Нам', 'вам', 'їм', 'їй']

- type: unjumble
  title: 'Що кому треба?'
  instruction: 'Що кому треба? (Make sentences expressing needs and necessity).'
  items:
    - words: ['Мені', 'терміново', 'треба', 'ця', 'велика', 'гаряча', 'кава']
      answer: 'Мені терміново треба ця велика гаряча кава'
    - words: ['Нам', 'дуже', 'потрібно', 'йти', 'додому', 'прямо', 'зараз']
      answer: 'Нам дуже потрібно йти додому прямо зараз'
    - words: ['Скажи', 'тобі', 'справді', 'треба', 'моя', 'допомога', 'сьогодні?']
      answer: 'Скажи, тобі справді треба моя допомога сьогодні?'
    - words: ['Йому', 'потрібен', 'вільний', 'час', 'для', 'відпочинку']
      answer: 'Йому потрібен вільний час для відпочинку'
    - words: ['Вам', 'треба', 'трохи', 'відпочити', 'після', 'роботи']
      answer: 'Вам треба трохи відпочити після роботи'
    - words: ['Їй', 'необхідно', 'багато', 'працювати', 'над', 'проєктом']
      answer: 'Їй необхідно багато працювати над проєктом'

- type: match-up
  title: 'Як вони почуваються?'
  instruction: 'Як вони почуваються? (Match the English feeling to the Ukrainian Dative phrase).'
  pairs:
    - left: 'I am cold'
      right: 'Мені холодно'
    - left: 'She is sad'
      right: 'Їй сумно'
    - left: 'He is in pain'
      right: 'Йому боляче'
    - left: 'We are having fun'
      right: 'Нам весело'
    - left: 'They are bored'
      right: 'Їм нудно'
    - left: 'Are you hot?'
      right: 'Тобі жарко?'
    - left: 'I am interested'
      right: 'Мені цікаво'
    - left: 'It is pleasant to us'
      right: 'Нам приємно'
    - left: 'He needs it'
      right: 'Йому потрібно'
    - left: 'Is it interesting to you?'
      right: 'Вам цікаво?'
    - left: 'It is easy for me'
      right: 'Мені легко'

- type: error-correction
  title: 'Виправте помилки'
  instruction: 'Виправте помилки (Find and correct the mistake in each sentence. Pay attention to the case usage).'
  items:
    - sentence: 'Я холодно сьогодні.'
      error: 'Я'
      answer: 'Мені'
      options: ['Мені', 'Мене', 'Мною', 'Моє']
      explanation: 'For physical states like "cold", use the Dative case (Мені), not Nominative (Я).'
    - sentence: 'Ми треба працювати.'
      error: 'Ми'
      answer: 'Нам'
      options: ['Нам', 'Нас', 'Нами', 'Наш']
      explanation: 'Necessity (треба) requires the person to be in the Dative case (Нам).'
    - sentence: 'Ти подобається цей фільм?'
      error: 'Ти'
      answer: 'Тобі'
      options: ['Тобі', 'Тебе', 'Тобою', 'Твій']
      explanation: 'With подобається, the person who likes something is in the Dative case (Тобі).'
    - sentence: 'Вона сумно.'
      error: 'Вона'
      answer: 'Їй'
      options: ['Їй', 'Неї', 'Нею', 'Її']
      explanation: 'Emotional states require the Dative case: Їй сумно (To her it is sad).'
    - sentence: 'Дай я цю книгу.'
      error: 'я'
      answer: 'мені'
      options: ['мені', 'мене', 'мною', 'моє']
      explanation: 'The recipient of an action ("Give to me") must be in the Dative case.'
    - sentence: 'Він боляче.'
      error: 'Він'
      answer: 'Йому'
      options: ['Йому', 'Його', 'Ним', 'Він']
      explanation: 'To express pain, use the Dative case: Йому боляче (To him it is painful).'

- type: group-sort
  title: 'Функція Давального відмінка'
  instruction: 'Сортування (Sort the sentences based on how the Dative case is used: Necessity (Need), State (Feeling), or Pleasure (Like)).'
  groups:
    - name: 'Необхідність (Need)'
      items: ['Мені треба йти.', 'Нам потрібно працювати.', 'Тобі треба кава?', 'Їм необхідно спати.']
    - name: 'Стан (Feeling)'
      items: ['Мені холодно.', 'Їй сумно.', 'Нам весело.', 'Йому боляче.']
    - name: 'Задоволення (Like)'
      items: ['Мені подобається музика.', 'Тобі подобається Київ?', 'Нам подобається цей фільм.', 'Їй подобаються квіти.']

- type: quiz
  title: 'Соціальні ситуації'
  instruction: 'Соціальні ситуації (Choose the most appropriate phrase for the situation).'
  items:
    - question: 'Your neighbor looks upset. You ask:'
      explanation: 'Ask "Are you okay?" or "Aren''t you sad?" using the Dative.'
      options:
        - text: 'Тобі сумно?'
          correct: true
        - text: 'Ти сумний?'
          correct: false
        - text: 'Тебе сумно?'
          correct: false
        - text: 'Тобі треба?'
          correct: false
    - question: 'You are visiting a new home. You politely ask the hosts:'
      explanation: 'Use the formal "Вам" when addressing hosts politely.'
      options:
        - text: 'Як вам тут живеться?'
          correct: true
        - text: 'Як тобі тут?'
          correct: false
        - text: 'Ти тут живеш?'
          correct: false
        - text: 'Вам треба дім?'
          correct: false
    - question: 'You want to express your opinion politely. You start with:'
      explanation: '"Мені здається" (It seems to me) softens an opinion.'
      options:
        - text: 'Мені здається...'
          correct: true
        - text: 'Я думаю...'
          correct: false
        - text: 'Я знаю...'
          correct: false
        - text: 'Мені треба...'
          correct: false
    - question: 'You are cold in a cafe. You say to the waiter:'
      explanation: 'State your feeling using Dative.'
      options:
        - text: 'Мені холодно.'
          correct: true
        - text: 'Я холодний.'
          correct: false
        - text: 'Мене холодно.'
          correct: false
        - text: 'Холодно є.'
          correct: false
    - question: 'Someone offers you help. You accept and say:'
      explanation: '"To me it is needed" or "I need help".'
      options:
        - text: 'Так, мені потрібна допомога.'
          correct: true
        - text: 'Так, я потребую.'
          correct: false
        - text: 'Так, я хочу.'
          correct: false
        - text: 'Так, дай мені.'
          correct: false
    - question: 'You ask a friend if they liked the movie:'
      explanation: 'Use the informal "Тобі" + past tense of подобатися.'
      options:
        - text: 'Тобі сподобався фільм?'
          correct: true
        - text: 'Ти сподобався фільм?'
          correct: false
        - text: 'Тебе сподобався фільм?'
          correct: false
        - text: 'Фільм тобі?'
          correct: false
    - question: 'You need to leave early. You explain:'
      explanation: '"I need to run/go" uses Dative + треба.'
      options:
        - text: 'Мені треба бігти.'
          correct: true
        - text: 'Я мушу бігти.'
          correct: false
        - text: 'Я біжу.'
          correct: false
        - text: 'Мене треба.'
          correct: false
    - question: 'You give a gift to your mom. You say:'
      explanation: '"This is for you" uses Dative.'
      options:
        - text: 'Це тобі, мамо.'
          correct: true
        - text: 'Це ти, мамо.'
          correct: false
        - text: 'Це тебе, мамо.'
          correct: false
        - text: 'Це тобою, мамо.'
          correct: false
