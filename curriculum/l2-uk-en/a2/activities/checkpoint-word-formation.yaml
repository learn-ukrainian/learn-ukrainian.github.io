- type: select
  title: Оберіть правильні слова
  instruction: Прочитайте запитання та оберіть усі правильні варіанти відповідей.
  items:
    - question: Оберіть усі дієслова з префіксом, що означає кінцевий результат дії.
      min_correct: 2
      explanation: Префікси з- та по- вказують на повністю завершений результат дії.
      options:
        - text: зробити
          correct: true
        - text: писати
          correct: false
        - text: побудувати
          correct: true
        - text: читати
          correct: false
    - question: Оберіть усі іменники, що послідовно позначають тривалий активний процес.
      min_correct: 3
      explanation: Суфікс -ння завжди показує активний тривалий процес, наприклад,
        читання.
      options:
        - text: читання
          correct: true
        - text: радість
          correct: false
        - text: малювання
          correct: true
        - text: розуміння
          correct: true
        - text: місто
          correct: false
    - question: Оберіть усі прикметники, що точно позначають фізичний матеріал.
      min_correct: 2
      explanation: Суфікс -овий та -яний використовуються для опису фізичних матеріалів.
      options:
        - text: паперовий
          correct: true
        - text: осінній
          correct: false
        - text: дерев'яний
          correct: true
        - text: студентський
          correct: false
    - question: Оберіть усі слова, які мають продуктивний суфікс -ач.
      min_correct: 3
      explanation: Суфікс -ач позначає професію або активного діяча, наприклад, слухач.
      options:
        - text: слухач
          correct: true
        - text: викладач
