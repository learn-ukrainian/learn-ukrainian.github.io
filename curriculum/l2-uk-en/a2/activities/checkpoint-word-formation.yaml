- type: quiz
  title: 'Перевірте знання: Основи словотворення'
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
    - question: Що таке корінь слова в українській мові?
      explanation: Корінь — це головна незмінна частина слова, яка завжди несе базове
        лексичне значення.
      options:
        - text: Головна незмінна частина слова.
          correct: true
        - text: Змінна частина слова в кінці.
          correct: false
        - text: Спеціальна частина слова перед коренем.
          correct: false
        - text: Будь-яка абсолютно нова морфема.
          correct: false
    - question: Де зазвичай стоїть префікс у новому слові?
      explanation: Префікс завжди стоїть перед коренем і ефективно змінює його напрямок
        або точне значення.
      options:
        - text: Безпосередньо перед самим коренем.
          correct: true
        - text: Одразу після основного кореня.
          correct: false
        - text: В самому фінальному кінці слова.
          correct: false
        - text: Прямо в середині базового кореня.
          correct: false
    - question: Яку конкретну функцію виконує популярний суфікс -ння?
      explanation: Цей суфікс дуже продуктивно перетворює активне дієслово на іменник,
        що показує процес.
      options:
        - text: Утворює іменник, що показує тривалий процес.
          correct: true
        - text: Показує фізичний напрямок дії назовні.
          correct: false
        - text: Вказує на людину, яка виконує дію.
          correct: false
        - text: Створює абсолютно новий прикметник.
          correct: false
    - question: Який префікс показує фізичний рух назовні з приміщення?
      explanation: Префікс ви- працює як навігатор, вказуючи рух назовні (виходити).
      options:
        - text: Префікс ви-
          correct: true
        - text: Префікс в-
          correct: false
        - text: Префікс за-
          correct: false
        - text: Префікс пере-
          correct: false
    - question: Що саме означає суфікс -ість у словах типу радість?
      explanation: Цей красивий суфікс завжди створює абстрактні іменники-якості жіночого
        роду.
      options:
        - text: Глибоку абстрактну якість або стан.
          correct: true
        - text: Конкретну фізичну професію людини.
          correct: false
        - text: Фізичний матеріал або інструмент.
          correct: false
        - text: Швидкий і дуже короткий процес.
          correct: false
    - question: Який суфікс завжди вказує на людину, яка активно виконує дію?
      explanation: Суфікс -ач логічно вказує на діяча (слухач, читач).
      options:
        - text: Суфікс -ач
          correct: true
        - text: Суфікс -ння
          correct: false
        - text: Суфікс -ість
          correct: false
        - text: Суфікс -овий
          correct: false
    - question: Що логічно означає префікс під- у відомому слові підписати?
      explanation: Цей префікс буквально означає рух знизу або додавання підпису внизу
        документа.
      options:
        - text: Рух знизу або додавання інформації внизу.
          correct: true
        - text: Рух назовні з великого приміщення.
          correct: false
        - text: Повне завершення складної роботи.
          correct: false
        - text: Повторення дії ще один раз.
          correct: false
    - question: Який популярний суфікс зазвичай показує конкретний фізичний матеріал
        предмета?
      explanation: Суфікс -овий (або -евий) часто показує матеріал (паперовий, дерев'яний).
      options:
        - text: Суфікс -овий
          correct: true
        - text: Суфікс -ський
          correct: false
        - text: Суфікс -ач
          correct: false
        - text: Суфікс -ість
          correct: false
- type: match-up
  title: 'Знайдіть пару: Корінь та похідне слово'
  instruction: З'єднайте базовий корінь або просте слово з його правильним похідним
    словом.
  pairs:
    - left: вода
      right: підводний
    - left: радіти
      right: радість
    - left: читати
      right: читач
    - left: ліс
      right: лісовий
    - left: студент
      right: студентський
    - left: папір
      right: паперовий
    - left: робити
      right: зробити
    - left: місто
      right: міський
- type: fill-in
  title: Заповніть пропуски правильними словами
  instruction: Оберіть найбільш точне слово для кожного контекстного речення.
  items:
    - sentence: Наш новий ___ дуже цікаво розповідає про довгу історію.
      answer: викладач
      options:
        - викладач
        - слухач
        - читач
        - глядач
      explanation: Слово викладач означає людину, яка професійно вчить інших.
    - sentence: Швидке і глибоке ___ нових правил допоможе вам на складному іспиті.
      answer: розуміння
      options:
        - розуміння
        - читання
        - значення
        - навчання
      explanation: Суфікс -ння чудово підходить для опису процесу розуміння.
    - sentence: Моя найголовніша ___ - це вільно розмовляти красивою українською мовою.
      answer: мрія
      options:
        - мрія
        - радість
        - молодість
        - думка
      explanation: Слово мрія було спеціально створене Михайлом Старицьким.
    - sentence: Україна офіційно здобула свою довгоочікувану ___ у тисяча дев'ятсот
        дев'яносто першому році.
      answer: незалежність
      options:
        - незалежність
        - радість
        - молодість
        - відповідальність
      explanation: Для абстрактних якостей використовуємо суфікс -ість.
    - sentence: Я хочу купити собі новий ___ стаканчик для гарячої ранкової кави.
      answer: паперовий
      options:
        - паперовий
        - осінній
        - студентський
        - дерев'яний
      explanation: Суфікс -овий позначає конкретний фізичний матеріал.
    - sentence: Цей смачний традиційний український круглий хліб правильно називається
        ___.
      answer: паляниця
      options:
        - паляниця
        - крамниця
        - таємниця
        - суниця
      explanation: Це слово є відомим культурним символом.
    - sentence: Вони серйозно планують швидко ___ цей великий і сучасний дім.
      answer: побудувати
      options:
        - побудувати
        - будувати
        - зробити
        - переробити
      explanation: Префікс по- показує фінальний результат будівництва.
    - sentence: Мій розумний і досвідчений ___ завжди допомагає мені з важким проєктом.
      answer: співробітник
      options:
        - співробітник
        - співрозмовник
        - робітник
        - викладач
      explanation: Префікс спів- означає спільну дію кількох людей.
- type: group-sort
  title: Розподіліть слова за суфіксами
  instruction: Розподіліть ці нові слова у правильні групи залежно від їхнього суфікса
    та граматичного значення.
  groups:
    - name: Активний процес (-ння)
      items:
