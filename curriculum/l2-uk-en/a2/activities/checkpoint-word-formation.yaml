- type: error-correction
  title: 'Виправте помилки: Суржик та кальки'
  instruction: Знайдіть граматичну або стилістичну помилку в кожному реченні та оберіть
    правильний варіант.
  items:
    - sentence: Наші думки абсолютно співпадають у цьому дуже важливому питанні.
      error: співпадають
      answer: збігаються
      error_type: word
      options:
        - збігаються
        - співпадають
        - падають
        - працюють
      explanation: Слово співпадати - це російська калька, літературно правильно казати
        збігатися.
    - sentence: Швидка розробка цього важливого фінансового плану тривала два місяці.
      error: розробка
      answer: розроблення
      error_type: word
      options:
        - розроблення
        - розробка
        - робота
        - дія
      explanation: Для активного тривалого процесу слід використовувати суфікс -ння,
        а не -к.
    - sentence: Ми спостерігаємо за тим, як довго проходить підготовка до іспиту.
      error: підготовка
      answer: підготування
      error_type: word
      options:
        - підготування
        - підготовка
        - готування
        - робота
      explanation: Правильна форма процесу має суфікс -ння.
    - sentence: Я відчуваю неймовірно велику радий після нашої вчорашньої розмови.
      error: радий
      answer: радість
      error_type: word
      options:
        - радість
        - радий
        - радіти
        - радо
      explanation: Потрібно використати іменник із суфіксом -ість для опису абстрактної
        якості або емоції.
    - sentence: Я дуже люблю кушати свіжі червоні яблука кожного раннього ранку.
      error: кушати
      answer: їсти
      error_type: word
      options:
        - їсти
        - кушати
        - пити
        - брати
      explanation: Слово кушати - це типовий суржик. В українській мові використовується
        слово їсти.
    - sentence: Цей величезний лісний звір був дуже страшним і небезпечним.
      error: лісний
      answer: лісовий
      error_type: word
      options:
        - лісовий
        - лісний
        - лісовик
        - ліс
      explanation: Правильний український прикметник від слова ліс - лісовий.
- type: true-false
  title: Правда чи брехня?
  instruction: Уважно прочитайте кожне твердження і визначте, чи є воно правдивим.
  items:
    - statement: Корінь - це та частина слова, яка показує тільки граматичну форму.
      correct: false
      explanation: Корінь несе базове лексичне значення слова, а форму показує закінчення.
    - statement: Суфікс -ість завжди і без винятків створює іменники жіночого роду.
      correct: true
      explanation: Слова типу радість, незалежність завжди мають жіночий рід.
    - statement: Префікс ви- логічно позначає рух всередину закритого приміщення.
      correct: false
      explanation: Префікс ви- позначає рух назовні (виходити), а в- означає рух всередину.
    - statement: Популярне слово мрія було штучно створене українським письменником.
      correct: true
      explanation: Слово мрія вигадав Михайло Старицький у дев'ятнадцятому столітті.
    - statement: Дієслово зробити завжди показує тривалий, дуже абстрактний і безперервний
        процес.
      correct: false
      explanation: Префікс з- робить це дієслово доконаним, тобто воно показує фінальний
        результат.
    - statement: Універсальний суфікс -ння часто використовується для опису активних
        процесів.
      correct: true
      explanation: Наприклад, від слова читати ми утворюємо абстрактний процес читання.
    - statement: Прикметник паперовий точно показує конкретний фізичний матеріал предмета.
      correct: true
      explanation: Суфікс -овий дуже часто використовується для назв матеріалів (дерев'яний,
        скляний).
    - statement: Слово співпадати є абсолютно правильною та красивою літературною
        формою.
      correct: false
      explanation: Це типова російська калька, літературний стандарт - дієслово збігатися.
