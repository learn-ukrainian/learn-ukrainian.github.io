        - читання
        - розроблення
        - малювання
    - name: Абстрактна якість (-ість)
      items:
        - незалежність
        - радість
        - молодість
        - відповідальність
    - name: Активний діяч (-ач, -ар)
      items:
        - викладач
        - слухач
        - читач
        - лікар
