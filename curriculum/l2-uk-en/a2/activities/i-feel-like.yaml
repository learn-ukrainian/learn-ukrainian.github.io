- type: translate
  title: 'Перекладіть англійські фрази'
  instruction: 'Оберіть найбільш природний та граматично правильний український переклад для цих англійських речень.'
  items:
    - source: 'I am cold.'
      explanation: 'Фізичний стан температури завжди вимагає використання давального відмінка "мені".'
      options:
        - text: 'Мені холодно.'
          correct: true
        - text: 'Я холодний.'
          correct: false
        - text: 'Мене холодно.'
          correct: false
    - source: 'She is bored.'
      explanation: 'Фраза "Вона нудна" означає "She is a boring person". "Їй нудно" правильно означає тимчасовий стан.'
      options:
        - text: 'Їй нудно.'
          correct: true
        - text: 'Вона нудна.'
          correct: false
        - text: 'Їй сумно.'
          correct: false
    - source: 'We are having fun.'
      explanation: 'Процес, який приносить радість і розвагу, описується як стан "нам весело".'
      options:
        - text: 'Нам весело.'
          correct: true
        - text: 'Ми веселі.'
          correct: false
        - text: 'Нас весело.'
          correct: false
    - source: 'Are you hot?'
      explanation: 'Питання про комфортну температуру для однієї людини звучить як "Тобі жарко?".'
      options:
        - text: 'Тобі жарко?'
          correct: true
        - text: 'Ти гарячий?'
          correct: false
        - text: 'Вас жарко?'
          correct: false
    - source: 'He feels bad today.'
      explanation: 'Стан здоров''я найкраще передається через прислівник "погано" з давальним відмінком.'
      options:
        - text: 'Йому сьогодні погано.'
          correct: true
        - text: 'Він сьогодні поганий.'
          correct: false
        - text: 'Його сьогодні погано.'
          correct: false
    - source: 'I am glad to see you.'
      explanation: 'Слово "радий" є винятком і завжди традиційно використовується з називним відмінком.'
      options:
        - text: 'Я радий бачити тебе.'
          correct: true
        - text: 'Мені радісно бачити тебе.'
          correct: false
        - text: 'Мені радість бачити тебе.'
          correct: false

- type: mark-the-words
  title: 'Знайдіть слова стану'
  instruction: 'Знайдіть і позначте всі прислівники, які описують фізичний або емоційний стан людини у цьому тексті.'
  text: 'Сьогодні зранку мені було дуже холодно. Я випив чай, і мені стало тепло. На роботі колегам було нудно, але потім ми почали обговорювати магнітні бурі. Після розмови всім стало весело. Увечері мені раптом стало сумно через дощ. Але я подзвонив другу, і мені вже радісно.'
  answers:
    - 'холодно'
    - 'тепло'
    - 'нудно'
    - 'весело'
    - 'сумно'
    - 'радісно'

- type: match-up
  title: 'Логічні реакції та стани'
  instruction: 'З''єднайте життєву ситуацію з найбільш логічним станом або емоційною реакцією.'
  pairs:
    - left: 'Я забув зимову шапку вдома.'
      right: 'Мені холодно.'
    - left: 'Я сиджу на яскравому сонці.'
      right: 'Мені жарко.'
    - left: 'Мій хороший друг серйозно захворів.'
      right: 'Мені сумно.'
    - left: 'Ми граємо в дуже цікаву гру.'
      right: 'Нам весело.'
    - left: 'Я довго слухаю нецікаву лекцію.'
      right: 'Мені нудно.'
    - left: 'Я сильно впав з нового велосипеда.'
      right: 'Мені боляче.'
    - left: 'На нічній вулиці зовсім темно.'
      right: 'Мені страшно.'
    - left: 'Завтра почнеться моя літня відпустка.'
      right: 'Мені радісно.'