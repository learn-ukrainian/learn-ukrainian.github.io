- type: quiz
  title: 'Перевірте знання: Стан особи'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'Як правильно перекласти англійську фразу "I feel cold" українською?'
      explanation: 'Для опису фізичного стану ми використовуємо давальний відмінок (мені) та прислівник (холодно).'
      options:
        - text: 'Мені холодно'
          correct: true
        - text: 'Я холодний'
          correct: false
        - text: 'Мене холодно'
          correct: false
        - text: 'Я холодно'
          correct: false
    - question: 'Який відмінок ми використовуємо для особи, яка безпосередньо відчуває емоцію?'
      explanation: 'Стани вимагають давального відмінка, бо вони ніби пасивно відбуваються з людиною.'
      options:
        - text: 'Давальний відмінок'
          correct: true
        - text: 'Називний відмінок'
          correct: false
        - text: 'Знахідний відмінок'
          correct: false
        - text: 'Родовий відмінок'
          correct: false
    - question: 'Що зазвичай означає українська фраза "я гарячий"?'
      explanation: 'Ця фраза означає привабливість або температуру тіла. Для температури середовища використовуйте "мені жарко".'
      options:
        - text: 'Я привабливий або маю високу температуру'
          correct: true
        - text: 'Мені спекотно від яскравого сонця'
          correct: false
        - text: 'Я п''ю дуже гарячий чай'
          correct: false
        - text: 'Я дуже злий на когось'
          correct: false
    - question: 'Як правильно сказати "She is bored" українською мовою?'
      explanation: '"Вона нудна" означає "She is a boring person". Для опису емоційного стану потрібен давальний відмінок.'
      options:
        - text: 'Їй нудно'
          correct: true
        - text: 'Вона нудна'
          correct: false
        - text: 'Їй сумно'
          correct: false
        - text: 'Вона нудно'
          correct: false
    - question: 'Яке з цих слів описує глибоку постійну рису характеру, а не тимчасовий стан?'
      explanation: '"Щасливий" — це прикметник, який часто описує глибокий постійний стан або характер.'
      options:
        - text: 'Щасливий'
          correct: true
        - text: 'Весело'
          correct: false
        - text: 'Сумно'
          correct: false
        - text: 'Боляче'
          correct: false
    - question: 'Як українці дуже часто пояснюють раптовий головний біль або поганий настрій?'
      explanation: 'Метеозалежність і магнітні бурі — це надзвичайно популярна тема для скарг в Україні.'
      options:
        - text: 'Магнітними бурями'
          correct: true
        - text: 'Поганою їжею'
          correct: false
        - text: 'Довгою роботою'
          correct: false
        - text: 'Складними іспитами'
          correct: false
    - question: 'Яке коротке дієслово ми додаємо, щоб показати дуже швидку зміну стану?'
      explanation: 'Слово "стало" (became) використовується, щоб показати, що стан людини раптом змінився.'
      options:
        - text: 'Стало'
          correct: true
        - text: 'Було'
          correct: false
        - text: 'Буде'
          correct: false
        - text: 'Є'
          correct: false
    - question: 'Чому граматична фраза "Мені страшно" семантично відрізняється від "Я боюся"?'
      explanation: 'Конструкції з давальним відмінком яскраво показують пасивне сприйняття емоції, яка ніби приходить ззовні.'
      options:
        - text: '"Мені страшно" описує пасивний стан, а "Я боюся" — активну дію'
          correct: true
        - text: '"Мені страшно" використовується тільки маленькими дітьми'
          correct: false
        - text: '"Я боюся" завжди розповідає про жахливу погоду'
          correct: false
        - text: 'Між цими двома фразами немає жодної семантичної різниці'
          correct: false

- type: match-up
  title: 'Знайдіть відповідний давальний займенник'
  instruction: 'З''єднайте займенник у називному відмінку з його формою у давальному відмінку.'
  pairs:
    - left: 'Я'
      right: 'мені'
    - left: 'Ти'
      right: 'тобі'
    - left: 'Він'
      right: 'йому'
    - left: 'Вона'
      right: 'їй'
    - left: 'Ми'
      right: 'нам'
    - left: 'Ви'
      right: 'вам'
    - left: 'Вони'
      right: 'їм'
    - left: 'Хто'
      right: 'кому'

- type: unjumble
  title: 'Складіть правильні речення'
  instruction: 'Розташуйте слова у правильному порядку, щоб утворити речення про стан.'
  items:
    - words: ['Взимку', 'мені', 'завжди', 'дуже', 'холодно']
      answer: 'Взимку мені завжди дуже холодно'
    - words: ['Чому', 'тобі', 'сьогодні', 'так', 'сумно']
      answer: 'Чому тобі сьогодні так сумно'
    - words: ['Їй', 'раптом', 'стало', 'дуже', 'погано']
      answer: 'Їй раптом стало дуже погано'
    - words: ['Нам', 'завжди', 'було', 'весело', 'разом']
      answer: 'Нам завжди було весело разом'
    - words: ['Йому', 'боляче', 'тримати', 'мобільний', 'телефон']
      answer: 'Йому боляче тримати мобільний телефон'
    - words: ['Вам', 'справді', 'жарко', 'у', 'цій', 'кімнаті']
      answer: 'Вам справді жарко у цій кімнаті'

- type: fill-in
  title: 'Заповніть пропуски займенниками'
  instruction: 'Оберіть правильний займенник у давальному відмінку для кожної ситуації.'
  items:
    - sentence: 'Я забув куртку вдома, і тепер _____ дуже холодно.'
      answer: 'мені'
      options: ['мені', 'я', 'мене', 'мною']
      explanation: 'Стан відчуває особа "Я", тому в давальному відмінку буде "мені".'
    - sentence: 'Олена читає сумну книгу, і _____ теж стало сумно.'
      answer: 'їй'
      options: ['їй', 'вона', 'її', 'нею']
      explanation: 'Олена (вона) відчуває смуток, тому використовуємо "їй".'
    - sentence: 'Ми дуже любимо цю активну гру, _____ завжди весело грати.'
      answer: 'нам'
      options: ['нам', 'ми', 'нас', 'нами']
      explanation: 'Ми відчуваємо радість від гри, тому використовуємо "нам".'
    - sentence: 'Мій брат впав на вулиці, і зараз _____ боляче.'
      answer: 'йому'
      options: ['йому', 'він', 'його', 'ним']
      explanation: 'Брат (він) відчуває біль, тому використовуємо "йому".'
    - sentence: 'Малі діти довго бігали, і _____ швидко стало жарко.'
      answer: 'їм'
      options: ['їм', 'вони', 'їх', 'ними']
      explanation: 'Діти (вони) відчувають спеку, тому використовуємо "їм".'
    - sentence: 'Антоне, відкрий вікно у кімнаті, якщо _____ жарко.'
      answer: 'тобі'
      options: ['тобі', 'ти', 'тебе', 'тобою']
      explanation: 'Звернення до Антона (ти), тому використовуємо "тобі".'
    - sentence: 'Друзі, _____ теж нудно дивитися цей старий фільм?'
      answer: 'вам'
      options: ['вам', 'ви', 'вас', 'вами']
      explanation: 'Звернення до групи людей (ви), тому використовуємо "вам".'
    - sentence: 'Я випив гарячий зелений чай, і _____ стало набагато краще.'
      answer: 'мені'
      options: ['мені', 'я', 'мене', 'мною']
      explanation: 'Я відчуваю покращення стану, тому використовуємо "мені".'

- type: error-correction
  title: 'Виправте граматичні помилки'
  instruction: 'Знайдіть і виправте помилку в реченні. Зверніть увагу на відмінки та частини мови.'
  items:
    - sentence: 'Я дуже холодний сьогодні, будь ласка, закрий велике вікно.'
      error: 'холодний'
      answer: 'холодно'
      error_type: 'word'
      options: ['холодно', 'холодна', 'холодні', 'холодом']
      explanation: 'Для опису свого фізичного стану потрібно використовувати прислівник (холодно), а не прикметник (холодний).'
    - sentence: 'Вона сумно, тому що на вулиці цілий день іде дощ.'
      error: 'Вона'
      answer: 'Їй'
      error_type: 'word'
      options: ['Їй', 'Її', 'Вона', 'Нею']
      explanation: 'Стан особи вимагає давального відмінка. Правильно сказати "їй сумно".'
    - sentence: 'Ми весело на цій великій і гучній новорічній вечірці.'
      error: 'Ми'
      answer: 'Нам'
      error_type: 'word'
      options: ['Нам', 'Нас', 'Ми', 'Нами']
      explanation: 'Слово "весело" описує стан, тому займенник має бути в давальному відмінку (нам).'
    - sentence: 'Він боляче, коли сімейний лікар робить неприємний укол.'
      error: 'Він'
      answer: 'Йому'
      error_type: 'word'
      options: ['Йому', 'Його', 'Він', 'Ним']
      explanation: 'Людина, яка відчуває біль, обов''язково стоїть у давальному відмінку (йому).'
    - sentence: 'Я гарячий, бо на вулиці неймовірно сильне літнє сонце.'
      error: 'гарячий'
      answer: 'жарко'
      error_type: 'word'
      options: ['жарко', 'гаряче', 'тепло', 'гаряча']
      explanation: 'Фраза "я гарячий" має сексуальний підтекст. Про температуру середовища кажуть "мені жарко".'
    - sentence: 'Тобі радий бачити мене після такої довгої робочої паузи?'
      error: 'Тобі'
      answer: 'Ти'
      error_type: 'word'
      options: ['Ти', 'Тобі', 'Тебе', 'Тобою']
      explanation: 'Слово "радий" — це короткий прикметник, тому він завжди використовується з називним відмінком (Ти радий).'

- type: true-false
  title: 'Правда чи брехня?'
  instruction: 'Визначте, чи є ці твердження про українську мову та культуру правдивими.'
  items:
    - statement: 'В українській мові стан людини завжди описується за допомогою дієслова "бути" в теперішньому часі (є).'
      correct: false
      explanation: 'Дієслово "бути" (to be) в теперішньому часі (є) зазвичай просто опускається.'
    - statement: 'Щоб перекласти фразу "I am sad", українці використовують конструкцію "Я сумний".'
      correct: false
      explanation: '"Я сумний" описує меланхолійний характер на все життя. Тимчасовий стан — "мені сумно".'
    - statement: 'Слово "радий" завжди змінюється залежно від того, чи говорить чоловік, чи жінка.'
      correct: true
      explanation: 'Так, чоловік завжди каже "я радий", а жінка обов''язково каже "я рада".'
    - statement: 'Метеозалежність — це дуже рідкісна хвороба, про яку в Україні зовсім мало говорять.'
      correct: false
      explanation: 'Метеозалежність — це надзвичайно популярна тема для повсякденних розмов і легких скарг.'
    - statement: 'Слово "холодно" відповідає на запитання "Як?", тому граматично це є прислівник.'
      correct: true
      explanation: 'Прислівники стану найчастіше закінчуються на літеру -о і відповідають на питання "як?".'
    - statement: 'Фраза "Мені страшно" добре показує, що людина ніби є пасивним отримувачем емоції.'
      correct: true
      explanation: 'Давальний відмінок чудово передає стару філософську ідею, що страх приходить ззовні.'
    - statement: 'Скаржитися на погану погоду в Україні вважається дуже неввічливим і грубим.'
      correct: false
      explanation: 'Скарги на погоду — це абсолютно нормальна соціальна взаємодія та простий спосіб показати емпатію.'
    - statement: 'Давальний відмінок відповідає на важливі питання "Кому? Чому?".'
      correct: true
      explanation: 'Ці два запитання допомагають швидко визначити особу, яка відчуває певний стан.'

- type: group-sort
  title: 'Характер чи Стан?'
  instruction: 'Розподіліть фрази на дві логічні групи: ті, що описують постійну рису або властивість (Називний відмінок), і ті, що описують тимчасовий стан (Давальний відмінок).'
  groups:
    - name: 'Постійна характеристика (Який?)'
      items:
        - 'Він дуже сумний'
        - 'Цей фільм нудний'
        - 'Мій чай холодний'
        - 'Я щаслива людина'
    - name: 'Тимчасовий стан (Як?)'
      items:
        - 'Йому зараз сумно'
        - 'Нам завжди нудно'
        - 'Мені раптом холодно'
        - 'Їй дуже радісно'

- type: cloze
  title: 'Ранок важкого дня'
  instruction: 'Прочитайте текст про ранковий стан людини та заповніть пропуски правильними словами.'
  passage: 'Сьогодні дуже погана {{1}}. Антон прокидається, і йому фізично дуже {{2}}. Його сильно болить голова. Він думає, що це нові магнітні {{3}}. Антон відкриває вікно, але на вулиці зима, і йому швидко стає {{4}}. Він закриває вікно. Антон іде на кухню і робить гарячий чай. Він п''є чай, і йому нарешті стає {{5}}. Дзвонить його подруга Олена. Вона каже, що їй дуже {{6}} сидіти вдома весь день самою. Антон відповідає: "Мені теж сумно, але надворі так холодно. Давай просто поговоримо, щоб нам стало {{7}}". Вони говорять про плани на літо, і їм стає {{8}}. Антон вже не думає про погоду, йому {{9}}, що у нього є така хороша {{10}}.'
  blanks:
    - id: 1
      answer: 'погода'
      options: ['погода', 'природа', 'буря', 'зима']
    - id: 2
      answer: 'погано'
      options: ['погано', 'боляче', 'жарко', 'нудно']
    - id: 3
      answer: 'бурі'
      options: ['бурі', 'дощі', 'вітри', 'хмари']
    - id: 4
      answer: 'холодно'
      options: ['холодно', 'жарко', 'тепло', 'весело']
    - id: 5
      answer: 'краще'
      options: ['краще', 'гірше', 'холодно', 'сумно']
    - id: 6
      answer: 'нудно'
      options: ['нудно', 'весело', 'радісно', 'страшно']
    - id: 7
      answer: 'весело'
      options: ['весело', 'нудно', 'сумно', 'погано']
    - id: 8
      answer: 'тепло'
      options: ['тепло', 'холодно', 'страшно', 'боляче']
    - id: 9
      answer: 'радісно'
      options: ['радісно', 'нудно', 'сумно', 'погано']
    - id: 10
      answer: 'подруга'
      options: ['подруга', 'машина', 'квартира', 'робота']

