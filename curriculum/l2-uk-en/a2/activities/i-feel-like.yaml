          correct: true
        - text: 'Мені вже краще.'
          correct: true
        - text: 'Я є хороший.'
          correct: false
        - text: 'Я дуже радий чоловік.'
          correct: false
    - question: 'Оберіть речення, які використовують конструкцію давального відмінка для опису страху.'
      min_correct: 2
      explanation: 'Пасивний стан страху передається через давальний відмінок: мені страшно, йому неспокійно.'
      options:
        - text: 'Мені страшно в темряві.'
          correct: true
        - text: 'Йому неспокійно перед іспитом.'
