    - name: "Зона 2 (Два, три, чотири)"
      items: ["два", "три", "чотири", "двадцять два", "тридцять чотири"]
    - name: "Зона 3 (П'ять і більше)"
      items: ["п'ять", "десять", "дванадцять", "двадцять", "п'ятдесят"]

