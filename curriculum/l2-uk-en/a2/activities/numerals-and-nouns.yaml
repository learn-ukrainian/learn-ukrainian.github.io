- type: true-false
  title: "Правильно чи неправильно?"
  instruction: "Визначте, чи правильне узгодження числівника з іменником."
  items:
    - statement: "Ми кажемо одна гривня, тому що слово гривня жіночого роду."
      correct: true
    - statement: "Числа 11, 12, 13, 14 належать до Зони 2 і вимагають називного відмінка множини."
      correct: false
      explanation: "Вони належать до Зони 3 і вимагають родового відмінка множини (дванадцять гривень)."
    - statement: "Слово євро не змінюється після числівників."
      correct: true
    - statement: "Правильно казати два пляшки."
      correct: false
      explanation: "Слово пляшка жіночого роду, тому треба казати дві пляшки."
    - statement: "У складному числі 34 (тридцять чотири), зона визначається словом чотири."
      correct: true
    - statement: "Ми кажемо мені двадцять рік."
      correct: false
      explanation: "Для зони 3 (число 20) використовується слово років."
    - statement: "Правильно казати п'ять доларів."
      correct: true
    - statement: "Числівник один завжди має однакову форму для всіх родів."
      correct: false
      explanation: "Він змінюється за родами: один, одна, одне."
    - statement: "Числа 2, 3, 4 вимагають називного відмінка множини для неістот."
      correct: true
    - statement: "Якщо ми рахуємо людей у знахідному відмінку, ми кажемо бачу два друзі."
      correct: false
      explanation: "Для істот форма змінюється: бачу двох друзів."
    - statement: "Форма років використовується для чисел 5-20."
      correct: true
    - statement: "Правильно казати одне яблуко."
      correct: true

- type: quiz
  title: "Тест: Зони лічби та відмінки"
  instruction: "Оберіть правильний варіант закінчення речення."
  items:
    - question: "Яка правильна форма для числа 3 (три) зі словом день?"
      explanation: "Число 3 - це Зона 2 (називний відмінок множини)."
      options:
        - text: "три дні"
          correct: true
        - text: "три днів"
          correct: false
        - text: "три дня"
          correct: false
        - text: "три день"
          correct: false
    - question: "Як правильно сказати про вік: Моєму дідусеві вісімдесят..."
      explanation: "Число 80 належить до Зони 3, тому використовуємо форму років."
      options:
        - text: "років"
          correct: true
        - text: "рік"
          correct: false
        - text: "роки"
          correct: false
        - text: "року"
          correct: false
    - question: "До якої зони лічби належить число 12 (дванадцять)?"
      explanation: "Числа 11-14 є винятком із правила останньої цифри і завжди належать до Зони 3."
      options:
        - text: "До Зони 3"
          correct: true
        - text: "До Зони 2"
          correct: false
        - text: "До Зони 1"
          correct: false
        - text: "До Зони 4"
          correct: false
    - question: "Яке з цих слів є невідмінюваним і не змінюється після числівників?"
      explanation: "Слово євро має іноземне походження і не змінюється."
      options:
        - text: "євро"
          correct: true
        - text: "долар"
          correct: false
        - text: "гривня"
          correct: false
        - text: "рік"
          correct: false
    - question: "Як правильно сказати 22 роки українською мовою?"
      explanation: "Остання цифра два визначає зону (Зона 2, називний відмінок множини)."
      options:
        - text: "двадцять два роки"
          correct: true
        - text: "двадцять два років"
          correct: false
        - text: "двадцять два рік"
          correct: false
        - text: "двадцять дві роки"
          correct: false
    - question: "Яку граматичну форму має іменник після числа 5 (п'ять)?"
      explanation: "Числа від 5 вимагають родового відмінка множини (п'ять доларів)."
      options:
        - text: "родовий відмінок множини"
          correct: true
        - text: "називний відмінок множини"
          correct: false
        - text: "називний відмінок однини"
          correct: false
        - text: "знахідний відмінок однини"
          correct: false
    - question: "Як сказати англійську фразу I see two friends українською?"
      explanation: "Для істот (людей) у знахідному відмінку використовується форма двох друзів."
      options:
        - text: "Я бачу двох друзів"
          correct: true
        - text: "Я бачу два друзі"
          correct: false
        - text: "Я бачу два друзів"
          correct: false
        - text: "Я бачу двох друзі"
          correct: false
    - question: "Чому ми завжди кажемо дві гривні, а не два гривні?"
      explanation: "Число 2 має жіночу форму дві, яка використовується з іменниками жіночого роду."
      options:
        - text: "Тому що гривня - жіночого роду"
          correct: true
        - text: "Тому що це Зона 3"
          correct: false
        - text: "Тому що гривня - чоловічого роду"
          correct: false
        - text: "Тому що це виняток"
          correct: false

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Знайдіть і виправте помилку в узгодженні числівника з іменником."
  items:
    - sentence: "Дайте мені один гривня, будь ласка."
      error: "один"
      answer: "одна"
      error_type: "word"
      options: ["одна", "одне", "одні", "одного"]
      explanation: "Слово гривня жіночого роду, тому треба одна гривня."
    - sentence: "Я купив два пляшки води."
      error: "два"
      answer: "дві"
      error_type: "word"
      options: ["дві", "двох", "двом", "двома"]
      explanation: "Слово пляшка жіночого роду, правильно дві пляшки."
    - sentence: "Кілограм коштує п'ять гривні."
      error: "гривні"
      answer: "гривень"
      error_type: "word"
      options: ["гривень", "гривню", "гривнях", "гривнею"]
      explanation: "Після числа 5 (Зона 3) потрібен родовий відмінок множини: гривень."
    - sentence: "Моєму братові двадцять один роки."
      error: "роки"
      answer: "рік"
      error_type: "word"
      options: ["рік", "років", "роком", "року"]
      explanation: "Число закінчується на один (Зона 1), тому рік."
    - sentence: "Ми чекали дванадцять дні."
      error: "дні"
      answer: "днів"
      error_type: "word"
      options: ["днів", "день", "дню", "днях"]
      explanation: "Число 12 належить до Зони 3 (родовий множини), правильно дванадцять днів."
    - sentence: "Вона має тридцять чотири років."
      error: "років"
      answer: "роки"
      error_type: "word"
      options: ["роки", "рік", "рокам", "роками"]
      explanation: "Число 34 закінчується на чотири (Зона 2, називний множини), тому роки."
    - sentence: "Я бачу два друзів у парку."
      error: "два"
      answer: "двох"
      error_type: "word"
      options: ["двох", "дві", "двом", "двома"]
      explanation: "Для істот у знахідному відмінку використовуємо двох друзів."
    - sentence: "Це коштує десять єврів."
      error: "єврів"
      answer: "євро"
      error_type: "word"
      options: ["євро", "євра", "євром", "єврі"]
      explanation: "Слово євро не змінюється: десять євро."

- type: unjumble
  title: "Складіть речення: На ринку"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["скільки", "коштує", "це", "яблуко"]
      answer: "Скільки коштує це яблуко"
    - words: ["кілограм", "коштує", "п'ятдесят", "гривень"]
      answer: "Кілограм коштує п'ятдесят гривень"
    - words: ["дайте", "будь", "ласка", "дві", "пляшки"]
      answer: "Дайте будь ласка дві пляшки"
    - words: ["ваша", "решта", "п'ять", "гривень"]
      answer: "Ваша решта п'ять гривень"
    - words: ["моєму", "дідусеві", "вісімдесят", "років"]
      answer: "Моєму дідусеві вісімдесят років"
    - words: ["це", "коштує", "двадцять", "один", "долар"]
      answer: "Це коштує двадцять один долар"
    - words: ["я", "купив", "чотири", "квитки"]
      answer: "Я купив чотири квитки"
    - words: ["ми", "чекаємо", "двадцять", "хвилин"]
      answer: "Ми чекаємо двадцять хвилин"

