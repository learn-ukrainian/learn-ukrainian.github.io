          correct: false
        - text: "Лічильники знаходяться у ванній кімнаті."
          correct: true
        - text: "Я йду у ванну кімнату."
          correct: false
    - question: "Які фрази використовують Знахідний відмінок?"
      min_correct: 2
      options:
