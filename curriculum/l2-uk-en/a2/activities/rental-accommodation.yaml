          correct: true
        - text: "у великий будинок"
          correct: true
        - text: "у новій кімнаті"
          correct: false
        - text: "у великому будинку"
          correct: false
    - question: "Які фрази використовують Місцевий відмінок?"
      min_correct: 2
      options:
        - text: "у старому будинку"
          correct: true
        - text: "у світлій квартирі"
          correct: true
        - text: "у старий будинок"
          correct: false
        - text: "у світлу квартиру"
          correct: false

- type: translate
  title: "Перекладіть фрази"
  instruction: "Оберіть правильний переклад кожної фрази українською мовою."
  items:
    - source: "Are utilities included?"
      options:
        - text: "А комунальні включені?"
          correct: true
        - text: "А комунальні послуги безкоштовні?"
          correct: false
        - text: "Де знаходяться лічильники?"
          correct: false
        - text: "Скільки коштує оренда?"
          correct: false
    - source: "I want to rent an apartment from the owner."
      options:
        - text: "Я хочу зняти квартиру від власника."
