- type: match-up
  title: "Знайдіть пару: слово та його значення"
  instruction: "З'єднайте українське слово з його англійським перекладом або значенням."
  pairs:
    - left: "оренда"
      right: "rent"
    - left: "власник"
      right: "owner"
    - left: "посередник"
      right: "middleman"
    - left: "депозит"
      right: "security deposit"
    - left: "договір"
      right: "contract"
    - left: "лічильник"
      right: "meter"
    - left: "опалення"
      right: "heating"
    - left: "поверх"
      right: "floor"
    - left: "площа"
      right: "area"
    - left: "меблі"
      right: "furniture"

- type: fill-in
  title: "Доповніть речення"
  instruction: "Виберіть правильне слово, щоб доповнити речення про оренду квартири."
  items:
    - sentence: "Я хочу _____ квартиру на один рік."
      answer: "зняти"
      options: ["зняти", "здати", "купити", "продати"]
    - sentence: "Ми знайшли гарний варіант від _____."
      answer: "власника"
      options: ["власника", "рієлтора", "сусіда", "туриста"]
    - sentence: "Ви повинні заплатити за перший місяць і залишити страховий _____."
      answer: "депозит"
      options: ["депозит", "договір", "лічильник", "поверх"]
    - sentence: "У кінці місяця ми маємо платити за _____."
      answer: "комунальні"
      options: ["комунальні", "меблі", "документи", "ремонт"]
    - sentence: "Скажіть, будь ласка, на якому _____ знаходиться квартира?"
      answer: "поверсі"
      options: ["поверсі", "площі", "стані", "районі"]
    - sentence: "Вони підписали _____ оренди на шість місяців."
      answer: "договір"
      options: ["договір", "депозит", "лічильник", "огляд"]
    - sentence: "Це дуже стара квартира, там _____ стан."
      answer: "радянський"
      options: ["радянський", "новий", "європейський", "сучасний"]
    - sentence: "У кухні є вся необхідна побутова _____."
      answer: "техніка"
      options: ["техніка", "меблі", "кімната", "площа"]

- type: error-correction
  title: "Виправте помилки"
  instruction: "Знайдіть і виправте помилку в кожному реченні."
  items:
    - sentence: "Доброго дня, я хочу здати вашу квартиру."
      error: "здати"
      answer: "зняти"
      options: ["зняти", "орендувати", "купити", "продати"]
      explanation: "Орендар хоче зняти житло, а власник хоче здати його."
    - sentence: "Вона переїжджає у новій квартирі."
      error: "у новій квартирі"
      answer: "в нову квартиру"
      error_type: "phrase"
      options: ["в нову квартиру", "на новій квартирі", "до нової квартири", "у новій квартирі"]
      explanation: "З дієсловами руху (переїжджати куди?) використовується знахідний відмінок."
    - sentence: "Я зараз живу в нову квартиру."
      error: "в нову квартиру"
      answer: "у новій квартирі"
      error_type: "phrase"
      options: ["у новій квартирі", "в нову квартиру", "на новій квартирі", "до нової квартири"]
      explanation: "З дієсловами стану (жити де?) використовується місцевий відмінок."
    - sentence: "Ми шукаємо житло без рієлтора, щоб не платити великий депозит."
      error: "депозит"
      answer: "комісію"
      options: ["комісію", "договір", "оренду", "комунальні"]
      explanation: "Рієлтору платять комісію, а власнику дають депозит."
    - sentence: "Завтра ми йдемо на огляд в цьому великому будинку."
      error: "в цьому великому будинку"
      answer: "у цей великий будинок"
      error_type: "phrase"
      options: ["у цей великий будинок", "в цьому великому будинку", "на цьому великому будинку", "у цього великого будинку"]
      explanation: "З дієсловом руху 'йти' використовується питання 'куди?' і знахідний відмінок."
    - sentence: "А комунальні послуги відключені у вартість оренди?"
      error: "відключені"
      answer: "включені"
      options: ["включені", "підключені", "закриті", "відкриті"]
      explanation: "Правильне слово — 'включені' (included)."

- type: quiz
  title: "Перевірте свої знання"
  instruction: "Оберіть правильну відповідь на запитання про оренду в Україні."
  items:
    - question: "Хто такий рієлтор і чому українці часто шукають житло без нього?"
      options:
        - text: "Це власник квартири, який бере гроші за огляд."
          correct: false
        - text: "Це посередник, послуги якого коштують дуже дорого."
          correct: true
        - text: "Це сусід, який допомагає знайти квартиру."
          correct: false
        - text: "Це юрист, який безкоштовно перевіряє договір."
          correct: false
      explanation: "Рієлтор — це посередник, і його комісію зазвичай платить орендар."
    - question: "Що означає правило 'перший і останній місяць'?"
      options:
        - text: "Ви платите за перший місяць і залишаєте гарантійну суму (депозит)."
          correct: true
        - text: "Ви платите тільки за перший і останній місяць проживання, а між ними живете безкоштовно."
          correct: false
        - text: "Власник повертає вам гроші за перший місяць."
          correct: false
        - text: "Ви можете не платити за останній місяць оренди."
          correct: false
      explanation: "Ви платите аванс за перший місяць і таку ж суму як депозит (заставу)."
    - question: "Для чого власник бере страховий депозит?"
      options:
        - text: "Щоб заплатити комісію рієлтору."
          correct: false
        - text: "Як гарантію, якщо ви зламаєте меблі або залишите борги за комунальні."
          correct: true
        - text: "Це податок для держави за оренду квартири."
          correct: false
        - text: "Щоб купити нову побутову техніку."
          correct: false
      explanation: "Депозит покриває можливі проблеми та пошкодження в майбутньому."
    - question: "Яке найважливіше запитання потрібно поставити власнику про гроші?"
      options:
        - text: "Де тут найближчий магазин?"
          correct: false
        - text: "Чи можу я купити цю квартиру?"
          correct: false
        - text: "А комунальні включені?"
          correct: true
        - text: "Хто ваші сусіди?"
          correct: false
      explanation: "Запитання про комунальні послуги допомагає уникнути несподіваних витрат."
    - question: "Що означає фраза 'плюс комунальні за лічильниками'?"
      options:
        - text: "Ви платите фіксовану суму за оренду, а власник платить за комунальні."
          correct: false
        - text: "Ви додатково платите за воду, світло та газ стільки, скільки використали."
          correct: true
        - text: "Власник дає вам гроші на оплату комунальних послуг."
          correct: false
        - text: "Лічильники працюють безкоштовно."
          correct: false
      explanation: "Ви маєте оплачувати свої витрати додатково до ціни оренди."
    - question: "Як українці називають стан квартири з новими вікнами та сучасними меблями?"
      options:
        - text: "Радянський стан."
          correct: false
        - text: "Євроремонт."
          correct: true
        - text: "Кімната без меблів."
          correct: false
        - text: "Подобова оренда."
          correct: false
      explanation: "Євроремонт — це популярний термін для сучасного хорошого стану квартири."
    - question: "Що відбувається з депозитом, коли ви виїжджаєте з квартири без боргів?"
      options:
        - text: "Власник забирає ці гроші собі."
          correct: false
        - text: "Ви віддаєте ці гроші рієлтору."
          correct: false
        - text: "Власник зобов'язаний повернути вам депозит."
          correct: true
        - text: "Ви платите ще один депозит."
          correct: false
      explanation: "Якщо квартира в порядку і немає боргів, депозит повертається орендарю."
    - question: "Яка різниця між дієсловами 'здавати' і 'знімати'?"
      options:
        - text: "Здавати — це брати житло для себе, а знімати — давати житло іншим."
          correct: false
        - text: "Вони означають абсолютно одне й те саме."
          correct: false
        - text: "Власник здає квартиру, а клієнт знімає її."
          correct: true
        - text: "Ці слова стосуються тільки купівлі та продажу будинків."
          correct: false
      explanation: "Власник здає житло і отримує гроші, а клієнт знімає житло і платить гроші."

- type: true-false
  title: "Правда чи брехня?"
  instruction: "Прочитайте твердження про оренду та українські оголошення і визначте, чи вони правдиві."
  items:
    - statement: "Оголошення з текстом 'від власника' означає, що вам не потрібно платити комісію агенту."
      correct: true
      explanation: "Оренда від власника допомагає зберегти гроші, бо немає посередників."
    - statement: "Українська 'однокімнатна квартира' — це те саме, що квартира-студія без кухні."
      correct: false
      explanation: "Однокімнатна квартира зазвичай має окрему кімнату і повністю окрему кухню."
    - statement: "'Подобова оренда' ідеально підходить для людей, які шукають житло на рік."
      correct: false
      explanation: "Подобова оренда — це оренда на один або кілька днів, зазвичай для туристів."
    - statement: "В Україні дуже важко знайти порожню квартиру (без меблів), бо стандарт — це квартири з меблями."
      correct: true
      explanation: "Більшість квартир на ринку здаються вже з меблями та побутовою технікою."
    - statement: "Радянський стан квартири зазвичай означає, що оренда буде дуже дорогою."
      correct: false
      explanation: "Квартири в радянському стані зазвичай є найдешевшими варіантами на ринку."
    - statement: "У договорі оренди фіксується термін оренди і точна сума оплати."
      correct: true
      explanation: "Договір оренди — це юридичний документ, який захищає ваші права."
    - statement: "Якщо ви бачите в оголошенні 'пов. 5/9', це означає, що квартира знаходиться на дев'ятому поверсі."
      correct: false
      explanation: "Це означає, що квартира на п'ятому поверсі у дев'ятиповерховому будинку."
    - statement: "Ви повинні запитати про комунальні послуги тільки після того, як підписали договір оренди."
      correct: false
      explanation: "Це дуже важливо запитати під час огляду квартири, до підписання договору."

- type: unjumble
  title: "Складіть речення"
  instruction: "Розташуйте слова в правильному порядку, щоб утворити речення."
  items:
    - words: ["я", "квартиру", "хочу", "зняти", "однокімнатну"]
      answer: "Я хочу зняти однокімнатну квартиру."
    - words: ["можна", "подивитися", "коли", "цю", "квартиру"]
      answer: "Коли можна подивитися цю квартиру?"
    - words: ["комунальні", "у", "включені", "чи", "вартість", "послуги"]
      answer: "Чи включені комунальні послуги у вартість?"
    - words: ["підписали", "ми", "договір", "оренди", "довгострокової"]
      answer: "Ми підписали договір довгострокової оренди."
    - words: ["повернути", "власник", "вам", "депозит", "зобов'язаний"]
      answer: "Власник зобов'язаний повернути вам депозит."
    - words: ["переїжджаю", "нову", "завтра", "я", "в", "квартиру"]
      answer: "Завтра я переїжджаю в нову квартиру."

- type: group-sort
  title: "Розподіліть за групами"
  instruction: "Розподіліть слова та фрази у дві категорії."
  groups:
    - name: "Витрати та гроші"
      items: ["комісія рієлтора", "страховий депозит", "вартість оренди", "комунальні послуги"]
    - name: "Стан та наповнення квартири"
      items: ["євроремонт", "побутова техніка", "радянський стан", "нові меблі"]

- type: cloze
  title: "Процес оренди квартири"
  instruction: "Заповніть пропуски в тексті правильними словами."
  passage: "Я шукаю нове житло. Я не хочу платити велику комісію, тому шукаю квартиру від {{1}}. В інтернеті я знайшов гарне {{2}}. Це простора {{3}} квартира з великою кухнею. У ній є хороший {{4}} та нові меблі. Я зателефонував і запитав: 'Коли можна подивитися?'. Завтра я йду на {{5}}. Я обов'язково запитаю, чи включені {{6}} у вартість, або я маю платити за {{7}}. Якщо все буде добре, ми підпишемо {{8}} на шість місяців. Я заплачу за перший місяць і залишу {{9}}. Я сподіваюся, що швидко переїду в цю {{10}}."
  blanks:
    - id: 1
      answer: "власника"
      options: ["власника", "рієлтора", "сусіда", "туриста"]
    - id: 2
      answer: "оголошення"
      options: ["оголошення", "повідомлення", "відео", "фото"]
    - id: 3
      answer: "однокімнатна"
      options: ["однокімнатна", "подобова", "комунальна", "радянська"]
    - id: 4
      answer: "євроремонт"
      options: ["євроремонт", "договір", "поверх", "лічильник"]
    - id: 5
      answer: "огляд"
      options: ["огляд", "депозит", "договір", "поверх"]
    - id: 6
      answer: "комунальні"
      options: ["комунальні", "лічильники", "документи", "меблі"]
    - id: 7
      answer: "лічильниками"
      options: ["лічильниками", "правилами", "законами", "договорами"]
    - id: 8
      answer: "договір"
      options: ["договір", "депозит", "поверх", "огляд"]
    - id: 9
      answer: "заставу"
      options: ["заставу", "меблі", "техніку", "квартиру"]
    - id: 10
      answer: "квартиру"
      options: ["квартиру", "кімнаті", "квартирі", "кімнату"]

- type: mark-the-words
  title: "Знайдіть важливі деталі в оголошенні"
  instruction: "Знайдіть і позначте всі слова, які означають об'єкти в квартирі (меблі та техніка)."
  text: "Здається однокімнатна квартира. Тут є диван, шафа, ліжко і стіл. На кухні працює плита і холодильник."
  answers:
    - "диван"
    - "шафа"
    - "ліжко"
    - "стіл"
    - "плита"
    - "холодильник"

