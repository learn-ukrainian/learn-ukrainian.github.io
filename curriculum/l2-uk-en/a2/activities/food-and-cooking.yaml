- type: quiz
  title: "Перевірте знання: кухня та їжа"
  items:
    - question: "Який посуд ми використовуємо для смаження м'яса?"
      explanation: "Сковорода ідеально підходить для смаження на плиті."
      options:
        - text: "сковорода"
          correct: true
        - text: "каструля"
          correct: false
        - text: "духовка"
          correct: false
        - text: "ніж"
          correct: false
    - question: "Що ми зазвичай робимо у гарячій закритій духовці?"
      explanation: "У духовці ми печемо хліб, торти та інші страви."
      options:
        - text: "печемо"
          correct: true
        - text: "варимо"
          correct: false
        - text: "смажимо"
          correct: false
        - text: "ріжемо"
          correct: false
    - question: "Яким інструментом найкраще обережно різати свіжий хліб?"
      explanation: "Для нарізання продуктів потрібен гострий ніж."
      options:
        - text: "гострим ножем"
          correct: true
        - text: "великою ложкою"
          correct: false
        - text: "чистою каструлею"
          correct: false
        - text: "гарячою сковородою"
          correct: false
    - question: "Яке українське дієслово означає готувати їжу у воді?"
      explanation: "Дієслово варити означає готувати в рідині."
      options:
        - text: "варити"
          correct: true
        - text: "пекти"
          correct: false
        - text: "смажити"
          correct: false
        - text: "різати"
          correct: false
    - question: "Який смак має традиційний торт або фруктовий десерт?"
      explanation: "Десерти з цукром та фруктами мають солодкий смак."
      options:
        - text: "солодкий"
          correct: true
        - text: "солоний"
          correct: false
        - text: "кислий"
          correct: false
        - text: "гіркий"
          correct: false
    - question: "Що є найважливішим секретом смачного українського борщу?"
      explanation: "Овочева зажарка дає борщу колір та глибину смаку."
      options:
        - text: "овочева зажарка"
          correct: true
        - text: "дерев'яна ложка"
          correct: false
        - text: "велика каструля"
          correct: false
        - text: "холодна сметана"
          correct: false
    - question: "Яке закінчення має слово ложка в орудному відмінку?"
      explanation: "Іменники жіночого роду на -а отримують закінчення -ою."
      options:
        - text: "ложкою"
          correct: true
        - text: "ложком"
          correct: false
        - text: "ложкем"
          correct: false
        - text: "ложку"
          correct: false
    - question: "Як правильно сказати українською 'I cut with a knife'?"
      explanation: "Для інструмента потрібен орудний відмінок без прийменника."
      options:
        - text: "Я ріжу ножем"
          correct: true
        - text: "Я ріжу з ножем"
          correct: false
        - text: "Я різати ножем"
          correct: false
        - text: "Я ріжу ніж"
          correct: false

- type: unjumble
  title: "Складіть речення: процеси на кухні"
  items:
    - words: ["Я", "ріжу", "свіжий", "хліб", "гострим", "ножем"]
      answer: "Я ріжу свіжий хліб гострим ножем"
    - words: ["Ми", "варимо", "смачний", "борщ", "у", "каструлі"]
      answer: "Ми варимо смачний борщ у каструлі"
    - words: ["Мама", "смажить", "рибу", "на", "гарячій", "сковороді"]
      answer: "Мама смажить рибу на гарячій сковороді"
    - words: ["Будь", "ласка", "перемішай", "салат", "великою", "ложкою"]
      answer: "Будь ласка перемішай салат великою ложкою"
    - words: ["Бабуся", "завжди", "пече", "дуже", "солодкий", "пиріг"]
      answer: "Бабуся завжди пече дуже солодкий пиріг"
    - words: ["Додай", "трохи", "солі", "у", "цей", "гарячий", "суп"]
      answer: "Додай трохи солі у цей гарячий суп"
    - words: ["Українці", "дуже", "люблять", "їсти", "солоні", "вареники"]
      answer: "Українці дуже люблять їсти солоні вареники"
    - words: ["Наріж", "усі", "овочі", "на", "дерев'яній", "дошці"]
      answer: "Наріж усі овочі на дерев'яній дошці"

- type: error-correction
  title: "Виправте помилку: граматика та лексика"
  items:
    - sentence: "Я ріжу свіжі овочі з ножем."
      error: "з ножем"
      answer: "ножем"
      options: ["ножем", "від ножа", "на ножі", "ножу"]
      explanation: "В орудному відмінку для інструментів ми не використовуємо прийменник."
    - sentence: "Ми кушаємо смачні домашні вареники."
      error: "кушаємо"
      answer: "їмо"
      options: ["їмо", "їдемо", "їстуть", "робимо"]
      explanation: "Слово кушати — це русизм, правильно казати їсти."
    - sentence: "Мама варить картоплю на сковороді."
      error: "на сковороді"
      answer: "у каструлі"
      options: ["у каструлі", "у духовці", "на столі", "у мисці"]
      explanation: "Ми варимо їжу у каструлі, а на сковороді ми смажимо."
    - sentence: "Я варю дуже смачний бутерброд."
      error: "варю"
      answer: "готую"
      options: ["готую", "печу", "смажу", "п'ю"]
      explanation: "Дієслово варити використовується тільки для рідини. Для загального приготування кажемо готувати."
    - sentence: "Будь ласка, перемішай чай з ложкою."
      error: "з ложкою"
      answer: "ложкою"
      options: ["ложкою", "від ложки", "на ложці", "ложку"]
      explanation: "Для інструмента дії потрібен орудний відмінок без прийменника з."
    - sentence: "Бабуся пече хліб у каструлі."
      error: "у каструлі"
      answer: "у духовці"
      options: ["у духовці", "на сковороді", "у тарілці", "у ложці"]
      explanation: "Ми печемо хліб та пироги всередині закритої духовки."

