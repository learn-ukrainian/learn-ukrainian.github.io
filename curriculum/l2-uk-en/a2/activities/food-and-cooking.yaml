- type: true-false
  title: "Правда чи брехня: факти про їжу"
  items:
    - statement: "Борщ — це просто звичайний овочевий суп."
      correct: false
      explanation: "Борщ — це складний культурний символ, визнаний ЮНЕСКО."
    - statement: "Зажарка — це дуже важливий етап приготування борщу."
      correct: true
      explanation: "Без зажарки борщ втрачає свій колір та справжній смак."
    - statement: "В Україні є тільки один правильний рецепт борщу."
      correct: false
      explanation: "Існують сотні родинних рецептів, і всі вони автентичні."
    - statement: "Українці завжди зустрічають дорогих гостей хлібом і сіллю."
      correct: true
      explanation: "Це давня традиція і потужний символ гостинності."
    - statement: "Слово 'варити' означає готувати м'ясо в гарячій закритій духовці."
      correct: false
      explanation: "Варити означає готувати їжу в рідині, наприклад у воді або бульйоні."
    - statement: "Ми використовуємо сковороду для швидкого смаження їжі."
      correct: true
      explanation: "Сковорода ідеально підходить для смаження картоплі або м'яса."
    - statement: "Вареники можуть бути як солоною стравою, так і десертом."
      correct: true
      explanation: "Вареники роблять із картоплею (солоні) або з вишнею (солодкі)."
    - statement: "Для інструмента ми використовуємо орудний відмінок із прийменником 'з'."
      correct: false
      explanation: "Для інструмента ми ніколи не використовуємо прийменник (я ріжу ножем)."
    - statement: "Слово 'кушати' є правильним українським словом для процесу їжі."
      correct: false
      explanation: "Це русизм. Правильно казати їсти."
    - statement: "Форма 'наріж' — це наказовий спосіб для слова 'нарізати'."
      correct: true
      explanation: "Ми використовуємо цю форму, щоб дати інструкцію або команду."
    - statement: "Солодкі вареники традиційно їдять із смаженою солоною цибулею."
      correct: false
      explanation: "Солодкі вареники їдять зі сметаною, цукром або медом."
    - statement: "Коли гість у хаті, український господар завжди пропонує йому їжу."
      correct: true
      explanation: "Гостинність — це невіддільна частина української культури."

