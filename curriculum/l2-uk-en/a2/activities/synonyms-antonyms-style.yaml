  instruction: З'єднайте синоніми та антоніми в пари
  pairs:
  - left: великий
    right: величезний
  - left: маленька
    right: крихітна
  - left: говорити
    right: балакати
  - left: гарний
    right: вродливий
  - left: день
    right: ніч
  - left: гарячий
    right: холодний
  - left: початок
    right: кінець
  - left: добро
    right: лихо
  title: З'єднайте синоніми та антоніми в пари
- id: quiz-identify-the-literary-device-epithet-metaphor-personification-in-short-phrases
  type: quiz
  instruction: Визначте художній засіб (епітет, метафора чи персоніфікація)
  items:
  - question: «Срібний дощ» — це...
    options:
    - епітет
    - метафора
    - персоніфікація
    - синонім
    correct: 0
  - question: «Море квітів» — це...
    options:
    - метафора
    - епітет
    - персоніфікація
    - антонім
    correct: 0
  - question: «Сонце сміється» — це...
    options:
    - персоніфікація
    - метафора
    - епітет
    - повтор
    correct: 0
  - question: «Калинова мова» — це...
    options:
    - епітет
    - персоніфікація
    - метафора
    - еліпсис
    correct: 0
  - question: «Крила мрії» — це...
    options:
    - метафора
    - персоніфікація
    - епітет
    - антонім
    correct: 0
  - question: «Вітер співає» — це...
    options:
    - персоніфікація
    - метафора
    - епітет
    - синонім
    correct: 0
  title: Визначте художній засіб (епітет, метафора чи персоніфікація)
- id: fill-in-form-diminutives-from-base-words-e-g-using-correct-suffixes
  type: fill-in
  instruction: Утворіть зменшувальні (ласкаві) слова
  items:
  - sentence: Маленький кіт — це ____.
    answer: котик
    options:
    - котик
    - коток
    - коточка
  - sentence: Моя рідна ____.
    answer: бабусенька
    options:
    - бабусенька
    - бабуся
    - бабусечка
  - sentence: Це не стіл, а маленький ____.
    answer: столик
    options:
    - столик
    - стілок
    - стілочок
  - sentence: Мій улюблений ____.
    answer: синок
    options:
    - синок
    - синик
    - синочок
  - sentence: У неї в руках красива ____.
    answer: квіточка
    options:
    - квіточка
    - квітонька
    - квітик
  - sentence: На небі яскрава ____.
    answer: зірочка
    options:
    - зірочка
    - зіренька
    - зірник
  - sentence: Вона ще зовсім ____.
    answer: маленька
    options:
    - маленька
    - малеча
    - малесенька
  - sentence: Тепла літня ____.
    answer: ніченька
    options:
    - ніченька
    - нічка
    - нічока
  title: Утворіть зменшувальні (ласкаві) слова
- id: group-sort-sort-examples-into-syntactic-stylistic-categories-ellipsis-vs-repetition
  type: group-sort
  instruction: Розподіліть приклади на еліпсис та повтор
  groups:
  - label: Еліпсис (пропуск слова)
    items:
    - Я — каву, а ти?
    - Він — додому.
    - Усе найкраще — дітям!
    - Кожному — своє.
  - label: Повтор
    items:
    - Ми думали-думали...
    - Живуть далеко-далеко.
    - Ходили-ходили.
    - Ішов, ішов та й прийшов.
  title: Розподіліть приклади на еліпсис та повтор
workbook:
- type: true-false
  instruction: Правда чи ні? Перевірте свої знання про стилістику
  items:
  - statement: Синоніми — це слова з протилежним значенням.
    correct: false
    explanation: Синоніми мають схоже значення. Слова з протилежним значенням — це
      антоніми.
  - statement: Епітет — це образний прикметник, який малює картину.
    correct: true
    explanation: Так, епітет додає тексту емоційності та виразності.
  - statement: Антоніми часто використовують в українських прислів'ях.
    correct: true
    explanation: Антоніми створюють сильний контраст, що робить прислів'я мудрими.
  - statement: Зменшувальний суфікс «-ик» використовують тільки для слів жіночого
      роду.
    correct: false
    explanation: Суфікс «-ик» використовується для слів чоловічого роду (наприклад,
      котик, столик).
  - statement: Метафора — це приховане порівняння без слова «як».
    correct: true
    explanation: Так, метафора називає один предмет іменем іншого без прямого порівняння.
  - statement: Ласкавий тон розмови можна створити за допомогою суфіксів.
    correct: true
    explanation: Зменшувально-пестливі суфікси виражають любов і ніжність.
  - statement: Кожне слово може мати свій унікальний відтінок.
    correct: true
    explanation: Тому ми вибираємо різні синоніми залежно від контексту.
  - statement: Стилістика радить завжди використовувати тільки базові слова.
    correct: false
    explanation: Стилістика радить використовувати синоніми для виразності мовлення
      та уникати повторів.
  title: Правда чи ні? Перевірте свої знання про стилістику
- type: odd-one-out
  instruction: Знайдіть четверте зайве слово (антонім серед синонімів або слово без
    суфікса)
  items:
  - words:
    - красивий
    - вродливий
    - чудовий
    - поганий
    correct: 3
    explanation: «Поганий» — це антонім, інші три слова є синонімами.
  - words:
    - говорити
    - казати
    - балакати
    - мовчати
    correct: 3
    explanation: «Мовчати» — це антонім до інших слів.
  - words:
    - котик
    - столик
    - хлопчик
    - стіл
    correct: 3
    explanation: «Стіл» не має зменшувально-пестливого суфікса.
  - words:
    - великий
    - величезний
    - гігантський
    - маленький
    correct: 3
    explanation: «Маленький» — це антонім до інших слів.
  - words:
    - квіточка
    - зірочка
    - річечка
    - батько
    correct: 3
    explanation: «Батько» не має зменшувального суфікса жіночого роду.
  - words:
    - радість
    - щастя
    - добро
    - лихо
    correct: 3
    explanation: «Лихо» має негативне значення і є антонімом до «добро».
  title: Знайдіть четверте зайве слово (антонім серед синонімів або слово без суфікса)
- type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Я буду пити каву, а він — чай пити.
    error: чай пити
    correction: чай
    error_type: phrase
    options:
    - чай
    - чаю
    - чай пити
    explanation: 'В українській мові часто використовують еліпсис (пропуск дієслова):
      «а він — чай».'
  - sentence: Це дуже великий і великий будинок.
    error: великий і великий
    correction: величезний
    error_type: word
    options:
    - величезний
    - великий
    - малий
    explanation: Щоб уникнути тавтології (повторення), краще використати синонім «величезний».
  - sentence: У неї золота серце.
    error: золота
    correction: золоте
    error_type: word
    options:
    - золоте
    - золотий
    - золоті
    explanation: Слово «серце» середнього роду, тому прикметник (епітет) має бути
      «золоте».
  - sentence: Мій батечко купив мені телефон.
    error: батечко
    correction: батько
    error_type: register
    options:
    - батько
    - батька
    - батьком
    explanation: Слово «батечко» занадто ласкаве для нейтрального повідомлення про
      покупку, краще «батько».
  - sentence: Вітер співати свою пісню.
    error: співати
    correction: співає
    error_type: word
    options:
    - співає
    - співають
    - співав
    explanation: Дієслово має узгоджуватися з іменником «вітер» (він) у теперішньому
      часі — «співає».
  - sentence: Ми довго думали і думали і думали.
    error: думали і думали і думали
    correction: думали-думали
    error_type: construction
    options:
    - думали-думали
    - думали
    - думав
    explanation: 'Для вираження інтенсивності дії в українській мові використовують
      повтор: «думали-думали».'
  title: Знайдіть і виправте помилку в реченні
- type: unjumble
