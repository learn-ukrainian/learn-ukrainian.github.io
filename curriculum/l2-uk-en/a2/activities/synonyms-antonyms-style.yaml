    - наше
    - багатим.
    - мовлення
    - Це
    correct_order:
    - Це
    - робить
    - наше
    - мовлення
    - багатим.
  - words:
    - золоті
    - Майстер
    - руки.
    - має
    correct_order:
    - Майстер
    - має
    - золоті
    - руки.
  - words:
    - каву,
    - а
    - Я
    - —
    - ти?
    correct_order:
    - Я
    - —
    - каву,
    - а
    - ти?
  - words:
    - далеко-далеко.
    - Вони
    - живуть
    correct_order:
    - Вони
    - живуть
    - далеко-далеко.
  - words:
    - думки
    - роблять
    - Антоніми
    - виразними.
    - наші
    correct_order:
    - Антоніми
    - роблять
    - наші
    - думки
    - виразними.
  title: Складіть правильне речення зі слів
