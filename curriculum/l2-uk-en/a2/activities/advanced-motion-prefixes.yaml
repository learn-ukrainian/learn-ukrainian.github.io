- type: mark-the-words
  title: "Знайдіть дієслова руху"
  instruction: "Find and mark all motion verbs with prefixes in the text."
  text: "Вчора ми вирішили погуляти в центрі. Спочатку ми пройшли повз старий театр. Потім ми перейшли велику площу. На шляху був ремонт, тому ми обійшли його. Нарешті ми дійшли до улюбленого кафе, підійшли до дверей і зайшли всередину."
  answers:
    - "пройшли"
    - "перейшли"
    - "обійшли"
    - "дійшли"
    - "підійшли"
    - "зайшли"

- type: error-correction
  title: "Виправте граматичні помилки (Майбутній час)"
  instruction: "Correct the mistakes with the future tense auxiliary verb."
  items:
    - sentence: "Завтра я буду прийти на роботу дуже рано."
      error: "буду прийти"
      answer: "прийду"
      error_type: "construction"
      options:
        - "прийду"
        - "прийшов"
        - "прийшла"
        - "буду приходити"
      explanation: "Дієслова доконаного виду (з префіксами) не використовують буду."
    - sentence: "Коли ти будеш перейти цей міст, ти побачиш парк."
      error: "будеш перейти"
      answer: "перейдеш"
      error_type: "construction"
      options:
        - "перейдеш"
        - "перейшов"
        - "переходиш"
        - "перейдете"
      explanation: "Правильна форма майбутнього часу — перейдеш."
    - sentence: "Ми будемо зайти до тебе ввечері."
      error: "будемо зайти"
      answer: "зайдемо"
      error_type: "construction"
      options:
        - "зайдемо"
        - "зайшли"
        - "заходять"
        - "зайдете"
      explanation: "Замість будемо зайти треба сказати зайдемо."
    - sentence: "Вони будуть дійти до готелю за п'ять хвилин."
      error: "будуть дійти"
      answer: "дійдуть"
      error_type: "construction"
      options:
        - "дійдуть"
        - "дійшли"
        - "доходять"
        - "дійдемо"
      explanation: "Дієслово доконаного виду самостійно утворює майбутній час — дійдуть."
    - sentence: "Ви будете підійти до мене пізніше?"
      error: "будете підійти"
      answer: "підійдете"
      error_type: "construction"
      options:
        - "підійдете"
        - "підійшли"
        - "підходимо"
        - "підійдеш"
      explanation: "Форма майбутнього часу для ви — підійдете."
    - sentence: "Вона буде обійти цю красиву будівлю."
      error: "буде обійти"
      answer: "обійде"
      error_type: "construction"
      options:
        - "обійде"
        - "обійшла"
