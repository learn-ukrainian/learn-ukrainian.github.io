workbook:
- id: translate-motion-sentences
  type: translate
  instruction: Оберіть правильний переклад.
  items:
  - source: I am walking to the store right now.
    options:
    - text: Я зараз іду до магазину.
      correct: true
    - text: Я зараз ходжу до магазину.
      correct: false
    - text: Я зараз їду до магазину.
      correct: false
    - text: Я зараз пішов до магазину.
      correct: false
  - source: We drive to Lviv every summer.
    options:
    - text: Ми їздимо до Львова щоліта.
      correct: true
    - text: Ми їдемо до Львова щоліта.
      correct: false
    - text: Ми ходимо до Львова щоліта.
      correct: false
    - text: Ми літаємо до Львова щоліта.
      correct: false
  - source: He is riding to the city by taxi.
    options:
    - text: Він їде в місто на таксі.
      correct: true
    - text: Він їздить в місто на таксі.
      correct: false
    - text: Він іде в місто на таксі.
      correct: false
    - text: Він летить в місто на таксі.
      correct: false
  - source: A big plane is flying in the sky.
    options:
    - text: У небі летить великий літак.
      correct: true
    - text: У небі літає великий літак.
      correct: false
    - text: У небі іде великий літак.
      correct: false
    - text: У небі їде великий літак.
      correct: false
  - source: They left the apartment.
    options:
    - text: Вони пішли з квартири.
      correct: true
    - text: Вони ідуть з квартири.
      correct: false
    - text: Вони ходили з квартири.
      correct: false
    - text: Вони поїхали з квартири.
      correct: false
  - source: I drink coffee.
    options:
    - text: Я п'ю каву.
      correct: true
    - text: Я пию каву.
      correct: false
    - text: Я пю каву.
      correct: false
    - text: Я каву пити.
      correct: false
  - source: She says that we are going to the park.
    options:
    - text: Вона каже, що ми ідемо в парк.
      correct: true
    - text: Вона казає, що ми ідемо в парк.
      correct: false
    - text: Вона каже, що ми ходимо в парк.
      correct: false
    - text: Вона кажу, що ми ідемо через парк.
      correct: false
  - source: We are fighting.
    options:
    - text: Ми боремося.
      correct: true
    - text: Ми борються.
      correct: false
    - text: Ми боротеся.
      correct: false
    - text: Ми боремось.
      correct: false
- id: error-correction-verbs-prepositions
  type: error-correction
  instruction: Знайдіть і виправте помилку.
  items:
  - sentence: Я зараз ходжу до школи.
    error: ходжу
    correction: іду
    error_type: word
    options:
    - іду
    - їду
    - лечу
    explanation: Для односпрямованого руху в даний момент використовуємо «іду».
  - sentence: Він їздить на роботу зараз.
    error: їздить
    correction: їде
    error_type: word
    options:
    - їде
    - іде
    - летить
    explanation: Для руху транспортом в один момент використовуємо «їде».
  - sentence: Вона казає правду.
    error: казає
    correction: каже
    error_type: word
    options:
    - каже
    - казить
    - кажу
    explanation: 'Дієслово «казати» має чергування з → ж: вона каже.'
  - sentence: Ми пиємо воду.
    error: пиємо
    correction: п'ємо
    error_type: word
    options:
    - п'ємо
    - пємо
    - пимо
    explanation: 'Дієслово «пити» має апостроф: ми п''ємо.'
  - sentence: Я іду в лікаря.
    error: в
    correction: до
    error_type: word
    options:
    - до
    - на
    - з
    explanation: З людьми ми використовуємо прийменник «до».
  - sentence: Вони повертаються із лікаря.
    error: із
    correction: від
    error_type: word
    options:
    - від
    - з
    - через
    explanation: Якщо ми йдемо ДО людини, то повертаємося ВІД людини.
  - sentence: Ми гуляємо через вулиці.
    error: через
    correction: по
    error_type: word
    options:
    - по
    - на
    - в
    explanation: Рух уздовж поверхні або маршруту — це «по» + місцевий відмінок.
  - sentence: Літак літає до Парижа зараз.
    error: літає
    correction: летить
    error_type: word
    options:
    - летить
    - їде
    - іде
    explanation: Для польоту в даний момент в одному напрямку використовуємо «летить».
