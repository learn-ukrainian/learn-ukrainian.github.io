- id: true-false-motion-rules
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Дієслово «іти» використовуємо, коли ми їдемо на машині.
    correct: false
    explanation: «Іти» — це рух пішки.
  - statement: Слово «ходжу» означає регулярний рух пішки.
    correct: true
    explanation: «Ходити» — це різноспрямований або регулярний рух.
  - statement: Ми кажемо «я їзджу», а не «я їжджу».
    correct: false
    explanation: Правильна форма — «я їжджу» з чергуванням зд → ждж.
  - statement: Прийменник «до» завжди використовується з родовим відмінком.
    correct: true
    explanation: «До» вимагає родового відмінка (до школи, до лікаря).
  - statement: Коли ми йдемо ДО друга, ми повертаємося З друга.
    correct: false
    explanation: Ми повертаємося ВІД друга.
  - statement: Дієслово «пити» пишеться з апострофом у теперішньому часі (я п'ю).
    correct: true
    explanation: Після губного приголосного перед «ю» ставимо апостроф.
  - statement: «Літати» — це дієслово доконаного виду.
    correct: false
    explanation: Це дієслово недоконаного виду. Доконаний вид — «полетіти».
  - statement: Комбінація «-ться» у слові «бореться» читається як довгий м'який звук.
    correct: true
    explanation: Це важливе фонетичне правило української мови.
