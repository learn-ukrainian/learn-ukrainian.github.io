version: '1.0'
module: a2-bridge
level: a2
inline:
- id: quiz-case-identification-drill
  type: quiz
  instruction: Визначте відмінок виділеного слова
  items:
  - question: Я живу в **готелі**.
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 2
  - question: '**Томасе**, де ви живете?'
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 3
  - question: Я читаю **текст**.
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 1
  - question: Це новий **студент**.
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 0
  - question: Вона йде на **роботу**.
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 1
  - question: Книга лежить на **столі**.
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 2
  - question: '**Маріє**, привіт!'
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 3
  - question: '**Школа** знаходиться в центрі.'
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 0
- id: fill-in-phonological-alternation-pairs
  type: fill-in
  instruction: Вставте правильну форму слова (чергування о/і, е/і)
  items:
  - sentence: Це великий ____.
    answer: стіл
    options:
    - стіл
    - стола
    - столі
  - sentence: Я не бачу ____.
    answer: стола
    options:
    - стіл
    - стола
    - столі
  - sentence: Ми живемо в місті ____.
    answer: Київ
    options:
    - Київ
    - Києва
    - Києві
  - sentence: Він приїхав із ____.
    answer: Києва
    options:
    - Київ
    - Києва
    - Києві
  - sentence: Це чорний ____.
    answer: кіт
    options:
    - кіт
    - кота
    - коті
  - sentence: Я люблю цього ____.
    answer: кота
    options:
    - кіт
    - кота
    - коті
  - sentence: Сьогодні холодна ____.
    answer: ніч
    options:
    - ніч
    - ночі
    - ніччю
  - sentence: Я не сплю посеред ____.
    answer: ночі
    options:
    - ніч
    - ночі
    - ніччю
workbook:
- id: match-up-euphony-choice-exercise
  type: match-up
  instruction: З'єднайте частини речень, дотримуючись правил милозвучності (у/в, і/й)
  pairs:
  - left: Він жив
    right: у Львові.
  - left: Вона жила
    right: в Одесі.
  - left: Брат
    right: і сестра.
  - left: Батько
    right: й мати.
  - left: Він приїхав
    right: зі Львова.
  - left: Вона йде
    right: зі школи.
  - left: Анна була
    right: в Києві.
  - left: Я розмовляю
    right: зі студентом.
- id: error-correction-euphony-error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку милозвучності (у/в, і/й, з/зі)
  items:
  - sentence: Він жив в Львові.
    error: в
    correction: у
    error_type: word
    options:
    - у
    - і
    - зі
    explanation: Після приголосного і перед приголосним використовуємо «у».
  - sentence: Вона була у Києві.
    error: у
    correction: в
    error_type: word
    options:
    - в
    - й
    - із
    explanation: Після голосного перед приголосним використовуємо «в».
  - sentence: Брат й сестра йдуть додому.
    error: й
    correction: і
    error_type: word
    options:
    - і
    - та
    - у
    explanation: Між двома приголосними використовуємо «і».
  - sentence: Батько і мати вдома.
    error: і
    correction: й
    error_type: word
    options:
    - й
    - в
    - зі
    explanation: Після голосного використовуємо «й».
  - sentence: Він приїхав з Львова.
    error: з
    correction: зі
    error_type: word
    options:
    - зі
    - із
    - в
    explanation: Перед збігом приголосних (Льв) використовуємо «зі» для полегшення
      вимови.
  - sentence: Я йду з школи.
    error: з
    correction: зі
    error_type: word
    options:
    - зі
    - із
    - у
    explanation: Перед збігом приголосних (шк) використовуємо «зі».
