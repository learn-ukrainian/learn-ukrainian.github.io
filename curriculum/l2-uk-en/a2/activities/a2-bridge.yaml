version: '1.0'
module: a2-bridge
level: a2
inline:
- id: case-identification-drill
  type: quiz
  instruction: Визначте відмінок виділеного слова.
  items:
  - question: Я живу в «Києві».
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 2
  - question: «Студент» читає книгу.
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 0
  - question: Я читаю «книгу».
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 1
  - question: Дуже приємно, «Майкле»!
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 3
  - question: Вона вчиться у «Харкові».
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 2
  - question: Ми любимо «Україну».
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 1
  - question: «Мамо», де моя книга?
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 3
  - question: «Місто» дуже велике.
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 0
- id: phonological-alternation-pairs
  type: fill-in
  instruction: Вставте правильну форму слова в дужках.
  items:
  - sentence: Лампа стоїть на ____. (стіл)
    answer: столі
    options:
    - столі
    - стола
    - столом
    - столу
  - sentence: Вдома немає ____. (кіт)
    answer: кота
    options:
    - кота
    - кіт
    - котові
    - котом
  - sentence: Темної ____ було тихо. (ніч)
    answer: ночі
    options:
    - ночі
    - ніч
    - ніччю
    - ночей
  - sentence: Хліб печуть у ____. (піч)
    answer: печі
    options:
    - печі
    - піч
    - піччю
    - печей
  - sentence: Він показав ____ цього слова. (корінь)
    answer: кореня
    options:
    - кореня
    - корінь
    - коренем
    - коренів
  - sentence: Поверхня ____ дуже тверда. (камінь)
    answer: каменя
    options:
    - каменя
    - камінь
    - каменем
    - каменів
  - sentence: Браслет у мене на ____. (рука)
    answer: руці
    options:
    - руці
    - рука
    - рукою
    - руки
  - sentence: Татуювання на ____. (нога)
    answer: нозі
    options:
    - нозі
    - ноги
    - ногою
    - ногах
- id: euphony-choice-exercise
  type: match-up
  instruction: З'єднайте речення з правильним варіантом евфонії.
  pairs:
  - left: Я ____ університеті.
    right: в університеті
  - left: Він ____ університеті.
    right: у університеті
  - left: Батько ____ мати.
    right: й мати
  - left: Хлопець ____ дівчина.
    right: і дівчина
  - left: Майкл приїхав ____ Канади.
    right: з Канади
  - left: Вона приїхала ____ Львова.
    right: зі Львова
  - left: Вони приїхали ____ Запоріжжя.
    right: із Запоріжжя
  - left: Діти повернулися ____ школи.
    right: зі школи
workbook:
- type: group-sort
  instruction: Розподіліть слова й словосполучення за відмінками.
  groups:
  - label: Називний (Хто? Що?)
    items:
    - стіл
    - кіт
    - ніч
    - студент
    - місто
    - мова
  - label: Знахідний (Кого? Що?)
    items:
    - книгу
    - Україну
    - каву
    - студента
    - ручку
    - мову
  - label: Місцевий (Де?)
    items:
    - у Києві
    - у Харкові
    - у Львові
    - на уроці
    - в університеті
    - у місті
  - label: Кличний (Звертання)
    items:
    - Майкле!
    - Сергію!
    - мамо!
    - друже!
    - Тарасе!
    - Василю!
- type: error-correction
  instruction: Знайдіть і виправте помилку евфонії.
  items:
  - sentence: В вівторок ми зустрічаємося.
    error: В
    correction: У
    error_type: word
    options:
    - У
    - В
    - З
    explanation: Вівторок починається з приголосного «в», тому потрібне «у».
  - sentence: Студент в університеті.
    error: в
    correction: у
    error_type: word
    options:
    - у
    - в
    - на
    explanation: Після приголосного «т» (студент) вживаємо «у».
  - sentence: Олена і Іван зустрілися.
    error: і
    correction: й
    error_type: word
    options:
    - й
    - і
    - та
    explanation: Олена закінчується на голосну «а», тому вживаємо «й».
  - sentence: Хлопець й дівчина прийшли.
    error: й
    correction: і
    error_type: word
    options:
    - і
    - й
    - та
    explanation: Хлопець закінчується на приголосний «ць», тому вживаємо «і».
  - sentence: Вона приїхала з Львова.
    error: з
    correction: зі
    error_type: word
    options:
    - зі
    - із
    - з
    explanation: Перед збігом приголосних «лв» вживаємо «зі».
  - sentence: Ми з сестрою пішли додому.
    error: з
    correction: із
    error_type: word
    options:
    - із
    - зі
    - з
    explanation: Перед «с-» на початку слова вживаємо «із».
- type: true-false
  instruction: Правда чи ні? Оцініть твердження про чергування і наголос.
  items:
  - statement: Слово «стіл» у місцевому відмінку — «столі».
    correct: true
    explanation: 'Так: стіл (закритий склад, і) → столі (відкритий склад, о).'
  - statement: Слово «кіт» у родовому відмінку — «кіта».
    correct: false
    explanation: 'Неправильно. Правильна форма — «кота»: закрита «і» стає «о» у відкритому
      складі.'
  - statement: 'Зміна г→ж з''являється у зменшувальних формах: нога → ніжка.'
    correct: true
    explanation: 'Так: г→ж — перша зміна приголосних.'
  - statement: 'Зміна к→ц з''являється у місцевому відмінку: рука → руці.'
    correct: true
    explanation: 'Так: к→ц — друга зміна приголосних.'
  - statement: Слово «корінь» у родовому відмінку — «коріня».
    correct: false
    explanation: 'Неправильно. Правильна форма — «кореня»: е/і чергування.'
  - statement: Слово «камінь» у родовому відмінку — «каменя».
    correct: true
    explanation: 'Так: камінь → каменя (е/і чергування, відкритий склад).'
  - statement: Наголос в українській мові завжди падає на перший склад.
    correct: false
    explanation: Неправильно. Наголос в українській мові вільний і рухомий — він може
      бути на будь-якому складі.
- type: quiz
  instruction: Оберіть правильне значення слова залежно від наголосу.
  items:
  - question: Яке значення слова «за́мок» (наголос на першому складі)?
    options:
    - фортеця
    - засув на дверях
    - ліс
    - підручник
    correct: 0
  - question: Яке значення слова «замо́к» (наголос на другому складі)?
    options:
    - фортеця
    - засув на дверях
    - місто
    - рослина
    correct: 1
  - question: Яке значення слова «а́тлас» (наголос на першому складі)?
    options:
    - шовкова тканина
    - збірник карт
    - прилад
    - рослина
    correct: 1
  - question: Яке значення слова «атла́с» (наголос на другому складі)?
    options:
    - шовкова тканина
    - збірник карт
    - прилад
    - рослина
    correct: 0
  - question: Що означає «вільний» наголос в українській мові?
    options:
    - наголос не прив'язаний до певного складу
    - наголос завжди на першому складі
    - наголос завжди на останньому складі
    - наголос визначає рід слова
    correct: 0
  - question: Що означає «рухомий» наголос в українській мові?
    options:
    - наголос може переходити між складами в парадигмі одного слова
    - наголос завжди фіксований
    - наголос залежить від темпу мовлення
    - наголос ставиться лише в словниках
    correct: 0
