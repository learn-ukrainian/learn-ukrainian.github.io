- id: true-false-grammar-rules
  type: true-false
  instruction: Чи є це твердження про українську граматику правдивим?
  items:
  - statement: Кличний відмінок відповідає на питання «Хто? Що?».
    correct: false
    explanation: Кличний відмінок не відповідає на питання, він використовується лише
      для звертання до когось.
  - statement: Місцевий відмінок ніколи не вживається без прийменника.
    correct: true
    explanation: Так, місцевий відмінок (наприклад, «в Києві», «на столі») завжди
      потребує прийменника.
  - statement: Знахідний відмінок часто позначає прямий об'єкт дії.
    correct: true
    explanation: Наприклад, у реченні «Я читаю книгу», слово «книгу» стоїть у знахідному
      відмінку, бо воно є об'єктом.
  - statement: Українська мова має шість відмінків.
    correct: false
    explanation: Українська мова має сім відмінків, включаючи кличний відмінок.
  - statement: У слові «Київ» при відмінюванні звук «і» часто чергується з «е» (наприклад,
      з Києва).
    correct: true
    explanation: Це правило чергування голосних у закритих і відкритих складах.
  - statement: Сполучник «і» завжди вживається після голосних звуків.
    correct: false
    explanation: Після голосних та перед голосними ми зазвичай вживаємо сполучник
      «й» для милозвучності.
  - statement: Наголос в українській мові завжди фіксований і падає на перший склад.
    correct: false
    explanation: Наголос в українській мові є вільним і рухомим, він може падати на
      будь-який склад.
  - statement: Приголосний «к» перед закінченням «-і» змінюється на «ц» (наприклад,
      рука -> руці).
    correct: true
    explanation: Це важливе правило чергування приголосних при утворенні місцевого
      чи давального відмінків.
- id: odd-one-out-phonetics
  type: odd-one-out
  instruction: Знайдіть слово, яке є зайвим за правилами граматики або фонетики.
  items:
  - words:
    - Київ
    - Львів
    - Харків
    - Одеса
    correct: 3
    explanation: «Одеса» не має закритого складу з «і», який чергується з «о» чи «е»
      при відмінюванні.
  - words:
    - рука
    - нога
    - муха
    - стіл
    correct: 3
    explanation: «Стіл» — це іменник чоловічого роду, інші слова — жіночого роду на
      «-а».
  - words:
    - у
    - в
    - і
    - зі
    correct: 2
    explanation: «і» — це сполучник (and), а «у», «в», «зі» — прийменники (in, with).
  - words:
    - подрузі
    - руці
    - мусі
    - книги
    correct: 3
    explanation: «книги» — це форма без чергування (називний множини або родовий однини).
      Форма місцевого відмінка з чергуванням — «книзі».
  - words:
    - стола
    - Києва
    - Львова
    - брат
    correct: 3
    explanation: «брат» — іменник у називному відмінку, інші форми — у родовому відмінку
      з відкритим складом.
  - words:
    - мамо
    - друже
    - Оксано
    - студент
    correct: 3
    explanation: «студент» — форма називного відмінка, решта слів стоять у кличному
      відмінку.
  - words:
    - зі
    - із
    - з
    - й
    correct: 3
    explanation: «й» — сполучник, решта — це варіанти одного прийменника, що означає
      «з» (with/from).
  - words:
    - замок
    - наголос
    - правило
    - читати
    correct: 3
    explanation: «читати» — це дієслово, решта слів — іменники.
- id: match-up-a2-vocab
  type: match-up
  instruction: З'єднайте українське слово з його правильним перекладом.
  pairs:
  - left: милозвучність
    right: euphony
  - left: відмінок
    right: case
  - left: наголос
    right: stress (accent)
  - left: чергування
    right: alternation
  - left: голосний
    right: vowel
  - left: приголосний
    right: consonant
  - left: система
    right: system
  - left: правило
    right: rule
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку у використанні відмінків.
  items:
  - sentence: Я зараз вивчаю українська мову.
    error: українська
    correction: українську
    error_type: word
    options:
    - українську
    - українській
    - українською
    - українські
    explanation: 'Слово «мова» вимагає узгодження прикметника у знахідному відмінку:
      українську мову.'
  - sentence: Вона вже давно живе в Київ.
    error: Київ
    correction: Києві
    error_type: word
    options:
    - Києві
    - Києву
    - Києва
    - Києвом
    explanation: 'Після прийменника «в» (де?) використовується місцевий відмінок:
      в Києві.'
  - sentence: Привіт, Оксана! Як твої справи?
    error: Оксана
    correction: Оксано
    error_type: word
    options:
    - Оксано
    - Оксані
    - Оксану
    - Оксаною
    explanation: 'Для звертання до людини ми обов''язково використовуємо кличний відмінок:
      Оксано.'
  - sentence: Моя нова книга лежить на стіл.
    error: стіл
    correction: столі
    error_type: word
    options:
    - столі
    - стола
    - столу
    - столом
    explanation: 'Після прийменника «на» (де?) потрібен місцевий відмінок: на столі.'
  - sentence: Я щойно бачив свій старий друг.
    error: друг
    correction: друга
    error_type: word
    options:
    - друга
    - другу
    - другові
    - другом
    explanation: 'Знахідний відмінок для істот чоловічого роду (кого?): бачу друга.'
  - sentence: У мене дуже болить правій нога.
    error: правій
    correction: права
    error_type: word
    options:
    - права
    - праву
    - правої
    - правою
    explanation: 'Нога є підметом (хто? що?), тому потрібен називний відмінок: права
      нога.'
  - sentence: Це дуже цікавий іграшка для дитини.
    error: цікавий
    correction: цікава
    error_type: word
    options:
    - цікава
    - цікаве
    - цікаві
    - цікаву
    explanation: 'Слово «іграшка» жіночого роду, тому прикметник також має бути жіночого
      роду: цікава.'
  - sentence: Вчора ми були в театр.
    error: театр
    correction: театрі
    error_type: word
    options:
    - театрі
    - театру
    - театром
    - театра
    explanation: 'Після прийменника «в» (де?) використовується місцевий відмінок:
      в театрі.'
