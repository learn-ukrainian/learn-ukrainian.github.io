version: '1.0'
module: a2-bridge
level: a2
inline:
- id: quiz-case-identification
  type: quiz
  instruction: Визначте відмінок виділеного слова в реченні.
  items:
  - question: Я живу в «Києві».
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 2
  - question: Я вивчаю українську «мову».
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 1
  - question: Привіт, «Оксано»!
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 3
  - question: Новий «студент» читає книгу.
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 0
  - question: Вона бачить старого «друга».
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 1
  - question: Книга лежить на «столі».
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 2
  - question: Мій «брат» працює у центрі.
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 0
  - question: Дякую, «друже»!
    options:
    - Називний
    - Знахідний
    - Місцевий
    - Кличний
    correct: 3
- id: fill-in-phonological-alternations
  type: fill-in
  instruction: Вставте правильну форму слова, звертаючи увагу на чергування голосних
    та приголосних.
  items:
  - sentence: Це мій новий стіл. Біля ____ стоїть стілець.
    answer: стола
    options:
    - стіла
    - стола
    - столу
    - стілу
  - sentence: Я дуже люблю Київ. Зараз я їду з ____.
    answer: Києва
    options:
    - Київа
    - Києва
    - Києву
    - Київу
  - sentence: Моя нога болить. На моїй ____ є невелика рана.
    answer: нозі
    options:
    - ногі
    - нозі
    - носі
    - ножі
  - sentence: Це моя найкраща подруга. Я даю книгу моїй ____.
    answer: подрузі
    options:
    - подругі
    - подрузі
    - подружі
    - подрусі
  - sentence: У мами тепла рука. У її ____ є нове яблуко.
    answer: руці
    options:
    - рукі
    - руці
    - руші
    - русі
  - sentence: На вікні сидить велика муха. Я бачу бруд на цій ____.
    answer: мусі
    options:
    - мухі
    - мусі
    - муші
    - муці
  - sentence: Мій тато купив новий замок. У мене немає ключа від цього ____.
    answer: замка
    options:
    - замока
    - замка
    - замоку
    - замку
  - sentence: Це дуже чиста вода. У цій ____ плаває маленька риба.
    answer: воді
    options:
    - воді
    - воду
    - водою
    - води
- id: match-up-euphony-choice
  type: match-up
  instruction: З'єднайте початок і кінець речення за правилами милозвучності.
  pairs:
  - left: Він довго був
    right: у школі.
  - left: Вона вранці пішла
    right: в аптеку.
  - left: Мій брат
    right: і сестра читають.
  - left: Оксана
    right: й Андрій гуляють.
  - left: Я щодня гуляю
    right: з собакою.
  - left: Моя донька повертається
    right: зі школи.
  - left: Ми зараз живемо
    right: в Україні.
  - left: У нашому місті є
    right: новий парк.
