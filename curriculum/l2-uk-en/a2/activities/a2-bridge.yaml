version: '1.0'
module: a2-bridge
level: a2
inline: []
workbook:
- type: quiz
  instruction: Визначте відмінок виділеного слова
  items:
  - question: «Я вивчаю **українську мову**.» — у якому відмінку виділені слова?
    options:
    - називний (Хто? Що?)
    - знахідний (Кого? Що?)
    - місцевий (Де?)
    - кличний (звертання)
    correct: 1
  - question: «Я живу **в Києві**.» — у якому відмінку слово «Києві»?
    options:
    - називний (Хто? Що?)
    - знахідний (Кого? Що?)
    - місцевий (Де?)
    - кличний (звертання)
    correct: 2
  - question: «**Маріє**, де твій зошит?» — у якому відмінку слово «Маріє»?
    options:
    - називний (Хто? Що?)
    - знахідний (Кого? Що?)
    - місцевий (Де?)
    - кличний (звертання)
    correct: 3
  - question: «**Студент** читає книгу.» — у якому відмінку слово «Студент»?
    options:
    - називний (Хто? Що?)
    - знахідний (Кого? Що?)
    - місцевий (Де?)
    - кличний (звертання)
    correct: 0
  - question: «Я п'ю **каву**.» — у якому відмінку слово «каву»?
    options:
    - називний (Хто? Що?)
    - знахідний (Кого? Що?)
    - місцевий (Де?)
    - кличний (звертання)
    correct: 1
  - question: «Алекс навчається **в університеті**.» — у якому відмінку слово «університеті»?
    options:
    - називний (Хто? Що?)
    - знахідний (Кого? Що?)
    - місцевий (Де?)
    - кличний (звертання)
    correct: 2
  - question: «**Оксано**, добрий день!» — у якому відмінку слово «Оксано»?
    options:
    - називний (Хто? Що?)
    - знахідний (Кого? Що?)
    - місцевий (Де?)
    - кличний (звертання)
    correct: 3
  - question: «**Книга** лежить на столі.» — у якому відмінку слово «Книга»?
    options:
    - називний (Хто? Що?)
    - знахідний (Кого? Що?)
    - місцевий (Де?)
    - кличний (звертання)
    correct: 0
- type: fill-in
  instruction: Запишіть правильну форму слова (чергування голосних або приголосних)
  items:
  - sentence: стіл → ______ (родовий відмінок однини)
    answer: стола
    options:
    - стола
    - столу
    - столі
    - столом
  - sentence: рука → у ______ (місцевий відмінок однини)
    answer: руці
    options:
    - руці
    - рукові
    - руки
    - руку
  - sentence: книга → у ______ (місцевий відмінок однини)
    answer: книзі
    options:
    - книзі
    - книги
    - книгу
    - книгою
  - sentence: кінь → ______ (родовий відмінок однини)
    answer: коня
    options:
    - коня
    - коні
    - коню
    - конем
  - sentence: нога → на ______ (місцевий відмінок однини)
    answer: нозі
    options:
    - нозі
    - ноги
    - ногу
    - ногою
  - sentence: піч → у ______ (місцевий відмінок однини)
    answer: печі
    options:
    - печі
    - піч
    - пічці
    - піччю
  - sentence: лід → ______ (родовий відмінок однини)
    answer: льоду
    options:
    - льоду
    - ліду
    - лоду
    - льодом
  - sentence: дорога → на ______ (місцевий відмінок однини)
    answer: дорозі
    options:
    - дорозі
    - дороги
    - дорогу
    - дорогою
- type: match-up
  instruction: З'єднайте фонетичне правило милозвучності з відповідним прикладом
  pairs:
  - left: прийменник «в/у» — після голосного звуку
    right: Вона в університеті.
  - left: прийменник «в/у» — після приголосного звуку
    right: Студент у школі.
  - left: прийменник «в/у» — перед словом на «в-» або «ф-»
    right: Він живе у Вінниці.
  - left: сполучник «і/й» — між двома приголосними
    right: хліб і масло
  - left: сполучник «і/й» — після голосного звуку
    right: книга й ручка
  - left: сполучник «і/й» — на початку речення
    right: І студент, і викладач навчаються.
  - left: прийменник «з/зі/із» — перед більшістю слів
    right: з Києва, з другом
  - left: прийменник «з/зі/із» — перед збігом приголосних
    right: зі Львова, зі школи
- type: group-sort
  instruction: Розподіліть форми іменників за відмінками. Яке питання відповідає кожній
    формі?
  groups:
  - label: Називний (Хто? Що?)
    items:
    - студент
    - книга
    - місто
  - label: Знахідний (Кого? Що?)
    items:
    - мову
    - каву
    - книгу
  - label: Місцевий (Де?)
    items:
    - Києві
    - університеті
    - школі
  - label: Кличний (звертання)
    items:
    - Маріє
    - Тарасе
    - Оксано
- type: error-correction
  instruction: Знайдіть і виправте помилку в милозвучності
  items:
  - sentence: Нехай в ваших родинах панує злагода!
    error: в
    correction: у
    error_type: word
    options:
    - у
    - в
    - із
    explanation: «Нехай» закінчується на приголосний «й», тому перед «ваших» потрібна
      форма «у», а не «в».
  - sentence: Він в школі сьогодні.
    error: в
    correction: у
    error_type: word
    options:
    - у
    - в
    - із
    explanation: «Він» закінчується на приголосний «н», тому перед «школі» потрібна
      форма «у».
  - sentence: Книга і ручка лежать на столі.
    error: і
    correction: й
    error_type: word
    options:
    - й
    - і
    - та
    explanation: «Книга» закінчується на голосний «а», тому після нього сполучник
      звучить як «й», а не «і».
  - sentence: Хліб й масло — це сніданок.
    error: й
    correction: і
    error_type: word
    options:
    - і
    - й
    - та
    explanation: «Хліб» закінчується на приголосний «б», а «масло» починається на
      приголосний «м» — між двома приголосними вживається «і».
  - sentence: Вони повернулися з Львова.
    error: з
    correction: зі
    error_type: word
    options:
    - зі
    - з
    - із
    explanation: «Львів» починається зі збігу приголосних «Лв-», тому потрібна форма
      «зі».
  - sentence: Вона приїхала зі Канади.
    error: зі
    correction: з
    error_type: word
    options:
    - з
    - зі
    - із
    explanation: «Канада» починається з однієї приголосної «К», тому вживається звичайна
      форма «з».
- type: quiz
  instruction: Визначте значення або характеристику слова залежно від наголосу
  items:
  - question: «За́мок» (наголос на першому складі) — що означає це слово?
    options:
    - пристрій для закривання дверей
    - середньовічна фортеця або палац
    - тип ключа
    - вид будівлі в місті
    correct: 1
  - question: «Замо́к» (наголос на другому складі) — що означає це слово?
    options:
    - середньовічна фортеця
    - пристрій для закривання дверей
    - синонім до «форт»
    - назва міста
    correct: 1
  - question: «До́рога» (наголос на першому складі) — яка це частина мови?
    options:
    - іменник (дорога — шлях)
    - прикметник жіночого роду від «дорогий» (expensive)
    - прислівник
    - займенник
    correct: 1
  - question: «Доро́га» (наголос на другому складі) — яка це частина мови?
    options:
    - прикметник (expensive)
    - іменник (дорога — шлях, вулиця)
    - дієслово
    - сполучник
    correct: 1
  - question: Яке твердження про наголос в українській мові є правильним?
    options:
    - Наголос завжди стоїть на першому складі
    - Наголос завжди стоїть на останньому складі
    - Наголос вільний і рухомий — може стояти на будь-якому складі
    - В українській мові немає наголосу
    correct: 2
  - question: У формі «ру́ки» (родовий відмінок від «рука́») — де стоїть наголос?
    options:
    - 'на першому складі: РУ-ки'
    - 'на другому складі: ру-КИ'
    - наголос залишається на тому самому складі, що й у називному
    - наголос залежить від речення
    correct: 0
