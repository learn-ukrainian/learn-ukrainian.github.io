- type: match-up
  title: "Популярні фрази та побажання"
  instruction: "З'єднайте українські фрази з їхнім англійським перекладом."
  pairs:
    - left: "Хай щастить!"
      right: "Good luck!"
    - left: "Будьмо!"
      right: "Cheers!"
    - left: "Ходімо в гори."
      right: "Let's go to the mountains."
    - left: "Нехай буде так."
      right: "Let it be so."
    - left: "Бажаю успіхів!"
      right: "I wish you success!"
    - left: "Хай він читає."
      right: "Let him read."
    - left: "Кажіть правду."
      right: "Tell the truth."
    - left: "Пишімо лист."
      right: "Let's write a letter."

- type: true-false
  title: "Правда чи міф"
  instruction: "Визначте, чи правильне твердження про наказовий спосіб."
  items:
    - statement: "Слово нехай є заперечною формою від слова хай."
      correct: false
      explanation: "Ці слова є абсолютними синонімами і обидва означають let."
    - statement: "Щоб сказати let us go, ми часто кажемо давай йти."
      correct: false
      explanation: "Правильна форма для спільної дії — ходімо."
    - statement: "Дієслово бажати завжди вимагає після себе родового відмінка."
      correct: true
      explanation: "Наприклад, ми кажемо бажаю щастя або бажаю здоров'я."
    - statement: "Традиційний тост Будьмо походить від дієслова бути."
      correct: true
      explanation: "Це форма першої особи множини наказового способу (let us be)."
    - statement: "Після часток хай та нехай використовується форма інфінітива."
      correct: false
      explanation: "Після них використовується форма теперішнього або майбутнього часу."
    - statement: "Третій тост на святах традиційно п'ють за жінок або кохання."
      correct: true
      explanation: "При цьому чоловіки зазвичай встають на знак поваги."
    - statement: "Для заперечення в третій особі ми кажемо нехай читає."
      correct: false
      explanation: "Правильно використовувати частку не. Хай не читає."
    - statement: "Фраза Хай йому грець є українським вигуком розчарування."
      correct: true
      explanation: "Це дуже колоритний і популярний вираз в Україні."

- type: quiz
  title: "Перевірте знання граматики"
  instruction: "Оберіть правильну відповідь на кожне запитання."
  items:
    - question: "Як правильно утворити заперечення для дії третьої особи?"
      options:
        - text: "нехай він читає"
          correct: false
        - text: "хай він не читає"
          correct: true
        - text: "хай він читати"
          correct: false
        - text: "нехай не він читає"
          correct: false
      explanation: "Частка не ставиться безпосередньо перед дієсловом."
    - question: "Яка форма правильно перекладається як let us write?"
      options:
        - text: "пишіть"
          correct: false
        - text: "хай писати"
          correct: false
        - text: "пишімо"
          correct: true
        - text: "пиши"
          correct: false
      explanation: "Для спільної дії додаємо суфікс -мо або -імо."
    - question: "Яке з цих речень є граматично правильною пропозицією?"
      options:
        - text: "Давай робити це разом."
          correct: false
        - text: "Робімо це разом."
          correct: true
        - text: "Хай ми робити це разом."
          correct: false
        - text: "Робимо це разом."
          correct: false
      explanation: "Робімо — це правильна форма наказового способу для групи людей, що включає мовця."
    - question: "Як правильно побажати здоров'я українською мовою?"
      options:
        - text: "Бажаю здоров'я!"
          correct: true
        - text: "Бажаю здоров'яком!"
          correct: false
        - text: "Бажаю здоров'ям!"
          correct: false
        - text: "Бажаю здоров'ю!"
          correct: false
      explanation: "Дієслово бажати вимагає родового відмінка."
    - question: "Яка частка використовується для утворення третьої особи?"
      options:
        - text: "давай"
          correct: false
        - text: "будьмо"
          correct: false
        - text: "хай"
          correct: true
        - text: "щоб"
          correct: false
      explanation: "Для він, вона, воно, вони використовуємо хай або нехай."
    - question: "Як правильно сказати Let her dream українською?"
      options:
        - text: "Нехай мріє."
          correct: true
        - text: "Нехай мріяти."
          correct: false
        - text: "Хай вона мрій."
          correct: false
        - text: "Хай мріють."
          correct: false
      explanation: "Використовуємо хай або нехай з формою третьої особи однини."
    - question: "Що означає популярний вираз Хай щастить українською?"
      options:
        - text: "Good morning"
          correct: false
        - text: "Good luck"
          correct: true
        - text: "Goodbye"
          correct: false
        - text: "Thank you"
          correct: false
      explanation: "Це найпопулярніше побажання удачі в Україні."
    - question: "Яку форму дієслова ми використовуємо після слова хай?"
      options:
        - text: "Інфінітив"
          correct: false
        - text: "Минулий час"
          correct: false
        - text: "Теперішній або майбутній час"
          correct: true
        - text: "Наказовий спосіб"
          correct: false
      explanation: "Після слова хай іде звичайна форма теперішнього або майбутнього часу."

- type: fill-in
  title: "Заповніть пропуски у реченнях"
  instruction: "Оберіть правильне слово для кожного речення."
  items:
    - sentence: "_____ щастить у новому проєкті!"
      answer: "Хай"
      options:
        - "Хай"
        - "Давай"
        - "Будьмо"
        - "Ходімо"
    - sentence: "Ми вже закінчили роботу. _____ додому!"
      answer: "Ходімо"
      options:
        - "Ходімо"
        - "Ходити"
        - "Хай йдуть"
        - "Йдемо"
    - sentence: "_____ вони не знають про наш сюрприз."
      answer: "Нехай"
      options:
        - "Нехай"
        - "Давай"
        - "Щоб"
        - "Будьмо"
    - sentence: "Я _____ вам міцного здоров'я та успіхів!"
      answer: "бажаю"
      options:
        - "бажаю"
        - "хай"
        - "хочу"
        - "прошу"
    - sentence: "_____ борщ кипить на вогні ще десять хвилин."
      answer: "Хай"
      options:
        - "Хай"
        - "Давай"
        - "Будьмо"
        - "Робімо"
    - sentence: "Сьогодні велике свято, тому _____ за наше щастя!"
      answer: "будьмо"
      options:
        - "будьмо"
        - "хай"
        - "бажаю"
        - "нехай"
    - sentence: "_____ цей текст ще раз, щоб краще все зрозуміти."
      answer: "Прочитаймо"
      options:
        - "Прочитаймо"
        - "Давай читати"
        - "Читаємо"
        - "Читати"
    - sentence: "_____ сильний вітер вщухне, тоді продовжимо наш похід."
      answer: "Нехай"
      options:
        - "Нехай"
        - "Хай не"
        - "Давай"
        - "Будьмо"

- type: unjumble
  title: "Складіть правильні речення"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити речення."
  items:
    - words:
        - "Нехай"
        - "борщ"
        - "кипить"
        - "на"
        - "вогні"
      answer: "Нехай борщ кипить на вогні"
    - words:
