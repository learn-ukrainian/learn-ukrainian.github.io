      answer: "Нехай кожен день приносить радість"

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Знайдіть помилку в реченні та оберіть правильний варіант."
  items:
    - sentence: "Хай вони знати всю правду про подію."
      error: "знати"
      answer: "знають"
      options:
        - "знають"
        - "знає"
        - "знаємо"
        - "знаєте"
      explanation: "Після слова хай використовуємо форму теперішнього часу, а не інфінітив."
    - sentence: "Бажаю вам великий успіх у новій роботі!"
      error: "успіх"
      answer: "успіху"
      options:
        - "успіху"
        - "успіхів"
        - "успіхом"
        - "успіхи"
      explanation: "Після дієслова бажати завжди використовуємо родовий відмінок."
    - sentence: "Сьогодні свято, тому будемо за здоров'я!"
      error: "будемо"
      answer: "будьмо"
      options:
        - "будьмо"
        - "бути"
        - "будуть"
        - "був"
      explanation: "Традиційний український тост — Будьмо (наказовий спосіб від слова бути)."
    - sentence: "Хай вітер не дути так сильно сьогодні."
      error: "дути"
      answer: "дме"
      options:
        - "дме"
        - "дує"
        - "дують"
        - "дув"
      explanation: "Після частки хай потрібна форма теперішнього часу."
    - sentence: "Нехай вона читати цей цікавий текст."
      error: "читати"
      answer: "читає"
      options:
        - "читає"
        - "читають"
        - "читай"
        - "читайте"
      explanation: "Використовуємо форму теперішнього часу після слова нехай."
    - sentence: "Нехай щастити вам у довгій дорозі!"
      error: "щастити"
      answer: "щастить"
      options:
        - "щастить"
        - "щастять"
        - "щастив"
        - "щастя"
      explanation: "Правильна форма побажання — хай щастить або нехай щастить."

