    correct: 3
  - question: Я йду в супермаркет, щоб купити свіжий хліб.
    options:
    - Мета
    - Причина
    - Допуст
    - Означення
    correct: 0
  - question: Ми грали у футбол, хоча йшов дощ.
    options:
    - Умова
    - Мета
    - Допуст
    - Причина
    correct: 2
  - question: Якщо ввечері буде час, я почитаю книгу.
    options:
