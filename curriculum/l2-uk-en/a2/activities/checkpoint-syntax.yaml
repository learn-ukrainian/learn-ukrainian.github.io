- id: wb-true-false-syntax
  type: true-false
  instruction: Правда чи ні? (Правила синтаксису)
  items:
  - statement: Перед сполучниками «бо», «щоб», «який» завжди потрібно ставити кому.
    correct: true
    explanation: В українській мові перед підрядними сполучниками кома обов'язкова.
  - statement: Слово 'if' в англійській мові завжди перекладається як «якщо».
    correct: false
    explanation: Слово 'if' може перекладатися як «чи» для непрямого питання.
  - statement: Ми використовуємо «чи», коли передаємо непряме питання.
    correct: true
    explanation: 'Саме так! Наприклад: «Вона запитала, чи я працюю».'
  - statement: Слово «який» ніколи не змінюється за родом і числом.
    correct: false
    explanation: Воно завжди змінюється, як звичайний прикметник, залежно від іменника.
  - statement: Якщо головну і підрядну дію виконує одна особа, після «щоб» ми використовуємо
      інфінітив.
    correct: true
    explanation: 'Правильно: «Я йду в магазин, щоб купити хліб».'
  - statement: Ми використовуємо «щоб» для іншої особи разом із дієсловом у теперішньому
      часі.
    correct: false
    explanation: Ми обов'язково використовуємо дієслово в минулому часі (я хочу, щоб
      ти купив).
  - statement: Сполучники «тому що» і «бо» показують мету нашої дії.
    correct: false
    explanation: Вони показують причину, а не мету.
  - statement: Сполучник «щоб» завжди відповідає на питання «навіщо?».
    correct: true
    explanation: Так, він вказує на мету вашої дії.
  - statement: В українській мові немає складного правила «узгодження часів» для непрямої
      мови.
    correct: true
    explanation: Час зберігається з прямої мови (Він сказав, що він працює).
  - statement: Сполучник «хоча» показує допуст, коли дія відбувається всупереч обставинам.
    correct: true
    explanation: 'Так. Наприклад: «Хоча йшов дощ, ми грали у футбол».'
- id: wb-group-sort-purpose-cause
  type: group-sort
  instruction: Причина чи Мета? Розподіліть речення
  groups:
  - label: Причина (тому що, бо)
    items:
    - Я дуже втомився, бо багато працював.
    - Вона не прийшла, тому що захворіла.
    - Ми залишилися вдома, бо надворі дощ.
    - Я п'ю каву, бо хочу спати.
    - Я читаю цю книгу, тому що вона цікава.
  - label: Мета (щоб)
    items:
    - Я щодня вчу мову, щоб жити в Києві.
    - Я йду в супермаркет, щоб купити молоко.
    - Я п'ю каву, щоб не спати на роботі.
    - Він багато працює, щоб мати гроші.
    - Вона зателефонувала, щоб запитати про зустріч.
