version: '1.0'
module: checkpoint-syntax
level: a2
inline:
- id: group-sort-conjunctions
  type: group-sort
  instruction: Розподіліть складні речення за типом підрядної частини
  groups:
  - label: Причина (чому?)
    items:
    - Я п'ю каву, бо хочу спати.
    - Ми не пішли гуляти, тому що йшов дощ.
  - label: Допуст (всупереч чому?)
    items:
    - Хоча було пізно, ми дивилися фільм.
    - Я читаю книгу, хоча вона дуже складна.
  - label: Мета (навіщо?)
    items:
    - Я йду в магазин, щоб купити молоко.
    - Вона вчить мову, щоб жити в Києві.
  - label: Означення (який?)
    items:
    - Це місто, де я народився.
    - Це новий фільм, який я дивився вчора.
  - label: Умова (за якої умови?)
    items:
    - Якщо буде час, я зателефоную.
    - Якщо завтра буде сонце, ми підемо в парк.
