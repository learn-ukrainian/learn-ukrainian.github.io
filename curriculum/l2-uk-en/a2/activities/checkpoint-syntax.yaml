- id: fill-in-conjunctions
  type: fill-in
  instruction: Вставте правильний сполучник у речення
  items:
  - sentence: Я не йду гуляти, ____ надворі дощ.
    answer: бо
    options:
    - бо
    - хоча
    - щоб
    - якщо
  - sentence: ____ вчора було холодно, ми грали у футбол.
    answer: Хоча
    options:
    - Хоча
    - Щоб
    - Бо
    - Якщо
  - sentence: Я щодня вчу мову, ____ жити в Україні.
    answer: щоб
    options:
    - бо
    - хоча
    - щоб
    - якщо
  - sentence: Це нове слово, ____ я сьогодні вивчив.
    answer: яке
    options:
    - який
    - яка
    - яке
    - які
  - sentence: ____ завтра буде вільний час, я зателефоную.
    answer: Якщо
    options:
    - Щоб
    - Бо
    - Якщо
    - Хоча
  - sentence: Вона п'є каву, ____ дуже хоче спати.
    answer: тому що
    options:
    - тому що
    - щоб
    - якщо
    - хоча
  - sentence: Я хочу, ____ ти купив молоко.
    answer: щоб
    options:
    - бо
    - щоб
    - якщо
    - чи
  - sentence: Це популярна пісня, ____ я слухаю.
    answer: яку
    options:
    - який
    - яку
    - яке
    - які
  - sentence: Я не знаю, ____ він прийде сьогодні.
    answer: чи
    options:
    - якщо
    - щоб
    - бо
    - чи
  - sentence: Він багато працює, ____ купити машину.
    answer: щоб
    options:
    - бо
    - щоб
    - якщо
    - чи
workbook:
- id: wb-error-correction-syntax
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Я не знаю, якщо він прийде сьогодні ввечері.
    error: якщо
    correction: чи
    error_type: word
    options:
    - чи
    - щоб
    - бо
    explanation: В українській мові для непрямого питання 'if' перекладається як 'чи',
      а не 'якщо'.
  - sentence: Це нова книга, якого я зараз читаю.
    error: якого
    correction: яку
    error_type: word
    options:
    - яку
    - який
    - яке
    explanation: Слово 'книга' — жіночого роду, тому в знахідному відмінку потрібно
      'яку'.
  - sentence: Я йду в магазин, щоб я купив свіжий хліб.
    error: я купив
    correction: купити
    error_type: construction
    options:
    - купити
    - купую
    - купувати
    explanation: Якщо одну дію виконує та сама особа, після 'щоб' використовується
      інфінітив.
  - sentence: Вона запитала, якщо я працюю сьогодні.
    error: якщо
    correction: чи
    error_type: word
    options:
    - чи
    - що
    - бо
    explanation: Для непрямого питання обов'язково потрібно використовувати сполучник
      'чи'.
  - sentence: Це великі міста, який ми відвідали.
    error: який
    correction: які
    error_type: word
    options:
    - які
    - яке
    - яка
    explanation: Слово 'міста' стоїть у множині, тому займенник теж має бути у множині
      ('які').
  - sentence: Я п'ю каву, щоб я не спав.
    error: я не спав
    correction: не спати
    error_type: construction
    options:
    - не спати
    - не сплю
    - не спав би
    explanation: Спільний підмет вимагає інфінітива після сполучника 'щоб'.
  - sentence: Я хочу, щоб ти купуєш свіже молоко.
    error: купуєш
    correction: купив
    error_type: word
    options:
    - купив
    - купувати
    - купиш
    explanation: Після 'щоб' для іншої особи завжди використовується минулий час.
  - sentence: Він сказав, що він працював щодня.
    error: працював
    correction: працює
    error_type: word
    options:
    - працює
    - працювати
    - буде працювати
    explanation: В українській мові немає 'узгодження часів' у непрямій мові, час
      зберігається з оригінальної фрази (теперішній).
  - sentence: Це популярна пісня, який я постійно слухаю.
    error: який
    correction: яку
    error_type: word
    options:
    - яку
    - яке
    - які
    explanation: Слово 'пісня' — жіночий рід, тому знахідний відмінок має форму 'яку'.
  - sentence: Це старе місто, яка мені подобається.
    error: яка
    correction: яке
    error_type: word
    options:
    - яке
    - який
    - які
    explanation: Слово 'місто' — середній рід, тому потрібно використовувати 'яке'.
- id: wb-match-up-sentences
  type: match-up
