- type: quiz
  title: "Перевірте знання граматики"
  instruction: "Оберіть один правильний варіант відповіді для кожного запитання."
  items:
    - question: "Як граматично правильно перекласти англійську фразу 'I am cold'?"
      explanation: "Для опису особистого стану використовується давальний відмінок (мені) і прислівник (холодно)."
      options:
        - text: "Мені холодно"
          correct: true
        - text: "Я холодний"
          correct: false
        - text: "Мене холодно"
          correct: false
        - text: "Я холодно"
          correct: false
    - question: "Як правильно і природно сказати українською 'It is raining'?"
      explanation: "В українській мові дощ виконує активну дію — він іде."
      options:
        - text: "Йде дощ"
          correct: true
        - text: "Це є дощ"
          correct: false
        - text: "Робить дощ"
          correct: false
        - text: "Він дощ"
          correct: false
    - question: "Доповніть речення правильним словом: 'Сьогодні на вулиці дуже...'"
      explanation: "Для загального опису погоди на вулиці ми використовуємо прислівник."
      options:
        - text: "холодно"
          correct: true
        - text: "холодний"
          correct: false
        - text: "холодна"
          correct: false
        - text: "холодне"
          correct: false
    - question: "Доповніть речення правильним словом: 'Цей чорний чай занадто...'"
      explanation: "Тут ми описуємо предмет (чай), тому використовуємо прикметник чоловічого роду."
      options:
        - text: "холодний"
          correct: true
        - text: "холодно"
          correct: false
        - text: "холодні"
          correct: false
        - text: "холодна"
          correct: false
    - question: "Як правильно сказати фразу 'We are comfortable' українською?"
      explanation: "Використовуємо давальний відмінок для займенника (нам) і прислівник (зручно)."
      options:
        - text: "Нам зручно"
          correct: true
        - text: "Ми зручні"
          correct: false
        - text: "Нас зручно"
          correct: false
        - text: "Ми зручно"
          correct: false
    - question: "Яке дієслово найкраще підходить для фрази 'Snow is falling'?"
      explanation: "Сніг в українській мові завжди падає або йде."
      options:
        - text: "Падає сніг"
          correct: true
        - text: "Це є сніг"
          correct: false
        - text: "Йде снігу"
          correct: false
        - text: "Робить сніг"
          correct: false
    - question: "Як правильно спитати свого друга 'Are you hot?'"
      explanation: "Питання про стан також вимагає давального відмінка: Тобі жарко?"
      options:
        - text: "Тобі жарко?"
          correct: true
        - text: "Ти жаркий?"
          correct: false
        - text: "Вас жарко?"
          correct: false
        - text: "Ти жарко?"
          correct: false
    - question: "Доповніть це речення: 'Взимку в Карпатах часто падає...'"
      explanation: "Взимку в горах зазвичай падає сніг."
      options:
        - text: "сніг"
          correct: true
        - text: "дощ"
          correct: false
        - text: "град"
          correct: false
        - text: "туман"
          correct: false

- type: true-false
  title: "Правда чи брехня: Природа України"
  instruction: "Прочитайте твердження і визначте, чи відповідають вони дійсності."
  items:
    - statement: "Карпати — це високі гори, які знаходяться на заході України."
      correct: true
      explanation: "Так, Карпатські гори лежать на заході країни."
    - statement: "Степ — це місцевість, де росте дуже багато високих дерев і густий ліс."
      correct: false
      explanation: "Степ — це велика рівнина без високих дерев, де багато сонця."
    - statement: "Згідно з легендою, якщо кинути камінь в Озеро Несамовите, почнеться сильна буря."
      correct: true
      explanation: "Легенда каже, що озеро прокидається і починається сильний град і буря."
    - statement: "Прикметники 'холодний' і 'теплий' граматично правильно використовувати для опису почуттів людини."
      correct: false
      explanation: "Для почуттів ми обов'язково використовуємо прислівники: холодно, тепло."
    - statement: "В українській мові погода 'активна': ми кажемо, що дощ 'йде', а сніг 'падає'."
      correct: true
      explanation: "Так, ми використовуємо активні дієслова для опису погодних явищ."
    - statement: "Собака і корова — це типові дикі тварини, які вільно живуть у темному лісі."
      correct: false
      explanation: "Собака і корова — це свійські тварини, які століттями живуть біля людей."
    - statement: "Континентальний клімат зазвичай означає, що літо спекотне і сухе, а зима холодна."
      correct: true
      explanation: "Так, такий клімат створює великі контрасти між сезонами."
    - statement: "Українська фраза 'сім погод надворі' означає, що погода ніколи не змінюється."
      correct: false
      explanation: "Ця ідіома означає, що погода дуже мінлива і постійно змінюється."

- type: fill-in
  title: "Доповніть речення"
  instruction: "Оберіть правильне слово, щоб завершити опис природи або погоди."
  items:
    - sentence: "На заході України є Карпатські гори, де ростуть старі густі дерева."
      answer: "гори"
      options: ["гори", "ліси", "річки", "озера"]
      explanation: "Карпати — це гори."
    - sentence: "У широкому степу завжди багато яскравого сонця і сильного вітру."
      answer: "степу"
      options: ["степу", "озері", "лісі", "тумані"]
      explanation: "Степ — це відкрита рівнина."
    - sentence: "Під час сильної бурі з неба несподівано почав падати великий град."
      answer: "град"
      options: ["град", "сніг", "туман", "клімат"]
      explanation: "Під час бурі часто падає град (шматочки льоду)."
    - sentence: "Наш сільський собака — це дуже розумна свійська тварина."
      answer: "тварина"
      options: ["тварина", "природа", "риба", "пташка"]
      explanation: "Собака належить до свійських тварин."
    - sentence: "Мені завжди дуже холодно, коли взимку надворі дме сильний вітер."
      answer: "холодно"
      options: ["холодно", "холодний", "холодна", "теплі"]
      explanation: "Для опису стану з 'мені' потрібен прислівник 'холодно'."
    - sentence: "Минулого тижня в нашому регіоні була дуже погана погода."
      answer: "погода"
      options: ["погода", "природа", "тварина", "клімат"]
      explanation: "Слово 'погода' описує щоденні метеорологічні умови."
    - sentence: "Сьогодні вранці густий туман ховає високу вершину гори від туристів."
      answer: "туман"
      options: ["туман", "дощ", "ліс", "степ"]
      explanation: "Туман робить предмети невидимими."
    - sentence: "Охорона довкілля допомагає надійно зберегти нашу рідну природу чистою."
      answer: "довкілля"
      options: ["довкілля", "тварини", "погоди", "лісу"]
      explanation: "Фраза 'охорона довкілля' означає захист навколишнього середовища."

