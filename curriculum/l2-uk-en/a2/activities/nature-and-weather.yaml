  pairs:
    - left: "ліс"
      right: "місце, де росте дуже багато дерев"
    - left: "гора"
      right: "високе місце на землі"
    - left: "річка"
      right: "потік води, який постійно тече"
    - left: "озеро"
      right: "велика вода без течії, часто в горах"
    - left: "степ"
