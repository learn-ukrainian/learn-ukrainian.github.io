- type: error-correction
  title: "Виправте помилки: Я холодний"
  instruction: "У кожному реченні є помилка у використанні станів або погодних дієслів. Знайдіть і виправте її."
  items:
    - sentence: "Я холодний, бо на вулиці віє дуже сильний вітер."
      error: "Я холодний"
      answer: "Мені холодно"
      error_type: "construction"
      options: ["Мені холодно", "Мене холодно", "Я холодно", "Мені холодний"]
      explanation: "Для особистого стану (how you feel) використовуйте конструкцію Давальний відмінок + Прислівник."
    - sentence: "Вона жарка у цій великій зимовій куртці."
      error: "Вона жарка"
      answer: "Їй жарко"
      error_type: "construction"
      options: ["Їй жарко", "Її жарко", "Вона жарко", "Їм жарко"]
      explanation: "Щоб сказати 'She is hot', ми кажемо 'Їй жарко'."
    - sentence: "Сьогодні зранку це є дощ, тому я сиджу вдома."
      error: "це є"
      answer: "йде"
      error_type: "phrase"
      options: ["йде", "падає", "робить", "буде"]
      explanation: "Дощ виконує активну дію — він іде (йде дощ)."
    - sentence: "Ми комфортні у цьому новому м'якому кріслі."
      error: "Ми комфортні"
      answer: "Нам зручно"
      error_type: "construction"
      options: ["Нам зручно", "Нас зручно", "Нам комфортні", "Ми зручно"]
      explanation: "Для відчуття комфорту кажемо 'Нам зручно' або 'Нам комфортно'."
    - sentence: "Взимку в Карпатах це є сніг майже щодня."
      error: "це є сніг"
      answer: "падає сніг"
      error_type: "phrase"
      options: ["падає сніг", "йде снігу", "робить сніг", "є снігу"]
      explanation: "Сніг падає або йде. Фраза 'це є сніг' — це буквальний і неправильний переклад 'it is snow'."
    - sentence: "Ти холодний без теплої шапки на вулиці?"
      error: "Ти холодний"
      answer: "Тобі холодно"
      error_type: "construction"
      options: ["Тобі холодно", "Тебе холодно", "Тобі холодний", "Ти холодно"]
      explanation: "Питання про стан теж будується з давальним відмінком: Тобі холодно?"

- type: unjumble
  title: "Складіть речення: стани та погода"
