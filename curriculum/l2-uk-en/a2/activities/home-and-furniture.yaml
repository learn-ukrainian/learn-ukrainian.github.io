- type: match-up
  title: "Знайдіть пару: кімнати та меблі"
  instruction: "Match the room or furniture with its description."
  pairs:
    - left: "спальня"
      right: "кімната для сну та відпочинку"
    - left: "вітальня"
      right: "кімната, де приймають гостей і дивляться телевізор"
    - left: "кухня"
      right: "місце, де ми готуємо їжу"
    - left: "ванна"
      right: "кімната, де ми щоранку приймаємо душ"
    - left: "стіл"
      right: "поверхня, за якою ми їмо або працюємо"
    - left: "ліжко"
      right: "великі меблі виключно для нічного сну"
    - left: "шафа"
      right: "високі меблі, де акуратно висить наш одяг"
    - left: "диван"
      right: "довгі м'які меблі для сидіння кількох людей"

- type: group-sort
  title: "Що де стоїть?"
  instruction: "Sort the furniture and appliances into the rooms where they typically belong."
  groups:
    - name: "Кухня"
      items:
        - "холодильник"
        - "обідній стіл"
        - "стілець"
    - name: "Спальня"
      items:
        - "двоспальне ліжко"
        - "шафа-купе"
        - "пухнастий килим"
    - name: "Ванна кімната"
      items:
        - "пральна машина"
        - "великий душ"
        - "чистий рушник"

- type: fill-in
  title: "Вставте правильний прийменник"
  instruction: "Choose the correct preposition of location (у/в or на) for each sentence."
  items:
    - sentence: "Моя мама зараз готує борщ ____ кухні."
      answer: "на"
      options: ["на", "у", "в", "біля"]
      explanation: "Слово 'кухня' є винятком і завжди вимагає прийменника 'на' для статичного місця."
    - sentence: "Всі мої зимові куртки висять ____ великій шафі."
      answer: "у"
      options: ["у", "на", "в", "під"]
      explanation: "Ми використовуємо 'у' для закритого простору всередині меблів."
    - sentence: "Свіжий гарячий хліб лежить ____ столі."
      answer: "на"
      options: ["на", "в", "у", "біля"]
      explanation: "Для відкритої горизонтальної поверхні потрібен прийменник 'на'."
    - sentence: "Ця красива картина вже багато років висить ____ стіні."
      answer: "на"
      options: ["на", "у", "в", "за"]
      explanation: "Ми використовуємо 'на' для розміщення на вертикальній поверхні."
    - sentence: "Діти дуже люблять гратися ____ своїй кімнаті."
      answer: "у"
      options: ["у", "на", "до", "через"]
      explanation: "Для закритого приміщення або кімнати ми використовуємо 'у/в'."
    - sentence: "Мій кіт цілий день спить ____ м'якому дивані."
      answer: "на"
      options: ["на", "в", "у", "під"]
      explanation: "Диван — це поверхня для сидіння, тому ми кажемо 'на дивані'."
    - sentence: "Увечері вся родина сидить ____ просторій вітальні."
      answer: "у"
      options: ["у", "на", "в", "з"]
      explanation: "Вітальня — це кімната, тому ми використовуємо прийменник 'у/в'."
    - sentence: "Ми живемо ____ новій квартирі в центрі міста."
      answer: "у"
      options: ["у", "на", "до", "через"]
      explanation: "Для слова 'квартира' завжди використовується прийменник 'у/в'."

- type: quiz
  title: "Місцевий відмінок: перевірте знання"
  instruction: "Select the correct form of the word in the Locative case, paying attention to mutations."
  items:
    - question: "Яка форма правильна для слова 'підлога' у Місцевому відмінку?"
      options:
        - text: "на підлозі"
          correct: true
        - text: "на підлоги"
          correct: false
        - text: "на підлогу"
          correct: false
        - text: "на підложі"
          correct: false
      explanation: "Відбувається чергування приголосних: звук [г] обов'язково змінюється на [з]."
    - question: "Як правильно сказати: діти граються на...?"
      options:
        - text: "на килимі"
          correct: true
        - text: "у килимі"
          correct: false
        - text: "на килиму"
          correct: false
        - text: "в килиму"
          correct: false
      explanation: "Слово 'килим' є поверхнею і вимагає прийменника 'на' та стандартного закінчення -і."
    - question: "Як правильно сказати про ліки, які ви купили в...?"
      options:
        - text: "в аптеці"
          correct: true
        - text: "в аптекі"
          correct: false
        - text: "на аптеці"
          correct: false
        - text: "в аптеку"
          correct: false
      explanation: "Відбувається чергування приголосного [к] на [ц]."
    - question: "Яка форма Місцевого відмінка правильна для слова 'стіл'?"
      options:
        - text: "на столі"
          correct: true
        - text: "на стілі"
          correct: false
        - text: "на стіл"
          correct: false
        - text: "у столі"
          correct: false
      explanation: "Коли предмет лежить на поверхні, це 'на столі' (зверніть увагу на зміну голосної і на о)."
    - question: "Як правильно сказати про розташування квартири на рівні будинку (поверх)?"
      options:
        - text: "на поверсі"
          correct: true
        - text: "на поверху"
          correct: false
        - text: "у поверсі"
          correct: false
        - text: "на поверхі"
          correct: false
      explanation: "Відбувається чергування звуку [х] на [с]."
    - question: "Де ви зазвичай зберігаєте свої теплі зимові пальта?"
      options:
        - text: "у великій шафі"
          correct: true
        - text: "на великій шафі"
          correct: false
        - text: "в велику шафу"
          correct: false
        - text: "у велику шафу"
          correct: false
      explanation: "Місцевий відмінок для закритого простору: у шафі."
    - question: "Який прийменник ми повинні використовувати зі словом 'кухня' для стаціонарного місця?"
      options:
        - text: "на кухні"
          correct: true
        - text: "в кухні"
          correct: false
        - text: "у кухні"
          correct: false
        - text: "до кухні"
          correct: false
      explanation: "Це історичний виняток, ми завжди кажемо 'на кухні'."
    - question: "Де зараз відпочиває ваш втомлений дідусь?"
      options:
        - text: "на теплому дивані"
          correct: true
        - text: "у теплому дивані"
          correct: false
        - text: "на теплий диван"
          correct: false
        - text: "в теплому дивані"
          correct: false
      explanation: "Для меблів, призначених для сидіння, ми використовуємо прийменник 'на'."

- type: unjumble
  title: "Складіть речення: рух та місце"
  instruction: "Reorder the words to form correct sentences. Pay close attention to static location versus direction of movement."
  items:
    - words: ["Я", "зараз", "швидко", "йду", "в", "кімнату"]
      answer: "Я зараз швидко йду в кімнату"
    - words: ["Мій", "новий", "стіл", "стоїть", "у", "кімнаті"]
      answer: "Мій новий стіл стоїть у кімнаті"
    - words: ["Вона", "несе", "чистий", "рушник", "у", "ванну"]
      answer: "Вона несе чистий рушник у ванну"
    - words: ["Велика", "пральна", "машина", "стоїть", "у", "ванній"]
      answer: "Велика пральна машина стоїть у ванній"
    - words: ["Ми", "поставили", "цей", "важкий", "диван", "у", "вітальню"]
      answer: "Ми поставили цей важкий диван у вітальню"
    - words: ["Діти", "цілий", "день", "граються", "на", "підлозі"]
      answer: "Діти цілий день граються на підлозі"

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Find and correct the mistake in each sentence related to location, movement, or exceptions."
  items:
    - sentence: "Я вже два роки щасливо живу на цій квартирі."
      error: "на"
      answer: "у"
      error_type: "word"
      options: ["у", "до", "під", "через"]
      explanation: "Для закритого простору (квартира) використовуємо прийменник 'у/в'."
    - sentence: "Моя мама весь ранок готує смачний обід в кухні."
      error: "в"
      answer: "на"
      error_type: "word"
      options: ["на", "у", "до", "біля"]
      explanation: "Зі словом 'кухня' традиційно використовуємо прийменник 'на'."
    - sentence: "Я зараз фізично йду в кімнаті, щоб взяти свою книгу."
      error: "кімнаті"
      answer: "кімнату"
      error_type: "word"
      options: ["кімнату", "кімната", "кімнатою", "кімнат"]
      explanation: "Для напрямку руху (куди?) потрібен Знахідний відмінок — у кімнату."
    - sentence: "Сьогодні моя ручка випадково впала на підлоги."
      error: "підлоги"
      answer: "підлозі"
      error_type: "word"
      options: ["підлозі", "підлогу", "підлогою", "підлогах"]
      explanation: "У Місцевому відмінку приголосна [г] завжди змінюється на [з] — на підлозі."
    - sentence: "Ми купили ці ліки в новій аптекі біля нашого дому."
      error: "аптекі"
      answer: "аптеці"
      error_type: "word"
      options: ["аптеці", "аптеку", "аптекою", "аптеки"]
      explanation: "Відбувається обов'язкове чергування приголосних: [к] змінюється на [ц] — в аптеці."
    - sentence: "Ніколи не передавай речі через порогу, це погана прикмета."
      error: "порогу"
      answer: "поріг"
      error_type: "word"
      options: ["поріг", "порозі", "порогом", "порога"]
      explanation: "Після прийменника 'через' потрібен Знахідний відмінок — через поріг."

- type: mark-the-words
  title: "Знайдіть меблі та техніку"
  instruction: "Find and mark all the words that name furniture or home appliances."
  text: "Сьогодні ми купили нові меблі для нашого дому. У нашу велику спальню ми поставили двоспальне ліжко і простору шафу. Для нашої кухні тато замовив новий холодильник і круглий стіл. А у вітальню ми вирішили поставити м'який диван."
  answers: ["ліжко", "шафу", "холодильник", "стіл", "диван"]

- type: cloze
  title: "Опис нової вітальні"
  instruction: "Fill in the missing words to complete the description of the new apartment."
  passage: "Ми нарешті закінчили {{1}} і переїхали в нашу нову {{2}}. Наша {{3}} вийшла дуже простора і світла. Біля великого вікна стоїть довгий жовтий {{4}}. Ми любимо сидіти на {{5}} ввечері. На {{6}} лежить пухнастий {{7}}. Посередині кімнати стоїть дерев'яний {{8}} і чотири зручні {{9}}. На {{10}} висить красива велика картина."
  blanks:
    - id: 1
      answer: "ремонт"
      options: ["ремонт", "урок", "проєкт", "день"]
    - id: 2
      answer: "квартиру"
      options: ["квартиру", "школу", "вулицю", "кімнату"]
    - id: 3
      answer: "вітальня"
      options: ["вітальня", "ванна", "кухня", "шафа"]
    - id: 4
      answer: "диван"
      options: ["диван", "стіл", "стілець", "холодильник"]
    - id: 5
      answer: "дивані"
      options: ["дивані", "дивану", "диван", "диваном"]
    - id: 6
      answer: "підлозі"
      options: ["підлозі", "підлогу", "підлоги", "підлогою"]
    - id: 7
      answer: "килим"
      options: ["килим", "стіл", "рушник", "папір"]
    - id: 8
      answer: "стіл"
      options: ["стіл", "стілець", "шафа", "диван"]
    - id: 9
      answer: "стільці"
      options: ["стільці", "столи", "шафи", "книги"]
    - id: 10
      answer: "стіні"
      options: ["стіні", "підлозі", "стелі", "двері"]

- type: group-sort
  title: "Як змінюються звуки?"
  instruction: "Group the noun pairs by the type of consonant mutation they undergo in the Locative case."
  groups:
    - name: "[г] → [з]"
      items:
        - "підлога - на підлозі"
        - "книга - у книзі"
        - "дорога - на дорозі"
    - name: "[к] → [ц]"
      items:
        - "аптека - в аптеці"
        - "сумка - у сумці"
        - "річка - на річці"
    - name: "[х] → [с]"
      items:
        - "поверх - на поверсі"
        - "муха - на мусі"
        - "кожух - у кожусі"

- type: unjumble
  title: "Складіть речення про традиції"
  instruction: "Unjumble the words to form sentences about Ukrainian home etiquette."
  items:
    - words: ["Ніколи", "не", "передавай", "речі", "через", "поріг"]
      answer: "Ніколи не передавай речі через поріг"
    - words: ["Це", "дуже", "погана", "прикмета", "в", "Україні"]
      answer: "Це дуже погана прикмета в Україні"
    - words: ["Проходьте", "будь", "ласка", "у", "нашу", "вітальню"]
      answer: "Проходьте будь ласка у нашу вітальню"
    - words: ["Не", "сідай", "на", "розі", "обіднього", "столу"]
      answer: "Не сідай на розі обіднього столу"
    - words: ["Старші", "люди", "завжди", "пропонують", "інше", "місце"]
      answer: "Старші люди завжди пропонують інше місце"
    - words: ["Домовик", "охороняє", "родину", "від", "усіх", "негараздів"]
      answer: "Домовик охороняє родину від усіх негараздів"

- type: quiz
  title: "Що це означає?"
  instruction: "Select the correct word for the definition provided."
  items:
    - question: "Як називається довгий м'який предмет меблів, на якому можуть сидіти кілька людей?"
      options:
        - text: "диван"
          correct: true
        - text: "ліжко"
          correct: false
        - text: "стілець"
          correct: false
        - text: "стіл"
          correct: false
      explanation: "Диван зазвичай стоїть у вітальні для відпочинку всієї родини."
    - question: "Який апарат на кухні підтримує низьку температуру, щоб їжа залишалася свіжою?"
      options:
        - text: "холодильник"
          correct: true
        - text: "пральна машина"
          correct: false
        - text: "телевізор"
          correct: false
        - text: "шафа"
          correct: false
      explanation: "Слово 'холодильник' має спільний корінь зі словом 'холод'."
    - question: "В якій кімнаті українці традиційно проводять багато часу, готують і п'ють каву?"
      options:
        - text: "на кухні"
          correct: true
        - text: "у спальні"
          correct: false
        - text: "у ванній"
          correct: false
        - text: "в коридорі"
          correct: false
      explanation: "Кухня — це справжнє серце українського дому."
    - question: "Як називається нижня горизонтальна поверхня кімнати, по якій ми ходимо?"
      options:
        - text: "підлога"
          correct: true
        - text: "стіна"
          correct: false
        - text: "стеля"
          correct: false
        - text: "килим"
          correct: false
      explanation: "Підлога вимагає регулярного миття і прибирання."
    - question: "Куди ми зазвичай акуратно вішаємо наш чистий одяг?"
      options:
        - text: "у шафу"
          correct: true
        - text: "на стіл"
          correct: false
        - text: "на диван"
          correct: false
        - text: "у холодильник"
          correct: false
      explanation: "Шафа використовується саме для зберігання речей та одягу."
    - question: "Як називається спеціальна межа в дверях, через яку не можна вітатися?"
      options:
        - text: "поріг"
          correct: true
        - text: "підлога"
          correct: false
        - text: "килим"
          correct: false
        - text: "кут"
          correct: false
      explanation: "Вітатися або передавати речі через поріг — це погана прикмета."
    - question: "Який добрий дух, за стародавніми легендами, охороняє український дім?"
      options:
        - text: "Домовик"
          correct: true
        - text: "Водяник"
          correct: false
        - text: "Лісовик"
          correct: false
        - text: "Привид"
          correct: false
      explanation: "Домовик живе за піччю і стежить за порядком у домі."
    - question: "Які меблі призначені виключно для горизонтального сну однієї або двох людей?"
      options:
        - text: "ліжко"
          correct: true
        - text: "диван"
          correct: false
        - text: "стіл"
          correct: false
        - text: "шафа"
          correct: false
      explanation: "Ліжко завжди стоїть у спальні і призначене для нічного відпочинку."

- type: fill-in
  title: "Доповніть фрази про етикет і побут"
  instruction: "Fill in the blank to complete the practical sentences about home life."
  items:
    - sentence: "Ми купили велике двоспальне ____ для нашої нової спальні."
      answer: "ліжко"
      options: ["ліжко", "шафа", "диван", "стіл"]
      explanation: "У спальні ми спимо виключно на ліжку."
    - sentence: "Моя мама дуже любить готувати смачний борщ на ____."
      answer: "кухні"
      options: ["кухні", "спальні", "вітальні", "ванній"]
      explanation: "Це важливий виняток, ми завжди кажемо 'на кухні'."
    - sentence: "Обов'язково треба витирати взуття, коли переступаєш дерев'яний ____."
      answer: "поріг"
      options: ["поріг", "килим", "стіл", "диван"]
      explanation: "Поріг — це фізична межа між вулицею та безпечним домом."
    - sentence: "Бабуся просить не сідати на ____ столу, бо це дуже погана прикмета."
      answer: "розі"
      options: ["розі", "центрі", "початку", "кінці"]
      explanation: "Для незодружених людей сидіти на розі столу означає залишитися без пари на сім років."
    - sentence: "Мій теплий зимовий одяг акуратно висить у високій ____."
      answer: "шафі"
      options: ["шафі", "тумбочці", "валізі", "коробці"]
      explanation: "Верхній одяг ми вішаємо у шафі."
    - sentence: "Вся родина ввечері збирається разом у великій світлій ____."
      answer: "вітальні"
