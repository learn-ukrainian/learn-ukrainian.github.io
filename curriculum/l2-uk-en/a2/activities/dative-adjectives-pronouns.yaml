- type: fill-in
  instruction: Вставте правильний займенник у речення
  items:
  - sentence: Кожна людина бажає щастя _____ (своя) родині.
    answer: своїй
    options:
    - своїй
    - своїм
    - своєму
  - sentence: Студенти щиро дякують _____ (наш) вчителю.
    answer: нашому
    options:
    - нашому
    - нашій
    - нашим
  - sentence: Ми не можемо зарадити _____ (їхні) проблемам.
    answer: їхнім
    options:
    - їхнім
    - їхньому
    - їхній
  - sentence: Я повністю вірю _____ (його) другу.
    answer: його
    options:
    - його
    - йому
    - їх
  - sentence: Ми щиро радіємо _____ (її) успіхам.
    answer: її
    options:
    - її
    - їй
    - їх
  - sentence: Я маю надіслати документи _____ (ваш) відділу.
    answer: вашому
