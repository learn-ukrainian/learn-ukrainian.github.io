- id: workbook-error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку (давальний відмінок)
  items:
  - sentence: Я дарую гарний подарунок мого найкращого друга.
    error: мого
    correction: моєму
    error_type: word
    explanation: Дієслово «дарую» вимагає давального відмінка, а не родового («моєму»).
  - sentence: Ми часто допомагаємо їхньої мамі.
    error: їхньої
    correction: їхній
    error_type: word
    explanation: Дієслово «допомагати» вимагає давального відмінка («їхній»).
  - sentence: Вона щовечора телефонує їїй сестрі після роботи.
    error: їїй
    correction: її
    error_type: word
    explanation: Займенник «її» ніколи не змінює форму для позначення присвійності.
  - sentence: Я детально пояснюю завдання цього нового студента.
    error: цього
    correction: цьому
    error_type: word
    explanation: Кому ви пояснюєте? Це давальний відмінок («цьому»).
  - sentence: Вони купили квитки в театр старих друзів.
    error: старих
    correction: старим
    error_type: word
    explanation: Закінчення давального відмінка множини для прикметників — -им.
  - sentence: Ця цікава книга для моєму другові.
    error: моєму
    correction: мого
    error_type: word
    explanation: Прийменник «для» завжди вимагає родового відмінка («мого»).
  - sentence: Він уважно пише повідомлення старої знайомій.
    error: старої
    correction: старій
    error_type: word
    explanation: Слово «знайомій» стоїть у давальному відмінку, тому прикметник теж
      має бути в давальному («старій»).
  - sentence: Твоєї старшому другові потрібна наша допомога.
    error: Твоєї
    correction: Твоєму
    error_type: word
    explanation: Слово «другові» чоловічого роду, тому потрібно «Твоєму».
- id: workbook-true-false
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Прикметники чоловічого роду в давальному відмінку закінчуються на -ому
      або -ьому.
    correct: true
    explanation: 'Наприклад: новому, синьому.'
  - statement: Прикметники жіночого роду в давальному відмінку закінчуються на -ій.
    correct: true
    explanation: 'Наприклад: новій, старій, синій.'
  - statement: Займенник «його» (his) змінюється на «йогому» в давальному відмінку.
    correct: false
    explanation: Займенник «його» ніколи не змінює форму для позначення присвійності.
  - statement: Прикметники в множині у давальному відмінку мають однакове закінчення
      (-им) для всіх родів.
    correct: true
    explanation: 'Наприклад: новим, старим, великим (для чоловічого, жіночого і середнього
      роду).'
  - statement: Слово «цієї» — це правильна форма давального відмінка.
    correct: false
    explanation: Це родовий відмінок. Давальний відмінок — «цій».
  - statement: Іменникова група «моїй другові» є граматично правильною.
    correct: false
    explanation: '«Моїй» — жіночий рід, а «другові» — чоловічий. Правильно: «моєму
      другові».'
  - statement: Прикметники «тиха» і «довга» змінюються на «тихій» і «довгій» у давальному
      відмінку.
    correct: true
    explanation: Вони зберігають свою тверду приголосну і отримують закінчення -ій.
  - statement: Дієслово «допомагати» завжди вимагає після себе родового відмінка.
    correct: false
    explanation: Дієслово «допомагати» вимагає давального відмінка (допомагати кому?).
- id: workbook-odd-one-out
  type: odd-one-out
  instruction: Яке слово зайве за родом або числом?
  items:
  - words:
    - моєму
    - твоєму
    - нашій
    correct: 2
    explanation: «нашій» — жіночий рід, інші — чоловічий або середній.
  - words:
    - новій
    - старій
    - синьому
    correct: 2
    explanation: «синьому» — чоловічий рід, інші — жіночий.
  - words:
    - цим
    - тим
    - цьому
    correct: 2
    explanation: «цьому» — однина, інші — множина.
  - words:
    - його
    - її
    - своєму
    correct: 2
    explanation: «своєму» змінює форму (давальний відмінок), а «його» та «її» — ні.
  - words:
    - новим
    - старим
    - новій
    correct: 2
    explanation: «новій» — однина, інші — множина.
  - words:
    - моїй
    - нашій
    - вашому
    correct: 2
    explanation: «вашому» — чоловічий рід, інші — жіночий.
  - words:
    - другові
    - братові
    - мамі
    correct: 2
    explanation: «мамі» — жіночий рід, інші — чоловічий.
  - words:
    - костюму
    - будинку
    - дівчині
    correct: 2
    explanation: «дівчині» — жіночий рід, інші — чоловічий.
