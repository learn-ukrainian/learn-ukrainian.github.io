version: '1.0'
module: dative-adjectives-pronouns
level: a2
inline:
- id: task-1
  type: group-sort
  instruction: Розподіліть прикметники в давальному відмінку за родом та числом
  groups:
  - label: Чоловічий та середній рід (-ому, -ьому)
    items:
    - новому
    - синьому
    - літньому
  - label: Жіночий рід (-ій)
    items:
    - новій
    - дорогій
    - легкій
  - label: Множина (-им)
    items:
    - синім
    - гарним
    - маленьким
- id: task-2
  type: quiz
  instruction: Оберіть правильну форму займенника в давальному відмінку
  items:
  - question: Я завжди телефоную _____ батькові.
    options:
    - моєму
    - мій
    - мого
    - моїм
    correct: 0
  - question: Він часто допомагає _____ сестрі.
    options:
    - наша
    - нашої
    - нашій
    - нашим
    correct: 2
  - question: Ми купуємо подарунок _____ брату.
    options:
    - твоєму
    - твій
    - твого
    - твоїм
    correct: 0
  - question: Олена дякує _____ мамі за вечерю.
    options:
    - моя
    - моєї
    - моїм
    - моїй
    correct: 3
  - question: Ми віддаємо ключі _____ синові.
    options:
    - їхньому
    - їхній
    - їхнього
    - їхнім
    correct: 0
  - question: Студент показує університет _____ мамі.
    options:
    - він
    - його
    - йому
    - ньому
    correct: 1
  - question: Я щиро співчуваю _____ хлопцю.
    options:
    - цей
    - цього
    - цим
    - цьому
    correct: 3
  - question: Вона дарує квіти _____ дівчині.
    options:
    - та
    - тій
    - тієї
    - тим
    correct: 1
- id: task-3
  type: match-up
  instruction: З'єднайте називний відмінок із давальним
  pairs:
  - left: мій старший брат
    right: моєму старшому братові
  - left: наша нова вчителька
    right: нашій новій вчительці
  - left: ваше маленьке місто
    right: вашому маленькому місту
  - left: ці добрі люди
    right: цим добрим людям
  - left: той високий студент
    right: тому високому студентові
  - left: ця красива жінка
    right: цій красивій жінці
  - left: її маленький собака
    right: її маленькому собаці
  - left: твій розумний брат
    right: твоєму розумному братові
- id: task-4
  type: fill-in
  instruction: Вставте правильні закінчення прикметників
  items:
  - sentence: Я купую подарунок моєму ____ братові.
    answer: молодшому
    options:
    - молодшому
    - молодший
    - молодшого
  - sentence: Ми показуємо фотографії нашій ____ вчительці.
    answer: новій
    options:
    - новій
    - нова
    - нової
  - sentence: Він розповідає казку своєму ____ синові.
    answer: маленькому
    options:
    - маленькому
    - маленький
    - маленького
  - sentence: Ви завжди допомагаєте цим ____ людям.
    answer: добрим
    options:
    - добрим
    - добрі
    - добрих
  - sentence: Вона ніколи не вірить цій ____ жінці.
    answer: хитрій
    options:
    - хитрій
    - хитра
    - хитрої
  - sentence: Директор дає премію цьому ____ вчителю.
    answer: талановитому
    options:
    - талановитому
    - талановитий
    - талановитого
  - sentence: Ми радісно купуємо квитки нашому ____ другу.
    answer: доброму
    options:
    - доброму
    - добрий
    - доброго
  - sentence: Вони дають нові зошити тій ____ студентці.
    answer: розумній
    options:
    - розумній
    - розумна
    - розумної
- id: task-5
  type: error-correction
  instruction: Знайдіть і виправте помилку в узгодженні
  items:
  - sentence: Я даю подарунок моїй старому другові.
    error: моїй
    correction: моєму
    error_type: word
    options:
    - моєму
    - моїм
    - мого
    explanation: «Другові» — чоловічого роду, тому потрібен займенник «моєму».
  - sentence: Ми радісно даруємо квіти нашому новій вчительці.
    error: нашому
    correction: нашій
    error_type: word
    options:
    - нашій
    - нашим
    - нашої
    explanation: «Вчительці» — жіночого роду, тому потрібен займенник «нашій».
  - sentence: Вона часто допомагає цьому красивій жінці.
    error: цьому
    correction: цій
    error_type: word
    options:
    - цій
    - цим
    - цієї
    explanation: «Жінці» — жіночого роду, тому потрібен займенник «цій».
  - sentence: Він віддає ключі наступній клієнту.
    error: наступній
    correction: наступному
    error_type: word
    options:
    - наступному
    - наступним
    - наступного
    explanation: «Клієнту» — чоловічого роду, тому потрібен прикметник «наступному».
  - sentence: Я часто пишу довгі листи гарному друзям.
    error: гарному
    correction: гарним
    error_type: word
    options:
    - гарним
    - гарної
    - гарних
    explanation: «Друзям» — у множині, тому потрібен прикметник «гарним».
  - sentence: Цей жовтий колір дуже пасує синьому сумці.
    error: синьому
    correction: синій
    error_type: word
    options:
    - синій
    - синім
    - синьої
    explanation: «Сумці» — жіночого роду, тому потрібен прикметник «синій».
workbook:
