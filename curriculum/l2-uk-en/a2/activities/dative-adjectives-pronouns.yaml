    answer: новим
    options:
    - новим
    - новому
    - новій
  - sentence: Ми часто допомагаємо моєму ____ братові.
    answer: старшому
    options:
    - старшому
    - старшій
    - старшим
  - sentence: Він пише довге повідомлення ____ знайомій.
    answer: старій
    options:
    - старій
    - старому
    - старим
  - sentence: Цей яскравий колір дуже пасує ____ костюму.
    answer: синьому
    options:
    - синьому
    - синій
    - синім
  - sentence: Ми завжди щиро радіємо ____ дню весни.
    answer: теплому
    options:
    - теплому
    - теплій
    - теплим
  - sentence: Вчитель дає складне завдання ____ студентам.
    answer: розумним
    options:
