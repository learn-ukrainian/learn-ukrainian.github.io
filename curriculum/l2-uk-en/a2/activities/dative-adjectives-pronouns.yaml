- id: true-false-dative-agreement
  type: true-false
  instruction: Чи правильно вжите узгодження у давальному відмінку?
  items:
  - statement: Я часто телефоную моєму старий другові.
    correct: false
    explanation: 'Правильно: моєму старому другові. Прикметник також має бути в давальному
      відмінку.'
  - statement: Ми щодня допомагаємо нашій новій сусідці.
    correct: true
    explanation: Усі слова узгоджені в давальному відмінку жіночого роду (нашій новій
      сусідці).
  - statement: Хлопчик дарує гарні квіти своєму мамі.
    correct: false
    explanation: Мама — жіночого роду, тому потрібно «своїй мамі».
  - statement: Мої батьки вірять цьому новому лікарю.
    correct: true
    explanation: Усі слова узгоджені в давальному відмінку чоловічого роду (цьому
      новому лікарю).
  - statement: Наш вчитель пояснює правило новим студенту.
    correct: false
    explanation: Студенту — однина, тому потрібно «новому студенту».
  - statement: Я із задоволенням допомагаю моєму молодшому братові.
    correct: true
    explanation: Правильне узгодження в давальному відмінку чоловічого роду (моєму
      молодшому братові).
  title: Чи правильно вжите узгодження у давальному відмінку?
- id: translate-dative-phrases
  type: translate
  instruction: Оберіть правильний переклад українською
  items:
  - source: I am helping my older brother.
    options:
    - text: Я допомагаю моєму старшому братові.
      correct: true
    - text: Я допомагаю мого старшого брата.
      correct: false
    - text: Я допомагаю мій старший брат.
      correct: false
    - text: Я допомагаю моїм старшим братам.
      correct: false
  - source: We bought flowers for our favorite teacher.
    options:
    - text: Ми купили квіти нашій улюбленій вчительці.
      correct: true
    - text: Ми купили квіти нашої улюбленої вчительки.
      correct: false
    - text: Ми купили квіти нашому улюбленому вчителю.
      correct: false
    - text: Ми купили квіти нашу улюблену вчительку.
      correct: false
  - source: Give this interesting book to that boy.
    options:
    - text: Дай цю цікаву книгу тому хлопцеві.
      correct: true
    - text: Дай цю цікаву книгу того хлопця.
      correct: false
    - text: Дай цю цікаву книгу тим хлопцям.
      correct: false
    - text: Дай цю цікаву книгу цього хлопця.
      correct: false
  - source: They are happy about this beautiful house.
    options:
    - text: Вони радіють цьому гарному будинку.
      correct: true
    - text: Вони радіють цього гарного будинку.
      correct: false
    - text: Вони радіють цій гарній будинку.
      correct: false
    - text: Вони радіють цей гарний будинок.
      correct: false
  - source: People often envy their rich neighbor.
    options:
    - text: Люди часто заздрять їхньому багатому сусідові.
      correct: true
    - text: Люди часто заздрять їхнього багатого сусіда.
      correct: false
    - text: Люди часто заздрять їх багатому сусідові.
      correct: false
    - text: Люди часто заздрять їх багатий сусід.
      correct: false
  - source: What did you buy for your little children?
    options:
    - text: Що ви купили вашим маленьким дітям?
      correct: true
    - text: Що ви купили ваших маленьких дітей?
      correct: false
    - text: Що ви купили вашому маленькому дітям?
      correct: false
    - text: Що ви купили ваші маленькі діти?
      correct: false
  title: Оберіть правильний переклад українською
