  title: Розподіліть прикметники та займенники у давальному відмінку за родом та числом
- id: quiz-pronoun-forms-choose-the-correct-dative-form-of-the-possessive-pronoun-vs-vs
  type: quiz
  instruction: Оберіть правильну форму займенника у давальному відмінку
  items:
  - question: Я зараз телефоную (мій) ______ братові.
    options:
    - моєму
    - моїй
    - моїм
    - мій
    correct: 0
  - question: Допоможи (твоя) ______ сестрі зробити завдання.
    options:
    - твоєму
    - твоїй
    - твоїм
    - твоя
    correct: 1
  - question: Вони радіють (наші) ______ новим ідеям.
    options:
    - нашому
    - нашій
    - нашим
    - наші
    correct: 2
  - question: Ми купуємо подарунок (їхня) ______ доньці.
    options:
    - їхньому
    - їхній
    - їхнім
    - її
    correct: 1
  - question: Передай цю книгу (цей) ______ хлопцю.
    options:
    - цьому
    - цій
    - цим
    - цей
    correct: 0
  - question: Поясни нове правило (та) ______ студентці.
    options:
    - тому
    - тій
    - тим
    - та
    correct: 1
  - question: Директор дає премію (наш) ______ працівникові.
    options:
    - нашому
    - нашій
    - нашим
    - наш
    correct: 0
  - question: Вона присвятила пісню (свій) ______ чоловікові.
    options:
    - своєму
    - своїй
    - своїм
    - свій
    correct: 0
  title: Оберіть правильну форму займенника у давальному відмінку
- id: match-up-nom-dat-match-nominative-noun-phrases-to-their-dative-equivalents
  type: match-up
  instruction: З'єднайте називний відмінок із давальним
  pairs:
  - left: мій найкращий друг
    right: моєму найкращому другові
  - left: наша нова сусідка
    right: нашій новій сусідці
  - left: цей старий будинок
    right: цьому старому будинку
  - left: їхня маленька донька
    right: їхній маленькій доньці
  - left: твій старший брат
    right: твоєму старшому братові
  - left: ваші нові друзі
    right: вашим новим друзям
  - left: та гарна дівчина
    right: тій гарній дівчині
  - left: його улюблений лікар
    right: його улюбленому лікарю
  title: З'єднайте називний відмінок із давальним
- id: fill-in-dative-phrases
  type: fill-in
  instruction: Вставте правильні слова, щоб утворити форми давального відмінка
  items:
  - sentence: Я допомагаю ______ старшому братові.
    answer: моєму
    options:
    - моєму
    - моїй
    - моїм
  - sentence: Вони вірять цьому ______ лікарю.
    answer: новому
    options:
    - новому
    - новій
    - новим
  - sentence: Ми купили квіти нашій ______ вчительці.
    answer: улюбленій
    options:
    - улюбленій
    - улюбленому
    - улюбленим
  - sentence: Передай привіт твоїй молодшій ______!
    answer: сестрі
    options:
    - сестрі
    - сестру
    - сестрою
  - sentence: Я часто телефоную моєму ______ другові.
    answer: старому
    options:
    - старому
    - старий
    - старим
  - sentence: Він завжди допомагає своїм ______ клієнтам.
    answer: постійним
    options:
    - постійним
    - постійному
    - постійній
  - sentence: Батько купив телефон своєму ______ синові.
    answer: молодшому
    options:
    - молодшому
    - молодшій
    - молодшим
  - sentence: Що ви купили вашим ______ дітям?
    answer: маленьким
    options:
    - маленьким
    - маленькому
    - маленькій
  title: Вставте правильні слова, щоб утворити форми давального відмінка
workbook:
- id: fill-in-adjective-endings
  type: fill-in
  instruction: Вставте правильні форми прикметників у давальному відмінку
  items:
  - sentence: Я часто допомагаю моєму ______ другові.
    answer: старому
  - sentence: Ми даруємо квіти нашій ______ вчительці.
    answer: першій
  - sentence: Вони дуже радіють цьому ______ будинку.
    answer: гарному
  - sentence: Студенти радіють ______ дню семестру.
    answer: останньому
  - sentence: Цей яскравий колір дуже пасує ______ сукні.
    answer: синій
  - sentence: Поясни нове правило тій ______ студентці.
    answer: новій
  - sentence: Ця музика дуже подобається їхнім ______ дітям.
    answer: маленьким
  - sentence: Ми завжди допомагаємо нашим ______ дівчатам.
    answer: гарним
  title: Вставте правильні форми прикметників у давальному відмінку
