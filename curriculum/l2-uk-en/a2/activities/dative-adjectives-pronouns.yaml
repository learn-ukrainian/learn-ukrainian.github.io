version: '1.0'
module: dative-adjectives-pronouns
level: a2
inline:
- id: group-sort-sort-dative-adjective-forms-by-gender-masculine-feminine-plural
  type: group-sort
  instruction: Розподіліть слова та закінчення за родом і числом у давальному відмінку
  groups:
  - label: Чоловічий і середній рід
    items:
    - новому
    - старшому
    - синьому
    - останньому
    - цьому
    - тому
  - label: Жіночий рід
    items:
    - новій
    - старій
    - довгій
    - тихій
    - цій
    - тій
  - label: Множина (усі роди)
    items:
    - новим
    - старим
    - гарним
    - синім
    - цим
    - тим
- id: quiz-possessive-forms
  type: quiz
  instruction: Оберіть правильну форму присвійного чи вказівного займенника
  items:
  - question: Я завжди дарую книгу ____ другові.
    options:
    - моєму
    - моїй
    - моїм
    - моєю
    correct: 0
  - question: Вчитель детально пояснює правило ____ студентці.
    options:
    - нашій
    - нашому
    - нашим
    - нашої
    correct: 0
  - question: Ми з радістю допомагаємо ____ бабусі.
    options:
    - твоїй
    - твоєму
    - твоїм
    - твоєю
    correct: 0
  - question: Батько купив новий телефон ____ сестрі.
    options:
    - моїй
    - моєму
    - моїм
    - моєї
    correct: 0
  - question: Вона зараз телефонує ____ братові.
    options:
    - своєму
    - своїй
    - своїм
    - своєю
    correct: 0
  - question: Вони часто допомагають ____ сусідові.
    options:
    - їхньому
    - їхній
    - їхнім
    - їхньої
    correct: 0
  - question: Директор передав важливі документи ____ новому колезі.
    options:
    - вашому
    - вашій
    - вашим
    - вашої
    correct: 0
  - question: Що ти скажеш ____ людям на вулиці?
    options:
    - тим
    - тому
    - тій
    - тієї
    correct: 0
- id: match-up-nominative-dative
  type: match-up
  instruction: З'єднайте називний відмінок із давальним
  pairs:
  - left: мій друг
    right: моєму другові
  - left: моя сестра
    right: моїй сестрі
  - left: наш вчитель
    right: нашому вчителеві
  - left: ваша мама
    right: вашій мамі
  - left: цей хлопець
    right: цьому хлопцю
  - left: та дівчина
    right: тій дівчині
  - left: нове місто
    right: новому місту
  - left: старі друзі
    right: старим друзям
- id: fill-in-dative-phrases
  type: fill-in
  instruction: Вставте правильну форму займенника
  items:
  - sentence: Я хочу подарувати цю книгу ____ дорогому другові.
    answer: моєму
    options:
    - моєму
    - моїй
    - моїм
  - sentence: Ми дуже вдячні ____ добрій вчительці.
    answer: нашій
    options:
    - нашій
    - нашому
    - нашим
  - sentence: Вони часто допомагають ____ сусідові з ремонтом.
    answer: їхньому
    options:
    - їхньому
    - їхній
    - їхнім
  - sentence: Поясни це складне завдання ____ хлопцеві в синій куртці.
    answer: тому
    options:
    - тому
    - тій
    - тим
  - sentence: Я хочу подарувати ці красиві квіти ____ дівчині.
    answer: цій
    options:
    - цій
    - цьому
    - цим
  - sentence: ____ старшому братові потрібна наша допомога зараз.
    answer: Твоєму
    options:
    - Твоєму
    - Твоїй
    - Твоїм
  - sentence: Кожна людина бажає щастя ____ синові.
    answer: своєму
    options:
    - своєму
    - своїй
    - своїм
  - sentence: ____ старому будинку потрібен великий ремонт.
    answer: Цьому
    options:
    - Цьому
    - Цій
    - Цим
