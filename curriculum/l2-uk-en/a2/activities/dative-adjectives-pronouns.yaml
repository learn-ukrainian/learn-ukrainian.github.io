- id: wb-translate-1
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I am buying a present for my older brother.
    options:
    - text: Я купую подарунок моєму старшому братові.
      correct: true
    - text: Я купую подарунок мого старшого брата.
      correct: false
    - text: Я купую подарунок мій старший брат.
      correct: false
    - text: Я купую подарунок моїм старшим братам.
      correct: false
  - source: We give flowers to our new teacher.
    options:
    - text: Ми даруємо квіти нашій новій вчительці.
      correct: true
    - text: Ми даруємо квіти наша нова вчителька.
      correct: false
    - text: Ми даруємо квіти нашої нової вчительки.
      correct: false
    - text: Ми даруємо квіти нашому новому вчительці.
      correct: false
  - source: He always helps these kind people.
    options:
    - text: Він завжди допомагає цим добрим людям.
      correct: true
    - text: Він завжди допомагає ці добрі люди.
      correct: false
    - text: Він завжди допомагає цих добрих людей.
      correct: false
    - text: Він завжди допомагає цьому доброму людям.
      correct: false
  - source: The students thank the new teacher.
    options:
    - text: Студенти дякують новій вчительці.
      correct: true
    - text: Студенти дякують нову вчительку.
      correct: false
    - text: Студенти дякують нової вчительки.
      correct: false
    - text: Студенти дякують новим вчителькам.
      correct: false
  - source: Are you helping your brother?
    options:
    - text: Ти допомагаєш твоєму братові?
      correct: true
    - text: Ти допомагаєш твого брата?
      correct: false
    - text: Ти допомагаєш твій брат?
      correct: false
    - text: Ти допомагаєш твоїй братові?
      correct: false
  - source: She does not believe this sly woman.
    options:
    - text: Вона не вірить цій хитрій жінці.
      correct: true
    - text: Вона не вірить цю хитру жінку.
      correct: false
    - text: Вона не вірить цієї хитрої жінки.
      correct: false
    - text: Вона не вірить цьому хитрому жінці.
      correct: false
- id: wb-true-false-1
  type: true-false
  instruction: Чи правильно використано давальний відмінок?
  items:
  - statement: Він часто допомагає моєму найкращому другу.
    correct: true
    explanation: 'Правильно: моєму (masculine, dative), найкращому (masculine, dative),
      другу (masculine, dative).'
  - statement: Я купую квіти моїй дорогій мамі.
    correct: true
    explanation: 'Правильно: моїй (feminine, dative), дорогій (feminine, dative),
      мамі (feminine, dative).'
  - statement: Студенти дякують нова вчителька.
    correct: false
    explanation: 'Дієслово «дякувати» (to thank) вимагає давального відмінка: новій
      вчительці.'
  - statement: Туристи щиро дивуються високим горам.
    correct: true
    explanation: 'Правильно: високим горам (plural, dative).'
  - statement: Ми пишемо лист нашому старому бабусі.
    correct: false
    explanation: '«Бабуся» — це жіночий рід (feminine). Правильно: нашій старій бабусі.'
  - statement: Я хочу подарувати книгу цьому хлопцю.
    correct: true
    explanation: 'Правильно: цьому хлопцю (masculine, dative).'
  - statement: Ви завжди допомагаєте цим добрі люди.
    correct: false
    explanation: 'Після «допомагати» (to help) потрібен давальний відмінок: цим добрим
      людям.'
- id: wb-fill-in-1
  type: fill-in
  instruction: Вставте правильну форму слова в речення
  items:
  - sentence: Я повністю довіряю цьому ____ чоловікові.
    answer: розумному
    options:
    - розумному
    - розумний
    - розумного
  - sentence: Він купує гарні квіти ____ мамі.
    answer: дорогій
    options:
    - дорогій
    - дорога
    - дорогої
  - sentence: Вчитель дає нове завдання ____ студентам.
    answer: новим
    options:
    - новим
    - нові
    - нових
  - sentence: Я часто допомагаю ____ красивій жінці.
    answer: цій
    options:
    - цій
    - ця
    - цієї
  - sentence: Що ти даруєш ____ дівчині?
    answer: тій
    options:
    - тій
    - та
    - тієї
  - sentence: Молодий лікар дає ліки ____ дідусеві.
    answer: її
    options:
    - її
    - їй
    - нею
  - sentence: Ми відправляємо посилку нашому старшому ____.
    answer: братові
    options:
    - братові
    - брата
    - братом
  - sentence: Кожен студент радіє ____ дню.
    answer: літньому
    options:
    - літньому
    - літній
    - літнього
