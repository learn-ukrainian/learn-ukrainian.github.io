version: '1.0'
module: genitive-prepositions-direction
level: a2
inline:
- id: fill-in-genitive-forms
  type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: Ми їдемо до ____.
    answer: Києва
    options:
    - Києва
    - Києву
    - Київ
  - sentence: Я йду до ____.
    answer: лікаря
    options:
    - лікаря
    - лікарю
    - лікар
  - sentence: Студенти поспішають до ____.
    answer: університету
    options:
    - університету
    - університета
    - університеті
  - sentence: На вихідних ми їдемо до ____.
    answer: бабусі
    options:
    - бабусі
    - бабусю
    - бабуся
  - sentence: Машина під'їхала до ____.
    answer: станції
    options:
    - станції
    - станцію
    - станціє
  - sentence: Вони йдуть до великого ____.
    answer: будинку
    options:
    - будинку
    - будинка
    - будинки
  - sentence: Завтра ми їдемо до ____.
    answer: Львова
    options:
    - Львова
    - Львову
    - Львів
  - sentence: Я йду до ____.
    answer: магазину
    options:
    - магазину
    - магазина
    - магазині
  title: Вставте іменник у правильній формі
- id: match-up-functions
  type: match-up
  instruction: З'єднайте фразу з її значенням
  pairs:
  - left: до музею
    right: напрямок (direction)
  - left: до п'ятниці
    right: дедлайн (deadline)
  - left: з ранку до вечора
    right: проміжок часу (time range)
  - left: готовий до екзамену
    right: готовність (readiness)
  - left: до побачення
    right: сталий вираз (fixed expression)
  - left: додати до списку
    right: зв'язок (connection)
  - left: до лікаря
    right: напрямок до людини (person)
  - left: до кінця тижня
    right: кінець періоду (end of period)
  title: З'єднайте фразу з її значенням
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть фрази за категоріями значення
  groups:
  - label: Напрямок (Direction)
    items:
    - до парку
    - до бабусі
    - до Одеси
  - label: Час (Time limit)
    items:
    - до ранку
    - до літа
    - до вівторка
  - label: Мета або ставлення (Purpose/Attitude)
    items:
    - готовий до екзамену
    - інтерес до історії
    - ставлення до роботи
  title: Розподіліть фрази за категоріями значення
- id: quiz-meaning-choice
  type: quiz
  instruction: Яке запитання найкраще підходить до виділеної фрази?
  items:
  - question: Я буду читати книгу **до ранку**.
    options:
    - До якого часу?
    - Куди?
    - Для чого?
    - Звідки?
    correct: 0
  - question: Студенти йдуть **до університету**.
    options:
    - Куди?
    - До якого часу?
    - Коли?
    - Звідки?
    correct: 0
  - question: Твоє ставлення **до навчання** дуже гарне.
    options:
    - До чого?
    - До якого часу?
    - Куди?
    - Звідки?
    correct: 0
  - question: Мені треба зробити це **до п'ятниці**.
    options:
    - До якого часу?
    - Куди?
    - Для чого?
    - До кого?
    correct: 0
  - question: Ввечері я йду **до друга**.
    options:
    - До кого?
    - До якого часу?
    - Куди?
    - Звідки?
    correct: 0
  - question: Я маю квитки **до Києва** на завтра.
    options:
    - Куди?
    - До якого часу?
    - До кого?
    - Звідки?
    correct: 0
  - question: Ми гуляли в парку **до пізнього вечора**.
    options:
    - До якого часу?
    - До кого?
    - Куди?
    - Звідки?
    correct: 0
  - question: Студенти вже готові **до екзамену**.
    options:
    - До чого?
    - До якого часу?
    - Куди?
    - Звідки?
    correct: 0
  title: Яке запитання найкраще підходить до виділеної фрази?
workbook:
- type: fill-in
  instruction: Вставте правильний прийменник (з, від, до, після)
  items:
  - sentence: Наш новий офіс працює ____ понеділка до п'ятниці.
    answer: з
    options:
    - з
    - на
    - в
  - sentence: Я в університеті кожного дня з дев'ятої ____ шостої.
    answer: до
    options:
    - до
    - по
    - на
  - sentence: Вона чекає ____ завтра.
    answer: до
    options:
    - до
    - для
    - на
  - sentence: ____ роботи ми йдемо до нового ресторану.
    answer: Після
    options:
    - Після
    - До
    - Від
  - sentence: Я маю прийти до офісу ____ восьмої.
    answer: до
    options:
    - до
    - в
    - на
  - sentence: Лікар приймає пацієнтів від другої ____ п'ятої години.
    answer: до
    options:
    - до
    - в
    - після
  title: Вставте правильний прийменник (з, від, до, після)
- type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я йду в лікар.
    error: в лікар
    correction: до лікаря
    error_type: phrase
    options:
    - до лікаря
    - лікарю
    - до лікарем
    explanation: Movement toward a person requires «до» + Genitive.
  - sentence: Ми працюємо з ранку до вечір.
    error: до вечір
    correction: до вечора
    error_type: phrase
    options:
    - до вечора
    - до вечіру
    - у вечір
    explanation: Time limits require «до» + Genitive. Вечір takes -а.
  - sentence: Магазин не працює до понеділок.
    error: до понеділок
    correction: до понеділка
    error_type: phrase
    options:
    - до понеділка
    - до понеділку
    - у понеділок
    explanation: Days of the week take -а in the Genitive.
  - sentence: Ми їдемо к бабусі.
    error: к бабусі
    correction: до бабусі
    error_type: phrase
    options:
    - до бабусі
    - в бабусю
    - на бабусю
    explanation: Movement toward a person is always «до» + Genitive in Ukrainian.
      Using «к» is a Russian calque.
  - sentence: Студенти готові до екзамен.
    error: до екзамен
    correction: до екзамену
    error_type: phrase
    options:
    - до екзамену
    - до екзамена
    - в екзамен
    explanation: Abstract goals require Genitive, and masculine abstract nouns typically
      take -у.
  - sentence: Ти можеш додати молоко в список?
    error: в список
    correction: до списку
    error_type: phrase
    options:
    - до списку
    - в списку
    - до списка
    explanation: We say «додати до» (add to) + Genitive.
  title: Знайдіть і виправте помилку
