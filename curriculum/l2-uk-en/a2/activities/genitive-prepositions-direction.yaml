version: '1.0'
module: genitive-prepositions-direction
level: a2
inline:
- id: fill-in-genitive-forms
  type: fill-in
  instruction: Вставте іменник у правильній формі родового відмінка (Genitive)
  items:
  - sentence: Я йду до ____.
    answer: університету
    options:
    - університету
    - університета
    - університет
  - sentence: Ми їдемо до ____.
    answer: Києва
    options:
    - Києва
    - Києву
    - Київ
  - sentence: Він працює до ____.
    answer: вечора
    options:
    - вечора
    - вечіра
    - вечіру
  - sentence: Діти йдуть до ____.
    answer: школи
    options:
    - школи
    - школу
    - школі
  - sentence: Зробіть це до ____.
    answer: п'ятниці
    options:
    - п'ятниці
    - п'ятницю
    - п'ятниця
  - sentence: Я йду до ____.
    answer: лікаря
    options:
    - лікаря
    - лікарю
    - лікар
  - sentence: Студенти готові до ____.
    answer: екзамену
    options:
    - екзамену
    - екзамена
    - екзамен
  - sentence: Ми підходимо до ____.
    answer: станції
    options:
    - станції
    - станцію
    - станція
- id: match-up-functions
  type: match-up
  instruction: З'єднайте фразу з прийменником «до» та її значенням у контексті
  pairs:
  - left: їхати до Києва
    right: Напрямок (місто)
  - left: йти до лікаря
    right: Напрямок (людина)
  - left: працювати до вечора
    right: Час (проміжок)
  - left: зробити до п'ятниці
    right: Час (дедлайн)
  - left: готовий до екзамену
    right: Мета (готовність)
  - left: додати до списку
    right: Мета (зв'язок)
  - left: квиток до театру
    right: Напрямок (будівля)
  - left: спати до обіду
    right: Час (кінець дії)
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть фрази з «до» за категоріями значення
  groups:
  - label: Напрямок (Direction)
    items:
    - до магазину
    - до лікаря
    - до Києва
    - до бабусі
  - label: Час (Time)
    items:
    - до ранку
    - до завтра
    - до п'ятниці
    - до вечора
  - label: Мета і зв'язки (Purpose/Connections)
    items:
    - готовий до екзамену
    - додати до списку
    - інтерес до історії
    - ставлення до роботи
- id: quiz-meaning-choice
  type: quiz
  instruction: Оберіть правильне значення прийменника «до» в кожному реченні
  items:
  - question: 'Що означає прийменник «до» у реченні: **Ми їдемо до Києва**?'
    options:
    - Напрямок (Direction)
    - Час (Time limit)
    - Мета (Purpose)
    - Причина (Cause)
    correct: 0
  - question: 'Що означає прийменник «до» у реченні: **Він працює до вечора**?'
    options:
    - Час (Time limit)
    - Напрямок (Direction)
    - Мета (Purpose)
    - Місцезнаходження (Location)
    correct: 0
  - question: 'Що означає прийменник «до» у реченні: **Студенти готові до екзамену**?'
    options:
    - Мета або готовність (Purpose/Readiness)
    - Напрямок (Direction)
    - Час (Time limit)
    - Наслідок (Result)
    correct: 0
  - question: 'Що означає прийменник «до» у реченні: **Зробіть це завдання до п''ятниці**?'
    options:
    - 'Час: дедлайн (Time deadline)'
    - Напрямок (Direction)
    - Мета (Purpose)
    - Зв'язок (Connection)
    correct: 0
  - question: 'Що означає прийменник «до» у реченні: **Я йду до лікаря**?'
    options:
    - Напрямок до людини (Direction to person)
    - Час (Time limit)
    - Мета (Purpose)
    - Професія (Profession)
    correct: 0
  - question: 'Що означає прийменник «до» у реченні: **Додайте молоко до кави**?'
    options:
    - Зв'язок / додавання (Connection/Adding)
    - Час (Time)
    - Напрямок руху (Movement)
    - Дедлайн (Deadline)
    correct: 0
  - question: 'Що означає прийменник «до» у реченні: **До побачення!**'
    options:
    - Час (до моменту зустрічі)
    - Напрямок (рух до зустрічі)
    - Мета (причина зустрічі)
    - Зв'язок (додавання)
    correct: 0
  - question: 'Що означає прийменник «до» у реченні: **Я маю квиток до Львова**?'
    options:
    - Напрямок подорожі (Destination)
    - Час відправлення (Time)
    - Вартість (Price)
    - Мета (Purpose)
    correct: 0
workbook:
- id: workbook-error-correction-1
  type: error-correction
  instruction: Знайдіть і виправте помилку у використанні прийменника та відмінка
  items:
  - sentence: Я йду в лікаря.
    error: в
    correction: до
    error_type: word
    options:
    - до
    - на
    - з
    explanation: З людьми та професіями ми використовуємо прийменник «до» (до лікаря).
  - sentence: Ми їдемо до Київ.
    error: Київ
    correction: Києва
    error_type: word
    options:
    - Києва
    - Києві
    - Києву
    explanation: 'Після «до» потрібен родовий відмінок: міста чоловічого роду зазвичай
      мають закінчення -а.'
  - sentence: Він працює до вечір.
    error: вечір
    correction: вечора
    error_type: word
    options:
    - вечора
    - вечорі
    - вечору
    explanation: 'Після «до» потрібен родовий відмінок (Genitive): вечір → вечора.'
  - sentence: Зробіть це завдання до п'ятниця.
    error: п'ятниця
    correction: п'ятниці
    error_type: word
    options:
    - п'ятниці
    - п'ятницю
    - п'ятницею
    explanation: 'Після «до» потрібен родовий відмінок: п''ятниця → п''ятниці.'
  - sentence: Студенти готові к екзамену.
    error: к
    correction: до
    error_type: word
    options:
    - до
    - на
    - в
    explanation: В українській мові використовується прийменник «до» для мети/готовності,
      а не російська калька «к».
  - sentence: Вона додає цукор до кава.
    error: кава
    correction: кави
    error_type: word
    options:
    - кави
    - каву
    - каві
    explanation: 'Після «до» потрібен родовий відмінок (Genitive): кава → кави.'
- id: workbook-unjumble-1
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - Одеси.
    - Завтра
    - до
    - ми
    - їдемо
    correct_order:
    - Завтра
    - ми
    - їдемо
    - до
    - Одеси.
  - words:
    - вечора.
    - Наш
    - працює
    - офіс
    - до
    correct_order:
    - Наш
    - офіс
    - працює
    - до
    - вечора.
  - words:
    - готові
    - до
    - екзамену.
    - Усі
    - студенти
    correct_order:
    - Усі
    - студенти
    - готові
    - до
    - екзамену.
  - words:
    - до
    - п'ятниці.
    - Мені
    - зробити
    - це
    - треба
    correct_order:
    - Мені
    - треба
    - зробити
    - це
    - до
    - п'ятниці.
  - words:
    - до
    - сусіда.
    - йде
    - Увечері
    - вона
    correct_order:
    - Увечері
    - вона
    - йде
    - до
    - сусіда.
  - words:
    - до
    - роботи.
    - ставлення
    - гарне
    - Дуже
    correct_order:
    - Дуже
    - гарне
    - ставлення
    - до
    - роботи.
- id: workbook-true-false-1
  type: true-false
  instruction: Правда чи ні? (Оберіть правильне твердження про прийменник «до»)
  items:
  - statement: Прийменник «до» завжди вимагає після себе родового відмінка (Genitive).
    correct: true
    explanation: Так, це головне правило. Після «до» завжди йде родовий відмінок.
  - statement: Коли ми йдемо до людини (наприклад, до лікаря), ми можемо сказати «в
      лікаря».
    correct: false
    explanation: Ні, напрямок до людини завжди виражається прийменником «до» + родовий
      відмінок.
  - statement: Фраза «до п'ятниці» означає дедлайн (зробити щось не пізніше п'ятниці).
    correct: true
    explanation: Так, «до» з днями тижня вказує на кінцевий термін (deadline).
  - statement: У фразі «готовий до роботи» прийменник «до» означає час.
    correct: false
    explanation: Тут «до» вказує на мету або готовність до якоїсь дії, а не на час.
  - statement: Для позначення часу від початку до кінця ми кажемо «з ранку до вечора».
    correct: true
    explanation: Так, конструкція «з ... до ...» показує проміжок часу.
  - statement: 'Слово «додому» складається з двох окремих слів: «до» і «дому».'
    correct: false
    explanation: 'Ні, в сучасній українській мові це один суцільний прислівник напрямку:
      «додому».'
- id: workbook-group-sort-endings
  type: group-sort
  instruction: Розподіліть слова за закінченням у родовому відмінку (після «до»)
  groups:
  - label: Закінчення -а / -я / -у / -ю (Чоловічий та середній рід)
    items:
    - до лікаря
    - до Києва
    - до вечора
    - до екзамену
    - до університету
    - до списку
  - label: Закінчення -и / -і / -ї (Жіночий рід)
    items:
    - до бабусі
    - до школи
    - до станції
    - до площі
    - до роботи
    - до п'ятниці
- id: workbook-fill-in-prepositions
  type: fill-in
  instruction: Оберіть правильний прийменник (до, в, на, від, з)
  items:
  - sentence: Я йду ____ лікаря.
    answer: до
    options:
    - до
    - в
    - на
  - sentence: Ми працюємо ____ понеділка до п'ятниці.
    answer: з
    options:
    - з
    - на
    - до
  - sentence: Він їде ____ вокзалу до готелю.
    answer: від
    options:
    - від
    - в
    - на
  - sentence: Вона завжди п'є каву ____ ранку.
    answer: з
    options:
    - з
    - до
    - від
  - sentence: Ми будемо чекати вас ____ завтра.
    answer: до
    options:
    - до
    - на
    - з
  - sentence: Студенти йдуть ____ парку після уроку.
    answer: до
    options:
    - до
    - в
    - на
