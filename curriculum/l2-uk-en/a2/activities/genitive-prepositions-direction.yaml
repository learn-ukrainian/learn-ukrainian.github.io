- id: error-correction-genitive
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в реченні
  items:
  - sentence: Ми їдемо до вокзал.
    error: вокзал
    correction: вокзалу
    error_type: word
    options:
    - вокзалу
    - вокзалі
    - вокзалом
    explanation: Після прийменника «до» потрібен родовий відмінок.
  - sentence: Вона йде до лікар.
    error: лікар
    correction: лікаря
    error_type: word
    options:
    - лікаря
    - лікарю
    - лікарем
    explanation: Після прийменника «до» потрібен родовий відмінок.
  - sentence: Я буду чекати до вечір.
    error: вечір
    correction: вечора
    error_type: word
    options:
    - вечора
    - вечору
    - вечером
    explanation: Після прийменника «до» потрібен родовий відмінок.
  - sentence: Ти готовий до екзамен?
    error: екзамен
    correction: екзамену
    error_type: word
    options:
    - екзамену
    - екзамена
    - екзамені
    explanation: Після прийменника «до» потрібен родовий відмінок.
  - sentence: Він додав це до список.
    error: список
    correction: списку
    error_type: word
    options:
    - списку
