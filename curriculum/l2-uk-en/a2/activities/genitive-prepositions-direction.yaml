version: '1.0'
module: genitive-prepositions-direction
level: a2
workbook:
- id: quiz-meaning
  type: quiz
  instruction: Оберіть правильне значення прийменника «до»
  items:
  - question: Я йду до лікаря.
    options:
    - Напрямок до особи
    - Напрямок до місця
    - Ліміт часу
    - Дедлайн
    correct: 0
  - question: Ми маємо закінчити проєкт до п'ятниці.
    options:
    - Ліміт часу
    - Мета або готовність
    - Напрямок до місця
    - Дедлайн
    correct: 3
  - question: Він спав до обіду.
    options:
    - Ліміт часу
    - Дедлайн
    - Напрямок до особи
    - Ставлення
    correct: 0
  - question: Автобус їде до музею.
    options:
    - Дедлайн
    - Напрямок до місця
    - Ліміт часу
    - Мета або готовність
    correct: 1
  - question: Я ще не готовий до екзамену.
    options:
    - Напрямок до особи
    - Дедлайн
    - Мета або готовність
    - Ліміт часу
    correct: 2
  - question: У нього великий інтерес до історії.
    options:
    - Ставлення або зв'язок
    - Напрямок до місця
    - Дедлайн
    - Ліміт часу
    correct: 0
  - question: Будь ласка, додайте це до списку.
    options:
    - Дедлайн
    - Ліміт часу
    - Зв'язок або додавання
    - Напрямок до особи
    correct: 2
  - question: Вони летять до Америки.
    options:
    - Напрямок до місця
    - Мета або готовність
    - Дедлайн
    - Ліміт часу
    correct: 0
- id: fill-in-genitive
  type: fill-in
  instruction: Вставте правильну форму слова (родовий відмінок)
  items:
  - sentence: Я йду до ____.
    answer: лікаря
    options:
    - лікар
    - лікаря
    - лікарю
    - лікарем
  - sentence: Ми їдемо до ____.
    answer: Львова
    options:
    - Львів
    - Львову
    - Львова
    - Львові
  - sentence: Автобус їде до ____.
    answer: вокзалу
    options:
    - вокзал
    - вокзалу
    - вокзала
    - вокзалі
  - sentence: Вона побігла до ____.
    answer: бабусі
    options:
    - бабуся
    - бабусі
    - бабусею
    - бабусю
  - sentence: Студенти йдуть до ____.
    answer: музею
    options:
    - музей
    - музею
    - музея
    - музеєм
  - sentence: Я буду на роботі до ____.
    answer: вечора
    options:
    - вечір
    - вечора
    - вечору
    - вечором
  - sentence: Зроби це завдання до ____.
    answer: середи
    options:
    - середа
    - середи
    - середу
    - середою
  - sentence: Магазин працює до ____.
    answer: ранку
    options:
    - ранок
    - ранку
    - ранка
    - ранком
- id: match-up-functions
  type: match-up
  instruction: З'єднайте фразу з її значенням
  pairs:
  - left: до лікаря
    right: Напрямок до особи (Direction to person)
  - left: до Києва
    right: Напрямок до місця (Direction to place)
  - left: до вечора
    right: Ліміт часу (Time limit)
  - left: до понеділка
    right: Дедлайн (Deadline)
  - left: готовий до екзамену
    right: Мета або готовність (Purpose or readiness)
  - left: інтерес до історії
    right: Ставлення (Attitude)
  - left: додати до списку
    right: Зв'язок або додавання (Adding to a set)
  - left: до побачення
    right: Сталий вираз (Fixed phrase)
- id: group-sort-categories
  type: group-sort
  instruction: Розподіліть слова та фрази за категоріями
  groups:
  - label: Напрямок (Direction)
    items:
    - до школи
    - до театру
    - до бабусі
    - до Львова
  - label: Час (Time)
    items:
    - до ранку
    - до завтра
    - до середи
    - до вечора
  - label: Інше (Abstract)
    items:
    - до побачення
    - до речі
    - готовий до екзамену
    - інтерес до роботи
- id: error-correction-genitive
  type: error-correction
  instruction: Знайдіть і виправте помилку у формі слова після «до»
  items:
  - sentence: Я йду до магазин.
    error: магазин
    correction: магазину
    error_type: word
    options:
    - магазина
    - магазину
    - магазином
    explanation: Магазин — чоловічий рід, неістота (building), тому закінчення -у.
  - sentence: Ми їдемо до Львів.
    error: Львів
    correction: Львова
    error_type: word
    options:
    - Львову
    - Львова
    - Львові
    explanation: Львів — місто (city), чоловічий рід, тому закінчення -а.
  - sentence: Вона була там до ранок.
    error: ранок
    correction: ранку
    error_type: word
    options:
    - ранка
    - ранку
    - ранком
    explanation: Ранок — час, чоловічий рід, тому закінчення -у.
  - sentence: Вони готові до екзамен.
    error: екзамен
    correction: екзамену
    error_type: word
    options:
    - екзамена
    - екзамену
    - екзамені
    explanation: Екзамен — чоловічий рід, абстрактне поняття, тому закінчення -у.
  - sentence: У мене великий інтерес до історія.
    error: історія
    correction: історії
    error_type: word
    options:
    - історію
    - історії
    - історією
    explanation: Історія — жіночий рід на -я (soft stem), тому в родовому відмінку
      буде -ї.
  - sentence: Додай це до список.
    error: список
    correction: списку
    error_type: word
    options:
    - списка
    - списку
    - списком
    explanation: Список — чоловічий рід, абстрактне/неживе, тому закінчення -у.
  - sentence: Ми чекали до ніч.
    error: ніч
    correction: ночі
    error_type: word
    options:
    - ніччю
    - ночі
    - ночю
    explanation: Ніч — жіночий рід (3-я відміна), у родовому відмінку закінчення -і.
  - sentence: Я йду до лікар.
    error: лікар
    correction: лікаря
    error_type: word
    options:
    - лікарю
    - лікаря
    - лікарем
    explanation: Лікар — чоловічий рід, істота (person), тому закінчення -я.
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - лікаря.
    - йду
    - Я
    - до
    correct_order:
    - Я
    - йду
    - до
    - лікаря.
  - words:
    - їдемо
    - Ми
    - до
    - Львова.
    correct_order:
    - Ми
    - їдемо
    - до
    - Львова.
  - words:
    - до
    - працює
    - Магазин
    - вечора.
    correct_order:
    - Магазин
    - працює
    - до
    - вечора.
  - words:
    - проєкт
    - закінчити
    - Треба
    - п'ятниці.
    - до
    correct_order:
    - Треба
    - закінчити
    - проєкт
    - до
    - п'ятниці.
  - words:
