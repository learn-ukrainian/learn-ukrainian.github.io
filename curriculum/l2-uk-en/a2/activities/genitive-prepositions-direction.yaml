- id: true-false-grammar-rules
  type: true-false
  instruction: Правда чи ні? Оцініть граматичні правила
  items:
  - statement: Після прийменника «до» ми завжди використовуємо родовий відмінок (Genitive).
    correct: true
    explanation: Прийменник «до» завжди вимагає після себе родового відмінка.
  - statement: Коли ми йдемо в гості до людини (наприклад, лікаря), ми використовуємо
      прийменник «в».
    correct: false
    explanation: Для людей ми завжди використовуємо «до» (до лікаря, до бабусі).
  - statement: Слово «вокзал» після «до» змінюється на «до вокзалу».
    correct: true
    explanation: Це чоловічий рід, тверда група, тому закінчення -у.
  - statement: Ми можемо використовувати «до» для часу, щоб сказати «until» або «by».
    correct: true
    explanation: Наприклад, «до вечора» (until evening) або «до п'ятниці» (by Friday).
  - statement: 'Правильно казати: «Я готовий на екзамен».'
    correct: false
    explanation: 'Правильно казати: «Я готовий до екзамену» (абстрактний напрямок/мета).'
  - statement: Фрази «до магазину» і «в магазин» є правильними в українській мові.
    correct: true
    explanation: Обидві фрази правильні, різниця лише в невеликому нюансі (маршрут
      vs приміщення).
  - statement: Слово «Польща» після «до» не змінює своє закінчення.
    correct: false
    explanation: 'Слово обов''язково змінюється: до Польщі (родовий відмінок).'
  - statement: Прийменник «після» показує рух до мети.
    correct: false
    explanation: Прийменник «після» показує послідовність у часі (after), а рух до
      мети — це «до».
