- id: fill-in-numbers
  type: fill-in
  instruction: Оберіть правильний числівник словом.
  items:
  - sentence: Мені потрібен (1) ____ літр молока.
    answer: один
    options:
    - один
    - одна
    - одне
  - sentence: Дайте, будь ласка, (2) ____ кілограми яблук.
    answer: два
    options:
    - два
    - дві
    - двоє
  - sentence: Я йду в поліклініку на (10:00) ____ годину.
    answer: десяту
    options:
    - десять
    - десяту
    - десятої
  - sentence: Бабуся продає (1) ____ велику банку меду.
    answer: одну
    options:
    - один
    - одну
    - одне
  - sentence: Випийте (1) ____ таблетку після їжі.
    answer: одну
    options:
    - один
    - одну
    - одне
  - sentence: Вона купила (10 шт.) один ____ яєць.
    answer: десяток
    options:
    - десять
    - десяток
    - десята
- id: match-up-numbers
  type: match-up
  instruction: Зіставте цифри або міри з їхніми українськими назвами.
  pairs:
  - left: 1 (чоловічий рід)
    right: один
  - left: 1 (жіночий рід)
    right: одна
  - left: 2 (кілограми)
    right: два
  - left: 10 штук
    right: десяток
  - left: 0.5 кг
    right: півкіло
  - left: 10:00 (година)
    right: десята
- id: match-up-pronouns
  type: match-up
  instruction: З'єднайте займенник у називному відмінку з його формою у родовому (після
    'у').
  pairs:
  - left: я
    right: у мене
  - left: ти
    right: у тебе
  - left: він
    right: у нього
  - left: вона
    right: у неї
  - left: ми
    right: у нас
  - left: вони
    right: у них
- id: fill-in-pronouns
  type: fill-in
  instruction: Вставте правильний займенник у родовому відмінку.
  items:
  - sentence: Я здоровий, ____ немає температури.
    answer: у мене
    options:
    - у мене
    - у тебе
    - у нього
  - sentence: Ти добре себе почуваєш? ____ немає болю?
    answer: У тебе
    options:
    - У тебе
    - У мене
    - У неї
  - sentence: Він хворий, ____ сильний нежить.
    answer: у нього
    options:
    - у нього
    - у неї
    - у нас
  - sentence: Вона не хоче їсти, ____ немає апетиту.
    answer: у неї
    options:
    - у неї
    - у нього
    - у них
  - sentence: Ми багато працювали, ____ немає сил.
    answer: у нас
    options:
    - у нас
    - у вас
    - у них
  - sentence: Вони здорові, ____ немає алергії.
    answer: у них
    options:
    - у них
    - у нас
    - у нього
- id: group-sort-pronouns
  type: group-sort
  instruction: Розподіліть займенники на однину та множину.
  groups:
  - label: Однина (Singular)
    items:
    - у мене
    - у тебе
    - у нього
    - у неї
  - label: Множина (Plural)
    items:
    - у нас
    - у вас
    - у них
- id: quiz-pronouns
  type: quiz
  instruction: Оберіть правильну форму звертання — неформальне чи ввічливе.
  items:
  - question: Мамо, у ____ є ліки від кашлю?
    options:
    - тебе
    - вас
    - мене
    - нього
    correct: 0
  - question: Пане Іване, що ____ турбує?
    options:
    - тебе
    - вас
    - мене
    - нас
    correct: 1
  - question: Сашко, у ____ немає температури?
    options:
    - тебе
    - вас
    - нього
    - неї
    correct: 0
  - question: Лікарю, що ____ порадите від нежиті?
    options:
    - ти
    - ви
    - він
    - вона
    correct: 1
  - question: Бабусю, у ____ болить голова?
    options:
    - тебе
    - вас
    - неї
    - мене
    correct: 0
  - question: Добрий день! Що ____ бажаєте купити?
    options:
    - ти
    - ви
    - ми
    - вони
    correct: 1
- id: quiz-reading
  type: quiz
  instruction: Оберіть правильну відповідь за текстом.
  items:
  - question: Куди українці люблять ходити у вихідні?
    options:
    - На ринок
    - У лікарню
    - В аптеку
    - На роботу
    correct: 0
  - question: Що часто запитують у продавця на ринку?
    options:
    - Чи можна скуштувати?
    - Де кабінет лікаря?
    - Яка у вас температура?
    - Що ви порадите від кашлю?
    correct: 0
  - question: У чому часто продають мед?
    options:
    - У банках
    - У пачках
    - У пляшках
    - У шматках
    correct: 0
  - question: Що запитує лікар, коли пацієнт заходить?
    options:
    - Що вас турбує?
    - Скільки з мене?
    - По скільки помідори?
    - Що ви порадите?
    correct: 0
  - question: Що потрібно, щоб купити сильні ліки в аптеці?
    options:
    - Рецепт від лікаря
    - Дозвіл продавця
    - Кілограм яблук
    - Багато води
    correct: 0
  - question: Який прийменник використовуємо, коли просимо ліки 'against' a headache?
    options:
    - Від
    - Для
    - Без
    - Після
    correct: 0
