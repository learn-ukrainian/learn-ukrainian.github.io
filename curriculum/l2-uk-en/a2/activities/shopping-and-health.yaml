version: '1.0'
module: shopping-and-health
level: a2
inline:
- id: fill-in-market-genitive
  type: fill-in
  instruction: Доповніть діалоги. Вставте іменники у правильній формі родового відмінка.
  items:
  - sentence: Дайте мені, будь ласка, два кілограми ____.
    answer: помідорів
    options:
    - помідор
    - помідори
    - помідорів
    - помідором
  - sentence: Мені потрібна одна пляшка ____.
    answer: олії
    options:
    - олія
    - олію
    - олії
    - олією
  - sentence: Зважте мені великий шматок ____.
    answer: сиру
    options:
    - сир
    - сиру
    - сира
    - сиром
  - sentence: Чи є у вас свіжий десяток ____?
    answer: яєць
    options:
    - яйця
    - яйце
    - яєць
    - яйцями
  - sentence: Я хочу купити банку гречаного ____.
    answer: меду
    options:
    - мед
    - меда
    - меду
    - медом
  - sentence: Можна мені кілограм білого ____?
    answer: цукру
    options:
    - цукор
    - цукра
    - цукру
    - цукром
  - sentence: Я випив склянку яблучного ____.
    answer: соку
    options:
    - сік
    - сока
    - соку
    - соком
  - sentence: Дайте мені, будь ласка, літр ____.
    answer: молока
    options:
    - молоко
    - молока
    - молоку
    - молоком
- id: quiz-health-phrases
  type: quiz
  instruction: Оберіть правильний варіант для опису стану здоров'я.
  items:
  - question: Яке запитання зазвичай ставить лікар?
    options:
    - Що вас болить?
    - Що вас турбує?
    - Як ваше здоров'я?
    - Де ви відчуваєте?
    correct: 1
  - question: Як правильно сказати, якщо у вас висока температура тіла?
    options:
    - У мене є гаряче.
    - Я маю температуру.
    - У мене температура.
    - Мені температура.
    correct: 2
  - question: 'Якщо ви не хочете їсти, ви кажете:'
    options:
    - У мене немає апетиту.
    - У мене немає апетит.
    - Мене нудить їсти.
    - Мені не смачно.
    correct: 0
  - question: Що ви просите в аптеці, коли болить голова?
    options:
    - Таблетки для голови.
    - Таблетки від головного болю.
    - Таблетки без болю.
    - Ліки про голову.
    correct: 1
  - question: Як сказати, що ви відчуваєте нудоту?
    options:
    - Мені нудить.
    - Я нуджу.
    - Мене нудить.
    - У мене нудота.
    correct: 2
  - question: Що ви купуєте, якщо у вас сильна реакція на пилок або їжу?
    options:
    - Ліки для алергії.
    - Ліки від алергії.
    - Ліки без алергії.
    - Таблетки на алергію.
    correct: 1
  - question: Як відповісти, якщо лікар питає про рецепт, а у вас його немає?
    options:
    - Ні, я не маю рецепт.
    - Ні, у мене немає рецепта.
    - Ні, мені не треба рецепту.
    - Ні, без рецепту.
    correct: 1
  - question: Які слова описують загальний поганий стан, коли вам холодно?
    options:
    - Я холодний і поганий.
    - Мені погано і холодно.
    - У мене холодно і погано.
    - Мене холодно і погано.
    correct: 1
- id: match-up-remedies
  type: match-up
  instruction: З'єднайте проблему зі здоров'ям і правильні ліки.
  pairs:
  - left: болить голова
    right: таблетки від головного болю
  - left: сильний нежить
    right: краплі від нежиті
  - left: болить горло
    right: сироп від болю у горлі
  - left: висока температура
    right: ліки від температури
  - left: алергія
    right: таблетки від алергії
  - left: слабкий імунітет
    right: вітаміни для здоров'я
  - left: сильний кашель
    right: сироп від кашлю
  - left: поганий сон
    right: чай перед сном
- id: true-false-grammar
  type: true-false
  instruction: Чи правильно використано родовий відмінок? Оберіть «Правда» або «Брехня».
  items:
  - statement: Словосполучення «два кілограми помідор» є правильним.
    correct: false
    explanation: 'Правильно: два кілограми помідорів (родовий відмінок множини).'
  - statement: Ми кажемо «пляшка олії», тому що «пляшка» вимагає родового відмінка.
    correct: true
    explanation: 'Слова, що позначають міру або кількість (пляшка, банка, кілограм),
      вимагають родового відмінка: чого? — олії.'
  - statement: 'Правильно говорити: «Я хочу купити банку мед».'
    correct: false
    explanation: 'Правильно: банку меду. Речовини чоловічого роду часто мають закінчення
      -у/-ю в родовому відмінку.'
  - statement: Фраза «У мене немає температура» граматично правильна.
    correct: false
    explanation: 'Слово «немає» вимагає родового відмінка: немає (чого?) температури.'
  - statement: Ми просимо в аптеці «ліки від кашлю».
    correct: true
    explanation: 'Прийменник «від» у медичному контексті (проти чогось) вимагає родового
      відмінка: від (чого?) кашлю.'
  - statement: Правильно говорити «шматок сира».
    correct: false
    explanation: 'Правильно: шматок сиру. Абстрактні поняття та речовини чоловічого
      роду зазвичай мають закінчення -у.'
  - statement: Коли ми щось купуємо для користі, ми кажемо «для здоров'я».
    correct: true
    explanation: 'Прийменник «для» вимагає родового відмінка: для (чого?) здоров''я.'
  - statement: 'Якщо болять дві ноги, ми кажемо: «У мене болить ноги».'
    correct: false
    explanation: 'Дієслово має узгоджуватися з числом іменника: ноги (множина) — отже,
      «болять».'
workbook:
- type: group-sort
  instruction: Розподіліть слова за відмінками (називний чи родовий).
  groups:
  - label: Називний відмінок (Що це?)
    items:
    - шматок
    - кілограм
    - аптека
    - здоров'я
    - рецепт
    - апетит
  - label: Родовий відмінок (Кількість або відсутність чого?)
    items:
    - сиру
    - ліків
    - температури
    - яєць
    - молока
    - кашлю
- type: error-correction
  instruction: Знайдіть помилку у реченні та оберіть правильний варіант.
  items:
  - sentence: Скільки коштує кілограм яблука?
    error: яблука
    correction: яблук
    error_type: word
    options:
    - яблука
    - яблуки
    - яблук
    - яблуками
    explanation: 'Після слова «кілограм» потрібен родовий відмінок множини, якщо об''єктів
      багато: кілограм (чого?) яблук.'
  - sentence: Сьогодні вранці у мене болять голова.
    error: болять
    correction: болить
    error_type: word
    options:
    - болять
    - болить
    - болію
    - хворіє
    explanation: 'Голова — це однина, тому дієслово має бути в однині: болить.'
  - sentence: Чи є у вас таблетки від алергія?
    error: алергія
    correction: алергії
    error_type: word
    options:
    - алергія
    - алергію
    - алергії
    - алергією
    explanation: 'Прийменник «від» вимагає родового відмінка: від (чого?) алергії.'
  - sentence: Дайте, будь ласка, літр молоко.
    error: молоко
    correction: молока
    error_type: word
    options:
    - молоко
    - молоку
    - молока
    - молоком
    explanation: 'Міра об''єму «літр» вимагає родового відмінка для речовини: літр
      (чого?) молока.'
  - sentence: Я дуже погано почуваюсь, у мене немає сили.
    error: сили
    correction: сил
    error_type: word
    options:
    - силу
    - сили
    - сил
    - силам
    explanation: Правильна ідіома з родовим відмінком множини — «немає сил» (немає
      енергії).
  - sentence: Я хочу купити великий шматок м'ясо.
    error: м'ясо
    correction: м'яса
    error_type: word
    options:
    - м'ясо
    - м'яса
    - м'ясу
    - м'ясом
    explanation: 'Частина від цілого (шматок) вимагає родового відмінка: шматок (чого?)
      м''яса.'
- type: translate
  instruction: Оберіть правильний переклад українською мовою.
  items:
  - source: I need medicine for a cough.
    options:
    - text: Мені потрібні ліки від кашлю.
      correct: true
    - text: Мені потрібні ліки для кашлю.
      correct: false
    - text: Я потребую ліки про кашель.
      correct: false
    - text: Мені треба ліки від кашель.
      correct: false
  - source: Give me a kilogram of tomatoes, please.
    options:
    - text: Дайте мені кілограм помідорів, будь ласка.
      correct: true
    - text: Дайте мені кілограм помідори, будь ласка.
      correct: false
    - text: Дайте мені кілограм помідор, будь ласка.
      correct: false
    - text: Дайте мені один кілограм помідором, будь ласка.
      correct: false
  - source: I feel nauseous.
    options:
    - text: Мене нудить.
      correct: true
    - text: Мені нудить.
      correct: false
    - text: Я нуджу.
      correct: false
    - text: У мене нудота.
      correct: false
  - source: Do you have something without a prescription?
    options:
    - text: У вас є щось без рецепта?
      correct: true
    - text: У вас є щось без рецепт?
      correct: false
    - text: Ви маєте щось не рецепт?
      correct: false
    - text: У вас є щось від рецепта?
      correct: false
  - source: My throat hurts from the cold.
    options:
    - text: У мене болить горло від холоду.
      correct: true
    - text: Моє горло болить від холод.
      correct: false
    - text: У мене болять горло від холоду.
      correct: false
    - text: Мене болить горло для холоду.
      correct: false
  - source: I do not have an appetite.
    options:
    - text: У мене немає апетиту.
      correct: true
    - text: Я не маю апетит.
      correct: false
    - text: У мене немає апетит.
      correct: false
    - text: Мені немає апетиту.
      correct: false
