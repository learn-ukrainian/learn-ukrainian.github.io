version: '1.0'
module: shopping-and-health
level: a2
inline:
- id: fill-in-market
  type: fill-in
  instruction: Вставте правильне слово (кількість або продукт у правильній формі).
  items:
  - sentence: Дайте мені, будь ласка, один ____ помідорів.
    answer: кілограм
    options:
    - кілограм
    - літр
    - пляшка
  - sentence: Мені потрібна одна ____ води.
    answer: пляшка
    options:
    - пляшка
    - пачка
    - склянка
  - sentence: Зважте, будь ласка, півкіло ____.
    answer: яблук
    options:
    - яблука
    - яблук
    - яблуках
  - sentence: Вона купила в магазині десяток ____.
    answer: яєць
    options:
    - яйця
    - яєць
    - яйцями
  - sentence: Відріжте мені невеликий ____ сиру.
    answer: шматок
    options:
    - шматок
    - пляшка
    - літр
  - sentence: Мені потрібен один літр ____.
    answer: молока
    options:
    - молоко
    - молока
    - молоком
  - sentence: Дайте ще одну пачку ____.
    answer: солі
    options:
    - сіль
    - солі
    - сіллю
  - sentence: Я хочу випити одну ____ соку.
    answer: склянку
    options:
    - шматок
    - склянку
    - скибку
- id: quiz-symptoms
  type: quiz
  instruction: Оберіть правильну форму слова для скарг і ліків.
  items:
  - question: У мене немає ...
    options:
    - температура
    - температуру
    - температури
    - температурою
    correct: 2
  - question: Дайте таблетки від головного ...
    options:
    - біль
    - болю
    - болем
    - болі
    correct: 1
  - question: Він п'є сироп від ...
    options:
    - кашель
    - кашлю
    - кашлем
    - кашлі
    correct: 1
  - question: У пацієнта немає ...
    options:
    - апетит
    - апетиту
    - апетитом
    - апетиті
    correct: 1
  - question: Лікар радить пити багато ...
    options:
    - вода
    - воду
    - водою
    - води
    correct: 3
  - question: Мої руки болять від ...
    options:
    - холод
    - холоду
    - холодом
    - холоді
    correct: 1
  - question: У дитини немає ...
    options:
    - алергія
    - алергію
    - алергії
    - алергією
    correct: 2
  - question: Я щоранку п'ю каву без ...
    options:
    - цукор
    - цукру
    - цукром
    - цукрі
    correct: 1
- id: match-up-remedies
  type: match-up
  instruction: З'єднайте проблему зі здоров'ям та ліки або пораду.
  pairs:
  - left: сильний кашель
    right: сироп від кашлю
  - left: головний біль
    right: таблетки від головного болю
  - left: закладений ніс
    right: краплі від нежиті
  - left: біль у горлі
    right: спрей від болю у горлі
  - left: почервоніння на шкірі
    right: крем від опіків
  - left: алергія на пил
    right: ліки від алергії
  - left: сильна втома
    right: більше відпочинку
  - left: слабкий імунітет
    right: багато вітамінів
- id: true-false-genitive
  type: true-false
  instruction: Правда чи ні? Чи правильно вжито форму слова в реченні?
  items:
  - statement: Дайте мені кілограм помідори.
    correct: false
    explanation: 'Після слова «кілограм» потрібен родовий відмінок множини: кілограм
      помідорів.'
  - statement: У мене зовсім немає температури.
    correct: true
    explanation: Після слова «немає» завжди використовується родовий відмінок.
  - statement: Я хочу купити літр молока.
    correct: true
    explanation: 'Після міри об''єму (літр) використовується родовий відмінок: молока.'
  - statement: Мені потрібні таблетки від головний біль.
    correct: false
    explanation: 'Після прийменника «від» потрібен родовий відмінок: від головного
      болю.'
  - statement: Він щодня п'є каву без цукру.
    correct: true
    explanation: Прийменник «без» завжди вимагає родового відмінка.
  - statement: Я візьму один десяток яйця.
    correct: false
    explanation: 'Після слова «десяток» потрібен родовий відмінок множини: десяток
      яєць.'
  - statement: Дайте сироп від кашлю.
    correct: true
    explanation: 'Після прийменника «від» потрібен родовий відмінок: від кашлю.'
  - statement: Мої руки болять від холод.
    correct: false
    explanation: 'Після прийменника «від» (який вказує на причину) потрібен родовий
      відмінок: від холоду.'
workbook:
- id: group-sort-cases
  type: group-sort
  instruction: Розподіліть слова за відмінками.
  groups:
  - label: 'Називний відмінок (Nominative: хто? що?)'
    items:
    - яблуко
    - вода
    - цукор
    - температура
    - кашель
    - біль
  - label: 'Родовий відмінок (Genitive: кого? чого?)'
    items:
    - яблук
    - води
    - цукру
    - температури
    - кашлю
    - болю
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку у відмінку слова.
  items:
  - sentence: Скільки коштує кілограм яблука?
    error: яблука
    correction: яблук
    error_type: word
    options:
    - яблуко
    - яблук
    - яблуках
    explanation: 'Після «кілограм» використовується родовий відмінок множини: кілограм
      яблук.'
  - sentence: У пацієнта немає апетит.
    error: апетит
    correction: апетиту
    error_type: word
    options:
    - апетиту
    - апетиті
    - апетитом
    explanation: Слово «немає» завжди вимагає родового відмінка (чого? — апетиту).
  - sentence: Дайте мені пляшку вода.
    error: вода
    correction: води
    error_type: word
    options:
    - води
    - воду
    - водою
    explanation: Після слова «пляшка» потрібен родовий відмінок (чого? — води).
  - sentence: Я приймаю ліки після сніданок.
    error: сніданок
    correction: сніданку
    error_type: word
    options:
    - сніданку
    - сніданком
    - сніданкові
    explanation: Прийменник «після» вимагає родового відмінка.
  - sentence: Лікар порадив пити багато вода.
    error: вода
    correction: води
    error_type: word
    options:
    - води
    - воду
    - водою
    explanation: Після слова «багато» використовується родовий відмінок (багато води).
  - sentence: Дайте сироп від кашель.
    error: кашель
    correction: кашлю
    error_type: word
    options:
    - кашлю
    - кашлем
    - кашлі
    explanation: Прийменник «від» завжди вимагає родового відмінка (від кашлю).
