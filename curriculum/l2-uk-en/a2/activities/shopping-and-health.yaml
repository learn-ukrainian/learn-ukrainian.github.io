- id: match-up-match-health-problems-to-their-remedies
  type: match-up
  instruction: З'єднайте скаргу з рішенням
  pairs:
  - left: У мене кашель.
    right: Ось ліки від кашлю.
  - left: У мене нежить.
    right: Ось краплі від нежиті.
  - left: У мене болить голова.
    right: Ось таблетки від болю.
  - left: Я хочу бути здоровим.
    right: Ось вітаміни для здоров'я.
  - left: Мене нудить.
    right: Вам треба пити воду.
  - left: У мене болить горло.
    right: Пийте багато теплої води.
  - left: Я хочу спати.
    right: Вам треба більше відпочивати.
  - left: Мені погано.
    right: Вам треба йти до лікаря.
- id: true-false-judge-whether-shopping-and-health-phrases-use-the-genitive-correctly
  type: true-false
  instruction: Правда чи ні? Чи правильно використано родовий відмінок?
  items:
  - statement: 'Правильно казати: «кілограм яблука».'
    correct: false
    explanation: 'Яблука — це однина. Треба використовувати множину: кілограм яблук.'
  - statement: 'Правильно казати: «від головного болю».'
    correct: true
    explanation: Слово «біль» чоловічого роду, родовий відмінок має закінчення «-ю».
  - statement: 'Правильно казати: «у мене немає температура».'
    correct: false
    explanation: 'Слово «немає» вимагає родового відмінка: немає температури.'
  - statement: 'Правильно казати: «таблетки від кашлю».'
    correct: true
    explanation: Прийменник «від» вимагає родового відмінка.
  - statement: 'Правильно казати: «літр молока».'
    correct: true
    explanation: Молоко в родовому відмінку — молока.
  - statement: 'Правильно казати: «десяток яйця».'
    correct: false
    explanation: 'Треба використовувати родовий відмінок множини: десяток яєць.'
  - statement: 'Правильно казати: «краплі від нежиті».'
    correct: true
    explanation: Нежить у родовому відмінку — нежиті (або нежитю).
  - statement: 'Правильно казати: «ці ліки продаються без рецепта».'
    correct: true
    explanation: Прийменник «без» вимагає родового відмінка.
workbook:
- id: error-correction-shopping-genitive
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Дайте мені один кілограм помідори.
    error: помідори
    correction: помідорів
    error_type: word
    options:
    - помідорів
    - помідора
    - помідору
    explanation: Слово «кілограм» вимагає родового відмінка множини (помідорів).
  - sentence: Мені потрібен десяток яйця.
    error: яйця
    correction: яєць
    error_type: word
    options:
    - яєць
    - яйців
    - яйцю
    explanation: Десяток чого? Яєць (родовий відмінок множини).
  - sentence: Ця пляшка вода коштує сорок гривень.
    error: вода
    correction: води
    error_type: word
    options:
    - води
    - воду
    - водою
    explanation: Пляшка чого? Води (родовий відмінок однини).
  - sentence: Я взяв пів літра молоко.
    error: молоко
    correction: молока
    error_type: word
    options:
    - молока
    - молоку
    - молоком
    explanation: Пів літра чого? Молока (родовий відмінок).
  - sentence: Ми купили п'ять кілограми картоплі.
    error: кілограми
    correction: кілограмів
    error_type: word
    options:
    - кілограмів
    - кілограм
    - кілограму
    explanation: Після числа 5 використовуємо родовий відмінок множини (кілограмів).
  - sentence: Мені треба шматок хліб.
    error: хліб
    correction: хліба
    error_type: word
    options:
    - хліба
    - хлібу
    - хлібом
    explanation: Шматок чого? Хліба.
  - sentence: У мене немає апетит.
    error: апетит
    correction: апетиту
    error_type: word
    options:
    - апетиту
    - апетита
    - апетитом
    explanation: Слово «немає» вимагає родового відмінка (апетиту).
  - sentence: Ми п'ємо чай без цукор.
    error: цукор
    correction: цукру
    error_type: word
    options:
    - цукру
    - цукра
    - цукром
    explanation: Прийменник «без» вимагає родового відмінка (цукру).
- id: error-correction-health-phrases
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: У мене болять голова.
    error: болять
    correction: болить
    error_type: word
    options:
    - болить
    - боліла
    - болів
    explanation: Голова — це однина, тому дієслово має бути в однині (болить).
  - sentence: Моєму брату поганий.
    error: поганий
    correction: погано
    error_type: word
    options:
    - погано
    - погане
    - погана
    explanation: Для опису стану ми використовуємо прислівник (погано).
  - sentence: Лікар каже, що у мене немає температурою.
    error: температурою
    correction: температури
    error_type: word
    options:
    - температури
    - температура
    - температуру
    explanation: Після слова «немає» потрібен родовий відмінок (температури).
  - sentence: Ми купили краплі від нежить.
    error: нежить
    correction: нежиті
    error_type: word
    options:
    - нежиті
    - нежитю
    - нежиттю
    explanation: Прийменник «від» вимагає родового відмінка (нежиті або нежитю).
  - sentence: Мені нудить від цього запаху.
    error: Мені
    correction: Мене
    error_type: word
    options:
    - Мене
    - Я
    - Мною
    explanation: З дієсловом «нудить» використовується знахідний відмінок (Мене нудить).
  - sentence: У мене болить очі від комп'ютера.
    error: болить
    correction: болять
    error_type: word
    options:
    - болять
    - боліло
    - боліли
    explanation: Очі — це множина, тому дієслово має бути в множині (болять).
  - sentence: Я випив таблетку від кашлем.
    error: кашлем
    correction: кашлю
    error_type: word
    options:
    - кашлю
    - кашля
    - кашель
    explanation: Прийменник «від» вимагає родового відмінка (від кашлю).
  - sentence: Ці ліки продаються без рецепт.
    error: рецепт
    correction: рецепта
    error_type: word
    options:
    - рецепта
    - рецепту
    - рецептом
    explanation: Прийменник «без» вимагає родового відмінка (рецепта).
