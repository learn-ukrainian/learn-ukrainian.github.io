    / Put the words in the correct neutral order.
  items:
  - words:
    - книгу.
    - читає
    - Студент
    correct_order:
    - Студент
    - читає
    - книгу.
  - words:
    - вчора.
    - ходили
    - Ми
    - в
    - кіно
    correct_order:
    - Ми
    - ходили
    - в
    - кіно
    - вчора.
  - words:
    - це
    - нова
    - тема.
    - Для
    - мене
    correct_order:
    - Для
    - мене
    - це
    - нова
    - тема.
  - words:
    - закінчення.
    - має
