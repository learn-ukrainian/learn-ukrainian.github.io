version: '1.0'
module: word-order-emphasis
level: a2
inline:
- id: quiz-identify-rheme
  type: quiz
  instruction: Визначте рему (нову інформацію) в реченні
  items:
  - question: '— Хто купив книгу?

      — Книгу купив Тарас. (Що тут рема?)'
    options:
    - Книгу
    - купив
    - Тарас
    - Книгу купив
    correct: 2
  - question: '— Що купив Тарас?

      — Тарас купив книгу. (Що тут рема?)'
    options:
    - Тарас
    - купив
    - книгу
    - Тарас купив
    correct: 2
  - question: '— Хто помив посуд?

      — Посуд помила Оленка. (Що тут рема?)'
    options:
    - Посуд
    - помила
    - Оленка
    - Посуд помила
    correct: 2
  - question: '— Що робить студент?

      — Студент читає текст. (Що тут рема?)'
    options:
    - Студент
    - читає
    - текст
    - Студент читає
    correct: 2
  - question: '— Коли ти був удома?

      — Я був удома вчора. (Що тут рема?)'
    options:
    - Я
    - був
    - удома
    - вчора
    correct: 3
  - question: '— Де ти був учора?

      — Вчора я був удома. (Що тут рема?)'
    options:
    - Вчора
    - я
    - був
    - удома
    correct: 3
  - question: '— Що готує мама?

      — Мама готує вечерю. (Що тут рема?)'
    options:
    - Мама
    - готує
    - вечерю
    - Мама готує
    correct: 2
  - question: '— Хто готує вечерю?

      — Вечерю готує мама. (Що тут рема?)'
    options:
    - Вечерю
    - готує
    - мама
    - Вечерю готує
    correct: 2
- id: match-question-answer
  type: match-up
  instruction: З'єднайте питання та правильну відповідь
  pairs:
  - left: Хто купив каву?
    right: Каву купив я.
  - left: Що ти купив?
    right: Я купив каву.
  - left: Де йде дощ?
    right: Дощ іде в Києві.
  - left: Що йде в Києві?
    right: У Києві йде дощ.
  - left: Хто помив посуд?
    right: Посуд помив Тарас.
  - left: Що помив Тарас?
    right: Тарас помив посуд.
  - left: Хто був удома?
    right: Удома був Максим.
  - left: Де був Максим?
    right: Максим був удома.
- id: group-sort-neutral-marked
  type: group-sort
  instruction: Розподіліть речення на нейтральні та емфатичні (з акцентом)
  groups:
  - label: Нейтральний порядок
    items:
    - Студент читає текст.
    - Це велике місто.
    - Мама готує вечерю.
    - Вчора я був удома.
  - label: Емфатичний (маркований) порядок
    items:
    - Книгу я вже прочитав.
    - Місто — велике.
    - Прочитав я цю книгу!
    - Це Тарас мені допоміг.
workbook:
- type: quiz
  instruction: Де наголос? Оберіть слово з правильним наголосом
  items:
  - question: наголос
    options:
    - на́голос
    - наго́лос
    - наголо́с
    - наголо́си
    correct: 0
  - question: означення
    options:
    - озна́чення
    - о́значення
    - означе́ння
    - означенн́я
    correct: 0
  - question: підкреслювати
    options:
    - підкре́слювати
    - підкреслюва́ти
    - пі́дкреслювати
    - підкреслю́вати
    correct: 0
  - question: порядок
    options:
    - поря́док
    - по́рядок
    - порядо́к
    - поря́дку
    correct: 0
  - question: речення
    options:
    - ре́чення
    - рече́ння
    - реченн́я
    - ре́ченню
    correct: 0
  - question: емфатичний
    options:
    - емфати́чний
    - емфа́тичний
    - е́мфатичний
    - емфатични́й
    correct: 0
- type: odd-one-out
  instruction: 'Четверте зайве за наголосом: Оберіть слово з іншою моделлю наголосу'
  items:
  - words:
    - наголос
    - речення
    - місто
    - порядок
    correct: 3
    explanation: У слові 'порядок' наголос на другому складі (поря́док), в інших —
      на першому (на́голос, ре́чення, мі́сто).
  - words:
    - підлога
    - Оленка
    - кінець
    - вітер
    correct: 3
    explanation: У слові 'вітер' наголос на першому складі (ві́тер), в інших — на
      другому (підло́га, Оле́нка, кіне́ць).
  - words:
    - початок
    - студент
    - Тарас
    - наголос
    correct: 3
    explanation: У слові 'наголос' наголос на першому складі (на́голос), в інших —
      на останньому (поча́ток, студе́нт, Тара́с).
  - words:
    - нейтральний
    - означення
    - інверсія
    - емфатичний
    correct: 3
    explanation: У слові 'емфатичний' наголос на третьому складі (емфати́чний), в
      інших — на другому (нейтра́льний, озна́чення, інве́рсія).
  - words:
    - книга
    - посуд
    - дощ
    - Тарас
    correct: 3
    explanation: У слові 'Тарас' наголос на другому складі (Тара́с), в інших — на
      першому (кни́га, по́суд, дощ).
  - words:
    - читає
    - купив
    - помив
    - робить
    correct: 3
    explanation: У слові 'робить' наголос на першому складі (ро́бить), в інших — на
      другому (чита́є, купи́в, поми́в).
- type: quiz
  instruction: Яке число? Оберіть правильне значення фрази
  items:
  - question: Що означає фраза «кілометрів десять»?
    options:
    - приблизно 10 км
    - точно 10 км
    - більше 10 км
    - менше 10 км
    correct: 0
  - question: Що означає фраза «десять кілометрів»?
    options:
    - точно 10 км
    - приблизно 10 км
    - більше 10 км
    - менше 10 км
    correct: 0
  - question: Що означає фраза «років двадцять»?
    options:
    - приблизно 20 років
    - точно 20 років
    - більше 20 років
    - менше 20 років
    correct: 0
  - question: Що означає фраза «двадцять років»?
    options:
    - точно 20 років
    - приблизно 20 років
    - більше 20 років
    - менше 20 років
    correct: 0
  - question: Що означає фраза «годин п'ять»?
    options:
    - приблизно 5 годин
    - точно 5 годин
    - більше 5 годин
    - менше 5 годин
    correct: 0
  - question: Що означає фраза «п'ять годин»?
    options:
    - точно 5 годин
    - приблизно 5 годин
    - більше 5 годин
    - менше 5 годин
    correct: 0
- type: fill-in
  instruction: 'Напиши цифру словом: Впишіть правильний числівник для точного або
    приблизного значення'
  items:
  - sentence: Це точно 5 км. До центру _____ кілометрів.
    answer: п'ять
    options:
    - п'ять
    - приблизно
  - sentence: Це приблизно 5 км. До центру кілометрів _____.
    answer: п'ять
    options:
    - п'ять
    - приблизно
  - sentence: Це точно 10 км. До центру _____ кілометрів.
    answer: десять
    options:
    - десять
    - приблизно
  - sentence: Це приблизно 10 км. До центру кілометрів _____.
    answer: десять
    options:
    - десять
    - приблизно
  - sentence: Він працював рівно 8 годин. Він працював _____ годин.
    answer: вісім
    options:
    - вісім
    - приблизно
  - sentence: Він працював близько 8 годин. Він працював годин _____.
    answer: вісім
    options:
    - вісім
    - близько
- type: match-up
  instruction: 'Цифра → слово: З''єднайте конструкцію та її точне значення'
  pairs:
  - left: п'ять кілометрів
    right: рівно 5 км
  - left: кілометрів п'ять
    right: близько 5 км
  - left: два роки
    right: рівно 2 роки
  - left: роки два
    right: близько 2 років
  - left: сім годин
    right: рівно 7 годин
  - left: годин сім
    right: близько 7 годин
- type: match-up
  instruction: 'Займенник → значення: З''єднайте речення з його логічним акцентом'
  pairs:
  - left: Тобі я вірю.
    right: 'Контраст: я вірю тобі, а не комусь іншому'
  - left: Це Тарас мені допоміг.
    right: 'Фокус: саме Тарас, а не хтось інший'
  - left: Я був удома.
    right: 'Нейтрально: я повідомляю факт'
  - left: Удома був я.
    right: 'Фокус: саме я, а не мій брат'
  - left: Книгу я вже читав.
    right: 'Контраст: книгу читав, а фільм не дивився'
  - left: Я вже читав книгу.
    right: 'Нейтрально: я повідомляю про дію'
- type: fill-in
  instruction: Вставте займенник, який бере на себе логічний наголос
  items:
  - sentence: _____ я вірю, а йому — ні.
    answer: Тобі
    options:
    - Тобі
    - Ти
    - Тебе
  - sentence: Це _____ мені допоміг, а не брат.
    answer: він
    options:
    - він
    - його
    - йому
  - sentence: Не _____ ми бачили, а іншу людину.
    answer: її
    options:
    - її
    - вона
    - їй
  - sentence: Книгу прочитав _____, а не мій друг.
    answer: я
    options:
    - я
    - мені
    - мене
  - sentence: Саме _____ ми чекали цілу годину!
    answer: вас
    options:
    - вас
    - ви
    - вам
  - sentence: _____ я вже розповів цю історію.
    answer: їм
    options:
    - їм
    - вони
    - їх
- type: group-sort
  instruction: 'Однина чи множина?: Розподіліть займенники на однину та множину'
  groups:
  - label: Однина (Singular)
    items:
    - мені
    - тобі
    - його
    - її
  - label: Множина (Plural)
    items:
    - нас
    - вам
    - їх
    - ми
- type: quiz
  instruction: 'Ти чи Ви?: Оберіть правильну форму звертання (неформальне чи ввічливе)'
  items:
  - question: — Пане професоре, _____ я дуже поважаю!
    options:
    - вас
    - тебе
    - їх
    - його
    correct: 0
  - question: — Оленко, _____ я завжди вірю!
    options:
    - тобі
    - вам
    - їм
    - їй
    correct: 0
  - question: — Друже, цю книгу я дав _____.
    options:
    - тобі
    - вам
    - йому
    - їй
    correct: 0
  - question: — Шановні гості, це _____ я сьогодні чекав.
    options:
    - вас
    - тебе
    - їх
    - його
    correct: 0
  - question: — Мамо, _____ я люблю найбільше.
    options:
    - тебе
    - вас
    - її
    - їх
    correct: 0
  - question: — Пані Маріє, _____ я довіряю цей проект.
    options:
    - вам
    - тобі
    - їм
    - їй
    correct: 0
- type: match-up
  instruction: 'Слово → переклад: З''єднайте лінгвістичні терміни'
  pairs:
  - left: тема
    right: theme (known info)
  - left: рема
    right: rheme (new info)
  - left: наголос
    right: emphasis, stress
  - left: інверсія
    right: inversion
  - left: контраст
    right: contrast
  - left: речення
    right: sentence
  - left: порядок
    right: order
- type: fill-in
  instruction: Вставте слово за контекстом
  items:
  - sentence: Українське _____ має вільний порядок слів.
    answer: речення
    options:
    - речення
    - слово
    - текст
  - sentence: Нова інформація називається _____.
    answer: рема
    options:
    - рема
    - тема
    - інверсія
  - sentence: Відома інформація називається _____.
    answer: тема
    options:
    - тема
    - рема
    - акцент
  - sentence: Зміна порядку слів називається _____.
    answer: інверсія
    options:
    - інверсія
    - наголос
    - початок
  - sentence: Ми використовуємо інтонацію, щоб зробити логічний _____.
    answer: наголос
    options:
    - наголос
    - порядок
    - кінець
  - sentence: Інверсія допомагає створити сильний _____.
    answer: контраст
    options:
    - контраст
    - означення
    - посуд
- type: odd-one-out
  instruction: 'Четверте зайве: Оберіть слово, що не належить до групи'
  items:
  - words:
    - речення
    - слово
    - текст
    - вітер
    correct: 3
    explanation: Вітер — це явище природи, решта — лінгвістичні поняття.
  - words:
    - тема
    - рема
    - посуд
    - інверсія
    correct: 2
    explanation: Посуд — це кухонні речі, решта — граматичні терміни.
  - words:
    - контраст
    - місто
    - акцент
    - наголос
    correct: 1
    explanation: Місто — це локація, решта стосується виділення інформації.
  - words:
    - нейтральний
    - емфатичний
    - сильний
    - підлога
    correct: 3
    explanation: Підлога — це іменник (частина кімнати), решта — прикметники.
  - words:
    - виділяти
    - підкреслювати
    - робити акцент
    - читати
    correct: 3
    explanation: Читати — це загальна дія, решта — синоніми до 'робити наголос'.
  - words:
    - місто
    - парк
    - ліс
    - контраст
    correct: 3
    explanation: Контраст — це абстрактне поняття, решта — локації.
- type: translate
  instruction: Оберіть правильний переклад термінів
  items:
  - source: word order
    options:
    - text: порядок слів
      correct: true
    - text: слово порядок
      correct: false
    - text: порядок речення
      correct: false
    - text: вільне слово
      correct: false
  - source: sentence
    options:
    - text: речення
      correct: true
    - text: слово
      correct: false
    - text: текст
      correct: false
    - text: наголос
      correct: false
  - source: emphasis
    options:
    - text: наголос
      correct: true
    - text: рема
      correct: false
    - text: тема
      correct: false
    - text: означення
      correct: false
  - source: neutral order
    options:
    - text: нейтральний порядок
      correct: true
    - text: прямий порядок
      correct: false
    - text: емфатичний акцент
      correct: false
    - text: новий наголос
      correct: false
  - source: inversion
    options:
    - text: інверсія
      correct: true
    - text: контраст
      correct: false
    - text: наголос
      correct: false
    - text: рема
      correct: false
  - source: new information
    options:
    - text: рема
      correct: true
    - text: тема
      correct: false
    - text: початок
      correct: false
    - text: порядок
      correct: false
- type: true-false
  instruction: 'Правда чи ні?: Перевірте, як ви зрозуміли правила'
  items:
  - statement: В українській мові порядок слів завжди фіксований, як в англійській.
    correct: false
    explanation: Порядок слів в українській мові вільний і залежить від емоцій та
      логіки.
  - statement: Рема (нова інформація) зазвичай стоїть наприкінці речення.
    correct: true
    explanation: Українське речення зазвичай рухається від відомого до нового.
  - statement: Тема — це інформація, яку співрозмовник уже знає.
    correct: true
    explanation: Так, тема служить ґрунтом для нової інформації.
  - statement: Фраза «п'ять кілометрів» означає приблизну відстань.
    correct: false
    explanation: Це точна відстань. Для приблизної ми кажемо «кілометрів п'ять».
  - statement: Ми використовуємо інверсію, щоб зробити акцент на слові.
    correct: true
    explanation: Зміна порядку слів — найкращий спосіб створити емфатичний акцент.
  - statement: Прикметник завжди стоїть після іменника в нейтральному реченні.
    correct: false
    explanation: У нейтральному реченні прикметник стоїть перед іменником (велике
      місто).
- type: quiz
  instruction: 'Відповідь на запитання: Оберіть правильне твердження за текстом'
  items:
  - question: Де зазвичай стоїть найважливіша (нова) інформація в українському реченні?
    options:
    - Наприкінці
    - На початку
    - В середині
    - Перед дієсловом
    correct: 0
  - question: Як українці виділяють слово голосом?
    options:
    - Роблять логічний наголос
    - Говорять дуже тихо
    - Повторюють слово двічі
    - Говорять дуже швидко
    correct: 0
  - question: Що означає фраза «Місто — велике»?
    options:
    - Акцент на розмірі міста
    - Це нейтральний опис
    - Це просто констатація факту
    - Це питання про місто
    correct: 0
  - question: Який порядок слів є базовим (нейтральним)?
    options:
    - Підмет, присудок, додаток
    - Додаток, підмет, присудок
    - Присудок, додаток, підмет
    - Присудок, підмет, додаток
    correct: 0
  - question: Для чого часто використовують конструкцію «не..., а...» (наприклад,
      «не в парку, а в лісі»)?
    options:
    - Для виправлення помилки
    - Для констатації факту
    - Для нейтрального опису
    - Для введення нового героя
    correct: 0
  - question: Як найкраще представити нового героя або подію в розповіді?
    options:
