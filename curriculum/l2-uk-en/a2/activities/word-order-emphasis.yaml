  items:
  - sentence: Це ____.
    answer: тихий світанок
    options:
    - тихий світанок
    - світанок тихий
  - sentence: Там лежить ____.
    answer: нова книга
    options:
    - нова книга
    - книга нова
  - sentence: Сьогодні ____.
    answer: теплий день
    options:
    - теплий день
    - день теплий
  - sentence: Я дивлюся ____.
    answer: цікавий фільм
    options:
    - цікавий фільм
    - фільм цікавий
  - sentence: Це ____.
    answer: гарна дівчина
    options:
    - гарна дівчина
    - дівчина гарна
  - sentence: Він ____.
    answer: розумний студент
    options:
    - розумний студент
    - студент розумний
  - sentence: Ми відвідали ____.
    answer: велике місто
    options:
    - велике місто
    - місто велике
  - sentence: Це дуже ____.
    answer: складна робота
    options:
    - складна робота
    - робота складна
- id: quiz-theme-rheme
  type: quiz
  instruction: Дайте відповідь на запитання про структуру речення. / Answer the question
    about sentence structure.
  items:
  - question: Що таке 'тема' в українському реченні?
    options:
    - Відома інформація
    - Нова інформація
    - Головне дієслово
    - Останнє слово
    correct: 0
  - question: Що таке 'рема'?
    options:
    - Нова важлива інформація
    - Відома інформація
    - Перше слово в реченні
    - Тільки прикметник
    correct: 0
  - question: Де зазвичай стоїть рема в нейтральному реченні?
    options:
    - У кінці
    - На початку
    - Перед дієсловом
    - Вона не має місця
    correct: 0
  - question: Який порядок слів у реченні «Студент читає книгу»?
    options:
    - Прямий (нейтральний)
    - Інверсія (непрямий)
    - Емфатичний
    - Неправильний
    correct: 0
  - question: Що означає слово 'інверсія'?
    options:
    - Зворотний порядок слів
    - Прямий порядок слів
    - Відсутність дієслова
    - Тільки питання
    correct: 0
  - question: 'Що робить слово ''Це'' на початку речення (наприклад: Це Тарас)?'
    options:
    - Чітко виділяє головну особу
    - Робить речення нейтральним
    - Показує час дії
    - Замінює дієслово
    correct: 0
  - question: Як найкраще відповісти на питання «Що ти купив?»
    options:
    - Я купив каву.
    - Каву купив я.
    - Купив я каву.
    - Я каву купив.
    correct: 0
  - question: Як найкраще відповісти на питання «Хто купив каву?»
    options:
    - Каву купив я.
    - Я купив каву.
    - Купив каву я.
    - Каву я купив.
    correct: 0
- id: match-up-vocab
  type: match-up
  instruction: З'єднайте українське слово з його перекладом. / Match the Ukrainian
    word with its English translation.
  pairs:
  - left: речення
    right: sentence
  - left: наголос
    right: stress, emphasis
  - left: порядок
    right: order
  - left: кінець
    right: end
  - left: початок
    right: beginning
  - left: контраст
    right: contrast
  - left: підкреслювати
    right: to emphasize
  - left: означення
    right: attribute, modifier
