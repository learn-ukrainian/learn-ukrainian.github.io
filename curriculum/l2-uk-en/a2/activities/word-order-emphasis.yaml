    - допомагає
    - розуміти
    - речення.
  - words:
    - Цей
    - робить
    - контраст.
    - порядок
    correct_order:
    - Цей
    - порядок
    - робить
    - контраст.
- id: translate-emphasis
  type: translate
  instruction: Оберіть правильний переклад, звертаючи увагу на акцент. / Choose the
    correct translation, paying attention to the emphasis.
  items:
  - source: It was Taras who bought the book.
    options:
    - text: Книгу купив Тарас.
      correct: true
    - text: Тарас купив книгу.
      correct: false
  - source: Taras bought the BOOK (not something else).
    options:
    - text: Тарас купив книгу.
      correct: true
    - text: Книгу купив Тарас.
      correct: false
  - source: As for the movie, Sentsov directed it.
    options:
    - text: Цей фільм зняв Сенцов.
      correct: true
    - text: Сенцов зняв цей фільм.
      correct: false
  - source: Sentsov directed this movie (neutral).
    options:
    - text: Сенцов зняв цей фільм.
      correct: true
    - text: Цей фільм зняв Сенцов.
      correct: false
  - source: I DID read this book!
    options:
    - text: Прочитав я цю книгу!
      correct: true
    - text: Я прочитав цю книгу.
      correct: false
  - source: A heavy downpour BEGAN.
    options:
    - text: Почалася сильна злива.
      correct: true
    - text: Сильна злива почалася.
      correct: false
  - source: It was NOT Sentsov who directed it, but Loznitsa.
    options:
    - text: Цей фільм зняв не Сенцов, а Лозниця.
      correct: true
    - text: Не Сенцов, а Лозниця зняв цей фільм.
      correct: false
  - source: It is Taras who helped me.
    options:
    - text: Це Тарас допоміг мені.
      correct: true
    - text: Тарас допоміг мені.
      correct: false
- id: true-false-word-order
  type: true-false
  instruction: Правда чи ні? / True or false?
  items:
  - statement: В українській мові порядок слів абсолютно вільний і нічого не означає.
    correct: false
    explanation: Порядок слів впливає на зміст і логічний наголос.
  - statement: Нова інформація (рема) зазвичай стоїть у кінці речення.
    correct: true
    explanation: Головна новина завжди звучить останньою.
  - statement: Тема — це відома інформація, яка зазвичай починає речення.
    correct: true
    explanation: Тема готує контекст для нової інформації.
  - statement: Інверсія (непрямий порядок) використовується для емоцій та контрасту.
    correct: true
    explanation: Зміна порядку слів додає емоцій у розмову.
  - statement: Речення «Мама любить доньку» і «Доньку любить мама» мають однаковий
      акцент.
    correct: false
    explanation: Вони мають однаковий граматичний зміст, але різний логічний наголос.
  - statement: Частка «це» на початку речення допомагає виділити головну особу.
    correct: true
    explanation: 'Наприклад: «Це Тарас допоміг мені» чітко вказує на Тараса.'
  - statement: 'У прямому порядку слів прикметник стоїть після іменника (наприклад:
      світанок тихий).'
    correct: false
    explanation: 'Прикметник стоїть перед іменником (наприклад: тихий світанок).'
  - statement: Дієслово на початку речення часто використовується для сильних емоцій
      або початку історії.
    correct: true
    explanation: 'Наприклад: «Прочитав я книгу!» або «Почалася злива».'
- id: fill-in-vocab
  type: fill-in
  instruction: Вставте правильне слово. / Fill in the correct word.
  items:
  - sentence: Українська мова має вільний ____ слів.
    answer: порядок
    options:
    - порядок
    - наголос
    - акцент
  - sentence: Відома інформація називається ____.
    answer: тема
    options:
    - тема
    - рема
    - інверсія
  - sentence: Нова і важлива інформація — це ____.
    answer: рема
    options:
    - рема
    - тема
    - порядок
  - sentence: Рема зазвичай іде в самий ____ речення.
    answer: кінець
    options:
    - кінець
    - початок
    - центр
  - sentence: Коли ми змінюємо порядок слів для емоцій, це ____.
    answer: інверсія
    options:
    - інверсія
    - рема
    - тема
  - sentence: Останнє слово в реченні отримує логічний ____.
    answer: наголос
    options:
    - наголос
    - початок
    - кінець
  - sentence: Ми використовуємо інверсію, щоб створити сильний ____.
    answer: контраст
    options:
    - контраст
    - порядок
    - речення
  - sentence: Слово «це» допомагає нам ____ головну особу.
    answer: виділяти
    options:
    - виділяти
    - читати
    - розуміти
- id: odd-one-out-emphasis
  type: odd-one-out
  instruction: Оберіть слово, яке не підходить за змістом. / Choose the odd word out.
  items:
  - words:
    - тема
    - рема
    - підмет
    - стіл
    correct: 3
    explanation: Стіл — це меблі, інші слова — лінгвістичні терміни.
  - words:
    - початок
    - кінець
    - середина
    - книга
    correct: 3
    explanation: Книга — це предмет, інші — частини чогось.
  - words:
    - нейтральний
    - емфатичний
    - прямий
    - смачний
    correct: 3
    explanation: Смачний — описує їжу, інші описують порядок слів.
  - words:
    - наголос
    - акцент
    - виділення
    - вікно
    correct: 3
    explanation: Вікно — предмет, інші слова пов'язані з виділенням.
  - words:
    - інверсія
    - контраст
    - емоція
    - молоко
    correct: 3
    explanation: Молоко — напій, інші слова — лінгвістичні поняття.
  - words:
    - виділяти
    - підкреслювати
    - акцентувати
    - спати
    correct: 3
    explanation: Спати — фізична дія, інші означають робити логічний наголос.
  - words:
    - порядок
    - структура
    - будова
    - яблуко
    correct: 3
    explanation: Яблуко — фрукт, інші слова означають організацію.
  - words:
    - речення
    - фраза
    - текст
    - кіт
    correct: 3
    explanation: Кіт — тварина, інші — елементи мови.
- id: fill-in-adjectives
  type: fill-in
  instruction: Оберіть нейтральний порядок слів для означення. / Choose the neutral
