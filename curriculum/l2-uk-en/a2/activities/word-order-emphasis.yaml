version: '1.0'
module: word-order-emphasis
level: a2
inline:
- id: quiz-identify-rheme
  type: quiz
  instruction: Оберіть рему (нову інформацію) у відповіді. / Choose the rheme (new
    information) in the answer.
  items:
  - question: 'Питання: Хто купив книгу? Відповідь: Книгу купив Тарас. Яке слово є
      ремою?'
    options:
    - Тарас
    - купив
    - книгу
    - Книгу купив
    correct: 0
  - question: 'Питання: Що купив Тарас? Відповідь: Тарас купив книгу. Яке слово є
      ремою?'
    options:
    - книгу
    - Тарас
    - купив
    - Тарас купив
    correct: 0
  - question: 'Питання: Де він працює? Відповідь: Він працює в школі. Яке слово є
      ремою?'
    options:
    - в школі
    - Він
    - працює
    - Він працює
    correct: 0
  - question: 'Питання: Коли приїхав брат? Відповідь: Брат приїхав учора. Яке слово
      є ремою?'
    options:
    - учора
    - Брат
    - приїхав
    - Брат приїхав
    correct: 0
  - question: 'Питання: Хто приїхав учора? Відповідь: Учора приїхав брат. Яке слово
      є ремою?'
    options:
    - брат
    - Учора
    - приїхав
    - Учора приїхав
    correct: 0
  - question: 'Питання: Що робить студент? Відповідь: Студент читає. Яке слово є ремою?'
    options:
    - читає
    - Студент
    - робить
    - Що
    correct: 0
  - question: 'Питання: Хто читає книгу? Відповідь: Книгу читає студент. Яке слово
      є ремою?'
    options:
    - студент
    - Книгу
    - читає
    - читає книгу
    correct: 0
  - question: 'Питання: Який це фільм? Відповідь: Це цікавий фільм. Яке слово є ремою?'
    options:
    - цікавий фільм
    - Це
    - фільм
    - Який
    correct: 0
- id: group-sort-neutral-emphatic
  type: group-sort
  instruction: Розподіліть речення за порядком слів. / Sort the sentences by word
    order.
  groups:
  - label: Нейтральний (Neutral)
    items:
    - Тарас купив книгу.
    - Студент читає текст.
    - Вчора ми ходили в кіно.
    - Нова книга лежить на столі.
  - label: Емфатичний (Emphatic/Inversion)
    items:
    - Книгу купив Тарас.
    - Прочитав я цю книгу!
    - Це Тарас допоміг мені.
    - Не Сенцов зняв фільм, а Лозниця.
- id: fill-in-reorder-emphasis
  type: fill-in
  instruction: Вставте нову інформацію (рему) в кінець речення. / Put the new information
    (rheme) at the end of the sentence.
  items:
  - sentence: — Хто написав лист? — Лист написав ____.
    answer: брат
    options:
    - брат
    - написав
    - він
  - sentence: — Що написав брат? — Брат написав ____.
    answer: лист
    options:
    - лист
    - брат
    - писати
  - sentence: — Де ти був? — Я був ____.
    answer: вдома
    options:
    - вдома
    - я
    - бути
  - sentence: — Хто був вдома? — Вдома був ____.
    answer: я
    options:
    - я
    - вдома
    - ми
  - sentence: — Коли ми зустрінемося? — Ми зустрінемося ____.
    answer: завтра
    options:
    - завтра
    - ми
    - зустріч
  - sentence: — Хто зустрінеться завтра? — Завтра зустрінемося ____.
    answer: ми
    options:
    - ми
    - завтра
    - ви
  - sentence: — Що вона читає? — Вона читає ____.
    answer: журнал
    options:
    - журнал
    - вона
    - книга
  - sentence: — Хто читає журнал? — Журнал читає ____.
    answer: вона
    options:
    - вона
    - журнал
    - читає
- id: match-up-questions-answers
  type: match-up
  instruction: З'єднайте питання з правильною відповіддю. / Match the question with
    the correct answer.
  pairs:
  - left: Хто помив посуд?
    right: Посуд помив Тарас.
  - left: Що помив Тарас?
    right: Тарас помив посуд.
  - left: Коли приїхав Олег?
    right: Олег приїхав учора.
  - left: Хто приїхав учора?
    right: Учора приїхав Олег.
  - left: Де лежить книга?
    right: Книга лежить на столі.
  - left: Що лежить на столі?
    right: На столі лежить книга.
  - left: Хто написав цей текст?
    right: Цей текст написала Марія.
  - left: Що написала Марія?
    right: Марія написала цей текст.
workbook:
- id: unjumble-sentences
  type: unjumble
