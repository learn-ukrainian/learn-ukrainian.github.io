- type: error-correction
  title: 'Виправте помилки: типові проблеми'
  instruction: Знайдіть та виправте граматичну помилку в кожному реченні.
  items:
  - sentence: Це самий великий будинок на нашій вулиці.
    error: самий великий
    answer: найбільший
    options:
    - найбільший
    - дуже великий
    - великий
    - більший
    explanation: 'В українській мові не використовують слово самий для утворення найвищого
      ступеня. Правильно: найбільший.'
  - sentence: Вона сама краща студентка.
    error: сама краща
    answer: найкраща
    options:
    - найкраща
    - дуже краща
    - краща
    - краще
    explanation: 'Слово самий є калькою з російської. Правильно використовувати: найкраща.'
  - sentence: Це найбільш цікавіший фільм року.
    error: найбільш цікавіший
    answer: найбільш цікавий
    options:
    - найбільш цікавий
    - дуже цікавіший
    - самий цікавий
    - цікавіший
    explanation: 'Не можна поєднувати аналітичну форму найбільш із синтетичною цікавіший.
      Правильно: найбільш цікавий або найцікавіший.'
  - sentence: Мій брат самий розумний у школі.
    error: самий розумний
    answer: найрозумніший
    options:
    - найрозумніший
    - дуже розумний
    - найбільш розумніший
    - розумніший
    explanation: 'Уникайте слова самий. Додавайте префікс най- до вищого ступеня:
      найрозумніший.'
  - sentence: Це самий найгірший варіант.
    error: самий найгірший
    answer: найгірший
    options:
    - найгірший
    - дуже найгірший
    - більш найгірший
    - найгірший варіант
    explanation: Слово найгірший вже має найвищий ступінь, додавати самий є помилкою.
  - sentence: Він вибрав найбільш найбезпечніший шлях.
    error: найбільш найбезпечніший
    answer: найбільш безпечний
    options:
    - найбільш безпечний
    - самий безпечний
    - безпечніший
    - найбезпечніший шлях
    explanation: Після слова найбільш прикметник має стояти у початковій формі.
  - sentence: Це сама глибока станція.
    error: сама глибока
    answer: найглибша
    options:
    - найглибша
    - глибша
    - дуже глибока
    - більш глибока
    explanation: 'Замість сама глибока використовуйте префікс най-: найглибша.'
  - sentence: Ми замовили самий смачний десерт.
    error: самий смачний
    answer: найсмачніший
    options:
    - найсмачніший
    - смачніший
    - дуже смачний
    - найбільш смачніший
    explanation: Використовуйте синтетичну форму найсмачніший.
  - sentence: Вони живуть у самому старому будинку.
    error: самому старому
    answer: найстарішому
    options:
    - найстарішому
    - найстаріший
    - старому
    - найстарішим
    explanation: Слово самий не вживається. Правильна форма в місцевому відмінку —
      найстарішому.
  - sentence: Це найбільш довший маршрут.
    error: найбільш довший
    answer: найдовший
    options:
    - найдовший
    - більш довгий
    - самий довгий
    - довший
    explanation: Не змішуйте дві форми. Краще сказати найдовший.
  - sentence: Вона купила саме дороге плаття.
    error: саме дороге
    answer: найдорожче
    options:
    - найдорожче
    - найдорожча
    - дуже дороге
    - найдорожчий
    explanation: Замість саме дороге використовуйте найдорожче.
  - sentence: Це самий важливий крок.
    error: самий важливий
    answer: найважливіший
    options:
    - найважливіший
    - дуже важливий
    - важливіший
    - найбільш важливіший
    explanation: Правильна форма — найважливіший.
- type: quiz
  title: 'Перевірте знання: правила та значення'
  items:
  - question: Як утворюється синтетична форма найвищого ступеня для більшості прикметників?
    explanation: Для утворення синтетичної форми потрібно додати префікс най- до форми
      вищого ступеня.
    options:
    - text: Додаванням префікса най- до вищого ступеня
      correct: true
    - text: Додаванням слова самий до прикметника
      correct: false
    - text: Додаванням слова найбільш до вищого ступеня
      correct: false
    - text: Додаванням суфікса -іш до прикметника
      correct: false
  - question: Яке з цих слів є правильною формою найвищого ступеня від слова добрий?
    explanation: Слово добрий має суплетивну форму найкращий.
    options:
    - text: найкращий
      correct: true
    - text: найдобріший
      correct: false
    - text: самий добрий
      correct: false
    - text: найбільш кращий
      correct: false
  - question: Коли зазвичай використовується аналітична форма (слово найбільш)?
    explanation: Аналітична форма частіше використовується для довгих, формальних
      або технічних прикметників.
    options:
    - text: Для дуже довгих або формальних прикметників
      correct: true
    - text: Для коротких щоденних слів
      correct: false
    - text: Тільки для жіночого роду
      correct: false
    - text: Тільки в розмовній мові
      correct: false
  - question: Яке слово не можна використовувати для найвищого ступеня в українській
      мові?
    explanation: Слово самий є русизмом у цьому контексті і вважається граматичною
      помилкою.
    options:
    - text: самий
      correct: true
    - text: найбільш
      correct: false
    - text: найменш
      correct: false
    - text: дуже
      correct: false
  - question: Як сказати англійською as fast as possible українською мовою?
    explanation: Префікс якнай- додає значення максимальної межі.
    options:
    - text: якнайшвидше
      correct: true
    - text: найшвидше
      correct: false
    - text: дуже швидко
      correct: false
    - text: самий швидкий
      correct: false
  - question: Що означає прикметник найгірший у реченні?
    explanation: Найгірший — це суплетивна форма від слова поганий (bad).
    options:
    - text: the worst
      correct: true
    - text: the best
      correct: false
    - text: the smallest
      correct: false
    - text: the biggest
      correct: false
  - question: Яка граматична помилка є у фразі найбільш цікавіший?
    explanation: Це подвійний ступінь. Після найбільш прикметник має стояти у початковій
      формі.
    options:
    - text: Поєднання найбільш та форми вищого ступеня
      correct: true
    - text: Неправильне закінчення прикметника
      correct: false
    - text: Використання русизму
      correct: false
    - text: Неправильний рід прикметника
      correct: false
  - question: Яка форма прикметника великий є правильною для найвищого ступеня?
    explanation: Слово великий утворює форму найбільший.
    options:
    - text: найбільший
      correct: true
    - text: найвеликіший
      correct: false
    - text: самий великий
      correct: false
    - text: більш найбільший
      correct: false
  - question: Чим відрізняється слово дуже від префікса най-?
    explanation: Най- вказує на абсолютний лідерський ранг, тоді як дуже просто посилює
      якість.
    options:
    - text: Най- створює унікальний ранг, а дуже просто посилює
      correct: true
    - text: Дуже сильніше за най-
      correct: false
    - text: Вони мають абсолютно однакове значення
      correct: false
    - text: Най- використовується тільки з дієсловами
      correct: false
  - question: Як правильно перекласти фразу the most important day?
    explanation: Правильна синтетична форма — найважливіший день.
    options:
    - text: найважливіший день
      correct: true
    - text: самий важливий день
      correct: false
    - text: найбільш важливіший день
      correct: false
    - text: дуже важливий день
      correct: false
  instruction: Оберіть правильну відповідь.
- type: group-sort
  title: Розподіліть прикметники за групами
