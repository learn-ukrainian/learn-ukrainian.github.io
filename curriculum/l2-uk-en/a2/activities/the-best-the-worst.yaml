- type: mark-the-words
  title: Знайдіть прикметники найвищого ступеня
  instruction: Знайдіть і позначте всі прикметники найвищого ступеня у тексті.
  text: У Києві знаходиться найглибша станція метро у світі. Це найцікавіший проєкт
    міста. На заході країни є Говерла — найвища гора України, з якої відкривається
    найкращий краєвид. А літак Мрія був найбільший і найпотужніший транспортний літак
    на планеті. Ми маємо пишатися цими досягненнями.
  answers:
  - найглибша
  - найцікавіший
  - найвища
  - найкращий
  - найбільший
  - найпотужніший
- type: true-false
  title: 'Правда чи брехня: рекорди та граматика'
  instruction: Визначте, чи є ці твердження правдивими.
  items:
  - statement: Префікс най- додається до початкової форми прикметника.
    correct: false
    explanation: Префікс най- додається до форми вищого ступеня (наприклад, старіший
      -> найстаріший).
  - statement: Слово самий можна використовувати для утворення найвищого ступеня в
      українській мові.
    correct: false
    explanation: Слово самий є калькою з російської. Слід використовувати префікс
      най-.
  - statement: Говерла — це найвища гора України.
    correct: true
    explanation: Так, висота Говерли становить 2061 метр.
  - statement: Після слова найбільш прикметник має стояти у початковій формі.
    correct: true
    explanation: 'Аналітична форма утворюється так: найбільш + початкова форма.'
  - statement: Слова найбільший і найкращий є прикладами суплетивних форм.
    correct: true
    explanation: Так, вони утворюються від інших коренів (великий, добрий).
  - statement: Станція Арсенальна — найглибша станція метро у світі.
    correct: true
    explanation: Її глибина становить 105,5 метрів.
  - statement: Префікси якнай- та щонай- використовуються для підсилення значення.
    correct: true
    explanation: Вони означають as ... as possible.
  - statement: Літак Мрія був найменшим літаком у світі.
    correct: false
    explanation: Літак Мрія був найбільшим транспортним літаком на планеті.
  - statement: Фраза найбільш найрозумніший є правильною.
    correct: false
    explanation: Це помилка подвійного ступеня. Треба казати найрозумніший або найбільш
      розумний.
  - statement: Прикметники найвищого ступеня змінюються за родами, числами та відмінками.
    correct: true
    explanation: Так, як і звичайні прикметники, вони узгоджуються з іменником.
  - statement: Форма найгірший означає the best англійською.
    correct: false
    explanation: Найгірший означає the worst.
  - statement: Аналітична форма частіше використовується для довгих слів або в офіційних
      текстах.
    correct: true
    explanation: Короткі слова зазвичай використовують синтетичну форму з най-.
- type: cloze
  title: 'Заповніть пропуски: Ресторанний критик'
  instruction: Доповніть історію правильними формами прикметників.
  passage: Олена шукає ресторан для свята. Максим каже, що ресторан Весна має {{1}}
    борщ у місті. Це {{2}} вибір для любителів традиційної їжі. Але ресторан Старий
