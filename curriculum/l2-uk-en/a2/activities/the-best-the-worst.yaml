- type: fill-in
  title: 'Доповніть речення: суплетивні форми'
  instruction: Оберіть правильну форму для кожного речення.
  items:
  - sentence: Вона мій ___ друг.
    answer: найкращий
    options:
    - найкращий
    - найкраща
    - кращий
    - добрий
  - sentence: Київ — ___ місто України.
    answer: найбільше
    options:
    - найбільше
    - найбільший
    - найбільша
    - велике
  - sentence: Це ___ сценарій з усіх можливих.
    answer: найгірший
    options:
    - найгірший
    - найгірша
    - найгірше
    - найгірші
  - sentence: Це ___ проблема зараз.
    answer: найменша
    options:
    - найменша
    - найменший
    - найменше
    - найменші
  - sentence: Сьогодні ___ день у моєму житті.
    answer: найважливіший
    options:
    - найважливіший
    - найважливіша
    - найважливіше
    - найважливіші
  - sentence: Ми знайшли ___ кавярню в місті.
    answer: найкращу
    options:
    - найкращу
    - найкраща
    - найкращою
    - найкращій
  - sentence: Говерла — це ___ гора України.
    answer: найвища
    options:
    - найвища
    - найвищий
    - найвище
    - найвищі
  - sentence: Ми обрали ___ маршрут.
    answer: найбільш безпечний
    options:
    - найбільш безпечний
    - найбільш безпечна
    - найбільш безпечне
    - найбільш безпечні
  - sentence: Цей метод ___ ефективний.
    answer: найменш
    options:
    - найменш
    - найменший
    - найменша
    - менш
  - sentence: Зробіть це ___.
    answer: якнайшвидше
    options:
    - якнайшвидше
    - найшвидший
    - швидше
    - швидко
  - sentence: Це ___ торт у цій кавярні.
    answer: найсолодший
    options:
    - найсолодший
    - найсолодша
    - найсолодше
    - найсолодші
  - sentence: Мій дідусь — ___ чоловік у нашому селі.
    answer: найстаріший
    options:
    - найстаріший
    - найстаріша
    - найстаріше
    - найстаріші
