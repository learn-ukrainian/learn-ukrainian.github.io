- id: wb-match-up-prepositions
  type: match-up
  instruction: З'єднайте прийменник із його значенням англійською мовою
  pairs:
  - left: біля
    right: near, by
  - left: навпроти
    right: opposite, across from
  - left: коло
    right: around, near
  - left: до
    right: to, up to
  - left: з
    right: from, out of
  - left: після
    right: after
  - left: для
    right: for (purpose)
  - left: від
    right: from (person or time)
  - left: без
    right: without
  - left: немає
    right: there is no
- id: wb-error-correction-mixed
  type: error-correction
  instruction: Виправте помилку у вживанні родового відмінка
  items:
  - sentence: Це телефон мого новий друга.
    error: новий
    correction: нового
    error_type: word
    options:
    - нового
    - нові
    - новітній
    explanation: Прикметник має узгоджуватися в родовому відмінку (-ого).
  - sentence: Я читаю сторінку моєї старий книги.
    error: старий
    correction: старої
    error_type: word
    options:
    - старої
    - старого
    - стару
    explanation: Для жіночого роду в родовому відмінку закінчення -ої.
  - sentence: Ми чекаємо наших новий друзів.
    error: новий
    correction: нових
    error_type: word
    options:
    - нових
    - нового
    - новому
    explanation: У множині прикметник має закінчення -их.
  - sentence: У мене є багато вікно.
    error: вікно
    correction: вікон
    error_type: word
    options:
    - вікон
    - вікна
    - вікнам
    explanation: Після «багато» потрібен родовий відмінок множини.
  - sentence: Дайте два кілограми яблуко.
    error: яблуко
    correction: яблук
    error_type: word
    options:
    - яблук
    - яблука
    - яблуку
    explanation: Слово «кілограм» вимагає після себе родового відмінка множини (яблук).
  - sentence: Він приїхав з Київ.
    error: Київ
    correction: Києва
    error_type: word
    options:
    - Києва
    - Києву
    - Києвом
    explanation: Прийменник «з» вимагає родового відмінка.
  - sentence: Магазин працює від ранку до ніч.
    error: ніч
    correction: ночі
    error_type: word
    options:
    - ночі
    - ніччю
    - ноччю
    explanation: Прийменник «до» вимагає родового відмінка.
  - sentence: Стілець стоїть біля стіл.
    error: стіл
    correction: стола
    error_type: word
    options:
    - стола
    - столу
    - столом
    explanation: Після «біля» потрібен родовий відмінок.
  - sentence: Діти граються коло дім.
    error: дім
    correction: дому
    error_type: word
    options:
    - дому
    - дома
    - домом
    explanation: Прийменник «коло» вимагає родового відмінка.
  - sentence: Я п'ю каву без молоко.
    error: молоко
    correction: молока
    error_type: word
    options:
    - молока
    - молоку
    - молоком
    explanation: Прийменник «без» вимагає родового відмінка.
