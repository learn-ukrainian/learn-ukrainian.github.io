version: '1.0'
module: checkpoint-genitive
level: a2
inline:
- id: quiz-preposition-identification
  type: quiz
  instruction: Оберіть правильний прийменник за контекстом
  items:
  - question: Ми живемо ____ старого парку.
    options:
    - біля
    - для
    - після
    - з
    correct: 0
  - question: Аптека знаходиться ____ школи.
    options:
    - без
    - навпроти
    - від
    - із
    correct: 1
  - question: Я йду ____ університету.
    options:
    - після
    - без
    - до
    - коло
    correct: 2
  - question: Мій друг приїхав ____ Києва.
    options:
    - для
    - до
    - після
    - з
    correct: 3
  - question: ____ роботи я завжди читаю.
    options:
    - Після
    - Для
    - Без
    - З
    correct: 0
  - question: Це подарунок ____ моєї сестри.
    options:
    - після
    - для
    - від
    - коло
    correct: 1
  - question: Я працюю ____ вівторка до п'ятниці.
    options:
    - без
    - біля
    - від
    - навпроти
    correct: 2
  - question: Я п'ю каву ____ молока.
    options:
    - до
    - після
    - з
    - без
    correct: 3
  - question: Діти граються ____ дому.
    options:
    - коло
    - для
    - без
    - від
    correct: 0
  - question: Вона вийшла ____ кімнати.
    options:
    - до
    - з
    - для
    - біля
    correct: 1
- id: fill-in-genitive-agreement
  type: fill-in
  instruction: Вставте правильну форму прикметника чи займенника
  items:
  - sentence: Це телефон ____ нового друга.
    answer: мого
    options:
    - мого
    - моєї
    - моїх
  - sentence: Я читаю сторінку ____ старої книги.
    answer: моєї
    options:
    - мого
    - моєї
    - моїх
  - sentence: Я чекаю ____ нових друзів.
    answer: моїх
    options:
    - мого
    - моєї
    - моїх
  - sentence: Я не бачу ____ синього моря.
    answer: цього
    options:
    - цього
    - цієї
    - цих
  - sentence: У цій газеті немає ____ статті.
    answer: цікавої
    options:
    - цікавої
    - цікавого
    - цікавих
  - sentence: Це подарунок для ____ молодшого брата.
    answer: мого
    options:
    - мого
    - моєї
    - моїх
  - sentence: Він п'є каву без ____ молока.
    answer: свіжого
    options:
    - свіжого
    - свіжої
    - свіжих
  - sentence: Ми стоїмо біля ____ парку.
    answer: старого
    options:
    - старого
    - старої
    - старих
  - sentence: Аптека знаходиться навпроти ____ школи.
    answer: нової
    options:
    - нового
    - нової
    - нових
  - sentence: Вибачте, сьогодні немає ____ хліба.
    answer: свіжого
    options:
    - свіжого
    - свіжої
    - свіжих
- id: match-up-situations
  type: match-up
  instruction: З'єднайте запитання чи фразу з логічною відповіддю
  pairs:
  - left: Звідки ви?
    right: Я з України.
  - left: Для кого цей новий телефон?
    right: Це подарунок для мого брата.
  - left: Скільки часу залишилося до поїзда?
    right: Залишилося дві години.
  - left: Що у вас болить?
    right: У мене дуже болить голова.
  - left: У вас є ліки від болю?
    right: Так, візьміть ці таблетки.
  - left: Як дійти до аптеки?
    right: Йдіть прямо, вона навпроти банку.
  - left: Дайте ще одну каву без цукру, будь ласка.
    right: Ось ваша кава, з вас сто гривень.
  - left: У вас є свіжий хліб?
    right: Вибачте, сьогодні немає свіжого хліба.
  - left: Ці ліки треба пити після операції?
    right: Ні, просто пийте їх після обіду.
  - left: А ми можемо зайти всередину?
    right: Ні, без квитка туди не можна.
