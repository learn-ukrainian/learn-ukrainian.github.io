- id: wb-group-sort-endings
  type: group-sort
  instruction: Розподіліть слова за їхнім закінченням у родовому відмінку множини
  groups:
  - label: -ів / -їв
    items:
    - братів
    - столів
    - трамваїв
    - лікарів
    - кілограмів
  - label: -ей
    items:
    - ночей
    - грошей
    - дітей
    - людей
    - статей
  - label: нульове закінчення (-ø)
    items:
    - машин
    - сестер
    - вікон
    - пісень
    - книжок
- id: wb-true-false-grammar
  type: true-false
  instruction: Правда чи ні? Оцініть граматичні правила
  items:
  - statement: Після прийменника «без» завжди використовуємо родовий відмінок.
    correct: true
    explanation: Прийменник «без» вимагає родового відмінка (без молока, без цукру).
  - statement: Слово «цукор» у родовому відмінку має форму «цукра».
    correct: false
    explanation: 'Абстрактні поняття та матеріали мають закінчення -у: цукру.'
  - statement: Слово «стіл» у родовому відмінку може мати форму «стола».
    correct: true
    explanation: Конкретні предмети чоловічого роду часто мають закінчення -а.
  - statement: Заперечення «немає» вимагає називного відмінка.
    correct: false
    explanation: Після «немає» завжди використовуємо родовий відмінок (немає сестри).
  - statement: Числівники від 5 і більше вимагають родового відмінка множини.
    correct: true
    explanation: 'Наприклад: п''ять книжок, десять людей, шість машин.'
  - statement: Дієслово «потребувати» вимагає після себе родового відмінка.
    correct: true
    explanation: 'Тому ми говоримо: «я потребую допомоги».'
  - statement: Прийменник «навпроти» означає рух усередину.
    correct: false
    explanation: «Навпроти» означає розташування з іншого боку (opposite).
  - statement: Множина слова «гроші» у родовому відмінку — «грошей».
    correct: true
    explanation: Це слово має закінчення -ей у родовому відмінку множини.
  - statement: Прикметники чоловічого роду в родовому відмінку мають закінчення -ої.
    correct: false
    explanation: Чоловічий рід має закінчення -ого (наприклад, нового). -ої — це для
      жіночого роду.
  - statement: Прийменники «з» і «до» є антонімами напрямку.
    correct: true
    explanation: «З» означає напрямок звідкись, а «до» — напрямок кудись.
