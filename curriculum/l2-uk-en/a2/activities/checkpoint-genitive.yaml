version: '1.0'
module: checkpoint-genitive
level: a2
inline:
- id: quiz-genitive-prepositions
  type: quiz
  instruction: Оберіть правильний прийменник
  items:
  - question: Ми стоїмо _____ собору.
    options:
    - біля
    - від
    - до
    - з
    correct: 0
  - question: Я отримав повідомлення _____ лікаря.
    options:
    - для
    - без
    - від
    - навпроти
    correct: 2
  - question: Мені, будь ласка, чорний чай _____ цукру.
    options:
    - для
    - без
    - з
    - від
    correct: 1
  - question: Я купив подарунок _____ сестри.
    options:
    - від
    - до
    - біля
    - для
    correct: 3
  - question: Наш готель розташований _____ театру.
    options:
    - навпроти
    - до
    - від
    - після
    correct: 0
  - question: Він приїхав _____ Львова.
    options:
    - від
    - до
    - зі
    - для
    correct: 2
  - question: Ми зустрілися _____ парку.
    options:
    - до
    - біля
    - від
    - для
    correct: 1
  - question: _____ роботи я читаю новини.
    options:
    - після
    - до
    - від
    - без
    correct: 0
- id: fill-in-genitive-forms
  type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: Це рюкзак мого нового _____
    answer: друга
    options:
    - друг
    - друга
    - другу
  - sentence: Я не бачив твоєї старшої _____
    answer: сестри
    options:
    - сестра
    - сестри
    - сестру
  - sentence: На вечірці було десять _____
    answer: друзів
    options:
    - друзі
    - друзів
    - другами
  - sentence: Вона прочитала п'ять _____
    answer: книжок
    options:
    - книжки
    - книжок
    - книгами
  - sentence: Водій чекає біля _____
    answer: автобуса
    options:
    - автобус
    - автобуса
    - автобусу
  - sentence: У мене зовсім немає _____
    answer: часу
    options:
    - час
    - часу
    - часа
  - sentence: У мене немає _____
    answer: грошей
    options:
    - гроші
    - грошей
    - грошам
  - sentence: Тут немає _____
    answer: вітру
    options:
    - вітер
    - вітру
    - вітра
- id: match-up-genitive-situational
  type: match-up
  instruction: З'єднайте фрази за змістом
  pairs:
  - left: Дайте мені, будь ласка,
    right: два кілограми яблук.
  - left: Мені потрібна велика
    right: пляшка води.
  - left: У вас є таблетки
    right: від болю?
  - left: Я хочу купити крем
    right: для рук.
  - left: Скільки коштує кілограм
    right: сиру?
  - left: Ми йдемо до
    right: Софійського собору.
  - left: Ця екскурсія для
    right: групи з десяти людей.
  - left: Це машина мого
    right: брата.
workbook:
- type: group-sort
  instruction: Розподіліть іменники за закінченням у родовому відмінку однини
  groups:
  - label: Закінчення -а / -я (конкретні предмети, істоти)
    items:
    - брата
    - автобуса
    - рюкзака
    - квитка
    - стола
    - друга
  - label: Закінчення -у / -ю (абстрактні, явища, речовини)
    items:
    - часу
    - вітру
    - цукру
    - сиру
    - парку
    - дощу
- type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: We have no water.
    options:
    - text: У нас немає води.
      correct: true
    - text: У нас немає вода.
      correct: false
  - source: This is my brother's car.
    options:
    - text: Це машина мого брата.
      correct: true
    - text: Це машина мій брат.
      correct: false
  - source: He is waiting near the house.
    options:
    - text: Він чекає біля будинку.
      correct: true
    - text: Він чекає навпроти будинку.
      correct: false
  - source: Pills for pain
    options:
    - text: Таблетки від болю
      correct: true
    - text: Таблетки для болю
      correct: false
  - source: A lot of time
    options:
    - text: Багато часу
      correct: true
    - text: Багато час
      correct: false
  - source: I need help.
    options:
    - text: Я потребую допомоги.
      correct: true
    - text: Я потребую допомогу.
      correct: false
- type: unjumble
  instruction: Складіть речення з поданих слів
  items:
  - words:
    - немає
    - мене
    - У
    - часу.
    correct_order:
    - У
    - мене
    - немає
    - часу.
  - words:
    - зустрілися
    - Ми
    - парку.
    - біля
    correct_order:
    - Ми
    - зустрілися
    - біля
    - парку.
  - words:
    - допомоги.
    - потребую
    - Я
    correct_order:
    - Я
    - потребую
    - допомоги.
  - words:
    - приїхав
    - Він
    - Львова.
    - зі
    correct_order:
    - Він
    - приїхав
    - зі
    - Львова.
  - words:
    - без
    - зайшов
    - Він
    - квитка.
    correct_order:
    - Він
    - зайшов
    - без
    - квитка.
  - words:
    - чекаю
    - Я
    - наступного
    - автобуса.
    correct_order:
    - Я
    - чекаю
    - наступного
    - автобуса.
