    - місяць
    - додаток
    - правило
    correct: 0
- id: order-hotel-booking-dialogue
  type: order
  instruction: Розставте репліки діалогу в правильному порядку
  items:
  - — Добрий день! Мені потрібно три номери.
  - — Добре. На скільки людей?
  - — На п'ять гостей.
  - — У нас є два великих номери і один малий номер.
  - — Чудово. Скільки це коштує?
  - — Це коштує дві тисячі гривень за добу.
  - — Дякую, я беру ці три номери.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
