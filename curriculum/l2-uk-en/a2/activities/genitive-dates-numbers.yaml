- id: quiz-grammar-terms
  type: quiz
  instruction: Оберіть правильний термін
  items:
  - question: Як українською 'numeral'?
    options:
    - числівник
    - додаток
    - правило
    - заперечення
    correct: 0
  - question: Як українською 'object (grammatical)'?
    options:
    - додаток
    - числівник
    - заперечення
    - правило
    correct: 0
  - question: Як українською 'negation'?
    options:
    - заперечення
    - правило
    - додаток
    - числівник
    correct: 0
  - question: Як українською 'rule'?
    options:
