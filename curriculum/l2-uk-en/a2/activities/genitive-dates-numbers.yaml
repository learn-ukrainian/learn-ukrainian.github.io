version: '1.0'
module: genitive-dates-numbers
level: a2
inline:
- id: quiz-what-s-the-date-drill
  type: quiz
  instruction: Оберіть правильну дату
  items:
  - question: Сьогодні...
    options:
    - перше січня
    - перший січень
    - першого січня
    - перша січня
    correct: 0
  - question: Завтра...
    options:
    - друге лютого
    - другий лютого
    - другого лютого
    - друга лютого
    correct: 0
  - question: Концерт...
    options:
    - п'яте березня
    - п'ятого березня
    - п'ятий березень
    - п'ята березня
    correct: 1
  - question: Вона народилася...
    options:
    - десяте жовтня
    - десятий жовтень
    - десятого жовтня
    - десята жовтня
    correct: 2
  - question: Різдво...
    options:
    - двадцять п'яте грудня
    - двадцять п'ятого грудня
    - двадцять п'ятий грудень
    - двадцять п'ята грудня
    correct: 1
  - question: Моє улюблене число — ...
    options:
    - третє квітня
    - третього квітня
    - третій квітень
    - третя квітня
    correct: 0
  - question: Свято буде...
    options:
    - двадцять четверте серпня
    - двадцять четвертого серпня
    - двадцять четвертий серпень
    - двадцять четверта серпня
    correct: 1
  - question: Я починаю нову роботу...
    options:
    - сьоме вересня
    - сьомого вересня
    - сьомий вересень
    - сьома вересня
    correct: 1
