version: '1.0'
module: genitive-dates-numbers
level: a2
inline:
- id: quiz-whats-the-date-drill
  type: quiz
  instruction: Оберіть правильний варіант дати (Choose the correct date)
  items:
  - question: Яке сьогодні число? (August 24)
    options:
    - Двадцять четверте серпня
    - Двадцять четвертого серпня
    - Двадцять чотири серпня
    - Двадцять четвертий серпня
    correct: 0
  - question: Яке число було вчора? (December 25)
    options:
    - Двадцять п'ятого грудня
    - Двадцять п'яте грудня
    - Двадцять п'ять грудня
    - Двадцять п'яте грудень
    correct: 1
  - question: Яке сьогодні число? (January 1)
    options:
    - Перше січень
    - Першого січня
    - Один січня
    - Перше січня
    correct: 3
  - question: Яке число буде завтра? (March 8)
    options:
    - Восьме березня
    - Восьме березень
    - Восьмого березня
    - Вісім березня
    correct: 0
  - question: Яке сьогодні число? (October 14)
    options:
    - Чотирнадцяте жовтень
    - Чотирнадцяте жовтня
    - Чотирнадцятого жовтня
    - Чотирнадцять жовтня
    correct: 1
  - question: Яке сьогодні число? (May 5)
    options:
    - П'яте травня
    - П'ятого травня
    - П'яте травень
    - П'ять травня
    correct: 0
  - question: Яке сьогодні число? (November 11)
    options:
    - Одинадцятого листопада
    - Одинадцяте листопад
    - Одинадцяте листопада
    - Одинадцять листопада
    correct: 2
  - question: Яке сьогодні число? (February 2)
    options:
    - Друге лютого
    - Другого лютого
    - Два лютого
    - Другий лютий
    correct: 0
- id: fill-in-counting-objects
  type: fill-in
  instruction: Вставте правильну форму слова (1, 2-4, 5+ Rule)
  items:
  - sentence: Ми бронюємо номер на три _____ (день).
    answer: дні
    options:
    - день
    - дні
    - днів
  - sentence: У цьому будинку живуть п'ять _____ (тисяча) людей.
    answer: тисяч
    options:
    - тисяча
    - тисячі
    - тисяч
  - sentence: Я гуляю там двадцять один _____ (день).
    answer: день
    options:
    - день
    - дні
    - днів
  - sentence: Сьогодні я бачив там десять _____ (качка).
    answer: качок
    options:
    - качка
    - качки
    - качок
  - sentence: Нам потрібні два _____ (номер).
    answer: номери
    options:
    - номер
    - номери
    - номерів
  - sentence: Це буде коштувати чотири _____ (тисяча) гривень.
    answer: тисячі
    options:
    - тисяча
    - тисячі
    - тисяч
  - sentence: Він має сто _____ (долар).
    answer: доларів
    options:
    - долар
    - долари
    - доларів
  - sentence: Вони купили дві _____ (книга).
    answer: книги
    options:
    - книга
    - книги
    - книг
- id: match-up-accusative-genitive
  type: match-up
  instruction: З'єднайте стверджувальне речення із заперечним (Match affirmative to
    negative)
  pairs:
  - left: Я читаю статтю.
    right: Я не читаю статті.
  - left: Він п'є сік.
    right: Він не п'є соку.
  - left: Вона купила книгу.
    right: Вона не купила книги.
  - left: Ми бачимо парк.
    right: Ми не бачимо парку.
  - left: Я маю квиток.
    right: Я не маю квитка.
  - left: Він знає відповідь.
    right: Він не знає відповіді.
  - left: Я бачив фільм.
    right: Я не бачив фільму.
  - left: Ми маємо проблему.
    right: Ми не маємо проблеми.
- id: match-up-qa-quantities-dates
  type: match-up
  instruction: З'єднайте запитання з відповіддю (Match the question to the answer)
  pairs:
  - left: Яке сьогодні число?
    right: Сьогодні перше вересня.
  - left: Яке число було вчора?
    right: Вчора було тридцять перше серпня.
  - left: Скільки вас?
    right: Нас п'ять осіб.
  - left: На скільки днів ви бронюєте номер?
    right: На три дні.
  - left: Скільки це коштує?
    right: Чотири тисячі гривень.
  - left: Коли твій день народження?
    right: Двадцятого січня.
  - left: Де твій телефон?
    right: На столі телефону немає.
  - left: Яке число буде завтра?
    right: Завтра буде друге вересня.
