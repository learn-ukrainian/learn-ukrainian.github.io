version: '1.0'
module: genitive-dates-numbers
level: a2
inline:
- id: quiz-what-s-the-date-drill
  type: quiz
  instruction: Оберіть правильний варіант дати або часу
  items:
  - question: Яке сьогодні _____?
    options:
    - число
    - місяць
    - рік
    - день
    correct: 0
  - question: Сьогодні перше _____.
    options:
    - січня
    - січень
    - січню
    - січне
    correct: 0
  - question: Завтра _____ лютого.
    options:
    - друге
    - два
    - друга
    - другий
    correct: 0
  - question: Зустріч о _____ годині.
    options:
    - дев'ятій
    - дев'ята
    - дев'ять
    - дев'яту
    correct: 0
  - question: Зараз _____ година.
    options:
    - п'ята
    - п'ять
    - п'ятій
    - п'яту
    correct: 0
  - question: Яке завтра буде _____?
    options:
    - число
    - числа
    - числу
    - числом
    correct: 0
  - question: Кіно об _____.
    options:
    - одинадцятій
    - одинадцята
    - одинадцять
    - одинадцяту
    correct: 0
  - question: Сьогодні двадцять четверте _____.
    options:
    - серпня
    - серпень
    - серпню
    - серпні
    correct: 0
- id: fill-in-counting-objects-1-2-4-5-rule
  type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: У кімнаті стоїть один _____
    answer: стіл
    options:
    - стіл
    - столи
    - столів
  - sentence: Я купив три _____
    answer: книги
    options:
    - книга
    - книги
    - книг
  - sentence: У нас є п'ять _____
    answer: вікон
    options:
    - вікно
    - вікна
    - вікон
  - sentence: Мені двадцять один _____
    answer: рік
    options:
    - рік
    - роки
    - років
  - sentence: На столі лежать два _____
    answer: телефони
    options:
    - телефон
    - телефони
    - телефонів
  - sentence: Там працює десять _____
    answer: людей
    options:
    - людина
    - людини
    - людей
  - sentence: Це коштує дві тисячі _____
    answer: гривень
    options:
    - гривня
    - гривні
    - гривень
  - sentence: В офісі є чотири _____
    answer: стільці
    options:
    - стілець
    - стільці
    - стільців
- id: match-up-q-a-about-quantities-and-dates
  type: match-up
  instruction: З'єднайте запитання та відповідь
  pairs:
  - left: Яке сьогодні число?
    right: Сьогодні десяте березня.
  - left: О котрій годині зустріч?
    right: Об одинадцятій.
  - left: Котра зараз година?
    right: Зараз друга година.
  - left: Скільки це коштує?
    right: Двадцять гривень.
  - left: Якого числа манікюр?
    right: Шостого травня.
  - left: Скільки у вас номерів?
    right: У нас три номери.
  - left: Яке завтра число?
    right: Завтра одинадцяте березня.
  - left: Скільки там людей?
    right: Там працюють п'ять людей.
- id: match-up-accusative-to-genitive-negation
  type: match-up
  instruction: З'єднайте стверджувальне речення із заперечним
  pairs:
  - left: Я маю квиток.
    right: Я не маю квитка.
  - left: Він знає цю пісню.
    right: Він не знає цієї пісні.
  - left: Я купую свіжий хліб.
    right: Я не купую свіжого хліба.
  - left: Вона п'є каву.
    right: Вона не п'є кави.
  - left: Ми розуміємо це правило.
    right: Ми не розуміємо цього правила.
  - left: Тут є стіл.
    right: Тут немає стола.
  - left: Я бачу різницю.
    right: Я не бачу різниці.
  - left: У мене є час.
    right: У мене немає часу.
workbook:
- type: true-false
  instruction: Правда чи ні? Визначте, чи правильно узгоджені числівники з іменниками
    та вжито відмінки.
  items:
  - statement: Правильно сказати «два столи».
    correct: true
    explanation: Після числівників 2, 3, 4 іменник стоїть у називному відмінку множини.
  - statement: Правильно сказати «п'ять книга».
    correct: false
    explanation: 'Після числівників 5 і більше потрібен родовий відмінок множини:
      «п''ять книг».'
  - statement: Правильно сказати «двадцять один номер».
    correct: true
    explanation: Якщо число закінчується на 1 (крім 11), іменник залишається в однині.
  - statement: Правильно сказати «три вікон».
    correct: false
    explanation: 'Після числівника 3 потрібен називний відмінок множини: «три вікна».'
  - statement: Правильно сказати «немає часу».
    correct: true
    explanation: Слово «немає» завжди вимагає родового відмінка (чого?).
  - statement: Правильно сказати «я не маю квиток».
    correct: false
    explanation: 'При запереченні з «не маю» додаток найчастіше стоїть у родовому
      відмінку: «я не маю квитка».'
- type: error-correction
  instruction: Знайдіть і виправте помилку в реченнях.
  items:
  - sentence: Сьогодні п'яте травень.
    error: травень
    correction: травня
    error_type: word
    options:
    - травня
    - травню
    - травнем
    explanation: Назва місяця у даті повинна бути в родовому відмінку.
  - sentence: Я маю дві проблема.
    error: проблема
    correction: проблеми
    error_type: word
    options:
    - проблеми
    - проблем
    - проблемою
    explanation: Після числівника «дві» слово жіночого роду має закінчення -и/-і (називний
      множини).
  - sentence: У кімнаті немає стіл.
    error: стіл
    correction: стола
    error_type: word
    options:
    - стола
    - столи
    - столів
    explanation: Після слова «немає» завжди використовується родовий відмінок.
  - sentence: Зараз друга годині.
    error: годині
    correction: година
    error_type: word
    options:
    - година
    - годину
    - годин
    explanation: У відповіді на питання «Котра година?» використовуємо називний відмінок
      (хто? що?).
  - sentence: Я купив п'ять зошити.
    error: зошити
    correction: зошитів
    error_type: word
    options:
    - зошитів
    - зошит
    - зошитом
    explanation: Після числівника «п'ять» іменник стоїть у родовому відмінку множини.
  - sentence: Вона не п'є кава.
    error: кава
    correction: кави
    error_type: word
    options:
    - кави
    - каву
    - кавою
    explanation: При повному запереченні дії використовується родовий відмінок («кави»).
- type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - сьогодні
    - число?
    - Яке
    correct_order:
    - Яке
    - сьогодні
    - число?
  - words:
    - десяте
    - Сьогодні
    - березня.
    correct_order:
    - Сьогодні
    - десяте
    - березня.
  - words:
    - немає
    - На
    - молока.
    - полиці
    correct_order:
    - На
    - полиці
    - немає
    - молока.
  - words:
    - має
    - готель
    - один
    - номер.
    - Наш
    - двадцять
    correct_order:
    - Наш
    - готель
    - має
    - двадцять
    - один
    - номер.
  - words:
    - зустріч
    - о
    - годині.
    - Завтра
    - дев'ятій
    correct_order:
    - Завтра
    - зустріч
    - о
    - дев'ятій
    - годині.
  - words:
    - не
    - Я
    - маю
    - часу.
    correct_order:
    - Я
    - не
    - маю
    - часу.
