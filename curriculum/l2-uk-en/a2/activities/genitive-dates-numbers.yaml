- id: match-up-accusative-genitive-negation
  type: match-up
  instruction: З'єднайте стверджувальне речення з його запереченням
  pairs:
  - left: Я читаю книгу.
    right: Я не читаю книги.
  - left: Він має квиток.
    right: Він не має квитка.
  - left: Ми бачимо вікно.
    right: Ми не бачимо вікна.
  - left: Вона купила машину.
    right: Вона не купила машини.
  - left: Вони п'ють каву.
    right: Вони не п'ють кави.
  - left: Ти слухаєш музику.
    right: Ти не слухаєш музики.
  - left: Я розумію правило.
    right: Я не розумію правила.
  - left: Я їм м'ясо.
    right: Я не їм м'яса.
- id: match-up-qa-quantities-dates
  type: match-up
  instruction: З'єднайте запитання з правильною відповіддю
  pairs:
  - left: Яке сьогодні число?
    right: Сьогодні десяте жовтня.
  - left: З якого числа ви хочете кімнату?
    right: З п'ятого березня.
  - left: До якого числа ви плануєте залишитися?
    right: До десятого березня.
  - left: Якого числа твій день народження?
    right: П'ятнадцятого жовтня.
  - left: Скільки номерів вам потрібно?
    right: Нам потрібно два номери.
  - left: Скільки гостей буде проживати?
    right: П'ять гостей.
  - left: Скільки місяців має зима?
    right: Три місяці.
  - left: Скільки днів тривала оборона?
    right: Двісті сорок два дні.
workbook:
- id: true-false-dates
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Слово «грудень» — це назва зимового місяця.
    correct: true
    explanation: Грудень — це перший місяць зими.
  - statement: Слово «травень» — це назва осіннього місяця.
    correct: false
    explanation: Травень — це останній (третій) місяць весни.
  - statement: Ми використовуємо «першого січня», щоб відповісти на запитання «Яке
      сьогодні число?».
    correct: false
    explanation: Щоб сказати сьогоднішню дату, ми кажемо «Сьогодні перше січня».
  - statement: Форма «лютого» — це родовий відмінок від слова «лютий».
    correct: true
    explanation: Слово «лютий» відмінюється як прикметник, тому має закінчення -ого.
  - statement: Слово «листопад» у родовому відмінку буде «листопаду».
    correct: false
    explanation: Слово «листопад» у родовому відмінку буде «листопада» (має закінчення
      -а).
  - statement: Коли ми кажемо про подію (на запитання «Коли?»), ми використовуємо
      родовий відмінок для дати, наприклад «п'ятого жовтня».
    correct: true
    explanation: Для вказівки на час події дата завжди ставиться в родовому відмінку.
  - statement: Усі назви місяців в українській мові — це слова чоловічого роду.
    correct: true
    explanation: Так, усі 12 місяців належать до чоловічого роду.
  - statement: Різдво традиційно святкують двадцять п'яте грудня.
    correct: false
    explanation: 'Подія завжди вказується в родовому відмінку: двадцять п''ятого грудня.'
- id: error-correction-numbers
  type: error-correction
  instruction: Знайдіть і виправте помилку в числівниках та іменниках
  items:
  - sentence: У кімнаті є два великі вікно.
    error: вікно
    correction: вікна
    error_type: word
    options:
    - вікна
    - вікон
    - вікні
    explanation: Після числа 2 іменник ставиться в називному відмінку множини.
  - sentence: Я маю три старші сестер.
    error: сестер
    correction: сестри
    error_type: word
    options:
    - сестри
    - сестра
    - сестро
    explanation: Після числа 3 іменник ставиться в називному відмінку множини.
  - sentence: Вони купили п'ять нових квитки.
    error: квитки
    correction: квитків
    error_type: word
    options:
    - квитків
    - квиток
    - квитка
    explanation: Після числа 5 іменник ставиться в родовому відмінку множини.
  - sentence: Сорок один студенти написали тест.
    error: студенти
    correction: студент
    error_type: word
    options:
    - студент
    - студента
    - студентів
    explanation: Після чисел, що закінчуються на 1 (крім 11), іменник ставиться в
      однині.
  - sentence: На столі лежать дві круглі столи.
    error: дві
    correction: два
    error_type: word
    options:
    - два
    - двоє
    - двом
    explanation: Слово «стіл» — чоловічого роду, тому використовуємо форму «два».
  - sentence: Він чекав чотири довгі місяців.
    error: місяців
    correction: місяці
    error_type: word
    options:
    - місяці
    - місяць
    - місяця
    explanation: Після числа 4 іменник ставиться в називному відмінку множини.
  - sentence: Ми бачили багато красивих міста.
    error: міста
    correction: міст
    error_type: word
    options:
    - міст
    - місто
    - місту
    explanation: Після слова «багато» іменник ставиться в родовому відмінку множини.
  - sentence: Скільки нових книга ти маєш?
    error: книга
    correction: книг
    error_type: word
    options:
    - книг
    - книги
    - книгу
    explanation: Після слова «скільки» іменник ставиться в родовому відмінку множини.
