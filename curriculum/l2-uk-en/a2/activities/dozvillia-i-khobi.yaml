version: '1.0'
module: dozvillia-i-khobi
level: a2
inline:
- id: match-up
  type: match-up
  instruction: З'єднайте дієслово з правильним відмінком або прикладом
  pairs:
  - left: захоплюватися
    right: малюванням (Орудний)
  - left: грати у
    right: футбол (Знахідний)
  - left: грати на
    right: гітарі (Місцевий)
  - left: займатися
    right: спортом (Орудний)
  - left: йти в
    right: кіно (Знахідний)
  - left: бути у
    right: басейні (Місцевий)
  - left: йти на
    right: стадіон (Знахідний)
  - left: бути на
    right: виставці (Місцевий)
- id: quiz
  type: quiz
  instruction: Оберіть правильну форму (Знахідний чи Місцевий відмінок) залежно від
    дієслова
  items:
  - question: Сьогодні ввечері ми йдемо в _____.
    options:
    - кіно
    - кіні
    - кіном
    - кіна
    correct: 0
  - question: Зараз мої друзі відпочивають у _____.
    options:
    - басейн
    - басейні
    - басейну
    - басейном
    correct: 1
  - question: Завтра я піду на цікаву _____.
    options:
    - виставка
    - виставці
    - виставку
    - виставкою
    correct: 2
  - question: Моя сестра зараз на _____.
    options:
    - виставка
    - виставці
    - виставку
    - виставкою
    correct: 1
  - question: У суботу зранку він поїде на _____.
    options:
    - стадіон
    - стадіоні
    - стадіону
    - стадіоном
    correct: 0
  - question: Вони довго роздивлялися картини у _____.
    options:
    - музей
    - музею
    - музеї
    - музеєм
    correct: 2
  - question: Ми часто ходимо в _____ на вихідних.
    options:
    - театр
    - театрі
    - театру
    - театром
    correct: 0
  - question: Маленькі діти граються в _____.
    options:
    - парк
    - парку
    - парка
    - парком
    correct: 1
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченнях про дозвілля
  items:
  - sentence: Я дуже захоплююся плавання.
    error: плавання
    correction: плаванням
    error_type: word
    options:
    - плаванням
    - плаванню
    - плаванні
    explanation: Дієслово «захоплюватися» вимагає Орудного відмінка (Instrumental
      case).
  - sentence: Ходімо на театр сьогодні ввечері!
    error: на
    correction: в
    error_type: word
    options:
    - в
    - у
    - до
    explanation: Зі словом «театр» ми використовуємо прийменник «в» (або «у»).
  - sentence: Вона постійно займається спорт.
    error: спорт
    correction: спортом
    error_type: word
    options:
    - спортом
    - спорту
    - спорті
    explanation: Дієслово «займатися» вимагає Орудного відмінка.
  - sentence: Молодий хлопець гарно грає у гітарі.
    error: у
    correction: на
    error_type: word
    options:
    - на
    - в
    - з
    explanation: З музичними інструментами ми кажемо «грати на».
  - sentence: Завтра ми йдемо в виставку сучасного мистецтва.
    error: в
    correction: на
    error_type: word
    options:
    - на
    - у
    - до
    explanation: Зі словом «виставка» ми використовуємо прийменник «на».
  - sentence: Ми часто граємо на футбол.
    error: на
    correction: у
    error_type: word
    options:
    - у
    - в
    - до
    explanation: Зі спортивними іграми ми кажемо «грати у» (або «в»).
- id: group-sort
  type: group-sort
  instruction: Розподіліть слова та заняття за категоріями
  groups:
  - label: Спорт
    items:
    - плавання
    - футбол
    - гімнастика
    - змагання
  - label: Мистецтво
    items:
    - малювання
    - музика
    - фотографія
    - скрипка
  - label: На природі
    items:
    - прогулянка
    - дача
    - ходити в гори
    - збирати гриби
  - label: У місті
    items:
    - виставка
    - кіно
    - театр
    - розвага
- id: fill-in
  type: fill-in
  instruction: Вставте правильні слова або відмінкові форми в текст про плани на вихідні
  items:
  - sentence: Мій брат дуже захоплюється ____ (спорт).
    answer: спортом
    options:
    - спорт
    - спортом
    - спорту
  - sentence: У суботу зранку ми йдемо на ____ (стадіон).
    answer: стадіон
    options:
    - стадіоні
    - стадіон
    - стадіоном
  - sentence: Там ми будемо грати у ____ (футбол).
    answer: футбол
    options:
    - футбол
    - футболу
    - футболі
  - sentence: А моя сестра захоплюється ____ (малювання).
    answer: малюванням
    options:
    - малювання
    - малюванням
    - малюванню
  - sentence: Вона зараз на ____ (виставка) картин.
    answer: виставці
    options:
    - виставку
    - виставці
    - виставкою
  - sentence: Увечері ми всі разом підемо в ____ (кіно).
    answer: кіно
    options:
    - кіні
    - кіно
    - кіном
  - sentence: Мені найбільше подобається слухати ____ (музика).
    answer: музику
    options:
    - музика
    - музиці
    - музику
  - sentence: Я навіть трохи граю на ____ (гітара).
    answer: гітарі
    options:
    - гітару
    - гітарі
    - гітарою
workbook:
- id: unjumble-practice
  type: unjumble
  instruction: Складіть правильні речення зі слів
  items:
  - words:
    - захоплююся
    - Я
    - малюванням.
    - дуже
    correct_order:
    - Я
    - дуже
    - захоплююся
    - малюванням.
  - words:
    - в
    - кіно
    - Ходімо
    - вечері!
    - сьогодні
    correct_order:
    - Ходімо
    - в
    - кіно
    - сьогодні
    - вечері!
  - words:
    - на
    - Він
    - грає
    - гітарі.
    - гарно
    correct_order:
    - Він
    - гарно
    - грає
    - на
    - гітарі.
  - words:
    - у
    - вільний
    - Що
    - робиш
    - ти
    - час?
    correct_order:
    - Що
    - ти
    - робиш
    - у
    - вільний
    - час?
  - words:
    - йдемо
    - на
    - Ми
    - стадіон.
    - зараз
    correct_order:
    - Ми
    - зараз
    - йдемо
    - на
    - стадіон.
  - words:
    - не
    - Я
    - на
    - жаль,
    - можу.
    correct_order:
    - На
    - жаль,
    - я
    - не
    - можу.
- id: true-false-concepts
  type: true-false
  instruction: Визначте, чи правильне твердження (Правда чи Ні?)
  items:
  - statement: Дієслово «захоплюватися» вимагає використання Знахідного відмінка (Accusative).
    correct: false
    explanation: Дієслово «захоплюватися» вимагає Орудного відмінка (Instrumental).
  - statement: Коли ми говоримо про музичні інструменти, ми використовуємо «грати
      на».
    correct: true
    explanation: 'Так, наприклад: грати на гітарі, грати на фортепіано.'
  - statement: На запитання «Куди?» (Where to?) ми відповідаємо Місцевим відмінком
      (Locative).
    correct: false
    explanation: Для напрямку (Куди?) ми використовуємо Знахідний відмінок (Accusative).
  - statement: «Я йду в театр» означає рух до локації, а «Я в театрі» означає місцезнаходження.
    correct: true
    explanation: Перше речення відповідає на запитання «Куди?», друге — «Де?».
  - statement: Слово «ніколи» в українській мові використовується без частки «не».
    correct: false
    explanation: 'В українській мові ми використовуємо подвійне заперечення: «Я ніколи
      не граю».'
  - statement: Фраза «Чому б і ні?» використовується, щоб відмовитися від запрошення.
    correct: false
    explanation: Це фраза згоди, яка означає «Why not?» і показує, що ви приймаєте
      пропозицію.
