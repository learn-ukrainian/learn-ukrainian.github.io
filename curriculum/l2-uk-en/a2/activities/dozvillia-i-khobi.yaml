    items:
    - грати в теніс
    - грати у футбол
    - займатися плаванням
  - label: Мистецтво
    items:
    - класична музика
    - грати на гітарі
    - малювання
  - label: На природі
    items:
    - гуляти в парку
    - збирати гриби
    - кататися на лижах
  - label: У місті
    items:
    - ходити в кіно
    - йти на виставку
    - йти в театр
  title: Розподіліть види дозвілля за категоріями
- id: quiz-acc-loc
  type: quiz
  instruction: 'Оберіть правильний варіант: напрямок (куди?) чи місце (де?)'
  items:
  - question: Сьогодні ми йдемо ____.
    options:
    - в кіно
    - у кіні
    - на кіно
    - до кіно
    correct: 0
  - question: Я вже пів години чекаю тебе ____.
    options:
    - на стадіоні
    - на стадіон
    - у стадіон
    - у стадіоні
    correct: 0
  - question: Завтра я піду ____.
    options:
    - в басейн
    - в басейні
    - на басейн
    - на басейні
    correct: 0
  - question: Ми познайомилися ____ минулого року.
    options:
    - на виставці
    - на виставку
    - у виставку
    - у виставці
    correct: 0
  - question: У неділю вони хочуть піти ____.
    options:
    - в театр
    - в театрі
    - на театр
    - на театрі
    correct: 0
  - question: Він щодня тренується ____.
    options:
    - в басейні
    - у басейн
    - на басейні
    - на басейн
    correct: 0
  - question: Ти хочеш піти ____ на вихідних?
    options:
    - на концерт
    - на концерті
    - у концерт
    - у концерті
    correct: 0
  - question: Ми чудово провели час ____.
    options:
    - на концерті
    - на концерт
    - у концерті
    - у концерт
    correct: 0
  title: 'Оберіть правильний варіант: напрямок (куди?) чи місце (де?)'
- id: match-up-verb-govt
  type: match-up
  instruction: З'єднайте дієслово з правильною формою слова
  pairs:
  - left: захоплюватися
    right: малюванням
  - left: займатися
    right: спортом
  - left: цікавитися
    right: програмуванням
  - left: грати в
    right: теніс
  - left: грати на
    right: гітарі
  - left: ходити на
    right: виставку
  - left: йти в
    right: театр
  - left: кататися на
    right: лижах
  title: З'єднайте дієслово з правильною формою слова
- id: fill-in-hobbies-cases
  type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: Я дуже захоплююся ____.
    answer: фотографією
  - sentence: Мій друг активно займається ____.
    answer: спортом
  - sentence: Вона чудово грає на ____.
    answer: піаніно
  - sentence: У суботу ми йдемо в ____.
    answer: басейн
  - sentence: Чи ти вмієш грати в ____?
    answer: шахи
  - sentence: Вони хочуть піти на ____.
    answer: прогулянку
  - sentence: Моя бабуся цікавиться ____.
    answer: кулінарією
  - sentence: Взимку я люблю кататися на ____.
    answer: ковзанах
  title: Вставте іменник у правильній формі
workbook:
- type: quiz
  instruction: Оберіть слово з правильним наголосом
  items:
  - question: Який варіант правильний?
    options:
    - пла́вання
    - плава́ння
    - плаванн́я
    - плава́нн́я
    correct: 0
  - question: Який варіант правильний?
    options:
    - дозві́лля
    - до́звілля
    - дозвілля́
    - до́звілля́
    correct: 0
  - question: Який варіант правильний?
    options:
    - малюва́ння
    - ма́лювання
    - малю́вання
    - малюванн́я
    correct: 0
  - question: Який варіант правильний?
    options:
    - прогу́лянка
    - про́гулянка
    - прогуля́нка
    - прогулянка́
    correct: 0
  - question: Який варіант правильний?
    options:
    - ви́ставка
    - виста́вка
    - виставка́
    - вистав́ка
    correct: 0
  - question: Який варіант правильний?
    options:
    - змага́ння
    - зма́гання
    - змаганн́я
    - з́магання
    correct: 0
  title: Оберіть слово з правильним наголосом
- type: fill-in
  instruction: Вставте правильну форму дієслова в теперішньому часі
  items:
  - sentence: Я ____ малювати.
    answer: люблю
    options:
    - люблю
    - любиш
    - любить
  - sentence: Ми з друзями ____ у теніс щовихідних.
    answer: граємо
    options:
    - граю
    - граєш
    - граємо
  - sentence: Мій брат ____ спортом.
    answer: займається
    options:
    - займаюся
    - займається
    - займаємося
  - sentence: Що ти ____ у вільний час?
    answer: робиш
    options:
    - робиш
    - робить
    - роблю
  - sentence: Вони ____ сучасною музикою.
    answer: захоплюються
    options:
    - захоплюється
    - захоплюєшся
    - захоплюються
  - sentence: Ти часто ____ в кіно?
    answer: ходиш
    options:
    - ходжу
    - ходиш
    - ходить
  - sentence: Вона ____ кулінарією.
    answer: цікавиться
    options:
    - цікавлюся
    - цікавиться
    - цікавляться
  - sentence: Ви ____ на лижах взимку?
    answer: катаєтеся
    options:
    - катається
    - катаємося
    - катаєтеся
  title: Вставте правильну форму дієслова в теперішньому часі
- type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: I am passionate about drawing.
    options:
    - text: Я захоплююся малюванням.
      correct: true
    - text: Я цікавлюся малювати.
      correct: false
    - text: Я займаюся малюванню.
      correct: false
    - text: Мені найбільше подобається малюванням.
      correct: false
  - source: We are going to an exhibition.
    options:
    - text: Ми йдемо на виставку.
      correct: true
    - text: Ми йдемо на виставці.
      correct: false
    - text: Ми ходимо у виставку.
      correct: false
    - text: Ми на виставці.
      correct: false
  - source: Let's meet near the entrance.
    options:
    - text: Зустріньмося біля входу.
      correct: true
    - text: Зустрічаємо на входу.
      correct: false
    - text: Зустріньмося в входу.
      correct: false
    - text: Пограймо біля входу.
      correct: false
  - source: Do you want to go to a concert?
    options:
    - text: Хочеш піти на концерт?
      correct: true
    - text: Хочеш іти в концерт?
      correct: false
    - text: Ти йдеш на концерті?
      correct: false
    - text: Може підемо у концерт?
      correct: false
  - source: He plays the guitar well.
    options:
    - text: Він добре грає на гітарі.
      correct: true
    - text: Він добре грає в гітару.
      correct: false
    - text: Він добре грає гітарою.
      correct: false
    - text: Він добре грає на гітару.
      correct: false
  - source: Unfortunately, I can't.
    options:
    - text: На жаль, не можу.
      correct: true
    - text: На жаль, я вільний.
      correct: false
    - text: Із задоволенням.
      correct: false
    - text: Я — за!
      correct: false
  title: Оберіть правильний переклад
