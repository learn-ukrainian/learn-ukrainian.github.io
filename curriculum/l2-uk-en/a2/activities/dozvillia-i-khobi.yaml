- type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: What do you like to do in your free time?
    options:
    - text: Що ти любиш робити у вільний час?
      correct: true
    - text: Що ти робиш завжди?
      correct: false
    - text: Яке твоє хобі?
      correct: false
  - source: I am passionate about drawing.
    options:
    - text: Я захоплююся малюванням.
      correct: true
    - text: Я займаюся малюванням.
      correct: false
    - text: Я люблю малювати.
      correct: false
  - source: Let's go to the movies!
    options:
    - text: Ходімо в кіно!
      correct: true
    - text: Може, підемо в музей?
      correct: false
    - text: Я йду в кіно.
      correct: false
  - source: Maybe we'll go for a walk?
    options:
    - text: Може, підемо на прогулянку?
      correct: true
    - text: Хочеш піти на виставку?
      correct: false
    - text: Давай пограємо в теніс!
      correct: false
  - source: With pleasure!
    options:
    - text: З задоволенням!
      correct: true
    - text: Чудова ідея!
      correct: false
    - text: Я — за!
      correct: false
  - source: At what time?
    options:
    - text: О котрій?
      correct: true
    - text: Де зустрінемося?
      correct: false
    - text: Коли ми йдемо?
      correct: false
- type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Дієслова «займатися» та «захоплюватися» вимагають орудного відмінка
      (Instrumental case).
    correct: true
    explanation: 'Так, наприклад: займатися спортом, захоплюватися музикою.'
  - statement: Коли ми говоримо про музичні інструменти, ми використовуємо «грати
      в».
    correct: false
    explanation: Для інструментів ми використовуємо «грати на» + місцевий відмінок.
  - statement: Фраза «Я йду в театр» означає напрямок руху (Accusative case).
    correct: true
    explanation: Так, для напрямку руху використовується знахідний відмінок.
  - statement: Для регулярних занять часто використовують дієслово «ходити».
    correct: true
    explanation: 'Так, наприклад: я ходжу в басейн щовівторка.'
  - statement: Фраза «О котрій?» використовується, щоб запитати про місце зустрічі.
    correct: false
    explanation: Ця фраза означає «At what time?». Про місце запитують «Де зустрінемося?».
  - statement: Слово «обожнювати» показує дуже сильну любов до якогось заняття.
    correct: true
    explanation: Так, це означає «to adore».
