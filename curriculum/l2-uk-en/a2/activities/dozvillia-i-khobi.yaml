    - футбол
    - теніс
  - label: Мистецтво
    items:
    - малювання
    - музика
    - виставка
  - label: На природі
    items:
    - ліс
    - озеро
    - гори
  - label: У місті
    items:
    - кіно
    - театр
    - музей
- id: fill-in-hobbies-cases
  type: fill-in
  instruction: Вставте слово в правильному відмінку
  items:
  - sentence: Я дуже захоплююся ____.
    answer: плаванням
    options:
    - плавання
    - плаванню
    - плаванням
  - sentence: Мій брат активно займається ____.
    answer: спортом
    options:
    - спорт
    - спортом
    - спорту
  - sentence: У неділю ми йдемо на ____.
    answer: виставку
    options:
    - виставку
    - виставка
    - виставці
  - sentence: Завтра я піду в ____.
    answer: басейн
    options:
    - басейн
    - басейні
    - басейном
  - sentence: Моя сестра часто грає в ____.
    answer: теніс
    options:
    - теніс
    - тенісі
    - тенісом
  - sentence: Моя подруга чудово грає на ____.
    answer: гітарі
    options:
    - гітара
    - гітару
    - гітарі
  - sentence: Взимку ми любимо кататися на ____.
    answer: лижах
    options:
    - лижі
    - лижах
    - лижами
  - sentence: Щовихідних вони ходять у ____.
    answer: парк
    options:
    - парк
    - парку
    - парком
- id: quiz-acc-loc
  type: quiz
  instruction: Оберіть правильний варіант (Знахідний чи Місцевий відмінок?)
  items:
  - question: Куди ти йдеш? — Я йду в ____.
    options:
    - театр
    - театрі
    - театру
    - театром
    correct: 0
  - question: Де твій брат? — Він зараз у ____.
    options:
    - театр
    - театрі
    - театру
    - театром
    correct: 1
  - question: Куди ми йдемо ввечері? — Ми йдемо на ____.
    options:
    - концерт
    - концерті
    - концерту
    - концертом
    correct: 0
  - question: Де ви були вчора? — Ми були на ____.
    options:
    - концерт
    - концерті
    - концерту
    - концертом
    correct: 1
  - question: Куди вона йде? — Вона йде на ____.
    options:
    - виставка
    - виставку
    - виставці
    - виставкою
    correct: 1
  - question: Де ми зустрінемося? — Зустрінемося на ____.
    options:
    - виставка
    - виставку
    - виставці
    - виставкою
    correct: 2
  - question: Куди вони їдуть? — Вони їдуть на ____.
    options:
    - змагання
    - змаганні
    - змаганню
    - змаганням
    correct: 0
  - question: Де вона плаває? — Вона вже в ____.
    options:
    - басейн
    - басейні
    - басейну
    - басейном
    correct: 1
- id: match-up-verb-govt
  type: match-up
  instruction: З'єднайте дієслово з правильним продовженням
  pairs:
  - left: захоплюватися
    right: малюванням
  - left: грати в
