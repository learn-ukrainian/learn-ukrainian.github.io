- type: group-sort
  title: "Розподіліть за суфіксами"
  instruction: "Розподіліть слова за тим, який суфікс вони використовують для утворення прикметника."
  groups:
    - name: "Суфікс -ян- (Природні)"
      items:
        - "дерево"
        - "скло"
        - "вовна"
        - "глина"
    - name: "Суфікс -ов- (Промислові)"
      items:
        - "пластик"
        - "метал"
        - "дуб"
        - "гума"

- type: fill-in
  title: "Вставте правильний матеріал"
  instruction: "Оберіть правильний прикметник, щоб доповнити речення."
  items:
    - sentence: "На столі стоїть красива _____ пляшка."
      answer: "скляна"
      options:
        - "скляна"
        - "дерев'яна"
        - "металева"
        - "пластикова"
    - sentence: "Мій дідусь зробив міцний _____ стіл."
      answer: "дерев'яний"
      options:
        - "дерев'яний"
        - "скляний"
        - "вовняний"
        - "паперовий"
    - sentence: "Взимку я завжди ношу теплий _____ светр."
      answer: "вовняний"
      options:
        - "вовняний"
        - "скляний"
        - "залізний"
        - "пластиковий"
    - sentence: "У нашому будинку стоять нові _____ двері."
      answer: "залізні"
      options:
        - "залізні"
        - "вовняні"
        - "скляні"
        - "паперові"
    - sentence: "Ми купили дешевий _____ посуд для пікніка."
      answer: "пластиковий"
      options:
        - "пластиковий"
        - "дерев'яний"
        - "скляний"
        - "залізний"
    - sentence: "Я люблю пити сік через _____ трубочку."
      answer: "металеву"
      options:
        - "металеву"
        - "вовняну"
        - "дерев'яну"
        - "залізну"
    - sentence: "Майстер вирізав фігурку, і це справжня _____ забавка."
      answer: "дерев'яна"
      options:
        - "дерев'яна"
        - "скляна"
        - "залізна"
        - "пластикова"
    - sentence: "Цей карпатський ліжник дуже теплий, бо він _____."
      answer: "вовняний"
      options:
        - "вовняний"
        - "скляний"
        - "дубовий"
        - "залізний"

- type: quiz
  title: "Перевірте граматичні знання"
  instruction: "Дайте відповідь на запитання про правила утворення прикметників."
  items:
    - question: "Який суфікс ми зазвичай використовуємо для традиційних природних матеріалів?"
      explanation: "Для природних матеріалів, таких як скло чи дерево, найчастіше використовується суфікс -ян-."
      options:
        - text: "-ян-"
          correct: true
        - text: "-ов-"
          correct: false
        - text: "-ев-"
          correct: false
        - text: "-ськ-"
          correct: false
    - question: "Як правильно утворити прикметник походження від слова Прага?"
      explanation: "Кінцевий звук г змінюється на зьк при додаванні суфікса -ськ-."
      options:
        - text: "празький"
          correct: true
        - text: "прагський"
          correct: false
        - text: "пражський"
          correct: false
        - text: "працький"
          correct: false
    - question: "До якої групи чергування належить кінцевий звук у слові Галич?"
      explanation: "Звуки к, ч, ц при утворенні прикметників змінюються на -цьк-."
      options:
        - text: "змінюється на -цьк-"
          correct: true
        - text: "змінюється на -зьк-"
          correct: false
        - text: "змінюється на -ськ-"
          correct: false
        - text: "не змінюється взагалі"
          correct: false
    - question: "Чому ми говоримо домашній замість домашний в українській мові?"
      explanation: "Слово домашній має історично м'яке закінчення -ій, що є винятком."
      options:
        - text: "тому що це виняток із м'яким закінченням"
          correct: true
        - text: "тому що там є прихований суфікс -ян-"
          correct: false
        - text: "тому що це новий індустріальний матеріал"
          correct: false
        - text: "тому що це назва стародавнього міста"
          correct: false
    - question: "Який прикметник походження від назви міста утворений неправильно?"
      explanation: "Правильна форма — козацький, оскільки звук к переходить у -цьк-."
      options:
        - text: "козакський"
          correct: true
        - text: "одеський"
          correct: false
        - text: "київський"
          correct: false
        - text: "паризький"
          correct: false
    - question: "Який природний матеріал є основою для справжнього гуцульського ліжника?"
      explanation: "Ліжник традиційно виготовляють із натуральної овечої вовни."
      options:
        - text: "овеча вовна"
          correct: true
        - text: "дерево осики"
          correct: false
        - text: "натуральна глина"
          correct: false
        - text: "тверде залізо"
          correct: false
    - question: "Як правильно утворити прикметник походження від назви міста Одеса?"
      explanation: "Звук с належить до третьої групи і плавно переходить у -ськ-."
      options:
        - text: "одеський"
          correct: true
        - text: "одезький"
          correct: false
        - text: "одецький"
          correct: false
        - text: "одесський"
          correct: false
    - question: "Що означає популярне українське словосполучення домашній затишок у повсякденному житті?"
      explanation: "Домашній затишок означає комфорт, тепло та спокій у власному домі."
      options:
        - text: "комфорт і спокій у домі"
          correct: true
        - text: "складне домашнє завдання"
          correct: false
        - text: "улюблена хатня тварина"
          correct: false
        - text: "великий дерев'яний будинок"
          correct: false

- type: unjumble
  title: "Складіть речення з прикметниками"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити граматично правильні речення."
  items:
    - words: ["У", "Карпатах", "ми", "купили", "теплий", "вовняний", "ліжник"]
      answer: "У Карпатах ми купили теплий вовняний ліжник"
    - words: ["Ця", "дерев'яна", "забавка", "дуже", "подобається", "мені"]
      answer: "Ця дерев'яна забавка дуже подобається мені"
    - words: ["Я", "обожнюю", "справжній", "київський", "торт", "із", "чаєм"]
      answer: "Я обожнюю справжній київський торт із чаєм"
    - words: ["На", "столі", "стоїть", "велика", "скляна", "пляшка", "води"]
      answer: "На столі стоїть велика скляна пляшка води"
    - words: ["Наш", "сусід", "встановив", "нові", "міцні", "залізні", "двері"]
      answer: "Наш сусід встановив нові міцні залізні двері"
    - words: ["Після", "роботи", "я", "дуже", "ціную", "домашній", "затишок"]
      answer: "Після роботи я дуже ціную домашній затишок"

- type: error-correction
  title: "Виправте помилки чергування та суфіксів"
  instruction: "Знайдіть неправильне слово у реченні та оберіть правильний варіант."
  items:
    - sentence: "Я купив дуже смачний прагський торт у центрі."
      error: "прагський"
      answer: "празький"
      options:
        - "празький"
        - "пражський"
        - "працький"
        - "праський"
      explanation: "Після літери г у слові Прага обов'язково використовуємо суфікс -зьк-."
    - sentence: "У нас вдома є великий деревовий стіл для гостей."
      error: "деревовий"
      answer: "дерев'яний"
      options:
        - "дерев'яний"
        - "деревний"
        - "деревий"
        - "деревіний"
      explanation: "Для традиційних природних матеріалів, як дерево, використовується суфікс -ян-."
    - sentence: "Це дуже теплий вовновий светр на зиму."
      error: "вовновий"
      answer: "вовняний"
      options:
        - "вовняний"
        - "вовнений"
        - "вовнський"
        - "вовний"
      explanation: "Від слова вовна утворюється правильний прикметник вовняний."
    - sentence: "Ми пили каву з нових склових склянок."
      error: "склових"
      answer: "скляних"
      options:
        - "скляних"
        - "скліних"
        - "склових"
        - "скляним"
      explanation: "Природний матеріал скло утворює прикметник за допомогою суфікса -ян-."
    - sentence: "Мені дуже подобається цей швидкий козакський танець."
      error: "козакський"
      answer: "козацький"
      options:
        - "козацький"
        - "козазький"
        - "козачий"
        - "козаський"
      explanation: "Після літери к у слові козак завжди використовуємо суфікс -цьк-."
    - sentence: "На вулиці стоїть новий пластикний стіл для кафе."
      error: "пластикний"
      answer: "пластиковий"
      options:
        - "пластиковий"
        - "пластичний"
        - "пластиків"
        - "пластиком"
      explanation: "Для сучасних матеріалів використовуємо суфікс -ов-."

