version: '1.0'
module: instrumental-means
level: a2
inline:
- id: fill-in-tool-singular
  type: fill-in
  instruction: Вставте правильну форму слова (Орудний відмінок однини)
  items:
  - sentence: Я пишу синьою _____.
    answer: ручкою
    options:
    - ручкою
    - ручка
    - ручку
    - ручці
  - sentence: Мій брат малює _____.
    answer: олівцем
    options:
    - олівцем
    - олівець
    - олівця
    - олівцю
  - sentence: Кухар ріже м'ясо гострим _____.
    answer: ножем
    options:
    - ножем
    - ніж
    - ножа
    - ножу
  - sentence: Я їм суп великою _____.
    answer: ложкою
    options:
    - ложкою
    - ложка
    - ложку
    - ложці
  - sentence: Учень вимірює папір _____.
    answer: лінійкою
    options:
    - лінійкою
    - лінійка
    - лінійку
    - лінійці
  - sentence: Вона миє руки _____.
    answer: милом
    options:
    - милом
    - мило
    - мила
    - милу
  - sentence: Мама посипає салат _____.
    answer: сіллю
    options:
    - сіллю
    - сіль
    - солі
    - сіллу
  - sentence: Вчитель пише на дошці червоним _____.
    answer: маркером
    options:
    - маркером
    - маркер
    - маркера
    - маркеру
- id: match-up-transport
  type: match-up
  instruction: З'єднайте вид транспорту з формою Орудного відмінка
  pairs:
  - left: автобус
    right: автобусом
  - left: потяг
    right: потягом
  - left: літак
    right: літаком
  - left: трамвай
    right: трамваєм
  - left: машина
    right: машиною
  - left: метро
    right: метро
  - left: таксі
    right: таксі
  - left: корабель
    right: кораблем
- id: quiz-companion-choice
  type: quiz
  instruction: 'Оберіть правильний варіант: знаряддя (без прийменника) чи супутник
    (з прийменником ''з'')'
  items:
  - question: Я пишу _____
    options:
    - ручкою
    - з ручкою
    - ручка
    - ручку
    correct: 0
  - question: Він гуляє в парку _____
    options:
    - собакою
    - з собакою
    - собака
    - собаку
    correct: 1
  - question: Студент їде в університет _____
    options:
    - автобусом
    - з автобусом
    - автобус
    - автобуса
    correct: 0
  - question: Ми йдемо в кіно _____
    options:
    - другом
    - з другом
    - друг
    - друга
    correct: 1
  - question: Вона малює картину _____
    options:
    - пензлем
    - з пензлем
    - пензель
    - пензля
    correct: 0
  - question: Брат грає в теніс _____
    options:
    - сестрою
    - із сестрою
    - сестра
    - сестру
    correct: 1
  - question: Кухар ріже м'ясо _____
    options:
    - ножем
    - з ножем
    - ніж
    - ножа
    correct: 0
  - question: Ми подорожуємо до Києва _____
    options:
    - батьками
    - з батьками
    - батьки
    - батьків
    correct: 1
- id: group-sort-categories
  type: group-sort
  instruction: 'Розподіліть речення за категоріями: де Орудний відмінок позначає засіб,
    а де супутника?'
  groups:
  - label: Знаряддя або засіб (без прийменника)
    items:
    - Я пишу синьою ручкою.
    - Він їде на роботу трамваєм.
    - Ми малюємо фарбами.
    - Вона відчиняє двері ключем.
  - label: Супутник (із прийменником 'з')
    items:
    - Я йду в кіно з другом.
    - Вона часто гуляє з собакою.
    - Ми подорожуємо з батьками.
    - Він працює з новим колегою.
workbook:
- id: wb-translate-sentences
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I am writing with a pen.
    options:
    - text: Я пишу ручкою.
      correct: true
    - text: Я пишу з ручкою.
      correct: false
    - text: Я пишу ручка.
      correct: false
    - text: Я пишу ручку.
      correct: false
  - source: He is traveling by train.
    options:
    - text: Він їде потягом.
      correct: true
    - text: Він їде з потягом.
      correct: false
    - text: Він їде потяг.
      correct: false
    - text: Він їде потягу.
      correct: false
  - source: We are walking on foot.
    options:
    - text: Ми йдемо пішки.
      correct: true
    - text: Ми йдемо ногою.
      correct: false
    - text: Ми йдемо ногами.
      correct: false
    - text: Ми йдемо з ногами.
      correct: false
  - source: They cut paper with scissors.
    options:
    - text: Вони ріжуть папір ножицями.
      correct: true
    - text: Вони ріжуть папір з ножицями.
      correct: false
    - text: Вони ріжуть папір ножиці.
      correct: false
    - text: Вони ріжуть папір ножицях.
      correct: false
  - source: I am going to the park with a friend.
    options:
    - text: Я йду в парк з другом.
      correct: true
    - text: Я йду в парк другом.
      correct: false
    - text: Я йду в парк друга.
      correct: false
    - text: Я йду в парк другу.
      correct: false
  - source: The artist paints with a brush.
    options:
    - text: Художник малює пензлем.
      correct: true
    - text: Художник малює з пензлем.
      correct: false
    - text: Художник малює пензель.
      correct: false
    - text: Художник малює пензлю.
      correct: false
- id: wb-error-correction-plural
  type: error-correction
  instruction: Знайдіть і виправте помилку у формі множини Орудного відмінка
  items:
  - sentence: Діти малюють новими фарбими.
    error: фарбими
    correction: фарбами
    error_type: word
    options:
    - фарбами
    - фарбом
    - фарбома
    explanation: У множині тверда основа має закінчення -ами.
  - sentence: Ми їмо рис паличкями.
    error: паличкями
    correction: паличками
    error_type: word
    options:
    - паличками
    - паличкем
    - палички
    explanation: Після твердого приголосного 'к' пишемо -ами.
  - sentence: Він пише синіми олівцямими.
    error: олівцямими
    correction: олівцями
    error_type: word
    options:
    - олівцями
    - олівцям
    - олівці
    explanation: Правильне закінчення для м'якої основи у множині — -ями.
  - sentence: Фермери працюють рукими.
    error: рукими
    correction: руками
    error_type: word
    options:
    - руками
    - рукома
    - рукам
    explanation: Від слова 'рука' форма множини — 'руками'.
  - sentence: Туристи подорожують великими автобусіми.
    error: автобусіми
    correction: автобусами
    error_type: word
    options:
    - автобусами
    - автобусьми
    - автобусом
    explanation: Тверда основа 'автобус' отримує закінчення -ами.
  - sentence: Вона ріже папір ножицям.
    error: ножицям
    correction: ножицями
    error_type: word
    options:
    - ножицями
    - ножицям
    - ножицях
    explanation: Множинний іменник 'ножиці' має закінчення -ями.
- id: wb-odd-one-out-logic
  type: odd-one-out
  instruction: Оберіть слово, що не належить до групи за логікою або граматикою
  items:
  - words:
    - потяг
    - літак
    - автобус
    - ніж
    correct: 3
    explanation: '''Ніж'' — це інструмент, а не транспорт.'
  - words:
    - ручка
    - олівець
    - пензель
    - трамвай
    correct: 3
    explanation: '''Трамвай'' — це транспорт, а інші — засоби для письма чи малювання.'
  - words:
    - метро
    - таксі
    - кіно
    - трамваєм
    correct: 3
    explanation: '''Трамваєм'' змінює свою форму (Орудний відмінок), а інші слова
      — незмінювані.'
  - words:
    - ножиці
    - двері
    - гроші
    - машина
    correct: 3
    explanation: '''Машина'' має форму однини, а інші слова існують тільки у множині
      (pluralia tantum).'
  - words:
    - маркером
    - олівцем
    - лінійкою
    - з другом
    correct: 3
    explanation: '''З другом'' позначає супутника і вживається з прийменником, інші
      — знаряддя без прийменника.'
  - words:
    - рушає
    - відбуває
    - вирушає
    - відправляється
    correct: 3
    explanation: '''Відправляється'' — це лексична помилка (русизм) при описі руху
      транспорту.'
