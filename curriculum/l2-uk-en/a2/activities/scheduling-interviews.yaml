    right: зарплата
  instruction: З'єднайте відповідні елементи.
- type: quiz
  title: 'Перевірте знання: Професійний етикет'
  items:
  - question: Який займенник потрібно використовувати на офіційній співбесіді в Україні?
    explanation: На співбесіді завжди суворо використовується формальне Ви.
    options:
    - text: тільки формальне Ви
      correct: true
    - text: тільки неформальне ти
      correct: false
    - text: можна використовувати обидва
      correct: false
    - text: це не має значення
      correct: false
  - question: Коли ви можете безпечно перейти на неформальне ти під час співбесіди?
    explanation: Переходити на ти можна тільки після того, як це запропонує старший
      менеджер.
    options:
    - text: тільки коли менеджер запропонує
      correct: true
    - text: через п'ять хвилин після початку
      correct: false
    - text: якщо ви одного віку з менеджером
      correct: false
    - text: наприкінці вашої ділової зустрічі
      correct: false
  - question: Як правильно і ввічливо звернутися до менеджера на ім'я Іван?
    explanation: В українській мові використовується поважне слово Пан разом з ім'ям
      або прізвищем.
    options:
    - text: Пане Іване
      correct: true
    - text: Містере Іване
      correct: false
    - text: Товаришу Іване
      correct: false
    - text: Просто Іване
      correct: false
  - question: Що в Україні традиційно вважається великою академічною перевагою кандидата?
    explanation: Диплом про вищу освіту дуже високо цінується на українському ринку
      праці.
    options:
    - text: диплом про вищу університетську освіту
      correct: true
    - text: відсутність будь-якого досвіду роботи
      correct: false
    - text: тільки знання англійської мови
      correct: false
    - text: неформальний і яскравий стиль одягу
      correct: false
  - question: Скільки днів зазвичай триває стандартна щорічна відпустка в Україні?
    explanation: Стандартна оплачувана відпустка в Україні триває двадцять чотири
      календарні дні.
    options:
    - text: двадцять чотири дні
      correct: true
    - text: десять робочих днів
      correct: false
    - text: чотирнадцять днів
      correct: false
    - text: тридцять днів
      correct: false
  - question: Яке слово означає важке фізичне зусилля або філософське поняття?
    explanation: Слово праця має значення важкого зусилля, ми не шукаємо працю на
      сайтах.
    options:
    - text: праця
      correct: true
    - text: робота
      correct: false
    - text: вакансія
      correct: false
    - text: посада
      correct: false
  - question: Скільки місяців зазвичай триває випробувальний термін у багатьох великих
      компаніях?
    explanation: Зазвичай випробувальний термін у компаніях триває рівно три місяці.
    options:
    - text: три місяці
      correct: true
    - text: один тиждень
      correct: false
    - text: один рік
      correct: false
    - text: шість місяців
      correct: false
  - question: Що обов'язково пропонують усі надійні роботодавці своїм новим працівникам?
    explanation: Надійні міжнародні та українські компанії гарантують хороший соціальний
      пакет.
    options:
    - text: повний соціальний пакет
      correct: true
    - text: дуже низьку зарплату
      correct: false
    - text: коротку відпустку без оплати
      correct: false
    - text: абсолютну відсутність графіка
      correct: false
