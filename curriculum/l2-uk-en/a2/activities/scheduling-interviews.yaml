    right: співбесіда
  - left: документ про вашу освіту та досвід роботи
    right: резюме
  - left: вільне робоче місце в сучасній компанії
    right: вакансія
  - left: людина, яка активно шукає нову роботу
    right: кандидат
  - left: ваші регулярні щоденні робочі завдання
    right: обов'язки
  - left: те, що ви вмієте робити дуже добре
    right: навички
  - left: ваші попередні місця роботи та знання
