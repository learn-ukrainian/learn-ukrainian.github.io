  text: Мій брат працює успішним програмістом у компанії. Його дружина вже п'ять років
    працює шкільною вчителькою. Їхній батько був дуже відомим лікарем, а мати успішно
    працювала кравчинею. Я зараз також працюю фінансовим аналітиком.
  answers:
