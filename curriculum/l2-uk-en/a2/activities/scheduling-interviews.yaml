  title: Доповніть популярні професійні словосполучення
  items:
  - sentence: Я хочу ____ своє нове детальне резюме в цю фінансову компанію.
    answer: надіслати
    options:
    - надіслати
    - пройти
    - призначити
    - виплачувати
    explanation: Резюме можна надіслати або написати вдома.
  - sentence: Менеджер хоче офіційно ____ співбесіду на завтрашній сонячний ранок.
    answer: призначити
    options:
    - призначити
    - надіслати
    - пройти
    - шукати
    explanation: Співбесіду призначають на конкретний день або час.
  - sentence: Олена дуже швидко і успішно ____ складну співбесіду в банку.
    answer: пройшла
    options:
    - пройшла
    - написала
    - виплатила
    - запросила
    explanation: Кандидат завжди проходить співбесіду в офісі.
  - sentence: Міжнародна компанія має ____ вакансію для нових молодих спеціалістів.
    answer: відкриту
    options:
    - відкриту
    - високу
    - середню
    - довгу
    explanation: Вакансія завжди може бути відкритою для кандидатів.
  - sentence: Надійні компанії обов'язково пропонують хороший соціальний ____.
    answer: пакет
    options:
    - пакет
    - графік
    - досвід
    - термін
    explanation: 'Сталий вираз: медичне страхування — це соціальний пакет.'
  - sentence: Кожен новий працівник має обов'язковий випробувальний ____.
    answer: термін
    options:
    - термін
    - пакет
    - графік
    - досвід
    explanation: Час перевірки ваших навичок називається випробувальний термін.
  - sentence: Я маю досить великий ____ роботи з різними міжнародними проєктами.
    answer: досвід
    options:
    - досвід
    - пакет
    - термін
    - графік
    explanation: 'Сталий професійний вираз: мати досвід роботи.'
  - sentence: 'Мій ____ роботи зараз дуже зручний: з дев''ятої ранку до шостої вечора.'
