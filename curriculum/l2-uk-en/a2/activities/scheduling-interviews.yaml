    - лікарем як
    - лікару
    explanation: Слово як тут повністю зайве. Ми використовуємо Орудний відмінок без
      прийменників.
  - sentence: Вона завжди мріяла працювати як телевізійна журналістка.
    error: як телевізійна журналістка
