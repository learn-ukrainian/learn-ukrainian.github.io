  - sentence: Мій дядько щодня працює шкільним ____.
    answer: водієм
    options:
    - водієм
    - водійом
    - водій
    - водію
    explanation: Слово водій закінчується на й, тому додаємо -єм.
  - sentence: Я хочу працювати талановитим ____ у новій ІТ компанії.
