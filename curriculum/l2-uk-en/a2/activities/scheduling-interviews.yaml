    explanation: Після твердого приголосного т додаємо закінчення -ом.
  - sentence: Він довго працював фінансовим ____ у міжнародному банку.
    answer: аналітиком
    options:
    - аналітиком
    - аналітиком
    - аналітик
    - аналітику
    explanation: Після твердого приголосного к додаємо закінчення -ом.
  - sentence: Мій друг з дитинства мріє працювати відомим ____.
    answer: журналістом
    options:
    - журналістом
