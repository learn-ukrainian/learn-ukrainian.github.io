version: '1.0'
module: work-and-food
level: a2
inline:
- id: match-professions
  type: match-up
  instruction: З'єднайте питання про професію з правильною відповіддю в орудному відмінку
  pairs:
  - left: Ким ти працюєш у школі?
    right: Я працюю вчителькою.
  - left: Ким працює твій брат у ресторані?
    right: Він працює кухарем.
  - left: Хто твоя сестра за фахом?
    right: Вона працює журналісткою.
  - left: Ким ти мріяв стати в дитинстві?
    right: Я мріяв стати пілотом.
  - left: Хто твій друг за фахом?
    right: Він працює програмістом.
  - left: Ким працює твоя мама?
    right: Вона працює лікаркою.
  - left: Ким ти хочеш працювати після університету?
    right: Я хочу працювати дизайнером.
  - left: Ким працює твій батько на будівництві?
    right: Він працює будівельником.
- id: fill-in-complete-a-recipe-description-for-varenyky-with-correct-instrumental-forms-for-tools-and-ingredients
  type: fill-in
  instruction: Вставте правильні слова (інгредієнти та інструменти), щоб доповнити
    рецепт вареників
  items:
  - sentence: Сьогодні ми готуємо українські вареники з _____.
    answer: картоплею
    options:
    - картоплею
    - картопля
    - картоплі
  - sentence: Спочатку ми чистимо картоплю гострим _____.
    answer: ножем
    options:
    - ножем
    - ніж
    - ножу
  - sentence: Потім ми змішуємо гарячу картоплю з _____.
    answer: сіллю
    options:
    - сіллю
    - сіль
    - солі
  - sentence: Я роблю тісто великою _____.
    answer: ложкою
    options:
    - ложкою
    - ложка
    - ложці
  - sentence: Ми їмо готові вареники _____.
    answer: виделкою
    options:
    - виделкою
    - виделка
    - виделці
  - sentence: Ми подаємо вареники зі _____ та шкварками.
    answer: сметаною
    options:
    - сметаною
    - сметана
    - сметану
  - sentence: Також ми робимо свіжий салат з _____.
    answer: помідорами
    options:
    - помідорами
    - помідори
    - помідорах
  - sentence: Ми заправляємо салат _____.
    answer: олією
    options:
    - олією
    - олія
    - олії
- id: quiz-identify-which-instrumental-function-tool-companion-profession-spatial-transport-is-used-in-each-sentence
  type: quiz
  instruction: Яку функцію виконує орудний відмінок у цьому реченні?
  items:
  - question: Мій брат працює програмістом.
    options:
    - Професія
    - Інструмент
    - Транспорт
    - Місце
    correct: 0
  - question: Я ріжу помідор гострим ножем.
    options:
    - Компаньйон
    - Інструмент
    - Транспорт
    - Хобі
    correct: 1
  - question: Вона їде на нараду метро.
    options:
    - Професія
    - Місце
    - Транспорт
    - Інструмент
    correct: 2
  - question: Ми обідаємо з новим колегою.
    options:
    - Професія
    - Інструмент
    - Компаньйон
    - Місце
    correct: 2
  - question: Мій кабінет розташований над кав'ярнею.
    options:
    - Професія
    - Місце
    - Транспорт
    - Компаньйон
    correct: 1
  - question: Марина захоплюється фотографією.
    options:
    - Хобі (інтерес)
    - Інструмент
    - Транспорт
    - Місце
    correct: 0
  - question: Ми постійно мішаємо суп ложкою.
    options:
    - Професія
    - Компаньйон
    - Транспорт
    - Інструмент
    correct: 3
  - question: Ввечері він часто гуляє зі старими друзями.
    options:
    - Хобі (інтерес)
    - Інструмент
    - Компаньйон
    - Місце
    correct: 2
- id: true-false-judge-whether-sentences-about-a-workday-use-correct-instrumental-forms-for-transport-and-prepositions
  type: true-false
  instruction: Чи правильно використаний орудний відмінок у цих реченнях про робочий
    день?
  items:
  - statement: Я щодня їду на роботу автобусом.
    correct: true
    explanation: Транспорт виражається орудним відмінком без прийменника (їхати чим?).
  - statement: Ми з братом часто їдемо метро.
    correct: true
    explanation: Слово «метро» не змінюється в українській мові.
  - statement: Моя машина стоїть перед офісу.
    correct: false
    explanation: 'Прийменник «перед» вимагає орудного відмінка: перед офісом.'
  - statement: Ми п'ємо каву з молоком і цукром.
    correct: true
    explanation: Прийменник «з» вимагає орудного відмінка (з чим?).
  - statement: Я обідаю з мій новий колега.
    correct: false
    explanation: 'Потрібно змінити прикметник і іменник: з моїм новим колегою.'
  - statement: Мій стіл стоїть між вікном і дверима.
    correct: true
    explanation: Прийменник «між» вимагає орудного відмінка.
  - statement: Годинник висить над стола.
    correct: false
    explanation: 'Прийменник «над» вимагає орудного відмінка: над столом.'
  - statement: Сестра їде на роботу велосипедом.
    correct: true
    explanation: Транспорт виражається орудним відмінком (чим?).
workbook:
- type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Я працюю дизайнер.
    error: дизайнер
    correction: дизайнером
    error_type: word
    options:
    - дизайнером
    - дизайнера
    - дизайнеру
    explanation: Дієслово «працювати» вимагає орудного відмінка (ким?).
  - sentence: Ми їмо суп ложка.
    error: ложка
    correction: ложкою
    error_type: word
    options:
    - ложкою
    - ложку
    - ложці
    explanation: Інструмент виражається орудним відмінком (чим?).
  - sentence: Він цікавиться спорт.
    error: спорт
    correction: спортом
    error_type: word
    options:
    - спортом
    - спорту
    - спорті
    explanation: Дієслово «цікавитися» вимагає орудного відмінка (чим?).
  - sentence: Я п'ю чай з лимон.
    error: лимон
    correction: лимоном
    error_type: word
    options:
    - лимоном
    - лимону
    - лимоні
    explanation: Прийменник «з» (with) вимагає орудного відмінка.
  - sentence: Марина працює вчителька.
    error: вчителька
    correction: вчителькою
    error_type: word
    options:
    - вчителькою
    - вчительку
    - вчительці
    explanation: Дієслово «працювати» вимагає орудного відмінка (ким?).
  - sentence: Ми ріжемо хліб ніж.
    error: ніж
    correction: ножем
    error_type: word
    options:
    - ножем
    - ножа
    - ножу
    explanation: Інструмент виражається орудним відмінком (чим?).
