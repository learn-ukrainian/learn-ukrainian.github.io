- type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я працюю кухар у ресторані.
    error: кухар
    correction: кухарем
    error_type: word
    options:
    - кухарем
    - кухарю
    - кухаром
    - кухарі
    explanation: Після дієслова «працювати» професія завжди стоїть в орудному відмінку.
  - sentence: Вона їсть вареники виделка.
    error: виделка
    correction: виделкою
    error_type: word
    options:
    - виделкою
    - виделку
    - виделці
    - виделок
    explanation: Інструмент, яким виконується дія, має бути в орудному відмінку.
  - sentence: Мій тато захоплюється спорт.
    error: спорт
    correction: спортом
    error_type: word
    options:
    - спортом
    - спорту
    - спорті
    - спорти
    explanation: Дієслово «захоплюватися» вимагає орудного відмінка.
  - sentence: Ми п'ємо чай з мед.
    error: мед
    correction: медом
    error_type: word
    options:
    - медом
    - меду
    - меді
    - меда
    explanation: Прийменник «з» (разом з) вимагає орудного відмінка.
  - sentence: Машина стоїть за офіс.
    error: офіс
    correction: офісом
    error_type: word
    options:
    - офісом
    - офісу
    - офісі
    - офіси
    explanation: Прийменник простору «за» вимагає орудного відмінка.
  - sentence: Він щодня їде на роботу автобус.
    error: автобус
    correction: автобусом
    error_type: word
    options:
    - автобусом
    - автобусу
    - автобусі
    - автобуси
    explanation: Засіб пересування передається орудним відмінком без прийменника.
