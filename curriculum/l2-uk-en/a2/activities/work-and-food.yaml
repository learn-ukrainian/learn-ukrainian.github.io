version: '1.0'
module: work-and-food
level: a2
inline:
- id: match-professions
  type: match-up
  instruction: З'єднайте запитання з правильною відповіддю
  pairs:
  - left: Ким ти працюєш у ресторані?
    right: Я працюю кухарем.
  - left: Ким працює твоя сестра в школі?
    right: Вона працює вчителькою.
  - left: Хто ти за фахом?
    right: Я працюю менеджером.
  - left: Ким мріє стати твій брат?
    right: Він мріє стати програмістом.
  - left: Ким працює Анна в салоні краси?
    right: Вона працює перукарем.
  - left: Ким ти хотів стати в дитинстві?
    right: Я хотів стати лікарем.
  - left: Ким працює твій тато на будівництві?
    right: Він працює будівельником.
  - left: Ким працює Марія в магазині?
    right: Вона працює продавцем.
- id: recipe-fill-in
  type: fill-in
  instruction: Вставте правильну форму слова в орудному відмінку
  items:
  - sentence: Ми ріжемо свіжий огірок гострим _____.
    answer: ножем
    options:
    - ножем
    - ніжем
    - ножом
    - ніжом
  - sentence: Вона мішає салат великою _____.
    answer: ложкою
    options:
    - ложкою
    - ложком
    - ложки
    - ложкам
  - sentence: Я дуже люблю вареники з _____.
    answer: картоплею
    options:
    - картоплею
    - картоплем
    - картопля
    - картоплі
  - sentence: Потрібно посипати салат _____.
    answer: сіллю
    options:
    - сіллю
    - сілом
    - сілею
    - сілі
  - sentence: Він їсть гарячі вареники _____.
    answer: виделкою
    options:
    - виделкою
    - виделком
    - виделку
    - виделці
  - sentence: Ми часто п'ємо чай з _____.
    answer: медом
    options:
    - медом
    - меду
    - медові
    - меді
  - sentence: Я роблю смачний салат з _____.
    answer: помідорами
    options:
    - помідорами
    - помідором
    - помідорах
    - помідори
  - sentence: Ми завжди подаємо вареники зі _____.
    answer: сметаною
    options:
    - сметаною
    - сметаном
    - сметана
    - сметані
- id: true-false-workday
  type: true-false
  instruction: Правда чи ні? Перевірте, чи правильно використано орудний відмінок.
  items:
  - statement: Вранці я завжди їду на роботу автобусом.
    correct: true
    explanation: Правильно. Ми використовуємо орудний відмінок для транспорту (їхати
      автобусом).
  - statement: Мій офіс знаходиться між парком і банком.
    correct: true
    explanation: Правильно. Прийменник «між» вимагає орудного відмінка.
  - statement: Я майже весь день працюю за комп'ютер.
    correct: false
    explanation: Неправильно. Правильна форма орудного відмінка — «за комп'ютером».
  - statement: О першій годині я обідаю з моїм новим колегою.
    correct: true
    explanation: Правильно. Чоловічий рід закінчується на -им (моїм новим) та -ою
      (колегою).
  - statement: Ввечері я повертаюся додому машиною.
    correct: true
    explanation: Правильно. «Машиною» — це орудний відмінок для засобу пересування.
  - statement: Я припаркував свою машину перед офісу.
    correct: false
    explanation: 'Неправильно. Прийменник «перед» вимагає орудного відмінка: «перед
      офісом».'
  - statement: Після обіду я маю зустріч з моєю новою директоркою.
    correct: true
    explanation: Правильно. Жіночий рід має закінчення -єю (моєю), -ою (новою) та
      -ою (директоркою).
  - statement: Мій стіл стоїть під великим вікно.
    correct: false
    explanation: 'Неправильно. Після прийменника «під» потрібен орудний відмінок:
      «під вікном».'
- id: review-instrumental
  type: quiz
  instruction: Яку функцію виконує орудний відмінок у цьому реченні?
  items:
  - question: Моя сестра працює журналісткою.
    options:
    - Професія
    - Інструмент
    - Транспорт
    - Місце
    correct: 0
  - question: Вона мішає салат ложкою.
    options:
    - Професія
    - Інструмент
    - Компанія (з ким?)
    - Хобі
    correct: 1
  - question: Я дуже цікавлюся фотографією.
    options:
    - Професія
    - Хобі та інтереси
    - Транспорт
    - Місце
    correct: 1
  - question: Мій новий офіс знаходиться над кав'ярнею.
    options:
    - Професія
    - Інструмент
    - Транспорт
    - Місце
    correct: 3
  - question: Ми їдемо на роботу трамваєм.
    options:
    - Транспорт
    - Інструмент
    - Хобі
    - Професія
    correct: 0
  - question: Я із задоволенням обідаю з колегами.
    options:
    - Професія
    - Інструмент
    - Компанія (з ким?)
    - Транспорт
    correct: 2
  - question: Ми ріжемо свіжий огірок ножем.
    options:
    - Професія
    - Інструмент
    - Компанія (з ким?)
    - Місце
    correct: 1
  - question: Мій стіл стоїть між вікном і дверима.
    options:
    - Професія
    - Інструмент
    - Транспорт
    - Місце
    correct: 3
