version: '1.0'
module: work-and-food
level: a2
inline:
- id: professions-match
  type: match-up
  instruction: З'єднайте питання з правильною відповіддю.
  pairs:
  - left: Ким ви працюєте в ресторані?
    right: Я працюю шеф-кухарем.
  - left: Ким працює ваш брат?
    right: Він працює фінансовим аналітиком.
  - left: Ким мріє стати ваш син?
    right: Він хоче стати пілотом.
  - left: Ким вона працює в школі?
    right: Вона працює вчителем.
  - left: Ким ви хотіли бути в дитинстві?
    right: Я хотів бути космонавтом.
  - left: Ким вона мріяла бути?
    right: Вона мріяла бути письменницею.
  - left: Ким працює ваша сестра?
    right: Вона працює дизайнеркою.
  - left: Ким працює Олена?
    right: Вона працює продавчинею.
- id: kitchen-fill
  type: fill-in
  instruction: Доповніть речення правильною формою слова.
  items:
  - sentence: Ми ріжемо свіжу картоплю гострим ____.
    answer: ножем
    options:
    - ножем
    - ножом
    - ножа
  - sentence: Я завжди мішаю борщ великою ____.
    answer: ложкою
    options:
    - ложкою
    - ложку
    - ложці
  - sentence: Ми готуємо смачні вареники з ____.
    answer: картоплею
    options:
    - картоплею
    - картопля
    - картоплі
  - sentence: Українці люблять подавати борщ зі ____.
    answer: сметаною
    options:
    - сметаною
    - сметану
    - сметані
  - sentence: Влітку ми робимо салат з ____.
    answer: помідорами
    options:
    - помідорами
    - помідори
    - помідором
  - sentence: Треба посипати цей бутерброд білою ____.
    answer: сіллю
    options:
    - сіллю
    - сілом
    - сіль
  - sentence: Дехто любить поливати салат оливковою ____.
    answer: олією
    options:
    - олією
    - олію
    - олії
  - sentence: Ми їмо гаряче м'ясо ____.
    answer: виделкою
    options:
    - виделкою
    - виділкою
    - виделку
- id: workday-tf
  type: true-false
  instruction: Чи правильно використано орудний відмінок у реченні?
  items:
  - statement: Я їду на роботу з автобусом.
    correct: false
    explanation: 'Транспорт в орудному відмінку не потребує прийменника «з». Правильно:
      автобусом.'
  - statement: Мій стіл стоїть перед вікном.
    correct: true
    explanation: Прийменник «перед» для розташування вимагає орудного відмінка.
  - statement: О першій годині я обідаю з колегами.
    correct: true
    explanation: Для компанії ми використовуємо прийменник «з» та орудний відмінок.
  - statement: За столом стоїть висока шафа.
    correct: true
    explanation: Прийменник «за» для розташування вимагає орудного відмінка.
  - statement: Вона завжди їде на роботу метро.
    correct: true
    explanation: Слово «метро» є іншомовним і не змінює закінчення.
  - statement: Я тримаю блокнот поруч клавіатурою.
    correct: false
    explanation: 'Прийменник «поруч» вимагає «з». Правильно: поруч з клавіатурою.'
  - statement: Щодня я розмовляю з начальник.
    correct: false
    explanation: 'Після «з» має бути орудний відмінок. Правильно: з начальником.'
  - statement: Мій комп'ютер стоїть між принтером і телефоном.
    correct: true
    explanation: Прийменник «між» вимагає орудного відмінка.
- id: functions-quiz
  type: quiz
  instruction: Яка функція орудного відмінка у цьому реченні?
  items:
  - question: Я працюю фінансовим аналітиком.
    options:
    - Професія
    - Інструмент
    - Компанія
    - Розташування
    correct: 0
  - question: Ми ріжемо картоплю ножем.
    options:
    - Інструмент
    - Професія
    - Компанія
    - Розташування
    correct: 0
  - question: Він обідає з колегами.
    options:
    - Компанія
    - Інструмент
    - Професія
    - Розташування
    correct: 0
  - question: Стіл стоїть перед вікном.
    options:
    - Розташування
    - Інструмент
    - Компанія
    - Професія
    correct: 0
  - question: Вона мішає суп ложкою.
    options:
    - Інструмент
    - Професія
    - Компанія
    - Розташування
    correct: 0
  - question: Мій брат хоче стати пілотом.
    options:
    - Професія
    - Інструмент
    - Компанія
    - Розташування
    correct: 0
  - question: Кошик стоїть під столом.
    options:
    - Розташування
    - Інструмент
    - Компанія
    - Професія
    correct: 0
  - question: Я п'ю каву з другом.
    options:
    - Компанія
    - Інструмент
    - Професія
    - Розташування
    correct: 0
workbook:
- id: pronouns-match
  type: match-up
  instruction: З'єднайте особовий займенник із правильною формою дієслова.
  pairs:
  - left: Я
    right: працюю аналітиком
  - left: Ми
    right: обідаємо з колегами
  - left: Він
    right: ріже картоплю
  - left: Вона
    right: захоплюється кулінарією
  - left: Ви
    right: мішаєте борщ
  - left: Вони
    right: їдуть автобусом
- id: pronouns-fill
  type: fill-in
  instruction: Вставте правильний особовий займенник.
  items:
  - sentence: ____ працюю шеф-кухарем у ресторані.
    answer: Я
    options:
    - Я
    - Він
    - Ми
  - sentence: Ким ____ працюєте?
    answer: ви
    options:
    - ви
    - ти
    - вони
  - sentence: ____ готуємо вареники з картоплею.
    answer: Ми
    options:
    - Ми
    - Я
    - Вона
  - sentence: ____ мріяла бути письменницею.
    answer: Вона
    options:
    - Вона
    - Він
    - Я
  - sentence: Чим ____ цікавиться у вільний час?
    answer: він
    options:
    - він
    - ви
    - ми
  - sentence: ____ їдуть на роботу трамваєм.
    answer: Вони
    options:
    - Вони
    - Ми
    - Ви
- id: pronouns-sort
  type: group-sort
  instruction: Розподіліть особові займенники на однину та множину.
  groups:
  - label: Однина
    items:
    - я
    - ти
    - він
    - вона
    - воно
  - label: Множина
    items:
    - ми
    - ви
    - вони
- id: pronouns-formality-quiz
  type: quiz
  instruction: Оберіть правильну форму звертання (ти чи ви).
  items:
  - question: 'Розмова з новим начальником: «Ким ____ працювали раніше?»'
    options:
    - ви
    - ти
    - він
    - ми
    correct: 0
  - question: 'Розмова з другом дитинства: «Що ____ робиш сьогодні?»'
    options:
    - ти
    - ви
    - він
    - вона
    correct: 0
  - question: 'Звернення до лікаря: «Як ____ себе почуваєте?»'
    options:
    - ви
    - ти
    - він
    - вона
    correct: 0
  - question: 'Розмова з братом: «З чим ____ любиш їсти борщ?»'
    options:
    - ти
    - ви
    - він
    - я
    correct: 0
  - question: 'Звернення до колеги на офіційній нараді: «Що ____ думаєте про цей рецепт?»'
    options:
    - ви
    - ти
    - він
    - ми
    correct: 0
  - question: 'Розмова з сестрою: «Чим ____ ріжеш хліб?»'
    options:
    - ти
    - ви
    - вона
    - я
    correct: 0
- id: possession-have-fill
  type: fill-in
  instruction: Вставте правильну форму займенника для вираження володіння.
  items:
  - sentence: У ____ є свіжий огірок.
    answer: мене
    options:
    - мене
    - я
    - мій
  - sentence: У ____ є новий рецепт борщу?
    answer: тебе
    options:
    - тебе
    - ти
    - твій
  - sentence: У ____ є гострий ніж.
    answer: нього
    options:
    - нього
    - він
    - його
  - sentence: У ____ є велика кухня.
    answer: неї
    options:
    - неї
    - вона
    - її
  - sentence: У ____ є смачні вареники.
    answer: нас
    options:
    - нас
    - ми
    - наш
  - sentence: У ____ є свіжа картопля.
    answer: них
    options:
    - них
    - вони
    - їх
- id: possession-pronoun-fill
  type: fill-in
  instruction: Вставте правильну форму присвійного займенника.
  items:
  - sentence: Це ____ новий рецепт.
    answer: мій
    options:
    - мій
    - моя
    - моє
  - sentence: Де ____ велика виделка?
    answer: твоя
    options:
    - твоя
    - твій
    - твоє
  - sentence: Це ____ улюблене кафе.
    answer: наше
    options:
    - наше
    - наш
    - наша
  - sentence: ____ колеги дуже розумні.
    answer: Мої
    options:
    - Мої
    - Мій
    - Моя
  - sentence: Який ____ улюблений інгредієнт?
    answer: твій
    options:
    - твій
    - твоя
    - твоє
  - sentence: Це ____ важлива нарада.
    answer: наша
    options:
    - наша
    - наш
    - наше
- id: possession-match-gender
  type: match-up
  instruction: З'єднайте присвійний займенник з відповідним іменником.
  pairs:
  - left: мій
    right: ніж
  - left: моя
    right: виделка
  - left: моє
    right: молоко
  - left: мої
    right: колеги
  - left: наш
    right: рецепт
  - left: наша
    right: олія
  - left: наше
    right: м'ясо
- id: possession-who-has-quiz
  type: quiz
  instruction: Визначте, у кого є предмет.
  items:
  - question: «У мене є новий рецепт.» Хто має рецепт?
    options:
    - Я
    - Ти
    - Він
    - Вона
    correct: 0
  - question: «У неї є свіжа картопля.» Хто має картоплю?
    options:
    - Вона
    - Він
    - Я
    - Ти
    correct: 0
  - question: «У нього є гострий ніж.» Хто має ніж?
    options:
    - Він
    - Вона
    - Ми
    - Вони
    correct: 0
  - question: «У нас є смачні помідори.» Хто має помідори?
    options:
    - Ми
    - Ви
    - Вони
    - Я
    correct: 0
  - question: «У них є велика ложка.» Хто має ложку?
    options:
    - Вони
    - Ви
    - Ми
    - Він
    correct: 0
  - question: «У тебе є олія?» Хто має олію?
    options:
    - Ти
    - Я
    - Він
    - Вона
    correct: 0
