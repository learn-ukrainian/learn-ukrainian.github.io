    - лікарем.
  - words:
    - цікавлюся
    - Я
    - мистецтвом.
    - дуже
    correct_order:
    - Я
    - дуже
    - цікавлюся
    - мистецтвом.
  - words:
    - роботу
    - Я
    - трамваєм.
    - їду
    - на
    correct_order:
    - Я
    - їду
    - на
    - роботу
    - трамваєм.
  - words:
    - подаємо
    - Ми
    - вареники
    - сметаною.
    - зі
    correct_order:
    - Ми
    - подаємо
    - вареники
    - зі
    - сметаною.
  - words:
    - працює
    - Олена
