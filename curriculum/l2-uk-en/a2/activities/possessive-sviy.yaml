- type: true-false
  title: "Правда чи брехня?"
  instruction: "Визначте, чи правильні ці твердження про граматику та культуру."
  items:
    - statement: "Займенник 'свій' вказує на те, що об'єкт належить суб'єкту речення."
      correct: true
      explanation: "Це головне правило використання 'свій' (Суб'єкт = Власник)."
    - statement: "В українській мові речення 'Він любить його маму' означає, що чоловік любить власну матір."
      correct: false
      explanation: "Це означає, що він любить маму іншого чоловіка. Для власної мами треба сказати 'свою маму'."
    - statement: "Займенник 'свій' відмінюється за тією ж схемою, що й займенник 'мій'."
      correct: true
      explanation: "Так, відмінювання 'свій' та 'мій' повністю збігається: мій/свій, мого/свого і так далі."
    - statement: "У реченні 'Я мию свої руки' займенник 'свої' є абсолютно необхідним."
      correct: false
      explanation: "Це тавтологія. Українці кажуть просто 'Я мию руки', бо власник і так зрозумілий."
    - statement: "Слово 'власний' підкреслює ексклюзивність і приватну власність (наприклад, 'власний будинок')."
      correct: true
      explanation: "Так, 'власний' використовується, щоб підкреслити, що це ваша приватна власність."
    - statement: "Вислів 'чужий монастир' означає місце, де ви можете встановлювати свої правила."
      correct: false
      explanation: "Навпаки, прислів'я каже, що в 'чужий монастир' зі своїм статутом (правилами) не ходять."
    - statement: "Слово 'особистий' найкраще використовувати для розмов про нерухомість або автомобілі."
      correct: false
      explanation: "Для майна краще 'власний'. 'Особистий' стосується приватного життя, думок, простору."
    - statement: "У першій особі можна сказати 'Я читаю мою книгу', але 'Я читаю свою книгу' звучить природніше."
      correct: true
      explanation: "Обидва варіанти граматично можливі, але 'свій' є більш типовим для української мови."
    - statement: "Поняття 'свої люди' описує незнайомців, яких ви вперше бачите на вулиці."
      correct: false
      explanation: "'Свої люди' — це надійне коло друзів, родичів та знайомих, яким ви довіряєте."
    - statement: "Антонімом до слова 'свій' у багатьох культурних контекстах є слово 'чужий'."
      correct: true
      explanation: "Цей контраст є дуже важливим в українській культурі."
    - statement: "У формі знахідного відмінка жіночого роду ми використовуємо форму 'своє'."
      correct: false
      explanation: "Форма жіночого роду в знахідному відмінку — 'свою' (наприклад, люблю свою сім'ю)."
    - statement: "Займенник 'свій' допомагає уникнути неоднозначності, яка часто виникає в англійській мові."
      correct: true
      explanation: "Він чітко показує, хто є власником предмета, без додаткового контексту."

- type: cloze
