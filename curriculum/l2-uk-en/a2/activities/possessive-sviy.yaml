- type: select
  title: "Оберіть усі правильні варіанти"
  instruction: "У яких реченнях використання займенників є граматично і культурно природним? Оберіть усі можливі відповіді."
  items:
    - question: "Яке речення правильно описує, що Олена взяла свою власну сумку?"
      options:
        - text: "Олена взяла свою сумку."
          correct: true
        - text: "Олена взяла її сумку."
          correct: false
        - text: "Олена взяла його сумку."
          correct: false
        - text: "Олена взяла власну сумку."
          correct: true
      min_correct: 2
      explanation: "Обидва варіанти (свою/власну) правильні, але означають різне ('власну' підкреслює, що вона належить саме їй)."
    - question: "Які речення не містять тавтології?"
      options:
        - text: "Я мию руки."
          correct: true
        - text: "Я мию свої руки."
          correct: false
        - text: "Вона кивнула головою."
          correct: true
        - text: "Вона кивнула своєю головою."
          correct: false
      min_correct: 2
      explanation: "З частинами тіла займенник зазвичай опускається."
    - question: "Які форми займенника 'свій' належать до знахідного відмінка?"
      options:
        - text: "свою"
          correct: true
        - text: "своє"
          correct: true
        - text: "своїх"
          correct: true
        - text: "своїм"
          correct: false
      min_correct: 3
      explanation: "Свою (ж.р.), своє (с.р.), своїх (мн., істоти) — це форми знахідного відмінка."
    - question: "У яких висловах традиційно використовується 'свій' або 'свої'?"
      options:
        - text: "свої люди"
          correct: true
        - text: "свій час"
          correct: true
        - text: "свій монастир"
          correct: true
        - text: "свої гроші іншої людини"
          correct: false
      min_correct: 3
      explanation: "'Свої люди', 'свій час', 'свій статут/монастир' — традиційні сполучення."
    - question: "Які слова підкреслюють приватність або ексклюзивну власність?"
      options:
        - text: "власний"
          correct: true
        - text: "особистий"
          correct: true
        - text: "чужий"
          correct: false
        - text: "спільний"
          correct: false
      min_correct: 2
      explanation: "'Власний' і 'особистий' говорять про приватність."
    - question: "Як правильно сказати, що Петро любить свою сім'ю?"
      options:
        - text: "Петро любить свою сім'ю."
          correct: true
        - text: "Петро обожнює свою родину."
          correct: true
        - text: "Петро любить його сім'ю."
          correct: false
        - text: "Петро любить її сім'ю."
          correct: false
      min_correct: 2
      explanation: "'Свою' гарантує, що це сім'я Петра."

- type: mark-the-words
  title: "Знайдіть форми займенника"
  instruction: "Знайдіть і позначте всі форми займенника 'свій' у цих реченнях."
  text: "Кожна людина має свій унікальний шлях. Вони дуже люблять свою велику сім'ю і завжди їй допомагають. Я ніколи не забуду про своє рідне місто. Діти швидко знайшли свої іграшки в кімнаті. Він розповів нам про свого найкращого друга. Ми завжди ділимося своїми ідеями на зустрічах. Вона розповіла цю історію своїй сестрі."
  answers: ["свій", "свою", "своє", "свої", "свого", "своїми", "своїй"]

- type: fill-in
  title: "Переклад: власний чи чужий?"
  instruction: "Виберіть правильне українське слово для перекладу англійського займенника."
  items:
    - sentence: "She reads her (own) book. -> Вона читає ___ книгу."
      answer: "свою"
      options: ["свою", "її", "власну", "особисту"]
      explanation: "Свою — бо книга належить їй."
    - sentence: "She reads her (friend's) book. -> Вона читає ___ книгу."
      answer: "її"
      options: ["її", "свою", "власну", "особисту"]
      explanation: "Її — бо книга належить іншій жінці."
    - sentence: "He took his (own) coat. -> Він взяв ___ пальто."
      answer: "своє"
      options: ["своє", "його", "власне", "особисте"]
      explanation: "Своє — бо пальто належить йому (суб'єкту)."
    - sentence: "He took his (brother's) coat. -> Він взяв ___ пальто."
      answer: "його"
      options: ["його", "своє", "власне", "особисте"]
      explanation: "Його — бо пальто належить іншій людині."
    - sentence: "They sold their (own) house. -> Вони продали ___ будинок."
      answer: "свій"
      options: ["свій", "їхній", "власний", "особистий"]
      explanation: "Свій — бо будинок належить їм."
    - sentence: "They sold their (neighbors') house. -> Вони продали ___ будинок."
      answer: "їхній"
      options: ["їхній", "свій", "власний", "особистий"]
      explanation: "Їхній — бо будинок належить іншим людям."
    - sentence: "I love my (own) mother. -> Я люблю ___ маму."
      answer: "свою"
      options: ["свою", "її", "власну", "особисту"]
      explanation: "У першій особі найприродніше використовувати 'свою'."
    - sentence: "Did you find your (own) phone? -> Ти знайшов ___ телефон?"
      answer: "свій"
      options: ["свій", "його", "власний", "особистий"]
      explanation: "У другій особі також краще використовувати 'свій'."
    - sentence: "The dog ate its (own) food. -> Собака з'їв ___ їжу."
      answer: "свою"
      options: ["свою", "її", "його", "їхню"]
      explanation: "Собака — суб'єкт, тому їжа 'своя'."
    - sentence: "We are talking about our (own) future. -> Ми говоримо про ___ майбутнє."
      answer: "своє"
      options: ["своє", "їхнє", "власне", "особисте"]
      explanation: "У першій особі множини 'своє' є дуже природним."
    - sentence: "He respects his (another man's) opinion. -> Він поважає ___ думку."
      answer: "його"
      options: ["його", "свою", "власну", "особисту"]
      explanation: "Думка належить іншому чоловіку."
    - sentence: "She is looking for her (own) keys. -> Вона шукає ___ ключі."
      answer: "свої"
      options: ["свої", "її", "власні", "особисті"]
      explanation: "Ключі належать їй."