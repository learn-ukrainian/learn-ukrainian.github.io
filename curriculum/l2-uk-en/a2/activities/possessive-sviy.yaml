- type: quiz
  title: "Чия це річ?"
  instruction: "Прочитайте речення і виберіть правильний займенник."
  items:
    - question: "Він взяв ___ сумку і пішов додому."
      explanation: "Суб'єкт (він) взяв власну сумку."
      options:
        - text: "свою"
          correct: true
        - text: "його"
          correct: false
        - text: "її"
          correct: false
        - text: "їхню"
          correct: false
    - question: "Олена читає ___ старий лист."
      explanation: "Олена читає власний лист."
      options:
        - text: "свій"
          correct: true
        - text: "її"
          correct: false
        - text: "його"
          correct: false
        - text: "їхній"
          correct: false
    - question: "Вони продали ___ автомобіль сусідам."
      explanation: "Вони продали власний автомобіль."
      options:
        - text: "свій"
          correct: true
        - text: "його"
          correct: false
        - text: "її"
          correct: false
        - text: "їхній"
          correct: false
    - question: "Тарас розмовляє з мамою свого друга. Він любить ___ маму."
      explanation: "Він любить маму друга, а не власну, тому 'його'."
      options:
        - text: "його"
          correct: true
        - text: "свою"
          correct: false
        - text: "її"
          correct: false
        - text: "їхню"
          correct: false
    - question: "Діти граються в парку. Вони забули ___ іграшки."
      explanation: "Діти забули власні іграшки."
      options:
        - text: "свої"
          correct: true
        - text: "їхні"
          correct: false
        - text: "його"
          correct: false
        - text: "її"
          correct: false
    - question: "Брат дав сестрі ___ комп'ютер на один день."
      explanation: "Брат дав власний комп'ютер."
      options:
        - text: "свій"
          correct: true
        - text: "його"
          correct: false
        - text: "її"
          correct: false
        - text: "їхній"
          correct: false
    - question: "Сестра повернула брату ___ комп'ютер ввечері."
      explanation: "Комп'ютер належить брату (йому), а не сестрі (суб'єкту)."
      options:
        - text: "його"
          correct: true
        - text: "свій"
          correct: false
        - text: "її"
          correct: false
        - text: "їхній"
          correct: false
    - question: "Жінка дивиться на фотографію сина. Вона обожнює ___ сина."
      explanation: "Жінка обожнює власного сина."
      options:
        - text: "свого"
          correct: true
        - text: "його"
          correct: false
        - text: "її"
          correct: false
        - text: "їхнього"
          correct: false
    - question: "Студенти роблять домашнє завдання. Вони відкрили ___ зошити."
      explanation: "Студенти відкрили власні зошити."
      options:
        - text: "свої"
          correct: true
        - text: "їхні"
          correct: false
        - text: "його"
          correct: false
        - text: "її"
          correct: false
    - question: "Максим працює з Оксаною. Максим часто читає ___ звіти."
      explanation: "Максим читає звіти Оксани (її)."
      options:
        - text: "її"
          correct: true
        - text: "свої"
          correct: false
        - text: "його"
          correct: false
        - text: "їхні"
          correct: false
    - question: "Собака приніс ___ м'яч господарю."
      explanation: "Собака приніс власний м'яч."
      options:
        - text: "свій"
          correct: true
        - text: "його"
          correct: false
        - text: "її"
          correct: false
        - text: "їхній"
          correct: false
    - question: "Лікар слухає пацієнта. Лікар знає ___ історію хвороби."
      explanation: "Лікар знає історію пацієнта (його)."
      options:
        - text: "його"
          correct: true
        - text: "свою"
          correct: false
        - text: "її"
          correct: false
        - text: "їхню"
          correct: false

- type: fill-in
  title: "Відмінювання займенника 'свій'"
  instruction: "Вставте правильну форму займенника 'свій' у речення."
  items:
    - sentence: "Я завжди слухаю ___ інтуїцію."
      answer: "свою"
      options: ["свою", "своє", "свій", "своїх"]
      explanation: "Інтуїція — жіночий рід, знахідний відмінок."
    - sentence: "Вона ніколи не забуває про ___ обіцянки."
      answer: "свої"
      options: ["свої", "своїх", "своїм", "своєю"]
      explanation: "Обіцянки — множина, знахідний відмінок (неістота)."
    - sentence: "Ти вже написав ___ батькам листа?"
      answer: "своїм"
      options: ["своїм", "своїх", "свої", "своєму"]
      explanation: "Батькам — множина, давальний відмінок."
    - sentence: "Він дуже пишається ___ новим проєктом."
      answer: "своїм"
      options: ["своїм", "свого", "своєму", "свій"]
      explanation: "Проєктом — чоловічий рід, орудний відмінок."
    - sentence: "Ми розмовляли про ___ майбутнє дуже довго."
      answer: "своє"
      options: ["своє", "свою", "свого", "свої"]
      explanation: "Майбутнє — середній рід, знахідний відмінок."
    - sentence: "Я бачу ___ брата кожного тижня на тренуванні."
      answer: "свого"
      options: ["свого", "свій", "своєму", "своїм"]
      explanation: "Брата — чоловічий рід, знахідний відмінок істоти."
    - sentence: "Вона не хоче жити в ___ рідному місті."
      answer: "своєму"
      options: ["своєму", "свій", "свого", "своїм"]
      explanation: "Місті — середній рід, місцевий відмінок."
    - sentence: "Ви маєте ___ власну кімнату в цьому будинку?"
      answer: "свою"
      options: ["свою", "своя", "своєї", "своєю"]
      explanation: "Кімнату — жіночий рід, знахідний відмінок."
    - sentence: "Вони поїхали на відпочинок на ___ автомобілі."
      answer: "своєму"
      options: ["своєму", "свій", "свого", "своїм"]
      explanation: "Автомобілі — чоловічий рід, місцевий відмінок."
    - sentence: "Я завжди раджуся зі ___ старшою сестрою."
      answer: "своєю"
      options: ["своєю", "своїй", "свою", "своєї"]
      explanation: "Сестрою — жіночий рід, орудний відмінок."
    - sentence: "Він віддав книгу ___ найкращому другу."
      answer: "своєму"
      options: ["своєму", "свого", "своїм", "свій"]
      explanation: "Другу — чоловічий рід, давальний відмінок."
    - sentence: "Ми дуже любимо ___ країну і хочемо тут жити."
      answer: "свою"
      options: ["свою", "своя", "своєї", "своєю"]
      explanation: "Країну — жіночий рід, знахідний відмінок."

- type: unjumble
  title: "Побудуйте речення"
  instruction: "Розташуйте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["вона", "хоче", "мати", "власний", "будинок"]
      answer: "Вона хоче мати власний будинок."
    - words: ["кожна", "людина", "має", "свій", "час"]
      answer: "Кожна людина має свій час."
    - words: ["ми", "швидко", "знайшли", "спільну", "мову"]
      answer: "Ми швидко знайшли спільну мову."
    - words: ["він", "дуже", "любить", "свою", "сім'ю"]
      answer: "Він дуже любить свою сім'ю."
    - words: ["я", "завжди", "кажу", "власну", "думку"]
      answer: "Я завжди кажу власну думку."
    - words: ["це", "її", "особисте", "життя", "зараз"]
      answer: "Це її особисте життя зараз."
    - words: ["для", "нас", "важливі", "свої", "люди"]
      answer: "Для нас важливі свої люди."
    - words: ["у", "неї", "є", "своя", "справа"]
      answer: "У неї є своя справа."
    - words: ["він", "будує", "своє", "життя", "самостійно"]
      answer: "Він будує своє життя самостійно."
    - words: ["вони", "продали", "свій", "старий", "автомобіль"]
      answer: "Вони продали свій старий автомобіль."
    - words: ["ти", "часто", "згадуєш", "своє", "місто"]
      answer: "Ти часто згадуєш своє місто."
    - words: ["ми", "любимо", "ділитися", "своїми", "думками"]
      answer: "Ми любимо ділитися своїми думками."

- type: error-correction
  title: "Виправте помилки з займенниками"
  instruction: "У кожному реченні є одна помилка у використанні займенника. Знайдіть неправильне слово і виберіть правильний варіант."
  items:
    - sentence: "Петро обійняв його дружину після роботи."
      error: "його"
      answer: "свою"
      error_type: "word"
      options: ["свою", "її", "їхню", "мою"]
      explanation: "Петро обійняв власну дружину, тому потрібно використовувати 'свою'."
    - sentence: "Студенти показали її проєкти викладачу на уроці."
      error: "її"
      answer: "свої"
      error_type: "word"
      options: ["свої", "його", "їхні", "наші"]
      explanation: "Студенти (вони) показали власні проєкти, тому використовуємо 'свої'."
    - sentence: "Вона постійно говорить про її нову роботу."
      error: "її"
      answer: "свою"
      error_type: "word"
      options: ["свою", "його", "їхню", "твою"]
      explanation: "Вона говорить про власну роботу, тому потрібен займенник 'свою'."
    - sentence: "Ти повинен думати про твоє майбутнє серйозно."
      error: "твоє"
      answer: "своє"
      error_type: "word"
      options: ["своє", "її", "його", "їхнє"]
      explanation: "У другій особі 'своє' звучить більш природно і стилістично правильно."
    - sentence: "Мій брат продав його старий телефон на сайті."
      error: "його"
      answer: "свій"
      error_type: "word"
      options: ["свій", "її", "їхній", "мій"]
      explanation: "Брат продав власний телефон, тому 'свій'."
    - sentence: "Ми поїхали на нашій машині в Карпати."
      error: "нашій"
      answer: "своїй"
      error_type: "word"
      options: ["своїй", "її", "їхній", "моїй"]
      explanation: "Хоча 'нашій' граматично можливо, 'своїй' звучить значно природніше."
    - sentence: "Мама попросила сина прибрати його кімнату."
      error: "його"
      answer: "свою"
      error_type: "word"
      options: ["свою", "її", "їхню", "мою"]
      explanation: "Син має прибрати власну кімнату, тому 'свою'."
    - sentence: "Я хочу відкрити мій бізнес наступного року."
      error: "мій"
      answer: "свій"
      error_type: "word"
      options: ["свій", "його", "її", "їхній"]
      explanation: "У першій особі використання 'свій' є більш українським."
    - sentence: "Вчитель перевірив їхні тести вчора ввечері."
      error: "їхні"
      answer: "свої"
      error_type: "word"
      options: ["свої", "його", "її", "наші"]
      explanation: "Вчитель перевірив власні (ті, що він дав) тести."
    - sentence: "Вони не хочуть продавати їхню квартиру в центрі."
      error: "їхню"
      answer: "свою"
      error_type: "word"
      options: ["свою", "його", "її", "нашу"]
      explanation: "Вони не хочуть продавати власну квартиру."
    - sentence: "Вона забула її ключі на столі в офісі."
      error: "її"
      answer: "свої"
      error_type: "word"
      options: ["свої", "його", "їхні", "мої"]
      explanation: "Вона забула власні ключі (множина), тому 'свої'."
    - sentence: "Хлопчик показав мамі його малюнок з гордістю."
      error: "його"
      answer: "свій"
      error_type: "word"
      options: ["свій", "її", "їхній", "твій"]
      explanation: "Хлопчик показав власний малюнок."

