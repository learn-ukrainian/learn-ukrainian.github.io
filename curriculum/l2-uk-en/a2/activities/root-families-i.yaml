- type: match-up
  title: 'Знайдіть пару: префікс і його значення'
  instruction: 'З’єднайте префікс із його логічним просторовим значенням.'
  pairs:
    - left: 'в-'
      right: 'рух усередину простору'
    - left: 'ви-'
      right: 'рух назовні, вихід'
    - left: 'пере-'
      right: 'перетин межі, зміна'
    - left: 'під-'
      right: 'наближення знизу, під чимось'
    - left: 'при-'
      right: 'наближення, прибуття'
    - left: 'по-'
      right: 'початок або обмежена тривалість дії'
    - left: 'про-'
      right: 'повне завершення дії (від початку до кінця)'
    - left: 'за-'
      right: 'фіксація результату (наприклад, аудіо або відео)'

- type: quiz
  title: 'Логіка словотворення'
  instruction: 'Оберіть правильний варіант відповіді для кожного запитання.'
  items:
    - question: 'Яке слово означає місце, де люди безпечно переходять вулицю?'
      explanation: 'Префікс пере- означає рух через щось (across).'
      options:
        - text: 'перехід'
          correct: true
        - text: 'вихід'
          correct: false
        - text: 'прихід'
          correct: false
        - text: 'вхід'
          correct: false
    - question: 'Яке слово ми використовуємо для романтичної зустрічі?'
      explanation: 'Побачення буквально означає mutual seeing.'
      options:
        - text: 'побачення'
          correct: true
        - text: 'читання'
          correct: false
        - text: 'похід'
          correct: false
        - text: 'опис'
          correct: false
    - question: 'Скажіть, будь ласка, хто такий сучасний письменник?'
      explanation: 'Суфікс -енник додається до кореня пис- (письмо), щоб позначити професію людини.'
      options:
        - text: 'людина, яка пише книги'
          correct: true
        - text: 'людина, яка читає новини'
          correct: false
        - text: 'людина, яка малює картини'
          correct: false
        - text: 'людина, яка співає пісні'
          correct: false
    - question: 'Яке слово означає детальну характеристику предмета або особи?'
      explanation: 'Префікс о- (навколо) додається до пис-, створюючи значення писати навколо теми.'
      options:
        - text: 'опис'
          correct: true
        - text: 'підпис'
          correct: false
        - text: 'напис'
          correct: false
        - text: 'запис'
          correct: false
    - question: 'Яке дієслово ми використовуємо для активного перегляду фільму?'
      explanation: 'Дивитися — це активний процес, а бачити — пасивне сприйняття.'
      options:
        - text: 'дивитися'
          correct: true
        - text: 'бачити'
          correct: false
        - text: 'писати'
          correct: false
        - text: 'читати'
          correct: false
    - question: 'Як правильно сказати: я хочу... в магазин і назад?'
      explanation: 'За правилом Кафе Птах перед приголосним х ми пишемо с-, а не з-.'
      options:
        - text: 'сходити'
          correct: true
        - text: 'зходити'
          correct: false
        - text: 'входити'
          correct: false
        - text: 'приходити'
          correct: false
    - question: 'Яке слово означає момент, коли хтось приходить на місце?'
      explanation: 'Префікс при- означає наближення, а корінь ход- — рух. Прихід = прибуття (arrival).'
      options:
        - text: 'прихід'
          correct: true
        - text: 'вихід'
          correct: false
        - text: 'підпис'
          correct: false
        - text: 'перехід'
          correct: false
    - question: 'Що саме означає українське дієслово вичитати в тексті?'
      explanation: 'Це слово означає уважно прочитати текст, щоб знайти помилки, або зробити комусь зауваження.'
      options:
        - text: 'знайти помилки в тексті'
          correct: true
        - text: 'почати читати книгу'
          correct: false
        - text: 'забути прочитане'
          correct: false
        - text: 'переписати весь текст'
          correct: false

- type: fill-in
  title: 'Заповніть пропуски відповідним словом'
  instruction: 'Оберіть слово, яке найкраще підходить за змістом.'
  items:
    - sentence: 'Ми довго шукали головний ___ до цього великого музею.'
      answer: 'вхід'
      options: ['вхід', 'вихід', 'перехід', 'прихід']
      explanation: 'Вхід — це місце для потрапляння всередину будівлі.'
    - sentence: 'Поставте свій ___, будь ласка, на цьому офіційному документі.'
      answer: 'підпис'
      options: ['підпис', 'опис', 'напис', 'запис']
      explanation: 'Підпис — це те, що ми пишемо під (under) текстом документа.'
    - sentence: 'Я дуже люблю ___ цікаві статті в інтернеті щоранку.'
      answer: 'читати'
      options: ['читати', 'прочитати', 'писати', 'написати']
      explanation: 'Слово щоранку вказує на регулярний процес, тому використовуємо недоконаний вид читати.'
    - sentence: 'Він планує ___ цей довгий роман до кінця тижня.'
      answer: 'прочитати'
      options: ['прочитати', 'читати', 'бачити', 'дивитися']
      explanation: 'Фраза до кінця вказує на завершений результат (доконаний вид).'
    - sentence: 'Цей автор — дуже відомий український ___.'
      answer: 'письменник'
      options: ['письменник', 'читач', 'викладач', 'перекладач']
      explanation: 'Письменник — це людина, яка професійно пише книги.'
    - sentence: 'Експерти не змогли ___ цю складну економічну кризу.'
      answer: 'передбачити'
      options: ['передбачити', 'побачити', 'дивитися', 'сходити']
      explanation: 'Передбачити — це побачити щось до того, як воно станеться.'
    - sentence: 'Кожен ___ має право залишити відгук про цю книгу в бібліотеці.'
      answer: 'читач'
      options: ['читач', 'письменник', 'глядач', 'слухач']
      explanation: 'Читач — це людина, яка читає книги.'
    - sentence: 'Завтра я хочу швидко ___ на пошту і забрати посилку.'
      answer: 'сходити'
      options: ['сходити', 'зходити', 'ходити', 'переходити']
      explanation: 'Сходити означає піти кудись і швидко повернутися. Пам’ятайте правило Кафе Птах!'

- type: group-sort
  title: 'Сортування за коренем'
  instruction: 'Розподіліть слова за їхнім основним коренем.'
  groups:
    - name: 'Корінь ход- (рух)'
      items: ['вихід', 'вхід', 'похід', 'перехід', 'сходити']
    - name: 'Корінь пис- (текст)'
      items: ['письменник', 'підпис', 'опис', 'запис', 'писати']
    - name: 'Корінь чит- (читання)'
      items: ['читач', 'прочитати', 'читання', 'вичитати']
    - name: 'Корінь бач- (зір)'
      items: ['передбачити', 'побачення', 'бачити', 'обачний']

- type: unjumble
  title: 'Побудуйте речення'
  instruction: 'Поставте слова у правильному порядку, щоб утворити логічне речення.'
  items:
    - words: ['цей', 'безпечний', 'перехід', 'пішохідний', 'дуже']
      answer: 'Цей пішохідний перехід дуже безпечний.'
    - words: ['сьогодні', 'йде', 'на', 'побачення', 'вона']
      answer: 'Вона сьогодні йде на побачення.'
    - words: ['детальний', 'книги', 'мені', 'опис', 'дайте']
      answer: 'Дайте мені детальний опис книги.'
    - words: ['швидко', 'сходити', 'я', 'в', 'магазин', 'хочу']
      answer: 'Я хочу швидко сходити в магазин.'
    - words: ['сучасний', 'письменник', 'відомий', 'це', 'український']
      answer: 'Це відомий сучасний український письменник.'
    - words: ['цю', 'прочитати', 'книгу', 'до', 'кінця', 'хочу', 'я']
      answer: 'Я хочу прочитати цю книгу до кінця.'

- type: true-false
  title: 'Правда чи брехня?'
  instruction: 'Прочитайте твердження і визначте, чи є воно правдивим.'
  items:
    - statement: 'Слово вихід утворюється за допомогою префікса ви- та кореня хід-.'
      correct: true
      explanation: 'Це правда. Ви- означає назовні, а хід- — рух.'
    - statement: 'Дієслово дивитися ми використовуємо, коли говоримо про раптове пасивне сприйняття світла очима.'
      correct: false
      explanation: 'Для пасивного сприйняття використовується дієслово бачити. Дивитися — це активний процес.'
    - statement: 'За правилом Кафе Птах ми повинні писати префікс с- перед приголосним х.'
      correct: true
      explanation: 'Саме так, тому ми пишемо сходити, а не зходити.'
    - statement: 'Слово запис стосується лише тексту, написаного в зошиті.'
      correct: false
      explanation: 'У сучасній українській мові слово запис часто означає аудіо- або відеозапис.'
    - statement: 'Корінь пис- історично походить від давнього слова, що означало малювати або прикрашати.'
      correct: true
      explanation: 'Це історичний факт, пов’язаний із традицією створення писанок.'
    - statement: 'Дієслово написати описує тривалий незавершений процес.'
      correct: false
      explanation: 'Написати — це дієслово доконаного виду, воно вказує на завершений результат.'
    - statement: 'Слово обачний містить у собі корінь бач- і описує людину, яка дивиться навколо.'
      correct: true
      explanation: 'Обачна людина дивиться навколо себе, щоб передбачити небезпеку.'
    - statement: 'Слово підпис означає текст, який знаходиться над основним документом.'
      correct: false
      explanation: 'Префікс під- означає under. Підпис ставлять під документом.'

- type: error-correction
  title: 'Виправте помилки'
  instruction: 'Знайдіть помилку в реченні, виберіть неправильне слово і замініть його на правильне.'
  items:
    - sentence: 'Я хочу зходити в новий супермаркет.'
      error: 'зходити'
      answer: 'сходити'
      error_type: 'word'
      options: ['сходити', 'входити', 'ходити', 'приходити']
      explanation: 'За правилом Кафе Птах перед літерою х завжди пишеться префікс с-.'
    - sentence: 'Ми вчора бачили цікавий фільм у кінотеатрі.'
      error: 'бачили'
      answer: 'дивилися'
      error_type: 'word'
      options: ['дивилися', 'читали', 'писали', 'ходили']
      explanation: 'Коли ви цілеспрямовано спостерігаєте за чимось (фільм, телевізор, матч), використовуйте дієслово дивитися.'
    - sentence: 'Будь ласка, поставте свій надпис на цьому документі.'
      error: 'надпис'
      answer: 'підпис'
      error_type: 'word'
      options: ['підпис', 'опис', 'розпис', 'запис']
      explanation: 'Офіційний підпис (signature) ставиться під текстом, тому використовується префікс під-.'
    - sentence: 'Сьогодні ввечері я йду на бачення зі своєю дівчиною.'
      error: 'бачення'
      answer: 'побачення'
      error_type: 'word'
      options: ['побачення', 'читання', 'завдання', 'рішення']
      explanation: 'Романтична зустріч називається побачення (mutual seeing).'
    - sentence: 'Цей автор — дуже талановитий писач.'
      error: 'писач'
      answer: 'письменник'
      error_type: 'word'
      options: ['письменник', 'читач', 'діяч', 'викладач']
      explanation: 'Для людини, яка професійно пише книги, існує спеціальне слово письменник.'
    - sentence: 'Мені потрібно прочитати листа весь вечір.'
      error: 'прочитати'
      answer: 'читати'
      error_type: 'word'
      options: ['читати', 'перечитати', 'дочитати', 'вичитати']
      explanation: 'Фраза весь вечір вказує на тривалий процес, тому потрібне дієслово недоконаного виду читати.'

- type: mark-the-words
  title: 'Знайдіть слова з коренями руху та зору'
  instruction: 'Знайдіть і позначте всі слова, які мають корені ход- або бач- (включаючи похідні форми).'
  text: 'Учора ми вирішили піти в довгий похід у гори. Наш перехід через ліс був важким, але цікавим. Раптом я зміг побачити великого орла на дереві. Він також уважно дивився на нас. Ми не могли передбачити таку зустріч. Згодом ми знайшли безпечний спуск і швидко змогли сходити вниз до річки. Цей вихід на природу дав нам багато сил.'
  answers: ['похід', 'перехід', 'побачити', 'передбачити', 'сходити', 'вихід']

- type: select
  title: 'Слова доконаного виду (результат)'
  instruction: 'Оберіть усі дієслова, які означають завершену дію (доконаний вид).'
  items:
    - question: 'Які з цих дієслів вказують на результат?'
      min_correct: 3
      options:
        - text: 'написати'
          correct: true
        - text: 'писати'
          correct: false
        - text: 'прочитати'
          correct: true
        - text: 'сходити'
          correct: true
        - text: 'читати'
          correct: false
        - text: 'ходити'
          correct: false
      explanation: 'Дієслова написати, прочитати, сходити вказують на дію, яка має логічне завершення.'
    - question: 'Які з цих слів мають у своєму складі префікс, що означає рух назовні (out)?'
      min_correct: 2
      options:
        - text: 'вихід'
          correct: true
        - text: 'вхід'
          correct: false
        - text: 'вичитати'
          correct: true
        - text: 'перехід'
          correct: false
        - text: 'підпис'
          correct: false
      explanation: 'Префікс ви- означає рух назовні або вилучення чогось із середини.'
    - question: 'Оберіть іменники, які означають професію або особу, яка виконує дію.'
      min_correct: 2
      options:
        - text: 'читач'
          correct: true
        - text: 'читання'
          correct: false
        - text: 'письменник'
          correct: true
        - text: 'запис'
          correct: false
        - text: 'хід'
          correct: false
      explanation: 'Суфікси -ач та -енник вказують на людину (читач, письменник).'
    - question: 'Які з цих слів пов’язані з текстом або письмом?'
      min_correct: 3
      options:
        - text: 'опис'
          correct: true
        - text: 'запис'
          correct: true
        - text: 'перехід'
          correct: false
        - text: 'підпис'
          correct: true
        - text: 'вихід'
          correct: false
      explanation: 'Слова опис, запис, підпис мають спільний корінь пис-.'
    - question: 'Які слова утворені від кореня бач- (зір)?'
      min_correct: 3
      options:
        - text: 'передбачити'
          correct: true
        - text: 'побачення'
          correct: true
        - text: 'обачний'
          correct: true
        - text: 'розклад'
          correct: false
        - text: 'читання'
          correct: false
      explanation: 'Слова передбачити, побачення, обачний мають спільний корінь бач-.'
    - question: 'У яких словах діє правило Кафе Птах?'
      min_correct: 3
      options:
        - text: 'сходити'
          correct: true
        - text: 'списати'
          correct: true
        - text: 'сфотографувати'
          correct: true
        - text: 'зробити'
          correct: false
        - text: 'збудувати'
          correct: false
      explanation: 'Префікс с- пишеться перед К, П, Т, Ф, Х (сходити, списати, сфотографувати).'

- type: cloze
  title: 'Візит до бібліотеки'
  instruction: 'Прочитайте текст і заповніть пропуски відповідними словами.'
  passage: 'Сьогодні я вирішив піти в міську бібліотеку. Спочатку я довго шукав головний {{1}}. Коли я зайшов, привітний бібліотекар запитав, чи я їхній новий {{2}}. Я відповів, що так, і що мій улюблений {{3}} — Сергій Жадан. Бібліотекар попросив мене заповнити форму і поставити мій офіційний {{4}} внизу сторінки. Я хотів знайти нову книгу, тому подивився детальний {{5}} у каталозі. Я знайшов чудовий роман і вирішив {{6}} його до кінця тижня. Я люблю {{7}} ввечері, коли тихо. Бібліотекар сказав, що ця книга має захопливий сюжет, і важко {{8}}, чим вона закінчиться. Після цього я пішов додому. Мій {{9}} через парк був дуже приємним. Я дуже радий, що зміг {{10}} в бібліотеку сьогодні.'
  blanks:
    - id: 1
      answer: 'вхід'
      options: ['вхід', 'вихід', 'перехід', 'прихід']
    - id: 2
      answer: 'читач'
      options: ['читач', 'письменник', 'слухач', 'глядач']
    - id: 3
      answer: 'письменник'
      options: ['письменник', 'читач', 'роман', 'запис']
    - id: 4
      answer: 'підпис'
      options: ['підпис', 'опис', 'надпис', 'запис']
    - id: 5
      answer: 'опис'
      options: ['опис', 'напис', 'розклад', 'вихід']
    - id: 6
      answer: 'прочитати'
      options: ['прочитати', 'читати', 'написати', 'писати']
    - id: 7
      answer: 'читати'
      options: ['читати', 'прочитати', 'писати', 'бачити']
    - id: 8
      answer: 'передбачити'
      options: ['передбачити', 'побачити', 'бачити', 'дивитися']
    - id: 9
      answer: 'похід'
      options: ['похід', 'перехід', 'підпис', 'вихід']
    - id: 10
      answer: 'сходити'
      options: ['сходити', 'зходити', 'заходити', 'виходити']

- type: translate
  title: 'Переклад логічних фраз'
  instruction: 'Оберіть правильний український переклад для англійських речень.'
  items:
    - source: 'Where is the exit here?'
      options:
        - text: 'Де тут вихід?'
          correct: true
        - text: 'Де тут вхід?'
          correct: false
        - text: 'Де тут перехід?'
          correct: false
        - text: 'Де тут прихід?'
          correct: false
      explanation: 'Вихід (out + motion) означає exit.'
    - source: 'I want to write a letter today.'
