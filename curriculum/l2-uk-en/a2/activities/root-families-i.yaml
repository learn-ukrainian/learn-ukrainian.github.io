- type: quiz
  title: 'Машина вгадування'
  instruction: 'Використовуючи логіку коренів і префіксів, вгадайте значення цих нових слів.'
  items:
    - question: 'Якщо при- означає наближення, а хід- — рух, що таке прихід?'
      explanation: 'Прихід означає arrival, тобто рух ближче до чогось.'
      options:
        - text: 'прибуття'
          correct: true
        - text: 'відправлення'
          correct: false
        - text: 'прогулянка'
          correct: false
        - text: 'біг'
          correct: false
    - question: 'Якщо в- означає всередину, а читати — аналізувати текст, що означає дієслово вчитатися?'
      explanation: 'Вчитатися означає зануритися в текст, читати дуже уважно.'
      options:
        - text: 'уважно заглибитися в текст'
          correct: true
        - text: 'швидко прочитати книгу'
          correct: false
        - text: 'відмовитися від читання'
          correct: false
        - text: 'голосно читати для когось'
          correct: false
    - question: 'Якщо роз- означає розділення або розповсюдження, а пис- стосується тексту, що таке розпис?'
      explanation: 'Розпис може означати процес створення орнаменту на стінах (наприклад, розпис храму).'
      options:
        - text: 'декоративне малювання на поверхні'
          correct: true
        - text: 'коротке текстове повідомлення'
          correct: false
        - text: 'читання вголос'
          correct: false
        - text: 'офіційний документ'
          correct: false
    - question: 'Префікс пере- означає зміну або перенесення. Що означає дієслово переписати?'
      explanation: 'Переписати означає написати текст ще раз, можливо, з певними змінами.'
      options:
        - text: 'написати текст заново'
          correct: true
        - text: 'прочитати текст швидко'
          correct: false
        - text: 'опублікувати текст'
          correct: false
        - text: 'забути текст'
          correct: false
    - question: 'Суфікс -ка часто утворює жіночий рід професії. Як назвати жінку, яка пише книги?'
      explanation: 'Від слова письменник за допомогою суфікса -иця або -ка (письменниця).'
      options:
        - text: 'письменниця'
          correct: true
        - text: 'читачка'
          correct: false
        - text: 'бачка'
          correct: false
        - text: 'перекладачка'
          correct: false
    - question: 'Якщо префікс по- означає початок або коротку тривалість, що означає дієслово почитати?'
      explanation: 'Почитати означає читати протягом короткого періоду часу.'
      options:
        - text: 'читати недовго'
          correct: true
        - text: 'прочитати книгу до кінця'
          correct: false
        - text: 'уважно вивчати текст'
          correct: false
        - text: 'ніколи не читати'
          correct: false
    - question: 'Префікс с- (з-) може означати рух униз. Що означає слово спуск (від спускатися)?'
      explanation: 'Спуск означає рух з вищої точки в нижчу.'
      options:
        - text: 'рух донизу'
          correct: true
        - text: 'рух угору'
          correct: false
        - text: 'рух уперед'
          correct: false
        - text: 'зупинка на місці'
          correct: false
    - question: 'Якщо без- означає відсутність, а вихід означає шлях назовні, що означає прикметник безвихідний?'
      explanation: 'Безвихідна ситуація — це ситуація, з якої немає виходу або рішення.'
      options:
        - text: 'ситуація, яка не має рішення'
          correct: true
        - text: 'людина, яка завжди знаходить вихід'
          correct: false
        - text: 'відкриті двері'
          correct: false
        - text: 'початок нового проекту'
          correct: false