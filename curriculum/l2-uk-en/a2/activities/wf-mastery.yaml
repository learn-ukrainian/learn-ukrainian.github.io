- type: fill-in
  title: Оберіть правильний префікс
  instruction: Додайте потрібне слово з правильним префіксом.
  items:
  - sentence: Він вирішив ___ нову мову.
    answer: вивчити
    options:
    - вивчити
    - завчити
    - перевчити
    - повчити
  - sentence: Мені потрібно ___ цей текст через помилки.
    answer: переписати
    options:
    - переписати
    - записати
    - списати
    - виписати
  - sentence: Студент ___ усі нові слова у зошит.
    answer: записав
    options:
    - записав
    - переписав
    - виписав
    - списав
  - sentence: Ми ___ на море завтра вранці.
    answer: поїдемо
    options:
    - поїдемо
    - виїдемо
    - переїдемо
    - заїдемо
  - sentence: Вона змогла швидко ___ це складне завдання.
    answer: зробити
    options:
    - зробити
    - виробити
    - переробити
    - поробити
  - sentence: Увечері сонце ___ за високі гори.
    answer: зайшло
    options:
    - зайшло
    - вийшло
    - перейшло
    - зійшло
  - sentence: Ми сьогодні ___ всю каву вдома.
    answer: випили
    options:
    - випили
    - запили
    - попили
    - перепили
  - sentence: Маленький хлопчик ___ весь солодкий торт.
    answer: з'їв
    options:
    - з'їв
    - поїв
    - виїв
    - переїв
- type: group-sort
  title: Розподіліть слова за коренем
  instruction: Знайдіть спільний корінь і розподіліть слова за групами.
  groups:
  - name: -ход-
    items:
    - вихід
    - захід
    - перехід
    - вхід
  - name: -пис-
    items:
    - підпис
    - розпис
    - записати
    - переписати
  - name: -роб-
    items:
    - робота
    - зробити
    - виробник
    - переробити
- type: match-up
  title: 'Знайдіть пару: значення префіксів'
  instruction: З'єднайте префікс чи суфікс з його головним значенням.
  pairs:
  - left: по-
    right: початок або коротка дія
  - left: з- / с-
    right: повне завершення дії
  - left: ви-
    right: рух назовні
  - left: пере-
    right: повторення або перетин
  - left: за-
    right: рух за межу або фіксація
  - left: -ник
    right: професія або діяч
  - left: -ння
    right: назва процесу
  - left: -ус-
    right: емоційна близькість
- type: quiz
  title: Логіка архітектури слів
  items:
  - question: Яка мова використовує аналітичний підхід з фразовими дієсловами?
    explanation: Англійська використовує прийменники після дієслів.
    options:
    - text: Англійська мова
      correct: true
    - text: Українська мова
      correct: false
    - text: Обидві мови
      correct: false
    - text: Жодна з мов
      correct: false
  - question: Що ми додаємо до українського дієслова, щоб змінити напрямок?
    explanation: Префікс додається перед коренем.
    options:
    - text: Префікс
      correct: true
    - text: Суфікс
      correct: false
    - text: Окремий прийменник
      correct: false
    - text: Закінчення
      correct: false
  - question: Що означає префікс ви- у слові вихід?
    explanation: Він вказує на рух назовні.
    options:
    - text: Рух назовні
      correct: true
    - text: Рух всередину
      correct: false
    - text: Повторення дії
      correct: false
    - text: Завершення дії
      correct: false
  - question: Який суфікс створює іменник-процес від дієслова?
    explanation: Суфікс -ння перетворює дію на процес.
    options:
    - text: -ння
      correct: true
    - text: -ник
      correct: false
    - text: -ус-
      correct: false
    - text: -оч-
      correct: false
  - question: Що допомагає зрозуміти незнайоме складне слово?
    explanation: Аналіз кореня та префікса відкриває значення.
    options:
    - text: Аналіз кореня та префіксів
      correct: true
    - text: Пошук слова у словнику
      correct: false
    - text: Вивчення напам'ять
      correct: false
    - text: Правило милозвучності
      correct: false
  - question: Як сказати re-write українською мовою правильно?
    explanation: Префікс пере- відповідає за повторення дії.
    options:
    - text: переписати
      correct: true
    - text: реписати
      correct: false
    - text: записати
      correct: false
    - text: виписати
      correct: false
  - question: Скільки літер у слові гідроелектростанція?
    explanation: Це довге складене слово з 19 літер.
    options:
    - text: Дев'ятнадцять
      correct: true
    - text: П'ятнадцять
      correct: false
    - text: Двадцять
      correct: false
    - text: Десять
      correct: false
  - question: Який корінь є спільним для слів вихід, захід, перехід?
    explanation: Корінь -ход- несе значення руху.
    options:
    - text: -ход-
      correct: true
    - text: -роб-
      correct: false
    - text: -пис-
      correct: false
    - text: -хід-
      correct: false
  instruction: Оберіть правильну відповідь.
- type: unjumble
  title: Складіть речення
  items:
  - words:
    - Мені
    - потрібно
    - переписати
    - цей
    - текст
