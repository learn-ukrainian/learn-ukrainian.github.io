  - words:
    - Новий
    - працівник
    - чекає
    - біля
    - входу
    answer: Новий працівник чекає біля входу
  instruction: Розташуйте слова у правильному порядку.
- type: cloze
  title: Архітектура слів у контексті
  passage: Українська мова — це система, де ви можете самостійно {{1}} нові слова.
    Головна частина слова — це {{2}}, він несе основне значення. Щоб змінити напрямок
    дії, ми додаємо {{3}} на початку. Наприклад, від слова «робити» ми можемо утворити
    дієслово {{4}}, яке означає повне завершення. Для повторення дії використовуємо
    префікс {{5}}, щоб сказати {{6}}. А в кінці слова працює {{7}}. Він може створити
    назву професії, як-от {{8}}, або назву процесу, як-от {{9}}. Навіть дуже довгі
    слова можна легко {{10}}, якщо знати ці прості правила.
  blanks:
  - id: 1
    answer: будувати
    options:
    - будувати
    - писати
    - читати
    - купувати
  - id: 2
    answer: корінь
    options:
    - корінь
    - суфікс
    - префікс
    - закінчення
  - id: 3
    answer: префікс
    options:
    - префікс
    - суфікс
    - корінь
    - закінчення
  - id: 4
    answer: зробити
    options:
    - зробити
    - переробити
    - виробити
    - поробити
  - id: 5
    answer: пере-
    options:
    - пере-
    - ви-
    - за-
    - по-
  - id: 6
    answer: переробити
    options:
    - переробити
    - виробити
    - зробити
    - заробити
  - id: 7
    answer: суфікс
    options:
    - суфікс
    - префікс
    - корінь
    - текст
  - id: 8
    answer: працівник
    options:
    - працівник
    - робота
    - читання
    - завдання
  - id: 9
    answer: читання
    options:
    - читання
    - керівник
    - будівельник
    - виробник
  - id: 10
    answer: аналізувати
    options:
    - аналізувати
    - купувати
    - продавати
    - забути
  instruction: Заповніть пропуски, обравши правильні слова.
- type: error-correction
  title: Виправте типові помилки
  items:
  - sentence: Я хочу зфотографувати вашу дружню родину.
    error: зфотографувати
    answer: сфотографувати
    options:
    - сфотографувати
    - вифотографувати
    - зафотографувати
    - пофотографувати
    explanation: Корінь починається на Ф (Кафе Птах), тому пишемо с-.
  - sentence: Мені треба реписати цей довгий текст.
    error: реписати
    answer: переписати
    options:
    - переписати
    - записати
    - написати
    - виписати
    explanation: В українській мові повторення дії передається префіксом пере-.
  - sentence: Він зміг зказати всю правду на суді.
    error: зказати
    answer: сказати
    options:
    - сказати
    - виказати
    - переказати
    - заказати
    explanation: Перед буквою К завжди пишемо префікс с-.
  - sentence: Ми маємо реробити цей старий проєкт.
    error: реробити
    answer: переробити
    options:
    - переробити
    - зробити
    - виробити
    - поробити
    explanation: Замість англійського re- ми використовуємо префікс пере-.
  - sentence: Будівельник вирішив зтворити новий план будівлі.
    error: зтворити
    answer: створити
    options:
    - створити
    - перетворити
    - витворити
    - натворити
    explanation: Перед літерою Т (з правила Кафе Птах) пишемо с-.
  - sentence: Вона любить речитати свої улюблені книги.
    error: речитати
    answer: перечитати
    options:
    - перечитати
    - зачитати
    - почитати
    - вичитати
    explanation: Повторення дії виражається продуктивним префіксом пере-.
  instruction: Знайдіть і виправте помилку в реченні.
- type: quiz
  title: 'Правило милозвучності: Кафе Птах'
  items:
  - question: Який префікс ми додаємо до дієслова робити, щоб сказати про завершену
      дію?
    explanation: Буква «р» дзвінка, тому пишемо «з-».
    options:
    - text: з-
      correct: true
    - text: с-
      correct: false
    - text: ви-
      correct: false
    - text: по-
      correct: false
  - question: Який префікс потрібен для дієслова фотографувати?
    explanation: Буква «ф» входить до правила Кафе Птах.
    options:
    - text: с-
      correct: true
    - text: з-
      correct: false
    - text: за-
      correct: false
    - text: пере-
      correct: false
  - question: 'Як правильно написати слово: збудувати чи сбудувати?'
    explanation: Буква «б» не входить до Кафе Птах, тому пишемо «з-».
    options:
    - text: збудувати
      correct: true
    - text: сбудувати
      correct: false
    - text: побудувати
      correct: false
    - text: перебудувати
      correct: false
  - question: Що означає фраза Кафе Птах в українській мові?
    explanation: Це мнемонічне правило для глухих приголосних К, П, Т, Ф, Х.
    options:
    - text: Букви К, П, Т, Ф, Х
      correct: true
    - text: Назва ресторану
      correct: false
    - text: Усі глухі приголосні
      correct: false
    - text: Всі голосні звуки
      correct: false
  - question: 'Як правильно сказати: він зміг сказати чи зказати правду?'
    explanation: Корінь починається на «к», тому обираємо префікс «с-».
    options:
    - text: сказати
      correct: true
    - text: зказати
      correct: false
    - text: переказати
      correct: false
    - text: виказати
      correct: false
  - question: Яке слово написане з граматичною помилкою?
    explanation: Слово зтворити написане неправильно, перед «т» треба «с».
    options:
    - text: зтворити
      correct: true
    - text: сфотографувати
      correct: false
    - text: зробити
      correct: false
    - text: сказати
      correct: false
  - question: Чому ми змінюємо префікс з- на с-?
    explanation: Це робиться для милозвучності мови та легшої вимови.
    options:
    - text: Для милозвучності
      correct: true
    - text: Це просто виняток
      correct: false
    - text: Для швидкості читання
      correct: false
    - text: Для зміни значення
      correct: false
  - question: Який варіант префікса є правильним для слова списати?
    explanation: Буква «п» входить до правила Кафе Птах, тому списати.
    options:
    - text: списати
      correct: true
    - text: зписати
      correct: false
    - text: розписати
      correct: false
    - text: записати
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: Правда чи брехня?
  items:
  - statement: Українська мова використовує префікси замість окремих прийменників
      для зміни напрямку дії дієслова.
    correct: true
    explanation: Це синтетичний підхід української мови (наприклад, вийти замість
      go out).
  - statement: Префікс пере- завжди означає рух всередину приміщення.
    correct: false
    explanation: Префікс пере- означає перетин межі або повторення дії.
  - statement: Суфікс -ник створює слова, що означають професію або діяча.
    correct: true
    explanation: 'Наприклад: працівник, будівельник, керівник.'
  - statement: Щоб сказати re-write, треба додати префікс ре- до дієслова писати.
    correct: false
    explanation: В українській мові використовується префікс пере- (переписати).
  - statement: Зменшувальні суфікси (як -ик або -ус-) використовуються лише для позначення
      малих предметів.
    correct: false
    explanation: Вони також показують тепло та велику емоційну близькість.
  - statement: Слово вихід утворене від префікса ви- та кореня -ход-.
    correct: true
    explanation: Це буквально означає рух назовні.
  - statement: Суфікс -ння перетворює дієслово на іменник, що позначає процес.
    correct: true
    explanation: 'Наприклад: читати — читання, навчатися — навчання.'
  - statement: Перед літерою р ми обов'язково пишемо префікс с- за правилом Кафе Птах.
    correct: false
    explanation: Літера р дзвінка, тому ми пишемо з- (зробити).
  instruction: Визначте, чи твердження правильне.
