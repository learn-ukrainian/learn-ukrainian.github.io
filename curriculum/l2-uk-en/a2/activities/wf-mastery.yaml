    options:
    - виробник
    - працівник
    - керівник
    - робітник
  - sentence: У цьому старому соборі є красивий ___ на стінах.
    answer: розпис
    options:
    - розпис
    - підпис
    - запис
    - напис
  - sentence: Сьогодні на морі був дуже красивий ___ сонця.
    answer: захід
    options:
    - захід
    - вихід
    - перехід
    - вхід
  - sentence: Студент має ___ усі нові складні слова у зошит.
    answer: записати
    options:
    - записати
    - переписати
    - виписати
    - підписати
