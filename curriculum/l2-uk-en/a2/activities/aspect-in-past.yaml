version: '1.0'
module: aspect-in-past
level: a2
inline:
- id: quiz-aspect-id
  type: quiz
  instruction: Визначте вид дієслова у реченні. Це процес чи результат?
  items:
  - question: Він писав довгий лист.
    options:
    - Недоконаний вид (процес)
    - Доконаний вид (результат)
    - Недоконаний вид (результат)
    - Доконаний вид (процес)
    correct: 0
  - question: Вона прочитала нову книгу.
    options:
    - Недоконаний вид (процес)
    - Доконаний вид (результат)
    - Недоконаний вид (результат)
    - Доконаний вид (процес)
    correct: 1
  - question: Вони готували смачний обід.
    options:
    - Недоконаний вид (процес)
    - Доконаний вид (результат)
    - Недоконаний вид (результат)
    - Доконаний вид (процес)
    correct: 0
  - question: Я вивчила всі ці нові слова.
    options:
    - Недоконаний вид (процес)
    - Доконаний вид (результат)
    - Недоконаний вид (результат)
    - Доконаний вид (процес)
    correct: 1
  - question: Тарас довго робив цю роботу.
    options:
    - Недоконаний вид (процес)
    - Доконаний вид (результат)
    - Недоконаний вид (результат)
    - Доконаний вид (процес)
    correct: 0
  - question: Оля швидко приготувала вечерю.
    options:
    - Недоконаний вид (процес)
    - Доконаний вид (результат)
    - Недоконаний вид (результат)
    - Доконаний вид (процес)
    correct: 1
  - question: Ми читали популярний журнал.
    options:
    - Недоконаний вид (процес)
    - Доконаний вид (результат)
    - Недоконаний вид (результат)
    - Доконаний вид (процес)
    correct: 0
  - question: Студент нарешті написав текст.
    options:
    - Недоконаний вид (процес)
    - Доконаний вид (результат)
    - Недоконаний вид (результат)
    - Доконаний вид (процес)
    correct: 1
- id: match-signal-words
  type: match-up
  instruction: З'єднайте слова-маркери з правильним прикладом речення
  pairs:
  - left: довго
    right: 'Процес (НВ): Вона довго читала книгу.'
  - left: раптом
    right: 'Швидка дія (ДВ): Раптом він відкрив двері.'
  - left: щодня
    right: 'Звичка (НВ): Я щодня готував сніданок.'
  - left: нарешті
    right: 'Результат (ДВ): Ми нарешті вивчили ці слова.'
  - left: весь день
    right: 'Процес (НВ): Він весь день працював.'
  - left: одного разу
    right: 'Унікальна подія (ДВ): Одного разу я побачив актора.'
  - left: завжди
    right: 'Звичка (НВ): Вона завжди купувала тут хліб.'
  - left: дві години
    right: 'Тривалість (НВ): Він писав лист дві години.'
- id: fill-in-aspect-choice
  type: fill-in
  instruction: Оберіть правильну форму дієслова за змістом
  items:
  - sentence: Я ____ смачну вечерю, і ми можемо їсти.
    answer: приготувала
    options:
    - готувала
    - приготувала
    - готувати
  - sentence: Він весь день ____ цей цікавий роман.
    answer: читав
    options:
    - читав
    - прочитав
    - читати
  - sentence: Кожного ранку Оля ____ нові слова.
    answer: вчила
    options:
    - вчила
    - вивчила
    - вчити
  - sentence: Раптом хтось гучно ____ у двері.
    answer: стукнув
    options:
    - стукав
    - стукнув
    - стукати
  - sentence: Вона нарешті ____ цей довгий лист.
    answer: написала
    options:
    - писала
    - написала
    - писати
  - sentence: Ми довго ____ у великому парку.
    answer: гуляли
    options:
    - гуляли
    - погуляли
    - гуляти
  - sentence: Одного разу Тарас ____ відомого актора на вулиці.
    answer: побачив
    options:
    - бачив
    - побачив
    - бачити
  - sentence: Коли я снідав, мій друг раптом ____.
    answer: подзвонив
    options:
    - дзвонив
    - подзвонив
    - дзвонити
workbook:
- id: sort-aspect-pairs
  type: group-sort
  instruction: Розподіліть дієслова за видами
  groups:
  - label: Недоконаний вид (процес)
    items:
    - робив
    - писав
    - читав
    - готував
    - вчив
    - говорив
    - брав
  - label: Доконаний вид (результат)
    items:
    - зробив
    - написав
    - прочитав
    - приготував
    - вивчив
    - сказав
    - взяв
- id: true-false-aspect-rules
  type: true-false
  instruction: Правда чи ні? Оберіть правильне твердження про вид дієслова
  items:
  - statement: Дієслова недоконаного виду відповідають на питання «що зробив?».
    correct: false
    explanation: Дієслова недоконаного виду відповідають на питання «що робив?».
  - statement: Слова «довго» і «весь день» — це маркери недоконаного виду.
    correct: true
    explanation: Ці слова показують довгий процес, тому ми використовуємо недоконаний
      вид.
  - statement: Доконаний вид показує результат або кінець дії.
    correct: true
    explanation: Доконаний вид завжди показує, що дія успішно закінчилася.
  - statement: Якщо дія часто повторюється (щодня, завжди), ми використовуємо доконаний
      вид.
    correct: false
    explanation: Для звичок і повторень ми завжди використовуємо недоконаний вид.
  - statement: Дієслово «сказав» — це доконаний вид.
    correct: true
    explanation: Це швидка, одноразова дія з результатом («говорити» — це процес).
  - statement: Для раптових подій у минулому ми завжди використовуємо недоконаний
      вид.
    correct: false
    explanation: Раптові, швидкі дії — це завжди доконаний вид.
- id: translate-aspect-sentences
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I was reading a book all day.
    options:
    - text: Я весь день читала книгу.
      correct: true
    - text: Я весь день прочитала книгу.
      correct: false
    - text: Я весь день читаю книгу.
      correct: false
    - text: Я весь день читати книгу.
      correct: false
  - source: He finally wrote the letter.
    options:
    - text: Він нарешті написав листа.
      correct: true
    - text: Він нарешті писав листа.
      correct: false
    - text: Він нарешті пише листа.
      correct: false
    - text: Він нарешті писати листа.
      correct: false
  - source: We used to cook dinner every evening.
    options:
    - text: Ми щовечора готували вечерю.
      correct: true
    - text: Ми щовечора приготували вечерю.
      correct: false
    - text: Ми щовечора готуємо вечерю.
      correct: false
    - text: Ми щовечора приготувати вечерю.
      correct: false
  - source: Suddenly someone knocked on the door.
    options:
    - text: Раптом хтось стукнув у двері.
      correct: true
    - text: Раптом хтось стукав у двері.
      correct: false
    - text: Раптом хтось стукає у двері.
      correct: false
    - text: Раптом хтось стукати у двері.
      correct: false
  - source: She was doing her homework for two hours.
    options:
    - text: Вона робила домашнє завдання дві години.
      correct: true
    - text: Вона зробила домашнє завдання дві години.
      correct: false
    - text: Вона робить домашнє завдання дві години.
      correct: false
    - text: Вона зробити домашнє завдання дві години.
      correct: false
  - source: I learned these new words.
    options:
    - text: Я вивчив ці нові слова.
      correct: true
    - text: Я вчив ці нові слова.
      correct: false
    - text: Я вчу ці нові слова.
      correct: false
    - text: Я вчити ці нові слова.
      correct: false
