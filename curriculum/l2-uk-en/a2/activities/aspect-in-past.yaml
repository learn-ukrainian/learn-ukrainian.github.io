- id: true-false-aspect
  type: true-false
  instruction: Правда чи ні? Визначте, чи правильне твердження про вид дієслова
  items:
  - statement: Слово «щодня» завжди вимагає дієслова доконаного виду.
    correct: false
    explanation: «Щодня» вказує на регулярну дію, тому потрібен недоконаний вид.
  - statement: Дієслово «прочитав» означає, що процес читання завершився успішно.
    correct: true
    explanation: Це доконаний вид, він показує результат дії.
  - statement: Якщо ви хочете сказати, що дія тривала дуже довго, використовуйте доконаний
      вид.
    correct: false
    explanation: Для тривалої дії потрібен недоконаний вид, наприклад, «робив», а
      не «зробив».
  - statement: Слово «раптом» (suddenly) часто використовується з дієсловами доконаного
      виду.
    correct: true
    explanation: Раптова дія — це одноразова, коротка подія (доконаний вид).
  - statement: Дієслово «написав» фокусується на самому процесі писання, а не на результаті.
    correct: false
    explanation: «Написав» — це доконаний вид, фокус саме на результаті (лист готовий).
  - statement: Недоконаний вид може описувати дію, яка слугує фоном для іншої раптової
      події.
    correct: true
    explanation: 'Наприклад: Я читав (фон), коли раптом подзвонив друг (раптова подія).'
  - statement: Дієслова доконаного виду ніколи не мають форм теперішнього часу.
    correct: true
    explanation: Доконаний вид описує завершений результат, він не може відбуватися
      прямо зараз.
  - statement: Слово «нарешті» зазвичай сигналізує про процес, а не результат.
    correct: false
    explanation: «Нарешті» означає, що результат нарешті досягнутий, потрібен доконаний
      вид.
  title: Правда чи ні? Визначте, чи правильне твердження про вид дієслова
- id: fill-in-aspect-practice
  type: fill-in
  instruction: Вставте правильне дієслово (доконаний чи недоконаний вид)
  items:
  - sentence: Учора я дуже довго ____ листа другові.
    answer: писав
    options:
    - писав
    - написав
  - sentence: Я нарешті ____ цей лист, і він готовий.
    answer: написав
    options:
    - писав
    - написав
  - sentence: Мама весь вечір ____ смачну вечерю.
    answer: готувала
    options:
    - готувала
    - приготувала
  - sentence: Брат швидко ____ обід для родини.
    answer: приготував
    options:
    - готував
    - приготував
  - sentence: Вона щодня ____ ранкову гімнастику.
    answer: робила
    options:
    - робила
    - зробила
  - sentence: Він уже ____ домашнє завдання з математики.
    answer: зробив
    options:
    - робив
    - зробив
  - sentence: Ми довго ____ ці нові українські слова.
    answer: вчили
    options:
    - вчили
    - вивчили
  - sentence: Сьогодні я нарешті ____ всі слова для уроку.
    answer: вивчив
    options:
    - вчив
    - вивчив
  title: Вставте правильне дієслово (доконаний чи недоконаний вид)
- id: error-correction-aspect-practice
  type: error-correction
  instruction: Знайдіть і виправте помилку у виборі виду дієслова
  items:
  - sentence: Я щодня прочитав новини в інтернеті.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - прочитала
    - читаю
    explanation: Для щоденної дії потрібен недоконаний вид (читав).
  - sentence: Одного разу він робив дуже смачний борщ на свято.
    error: робив
    correction: зробив
    error_type: word
    options:
    - зробив
    - робила
    - зроблю
    explanation: «Одного разу» на свято — це завершена результативна дія, тому «зробив».
  - sentence: Ми весь день вивчили нові слова до екзамену.
    error: вивчили
    correction: вчили
    error_type: word
    options:
    - вчили
    - вивчив
    - вчимо
    explanation: «Весь день» позначає процес, потрібен недоконаний вид (вчили).
  - sentence: Вона довго приготувала сніданок для всієї родини.
    error: приготувала
    correction: готувала
    error_type: word
    options:
    - готувала
    - приготував
    - готує
    explanation: Слово «довго» означає процес, тому використовуємо «готувала».
  - sentence: Раптом він дзвонив мамі і сказав новину.
    error: дзвонив
    correction: подзвонив
    error_type: word
    options:
    - подзвонив
    - дзвоню
    - подзвонила
    explanation: Слово «раптом» вимагає дієслова доконаного виду (подзвонив).
  - sentence: Сьогодні вранці я нарешті писав електронний лист.
    error: писав
    correction: написав
    error_type: word
    options:
    - написав
    - писала
    - напишу
    explanation: «Нарешті» вказує на досягнутий результат, потрібен доконаний вид
      (написав).
  - sentence: Він часто написав мені довгі повідомлення.
    error: написав
    correction: писав
    error_type: word
    options:
    - писав
    - написала
    - пишу
    explanation: Слово «часто» позначає регулярність, потрібен недоконаний вид (писав).
  - sentence: Я вже читав цю книгу, вона лежить на столі.
    error: читав
    correction: прочитав
    error_type: word
    options:
    - прочитав
    - читала
    - читаю
    explanation: «Вже» і факт, що книга готова/відкладена, вимагає результату (прочитав).
  title: Знайдіть і виправте помилку у виборі виду дієслова
- id: odd-one-out-aspect
  type: odd-one-out
  instruction: Оберіть слово, що не належить до групи за видом (знайдіть зайве)
  items:
  - words:
    - читав
    - писав
    - готував
    - прочитав
    correct: 3
    explanation: «прочитав» — доконаний вид, інші — недоконаний.
  - words:
    - зробив
    - написав
    - робив
    - вивчив
    correct: 2
    explanation: «робив» — недоконаний вид, інші — доконаний.
  - words:
    - вчив
    - вивчив
    - читав
    - писав
    correct: 1
    explanation: «вивчив» — доконаний вид, інші — недоконаний.
  - words:
    - приготував
    - прочитав
    - готував
    - зробив
    correct: 2
    explanation: «готував» — недоконаний вид, інші — доконаний.
  - words:
    - щодня
    - завжди
    - часто
    - раптом
    correct: 3
    explanation: «раптом» сигналізує про доконаний вид, інші — про регулярний недоконаний.
  - words:
    - нарешті
    - вже
    - довго
    - раптом
    correct: 2
    explanation: «довго» сигналізує про процес (недоконаний), інші — про результат
      (доконаний).
  - words:
    - робив
    - сидів
    - встав
    - читав
    correct: 2
    explanation: «встав» — доконаний вид, інші — недоконаний.
  - words:
    - побачив
    - знайшов
    - відкрив
    - пив
    correct: 3
    explanation: «пив» — недоконаний вид, інші — доконаний.
  title: Оберіть слово, що не належить до групи за видом (знайдіть зайве)
- id: match-up-translation
  type: match-up
  instruction: З'єднайте українське речення з англійським перекладом
  pairs:
  - left: Я робив домашнє завдання.
    right: I was doing my homework.
  - left: Я зробив домашнє завдання.
    right: I did my homework.
  - left: Вона читала книгу.
    right: She was reading a book.
  - left: Вона прочитала книгу.
    right: She read a book (and finished it).
  - left: Ми готували вечерю.
    right: We were making dinner.
  - left: Ми приготували вечерю.
    right: We made dinner.
  - left: Він писав листа.
    right: He was writing a letter.
  - left: Він написав листа.
    right: He wrote a letter.
  title: З'єднайте українське речення з англійським перекладом
