version: '1.0'
module: aspect-in-past
level: a2
inline:
- id: quiz-given-a-sentence-identify-whether-the-verb-is-imperfective-or-perfective-and-explain-why
  type: quiz
  instruction: Визначте вид дієслова та причину його використання
  items:
  - question: Я довго читав цю книгу.
    options:
    - Недоконаний (процес, тривалість)
    - Доконаний (результат)
    - Недоконаний (раптова дія)
    - Доконаний (повторювана дія)
    correct: 0
  - question: Він нарешті написав листа.
    options:
    - Доконаний (результат)
    - Недоконаний (процес)
    - Доконаний (повторювана дія)
    - Недоконаний (раптова дія)
    correct: 0
  - question: Ми щодня готували сніданок.
    options:
    - Недоконаний (регулярна дія)
    - Доконаний (результат)
    - Недоконаний (раптова дія)
    - Доконаний (послідовність)
    correct: 0
  - question: Вона раптом відкрила двері.
    options:
    - Доконаний (раптова дія)
    - Недоконаний (процес)
    - Доконаний (регулярна дія)
    - Недоконаний (довга тривалість)
    correct: 0
  - question: Студенти вчили нові слова весь вечір.
    options:
    - Недоконаний (процес)
    - Доконаний (результат)
    - Недоконаний (раптова дія)
    - Доконаний (послідовність)
    correct: 0
  - question: Брат швидко зробив домашнє завдання.
    options:
    - Доконаний (результат)
    - Недоконаний (процес)
    - Недоконаний (регулярна дія)
    - Доконаний (довга тривалість)
    correct: 0
  - question: Одного разу я побачив ведмедя в лісі.
    options:
    - Доконаний (одноразова дія)
    - Недоконаний (процес)
    - Доконаний (регулярна дія)
    - Недоконаний (раптова дія)
    correct: 0
  - question: Він часто читав новини в інтернеті.
    options:
    - Недоконаний (регулярна дія)
    - Доконаний (результат)
    - Доконаний (раптова дія)
    - Недоконаний (одноразова дія)
    correct: 0
  title: Визначте вид дієслова та причину його використання
- id: match-up-match-signal-words-with-the-correct-aspect-and-example-sentence
  type: match-up
  instruction: З'єднайте сигнальне слово з його значенням та видом дієслова
  pairs:
  - left: щодня
    right: Вказує на регулярну дію (недоконаний вид)
  - left: нарешті
    right: Вказує на досягнутий результат (доконаний вид)
  - left: довго
    right: Вказує на тривалий процес (недоконаний вид)
  - left: раптом
    right: Вказує на несподівану, коротку дію (доконаний вид)
  - left: завжди
    right: Вказує на постійну звичку (недоконаний вид)
  - left: одного разу
    right: Вказує на конкретну подію в минулому (доконаний вид)
  - left: часто
    right: Вказує на дію, яка повторюється (недоконаний вид)
  - left: вже
    right: Вказує, що дія успішно завершена (доконаний вид)
  title: З'єднайте сигнальне слово з його значенням та видом дієслова
- id: fill-in-aspect-choice
  type: fill-in
  instruction: Оберіть правильну форму дієслова (доконаний чи недоконаний вид)
  items:
  - sentence: Учора я весь вечір ____ книгу.
    answer: читав
    options:
    - читав
    - прочитав
  - sentence: Сьогодні вранці я нарешті ____ цей роман.
    answer: прочитав
    options:
    - читав
    - прочитав
  - sentence: Мама довго ____ дуже смачний борщ.
    answer: готувала
    options:
    - готувала
    - приготувала
  - sentence: Сестра швидко ____ обід для всієї родини.
    answer: приготувала
    options:
    - готувала
    - приготувала
  - sentence: Він щодня ____ ранкову гімнастику.
    answer: робив
    options:
    - робив
    - зробив
  - sentence: Мій брат ____ складне домашнє завдання.
    answer: зробив
    options:
    - робив
    - зробив
  - sentence: Ми часто ____ нові слова разом.
    answer: вчили
    options:
    - вчили
    - вивчили
  - sentence: Я вже ____ всі українські слова для уроку.
    answer: вивчив
    options:
    - вчив
    - вивчив
  title: Оберіть правильну форму дієслова (доконаний чи недоконаний вид)
workbook:
- id: group-sort-aspect
  type: group-sort
  instruction: Розподіліть дієслова за видами (доконаний чи недоконаний)
  groups:
  - label: Недоконаний вид (процес)
    items:
    - робив
    - читала
    - готували
    - вчив
    - писала
    - відпочивав
  - label: Доконаний вид (результат)
    items:
    - зробив
    - прочитала
    - приготували
    - вивчив
    - написала
    - подзвонив
  title: Розподіліть дієслова за видами (доконаний чи недоконаний)
- id: translate-aspect
  type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I was reading a book yesterday.
    options:
    - text: Учора я читав книгу.
      correct: true
    - text: Учора я прочитав книгу.
      correct: false
  - source: I read the book (finished it) yesterday.
    options:
    - text: Учора я прочитав книгу.
      correct: true
    - text: Учора я читав книгу.
      correct: false
  - source: She was cooking dinner for a long time.
    options:
    - text: Вона довго готувала вечерю.
      correct: true
    - text: Вона довго приготувала вечерю.
      correct: false
  - source: She prepared a very tasty dinner.
    options:
    - text: Вона приготувала дуже смачну вечерю.
      correct: true
    - text: Вона готувала дуже смачну вечерю.
      correct: false
  - source: We were writing a letter.
    options:
    - text: Ми писали листа.
      correct: true
    - text: Ми написали листа.
      correct: false
  - source: We finally wrote the letter.
    options:
    - text: Ми нарешті написали листа.
      correct: true
    - text: Ми нарешті писали листа.
      correct: false
  - source: He was doing his homework.
    options:
    - text: Він робив домашнє завдання.
      correct: true
    - text: Він зробив домашнє завдання.
      correct: false
  - source: He did (completed) his homework.
    options:
    - text: Він зробив домашнє завдання.
      correct: true
    - text: Він робив домашнє завдання.
      correct: false
  title: Оберіть правильний переклад речення
