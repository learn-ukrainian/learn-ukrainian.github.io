  instruction: Вставте правильне слово (Враховуйте правила родового відмінка)
  items:
  - sentence: У мене немає ____.
    answer: лимонів
    options:
    - лимони
    - лимонів
    - лимоном
  - sentence: Я не бачу ____.
    answer: помідорів
    options:
    - помідори
    - помідорів
    - помідорами
  - sentence: Дайте мені один ____ яблук.
    answer: кілограм
    options:
    - кілограм
    - кілограми
    - кілограмів
  - sentence: Вона хоче купити дві ____.
    answer: дині
    options:
    - диня
    - дині
    - динь
  - sentence: Скільки коштує п'ять ____?
    answer: кілограмів
    options:
