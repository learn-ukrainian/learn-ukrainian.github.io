version: '1.0'
module: foundations-practice
level: a2
inline:
- id: quiz-planning-party
  type: quiz
  instruction: Оберіть правильний варіант, звертаючи увагу на процес та результат
  items:
  - question: Ми _____ меню сьогодні ввечері.
    options:
    - будемо обговорювати
    - обговорити
    - будемо обговорити
    - обговорюємо
    correct: 0
  - question: Мені треба _____ багато салатів.
    options:
    - приготувати
    - буду готувати
    - готувала
    - приготуємо
    correct: 0
  - question: Вони _____ продукти на ринку довго.
    options:
    - будуть купувати
    - купити
    - будуть купити
    - купуємо
    correct: 0
  - question: Ми хочемо _____ свято на суботу.
    options:
    - запланувати
    - будемо планувати
    - планував
    - заплануємо
    correct: 0
  - question: Я _____ вечерю дуже довго.
    options:
    - буду готувати
    - приготувати
    - буду приготувати
    - готувала
    correct: 0
  - question: Нам треба швидко _____ все необхідне.
    options:
    - купити
    - будемо купувати
    - купували
    - купую
    correct: 0
- id: fill-in-shopping-groceries
  type: fill-in
  instruction: Вставте правильну форму слова
  items:
  - sentence: Дайте мені один _____.
    answer: кілограм
    options:
    - кілограм
    - кілограми
    - кілограмів
    - кілограму
  - sentence: Скільки коштує кілограм _____?
    answer: моркви
    options:
    - моркви
    - морква
    - моркву
    - морквою
  - sentence: Я хочу купити три _____.
    answer: кавуни
    options:
    - кавуни
    - кавун
    - кавунів
    - кавуном
  - sentence: Мені треба п'ять _____.
    answer: лимонів
    options:
    - лимонів
    - лимон
    - лимони
    - лимоном
  - sentence: У нас немає свіжих _____.
    answer: яблук
    options:
    - яблук
    - яблука
    - яблуки
    - яблуком
  - sentence: Дайте мені два кілограми _____.
    answer: помідорів
    options:
    - помідорів
    - помідор
    - помідори
    - помідором
  - sentence: У магазині немає домашнього _____.
    answer: сиру
    options:
    - сиру
    - сир
    - сиром
    - сири
  - sentence: Тут дуже мало вільного _____.
    answer: місця
    options:
    - місця
    - місце
    - місцю
    - місцем
- id: match-up-story-completion
  type: match-up
  instruction: З'єднайте англійські речення з правильним українським перекладом (зверніть
    увагу на вид дієслова)
  pairs:
  - left: I was cooking dinner
    right: Я готував вечерю
  - left: I have cooked dinner
    right: Я приготував вечерю
  - left: She was buying a cake
    right: Вона купувала торт
  - left: She bought a cake
    right: Вона купила торт
  - left: We were planning a party
    right: Ми планували вечірку
  - left: We planned a party
    right: Ми запланували вечірку
  - left: They were discussing the menu
    right: Вони обговорювали меню
  - left: They discussed the menu
    right: Вони обговорили меню
- id: match-up-short-narrative
  type: match-up
  instruction: З'єднайте запитання з правильною відповіддю
  pairs:
  - left: Що ти робив вранці?
    right: Я довго читав новини і пив каву.
  - left: Що ви зробили в центрі?
    right: Ми зайшли в кафе і замовили обід.
  - left: Чому ти втомилася?
    right: Я цілий день писала звіти.
  - left: Скільки коштує полуниця?
    right: Кілограм коштує сто гривень.
  - left: Коли буде новосілля?
    right: Ми плануємо свято на суботу.
  - left: Що ти вже приготувала?
    right: Я зробила салат і закуски.
  - left: Що ви замовили на вечерю?
    right: Ми замовили велику піцу.
  - left: Що ви будете купувати?
    right: Один кілограм меду і сир.
workbook:
- id: sort-aspects
  type: group-sort
  instruction: Розподіліть дієслова за видами
  groups:
  - label: Недоконаний вид (Процес)
    items:
    - готувати
    - купувати
    - планувати
    - обговорювати
    - замовляти
    - робити
    - читати
    - писати
  - label: Доконаний вид (Результат)
    items:
    - приготувати
    - купити
    - запланувати
    - обговорити
    - замовити
    - зробити
    - прочитати
    - написати
- id: error-correction-genitive-aspect
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: У мене немає вільний час.
    error: вільний час
    correction: вільного часу
    error_type: phrase
    options:
    - вільного часу
    - вільному часу
    - вільний час
    explanation: Після слова 'немає' завжди використовуємо родовий відмінок (Genitive).
  - sentence: Я хочу купити три кавунів.
    error: кавунів
    correction: кавуни
    error_type: word
    options:
    - кавуни
    - кавун
    - кавуном
    explanation: Після числівника 'два', 'три', 'чотири' використовуємо форму, схожу
      на називний відмінок множини (для чоловічого роду).
  - sentence: Дайте мені п'ять кілограми яблук.
    error: кілограми
    correction: кілограмів
    error_type: word
    options:
    - кілограмів
    - кілограм
    - кілограму
    explanation: Після чисел 'п'ять' і більше використовуємо родовий відмінок множини.
  - sentence: Вчора я швидко читав цю книгу і пішов спати.
    error: читав
    correction: прочитав
    error_type: word
    options:
    - прочитав
    - читати
    - читаю
    explanation: Дія повністю завершена (це результат), тому потрібен доконаний вид
      'прочитав'.
  - sentence: Ми цілий день обговорили наші плани.
    error: обговорили
    correction: обговорювали
    error_type: word
    options:
    - обговорювали
    - обговорити
    - обговорюємо
    explanation: '''Цілий день'' вказує на тривалий процес, тому потрібен недоконаний
      вид ''обговорювали''.'
  - sentence: Студенти зараз здають іспит.
    error: здають
    correction: складають
    error_type: word
    options:
    - складають
    - роблять
    - пишуть
    explanation: Українською мовою іспити 'складають' (процес) або 'склали' (результат),
      а не 'здають'.
