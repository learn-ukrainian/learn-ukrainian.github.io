inline:
- id: quiz-role-play-planning-a-party-aspect-in-future-tense
  type: quiz
  instruction: Оберіть правильну форму дієслова для майбутнього часу
  items:
  - question: Ми ____ вечірку весь вечір.
    options:
    - будемо планувати
    - будемо запланувати
    - плануємо
    - будемо планували
    correct: 0
  - question: Оксана ____ салат завтра цілий день.
    options:
    - буде готувати
    - буде приготувати
    - готує
    - буде готувала
    correct: 0
  - question: Вони ____ напої разом.
    options:
    - будуть купувати
    - будуть купити
    - купують
    - будемо купувати
    correct: 0
  - question: Я ____ новий діалог дві години.
    options:
    - буду писати
    - буду написати
    - пишу
    - буде писати
    correct: 0
  - question: Ти ____ фрукти на ринку?
    options:
    - будеш купувати
    - будеш купити
    - купуєш
    - буде купувати
    correct: 0
  - question: Ми ____ цей план дуже довго.
    options:
    - будемо обговорювати
    - будемо обговорити
    - обговорюємо
    - будуть обговорювати
    correct: 0
  - question: Він ____ їжу для вечірки.
    options:
    - буде замовляти
    - буде замовити
    - замовляє
    - будеш замовляти
    correct: 0
  - question: Чи ____ ви музику весь вечір?
    options:
    - будете слухати
    - будете послухати
    - слухаєте
    - будемо слухати
    correct: 0
- id: fill-in-shopping-groceries
