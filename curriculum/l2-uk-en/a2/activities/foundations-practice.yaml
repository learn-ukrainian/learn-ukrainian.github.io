- id: quiz-planning-party
  type: quiz
  instruction: Оберіть правильний варіант (процес або результат, і родовий відмінок)
  items:
  - question: Ми _____ меню сьогодні ввечері. Це займе час.
    options:
    - будемо обговорювати
    - будемо обговорити
    - обговоримо
    - обговорити
    correct: 0
  - question: Я хочу _____ все сьогодні вранці. У мене є список.
    options:
    - запланувати
    - планувати
    - буду планувати
    - планував
    correct: 0
  - question: Вона _____ смачні салати дуже довго.
    options:
    - буде готувати
    - приготує
    - готувати
    - приготувати
    correct: 0
  - question: Нам треба швидко _____ піцу для гостей.
    options:
    - замовити
    - замовляти
    - замовляли
    - будемо замовляти
    correct: 0
  - question: Що ви _____ на ринку цілий день?
    options:
    - будете купувати
    - купите
    - купили
    - будете купити
    correct: 0
  - question: Сьогодні буде велика _____!
    options:
    - вечірка
    - вечірку
    - вечіркою
    - вечірці
    correct: 0
  - question: У нас ще немає гарної _____ для свята.
    options:
    - музики
    - музика
    - музику
    - музикою
    correct: 0
  - question: На столі немає великого _____.
    options:
    - торта
    - торт
    - тортами
    - тортом
    correct: 0
- id: fill-in-shopping-groceries
  type: fill-in
  instruction: Вставте правильне слово (кількість і відмінок)
  items:
  - sentence: Дайте мені, будь ласка, п'ять ____ яблук.
    options:
    - кілограмів
    - кілограми
    - кілограм
    - кілограму
    answer: кілограмів
  - sentence: Скільки коштує один кілограм ____?
    options:
    - меду
    - мед
    - медом
    - меді
    answer: меду
  - sentence: Я хочу купити три ____.
    options:
    - кавуни
    - кавун
    - кавунів
    - кавунами
    answer: кавуни
  - sentence: У вас є свіжа ____?
    options:
    - картопля
    - картоплі
    - картоплю
    - картоплею
    answer: картопля
  - sentence: Мені треба кілограм свіжої ____.
    options:
    - моркви
    - морква
    - моркву
    - морквою
    answer: моркви
  - sentence: Вибачте, сьогодні немає ____ сиру.
    options:
    - домашнього
    - домашній
    - домашньому
    - домашнім
    answer: домашнього
  - sentence: Дайте мені, будь ласка, два кілограми ____.
    options:
    - помідорів
    - помідори
    - помідор
    - помідором
    answer: помідорів
  - sentence: Цей свіжий мед коштує триста ____.
    options:
    - гривень
    - гривні
    - гривня
    - гривням
    answer: гривень
- id: match-up-story-completion
  type: match-up
  instruction: З'єднайте початок речення і правильне дієслово (процес або результат)
  pairs:
  - left: Ми весь вечір...
    right: '...дивилися фільм.'
  - left: Я нарешті...
    right: '...прочитав цю книгу.'
  - left: Вона часто...
    right: '...купувала каву тут.'
  - left: Студенти цілий день...
    right: '...писали тест.'
  - left: Він завжди...
    right: '...робив цю роботу добре.'
  - left: Спочатку я...
    right: '...поснідав, потім пішов на роботу.'
  - left: Вона вчора...
    right: '...купила новий телефон.'
  - left: Ми успішно...
    right: '...склали іспит.'
- id: match-up-short-narrative
  type: match-up
  instruction: З'єднайте запитання та відповіді про розповідь
  pairs:
  - left: Що він робив вранці?
    right: Довго читав новини і пив каву.
  - left: Куди він пішов потім?
    right: У центр міста.
  - left: Де він зустрів старого друга?
    right: Коли гуляв парком.
  - left: Куди вони зайшли?
    right: В кафе.
  - left: Що вони замовили?
    right: Обід.
  - left: Скільки часу вони обговорювали плани?
    right: Цілий вечір.
  - left: Коли він повернувся додому?
    right: Пізно.
  - left: Який у нього був настрій в кінці дня?
    right: Він був дуже радий.
