- id: match-up-narrative-questions
  type: match-up
  instruction: З'єднайте запитання за текстом з правильною відповіддю
  pairs:
  - left: Що читав автор тексту?
    right: Журнал про сучасне мистецтво.
  - left: Хто несподівано написав повідомлення?
    right: Його друг.
  - left: Куди запропонував піти друг?
    right: У затишне кафе.
  - left: Де знаходиться кафе?
    right: На центральній площі.
  - left: Що замовили друзі?
    right: Смачну каву.
  - left: Про що вони довго розмовляли?
    right: Про майбутні плани.
  - left: Що вони вирішили зробити потім?
    right: Погуляти містом.
  - left: Яким був відпочинок?
    right: Чудовим після робочого тижня.
workbook:
- id: error-correction-genitive
  type: error-correction
  instruction: Знайдіть і виправте помилку (правила родового відмінка)
  items:
  - sentence: У мене немає лимони.
    error: лимони
    correction: лимонів
    error_type: word
    options:
    - лимонів
    - лимоном
    - лимон
    explanation: Після слова «немає» використовуємо родовий відмінок.
  - sentence: Дайте мені один кілограми яблук.
    error: кілограми
    correction: кілограм
    error_type: word
    options:
    - кілограм
    - кілограмів
    - кілограма
    explanation: Після цифри 1 використовуємо називний відмінок однини.
  - sentence: Вона купила дві дині і п'ять лимони.
    error: лимони
    correction: лимонів
    error_type: word
    options:
    - лимонів
    - лимонах
    - лимоном
    explanation: Після цифри 5 і більше використовуємо родовий відмінок множини.
  - sentence: Скільки коштує кілограм мед?
    error: мед
    correction: меду
    error_type: word
    options:
    - меду
    - медом
    - меді
    explanation: Кількість вимагає родового відмінка (кілограм чого?).
  - sentence: Я не бачу помідори на столі.
    error: помідори
    correction: помідорів
    error_type: word
    options:
    - помідорів
    - помідорам
    - помідором
    explanation: Заперечення (не бачу) дуже часто вимагає родового відмінка.
  - sentence: На вечірку треба багато фрукти.
    error: фрукти
    correction: фруктів
    error_type: word
    options:
    - фруктів
    - фруктам
    - фруктами
    explanation: Слово «багато» вимагає родового відмінка множини.
  - sentence: Ми купили три торти і дві кілограми яблук.
    error: дві
    correction: два
    error_type: word
    options:
    - два
    - двох
    - двом
    explanation: Слово «кілограм» — чоловічого роду, тому треба використовувати «два».
  - sentence: Я візьму банку мед.
    error: мед
    correction: меду
    error_type: word
    options:
    - меду
    - медом
    - меді
    explanation: Слово «банка» (чого?) вимагає родового відмінка кількості.
