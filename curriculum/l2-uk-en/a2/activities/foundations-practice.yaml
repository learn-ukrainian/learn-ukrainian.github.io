    - кілограми
    - кілограмів
  - sentence: Нам треба купити багато ____.
    answer: фруктів
    options:
    - фрукти
    - фруктів
    - фруктам
  - sentence: Він купив три ____.
    answer: торти
    options:
    - торт
    - торти
    - тортів
  - sentence: У магазині немає ____.
    answer: меду
    options:
    - мед
    - меду
    - медом
