- id: error-correction-aspect
  type: error-correction
  instruction: Знайдіть і виправте помилку (доконаний чи недоконаний вид)
  items:
  - sentence: Я довго прочитав цю книгу.
    error: прочитав
    correction: читав
    error_type: word
    options:
    - читав
    - читаю
    - почитав
    explanation: Слово «довго» (for a long time) означає процес, тому треба використовувати
      недоконаний вид «читав».
  - sentence: Спочатку я снідав, потім пішов на роботу.
    error: снідав
    correction: поснідав
    error_type: word
    options:
    - поснідав
    - снідаю
    - снідаємо
    explanation: Послідовність завершених дій (sequence of completed actions) вимагає
      доконаного виду.
  - sentence: Я вже купував фрукти і торт.
    error: купував
    correction: купив
    error_type: word
    options:
    - купив
    - куплю
    - купую
    explanation: Слово «вже» (already) фокусується на результаті, тому потрібен доконаний
      вид «купив».
  - sentence: Ми йшли в магазин, коли починався дощ.
    error: починався
    correction: почався
    error_type: word
    options:
    - почався
    - почнеться
    - почав
    explanation: Раптова подія (sudden event), яка перериває процес, вимагає доконаного
      виду.
  - sentence: Він завжди зробив цю роботу добре.
    error: зробив
    correction: робив
    error_type: word
    options:
    - робив
    - робить
    - робитиме
    explanation: Слово «завжди» (always) означає повторювану дію, для якої потрібен
      недоконаний вид.
  - sentence: Я успішно складав іспит!
    error: складав
    correction: склав
    error_type: word
    options:
    - склав
    - складаю
    - складатиму
    explanation: Слово «успішно» (successfully) і знак оклику вказують на фінальний
      результат, тому потрібен доконаний вид «склав».
