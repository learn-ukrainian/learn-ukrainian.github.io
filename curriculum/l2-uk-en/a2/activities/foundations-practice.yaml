- id: true-false-grammar
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Слово 'немає' (нема) завжди вимагає використання родового відмінка
      (Genitive case).
    correct: true
    explanation: Коли ми говоримо про відсутність чогось (немає музики, немає часу),
      ми завжди використовуємо родовий відмінок.
  - statement: Після чисел 2, 3 і 4 ми використовуємо слово 'кілограмів'.
    correct: false
    explanation: Після чисел 2, 3 і 4 ми кажемо 'кілограми'. 'Кілограмів' використовується
      після 5 і більше.
  - statement: Дієслово 'запланувати' означає довгий процес планування.
    correct: false
    explanation: Дієслово 'запланувати' — це доконаний вид (Perfective), воно фокусується
      на завершеному результаті. Процес — це 'планувати'.
  - statement: В українській мові допоміжне дієслово 'буду/будемо' використовується
      тільки з недоконаним видом (Imperfective).
    correct: true
    explanation: 'Ми кажемо ''буду готувати'' (I will be cooking). Доконаний вид утворює
      майбутній час без слова ''бути'': ''приготую'' (I will cook/finish cooking).'
  - statement: Якщо довга дія переривається раптовою подією, для раптової події ми
      використовуємо доконаний вид.
    correct: true
    explanation: 'Це класичне правило переривання (Interruption Pattern): процес (''я
      читав'') + раптова подія (''брат зайшов'').'
  - statement: Для яблук (і інших предметів, які ми рахуємо) ми кажемо 'один кілограм
      яблука'.
    correct: false
    explanation: 'Для предметів, які ми рахуємо, після ''кілограм'' використовується
      родовий відмінок множини (Genitive Plural): ''кілограм яблук'', ''кілограм помідорів''.'
