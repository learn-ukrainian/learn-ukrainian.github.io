- id: true-false-grammar-rules
  type: true-false
  instruction: Правда чи ні? (Правила граматики з уроку)
  items:
  - statement: Дієслово «бути» в майбутньому часі можна використовувати з доконаним
      видом.
    correct: false
    explanation: Складений майбутній час утворюється ТІЛЬКИ з недоконаним видом (напр.
      «буду робити»).
  - statement: Слово «немає» завжди вимагає родового відмінка.
    correct: true
    explanation: Так, відсутність чогось завжди передається родовим відмінком («немає
      лимонів»).
  - statement: Після цифр 2, 3, 4 ми використовуємо родовий відмінок множини.
    correct: false
    explanation: Після 2, 3, 4 використовується називний відмінок множини («дві дині»).
  - statement: Слова «багато» та «мало» вимагають родового відмінка множини.
    correct: true
    explanation: Так, слова, що позначають кількість, вимагають родового відмінка
      («багато фруктів»).
  - statement: Недоконаний вид описує завершений результат дії.
    correct: false
    explanation: Недоконаний вид описує процес або тривалість дії. Для результату
      потрібен доконаний вид.
  - statement: Щоб запитати про процес, ми кажемо «Що ти робив?».
    correct: true
    explanation: Так, це питання вимагає відповіді у недоконаному виді (акцент на
      процесі).
  - statement: Після цифри 5 і більше ми використовуємо називний відмінок множини.
    correct: false
    explanation: Після 5 і більше використовується родовий відмінок множини («п'ять
      лимонів»).
  - statement: Заперечення дієслова (наприклад, «не бачу») часто змінює відмінок об'єкта
      на родовий.
    correct: true
    explanation: Так, це граматичне явище називається родовий відмінок заперечення.
