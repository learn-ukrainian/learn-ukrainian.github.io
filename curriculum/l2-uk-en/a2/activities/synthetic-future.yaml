version: '1.0'
module: synthetic-future
level: a2
inline:
- id: group-sort-sort-verb-forms-into-two-groups-synthetic-future-perfective-and-analytical-future-imperfective
  type: group-sort
  instruction: 'Розподіліть дієслова на дві групи: простий (доконаний) та складений
    (недоконаний) майбутній час.'
  groups:
  - label: Простий майбутній час (Доконаний вид)
    items:
    - напишу
    - прочитає
    - зробимо
    - подзвонять
    - купиш
  - label: Складений майбутній час (Недоконаний вид)
    items:
    - буду писати
    - буде читати
    - будемо робити
    - будуть дзвонити
    - будеш купувати
- id: fill-in-complete-sentences-with-the-correct-synthetic-perfective-future-forms-based-on-context
  type: fill-in
  instruction: Вставте правильну форму простого майбутнього часу (доконаний вид).
  items:
  - sentence: Завтра я обов'язково ____ тобі вранці.
    answer: подзвоню
    options:
    - подзвоню
    - буду дзвонити
    - дзвоню
  - sentence: Він швидко ____ цю цікаву книгу.
    answer: прочитає
    options:
    - прочитає
    - буде читати
    - читає
  - sentence: Ми точно ____ свіжий хліб і молоко.
    answer: купимо
    options:
    - купимо
    - будемо купувати
    - купуємо
  - sentence: Я ____ йому всю правду про цю ситуацію.
    answer: скажу
    options:
    - скажу
    - буду казати
    - кажу
  - sentence: Моя сестра нарешті ____ важливий іспит.
    answer: складе
    options:
    - складе
    - буде складати
    - складає
  - sentence: Ти ____ смачний обід на завтра?
    answer: приготуєш
    options:
    - приготуєш
    - будеш готувати
    - готуєш
  - sentence: Вони ____ на вокзал дуже швидко.
    answer: приїдуть
    options:
    - приїдуть
    - будуть приїжджати
    - приїжджають
  - sentence: У новому році я обов'язково ____ нову книгу!
    answer: напишу
    options:
    - напишу
    - буду писати
    - пишу
- id: fill-in-future-aspect
  type: fill-in
  instruction: Оберіть правильний вид дієслова для майбутнього часу (процес чи результат).
  items:
  - sentence: Я ____ тобі щодня.
    answer: буду дзвонити
    options:
    - буду дзвонити
    - подзвоню
  - sentence: Я ____ тобі сьогодні ввечері один раз.
    answer: подзвоню
    options:
    - буду дзвонити
    - подзвоню
  - sentence: Він ____ статтю дві години.
    answer: буде читати
    options:
    - буде читати
    - прочитає
  - sentence: Він ____ статтю і піде гуляти.
    answer: прочитає
    options:
    - буде читати
    - прочитає
  - sentence: Ми ____ квартиру цілий день.
    answer: будемо прибирати
    options:
    - будемо прибирати
    - приберемо
  - sentence: Ми ____ квартиру і запросимо гостей.
    answer: приберемо
    options:
    - будемо прибирати
    - приберемо
  - sentence: Завтра я ____ весь день в офісі.
    answer: буду працювати
    options:
    - буду працювати
    - попрацюю
  - sentence: Я ____ цю роботу і піду додому.
    answer: зроблю
    options:
    - буду робити
    - зроблю
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть правильний варіант для майбутнього часу.
  items:
  - question: 'Якщо ви хочете сказати про дію, яка матиме конкретний результат (наприклад,
      готова книга), ви скажете:'
    options:
    - Я напишу книгу
    - Я буду писати книгу
    - Я пишу книгу
    - Я написав книгу
    correct: 0
  - question: 'Якщо ви описуєте довгий процес, який триватиме весь вечір, ви скажете:'
    options:
    - Я буду читати
    - Я прочитаю
    - Я прочитав
    - Я читаю
    correct: 0
  - question: Ви обіцяєте другові зателефонувати один раз завтра. Яку форму ви оберете?
    options:
    - Я подзвоню
    - Я буду дзвонити
    - Я дзвоню
    - Я дзвонив
    correct: 0
  - question: 'Ви плануєте регулярну дію — вивчати мову щодня наступного року. Ваш
      вибір:'
    options:
    - Я буду вивчати
    - Я вивчу
    - Я вивчав
    - Я вивчаю
    correct: 0
  - question: Яка форма означає, що хліб точно буде куплений?
    options:
    - Ми купимо
    - Ми будемо купувати
    - Ми купуємо
    - Ми купували
    correct: 0
  - question: Яке речення описує постійну ранкову рутину в майбутньому?
    options:
    - Вона буде пити каву
    - Вона вип'є каву
    - Вона п'є каву
    - Вона пила каву
    correct: 0
  - question: Ви гарантуєте, що виконаєте завдання і результат буде. Що ви скажете?
    options:
    - Я зроблю
    - Я буду робити
    - Я роблю
    - Я робив
    correct: 0
  - question: Яка форма дієслова НІКОЛИ не використовується у складеному майбутньому
      часі (з допоміжним дієсловом «бути»)?
    options:
    - 'Доконаний вид (наприклад: буду прочитати)'
    - 'Недоконаний вид (наприклад: буду читати)'
    - Інфінітив дієслова
    - 'Дієслова стану (наприклад: буду знати)'
    correct: 0
workbook:
- id: true-false-future
  type: true-false
  instruction: Правда чи ні? Визначте правильність тверджень про майбутній час.
  items:
  - statement: Простий (синтетичний) майбутній час утворюється тільки від дієслів
      доконаного виду.
    correct: true
    explanation: Так, доконаний вид має форму простого майбутнього часу, бо описує
      завершену дію, яка не може відбуватися в момент мовлення.
  - statement: Складений (аналітичний) майбутній час утворюється від дієслів доконаного
      виду.
    correct: false
    explanation: Ні, він утворюється тільки від дієслів недоконаного виду, щоб показати
      процес або повторюваність.
  - statement: У складеному майбутньому часі змінюється тільки допоміжне дієслово
      «бути» (буду, будеш...).
    correct: true
    explanation: Головне дієслово завжди залишається у формі інфінітива і не змінюється.
  - statement: Форма «я буду прочитати» є правильною.
    correct: false
    explanation: Це граматична помилка. Після «буду» можна використовувати тільки
      недоконаний вид («читати»).
  - statement: Дієслово «зроблю» означає завершений результат у майбутньому.
    correct: true
    explanation: Це доконаний вид, простий майбутній час. Дія матиме результат.
  - statement: Дієслова доконаного виду мають форми теперішнього часу.
    correct: false
    explanation: Ні, вони описують завершену дію, тому їхні форми з закінченнями теперішнього
      часу автоматично означають майбутнє.
  - statement: «Я буду працювати» і «я попрацюю» мають абсолютно однакове значення.
    correct: false
    explanation: «Буду працювати» — це процес, а «попрацюю» — дія, яка триватиме певний
      час і обов'язково завершиться.
  - statement: Форма «ти напишеш» — це друга особа однини простого майбутнього часу.
    correct: true
    explanation: Так, дієслово «написати» (доконаний вид), закінчення «-еш».
- id: match-up-aspect-pairs
  type: match-up
  instruction: З'єднайте дієслова недоконаного (процес) і доконаного (результат) виду.
  pairs:
  - left: робити
    right: зробити
  - left: писати
    right: написати
  - left: читати
    right: прочитати
  - left: дзвонити
    right: подзвонити
  - left: купувати
    right: купити
  - left: казати
    right: сказати
  - left: їхати
    right: поїхати
  - left: бачити
    right: побачити
- id: error-correction-future
  type: error-correction
  instruction: Знайдіть і виправте помилку в утворенні майбутнього часу.
  items:
  - sentence: Завтра я буду прочитати цю цікаву книгу.
    error: прочитати
    correction: читати
    error_type: construction
    options:
    - читати
    - прочитаю
    - читаю
    explanation: Після дієслова «буду» можна використовувати тільки інфінітив недоконаного
      виду.
  - sentence: Ми будемо купити новий телефон у магазині.
    error: купити
    correction: купувати
    error_type: construction
    options:
    - купувати
    - купимо
    - купуємо
    explanation: '«Купити» — це доконаний вид. Потрібен недоконаний: «будемо купувати»
      (або просто форма «купимо»).'
  - sentence: Ввечері вона будемо дивитися новий фільм.
    error: будемо
    correction: буде
    error_type: word
    options:
    - буде
    - будуть
    - будеш
    explanation: Для займенника «вона» (3 особа однини) потрібна форма «буде».
  - sentence: Ти зроблю це домашнє завдання дуже швидко.
    error: зроблю
    correction: зробиш
    error_type: word
    options:
    - зробиш
    - зробить
    - зробимо
    explanation: Для займенника «ти» (2 особа однини) потрібне закінчення «-иш».
  - sentence: Я обов'язково напишуть довгого листа завтра.
    error: напишуть
    correction: напишу
    error_type: word
    options:
    - напишу
    - напишемо
    - напише
    explanation: Для займенника «я» (1 особа однини) потрібна форма «напишу».
  - sentence: Вони буде працювати весь день у великому офісі.
    error: буде
    correction: будуть
    error_type: word
    options:
    - будуть
    - будемо
    - буду
    explanation: Для займенника «вони» (множина) потрібна форма «будуть».
  - sentence: Ми точно поїду на вокзал разом із вами.
    error: поїду
    correction: поїдемо
    error_type: word
    options:
    - поїдемо
    - поїдуть
    - поїдете
    explanation: Для займенника «ми» (1 особа множини) потрібне закінчення «-емо».
  - sentence: Ви прочитає цю статтю до кінця сьогодні?
    error: прочитає
    correction: прочитаєте
    error_type: word
    options:
    - прочитаєте
    - прочитаєш
    - прочитають
    explanation: Для займенника «ви» (2 особа множини) потрібне закінчення «-ете».
