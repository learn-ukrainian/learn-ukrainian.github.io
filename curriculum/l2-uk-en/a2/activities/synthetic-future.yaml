version: '1.0'
module: synthetic-future
level: a2
inline:
- id: fill-in-choose-between-simple-and-compound-future-forms-based-on-context
  type: fill-in
  instruction: Оберіть правильну форму дієслова за змістом (результат чи процес).
  items:
  - sentence: Завтра я весь день ____ книгу.
    answer: буду читати
    options:
    - буду читати
    - прочитаю
  - sentence: Я ____ великий салат на вечерю.
    answer: зроблю
    options:
    - зроблю
    - буду робити
  - sentence: Кожного вечора вона ____ своїм друзям.
    answer: буде дзвонити
    options:
    - буде дзвонити
    - подзвонить
  - sentence: Якщо ти ____ квитки, я куплю попкорн.
    answer: купиш
    options:
    - купиш
    - будеш купувати
  - sentence: Я ____ цей довгий емейл цілий вечір.
    answer: буду писати
    options:
    - напишу
    - буду писати
  - sentence: За хвилину я ____ тобі свій план.
    answer: скажу
    options:
    - скажу
    - буду казати
  - sentence: Ми ____ разом щодня.
    answer: будемо працювати
    options:
    - попрацюємо
    - будемо працювати
  - sentence: О сьомій годині я ____ додому.
    answer: приїду
    options:
    - приїду
    - буду приїжджати
- id: group-sort-future-forms
  type: group-sort
  instruction: 'Розподіліть дієслова на дві групи: простий (результат) та складений
    (процес) майбутній час.'
  groups:
  - label: Простий (результат)
    items:
    - напишу
    - зроблю
    - прочитаю
    - куплю
  - label: Складений (процес)
    items:
    - буду писати
    - будуть робити
    - будемо читати
    - будеш купувати
- id: fill-in-compound-future
  type: fill-in
  instruction: Вставте правильну форму допоміжного дієслова «бути».
  items:
  - sentence: Завтра я ____ прибирати квартиру.
    answer: буду
    options:
    - буду
    - будеш
    - буде
  - sentence: Що ти ____ робити ввечері?
    answer: будеш
    options:
    - буду
    - будеш
    - будемо
  - sentence: Ми ____ часто зустрічатися.
    answer: будемо
    options:
    - будете
    - будуть
    - будемо
  - sentence: Вона ____ допомагати мені щодня.
    answer: буде
    options:
    - буде
    - будемо
    - будуть
  - sentence: Вони ____ бігати у великому парку.
    answer: будуть
    options:
    - будете
    - будуть
    - буду
  - sentence: Ви ____ читати цю книгу?
    answer: будете
    options:
    - будемо
    - будете
    - будуть
- id: quiz-aspect-choice
  type: quiz
  instruction: Оберіть правильний варіант та логічне пояснення до нього.
  items:
  - question: Я (буду читати / прочитаю) цю статтю весь вечір.
    options:
    - буду читати (це довгий процес)
    - прочитаю (це фінальний результат)
    - прочитаю (це довгий процес)
    - буду читати (це фінальний результат)
    correct: 0
  - question: Я (буду дзвонити / подзвоню) тобі за хвилину.
    options:
    - подзвоню (це швидкий результат)
    - буду дзвонити (це тривала дія)
    - подзвоню (це довгий процес)
    - буду дзвонити (це фінальний результат)
    correct: 0
  - question: Ми (будемо купувати / купимо) фрукти щодня.
    options:
    - будемо купувати (це повторювана дія)
    - купимо (це одна завершена дія)
    - купимо (це повторювана дія)
    - будемо купувати (це результат)
    correct: 0
  - question: Якщо ти (будеш допомагати / допоможеш) мені, ми підемо в кіно.
    options:
    - допоможеш (умова для результату)
    - будеш допомагати (умова для результату)
    - допоможеш (це довга рутина)
    - будеш допомагати (це одна коротка дія)
    correct: 0
  - question: Я швидко (напишу / буду писати) цей текст.
    options:
    - напишу (це одна завершена дія)
    - буду писати (це тривалий процес)
    - напишу (це тривалий процес)
    - буду писати (це одна завершена дія)
    correct: 0
  - question: Вона (буде працювати / попрацює) в офісі цілий день.
    options:
    - буде працювати (це тривала дія)
    - попрацює (це активний процес)
    - попрацює (це регулярна дія)
    - буде працювати (це одна швидка дія)
    correct: 0
  - question: Вони (будуть зустрічатися / зустрінуться) часто.
    options:
    - будуть зустрічатися (це регулярна дія)
    - зустрінуться (це одна дія)
    - зустрінуться (це регулярна дія)
    - будуть зустрічатися (це одна швидка дія)
    correct: 0
  - question: Я (скажу / буду казати) тобі свій план зараз.
    options:
    - скажу (це конкретний результат)
    - буду казати (це довгий процес)
    - скажу (це довгий процес)
    - буду казати (це конкретний результат)
    correct: 0
workbook:
- type: match-up
  instruction: З'єднайте займенник із правильною формою дієслова «бути» для складеного
    майбутнього часу.
  pairs:
  - left: я
    right: буду
  - left: ти
    right: будеш
  - left: він/вона/воно
    right: буде
  - left: ми
    right: будемо
  - left: ви
    right: будете
  - left: вони
    right: будуть
- type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в реченнях.
  items:
  - sentence: Завтра я буду прочитати цікаву статтю.
    error: прочитати
    correction: читати
    error_type: word
    options:
    - читати
    - прочитаю
    - читаю
    explanation: Після дієслова «бути» ми використовуємо тільки недоконаний вид («читати»).
  - sentence: Кожного вечора ми подивимося фільми.
    error: подивимося
    correction: будемо дивитися
    error_type: phrase
    options:
    - будемо дивитися
    - дивимося
    - подивитися
    explanation: Для регулярних дій («кожного вечора») ми використовуємо складений
      час («будемо дивитися»).
  - sentence: Я обіцяю, що буду зробити салат.
    error: зробити
    correction: робити
    error_type: word
    options:
    - робити
    - зроблю
    - зробити
    explanation: Після «буду» не можна використовувати доконаний вид («зробити»).
  - sentence: Вона буде написати емейл цілий день.
    error: написати
    correction: писати
    error_type: word
    options:
    - писати
    - напишуть
    - пише
    explanation: Складений час показує процес («цілий день»), тому після «буде» потрібен
      недоконаний вид («писати»).
  - sentence: Якщо ти будеш купити квитки, я куплю попкорн.
    error: будеш купити
    correction: купиш
    error_type: phrase
    options:
    - купиш
    - будеш купувати
    - купити
    explanation: «Будеш купити» — це неправильна комбінація. Потрібен простий майбутній
      час («купиш») для швидкого результату.
  - sentence: Я буду подзвонити тобі щодня.
    error: подзвонити
    correction: дзвонити
    error_type: word
    options:
    - дзвонити
    - дзвоню
    - подзвоню
    explanation: Для щоденної дії після «буду» ми беремо недоконаний вид («дзвонити»).
- type: true-false
  instruction: Прочитайте твердження про майбутній час і визначте, правда це чи ні.
  items:
  - statement: Простий майбутній час утворюється від дієслів доконаного виду.
    correct: true
    explanation: 'Так, наприклад: я прочитаю, я зроблю.'
  - statement: Форма «я буду написати» є абсолютно правильною в українській мові.
    correct: false
    explanation: 'Ні, ми ніколи не поєднуємо слово «бути» з доконаним видом. Правильно:
      я буду писати.'
  - statement: Складений майбутній час (з дієсловом «бути») показує довгий процес.
    correct: true
    explanation: 'Так, цей час ідеальний для процесів: я буду читати весь день.'
  - statement: Для регулярних дій (наприклад, «щодня») ми використовуємо дієслова
      доконаного виду.
    correct: false
    explanation: 'Ні, регулярні дії — це завжди процес (недоконаний вид: я буду дзвонити
      щодня).'
  - statement: Дієслова доконаного виду мають закінчення теперішнього часу (наприклад,
      «я зроблю»).
    correct: true
    explanation: Так, вони відмінюються так само, але мають майбутнє значення через
      префікс.
  - statement: Після слова «якщо» для майбутнього часу ми використовуємо теперішній
      час.
    correct: false
    explanation: 'Ні, в українській мові ми використовуємо майбутній час: «Якщо ти
      прийдеш, я буду радий».'
- type: translate
  instruction: Оберіть правильний переклад речень українською мовою, звертаючи увагу
    на вид дієслова.
  items:
  - source: I will be reading a book all evening.
    options:
    - text: Я буду читати книгу весь вечір.
      correct: true
    - text: Я прочитаю книгу весь вечір.
      correct: false
    - text: Я читаю книгу весь вечір.
      correct: false
  - source: I will read (finish) this book tomorrow.
    options:
    - text: Я прочитаю цю книгу завтра.
      correct: true
    - text: Я буду читати цю книгу завтра.
      correct: false
    - text: Я прочитаю цю книгу вчора.
      correct: false
  - source: We will meet often.
    options:
    - text: Ми будемо часто зустрічатися.
      correct: true
    - text: Ми часто зустрінемося.
      correct: false
    - text: Ми зустрічаємося часто.
      correct: false
  - source: I will call you in a minute.
    options:
    - text: Я подзвоню тобі за хвилину.
      correct: true
    - text: Я буду дзвонити тобі за хвилину.
      correct: false
    - text: Я телефоную тобі.
      correct: false
  - source: What will you be doing tonight?
    options:
    - text: Що ти будеш робити сьогодні ввечері?
      correct: true
    - text: Що ти зробиш сьогодні ввечері?
      correct: false
    - text: Що ти робиш сьогодні?
      correct: false
  - source: I will do this task quickly.
    options:
    - text: Я швидко зроблю це завдання.
      correct: true
    - text: Я швидко буду робити це завдання.
      correct: false
    - text: Я роблю це швидко.
      correct: false
