- type: group-sort
  title: "Розподіліть за групами: процес чи результат"
  instruction: "Визначте, яке дієслово означає тривалий процес (недоконаний вид), а яке — завершений результат (доконаний вид)."
  groups:
    - name: "Недоконаний вид (Процес)"
      items:
        - "робити"
        - "читати"
        - "ділити"
        - "вмикати"
        - "забувати"
        - "лягати"
        - "говорити"
        - "шукати"
    - name: "Доконаний вид (Результат)"
      items:
        - "зробити"
        - "прочитати"
        - "поділити"
        - "увімкнути"
        - "забути"
        - "лягти"
        - "сказати"
        - "знайти"

- type: fill-in
  title: "Вставте правильне дієслово: процес чи результат"
  instruction: "Оберіть правильну форму дієслова (недоконаний або доконаний вид) залежно від контексту речення."
  items:
    - sentence: "Вчора весь вечір я ___ цікаву статтю."
      answer: "читав"
      options:
        - "читав"
        - "прочитав"
        - "читаю"
        - "прочитаю"
    - sentence: "Нарешті я уважно ___ цей важливий документ!"
      answer: "прочитав"
      options:
        - "читав"
        - "прочитав"
        - "читаю"
        - "читатиму"
    - sentence: "Ми ___ цю складну проблему цілу годину."
      answer: "вирішували"
      options:
        - "вирішували"
        - "вирішили"
        - "вирішуємо"
        - "вирішимо"
    - sentence: "Олена швидко і геніально ___ це завдання."
      answer: "вирішила"
      options:
        - "вирішувала"
        - "вирішила"
        - "вирішує"
        - "вирішити"
    - sentence: "Студенти довго ___ домашнє завдання вдома."
      answer: "робили"
      options:
        - "робили"
        - "зробили"
        - "роблять"
        - "зробити"
    - sentence: "Сьогодні я нарешті ___ всю свою роботу."
      answer: "зробив"
      options:
        - "робив"
        - "зробив"
        - "роблю"
        - "зроблю"
    - sentence: "Він дуже повільно ___ на стілець."
      answer: "сідав"
      options:
        - "сідав"
        - "сів"
        - "сідає"
        - "сяде"
    - sentence: "Він ___ і відразу почав швидко їсти."
      answer: "сів"
      options:
        - "сідав"
        - "сів"
        - "сідає"
        - "сісти"

- type: quiz
  title: "Перевірте знання: творення видових пар"
  instruction: "Оберіть правильну відповідь на запитання про українську граматику."
  items:
    - question: "Який префікс найчастіше показує, що дія має успішний результат і повністю завершена?"
      explanation: "Префікс з- (або с-) найчастіше показує трансформацію процесу в результат (наприклад, робити - зробити)."
      options:
        - text: "префікс з-"
          correct: true
        - text: "префікс не-"
          correct: false
        - text: "префікс до-"
          correct: false
        - text: "префікс ви-"
          correct: false
    - question: "Як правильно написати доконаний вид від дієслова 'питати'?"
      explanation: "За правилом 'Кафе Птах', перед літерою П префікс з- змінюється на с-."
      options:
        - text: "спитати"
          correct: true
        - text: "зпитати"
          correct: false
        - text: "попитати"
          correct: false
        - text: "напитати"
          correct: false
    - question: "Як правильно написати доконаний вид від дієслова 'робити'?"
      explanation: "Літера Р не входить до 'Кафе Птах', тому ми пишемо префікс з-."
      options:
        - text: "зробити"
          correct: true
        - text: "сробити"
          correct: false
        - text: "поробити"
          correct: false
        - text: "заробити"
          correct: false
    - question: "Які суфікси допомагають розтягнути швидку дію у тривалий щоденний процес?"
      explanation: "Суфікси -ва- та -ува- створюють дієслова недоконаного виду."
      options:
        - text: "суфікси -ва-, -ува-"
          correct: true
        - text: "суфікси -ти-, -ти-"
          correct: false
        - text: "суфікси -ен-, -н-"
          correct: false
        - text: "суфікси -ок-, -ик-"
          correct: false
    - question: "До якого виду належить дієслово 'відкривати' (наприклад, вікно кожного ранку)?"
      explanation: "Це дієслово описує регулярний процес (має суфікс -ва-), тому це недоконаний вид."
      options:
        - text: "недоконаний вид"
          correct: true
        - text: "доконаний вид"
          correct: false
        - text: "обидва види"
          correct: false
        - text: "жоден з видів"
          correct: false
    - question: "До якого виду належить дієслово 'відкрити' (наприклад, відкрити вікно один раз)?"
      explanation: "Це дієслово описує разовий, завершений результат, тому це доконаний вид."
      options:
        - text: "доконаний вид"
          correct: true
        - text: "недоконаний вид"
          correct: false
        - text: "обидва види"
          correct: false
        - text: "жоден з видів"
          correct: false
    - question: "Як правильно утворити доконаний вид від дієслова 'казати'?"
      explanation: "Слово 'казати' має суплетивну (нерегулярну) пару 'сказати'."
      options:
        - text: "сказати"
          correct: true
        - text: "зказати"
          correct: false
        - text: "наказати"
          correct: false
        - text: "показати"
          correct: false
    - question: "Як правильно утворити доконаний вид від дієслова 'шукати'?"
      explanation: "Це суплетивна пара: шукати (процес) – знайти (результат)."
      options:
        - text: "знайти"
          correct: true
        - text: "сшукати"
          correct: false
        - text: "пошукати"
          correct: false
        - text: "нашукати"
          correct: false

- type: error-correction
  title: "Виправте граматичні помилки"
  instruction: "Знайдіть слово, яке використано неправильно (русизм або неправильний вид), і виберіть правильний варіант."
  items:
    - sentence: "Завтра ввечері я буду прочитати цю велику книгу."
      error: "прочитати"
      answer: "читати"
      error_type: "construction"
      options:
        - "читати"
        - "прочитав"
        - "прочитаю"
        - "читаю"
      explanation: "Слово 'буду' можна використовувати тільки з недоконаним видом (процесом)."
    - sentence: "Ми будемо зробити це важливе домашнє завдання разом."
      error: "зробити"
      answer: "робити"
      error_type: "construction"
      options:
        - "робити"
        - "зробимо"
        - "робимо"
        - "зробили"
      explanation: "Слово 'буду/будемо' ніколи не комбінується з доконаним видом."
    - sentence: "Гості, будь ласка, сядьте за цей великий стіл!"
      error: "сядьте"
      answer: "сідайте"
      error_type: "register"
      options:
        - "сідайте"
        - "сядемо"
        - "сісти"
        - "сідали"
      explanation: "Для теплого і ввічливого запрошення українці використовують недоконаний вид."
    - sentence: "Я обов'язково буду написати цей текст до завтра."
      error: "буду написати"
      answer: "напишу"
      error_type: "construction"
      options:
        - "напишу"
        - "писатиму"
        - "буду писати"
        - "написав"
      explanation: "Для майбутнього результату використовується проста форма доконаного виду."
    - sentence: "Він дуже хотів зпитати мене про це."
      error: "зпитати"
      answer: "спитати"
      error_type: "word"
      options:
        - "спитати"
        - "питати"
        - "запитати"
        - "попитати"
      explanation: "За правилом 'Кафе Птах' перед П ми пишемо С-."
    - sentence: "Вчора він дуже швидко одягався і побіг на роботу."
      error: "одягався"
      answer: "одягнувся"
      error_type: "word"
      options:
        - "одягнувся"
        - "одягається"
        - "одягнутись"
        - "одягав"
      explanation: "Дія була швидкою і завершеною перед наступною дією ('побіг'), тому потрібен доконаний вид."

