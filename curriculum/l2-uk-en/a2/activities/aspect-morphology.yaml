    - "купити"

- type: true-false
  title: "Правда чи неправда: правила видових пар"
  instruction: "Визначте, чи є твердження про українську граматику правильним."
  items:
    - statement: "Дієслова доконаного виду описують дію, яка успішно завершилася."
      correct: true
      explanation: "Так, доконаний вид завжди фокусується на завершеному результаті."
    - statement: "Дієслова доконаного виду можна використовувати в теперішньому часі."
      correct: false
      explanation: "Ні, дія в теперішньому часі ще відбувається, тому вона не може бути завершеною."
    - statement: "За правилом 'Кафе Птах', префікс з- завжди залишається з-."
      correct: false
      explanation: "Ні, перед літерами К, Ф, П, Т, Х префікс з- змінюється на с-."
    - statement: "Слово 'буду' можна використовувати тільки з дієсловами недоконаного виду."
      correct: true
      explanation: "Так, 'буду' поєднується тільки з процесами."
    - statement: "Суфікси -ва- та -ува- зазвичай роблять з короткої дії тривалий процес."
      correct: true
      explanation: "Так, вони розтягують основу слова (наприклад, відкрити -> відкривати)."
    - statement: "Дієслова 'говорити' та 'сказати' — це суплетивна пара, яка має різні корені."
      correct: true
      explanation: "Так, ці дієслова виглядають по-різному, але утворюють видову пару."
    - statement: "У ввічливих запрошеннях (наприклад, 'Сідайте!') українці використовують доконаний вид."
      correct: false
      explanation: "Ні, для теплого запрошення використовують недоконаний вид."
    - statement: "Префікс з- перетворюється на с- у слові 'зробити'."
      correct: false
      explanation: "Літера Р не входить до фрази 'Кафе Птах', тому ми пишемо 'зробити'."

