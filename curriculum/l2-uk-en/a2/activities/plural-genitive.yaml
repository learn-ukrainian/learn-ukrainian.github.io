version: '1.0'
module: plural-genitive
level: a2
inline:
- id: fill-in-genitive-i
  type: fill-in
  instruction: Вставте правильну форму слова в родовому відмінку множини.
  items:
  - sentence: Тут є багато ____ (книга).
    answer: книг
    options:
    - книг
    - книгів
    - книжок
  - sentence: У мене є кілька ____ (книжка).
    answer: книжок
    options:
    - книжок
    - книжк
    - книжків
  - sentence: Я знаю багато ____ (казка).
    answer: казок
    options:
    - казок
    - казків
    - казк
  - sentence: У місті є багато ____ (школа).
    answer: шкіл
    options:
    - шкіл
    - школ
    - школів
  - sentence: У нас немає ____ (картка).
    answer: карток
    options:
    - картк
    - карток
    - картків
  - sentence: Тут є п'ять ____ (вишня).
    answer: вишень
    options:
    - вишень
    - вишнів
    - вишня
  - sentence: Тут є кілька ____ (стаття).
    answer: статей
    options:
    - статтів
    - статей
    - стать
  - sentence: Я маю багато ____ (надія).
    answer: надій
    options:
    - надій
    - надіїв
    - надійов
- id: match-up-singular-plural
  type: match-up
  instruction: З'єднайте слово в однині з його формою в родовому відмінку множини
    (багато...).
  pairs:
  - left: стіл
    right: столів
  - left: день
    right: днів
  - left: гість
    right: гостей
  - left: вікно
    right: вікон
  - left: завдання
    right: завдань
  - left: киянин
    right: киян
  - left: комп'ютер
    right: комп'ютерів
  - left: учень
    right: учнів
- id: quiz-quantity-agreement
  type: quiz
  instruction: Оберіть правильну форму для вираження кількості.
  items:
  - question: Я маю двадцять _____.
    options:
    - доларів
    - долари
    - долар
    - долара
    correct: 0
  - question: Скільки у нас чистих _____?
    options:
    - тарілків
    - тарілки
    - тарілок
    - тарілк
    correct: 2
  - question: Тут є три _____.
    options:
    - столи
    - столів
    - стіл
    - стола
    correct: 0
  - question: Тут є кілька _____.
    options:
    - яблуків
    - яблук
    - яблуки
    - яблука
    correct: 1
  - question: У нас дуже мало _____.
    options:
    - часу
    - часів
    - часи
    - час
    correct: 0
  - question: Скільки _____ коштує комп'ютер?
    options:
    - гроші
    - грошей
    - грошів
    - гроша
    correct: 1
  - question: Я маю п'ять _____.
    options:
    - статтів
    - статті
    - статей
    - стаття
    correct: 2
  - question: У місті живе багато _____.
    options:
    - родин
    - родина
    - родинів
    - родини
    correct: 0
- id: true-false-genitive-errors
  type: true-false
  instruction: Чи правильно написана форма слова в родовому відмінку множини?
  items:
  - statement: У місті живе багато громадянинів.
    correct: false
    explanation: 'Правильно: громадян. Суфікс ''-ин'' зникає у множині.'
  - statement: Я маю п'ятнадцять гривень.
    correct: true
    explanation: Слово 'гривня' має форму 'гривень' (нульове закінчення + вставний
      голосний).
  - statement: Тут є кілька сестрів.
    correct: false
    explanation: 'Правильно: сестер. Потрібен вставний голосний ''е''.'
  - statement: Я маю десять доларів.
    correct: true
    explanation: Слово 'долар' має стандартне закінчення чоловічого роду '-ів'.
  - statement: Скільки яблуків тут є?
    correct: false
    explanation: 'Правильно: яблук. Слово ''яблуко'' має нульове закінчення.'
  - statement: Сьогодні тут багато гостей.
    correct: true
    explanation: Слово 'гість' має особливе закінчення '-ей'.
  - statement: Тут є тисячі книгів.
    correct: false
    explanation: 'Правильно: книг. Слово ''книга'' має нульове закінчення.'
  - statement: Я знаю кілька слів.
    correct: true
    explanation: Слово 'слово' має нульове закінчення з чергуванням (о -> і).
workbook:
- id: error-correction-genitive
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні.
  items:
  - sentence: Скільки вікнів у місті?
    error: вікнів
    correction: вікон
    error_type: word
    options:
    - вікон
    - вікні
    - вікно
    explanation: Слово 'вікно' середнього роду має нульове закінчення та вставний
      голосний 'о'.
  - sentence: У місті є багато музеї.
    error: музеї
    correction: музеїв
    error_type: word
    options:
    - музеїв
    - музею
    - музеями
    explanation: 'Після слова ''багато'' використовуємо родовий відмінок множини:
      ''музеїв''.'
  - sentence: Тут є кілька країнів.
    error: країнів
    correction: країн
    error_type: word
    options:
    - країн
    - країни
    - країною
    explanation: 'Слово ''країна'' жіночого роду має нульове закінчення: ''країн''.'
  - sentence: У мене немає гроші.
    error: гроші
    correction: грошей
    error_type: word
    options:
    - грошей
    - грошів
    - грошам
    explanation: У родовому відмінку множини слово 'гроші' має форму 'грошей'.
  - sentence: Ми знаємо п'ять словів.
    error: словів
    correction: слів
    error_type: word
    options:
    - слів
    - слова
    - словами
    explanation: Слово 'слово' середнього роду має нульове закінчення і чергування
      'о-і'.
  - sentence: Тут є багато киянинів.
    error: киянинів
    correction: киян
    error_type: word
    options:
    - киян
    - кияни
    - киянами
    explanation: 'Суфікс ''-ин'' зникає у множині: один киянин -> багато киян.'
- id: unjumble-quantity-dialogues
  type: unjumble
  instruction: Складіть правильне речення зі слів.
  items:
  - words:
    - вікон.
    - багато
    - будинку
    - У
    - цьому
    correct_order:
    - У
    - цьому
    - будинку
    - багато
    - вікон.
  - words:
    - п'ять
    - яблук.
    - Дайте
    - кілограмів
    - мені
    correct_order:
    - Дайте
    - мені
    - п'ять
    - кілограмів
    - яблук.
  - words:
    - є
    - тільки
    - двадцять
    - У
    - нас
    - тарілок.
    correct_order:
    - У
    - нас
    - є
    - тільки
    - двадцять
    - тарілок.
  - words:
    - зовсім
    - немає
    - склянок!
    - чистих
    - У
    - нас
    correct_order:
    - У
    - нас
    - зовсім
    - немає
    - чистих
    - склянок!
  - words:
    - коштує
    - двісті
    - Ваша
    - покупка
    - гривень.
    correct_order:
    - Ваша
    - покупка
    - коштує
    - двісті
    - гривень.
  - words:
    - живе
    - тисяч
    - Тут
    - кілька
    - людей.
    correct_order:
    - Тут
    - живе
    - кілька
    - тисяч
    - людей.
- id: group-sort-genitive-endings
  type: group-sort
  instruction: Розподіліть іменники за їхнім закінченням у родовому відмінку множини
    (багато...).
  groups:
  - label: -ів / -їв
    items:
    - студент
    - музей
    - герой
    - долар
    - день
    - учень
  - label: нульове закінчення
    items:
    - книга
    - вікно
    - киянин
    - завдання
    - яблуко
    - родина
  - label: -ей
    items:
    - гість
    - стаття
    - кінь
    - гроші
    - сім'я
    - свиня
