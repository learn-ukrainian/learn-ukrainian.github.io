version: '1.0'
module: plural-genitive
level: a2
inline: []
workbook:
- id: match-up-gen-pl
  type: match-up
  instruction: З'єднайте слова в однині з їхньою формою родового відмінка множини
    (багато...)
  pairs:
  - left: книга
    right: книг
  - left: слово
    right: слів
  - left: стіл
    right: столів
  - left: брат
    right: братів
  - left: сестра
    right: сестер
  - left: море
    right: морів
  - left: людина
    right: людей
  - left: дитина
    right: дітей
- id: fill-in-fleeting-vowels
  type: fill-in
  instruction: Утворіть родовий відмінок множини, звертаючи увагу на вставні голосні
    та нульове закінчення
  items:
  - sentence: У нашій школі багато _____.
    answer: вікон
    options:
    - вікон
    - вікн
    - вікнів
  - sentence: У місті немає вільних _____.
    answer: земель
    options:
    - земель
    - землів
    - землей
  - sentence: На столі лежить кілька _____.
    answer: сумок
    options:
    - сумок
    - сумк
    - сумків
  - sentence: Я прочитав багато цікавих _____.
    answer: казок
    options:
    - казок
    - казк
    - казків
  - sentence: У нього є п'ять _____.
    answer: сестер
    options:
    - сестер
    - сестрів
    - сестр
  - sentence: Вона знає багато українських _____.
    answer: пісень
    options:
    - пісень
    - піснів
    - пісней
  - sentence: У нас на кухні мало _____.
    answer: тарілок
    options:
    - тарілок
    - тарілк
    - тарілків
  - sentence: На столі лежить кілька _____.
    answer: склянок
    options:
    - склянок
    - склянк
    - склянків
- id: true-false-gen-pl
  type: true-false
  instruction: Правда чи ні? Це правильна форма родового відмінка множини?
  items:
  - statement: Форма для слова «брат» — це «братей».
    correct: false
    explanation: 'Слово «брат» має тверду основу і отримує закінчення -ів: братів.'
  - statement: Форма для слова «книга» — це «книгів».
    correct: false
    explanation: 'Слово «книга» жіночого роду і має нульове закінчення: книг.'
  - statement: Форма для слова «місто» — це «міст».
    correct: true
    explanation: Іменники середнього роду на -о мають нульове закінчення.
  - statement: Форма для слова «суддя» — це «суддей».
    correct: false
    explanation: Слово «суддя» належить до чоловічого роду і має форму «суддів».
  - statement: Форма для слова «гроші» — це «грошей».
    correct: true
    explanation: Це слово — виняток, який потрібно запам'ятати.
  - statement: Форма для слова «око» — це «оків».
    correct: false
    explanation: 'Слово «око» — це історичний виняток. Правильна форма: очей.'
  - statement: Форма для слова «стіл» — це «столів».
    correct: true
    explanation: Слово чоловічого роду з твердою основою отримує закінчення -ів.
  - statement: Форма для слова «дитина» — це «дітей».
    correct: true
    explanation: Це слово повністю змінює свій корінь у множині.
- id: quiz-quantity
  type: quiz
  instruction: Оберіть правильний варіант після слова кількості
  items:
  - question: У мене багато _____.
    options:
    - друзі
    - друзів
    - други
    - друзей
    correct: 1
  - question: Я бачу на вулиці кілька _____.
    options:
    - студентей
    - студенти
    - студентов
    - студентів
    correct: 3
  - question: Скільки _____ це коштує?
    options:
    - гроші
    - грошам
    - грошей
    - грошів
    correct: 2
  - question: У цьому місті дуже мало _____.
    options:
    - парки
    - паркей
    - парків
    - парков
    correct: 2
  - question: На столі лежить десять _____.
    options:
    - яблука
    - яблуки
    - яблуків
    - яблук
    correct: 3
  - question: У нашій групі двадцять _____.
    options:
    - учнів
    - учні
    - учнев
    - учень
    correct: 0
  - question: У нього є п'ять _____.
    options:
    - брати
    - братей
    - брата
    - братів
    correct: 3
  - question: Вона написала декілька _____.
    options:
    - статті
    - статтів
    - статть
    - статей
    correct: 3
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: На столі лежить десять яблука.
    error: яблука
    correction: яблук
    error_type: word
    options:
    - яблук
    - яблуки
    - яблуків
    explanation: Після цифри 10 ми використовуємо родовий відмінок множини.
  - sentence: У мене немає гроші.
    error: гроші
    correction: грошей
    error_type: word
    options:
    - грошей
    - гроша
    - грошів
    explanation: 'Слово «немає» завжди вимагає родового відмінка: немає грошей.'
  - sentence: Я маю багато друзі.
    error: друзі
    correction: друзів
    error_type: word
    options:
    - друзів
    - други
    - друзей
    explanation: Слово «багато» вимагає родового відмінка множини.
  - sentence: Там стоїть п'ять столи.
    error: столи
    correction: столів
    error_type: word
    options:
    - столів
    - стола
    - столов
    explanation: Після цифри 5 ми використовуємо родовий відмінок множини.
  - sentence: Скільки гривні це коштує?
    error: гривні
    correction: гривень
    error_type: word
    options:
    - гривень
    - гривня
    - гривнів
    explanation: 'Слово «скільки» вимагає родового відмінка множини: скільки гривень?'
  - sentence: У нас мало вікна.
    error: вікна
    correction: вікон
    error_type: word
    options:
    - вікон
    - вікн
    - вікнів
    explanation: 'Слово «мало» вимагає родового відмінка множини: мало вікон.'
- id: group-sort-endings
  type: group-sort
  instruction: Розподіліть іменники за їхнім закінченням у родовому відмінку множини
  groups:
  - label: -ів / -їв
    items:
    - стіл
    - брат
    - водій
    - подвір'я
  - label: -ей
    items:
    - гість
    - людина
    - око
    - ніч
  - label: нульове закінчення
    items:
    - книга
    - місто
    - слово
    - киянин
- id: count-syllables-gen
  type: count-syllables
  instruction: Скільки складів? (Порахуйте голосні звуки у цих словах)
  items:
  - word: гривень
    correct: 2
  - word: столів
    correct: 2
  - word: книг
    correct: 1
  - word: сумок
    correct: 2
  - word: комп'ютерів
    correct: 4
  - word: грошей
    correct: 2
- id: odd-one-out-plural
  type: odd-one-out
  instruction: Яке слово зайве? (За типом закінчення у родовому відмінку множини)
  items:
  - words:
    - столів
    - братів
    - книг
    - парків
    correct: 2
    explanation: Слово «книг» має нульове закінчення, інші мають -ів.
  - words:
    - людей
    - дітей
    - грошей
    - міст
    correct: 3
    explanation: Слово «міст» має нульове закінчення, інші мають -ей.
  - words:
    - вікон
    - казок
    - яблук
    - братів
    correct: 3
    explanation: Слово «братів» має закінчення -ів, інші мають нульове закінчення.
  - words:
    - сумок
    - земель
    - вікон
    - слово
    correct: 3
    explanation: «Слово» стоїть у називному відмінку, інші форми — це родовий відмінок
      множини.
  - words:
    - сім'я
    - миша
    - гість
    - стіл
    correct: 3
    explanation: У родовому відмінку множини слово «стіл» має -ів (столів), а інші
      мають -ей (сімей, мишей, гостей).
  - words:
    - киян
    - громадян
    - татар
    - учнів
    correct: 3
    explanation: Слово «учнів» має закінчення -ів, інші мають нульове закінчення (від
      суфікса -ин).
