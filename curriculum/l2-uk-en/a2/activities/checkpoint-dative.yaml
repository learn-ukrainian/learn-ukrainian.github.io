- id: match-up-dative-verbs
  type: match-up
  instruction: З'єднайте речення, звертаючи увагу на дієслова, що вимагають давального
    відмінка.
  pairs:
  - left: Я дарую
    right: моєму другові книгу.
  - left: Вона допомагає
    right: старшій сестрі.
  - left: Ми дякуємо
    right: нашому вчителю.
  - left: Він радить
    right: новому колезі фільм.
  - left: Мені потрібно
    right: працювати сьогодні.
  - left: Тобі подобається
    right: ця нова кава?
  - left: Скільки років
    right: вашому братові?
  - left: Що подарувати
    right: пану директору?
  - left: Працівник надсилає пакунок
    right: клієнтові.
  - left: Їй здається,
    right: що це помилка.
  title: З'єднайте речення, звертаючи увагу на дієслова, що вимагають давального відмінка
workbook:
- id: true-false-dative-rules
  type: true-false
  instruction: Правда чи ні? Перевірте свої знання правил давального відмінка.
  items:
  - statement: Дієслово «дякувати» вимагає знахідного відмінка (наприклад, дякую тебе).
    correct: false
    explanation: Дієслово «дякувати» завжди вимагає давального відмінка (дякую тобі).
  - statement: У давальному відмінку приголосний «г» змінюється на «з'» (подруга —
      подрузі).
    correct: true
    explanation: Це обов'язкове чергування приголосних перед закінченням -і.
  - statement: Щоб сказати про вік, українці використовують давальний відмінок (Мені
      тридцять років).
    correct: true
    explanation: Вік завжди виражається через давальний відмінок особи.
  - statement: Чоловічі іменники в давальному відмінку можуть мати тільки закінчення
      -у / -ю.
    correct: false
    explanation: Вони також мають паралельні автентичні закінчення -ові / -еві / -єві.
  - statement: У реченні «Мені подобається кава» слово «Мені» — це підмет у називному
      відмінку.
    correct: false
    explanation: «Мені» — це давальний відмінок (експериєнцер), а підмет — «кава».
  - statement: Слово «ріка» у давальному відмінку буде «рікі».
    correct: false
    explanation: Правильна форма — «ріці» (к → ц').
  - statement: Прикметники чоловічого роду в давальному відмінку мають закінчення
      -ому (новому, старшому).
    correct: true
    explanation: Це стандартне закінчення для чоловічого та середнього роду.
  - statement: Слово «муха» у давальному відмінку буде «мусі».
    correct: true
    explanation: Приголосний «х» змінюється на «с'».
  - statement: Конструкція «Мені холодно» використовує давальний відмінок для вираження
      стану.
    correct: true
    explanation: Це класична безособова конструкція.
  - statement: Для множини прикметники в давальному відмінку мають закінчення -ім.
    correct: false
    explanation: Вони мають закінчення -им (нашим, добрим).
  title: Правда чи ні? Перевірте свої знання правил давального відмінка.
