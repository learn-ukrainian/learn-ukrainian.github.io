version: '1.0'
module: checkpoint-dative
level: a2
inline:
- id: quiz-dative-recognition
  type: quiz
  instruction: Оберіть правильний варіант у давальному відмінку
  items:
  - question: Він дав нову книгу _____.
    options:
    - мені
    - я
    - мене
    - мною
    correct: 0
  - question: Ця смачна кава подобається _____.
    options:
    - твоя мама
    - твою маму
    - твоїй мамі
    - твоєю мамою
    correct: 2
  - question: _____ потрібно йти назустріч.
    options:
    - Нам
    - Ми
    - Нас
    - Нами
    correct: 0
  - question: _____ дуже сумно без тебе.
    options:
    - Його
    - Ним
    - Він
    - Йому
    correct: 3
  - question: Скільки років вашому _____?
    options:
    - дідусь
    - дідусем
    - дідуся
    - дідусеві
    correct: 3
  - question: Вони завжди допомагають _____.
    options:
    - своя сестра
    - свою сестру
    - своїй сестрі
    - своєю сестрою
    correct: 2
  - question: _____ дуже холодно сьогодні на вулиці.
    options:
    - Вони
    - Їм
    - Їх
    - Ними
    correct: 1
  - question: Ми щиро дякуємо _____ за роботу.
    options:
    - вас
    - ви
    - вами
    - вам
    correct: 3
- id: fill-in-dative-endings
  type: fill-in
  instruction: Вставте слово у правильній формі
  items:
  - sentence: Я хочу надіслати посилку моєму старому _____.
    answer: другові
    options:
    - друг
    - другові
    - другом
    - друга
  - sentence: Що ми вирішили подарувати _____?
    answer: Олексієві
    options:
    - Олексій
    - Олексія
    - Олексієві
    - Олексієм
  - sentence: Ми йдемо назустріч новій _____.
    answer: дорозі
    options:
    - дорога
    - дорогу
    - дорозі
    - дорогою
  - sentence: Новому _____ потрібно купити комп'ютер.
    answer: колезі
    options:
    - колезі
    - колегу
    - колега
    - колегою
  - sentence: Моїй _____ подобається ця кава.
    answer: мамі
    options:
    - мама
    - маму
    - мамі
    - мамою
  - sentence: Вони щиро дякують _____ вчителю.
    answer: своєму
    options:
    - свій
    - свого
    - своєму
    - своїм
  - sentence: Я даю подарунок _____ маленькій сестрі.
    answer: твоїй
    options:
    - твоя
    - твою
    - твоїй
    - твоєю
  - sentence: Ми допомагаємо нашим _____ друзям.
    answer: новим
    options:
    - новий
    - нових
    - новим
    - новими
- id: match-verbs-to-case
  type: match-up
  instruction: З'єднайте частини речення
  pairs:
  - left: Ми дуже дякуємо
    right: нашому новому вчителю.
  - left: Вона завжди допомагає
    right: своїй любій мамі.
  - left: Я хочу подарувати
    right: квіти найкращій подрузі.
  - left: Моєму брату подобається
    right: читати старі книги.
  - left: Мені потрібно надіслати
    right: довгий лист колезі.
  - left: Моєму маленькому синові
    right: тільки три роки.
  - left: Їй дуже потрібно
    right: йти сьогодні додому.
  - left: Йому дуже сумно
    right: і дуже холодно.
- id: error-correction-dative
  type: error-correction
  instruction: Знайдіть і виправте помилку в реченні
  items:
  - sentence: Вона щиро дякує вчителя за допомогу.
    error: вчителя
    correction: вчителю
    error_type: word
    options:
    - вчителю
    - вчителя
    - вчителів
    - вчителем
    explanation: Дієслово 'дякувати' завжди вимагає давального відмінка.
  - sentence: Він дуже холодно на вулиці.
    error: Він
    correction: Йому
    error_type: word
    options:
    - Йому
    - Його
    - Він
    - Ним
    explanation: 'Використовуйте давальний відмінок для опису фізичного або емоційного
      стану: ''Йому холодно''.'
  - sentence: Моїй старій подругі тільки двадцять років.
    error: подругі
    correction: подрузі
    error_type: word
    options:
    - подрузі
    - подругу
    - подругі
    - подругою
    explanation: 'Не забувайте про чергування приголосних: ''г'' змінюється на ''з''
      перед ''і'' (подрузі).'
  - sentence: Я хочу надіслати лист мій брату.
    error: мій
    correction: моєму
    error_type: word
    options:
    - моєму
    - мого
    - мій
    - моїм
    explanation: Прикметники та займенники повинні мати узгодження з іменником у давальному
      відмінку.
  - sentence: Нового студенту потрібно більше часу.
    error: Нового
    correction: Новому
    error_type: word
    options:
    - Новому
    - Нового
    - Новий
    - Новим
    explanation: Для вираження необхідності (потрібно) використовується давальний
      відмінок.
  - sentence: Ми часто допомагаємо маму вдома.
    error: маму
    correction: мамі
    error_type: word
    options:
    - мамі
    - маму
    - мамою
    - мами
    explanation: Дієслово 'допомагати' завжди вимагає давального відмінка.
workbook:
- type: group-sort
  instruction: Розподіліть слова за відмінками
  groups:
  - label: Називний відмінок
    items:
    - брат
    - сестра
    - ми
    - вони
  - label: Родовий відмінок
    items:
    - брата
    - сестри
    - нас
    - їх
  - label: Давальний відмінок
    items:
    - братові
    - сестрі
    - нам
    - їм
- type: match-up
  instruction: З'єднайте займенник у називному відмінку з реченням у давальному
  pairs:
  - left: Я
    right: Мені дуже холодно.
  - left: Ти
    right: Тобі подобається ця кава?
  - left: Він
    right: Йому тільки три роки.
  - left: Вона
    right: Їй потрібно йти додому.
  - left: Ми
    right: Нам сумно сьогодні.
  - left: Ви
    right: Скільки вам років?
- type: fill-in
  instruction: Вставте правильний особовий займенник у давальному відмінку
  items:
  - sentence: Чи подобаються _____ ці нові фільми?
    answer: тобі
    options:
    - ти
    - тебе
    - тобі
    - тобою
  - sentence: Ми щиро дякуємо _____ за цей чудовий подарунок.
    answer: вам
    options:
    - ви
    - вас
    - вам
    - вами
  - sentence: _____ дуже холодно сьогодні на роботі.
    answer: Мені
    options:
    - Я
    - Мене
    - Мені
    - Мною
  - sentence: Скільки років вашому дідусеві? _____ вісімдесят років.
    answer: Йому
    options:
    - Він
    - Його
    - Йому
    - Ним
  - sentence: Моїй сестрі зараз сумно. Я допомагаю _____.
    answer: їй
    options:
    - вона
    - її
    - їй
    - нею
  - sentence: _____ потрібно йти, тому що вже пізно.
    answer: Нам
    options:
    - Ми
    - Нас
    - Нам
    - Нами
- type: true-false
  instruction: Правда чи ні? (Про давальний відмінок)
  items:
  - statement: Дієслово 'дякувати' в українській мові вимагає після себе знахідного
      відмінка (Accusative).
    correct: false
    explanation: Дієслово 'дякувати' завжди вимагає давального відмінка.
  - statement: Ми кажемо 'Мені холодно', а не 'Я холодний', щоб описати свій фізичний
      стан.
    correct: true
    explanation: Стан людини завжди виражається через давальний відмінок (безособові
      конструкції).
  - statement: Іменники чоловічого роду в давальному відмінку можуть мати тільки закінчення
      -у / -ю.
    correct: false
    explanation: Вони також можуть мати паралельні закінчення -ові, -еві, -єві.
  - statement: Прикметники чоловічого роду в давальному відмінку мають закінчення
      -ому.
    correct: true
    explanation: 'Наприклад: ''моєму новому другу''.'
  - statement: У слові 'подруга' в давальному відмінку літера 'г' змінюється на 'з'
      (подрузі).
    correct: true
    explanation: Це обов'язкове чергування приголосних перед 'і'.
  - statement: У реченні 'Моєму синові три роки' слово 'синові' стоїть у місцевому
      відмінку (Locative).
    correct: false
    explanation: Слово 'синові' стоїть у давальному відмінку, оскільки ми говоримо
      про вік.
- type: translate
  instruction: Оберіть правильний переклад речення
  items:
  - source: I am writing a letter to my best friend.
    options:
    - text: Я пишу лист моїй найкращій подрузі.
      correct: true
    - text: Я пишу лист мою найкращу подругу.
      correct: false
  - source: He sent a long letter to his friend.
    options:
    - text: Він надіслав довгий лист своєму другові.
      correct: true
    - text: Він надіслав довгий лист свого друга.
      correct: false
  - source: Do you like new movies?
    options:
    - text: Тобі подобаються нові фільми?
      correct: true
    - text: Ти подобаєшся нові фільми?
      correct: false
  - source: I am cold.
    options:
    - text: Мені холодно.
      correct: true
    - text: Я холодний.
      correct: false
  - source: We sincerely thank you.
    options:
    - text: Ми щиро дякуємо вам.
      correct: true
    - text: Ми щиро дякуємо вас.
      correct: false
  - source: My son is three years old.
    options:
    - text: Моєму синові три роки.
      correct: true
    - text: Мій син є три роки.
      correct: false
- type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - дякую
    - урок.
    - за
    - Я
    - вчителеві
    correct_order:
    - Я
    - дякую
    - вчителеві
    - за
    - урок.
  - words:
    - Моїй
    - вісім
    - сестрі
    - років.
    - молодшій
    correct_order:
    - Моїй
    - молодшій
    - сестрі
    - вісім
    - років.
  - words:
    - книгу
    - цю
    - Я
    - дам
    - Наталці.
    correct_order:
    - Я
    - дам
    - цю
    - книгу
    - Наталці.
  - words:
    - подобається
    - мамі
    - кава.
    - ця
    - Моїй
    correct_order:
    - Моїй
    - мамі
    - подобається
    - ця
    - кава.
  - words:
    - треба
    - Нам
    - йти
    - додому.
    correct_order:
    - Нам
    - треба
    - йти
    - додому.
  - words:
    - подарунок
    - надіслали
    - Ми
    - другові.
    - нашому
