version: '1.0'
module: checkpoint-dative
level: a2
inline:
- id: quiz
  type: quiz
  instruction: Оберіть правильну форму в давальному відмінку
  items:
  - question: _____ дуже холодно.
    options:
    - Мені
    - Мене
    - Я
    - Мною
    correct: 0
  - question: Ми купуємо подарунок _____.
    options:
    - шеф
    - шефа
    - шефом
    - шефові
    correct: 3
  - question: Студент вірить _____.
    options:
    - лікар
    - лікарю
    - лікаря
    - лікарем
    correct: 1
  - question: _____ подобається ця нова гра.
    options:
    - Діти
    - Дітей
    - Дітям
    - Дітьми
    correct: 2
  - question: Хто завжди допомагає _____?
    options:
    - мама
    - маму
    - мамі
    - мамою
    correct: 2
  - question: Я малюю картину _____.
    options:
    - сестра
    - сестру
    - сестрі
    - сестрою
    correct: 2
  - question: _____ дуже сумно сьогодні.
    options:
    - Вона
    - Її
    - Їй
    - Нею
    correct: 2
  - question: Ми щиро дякуємо _____.
    options:
    - вчитель
    - вчителя
    - вчителем
    - вчителю
    correct: 3
- id: fill-in
  type: fill-in
  instruction: Вставте правильне закінчення або слово в давальному відмінку
  items:
  - sentence: Я хочу надіслати лист моїй старшій _____ (сестра).
    answer: сестрі
    options:
    - сестра
    - сестру
    - сестрі
    - сестрою
  - sentence: Що ми подаруємо цьому новому _____ (колега)?
    answer: колезі
    options:
    - колега
    - колегу
    - колезі
    - колегою
  - sentence: Треба дати документи панові _____ (директор).
    answer: директору
    options:
    - директор
    - директора
    - директорові
    - директору
  - sentence: Ми дуже дякуємо нашому доброму _____ (сусід).
    answer: сусідові
    options:
    - сусід
    - сусіда
    - сусідом
    - сусідові
  - sentence: Моєму молодшому _____ (брат) вже десять років.
    answer: братові
    options:
    - брат
    - брата
    - братом
    - братові
  - sentence: Лікар радить _____ (пацієнт) більше спати.
    answer: пацієнту
    options:
    - пацієнт
    - пацієнта
    - пацієнтом
    - пацієнту
  - sentence: Я щиро співчуваю вашій _____ (родина).
    answer: родині
    options:
    - родина
    - родину
    - родиною
    - родині
  - sentence: Скільки років цій історичній _____ (будівля)?
    answer: будівлі
    options:
    - будівля
    - будівлю
    - будівлею
    - будівлі
- id: match-up
  type: match-up
  instruction: З'єднайте частини речення
  pairs:
  - left: Я щиро дякую
    right: своїй вчительці.
  - left: Він часто допомагає
    right: новому студенту.
  - left: Лікар радить
    right: пацієнту більше відпочивати.
  - left: Ми дуже співчуваємо
    right: вашій родині.
  - left: Мені подобається
    right: ця українська гра.
  - left: Я хочу подарувати квіти
    right: моїй мамі.
  - left: Скільки років
    right: твоєму братові?
  - left: Вам потрібно
    right: багато вчитися.
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Я щиро дякую тебе за допомогу.
    error: тебе
    correction: тобі
    error_type: word
    options:
    - тобі
    - ти
    - тобою
    explanation: Дієслово «дякувати» вимагає давального відмінка (кому?), а не знахідного.
  - sentence: Моєму мамі дуже подобається ця нова гра.
    error: Моєму
    correction: Моїй
    error_type: word
    options:
    - Моя
    - Моїй
    - Мою
    explanation: Слово «мама» — жіночого роду, тому прикметник має бути «моїй».
  - sentence: Ми допомагаємо нашого сусіда з ремонтом.
    error: нашого сусіда
    correction: нашому сусідові
    error_type: phrase
    options:
    - нашому сусідові
    - нашим сусідом
    - наш сусід
    explanation: Дієслово «допомагати» вимагає давального відмінка (кому?).
  - sentence: Нашій новій подругі сьогодні двадцять років.
    error: подругі
    correction: подрузі
    error_type: word
    options:
    - подругою
    - подрузі
    - подругу
    explanation: 'У давальному відмінку є чергування приголосних: г → з. Тому правильно
      — подрузі.'
  - sentence: Цьому історичному місті вже сто років.
    error: місті
    correction: місту
    error_type: word
    options:
    - міста
    - містом
    - місту
    explanation: Іменники середнього роду в давальному відмінку мають закінчення -у
      / -ю.
  - sentence: Студентам потрібна багато вчитися.
    error: потрібна
    correction: потрібно
    error_type: word
    options:
    - потрібно
    - потрібен
    - потрібні
    explanation: Коли є дія (дієслово в інфінітиві), використовується безособове слово
      «потрібно».
workbook:
- id: group-sort-pronouns
  type: group-sort
  instruction: Розподіліть займенники в давальному відмінку
  groups:
  - label: Однина (Singular)
    items:
    - мені
    - тобі
    - йому
    - їй
  - label: Множина (Plural)
    items:
    - нам
    - вам
    - їм
- id: true-false-rules
  type: true-false
  instruction: Правда чи ні? (Правила давального відмінка)
  items:
  - statement: Після дієслова «дякувати» ми використовуємо знахідний відмінок.
    correct: false
    explanation: Дієслово «дякувати» завжди вимагає давального відмінка (дякувати
      кому?).
  - statement: В українській мові іменники жіночого роду на -га/ка/ха мають чергування
      (г→з, к→ц, х→с).
    correct: true
    explanation: 'Це важливе правило фонетики: нога → нозі, рука → руці.'
  - statement: 'Правильне узгодження: «моєму мамі».'
    correct: false
    explanation: Мама — жіночого роду, тому потрібно казати «моїй мамі».
  - statement: Для людей (чоловічий рід) ми частіше використовуємо закінчення -ові
      / -еві.
    correct: true
    explanation: 'Це звучить більш природно та ввічливо: братові, панові.'
  - statement: Фізичні стани часто описуються безособовими реченнями (наприклад, «Мені
      холодно»).
    correct: true
    explanation: У таких реченнях людина є одержувачем стану і стоїть у давальному
      відмінку.
  - statement: Якщо поряд два іменники чоловічого роду в давальному відмінку, обидва
      мають закінчення -у / -ю.
    correct: false
    explanation: Щоб уникнути монотонності, перше слово має -ові/-еві, а друге -у/-ю
      (панові директору).
- id: unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - дуже
    - Мені
    - сьогодні
    - холодно.
    correct_order:
    - Мені
    - сьогодні
    - дуже
    - холодно.
  - words:
    - телефон.
    - братові
    - подаруємо
    - новий
    - Ми
    correct_order:
    - Ми
    - подаруємо
    - братові
    - новий
    - телефон.
  - words:
    - книга.
    - подобається
    - Моїй
    - подрузі
    - ця
    correct_order:
    - Моїй
    - подрузі
    - подобається
    - ця
    - книга.
  - words:
    - лист.
    - надіслати
    - Вам
    - потрібно
    - цей
    correct_order:
    - Вам
    - потрібно
    - надіслати
    - цей
    - лист.
  - words:
    - Він
    - своїй
    - завжди
    - допомагає
    - бабусі.
    correct_order:
    - Він
    - завжди
    - допомагає
    - своїй
    - бабусі.
  - words:
    - років
    - вашому
    - Скільки
    - синові?
    correct_order:
    - Скільки
    - років
    - вашому
    - синові?
