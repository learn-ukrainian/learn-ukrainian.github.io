- id: quiz-dative-recognition
  type: quiz
  instruction: Оберіть правильний варіант у давальному відмінку (кому? чому?).
  items:
  - question: Що подарувати ____?
    options:
    - Олексієві
    - Олексія
    - Олексієм
    - Олексій
    correct: 0
  - question: Ми дали горішки ____.
    options:
    - білочкою
    - білочку
    - білочці
    - білочка
    correct: 2
  - question: ____ потрібно працювати.
    options:
    - Мене
    - Мені
    - Мною
    - Я
    correct: 1
  - question: ____ холодно?
    options:
    - Тебе
    - Тобою
    - Ти
    - Тобі
    correct: 3
  - question: ____ подобається Київ.
    options:
    - Нам
    - Нас
    - Нами
    - Ми
    correct: 0
  - question: Я допомагаю ____.
    options:
    - сестру
    - сестрою
    - сестрі
    - сестра
    correct: 2
  - question: ____ не подобається ця кава.
    options:
    - Його
    - Йому
    - Ним
    - Він
    correct: 1
  - question: Вам потрібно зачекати, ____ директору.
    options:
    - пана
    - паном
    - пан
    - панові
    correct: 3
  - question: ____ здається, що це помилка.
    options:
    - Їй
    - Її
    - Нею
    - Вона
    correct: 0
  - question: Що подарувати новому ____?
    options:
    - колегу
    - колегою
    - колезі
    - колега
    correct: 2
  title: Оберіть правильний варіант у давальному відмінку (кому? чому?).
