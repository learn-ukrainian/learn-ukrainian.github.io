- type: error-correction
  title: 'Знайдіть помилку (Find the Error)'
  instruction: 'Find and correct the mistake in the Instrumental case usage.'
  items:
    - sentence: 'Я розмовляю мамою по телефону.'
      error: 'мамою'
      answer: 'з мамою'
      options: ['з мамою', 'у мамою', 'на мамою', 'маму']
      explanation: 'Never drop the preposition з when talking about accompaniment.'
    - sentence: 'Ми йдемо гуляти з брат.'
      error: 'брат'
      answer: 'братом'
      options: ['братом', 'брата', 'брату', 'браті']
      explanation: 'The noun must be in the Instrumental case (-ом for masculine hard).'
    - sentence: 'Він живе з сестра.'
      error: 'сестра'
      answer: 'сестрою'
      options: ['сестрою', 'сестри', 'сестрі', 'сестру']
      explanation: 'Feminine nouns ending in -a change to -ою.'
    - sentence: 'Я йду в кіно з Юлія.'
      error: 'Юлія'
      answer: 'Юлією'
      options: ['Юлією', 'Юлії', 'Юлію', 'Юлі']
      explanation: 'Feminine names ending in -ія change to -єю.'
    - sentence: 'Ти будеш каву з я?'
      error: 'я'
      answer: 'зі мною'
      options: ['зі мною', 'з мною', 'з я', 'мною']
      explanation: 'The pronoun я is irregular in Instrumental: зі мною.'
    - sentence: 'Вона танцює з Андрій.'
      error: 'Андрій'
      answer: 'Андрієм'
      options: ['Андрієм', 'Андрія', 'Андрію', 'Андрії']
      explanation: 'Masculine names ending in -ій change to -єм.'

