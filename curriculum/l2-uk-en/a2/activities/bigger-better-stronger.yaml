  instruction: Розподіліть елементи за групами.
- type: mark-the-words
  title: Знайдіть ступені порівняння
  instruction: Знайдіть усі прикметники у формі вищого ступеня порівняння (comparative
    degree).
  text: Сьогодні день набагато тепліший, ніж учора. Мій новий телефон кращий і швидший.
    Ця вулиця ширша за ту, а дерева тут вищі. Наш результат значно гірший, але ми
    працюємо.
  answers:
  - тепліший
  - кращий
  - швидший
  - ширша
  - вищі
  - гірший
- type: cloze
  title: Коментатор на стадіоні
  passage: Цей спортсмен {{1}} за інших. Його результат {{2}}, ніж учора. Наш стадіон
    {{3}} за старий. Ця бігова доріжка {{4}} і {{5}}. М'яч сьогодні {{6}}, а вітер
    {{7}}. Тренер каже, що перший тайм був {{8}}, але другий тайм {{9}}. Загалом ця
    гра {{10}} за попередню.
  blanks:
  - id: 1
    answer: швидший
    options:
    - швидший
    - швидкий
    - швидкіший
    - швидко
  - id: 2
    answer: кращий
    options:
    - кращий
    - гарніший
    - добріший
    - хороший
  - id: 3
    answer: більший
    options:
    - більший
    - великіший
    - великий
    - багато
  - id: 4
    answer: довша
    options:
    - довша
    - довгіша
    - довга
    - більш довга
  - id: 5
    answer: ширша
    options:
    - ширша
    - широкіша
    - широка
    - шириша
  - id: 6
    answer: легший
    options:
    - легший
    - легкіший
    - легкий
    - більш легкий
  - id: 7
    answer: сильніший
    options:
    - сильніший
    - сильний
    - більш сильний
    - сильно
  - id: 8
    answer: гірший
    options:
    - гірший
    - поганіший
    - поганий
    - більш поганий
  - id: 9
    answer: цікавіший
    options:
    - цікавіший
    - цікавий
    - більш цікавіший
    - цікаво
  - id: 10
    answer: важливіша
    options:
    - важливіша
    - важлива
    - більш важливіша
    - важливо
  instruction: Заповніть пропуски, обравши правильні слова.
- type: select
  title: Оберіть правильні варіанти
  instruction: Оберіть усі граматично правильні фрази порівняння.
  items:
  - question: Як правильно сказати "more expensive"?
    min_correct: 2
    options:
    - text: дорожчий
      correct: true
    - text: більш дорогий
      correct: true
    - text: більш дорожчий
      correct: false
    - text: дорогіший
      correct: false
  - question: Які форми є правильними для порівняння якості (better)?
    min_correct: 2
    options:
    - text: кращий
      correct: true
    - text: більш хороший
      correct: true
    - text: більш кращий
      correct: false
    - text: самий кращий
      correct: false
  - question: Як правильно порівняти вік (older/younger)?
    min_correct: 2
    options:
    - text: старший за мене
      correct: true
    - text: молодший, ніж я
      correct: true
    - text: старший за я
      correct: false
    - text: молодший за я
      correct: false
  - question: Які слова є правильними ступенями порівняння від "великий" і "малий"?
    min_correct: 2
    options:
    - text: більший
      correct: true
    - text: менший
      correct: true
    - text: великіший
      correct: false
    - text: маліший
      correct: false
  - question: Які слова можна використовувати для підсилення порівняння?
    min_correct: 3
    options:
    - text: набагато
      correct: true
    - text: значно
      correct: true
    - text: трохи
      correct: true
    - text: дуже
      correct: false
    - text: абсолютно
      correct: false
  - question: Які прикметники мають зміну приголосних (г→ж, к→ч, х→ш) у формі порівняння?
