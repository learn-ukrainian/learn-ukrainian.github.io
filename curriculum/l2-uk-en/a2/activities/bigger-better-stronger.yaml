- type: quiz
  title: 'Тест: Яка форма правильна?'
  items:
  - question: Як правильно сказати українською "better"?
    options:
    - text: кращий
      correct: true
    - text: більш кращий
      correct: false
    - text: добріший
      correct: false
    - text: хороший
      correct: false
    explanation: Слово "кращий" є правильною формою. Не можна казати "більш кращий".
  - question: Який прийменник вимагає після себе знахідного відмінка (Accusative)?
    options:
    - text: за
      correct: true
    - text: ніж
      correct: false
    - text: на
      correct: false
    - text: до
      correct: false
    explanation: Прийменник "за" вимагає знахідного відмінка (наприклад, за мене).
  - question: 'Як правильно порівняти свій вік: "My brother is older than me"?'
    options:
    - text: Мій брат старший за мене
      correct: true
    - text: Мій брат старший за я
      correct: false
    - text: Мій брат старший ніж мене
      correct: false
    - text: Мій брат старіший за мене
      correct: false
    explanation: 'Після "за" завжди йде знахідний відмінок: за мене.'
  - question: Як правильно перекласти англійське слово "faster" українською мовою?
    options:
    - text: швидший
      correct: true
    - text: швидкіший
      correct: false
    - text: більш швидший
      correct: false
    - text: швидче
      correct: false
    explanation: Коли ми додаємо суфікс до "швидкий", літера "к" випадає.
  - question: Що відбувається з літерою "г" у слові "дорогий" при порівнянні?
    options:
    - text: вона змінюється на "ж"
      correct: true
    - text: вона випадає
      correct: false
    - text: вона змінюється на "ш"
      correct: false
    - text: вона залишається
      correct: false
    explanation: Дорогий — дорожчий. Літера "г" змінюється на "ж".
  - question: Як правильно сказати "much more expensive"?
    options:
    - text: набагато дорожчий
      correct: true
    - text: дуже дорожчий
      correct: false
    - text: багато дорожчий
      correct: false
    - text: найбільш дорожчий
      correct: false
    explanation: Для підсилення порівняння використовується слово "набагато".
  - question: Яка форма порівняння від слова "великий"?
    options:
    - text: більший
      correct: true
    - text: великіший
      correct: false
    - text: здоровіший
      correct: false
    - text: малий
      correct: false
    explanation: Це слово-виняток. Великий — більший.
  - question: Як перекласти фразу "The older, the wiser"?
    options:
    - text: Чим старший, тим мудріший
      correct: true
    - text: Як старший, так мудріший
      correct: false
    - text: Більш старший, більш мудріший
      correct: false
    - text: Якщо старший, тоді мудріший
      correct: false
    explanation: Конструкція "The..., the..." перекладається як "Чим..., тим...".
  instruction: Оберіть правильну відповідь.
- type: fill-in
  title: 'Заповніть пропуски: форми прикметників'
  items:
  - sentence: Цей новий телефон _____ за мій старий.
    answer: кращий
    options:
    - кращий
    - гарніший
    - більш кращий
    - хороший
  - sentence: Київська телевежа _____ за Ейфелеву вежу.
    answer: вища
    options:
    - вища
    - високіша
    - більш вища
    - висока
  - sentence: Сьогодні день _____ ніж був учора.
    answer: тепліший
    options:
    - тепліший
    - теплий
    - більш тепліший
    - теплішим
  - sentence: Цей автомобіль _____ товар у нашому магазині.
    answer: дорожчий
    options:
    - дорожчий
    - дорогіший
    - більш дорогий
    - дорогий
  - sentence: Мій брат _____ за мене на два роки.
    answer: старший
    options:
    - старший
    - старіший
    - старий
    - більш старий
  - sentence: Цей квиток на поїзд _____ варіант для нас.
    answer: дешевший
    options:
    - дешевший
    - дешевий
    - дешевіший
    - більш дешевший
  - sentence: Дніпро — це річка, яка _____ за Десну.
    answer: довша
    options:
    - довша
    - довгіша
    - довга
    - більш довга
  - sentence: Нам потрібен _____ розмір куртки.
    answer: більший
    options:
    - більший
    - великіший
    - великий
    - найбільший
  instruction: Оберіть правильне слово для заповнення пропуску.
- type: unjumble
  title: Складіть речення
  items:
  - words:
    - Цей
    - комп'ютер
    - набагато
    - дорожчий
    answer: Цей комп'ютер набагато дорожчий
  - words:
    - Ти
    - біжиш
    - швидше
    - за
    - мене
    answer: Ти біжиш швидше за мене
  - words:
    - Вона
    - значно
    - краща
    - студентка
    answer: Вона значно краща студентка
  - words:
    - Головна
    - вулиця
    - міста
    - ширша
    answer: Головна вулиця міста ширша
  - words:
    - Сьогодні
    - результат
    - трохи
    - гірший
    answer: Сьогодні результат трохи гірший
  - words:
    - Мій
    - новий
    - телефон
    - новіший
    answer: Мій новий телефон новіший
  instruction: Розташуйте слова у правильному порядку.
- type: true-false
  title: Правда чи брехня?
  items:
  - statement: Можна казати "більш кращий" українською мовою.
    correct: false
    explanation: Це помилка. Правильно казати просто "кращий".
  - statement: Після прийменника "за" ми завжди використовуємо знахідний відмінок.
    correct: true
    explanation: 'Наприклад: вищий за мене, старший за нього.'
  - statement: Слово "гірший" означає "worse".
    correct: true
    explanation: Це форма порівняння від прикметника "поганий".
  - statement: Слово "довгий" у формі порівняння звучить як "довгіший".
    correct: false
    explanation: Правильна форма — "довший".
  - statement: Перед словом "ніж" у порівнянні завжди ставиться кома.
    correct: true
    explanation: 'Це суворе правило пунктуації: кращий, ніж учора.'
  - statement: '"Молодший" — це антонім до слова "старший".'
    correct: true
    explanation: Молодший означає younger, а старший — older.
  - statement: Для підсилення порівняння ми використовуємо слово "набагато".
    correct: true
    explanation: Набагато кращий — much better.
  - statement: Слово "швидший" пишеться без літери "к".
    correct: true
    explanation: Швидкий — швидший. Літера "к" випадає.
  instruction: Визначте, чи твердження правильне.
- type: error-correction
  title: Виправте помилки
  instruction: Знайдіть граматичну помилку в реченні та виберіть правильний варіант.
  items:
  - sentence: Цей торт більш смачніший за той.
    error: більш смачніший
    answer: смачніший
    error_type: phrase
    options:
    - смачніший
    - самий смачніший
    - більш смачний
    - смачний
    explanation: Не можна використовувати "більш" разом із суфіксом порівняння.
  - sentence: Вона вища за я на десять сантиметрів.
    error: за я
    answer: за мене
    error_type: phrase
    options:
    - за мене
    - ніж я
    - за мною
    - за мені
    explanation: Після "за" використовується знахідний відмінок.
  - sentence: Ця куртка дорога, але та ще дорогіша.
    error: дорогіша
    answer: дорожча
    options:
    - дорожча
    - більш дорога
    - дорогша
    - дорогова
    explanation: 'Літера "г" змінюється на "ж": дорогий — дорожчий.'
  - sentence: Мій брат старіший за мене.
    error: старіший
    answer: старший
    options:
    - старший
    - більш старий
    - самий старий
    - старий
    explanation: Для віку використовується слово "старший".
  - sentence: Ця проблема великіша, ніж ми думали.
    error: великіша
    answer: більша
    options:
    - більша
    - більш велика
    - велика
    - гірша
    explanation: '"Великий" — це виняток, його форма порівняння — "більший".'
  - sentence: Він біжить швидкіше за всіх.
    error: швидкіше
    answer: швидше
    options:
    - швидше
    - більш швидко
    - найшвидше
    - швидче
    explanation: Правильна форма — швидше.
- type: group-sort
  title: Розподіліть слова за типом творення порівняння
  groups:
  - name: Регулярні (суфікс -іш-)
