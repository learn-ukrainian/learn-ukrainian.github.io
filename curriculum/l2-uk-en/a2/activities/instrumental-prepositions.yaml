version: '1.0'
module: instrumental-prepositions
level: a2
inline: []
workbook:
- id: wb-quiz-temporal
  type: quiz
  instruction: 'Оберіть правильний варіант: простір чи час?'
  items:
  - question: Я завжди читаю цікаву книгу _____ сном.
    options:
    - перед
    - за
    - під
    - над
    correct: 0
  - question: Швидкий поїзд завжди прибуває _____ розкладом.
    options:
    - за
    - перед
    - між
    - під
    correct: 0
  - question: Нова машина спокійно стоїть _____ будинком.
    options:
    - перед
    - за
    - над
    - між
    correct: 0
  - question: Гарний зелений сад знаходиться відразу _____ будинком.
    options:
    - за
    - під
    - над
    - перед
    correct: 0
  - question: Студенти весело розмовляють _____ уроком.
    options:
    - перед
    - за
    - між
    - над
    correct: 0
  - question: Усе йде _____ планом, ми зовсім не маємо ніяких проблем.
    options:
    - за
    - перед
    - під
    - над
    correct: 0
  - question: Моя молодша сестра дуже любить гуляти _____ сном.
    options:
    - перед
    - за
    - під
    - між
    correct: 0
  - question: Університет працює _____ розкладом, а наш старий автобус завжди запізнюється.
    options:
    - за
    - перед
    - під
    - над
    correct: 0
- id: wb-fill-in-location
  type: fill-in
  instruction: Вставте правильний прийменник (над, під, перед, за, між) та іменник
    в орудному відмінку
  items:
  - sentence: Лампа яскраво світить _____ (стіл).
    answer: над столом
  - sentence: Мій кіт солодко спить _____ (ліжко).
    answer: під ліжком
  - sentence: Велике зелене дерево росте прямо _____ (вікно).
    answer: перед вікном
  - sentence: Темний ліс починається далеко _____ (річка).
    answer: за річкою
  - sentence: Новий міський парк знаходиться _____ (школа і бібліотека).
    answer: між школою і бібліотекою
  - sentence: Я завжди тримаю свої теплі капці _____ (ліжко).
    answer: під ліжком
  - sentence: Полиця стоїть у кутку _____ (вікно і двері).
    answer: між вікном і дверима
  - sentence: Гарна картина висить _____ (камін).
    answer: над каміном
- id: wb-match-up-spatial
  type: match-up
  instruction: З'єднайте початок речення з правильним місцем
  pairs:
  - left: Картина висить високо на стіні...
    right: над столом
  - left: Кіт сховався на підлозі...
    right: під ліжком
  - left: Машина стоїть спереду...
    right: перед будинком
  - left: Сад знаходиться позаду...
    right: за школою
  - left: Тумбочка стоїть посередині...
    right: між ліжком і шафою
  - left: Птахи високо летять...
    right: над морем
  - left: Діти граються в хованки...
    right: під деревом
  - left: Хтось довго стоїть...
    right: за дверима
- id: wb-true-false-diagram
  type: true-false
  instruction: Правда чи ні? Прочитайте опис ідеальної кімнати в тексті і дайте відповідь
  items:
  - statement: Стіл стоїть перед вікном.
    correct: true
    explanation: 'У тексті: «великий дубовий стіл стоїть прямо перед яскравим вікном».'
  - statement: Картина висить під столом.
    correct: false
    explanation: Картина висить над столом, а під столом спить собака.
  - statement: Дзеркало стоїть між шафою і дверима.
    correct: true
    explanation: 'У тексті: «Між високою шафою і широкими дверима стоїть велике дзеркало».'
  - statement: Камін знаходиться перед ліжком.
    correct: false
    explanation: Камін знаходиться за ліжком у кутку.
  - statement: Килим лежить перед каміном.
    correct: true
    explanation: 'У тексті: «Перед цим каміном завжди лежить м''який червоний килим».'
  - statement: Полиця з книгами висить над вікном.
    correct: false
    explanation: Полиця висить над каміном.
  - statement: Тумбочка стоїть між полицею і ліжком.
    correct: true
    explanation: 'У тексті: «Між цією полицею і моїм ліжком стоїть маленька дерев''яна
      тумбочка».'
  - statement: Собака спить над ліжком.
    correct: false
    explanation: Собака спить під столом.
- id: wb-unjumble-sentences
  type: unjumble
  instruction: Складіть правильне речення зі слів (зверніть увагу на прийменники)
  items:
  - words:
    - столом.
    - Лампа
    - над
    - світить
    correct_order:
    - Лампа
    - світить
    - над
    - столом.
  - words:
    - під
    - ліжком.
    - солодко
    - спить
    - Кіт
    correct_order:
    - Кіт
    - солодко
    - спить
    - під
    - ліжком.
  - words:
    - перед
    - будинком.
    - машина
    - Нова
    - стоїть
    correct_order:
    - Нова
    - машина
    - стоїть
    - перед
    - будинком.
  - words:
    - за
    - розкладом.
    - прибуває
    - Поїзд
    - завжди
    correct_order:
    - Поїзд
    - завжди
    - прибуває
    - за
    - розкладом.
  - words:
    - перед
    - книгу
    - Я
    - сном.
    - читаю
    correct_order:
    - Я
    - читаю
    - книгу
    - перед
    - сном.
  - words:
    - стоїть
    - стіною.
    - між
    - ліжком
    - Тумбочка
    - і
    correct_order:
    - Тумбочка
    - стоїть
    - між
    - ліжком
    - і
    - стіною.
- id: wb-error-correction-endings
  type: error-correction
  instruction: Знайдіть і виправте помилку в закінченнях орудного відмінка
  items:
  - sentence: Картина висить над столі.
    error: столі
    correction: столом
    error_type: word
    options:
    - столом
    - стіл
    - столу
    - стола
    explanation: Прийменник «над» вимагає орудного відмінка (столом).
  - sentence: Кіт спить під ліжко.
    error: ліжко
    correction: ліжком
    error_type: word
    options:
    - ліжком
    - ліжку
    - ліжка
    - ліжках
    explanation: Прийменник «під» на питання «Де?» вимагає орудного відмінка (ліжком).
  - sentence: Я читаю перед сон.
    error: сон
    correction: сном
    error_type: word
    options:
    - сном
    - сні
    - сна
    - сну
    explanation: Орудний відмінок від слова «сон» — «сном».
  - sentence: Дерево росте між школою і бібліотека.
    error: бібліотека
    correction: бібліотекою
    error_type: word
    options:
    - бібліотекою
    - бібліотеки
    - бібліотеці
    - бібліотеку
    explanation: Обидва слова після «між» мають бути в орудному відмінку.
  - sentence: Сад знаходиться за будинок.
    error: будинок
    correction: будинком
    error_type: word
    options:
    - будинком
    - будинку
    - будинки
    - будинках
    explanation: Прийменник «за» на питання «Де?» вимагає орудного відмінка.
  - sentence: Дякую за допомогою.
    error: допомогою
    correction: допомогу
    error_type: word
    options:
    - допомогу
    - допомоги
    - допомога
    - допомогах
    explanation: У значенні причини чи подяки прийменник «за» вимагає знахідного відмінка.
