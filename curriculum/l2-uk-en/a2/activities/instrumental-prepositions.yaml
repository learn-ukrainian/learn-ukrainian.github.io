version: '1.0'
module: instrumental-prepositions
level: a2
inline:
- id: match-up
  type: match-up
  instruction: З'єднайте частини речення
  pairs:
  - left: Кіт сидить...
    right: '...під столом.'
  - left: Лампа висить...
    right: '...над столом.'
  - left: Машина стоїть...
    right: '...перед гаражем.'
  - left: Ліс знаходиться...
    right: '...за річкою.'
  - left: Стілець стоїть...
    right: '...між ліжком і вікном.'
  - left: Картина висить...
    right: '...над ліжком.'
  - left: Собака спить...
    right: '...під ліжком.'
  - left: Парк лежить...
    right: '...між школою і театром.'
- id: true-false
  type: true-false
  instruction: 'Прочитайте текст «Описуємо кімнату» та оберіть: це правда чи ні?'
  items:
  - statement: Робочий стіл стоїть перед вікном.
    correct: true
    explanation: Так, у тексті стіл стоїть перед вікном.
  - statement: Шафа стоїть перед вікном.
    correct: false
    explanation: Ні, шафа стоїть між вікном і дверима.
  - statement: Картина висить над ліжком.
    correct: true
    explanation: Так, над ліжком висить картина з морем.
  - statement: Кіт сидить під ліжком.
    correct: false
    explanation: Ні, кіт сидить під столом, а собака спить під ліжком.
  - statement: Книжкова полиця висить над столом.
    correct: true
    explanation: Так, довга книжкова полиця висить над столом.
  - statement: Килим лежить під столом.
    correct: true
    explanation: Так, килим лежить під столом.
  - statement: Яскрава лампа висить над ліжком.
    correct: false
    explanation: Ні, яскрава лампа висить під стелею.
  - statement: Собака спить під столом.
    correct: false
    explanation: Ні, собака любить спати під ліжком.
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант, щоб доповнити речення (Простір чи Час?)
  items:
  - question: Наш поїзд прибуває...
    options:
    - за розкладом (час)
    - перед розкладом (час)
    - за будинком (простір)
    - перед будинком (простір)
    correct: 0
  - question: Я мию руки...
    options:
    - перед обідом (час)
    - за обідом (час)
    - перед школою (простір)
    - за школою (простір)
    correct: 0
  - question: Сад знаходиться...
    options:
    - за будинком (простір)
    - перед будинком (простір)
    - за обідом (час)
    - перед сном (час)
    correct: 0
  - question: Ми завжди читаємо книгу...
    options:
    - перед сном (час)
    - за сном (час)
    - перед ліжком (простір)
    - за ліжком (простір)
    correct: 0
  - question: Студенти читають текст...
    options:
    - перед уроком (час)
    - за уроком (час)
    - перед столом (простір)
    - за столом (простір)
    correct: 0
  - question: Магазин стоїть...
    options:
    - за школою (простір)
    - перед обідом (час)
    - за розкладом (час)
    - перед сном (час)
    correct: 0
  - question: Усе в проекті йде...
    options:
    - за планом (час)
    - перед планом (час)
    - за дверима (простір)
    - перед дверима (простір)
    correct: 0
  - question: Хтось стоїть...
    options:
    - за дверима (простір)
    - перед дверима (простір)
    - за розкладом (час)
    - перед обідом (час)
    correct: 0
- id: fill-in
  type: fill-in
  instruction: 'Оберіть правильну форму: простір (Де?) чи напрямок (Куди?)'
  items:
  - sentence: Де? Кіт сидить _____
    answer: під столом
    options:
    - під столом
    - під стіл
    - під столу
    - під столі
  - sentence: Куди? Кіт заліз _____
    answer: під стіл
    options:
    - під столом
    - під стіл
    - під столу
    - під столі
  - sentence: Де? Лампа висить _____
    answer: над столом
    options:
    - над столом
    - над стіл
    - над столу
    - над столі
  - sentence: Куди? Повісь лампу _____
    answer: над стіл
    options:
    - над столом
    - над стіл
    - над столу
    - над столі
  - sentence: Де? Стілець стоїть _____
    answer: між столом і ліжком
    options:
    - між столом і ліжком
    - між стіл і ліжко
    - між столу і ліжка
  - sentence: Куди? Постав стілець _____
    answer: між стіл і ліжко
    options:
    - між столом і ліжком
    - між стіл і ліжко
    - між столу і ліжка
  - sentence: Де? Картина висить _____
    answer: над ліжком
    options:
    - над ліжком
    - над ліжко
    - над ліжка
    - над ліжку
  - sentence: Куди? Повісь картину _____
    answer: над ліжко
    options:
    - над ліжком
    - над ліжко
    - над ліжка
    - над ліжку
workbook:
- type: group-sort
  instruction: Простір (Де?) чи час (Коли?) Розподіліть фрази
  groups:
  - label: Простір (Location)
    items:
    - перед будинком
    - за дверима
    - перед школою
    - за річкою
    - перед вікном
    - за музеєм
  - label: Час (Time)
    items:
    - перед обідом
    - за розкладом
    - перед сном
    - за планом
    - перед уроком
    - перед заняттям
- type: error-correction
  instruction: Знайдіть і виправте помилку в закінченні
  items:
  - sentence: Дерево росте перед будинок.
    error: будинок
    correction: будинком
    error_type: word
    options:
    - будинком
    - будинка
    - будинку
    explanation: 'Локація (Де?) вимагає орудного відмінка: перед будинком.'
  - sentence: Ми працюємо по розкладу.
    error: по розкладу
    correction: за розкладом
    error_type: phrase
    options:
    - за розкладом
    - на розклад
    - під розкладом
    explanation: Українською правильно говорити «за розкладом» (according to schedule).
  - sentence: Книга лежить під ліжко.
    error: ліжко
    correction: ліжком
    error_type: word
    options:
    - ліжком
    - ліжка
    - ліжку
    explanation: 'Локація (Де?) вимагає орудного відмінка: під ліжком.'
  - sentence: Дякую за допомогую!
    error: допомогую
    correction: допомогу
    error_type: word
    options:
    - допомогу
    - допомоги
    - допомога
    explanation: 'Мета або подяка (Purpose) вимагає «за» + знахідний відмінок: за
      допомогу.'
  - sentence: Я завжди п'ю воду перед сніданок.
    error: сніданок
    correction: сніданком
    error_type: word
    options:
    - сніданком
    - сніданка
    - сніданку
    explanation: 'Час (Коли?) вимагає орудного відмінка: перед сніданком.'
  - sentence: Сад знаходиться за будинок.
    error: будинок
    correction: будинком
    error_type: word
    options:
    - будинком
    - будинка
    - будинку
    explanation: 'Локація (Де?) вимагає орудного відмінка: за будинком.'
- type: unjumble
  instruction: Складіть правильне речення зі слів
  items:
  - words:
    - висить
    - Лампа
    - столом.
    - над
    correct_order:
    - Лампа
    - висить
    - над
    - столом.
  - words:
    - лежить
    - Килим
    - ліжком.
    - під
    correct_order:
    - Килим
    - лежить
    - під
    - ліжком.
  - words:
    - йде
    - Усе
    - планом.
    - за
    correct_order:
    - Усе
    - йде
    - за
    - планом.
  - words:
    - знаходиться
    - Сад
    - будинком.
    - за
    correct_order:
    - Сад
    - знаходиться
    - за
    - будинком.
  - words:
    - руки
    - мию
    - Я
    - обідом.
    - перед
    correct_order:
    - Я
    - мию
    - руки
    - перед
    - обідом.
  - words:
    - між
    - Парк
    - школою
    - бібліотекою.
    - і
    correct_order:
    - Парк
    - між
    - школою
    - і
    - бібліотекою.
- type: order
  instruction: Розставте репліки діалогу в правильному порядку
  items:
  - — Привіт! Куди ми поставимо шафу?
  - — Шафа буде стояти між вікном і дверима.
  - — Добре. А куди поставити стіл?
  - — Стіл буде стояти перед вікном.
  - — Чудово! А картина?
  - — Картина буде висіти над ліжком.
  correct_order:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
