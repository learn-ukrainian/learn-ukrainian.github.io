    options:
    - text: Завтра я буду працювати вдома весь день.
      correct: true
    - text: Завтра я попрацюю вдома весь день.
      correct: false
    - text: Завтра я працюю вдома весь день.
      correct: false
  - source: Don't worry, I will find a solution. (Result)
    explanation: 'Гарантований результат: "я знайду".'
    options:
    - text: Не хвилюйся, я знайду рішення.
      correct: true
