- type: quiz
  title: 'Перевірте знання: Процес чи Результат'
  instruction: Оберіть правильну відповідь на запитання про майбутній час.
  items:
  - question: Яка форма дієслова вказує на гарантований результат у майбутньому?
    explanation: Доконаний вид (Simple Future) гарантує результат, наприклад, "я зроблю".
    options:
    - text: Проста форма (доконаний вид)
      correct: true
    - text: Складена форма (недоконаний вид)
      correct: false
    - text: Теперішній час
      correct: false
    - text: Минулий час
      correct: false
  - question: Яке дієслово використовується як допоміжне для утворення процесу в майбутньому?
    explanation: Складений час утворюється за допомогою допоміжного дієслова "бути"
      (буду, будеш...).
    options:
    - text: бути
      correct: true
    - text: мати
      correct: false
    - text: хотіти
      correct: false
    - text: робити
      correct: false
  - question: Чому речення "Я буду зробити" є граматично неправильним в українській
      мові?
    explanation: Слово "буду" вказує на тривалий процес, а "зробити" — на миттєвий
      результат. Їх не можна поєднувати.
    options:
    - text: Бо "буду" не можна поєднувати з доконаним інфінітивом
      correct: true
    - text: Бо дієслово "зробити" не має форми майбутнього часу
      correct: false
    - text: Бо слово "буду" використовується тільки в минулому часі
      correct: false
    - text: Бо це речення правильне, помилки немає
      correct: false
  - question: Яке речення найкраще підходить для твердої обіцянки виконати завдання?
    explanation: Для обіцянок завжди використовується доконаний вид (результат), тобто
      "Я закінчу".
    options:
    - text: Я закінчу це завдання завтра.
      correct: true
    - text: Я буду закінчувати це завдання.
      correct: false
    - text: Я буду робити це завдання.
      correct: false
    - text: Я роблю це завдання зараз.
      correct: false
  - question: Що означає українське прислів'я "Обіцянка — цяцянка, а дурневі — радість"?
    explanation: Це прислів'я означає, що пусті слова без дій не мають цінності.
    options:
    - text: Слова без реальних дій нічого не варті
      correct: true
    - text: Обіцяти завжди дуже легко і приємно
      correct: false
    - text: Діти дуже люблять отримувати нові іграшки
      correct: false
    - text: Радість приходить тільки тоді, коли ми щось купуємо
      correct: false
  - question: Який варіант є правильною простою формою майбутнього часу від дієслова
      "написати" (я)?
    explanation: Доконаний вид "написати" у майбутньому часі для "я" — "напишу".
    options:
    - text: напишу
      correct: true
    - text: буду писати
      correct: false
    - text: буду написати
      correct: false
    - text: пишу
      correct: false
  - question: Яка з цих фраз означає тривалий процес у майбутньому часі?
    explanation: Складена форма "ми будемо гуляти" вказує на тривалий процес.
    options:
    - text: Ми будемо гуляти
      correct: true
    - text: Ми погуляємо
      correct: false
    - text: Ми гуляли
      correct: false
    - text: Ми прийдемо
      correct: false
  - question: Що виражає речення "Завтра я буду читати книгу"?
    explanation: Це речення виражає план витратити час на процес читання.
    options:
    - text: Намір витратити час на процес читання
      correct: true
    - text: Обіцянку прочитати книгу до самого кінця
      correct: false
    - text: Миттєву зміну стану або емоції
      correct: false
    - text: Гарантований результат у майбутньому
      correct: false
- type: match-up
