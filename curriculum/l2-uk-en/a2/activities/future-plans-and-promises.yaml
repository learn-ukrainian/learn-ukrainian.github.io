- type: true-false
  title: Правда чи брехня?
  instruction: Визначте, чи є твердження про український майбутній час правильним.
  items:
  - statement: Дієслово "бути" можна використовувати з доконаним видом.
    correct: false
    explanation: Дієслово "бути" (буду) використовується тільки з недоконаним видом
      для процесу.
  - statement: Форма "я зроблю" виражає гарантований результат у майбутньому.
    correct: true
    explanation: Доконаний вид гарантує завершення дії та результат.
  - statement: Англійське слово "will" має лише один еквівалент в українській мові.
    correct: false
    explanation: В українській є дві різні форми майбутнього часу залежно від процесу
      чи результату.
  - statement: Речення "Я буду прочитати" є граматично неправильним.
    correct: true
    explanation: Неможливо поєднати "буду" (процес) та "прочитати" (результат).
  - statement: Для вираження тривалих планів на вихідні краще використовувати недоконаний
      вид.
    correct: true
    explanation: Недоконаний вид (буду відпочивати, буду спати) ідеально підходить
      для тривалих процесів.
  - statement: Слово "закінчу" означає тривалий процес, який не має кінця.
    correct: false
    explanation: '"Закінчу" — це доконаний вид, який позначає саме кінець дії (результат).'
  - statement: В українській культурі дуже важливо тримати своє слово і виконувати
      обіцянки.
    correct: true
    explanation: Тримати слово — це важлива культурна цінність, яка відображається
      у виборі дієслів.
  - statement: Фраза "я напишу тобі повідомлення" звучить як невпевнений план.
    correct: false
    explanation: Це тверда обіцянка. "Напишу" — доконаний вид, який гарантує результат.
- type: mark-the-words
  title: Знайдіть результати
  instruction: Знайдіть і позначте всі дієслова у простій формі майбутнього часу (доконаний
    вид, результат).
  text: Завтра я буду відпочивати вдома. Я обов'язково зроблю всі домашні завдання.
    Потім ми будемо дивитися новий фільм. Увечері я піду в магазин за продуктами.
    Я сподіваюся, що я знайду свіже молоко. Після цього я напишу листа своєму другу.
    Я обов'язково побачу результати. Вона скаже мені правду.
  answers:
  - зроблю
  - піду
  - знайду
  - напишу
  - побачу
  - скаже
- type: select
  title: Оберіть правильні обіцянки
  instruction: Які з цих речень є граматично правильними обіцянками (доконаний вид)?
    Оберіть усі правильні варіанти.
  items:
  - question: Які дієслова виражають миттєвий результат або успішне закінчення у майбутньому?
    min_correct: 3
    explanation: Доконаний вид позначає результат і утворюється без слова "буду".
    options:
    - text: я зрозумію
      correct: true
    - text: я буду розуміти
      correct: false
    - text: я побачу
      correct: true
    - text: я скажу
      correct: true
    - text: я буду казати
      correct: false
  - question: Які з цих речень є граматично правильними?
    min_correct: 2
    explanation: Правильні речення не змішують "буду" з доконаним видом.
    options:
    - text: Я закінчу роботу сьогодні.
      correct: true
    - text: Я буду закінчити роботу сьогодні.
      correct: false
    - text: Я прочитаю цю статтю.
      correct: true
    - text: Я буду прочитати цю статтю.
      correct: false
  - question: Які слова позначають початок або кінець дії (зміна стану)?
    min_correct: 2
    explanation: Дієслова "почну" та "закінчу" позначають миттєву зміну стану.
    options:
    - text: почну
      correct: true
    - text: закінчу
      correct: true
    - text: буду
      correct: false
    - text: робити
      correct: false
  - question: Які форми правильно передають зміст "I will give" та "I will take"?
    min_correct: 2
    explanation: Це слова "дам" і "візьму".
    options:
    - text: дам
      correct: true
    - text: буду дати
      correct: false
    - text: візьму
      correct: true
    - text: буду взяти
      correct: false
  - question: Які дієслова належать до недоконаного виду (процес)?
    min_correct: 3
    explanation: Недоконаний вид використовується для тривалих дій.
    options:
    - text: чекати
      correct: true
    - text: прийти
      correct: false
    - text: читати
      correct: true
    - text: писати
      correct: true
    - text: написати
      correct: false
  - question: Які з цих фраз є правильними для створення тривалого плану?
    min_correct: 2
    explanation: Плани утворюються за допомогою "буду + інфінітив".
    options:
    - text: ми будемо гуляти
      correct: true
    - text: ми погуляємо
      correct: false
    - text: вони будуть працювати
      correct: true
    - text: вони будуть зробити
      correct: false
