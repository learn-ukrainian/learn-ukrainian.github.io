- type: group-sort
  title: Процес чи результат?
  instruction: 'Розподіліть дієслова на дві групи: ті, що означають процес (недоконаний
    вид), і ті, що означають результат (доконаний вид).'
  groups:
  - name: Процес (буду + інфінітив)
    items:
    - буду робити
    - буду читати
    - буду чекати
    - буду писати
    - буду гуляти
    - буду відпочивати
  - name: Результат (доконаний вид)
    items:
    - зроблю
    - прочитаю
    - прийду
    - напишу
    - знайду
    - закінчу
- type: fill-in
  title: Плани чи обіцянки?
  instruction: 'Оберіть правильне дієслово: процес (буду + інфінітив) або результат
    (доконаний вид).'
  items:
  - sentence: Завтра ввечері я ___ телевізор.
    answer: буду дивитися
    options:
    - буду дивитися
    - подивлюся
    - буду подивитися
    - дивлюся
  - sentence: Я обіцяю, що ___ тобі всю правду.
    answer: скажу
    options:
    - скажу
    - буду казати
    - буду сказати
    - кажу
  - sentence: Ми ___ на вас біля входу в театр.
    answer: будемо чекати
    options:
    - будемо чекати
    - почекаємо
    - будемо почекати
    - чекаємо
  - sentence: Не хвилюйся, я ___ роботу до п'ятниці.
    answer: закінчу
    options:
    - закінчу
    - буду закінчувати
    - буду закінчити
    - закінчую
  - sentence: Що ти ___ на вихідних?
    answer: будеш робити
    options:
    - будеш робити
    - зробиш
    - будеш зробити
    - робиш
  - sentence: Я обов'язково ___ тобі повідомлення ввечері.
    answer: напишу
    options:
    - напишу
    - буду писати
    - буду написати
    - пишу
  - sentence: Сьогодні я ___ книгу весь день.
    answer: буду читати
    options:
    - буду читати
    - прочитаю
    - буду прочитати
    - читаю
  - sentence: Я ___ цю книгу до кінця завтра.
    answer: прочитаю
    options:
    - прочитаю
    - буду читати
    - буду прочитати
    - читаю
  - sentence: Коли я ___ нове життя?
    answer: почну
    options:
    - почну
    - буду починати
    - буду почати
    - починаю
  - sentence: Завтра ми ___ по місту дві години.
    answer: будемо гуляти
    options:
    - будемо гуляти
    - погуляємо
    - будемо погуляти
    - гуляємо
  - sentence: Я ___ тобі слово, що все буде добре.
    answer: дам
    options:
    - дам
    - буду давати
    - буду дати
    - даю
  - sentence: Ми обов'язково ___ рішення цієї проблеми.
    answer: знайдемо
    options:
    - знайдемо
    - будемо шукати
    - будемо знайти
    - шукаємо
- type: error-correction
  title: Виправте граматичні помилки
  instruction: Знайдіть помилку у використанні майбутнього часу та оберіть правильний
    варіант.
  items:
  - sentence: Я буду зробити цю роботу завтра.
    error: буду зробити
    answer: зроблю
    options:
    - зроблю
    - робив
    - зробив
    - буду робив
    explanation: 'Дієслово "бути" ніколи не використовується з доконаним видом. Правильно:
      "я зроблю".'
  - sentence: Він буде написати листа ввечері.
    error: буде написати
    answer: напише
    options:
    - напише
    - писав
    - написав
    - буде писав
    explanation: '"Написати" — це доконаний вид. Використовуйте просту форму: "він
      напише".'
  - sentence: Ми будемо прочитати новини в інтернеті.
    error: будемо прочитати
    answer: прочитаємо
    options:
    - прочитаємо
    - читали
    - прочитали
    - будемо читали
    explanation: 'Не можна поєднувати "будемо" з доконаним інфінітивом. Правильно:
      "ми прочитаємо".'
  - sentence: Ти будеш сказати мені правду?
    error: будеш сказати
    answer: скажеш
    options:
    - скажеш
    - казав
    - сказав
    - будеш казав
    explanation: '"Сказати" означає результат. Майбутній час: "ти скажеш".'
  - sentence: Вона буде прийти на зустріч вчасно.
    error: буде прийти
    answer: прийде
    options:
    - прийде
    - приходила
    - прийшла
    - буде приходила
    explanation: 'Дієслово "прийти" має доконаний вид. Правильно: "вона прийде".'
  - sentence: Я обов'язково буду допомогти тобі з цим завданням.
    error: буду допомогти
    answer: допоможу
    options:
    - допоможу
    - допомагав
    - допоміг
    - буду допомагав
    explanation: '"Допомогти" — доконаний вид. Проста форма майбутнього часу: "я допоможу".'
  - sentence: Вони будуть закінчити проєкт у п'ятницю.
    error: будуть закінчити
    answer: закінчать
    options:
    - закінчать
    - закінчували
    - закінчили
    - будуть закінчували
    explanation: '"Закінчити" — доконаний вид. Форма майбутнього часу: "вони закінчать".'
  - sentence: Я буду піти в кіно на вихідних.
    error: буду піти
    answer: піду
    options:
    - піду
    - ходив
    - пішов
    - буду ходив
    explanation: 'Не використовуйте "буду" з дієсловом "піти". Правильно: "я піду".'
