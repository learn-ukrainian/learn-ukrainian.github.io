- id: translate-home-phrases
  type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: I live in a large apartment.
    options:
    - text: Я живу у великій квартирі.
      correct: true
    - text: Я живу у велика квартира.
      correct: false
    - text: Я живу на велику квартиру.
      correct: false
  - source: My commute takes thirty minutes.
    options:
    - text: Моя дорога займає тридцять хвилин.
      correct: true
    - text: Моя дорога працює тридцять хвилин.
      correct: false
    - text: Моя дорога робить тридцять хвилин.
      correct: false
  - source: We have three rooms.
    options:
    - text: У нас три кімнати.
      correct: true
    - text: Ми маємо три кімнат.
      correct: false
    - text: У нас є три кімнат.
      correct: false
  - source: I get up at seven o'clock.
    options:
    - text: Я встаю о сьомій годині.
      correct: true
    - text: Я встаю в сьома година.
      correct: false
    - text: Я встаю на сьомій годині.
      correct: false
  - source: In the kitchen there is a new table.
    options:
    - text: На кухні є новий стіл.
      correct: true
    - text: В кухня є новий стіл.
      correct: false
    - text: На кухню є новий стіл.
      correct: false
  - source: The balcony is in the bedroom.
    options:
    - text: Балкон у спальні.
      correct: true
    - text: Балкон на спальні.
      correct: false
    - text: Балкон у спальня.
      correct: false
  - source: I go to work by bus.
    options:
    - text: Я їду на роботу автобусом.
      correct: true
    - text: Я йду в роботу автобусом.
      correct: false
    - text: Я їду на роботу на автобус.
      correct: false
  - source: Help yourself, please!
    options:
    - text: Пригощайтеся, будь ласка!
      correct: true
    - text: Допоможіть собі, будь ласка!
      correct: false
    - text: Беріть, будь ласка!
      correct: false
- id: cloze-prepositions-routine
  type: fill-in
  instruction: Вставте правильний прийменник (у/в, на, о/об, з, за)
  items:
  - sentence: Я живу ____ квартирі.
    answer: у
    options:
    - у
    - на
    - о
    - за
  - sentence: Квіти стоять ____ балконі.
    answer: на
    options:
    - у
    - на
    - о
    - за
  - sentence: Я встаю ____ сьомій годині.
    answer: о
    options:
    - у
    - на
    - о
    - об
  - sentence: Ми снідаємо ____ великим столом.
    answer: за
    options:
    - у
    - на
    - з
    - за
  - sentence: Я лягаю спати ____ одинадцятій годині.
    answer: об
    options:
    - о
    - об
    - у
    - на
  - sentence: Я їду ____ роботу автобусом.
    answer: на
    options:
    - у
    - на
    - з
    - за
  - sentence: Він п'є каву ____ молоком.
    answer: з
    options:
    - у
    - на
    - з
    - за
  - sentence: Ми гуляємо ____ парку.
    answer: у
    options:
    - у
    - на
    - о
    - за
- id: true-false-grammar-rules
  type: true-false
  instruction: Правда чи ні?
  items:
  - statement: Слово «меблі» в українській мові завжди має форму множини.
    correct: true
    explanation: Слово «меблі» вживається тільки у множині.
  - statement: Після прийменника «після» ми використовуємо Родовий відмінок.
    correct: true
    explanation: Прийменник «після» завжди вимагає Родового відмінка (чого?).
  - statement: «Одинадцятій годині» потребує прийменника «о», а не «об».
    correct: false
    explanation: Ми використовуємо «об» перед голосними (об одинадцятій).
  - statement: «У вітальні» — це правильна форма Місцевого відмінка.
    correct: true
    explanation: Жіночий рід на -я у Місцевому відмінку часто має закінчення -і.
  - statement: Ми використовуємо Знахідний відмінок для опису місця (де?).
    correct: false
    explanation: Для місця ми використовуємо Місцевий відмінок.
  - statement: Коли ми ставимо нові меблі в кімнату (напрямок), ми використовуємо
      Місцевий відмінок.
    correct: false
    explanation: Для напрямку (куди?) ми використовуємо Знахідний відмінок.
  - statement: «По суботах» означає кожну суботу і потребує Місцевого відмінка множини.
    correct: true
    explanation: Це конструкція для регулярних дій (по + Місцевий відмінок множини).
  - statement: Слово «кабінет» у місцевому відмінку звучить як «у кабінету».
    correct: false
    explanation: Правильна форма — «у кабінеті».
