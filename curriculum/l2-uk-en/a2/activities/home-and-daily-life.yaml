- type: translate
  instruction: Оберіть правильний переклад
  items:
  - source: What time is it?
    options:
    - text: Котра година?
      correct: true
    - text: Який час?
      correct: false
    - text: О котрій годині?
      correct: false
  - source: At what time?
    options:
    - text: О котрій годині?
      correct: true
    - text: Котра година?
      correct: false
    - text: Скільки годин?
      correct: false
  - source: I travel by bus.
    options:
    - text: Я їду автобусом.
      correct: true
    - text: Я їду на автобусі.
      correct: false
    - text: Я їду в автобус.
      correct: false
  - source: I don't have a carpet.
    options:
    - text: У мене немає килима.
      correct: true
    - text: У мене немає килим.
      correct: false
    - text: Я не маю килим.
      correct: false
  - source: We are sitting at the table.
    options:
    - text: Ми сидимо за столом.
      correct: true
    - text: Ми сідаємо за стіл.
      correct: false
    - text: Ми сидимо на столі.
      correct: false
  - source: Sit at the table!
    options:
    - text: Сідайте за стіл!
      correct: true
    - text: Сидіть за столом!
      correct: false
    - text: Сідайте за столом!
      correct: false
- type: true-false
  instruction: Правда чи неправда? Прочитайте твердження про похід в гості.
  items:
  - statement: Українські господарі дуже гостинні і завжди раді гостям.
    correct: true
    explanation: Українці дуже гостинні люди і завжди чекають на гостей.
  - statement: Ми кажемо «Оксана», коли звертаємося до Оксани особисто.
    correct: false
    explanation: 'Коли ми звертаємося до друзів, ми використовуємо кличний відмінок:
      «Оксано!».'
  - statement: Гості ніколи не приносять гостинці (gifts) господарям.
    correct: false
    explanation: Гості часто приносять маленькі гостинці для господарів.
  - statement: На кухні господиня часто пропонує гостям чай або каву.
    correct: true
    explanation: 'Господиня обов''язково пропонує теплі напої: «Хочете чаю?».'
  - statement: Ми використовуємо прийменник «з», щоб сказати «кава з молоком».
    correct: true
    explanation: Ми використовуємо орудний відмінок з прийменником «з».
  - statement: 'Наприкінці вечора гості кажуть: «Мені не подобається квартира».'
    correct: false
    explanation: 'Наприкінці вечора гості ввічливо кажуть: «Дуже дякую господарям»
      або «Мені подобається ваша квартира».'
