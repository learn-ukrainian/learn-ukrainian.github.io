version: '1.0'
module: home-and-daily-life
level: a2
inline:
- id: fill-in-home-cases
  type: fill-in
  instruction: Вставте іменник у правильній формі
  items:
  - sentence: Ми п'ємо смачну каву на ____.
    answer: кухні
    options:
    - кухні
    - кухня
    - кухнею
  - sentence: Мій одяг висить у великій ____.
    answer: шафі
    options:
    - шафі
    - шафа
    - шафою
  - sentence: Маленький кіт солодко спить на ____.
    answer: дивані
    options:
    - дивані
    - диван
    - диваном
  - sentence: Я хочу поставити новий стіл біля ____.
    answer: вікна
    options:
    - вікна
    - вікно
    - вікні
  - sentence: У нашій новій квартирі немає довгого ____.
    answer: коридора
    options:
    - коридора
    - коридор
    - коридором
  - sentence: Ми приємно відпочиваємо у новій ____.
    answer: спальні
    options:
    - спальні
    - спальня
    - спальнею
  - sentence: Мій собака сидить у зручному ____.
    answer: кріслі
    options:
    - кріслі
    - крісло
    - кріслом
  - sentence: Теплий ____ лежить на підлозі.
    answer: килим
    options:
    - килим
    - килима
    - килимі
- id: quiz-daily-routine
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: Я зазвичай прокидаюся ____ сьомій годині.
    options:
    - о
    - в
    - на
    - з
    correct: 0
  - question: Мій робочий день починається о пів ____ дев'яту.
    options:
    - на
    - в
    - до
    - о
    correct: 0
  - question: Вранці я швидко ____ з ліжка.
    options:
    - встаю
    - встає
    - встаєш
    - встаємо
    correct: 0
  - question: Я завжди їду на роботу ____.
    options:
    - машиною
    - машина
    - машині
    - машину
    correct: 0
  - question: Вона подорожує в центр міста ____.
    options:
    - метро
    - у метро
    - метром
    - на метро
    correct: 0
  - question: Увечері я смачно вечеряю з ____.
    options:
    - родиною
    - родина
    - родини
    - родині
    correct: 0
  - question: Я із задоволенням п'ю гарячу каву перед ____.
    options:
    - сніданком
    - сніданок
    - сніданку
    - сніданки
    correct: 0
  - question: У вихідні я люблю довго ____.
    options:
    - спати
    - сплю
    - спить
    - сплять
    correct: 0
- id: match-up-activities
  type: match-up
  instruction: З'єднайте частини речень
  pairs:
  - left: Я завжди прокидаюся
    right: о сьомій годині
  - left: Ми смачно снідаємо
    right: о пів на дев'яту
  - left: Я їду на роботу
    right: автобусом
  - left: Вони швидко йдуть додому
    right: після роботи
  - left: Я читаю цікаву книгу
    right: перед сном
  - left: Вона ніколи не слухає музику
    right: під час роботи
  - left: Ми часто довго гуляємо
    right: у вихідні
  - left: Я лягаю спати пізно
    right: вночі
- id: error-correction-cases
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Ми п'ємо каву у кухні.
    error: у кухні
    correction: на кухні
    error_type: phrase
    options:
    - на кухні
    - до кухні
    - в кухні
    explanation: Зі словом «кухня» ми завжди використовуємо прийменник «на» для місця.
  - sentence: Я їду на роботу на автобусі.
    error: на автобусі
    correction: автобусом
    error_type: construction
    options:
    - автобусом
    - автобуса
    - автобус
    explanation: Транспорт в українській мові використовується в орудному відмінку
      без прийменника.
  - sentence: У цьому будинку немає балкон.
    error: балкон
    correction: балкона
    error_type: word
    options:
    - балкона
    - балкону
    - балконі
    explanation: Після слова «немає» ми завжди використовуємо родовий відмінок.
  - sentence: Ми сідаємо за столом у вітальні.
    error: столом
    correction: стіл
    error_type: word
    options:
    - стіл
    - столу
    - столі
    explanation: Дієслово руху «сідати» вимагає знахідного відмінка (куди?).
  - sentence: Мені подобаюсь ваша квартира.
    error: подобаюсь
    correction: подобається
    error_type: word
    options:
    - подобається
    - подобаються
    - подобаємося
    explanation: Слово «квартира» — це однина (вона), тому дієслово має форму «подобається».
  - sentence: Вона їде в центр міста метром.
    error: метром
    correction: метро
    error_type: word
    options:
    - метро
    - у метро
    - на метро
    explanation: Слово «метро» є іншомовним і ніколи не змінює своє закінчення.
workbook:
- type: group-sort
  instruction: Розподіліть кімнати та меблі за правильним прийменником (Місцевий відмінок)
  groups:
  - label: Прийменник НА (на поверхні)
    items:
    - кухні
    - балконі
    - підлозі
    - дивані
    - ліжку
    - полиці
  - label: Прийменник У/В (всередині)
    items:
    - спальні
    - вітальні
    - коридорі
    - кріслі
    - шафі
- type: group-sort
  instruction: Розподіліть дієслова за типом дієвідміни
  groups:
  - label: І дієвідміна (закінчення -у/-ю, -еш/-єш)
    items:
    - встаю
    - снідаєш
    - читає
    - працюють
  - label: ІІ дієвідміна (закінчення -у/-ю, -иш/-їш/іть)
    items:
    - сплю
    - лежиш
    - сидить
    - стоять
- type: match-up
  instruction: З'єднайте особовий займенник із правильною формою дієслова
  pairs:
  - left: я
    right: прокидаюся
  - left: ти
    right: встаєш
  - left: він
    right: снідає
  - left: ми
    right: працюємо
  - left: ви
    right: одягаєтеся
  - left: вони
    right: сплять
- type: fill-in
  instruction: Вставте правильне дієслово (розпорядок дня)
  items:
  - sentence: Вранці я ____ дуже рано.
    answer: прокидаюся
    options:
    - прокидаюся
    - прокидається
    - прокидаємося
  - sentence: Потім я швидко ____ з ліжка.
    answer: встаю
    options:
    - встаю
    - встаєш
    - встає
  - sentence: У ванній кімнаті я ____ та чищу зуби.
    answer: вмиваюся
    options:
    - вмиваюся
    - вмивається
    - вмиваєтеся
  - sentence: Я готую смачну їжу і ____ на кухні.
    answer: снідаю
    options:
    - снідаю
    - снідає
    - снідаємо
  - sentence: Потім я тепло ____ і їду на роботу.
    answer: одягаюся
    options:
    - одягаюся
    - одягається
    - одягаєшся
  - sentence: Я ____ спати пізно вночі.
    answer: лягаю
    options:
    - лягаю
    - лягає
    - лягаємо
- type: error-correction
  instruction: Знайдіть і виправте помилку в дієслові
  items:
  - sentence: Вранці я прокидається дуже рано.
    error: прокидається
    correction: прокидаюся
    error_type: word
    options:
    - прокидаюся
    - прокидаються
    - прокидаємося
    explanation: Займенник «я» вимагає форми дієслова «прокидаюся» (-юся).
  - sentence: Моя сестра встаю о сьомій годині.
    error: встаю
    correction: встає
    error_type: word
    options:
    - встає
    - встаєш
    - встають
    explanation: Займенник «вона» (сестра) вимагає закінчення -є.
  - sentence: Ми снідають разом на кухні.
    error: снідають
    correction: снідаємо
    error_type: word
    options:
    - снідаємо
    - снідаєте
    - снідаю
    explanation: Займенник «ми» вимагає закінчення -ємо.
  - sentence: Ти працює в офісі?
    error: працює
    correction: працюєш
    error_type: word
    options:
    - працюєш
    - працюю
    - працюють
    explanation: Займенник «ти» вимагає закінчення -єш.
  - sentence: Вони швидко одягається.
    error: одягається
    correction: одягаються
    error_type: word
    options:
    - одягаються
    - одягаєтеся
    - одягаюся
    explanation: Займенник «вони» вимагає закінчення -ються.
  - sentence: Я спить на зручному дивані.
    error: спить
    correction: сплю
    error_type: word
    options:
    - сплю
    - спиш
    - сплять
    explanation: Займенник «я» вимагає закінчення -ю.
