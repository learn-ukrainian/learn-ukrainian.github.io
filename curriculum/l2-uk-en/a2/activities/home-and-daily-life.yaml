- id: error-correction-vocabulary
  type: error-correction
  instruction: Знайдіть і виправте помилку
  items:
  - sentence: Ми сидимо за стіл і їмо.
    error: стіл
    correction: столом
    error_type: word
    options:
    - столом
    - столу
    - столі
    explanation: Орудний відмінок для місця (де сидимо?).
  - sentence: Я люблю пити чай з цукор.
    error: цукор
    correction: цукром
    error_type: word
    options:
    - цукром
    - цукру
    - цукрі
    explanation: Орудний відмінок після прийменника «з».
  - sentence: Він працює на кабінеті.
    error: на
    correction: у
    error_type: word
    options:
    - у
    - за
    - під
    explanation: Ми кажемо «у кабінеті».
  - sentence: Вона живе в коридор.
    error: коридор
    correction: коридорі
    error_type: word
    options:
    - коридорі
    - коридору
    - коридором
    explanation: Місцевий відмінок після прийменника «в» (де?).
  - sentence: Я лягаю спати о одинадцятій годині.
    error: о
    correction: об
    error_type: word
    options:
    - об
    - в
    - на
    explanation: Прийменник «об» використовується перед голосними.
  - sentence: Ми маємо багато меблі.
    error: меблі
    correction: меблів
    error_type: word
    options:
    - меблів
    - меблях
    - меблями
    explanation: Родовий відмінок множини після слова «багато».
  - sentence: Я їду на роботу з автобусом.
    error: з
    correction: автобусом
    error_type: phrase
    options:
    - автобусом
    - на автобусі
    - автобусу
    explanation: Для засобу транспорту використовується Орудний відмінок без прийменника
      (їду чим?).
  - sentence: Він читає книга увечері.
    error: книга
    correction: книгу
    error_type: word
    options:
    - книгу
    - книзі
    - книгою
    explanation: Знахідний відмінок для прямого додатка (читає що?).
