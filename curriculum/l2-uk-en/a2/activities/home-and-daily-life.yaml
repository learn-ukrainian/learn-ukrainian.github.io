version: '1.0'
module: home-and-daily-life
level: a2
inline:
- id: fill-in-home-description
  type: fill-in
  instruction: Вставте іменник у правильній формі Місцевого відмінка
  items:
  - sentence: У моїй ____ є три кімнати.
    answer: квартирі
    options:
    - квартира
    - квартирі
    - квартиру
  - sentence: Великий диван стоїть у ____.
    answer: вітальні
    options:
    - вітальня
    - вітальні
    - вітальнею
  - sentence: На ____ є новий стіл.
    answer: кухні
    options:
    - кухня
    - кухні
    - кухню
  - sentence: Квіти стоять на ____.
    answer: балконі
    options:
    - балкон
    - балконі
    - балкону
  - sentence: На ____ висить гарна картина.
    answer: стіні
    options:
    - стіна
    - стіні
    - стіною
  - sentence: У ____ немає килима.
    answer: коридорі
    options:
    - коридор
    - коридорі
    - коридору
  - sentence: Ми поставили ліжко у ____.
    answer: спальні
    options:
    - спальня
    - спальні
    - спальнею
  - sentence: Кіт любить спати на ____.
    answer: ліжку
    options:
    - ліжко
    - ліжку
    - ліжком
- id: quiz-daily-routine-cases
  type: quiz
  instruction: Оберіть правильний варіант
  items:
  - question: Я прокидаюся ____ сьомій годині.
    options:
    - в
    - о
    - об
    - на
    correct: 1
  - question: Ми снідаємо з ____.
    options:
    - родина
    - родиною
    - родини
    - родині
    correct: 1
  - question: Після ____ я йду на роботу.
    options:
    - сніданок
    - сніданку
    - сніданком
    - сніданкові
    correct: 1
  - question: Я їду на роботу ____.
    options:
    - автобус
    - автобусом
    - автобусу
    - в автобусі
    correct: 1
  - question: Перед ____ я люблю читати.
    options:
    - сон
    - сном
    - сну
    - сні
    correct: 1
  - question: Я багато працюю ____.
    options:
    - у будні
    - на будні
    - буднями
    - в буднях
    correct: 0
  - question: Я обідаю на ____.
    options:
    - робота
    - роботи
    - роботі
    - роботою
    correct: 2
  - question: ____ вихідні я відпочиваю.
    options:
    - у
    - на
    - за
    - під
    correct: 0
- id: match-up-routine-times
  type: match-up
  instruction: З'єднайте час із відповідною дією
  pairs:
  - left: сьома година
    right: я встаю
  - left: після сніданку
    right: я одягаюся
  - left: дев'ята година
    right: я починаю працювати
  - left: під час роботи
    right: я п'ю воду
  - left: після обіду
    right: я маю час для відпочинку
  - left: увечері
    right: я читаю книгу
  - left: одинадцята година
    right: я лягаю спати
  - left: по суботах
    right: я ходжу на ринок
