version: '1.0'
module: home-and-daily-life
level: a2
inline:
- id: fill-in
  type: fill-in
  instruction: Доповніть опис помешкання правильними формами слів (Місцевий та інші
    відмінки)
  items:
  - sentence: Олена переїхала в нову _____.
    answer: квартиру
    options:
    - квартиру
    - квартира
    - квартирі
  - sentence: У її новій _____ дуже світло.
    answer: квартирі
    options:
    - квартирі
    - квартира
    - квартирою
  - sentence: У великій _____ стоїть м'який диван.
    answer: вітальні
    options:
    - вітальні
    - вітальня
    - вітальню
  - sentence: Поруч із диваном лежить пухнастий _____.
    answer: килим
    options:
    - килим
    - килима
    - килимом
  - sentence: На світлій _____ стоїть дерев'яний стіл.
    answer: кухні
    options:
    - кухні
    - кухня
    - кухню
  - sentence: Яскраві квіти стоять на _____.
    answer: балконі
    options:
    - балконі
    - балкон
    - балкону
  - sentence: Велика шафа для одягу стоїть у _____.
    answer: коридорі
    options:
    - коридорі
    - коридор
    - коридором
  - sentence: У затишній _____ стоїть зручне ліжко.
    answer: спальні
    options:
    - спальні
    - спальня
    - спальню
- id: quiz
  type: quiz
  instruction: Оберіть правильний варіант часу, прийменника або дієслова
  items:
  - question: Ігор п'є каву _____ сніданку.
    options:
    - після
    - перед
    - у
    - на
    correct: 0
  - question: Він зазвичай прокидається о _____ годині.
    options:
    - сьомій
    - сьома
    - сьому
    - сьомою
    correct: 0
  - question: Ігор завжди ретельно вмивається _____ роботою.
    options:
    - перед
    - після
    - з
    - на
    correct: 0
  - question: Він щодня їде на роботу _____.
    options:
    - автобусом
    - автобус
    - на автобусі
    - в автобус
    correct: 0
  - question: Ігор ефективно працює зі своїми _____.
    options:
    - колегами
    - колег
    - колеги
    - колегам
    correct: 0
  - question: О першій годині вони всі _____ разом.
    options:
    - обідають
    - обідати
    - обідаємо
    - обідає
    correct: 0
  - question: Увечері Ігор нарешті повертається _____.
    options:
    - додому
    - вдома
    - дім
    - з дому
    correct: 0
  - question: Він дуже любить відпочивати і ходить _____ кіно у вихідні.
    options:
    - у
    - на
    - до
    - з
    correct: 0
- id: match-up
  type: match-up
  instruction: З'єднайте час дня з відповідною дією
  pairs:
  - left: вранці
    right: він вмивається холодною водою
  - left: вдень
    right: він працює в просторому офісі
  - left: увечері
    right: він прасує одяг на завтра
  - left: вночі
    right: він просто міцно спить
  - left: у вихідні
    right: він часто ходить у кіно
  - left: о сьомій годині
    right: він завжди прокидається
  - left: після роботи
    right: він повертається додому
  - left: після сніданку
    right: він читає свіжі новини
- id: error-correction
  type: error-correction
  instruction: Знайдіть і виправте граматичну помилку в реченнях
  items:
  - sentence: Проходьте у коридорі, будь ласка.
    error: коридорі
    correction: коридор
    error_type: word
    options:
    - коридор
    - коридором
    - коридору
    explanation: 'Дієслово руху вимагає Знахідного відмінка (Accusative) для напрямку
      дії: у коридор.'
  - sentence: Сідайте за столом.
    error: столом
    correction: стіл
    error_type: word
    options:
    - стіл
    - столу
    - столі
    explanation: 'Коли ми сідаємо кудись (напрямок), використовуємо Знахідний відмінок:
      за стіл.'
  - sentence: У цьому будинку є багато кімнати.
    error: кімнати
    correction: кімнат
    error_type: word
    options:
    - кімнат
    - кімнатою
    - кімната
    explanation: 'Слово «багато» вимагає Родового відмінка множини: багато кімнат.'
  - sentence: Ігор дякує господарі за смачну вечерю.
    error: господарі
    correction: господарям
    error_type: word
    options:
    - господарям
    - господарів
    - господарем
    explanation: 'Дієслово «дякувати» вимагає Давального відмінка (Dative): дякує
      господарям.'
  - sentence: Хочете чай чи кави?
    error: чай
    correction: чаю
    error_type: word
    options:
    - чаю
    - чаєм
    - чаям
    explanation: 'При пропозиції напоїв часто використовуємо Родовий відмінок (partitive
      Genitive): хочете чаю?'
  - sentence: Оксана готує вечерю на кухню.
    error: кухню
    correction: кухні
    error_type: word
    options:
    - кухні
    - кухнею
    - кухнями
    explanation: 'Коли ми вказуємо місце дії (де?), використовуємо Місцевий відмінок:
      на кухні.'
workbook:
- id: verbs-present-fill
  type: fill-in
  instruction: 'Відмінюйте дієслова: вставте правильну форму теперішнього часу'
  items:
  - sentence: Я щодня _____ о сьомій.
    answer: встаю
    options:
    - встаю
    - встає
    - встаєш
  - sentence: Ти завжди смачно _____ вранці?
    answer: снідаєш
    options:
    - снідаєш
    - снідаю
    - снідає
  - sentence: Ми _____ спати дуже пізно.
    answer: лягаємо
    options:
    - лягаємо
    - лягаю
    - лягають
  - sentence: Вони _____ о восьмій годині.
    answer: снідають
    options:
    - снідають
    - снідає
    - снідаємо
  - sentence: Ігор _____ о шостій ранку.
    answer: встає
    options:
    - встає
    - встаю
    - встають
  - sentence: Ви _____ відпочивати у вихідні?
    answer: любите
    options:
    - любите
    - любить
    - любиш
  - sentence: Я _____ з дружиною о сьомій п'ятнадцять.
    answer: снідаю
    options:
    - снідаю
    - снідаємо
    - снідають
  - sentence: Коли ви зазвичай _____ спати?
    answer: лягаєте
    options:
    - лягаєте
    - лягаємо
    - лягаєш
- id: cases-sort
  type: group-sort
  instruction: Розподіліть фрази за відмінками
  groups:
  - label: Місце і час (Місцевий відмінок - Locative)
    items:
    - у кухні
    - на балконі
    - у спальні
    - о сьомій
  - label: Транспорт і компанія (Орудний відмінок - Instrumental)
    items:
    - з родиною
    - автобусом
    - за столом
    - зі своїми колегами
  - label: Кількість і відсутність (Родовий відмінок - Genitive)
    items:
    - багато кімнат
    - немає гаража
    - трохи салату
    - після роботи
- id: true-false-comprehension
  type: true-false
  instruction: Чи правдиві ці твердження? (Правда чи ні?)
  items:
  - statement: Олена переїхала в нове помешкання.
    correct: true
    explanation: Олена справді переїхала в нову простору квартиру.
  - statement: У спальні стоїть великий м'який диван.
    correct: false
    explanation: Диван стоїть у її вітальні.
  - statement: Ігор снідає о сьомій п'ятнадцять.
    correct: true
    explanation: Він снідає зі своєю родиною рівно о 7:15.
  - statement: У вихідні Ігор також дуже багато працює.
    correct: false
    explanation: У вихідні він ніколи не працює і просто розслаблено відпочиває.
  - statement: Коли гості приходять у квартиру, вони повинні роззуватися.
    correct: true
    explanation: Це українська традиція — знімати взуття та вдягати капці.
  - statement: Ігор і Оксана п'ють каву за столом.
    correct: false
    explanation: Ігор просить воду з лимоном.
