inline:
  - id: act-1
    type: quiz
    title: Називний чи орудний?
    instruction: Оберіть форму, яка підходить до речення.
    items:
      - question: "Я ___."
        options:
          - вчителька
          - вчителькою
          - вчительці
        correct: 0
        explanation: У теперішньому стані часто вживаємо називний.
      - question: "Я працюю ___."
        options:
          - вчителька
          - вчителькою
          - вчительці
        correct: 1
        explanation: Працювати ким? - вчителькою.
      - question: "Він буде ___."
        options:
          - лікар
          - лікарем
          - лікаря
        correct: 1
        explanation: Бути в майбутньому часі потребує орудного.
      - question: "Вона стала ___."
        options:
          - інженерка
          - інженеркою
          - інженерки
        correct: 1
        explanation: Стати ким? - інженеркою.
  - id: act-2
    type: match-up
    title: Професія і форма
    instruction: З'єднайте називний з орудним.
    pairs:
      - left: лікар
        right: лікарем
      - left: лікарка
        right: лікаркою
      - left: інженер
        right: інженером
      - left: вчителька
        right: вчителькою
  - id: act-3
    type: fill-in
    title: Дієслова з орудним
    instruction: Оберіть форму після дієслова.
    items:
      - sentence: "Я цікавлюся ___."
        answer: історією
        options:
          - історія
          - історію
          - історією
        explanation: Цікавитися чим? - історією.
      - sentence: "Вона захоплюється ___."
        answer: музикою
        options:
          - музика
          - музику
          - музикою
        explanation: Захоплюватися чим? - музикою.
      - sentence: "Ми пишаємося ___."
        answer: командою
        options:
          - команда
          - команду
          - командою
        explanation: Пишатися ким? чим? - командою.
      - sentence: "Андрій займається ___."
        answer: спортом
        options:
          - спорт
          - спортом
          - спорту
        explanation: Займатися чим? - спортом.
  - id: act-4
    type: group-sort
    title: Професія чи інтерес?
    instruction: Розсортуйте фрази за моделлю.
    groups:
      - label: Професія
        items:
          - працюю лікарем
          - буду вчителькою
          - стала журналісткою
          - працював кухарем
      - label: Інтерес або діяльність
        items:
          - цікавлюся історією
          - захоплююся музикою
          - займаюся спортом
          - пишаюся командою
workbook:
  - type: true-false
    title: Кар'єрна перевірка
    instruction: Позначте, чи речення природне.
    items:
      - statement: "Я працюю інженером."
        correct: true
        explanation: Працювати ким? - інженером.
      - statement: "Вона буде лікарка."
        correct: false
        explanation: Потрібно буде лікаркою.
      - statement: "Я цікавлюся освітою."
        correct: true
        explanation: Цікавитися чим? - освітою.
      - statement: "Він захоплюється музика."
        correct: false
        explanation: Потрібно музикою.
  - type: error-correction
    title: Виправте професію
    instruction: Оберіть правильний варіант.
    items:
      - sentence: "Наталя працює вчителька."
        error: вчителька
        correction: "Наталя працює вчителькою."
        options:
          - "Наталя працює вчителькою."
          - "Наталя працює вчителька."
        explanation: Працювати ким? - вчителькою.
      - sentence: "Андрій цікавиться історія."
        error: історія
        correction: "Андрій цікавиться історією."
        options:
          - "Андрій цікавиться історією."
          - "Андрій цікавиться історія."
        explanation: Цікавитися чим? - історією.
      - sentence: "Вона стала журналістка."
        error: журналістка
        correction: "Вона стала журналісткою."
        options:
          - "Вона стала журналісткою."
          - "Вона стала журналістка."
        explanation: Стати ким? - журналісткою.
