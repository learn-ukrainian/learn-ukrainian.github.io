inline:
  - id: act-1
    type: fill-in
    title: Якщо і кома
    instruction: Оберіть правильний сполучник або форму речення.
    items:
      - sentence: "___ буде сонце, ми підемо гуляти."
        answer: "Якщо"
        options:
          - "Якщо"
          - "Тому що"
        explanation: "Це можлива умова."
      - sentence: "Ми залишимося вдома, ___ буде дощ."
        answer: "якщо"
        options:
          - "якщо"
          - "щоб"
        explanation: "Друга частина називає умову."
      - sentence: "Якщо ти ___ час, зателефонуй."
        answer: "матимеш"
        options:
          - "матимеш"
          - "мав би"
        explanation: "На A2 беремо реальну умову з майбутнім часом."
      - sentence: "Якщо магазин відкритий, ___ хліб."
        answer: "купимо"
        options:
          - "купимо"
          - "купили б"
        explanation: "Результат реальної умови."
      - sentence: "Я напишу, ___ матиму новини."
        answer: "якщо"
        options:
          - "якщо"
          - "хоча"
        explanation: "Новини є умовою для дзвінка."
      - sentence: "Якщо не поспішиш, ___ на автобус."
        answer: "запізнишся"
        options:
          - "запізнишся"
          - "запізнився б"
        explanation: "Це попередження про можливий результат."
      - sentence: "___ хочеш, я допоможу."
        answer: "Якщо"
        options:
          - "Якщо"
          - "Бо"
        explanation: "Бажання співрозмовника є умовою."
      - sentence: "Якщо побачиш Олену, ___ їй повідомлення."
        answer: "передай"
        options:
          - "передай"
          - "передав би"
        explanation: "У результаті може бути наказовий спосіб."
  - id: act-2
    type: match-up
    title: Умова і результат
    instruction: З'єднайте умову з логічним результатом.
    pairs:
      - left: "Якщо буде дощ,"
        right: "ми залишимося вдома."
      - left: "Якщо ти купиш насіння,"
        right: "я підготую грядку."
      - left: "Якщо не поспішиш,"
        right: "запізнишся."
      - left: "Якщо магазин ще відкритий,"
        right: "купимо хліб."
      - left: "Якщо побачиш викладача,"
        right: "передай йому повідомлення."
      - left: "Якщо буде вільна година,"
        right: "я зайду до бібліотеки."
      - left: "Якщо хочеш говорити краще,"
        right: "практикуй щодня."
      - left: "Якщо ми втомимося,"
        right: "зробимо перерву."
  - id: act-3
    type: group-sort
    title: План, порада чи попередження?
    instruction: Розподіліть речення за функцією.
    groups:
      - label: "планування"
        items:
          - "Якщо буде час, поїдемо до центру."
          - "Якщо магазин відкритий, купимо продукти."
          - "Якщо зустріч закінчиться рано, підемо на каву."
      - label: "порада"
        items:
          - "Якщо болить голова, відпочинь."
          - "Якщо не знаєш слово, подивися в словник."
          - "Якщо хочеш краще писати, читай більше."
      - label: "попередження"
        items:
          - "Якщо не візьмеш ключі, не зайдеш додому."
          - "Якщо не поспішиш, запізнишся."
          - "Якщо не збережеш файл, втратиш текст."
      - label: "домовленість"
        items:
          - "Якщо ти допоможеш мені, я допоможу тобі."
          - "Якщо зможеш у п'ятницю, зустрінемося."
          - "Якщо буде зручно, зателефонуємо ввечері."
  - id: act-4
    type: quiz
    title: Якщо чи якби?
    instruction: Оберіть A2-варіант для реальної умови.
    items:
      - question: "___ буде дощ, ми залишимося вдома."
        options:
          - "Якщо"
          - "Якби"
          - "Щоб"
        correct: 0
        explanation: "Це можлива ситуація в майбутньому."
      - question: "___ ти хочеш, я допоможу."
        options:
          - "Якщо"
          - "Якби"
          - "Хоча"
        correct: 0
        explanation: "Бажання співрозмовника може бути реальним."
      - question: "A2 production: ___ матиму час, напишу."
        options:
          - "Якщо"
          - "Якби"
          - "Бо"
        correct: 0
        explanation: "На A2 активно будуємо реальні умови з якщо."
      - question: "У пісні ви бачите: Якби я знав... Що це означає?"
        options:
          - "гіпотетична умова для розпізнавання"
          - "звичайна A2-форма для активного письма"
          - "причина з тому що"
        correct: 0
        explanation: "Якби розпізнаємо, але не продукуємо на A2."
      - question: "Яке речення краще для A2?"
        options:
          - "Якщо буде час, я прийду."
          - "Якби буде час, я прийду."
          - "Щоб буде час, я прийду."
        correct: 0
        explanation: "Реальна умова використовує якщо."
      - question: "Яке речення правильно ставить кому?"
        options:
          - "Якщо буде сонце, поїдемо на дачу."
          - "Якщо буде сонце поїдемо на дачу."
          - "Якщо, буде сонце поїдемо на дачу."
        correct: 0
        explanation: "Кома стоїть після якщо-частини."
      - question: "Яке речення правильно ставить кому, якщо умова друга?"
        options:
          - "Я напишу, якщо матиму час."
          - "Я напишу якщо, матиму час."
          - "Я, напишу якщо матиму час."
        correct: 0
        explanation: "Кома стоїть перед якщо."
      - question: "Що робить слово то?"
        options:
          - "позначає початок результату"
          - "замінює якщо"
          - "робить речення минулим"
        correct: 0
        explanation: "То допомагає побачити результат."
workbook:
  - type: unjumble
    title: Складіть умовне речення
    instruction: Поставте слова в природний порядок.
    items:
      - words:
          - "Якщо"
          - "буде"
          - "дощ,"
          - "ми"
          - "залишимося"
          - "вдома"
        answer: "Якщо буде дощ, ми залишимося вдома."
      - words:
          - "Я"
          - "напишу,"
          - "якщо"
          - "матиму"
          - "час"
        answer: "Я напишу, якщо матиму час."
      - words:
          - "Якщо"
          - "побачиш"
          - "Олену,"
          - "передай"
          - "повідомлення"
        answer: "Якщо побачиш Олену, передай повідомлення."
      - words:
          - "Якщо"
          - "ти"
          - "допоможеш,"
          - "я"
          - "допоможу"
          - "тобі"
        answer: "Якщо ти допоможеш, я допоможу тобі."
      - words:
          - "Ми"
          - "поїдемо"
          - "до"
          - "центру,"
          - "якщо"
          - "буде"
          - "час"
        answer: "Ми поїдемо до центру, якщо буде час."
      - words:
          - "Якщо"
          - "не"
          - "поспішиш,"
          - "запізнишся"
        answer: "Якщо не поспішиш, запізнишся."
      - words:
          - "Якщо"
          - "магазин"
          - "відкритий,"
          - "купимо"
          - "хліб"
        answer: "Якщо магазин відкритий, купимо хліб."
      - words:
          - "Якщо"
          - "втомимося,"
          - "зробимо"
          - "перерву"
        answer: "Якщо втомимося, зробимо перерву."
  - type: fill-in
    title: Причина, мета чи умова?
    instruction: Оберіть правильний сполучник.
    items:
      - sentence: "Я взяв парасолю, ___ йшов дощ."
        answer: "бо"
        options:
          - "бо"
          - "якщо"
        explanation: "Дощ уже був причиною."
      - sentence: "___ буде дощ, я візьму парасолю."
        answer: "Якщо"
        options:
          - "Якщо"
          - "Бо"
        explanation: "Дощ можливий у майбутньому."
      - sentence: "Я відкрив словник, ___ перевірити наголос."
        answer: "щоб"
        options:
          - "щоб"
          - "якщо"
        explanation: "Це мета."
      - sentence: "Я напишу, ___ матиму новини."
        answer: "якщо"
        options:
          - "якщо"
          - "тому що"
        explanation: "Новини є умовою майбутньої дії."
      - sentence: "Ми залишилися вдома, ___ вже було пізно."
        answer: "тому що"
        options:
          - "тому що"
          - "якщо"
        explanation: "Пізній час пояснює причину."
      - sentence: "___ хочеш, то ходімо разом."
        answer: "Якщо"
        options:
          - "Якщо"
          - "Хоча"
        explanation: "Бажання співрозмовника є умовою."
