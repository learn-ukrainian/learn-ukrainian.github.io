inline:
  - id: act-1
    type: match-up
    title: Дієслівні категорії
    instruction: З'єднайте термін з прикладом.
    pairs:
      - left: "теперішній час"
        right: "я читаю"
      - left: "минулий час"
        right: "я читав"
      - left: "майбутній час"
        right: "я прочитаю"
      - left: "доконаний вид"
        right: "написати"
      - left: "недоконаний вид"
        right: "писати"
      - left: "перша особа"
        right: "я / ми"
      - left: "друга особа"
        right: "ти / ви"
      - left: "третя особа"
        right: "він / вони"
  - id: act-1b
    type: group-sort
    title: Час дієслова
    instruction: Розподіліть форми за часом.
    groups:
      - label: "теперішній час"
        items:
          - "пишу"
          - "читаєш"
          - "говоримо"
          - "працюють"
      - label: "минулий час"
        items:
          - "писав"
          - "читала"
          - "говорили"
          - "працювало"
      - label: "майбутній час"
        items:
          - "напишу"
          - "читатиму"
          - "будемо говорити"
          - "працюватимуть"
  - id: act-2
    type: quiz
    title: Вид дієслова
    instruction: Оберіть правильний опис.
    items:
      - question: "`читати`"
        options:
          - "недоконаний вид"
          - "доконаний вид"
          - "числівник"
        correct: 0
        explanation: "`Читати` відповідає на питання що робити?"
      - question: "`прочитати`"
        options:
          - "доконаний вид"
          - "недоконаний вид"
          - "прислівник"
        correct: 0
        explanation: "`Прочитати` відповідає на питання що зробити?"
      - question: "`Я писав лист дві години.`"
        options:
          - "процес"
          - "результат"
          - "звертання"
        correct: 0
        explanation: "Дві години підкреслює процес."
      - question: "`Я написав лист до вечора.`"
        options:
          - "результат"
          - "процес без межі"
          - "питання відмінка"
        correct: 0
        explanation: "Написав показує завершену дію."
      - question: "`готувати`"
        options:
          - "недоконаний вид"
          - "доконаний вид"
          - "наказовий спосіб"
        correct: 0
        explanation: "Готувати - процес."
      - question: "`приготувати`"
        options:
          - "доконаний вид"
          - "недоконаний вид"
          - "теперішній час"
        correct: 0
        explanation: "Приготувати - результат."
      - question: "`що зробити?`"
        options:
          - "питання доконаного виду"
          - "питання недоконаного виду"
          - "питання місцевого відмінка"
        correct: 0
        explanation: "Що зробити? підказує доконаний вид."
      - question: "`що робити?`"
        options:
          - "питання недоконаного виду"
          - "питання доконаного виду"
          - "питання кличного відмінка"
        correct: 0
        explanation: "Що робити? підказує недоконаний вид."
  - id: act-3
    type: fill-in
    title: Особа і число
    instruction: Оберіть правильний термін.
    items:
      - sentence: "`я пишу` - це ___ особа однини."
        answer: "перша"
        options:
          - "перша"
          - "друга"
          - "третя"
        explanation: "`Я` - перша особа."
      - sentence: "`ти пишеш` - це ___ особа однини."
        answer: "друга"
        options:
          - "друга"
          - "перша"
          - "третя"
        explanation: "`Ти` - друга особа."
      - sentence: "`він пише` - це ___ особа однини."
        answer: "третя"
        options:
          - "третя"
          - "перша"
          - "друга"
        explanation: "`Він` - третя особа."
      - sentence: "`ми пишемо` - це перша особа ___."
        answer: "множини"
        options:
          - "множини"
          - "однини"
          - "роду"
        explanation: "`Ми` - множина."
      - sentence: "`ви пишете` - це друга особа ___."
        answer: "множини"
        options:
          - "множини"
          - "однини"
          - "знахідного"
        explanation: "`Ви` - друга особа множини або ввічлива форма."
      - sentence: "`вони пишуть` - це ___ особа множини."
        answer: "третя"
        options:
          - "третя"
          - "перша"
          - "друга"
        explanation: "`Вони` - третя особа."
      - sentence: "`пишеш` має закінчення моделі ___ дієвідміни."
        answer: "I"
        options:
          - "I"
          - "II"
          - "кличної"
        explanation: "Пишеш, пише - робоча модель I дієвідміни."
      - sentence: "`говориш` має закінчення моделі ___ дієвідміни."
        answer: "II"
        options:
          - "II"
          - "I"
          - "місцевої"
        explanation: "Говориш, говорить - робоча модель II дієвідміни."
  - id: act-4
    type: quiz
    title: Читаємо словникову статтю
    instruction: Оберіть правильний висновок зі словникової статті.
    items:
      - question: "`писати - дієсл., недок.; теп. ч.: пишу, пишеш, пише.`"
        options:
          - "Це дієслово недоконаного виду."
          - "Це прикметник чоловічого роду."
          - "Це прислівник місця."
        correct: 0
        explanation: "`Дієсл.` означає дієслово, `недок.` - недоконаний вид."
      - question: "`написати - дієсл., док.; майб. ч.: напишу, напишеш.`"
        options:
          - "Це дієслово доконаного виду."
          - "Це іменник у множині."
          - "Це недоконаний вид."
        correct: 0
        explanation: "`Док.` означає доконаний вид."
      - question: "`говориш` у статті `говорити - дієсл., недок.; теп. ч.: говорю, говориш, говорить.`"
        options:
          - "друга особа однини"
          - "перша особа множини"
          - "минулий час"
        correct: 0
        explanation: "`Ти говориш` - друга особа однини."
      - question: "`скажемо` у статті `сказати - дієсл., док.; майб. ч.: скажу, скажеш, скаже, скажемо.`"
        options:
          - "перша особа множини"
          - "третя особа однини"
          - "прислівник способу дії"
        correct: 0
        explanation: "`Ми скажемо` - перша особа множини."
      - question: "`швидко - присл.; ознака дії.`"
        options:
          - "Це прислівник."
          - "Це дієслово."
          - "Це доконаний вид."
        correct: 0
        explanation: "`Присл.` означає прислівник."
      - question: "`читав - мин. ч., одн., ч.р.`"
        options:
          - "минулий час, однина, чоловічий рід"
          - "теперішній час, множина"
          - "майбутній час, жіночий рід"
        correct: 0
        explanation: "`Мин. ч.` - минулий час, `одн.` - однина, `ч.р.` - чоловічий рід."
      - question: "`книги - ім., мн.`"
        options:
          - "іменник, множина"
          - "дієслово, майбутній час"
          - "прислівник часу"
        correct: 0
        explanation: "`Ім.` означає іменник, `мн.` - множина."
      - question: "`уважно - присл.; спосіб дії.`"
        options:
          - "відповідає на питання як?"
          - "відповідає на питання хто?"
          - "має доконаний вид"
        correct: 0
        explanation: "Прислівник способу дії відповідає на питання як?"
  - id: act-4b
    type: match-up
    title: Словникові скорочення
    instruction: З'єднайте скорочення з повною формою.
    pairs:
      - left: "ім."
        right: "іменник"
      - left: "прикм."
        right: "прикметник"
      - left: "дієсл."
        right: "дієслово"
      - left: "присл."
        right: "прислівник"
      - left: "док."
        right: "доконаний вид"
      - left: "недок."
        right: "недоконаний вид"
      - left: "ч.р."
        right: "чоловічий рід"
      - left: "ж.р."
        right: "жіночий рід"
      - left: "с.р."
        right: "середній рід"
      - left: "одн."
        right: "однина"
      - left: "мн."
        right: "множина"
workbook:
  - type: group-sort
    title: Тип прислівника
    instruction: Розподіліть прислівники за типами.
    groups:
      - label: "місця"
        items:
          - "тут"
          - "там"
          - "далеко"
          - "додому"
      - label: "часу"
        items:
          - "сьогодні"
          - "завтра"
          - "вчора"
          - "завжди"
      - label: "способу дії"
        items:
          - "швидко"
          - "повільно"
          - "уважно"
          - "добре"
  - type: error-correction
    title: Виправте опис
    instruction: Оберіть правильний граматичний опис.
    items:
      - sentence: "`Я написав лист` - недоконаний вид."
        error: "недоконаний"
        correction: "`Я написав лист` - доконаний вид."
        options:
          - "`Я написав лист` - доконаний вид."
          - "`Я написав лист` - прислівник."
        explanation: "Написав показує результат."
      - sentence: "`Я писав лист` - доконаний вид."
        error: "доконаний"
        correction: "`Я писав лист` - недоконаний вид."
        options:
          - "`Я писав лист` - недоконаний вид."
          - "`Я писав лист` - кличний відмінок."
        explanation: "Писав описує процес."
      - sentence: "`пишемо` - третя особа."
        error: "третя"
        correction: "`пишемо` - перша особа множини."
        options:
          - "`пишемо` - перша особа множини."
          - "`пишемо` - друга особа однини."
        explanation: "`Ми пишемо` - перша особа множини."
      - sentence: "`завтра` - прислівник місця."
        error: "місця"
        correction: "`завтра` - прислівник часу."
        options:
          - "`завтра` - прислівник часу."
          - "`завтра` - іменник."
        explanation: "`Завтра` відповідає на питання коли?"
      - sentence: "`уважно` - прикметник жіночого роду."
        error: "прикметник жіночого роду"
        correction: "`уважно` - прислівник способу дії."
        options:
          - "`уважно` - прислівник способу дії."
          - "`уважно` - минулий час."
        explanation: "`Уважно` відповідає на питання як?"
      - sentence: "`говориш` - перша особа множини."
        error: "перша особа множини"
        correction: "`говориш` - друга особа однини."
        options:
          - "`говориш` - друга особа однини."
          - "`говориш` - третя особа множини."
        explanation: "`Ти говориш` - друга особа однини."
      - sentence: "`прочитати` - недоконаний вид."
        error: "недоконаний"
        correction: "`прочитати` - доконаний вид."
        options:
          - "`прочитати` - доконаний вид."
          - "`прочитати` - прислівник часу."
        explanation: "`Прочитати` відповідає на питання що зробити?"
      - sentence: "`ч.р.` означає жіночий рід."
        error: "жіночий"
        correction: "`ч.р.` означає чоловічий рід."
        options:
          - "`ч.р.` означає чоловічий рід."
          - "`ч.р.` означає множину."
        explanation: "`Ч.р.` - це чоловічий рід."
