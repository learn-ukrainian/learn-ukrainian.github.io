inline:
  - id: act-1
    type: quiz
    title: Де, коли чи по чому?
    instruction: Визначте, яку функцію виконує фраза з місцевим відмінком.
    items:
      - question: "У фразі `у житті` місцевий відмінок означає..."
        options:
          - "місце"
          - "сферу або контекст"
          - "рух"
        correct: 1
        explanation: "`У житті` говорить про сферу, а не про фізичне місце."
      - question: "У фразі `на роботі` місцевий відмінок означає..."
        options:
          - "звичну ситуацію або контекст"
          - "тему розмови"
          - "прямий об'єкт"
        correct: 0
        explanation: "`На роботі` - стала фраза про звичний контекст."
      - question: "У фразі `у минулому місяці` місцевий відмінок означає..."
        options:
          - "час"
          - "місце"
          - "причину"
        correct: 0
        explanation: "Місяць як період - це часове значення."
      - question: "У фразі `на цьому тижні` місцевий відмінок означає..."
        options:
          - "канал зв'язку"
          - "час"
          - "професію"
        correct: 1
        explanation: "`На цьому тижні` показує часовий період."
      - question: "У фразі `по телефону` місцевий відмінок означає..."
        options:
          - "місце"
          - "канал або засіб"
          - "якість"
        correct: 1
        explanation: "`По телефону` - це спосіб зв'язку."
      - question: "У фразі `по радіо` місцевий відмінок означає..."
        options:
          - "канал або засіб"
          - "назву місця"
          - "власника"
        correct: 0
        explanation: "Радіо тут - канал, через який щось чують."
      - question: "У фразі `у дитинстві` місцевий відмінок означає..."
        options:
          - "період життя"
          - "рух"
          - "кількість"
        correct: 0
        explanation: "Дитинство - це період життя, а не місце."
      - question: "У фразі `про телефон` місцевий відмінок не використовується, бо це..."
        options:
          - "тема розмови"
          - "місце"
          - "час"
        correct: 0
        explanation: "`Про` тут вводить тему, а не канал."
  - id: act-2
    type: fill-in
    title: Час і контекст
    instruction: Доповніть фрази правильною формою.
    items:
      - sentence: "У минулому ___ я змінив роботу."
        answer: "місяці"
        options:
          - "місяці"
          - "місяць"
          - "місяця"
        explanation: "Потрібна форма місцевого: у минулому місяці."
      - sentence: "На цьому ___ у нас три заняття."
        answer: "тижні"
        options:
          - "тижні"
          - "тиждень"
          - "тижня"
        explanation: "Після на цьому вживаємо місцевий: тижні."
      - sentence: "У ___ я жив у селі."
        answer: "дитинстві"
        options:
          - "дитинстві"
          - "дитинство"
          - "дитинства"
        explanation: "Фраза про період життя потребує місцевого: у дитинстві."
      - sentence: "Я працюю ___ освіті."
        answer: "в"
        options:
          - "в"
          - "на"
          - "по"
        explanation: "У сфері говоримо: в освіті."
      - sentence: "Вона не працює ___ політиці."
        answer: "у"
        options:
          - "у"
          - "на"
          - "по"
        explanation: "Сфера позначається через у/в + місцевий."
      - sentence: "Ми говорили ___ телефону."
        answer: "по"
        options:
          - "по"
          - "про"
          - "на"
        explanation: "Канал зв'язку: по телефону."
      - sentence: "Я почув це ___ радіо."
        answer: "по"
        options:
          - "по"
          - "про"
          - "у"
        explanation: "Чути щось по радіо."
      - sentence: "___ молодості вона багато читала."
        answer: "У"
        options:
          - "У"
          - "На"
          - "По"
        explanation: "Період життя: у молодості."
  - id: act-3
    type: match-up
    title: Підбери фразу
    instruction: Зіставте англійський зміст або ситуацію з природною українською фразою.
    pairs:
      - left: "in life"
        right: "у житті"
      - left: "at work"
        right: "на роботі"
      - left: "in education"
        right: "в освіті"
      - left: "last month"
        right: "у минулому місяці"
      - left: "this week"
        right: "на цьому тижні"
      - left: "in childhood"
        right: "у дитинстві"
      - left: "by phone"
        right: "по телефону"
      - left: "by radio"
        right: "по радіо"
  - id: act-4
    type: group-sort
    title: Розсортуй значення
    instruction: Розкладіть фрази за функцією місцевого відмінка.
    groups:
      - label: "сфера"
        items:
          - "у житті"
          - "в освіті"
          - "у політиці"
          - "на роботі"
      - label: "час"
        items:
          - "у минулому місяці"
          - "на цьому тижні"
          - "у дитинстві"
      - label: "канал"
        items:
          - "по телефону"
          - "по радіо"
          - "по дорозі"
workbook:
  - id: act-5
    type: true-false
    title: Перевір себе
    instruction: Визначте, чи речення природне й правильне.
    items:
      - statement: "На роботі сьогодні тихо."
        answer: true
        explanation: "На роботі - природна стала фраза."
      - statement: "У роботі сьогодні тихо."
        answer: false
        explanation: "Потрібно сказати: на роботі."
      - statement: "У минулому місяці я змінив роботу."
        answer: true
        explanation: "Місяць як період часу стоїть у місцевому."
      - statement: "На цьому тиждень у нас три заняття."
        answer: false
        explanation: "Потрібно: на цьому тижні."
      - statement: "Ми говорили по телефону."
        answer: true
        explanation: "По телефону - правильний канал зв'язку."
      - statement: "Ми говорили про телефон."
        answer: true
        explanation: "Це вже тема розмови, а не канал."
      - statement: "У дитинстві я жив у селі."
        answer: true
        explanation: "Період життя позначено правильно."
      - statement: "Я почув це по радіо."
        answer: true
        explanation: "Це природна модель каналу."
  - id: act-6
    type: error-correction
    title: Виправ місцевий
    instruction: Знайдіть і виправте помилку в кожному реченні.
    items:
      - sentence: "У роботі я багато читаю."
        error: "У роботі"
        correction: "На роботі"
        options:
          - "На роботі я багато читаю."
          - "У роботі я багато читаю."
        explanation: "Для роботи як контексту вживаємо на роботі."
      - sentence: "На цьому тиждень у нас три заняття."
        error: "тиждень"
        correction: "тижні"
        options:
          - "На цьому тижні у нас три заняття."
          - "На цьому тиждень у нас три заняття."
        explanation: "Після на цьому потрібна форма тижні."
      - sentence: "Ми говорили про телефону."
        error: "про телефону"
        correction: "по телефону"
        options:
          - "Ми говорили по телефону."
          - "Ми говорили про телефону."
        explanation: "Для каналу зв'язку вживаємо по телефону."
      - sentence: "У минулий місяць я був у Львові."
        error: "У минулий місяць"
        correction: "У минулому місяці"
        options:
          - "У минулому місяці я був у Львові."
          - "У минулий місяць я був у Львові."
        explanation: "Період місяця потребує місцевого відмінка."
      - sentence: "Я говорив по телефоні з другом."
        error: "по телефоні"
        correction: "по телефону"
        options:
          - "Я говорив по телефону з другом."
          - "Я говорив по телефоні з другом."
        explanation: "Для каналу зв'язку потрібно: по телефону."
      - sentence: "У дитинство я жив у селі."
        error: "У дитинство"
        correction: "У дитинстві"
        options:
          - "У дитинстві я жив у селі."
          - "У дитинство я жив у селі."
        explanation: "Період життя вимагає місцевого: у дитинстві."
      - sentence: "Я працюю на політиці."
        error: "на політиці"
        correction: "у політиці"
        options:
          - "Я працюю у політиці."
          - "Я працюю на політиці."
        explanation: "Для сфери звична модель у політиці."
      - sentence: "Ми почули це про радіо."
        error: "про радіо"
        correction: "по радіо"
        options:
          - "Ми почули це по радіо."
          - "Ми почули це про радіо."
        explanation: "Канал зв'язку тут виражається через по."
