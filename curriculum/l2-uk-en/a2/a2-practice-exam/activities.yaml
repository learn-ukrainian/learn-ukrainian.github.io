inline:
  - id: act-1
    type: quiz
    title: Читання на розуміння
    instruction: Оберіть правильну відповідь за текстами А, Б і В.
    items:
      - question: "Коли працює бібліотека в суботу?"
        options:
          - "з 10:00 до 16:00"
          - "з 12:00 до 16:00"
          - "до п'ятниці"
        correct: 0
        explanation: "У тексті А сказано: з 10:00 до 16:00."
      - question: "Для кого зустріч у бібліотеці?"
        options:
          - "для студентів української мови"
          - "для працівників бібліотеки"
          - "для туристів у Львові"
        correct: 0
        explanation: "Це зустріч для студентів української мови."
      - question: "Що треба зробити до п'ятниці?"
        options:
          - "зареєструватися онлайн"
          - "купити квиток"
          - "прийти до бібліотеки"
        correct: 0
        explanation: "Реєстрація потрібна до п'ятниці."
      - question: "Що вже зробила авторка повідомлення в тексті Б?"
        options:
          - "купила квитки"
          - "відвідала книгарню"
          - "зустрілася з Оксаною"
        correct: 0
        explanation: "Вона пише: я вже купила квитки."
      - question: "Куди вони підуть після готелю?"
        options:
          - "на Площу Ринок"
          - "до Карпат"
          - "у бібліотеку"
        correct: 0
        explanation: "Після готелю вони підуть на Площу Ринок."
      - question: "Чому вони зустрінуться з Оксаною?"
        options:
          - "бо вона хоче показати кав'ярню"
          - "щоб купити квитки"
          - "хоча буде мало часу"
        correct: 0
        explanation: "Бо називає причину зустрічі."
      - question: "Де автор тексту В був минулого літа?"
        options:
          - "у Карпатах"
          - "у Києві"
          - "на Площі Ринок"
        correct: 0
        explanation: "Перше речення тексту В називає Карпати."
      - question: "Що автор робив щоранку?"
        options:
          - "ходив у магазин по хліб"
          - "писав повідомлення"
          - "зустрічався з Оксаною"
        correct: 0
        explanation: "Щоранку він ходив у магазин по хліб."
      - question: "Що вони побачили в горах?"
        options:
          - "найкрасивіший краєвид"
          - "нову бібліотеку"
          - "міську кав'ярню"
        correct: 0
        explanation: "Вони побачили найкрасивіший краєвид."
      - question: "Коли автор хоче повернутися?"
        options:
          - "восени"
          - "у суботу"
          - "до п'ятниці"
        correct: 0
        explanation: "Він хоче повернутися восени."
  - id: act-2
    type: fill-in
    title: Змішана граматика
    instruction: Оберіть правильну форму.
    items:
      - sentence: "У мене немає ___."
        answer: "квитка"
        options:
          - "квиток"
          - "квитка"
          - "квитком"
        explanation: "Немає чого? квитка."
      - sentence: "Я дякую ___."
        answer: "викладачці"
        options:
          - "викладачка"
          - "викладачці"
          - "викладачку"
        explanation: "Дякувати кому? викладачці."
      - sentence: "Учора я ___ текст цілу годину."
        answer: "читав"
        options:
          - "читав"
          - "прочитав"
          - "прочитаю"
        explanation: "Цілу годину - процес."
      - sentence: "Учора я ___ текст і відповів на питання."
        answer: "прочитав"
        options:
          - "читав"
          - "прочитав"
          - "читаю"
        explanation: "Є завершений результат."
      - sentence: "Завтра ми ___ до музею."
        answer: "підемо"
        options:
          - "ходили"
          - "підемо"
          - "ходимо"
        explanation: "Завтра + конкретний напрямок."
      - sentence: "Олена взяла ___ словник."
        answer: "свій"
        options:
          - "свій"
          - "мій"
          - "себе"
        explanation: "Словник належить підмету Олена."
      - sentence: "___ не прийшов на зустріч."
        answer: "Ніхто"
        options:
          - "Хтось"
          - "Ніхто"
          - "Щось"
        explanation: "Ніхто потребує заперечення не."
      - sentence: "Цей маршрут ___ за той."
        answer: "зручніший"
        options:
          - "зручний"
          - "зручніший"
          - "найзручний"
        explanation: "Модель: зручніший за той."
      - sentence: "Я прийшов раніше, ___ купити квитки."
        answer: "щоб"
        options:
          - "щоб"
          - "тому що"
          - "хоча"
        explanation: "Купити квитки - мета."
      - sentence: "___ буде час, ми зайдемо до книгарні."
        answer: "Якщо"
        options:
          - "Якщо"
          - "Бо"
          - "Хоча"
        explanation: "Це реальна умова."
  - id: act-3
    type: true-false
    title: Іспитова граматика
    instruction: Визначте, чи речення граматично правильне.
    items:
      - statement: "Я прийшов без квитка."
        correct: true
        explanation: "Без + родовий."
      - statement: "Вона допомагає брат."
        correct: false
        explanation: "Треба: допомагає братові."
      - statement: "Ми писали тест сорок хвилин."
        correct: true
        explanation: "Сорок хвилин описує процес."
      - statement: "Я написав тест сорок хвилин."
        correct: false
        explanation: "З тривалістю потрібен недоконаний вид: писав."
      - statement: "Якщо буде дощ, ми залишимося вдома."
        correct: true
        explanation: "Це правильна реальна умова."
      - statement: "Я прийшов, тому що допомогти."
        correct: false
        explanation: "Для мети треба щоб."
      - statement: "Олена читає свою книжку."
        correct: true
        explanation: "Своя книжка належить Олені."
      - statement: "Ніхто відповів на лист."
        correct: false
        explanation: "Треба: ніхто не відповів."
      - statement: "Це найкращий варіант."
        correct: true
        explanation: "Найкращий - нормативна найвища форма."
      - statement: "Ми говоримо з викладачкою."
        correct: true
        explanation: "З ким? з викладачкою."
  - id: act-4
    type: error-correction
    title: Виправте іспитові помилки
    instruction: Оберіть правильний варіант.
    items:
      - sentence: "Я зареєструвався до зустріч."
        error: "зустріч"
        correction: "Я зареєструвався до зустрічі."
        options:
          - "Я зареєструвався до зустрічі."
          - "Я зареєструвався до зустріч."
        explanation: "До вимагає родового відмінка."
      - sentence: "Ми зустрінемося з Оксана."
        error: "Оксана"
        correction: "Ми зустрінемося з Оксаною."
        options:
          - "Ми зустрінемося з Оксаною."
          - "Ми зустрінемося з Оксана."
        explanation: "З ким? з Оксаною."
      - sentence: "Вона купила квитки, щоб поїде до Львова."
        error: "поїде"
        correction: "Вона купила квитки, щоб поїхати до Львова."
        options:
          - "Вона купила квитки, щоб поїхати до Львова."
          - "Вона купила квитки, щоб поїде до Львова."
        explanation: "Після щоб для мети часто вживаємо інфінітив."
      - sentence: "Я ходжу на вокзал зараз."
        error: "ходжу"
        correction: "Я йду на вокзал зараз."
        options:
          - "Я йду на вокзал зараз."
          - "Я ходжу на вокзал зараз."
        explanation: "Зараз і конкретний напрямок: іду."
      - sentence: "Учора я буду писати лист."
        error: "буду писати"
        correction: "Учора я писав лист."
        options:
          - "Учора я писав лист."
          - "Учора я буду писати лист."
        explanation: "Учора вимагає минулого часу."
      - sentence: "Цей текст більш кращий."
        error: "більш кращий"
        correction: "Цей текст кращий."
        options:
          - "Цей текст кращий."
          - "Цей текст більш кращий."
        explanation: "Не поєднуємо більш із кращий."
      - sentence: "Ніхто прийшов на зустріч."
        error: "немає не"
        correction: "Ніхто не прийшов на зустріч."
        options:
          - "Ніхто не прийшов на зустріч."
          - "Ніхто прийшов на зустріч."
        explanation: "Заперечний займенник потребує не."
      - sentence: "Якби буде час, ми зайдемо до книгарні."
        error: "Якби"
        correction: "Якщо буде час, ми зайдемо до книгарні."
        options:
          - "Якщо буде час, ми зайдемо до книгарні."
          - "Якби буде час, ми зайдемо до книгарні."
        explanation: "Для реальної умови A2 потрібне якщо."
      - sentence: "Я хочу повернутися там восени."
        error: "там"
        correction: "Я хочу повернутися туди восени."
        options:
          - "Я хочу повернутися туди восени."
          - "Я хочу повернутися там восени."
        explanation: "Повернутися куди? туди."
      - sentence: "Ми відповіли на питання, бо отримати результат."
        error: "бо"
        correction: "Ми відповіли на питання, щоб отримати результат."
        options:
          - "Ми відповіли на питання, щоб отримати результат."
          - "Ми відповіли на питання, бо отримати результат."
        explanation: "Отримати результат - мета."
workbook:
  - type: match-up
    title: Розділ і стратегія
    instruction: З'єднайте частину іспиту зі стратегією.
    pairs:
      - left: "читання"
        right: "спочатку знайдіть головну думку, потім деталі"
      - left: "відмінки"
        right: "поставте питання від головного слова"
      - left: "вид дієслова"
        right: "вирішіть: процес, повторення чи результат"
      - left: "діалог"
        right: "оберіть репліку, яка відповідає ситуації"
      - left: "письмо"
        right: "напишіть план із початком, деталями і висновком"
      - left: "самооцінка"
        right: "запишіть три теми: сильна, середня, слабка"
  - type: essay-response
    title: Коротке письмо A2
    prompt: "Напишіть 80-100 слів українською на одну тему: улюблена пора року, плани на вихідні або традиція, яка вам подобається."
    min_words: 80
    model_answer: "Моя улюблена пора року - осінь, тому що тоді прохолодніше і спокійніше. У вересні я часто гуляю в парку після роботи. Минулої осені я багато фотографував листя і написав кілька коротких текстів українською. Якщо у вихідні буде гарна погода, я піду до лісу з друзями. Ми візьмемо чай і бутерброди, щоб відпочити після тижня. Осінь мені подобається більше, ніж літо, бо я краще працюю, коли не спекотно."
    peer_review_guidelines:
      - "Перевірте, чи є 80-100 слів."
      - "Позначте одну причину, одну умову або мету."
      - "Позначте один приклад минулого або майбутнього часу."
    rubric:
      task: "Текст відповідає одній із запропонованих тем."
      grammar: "Є контроль відмінків, часу і виду дієслова."
      coherence: "Текст має початок, деталі й короткий висновок."
  - type: fill-in
    title: План після результату
    instruction: Доповніть речення для самооцінки.
    items:
      - sentence: "Я впевнено використовую ___."
        answer: "родовий"
        options:
          - "родовий"
          - "родовим"
          - "родового"
        explanation: "Називаємо тему у знахідному після використовую."
      - sentence: "Я часто плутаю ___ і результат."
        answer: "процес"
        options:
          - "процес"
          - "процесу"
          - "процесом"
        explanation: "Плутаю що? процес і результат."
      - sentence: "Перед фінальним завданням я повторю ___."
        answer: "займенники"
        options:
          - "займенники"
          - "займенників"
          - "займенниками"
        explanation: "Повторю що? займенники."
