inline:
  - id: act-1
    type: quiz
    title: День народження
    instruction: Оберіть відмінок виділеної фрази.
    items:
      - question: "У фразі 'Оксано, у тебе є хвилина?' слово Оксано - це..."
        options:
          - кличний
          - називний
          - родовий
        correct: 0
        explanation: Оксано - форма звертання.
      - question: "У фразі 'немає торта' слово торта - це..."
        options:
          - знахідний
          - родовий
          - орудний
        correct: 1
        explanation: Немає чого? - торта.
      - question: "У фразі 'напиши друзям' слово друзям - це..."
        options:
          - давальний
          - родовий
          - місцевий
        correct: 0
        explanation: Написати кому? - друзям.
      - question: "У фразі 'прикрасимо квітами' слово квітами - це..."
        options:
          - орудний
          - давальний
          - називний
        correct: 0
        explanation: Прикрасимо чим? - квітами.
  - id: act-2
    type: fill-in
    title: У лікаря
    instruction: Оберіть правильну форму.
    items:
      - sentence: "У мене немає ___."
        answer: температури
        options:
          - температура
          - температуру
          - температури
        explanation: Немає чого? - температури.
      - sentence: "Лікар дає ___ рецепт."
        answer: пацієнтові
        options:
          - пацієнт
          - пацієнта
          - пацієнтові
        explanation: Дає кому? - пацієнтові.
      - sentence: "Потрібно пити більше ___."
        answer: води
        options:
          - вода
          - воду
          - води
        explanation: Більше чого? - води.
      - sentence: "Прийдіть на огляд у ___."
        answer: п'ятницю
        options:
          - п'ятниця
          - п'ятницю
          - п'ятниці
        explanation: День тижня після у має знахідний.
  - id: act-3
    type: match-up
    title: Подорож
    instruction: З'єднайте фразу з причиною форми.
    pairs:
      - left: до Львова
        right: до чого? родовий
      - left: потягом
        right: чим? орудний
      - left: друзям
        right: кому? давальний
      - left: у Львові
        right: де? місцевий
      - left: про квитки
        right: про що? знахідний
  - id: act-4
    type: group-sort
    title: Сім відмінків
    instruction: Розсортуйте форми за відмінками.
    groups:
      - label: Родовий
        items:
          - немає торта
          - до Львова
          - кілька місць
      - label: Давальний
        items:
          - друзям
          - Марії
          - пацієнтові
      - label: Орудний
        items:
          - квітами
          - потягом
          - з друзями
      - label: Місцевий
        items:
          - у Львові
          - у кафе
          - по центру
workbook:
  - type: fill-in
    title: Усі відмінки в реченнях
    instruction: Оберіть правильну форму.
    items:
      - sentence: "Ми запросили ___."
        answer: гостей
        options:
          - гості
          - гостей
          - гостям
        explanation: Запросили кого? - гостей.
      - sentence: "У нас немає ___."
        answer: квитків
        options:
          - квитки
          - квитків
          - квитками
        explanation: Немає чого? - квитків.
      - sentence: "Я телефоную ___."
        answer: лікарю
        options:
          - лікар
          - лікаря
          - лікарю
        explanation: Телефонувати кому? - лікарю.
      - sentence: "Ми милуємося ___."
        answer: Карпатами
        options:
          - Карпати
          - Карпат
          - Карпатами
        explanation: Милуватися чим? - Карпатами.
      - sentence: "Вони гуляють по ___."
        answer: центру
        options:
          - центр
          - центру
          - центром
        explanation: По чому? - по центру.
  - type: error-correction
    title: Виправте помилки
    instruction: Оберіть правильне речення.
    items:
      - sentence: "Я допомагаю сестру."
        error: сестру
        correction: "Я допомагаю сестрі."
        options:
          - "Я допомагаю сестрі."
          - "Я допомагаю сестру."
        explanation: Допомагати кому? - сестрі.
      - sentence: "Ми їдемо до Львів."
        error: Львів
        correction: "Ми їдемо до Львова."
        options:
          - "Ми їдемо до Львова."
          - "Ми їдемо до Львів."
        explanation: До чого? - до Львова.
      - sentence: "Подарунок для Марія."
        error: Марія
        correction: "Подарунок для Марії."
        options:
          - "Подарунок для Марії."
          - "Подарунок для Марія."
        explanation: Для кого? - для Марії.
      - sentence: "Я думаю про подорожі завтра."
        error: подорожі
        correction: "Я думаю про подорож завтра."
        options:
          - "Я думаю про подорож завтра."
          - "Я думаю про подорожі завтра."
        explanation: Про що? - про подорож. Фраза завтра уточнює час.
  - type: true-false
    title: Чи правильно?
    instruction: Визначте, чи правильно вжито форму.
    items:
      - statement: "Тарасе, поїдьмо до Львова."
        correct: true
        explanation: Тарасе - кличний; до Львова - родовий.
      - statement: "Ми зустрінемося у Львів."
        correct: false
        explanation: Де? - у Львові.
      - statement: "Лікар дав пацієнтові рецепт."
        correct: true
        explanation: Дав кому? - пацієнтові; дав що? - рецепт.
      - statement: "Вони прикрасили стіл квітами."
        correct: true
        explanation: Чим прикрасили? - квітами.
