inline:
  - id: act-1
    type: fill-in
    title: Форми з діалогу про день народження
    instruction: Оберіть правильну форму за дієсловом або прийменником.
    items:
      - sentence: "Ми хочемо запросити ___."
        answer: друзів
        options:
          - друзі
          - друзів
          - друзям
        explanation: Запросити кого? - друзів.
      - sentence: "У нас ще немає ___."
        answer: торта
        options:
          - торт
          - торта
          - тортом
        explanation: Немає чого? - торта.
      - sentence: "Я вже написав ___."
        answer: друзям
        options:
          - друзі
          - друзів
          - друзям
        explanation: Написати кому? - друзям.
      - sentence: "Подарунок ___ уже є."
        answer: Марії
        options:
          - Марія
          - Марію
          - Марії
        explanation: Подарунок кому? - Марії.
      - sentence: "Прикрасимо стіл ___ і кульками."
        answer: квітами
        options:
          - квіти
          - квітів
          - квітами
        explanation: Прикрасимо чим? - квітами.
      - sentence: "Зустрінемося ___ о шостій."
        answer: в кафе
        options:
          - в кафе
          - до кафе
          - з кафе
        explanation: Де? - в кафе. Слово кафе не змінюється.
      - sentence: "Домовимося ___ наперед."
        answer: з адміністратором
        options:
          - адміністратор
          - адміністратора
          - з адміністратором
        explanation: Домовитися з ким? - з адміністратором.
      - sentence: "Скажемо ___, що платимо ми."
        answer: офіціантові
        options:
          - офіціант
          - офіціанта
          - офіціантові
        explanation: Сказати кому? - офіціантові.
      - sentence: "Без ___ не можна замовити стіл."
        answer: списку гостей
        options:
          - список гостей
          - списку гостей
          - списком гостей
        explanation: Без чого? - без списку гостей.
      - sentence: "На листівці напишемо: '___, з днем народження!'"
        answer: Маріє
        options:
          - Марія
          - Марію
          - Маріє
        explanation: У звертанні потрібен кличний - Маріє.
  - id: act-2
    type: quiz
    title: Визначте відмінок і тригер
    instruction: Оберіть відмінок виділеної фрази.
    items:
      - question: "У фразі 'Лікарю, добрий день' слово 'Лікарю' - це..."
        options:
          - кличний
          - давальний
          - місцевий
        correct: 0
        explanation: Це звертання, тому кличний.
      - question: "У фразі 'температури немає' слово 'температури' - це..."
        options:
          - називний
          - родовий
          - знахідний
        correct: 1
        explanation: Немає чого? - температури.
      - question: "У фразі 'писати друзям' слово 'друзям' - це..."
        options:
          - давальний
          - родовий
          - місцевий
        correct: 0
        explanation: Писати кому? - друзям.
      - question: "У фразі 'приймав таблетки' слово 'таблетки' - це..."
        options:
          - знахідний
          - родовий
          - орудний
        correct: 0
        explanation: Приймав що? - таблетки.
      - question: "У фразі 'з медом' слово 'медом' - це..."
        options:
          - орудний
          - давальний
          - місцевий
        correct: 0
        explanation: З чим? - з медом.
      - question: "У фразі 'на огляд' слово 'огляд' - це..."
        options:
          - знахідний
          - місцевий
          - родовий
        correct: 0
        explanation: Прийти на що? - на огляд.
      - question: "У фразі 'у п'ятницю' слово 'п'ятницю' - це..."
        options:
          - знахідний
          - місцевий
          - давальний
        correct: 0
        explanation: Для дня тижня після у/в часто вживаємо знахідний.
      - question: "У фразі 'в аптеці' слово 'аптеці' - це..."
        options:
          - місцевий
          - знахідний
          - орудний
        correct: 0
        explanation: Де? - в аптеці.
      - question: "У фразі 'здоров'я важливіше за зустріч' слово 'зустріч' - це..."
        options:
          - знахідний
          - родовий
          - кличний
        correct: 0
        explanation: Важливіше за що? - за зустріч.
      - question: "У фразі 'організму потрібен спокій' слово 'організму' - це..."
        options:
          - давальний
          - родовий
          - місцевий
        correct: 0
        explanation: Кому потрібен спокій? - організму.
  - id: act-3
    type: match-up
    title: Половини речень про подорож
    instruction: З'єднайте початок із правильною другою половиною.
    pairs:
      - left: Поїдьмо
        right: до Львова на вихідні.
      - left: Спочатку їдемо
        right: потягом до Львова.
      - left: Потім автобусом
        right: у гори.
      - left: Я напишу
        right: друзям сьогодні ввечері.
      - left: Попроси їх порадити
        right: кілька визначних місць.
      - left: Без квитків
        right: подорож може стати нервовою.
      - left: У Львові можна гуляти
        right: площею Ринок.
      - left: У неділю будемо милуватися
        right: Карпатами.
      - left: Я напишу тобі
        right: список варіантів.
      - left: Не треба брати
        right: багато речей.
  - id: act-4
    type: error-correction
    title: Виправте відмінок
    instruction: Оберіть правильне речення і прочитайте коротке пояснення.
    items:
      - sentence: "Ми запросили друзі."
        error: друзі
        correction: "Ми запросили друзів."
        options:
          - "Ми запросили друзів."
          - "Ми запросили друзі."
        explanation: Запросили кого? - друзів.
      - sentence: "У нас немає торт."
        error: торт
        correction: "У нас немає торта."
        options:
          - "У нас немає торта."
          - "У нас немає торт."
        explanation: Немає чого? - торта.
      - sentence: "Я написав Олену."
        error: Олену
        correction: "Я написав Олені."
        options:
          - "Я написав Олені."
          - "Я написав Олену."
        explanation: Написати кому? - Олені.
      - sentence: "Лікар дав пацієнта рецепт."
        error: пацієнта
        correction: "Лікар дав пацієнтові рецепт."
        options:
          - "Лікар дав пацієнтові рецепт."
          - "Лікар дав пацієнта рецепт."
        explanation: Дав кому? - пацієнтові.
      - sentence: "Ми їдемо до Львів."
        error: Львів
        correction: "Ми їдемо до Львова."
        options:
          - "Ми їдемо до Львова."
          - "Ми їдемо до Львів."
        explanation: До чого? - до Львова.
      - sentence: "Ми зараз у Львів."
        error: Львів
        correction: "Ми зараз у Львові."
        options:
          - "Ми зараз у Львові."
          - "Ми зараз у Львів."
        explanation: Де? - у Львові.
      - sentence: "Вони милуються Карпати."
        error: Карпати
        correction: "Вони милуються Карпатами."
        options:
          - "Вони милуються Карпатами."
          - "Вони милуються Карпати."
        explanation: Милуватися чим? - Карпатами.
      - sentence: "Тарас, слухай."
        error: Тарас
        correction: "Тарасе, слухай."
        options:
          - "Тарасе, слухай."
          - "Тарас, слухай."
        explanation: У звертанні потрібен кличний - Тарасе.
      - sentence: "Ми гуляли старі вулиці."
        error: старі вулиці
        correction: "Ми гуляли старими вулицями."
        options:
          - "Ми гуляли старими вулицями."
          - "Ми гуляли старі вулиці."
        explanation: Гуляли чим/яким шляхом? - старими вулицями.
      - sentence: "Без квитки подорож буде важкою."
        error: квитки
        correction: "Без квитків подорож буде важкою."
        options:
          - "Без квитків подорож буде важкою."
          - "Без квитки подорож буде важкою."
        explanation: Без чого? - без квитків.
