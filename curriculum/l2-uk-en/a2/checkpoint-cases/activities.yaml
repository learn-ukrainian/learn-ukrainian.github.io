inline:
  - id: act-1
    type: quiz
    title: Весільна карта
    instruction: Оберіть відмінок виділеної фрази.
    items:
      - question: "У фразі 'Олено, скільки буде гостей?' слово Олено - це..."
        options:
          - кличний
          - родовий
          - називний
        correct: 0
        explanation: Олено - форма звертання.
      - question: "У фразі 'двадцять гостей' слово гостей - це..."
        options:
          - називний множини
          - родовий множини
          - орудний множини
        correct: 1
        explanation: Після двадцять потрібно кого? - гостей.
      - question: "У фразі 'написати гостям' слово гостям - це..."
        options:
          - давальний множини
          - знахідний множини
          - місцевий множини
        correct: 0
        explanation: Написати кому? - гостям.
      - question: "У фразі 'з дітьми' слово дітьми - це..."
        options:
          - родовий множини
          - орудний множини
          - називний множини
        correct: 1
        explanation: З ким? - з дітьми.
      - question: "У фразі 'на столах будуть свічки' слово столах - це..."
        options:
          - місцевий множини
          - знахідний множини
          - давальний множини
        correct: 0
        explanation: Де? - на столах.
      - question: "У фразі 'Гості, заходьте!' слово Гості - це..."
        options:
          - кличний множини
          - родовий множини
          - орудний множини
        correct: 0
        explanation: Це звертання до групи.
      - question: "У фразі 'купили свічки' слово свічки - це..."
        options:
          - знахідний множини
          - місцевий множини
          - давальний множини
        correct: 0
        explanation: Купили що? - свічки.
      - question: "У фразі 'допомагаю дітям' слово дітям - це..."
        options:
          - давальний множини
          - родовий множини
          - орудний множини
        correct: 0
        explanation: Допомагаю кому? - дітям.
      - question: "У фразі 'при гостях' слово гостях - це..."
        options:
          - місцевий множини
          - родовий множини
          - називний множини
        correct: 0
        explanation: При кому? - при гостях.
      - question: "У фразі 'немає свічок' слово свічок - це..."
        options:
          - родовий множини
          - знахідний множини
          - орудний множини
        correct: 0
        explanation: Немає чого? - свічок.
  - id: act-2
    type: fill-in
    title: Множина
    instruction: Оберіть правильну форму родового множини.
    items:
      - sentence: "Багато ___."
        answer: гостей
        options:
          - гості
          - гостей
          - гостям
        explanation: Багато кого? - гостей.
      - sentence: "Кілька ___."
        answer: кімнат
        options:
          - кімнати
          - кімнат
          - кімнатами
        explanation: Кілька чого? - кімнат.
      - sentence: "П'ять ___."
        answer: свічок
        options:
          - свічки
          - свічок
          - свічками
        explanation: П'ять чого? - свічок.
      - sentence: "Немає ___."
        answer: дітей
        options:
          - діти
          - дітей
          - дітьми
        explanation: Немає кого? - дітей.
      - sentence: "Список ___."
        answer: родичів
        options:
          - родичі
          - родичів
          - родичам
        explanation: Список кого? - родичів.
      - sentence: "Немає двох ___."
        answer: людей
        options:
          - люди
          - людей
          - людьми
        explanation: Немає кого? - людей.
      - sentence: "Багато ___."
        answer: міст
        options:
          - міста
          - міст
          - містами
        explanation: Багато чого? - міст.
      - sentence: "Кілька ___."
        answer: подарунків
        options:
          - подарунки
          - подарунків
          - подарунками
        explanation: Кілька чого? - подарунків.
      - sentence: "Скільки ___ буде?"
        answer: столів
        options:
          - столи
          - столів
          - столами
        explanation: Скільки чого? - столів.
      - sentence: "У списку немає ___."
        answer: батьків
        options:
          - батьки
          - батьків
          - батьками
        explanation: Немає кого? - батьків.
  - id: act-3
    type: group-sort
    title: Сигнал і відмінок
    instruction: Розсортуйте фрази за відмінком.
    groups:
      - label: Називний
        items:
          - гості прийшли
          - свічки стоять
          - діти граються
      - label: Родовий
        items:
          - немає квітів
          - для молодят
          - список родичів
      - label: Давальний
        items:
          - пишу гостям
          - допомагаю тобі
          - подарунок нареченій
      - label: Знахідний
        items:
          - замовити квіти
          - прикрасити зал
          - запросити друзів
      - label: Орудний
        items:
          - з батьками
          - з дітьми
          - квітами
      - label: Місцевий
        items:
          - на столах
          - у кімнатах
          - при гостях
      - label: Кличний
        items:
          - Гості, заходьте!
          - Друзі, допоможіть!
  - id: act-4
    type: error-correction
    title: Знайдіть помилку
    instruction: Оберіть правильне речення.
    items:
      - sentence: "Ми написали гості."
        error: гості
        correction: "Ми написали гостям."
        options:
          - "Ми написали гостям."
          - "Ми написали гості."
        explanation: Написати кому? - гостям.
      - sentence: "Немає квіти."
        error: квіти
        correction: "Немає квітів."
        options:
          - "Немає квітів."
          - "Немає квіти."
        explanation: Немає чого? - квітів.
      - sentence: "Фото з батьки."
        error: батьки
        correction: "Фото з батьками."
        options:
          - "Фото з батьками."
          - "Фото з батьки."
        explanation: З ким? - з батьками.
      - sentence: "На весілля буде фотограф."
        error: весілля
        correction: "На весіллі буде фотограф."
        options:
          - "На весіллі буде фотограф."
          - "На весілля буде фотограф."
        explanation: Де? - на весіллі.
      - sentence: "На столи будуть свічки."
        error: столи
        correction: "На столах будуть свічки."
        options:
          - "На столах будуть свічки."
          - "На столи будуть свічки."
        explanation: Де? - на столах.
      - sentence: "Я допомагаю діти."
        error: діти
        correction: "Я допомагаю дітям."
        options:
          - "Я допомагаю дітям."
          - "Я допомагаю діти."
        explanation: Допомагати кому? - дітям.
      - sentence: "Ми запросили гості."
        error: гості
        correction: "Ми запросили гостей."
        options:
          - "Ми запросили гостей."
          - "Ми запросили гості."
        explanation: Запросили кого? - гостей.
      - sentence: "Друзі допоможіть нам."
        error: "Друзі допоможіть"
        correction: "Друзі, допоможіть нам."
        options:
          - "Друзі, допоможіть нам."
          - "Друзі допоможіть нам."
        explanation: Звертання відокремлюємо комою.
      - sentence: "Ми сидимо у кімнати."
        error: кімнати
        correction: "Ми сидимо у кімнатах."
        options:
          - "Ми сидимо у кімнатах."
          - "Ми сидимо у кімнати."
        explanation: Де? - у кімнатах.
      - sentence: "Фото з гості вже готові."
        error: гості
        correction: "Фото з гостями вже готові."
        options:
          - "Фото з гостями вже готові."
          - "Фото з гості вже готові."
        explanation: З ким? - з гостями.
workbook:
  - type: fill-in
    title: Усі відмінки
    instruction: Оберіть правильну форму.
    items:
      - sentence: "___, допоможи мені, будь ласка."
        answer: Олено
        options:
          - Олена
          - Олену
          - Олено
        explanation: Звертання має кличний відмінок.
      - sentence: "Ми запросили ___."
        answer: друзів
        options:
          - друзі
          - друзів
          - друзям
        explanation: Запросили кого? - друзів.
      - sentence: "Я дякую ___."
        answer: батькам
        options:
          - батьки
          - батьків
          - батькам
        explanation: Дякувати кому? - батькам.
      - sentence: "У залі багато ___."
        answer: квітів
        options:
          - квіти
          - квітів
          - квітами
        explanation: Багато чого? - квітів.
      - sentence: "Ми милуємося ___."
        answer: свічками
        options:
          - свічки
          - свічок
          - свічками
        explanation: Милуватися чим? - свічками.
      - sentence: "На ___ стоять тарілки."
        answer: столах
        options:
          - столи
          - столів
          - столах
        explanation: Де? - на столах.
      - sentence: "___, заходьте до зали."
        answer: Гості
        options:
          - Гості
          - Гостей
          - Гостям
        explanation: Це звертання до групи.
      - sentence: "Ми купили ___."
        answer: подарунки
        options:
          - подарунки
          - подарунків
          - подарунками
        explanation: Купили що? - подарунки.
      - sentence: "Я допомагаю ___."
        answer: дітям
        options:
          - діти
          - дітей
          - дітям
        explanation: Допомагаю кому? - дітям.
      - sentence: "У списку немає ___."
        answer: людей
        options:
          - люди
          - людей
          - людьми
        explanation: Немає кого? - людей.
  - type: match-up
    title: Питання
    instruction: З'єднайте фразу з питанням.
    pairs:
      - left: для молодят
        right: для кого?
      - left: гостям
        right: кому?
      - left: прикрасити зал
        right: що?
      - left: з дітьми
        right: з ким?
      - left: на весіллі
        right: де?
      - left: на столах
        right: де?
      - left: Гості, заходьте!
        right: звертання
      - left: купити свічки
        right: що?
      - left: допомагати дітям
        right: кому?
      - left: з гостями
        right: з ким?
  - type: true-false
    title: Самоперевірка
    instruction: Визначте, чи правильно вжито форму.
    items:
      - statement: "Ми маємо список родичів."
        correct: true
        explanation: Список кого? - родичів.
      - statement: "Я телефоную друзі."
        correct: false
        explanation: Телефонувати кому? - друзям.
      - statement: "Вони прикрасили зал квітами."
        correct: true
        explanation: Прикрасили чим? - квітами.
      - statement: "Олена, скільки буде гостей?"
        correct: false
        explanation: У звертанні краще Олено.
      - statement: "На весіллі буде фотограф."
        correct: true
        explanation: Де? - на весіллі.
      - statement: "На столах будуть свічки."
        correct: true
        explanation: Де? - на столах.
      - statement: "Ми запросили гості."
        correct: false
        explanation: Запросили кого? - гостей.
      - statement: "Друзі, допоможіть нам."
        correct: true
        explanation: Друзі - кличний множини.
      - statement: "Я допомагаю дітям."
        correct: true
        explanation: Допомагати кому? - дітям.
      - statement: "Фото з гості вже готові."
        correct: false
        explanation: З ким? - з гостями.
