inline:
  - id: act-1
    type: match-up
    title: Формальна формула
    instruction: З'єднайте називну форму з ввічливим звертанням.
    pairs:
      - left: лікар
        right: пане лікарю
      - left: директор
        right: пане директоре
      - left: вчителька
        right: пані вчителько
      - left: лікарка
        right: пані лікарко
  - id: act-2
    type: quiz
    title: Оберіть кличний
    instruction: Оберіть форму, яка природно звучить у звертанні.
    items:
      - question: "Пане ___, у мене питання."
        options:
          - лікар
          - лікарю
          - лікаря
        correct: 1
        explanation: У звертанні потрібна форма лікарю.
      - question: "Пані ___, можна повторити?"
        options:
          - вчителька
          - вчительку
          - вчителько
        correct: 2
        explanation: Кличний відмінок від вчителька - вчителько.
      - question: "___, ходімо на каву."
        options:
          - Друже
          - Друг
          - Друга
        correct: 0
        explanation: Друг у звертанні має форму друже.
      - question: "___, це ваш кабінет?"
        options:
          - Пане директор
          - Пане директоре
          - Пана директора
        correct: 1
        explanation: Формальна модель - пане директоре.
  - id: act-3
    type: group-sort
    title: Регістр звертання
    instruction: Розсортуйте звертання за ситуацією.
    groups:
      - label: Формально
        items:
          - пане лікарю
          - пані директорко
          - пане Ковальчуку
      - label: Дружньо
        items:
          - Андрію
          - Оксано
          - друже
      - label: Тепло
        items:
          - друже мій
          - люба моя
          - сонечко
  - id: act-4
    type: error-correction
    title: Виправте звертання
    instruction: Оберіть правильний варіант.
    items:
      - sentence: "Пан лікар, добрий день."
        error: Пан лікар
        correction: "Пане лікарю, добрий день."
        options:
          - "Пане лікарю, добрий день."
          - "Пан лікар, добрий день."
        explanation: Формальна форма - пане лікарю.
      - sentence: "Пані вчителька, я не розумію."
        error: Пані вчителька
        correction: "Пані вчителько, я не розумію."
        options:
          - "Пані вчителько, я не розумію."
          - "Пані вчителька, я не розумію."
        explanation: Після пані професія має форму кличного відмінка.
      - sentence: "Друг мій, слухай."
        error: Друг мій
        correction: "Друже мій, слухай."
        options:
          - "Друже мій, слухай."
          - "Друг мій, слухай."
        explanation: У звертанні друг змінюється на друже.
workbook:
  - type: fill-in
    title: Доповніть звертання
    instruction: Впишіть правильну форму кличного відмінка.
    items:
      - sentence: "Пане ___, мені потрібна довідка."
        answer: лікарю
        options:
          - лікар
          - лікарю
          - лікарем
        explanation: Пане лікарю - ввічливе звертання до лікаря.
      - sentence: "Пані ___, я зробив завдання."
        answer: вчителько
        options:
          - вчителька
          - вчителькою
          - вчителько
        explanation: Вчителька у кличному відмінку - вчителько.
      - sentence: "___, ти маєш хвилину?"
        answer: колего
        options:
          - колега
          - колего
          - колегою
        explanation: Колего - форма звертання.
      - sentence: "___ мій, я радий тебе бачити."
        answer: друже
        options:
          - друг
          - друже
          - другом
        explanation: Тепла форма - друже мій.
  - type: true-false
    title: Чи доречний регістр?
    instruction: Позначте, чи звертання добре підходить до ситуації.
    items:
      - statement: "У лікарні: Пане лікарю, добрий день."
        correct: true
        explanation: Це ввічлива формальна форма.
      - statement: "До директора в офіційному листі: друже мій."
        correct: false
        explanation: Для офіційного листа краще пане директоре.
      - statement: "До близької подруги: подруго моя."
        correct: true
        explanation: Це тепле дружнє звертання.
      - statement: "У класі до вчительки: пані вчителько."
        correct: true
        explanation: Це природне ввічливе звертання.
