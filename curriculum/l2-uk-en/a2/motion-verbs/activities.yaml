inline:
  - id: act-1
    type: group-sort
    title: Тип руху
    instruction: Розподіліть форми за значенням.
    groups:
      - label: "один напрямок зараз"
        items:
          - "іду до виходу"
          - "їде в місто"
          - "летить до Варшави"
          - "ідемо через парк"
          - "їдеш на роботу"
          - "лечу до Києва"
          - "йдуть до каси"
          - "їдемо потягом"
      - label: "звичка або туди-й-назад"
        items:
          - "ходжу щотижня"
          - "їздимо щоліта"
          - "часто літає"
          - "ходять до школи"
          - "їздиш туди щомісяця"
          - "літаємо на конференції"
          - "ходить у спортзал"
          - "їздять до родини"
  - id: act-2
    type: fill-in
    title: Оберіть дієслово руху
    instruction: Доповніть речення природною формою.
    items:
      - sentence: "Я зараз ___ до аптеки."
        answer: "іду"
        options:
          - "іду"
          - "ходжу"
        explanation: "Зараз в один бік: іду."
      - sentence: "Щосуботи ми ___ до басейну."
        answer: "ходимо"
        options:
          - "ідемо"
          - "ходимо"
        explanation: "Щосуботи показує регулярність."
      - sentence: "Сьогодні вони ___ до Львова потягом."
        answer: "їдуть"
        options:
          - "їдуть"
          - "їздять"
        explanation: "Сьогодні це одна конкретна поїздка."
      - sentence: "Ми часто ___ до Львова влітку."
        answer: "їздимо"
        options:
          - "їдемо"
          - "їздимо"
        explanation: "Часто показує звичку."
      - sentence: "Літак уже ___ до Києва."
        answer: "летить"
        options:
          - "літає"
          - "летить"
        explanation: "Один рейс у процесі."
      - sentence: "Вона ___ до Варшави кілька разів на рік."
        answer: "літає"
        options:
          - "летить"
          - "літає"
        explanation: "Кілька разів на рік = регулярність."
      - sentence: "Сьогодні після роботи я ___ до аптеки."
        answer: "піду"
        options:
          - "піду"
          - "ходжу"
        explanation: "Це один майбутній вихід."
      - sentence: "У суботу ми ___ до Харкова."
        answer: "поїдемо"
        options:
          - "поїдемо"
          - "їздимо"
        explanation: "Це конкретна майбутня поїздка."
      - sentence: "Завтра мій брат ___ до Варшави."
        answer: "полетить"
        options:
          - "літає"
          - "полетить"
        explanation: "Завтра тут один рейс."
      - sentence: "Улітку діти ___ до бабусі щотижня."
        answer: "їздитимуть"
        options:
          - "поїдуть"
          - "їздитимуть"
        explanation: "Щотижня показує повторення в майбутньому."
  - id: act-3
    type: quiz
    title: Три моделі
    instruction: Виберіть правильну форму.
    items:
      - question: "Я ___ правду."
        options:
          - "кажу"
          - "казу"
          - "казаю"
        correct: 0
        explanation: "Казати -> кажу."
      - question: "Вони ___ чай."
        options:
          - "пють"
          - "п'ють"
          - "п'ютьє"
        correct: 1
        explanation: "Пити має апостроф: п'ють."
      - question: "Ми ___ за кращий сервіс."
        options:
          - "боротимося"
          - "борюмося"
          - "боремося"
        correct: 2
        explanation: "Боротися -> боремося."
      - question: "Ти ___ повідомлення?"
        options:
          - "писеш"
          - "пишеш"
          - "писаєш"
        correct: 1
        explanation: "Писати має чергування с -> ш."
      - question: "Вона ___ українською дуже чітко."
        options:
          - "каже"
          - "казе"
          - "казає"
        correct: 0
        explanation: "Казати -> каже."
      - question: "Я ___ воду після кави."
        options:
          - "пію"
          - "п'ю"
          - "пю"
        correct: 1
        explanation: "Пити -> п'ю."
      - question: "Він ___ з бюрократією."
        options:
          - "боретьсяся"
          - "бороться"
          - "бореться"
        correct: 2
        explanation: "Боротися -> бореться."
      - question: "Ми ___ короткий лист."
        options:
          - "пишемо"
          - "писемо"
          - "писаємо"
        correct: 0
        explanation: "Писати -> пишемо."
  - id: act-4
    type: match-up
    title: Рух і модель напрямку
    instruction: З'єднайте фразу з правильною моделлю прийменника й відмінка.
    pairs:
      - left: "іду до школи"
        right: "до + родовий"
      - left: "їду на роботу"
        right: "на + знахідний"
      - left: "лечу в Україну"
        right: "в/у + знахідний"
      - left: "іду з магазину"
        right: "з + родовий"
      - left: "їду від друга"
        right: "від + родовий"
      - left: "йду через парк"
        right: "через + знахідний"
      - left: "йду по вулиці"
        right: "по + місцевий"
      - left: "їду потягом"
        right: "орудний без прийменника"
workbook:
  - type: unjumble
    title: Складіть речення про рух
    instruction: Поставте слова в природний порядок.
    items:
      - words:
          - "Я"
          - "іду"
          - "до"
          - "зупинки"
        answer: "Я іду до зупинки."
      - words:
          - "Ми"
          - "їдемо"
          - "на"
          - "роботу"
        answer: "Ми їдемо на роботу."
      - words:
          - "Вона"
          - "летить"
          - "до"
          - "Києва"
        answer: "Вона летить до Києва."
      - words:
          - "Вони"
          - "йдуть"
          - "через"
          - "парк"
        answer: "Вони йдуть через парк."
      - words:
          - "Я"
          - "йду"
          - "з"
          - "магазину"
        answer: "Я йду з магазину."
      - words:
          - "Ми"
          - "їдемо"
          - "до"
          - "Львова"
          - "потягом"
        answer: "Ми їдемо до Львова потягом."
      - words:
          - "Він"
          - "ходить"
          - "на"
          - "тренування"
        answer: "Він ходить на тренування."
      - words:
          - "Вони"
          - "щороку"
          - "літають"
          - "до"
          - "Варшави"
        answer: "Вони щороку літають до Варшави."
  - type: error-correction
    title: Виправте рух
    instruction: Оберіть кращий варіант.
    items:
      - sentence: "Я ходжу до аптеки зараз."
        error: "ходжу"
        correction: "Я іду до аптеки зараз."
        options:
          - "Я іду до аптеки зараз."
          - "Я ходжу до аптеки зараз."
        explanation: "Зараз в один напрямок: іду."
      - sentence: "Ми ідемо до басейну щонеділі."
        error: "ідемо"
        correction: "Ми ходимо до басейну щонеділі."
        options:
          - "Ми ходимо до басейну щонеділі."
          - "Ми ідемо до басейну щонеділі."
        explanation: "Щонеділі показує регулярний маршрут."
      - sentence: "Вона пє воду."
        error: "пє"
        correction: "Вона п'є воду."
        options:
          - "Вона п'є воду."
          - "Вона пє воду."
        explanation: "Потрібен апостроф: п'є."
      - sentence: "Ми їдемо з робота."
        error: "з робота"
        correction: "Ми їдемо з роботи."
        options:
          - "Ми їдемо з роботи."
          - "Ми їдемо з робота."
        explanation: "З + родовий: з роботи."
      - sentence: "Я їздю метро щодня."
        error: "їздю"
        correction: "Я їжджу метро щодня."
        options:
          - "Я їжджу метро щодня."
          - "Я їздю метро щодня."
        explanation: "Форма я від їздити: їжджу."
      - sentence: "Він боретьсяся з чергою."
        error: "боретьсяся"
        correction: "Він бореться з чергою."
        options:
          - "Він бореться з чергою."
          - "Він боретьсяся з чергою."
        explanation: "У формі бореться вже є -ся."
      - sentence: "Вона летить до Польщі щороку."
        error: "летить"
        correction: "Вона літає до Польщі щороку."
        options:
          - "Вона літає до Польщі щороку."
          - "Вона летить до Польщі щороку."
        explanation: "Щороку показує повторення."
      - sentence: "Я йду по парк."
        error: "по парк"
        correction: "Я йду через парк."
        options:
          - "Я йду через парк."
          - "Я йду по парк."
        explanation: "Шлях у напрямку: через + знахідний."
  - type: true-false
    title: Перевірка руху
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Іти часто означає рух зараз в один бік."
        answer: true
        explanation: "Так: я іду до виходу."
      - statement: "Їздити часто означає регулярні поїздки."
        answer: true
        explanation: "Так: ми їздимо до Львова щоліта."
      - statement: "П'ю можна писати без апострофа."
        answer: false
        explanation: "Правильно: п'ю, п'єш, п'ють."
      - statement: "До школи має модель до + родовий."
        answer: true
        explanation: "Так: до школи, до міста, до друга."
      - statement: "Піти, поїхати, полетіти називають один виїзд або вирушення."
        answer: true
        explanation: "Це базові доконані форми руху з по-."
      - statement: "Ходити завжди означає швидший рух, ніж іти."
        answer: false
        explanation: "Це не про швидкість, а про тип руху."
      - statement: "З магазину має модель з + родовий."
        answer: true
        explanation: "Так: з магазину, з роботи, з вокзалу."
      - statement: "Боретьсяся - стандартна форма від боротися."
        answer: false
        explanation: "Правильно: він бореться."
  - type: fill-in
    title: Мій маршрут
    instruction: Оберіть форму за контекстом.
    items:
      - sentence: "Зазвичай я ___ на роботу метро."
        answer: "їжджу"
        options:
          - "їду"
          - "їжджу"
        explanation: "Зазвичай = регулярність."
      - sentence: "Сьогодні я ___ на роботу автобусом."
        answer: "їду"
        options:
          - "їду"
          - "їжджу"
        explanation: "Сьогодні конкретна поїздка."
      - sentence: "Після роботи я ___ до аптеки."
        answer: "піду"
        options:
          - "піду"
          - "ходжу"
        explanation: "Один майбутній вихід."
      - sentence: "Вони часто ___ до Польщі."
        answer: "літають"
        options:
          - "летять"
          - "літають"
        explanation: "Часто = регулярні рейси."
      - sentence: "Літак зараз ___ над містом."
        answer: "летить"
        options:
          - "летить"
          - "літає"
        explanation: "Зараз один рух у повітрі."
      - sentence: "Ми щороку ___ до Карпат."
        answer: "їздимо"
        options:
          - "їдемо"
          - "їздимо"
        explanation: "Щороку = повторення."
      - sentence: "Я ___ правду спокійно."
        answer: "кажу"
        options:
          - "казу"
          - "кажу"
        explanation: "Казати -> кажу."
      - sentence: "Вони ___ за свої права."
        answer: "борються"
        options:
          - "борються"
          - "боряться"
        explanation: "Боротися -> борються."
  - type: match-up
    title: Куди, звідки, яким шляхом?
    instruction: З'єднайте питання з природною відповіддю.
    pairs:
      - left: "Куди ти йдеш?"
        right: "до школи"
      - left: "Куди вона їде?"
        right: "на роботу"
      - left: "Куди вони летять?"
        right: "в Україну"
      - left: "Звідки він іде?"
        right: "з магазину"
      - left: "Звідки ми їдемо?"
        right: "від друга"
      - left: "Яким шляхом ти йдеш?"
        right: "через парк"
      - left: "Де ви йдете?"
        right: "по вулиці"
      - left: "Чим вони їдуть?"
        right: "потягом"
  - type: quiz
    title: Один рух чи звичка?
    instruction: Виберіть речення, яке відповідає ситуації.
    items:
      - question: "Одна конкретна дорога до банку зараз."
        options:
          - "Я іду до банку зараз."
          - "Я ходжу до банку зараз."
          - "Я ходив до банку щотижня зараз."
        correct: 0
        explanation: "Зараз в один бік: іду."
      - question: "Регулярний маршрут до спортзалу."
        options:
          - "Я іду до спортзалу щотижня."
          - "Я ходжу до спортзалу щотижня."
          - "Я піду до спортзалу щотижня зараз."
        correct: 1
        explanation: "Щотижня = ходжу."
      - question: "Одна майбутня поїздка до Харкова."
        options:
          - "Ми поїдемо до Харкова в суботу."
          - "Ми їздимо до Харкова в суботу один раз."
          - "Ми ходимо до Харкова потягом."
        correct: 0
        explanation: "Один майбутній виїзд: поїдемо."
      - question: "Регулярні польоти на роботу."
        options:
          - "Вона летить на роботу щомісяця."
          - "Вона полетить на роботу щомісяця."
          - "Вона літає на роботу щомісяця."
        correct: 2
        explanation: "Щомісяця = літає."
      - question: "Форма я від пити."
        options:
          - "пю"
          - "п'ю"
          - "пію"
        correct: 1
        explanation: "Потрібен апостроф."
      - question: "Форма вони від казати."
        options:
          - "кажуть"
          - "казають"
          - "казуть"
        correct: 0
        explanation: "Казати -> кажуть."
      - question: "Форма він від боротися."
        options:
          - "боретьсяся"
          - "бореться"
          - "боротиться"
        correct: 1
        explanation: "Боротися -> бореться."
      - question: "Правильна модель для маршруту через парк."
        options:
          - "по парк"
          - "через парк"
          - "до парк"
        correct: 1
        explanation: "Через + знахідний: через парк."
