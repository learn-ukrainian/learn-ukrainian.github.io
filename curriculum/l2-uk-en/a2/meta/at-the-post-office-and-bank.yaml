slug: at-the-post-office-and-bank
title: At the Post Office and Bank
word_target: 2000
content_outline:
- section: 'Вступ: Світ послуг в Україні'
  words: 500
  points:
  - 'Explicitly list English scaffolding requirements: English will be used to explain
    the theoretical difference between direction and location cases.'
  - Introduce the context of services in Ukraine, highlighting the modern digital
    banking ecosystem (Monobank/Privat24) and the patriotic renaissance of Ukrposhta.
  - Introduce the polite request formula 'я б хотів/хотіла' (I would like) vs. the
    direct 'я хочу'.
- section: 'Укрпошта: Листи та патріотичні марки'
  words: 700
  points:
  - 'Present essential postal vocabulary: ''лист'' (letter), ''посилка'' (package),
    ''конверт'' (envelope), ''адреса'' (address).'
  - 'Cultural Hook: Explain the ''Russian warship, go...!'' stamp phenomenon and the
    cultural role of philately in Ukrainian resistance.'
  - 'Grammar in context: Demonstrate the Accusative case for direct objects (відправити
    листа, купити марку). Explicitly drill the feminine inanimate change (-а to -у)
    for words like ''посилка'' and ''марка''.'
  - Explain postal codes (індекси) and practice numbers 100-1000 for addressing and
    pricing.
- section: Банківські операції та цифрова екосистема
  words: 700
  points:
  - 'Introduce banking terminology: ''рахунок'' (account), ''картка'' (card), ''валюта''
    (currency), ''готівка'' (cash).'
  - 'Address the critical learner error: Distinguish Ukrainian ''рахунок'' from the
    Russian ''счет'', noting its dual use in banking and restaurants.'
  - 'Present modern banking verbs: ''відкрити рахунок'', ''знімати готівку'', ''переказати
    гроші''.'
  - Discuss the role of instant transfers and QR codes in daily Ukrainian life.
- section: 'Граматичний практикум: Куди чи де?'
  words: 600
  points:
  - 'Provide a clear grammar explanation (in English as per Band 1) resolving the
    motion-based case confusion: Accusative for direction (''іду на пошту / в банк'')
    vs. Locative for location (''я на пошті / у банку'').'
  - Practice numbers 100-1000 in currency exchange scenarios; explain 'курс валют'
    and 'обмін'.
  - 'Provide focused drills on the Accusative Case for specific services: ''відправити
    бандероль'', ''отримати переказ'', ''замовити картку''.'
- section: Діалоги та підсумок
  words: 500
  points:
  - 'Present Roleplay Dialogue 1: A customer at the post office sending a registered
    letter and purchasing patriotic stamps, using polite imperatives.'
  - 'Present Roleplay Dialogue 2: A customer at the bank/ATM exchanging currency and
    discussing transfer options.'
  - Summarize key functional service formulas and reiterate the importance of using
    'рахунок' correctly.
