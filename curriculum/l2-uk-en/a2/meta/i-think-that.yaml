slug: i-think-that
title: I Think That...
word_target: 2000
content_outline:
- section: 'Вступ: Від фактів до поглядів'
  words: 400
  points:
  - Provide English scaffolding to explain the shift from stating objective facts
    (A1) to expressing subjective opinions (A2).
  - Introduce the cultural concept of sincerity (щирість) versus politeness, explaining
    that Ukrainians value directness but use specific linguistic markers to maintain
    social harmony.
  - 'Explain the ''No'' ambiguity: why a direct ''Ні'' is often avoided in favor of
    explanatory phrases like ''Мені здається, що це не зовсім так'' to prevent sounding
    confrontational.'
- section: 'Презентація: Дієслова думки'
  words: 800
  points:
  - Define and contrast 'думати' (the mental process of thinking) and 'вважати' (holding
    a firm opinion) with clear Ukrainian examples and English bridging.
  - Explicitly debunk the use of 'рахувати' for opinions; explain it is strictly for
    counting numbers, emphasizing precise Ukrainian semantics.
  - Introduce 'здаватися' using the impersonal construction 'Мені здається, що...'
    to offer softer, less dogmatic opinions.
  - 'Provide specific drills for gender-sensitive agreement: ''Я згоден'' (m) vs ''Я
    згодна'' (f), highlighting and correcting the common mismatch error.'
- section: 'Граматика: Сполучник «що» та впевненість'
  words: 600
  points:
  - 'State the ''Hard Comma'' Rule clearly: per State Standard §4.4.2, the comma before
    ''що'' in complex sentences is mandatory, unlike the optional English ''that''.'
  - Create a 'Certainty Ladder' categorizing phrases from high certainty ('Я впевнений(-а)',
    'Безумовно') to medium ('Напевно', 'Можливо') and low ('Я сумніваюся').
  - 'Introduce introductory structures for citing opinions: ''На мою думку'', ''На
    мою особисту думку'', and ''На думку експертів''.'
- section: 'Практика: Обґрунтування думки'
  words: 700
  points:
  - Provide guided exercises for expressing an opinion followed by a basic 'тому що'
    (because) justification.
  - 'Teach polite softening patterns for disagreement: ''Вибачте, але...'', ''На жаль,
    я не згоден/згодна'', and ''З одного боку... з іншого боку'' to structure balanced
    arguments.'
  - 'Include fact-to-opinion conversion examples: transforming statements like ''Сьогодні
    холодно'' into ''Мені здається, що сьогодні холодно'' to distinguish degrees of
    conviction.'
- section: Діалоги та застосування
  words: 500
  points:
  - Write a scenario-based dialogue discussing a movie or a work proposal, using softeners
    to navigate disagreement without a direct 'Ні'.
  - Include a 'Talk Show Guest' roleplay scenario where the learner must use 'Безумовно',
    'Цілком можливо', and 'Я впевнений' to respond to different prompts.
  - Conclude with a final summary recapping the mandatory punctuation rule (comma
    before 'що') and the core difference between 'думати' and 'вважати'.
