slug: nature-and-weather
title: Nature and Weather
word_target: 2000
content_outline:
- section: 'Вступ: Природа України'
  words: 300
  points:
  - 'Scaffolding notice: This module operates at 60-75% immersion. English is permitted
    ONLY for explaining abstract grammar rules (Dative states); all examples, legends,
    and dialogues must be in Ukrainian.'
  - Establish the 'Carpathian Forester' persona to guide the learner through the geographical
    contrast between the Carpathian mountains (Карпати) and the southern steppes (степи).
  - Present a short Ukrainian welcome emphasizing the shift from basic nouns to describing
    personal experiences in nature.
- section: 'Лексика: Ландшафти та легенди'
  words: 800
  points:
  - Create an H3 for Core Geography. Introduce 'гора', 'ліс', 'річка', 'озеро' in
    a Ukrainian-only table with corresponding adjectives ('густий ліс', 'швидка річка').
    Provide IPA on first occurrence.
  - Create an H3 for the Cultural Hook. Narrate the legend of 'Озеро Несамовите' in
    simple Ukrainian, teaching 'буря' (storm) and 'град' (hail) contextually.
  - Create an H3 for Flora and Fauna (§3.13). Briefly introduce common plants and
    domestic animals ('свійські тварини') in their habitats.
- section: 'Граматика: Погода та стани'
  words: 1000
  points:
  - Create an H3 defining the Dative Case for States (§4.2.2.3). Use English to explain
    the conceptual shift from Nominative subjects to Dative experiencers.
  - Create an H3 addressing the 'Я холодний' error. Contrast adjectives ('Який день?
    Холодний') with impersonal adverbs ('Мені холодно').
  - Create an H3 for Idiomatic Weather Verbs. Explain that weather performs actions
    ('Йде дощ', 'Падає сніг') rather than existing statically.
  - Include a comparative visual table mapping English 'I am [state]' to Ukrainian
    'Мені [state]' for hot, cold, and comfortable.
- section: 'Практика: Прогноз та розмови'
  words: 600
  points:
  - Create an H3 for a Mountain Survival Dialogue. Write a short conversational roleplay
    demonstrating sudden weather changes using the idiom 'Сім погод надворі'.
  - Create an H3 for a Communicative Task. Prompt the learner to read a short description
    of a landscape using expanded adjectives and Dative-state constructions.
  - Create an H3 for Weather Forecasting. Present a realistic 'прогноз погоди' (weather
    forecast) broadcast script entirely in Ukrainian.
- section: Підсумок
  words: 300
  points:
  - Create an H3 summarizing essential nature collocations and weather idioms.
  - Create an H3 with a self-correction checklist reminding learners to use Dative
    + Adverb for personal feelings ('Мені тепло') and verbs for weather ('Йде дощ').
