slug: she-said-that
title: She Said That...
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Introduce the «На лавці» (On the bench) culture: the classic Ukrainian бабусі
    sharing news, setting a culturally authentic context for reported speech.'
  - 'Outline the English scaffolding policy: English will be used to clarify abstract
    grammar rules, while narratives and examples remain in Ukrainian.'
  - 'Introduce the ''Honest Tense'' concept: explain that Ukrainian reports exactly
    what was said without altering the tense (no English backshifting).'
  - Present the proverb «Слово не горобець — вилетить не впіймаєш» to emphasize the
    importance of spoken words.
- section: 'Презентація: Твердження та дієслова'
  words: 800
  points:
  - Define the core structure of indirect statements using the conjunction *що* with
    clear examples.
  - 'Differentiate reporting verbs: contrast *казати* (focus on the message, introduces
    *що*) with *говорити* (focus on the process of speaking, introduces *про*).'
  - Explicitly highlight the 'Backshift Trap' (English past-to-past rule) and demonstrate
    how Ukrainian preserves the original tense of the speaker.
  - Explain 'Pronoun Persistence' and show the mechanics of shifting from 1st person
    (Я) to 3rd person (Він/Вона) in the reported clause.
- section: 'Презентація: Питання та накази'
  words: 800
  points:
  - Teach how to report Yes/No questions using *чи*, explicitly contrasting it with
    the conditional *якщо* to prevent the common 'If vs Whether' error.
  - Explain word order in reported questions, demonstrating how to drop question intonation
    and inversion to form natural declarative statements.
  - Teach how to report commands using *щоб* followed by the past tense, fulfilling
    State Standard §4.4.2.
  - Introduce and differentiate the verbs *питати* (to ask) and *відповідати* (to
    answer) with their common collocations.
- section: 'Практика: Трансформація та робота над помилками'
  words: 600
  points:
  - Provide step-by-step transformation examples converting direct quotes from the
    'бабусі' into indirect speech.
  - Include targeted minimal pair examples contrasting *якщо* and *чи* in context
    to solidify understanding.
  - Create a dedicated subsection identifying and correcting common errors (backshifting,
    pronoun persistence, word order) with clear explanations.
- section: Продукція та підсумок
  words: 400
  points:
  - Present a narrative scenario based on the game «Зіпсований телефон» (Broken telephone)
    to show how reporting alters a message through a chain.
  - Provide a summary table reviewing the three pillars of reported speech (*що*,
    *чи*, *щоб*).
  - Recap the 'Honest Tense' system and encourage learners to embrace the simplicity
    of the Ukrainian approach.
