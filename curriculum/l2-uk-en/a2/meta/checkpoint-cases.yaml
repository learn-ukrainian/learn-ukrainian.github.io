slug: checkpoint-cases
title: Checkpoint — Cases
word_target: 3000
content_outline:
- section: Огляд та самооцінка
  words: 400
  points:
  - 'Introductory English scaffolding (Band 1 immersion: 50-60% Ukrainian): Clearly
    explain that this checkpoint reviews all 7 cases before moving to verb aspect.'
  - 'Set clear learning goals mapped to State Standard §4.2.2 (Linguistic competence:
    morphology).'
  - Provide an H3 CEFR A2 self-assessment checklist for all cases (e.g., 'I can talk
    about my age', 'I can ask for help in a bank').
  - Include a 'Preposition + Case' reference table to map core prepositions (з, до,
    на, в, через) to their governed cases.
- section: 'Відмінки в дії: Давальний та Орудний'
  words: 700
  points:
  - 'H3: Давальний відмінок (Dative). Explain recipients (подарувати студентові),
    age (дідусеві 80 років), and physical/emotional states (мені холодно/цікаво) with
    3+ examples each.'
  - 'H3: Орудний відмінок (Instrumental). Explain professions/status (бути програмувальником)
    and tools (писати ручкою) with 3+ examples each.'
  - 'H3: Типова помилка (Common Error). Contrast incorrect ''Я пишу ручка'' with correct
    ''Я пишу ручкою'', explicitly explaining the logic of the instrumental tool case.'
- section: 'Граматичні тонкощі: Родовий, Знахідний та Кличний'
  words: 800
  points:
  - 'H3: Родовий відмінок (Genitive). Detail usage for dates (десятого березня) and
    mandatory prepositions (з, до, для, біля) with clear examples.'
  - 'H3: Типова помилка (Common Error). Drill minimal pairs for negation, showing
    the mandatory shift to Genitive: ''У мене є гроші'' vs. ''У мене немає грошей''.'
  - 'H3: Знахідний чи Місцевий? (Accusative vs. Locative). Create a comparative table
    for prepositions ''в/у'', ''на'' to distinguish direction of motion (Accusative)
    vs. static location (Locative).'
  - 'H3: Кличний відмінок (Vocative). Correct the ''Nom. instead of Voc.'' error (Сергію,
    привіт!) and highlight its cultural importance for natural, polite conversational
    habits.'
- section: Сервіси та цифрова Україна
  words: 600
  points:
  - 'H3: На пошті (At the Post Office). Present a practical dialogue using ''відправити
    поштою'' and ''посилка для друга'' that blends multiple cases.'
  - 'H3: У банку (At the Bank). Present a dialogue integrating ''рахунок у банку'',
    ''допомагати з роботою'', and ''обмінювати гроші''.'
  - 'H3: Культурний контекст (Cultural Context). Discuss Ukraine''s digital leadership
    with Monobank and the Diia app, showcasing how physical banking is rapidly evolving
    in modern Ukraine.'
- section: Історичний виклик та підсумок
  words: 500
  points:
  - 'H3: Історичний факт (Historical Fact). Present a short, accessible reading passage
    about ''Stamps as Currency (1918)'' during the UNR, highlighting different cases
    within the narrative.'
  - 'H3: Підсумок (Summary). Provide a final matrix mapping all 7 cases to their core
    questions, main functions, and a key example.'
  - 'H3: Що далі? (What''s Next?). Prepare the learner for a2-12 (Aspect Introduction),
    reassuring them that noun case endings remain perfectly stable regardless of the
    verb''s aspect.'
