slug: checkpoint-cases
title: Checkpoint — Cases
word_target: 2000
content_outline:
- section: 'Навичка 1: Огляд та самооцінка'
  words: 500
  points:
  - 'H3: Чому відмінки важливі. English scaffolding (Band 1 immersion rule) to welcome
    learners to the checkpoint and explain that mastering these 7 cases unlocks the
    rest of Ukrainian grammar.'
  - 'H3: Самооцінка за стандартами A2. Provide a CEFR-aligned self-assessment checklist
    (e.g., ''I can state my age'', ''I can use tools'', ''I can ask for help in a
    bank'').'
  - 'H3: Прийменники та відмінки. A clear reference table mapping core prepositions
    (з, до, на, в, через) to their governed cases.'
- section: 'Навичка 2: Відмінки в дії: Давальний та Орудний'
  words: 700
  points:
  - 'H3: Давальний відмінок. Explain recipients (подарувати студентові), age (дідусеві
    80 років), and states (мені холодно) with English theory and 3+ Ukrainian examples
    each.'
  - 'H3: Орудний відмінок. Explain professions/status (бути програмувальником) and
    tools (писати ручкою) with English theory and 3+ Ukrainian examples each.'
  - 'H3: Типова помилка: Знаряддя дії. Explicitly address the learner error of using
    Nominative for tools (Я пишу ручка → Я пишу ручкою), explaining the logic behind
    the Instrumental case.'
- section: 'Навичка 3: Граматичні тонкощі'
  words: 700
  points:
  - 'H3: Родовий відмінок і заперечення. Detail usage for dates and mandatory prepositions,
    then drill minimal pairs for negation (У мене є гроші → У мене немає грошей).'
  - 'H3: Знахідний чи Місцевий?. Create a comparative table for prepositions ''в/у'',
    ''на'' to distinguish direction of motion (Accusative) vs. static location (Locative).'
  - 'H3: Кличний відмінок. Address the ''Nominative instead of Vocative'' error (Сергію,
    привіт!) and emphasize its cultural importance for natural, polite conversational
    habits.'
- section: 'Навичка 4: Сервіси та цифрова Україна'
  words: 600
  points:
  - 'H3: На пошті. A practical dialogue using ''відправити поштою'' and ''посилка
    для друга'' that blends multiple cases naturally in a service context.'
  - 'H3: У банку. A dialogue integrating ''рахунок у банку'', ''допомагати з роботою'',
    and ''обмінювати гроші''.'
  - 'H3: Дія та Монобанк (Культурний контекст). Discuss Ukraine''s digital leadership
    with Monobank and the Diia app, showing how vocabulary for physical services is
    evolving.'
- section: 'Навичка 5: Історичний виклик та підсумок'
  words: 500
  points:
  - 'H3: Історичний факт: Марки замість монет. An accessible reading passage about
    the 1918 UNR stamps acting as currency, highlighting different cases within a
    historical narrative.'
  - 'H3: Підсумок відмінків. A final, consolidated matrix mapping all 7 cases to their
    core questions, main functions, and a single key example.'
  - 'H3: Що далі?. Prepare the learner for a2-12 (Aspect Introduction), reassuring
    them that noun case endings remain perfectly stable regardless of verb aspect.'
