slug: checkpoint-cases
title: Checkpoint — Cases
word_target: 3000
content_outline:
  - section: Огляд та самооцінка (Overview and Self-assessment)
    words: 600
    points:
      - 'Note explicit English scaffolding rules in the introduction (A2 Band 1 immersion:
        50-60% Ukrainian).'
      - Define the checkpoint goals and align them with the Ukrainian State Standard
        §4.2.2 requirements.
      - Provide a comprehensive self-assessment checklist based on CEFR A2 descriptors
        covering all 7 cases.
      - Include a 'Preposition + Case' matching table to directly address preposition
        governance, a common learner friction point.
  - section: 'Навичка 1: Відмінки в дії: Давальний та Орудний (Skill 1: Cases in Action:
      Dative and Instrumental)'
    words: 700
    points:
      - 'Review the Dative case (Standard §4.2.2.3): Dedicate clear H3s to recipients
        (подарувати студентові), age (дідусеві вісімдесят років), and expressions
        of feeling (мені холодно).'
      - 'Review the Instrumental case (Standard §4.2.2.5): Focus on profession/status
        (бути програмувальником) and tools (писати ручкою) using separate H3s.'
      - 'Targeted error correction (Nom. for Instruments): Explicitly contrast ''Я
        пишу ручка'' (incorrect) with ''Я пишу ручкою'' (correct) to solidify case
        endings for tools.'
  - section: 'Навичка 2: Граматичні тонкощі: Родовий, Знахідний та Кличний (Skill
      2: Grammar Nuances: Genitive, Accusative, and Vocative)'
    words: 1000
    points:
      - 'Review Genitive functions (Standard §4.2.2.2): Detail its use for time (десятого
        березня) and mandatory prepositions (з, до, для, біля).'
      - 'Targeted error correction (Nom. after Negation): Drill minimal pairs showing
        the mandatory shift to Genitive (У мене є гроші -> У мене немає грошей).'
      - 'Contrast Accusative vs. Locative for Motion/Location (Standard §4.2.2.4/§4.2.2.6):
        Use a comparative table for prepositions в/у, на to show direction vs. static
        location.'
      - 'Vocative case mastery: Correct the ''Nom. instead of Voc.'' error with dialogue
        examples (Сергію, привіт!) emphasizing natural conversational habits.'
  - section: 'Навичка 3: Сервіси та цифрова Україна (Skill 3: Services and Digital
      Ukraine)'
    words: 350
    points:
      - Present practical dialogues blending multiple cases in post office and banking
        environments (Standard Catalogue B).
      - Integrate active vocabulary like 'відправити поштою', 'рахунок у банку', 'допомагати
        з роботою' in context.
      - 'Cultural Hook: Use the context of Ukraine''s digital banking leadership (Diia
        app, Monobank) to frame the modern service dialogues.'
  - section: Історичний виклик та підсумок (Historical Challenge and Summary)
    words: 350
    points:
      - 'Integration Challenge: Provide a mixed-case narrative reading based on the
        historical hook of ''Stamps as Currency (1918)'' in the UNR.'
      - Provide a final summary matrix mapping cases to their core prepositions and
        functions.
      - Include a transition pointing toward a2-12 (Aspect Introduction), clarifying
        that case endings remain constant regardless of the verb's aspect.
