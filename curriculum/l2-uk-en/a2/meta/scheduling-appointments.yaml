slug: scheduling-appointments
title: Scheduling Appointments
word_target: 3000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Explicitly note the high-immersion environment for this module: explanations
    will primarily be in Ukrainian.'
  - 'Introduce the ''Academic Quarter'' (академічна чверть) cultural hook: contrast
    social lateness with strict business/medical punctuality.'
  - Explain the dominance of Viber/Telegram for booking appointments ('Check your
    Viber' as a standard confirmation).
  - Clarify the use of the 24-hour clock for official schedules vs. the 12-hour clock
    for casual conversation.
- section: Презентація
  words: 800
  points:
  - Define and clearly contrast «записатися на...» (booking a service) with «домовитися
    про зустріч» (arranging a social meeting).
  - 'Provide a formatted table of key collocations: записатися на прийом, на стрижку,
    до лікаря.'
  - Explain the 'Half Past' logic (e.g., «пів на четверту» = 3:30) with clear visual
    breakdowns to prevent chronological errors.
  - Present standard polite phrases and etiquette for opening and closing a scheduling
    message or call.
- section: Практика
  words: 650
  points:
  - Provide targeted drills distinguishing «о котрій?» (Locative) and «на котру?»
    (Accusative) with contrastive examples.
  - Create an immersion exercise mimicking a Ukrainian booking app interface (using
    terms like календар, вільне місце, підтвердити).
  - Include a specific practice section contrasting the usage of «зустріти» and «зустрітися
    з».
- section: Діалоги
  words: 600
  points:
  - 'Model a formal scenario: scheduling a doctor''s appointment using the 24-hour
    clock and asking for ''вільні місця''.'
  - 'Model an informal scenario: rescheduling a coffee meetup via messenger, using
    ''перенести'' and referencing the ''academic quarter''.'
  - Ensure both dialogues naturally demonstrate State Standard §1.1.2.1.1 competencies
    (inviting, changing, canceling).
- section: Розповідь
  words: 350
  points:
  - Write a cohesive narrative about a character juggling multiple appointments (e.g.,
    a haircut and a business meeting).
  - Integrate the 'half past' logic naturally into the story's timeline to test comprehension.
  - Include realistic vocabulary for confirming via messenger and having to reschedule
    ('перенести на іншу годину').
- section: Підсумок
  words: 150
  points:
  - Recap the essential collocations for scheduling, rescheduling, and canceling.
  - Summarize the critical grammatical rule regarding Locative vs. Accusative for
    time.
  - Provide a brief self-assessment checklist based on §1.1.2.1.1 (Can I make, change,
    and cancel an appointment?).
