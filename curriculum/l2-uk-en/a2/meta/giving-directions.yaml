slug: giving-directions
title: Giving Directions
word_target: 3000
content_outline:
- section: Вступ
  words: 500
  points:
  - Introduce the topic in Ukrainian, setting the scene of navigating a bustling Ukrainian
    city.
  - Present standard urban vocabulary (вулиця, площа, перехрестя) with short definitions
    in Ukrainian.
  - Integrate the cultural hook of Kyiv's 'Arsenalna' metro station as a unique navigation
    milestone.
  - Integrate the cultural hook of Lviv's Rynok Square and its four mythological fountains
    used for orientation.
- section: Презентація
  words: 800
  points:
  - Teach the standard phrase «Вибачте, як пройти до...?» focusing on the verb «пройти».
  - Present directional adverbs (прямо, ліворуч/наліво, праворуч/направо) using simple
    Ukrainian explanations and visual text cues.
  - Address the common error of using adjectives (лівий/правий) instead of adverbs
    for movement direction.
  - Introduce the strict semantic distinction between «іти» (on foot) and «їхати»
    (by vehicle).
  - Explain the formation of basic imperative verbs for instructions (ідіть, поверніть,
    пройдіть).
- section: Практика
  words: 700
  points:
  - Provide a structured exercise focusing on choosing the correct directional adverb
    over the adjective form.
  - Include a drill contrasting the use of «іти» vs. «їхати» based on different modes
    of transport (пішки, на метро, на автобусі).
  - Present step-by-step navigation sequences (e.g., «пройдіть два квартали, потім
    поверніть...») to consolidate the imperative forms.
- section: Діалоги
  words: 600
  points:
  - Provide a dialogue modeling movement prepositions («в/на» + Accusative) versus
    static location («біля/навпроти» + Genitive).
  - Specifically demonstrate and reinforce the use of the Genitive case after the
    preposition «до».
  - Include iconic route dialogues featuring real landmarks (e.g., from a metro station
    to a museum) using sequencing markers (спочатку, потім).
- section: Розповідь
  words: 400
  points:
  - Write a short narrative story about a character navigating from a train station
    to a destination in Lviv or Kyiv.
  - Integrate environmental vocabulary naturally (через міст, на світлофорі, наступна
    зупинка).
  - Conclude with a summary contrasting the questions «куди?» (motion) and «де?» (static
    location).
