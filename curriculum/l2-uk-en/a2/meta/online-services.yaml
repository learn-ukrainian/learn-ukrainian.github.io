slug: online-services
title: Online Services
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Explicitly list English scaffolding budget for this Band 3 module: English allowed
    only in vocab tables and brief abstract clarifications. The rest is Ukrainian.'
  - Introduce the 'State in a Smartphone' (Держава у смартфоні) concept and Diia app,
    noting Ukraine is the first country to give digital passports full legal status.
  - Introduce the cashless economy context and the standard phrase 'скинути на картку'
    (to throw on the card).
- section: Презентація
  words: 700
  points:
  - 'Define core UI vocabulary: ''замовлення'' (order), ''кошик'' (cart), and ''додаток''
    (app) with Ukrainian definitions.'
  - Create a dedicated H3 subsection for the Imperative mood used in app commands
    (Натисніть, Оберіть, Оплатити, Підтвердіть).
  - Provide a grammar alert regarding 'замовлення' as a neuter noun (моє замовлення)
    to prevent feminine-ending confusion.
- section: Практика
  words: 700
  points:
  - Create an H3 subsection to drill the difference between 'додати в кошик' (motion,
    Accusative) and 'у кошику' (static, Locative) with 5 minimal pair examples.
  - Explain the difference between 'номер' (ID like 'номер замовлення') and 'кількість'
    (quantity like 'кількість товарів').
  - Provide a list of delivery collocations ('безкоштовна доставка', 'служба доставки')
    and simulate tracking an order.
- section: Діалоги
  words: 600
  points:
  - 'Dialogue 1: Ordering a taxi (Bolt/Uklon), focusing on ''замовити таксі'', ''місце
    посадки'', and ''місце призначення''.'
  - 'Dialogue 2: Customer support chat dealing with a ''скарга'' (complaint) or ''повернення''
    (refund), using ''перевірити баланс''.'
  - 'Dialogue 3: Peer-to-peer transfer, splitting a bill using ''скинути на картку''
    via Monobank or Privat24.'
- section: Розповідь
  words: 400
  points:
  - 'Tell a narrative about a ''digital day'' in Ukraine: using Diia, ordering Glovo,
    and donating to a ''banka''.'
  - Include cultural context about the Monobank cat mascot and the 'банка' as a tool
    for digital philanthropy/fundraising.
- section: Підсумок
  words: 200
  points:
  - Recap key collocations (оформити замовлення, оплата карткою).
  - Final reminder about the neuter gender of 'замовлення'.
  - Transition note preparing learners for a2-70 (Introduction to Participles).
