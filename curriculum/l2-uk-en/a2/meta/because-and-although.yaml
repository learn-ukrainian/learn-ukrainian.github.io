slug: because-and-although
title: Because and Although
word_target: 2000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Note for Band 2 immersion: Use English only for abstract grammatical terminology;
    keep the narrative and examples in Ukrainian.'
  - Introduce the cultural anchor folk wisdom 'І трясця не бере без причини' to set
    the theme of logical connections.
  - Demonstrate the shift from A1 simple sentences to A2 complex sentences using State
    Standard §4.4.2 concepts.
- section: 'Презентація: Чому та Як'
  words: 800
  points:
  - 'Explain the register hierarchy: neutral ''тому що'', spoken/casual ''бо'', and
    formal ''оскільки''.'
  - 'Drill sentence structure: address the learner error of starting with ''Тому що''
    by enforcing the main-clause-first rule.'
  - Explain the 'Mandatory Comma' rule for Ukrainian conjunctions (', тому що', ',
    бо', ', оскільки').
- section: 'Презентація: Всупереч обставинам'
  words: 650
  points:
  - 'Introduce concession and contrast: ''хоча'' (although) vs ''але'' (but), including
    the mandatory comma.'
  - 'Explain prepositional attribution: positive ''завдяки'' vs negative/neutral ''через''.'
  - Include a cultural warning against the sarcastic misuse of 'завдяки' for negative
    events.
- section: 'Практика: Логічне обґрунтування'
  words: 650
  points:
  - Provide correction drills focused on fixing 'через' used for positive outcomes.
  - Include exercises for transforming casual sentences with 'бо' into formal sentences
    with 'оскільки'.
  - Practice inserting the missing mandatory commas in complex sentences.
- section: Продукція та Діалоги
  words: 450
  points:
  - 'Present a dialogue: Investigative Journalist roleplay exploring reasons and consequences
    using ''через'' and ''завдяки''.'
  - Synthesize the module's grammar points, emphasizing how logical conjunctions act
    as the 'glue' for fluent A2 speech.
