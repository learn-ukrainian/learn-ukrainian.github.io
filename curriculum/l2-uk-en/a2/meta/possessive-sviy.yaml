slug: possessive-sviy
title: Possessive Sviy
word_target: 2000
content_outline:
- section: 'Вступ: Світ через займенник «свій»'
  words: 500
  points:
  - 'Explicit English scaffolding: Use English for complex grammar theory; Ukrainian
    for dialogues, examples, and practice (Immersion 50-60%).'
  - 'Alignment with State Standard §1.3.2: Essential for A2 competency in describing
    one''s own family (своя сім’я), home (свій дім), city (своє місто).'
  - 'The ''Petro and Ivan'' Ambiguity: Contrast English ''his'' with Ukrainian specificity
    — analyze how ''Він любить його маму'' differs drastically from ''Він любить свою
    маму''.'
  - 'Establishing the identity hook: using ''свій'' as the primary tool for defining
    one''s immediate personal environment.'
- section: 'Презентація: Правило «Суб’єкт = Власник»'
  words: 800
  points:
  - 'The Core Logic: Subject-Possessor agreement — use a Mermaid flowchart to visualize
    the decision-tree for choosing ''свій'' vs ''його/її/їхній'' in the 3rd person.'
  - 'Declension Mastery: Detailed table showing that ''свій'' declines exactly like
    ''мій/твій'' (building on A1 patterns) across all genders and cases.'
  - 'Agreement in Practice: Drill high-frequency collocations from research — ''свій
    час'' (m), ''своя сім''я'' (f), ''своє життя'' (n), ''свої люди'' (pl).'
  - '1st and 2nd Person Usage: Explain the optionality in ''Я люблю мою/свою маму''
    while noting that ''свій'' is more common and natural.'
- section: 'Культурний код: Свій — Чужий'
  words: 600
  points:
  - 'The Fundamental Binary: Exploring ''Свій — Чужий'' as a worldview — how using
    ''свій'' correctly signals cultural integration into the ''inner circle''.'
  - 'Idiomatic Wisdom: Deep dive into «У чужий монастир зі своїм статутом не ходять»
    — analyzing the contrast between ''свій'' and ''чужий'' in context.'
  - 'Sociolinguistic register: How ''свої люди'' (one''s own kin/people) functions
    as a marker of trust and social capital in Ukrainian culture.'
- section: 'Аналіз помилок: Уникнення тавтології та неясності'
  words: 600
  points:
  - 'The Redundancy Trap (Tautology): Address the learner error of ''Я мию свої руки''
    — explain that possessives for body parts are often omitted.'
  - 'The ''Scandalous'' Error Drill: Direct focus on the common 3rd person mismatch
    — contrasting ''свою дружину'' vs ''його дружину'' to highlight social consequences.'
  - 'Contrastive vocabulary: Distinguishing ''свій'' from ''власний'' (private/exclusive
    ownership) and ''особистий'' (personal/private life).'
- section: Практичне застосування та підсумок
  words: 500
  points:
  - 'Standard-Aligned Production: Guided writing task describing family, home, and
    city using ''свій'' to meet §1.3.2 benchmarks.'
  - 'Interactive Resolution: Translation drills resolving English ambiguities (''He
    took his book'') into precise Ukrainian forms using the rule.'
  - 'Final synthesis: Review of ''свій'' as a declension twin to ''мій'' and its role
    as the linguistic bridge to A2 thematic descriptions.'
