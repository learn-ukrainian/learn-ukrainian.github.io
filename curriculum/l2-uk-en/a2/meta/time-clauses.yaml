slug: time-clauses
title: Time Clauses
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'English scaffolding note: This module targets 60-75% immersion. Use English to
    explain complex grammatical concepts like clause structures, but use Ukrainian
    for all transitions, examples, and practice instructions.'
  - 'Life as a sequence of events: Introduce the module''s goal aligning with State
    Standard §1.4.1.1.1 (створювати розповідь як просту послідовність подій).'
  - 'Cultural Hook: Introduce the proverb «Всьому свій час» (Everything has its time)
    to frame the importance of temporal sequencing and patience.'
- section: Презентація Граматичні основи
  words: 800
  points:
  - 'Simultaneity vs Points in Time: Contrast «коли» (point/when) and «поки» (process/while)
    using a visual timeline or comparison table with 4 clear examples.'
  - 'Sequencing events (The Linker Structure): Explain the mechanics of «перед тим
    як» (before) and «після того як» (after). Detail why the pronoun anchors «тим/того»
    are mandatory.'
  - 'Preposition vs Conjunction Contrast: Explicitly compare the structure of «перед»
    + Noun (e.g., перед роботою) with «перед тим як» + Verb (e.g., перед тим як іти
    на роботу) using 3 contrasting sentence pairs.'
  - 'Addressing the ''If/When'' Confusion: Clarify the difference between «коли» (for
    definite events) and «якщо» (for conditionals) to prevent native English speaker
    interference.'
- section: Презентація Складні випадки та культура
  words: 700
  points:
  - 'The ''Until Trap'' (Поки не): Explain the Ukrainian grammatical requirement for
    a double negative when describing a limit-action. Provide 4 examples like «Я чекаю,
    поки ти не прийдеш».'
  - 'Cultural Integration: Describe the Ukrainian Christmas Eve (Свята Вечеря) tradition
    of waiting to eat «поки не зійде перша зірка» as a real-world anchor for the ''поки
    не'' rule.'
  - 'Immediacy and Spoken Register: Introduce «щойно» (just/as soon as) and «як тільки»
    (as soon as) for immediate sequences, demonstrating their use in 3 conversational
    snippets.'
  - 'Habits and Frequency: Show how to express recurring events using the pattern
    «кожного разу, коли...» (every time when) with 2 clear examples.'
- section: Практика та корекція помилок
  words: 600
  points:
  - 'Missing Linker Drill: Guide learners through identifying and correcting the common
    error of dropping the demonstrative anchor (e.g., fixing «Перед я пішов» to «Перед
    тим як я пішов») using 4 step-by-step examples.'
  - 'Transformation Exercise: Show how to convert simple prepositional phrases into
    complex time clauses (e.g., changing ''Після сніданку...'' to ''Після того як
    я поснідав...'') with 4 guided transformations.'
  - 'Negative Logic Drill: Practice constructing «поки не» sentences to build muscle
    memory for the double negative limit-action rule, using 3 detailed construction
    steps.'
- section: Продукція та діалоги
  words: 500
  points:
  - 'Narrative Monologue: Provide a sample 6-8 sentence monologue describing a busy
    morning schedule or travel itinerary, demonstrating the State Standard requirement
    for chronological sequencing with at least 4 different time clauses.'
  - 'Coordination Dialogue: Present a 6-line mini-dialogue between two friends planning
    a shared event, actively using «поки», «як тільки», and «після того як» to coordinate
    their actions naturally.'