slug: which-one
title: Which One?
word_target: 2000
content_outline:
- section: 'Вступ: Опис за межами прикметників'
  words: 450
  points:
  - 'Note Band 2 Immersion: Use English briefly to introduce the abstract concept
    of relative clauses, but write the rest of the intro in Ukrainian.'
  - Introduce the power of complex sentences to describe people and things, framing
    it as a transition from simple adjectives.
  - Introduce the idiom «Який пан, такий жупан» to illustrate agreement in gender
    and number.
  - 'Present the ''Mirror'' analogy: «який» reflects the gender and number of its
    antecedent noun.'
- section: 'Презентація: Відмінювання та узгодження'
  words: 900
  points:
  - Create a comprehensive table of Nominative forms (який, яка, яке, які) with multiple
    Ukrainian examples.
  - 'Explain ''The Case Detective'' rule using English scaffolding: the case of «який»
    is determined by its role inside the relative clause, not the main sentence.'
  - Detail the Accusative forms, focusing on «якого» (masc/anim) and «яку» (fem) for
    object clauses.
  - Provide scaffolded examples moving from Nominative subjects (e.g., «чоловік, який
    стоїть») to Accusative objects (e.g., «чоловік, якого я знаю»).
- section: Культурний контекст та вибір
  words: 600
  points:
  - Describe the 'Selection' culture at a Ukrainian market (ринок) primarily in Ukrainian.
  - Include market interaction phrases like «Який вам зважити?» and «Які помідори
    найсолодші?» with rich descriptive context.
  - Discuss the logic of naming with the idiom «Як ви човен назвете, так він і попливе».
- section: Практика та типові помилки
  words: 700
  points:
  - Explicitly correct the common learner error of using «хто» instead of «який» for
    people.
  - Explain the mandatory comma rule for Ukrainian relative clauses.
  - Provide sentence transformation drills (e.g., combining two simple sentences into
    one complex sentence).
  - Include 'Chameleon' drills to practice case selection for the relative pronoun
    based on its internal clause function.
- section: Діалоги та підсумок
  words: 500
  points:
  - Write a detailed 'Witness Interview' dialogue in Ukrainian using varied forms
    of «який» to describe people or lost items.
  - Write a 'Shopping' scenario focusing on specifying preferences («Мені подобається
    той, який...»).
  - Provide a final synthesis summarizing the 'mirror' (gender/number) and 'chameleon'
    (case) rules.
