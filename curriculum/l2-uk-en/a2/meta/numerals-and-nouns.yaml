slug: numerals-and-nouns
title: Numerals and Nouns
word_target: 2000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Introduce the mental model of ''Zones'' in Ukrainian counting: Zone 1 (1), Zone
    2 (2-4), and Zone 3 (5-20), moving away from binary singular/plural logic.'
  - Clearly explain the immersion expectations (English for abstract grammar rules,
    Ukrainian for examples and practice).
  - 'Cultural Hook: Introduce the ''Gryvnia'' (гривня) as a historical unit of weight
    and currency from Kyivan Rus.'
- section: 'Презентація: Зони 1 та 2'
  words: 750
  points:
  - 'Zone 1 (The ''One'' Rule): Focus on mandatory gender agreement with tables (один
    долар, одна година, одне вікно).'
  - 'Zone 2 (2, 3, 4): Explain the Nominative Plural requirement (два столи, три дні,
    чотири роки).'
  - Distinguish between 'два' (masc/neut) and 'дві' (fem) to correct the common 'два
    пляшки' error.
  - 'Cultural Hook: Briefly explain the ''Dual Legacy'' (Двоїна) to give historical
    context to the 2-4 pattern.'
- section: 'Презентація: Зона 3 та Складні числівники'
  words: 750
  points:
  - 'Zone 3 (5 to 20): Establish the Genitive Plural pattern for numbers 5 and above
    (п''ять гривень, десять євро).'
  - 'Address the ''11-14'' Trap: Reinforce that numerals 11-14 belong strictly to
    Zone 3 despite ending in digits 1-4.'
  - 'Compound Numerals and the ''Last Digit'' Rule: Demonstrate that in numbers like
    21, 34, or 55, only the final word determines the agreement zone.'
  - 'State Standard §4.2.2.2: Using numerals to express age (Дідусеві вісімдесят років),
    focusing on Genitive Plural forms for ''years'' (років vs роки).'
- section: Практика на ринку
  words: 600
  points:
  - Provide a transactional market setting (Ринок) for immersion drills.
  - 'Drill currency agreement: compare ''дві гривні'' (Zone 2) vs ''п''ять гривень''
    (Zone 3) and ''один долар'' vs ''три долари''.'
  - Introduce 'євро' as an indeclinable noun exception that remains constant regardless
    of the numeral.
- section: Діалоги та одушевленість
  words: 450
  points:
  - Introduce the animacy shift in the Accusative case with numerals ('Бачу два столи'
    vs 'Бачу двох друзів').
  - Include short shopping roleplays with specific quantities and prices, integrating
    all three zones.
  - Recap the 'Zone' model as a self-correction tool for learners.
