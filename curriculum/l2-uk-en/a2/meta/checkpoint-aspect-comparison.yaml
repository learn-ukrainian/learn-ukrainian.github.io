slug: checkpoint-aspect-comparison
title: 'Checkpoint: Aspect, Comparison & Modality'
word_target: 3000
content_outline:
  - section: 'Огляд та вступ: Карта навичок'
    words: 450
    points:
      - 'Set A2 Band 2 immersion expectations: explicitly state that English scaffolding
        will be used for complex grammar theory, while examples and practice are in
        Ukrainian.'
      - 'Map out the ''Quality and Time'' block: show visually how Aspect, Comparison,
        Modality, and Numerals interconnect.'
      - 'Establish the goal: bridging foundational grammar to prepare for complex
        narratives in M26.'
  - section: 'Вид дієслова: Процес та результат'
    words: 650
    points:
      - Reinforce the Present Tense Rule (present is exclusively Imperfective), explicitly
        addressing the *Я зроблю зараз* error.
      - Deep review of aspect pairs (робити/зробити, писати/написати) focusing on
        completion vs. duration.
      - 'Include the Cultural Hook: explain the nuances of hospitality (Imperfective
        «Приходьте» vs Perfective «Прийдіть»).'
  - section: 'Ступені порівняння: Від якості до досконалості'
    words: 650
    points:
      - Drill synthetic (-іш/-ійш) vs analytic (більш/менш) comparison forms.
      - Explicitly correct the Double Comparative Trap (*більш кращий*).
      - Provide a master table for irregular comparatives (великий/більший, малий/менший,
        добрий/кращий, поганий/гірший).
      - Integrate the proverb «Краще пізно, ніж ніколи» to demonstrate softening apologies.
  - section: Модальність та узгодження числівників
    words: 600
    points:
      - Review Conditional and Imperative moods for polite requests and hypothetical
        scenarios.
      - Drill the 1-2-5 Rule for numeral agreement (e.g., *два столи* vs *п'ять столів*)
        to fix the Numeral Collision error.
      - Synthesize modality and numbers by presenting a hypothetical scenario involving
        money/time («Якби я мав 100 гривень...»).
  - section: Синтез та практичне завдання
    words: 700
    points:
      - Present a complex Synthesis Dialogue where speakers negotiate a plan using
        aspects, comparisons, and moods.
      - 'Include an Aspect Transformation Marathon activity: rapid switching from
        process to result-oriented sentences.'
      - 'Conclude with an Event Planning Challenge: a combined task requiring dates,
        numbers, preferences, and backup plans.'
