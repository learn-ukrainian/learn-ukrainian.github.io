slug: smart-shopping
title: Smart Shopping
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Set Band 2 immersion context: English is only used for grammar rules; dialogues
    and instructions will be in Ukrainian.'
  - 'Introduce the cultural hook: Bazar vs Supermarket. Explain the concept of ''свій
    продавець'' (regular vendor) and why aggressive haggling is not the norm.'
  - 'Present the ''Freshness Hierarchy'' where ''бабусі'' (grannies) are preferred
    over organic brands. Introduce traditional units: ''стакан'' (glass for berries)
    and ''пучок'' (bunch for herbs).'
- section: Презентація
  words: 800
  points:
  - 'Present transaction vocabulary (§3.9): ''ціна'' (вигідна, зі знижкою), ''знижка''
    (надати знижку, акційна ціна), ''решта'', and ''чек''.'
  - 'Explain comparative adjectives (§4.3.1) using English (abstract concept): teach
    simple forms (солодший, важливіший), compound forms (більш солодкий), and suppletive
    forms (великий - більший).'
  - 'Explain superlative adjectives (§4.3.1) using English: teach simple forms (найсолодший)
    and compound forms (найбільш солодкий).'
  - 'Introduce digital shopping terminology: ''кошик'' (cart), ''оформити замовлення''
    (checkout), ''доставка'' (delivery).'
  - Include tables for comparative/superlative paradigms and a short dialogue demonstrating
    the new terms in a market context.
- section: Практика
  words: 700
  points:
  - Create a drill in Ukrainian focusing on phonetic stem changes (e.g., дорогий ->
    дорожчий, близький -> ближчий) to prevent the *дорожший* error.
  - Include an error-correction box explicitly targeting the 'double comparison' mistake
    (e.g., *більш дешевший* vs більш дешевий/дешевший).
  - 'Design a practice segment for comparative particles: contrast ''ніж'' vs ''за
    + Accusative'' (дешевший за...) and explicitly instruct to avoid ''як'' for direct
    comparisons.'
- section: Продукція
  words: 700
  points:
  - 'Provide a role-play reading scenario in Ukrainian: Market negotiation vs Supermarket
    checkout. Contrast dynamic ''ринок'' phrases (''Чи можна дешевше?'') with fixed
    ''магазин'' prices.'
  - Showcase refusal and decision-making etiquette with phrases like 'Я ще подумаю'.
  - Require learners to evaluate two products using comparative/superlative forms
    (кращий варіант, найкраща якість) and make a polite purchase decision.
- section: Підсумок
  words: 400
  points:
  - Summarize communicative phrases for shopping (§3.9) including handling currency
    and units of volume.
  - Provide a quick recap table of adjective degrees (comparative and superlative).
  - Include a final checklist for polite shopping interactions in both physical (bazar)
    and digital contexts, completely in Ukrainian.
