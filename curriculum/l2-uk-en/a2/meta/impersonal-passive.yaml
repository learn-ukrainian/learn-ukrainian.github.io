slug: impersonal-passive
title: Impersonal Passive Forms
word_target: 2000
content_outline:
- section: 'Вступ: Написи навколо нас'
  words: 500
  points:
  - '[English Scaffolding]: Explicitly explain the abstract grammatical concept of
    the ''impersonal passive state'' in English before showing Ukrainian examples.
    Clarify that it reports a state or completed action impersonally—without a subject.'
  - 'Cultural hook: Introduce the concept of environmental print in Ukraine. Provide
    visual examples of common signs like «Магазин закрито» and «Вхід заборонено».'
  - 'Establish the functional literacy goal: learning to independently decode shop
    signs, app notifications, official notices, and product labels.'
- section: Утворення форм на -но/-то
  words: 600
  points:
  - 'Provide the rule for Pattern 1 (-ати/-яти verbs): drop the infinitive -и and
    add -но (e.g., зробити → зроблено, написати → написано). Provide 3-4 clear examples
    with English translations.'
  - 'Provide the rule for Pattern 2 (-ити/-іти verbs): explain the vowel change and
    the suffix -ено (e.g., побудувати → побудовано). Include a simple paradigm table.'
  - 'Provide the rule for Pattern 3 (consonant roots in -ти): add -ено/-дено (e.g.,
    знайти → знайдено, привезти → привезено). Mention the irregular -то suffix for
    certain verbs (відкрити → відкрито, закрити → закрито).'
  - 'Explicitly state the Aspect Gatekeeper Rule: these forms are derived exclusively
    from perfective verbs because they indicate a completed result.'
- section: Форма на -но/-то чи дієприкметник?
  words: 600
  points:
  - 'Critical distinction: Emphasize that -но/-то forms are INVARIABLE predicates.
    They never change for gender, number, or case, unlike participles which are adjectives.'
  - 'Create a contrastive table: «Магазин закрито» (impersonal state, predicate at
    the end) vs. «Закритий магазин» (descriptive adjective modifying a noun).'
  - 'Syntactic position note: Show that -но/-то typically appears at the end of the
    clause as the predicate.'
  - 'Learner error alert: Warn against combining two adjectives (*«Замовлена доставлена»*)
    and provide the correct functional phrase («Замовлення доставлено»).'
- section: 'Національна ідентичність: «Зроблено в Україні»'
  words: 500
  points:
  - Discuss «Зроблено в Україні» as a brand and a marker of national identity and
    economic resilience. Present this as a purely Ukrainian cultural phenomenon.
  - 'Grammar in context: Teach the instrumental case pattern for languages («написано
    українською» — written in Ukrainian), highlighting its use in book colophons and
    metadata.'
  - 'Grammar in context: Teach the locative case pattern for years («засновано у 2014
    році» — founded in 2014) for company and NGO profiles.'
  - Provide a realistic dialogue or reading snippet featuring film credits («знято
    в Україні») and product certifications.
- section: Читання вивісок та етикеток
  words: 400
  points:
  - 'Present a visual-style list of physical signs: «Вхід заборонено», «Вихід закрито»,
    «Зачинено на ремонт» with Ukrainian explanations.'
  - 'List common digital/app notifications: «Повідомлення надіслано», «Файл завантажено»,
    «Оплату прийнято», «Акаунт підтверджено».'
  - 'Explain the official bureaucratic register: why Ukrainian prefers these passive
    forms over active voice in administrative texts (e.g., «затверджено», «скасовано»).'
  - 'Provide examples from recipes or instructions: «нарізано дрібно», «посолено за
    смаком» in contexts without a stated agent.'
- section: Практика
  words: 400
  points:
  - 'Transformation drill concept: Prompt learners to mentally transform active sentences
    («Вони зробили замовлення») into impersonal ones («Замовлення зроблено»).'
  - 'Identification practice: Present a mix of signs and descriptive phrases; ask
    the learner to identify whether it''s an impersonal -но/-то state or a participial
    adjective.'
  - 'Summary: Recap the -но/-то construction as an invariable, perfective ''done-ness
    stamp'' that acts strictly as a predicate.'
