slug: impersonal-passive
title: Impersonal Passive Forms
word_target: 3000
content_outline:
- section: 'Вступ: Написи навколо нас'
  words: 500
  points:
  - '[English Scaffolding]: Explicitly introduce the grammatical concept of the impersonal
    passive state in English before providing Ukrainian examples, as per A2 immersion
    Band 2.'
  - 'Cultural hook: Ukrainian environmental print (signs, apps, labels) uses -но/-то
    heavily. Introduce ''Магазин закрито'' and ''Вхід заборонено''.'
  - 'Functional literacy goal: Explain that mastering these forms allows learners
    to decode real-world Ukrainian independently.'
  - 'Key contrast: Establish that these forms report a state or completed result impersonally
    — there is no subject, and no agent is required.'
- section: Утворення форм на -но/-то
  words: 600
  points:
  - 'Pattern 1 (verbs in -ати/-яти): зробити → зроблено, написати → написано. Explain
    the rule: drop the infinitive -и and add -но.'
  - 'Pattern 2 (verbs in -ити/-іти): побудувати → побудовано. Explain the vowel change
    and suffix -ено.'
  - 'Pattern 3 (consonant roots in -ти): знайти → знайдено, привезти → привезено.'
  - 'Aspect gatekeeper rule: Clearly state that these forms are derived exclusively
    from perfective verbs because they indicate a completed result.'
- section: Форма на -но/-то чи дієприкметник?
  words: 600
  points:
  - 'Critical distinction: Emphasize that -но/-то is INVARIABLE. It never changes
    for gender, number, or case.'
  - 'Contrastive examples: ''Магазин закрито'' (impersonal state: it is closed right
    now) vs ''Закритий магазин'' (descriptive adjective: a closed shop).'
  - 'Syntactic position: Note that -но/-то acts as the predicate (usually at the end),
    while the participle sits next to the noun it modifies.'
  - 'Learner error alert: Explicitly warn against combining two adjectives (e.g.,
    *''Замовлена доставлена''*) and teach the correct form (''Замовлення доставлено'').'
- section: 'Національна ідентичність: «Зроблено в Україні»'
  words: 500
  points:
  - 'Cultural context: Discuss ''Зроблено в Україні'' as a brand, a marker of national
    identity, and economic resilience.'
  - 'Language and the Instrumental case: Teach the pattern ''написано українською''
    (written in Ukrainian), common in books and digital metadata.'
  - 'Years and the Locative case: Teach the pattern ''засновано у 2014 році'' (founded
    in 2014), common for NGOs, companies, and apps.'
  - 'Showcase patriotic and commercial applications: ''знято в Україні'' (film credits),
    product certifications.'
- section: Читання вивісок та етикеток
  words: 400
  points:
  - 'Physical sign vocabulary: Drill ''Вхід заборонено'', ''Вихід закрито''.'
  - 'Digital and app notifications: Drill ''Повідомлення надіслано'', ''Файл завантажено'',
    ''Акаунт підтверджено'', ''Оплату прийнято''.'
  - 'Official/Bureaucratic register: Note words like ''підписано'' and ''скасовано'',
    explaining that Ukrainian prefers this over active voice in official texts.'
  - 'Recipes and instructions: Explain forms like ''нарізано дрібно'', ''посолено
    за смаком'' in contexts without a stated agent.'
- section: Практика та підсумок
  words: 400
  points:
  - 'Transformation drill concept: Prompt learners to mentally transform active sentences
    (''Вони зробили замовлення'') into impersonal ones (''Замовлення зроблено'').'
  - 'Identification practice: Contrast physical signs vs. adjectival descriptions.'
  - 'Summary: Recap -но/-то as the ''done-ness stamp'' that is invariable, perfective,
    and acts only as a predicate.'
