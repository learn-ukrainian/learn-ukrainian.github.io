slug: health-basics
title: Health Basics
word_target: 3000
content_outline:
- section: 'Вступ: Здоров’я — це скарб'
  words: 300
  points:
  - 'Note on Immersion: This is a Band 2 module (60-75% immersion). Section introductions
    will be entirely in Ukrainian.'
  - Introduce the cultural hook 'У здоровому тілі — здоровий дух'.
  - 'Set the context: why discussing health (''самопочуття'') is a common topic in
    Ukraine and introduce the modern ''сімейний лікар'' concept.'
- section: Частини тіла та анатомія
  words: 500
  points:
  - 'Present core body parts vocabulary: голова, рука, нога, живіт, спина, горло,
    серце, шлунок.'
  - Explain irregular plurals in Ukrainian (око -> очі, вухо -> вуха) with a brief
    English scaffolding note.
  - Provide drills showing gender agreement with adjectives (e.g., червоне горло,
    права рука).
  - Introduce the cultural idiom 'від щирого серця' to show anatomical terms in beautiful,
    non-medical usage.
- section: 'Конструкція «У мене болить»: Граматика болю'
  words: 700
  points:
  - 'Explain the core mechanics (in English): The body part is the subject (Nominative),
    and the person experiencing pain is in Genitive with ''У''.'
  - 'Highlight the singular vs. plural verb agreement: У мене болить (голова) vs.
    У мене болять (очі).'
  - Explicitly correct the common learner error 'Я болю' via examples.
  - Introduce the Dative state construction (Мені погано / Мені добре). Explain why
    'Я погано' is incorrect.
  - Note the stylistic difference between physical pain ('У мене болить...') and emotional/poetic
    pain ('Мені болить...').
- section: Симптоми, хвороби та народна медицина
  words: 600
  points:
  - 'Introduce symptom vocabulary: висока температура, сухий кашель, нежить.'
  - Explain the grammatical distinction between 'боліти' (to hurt) and 'хворіти на
    + Accusative' (to be sick with).
  - Provide examples correcting 'Я болю грип' to 'Я хворію на грип'.
  - Discuss traditional remedies like 'чай з малиною' and 'гірчичники' in a short
    Ukrainian reading passage.
- section: У поліклініці та аптеці
  words: 500
  points:
  - Clarify the difference between 'поліклініка' (outpatient) and 'лікарня' (inpatient).
  - Introduce medical imperatives using 2nd person plural forms (Відкрийте рот, дихайте,
    не дихайте, пийте ці ліки).
  - Provide pharmacy vocabulary (аптека) and phrases to ask for medicine (засоби від
    нежитю).
- section: 'Практика: Що трапилося?'
  words: 400
  points:
  - Provide a mini-dialogue of calling a friend or clinic to report an illness, synthesizing
    'Що з тобою?' and symptom descriptions.
  - 'Include an emergency role-play: ''Викличте швидку!'' with the dispatcher.'
  - Add a self-check summary table consolidating the new structures.
