slug: the-dative-ii-nouns
title: The Dative II — Nouns
word_target: 3000
content_outline:
- section: 'Вступ: Концепція адресата'
  words: 400
  points:
  - 'Immersion check: Band 1 (50-60%) — use English for grammar logic, Ukrainian for
    examples.'
  - 'Recap of A2-01: ''Мені/Тобі'' as the anchor for the entire case.'
  - 'The ''To/For'' Concept: Mapping English ''Give TO mom'' to Ukrainian Dative.'
  - 'Standard §4.2.2.3: Expressing Age (Subject in Dative + Age). Example: «Дідусеві
    80 років».'
  - 'Roadmap: We will cover Nouns (M/F/N/Pl) and the verbs that demand them.'
- section: 'Чоловічий та середній рід: -ові/-у'
  words: 600
  points:
  - 'Masculine Endings: The choice between -ові/-еві (preferred for people) and -у/-ю.'
  - 'Euphony focus: Why «братові» sounds better than «брату» in many contexts.'
  - 'Neuter Nouns: Following the masculine pattern (-у/-ю). Example: «місту», «селу».'
  - 'The ''Soft'' Sign: How words like «день» become «дню», «вчитель» become «вчителю».'
  - 'Warning: Distinguish Dative (-у) from Genitive (-а/-у). Context is key.'
- section: Жіночий рід та чергування
  words: 600
  points:
  - 'The Standard Ending: -і for most hard and soft feminine nouns (мама → мамі).'
  - 'The Great Consonant Shift (Euphony): г → з (нога → нозі).'
  - 'The Great Consonant Shift: к → ц (рука → руці, донька → доньці).'
  - 'The Great Consonant Shift: х → с (муха → мусі).'
  - 'Drill: Rapid-fire transformation of these specific sound changes.'
- section: 'Множина: Даруємо всім!'
  words: 400
  points:
  - 'The Universal Plural: -ам (hard) and -ям (soft). Simplification vs. Singular
    complexity.'
  - 'Connection to A1: If you know Nominative Plural, Dative Plural is easy.'
  - 'Examples across genders: друзям, батькам, дівчатам, вікнам.'
  - 'Stress shifts: Brief mention if relevant (e.g., братИ -> братАМ).'
- section: Ключові дієслова та керування
  words: 500
  points:
  - 'The Gifting Trio: Давати, Дарувати, Посилати (Concrete physical transfer).'
  - 'The Communication Trio: Телефонувати, Пояснювати, Розповідати.'
  - 'The ''Help'' Trap: Why «допомагати» requires Dative (acting FOR someone), not
    Accusative.'
  - 'Digital Age: «Надсилати повідомлення» vs «Телефонувати».'
  - 'Structure: Verb + Dative Object examples.'
- section: 'Практика: Етикет подарунків'
  words: 300
  points:
  - 'Cultural Rule #1: Odd numbers of flowers for the living. Even numbers are for
    funerals.'
  - 'Cultural Rule #2: Taboo gifts (Watches/Knives). The ''buy back'' superstition
    with a coin.'
  - 'Transformation Exercise: ''I give (flower) to (mom)'' -> Correct case and number.'
  - 'Contextual application: Choosing the right gift and the right grammar.'
- section: 'Діалоги: День Ангела'
  words: 200
  points:
  - 'Scenario 1: Greeting a friend on Name Day. Phrase: «Вітаю з Днем ангела!».'
  - 'Scenario 2: Buying a gift. Discussing what ''suits'' (личить) the recipient.'
  - 'Synthesizing: Using Dative nouns, proper verbs, and cultural knowledge in flow.'
