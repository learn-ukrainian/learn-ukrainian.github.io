slug: the-dative-ii-nouns
title: The Dative II — Nouns
word_target: 2000
content_outline:
- section: 'Вступ: Концепція адресата та вік'
  words: 500
  points:
  - 'Immersion check (Band 1: 50-60%): Explicitly note in the intro that English will
    be used to scaffold the grammar rules, while examples and contexts will be in
    Ukrainian.'
  - 'Create an H3 to bridge from A2-01: Briefly review Dative pronouns (мені, тобі)
    to securely anchor the ''To/For'' recipient concept.'
  - 'Define Dative as the recipient/beneficiary case. Provide a clear formula showing
    sentence structure: Nominative (subject) -> Verb -> Dative (indirect object) ->
    Accusative (direct object).'
  - 'Create an H3 for Age (Standard §4.2.2.3): Explain that age happens *to* a person,
    placing the subject in the Dative (e.g., «Дідусеві вісімдесят років»).'
- section: 'Чоловічий та середній рід: -ові/-еві та -у/-ю'
  words: 700
  points:
  - 'Create an H3 for Animate Masculine nouns: Introduce and strongly emphasize the
    uniquely Ukrainian «-ові/-еві» endings (братові, лікареві). Frame them as adding
    clarity and melody to the language.'
  - 'Create an H3 for Inanimate Masculine and Neuter: Explain the «-у/-ю» endings
    (місту, морю, парку) with clear examples.'
  - 'Include a dedicated ''Warning Box'' on Genitive vs. Dative confusion: Show how
    consistently using «-ові» for people prevents accidental mixing with Genitive
    case endings.'
  - 'Drill the ''Call'' Trap: Introduce «телефонувати» + Dative (телефонувати лікареві),
    explicitly warning against the English-influenced Accusative error.'
- section: 'Жіночий рід та множина: -і та чергування'
  words: 700
  points:
  - 'Create an H3 for Feminine nouns (-а/-я to -і): Present the standard ending (мамі,
    сестрі). Add a specific warning against using the masculine -у for feminine nouns.'
  - 'Create an H3 for Phonetic Shifts (Чергування): Systematically teach velar shifts:
    г-з (нога-нозі), к-ц (рука-руці), х-с (муха-мусі). Frame this positively as a
    natural part of Ukrainian euphony.'
  - 'Create an H3 for Plural nouns: Present the universal «-ам/-ям» endings (друзям,
    батькам), linking back to Nominative plural stems learned in A1.'
  - 'Drill the ''Help'' Trap: Highlight «допомагати» + Dative. Contrast the correct
    «допомагати мамі» against the high-frequency error «допомагати маму».'
- section: 'Дієслова: Керування давальним відмінком'
  words: 600
  points:
  - 'Create an H3 for ''The Gifting Trio'': Group «давати», «дарувати», «надсилати».
    Provide robust examples showing the transfer of an object to a recipient.'
  - 'Create an H3 for ''The Communication Trio'': Group «відповідати», «пояснювати»,
    «розповідати». Provide examples of sharing information with a recipient.'
  - 'Focus on Abstract Collocations: Show non-physical giving using established vocabulary,
    such as «давати пораду» (give advice) and «давати відповідь» (give an answer).'
  - 'Create an H3 for the verb «личити» (to suit): Teach its usage in descriptive
    contexts, specifically with clothing and style (Ця сукня тобі личить).'
- section: 'Культура та етикет: Подарунки і свята'
  words: 500
  points:
  - 'Cultural Hook 1 (Flower Etiquette): Explain the strict cultural rule of giving
    odd numbers of flowers (1, 3, 5) for celebrations, and even numbers for funerals.'
  - 'Cultural Hook 2 (Taboo Gifts): Explain the superstition of gifting knives or
    watches, and introduce the ''buying back'' ritual with a small coin.'
  - Create a mini-dialogue at a flower shop or a gift exchange demonstrating the odd-number
    rule and taboo-breaking ritual using Dative forms.
  - 'Cultural Hook 3 (Name Day): Introduce «День Ангела» and the essential greeting
    «З Днем ангела!» for the «іменинник», showcasing the social function of the Dative.'
