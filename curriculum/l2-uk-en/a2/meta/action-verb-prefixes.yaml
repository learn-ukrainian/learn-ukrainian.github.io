slug: action-verb-prefixes
title: Action Verb Prefixes
word_target: 3000
content_outline:
- section: 'Вступ: Логіка LEGO в українських дієсловах'
  words: 400
  points:
  - Introduce the 'Meaning Map' concept, showing how prefixes act as GPS coordinates
    for base A1 verbs (e.g., писати, робити).
  - Explain that Ukrainian uses morphological prefixes instead of English phrasal
    verb particles (write down, write over). Provide English translation scaffolding
    for clear transition.
  - Introduce the prefix до- through the cultural 'Bread Respect' lens (доїсти), referencing
    historical reverence for food.
- section: 'Презентація: Світ префіксів пере-, до- та по-'
  words: 850
  points:
  - 'Create an H3 for пере-: Detail the difference between ''doing again'' (переробити),
    ''copying'' (переписати текст), and ''transferring'' (передати). Provide minimum
    5 examples.'
  - 'Create an H3 for до-: Explain completion of action up to a limit. Reference State
    Standard §4.3.2 for aspect pairs (писати -> написати vs дописати).'
  - 'Create an H3 for по-: Scaffold the delimitative meaning (doing an action ''a
    little bit'', like почитати) and distinguish it from simple perfective markers.'
  - Include an 'Error Trap' callout explaining the difference between rewriting (переписати)
    and finishing writing (дописати).
- section: Відчинити чи відкрити? Битва за простір
  words: 750
  points:
  - 'Define the ''Hinges Rule'': physically opening barriers (відчинити двері/вікно)
    vs. abstract revealing/starting (відкрити рахунок/Америку). Provide a clear comparison
    table.'
  - Include a 'Decolonization / Surzhyk Warning' callout debunking the incorrect 'відкрити
    двері' pattern.
  - 'Apply the same physical/abstract logic to closing: зачинити (doors/windows) vs.
    закрити (sessions, businesses, eyes).'
  - 'Detail the multiple functions of за-: physical closing, starting an action (заспівати),
    and excess.'
- section: 'Практика: Трансформація смислів'
  words: 600
  points:
  - Present a detailed 'Hinge vs. Abstract' vocabulary table using frequency collocations
    (office vs. home contexts).
  - Include 'The Messy Office' scenario with min 8 practice sentences correcting prefix
    errors (e.g., using переписати instead of дописати).
  - 'Provide a dedicated drill for the ''Give'' family verbs: віддати (return), передати
    (pass), здати (submit/rent).'
- section: Діалоги та підсумок
  words: 400
  points:
  - Write a 10-line high-immersion dialogue between a Writer and Editor deciding whether
    to rewrite (переписати) or just finish (дописати) a chapter before a deadline.
  - Add a Mastery Check section featuring 5 specific sentences testing the 'start'
    vs 'excess' meanings of за- and the correct opening verbs for business/windows.
  - Provide a final bulleted summary of aspectual logic and the cultural resonance
    of the до- prefix.
