slug: dative-verbs
title: Dative Verbs
word_target: 2000
content_outline:
- section: 'Вступ: Керування та Адресат'
  words: 450
  points:
  - 'Concept of ''Verb Government'' (керування): verbs as ''bosses'' that demand specific
    cases.'
  - 'The Recipient (Кому?): defining the Dative case as the ''To Whom'' case.'
  - 'English vs. Ukrainian Logic: Contrast ''Thank YOU'' (Direct) vs. ''Give thanks
    TO YOU'' (Indirect).'
  - 'Immersion Note: Explain this conceptual difference in English to avoid confusion.'
- section: 'Презентація: Дієслова Давального відмінка'
  words: 1300
  points:
  - 'Group 1: Pure Dative (допомагати, дякувати, заважати). Logic: direction of action
    towards a person.'
  - 'Cultural Hook: ''Толока'' and modern volunteering as the context for ''допомагати''.'
  - 'Group 2: Double Object (давати, дарувати, повідомляти + Acc + Dat). Formula:
    Give [something] [to someone].'
  - 'Standard Compliance: Use ''Повідомити групі'' example from State Standard §4.2.2.3.'
  - 'Group 3: Impersonal / Inverted (подобатися, здається). Detailed breakdown of
    the ''It pleases me'' structure.'
  - 'Nuance: ''Вірити'' (believe truth) vs ''Довіряти'' (trust reliability).'
- section: 'Практика: Відмінки в дії'
  words: 800
  points:
  - 'Drill 1: Identifying the Recipient. Sentences where the learner spots ''Who gets
    it?''.'
  - 'Drill 2: The ''Dyakuyu'' Fix. Correcting ''Дякую тебе'' to ''Дякую тобі''.'
  - 'Drill 3: Masculine Endings Focus. Prioritizing -ові/-еві for male persons (братові,
    Олегові).'
  - 'Drill 4: Transformation. Converting ''I like X'' into ''To me pleases X''.'
  - 'Drill 5: SOS & Urgent Requests. Imperative + Dative (''Допоможіть мені!'').'
- section: 'Діалоги: Взаємодопомога та Вдячність'
  words: 650
  points:
  - 'Dialogue 1: Organizing a Toloka (or Cleanup). Neighbors coordinating help using
    ''допомагати'', ''радити''.'
  - 'Dialogue 2: Official vs. Private. ''Повідомити колезі'' (work) vs. ''Розповісти
    другові'' (chat).'
  - 'Dialogue 3: Likes & Dislikes. Discussing hobbies using ''подобатися'' with emphasis
    on correct pronoun forms.'
  - 'Summary: The Cycle of Gratitude. ''Ти допоміг мені — я дякую тобі''.'
