slug: the-dative-i-pronouns
title: The Dative I — Pronouns
word_target: 3000
content_outline:
- section: Introduction / Вступ
  words: 400
  points:
  - 'Immersion Level: 50-60%. English is mandatory for all grammar explanations. Use
    Ukrainian only for examples and simple headers.'
  - 'Concept: Introduce the Dative Case (Давальний відмінок) as the ''Recipient''
    case (answer to Кому? Чому?).'
  - 'Core Function 1: Receiving action (giving TO someone, helping someone).'
  - 'Core Function 2: Age expressions (Мені 20 років) — contrast with English ''I
    am'' (Nominative) vs Ukrainian ''To me is'' (Dative).'
  - 'Why it matters: This is the key to expressing needs (''I need''), feelings (''I
    am cold''), and likes (''I like'').'
- section: Presentation / Презентація
  words: 1600
  points:
  - 'Pronoun Paradigm: Create a clear lookup table contrasting Nominative (Я, Ти...)
    with Dative (Мені, Тобі, Йому, Їй, Нам, Вам, Їм).'
  - 'The ''Like'' Inversion (Подобатися): Explain that the thing liked is the Subject
    (Nominative) and the person is Dative. Use a visual diagram: English SVO (''I
    like music'') → Ukrainian OVS (''Music pleases me'').'
  - 'Common Error Alert: Explicitly warn against ''Я подобаю''. Drill the correction:
    ''Мені подобається''.'
  - 'Needs (Треба / Потрібно): Structure ''Dative + Adverb + Infinitive'' (Мені треба
    йти). Explain that ''I'' is not the subject.'
  - 'Physical & Emotional States: Group expressions by pronoun form. ''Мені холодно''
    (I''m cold), ''Йому нудно'' (He''s bored), ''Їй весело'' (She''s having fun).'
  - 'Verbs requiring Dative: Focus on ''допомагати'' (help TO), ''дзвонити'' (call
    TO), ''давати'' (give TO). Contrast ''Help me'' (Eng direct obj) vs ''Допоможи
    мені'' (Ukr indirect).'
  - 'Cultural Context (Hospitality): The phrase ''Мені приємно'' (It is pleasant to
    me) as the standard response to introductions.'
  - 'Cultural Context (Taboos): The ''Threshold Rule'' (Never give things across a
    threshold) and ''Flower Numbers'' (Odd for living, even for funerals). Mention
    ''Bread and Salt'' given TO guests.'
- section: Practice / Практика
  words: 600
  points:
  - 'Drill 1: Nominative → Dative transformation (Я → Мені, Він → Йому).'
  - 'Drill 2: The ''Like'' Logic. Translate sentences requiring inversion (I like
    coffee → Кава подобається мені).'
  - 'Drill 3: Needs & States. Fill in the blank with correct pronoun: ''(___) холодно'',
    ''(___) треба працювати''.'
  - 'Error Correction: Identify and fix common mistakes like ''Я подобаю'' or ''Я
    допомагаю тебе''.'
- section: Dialogues / Діалоги
  words: 400
  points:
  - 'Scenario 1: Meeting New People. Using ''Мені приємно'', asking ''Як вам?''.'
  - 'Scenario 2: The Birthday Gift. Offering a gift (avoiding the threshold!), saying
    ''Це тобі'', asking ''Тобі подобається?''.'
  - 'Scenario 3: A Cold Day. Discussing feelings (''Мені холодно'') and needs (''Мені
    треба чай'').'
