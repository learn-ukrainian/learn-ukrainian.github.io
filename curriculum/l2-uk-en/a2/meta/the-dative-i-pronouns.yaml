content_outline:
  - section: "Introduction / Вступ"
    words: 300
    points:
      - "Concept: The Dative Case answers 'Кому?' (To whom?) — the 'Recipient' case"
      - "English Scaffolding: Compare with English 'Give TO me', 'Send TO him'"
      - "Cultural Hook: 'Bread and Salt' tradition — giving respect TO guests (гостям)"
      - "Why it matters: Expressing feelings and needs requires Dative in Ukrainian (unlike English 'I like')"
  - section: "Presentation / Презентація"
    words: 500
    points:
      - "Pronoun Paradigm Table: Nominative (Я, Ти...) vs Dative (Мені, Тобі...)"
      - "The 'Like' Trap: Deep dive into 'Мені подобається' (It pleases me) vs English 'I like'"
      - "Visual Aid Description: Diagramming the Subject-Object inversion for 'подобатися'"
      - "Expressing Needs: 'Мені потрібно' (It is necessary to me) + Infinitive/Noun"
      - "Physical & Emotional States: 'Мені холодно' (I'm cold), 'Мені сумно' (I'm sad)"
      - "Common Error Alert: 'Help' (допомагати) requires Dative (Help TO someone)"
      - "Cultural Superstition: Giving gifts (odd numbers for living people) — grammar in action"
  - section: "Practice / Практика"
    words: 150
    points:
      - "Guided pattern drill: Transforming 'I want' (Nom) to 'It is necessary to me' (Dat)"
      - "Review of 'Help' + Dative context scenarios"
      - "Self-check: Distinguishing Subject vs Recipient"
  - section: "Dialogues / Діалоги"
    words: 50
    points:
      - "Scenario 1: Hospitality (Host offering tea/coffee to guest)"
      - "Scenario 2: Expressing a state (It's cold/hot to me)"
