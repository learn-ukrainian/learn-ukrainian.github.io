slug: the-dative-i-pronouns
title: The Dative I — Pronouns
word_target: 3000
content_outline:
- section: Introduction / Вступ
  words: 400
  points:
  - 'Immersion Alert: 50-60%. Explain grammar in English to avoid confusion. Use clear,
    simple Ukrainian for examples.'
  - 'Concept: The Dative Case (Давальний відмінок) answers ''Кому?'' (To whom?) and
    ''Чому?'' (To what?).'
  - 'Core Function: The Recipient of an action (giving TO, telling TO, helping TO).'
  - 'The ''Experience'' Concept: In Ukrainian, you often don''t DO feelings, they
    happen TO you (I am cold → To me is cold).'
  - 'Why it matters: Essential for polite requests, expressing needs, and talking
    about age (Мені 20 років).'
- section: Presentation / Презентація
  words: 1600
  points:
  - 'Forms: Present the full paradigm of Personal Pronouns in Dative (Мені, Тобі,
    Йому, Їй, Нам, Вам, Їм). Use a lookup table.'
  - 'The ''Like'' Inversion (Подобатися): Explain the SVO → OVS shift. ''I like music''
    becomes ''Music (Nom) pleases me (Dat)''. Use a diagram.'
  - 'Needs (Треба / Потрібно): Structure ''Dative + Adverb + Infinitive/Noun''. Emphasize
    that the person is NOT the subject.'
  - 'Physical & Emotional States: Group by pronoun. ''Мені холодно'' (I''m cold),
    ''Йому нудно'' (He''s bored), ''Їй весело'' (She''s having fun).'
  - 'Key Verbs taking Dative: Focus on ''допомагати'' (help TO), ''дзвонити'' (call
    TO), ''давати'' (give TO), ''казати'' (tell TO).'
  - 'Cultural Hook 1: ''Мені приємно'' (It is pleasant to me) as the standard response
    to introductions.'
  - 'Cultural Hook 2: The Threshold Rule (Поріг). Never give things ''через поріг''.
    Step inside first!'
  - 'Hospitality: Offering food/drink (''Вам каву чи чай?'').'
- section: Practice / Практика
  words: 600
  points:
  - 'Drill 1: Nominative → Dative transformation (Я → Мені, Він → Йому). Simple substitution.'
  - 'Drill 2: The ''Like'' Logic. Translate sentences requiring inversion (I like
    coffee → Кава подобається мені).'
  - 'Drill 3: Needs & States. Fill in the blank with correct pronoun: ''(___) холодно'',
    ''(___) треба працювати''.'
  - 'Error Spotter: Identify and fix common mistakes like ''Я подобаю'' or ''Я допомагаю
    тебе''.'
- section: Dialogues / Діалоги
  words: 400
  points:
  - 'Scenario 1: Meeting New People. Using ''Мені приємно'', asking ''Як вам?''.'
  - 'Scenario 2: The Birthday Gift. Offering a gift (avoiding the threshold!), saying
    ''Це тобі'', asking ''Тобі подобається?''.'
  - 'Scenario 3: A Cold Day. Discussing feelings (''Мені холодно'') and needs (''Мені
    треба чай'').'
