slug: the-dative-i-pronouns
title: The Dative I — Pronouns
word_target: 3000
content_outline:
- section: 'Вступ: Роль адресата'
  words: 500
  points:
  - 'Immersion Alert (50-60% Band 1): Explicitly establish that English will be used
    to scaffold grammar concepts, while examples and dialogues will be in Ukrainian.'
  - 'Define the Dative Case (Давальний відмінок) focusing on its core questions: Кому?
    (To whom?) and Чому? (To what?).'
  - 'Introduce the ''Recipient Role'': explain that the Dative is used for the person
    or object for whose benefit or harm an action occurs.'
  - 'Explain the logic of quantitative age traits in Ukrainian: frame it as age happening
    *to* a person («Мені 20 років»), contrasting with English ''I am'' per State Standard
    A2 requirements.'
- section: 'Презентація: Форми та базові сполучення'
  words: 700
  points:
  - Each pronoun gets its own clear row in a comprehensive Nominative-to-Dative mapping
    table. Include IPA only for the first occurrence of each new Dative pronoun.
  - 'Dedicate an H3 subsection to high-frequency verb collocations requiring Dative:
    дай мені, скажи мені, дзвони йому, допоможи їй. Include 2+ example sentences for
    each.'
  - 'Add a specific note on register distinction: explain the polite use of «Вам»
    in hospitality and professional contexts (e.g., «Що Вам запропонувати?»).'
- section: 'Подобатися та Потрібно: Пастка інверсії'
  words: 800
  points:
  - 'Dedicate an H3 to the ''I Like'' Trap: Deconstruct the syntax of «Мені подобається».
    Use clear structural breakdowns to show how the English subject becomes the Ukrainian
    Dative recipient, and the English object becomes the Nominative subject.'
  - 'Dedicate an H3 to the ''I Need'' Trap: Contrast incorrect learner forms («Я треба»)
    with the correct impersonal states («Мені треба/потрібно»).'
  - 'Dedicate an H3 to ''Indirect Object Alignment'': Explain why «допомагати» (to
    help) and «дякувати» (to thank) take the Dative case, framing it independently
    without relying on Russian grammar comparisons.'
- section: 'Стани та емоції: Світ відчуттів'
  words: 500
  points:
  - 'Create an H3 for ''Physical States'': Explain the impersonal construction using
    adverbs («мені холодно», «йому жарко»). Provide 3+ practical examples.'
  - 'Create an H3 for ''Emotional States'': Explore phrases like «їй весело», «нам
    сумно», and «мені здається». Emphasize the feeling acting upon the person.'
  - Detail the logic of convenience and suitability with phrases like «мені зручно»
    and «їй пасує», accompanied by a short mini-dialogue.
- section: Культурний код та етикет
  words: 500
  points:
  - Explain the etiquette of first meetings using the Dative standard response «Мені
    приємно» with a short contextual dialogue.
  - 'Detail the ''Threshold Taboo'' («Не через поріг!»): Give cultural context on
    why one must not give gifts or shake hands across a threshold, utilizing Dative
    forms in the explanation.'
  - Describe hospitality norms and offering phrasing («Вам каву чи чай?») emphasizing
    the use of Dative pronouns when hosting guests.
