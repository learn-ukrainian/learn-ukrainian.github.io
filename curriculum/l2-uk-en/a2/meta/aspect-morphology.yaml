slug: aspect-morphology
title: Aspect Morphology
word_target: 3000
content_outline:
- section: 'Вступ: Концепція видових пар (Introduction: The Aspectual Pair Concept)'
  words: 450
  points:
  - Explicitly use English scaffolding to explain the abstract concept of aspect families
    (Band 1 immersion rule).
  - Introduce aspectual pairs not as separate words, but as a family relationship
    where one completes the other.
  - Use visual descriptions (e.g., 'Process' as an ongoing circle vs 'Result' as a
    check mark) to distinguish imperfective and perfective meanings.
  - Provide the first examples (e.g., писати – написати), emphasizing the shift from
    process to completed action, aligned with State Standard §4.3.2.
- section: Творення префіксами та правило правопису (Prefixal Formation and Spelling
    Rules)
  words: 750
  points:
  - Focus on high-frequency prefixes (про-, на-, з-, по-) and explain their semantic
    hints (e.g., 'по-' for duration/completion, 'з-' for transformative result).
  - Explicitly teach the 'з-' vs 'с-' spelling rule (перед к, п, т, ф, х - mnemonic
    'Кафе Птах') as a critical point to prevent common errors.
  - 'Analyze standard prefixal pairs mandated by the State Standard: робити–зробити,
    писати–написати, ділити–поділити.'
  - Present all examples and standard pairs in Ukrainian with clear context.
- section: Творення суфіксами та суплетивні пари (Suffixal Formation and Suppletive
    Pairs)
  words: 750
  points:
  - Explain secondary imperfectives using suffixes (-ва-, -ува-), connecting to daily
    routines (e.g., умиватися vs. вмитися).
  - Detail internal stem changes (e.g., -о- to -і-) and consonant mutations that accompany
    suffixation.
  - 'Present high-frequency irregular (suppletive) pairs from the State Standard:
    виходити – вийти, забувати – забути, лягати – лягти.'
  - Ensure all new vocabulary includes IPA on the first occurrence only.
- section: 'Практика: Помилки та вибір аспекту (Practice: Errors and Aspect Choice)'
  words: 600
  points:
  - Contrast 'Process vs. Result' using contextual examples (e.g., читав цю книгу
    vs прочитав цю книгу).
  - Explicitly correct the 'Future Tense Mismatch' error (using 'буду' with perfective
    verbs).
  - Demonstrate the nuance in the imperative mood (Читай! vs Прочитай!) for politeness
    and urgency.
  - Keep practice prompts and examples primarily in Ukrainian.
- section: Культурний контекст та діалоги (Cultural Context and Dialogues)
  words: 450
  points:
  - Write a 'Hospitality Dialogue' in full Ukrainian about preparing a meal for a
    guest, highlighting perfective results.
  - Write a 'Morning Rhythm Narrative' contrasting ongoing morning routines with completed
    actions (встав, вмився vs снідав).
  - Provide a brief grammatical summary recapping word-formation patterns as a tool
    for independent vocabulary expansion.
