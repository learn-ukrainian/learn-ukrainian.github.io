slug: basic-motion-prefixes
title: Basic Motion Prefixes
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Note on scaffolding: English used only to explain the core concept of prefixed
    motion; all examples in Ukrainian.'
  - 'Prefixes as the GPS of verbs: Explain that direction is built into the verb stem
    in Ukrainian, contrasting with English phrasal verbs.'
  - 'Reinforce base conjugations: Review the present tense of іти, їхати, ходити,
    їздити as the essential foundation (State Standard §4.2.3.1).'
- section: 'Презентація: В- та Ви-'
  words: 900
  points:
  - 'The Binary: Introduce В- (Into) vs Ви- (Out) using the ''Box Analogy'' (В- is
    an arrow into the box, Ви- is an arrow out).'
  - 'Prepositional Hooks: Explain pairing в/у/на + Accusative with входити/в''їжджати
    for destinations (State Standard §4.2.2.4.2).'
  - 'Perfective Shift: Teach the aspectual difference between входити (process) and
    увійти (one-time completed result).'
  - 'Phonetics and Euphony: Explain the use of the apostrophe (в''їхати vs виїхати)
    and euphony rules (увійти vs ввійти).'
  - 'The Space Rule: Contrast enclosed spaces (В) vs surfaces (На) (e.g., входити
    в кімнату vs виходити на вулицю).'
- section: Культурний контекст
  words: 500
  points:
  - 'The Threshold (Поріг): Discuss the cultural prohibition of shaking hands or passing
    things across a threshold.'
  - 'Kyiv Metro: Practical vocabulary application using Вхід, Вихід, and signs like
    Не притулятися.'
  - 'Urban Narratives: Describe daily commutes using в''їжджати/виїжджати and входити/виходити
    in an urban Ukrainian setting.'
- section: Практика та помилки
  words: 800
  points:
  - 'Address origin error: Explain the requirement of З + Genitive for the ''out of''
    vector with виходити/виїжджати.'
  - 'Address transport error: Emphasize the strict separation of foot (входити) vs
    vehicle (в''їжджати).'
  - 'Transformation drills: Guide learners from base verbs to prefixed verbs using
    origin and destination cues.'
  - 'Aspect confusion: Clarify the usage of входжу (habitual) vs увійшов (completed).'
- section: Підсумок та діалоги
  words: 400
  points:
  - 'Morning Routine Dialogue: A connected narrative from leaving the house (вийти)
    to entering the office (ввійти).'
  - 'Idiomatic Review: Present high-frequency collocations like входити в моду and
    виходити заміж.'
  - 'Summary checklist: Recap the В- + в/на (Accusative) and Ви- + з/із (Genitive)
    pairings.'
