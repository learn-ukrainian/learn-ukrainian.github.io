slug: spatial-prepositions
title: Spatial Prepositions
word_target: 3000
content_outline:
- section: Вступ / Introduction
  words: 400
  points:
  - 'Concept: Location (Де?) vs. Direction (Куди?) — The fundamental binary choice
    in Ukrainian spatial grammar.'
  - 'Decision Table: If ''Where?'' → Locative/Instrumental/Genitive. If ''Where to?''
    → Accusative/Genitive.'
  - 'Scaffolding: English explanation of why ''into'' and ''in'' often use different
    cases even with the same preposition.'
- section: Презентація / Presentation
  words: 1000
  points:
  - 'Group 1: В/У and НА (In/On). Contrast Static (Locative) vs. Motion (Accusative).
    Examples: *на столі* vs. *на стіл*.'
  - 'Usage Note: ''Open Space'' rule for НА (stadium, street, market) vs. ''Enclosed
    Space'' for В (room, school, shop).'
  - 'Group 2: Instrumental Prepositions (ПІД, ЗА, НАД, ПЕРЕД, МІЖ). Focus on static
    location (answering *Де?*).'
  - 'Cultural Insight: The layout of *Українська хата*. *Піч* as the reference point
    (*за піччю*, *перед піччю*).'
  - 'Group 3: Genitive Prepositions (БІЛЯ, НАВПРОТИ, ДО, З). Note that *біля/напроти*
    are static, *до/з* imply motion.'
- section: Практика / Practice
  words: 800
  points:
  - 'Pattern Drill: ''Where is the cat?'' (Static positions). Using *на, під, за,
    між* + correct case endings.'
  - 'Motion Sequences: ''Where does the cat go?'' (Direction). Switching to Accusative/Genitive.'
  - 'Correction Challenge: Fix the errors in case usage (e.g., *Я йду в кімнаті* →
    *в кімнату*).'
- section: Діалоги / Dialogues
  words: 800
  points:
  - 'Dialogue 1: ''Where is it?'' — Searching for items in a room. Focus on *під,
    за, на, у*.'
  - 'Dialogue 2: ''Arranging the Room'' (Interior Designer persona). Moving furniture
    (*Поставте стіл перед вікном*).'
  - 'Dialogue 3: ''On the Street'' — Giving simple directions using *напроти, біля,
    до*.'
