slug: plural-adjective-declension
title: Plural Adjective Declension
word_target: 3000
content_outline:
- section: 'Вступ: Один прикметник — багато форм'
  words: 300
  points:
  - 'Note the module''s immersion level (A2 Band 1: 50-60%). Use English scaffolding
    for the foundational grammar introduction.'
  - 'Define the core rule: adjectives must agree with plural nouns in case (один новий
    будинок → нові будинки → багато нових будинків).'
  - 'Hook the learner with the proverb: «Старий друг краще нових двох» to demonstrate
    how adjectives shift forms depending on case and number.'
  - 'Highlight a major relief for learners: in the plural, Ukrainian adjectives lose
    gender distinctions. There is only one single form per case for all genders.'
- section: Називний та Знахідний відмінки множини
  words: 600
  points:
  - 'Provide a dedicated H3 for Nominative Plural. Emphasize the elegant simplicity:
    both hard and soft groups take the ending ''-і'' (великі, нові, сині).'
  - Provide a dedicated H3 for Accusative Plural Inanimate. Show that it perfectly
    matches the Nominative Plural form (бачу нові будинки, купую гарні квіти).
  - Provide a dedicated H3 for Accusative Plural Animate. Explain that for living
    beings, it matches the Genitive Plural (бачу нових студентів, люблю маленьких
    дітей).
  - Include 5+ example sentences with English translations showing these forms in
    natural context.
- section: Родовий та Давальний відмінки множини
  words: 600
  points:
  - 'Provide an H3 for Genitive Plural. Explain the endings: -их for hard group (нових,
    старих) and -іх for soft group (синіх). Show usage after ''багато'', ''немає'',
    ''кілька''.'
  - 'Include high-frequency contextual examples for Genitive: ''багато нових слів'',
    ''немає старих книг''.'
  - 'Provide an H3 for Dative Plural. Explain the endings: -им for hard (новим, старим)
    and -ім for soft (синім). Show usage with verbs like ''давати'' and ''допомагати''.'
  - Include a contrastive explanation of singular vs. plural Genitive to preempt the
    common error of mixing singular adjective endings with plural nouns.
- section: Орудний та Місцевий відмінки множини
  words: 600
  points:
  - 'Provide an H3 for Instrumental Plural. Explain endings: -ими (новими) and -іми
    (синіми). Focus on usage with prepositions ''з'', ''між'', ''перед''.'
  - 'Provide an H3 for Locative Plural. Explain endings: -их (нових) and -іх (синіх).
    Point out that it looks identical to Genitive plural but ALWAYS requires a preposition
    (у/в, на, по).'
  - Provide a specific memory hook/tip box explicitly distinguishing Genitive (often
    quantity/no prep) from Locative (always location/prep).
  - Include a short reading passage describing a Ukrainian city using Locative plural
    (у нових кварталах, на старих вулицях).
- section: Повна зведена таблиця відмінювання
  words: 400
  points:
  - Present a complete, clean markdown table showing plural declension for all 7 cases.
  - Put a hard group adjective (новий) and a soft group adjective (синій) side-by-side
    to clearly show the visual vowel shift (-их/-іх, -им/-ім, -ими/-іми).
  - Add a clear tip explicitly stating that the Vocative plural for adjectives equals
    the Nominative plural.
  - 'Provide a mnemonic summary box for the endings: Nom/Acc-inan → -і; Gen/Loc →
    -их/-іх; Dat → -им/-ім; Inst → -ими/-іми.'
- section: 'Практика: Опис і порівняння'
  words: 500
  points:
  - 'Create a guided, step-by-step description of a group of people using all cases:
    ''нові студенти'' (Nom) through to ''з новими студентами'' (Inst).'
  - Include an error correction section where the learner sees common mistakes (e.g.,
    using Russian-style endings or mismatched gender in plural) and the corrections.
  - Provide 10 brief phrases in a 'Quick Drill' format (e.g., 'many beautiful cities'
    → 'багато гарних міст').
