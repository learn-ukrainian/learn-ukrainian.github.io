slug: reflexive-sebe
title: Reflexive Pronoun Sebe
word_target: 2000
content_outline:
- section: 'Вступ: Навіщо «себе»?'
  words: 400
  points:
  - 'Introduce the concept of a reflexive pronoun: a word that points the action back
    to the subject. Note English scaffolding requirement for explaining this abstract
    concept (Immersion band: 50-60%).'
  - 'Explain the elegance of Ukrainian: one word (себе) replaces the complex English
    system (myself, yourself, himself, herself, ourselves, themselves).'
  - 'Clarify the ''missing Nominative'' rule: sebe can never be the subject, so it
    has no Nominative form. It only exists as the target or beneficiary of an action.'
- section: Відмінювання «себе»
  words: 600
  points:
  - Provide a clear, complete declension table for sebe (Gen/Acc, Dat/Loc, Inst).
  - 'H3: Genitive/Accusative (себе). Explain it as the direct object. Provide 4+ examples
    (e.g., Я бачу себе).'
  - 'H3: Dative/Locative (собі, на собі). Explain it as the beneficiary (купити собі)
    or location (думати про себе). Provide 4+ examples.'
  - 'H3: Instrumental (собою). Explain it with states and preposition ''з'' (задоволена
    собою). Provide 4+ examples.'
  - Include a short self-check drill to choose the correct case form based on context.
- section: Дієслова з «себе» vs зворотні дієслова
  words: 600
  points:
  - Contrast explicit себе with the -ся verb suffix. Explain that -ся is for natural,
    routine actions (митися, одягатися).
  - 'Explain that себе is used for emphasis or psychological actions (контролювати
    себе, бачити себе). Give contrastive examples: Він одягає себе (weird/emphatic)
    vs Він одягається (natural).'
  - List verbs that *must* take -ся and cannot take себе (сміятися, намагатися, боятися).
  - Include a comprehension check asking learners to pick the most natural phrasing
    (a or b).
- section: Конструкція «собі» як підсилення
  words: 400
  points:
  - Introduce the colloquial 'dative of interest' where собі softens or dismisses
    an action.
  - Provide examples like 'Іди собі!' (Just go away!) and 'Сидить собі читає' (Just
    sitting there reading).
  - 'Explain the register: it is very common in spoken Ukrainian and folklore, but
    learners should focus on recognizing it rather than overusing it.'
  - Provide a mini-dialogue featuring the intensifier.
- section: 'Зв''язок з «свій»: себе + свій'
  words: 500
  points:
  - 'Directly contrast the functions: свій is for possession (whose is it?), себе
    is for the action''s target (who is receiving the action?).'
  - 'Show them used together in one sentence: Вона купила собі свою першу машину (She
    bought herself her first car).'
  - 'Provide the golden rule: If you can say ''own'', use свій. If you can say ''-self'',
    use себе.'
  - Include a 10-item fill-in-the-blank practice contrasting the two.
- section: Практика
  words: 500
  points:
  - Include a comprehensive dialogue where characters discuss personal habits, using
    multiple forms of себе, -ся verbs, and свій. Follow with comprehension questions.
  - 'Sentence completion: supply the correct case form of sebe for given sentences.'
  - 'Translation/Transformation task: rephrase English sentences into natural Ukrainian,
    choosing correctly between -ся and себе.'
  - Wrap up with an encouraging summary of how this simplifies talking about oneself.
