slug: work-professions
title: Work and Professions
word_target: 3000
content_outline:
- section: 'Вступ: Світ роботи (Introduction: World of Work)'
  words: 450
  points:
  - 'Note for writer: Implement Band 2 Immersion (60-75%). Use Ukrainian for all contextual
    framing, introductions, and examples. English is restricted to complex grammar
    rules.'
  - Present the modern Ukrainian job market context in Ukrainian, highlighting the
    IT sector as a cultural hook («програміст», «працювати віддалено», «гнучкий графік»).
  - Introduce high-frequency workplace collocations («шукати роботу», «місце роботи»,
    «цікава робота», «важка робота») in short, immersive Ukrainian sentences.
  - Provide IPA on the first occurrence of key vocabulary items in this section.
- section: Назви професій та гендер (Profession Names and Gender)
  words: 600
  points:
  - 'Introduce core profession vocabulary with explicit focus on natural Ukrainian
    feminine counterparts (фемінітиви: лікар/лікарка, вчитель/вчителька).'
  - Highlight that feminine forms are standard and historically natural in Ukrainian,
    ensuring gender balance in all examples.
  - Detail educational titles («професор», «доцент») and their formal usage.
  - Include a culturally immersive note about Teacher's Day (День вчителя) on the
    first Sunday of October, demonstrating the social respect for the profession.
- section: 'Граматика: Орудний відмінок (Grammar: Instrumental Case)'
  words: 850
  points:
  - Explain the logic of the Instrumental case representing 'Role/Function' when characterizing
    a person by profession (State Standard §4.2.2.5.1). Use English scaffolding for
    this abstract concept.
  - 'Explicitly teach the verb triggers: «працювати», «бути», and «стати» require
    the Instrumental case (e.g., «Олег буде програмувальником»).'
  - 'Address the common learner error: contrast the present tense Nominative («Я —
    лікар») with the mandatory past/future Instrumental («Я був лікарем», «Я буду
    лікарем»).'
  - Provide a clear, simple paradigm table contrasting masculine (-ом/-ем/-єм) and
    feminine (-ою/-ею/-єю) noun endings to prevent mismatch errors.
- section: Діловий етикет та звертання (Business Etiquette and Address)
  words: 550
  points:
  - Explain Ukrainian formal address in the workplace («Пан» / «Пані» + First Name
    or Surname) as an authentic polite tradition.
  - Differentiate professional relationship vocabulary («колега», «керівник», «підлеглий»)
    from personal friendships.
  - Drill formal collocations like «шановний колега» and «порада колеги» within short,
    realistic Ukrainian office dialogues.
- section: 'Практика: Співбесіда та обов''язки (Practice: Interview and Duties)'
  words: 550
  points:
  - 'Introduce essential job hunting vocabulary: «співбесіда» and «резюме», acting
    as a bridge to module a2-64.'
  - Provide 2-3 mini-dialogues in Ukrainian simulating a basic job interview, focusing
    on describing past experience and duties («проходити співбесіду»).
  - Drill action verbs governing specific professional roles (e.g., «викликати лікаря»,
    «бути класним керівником») to solidify the Instrumental case and vocabulary in
    context.
