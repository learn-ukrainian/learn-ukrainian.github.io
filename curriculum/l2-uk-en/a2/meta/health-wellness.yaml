slug: health-wellness
title: Health & Wellness
word_target: 3000
content_outline:
- section: 'Вступ: Здоров''я — найбільше багатство'
  words: 400
  points:
  - Set context fully in Ukrainian (Band 3 immersion). Discuss the proverb «Здоров'я
    — найбільше багатство» as a cultural motivator.
  - 'Note for content writer: explicit scaffolding rule — all grammar/concept explanations
    must be in Ukrainian; English translations only in vocab lists.'
  - 'Define the Ukrainian trinity of health: physical, mental, and spiritual well-being.'
- section: 'Презентація: Моє тіло та самопочуття'
  words: 700
  points:
  - Teach the 'У мене болить + Nom' construction using clear tables. Explicitly contrast
    singular vs plural agreement ('болить зуб' vs 'болять зуби').
  - Explain impersonal states with Dative case ('мені погано', 'мені краще') according
    to §4.2.2.3.
  - Include a mini-dialogue checking on someone's well-being ('Як ти себе почуваєш?').
- section: Здоровий спосіб життя та ментальне здоров'я
  words: 600
  points:
  - 'Introduce daily routine collocations: ''правильне харчування'', ''робити зарядку''.'
  - Teach advice structures using 'треба' / 'варто' + infinitive ('Варто більше відпочивати')
    for mental health and stress management.
  - Highlight 'вуличні тренажери' in public parks via an engagement callout box.
- section: Народна медицина та традиційні практики
  words: 600
  points:
  - Discuss 'чай з малиною', 'липа', and 'калина' as modern, active remedies rather
    than historical folklore.
  - Introduce wellness practices like 'баня', teaching related vocabulary ('паритися',
    'віник').
  - Integrate comparative adjectives ('чай більш корисний') as per §4.3.1.
- section: Система охорони здоров'я та аптека
  words: 700
  points:
  - Differentiate 'лікар' vs 'лікарня' to fix common learner translation errors.
  - Explain the modern 'сімейний лікар' system, 'медичне страхування', and 'декларація'.
  - Provide a practical, realistic dialogue situated in a 'цілодобова аптека' asking
    for cold medicine ('ліки від грипу').
