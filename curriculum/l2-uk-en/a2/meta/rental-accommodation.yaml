slug: rental-accommodation
title: Rental Accommodation
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'H3: Український ринок оренди. Describe the renting process based on State Standard
    §3.2. Contrast «винаймання квартири» (renting an apartment) and «приватний будинок»
    (private house). Ensure Ukrainian prose is at least 75-90%.'
  - 'H3: Без посередників. Explain the cultural preference for avoiding real estate
    agents to save commission. Define «комісія рієлтора» and «послуги рієлтора».'
  - 'H3: Депозит і застава. Describe the upfront payment standard (first month + security
    deposit). Clarify the usage of «застава» and «депозит».'
- section: Презентація лексики
  words: 500
  points:
  - 'H3: Здавати чи знімати? Detail the core distinction with a comparison table.
    Address the common learner error: «здати» (landlord gives) vs «зняти/орендувати»
    (tenant takes).'
  - 'H3: Типи житла. Distinguish «кімната» (a single room in a shared apartment) from
    «однокімнатна квартира» (a full 1-bedroom apartment, not a studio). Include visual
    cues or bullet points.'
  - 'H3: Власник і орендар. Introduce high-frequency vocabulary («оренда», «квартира»,
    «власник») and common collocations («від власника», «я власник») in short sentence
    examples.'
- section: 'Контекстне читання: Оголошення'
  words: 500
  points:
  - 'H3: Читаємо оголошення. Provide 2-3 realistic short apartment rental ads featuring
    terms like «здається», «довгострокова оренда», «подобова оренда».'
  - 'H3: Євроремонт та радянський стан. Explain these terms as cultural markers of
    apartment quality and price in Ukraine.'
  - 'H3: Важливі деталі. Break down abbreviations and standard ad details: «поверх»
    (floor), «площа» (area), and «техніка».'
- section: 'Діалог: Огляд квартири'
  words: 600
  points:
  - 'H3: Домовляємося про зустріч. A mini-dialogue on calling the owner («дзвонити
    власникові») and asking «Коли можна подивитися?».'
  - 'H3: На огляді. A full dialogue simulating an apartment viewing. Include questions
    about furniture («квартира з меблями/без меблів») aligning with Standard §3.2.'
  - 'H3: Головне питання. Drill the essential question: «А комунальні включені?» and
    «Скільки за комунальні?». Provide multiple response examples.'
- section: Комунальні послуги та умови
  words: 400
  points:
  - 'H3: Що таке комунальні? Breakdown of utilities: газ, вода, електрика, опалення.
    Explain the typical ''rent + utilities'' pricing model.'
  - 'H3: Включені чи плюс? Address the learner error by drilling the contrast between
    «комунальні включені» and «плюс комунальні» with 4-5 example sentences.'
  - 'H3: Лічильники. Explain utility management using meters («лічильники») and the
    phrase «платити за комунальні».'
- section: Укладання договору
  words: 300
  points:
  - 'H3: Договір оренди. Present the legal vocabulary needed for closing the deal:
    «підписати договір оренди», «умови договору», «термін оренди».'
  - 'H3: Фінансові умови. Reiterate the financial terms in the context of the contract:
    «страховий депозит», «повернути депозит».'
  - 'H3: Практичні поради. A tip box with advice on what to check before signing.'
- section: Практика та розповідь
  words: 300
  points:
  - 'H3: Куди чи Де? Grammar focus section contrasting Accusative (motion: «переїжджати
    в нову квартиру») and Locative (location: «жити у новій квартирі»). Provide 5
    contrasting examples.'
  - 'H3: Моя нова квартира. A concluding narrative (approx. 100 words) where the persona
    describes successfully finding a place «без посередників», tying together the
    module''s vocabulary.'
