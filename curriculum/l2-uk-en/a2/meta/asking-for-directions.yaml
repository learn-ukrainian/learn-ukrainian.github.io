slug: asking-for-directions
title: Asking for Directions
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Set immersion baseline explicitly: 75-90% Ukrainian prose. English only for brief
    scaffolding.'
  - Introduce the urban environment context (§3) and basic navigation vocabulary (прямо,
    ліворуч, праворуч).
  - 'Persona hook: A lost tourist in Odesa trying to find their way. Establish the
    cultural premise that navigating requires humor and understanding local styles.'
- section: Презентація
  words: 950
  points:
  - 'Explain the core foot vs. vehicle distinction (§4.2.3.1: йти vs. їхати) exclusively
    in Ukrainian with clear contextual examples.'
  - Provide the present tense conjugation paradigms for 'іти/йти' and 'їхати' in a
    clear table format. Address the phonetic similarity (іду vs. їду).
  - Highlight and correct the 'Я йду в Київ' learner error (using 'йти' for long,
    vehicle-based travel).
  - Introduce habitual vs. unidirectional motion (йти vs. ходити) and correct the
    'йти кожен день' error.
  - 'Explain basic prefix nuances: по- (departure/starting) vs. при- (arrival), correcting
    the ''приїхав у магазин'' (when just leaving) error.'
- section: Культурний контекст
  words: 650
  points:
  - 'Discuss the Odesa communication style: answering questions with questions, and
    giving elaborate narrative directions.'
  - Explain the cultural preference for relative landmark navigation ('біля аптеки',
    'перед пам'ятником') over strict distances.
  - Use 2-3 short, humorous examples of 'typical' Odesa direction-giving.
- section: Практика та діалоги
  words: 600
  points:
  - Provide a mini-dialogue finding a famous Odesa icon (e.g., the Opera House or
    Pryvoz market) using 'йти/їхати' correctly.
  - Provide a second dialogue focusing on public transport (маршрутка, трамвай, зупинка)
    and asking where to get off.
  - Embed engagement callouts highlighting the natural phrasing of the dialogues.
- section: Підсумок та розповідь
  words: 400
  points:
  - Present a short, humorous narrative based on a classic Odesa anecdote about a
    tourist asking for directions to the street they are already on.
  - 'Synthesize the main grammar takeaway: the absolute necessity of distinguishing
    foot vs. vehicle movement and unidirectional vs. habitual.'
