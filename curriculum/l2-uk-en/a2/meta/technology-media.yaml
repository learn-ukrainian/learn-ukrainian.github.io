slug: technology-media
title: Technology and Media
word_target: 3000
content_outline:
- section: 'Вступ: Україна як IT-хаб'
  words: 500
  points:
  - Introduce Ukraine's digital landscape and the 'IT Nation' concept, highlighting
    major tech hubs.
  - Note the module's Band 2 immersion level (60-75%), providing scaffolding only
    for abstract grammar rules.
  - Explain the cultural shift in daily communication, where 'смартфон' has largely
    replaced 'телефон'.
- section: Цифровий словник та культура
  words: 700
  points:
  - Present core hardware vocabulary (комп'ютер, ноутбук, планшет, смартфон) with
    Ukrainian definitions and IPA on first use.
  - Discuss the 'Diia' (Дія) app phenomenon and the 'State in a smartphone' philosophy
    to contextualize 'мобільний додаток'.
  - Introduce essential internet terms (вебсайт, посилання, пароль, мережа) using
    a structured vocabulary table.
- section: Граматичні пастки та вибір слів
  words: 600
  points:
  - 'Address the prepositional trap: explicitly correct the English calque ''на інтернеті''
    to the proper Locative ''в інтернеті''.'
  - Contrast standard Ukrainian 'завантажити' (download) with the colloquial/Russian-influenced
    'скачати'.
  - 'Explain case governance for tech brands: ''шукати в ґуґлі'' (adapted and declined
    in Locative) vs. ''шукати в Google'' (original, undeclined).'
  - 'Differentiate directional verbs: ''завантажити'' (to download) versus ''викласти''
    or ''опублікувати'' (to upload/post).'
- section: 'Практика: Життя в мережі'
  words: 700
  points:
  - Provide a realistic remote work dialogue using collocations like 'надіслати посилання'
    and 'перейти за посиланням', building on a2-49.
  - Include a narrative text ('The Digital Grandma') about teaching an older relative
    to use 'Дія', practicing 'встановити додаток' and 'ввести пароль'.
  - Create a short social media profile description incorporating 'соціальна мережа',
    'підписка', and 'оновлення'.
- section: Підсумок та поради
  words: 500
  points:
  - Summarize the key tech collocations and the rules for their correct usage in the
    Locative case.
  - Reinforce the preference for standard Ukrainian terminology in the conversational
    (розмовний) register.
  - Provide a self-reflection prompt asking learners to describe their most-used 'додатки'
    and digital habits in Ukrainian.
