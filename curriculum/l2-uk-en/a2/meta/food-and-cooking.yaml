slug: food-and-cooking
title: Food and Cooking
word_target: 3000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Note on Immersion (60-75%): Use English scaffolding strictly for the intro hook,
    transitioning quickly to Ukrainian prose.'
  - 'Introduce the core principle of Ukrainian hospitality: «Чим хата багата, тим
    і рада» (What the house is rich in, it is glad to offer). Explain the cultural
    significance of sharing food.'
  - 'Introduce the module objectives aligned with §3.10: mastering kitchen equipment
    (посуд) and cooking methods (способи приготування).'
  - Highlight Borshch as a UNESCO Intangible Cultural Heritage (recognized in 2022),
    framing it as a defining cultural process rather than just a soup.
- section: 'Лексика: Кухня та приготування'
  words: 700
  points:
  - Introduce high-frequency kitchen equipment (каструля, сковорода, духовка, ніж)
    using a clear vocabulary table. Include IPA for the first occurrence of each new
    word.
  - Define core cooking verbs (варити, смажити, пекти, різати) with 3+ Ukrainian example
    sentences and collocations for each.
  - Explicitly clarify the semantic nuance between 'варити' (boiling in liquid) and
    the generic 'готувати' (to prepare), using English briefly to prevent the common
    learner error.
  - 'Provide a contrastive explanation of tastes: солодкий (sweet) vs солоний (salty),
    using the versatility of varenyky fillings as the primary example.'
- section: 'Граматика: Орудний відмінок та Наказовий спосіб'
  words: 750
  points:
  - 'Explain the Instrumental case for tools (§4.2.2.5.1). Explicitly correct the
    common error of using ''з'' for tools (*різати з ножем) versus the correct form:
    різати ножем.'
  - Provide a comparative paradigm table showing Nominative to Instrumental shifts
    for all three genders (ніж -> ножем, ложка -> ложкою, масло -> маслом).
  - Contrast 'Instrumental for tools' (no preposition) with 'Instrumental for accompaniment'
    (with 'з/із'). Provide 5+ contrastive examples (e.g., різати ножем vs. вареники
    зі сметаною).
  - Introduce the Imperative mood (§4.2.3.2) specifically for following recipes. Focus
    on 2nd person singular forms (наріж, додай, звари, перемішай) with a mini-dialogue
    in Ukrainian.
- section: 'Культура: Традиційні страви'
  words: 650
  points:
  - Write a deep dive into Borshch culture in highly immersive Ukrainian prose. Explain
    the 'зажарка' process and the concept that every family recipe is authentic.
  - 'Discuss varenyky in Ukrainian: contrast main dishes (cabbage, meat) with desserts
    (cherries, cottage cheese), and describe the communal family ritual of making
    them.'
  - Include a `[!cultural]` callout box detailing table etiquette and authentic Ukrainian
    hospitality phrases, emphasizing the host's active role.
- section: Практика та Підсумок
  words: 450
  points:
  - Create a step-by-step cooking dialogue in Ukrainian (e.g., cooking with a grandmother)
    that contextualizes the new vocabulary, Instrumental case, and Imperative instructions.
  - Construct a short, authentic Ukrainian recipe using sequence markers (спочатку,
    потім, наприкінці) and imperative verbs (наріж овочі, поклади у каструлю).
  - Provide a final summary of key §3.10 competencies, ending with a quick self-check
    on the instrument vs. accompaniment distinction.
