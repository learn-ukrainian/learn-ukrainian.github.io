slug: checkpoint-full-grammar
title: Checkpoint — Full Grammar
word_target: 3000
content_outline:
- section: Вступ та огляд
  words: 400
  points:
  - 'Establish the goal of this A2 checkpoint: self-assessment of the 7 cases and verb aspect.'
  - Explicitly mention the Band 3 immersion policy (75-90% Ukrainian) and how English will be minimized.
  - 'Introduce the core vocabulary for self-correction: ''помилка'', ''виправити помилку'', ''правило''.'
- section: 'Навичка 1: Милозвучність та мелодійність'
  words: 500
  points:
  - Define 'Милозвучність' in simple Ukrainian, framing it as the logic behind the language's melodic nature.
  - Create an H3 subsection for 'у / в' alternation with clear comparative examples (e.g., в Україні vs у Франції).
  - Create an H3 subsection for 'і / й' alternation, showing how it bridges words seamlessly.
  - Include a 'Tip' callout on how these rules prevent harsh consonant clusters.
- section: 'Навичка 2: Система відмінків та Кличний'
  words: 600
  points:
  - Provide a consolidated summary table of all 7 cases with their primary question words (хто/що, кого/чого, etc.) in Ukrainian.
  - Dedicate an H3 to the Vocative case (Кличний відмінок), highlighting its cultural role in showing respect.
  - Address the common error of using the Accusative instead of the Genitive in negative structures (e.g., 'не маю часу').
  - Include 3-4 sentence examples requiring the learner to mentally identify the case used.
- section: 'Навичка 3: Дієслово: Вид та Рух'
  words: 600
  points:
  - Create an H3 for Aspectual Pairs (Вид дієслова), contrasting process (недоконаний) vs. result (доконаний) using the verbs 'вибирати' and 'вибрати'.
  - Create an H3 for Verbs of Motion (Дієслова руху), strictly differentiating 'іти/ходити' (on foot) from 'їхати/їздити' (by vehicle).
  - Provide a mini-dialogue that naturally demonstrates the contrast between imperfective past and perfective past.
- section: 'Навичка 4: Сфери життя та Метамова'
  words: 500
  points:
  - 'Introduce basic Ukrainian grammatical metalanguage: ''іменник'', ''дієслово'', ''відмінок'', ''речення''.'
  - Explain that knowing these terms will help them ask questions completely in Ukrainian moving into the B1 level.
  - Integrate daily life and health vocabulary to demonstrate how meta-language applies to real sentences (e.g., 'Де в цьому реченні дієслово?').
- section: Підсумок та інтеграція
  words: 400
  points:
  - Present a comprehensive reading paragraph (approx. 100 words) that integrates multiple cases and both verb aspects.
  - Provide self-reflection questions in Ukrainian ('Чи ви розумієте...', 'Чи ви можете...').
  - Conclude with an encouraging message from the 'Literary Editor' persona, celebrating the completion of the A2 grammar core.
