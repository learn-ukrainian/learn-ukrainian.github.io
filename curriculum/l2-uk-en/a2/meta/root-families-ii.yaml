slug: root-families-ii
title: Root Families II
word_target: 3000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Note on Immersion (Band 2): Establish that English is used here to unpack abstract
    word-formation mechanics, while subsequent examples and dialogues strictly transition
    to Ukrainian.'
  - 'Introduce the concept of cognitive root families as foundational networks: дум-
    (thought), говор-/мов- (speech), and слух- (hearing).'
  - 'Deploy the cultural hook: Ukrainian roots contain embedded logic, specifically
    exploring the etymological link between active listening (слухати) and obedience
    (слухняний).'
- section: Презентація
  words: 900
  points:
  - 'The ''дум-'' family: Detail the verb ''думати'' (process) versus ''вважати''
    (formal opinion), and the noun ''думка''. Provide 3+ Ukrainian examples using
    collocations like «на мою думку».'
  - 'The ''говор-/мов-'' family bridge: Explain the visual and semantic connection
    between ''говорити'' and ''розмовляти''. Define the prefix «роз-» as indicating
    a reciprocal exchange.'
  - 'The ''слух-'' family: Emphasize the active nature of ''слухати'' and analyze
    ''слухняний'' as a culturally significant derivative.'
  - 'Introduce prefix logic with «від-»: Demonstrate how it alters «мов-» to create
    «відмова» (refusal — literally ''speaking back/away''), providing clear Ukrainian
    example sentences.'
- section: Культурний контекст та лексичні нюанси
  words: 700
  points:
  - 'Explain the critical ''Мова'' vs. ''Язик'' distinction: Clarify that ''язик''
    is strictly anatomical, and ''мова'' is language. Include a strong error alert
    against ''український язик'' to prevent colonial/Russian transfer.'
  - 'Analyze the proverb «Слово – срібло, мовчання – золото»: Use it to introduce
    and contextualize the derivative ''мовчання'' within the ''мов-'' family.'
  - 'Detail the Process vs. Result distinction: Clearly separate ''говорити'' (the
    physical ability/process) from ''казати'' (the content/delivery of the message),
    addressing State Standard §4.5.1 on synonymy.'
- section: Практика та корекція помилок
  words: 600
  points:
  - 'Implement a Root Family Sorting exercise concept: Guide learners to differentiate
    and categorize the semantic clusters of ''thought'', ''speech'', and ''listening''.'
  - 'Provide an Error Correction Lab: Address the ''казати'' vs. ''говорити'' and
    ''слухати'' vs. ''чути'' (active vs. passive) confusions using exclusively correct
    Ukrainian models.'
  - 'Include a ''Build the Thought'' derivation drill: Show the transformation from
    verbs to nouns (дум- → думка, мов- → розмова) with inline Ukrainian practice sentences.'
- section: Діалоги та підсумок
  words: 350
  points:
  - Present a 'Deep Conversation' dialogue in full Ukrainian showcasing verbs of opinion
    («я думаю», «я вважаю») and reaction phrases («цікава думка»).
  - Present a 'Refusal Scenario' mini-dialogue featuring a polite «відмова», naturally
    incorporating the instrumental (з ким?) and accusative (про що?) cases.
  - Summarize the module entirely in Ukrainian, reinforcing how these root families
    serve as powerful, interconnected memory anchors for lexical growth.
