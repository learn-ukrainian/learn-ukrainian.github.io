slug: sports-fitness
title: Sports and Fitness
word_target: 2000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Set the context in Ukrainian (Band 3 immersion): Introduce the importance of
    sports in Ukraine.'
  - 'Cultural Hook (H3): Discuss Andriy Shevchenko (2004 Ballon d''Or) and the cultural
    significance of «Вболівати за Динамо».'
  - Provide a short introductory text (4-5 sentences) using the new vocabulary in
    context.
- section: Спортивні споруди та види спорту
  words: 700
  points:
  - 'Vocabulary Presentation (H3): Introduce facilities (стадіон, басейн, корт, спортзал)
    with IPA on first use.'
  - Distinguish team sports (футбол, баскетбол) from individual fitness (біг, плавання,
    йога).
  - 'Cultural Insight (H3): Mention Ukrainian boxing legends (Usyk, Klitschko) to
    contextualize individual sports.'
  - Include a mini-dialogue discussing where people train (e.g., 'Я ходжу в басейн,
    а ти в спортзал?').
- section: 'Граматика: Керування дієслів'
  words: 950
  points:
  - 'Rule 1 (H3): Explain ''грати в/у'' + Accusative for team/ball games (грати у
    футбол, грати в теніс). Emphasize the mandatory preposition.'
  - 'Rule 2 (H3): Explain ''займатися'' + Instrumental for individual sports and fitness
    (займатися спортом, займатися боксом). Show the paradigm for Instrumental endings.'
  - 'Comparison Table (H3): Visual table contrasting ''грати в'' vs. ''займатися''
    with clear examples.'
  - 'Usage Note (H3): Explicitly distinguish ''грати'' (sports/instruments) from ''гратися''
    (children''s play/toys).'
- section: Практика та діалоги
  words: 600
  points:
  - 'Dialogue 1 (H3): Two friends discussing their favorite teams and using ''вболівати
    за'' + Accusative.'
  - 'Dialogue 2 (H3): Discussing a fitness routine (''тренування'', ''ходити в спортзал'')
    using ''займатися'' + Instrumental.'
  - Provide scaffolding questions after each dialogue to test comprehension in Ukrainian.
- section: Здоровий спосіб життя та підсумок
  words: 300
  points:
  - Concluding paragraph summarizing healthy habits (здоровий спосіб життя) using
    the target verbs.
  - Final recap table of the core verb government rules.
  - Provide an encouraging closing statement in the persona of the 'Encouraging Cultural
    Guide / Olympic Trainer'.
