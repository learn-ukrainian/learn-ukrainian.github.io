slug: numeral-case-agreement
title: Numerals and Case Agreement
word_target: 3000
content_outline:
- section: 'Вступ: Чому "дві книги" але "п''ять книг"?'
  words: 300
  points:
  - 'Present the puzzle: establish that Ukrainian uses three distinct agreement zones
    for numbers (1, 2-4, 5+), unlike the simple singular/plural binary in English.'
  - 'Explicitly state English scaffolding requirements: use English to explain the
    concept of ''agreement zones'', but keep the introductory examples in Ukrainian.'
  - Provide a clear mental model with a quick table summarizing Zone 1 (один), Zone
    2 (два–чотири), and Zone 3 (п'ять і більше).
  - 'Set a practical, encouraging tone: ''You need this for shopping and travel!'''
- section: Один/одна/одне + називний
  words: 400
  points:
  - 'H3 for Gender Agreement: define the forms (один for masculine, одна for feminine,
    одне for neuter) with 3 clear examples for each.'
  - 'H3 for Plural-Only Nouns: introduce the special form ''одні'' for words like
    двері, штани, окуляри.'
  - Provide a mini-dialogue at a market demonstrating the use of 'одна гривня' vs
    'один долар'.
  - Include a callout warning against the '*один книга*' error.
- section: Два/три/чотири + називний множини
  words: 700
  points:
  - 'H3 for Gender forms of Two: drill the difference between ''два'' (masc/neut)
    and ''дві'' (fem) to prevent ''*два пляшки*'' errors.'
  - 'H3 for The Zone 2 Pattern: explain that 2, 3, and 4 trigger the Nominative Plural
    noun form. Provide extensive examples: два друзі, три книги, чотири міста.'
  - 'H3 for Adjective Agreement: show how adjectives behave (два великі будинки, три
    нові книги) taking Nominative Plural.'
  - Include a [!cultural] callout about the ancient dual number (*двоїна*) to explain
    why 2-4 behave differently, framing it as a unique Ukrainian feature (decolonized
    approach).
- section: П'ять і більше + родовий множини
  words: 700
  points:
  - 'H3 for The Zone 3 Pattern: explain that 5–20 and multiples of 10 trigger the
    Genitive Plural. Link back to previously learned Genitive Plural endings (п''ять
    книг, десять міст).'
  - 'H3 for The 11–14 Trap: dedicate a specific subsection to drilling 11-14 to ensure
    learners don''t apply the ''last digit rule'' here.'
  - 'H3 for Large Numbers: introduce сто, тисяча, мільйон using the same Genitive
    Plural logic.'
  - 'H3 for Compound Numerals: explain the ''last digit rule'' (21 follows Zone 1,
    24 follows Zone 2, 25 follows Zone 3) with a comparative table.'
- section: Числівники у непрямих відмінках
  words: 500
  points:
  - 'H3 for Cardinal Declension: briefly show how ''два'' and ''п''ять'' decline in
    Genitive, Dative, and Instrumental cases (e.g., двох, двом, двома).'
  - 'H3 for Ordinal Declension: explain that ordinal numbers decline exactly like
    adjectives (першого, другому, третьому).'
  - 'H3 for Dates and Years: provide high-frequency practical patterns (у дві тисячі
    двадцять четвертому році).'
  - 'H3 for Age Expressions: demonstrate the dative + numeral + рік/роки/років construction
    (мені двадцять один рік vs мені двадцять п''ять років).'
- section: 'Практика: Скільки це коштує?'
  words: 400
  points:
  - Provide a comprehensive shopping dialogue incorporating all three numeral zones
    seamlessly in a natural Ukrainian context.
  - Provide a dialogue focusing on time and duration (одна година, дві години, п'ять
    годин).
  - Include a short self-check quiz (3-4 questions) challenging the learner to identify
    the correct zone for compound numbers.
  - Conclude with an encouraging summary table of the three-zone model as a portable
    cheat sheet.
