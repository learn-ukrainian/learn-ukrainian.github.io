slug: indefinite-negative-pronouns
title: Indefinite and Negative Pronouns
word_target: 2000
content_outline:
- section: 'Вступ: Хтось подзвонив!'
  words: 400
  points:
  - 'Note on Immersion (50-60%): This is an A2 Band 1/2 module. Use English scaffolding
    to introduce the abstract concepts of indefinite/negative reference, but keep
    the opening scenario and dialogue fully in Ukrainian.'
  - 'Set a natural scene: the phone rings, a knock on the door (хтось подзвонив, щось
    упало) to provide immediate, tangible context for indefinite pronouns.'
  - 'Preview the three-way semantic split using English bridging: someone specific
    but unknown (хтось), nobody at all (ніхто), and absolutely anyone (будь-хто).'
- section: Неозначені займенники
  words: 700
  points:
  - 'H3: Форми з часткою -сь. Explain how adding -сь to A1 question words (хто, що,
    де, коли) creates ''specific but unknown'' words (хтось, щось, десь, колись).'
  - 'H3: Форми з часткою будь-. Explain the prefix будь- for ''open/unrestricted''
    meaning (будь-хто, будь-що). Connect to the idea of unlimited choice.'
  - 'H3: Відмінювання. Provide a clear paradigm table showing that -сь is added AFTER
    the case ending (когось, комусь, кимось). Provide 3-4 sentence examples showing
    different cases.'
- section: Заперечні займенники
  words: 700
  points:
  - 'H3: Форми з префіксом ні-. Show the formation pattern: ні + хто = ніхто, ні +
    що = ніщо/нічого. Explain that these deny existence or action entirely.'
  - 'H3: Подвійне заперечення (Double Negation). CRITICAL RULE: Explicitly contrast
    with English single negation. Explain that Ukrainian requires BOTH the negative
    pronoun AND the particle ''не'' before the verb. Frame this positively as ''syntactic
    harmony''.'
  - Provide a high-density drill/table of 5-6 Ukrainian examples with English translations
    demonstrating double negation in action (e.g., Я нічого не бачу; Ніхто не прийшов).
- section: Ні- з прийменниками
  words: 500
  points:
  - 'H3: Правило розриву (The Split Rule). Explain that when a preposition is used,
    it acts like a wedge, splitting the ''ні'' from the pronoun stem.'
  - 'Provide the formula: ні + прийменник + займенник (ні з ким, ні про що, ні до
    кого). Include 4 clear examples.'
  - Contrast with indefinite pronouns where the preposition goes outside (з кимось,
    про щось). This highlights the unique behavior of negative forms.
  - Explicitly address the common learner error of writing *нізким or *з ніким, showing
    the correct split form.
- section: Хтось, ніхто чи будь-хто?
  words: 400
  points:
  - 'H3: Порівняння значень. Create a summary breakdown for learners to choose the
    right pronoun based on communicative intent.'
  - 'Provide a quick diagnostic test: Affirmative with unknown = хтось; Negative =
    ніхто + не; Open permission/ability = будь-хто.'
  - Include short situational mini-dialogues where substituting one pronoun for another
    drastically changes the meaning (e.g., Тут хтось є? vs. Нехай зайде будь-хто).
- section: Практика
  words: 300
  points:
  - Provide a short reading comprehension text (e.g., planning a surprise party or
    investigating a mystery) packed with indefinite and negative pronouns.
  - Include an inline 'Fill in the blanks' grammar check requiring the learner to
    choose between хтось, нічого, and будь-що.
  - Add a double negation verification checklist to ensure 'не' is paired correctly
    with 'ні-' pronouns.
