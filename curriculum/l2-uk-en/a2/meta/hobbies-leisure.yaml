slug: hobbies-leisure
title: Hobbies and Leisure
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - Set the immersion tone (75-90% Ukrainian) with a brief English scaffolding intro,
    quickly transitioning into Ukrainian.
  - Introduce the cultural concept of 'тихе полювання' (mushroom picking) as a meditative
    and popular Ukrainian autumn tradition.
  - Highlight 'вишивання' (embroidery) not just as a hobby, but as an act of preserving
    cultural identity and regional patterns.
  - Present foundational terminology for leisure (дозвілля, вільний час) to align
    with State Standard §3.4.
- section: 'Лексика: Світ хобі'
  words: 600
  points:
  - Provide a structured vocabulary table with English translations for core terms
    (хобі, дозвілля, вільний час).
  - Group vocabulary clearly into Indoor activities (читати, малювати, вишивати) and
    Outdoor activities (займатися спортом, подорожувати).
  - Introduce cultural events (концерт, виставка, театр) and demonstrate collocations
    like 'проводити дозвілля' and 'культурне дозвілля'.
  - Add a stylistic callout box explaining the natural Ukrainian preference for direct
    verbs (вишивати, малювати) over the clunky 'займатися + verbal noun'.
- section: 'Граматика: Грати чи займатися?'
  words: 900
  points:
  - Create a dedicated H3 for 'грати у + Знахідний відмінок' (Accusative) used specifically
    for competitive games (футбол, шахи, теніс) with 3+ contextual examples.
  - Create a dedicated H3 for 'грати на + Місцевий відмінок' (Locative) used for musical
    instruments (гітара, піаніно) with 3+ contextual examples.
  - Create a dedicated H3 for 'займатися + Орудний відмінок' (Instrumental) for general
    sports and activities (спортом, йогою), drilling the instrumental endings.
  - Explicitly correct the common learner error 'Я граю спорт', explaining the logic
    behind Ukrainian's categorization of activities.
  - Introduce frequency adverbs (часто, рідко, іноді) and show how they modify habits
    in example sentences.
- section: Практика та діалоги
  words: 800
  points:
  - Write a realistic dialogue asking 'Як ти проводиш вільний час?' using frequency
    adverbs and correct case government.
  - Include a narrative practice text where a character lists various hobbies, forcing
    the correct contextual mixing of 'грати у', 'грати на', and 'займатися'.
  - Create a role-play scenario for planning a weekend of 'культурне дозвілля' (e.g.,
    inviting a friend to an exhibition or concert).
  - Ensure all Ukrainian sentences remain accessible, strictly adhering to the 15-word
    maximum limit per sentence.
- section: Підсумок
  words: 300
  points:
  - Provide a concise summary table of the three main verb structures (грати у, грати
    на, займатися) alongside their required grammatical cases.
  - Recap the cultural hooks (тихе полювання, вишивання) using the new vocabulary.
  - Include a self-reflection prompt asking learners to describe their own hobbies
    or weekend plans using the correct collocations.
