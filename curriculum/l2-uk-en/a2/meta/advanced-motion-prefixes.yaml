slug: advanced-motion-prefixes
title: Advanced Motion Prefixes
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Define the ''GPS instructions'' metaphor: root is the engine, prefix is the steering
    wheel.'
  - Align with State Standard §3 themes (Travel and City) for precise urban navigation
    trajectories.
  - 'Establish the logic of distance and direction: how prefixes signal proximity
    (''near'' vs ''arrival''), acting as a bridge to B1 word formation (§4.3.8).'
  - 'Note for writer: Keep immersion at 60-75% (Band 2). Use English scaffolding only
    for the core geometric concepts.'
- section: 'Геометрія руху: Пере-, Про-, Об-'
  words: 700
  points:
  - Define Пере- (Across) and Про- (Through) with textual diagrams (e.g., X -> Y vs
    -> | | ->).
  - 'Introduce the cultural hook: ''чорний кіт перейшов дорогу'' (superstition and
    bad luck).'
  - Define Об- (Around) for bypassing obstacles (обійти перешкоду, обійти будівлю).
  - 'Explore high-frequency abstract collocations: ''пройти повз'' (pass by) and ''перейти
    на українську'' (switch to Ukrainian).'
- section: 'Наближення та Прибуття: Під-, До-, За-, При-'
  words: 800
  points:
  - Distinguish До- (Getting there/Reach) vs Під- (Approaching).
  - 'Explain grammatical harmony with State Standard §4.2.2.4: В/У/НА for destination
    (прийти в магазин) vs ДО for approach (підійти до).'
  - Distinguish За- (Stopping by) vs При- (Arriving) with the 'returning' cultural
    hook and the mirror ritual.
  - 'Introduce high-value idiomatic phrases: ''мені підходить'' (it suits me) and
    ''дійти згоди'' (reach agreement).'
- section: Практика та Корекція
  words: 600
  points:
  - Explicitly correct the 'Preposition Mismatch' error (підійти до vs підійти в)
    and 'Coming vs Going' confusion (прийшов vs пішов).
  - 'Drill Perfective Future Logic (State Standard §4.2.3.1): conjugating prefixed
    motion verbs without the auxiliary ''буду'' (e.g., прийду, не ''буду прийти'').'
  - Provide practical directional drills for a Lviv/Kyiv context (e.g., 'пройти 5
    кілометрів', 'перейти міст').
- section: Діалоги та Сценарії
  words: 500
  points:
  - Create a travel story or complex commute dialogue integrating natural elements
    like 'сонце зайшло' and 'час пройшов'.
  - Provide a conversational roleplay about visiting a friend ('зайти до друга').
  - Include the idiom 'руки не доходять' (never get around to it) naturally within
    the context of tasks and schedules.
