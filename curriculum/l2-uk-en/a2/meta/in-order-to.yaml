slug: in-order-to
title: In Order To
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - Introduce the concept of expressing purpose per State Standard §4.4.2 using «щоб».
  - 'Provide the core baseline example: «Ми вчимо українську мову, щоб розмовляти
    з друзями».'
  - 'Explicitly state the strict punctuation rule: always place a comma before «щоб».'
  - Provide English scaffolding for the abstract concept of intentionality and complex
    sentence structure.
- section: 'Презентація: Логіка суб''єктів'
  words: 1000
  points:
  - 'Detail the ''Same Subject Logic'': When the doer is the same, use «щоб» + Infinitive.
    Provide 3+ clear examples.'
  - 'Address the ''For To'' Calque: Explicitly contrast «для» + Genitive Noun vs «щоб»
    + Infinitive Verb. Explain why *для купити* is wrong.'
  - 'Detail the ''Different Subject Logic'': When the doer changes, use «щоб» + Past
    Tense (the subjunctive twist). Provide 3+ clear examples.'
  - Include a visual decision tree/flowchart (using Mermaid or formatted text) for
    subject matching.
- section: Культурний контекст та Реєстр
  words: 600
  points:
  - 'Introduce Ukrainian toast culture to show «щоб» in action: «Щоб їлося і пилося...»'
  - Share the proverb «На те коня кують, щоб не спотикався» to anchor intentionality
    in folk wisdom.
  - 'Explain register differences: introduce formal «для того щоб» for emphasis/official
    contexts.'
  - 'Explain register differences: introduce informal «аби» (just so that) for conversational
    Ukrainian.'
- section: Практичне застосування
  words: 600
  points:
  - 'Create subject-shifting drills: Provide sentences and ask learners to change
    the target subject, forcing a shift from infinitive to past tense.'
  - 'Include comma placement practice: Present sentences without commas and require
    learners to correct the punctuation.'
  - 'Conduct a ''de-calquing'' workshop: Present sentences with the «для + infinitive»
    error and guide learners to correct them using «щоб» or a noun.'
- section: 'Комунікація: Цілі та плани'
  words: 400
  points:
  - 'Apply grammar to real-life planning: Provide dialogues about career or travel
    using «Я хочу, щоб...» and «Для того, щоб...».'
  - 'Include a role-play prompt: Helping a colleague or making weekend plans.'
  - Provide a final summary recap of the visual logic and the comma rule.
