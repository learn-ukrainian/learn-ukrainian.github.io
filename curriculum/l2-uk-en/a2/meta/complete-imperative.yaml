slug: complete-imperative
title: Complete Imperative
word_target: 2000
content_outline:
- section: 'Вступ: Воля та соціальний клей (Introduction: Willpower and Social Glue)'
  words: 500
  points:
  - 'Note: This is an A2 Band 2 module (60-75% immersion). Use English ONLY to explain
    the abstract concepts of willpower vs. command. Provide all examples and scenarios
    in Ukrainian.'
  - Explain that the imperative is not always a direct command, contrasting it with
    the English dependency on 'Please'.
  - Introduce wishes like «Нехай щастить!» or «Хай щастить!» as social glue emphasizing
    shared hopes.
  - 'Introduce the persona: Carpathian Rescue Lead, showing how the imperative is
    used for both urgent safety and camaraderie.'
- section: 'Граматична база: Усі особи наказового способу (Grammar Base: All Persons
    of Imperative)'
  words: 800
  points:
  - Review 2nd person (ти/ви) forms briefly to set a baseline.
  - Explain the 'Let's' form (1st person plural) using the -мо/-імо suffix (e.g.,
    ході́мо, робі́мо) without using the infinitive.
  - Introduce 3rd person singular and plural formation using particles хай / нехай
    + present/future tense indicative form.
  - 'Provide specific examples aligned with State Standard 2024: мрі́яти (хай мрі́є),
    каза́ти (хай ка́же), пи́ти (хай п’є).'
  - Explain that хай/нехай uses the regular 3rd person verb form (хай він чита́є),
    unlike the special stems of the 2nd person.
- section: Виклики та пастки для учня (Challenges and Learner Traps)
  words: 600
  points:
  - 'Explicitly correct the ''Negative Trap'': explain that ''нехай'' is NOT the negative
    of ''хай''; they are synonymous.'
  - Demonstrate correct negative placement for 3rd person ('хай не читає') and 1st
    person plural ('нехай не ходімо').
  - 'Correct the English-speaker error of translating ''let''s'' into an infinitive
    phrase: reinforce the use of the -мо/-імо suffix.'
- section: 'Культурний контекст: Ритуал тостів (Cultural Context: Ritual of Toasts)'
  words: 600
  points:
  - Explain the origin and significance of «Будьмо!» as a call to collective survival.
  - Describe the traditional Third Toast protocol («за любов» or «за жінок») and the
    cultural respect associated with it.
  - Teach how to formulate wishes using the verb «бажати» with the Genitive case (e.g.,
    «бажаю щастя», «бажаю успіхів»).
- section: 'Практичне застосування: Борщ та координація (Practical Application: Borscht
    and Coordination)'
  words: 500
  points:
  - Provide a mini-dialogue or recipe contrasting 2nd person commands («додайте»)
    with collective suggestions («додаймо»).
  - Demonstrate team coordination mixing 2nd person, 3rd person, and 1st person plural
    forms in a realistic rescue or cooking scenario.
  - Incorporate vocabulary collocations naturally into the text, such as «ходімо в
    гості» and «нехай буде».
