slug: social-media-ukrainian
title: Social Media Ukrainian
word_target: 2000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Explicitly note Band 3 immersion limits: content will be primarily in Ukrainian,
    with English restricted to brief scaffolding.'
  - Create an H3 to explain the cultural context of Telegram in Ukraine (vital for
    news and air raid alerts).
  - Create an H3 to introduce Instagram's role for Ukrainian micro-businesses and
    introduce the essential phrase «Пишіть у дірект».
- section: Презентація
  words: 800
  points:
  - 'Create an H3 for Core UI Vocabulary: clearly distinguish «сторінка» (profile)
    from «сайт» (website) with 3+ contextual examples to prevent false-friend errors.'
  - 'Create an H3 for Interface Navigation: define UI elements like «кнопка «Стежити»»,
    «іконка серця», and «стрічка».'
  - 'Create an H3 for Subscription Grammar: drill «підписатися на...» + Accusative
    case. Use a table to contrast masculine inanimate («на канал» - no change) with
    feminine («на сторінку» - changes to -у).'
  - 'Create an H3 for Slang vs. Purism: contrast digital slang («лайк», «пост») with
    purist/poetic alternatives («вподобайка», «світлина») using inline examples.'
- section: Практика
  words: 600
  points:
  - 'Create an H3 for Digital Action Verbs: provide conjugation tables and 2+ example
    sentences for «постити», «лайкати», and «репостити».'
  - 'Create an H3 for Sharing and Posting: contrast the UI action «поширити допис»
    with the interpersonal «поділитися з друзями». Provide examples for «знімати сторіз».'
  - 'Create an H3 for Case Correction: provide 5+ sentences contrasting the Accusative
    case for targets («підписатися на канал») with the Prepositional case for locations
    («читати новини в телеграмі»).'
- section: Діалоги та взаємодія
  words: 600
  points:
  - 'Create an H3 for Telegram Register: write a 6-8 line dialogue showing a character
    checking news channels and messaging a friend.'
  - 'Create an H3 for Instagram Shopping: write a 6-8 line dialogue between a customer
    asking «Яка ціна?» and a shop owner replying «Пишіть у дірект».'
  - 'Create an H3 for Community Management: explain «підписники» and the concept of
    «накрутка» with contextual sentences suitable for A2.'
- section: Розповідь та підсумок
  words: 550
  points:
  - 'Create an H3 for Narrative: write a 150-word story titled ''A Day in Digital
    Ukraine'', using at least 10 target vocabulary words and keeping sentences under
    15 words.'
  - 'Create an H3 for Style Summary: provide a quick bulleted list on when to use
    slang vs. formal Ukrainian terms online.'
  - 'Create an H3 for State Standard Check: review the core competencies for navigating
    social networks and handling app notifications («сповіщення»).'
