slug: being-and-becoming
title: Being and Becoming
word_target: 3000
content_outline:
- section: 'Вступ: Роль та ідентичність'
  words: 400
  points:
  - Concept of Static Identity (Nominative - *Я є студент*) vs Dynamic Role/Function
    (Instrumental - *Я буду студентом*).
  - 'English Scaffolding: Clearly explain WHY the case changes (becoming, working
    as, being in past/future).'
  - Review of 'to be' in Present vs Past/Future.
- section: 'Презентація: Бути, стати, працювати'
  words: 1000
  points:
  - 'Verb ''Бути'' (Past/Future) + Instrumental: *Я був студентом*, *Він буде лікарем*.'
  - 'Verb ''Стати'' (Change of State) + Instrumental: *Вона стала директоркою*, *Він
    хоче стати програмістом*.'
  - 'Verb ''Працювати'' (Current Process) + Instrumental: *Ми працюємо інженерами*.
    Debunk the ''працювати як'' error.'
  - 'Professions Vocabulary: Drill masculine and feminine forms (*лікар/лікарка*,
    *вчитель/вчителька*).'
  - 'Cultural Hook: The 2020 Feminitives Reform and modern usage.'
- section: 'Практика: Від мрії до реальності'
  words: 800
  points:
  - 'Transformation Drills: Convert Present (Nom) to Past/Future (Instr). *Я студент
    -> Я буду студентом*.'
  - 'Career Path Exercises: *Раніше він був..., зараз він..., а хоче стати...*.'
  - 'Sentence Building: Constructing sentences with *хотіти стати* and *мріяти бути*.'
  - 'Gender agreement practice: Matching adjectives with profession nouns (*успішна
    програмістка*).'
- section: 'Діалоги: Кар''єра та робота'
  words: 800
  points:
  - 'Dialogue 1: ''Kym ty pratsiuyesh?'' - Casual conversation about jobs using ''working
    as'' structure.'
  - 'Dialogue 2: ''Plans for the future'' - Discussing career changes and aspirations
    (*хочу стати*).'
  - 'Context: Incorporate modern IT professions (*айтішник, тестувальник*) to reflect
    real Ukrainian labor market.'
  - 'Roleplay scenarios: Job interview snippets or networking introduction.'
