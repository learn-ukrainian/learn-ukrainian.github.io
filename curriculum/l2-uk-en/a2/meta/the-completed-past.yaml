slug: the-completed-past
title: The Completed Past
word_target: 2000
content_outline:
- section: Вступ
  words: 450
  points:
  - Introduce the result-focused mindset using Ukrainian proverbs («Діло майстра величає»,
    «Кінець — справі вінець») to highlight the cultural value of completion.
  - Establish the theoretical foundation of aspectual pairs (робити – зробити) based
    on State Standard §4.3.2.
  - Explicitly provide English scaffolding for the grammar theory, as this is a Band
    1 immersion module (50-60% Ukrainian).
- section: Творення та граматична узгодженість
  words: 750
  points:
  - Detail the formation of the perfective past using suffixes (-в, -ла, -ло, -ли).
  - Explicitly address and correct Gender/Number Agreement errors (e.g., avoiding
    «Анна написав» in favor of «Анна написала»).
  - Explain the 'Zero Auxiliary' rule in English to combat the 'Double Past' error,
    clarifying that the Ukrainian verb inherently contains the concept of completion.
- section: Процес проти результату
  words: 800
  points:
  - Analyze 'Aspect Drift' errors by contrasting process-oriented actions («я писав
    листа») with result-oriented actions («я написав листа»).
  - 'Provide a visual decision-tree logic: ''Was I doing it?'' vs. ''Did I finish
    it?'''
  - Drill high-frequency perfective verbs (зробив, сказав, зрозумів, знайшов) within
    context-rich, result-oriented sentences.
- section: Наративна послідовність у музеї
  words: 600
  points:
  - Introduce the 'Chain of Events' narrative pattern for telling stories in the past
    tense.
  - 'Teach essential sequencing markers: «спочатку», «потім», «нарешті».'
  - Apply these markers to transform linear lists of completed actions into a coherent,
    flowing story sequence.
- section: Практика та усунення помилок
  words: 400
  points:
  - Design situation-based aspect choice practice focusing on high-frequency collocations
    (e.g., «зробив вибір», «сказав правду»).
  - Review and consolidate the correction patterns for 'Aspect Drift' and 'Double
    Past' confusions.
  - Summarize the result-focused mindset to prepare learners for narrative transformations
    in upcoming modules.
