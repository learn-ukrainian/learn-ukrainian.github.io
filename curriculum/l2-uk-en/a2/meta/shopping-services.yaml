slug: shopping-services
title: Shopping and Services
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Note for English scaffolding: As M53 is in the 75-90% immersion band, explicitly
    state that English is limited to brief clarifications and vocabulary tables.'
  - Introduce the shopping theme (aligned with State Standard §3.9) and differentiate
    between магазин (store), супермаркет (supermarket), and ринок (market).
  - 'Cultural Hook: Detail the history of Bessarabka Market (built 1912 by Lazar Brodsky)
    and its Art Nouveau architecture.'
  - Introduce the idiom 'Дорого, як на Бессарабці' to contextualize discussions about
    prices and premium markets.
- section: Лексика та культура
  words: 700
  points:
  - 'Present §3.9 vocabulary: groceries (овочі, фрукти, м’ясо, хліб, молочні продукти)
    and hygiene products (мило, шампунь, зубна паста).'
  - Introduce units of weight and volume (кілограм, літр, штуки) for realistic transactions.
  - Explain traditional market etiquette, contrasting the natural 'Чи є у вас свіже...?'
    with the incorrect translation 'Ти маєш...?'.
  - 'Discuss checkout vocabulary: asking for a bag (пакет), a receipt (фіскальний
    чек), and handling change (здача).'
- section: Граматика
  words: 800
  points:
  - 'Address the Direction vs Location error: contrast Accusative motion (''Я йду
    в магазин'') with Locative state (''Я в магазині'').'
  - Explain the Instrumental case for payment methods, explicitly drilling 'платити
    карткою' and correcting the 'платити картою' mistake.
  - 'Provide present tense conjugation paradigms for key transactional verbs: купувати,
    продавати, and платити.'
  - Clarify Accusative endings for inanimate objects being bought.
- section: Діалоги та практика
  words: 700
  points:
  - Present a simulated dialogue at Bessarabka Market focused on asking about freshness,
    weight, and prices.
  - Present a supermarket checkout dialogue covering requests for a bag and selecting
    payment methods (карткою чи готівкою).
  - Include a targeted error-correction drill to replace 'Ти маєш' with 'Чи є у вас'
    in various shopping contexts.
  - Add fill-in-the-blank practice sentences reinforcing the Instrumental case ('карткою'
    / 'готівкою').
- section: Послуги та підсумок
  words: 400
  points:
  - 'Introduce basic service vocabulary from the plan: перукарня (hairdresser), хімчистка
    (dry cleaning), and ремонт (repair).'
  - Provide simple phrases for requesting these services in natural Ukrainian.
  - Summarize high-frequency vocabulary, collocations, and the Bessarabka idiom.
  - Recap the grammatical difference between buying an item (Accusative) and the means
    of paying for it (Instrumental).
