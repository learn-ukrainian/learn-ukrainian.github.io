slug: practical-warm-up
title: Practical Warm-up
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - Set the 'Morning Show Host' persona tone, enthusiastically welcoming learners
    to a practical, action-oriented session.
  - 'Explicitly define the module''s goals in Ukrainian: understanding short texts
    (30-50 words) and differentiating key communicative vocabulary.'
  - Establish the A2 Band 3 immersion expectations (75-90%), using minimal English
    only if required to set the baseline.
- section: 'Навички читання: Скарби Книжкового Форуму'
  words: 700
  points:
  - Introduce the 'Львівський BookForum' as an engaging cultural context for reading
    practice.
  - Define 'оглядове читання' (skimming) and 'пошукове читання' (scanning) using simple
    Ukrainian explanations and metaphors.
  - Provide a realistic 50-word text (e.g., a book blurb or festival poster) to practice
    identifying the 'головна ідея'.
  - Include a tip box instructing learners on how to isolate 'ключові слова' (keywords)
    without needing to understand every single word.
- section: 'Слухання та говоріння: Активне сприйняття'
  words: 800
  points:
  - Present a morning show mini-dialogue (6-8 exchanges) that explicitly demonstrates
    active listening for specific facts (names, times).
  - Include a 'Learner Error Clinic' callout contrasting 'чути' (passive physical
    hearing) and 'слухати' (active intentional listening).
  - Provide a structured explanation with 3 distinct example sentences for both 'чути'
    and 'слухати'.
  - Add a guided practice drill where learners must logically select between 'чути'
    and 'слухати' based on context.
- section: 'Письмо: Радіодиктант національної єдності'
  words: 700
  points:
  - Explain the rich cultural significance and unifying power of the 'Радіодиктант
    національної єдності'.
  - Include a 'Learner Error Clinic' box contrasting 'питання' (issue/topic) and 'запитання'
    (inquiry expecting a response).
  - Illustrate the distinction with clear, short sentences (e.g., 'Це важливе питання'
    vs 'Можна поставити запитання?').
  - Simulate a mini dictation-prep exercise, focusing on transferring heard facts
    (like dates or simple phrases) into written text.
- section: Інтеграція та підсумок
  words: 400
  points:
  - Provide a synthesis checklist of the active reading and listening strategies covered
    in the module.
  - 'Include a brief integration task: reading a short announcement and answering
    specific ''запитання'' about its ''головна ідея''.'
  - Transition to the upcoming high-stakes scenario (Medical Care), emphasizing how
    these active perception skills will be critical.
