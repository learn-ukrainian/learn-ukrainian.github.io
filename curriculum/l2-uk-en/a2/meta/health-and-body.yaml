slug: health-and-body
title: Health and Body
word_target: 2000
content_outline:
- section: Моє тіло
  words: 450
  points:
  - Introduce core body parts with explicit gender marking (голова-f, живіт-m, серце-n)
    and provide an anatomical diagram or descriptive list in Ukrainian.
  - Create a dedicated H3 for irregular plurals (око→очі, вухо→вуха, рука→руки), followed
    by an adjective agreement drill (червоне горло, ліва рука).
  - Include a brief cultural/idiomatic spotlight on 'від щирого серця' (from the bottom
    of my heart).
- section: У мене болить...
  words: 550
  points:
  - 'Explain the intransitive grammar of ''боліти'': the body part is the subject.
    Use clear contrasting examples (болить зуб vs болять зуби).'
  - Provide a dedicated warning box explicitly correcting the common English transfer
    error ('Я болю голову').
  - Introduce Dative state expressions (Мені погано/добре/холодно) in a separate H3,
    contrasting them with Nominative feelings.
  - Differentiate 'боліти' (specific localized pain) from 'хворіти на + Accusative'
    (to be sick with a disease).
- section: Симптоми та хвороби
  words: 450
  points:
  - 'List high-frequency symptoms: температура, кашель, нежить, біль, слабкість, запаморочення.'
  - Explain common illnesses (застуда, грип, алергія) and explicitly warn about the
    false friend 'ангіна'.
  - Provide mini-dialogues reporting symptoms to a friend ('У мене висока температура')
    versus explaining them to a doctor.
- section: У лікаря
  words: 650
  points:
  - 'Explain the Ukrainian medical system basics: ''сімейний лікар'', ''поліклініка''
    vs ''лікарня'', and the absolute necessity of wearing ''бахіли''.'
  - Present a typical consultation dialogue highlighting the formal 'Ви' register
    ('Що вас турбує?').
  - 'Create an H3 for Medical Imperatives (§4.2.3.2): ''Дихайте'', ''Відкрийте рот'',
    ''Покажіть язик''.'
  - 'Cover practical outcomes: ''поставити діагноз'', ''виписати рецепт'', ''взяти
    лікарняний''.'
- section: Народна мудрість і здоровий спосіб життя
  words: 500
  points:
  - Introduce the cultural hook 'У здоровому тілі — здоровий дух' and discuss health
    as a cultural value.
  - 'Describe traditional folk remedies entirely in Ukrainian: чай з малиною, калина,
    мед з молоком.'
  - Introduce healthy lifestyle vocabulary ('робити зарядку', 'правильне харчування')
    using the advice construction 'варто/треба' + infinitive.
- section: 'Практика: Від симптому до одужання'
  words: 400
  points:
  - 'Synthesize the module with a full narrative reading practice: noticing symptoms,
    calling the clinic, the doctor''s visit, and recovery.'
  - Include a role-play prompt where the learner calls a clinic to make an appointment
    (formal) and then calls a friend to complain about being sick (informal).
  - Provide a smooth transition to the next module ('Купіть ці ліки в аптеці').
