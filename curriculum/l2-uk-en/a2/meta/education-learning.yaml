slug: education-learning
title: Education and Learning
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Explicitly state English scaffolding requirements: Band 3 immersion (75-90%).
    English is strictly restricted to vocabulary tables. All prose, grammar rules,
    and dialogues must be written in Ukrainian.'
  - 'Cultural Hook: Describe ''День знань'' (Knowledge Day) on September 1st and the
    ''Перший дзвоник'' (First Bell) ceremony. Note the tradition of wearing vyshyvankas.'
  - 'Introduce the core educational context using high-frequency verbs: «ходити до
    школи», «закінчити школу», and «вступати до університету».'
- section: 'Лексика: Навчальні предмети та речі'
  words: 600
  points:
  - Provide a structured vocabulary table for basic school subjects (математика, історія,
    фізика, хімія) and supplies (зошит, ручка, підручник).
  - Write 2-3 mini-dialogues where students discuss their interests using Dative structures
    from previous modules (e.g., «Мені подобається історія», «Мій улюблений предмет
    — математика»).
  - Include a [!cultural] callout defining «профільний предмет» (specialized subject)
    in Ukrainian high schools.
  - Provide 8-10 example sentences demonstrating school supplies in Instrumental case
    contexts (e.g., «Я пишу ручкою в зошиті»).
- section: 'Граматика: Дієслова навчання'
  words: 800
  points:
  - 'Define «вчитися» (intransitive): emphasize it describes the process, location,
    or manner of studying and never takes a direct object. Provide 5+ contextual examples.'
  - 'Define «вивчати» (transitive): emphasize it requires a direct object in the Accusative
    case (the subject being studied). Provide 5+ contextual examples.'
  - 'Define «навчати» (transitive): emphasize it means to teach or instruct someone.
    Provide 3+ examples (e.g., «Вчитель навчає учнів»).'
  - 'Include a [!warning] callout to address learner errors: explicitly contrast «Я
    вчуся математику» (Wrong) vs «Я вивчаю математику» (Correct), and «Я вивчаю в
    школі» (Wrong) vs «Я вчуся в школі» (Correct).'
  - Provide a summary comparison table of these three verbs outlining their transitivity
    and required cases.
- section: Академічне життя
  words: 500
  points:
  - 'Drill prepositional patterns: contrast the use of «в/у» for institutions (в школі,
    в університеті) versus «на» for events or internal divisions (на уроці, на лекції,
    на факультеті).'
  - 'Define university roles: «студент», «викладач», «професор». Explain the semantic
    difference between «вчитель» (school) and «викладач» (university).'
  - 'Introduce academic milestones: «семінар», «залік» (credit/pass-fail), «курсова
    робота» (course paper), and «диплом».'
  - Write a 6-8 line dialogue between students discussing their university schedule
    and an upcoming 'залік'.
- section: Оцінювання та іспити
  words: 500
  points:
  - Include a [!cultural] callout on the Ukrainian 12-point grading system (10-12
    High, 7-9 Sufficient, etc.) and explain it as a European-aligned reform.
  - 'Introduce vocabulary for grading: «отримувати оцінку», «гарна оцінка», «високий
    бал».'
  - 'Include a [!warning] callout for exam collocations: correct the literal translation
    of ''take an exam''. Teach «складати іспит» (process), «скласти іспит» (pass),
    and «провалити іспит» (fail).'
  - Provide a practical dialogue where students share their exam results and grades.
- section: Підсумок
  words: 200
  points:
  - Summarize the critical distinction between «вчитися» and «вивчати».
  - Recap the correct prepositions («в/у» vs «на») for educational settings.
  - Provide a short prompt (3-4 questions) encouraging learners to describe their
    own studies, favorite subjects, and recent exams using the new vocabulary.
