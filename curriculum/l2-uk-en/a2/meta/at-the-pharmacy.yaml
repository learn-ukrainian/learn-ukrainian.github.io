slug: at-the-pharmacy
title: At the Pharmacy
word_target: 3000
content_outline:
- section: 'Вступ: Українські аптеки'
  words: 600
  points:
  - 'Cultural hook: Identifying a «чергова аптека» (duty pharmacy) open 24/7, marked
    by the iconic green cross; explaining the infrastructure of Ukrainian pharmacies.'
  - 'Prescription system: The transition to «е-рецепт» (electronic prescription via
    SMS) since 2022 for antibiotics; distinguishing between «безрецептурні ліки» (OTC)
    and prescription-only meds.'
  - 'Learner error: Clarifying that «ліки» is pluralia tantum (always plural); correcting
    the common mistake of treating it as singular (e.g., «Ці ліки», not «Це ліки»).
    Ensure examples explicitly contrast plural adjective agreements.'
  - 'Linguistic purity: Identifying and avoiding the Russianism «лікарство» in favor
    of the standard Ukrainian «ліки».'
- section: 'Пошук ліків: Симптоми та запити'
  words: 700
  points:
  - 'Grammar drill: Using «від» + Genitive case for ailments (State Standard §4.2.2.2);
    correcting the error of using «для» (e.g., «ліки від кашлю» vs incorrect «ліки
    для кашлю»). Provide multiple examples.'
  - 'Cultural hook: Ukrainian preference for «фітотерапія» (herbal remedies); discussing
    common natural treatments like tea with «калина» (viburnum) or herbal syrups.'
  - 'Functional language: Key phrases for describing symptoms such as «У мене болить...»
    and «Мені потрібно щось від...» for specific conditions like cold («застуда»)
    or headache («біль голови»).'
  - 'Vocabulary expansion: Categorizing common OTC meds: «жарознижувальні» (antipyretics),
    «знеболювальні» (painkillers), and «таблетки для розсмоктування» (lozenges).'
- section: Інструкції та етикетки
  words: 600
  points:
  - 'Standard vs Colloquial usage: Defining the formal «приймати ліки» used in labels
    versus the colloquial «пити таблетки» found in daily speech.'
  - 'Reading labels: Identifying key terms on packaging: «дозування» (dosage), «застосування»
    (application), and «протипоказання» (contraindications). Include mock label analysis.'
  - 'Grammar in context: Understanding instructions using the Imperative mood found
    on medicine leaflets.'
  - 'Warning signs: Recognizing storage instructions like «зберігати в недоступному
    для дітей місці» and expiry dates.'
- section: Дозування та побічні ефекти
  words: 600
  points:
  - 'Precision in dosage: Phrases for frequency such as «раз на день», «двічі на добу»,
    and the specific construction «приймати по одній таблетці».'
  - 'Meal-related instructions: Differentiating between «до їди» (before meals), «під
    час їди» (during meals), and «після їди» (after meals).'
  - 'Side effects and allergies: Essential vocabulary for «побічні ефекти» and «алергія»;
    discussing interactions with other substances using ''з'' + Instrumental.'
  - 'Medical forms: Vocabulary for different delivery methods: «капсула» (capsule),
    «сироп» (syrup), «мазь» (ointment), and «краплі» (drops). Ensure gender is specified.'
- section: 'Практика: Діалог в аптеці'
  words: 500
  points:
  - 'Roleplay: Comprehensive dialogue buying medicine for a cold using the «від +
    Genitive» construction and asking about side effects.'
  - 'Authenticity check: A scenario where the learner asks for antibiotics and the
    pharmacist explains the requirement for an «е-рецепт».'
  - 'Consultation: Asking the pharmacist («фармацевт») for a recommendation between
    a synthetic drug and a herbal alternative, utilizing A2 vocabulary.'
