slug: i-feel-like
title: I Feel Like...
word_target: 2000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Explicit contrast table: ''Хто я є'' (Nominative traits) vs ''Як я почуваюся''
    (Dative states).'
  - 'Explain the core Dative logic for states: feelings happen *to* a person. (Provide
    English scaffolding for this abstract grammar concept).'
  - 'Highlight the common translation error: ''Я холодний'' vs ''Мені холодно''.'
- section: Презентація
  words: 900
  points:
  - 'Create an H3 for Physical States: Introduce жарко, холодно, боляче with contextual
    examples. Include a warning box about ''Я гарячий''.'
  - 'Create an H3 for Emotional States: Introduce сумно, весело, нудно. Explain the
    collocation ''мені стало сумно'' for state transitions.'
  - 'Create an H3 for Psychological Reflexives: Contrast Nominative ''я боюся'' with
    Dative ''мені страшно''.'
  - 'Create an H3 for Semantic Distinctions: Compare Радий (situational/gendered),
    Щасливий (permanent trait), and Весело (adverbial state).'
- section: Культурний контекст
  words: 500
  points:
  - Explain 'Метеозалежність' (meteosensitivity) and 'магнітні бурі' as authentic
    cultural small talk.
  - Analyze the folk proverb 'Ломить руки, або коліна – буде погоди переміна'.
  - Provide a short Ukrainian reading text about how people complain about the weather.
- section: Практика та вправи
  words: 600
  points:
  - Include a Dative pronoun conversion table mapping Nominative to Dative (я→мені,
    ти→тобі, він→йому, вона→їй).
  - Provide targeted error correction examples for common mistakes like 'Вона сумно'
    -> 'Їй сумно'.
  - Provide contrasting sentence drills to distinguish Adjective vs Adverb forms for
    states.
- section: Діалоги та підсумок
  words: 500
  points:
  - 'Write a mini-dialogue: Comforting a friend who feels unwell or cold.'
  - 'Write a mini-dialogue: Complaining about the weather and its physical effects.'
  - Provide a final summary with bullet points recapping the Dative experiencer pattern
    and the list of core adverbs.
