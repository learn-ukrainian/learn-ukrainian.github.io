slug: gerunds-intro
title: Introduction to Gerunds
word_target: 3000
content_outline:
- section: 'Вступ: Дві дії одночасно'
  words: 400
  points:
  - 'Note: Immersion target is 65-75%. English scaffolding is required in this section
    to explain the abstract function of gerunds.'
  - Introduce the concept of compressing two actions into one sentence ('Читаючи книгу,
    він пив каву').
  - 'Explain the recognition-first approach: learners will encounter these forms extensively
    in B1 reading materials.'
  - 'Preview the two gerund families: present (-ючи/-ачи) for simultaneous actions,
    past (-вши/-ши) for completed prior actions.'
- section: Дієприслівники теперішнього часу
  words: 600
  points:
  - Define that present gerunds denote an action simultaneous with the main verb and
    are formed from imperfective verbs.
  - 'Dedicate an H3 to Formation Rule 1: Conjugation I verbs (-ати/-яти/-увати) replace
    the 3rd person plural -ють with -ючи (читають -> читаючи).'
  - 'Dedicate an H3 to Formation Rule 2: Conjugation II verbs (-ити/-іти/-їти) replace
    -ать/-ять with -ачи/-ячи (говорять -> говорячи).'
  - Highlight high-frequency gerunds for immediate recognition (читаючи, працюючи,
    слухаючи, дивлячись).
  - Explain the basic punctuation rule for gerundial phrases (commas).
- section: Дієприслівники минулого часу
  words: 600
  points:
  - Define that past gerunds denote an action completed BEFORE the main action and
    are formed from perfective verbs.
  - 'Explain Formation Rule 1: After a vowel stem, drop the infinitive ending and
    add -вши (прочитати -> прочитавши).'
  - 'Explain Formation Rule 2: After a consonant stem, add -ши (принести -> принісши).'
  - Explain the formation of reflexive past gerunds by adding -сь (повернутися ->
    повернувшись).
  - Introduce the cultural proverb 'Скінчивши діло — гуляй сміло' to anchor the concept.
- section: 'Золоте правило: Підмет має збігатися'
  words: 500
  points:
  - 'Introduce the ''Dangling Gerund'' rule: the implied subject of the gerund MUST
    match the subject of the main clause.'
  - Provide a clear example of an incorrect sentence ('Читаючи книгу, телефон задзвонив')
    and explain why it is logically flawed.
  - Provide the correct version ('Читаючи книгу, я почув телефон').
  - 'Offer a self-correction strategy: ask ''who is doing the gerund action?'' before
    speaking/writing.'
- section: Помилки та заборони
  words: 500
  points:
  - Explicitly ban active participial adjectives in -ючий/-ачий used as noun modifiers
    (e.g., 'працююча людина').
  - Explain that restoring the relative-clause pattern is part of decolonising the
    language from artificial Soviet-era rules.
  - Demonstrate how to correctly rewrite these banned forms using relative clauses
    ('людина, яка працює', 'студент, який читає').
  - Clarify that gerunds from reflexive verbs correctly retain their particle (-чись/-шись)
    and should not be confused with the banned adjectives.
- section: Практика
  words: 400
  points:
  - 'Combination drill: provide mini-exercises demonstrating how to combine two simple
    sentences into one using a gerund.'
  - 'Classification drill: provide examples for learners to classify as present (simultaneous)
    or past (prior) actions.'
  - 'Error correction: provide examples of dangling gerunds or banned -ючий forms
    and demonstrate how to correct them.'
  - Include a short reading comprehension text featuring 3-4 gerunds in context.
