slug: hotel-accommodation
title: Hotel Accommodation
word_target: 3000
content_outline:
- section: 'Вступ: Готелі в Україні'
  words: 500
  points:
  - 'Set Band 3 immersion expectations: Introduce different accommodation options
    in Ukrainian, focusing on «готель».'
  - 'Lexical distinction: Provide a clear explanation contrasting «кімната» (a room
    in a house, feminine) and «номер» (a hotel room, masculine).'
  - Provide a grammar drill highlighting the masculine gender agreement of «номер»
    (e.g., «це гарний номер», not «гарна номер»).
  - Explain the cultural norm and necessity of using the formal «Ви» address when
    interacting with hotel administration.
- section: Бронювання та заселення
  words: 800
  points:
  - Introduce the aspectual verb pair «бронювати» (imperfective/process) and «забронювати»
    (perfective/result) with examples of online booking.
  - 'Present core room types using collocations: «одномісний номер», «двомісний номер»,
    «номер люкс», and teach «ключ від номера».'
  - 'Cultural Hook: Detail the strict legal requirement for presenting a physical
    passport or the ''Diia'' digital passport during check-in («заселення»).'
  - Provide a contextual vocabulary list and mini-dialogue covering «час заселення»
    and the «реєстрація» process at the front desk.
- section: Послуги та зручності
  words: 700
  points:
  - 'Apply interrogative syntax rules (§4.4.1.2) to formulate polite requests and
    questions: «Сніданок включено?», «Чи є Wi-Fi?».'
  - 'Grammar Drill: Contrast the Locative case for location («Я у готелі») with the
    Accusative case for direction («Я їду в готель») using a visual table.'
  - 'Introduce essential amenity collocations: requesting «рушник», «мило», «шампунь»,
    or services like «прибирання» and «кондиціонер».'
  - Provide brief dialogue examples of calling the reception to ask for these items.
- section: Проблеми та розрахунок
  words: 600
  points:
  - Teach polite phrasing for resolving issues using «на стійці адміністратора» and
    «запитати адміністратора».
  - 'Cultural Hook: Explain the concept of «туристичний збір» (tourist tax) and how
    it appears separately on the bill.'
  - 'Detail the «виселення» (check-out) process: understanding «час виселення» and
    the procedure to «оплатити рахунок».'
  - Include a structured mini-dialogue handling a minor complaint and then checking
    out.
- section: 'Практика: Проживання в готелі'
  words: 400
  points:
  - Provide a comprehensive simulation dialogue that combines booking confirmation,
    the passport request, and receiving the room key.
  - Include a problem-solving scenario where the guest must request a missing item
    (e.g., a towel) while maintaining the formal «Ви» register.
  - Conclude with a summary table reviewing the key interrogative patterns and grammar
    structures learned in the module.
