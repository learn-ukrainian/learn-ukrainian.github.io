slug: scheduling-interviews
title: Scheduling Interviews
word_target: 2000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Job market basics — distinguish ''робота'' (job/employment) vs ''праця'' (labor);
    learner error: ''шукати працю'' is incorrect, use ''шукати роботу'' as per research.'
  - Finding job openings — collocations for 'вакансія' (відкрита вакансія, шукати
    вакансію, опис вакансії); aligns with State Standard §3.8 'Робота', 'місця роботи'.
  - 'Cultural Hook: Academic Prestige — Ukrainians place high value on formal education;
    highlight diplomas and academic titles on a resume/CV as a cultural differentiator.'
- section: Презентація
  words: 650
  points:
  - Interview terminology — collocations for 'співбесіда' (пройти, призначити, запросити);
    collocations for 'резюме' (надіслати, писати, розглядати).
  - 'Formality hook — strict use of formal ''Ви'' address and ''Пан/Пані + Surname''.
    Register slip-up: sticking to ''Ви'' until explicitly invited otherwise (''можна
    на "ти"?'').'
  - State Standard §3.8 coverage — terminology for professions, places of work, and
    formal interactions in a professional environment.
- section: Граматика та практика
  words: 600
  points:
  - 'Instrumental case for professions — reinforce ''працюю менеджером'' pattern;
    learner error drill: correcting ''я працюю як менеджер'' (literal translation)
    to the correct Instrumental case.'
  - Describing professional background — using 'досвід' (мати досвід, без досвіду)
    and 'навички' (skills) in context.
- section: Діалоги
  words: 650
  points:
  - Interview dialogues — scheduling time and place using formal register; include
    key recruitment phrase 'Коли ви можете почати?' (When can you start?).
  - Salary discussions — include key phrase 'Яка бажана зарплата?' and collocations
    (висока/низька, середня, виплачувати); aligns with State Standard §3.8 'заробітна
    плата'.
- section: Розповідь
  words: 450
  points:
  - Job search story — contextual narrative of a candidate applying, being interviewed
    (formal 'Ви'), and starting a 'випробувальний термін' (probation period).
  - Experience summary — using 'досвід роботи' to describe professional background
    and career goals.
- section: Підсумок
  words: 200
  points:
  - Summary of professional collocations and rules for formal address (Ви vs Ти).
  - 'Quick self-check: matching professions with their correct Instrumental case forms.'