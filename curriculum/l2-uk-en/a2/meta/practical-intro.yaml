slug: practical-intro
title: Practical Intro
word_target: 3000
content_outline:
- section: 'Вступ: Від теорії до практики'
  words: 450
  points:
  - 'Note on scaffolding: English should be limited to brief clarifications of complex
    grammar and vocabulary tables (75-90% Ukrainian immersion).'
  - Introduce the transition from theoretical rules to functional, spontaneous speaking.
  - Explain the cultural concept of 'суржик' as a transitional stage for learners,
    framing 'mistakes' positively as stepping stones.
- section: Сім відмінків у дії
  words: 750
  points:
  - Provide a functional overview of all 7 cases based on their communicative purpose
    rather than reciting paradigms.
  - Highlight the Vocative case (Кличний відмінок) as a cultural marker of respect;
    contrast casual 'Юра' with formal 'Пане Юрію'.
  - Drill the Genitive vs. Accusative distinction for negation (e.g., 'я бачу книгу'
    vs. 'я не бачу книги').
  - Include a mini-dialogue showcasing polite address and practical case usage.
- section: Вид дієслова в контексті
  words: 650
  points:
  - Differentiate Perfective (result) and Imperfective (process/habit) aspects in
    a narrative storytelling context.
  - 'Explain the ''Perfective Present'' trap: demonstrate with minimal pairs why ''я
    напишу'' expresses a future result, not a present action.'
  - Clarify motion verbs 'йти' (on foot) vs. 'їхати' (by vehicle) in practical, everyday
    scenarios.
- section: Складні речення та пояснення
  words: 650
  points:
  - Demonstrate how to build complex sentences using 'тому що', 'бо' (reason), 'щоб'
    (purpose), and 'якщо' (condition).
  - Explain the shift from simple SVO structures to multi-clause logic for expressing
    conditions in professional and personal contexts.
  - Provide clear examples and visual aids (e.g., a table) to map each conjunction
    to its logical function.
- section: Типові помилки та інтеграція
  words: 500
  points:
  - 'Include a diagnostic drill: a short text containing common case and aspect errors
    for the learner to identify and fix.'
  - 'Present an integration scenario: writing a semi-formal message to a boss or colleague
    applying cases, aspect, and complex conjunctions.'
  - Summarize the key takeaways to consolidate learning before the next module.
