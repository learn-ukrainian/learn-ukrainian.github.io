slug: emotions-personality
title: Emotions and Personality
word_target: 2000
content_outline:
- section: 'Вступ: Кордоцентризм та світ емоцій'
  words: 500
  points:
  - 'Scaffolding Note (Immersion 60-75%): Use English ONLY to explain the abstract
    philosophy of Cordocentrism; use Ukrainian for all dialogues, definitions, and
    examples.'
  - Introduce 'Cordocentrism' (Philosophy of the Heart) and the cultural significance
    of asking 'Що у тебе на душі?' instead of just 'Як справи?'.
  - Provide a short, immersive Ukrainian dialogue where characters express their core
    emotions, introducing adverbs like весело, сумно, and зло alongside emojis.
- section: 'Граматика: Стани та якості'
  words: 850
  points:
  - 'Explain the core grammar rule: Dative + Adverb for temporary states (Мені весело)
    vs. Nominative + Adjective for permanent qualities (Я веселий). Use a clear 3-column
    table.'
  - 'Address the common learner error: Contrast ''Я нудний'' (I am boring) with ''Мені
    нудно'' (I am bored) using 5 clear minimal pairs.'
  - Drill gender agreement for character traits, explicitly showing the shift from
    masculine to feminine (Він добрий vs. Вона добра).
  - Include a 'False Friend' warning box explaining that 'симпатичний' means good-looking/pleasant,
    not sympathetic.
- section: Лексика та портрет особистості
  words: 700
  points:
  - Present high-frequency adjectives with their common collocations (e.g., добре
    серце, злі язики, розумний вибір).
  - 'Highlight national character traits: Define ''щирість'' (sincerity) and ''гостинність''
    (hospitality) as positive values, contrasting them with ''замкнена людина''.'
  - Include a short reading task entirely in Ukrainian analyzing the proverb 'Не по
    одежині судять, а по розуму'.
- section: 'Практика: Опис характеру та стану'
  words: 600
  points:
  - Create a guided role-play dialogue where a 'Drama Teacher' asks students 'Що на
    душі?', prompting Dative + Adverb responses.
  - Introduce 'працьовитий' (hardworking) and 'терплячий' (patient) in a matching
    exercise as a bridge to upcoming workplace vocabulary.
  - Provide a fill-in-the-blanks exercise mapping specific behaviors to personality
    traits (e.g., 'Він завжди ділиться' -> 'Він щедрий').
- section: 'Підсумок: Від серця до розуму'
  words: 350
  points:
  - Consolidate the syntactic logic by summarizing the distinction between 'Who I
    am' and 'How I feel' in a concise recap table.
  - Provide a final review checklist of the vocabulary, emphasizing soft-stem adjective
    agreements and the 'симпатичний' false friend.
