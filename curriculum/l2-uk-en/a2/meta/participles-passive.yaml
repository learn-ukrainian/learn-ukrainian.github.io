slug: participles-passive
title: Passive Participles
word_target: 2000
content_outline:
- section: 'Вступ: Дієприкметники навколо нас'
  words: 450
  points:
  - 'Band 3 Immersion (75-90% Ukrainian): Introduce passive participles using clear
    Ukrainian descriptions and examples from daily life (shop signs, labels, instructions).'
  - 'Explain the functional goal: recognizing these forms as high-frequency adjectives
    (відкритий, закритий, зайнятий) rather than complex grammar transformations.'
  - 'Mention alignment with the State Standard: scaffolding B1 verb concepts through
    familiar A2 adjective declension rules.'
- section: Утворення дієприкметників
  words: 700
  points:
  - Create an H3 subsection for the -ний suffix and an H3 for the -тий suffix, showing
    derivation from perfective verb stems (зробити → зроблений, відкрити → відкритий).
  - Provide a clear table illustrating consonant mutations before the -ний suffix
    (підготувати → підготовлений, побудувати → побудований).
  - Showcase high-utility lexical sets (зайнятий, зламаний, забутий) with short, natural
    Ukrainian example sentences (max 15 words per sentence).
- section: Узгодження як прикметник
  words: 600
  points:
  - Explicitly state in Ukrainian that participles decline exactly like regular adjectives
    in gender, number, and case.
  - Include a paradigm table demonstrating nominative case agreement across all genders
    and plural (написаний лист, написана книга, написане слово, написані листи).
  - Provide 3-4 sentence examples of oblique case usage (Genitive, Dative, Instrumental)
    to prove they decline.
  - Highlight and correct the common learner error of Agreement Mismatch (e.g., *двері
    відкритий* vs correct *двері відкриті*).
- section: Дієприкметник у контексті
  words: 600
  points:
  - Use an H3 to explain the attributive position (e.g., написаний лист) showing flexibility
    in word order (before or after the noun).
  - Use an H3 to explain the predicative position with the verb «бути» in past, present,
    and future (Лист був написаний, Лист написаний, Лист буде написаний).
  - Integrate the cultural hook proverb «Дарованому коню в зуби не заглядають» to
    demonstrate oblique case usage in authentic folklore.
  - Briefly contrast passive construction (Лист написаний мамою) with active voice
    (Мама написала лист) for recognition purposes only.
- section: Помилки та заборони
  words: 350
  points:
  - 'Explain the ''Active Participle Ban'' (заборона активних дієприкметників): Standard
    Ukrainian avoids -ючий/-ачий forms (*читаючий хлопець).'
  - 'Provide the correct Ukrainian alternative: using relative clauses with «який»
    («хлопець, який читає»).'
  - 'Frame this decolonized rule positively: Ukrainian is a dynamic, verb-driven language
    that prefers active action over static descriptions.'
  - Distinguish true participles from lexicalized adjectives like «відомий» and «знайомий».
- section: Практика
  words: 300
  points:
  - 'Provide a short matching checklist: forming participles from familiar verbs.'
  - Include a brief reading comprehension paragraph containing hidden participles
    for learners to identify.
  - 'End with a transition hook preparing learners for the next module: noticing impersonal
    -но/-то signs on the street.'
