slug: checkpoint-word-formation
title: 'Checkpoint: Word Formation'
word_target: 3000
content_outline:
- section: Огляд та місток до B1
  words: 400
  points:
  - 'Introduce the concept of morphological autonomy: how understanding word formation
    allows learners to deduce meaning without a dictionary.'
  - Use English scaffolding (Immersion band 2) to clearly define key Ukrainian linguistic
    terminology (корінь, префікс, суфікс, закінчення).
  - Assess baseline A2 skills, specifically the mechanics of aspect pairs, before
    introducing new B1 derivation patterns.
- section: Словотворчі префікси та дієслівний вид
  words: 700
  points:
  - 'Review State Standard §4.3.2: consolidate aspect pairs using directional and
    aspectual prefixes (робити – зробити, ділити – поділити).'
  - Demonstrate prefix substitution on a single root (e.g., писати -> написати, підписати,
    записати) to show how lexical meaning alters.
  - 'Address common errors: avoiding Surzhyk calques like ''співпадати'' (use ''збігатися''),
    while verifying correct forms like ''співробітник''.'
  - 'Integrate the Cultural Hook: explain the ''Вороженьки'' phenomenon and how the
    diminutive suffix -еньк conveys subtle emotional framing.'
- section: 'Суфіксальне багатство: -ння, -ість, -ач'
  words: 700
  points:
  - 'Introduce State Standard §4.3.4: the highly productive -ння suffix for forming
    verbal nouns (читання, навчання, життя) from actions.'
  - Correct the misuse of -к suffixes for processes (e.g., preferring 'розроблення'
    over the calqued 'розробка').
  - Define -ість for abstract qualities (радість, незалежність) and -ач for agent
    nouns (слухач, викладач).
  - Provide a clear 'action-to-noun' conversion drill using familiar A2 vocabulary.
- section: Ад’єктивні суфікси та родини коренів
  words: 700
  points:
  - 'Introduce State Standard §4.3.6: forming relational and national adjectives with
    -ний and -ський (осінь – осінній, Львів – львівський).'
  - Explain the nuanced semantic difference between general -ний and material/typological
    -овий.
  - 'Present the ''Root Flower'' visual concept: demonstrating how a central root
    spawns a family of nouns, verbs, and adjectives.'
  - 'Integrate the Cultural Hook: the creation of the word «мрія» by Mykhailo Starytsky,
    showcasing active word formation in Ukrainian history.'
- section: 'Підсумковий практикум: «Паляниця» та помилки'
  words: 500
  points:
  - Analyze the 'Паляниця' shibboleth, breaking down its root and the -иця suffix
    in a cultural and morphological context.
  - Conduct a comprehensive word breakdown exercise where learners deduce meanings
    of complex words purely by identifying morphemes.
  - Run a text-based mistake clinic to identify and correct wrong suffix calques and
    Surzhyk forms.
  - Provide a final visual summary table mapping the most productive A2/B1 prefixes
    and suffixes for future reference.
