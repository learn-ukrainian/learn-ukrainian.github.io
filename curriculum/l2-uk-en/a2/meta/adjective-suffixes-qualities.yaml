slug: adjective-suffixes-qualities
title: Adjective Suffixes — Qualities
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Establish the ''Temperature Scale'' concept in English (for Band 2 scaffolding):
    moving from Neutral (малий) to Warm (маленький) to Intense (малесенький).'
  - Explain that Ukrainian utilizes morphology (suffixes) rather than syntax ('very')
    for descriptiveness, signaling emotional intimacy rather than just physical size.
  - Highlight the cultural significance of 'пестливі форми' (diminutives) as a marker
    of respect and closeness (e.g., рідненька матуся).
- section: 'Презентація 1: Пестливість та периферія'
  words: 750
  points:
  - Create an H3 subsection for Diminutive Magic (-Еньк- and -Есеньк-), providing
    a clear table of base adjectives and their diminutive transformations with IPA
    on first occurrence.
  - Provide 5+ example sentences showing high-frequency conversational forms like
    «гарненька дівчина» and «тепленьке молоко».
  - Create an H3 subsection for the 'Register Mismatch' Trap, explaining in English
    the social faux pas of using diminutives in formal settings to ensure pragmatic
    competence.
- section: 'Презентація 2: Гіпербола та Відношення'
  words: 750
  points:
  - Create an H3 subsection for The Scale of Giants (-Енн- and -Езн-), using the cultural
    hook of Ukrainian storytelling (e.g., «страшенний змій»).
  - Provide a clear orthographic alert on the double 'н' (-енний) and stress shifts
    to differentiate emphatic adjectives from passive participles.
  - Create an H3 subsection introducing relational adjectives (-Н-, -Ян-, -Ов-) derived
    from nouns (осінь → осінній, дерево → дерев'яний) with a structured vocabulary
    table.
- section: Практика та орфографія
  words: 650
  points:
  - Create an H3 subsection for Mastering Consonant Mutation, explicitly teaching
    the K/Ch/Ts + -ськ- = -ЦЬК- and G/H/Z + -ськ- = -ЗЬК- rules.
  - Include a visual chart showing incorrect vs. correct spellings (e.g., козакський
    → козацький, пражський → празький).
  - Provide a guided 'Emotional Transformation Drill' section showing how to rewrite
    neutral Ukrainian sentences into warm/intense versions.
- section: Діалоги та підсумок
  words: 450
  points:
  - Write a 6-8 line situational dialogue set in a market illustrating the choice
    between size vs. affection (e.g., buying a «здоровенний кавун» vs. a «гарненький
    кавунчик»).
  - Provide a concluding summary emphasizing that mastering these suffixes is key
    to authentic, decolonized Ukrainian expression, moving away from English-style
    modifiers.
  - Ensure all summary points are within the 15-word sentence limit.
