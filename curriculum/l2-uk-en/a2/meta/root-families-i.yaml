slug: root-families-i
title: Root Families I
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Note for Band 2 Immersion (60-75%): Use English scaffolding exclusively for introducing
    the abstract ''Lego'' metaphor of word formation; use Ukrainian for all examples,
    transitions, and simple instructions.'
  - Introduce the 'Big 4' roots (ход-, пис-, чит-, бач-) as the DNA of A2 vocabulary,
    showing how mastering them unlocks hundreds of words without rote memorization.
  - Explain the modular nature of Ukrainian word formation where the root is the core
    block and prefixes act as semantic connectors.
- section: Родини ход- та пис-
  words: 700
  points:
  - 'Introduce the ''ход-'' (motion) family, teaching directional prefixes: в- (in)
    for ''вхід'', ви- (out) for ''вихід'', and пере- (across) for ''перехід''.'
  - Provide a dedicated H3 for the present tense conjugation of 'ходити' (ходжу, ходиш,
    ходить) to fulfill State Standard §4.2.3.1.
  - Introduce the 'пис-' (writing) family, linking it to the cultural icon 'писанка'
    (Easter egg) and the concept of decorating/painting.
  - Teach the aspectual pair 'писати / написати' (State Standard §4.3.2) and explicitly
    clarify that 'записати' means 'to record' (audio/video), not just 'to write down'.
- section: Родини чит- та бач-
  words: 700
  points:
  - Explore the 'чит-' (reading) family and derivatives like 'читати', 'прочитати',
    and 'читач', emphasizing how the suffix '-ач' denotes an agent/profession.
  - Introduce the 'бач-' (vision) family, analyzing 'бачення' (vision) and highlighting
    the cultural term 'побачення' (date) as a 'mutual seeing'.
  - 'Add a clear contrast block addressing the common learner error: strictly differentiate
    ''бачити'' (passive perception) from ''дивитися'' (active watching) with clear
    examples.'
- section: Фонетика та префікси
  words: 600
  points:
  - 'Explain the ''Кафе Птах'' (Kafka-Ptakh) euphony rule in English: the prefix ''з-''
    changes to ''с-'' before voiceless consonants к, п, т, ф, х.'
  - Directly address the common error 'зходити' by drilling the correct form 'сходити',
    showing the practical application of the euphony rule.
  - Present the semantic logic of prefixes (в-, ви-, при-, під-) and include a 'Guessing
    Machine' challenge where learners predict meanings of new words (e.g., при- +
    хід = arrival).
- section: Практичне застосування
  words: 600
  points:
  - Provide a 'Root Identification Challenge' drill for learners to extract core roots
    from complex words (e.g., finding 'пис' in 'письменник').
  - Present a contextual dialogue set in a library or bookstore written entirely in
    Ukrainian, using target vocabulary ('читач', 'письменник', 'опис').
  - Include an exercise practicing aspectual pairs ('писати / написати', 'виходити
    / вийти') and the correct contextual use of 'записати'.
