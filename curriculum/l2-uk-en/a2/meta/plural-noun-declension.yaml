slug: plural-noun-declension
title: Plural Noun Declension
word_target: 3000
content_outline:
- section: 'Вступ: Множина — не тільки -и/-і'
  words: 300
  points:
  - 'Immersion Band 1 (50-60%): Explicitly note that English scaffolding is used for
    explaining the complex plural case theory, while all dialogues, instructions,
    and examples remain in Ukrainian.'
  - 'Hook the learner: Emphasize why mastering plural cases is essential for daily
    life tasks like buying multiple tickets, managing money, and counting groups of
    people.'
  - Introduce the reality that plural nouns change for all 7 cases, presenting it
    as a predictable and elegant system rather than a chaotic obstacle.
- section: Називний множини
  words: 500
  points:
  - Provide a dedicated H3 for regular Nominative plural endings (-и, -і, -а, -я)
    with a comprehensive summary table.
  - Provide a dedicated H3 for consonant alternations (г→з, к→к, х→с) with side-by-side
    examples (e.g., друг → друзі).
  - Provide a dedicated H3 detailing common irregular and suppletive plurals (людина
    → люди, дитина → діти).
  - Include 5+ authentic Ukrainian example sentences using these plural forms in context.
- section: Родовий множини
  words: 700
  points:
  - 'Provide a dedicated H3 defining the triggers for Genitive Plural: numbers 5+,
    quantity words (багато, кілька), and negation (немає).'
  - Provide a dedicated H3 for Masculine endings (-ів/-їв vs. zero ending) with clear
    rules.
  - Provide a dedicated H3 for Feminine and Neuter zero endings, explicitly teaching
    stress shifts (рука → рук) and fleeting vowels (вікно → вікон).
  - Provide a dedicated H3 highlighting the most frequent irregular Genitive Plural
    forms (грошей, людей, дітей).
- section: Давальний, Знахідний, Орудний, Місцевий множини
  words: 700
  points:
  - Provide a dedicated H3 for Dative plural, showing the highly regular -ам/-ям endings
    across all genders.
  - Provide a dedicated H3 for Accusative plural, explicitly contrasting animate (equals
    Genitive) and inanimate (equals Nominative) nouns.
  - Provide a dedicated H3 for Instrumental plural (-ами/-ями), showing examples of
    means and accompaniment.
  - Provide a dedicated H3 for Locative plural (-ах/-ях), emphasizing its mandatory
    use with prepositions (у/в, на).
- section: Кличний множини та зведена таблиця
  words: 400
  points:
  - Provide a dedicated H3 for Vocative plural, emphasizing its cultural importance
    for direct address (друзі! діти! панове!).
  - Provide a dedicated H3 featuring a comprehensive master paradigm table for all
    7 plural cases side-by-side.
  - Include a visual or mnemonic summary separating the highly regular cases (Dat,
    Inst, Loc) from the complex ones (Nom, Gen).
- section: Практика
  words: 400
  points:
  - Provide a dedicated H3 for a 'shopping and travel' scenario targeting Genitive
    plural with numbers and quantities.
  - Provide a dedicated H3 with a short dialogue focusing on Accusative and Locative
    plural (describing destinations and things seen).
  - Provide a dedicated H3 featuring an error-correction drill where learners must
    fix 5 common mistakes with plural case endings.
