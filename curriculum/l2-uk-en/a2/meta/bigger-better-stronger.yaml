slug: bigger-better-stronger
title: Bigger, Better, Stronger
word_target: 2000
content_outline:
- section: 'Вступ: Арена порівняння'
  words: 500
  points:
  - 'Note: English scaffolding required for introductory grammar concepts.'
  - Introduction of the 'Sports Commentator' persona setting the stage for comparing
    objects and people.
  - Introduce the philosophical concept of comparison via proverbs (e.g., 'Добре слово
    краще, ніж готові гроші').
  - Explicitly address the 'більш кращий' double comparative error, establishing the
    rule of using either synthetic or analytic forms.
- section: 'Презентація: Творення ступенів'
  words: 800
  points:
  - 'Note: English scaffolding required for explaining suffixes and alternations.'
  - Explain regular formation using suffixes -іший and -ший with clear examples.
  - Detail mandatory stem alternations (г→ж, к→ч, х→ш) with words like 'дорожчий',
    'ближчий', 'тихіший'.
  - Provide 'The Big 10' irregular/suppletive comparatives (великий-більший, гарний-кращий,
    поганий-гірший).
- section: 'Структури порівняння: ніж vs за'
  words: 700
  points:
  - 'Note: English scaffolding required for case explanations.'
  - Contrast 'ніж' + Nominative vs 'за' + Accusative.
  - Highlight and correct the common error of using Nominative after 'за' (e.g., correcting
    'за я' to 'за мене').
  - Introduce intensifiers (набагато, трохи, значно) to add nuance to comparisons.
- section: 'Практика: Рекорди України'
  words: 600
  points:
  - Situational drills comparing landmarks (e.g., Kyiv TV Tower vs Eiffel Tower) using
    comparative forms.
  - Retail comparisons using vocabulary like 'більший розмір' and 'краща якість'.
  - Transformation exercises converting positive adjectives to comparatives, focusing
    on sports context (швидкий→швидший).
- section: Діалоги та Висновки
  words: 400
  points:
  - Market commentary dialogue applying comparative vocabulary and structures in a
    practical context.
  - Natural conversation examples using age comparisons (старший за віком, молодший
    брат).
  - Final summary of consonant shifts and 'ніж/за' case rules.
