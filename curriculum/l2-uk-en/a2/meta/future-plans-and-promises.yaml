slug: future-plans-and-promises
title: Future Plans and Promises
word_target: 3000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Note for Band 1 Immersion: Explicitly use English scaffolding to outline the
    abstract difference between process and result in the future tense.'
  - Introduce the cultural proverb «Обіцянка — цяцянка, а дурневі — радість» to emphasize
    the weight of future commitments in Ukrainian culture.
  - Explain the concept of «тримати слово» (keeping one's word) as a strong motivation
    for mastering aspectual precision.
- section: 'Презентація: Доконаний вид'
  words: 700
  points:
  - Explain the formation of the Simple Future (conjugated perfective verbs like 'скажу',
    'поборю') using English for clarity.
  - 'Address the ''Aspect Mismatch'' error explicitly: emphasize why the auxiliary
    «буду» can never be paired with a perfective infinitive.'
  - Highlight the semantic power of the perfective future (e.g., «напишу», «прийду»)
    functioning as a firm promise or a guarantee of a finished action.
- section: 'Презентація: Недоконаний вид'
  words: 600
  points:
  - Teach the compound future «буду + infinitive» for imperfective verbs, emphasizing
    duration and ongoing processes.
  - Contrast process-oriented marker phrases («буду читати») with result-oriented
    markers («прочитаю») to clarify speaker intent.
  - Include a pedagogical warning against the 'Overuse of Буду' as a shortcut, encouraging
    perfective conjugations for specific promises.
- section: Практика та діалоги
  words: 700
  points:
  - Present situational dialogues comparing weekend plans (process) versus solemn
    promises (result).
  - Integrate the proverb «Обіцяного три роки ждуть» to discuss cultural expectations
    and delayed fulfillment.
  - Provide a drill transforming process-oriented plans into result-oriented promises
    based on different conversational contexts.
- section: Висновок та застосування
  words: 500
  points:
  - 'Summarize structural differences clearly: ''I will do'' (result = one word: зроблю)
    vs. ''I will be doing'' (process = two words: буду робити).'
  - 'Set up a production task: Drafting a response to a friend''s invitation using
    at least three specific perfective future promises.'
  - Reflect on how the choice of aspect in the future tense demonstrates the speaker's
    agency and reliability.
