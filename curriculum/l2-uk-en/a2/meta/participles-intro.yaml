slug: participles-intro
title: Introduction to Participles
word_target: 3000
content_outline:
- section: 'Вступ: Дієприкметники навколо нас'
  words: 450
  points:
  - 'Band 3 Immersion (75-90%): Write this section almost entirely in Ukrainian, using
    simple language to explain that participles are everywhere.'
  - Hook the learner by pointing out that signs, labels, and instructions constantly
    use participles (e.g., 'open', 'closed', 'busy').
  - 'Explain the functional goal: we are focusing on recognizing high-frequency ''adjectival''
    participles rather than complex grammatical generation.'
- section: Дієприкметники минулого часу
  words: 850
  points:
  - Define past passive participles (дієприкметники минулого часу) in Ukrainian, explaining
    their formation using -ний and -тий suffixes from perfective verbs.
  - 'Detail agreement rules: participles decline exactly like adjectives in gender,
    number, and case. Provide clear examples in a table (e.g., написаний лист, написана
    книга, написане слово, написані листи).'
  - Explicitly address the 'Agreement Mismatch' error, warning learners that participles
    must match the noun.
  - Provide a dedicated H3 for high-utility vocabulary like «зайнятий», «зламаний»,
    «забутий», using them in context.
- section: Безособові форми на -но, -то
  words: 650
  points:
  - Explain short impersonal forms (-но, -то) and their predicative function in public
    signage and administrative style.
  - Highlight the nuance between general states (закритий) and specific actions/signs
    (зачинено).
  - 'Cultural deep dive: Explore the «Зроблено в Україні» branding initiative as a
    ubiquitous, patriotic example of the -но form.'
- section: 'Дієприслівники: Одночасна та попередня дія'
  words: 650
  points:
  - Define gerunds (дієприслівники) as verbal adverbs that describe how or when an
    action happens.
  - Explain present gerunds (-ючи/-ачи) for simultaneous actions and past gerunds
    (-вши/-ши) for completed prior actions.
  - 'Teach the ''Golden Rule of Gerunds'': the gerund subject must match the main
    verb subject to prevent dangling gerunds.'
  - Use the proverb «Скінчивши діло — гуляй сміло» as the core example for past gerunds.
- section: Помилки та Культурний контекст
  words: 400
  points:
  - 'Enforce the ''Active Participle Ban'': strictly instruct learners to avoid -ючий
    forms as adjectives (calqued from Russian/English) and to use relative clauses
    («хлопець, який читає») instead.'
  - Analyze the proverb «Дарованому коню в зуби не заглядають» to demonstrate how
    participles decline in different cases (dative).
  - Provide a brief summary distinguishing adjectives from adverbial descriptors.
