slug: aspect-mastery-pairs
title: Aspect Mastery — Pairs
word_target: 2000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Note for Band 1 Immersion: Use English to explain the conceptual difference between
    process and result, but provide all examples in Ukrainian.'
  - 'Introduce the module''s goal: moving from simple recognition to automated high-frequency
    application of perfective and imperfective pairs.'
  - Provide a visual decision tree (Mermaid diagram) for aspect choice based on temporal
    markers (зараз vs завтра).
- section: Презентація
  words: 700
  points:
  - 'Detail the Core Taxonomy of aspect formation: Prefixation (мити-помити), Suffixation
    (розповідати-розповісти), and Suppletive forms (брати-взяти).'
  - Address prefix overgeneralization, specifically correcting the overuse of 'з-'
    with examples like намалювати and помити.
  - Explain the difference between compound future (буду писати) and simple perfective
    future (напишу).
- section: Практика
  words: 700
  points:
  - Present rapid-fire choice drills based on temporal markers (часто, довго vs раптом,
    вже).
  - 'Integrate the Borscht cultural hook: describe the cooking process using strings
    of perfective verbs (купив, помив, приготував).'
  - Address and correct process/result confusion (e.g., using perfective with duration
    markers like 'дві години').
- section: Діалоги
  words: 600
  points:
  - Introduce the 'Toloka' cultural hook through a dialogue about communal building,
    contrasting ongoing effort with the finished house.
  - Showcase authentic sequential perfective verbs in the context of the house-building
    ritual (вибрати місце, залишити зерно).
  - Ensure dialogues use high-frequency household and social verbs.
- section: Підсумок
  words: 500
  points:
  - Dedicate a subsection to avoiding the 'Present-Perfective Trap' (explaining that
    perfective forms cannot be used for present tense actions).
  - Provide a high-frequency mastery checklist using top verbs (купувати, дзвонити,
    знаходити, забувати).
  - Summarize the decision logic for aspect choice in 3 simple rules.
