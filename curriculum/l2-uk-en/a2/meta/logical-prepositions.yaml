slug: logical-prepositions
title: Logical Prepositions
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - Note English scaffolding requirements for grammar explanations (50-60% immersion
    band)
  - Introduce the transition from spatial (a2-07) to abstract logical prepositions
    (reason, purpose, topic)
  - Define causality ('тому що', 'бо') vs purpose ('щоб', 'для') with simple examples
    per State Standard §4.4.2
- section: 'Презентація: Причина та Мета'
  words: 800
  points:
  - 'Explain ''для'' vs ''без'' (Genitive) using high frequency collocations: для
    мене, для здоров''я (per §4.2.2.2.2); без цукру, без проблем'
  - Contrast 'через' (obstacle) vs 'завдяки' (success factor) with clear sentence
    pairs ('через затори' vs 'завдяки підтримці')
  - 'Introduce ''про'' + Accusative for object relations per §4.2.2.4.2: ''думати
    про'', ''знати про'''
  - Explain 'від' (from a person) vs 'з' (from a location) logic with clear examples
  - 'Provide a table of logical connectors: ''тому що'', ''бо'' and ''щоб'' for sentence
    building'
- section: Культурний контекст та логічні пастки
  words: 400
  points:
  - Discuss 'піти по хліб' (purpose) vs 'піти за хлібом' (spatial) to highlight Ukrainian
    precision
  - 'Address the ''із-за'' vs ''через'' error: enforce ''через'' for ''because of''
    and explain why it is incorrect to use ''із-за'' for cause'
  - 'Address duration logic: correct ''протягом''/''упродовж'' vs the calque error
    ''на протязі'' (in a draft)'
- section: 'Практика: Час та Відносини'
  words: 800
  points:
  - Explain time prepositions 'о/об' vs 'після' focusing on clock time logic ('о 10
    годині')
  - Analyze a short reading (The Letter) focusing on identifying connectors like 'через
    це', 'для того щоб'
  - 'Provide transformation drills: convert ''тому що'' clauses into ''через'' + Genitive
    phrases'
  - Drill case selection with 'крім', 'замість', 'щодо' using Genitive endings in
    abstract contexts
- section: Діалоги та підсумок
  words: 600
  points:
  - Present 'At the Pharmacy' dialogue applying 'для здоров'я', 'після їжі', 'від
    кашлю'
  - Present 'Planning a Trip' dialogue using 'через погоду', 'завдяки плануванню',
    'протягом тижня'
  - Summarize 'через' vs 'завдяки' as positive/negative framing tools in communication
