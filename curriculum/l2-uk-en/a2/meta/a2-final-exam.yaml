slug: a2-final-exam
title: A2 Final Exam
word_target: 2000
content_outline:
- section: 'Вступ: Огляд іспиту (Overview / Огляд)'
  words: 450
  points:
  - Explicitly outline the Ukrainian 12-point school grading scale and the 100-point
    ECTS university scale, providing cultural context for exams.
  - List scaffolding requirements and state the immersion level (75-90% Ukrainian)
    for the final exam.
  - Introduce core vocabulary for testing and knowledge acquisition (вчити, вивчати,
    вчитися).
- section: 'Навичка 1: Майстерність відмінків (Case System Mastery)'
  words: 700
  points:
  - Provide a comprehensive review table of the cases needed for academic contexts
    (Genitive, Dative, Accusative, Instrumental).
  - Contrast 'відповідати на питання' (verb + Accusative) with 'відповідати викладачу'
    (verb + Dative) with clear examples.
  - Detail the case government for 'готуватися до іспиту' (Genitive) and 'цікавитися
    результатом' (Instrumental).
- section: 'Навичка 2: Вид дієслова — Процес чи результат? (Verb Aspect)'
  words: 700
  points:
  - Define the difference between 'процес' (imperfective) and 'результат' (perfective)
    in an exam context.
  - 'Provide explicit contrastive examples: ''я складав іспит'' (taking/process) vs
    ''я склав іспит'' (passed/result).'
  - Explain how using the imperfective implies the outcome is unknown or incomplete.
- section: 'Навичка 3: Навігація до екзаменаційного центру (Navigation)'
  words: 550
  points:
  - Create a mini-dialogue for navigating a university campus or school building using
    'ліворуч, праворуч, прямувати'.
  - Incorporate vocabulary for finding the ZNO (ЗНО) or NMT (НМТ) testing center.
  - Include directions using imperatives and motion verbs.
- section: 'Інтеграційне завдання: Культура іспитів (Integration Challenge)'
  words: 600
  points:
  - Emphasize the cultural and linguistic importance of using 'скласти іспит' instead
    of the Russism 'здати іспит'.
  - Discuss the role of ZNO/NMT as an anti-corruption standard in modern Ukraine.
  - Present a simulated dialogue discussing exam results ('висока оцінка' vs 'провалити
    іспит') using all integrated skills.
