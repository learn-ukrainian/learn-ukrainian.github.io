slug: the-instrumental-i-accompaniment
title: The Instrumental I — Accompaniment
word_target: 3000
content_outline:
- section: 'Вступ: Сьомий відмінок і гармонія'
  words: 350
  points:
  - Introduce the Instrumental Case (Орудний відмінок) as the 'relationship case'.
  - 'Define the key questions: Ким? Чим? (With whom? With what?).'
  - 'Cultural Hook: ''Хліб і сіль'' (Bread and Salt) — meeting guests with hospitality.'
  - Explain the core concept of 'Accompaniment' (Спільність дії) using the preposition
    'з'.
  - 'Immersion Note: English used for definitions; Ukrainian for cultural context
    and examples.'
- section: 'Презентація: Форми та Енфонія'
  words: 1100
  points:
  - 'Master Table: Instrumental noun endings by gender (Hard/Soft groups).'
  - 'Masculine: -ом / -ем / -єм (брат → братом, водій → водієм).'
  - 'Feminine: -ою / -ею / -єю (сестра → сестрою, мрія → мрією).'
  - 'Euphony Rules: When to use ''з'', ''із'', ''зі'' (avoiding consonant pile-ups).'
  - 'Drill: ''Зі мною'' (With me) — specific focus on the pronoun ''я'' in instrumental.'
- section: 'Практика: Соціальні зв''язки'
  words: 850
  points:
  - 'Social Verbs: гуляти, розмовляти, зустрічатися, вітатися.'
  - 'Structure: Verb + з + Instrumental Noun (Я гуляю з собакою).'
  - 'Nuance: ''Друг'' vs ''Приятель'' — defining levels of friendship in Ukraine.'
  - 'Common Expression: ''Разом з...'' (Together with...) for emphasis.'
  - 'Contrast: Doing something alone (сам/сама) vs with someone (з кимось).'
- section: 'Діалоги: Зустрічі та плани'
  words: 700
  points:
  - 'Scenario 1: Planning a weekend walk (Informal — friends).'
  - 'Scenario 2: Business meeting arrangements (Formal — colleagues).'
  - 'Dialogue Breakdown: Highlighting usage of ''з/зі'' and case endings in context.'
  - 'Learner Error Focus: Correcting ''Я говорю директор'' to ''Я говорю з директором''.'
