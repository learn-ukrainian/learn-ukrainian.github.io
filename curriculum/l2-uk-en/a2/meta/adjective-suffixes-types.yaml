slug: adjective-suffixes-types
title: Adjective Suffixes — Types
word_target: 2000
content_outline:
- section: Вступ
  words: 450
  points:
  - 'Explicitly outline English scaffolding boundaries: English will be used to explain
    the mutation rules and suffix logic, while Ukrainian will be used for all examples
    and dialogues.'
  - Introduce the concept of transforming nouns into adjectives to describe identity,
    origin, and material.
  - Highlight the word «дерев'яний» (wooden) as a bridge between the physical material
    and cultural meaning, with high-frequency collocations (дерев'яний стіл, дерев'яна
    ложка).
- section: 'Презентація: Матеріали та походження'
  words: 850
  points:
  - 'Detail the logic for material suffixes: -ян- for natural/traditional (вовняний,
    скляний) vs -ов- for processed/standard (металевий, пластиковий).'
  - Explain the origin suffixes -ськ-, focusing on major cities (київський, львівський)
    and their cultural collocations (київський торт, львівська кава).
  - Break down the 'Big Three' consonant mutations (к/ч/ц -> цьк, г/ж/з -> зьк, х/ш/с
    -> ськ) using clear tables and the mnemonic 'Прага -> Празький'.
  - Provide heuristics for selecting -ов- vs -ев- based on hard/soft stems (дубовий
    vs польовий) and highlight the high-frequency exception «домашній».
- section: 'Культурний контекст: Традиційні вироби'
  words: 600
  points:
  - 'Describe the Яворівська забавка (Yavoriv toy): emphasize its material «осика»
    (aspen wood) and its cultural role as a talisman decorated with «вербівка» patterns.'
  - 'Describe the Гуцульський ліжник (Hutsul blanket): explain the use of «овеча вовна»
    (sheep''s wool) and its therapeutic ''biting'' texture.'
  - Ensure decolonized framing by presenting these crafts as continuous, living Ukrainian
    traditions, entirely distinct from Soviet-era mass production.
- section: Практика та аналіз помилок
  words: 700
  points:
  - 'Design targeted drills for material conversion: practice converting nouns to
    adjectives like скло -> скляний, залізо -> залізний.'
  - Create a 'City-to-Adjective mutation challenge' to specifically practice the Big
    Three mutations and prevent the common non-mutated *Прагський error.
  - Include drills contrasting hard and soft stems for -ов-/-ев- selection to reinforce
    the phonetic rules and prevent stress-dependent confusion.
- section: Діалог та продукція
  words: 400
  points:
  - Draft a mini-dialogue set at a handicraft fair where characters discuss materials
    using the target vocabulary (яворівська забавка, ліжник).
  - Provide a production prompt asking learners to describe their home city and favorite
    traditional items using -ськ- and material suffixes.
