slug: checkpoint
title: Checkpoint
word_target: 2000
content_outline:
- section: Вступ та цілі
  words: 300
  points:
  - 'Note on immersion: English will be used selectively to explain complex syntax
    rules, while health and medical scenarios will be fully in Ukrainian.'
  - 'Define the module''s goals: describing physical states, navigating pharmacy interactions,
    and building complex logical sentences.'
- section: 'Навичка 1: Синтаксис логіки: Причина та Мета'
  words: 850
  points:
  - Explain cause and effect using 'тому що', 'бо', and 'через'. Detail the register
    difference, emphasizing 'бо' for natural conversational speech.
  - Teach the logic of intent with 'щоб' + infinitive and 'щоб' + past tense, using
    clear medical context examples (e.g., taking medicine to get better).
  - Provide a targeted drill to correct the common learner error of confusing 'щоб'
    (in order to) with 'що б' (what would).
- section: 'Навичка 2: Опис та послідовність дій'
  words: 850
  points:
  - Introduce the relative pronoun 'який' to define nouns. Provide a rule table demonstrating
    gender, number, and case agreement with the antecedent noun.
  - Teach time coordination for sequencing health-related events using 'коли', 'поки',
    and 'після того як'.
  - Show how mastering these complex clauses prepares learners for advanced B1 conditional
    structures.
- section: 'Навичка 3: Медицина, тіло та народні методи'
  words: 700
  points:
  - Introduce core anatomy vocabulary (голова, горло, живіт, рука/нога) and practice
    expressing pain using Accusative and Genitive cases.
  - 'Detail pharmacy interactions: explicitly correct the false friend translation
    ''брати ліки'' to the natural ''приймати ліки'' or ''пити ліки''.'
  - 'Cultural Hook: Present a reading/dialogue about traditional Ukrainian cold treatments
    featuring калина (viburnum), малина (raspberry), and мед (honey).'
- section: 'Навичка 4: Практичне застосування та підсумок'
  words: 300
  points:
  - Present a comprehensive medical consultation dialogue that integrates causality,
    purpose, and relative clauses.
  - 'Cultural Hook: Explain the linguistic and cultural significance of the toast
    «Будьмо!» as a wish for health and vitality.'
  - Summarize the grammar and vocabulary achievements of the checkpoint.
