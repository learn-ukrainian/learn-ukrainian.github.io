slug: preferences-and-choices
title: Preferences and Choices
word_target: 2000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Note: Band 1 immersion (50-60%). English scaffolding is required here to introduce
    Dative logic and grammar expectations.'
  - Introduce the Lviv Coffee Culture cultural hook. Discuss the ritual of choosing
    coffee, introducing 'філіжанка кави' and 'кава на піску'.
  - 'Introduce the ''Would Like'' lexical bridge: ''я хотів би / я хотіла би'' as
    a high-frequency polite chunk for making requests without deep conditional theory.'
- section: Презентація
  words: 950
  points:
  - Explain Dative Experiencer Logic for 'Мені подобається' (State Standard §4.2.2.3).
    Clearly state the object is in Nominative and the experiencer is in Dative.
  - 'Address common errors: specifically warn against ''Я подобається'' (Nominative
    overload) and ''Мені подобається книжку'' (Object Case Error).'
  - 'Analyze Intensity Mismatch: Distinguish between ''любити'' (deep affection) and
    ''подобатися'' (immediate liking/aesthetic preference).'
  - 'Introduce Comparison Mechanics: Explain comparative structures ''краще ніж''
    (§4.3.1) and clarify ''краще'' as both adjective and adverb.'
  - Present 'віддавати перевагу' for formal or deliberate preferences compared to
    spontaneous 'подобатися'.
- section: Практика
  words: 700
  points:
  - 'Design Transformation Drills: Switch between ''Я люблю'' + Accusative and ''Мені
    подобається'' + Nominative.'
  - 'Simulate Decision-Making Scenarios: Restaurant or store contexts enforcing Dative
    experiencer logic.'
  - 'Execute Comparative Scale Drills: Weigh options using ''краще ніж'', ''більш
    солодкий'' to build qualitative comparison competence.'
- section: Діалоги
  words: 550
  points:
  - Create a situational dialogue about choosing a gift/activity, integrating the
    proverb 'На колір і смак товариш не всяк'.
  - Ensure dialogue uses polite refusal and preference markers like 'Дякую, але я
    б вибрав...' or 'Мені це не дуже подобається'.
  - Keep the dialogue 100% in Ukrainian (with English translation ONLY if necessary
    for scaffolding) to support immersion.
- section: Підсумок
  words: 400
  points:
  - 'Recap the Dative Subjectivity rule: recalibrate the ''I like'' mental model to
    ''To me is pleasing'' to prevent English-to-Ukrainian transfer errors.'
  - Summarize vocabulary and comparative forms (краще, більш/менш).
  - Provide a final self-check on Dative pronouns and simple comparison forms.
