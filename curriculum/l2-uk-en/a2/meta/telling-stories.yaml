slug: telling-stories
title: Telling Stories
word_target: 2000
content_outline:
- section: Вступ
  words: 500
  points:
  - 'Band 2 Immersion Note: Use English briefly to explain the abstract goal of narrative
    cohesion, then transition to Ukrainian.'
  - Explain the transition from listing isolated events to building a cohesive narrative
    (State Standard §1.4.1.1.1).
  - 'Introduce the ''Robot Style'' problem: explain why learners shouldn''t overuse
    «і» (and) for every action.'
  - 'Cultural Hook: Introduce the ''Казкар'' (Village Storyteller) and the importance
    of oral tradition in Ukrainian culture.'
- section: 'Презентація: Дорожні знаки часу'
  words: 700
  points:
  - 'Introduce the core sequencing markers: «спочатку», «потім», «нарешті» using a
    ''Timeline Road'' visual metaphor.'
  - 'Explain the critical difference between «спочатку» (adverb: at first) and «з
    початку» (prepositional phrase: from the start) with clear examples.'
  - 'Teach word order: explicitly instruct learners to place time markers at the beginning
    of the sentence, avoiding the trailing English ''afterwards'' structure.'
- section: 'Презентація: Драма та несподіванки'
  words: 600
  points:
  - 'Introduce ''Plot Twist'' markers: «раптом» (suddenly) and «несподівано» (unexpectedly)
    to add tension to a story.'
  - 'Explain relative time markers: «раніше» (earlier), «давно» (long ago), «недавно»
    (recently).'
  - Teach the traditional narrative register and the fairytale opening formula «Жили-були...».
- section: 'Практика: Сміхова культура'
  words: 600
  points:
  - Contextualize the practice exercises within Ukrainian 'Сміхова культура' (Laughter
    culture) using the 'анекдот' format.
  - 'Robot Style Correction Drill: Have learners rewrite a chaotic morning routine
    by replacing chains of «і» with varied sequencing connectors.'
  - Provide minimal pair practice sentences to firmly distinguish «спочатку» vs. «з
    початку» in context.
- section: Продукція та підсумок
  words: 600
  points:
  - 'Production Task: Prompt learners to write a short fishing story or travel adventure
    using at least five different sequencing markers in the correct sentence position.'
  - Summarize the role of the Storyteller persona and how these 'road signs' make
    a story engaging.
  - 'Provide a learner checklist: Did I avoid ''і'' chains? Are my time markers at
    the start? Did I use a ''Plot Twist'' marker?'
