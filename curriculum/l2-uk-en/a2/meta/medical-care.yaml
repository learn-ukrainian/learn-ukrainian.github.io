slug: medical-care
title: Medical Care
word_target: 3000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Set immersion explicitly: Band 3 (75-90% Ukrainian). Prose must be predominantly
    in Ukrainian.'
  - 'Introduce the Ukrainian primary healthcare system: explain the ''декларація з
    сімейним лікарем'' (declaration with a family doctor) and the use of ''електронне
    направлення''.'
  - Highlight the cultural imperative of wearing 'бахіли' (shoe covers) in clinics.
  - Briefly review the verb 'боліти' and essential body parts from previous modules
    to set the context.
- section: Запис на прийом
  words: 600
  points:
  - 'Introduce vocabulary for making an appointment: ''записатися на прийом'', ''через
    Helsi'', ''зателефонувати в реєстратуру''.'
  - Create a mini-dialogue demonstrating a phone call to a clinic, focusing strictly
    on the formal 'Ви' register and polite medical etiquette.
  - Explain the difference between emergency care ('швидка допомога', 103) and routine
    care ('викликати лікаря додому').
- section: Медична консультація
  words: 1000
  points:
  - 'Detail the doctor''s standard opening questions: ''Що вас турбує?'', ''На що
    скаржитеся?''.'
  - Create a dedicated H3 to drill the pattern 'У мене болить + [Nominative]'. Explicitly
    warn against and correct the common learner error of using 'боліти' transitively
    ('Я болю голову').
  - 'Provide a table or list of medical imperatives used during physical examinations:
    ''дихайте'', ''не дихайте'', ''відкрийте рот'', ''покажіть язик''.'
  - Create a dedicated H3 for expressing general physical states using the Dative
    case ('Мені погано', 'Мені краще', 'Йому боляче'). Provide 5+ varied examples.
  - 'Introduce vocabulary for medical measurements and tests: ''міряти температуру'',
    ''вимірювати тиск'', ''здати аналізи''.'
- section: Діагноз та лікування
  words: 600
  points:
  - 'Introduce diagnosis vocabulary: ''поставити діагноз'', ''застуда'', ''грип'',
    ''отруєння'', ''алергія''.'
  - Include a 'False Friend' warning box specifically for 'ангіна' (tonsillitis, NOT
    a heart attack).
  - 'Explain prescription terminology: ''виписати рецепт'', ''приймати ліки''. Explicitly
    distinguish ''рецепт'' (prescription) from ''чек'' (receipt).'
  - 'Provide clear instructions on dosage and timing: ''двічі на день'', ''до/після
    їжі''.'
- section: Підсумок та народні засоби
  words: 400
  points:
  - 'Explain administrative vocabulary: ''взяти лікарняний'' (sick leave certificate)
    and its bureaucratic importance.'
  - Provide a cultural insight box (in Ukrainian) about 'Народна медицина' (folk medicine),
    discussing how Ukrainians treat minor colds at home with 'чай з калиною' or 'малиною'.
  - 'Write a concluding narrative summary that integrates all steps of the medical
    journey: feeling unwell, booking an appointment, wearing shoe covers, the examination,
    receiving a prescription, and recovering.'
