    - ми
    - їдемо
    - до
    - вокзалу
    answer: Потім ми їдемо до вокзалу.
  - words:
    - Вона
    - записалася
    - до
    - лікаря
    answer: Вона записалася до лікаря.
  - words:
    - Я
    - зайнятий
    - до
    - шостої
    answer: Я зайнятий до шостої.
  - words:
