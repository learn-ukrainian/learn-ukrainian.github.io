inline:
  - id: act-1
    type: quiz
    title: Хтось чи щось?
    instruction: Оберіть слово, яке найкраще підходить до контексту.
    items:
      - question: "___ телефонував, але я не знаю хто."
        options:
          - "Хтось"
          - "Ніхто"
          - "Будь-де"
        correct: 0
        explanation: "Є реальний дзвінок, але людина невідома."
      - question: "Я ___ залишив у класі: можливо, зошит."
        options:
          - "щось"
          - "ніхто"
          - "десь"
        correct: 0
        explanation: "Йдеться про невідому річ."
      - question: "___ тут була моя сумка, але зараз я її не бачу."
        options:
          - "Десь"
          - "Ніде"
          - "Кимось"
        correct: 0
        explanation: "Мовець пам'ятає приблизне місце."
      - question: "Ми ___ вже говорили про це."
        options:
          - "колись"
          - "ніде"
          - "будь-хто"
        correct: 0
        explanation: "Колись означає невідомий або неточний час у минулому."
      - question: "Вона розмовляє з ___."
        options:
          - "кимось"
          - "чомусь"
          - "десь"
        correct: 0
        explanation: "Після з потрібна орудна форма: з кимось."
      - question: "Я чекаю ___ біля входу."
        options:
          - "когось"
          - "комусь"
          - "кимось"
        correct: 0
        explanation: "Чекати кого? - когось."
      - question: "Треба ___ допомогти."
        options:
          - "комусь"
          - "когось"
          - "кимось"
        correct: 0
        explanation: "Допомагати кому? - комусь."
      - question: "Він ___ засмутився, але не пояснив чому."
        options:
          - "чомусь"
          - "когось"
          - "будь-де"
        correct: 0
        explanation: "Чомусь тут означає 'for some reason'."
  - id: act-2
    type: group-sort
    title: Яка серія?
    instruction: Розподіліть слова за значенням серії.
    groups:
      - label: "-сь: невідоме, але конкретне"
        items:
          - "хтось"
          - "щось"
          - "десь"
          - "колись"
      - label: "будь-: без обмеження"
        items:
          - "будь-хто"
          - "будь-що"
          - "будь-де"
          - "будь-коли"
      - label: "де-: частина групи"
        items:
          - "дехто"
          - "дещо"
          - "деякий"
          - "деколи"
      - label: "ні-: заперечення"
        items:
          - "ніхто"
          - "ніщо"
          - "ніде"
          - "ніколи"
  - id: act-3
    type: true-false
    title: Подвійне заперечення
    instruction: Визначте, чи речення граматично правильне.
    items:
      - statement: "Ніхто не прийшов."
        answer: true
        explanation: "Заперечний займенник і не при дієслові - правильна норма."
      - statement: "Ніхто прийшов."
        answer: false
        explanation: "Потрібно: Ніхто не прийшов."
      - statement: "Я нічого не чув."
        answer: true
        explanation: "Нічого вимагає не при дієслові."
      - statement: "Ми ніде були."
        answer: false
        explanation: "Потрібно: Ми ніде не були."
      - statement: "Вона ніколи не запізнюється."
        answer: true
        explanation: "Ніколи не - правильна модель."
      - statement: "Я нікому не телефонував."
        answer: true
        explanation: "Давальна форма нікому працює з не."
      - statement: "Вони нічим допоможуть."
        answer: false
        explanation: "Потрібно: Вони нічим не допоможуть або Це нічим не допоможе."
      - statement: "Нікого немає вдома."
        answer: true
        explanation: "Немає вже містить заперечення."
  - id: act-4
    type: fill-in
    title: Ні з ким, ні про що
    instruction: Оберіть правильне написання з прийменником.
    items:
      - sentence: "Я ___ не говорив."
        answer: "ні з ким"
        options:
          - "ні з ким"
          - "нізким"
          - "ні ким"
        explanation: "З прийменником з частка ні пишеться окремо."
      - sentence: "Вона ___ не дзвонила."
        answer: "ні до кого"
        options:
          - "ні до кого"
          - "нідокого"
          - "ні до хто"
        explanation: "Після до потрібна родова форма кого."
      - sentence: "Ми ___ не домовлялися."
        answer: "ні про що"
        options:
          - "ні про що"
          - "ніпрочо"
          - "ні про чому"
        explanation: "Про що пишеться окремо."
      - sentence: "Це ___ не секрет."
        answer: "ні для кого"
        options:
          - "ні для кого"
          - "нідлякого"
          - "ні для ким"
        explanation: "Для кого - родова форма після прийменника."
      - sentence: "Я ___ не йду сьогодні."
        answer: "ні до кого"
        options:
          - "ні до кого"
          - "ні з ким"
          - "ні про що"
        explanation: "Йти до кого? - ні до кого."
      - sentence: "Він ___ не сперечався."
        answer: "ні з ким"
        options:
          - "ні з ким"
          - "ні для кого"
          - "ні про що"
        explanation: "Сперечатися з ким? - ні з ким."
      - sentence: "Вони ___ не питали."
        answer: "ні про що"
        options:
          - "ні про що"
          - "ні до кого"
          - "ні з ким"
        explanation: "Питати про що? - ні про що."
      - sentence: "Ми не маємо ___, ні часу."
        answer: "ні сил"
        options:
          - "ні сил"
          - "ні з сил"
          - "ніхто сил"
        explanation: "У парі ні..., ні... прийменник не потрібен."
workbook:
  - type: match-up
    title: Запит і природна відповідь
    instruction: З'єднайте репліки з відповідями.
    pairs:
      - left: "Хто телефонував?"
        right: "Хтось телефонував, але номер невідомий."
      - left: "Хто може допомогти?"
        right: "Будь-хто може допомогти."
      - left: "Хто бачив мої ключі?"
        right: "Хто-небудь бачив твої ключі?"
      - left: "Хто хоче більше практики?"
        right: "Дехто хоче більше практики."
      - left: "Що ти чув?"
        right: "Я нічого не чув."
      - left: "З ким ти говорив?"
        right: "Я ні з ким не говорив."
      - left: "Де ви були?"
        right: "Ми ніде не були."
      - left: "Коли вона запізнюється?"
        right: "Вона ніколи не запізнюється."
  - type: error-correction
    title: Виправте заперечення
    instruction: Оберіть правильний варіант.
    items:
      - sentence: "Ніхто прийшов."
        error: "Ніхто прийшов"
        correction: "Ніхто не прийшов."
        options:
          - "Ніхто не прийшов."
          - "Хтось не прийшов."
        explanation: "Ніхто вимагає не при дієслові."
      - sentence: "Я нічого бачив."
        error: "нічого бачив"
        correction: "Я нічого не бачив."
        options:
          - "Я нічого не бачив."
          - "Я щось не бачив."
        explanation: "Потрібне подвійне заперечення."
      - sentence: "Ми нізким не говорили."
        error: "нізким"
        correction: "Ми ні з ким не говорили."
        options:
          - "Ми ні з ким не говорили."
          - "Ми ніхто не говорили."
        explanation: "З прийменником пишемо окремо."
      - sentence: "Вона нідокого не дзвонила."
        error: "нідокого"
        correction: "Вона ні до кого не дзвонила."
        options:
          - "Вона ні до кого не дзвонила."
          - "Вона ні кому не дзвонила."
        explanation: "Після до потрібна форма кого."
      - sentence: "Будь-хто з'їв торт, але ми не знаємо хто."
        error: "Будь-хто"
        correction: "Хтось з'їв торт, але ми не знаємо хто."
        options:
          - "Хтось з'їв торт, але ми не знаємо хто."
          - "Ніхто з'їв торт, але ми не знаємо хто."
        explanation: "Є конкретний невідомий виконавець, тому хтось."
      - sentence: "Не давай документи абихто."
        error: "абихто"
        correction: "Не давай документи абикому."
        options:
          - "Не давай документи абикому."
          - "Не давай документи будь-де."
        explanation: "Після давати потрібна давальна форма: кому? абикому."
      - sentence: "Я ні про що домовився."
        error: "домовився"
        correction: "Я ні про що не домовився."
        options:
          - "Я ні про що не домовився."
          - "Я ніщо домовився."
        explanation: "Заперечна конструкція потребує не."
      - sentence: "Ніде є вільні місця."
        error: "Ніде є"
        correction: "Ніде немає вільних місць."
        options:
          - "Ніде немає вільних місць."
          - "Десь немає вільних місць."
        explanation: "Для відсутності природно: ніде немає."
  - type: fill-in
    title: Перекладіть ідею
    instruction: Оберіть український варіант для англійської підказки.
    items:
      - sentence: "Someone left something here. - ___"
        answer: "Хтось залишив щось тут."
        options:
          - "Хтось залишив щось тут."
          - "Ніхто нічого не залишив тут."
        explanation: "Someone/something - хтось/щось."
      - sentence: "Nobody saw anything. - ___"
        answer: "Ніхто нічого не бачив."
        options:
          - "Ніхто нічого не бачив."
          - "Ніхто бачив нічого."
        explanation: "Потрібне не при дієслові."
      - sentence: "I did not speak with anyone. - ___"
        answer: "Я ні з ким не говорив."
        options:
          - "Я ні з ким не говорив."
          - "Я нізким говорив."
        explanation: "With anyone in a negative sentence - ні з ким не."
      - sentence: "Anyone can ask. - ___"
        answer: "Будь-хто може запитати."
        options:
          - "Будь-хто може запитати."
          - "Хтось може запитати."
        explanation: "Anyone without restriction - будь-хто."
      - sentence: "Some people disagree. - ___"
        answer: "Дехто не погоджується."
        options:
          - "Дехто не погоджується."
          - "Ніхто не погоджується."
        explanation: "Some people - дехто."
      - sentence: "We can meet somewhere. - ___"
        answer: "Можемо зустрітися десь."
        options:
          - "Можемо зустрітися десь."
          - "Можемо зустрітися ніде."
        explanation: "Somewhere - десь."
      - sentence: "I never forget this rule. - ___"
        answer: "Я ніколи не забуваю це правило."
        options:
          - "Я ніколи не забуваю це правило."
          - "Я ніколи забуваю це правило."
        explanation: "Ніколи потребує не."
      - sentence: "Do not do it carelessly. - ___"
        answer: "Не роби це абияк."
        options:
          - "Не роби це абияк."
          - "Не роби це будь-хто."
        explanation: "Абияк означає недбало, anyhow."
