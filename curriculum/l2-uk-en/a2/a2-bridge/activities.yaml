inline:
  - id: act-1
    type: quiz
    title: Чотири знайомі відмінки
    instruction: Оберіть відмінок, який пояснює речення з А1.
    items:
      - prompt: "Я студентка."
        options:
          - text: "називний: хто?"
            correct: true
          - text: "місцевий: де?"
            correct: false
          - text: "кличний: звертання"
            correct: false
        explanation: Студентка називає, хто це, тому це називний.
      - prompt: "Я вивчаю українську мову."
        options:
          - text: "знахідний: що?"
            correct: true
          - text: "родовий: чого?"
            correct: false
          - text: "кличний: звертання"
            correct: false
        explanation: Українську мову - це те, що я вивчаю.
      - prompt: "Ми в школі."
        options:
          - text: "місцевий: де?"
            correct: true
          - text: "називний: хто?"
            correct: false
          - text: "орудний: чим?"
            correct: false
        explanation: В школі відповідає на питання де?
      - prompt: "Олено, повторіть, будь ласка."
        options:
          - text: "кличний: звертання"
            correct: true
          - text: "знахідний: кого?"
            correct: false
          - text: "давальний: кому?"
            correct: false
        explanation: Олено - це пряме звертання до людини.
      - prompt: "Подруга телефонує."
        options:
          - text: "називний: хто телефонує?"
            correct: true
          - text: "знахідний: що телефонує?"
            correct: false
          - text: "місцевий: де?"
            correct: false
        explanation: Подруга - це людина, яка виконує дію.
      - prompt: "Я купую квиток."
        options:
          - text: "знахідний: що купую?"
            correct: true
          - text: "кличний: звертання"
            correct: false
          - text: "місцевий: де?"
            correct: false
        explanation: Квиток - це те, що я купую.
      - prompt: "Пане Андрію, можна запитання?"
        options:
          - text: "кличний: ввічливе звертання"
            correct: true
          - text: "називний: хто?"
            correct: false
          - text: "родовий: кого?"
            correct: false
        explanation: Пане Андрію - це ввічливе звертання.
      - prompt: "Кава на столі."
        options:
          - text: "місцевий: де?"
            correct: true
          - text: "знахідний: що?"
            correct: false
          - text: "давальний: кому?"
            correct: false
        explanation: На столі показує, де кава.
  - id: act-2
    type: match-up
    title: Впізнай змінену основу
    instruction: З'єднайте змінену форму зі словом, до якого вона належить.
    pairs:
      - left: "стола"
        right: "стіл"
      - left: "Києва"
        right: "Київ"
      - left: "ручка"
        right: "рука"
      - left: "ніжка"
        right: "нога"
      - left: "друже"
        right: "друг"
      - left: "у книзі"
        right: "книга"
      - left: "на дошці"
        right: "дошка"
      - left: "у вусі"
        right: "вухо"
  - id: act-3
    type: fill-in
    title: У, в, і, й
    instruction: Оберіть коротке слово, яке звучить плавніше.
    items:
      - sentence: "Тарас ___ школі."
        answer: "у"
        options:
          - "у"
          - "в"
          - "й"
        explanation: Після приголосного в слові Тарас перед шк плавніше звучить у.
      - sentence: "Олена ___ школі."
        answer: "в"
        options:
          - "в"
          - "у"
          - "і"
        explanation: Після голосного в слові Олена перед школі природно звучить в.
      - sentence: "Я працюю ___ офісі."
        answer: "в"
        options:
          - "в"
          - "у"
          - "із"
        explanation: Перед голосним на початку слова офісі плавно звучить в.
      - sentence: "Сестра ___ Львові."
        answer: "у"
        options:
          - "у"
          - "в"
          - "зі"
        explanation: У Львові допомагає уникнути важкого збігу в льв.
      - sentence: "Брат ___ сестра вдома."
        answer: "і"
        options:
          - "і"
          - "й"
          - "в"
        explanation: Між приголосними і звучить плавніше, ніж й.
      - sentence: "Мама ___ тато на кухні."
        answer: "й"
        options:
          - "й"
          - "і"
          - "у"
        explanation: Після голосного в слові мама перед тато плавно звучить й.
      - sentence: "Марія ___ Яна в кафе."
        answer: "і"
        options:
          - "і"
          - "й"
          - "в"
        explanation: Перед Яна безпечніше і, бо я вже має й-подібний початок.
      - sentence: "Я ___ Києва."
        answer: "із"
        options:
          - "із"
          - "зі"
          - "й"
        explanation: Із Києва - плавна фраза для походження або руху звідкись.
  - id: act-4
    type: group-sort
    title: Карта А2
    instruction: Розподіліть фрази за дорогою А2, до якої вони належать.
    groups:
      - name: "відмінки"
        items:
          - "немає часу"
          - "мені холодно"
          - "з подругою"
          - "у новому модулі"
      - name: "дієслова і час"
        items:
          - "я читав"
          - "я прочитав"
          - "я буду писати"
          - "я напишу"
      - name: "довші речення"
        items:
          - "бо хворів"
          - "щоб поїхати"
          - "якщо буде час"
          - "місто, яке..."
      - name: "мова навчання"
        items:
          - "відмінок"
          - "дієслово"
          - "основа"
          - "закінчення"
workbook:
  - type: true-false
    title: Перевірка старту А2
    instruction: Визначте, чи підходить твердження до першого модуля А2.
    items:
      - statement: "Називний часто називає, хто або що є в реченні."
        answer: true
        explanation: У простих реченнях називний відповідає на хто? або що?
      - statement: "Кличний потрібен тільки для таблиць, а не для живої розмови."
        answer: false
        explanation: "Кличний працює в прямому звертанні: Олено, Марку, пане Андрію."
      - statement: "У і в мають близьке значення в місцевих фразах, але звук поруч може змінити вибір."
        answer: true
        explanation: Тарас у школі й Олена в школі показують вибір за звучанням.
      - statement: "У першому модулі А2 треба повністю володіти видом на рівні B1."
        answer: false
        explanation: Перший модуль тільки готує ідею процесу й результату.
      - statement: "Впізнати Києва як форму слова Київ - це корисна навичка А2."
        answer: true
        explanation: Впізнавання зміненої основи допомагає читати й слухати.
      - statement: "Пізніші модулі А2 про граматичні слова готують до більш українськомовного B1."
        answer: true
        explanation: Терміни відмінок, дієслово, основа й закінчення будують автономію.
  - type: error-correction
    title: Зробіть стартові фрази плавнішими
    instruction: Оберіть природніше виправлення.
    items:
      - sentence: "Тарас в школі."
        error: "в школі"
        correction: "Тарас у школі."
        options:
          - "Тарас у школі."
          - "Тарас й школі."
        explanation: Після приголосного перед шк краще звучить у.
      - sentence: "Брат й сестра вдома."
        error: "й сестра"
        correction: "Брат і сестра вдома."
        options:
          - "Брат і сестра вдома."
          - "Брат в сестра вдома."
        explanation: Між приголосними плавніше звучить і.
      - sentence: "Олена у школі."
        error: "у школі"
        correction: "Олена в школі."
        options:
          - "Олена в школі."
          - "Олена й школі."
        explanation: Після голосного перед школі природно звучить в.
      - sentence: "Марія й Яна в кафе."
        error: "й Яна"
        correction: "Марія і Яна в кафе."
        options:
          - "Марія і Яна в кафе."
          - "Марія в Яна в кафе."
        explanation: Перед Яна залишаємо і, бо я вже має й-подібний початок.
      - sentence: "Я не знаю слово Києва."
        error: "не впізнано Київ"
        correction: "Києва - це форма слова Київ."
        options:
          - "Києва - це форма слова Київ."
          - "Києва - це окреме місто."
        explanation: На А2 важливо впізнавати змінені форми знайомих слів.
  - type: match-up
    title: Питання до відмінка
    instruction: З'єднайте питання з назвою відмінка.
    pairs:
      - left: "Хто? Що?"
        right: "називний"
      - left: "Кого? Що?"
        right: "знахідний"
      - left: "Де? На кому? На чому?"
        right: "місцевий"
      - left: "звертання"
        right: "кличний"
      - left: "Кого? Чого?"
        right: "родовий"
      - left: "Кому? Чому?"
        right: "давальний"
      - left: "Ким? Чим?"
        right: "орудний"
  - type: translate
    title: Коротка англійська опора
    instruction: Прочитайте український термін і оберіть коротку англійську підказку.
    items:
      - source: "відмінок"
        options:
          - text: "case"
            correct: true
          - text: "stress"
            correct: false
          - text: "vowel"
            correct: false
        explanation: Відмінок - це граматична роль слова в реченні.
      - source: "чергування"
        options:
          - text: "alternation"
            correct: true
          - text: "question"
            correct: false
          - text: "address"
            correct: false
        explanation: Чергування - це зміна звука або форми.
      - source: "голосний"
        options:
          - text: "vowel"
            correct: true
          - text: "consonant"
            correct: false
          - text: "ending"
            correct: false
        explanation: А, е, и, і, о, у - це голосні.
      - source: "приголосний"
        options:
          - text: "consonant"
            correct: true
          - text: "vowel"
            correct: false
          - text: "case"
            correct: false
        explanation: М, т, к, в, с, ш - це приклади приголосних.
      - source: "милозвучність"
        options:
          - text: "euphony / smooth sound"
            correct: true
          - text: "future tense"
            correct: false
          - text: "profession"
            correct: false
        explanation: Милозвучність допомагає уникати важких збігів звуків.
  - type: true-false
    title: Наголос і живі звуки
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Наголос може допомагати розрізняти слова або форми."
        answer: true
        explanation: На А2 достатньо помічати, що наголос є частиною звучання слова.
      - statement: "Дж і дз завжди треба читати як дві різко окремі літери."
        answer: false
        explanation: У словах джерело й дзвінок ці сполуки часто звучать як один щільний звук.
      - statement: "У слові вокзал сусідні приголосні можуть впливати на вимову."
        answer: true
        explanation: Жива вимова часто зближує сусідні звуки.
      - statement: "На початку А2 треба знати всі правила рухомого наголосу напам'ять."
        answer: false
        explanation: Тут важливіше слухати й упізнавати модель, а не заучувати повну систему.
  - type: match-up
    title: Звукова підказка
    instruction: З'єднайте приклад із тим, що треба помітити.
    pairs:
      - left: "стіл / стола"
        right: "і може чергуватися з о"
      - left: "рука / ручка"
        right: "к може перейти в ч"
      - left: "джерело"
        right: "дж звучить як щільний звук"
      - left: "дзвінок"
        right: "дз звучить як щільний звук"
      - left: "просьба"
        right: "перед б звук стає дзвінкішим"
      - left: "вода / воду"
        right: "слухайте форму разом із наголосом"
  - type: fill-in
    title: Ще трохи плавності
    instruction: Оберіть варіант, який звучить природніше.
    items:
      - sentence: "Ми зустрілися ___ школі."
        answer: "у"
        options:
          - "у"
          - "й"
        explanation: Перед школі після приголосного часто зручно сказати у.
      - sentence: "Анна ___ Марко на занятті."
        answer: "й"
        options:
          - "й"
          - "у"
        explanation: Після голосного в Анна перед Марко плавно звучить й.
      - sentence: "Я повернувся ___ Львова."
        answer: "зі"
        options:
          - "зі"
          - "й"
        explanation: Зі Львова допомагає уникнути важкого збігу приголосних.
      - sentence: "Олег ___ Ірина готові."
        answer: "і"
        options:
          - "і"
          - "в"
        explanation: Перед Ірина потрібне і.
      - sentence: "Вона працює ___ університеті."
        answer: "в"
        options:
          - "в"
          - "й"
        explanation: Перед голосним на початку університеті природно звучить в.
