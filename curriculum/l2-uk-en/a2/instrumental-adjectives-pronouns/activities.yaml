inline:
  - id: act-1
    type: fill-in
    title: Закінчення прикметників
    instruction: Додайте правильну форму прикметника в орудному відмінку.
    items:
      - sentence: "Я гуляю з ___ другом."
        answer: добрим
        options:
          - добрим
          - доброю
          - добрий
        explanation: Друг - чоловічий рід, тому добрим другом.
      - sentence: "Вона говорить з ___ подругою."
        answer: гарною
        options:
          - гарним
          - гарною
          - гарна
        explanation: Подруга - жіночий рід, тому гарною подругою.
      - sentence: "Літак летить над ___ містом."
        answer: новим
        options:
          - новою
          - нове
          - новим
        explanation: Місто - середній рід, форма як чоловіча, тому новим містом.
      - sentence: "Подарунок лежить під ___ ялинкою."
        answer: великою
        options:
          - великим
          - великою
          - велика
        explanation: Ялинка - жіночий рід, тому великою ялинкою.
      - sentence: "Ми сидимо за ___ столом."
        answer: маленьким
        options:
          - маленьким
          - маленькою
          - маленький
        explanation: Стіл - чоловічий рід, тому маленьким столом.
      - sentence: "Парк є між ___ школою і бібліотекою."
        answer: старою
        options:
          - старим
          - старою
          - стара
        explanation: Школа - жіночий рід, тому старою школою.
      - sentence: "Він телефонує ___ телефоном."
        answer: новим
        options:
          - новим
          - новою
          - новий
        explanation: Телефон - чоловічий рід, тому новим телефоном.
      - sentence: "Вона стоїть перед ___ лампою."
        answer: великою
        options:
          - великим
          - великою
          - велика
        explanation: Лампа - жіночий рід, тому великою лампою.
  - id: act-2
    type: match-up
    title: Називний -> орудний
    instruction: З'єднайте називну фразу з формою орудного відмінка.
    pairs:
      - left: мій новий друг
        right: з моїм новим другом
      - left: моя стара подруга
        right: з моєю старою подругою
      - left: наш великий будинок
        right: за нашим великим будинком
      - left: ця зелена ялинка
        right: під цією зеленою ялинкою
      - left: той синій рюкзак
        right: з тим синім рюкзаком
      - left: ваш літній сад
        right: за вашим літнім садом
      - left: їхня нова квартира
        right: з їхньою новою квартирою
      - left: моє домашнє завдання
        right: з моїм домашнім завданням
  - id: act-3
    type: quiz
    title: Моїм, моєю, цим чи цією?
    instruction: Оберіть правильну форму займенника.
    items:
      - question: "Я говорю з ___ братом."
        options:
          - моїм
          - моєю
          - моя
        correct: 0
        explanation: Брат - чоловічий рід, тому моїм братом.
      - question: "Вона гуляє з ___ сестрою."
        options:
          - моїм
          - моєю
          - мій
        correct: 1
        explanation: Сестра - жіночий рід, тому моєю сестрою.
      - question: "Ми їдемо ___ автобусом."
        options:
          - нашим
          - нашою
          - наша
        correct: 0
        explanation: Автобус - чоловічий рід, тому нашим автобусом.
      - question: "Ви працюєте зі ___ командою?"
        options:
          - своїм
          - своєю
          - свій
        correct: 1
        explanation: Команда - жіночий рід, тому своєю командою.
      - question: "Книга лежить під ___ лампою."
        options:
          - цим
          - цією
          - ця
        correct: 1
        explanation: Лампа - жіночий рід, тому цією лампою.
      - question: "Ми сидимо за ___ столом."
        options:
          - тим
          - тією
          - той
        correct: 0
        explanation: Стіл - чоловічий рід, тому тим столом.
      - question: "Я говорю з ___ татом."
        options:
          - їхнім
          - їхньою
          - їхня
        correct: 0
        explanation: Тато граматично чоловічого роду, тому їхнім татом.
      - question: "Вона гуляє з ___ мамою."
        options:
          - їхнім
          - їхньою
          - їхній
        correct: 1
        explanation: Мама - жіночий рід, тому їхньою мамою.
  - id: act-4
    type: fill-in
    title: Побудуйте фразу
    instruction: Побудуйте повну фразу в орудному відмінку.
    items:
      - sentence: "з (мій + найкращий + друг) -> з ___."
        answer: моїм найкращим другом
        options:
          - моїм найкращим другом
          - моя найкраща другом
          - моєю найкращою другом
        explanation: Усі слова мають чоловічу орудну форму.
      - sentence: "з (моя + молодша + сестра) -> з ___."
        answer: моєю молодшою сестрою
        options:
          - моїм молодшим сестрою
          - моєю молодшою сестрою
          - моя молодша сестрою
        explanation: Сестра - жіночий рід, тому моєю молодшою сестрою.
      - sentence: "(цей + новий + автобус) -> ___."
        answer: цим новим автобусом
        options:
          - цей новий автобусом
          - цією новою автобусом
          - цим новим автобусом
        explanation: Автобус - чоловічий рід, тому цим новим автобусом.
      - sentence: "під (ця + велика + ялинка) -> під ___."
        answer: цією великою ялинкою
        options:
          - цією великою ялинкою
          - цим великим ялинкою
          - ця велика ялинкою
        explanation: Ялинка - жіночий рід, тому цією великою ялинкою.
      - sentence: "за (наш + старий + будинок) -> за ___."
        answer: нашим старим будинком
        options:
          - нашою старою будинком
          - нашим старим будинком
          - наш старий будинком
        explanation: Будинок - чоловічий рід, тому старим будинком.
      - sentence: "писати (синій + олівець) -> писати ___."
        answer: синім олівцем
        options:
          - синьою олівцем
          - синім олівцем
          - синій олівцем
        explanation: Олівець - чоловічий рід, тому синім олівцем.
      - sentence: "з (та + нова + сусідка) -> з ___."
        answer: тією новою сусідкою
        options:
          - тим новим сусідкою
          - тією новою сусідкою
          - та нова сусідкою
        explanation: Сусідка - жіночий рід, тому тією новою сусідкою.
      - sentence: "над (синє + море) -> над ___."
        answer: синім морем
        options:
          - синім морем
          - синьою морем
          - синє морем
        explanation: Море - середній рід, тому синім морем.
  - id: act-5
    type: error-correction
    title: Виправте узгодження
    instruction: Знайдіть і виправте помилку в орудному відмінку.
    items:
      - sentence: "з моїм новою другом"
        error: новою
        correction: "з моїм новим другом"
        options:
          - "з моїм новим другом"
          - "з моєю новою другом"
        explanation: Друг - чоловічий рід, тому моїм новим другом.
      - sentence: "під ця великою ялинкою"
        error: ця
        correction: "під цією великою ялинкою"
        options:
          - "під цією великою ялинкою"
          - "під цим великим ялинкою"
        explanation: Ця в орудному відмінку - цією.
      - sentence: "за нашим стара будинком"
        error: стара
        correction: "за нашим старим будинком"
        options:
          - "за нашим старим будинком"
          - "за нашою старою будинком"
        explanation: Будинок - чоловічий рід, тому старим будинком.
      - sentence: "з синя сумкою"
        error: синя
        correction: "з синьою сумкою"
        options:
          - "з синьою сумкою"
          - "з синім сумкою"
        explanation: Сумка - жіночий рід, тому синьою сумкою.
      - sentence: "цим велика містом"
        error: велика
        correction: "цим великим містом"
        options:
          - "цим великим містом"
          - "цією великою містом"
        explanation: Місто - середній рід, тому форма як чоловіча.
      - sentence: "з їхньою татом"
        error: їхньою
        correction: "з їхнім татом"
        options:
          - "з їхнім татом"
          - "з їхньою татом"
        explanation: Тато граматично чоловічого роду, тому їхнім татом.
      - sentence: "за вашою новим столом"
        error: вашою
        correction: "за вашим новим столом"
        options:
          - "за вашим новим столом"
          - "за вашою новою столом"
        explanation: Стіл - чоловічий рід, тому вашим новим столом.
      - sentence: "з моєю старим сусідкою"
        error: старим
        correction: "з моєю старою сусідкою"
        options:
          - "з моєю старою сусідкою"
          - "з моїм старим сусідкою"
        explanation: Сусідка - жіночий рід, тому моєю старою сусідкою.
workbook:
  - type: group-sort
    title: Чоловічий чи жіночий рід?
    instruction: Розсортуйте фрази за родом головного іменника.
    groups:
      - label: Чоловічий або середній
        items:
          - з моїм братом
          - цим автобусом
          - за нашим будинком
          - над синім морем
      - label: Жіночий
        items:
          - з моєю сестрою
          - цією дорогою
          - під великою ялинкою
          - з синьою сумкою
  - type: fill-in
    title: Побудуйте фразу
    instruction: Оберіть форму, яка завершує фразу.
    items:
      - sentence: "з (мій + найкращий + друг) -> з ___."
