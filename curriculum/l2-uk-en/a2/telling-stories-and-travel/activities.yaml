inline:
  - id: act-1
    type: fill-in
    title: Розповідь із пропусками
    instruction: Оберіть форму, яка робить історію природною.
    items:
      - sentence: "Минулої суботи ми ___ до Одеси."
        answer: "їздили"
        options:
          - "їздили"
          - "поїхали й залишилися"
        explanation: "Їздили означає поїздку туди й назад."
      - sentence: "У потязі ми ___ чай і ___ у вікно."
        answer: "пили / дивилися"
        options:
          - "випили / подивилися"
          - "пили / дивилися"
        explanation: "Це фон у дорозі."
      - sentence: "Раптом я ___ квиток у книжці."
        answer: "знайшов"
        options:
          - "шукав"
          - "знайшов"
        explanation: "Раптом потрібна подія з результатом."
      - sentence: "Увечері ми ___ центром і ___ музей."
        answer: "ходили / відвідали"
        options:
          - "ходили / відвідали"
          - "пішли / відвідували"
        explanation: "Ходили як рух містом; відвідали як подія."
      - sentence: "Після обіду ми ___ квитки на завтра."
        answer: "купили"
        options:
          - "купували"
          - "купили"
        explanation: "Квитки стали готовим результатом."
      - sentence: "Поки ми ___ на пероні, почався дощ."
        answer: "чекали"
        options:
          - "чекали"
          - "почекали"
        explanation: "Чекали створює фон."
      - sentence: "Наступного дня ми ___ в Карпати."
        answer: "поїхали"
        options:
          - "поїхали"
          - "їздили щодня"
        explanation: "Один виїзд у напрямку."
      - sentence: "Після поїздки я ___ коротку історію."
        answer: "розповів"
        options:
          - "розповідав"
          - "розповів"
        explanation: "Коротка завершена розповідь."
  - id: act-2
    type: quiz
    title: Частини історії
    instruction: Виберіть роль виділеної дії.
    items:
      - question: "Ми сиділи біля вікна і пили чай."
        options:
          - "фон"
          - "раптова подія"
          - "наказ"
        correct: 0
        explanation: "Сиділи і пили створюють сцену."
      - question: "Раптом потяг зупинився."
        options:
          - "подія сюжету"
          - "звичка"
          - "майбутній план"
        correct: 0
        explanation: "Раптом вводить окрему подію."
      - question: "У Львові ми ходили центром."
        options:
          - "рух у різних місцях"
          - "вирушення в один бік"
          - "побажання"
        correct: 0
        explanation: "Ходили центром = гуляли там."
      - question: "Ми поїхали потягом."
        options:
          - "конкретне вирушення"
          - "регулярна звичка"
          - "фонова дія"
        correct: 0
        explanation: "Поїхали називає один виїзд."
      - question: "Ми чекали двадцять хвилин."
        options:
          - "тривала дія"
          - "один готовий результат"
          - "форма наказу"
        correct: 0
        explanation: "Чекали показує тривалість."
      - question: "Ми відвідали музей."
        options:
          - "завершена подія"
          - "звичка"
          - "фон без результату"
        correct: 0
        explanation: "Відвідали називає конкретну подію."
      - question: "Мені дуже сподобалося."
        options:
          - "враження"
          - "напрямок"
          - "заборона"
        correct: 0
        explanation: "Це фраза для враження."
      - question: "Наступного разу поїдемо в Карпати."
        options:
          - "план подорожі"
          - "історія в минулому"
          - "звертання"
        correct: 0
        explanation: "Поїдемо називає майбутню конкретну поїздку."
  - id: act-3
    type: match-up
    title: Подорож і модель
    instruction: З'єднайте ситуацію з природною фразою.
    pairs:
      - left: "конкретна поїздка до Львова"
        right: "поїдемо до Львова"
      - left: "регулярні поїздки влітку"
        right: "їздимо влітку"
      - left: "рух містом дві години"
        right: "ходили по місту"
      - left: "транспорт"
        right: "потягом / автобусом"
      - left: "враження"
        right: "мені сподобалося"
      - left: "готель"
        right: "зупинимося в готелі"
      - left: "раптова подія"
        right: "потяг зупинився"
      - left: "фон у дорозі"
        right: "ми пили чай"
  - id: act-4
    type: error-correction
    title: Виправте подорож
    instruction: Оберіть кращий варіант.
    items:
      - sentence: "Ми будемо купити квитки."
        error: "будемо купити"
        correction: "Ми купимо квитки."
        options:
          - "Ми купимо квитки."
          - "Ми будемо купити квитки."
        explanation: "Купити - доконаний вид."
      - sentence: "Ми поїхали по місту дві години."
        error: "поїхали"
        correction: "Ми ходили по місту дві години."
        options:
          - "Ми ходили по місту дві години."
          - "Ми поїхали по місту дві години."
        explanation: "Рух у різних місцях: ходили."
      - sentence: "Коли ми приїхали, ми чекали потяг."
        error: "чекали потяг"
        correction: "Коли ми приїхали, ми чекали на потяг."
        options:
          - "Коли ми приїхали, ми чекали на потяг."
          - "Коли ми приїхали, ми чекали потяг."
        explanation: "Стандартна модель: чекати на."
      - sentence: "Я їздив до Києва і досі там."
        error: "їздив"
        correction: "Я поїхав до Києва і досі там."
        options:
          - "Я поїхав до Києва і досі там."
          - "Я їздив до Києва і досі там."
        explanation: "Їздив зазвичай означає повернення."
      - sentence: "У потязі ми випили чай цілу годину."
        error: "випили"
        correction: "У потязі ми пили чай цілу годину."
        options:
          - "У потязі ми пили чай цілу годину."
          - "У потязі ми випили чай цілу годину."
        explanation: "Цілу годину показує процес."
      - sentence: "Ми ходили до Львова потягом."
        error: "ходили"
        correction: "Ми їздили до Львова потягом."
        options:
          - "Ми їздили до Львова потягом."
          - "Ми ходили до Львова потягом."
        explanation: "Потягом -> їхати / їздити."
      - sentence: "Ми приїжджали до міста і одразу купили каву."
        error: "приїжджали"
        correction: "Ми приїхали до міста і одразу купили каву."
        options:
          - "Ми приїхали до міста і одразу купили каву."
          - "Ми приїжджали до міста і одразу купили каву."
        explanation: "Один завершений приїзд: приїхали."
      - sentence: "Я люблю подорожувати на поїзді."
        error: "на поїзді"
        correction: "Я люблю подорожувати потягом."
        options:
          - "Я люблю подорожувати потягом."
          - "Я люблю подорожувати на поїзді."
        explanation: "Орудний для транспорту без прийменника."
workbook:
  - type: order
    title: Порядок історії
    instruction: Поставте речення в природний порядок.
    items:
      - "Спочатку ми їхали потягом і дивилися у вікно."
      - "Раптом потяг зупинився."
      - "Провідниця сказала, що треба пересісти в інший вагон."
      - "Потім ми пересіли й поїхали далі."
      - "У Львові ми залишили речі в готелі."
      - "Після цього ми ходили центром."
      - "Увечері ми відвідали музей."
      - "Нарешті ми купили каву додому."
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
  - type: true-false
    title: Подорож і вид
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Фонові дії в історії часто мають недоконаний вид."
        correct: true
        explanation: "Сиділи, пили, чекали."
      - statement: "Раптом часто вводить доконану подію."
        correct: true
        explanation: "Раптом зупинився, подзвонив, знайшов."
      - statement: "Їздив завжди означає, що людина ще в дорозі."
        correct: false
        explanation: "Часто це поїздка туди й назад."
      - statement: "Потягом - це орудний відмінок для способу подорожі."
        correct: true
        explanation: "Їхати потягом, автобусом, машиною."
      - statement: "Доїхали показує результат дороги."
        correct: true
        explanation: "Люди вже прибули до місця."
      - statement: "Ходили центром означає один рух в один конкретний бік."
        correct: false
        explanation: "Це рух у різних місцях."
      - statement: "До Львова вимагає родового відмінка після до."
        correct: true
        explanation: "До + родовий: до Львова, до вокзалу."
      - statement: "Будемо купити - нормативна форма майбутнього доконаного виду."
        correct: false
        explanation: "Потрібно: купимо."
  - type: fill-in
    title: План подорожі
    instruction: Доповніть план.
    items:
      - sentence: "У липні ми ___ в Карпати."
        answer: "поїдемо"
        options:
          - "поїдемо"
          - "будемо поїхати"
        explanation: "Конкретна поїздка."
      - sentence: "Квитки ми ___ сьогодні ввечері."
        answer: "купимо"
        options:
          - "купимо"
          - "будемо купити"
        explanation: "Квитки як результат."
      - sentence: "У горах ми ___ стежками."
        answer: "будемо ходити"
        options:
          - "будемо ходити"
          - "підемо всі стежки"
        explanation: "Заняття під час подорожі."
      - sentence: "Після поїздки я ___ коротку історію."
        answer: "розповім"
        options:
          - "розповім"
          - "буду розповісти"
        explanation: "Розповісти - доконаний вид."
      - sentence: "Спочатку ми ___ потягом до Івано-Франківська."
        answer: "поїдемо"
        options:
          - "поїдемо"
          - "будемо поїхати"
        explanation: "Один конкретний виїзд."
      - sentence: "Якщо потяг запізниться, ми ___ господарці."
        answer: "подзвонимо"
        options:
          - "подзвонимо"
          - "будемо подзвонити"
        explanation: "Доконаний результат у плані."
      - sentence: "У місті ми ___ старі будинки."
        answer: "будемо фотографувати"
        options:
          - "будемо фотографувати"
          - "сфотографуємо цілий день"
        explanation: "Заняття під час подорожі."
      - sentence: "Ввечері ми ___ до готелю."
        answer: "повернемося"
        options:
          - "повернемося"
          - "будемо повернутися"
        explanation: "Повернутися - доконаний результат."
  - type: match-up
    title: Чекліст розповіді
    instruction: З'єднайте елемент із прикладом.
    pairs:
      - left: "місце"
        right: "до Чернівців"
      - left: "транспорт"
        right: "потягом"
      - left: "фон"
        right: "ми читали і пили чай"
      - left: "подія"
        right: "ми відвідали музей"
      - left: "враження"
        right: "мені дуже сподобалося"
      - left: "раптова зміна"
        right: "потяг зупинився"
      - left: "результат дороги"
        right: "ми доїхали ввечері"
      - left: "майбутній план"
        right: "купимо квитки сьогодні"
