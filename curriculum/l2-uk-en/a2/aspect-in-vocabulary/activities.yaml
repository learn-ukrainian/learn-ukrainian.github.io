inline:
  - id: act-1
    type: match-up
    title: Знайди партнера
    instruction: З'єднайте кожне недоконане дієслово з доконаним партнером.
    pairs:
      - left: "читати"
        right: "прочитати"
      - left: "писати"
        right: "написати"
      - left: "робити"
        right: "зробити"
      - left: "варити"
        right: "зварити"
      - left: "відповідати"
        right: "відповісти"
      - left: "брати"
        right: "взяти"
      - left: "вирішувати"
        right: "вирішити"
      - left: "готувати"
        right: "приготувати"
  - id: act-2
    type: group-sort
    title: Як утворилася пара?
    instruction: Розподіліть пари за головною моделлю, яку ви помічаєте.
    groups:
      - name: "переважно префікс"
        items:
          - "писати / написати"
          - "читати / прочитати"
          - "готувати / приготувати"
          - "варити / зварити"
          - "класти / покласти"
      - name: "зміна основи або суфікса"
        items:
          - "відповідати / відповісти"
          - "вирішувати / вирішити"
          - "запитувати / запитати"
          - "допомагати / допомогти"
      - name: "інше слово"
        items:
          - "брати / взяти"
          - "говорити / сказати"
          - "ловити / піймати"
  - id: act-3
    type: fill-in
    title: Запиши пару правильно
    instruction: Оберіть партнера, який доповнює запис у зошит.
    items:
      - sentence: "читати / ___"
        answer: "прочитати"
        options:
          - "прочитати"
          - "сказати"
        explanation: Тут типовий партнер має префікс.
      - sentence: "відповідати / ___"
        answer: "відповісти"
        options:
          - "відповісти"
          - "написати"
        explanation: У цій парі змінюються закінчення і форма.
      - sentence: "брати / ___"
        answer: "взяти"
        options:
          - "взяти"
          - "зварити"
        explanation: Це часта нерегулярна пара.
      - sentence: "говорити / ___"
        answer: "сказати"
        options:
          - "сказати"
          - "прочитати"
        explanation: Ці дві форми працюють як важлива пара в мовленні.
      - sentence: "варити / ___"
        answer: "зварити"
        options:
          - "зварити"
          - "відповісти"
        explanation: Префікс позначає завершений результат.
      - sentence: "допомагати / ___"
        answer: "допомогти"
        options:
          - "допомогти"
          - "сказати"
        explanation: У цій парі змінюється форма кореня.
      - sentence: "запитувати / ___"
        answer: "запитати"
        options:
          - "запитати"
          - "побачити"
        explanation: Форма коротшає, але дія запитування зберігається.
      - sentence: "готувати / ___"
        answer: "приготувати"
        options:
          - "приготувати"
          - "взяти"
        explanation: Префікс при- допомагає назвати готовий результат.
  - id: act-4
    type: quiz
    title: Яка нотатка краща?
    instruction: Оберіть запис, який більше допоможе вам.
    items:
      - prompt: "Ви хочете вивчити дієслово писати."
        options:
          - text: "писати / написати"
            correct: true
          - text: "писати"
            correct: false
          - text: "лист"
            correct: false
        explanation: Пара дає і процес, і результат.
      - prompt: "Ви хочете мати готову пару для вареників."
        options:
          - text: "ліпити / зліпити"
            correct: true
          - text: "ліпити / говорити"
            correct: false
          - text: "зліпити / суп"
            correct: false
        explanation: Записуйте дієслово з видовим партнером, а не з випадковими словами.
      - prompt: "Ви сумніваєтеся в парі для брати."
        options:
          - text: "брати / взяти"
            correct: true
          - text: "брати / зварити"
            correct: false
          - text: "брати / читати"
            correct: false
        explanation: Це часта пара, яку варто запам'ятати цілою.
      - prompt: "Ви хочете записати дієслово відповідати."
        options:
          - text: "відповідати / відповісти"
            correct: true
          - text: "відповідати / писати"
            correct: false
          - text: "відповідати / зліпити"
            correct: false
        explanation: Пара належить разом, хоча форми не однакові.
      - prompt: "Ви хочете записати дієслово робити."
        options:
          - text: "робити / зробити"
            correct: true
          - text: "робити / взяти"
            correct: false
          - text: "робота / офіс"
            correct: false
        explanation: Робити / зробити дає процес і готовий результат.
      - prompt: "Ви бачите пару допомагати / допомогти."
        options:
          - text: "записати як готову часту пару"
            correct: true
          - text: "відкинути, бо форми не однакові"
            correct: false
          - text: "записати тільки допомагати"
            correct: false
        explanation: Пара може змінювати основу, але її треба вчити разом.
      - prompt: "Ви бачите шукати / знайти у списку."
        options:
          - text: "позначити як пов'язані дії й перевірити пару"
            correct: true
          - text: "назвати це простою механічною парою"
            correct: false
          - text: "замінити на читати / суп"
            correct: false
        explanation: Шукати й знайти пов'язані, але це не проста видова пара.
      - prompt: "Ви хочете повторити 3 пари за день."
        options:
          - text: "дати до кожної процес і результат"
            correct: true
          - text: "вивчити тільки англійський переклад"
            correct: false
          - text: "записати випадкові іменники поруч"
            correct: false
        explanation: Короткі речення допомагають відчути живий контраст.
workbook:
  - type: true-false
    title: Що варто пам'ятати про пари
    instruction: Визначте, чи правильне кожне твердження.
    items:
      - statement: "На A2 корисно вчити дієслово разом із видовим партнером."
        answer: true
        explanation: Це допомагає говорити і про процес, і про результат.
      - statement: "Усі видові пари в українській утворюються однаково."
        answer: false
        explanation: Деякі пари мають префікс, деякі змінюють основу або використовують інше слово.
      - statement: "Брати / взяти краще просто запам'ятати як готову пару."
        answer: true
        explanation: Це часта пара з різними на вигляд партнерами.
      - statement: "Шукати / знайти — це завжди ідеальна видова пара."
        answer: false
        explanation: Вони пов'язані за значенням, але це не проста видова пара.
      - statement: "Пара говорити / сказати потрібна і в побуті, і на роботі."
        answer: true
        explanation: Вона дуже часта в побутовому й професійному мовленні.
  - type: error-correction
    title: Виправ типову помилку
    instruction: Оберіть речення, де вид дієслова підходить до ситуації.
    items:
      - sentence: "Учора я прочитав книгу цілий день."
        error: "прочитав"
        correction: "читав"
        options:
          - "читав"
          - "прочитав"
        explanation: Цілий день показує процес, тому потрібен недоконаний вид.
      - sentence: "Я буду написати тобі листа."
        error: "буду написати"
        correction: "напишу"
        options:
          - "напишу"
          - "буду написати"
        explanation: З доконаним видом потрібна проста майбутня форма.
      - sentence: "Я не можу знаходити свої ключі."
        error: "знаходити"
        correction: "знайти"
        options:
          - "знайти"
          - "знаходити"
        explanation: Тут потрібен результат, а не процес пошуку.
      - sentence: "Зараз я прочитаю книгу."
        error: "прочитаю"
        correction: "читаю"
        options:
          - "читаю"
          - "прочитаю"
        explanation: Зараз показує дію в момент мовлення, тому потрібен недоконаний вид.
      - sentence: "Вони багато розмовили про це."
        error: "розмовили"
        correction: "розмовляли"
        options:
          - "розмовляли"
          - "розмовили"
        explanation: Розмовляти не має простої доконаної пари.
      - sentence: "Я часто зачекав друга біля школи."
        error: "зачекав"
        correction: "чекав"
        options:
          - "чекав"
          - "зачекав"
        explanation: Часто показує повторення, тому потрібен недоконаний вид.
      - sentence: "Вона весь вечір написала листа."
        error: "написала"
        correction: "писала"
        options:
          - "писала"
          - "написала"
        explanation: Весь вечір показує процес, а не готовий результат.
      - sentence: "Ми часто сказали про роботу."
        error: "сказали"
        correction: "говорили"
        options:
          - "говорили"
          - "сказали"
        explanation: Часто показує повторювану дію.
  - type: match-up
    title: Де які дієслова звучать природно?
    instruction: З'єднайте ситуацію з парою або пов'язаними дієсловами.
    pairs:
      - left: "нотатки до лекції"
        right: "писати / написати"
      - left: "кулінарний рецепт"
        right: "варити / зварити"
      - left: "телефонна розмова з клієнтом"
        right: "говорити / сказати"
      - left: "коротка відповідь на лист"
        right: "відповідати / відповісти"
      - left: "домашнє завдання"
        right: "робити / зробити"
      - left: "допомога другу"
        right: "допомагати / допомогти"
      - left: "питання до викладачки"
        right: "запитувати / запитати"
      - left: "пошук адреси"
        right: "шукати / знайти"
  - type: fill-in
    title: Пара в реченні
    instruction: Оберіть форму, яка краще завершує коротку історію.
    items:
      - sentence: "Я довго ___ лист, а потім нарешті надіслав його."
        answer: "писав"
        options:
          - "писав"
          - "написав"
        explanation: Довго показує процес написання.
      - sentence: "Я швидко ___ лист і надіслав його."
        answer: "написав"
        options:
          - "писав"
          - "написав"
        explanation: Тут лист уже готовий.
      - sentence: "Бабуся ___ борщ увесь ранок."
        answer: "варила"
        options:
          - "варила"
          - "зварила"
        explanation: Увесь ранок показує процес.
      - sentence: "Бабуся ___ борщ до обіду."
        answer: "зварила"
        options:
          - "варила"
          - "зварила"
        explanation: До обіду підкреслює готовий результат.
      - sentence: "Ми часто ___ про роботу українською."
        answer: "говоримо"
        options:
          - "говоримо"
          - "сказали"
        explanation: Часто показує повторення.
      - sentence: "На зустрічі я ___ головне."
        answer: "сказав"
        options:
          - "говорив"
          - "сказав"
        explanation: Головне подано як один завершений мовленнєвий крок.
      - sentence: "Він увесь вечір ___ сестрі з переїздом."
        answer: "допомагав"
        options:
          - "допомагав"
          - "допоміг"
        explanation: Увесь вечір показує тривалий процес.
      - sentence: "Нарешті він ___ сестрі з важкою валізою."
        answer: "допоміг"
        options:
          - "допомагав"
          - "допоміг"
        explanation: Нарешті показує досягнутий результат.
  - type: quiz
    title: Яка модель пари?
    instruction: Оберіть модель, яка найкраще пояснює пару.
    items:
      - prompt: "писати / написати"
        options:
          - text: "переважно префікс"
            correct: true
          - text: "інше слово"
            correct: false
          - text: "назва відмінка"
            correct: false
        explanation: У доконаній формі з'являється префікс на-.
      - prompt: "відповідати / відповісти"
        options:
          - text: "зміна форми або суфікса"
            correct: true
          - text: "пара не має спільного значення"
            correct: false
          - text: "тільки зміна наголосу"
            correct: false
        explanation: Форма стає коротшою, але дія залишається тією самою.
      - prompt: "брати / взяти"
        options:
          - text: "інше слово, готова часта пара"
            correct: true
          - text: "простий префікс до брати"
            correct: false
          - text: "місцевий відмінок"
            correct: false
        explanation: Цю пару краще запам'ятати цілою.
      - prompt: "варити / зварити"
        options:
          - text: "переважно префікс"
            correct: true
          - text: "інше слово"
            correct: false
          - text: "прикметник"
            correct: false
        explanation: Префікс з- допомагає показати завершений результат.
      - prompt: "допомагати / допомогти"
        options:
          - text: "зміна основи"
            correct: true
          - text: "назва місяця"
            correct: false
          - text: "випадкова пара"
            correct: false
        explanation: Частина основи змінюється, але дія та сама.
      - prompt: "говорити / сказати"
        options:
          - text: "інше слово, часта готова пара"
            correct: true
          - text: "тільки префікс"
            correct: false
          - text: "пара прикметників"
            correct: false
        explanation: Цю пару краще запам'ятати цілою.
      - prompt: "запитувати / запитати"
        options:
          - text: "зміна форми або суфікса"
            correct: true
          - text: "випадкова тема"
            correct: false
          - text: "тільки англійський переклад"
            correct: false
        explanation: Форми схожі, але одна коротша і доконана.
      - prompt: "робити / зробити"
        options:
          - text: "переважно префікс"
            correct: true
          - text: "інше слово без зв'язку"
            correct: false
          - text: "назва особи"
            correct: false
        explanation: З- додається до базового дієслова робити.
  - type: group-sort
    title: Запис у зошиті
    instruction: Розподіліть записи на корисні пари й випадкові поєднання.
    groups:
      - name: "корисна видова пара"
        items:
          - "читати / прочитати"
          - "робити / зробити"
          - "допомагати / допомогти"
          - "брати / взяти"
      - name: "випадкове поєднання"
        items:
          - "писати / суп"
          - "говорити / ручка"
          - "варити / прочитати"
          - "відповідати / зварити"
  - type: mark-the-words
    title: Познач пари в тексті
    instruction: Позначте дієслова, які входять до видових пар.
    text: "Уранці я читав інструкцію і прочитав її до кінця. Потім писав лист і написав коротку відповідь. Увечері допомагав сусідці й допоміг їй занести валізу."
    targets:
      - "читав"
      - "прочитав"
      - "писав"
      - "написав"
      - "допомагав"
      - "допоміг"
  - type: essay-response
    title: "Міні-словник: три пари"
    instruction: Напишіть короткий запис для власного словника.
    prompt: "Виберіть три видові пари з модуля. Для кожної пари напишіть одне речення з процесом і одне речення з результатом. Моделі: читати / прочитати; писати / написати; допомагати / допомогти."
    min_words: 35
    model_answer: "Читати / прочитати: Я читав інструкцію в метро. Я прочитав інструкцію до кінця. Писати / написати: Вона писала лист увечері. Вона написала лист і надіслала його. Допомагати / допомогти: Ми допомагали другові. Ми допомогли йому швидко."
    peer_review_guidelines:
      - "Перевірте, що є три пари."
      - "Позначте речення з процесом."
      - "Позначте речення з результатом."
    rubric:
      aspect_pairs: "Є три правильні видові пари."
      contrast: "Кожна пара має процес і результат."
      clarity: "Речення короткі й зрозумілі."
