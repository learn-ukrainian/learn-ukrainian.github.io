inline:
  - id: act-1
    type: quiz
    title: Розпізнай граматику
    instruction: Оберіть, що тренує виділена фраза.
    items:
      - prompt: "Я довго готував вечерю."
        options:
          - text: "недоконаний вид, процес"
            correct: true
          - text: "доконаний вид, результат"
            correct: false
          - text: "родовий множини"
            correct: false
        explanation: Довго готував показує процес.
      - prompt: "Я приготував салат."
        options:
          - text: "доконаний вид, результат"
            correct: true
          - text: "недоконаний вид, звичка"
            correct: false
          - text: "дата"
            correct: false
        explanation: Приготував показує готовий результат.
      - prompt: "Я написав список."
        options:
          - text: "доконаний вид, результат"
            correct: true
          - text: "родовий після немає"
            correct: false
          - text: "називний множини"
            correct: false
        explanation: Написав означає, що список готовий.
      - prompt: "Не було молока."
        options:
          - text: "родовий після відсутності"
            correct: true
          - text: "доконаний вид"
            correct: false
          - text: "кличний відмінок"
            correct: false
        explanation: Молока - родовий після не було.
      - prompt: "Багато яблук."
        options:
          - text: "кількість + родовий множини"
            correct: true
          - text: "дата"
            correct: false
          - text: "майбутній час"
            correct: false
        explanation: Після багато потрібен родовий множини.
      - prompt: "Я куплю два літри молока."
        options:
          - text: "майбутній завершений крок"
            correct: true
          - text: "минулий результат"
            correct: false
          - text: "процес у минулому"
            correct: false
        explanation: Куплю - майбутній доконаний результат.
      - prompt: "П'ять лимонів."
        options:
          - text: "число 5+ + родовий множини"
            correct: true
          - text: "число 2-4 + називний множини"
            correct: false
          - text: "родовий однини"
            correct: false
        explanation: Після п'ять потрібен родовий множини.
      - prompt: "Якщо лимонів не буде..."
        options:
          - text: "родовий у фразі відсутності"
            correct: true
          - text: "називний однини"
            correct: false
          - text: "дата"
            correct: false
        explanation: Лимонів не буде - відсутність у майбутньому.
      - prompt: "Дванадцять квитків."
        options:
          - text: "11-14 + родовий множини"
            correct: true
          - text: "2-4 + називний множини"
            correct: false
          - text: "називний однини"
            correct: false
        explanation: 12 належить до зони 11-14.
      - prompt: "Двадцять два квитки."
        options:
          - text: "остання частина два + називний множини"
            correct: true
          - text: "5+ + родовий множини"
            correct: false
          - text: "родовий після немає"
            correct: false
        explanation: 22 бере форму як два.
  - id: act-2
    type: fill-in
    title: Трансформації
    instruction: Оберіть правильну форму після зміни речення.
    items:
      - sentence: "У мене є брат. -> У мене немає ___."
        answer: "брата"
        options: ["брат", "брата", "братом"]
        explanation: Немає вимагає родового.
      - sentence: "У нас є квитки. -> У нас немає ___."
        answer: "квитків"
        options: ["квитки", "квитків", "квитками"]
        explanation: Немає квитків - родовий множини.
      - sentence: "Я бачу паспорт. -> Я не бачу ___."
        answer: "паспорта"
        options: ["паспорт", "паспорта", "паспортом"]
        explanation: Родовий після заперечення - цільова модель.
      - sentence: "Вона читає книгу. -> Вона не читає ___."
        answer: "книги"
        options: ["книга", "книгу", "книги"]
        explanation: Книги - родовий у запереченні.
      - sentence: "один студент -> п'ять ___."
        answer: "студентів"
        options: ["студент", "студенти", "студентів"]
        explanation: Після п'ять потрібен родовий множини.
      - sentence: "два квитки -> дванадцять ___."
        answer: "квитків"
        options: ["квиток", "квитки", "квитків"]
        explanation: Дванадцять належить до 11-14.
      - sentence: "три кімнати -> двадцять три ___."
        answer: "кімнати"
        options: ["кімната", "кімнати", "кімнат"]
        explanation: 23 бере форму як три.
      - sentence: "чотири гості -> двадцять п'ять ___."
        answer: "гостей"
        options: ["гість", "гості", "гостей"]
        explanation: 25 бере форму як п'ять.
      - sentence: "Я маю час. -> Я не маю ___."
        answer: "часу"
        options: ["час", "часу", "часом"]
        explanation: Не маю часу - часта родова модель.
      - sentence: "У холодильнику є молоко. -> У холодильнику не було ___."
        answer: "молока"
        options: ["молоко", "молока", "молоком"]
        explanation: Не було молока - родовий після відсутності.
  - id: act-3
    type: match-up
    title: Видові пари
    instruction: З'єднайте недоконаний вид із доконаним партнером.
    pairs:
      - left: "писати"
        right: "написати"
      - left: "читати"
        right: "прочитати"
      - left: "готувати"
        right: "приготувати"
      - left: "купувати"
        right: "купити"
      - left: "робити"
        right: "зробити"
      - left: "дивитися"
        right: "подивитися"
      - left: "питати"
        right: "запитати"
      - left: "шукати"
        right: "знайти"
      - left: "вчити"
        right: "вивчити"
      - left: "відправляти"
        right: "відправити"
  - id: act-4
    type: quiz
    title: Обери за контекстом
    instruction: Оберіть форму, яка відповідає саме цьому контексту.
    items:
      - prompt: "Учора я довго ___ статтю."
        options:
          - text: "читав"
            correct: true
          - text: "прочитав"
            correct: false
          - text: "прочитаю"
            correct: false
        explanation: Довго просить процес.
      - prompt: "Учора я ___ статтю до кінця."
        options:
          - text: "прочитав"
            correct: true
          - text: "читав"
            correct: false
          - text: "буду читати"
            correct: false
        explanation: До кінця вказує на результат.
      - prompt: "Поки я ___ вечерю, мені подзвонили."
        options:
          - text: "готував"
            correct: true
          - text: "приготував"
            correct: false
          - text: "приготую"
            correct: false
        explanation: Поки вводить фоновий процес.
      - prompt: "Я встиг ___ вечерю до сьомої."
        options:
          - text: "приготувати"
            correct: true
          - text: "готувати"
            correct: false
          - text: "буду готувати"
            correct: false
        explanation: Встиг просить інфінітив доконаного виду для завершеного результату.
      - prompt: "Завтра я буду ___ листа."
        options:
          - text: "писати"
            correct: true
          - text: "напишу"
            correct: false
          - text: "написав"
            correct: false
        explanation: Після буду потрібен інфінітив недоконаного виду.
      - prompt: "Завтра я встигну ___ листа до вечора."
        options:
          - text: "написати"
            correct: true
          - text: "писати"
            correct: false
          - text: "писав"
            correct: false
        explanation: Встигну просить інфінітив доконаного виду для майбутнього результату.
      - prompt: "Я вже встиг ___ список."
        options:
          - text: "написати"
            correct: true
          - text: "писати"
            correct: false
          - text: "буду писати"
            correct: false
        explanation: Встиг просить інфінітив доконаного виду для готового результату.
      - prompt: "Увесь вечір ми ___ адресу."
        options:
          - text: "шукали"
            correct: true
          - text: "знайшли"
            correct: false
          - text: "знайдемо"
            correct: false
        explanation: Увесь вечір показує процес пошуку.
      - prompt: "Нарешті ми ___ адресу."
        options:
          - text: "знайшли"
            correct: true
          - text: "шукали"
            correct: false
          - text: "будемо шукати"
            correct: false
        explanation: Нарешті показує результат.
      - prompt: "Щосуботи ми ___ продукти на ринку."
        options:
          - text: "купуємо"
            correct: true
          - text: "купимо"
            correct: false
          - text: "купили"
            correct: false
        explanation: Щосуботи показує повторювану звичку.
workbook:
  - type: fill-in
    title: Короткі відповіді
    instruction: Оберіть модельну відповідь, яка граматично відповідає питанню.
    items:
      - sentence: "Чого у вас сьогодні немає? -> ___"
        answer: "У мене сьогодні немає часу."
        options:
          - "У мене сьогодні немає часу."
          - "У мене сьогодні немає час."
        explanation: Немає часу - родовий.
      - sentence: "Що ви робили вчора ввечері? -> ___"
        answer: "Учора ввечері я читав статтю."
        options:
          - "Учора ввечері я читав статтю."
          - "Учора ввечері я прочитав статтю до кінця."
        explanation: Питання що робили? просить процес; другий варіант можливий в іншому контексті, але не відповідає фокусу питання.
      - sentence: "Що ви вже зробили сьогодні? -> ___"
        answer: "Сьогодні я вже написав повідомлення."
        options:
          - "Сьогодні я вже написав повідомлення."
          - "Сьогодні я вже писав повідомлення."
        explanation: Уже зробили просить результат.
      - sentence: "Скільки людей у вашій групі? -> ___"
        answer: "У нашій групі одинадцять студентів."
        options:
          - "У нашій групі одинадцять студентів."
          - "У нашій групі одинадцять студенти."
        explanation: 11-14 вимагає родового множини.
      - sentence: "Коли у вас день народження? -> ___"
        answer: "Мій день народження двадцять другого травня."
        options:
          - "Мій день народження двадцять другого травня."
          - "Мій день народження двадцять друге травень."
        explanation: У даті місяць стоїть у родовому.
      - sentence: "Що ви купите завтра? -> ___"
        answer: "Завтра я куплю хліб і молоко."
        options:
          - "Завтра я куплю хліб і молоко."
          - "Завтра я купив хліб і молоко."
        explanation: Куплю - майбутній результат.
  - type: error-correction
    title: Виправ одну помилку
    instruction: Оберіть речення з правильною формою.
    items:
      - sentence: "У мене немає брат."
        error: "брат"
        correction: "У мене немає брата."
        options:
          - "У мене немає брата."
          - "У мене немає брат."
        explanation: Після немає потрібен родовий відмінок.
      - sentence: "У групі одинадцять студенти."
        error: "студенти"
        correction: "У групі одинадцять студентів."
        options:
          - "У групі одинадцять студентів."
          - "У групі одинадцять студенти."
        explanation: 11-14 вимагає родового множини.
      - sentence: "Двадцять два студентів прийшли рано."
        error: "студентів"
        correction: "Двадцять два студенти прийшли рано."
        options:
          - "Двадцять два студенти прийшли рано."
          - "Двадцять два студентів прийшли рано."
        explanation: 22 бере форму як два, тому студенти.
      - sentence: "Я не бачу паспорт."
        error: "паспорт"
        correction: "Я не бачу паспорта."
        options:
          - "Я не бачу паспорта."
          - "Я не бачу паспорт."
        explanation: У цій моделі після заперечення вживаємо родовий.
      - sentence: "Учора я довго прочитав статтю."
        error: "прочитав"
        correction: "Учора я довго читав статтю."
        options:
          - "Учора я довго читав статтю."
          - "Учора я довго прочитав статтю."
        explanation: Довго показує процес, тому потрібен недоконаний вид.
      - sentence: "Нарешті я писав відповідь."
        error: "писав"
        correction: "Нарешті я написав відповідь."
        options:
          - "Нарешті я написав відповідь."
          - "Нарешті я писав відповідь."
        explanation: Нарешті вказує на завершений результат.
      - sentence: "Завтра я буду написати листа."
        error: "буду написати"
        correction: "Завтра я напишу листа."
        options:
          - "Завтра я напишу листа."
          - "Завтра я буду написати листа."
        explanation: Для доконаного майбутнього потрібна проста форма.
      - sentence: "Поки я приготував вечерю, мені подзвонили."
        error: "приготував"
        correction: "Поки я готував вечерю, мені подзвонили."
        options:
          - "Поки я готував вечерю, мені подзвонили."
          - "Поки я приготував вечерю, мені подзвонили."
        explanation: Поки вводить фоновий процес.
      - sentence: "Мій день народження двадцять друге травень."
        error: "двадцять друге травень"
        correction: "Мій день народження двадцять другого травня."
        options:
          - "Мій день народження двадцять другого травня."
          - "Мій день народження двадцять друге травень."
        explanation: У даті порядковий числівник і місяць мають родову форму.
      - sentence: "У холодильнику не було молоко."
        error: "молоко"
        correction: "У холодильнику не було молока."
        options:
          - "У холодильнику не було молока."
          - "У холодильнику не було молоко."
        explanation: Не було вимагає родового відмінка.
  - type: essay-response
    title: Міні-письмо 5-7 речень
    instruction: Напишіть короткий текст українською.
    prompt: "Напишіть 5-7 речень про вихідні або про вчорашній день. Використайте одну фразу з немає/не було, одну кількість, один процес, один результат і одну дату або день."
    min_words: 45
    source_reading: "Модель у частині 6 показує процес, результат, родовий, кількість і день."
    model_answer: "У суботу я довго готував вечерю. У мене не було часу, але було багато овочів. Я приготував салат і написав список покупок. Потім купив два кілограми яблук. У магазині не було лимонів. У неділю я буду читати, а ввечері напишу повідомлення другові про нашу зустріч."
    peer_review_guidelines:
      - "Позначте одну фразу з родовим після немає або не було."
      - "Позначте одну кількість із правильною формою іменника."
      - "Позначте один процес і один результат."
      - "Перевірте, що текст має 5-7 речень."
    rubric:
      grammar: "Родовий і числові форми правильні."
      aspect: "Процес і результат розрізнено за контекстом."
      completion: "Є 5-7 речень і всі вимоги виконано."
  - type: true-false
    title: Самооцінка перед рухом далі
    instruction: Визначте, чи твердження відповідає основам A2.1.
    items:
      - statement: "Учора я читав can be correct when the focus is process."
        answer: true
        explanation: Учора не забороняє недоконаний вид.
      - statement: "Я куплю серветки is a past completed result."
        answer: false
        explanation: Це майбутній завершений крок.
      - statement: "Дванадцять студентів follows the 11-14 rule."
        answer: true
        explanation: 11-14 вимагає родового множини.
      - statement: "Двадцять два студенти follows the 2-4 pattern."
        answer: true
        explanation: Остання частина два вимагає називного множини.
      - statement: "Немає квитків uses genitive plural."
        answer: true
        explanation: Квитків - родовий множини.
      - statement: "У даті треба сказати перше січень."
        answer: false
        explanation: Потрібно перше січня.
