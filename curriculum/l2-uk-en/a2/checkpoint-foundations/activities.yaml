inline:
  - id: act-1
    type: quiz
    title: Знайди граматику
    instruction: Оберіть, що тренує виділена фраза.
    items:
      - prompt: "Я довго готував вечерю."
        options:
          - text: "недоконаний вид, процес"
            correct: true
          - text: "родовий множини"
            correct: false
        explanation: Довго готував - це процес.
      - prompt: "Я приготував салат."
        options:
          - text: "доконаний вид, результат"
            correct: true
          - text: "дата"
            correct: false
        explanation: Приготував показує результат.
      - prompt: "Немає молока."
        options:
          - text: "родовий після немає"
            correct: true
          - text: "називний однини"
            correct: false
        explanation: Молока - це родовий відмінок.
  - id: act-2
    type: fill-in
    title: Обери форму
    instruction: Оберіть правильне слово.
    items:
      - sentence: "У мене немає ___."
        answer: "часу"
        options: ["час", "часу"]
        explanation: Немає вимагає родового відмінка.
      - sentence: "П'ять ___."
        answer: "студентів"
        options: ["студенти", "студентів"]
        explanation: Після п'ять стоїть родовий множини.
      - sentence: "Учора я ___ листа."
        answer: "написав"
        options: ["писав", "написав"]
        explanation: Речення вказує на завершений результат.
  - id: act-3
    type: match-up
    title: Запитання і граматика
    instruction: З'єднайте кожне запитання з граматикою, яку воно зазвичай просить.
    pairs:
      - left: "Що ти робив?"
        right: "недоконаний вид"
      - left: "Що ти зробив?"
        right: "доконаний вид"
      - left: "Чого немає?"
        right: "родовий відмінок"
      - left: "Скільки гостей?"
        right: "числівник + форма іменника"
  - id: act-4
    type: error-correction
    title: Змішані помилки
    instruction: Оберіть виправлене речення.
    items:
      - sentence: "У мене немає квиток."
        error: "квиток"
        correction: "У мене немає квитка."
        options: ["У мене немає квитка.", "У мене немає квиток."]
        explanation: Немає вимагає родового відмінка.
      - sentence: "П'ять студент."
        error: "студент"
        correction: "П'ять студентів."
        options: ["П'ять студентів.", "П'ять студент."]
        explanation: Після п'ять потрібен родовий множини.
      - sentence: "Я вже писав лист."
        error: "писав"
        correction: "Я вже написав лист."
        options: ["Я вже написав лист.", "Я вже писав лист."]
        explanation: Уже вказує на результат.
workbook:
  - type: true-false
    title: Самоперевірка
    instruction: Визначте, чи правильне кожне твердження.
    items:
      - statement: "Робив usually focuses on process."
        answer: true
        explanation: Це недоконаний вид.
      - statement: "Зробив usually focuses on result."
        answer: true
        explanation: Це доконаний вид.
      - statement: "Немає брат is the target form."
        answer: false
        explanation: Цільова форма - немає брата.
  - type: match-up
    title: Міні-повторення
    instruction: З'єднайте фразу з її підписом.
    pairs:
      - left: "п'яте березня"
        right: "дата"
      - left: "багато друзів"
        right: "кількість"
      - left: "читав"
        right: "процес"
      - left: "прочитав"
        right: "результат"
