inline:
  - id: act-1
    type: fill-in
    title: Один, одна, одне
    instruction: Оберіть форму, яка узгоджується з іменником або відмінком.
    items:
      - sentence: "___ стіл"
        answer: "один"
        options: ["один", "одна", "одне"]
        explanation: Стіл - чоловічий рід.
      - sentence: "___ чашка"
        answer: "одна"
        options: ["один", "одна", "одне"]
        explanation: Чашка - жіночий рід.
      - sentence: "___ місце"
        answer: "одне"
        options: ["один", "одна", "одне"]
        explanation: Місце - середній рід.
      - sentence: "немає ___ стільця"
        answer: "одного"
        options: ["один", "одного", "одним"]
        explanation: Немає чого? одного стільця.
      - sentence: "немає ___ чашки"
        answer: "однієї"
        options: ["одна", "однієї", "однією"]
        explanation: Немає чого? однієї чашки.
      - sentence: "допомогти ___ гостю"
        answer: "одному"
        options: ["один", "одного", "одному"]
        explanation: Допомогти кому? одному гостю.
      - sentence: "говорити з ___ учасницею"
        answer: "однією"
        options: ["одна", "одній", "однією"]
        explanation: Говорити з ким? з однією учасницею.
      - sentence: "ми з ___ міста"
        answer: "одного"
        options: ["один", "одного", "одним"]
        explanation: Звідки? з одного міста.
  - id: act-2
    type: quiz
    title: Яка форма іменника?
    instruction: Оберіть правильну форму після числа.
    items:
      - question: "один ___"
        options: ["квиток", "квитки", "квитків"]
        correct: 0
        explanation: Після один стоїть називний однини.
      - question: "два ___"
        options: ["квитки", "квиток", "квитків"]
        correct: 0
        explanation: Після два стоїть називний множини.
      - question: "три ___"
        options: ["столи", "стіл", "столів"]
        correct: 0
        explanation: Після три стоїть називний множини.
      - question: "чотири ___"
        options: ["місця", "місце", "місць"]
        correct: 0
        explanation: Після чотири стоїть називний множини.
      - question: "п'ять ___"
        options: ["квитків", "квитки", "квиток"]
        correct: 0
        explanation: Після п'ять стоїть родовий множини.
      - question: "одинадцять ___"
        options: ["гостей", "гості", "гість"]
        correct: 0
        explanation: 11-14 беруть родовий множини.
      - question: "двадцять один ___"
        options: ["учасник", "учасники", "учасників"]
        correct: 0
        explanation: Остання частина один вимагає називного однини.
      - question: "двадцять два ___"
        options: ["учасники", "учасник", "учасників"]
        correct: 0
        explanation: Остання частина два вимагає називного множини.
  - id: act-3
    type: match-up
    title: Порядкові форми
    instruction: З'єднайте початкову фразу з формою в контексті.
    pairs:
      - left: "перший день"
        right: "першого дня"
      - left: "третій поверх"
        right: "на третьому поверсі"
      - left: "п'ятий квиток"
        right: "п'ятого квитка"
      - left: "перша група"
        right: "першій групі"
      - left: "третя зустріч"
        right: "третьої зустрічі"
      - left: "п'яте завдання"
        right: "після п'ятого завдання"
      - left: "двадцять перший день"
        right: "двадцять першого дня"
      - left: "друга кімната"
        right: "у другій кімнаті"
  - id: act-4
    type: group-sort
    title: Рік, роки, років
    instruction: Розсортуйте фрази про вік за формою іменника.
    groups:
      - label: "рік"
        items:
          - "один рік"
          - "двадцять один рік"
          - "тридцять один рік"
          - "сорок один рік"
      - label: "роки"
        items:
          - "два роки"
          - "три роки"
          - "двадцять два роки"
          - "тридцять чотири роки"
      - label: "років"
        items:
          - "п'ять років"
          - "одинадцять років"
          - "двадцять п'ять років"
          - "тридцять вісім років"
workbook:
  - type: true-false
    title: Числа без пасток
    instruction: Визначте, чи правильна форма після числа.
    items:
      - statement: "Двадцять один учасник - правильна форма."
        correct: true
        explanation: Остання частина один вимагає називного однини.
      - statement: "Двадцять два учасників - правильна форма."
        correct: false
        explanation: Потрібно двадцять два учасники.
      - statement: "Одинадцять гостей - правильна форма."
        correct: true
        explanation: 11-14 беруть родовий множини.
      - statement: "Три гривень - правильна форма."
        correct: false
        explanation: Потрібно три гривні.
      - statement: "П'ять місць - правильна форма."
        correct: true
        explanation: Після п'ять потрібен родовий множини.
      - statement: "Дві кімнати - правильна форма."
        correct: true
        explanation: Кімната - жіночий рід, тому дві.
      - statement: "Два зустрічі - правильна форма."
        correct: false
        explanation: Зустріч - жіночий рід, тому дві зустрічі.
      - statement: "Третього липня - природна форма для дати."
        correct: true
        explanation: У даті на питання коли? порядковий числівник і місяць у родовому.
  - type: error-correction
    title: Виправте число
    instruction: Оберіть правильну фразу.
    items:
      - sentence: "два кімнати"
        error: "два"
        correction: "дві кімнати"
        options: ["дві кімнати", "два кімнати"]
        explanation: Кімната - жіночий рід.
      - sentence: "п'ять квитки"
        error: "квитки"
        correction: "п'ять квитків"
        options: ["п'ять квитків", "п'ять квитки"]
        explanation: Після п'ять потрібен родовий множини.
      - sentence: "дванадцять стільці"
        error: "стільці"
        correction: "дванадцять стільців"
        options: ["дванадцять стільців", "дванадцять стільці"]
        explanation: 12 належить до групи 11-14.
      - sentence: "двадцять чотири гостей"
        error: "гостей"
        correction: "двадцять чотири гості"
        options: ["двадцять чотири гості", "двадцять чотири гостей"]
        explanation: Остання частина чотири вимагає називного множини.
      - sentence: "двадцять п'ять гості"
        error: "гості"
        correction: "двадцять п'ять гостей"
        options: ["двадцять п'ять гостей", "двадцять п'ять гості"]
        explanation: Остання частина п'ять вимагає родового множини.
      - sentence: "на третій поверсі"
        error: "третій"
        correction: "на третьому поверсі"
        options: ["на третьому поверсі", "на третій поверсі"]
        explanation: "Поверх у місцевому: на третьому поверсі."
      - sentence: "п'ятого червень"
        error: "червень"
        correction: "п'ятого червня"
        options: ["п'ятого червня", "п'ятого червень"]
        explanation: Назва місяця у даті стоїть у родовому.
      - sentence: "одній стіл"
        error: "одній"
        correction: "один стіл"
        options: ["один стіл", "одній стіл"]
        explanation: Стіл - чоловічий рід у називному.
