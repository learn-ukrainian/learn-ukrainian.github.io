inline:
  - id: act-1
    type: fill-in
    title: На ринку
    instruction: Choose the correct quantity phrase.
    items:
      - sentence: "Дайте два кілограми ___."
        answer: "яблук"
        options: ["яблука", "яблук"]
        explanation: Quantity phrase takes genitive plural.
      - sentence: "У нас немає ___."
        answer: "лимонів"
        options: ["лимони", "лимонів"]
        explanation: Немає takes genitive.
      - sentence: "Купіть п'ять ___."
        answer: "груш"
        options: ["груші", "груш"]
        explanation: Five takes genitive plural.
  - id: act-2
    type: quiz
    title: Робив чи зробив?
    instruction: Choose the better verb for the question.
    items:
      - prompt: "Що ти робив увечері?"
        options:
          - text: "Я писав листа."
            correct: true
          - text: "Я написав листа."
            correct: false
        explanation: The question asks about process.
      - prompt: "Що ти зробив?"
        options:
          - text: "Я написав список."
            correct: true
          - text: "Я писав список."
            correct: false
        explanation: The question asks about result.
      - prompt: "Я вже..."
        options:
          - text: "купив овочі"
            correct: true
          - text: "купував овочі"
            correct: false
        explanation: Уже points to result.
  - id: act-3
    type: match-up
    title: Питання і відповідь
    instruction: Match the question with the answer.
    pairs:
      - left: "Чого немає?"
        right: "Немає серветок."
      - left: "Скільки гостей?"
        right: "Десять гостей."
      - left: "Що ти будеш робити?"
        right: "Буду готувати салат."
      - left: "Що ти вже зробив?"
        right: "Я купив овочі."
  - id: act-4
    type: group-sort
    title: Граматика в діалозі
    instruction: Sort each phrase by grammar focus.
    groups:
      - name: "вид"
        items: ["писав листа", "написав листа", "буду готувати", "приготувала"]
      - name: "родовий"
        items: ["немає серветок", "п'ять гостей", "мало овочів", "кілька груш"]
workbook:
  - type: true-false
    title: Практика A2.1
    instruction: Decide whether each statement fits.
    items:
      - statement: "Що ти робив? usually asks about process."
        answer: true
        explanation: It invites imperfective.
      - statement: "Немає лимонів is a genitive phrase."
        answer: true
        explanation: Лимонів is genitive plural.
      - statement: "П'ять лимони is the target A2 form."
        answer: false
        explanation: The target form is п'ять лимонів.
  - type: error-correction
    title: Виправ діалог
    instruction: Choose the corrected sentence.
    items:
      - sentence: "У нас немає серветки."
        error: "серветки"
        correction: "У нас немає серветок."
        options: ["У нас немає серветок.", "У нас немає серветки."]
        explanation: In this party context, plural absence is needed.
      - sentence: "Я вже готував салат."
        error: "готував"
        correction: "Я вже приготував салат."
        options: ["Я вже приготував салат.", "Я вже готував салат."]
        explanation: Уже points to completed result.
