inline:
  - id: act-1
    type: quiz
    title: План чи результат?
    instruction: Оберіть форму, яка граматично й змістово підходить до контексту.
    items:
      - prompt: "Хто має роль? Я буду ___ салат."
        options:
          - text: "готувати"
            correct: true
          - text: "приготую"
            correct: false
          - text: "приготував"
            correct: false
        explanation: Після буду потрібен інфінітив недоконаного виду для процесу.
      - prompt: "Пункт має бути готовий до вечора: Я ___ салат до вечора."
        options:
          - text: "приготую"
            correct: true
          - text: "буду готувати"
            correct: false
          - text: "готував"
            correct: false
        explanation: До вечора просить завершений майбутній результат.
      - prompt: "Що вже готове? Я вже ___ овочі."
        options:
          - text: "купила"
            correct: true
          - text: "куплю"
            correct: false
          - text: "буду купувати"
            correct: false
        explanation: Уже + минулий час показує готовий результат.
      - prompt: "Це ще майбутня обіцянка: Я ___ серветки після роботи."
        options:
          - text: "куплю"
            correct: true
          - text: "купила"
            correct: false
          - text: "купував"
            correct: false
        explanation: Куплю - майбутній завершений крок, не минулий результат.
      - prompt: "Роль під час підготовки: Денис буде ___ фрукти."
        options:
          - text: "різати"
            correct: true
          - text: "поріже"
            correct: false
          - text: "порізав"
            correct: false
        explanation: Буде різати показує процес або роль.
      - prompt: "Пункт у списку буде закрито: Денис ___ фрукти за десять хвилин."
        options:
          - text: "поріже"
            correct: true
          - text: "буде різати"
            correct: false
          - text: "різав"
            correct: false
        explanation: За десять хвилин тут вказує на завершення.
      - prompt: "Ще не готово: Марта ще не ___ салат."
        options:
          - text: "приготувала"
            correct: true
          - text: "готувала"
            correct: false
          - text: "готує"
            correct: false
        explanation: Ще не + доконаний минулий показує відсутній результат.
      - prompt: "Процес у минулому: Учора я довго ___ список."
        options:
          - text: "писав"
            correct: true
          - text: "написав"
            correct: false
          - text: "напишу"
            correct: false
        explanation: Довго просить процес.
      - prompt: "Готовий результат у минулому: Учора я нарешті ___ список."
        options:
          - text: "написав"
            correct: true
          - text: "писав"
            correct: false
          - text: "буду писати"
            correct: false
        explanation: Нарешті вказує на завершений результат.
      - prompt: "Загальна активність завтра: Завтра ми будемо ___ продукти на ринку."
        options:
          - text: "купувати"
            correct: true
          - text: "купимо"
            correct: false
          - text: "купили"
            correct: false
        explanation: Будемо купувати показує план як активність.
  - id: act-2
    type: fill-in
    title: Ринок і родовий
    instruction: Оберіть правильну форму для ринкового діалогу.
    items:
      - sentence: "Дайте один кілограм ___."
        answer: "меду"
        options: ["мед", "меду", "медом"]
        explanation: Кілограм меду - родовий після кількості.
      - sentence: "Дайте дві ___."
        answer: "дині"
        options: ["диня", "дині", "динь"]
        explanation: Після дві стоїть називний множини.
      - sentence: "Динь сьогодні ___."
        answer: "немає"
        options: ["немає", "не бачу", "коштує"]
        explanation: Динь немає - природна фраза відсутності.
      - sentence: "Купіть п'ять ___."
        answer: "лимонів"
        options: ["лимон", "лимони", "лимонів"]
        explanation: Після п'ять потрібен родовий множини.
      - sentence: "Я не бачу ___."
        answer: "сиру"
        options: ["сир", "сиру", "сиром"]
        explanation: Родовий після заперечення - цільова модель.
      - sentence: "Дайте три ___."
        answer: "груші"
        options: ["груша", "груші", "груш"]
        explanation: Після три стоїть називний множини.
      - sentence: "Дайте два кілограми ___."
        answer: "яблук"
        options: ["яблука", "яблук", "яблуком"]
        explanation: Продукт після одиниці виміру стоїть у родовому множини.
      - sentence: "У нас немає ___."
        answer: "серветок"
        options: ["серветки", "серветок", "серветка"]
        explanation: Немає серветок - відсутність у множині.
      - sentence: "Треба купити двадцять ___."
        answer: "тарілок"
        options: ["тарілка", "тарілки", "тарілок"]
        explanation: Двадцять вимагає родового множини.
      - sentence: "Скільки ___ кілограм меду?"
        answer: "коштує"
        options: ["коштує", "немає", "бачу"]
        explanation: Скільки коштує? - питання про ціну.
  - id: act-3
    type: match-up
    title: Історія дня
    instruction: З'єднайте речення з його видовим фокусом.
    pairs:
      - left: "Я довго писав листа."
        right: "процес у минулому"
      - left: "Я написав листа."
        right: "готовий результат"
      - left: "Я читав книжку."
        right: "процес, книжка не обов'язково закінчена"
      - left: "Я прочитав книжку."
        right: "книжка закінчена"
      - left: "Коли я готував вечерю, мені подзвонили."
        right: "фонова дія"
      - left: "Я приготував вечерю до сьомої."
        right: "результат до часу"
      - left: "Завтра буду писати список."
        right: "план як процес"
      - left: "Завтра напишу список."
        right: "майбутній завершений крок"
      - left: "Я вже купив хліб."
        right: "минулий результат"
      - left: "Я куплю хліб після роботи."
        right: "майбутній результат"
  - id: act-4
    type: match-up
    title: Питання до сценарію
    instruction: З'єднайте питання з відповіддю.
    pairs:
      - left: "Що треба купити для вечірки?"
        right: "Треба купити напої і фрукти."
      - left: "Чого немає?"
        right: "Немає серветок."
      - left: "Скільки гостей буде?"
        right: "Буде десять гостей."
      - left: "Хто буде готувати салат?"
        right: "Марта буде готувати салат."
      - left: "Що ти вже зробив?"
        right: "Я вже написав список."
      - left: "Що ти купиш після роботи?"
        right: "Я куплю серветки."
      - left: "Скільки коштує мед?"
        right: "Двісті гривень за кілограм."
      - left: "Що ти робив учора ввечері?"
        right: "Я довго читав книжку."
      - left: "Ти прочитав книжку?"
        right: "Ні, тільки читав."
      - left: "Що буде, якщо лимонів немає?"
        right: "Я куплю апельсини."
workbook:
  - type: true-false
    title: Контекст вирішує
    instruction: Визначте, чи правильно пояснено речення.
    items:
      - statement: "Я куплю серветки describes a future completed step, not a past result."
        answer: true
        explanation: Минуле було б я купив / я купила.
      - statement: "Я вже купила овочі means the buying is already done."
        answer: true
        explanation: Уже + минулий доконаний вид показує результат.
      - statement: "Буду готувати салат and приготую салат always mean exactly the same thing."
        answer: false
        explanation: Перше показує процес/роль, друге - завершений крок.
      - statement: "Учора я читав can be valid if we mean process."
        answer: true
        explanation: Учора не забороняє недоконаний вид.
      - statement: "Нарешті я написав список focuses on result."
        answer: true
        explanation: Нарешті підкреслює завершення.
      - statement: "Динь немає uses genitive plural."
        answer: true
        explanation: Динь - родовий множини.
  - type: error-correction
    title: Виправ сценарій
    instruction: Оберіть речення, яке краще відповідає контексту.
    items:
      - sentence: "Я вже куплю овочі."
        error: "куплю"
        correction: "Я вже купила овочі."
        options: ["Я вже купила овочі.", "Я вже куплю овочі."]
        explanation: Уже про готовий результат потребує минулої форми.
      - sentence: "Ми будемо купимо продукти."
        error: "купимо"
        correction: "Ми будемо купувати продукти."
        options: ["Ми будемо купувати продукти.", "Ми будемо купимо продукти."]
        explanation: Після будемо потрібен інфінітив.
      - sentence: "У нас немає серветки."
        error: "серветки"
        correction: "У нас немає серветок."
        options: ["У нас немає серветок.", "У нас немає серветки."]
        explanation: У сценарії йдеться про серветки загалом, тому родовий множини.
      - sentence: "П'ять лимони, будь ласка."
        error: "лимони"
        correction: "П'ять лимонів, будь ласка."
        options: ["П'ять лимонів, будь ласка.", "П'ять лимони, будь ласка."]
        explanation: Після п'ять потрібен родовий множини.
      - sentence: "Двадцять два тарілок."
        error: "тарілок"
        correction: "Двадцять дві тарілки."
        options: ["Двадцять дві тарілки.", "Двадцять два тарілок."]
        explanation: Тарілка жіночого роду; після 22 потрібна форма дві тарілки.
