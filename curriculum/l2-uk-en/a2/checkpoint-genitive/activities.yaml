inline:
- id: act-1
  type: quiz
  title: Прийменник і функція
  instruction: Оберіть функцію родового прийменника в реченні.
  items:
  - question: Я йду до аптеки.
    options:
    - напрямок
    - відсутність
    - матеріал
    correct: 0
    explanation: До аптеки показує напрямок.
  - question: Ми стоїмо біля собору.
    options:
    - розташування
    - час після події
    - причина
    correct: 0
    explanation: Біля собору показує місце.
  - question: Після уроку я вільний.
    options:
    - час
    - напрямок
    - призначення
    correct: 0
    explanation: Після уроку показує час.
  - question: Це подарунок для сестри.
    options:
    - призначення
    - джерело
    - матеріал
    correct: 0
    explanation: Для сестри показує призначення.
  - question: Я без квитка.
    options:
    - відсутність
    - напрямок
    - час
    correct: 0
    explanation: Без квитка означає, що квитка немає.
  - question: Музей навпроти школи.
    options:
    - розташування
    - джерело
    - кількість
    correct: 0
    explanation: Навпроти школи показує місце.
  - question: Новини від друга.
    options:
    - джерело
    - мета
    - час
    correct: 0
    explanation: Від друга показує джерело.
  - question: Вона повертається зі школи.
    options:
    - звідки
    - куди
    - для кого
    correct: 0
    explanation: Зі школи відповідає на питання звідки?
  - question: Чекайте до шостої.
    options:
    - часова межа
    - місце поруч
    - матеріал
    correct: 0
    explanation: До шостої показує часову межу.
  - question: Коло парку є кав'ярня.
    options:
    - розташування
    - відсутність
    - причина
    correct: 0
    explanation: Коло парку означає біля парку.
- id: act-2
  type: fill-in
  title: Правильна форма
  instruction: Оберіть родовий відмінок із правильним узгодженням.
  items:
  - sentence: без ___ друга
    answer: мого нового
    options:
    - мого нового
    - моєї нової
    - мій новий
    explanation: Друг - чоловічий рід.
  - sentence: біля ___ школи
    answer: цієї старої
    options:
    - цієї старої
    - цього старого
    - ця стара
    explanation: Школа - жіночий рід.
  - sentence: до ___ лікарні
    answer: нашої нової
    options:
    - нашої нової
    - нашого нового
    - наша нова
    explanation: Лікарня - жіночий рід.
  - sentence: після ___ дня
    answer: того важливого
    options:
    - того важливого
    - тієї важливої
    - той важливий
    explanation: День - чоловічий рід.
  - sentence: багато ___
    answer: студентів
    options:
    - студентів
    - студенти
    - студент
    explanation: Багато студентів - родовий множини.
  - sentence: немає ___
    answer: питань
    options:
    - питань
    - питання
    - питанні
    explanation: Немає питань - родовий множини.
  - sentence: кілька ___
    answer: днів
    options:
    - днів
    - дні
    - день
    explanation: Кілька днів - родовий множини.
  - sentence: кілограм ___
    answer: яблук
    options:
    - яблук
    - яблука
    - яблуко
    explanation: Кілограм яблук - родовий множини.
  - sentence: ліки від ___
    answer: кашлю
    options:
    - кашлю
    - кашель
    - кашлем
    explanation: Від кашлю - родовий.
  - sentence: чекайте до ___
    answer: вечора
    options:
    - вечора
    - вечір
    - вечером
    explanation: До вечора - родовий.
- id: act-3
  type: match-up
  title: Ситуація і фраза
  instruction: Зіставте ситуацію з правильною фразою.
  pairs:
  - left: купити яблука
    right: кілограм яблук
  - left: попросити ліки
    right: ліки від кашлю
  - left: сказати, що температури немає
    right: температури немає
  - left: знайти аптеку
    right: до аптеки
  - left: описати місце
    right: біля цього ринку
  - left: сказати для кого подарунок
    right: для моєї сестри
  - left: сказати після чого
    right: після уроку
  - left: сказати кількість людей
    right: десять людей
  - left: сказати без документа
    right: без рецепта
  - left: сказати звідки
    right: зі школи
- id: act-4
  type: group-sort
  title: Чотири зони родового
  instruction: Розсортуйте фрази за типом.
  groups:
  - label: прийменники
    items:
    - до аптеки
    - біля школи
    - після уроку
    - без квитка
  - label: узгодження
    items:
    - мого нового друга
    - цієї старої книги
    - нашого будинку
    - вашої лікарні
  - label: множина
    items:
    - багато студентів
    - мало книг
    - кілька днів
    - немає питань
  - label: ситуації
    items:
    - кілограм яблук
    - пляшка води
    - ліки від кашлю
    - після їжі
workbook:
- type: true-false
  title: Швидка перевірка
  instruction: Позначте, чи фраза правильна.
  items:
  - statement: до аптеки
    correct: true
    explanation: До вимагає родового.
  - statement: до аптека
    correct: false
    explanation: Потрібно до аптеки.
  - statement: без мого друга
    correct: true
    explanation: Мого друга - правильне узгодження.
  - statement: без моєї друга
    correct: false
    explanation: Друг - чоловічий рід, тому мого.
  - statement: біля цієї школи
    correct: true
    explanation: Школа - жіночий рід.
  - statement: багато студентів
    correct: true
    explanation: Студентів - родовий множини.
  - statement: багато студенти
    correct: false
    explanation: Потрібно багато студентів.
  - statement: немає температури
    correct: true
    explanation: Температури - родовий.
  - statement: ліки від кашель
    correct: false
    explanation: Потрібно від кашлю.
  - statement: після їжі
    correct: true
    explanation: Після їжі - правильна фраза.
- type: fill-in
  title: Міні-іспит
  instruction: Оберіть правильну форму.
  items:
  - sentence: Музей ___.
    answer: біля старої школи
    options:
    - біля старої школи
    - біля стара школа
    - біля старою школою
    explanation: Біля + родовий.
  - sentence: Я йду ___.
    answer: до лікаря
    options:
    - до лікаря
    - до лікар
    - до лікарем
    explanation: До лікаря - родовий.
  - sentence: Це подарунок ___.
    answer: для мого брата
    options:
    - для мого брата
    - для моєї брата
    - для мій брат
    explanation: Брат - чоловічий рід.
  - sentence: Після ___ я вільний.
    answer: роботи
    options:
    - роботи
    - робота
    - роботою
    explanation: Після роботи - родовий.
  - sentence: У групі десять ___.
    answer: людей
    options:
    - людей
    - люди
    - людина
    explanation: Десять людей - родовий множини.
  - sentence: На ринку я купую ___.
    answer: пляшку води
    options:
    - пляшку води
    - пляшку вода
    - пляшка води
    explanation: Пляшку чого? Води.
  - sentence: У мене немає ___.
    answer: сил
    options:
    - сил
    - сили
    - сила
    explanation: Немає сил - родовий множини.
  - sentence: Візьму щось ___.
    answer: від головного болю
    options:
    - від головного болю
    - від головний біль
    - від головним болем
    explanation: Від головного болю - родовий.
  - sentence: Вона повертається ___.
    answer: зі школи
    options:
    - зі школи
    - зі школа
    - зі школою
    explanation: Зі школи - звідки?
  - sentence: Чекайте ___.
    answer: до шостої
    options:
    - до шостої
    - до шоста
    - до шостою
    explanation: До шостої - часова межа.
