inline:
  - id: act-1
    type: fill-in
    title: Відмінкова карта
    instruction: Оберіть правильну форму за сигналом у реченні.
    items:
      - sentence: "Я прийшов без ___."
        answer: "квитка"
        options:
          - "квиток"
          - "квитка"
          - "квитком"
        explanation: "Без вимагає родового відмінка."
      - sentence: "Марта допомагає ___."
        answer: "подрузі"
        options:
          - "подруга"
          - "подрузі"
          - "подругою"
        explanation: "Допомагати кому? подрузі."
      - sentence: "Ми бачимо ___."
        answer: "новий будинок"
        options:
          - "новий будинок"
          - "нового будинку"
          - "новим будинком"
        explanation: "Бачимо що? будинок."
      - sentence: "Я говорив з ___."
        answer: "викладачкою"
        options:
          - "викладачка"
          - "викладачки"
          - "викладачкою"
        explanation: "З ким? з викладачкою."
      - sentence: "У ___ було тихо."
        answer: "бібліотеці"
        options:
          - "бібліотека"
          - "бібліотеку"
          - "бібліотеці"
        explanation: "У бібліотеці - місцевий відмінок."
      - sentence: "___, повтори правило."
        answer: "Андрію"
        options:
          - "Андрій"
          - "Андрію"
          - "Андрієм"
        explanation: "Андрію - кличний відмінок."
      - sentence: "Багато ___ прийшло на зустріч."
        answer: "студентів"
        options:
          - "студенти"
          - "студентів"
          - "студентами"
        explanation: "Багато кого? студентів."
      - sentence: "Я телефоную ___."
        answer: "лікарю"
        options:
          - "лікар"
          - "лікарю"
          - "лікаря"
        explanation: "Телефонувати кому? лікарю."
      - sentence: "Вона пише ___."
        answer: "ручкою"
        options:
          - "ручка"
          - "ручку"
          - "ручкою"
        explanation: "Пише чим? ручкою."
      - sentence: "Ми говоримо про ___."
        answer: "подорож"
        options:
          - "подорож"
          - "подорожі"
          - "подорожжю"
        explanation: "Про що? про подорож."
  - id: act-2
    type: quiz
    title: Вид і час
    instruction: Оберіть форму, яка найкраще відповідає контексту.
    items:
      - question: "Я ___ лист цілий вечір, але не закінчив."
        options:
          - "писав"
          - "написав"
          - "напишу"
        correct: 0
        explanation: "Цілий вечір описує процес."
      - question: "Я ___ лист і надіслав його."
        options:
          - "писав"
          - "написав"
          - "пишу"
        correct: 1
        explanation: "Є завершений результат."
      - question: "Завтра я ___ звіт до шостої."
        options:
          - "напишу"
          - "писав"
          - "пишу"
        correct: 0
        explanation: "Майбутній результат: напишу."
      - question: "Щосуботи ми ___ на ринок."
        options:
          - "ходили"
          - "прийшли"
          - "підемо"
        correct: 0
        explanation: "Щосуботи показує повторення."
      - question: "Зараз я ___ до університету."
        options:
          - "іду"
          - "ходжу"
          - "пішов"
        correct: 0
        explanation: "Зараз - односпрямований рух у момент мовлення."
      - question: "Я часто ___ до університету пішки."
        options:
          - "ходжу"
          - "іду"
          - "прийду"
        correct: 0
        explanation: "Часто - регулярний рух."
      - question: "___ таблицю, будь ласка."
        options:
          - "Повторіть"
          - "Повторили"
          - "Повторю"
        correct: 0
        explanation: "Це ввічлива форма наказового способу."
      - question: "Нехай Марта ___ відповіді."
        options:
          - "перевірить"
          - "перевіряла"
          - "перевіряти"
        correct: 0
        explanation: "Нехай + форма майбутнього доконаного виду."
      - question: "Ми ___ нові слова щодня."
        options:
          - "повторюємо"
          - "повторили"
          - "повторимо"
        correct: 0
        explanation: "Щодня - регулярна дія в теперішньому часі."
      - question: "Учора ми ___ всі завдання."
        options:
          - "зробили"
          - "робили"
          - "робимо"
        correct: 0
        explanation: "Усі завдання показують завершений результат."
  - id: act-3
    type: group-sort
    title: До якої теми належить сигнал?
    instruction: Розподіліть сигнали за граматичними темами.
    groups:
      - label: "відмінки"
        items:
          - "без квитка"
          - "допомагаю братові"
          - "з новими друзями"
          - "у великому місті"
      - label: "вид і час"
        items:
          - "писав цілий вечір"
          - "написав до шостої"
          - "буду читати"
          - "прочитаю завтра"
      - label: "порівняння і займенники"
        items:
          - "кращий варіант"
          - "своя книжка"
          - "ніхто не прийшов"
          - "тепліше, ніж учора"
      - label: "складне речення"
        items:
          - "тому що"
          - "щоб"
          - "якщо"
          - "хоча"
  - id: act-4
    type: error-correction
    title: Змішана корекція
    instruction: Оберіть правильний варіант речення.
    items:
      - sentence: "Я прийшов без квиток."
        error: "квиток"
        correction: "Я прийшов без квитка."
        options:
          - "Я прийшов без квитка."
          - "Я прийшов без квиток."
        explanation: "Без вимагає родового відмінка."
      - sentence: "Марта допомагає брат."
        error: "брат"
        correction: "Марта допомагає братові."
        options:
          - "Марта допомагає братові."
          - "Марта допомагає брат."
        explanation: "Допомагати кому? братові."
      - sentence: "Я писав лист і вже надіслав його, тому написав цілий вечір."
        error: "написав цілий вечір"
        correction: "Я писав лист цілий вечір і вже надіслав його."
        options:
          - "Я писав лист цілий вечір і вже надіслав його."
          - "Я написав лист цілий вечір і вже надіслав його."
        explanation: "Цілий вечір описує процес."
      - sentence: "Завтра я буду написати звіт."
        error: "буду написати"
        correction: "Завтра я напишу звіт."
        options:
          - "Завтра я напишу звіт."
          - "Завтра я буду написати звіт."
        explanation: "Доконаний вид має просту майбутню форму."
      - sentence: "Це сама краща відповідь."
        error: "сама краща"
        correction: "Це найкраща відповідь."
        options:
          - "Це найкраща відповідь."
          - "Це сама краща відповідь."
        explanation: "Нормативна форма найвищого ступеня - найкраща."
      - sentence: "Олена взяла її книжку. (Олена взяла книжку Олени.)"
        error: "її"
        correction: "Олена взяла свою книжку."
        options:
          - "Олена взяла свою книжку."
          - "Олена взяла її книжку."
        explanation: "Своя книжка належить підмету Олена."
      - sentence: "Я прийшов, тому що допомогти."
        error: "тому що"
        correction: "Я прийшов, щоб допомогти."
        options:
          - "Я прийшов, щоб допомогти."
          - "Я прийшов, тому що допомогти."
        explanation: "Допомогти - мета."
      - sentence: "Хоча було пізно, але ми повторили тему."
        error: "але"
        correction: "Хоча було пізно, ми повторили тему."
        options:
          - "Хоча було пізно, ми повторили тему."
          - "Хоча було пізно, але ми повторили тему."
        explanation: "Після хоча не додаємо але в цьому навчальному реченні."
      - sentence: "Я говорив з подруга."
        error: "подруга"
        correction: "Я говорив з подругою."
        options:
          - "Я говорив з подругою."
          - "Я говорив з подруга."
        explanation: "З ким? з подругою."
      - sentence: "Якби буде час, я повторю."
        error: "Якби"
        correction: "Якщо буде час, я повторю."
        options:
          - "Якщо буде час, я повторю."
          - "Якби буде час, я повторю."
        explanation: "Для реальної умови A2 потрібне якщо."
workbook:
  - type: true-false
    title: Самооцінка готовності
    instruction: Визначте, чи твердження правильне.
    items:
      - statement: "Після без уживаємо родовий відмінок."
        correct: true
        explanation: "Без квитка, без часу, без подруги."
      - statement: "Допомагати вимагає знахідного відмінка."
        correct: false
        explanation: "Допомагати кому? давальний."
      - statement: "Недоконаний вид часто описує процес або повторення."
        correct: true
        explanation: "Писав цілий вечір; ходив щосуботи."
      - statement: "Доконаний вид має звичайний теперішній час."
        correct: false
        explanation: "Форми типу напишу мають майбутнє значення."
      - statement: "Свій вказує на належність до підмета."
        correct: true
        explanation: "Олена взяла свою книжку."
      - statement: "Ніхто потребує заперечення не."
        correct: true
        explanation: "Ніхто не прийшов."
      - statement: "Щоб часто називає мету."
        correct: true
        explanation: "Я прийшов, щоб допомогти."
      - statement: "Хоча і тому що мають однакову логіку."
        correct: false
        explanation: "Хоча - допуст; тому що - причина."
  - type: match-up
    title: Питання до правила
    instruction: З'єднайте правило з контрольним питанням.
    pairs:
      - left: "родовий після немає"
        right: "немає кого? чого?"
      - left: "давальний після дякувати"
        right: "дякувати кому?"
      - left: "знахідний прямого додатка"
        right: "бачити кого? що?"
      - left: "орудний інструмента"
        right: "писати чим?"
      - left: "місцевий місця"
        right: "бути де?"
      - left: "щоб для мети"
        right: "для чого?"
      - left: "тому що для причини"
        right: "чому?"
      - left: "якщо для умови"
        right: "за якої умови?"
  - type: essay-response
    title: Мій план повторення
    prompt: "Напишіть 80-100 слів українською про три теми А2, які ви вже контролюєте, і дві теми, які повторите перед пробним іспитом."
    min_words: 80
    model_answer: "Я вже впевнено використовую родовий відмінок після немає, без і багато. Також я розумію різницю між процесом і результатом: учора я писав лист, а потім написав його. Мені легше будувати складні речення, тому що я знаю бо, тому що, щоб і якщо. Перед пробним іспитом я повторю давальний відмінок після допомагати і телефонувати. Ще я повторю свій і себе, бо іноді плутаю ці займенники у швидкому мовленні."
    peer_review_guidelines:
      - "Позначте три граматичні теми, які автор контролює."
      - "Позначте дві теми для повторення."
      - "Перевірте, чи є приклади власних речень."
    rubric:
      grammar: "Названо щонайменше три граматичні теми українською."
      plan: "Є конкретний план повторення перед пробним іспитом."
      syntax: "Використано щонайменше два складні речення з бо, тому що, щоб, якщо або хоча."
