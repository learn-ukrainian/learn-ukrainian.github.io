inline:
  - id: act-1
    type: match-up
    title: Фонетичні терміни
    instruction: З'єднайте термін з коротким поясненням.
    pairs:
      - left: "звук"
        right: "те, що ми вимовляємо"
      - left: "буква"
        right: "письмовий знак"
      - left: "фонема"
        right: "звук мови, що розрізняє слова"
      - left: "голосний"
        right: "звук без перешкоди"
      - left: "приголосний"
        right: "звук із перешкодою"
      - left: "наголос"
        right: "сильніший склад"
      - left: "склад"
        right: "частина слова з голосним"
      - left: "транскрипція"
        right: "запис звучання"
  - id: act-2
    type: group-sort
    title: Групи звуків
    instruction: Розподіліть звуки за групами.
    groups:
      - label: "голосні"
        items:
          - "а"
          - "е"
          - "и"
          - "і"
          - "о"
          - "у"
      - label: "дзвінкі"
        items:
          - "б"
          - "д"
          - "з"
          - "ж"
          - "г"
          - "ґ"
      - label: "глухі"
        items:
          - "п"
          - "т"
          - "с"
          - "ш"
          - "х"
          - "к"
      - label: "сонорні"
        items:
          - "м"
          - "н"
          - "л"
          - "р"
          - "в"
          - "й"
  - id: act-3
    type: quiz
    title: Класифікуємо звук
    instruction: Оберіть правильний опис.
    items:
      - question: "У слові `день` останній звук [н']..."
        options:
          - "м'який приголосний"
          - "голосний"
          - "наголошений склад"
        correct: 0
        explanation: "[н'] - м'який приголосний."
      - question: "У слові `мама` звук [а]..."
        options:
          - "голосний"
          - "глухий приголосний"
          - "префікс"
        correct: 0
        explanation: "[а] - голосний звук."
      - question: "У слові `сіль` звук [с']..."
        options:
          - "м'який приголосний"
          - "твердий голосний"
          - "сполучник"
        correct: 0
        explanation: "Літера і показує м'якість попереднього приголосного."
      - question: "Пара б - п показує..."
        options:
          - "дзвінкий і глухий приголосний"
          - "однину і множину"
          - "підмет і присудок"
        correct: 0
        explanation: "Б дзвінкий, п глухий."
      - question: "Наголос - це..."
        options:
          - "виділення одного складу"
          - "закінчення слова"
          - "назва відмінка"
        correct: 0
        explanation: "Наголос робить один склад сильнішим."
      - question: "Транскрипція записує..."
        options:
          - "звучання"
          - "переклад"
          - "частину мови"
        correct: 0
        explanation: "Транскрипція показує, як слово звучить."
      - question: "Літера `я` на початку слова часто позначає..."
        options:
          - "[йа]"
          - "тільки [а]"
          - "родовий відмінок"
        correct: 0
        explanation: "На початку слова `я` часто має два звуки."
      - question: "`Щ` у шкільному описі часто пояснюють як..."
        options:
          - "[шч]"
          - "[йа]"
          - "[дз]"
        correct: 0
        explanation: "Це зручний опис для читання і транскрипції."
  - id: act-4
    type: fill-in
    title: Доповніть транскрипцію
    instruction: Оберіть звук або знак, якого бракує у простій транскрипції.
    items:
      - sentence: "Слово `я`: [___а]."
        answer: "й"
        options:
          - "й"
          - "ь"
          - "ш"
        explanation: "`Я` на початку слова позначає [йа]."
      - sentence: "Слово `люди`: [л'___ди]."
        answer: "у"
        options:
          - "у"
          - "я"
          - "ь"
        explanation: "`Ю` після приголосного показує м'якість і голосний [у]."
      - sentence: "Слово `день`: [ден___]."
        answer: "'"
        options:
          - "'"
          - "й"
          - "а"
        explanation: "Апостроф у транскрипції після [н] позначає м'якість."
      - sentence: "Слово `щука`: [___ука]."
        answer: "шч"
        options:
          - "шч"
          - "с"
          - "й"
        explanation: "У шкільному описі `щ` часто передають як [шч]."
      - sentence: "Слово `синє`: [син'___]."
        answer: "е"
        options:
          - "е"
          - "й"
          - "ь"
        explanation: "`Є` після приголосного показує м'якість і голосний [е]."
      - sentence: "Слово `об'їзд`: [об___ізд]."
        answer: "й"
        options:
          - "й"
          - "ь"
          - "ш"
        explanation: "`Ї` після апострофа передає [йі]."
      - sentence: "Слово `воля`: [вол'___]."
        answer: "а"
        options:
          - "а"
          - "й"
          - "ь"
        explanation: "`Я` після приголосного показує м'якість і голосний [а]."
      - sentence: "Слово `сад`: [са___]."
        answer: "д"
        options:
          - "д"
          - "т"
          - "ц"
        explanation: "Український дзвінкий [д] у кінці слова не треба оглушувати."
workbook:
  - type: mark-the-words
    title: Знайдіть слова з м'яким приголосним
    instruction: Позначте слова, у яких є м'який приголосний звук.
    text: "день люди сіль кінь тінь лялька осінь синє рука мама клас дуб сад"
    targets:
      - "день"
      - "люди"
      - "сіль"
      - "кінь"
      - "тінь"
      - "лялька"
      - "осінь"
      - "синє"
  - type: error-correction
    title: Виправте фонетичний опис
    instruction: Оберіть правильний опис.
    items:
      - sentence: "Буква - це те, що ми чуємо."
        error: "чуємо"
        correction: "Звук - це те, що ми чуємо; буква - знак на письмі."
        options:
          - "Звук - це те, що ми чуємо; буква - знак на письмі."
          - "Буква і звук завжди однакові."
        explanation: "Письмо і звучання треба розрізняти."
      - sentence: "У слові `день` немає м'якого приголосного."
        error: "немає"
        correction: "У слові `день` є м'який [н']."
        options:
          - "У слові `день` є м'який [н']."
          - "У слові `день` усі звуки голосні."
        explanation: "М'який знак показує м'якість."
      - sentence: "Наголос - це назва відмінка."
        error: "назва відмінка"
        correction: "Наголос - це виділення складу."
        options:
          - "Наголос - це виділення складу."
          - "Наголос - це частина слова без закінчення."
        explanation: "Наголос належить до фонетики."
      - sentence: "У слові `яблуко` літера `я` на початку позначає тільки [а]."
        error: "тільки [а]"
        correction: "На початку слова `я` часто позначає [йа]."
        options:
          - "На початку слова `я` часто позначає [йа]."
          - "Літера `я` завжди позначає один звук [а]."
        explanation: "Йотована літера на початку слова має два звуки."
      - sentence: "У слові `щука` буква `щ` у шкільному описі - це [с]."
        error: "[с]"
        correction: "У шкільному описі `щ` часто передають як [шч]."
        options:
          - "У шкільному описі `щ` часто передають як [шч]."
          - "`Щ` завжди читається як [с]."
        explanation: "Це типова звукосполука для простої транскрипції."
      - sentence: "Сонорні приголосні - це тільки глухі звуки."
        error: "тільки глухі"
        correction: "У сонорних голос переважає над шумом."
        options:
          - "У сонорних голос переважає над шумом."
          - "Сонорні не мають голосу."
        explanation: "Сонорні не пояснюємо як глухі."
      - sentence: "Українське слово `сад` треба читати як *[сат]."
        error: "*[сат]"
        correction: "Українське `сад` має дзвінкий кінець [д]."
        options:
          - "Українське `сад` має дзвінкий кінець [д]."
          - "Усі дзвінкі в кінці слова стають глухими."
        explanation: "Не переносіть правило оглушення з іншої мови."
      - sentence: "Літера `ь` має власний окремий звук."
        error: "власний окремий звук"
        correction: "Літера `ь` показує м'якість, але не має власного звука."
        options:
          - "Літера `ь` показує м'якість, але не має власного звука."
          - "Літера `ь` завжди читається як голосний."
        explanation: "М'який знак змінює читання приголосного."
