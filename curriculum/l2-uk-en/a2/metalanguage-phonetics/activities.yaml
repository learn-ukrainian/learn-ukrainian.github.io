inline:
  - id: act-1
    type: match-up
    title: Фонетичні терміни
    instruction: З'єднайте термін з коротким поясненням.
    pairs:
      - left: "звук"
        right: "те, що ми вимовляємо"
      - left: "буква"
        right: "письмовий знак"
      - left: "фонема"
        right: "звук мови, що розрізняє слова"
      - left: "голосний"
        right: "звук без перешкоди"
      - left: "приголосний"
        right: "звук із перешкодою"
      - left: "наголос"
        right: "сильніший склад"
      - left: "склад"
        right: "частина слова з голосним"
      - left: "транскрипція"
        right: "запис звучання"
  - id: act-2
    type: group-sort
    title: Голосні й приголосні
    instruction: Розподіліть звуки за групами.
    groups:
      - label: "голосні"
        items:
          - "а"
          - "е"
          - "и"
          - "і"
          - "о"
          - "у"
      - label: "приголосні"
        items:
          - "м"
          - "н"
          - "с"
          - "т"
          - "л"
          - "к"
  - id: act-3
    type: quiz
    title: Класифікуємо звук
    instruction: Оберіть правильний опис.
    items:
      - question: "У слові `день` останній звук [н']..."
        options:
          - "м'який приголосний"
          - "голосний"
          - "наголошений склад"
        correct: 0
        explanation: "[н'] - м'який приголосний."
      - question: "У слові `мама` звук [а]..."
        options:
          - "голосний"
          - "глухий приголосний"
          - "префікс"
        correct: 0
        explanation: "[а] - голосний звук."
      - question: "У слові `сіль` звук [с']..."
        options:
          - "м'який приголосний"
          - "твердий голосний"
          - "сполучник"
        correct: 0
        explanation: "Літера і показує м'якість попереднього приголосного."
      - question: "Пара б - п показує..."
        options:
          - "дзвінкий і глухий приголосний"
          - "однину і множину"
          - "підмет і присудок"
        correct: 0
        explanation: "Б дзвінкий, п глухий."
      - question: "Наголос - це..."
        options:
          - "виділення одного складу"
          - "закінчення слова"
          - "назва відмінка"
        correct: 0
        explanation: "Наголос робить один склад сильнішим."
      - question: "Транскрипція записує..."
        options:
          - "звучання"
          - "переклад"
          - "частину мови"
        correct: 0
        explanation: "Транскрипція показує, як слово звучить."
      - question: "Літера `я` на початку слова часто позначає..."
        options:
          - "[йа]"
          - "тільки [а]"
          - "родовий відмінок"
        correct: 0
        explanation: "На початку слова `я` часто має два звуки."
      - question: "`Щ` у шкільному описі часто пояснюють як..."
        options:
          - "[шч]"
          - "[йа]"
          - "[дз]"
        correct: 0
        explanation: "Це зручний опис для читання і транскрипції."
  - id: act-4
    type: fill-in
    title: Уставте термін
    instruction: Оберіть правильний фонетичний термін.
    items:
      - sentence: "___ - це розділ мовознавства, що вивчає звуки."
        answer: "Фонетика"
        options:
          - "Фонетика"
          - "Морфологія"
          - "Синтаксис"
        explanation: "Фонетика вивчає звуки мовлення."
      - sentence: "Кожен склад має ___ звук."
        answer: "голосний"
        options:
          - "голосний"
          - "кличний"
          - "службовий"
        explanation: "Без голосного немає складу."
      - sentence: "У слові `люди` перший приголосний звук ___."
        answer: "м'який"
        options:
          - "м'який"
          - "глухий"
          - "наголошений"
        explanation: "Літера ю після л показує м'якість."
      - sentence: "Буква - це знак на ___."
        answer: "письмі"
        options:
          - "письмі"
          - "відмінку"
          - "часі"
        explanation: "Буква або літера - письмовий знак."
      - sentence: "Звук - це те, що ми ___."
        answer: "вимовляємо"
        options:
          - "вимовляємо"
          - "відмінюємо"
          - "підкреслюємо"
        explanation: "Звук належить до мовлення."
      - sentence: "Наголошений склад вимовляємо ___."
        answer: "сильніше"
        options:
          - "сильніше"
          - "у родовому"
          - "як прийменник"
        explanation: "Наголос виділяє склад."
workbook:
  - type: mark-the-words
    title: Знайдіть слова з м'яким приголосним
    instruction: Позначте слова, у яких є м'який приголосний звук.
    text: "день місто люди синє рука мама клас"
    targets:
      - "день"
      - "місто"
      - "люди"
      - "синє"
  - type: error-correction
    title: Виправте фонетичний опис
    instruction: Оберіть правильний опис.
    items:
      - sentence: "Буква - це те, що ми чуємо."
        error: "чуємо"
        correction: "Звук - це те, що ми чуємо; буква - знак на письмі."
        options:
          - "Звук - це те, що ми чуємо; буква - знак на письмі."
          - "Буква і звук завжди однакові."
        explanation: "Письмо і звучання треба розрізняти."
      - sentence: "У слові `день` немає м'якого приголосного."
        error: "немає"
        correction: "У слові `день` є м'який [н']."
        options:
          - "У слові `день` є м'який [н']."
          - "У слові `день` усі звуки голосні."
        explanation: "М'який знак показує м'якість."
      - sentence: "Наголос - це назва відмінка."
        error: "назва відмінка"
        correction: "Наголос - це виділення складу."
        options:
          - "Наголос - це виділення складу."
          - "Наголос - це частина слова без закінчення."
        explanation: "Наголос належить до фонетики."
