inline:
- id: act-1
  type: fill-in
  title: Кому посилка?
  instruction: Оберіть форму давального відмінка.
  items:
  - sentence: "Я пишу ___ листа."
    answer: братові
    options: [брат, брата, братові]
    explanation: Писати кому? - братові.
  - sentence: "Вона дякує ___."
    answer: сестрі
    options: [сестра, сестру, сестрі]
    explanation: Дякувати кому? - сестрі.
  - sentence: "Ми допомагаємо ___."
    answer: дитині
    options: [дитина, дитину, дитині]
    explanation: Допомагати кому? - дитині.
  - sentence: "Учитель показує ___ карту."
    answer: студентові
    options: [студент, студента, студентові]
    explanation: Показувати кому? - студентові.
  - sentence: "Я дзвоню ___."
    answer: подрузі
    options: [подруга, подругу, подрузі]
    explanation: Подруга має чергування г -> з перед -і.
  - sentence: "Мама читає ___ казку."
    answer: синові
    options: [син, сина, синові]
    explanation: Читати кому? - синові.
  - sentence: "Вони пояснили ___ правило."
    answer: вчительці
    options: [вчителька, вчительку, вчительці]
    explanation: Пояснити кому? - вчительці.
  - sentence: "Ми дали назву ___."
    answer: місту
    options: [місто, міста, місту]
    explanation: Дати назву кому? чому? - місту.
  - sentence: "Музей присвятив зал ___."
    answer: героєві
    options: [герой, героя, героєві]
    explanation: Після голосного можлива форма на -єві.
  - sentence: "Я написав ___ коротке повідомлення."
    answer: Марії
    options: [Марія, Марію, Марії]
    explanation: Імена на -ія мають давальний на -ії.
  - sentence: "Медсестра допомогла ___."
    answer: немовляті
    options: [немовля, немовляти, немовляті]
    explanation: Немовля має давальну форму немовляті.
- id: act-2
  type: group-sort
  title: Чоловічий, жіночий, середній
  instruction: Розсортуйте форми давального відмінка за родом.
  groups:
  - label: чоловічий
    items:
    - братові
    - студентові
    - лікареві
    - другові
    - героєві
  - label: жіночий
    items:
    - мамі
    - сестрі
    - подрузі
    - вчительці
    - Марії
    - станції
  - label: середній
    items:
    - місту
    - морю
    - серцю
    - слову
    - немовляті
    - курчаті
- id: act-3
  type: quiz
  title: Чергування перед -і
  instruction: Оберіть правильну форму жіночого роду.
  items:
  - question: "подруга ->"
    options: [подрузі, подругі, подругу]
    correct: 0
    explanation: Г змінюється на з перед -і.
  - question: "книга ->"
    options: [книзі, книгі, книгу]
    correct: 0
    explanation: Г змінюється на з.
  - question: "рука ->"
    options: [руці, рукі, руку]
    correct: 0
    explanation: К змінюється на ц.
  - question: "вчителька ->"
    options: [вчительці, вчителькі, вчительку]
    correct: 0
    explanation: К змінюється на ц перед -і.
  - question: "сестра ->"
    options: [сестрі, сестру, сестра]
    correct: 0
    explanation: Сестра має форму сестрі.
  - question: "мама ->"
    options: [мамі, маму, мами]
    correct: 0
    explanation: Мама має форму мамі.
  - question: "Марія ->"
    options: [Марії, Марію, Марія]
    correct: 0
    explanation: Імена на -ія мають давальний на -ії.
  - question: "станція ->"
    options: [станції, станцію, станція]
    correct: 0
    explanation: "Слова на -ія мають форму на -ії: станції."
- id: act-4
  type: match-up
  title: Дієслово і кому?
  instruction: Зіставте початок речення з природним продовженням.
  pairs:
  - left: подарувати
    right: братові книгу
  - left: показати
    right: студентці карту
  - left: написати
    right: подрузі листа
  - left: пояснити
    right: дитині правило
  - left: відповісти
    right: вчителеві
  - left: подякувати
    right: лікареві
  - left: розповісти
    right: мамі новину
  - left: дати назву
    right: місту
workbook:
- type: true-false
  title: Чи це давальний?
  instruction: Визначте, чи правильно використано давальний відмінок.
  items:
  - statement: "Я допомагаю братові."
    correct: true
    explanation: Допомагати кому? - братові.
  - statement: "Вона дякує сестру."
    correct: false
    explanation: "Потрібно: дякує сестрі."
  - statement: "Ми дзвонимо лікарю."
    correct: true
    explanation: Лікарю - нормальна давальна форма.
  - statement: "Подарунок від друга містить давальний відмінок."
    correct: false
    explanation: Від друга - правильна родова фраза, але не давальний.
  - statement: "Я пишу подрузі."
    correct: true
    explanation: Писати кому? - подрузі.
  - statement: "Вчитель показує студент карта."
    correct: false
    explanation: "Потрібно: студентові карту або студенту карту."
  - statement: "Дитині холодно."
    correct: true
    explanation: Давальний може показувати того, хто відчуває стан.
  - statement: "Ми дали назву місту."
    correct: true
    explanation: Місту - давальний середнього роду.
- type: unjumble
  title: Склади речення
  instruction: Розташуйте слова в природному порядку.
  items:
  - words: [Тетяна, подарувала, братові, книгу]
    answer: "Тетяна подарувала братові книгу."
  - words: [Я, написав, подрузі, листа]
    answer: "Я написав подрузі листа."
  - words: [Вчитель, показав, студентам, карту]
    answer: "Вчитель показав студентам карту."
  - words: [Ми, пояснили, дитині, правило]
    answer: "Ми пояснили дитині правило."
