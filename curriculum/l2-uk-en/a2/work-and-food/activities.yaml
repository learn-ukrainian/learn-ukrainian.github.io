inline:
  - id: act-1
    type: match-up
    title: Питання про роботу
    instruction: З'єднайте питання з природною відповіддю.
    pairs:
      - left: Ким ти працюєш?
        right: Я працюю програмістом.
      - left: Ким вона стала?
        right: Вона стала лікаркою.
      - left: Чим ти цікавишся?
        right: Я цікавлюся фотографією.
      - left: З ким ви працюєте?
        right: Ми працюємо з командою.
  - id: act-2
    type: fill-in
    title: Чим на кухні?
    instruction: Оберіть правильну форму знаряддя.
    items:
      - sentence: "Ріжемо огірок ___."
        answer: ножем
        options:
          - ніж
          - ножем
          - ножа
        explanation: Чим ріжемо? Ножем.
      - sentence: "Мішаємо тісто великою ___."
        answer: ложкою
        options:
          - ложка
          - ложкою
          - ложку
        explanation: Чим мішаємо? Ложкою.
      - sentence: "Посипаємо салат ___."
        answer: сіллю
        options:
          - сіль
          - сіллю
          - солі
        explanation: Чим посипаємо? Сіллю.
      - sentence: "Поливаємо овочі ___."
        answer: олією
        options:
          - олія
          - олію
          - олією
        explanation: Чим поливаємо? Олією.
  - id: act-3
    type: quiz
    title: Яка функція?
    instruction: Визначте функцію орудного відмінка.
    items:
      - question: "Я працюю кухарем."
        options:
          - професія
          - знаряддя
          - місце
        correct: 0
        explanation: Кухарем називає професію.
      - question: "Я їду автобусом."
        options:
          - інгредієнт
          - засіб пересування
          - команда
        correct: 1
        explanation: Автобусом показує засіб.
      - question: "Салат з помідорами."
        options:
          - інгредієнт
          - професія
          - час
        correct: 0
        explanation: Помідори - інгредієнт у салаті.
      - question: "Мій офіс між кафе і аптекою."
        options:
          - місце
          - знаряддя
          - професія
        correct: 0
        explanation: Між кафе і аптекою описує місце.
  - id: act-4
    type: group-sort
    title: Робота чи кухня?
    instruction: Розсортуйте фрази за темою.
    groups:
      - label: Робота
        items:
          - працюю вчителькою
          - з моїми колегами
          - перед нарадою
          - за комп'ютером
      - label: Кухня
        items:
          - ріжу ножем
          - вареники з картоплею
          - посипаю сіллю
          - салат з огірками
workbook:
  - type: true-false
    title: Робочий день
    instruction: Позначте, чи форма орудного відмінка правильна.
    items:
      - statement: "Вона працює лікаркою."
        correct: true
        explanation: Після працює потрібна форма лікаркою.
      - statement: "Я їду на роботу автобус."
        correct: false
        explanation: Потрібно автобусом.
      - statement: "Ми обідаємо з колегами."
        correct: true
        explanation: З ким? З колегами.
      - statement: "Він цікавиться музика."
        correct: false
        explanation: Потрібно музикою.
  - type: error-correction
    title: Виправте рецепт
    instruction: Оберіть правильне речення.
    items:
      - sentence: "Ріжемо овочі ніж."
        error: ніж
        correction: "Ріжемо овочі ножем."
        options:
          - "Ріжемо овочі ножем."
          - "Ріжемо овочі ніж."
        explanation: Чим? Ножем.
      - sentence: "Салат з помідори і огірки."
        error: з помідори і огірки
        correction: "Салат з помідорами і огірками."
        options:
          - "Салат з помідорами і огірками."
          - "Салат з помідори і огірки."
        explanation: Після з потрібен орудний відмінок множини.
      - sentence: "Вареники з картопля."
        error: картопля
        correction: "Вареники з картоплею."
        options:
          - "Вареники з картоплею."
          - "Вареники з картопля."
        explanation: З чим? З картоплею.
