inline:
  - id: act-1
    type: fill-in
    title: Рецепт і форми
    instruction: Доповніть рецепт правильною формою орудного відмінка.
    items:
      - sentence: "Ріжемо огірок ___."
        answer: ножем
        options:
          - ніж
          - ножем
          - ножа
        explanation: Чим ріжемо? Ножем.
      - sentence: "Мішаємо тісто великою ___."
        answer: ложкою
        options:
          - ложка
          - ложкою
          - ложку
        explanation: Чим мішаємо? Ложкою.
      - sentence: "Посипаємо салат ___."
        answer: сіллю
        options:
          - сіль
          - сіллю
          - солі
        explanation: Чим посипаємо? Сіллю.
      - sentence: "Поливаємо овочі ___."
        answer: олією
        options:
          - олія
          - олію
          - олією
        explanation: Чим поливаємо? Олією.
      - sentence: "Їмо салат ___."
        answer: виделкою
        options:
          - виделка
          - виделкою
          - виделку
        explanation: Чим їмо? Виделкою.
      - sentence: "Подаємо борщ ___."
        answer: зі сметаною
        options:
          - зі сметаною
          - сметана
          - сметану
        explanation: З чим подаємо? Зі сметаною.
      - sentence: "Готуємо вареники ___."
        answer: з картоплею
        options:
          - з картопля
          - картоплю
          - з картоплею
        explanation: З чим вареники? З картоплею.
      - sentence: "Салат з ___ і огірками дуже свіжий."
        answer: помідорами
        options:
          - помідор
          - помідорами
          - помідори
        explanation: Після з потрібен орудний відмінок множини.
  - id: act-2
    type: match-up
    title: Питання про роботу
    instruction: З'єднайте питання з природною відповіддю.
    pairs:
      - left: Ким ти працюєш?
        right: Я працюю програмістом.
      - left: Ким вона стала?
        right: Вона стала лікаркою.
      - left: Ким ви працювали раніше?
        right: Я працював кухарем.
      - left: Чим ти цікавишся?
        right: Я цікавлюся фотографією.
      - left: Чим ти захоплюєшся?
        right: Я захоплююся музикою.
      - left: З ким ви працюєте?
        right: Ми працюємо з командою.
      - left: З ким ти маєш нараду?
        right: З начальником і колегами.
      - left: Перед чим ти готуєш звіт?
        right: Перед нарадою.
  - id: act-3
    type: quiz
    title: Яка функція?
    instruction: Визначте функцію орудного відмінка.
    items:
      - question: "Я працюю кухарем."
        options:
          - професія
          - знаряддя
          - місце
        correct: 0
        explanation: Кухарем називає професію.
      - question: "Я їду автобусом."
        options:
          - інгредієнт
          - засіб пересування
          - команда
        correct: 1
        explanation: Автобусом показує засіб пересування.
      - question: "Салат з помідорами."
        options:
          - інгредієнт
          - професія
          - час
        correct: 0
        explanation: Помідори - інгредієнт у салаті.
      - question: "Мій офіс між кафе і аптекою."
        options:
          - місце
          - знаряддя
          - професія
        correct: 0
        explanation: Між кафе і аптекою описує місце.
      - question: "Я ріжу огірок ножем."
        options:
          - знаряддя
          - професія
          - інтерес
        correct: 0
        explanation: Ножем показує знаряддя.
      - question: "Ми обідаємо з колегами."
        options:
          - люди разом
          - транспорт
          - професія
        correct: 0
        explanation: З колегами показує людей поруч.
      - question: "Перед обідом маю нараду."
        options:
          - час
          - інгредієнт
          - знаряддя
        correct: 0
        explanation: Перед обідом називає час.
      - question: "Я цікавлюся українською кухнею."
        options:
          - інтерес
          - місце
          - транспорт
        correct: 0
        explanation: Українською кухнею показує інтерес.
  - id: act-4
    type: true-false
    title: Робочий день
    instruction: Позначте, чи форма орудного відмінка правильна.
    items:
      - statement: "Вона працює лікаркою."
        correct: true
        explanation: Після працює потрібна форма лікаркою.
      - statement: "Я їду на роботу автобус."
        correct: false
        explanation: Потрібно автобусом.
      - statement: "Ми обідаємо з колегами."
        correct: true
        explanation: З ким? З колегами.
      - statement: "Він цікавиться музика."
        correct: false
        explanation: Потрібно музикою.
      - statement: "Ріжемо овочі ножем."
        correct: true
        explanation: Чим ріжемо? Ножем.
      - statement: "Салат з помідори і огірки."
        correct: false
        explanation: Потрібно з помідорами і огірками.
      - statement: "Перед нарадою я п'ю каву."
        correct: true
        explanation: Перед чим? Перед нарадою.
      - statement: "Вареники з картопля дуже смачні."
        correct: false
        explanation: Потрібно з картоплею.
