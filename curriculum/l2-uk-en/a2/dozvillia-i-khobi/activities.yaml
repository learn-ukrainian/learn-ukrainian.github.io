inline:
  - id: act-1
    type: fill-in
    title: Форма після дієслова
    instruction: Оберіть правильну форму для розмови про дозвілля.
    items:
      - sentence: "Я захоплююся (плавання) ___."
        answer: плаванням
        options:
          - плавання
          - плаванням
          - плаванню
        explanation: Захоплюватися чим? - плаванням.
      - sentence: "Вона займається (йога) ___."
        answer: йогою
        options:
          - йога
          - йогою
          - йогу
        explanation: Займатися чим? - йогою.
      - sentence: "Ми цікавимося (музика) ___."
        answer: музикою
        options:
          - музика
          - музику
          - музикою
        explanation: Цікавитися чим? - музикою.
      - sentence: "Він займається (спорт) ___."
        answer: спортом
        options:
          - спорт
          - спортом
          - спорту
        explanation: Займатися чим? - спортом.
      - sentence: "У суботу ми йдемо на (виставка) ___."
        answer: виставку
        options:
          - виставку
          - виставці
          - виставкою
        explanation: Йдемо куди? - на виставку.
      - sentence: "Після обіду зустрінемося на (виставка) ___."
        answer: виставці
        options:
          - виставку
          - виставці
          - виставкою
        explanation: Зустрінемося де? - на виставці.
      - sentence: "Оля грає на (гітара) ___."
        answer: гітарі
        options:
          - гітара
          - гітару
          - гітарі
        explanation: Грати на чому? - на гітарі.
      - sentence: "Ходімо в (кіно) ___ у п'ятницю."
        answer: кіно
        options:
          - кіно
          - кіні
          - кіном
        explanation: "Кіно тут незмінюване: ходімо в кіно."
  - id: act-2
    type: quiz
    title: Куди чи де?
    instruction: Оберіть форму для руху або місця.
    items:
      - question: "Ми йдемо на ___."
        options:
          - виставку
          - виставці
          - виставкою
        correct: 0
        explanation: Йдемо куди? - на виставку.
      - question: "Ми зустрічаємося на ___."
        options:
          - виставку
          - виставці
          - виставкою
        correct: 1
        explanation: Зустрічаємося де? - на виставці.
      - question: "Оля піде в ___."
        options:
          - театр
          - театрі
          - театром
        correct: 0
        explanation: Піде куди? - в театр.
      - question: "Марко плаває в ___."
        options:
          - басейн
          - басейні
          - басейном
        correct: 1
        explanation: Плаває де? - у басейні.
      - question: "Ходімо на ___."
        options:
          - прогулянку
          - прогулянці
          - прогулянкою
        correct: 0
        explanation: Ходімо куди? - на прогулянку.
      - question: "Ми вже на ___."
        options:
          - прогулянку
          - прогулянці
          - прогулянкою
        correct: 1
        explanation: Ми де? - на прогулянці.
      - question: "Вона їде на ___."
        options:
          - змагання
          - змаганні
          - змаганням
        correct: 0
        explanation: Їде куди? - на змагання.
      - question: "Вона вже на ___."
        options:
          - змагання
          - змаганні
          - змаганням
        correct: 1
        explanation: Вона де? - на змаганні.
  - id: act-3
    type: match-up
    title: Дієслово і питання
    instruction: З'єднайте фразу з питанням, яке допомагає вибрати форму.
    pairs:
      - left: захоплюватися плаванням
        right: "чим? орудний"
      - left: займатися спортом
        right: "чим? орудний"
      - left: цікавитися музикою
        right: "чим? орудний"
      - left: грати у футбол
        right: "у що? знахідний"
      - left: грати на гітарі
        right: "на чому? місцевий"
      - left: йти на концерт
        right: "куди? знахідний"
      - left: бути на концерті
        right: "де? місцевий"
      - left: біля входу
        right: "біля чого? родовий"
  - id: act-4
    type: group-sort
    title: Види дозвілля
    instruction: Розсортуйте заняття за категоріями.
    groups:
      - label: Спорт
        items:
          - футбол
          - плавання
      - label: Мистецтво
        items:
          - малювання
          - музика
      - label: На природі
        items:
          - прогулянка
          - садівництво
      - label: У місті
        items:
          - кіно
          - виставка
  - id: act-5
    type: error-correction
    title: Виправте фразу
    instruction: Оберіть правильний варіант речення.
    items:
      - sentence: "Я захоплююся плавання."
        error: плавання
        correction: "Я захоплююся плаванням."
        options:
          - "Я захоплююся плаванням."
          - "Я захоплююся плавання."
        explanation: Захоплюватися чим? - плаванням.
      - sentence: "Вона займається йога."
        error: йога
        correction: "Вона займається йогою."
        options:
          - "Вона займається йогою."
          - "Вона займається йога."
        explanation: Займатися чим? - йогою.
      - sentence: "Ми йдемо на виставці."
        error: виставці
        correction: "Ми йдемо на виставку."
        options:
          - "Ми йдемо на виставку."
          - "Ми йдемо на виставці."
        explanation: Йдемо куди? - на виставку.
      - sentence: "Ми зустрічаємося на виставку."
        error: виставку
        correction: "Ми зустрічаємося на виставці."
        options:
          - "Ми зустрічаємося на виставці."
          - "Ми зустрічаємося на виставку."
        explanation: Зустрічаємося де? - на виставці.
      - sentence: "Оля грає на гітару."
        error: гітару
        correction: "Оля грає на гітарі."
        options:
          - "Оля грає на гітарі."
          - "Оля грає на гітару."
        explanation: Грати на чому? - на гітарі.
      - sentence: "Пограймо у футболі."
        error: футболі
        correction: "Пограймо у футбол."
        options:
          - "Пограймо у футбол."
          - "Пограймо у футболі."
        explanation: Грати у що? - у футбол.
      - sentence: "Ходімо у парк у четвертій."
        error: у четвертій
        correction: "Ходімо в парк о четвертій."
        options:
          - "Ходімо в парк о четвертій."
          - "Ходімо у парк у четвертій."
        explanation: Для часу зустрічі кажемо о четвертій.
      - sentence: "Він цікавиться музика."
        error: музика
        correction: "Він цікавиться музикою."
        options:
          - "Він цікавиться музикою."
          - "Він цікавиться музика."
        explanation: Цікавитися чим? - музикою.
