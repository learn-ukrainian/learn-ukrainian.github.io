inline:
  - id: act-1
    type: match-up
    title: Що керує формою?
    instruction: З'єднайте фразу з питанням, яке допомагає вибрати відмінок.
    pairs:
      - left: захоплююся плаванням
        right: чим?
      - left: іду на виставку
        right: куди?
      - left: я на виставці
        right: де?
      - left: з друзями
        right: з ким?
      - left: біля входу
        right: біля чого?
  - id: act-2
    type: fill-in
    title: Хобі в орудному
    instruction: Оберіть правильну форму після дієслова.
    items:
      - sentence: "Я захоплююся ___."
        answer: фотографією
        options:
          - фотографія
          - фотографію
          - фотографією
        explanation: Захоплюватися чим? - фотографією.
      - sentence: "Вона займається ___."
        answer: йогою
        options:
          - йога
          - йогою
          - йогу
        explanation: Займатися чим? - йогою.
      - sentence: "Ми цікавимося ___."
        answer: музикою
        options:
          - музика
          - музику
          - музикою
        explanation: Цікавитися чим? - музикою.
      - sentence: "Він займається ___."
        answer: спортом
        options:
          - спорт
          - спортом
          - спорту
        explanation: Займатися чим? - спортом.
  - id: act-3
    type: quiz
    title: Куди чи де?
    instruction: Оберіть форму для руху або місця.
    items:
      - question: "Ми йдемо на ___."
        options:
          - виставку
          - виставці
          - виставкою
        correct: 0
        explanation: Йдемо куди? - на виставку.
      - question: "Ми зустрічаємося на ___."
        options:
          - виставку
          - виставці
          - виставкою
        correct: 1
        explanation: Зустрічаємося де? - на виставці.
      - question: "Оля піде в ___."
        options:
          - театр
          - театрі
          - театром
        correct: 0
        explanation: Піде куди? - в театр.
      - question: "Марко плаває в ___."
        options:
          - басейн
          - басейні
          - басейном
        correct: 1
        explanation: Плаває де? - у басейні.
  - id: act-4
    type: group-sort
    title: Моделі дозвілля
    instruction: Розсортуйте фрази за моделлю.
    groups:
      - label: Орудний після захоплюватися / займатися
        items:
          - захоплююся плаванням
          - займаюся малюванням
          - цікавлюся музикою
      - label: Знахідний для напрямку
        items:
          - іду в басейн
          - піду на концерт
          - ходімо на прогулянку
      - label: Місцевий для місця
        items:
          - у басейні
          - на концерті
          - на прогулянці
workbook:
  - type: fill-in
    title: Оберіть форму
    instruction: Доповніть речення правильною формою.
    items:
      - sentence: "Я часто граю у ___."
        answer: теніс
        options:
          - теніс
          - тенісі
          - тенісом
        explanation: Грати у що? - у теніс.
      - sentence: "Моя подруга грає на ___."
        answer: гітарі
        options:
          - гітара
          - гітару
          - гітарі
        explanation: Грати на чому? - на гітарі.
      - sentence: "У суботу ми підемо на ___."
        answer: концерт
        options:
          - концерт
          - концерті
          - концертом
        explanation: Підемо куди? - на концерт.
      - sentence: "Увечері ми будемо на ___."
        answer: концерті
        options:
          - концерт
          - концерті
          - концертом
        explanation: Будемо де? - на концерті.
  - type: error-correction
    title: Виправте фразу
    instruction: Оберіть правильний варіант.
    items:
      - sentence: "Я захоплююся фотографія."
        error: фотографія
        correction: "Я захоплююся фотографією."
        options:
          - "Я захоплююся фотографією."
          - "Я захоплююся фотографія."
        explanation: Захоплюватися чим? - фотографією.
      - sentence: "Ми йдемо на виставці."
        error: виставці
        correction: "Ми йдемо на виставку."
        options:
          - "Ми йдемо на виставку."
          - "Ми йдемо на виставці."
        explanation: Йдемо куди? - на виставку.
      - sentence: "Оля грає на гітару."
        error: гітару
        correction: "Оля грає на гітарі."
        options:
          - "Оля грає на гітарі."
          - "Оля грає на гітару."
        explanation: Грати на чому? - на гітарі.
      - sentence: "Ходімо у парк у четвертій."
        error: у четвертій
        correction: "Ходімо в парк о четвертій."
        options:
          - "Ходімо в парк о четвертій."
          - "Ходімо у парк у четвертій."
        explanation: Для часу зустрічі кажемо о четвертій.
  - type: true-false
    title: Чи природно?
    instruction: Визначте, чи правильно вжито фразу.
    items:
      - statement: "Я займаюся спортом."
        correct: true
        explanation: Займатися чим? - спортом.
      - statement: "Ми будемо на виставку."
        correct: false
        explanation: Будемо де? - на виставці.
      - statement: "Пограймо у футбол."
        correct: true
        explanation: Грати у що? - у футбол.
      - statement: "Вона цікавиться музикою."
        correct: true
        explanation: Цікавитися чим? - музикою.
