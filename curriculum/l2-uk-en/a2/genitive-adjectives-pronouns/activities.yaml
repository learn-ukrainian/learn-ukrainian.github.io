inline:
- id: act-1
  type: fill-in
  title: Якого? Якої?
  instruction: Оберіть правильну форму прикметника.
  items:
  - sentence: без ___ друга
    answer: нового
    options:
    - нового
    - нової
    - новий
    explanation: Друг - чоловічий рід, тому нового друга.
  - sentence: біля ___ школи
    answer: старої
    options:
    - старої
    - старого
    - стара
    explanation: Школа - жіночий рід, тому старої школи.
  - sentence: з ___ міста
    answer: великого
    options:
    - великого
    - великої
    - велике
    explanation: "Місто - середній рід, форма як чоловічий: великого."
  - sentence: для ___ вчительки
    answer: молодої
    options:
    - молодої
    - молодого
    - молода
    explanation: Вчителька - жіночий рід.
  - sentence: до ___ моря
    answer: синього
    options:
    - синього
    - синьої
    - синє
    explanation: Море - середній рід, тому синього моря.
  - sentence: без ___ парасольки
    answer: червоної
    options:
    - червоної
    - червоного
    - червона
    explanation: Парасолька - жіночий рід.
  - sentence: біля ___ будинку
    answer: старого
    options:
    - старого
    - старої
    - старий
    explanation: Будинок - чоловічий рід.
  - sentence: після ___ дня
    answer: важливого
    options:
    - важливого
    - важливої
    - важливий
    explanation: День - чоловічий рід.
- id: act-2
  type: quiz
  title: Мій, моя, наше
  instruction: Оберіть форму присвійного займенника в родовому.
  items:
  - question: без ___ телефона
    options:
    - мого
    - моєї
    - мій
    correct: 0
    explanation: Телефон - чоловічий рід, тому мого.
  - question: для ___ сестри
    options:
    - моєї
    - мого
    - моя
    correct: 0
    explanation: Сестра - жіночий рід, тому моєї.
  - question: біля ___ будинку
    options:
    - нашого
    - нашої
    - наш
    correct: 0
    explanation: Будинок - чоловічий рід.
  - question: до ___ лікарні
    options:
    - вашої
    - вашого
    - ваша
    correct: 0
    explanation: Лікарня - жіночий рід.
  - question: з ___ міста
    options:
    - їхнього
    - їхньої
    - їхня
    correct: 0
    explanation: Місто - середній рід, тому їхнього.
  - question: від ___ квартири
    options:
    - нашої
    - нашого
    - наш
    correct: 0
    explanation: Квартира - жіночий рід.
  - question: без ___ дозволу
    options:
    - твого
    - твоєї
    - твій
    correct: 0
    explanation: Дозвіл - чоловічий рід.
  - question: біля ___ школи
    options:
    - її
    - його
    - їй
    correct: 0
    explanation: Її як присвійне слово не змінюється.
- id: act-3
  type: match-up
  title: Називний і родовий
  instruction: Зіставте фразу в називному з родовою фразою.
  pairs:
  - left: цей новий ринок
    right: біля цього нового ринку
  - left: ця стара школа
    right: біля цієї старої школи
  - left: мій молодший брат
    right: для мого молодшого брата
  - left: моя старша сестра
    right: для моєї старшої сестри
  - left: той важливий документ
    right: без того важливого документа
  - left: та червона сумка
    right: без тієї червоної сумки
  - left: наше нове місто
    right: з нашого нового міста
  - left: ваша нова лікарня
    right: до вашої нової лікарні
- id: act-4
  type: group-sort
  title: Чоловічий/середній чи жіночий?
  instruction: Розсортуйте родові фрази за формою означення.
  groups:
  - label: -ого
    items:
    - нового друга
    - старого будинку
    - мого брата
    - цього міста
  - label: -ої
    items:
    - нової книги
    - старої школи
    - моєї сестри
    - цієї парасольки
  - label: -ього/-ьої
    items:
    - синього моря
    - синьої сукні
    - давнього міста
    - давньої історії
workbook:
- type: true-false
  title: Чи є узгодження?
  instruction: Позначте, чи фраза правильна.
  items:
  - statement: без нового друга
    correct: true
    explanation: Друг - чоловічий рід, нового друга.
  - statement: без нової друга
    correct: false
    explanation: Потрібно нового друга.
  - statement: біля цієї школи
    correct: true
    explanation: Школа - жіночий рід.
  - statement: біля цього школи
    correct: false
    explanation: Потрібно цієї школи.
  - statement: для мого брата
    correct: true
    explanation: Брат - чоловічий рід.
  - statement: для моєї брата
    correct: false
    explanation: Потрібно мого брата.
  - statement: з нашого міста
    correct: true
    explanation: Місто має форму нашого.
  - statement: без тієї книги
    correct: true
    explanation: Книга - жіночий рід.
- type: fill-in
  title: Повна фраза
  instruction: Оберіть правильну повну фразу.
  items:
  - sentence: Я не бачу ___.
    answer: мого чорного рюкзака
    options:
    - мого чорного рюкзака
    - моєї чорної рюкзака
    - мій чорний рюкзак
    explanation: "Рюкзак - чоловічий рід, родовий: мого чорного рюкзака."
  - sentence: Ключі від ___.
    answer: нашої квартири
    options:
    - нашої квартири
    - нашого квартири
    - наша квартира
    explanation: Квартира - жіночий рід.
  - sentence: Ми стоїмо біля ___.
    answer: цього нового ринку
    options:
    - цього нового ринку
    - цієї нового ринку
    - цей новий ринок
    explanation: Ринок - чоловічий рід.
  - sentence: Вона без ___.
    answer: цієї червоної парасольки
    options:
    - цієї червоної парасольки
    - цього червоного парасольки
    - ця червона парасолька
    explanation: Парасолька - жіночий рід.
  - sentence: Це документи ___.
    answer: мого старшого брата
    options:
    - мого старшого брата
    - моєї старшої брата
    - мій старший брат
    explanation: Брат - чоловічий рід.
  - sentence: Ми йдемо до ___.
    answer: вашої нової лікарні
    options:
    - вашої нової лікарні
    - вашого нового лікарні
    - ваша нова лікарня
    explanation: Лікарня - жіночий рід.
  - sentence: Вони повертаються з ___.
    answer: їхнього великого міста
    options:
    - їхнього великого міста
    - їхньої великої міста
    - їхнє велике місто
    explanation: Місто - середній рід, форма їхнього великого.
  - sentence: Немає ___.
    answer: того важливого документа
    options:
    - того важливого документа
    - тієї важливої документа
    - той важливий документ
    explanation: Документ - чоловічий рід.
