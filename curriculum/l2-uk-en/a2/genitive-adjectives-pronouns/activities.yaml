inline:
- id: act-1
  type: fill-in
  title: Якого? Якої?
  instruction: Оберіть правильну форму прикметника.
  items:
  - sentence: без ___ друга
    answer: нового
    options:
    - нового
    - нової
    - новий
    explanation: Друг - чоловічий рід, тому нового друга.
  - sentence: біля ___ школи
    answer: старої
    options:
    - старої
    - старого
    - стара
    explanation: Школа - жіночий рід, тому старої школи.
  - sentence: з ___ міста
    answer: великого
    options:
    - великого
    - великої
    - велике
    explanation: "Місто - середній рід, форма як чоловічий: великого."
  - sentence: для ___ вчительки
    answer: молодої
    options:
    - молодої
    - молодого
    - молода
    explanation: Вчителька - жіночий рід.
  - sentence: до ___ моря
    answer: синього
    options:
    - синього
    - синьої
    - синє
    explanation: Море - середній рід, тому синього моря.
  - sentence: без ___ парасольки
    answer: червоної
    options:
    - червоної
    - червоного
    - червона
    explanation: Парасолька - жіночий рід.
  - sentence: біля ___ будинку
    answer: старого
    options:
    - старого
    - старої
    - старий
    explanation: Будинок - чоловічий рід.
  - sentence: після ___ дня
    answer: важливого
    options:
    - важливого
    - важливої
    - важливий
    explanation: День - чоловічий рід.
- id: act-2
  type: quiz
  title: Мій, моя, наше
  instruction: Оберіть форму присвійного займенника в родовому.
  items:
  - question: без ___ телефона
    options:
    - мого
    - моєї
    - мій
    correct: 0
    explanation: Телефон - чоловічий рід, тому мого.
  - question: для ___ сестри
    options:
    - моєї
    - мого
    - моя
    correct: 0
    explanation: Сестра - жіночий рід, тому моєї.
  - question: біля ___ будинку
    options:
    - нашого
    - нашої
    - наш
    correct: 0
    explanation: Будинок - чоловічий рід.
  - question: до ___ лікарні
    options:
    - вашої
    - вашого
    - ваша
    correct: 0
    explanation: Лікарня - жіночий рід.
  - question: з ___ міста
    options:
    - їхнього
    - їхньої
    - їхня
    correct: 0
    explanation: Місто - середній рід, тому їхнього.
  - question: від ___ квартири
    options:
    - нашої
    - нашого
    - наш
    correct: 0
    explanation: Квартира - жіночий рід.
  - question: без ___ дозволу
    options:
    - твого
    - твоєї
    - твій
    correct: 0
    explanation: Дозвіл - чоловічий рід.
  - question: біля ___ школи
    options:
    - її
    - його
    - їй
    correct: 0
    explanation: Її як присвійне слово не змінюється.
- id: act-3
  type: match-up
  title: Називний і родовий
  instruction: Зіставте фразу в називному з родовою фразою.
  pairs:
  - left: цей новий ринок
    right: біля цього нового ринку
  - left: ця стара школа
    right: біля цієї старої школи
  - left: мій молодший брат
    right: для мого молодшого брата
  - left: моя старша сестра
    right: для моєї старшої сестри
  - left: той важливий документ
    right: без того важливого документа
  - left: та червона сумка
    right: без тієї червоної сумки
  - left: наше нове місто
    right: з нашого нового міста
  - left: ваша нова лікарня
    right: до вашої нової лікарні
- id: act-4
  type: group-sort
  title: Чоловічий/середній чи жіночий?
  instruction: Розсортуйте родові фрази за формою означення.
  groups:
  - label: чол./сер.
    items:
    - нового друга
    - старого будинку
    - мого брата
    - цього міста
  - label: жін.
    items:
    - нової книги
    - старої школи
    - моєї сестри
    - цієї парасольки
  - label: м'яка модель
    items:
    - синього моря
    - синьої сукні
    - давнього міста
    - давньої історії
workbook:
- type: true-false
  title: Чи є узгодження?
  instruction: Позначте, чи фраза правильна.
  items:
  - statement: без нового друга
    correct: true
    explanation: Друг - чоловічий рід, нового друга.
  - statement: без нової друга
    correct: false
    explanation: Потрібно нового друга.
  - statement: біля цієї школи
    correct: true
    explanation: Школа - жіночий рід.
  - statement: біля цього школи
    correct: false
    explanation: Потрібно цієї школи.
  - statement: для мого брата
    correct: true
    explanation: Брат - чоловічий рід.
  - statement: для моєї брата
    correct: false
    explanation: Потрібно мого брата.
  - statement: з нашого міста
    correct: true
    explanation: Місто має форму нашого.
  - statement: без тієї книги
    correct: true
    explanation: Книга - жіночий рід.
- type: fill-in
  title: Повна фраза
  instruction: Оберіть правильну повну фразу.
  items:
  - sentence: Я не бачу ___.
    answer: мого чорного рюкзака
    options:
    - мого чорного рюкзака
    - моєї чорної рюкзака
    - мій чорний рюкзак
    explanation: "Рюкзак - чоловічий рід, родовий: мого чорного рюкзака."
  - sentence: Ключі від ___.
    answer: нашої квартири
    options:
    - нашої квартири
    - нашого квартири
    - наша квартира
    explanation: Квартира - жіночий рід.
  - sentence: Ми стоїмо біля ___.
    answer: цього нового ринку
    options:
    - цього нового ринку
    - цієї нового ринку
    - цей новий ринок
    explanation: Ринок - чоловічий рід.
  - sentence: Вона без ___.
    answer: цієї червоної парасольки
    options:
    - цієї червоної парасольки
    - цього червоного парасольки
    - ця червона парасолька
    explanation: Парасолька - жіночий рід.
  - sentence: Це документи ___.
    answer: мого старшого брата
    options:
    - мого старшого брата
    - моєї старшої брата
    - мій старший брат
    explanation: Брат - чоловічий рід.
  - sentence: Ми йдемо до ___.
    answer: вашої нової лікарні
    options:
    - вашої нової лікарні
    - вашого нового лікарні
    - ваша нова лікарня
    explanation: Лікарня - жіночий рід.
  - sentence: Вони повертаються з ___.
    answer: їхнього великого міста
    options:
    - їхнього великого міста
    - їхньої великої міста
    - їхнє велике місто
    explanation: Місто - середній рід, форма їхнього великого.
  - sentence: Немає ___.
    answer: того важливого документа
    options:
    - того важливого документа
    - тієї важливої документа
    - той важливий документ
    explanation: Документ - чоловічий рід.
- type: error-correction
  title: Виправте узгодження
  instruction: Оберіть правильну родову фразу.
  items:
  - sentence: без нової друга
    error: нової
    correction: без нового друга
    options:
    - без нового друга
    - без нової друга
    explanation: Друг - чоловічий рід, тому нового.
  - sentence: біля цього школи
    error: цього
    correction: біля цієї школи
    options:
    - біля цієї школи
    - біля цього школи
    explanation: Школа - жіночий рід, тому цієї.
  - sentence: для моєї брата
    error: моєї
    correction: для мого брата
    options:
    - для мого брата
    - для моєї брата
    explanation: Брат - чоловічий рід, тому мого.
  - sentence: з нашої міста
    error: нашої
    correction: з нашого міста
    options:
    - з нашого міста
    - з нашої міста
    explanation: Місто - середній рід, форма як чоловічий.
  - sentence: без цього книги
    error: цього
    correction: без цієї книги
    options:
    - без цієї книги
    - без цього книги
    explanation: Книга - жіночий рід, тому цієї.
  - sentence: до вашого лікарні
    error: вашого
    correction: до вашої лікарні
    options:
    - до вашої лікарні
    - до вашого лікарні
    explanation: Лікарня - жіночий рід.
  - sentence: без синьої моря
    error: синьої
    correction: без синього моря
    options:
    - без синього моря
    - без синьої моря
    explanation: Море - середній рід, тому синього.
  - sentence: біля тієї будинку
    error: тієї
    correction: біля того будинку
    options:
    - біля того будинку
    - біля тієї будинку
    explanation: Будинок - чоловічий рід, тому того.
- type: match-up
  title: Знайдіть пару
  instruction: Зіставте коротку підказку з правильною фразою.
  pairs:
  - left: мій брат
    right: для мого брата
  - left: моя сестра
    right: для моєї сестри
  - left: цей ринок
    right: біля цього ринку
  - left: ця школа
    right: біля цієї школи
  - left: наше місто
    right: з нашого міста
  - left: наша квартира
    right: від нашої квартири
  - left: синє море
    right: до синього моря
  - left: синя сукня
    right: без синьої сукні
- type: unjumble
  title: Складіть родову фразу
  instruction: Поставте слова в природний порядок.
  items:
  - words:
    - без
    - мого
    - нового
    - телефона
    answer: без мого нового телефона
  - words:
    - біля
    - цієї
    - старої
    - школи
    answer: біля цієї старої школи
  - words:
    - для
    - моєї
    - молодшої
    - сестри
    answer: для моєї молодшої сестри
  - words:
    - з
    - нашого
    - великого
    - міста
    answer: з нашого великого міста
  - words:
    - без
    - того
    - важливого
    - документа
    answer: без того важливого документа
  - words:
    - до
    - вашої
    - нової
    - лікарні
    answer: до вашої нової лікарні
  - words:
    - біля
    - цього
    - нового
    - ринку
    answer: біля цього нового ринку
  - words:
    - від
    - нашої
    - старої
    - квартири
    answer: від нашої старої квартири
- type: quiz
  title: Крок за кроком
  instruction: Оберіть правильний наступний крок для фрази.
  items:
  - question: "цей новий ринок → біля ..."
    options:
    - цього нового ринку
    - цієї нової ринку
    - цей новий ринок
    correct: 0
    explanation: Ринок - чоловічий рід, тому цього нового.
  - question: "ця стара школа → біля ..."
    options:
    - цієї старої школи
    - цього старого школи
    - ця стара школа
    correct: 0
    explanation: Школа - жіночий рід.
  - question: "моє нове місто → з ..."
    options:
    - мого нового міста
    - моєї нової міста
    - моє нове місто
    correct: 0
    explanation: Місто - середній рід, форма мого нового.
  - question: "мій старший брат → для ..."
    options:
    - мого старшого брата
    - моєї старшої брата
    - мій старший брат
    correct: 0
    explanation: Брат - чоловічий рід.
  - question: "моя молодша сестра → для ..."
    options:
    - моєї молодшої сестри
    - мого молодшого сестри
    - моя молодша сестра
    correct: 0
    explanation: Сестра - жіночий рід.
  - question: "той важливий документ → без ..."
    options:
    - того важливого документа
    - тієї важливої документа
    - той важливий документ
    correct: 0
    explanation: Документ - чоловічий рід.
  - question: "та червона парасолька → без ..."
    options:
    - тієї червоної парасольки
    - того червоного парасольки
    - та червона парасолька
    correct: 0
    explanation: Парасолька - жіночий рід.
  - question: "їхній новий офіс → біля ..."
    options:
    - їхнього нового офісу
    - їхньої нової офісу
    - їхній новий офіс
    correct: 0
    explanation: Їхній змінюється як прикметник.
