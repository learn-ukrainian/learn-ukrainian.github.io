inline:
  - id: act-1
    type: group-sort
    title: Категорії дієслів
    instruction: Розподіліть форми за категоріями.
    groups:
      - label: "минулий час недоконаного виду"
        items:
          - "писав листа"
          - "довго готувала"
          - "щодня ходили"
      - label: "минулий час доконаного виду"
        items:
          - "написав листа"
          - "приготувала обід"
          - "пішли до музею"
      - label: "доконаний майбутній"
        items:
          - "напишу відповідь"
          - "купимо квитки"
          - "поїдемо завтра"
      - label: "складений майбутній"
        items:
          - "буду писати відповідь"
          - "будемо ходити центром"
          - "буде готувати вечерю"
      - label: "наказовий спосіб"
        items:
          - "читай"
          - "читаймо"
          - "хай прочитає"
  - id: act-2
    type: fill-in
    title: Змішане тренування
    instruction: Оберіть форму, яка відповідає змісту речення.
    items:
      - sentence: "Учора я довго ___ листа."
        answer: "писав"
        options:
          - "писав"
          - "написав"
        explanation: "Довго показує процес."
      - sentence: "Нарешті я ___ листа і відправив його."
        answer: "написав"
        options:
          - "писав"
          - "написав"
        explanation: "Нарешті і відправив показують результат."
      - sentence: "Завтра ми ___ квитки до Львова."
        answer: "купимо"
        options:
          - "будемо купити"
          - "купимо"
        explanation: "Купити - доконаний вид, тому майбутній час має одну форму."
      - sentence: "Увечері ми дві години ___ план подорожі."
        answer: "будемо писати"
        options:
          - "напишемо"
          - "будемо писати"
        explanation: "Дві години показує процес."
      - sentence: "Зараз я ___ до зупинки."
        answer: "іду"
        options:
          - "іду"
          - "ходжу"
        explanation: "Зараз і в один бік: іду."
      - sentence: "Щосуботи ми ___ на ринок."
        answer: "ходимо"
        options:
          - "ідемо"
          - "ходимо"
        explanation: "Щосуботи показує звичку."
      - sentence: "Минулого літа ми ___ до Карпат і повернулися додому."
        answer: "їздили"
        options:
          - "поїхали"
          - "їздили"
        explanation: "Їздили часто означає поїздку туди й назад."
      - sentence: "Після уроку ___ цю вправу вдома."
        answer: "повторіть"
        options:
          - "повторіть"
          - "будете повторити"
        explanation: "Це ввічлива порада або прохання."
      - sentence: "___ до кафе після заняття."
        answer: "Ходімо"
        options:
          - "Ходімо"
          - "Ходимо"
        explanation: "Ходімо - форма запрошення."
      - sentence: "Марку, ___ уважним на дорозі."
        answer: "будь"
        options:
          - "будь"
          - "є"
        explanation: "Для побажання потрібна форма будь."
  - id: act-3
    type: quiz
    title: Оберіть природне речення
    instruction: Виберіть варіант, який краще відповідає ситуації.
    items:
      - question: "Повторювана дія щодня."
        options:
          - "Щодня він робив вправи."
          - "Щодня він зробив вправи."
          - "Щодня він зробить вправи вчора."
        correct: 0
        explanation: "Щодня вимагає недоконаного виду."
      - question: "Готовий результат у минулому."
        options:
          - "Вона написала листа і відправила його."
          - "Вона писала листа і відправила його вже."
          - "Вона буде написати листа."
        correct: 0
        explanation: "Написала називає готовий лист."
      - question: "Доконаний майбутній."
        options:
          - "Завтра я напишу відповідь."
          - "Завтра я буду написати відповідь."
          - "Завтра я писав відповідь."
        correct: 0
        explanation: "Доконаний вид у майбутньому без буду."
      - question: "Майбутній процес."
        options:
          - "Увечері я буду читати статтю."
          - "Увечері я прочитаю статтю дві години."
          - "Увечері я читав статтю завтра."
        correct: 0
        explanation: "Буду читати називає заняття."
      - question: "Рух зараз транспортом."
        options:
          - "Зараз ми їдемо до вокзалу."
          - "Зараз ми їздимо до вокзалу щоліта."
          - "Зараз ми ходимо потягом."
        correct: 0
        explanation: "Зараз і транспортом: їдемо."
      - question: "Регулярні поїздки."
        options:
          - "Влітку ми часто їздимо до Одеси."
          - "Влітку ми часто їдемо до Одеси зараз."
          - "Влітку ми часто поїхали до Одеси."
        correct: 0
        explanation: "Часто показує повторення."
      - question: "Запрошення групі."
        options:
          - "Читаймо текст разом."
          - "Читаємо текст разом учора."
          - "Хай ми читати текст."
        correct: 0
        explanation: "Форма на -мо підходить для пропозиції."
      - question: "Третя особа в наказовому способі."
        options:
          - "Хай вона подзвонить після уроку."
          - "Хай вона подзвонити після уроку."
          - "Вона хай подзвонила після уроку."
        correct: 0
        explanation: "Хай + особова форма."
      - question: "Побажання одній людині."
        options:
          - "Оленко, будь щасливою."
          - "Олена, будь щаслива завтра."
          - "Оленко, є щасливою."
        correct: 0
        explanation: "Звертання + будь + орудний відмінок."
      - question: "Очікування транспорту."
        options:
          - "Ми чекали на автобус."
          - "Ми чекали автобус."
          - "Ми чекали до автобус."
        correct: 0
        explanation: "Стандартна модель: чекати на."
  - id: act-4
    type: error-correction
    title: Виправте дієслівну помилку
    instruction: Оберіть кращий варіант і прочитайте пояснення.
    items:
      - sentence: "Я буду написати листа."
        error: "буду написати"
        correction: "Я напишу листа."
        options:
          - "Я напишу листа."
          - "Я буду написати листа."
        explanation: "Написати - доконаний вид."
      - sentence: "Вона довго приготувала суп."
        error: "приготувала"
        correction: "Вона довго готувала суп."
        options:
          - "Вона довго готувала суп."
          - "Вона довго приготувала суп."
        explanation: "Довго показує процес."
      - sentence: "Ми їдемо до школи щодня."
        error: "їдемо"
        correction: "Ми їздимо до школи щодня."
        options:
          - "Ми їздимо до школи щодня."
          - "Ми їдемо до школи щодня."
        explanation: "Щодня показує регулярний рух транспортом."
      - sentence: "Зараз я ходжу додому."
        error: "ходжу"
        correction: "Зараз я іду додому."
        options:
          - "Зараз я іду додому."
          - "Зараз я ходжу додому."
        explanation: "Зараз в один бік: іду."
      - sentence: "Ми ходили до Львова потягом."
        error: "ходили"
        correction: "Ми їздили до Львова потягом."
        options:
          - "Ми їздили до Львова потягом."
          - "Ми ходили до Львова потягом."
        explanation: "Потягом вимагає їхати / їздити."
      - sentence: "Хай вони читати інструкцію."
        error: "читати"
        correction: "Хай вони читають інструкцію."
        options:
          - "Хай вони читають інструкцію."
          - "Хай вони читати інструкцію."
        explanation: "Хай + особова форма."
      - sentence: "Ми читаємо текст разом! Це пропозиція."
        error: "читаємо"
        correction: "Читаймо текст разом!"
        options:
          - "Читаймо текст разом!"
          - "Ми читаємо текст разом!"
        explanation: "Для пропозиції групі потрібна форма на -мо."
      - sentence: "Марія, будь щасливий."
        error: "Марія / щасливий"
        correction: "Маріє, будь щасливою."
        options:
          - "Маріє, будь щасливою."
          - "Марія, будь щасливий."
        explanation: "Потрібне звертання і форма орудного відмінка."
      - sentence: "Поки я написав листа, задзвонив телефон."
        error: "написав"
        correction: "Поки я писав листа, задзвонив телефон."
        options:
          - "Поки я писав листа, задзвонив телефон."
          - "Поки я написав листа, задзвонив телефон."
        explanation: "Поки показує фоновий процес."
      - sentence: "Ми поїхали автобусом по місту дві години."
        error: "поїхали"
        correction: "Ми дві години їздили автобусом містом."
        options:
          - "Ми дві години їздили автобусом містом."
          - "Ми поїхали автобусом по місту дві години."
        explanation: "Дві години різними місцями транспортом: їздили автобусом містом."
workbook:
  - type: fill-in
    title: Історія з пропусками
    instruction: Доповніть історію правильними дієслівними формами.
    items:
      - sentence: "Минулої суботи ми ___ до Полтави і повернулися ввечері."
        answer: "їздили"
        options:
          - "їхали"
          - "їздили"
        explanation: "Поїздка туди й назад."
      - sentence: "У дорозі ми ___ музику і ___ у вікно."
        answer: "слухали / дивилися"
        options:
          - "послухали / подивилися"
          - "слухали / дивилися"
        explanation: "Це фон у дорозі."
      - sentence: "Потім ми ___ до музею."
        answer: "пішли"
        options:
          - "пішли"
          - "ходили щодня"
        explanation: "Один крок у напрямку."
      - sentence: "У музеї ми ___ екскурсію."
        answer: "слухали"
        options:
          - "слухали"
          - "послухали й ще слухали"
        explanation: "Тут природно назвати процес."
      - sentence: "Після екскурсії я ___ листівку."
        answer: "купив"
        options:
          - "купував"
          - "купив"
        explanation: "Листівка стала результатом."
      - sentence: "Завтра я ___ короткий текст про цю поїздку."
        answer: "напишу"
        options:
          - "буду написати"
          - "напишу"
        explanation: "Готовий текст: доконаний майбутній."
      - sentence: "Увечері я ___ фотографії."
        answer: "буду переглядати"
        options:
          - "буду переглядати"
          - "перегляну дві години"
        explanation: "Тут ідеться про заняття."
      - sentence: "Друзі, ___ мої нотатки."
        answer: "прочитайте"
        options:
          - "прочитайте"
          - "будете прочитати"
        explanation: "Це прохання до групи."
  - type: match-up
    title: Рух і прийменник
    instruction: З'єднайте початок маршруту з правильним прийменником і формою місця.
    pairs:
      - left: "іду ___ школи (звідки?)"
        right: "зі школи"
      - left: "їду ___ Львова (куди?)"
        right: "до Львова"
      - left: "іду ___ роботу (куди?)"
        right: "на роботу"
      - left: "їду ___ вокзал (куди?)"
        right: "на вокзал"
      - left: "йду ___ парк (яким шляхом?)"
        right: "через парк"
      - left: "повертаюся ___ магазину (звідки?)"
        right: "з магазину"
      - left: "ходжу ___ школи щодня (куди?)"
        right: "до школи"
      - left: "їздимо ___ море влітку (куди?)"
        right: "на море"
  - type: true-false
    title: Самоперевірка
    instruction: Позначте, чи правильне твердження.
    items:
      - statement: "Недоконаний вид часто показує процес або звичку."
        correct: true
        explanation: "Писав, готувала, ходили."
      - statement: "Доконаний вид часто показує готовий результат."
        correct: true
        explanation: "Написав, приготувала, купили."
      - statement: "Буду написати - стандартна форма майбутнього часу."
        correct: false
        explanation: "Краще: напишу."
      - statement: "Зараз я іду означає рух в один бік у цей момент."
        correct: true
        explanation: "Це односпрямований рух пішки."
      - statement: "Щодня я їду на роботу краще за щодня я їжджу на роботу."
        correct: false
        explanation: "Щодня показує повторення: їжджу."
      - statement: "Читаймо - це пропозиція групі."
        correct: true
        explanation: "Форма на -мо."
      - statement: "Хай вона прочитає - правильна модель третьої особи."
        correct: true
        explanation: "Хай + особова форма."
      - statement: "Оленко, будь щасливою має звертання й орудний відмінок."
        correct: true
        explanation: "Це модель побажання."
  - type: order
    title: Порядок короткої відповіді
    instruction: Поставте речення в природний порядок.
    items:
      - "Минулої неділі ми їздили до Черкас."
      - "У дорозі ми слухали музику."
      - "Потім приїхали до центру і пішли до музею."
      - "Завтра я напишу короткий звіт."
      - "Друзі, прочитайте мої нотатки."
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
