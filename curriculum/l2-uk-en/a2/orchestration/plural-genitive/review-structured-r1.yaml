findings:
- dimension: Pedagogical quality
  severity: critical
  location: '`Наприклад, якщо ми заберемо останню літеру у слові «сестра», ми отримаємо
    складне закінчення «-стр».`'
  issue: The text wrongly calls "-стр" an "закінчення" (ending). It is a consonant
    cluster at the end of the stem; the grammatical ending itself is zero, as the
    text correctly explains just sentences prior. Calling it an ending is factually
    incorrect and confusing.
  fix: "```yaml\n- find: \"ми отримаємо складне закінчення «-стр».\"\n  replace: \"\
    ми отримаємо складне скупчення приголосних «-стр».\""
- dimension: Linguistic accuracy
  severity: minor
  location: '`У цьому будинку багато вікон (windows), але мало дверей (doors) відкриті
    для туристів.`'
  issue: When "мало" functions as the subject, the predicate should take the impersonal/neuter
    singular form ("відкрито"), not plural ("відкриті"), particularly with short passive
    participles.
  fix: "```yaml\n- find: \"але мало дверей (doors) відкриті для туристів.\"\n  replace:\
    \ \"але мало дверей (doors) відкрито для туристів.\""
