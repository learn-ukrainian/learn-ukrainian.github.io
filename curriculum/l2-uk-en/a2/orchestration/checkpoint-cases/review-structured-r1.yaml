- dimension: 5
  name: Exercise quality
  score: 5
  evidence: The marker IDs match the plan, but Part 1 lacks concrete item sets, Exercise
    5 has no short text, and Exercise 8 has no actual blanked dialogue.
- dimension: 6
  name: Engagement & tone
  score: 7
  evidence: The teacherly tone is generally fine, but lines like `You must memorize
    these completely because you will use them every single day` and `Practice is
    the only way to build this fluency` add filler rat
- dimension: 7
  name: Structural integrity
  score: 8
