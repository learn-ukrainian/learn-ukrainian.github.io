vocabulary_hints:
  required:
  - дерев'яний (wooden) — дерев'яний стіл, дерев'яний будинок
  - скляний (glass adj.) — скляна пляшка, скляний посуд
  - залізний (iron adj.) — залізні двері, залізний характер (idiom)
  - київський (Kyiv adj.) — київський торт, Київська Русь
  - львівський (Lviv adj.) — львівська кава, львівський сирник
  - домашній (home/domestic) — домашнє завдання, домашня тварина
  - вовняний (woolen) — вовняний светр, вовняна ковдра
  recommended:
  - осика (aspen) — traditional wood for Yavoriv toys
  - ліжник (lizhnyk) — Hutsul woven blanket
