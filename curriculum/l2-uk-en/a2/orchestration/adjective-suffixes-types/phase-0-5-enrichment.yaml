content_outline:
- points:
  - 'From Nouns to Identity: The magic of the material bridge — introduce core suffixes
    -ськ- and -н- aligned with State Standard §4.2.1.2'
  - 'Why ''wooden'' is more than a word in Ukrainian — use high-frequency example
    «дерев''яний» to illustrate the concept; collocations: дерев''яний стіл, дерев''яний
    будинок'
  section: Introduction / Вступ
- points:
  - '''The Materialist Logic: -Ов- (Standard) vs -Ян- (Natural/Traditional)'' — explicit
    heuristic: -ян- for natural/traditional materials (вовняний, дерев''яний) vs -ов-
    for standard/processed (металевий, пластиковий); learner error: stress-dependent
    confusion between -ов- and -ев- (дубовий vs польовий)'
  - '''The Geography of Suffixes: -Ськ- and its many faces'' — key geographic adjectives:
    київський, львівський, український; cultural context: Київська Русь, львівська
    ґвара'
  - '''Consonant Mutations: Crossing the bridge from Prague to Odesa'' — focus on
    the ''Big Three'' mutations (к/ч/ц -> цьк, г/ж/з -> зьк, х/ш/с -> ськ); mnemonic
    anchor: Прага -> Празький; learner error: mutation failure (e.g., *Прагський*
    instead of Празький)'
  - '''Abstract Logic: -Ічн- vs -Н-'' — highlight «домашній» (very high frequency)
    as prime example for -н-; collocations: домашнє завдання, домашній затишок'
  - '''Prefix-Suffix Combinations (Intro): Настільний, Підземний'' — brief introduction
    to simultaneous derivation'
  section: Presentation / Презентація
- points:
  - 'Material conversion drills — focus on converting nouns to adjectives: скло ->
    скляний (скляна пляшка), залізо -> залізний (залізні двері)'
  - City-to-Adjective mutation challenge — targeted drills on the k->ts, h->z, kh->s
    patterns; emphasize the г/ж/з -> зьк mutation using Prague example
  section: Practice / Практика
- points:
  - 'At the handicraft fair: Discussing wooden toys and woolen shawls — cultural hook:
    context of «яворівська забавка» (wooden toy made of aspen/осика) and «гуцульський
    ліжник» (woolen blanket with ''biting'' texture)'
  section: Dialogues / Діалоги
vocabulary_hints:
  recommended:
  - осика (aspen) — traditional wood for Yavoriv toys, believed to drive away evil
  - ліжник (lizhnyk) — Hutsul woven blanket made of sheep's wool, famous for therapeutic
    'biting' texture
  required:
  - дерев'яний (wooden) — дерев'яний стіл, дерев'яний будинок, дерев'яна ложка
  - скляний (glass adj.) — скляна пляшка, скляний посуд, скляні двері
  - залізний (iron adj.) — залізні двері, залізний характер (idiom), залізниця
  - київський (Kyiv adj.) — київський торт, київський князь, Київська Русь
  - львівський (Lviv adj.) — львівська кава, львівський сирник, львівська ґвара
  - домашній (home/domestic) — домашнє завдання, домашня тварина, домашній затишок
  - вовняний (woolen) — вовняний светр, вовняна ковдра, вовняні шкарпетки
