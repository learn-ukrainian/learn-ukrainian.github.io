- dimension: 2
  name: Linguistic accuracy
  score: 8
  evidence: Incorrectly teaches that the Genitive of "телефон" is "телефона" (`**Якого**
    телефона?`). The standard Genitive singular form is "телефону".
- dimension: 3
  name: Pedagogical quality
  score: 6
  evidence: 'Contains a critical pedagogical trap: the writer conflated the masculine
    animate Accusative case (which looks exactly like the Genitive) with true Genitive
    constructions. Teaching "Що ти знаєш про тог'
