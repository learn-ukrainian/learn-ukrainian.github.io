content_outline:
- points:
  - 'Health as wealth: Social etiquette of symptoms — cultural hook: calling a doctor
    to home remains deeply rooted, especially for children'
  - 'Navigating the Ukrainian ''Poliklinika'' — cultural hook: distinction between
    Poliklinika (outpatient checkups) and Likarnia (inpatient/surgery)'
  section: Introduction / Вступ
- points:
  - 'The Complaint: У мене болить (Singular) vs Болять (Plural) — learner error: confusing
    ''боліти'' (to hurt) and ''хворіти'' (to be sick); learner error: subject-verb
    agreement (У мене болить ноги vs болять ноги)'
  - 'Symptoms & Conditions: Температура, Кашель, Нежить — collocations: висока температура,
    сильний кашель, засоби від нежитю'
  - 'The Body Parts: A map of human anatomy — builds on A1-body-parts basics'
  - 'At the Pharmacy (Аптека): Asking for help — collocations: цілодобова аптека,
    купити в аптеці'
  - 'Medical Imperatives: Дихайте, Відкрийте рот — standard alignment: §4.2.3.2 Forms
    of 2nd/3rd person imperative'
  - 'Traditional Remedies: Malyna, Garlic, and Mustard Plasters — cultural hook: raspberry
    tea (чай з малиною) is the universal first-line defense; mustard plasters (гірчичники)
    are still used'
  section: Presentation / Презентація
- points:
  - 'Role-playing a doctor''s visit — terminology note: use ''сімейний лікар'' to
    reflect modern medical reform'
  - Pharmacy shopping list drills
  section: Practice / Практика
- points:
  - 'Calling an ambulance or explaining a flu to a family doctor — collocations: викликати
    швидку, підписати декларацію з лікарем'
  section: Dialogues / Діалоги
vocabulary_hints:
  recommended:
  - хворіти (to be sick) — я хворію на грип (vs боліти)
  - боліти (to hurt/ache) — у мене болить голова
  - гірчичники (mustard plasters) — traditional remedy
  - малина (raspberry) — чай з малиною
  required:
  - поліклініка (outpatient clinic) — районна поліклініка, йти в поліклініку
  - аптека (pharmacy) — цілодобова аптека, купити в аптеці
  - температура (temperature/fever) — висока температура, міряти температуру
  - кашель (cough) — сильний кашель, сухий кашель
  - нежить (runny nose) — мати нежить, засоби від нежитю
  - швидка допомога (ambulance) — викликати швидку, приїхала швидка
  - сімейний лікар (family doctor) — підписати декларацію з лікарем
