content_outline:
- points:
  - Essential health vocabulary — focus on basics like голова, рука, нога, температура
  - 'Grammar of ''болить'' — learner error: ''Я болить...'' vs correct ''У мене болить...'';
    focus on impersonal construction'
  section: Introduction / Вступ
- points:
  - 'Body parts (gender and agreement) — focus on plural agreement (learner error:
    ''У мене болить ноги'' vs ''болять''); usage of possessives'
  - Symptoms and illnesses — collocations like 'висока температура', 'червоне горло',
    'крутиться голова'
  - 'Medical locations and treatments — cultural hook: ''чай з малиною'' as first
    remedy; learner error: confusing ''лікар'' (person) vs ''лікарня'' (place)'
  section: Presentation / Презентація
- points:
  - 'Dialogue at the doctor — scenario: simple check-up involving ''дихайте/не дихайте''
    and describing symptoms'
  section: Practice / Практика
- points:
  - Story about an accident — narrative context using 'зламати ногу/руку'; expressing
    pain and recovery
  section: Dialogues / Діалоги
- points:
  - 'Recap of body parts and symptoms — include proverb: ''Здоров''я — найбільше багатство'''
  section: Summary / Підсумок
vocabulary_hints:
  recommended:
  - 'ліки (medicine) — context: пити ліки, ліки від грипу'
  - 'горло (throat) — context: червоне горло, болить горло'
  - 'калина (viburnum) — cultural context: traditional remedy tea'
  - 'малина (raspberry) — cultural context: tea with raspberry jam for colds'
  required:
  - 'голова (head) — collocations: болить голова, крутиться голова'
  - 'боліти (to hurt) — impersonal construction focus: у мене болить X (singular)
    vs болять Y (plural)'
  - 'температура (fever/temperature) — collocation: висока температура, міряти температуру'
  - 'лікар (doctor) — distinction: йти до лікаря (person) vs у лікарню (place)'
