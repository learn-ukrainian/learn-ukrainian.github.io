module: a2-59
level: A2
sequence: 59
slug: doctor-visit
version: '2.0'
title: At the Doctor
subtitle: Medical Consultation
content_outline:
- section: Вступ
  points:
  - Healthcare system basics — role of 'сімейний лікар' (family doctor) and 'поліклініка'
    (clinic)
  - 'Medical vocabulary overview — cultural hook: mandatory use of ''бахіли'' (shoe
    covers) in clinics; State Standard §3.12 alignment'
- section: Презентація
  points:
  - Making appointments — usage of 'записатися до лікаря' (make an appointment) and
    'викликати лікаря' (call a doctor)
  - 'Describing symptoms — focus on ''У мене болить [Nominative]'' construction; learner
    error: ''Я болю голову'' (incorrect) vs ''У мене болить голова'' (correct); learner
    error: ''ангіна'' = tonsillitis/strep throat (not heart attack)'
  - 'Doctor''s questions — formal address (''Ви'') is strictly required; common question:
    ''Що у вас болить?'''
- section: Practice / Практика
  points:
  - Medical dialogue exercises — practice expressing physical states with Dative ('Мені
    погано') and Nominative for pain subjects ('Голова болить')
  - Complete consultation practice — include 'огляд пацієнта' (patient exam) and 'міряти
    температуру' (taking temperature)
- section: Narrative / Розповідь
  points:
  - Story about doctor visit — narrative centering on a visit to a 'сімейний лікар'
  - 'Diagnosis and treatment — use ''виписати ліки'' and ''рецепт''; learner error:
    confusion between ''рецепт'' (prescription) and ''чек'' (receipt); cultural hook:
    mention ''narodna medytsyna'' (tea with raspberry/viburnum) as a first step before
    meds'
- section: Need More Practice?
  points:
  - Summary and key phrases — recap key collocations like 'У мене температура', 'приймати
    ліки'
vocabulary_hints:
  required:
  - лікар (doctor) — сімейний лікар (family doctor), записатися до лікаря (make an
    appointment)
  - пацієнт (patient) — огляд пацієнта (patient exam), скарги пацієнта (patient complaints)
  - болить (hurts) — Що у вас болить? (What hurts?), У мене болить голова (My head
    hurts)
  - симптом (symptom)
  - 'рецепт (prescription) — рецепт на ліки (prescription for meds); learner error:
    not a payment receipt (чек)'
  - ліки (medicine) — приймати ліки (take meds), виписати ліки (prescribe meds)
  - лікарня (hospital)
  - поліклініка (clinic) — outpatient facility where family doctors work
  recommended:
  - діагноз (diagnosis)
  - лікування (treatment)
  - лікарняний (sick leave)
  - алергія (allergy)
  - температура (temperature) — міряти температуру (to take temp), висока температура
    (high fever)
  - тиск (blood pressure)
