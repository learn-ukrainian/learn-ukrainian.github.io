    ### Intensifying the superlative: якнай- and щонай-


    Want to say something is the absolute best or the very biggest? Ukrainian has
    two special prefixes that intensify the superlative: **якнай-** and **щонай-**:


    - **якнайкращий** — the very best (as good as possible)

    - **щонайбільший** — the very biggest (the absolute maximum)

    - **якнайшвидше** — as fast as possible

    - **щонайменший** — the absolute smallest


    «Зроби це **якнайшвидше**!» — Do this as fast as possible! «Ми шукаємо **щонайкращий**
    варіант» — We are looking for the very best option. These forms are common in
    everyday Ukrainian — you will hear them often.'
