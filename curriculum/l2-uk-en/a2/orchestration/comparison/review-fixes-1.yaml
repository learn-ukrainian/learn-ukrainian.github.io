    ### Useful phrases for natural comparison


    Here are phrases that make your comparisons sound more natural and expressive
    — the way Ukrainians actually speak:


    - «**Що** далі, **то** краще» — The further, the better (a common pattern: що
    + comparative, то + comparative)

    - «Один **від одного** кращий» — Each one better than the last

    - «Не **гірше** за інших» — No worse than others

    - «**Чим** швидше, **тим** краще» — The faster, the better

    - «**Куди** цікавіший» — Far more interesting (куди as an intensifier)


    Notice the pattern **що... то...** and **чим... тим...** — both mean "the more...
    the more..." and are extremely common in Ukrainian: «Що більше читаєш, то краще
    пишеш» — The more you read, the better you write.'
