- type: group-sort
  title: "Сортування за закінченнями"
  instruction: "Розподіліть слова за їхнім закінченням у Давальному відмінку."
  groups:
    - name: "Закінчення -ові/-еві (Чол. рід)"
      items: ["брат", "тато", "студент", "лікар", "Олег", "друг"]
    - name: "Закінчення -і (Жін. рід)"
      items: ["мама", "сестра", "подруга", "донька", "Ольга", "дівчина"]
    - name: "Закінчення -ам/-ям (Множина)"
      items: ["батьки", "люди", "діти", "друзі", "студенти", "колеги"]

- type: match-up
  title: "Знайдіть пару: Дія та Адресат"
  instruction: "Поєднайте дієслово з логічним адресатом дії."
  pairs:
    - left: "Телефонувати"
      right: "лікарю"
    - left: "Дарувати квіти"
      right: "мамі"
    - left: "Допомагати"
      right: "батькам"
    - left: "Надсилати листа"
      right: "колезі"
    - left: "Пояснювати правило"
      right: "студенту"
    - left: "Відповідати"
      right: "клієнту"
    - left: "Читат казку"
      right: "дитині"
    - left: "Писати повідомлення"
      right: "другові"

- type: quiz
  title: "Оберіть правильну форму"
  instruction: "Виберіть правильне слово, щоб доповнити речення."
  items:
    - question: "Ми даруємо подарунки ..."
      explanation: "Множина Давального відмінка має закінчення -ам."
      options:
        - text: "дітям"
          correct: true
        - text: "діти"
          correct: false
        - text: "дітей"
          correct: false
        - text: "дітьми"
          correct: false
    - question: "Я телефоную ..."
      explanation: "Чоловічий рід, істота — закінчення -ові."
      options:
        - text: "батькові"
          correct: true
        - text: "батька"
          correct: false
        - text: "батько"
          correct: false
        - text: "батьком"
          correct: false
    - question: "Студент відповідає ..."
      explanation: "Учитель (чоловічий рід) у Давальному відмінку — учителю/учителеві."
      options:
        - text: "учителю"
          correct: true
        - text: "учителя"
          correct: false
        - text: "учитель"
          correct: false
        - text: "учителем"
          correct: false
    - question: "Вона дає книгу ..."
      explanation: "Подруга (жіночий рід) змінює Г на З перед -і."
      options:
        - text: "подрузі"
          correct: true
        - text: "подругі"
          correct: false
        - text: "подруга"
          correct: false
        - text: "подругу"
          correct: false
    - question: "Ми допомагаємо ..."
      explanation: "Сестра (жіночий рід) отримує закінчення -і."
      options:
        - text: "сестрі"
          correct: true
        - text: "сестру"
          correct: false
        - text: "сестра"
          correct: false
        - text: "сестрою"
          correct: false
    - question: "Скільки років ...?"
      explanation: "Брат (чоловічий рід) у конструкції віку стоїть у Давальному відмінку."
      options:
        - text: "братові"
          correct: true
        - text: "брат"
          correct: false
        - text: "брата"
          correct: false
        - text: "братом"
          correct: false
    - question: "Він надсилає імейл ..."
      explanation: "Директор (чоловічий рід) у Давальному відмінку."
      options:
        - text: "директору"
          correct: true
        - text: "директора"
          correct: false
        - text: "директор"
          correct: false
        - text: "директором"
          correct: false
    - question: "Я бажаю щастя ..."
      explanation: "Люди (множина) у Давальному відмінку — людям."
      options:
        - text: "людям"
          correct: true
        - text: "люди"
          correct: false
        - text: "людей"
          correct: false
        - text: "людьми"
          correct: false

- type: fill-in
  title: "Чоловічий рід: кому?"
  instruction: "Відкрийте дужки, поставивши слово у Давальний відмінок."
  items:
    - sentence: "Я даю книгу (брат)."
      answer: "братові"
      options: ["братові", "брату", "брата", "братом"]
      explanation: "Брат (істота) — закінчення -ові."
    - sentence: "Ми дякуємо (лікар)."
      answer: "лікарю"
      options: ["лікарю", "лікаря", "лікар", "лікарем"]
      explanation: "Лікар (чоловічий рід) — закінчення -ю (або -еві)."
    - sentence: "Ти допомагаєш (друг)?"
      answer: "другові"
      options: ["другові", "друга", "друг", "другом"]
      explanation: "Друг (істота) — закінчення -ові."
    - sentence: "Вона пише листа (тато)."
      answer: "татові"
      options: ["татові", "тата", "тато", "татом"]
      explanation: "Тато (істота) — закінчення -ові."
    - sentence: "Студент відповідає (професор)."
      answer: "професору"
      options: ["професору", "професора", "професор", "професором"]
      explanation: "Професор — закінчення -у (або -ові)."
    - sentence: "Я телефоную (Олег)."
      answer: "Олегові"
      options: ["Олегові", "Олега", "Олег", "Олегом"]
      explanation: "Олег — закінчення -ові."
    - sentence: "Ми даруємо подарунок (син)."
      answer: "синові"
      options: ["синові", "сина", "син", "сином"]
      explanation: "Син — закінчення -ові."
    - sentence: "Потрібно допомогти (дідусь)."
      answer: "дідусеві"
      options: ["дідусеві", "дідуся", "дідусь", "дідусем"]
      explanation: "Дідусь (м'яка група) — закінчення -еві."

- type: fill-in
  title: "Жіночий рід: магія чергування"
  instruction: "Поставте слова в дужках у Давальний відмінок, пам'ятаючи про зміну приголосних."
  items:
    - sentence: "Я даруємо квіти (подруга)."
      answer: "подрузі"
      options: ["подрузі", "подругі", "подруга", "подругу"]
      explanation: "Г змінюється на З перед -і."
    - sentence: "Ми допомагаємо (мама)."
      answer: "мамі"
      options: ["мамі", "маму", "мама", "мамою"]
      explanation: "Стандартне закінчення -і."
    - sentence: "Він несе ліки (донька)."
      answer: "доньці"
      options: ["доньці", "донькі", "донька", "доньку"]
      explanation: "К змінюється на Ц перед -і."
    - sentence: "Я читаю казку (Ольга)."
      answer: "Ользі"
      options: ["Ользі", "Ольгі", "Ольга", "Ольгу"]
      explanation: "Г змінюється на З перед -і."
    - sentence: "Це подарунок (жінка)."
      answer: "жінці"
      options: ["жінці", "жінкі", "жінка", "жінку"]
      explanation: "К змінюється на Ц перед -і."
    - sentence: "Ми йдемо назустріч (муха)."
      answer: "мусі"
      options: ["мусі", "мухі", "муха", "муху"]
      explanation: "Х змінюється на С перед -і."
    - sentence: "Вона пише (сестра)."
      answer: "сестрі"
      options: ["сестрі", "сестру", "сестра", "сестрою"]
      explanation: "Стандартне закінчення -і."
    - sentence: "Я телефоную (бабуся)."
      answer: "бабусі"
      options: ["бабусі", "бабусю", "бабуся", "бабусею"]
      explanation: "М'яка основа, закінчення -і."

- type: fill-in
  title: "Множина: щедрість для всіх"
  instruction: "Поставте слова в дужках у Давальний відмінок множини."
  items:
    - sentence: "Ми допомагаємо (батьки)."
      answer: "батькам"
      options: ["батькам", "батьків", "батьки", "батьками"]
      explanation: "Множина, тверда група — закінчення -ам."
    - sentence: "Учитель дає завдання (студенти)."
      answer: "студентам"
      options: ["студентам", "студентів", "студенти", "студентами"]
      explanation: "Множина, тверда група — закінчення -ам."
    - sentence: "Я даруємо радість (люди)."
      answer: "людям"
      options: ["людям", "людей", "люди", "людьми"]
      explanation: "Множина, м'яка група — закінчення -ям."
    - sentence: "Вона читає (діти)."
      answer: "дітям"
      options: ["дітям", "дітей", "діти", "дітьми"]
      explanation: "Множина, м'яка група — закінчення -ям."
    - sentence: "Ми пишемо листи (друзі)."
      answer: "друзям"
      options: ["друзям", "друзів", "друзі", "друзями"]
      explanation: "Множина, м'яка група — закінчення -ям."
    - sentence: "Я телефоную (колеги)."
      answer: "колегам"
      options: ["колегам", "колег", "колеги", "колегами"]
      explanation: "Множина, тверда група — закінчення -ам."
    - sentence: "Потрібно дати воду (квіти)."
      answer: "квітам"
      options: ["квітам", "квітів", "квіти", "квітами"]
      explanation: "Множина, тверда група — закінчення -ам."
    - sentence: "Ми віримо (очі)."
      answer: "очам"
      options: ["очам", "очей", "очі", "очима"]
      explanation: "Множина, тверда група (після шиплячого) — закінчення -ам."

- type: unjumble
  title: "Складіть речення"
  instruction: "Розставте слова у правильному порядку, щоб утворити речення."
  items:
    - words: ["даруємо", "Ми", "квіти", "мамі"]
      answer: "Ми даруємо квіти мамі"
    - words: ["телефонує", "братові", "Андрій"]
      answer: "Андрій телефонує братові"
    - words: ["допомагаю", "Я", "друзям", "моїм"]
      answer: "Я допомагаю моїм друзям"
    - words: ["пояснює", "Учитель", "студентам", "правило"]
      answer: "Учитель пояснює правило студентам"
    - words: ["надсилає", "повідомлення", "Вона", "сестрі"]
      answer: "Вона надсилає повідомлення сестрі"
    - words: ["років", "двадцять", "Студентові"]
      answer: "Студентові двадцять років"

- type: error-correction
  title: "Виправте помилки"
  instruction: "Знайдіть помилку у реченні та виберіть правильний варіант."
  items:
    - sentence: "Я допомагаю маму на кухні."
      error: "маму"
      answer: "мамі"
      options: ["мамі", "мами", "мамою", "мама"]
      explanation: "Дієслово 'допомагати' вимагає Давального відмінка (кому?), а не Знахідного."
    - sentence: "Він телефонує директора."
      error: "директора"
      answer: "директору"
      options: ["директору", "директором", "директор", "директорів"]
      explanation: "Дієслово 'телефонувати' вимагає Давального відмінка (кому?)."
    - sentence: "Ми даруємо квіти донькі."
      error: "донькі"
      answer: "доньці"
      options: ["доньці", "донька", "доньку", "донькою"]
      explanation: "У слові 'донька' відбувається чергування К → Ц перед закінченням -і."
    - sentence: "Я пишу листа подругі."
      error: "подругі"
      answer: "подрузі"
      options: ["подрузі", "подруга", "подругу", "подругою"]
      explanation: "У слові 'подруга' відбувається чергування Г → З перед закінченням -і."
    - sentence: "Батькам п'ятдесят року."
      error: "року"
      answer: "років"
      options: ["років", "роки", "рік", "роками"]
      explanation: "З числом 50 використовуємо форму 'років' (Genitive Plural)."
    - sentence: "Вона дає книгу студента."
      error: "студента"
      answer: "студенту"
      options: ["студенту", "студент", "студентом", "студенти"]
      explanation: "Давальний відмінок для чоловічого роду — закінчення -у або -ові."

- type: mark-the-words
  title: "Знайдіть слова у Давальному відмінку"
  instruction: "Знайдіть і позначте всі іменники, які стоять у Давальному відмінку (відповідають на питання 'кому?')."
  text: "Сьогодні свято. Я купив подарунок мамі. Тато дарує квіти бабусі. Ми допомагаємо батькам готувати вечерю. Андрій телефонує друзям. Сестрі весело, бо їй подарували ляльку."
  answers: ["мамі", "бабусі", "батькам", "друзям", "Сестрі"]

