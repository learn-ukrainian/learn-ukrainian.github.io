    culture.
- dimension: 9
  name: Dialogue & conversation quality
  score: 10
  evidence: 'The tutoring session dialogue is highly functional and realistic. The
    tutor and student naturally parse a newspaper sentence: "— Передав як? Швидко.
    Це обставина способу дії."'
