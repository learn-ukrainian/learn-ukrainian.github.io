- type: fill-in
  title: "Transform to Past Tense"
  instruction: "Complete the sentence with the correct past tense and Instrumental case."
  items:
    - sentence: "Він студент, але раніше він був ___."
      answer: "студентом"
      options: ["студент", "студентом", "студента", "студенти"]
    - sentence: "Вона вчителька, але раніше вона була ___."
      answer: "вчителькою"
      options: ["вчителька", "вчителем", "вчителькою", "вчительки"]
    - sentence: "Він економіст, але раніше він був ___."
      answer: "економістом"
      options: ["економіст", "економістом", "економіста", "економісти"]
    - sentence: "Вона лікарка, але раніше вона була ___."
      answer: "лікаркою"
      options: ["лікарка", "лікарем", "лікаркою", "лікарки"]
    - sentence: "Він юрист, але раніше він був ___."
      answer: "юристом"
      options: ["юрист", "юристом", "юриста", "юристи"]
    - sentence: "Вона програмістка, але раніше вона була ___."
      answer: "програмісткою"
      options: ["програмістка", "програмістом", "програмісткою", "програмітки"]
    - sentence: "Він інженер, але раніше він був ___."
      answer: "інженером"
      options: ["інженер", "інженером", "інженера", "інженери"]
    - sentence: "Вона менеджерка, але раніше вона була ___."
      answer: "менеджеркою"
      options: ["менеджерка", "менеджером", "менеджеркою", "менеджерки"]

- type: fill-in
  title: "Future and Becoming"
  instruction: "Choose the correct Instrumental form for future goals and changes."
  items:
    - sentence: "Вона дуже хоче стати ___."
      answer: "журналісткою"
      options: ["журналістка", "журналістом", "журналісткою", "журналістки"]
    - sentence: "Він мріє стати ___."
      answer: "програмістом"
      options: ["програміст", "програмістом", "програмістка", "програмісти"]
    - sentence: "У майбутньому я буду ___."
      answer: "лікарем"
      options: ["лікар", "лікарем", "лікарка", "лікарі"]
    - sentence: "Марія стала новою ___."
      answer: "директоркою"
      options: ["директорка", "директором", "директоркою", "директори"]
    - sentence: "Він хоче стати хорошим ___."
      answer: "спеціалістом"
      options: ["спеціаліст", "спеціалістом", "спеціаліста", "спеціалісти"]
    - sentence: "Вона буде відмінною ___."
      answer: "юристкою"
      options: ["юристка", "юристом", "юристкою", "юристки"]
    - sentence: "Олег став відомим ___."
      answer: "айтішником"
      options: ["айтішник", "айтішником", "айтішниця", "айтішники"]
    - sentence: "Вона мріє стати ___ України."
      answer: "громадянкою"
      options: ["громадянка", "громадянином", "громадянкою", "громадянки"]

- type: quiz
  title: "Current Roles"
  instruction: "Select the grammatically correct sentence."
  items:
    - question: "How do you correctly say 'She works as a manager'?"
      explanation: "Use the feminine Instrumental form without 'як'."
      options:
        - text: "Вона працює менеджеркою."
          correct: true
        - text: "Вона працює як менеджер."
          correct: false
        - text: "Вона працює менеджерка."
          correct: false
        - text: "Вона працює менеджером."
          correct: false
    - question: "How do you correctly say 'He works as an engineer'?"
      explanation: "Use the masculine Instrumental form without 'як'."
      options:
        - text: "Він працює інженером."
          correct: true
        - text: "Він працює як інженер."
          correct: false
        - text: "Він працює інженер."
          correct: false
        - text: "Він працює інженером як."
          correct: false
    - question: "How do you say 'My sister works as an IT professional'?"
      explanation: "Use the feminine colloquial term in Instrumental."
      options:
        - text: "Моя сестра працює айтішницею."
          correct: true
        - text: "Моя сестра працює айтішником."
          correct: false
        - text: "Моя сестра працює айтішниця."
          correct: false
        - text: "Моя сестра працює як айтішниця."
          correct: false
    - question: "Choose the correct translation for 'He is a programmer'."
      explanation: "Present identity uses the Nominative case."
      options:
        - text: "Він програміст."
          correct: true
        - text: "Він є програмістом."
          correct: false
        - text: "Він програмістом."
          correct: false
        - text: "Він працює програміст."
          correct: false
    - question: "Which sentence correctly describes a male lawyer's job?"
      explanation: "Use 'працювати' + Instrumental."
      options:
        - text: "Він працює юристом."
          correct: true
        - text: "Він працює юрист."
          correct: false
        - text: "Він працює як юрист."
          correct: false
        - text: "Він працює юристкою."
          correct: false
    - question: "How do you say 'She is a doctor'?"
      explanation: "Present tense identity uses the Nominative feminine form."
      options:
        - text: "Вона лікарка."
          correct: true
        - text: "Вона лікаркою."
          correct: false
        - text: "Вона працює лікарка."
          correct: false
        - text: "Вона є лікарем."
          correct: false
    - question: "Choose the correct sentence for 'I work as a teacher' (female speaker)."
      explanation: "Use the feminine Instrumental form."
      options:
        - text: "Я працюю вчителькою."
          correct: true
        - text: "Я працюю вчителька."
          correct: false
        - text: "Я працюю як вчителька."
          correct: false
        - text: "Я працюю вчителем."
          correct: false
    - question: "What is the correct way to express 'He became a journalist'?"
      explanation: "The verb 'стати' requires the Instrumental case."
      options:
        - text: "Він став журналістом."
          correct: true
        - text: "Він став журналіст."
          correct: false
        - text: "Він став як журналіст."
          correct: false
        - text: "Він став журналісткою."
          correct: false

