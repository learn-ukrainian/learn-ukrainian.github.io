- type: true-false
  title: "True or False?"
  instruction: "Is the Ukrainian sentence grammatically correct?"
  items:
    - statement: "Він хоче бути лікар."
      correct: false
      explanation: "You must use the instrumental case after бути: лікарем."
    - statement: "Вона працює менеджеркою."
      correct: true
      explanation: "This is perfectly correct. The instrumental case is used for professions."
    - statement: "Я працюю як інженер."
      correct: false
      explanation: "Do not translate 'as' with «як». Simply use the instrumental case: інженером."
    - statement: "Він працює директором."
      correct: true
      explanation: "Correct use of the instrumental case for a profession."
    - statement: "Вона хороша лікар."
      correct: false
      explanation: "Adjectives must match the gender. Use the feminine form: хороша лікарка."
    - statement: "Вона мріє стати громадянкою України."
      correct: true
      explanation: "Correct use of the feminine instrumental case."
    - statement: "Я працюю програміст."
      correct: false
      explanation: "You must use the instrumental case: програмістом."
    - statement: "Ти стала юристкою."
      correct: true
      explanation: "Correct use of the feminine instrumental case after стати."

