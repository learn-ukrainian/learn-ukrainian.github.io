- type: error-correction
  title: "Fix the Mistakes"
  instruction: "Identify and correct the grammatical error in each sentence."
  items:
    - sentence: "Вона хоче бути лікар."
      error: "лікар"
      answer: "лікаркою"
      error_type: "word"
      options: ["лікарем", "лікаркою", "лікарка", "лікарі"]
      explanation: "After 'бути' for a female subject, use the feminine Instrumental form."
    - sentence: "Він працює як менеджер."
      error: "як менеджер"
      answer: "менеджером"
      error_type: "phrase"
      options: ["менеджером", "менеджер", "менеджером як", "менеджеркою"]
      explanation: "Do not use 'як'. The verb 'працювати' directly takes the Instrumental case."
    - sentence: "Я був студент."
      error: "студент"
      answer: "студентом"
      error_type: "word"
      options: ["студентом", "студенти", "студенту", "студенткою"]
      explanation: "The past tense of 'бути' requires the noun to be in the Instrumental case."
    - sentence: "Олег став програміст."
      error: "програміст"
      answer: "програмістом"
      error_type: "word"
      options: ["програмістом", "програмісти", "програмістка", "програмувальник"]
      explanation: "The verb 'стати' requires the new role to be in the Instrumental case."
    - sentence: "Марія працює як юристка."
      error: "як юристка"
      answer: "юристкою"
      error_type: "phrase"
      options: ["юристкою", "юристка", "юристом", "юристи"]
      explanation: "Drop 'як' and use the Instrumental case directly after 'працює'."
    - sentence: "Він мріє стати громадянин."
      error: "громадянин"
      answer: "громадянином"
      error_type: "word"
      options: ["громадянином", "громадянкою", "громадяни", "громадянина"]
      explanation: "The object of 'стати' must be in the Instrumental case."

- type: true-false
  title: "Grammar Facts"
  instruction: "Determine if the statement is true or false."
  items:
    - statement: "You use the Nominative case to say what your current profession is without a verb."
      correct: true
      explanation: "Yes, present tense identity sentences (Я лікар) use the Nominative case."
    - statement: "When using 'працювати' to state your job, you must include the word 'як' in Ukrainian."
      correct: false
      explanation: "No, using 'як' is an English calque. You just use the Instrumental case."
    - statement: "The verb 'стати' requires the following noun to be in the Instrumental case."
      correct: true
      explanation: "Yes, 'стати' describes a change of state and triggers the Instrumental case."
    - statement: "Femininitives like 'директорка' and 'менеджерка' are officially recognized in modern Ukrainian."
      correct: true
      explanation: "The 2020 Grammar Reform officially codified femininitives."
    - statement: "To say 'I will be a doctor', you use the Nominative case for 'doctor'."
      correct: false
      explanation: "The future form of 'бути' requires the Instrumental case: 'Я буду лікарем'."
    - statement: "The word 'айтішник' is a highly formal term used in official documents."
      correct: false
      explanation: "It is a colloquial, high-frequency term used in everyday speech. 'Програміст' is more formal."
    - statement: "For masculine nouns, the Instrumental case often ends in -ом or -ем."
      correct: true
      explanation: "Yes, these are the standard masculine Instrumental endings."
    - statement: "Feminine nouns ending in -а (like лікарка) change to -ою in the Instrumental case."
      correct: true
      explanation: "Yes, the ending -а becomes -ою (лікаркою)."

