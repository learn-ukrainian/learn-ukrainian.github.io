findings:
- dimension: PLAN ADHERENCE
  severity: MAJOR
  location: Entire module — plan dialogue_situations
  issue: 'Plan specifies an art class dialogue (speakers: Вчитель мистецтва, Учні)
    covering "Малюю олівцем, Фарбую пензлем, Різаю ножицями, Їду на виставку автобусом."
    This dialogue is entirely absent. The commute dialogue substitutes for transport
    but art-class tool discussion is lost.'
  fix: Cannot be fixed with find/replace — would require adding a new dialogue to
    section 1 or 4. Flag for next revision cycle.
- dimension: PLAN ADHERENCE
  severity: MAJOR
  location: 'Section 4 "Практика: Знаряддя чи супутник?"'
  issue: 'Plan specifies "Dialogue: At school — students discuss what they write with,
    draw with, and how they get to school." No such dialogue exists in section 4.'
  fix: Cannot be fixed with find/replace — requires adding new content. Flag for next
    revision cycle.
- dimension: LINGUISTIC ACCURACY
  severity: MAJOR
  location: 'Section 1, paragraph 1: «писати ручкою», а не «писати з ручкою». *(Therefore
    we say "to write with a pen", and not "to write with a pen".)*'
  issue: Both English glosses are identical — "to write with a pen" — which completely
    defeats the pedagogical point about tool vs. accompaniment. The learner sees no
    distinction.
  fix: Change the English translations to differentiate tool from accompaniment meaning.
- dimension: PEDAGOGICAL QUALITY
  severity: MAJOR
  location: 'Section 3, paragraph 3: "Згадайте вірш про те, як я допомагаю родині."'
  issue: References a poem that doesn't exist in this module or any guaranteed prior
    module. This is a fabricated reference that will confuse learners.
  fix: Remove the dangling reference and replace with a direct example.
- dimension: ENGAGEMENT & TONE
  severity: MINOR
  location: 'Section 3, paragraph 1: "**-ами** *(-amy)*" and "**-ями** *(-yamy)*"'
  issue: Latin transliterations appear only in section 3 and nowhere else in the module.
    Inconsistent with the module's style and unnecessary at A2 level where learners
    read Cyrillic.
  fix: Remove the Latin transliterations.
- dimension: ENGAGEMENT & TONE
  severity: MINOR
  location: Multiple sections
  issue: 'Formulaic meta-transitions: "Let''s look at how feminine nouns change" (§1),
    "Now we will learn the spelling rules" (§1), "Now let''s see how these words work"
    (§3), "Now let''s learn the vocabulary" (§2). These are "telling about learning"
    rather than teaching.'
  fix: Replace with content-forward transitions (fix the most prominent ones).
