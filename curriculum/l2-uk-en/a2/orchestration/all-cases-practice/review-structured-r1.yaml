findings:
- dimension: LINGUISTIC ACCURACY
  severity: CRITICAL
  location: Dialogue 2 prose — "Вона знаходиться прямо біля лікарні."
  issue: '"знаходитися" for indicating location is a calque of Russian "находиться".
    Confirmed by Антоненко-Давидович (ad-148): this verb means "to find oneself" in
    Ukrainian, not "to be located." For static location, use "є", "міститься", or
    restructure.'
  fix: Replace "Вона знаходиться прямо біля лікарні" → "Вона прямо біля лікарні" or
    "Вона є прямо біля лікарні."
- dimension: LINGUISTIC ACCURACY
  severity: CRITICAL
  location: Case cheat sheet, §6 Місцевий відмінок — "знаходитися *(to be located)*"
  issue: Teaching "знаходитися" as a standard Locative verb perpetuates the calque.
    Learners will internalize this as correct Ukrainian. Антоненко-Давидович says
    to use "бути, перебувати, міститися" instead.
  fix: Replace "знаходитися *(to be located)*" → "міститися *(to be located)*" in
    the cheat sheet verb list.
- dimension: LINGUISTIC ACCURACY
  severity: CRITICAL
  location: Dialogue 2 prose — "or sit «на прийомі» *(at an appointment)*"
  issue: 'The lemma "прийом" is NOT IN VESUM (verified via verify_lemma and verify_words).
    This is a Russicism from Russian "приём". Ukrainian alternative: "на прийманні"
    (from "приймання", which IS in VESUM).'
  fix: Replace «на прийомі» with «на прийманні» or restructure to «у лікаря».
- dimension: PLAN ADHERENCE
  severity: MAJOR
  location: 'Діалог 1: Організовуємо день народження'
  issue: Plan requires "Extended dialogue (12-15 exchanges)" but the actual dialogue
    has only 7 exchanges. This is roughly half the planned length. The module is above
    word target overall (2388 vs 2000), so the short dialogue reflects an imbalance
    — too much English explanation, not enough Ukrainian dialogue.
  fix: 'Expand Dialogue 1 to at least 12 exchanges. Add exchanges covering: deciding
    on a time, discussing who to invite specifically, debating between two restaurants,
    discussing what to wear — all using different cases.'
- dimension: DIALOGUE QUALITY
  severity: MAJOR
  location: All three dialogues
  issue: While all dialogues are natural in tone, they are all shorter than "extended"
    — Dialogue 1 (7 exchanges), Dialogue 2 (~9 exchanges), Dialogue 3 (8 exchanges).
    For a synthesis module that aims to practice all 7 cases in dialogue, more exchanges
    = more natural case variety.
  fix: Expand each dialogue by 3-5 exchanges to create more organic case usage opportunities.
    This also addresses the plan adherence gap.
- dimension: ENGAGEMENT
  severity: MINOR
  location: Section 1 explanation paragraph — "In this dialogue, we see how the Vocative
    case and the Nominative plural function in a natural conversation."
  issue: Meta-commentary ("we see how X functions") — slightly lectured rather than
    demonstrated. Better to lead with the example.
  fix: 'Rephrase to lead with the observation: "When the friends address each other,
    they use the Vocative case..."'
