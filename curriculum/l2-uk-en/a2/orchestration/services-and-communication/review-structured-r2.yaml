findings:
- dimension: LINGUISTIC ACCURACY
  severity: CRITICAL
  location: 'Section 1, paragraph 5: "В українській граматиці одержувач завжди стоїть
    у давальному відмінку. The recipient always takes the Dative case."'
  issue: 'Factually false. "Одержувач" can stand in any case depending on syntactic
    role. GRAC confirms: "одержувач отримав вантаж" (nominative). The correct teaching:
    the person TO WHOM something is sent/given takes the Dative as indirect object.
    The current wording teaches a wrong rule that learners will memorize.'
  fix: Rewrite to accurately explain the dative marks the indirect object (кому?),
    not that the word одержувач is inherently dative.
- dimension: LINGUISTIC ACCURACY
  severity: MAJOR
  location: 'Section 3, paragraph 3: "Допоможіть мені заповнити цю адресу"'
  issue: 'Unnatural collocation. GRAC returns 0 hits for "заповнити адресу." Natural
    Ukrainian: "написати адресу" (5 GRAC hits). "Заповнити" collocates with forms/blanks,
    not addresses.'
  fix: Replace "заповнити цю адресу" with "написати цю адресу".
- dimension: PLAN ADHERENCE
  severity: MAJOR
  location: Section 1, paragraph 4 — Actions subsection
  issue: Plan requires "підписати (to sign)" as a key action verb. Content replaces
    it entirely with "надписати (to address an envelope)" — a different verb. Learners
    never encounter підписати, missing a natural postal action (signing receipts/forms).
  fix: Add підписати alongside надписати in the actions paragraph.
- dimension: PLAN ADHERENCE
  severity: MAJOR
  location: 'Section 2, Dialogue 2: "Я відправляю це моєму старшому братові в далеку
    Канаду"'
  issue: Plan dialogue situation specifies "Бандероль для сестри в Канаду" — demonstrating
    feminine dative (сестрі). Content changes to братові (masculine), losing the planned
    feminine dative demonstration in this dialogue.
  fix: Change brother to sister to match plan and demonstrate feminine dative form.
- dimension: PLAN ADHERENCE
  severity: MINOR
  location: Section 3, extended scenario (Олег/Іван dialogue)
  issue: Plan specifies "Допоможи мені загорнути" — the verb загорнути (to wrap) should
    appear in this scenario. It is absent from the content entirely.
  fix: Add загорнути to the neighbor dialogue.
- dimension: ENGAGEMENT & TONE
  severity: MINOR
  location: 'Multiple — Section 1 para 4: "Найголовніші українські слова"; Section
    2 end: "Це база українського спілкування!"; repeated "дуже важливе правило"'
  issue: Repetitive intensifiers and generic filler. "Найголовніші українські слова
    — це надіслати або відправити" is hyperbolic and inaccurate. "Це база" is slang.
    "Дуже важливе правило" appears in near-identical formulations 3+ times.
  fix: Vary phrasing, remove empty intensifiers, replace "найголовніші українські
    слова" with "основні дієслова на пошті".
- dimension: ENGAGEMENT & TONE
  severity: MINOR
  location: 'Section 2, Dialogue 2: "в далеку Канаду"'
  issue: '"далеку" is unnecessary padding — Canada being far is obvious and the adjective
    adds nothing. Sounds slightly artificial.'
  fix: Remove "далеку" — just "в Канаду".
