- find: You will often hear variations like **Будьте здорові!** (Be healthy!) as a
    toast or a response to a sneeze. While this Nominative plural form is common,
    the Instrumental pattern (**будьте здоровими**) is the gold standard for formal
    wishes.
  replace: You will often hear the shorter form **Будьте здорові!** (Be healthy!)
    as a toast or a response to a sneeze. While this everyday phrasing is extremely
    common, the full Instrumental pattern (**будьте здоровими**) is the gold standard
    for formal wishes and toasts.
