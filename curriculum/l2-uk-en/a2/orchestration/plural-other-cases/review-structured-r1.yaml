findings:
- dimension: ENGAGEMENT
  severity: MAJOR
  location: Section "Три відмінки разом" — "These three cases form the 'Golden Trio'
    of plural endings."
  issue: Gamified branding language. The rubric explicitly penalizes "gamified language."
    This phrase adds no pedagogical value.
  fix: Replace with a factual summary statement.
- dimension: ENGAGEMENT
  severity: MAJOR
  location: Section "Давальний множини" — "The Dative plural is incredibly 'grateful'
    for learners because it is extremely regular across all noun types."
  issue: Unclear metaphor. "Grateful" in scare quotes is confusing — does it mean
    "rewarding"? "forgiving"? This is the kind of vague motivational language the
    rubric penalizes.
  fix: Replace with clear, direct English.
- dimension: DIALOGUE
  severity: MAJOR
  location: Practice dialogue — "— **Вчителька:** Ми їдемо **вагонами** *(by train
    cars)*."
  issue: 'Unnatural collocation. GRAC concordance shows «вагонами» exclusively in
    freight/industrial contexts. No native speaker says "ми їдемо вагонами" for personal
    travel. Natural: «поїздами» (already introduced by the student in the previous
    line). A2 learners will memorize this as normal speech.'
  fix: Replace «вагонами» with «поїздами» and adjust the teacher's response to add
    a different Instrumental form elsewhere.
- dimension: ENGAGEMENT
  severity: MINOR
  location: Section "Три відмінки разом" — "The verb or preposition acts as a 'commander'
    that dictates the required case ending."
  issue: Slightly heavy-handed metaphor, though more forgivable than "Golden Trio"
    since it has pedagogical value. Combined with other gimmicky phrasings, contributes
    to uneven tone.
  fix: Simplify to direct language.
