inline:
  - id: act-1
    type: fill-in
    title: Хай або нехай
    instruction: Доповніть речення правильною формою.
    items:
      - sentence: "Хай він ___ інструкцію."
        answer: "прочитає"
        options:
          - "прочитає"
          - "читати"
        explanation: "Після хай потрібна форма дієслова."
      - sentence: "Нехай вони ___ після уроку."
        answer: "подзвонять"
        options:
          - "подзвонять"
          - "подзвонити"
        explanation: "Вони -> подзвонять."
      - sentence: "Хай вода ___ дві хвилини."
        answer: "кипить"
        options:
          - "кипить"
          - "кипіти"
        explanation: "Вода кипить у процесі."
      - sentence: "Нехай соус ___ трохи."
        answer: "постоїть"
        options:
          - "стоїть"
          - "постоїть"
        explanation: "Конкретний короткий результат: постоїть."
      - sentence: "Хай діти ___ у дворі."
        answer: "граються"
        options:
          - "граються"
          - "гратися"
        explanation: "Діти -> граються."
      - sentence: "Нехай Олена ___ відповідь."
        answer: "напише"
        options:
          - "напише"
          - "писати"
        explanation: "Конкретний результат: напише."
      - sentence: "Хай Марко ___ до каси."
        answer: "піде"
        options:
          - "піде"
          - "ходити"
        explanation: "Один рух у напрямку: піде."
      - sentence: "Нехай вони ___ п'ять хвилин."
        answer: "відпочинуть"
        options:
          - "відпочинуть"
          - "відпочивати"
        explanation: "Після нехай потрібна особова форма."
  - id: act-2
    type: quiz
    title: Вид у наказі
    instruction: Виберіть форму, яка краще відповідає ситуації.
    items:
      - question: "Загальна порада для щоденної практики."
        options:
          - "Читайте щодня."
          - "Прочитайте щодня."
          - "Будете читати щодня."
        correct: 0
        explanation: "Звична дія: недоконаний вид."
      - question: "Конкретне завдання: закінчити одну сторінку."
        options:
          - "Прочитайте цю сторінку."
          - "Читайте цю сторінку до кінця вже."
          - "Читати цю сторінку."
        correct: 0
        explanation: "Потрібен результат: прочитайте."
      - question: "Ввічлива інструкція в аудиторії."
        options:
          - "Сідайте, будь ласка."
          - "Сядьтеся, будь ласка."
          - "Сісти, будь ласка."
        correct: 0
        explanation: "Сідайте - природна ввічлива форма."
      - question: "Попередження."
        options:
          - "Не забудь паспорт!"
          - "Не забувай паспорт уже!"
          - "Не забути паспорт!"
        correct: 0
        explanation: "Доконана форма може звучати як попередження."
      - question: "Загальна порада про мовлення."
        options:
          - "Говоріть українською частіше."
          - "Скажіть українською частіше."
          - "Будете сказати українською."
        correct: 0
        explanation: "Загальна практика: говоріть."
      - question: "Конкретне прохання написати сьогодні."
        options:
          - "Напиши мені сьогодні."
          - "Пиши мені сьогодні і готово."
          - "Будеш написати сьогодні."
        correct: 0
        explanation: "Один завершений крок: напиши."
      - question: "Заборона відкривати вікно."
        options:
          - "Не відкривайте вікно."
          - "Не відкрийте вікно."
          - "Не відкрити вікно."
        correct: 0
        explanation: "Заперечна інструкція зазвичай недоконана."
      - question: "Пропозиція для всієї групи."
        options:
          - "Починаймо."
          - "Починати."
          - "Починаєте."
        correct: 0
        explanation: "Форма на -мо."
  - id: act-3
    type: match-up
    title: Побажання
    instruction: З'єднайте звертання з природним побажанням.
    pairs:
      - left: "Оленко"
        right: "будь щасливою"
      - left: "Марку"
        right: "будь здоровим"
      - left: "Друзі"
        right: "будьте уважними"
      - left: "Мамо"
        right: "будь спокійною"
      - left: "Колеги"
        right: "будьте готовими"
      - left: "Ірино"
        right: "будь сміливою"
      - left: "Пане Андрію"
        right: "будьте обережним"
      - left: "Студенти"
        right: "будьте активними"
  - id: act-4
    type: order
    title: Складіть наказ
    instruction: Поставте слова в правильний порядок.
    items:
      - "хай / він / прочитає / інструкцію"
      - "нехай / вони / подзвонять / після уроку"
      - "Оленко / будь / щасливою"
      - "друзі / будьте / уважними"
      - "зробімо / це / сьогодні"
      - "поговорімо / після / уроку"
      - "не / відкривайте / вікно"
      - "прочитайте / цю / сторінку"
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
workbook:
  - type: group-sort
    title: Яка форма наказу?
    instruction: Розподіліть репліки за моделлю.
    groups:
      - label: "2-га особа"
        items:
          - "прочитайте текст"
          - "наріжте цибулю"
          - "пишіть повільно"
          - "не відкривайте вікно"
      - label: "1-ша особа множини"
        items:
          - "починаймо"
          - "поговорімо"
          - "зробімо це"
          - "поїдьмо разом"
      - label: "3-тя особа з хай/нехай"
        items:
          - "хай він прийде"
          - "нехай вона прочитає"
          - "хай вони відпочинуть"
          - "нехай соус постоїть"
  - type: error-correction
    title: Виправте наказ
    instruction: Оберіть нормативний варіант.
    items:
      - sentence: "Хай він читати."
        error: "читати"
        correction: "Хай він читає."
        options:
          - "Хай він читає."
          - "Хай він читати."
        explanation: "Після хай потрібна особова форма."
      - sentence: "Олена, будь щаслива."
        error: "Олена / щаслива"
        correction: "Оленко, будь щасливою."
        options:
          - "Оленко, будь щасливою."
          - "Олена, будь щаслива."
        explanation: "Звертання + орудний."
      - sentence: "Давай робити це як наказову форму."
        error: "давай робити"
        correction: "Зробімо це."
        options:
          - "Зробімо це."
          - "Давай робити це."
        explanation: "У курсі тримаємо нормативну форму на -мо."
      - sentence: "Не відкрийте вікно."
        error: "відкрийте"
        correction: "Не відкривайте вікно."
        options:
          - "Не відкривайте вікно."
          - "Не відкрийте вікно."
        explanation: "Заперечна інструкція зазвичай недоконана."
  - type: match-up
    title: Зробімо разом
    instruction: З'єднайте інфінітив із формою пропозиції.
    pairs:
      - left: "читати"
        right: "читаймо"
      - left: "ходити"
        right: "ходімо"
      - left: "зробити"
        right: "зробімо"
      - left: "поїхати"
        right: "поїдьмо"
      - left: "поговорити"
        right: "поговорімо"
  - type: true-false
    title: Наказовий спосіб
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Хай і нехай можуть вводити наказ або побажання для третьої особи."
        correct: true
        explanation: "Так: хай він прочитає, нехай вони прийдуть."
      - statement: "Читаймо означає let's read."
        correct: true
        explanation: "Це форма першої особи множини."
      - statement: "Будь здоровим має орудний відмінок."
        correct: true
        explanation: "Здоровим - орудний."
      - statement: "Після хай завжди стоїть інфінітив."
        correct: false
        explanation: "Потрібна особова форма: хай читає."
