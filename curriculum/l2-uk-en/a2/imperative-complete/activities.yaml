inline:
  - id: act-1
    type: fill-in
    title: Хай, нехай, -мо
    instruction: Доповніть речення правильною формою.
    items:
      - sentence: "Хай він ___ інструкцію."
        answer: "прочитає"
        options:
          - "прочитає"
          - "читати"
        explanation: "Після хай потрібна особова форма; тут очікуємо результат."
      - sentence: "Нехай вони ___ після уроку."
        answer: "подзвонять"
        options:
          - "подзвонять"
          - "подзвонити"
        explanation: "Вони -> подзвонять."
      - sentence: "Хай вода ___ дві хвилини."
        answer: "кипить"
        options:
          - "кипить"
          - "кипіти"
        explanation: "Процес: вода кипить."
      - sentence: "Нехай соус ___ трохи."
        answer: "постоїть"
        options:
          - "стоїть"
          - "постоїть"
        explanation: "Конкретний короткий результат: постоїть."
      - sentence: "Хай діти ___ у дворі."
        answer: "граються"
        options:
          - "граються"
          - "гратися"
        explanation: "Діти -> граються."
      - sentence: "Нехай Олена ___ відповідь."
        answer: "напише"
        options:
          - "напише"
          - "писати"
        explanation: "Конкретний результат: напише."
      - sentence: "Хай Марко ___ до каси."
        answer: "піде"
        options:
          - "піде"
          - "ходити"
        explanation: "Один рух у напрямку: піде."
      - sentence: "___ урок разом."
        answer: "Починаймо"
        options:
          - "Починаймо"
          - "Починаємо"
        explanation: "Пропозиція для групи має форму на -мо."
      - sentence: "___ список сьогодні."
        answer: "Перевірмо"
        options:
          - "Перевірмо"
          - "Перевіряти"
        explanation: "Перевірмо = зробімо перевірку разом."
      - sentence: "___ потягом до Львова."
        answer: "Поїдьмо"
        options:
          - "Поїдьмо"
          - "Поїдемо"
        explanation: "Поїдьмо - наказова пропозиція для нас."
  - id: act-2
    type: quiz
    title: Вид у наказі
    instruction: Виберіть форму, яка краще відповідає ситуації.
    items:
      - question: "Загальна порада для щоденної практики."
        options:
          - "Читайте щодня."
          - "Прочитайте щодня."
          - "Будете читати щодня."
        correct: 0
        explanation: "Звична дія: недоконаний вид."
      - question: "Конкретне завдання: закінчити одну сторінку."
        options:
          - "Читайте цю сторінку до кінця вже."
          - "Прочитайте цю сторінку."
          - "Читати цю сторінку."
        correct: 1
        explanation: "Потрібен результат: прочитайте."
      - question: "Ввічлива інструкція в аудиторії."
        options:
          - "Сядьтеся, будь ласка."
          - "Сісти, будь ласка."
          - "Сідайте, будь ласка."
        correct: 2
        explanation: "Сідайте - природна ввічлива форма."
      - question: "Попередження перед дорогою."
        options:
          - "Не забути паспорт!"
          - "Не забудь паспорт!"
          - "Не забувай паспорт уже!"
        correct: 1
        explanation: "Доконана форма може звучати як попередження."
      - question: "Загальна порада про мовлення."
        options:
          - "Скажіть українською частіше."
          - "Говоріть українською частіше."
          - "Будете сказати українською."
        correct: 1
        explanation: "Загальна практика: говоріть."
      - question: "Конкретне прохання написати сьогодні."
        options:
          - "Напиши мені сьогодні."
          - "Пиши мені сьогодні і готово."
          - "Будеш написати сьогодні."
        correct: 0
        explanation: "Один завершений крок: напиши."
      - question: "Заборона відкривати вікно."
        options:
          - "Не відкрийте вікно."
          - "Не відкривайте вікно."
          - "Не відкрити вікно."
        correct: 1
        explanation: "Заперечна інструкція зазвичай недоконана."
      - question: "Одна завершена дія з дверима."
        options:
          - "Закривайте двері зараз."
          - "Закрий двері, будь ласка."
          - "Закривати двері."
        correct: 1
        explanation: "Очікуємо один результат: закрий."
  - id: act-3
    type: match-up
    title: Побажання
    instruction: З'єднайте звертання з природним побажанням.
    pairs:
      - left: "Оленко"
        right: "будь щасливою"
      - left: "Марку"
        right: "будь здоровим"
      - left: "Друзі"
        right: "будьте уважними"
      - left: "Мамо"
        right: "будь спокійною"
      - left: "Колеги"
        right: "будьте готовими"
      - left: "Ірино"
        right: "будь сміливою"
      - left: "Пане Андрію"
        right: "будьте обережним"
      - left: "Студенти"
        right: "будьте активними"
  - id: act-4
    type: unjumble
    title: Складіть наказ
    instruction: Поставте слова в природний порядок.
    items:
      - words:
          - "Хай"
          - "він"
          - "прочитає"
          - "інструкцію"
        answer: "Хай він прочитає інструкцію."
      - words:
          - "Нехай"
          - "вони"
          - "подзвонять"
          - "після"
          - "уроку"
        answer: "Нехай вони подзвонять після уроку."
      - words:
          - "Оленко"
          - "будь"
          - "щасливою"
        answer: "Оленко, будь щасливою."
      - words:
          - "Друзі"
          - "будьте"
          - "уважними"
        answer: "Друзі, будьте уважними."
      - words:
          - "Зробімо"
          - "це"
          - "сьогодні"
        answer: "Зробімо це сьогодні."
      - words:
          - "Поговорімо"
          - "після"
          - "уроку"
        answer: "Поговорімо після уроку."
      - words:
          - "Не"
          - "відкривайте"
          - "вікно"
        answer: "Не відкривайте вікно."
      - words:
          - "Прочитайте"
          - "цю"
          - "сторінку"
        answer: "Прочитайте цю сторінку."
workbook:
  - type: group-sort
    title: Яка форма наказу?
    instruction: Розподіліть репліки за моделлю.
    groups:
      - label: "2-га особа"
        items:
          - "прочитайте текст"
          - "наріжте цибулю"
          - "пишіть повільно"
          - "не відкривайте вікно"
      - label: "1-ша особа множини"
        items:
          - "починаймо"
          - "поговорімо"
          - "зробімо це"
          - "поїдьмо разом"
      - label: "3-тя особа з хай/нехай"
        items:
          - "хай він прийде"
          - "нехай вона прочитає"
          - "хай вони відпочинуть"
          - "нехай соус постоїть"
  - type: error-correction
    title: Виправте наказ
    instruction: Оберіть нормативний варіант.
    items:
      - sentence: "Хай він читати."
        error: "читати"
        correction: "Хай він читає."
        options:
          - "Хай він читає."
          - "Хай він читати."
        explanation: "Після хай потрібна особова форма."
      - sentence: "Олена, будь щаслива."
        error: "Олена / щаслива"
        correction: "Оленко, будь щасливою."
        options:
          - "Оленко, будь щасливою."
          - "Олена, будь щаслива."
        explanation: "Звертання + орудний."
      - sentence: "Давай робити це як наказову форму."
        error: "давай робити"
        correction: "Зробімо це."
        options:
          - "Зробімо це."
          - "Давай робити це."
        explanation: "У курсі тримаємо нормативну форму на -мо."
      - sentence: "Не відкрийте вікно."
        error: "відкрийте"
        correction: "Не відкривайте вікно."
        options:
          - "Не відкривайте вікно."
          - "Не відкрийте вікно."
        explanation: "Заперечна інструкція зазвичай недоконана."
      - sentence: "Друзі, будь здоровими."
        error: "будь"
        correction: "Друзі, будьте здоровими."
        options:
          - "Друзі, будьте здоровими."
          - "Друзі, будь здоровими."
        explanation: "Множина потребує форми будьте."
      - sentence: "Пане Андрій, будьте уважним."
        error: "Андрій"
        correction: "Пане Андрію, будьте уважним."
        options:
          - "Пане Андрію, будьте уважним."
          - "Пане Андрій, будьте уважним."
        explanation: "Кличний відмінок: Андрію."
      - sentence: "Прочитайте українською щодня."
        error: "прочитайте"
        correction: "Читайте українською щодня."
        options:
          - "Читайте українською щодня."
          - "Прочитайте українською щодня."
        explanation: "Щодня = повторення, недоконаний вид."
      - sentence: "Нехай діти гратися у дворі."
        error: "гратися"
        correction: "Нехай діти граються у дворі."
        options:
          - "Нехай діти граються у дворі."
          - "Нехай діти гратися у дворі."
        explanation: "Після нехай потрібна особова форма."
  - type: match-up
    title: Зробімо разом
    instruction: З'єднайте інфінітив із формою пропозиції.
    pairs:
      - left: "читати"
        right: "читаймо"
      - left: "ходити"
        right: "ходімо"
      - left: "зробити"
        right: "зробімо"
      - left: "поїхати"
        right: "поїдьмо"
      - left: "поговорити"
        right: "поговорімо"
      - left: "починати"
        right: "починаймо"
      - left: "сказати"
        right: "скажімо"
      - left: "перевірити"
        right: "перевірмо"
  - type: true-false
    title: Наказовий спосіб
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Хай і нехай можуть вводити наказ або побажання для третьої особи."
        answer: true
        explanation: "Так: хай він прочитає, нехай вони прийдуть."
      - statement: "Читаймо означає пропозицію для нас."
        answer: true
        explanation: "Це форма першої особи множини."
      - statement: "Будь здоровим має орудний відмінок."
        answer: true
        explanation: "Здоровим - орудний."
      - statement: "Після хай завжди стоїть інфінітив."
        answer: false
        explanation: "Потрібна особова форма: хай читає."
      - statement: "У курсі Зробімо це краще за Давай робити це для нормативної моделі."
        answer: true
        explanation: "Тренуємо форму на -мо."
      - statement: "Не відкривайте вікно - звична заперечна інструкція."
        answer: true
        explanation: "Заперечні інструкції часто мають недоконаний вид."
      - statement: "Оленко - кличний відмінок від Олена."
        answer: true
        explanation: "Так: Олена -> Оленко."
      - statement: "Прочитайте щодня - найкраща форма для повторюваної дії."
        answer: false
        explanation: "Краще: Читайте щодня."
  - type: fill-in
    title: Короткі репліки
    instruction: Оберіть природну форму.
    items:
      - sentence: "___ текст разом."
        answer: "Читаймо"
        options:
          - "Читаймо"
          - "Читаємо"
        explanation: "Пропозиція для нас: читаймо."
      - sentence: "Марку, ___ здоровим."
        answer: "будь"
        options:
          - "будь"
          - "будьте"
        explanation: "Одна людина: будь."
      - sentence: "Друзі, ___ уважними."
        answer: "будьте"
        options:
          - "будь"
          - "будьте"
        explanation: "Множина: будьте."
      - sentence: "Нехай вона ___ відповідь."
        answer: "скаже"
        options:
          - "скаже"
          - "казати"
        explanation: "Після нехай потрібна особова форма."
      - sentence: "___ двері, будь ласка."
        answer: "Закрий"
        options:
          - "Закрий"
          - "Закривати"
        explanation: "Один результат: закрий."
      - sentence: "Не ___ вікно."
        answer: "відкривайте"
        options:
          - "відкрийте"
          - "відкривайте"
        explanation: "Заперечна інструкція: недоконаний вид."
      - sentence: "___ список перед поїздкою."
        answer: "Перевірмо"
        options:
          - "Перевірмо"
          - "Перевіряти"
        explanation: "Спільна пропозиція: перевірмо."
      - sentence: "Хай вони ___ п'ять хвилин."
        answer: "відпочинуть"
        options:
          - "відпочинуть"
          - "відпочивати"
        explanation: "Потрібна особова форма множини."
