inline:
  - id: act-1
    type: quiz
    title: Процес чи результат?
    instruction: Choose the label that best fits the highlighted verb.
    items:
      - prompt: "Я довго читав звіт у поїзді."
        options:
          - text: "недоконаний: процес"
            correct: true
          - text: "доконаний: готовий результат"
            correct: false
          - text: "це не про вид дієслова"
            correct: false
        explanation: Довго shows the action from inside.
      - prompt: "Після обіду я прочитав звіт."
        options:
          - text: "доконаний: результат"
            correct: true
          - text: "недоконаний: звичка"
            correct: false
          - text: "кличний відмінок"
            correct: false
        explanation: Прочитав means the report is finished.
      - prompt: "Щосуботи ми готуємо вечерю разом."
        options:
          - text: "недоконаний: повторення"
            correct: true
          - text: "доконаний: один крок"
            correct: false
          - text: "майбутній час"
            correct: false
        explanation: Щосуботи points to habit and repetition.
      - prompt: "Нарешті вона написала відповідь."
        options:
          - text: "доконаний: готовий підсумок"
            correct: true
          - text: "недоконаний: фон"
            correct: false
          - text: "безособова форма"
            correct: false
        explanation: Нарешті and the finished reply point to result.
      - prompt: "Коли я вечеряв, мені подзвонили."
        options:
          - text: "недоконаний: процес у фоні"
            correct: true
          - text: "доконаний: межа"
            correct: false
          - text: "умова"
            correct: false
        explanation: The action forms the background for another event.
      - prompt: "Ми швидко купили квитки."
        options:
          - text: "доконаний: крок завершено"
            correct: true
          - text: "недоконаний: звичка"
            correct: false
          - text: "це прикметник"
            correct: false
        explanation: Купили shows a completed action with a clear outcome.
  - id: act-2
    type: match-up
    title: Де процес, а де межа?
    instruction: Match each sentence to the meaning it expresses.
    pairs:
      - left: "Я писав лист."
        right: "бачимо сам процес написання"
      - left: "Я написав лист."
        right: "лист уже готовий"
      - left: "Вона готувала вечерю."
        right: "дія тривала певний час"
      - left: "Вона приготувала вечерю."
        right: "вечеря вже готова"
      - left: "Ми шукали адресу."
        right: "пошук тривав"
      - left: "Ми побачили адресу."
        right: "результат настав в один момент"
  - id: act-3
    type: fill-in
    title: Вибери вид за ситуацією
    instruction: Choose the verb that fits the context best.
    items:
      - sentence: "Коли Марта ___ суп, я накривав на стіл."
        answer: "готувала"
        options:
          - "готувала"
          - "приготувала"
        explanation: The cooking is background process here.
      - sentence: "За двадцять хвилин Марта ___ суп, і ми сіли їсти."
        answer: "приготувала"
        options:
          - "готувала"
          - "приготувала"
        explanation: The soup is ready; result matters.
      - sentence: "Я часто ___ новини перед роботою."
        answer: "читаю"
        options:
          - "читаю"
          - "прочитаю"
        explanation: Часто marks habit, not a single completed event.
      - sentence: "Сьогодні вранці я вже ___ новини."
        answer: "прочитав"
        options:
          - "читав"
          - "прочитав"
        explanation: Уже shows completed result.
      - sentence: "Увесь вечір ми ___ про подорож."
        answer: "говорили"
        options:
          - "говорили"
          - "сказали"
        explanation: Увесь вечір points to duration and process.
      - sentence: "На зустрічі директор коротко ___ головне рішення."
        answer: "сказав"
        options:
          - "говорив"
          - "сказав"
        explanation: One finished speech act is needed here.
  - id: act-4
    type: group-sort
    title: Маркери виду
    instruction: Sort each word or phrase into the column where it fits best.
    groups:
      - name: "частіше недоконаний"
        items:
          - "щодня"
          - "зазвичай"
          - "довго"
          - "коли"
      - name: "частіше доконаний"
        items:
          - "нарешті"
          - "раптом"
          - "уже"
          - "відразу"
workbook:
  - type: true-false
    title: Що говорить вид?
    instruction: Decide whether each statement is true.
    items:
      - statement: "Недоконаний вид часто показує процес або звичку."
        answer: true
        explanation: It often describes an action from inside or as repetition.
      - statement: "Доконаний вид у реченні завжди означає теперішній час."
        answer: false
        explanation: Perfective forms usually point to result and can signal future, not present.
      - statement: "Учора can stand with both aspects."
        answer: true
        explanation: Учора я читав and Учора я прочитав mean different things.
      - statement: "У парі писати / написати змінюється лише стиль, а не смисл."
        answer: false
        explanation: The focus changes from process to result.
      - statement: "У реальній історії фон часто стоїть у недоконаному виді, а події-результати - у доконаному."
        answer: true
        explanation: This is a common narrative pattern.
  - type: error-correction
    title: Виправ фокус
    instruction: Choose the sentence that fits the context better.
    items:
      - sentence: "Щодня я прочитаю пошту перед роботою."
        error: "прочитаю"
        correction: "Щодня я читаю пошту перед роботою."
        options:
          - "Щодня я читаю пошту перед роботою."
          - "Щодня я прочитаю пошту перед роботою."
        explanation: Habit needs an imperfective form.
      - sentence: "Нарешті я писав заяву."
        error: "писав"
        correction: "Нарешті я написав заяву."
        options:
          - "Нарешті я написав заяву."
          - "Нарешті я писав заяву."
        explanation: Нарешті points to a completed result.
      - sentence: "Коли Олена приготувала вечерю, я різав салат."
        error: "приготувала"
        correction: "Коли Олена готувала вечерю, я різав салат."
        options:
          - "Коли Олена готувала вечерю, я різав салат."
          - "Коли Олена приготувала вечерю, я різав салат."
        explanation: The first action is background process.
      - sentence: "Я вже читав цю коротку інструкцію."
        error: "читав"
        correction: "Я вже прочитав цю коротку інструкцію."
        options:
          - "Я вже прочитав цю коротку інструкцію."
          - "Я вже читав цю коротку інструкцію."
        explanation: Уже emphasizes finished result.
  - type: match-up
    title: Запитання до ситуації
    instruction: Match the question with the better aspect focus.
    pairs:
      - left: "Чим ти займався ввечері?"
        right: "недоконаний: процес"
      - left: "Що ти вже зробив?"
        right: "доконаний: результат"
      - left: "Що ти зазвичай робиш після роботи?"
        right: "недоконаний: звичка"
      - left: "Що сталося раптом?"
        right: "доконаний: одна подія"
