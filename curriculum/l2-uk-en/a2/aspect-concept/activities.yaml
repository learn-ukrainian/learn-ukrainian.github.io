inline:
  - id: act-1
    type: quiz
    title: Процес чи результат?
    instruction: Оберіть підпис, який найкраще пояснює виділене дієслово.
    items:
      - prompt: "Я довго читав звіт у поїзді."
        options:
          - text: "недоконаний: процес"
            correct: true
          - text: "доконаний: готовий результат"
            correct: false
          - text: "це не про вид дієслова"
            correct: false
        explanation: Довго показує дію зсередини, як процес.
      - prompt: "Після обіду я прочитав звіт."
        options:
          - text: "доконаний: результат"
            correct: true
          - text: "недоконаний: звичка"
            correct: false
          - text: "кличний відмінок"
            correct: false
        explanation: Прочитав означає, що звіт уже готовий.
      - prompt: "Щосуботи ми готуємо вечерю разом."
        options:
          - text: "недоконаний: повторення"
            correct: true
          - text: "доконаний: один крок"
            correct: false
          - text: "майбутній час"
            correct: false
        explanation: Щосуботи показує звичку й повторення.
      - prompt: "Нарешті вона написала відповідь."
        options:
          - text: "доконаний: готовий підсумок"
            correct: true
          - text: "недоконаний: фон"
            correct: false
          - text: "безособова форма"
            correct: false
        explanation: Нарешті й готова відповідь показують результат.
      - prompt: "Коли я вечеряв, мені подзвонили."
        options:
          - text: "недоконаний: процес у фоні"
            correct: true
          - text: "доконаний: межа"
            correct: false
          - text: "умова"
            correct: false
        explanation: Дія створює фон для іншої події.
      - prompt: "Ми швидко купили квитки."
        options:
          - text: "доконаний: крок завершено"
            correct: true
          - text: "недоконаний: звичка"
            correct: false
          - text: "це прикметник"
            correct: false
        explanation: Купили показує завершену дію з чітким результатом.
      - prompt: "У неділю ми дивилися серіал."
        options:
          - text: "недоконаний: опис вечора"
            correct: true
          - text: "доконаний: серіал точно завершено"
            correct: false
          - text: "це форма кличного відмінка"
            correct: false
        explanation: Дивилися може описувати процес або фон вечора.
      - prompt: "У неділю ми подивилися серіал до кінця."
        options:
          - text: "доконаний: результат завершено"
            correct: true
          - text: "недоконаний: повторення"
            correct: false
          - text: "це загальний факт"
            correct: false
        explanation: До кінця й подивилися показують завершений результат.
  - id: act-2
    type: match-up
    title: Де процес, а де межа?
    instruction: З'єднайте речення зі значенням, яке воно передає.
    pairs:
      - left: "Я писав лист."
        right: "бачимо сам процес написання"
      - left: "Я написав лист."
        right: "лист уже готовий"
      - left: "Вона готувала вечерю."
        right: "дія тривала певний час"
      - left: "Вона приготувала вечерю."
        right: "вечеря вже готова"
      - left: "Ми шукали адресу."
        right: "пошук тривав"
      - left: "Ми знайшли адресу."
        right: "результат настав в один момент"
      - left: "Ми дивилися серіал."
        right: "вечір описано як процес"
      - left: "Ми подивилися серіал."
        right: "серіал завершено як подію"
  - id: act-3
    type: fill-in
    title: Вибери вид за ситуацією
    instruction: Оберіть дієслово, яке найкраще підходить до ситуації.
    items:
      - sentence: "Коли Марта ___ суп, я накривав на стіл."
        answer: "готувала"
        options:
          - "готувала"
          - "приготувала"
        explanation: Тут готування є фоновим процесом.
      - sentence: "За двадцять хвилин Марта ___ суп, і ми сіли їсти."
        answer: "приготувала"
        options:
          - "готувала"
          - "приготувала"
        explanation: Суп уже готовий; важливий результат.
      - sentence: "Я часто ___ новини перед роботою."
        answer: "читаю"
        options:
          - "читаю"
          - "прочитаю"
        explanation: Часто позначає звичку, а не одну завершену подію.
      - sentence: "Сьогодні вранці я вже ___ новини."
        answer: "прочитав"
        options:
          - "читав"
          - "прочитав"
        explanation: Уже показує завершений результат.
      - sentence: "Увесь вечір ми ___ про подорож."
        answer: "говорили"
        options:
          - "говорили"
          - "сказали"
        explanation: Увесь вечір показує тривалість і процес.
      - sentence: "На зустрічі директор коротко ___ головне рішення."
        answer: "сказав"
        options:
          - "говорив"
          - "сказав"
        explanation: Тут потрібна одна завершена мовленнєва дія.
      - sentence: "Поки ми ___ адресу, Олена чекала біля метро."
        answer: "шукали"
        options:
          - "шукали"
          - "знайшли"
        explanation: Поки показує процес пошуку як фон.
      - sentence: "Нарешті ми ___ адресу і пішли далі."
        answer: "знайшли"
        options:
          - "шукали"
          - "знайшли"
        explanation: Нарешті показує досягнутий результат.
  - id: act-4
    type: group-sort
    title: Маркери виду
    instruction: Розподіліть слова й фрази за відповідними колонками.
    groups:
      - name: "частіше недоконаний"
        items:
          - "щодня"
          - "зазвичай"
          - "довго"
          - "коли"
      - name: "частіше доконаний"
        items:
          - "нарешті"
          - "раптом"
          - "уже"
          - "відразу"
workbook:
  - type: true-false
    title: Що говорить вид?
    instruction: Визначте, чи правильне кожне твердження.
    items:
      - statement: "Недоконаний вид часто показує процес або звичку."
        answer: true
        explanation: Він часто описує дію зсередини або як повторення.
      - statement: "Доконаний вид у реченні завжди означає теперішній час."
        answer: false
        explanation: Доконані форми зазвичай показують результат і можуть вказувати на майбутнє, не теперішнє.
      - statement: "Учора може стояти з обома видами."
        answer: true
        explanation: Учора я читав і Учора я прочитав означають різні речі.
      - statement: "У парі писати / написати змінюється лише стиль, а не смисл."
        answer: false
        explanation: Фокус змінюється з процесу на результат.
      - statement: "У реальній історії фон часто стоїть у недоконаному виді, а події-результати - у доконаному."
        answer: true
        explanation: Це типова модель для розповіді.
  - type: error-correction
    title: Виправ фокус
    instruction: Оберіть речення, яке краще підходить до контексту.
    items:
      - sentence: "Щодня я прочитаю пошту перед роботою."
        error: "прочитаю"
        correction: "Щодня я читаю пошту перед роботою."
        options:
          - "Щодня я читаю пошту перед роботою."
          - "Щодня я прочитаю пошту перед роботою."
        explanation: Для звички потрібна недоконана форма.
      - sentence: "Нарешті я писав відповідь."
        error: "писав"
        correction: "Нарешті я написав відповідь."
        options:
          - "Нарешті я написав відповідь."
          - "Нарешті я писав відповідь."
        explanation: Нарешті вказує на завершений результат.
      - sentence: "Поки Олена приготувала вечерю, я різав салат."
        error: "приготувала"
        correction: "Поки Олена готувала вечерю, я різав салат."
        options:
          - "Поки Олена готувала вечерю, я різав салат."
          - "Поки Олена приготувала вечерю, я різав салат."
        explanation: Перша дія є фоновим процесом.
      - sentence: "За п'ять хвилин я читав коротку інструкцію."
        error: "читав"
        correction: "За п'ять хвилин я прочитав коротку інструкцію."
        options:
          - "За п'ять хвилин я прочитав коротку інструкцію."
          - "За п'ять хвилин я читав коротку інструкцію."
        explanation: За п'ять хвилин підкреслює завершений результат.
      - sentence: "Учора я написав лист дві години."
        error: "написав"
        correction: "Учора я писав лист дві години."
        options:
          - "Учора я писав лист дві години."
          - "Учора я написав лист дві години."
        explanation: Дві години показує тривалість процесу.
      - sentence: "Ми часто купили хліб у цій крамниці."
        error: "купили"
        correction: "Ми часто купуємо хліб у цій крамниці."
        options:
          - "Ми часто купуємо хліб у цій крамниці."
          - "Ми часто купили хліб у цій крамниці."
        explanation: Часто показує звичку, тому потрібен недоконаний вид.
      - sentence: "Нарешті він відчиняв двері."
        error: "відчиняв"
        correction: "Нарешті він відчинив двері."
        options:
          - "Нарешті він відчинив двері."
          - "Нарешті він відчиняв двері."
        explanation: Нарешті показує завершений крок.
      - sentence: "Увесь вечір вона написала відповідь."
        error: "написала"
        correction: "Увесь вечір вона писала відповідь."
        options:
          - "Увесь вечір вона писала відповідь."
          - "Увесь вечір вона написала відповідь."
        explanation: Увесь вечір показує процес, а не одну межу.
      - sentence: "Завтра я буду прочитати цю статтю."
        error: "буду прочитати"
        correction: "Завтра я прочитаю цю статтю."
        options:
          - "Завтра я прочитаю цю статтю."
          - "Завтра я буду прочитати цю статтю."
        explanation: Доконаний вид у майбутньому має просту форму.
      - sentence: "Я зараз напишу листа для мами."
        error: "напишу"
        correction: "Я зараз пишу листа для мами."
        options:
          - "Я зараз пишу листа для мами."
          - "Я зараз напишу листа для мами."
        explanation: Якщо дія відбувається зараз, потрібен недоконаний вид.
      - sentence: "Вчора я прочитав книгу дві години."
        error: "прочитав"
        correction: "Вчора я читав книгу дві години."
        options:
          - "Вчора я читав книгу дві години."
          - "Вчора я прочитав книгу дві години."
        explanation: Дві години показує процес, а не готовий результат.
      - sentence: "Я є писати завдання."
        error: "є писати"
        correction: "Я пишу завдання."
        options:
          - "Я пишу завдання."
          - "Я є писати завдання."
        explanation: Українська форма пишу вже показує дію зараз.
      - sentence: "Він часто дати мені гроші."
        error: "дати"
        correction: "Він часто дає мені гроші."
        options:
          - "Він часто дає мені гроші."
          - "Він часто дати мені гроші."
        explanation: Часто потребує звичної недоконаної форми.
      - sentence: "Щовечора він написав коротке повідомлення."
        error: "написав"
        correction: "Щовечора він писав коротке повідомлення."
        options:
          - "Щовечора він писав коротке повідомлення."
          - "Щовечора він написав коротке повідомлення."
        explanation: Щовечора показує звичку, а не один завершений результат.
  - type: match-up
    title: Запитання до ситуації
    instruction: З'єднайте запитання з кращим видовим фокусом.
    pairs:
      - left: "Чим ти займався ввечері?"
        right: "недоконаний: процес"
      - left: "Що ти вже зробив?"
        right: "доконаний: результат"
      - left: "Що ти зазвичай робиш після роботи?"
        right: "недоконаний: звичка"
      - left: "Що сталося раптом?"
        right: "доконаний: одна подія"
  - type: fill-in
    title: Маркер допомагає
    instruction: Оберіть форму, яка краще підходить до маркера в реченні.
    items:
      - sentence: "Я ___ цю вправу щодня."
        answer: "роблю"
        options:
          - "роблю"
          - "зроблю"
        explanation: Щодня показує звичку, тому потрібен недоконаний вид.
      - sentence: "Я вже ___ цю вправу."
        answer: "зробив"
        options:
          - "робив"
          - "зробив"
        explanation: Уже підкреслює готовий результат.
      - sentence: "Вона довго ___ лист."
        answer: "писала"
        options:
          - "писала"
          - "написала"
        explanation: Довго показує процес.
      - sentence: "Вона нарешті ___ лист."
        answer: "написала"
        options:
          - "писала"
          - "написала"
        explanation: Нарешті підкреслює завершення.
      - sentence: "Коли ми ___ фільм, подзвонив тато."
        answer: "дивилися"
        options:
          - "дивилися"
          - "подивилися"
        explanation: Перша дія створює фон.
      - sentence: "Увечері ми ___ фільм до кінця."
        answer: "подивилися"
        options:
          - "дивилися"
          - "подивилися"
        explanation: До кінця показує завершений результат.
  - type: quiz
    title: Поясни вибір
    instruction: Оберіть найкраще пояснення для виділеної форми.
    items:
      - prompt: "Ми довго шукали адресу."
        options:
          - text: "бачимо процес пошуку"
            correct: true
          - text: "адресу вже точно знайшли"
            correct: false
          - text: "це кличний відмінок"
            correct: false
        explanation: Довго й шукали показують процес без обов'язкового результату.
      - prompt: "Ми знайшли адресу."
        options:
          - text: "результат уже є"
            correct: true
          - text: "це тривала звичка"
            correct: false
          - text: "це майбутній план"
            correct: false
        explanation: Знайшли показує досягнутий результат.
      - prompt: "У нашій групі всі читають українською."
        options:
          - text: "загальний факт або звичка"
            correct: true
          - text: "один завершений крок"
            correct: false
          - text: "готовий підсумок"
            correct: false
        explanation: Тут описано звичну реальність, а не фінальну точку.
      - prompt: "Сестра відразу передзвонила."
        options:
          - text: "один завершений крок"
            correct: true
          - text: "довгий процес"
            correct: false
          - text: "повторення щодня"
            correct: false
        explanation: Відразу й передзвонила показують конкретну завершену дію.
  - type: mark-the-words
    title: Знайди дієслова виду
    instruction: Позначте дієслова, які показують процес або результат.
    text: "Учора я довго писав звіт, а ввечері написав короткий лист. Потім читав новини і прочитав одне повідомлення."
    targets:
      - "писав"
      - "написав"
      - "читав"
      - "прочитав"
  - type: essay-response
    title: "Міні-письмо: процес і результат"
    instruction: Напишіть 4-5 коротких речень українською.
    prompt: "Опишіть один вечір. Використайте один процес і один завершений результат. Можна писати про вечерю, лист, звіт або фільм."
    min_words: 25
    source_reading: "Моделі з уроку: я писав лист / я написав лист; ми дивилися серіал / ми подивилися серіал."
    model_answer: "Учора ввечері я довго готував вечерю. Потім я приготував салат. Після вечері я писав повідомлення другові. О десятій я написав коротку відповідь."
    peer_review_guidelines:
      - "Позначте одне речення з процесом."
      - "Позначте одне речення з завершеним результатом."
      - "Перевірте, що текст має 4-5 коротких речень."
    rubric:
      aspect: "Є один процес і один завершений результат."
      clarity: "Речення короткі й зрозумілі."
      completion: "Є 4-5 речень і всі вимоги виконано."
  - type: group-sort
    title: Фон чи крок?
    instruction: Розподіліть речення за тим, як вони показують дію.
    groups:
      - name: "фон або процес"
        items:
          - "Я готував вечерю."
          - "Вона читала звіт."
          - "Ми говорили про план."
          - "Діти грали у дворі."
      - name: "готовий крок"
        items:
          - "Я приготував вечерю."
          - "Вона прочитала звіт."
          - "Ми сказали головне."
          - "Діти забили гол."
