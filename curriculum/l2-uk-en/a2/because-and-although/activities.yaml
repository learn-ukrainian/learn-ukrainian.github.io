inline:
  - id: act-1
    type: group-sort
    title: Який зв'язок?
    instruction: Розподіліть сполучники та фрази за типом зв'язку.
    groups:
      - label: "причина"
        items:
          - "бо"
          - "тому що"
          - "через те що"
      - label: "допуст"
        items:
          - "хоча"
          - "попри це"
          - "незважаючи на це"
      - label: "протиставлення"
        items:
          - "але"
          - "проте"
          - "однак"
      - label: "додавання"
        items:
          - "і"
          - "та"
  - id: act-2
    type: fill-in
    title: Причина чи допуст?
    instruction: Оберіть сполучник, який найкраще завершує речення.
    items:
      - sentence: "Я залишився вдома, ___ захворів."
        answer: "бо"
        options:
          - "бо"
          - "хоча"
        explanation: "Це причина: чому залишився?"
      - sentence: "___ я захворів, я написав викладачу."
        answer: "Хоча"
        options:
          - "Хоча"
          - "Тому що"
        explanation: "Є перешкода, але дія все одно відбулася."
      - sentence: "Ми почали раніше, ___ дорога довга."
        answer: "тому що"
        options:
          - "тому що"
          - "але"
        explanation: "Друга частина пояснює причину."
      - sentence: "Завдання коротке, ___ не просте."
        answer: "але"
        options:
          - "але"
          - "бо"
        explanation: "Це протиставлення, не причина."
      - sentence: "___ день був довгий, ми повторили тему."
        answer: "Хоча"
        options:
          - "Хоча"
          - "Бо"
        explanation: "Довгий день міг завадити, але не завадив."
      - sentence: "Я взяв парасолю, ___ йшов дощ."
        answer: "бо"
        options:
          - "бо"
          - "проте"
        explanation: "Дощ є причиною."
      - sentence: "Вона хотіла відпочити, ___ мала зустріч."
        answer: "але"
        options:
          - "але"
          - "тому що"
        explanation: "Дві ідеї протиставляються."
      - sentence: "Я слухав уважно, ___ тема була знайома."
        answer: "хоча"
        options:
          - "хоча"
          - "тому що"
        explanation: "Знайома тема не зупинила уважність."
  - id: act-3
    type: match-up
    title: З'єднайте частини речення
    instruction: Доберіть природне продовження.
    pairs:
      - left: "Я не прийшов на зустріч,"
        right: "бо мав візит до лікаря."
      - left: "Хоча автобус запізнився,"
        right: "ми встигли на початок."
      - left: "Вона повторила правило,"
        right: "тому що завтра контрольна."
      - left: "Я хотів піти додому,"
        right: "але залишився на лекції."
      - left: "Ми зробили вправу,"
        right: "і викладач пояснив помилки."
      - left: "Хоча текст був довгий,"
        right: "студенти зрозуміли головну думку."
      - left: "День був складний,"
        right: "проте ми закінчили проєкт."
      - left: "Я записав адресу,"
        right: "бо не хотів її забути."
  - id: act-4
    type: unjumble
    title: Складіть складне речення
    instruction: Поставте слова в природний порядок.
    items:
      - words:
          - "Я"
          - "залишився"
          - "вдома,"
          - "бо"
          - "хворів"
        answer: "Я залишився вдома, бо хворів."
      - words:
          - "Хоча"
          - "було"
          - "пізно,"
          - "ми"
          - "закінчили"
          - "вправу"
        answer: "Хоча було пізно, ми закінчили вправу."
      - words:
          - "Вона"
          - "слухала"
          - "уважно,"
          - "тому"
          - "що"
          - "тема"
          - "нова"
        answer: "Вона слухала уважно, тому що тема нова."
      - words:
          - "Я"
          - "втомився,"
          - "але"
          - "піду"
          - "на"
          - "заняття"
        answer: "Я втомився, але піду на заняття."
      - words:
          - "Хоча"
          - "дощить,"
          - "ми"
          - "підемо"
          - "до"
          - "бібліотеки"
        answer: "Хоча дощить, ми підемо до бібліотеки."
      - words:
          - "Ми"
          - "повторили"
          - "правило,"
          - "і"
          - "урок"
          - "став"
          - "легшим"
        answer: "Ми повторили правило, і урок став легшим."
      - words:
          - "Я"
          - "купив"
          - "каву,"
          - "бо"
          - "мав"
          - "перерву"
        answer: "Я купив каву, бо мав перерву."
      - words:
          - "Завдання"
          - "коротке,"
          - "однак"
          - "воно"
          - "важливе"
        answer: "Завдання коротке, однак воно важливе."
workbook:
  - type: quiz
    title: Оберіть правильний сполучник
    instruction: Виберіть речення, яке найкраще відповідає ситуації.
    items:
      - question: "Потрібно пояснити причину запізнення."
        options:
          - "Я запізнився, бо автобус не їхав."
          - "Я запізнився, хоча автобус не їхав."
          - "Я запізнився, але автобус не їхав."
        correct: 0
        explanation: "Причина відповідає на питання чому."
      - question: "Потрібно сказати: дощ був, але прогулянка теж була."
        options:
          - "Хоча йшов дощ, ми гуляли."
          - "Тому що йшов дощ, ми гуляли."
          - "Ми гуляли, бо йшов дощ."
        correct: 0
        explanation: "Це допуст: попри дощ."
      - question: "Потрібно протиставити бажання і реальність."
        options:
          - "Я хотів спати, але мав роботу."
          - "Я хотів спати, тому що мав роботу."
          - "Я хотів спати, бо мав роботу."
        correct: 0
        explanation: "Але поєднує дві рівні контрастні частини."
      - question: "Потрібно пояснити офіційніше."
        options:
          - "Я не був на парі, тому що мав візит до лікаря."
          - "Я не був на парі, але мав візит до лікаря."
          - "Я не був на парі, хоча мав візит до лікаря."
        correct: 0
        explanation: "Тому що звучить нейтрально і пояснює причину."
      - question: "Потрібно додати другу подію."
        options:
          - "Я відкрив ноутбук, і ми почали зустріч."
          - "Я відкрив ноутбук, бо ми почали зустріч."
          - "Я відкрив ноутбук, хоча ми почали зустріч."
        correct: 0
        explanation: "І додає другу рівну частину."
      - question: "Потрібно уникнути подвійного хоча + але."
        options:
          - "Хоча було пізно, ми продовжили."
          - "Хоча було пізно, але ми продовжили."
          - "Було пізно, тому що ми продовжили."
        correct: 0
        explanation: "Після початкового хоча достатньо головної частини."
      - question: "Потрібно сказати коротко й розмовно."
        options:
          - "Почекай, бо двері зачинені."
          - "Почекай, однак двері зачинені."
          - "Почекай, хоча двері зачинені."
        correct: 0
        explanation: "Бо добре працює у короткому поясненні."
      - question: "Потрібно показати письмовий контраст."
        options:
          - "Завдання коротке, проте важливе."
          - "Завдання коротке, бо важливе."
          - "Завдання коротке, тому що важливе."
        correct: 0
        explanation: "Проте показує контраст і звучить письмовіше."
  - type: error-correction
    title: Виправте зв'язок
    instruction: Оберіть природне виправлення.
    items:
      - sentence: "Я не прийшов, тому я хворів."
        error: "тому я"
        correction: "Я не прийшов, тому що хворів."
        options:
          - "Я не прийшов, тому що хворів."
          - "Я не прийшов, але хворів."
        explanation: "Для причини потрібне тому що."
      - sentence: "Хоча я втомився, але я піду."
        error: "але"
        correction: "Хоча я втомився, я піду."
        options:
          - "Хоча я втомився, я піду."
          - "Тому що я втомився, я піду."
        explanation: "Після початкового хоча не треба але."
      - sentence: "Я піду бо треба."
        error: "піду бо"
        correction: "Я піду, бо треба."
        options:
          - "Я піду, бо треба."
          - "Я піду бо, треба."
        explanation: "Кома стоїть перед бо."
      - sentence: "Ми зробили вправу, та повторили правило."
        error: "вправу, та"
        correction: "Ми зробили вправу та повторили правило."
        options:
          - "Ми зробили вправу та повторили правило."
          - "Ми зробили вправу, тому що повторили правило."
        explanation: "Один підмет і дві дії не потребують коми перед та."
      - sentence: "Вона читає, хоча хоче зрозуміти текст."
        error: "хоча"
        correction: "Вона читає, бо хоче зрозуміти текст."
        options:
          - "Вона читає, бо хоче зрозуміти текст."
          - "Вона читає, але хоче зрозуміти текст."
        explanation: "Бажання зрозуміти є причиною."
      - sentence: "Я був зайнятий, тому що допоміг."
        error: "тому що"
        correction: "Я був зайнятий, але допоміг."
        options:
          - "Я був зайнятий, але допоміг."
          - "Я був зайнятий, бо допоміг."
        explanation: "Тут потрібен контраст між зайнятістю і дією."
      - sentence: "Хоча текст легкий, тому ми його читаємо."
        error: "Хоча"
        correction: "Ми читаємо текст, тому що він легкий."
        options:
          - "Ми читаємо текст, тому що він легкий."
          - "Хоча текст легкий, але ми його читаємо."
        explanation: "Легкість є причиною, не перешкодою."
      - sentence: "Дощ ішов, бо ми гуляли."
        error: "бо"
        correction: "Дощ ішов, але ми гуляли."
        options:
          - "Дощ ішов, але ми гуляли."
          - "Дощ ішов, тому що ми гуляли."
        explanation: "Прогулянка не є причиною дощу."
  - type: true-false
    title: Перевірте правило
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Бо зазвичай звучить розмовніше, ніж тому що."
        correct: true
        explanation: "Обидва слова означають причину, але мають різний регістр."
      - statement: "Хоча відповідає на питання чому."
        correct: false
        explanation: "Хоча показує допуст: попри що."
      - statement: "Після початкового хоча в навчальному письмі краще не додавати але."
        correct: true
        explanation: "Достатньо моделі: Хоча..., ..."
      - statement: "Але поєднує дві рівні контрастні частини."
        correct: true
        explanation: "Це сурядний зв'язок."
      - statement: "У реченні Я хворів, але залишився вдома слово але показує причину."
        correct: false
        explanation: "Тут логічніше: Я залишився вдома, бо хворів."
      - statement: "Тому що може вводити нейтральне пояснення."
        correct: true
        explanation: "Це добра модель для письма й усного пояснення."
  - type: fill-in
    title: Мій короткий текст
    instruction: Доповніть речення природними сполучниками.
    items:
      - sentence: "Я встав рано, ___ мав першу пару."
        answer: "бо"
        options:
          - "бо"
          - "хоча"
        explanation: "Пара є причиною."
      - sentence: "___ я хотів спати, я зробив зарядку."
        answer: "Хоча"
        options:
          - "Хоча"
          - "Тому що"
        explanation: "Сонливість не зупинила дію."
      - sentence: "Я відкрив підручник, ___ ми почали вправу."
        answer: "і"
        options:
          - "і"
          - "бо"
        explanation: "Дві послідовні дії."
      - sentence: "Тема знайома, ___ приклади нові."
        answer: "але"
        options:
          - "але"
          - "тому що"
        explanation: "Контраст між знайомою темою і новими прикладами."
      - sentence: "Ми повторили правило, ___ воно буде на тесті."
        answer: "тому що"
        options:
          - "тому що"
          - "однак"
        explanation: "Друга частина пояснює причину."
      - sentence: "___ вправа була довга, я зробив її до кінця."
        answer: "Хоча"
        options:
          - "Хоча"
          - "Бо"
        explanation: "Довжина була перешкодою, але результат є."
