inline:
  - id: act-1
    type: match-up
    title: Частини слова
    instruction: З'єднайте термін з поясненням.
    pairs:
      - left: "основа"
        right: "слово без закінчення"
      - left: "закінчення"
        right: "змінна граматична частина"
      - left: "корінь"
        right: "головне лексичне значення"
      - left: "префікс"
        right: "стоїть перед коренем"
      - left: "суфікс"
        right: "стоїть після кореня"
      - left: "спільнокореневі слова"
        right: "слова зі спільним коренем"
      - left: "самостійна частина мови"
        right: "має власне значення"
      - left: "службова частина мови"
        right: "будує зв'язки між словами"
  - id: act-2
    type: group-sort
    title: Сім'ї слів
    instruction: Розподіліть слова за коренями.
    groups:
      - label: "пис-"
        items:
          - "писати"
          - "запис"
          - "підпис"
          - "переписати"
      - label: "школ-"
        items:
          - "школа"
          - "шкільний"
          - "школяр"
          - "дошкільний"
      - label: "чит-"
        items:
          - "читати"
          - "читач"
          - "прочитати"
          - "читання"
  - id: act-3
    type: fill-in
    title: Будова слова
    instruction: Оберіть правильний термін.
    items:
      - sentence: "У слові `написати` частина `на-` - це ___."
        answer: "префікс"
        options:
          - "префікс"
          - "закінчення"
          - "сполучник"
        explanation: "Префікс стоїть перед коренем."
      - sentence: "У слові `книгою` частина `-ою` - це ___."
        answer: "закінчення"
        options:
          - "закінчення"
          - "підмет"
          - "префікс"
        explanation: "Закінчення показує орудний відмінок."
      - sentence: "У словах `писати`, `запис`, `підпис` спільний ___."
        answer: "корінь"
        options:
          - "корінь"
          - "суфікс"
          - "присудок"
        explanation: "Ці слова мають спільне значення писання."
      - sentence: "`Школяр` має суфікс ___."
        answer: "-яр"
        options:
          - "-яр"
          - "на-"
          - "-ою"
        explanation: "Суфікс стоїть після кореня."
      - sentence: "Основа - це слово без ___."
        answer: "закінчення"
        options:
          - "закінчення"
          - "підмета"
          - "наголосу"
        explanation: "Основа залишається, коли змінюється закінчення."
      - sentence: "`Не` у фразі `не знаю` - це ___."
        answer: "частка"
        options:
          - "частка"
          - "іменник"
          - "корінь"
        explanation: "`Не` - службова частина мови."
  - id: act-4
    type: quiz
    title: Частина мови
    instruction: Оберіть правильну групу.
    items:
      - question: "`книга`"
        options:
          - "іменник"
          - "прийменник"
          - "частка"
        correct: 0
        explanation: "`Книга` називає предмет."
      - question: "`новий`"
        options:
          - "прикметник"
          - "сполучник"
          - "вигук"
        correct: 0
        explanation: "`Новий` описує іменник."
      - question: "`читати`"
        options:
          - "дієслово"
          - "прийменник"
          - "числівник"
        correct: 0
        explanation: "`Читати` називає дію."
      - question: "`до`"
        options:
          - "прийменник"
          - "іменник"
          - "прислівник"
        correct: 0
        explanation: "`До` будує зв'язок і керує родовим."
      - question: "`але`"
        options:
          - "сполучник"
          - "корінь"
          - "закінчення"
        correct: 0
        explanation: "`Але` з'єднує частини речення."
      - question: "`не`"
        options:
          - "частка"
          - "прикметник"
          - "суфікс"
        correct: 0
        explanation: "`Не` є службовою частиною мови."
      - question: "`швидко`"
        options:
          - "прислівник"
          - "іменник"
          - "префікс"
        correct: 0
        explanation: "`Швидко` відповідає на питання як?"
      - question: "`ой`"
        options:
          - "вигук"
          - "числівник"
          - "закінчення"
        correct: 0
        explanation: "`Ой` виражає емоцію."
workbook:
  - type: mark-the-words
    title: Знайдіть службові слова
    instruction: Позначте службові частини мови.
    text: "Я йду до школи, бо маю урок, але не маю зошита."
    targets:
      - "до"
      - "бо"
      - "але"
      - "не"
  - type: error-correction
    title: Виправте морфологічний опис
    instruction: Оберіть правильний опис.
    items:
      - sentence: "У слові `книгою` частина `-ою` - суфікс."
        error: "суфікс"
        correction: "У слові `книгою` частина `-ою` - закінчення."
        options:
          - "У слові `книгою` частина `-ою` - закінчення."
          - "У слові `книгою` частина `-ою` - підмет."
        explanation: "Ця частина показує граматичну форму."
      - sentence: "`До` - самостійна частина мови."
        error: "самостійна"
        correction: "`До` - службова частина мови."
        options:
          - "`До` - службова частина мови."
          - "`До` - корінь слова."
        explanation: "Прийменник будує зв'язок між словами."
      - sentence: "`Писати` і `підпис` не мають спільного кореня."
        error: "не мають"
        correction: "`Писати` і `підпис` мають спільний корінь."
        options:
          - "`Писати` і `підпис` мають спільний корінь."
          - "`Писати` і `підпис` - це прийменники."
        explanation: "Обидва слова пов'язані з писанням."
