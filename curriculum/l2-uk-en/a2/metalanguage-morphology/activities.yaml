inline:
  - id: act-1
    type: match-up
    title: Частини мови
    instruction: З'єднайте частину мови з питанням або прикладами.
    pairs:
      - left: "іменник"
        right: "хто? що?"
      - left: "прикметник"
        right: "який? чий?"
      - left: "числівник"
        right: "скільки? котрий?"
      - left: "займенник"
        right: "я, ти, цей, мій"
      - left: "дієслово"
        right: "що робити? що зробити?"
      - left: "прислівник"
        right: "як? де? коли?"
      - left: "прийменник"
        right: "у, на, до, з"
      - left: "сполучник"
        right: "і, але, бо, щоб"
      - left: "частка"
        right: "не, би, ж, хай"
      - left: "вигук"
        right: "ой, ах, привіт"
  - id: act-2
    type: group-sort
    title: Самостійні чи службові?
    instruction: Розподіліть слова за групами частин мови.
    groups:
      - label: "самостійні"
        items:
          - "книга"
          - "зелений"
          - "три"
          - "цей"
          - "читати"
          - "швидко"
      - label: "службові"
        items:
          - "до"
          - "але"
          - "не"
      - label: "вигук"
        items:
          - "ой"
  - id: act-3
    type: fill-in
    title: Будова слова
    instruction: Оберіть правильний термін.
    items:
      - sentence: "У слові `написати` частина `на-` - це ___."
        answer: "префікс"
        options:
          - "префікс"
          - "закінчення"
          - "сполучник"
        explanation: "Префікс стоїть перед коренем."
      - sentence: "У слові `книгою` частина `-ою` - це ___."
        answer: "закінчення"
        options:
          - "закінчення"
          - "підмет"
          - "префікс"
        explanation: "Закінчення показує орудний відмінок."
      - sentence: "У словах `писати`, `запис`, `підпис` спільний ___."
        answer: "корінь"
        options:
          - "корінь"
          - "суфікс"
          - "присудок"
        explanation: "Ці слова мають спільне значення писання."
      - sentence: "`Школяр` має суфікс ___."
        answer: "-яр"
        options:
          - "-яр"
          - "на-"
          - "-ою"
        explanation: "Суфікс стоїть після кореня."
      - sentence: "Основа - це слово без ___."
        answer: "закінчення"
        options:
          - "закінчення"
          - "підмета"
          - "наголосу"
        explanation: "Основа залишається, коли змінюється закінчення."
      - sentence: "`Не` у фразі `не знаю` - це ___."
        answer: "частка"
        options:
          - "частка"
          - "іменник"
          - "корінь"
        explanation: "`Не` - службова частина мови."
      - sentence: "У слові `безхмарний` частина `без-` - це ___."
        answer: "префікс"
        options:
          - "префікс"
          - "суфікс"
          - "закінчення"
        explanation: "Префікс стоїть перед коренем і допомагає творити нове слово."
      - sentence: "У слові `підводний` частина `-н-` - це ___."
        answer: "суфікс"
        options:
          - "суфікс"
          - "прийменник"
          - "корінь"
        explanation: "Суфікс стоїть після кореня і перед закінченням."
  - id: act-4
    type: quiz
    title: Яка частина слова?
    instruction: Оберіть правильний термін для виділеної частини.
    items:
      - question: "`на-` у слові `написати`"
        options:
          - "префікс"
          - "суфікс"
          - "закінчення"
        correct: 0
        explanation: "`На-` стоїть перед коренем."
      - question: "`-ою` у слові `книгою`"
        options:
          - "закінчення"
          - "префікс"
          - "прислівник"
        correct: 0
        explanation: "`-ою` показує граматичну форму."
      - question: "`пис-` у слові `підпис`"
        options:
          - "корінь"
          - "сполучник"
          - "закінчення"
        correct: 0
        explanation: "`Пис-` несе спільне лексичне значення."
      - question: "`-яр` у слові `школяр`"
        options:
          - "суфікс"
          - "префікс"
          - "частка"
        correct: 0
        explanation: "`-яр` стоїть після кореня."
      - question: "`без-` у слові `безхмарний`"
        options:
          - "префікс"
          - "корінь"
          - "закінчення"
        correct: 0
        explanation: "`Без-` стоїть перед коренем `хмар-`."
      - question: "`-ий` у слові `зелений`"
        options:
          - "закінчення"
          - "суфікс"
          - "прийменник"
        correct: 0
        explanation: "`-ий` змінюється: зелений, зеленого, зеленим."
      - question: "`вод-` у слові `підводний`"
        options:
          - "корінь"
          - "частка"
          - "префікс"
        correct: 0
        explanation: "`Вод-` спільний у словах вода, водний, підводний."
      - question: "`-н-` у слові `підводний`"
        options:
          - "суфікс"
          - "корінь"
          - "закінчення"
        correct: 0
        explanation: "`-н-` стоїть після кореня і перед закінченням."
workbook:
  - type: mark-the-words
    title: Знайдіть спільнокореневі слова
    instruction: Позначте слова з коренем `пис-/пись-`.
    text: "Марина вчиться писати запис, підпис, перепис і опис, а письменник записує підписаний текст."
    targets:
      - "писати"
      - "запис"
      - "підпис"
      - "перепис"
      - "опис"
      - "письменник"
      - "записує"
      - "підписаний"
  - type: error-correction
    title: Виправте морфологічний опис
    instruction: Оберіть правильний опис.
    items:
      - sentence: "У слові `книгою` частина `-ою` - суфікс."
        error: "суфікс"
        correction: "У слові `книгою` частина `-ою` - закінчення."
        options:
          - "У слові `книгою` частина `-ою` - закінчення."
          - "У слові `книгою` частина `-ою` - підмет."
        explanation: "Ця частина показує граматичну форму."
      - sentence: "`До` - самостійна частина мови."
        error: "самостійна"
        correction: "`До` - службова частина мови."
        options:
          - "`До` - службова частина мови."
          - "`До` - корінь слова."
        explanation: "Прийменник будує зв'язок між словами."
      - sentence: "`Писати` і `підпис` не мають спільного кореня."
        error: "не мають"
        correction: "`Писати` і `підпис` мають спільний корінь."
        options:
          - "`Писати` і `підпис` мають спільний корінь."
          - "`Писати` і `підпис` - це прийменники."
        explanation: "Обидва слова пов'язані з писанням."
      - sentence: "`Ліс`, `лісу`, `лісом` - це спільнокореневі слова."
        error: "спільнокореневі слова"
        correction: "`Ліс`, `лісу`, `лісом` - це форми одного слова."
        options:
          - "`Ліс`, `лісу`, `лісом` - це форми одного слова."
          - "`Ліс`, `лісу`, `лісом` - це три службові слова."
        explanation: "Форми одного слова відрізняються граматичним значенням, а не лексичним."
      - sentence: "У слові `безхмарний` немає префікса."
        error: "немає префікса"
        correction: "У слові `безхмарний` є префікс `без-`."
        options:
          - "У слові `безхмарний` є префікс `без-`."
          - "У слові `безхмарний` слово `без` є сполучником."
        explanation: "`Без-` стоїть перед коренем `хмар-`."
      - sentence: "`Метро` має закінчення `-о`."
        error: "має закінчення `-о`"
        correction: "`Метро` - незмінне слово, тому не має закінчення."
        options:
          - "`Метро` - незмінне слово, тому не має закінчення."
          - "`Метро` - дієслово з нульовим закінченням."
        explanation: "Незмінні слова складаються з основи."
      - sentence: "`Швидко` - прикметник."
        error: "прикметник"
        correction: "`Швидко` - прислівник."
        options:
          - "`Швидко` - прислівник."
          - "`Швидко` - прийменник."
        explanation: "Слово відповідає на питання як?"
      - sentence: "У слові `підводний` корінь `під-`."
        error: "корінь `під-`"
        correction: "У слові `підводний` корінь `вод-`, а `під-` - префікс."
        options:
          - "У слові `підводний` корінь `вод-`, а `під-` - префікс."
          - "У слові `підводний` немає кореня."
        explanation: "`Вода`, `водний`, `підводний` мають корінь `вод-`."
