- word: щоб
  translation: in order to, so that
  pos: conjunction
  example: "Я читаю, щоб зрозуміти текст."
- word: мета
  translation: goal, purpose
  pos: noun
  example: "Щоб називає мету дії."
- word: навіщо
  translation: what for, why
  pos: adverb
  example: "Навіщо ти прийшов так рано?"
- word: для чого
  translation: for what purpose
  pos: phrase
  example: "Для чого ти відкрив карту?"
- word: інфінітив
  translation: infinitive
  pos: noun
  example: "Після щоб може стояти інфінітив."
- word: підмет
  translation: subject
  pos: noun
  example: "Якщо підмет той самий, використайте інфінітив."
- word: сказати
  translation: to say, to tell
  pos: verb
  example: "Вона сказала, що прийде завтра."
- word: відповісти
  translation: to answer, to reply
  pos: verb
  example: "Він відповів, що не має часу."
- word: пояснити
  translation: to explain
  pos: verb
  example: "Учитель пояснив, що правило просте."
- word: запитати
  translation: to ask
  pos: verb
  example: "Марко запитав, чи ми готові."
- word: повідомити
  translation: to inform
  pos: verb
  example: "Адміністратор повідомив, що кабінет відкритий."
- word: додати
  translation: to add
  pos: verb
  example: "Колега додав, що зустріч перенесли."
- word: повідомлення
  translation: message
  pos: noun
  example: "Я отримав повідомлення від учительки."
- word: непряма мова
  translation: indirect speech
  pos: phrase
  example: "Непряма мова передає чужі слова без лапок."
- word: пряма мова
  translation: direct speech
  pos: phrase
  example: "Пряма мова має лапки."
- word: переказати
  translation: to retell, to relay
  pos: verb
  example: "Перекажіть повідомлення від колеги."
- word: попросити
  translation: to ask, to request
  pos: verb
  example: "Мама попросила, щоб я купив хліб."
- word: купити
  translation: to buy
  pos: verb
  example: "Ми йдемо в магазин, щоб купити хліб."
- word: зрозуміти
  translation: to understand
  pos: verb
  example: "Я повторюю правило, щоб зрозуміти приклад."
- word: перевірити
  translation: to check
  pos: verb
  example: "Вона відкрила додаток, щоб перевірити адресу."
