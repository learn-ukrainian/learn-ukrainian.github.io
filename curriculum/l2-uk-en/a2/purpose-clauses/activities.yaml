inline:
  - id: act-1
    type: fill-in
    title: Щоб + інфінітив
    instruction: Оберіть правильне продовження, коли підмет той самий.
    items:
      - sentence: "Я відкрив підручник, щоб ___ правило."
        answer: "повторити"
        options:
          - "повторити"
          - "я повторив"
        explanation: "Підмет той самий: я відкрив і я повторюю."
      - sentence: "Ми зайшли до магазину, щоб ___ хліб."
        answer: "купити"
        options:
          - "купити"
          - "ми купили"
        explanation: "Ті самі люди зайшли і купують."
      - sentence: "Вона ввімкнула телефон, щоб ___ повідомлення."
        answer: "прочитати"
        options:
          - "прочитати"
          - "вона прочитала"
        explanation: "Мета тієї самої людини."
      - sentence: "Я записав адресу, щоб не ___ її."
        answer: "забути"
        options:
          - "забути"
          - "я забув"
        explanation: "Після щоб з тим самим підметом стоїть інфінітив."
      - sentence: "Вони прийшли раніше, щоб ___ аудиторію."
        answer: "підготувати"
        options:
          - "підготувати"
          - "вони підготували"
        explanation: "Підмет вони залишається тим самим."
      - sentence: "Я слухаю повільно, щоб краще ___ текст."
        answer: "розуміти"
        options:
          - "розуміти"
          - "я розумів"
        explanation: "Інфінітив називає мету."
      - sentence: "Ми сіли ближче, щоб ___ дошку."
        answer: "бачити"
        options:
          - "бачити"
          - "ми бачили"
        explanation: "Один підмет у двох частинах."
      - sentence: "Він повторив питання, щоб ___ відповідь."
        answer: "почути"
        options:
          - "почути"
          - "він почув"
        explanation: "Мета виражена інфінітивом."
  - id: act-2
    type: quiz
    title: Причина чи мета?
    instruction: Виберіть правильний сполучник.
    items:
      - question: "Я прийшов раніше, ___ підготувати кімнату."
        options:
          - "щоб"
          - "тому що"
          - "але"
        correct: 0
        explanation: "Підготувати кімнату - це мета."
      - question: "Я прийшов раніше, ___ зустріч починається о дев'ятій."
        options:
          - "тому що"
          - "щоб"
          - "хоча"
        correct: 0
        explanation: "Початок зустрічі пояснює причину."
      - question: "Вона читає новини, ___ знати ситуацію."
        options:
          - "щоб"
          - "бо"
          - "однак"
        correct: 0
        explanation: "Знати ситуацію - мета."
      - question: "Вона читає новини, ___ їй важлива ця тема."
        options:
          - "бо"
          - "щоб"
          - "але"
        correct: 0
        explanation: "Важливість теми є причиною."
      - question: "Ми написали список, ___ нічого не забути."
        options:
          - "щоб"
          - "тому що"
          - "проте"
        correct: 0
        explanation: "Список має практичну мету."
      - question: "Ми написали список, ___ завдань багато."
        options:
          - "тому що"
          - "щоб"
          - "хоча"
        correct: 0
        explanation: "Багато завдань - причина."
      - question: "Я телефоную, ___ ти знав новину."
        options:
          - "щоб"
          - "бо"
          - "але"
        correct: 0
        explanation: "Є інший підмет: ти знав."
      - question: "Я телефоную, ___ маю новину."
        options:
          - "бо"
          - "щоб"
          - "однак"
        correct: 0
        explanation: "Мати новину - причина дзвінка."
  - id: act-3
    type: match-up
    title: Пряма і непряма мова
    instruction: З'єднайте фразу з природним переказом.
    pairs:
      - left: "\"Я прийду завтра.\""
        right: "Вона сказала, що прийде завтра."
      - left: "\"Тест буде короткий.\""
        right: "Викладач пояснив, що тест буде короткий."
      - left: "\"Ти будеш на зустрічі?\""
        right: "Він запитав, чи я буду на зустрічі."
      - left: "\"Ми готові.\""
        right: "Вони відповіли, що готові."
      - left: "\"Урок почнеться о десятій.\""
        right: "Адміністратор повідомив, що урок почнеться о десятій."
      - left: "\"Ви бачите завдання?\""
        right: "Учителька запитала, чи ми бачимо завдання."
      - left: "\"Я не можу прийти.\""
        right: "Анна сказала, що не може прийти."
      - left: "\"Зустріч перенесли.\""
        right: "Колега додав, що зустріч перенесли."
  - id: act-4
    type: unjumble
    title: Складіть речення з щоб і що
    instruction: Поставте слова в природний порядок.
    items:
      - words:
          - "Я"
          - "прийшов"
          - "раніше,"
          - "щоб"
          - "підготувати"
          - "кімнату"
        answer: "Я прийшов раніше, щоб підготувати кімнату."
      - words:
          - "Мама"
          - "написала,"
          - "щоб"
          - "я"
          - "купив"
          - "хліб"
        answer: "Мама написала, щоб я купив хліб."
      - words:
          - "Вона"
          - "сказала,"
          - "що"
          - "зустріч"
          - "почнеться"
          - "о"
          - "десятій"
        answer: "Вона сказала, що зустріч почнеться о десятій."
      - words:
          - "Він"
          - "запитав,"
          - "чи"
          - "ми"
          - "готові"
        answer: "Він запитав, чи ми готові."
      - words:
          - "Ми"
          - "сіли"
          - "ближче,"
          - "щоб"
          - "бачити"
          - "дошку"
        answer: "Ми сіли ближче, щоб бачити дошку."
      - words:
          - "Учитель"
          - "пояснив,"
          - "щоб"
          - "студенти"
          - "зрозуміли"
          - "приклад"
        answer: "Учитель пояснив, щоб студенти зрозуміли приклад."
      - words:
          - "Колега"
          - "відповів,"
          - "що"
          - "не"
          - "має"
          - "часу"
        answer: "Колега відповів, що не має часу."
      - words:
          - "Я"
          - "записав"
          - "адресу,"
          - "щоб"
          - "не"
          - "забути"
        answer: "Я записав адресу, щоб не забути."
workbook:
  - type: fill-in
    title: Інфінітив чи інший підмет?
    instruction: Доповніть речення правильною формою після щоб.
    items:
      - sentence: "Я прийшов, щоб ___."
        answer: "допомогти"
        options:
          - "допомогти"
          - "я допоміг"
        explanation: "Підмет той самий, тому інфінітив."
      - sentence: "Я прийшов, щоб ти ___."
        answer: "допоміг"
        options:
          - "допомогти"
          - "допоміг"
        explanation: "Підмет інший: ти допоміг."
      - sentence: "Вона написала, щоб ми ___."
        answer: "знали"
        options:
          - "знати"
          - "знали"
        explanation: "Підмет ми потребує форми знали."
      - sentence: "Ми відкрили карту, щоб ___ адресу."
        answer: "знайти"
        options:
          - "знайти"
          - "знайшли"
        explanation: "Ми відкрили і ми хочемо знайти."
      - sentence: "Тато попросив, щоб Оля ___ молоко."
        answer: "купила"
        options:
          - "купити"
          - "купила"
        explanation: "Оля - інший підмет."
      - sentence: "Я слухаю подкаст, щоб ___ вимову."
        answer: "почути"
        options:
          - "почути"
          - "почув"
        explanation: "Мета того самого слухача."
      - sentence: "Викладач повторив, щоб усі ___."
        answer: "записали"
        options:
          - "записати"
          - "записали"
        explanation: "Усі - новий підмет."
      - sentence: "Я залишив нотатку, щоб не ___ зустріч."
        answer: "пропустити"
        options:
          - "пропустити"
          - "пропустив"
        explanation: "Той самий підмет і заперечна мета."
  - type: quiz
    title: Що, щоб чи чи?
    instruction: Виберіть правильне слово.
    items:
      - question: "Анна сказала, ___ прийде завтра."
        options:
          - "що"
          - "щоб"
          - "чи"
        correct: 0
        explanation: "Передаємо повідомлення."
      - question: "Анна попросила, ___ я прийшов завтра."
        options:
          - "щоб"
          - "що"
          - "чи"
        correct: 0
        explanation: "Це прохання про дію."
      - question: "Марко запитав, ___ ми готові."
        options:
          - "чи"
          - "що"
          - "щоб"
        correct: 0
        explanation: "Питання так/ні передаємо через чи."
      - question: "Я відкрив файл, ___ перевірити адресу."
        options:
          - "щоб"
          - "що"
          - "чи"
        correct: 0
        explanation: "Це мета."
      - question: "Колега пояснив, ___ зустріч перенесли."
        options:
          - "що"
          - "щоб"
          - "чи"
        correct: 0
        explanation: "Передаємо інформацію."
      - question: "Вона написала, ___ ти не забув ключі."
        options:
          - "щоб"
          - "що"
          - "чи"
        correct: 0
        explanation: "Є інший підмет і мета повідомлення."
      - question: "Учитель запитав, ___ всі бачать дошку."
        options:
          - "чи"
          - "що"
          - "щоб"
        correct: 0
        explanation: "Це непряме питання так/ні."
      - question: "Ми прийшли, ___ послухати лекцію."
        options:
          - "щоб"
          - "чи"
          - "що"
        correct: 0
        explanation: "Послухати лекцію - мета."
  - type: error-correction
    title: Виправте підрядну частину
    instruction: Оберіть правильне виправлення.
    items:
      - sentence: "Я прийшов, тому що допомогти."
        error: "тому що"
        correction: "Я прийшов, щоб допомогти."
        options:
          - "Я прийшов, щоб допомогти."
          - "Я прийшов, що допомогти."
        explanation: "Допомогти - мета."
      - sentence: "Я подзвонив, щоб вона знати."
        error: "знати"
        correction: "Я подзвонив, щоб вона знала."
        options:
          - "Я подзвонив, щоб вона знала."
          - "Я подзвонив, щоб вона знати."
        explanation: "Після іншого підмета потрібна форма знала."
      - sentence: "Він сказав, щоб прийде."
        error: "щоб"
        correction: "Він сказав, що прийде."
        options:
          - "Він сказав, що прийде."
          - "Він сказав, чи прийде."
        explanation: "Це повідомлення, не мета."
      - sentence: "Вона запитала, що я буду."
        error: "що"
        correction: "Вона запитала, чи я буду."
        options:
          - "Вона запитала, чи я буду."
          - "Вона запитала, щоб я буду."
        explanation: "Запитання так/ні має чи."
      - sentence: "Мама попросила, що я купив хліб."
        error: "що"
        correction: "Мама попросила, щоб я купив хліб."
        options:
          - "Мама попросила, щоб я купив хліб."
          - "Мама попросила, чи я купив хліб."
        explanation: "Прохання про дію: щоб."
      - sentence: "Ми сіли ближче, щоб ми бачили дошку."
        error: "щоб ми бачили"
        correction: "Ми сіли ближче, щоб бачити дошку."
        options:
          - "Ми сіли ближче, щоб бачити дошку."
          - "Ми сіли ближче, що бачили дошку."
        explanation: "Підмет той самий, тому інфінітив звучить простіше."
      - sentence: "Колега відповів, чи не має часу."
        error: "чи"
        correction: "Колега відповів, що не має часу."
        options:
          - "Колега відповів, що не має часу."
          - "Колега відповів, щоб не мав часу."
        explanation: "Відповідь-повідомлення передаємо через що."
      - sentence: "Учитель пояснив правило, щоб студенти зрозуміти."
        error: "зрозуміти"
        correction: "Учитель пояснив правило, щоб студенти зрозуміли."
        options:
          - "Учитель пояснив правило, щоб студенти зрозуміли."
          - "Учитель пояснив правило, що студенти зрозуміли."
        explanation: "Студенти - інший підмет."
  - type: true-false
    title: Перевірте значення
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Щоб відповідає на питання для чого або навіщо."
        correct: true
        explanation: "Це сполучник мети."
      - statement: "Тому що і щоб завжди взаємозамінні."
        correct: false
        explanation: "Тому що називає причину, щоб називає мету."
      - statement: "У моделі Я прийшов, щоб допомогти підмет той самий."
        correct: true
        explanation: "Я прийшов і я допоможу."
      - statement: "У моделі Я написав, щоб вона знала після щоб є інший підмет."
        correct: true
        explanation: "Друга дія належить їй."
      - statement: "Непряме питання так/ні часто має чи."
        correct: true
        explanation: "Він запитав, чи ми готові."
      - statement: "Після сказав завжди треба щоб."
        correct: false
        explanation: "Для повідомлення потрібно що: сказав, що прийде."
      - statement: "У реченні Вона сказала, що прийде завтра ми передаємо повідомлення."
        correct: true
        explanation: "Сказала, що... вводить непряму мову."
      - statement: "У реченні Він запитав, чи ми готові в кінці завжди потрібен знак питання."
        correct: false
        explanation: "Якщо все речення є повідомленням, зазвичай ставимо крапку."
