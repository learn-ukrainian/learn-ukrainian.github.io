inline:
  - id: act-1
    type: quiz
    title: Член речення
    instruction: Оберіть роль виділеного слова або групи слів.
    items:
      - question: "`Марта` читає книжку."
        options:
          - "підмет"
          - "додаток"
          - "обставина"
        correct: 0
        explanation: "Марта виконує дію."
      - question: "Марта `читає` книжку."
        options:
          - "присудок"
          - "означення"
          - "прийменник"
        correct: 0
        explanation: "Читає називає дію підмета."
      - question: "Марта читає `книжку`."
        options:
          - "додаток"
          - "підмет"
          - "обставина"
        correct: 0
        explanation: "Читає що? книжку."
      - question: "Марта читає `нову` книжку."
        options:
          - "означення"
          - "присудок"
          - "кличний"
        correct: 0
        explanation: "Нову відповідає на питання яку?"
      - question: "Марта читає `ввечері`."
        options:
          - "обставина"
          - "додаток"
          - "закінчення"
        correct: 0
        explanation: "Ввечері відповідає на питання коли?"
      - question: "`У бібліотеці` Марта читає."
        options:
          - "обставина місця"
          - "підмет"
          - "суфікс"
        correct: 0
        explanation: "У бібліотеці відповідає на питання де?"
      - question: "Діти бігли `радісно`."
        options:
          - "обставина способу дії"
          - "означення"
          - "підмет"
        correct: 0
        explanation: "Радісно відповідає на питання як?"
      - question: "Учитель пояснював `правило`."
        options:
          - "додаток"
          - "присудок"
          - "сполучник"
        correct: 0
        explanation: "Пояснював що? правило."
  - id: act-2
    type: match-up
    title: Відмінки і питання
    instruction: З'єднайте термін з питанням або поясненням.
    pairs:
      - left: "називний відмінок"
        right: "хто? що?"
      - left: "родовий відмінок"
        right: "кого? чого?"
      - left: "давальний відмінок"
        right: "кому? чому?"
      - left: "знахідний відмінок"
        right: "кого? що?"
      - left: "орудний відмінок"
        right: "ким? чим?"
      - left: "місцевий відмінок"
        right: "на кому? на чому?"
      - left: "кличний відмінок"
        right: "звертання: друже!"
      - left: "Р.в., Д.в., Зн.в."
        right: "скорочення назв відмінків"
  - id: act-3
    type: fill-in
    title: Відмінок і роль
    instruction: Оберіть правильний термін.
    items:
      - sentence: "У реченні `Студент читає` слово `студент` має ___ відмінок."
        answer: "називний"
        options:
          - "називний"
          - "орудний"
          - "кличний"
        explanation: "Підмет часто стоїть у називному."
      - sentence: "У фразі `немає часу` слово `часу` має ___ відмінок."
        answer: "родовий"
        options:
          - "родовий"
          - "давальний"
          - "місцевий"
        explanation: "Після немає вживаємо родовий."
      - sentence: "У фразі `допомагаю другові` слово `другові` має ___ відмінок."
        answer: "давальний"
        options:
          - "давальний"
          - "знахідний"
          - "називний"
        explanation: "Допомагати кому? другові."
      - sentence: "У фразі `бачу місто` слово `місто` має ___ відмінок."
        answer: "знахідний"
        options:
          - "знахідний"
          - "кличний"
          - "родовий"
        explanation: "Бачу що? місто."
      - sentence: "У фразі `пишу ручкою` слово `ручкою` має ___ відмінок."
        answer: "орудний"
        options:
          - "орудний"
          - "називний"
          - "давальний"
        explanation: "Пишу чим? ручкою."
      - sentence: "У фразі `у місті` слово `місті` має ___ відмінок."
        answer: "місцевий"
        options:
          - "місцевий"
          - "знахідний"
          - "кличний"
        explanation: "У місті - місцевий із прийменником."
      - sentence: "У звертанні `Маріє!` форма `Маріє` має ___ відмінок."
        answer: "кличний"
        options:
          - "кличний"
          - "родовий"
          - "орудний"
        explanation: "Кличний відмінок уживаємо для звертання."
      - sentence: "У реченні `Я дякую сестрі` слово `сестрі` є додатком у ___ відмінку."
        answer: "давальному"
        options:
          - "давальному"
          - "називному"
          - "кличному"
        explanation: "Дякувати кому? сестрі."
  - id: act-4
    type: group-sort
    title: Просте чи складне?
    instruction: Розподіліть речення за типом.
    groups:
      - label: "просте речення"
        items:
          - "Марта читає книжку."
          - "Увечері було холодно."
          - "Студенти слухали, писали і відповідали."
          - "На столі лежить зошит."
      - label: "складне речення"
        items:
          - "Марта читає, а Андрій пише."
          - "Я залишився удома, бо йшов дощ."
          - "Якщо буде час, ми повторимо правило."
          - "Вона сказала, що прийде завтра."
workbook:
  - type: mark-the-words
    title: Знайдіть граматичні основи
    instruction: Позначте підмети і присудки.
    text: "Марта читала книжку, а Андрій писав лист. Учитель пояснював правило, і студенти слухали уважно."
    targets:
      - "Марта"
      - "читала"
      - "Андрій"
      - "писав"
      - "Учитель"
      - "пояснював"
      - "студенти"
      - "слухали"
  - type: error-correction
    title: Виправте синтаксичний аналіз
    instruction: Оберіть правильний аналіз або пунктуацію.
    items:
      - sentence: "`Другові` у фразі `допомагаю другові` - знахідний відмінок."
        error: "знахідний"
        correction: "`Другові` - давальний відмінок."
        options:
          - "`Другові` - давальний відмінок."
          - "`Другові` - кличний відмінок."
        explanation: "Допомагати кому? другові."
      - sentence: "`Марта читала, писала і слухала` - складне речення."
        error: "складне"
        correction: "Це просте речення з однією граматичною основою."
        options:
          - "Це просте речення з однією граматичною основою."
          - "Це речення без присудка."
        explanation: "Підмет один, присудки однорідні."
      - sentence: "У словосполученні `цікава книжка` головне слово `цікава`."
        error: "цікава"
        correction: "Головне слово - `книжка`."
        options:
          - "Головне слово - `книжка`."
          - "Головне слово - `і`."
        explanation: "Книжка яка? цікава."
      - sentence: "`Я залишився удома бо йшов дощ` написано правильно."
        error: "без коми"
        correction: "`Я залишився удома, бо йшов дощ`."
        options:
          - "`Я залишився удома, бо йшов дощ`."
          - "`Я залишився, удома бо йшов дощ`."
        explanation: "Між частинами складного речення перед `бо` ставимо кому."
      - sentence: "`Марта читає а Андрій пише` не потребує коми."
        error: "не потребує коми"
        correction: "`Марта читає, а Андрій пише`."
        options:
          - "`Марта читає, а Андрій пише`."
          - "`Марта, читає а Андрій пише`."
        explanation: "Є дві граматичні основи і сполучник `а`."
      - sentence: "`Якщо буде час ми повторимо правило` написано правильно."
        error: "без коми"
        correction: "`Якщо буде час, ми повторимо правило`."
        options:
          - "`Якщо буде час, ми повторимо правило`."
          - "`Якщо, буде час ми повторимо правило`."
        explanation: "Підрядну частину відокремлюємо комою."
      - sentence: "`Книжку` у фразі `читаю книжку` - підмет."
        error: "підмет"
        correction: "`Книжку` - додаток."
        options:
          - "`Книжку` - додаток."
          - "`Книжку` - присудок."
        explanation: "Читаю що? книжку."
      - sentence: "`У бібліотеці` у реченні `У бібліотеці Марта читала` - присудок."
        error: "присудок"
        correction: "`У бібліотеці` - обставина місця."
        options:
          - "`У бібліотеці` - обставина місця."
          - "`У бібліотеці` - підмет."
        explanation: "У бібліотеці відповідає на питання де?"
