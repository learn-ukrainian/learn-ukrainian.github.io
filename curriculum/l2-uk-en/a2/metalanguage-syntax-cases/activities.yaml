inline:
  - id: act-1
    type: match-up
    title: Словосполучення
    instruction: З'єднайте словосполучення з питанням.
    pairs:
      - left: "цікава книжка"
        right: "книжка яка?"
      - left: "читати книжку"
        right: "читати що?"
      - left: "дуже швидко"
        right: "швидко як?"
      - left: "лист до друга"
        right: "лист до кого?"
      - left: "кава без цукру"
        right: "кава без чого?"
      - left: "розмова про мову"
        right: "розмова про що?"
      - left: "подарунок сестрі"
        right: "подарунок кому?"
      - left: "їхати автобусом"
        right: "їхати чим?"
  - id: act-2
    type: quiz
    title: Член речення
    instruction: Оберіть роль виділеного слова.
    items:
      - question: "`Марта` читає книжку."
        options:
          - "підмет"
          - "додаток"
          - "обставина"
        correct: 0
        explanation: "Марта виконує дію."
      - question: "Марта `читає` книжку."
        options:
          - "присудок"
          - "означення"
          - "прийменник"
        correct: 0
        explanation: "Читає називає дію підмета."
      - question: "Марта читає `книжку`."
        options:
          - "додаток"
          - "підмет"
          - "обставина"
        correct: 0
        explanation: "Читає що? книжку."
      - question: "Марта читає `нову` книжку."
        options:
          - "означення"
          - "присудок"
          - "кличний"
        correct: 0
        explanation: "Нову відповідає на питання яку?"
      - question: "Марта читає `ввечері`."
        options:
          - "обставина"
          - "додаток"
          - "закінчення"
        correct: 0
        explanation: "Ввечері відповідає на питання коли?"
      - question: "`У бібліотеці` Марта читає."
        options:
          - "обставина місця"
          - "підмет"
          - "суфікс"
        correct: 0
        explanation: "У бібліотеці відповідає на питання де?"
  - id: act-3
    type: group-sort
    title: Просте чи складне?
    instruction: Розподіліть речення за типом.
    groups:
      - label: "просте речення"
        items:
          - "Марта читає книжку."
          - "Увечері було холодно."
          - "Студенти слухали, писали і відповідали."
          - "На столі лежить зошит."
      - label: "складне речення"
        items:
          - "Марта читає, а Андрій пише."
          - "Я залишився вдома, бо йшов дощ."
          - "Якщо буде час, ми повторимо правило."
          - "Вона сказала, що прийде завтра."
  - id: act-4
    type: fill-in
    title: Відмінок і роль
    instruction: Оберіть правильний термін.
    items:
      - sentence: "У реченні `Студент читає` слово `студент` має ___ відмінок."
        answer: "називний"
        options:
          - "називний"
          - "орудний"
          - "кличний"
        explanation: "Підмет часто стоїть у називному."
      - sentence: "У фразі `немає часу` слово `часу` має ___ відмінок."
        answer: "родовий"
        options:
          - "родовий"
          - "давальний"
          - "місцевий"
        explanation: "Після немає вживаємо родовий."
      - sentence: "У фразі `допомагаю другові` слово `другові` має ___ відмінок."
        answer: "давальний"
        options:
          - "давальний"
          - "знахідний"
          - "називний"
        explanation: "Допомагати кому? другові."
      - sentence: "У фразі `бачу місто` слово `місто` має ___ відмінок."
        answer: "знахідний"
        options:
          - "знахідний"
          - "кличний"
          - "родовий"
        explanation: "Бачу що? місто."
      - sentence: "У фразі `пишу ручкою` слово `ручкою` має ___ відмінок."
        answer: "орудний"
        options:
          - "орудний"
          - "називний"
          - "давальний"
        explanation: "Пишу чим? ручкою."
      - sentence: "У фразі `у місті` слово `місті` має ___ відмінок."
        answer: "місцевий"
        options:
          - "місцевий"
          - "знахідний"
          - "кличний"
        explanation: "У місті - місцевий із прийменником."
workbook:
  - type: mark-the-words
    title: Знайдіть граматичні основи
    instruction: Позначте підмети і присудки.
    text: "Марта читала книжку, а Андрій писав лист."
    targets:
      - "Марта"
      - "читала"
      - "Андрій"
      - "писав"
  - type: error-correction
    title: Виправте синтаксичний аналіз
    instruction: Оберіть правильний аналіз.
    items:
      - sentence: "`Другові` у фразі `допомагаю другові` - знахідний відмінок."
        error: "знахідний"
        correction: "`Другові` - давальний відмінок."
        options:
          - "`Другові` - давальний відмінок."
          - "`Другові` - кличний відмінок."
        explanation: "Допомагати кому? другові."
      - sentence: "`Марта читала, писала і слухала` - складне речення."
        error: "складне"
        correction: "Це просте речення з однією граматичною основою."
        options:
          - "Це просте речення з однією граматичною основою."
          - "Це речення без присудка."
        explanation: "Підмет один, присудки однорідні."
      - sentence: "У словосполученні `цікава книжка` головне слово `цікава`."
        error: "цікава"
        correction: "Головне слово - `книжка`."
        options:
          - "Головне слово - `книжка`."
          - "Головне слово - `і`."
        explanation: "Книжка яка? цікава."
