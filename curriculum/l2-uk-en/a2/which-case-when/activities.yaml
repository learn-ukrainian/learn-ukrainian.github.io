inline:
  - id: act-1
    type: quiz
    title: Тригер у реченні
    instruction: Оберіть, що визначає відмінок виділеної фрази.
    items:
      - question: "У фразі 'після уроку' відмінок визначає..."
        options:
          - прийменник після
          - дієслово
          - множина
        correct: 0
        explanation: Після вимагає родового відмінка.
      - question: "У реченні 'Я допомагаю братові' форму визначає..."
        options:
          - прийменник
          - дієслово допомагати
          - слово я
        correct: 1
        explanation: Допомагати кому? - братові.
      - question: "У фразі 'про майбутнє' відмінок визначає..."
        options:
          - прийменник про
          - дієслово бути
          - місце
        correct: 0
        explanation: Про кого? про що? - знахідний.
      - question: "У фразі 'у 2014 році' відмінок визначає..."
        options:
          - контекст року
          - прямий додаток
          - звертання
        correct: 0
        explanation: Роки з у/в часто мають місцевий відмінок.
  - id: act-2
    type: group-sort
    title: Прийменники і відмінки
    instruction: Розсортуйте фрази за відмінком.
    groups:
      - label: Родовий
        items:
          - без квитків
          - після уроку
          - біля музею
      - label: Знахідний
        items:
          - про майбутнє
          - на роботу
          - у середу
      - label: Орудний
        items:
          - з другом
          - з молоком
          - за столом
      - label: Місцевий
        items:
          - на роботі
          - у 2014 році
          - по парку
  - id: act-3
    type: fill-in
    title: Дієслово керує
    instruction: Оберіть форму після дієслова.
    items:
      - sentence: "Я допомагаю ___."
        answer: сестрі
        options:
          - сестра
          - сестру
          - сестрі
        explanation: Допомагати кому? - сестрі.
      - sentence: "Ми користуємося ___."
        answer: комп'ютером
        options:
          - комп'ютер
          - комп'ютером
          - комп'ютера
        explanation: Користуватися чим? - комп'ютером.
      - sentence: "У мене немає ___."
        answer: часу
        options:
          - час
          - часу
          - часом
        explanation: Немає чого? - часу.
      - sentence: "Вона шукає ___."
        answer: ключі
        options:
          - ключі
          - ключів
          - ключами
        explanation: Шукає що? - ключі.
  - id: act-4
    type: true-false
    title: Швидка перевірка
    instruction: Визначте, чи правильно вибрано відмінок.
    items:
      - statement: "Ми говоримо про подорож."
        correct: true
        explanation: Про що? - знахідний.
      - statement: "Вона дякує друзів."
        correct: false
        explanation: Дякувати кому? - друзям.
      - statement: "У 2024 році я жив у Львові."
        correct: true
        explanation: У році - місцевий; у Львові - місцевий.
      - statement: "Після робота ми йдемо додому."
        correct: false
        explanation: Після чого? - після роботи.
workbook:
  - type: fill-in
    title: Оберіть відмінок у контексті
    instruction: Доповніть речення правильною формою.
    items:
      - sentence: "У четвер ми підемо на ___."
        answer: концерт
        options:
          - концерт
          - концерті
          - концертом
        explanation: Підемо куди? - на концерт.
      - sentence: "Ми були на ___ дві години."
        answer: концерті
        options:
          - концерт
          - концерті
          - концертом
        explanation: Були де? - на концерті.
      - sentence: "Я боюся ___."
        answer: темряви
        options:
          - темрява
          - темряву
          - темряви
        explanation: Боятися чого? - темряви.
      - sentence: "Він телефонуватиме ___."
        answer: батькам
        options:
          - батьки
          - батьків
          - батькам
        explanation: Телефонувати кому? - батькам.
  - type: error-correction
    title: Знайдіть тригер
    instruction: Оберіть правильний варіант.
    items:
      - sentence: "Я думаю про майбутньому."
        error: майбутньому
        correction: "Я думаю про майбутнє."
        options:
          - "Я думаю про майбутнє."
          - "Я думаю про майбутньому."
        explanation: Про що? - про майбутнє.
      - sentence: "Ми гуляємо по парк."
        error: парк
        correction: "Ми гуляємо по парку."
        options:
          - "Ми гуляємо по парку."
          - "Ми гуляємо по парк."
        explanation: По чому? - по парку.
      - sentence: "Дякую за допомозі."
        error: допомозі
        correction: "Дякую за допомогу."
        options:
          - "Дякую за допомогу."
          - "Дякую за допомозі."
        explanation: За що? - за допомогу.
      - sentence: "Я сиджу за стіл."
        error: стіл
        correction: "Я сиджу за столом."
        options:
          - "Я сиджу за столом."
          - "Я сиджу за стіл."
        explanation: Де? за чим? - за столом.
  - type: match-up
    title: Дієслово плюс відмінок
    instruction: З'єднайте дієслово з типовим питанням.
    pairs:
      - left: допомагати
        right: кому?
      - left: користуватися
        right: чим?
      - left: боятися
        right: чого?
      - left: бачити
        right: кого? що?
      - left: дякувати
        right: кому?
