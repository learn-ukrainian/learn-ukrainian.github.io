inline:
  - id: act-1
    type: quiz
    title: Оберіть форму за тригером
    instruction: Оберіть правильну відмінкову форму для пропуску.
    items:
      - question: "Я допомагаю ___."
        options:
          - сестра
          - сестру
          - сестрі
        correct: 2
        explanation: Допомагати кому? - сестрі.
      - question: "Ми користуємося ___."
        options:
          - комп'ютер
          - комп'ютером
          - комп'ютера
        correct: 1
        explanation: Користуватися чим? - комп'ютером.
      - question: "Вона боїться ___."
        options:
          - темрява
          - темряву
          - темряви
        correct: 2
        explanation: Боятися чого? - темряви.
      - question: "Я думаю про ___."
        options:
          - майбутнє
          - майбутньому
          - майбутнім
        correct: 0
        explanation: Про що? - про майбутнє.
      - question: "У четвер ми йдемо на ___."
        options:
          - роботу
          - роботі
          - роботою
        correct: 0
        explanation: Йдемо куди? - на роботу.
      - question: "Книжка лежить на ___."
        options:
          - стіл
          - столі
          - столом
        correct: 1
        explanation: Лежить де? - на столі.
      - question: "Дякую за ___."
        options:
          - допомогу
          - допомозі
          - допомогою
        correct: 0
        explanation: За що? - за допомогу.
      - question: "Вони приїхали з ___."
        options:
          - Київ
          - Києві
          - Києва
        correct: 2
        explanation: Приїхали звідки? - з Києва.
  - id: act-2
    type: group-sort
    title: Прийменники і відмінки
    instruction: Розсортуйте фрази за відмінком, який відкриває прийменник.
    groups:
      - label: Родовий
        items:
          - без квитків
          - після уроку
      - label: Знахідний
        items:
          - про майбутнє
          - на роботу
      - label: Орудний
        items:
          - з другом
          - за столом
      - label: Місцевий
        items:
          - на роботі
          - у 2014 році
  - id: act-3
    type: fill-in
    title: Мішані відмінки
    instruction: Доповніть речення правильною формою іменника або словосполучення.
    items:
      - sentence: "У (четвер) ___ ми маємо урок."
        answer: четвер
        options:
          - четвер
          - четвері
          - четвером
        explanation: "День тижня після у/в часто має знахідний: у четвер."
      - sentence: "Хлопець у (червоний светр) ___ чекає біля входу."
        answer: червоному светрі
        options:
          - червоний светр
          - червоному светрі
          - червоним светром
        explanation: "Опис одягу має місцевий: у червоному светрі."
      - sentence: "Ми гуляємо по (парк) ___."
        answer: парку
        options:
          - парк
          - парку
          - парком
        explanation: По чому? - по парку.
      - sentence: "Я допомагаю (сестра) ___."
        answer: сестрі
        options:
          - сестра
          - сестру
          - сестрі
        explanation: Допомагати кому? - сестрі.
      - sentence: "Він користується (телефон) ___."
        answer: телефоном
        options:
          - телефон
          - телефону
          - телефоном
        explanation: Користуватися чим? - телефоном.
      - sentence: "Ми думаємо про (майбутнє) ___."
        answer: майбутнє
        options:
          - майбутнє
          - майбутньому
          - майбутнім
        explanation: Про що? - про майбутнє.
      - sentence: "Після (робота) ___ ми йдемо додому."
        answer: роботи
        options:
          - робота
          - роботу
          - роботи
        explanation: Після чого? - після роботи.
      - sentence: "Книга лежить на (стіл) ___."
        answer: столі
        options:
          - стіл
          - столі
          - столом
        explanation: Де? - на столі.
  - id: act-4
    type: true-false
    title: Чи правильний відмінок?
    instruction: Визначте, чи правильно вжито відмінок у реченні.
    items:
      - statement: "Ми йдемо на роботу."
        correct: true
        explanation: Йдемо куди? - на роботу.
      - statement: "Ми зараз на роботу."
        correct: false
        explanation: "Для місця потрібно: ми зараз на роботі."
      - statement: "Я думаю про майбутньому."
        correct: false
        explanation: "Після про потрібен знахідний: про майбутнє."
      - statement: "Вона дякує друзям."
        correct: true
        explanation: Дякувати кому? - друзям.
      - statement: "У середу я працюю."
        correct: true
        explanation: "День тижня після у/в: у середу."
      - statement: "У 2024 рік ми жили у Львові."
        correct: false
        explanation: "Для року потрібен місцевий: у 2024 році."
      - statement: "Хлопець у червоному светрі читає."
        correct: true
        explanation: "Опис одягу: у чому? - у червоному светрі."
      - statement: "Ми гуляємо по парк."
        correct: false
        explanation: По чому? - по парку.
