inline:
  - id: act-1
    type: group-sort
    title: Два майбутні часи
    instruction: Розподіліть форми за тим, що вони показують.
    groups:
      - label: "простий майбутній: результат"
        items:
          - "напишу"
          - "прочитає"
          - "складемо"
          - "куплять"
      - label: "складений майбутній: процес"
        items:
          - "буду писати"
          - "буде читати"
          - "будемо готуватися"
          - "будуть тренуватися"
  - id: act-2
    type: fill-in
    title: Оберіть форму майбутнього
    instruction: Доповніть речення правильною формою.
    items:
      - sentence: "Наступного року я ___ коротку книжку."
        answer: "напишу"
        options:
          - "напишу"
          - "буду написати"
        explanation: "Книжка як готовий результат: напишу."
      - sentence: "Щонеділі я ___ про родинні історії."
        answer: "буду писати"
        options:
          - "напишу"
          - "буду писати"
        explanation: "Щонеділі показує повторення."
      - sentence: "У червні Дмитро ___ іспит з водіння."
        answer: "складе"
        options:
          - "буде скласти"
          - "складе"
        explanation: "Успішний результат іспиту: складе."
      - sentence: "Перед іспитом він ___ з інструктором щотижня."
        answer: "буде тренуватися"
        options:
          - "буде тренуватися"
          - "потренується"
        explanation: "Щотижня показує повторення."
      - sentence: "До літа Леся ___ першу просту книжку іспанською."
        answer: "прочитає"
        options:
          - "буде прочитати"
          - "прочитає"
        explanation: "До літа книжка буде прочитана."
      - sentence: "Увечері ми ___ нові слова пів години."
        answer: "будемо вчити"
        options:
          - "вивчимо"
          - "будемо вчити"
        explanation: "Пів години показує процес."
      - sentence: "Першого січня Марко ___ бабусі."
        answer: "подзвонить"
        options:
          - "подзвонить"
          - "буде подзвонити"
        explanation: "Один дзвінок як завершена дія."
      - sentence: "У січні друзі ___ про свої обіцянки щотижня."
        answer: "будуть говорити"
        options:
          - "скажуть"
          - "будуть говорити"
        explanation: "Щотижня означає повторюваний процес."
  - id: act-3
    type: quiz
    title: Результат чи процес?
    instruction: Виберіть форму, яка краще підходить до ситуації.
    items:
      - question: "Оля обіцяє мати готовий перший розділ до весни."
        options:
          - "Я напишу перший розділ до весни."
          - "Я буду писати перший розділ до весни."
          - "Я буду написати перший розділ."
        correct: 0
        explanation: "Є готовий результат: розділ буде написаний."
      - question: "Оля описує щотижневу звичку письма."
        options:
          - "Я буду писати щонеділі."
          - "Я напишу щонеділі."
          - "Я буду написати щонеділі."
        correct: 0
        explanation: "Щонеділі показує повторення."
      - question: "Дмитро говорить про успішний результат іспиту."
        options:
          - "Я складу іспит."
          - "Я буду скласти іспит."
          - "Я буду складати іспит."
        correct: 0
        explanation: "Для результату потрібен доконаний простий майбутній."
      - question: "Дмитро говорить про підготовку перед іспитом."
        options:
          - "Я буду готуватися до іспиту."
          - "Я підготуюся до іспиту весь місяць."
          - "Я буду підготуватися до іспиту."
        correct: 0
        explanation: "Підготовка як процес бере буду + недоконаний інфінітив."
      - question: "Леся планує регулярні заняття іспанською."
        options:
          - "Я буду вчити іспанську щовечора."
          - "Я вивчу іспанську щовечора."
          - "Я буду вивчити іспанську щовечора."
        correct: 0
        explanation: "Щовечора означає повторення."
      - question: "Леся хоче сказати, що одна книжка буде прочитана."
        options:
          - "Я прочитаю одну книжку."
          - "Я буду читати одну книжку до кінця."
          - "Я буду прочитати одну книжку."
        correct: 0
        explanation: "Книжка як завершений результат: прочитаю."
      - question: "Марко обіцяє один дзвінок бабусі."
        options:
          - "Я подзвоню бабусі."
          - "Я буду дзвонити бабусі щодня."
          - "Я буду подзвонити бабусі."
        correct: 0
        explanation: "Один завершений дзвінок: подзвоню."
      - question: "Друзі описують довшу розмову про плани."
        options:
          - "Ми будемо говорити про плани."
          - "Ми скажемо про плани дві години."
          - "Ми будемо сказати про плани."
        correct: 0
        explanation: "Розмова як заняття: будемо говорити."
  - id: act-4
    type: unjumble
    title: Складіть речення в майбутньому
    instruction: Поставте слова в природний порядок.
    items:
      - words:
          - "Я"
          - "напишу"
          - "книжку"
          - "до"
          - "весни"
        answer: "Я напишу книжку до весни."
      - words:
          - "Ми"
          - "будемо"
          - "вчити"
          - "слова"
          - "щодня"
        answer: "Ми будемо вчити слова щодня."
      - words:
          - "Дмитро"
          - "складе"
          - "іспит"
          - "у"
          - "червні"
        answer: "Дмитро складе іспит у червні."
      - words:
          - "Леся"
          - "буде"
          - "читати"
          - "цілий"
          - "вечір"
        answer: "Леся буде читати цілий вечір."
      - words:
          - "Марко"
          - "подзвонить"
          - "бабусі"
          - "першого"
          - "січня"
        answer: "Марко подзвонить бабусі першого січня."
      - words:
          - "Вони"
          - "будуть"
          - "тренуватися"
          - "тричі"
          - "на"
          - "тиждень"
        answer: "Вони будуть тренуватися тричі на тиждень."
      - words:
          - "Я"
          - "куплю"
          - "квитки"
          - "після"
          - "роботи"
        answer: "Я куплю квитки після роботи."
      - words:
          - "Оля"
          - "буде"
          - "говорити"
          - "з"
          - "родичами"
        answer: "Оля буде говорити з родичами."
workbook:
  - type: error-correction
    title: Виправте майбутній час
    instruction: Оберіть правильне виправлення.
    items:
      - sentence: "Я буду написати відповідь."
        error: "буду написати"
        correction: "Я напишу відповідь."
        options:
          - "Я напишу відповідь."
          - "Я буду написати відповідь."
        explanation: "Доконаний вид не бере буду."
      - sentence: "Він прочитає цілий вечір."
        error: "прочитає"
        correction: "Він буде читати цілий вечір."
        options:
          - "Він буде читати цілий вечір."
          - "Він прочитає цілий вечір."
        explanation: "Цілий вечір показує тривалість."
      - sentence: "Ми будемо купити квитки."
        error: "будемо купити"
        correction: "Ми купимо квитки."
        options:
          - "Ми купимо квитки."
          - "Ми будемо купити квитки."
        explanation: "Купити - доконаний вид."
      - sentence: "Вона зробить вправи щодня."
        error: "зробить"
        correction: "Вона буде робити вправи щодня."
        options:
          - "Вона буде робити вправи щодня."
          - "Вона зробить вправи щодня."
        explanation: "Щодня означає повторення."
      - sentence: "Дмитро буде скласти іспит."
        error: "буде скласти"
        correction: "Дмитро складе іспит."
        options:
          - "Дмитро складе іспит."
          - "Дмитро буде скласти іспит."
        explanation: "Скласти - доконаний результат."
      - sentence: "Леся вивчить іспанську щовечора."
        error: "вивчить"
        correction: "Леся буде вчити іспанську щовечора."
        options:
          - "Леся буде вчити іспанську щовечора."
          - "Леся вивчить іспанську щовечора."
        explanation: "Щовечора показує повторення."
      - sentence: "Ми будемо прочитати інструкцію."
        error: "будемо прочитати"
        correction: "Ми прочитаємо інструкцію."
        options:
          - "Ми прочитаємо інструкцію."
          - "Ми будемо прочитати інструкцію."
        explanation: "Прочитати - доконаний вид."
      - sentence: "Я скажу про план дві години."
        error: "скажу"
        correction: "Я буду говорити про план дві години."
        options:
          - "Я буду говорити про план дві години."
          - "Я скажу про план дві години."
        explanation: "Дві години показує процес мовлення."
  - type: fill-in
    title: Реалістичні обіцянки
    instruction: Доповніть короткий план.
    items:
      - sentence: "У січні я ___ над книжкою щонеділі."
        answer: "буду працювати"
        options:
          - "буду працювати"
          - "попрацюю"
        explanation: "Щонеділі як повторення: буду працювати."
      - sentence: "До весни я ___ перший розділ."
        answer: "напишу"
        options:
          - "буду написати"
          - "напишу"
        explanation: "Розділ буде готовий."
      - sentence: "Перед іспитом Дмитро ___ з інструктором щотижня."
        answer: "буде тренуватися"
        options:
          - "буде тренуватися"
          - "потренується"
        explanation: "Щотижня показує повторення."
      - sentence: "У червні він ___ іспит."
        answer: "складе"
        options:
          - "складе"
          - "буде скласти"
        explanation: "Іспит як результат: складе."
      - sentence: "Наступного тижня ми ___ про бюджет."
        answer: "будемо говорити"
        options:
          - "скажемо"
          - "будемо говорити"
        explanation: "Говорити про тему - процес."
      - sentence: "Після зустрічі ми ___ коротке рішення."
        answer: "напишемо"
        options:
          - "напишемо"
          - "будемо написати"
        explanation: "Рішення як готовий текст."
      - sentence: "Марко ___ бабусі першого січня."
        answer: "подзвонить"
        options:
          - "буде подзвонити"
          - "подзвонить"
        explanation: "Один завершений дзвінок."
      - sentence: "Увечері друзі ___ плани цілу годину."
        answer: "будуть обговорювати"
        options:
          - "обговорять"
          - "будуть обговорювати"
        explanation: "Цілу годину підкреслює процес."
  - type: true-false
    title: Майбутнє і вид
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Форма напишу має майбутнє значення."
        correct: true
        explanation: "Доконаний вид не має справжнього теперішнього значення."
      - statement: "Буду написати - це стандартна A2-модель."
        correct: false
        explanation: "Потрібно: напишу або буду писати."
      - statement: "Буду читати підкреслює процес або заняття."
        correct: true
        explanation: "Це складений майбутній недоконаного виду."
      - statement: "Завтра автоматично вимагає доконаного виду."
        correct: false
        explanation: "Завтра може стояти з обома видами."
      - statement: "Для конкретної обіцянки часто природний доконаний вид."
        correct: true
        explanation: "Наприклад: подзвоню, куплю, перевірю."
      - statement: "Складу іспит означає успішний результат."
        correct: true
        explanation: "Це доконаний простий майбутній."
      - statement: "Щодня часто веде до недоконаного виду."
        correct: true
        explanation: "Повторення: буду робити, буду вчити."
      - statement: "Форма писатиму корисна для розпізнавання, але буду писати безпечна на A2."
        correct: true
        explanation: "Цей модуль дозволяє активно тримати модель буду + інфінітив."
  - type: order
    title: План підготовки
    instruction: Поставте кроки в логічний порядок.
    items:
      - "Спочатку Дмитро запише дату іспиту."
      - "Потім він буде тренуватися з інструктором щотижня."
      - "У травні він повторить правила."
      - "Перед іспитом він буде спати достатньо."
      - "У день іспиту він прийде раніше."
      - "Після інструкції він спокійно виконає завдання."
      - "Якщо все буде добре, він складе іспит."
      - "Після цього друзі привітають його."
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
  - type: match-up
    title: Процес і результат
    instruction: Зіставте процес із природним завершеним кроком.
    pairs:
      - left: "буду писати розділ"
        right: "напишу розділ"
      - left: "буду читати книжку"
        right: "прочитаю книжку"
      - left: "буду готувати вечерю"
        right: "приготую вечерю"
      - left: "буду шукати адресу"
        right: "знайду адресу"
      - left: "буду дзвонити родичам"
        right: "подзвоню родичам"
      - left: "буду робити вправи"
        right: "зроблю вправи"
      - left: "буду вчити слова"
        right: "вивчу слова"
      - left: "буду готуватися до іспиту"
        right: "складу іспит"
  - type: quiz
    title: Оберіть пояснення
    instruction: Виберіть найкраще пояснення форми.
    items:
      - question: "Я напишу план до п'ятниці."
        options:
          - "Є готовий результат."
          - "Є тривалий процес."
          - "Є повторення щодня."
        correct: 0
        explanation: "План буде готовий."
      - question: "Я буду писати план годину."
        options:
          - "Є тривалість."
          - "Є один готовий дзвінок."
          - "Є завершений іспит."
        correct: 0
        explanation: "Годину показує процес."
      - question: "Вони куплять квитки онлайн."
        options:
          - "Є конкретний результат."
          - "Є процес цілий день."
          - "Є повторення щотижня."
        correct: 0
        explanation: "Квитки будуть куплені."
      - question: "Вони будуть купувати продукти щосуботи."
        options:
          - "Є повторення."
          - "Є один завершений крок."
          - "Є форма доконаного виду."
        correct: 0
        explanation: "Щосуботи означає повторювану дію."
      - question: "Леся прочитає книжку до літа."
        options:
          - "Книжка буде прочитана."
          - "Леся буде тільки в процесі."
          - "Форма з буду обов'язкова."
        correct: 0
        explanation: "До літа задає межу результату."
      - question: "Леся буде читати книжку ввечері."
        options:
          - "Читання як заняття."
          - "Книжка точно буде закінчена."
          - "Доконаний інфінітив після буду."
        correct: 0
        explanation: "Речення називає заняття на вечір."
      - question: "Дмитро складе іспит."
        options:
          - "Успішний результат."
          - "Довга підготовка."
          - "Повторення щодня."
        correct: 0
        explanation: "Скласти іспит - результат."
      - question: "Дмитро буде готуватися до іспиту."
        options:
          - "Процес підготовки."
          - "Іспит вже складено."
          - "Форма доконаного виду."
        correct: 0
        explanation: "Готуватися - недоконаний процес."
