inline:
  - id: act-1
    type: group-sort
    title: Два майбутні часи
    instruction: Розподіліть форми за тим, що вони показують.
    groups:
      - label: "доконаний результат"
        items:
          - "напишу"
          - "прочитає"
          - "зробимо"
          - "подзвонять"
      - label: "майбутній процес"
        items:
          - "буду писати"
          - "буде читати"
          - "будемо працювати"
          - "будуть дзвонити"
  - id: act-2
    type: fill-in
    title: Оберіть форму майбутнього
    instruction: Доповніть речення правильною формою.
    items:
      - sentence: "Завтра я ___ листа до школи."
        answer: "напишу"
        options:
          - "напишу"
          - "буду написати"
        explanation: "Написати є доконаним видом, тому форма без буду."
      - sentence: "Увечері я ___ листа годину."
        answer: "буду писати"
        options:
          - "напишу"
          - "буду писати"
        explanation: "Годину показує процес."
      - sentence: "Ми ___ квитки сьогодні."
        answer: "купимо"
        options:
          - "будемо купити"
          - "купимо"
        explanation: "Квитки як результат: купимо."
      - sentence: "Вони ___ українську все літо."
        answer: "будуть вивчати"
        options:
          - "вивчать"
          - "будуть вивчати"
        explanation: "Все літо показує тривалий процес."
      - sentence: "Після роботи я ___ лікарю."
        answer: "подзвоню"
        options:
          - "подзвоню"
          - "буду подзвонити"
        explanation: "Один дзвінок як завершена дія."
      - sentence: "Наступного тижня ми ___ про подорож."
        answer: "будемо говорити"
        options:
          - "скажемо"
          - "будемо говорити"
        explanation: "Говорити про тему - це процес."
  - id: act-3
    type: quiz
    title: Результат чи процес?
    instruction: Виберіть, яка форма краще підходить до ситуації.
    items:
      - question: "Ти обіцяєш відправити один лист."
        options:
          - "Я надішлю листа."
          - "Я буду надсилати листа."
          - "Я буду надіслати листа."
        correct: 0
        explanation: "Один завершений крок: надішлю."
      - question: "Ти весь вечір займатимешся читанням."
        options:
          - "Я буду читати весь вечір."
          - "Я прочитаю весь вечір."
          - "Я буду прочитати весь вечір."
        correct: 0
        explanation: "Весь вечір показує процес."
      - question: "Команда обіцяє закінчити проєкт."
        options:
          - "Ми закінчимо проєкт."
          - "Ми будемо закінчити проєкт."
          - "Ми будемо закінчили проєкт."
        correct: 0
        explanation: "Закінчити = довести до результату."
      - question: "Людина описує регулярні дзвінки щодня."
        options:
          - "Я буду дзвонити щодня."
          - "Я подзвоню щодня."
          - "Я буду подзвонити щодня."
        correct: 0
        explanation: "Щодня потребує недоконаного виду."
  - id: act-4
    type: match-up
    title: Знайдіть пару планів
    instruction: З'єднайте процес із природним завершеним кроком.
    pairs:
      - left: "буду писати листа"
        right: "напишу листа"
      - left: "буду читати статтю"
        right: "прочитаю статтю"
      - left: "буду готувати вечерю"
        right: "приготую вечерю"
      - left: "буду шукати адресу"
        right: "знайду адресу"
      - left: "буду дзвонити клієнтам"
        right: "подзвоню клієнту"
      - left: "буду робити вправи"
        right: "зроблю вправи"
workbook:
  - type: error-correction
    title: Виправте майбутній час
    instruction: Оберіть правильне виправлення.
    items:
      - sentence: "Я буду написати відповідь."
        error: "буду написати"
        correction: "Я напишу відповідь."
        options:
          - "Я напишу відповідь."
          - "Я буду написати відповідь."
        explanation: "Доконаний вид не бере буду."
      - sentence: "Він прочитає цілий вечір."
        error: "прочитає"
        correction: "Він буде читати цілий вечір."
        options:
          - "Він буде читати цілий вечір."
          - "Він прочитає цілий вечір."
        explanation: "Цілий вечір показує тривалість."
      - sentence: "Ми будемо купити квитки."
        error: "будемо купити"
        correction: "Ми купимо квитки."
        options:
          - "Ми купимо квитки."
          - "Ми будемо купити квитки."
        explanation: "Купити - доконаний вид."
      - sentence: "Вона зробить вправи щодня."
        error: "зробить"
        correction: "Вона буде робити вправи щодня."
        options:
          - "Вона буде робити вправи щодня."
          - "Вона зробить вправи щодня."
        explanation: "Щодня означає повторення."
  - type: fill-in
    title: Плани на вихідні
    instruction: Доповніть короткий план.
    items:
      - sentence: "У суботу зранку я ___ вдома."
        answer: "буду працювати"
        options:
          - "буду працювати"
          - "попрацюю"
        explanation: "Зранку як період: процес."
      - sentence: "Після обіду я ___ домашнє завдання."
        answer: "зроблю"
        options:
          - "буду зробити"
          - "зроблю"
        explanation: "Завдання буде готове."
      - sentence: "Увечері ми ___ фільм."
        answer: "будемо дивитися"
        options:
          - "будемо дивитися"
          - "подивимося"
        explanation: "Без додаткового контексту це заняття на вечір."
      - sentence: "Перед сном я ___ коротке повідомлення."
        answer: "напишу"
        options:
          - "напишу"
          - "буду написати"
        explanation: "Один короткий завершений крок."
  - type: true-false
    title: Майбутнє і вид
    instruction: Визначте, чи правильне твердження.
    items:
      - statement: "Форма напишу має майбутнє значення."
        correct: true
        explanation: "Доконаний вид не має справжнього теперішнього значення."
      - statement: "Буду написати - це стандартна A2-модель."
        correct: false
        explanation: "Потрібно: напишу або буду писати."
      - statement: "Буду читати підкреслює процес або заняття."
        correct: true
        explanation: "Це складений майбутній недоконаного виду."
      - statement: "Завтра автоматично вимагає доконаного виду."
        correct: false
        explanation: "Завтра може бути і процесом, і результатом."
      - statement: "Для конкретної обіцянки часто природний доконаний вид."
        correct: true
        explanation: "Я подзвоню, куплю, перевірю."
  - type: order
    title: План дня
    instruction: Поставте речення в логічний порядок.
    items:
      - "Зранку я буду працювати вдома."
      - "Після обіду я напишу листа."
      - "Увечері ми будемо говорити про подорож."
      - "Потім я прочитаю інструкцію."
    correct_order:
      - 0
      - 1
      - 2
      - 3
