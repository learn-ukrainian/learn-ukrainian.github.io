inline:
  - id: act-1
    type: quiz
    title: Процес чи результат?
    instruction: Виберіть, що показує дієслово в реченні.
    items:
      - question: "Я довго писав листа."
        options:
          - "процес"
          - "готовий результат"
          - "майбутній план"
        correct: 0
        explanation: "Довго показує дію зсередини."
      - question: "Вона написала листа сестрі."
        options:
          - "готовий результат"
          - "звичка"
          - "фон"
        correct: 0
        explanation: "Лист уже готовий."
      - question: "Коли ми чекали на автобус, почався дощ."
        options:
          - "фонова дія"
          - "завершений крок"
          - "наказ"
        correct: 0
        explanation: "Чекали створює сцену для події."
      - question: "Раптом хтось постукав у двері."
        options:
          - "одна раптова подія"
          - "повторення"
          - "тривалий процес"
        correct: 0
        explanation: "Раптом часто підкреслює точкову подію."
      - question: "У дитинстві я часто ходив до бібліотеки."
        options:
          - "повторення"
          - "готовий результат"
          - "один крок"
        correct: 0
        explanation: "Часто показує звичку або повторення."
      - question: "Ми купили квитки до Львова."
        options:
          - "завершений результат"
          - "процес купівлі"
          - "звичка"
        correct: 0
        explanation: "Квитки уже куплені."
      - question: "Марко годину шукав паспорт."
        options:
          - "процес"
          - "готовий результат"
          - "послідовність кроків"
        correct: 0
        explanation: "Годину показує тривалу дію."
      - question: "Нарешті ми знайшли готель."
        options:
          - "готовий результат"
          - "звичка"
          - "фонова дія"
        correct: 0
        explanation: "Знайшли означає, що результат уже є."
  - id: act-2
    type: fill-in
    title: Оберіть минулий час
    instruction: Доповніть речення формою, яка краще відповідає контексту.
    items:
      - sentence: "Я весь вечір ___ звіт."
        answer: "писав"
        options:
          - "писав"
          - "написав"
        explanation: "Весь вечір показує процес."
      - sentence: "Я нарешті ___ звіт і надіслав його."
        answer: "написав"
        options:
          - "писав"
          - "написав"
        explanation: "Нарешті і надіслав показують готовий результат."
      - sentence: "Коли Марина ___ салат, прийшли гості."
        answer: "готувала"
        options:
          - "готувала"
          - "приготувала"
        explanation: "Готувала є фоном для приходу гостей."
      - sentence: "Марина ___ салат до сьомої."
        answer: "приготувала"
        options:
          - "готувала"
          - "приготувала"
        explanation: "До сьомої підкреслює завершення."
      - sentence: "Раніше ми часто ___ у цьому кафе."
        answer: "обідали"
        options:
          - "обідали"
          - "пообідали"
        explanation: "Часто означає повторення."
      - sentence: "Учора ми ___ і пішли в кіно."
        answer: "пообідали"
        options:
          - "обідали"
          - "пообідали"
        explanation: "Це один завершений крок у послідовності."
      - sentence: "Ми весь ранок ___ ключі."
        answer: "шукали"
        options:
          - "шукали"
          - "знайшли"
        explanation: "Весь ранок показує тривалий процес."
      - sentence: "Вони нарешті ___ адресу."
        answer: "знайшли"
        options:
          - "шукали"
          - "знайшли"
        explanation: "Нарешті підкреслює готовий результат."
  - id: act-3
    type: match-up
    title: Слова-підказки
    instruction: З'єднайте слово або контекст із типовим вибором виду.
    pairs:
      - left: "довго"
        right: "недоконаний: процес"
      - left: "щодня"
        right: "недоконаний: повторення"
      - left: "коли я снідав"
        right: "недоконаний: фон"
      - left: "нарешті"
        right: "доконаний: результат"
      - left: "раптом"
        right: "доконаний: точкова подія"
      - left: "прийшов, помив, пообідав"
        right: "доконаний: послідовність"
      - left: "весь ранок"
        right: "недоконаний: тривалість"
      - left: "до кінця"
        right: "доконаний: завершення"
  - id: act-4
    type: error-correction
    title: Виправте вид
    instruction: Оберіть виправлення, яке краще відповідає контексту.
    items:
      - sentence: "Він щодня зробив вправи."
        error: "зробив"
        correction: "Він щодня робив вправи."
        options:
          - "Він щодня робив вправи."
          - "Він щодня зробив вправи."
        explanation: "Щодня потребує недоконаного виду."
      - sentence: "Я довго написала повідомлення."
        error: "написала"
        correction: "Я довго писала повідомлення."
        options:
          - "Я довго писала повідомлення."
          - "Я довго написала повідомлення."
        explanation: "Довго показує процес."
      - sentence: "Поки ми пообідали, зайшла сусідка."
        error: "пообідали"
        correction: "Поки ми обідали, зайшла сусідка."
        options:
          - "Поки ми обідали, зайшла сусідка."
          - "Поки ми пообідали, зайшла сусідка."
        explanation: "Сусідка зайшла під час процесу."
      - sentence: "Вона нарешті читала статтю до кінця."
        error: "читала"
        correction: "Вона нарешті прочитала статтю до кінця."
        options:
          - "Вона нарешті прочитала статтю до кінця."
          - "Вона нарешті читала статтю до кінця."
        explanation: "Нарешті і до кінця показують завершення."
      - sentence: "Я три години вивчив правила."
        error: "вивчив"
        correction: "Я три години вчив правила."
        options:
          - "Я три години вчив правила."
          - "Я три години вивчив правила."
        explanation: "Три години показує процес навчання."
      - sentence: "Раптом світло гасло."
        error: "гасло"
        correction: "Раптом світло згасло."
        options:
          - "Раптом світло згасло."
          - "Раптом світло гасло."
        explanation: "Раптом вводить одну точкову подію."
      - sentence: "Вона часто купила овочі на ринку."
        error: "купила"
        correction: "Вона часто купувала овочі на ринку."
        options:
          - "Вона часто купувала овочі на ринку."
          - "Вона часто купила овочі на ринку."
        explanation: "Часто показує повторення."
      - sentence: "Ми нарешті шукали правильну адресу."
        error: "шукали"
        correction: "Ми нарешті знайшли правильну адресу."
        options:
          - "Ми нарешті знайшли правильну адресу."
          - "Ми нарешті шукали правильну адресу."
        explanation: "Нарешті підкреслює результат пошуку."
workbook:
  - type: group-sort
    title: Розкладіть речення за видом
    instruction: Розподіліть речення на дві групи.
    groups:
      - label: "недоконаний вид"
        items:
          - "Я довго шукав ключі."
          - "Вона щодня телефонувала бабусі."
          - "Коли ми вечеряли, почався дощ."
          - "У школі вони часто писали тести."
      - label: "доконаний вид"
        items:
          - "Я знайшов ключі."
          - "Вона подзвонила бабусі."
          - "Ми повечеряли і пішли гуляти."
          - "Вони написали тест."
  - type: fill-in
    title: Мініісторія з пропусками
    instruction: Виберіть форму, яка робить історію природною.
    items:
      - sentence: "Учора я ___ вдома і ___ презентацію."
        answer: "сидів / готував"
        options:
          - "сидів / готував"
          - "сів / приготував"
        explanation: "На початку історії це фон."
      - sentence: "Раптом колега ___ і ___ про зустріч."
        answer: "подзвонив / нагадав"
        options:
          - "дзвонив / нагадував"
          - "подзвонив / нагадав"
        explanation: "Раптом вводить окрему подію."
      - sentence: "Я швидко ___ презентацію і ___ ноутбук."
        answer: "закінчив / відкрив"
        options:
          - "закінчив / відкрив"
          - "закінчував / відкривав"
        explanation: "Це два завершені кроки."
      - sentence: "Поки ми ___, керівниця ___ нотатки."
        answer: "говорили / писала"
        options:
          - "сказали / написала"
          - "говорили / писала"
        explanation: "Дві дії тривали одночасно."
      - sentence: "Після зустрічі я ___ нотатки і ___ їх колезі."
        answer: "написав / надіслав"
        options:
          - "писав / надсилав"
          - "написав / надіслав"
        explanation: "Це завершені кроки після зустрічі."
      - sentence: "Поки я ___ нотатки, колега ___ презентацію."
        answer: "писав / готувала"
        options:
          - "написав / приготувала"
          - "писав / готувала"
        explanation: "Поки показує дві фонові дії."
      - sentence: "Ми довго ___ вільний кабінет і нарешті ___ його."
        answer: "шукали / знайшли"
        options:
          - "шукали / знайшли"
          - "знайшли / шукали"
        explanation: "Спочатку процес, потім результат."
      - sentence: "Вона часто ___ звіти ввечері, але вчора ___ звіт удень."
        answer: "писала / написала"
        options:
          - "писала / написала"
          - "написала / писала"
        explanation: "Часто показує звичку, вчора - завершений результат."
  - type: true-false
    title: Перевірка розуміння
    instruction: Позначте, чи правильне твердження.
    items:
      - statement: "Доконаний вид у минулому часі часто показує готовий результат."
        correct: true
        explanation: "Так: написав, купив, прочитав."
      - statement: "Слово довго зазвичай підказує доконаний вид."
        correct: false
        explanation: "Довго зазвичай показує процес."
      - statement: "У реченні з коли фонова дія часто має недоконаний вид."
        correct: true
        explanation: "Коли я читав, подзвонила сестра."
      - statement: "Усі речення зі словом учора автоматично потребують доконаного виду."
        correct: false
        explanation: "Учора може бути і процес, і результат."
      - statement: "У послідовності завершених кроків часто стоїть доконаний вид."
        correct: true
        explanation: "Прийшов, помив, пообідав, подзвонив."
      - statement: "Слово коли завжди вимагає недоконаного виду."
        correct: false
        explanation: "Коли я написав листа, я надіслав його."
      - statement: "Шукати і знайти можуть бути видовою парою за змістом."
        correct: true
        explanation: "Шукати показує процес, знайти - результат."
      - statement: "У реченні з часто зазвичай ідеться про повторення."
        correct: true
        explanation: "Часто допомагає вибрати недоконаний вид."
  - type: order
    title: Побудуйте коротку історію
    instruction: Поставте речення в природний порядок.
    items:
      - "Я довго писав листа."
      - "Коли я писав, мені подзвонила сестра."
      - "Потім я нарешті написав листа."
      - "Увечері я надіслав його."
      - "Сестра прочитала лист і відповіла мені."
      - "Поки я чекав на відповідь, я готував вечерю."
      - "Після вечері ми поговорили телефоном."
      - "Так закінчився мій спокійний день."
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
