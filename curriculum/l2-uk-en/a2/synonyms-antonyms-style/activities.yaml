inline:
  - id: act-1
    type: match-up
    title: Доберіть близьке слово
    instruction: З'єднайте слово з доречним синонімом або близьким словом.
    pairs:
      - left: "говорити"
        right: "казати"
      - left: "розповідати"
        right: "оповідати"
      - left: "великий"
        right: "чималий"
      - left: "величезний"
        right: "дуже великий"
      - left: "гарний"
        right: "красивий"
      - left: "приємний"
        right: "милий"
      - left: "швидко"
        right: "прудко"
      - left: "спокійний"
        right: "тихий"
  - id: act-2
    type: quiz
    title: Антонім у контексті
    instruction: Оберіть слово з протилежним значенням.
    items:
      - question: "тиха вулиця - ___ вулиця"
        options:
          - "гучна"
          - "зелена"
          - "довга"
        correct: 0
        explanation: "Гучна протиставляється тихій."
      - question: "світла кімната - ___ кімната"
        options:
          - "темна"
          - "чиста"
          - "тепла"
        correct: 0
        explanation: "Темна - протилежність до світла."
      - question: "коротка дорога - ___ дорога"
        options:
          - "довга"
          - "широка"
          - "нова"
        correct: 0
        explanation: "Довга протиставляється короткій."
      - question: "дорогий квиток - ___ квиток"
        options:
          - "дешевий"
          - "зручний"
          - "пізній"
        correct: 0
        explanation: "Дешевий - антонім до дорогий."
      - question: "початок зустрічі - ___ зустрічі"
        options:
          - "кінець"
          - "план"
          - "тема"
        correct: 0
        explanation: "Початок і кінець - пара антонімів."
      - question: "швидкий автобус - ___ автобус"
        options:
          - "повільний"
          - "синій"
          - "міський"
        correct: 0
        explanation: "Повільний - протилежність до швидкий."
      - question: "старий будинок - ___ будинок"
        options:
          - "новий"
          - "високий"
          - "кам'яний"
        correct: 0
        explanation: "Новий протиставляється старому."
      - question: "радість - ___"
        options:
          - "сум"
          - "сміх"
          - "спокій"
        correct: 0
        explanation: "Сум є базовим антонімом до радості."
  - id: act-3
    type: group-sort
    title: Що це за прийом?
    instruction: Розподіліть приклади за стилістичними категоріями.
    groups:
      - label: "епітет"
        items:
          - "золота осінь"
          - "тихий ранок"
          - "гострий вітер"
          - "теплий голос"
      - label: "метафора"
        items:
          - "море квітів"
          - "хвиля людей"
          - "крила мрії"
          - "стіна мовчання"
      - label: "еліпсис"
        items:
          - "Я - каву, а ти?"
          - "Він - додому."
          - "Кожному - своє."
          - "Усе найкраще - дітям."
      - label: "повтор"
        items:
          - "думали-думали"
          - "тихо-тихо"
          - "далеко-далеко"
          - "ходили-ходили"
  - id: act-4
    type: fill-in
    title: Пестливі форми
    instruction: Оберіть природну пестливу форму.
    items:
      - sentence: "кіт - ___"
        answer: "котик"
        options:
          - "котик"
          - "котний"
          - "котина"
        explanation: "Котик - поширена пестлива форма."
      - sentence: "зірка - ___"
        answer: "зірочка"
        options:
          - "зірочка"
          - "зірковий"
          - "зірки"
        explanation: "Зірочка утворена з суфіксом -очк-."
      - sentence: "книга - ___"
        answer: "книжечка"
        options:
          - "книжечка"
          - "книжний"
          - "книжкає"
        explanation: "Книжечка має пестливий відтінок."
      - sentence: "Іван - ___"
        answer: "Іванко"
        options:
          - "Іванко"
          - "Іванний"
          - "Іванство"
        explanation: "Іванко - пестлива форма імені."
      - sentence: "Марія - ___"
        answer: "Марійка"
        options:
          - "Марійка"
          - "Марійний"
          - "Маріїв"
        explanation: "Марійка - природна пестлива форма."
      - sentence: "стіл - ___"
        answer: "столик"
        options:
          - "столик"
          - "стільний"
          - "стільце"
        explanation: "Столик може означати маленький стіл."
      - sentence: "квітка - ___"
        answer: "квіточка"
        options:
          - "квіточка"
          - "квітний"
          - "квітити"
        explanation: "Квіточка має пестливе значення."
      - sentence: "день - ___"
        answer: "деньок"
        options:
          - "деньок"
          - "денний"
          - "денець"
        explanation: "Деньок - розмовна пестлива форма."
workbook:
  - type: error-correction
    title: Приберіть бідний повтор
    instruction: Оберіть кращий варіант речення.
    items:
      - sentence: "У центрі є великий будинок і великий парк."
        error: "великий будинок і великий парк"
        correction: "У центрі є високий будинок і просторий парк."
        options:
          - "У центрі є високий будинок і просторий парк."
          - "У центрі є великий будинок і великий парк."
        explanation: "Високий і просторий точніше описують різні речі."
      - sentence: "Вона говорила історію."
        error: "говорила історію"
        correction: "Вона розповідала історію."
        options:
          - "Вона розповідала історію."
          - "Вона казала історію."
        explanation: "Історію природно розповідати."
      - sentence: "Викладачка розповідає правило."
        error: "розповідає правило"
        correction: "Викладачка пояснює правило."
        options:
          - "Викладачка пояснює правило."
          - "Викладачка робить правило."
        explanation: "Правило краще пояснювати."
      - sentence: "У листі було: Надішліть книжечку."
        error: "книжечку"
        correction: "У листі було: Надішліть книгу."
        options:
          - "У листі було: Надішліть книгу."
          - "У листі було: Надішліть книжечку."
        explanation: "Офіційний стиль потребує нейтральної форми."
      - sentence: "Ми бачили море квітів, тобто справжнє море."
        error: "справжнє море"
        correction: "Ми бачили море квітів, тобто дуже багато квітів."
        options:
          - "Ми бачили море квітів, тобто дуже багато квітів."
          - "Ми бачили море квітів, тобто пляж."
        explanation: "Море квітів - метафора кількості."
      - sentence: "Я - каву, а ти? Це помилка."
        error: "Це помилка"
        correction: "Я - каву, а ти? Це природний еліпсис."
        options:
          - "Я - каву, а ти? Це природний еліпсис."
          - "Я - каву, а ти? Це антонім."
        explanation: "Пропущено дієслово, яке зрозуміле з контексту."
      - sentence: "Думали-думали - це випадкова помилка."
        error: "випадкова помилка"
        correction: "Думали-думали - це стилістичний повтор."
        options:
          - "Думали-думали - це стилістичний повтор."
          - "Думали-думали - це метафора."
        explanation: "Повтор підсилює тривалість дії."
      - sentence: "Кімната була приємна, людина була вродлива, день був вродливий."
        error: "день був вродливий"
        correction: "Кімната була приємна, людина була вродлива, день був гарний."
        options:
          - "Кімната була приємна, людина була вродлива, день був гарний."
          - "Кімната була вродлива, людина була гарна, день був вродливий."
        explanation: "Вродливий уживається насамперед про людину."
  - type: match-up
    title: Прийом і функція
    instruction: З'єднайте стилістичний прийом із його функцією.
    pairs:
      - left: "синонім"
        right: "допомагає уникати повтору"
      - left: "антонім"
        right: "створює контраст"
      - left: "епітет"
        right: "додає образний прикметник"
      - left: "метафора"
        right: "переносить значення без слова як"
      - left: "пестлива форма"
        right: "додає ніжність або неформальність"
      - left: "еліпсис"
        right: "пропускає зрозуміле слово"
      - left: "повтор"
        right: "підсилює або створює ритм"
      - left: "відтінок"
        right: "показує маленьку різницю значення"
  - type: fill-in
    title: Редагування опису
    instruction: Оберіть слово, яке робить опис точнішим.
    items:
      - sentence: "___ парк краще, ніж просто великий парк."
        answer: "Просторий"
        options:
          - "Просторий"
          - "Гучний"
        explanation: "Парк може бути просторий."
      - sentence: "___ будинок краще, ніж просто великий будинок."
        answer: "Високий"
        options:
          - "Високий"
          - "Смачний"
        explanation: "Для будинку доречна висота."
      - sentence: "___ вулиця є антонімом до тиха вулиця."
        answer: "Гучна"
        options:
          - "Гучна"
          - "Зелена"
        explanation: "Гучна протиставляється тихій."
      - sentence: "___ голос - це епітет, не буквальна температура."
        answer: "Теплий"
        options:
          - "Теплий"
          - "Кілограмовий"
        explanation: "Теплий голос означає доброзичливий."
      - sentence: "___ людей - це метафора великої кількості."
        answer: "Хвиля"
        options:
          - "Хвиля"
          - "Словник"
        explanation: "Хвиля людей - образ руху групи."
      - sentence: "У реченні Я - каву, а ти? є ___."
        answer: "еліпсис"
        options:
          - "еліпсис"
          - "антонім"
        explanation: "Пропущено дієслово хочу або беру."
      - sentence: "У слові котик є ___ форма."
        answer: "пестлива"
        options:
          - "пестлива"
          - "офіційна"
        explanation: "Котик має ніжний або малий відтінок."
      - sentence: "У фразі тихо-тихо є ___."
        answer: "повтор"
        options:
          - "повтор"
          - "синонім"
        explanation: "Слово повторюється для підсилення."
