inline:
  - id: act-1
    type: fill-in
    title: Називний множини
    instruction: Оберіть форму називного відмінка множини.
    items:
      - sentence: "У класі стоять ___."
        answer: столи
        options:
          - столи
          - столів
          - столом
        explanation: Столи виконують роль підмета, тому це називний множини.
      - sentence: "Тут є нові ___."
        answer: міста
        options:
          - місто
          - міста
          - міст
        explanation: Місто у називному множини - міста.
      - sentence: "У парку грають ___."
        answer: діти
        options:
          - дітей
          - діти
          - дитиною
        explanation: Діти виконують дію, тому це називний множини.
      - sentence: "На полиці лежать ___."
        answer: книги
        options:
          - книг
          - книгам
          - книги
        explanation: Книги є підметом, тому називний множини.
  - id: act-2
    type: group-sort
    title: Істоти чи неістоти?
    instruction: Розсортуйте слова. Це допоможе вибрати знахідний множини.
    groups:
      - label: Істоти
        items:
          - друзі
          - студенти
          - сестри
          - пінгвіни
      - label: Неістоти
        items:
          - книги
          - столи
          - квіти
          - ключі
  - id: act-3
    type: quiz
    title: Бачу кого? Бачу що?
    instruction: Оберіть правильну форму знахідного множини.
    items:
      - question: "Я бачу ___."
        options:
          - друзів
          - друзі
          - друзями
        correct: 0
        explanation: Друзі - істоти, тому бачу друзів.
      - question: "Ми купуємо ___."
        options:
          - книжок
          - книги
          - книгам
        correct: 1
        explanation: Книги - неістоти, знахідний множини як називний.
      - question: "Діти фотографують ___."
        options:
          - пінгвіни
          - пінгвінів
          - пінгвінами
        correct: 1
        explanation: Пінгвіни - істоти, тому пінгвінів.
      - question: "Тато шукає ___."
        options:
          - ключі
          - ключів
          - ключам
        correct: 0
        explanation: Ключі - неістоти, форма така сама як називний множини.
  - id: act-4
    type: error-correction
    title: Виправте форму
    instruction: Оберіть правильне речення.
    items:
      - sentence: "Я бачу студенти."
        error: студенти
        correction: "Я бачу студентів."
        options:
          - "Я бачу студентів."
          - "Я бачу студенти."
        explanation: Студенти - істоти, у знахідному множини студентів.
      - sentence: "Дітей грають у парку."
        error: Дітей
        correction: "Діти грають у парку."
        options:
          - "Діти грають у парку."
          - "Дітей грають у парку."
        explanation: Це підмет, тому називний множини діти.
      - sentence: "Ми купуємо квітів."
        error: квітів
        correction: "Ми купуємо квіти."
        options:
          - "Ми купуємо квіти."
          - "Ми купуємо квітів."
        explanation: Квіти - неістоти, у знахідному множини форма квіти.
      - sentence: "Вона зустрічає сестри."
        error: сестри
        correction: "Вона зустрічає сестер."
        options:
          - "Вона зустрічає сестер."
          - "Вона зустрічає сестри."
        explanation: Сестри - істоти, після зустрічати потрібна форма сестер.
workbook:
  - type: match-up
    title: Однина і множина
    instruction: З'єднайте однину з називним множини.
    pairs:
      - left: стіл
        right: столи
      - left: земля
        right: землі
      - left: місто
        right: міста
      - left: людина
        right: люди
      - left: дитина
        right: діти
      - left: око
        right: очі
  - type: fill-in
    title: Хто? Що?
    instruction: Оберіть форму, яка підходить до речення.
    items:
      - sentence: "___ сидять у кафе."
        answer: друзі
        options:
          - друзі
          - друзів
          - друзям
        explanation: Друзі виконують дію.
      - sentence: "На столі лежать ___."
        answer: ключі
        options:
          - ключі
          - ключів
          - ключами
        explanation: Ключі є підметом.
      - sentence: "___ сплять біля дерева."
        answer: леви
        options:
          - леви
          - левів
          - левам
        explanation: Леви виконують дію.
      - sentence: "У кімнаті стоять ___."
        answer: стільці
        options:
          - стільців
          - стільці
          - стільцям
        explanation: Стільці є підметом.
  - type: true-false
    title: Чи правильно?
    instruction: Визначте, чи правильно вжито форму.
    items:
      - statement: "Я бачу друзів."
        correct: true
        explanation: Друзі - істоти, тому друзів.
      - statement: "Я купую столів."
        correct: false
        explanation: Столи - неістоти, треба купую столи.
      - statement: "Діти читають."
        correct: true
        explanation: Діти виконують дію, це називний.
      - statement: "Ми фотографуємо мавпи."
        correct: false
        explanation: Мавпи - істоти, треба мавп.
