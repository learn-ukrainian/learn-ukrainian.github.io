inline:
  - id: act-1
    type: fill-in
    title: Називний множини
    instruction: Оберіть форму називного відмінка множини.
    items:
      - sentence: "У класі стоять ___."
        answer: столи
        options:
          - столи
          - столів
          - столом
        explanation: Столи виконують роль підмета, тому це називний множини.
      - sentence: "Тут є нові ___."
        answer: міста
        options:
          - місто
          - міста
          - міст
        explanation: Місто у називному множини - міста.
      - sentence: "У парку грають ___."
        answer: діти
        options:
          - дітей
          - діти
          - дитиною
        explanation: Діти виконують дію, тому це називний множини.
      - sentence: "На полиці лежать ___."
        answer: книги
        options:
          - книг
          - книгам
          - книги
        explanation: Книги є підметом, тому називний множини.
      - sentence: "На карті позначені родючі ___."
        answer: землі
        options:
          - земля
          - землі
          - землею
        explanation: Земля у значенні території має називний множини землі.
      - sentence: "У коридорі стоять нові ___."
        answer: учні
        options:
          - учнів
          - учням
          - учні
        explanation: Учні виконують роль підмета, тому це називний множини.
      - sentence: "У селі темні ___."
        answer: ночі
        options:
          - ночі
          - ніч
          - ночами
        explanation: Ніч у називному множини - ночі.
      - sentence: "Біля ферми бігають малі ___."
        answer: курчата
        options:
          - курча
          - курчата
          - курчатам
        explanation: Курча у називному множини - курчата.
  - id: act-2
    type: group-sort
    title: Істоти чи неістоти?
    instruction: Розсортуйте слова. Це допоможе вибрати знахідний множини.
    groups:
      - label: Істоти
        items:
          - друзі -> друзів
          - студенти -> студентів
          - сестри -> сестер
          - пінгвіни -> пінгвінів
      - label: Неістоти
        items:
          - книги -> книги
          - столи -> столи
          - квіти -> квіти
          - ключі -> ключі
  - id: act-3
    type: quiz
    title: Бачу кого? Бачу що?
    instruction: Оберіть правильну форму знахідного множини.
    items:
      - question: "Я бачу ___."
        options:
          - друзів
          - друзі
          - друзями
        correct: 0
        explanation: Друзі - істоти, тому бачу друзів.
      - question: "Ми купуємо ___."
        options:
          - книжок
          - книги
          - книгам
        correct: 1
        explanation: Книги - неістоти, знахідний множини як називний.
      - question: "Діти фотографують ___."
        options:
          - пінгвіни
          - пінгвінів
          - пінгвінами
        correct: 1
        explanation: Пінгвіни - істоти, тому пінгвінів.
      - question: "Тато шукає ___."
        options:
          - ключі
          - ключів
          - ключам
        correct: 0
        explanation: Ключі - неістоти, форма така сама як називний множини.
      - question: "Екскурсовод знає ___."
        options:
          - туристи
          - туристів
          - туристами
        correct: 1
        explanation: Туристи - істоти, тому у знахідному множини туристів.
      - question: "Вона фотографує ___."
        options:
          - квіти
          - квітів
          - квітам
        correct: 0
        explanation: Квіти - неістоти, тому форма така сама як називний множини.
      - question: "Ми зустрічаємо ___."
        options:
          - сестри
          - сестрами
          - сестер
        correct: 2
        explanation: Сестри - істоти, у знахідному множини сестер.
      - question: "Друзі читають про ___."
        options:
          - міста
          - міст
          - містами
        correct: 0
        explanation: Міста - неістоти, після про форма знахідного множини збігається з називним.
  - id: act-4
    type: error-correction
    title: Виправте форму
    instruction: Оберіть правильне речення.
    items:
      - sentence: "Я бачу студенти."
        error: студенти
        correction: "Я бачу студентів."
        options:
          - "Я бачу студентів."
          - "Я бачу студенти."
        explanation: Студенти - істоти, у знахідному множини студентів.
      - sentence: "Дітей грають у парку."
        error: Дітей
        correction: "Діти грають у парку."
        options:
          - "Діти грають у парку."
          - "Дітей грають у парку."
        explanation: Це підмет, тому називний множини діти.
      - sentence: "Ми купуємо квітів."
        error: квітів
        correction: "Ми купуємо квіти."
        options:
          - "Ми купуємо квіти."
          - "Ми купуємо квітів."
        explanation: Квіти - неістоти, у знахідному множини форма квіти.
      - sentence: "Вона зустрічає сестри."
        error: сестри
        correction: "Вона зустрічає сестер."
        options:
          - "Вона зустрічає сестер."
          - "Вона зустрічає сестри."
        explanation: Сестри - істоти, після зустрічати потрібна форма сестер.
      - sentence: "Учитель бачить діти."
        error: діти
        correction: "Учитель бачить дітей."
        options:
          - "Учитель бачить дітей."
          - "Учитель бачить діти."
        explanation: Діти - істоти, після бачить потрібна форма дітей.
      - sentence: "На столі лежать ключів."
        error: ключів
        correction: "На столі лежать ключі."
        options:
          - "На столі лежать ключі."
          - "На столі лежать ключів."
        explanation: Ключі є підметом, тому називний множини.
      - sentence: "Ми говоримо про вчителі."
        error: вчителі
        correction: "Ми говоримо про вчителів."
        options:
          - "Ми говоримо про вчителі."
          - "Ми говоримо про вчителів."
        explanation: Вчителі - істоти, після про потрібен знахідний множини вчителів.
      - sentence: "Туристи бачать міст."
        error: міст
        correction: "Туристи бачать міста."
        options:
          - "Туристи бачать міста."
          - "Туристи бачать міст."
        explanation: Міста - неістоти, тому знахідний множини має форму міста.
