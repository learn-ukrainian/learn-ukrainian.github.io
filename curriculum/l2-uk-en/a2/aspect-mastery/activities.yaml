inline:
  - id: act-1
    type: group-sort
    title: Модель пари
    instruction: Розподіліть видові пари за головною моделлю.
    groups:
      - label: "префікс"
        items:
          - "писати / написати"
          - "читати / прочитати"
          - "робити / зробити"
          - "мити / помити"
          - "класти / покласти"
      - label: "суфікс або довша основа"
        items:
          - "записувати / записати"
          - "пояснювати / пояснити"
          - "закінчувати / закінчити"
          - "перекладати / перекласти"
      - label: "зміна основи"
        items:
          - "допомагати / допомогти"
          - "відповідати / відповісти"
          - "розповідати / розповісти"
      - label: "інша форма"
        items:
          - "брати / взяти"
          - "говорити / сказати"
          - "казати / сказати"
  - id: act-2
    type: match-up
    title: Знайдіть доконаний відповідник
    instruction: З'єднайте дієслово недоконаного виду з частим доконаним відповідником.
    pairs:
      - left: "писати"
        right: "написати"
      - left: "читати"
        right: "прочитати"
      - left: "готувати"
        right: "приготувати"
      - left: "брати"
        right: "взяти"
      - left: "давати"
        right: "дати"
      - left: "відповідати"
        right: "відповісти"
      - left: "купувати"
        right: "купити"
      - left: "платити"
        right: "заплатити"
      - left: "казати"
        right: "сказати"
      - left: "закінчувати"
        right: "закінчити"
  - id: act-3
    type: fill-in
    title: Вид у контексті
    instruction: Оберіть дієслово, яке краще відповідає ситуації.
    items:
      - sentence: "Коли я ___ каву, подзвонив колега."
        answer: "готував"
        options:
          - "готував"
          - "приготував"
        explanation: "Це фонова дія в момент дзвінка."
      - sentence: "Я ___ каву і сів за стіл."
        answer: "приготував"
        options:
          - "готував"
          - "приготував"
        explanation: "Це завершений крок у послідовності."
      - sentence: "Вона часто ___ сусідам."
        answer: "допомагала"
        options:
          - "допомагала"
          - "допомогла"
        explanation: "Часто показує звичку."
      - sentence: "Учора вона ___ сусідці з покупками."
        answer: "допомогла"
        options:
          - "допомагала"
          - "допомогла"
        explanation: "Учора тут одна завершена ситуація."
      - sentence: "До вечора я ___ коротку відповідь."
        answer: "напишу"
        options:
          - "буду писати"
          - "напишу"
        explanation: "До вечора відповідь має бути готова."
      - sentence: "Увечері я ___ відповідь пів години."
        answer: "буду писати"
        options:
          - "напишу"
          - "буду писати"
        explanation: "Пів години показує процес."
      - sentence: "Я не ___ цю книгу: тільки почав перший розділ."
        answer: "прочитав"
        options:
          - "читав"
          - "прочитав"
        explanation: "Книга не дочитана до кінця."
      - sentence: "Я ніколи не ___ цю книгу, тому не знаю сюжету."
        answer: "читав"
        options:
          - "читав"
          - "прочитав"
        explanation: "Ніколи не читав означає відсутність досвіду."
  - id: act-4
    type: quiz
    title: Який вид підходить?
    instruction: Прочитайте ситуацію і виберіть природну форму.
    items:
      - question: "Домашнє завдання має бути готове до вечора."
        options:
          - "Я зроблю домашнє завдання до вечора."
          - "Я буду робити домашнє завдання до вечора."
          - "Я буду зробити домашнє завдання."
        correct: 0
        explanation: "Є межа і готовий результат."
      - question: "Учень описує, що відбувалося, коли подзвонила мама."
        options:
          - "Я написав твір, коли мама подзвонила."
          - "Я писав твір, коли мама подзвонила."
          - "Я буду писати твір, коли мама подзвонила."
        correct: 1
        explanation: "Фонова дія бере недоконаний вид."
      - question: "Потрібна загальна порада для щоденної практики."
        options:
          - "Прочитай більше щодня."
          - "Будь прочитати більше щодня."
          - "Читай більше щодня."
        correct: 2
        explanation: "Звичка або регулярна порада потребує недоконаного виду."
      - question: "Потрібне конкретне завдання на зараз."
        options:
          - "Прочитай цей абзац зараз."
          - "Читай цей абзац до результату зараз."
          - "Будь читати цей абзац зараз."
        correct: 0
        explanation: "Конкретне одноразове завдання бере доконаний вид."
      - question: "Людина мала досвід читання, але не дійшла до кінця."
        options:
          - "Я не читав книгу."
          - "Я не прочитав книгу."
          - "Я не буду прочитати книгу."
        correct: 1
        explanation: "Не прочитав означає, що результат не досягнуто."
      - question: "Розмова тривала дві години."
        options:
          - "Ми говорили дві години."
          - "Ми сказали дві години."
          - "Ми будемо сказати дві години."
        correct: 0
        explanation: "Тривалість потребує процесу."
      - question: "Одна головна думка була висловлена."
        options:
          - "Він говорив головне."
          - "Він казати головне."
          - "Він сказав головне."
        correct: 2
        explanation: "Сказав називає завершений комунікативний крок."
      - question: "План на вечір як заняття, без обіцянки готового тексту."
        options:
          - "Я перекладу текст увечері пів години."
          - "Я буду перекладати текст увечері пів години."
          - "Я буду перекласти текст увечері."
        correct: 1
        explanation: "Пів години показує процес перекладу."
workbook:
  - type: error-correction
    title: Виправте пару або вид
    instruction: Оберіть кращий варіант.
    items:
      - sentence: "писати / сказати"
        error: "сказати"
        correction: "писати / написати"
        options:
          - "писати / написати"
          - "писати / сказати"
        explanation: "Сказати належить до мовлення, не до письма."
      - sentence: "Він щодня заплатив за каву карткою."
        error: "заплатив"
        correction: "Він щодня платив за каву карткою."
        options:
          - "Він щодня платив за каву карткою."
          - "Він щодня заплатив за каву карткою."
        explanation: "Щодня означає повторення."
      - sentence: "Я буду написати відповідь."
        error: "буду написати"
        correction: "Я напишу відповідь."
        options:
          - "Я напишу відповідь."
          - "Я буду написати відповідь."
        explanation: "Доконаний вид у майбутньому не бере буду."
      - sentence: "Коли вона прочитала листа, телефон дзвонив весь час."
        error: "прочитала"
        correction: "Коли вона читала листа, телефон дзвонив весь час."
        options:
          - "Коли вона читала листа, телефон дзвонив весь час."
          - "Коли вона прочитала листа, телефон дзвонив весь час."
        explanation: "Весь час показує фоновий процес читання."
      - sentence: "Ми будемо прочитати інструкцію."
        error: "будемо прочитати"
        correction: "Ми прочитаємо інструкцію."
        options:
          - "Ми прочитаємо інструкцію."
          - "Ми будемо прочитати інструкцію."
        explanation: "Прочитати - доконаний вид."
      - sentence: "Вони часто купили хліб після роботи."
        error: "купили"
        correction: "Вони часто купували хліб після роботи."
        options:
          - "Вони часто купували хліб після роботи."
          - "Вони часто купили хліб після роботи."
        explanation: "Часто показує повторення."
      - sentence: "Вона часто сказала це на уроці."
        error: "сказала"
        correction: "Вона часто казала це на уроці."
        options:
          - "Вона часто казала це на уроці."
          - "Вона часто сказала це на уроці."
        explanation: "Часто потребує недоконаного виду."
      - sentence: "До п'ятниці я буду перекласти текст."
        error: "буду перекласти"
        correction: "До п'ятниці я перекладу текст."
        options:
          - "До п'ятниці я перекладу текст."
          - "До п'ятниці я буду перекласти текст."
        explanation: "До п'ятниці текст має бути готовий."
  - type: group-sort
    title: Контекст вибору
    instruction: Розподіліть контексти за типовим видом.
    groups:
      - label: "недоконаний вид"
        items:
          - "довго писав"
          - "часто допомагала"
          - "коли готував"
          - "буду читати"
          - "щодня платив"
          - "ніколи не читав"
      - label: "доконаний вид"
        items:
          - "нарешті написав"
          - "один раз допомогла"
          - "приготував і подав"
          - "прочитаю до вечора"
          - "щойно купив"
          - "не прочитав до кінця"
  - type: match-up
    title: Пари в реченнях
    instruction: З'єднайте ситуацію з природною парою.
    pairs:
      - left: "домашнє завдання"
        right: "робити / зробити"
      - left: "короткий лист"
        right: "писати / написати"
      - left: "рецепт і вечеря"
        right: "готувати / приготувати"
      - left: "адреса в нотатках"
        right: "записувати / записати"
      - left: "порада другові"
        right: "давати / дати"
      - left: "квитки онлайн"
        right: "купувати / купити"
      - left: "відповідь на лист"
        right: "відповідати / відповісти"
      - left: "текст іншою мовою"
        right: "перекладати / перекласти"
  - type: fill-in
    title: Пара в мінідіалозі
    instruction: Оберіть форму за змістом.
    items:
      - sentence: "Ти вже ___ вправу? - Ні, я ще її ___."
        answer: "зробив / роблю"
        options:
          - "зробив / роблю"
          - "робив / зроблю"
        explanation: "Питання про готовий результат, відповідь про процес."
      - sentence: "Вона вже ___ адресу? - Так, вона ___ її в телефон."
        answer: "записала / записала"
        options:
          - "записувала / записувала"
          - "записала / записала"
        explanation: "Обидва рази потрібен результат."
      - sentence: "Що ти будеш робити ввечері? - Я ___ статтю."
        answer: "буду перекладати"
        options:
          - "перекладу"
          - "буду перекладати"
        explanation: "Питання про заняття ввечері."
      - sentence: "Що ти зробиш до п'ятниці? - Я ___ статтю."
        answer: "перекладу"
        options:
          - "перекладу"
          - "буду перекладати"
        explanation: "До п'ятниці вимагає готовий результат."
      - sentence: "Ти ___ цю книжку? - Ні, я тільки почав і не ___ її."
        answer: "читав / прочитав"
        options:
          - "читав / прочитав"
          - "прочитав / читав"
        explanation: "Перше дієслово питає про досвід, друге - про результат."
      - sentence: "Коли мама ___ вечерю, Данило ___ текст."
        answer: "готувала / читав"
        options:
          - "приготувала / прочитав"
          - "готувала / читав"
        explanation: "Дві дії тривають як фон."
      - sentence: "Ми ___ двері і ___ в кімнату."
        answer: "відкрили / зайшли"
        options:
          - "відкривали / заходили"
          - "відкрили / зайшли"
        explanation: "Це два завершені кроки."
      - sentence: "Викладач довго ___ правило, але нарешті ___ приклад."
        answer: "пояснював / пояснив"
        options:
          - "пояснював / пояснив"
          - "пояснив / пояснював"
        explanation: "Спочатку процес, потім результат."
  - type: true-false
    title: Перевірте правило
    instruction: Визначте, чи правильне кожне твердження.
    items:
      - statement: "Видову пару краще вчити як дві пов'язані форми."
        answer: true
        explanation: "Так легше вибирати процес або результат."
      - statement: "Усі видові пари утворюються одним префіксом."
        answer: false
        explanation: "Є префікси, суфікси, зміни основи й інші форми."
      - statement: "Часто і щодня зазвичай підказують повторення."
        answer: true
        explanation: "Повторення часто бере недоконаний вид."
      - statement: "Буду можна ставити перед будь-яким доконаним інфінітивом."
        answer: false
        explanation: "Доконаний вид має просту майбутню форму: напишу, прочитаю."
      - statement: "Не читав і не прочитав завжди означають те саме."
        answer: false
        explanation: "Перше часто про досвід, друге про недосягнутий результат."
      - statement: "Коли дія є фоном для іншої події, часто потрібен недоконаний вид."
        answer: true
        explanation: "Наприклад: коли я готував, подзвонив колега."
      - statement: "У послідовності завершених кроків часто потрібен доконаний вид."
        answer: true
        explanation: "Наприклад: встав, умився, приготував, вийшов."
      - statement: "Пара брати / взяти легко виводиться з одного простого правила."
        answer: false
        explanation: "Цю пару краще запам'ятати як готову одиницю."
  - type: order
    title: Побудуйте коротку історію
    instruction: Поставте речення в природний порядок.
    items:
      - "Я довго писав листа."
      - "Коли я писав, мені подзвонила сестра."
      - "Після розмови я нарешті написав листа."
      - "Потім я прочитав лист ще раз."
      - "Я записав адресу на конверті."
      - "Увечері я поклав лист у сумку."
      - "Наступного ранку я відніс лист на пошту."
      - "Так я закінчив одну маленьку справу."
    correct_order:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
