inline:
  - id: act-1
    type: group-sort
    title: Модель пари
    instruction: Розподіліть видові пари за головною моделлю.
    groups:
      - label: "префікс"
        items:
          - "писати / написати"
          - "читати / прочитати"
          - "робити / зробити"
          - "мити / помити"
          - "класти / покласти"
      - label: "суфікс або довша основа"
        items:
          - "записувати / записати"
          - "пояснювати / пояснити"
          - "закінчувати / закінчити"
          - "перекладати / перекласти"
      - label: "зміна основи"
        items:
          - "допомагати / допомогти"
          - "відповідати / відповісти"
          - "розповідати / розповісти"
      - label: "інша форма"
        items:
          - "брати / взяти"
          - "говорити / сказати"
  - id: act-2
    type: match-up
    title: Знайдіть доконаний партнер
    instruction: З'єднайте дієслово недоконаного виду з частим доконаним партнером.
    pairs:
      - left: "писати"
        right: "написати"
      - left: "читати"
        right: "прочитати"
      - left: "готувати"
        right: "приготувати"
      - left: "брати"
        right: "взяти"
      - left: "давати"
        right: "дати"
      - left: "відповідати"
        right: "відповісти"
      - left: "купувати"
        right: "купити"
      - left: "платити"
        right: "заплатити"
  - id: act-3
    type: fill-in
    title: Вид у контексті
    instruction: Оберіть дієслово, яке краще відповідає ситуації.
    items:
      - sentence: "Коли я ___ каву, подзвонив колега."
        answer: "готував"
        options:
          - "готував"
          - "приготував"
        explanation: "Це фонова дія."
      - sentence: "Я ___ каву і сів за стіл."
        answer: "приготував"
        options:
          - "готував"
          - "приготував"
        explanation: "Це завершений крок."
      - sentence: "Вона часто ___ сусідам."
        answer: "допомагала"
        options:
          - "допомагала"
          - "допомогла"
        explanation: "Часто показує звичку."
      - sentence: "Учора вона ___ сусідці з покупками."
        answer: "допомогла"
        options:
          - "допомагала"
          - "допомогла"
        explanation: "Учора тут одна завершена ситуація."
      - sentence: "Завтра я ___ квитки."
        answer: "куплю"
        options:
          - "буду купити"
          - "куплю"
        explanation: "Купити є доконаним видом."
      - sentence: "Увечері ми ___ текст разом."
        answer: "будемо перекладати"
        options:
          - "перекладемо"
          - "будемо перекладати"
        explanation: "Увечері як заняття: процес."
  - id: act-4
    type: quiz
    title: Який запис кращий?
    instruction: Оберіть словниковий запис, який допомагає A2-учневі.
    items:
      - question: "Треба записати пару для писати."
        options:
          - "писати / написати"
          - "писати / говорити"
          - "писати / лист"
        correct: 0
        explanation: "Пара зберігає основну дію письма."
      - question: "Треба записати пару для брати."
        options:
          - "брати / взяти"
          - "брати / читати"
          - "брати / купити"
        correct: 0
        explanation: "Брати / взяти краще вчити як готову пару."
      - question: "Треба показати процес і результат для читання."
        options:
          - "читати / прочитати"
          - "читати / сказати"
          - "читати / текст"
        correct: 0
        explanation: "Прочитати означає дочитати до результату."
      - question: "Треба записати пару для допомоги."
        options:
          - "допомагати / допомогти"
          - "допомагати / зробити"
          - "допомагати / друг"
        correct: 0
        explanation: "У цій парі змінюється основа."
workbook:
  - type: error-correction
    title: Виправте пару або вид
    instruction: Оберіть кращий варіант.
    items:
      - sentence: "писати / сказати"
        error: "сказати"
        correction: "писати / написати"
        options:
          - "писати / написати"
          - "писати / сказати"
        explanation: "Сказати належить до мовлення, не до письма."
      - sentence: "Він щодня заплатив за каву карткою."
        error: "заплатив"
        correction: "Він щодня платив за каву карткою."
        options:
          - "Він щодня платив за каву карткою."
          - "Він щодня заплатив за каву карткою."
        explanation: "Щодня означає повторення."
      - sentence: "Я буду написати відповідь."
        error: "буду написати"
        correction: "Я напишу відповідь."
        options:
          - "Я напишу відповідь."
          - "Я буду написати відповідь."
        explanation: "Доконаний вид у майбутньому без буду."
      - sentence: "Коли вона прочитала листа, задзвонив телефон."
        error: "прочитала"
        correction: "Коли вона читала листа, задзвонив телефон."
        options:
          - "Коли вона читала листа, задзвонив телефон."
          - "Коли вона прочитала листа, задзвонив телефон."
        explanation: "Телефон задзвонив під час процесу."
  - type: group-sort
    title: Контекст вибору
    instruction: Розподіліть контексти за типовим видом.
    groups:
      - label: "недоконаний вид"
        items:
          - "довго писав"
          - "часто допомагала"
          - "коли готував"
          - "буду читати"
      - label: "доконаний вид"
        items:
          - "нарешті написав"
          - "один раз допомогла"
          - "приготував і подав"
          - "прочитаю до вечора"
  - type: match-up
    title: Пари в реченнях
    instruction: З'єднайте ситуацію з природною парою.
    pairs:
      - left: "домашнє завдання"
        right: "робити / зробити"
      - left: "короткий лист"
        right: "писати / написати"
      - left: "рецепт"
        right: "готувати / приготувати"
      - left: "адреса в нотатках"
        right: "записувати / записати"
      - left: "порада другу"
        right: "допомагати / допомогти"
      - left: "квитки онлайн"
        right: "купувати / купити"
  - type: fill-in
    title: Пара в мінідіалозі
    instruction: Оберіть форму за змістом.
    items:
      - sentence: "Ти вже ___ вправу? - Ні, я ще її ___."
        answer: "зробив / роблю"
        options:
          - "зробив / роблю"
          - "робив / зроблю"
        explanation: "Питання про готовий результат, відповідь про процес."
      - sentence: "Вона ___ адресу? - Так, вона ___ її в телефон."
        answer: "записала / записала"
        options:
          - "записувала / записувала"
          - "записала / записала"
        explanation: "Обидва рази потрібен результат."
      - sentence: "Що ти будеш робити ввечері? - Я ___ статтю."
        answer: "буду перекладати"
        options:
          - "перекладу"
          - "буду перекладати"
        explanation: "Питання про заняття ввечері."
      - sentence: "Що ти зробиш до п'ятниці? - Я ___ статтю."
        answer: "перекладу"
        options:
          - "перекладу"
          - "буду перекладати"
        explanation: "До п'ятниці вимагає готовий результат."
