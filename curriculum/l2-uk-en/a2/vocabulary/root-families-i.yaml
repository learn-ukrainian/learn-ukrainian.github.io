items:
  - lemma: 'хід'
    ipa: '[xʲid]'
    translation: 'move, turn, progress'
    pos: 'noun'
    gender: 'm'
    notes: 'Base noun for motion family; cognate with Greek hodos (way)'
  - lemma: 'вхід'
    ipa: '[ʍxʲid]'
    translation: 'entrance'
    pos: 'noun'
    gender: 'm'
    notes: 'Signage and physical entry; prefix в- (in/into)'
  - lemma: 'вихід'
    ipa: '[ˈʋɪxʲid]'
    translation: 'exit, solution'
    pos: 'noun'
    gender: 'm'
    notes: 'Physical exit or abstract way out of a problem; prefix ви- (out)'
  - lemma: 'перехід'
    ipa: '[pɛrɛˈxʲid]'
    translation: 'crossing, transition'
    pos: 'noun'
    gender: 'm'
    notes: 'Pedestrian crossing or state transition; prefix пере- (across)'
  - lemma: 'похід'
    ipa: '[pɔˈxʲid]'
    translation: 'hike, campaign'
    pos: 'noun'
    gender: 'm'
    notes: 'Military campaign or recreational hike; prefix по- (start/duration)'
  - lemma: 'писати'
    ipa: '[pɪˈsɑtɪ]'
    translation: 'to write'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Core verb; Proto-Slavic pьsati (to paint), linked to писанка'
  - lemma: 'написати'
    ipa: '[nɑpɪˈsɑtɪ]'
    translation: 'to finish writing'
    pos: 'verb'
    aspect: 'perf'
    notes: 'Perfective pair for писати'
  - lemma: 'підпис'
    ipa: '[ˈpʲidpɪs]'
    translation: 'signature'
    pos: 'noun'
    gender: 'm'
    notes: 'Legal or personal mark; prefix під- (under)'
  - lemma: 'опис'
    ipa: '[ˈɔpɪs]'
    translation: 'description'
    pos: 'noun'
    gender: 'm'
    notes: 'Textual representation; prefix о- (around/about)'
  - lemma: 'запис'
    ipa: '[ˈzɑpɪs]'
    translation: 'record, entry, recording'
    pos: 'noun'
    gender: 'm'
    notes: 'Written note or audio/video recording'
  - lemma: 'письменник'
    ipa: '[pɪˈsʲmɛnːɪk]'
    translation: 'writer'
    pos: 'noun'
    gender: 'm'
    notes: 'Professional author; agentive derivative from письмо'
  - lemma: 'читач'
    ipa: '[t͡ʃɪˈtɑt͡ʃ]'
    translation: 'reader'
    pos: 'noun'
    gender: 'm'
    notes: 'Person reading; suffix -ач indicates an agent'
  - lemma: 'читання'
    ipa: '[t͡ʃɪˈtɑnʲːɑ]'
    translation: 'reading'
    pos: 'noun'
    gender: 'n'
    notes: 'The process or skill; process noun with -ння suffix'
  - lemma: 'прочитати'
    ipa: '[prɔt͡ʃɪˈtɑtɪ]'
    translation: 'to read through'
    pos: 'verb'
    aspect: 'perf'
    notes: 'Perfective completion; prefix про- (through/for a duration)'
  - lemma: 'побачення'
    ipa: '[pɔˈbɑt͡ʃɛnʲːɑ]'
    translation: 'date (romantic)'
    pos: 'noun'
    gender: 'n'
    notes: 'Literally mutual seeing'
  - lemma: 'передбачити'
    ipa: '[pɛrɛˈdbɑt͡ʃɪtɪ]'
    translation: 'to foresee, to predict'
    pos: 'verb'
    aspect: 'perf'
    notes: 'Seeing beforehand; prefix перед- (before)'
  - lemma: 'розклад'
    ipa: '[ˈrɔzklɑd]'
    translation: 'schedule'
    pos: 'noun'
    gender: 'm'
    notes: 'Conceptually related to writing/ordering (laying out information)'
  - lemma: 'вичитати'
    ipa: '[ˈʋɪt͡ʃɪtɑtɪ]'
    translation: 'to proofread, to scold'
    pos: 'verb'
    aspect: 'perf'
    notes: 'Reading intensively to find errors or scolding someone'
  - lemma: 'обачний'
    ipa: '[ɔˈbɑt͡ʃnɪj]'
    translation: 'cautious'
    pos: 'adj'
    notes: 'Seeing around oneself; looking both ways'
  - lemma: 'сходити'
    ipa: '[sxɔdɪtɪ]'
    translation: 'to go and come back, to climb'
    pos: 'verb'
    aspect: 'perf'
    notes: 'Key example for Kafka-Ptakh euphony rule (с- not з- before х)'
  - lemma: 'корінь'
    ipa: '[ˈkɔrʲinʲ]'
    translation: 'root'
    pos: 'noun'
    gender: 'm'
    notes: 'The core block of word formation'
  - lemma: 'префікс'
    ipa: '[prɛfʲiks]'
    translation: 'prefix'
    pos: 'noun'
    gender: 'm'
    notes: 'Connector block added to the front of a word'
  - lemma: 'суфікс'
    ipa: '[ˈsufʲiks]'
    translation: 'suffix'
    pos: 'noun'
    gender: 'm'
    notes: 'Connector block added to the end of a word'
  - lemma: 'бачити'
    ipa: '[ˈbɑt͡ʃɪtɪ]'
    translation: 'to see'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Passive ability/perception'
  - lemma: 'дивитися'
    ipa: '[dɪˈʋɪtɪsʲɑ]'
    translation: 'to watch, to look at'
    pos: 'verb'
    aspect: 'impf'
    notes: 'Active/intentional watching'
  - lemma: 'іменник'
    ipa: '[iˈmɛnːɪk]'
    translation: 'noun'
    pos: 'noun'
    gender: 'm'
    notes: 'Grammar metalanguage term'
  - lemma: 'вид'
    ipa: '[ʋɪd]'
    translation: 'aspect (grammar), type'
    pos: 'noun'
    gender: 'm'
    notes: 'Grammar metalanguage term for aspect'
  - lemma: 'доконаний'
    ipa: '[dɔˈkɔnɑnɪj]'
    translation: 'perfective (aspect)'
    pos: 'adj'
    notes: 'Grammar metalanguage term'
  - lemma: 'недоконаний'
    ipa: '[nɛdɔˈkɔnɑnɪj]'
    translation: 'imperfective (aspect)'
    pos: 'adj'
    notes: 'Grammar metalanguage term'
