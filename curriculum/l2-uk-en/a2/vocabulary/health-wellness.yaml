items:
  - lemma: 'здоров''я'
    ipa: '[zdɔrɔu̯jɑ]'
    translation: 'health'
    pos: 'noun'
    gender: 'n'
    notes: 'collocations: міцне здоров''я, піклуватися про здоров''я'
  - lemma: 'здоровий'
    ipa: '[zdɔˈrɔʋɪj]'
    translation: 'healthy'
    pos: 'adjective'
    notes: 'collocations: здоровий спосіб життя (healthy lifestyle)'
  - lemma: 'боліти'
    ipa: '[bɔˈlʲitɪ]'
    translation: 'to hurt'
    pos: 'verb'
    notes: 'construction: у мене болить (singular) / болять (plural)'
  - lemma: 'голова'
    ipa: '[ɦɔlɔˈʋɑ]'
    translation: 'head'
    pos: 'noun'
    gender: 'f'
    notes: 'collocations: болить голова, крутиться голова (dizzy)'
  - lemma: 'лікар'
    ipa: '[ˈlʲikɑr]'
    translation: 'doctor'
    pos: 'noun'
    gender: 'm'
    notes: 'used for the person; compare with лікарня'
  - lemma: 'ліки'
    ipa: '[ˈlʲikɪ]'
    translation: 'medicine'
    pos: 'noun'
    notes: 'plural only; collocations: пити ліки, ліки від грипу'
  - lemma: 'аптека'
    ipa: '[ɑˈptɛkɑ]'
    translation: 'pharmacy'
    pos: 'noun'
    gender: 'f'
    notes: 'collocations: цілодобова аптека (24/7), чергова аптека'
  - lemma: 'температура'
    ipa: '[tɛmpɛrɑˈturɑ]'
    translation: 'fever / temperature'
    pos: 'noun'
    gender: 'f'
    notes: 'collocations: міряти температуру, висока температура'
  - lemma: 'малина'
    ipa: '[mɑˈlɪnɑ]'
    translation: 'raspberry'
    pos: 'noun'
    gender: 'f'
    notes: 'чай з малиною is a universal folk cold remedy'
  - lemma: 'калина'
    ipa: '[kɑˈlɪnɑ]'
    translation: 'viburnum'
    pos: 'noun'
    gender: 'f'
    notes: 'traditional remedy and cultural symbol'
  - lemma: 'гірчичник'
    ipa: '[ɦʲirˈt͡ʃɪt͡ʃnɪk]'
    translation: 'mustard plaster'
    pos: 'noun'
    gender: 'm'
    notes: 'traditional remedy for strong coughs'
  - lemma: 'харчування'
    ipa: '[xɑrt͡ʃuˈʋɑnʲːɑ]'
    translation: 'nutrition'
    pos: 'noun'
    gender: 'n'
    notes: 'collocations: правильне харчування, здорове харчування'
  - lemma: 'зарядка'
    ipa: '[zɑˈrʲɑdkɑ]'
    translation: 'morning exercise'
    pos: 'noun'
    gender: 'f'
    notes: 'collocation: робити зарядку'
  - lemma: 'відпочинок'
    ipa: '[ʋʲidpɔˈt͡ʃɪnɔk]'
    translation: 'rest / relaxation'
    pos: 'noun'
    gender: 'm'
    notes: 'collocations: повноцінний відпочинок, активний відпочинок'
  - lemma: 'стрес'
    ipa: '[strɛs]'
    translation: 'stress'
    pos: 'noun'
    gender: 'm'
    notes: 'collocations: знімати стрес, боротися зі стресом'
  - lemma: 'страхування'
    ipa: '[strɑxuˈʋɑnʲːɑ]'
    translation: 'insurance'
    pos: 'noun'
    gender: 'n'
    notes: 'collocation: медичне страхування (health insurance)'
  - lemma: 'лікарня'
    ipa: '[lʲiˈkɑrnʲɑ]'
    translation: 'hospital'
    pos: 'noun'
    gender: 'f'
    notes: 'a facility for serious conditions or surgeries'
  - lemma: 'живіт'
    ipa: '[ʒɪˈʋʲit]'
    translation: 'stomach'
    pos: 'noun'
    gender: 'm'
  - lemma: 'горло'
    ipa: '[ˈɦɔrlɔ]'
    translation: 'throat'
    pos: 'noun'
    gender: 'n'
  - lemma: 'зуб'
    ipa: '[zub]'
    translation: 'tooth'
    pos: 'noun'
    gender: 'm'
  - lemma: 'рецепт'
    ipa: '[rɛˈt͡sɛpt]'
    translation: 'prescription / recipe'
    pos: 'noun'
    gender: 'm'
    notes: 'required to buy strong medicine like antibiotics'
  - lemma: 'кашель'
    ipa: '[ˈkɑʃɛlʲ]'
    translation: 'cough'
    pos: 'noun'
    gender: 'm'
  - lemma: 'клініка'
    ipa: '[ˈklʲinʲikɑ]'
    translation: 'clinic'
    pos: 'noun'
    gender: 'f'
    notes: 'collocation: приватна клініка (private clinic)'
  - lemma: 'баня'
    ipa: '[ˈbɑnʲɑ]'
    translation: 'steam bath'
    pos: 'noun'
    gender: 'f'
    notes: 'traditional wellness practice; collocation: паритися в бані'
  - lemma: 'віник'
    ipa: '[ˈʋʲinɪk]'
    translation: 'whisk / broom'
    pos: 'noun'
    gender: 'm'
    notes: 'used in the steam bath (e.g. березовий віник)'