    ipa: '[r蓱藞xun蓴k]'
    translation: "account / bill"
    pos: "noun"
    gender: "m"
    notes: "Used for both banking and restaurants. Do not use Russian '褋褔械褌'."
  - lemma: "泻邪褉褌泻邪"
    ipa: '[藞k蓱rtk蓱]'
    translation: "card"
    pos: "noun"
    gender: "f"
    example: "袘械蟹泻芯薪褌邪泻褌薪邪 斜邪薪泻褨胁褋褜泻邪 泻邪褉褌泻邪."
  - lemma: "谐芯褌褨胁泻邪"
    ipa: '[搔蓴藞t什iu摊k蓱]'
