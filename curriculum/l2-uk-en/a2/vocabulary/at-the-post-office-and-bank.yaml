    pos: "noun"
    gender: "m"
    example: "袚褉芯褕芯胁懈泄 锌械褉械泻邪蟹."
  - lemma: "蟹薪褨屑邪褌懈"
    ipa: '[z什n什i藞m蓱t瑟]'
    translation: "to withdraw"
    pos: "verb"
    aspect: "impf"
    example: "袟薪褨屑邪褌懈 谐芯褌褨胁泻褍 蟹 斜邪薪泻芯屑邪褌邪."
  - lemma: "胁泻谢邪写邪褌懈"
    ipa: '[蕧kl蓱藞d蓱t瑟]'
