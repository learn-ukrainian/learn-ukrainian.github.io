    pos: "verb"
    aspect: "impf"
    example: "袙泻谢邪写邪褌懈 谐褉芯褕褨 薪邪 褉邪褏褍薪芯泻."
  - lemma: "芯斜屑褨薪褞胁邪褌懈"
    ipa: '[蓴藞bm什in什u蕥蓱t瑟]'
