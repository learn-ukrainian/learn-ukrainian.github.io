    pos: "noun"
    gender: "f"
    example: "携 褏芯褔褍 蟹薪褟褌懈 谐芯褌褨胁泻褍."
  - lemma: "胁邪谢褞褌邪"
    ipa: '[蕥蓱藞l什ut蓱]'
    translation: "currency"
    pos: "noun"
    gender: "f"
    example: "袉薪芯蟹械屑薪邪 胁邪谢褞褌邪."
  - lemma: "锌械褉械泻邪蟹"
    ipa: '[p蓻藞r蓻k蓱z]'
