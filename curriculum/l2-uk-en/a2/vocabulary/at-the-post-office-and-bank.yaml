items:
  - lemma: "锌芯褕褌邪"
    ipa: '[藞p蓴蕛t蓱]'
    translation: "post office"
    pos: "noun"
    gender: "f"
    notes: "Requires preposition '薪邪' for location/direction"
  - lemma: "斜邪薪泻"
    ipa: '[b蓱nk]'
    translation: "bank"
    pos: "noun"
    gender: "m"
    notes: "Requires preposition '胁/褍' for location/direction"
  - lemma: "谢懈褋褌"
    ipa: '[l瑟st]'
    translation: "letter"
    pos: "noun"
    gender: "m"
    example: "携 褏芯褔褍 胁褨写锌褉邪胁懈褌懈 谢懈褋褌邪."
  - lemma: "锌芯褋懈谢泻邪"
    ipa: '[p蓴藞s瑟lk蓱]'
    translation: "package"
    pos: "noun"
    gender: "f"
    example: "袛械 屑芯褟 锌芯褋懈谢泻邪?"
  - lemma: "斜邪薪写械褉芯谢褜"
    ipa: '[b蓱nd蓻藞r蓴l什]'
    translation: "parcel"
    pos: "noun"
    gender: "f"
    notes: "Feminine noun ending in a soft sign"
  - lemma: "屑邪褉泻邪"
    ipa: '[藞m蓱rk蓱]'
    translation: "stamp"
    pos: "noun"
    gender: "f"
    example: "袦械薪褨 锌芯褌褉褨斜薪邪 锌芯褕褌芯胁邪 屑邪褉泻邪."
  - lemma: "泻芯薪胁械褉褌"
    ipa: '[k蓴n藞蕥蓻rt]'
    translation: "envelope"
    pos: "noun"
    gender: "m"
    example: "袩芯泻谢邪褋褌懈 谢懈褋褌 褍 泻芯薪胁械褉褌."
  - lemma: "邪写褉械褋邪"
    ipa: '[蓱藞dr蓻s蓱]'
    translation: "address"
    pos: "noun"
    gender: "f"
    example: "携泻邪 胁邪褕邪 邪写褉械褋邪?"
  - lemma: "褨薪写械泻褋"
    ipa: '[藞ind蓻ks]'
