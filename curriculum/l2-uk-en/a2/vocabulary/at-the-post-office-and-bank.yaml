    pos: "verb"
    aspect: "impf"
    example: "携 胁褨写锌褉邪胁谢褟褞 锌芯褋懈谢泻褍."
  - lemma: "芯褌褉懈屑褍胁邪褌懈"
    ipa: '[蓴藞tr瑟mu蕥蓱t瑟]'
    translation: "to receive"
    pos: "verb"
    aspect: "impf"
    example: "袙芯薪邪 芯褌褉懈屑褍褦 谐褉芯褕褨."
  - lemma: "谐褉芯褕褨"
    ipa: '[搔r蓴蕛什i]'
    translation: "money"
    pos: "noun"
