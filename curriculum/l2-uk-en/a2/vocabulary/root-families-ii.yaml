items:
  - lemma: "думати"
    translation: "to think"
    pos: "verb"
    aspect: "imperfective"
    notes: "active process of thinking; collocations: думати про (+ Acc)"
  - lemma: "думка"
    translation: "thought, opinion"
    pos: "noun"
    gender: "f"
    notes: "collocations: цікава думка, на мою думку"
  - lemma: "говорити"
    translation: "to speak"
    pos: "verb"
    aspect: "imperfective"
    notes: "focus on ability or process; usage: говорити українською"
  - lemma: "розмовляти"
    translation: "to converse"
    pos: "verb"
    aspect: "imperfective"
    notes: "implies reciprocal exchange; collocations: розмовляти телефоном"
  - lemma: "мова"
    translation: "language"
    pos: "noun"
    gender: "f"
    notes: "never use 'язик' for language; collocations: рідна мова, іноземна мова"
  - lemma: "слухати"
