items:
  - lemma: свій
    translation: "one's own (masculine)"
    pos: pronoun
    gender: m
    notes: "used when the subject is the possessor"
    usage: "свій час, свій дім"
  - lemma: своя
    translation: "one's own (feminine)"
    pos: pronoun
    gender: f
    usage: "своя сім'я, своя справа"
  - lemma: своє
    translation: "one's own (neuter)"
    pos: pronoun
    gender: n
    usage: "своє життя, своє місто"
  - lemma: свої
    translation: "one's own (plural)"
    pos: pronoun
    usage: "свої люди, свої речі"
  - lemma: власний
    translation: "own, private, exclusive"
    pos: adjective
    notes: "emphasizes exclusive ownership"
    usage: "власний будинок, власна думка"
  - lemma: особистий
    translation: "personal, private"
    pos: adjective
    notes: "relates to private life or personal sphere"
    usage: "особисте життя, особистий простір"
  - lemma: чужий
    translation: "someone else's, stranger's"
    pos: adjective
    notes: "antonym to свій"
    usage: "чужа країна, чужа дитина"
  - lemma: його
    translation: "his"
    pos: pronoun
    notes: "used when the possessor is not the subject"
  - lemma: її
    translation: "her"
    pos: pronoun
    notes: "used when the possessor is not the subject"
  - lemma: їхній
    translation: "their"
    pos: pronoun
    notes: "used when the possessor is not the subject"
  - lemma: мій
    translation: "my"
    pos: pronoun
    notes: "declines exactly like свій"
  - lemma: твій
    translation: "your (informal)"
    pos: pronoun
    notes: "declines exactly like свій"
  - lemma: наш
    translation: "our"
    pos: pronoun
  - lemma: ваш
    translation: "your (formal/plural)"
    pos: pronoun
  - lemma: ділитися
    translation: "to share"
    pos: verb
    aspect: imperfective
    usage: "ділитися своїми думками"
  - lemma: власне
    translation: "precisely, actually"
    pos: adverb
  - lemma: самостійно
    translation: "independently, on one's own"
    pos: adverb
  - lemma: спільний
    translation: "shared, common"
    pos: adjective
    usage: "спільна мова, спільна власність"
  - lemma: належати
    translation: "to belong"
    pos: verb
    aspect: imperfective
    notes: "governs dative case (кому?)"
  - lemma: володіти
    translation: "to own, possess"
    pos: verb
    aspect: imperfective
    notes: "governs instrumental case (чим?)"
  - lemma: час
    translation: "time"
    pos: noun
    gender: m
    usage: "свій час"
  - lemma: життя
    translation: "life"
    pos: noun
    gender: n
    usage: "своє життя"
  - lemma: сім'я
    translation: "family"
    pos: noun
    gender: f
    usage: "своя сім'я"
  - lemma: думка
    translation: "thought, opinion"
    pos: noun
    gender: f
    usage: "власна думка"
  - lemma: дім
    translation: "home, house"
    pos: noun
    gender: m
    usage: "свій дім"
  - lemma: займенник
    translation: "pronoun"
    pos: noun
    gender: m
  - lemma: називний
    translation: "nominative"
    pos: adjective
  - lemma: родовий
    translation: "genitive"
    pos: adjective
  - lemma: давальний
    translation: "dative"
    pos: adjective
  - lemma: знахідний
    translation: "accusative"
    pos: adjective
  - lemma: орудний
    translation: "instrumental"
    pos: adjective
  - lemma: місцевий
    translation: "locative"
    pos: adjective
  - lemma: прикметник
    translation: "adjective"
    pos: noun
    gender: m
  - lemma: множина
    translation: "plural"
    pos: noun
    gender: f
