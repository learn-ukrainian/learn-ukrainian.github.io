items:
  - lemma: "подобатися"
    translation: "to like, to be pleasing"
    pos: "verb"
    aspect: "impf"
    notes: "Requires the Dative experiencer (Мені подобається)."
  - lemma: "вибирати"
    translation: "to choose"
    pos: "verb"
    aspect: "impf"
  - lemma: "краще"
    translation: "better"
    pos: "adverb"
    notes: "Used as an adverb or neuter adjective. 'Краще ніж' = 'better than'."
  - lemma: "хотів би"
    translation: "would like"
    pos: "verb"
    notes: "Polite request form (male speaker). Female: хотіла би."
  - lemma: "перевага"
    translation: "preference, advantage"
    pos: "noun"
    gender: "f"
    notes: "Used in the formal phrase 'віддавати перевагу' (to prefer)."
  - lemma: "філіжанка"
    translation: "small cup, demitasse"
    pos: "noun"
    gender: "f"
    notes: "Traditional Lviv word for a coffee cup."
  - lemma: "смак"
    translation: "taste"
    pos: "noun"
    gender: "m"
  - lemma: "колір"
    translation: "color"
    pos: "noun"
    gender: "m"
  - lemma: "товариш"
    translation: "friend, comrade"
    pos: "noun"
    gender: "m"
    notes: "Part of the proverb 'На колір і смак товариш не всяк'."
  - lemma: "замовити"
