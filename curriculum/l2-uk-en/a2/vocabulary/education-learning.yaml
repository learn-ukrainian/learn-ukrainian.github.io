items:
  - lemma: "школа"
    ipa: '[ˈʃkɔlɑ]'
    translation: "school"
    pos: "noun"
    gender: "f"
    usage: "ходити до школи, закінчити школу, середня школа, у школі"
    example: "Мій молодший брат уже ходить до школи."
  - lemma: "університет"
    ipa: '[unʲiʋɛrsɪˈtɛt]'
    translation: "university"
    pos: "noun"
    gender: "m"
    usage: "вступати до університету, навчатися в університеті, державний університет"
    example: "Вони хочуть вступити до престижного державного університету."
  - lemma: "вчитися"
    ipa: '[ˈʍt͡ʃɪtɪsʲɑ]'
    translation: "to study"
    pos: "verb"
    aspect: "imperfective"
    notes: "intransitive; describes the process, location, or manner of studying and never takes a direct object"
    example: "Вона завжди вчилася на відмінно і отримувала високі бали."
  - lemma: "вивчати"
    ipa: '[ʋɪˈʋt͡ʃɑtɪ]'
    translation: "to learn, to study"
    pos: "verb"
    aspect: "imperfective"
    notes: "transitive; always requires a direct object in the accusative case"
    example: "На курсах ми вивчаємо українську мову кожного дня."
  - lemma: "навчати"
    ipa: '[nɑˈʋt͡ʃɑtɪ]'
    translation: "to teach, to instruct"
    pos: "verb"
    aspect: "imperfective"
    notes: "transitive; describes the process of transmitting knowledge to others"
    example: "Досвідчений вчитель щодня навчає дітей математики."
  - lemma: "предмет"
    ipa: '[prɛˈdmɛt]'
    translation: "subject"
    pos: "noun"
    gender: "m"
    usage: "шкільний предмет, улюблений предмет, профільний предмет"
    example: "Історія — це мій абсолютно улюблений шкільний предмет."
  - lemma: "іспит"
    ipa: '[ˈispɪt]'
    translation: "exam"
    pos: "noun"
    gender: "m"
    usage: "складати іспит, скласти іспит, провалити іспит, випускний іспит"
    example: "Завтра вранці я складаю свій найскладніший іспит."
  - lemma: "оцінка"
    ipa: '[ɔˈt͡sʲinkɑ]'
    translation: "grade, mark, rating"
    pos: "noun"
    gender: "f"
    usage: "отримувати оцінку, гарна оцінка, висока оцінка"
    example: "Моя донька завжди отримує дуже гарні оцінки з читання."
  - lemma: "студент"
    ipa: '[stuˈdɛnt]'
    translation: "university student"
    pos: "noun"
    gender: "m"
    notes: "distinct from учень (school student)"
    example: "Цей студент вчиться дуже добре і старанно."
  - lemma: "викладач"
    ipa: '[ʋɪklɑˈdɑt͡ʃ]'
    translation: "lecturer, university instructor"
    pos: "noun"
    gender: "m"
    notes: "distinct from вчитель (school teacher)"
    example: "Поважний викладач пояснює нову тему на лекції."
  - lemma: "лекція"
    ipa: '[ˈlɛkt͡sʲijɑ]'
    translation: "lecture"
    pos: "noun"
    gender: "f"
    usage: "на лекції"
    example: "Усі студенти зараз уважно сидять на довгій лекції."
  - lemma: "залік"
    ipa: '[ˈzɑlʲik]'
    translation: "credit, pass-fail test"
    pos: "noun"
    gender: "m"
    notes: "a form of university assessment usually without a grade"
    example: "Завтра вранці у нас неймовірно складний залік з філософії."
  - lemma: "диплом"
    ipa: '[dɪˈplɔm]'
    translation: "diploma, degree, final thesis"
    pos: "noun"
    gender: "m"
    usage: "захищати диплом"
    example: "Вона нарешті успішно захистила свій диплом."
  - lemma: "стипендія"
    ipa: '[stɪˈpɛnʲdʲijɑ]'
    translation: "scholarship, student stipend"
    pos: "noun"
    gender: "f"
    usage: "отримувати стипендію"
    example: "Він старанно вчиться, щоб отримувати підвищену стипендію."
  - lemma: "курсова робота"
    ipa: '[kursɔˈʋɑ rɔˈbɔtɑ]'
    translation: "course paper, term paper"
    pos: "noun"
    gender: "f"
    usage: "писати курсову роботу"
    example: "У травні студенти ночами пишуть курсову роботу."
  - lemma: "підручник"
    ipa: '[pʲiˈdrut͡ʃnɪk]'
    translation: "textbook"
    pos: "noun"
    gender: "m"
    usage: "навчатися за підручником"
    example: "Цей новий підручник з біології дуже важкий."
  - lemma: "зошит"
    ipa: '[ˈzɔʃɪt]'
    translation: "notebook"
    pos: "noun"
    gender: "m"
    usage: "писати в зошиті"
    example: "Мій новий зошит з історії дуже товстий."
  - lemma: "ручка"
    ipa: '[ˈrut͡ʃkɑ]'
    translation: "pen"
    pos: "noun"
    gender: "f"
    usage: "писати ручкою"
    example: "Я завжди акуратно пишу чорною ручкою."
  - lemma: "олівець"
    ipa: '[ɔlʲiˈʋɛt͡sʲ]'
    translation: "pencil"
    pos: "noun"
    gender: "m"
    usage: "малювати олівцем"
    example: "Художник завжди має гострий олівець у кишені."
  - lemma: "математика"
    ipa: '[mɑtɛˈmɑtɪkɑ]'
    translation: "mathematics"
    pos: "noun"
    gender: "f"
    example: "Математика завжди була моїм улюбленим предметом у школі."
  - lemma: "історія"
    ipa: '[iˈstɔrʲijɑ]'
    translation: "history"
    pos: "noun"
    gender: "f"
    example: "Історія допомагає нам краще розуміти сучасну політику."
  - lemma: "фізика"
    ipa: '[ˈfʲizɪkɑ]'
    translation: "physics"
    pos: "noun"
    gender: "f"
    example: "Фізика — це наука про енергію та матерію."
  - lemma: "учень"
    ipa: '[ˈut͡ʃɛnʲ]'
    translation: "pupil, school student"
    pos: "noun"
    gender: "m"
    example: "Учень обов'язково приносить осінні квіти для вчителів."
  - lemma: "вчитель"
    ipa: '[ˈʍt͡ʃɪtɛlʲ]'
    translation: "school teacher"
    pos: "noun"
    gender: "m"
    example: "Наш старий вчитель щодня пише крейдою на дошці."
  - lemma: "гуртожиток"
    ipa: '[ɦurˈtɔʒɪtɔk]'
    translation: "dormitory, student residence"
    pos: "noun"
    gender: "m"
    example: "Я живу в студентському гуртожитку з друзями."