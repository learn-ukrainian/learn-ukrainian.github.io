items:
  - lemma: "коли"
    translation: "when"
    pos: "conjunction"
    notes: "High frequency. Indicates a specific point in time."
    example: "Коли ти прийдеш додому?"
  - lemma: "поки"
    translation: "while"
    pos: "conjunction"
    notes: "High frequency. Indicates a continuous process or simultaneous actions."
    example: "Поки я читав книгу, брат слухав музику."
  - lemma: "перед тим як"
    translation: "before [doing something]"
    pos: "conjunction"
    notes: "Requires a verb clause following it."
    example: "Перед тим як вийти, я перевіряю погоду."
  - lemma: "після того як"
    translation: "after [doing something]"
    pos: "conjunction"
    notes: "Requires a verb clause following it."
    example: "Після того як ми поїли, ми пішли гуляти."
  - lemma: "щойно"
    translation: "just / as soon as"
    pos: "adverb"
    notes: "Used for immediate or very recent actions."
    example: "Щойно я зайшов у квартиру."
  - lemma: "як тільки"
    translation: "as soon as"
    pos: "conjunction"
    notes: "Indicates an immediate sequence."
    example: "Я зателефоную, як тільки зможу."
  - lemma: "поки не"
    translation: "until"
    pos: "conjunction"
    notes: "Requires a double negative structure in Ukrainian to set the limit of an action."
    example: "Я буду чекати, поки ти не прийдеш."
  - lemma: "якщо"
    translation: "if"
    pos: "conjunction"
    notes: "Essential for conditional statements. Distinct from 'коли' (when)."
    example: "Я буду дуже радий, якщо ти зможеш приїхати."
  - lemma: "кожного разу, коли"
    translation: "every time when"
    pos: "phrase"
    notes: "Used to describe recurring habits and frequencies."
    example: "Кожного разу, коли йде дощ, він бере парасольку."
