items:
  - lemma: "泻芯谢懈"
    ipa: '[k蓴藞l瑟]'
    translation: "when"
    pos: "conjunction"
    notes: "High frequency. Indicates a specific point in time."
    example: "袣芯谢懈 褌懈 锌褉懈泄写械褕 写芯写芯屑褍?"
  - lemma: "锌芯泻懈"
    ipa: '[藞p蓴k瑟]'
    translation: "while"
    pos: "conjunction"
    notes: "High frequency. Indicates a continuous process or simultaneous actions."
    example: "袩芯泻懈 褟 褔懈褌邪胁 泻薪懈谐褍, 斜褉邪褌 褋谢褍褏邪胁 屑褍蟹懈泻褍."
  - lemma: "锌械褉械写 褌懈屑 褟泻"
    ipa: '[藞p蓻r蓻d t瑟m j蓱k]'
    translation: "before [doing something]"
    pos: "conjunction"
    notes: "Requires a verb clause following it."
    example: "袩械褉械写 褌懈屑 褟泻 胁懈泄褌懈, 褟 锌械褉械胁褨褉褟褞 锌芯谐芯写褍."
  - lemma: "锌褨褋谢褟 褌芯谐芯 褟泻"
    ipa: '[藞p什is什l什蓱 t蓴藞搔蓴 j蓱k]'
    translation: "after [doing something]"
    pos: "conjunction"
    notes: "Requires a verb clause following it."
    example: "袩褨褋谢褟 褌芯谐芯 褟泻 屑懈 锌芯褩谢懈, 屑懈 锌褨褕谢懈 谐褍谢褟褌懈."
  - lemma: "褖芯泄薪芯"
    ipa: '[藞蕛t汀蕛蓴jn蓴]'
    translation: "just / as soon as"
    pos: "adverb"
    notes: "Used for immediate or very recent actions."
    example: "些芯泄薪芯 褟 蟹邪泄褕芯胁 褍 泻胁邪褉褌懈褉褍."
  - lemma: "褟泻 褌褨谢褜泻懈"
    ipa: '[j蓱k 藞t什il什k瑟]'
    translation: "as soon as"
    pos: "conjunction"
    notes: "Indicates an immediate sequence."
    example: "携 蟹邪褌械谢械褎芯薪褍褞, 褟泻 褌褨谢褜泻懈 蟹屑芯卸褍."
  - lemma: "锌芯泻懈 薪械"
    ipa: '[藞p蓴k瑟 n蓻]'
    translation: "until"
    pos: "conjunction"
    notes: "Requires a double negative structure in Ukrainian to set the limit of an action."
    example: "携 斜褍写褍 褔械泻邪褌懈, 锌芯泻懈 褌懈 薪械 锌褉懈泄写械褕."
  - lemma: "褟泻褖芯"
    ipa: '[j蓱藞k蕛t汀蕛蓴]'
    translation: "if"
    pos: "conjunction"
    notes: "Essential for conditional statements. Distinct from '泻芯谢懈' (when)."
    example: "携 斜褍写褍 写褍卸械 褉邪写懈泄, 褟泻褖芯 褌懈 蟹屑芯卸械褕 锌褉懈褩褏邪褌懈."
  - lemma: "泻芯卸薪芯谐芯 褉邪蟹褍, 泻芯谢懈"
    ipa: '[藞k蓴蕭n蓴搔蓴 藞r蓱zu, k蓴藞l瑟]'
    translation: "every time when"
    pos: "phrase"
    notes: "Used to describe recurring habits and frequencies."
    example: "袣芯卸薪芯谐芯 褉邪蟹褍, 泻芯谢懈 泄写械 写芯褖, 胁褨薪 斜械褉械 锌邪褉邪褋芯谢褜泻褍."
