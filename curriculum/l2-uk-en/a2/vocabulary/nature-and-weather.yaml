items:
  - lemma: "погода"
    ipa: '[pɔˈɦɔdɑ]'
    translation: "weather"
    pos: "noun"
    gender: "f"
    example: "Сьогодні дуже гарна сонячна погода."
  - lemma: "дощ"
    ipa: '[dɔʃt͡ʃ]'
    translation: "rain"
    pos: "noun"
    gender: "m"
    example: "Надворі йде сильний дощ."
  - lemma: "сніг"
    ipa: '[sʲnʲiɦ]'
    translation: "snow"
    pos: "noun"
    gender: "m"
    example: "Взимку в Карпатах падає білий сніг."
  - lemma: "ліс"
    ipa: '[lʲis]'
    translation: "forest"
    pos: "noun"
    gender: "m"
    example: "Цей густий ліс дуже красивий восени."
  - lemma: "гора"
    ipa: '[ɦɔˈrɑ]'
    translation: "mountain"
    pos: "noun"
    gender: "f"
    example: "Це дуже висока гора."
  - lemma: "річка"
    ipa: '[ˈrʲit͡ʃkɑ]'
    translation: "river"
    pos: "noun"
    gender: "f"
    example: "Тут тече швидка гірська річка."
  - lemma: "озеро"
    ipa: '[ˈɔzɛrɔ]'
    translation: "lake"
    pos: "noun"
    gender: "n"
    example: "Вода в цьому озері дуже чиста."
  - lemma: "клімат"
    ipa: '[ˈklʲimɑt]'
    translation: "climate"
    pos: "noun"
    gender: "m"
    example: "В Україні континентальний клімат."
  - lemma: "природа"
    ipa: '[prɪˈrɔdɑ]'
    translation: "nature"
    pos: "noun"
    gender: "f"
    example: "Ми дуже любимо відпочивати на лоні природи."
  - lemma: "град"
    ipa: '[ɦrɑd]'
    translation: "hail"
    pos: "noun"
