    pos: "noun"
    gender: "m"
    example: "Широкий степ квітне навесні."
  - lemma: "довкілля"
    ipa: '[dɔˈʋkʲilʲːɑ]'
    translation: "environment"
    pos: "noun"
    gender: "n"
    example: "Охорона довкілля — це важливе завдання."
  - lemma: "тварина"
    ipa: '[tʋɑrɪnɑ]'
    translation: "animal"
    pos: "noun"
    gender: "f"
    example: "Собака — це дуже розумна свійська тварина."
  - lemma: "буря"
    ipa: '[ˈburʲɑ]'
    translation: "storm"
    pos: "noun"
    gender: "f"
    example: "У горах почалася сильна буря."
  - lemma: "свійський"
    ipa: '[ˈsʲʋʲijsʲkɪj]'
    translation: "domestic (about animals)"
    pos: "adj"
    example: "Корова — це свійська тварина."
  - lemma: "дикий"
    ipa: '[ˈdɪkɪj]'
    translation: "wild"
    pos: "adj"
    example: "Вовк і ведмідь — це дикі тварини."
  - lemma: "прохолодно"
    ipa: '[prɔxɔˈlɔdnɔ]'
    translation: "cool, chilly"
    pos: "adv"
    example: "У лісі завжди прохолодно."
  - lemma: "жарко"
    ipa: '[ˈʒɑrkɔ]'
    translation: "hot"
    pos: "adv"
    example: "Влітку нам буває дуже жарко."
  - lemma: "зручно"
    ipa: '[ˈzrut͡ʃnɔ]'
    translation: "comfortable"
    pos: "adv"
    example: "Мені зручно сидіти у цьому кріслі."
  - lemma: "сумно"
    ipa: '[ˈsumnɔ]'
    translation: "sad"
    pos: "adv"
    example: "Їй сумно, коли довго йде дощ."
  - lemma: "страшно"
    ipa: '[ˈstrɑʃnɔ]'
    translation: "scared, scary"
    pos: "adv"
    example: "Йому страшно гуляти в лісі вночі."
  - lemma: "падати"
    ipa: '[ˈpɑdɑtɪ]'
    translation: "to fall"
    pos: "verb"
    aspect: "impf"
    example: "Взимку часто падає сніг."
  - lemma: "йти"
    ipa: '[jtɪ]'
    translation: "to go, to walk (also used for rain/snow)"
    pos: "verb"
    aspect: "impf"
    example: "Сьогодні цілий день іде дощ."
  - lemma: "прогноз"
    ipa: '[prɔˈɦnɔz]'
    translation: "forecast"
    pos: "noun"
    gender: "m"
    example: "Я завжди слухаю прогноз погоди вранці."