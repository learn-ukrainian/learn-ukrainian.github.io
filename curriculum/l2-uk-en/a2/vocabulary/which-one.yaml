items:
- lemma: який
  translation: which / that / who (masc)
  pos: pronoun
  gender: m
  notes: relative pronoun for masculine nouns; changes case based on clause role
- lemma: яка
  translation: which / that / who (fem)
  pos: pronoun
  gender: f
  usage: Дівчина, яка читає.
- lemma: яке
  translation: which / that / who (neut)
  pos: pronoun
  gender: n
  usage: Місто, яке ніколи не спить.
- lemma: які
  translation: which / that / who (pl)
  pos: pronoun
  usage: Люди, які люблять подорожувати.
- lemma: той
  translation: that one (masc)
  pos: pronoun
  gender: m
  notes: demonstrative pronoun often paired with який
- lemma: чоловік
  translation: man / husband
  pos: noun
  gender: m
  notes: refers to an adult male or a married partner
- lemma: жінка
  translation: woman / wife
  pos: noun
  gender: f
  notes: refers to an adult female or a married partner
- lemma: ринок
  translation: market
  pos: noun
  gender: m
  usage: Піти на ринок за продуктами.
- lemma: зважити
  translation: to weigh
  pos: verb
  aspect: perfective
  usage: Який вам зважити?
- lemma: різниця
  translation: difference
  pos: noun
  gender: f
  usage: Яка різниця?
- lemma: відмінок
  translation: grammatical case
  pos: noun
  gender: m
- lemma: істота
  translation: animate noun / creature
  pos: noun
  gender: f
  notes: affects the accusative case form for masculine and plural nouns
- lemma: неістота
  translation: inanimate noun / thing
  pos: noun
  gender: f
- lemma: хамелеон
  translation: chameleon
  pos: noun
  gender: m
  notes: used metaphorically to describe how words adapt their case
- lemma: свідок
  translation: witness
  pos: noun
  gender: m
- lemma: підозрюваний
  translation: suspect
  pos: noun
  gender: m
- lemma: рюкзак
  translation: backpack
  pos: noun
  gender: m
- lemma: окуляри
  translation: glasses
  pos: noun
  notes: always plural in Ukrainian
- lemma: вітрина
  translation: shop window
  pos: noun
  gender: f
- lemma: полиця
  translation: shelf
  pos: noun
  gender: f
- lemma: сукня
  translation: dress
  pos: noun
  gender: f
- lemma: приналежність
  translation: belonging / possession
  pos: noun
  gender: f
- lemma: точність
  translation: accuracy / precision
  pos: noun
  gender: f
- lemma: жупан
  translation: traditional coat
  pos: noun
  gender: m
  notes: historically a symbol of status (Який пан, такий жупан)
- lemma: дзеркало
  translation: mirror
  pos: noun
  gender: n
- lemma: називний
  translation: nominative
  pos: adj
- lemma: родовий
  translation: genitive
  pos: adj
- lemma: знахідний
  translation: accusative
  pos: adj
- lemma: іменник
  translation: noun
  pos: noun
- lemma: множина
  translation: plural
  pos: noun
