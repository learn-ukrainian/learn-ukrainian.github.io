items:
- lemma: 褟泻懈泄
  ipa: '[j蓱藞k瑟j]'
  translation: which / that / who (masc)
  pos: pronoun
  gender: m
  notes: relative pronoun for masculine nouns; changes case based on clause role
- lemma: 褟泻邪
  ipa: '[j蓱k蓱]'
  translation: which / that / who (fem)
  pos: pronoun
  gender: f
  usage: 袛褨胁褔懈薪邪, 褟泻邪 褔懈褌邪褦.
- lemma: 褟泻械
  ipa: '[j蓱藞k蓻]'
  translation: which / that / who (neut)
  pos: pronoun
  gender: n
  usage: 袦褨褋褌芯, 褟泻械 薪褨泻芯谢懈 薪械 褋锌懈褌褜.
- lemma: 褟泻褨
  ipa: '[j蓱藞k什i]'
  translation: which / that / who (pl)
  pos: pronoun
  usage: 袥褞写懈, 褟泻褨 谢褞斜谢褟褌褜 锌芯写芯褉芯卸褍胁邪褌懈.
- lemma: 褌芯泄
  ipa: '[t蓴j]'
  translation: that one (masc)
  pos: pronoun
  gender: m
  notes: demonstrative pronoun often paired with 褟泻懈泄
- lemma: 褔芯谢芯胁褨泻
  ipa: '[t汀蕛蓴l蓴藞蕥什ik]'
  translation: man / husband
  pos: noun
  gender: m
  notes: refers to an adult male or a married partner
- lemma: 卸褨薪泻邪
  ipa: '[藞蕭什ink蓱]'
  translation: woman / wife
  pos: noun
  gender: f
  notes: refers to an adult female or a married partner
- lemma: 褉懈薪芯泻
  ipa: '[藞r瑟n蓴k]'
  translation: market
  pos: noun
  gender: m
  usage: 袩褨褌懈 薪邪 褉懈薪芯泻 蟹邪 锌褉芯写褍泻褌邪屑懈.
- lemma: 蟹胁邪卸懈褌懈
  ipa: '[藞z蕥蓱蕭瑟t瑟]'
