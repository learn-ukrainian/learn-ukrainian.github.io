items:
  - lemma: 'в'
    ipa: '[ʋ]'
    translation: 'in / into'
    pos: 'prep'
    notes: 'Changes to "у" for euphony. Uses Locative for location, Accusative for motion.'
    example: 'Я в кімнаті. (I am in the room.)'
  - lemma: 'на'
    ipa: '[nɑ]'
    translation: 'on / onto'
    pos: 'prep'
    notes: 'Uses Locative for location, Accusative for motion. Also used for events.'
    example: 'Книга на столі. (The book is on the table.)'
  - lemma: 'під'
    ipa: '[pʲid]'
    translation: 'under'
    pos: 'prep'
    notes: 'Governs Instrumental for static location.'
    example: 'Кіт під столом. (The cat is under the table.)'
  - lemma: 'над'
    ipa: '[nɑd]'
    translation: 'above / over'
    pos: 'prep'
    notes: 'Governs Instrumental for static location.'
    example: 'Лампа над столом. (The lamp is above the table.)'
  - lemma: 'перед'
    ipa: '[ˈpɛrɛd]'
    translation: 'in front of'
    pos: 'prep'
    notes: 'Governs Instrumental for static location.'
    example: 'Машина перед домом. (The car is in front of the house.)'
  - lemma: 'за'
    ipa: '[zɑ]'
    translation: 'behind'
    pos: 'prep'
    notes: 'Governs Instrumental for static location.'
    example: 'Сад за будинком. (The garden is behind the house.)'
  - lemma: 'між'
    ipa: '[mʲiʒ]'
    translation: 'between'
    pos: 'prep'
    notes: 'Governs Instrumental. Implies two or more objects.'
    example: 'Стіл між вікнами. (The table is between the windows.)'
  - lemma: 'до'
    ipa: '[dɔ]'
    translation: 'to / towards'
    pos: 'prep'
    notes: 'Governs Genitive. Indicates motion towards a goal.'
    example: 'Я йду додому. (I am going home.)'
  - lemma: 'з'
    ipa: '[z]'
    translation: 'from / out of'
    pos: 'prep'
    notes: 'Changes to "із" or "зі" for euphony. Governs Genitive.'
    example: 'Ми їдемо з Києва. (We are driving from Kyiv.)'
  - lemma: 'напроти'
    ipa: '[nɑˈprɔtɪ]'
    translation: 'opposite / across from'
    pos: 'prep'
    notes: 'Governs Genitive. Implies face-to-face.'
    example: 'Банк напроти пошти. (The bank is opposite the post office.)'
  - lemma: 'біля'
    ipa: '[ˈbʲilʲɑ]'
    translation: 'near / by'
    pos: 'prep'
    notes: 'Governs Genitive. Implies proximity.'
    example: 'Ми живемо біля парку. (We live near the park.)'
  - lemma: 'коло'
    ipa: '[ˈkɔlɔ]'
    translation: 'near / around'
    pos: 'prep'
    notes: 'Synonym for біля.'
    example: 'Стійте коло мене. (Stand near me.)'
  - lemma: 'поруч'
    ipa: '[ˈpɔrut͡ʃ]'
    translation: 'nearby / next to'
    pos: 'adv'
    notes: 'Often used as an adverb or with "з".'
    example: 'Він сидить поруч. (He sits nearby.)'
  - lemma: 'навколо'
    ipa: '[nɑˈʋkɔlɔ]'
    translation: 'around'
    pos: 'prep'
    notes: 'Governs Genitive.'
    example: 'Ми гуляємо навколо озера. (We are walking around the lake.)'
  - lemma: 'вздовж'
    ipa: '[ʋzdɔu̯ʒ]'
    translation: 'along'
    pos: 'prep'
    notes: 'Governs Genitive.'
    example: 'Ми йдемо вздовж річки. (We are walking along the river.)'
  - lemma: 'всередині'
    ipa: '[ʍsɛˈrɛdɪnʲi]'
    translation: 'inside'
    pos: 'adv'
    notes: 'Can act as preposition with Genitive.'
    example: 'Що всередині коробки? (What is inside the box?)'
  - lemma: 'ззовні'
    ipa: '[ˈzzɔu̯nʲi]'
    translation: 'outside'
    pos: 'adv'
    example: 'Зачекай ззовні. (Wait outside.)'
  - lemma: 'посеред'
    ipa: '[pɔˈsɛˈrɛd]'
    translation: 'in the middle of'
    pos: 'prep'
    notes: 'Governs Genitive.'
    example: 'Стіл стоїть посеред кімнати. (The table stands in the middle of the room.)'
  - lemma: 'збоку'
    ipa: '[ˈzbɔku]'
    translation: 'on the side / from the side'
    pos: 'adv'
    example: 'Вхід збоку. (The entrance is on the side.)'
  - lemma: 'поміж'
    ipa: '[pɔˈmʲiʒ]'
    translation: 'among'
    pos: 'prep'
    notes: 'Synonym for між, often implies "scattered among".'
    example: 'Гуляти поміж дерев. (To walk among the trees.)'
  - lemma: 'стіл'
    ipa: '[sʲtʲil]'
    translation: 'table'
    pos: 'noun'
    gender: 'm'
    example: 'Книга на столі. (The book is on the table.)'
  - lemma: 'кімната'
    ipa: '[kʲiˈmnɑtɑ]'
    translation: 'room'
    pos: 'noun'
    gender: 'f'
    example: 'Я в кімнаті. (I am in the room.)'
  - lemma: 'шафа'
    ipa: '[ˈʃɑfɑ]'
    translation: 'wardrobe / cupboard'
    pos: 'noun'
    gender: 'f'
    example: 'Одяг у шафі. (The clothes are in the wardrobe.)'
  - lemma: 'диван'
    ipa: '[dɪˈʋɑn]'
    translation: 'sofa'
    pos: 'noun'
    gender: 'm'
    example: 'Кіт за диваном. (The cat is behind the sofa.)'
  - lemma: 'вікно'
    ipa: '[ʋʲiˈknɔ]'
    translation: 'window'
    pos: 'noun'
    gender: 'n'
    example: 'Стіл біля вікна. (The table is by the window.)'