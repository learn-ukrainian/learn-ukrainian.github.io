inline:
  - id: act-1
    type: fill-in
    title: Узгодження в описі
    instruction: Оберіть форму прикметника, яка підходить до людини.
    items:
      - sentence: "Мій брат дуже ___."
        answer: "привітний"
        options: ["привітний", "привітна", "привітні"]
        explanation: Брат - чоловічого роду, тому привітний.
      - sentence: "Моя сестра ___ і темноволоса."
        answer: "висока"
        options: ["високий", "висока", "високі"]
        explanation: Сестра - жіночого роду, тому висока.
      - sentence: "Наші колеги дуже ___."
        answer: "відповідальні"
        options: ["відповідальний", "відповідальна", "відповідальні"]
        explanation: Колеги - множина, тому відповідальні.
      - sentence: "Сусідка Олена ___ і чуйна."
        answer: "спокійна"
        options: ["спокійний", "спокійна", "спокійні"]
        explanation: Сусідка - жіночого роду, тому спокійна.
      - sentence: "Мій знайомий Назар ___, але справедливий."
        answer: "серйозний"
        options: ["серйозний", "серйозна", "серйозні"]
        explanation: Назар - чоловічого роду, тому серйозний.
      - sentence: "Мої друзі ___ і веселі."
        answer: "щирі"
        options: ["щирий", "щира", "щирі"]
        explanation: Друзі - множина, тому щирі.
      - sentence: "Колега Марина дуже ___."
        answer: "працьовита"
        options: ["працьовитий", "працьовита", "працьовиті"]
        explanation: Марина - жіночого роду, тому працьовита.
      - sentence: "Керівник Андрій Петрович ___."
        answer: "терплячий"
        options: ["терплячий", "терпляча", "терплячі"]
        explanation: Керівник - чоловічого роду, тому терплячий.
  - id: act-2
    type: match-up
    title: Риса і поведінка
    instruction: З'єднайте рису характеру з природною ситуацією.
    pairs:
      - left: "привітний"
        right: "завжди тепло вітається"
      - left: "щирий"
        right: "говорить чесно"
      - left: "чуйний"
        right: "помічає, коли комусь важко"
      - left: "працьовитий"
        right: "багато і добре працює"
      - left: "терплячий"
        right: "спокійний, коли щось складно"
      - left: "відповідальний"
        right: "виконує обіцянки"
      - left: "наполегливий"
        right: "не здається"
      - left: "справедливий"
        right: "чесно ставиться до всіх"
  - id: act-3
    type: quiz
    title: Звичка чи один вчинок?
    instruction: Оберіть правильне пояснення речення.
    items:
      - prompt: "Вона часто допомагає родині."
        options:
          - text: "Це звична дія, недоконаний вид."
            correct: true
          - text: "Це один завершений результат."
            correct: false
          - text: "Це тільки опис зовнішності."
            correct: false
        explanation: Часто допомагає описує повторювану поведінку.
      - prompt: "Учора він допоміг мені з валізою."
        options:
          - text: "Це один завершений вчинок."
            correct: true
          - text: "Це звичка без конкретного часу."
            correct: false
          - text: "Це опис очей."
            correct: false
        explanation: Учора і допоміг показують конкретний результат.
      - prompt: "Оксана завжди підказує новим працівникам."
        options:
          - text: "Це звичка, яка показує характер."
            correct: true
          - text: "Це один завершений вчинок."
            correct: false
          - text: "Це опис родинних стосунків."
            correct: false
        explanation: Завжди підказує описує повторювану дію.
      - prompt: "На зустрічі Назар підказав правильне слово."
        options:
          - text: "Це один завершений вчинок."
            correct: true
          - text: "Це постійна характеристика без події."
            correct: false
          - text: "Це опис волосся."
            correct: false
        explanation: Підказав у конкретній ситуації показує результат.
      - prompt: "Мій брат щосуботи телефонує бабусі."
        options:
          - text: "Це звична дія."
            correct: true
          - text: "Це один завершений результат."
            correct: false
          - text: "Це професія."
            correct: false
        explanation: Щосуботи вказує на повторення.
      - prompt: "Минулого тижня Марина допомогла мені з презентацією."
        options:
          - text: "Це конкретний завершений вчинок."
            correct: true
          - text: "Це загальна звичка без часу."
            correct: false
          - text: "Це опис віку."
            correct: false
        explanation: Минулого тижня і допомогла позначають один результат.
  - id: act-4
    type: group-sort
    title: Будуємо повний опис
    instruction: Розподіліть фрази за частинами опису людини.
    groups:
      - name: "хто це для мене"
        items:
          - "моя подруга"
          - "мій сусід"
          - "наша керівниця"
          - "знайомий з курсу"
      - name: "зовнішність"
        items:
          - "висока і темноволоса"
          - "має карі очі"
          - "світловолосий чоловік"
          - "молода блакитноока жінка"
      - name: "характер і дії"
        items:
          - "щира і чуйна"
          - "часто допомагає"
          - "учора підказала адресу"
          - "відповідальний і терплячий"
workbook:
  - type: true-false
    title: Перевірка розуміння
    instruction: Визначте, чи відповідає твердження уроку.
    items:
      - statement: "Друг і знайомий означають однакову близькість."
        answer: false
        explanation: Друг ближчий, ніж знайомий.
      - statement: "Для звичної поведінки часто використовуємо недоконаний вид."
        answer: true
        explanation: Завжди допомагає, часто підказує описують звичку.
      - statement: "Фраза добра людина українською може бути сильним компліментом."
        answer: true
        explanation: Вона говорить про характер, довіру і вчинки.
      - statement: "У робочому описі краще починати з дуже особистих деталей."
        answer: false
        explanation: У робочій ситуації опис має бути нейтральний і ввічливий.
      - statement: "Вона має карі очі - це природний A2-опис зовнішності."
        answer: true
        explanation: Це проста модель з дієсловом мати.
      - statement: "Він допоміг учора описує один завершений вчинок."
        answer: true
        explanation: Учора і доконана форма допоміг вказують на результат.
  - type: fill-in
    title: Доповніть опис людини
    instruction: Оберіть слово або форму, щоб отримати природне речення.
    items:
      - sentence: "Це моя ___ Олена. Ми дружимо вже п'ять років."
        answer: "подруга"
        options: ["подруга", "сусід", "керівник"]
        explanation: Моя вказує на жіночий рід; подруга природно поєднується з дружимо.
      - sentence: "Олена ___ карі очі і темне волосся."
        answer: "має"
        options: ["має", "є", "живе"]
        explanation: Для очей і волосся використовуємо має.
      - sentence: "За характером вона щира і ___."
        answer: "чуйна"
        options: ["чуйна", "чуйний", "чуйні"]
        explanation: Вона потребує форми чуйна.
      - sentence: "Вона часто ___ мені з українською."
        answer: "допомагає"
        options: ["допомагає", "допомогла", "допоміг"]
        explanation: Часто показує звичку, тому допомагає.
      - sentence: "Минулого тижня вона ___ мені підготувати діалог."
        answer: "допомогла"
        options: ["допомагає", "допомогла", "допоміг"]
        explanation: Минулого тижня описує один завершений вчинок жінки.
      - sentence: "Мій сусід Петро спокійний і ___."
        answer: "привітний"
        options: ["привітний", "привітна", "привітні"]
        explanation: Петро - чоловічого роду, тому привітний.
      - sentence: "Ми не близькі друзі, але часто ___ біля будинку."
        answer: "вітаємося"
        options: ["вітаємося", "допомогла", "має"]
        explanation: Часто вітаємося описує повторювану дію між людьми.
      - sentence: "Наша керівниця відповідальна і ___."
        answer: "справедлива"
        options: ["справедливий", "справедлива", "справедливі"]
        explanation: Керівниця - жіночого роду, тому справедлива.
  - type: match-up
    title: Питання до частини опису
    instruction: З'єднайте питання з відповіддю.
    pairs:
      - left: "Хто це для тебе?"
        right: "Це моя колега Оксана."
      - left: "Як вона виглядає?"
        right: "Вона має блакитні очі."
      - left: "Яка вона за характером?"
        right: "Вона терпляча і відповідальна."
      - left: "Які у вас стосунки?"
        right: "Ми разом працюємо."
      - left: "Що вона зазвичай робить?"
        right: "Вона часто пояснює правила."
      - left: "Що вона зробила вчора?"
        right: "Вона підказала мені адресу."
  - type: error-correction
    title: Виправте опис
    instruction: Оберіть природне виправлення.
    items:
      - sentence: "Моя сестра високий і веселий."
        error: "високий і веселий"
        correction: "Моя сестра висока і весела."
        options:
          - "Моя сестра висока і весела."
          - "Моя сестра високий і веселий."
        explanation: Сестра - жіночого роду, тому висока і весела.
      - sentence: "Наші колеги відповідальний."
        error: "відповідальний"
        correction: "Наші колеги відповідальні."
        options:
          - "Наші колеги відповідальні."
          - "Наші колеги відповідальний."
        explanation: Колеги - множина, тому відповідальні.
      - sentence: "Учора він допомагає мені з валізою."
        error: "допомагає"
        correction: "Учора він допоміг мені з валізою."
        options:
          - "Учора він допоміг мені з валізою."
          - "Учора він допомагає мені з валізою."
        explanation: Учора описує один завершений результат.
      - sentence: "Вона часто допомогла родині."
        error: "допомогла"
        correction: "Вона часто допомагає родині."
        options:
          - "Вона часто допомагає родині."
          - "Вона часто допомогла родині."
        explanation: Часто потребує форми для звичної дії.
      - sentence: "Це мій знайома з курсу."
        error: "мій знайома"
        correction: "Це моя знайома з курсу."
        options:
          - "Це моя знайома з курсу."
          - "Це мій знайома з курсу."
        explanation: Знайома - жіночого роду, тому моя.
      - sentence: "Він має карі волосся."
        error: "карі волосся"
        correction: "Він має темне волосся."
        options:
          - "Він має темне волосся."
          - "Він має карі волосся."
        explanation: Карі зазвичай описує очі; волосся може бути темне або світле.
  - type: translate
    title: Англійська підказка, українська відповідь
    instruction: Виберіть українське речення, яке найкраще передає зміст.
    items:
      - source: "This is my neighbor. He is friendly."
        options:
          - text: "Це мій сусід. Він привітний."
            correct: true
          - text: "Це моя сусідка. Він привітна."
            correct: false
          - text: "Це мій брат. Вона привітна."
            correct: false
        explanation: Сусід - masculine; він привітний.
      - source: "My sister has brown eyes."
        options:
          - text: "Моя сестра має карі очі."
            correct: true
          - text: "Мій сестра має карі очі."
            correct: false
          - text: "Моя сестра має темні очі волосся."
            correct: false
        explanation: Моя сестра and має карі очі are the natural forms.
      - source: "She often helps new colleagues."
        options:
          - text: "Вона часто допомагає новим колегам."
            correct: true
          - text: "Вона вчора допомогла новим колегам."
            correct: false
          - text: "Він часто допомагає новим колегам."
            correct: false
        explanation: Often is часто, so допомагає is natural.
      - source: "Yesterday he helped me with my bag."
        options:
          - text: "Учора він допоміг мені з сумкою."
            correct: true
          - text: "Учора він допомагає мені з сумкою."
            correct: false
          - text: "Часто він допоміг мені з сумкою."
            correct: false
        explanation: Yesterday points to one completed action.
      - source: "My colleague is responsible and patient."
        options:
          - text: "Моя колега відповідальна і терпляча."
            correct: true
          - text: "Моя колега відповідальний і терплячий."
            correct: false
          - text: "Мій колега відповідальна і терпляча."
            correct: false
        explanation: Моя колега requires feminine adjective forms.
      - source: "We are not close friends, but we often greet each other."
        options:
          - text: "Ми не близькі друзі, але часто вітаємося."
            correct: true
          - text: "Ми не близькі друзі, але вчора вітаємося."
            correct: false
          - text: "Ми не близький друг, але часто вітаємося."
            correct: false
        explanation: Часто вітаємося describes repeated contact.
  - type: group-sort
    title: Підготуйте опис 2-3 людей
    instruction: "Розподіліть фрази: що можна використати на початку, у середині і наприкінці опису."
    groups:
      - name: "початок: хто це"
        items:
          - "Це моя подруга Марина."
          - "Мій сусід Петро живе поруч."
          - "Оксана - моя колега."
      - name: "середина: зовнішність і характер"
        items:
          - "Вона має карі очі."
          - "Він спокійний і привітний."
          - "Вона відповідальна і терпляча."
      - name: "кінець: стосунки і дія"
        items:
          - "Ми дружимо вже шість років."
          - "Він часто допомагає сусідам."
          - "Учора вона підказала мені адресу."
