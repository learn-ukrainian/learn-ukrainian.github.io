inline:
  - id: act-1
    type: fill-in
    title: Узгодження прикметників
    instruction: Оберіть форму прикметника, яка підходить до іменника.
    items:
      - sentence: "Мій брат дуже ___."
        answer: "привітний"
        options: ["привітний", "привітна"]
        explanation: Брат - чоловічого роду.
      - sentence: "Моя сестра ___."
        answer: "висока"
        options: ["високий", "висока"]
        explanation: Сестра - жіночого роду.
      - sentence: "Сусідка дуже ___."
        answer: "чуйна"
        options: ["чуйний", "чуйна"]
        explanation: Сусідка - жіночого роду.
      - sentence: "Колега Андрій ___."
        answer: "відповідальний"
        options: ["відповідальний", "відповідальна"]
        explanation: Андрій - чоловічого роду.
  - id: act-2
    type: match-up
    title: Риса і ситуація
    instruction: З'єднайте слово про характер із ситуацією.
    pairs:
      - left: "привітний"
        right: "завжди тепло вітається"
      - left: "працьовитий"
        right: "багато і добре працює"
      - left: "терплячий"
        right: "спокійний, коли складно"
      - left: "щирий"
        right: "говорить чесно"
      - left: "чуйний"
        right: "бачить, коли комусь важко"
  - id: act-3
    type: quiz
    title: Звичка чи один вчинок?
    instruction: Оберіть краще пояснення.
    items:
      - prompt: "Він завжди допомагає сусідам."
        options:
          - text: "звична риса, недоконаний вид"
            correct: true
          - text: "один завершений вчинок"
            correct: false
        explanation: Завжди вказує на повторювану поведінку.
      - prompt: "Учора він допоміг мені."
        options:
          - text: "один конкретний результат"
            correct: true
          - text: "постійна звичка"
            correct: false
        explanation: Учора і допоміг показують одну завершену дію.
      - prompt: "Оксана часто підказує новим колегам."
        options:
          - text: "звичка"
            correct: true
          - text: "один результат"
            correct: false
        explanation: Часто позначає повторювану дію.
  - id: act-4
    type: group-sort
    title: Хто це для мене?
    instruction: Розподіліть слова на близьких людей і ширше коло спілкування.
    groups:
      - name: "ближче коло"
        items: ["друг", "подруга", "брат", "сестра", "родич"]
      - name: "ширше коло"
        items: ["сусід", "колега", "знайомий", "керівник", "нова працівниця"]
workbook:
  - type: true-false
    title: Опис людини
    instruction: Визначте, чи відповідає твердження уроку.
    items:
      - statement: "Друг і знайомий означають однакову близькість."
        answer: false
        explanation: Друг ближчий, ніж знайомий.
      - statement: "Для звичних рис характеру часто потрібен недоконаний вид."
        answer: true
        explanation: Завжди допомагає описує звичку.
      - statement: "Добра людина is a meaningful compliment."
        answer: true
        explanation: Це вказує на характер і поведінку.
  - type: error-correction
    title: Виправ опис
    instruction: Оберіть природне виправлення.
    items:
      - sentence: "Моя сестра високий."
        error: "високий"
        correction: "Моя сестра висока."
        options: ["Моя сестра висока.", "Моя сестра високий."]
        explanation: Іменник жіночого роду потребує прикметника жіночого роду.
      - sentence: "Учора він допомагає мені з валізою."
        error: "допомагає"
        correction: "Учора він допоміг мені з валізою."
        options: ["Учора він допоміг мені з валізою.", "Учора він допомагає мені з валізою."]
        explanation: Одна завершена дія вчора потребує доконаного минулого.
