inline:
  - id: act-1
    type: fill-in
    title: Узгодження прикметників
    instruction: Choose the adjective form that fits the noun.
    items:
      - sentence: "Мій брат дуже ___."
        answer: "привітний"
        options: ["привітний", "привітна"]
        explanation: Брат is masculine.
      - sentence: "Моя сестра ___."
        answer: "висока"
        options: ["високий", "висока"]
        explanation: Сестра is feminine.
      - sentence: "Сусідка дуже ___."
        answer: "чуйна"
        options: ["чуйний", "чуйна"]
        explanation: Сусідка is feminine.
      - sentence: "Колега Андрій ___."
        answer: "відповідальний"
        options: ["відповідальний", "відповідальна"]
        explanation: Андрій is masculine.
  - id: act-2
    type: match-up
    title: Риса і ситуація
    instruction: Match the character word with the situation.
    pairs:
      - left: "привітний"
        right: "завжди тепло вітається"
      - left: "працьовитий"
        right: "багато і добре працює"
      - left: "терплячий"
        right: "спокійний, коли складно"
      - left: "щирий"
        right: "говорить чесно"
      - left: "чуйний"
        right: "бачить, коли комусь важко"
  - id: act-3
    type: quiz
    title: Звичка чи один вчинок?
    instruction: Choose the better explanation.
    items:
      - prompt: "Він завжди допомагає сусідам."
        options:
          - text: "звична риса, недоконаний вид"
            correct: true
          - text: "один завершений вчинок"
            correct: false
        explanation: Завжди points to repeated behavior.
      - prompt: "Учора він допоміг мені."
        options:
          - text: "один конкретний результат"
            correct: true
          - text: "постійна звичка"
            correct: false
        explanation: Учора and допоміг show one completed act.
      - prompt: "Оксана часто підказує новим колегам."
        options:
          - text: "звичка"
            correct: true
          - text: "один результат"
            correct: false
        explanation: Часто marks repeated action.
  - id: act-4
    type: group-sort
    title: Хто це для мене?
    instruction: Sort the words into close people and wider social circle.
    groups:
      - name: "ближче коло"
        items: ["друг", "подруга", "брат", "сестра", "родич"]
      - name: "ширше коло"
        items: ["сусід", "колега", "знайомий", "керівник", "нова працівниця"]
workbook:
  - type: true-false
    title: Опис людини
    instruction: Decide whether each statement fits the lesson.
    items:
      - statement: "Друг і знайомий означають однакову близькість."
        answer: false
        explanation: Друг is closer than знайомий.
      - statement: "Для звичних рис характеру часто потрібен недоконаний вид."
        answer: true
        explanation: Завжди допомагає describes a habit.
      - statement: "Добра людина is a meaningful compliment."
        answer: true
        explanation: It points to character and behavior.
  - type: error-correction
    title: Виправ опис
    instruction: Choose the natural correction.
    items:
      - sentence: "Моя сестра високий."
        error: "високий"
        correction: "Моя сестра висока."
        options: ["Моя сестра висока.", "Моя сестра високий."]
        explanation: Feminine noun needs feminine adjective.
      - sentence: "Учора він допомагає мені з валізою."
        error: "допомагає"
        correction: "Учора він допоміг мені з валізою."
        options: ["Учора він допоміг мені з валізою.", "Учора він допомагає мені з валізою."]
        explanation: One completed act yesterday needs perfective past.
