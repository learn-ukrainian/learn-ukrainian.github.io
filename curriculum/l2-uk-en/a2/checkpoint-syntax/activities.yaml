inline:
  - id: act-1
    type: group-sort
    title: Тип складного речення
    instruction: Розподіліть речення за типом зв'язку.
    groups:
      - label: "причина"
        items:
          - "Я залишився вдома, бо захворів."
          - "Ми почали раніше, тому що дорога довга."
      - label: "допуст"
        items:
          - "Хоча було пізно, ми закінчили."
          - "Я розумію текст, хоча не знаю всіх слів."
      - label: "мета"
        items:
          - "Я відкрив словник, щоб перевірити наголос."
          - "Ми прийшли раніше, щоб підготувати кімнату."
      - label: "означення"
        items:
          - "Це колега, який сидить поруч."
          - "Офіс, де ми працюємо, біля метро."
      - label: "умова"
        items:
          - "Якщо буде час, я напишу."
          - "Я прийду, якщо закінчу роботу."
  - id: act-2
    type: fill-in
    title: Оберіть сполучник
    instruction: Доповніть речення правильним сполучником.
    items:
      - sentence: "Я вчуся, ___ хочу змінити роботу."
        answer: "тому що"
        options:
          - "тому що"
          - "щоб"
          - "якщо"
        explanation: "Це причина."
      - sentence: "Я вчуся, ___ змінити роботу."
        answer: "щоб"
        options:
          - "щоб"
          - "тому що"
          - "хоча"
        explanation: "Це мета."
      - sentence: "___ буде дощ, ми залишимося вдома."
        answer: "Якщо"
        options:
          - "Якщо"
          - "Якби"
          - "Бо"
        explanation: "Реальна умова A2."
      - sentence: "___ робота складна, вона цікава."
        answer: "Хоча"
        options:
          - "Хоча"
          - "Тому що"
          - "Щоб"
        explanation: "Це допуст."
      - sentence: "Компанія, ___ я працюю, невелика."
        answer: "де"
        options:
          - "де"
          - "якщо"
          - "бо"
        explanation: "Описуємо місце."
      - sentence: "Колега, ___ сидить поруч, допомагає мені."
        answer: "який"
        options:
          - "який"
          - "яка"
          - "яке"
        explanation: "Колега — чоловічий рід."
      - sentence: "Я написав, ___ ти знав час зустрічі."
        answer: "щоб"
        options:
          - "щоб"
          - "бо"
          - "хоча"
        explanation: "Мета з іншим підметом."
      - sentence: "Я взяв парасолю, ___ йшов дощ."
        answer: "бо"
        options:
          - "бо"
          - "якщо"
          - "щоб"
        explanation: "Дощ уже був причиною."
      - sentence: "Книжка, ___ я читаю, цікава."
        answer: "яку"
        options:
          - "яку"
          - "яка"
          - "яке"
        explanation: "Я читаю книжку: потрібна знахідна форма."
      - sentence: "Я напишу, ___ матиму новини."
        answer: "якщо"
        options:
          - "якщо"
          - "тому що"
          - "хоча"
        explanation: "Новини є умовою майбутньої дії."
  - id: act-3
    type: error-correction
    title: Виправте помилку
    instruction: Оберіть правильний варіант складного речення.
    items:
      - sentence: "Хоча було пізно, але ми закінчили."
        error: "але"
        correction: "Хоча було пізно, ми закінчили."
        options:
          - "Хоча було пізно, ми закінчили."
          - "Хоча було пізно, але ми закінчили."
        explanation: "У навчальному письмі не додаємо але після хоча."
      - sentence: "Я прийшов, тому що допомогти."
        error: "тому що"
        correction: "Я прийшов, щоб допомогти."
        options:
          - "Я прийшов, щоб допомогти."
          - "Я прийшов, тому що допомогти."
        explanation: "Допомогти — мета."
      - sentence: "Якби буде дощ, ми залишимося вдома."
        error: "Якби"
        correction: "Якщо буде дощ, ми залишимося вдома."
        options:
          - "Якщо буде дощ, ми залишимося вдома."
          - "Якби буде дощ, ми залишимося вдома."
        explanation: "Для реальної умови A2 потрібне якщо."
      - sentence: "Компанія, який працює в Києві, шукає людей."
        error: "який"
        correction: "Компанія, яка працює в Києві, шукає людей."
        options:
          - "Компанія, яка працює в Києві, шукає людей."
          - "Компанія, який працює в Києві, шукає людей."
        explanation: "Компанія — жіночий рід."
      - sentence: "Якщо буде час я напишу."
        error: "немає коми"
        correction: "Якщо буде час, я напишу."
        options:
          - "Якщо буде час, я напишу."
          - "Якщо буде час я напишу."
        explanation: "Після якщо-частини потрібна кома."
      - sentence: "Він запитав, що я буду?"
        error: "що"
        correction: "Він запитав, чи я буду."
        options:
          - "Він запитав, чи я буду."
          - "Він запитав, що я буду?"
        explanation: "Для питання так/ні використовуємо чи."
      - sentence: "Я відкрив словник, якщо перевірити слово."
        error: "якщо"
        correction: "Я відкрив словник, щоб перевірити слово."
        options:
          - "Я відкрив словник, щоб перевірити слово."
          - "Я відкрив словник, якщо перевірити слово."
        explanation: "Перевірити слово — мета."
      - sentence: "Каву купив я. (відповідь на питання: що ти купив?)"
        error: "фокус"
        correction: "Я купив каву."
        options:
          - "Я купив каву."
          - "Каву купив я."
        explanation: "Якщо питають що, нова інформація — каву."
  - id: act-4
    type: match-up
    title: Питання і модель
    instruction: З'єднайте комунікативне питання з правильною моделлю.
    pairs:
      - left: "Чому ти обрав цю спеціальність?"
        right: "Я обрав її, тому що вона практична."
      - left: "Для чого ти проходиш курс?"
        right: "Я проходжу курс, щоб отримати нові навички."
      - left: "Який це офіс?"
        right: "Це офіс, де працює моя команда."
      - left: "За якої умови ти подаси резюме?"
        right: "Якщо знайду цікаву вакансію, подам резюме."
      - left: "Попри що ти продовжиш навчання?"
        right: "Хоча курс складний, я продовжу."
      - left: "Хто купив квитки?"
        right: "Квитки купила Марта."
      - left: "Що сказала викладачка?"
        right: "Вона сказала, що завтра буде тест."
      - left: "Чи буде зустріч?"
        right: "Він запитав, чи буде зустріч."
workbook:
  - type: quiz
    title: Фінальна самоперевірка
    instruction: Оберіть найкращий варіант.
    items:
      - question: "Яке речення називає мету?"
        options:
          - "Я пишу, щоб уточнити час."
          - "Я пишу, тому що маю питання."
          - "Я пишу, хоча пізно."
        correct: 0
        explanation: "Щоб + інфінітив називає мету."
      - question: "Яке речення називає причину?"
        options:
          - "Я залишився вдома, бо захворів."
          - "Я залишився вдома, щоб захворіти."
          - "Якщо залишився вдома, захворів."
        correct: 0
        explanation: "Бо відповідає на питання чому."
      - question: "Яке речення має реальну умову?"
        options:
          - "Якщо буде час, я прийду."
          - "Якби буде час, я прийду."
          - "Хоча буде час, я прийду."
        correct: 0
        explanation: "Якщо + майбутній час — реальна умова A2."
      - question: "Яке речення правильно описує місце?"
        options:
          - "Це кімната, де можна працювати."
          - "Це кімната, якщо можна працювати."
          - "Це кімната, бо можна працювати."
        correct: 0
        explanation: "Де описує місце."
      - question: "Яка відповідь природна на питання: хто написав лист?"
        options:
          - "Лист написала Олена."
          - "Олена написала лист."
          - "Олена лист написала тому що."
        correct: 0
        explanation: "Нова інформація — Олена."
      - question: "Як передати фразу: Викладач сказав: Завтра буде тест?"
        options:
          - "Викладач сказав, що завтра буде тест."
          - "Викладач сказав, чи завтра буде тест."
          - "Викладач сказав, щоб завтра буде тест."
        correct: 0
        explanation: "Для розповідного речення в непрямій мові використовуємо що."
      - question: "Як передати питання: Ти будеш на занятті?"
        options:
          - "Він запитав, чи я буду на занятті."
          - "Він запитав, що я буду на занятті?"
          - "Він запитав, щоб я був на занятті."
        correct: 0
        explanation: "Для питання так/ні використовуємо чи."
      - question: "Яке речення має правильну форму який?"
        options:
          - "Книжка, яку я читаю, цікава."
          - "Книжка, який я читаю, цікава."
          - "Книжка, яке я читаю, цікава."
        correct: 0
        explanation: "Книжка — жіночий рід і прямий додаток: яку."
  - type: unjumble
    title: Змішані речення A2.7
    instruction: Поставте слова в природний порядок.
    items:
      - words:
          - "Я"
          - "прийшов,"
          - "щоб"
          - "допомогти"
        answer: "Я прийшов, щоб допомогти."
      - words:
          - "Якщо"
          - "буде"
          - "час,"
          - "я"
          - "напишу"
        answer: "Якщо буде час, я напишу."
      - words:
          - "Хоча"
          - "робота"
          - "складна,"
          - "вона"
          - "цікава"
        answer: "Хоча робота складна, вона цікава."
      - words:
          - "Компанія,"
          - "де"
          - "я"
          - "працюю,"
          - "невелика"
        answer: "Компанія, де я працюю, невелика."
      - words:
          - "Квитки"
          - "купила"
          - "Марта"
        answer: "Квитки купила Марта."
      - words:
          - "Я"
          - "вчуся,"
          - "тому"
          - "що"
          - "хочу"
          - "змінити"
          - "роботу"
        answer: "Я вчуся, тому що хочу змінити роботу."
      - words:
          - "Викладачка"
          - "сказала,"
          - "що"
          - "завтра"
          - "буде"
          - "тест"
        answer: "Викладачка сказала, що завтра буде тест."
      - words:
          - "Він"
          - "запитав,"
          - "чи"
          - "я"
          - "маю"
          - "час"
        answer: "Він запитав, чи я маю час."
