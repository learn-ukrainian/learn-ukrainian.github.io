inline:
  - id: act-1
    type: fill-in
    title: "Освіта: причина, мета, опис"
    instruction: Оберіть сполучник або форму, яка підходить до речення.
    items:
      - sentence: "Я обрав економіку, ___ мені подобаються числа."
        answer: "тому що"
        options:
          - "тому що"
          - "щоб"
        explanation: "Це причина вибору."
      - sentence: "Я ходжу на курси, ___ краще підготуватися до іспиту."
        answer: "щоб"
        options:
          - "щоб"
          - "бо"
        explanation: "Це мета."
      - sentence: "Університет, ___ я навчався, знаходиться у Львові."
        answer: "де"
        options:
          - "де"
          - "якщо"
        explanation: "Описуємо місце."
      - sentence: "Предмет, ___ мені подобався, - це історія."
        answer: "який"
        options:
          - "який"
          - "яка"
        explanation: "Предмет - чоловічий рід."
      - sentence: "Якщо складу іспит, ___ сертифікат."
        answer: "отримаю"
        options:
          - "отримаю"
          - "отримав би"
        explanation: "Реальна умова."
      - sentence: "Хоча курс був складний, я ___ його."
        answer: "закінчив"
        options:
          - "закінчив"
          - "щоб закінчив"
        explanation: "Після хоча йде головна частина."
      - sentence: "Моя спеціальність, ___ я обрала, дуже практична."
        answer: "яку"
        options:
          - "яку"
          - "яка"
        explanation: "Я обрала спеціальність: потрібна знахідна форма."
      - sentence: "Я вчу українську, ___ працювати з українськими клієнтами."
        answer: "щоб"
        options:
          - "щоб"
          - "тому що"
        explanation: "Працювати з клієнтами - мета."
  - id: act-2
    type: quiz
    title: "Робота: яка логіка?"
    instruction: Оберіть тип складного речення.
    items:
      - question: "Я став учителем, тому що люблю працювати з дітьми."
        options:
          - "причина"
          - "мета"
          - "умова"
        correct: 0
        explanation: "Тому що відповідає на питання чому."
      - question: "Вона проходить курс, щоб отримати нову посаду."
        options:
          - "мета"
          - "допуст"
          - "означення"
        correct: 0
        explanation: "Щоб відповідає на питання для чого."
      - question: "Компанія, де я працюю, невелика."
        options:
          - "означення місця"
          - "причина"
          - "умова"
        correct: 0
        explanation: "Де описує компанію як місце."
      - question: "Якщо знайду вакансію, подам резюме."
        options:
          - "умова"
          - "причина"
          - "протиставлення"
        correct: 0
        explanation: "Якщо називає умову."
      - question: "Хоча робота важка, вона цікава."
        options:
          - "допуст"
          - "мета"
          - "означення"
        correct: 0
        explanation: "Хоча показує перешкоду, яка не зупиняє результат."
      - question: "Колега, який сидить поруч, допомагає мені."
        options:
          - "означення людини"
          - "умова"
          - "мета"
        correct: 0
        explanation: "Який описує колегу."
      - question: "Я змінив графік, бо маю вечірні курси."
        options:
          - "причина"
          - "умова"
          - "допуст"
        correct: 0
        explanation: "Бо вводить причину."
      - question: "Якщо матиму досвід, зможу керувати проєктом."
        options:
          - "умова"
          - "причина"
          - "непряма мова"
        correct: 0
        explanation: "Це реальна умова для майбутнього результату."
  - id: act-3
    type: match-up
    title: Ситуація і природна реакція
    instruction: З'єднайте ситуацію з реченням, яке її добре передає.
    pairs:
      - left: "Пояснити, чому ви обрали спеціальність"
        right: "Я обрав цю спеціальність, тому що вона практична."
      - left: "Назвати мету навчання"
        right: "Я вчуся, щоб отримати диплом."
      - left: "Описати університет"
        right: "Університет, де я навчався, був невеликий."
      - left: "Сказати про умову вступу"
        right: "Якщо складу іспит, вступлю до магістратури."
      - left: "Показати складність роботи"
        right: "Хоча робота складна, вона мені подобається."
      - left: "Описати компанію"
        right: "Компанія, яка розробляє додатки, шукає працівників."
      - left: "Дати пораду про кар'єру"
        right: "Якщо хочеш змінити роботу, підготуй резюме."
      - left: "Пояснити причину зміни графіка"
        right: "Я змінив графік, бо маю вечірні курси."
  - id: act-4
    type: true-false
    title: Чи природне речення?
    instruction: Визначте, чи правильно побудоване речення.
    items:
      - statement: "Я вчуся, щоб отримати диплом."
        answer: true
        explanation: "Щоб правильно вводить мету."
      - statement: "Я обрав медицину, щоб люблю допомагати людям."
        answer: false
        explanation: "Потрібно тому що: це причина."
      - statement: "Компанія, де я працюю, знаходиться біля метро."
        answer: true
        explanation: "Де природно описує місце."
      - statement: "Якщо складу іспит, вступлю до магістратури."
        answer: true
        explanation: "Це реальна умова."
      - statement: "Хоча робота важка, але вона цікава."
        answer: false
        explanation: "У навчальному письмі краще без але: Хоча робота важка, вона цікава."
      - statement: "Колега, який сидить поруч, допомагає мені."
        answer: true
        explanation: "Який узгоджується з колега."
      - statement: "Університет, яка у Львові, великий."
        answer: false
        explanation: "Університет - чоловічий рід; також краще: університет, який знаходиться..."
      - statement: "Я проходжу курс, тому що хочу змінити роботу."
        answer: true
        explanation: "Це причина, чому людина проходить курс."
workbook:
  - type: group-sort
    title: Освіта чи робота?
    instruction: Розподіліть слова за темою.
    groups:
      - label: "освіта"
        items:
          - "університет"
          - "факультет"
          - "спеціальність"
          - "диплом"
          - "іспит"
          - "залік"
      - label: "робота"
        items:
          - "посада"
          - "компанія"
          - "офіс"
          - "зарплата"
          - "керівник"
          - "співбесіда"
      - label: "обидві сфери"
        items:
          - "досвід"
          - "проєкт"
          - "графік"
          - "навички"
  - type: unjumble
    title: Складіть речення про кар'єру
    instruction: Поставте слова в природний порядок.
    items:
      - words:
          - "Я"
          - "вивчаю"
          - "право,"
          - "тому"
          - "що"
          - "хочу"
          - "допомагати"
          - "людям"
        answer: "Я вивчаю право, тому що хочу допомагати людям."
      - words:
          - "Я"
          - "проходжу"
          - "курс,"
          - "щоб"
          - "отримати"
          - "нові"
          - "навички"
        answer: "Я проходжу курс, щоб отримати нові навички."
      - words:
          - "Компанія,"
          - "де"
          - "я"
          - "працюю,"
          - "невелика"
        answer: "Компанія, де я працюю, невелика."
      - words:
          - "Якщо"
          - "складу"
          - "іспит,"
          - "вступлю"
          - "до"
          - "магістратури"
        answer: "Якщо складу іспит, вступлю до магістратури."
      - words:
          - "Хоча"
          - "робота"
          - "важка,"
          - "вона"
          - "цікава"
        answer: "Хоча робота важка, вона цікава."
      - words:
          - "Університет,"
          - "де"
          - "я"
          - "навчався,"
          - "у"
          - "Львові"
        answer: "Університет, де я навчався, у Львові."
