inline:
  - id: act-1
    type: fill-in
    title: Утворіть вищий ступінь
    instruction: Оберіть природну форму вищого ступеня.
    items:
      - sentence: "новий → ___"
        answer: "новіший"
        options: ["новіший", "новийший", "більш новіший"]
        explanation: Проста форма — новіший; не додаємо більш до простої форми.
      - sentence: "дешевий → ___"
        answer: "дешевший"
        options: ["дешевший", "дешевіший", "більш дешевший"]
        explanation: Частотна форма — дешевший.
      - sentence: "зручний → ___"
        answer: "зручніший"
        options: ["зручніший", "зручнийший", "найзручніший"]
        explanation: "Вищий ступінь: зручніший; найзручніший — уже найвищий."
      - sentence: "цікавий → ___"
        answer: "цікавіший"
        options: ["цікавіший", "цікавший", "самий цікавий"]
        explanation: Цікавий має форму цікавіший.
      - sentence: "дорогий → ___"
        answer: "дорожчий"
        options: ["дорожчий", "дорогіший", "більш дорожчий"]
        explanation: "У частій формі є чергування: дорогий → дорожчий."
      - sentence: "тихий → ___"
        answer: "тихіший"
        options: ["тихіший", "тишший", "найтихіший"]
        explanation: "Вищий ступінь: тихіший."
      - sentence: "важкий → ___"
        answer: "важчий"
        options: ["важчий", "важкийший", "більш важчий"]
        explanation: Важкий → важчий.
      - sentence: "офіційний → ___"
        answer: "більш офіційний"
        options: ["більш офіційний", "офіційніший", "більш офіційніший"]
        explanation: Для довшого слова складена форма звучить безпечно.
  - id: act-2
    type: quiz
    title: Ніж чи за?
    instruction: Оберіть природну форму порівняння.
    items:
      - question: "Цей маршрут коротший ___ той."
        options: ["за", "ніж", "най"]
        correct: 0
        explanation: Можна сказати коротший за той.
      - question: "Цей маршрут коротший, ___ той."
        options: ["ніж", "за", "най"]
        correct: 0
        explanation: Після коми природна модель з ніж.
      - question: "Наша кімната світліша ___ вашу."
        options: ["за", "ніж", "най"]
        correct: 0
        explanation: "За + знахідний: за вашу кімнату, тут іменник пропущено."
      - question: "Наша кімната світліша, ___ ваша."
        options: ["ніж", "за", "най"]
        correct: 0
        explanation: "Ніж + називний: ваша кімната."
      - question: "Ця кава міцніша ___ чай."
        options: ["за", "ніж", "най"]
        correct: 0
        explanation: Можна сказати міцніша за чай.
      - question: "Ця кава міцніша, ___ чай."
        options: ["ніж", "за", "най"]
        correct: 0
        explanation: Можна сказати міцніша, ніж чай.
      - question: "Новий телефон дорожчий ___ старий."
        options: ["за", "ніж", "най"]
        correct: 0
        explanation: Дорожчий за старий — коротка модель.
      - question: "Новий телефон дорожчий, ___ старий."
        options: ["ніж", "за", "най"]
        correct: 0
        explanation: Дорожчий, ніж старий — модель з ніж.
  - id: act-3
    type: match-up
    title: Найвищий ступінь
    instruction: З'єднайте початкову форму з природною найвищою формою.
    pairs:
      - left: "добрий"
        right: "найкращий"
      - left: "поганий"
        right: "найгірший"
      - left: "великий"
        right: "найбільший"
      - left: "малий"
        right: "найменший"
      - left: "зручний"
        right: "найзручніший"
      - left: "дорогий"
        right: "найдорожчий"
      - left: "цікавий"
        right: "найцікавіший"
      - left: "офіційний"
        right: "найбільш офіційний"
  - id: act-4
    type: true-false
    title: Чи правильно?
    instruction: Визначте, чи речення має правильну форму порівняння.
    items:
      - statement: "Цей варіант кращий."
        correct: true
        explanation: Кращий — правильна суплетивна форма.
      - statement: "Цей варіант більш кращий."
        correct: false
        explanation: Не змішуємо більш і кращий.
      - statement: "Кімната більша, ніж кухня."
        correct: true
        explanation: Ніж + називний — правильна модель.
      - statement: "Кімната більша за кухню."
        correct: true
        explanation: За + знахідний — правильна модель.
      - statement: "Це самий найкращий план."
        correct: false
        explanation: Достатньо сказати найкращий план.
      - statement: "Це найбільш офіційний варіант."
        correct: true
        explanation: Складена найвища форма правильна.
      - statement: "Моя сумка важчий."
        correct: false
        explanation: "Сумка — жіночий рід: важча."
      - statement: "Сьогодні мені краще."
        correct: true
        explanation: Краще може бути прислівником і не узгоджується.
workbook:
  - type: error-correction
    title: Виправте порівняння
    instruction: Оберіть виправлене речення.
    items:
      - sentence: "Цей телефон більш кращий."
        error: "більш кращий"
        correction: "Цей телефон кращий."
        options: ["Цей телефон кращий.", "Цей телефон більш кращий."]
        explanation: Кращий уже є вищим ступенем.
      - sentence: "Ця модель самий дешевий."
        error: "самий дешевий"
        correction: "Ця модель найдешевша."
        options: ["Ця модель найдешевша.", "Ця модель самий дешевий."]
        explanation: "Для жіночого роду: найдешевша."
      - sentence: "Мій район тихіший за центр."
        error: ""
        correction: "Мій район тихіший за центр."
        options: ["Мій район тихіший за центр.", "Мій район тихіший ніж за центр."]
        explanation: Це речення вже правильне.
      - sentence: "Цей текст коротший ніж попередній."
        error: "немає коми"
        correction: "Цей текст коротший, ніж попередній."
        options: ["Цей текст коротший, ніж попередній.", "Цей текст коротший ніж попередній."]
        explanation: Перед ніж у такій моделі потрібна кома.
      - sentence: "Ця кава гірший."
        error: "гірший"
        correction: "Ця кава гірша."
        options: ["Ця кава гірша.", "Ця кава гірший."]
        explanation: Кава — жіночий рід.
      - sentence: "Це найбільш найзручніший час."
        error: "найбільш найзручніший"
        correction: "Це найзручніший час."
        options: ["Це найзручніший час.", "Це найбільш найзручніший час."]
        explanation: Не поєднуємо дві найвищі моделі.
      - sentence: "Автобус повільніший за метро."
        error: ""
        correction: "Автобус повільніший за метро."
        options: ["Автобус повільніший за метро.", "Автобус повільніший най метро."]
        explanation: За метро — правильна модель.
      - sentence: "Це більш офіційніший лист."
        error: "більш офіційніший"
        correction: "Це більш офіційний лист."
        options: ["Це більш офіційний лист.", "Це більш офіційніший лист."]
        explanation: Після більш прикметник лишається у початковій формі.
  - type: group-sort
    title: Проста чи складена форма?
    instruction: Розсортуйте форми за моделлю творення.
    groups:
      - label: "проста"
        items:
          - "дешевший"
          - "кращий"
          - "найбільший"
          - "цікавіший"
      - label: "складена"
        items:
          - "більш офіційний"
          - "менш популярний"
          - "найбільш надійний"
          - "найменш зручний"
