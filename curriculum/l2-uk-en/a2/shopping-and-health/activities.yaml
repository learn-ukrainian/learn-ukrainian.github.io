inline:
- id: act-1
  type: fill-in
  title: На ринку
  instruction: Оберіть правильну форму після слова міри.
  items:
  - sentence: Дайте кілограм ___.
    answer: яблук
    options:
    - яблук
    - яблука
    - яблуко
    explanation: Кілограм яблук - родовий множини.
  - sentence: Мені пів кіло ___.
    answer: сиру
    options:
    - сиру
    - сир
    - сиром
    explanation: Пів кіло сиру - частина продукту.
  - sentence: Візьму пляшку ___.
    answer: води
    options:
    - води
    - вода
    - воду
    explanation: Пляшка води - контейнер + родовий.
  - sentence: Дайте пачку ___.
    answer: масла
    options:
    - масла
    - масло
    - маслом
    explanation: Пачка масла - родовий.
  - sentence: Мені банку ___.
    answer: меду
    options:
    - меду
    - мед
    - медом
    explanation: Банка меду - родовий.
  - sentence: Візьму шматок ___.
    answer: хліба
    options:
    - хліба
    - хліб
    - хлібом
    explanation: Шматок хліба - родовий.
  - sentence: Дайте десяток ___.
    answer: яєць
    options:
    - яєць
    - яйця
    - яйце
    explanation: Десяток яєць - родовий множини.
  - sentence: Мені пів кіло ___.
    answer: огірків
    options:
    - огірків
    - огірки
    - огірок
    explanation: Пів кіло огірків - родовий множини.
- id: act-2
  type: quiz
  title: У лікаря
  instruction: Оберіть природну фразу для ситуації.
  items:
  - question: Ви хочете сказати, що температури немає.
    options:
    - Температури немає.
    - Температура немає.
    - Немає температура.
    correct: 0
    explanation: Немає чого? Температури.
  - question: Ви хочете сказати, що апетиту немає.
    options:
    - Немає апетиту.
    - Немає апетит.
    - Без апетит.
    correct: 0
    explanation: Апетиту - родовий.
  - question: Ви хочете сказати, що немає сил.
    options:
    - Немає сил.
    - Немає сили.
    - Немає сила.
    correct: 0
    explanation: Сил - родовий множини.
  - question: Вам потрібні ліки, коли є кашель.
    options:
    - ліки від кашлю
    - ліки від кашель
    - ліки кашлю
    correct: 0
    explanation: Від кашлю - родовий.
  - question: Вам потрібні краплі, коли є нежить.
    options:
    - краплі від нежитю
    - краплі від нежить
    - краплі нежитю
    correct: 0
    explanation: Від нежитю - родовий.
  - question: Лікар питає про алергію.
    options:
    - Чи є алергія на ліки?
    - Чи є алергії на ліки?
    - Чи є алергію на ліки?
    correct: 0
    explanation: "У питанні з є тут називний: алергія."
  - question: Ви не маєте рецепта.
    options:
    - Рецепта немає.
    - Рецепт немає.
    - Рецептом немає.
    correct: 0
    explanation: Рецепта - родовий.
  - question: "Інструкція: приймати після їжі."
    options:
    - після їжі
    - після їжа
    - після їжею
    correct: 0
    explanation: Після їжі - родовий.
- id: act-3
  type: match-up
  title: Проблема і засіб
  instruction: Зіставте проблему з фразою в аптеці.
  pairs:
  - left: кашель
    right: ліки від кашлю
  - left: нежить
    right: краплі від нежитю
  - left: головний біль
    right: таблетки від головного болю
  - left: температура
    right: щось від температури
  - left: алергія
    right: щось від алергії
  - left: біль у горлі
    right: спрей від болю в горлі
  - left: немає рецепта
    right: без рецепта
  - left: інструкція лікаря
    right: після їжі
- id: act-4
  type: group-sort
  title: Яка модель?
  instruction: Розсортуйте фрази за функцією родового.
  groups:
  - label: кількість
    items:
    - кілограм яблук
    - пляшка води
    - пачка масла
    - десяток яєць
  - label: відсутність
    items:
    - немає температури
    - немає сил
    - без рецепта
    - без цукру
  - label: засіб або режим
    items:
    - ліки від кашлю
    - краплі від нежитю
    - таблетки від болю
    - після їжі
workbook:
- type: true-false
  title: Покупки і здоров'я
  instruction: Позначте, чи фраза правильна.
  items:
  - statement: кілограм яблук
    correct: true
    explanation: Яблук - родовий множини.
  - statement: кілограм яблука
    correct: false
    explanation: Потрібно кілограм яблук.
  - statement: пляшка води
    correct: true
    explanation: Води - родовий.
  - statement: пляшка вода
    correct: false
    explanation: Потрібно пляшка води.
  - statement: немає температури
    correct: true
    explanation: Температури - родовий.
  - statement: немає температура
    correct: false
    explanation: Потрібно немає температури.
  - statement: ліки від кашлю
    correct: true
    explanation: Від кашлю - родовий.
  - statement: краплі від нежить
    correct: false
    explanation: Потрібно від нежитю.
- type: fill-in
  title: Ваш день
  instruction: Оберіть правильну фразу.
  items:
  - sentence: На ринку я купую ___.
    answer: кілограм помідорів
    options:
    - кілограм помідорів
    - кілограм помідори
    - кілограм помідор
    explanation: Помідорів - родовий множини.
  - sentence: Я беру ___.
    answer: пів кіло сиру
    options:
    - пів кіло сиру
    - пів кіло сир
    - пів кіло сиром
    explanation: Сиру - родовий.
  - sentence: "У лікаря я кажу: ___."
    answer: температури немає
    options:
    - температури немає
    - температура немає
    - температурою немає
    explanation: Температури - родовий.
  - sentence: В аптеці я прошу ___.
    answer: ліки від кашлю
    options:
    - ліки від кашлю
    - ліки від кашель
    - ліки кашлю
    explanation: Від кашлю - родовий.
  - sentence: Фармацевт каже приймати ___.
    answer: після їжі
    options:
    - після їжі
    - після їжа
    - після їжею
    explanation: Після їжі - родовий.
  - sentence: "Я питаю: це ___?"
    answer: без рецепта
    options:
    - без рецепта
    - без рецепт
    - без рецептом
    explanation: Без рецепта - родовий.
  - sentence: Мені потрібно щось ___.
    answer: від головного болю
    options:
    - від головного болю
    - від головний біль
    - від головним болем
    explanation: Від чого? Від головного болю.
  - sentence: Лікар радить пити ___.
    answer: багато води
    options:
    - багато води
    - багато вода
    - багато водою
    explanation: Багато води - родовий.
- type: error-correction
  title: Виправте короткі репліки
  instruction: Оберіть природну репліку для ринку, лікаря або аптеки.
  items:
  - sentence: Дайте кілограм яблука.
    error: яблука
    correction: Дайте кілограм яблук.
    options:
    - Дайте кілограм яблук.
    - Дайте кілограм яблука.
    explanation: Після кілограм потрібен родовий множини.
  - sentence: Мені пляшку вода.
    error: вода
    correction: Мені пляшку води.
    options:
    - Мені пляшку води.
    - Мені пляшку вода.
    explanation: Пляшку чого? Води.
  - sentence: Температура немає.
    error: Температура
    correction: Температури немає.
    options:
    - Температури немає.
    - Температура немає.
    explanation: Немає чого? Температури.
  - sentence: У мене немає апетит.
    error: апетит
    correction: У мене немає апетиту.
    options:
    - У мене немає апетиту.
    - У мене немає апетит.
    explanation: Апетиту - родовий.
  - sentence: Мені ліки від кашель.
    error: кашель
    correction: Мені ліки від кашлю.
    options:
    - Мені ліки від кашлю.
    - Мені ліки від кашель.
    explanation: Від кашлю - родовий.
  - sentence: Це без рецепт?
    error: рецепт
    correction: Це без рецепта?
    options:
    - Це без рецепта?
    - Це без рецепт?
    explanation: Без рецепта - родовий.
- type: match-up
  title: Де це сказати?
  instruction: Зіставте репліку з ситуацією.
  pairs:
  - left: Дайте пів кіло огірків.
    right: на ринку
  - left: Температури немає.
    right: у лікаря
  - left: Щось від головного болю, будь ласка.
    right: в аптеці
  - left: Скільки це коштує?
    right: на ринку
  - left: Чи є алергія на ліки?
    right: у лікаря
  - left: Це без рецепта?
    right: в аптеці
  - left: Пийте багато води.
    right: у лікаря
  - left: Приймайте після їжі.
    right: в аптеці
- type: unjumble
  title: Складіть репліку
  instruction: Поставте слова в природний порядок.
  items:
  - words:
    - Дайте
    - кілограм
    - помідорів
    - будь ласка
    answer: Дайте кілограм помідорів, будь ласка.
  - words:
    - Мені
    - пляшку
    - води
    - будь ласка
    answer: Мені пляшку води, будь ласка.
  - words:
    - У
    - мене
    - немає
    - сил
    answer: У мене немає сил.
  - words:
    - Температури
    - немає
    answer: Температури немає.
  - words:
    - Мені
    - щось
    - від
    - кашлю
    answer: Мені щось від кашлю.
  - words:
    - Приймайте
    - після
    - їжі
    answer: Приймайте після їжі.
