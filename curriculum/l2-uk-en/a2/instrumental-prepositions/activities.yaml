inline:
  - id: act-1
    type: match-up
    title: Де це?
    instruction: З'єднайте питання з природною відповіддю.
    pairs:
      - left: Де лампа?
        right: над столом
      - left: Де кіт?
        right: під столом
      - left: Де кафе?
        right: за музеєм
      - left: Де парк?
        right: між школою і бібліотекою
  - id: act-2
    type: fill-in
    title: Орудний після прийменника
    instruction: Оберіть правильну форму після прийменника.
    items:
      - sentence: "Лампа висить над ___."
        answer: столом
        options:
          - стіл
          - столом
          - столу
        explanation: Де? Над столом.
      - sentence: "Книга лежить під ___."
        answer: ліжком
        options:
          - ліжко
          - ліжком
          - ліжка
        explanation: Під + орудний відмінок для місця.
      - sentence: "Машина стоїть перед ___."
        answer: будинком
        options:
          - будинок
          - будинком
          - будинку
        explanation: Перед будинком відповідає на питання де?
      - sentence: "Скульптура стоїть між ___."
        answer: вікнами
        options:
          - вікна
          - вікнами
          - вікон
        explanation: Між вікнами - орудний множини.
  - id: act-3
    type: quiz
    title: Простір чи інше значення?
    instruction: Оберіть значення фрази з прийменником за.
    items:
      - question: "Кафе за музеєм."
        options:
          - місце позаду
          - подяка
          - підтримка
        correct: 0
        explanation: За музеєм означає позаду музею.
      - question: "Дякую за допомогу."
        options:
          - місце позаду
          - причина подяки
          - розклад
        correct: 1
        explanation: За допомогу не описує місце.
      - question: "Ми працюємо за планом."
        options:
          - відповідно до плану
          - позаду плану
          - перед планом
        correct: 0
        explanation: За планом означає according to the plan.
      - question: "Сад за будинком."
        options:
          - позаду будинку
          - заради будинку
          - без будинку
        correct: 0
        explanation: Це просторове значення з орудним відмінком.
  - id: act-4
    type: group-sort
    title: Де? чи коли?
    instruction: Розсортуйте фрази за значенням.
    groups:
      - label: Місце
        items:
          - перед будинком
          - під столом
          - між вікнами
          - за музеєм
      - label: Час
        items:
          - перед обідом
          - перед роботою
          - перед уроком
          - перед сном
workbook:
  - type: true-false
    title: Перевірка місця
    instruction: Позначте, чи речення правильно використовує орудний відмінок.
    items:
      - statement: "Лампа над столом."
        correct: true
        explanation: Над столом - правильна форма.
      - statement: "Кіт під стіл."
        correct: false
        explanation: Для місця потрібно під столом.
      - statement: "Парк між школою і бібліотекою."
        correct: true
        explanation: Між + орудний відмінок.
      - statement: "Кафе за музей."
        correct: false
        explanation: Для місця потрібно за музеєм.
  - type: error-correction
    title: Виправте фразу
    instruction: Оберіть правильне речення.
    items:
      - sentence: "Лавка під дерево."
        error: під дерево
        correction: "Лавка під деревом."
        options:
          - "Лавка під деревом."
          - "Лавка під дерево."
        explanation: Де? Під деревом.
      - sentence: "Кафе за музей."
        error: за музей
        correction: "Кафе за музеєм."
        options:
          - "Кафе за музеєм."
          - "Кафе за музей."
        explanation: За музеєм описує місце позаду музею.
      - sentence: "Ми говоримо перед урок."
        error: перед урок
        correction: "Ми говоримо перед уроком."
        options:
          - "Ми говоримо перед уроком."
          - "Ми говоримо перед урок."
        explanation: Перед уроком - часове значення з орудним.
