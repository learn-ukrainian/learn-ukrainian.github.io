inline:
  - id: act-1
    type: fill-in
    title: Ранок у місті
    instruction: Доповніть ранкові репліки правильною формою.
    items:
      - sentence: "Я приїхала до ___ вранці."
        answer: "Львова"
        options:
          - "Львів"
          - "Львова"
          - "Львовом"
        explanation: "До вимагає родового відмінка."
      - sentence: "На ___ я запитала про трамвай."
        answer: "вокзалі"
        options:
          - "вокзал"
          - "вокзалі"
          - "вокзалом"
        explanation: "На вокзалі - місцевий."
      - sentence: "Я купила ___ до центру."
        answer: "квиток"
        options:
          - "квиток"
          - "квитка"
          - "квитком"
        explanation: "Купила що? квиток."
      - sentence: "У готелі немає вільних ___."
        answer: "номерів"
        options:
          - "номери"
          - "номерів"
          - "номерами"
        explanation: "Немає чого? номерів."
      - sentence: "___, будь ласка, повільніше."
        answer: "Повторіть"
        options:
          - "Повторіть"
          - "Повторили"
          - "Повторю"
        explanation: "Це ввічливий наказовий спосіб."
      - sentence: "Я говорила з ___."
        answer: "адміністраторкою"
        options:
          - "адміністраторка"
          - "адміністраторку"
          - "адміністраторкою"
        explanation: "З ким? з адміністраторкою."
      - sentence: "Покажіть, будь ласка, ___ на карті."
        answer: "адресу"
        options:
          - "адреса"
          - "адресу"
          - "адресою"
        explanation: "Покажіть що? адресу."
      - sentence: "Я залишила речі ___ обіду."
        answer: "до"
        options:
          - "до"
          - "з"
          - "на"
        explanation: "До обіду - часовий межовий вираз."
      - sentence: "У ___ було дуже чисто."
        answer: "номері"
        options:
          - "номер"
          - "номері"
          - "номером"
        explanation: "У номері - місцевий."
      - sentence: "Я подякувала ___."
        answer: "працівниці"
        options:
          - "працівниця"
          - "працівниці"
          - "працівницю"
        explanation: "Дякувати кому? працівниці."
  - id: act-2
    type: quiz
    title: День у місті
    instruction: Оберіть найприроднішу репліку для ситуації.
    items:
      - question: "Ви хочете купити яблука на ринку."
        options:
          - "Дайте, будь ласка, два кілограми яблук."
          - "Яблука ходять до ринку."
          - "Я без яблуками."
        correct: 0
        explanation: "Це ввічлива і граматично правильна репліка."
      - question: "Ви хочете пораду щодо десерту."
        options:
          - "Що ви порадите на десерт?"
          - "Десерт порадив мене?"
          - "Я пораджу офіціанта."
        correct: 0
        explanation: "Порадите що? на десерт - природне питання."
      - question: "У замовленні помилка."
        options:
          - "Вибачте, я замовляла каву без цукру."
          - "Вибачте, я замовляла кава без цукор."
          - "Вибачте, я замовити каву."
        correct: 0
        explanation: "Каву - знахідний, без цукру - родовий."
      - question: "Ви порівнюєте дві кав'ярні."
        options:
          - "Ця кав'ярня затишніша, ніж та."
          - "Ця кав'ярня затишна ніж та."
          - "Ця кав'ярня найзатишніша за та."
        correct: 0
        explanation: "Вищий ступінь + ніж."
      - question: "Ви питаєте про будівлю."
        options:
          - "Що це за будівля?"
          - "Ким це за будівля?"
          - "Де це за будівлею?"
        correct: 0
        explanation: "Що це за...? - природна модель."
      - question: "Ви хочете купити сувеніри для родини."
        options:
          - "Де можна купити сувеніри для родини?"
          - "Де можна купити сувенірами для родина?"
          - "Де можна куплю сувеніри?"
        correct: 0
        explanation: "Сувеніри - знахідний, для родини - родовий."
      - question: "Ви пояснюєте мету прогулянки."
        options:
          - "Я гуляю, щоб побачити місто."
          - "Я гуляю, тому що побачити місто."
          - "Я гуляю, якщо побачити місто."
        correct: 0
        explanation: "Щоб + інфінітив називає мету."
      - question: "Ви говорите про умову."
        options:
          - "Якщо буде час, зайдемо до музею."
          - "Бо буде час, зайдемо до музею."
          - "Хоча буде час, зайдемо до музею."
        correct: 0
        explanation: "Якщо називає реальну умову."
      - question: "Ви просите повторити."
        options:
          - "Повторіть, будь ласка, ще раз."
          - "Повторили, будь ласка, ще раз."
          - "Повторю, будь ласка, ще раз."
        correct: 0
        explanation: "Повторіть - ввічлива форма наказового способу."
      - question: "Ви висловлюєте думку."
        options:
          - "На мою думку, цей маршрут зручніший."
          - "На мене думку, цей маршрут зручніший."
          - "Моєю думку маршрут зручніший."
        correct: 0
        explanation: "На мою думку - стала фраза."
  - id: act-3
    type: match-up
    title: Процес чи результат увечері
    instruction: З'єднайте процес із результатом.
    pairs:
      - left: "Я гуляла центром дві години."
        right: "Я побачила стару ратушу."
      - left: "Ми довго шукали книгарню."
        right: "Ми знайшли книгарню біля театру."
      - left: "Я писала нотатки в телефоні."
        right: "Я написала короткий пост."
      - left: "Ми чекали трамвай десять хвилин."
        right: "Ми дочекалися трамвая."
      - left: "Я читала меню."
        right: "Я вибрала борщ і чай."
      - left: "Друг пояснював маршрут."
        right: "Я зрозуміла, куди йти."
      - left: "Ми фотографували площу."
        right: "Ми зробили десять фото."
      - left: "Я вчила нові слова."
        right: "Я вивчила п'ять корисних фраз."
  - id: act-4
    type: error-correction
    title: Фінальна корекція
    instruction: Оберіть правильний варіант для сценарію.
    items:
      - sentence: "Я приїхала до Львів."
        error: "Львів"
        correction: "Я приїхала до Львова."
        options:
          - "Я приїхала до Львова."
          - "Я приїхала до Львів."
        explanation: "До вимагає родового відмінка."
      - sentence: "На вокзал я запитала про трамвай."
        error: "На вокзал"
        correction: "На вокзалі я запитала про трамвай."
        options:
          - "На вокзалі я запитала про трамвай."
          - "На вокзал я запитала про трамвай."
        explanation: "Де? на вокзалі."
      - sentence: "Я замовила кава з молоком."
        error: "кава"
        correction: "Я замовила каву з молоком."
        options:
          - "Я замовила каву з молоком."
          - "Я замовила кава з молоком."
        explanation: "Замовила що? каву."
      - sentence: "Дайте два кілограм яблука."
        error: "два кілограм яблука"
        correction: "Дайте два кілограми яблук."
        options:
          - "Дайте два кілограми яблук."
          - "Дайте два кілограм яблука."
        explanation: "Два кілограми яблук - природна кількісна модель."
      - sentence: "Я гуляла і побачила місто весь день."
        error: "побачила місто весь день"
        correction: "Я гуляла містом весь день і побачила багато цікавого."
        options:
          - "Я гуляла містом весь день і побачила багато цікавого."
          - "Я побачила місто весь день."
        explanation: "Весь день - процес; побачила - результат."
      - sentence: "Ця кав'ярня більш краща."
        error: "більш краща"
        correction: "Ця кав'ярня краща."
        options:
          - "Ця кав'ярня краща."
          - "Ця кав'ярня більш краща."
        explanation: "Краща вже є вищим ступенем."
      - sentence: "Я хочу піти, тому що побачити театр."
        error: "тому що"
        correction: "Я хочу піти, щоб побачити театр."
        options:
          - "Я хочу піти, щоб побачити театр."
          - "Я хочу піти, тому що побачити театр."
        explanation: "Побачити театр - мета."
      - sentence: "Якби буде час, ми підемо до музею."
        error: "Якби"
        correction: "Якщо буде час, ми підемо до музею."
        options:
          - "Якщо буде час, ми підемо до музею."
          - "Якби буде час, ми підемо до музею."
        explanation: "Для реальної умови A2 потрібне якщо."
      - sentence: "Я подякувала офіціантку."
        error: "офіціантку"
        correction: "Я подякувала офіціантці."
        options:
          - "Я подякувала офіціантці."
          - "Я подякувала офіціантку."
        explanation: "Дякувати кому? офіціантці."
      - sentence: "Ніхто допоміг мені з маршрутом."
        error: "немає не"
        correction: "Ніхто не допоміг мені з маршрутом."
        options:
          - "Ніхто не допоміг мені з маршрутом."
          - "Ніхто допоміг мені з маршрутом."
        explanation: "Ніхто потребує заперечення не."
workbook:
  - type: true-false
    title: Перевірка сценарію
    instruction: Визначте, чи твердження допомагає виконати фінальне завдання.
    items:
      - statement: "У сценарії має бути хоча б один ввічливий запит."
        correct: true
        explanation: "Це перевіряє практичну комунікацію."
      - statement: "У фінальному завданні треба уникати минулого часу."
        correct: false
        explanation: "Навпаки, треба розповісти, що сталося протягом дня."
      - statement: "Сценарій може містити маленьку проблему і ввічливе розв'язання."
        correct: true
        explanation: "Це робить завдання реалістичним."
      - statement: "Усі речення мають бути простими, без сполучників."
        correct: false
        explanation: "A2 включає тому що, хоча, щоб, якщо."
      - statement: "Порівняння допомагає описати місця або варіанти."
        correct: true
        explanation: "Наприклад: цей маршрут зручніший."
      - statement: "Самооцінка після сценарію не потрібна."
        correct: false
        explanation: "Самооцінка показує, що повторити перед B1."
  - type: match-up
    title: Сцена і фраза
    instruction: З'єднайте сцену з доречною фразою.
    pairs:
      - left: "вокзал"
        right: "Як доїхати до центру?"
      - left: "готель"
        right: "Я забронювала номер на одну ніч."
      - left: "ринок"
        right: "Дайте два кілограми яблук."
      - left: "кав'ярня"
        right: "Що ви порадите на десерт?"
      - left: "музей"
        right: "О котрій годині починається екскурсія?"
      - left: "вечір із другом"
        right: "Сьогодні я побачила багато цікавого."
  - type: essay-response
    title: Один день в українському місті
    prompt: "Напишіть 100-130 слів українською: один день у місті. Додайте ранок, день, вечір, одну проблему, одну причину або мету і один план на завтра."
    min_words: 100
    model_answer: "Уранці я приїхала до Львова потягом. На вокзалі я запитала, як доїхати до центру, і купила квиток на трамвай. У готелі я залишила речі, бо номер ще не був готовий. Потім я пішла на ринок і купила два кілограми яблук для друзів. У кав'ярні я замовила борщ, але офіціант приніс суп, тому я ввічливо пояснила проблему. Увечері я зустрілася з Оксаною біля театру. Ми гуляли центром і говорили про плани. Якщо завтра буде сонячно, ми поїдемо в парк, щоб побачити місто з іншого боку."
    peer_review_guidelines:
      - "Позначте ранок, день і вечір."
      - "Позначте одну проблему та ввічливе розв'язання."
      - "Перевірте одну причину, мету або умову."
    rubric:
      communication: "Сценарій зрозумілий і виконує практичні міські завдання."
      grammar: "Є контроль відмінків, виду дієслова, майбутнього часу і сполучників."
      coherence: "Події мають природну послідовність: ранок, день, вечір."
