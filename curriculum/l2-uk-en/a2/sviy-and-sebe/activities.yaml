inline:
  - id: act-1
    type: quiz
    title: Свій чи його / її?
    instruction: Оберіть форму, яка передає потрібне значення.
    items:
      - question: "Олена взяла ___ сумку. Це сумка Олени."
        options: ["свою", "її", "його"]
        correct: 0
        explanation: Власник є підметом, тому свою.
      - question: "Олена взяла ___ сумку. Це сумка Марії."
        options: ["її", "свою", "свій"]
        correct: 0
        explanation: Якщо сумка іншої жінки, потрібне її.
      - question: "Марко перевірив ___ розклад. Це розклад Марка."
        options: ["свій", "його", "її"]
        correct: 0
        explanation: Власник є підметом, тому свій.
      - question: "Марко перевірив ___ розклад. Це розклад Андрія."
        options: ["його", "свій", "свою"]
        correct: 0
        explanation: Якщо розклад іншого чоловіка, потрібне його.
      - question: "Вони запросили ___ друзів."
        options: ["своїх", "свій", "свою"]
        correct: 0
        explanation: Друзі належать підмету вони, форма множини - своїх.
      - question: "Я шукаю ___ паспорт."
        options: ["свій", "свою", "своє"]
        correct: 0
        explanation: Паспорт - чоловічий рід.
      - question: "Ти забула ___ ключі?"
        options: ["свої", "свій", "своє"]
        correct: 0
        explanation: Ключі - множина.
      - question: "Ми любимо ___ місто."
        options: ["своє", "своя", "свої"]
        correct: 0
        explanation: Місто - середній рід.
  - id: act-2
    type: fill-in
    title: Форми слова свій
    instruction: Оберіть правильну відмінкову форму.
    items:
      - sentence: "Я пишаюся ___ містом."
        answer: "своїм"
        options: ["свій", "свого", "своїм"]
        explanation: Пишатися чим? своїм містом.
      - sentence: "Вона допомагає ___ сестрі."
        answer: "своїй"
        options: ["своя", "своєї", "своїй"]
        explanation: Допомагати кому? своїй сестрі.
      - sentence: "Він говорить про ___ роботу."
        answer: "свою"
        options: ["свій", "свою", "своєї"]
        explanation: Про що? про свою роботу.
      - sentence: "Ми зустрілися зі ___ друзями."
        answer: "своїми"
        options: ["свої", "своїх", "своїми"]
        explanation: З ким? зі своїми друзями.
      - sentence: "Вони говорили про ___ плани."
        answer: "свої"
        options: ["свої", "своїх", "своїми"]
        explanation: Про що? про свої плани.
      - sentence: "Марко не знайшов ___ паспорта."
        answer: "свого"
        options: ["свій", "свого", "своїм"]
        explanation: Не знайшов чого? свого паспорта.
      - sentence: "Олена прийшла зі ___ родиною."
        answer: "своєю"
        options: ["своя", "своєї", "своєю"]
        explanation: З ким? зі своєю родиною.
      - sentence: "Я живу у ___ місті."
        answer: "своєму"
        options: ["своє", "свого", "своєму"]
        explanation: Де? у своєму місті.
  - id: act-3
    type: match-up
    title: Себе, собі, собою
    instruction: З'єднайте фразу з природним продовженням.
    pairs:
      - left: "бачити"
        right: "себе у дзеркалі"
      - left: "купити"
        right: "собі каву"
      - left: "взяти документи"
        right: "з собою"
      - left: "говорити"
        right: "про себе"
      - left: "уявити"
        right: "собі подорож"
      - left: "бути"
        right: "собою"
      - left: "почувати себе"
        right: "добре"
      - left: "вести себе"
        right: "спокійно"
  - id: act-4
    type: true-false
    title: Чи правильно?
    instruction: Визначте, чи правильно використано свій або себе.
    items:
      - statement: "Олена взяла свою сумку."
        correct: true
        explanation: Сумка належить Олені, підмету речення.
      - statement: "Олена взяла свій сумку."
        correct: false
        explanation: "Сумка - жіночий рід: свою сумку."
      - statement: "Марко купив собі каву."
        correct: true
        explanation: Собі означає для себе.
      - statement: "Себе хоче каву."
        correct: false
        explanation: Себе не має форми називного і не може бути підметом.
      - statement: "Ми взяли паспорти з собою."
        correct: true
        explanation: З собою - природна стала фраза.
      - statement: "Вона пишається своїм містом."
        correct: true
        explanation: Пишатися чим? своїм містом.
      - statement: "Вони говорили про своїх плани."
        correct: false
        explanation: Про що? про свої плани.
      - statement: "Я почуваю себе добре."
        correct: true
        explanation: Фраза повна, бо є добре.
workbook:
  - type: error-correction
    title: Виправте свій або себе
    instruction: Оберіть виправлене речення.
    items:
      - sentence: "Марко взяв його паспорт. Це паспорт Марка."
        error: "його"
        correction: "Марко взяв свій паспорт."
        options: ["Марко взяв свій паспорт.", "Марко взяв його паспорт."]
        explanation: Якщо власник є підметом, потрібне свій.
      - sentence: "Олена взяла свій сумку."
        error: "свій"
        correction: "Олена взяла свою сумку."
        options: ["Олена взяла свою сумку.", "Олена взяла свій сумку."]
        explanation: Сумка - жіночий рід.
      - sentence: "Я пишаюся свій містом."
        error: "свій"
        correction: "Я пишаюся своїм містом."
        options: ["Я пишаюся своїм містом.", "Я пишаюся свій містом."]
        explanation: "Орудний відмінок: своїм містом."
      - sentence: "Вона допомагає своєї сестрі."
        error: "своєї"
        correction: "Вона допомагає своїй сестрі."
        options: ["Вона допомагає своїй сестрі.", "Вона допомагає своєї сестрі."]
        explanation: "Давальний жіночого роду: своїй."
      - sentence: "Ми взяли документи з себе."
        error: "з себе"
        correction: "Ми взяли документи з собою."
        options: ["Ми взяли документи з собою.", "Ми взяли документи з себе."]
        explanation: "Стала фраза: взяти з собою."
      - sentence: "Себе купив каву."
        error: "себе"
        correction: "Я купив собі каву."
        options: ["Я купив собі каву.", "Себе купив каву."]
        explanation: Себе не може бути підметом; для адресата дії потрібне собі.
      - sentence: "Я почуваю себе."
        error: "немає прислівника"
        correction: "Я почуваю себе добре."
        options: ["Я почуваю себе добре.", "Я почуваю себе."]
        explanation: "Потрібно сказати як саме: добре, погано, спокійно."
      - sentence: "Вони говорили про своїх плани."
        error: "своїх"
        correction: "Вони говорили про свої плани."
        options: ["Вони говорили про свої плани.", "Вони говорили про своїх плани."]
        explanation: Плани - нежива множина у знахідному, форма свої.
  - type: group-sort
    title: Функція форми
    instruction: Розсортуйте фрази за тим, що вони показують.
    groups:
      - label: "чия річ"
        items:
          - "свій паспорт"
          - "свою сумку"
          - "своє місто"
          - "свої ключі"
      - label: "дія для себе"
        items:
          - "купити собі"
          - "уявити собі"
          - "нагадати собі"
          - "зробити собі"
      - label: "повернення до підмета"
        items:
          - "бачити себе"
          - "говорити про себе"
          - "бути собою"
          - "взяти з собою"
