inline:
  - id: act-1
    type: fill-in
    title: Оберіть відмінок множини
    instruction: Оберіть правильну форму за дієсловом або прийменником.
    items:
      - sentence: "Я телефоную (друзі) ___."
        answer: друзям
        options:
          - друзі
          - друзям
          - друзями
        explanation: Телефонувати кому? - друзям.
      - sentence: "Ми допомагаємо (діти) ___."
        answer: дітям
        options:
          - діти
          - дітей
          - дітям
        explanation: Допомагати кому? - дітям.
      - sentence: "Студенти дякують (учителі) ___."
        answer: учителям
        options:
          - учителі
          - учителів
          - учителям
        explanation: Дякувати кому? - учителям.
      - sentence: "Вона пояснює правила (групи) ___."
        answer: групам
        options:
          - групи
          - групам
          - групами
        explanation: Пояснювати кому? - групам.
      - sentence: "Я гуляю з (друзі) ___."
        answer: друзями
        options:
          - друзів
          - друзям
          - друзями
        explanation: З ким? - з друзями.
      - sentence: "Ми їдемо (автобуси) ___."
        answer: автобусами
        options:
          - автобусам
          - автобусами
          - автобусах
        explanation: Чим їдемо? - автобусами.
      - sentence: "Книжки лежать на (полиці) ___."
        answer: полицях
        options:
          - полиці
          - полицями
          - полицях
        explanation: Де? на полицях.
      - sentence: "Туристи живуть у (готелі) ___."
        answer: готелях
        options:
          - готелі
          - готелями
          - готелях
        explanation: Де? у готелях.
  - id: act-2
    type: match-up
    title: Форма і відмінок
    instruction: З'єднайте форму з її відмінком і початковим словом.
    pairs:
      - left: друзям
        right: "давальний множини: друзі"
      - left: дітям
        right: "давальний множини: діти"
      - left: студентам
        right: "давальний множини: студенти"
      - left: автобусами
        right: "орудний множини: автобуси"
      - left: квітами
        right: "орудний множини: квіти"
      - left: дітьми
        right: "орудний множини: діти"
      - left: у містах
        right: "місцевий множини: міста"
      - left: на заняттях
        right: "місцевий множини: заняття"
  - id: act-3
    type: quiz
    title: Прийменник і відмінок
    instruction: Оберіть правильну форму для речення.
    items:
      - question: "Ми говоримо з ___."
        options:
          - учителям
          - учителями
          - учителях
        correct: 1
        explanation: З ким? - з учителями.
      - question: "На ___ ми багато слухаємо."
        options:
          - заняття
          - заняттями
          - заняттях
        correct: 2
        explanation: Де? на заняттях.
      - question: "Волонтери допомагають ___."
        options:
          - родинам
          - родинами
          - родинах
        correct: 0
        explanation: Допомагати кому? - родинам.
      - question: "Кімнату прикрасили ___."
        options:
          - квітам
          - квітами
          - квітах
        correct: 1
        explanation: Чим прикрасили? - квітами.
      - question: "Люди ходять по ___."
        options:
          - вулицям
          - вулицями
          - вулицях
        correct: 2
        explanation: По чому? - по вулицях.
      - question: "Я раджу ___ цей фільм."
        options:
          - друзям
          - друзями
          - друзях
        correct: 0
        explanation: Радити кому? - друзям.
      - question: "Ми пишемо ___."
        options:
          - олівцям
          - олівцями
          - олівцях
        correct: 1
        explanation: Чим пишемо? - олівцями.
      - question: "Туристи зупинилися в ___."
        options:
          - готелям
          - готелями
          - готелях
        correct: 2
        explanation: Де? в готелях.
  - id: act-4
    type: error-correction
    title: Виправте закінчення
    instruction: Оберіть правильний варіант речення.
    items:
      - sentence: "Я допомагаю друзі."
        error: друзі
        correction: "Я допомагаю друзям."
        options:
          - "Я допомагаю друзям."
          - "Я допомагаю друзі."
        explanation: Допомагати кому? - друзям.
      - sentence: "Ми їдемо автобусах."
        error: автобусах
        correction: "Ми їдемо автобусами."
        options:
          - "Ми їдемо автобусами."
          - "Ми їдемо автобусах."
        explanation: Чим їдемо? - автобусами.
      - sentence: "Книги лежать на полицями."
        error: полицями
        correction: "Книги лежать на полицях."
        options:
          - "Книги лежать на полицях."
          - "Книги лежать на полицями."
        explanation: Де? на полицях.
      - sentence: "Вона говорить з діти."
        error: діти
        correction: "Вона говорить з дітьми."
        options:
          - "Вона говорить з дітьми."
          - "Вона говорить з діти."
        explanation: З ким? - з дітьми.
      - sentence: "Студенти дякують учителів."
        error: учителів
        correction: "Студенти дякують учителям."
        options:
          - "Студенти дякують учителям."
          - "Студенти дякують учителів."
        explanation: Дякувати кому? - учителям.
      - sentence: "Ми живемо у містами."
        error: містами
        correction: "Ми живемо у містах."
        options:
          - "Ми живемо у містах."
          - "Ми живемо у містами."
        explanation: Де? у містах.
      - sentence: "Вона прикрасила стіл квітам."
        error: квітам
        correction: "Вона прикрасила стіл квітами."
        options:
          - "Вона прикрасила стіл квітами."
          - "Вона прикрасила стіл квітам."
        explanation: Чим прикрасила? - квітами.
      - sentence: "Учитель пояснює правила групами."
        error: групами
        correction: "Учитель пояснює правила групам."
        options:
          - "Учитель пояснює правила групам."
          - "Учитель пояснює правила групами."
        explanation: Пояснювати кому? - групам.
