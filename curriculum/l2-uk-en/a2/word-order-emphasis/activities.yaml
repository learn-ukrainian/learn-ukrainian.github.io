inline:
  - id: act-1
    type: quiz
    title: Де нова інформація?
    instruction: Оберіть рему, тобто нову інформацію в реченні.
    items:
      - question: "Хто купив книгу? - Книгу купив Тарас."
        options:
          - "Тарас"
          - "книгу"
          - "купив"
        correct: 0
        explanation: "Питання просить назвати людину, тому нова інформація - Тарас."
      - question: "Що купив Тарас? - Тарас купив книгу."
        options:
          - "книгу"
          - "Тарас"
          - "купив"
        correct: 0
        explanation: "Питання просить назвати предмет."
      - question: "Коли приїхала Олена? - Олена приїхала вчора."
        options:
          - "вчора"
          - "Олена"
          - "приїхала"
        correct: 0
        explanation: "Час є відповіддю на питання."
      - question: "Хто зробив презентацію? - Презентацію зробив Максим."
        options:
          - "Максим"
          - "презентацію"
          - "зробив"
        correct: 0
        explanation: "Максим - нова інформація."
      - question: "Що зробила Марта? - Марта написала лист."
        options:
          - "лист"
          - "Марта"
          - "написала"
        correct: 0
        explanation: "Лист - те, що зробила Марта."
      - question: "Хто помиє підлогу? - Підлогу помию я."
        options:
          - "я"
          - "підлогу"
          - "помию"
        correct: 0
        explanation: "Нова інформація - виконавець."
      - question: "Куди поїхали друзі? - Друзі поїхали до Львова."
        options:
          - "до Львова"
          - "друзі"
          - "поїхали"
        correct: 0
        explanation: "Напрямок відповідає на питання куди."
      - question: "Що ви підготували? - Ми підготували кімнату."
        options:
          - "кімнату"
          - "ми"
          - "підготували"
        correct: 0
        explanation: "Кімнату - нова інформація."
  - id: act-2
    type: match-up
    title: Питання і природна відповідь
    instruction: З'єднайте питання з відповіддю, де фокус стоїть природно.
    pairs:
      - left: "Хто купив продукти?"
        right: "Продукти купила я."
      - left: "Що купила Марта?"
        right: "Марта купила квитки."
      - left: "Коли буде зустріч?"
        right: "Зустріч буде завтра."
      - left: "Хто підписав документи?"
        right: "Документи підписав директор."
      - left: "Що зробив Тарас?"
        right: "Тарас помив посуд."
      - left: "Хто приготує чай?"
        right: "Чай приготує Олена."
      - left: "Куди поїхали студенти?"
        right: "Студенти поїхали до центру."
      - left: "Хто пояснив правило?"
        right: "Правило пояснила викладачка."
  - id: act-3
    type: fill-in
    title: Поставте фокус у кінець
    instruction: Оберіть варіант, який краще відповідає питанню.
    items:
      - sentence: "Хто написав лист? - ___"
        answer: "Лист написала Олена."
        options:
          - "Лист написала Олена."
          - "Олена написала лист."
        explanation: "Нова інформація - Олена."
      - sentence: "Що написала Олена? - ___"
        answer: "Олена написала лист."
        options:
          - "Олена написала лист."
          - "Лист написала Олена."
        explanation: "Нова інформація - лист."
      - sentence: "Хто купив хліб? - ___"
        answer: "Хліб купив Тарас."
        options:
          - "Хліб купив Тарас."
          - "Тарас купив хліб."
        explanation: "Виконавець є відповіддю."
      - sentence: "Що купив Тарас? - ___"
        answer: "Тарас купив хліб."
        options:
          - "Тарас купив хліб."
          - "Хліб купив Тарас."
        explanation: "Предмет є відповіддю."
      - sentence: "Коли ви надішлете документи? - ___"
        answer: "Ми надішлемо документи завтра."
        options:
          - "Ми надішлемо документи завтра."
          - "Завтра ми надішлемо документи."
        explanation: "Саме час є новою інформацією."
      - sentence: "Про що ви говорили? - ___"
        answer: "Ми говорили про роботу."
        options:
          - "Ми говорили про роботу."
          - "Про роботу говорили ми."
        explanation: "Тема розмови є відповіддю."
      - sentence: "Хто підготує кімнату? - ___"
        answer: "Кімнату підготуємо ми."
        options:
          - "Кімнату підготуємо ми."
          - "Ми підготуємо кімнату."
        explanation: "Виконавець є новиною."
      - sentence: "Що ви підготуєте? - ___"
        answer: "Ми підготуємо кімнату."
        options:
          - "Ми підготуємо кімнату."
          - "Кімнату підготуємо ми."
        explanation: "Кімнату - нова інформація."
  - id: act-4
    type: group-sort
    title: Нейтральне чи марковане?
    instruction: Розподіліть речення за типом порядку слів.
    groups:
      - label: "нейтральний порядок"
        items:
          - "Олена читає статтю."
          - "Ми купили квитки."
          - "Студенти підготували аудиторію."
          - "Колега написав повідомлення."
      - label: "маркований порядок"
        items:
          - "Статтю читає Олена."
          - "Квитки купили ми."
          - "Аудиторію підготували студенти."
          - "Повідомлення написав колега."
      - label: "коригувальний контраст"
        items:
          - "Не Олена це зробила, а Марта."
          - "Не завтра зустріч, а сьогодні."
          - "Не цю книжку я шукав, а іншу."
          - "Не каву я купив, а чай."
workbook:
  - type: error-correction
    title: Виправте ненавмисний наголос
    instruction: Оберіть відповідь, яка краще відповідає питанню.
    items:
      - sentence: "Що ти купив? - Каву купив я."
        error: "Каву купив я"
        correction: "Я купив каву."
        options:
          - "Я купив каву."
          - "Каву купив я."
        explanation: "Питання питає про предмет, тому каву краще поставити в кінці."
      - sentence: "Хто купив каву? - Я купив каву."
        error: "Я купив каву"
        correction: "Каву купив я."
        options:
          - "Каву купив я."
          - "Я купив каву."
        explanation: "Питання питає про виконавця."
      - sentence: "Коли буде урок? - Завтра буде урок."
        error: "Завтра буде урок"
        correction: "Урок буде завтра."
        options:
          - "Урок буде завтра."
          - "Завтра буде урок."
        explanation: "Якщо новина - час, він природно стоїть наприкінці."
      - sentence: "Що зробив Максим? - Презентацію зробив Максим."
        error: "Презентацію зробив Максим"
        correction: "Максим зробив презентацію."
        options:
          - "Максим зробив презентацію."
          - "Презентацію зробив Максим."
        explanation: "Питання питає про дію/об'єкт, не про виконавця."
      - sentence: "Хто зробив презентацію? - Максим зробив презентацію."
        error: "Максим зробив презентацію"
        correction: "Презентацію зробив Максим."
        options:
          - "Презентацію зробив Максим."
          - "Максим зробив презентацію."
        explanation: "Виконавець є новою інформацією."
      - sentence: "Що підготували студенти? - Аудиторію підготували студенти."
        error: "Аудиторію підготували студенти"
        correction: "Студенти підготували аудиторію."
        options:
          - "Студенти підготували аудиторію."
          - "Аудиторію підготували студенти."
        explanation: "Аудиторію - відповідь на питання."
      - sentence: "Хто підготував аудиторію? - Студенти підготували аудиторію."
        error: "Студенти підготували аудиторію"
        correction: "Аудиторію підготували студенти."
        options:
          - "Аудиторію підготували студенти."
          - "Студенти підготували аудиторію."
        explanation: "Студенти - відповідь на питання хто."
      - sentence: "Що написала Олена? - Лист написала Олена."
        error: "Лист написала Олена"
        correction: "Олена написала лист."
        options:
          - "Олена написала лист."
          - "Лист написала Олена."
        explanation: "Лист є новою інформацією."
  - type: quiz
    title: Не..., а...
    instruction: Оберіть речення з коригувальним контрастом.
    items:
      - question: "Виправте: зустріч не завтра, вона сьогодні."
        options:
          - "Не завтра зустріч, а сьогодні."
          - "Зустріч завтра, тому що сьогодні."
          - "Хоча зустріч завтра, сьогодні."
        correct: 0
        explanation: "Не..., а... виправляє деталь."
      - question: "Виправте: каву купила не Марта, а Олена."
        options:
          - "Каву купила не Марта, а Олена."
          - "Кава купила Марту й Олену."
          - "Олена купила каву, тому що Марта."
        correct: 0
        explanation: "Контрастуємо двох людей."
      - question: "Виправте: потрібна не ця книжка, а інша."
        options:
          - "Не цю книжку я шукав, а іншу."
          - "Цю книжку я шукав, бо іншу."
          - "Я шукав книжку, хоча іншу."
        correct: 0
        explanation: "На початку стоїть виправлена деталь."
      - question: "Виправте: презентацію зробив не Максим, а Іван."
        options:
          - "Не Максим зробив презентацію, а Іван."
          - "Максим зробив презентацію, тому що Іван."
          - "Хоча Максим, Іван презентацію."
        correct: 0
        explanation: "Не Максим..., а Іван чітко виправляє виконавця."
      - question: "Виправте: телефон знайшла не мама, а сестра."
        options:
          - "Телефон знайшла не мама, а сестра."
          - "Мама знайшла телефон, тому сестра."
          - "Хоча телефон, мама і сестра."
        correct: 0
        explanation: "Не мама, а сестра виправляє виконавця."
      - question: "Виправте: ми зустрічаємося не в офісі, а в кав'ярні."
        options:
          - "Ми зустрічаємося не в офісі, а в кав'ярні."
          - "Ми зустрічаємося в офісі, бо в кав'ярні."
          - "Не офіс, тому ми кав'ярня."
        correct: 0
        explanation: "Контраст стосується місця зустрічі."
      - question: "Виправте: потрібен не автобус, а трамвай."
        options:
          - "Не автобус нам потрібен, а трамвай."
          - "Автобус потрібен, хоча трамвай."
          - "Трамвай потрібен автобусом."
        correct: 0
        explanation: "Не автобус..., а трамвай виправляє потрібний транспорт."
      - question: "Виправте: лист надіслав не я, а керівник."
        options:
          - "Лист надіслав не я, а керівник."
          - "Я надіслав лист, тому керівник."
          - "Керівник лист, хоча я."
        correct: 0
        explanation: "Контрастуємо двох можливих виконавців."
