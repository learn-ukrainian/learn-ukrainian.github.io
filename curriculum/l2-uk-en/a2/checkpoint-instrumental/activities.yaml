inline:
  - id: act-1
    type: quiz
    title: Визначте функцію
    instruction: Оберіть, яку функцію має орудний відмінок у реченні.
    items:
      - question: "Я пишу ручкою."
        options:
          - знаряддя
          - професія
          - супровід
        correct: 0
        explanation: Ручкою відповідає на питання чим?
      - question: "Вона працює лікаркою."
        options:
          - місце
          - професія
          - інгредієнт
        correct: 1
        explanation: Лікаркою називає професію.
      - question: "Кафе за музеєм."
        options:
          - місце
          - засіб пересування
          - професія
        correct: 0
        explanation: За музеєм відповідає на питання де?
      - question: "Чай з медом."
        options:
          - інгредієнт
          - професія
          - час
        correct: 0
        explanation: Мед - інгредієнт у чаї.
      - question: "Перед уроком я повторюю форми."
        options:
          - час
          - професія
          - знаряддя
        correct: 0
        explanation: Перед уроком відповідає на питання коли?
      - question: "Ми гуляємо з дітьми."
        options:
          - супровід
          - інструмент
          - місце
        correct: 0
        explanation: З дітьми показує людей поруч.
      - question: "Я цікавлюся музикою."
        options:
          - інтерес
          - інгредієнт
          - місце
        correct: 0
        explanation: Музикою відповідає на питання чим цікавлюся?
      - question: "Ми сидимо під великою ялинкою."
        options:
          - місце
          - засіб
          - професія
        correct: 0
        explanation: Під великою ялинкою описує місце.
      - question: "Друзі поїхали автобусом."
        options:
          - засіб пересування
          - супровід
          - інгредієнт
        correct: 0
        explanation: Автобусом показує засіб пересування.
      - question: "Бутерброд із сиром лежить на столі."
        options:
          - інгредієнт
          - професія
          - час
        correct: 0
        explanation: Із сиром називає інгредієнт.
  - id: act-2
    type: fill-in
    title: Форма орудного
    instruction: Оберіть правильну форму іменника або словосполучення.
    items:
      - sentence: "Я говорю з ___."
        answer: братом
        options:
          - брат
          - братом
          - брата
        explanation: З ким? З братом.
      - sentence: "Ми сидимо над ___."
        answer: морем
        options:
          - море
          - морем
          - моря
        explanation: Де? Над морем.
      - sentence: "Вона працює ___."
        answer: вчителькою
        options:
          - вчителька
          - вчителькою
          - вчительку
        explanation: Ким працює? Вчителькою.
      - sentence: "Діти пишуть ___."
        answer: олівцями
        options:
          - олівці
          - олівцями
          - олівців
        explanation: Чим пишуть? Олівцями.
      - sentence: "Ми граємося з ___."
        answer: дітьми
        options:
          - діти
          - дітьми
          - дітей
        explanation: З ким? З дітьми.
      - sentence: "Книга лежить під ___."
        answer: цією великою лампою
        options:
          - ця велика лампа
          - цією великою лампою
          - цим великим лампою
        explanation: Усі слова узгоджуються в орудному відмінку.
      - sentence: "На роботу я їду ___."
        answer: автобусом
        options:
          - автобус
          - автобусом
          - автобуса
        explanation: Чим їду? Автобусом.
      - sentence: "Я вечеряю з ___."
        answer: моєю подругою
        options:
          - моя подруга
          - моєю подругою
          - мою подругу
        explanation: З ким? З моєю подругою.
      - sentence: "___ я п'ю чай."
        answer: Перед обідом
        options:
          - Перед обід
          - Перед обідом
          - Перед обіду
        explanation: Перед чим? Перед обідом.
      - sentence: "Ми працюємо ___."
        answer: руками
        options:
          - руки
          - руками
          - рук
        explanation: Чим працюємо? Руками.
  - id: act-3
    type: group-sort
    title: Розсортуйте функції
    instruction: Розсортуйте 10 фраз за функцією орудного відмінка.
    groups:
      - label: Знаряддя або засіб
        items:
          - ручкою
          - автобусом
      - label: Супровід або інгредієнт
        items:
          - з другом
          - з медом
      - label: Професія
        items:
          - лікарем
          - вчителькою
      - label: Місце
        items:
          - під столом
          - між вікнами
      - label: Час
        items:
          - перед уроком
          - перед обідом
  - id: act-4
    type: error-correction
    title: Виправте речення
    instruction: Оберіть правильний варіант.
    items:
      - sentence: "Я їду автобус."
        error: автобус
        correction: "Я їду автобусом."
        options:
          - "Я їду автобусом."
          - "Я їду автобус."
        explanation: Засіб пересування має форму орудного відмінка.
      - sentence: "Вона гуляє з подруга."
        error: подруга
        correction: "Вона гуляє з подругою."
        options:
          - "Вона гуляє з подругою."
          - "Вона гуляє з подруга."
        explanation: Після з потрібен орудний відмінок.
      - sentence: "Парк між школа і бібліотека."
        error: школа і бібліотека
        correction: "Парк між школою і бібліотекою."
        options:
          - "Парк між школою і бібліотекою."
          - "Парк між школа і бібліотека."
        explanation: Між для місця вимагає орудного відмінка.
      - sentence: "з мій новий друг"
        error: мій новий друг
        correction: "з моїм новим другом"
        options:
          - "з моїм новим другом"
          - "з мій новий друг"
        explanation: Усі слова в ланцюжку мають форму орудного відмінка.
      - sentence: "Вона пише ручка."
        error: ручка
        correction: "Вона пише ручкою."
        options:
          - "Вона пише ручкою."
          - "Вона пише ручка."
        explanation: Чим пише? Ручкою.
      - sentence: "Ми п'ємо чай з мед."
        error: мед
        correction: "Ми п'ємо чай з медом."
        options:
          - "Ми п'ємо чай з медом."
          - "Ми п'ємо чай з мед."
        explanation: З чим чай? З медом.
      - sentence: "Олена працює лікарка."
        error: лікарка
        correction: "Олена працює лікаркою."
        options:
          - "Олена працює лікаркою."
          - "Олена працює лікарка."
        explanation: Професія після працює має орудний відмінок.
      - sentence: "Ми сидимо під дерево."
        error: дерево
        correction: "Ми сидимо під деревом."
        options:
          - "Ми сидимо під деревом."
          - "Ми сидимо під дерево."
        explanation: Під чим? Під деревом.
      - sentence: "Зустріч перед урок."
        error: урок
        correction: "Зустріч перед уроком."
        options:
          - "Зустріч перед уроком."
          - "Зустріч перед урок."
        explanation: Перед чим? Перед уроком.
      - sentence: "з цією великим лампою"
        error: цією великим лампою
        correction: "з цією великою лампою"
        options:
          - "з цією великою лампою"
          - "з цією великим лампою"
        explanation: Лампа жіночого роду, тому цією великою лампою.
