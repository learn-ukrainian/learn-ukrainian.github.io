inline:
  - id: act-1
    type: quiz
    title: Визначте функцію
    instruction: Оберіть, яку функцію має орудний відмінок у реченні.
    items:
      - question: "Я пишу ручкою."
        options:
          - знаряддя
          - професія
          - супровід
        correct: 0
        explanation: Ручкою відповідає на питання чим?
      - question: "Вона працює лікаркою."
        options:
          - місце
          - професія
          - інгредієнт
        correct: 1
        explanation: Лікаркою називає професію.
      - question: "Кафе за музеєм."
        options:
          - місце
          - засіб пересування
          - професія
        correct: 0
        explanation: За музеєм відповідає на питання де?
      - question: "Чай з медом."
        options:
          - інгредієнт
          - професія
          - час
        correct: 0
        explanation: Мед - інгредієнт у чаї.
  - id: act-2
    type: fill-in
    title: Форма орудного
    instruction: Оберіть правильну форму іменника.
    items:
      - sentence: "Я говорю з ___."
        answer: братом
        options:
          - брат
          - братом
          - брата
        explanation: З ким? З братом.
      - sentence: "Ми сидимо над ___."
        answer: морем
        options:
          - море
          - морем
          - моря
        explanation: Де? Над морем.
      - sentence: "Вона працює ___."
        answer: вчителькою
        options:
          - вчителька
          - вчителькою
          - вчительку
        explanation: Ким працює? Вчителькою.
      - sentence: "Діти пишуть ___."
        answer: олівцями
        options:
          - олівці
          - олівцями
          - олівців
        explanation: Чим пишуть? Олівцями.
  - id: act-3
    type: group-sort
    title: Розсортуйте функції
    instruction: Розсортуйте фрази за функцією орудного відмінка.
    groups:
      - label: Знаряддя або засіб
        items:
          - ручкою
          - автобусом
          - ножем
      - label: Супровід або інгредієнт
        items:
          - з другом
          - з молоком
          - з помідорами
      - label: Професія
        items:
          - лікарем
          - вчителькою
          - кухарем
      - label: Місце або час
        items:
          - під столом
          - між вікнами
          - перед обідом
  - id: act-4
    type: error-correction
    title: Виправте речення
    instruction: Оберіть правильний варіант.
    items:
      - sentence: "Я їду автобус."
        error: автобус
        correction: "Я їду автобусом."
        options:
          - "Я їду автобусом."
          - "Я їду автобус."
        explanation: Засіб пересування має форму орудного відмінка.
      - sentence: "Вона гуляє з подруга."
        error: подруга
        correction: "Вона гуляє з подругою."
        options:
          - "Вона гуляє з подругою."
          - "Вона гуляє з подруга."
        explanation: Після з потрібен орудний відмінок.
      - sentence: "Парк між школа і бібліотека."
        error: школа і бібліотека
        correction: "Парк між школою і бібліотекою."
        options:
          - "Парк між школою і бібліотекою."
          - "Парк між школа і бібліотека."
        explanation: Між для місця вимагає орудного відмінка.
      - sentence: "з мій новий друг"
        error: мій новий друг
        correction: "з моїм новим другом"
        options:
          - "з моїм новим другом"
          - "з мій новий друг"
        explanation: Усі слова в ланцюжку мають форму орудного відмінка.
workbook:
  - type: true-false
    title: Швидка перевірка
    instruction: Позначте, чи речення правильне.
    items:
      - statement: "Я працюю програмістом."
        correct: true
        explanation: Професія після працюю має орудний відмінок.
      - statement: "Ми п'ємо чай з мед."
        correct: false
        explanation: Потрібно з медом.
      - statement: "Лампа над столом."
        correct: true
        explanation: Над столом описує місце.
      - statement: "Вона пише ручка."
        correct: false
        explanation: Потрібно пише ручкою.
  - type: fill-in
    title: Змішана практика
    instruction: Оберіть правильну фразу для речення.
    items:
      - sentence: "Я вечеряю ___."
        answer: з моєю сім'єю
        options:
          - з моєю сім'єю
          - з моя сім'я
          - мою сім'ю
        explanation: З ким? З моєю сім'єю.
      - sentence: "Мій офіс знаходиться ___."
        answer: між кафе і аптекою
        options:
          - між кафе і аптекою
          - між кафе і аптека
          - між кафе і аптеку
        explanation: Між вимагає орудного для місця.
      - sentence: "Він став ___."
        answer: інженером
        options:
          - інженер
          - інженером
          - інженера
        explanation: Після став потрібен орудний відмінок.
      - sentence: "Книга лежить під ___."
        answer: цією великою лампою
        options:
          - ця велика лампа
          - цією великою лампою
          - цим великим лампою
        explanation: Усі слова узгоджуються в орудному відмінку.
