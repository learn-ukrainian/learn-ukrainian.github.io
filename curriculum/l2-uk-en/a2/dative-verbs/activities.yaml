inline:
  - id: act-1
    type: fill-in
    title: Кому?
    instruction: Доповніть речення правильною формою давального відмінка.
    items:
      - sentence: "Я допомагаю ___ (мама)."
        answer: "мамі"
        options:
          - "мамі"
          - "маму"
          - "мама"
        explanation: "Допомагати керує давальним: мамі."
      - sentence: "Він дякує ___ (вчитель)."
        answer: "вчителеві"
        options:
          - "вчителеві"
          - "вчителя"
          - "вчителем"
        explanation: "Дякувати керує давальним: вчителеві."
      - sentence: "Вона дзвонить ___ (подруга)."
        answer: "подрузі"
        options:
          - "подрузі"
          - "подругу"
          - "подруга"
        explanation: "Дзвонити керує давальним: подрузі."
      - sentence: "Ми радимо ___ (ти)."
        answer: "тобі"
        options:
          - "тобі"
          - "тебе"
          - "ти"
        explanation: "Після радити стоїть давальний: тобі."
      - sentence: "Вони заважають ___ (ми)."
        answer: "нам"
        options:
          - "нам"
          - "нас"
          - "ми"
        explanation: "Заважати керує давальним: нам."
      - sentence: "Я відповідаю ___ (колега)."
        answer: "колезі"
        options:
          - "колезі"
          - "колегу"
          - "колега"
        explanation: "Відповідати тут вимагає давального: колезі."
      - sentence: "Я довіряю ___ (друг)."
        answer: "другові"
        options:
          - "другові"
          - "друга"
          - "другом"
        explanation: "Довіряти керує давальним: другові."
      - sentence: "Вона співчуває ___ (сестра)."
        answer: "сестрі"
        options:
          - "сестрі"
          - "сестру"
          - "сестра"
        explanation: "Співчувати керує давальним: сестрі."
  - id: act-2
    type: quiz
    title: Датив чи ні?
    instruction: Оберіть правильний відмінок або модель.
    items:
      - question: "У реченні `Я допомагаю мамі` слово `мамі` - це..."
        options:
          - "давальний"
          - "знахідний"
          - "називний"
        correct: 0
        explanation: "Після допомагати стоїть давальний."
      - question: "У реченні `Я бачу маму` слово `маму` - це..."
        options:
          - "давальний"
          - "знахідний"
          - "місцевий"
        correct: 1
        explanation: "Бачити керує знахідним."
      - question: "У реченні `Я дякую вчителеві` слово `вчителеві` - це..."
        options:
          - "давальний"
          - "знахідний"
          - "кличний"
        correct: 0
        explanation: "Дякувати керує давальним."
      - question: "У реченні `Я знаю вчителя` слово `вчителя` - це..."
        options:
          - "давальний"
          - "знахідний"
          - "місцевий"
        correct: 1
        explanation: "Знати тут бере знахідний."
      - question: "У фразі `Мені подобається ця книжка` слово `мені` - це..."
        options:
          - "давальний досвідник"
          - "називний підмет"
          - "знахідний об'єкт"
        correct: 0
        explanation: "Той, кому подобається, стоїть у давальному."
      - question: "У фразі `Мені подобаються ці фільми` дієслово стоїть у формі..."
        options:
          - "однини"
          - "множини"
          - "минулий час"
        correct: 1
        explanation: "Підмет `ці фільми` у множині, тому подобаються."
      - question: "У фразі `Мені двадцять п'ять років` слово `мені` - це..."
        options:
          - "давальний"
          - "знахідний"
          - "родовий"
        correct: 0
        explanation: "Вік в українській часто виражається через давальний."
      - question: "У фразі `Дідусеві вісімдесят років` слово `дідусеві` - це..."
        options:
          - "давальний"
          - "місцевий"
          - "знахідний"
        correct: 0
        explanation: "Це теж модель віку з давальним."
  - id: act-3
    type: match-up
    title: Переклади моделей
    instruction: Зіставте англійську підказку з природною українською моделлю.
    pairs:
      - left: "help mom"
        right: "допомагати мамі"
      - left: "thank the teacher"
        right: "дякувати вчителеві"
      - left: "call a friend"
        right: "дзвонити другові"
      - left: "advise you"
        right: "радити тобі"
      - left: "I like this book"
        right: "Мені подобається ця книжка"
      - left: "I like these films"
        right: "Мені подобаються ці фільми"
      - left: "I am 25"
        right: "Мені двадцять п'ять років"
      - left: "the grandfather is 80"
        right: "Дідусеві вісімдесят років"
  - id: act-4
    type: group-sort
    title: Який відмінок?
    instruction: Розсортуйте дієслова за тим, який відмінок вони люблять.
    groups:
      - label: "давальний"
        items:
          - "допомагати"
          - "дякувати"
          - "дзвонити"
          - "радити"
      - label: "знахідний"
        items:
          - "бачити"
          - "знати"
          - "любити"
          - "чекати"
workbook:
  - id: act-5
    type: true-false
    title: Перевір модель
    instruction: Визначте, чи речення природне й граматично правильне.
    items:
      - statement: "Я допомагаю мамі."
        answer: true
        explanation: "Допомагати вимагає давального."
      - statement: "Я допомагаю маму."
        answer: false
        explanation: "Потрібно: мамі."
      - statement: "Мені подобається ця книжка."
        answer: true
        explanation: "Це правильна модель з давальним досвідника."
      - statement: "Тобі подобається ці фільми."
        answer: false
        explanation: "Потрібно: подобаються, бо підмет у множині."
      - statement: "Мені двадцять п'ять років."
        answer: true
        explanation: "Вік через давальний - природна модель."
      - statement: "Я дзвоню другові."
        answer: true
        explanation: "Дзвонити керує давальним."
      - statement: "Я бачу мамі."
        answer: false
        explanation: "Бачити потребує знахідного: маму."
      - statement: "Вони заважають нам."
        answer: true
        explanation: "Заважати керує давальним."
  - id: act-6
    type: error-correction
    title: Виправ давальний
    instruction: Знайдіть і виправте помилку в кожному реченні.
    items:
      - sentence: "Я допомагаю маму."
        error: "маму"
        correction: "мамі"
        options:
          - "Я допомагаю мамі."
          - "Я допомагаю маму."
        explanation: "Після допомагати потрібен давальний."
      - sentence: "Він дякує вчителя."
        error: "вчителя"
        correction: "вчителеві"
        options:
          - "Він дякує вчителеві."
          - "Він дякує вчителя."
        explanation: "Дякувати керує давальним."
      - sentence: "Вона дзвонить подругу."
        error: "подругу"
        correction: "подрузі"
        options:
          - "Вона дзвонить подрузі."
          - "Вона дзвонить подругу."
        explanation: "Дзвонити вимагає давального."
      - sentence: "Я бачу мамі."
        error: "мамі"
        correction: "маму"
        options:
          - "Я бачу маму."
          - "Я бачу мамі."
        explanation: "Бачити керує знахідним, не давальним."
      - sentence: "Тобі подобається ці фільми."
        error: "подобається"
        correction: "подобаються"
        options:
          - "Тобі подобаються ці фільми."
          - "Тобі подобається ці фільми."
        explanation: "Підмет у множині, тому потрібне подобаються."
      - sentence: "Мені двадцять п'ять рік."
        error: "рік"
        correction: "років"
        options:
          - "Мені двадцять п'ять років."
          - "Мені двадцять п'ять рік."
        explanation: "Після п'ять і більше - років."
      - sentence: "Вони заважають нас."
        error: "нас"
        correction: "нам"
        options:
          - "Вони заважають нам."
          - "Вони заважають нас."
        explanation: "Заважати керує давальним."
      - sentence: "Я довіряю друга."
        error: "друга"
        correction: "другові"
        options:
          - "Я довіряю другові."
          - "Я довіряю друга."
        explanation: "Довіряти керує давальним."
