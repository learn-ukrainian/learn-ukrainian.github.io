workbook:
- type: true-false
  title: Кількість і форма
  instruction: Позначте, чи фраза правильна.
  items:
  - statement: багато студентів
    correct: true
    explanation: Студентів - родовий множини.
  - statement: багато студенти
    correct: false
    explanation: Потрібно багато студентів.
  - statement: немає булок
    correct: true
    explanation: Булка - булок.
  - statement: немає булки
    correct: false
    explanation: Потрібно немає булок.
  - statement: кілька днів
    correct: true
    explanation: День - днів.
  - statement: скільки квитки?
    correct: false
    explanation: Потрібно скільки квитків?
  - statement: мало питань
    correct: true
    explanation: Питання - питань.
  - statement: десять міст
    correct: true
    explanation: Місто - міст.
- type: fill-in
  title: Список покупок
  instruction: Оберіть правильну форму для списку.
  items:
  - sentence: Треба п'ять ___ води.
    answer: пляшок
    options:
    - пляшок
    - пляшки
    - пляшка
    explanation: Пляшка - пляшок.
  - sentence: Немає свіжих ___.
    answer: булок
    options:
    - булок
    - булки
    - булка
    explanation: Немає булок.
  - sentence: Купіть кілька ___ рису.
    answer: пакетів
    options:
    - пакетів
    - пакети
    - пакет
    explanation: Пакет - пакетів.
  - sentence: У нас мало ___.
    answer: яблук
    options:
    - яблук
    - яблука
    - яблуко
    explanation: Яблуко - яблук.
  - sentence: Для уроку треба десять ___.
    answer: олівців
    options:
    - олівців
    - олівці
    - олівець
    explanation: Олівець - олівців.
  - sentence: Тут багато ___.
    answer: зошитів
    options:
    - зошитів
    - зошити
    - зошит
    explanation: Зошит - зошитів.
  - sentence: У мене немає ___.
    answer: питань
    options:
    - питань
    - питання
    - питанню
    explanation: Питання - питань.
  - sentence: Скільки ___ у групі?
    answer: людей
    options:
    - людей
    - люди
    - людина
    explanation: Люди - людей.
- type: match-up
  title: Часті форми
