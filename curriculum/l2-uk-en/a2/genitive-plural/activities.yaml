inline:
- id: act-1
  type: quiz
  title: Коли родовий множини?
  instruction: Оберіть правильну форму після слова кількості.
  items:
  - question: багато ___
    options:
    - студентів
    - студенти
    - студент
    correct: 0
    explanation: Після багато потрібен родовий множини.
  - question: мало ___
    options:
    - книг
    - книги
    - книга
    correct: 0
    explanation: Мало книг - родовий множини.
  - question: скільки ___?
    options:
    - квитків
    - квитки
    - квиток
    correct: 0
    explanation: Скільки квитків? - правильна модель.
  - question: немає ___
    options:
    - булок
    - булки
    - булка
    correct: 0
    explanation: Немає булок - родовий множини.
  - question: п'ять ___
    options:
    - столів
    - столи
    - стіл
    correct: 0
    explanation: Після п'ять потрібен родовий множини.
  - question: десять ___
    options:
    - міст
    - міста
    - місто
    correct: 0
    explanation: Десять міст - родовий множини.
  - question: кілька ___
    options:
    - днів
    - дні
    - день
    correct: 0
    explanation: Кілька днів - родовий множини.
  - question: багато ___
    options:
    - питань
    - питання
    - питанню
    correct: 0
    explanation: Багато питань - часта форма.
