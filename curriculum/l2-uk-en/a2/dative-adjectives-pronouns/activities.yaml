inline:
- id: act-1
  type: match-up
  title: Називний -> давальний
  instruction: Зіставте фразу в називному з формою давального відмінка.
  pairs:
  - left: мій друг
    right: моєму другові
  - left: моя подруга
    right: моїй подрузі
  - left: наш учитель
    right: нашому вчителеві
  - left: наша вчителька
    right: нашій вчительці
  - left: цей хлопець
    right: цьому хлопцю
  - left: ця студентка
    right: цій студентці
  - left: нові студенти
    right: новим студентам
  - left: маленьке місто
    right: маленькому місту
- id: act-2
  type: fill-in
  title: Закінчення фрази
  instruction: Оберіть правильну форму прикметника або займенника.
  items:
  - sentence: "Я пишу ___ братові."
    answer: моєму
    options: [мій, мого, моєму]
    explanation: Братові - чоловічий рід у давальному, тому моєму.
  - sentence: "Ми допомагаємо ___ вчительці."
    answer: нашій
    options: [наша, нашої, нашій]
    explanation: Вчительці - жіночий рід у давальному, тому нашій.
  - sentence: "Поясніть ___ студентові правило."
    answer: цьому
    options: [цей, цього, цьому]
    explanation: Студентові - чоловічий рід у давальному, тому цьому.
  - sentence: "Я дякую ___ подрузі."
    answer: добрій
    options: [добра, доброї, добрій]
    explanation: Подрузі - жіночий рід у давальному.
  - sentence: "Ми дзвонимо ___ батькові."
    answer: вашому
    options: [ваш, вашого, вашому]
    explanation: Батькові - чоловічий рід у давальному.
  - sentence: "Я пишу ___ сестрі."
    answer: моїй
    options: [моя, моєї, моїй]
    explanation: Сестрі - жіночий рід у давальному, тому моїй.
  - sentence: "Допоможіть ___ людям."
    answer: цим
    options: [ці, цих, цим]
    explanation: Людям - множина у давальному.
  - sentence: "Ми дали назву ___ місту."
    answer: новому
    options: [нове, нового, новому]
    explanation: Місту - середній рід у давальному.
- id: act-3
  type: quiz
  title: Яка форма підходить?
  instruction: Оберіть давальну форму для повної фрази.
  items:
  - question: "мій старший брат ->"
    options:
    - моєму старшому братові
    - мого старшого брата
    - мій старший брат
    correct: 0
    explanation: "Давальний: моєму старшому братові."
  - question: "наша нова вчителька ->"
    options:
    - нашій новій вчительці
    - нашої нової вчительки
    - наша нова вчителька
    correct: 0
    explanation: "Жіночий рід у давальному: нашій новій вчительці."
  - question: "цей добрий лікар ->"
    options:
    - цьому доброму лікареві
    - цього доброго лікаря
    - цей добрий лікар
    correct: 0
    explanation: "Чоловічий рід у давальному: цьому доброму лікареві."
  - question: "нові студенти ->"
    options:
    - новим студентам
    - нових студентів
    - нові студенти
    correct: 0
    explanation: "Множина у давальному: новим студентам."
- id: act-4
  type: group-sort
  title: -ому, -ій, -им
  instruction: Розсортуйте фрази за закінченням прикметника або займенника.
  groups:
  - label: "-ому"
    items:
    - моєму другові
    - новому студентові
    - цьому місту
    - вашому колезі
  - label: "-ій"
    items:
    - моїй сестрі
    - нашій вчительці
    - цій студентці
    - добрій подрузі
  - label: "-им"
    items:
    - новим студентам
    - цим людям
    - добрим друзям
    - вашим колегам
workbook:
- type: error-correction
  title: Узгодження
  instruction: Оберіть виправлену фразу.
  items:
  - sentence: "Я пишу моїй другові."
    error: "моїй"
    correction: "Я пишу моєму другові."
    options: ["Я пишу моєму другові.", "Я пишу моїй другові."]
    explanation: Другові - чоловічий рід, тому моєму.
  - sentence: "Ми допомагаємо нашому вчительці."
    error: "нашому"
    correction: "Ми допомагаємо нашій вчительці."
    options: ["Ми допомагаємо нашій вчительці.", "Ми допомагаємо нашому вчительці."]
    explanation: Вчительці - жіночий рід, тому нашій.
  - sentence: "Поясніть цьому студентці."
    error: "цьому"
    correction: "Поясніть цій студентці."
    options: ["Поясніть цій студентці.", "Поясніть цьому студентці."]
    explanation: Студентці - жіночий рід.
  - sentence: "Я дякую новій студентам."
    error: "новій"
    correction: "Я дякую новим студентам."
    options: ["Я дякую новим студентам.", "Я дякую новій студентам."]
    explanation: Студентам - множина, тому новим.
- type: fill-in
  title: Кому подарунок?
  instruction: Доповніть речення правильною формою.
  items:
  - sentence: "Це подарунок ___ ___ братові."
    answer: "моєму старшому"
    options: ["моєму старшому", "мого старшого", "мій старший"]
    explanation: Братові потребує давального узгодження.
  - sentence: "Напишіть ___ ___ бабусі."
    answer: "нашій добрій"
    options: ["нашій добрій", "нашої доброї", "наша добра"]
    explanation: Бабусі - жіночий рід у давальному.
  - sentence: "Покажіть фото ___ ___ колегам."
    answer: "цим новим"
    options: ["цим новим", "цих нових", "ці нові"]
    explanation: Колегам - множина у давальному.
  - sentence: "Дайте назву ___ ___ кафе."
    answer: "цьому маленькому"
    options: ["цьому маленькому", "цього маленького", "це маленьке"]
    explanation: Кафе тут середнього роду в давальному контексті.
