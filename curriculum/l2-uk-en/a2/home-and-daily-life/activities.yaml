inline:
  - id: act-1
    type: quiz
    title: Де в квартирі?
    instruction: Оберіть відмінок виділеної фрази.
    items:
      - question: "У фразі 'у вітальні стоїть диван' слово вітальні - це..."
        options:
          - місцевий
          - знахідний
          - родовий
        correct: 0
        explanation: Де? - у вітальні.
      - question: "У фразі 'біля вікна є крісло' слово вікна - це..."
        options:
          - називний
          - родовий
          - орудний
        correct: 1
        explanation: Біля чого? - біля вікна.
      - question: "У фразі 'балкона немає' слово балкона - це..."
        options:
          - родовий
          - знахідний
          - місцевий
        correct: 0
        explanation: Немає чого? - балкона.
      - question: "У фразі 'поставила книжки на полицю' слово полицю - це..."
        options:
          - місцевий
          - давальний
          - знахідний
        correct: 2
        explanation: Куди? - на полицю.
      - question: "У фразі 'у спальні є ліжко' слово спальні - це..."
        options:
          - місцевий
          - родовий
          - знахідний
        correct: 0
        explanation: Де? - у спальні.
      - question: "У фразі 'частина меблів нова' слово меблів - це..."
        options:
          - називний множини
          - родовий множини
          - давальний множини
        correct: 1
        explanation: Частина чого? - меблів.
      - question: "У фразі 'стіл з дерева' слово дерева - це..."
        options:
          - родовий
          - орудний
          - місцевий
        correct: 0
        explanation: З чого? - з дерева.
      - question: "У фразі 'дві кімнати' слово кімнати - це..."
        options:
          - називний множини
          - родовий множини
          - орудний множини
        correct: 0
        explanation: Після дві тут форма кімнати.
  - id: act-2
    type: fill-in
    title: Мій ранок
    instruction: Оберіть правильну форму.
    items:
      - sentence: "Я встаю о ___."
        answer: сьомій
        options:
          - сьома
          - сьому
          - сьомій
        explanation: О котрій годині? - о сьомій.
      - sentence: "Після сніданку я йду у ___."
        answer: ванну кімнату
        options:
          - ванна кімната
          - ванну кімнату
          - ванній кімнаті
        explanation: Куди? - у ванну кімнату.
      - sentence: "Я снідаю з ___."
        answer: родиною
        options:
          - родина
          - родину
          - родиною
        explanation: З ким? - з родиною.
      - sentence: "На роботу я їду ___."
        answer: автобусом
        options:
          - автобус
          - автобуса
          - автобусом
        explanation: Чим? - автобусом.
      - sentence: "Після роботи я заходжу до ___."
        answer: магазину
        options:
          - магазин
          - магазину
          - магазином
        explanation: До чого? - до магазину.
      - sentence: "Увечері я вечеряю на ___."
        answer: кухні
        options:
          - кухня
          - кухню
          - кухні
        explanation: Де? - на кухні.
      - sentence: "Я лягаю спати перед ___."
        answer: одинадцятою
        options:
          - одинадцята
          - одинадцяту
          - одинадцятою
        explanation: Перед чим? - перед одинадцятою.
      - sentence: "У суботу я йду на ___."
        answer: ринок
        options:
          - ринок
          - ринку
          - ринком
        explanation: Куди? - на ринок.
  - id: act-3
    type: match-up
    title: У гостях
    instruction: З'єднайте фразу з питанням.
    pairs:
      - left: Ірино
        right: звертання
      - left: для вас
        right: для кого?
      - left: за стіл
        right: куди?
      - left: з цукром
        right: з чим?
      - left: чаю
        right: чого?
      - left: салатом
        right: чим?
      - left: господарям
        right: кому?
      - left: на кухні
        right: де?
  - id: act-4
    type: group-sort
    title: Де чи куди?
    instruction: Розсортуйте фрази.
    groups:
      - label: Де?
        items:
          - у вітальні
          - на кухні
          - в кабінеті
      - label: Куди?
        items:
          - у ванну кімнату
          - на роботу
          - за стіл
      - label: З ким або чим?
        items:
          - з родиною
          - з мамою
          - з цукром
workbook:
  - type: fill-in
    title: Кімнати і меблі
    instruction: Оберіть правильну форму.
    items:
      - sentence: "У ___ стоїть диван."
        answer: вітальні
        options:
          - вітальня
          - вітальню
          - вітальні
        explanation: Де? - у вітальні.
      - sentence: "Біля ___ є крісло."
        answer: вікна
        options:
          - вікно
          - вікна
          - вікном
        explanation: Біля чого? - біля вікна.
      - sentence: "У нас немає ___."
        answer: балкона
        options:
          - балкон
          - балкона
          - балконі
        explanation: Немає чого? - балкона.
      - sentence: "Я повісила картину на ___."
        answer: стіну
        options:
          - стіна
          - стіні
          - стіну
        explanation: Куди? - на стіну.
      - sentence: "На ___ висить картина."
        answer: стіні
        options:
          - стіна
          - стіні
          - стіну
        explanation: Де? - на стіні.
      - sentence: "У ___ стоїть ліжко."
        answer: спальні
        options:
          - спальня
          - спальню
          - спальні
        explanation: Де? - у спальні.
      - sentence: "Частина ___ нова."
        answer: меблів
        options:
          - меблі
          - меблів
          - меблями
        explanation: Частина чого? - меблів.
      - sentence: "Я ставлю книжки на ___."
        answer: полицю
        options:
          - полиця
          - полиці
          - полицю
        explanation: Куди? - на полицю.
  - type: error-correction
    title: Виправте домашні фрази
    instruction: Оберіть правильне речення.
    items:
      - sentence: "Я живу у нову квартиру."
        error: нову квартиру
        correction: "Я живу у новій квартирі."
        options:
          - "Я живу у новій квартирі."
          - "Я живу у нову квартиру."
        explanation: Де живу? - у новій квартирі.
      - sentence: "Після робота я йду додому."
        error: робота
        correction: "Після роботи я йду додому."
        options:
          - "Після роботи я йду додому."
          - "Після робота я йду додому."
        explanation: Після чого? - після роботи.
      - sentence: "Ми вечеряємо з друзі."
        error: друзі
        correction: "Ми вечеряємо з друзями."
        options:
          - "Ми вечеряємо з друзями."
          - "Ми вечеряємо з друзі."
        explanation: З ким? - з друзями.
      - sentence: "Сідай за столом."
        error: за столом
        correction: "Сідай за стіл."
        options:
          - "Сідай за стіл."
          - "Сідай за столом."
        explanation: Куди? - за стіл.
      - sentence: "У спальню стоїть ліжко."
        error: спальню
        correction: "У спальні стоїть ліжко."
        options:
          - "У спальні стоїть ліжко."
          - "У спальню стоїть ліжко."
        explanation: Де? - у спальні.
      - sentence: "Частина меблі нова."
        error: меблі
        correction: "Частина меблів нова."
        options:
          - "Частина меблів нова."
          - "Частина меблі нова."
        explanation: Частина чого? - меблів.
      - sentence: "Я йду у ванній кімнаті."
        error: ванній кімнаті
        correction: "Я йду у ванну кімнату."
        options:
          - "Я йду у ванну кімнату."
          - "Я йду у ванній кімнаті."
        explanation: Куди? - у ванну кімнату.
      - sentence: "Дякую господарів."
        error: господарів
        correction: "Дякую господарям."
        options:
          - "Дякую господарям."
          - "Дякую господарів."
        explanation: Дякувати кому? - господарям.
  - type: true-false
    title: Чи правильно?
    instruction: Визначте, чи правильно вжито форму.
    items:
      - statement: "На кухні стоїть стіл."
        correct: true
        explanation: Де? - на кухні.
      - statement: "Я йду на кухні."
        correct: false
        explanation: Куди? - на кухню.
      - statement: "Снідаю з родиною."
        correct: true
        explanation: З ким? - з родиною.
      - statement: "У нас немає балкон."
        correct: false
        explanation: Немає чого? - балкона.
      - statement: "У спальні стоїть ліжко."
        correct: true
        explanation: Де? - у спальні.
      - statement: "Я ставлю книжки на полиці."
        correct: false
        explanation: Куди? - на полицю.
      - statement: "Частина меблів нова."
        correct: true
        explanation: Частина чого? - меблів.
      - statement: "Дякую господарів."
        correct: false
        explanation: Дякувати кому? - господарям.
