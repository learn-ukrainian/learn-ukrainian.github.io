inline:
  - id: act-1
    type: match-up
    title: Пора року і слова
    instruction: З'єднайте пору року з типовим словом або дією.
    pairs:
      - left: "весна"
        right: "розквітають дерева"
      - left: "літо"
        right: "спекотно і сонячно"
      - left: "осінь"
        right: "жовтіє листя"
      - left: "зима"
        right: "іде сніг"
      - left: "весна"
        right: "птахи повертаються"
      - left: "літо"
        right: "люди купаються"
      - left: "осінь"
        right: "частіше дощить"
      - left: "зима"
        right: "може бути мороз"
  - id: act-2
    type: fill-in
    title: Погода і плани
    instruction: Оберіть правильне слово для речення.
    items:
      - sentence: "Якщо завтра буде ___, ми підемо в парк."
        answer: "сонячно"
        options:
          - "сонячно"
          - "сонця"
          - "сонячний"
        explanation: "Для погоди часто використовуємо прислівник: сонячно."
      - sentence: "Іде ___, тому я беру парасолю."
        answer: "дощ"
        options:
          - "дощ"
          - "дощем"
          - "дощу"
        explanation: "Іде дощ - стала погодна модель."
      - sentence: "Завтра буде ___, ніж сьогодні."
        answer: "тепліше"
        options:
          - "тепліше"
          - "теплий"
          - "найтепліший"
        explanation: "Порівняння: тепліше, ніж сьогодні."
      - sentence: "Узимку день ___, ніж улітку."
        answer: "коротший"
        options:
          - "коротший"
          - "короткий"
          - "коротко"
        explanation: "Потрібен вищий ступінь прикметника."
      - sentence: "Коли сніг ___, ми підемо гуляти."
        answer: "розтане"
        options:
          - "розтане"
          - "падав"
          - "падає"
        explanation: "Розтане показує майбутній результат."
      - sentence: "Ми залишилися вдома, бо весь день ___ сніг."
        answer: "падав"
        options:
          - "падав"
          - "розтанув"
          - "приготував"
        explanation: "Падав описує процес."
      - sentence: "Температура - п'ять градусів ___."
        answer: "тепла"
        options:
          - "тепла"
          - "теплий"
          - "теплою"
        explanation: "Градусів тепла - природна погодна фраза."
      - sentence: "Дме сильний ___."
        answer: "вітер"
        options:
          - "вітер"
          - "вітру"
          - "вітром"
        explanation: "Дме вітер - називна форма."
  - id: act-3
    type: quiz
    title: Свято і традиція
    instruction: Оберіть свято або тему, до якої найкраще пасує традиція.
    items:
      - question: "кутя і колядки"
        options:
          - "Різдво"
          - "Великдень"
          - "День Незалежності"
        correct: 0
        explanation: "Кутя і колядки пов'язані з різдвяними традиціями."
      - question: "паска і писанки"
        options:
          - "Великдень"
          - "зима"
          - "День Незалежності"
        correct: 0
        explanation: "Паска і писанки - великодні слова."
      - question: "вінки, пісні, легенда про цвіт папороті"
        options:
          - "купальські традиції"
          - "офісна подія"
          - "осінній ярмарок"
        correct: 0
        explanation: "Це фольклорний купальський контекст."
      - question: "державне свято про свободу і незалежність"
        options:
          - "День Незалежності"
          - "Різдво"
          - "Великдень"
        correct: 0
        explanation: "День Незалежності - державне свято."
      - question: "жовтіє листя і частіше дощить"
        options:
          - "осінь"
          - "весна"
          - "літо"
        correct: 0
        explanation: "Це типовий опис осені."
      - question: "дерева розквітають і птахи повертаються"
        options:
          - "весна"
          - "зима"
          - "осінь"
        correct: 0
        explanation: "Це типовий опис весни."
      - question: "мороз і сніг"
        options:
          - "зима"
          - "літо"
          - "осінь"
        correct: 0
        explanation: "Мороз і сніг пов'язані із зимою."
      - question: "спекотно, відпустка, купатися"
        options:
          - "літо"
          - "весна"
          - "зима"
        correct: 0
        explanation: "Це літній набір слів."
  - id: act-4
    type: true-false
    title: Обережно про традиції
    instruction: Позначте, чи речення звучить коректно для A2-тексту.
    items:
      - statement: "У нашій родині на Різдво готують кутю."
        answer: true
        explanation: "Фраза обмежує твердження родинним досвідом."
      - statement: "Усі українці завжди святкують однаково."
        answer: false
        explanation: "Традиції мають регіональні й родинні відмінності."
      - statement: "У багатьох родинах на Великдень фарбують або розписують яйця."
        answer: true
        explanation: "Фраза не робить абсолютного твердження про всіх."
      - statement: "Купальські традиції можуть включати вінки, пісні і легенди."
        answer: true
        explanation: "Можуть включати - обережне формулювання."
      - statement: "Зима холодніша за осінь."
        answer: true
        explanation: "Це правильна порівняльна форма."
      - statement: "Зима холодна за осінь."
        answer: false
        explanation: "Потрібно: холодніша за осінь."
      - statement: "Сніг падав цілий день - це процес."
        answer: true
        explanation: "Недоконаний вид описує процес."
      - statement: "Сніг розтанув - це процес без результату."
        answer: false
        explanation: "Розтанув показує результат."
workbook:
  - type: group-sort
    title: Сезонні групи
    instruction: Розподіліть слова за порами року.
    groups:
      - label: "весна"
        items:
          - "розквітати"
          - "птахи повертаються"
          - "стає тепліше"
          - "перші квіти"
      - label: "літо"
        items:
          - "спекотно"
          - "відпустка"
          - "купатися"
          - "довгий день"
      - label: "осінь"
        items:
          - "листя жовтіє"
          - "дощить"
          - "гриби"
          - "прохолодно"
      - label: "зима"
        items:
          - "сніг"
          - "мороз"
          - "лід"
          - "короткий день"
  - type: error-correction
    title: Виправте сезонний текст
    instruction: Оберіть кращий варіант.
    items:
      - sentence: "Літо теплий за весну."
        error: "теплий за"
        correction: "Літо тепліше за весну."
        options:
          - "Літо тепліше за весну."
          - "Літо теплий ніж весну."
        explanation: "Потрібен вищий ступінь: тепліше."
      - sentence: "Я люблю осінь тому що вона спокійна."
        error: "немає коми"
        correction: "Я люблю осінь, тому що вона спокійна."
        options:
          - "Я люблю осінь, тому що вона спокійна."
          - "Я люблю осінь тому що, вона спокійна."
        explanation: "Перед тому що ставимо кому."
      - sentence: "Усі українці святкують Купала однаково."
        error: "усі українці"
        correction: "У деяких громадах є купальські традиції."
        options:
          - "У деяких громадах є купальські традиції."
          - "Усі українці завжди святкують Купала однаково."
        explanation: "Краще уникати абсолютних тверджень."
      - sentence: "Ми готували вечерю до шостої."
        error: "готували"
        correction: "Ми приготували вечерю до шостої."
        options:
          - "Ми приготували вечерю до шостої."
          - "Ми готували вечерю до шостої."
        explanation: "До шостої підкреслює результат."
      - sentence: "Сніг розтанув цілий день."
        error: "розтанув цілий день"
        correction: "Сніг падав цілий день."
        options:
          - "Сніг падав цілий день."
          - "Сніг розтанув цілий день."
        explanation: "Цілий день потребує процесу."
      - sentence: "На Великдень ми співаємо колядки."
        error: "колядки"
        correction: "На Різдво ми співаємо колядки."
        options:
          - "На Різдво ми співаємо колядки."
          - "На Великдень ми співаємо колядки."
        explanation: "Колядки пов'язані з Різдвом."
      - sentence: "На Різдво ми фарбуємо писанки."
        error: "Різдво"
        correction: "На Великдень ми фарбуємо писанки."
        options:
          - "На Великдень ми фарбуємо писанки."
          - "На Різдво ми фарбуємо писанки."
        explanation: "Писанки пов'язані з Великоднем."
      - sentence: "Коли потеплішає я гулятиму більше."
        error: "немає коми"
        correction: "Коли потеплішає, я гулятиму більше."
        options:
          - "Коли потеплішає, я гулятиму більше."
          - "Коли, потеплішає я гулятиму більше."
        explanation: "Після підрядної частини потрібна кома."
  - type: fill-in
    title: Моя традиція
    instruction: Оберіть фразу, яка завершує короткий A2-текст.
    items:
      - sentence: "У нашій родині на Різдво ми ___."
        answer: "готуємо кутю"
        options:
          - "готуємо кутю"
          - "катаємося на лижах у липні"
        explanation: "Кутя - різдвяна обрядова страва."
      - sentence: "На Великдень багато родин ___."
        answer: "печуть паску"
        options:
          - "печуть паску"
          - "співають колядки"
        explanation: "Паска - великодній хліб."
      - sentence: "Мені подобається весна, тому що ___."
        answer: "стає тепліше"
        options:
          - "стає тепліше"
          - "найхолодніша пора"
        explanation: "Навесні стає тепліше."
      - sentence: "Якщо завтра буде дощ, я ___."
        answer: "візьму парасолю"
        options:
          - "візьму парасолю"
          - "розтану сніг"
        explanation: "Парасоля логічно пов'язана з дощем."
      - sentence: "Зима ___ за осінь."
        answer: "холодніша"
        options:
          - "холодніша"
          - "холодна"
        explanation: "Потрібна порівняльна форма."
      - sentence: "У деяких громадах на Купала ___."
        answer: "плетуть вінки"
        options:
          - "плетуть вінки"
          - "печуть паску"
        explanation: "Вінки належать до купальського контексту."
      - sentence: "День Незалежності - це ___."
        answer: "державне свято"
        options:
          - "державне свято"
          - "пора року"
        explanation: "Це свято, не сезон."
      - sentence: "Ми зібралися, щоб ___."
        answer: "побути разом"
        options:
          - "побути разом"
          - "холодніша за літо"
        explanation: "Після щоб доречна мета."
