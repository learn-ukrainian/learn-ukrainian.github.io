slug: pchilka-fables
title: Pchilka Fables
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Біографічний фон Олени Пчілки'
  words: 400
  points:
  - Ольга Косач (Олена Пчілка) як ключова інтелектуалка-націєтворець ХІХ століття.
  - 'Родинний експеримент Косачів: виховання дітей виключно українською мовою в російськомовному
    оточенні.'
  - Спростування міфу про Пчілку лише як 'матір Лесі Українки'.
- section: 'Вступ та контекст: II — Стан дитячої літератури в ХІХ столітті'
  words: 400
  points:
  - Емський указ 1876 року та заборона українського друку.
  - Відсутність україномовної дитячої книги як свідомий інструмент імперської асиміляції.
  - Заснування журналу «Молода Україна» (1908-1914) як акт культурного спротиву.
- section: 'Аналіз ключових творів: I — Педагогіка та мораль у байках'
  words: 450
  points:
  - Трансформація жанру байки для дитячої аудиторії (пом'якшення дорослого цинізму).
  - 'Акцент на позитивних якостях: емпатії, працьовитості, взаємодопомозі.'
  - Дидактизм, що уникає сухого повчання через гумор та гру.
- section: 'Аналіз ключових творів: II — Байка як етнографічне дзеркало'
  words: 450
  points:
  - Використання тваринного епосу та українського фольклору.
  - Аналіз типових сюжетів та персоніфікації (образи Журавля, Лисиці, Кота).
  - Відображення традиційного селянського побуту в алегоричній формі.
- section: 'Аналіз ключових творів: III — Інтерактивність та діалогічність'
  words: 400
  points:
  - Створення текстів для домашніх театральних постановок.
  - Діалогічна структура байок, що стимулює дітей до активної мовленнєвої гри.
  - Первинний досвід залучення дитини як співтворця сенсів.
- section: 'Стилістика та мова автора: I — Адаптація народної мови для дітей'
  words: 400
  points:
  - Використання форм дитячого фольклору (забавлянки, лічилки).
  - Майстерне використання зменшувально-пестливих суфіксів (демінутивів).
  - Ритміка та рима, адаптовані для легкого запам'ятовування.
- section: 'Стилістика та мова автора: II — Лексичне багатство тексту'
  words: 400
  points:
  - Свідоме введення синонімічних рядів для розширення словникового запасу дитини.
  - Використання рідкісних слів та народної фразеології проти примітивізації.
  - Формування мовного смаку через високоякісний літературний текст.
- section: 'Деколонізаційна перспектива: I — Виховання української суб''єктності'
  words: 400
  points:
  - Створення образу героя, який перемагає не грубою силою, а розумом.
  - Позбавлення текстів комплексу меншовартості.
  - Непряме виховання національної гідності та самоповаги змалечку.
- section: 'Деколонізаційна перспектива: II — Протистояння русифікації'
  words: 400
  points:
  - Відмова від перекладу російських класиків (Крилова).
  - Пряме звернення до європейських бродячих сюжетів (Езоп, Лафонтен) та українського
    фольклору.
  - Доведення спроможності української мови бути мовою європейської дитячої літератури.
- section: 'Підсумок та спадщина: Значення байок Олени Пчілки'
  words: 300
  points:
  - Фундаментальна роль у становленні професійної української дитячої літератури.
  - Вплив на наступні покоління авторів (Наталя Забіла, Марійка Підгірянка).
  - Значення спадщини Пчілки для сучасного осмислення процесу формування нації.
