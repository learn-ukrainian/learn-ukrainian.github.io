slug: franko-fox-mykyta
title: Franko Fox Mykyta
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Передумови створення казки'
  words: 400
  points:
  - 'Іван Франко як педагог і батько: потреба у формуванні якісної національної літератури
    для дітей.'
  - 'Історія публікації: від першого видання 1890 року до подальших доповнень 1893
    року.'
  - 'Мета автора: створення твору з ''загальнолюдським значенням'' для виховання критичного
    мислення.'
- section: 'Вступ та контекст: Європейський мандрівний сюжет'
  words: 400
  points:
  - 'Генеза сюжету: від французького середньовічного ''Роману про Ренара'' до поеми
    Й. В. Ґете ''Райнеке-лис''.'
  - 'Свідома культурна апропріація: відмова Франка від дослівного перекладу на користь
    повної українізації.'
  - Трансплантація європейських архетипів у реалії галицького суспільства кінця XIX
    століття.
- section: 'Аналіз ключових творів: Сюжетна композиція поеми'
  words: 500
  points:
  - 'Структурний поділ на 12 пісень: динаміка розгортання оповіді.'
  - Судовий процес у звіриному царстві як центральна вісь сюжету.
  - 'Ескалація конфлікту: марні спроби покарати злочинця та кульмінаційний двобій
    Лиса з Вовком.'
- section: 'Аналіз ключових творів: Соціальна сатира та алегорія'
  words: 500
  points:
  - Цар Лев та його двір як метафора бюрократичного апарату Австро-Угорської імперії.
  - Висміювання корупції, хабарництва та лицемірства судової системи (епізоди з Ведмедем
    Бабумислом та Котом Мурликою).
  - Алегорія беззахисності простого народу (Заєць, Півень) перед обличчям хижаків
    при владі.
- section: 'Аналіз ключових творів: Психологія Лиса як антигероя'
  words: 400
  points:
  - 'Амбівалентність образу Лиса Микити: злочинець, шахрай, але водночас інтелектуал.'
  - Протиставлення розуму Лиса грубій силі Вовка Неситого та тупості Ведмедя.
  - 'Моральна дилема дитячої літератури: чому читач неминуче симпатизує хитрому правопорушнику.'
- section: 'Стилістика та мова автора: Фразеологія та гумор'
  words: 400
  points:
  - 'Багатство мовної палітри: майстерне використання галицьких діалектизмів та живої
    розмовної мови.'
  - Приказки, прислів'я та соковиті прокльони як засіб характеротворення персонажів.
  - Комізм ситуацій і гумор як головний інструмент деконструкції суспільного пафосу.
- section: 'Стилістика та мова автора: Віршований розмір'
  words: 400
  points:
  - 'Специфіка Франкової строфіки в дитячій літературі: легкість та запам''ятовуваність.'
  - Ритміка поеми як рушій динаміки оповіді.
  - Зв'язок поетичної форми з традиціями українського усного фольклору.
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 300
  points:
  - Спростування радянського трактування поеми виключно як ілюстрації 'класової боротьби'.
  - Відновлення розуміння твору як складної соціально-філософської епопеї про людську
    природу.
  - Повернення Франку статусу європейського інтелектуала, а не лише 'революціонера-демократа'.
- section: 'Деколонізаційна перспектива: Українська суб''єктність'
  words: 300
  points:
  - Пряма інтеграція в європейський літературний простір, оминаючи імперські центри
    Росії чи Польщі.
  - Формування модерної нації через якісну, національно орієнтовану літературу для
    дітей.
  - Суб'єктність української мови, яка виявилася здатною адекватно передати складний
    європейський епос.
- section: 'Підсумок та спадщина: Рецепція твору'
  words: 400
  points:
  - Значення 'Лиса Микити' як еталонного твору класичної української дитячої літератури.
  - Вплив твору на ілюстраторське мистецтво (зокрема, роботи Едварда Козака) та масову
    культуру.
  - 'Актуалізація спадщини у XXI столітті: створення українського 3D анімаційного
    серіалу (2007) та неперервний інтерес сучасного читача.'
