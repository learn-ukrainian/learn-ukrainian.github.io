slug: zavadovych-adventures
title: Zavadovych Adventures
word_target: 4000
content_outline:
- section: 'Вступ: Життєвий шлях Романа Завадовича'
  words: 400
  points:
  - 'Біографічна канва: від Тернопільщини та підпільного університету до США'
  - Травматичний досвід війни та еміграції, трансформований у творчість
  - Рання педагогічна та редакторська діяльність (журнали «Світ дитини», «Дзвіночок»)
- section: 'Контекст: Еміграція та місія дитячої літератури'
  words: 400
  points:
  - Загроза асиміляції дітей у діаспорі та завдання українського письменника
  - Зв'язок із Пластом та виховання через пригодницьку літературу
  - Роль дитячої книги як фундаменту національного світогляду на чужині
- section: 'Аналіз творів: I — «Пригоди Гноміка Романтика»'
  words: 500
  points:
  - 'Жанрова специфіка: літературна казка з виразним етичним стрижнем'
  - 'Архетип Гноміка: винахідливість, емпатія, протидія злу без агресії'
  - 'Сюжетна структура: подорож-випробування та ініціація'
- section: 'Аналіз творів: II — «Хлопці з Зеленого Бору»'
  words: 500
  points:
  - Скаутський та пластовий ідеали у пригодницькій повісті
  - Природа як простір виховання характеру та братерства
  - Психологізм підліткового віку та подолання внутрішніх конфліктів
- section: 'Аналіз творів: III — Журнал «Веселка» та мала проза'
  words: 400
  points:
  - Завадович як ключовий автор американського журналу «Веселка» (1954–1985)
  - Багатогранність псевдонімів (Роляль, Фортунат) та жанрове розмаїття
  - 'Вірші, байки, п''єси: дидактизм без нав''язливого моралізаторства'
- section: 'Стилістика: Фольклорні мотиви та міфологізм'
  words: 400
  points:
  - Трансформація народної демонології у дитячих текстах
  - Міфологічний простір як спосіб зв'язку з втраченою батьківщиною
  - Ритміка та музичність текстів, орієнтація на усне сприйняття
- section: 'Мова автора: Збереження питомої української лексики'
  words: 400
  points:
  - 'Мовна політика Завадовича: захист від русизмів та англіцизмів'
  - Галицька лексика та діалектизми як естетична цінність текстів
  - Лексичне багатство як інструмент формування мислення юного читача
- section: 'Деколонізація: I — Руйнування міфів про радянське дитинство'
  words: 300
  points:
  - Контраст із жорсткою ідеологізацією та мілітаризацією літератури УРСР
  - Відсутність культу вождя, класової ненависті та марксистських штампів
  - Свобода уяви замість партійного контролю
- section: 'Деколонізація: II — Українська суб''єктність та ідентичність'
  words: 300
  points:
  - Герої як активні суб'єкти власного життя, а не пасивні жертви
  - Плекання національної гордості через ігрові та пригодницькі форми
  - Конструювання образу України як духовного центру
- section: 'Підсумок: Вплив на формування діаспори'
  words: 200
  points:
  - Роль творів у вихованні повоєнного покоління американських та канадських українців
  - Феномен популярності Завадовича серед читачів кількох десятиліть
- section: 'Спадщина: Повернення в сучасну Україну'
  words: 200
  points:
  - Повернення текстів до українського читача після 1991 року
  - Актуальність педагогічних та естетичних підходів Завадовича сьогодні
