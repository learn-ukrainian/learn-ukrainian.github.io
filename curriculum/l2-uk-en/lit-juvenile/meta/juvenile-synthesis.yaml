slug: juvenile-synthesis
title: 'Синтез: Формування майбутнього'
word_target: 4000
content_outline:
- section: 'Діахронний аналіз: І — Еволюція ідей та архетипів'
  words: 400
  points:
  - 'Від фольклорних витоків до модерну: як давні архетипи (Котигорошко, козак-характерник)
    адаптуються в сучасній юнацькій прозі.'
  - Простеження трансформації концепту 'героїзму' від класичної казки до роману виховання.
- section: 'Діахронний аналіз: ІІ — Діалог авторів і поколінь'
  words: 400
  points:
  - 'Інтертекстуальний зв''язок: як сучасні письменники (В. Рутківський, З. Мензатюк)
    переосмислюють ідеї І. Франка та Лесі Українки.'
  - Тяглість літературної традиції та збереження національного морального імперативу
    крізь століття.
- section: 'Деколонізаційна оптика: І — Стратегії інтелектуального опору'
  words: 400
  points:
  - 'Спротив в епоху бездержавності: використання ''езопівської мови'' та історичної
    метафори в радянський період.'
  - Література як сховище національного коду під час масової русифікації освіти.
- section: 'Деколонізаційна оптика: ІІ — Деконструкція імперського наративу'
  words: 400
  points:
  - Системне спростування міфу про 'провінційність' та фольклорну обмеженість української
    юнацької літератури.
  - Відмова від російськоцентричних сюжетних моделей та утвердження власної, україноцентричної
    картини світу.
- section: 'Стилістичний калейдоскоп: І — Авторські техніки та експерименти'
  words: 400
  points:
  - 'Еволюція жанрової палітри: від прямого дидактизму до магічного реалізму, стімпанку
    та психологічного фентезі.'
  - Новаторські форми розповіді у сучасній українській YA-літературі (поліфонія, ненадійний
    оповідач).
- section: 'Стилістичний калейдоскоп: ІІ — Трансформація літературної мови'
  words: 400
  points:
  - 'Мовна емансипація: використання сучасного урбаністичного сленгу та діалектів
    для створення автентичного голосу підлітка.'
  - Стилістичні інновації як інструмент подолання постколоніальної мовної травми юного
    читача.
- section: 'Філософія ідентичності: І — Конструювання українського суб''єкта'
  words: 400
  points:
  - Поява самостійного, вільного суб'єкта дії замість образу 'молодшого брата'.
  - Тема особистої відповідальності юного героя за долю своєї спільноти, особливо
    в контексті війни після 2014 року.
- section: 'Філософія ідентичності: ІІ — Формування національної етики'
  words: 400
  points:
  - 'Література як простір виховання ціннісних орієнтирів: свобода, гідність, емпатія
    та нетерпимість до тоталітаризму.'
  - Моральний вибір у кризових ситуаціях як ключовий елемент українського роману виховання.
- section: 'Спадщина та горизонти майбутнього: І — Вплив на сучасний процес'
  words: 400
  points:
  - Інтеграція української дитячої та юнацької книжки у європейський літературний
    контекст.
  - 'Успіхи сучасних авторів та переклади: світове визнання українського досвіду та
    голосу.'
- section: 'Спадщина та горизонти майбутнього: ІІ — Канон та інтелектуальна безпека'
  words: 400
  points:
  - Значення формування сучасного 'золотого канону' дитячого читання.
  - Юнацька література як фундамент когнітивної та інформаційної безпеки майбутніх
    поколінь.
