slug: vynnychuk-lviv-tales
title: Vynnychuk Lviv Tales
word_target: 4000
content_outline:
- section: 'Вступ: Міфотворення Юрія Винничука'
  words: 350
  points:
  - Юрій Винничук як ключовий конструктор 'львівського тексту' в сучасній українській
    літературі
  - Поняття міського міфу та його значення для дитячої і юнацької аудиторії
  - Роль автора в трансформації фольклорного матеріалу на масштабний літературний
    феномен
- section: 'Контекст: Львів як літературний простір'
  words: 350
  points:
  - 'Історичне тло: від радянського підпілля 1970-х до відродження міської культури
    у 1990-х'
  - Львів як специфічне культурне перехрестя та мультикультурний поліс
  - Простір міста як самостійний повноцінний персонаж у текстах автора
- section: 'Аналіз ключових творів: «Місце для Дракона»'
  words: 500
  points:
  - Деконструкція класичного жанрового архетипу лицаря і дракона
  - 'Філософський підтекст казки: проблема добра, зла, влади та конформізму'
  - Моральні дилеми для юного читача та глибинний виховний потенціал тексту
- section: 'Аналіз ключових творів: «Легенди Львова» та міська топографія'
  words: 450
  points:
  - Використання реальних львівських топонімів як казкових локацій (ратуша, комини,
    вулички)
  - Сакралізація міського простору через призму магічного реалізму
  - Органічна взаємодія задокументованого історичного факту та авторської вигадки
- section: 'Аналіз ключових творів: «Львівські казки» для дітей і дорослих'
  words: 450
  points:
  - 'Дворівнева (подвійна) рецепція текстів: пригодницький сюжет для дітей та іронічний
    підтекст для дорослих'
  - Особливості дитячого сприйняття специфічної міської міфології
  - Постмодерна гра з читачем, інтертекстуальність та алюзії
- section: 'Стилістика та мова: Галицький субстандарт (ґвара)'
  words: 450
  points:
  - Використання львівської ґвари як потужного маркера культурної ідентичності та
    автентичності
  - 'Лексичний аналіз: художня роль діалектизмів, полонізмів та австріцизмів у створенні
    колориту'
  - Мова як захисний механізм проти асиміляції, русифікації та радянського мовного
    уніформізму
- section: 'Стилістика та мова: Іронія, гумор і карнавальність'
  words: 400
  points:
  - Бахтінська карнавальність та сміхова культура у текстах Юрія Винничука
  - Гумор як терапевтичний інструмент подолання колективних травм та дитячих страхів
  - Специфіка галицької іронії та батярського гумору в літературі для підлітків
- section: 'Деколонізаційна перспектива: Деконструкція радянських міфів'
  words: 400
  points:
  - Спростування радянського імперського міфу про однорідне 'соціалістичне' місто
  - Повернення викреслених сторінок історії та реабілітація міського фольклору (батяри,
    кнайпи)
  - Десовєтизація суспільної свідомості через інструментарій міської казки
- section: 'Деколонізаційна перспектива: Українська суб''єктність'
  words: 400
  points:
  - Спростування старого імперського стереотипу про українську літературу як виключно
    селянську (рустикальну)
  - 'Ствердження права української культури на власне місто: Львів як питомо український
    європейський урбаністичний центр'
  - Зв'язок текстів із європейською традицією міської казки (на рівні з Е. Т. А. Гофманом
    чи Г. К. Андерсеном)
- section: 'Підсумок та спадщина: Вплив на сучасну літературу'
  words: 250
  points:
  - Як Винничук докорінно змінив парадигму української юнацької літератури
  - Створення еталонного зразка для цілої плеяди нових авторів українського урбаністичного
    фентезі
  - Сучасне значення спадщини автора для формування національної ідентичності нових
    поколінь
