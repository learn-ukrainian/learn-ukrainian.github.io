slug: kids-folklore
title: Kids Folklore
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Походження дитячого фольклору'
  words: 400
  points:
  - Визначення та межі українського дитячого фольклору
  - Походження дитячих жанрів з давніх магічних обрядів дорослих (замовляння, табуйована
    лічба)
  - Специфіка функціонування фольклору в дитячому середовищі
- section: 'Вступ та контекст: II — Класифікація та періодизація'
  words: 400
  points:
  - Поділ на фольклор дорослих для дітей та власне дитячу творчість
  - Твори загального фольклору, що перейшли в дитячий репертуар
  - Історія збирання та дослідження (від М. Максимовича до Г. Довженок)
- section: 'Аналіз ключових творів: I — Поезія плекання'
  words: 500
  points:
  - 'Колискові пісні: ритміка, захисна функція та образна система'
  - Міфологеми Сну і Дрімоти, містична роль Кота як провідника
  - Забавлянки та чукікалки як засіб психофізіологічного розвитку немовляти
- section: 'Аналіз ключових творів: II — Фольклор дитячого гурту'
  words: 500
  points:
  - 'Лічилки та жеребкування: ритмічна організація гри та заумна мова (тарабарщина)'
  - 'Мирилки: соціальна регуляція та безконфліктне розв''язання суперечок'
  - 'Дражнилки: від давньої апотропеїчної (захисної) функції до сучасної ігрової агресії'
- section: 'Аналіз ключових творів: III — Вербальний фольклор та пізнання світу'
  words: 400
  points:
  - Загадки як інструмент розвитку метафоричного мислення та ініціації
  - 'Скоромовки: фонетичне тренування та артикуляція'
  - Заклички до сил природи як релікти дохристиянської аграрної магії
- section: 'Стилістика та мова автора: I — Ритміка і фонетика'
  words: 400
  points:
  - Звуконаслідування (ономатопея) та інструментування (алітерація, асонанс)
  - Домінування двоскладових розмірів (хорей) як відлуння фізіологічних ритмів
  - Динаміка і музичність дитячого фольклорного тексту
- section: 'Стилістика та мова автора: II — Образна система та художні засоби'
  words: 400
  points:
  - Персоніфікація природи та використання звірів-помічників
  - Функціональне використання демінутивів (зменшувально-пестливих суфіксів)
  - Створення відчуття безпеки та гармонії через мовні засоби
- section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
  words: 400
  points:
  - Спростування концепції 'єдиного колискового простору' східних слов'ян
  - 'Відмінність української педагогіки: ліризм та відсутність залякування (''серенького
    волчка'')'
  - Українська колискова як простір любові та гармонії, а не страху
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність'
  words: 300
  points:
  - Материнський фольклор як головний антидот проти імперського лінгвоциду
  - Провал радянської інженерії 'пролетарського' дитячого фольклору (піонерські лічилки)
  - Збереження національної ідентичності через неформальні дитячі тексти
- section: 'Підсумок та спадщина: Актуалізація в сучасній літературі'
  words: 300
  points:
  - Вплив фольклору на класиків української дитячої літератури (В. Нестайко, І. Малкович)
  - Трансформація традиції у сучасний міський та шкільний дитячий фольклор
  - Безперервність фольклорного процесу в епоху інтернету
