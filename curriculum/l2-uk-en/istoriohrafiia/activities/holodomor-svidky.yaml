- type: reading
  id: reading-svidky
  title: "Свідчення з 'Народної Книги-Меморіал'"
  source: "Зі спогадів очевидців Голодомору 1932-1933 років"
  text: |
    "Прийшли активісти, з ними наш сусід Петро. Він знав, де батько сховав вузлик квасолі — у димарі. Поліз туди, дістав. Мама плакала, просила: 'Петре, ти ж знаєш, у мене троє малих'. А він тільки відштовхнув її і сказав: 'Не скигли, куркулька, державі треба'. Потім вони пішли, а мама впала на долівку і завила, як вовчиця.
    
    Ми їли все, що бачили. Лободу, кропиву, цвіт акації. Мама пекла млинці з гнилої картоплі, яку ми викопували навесні на колгоспному полі. Вони були чорні, як земля, і гіркі, але ми їх їли і просили ще. А сусідський хлопчик помер, бо наївся сирого зерна, яке знайшов у мишачій норі. Його животик роздувся, і він кричав від болю, поки не затих."
  instruction: "Прочитайте уривок зі спогадів очевидця та підготуйтеся до виконання завдань на аналіз тексту."

- type: quiz
  title: "Перевірка розуміння модуля"
  instruction: "Оберіть правильну відповідь на запитання щодо змісту модуля."
  items:
    - question: "Чому усна історія стала критично важливим джерелом для вивчення Голодомору?"
      options:
        - text: "Тому що письмові джерела були втрачені під час війни."
          correct: false
        - text: "Тому що офіційні архіви були сфальсифіковані або знищені, і лише пам'ять людей зберегла правду."
          correct: true
        - text: "Тому що історики вважали усні свідчення більш цікавими, ніж документи."
          correct: false
        - text: "Тому що в СРСР не вели жодної статистики смертності."
          correct: false
      explanation: "Офіційні документи приховували правду про голод, тому спогади свідків стали єдиним альтернативним джерелом інформації."
    - question: "Яку роль відіграли 'буксирні бригади' у механізмі Голодомору?"
      options:
        - text: "Вони допомагали селянам збирати врожай."
          correct: false
        - text: "Вони займалися ремонтом сільськогосподарської техніки."
          correct: false
        - text: "Вони проводили тотальну конфіскацію всіх їстівних запасів у селянських господарствах."
          correct: true
        - text: "Вони організовували евакуацію населення до міст."
          correct: false
      explanation: "'Буксирні бригади' (активісти) ходили по хатах і забирали все їстівне, прирікаючи людей на смерть."
    - question: "Що таке 'трансгенераційна травма' у контексті Голодомору?"
      options:
        - text: "Фізичні хвороби, що передаються спадково через голодування предків."
          correct: false
        - text: "Психологічні моделі поведінки (страх голоду, запасання), що передаються нащадкам від тих, хто вижив."
          correct: true
        - text: "Неможливість забути конкретні дати історичних подій."
          correct: false
        - text: "Обов'язок кожного покоління вивчати історію в школі."
          correct: false
      explanation: "Травма передається через виховання та моделі поведінки, такі як страх голоду або недовіра до влади."
    - question: "Який інструмент став символом тошуку прихованого зерна?"
      options:
        - text: "Лопата."
          correct: false
        - text: "Металевий щуп."
          correct: true
        - text: "Граблі."
          correct: false
        - text: "Серп."
          correct: false
      explanation: "Металеві щупи використовувалися для проколювання землі та стін у пошуках схованок."
    - question: "Яка мережа магазинів обмінювала продукти на золото під час голоду?"
      options:
        - text: "Торгсін."
          correct: true
        - text: "Сільпо."
          correct: false
        - text: "Коопспілка."
          correct: false
        - text: "Універмаг."
          correct: false
      explanation: "Магазини 'Торгсін' (Торгівля з іноземцями) вилучали коштовності у населення в обмін на їжу."

- type: true-false
  title: "Правда чи вигадка"
  instruction: "Визначте, чи є твердження правдивим (True) або хибним (False) на основі тексту модуля."
  items:
    - statement: "Радянська влада заохочувала збір спогадів про голод 1932-1933 років."
      correct: false
      explanation: "Тема була під суворою забороною, і згадка про неї каралася як антирадянська агітація."
    - statement: "Усна історія (oral history) спирається виключно на офіційні державні документи."
      correct: false
      explanation: "Усна історія базується на записаних інтерв'ю зі свідками подій."
    - statement: "Джеймс Мейс був одним із перших дослідників, хто почав системно збирати свідчення про Голодомор."
      correct: true
    - statement: "Металеві щупи використовувалися 'активістами' для перевірки якості зерна."
      correct: false
      explanation: "Щупи використовувалися для пошуку прихованого зерна у землі, стінах та соломі."
    - statement: "У 1933 році селяни часто вживали в їжу сурогати, такі як лобода та кора дерев."
      correct: true
    - statement: "Магазини 'Торгсін' обмінювали продукти на радянські рублі за низькими цінами."
      correct: false
      explanation: "'Торгсіни' обмінювали продукти лише на золото, срібло та валюту."
    - statement: "Канібалізм під час Голодомору був поширеним явищем, про яке свідки говорять охоче і без осуду."
      correct: false
      explanation: "Це табуйована тема, про яку говорять з жахом і трагізмом."
    - statement: "Діти, що пережили Голодомор, часто мають яскраві сенсорні спогади про запахи та звуки того часу."
      correct: true
    - statement: "Радянська школа допомагала дітям пережити травму голоду, надаючи психологічну підтримку."
      correct: false
      explanation: "Школа була місцем ідеологічного тиску і когнітивного дисонансу."
    - statement: "Згідно з усними свідченнями, 'активісти' забирали у селян лише зерно, залишаючи овочі."
      correct: false
      explanation: "Конфіскація була тотальною: забирали картоплю, квасолю, сушню і навіть готову їжу."
    - statement: "Закон України про Голодомор 1932-1933 років був прийнятий у 1991 році."
      correct: false
      explanation: "Закон був прийнятий у 2006 році."
    - statement: "Усні свідчення стали важливою частиною доказової бази у судовому процесі над організаторами геноциду."
      correct: true

- type: critical-analysis
  title: "Аналіз свідчення"
  source_reading: reading-svidky
  instruction: "Проаналізуйте наведений уривок зі свідчення та дайте відповідь на запитання."
  target_text: "Прийшли активісти, з ними наш сусід Петро. Він знав, де батько сховав вузлик квасолі — у димарі. Поліз туди, дістав. Мама плакала... А він тільки відштовхнув її і сказав: 'Не скигли, куркулька, державі треба'."
  questions:
    - "Які риси поведінки 'активіста' демонструє цей уривок? Чи можна вважати його дії лише виконанням наказу?"
    - "Як цей епізод ілюструє руйнування соціальних зв'язків у селі (сусід проти сусіда)?"
    - "Яку роль відіграє деталь про 'вузлик квасолі' для розуміння масштабів конфіскації?"

- type: essay-response
  title: "Есе-рефлексія"
  source_reading: reading-svidky
  instruction: "Напишіть коротке есе на тему:"
  prompt: "Як концепція 'постпам'яті' пояснює вплив Голодомору на сучасне українське суспільство? Чи помічали ви прояви 'трансгенераційної травми' у своєму оточенні або в культурі? Використовуйте терміни 'синдром вцілілого' та 'колективна пам'ять'."
  min_words: 500

- type: comparative-study
  title: "Порівняльний аналіз наративів"
  source_reading: reading-svidky
  instruction: "Порівняйте два підходи до збереження пам'яті про травматичні події."
  items_to_compare:
    - "Офіційний радянський наратив ('Змова мовчання')"
    - "Народна пам'ять (Усна історія)"
  criteria:
    - "Мета (приховати vs зберегти)"
    - "Інструменти (цензура/репресії vs передача з покоління в покоління)"
    - "Вплив на ідентичність (формування 'радянської людини' vs збереження української ідентичності)"
  prompt: "Порівняйте стратегії пам'яті та забуття на прикладі Голодомору."
