slug: beresteyska-uniia-analiz
title: 'Берестейська унія: Глибокий аналіз'
word_target: 5000
content_outline:
- section: 'Вступ: Розкол, що визначив історію'
  words: 600
  points:
  - '1596 рік як точка біфуркації української історії: два собори в одному місті'
  - 'Суть конфлікту: не лише догматика, а й геополітика та ідентичність'
  - 'Миттєві наслідки: поділ народу на ''Русь уніатську'' та ''Русь православну'''
  - 'Структура модуля: від причин кризи до історичної пам''яті'
- section: 'Контекст: Чому унія стала можливою'
  words: 800
  points:
  - 'Глибока криза Київської митрополії: ''безпастирство'', симонія та право патронату'
  - 'Роль братств: миряни контролюють єпископів (конфлікт ієрархії та демократії)'
  - 'Культурний виклик Заходу: єзуїтська освіта vs православна стагнація'
  - 'Політичні мотиви владицтва: бажання рівності з латинським єпископатом (місця
    в Сенаті)'
  - Флорентійська унія 1439 року як історичний прецедент
- section: 'Документ епохи: Що підписали в Бересті'
  words: 900
  points:
  - 'Таємні переговори 1590–1595 років: ''декларація чотирьох'''
  - Місія Потія та Терлецького до Риму та булла Климента VIII
  - '''33 артикули'': аналіз умов (збереження обряду, календаря, одруженого священства)'
  - 'Догматичні поступки: визнання Filioque, чистилища та примату Папи'
  - 'Юридичний статус: унія як державний акт Речі Посполитої'
- section: 'Суспільний розлам: Хто підтримав, хто відкинув'
  words: 900
  points:
  - 'Табір прихильників: єпископат (Рагоза, Потій), король, частина магнатів'
  - 'Опозиція: князь Василь-Костянтин Острозький (''некоронований король Русі'')'
  - 'Роль козацтва та братств: силовий та інтелектуальний спротив'
  - 'Полемічна література: ''Тренос'' Смотрицького та послання Вишенського'
  - 'Соціальний вимір: унія як ''віра панів'' vs православ''я як ''віра народу'' (спрощення
    чи реальність?)'
- section: 'Наслідки: Століття боротьби та реформ'
  words: 800
  points:
  - Період нелегітимності православ'я (1596–1620/1632)
  - 'Відновлення ієрархії 1620 року: роль Сагайдачного та патріарха Феофана'
  - 'Вбивство Йосафата Кунцевича (1623): апогей релігійної ненависті'
  - 'Могилянська реформа: православний ренесанс як відповідь на виклик унії'
  - '''Пункти заспокоєння'' 1632 року: юридичне визнання двоконфесійності Русі'
- section: 'Історична пам''ять: Від ''зради'' до національної церкви'
  words: 500
  points:
  - 'Російсько-радянський наратив: ''зрада батьківської віри'', ''інструмент поневолення'''
  - 'Польський наратив: ''місток до цивілізації'', ''повернення заблудлих'''
  - 'Українська метаморфоза: як УГКЦ стала опорою національної ідентичності в Галичині
    (XIX-XX ст.)'
  - Ліквідація 1946 року та підпілля ('катакомбна церква')
  - 'Сучасний погляд: екуменізм та визнання ран, завданих розколом'
- section: 'Підсумок: Єдність у різноманітті?'
  words: 500
  points:
  - Берестейська унія як спроба модернізації, що призвела до конфлікту
  - 'Формування двох моделей українства: східної (православної) та західної (греко-католицької)'
  - 'Урок історії: неможливість нав''язування єдності ''згори'' без консенсусу ''знизу'''
  - Спадщина унії в сучасній релігійній мапі України
