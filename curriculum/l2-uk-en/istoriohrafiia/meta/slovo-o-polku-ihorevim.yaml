slug: slovo-o-polku-ihorevim
title: 'Слово о полку Ігоревім: Автентичність і значення'
word_target: 5000
content_outline:
- section: 'Вступ: Найзагадковіша пам''ятка'
  words: 600
  points:
  - 'Унікальність ''Слова'' у літературі XII століття: жанровий синкретизм та епічний
    розмах.'
  - 'Відкриття рукопису (початок 1790-х): роль Олексія Мусіна-Пушкіна та культурний
    контекст романтизму.'
  - 'Чому ''Слово'' вважають шедевром: поетична мова, ритміка та глибина образів.'
  - 'Проблема єдиного списку: як відсутність інших копій ускладнює дослідження.'
- section: 'Історія рукопису: Знахідка і втрата'
  words: 600
  points:
  - 'Походження збірника: Спасо-Ярославський монастир та архімандрит Іоїл Биковський.'
  - 'Хронологія публікацій: Катерининська копія (1795) та першодрук (1800).'
  - 'Трагедія 1812 року: пожежа Москви та загибель оригінального рукопису.'
  - 'Що залишилося науці: порівняльний аналіз друкованого видання та копії.'
- section: 'Дебати про автентичність: Скептики vs Наука'
  words: 800
  points:
  - 'Історія сумнівів: від перших критиків XIX ст. до школи скептиків XX ст.'
  - 'Аргументи Андре Мазона (1940): теорія наслідування ''Задонщини'' та французький
    скептицизм.'
  - 'Гіпотеза Олександра Зіміна (1960-ті): пошук автора у XVIII столітті (Іоїл Биковський).'
  - 'Наукове спростування: лінгвістичні докази (гапакси, граматика XII ст.) та археологія.'
  - 'Сучасний консенсус: пріоритет ''Слова'' над ''Задонщиною'' та доведення автентичності.'
- section: 'Зміст і структура: Від походу до ідеї'
  words: 800
  points:
  - 'Історичне тло: похід Ігоря Святославича 1185 року проти половців.'
  - 'Композиція твору: вступ, виступ у похід, поразка, ''Золоте слово'' Святослава,
    плач, втеча.'
  - 'Образна система: затемнення сонця як лихе знамення та символіка природи.'
  - '''Золоте слово'' Святослава: ідейний центр поеми та заклик до єднання князів.'
- section: 'Фрагмент: Плач Ярославни'
  words: 800
  points:
  - 'Постать Ярославни: історичний прототип та літературний образ жінки-берегині.'
  - 'Поетика плачу: ритмічна структура та фольклорні корені голосінь.'
  - 'Язичницький космос: звернення до Вітру, Дніпра-Славутича та Сонця.'
  - 'Символізм: сила любові, що долає простір і рятує князя.'
- section: Слово як історичне джерело
  words: 800
  points:
  - 'Відображення феодальної роздробленості: егоїзм князів vs інтереси Руської землі.'
  - 'Етнографічні деталі: опис озброєння (''шлеми латинські''), побуту та половців.'
  - 'Географія твору: топоніми (Тмуторокань, Корсунь, Сула) як ментальна мапа автора.'
  - 'Літературна vs історична правда: де автор відступає від фактів заради ідеї.'
- section: 'Підсумок: Національний символ'
  words: 600
  points:
  - 'Значення для української культури: ''Слово'' як доказ давності літературної традиції.'
  - 'Деколонізаційний аспект: повернення пам''ятки в контекст української історії
    та мови.'
  - 'Універсальність послання: актуальність заклику до єднання перед зовнішньою загрозою.'
