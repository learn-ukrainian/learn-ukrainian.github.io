slug: lysty-stusa
title: Листи Василя Стуса з таборів
word_target: 5000
content_outline:
- section: Вступ — Голос із ГУЛАГу
  words: 500
  points:
  - Листи як унікальний жанр табірної літератури та єдиний спосіб інтелектуального
    виживання.
  - 'Василь Стус: трансформація з поета-лірика в поета-трибуна і правозахисника.'
  - 'Специфіка джерела: листи писалися під пильним оком цензури та КДБ.'
  - 'Історична вага епістолярію: документ епохи тоталітаризму та свідчення незламності
    духу.'
- section: Біографічний контекст
  words: 700
  points:
  - 'Формування світогляду: від аспірантури Інституту літератури до акції протесту
    1965 року.'
  - 'Перший арешт (1972): вирок за «антирадянську агітацію», мордовські табори та
    заслання на Колиму.'
  - Коротке повернення до Києва (1979) та вступ до Української Гельсінської групи.
  - 'Другий арешт (1980): статус «особливо небезпечного рецидивіста» та етап у Пермські
    табори.'
  - 'Трагічна загибель 4 вересня 1985 року в карцері табору Кучино: версії та факти.'
- section: Табір як контекст
  words: 800
  points:
  - 'Географія ГУЛАГу 1970-80-х: від Мордовії до «смертних» таборів Пермської області
    (Кучино).'
  - 'Побут політв''язня: карцери, примусова праця, голодні пайки, відсутність медичної
    допомоги.'
  - 'Система ізоляції: конфіскація рукописів («Птах душі»), заборона творчості, перехоплення
    кореспонденції.'
  - 'Феномен «Малої зони» (табір) та «Великої зони» (СРСР): тоталітаризм як всеохопна
    система.'
- section: Листи до родини
  words: 1000
  points:
  - 'Адресати листів: дружина Валентина Попелюх, син Дмитро, друзі та колеги.'
  - 'Педагогіка на відстані: листи до сина як програма виховання «справжньої людини».'
  - 'Концепція «самонародження»: людина як обов''язок, метафора «ліплення себе з глини».'
  - 'Емоційна складова: туга за домом, збереження родинного зв''язку через слово,
    спроби втішити рідних.'
  - 'Особисте крізь призму політичного: неможливість відокремити батька від борця.'
- section: Філософські роздуми
  words: 1000
  points:
  - 'Екзистенціалізм Стуса: ідея «стояння» та збереження вертикальної постави духу.'
  - '«Самособоюнаповнення»: внутрішня свобода як відповідь на зовнішню несвободу.'
  - 'Роздуми про Україну: біль за русифікацію, втрату історичної пам''яті та національної
    гідності.'
  - 'Ставлення до смерті: стоїчне прийняття долі та готовність до самопожертви заради
    істини.'
- section: Критика джерела
  words: 500
  points:
  - 'Цензурні лакуни: що вирізав цензор і про що Стус мовчав свідомо (самоцензура).'
  - 'Езопова мова та алегорії: як читати «між рядками» та розшифровувати приховані
    сенси.'
  - 'Порівняльний аналіз: стриманість листів проти емоційного вибуху поезії («Палімпсести»).'
  - 'Суб''єктивність автора: ідеалізм Стуса та його безкомпромісність у оцінках дійсності.'
- section: Підсумок
  words: 500
  points:
  - 'Листи як духовний заповіт нації: уроки гідності для сучасних поколінь.'
  - 'Стус як символ опору: перемога духу над фізичним знищенням.'
  - 'Актуальність у контексті сучасної війни: боротьба за ідентичність триває.'
