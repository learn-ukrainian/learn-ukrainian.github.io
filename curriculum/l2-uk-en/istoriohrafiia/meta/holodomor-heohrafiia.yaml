slug: holodomor-heohrafiia
title: 'Географія Голодомору: Регіональні відмінності'
word_target: 5000
content_outline:
- section: 'Вступ — Голодомор на карті: Нерівномірність трагедії'
  words: 600
  points:
  - 'Картографія смерті: чому Голодомор не був ''суцільною плямою'' на карті, а мав
    чіткі епіцентри.'
  - 'Кореляція між родючістю земель та рівнем смертності: парадокс ''смерті від голоду
    на чорноземах''.'
  - 'Значення географічного аналізу для розуміння геноцидної природи: вибірковість
    удару.'
  - 'Структура модуля: від регіонального огляду до аналізу причин та наслідків.'
- section: 'Найбільш постраждалі регіони: Епіцентр катастрофи'
  words: 1000
  points:
  - 'Київщина та Харківщина (в кордонах 1933 року): регіони з найвищою надсмертністю
    (понад 190 осіб на 1000).'
  - Полтавщина та Черкащина як історичне серце нації та головна мішень репресивних
    хлібозаготівель.
  - 'Степова Україна (Дніпропетровщина, Одещина): специфіка голоду в зернових районах
    півдня.'
  - 'Феномен ''чорних дощок'': адміністративна ізоляція окремих сіл та районів як
    вирок смерті.'
- section: 'Менш постраждалі регіони: Індустріальний фактор та кордони'
  words: 800
  points:
  - 'Донецька область: чому промисловий Донбас мав нижчі показники смертності (пріоритетне
    забезпечення робітників).'
  - 'Чернігівщина та прикордоння: вплив лісистої місцевості (можливість збиральництва)
    та близькості до кордонів.'
  - 'Місто проти села: паспортизація містян як спосіб порятунку та ''закриття'' сіл.'
  - 'Західна Україна: ситуація за річкою Збруч та спроби допомоги голодуючим братам
    з-під польського кордону.'
- section: 'Кубань та Північний Кавказ: Етнічний вимір терору'
  words: 800
  points:
  - 'Кубань як ''українська Вандея'': 75% українського населення до 1932 року.'
  - 'Специфіка репресій за межами УРСР: поєднання вилучення хліба з тотальною русифікацією
    (закриття шкіл, газет).'
  - Масова депортація козацьких станиць (станиця Полтавська та ін.) і заселення їх
    росіянами з півночі.
  - 'Юридичний аспект: заборона виїзду з Кубані та УРСР як доказ наміру знищення саме
    українців.'
- section: 'Чому саме ці регіони: Аналіз причинності'
  words: 800
  points:
  - 'Економічний фактор: ''зернова голка'' сталінської індустріалізації та тиск на
    хліборобні райони.'
  - 'Політичний фактор: карта смертності як дзеркало карти селянських повстань 1929–1930
    років.'
  - 'Національний фактор: знищення соціальної бази українського відродження (селянства).'
  - 'Дискусія істориків: ''покарання за опір'' чи ''превентивний удар''?'
- section: 'Демографічні наслідки: Ціна геноциду'
  words: 600
  points:
  - 'Цифри втрат: консенсусна оцінка Інституту демографії (3.9 млн прямих втрат +
    0.6 млн ненароджених).'
  - 'Зміна етнічного складу: наслідки вимирання українських сіл та організованого
    переселення з Росії.'
  - 'Втрачені покоління: довготривалий вплив на вікову структуру населення України.'
  - 'Травма пам''яті: як демографічна катастрофа вплинула на психологію нації.'
- section: 'Підсумок: Географія як вирок режиму'
  words: 400
  points:
  - 'Синтез: регіональні відмінності підтверджують штучність та керованість голоду.'
  - 'Від карт до людських доль: розуміння статистики через призму індивідуальних трагедій.'
  - 'Географічний доказ злочину: чому кордони республіки стали кордонами життя і смерті.'
  - Заклик до подальшого дослідження усної історії свого регіону.
