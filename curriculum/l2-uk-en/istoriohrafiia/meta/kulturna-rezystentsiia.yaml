slug: kulturna-rezystentsiia
title: 'Культурна резистенція: Стратегії виживання'
word_target: 5000
content_outline:
- section: Вступ — Як виживає культура
  words: 500
  points:
  - 'Культурна резистенція — що це: концепція як активної стратегії збереження ідентичності,
    а не просто пасивного очікування.'
  - 'Не пасивність — активна стратегія: тяглість від заборон 19 століття (Валуєвський
    циркуляр 1863 р.) до радянського тоталітаризму.'
  - 'Від козаків до сьогодні: зв''язок між мілітарним опором минулого та інтелектуальним
    спротивом (за Василем Стусом).'
  - 'Структура модуля: огляд феноменів від езопової мови до «катакомбної» церкви.'
- section: 'Закодовані послання: I — Езопова мова та символіка'
  words: 500
  points:
  - 'Езопова мова в літературі: використання історичних алегорій (Рим = Росія), переосмислення
    історичних подій як сьогодення (напр., «Маруся Чурай» Ліни Костенко).'
  - 'Символіка в мистецтві: як цензура парадоксально стимулювала витонченість метафори;
    досвід Тараса Шевченка та Лесі Українки як фундамент для шістдесятників.'
- section: 'Закодовані послання: II — Читання між рядків'
  words: 500
  points:
  - '«Дозволене» про «заборонене»: спроможність говорити правду крізь офіційний канон
    (маніфест Івана Дзюби «Інтернаціоналізм чи русифікація?»).'
  - 'Як читати між рядків: інтелектуальний спорт української еліти, збереження «вертикальної»
    постави (Василь Стус) в умовах ідеологічного тиску.'
- section: 'Підпілля: I — Механізм самвидаву'
  words: 500
  points:
  - 'Самвидав — механізм: технологія створення передруків на машинках («Еріка»), використання
    цигаркового паперу, ризики зберігання за ст. 62 КК УРСР.'
  - 'Таємні бібліотеки: три етапи розвитку самвидаву, обмін забороненою літературою
    та феномен «тамвидаву» як зв''язку з діаспорою.'
- section: 'Підпілля: II — Мережі довіри'
  words: 500
  points:
  - 'Домашні концерти: квартирники та заходи Клубу творчої молоді «Сучасник» як альтернативний
    простір свободи.'
  - 'Мережі довіри: деконструкція міфу про «всезнаюче КДБ» — горизонтальні зв''язки
    дозволяли дисидентам роками діяти в глибокому підпіллі.'
- section: 'Подвійне життя: I — Публічне та приватне'
  words: 500
  points:
  - 'Публічна лояльність: феномен «кухонних розмов» та контраст між офіційними зборами
    і приватними думками.'
  - 'Приватна резистенція: анатомія травмованої радянської особистості, стратегія
    зовнішнього конформізму із внутрішньою опозицією («дуля в кишені»).'
- section: 'Подвійне життя: II — Ціна компромісу'
  words: 500
  points:
  - 'Ціна компромісу: психологічна травма лицемірства, трагедія зламаного тоталітарною
    системою таланту (приклад Павла Тичини).'
  - 'Хто витримав: моральний авторитет незламних шістдесятників, відмова від колаборації
    на прикладі Василя Стуса.'
- section: 'Церква як схованка: I — Підпільна УГКЦ'
  words: 500
  points:
  - 'УГКЦ — підпільна церква: Львівський псевдособор 1946 року як спецоперація НКВС,
    початок «катакомбного» періоду церкви.'
  - 'Мова богослужіння: таємні висвячення 15 єпископів, діяльність «лісових шкіл»
    для семінаристів, збереження альтернативної структури.'
- section: 'Церква як схованка: II — Обряд та люди'
  words: 500
  points:
  - 'Обряд як ідентичність: церква як єдиний простір, що уберіг українську традицію
    та мову в умовах масової русифікації.'
  - 'Священники-резистенти: повсякденність підпілля — священники, які працювали сторожами
    та кочегарами, щоб таємно служити літургії на кухнях.'
- section: Підсумок
  words: 500
  points:
  - 'Резистенція — не героїзм, а стратегія: як культурна резистенція сформувала «громадянське
    суспільство в ембріоні».'
  - 'Культура — не слабкість, а сила: деконструкція міфу про «відсталість» — український
    спротив був високоінтелектуальним та модерним.'
  - 'Перехід до громадянського суспільства: спадщина мереж довіри та самвидаву як
    історичний фундамент українських Майданів та незалежності.'
