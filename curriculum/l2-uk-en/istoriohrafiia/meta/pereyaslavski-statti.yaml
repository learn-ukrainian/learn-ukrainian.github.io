slug: pereyaslavski-statti
title: 'Переяславські статті: Текст і контекст'
word_target: 5000
content_outline:
- section: Вступ — Найконтроверсійніший документ
  words: 400
  points:
  - 'Розмежування подій: публічна декларація (Переяславська рада у січні) та письмовий
    документ (Березневі статті).'
  - 'Історичний парадокс: відсутність оригіналу угоди (свитка з печатками) та дискусії
    навколо московських чернеток і копій.'
  - 'Мета аналізу: деконструкція міфів та критичне прочитання первинного тексту без
    трьохсотлітніх ідеологічних нашарувань.'
- section: Що насправді відбулося в січні 1654
  words: 750
  points:
  - '8 січня 1654 року: Церемонія в Переяславі як спроба публічної легітимації мілітарного
    союзу.'
  - 'Цивілізаційний конфлікт: очікування козаками обопільної присяги (pacta conventa)
    проти московського принципу «цар підданим не присягає» (заява В. Бутурліна).'
  - 'Криза довіри та відкритий бойкот присяги: відмова полковників Івана Богуна та
    Івана Сірка, Уманського полку, а також митрополита Сильвестра Косіва.'
- section: 'Березневі статті — справжній договір: Переговори та 23 статті'
  words: 500
  points:
  - '13–23 березня 1654: Місія посольства Самійла Богдановича-Зарудного та Павла Тетері
    до Москви.'
  - '«Просительні статті»: подання козацькою елітою 23 пунктів як проекту збереження
    української державності та республіканського устрою.'
  - 'Дипломатичний торг: намагання старшини цементувати Україну як незалежну республіку
    під номінальною зверхністю монарха.'
- section: 'Березневі статті — справжній договір: Автономія та затвердження'
  words: 500
  points:
  - 'Редакція Боярської думи та царя Олексія Михайловича: затвердження 11 урізаних
    пунктів.'
  - Жалувані грамоти від 27 березня 1654 року як формальне юридичне закріплення статусу
    Війська Запорозького.
  - 'Що було підписано, а що відхилено: межі козацької автономії в рамках класичного
    протекторату XVII століття.'
- section: 'Фрагмент — Ключові статті: Реєстр та права старшини'
  words: 600
  points:
  - 'Стаття про реєстр: легалізація 60 000 козаків як гігантської професійної армії,
    здатної захистити державність.'
  - 'Фундаментальний принцип «своїм судом судитися»: незалежність правової системи
    Гетьманщини від московського самодержавства та царських воєвод.'
  - 'Гарантії внутрішньої автономії: право старшини обиратися з-поміж себе та зберігати
    власні адміністративні порядки.'
- section: 'Фрагмент — Ключові статті: Дипломатія та московська редакція'
  words: 550
  points:
  - 'Зовнішня політика: збереження права приймати та відпускати послів (окрім представників
    Речі Посполитої та Османської імперії).'
  - 'Фінансова система: збір податків місцевими урядовцями з формальною передачею
    до царської скарбниці, що де-факто залишалася на утримання війська.'
  - 'Московські застереження: перші спроби Москви обмежити гетьманську владу через
    бюрократичні лазівки.'
- section: 'Інтерпретації: Українська та сучасна візія'
  words: 450
  points:
  - 'В''ячеслав Липинський: Переяслав як суто прагматичний, тимчасовий військово-політичний
    союз, спрямований проти Варшави.'
  - 'Михайло Грушевський та Олександр Оглоблин: трактування угоди як номінального
    васалітету, протекторату або ж персональної унії.'
  - 'Сучасна світова історіографія: інкорпорація, що почалася з класичного протекторату
    і тривала понад століття.'
- section: 'Інтерпретації: Російський міф та польський погляд'
  words: 400
  points:
  - 'Польська реакція: сприйняття угоди як «бунту підданих» та нелегітимної зміни
    сюзерена.'
  - 'Російська та радянська ідеологія: конструювання залізобетонного міфу про «возз''єднання»
    (воссоединение) та споконвічне прагнення єдності.'
  - Використання історичної події для ідеологічного обґрунтування імперської експансії
    та асиміляції.
- section: 'Чому це важливо досі: Фальсифікація 1659 року'
  words: 450
  points:
  - Друга Переяславська рада (17 жовтня 1659 р.) та безпрецедентний дипломатичний
    злочин князя Олексія Трубецького.
  - 'Трагедія Юрія Хмельницького: примус до підписання сфальсифікованого документа,
    куди Москва додала 14 нових заборонних статей.'
  - 'Легалізація підробки: як фальшивий текст 1659 року, що забороняв дипломатію та
    вводив воєвод, тривалий час видавали за оригінал 1654-го.'
- section: 'Чому це важливо досі: Деконструкція радянського міфу'
  words: 400
  points:
  - 'Роль Переяслава в інструментарії ідеологічного контролю: святкування 1954 року
    та канонізація «Тез до 300-річчя возз''єднання».'
  - 'Протиставлення історичної пам''яті та реального документа: як акт васалітету
    перетворили на «одвічну мрію братніх народів».'
  - Необхідність очищення історичної свідомості від імперського наративу та повернення
    до першоджерел.
- section: Підсумок
  words: 300
  points:
  - 'Жовтень 1656 року: Віленське перемир''я між Москвою та Річчю Посполитою як грубе
    порушення царем духу Березневих статей.'
  - 'Відповідь Богдана Хмельницького: творення нової антипольської коаліції (зі Швецією
    та Трансільванією) як свідчення незалежної суб''єктності.'
  - 'Історичний парадокс: угода, що мала врятувати від війни, через цивілізаційну
    прірву стала першим кроком Гетьманщини до Руїни.'
