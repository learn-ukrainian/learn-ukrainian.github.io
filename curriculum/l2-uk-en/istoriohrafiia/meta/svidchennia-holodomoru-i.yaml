slug: svidchennia-holodomoru-i
title: 'Свідчення Голодомору I: Усна історія'
word_target: 5000
content_outline:
- section: Вступ — Голоси вижилих
  words: 600
  points:
  - Усна історія як інструмент подолання «архівоциду» та повернення суб'єктності жертвам.
  - Свідчення як джерело доказів наміру геноциду (мікрорівень злочину).
  - Феномен «постгеноцидного суспільства» (Джеймс Мейс) та роль живої пам'яті.
  - Відмінність між офіційним документом (погляд ката) та свідченням (погляд жертви).
- section: Методологія усної історії
  words: 800
  points:
  - 'Техніка глибинного інтерв''ю: як запитувати про невимовне.'
  - 'Феномен травматичної пам''яті: витіснення, фрагментарність, емоційні зриви.'
  - 'Етичні імперативи: принцип «не нашкодь», згода, анонімність vs публічність.'
  - 'Обмеження методу: суб''єктивність сприйняття та вплив сучасного контексту.'
- section: Проєкти збору свідчень
  words: 800
  points:
  - 'Піонерська роль діаспори: Українсько-канадський дослідницько-документаційний
    центр (UCRDC) та проєкт «Усна історія».'
  - 'Комісія Конгресу США (1985–1988): свідчення як юридичний доказ геноциду.'
  - '«Народна Книга-Меморіал» (1991): вибух пам''яті в незалежній Україні.'
  - Сучасні цифрові архіви та проєкти Інституту національної пам'яті.
- section: Типові теми свідчень
  words: 1000
  points:
  - 'Анатомія обшуку: «буксирні бригади», щупи, вилучення їжі та одягу.'
  - 'Стратегії виживання: сурогати (лобода, кора), втеча на Донбас, торгівля речами.'
  - 'Соціальний розпад: страх, доноси, руйнування родинних зв''язків, канібалізм.'
  - 'Табу і мовчання: життя з таємницею в радянські часи (страх говорити навіть у
    80-ті).'
- section: Фрагменти свідчень
  words: 800
  points:
  - 'Аналіз свідчення дитини (1932 р.н.): фокус на фізичних відчуттях та нерозумінні
    зла.'
  - 'Аналіз свідчення матері: трагедія вибору та психологія порятунку потомства.'
  - 'Колективна пам''ять села: свідчення про «чорні дошки» та оточення військами.'
  - 'Герменевтика травми: як читати «між рядками» та розуміти паузи.'
- section: Критика джерела
  words: 600
  points:
  - 'Ретроспективність: як 50–70 років дистанції впливають на точність деталей.'
  - 'Вплив публічного дискурсу: накладання книжкових знань на особистий досвід.'
  - 'Проблема репрезентативності: «помилка того, хто вижив» (survivor bias).'
  - 'Верифікація: перехресний аналіз свідчень та архівних документів.'
- section: Підсумок
  words: 400
  points:
  - Усна історія як фундамент національної ідентичності сучасної України.
  - Інтеграція мікроісторії (свідчень) у великий історичний наратив.
  - 'Моральний обов''язок пам''ятати: свідчення як пересторога майбутнім поколінням.'
