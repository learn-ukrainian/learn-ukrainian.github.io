slug: knyhy-butiia-shevchenko
title: 'Книги Буття: Шевченко та Кирило-Мефодіївці'
word_target: 5000
content_outline:
- section: Вступ — Перша політична програма
  words: 500
  points:
  - '1846-1847 роки: створення першої української політичної організації в Києві.'
  - Кирило-Мефодіївське братство як перехід від культурництва до політики.
  - «Книги буття українського народу» (Закон Божий) як головний ідеологічний маніфест.
  - 'Унікальне значення документа: формулювання ідеї української політичної нації.'
- section: Історичний контекст
  words: 600
  points:
  - 'Становище України під владою Російської імперії: цензура та імперський контроль.'
  - 'Європейський контекст: романтичний націоналізм та наближення «Весни народів»
    (1848).'
  - Київський університет св. Володимира як центр вільнодумства та інтелектуального
    бродіння.
  - Вплив європейських ідей та романтичного націоналізму на українську інтелігенцію.
- section: 'Братство і його члени: I — Засновники та ідеологи'
  words: 600
  points:
  - Микола Костомаров як інтелектуальний «мозок» та головний ідеолог братства (ліберал-федераліст).
  - Пантелеймон Куліш як пропагандист та письменник, що ширив ідеї.
  - Микола Гулак (організатор), Василь Білозерський та інші ключові члени.
  - 'Організаційні принципи: персні з написом «Св. Кирило і Мефодій» та спільні ідеали
    республіки.'
- section: 'Братство і його члени: II — Роль Тараса Шевченка'
  words: 600
  points:
  - Вступ Тараса Шевченка до братства у квітні 1846 року.
  - Шевченко як духовний лідер («пророк») та його радикальні соціалістичні погляди.
  - Вплив революційних поем («Сон», «Кавказ», «І мертвим, і живим...») на радикалізацію
    братчиків.
  - Динаміка між поміркованістю Костомарова та безкомпромісністю Шевченка.
- section: '«Книги буття» — зміст: I — Біблійна форма та історіософія'
  words: 600
  points:
  - 'Структура документа: 109 параграфів, стилізованих під сакральні біблійні тексти.'
  - 'Історіософія: осмислення історії людства як боротьби Божої правди і свободи проти
    царату (кривди).'
  - 'Критика самодержавства: російські царі розглядаються як ідоли, що поневолили
    народи.'
  - Історія слов'ян у контексті християнських ідеалів рівності.
- section: '«Книги буття» — зміст: II — Політичний та соціальний ідеал'
  words: 600
  points:
  - 'Політичний ідеал: Слов''янська федерація вільних республіканських держав із центром
    у Києві.'
  - Концепція України як держави, що зберегла дух козацької рівності та свободи.
  - 'Радикальна соціальна програма: вимога повного скасування кріпацтва.'
  - 'Заперечення станових привілеїв: ідеал егалітарного суспільства без «холопа і
    пана».'
- section: Фрагмент — Україна як месія
  words: 600
  points:
  - 'Аналіз ключового уривка: «І встане Україна з своєї могили...».'
  - 'Концепція українського месіанізму: страждання України як спокута, що принесе
    свободу всім слов''янам.'
  - 'Порівняння з польським месіанізмом (Адам Міцкевич): егалітарний (селянський/козацький)
    месіанізм проти шляхетського.'
  - Романтична мова маніфесту та її мобілізаційний потенціал.
- section: Доля братства
  words: 500
  points:
  - 'Березень 1847 року: зрада і донос студента Олексія Петрова владі.'
  - Масові арешти братчиків у Києві та Петербурзі (квітень 1847).
  - 'Найсуворіше покарання Тараса Шевченка: заслання в солдати «із забороною писати
    й малювати».'
  - 'Чому Шевченко?: імперський страх перед його словом, яке руйнувало сакральність
    царату.'
  - Довготривалий вплив братчиків як мучеників за національну ідею.
- section: Підсумок
  words: 400
  points:
  - 'Ключове значення: перша артикульована українська політична програма.'
  - Перехід українського руху від культурно-просвітницького романтизму до чітких політичних
    вимог.
  - Довготривалий вплив ідей братства на рух громадівців та політичних діячів (М.
    Драгоманов, М. Грушевський).
