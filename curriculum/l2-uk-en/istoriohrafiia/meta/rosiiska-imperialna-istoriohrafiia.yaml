slug: rosiiska-imperialna-istoriohrafiia
title: Російська імперіальна історіографія
word_target: 5000
content_outline:
- section: Вступ — Імперська історіографія як зброя
  words: 600
  points:
  - 'Історія як інструмент легітимації імперії: без Києва Росія втрачає ''тисячолітній''
    фундамент.'
  - 'Чому Росія потребувала «привласнити» українську історію: комплекс меншовартості
    та потреба в європейському родоводі.'
  - 'Київ як «колиска»: імперська інтерпретація vs історична реальність (Русь як держава
    предків українців).'
- section: Карамзін і початок імперського наративу
  words: 700
  points:
  - '«Історія держави Російської» (1816-1829): створення канону ''переходу влади''
    (Київ-Володимир-Москва).'
  - 'Київська Русь як «початок Росії» в схемі Карамзіна: ігнорування української тяглості.'
  - 'Нема окремих українців — є «малороси»: політичне стирання української нації в
    XIX ст.'
  - 'Вплив на російську масову свідомість: формування імперського шовінізму через
    освіту та літературу.'
- section: Теорія Погодіна
  words: 900
  points:
  - 'Михайло Погодін (1800-1875): автор псевдонаукової гіпотези про етнічну зміну
    населення Києва.'
  - 'Суть теорії: твердження, що давні кияни були ''великоросами'', які втекли на
    північ після 1240 р.'
  - 'Міф про прихід українців: нібито предки українців прийшли з Карпат на ''порожнє
    місце'' (tabula rasa).'
  - 'Наукова критика теорії: докази автохтонності українців від М. Максимовича, В.
    Антоновича та М. Грушевського.'
  - 'Чому теорія досі популярна в Росії: ідеологічна зручність для заперечення права
    українців на Київ.'
- section: Концепція 'Малоросії'
  words: 700
  points:
  - 'Термін «Малоросія»: від візантійського церковного терміну (Mikra Rosia — метрополія)
    до імперського клейма.'
  - 'Від географії до ідеології: трансформація поняття у XIX столітті для позначення
    меншовартості.'
  - '«Малорос» як тип імперського лояліста: конструювання ідентичності неповноцінного
    росіянина.'
  - 'Культурна асиміляція як мета: заборони мови (Валуєвський циркуляр, Емський указ)
    як інструменти творення ''єдиного народу''.'
- section: Радянська версія імперського наративу
  words: 700
  points:
  - '«Возз''єднання» 1654: конструювання міфу до 300-річчя Переяславської ради (1954).'
  - '«Братні народи»: ієрархія ''старшого брата'' (росіяни) та ''молодшого'' (українці)
    в СРСР.'
  - 'Табуйовані теми: замовчування Голодомору, репресій та національно-визвольної
    боротьби (ОУН-УПА).'
  - 'Продовження царської схеми у новій формі: радянська історіографія як спадкоємиця
    імперської.'
- section: Сучасна російська історіографія
  words: 800
  points:
  - 'Путінські історичні есе (2021): офіційне повернення до концепції ''одного народу''
    на державному рівні.'
  - 'Заперечення українців: теза про Україну як ''штучний проект'' (Леніна, Австро-Угорщини).'
  - 'Історія як виправдання війни: використання псевдоісторичних аргументів для легітимації
    агресії.'
  - 'Від Погодіна до Путіна — безперервність: тяглість імперського шовінізму протягом
    століть.'
- section: Критичний аналіз і деконструкція
  words: 600
  points:
  - 'Як розпізнати імперський наратив: ключові маркери (спільна колиска, штучність
    мови, заперечення суб''єктності).'
  - 'Ключові маркери пропаганди: аналіз лексики та маніпуляцій у сучасних російських
    джерелах.'
  - 'Українська відповідь: формування власного суверенного погляду на історію та повернення
    культурної спадщини.'
