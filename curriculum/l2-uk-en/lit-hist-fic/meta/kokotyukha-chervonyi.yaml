slug: kokotyukha-chervonyi
title: Kokotyukha Chervonyi
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Феномен роману'
  words: 350
  points:
  - Видання роману у 2012 році та здобуття спеціальної відзнаки конкурсу «Коронація
    слова».
  - 'Значення твору: переведення складної теми боротьби УПА у формат масового жанру.'
  - Ламання стереотипів про «серйозну» історичну прозу через створення бестселера.
- section: 'Вступ та контекст: Історичне тло (УПА та ГУЛАГ)'
  words: 350
  points:
  - 'Хронологічні межі твору: від 1947 року (масштабні операції МДБ проти УПА) до
    1953 року.'
  - Перенесення боротьби українського підпілля у сталінські концтабори.
  - 'Прототип подій: реальні повстання в системі ГУЛАГу (Кенгірське, Норильське),
    де українські політив''язні стали ядром опору.'
- section: 'Аналіз ключових творів: Композиційна структура'
  words: 350
  points:
  - 'Унікальна поліфонія тексту: розповідь ведеться від особи трьох різних людей,
    жодна з яких не належить українському повстанцю.'
  - Свідома відмова автора від внутрішнього монологу головного героя (Данила Червоного).
  - Стереоскопічне бачення образу хорунжого УПА через призму сприйняття його ворогів
    та випадкових свідків.
- section: 'Аналіз ключових творів: Частина перша (Міліціонер Середа)'
  words: 350
  points:
  - Детективний сюжет першої частини через оптику розслідування дільничного Михайла
    Середи.
  - Сприйняття Червоного місцевим радянським активом виключно як невловимого злочинця.
  - Зображення побуту післявоєнної України та конфлікту офіційного радянського закону
    з партизанською справедливістю.
- section: 'Аналіз ключових творів: Частина друга (Майор КДБ Доброхотов)'
  words: 400
  points:
  - 'Психологічна дуель двох світоглядів: репресивна машина проти організованого національного
    підпілля.'
  - Образ Лева Доброхотова як потужного інтелектуала та ідейного ворога, що має власну
    складну мотивацію.
  - Розуміння радянським офіцером масштабу постаті супротивника («Там, де з'являється
    Червоний, починається бунт»).
- section: 'Аналіз ключових творів: Частина третя (Кримінальник Гуров)'
  words: 450
  points:
  - Зіткнення російського кримінального світу («ворів у законі») з організованою силою
    українських політив'язнів у ГУЛАГу.
  - Перспектива російського кримінального авторитета Віктора Гурова на злам неписаних
    табірних правил.
  - Організація Червоним збройного опору та підготовка повстання в нелюдських умовах
    сталінських концтаборів.
- section: 'Стилістика та мова автора: Жанрова специфіка трилера'
  words: 350
  points:
  - Побудова твору за строгими законами гостросюжетного екшену та детективу.
  - Свідома відмова автора від надмірного віктимного пафосу та традиційного моралізаторства
    на користь динаміки.
  - Використання інструментів масової літератури для залучення широкої аудиторії до
    вивчення історії.
- section: 'Стилістика та мова автора: Динамізм та лексичний колорит'
  words: 350
  points:
  - 'Кінематографічний монтаж: рубані речення та швидка зміна сцен у тексті.'
  - 'Стилізація мови персонажів-ворогів: чекісти говорять типовим канцеляритом та
    російськими кальками.'
  - Використання табірного жаргону для створення автентичної, похмурої атмосфери системи
    ГУЛАГу.
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 400
  points:
  - Деконструкція радянських пропагандистських кліше про вояків УПА як маргінальних
    бандитів та колаборантів.
  - Зображення повстанців як високоорганізованих, розумних та дисциплінованих військових
    із власною етикою.
  - Спростування тези імперського дискурсу про тотальну покірність та безправність
    в'язнів ГУЛАГу.
- section: 'Деколонізаційна перспектива: Українська суб''єктність'
  words: 400
  points:
  - 'Радикальний відхід від віктимного дискурсу: українці у творі показані не жертвами,
    а переможцями.'
  - Перехід від традиції оплакування до традиції активного збройного спротиву та сили
    духу.
  - Образ Данила Червоного як символу дієвої національної ідеї («Червоний — це не
    людина. Це — ідея»).
- section: 'Підсумок та спадщина: Культурний вплив'
  words: 300
  points:
  - Значення виходу на екрани однойменного художнього фільму у 2017 році (режисер
    Заза Буадзе).
  - Закріплення образу безкомпромісного українського повстанця-героя у сучасній масовій
    культурі.
  - Доведення спроможності української історії бути потужною основою для якісної популярної
    літератури.
