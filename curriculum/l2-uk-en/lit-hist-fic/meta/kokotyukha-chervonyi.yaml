slug: kokotyukha-chervonyi
title: Kokotyukha Chervonyi
word_target: 4000
content_outline:
- section: 'Вступ: Феномен роману «Червоний» у сучасній літературі'
  words: 300
  points:
  - Місце Андрія Кокотюхи в сучасній українській літературі.
  - Рік видання (2012) та значення для розвитку вітчизняної масової літератури.
  - Трансформація історичної травми у формат гостросюжетного жанру.
- section: 'Історичне тло: УПА та радянська репресивна машина'
  words: 300
  points:
  - 'Історичні координати твору: 1947–1953 роки.'
  - Реалії збройного опору УПА після Другої світової війни.
  - Система ГУЛАГу та Кенгірське повстання як історичний прототип подій роману.
- section: 'Жанрова специфіка: Гостросюжетний історичний трилер'
  words: 400
  points:
  - Відмова від традиційного історичного роману XIX століття.
  - Використання елементів детективу, бойовика та табірної прози.
  - Орієнтація на західні стандарти екшен-літератури (динаміка, інтрига, саспенс).
- section: 'Композиційна структура: Три різні оптики'
  words: 400
  points:
  - 'Поліфонія тексту: відсутність прямого голосу головного героя.'
  - 'Прийом ''віддзеркалення'': Данило Червоний розкривається лише через сприйняття
    інших.'
  - Як зміна перспективи формує об'ємний образ головного героя.
- section: 'Аналіз: Погляд міліціонера Михайла Середи'
  words: 400
  points:
  - 'Перша частина роману: детективний сюжет.'
  - Сприйняття УПА з позиції низового радянського міліціонера.
  - Зіткнення радянського закону та партизанської справедливості.
- section: 'Аналіз: Погляд майора КДБ Лева Доброхотова'
  words: 400
  points:
  - 'Друга частина роману: інтелектуальний та психологічний двобій.'
  - Образ ідейного ворога, який змушений визнати силу противника.
  - Аналіз методів роботи МДБ/КДБ проти українського підпілля.
- section: 'Аналіз: Погляд кримінальника Віктора Гурова'
  words: 400
  points:
  - 'Третя частина роману: табірна проза та зіткнення двох систем у ГУЛАГу.'
  - Конфлікт між 'ворами в законі' та організованими політичними в'язнями (УПА).
  - Як Червоний ламає кримінальні правила та очолює повстання.
- section: 'Стилістика та мова: Динамізм і лексичний колорит'
  words: 400
  points:
  - 'Особливості синтаксису: короткі речення, кінематографічність.'
  - Лексична диференціація персонажів (канцелярит чекістів, табірний жаргон).
  - Роль діалогів як рушійної сили сюжету.
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 400
  points:
  - Спростування радянських стереотипів про повстанців як 'маргіналів і бандитів'.
  - Деконструкція міфу про 'могутній і непереможний КДБ'.
  - Переосмислення образу ворога у пострадянській свідомості.
- section: 'Українська суб''єктність: Перехід від жертви до борця'
  words: 400
  points:
  - Відхід від віктимного дискурсу (оплакування поразок).
  - Данило Червоний як символ активної, дієвої, незламної сили.
  - Перемога духу та організації навіть в умовах тоталітарної ізоляції.
- section: 'Підсумок: Культурний вплив та екранізація'
  words: 200
  points:
  - Вплив роману на популяризацію історії серед широкої аудиторії.
  - Екранізація 2017 року та розширення всесвіту Червоного.
  - Значення твору для формування сучасної національної ідентичності.
