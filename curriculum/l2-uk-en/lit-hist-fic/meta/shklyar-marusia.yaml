slug: shklyar-marusia
title: Shklyar Marusia
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Історичне тло роману'
    words: 500
    points:
      - 'Україна у 1919 році: масштаби селянського повстанського руху на Правобережжі.'
      - Соціально-політичні передумови опору більшовицькій окупаційній політиці.
      - 'Місце дії роману: Радомишльщина, Полісся та Київщина як епіцентри збройної
        боротьби.'
  - section: 'Вступ та контекст: II — Постать отаманші Марусі'
    words: 500
    points:
      - 'Біографічний контекст Олександри Соколовської: родина, освіта, виховання.'
      - Трагічна загибель братів (Дмитра, Олекси, Василя) як каталізатор її вибору.
      - Феномен 16-річної дівчини, яка бере на себе командування повстанським загоном.
  - section: 'Аналіз ключових творів: I — Сюжетна канва та композиція'
    words: 600
    points:
      - 'Динаміка сюжету: від мирного життя до горнила війни.'
      - Поєднання батальних епізодів з інтимними психологічними переживаннями героїні.
      - 'Композиційні прийоми Шкляра: флешбеки, внутрішні монологи, ретроспектива.'
  - section: 'Аналіз ключових творів: II — Образна система роману'
    words: 600
    points:
      - 'Психологічний портрет Марусі: еволюція від юної дівчини до суворої військової
        лідерки.'
      - 'Образи повстанців: відтворення народних типів, козацьких характерів.'
      - 'Зображення ворога: дегуманізація чи реалістичний опис більшовицьких загонів.'
  - section: 'Аналіз ключових творів: III — Роман як історична реконструкція'
    words: 500
    points:
      - Співвідношення документалістики (архівні справи, мемуари) та художнього вимислу.
      - Функція літератури у відновленні 'стертої' історії.
      - 'Літературна топографія: достовірність описів сіл, лісів, шляхів пересування.'
  - section: 'Стилістика та мова автора: I — Необароковий наратив'
    words: 500
    points:
      - 'Особливості стилю Василя Шкляра: емоційна густота, романтичний пафос, експресія.'
      - 'Міфологізація історичних постатей: створення новітнього національного міфу.'
      - 'Ритміка прози: поєднання епічного спокою та бойової динаміки.'
  - section: 'Стилістика та мова автора: II — Мовний колорит'
    words: 500
    points:
      - 'Лексичний пласт роману: використання поліських та наддніпрянських діалектизмів.'
      - Військова термінологія епохи УНР та повстанський сленг.
      - Мовна індивідуалізація персонажів як засіб характеротворення.
  - section: 'Деколонізаційна перспектива: I — Злам радянської парадигми'
    words: 500
    points:
      - Деконструкція імперського міфу про повстанців як 'бандитів' і 'куркулів'.
      - Розвінчання ідеологеми 'громадянської війни' — утвердження концепту національно-визвольної
        війни проти окупантів.
      - Роман як інструмент когнітивної деокупації пам'яті.
  - section: 'Деколонізаційна перспектива: II — Повернення суб''єктності'
    words: 400
    points:
      - Українці як активні суб'єкти історії, що зі зброєю в руках захищають свою
        державність.
      - 'Жіноча суб''єктність: Маруся як руйнівниця патріархального стереотипу про
        жінку-жертву.'
      - Перехід від 'оплакування' поразок до героїзації боротьби.
  - section: Підсумок та спадщина
    words: 400
    points:
      - 'Рецепція роману суспільством: вихід у 2014 році на тлі нової фази російсько-української
        війни.'
      - Місце 'Марусі' в трилогії/циклі історичних романів Василя Шкляра.
      - Значення образу Отаманші Марусі для сучасної національної ідентичності та
        мілітарної культури України.
