slug: shevchuk-three-leaves
title: "«Три листочки за вікном»: Валерій Шевчук і Метафізична Проза"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Історія створення роману'
    words: 500
    points:
      - Написання твору (1968–1982) та його публікація у 1986 році, що принесла автору
        Шевченківську премію (1987).
      - 'Задум Валерія Шевчука: створення епічного полотна про зміну поколінь та еволюцію
        українського духу.'
  - section: 'Вступ та контекст: II — Епоха українського бароко як тло'
    words: 500
    points:
      - Відтворення інтелектуальної, духовної та містичної атмосфери України XVII–XVIII
        століть.
      - Синтез детективної інтриги та барокової філософії у світобудові роману.
  - section: 'Аналіз ключових творів: I — Ілля Турчиновський і пошуки істини'
    words: 600
    points:
      - 'Аналіз першої повісті (XVII ст.): образ мандрівного дяка та філософа-ідеаліста.'
      - Пошуки внутрішнього щастя та морального самопізнання як найвища мета людського
        життя.
  - section: 'Аналіз ключових творів: II — Петро Турчиновський'
    words: 500
    points:
      - 'Друга повість (XVIII ст.): зіткнення ідеалізму попередньої епохи з новими
        прагматичними реаліями.'
      - Процес світоглядної трансформації та соціальної адаптації в межах одного роду.
  - section: 'Аналіз ключових творів: III — Киріак Сатановський: деградація духу'
    words: 600
    points:
      - 'Третя повість (XIX ст.): образ слідчого як символ втрати національної та
        етичної ідентичності.'
      - 'Інтелект без моралі: сатиричний вимір деградації людини в умовах колоніальної
        дійсності.'
  - section: 'Стилістика та мова автора: I — Химерна проза як літературний феномен'
    words: 500
    points:
      - 'Характерні риси української химерної прози: містицизм, фольклорні елементи
        та психологізм.'
      - Мовна стилізація під давньоукраїнську літературну традицію.
  - section: 'Стилістика та мова автора: II — Символіка «трьох листків» і барокові
      мотиви'
    words: 500
    points:
      - 'Символічне значення назви: три покоління, три епохи, три етапи національної
        долі.'
      - Використання біблійних алюзій, барокової травестії та жанрових трансформацій.
  - section: 'Деколонізаційна перспектива: I — Руйнування імперського міфу про провінційність'
    words: 500
    points:
      - Спростування російських наративів про українську культуру як суто «селянську»
        та «неосвічену».
      - Демонстрація високоосвіченої української еліти, причетної до загальноєвропейських
        культурних процесів.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність та інтелектуальна
      традиція'
    words: 400
    points:
      - Ствердження української суб'єктності через глибоке інтелектуальне життя персонажів.
      - Національна пам'ять та родинний спадок як інструмент опору асиміляції.
  - section: 'Підсумок та вплив: I — Значення роману для української літератури'
    words: 400
    points:
      - Місце роману в сучасній літературі, його вплив на розвиток історико-філософської
        прози.
      - Світове визнання твору та неперехідна актуальність філософських концепцій
        Валерія Шевчука.
