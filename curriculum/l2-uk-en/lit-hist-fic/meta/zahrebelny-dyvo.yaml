slug: zahrebelny-dyvo
title: Zahrebelny Dyvo
word_target: 4000
content_outline:
- section: 'Вступ та контекст: I — Життєпис автора та епоха'
  words: 300
  points:
  - Місце Павла Загребельного в українській літературі ХХ століття.
  - Створення роману «Диво» (1968) як реакція на епоху 'відлиги' та пошук національної
    ідентичності.
- section: 'Вступ та контекст: II — Історичне тло роману'
  words: 350
  points:
  - Доба Ярослава Мудрого та заснування Софії Київської.
  - Облога Києва та Друга світова війна як історичне випробування святині.
  - Сучасність (1960-ті роки) і пошук наукової істини про витоки нації.
- section: 'Аналіз ключових творів: I — Архітектоніка та три виміри часу'
  words: 450
  points:
  - 'Специфіка композиції роману: переплетення ХІ, ХХ століть та сучасності.'
  - Софія Київська як центральний хронотоп і символ вічності («Диво»).
  - Інтеграція минулого і сьогодення через долі родів Сивоока та Отав.
- section: 'Аналіз ключових творів: II — Образ Сивоока як творця'
  words: 450
  points:
  - Сивоок як уособлення автохтонного народного генія.
  - Конфлікт вільного митця і догматичних (візантійських) канонів.
  - Символізм смерті Сивоока під плитами собору — жертва заради вічності мистецтва.
- section: 'Аналіз ключових творів: III — Образ Ярослава Мудрого'
  words: 400
  points:
  - 'Дегероїзація образу князя: Ярослав як прагматичний і жорстокий політик.'
  - 'Ціна державної величі: втрата особистого щастя і руйнування людських доль.'
  - Двобій влади (Ярослав) і таланту (Сивоок).
- section: 'Стилістика та мова автора: I — Психологізм та символіка'
  words: 400
  points:
  - Внутрішні монологи персонажів та екзистенційні роздуми про сенс життя.
  - Символіка природи («Людина повинна жити поміж деревами»).
  - Філософські відступи Загребельного про руйнівну силу речей та консюмеризму проти
    справжнього мистецтва.
- section: 'Стилістика та мова автора: II — Мовний колорит епохи'
  words: 400
  points:
  - 'Майстерність історичної стилізації: використання архаїзмів та історицизмів без
    обтяження тексту.'
  - Ритміка прози Загребельного, що нагадує літописну оповідь і водночас звучить сучасно.
- section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
  words: 450
  points:
  - Заперечення міфу про візантійську вторинність культури Русі.
  - Сивоок як доказ самобутності та могутності місцевої художньої традиції (використання
    місцевих барвників, рослинних орнаментів).
  - Спростування концепції 'спільної колиски' через яскраво виражений український
    менталітет героїв.
- section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
  words: 400
  points:
  - Київська Русь як потужна європейська держава зі своєю незалежною культурною політикою.
  - Софія Київська як матеріалізація незнищенного українського національного духу.
  - 'Історична тяглість опору: від Сивоока до Гордія Отави (захист святині від нацистів
    як захист нації).'
- section: 'Підсумок та спадщина: Значення роману'
  words: 400
  points:
  - Внесок «Дива» в оновлення української історичної прози.
  - 'Актуальність роману сьогодні: питання захисту культурної спадщини в умовах війни.'
  - Формування історичної пам’яті та національної гордості через літературу.
