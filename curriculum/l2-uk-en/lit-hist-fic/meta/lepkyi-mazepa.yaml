slug: lepkyi-mazepa
title: Lepkyi Mazepa
word_target: 4000
content_outline:
- section: 'Вступ та контекст: Епоха і задум автора'
  words: 400
  points:
  - Життєві обставини Богдана Лепкого під час написання епопеї (1920-ті роки, еміграція,
    Краків і Берлін).
  - Потреба українського суспільства в національному герої після поразки Визвольних
    змагань 1917-1921 років.
  - 'Масштаб задуму письменника: від плану невеликої повісті до створення наймасштабнішої
    в українській літературі історичної пенталогії.'
- section: 'Вступ та контекст: Історичне тло Великої Північної війни'
  words: 400
  points:
  - Робота Лепкого з першоджерелами та історіографією (праці М. Костомарова, літописи).
  - 'Геополітична ситуація початку XVIII століття: виснаження України внаслідок імперської
    політики Петра І.'
  - Складність екзистенційного вибору для Гетьманщини між Москвою та Швецією.
- section: 'Аналіз ключових творів: «Мотря» — романтичний і політичний пролог'
  words: 500
  points:
  - 'Аналіз перших частин пенталогії: поєднання любовного сюжету (лінія Мазепа – Мотря)
    із великою політичною грою.'
  - Мотря як символ ідеалістичної, безкомпромісної України, що вимагає негайних дій.
  - 'Трагізм особистої жертви гетьмана: розрив із коханою заради таємної підготовки
    до повстання і збереження державної таємниці.'
- section: 'Аналіз ключових творів: «Не вбивай» і «Батурин» — трагедія вибору'
  words: 500
  points:
  - '«Не вбивай»: психологічний злам і моральний тягар Мазепи під час ухвалення смертного
    вироку Кочубею та Іскрі.'
  - '«Батурин» як кульмінація епопеї: реконструкція оборони та падіння гетьманської
    столиці.'
  - Образ Меншикова та деталізований, шокуючий опис різанини як колективного мучеництва
    українського народу.
- section: 'Аналіз ключових творів: «Полтава» та епілог — катастрофа і міф'
  words: 500
  points:
  - 'Двотомник «Полтава»: художній аналіз військових подій, фатальних помилок, ранення
    Карла ХІІ та поразки альянсу.'
  - 'Повість «З-під Полтави до Бендер»: відступ, фізичне згасання, але незламність
    духу старого гетьмана.'
  - Формування Мазепою політичного заповіту для наступників (Пилипа Орлика) та перетворення
    його на безсмертний національний міф.
- section: 'Стилістика та мова автора: Психологізм та деталізація'
  words: 400
  points:
  - Глибоке проникнення у психологію історичних постатей (Мазепа, Петро І, Карл ХІІ,
    Кочубей).
  - 'Відхід від чорно-білого зображення: показ Мазепи як людини, сповненої вагань,
    страждань та сумнівів.'
  - Кінематографічність описів, майстерна деталізація побуту, зброї, батальних сцен
    та дипломатичного протоколу.
- section: 'Стилістика та мова автора: Мовний колорит епохи бароко'
  words: 400
  points:
  - 'Стилізація тексту під козацьке бароко: використання архаїзмів, історизмів та
    специфічного канцеляриту.'
  - Насиченість мови персонажів біблійними алюзіями, латинізмами та полонізмами, притаманними
    еліті XVIII століття.
  - Епічна, розлога ритміка прози Лепкого, що нагадує традицію народних дум.
- section: 'Деколонізаційна перспектива: Руйнування імперського міфу'
  words: 400
  points:
  - Системна деконструкція російського пропагандистського наративу (зокрема міфу Пушкіна)
    про Мазепу як «зрадника».
  - Доведення легітимності розриву з Москвою через порушення Петром І Коломацьких
    статей.
  - Спростування церковної анафеми як виключно політичного, неканонічного інструменту
    імперського терору.
- section: 'Деколонізаційна перспектива: Українська суб''єктність'
  words: 400
  points:
  - Зображення Гетьманщини як повноцінного суб'єкта європейської геополітики, а не
    маріонетки великих імперій.
  - Мазепа як втілення модерної державницької ідеї та європейського цивілізаційного
    вибору.
  - Вплив образу самостійного лідера на пробудження національної гордості читачів.
- section: 'Підсумок та спадщина: Рецепція твору і повернення'
  words: 300
  points:
  - Колосальний успіх пенталогії в Західній Україні та діаспорі у міжвоєнний період
    (формування цілого покоління патріотів).
  - Сувора заборона і вилучення творів Б. Лепкого з бібліотек у Радянському Союзі.
  - Тріумфальне повернення епопеї в Україну в 1990-х роках і її визначальна роль у
    відновленні історичної справедливості.
