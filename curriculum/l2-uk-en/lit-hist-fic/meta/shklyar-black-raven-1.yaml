slug: shklyar-black-raven-1
title: Shklyar Black Raven 1
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Історія Холодноярської республіки'
    words: 500
    points:
      - Феномен збройного опору на Наддніпрянщині (1919–1922 роки).
      - 'Ідейне підґрунтя повстанського руху: правонаступництво армії УНР та захист
        української державності.'
      - Масова підтримка опору селянством.
  - section: 'Вступ та контекст: Задум та написання роману'
    words: 400
    points:
      - Робота Василя Шкляра з розсекреченими архівами СБУ.
      - 'Мета автора: повернути голоси засудженим і страченим повстанцям.'
      - Літературний і суспільний контекст кінця 2000-х років.
  - section: 'Аналіз ключових творів: Структура і наратив «Чорного ворона»'
    words: 500
    points:
      - 'Специфіка композиції: поєднання художнього наративу з архівами ЧК.'
      - Динаміка розповіді, що відображає психологію безперервної партизанської війни.
      - Роль документалістики у створенні ефекту достовірності.
  - section: 'Аналіз ключових творів: Еволюція образу отамана Чорного Ворона'
    words: 600
    points:
      - Іван Чорновус як збірний образ інтелігентного провідника збройного опору.
      - Трансформація героя від офіцера регулярної армії до отамана-«залишенця».
      - Моральні дилеми, екзистенційний вибір і фаталізм головного героя.
  - section: 'Аналіз ключових творів: Типологія повстанців і чекістів'
    words: 500
    points:
      - 'Галерея повстанських характерів: від селян до інтелектуалів.'
      - Зображення чекістів як носіїв окупаційної, антигуманної ідеології.
      - Психологічна прірва та ціннісний конфлікт між українськими повстанцями і більшовиками.
  - section: 'Аналіз ключових творів: Межа між документом і фікцією'
    words: 500
    points:
      - Художня реконструкція емоцій і побуту на основі сухих кримінальних справ.
      - Баланс між історичною правдою (дати, імена, події) та авторською уявою (любовна
        лінія з Тіною).
      - Функція архівних цитат як «перебивок» емоційної напруги.
  - section: 'Стилістика та мова автора: Мовний колорит і лексика'
    words: 500
    points:
      - Використання живого наддніпрянського діалекту та козацької лексики.
      - Мова як маркер ідентичності та спротиву російській асиміляції.
      - Натуралістичність і жорсткість стилістики опису боїв та побуту.
  - section: 'Стилістика та мова автора: Міфопоетика та символи'
    words: 400
    points:
      - Символ ворона як архетипу смерті, мудрості і пам'яті.
      - Сакралізація простору Холодного Яру, ліс як живий організм-захисник.
      - Рецепція козацьких міфологем (образ характерника).
  - section: 'Деколонізаційна перспектива: Деконструкція міфу про «бандитизм»'
    words: 500
    points:
      - Послідовне спростування радянського штампу про повстанців як «бандитів» і
        «мародерів».
      - Розкриття ідеологічної суті боротьби — створення незалежної Української Держави.
      - Оприявнення механізмів чекістської пропаганди.
  - section: 'Деколонізаційна перспектива: Повернення української суб''єктності'
    words: 400
    points:
      - Відхід від парадигми українців як пасивних жертв історії.
      - Зображення активного, збройного, мілітарного опору як норми національної реакції
        на окупацію.
      - Формування мілітарної гордості через літературу.
  - section: 'Підсумок та спадщина: Рецепція твору в сучасному суспільстві'
    words: 250
    points:
      - Скандал із Шевченківською премією 2011 року як акт громадянської позиції.
      - Вплив роману на формування сучасного військового етосу (назва 93-ї ОМБр «Холодний
        Яр»).
      - Значення «Чорного ворона» в актуалізації історичної пам'яті під час сучасної
        війни.
