slug: ivanychuk-water
title: "«Вода з каменю»: Роман Іваничук і Антигабсбурзький Опір"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: Формування жанру'
    words: 450
    points:
      - Історична проза 1970-1980-х років як засіб збереження національної пам'яті
      - Роман Іваничука в парадигмі українського інтелектуального роману
      - Езопівська мова та протистояння радянській цензурі
  - section: 'Вступ та контекст: Галичина епохи Пробудження'
    words: 650
    points:
      - Політична та культурна ситуація в Австрійській імперії першої половини XIX
        ст.
      - 'Подвійний тиск на українців: австрійська бюрократія та польська шляхта'
      - Статус української мови як 'хлопської' та необхідність культурної емансипації
  - section: 'Аналіз ключових творів: Сюжет та композиція роману'
    words: 600
    points:
      - Життєвий шлях Маркіяна Шашкевича як композиційний стрижень твору
      - Роль альманаху «Русалка Дністровая» як сюжетної кульмінації
      - Протистояння героя не лише із зовнішньою системою, а й з байдужістю власного
        суспільства
  - section: 'Аналіз ключових творів: Образ Маркіяна Шашкевича'
    words: 600
    points:
      - Шашкевич як пророк та інтелектуал, що усвідомлює власну місію
      - 'Христологічні мотиви в образі героя: свідома самопожертва'
      - Відмова від радянського міфу про Шашкевича виключно як борця за соціальні
        права
  - section: 'Аналіз ключових творів: Конфлікт ідей Трійці'
    words: 450
    points:
      - Психологічна та ідеологічна драма всередині гуртка «Руська трійця»
      - Ідеалізм Шашкевича на противагу ваганням Головацького та Вагилевича
      - 'Трагедія роздоріж української історії: між соборністю, москвофільством та
        полонофільством'
  - section: 'Стилістика та мова: Історична стилізація'
    words: 450
    points:
      - 'Мовний колорит роману: використання галицизмів, архаїзмів та церковнослов''янізмів'
      - Багатовимірність наративу та створення ефекту 'занурення' в епоху
      - Майстерність Іваничука у передачі інтелектуального дискурсу XIX століття
  - section: 'Стилістика та мова: Символіка «води з каменю»'
    words: 450
    points:
      - 'Деконструкція центральної метафори твору: камінь як система і байдужість,
        вода як живе слово і дух'
      - Акт добування води як символ титанічної націєтворчої праці
      - Зв'язок метафорики з біблійними мотивами та українським фольклором
  - section: 'Деколонізаційна перспектива: Українська суб''єктність'
    words: 500
    points:
      - 'Повернення суб''єктності: українці Галичини не як об''єкт імперської політики,
        а як творці власної долі'
      - 'Ідея Соборності: наведення культурних мостів з Наддніпрянською Україною'
      - Трактування Галичини як П'ємонту, а не маргінальної окраїни
  - section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
    words: 450
    points:
      - Спростування радянських наративів про локальний масштаб «Руської трійці»
      - Антиімперський пафос роману та захист національної ідентичності через мову
      - Роль книги у формуванні антиколоніального дискурсу в літературі УРСР
  - section: 'Підсумок та спадщина: Вплив на ідентичність'
    words: 400
    points:
      - Сприйняття роману «Вода з каменю» поколінням шістдесятників та сучасниками
      - 'Актуальність твору сьогодні: проблема вибору та збереження мови під час екзистенційної
        загрози'
      - Місце Романа Іваничука в пантеоні творців українського історичного міфу
