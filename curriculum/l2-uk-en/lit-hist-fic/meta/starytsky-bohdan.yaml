slug: starytsky-bohdan
title: Starytsky Bohdan
word_target: 4000
content_outline:
- section: 'Вступ: Михайло Старицький як творець історичного міфу'
  words: 400
  points:
  - Роль Старицького у формуванні українського героїчного пантеону ХІХ ст.
  - Історична проза як замінник відсутньої державної історії (national building).
  - Задум монументальної епопеї про Богдана Хмельницького.
- section: 'Історичний та цензурний контекст: Емський указ і проблема мови'
  words: 400
  points:
  - Лінгвоцидні умови Російської імперії (Емський указ 1876 р.).
  - Вимушене рішення писати роман російською мовою заради донесення ідеї до мас («Московский
    листок»).
  - 'Феномен «українського роману російською мовою»: ментальність, синтаксис та етнографічний
    субстрат.'
- section: 'Трилогія «Богдан Хмельницький»: Архітектоніка та задум'
  words: 500
  points:
  - 'Структура епосу: «Перед бурею», «Буря», «Біля пристані».'
  - Поєднання приватної лінії (драма родини Хмельницьких) з масштабним історичним
    тлом.
  - Традиція вальтер-скоттівського роману та її адаптація до українських реалій.
- section: 'Образ Хмельницького: Від людини до державотворця'
  words: 500
  points:
  - 'Еволюція героя: від лояльного реєстровця, що шукає легальної правди, до лідера
    нації.'
  - Особиста кривда (свавілля Чаплинського) як каталізатор розуміння загальнонаціональної
    безправності.
  - Хмельницький як інтелектуал, дипломат і стратег, що формулює ідею політичної незалежності.
- section: Народні маси як рушійна сила історії у романі
  words: 400
  points:
  - 'Широка панорама суспільства: реєстровики, січовики, посполиті, міщани.'
  - Запорозька Січ як збережений осередок волі та військово-політичної організації.
  - Галерея сподвижників Богдана (Кривоніс, Богун та ін.) як колективний портрет епохи.
- section: Романтичний пафос та реалістична деталізація
  words: 400
  points:
  - Співіснування романтичної героїзації лицарства з жорстким реалізмом батальних
    сцен.
  - Скрупульозна робота автора з історичними джерелами (літописи Величка, праці М.
    Костомарова).
  - Етнографічна точність побуту, звичаїв та військової тактики козаків.
- section: 'Мовна специфіка: Проблема авторського і пізніших перекладів'
  words: 400
  points:
  - '«Внутрішня україномовність» оригіналу: приховані ідіоми, фольклорні вкраплення,
    ритміка.'
  - Складний шлях тексту до українського читача у повноцінному перекладі.
  - Роль якісного художнього перекладу у поверненні твору в лоно національної літератури.
- section: 'Деколонізаційна перспектива: Деконструкція імперського наративу'
  words: 400
  points:
  - Спростування міфу про виключно «класову» чи «релігійну» суть Визвольної війни.
  - Відсутність у трилогії телеологічного імперського фіналу (апології Переяславської
    ради).
  - Фокус на самостійній державотворчій меті Хмельниччини.
- section: 'Українська суб''єктність: Полеміка з польською історіографією'
  words: 300
  points:
  - Літературна дискусія з романом Г. Сенкевича «Вогнем і мечем».
  - Протиставлення образу козацтва як руйнівної стихії (у поляків) образу захисників
    власної землі.
  - Відновлення історичної справедливості та легітимізація права українців на боротьбу.
- section: 'Підсумок та спадщина: Вплив на історичну прозу'
  words: 300
  points:
  - Масштаб впливу трилогії на національну свідомість покоління Визвольних змагань
    1917-1921 рр.
  - Творення канону українського історичного роману для письменників ХХ століття.
  - Актуальність твору в сучасних умовах боротьби за збереження національної суб'єктності.
