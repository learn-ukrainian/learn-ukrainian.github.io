slug: bilyk-sword-ares
title: Bilyk Sword Ares
word_target: 4000
content_outline:
- section: Вступ та контекст епохи
  words: 600
  points:
  - Історичне тло 1970-х років в УРСР (задушлива атмосфера брежнєвського застою, цензура
    В. Маланчука)
  - Феномен виходу роману «Меч Арея» у 1972 році та його шалений успіх
  - 'Репресії радянської системи проти Івана Білика: вилучення твору, знищення тиражу,
    заборона на професію'
- section: 'Аналіз: Сюжет і концепція Богдана Гатила'
  words: 700
  points:
  - 'Ключова гіпотеза твору: ототожнення гунського імператора Аттіли з київським князем
    Богданом Гатилом'
  - Сакральний символ «меча Арея» як артефакт державності та влади на українських
    землях
  - Образ Києва V століття як могутньої європейської столиці, а не провінційного поселення
- section: 'Аналіз: Історичні джерела та наукова дискусія'
  words: 600
  points:
  - 'Джерельна база роману: спирання на нотатки візантійського дипломата Пріска Панійського'
  - Слов'янські маркери у побуті гунів (дерев'яна архітектура, напої мед і квас, одяг,
    традиції)
  - Дискусія між академічною історичною наукою та правом письменника на художню реконструкцію
    (міфологізацію) минулого
- section: Стилістика та мова автора
  words: 600
  points:
  - Епічний розмах та монументалізм оповіді
  - 'Лексичний інструментарій: майстерне використання архаїзмів та історизмів для
    занурення в атмосферу античності'
  - Психологізм героїв на тлі грандіозних батальних та політичних сцен
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 700
  points:
  - Відкидання імперської «нормандської теорії» походження слов'янської державності
  - Деконструкція міфу про «колиску трьох братніх народів» (давньоруську народність)
    шляхом видовження історії вглиб віків
  - Страх радянської цензури перед сепаратистським (самостійницьким) потенціалом твору
- section: 'Деколонізаційна перспектива: Українська суб''єктність'
  words: 600
  points:
  - 'Агентивність українців: предки українців виступають як творці європейської історії,
    а не пасивні спостерігачі'
  - 'Геополітичний паритет: рівноправний діалог Богдана Гатила з правителями Римської
    та Візантійської імперій'
  - 'Терапевтична функція тексту: повернення читачеві почуття національної гідності
    та історичної величі'
- section: Підсумок та спадщина роману
  words: 600
  points:
  - Вплив «Меча Арея» на подальший розвиток української історичної романістики та
    фентезі
  - Відродження роману в роки незалежності та його роль у формуванні новітньої національної
    ідентичності
  - Значення твору як акту інтелектуального спротиву тоталітарній системі
