slug: lys-century-jacob
title: Lys Century Jacob
word_target: 5000
content_outline:
  - section: Вступ та контекст
    words: 1050
    points:
      - Біографічний нарис: Володимир Лис як знавець західнополіського краю та його
          культурної пам'яті.
      - Літературний контекст 2010-х років та феноменальний успіх роману на конкурсі
        «Коронація слова».
      - Історичний контекст Волині: геополітичне перехрестя та постійна зміна державних
          утворень у ХХ столітті.
  - section: 'Аналіз ключових творів: Архітектоніка епосу'
    words: 750
    points:
      - Жанрова природа: «Століття Якова» як багатовимірний біографічний та національний
          епос.
      - Хронотоп роману: три часові площини (сучасність, молодість, старість) та ретроспективний
          наратив.
      - Життя Якова Меха крізь призму п'яти державних режимів (від Російської імперії
        до СРСР).
  - section: 'Аналіз ключових творів: Моральні дилеми героя'
    words: 600
    points:
      - Екзистенційні виклики та психологія простої людини в жорнах великої історії.
      - Любовні лінії (Зося, Уляна) як уособлення історичних епох та міжнаціональних
        відносин на Волині.
      - Трагедії втрат під час Другої світової війни та польсько-українського конфлікту.
  - section: Стилістика та мова автора
    words: 750
    points:
      - Функція західнополіського діалекту: автентичність, психологічний портрет та
          ілюзія живого голосу.
      - Лінгвістичний опір: діалект як захист від уніфікованої радянської/імперської
          мовної норми.
      - Синтез літературного авторського наративу та простомовного світобачення головного
        героя.
  - section: 'Деколонізаційна перспектива: Руйнування міфів'
    words: 750
    points:
      - Деконструкція радянського наративу про «возз'єднання» 1939 року та «Велику
        Вітчизняну війну».
      - Показ тоталітарних режимів (нацистського та комуністичного) як однаково чужих
        і репресивних щодо селянина.
      - Розвінчання імперського міфу про безкласове радянське суспільство через призму
        колгоспного рабства.
  - section: 'Деколонізаційна перспектива: Українська суб''єктність'
    words: 600
    points:
      - Специфіка української суб'єктності: збереження національної ідентичності та
          морального стрижня без власної держави.
      - Концепт «селянської вітальності»: здатність вижити і дати життя новому поколінню
          як форма незламного спротиву.
      - Перехід від об'єкта історичних маніпуляцій до суб'єкта власної долі.
  - section: Підсумок та спадщина
    words: 500
    points:
      - Вплив «Століття Якова» на ренесанс української історичної романістики у XXI
        столітті.
      - Медійна спадщина: екранізація 2016 року та закріплення образу Якова у масовій
          свідомості.
      - Терапевтичне значення твору для подолання колективної травми українського
        народу.
