slug: hist-fic-synthesis
title: 'Синтез: Палімпсести пам''яті'
word_target: 5000
content_outline:
  - section: 'Діахронний аналіз: I — Еволюція ключових ідей'
    words: 500
    points:
      - 'Концепт «палімпсесту»: від пергаменту до метафори культурної пам''яті та
        стирання ідентичності'
      - Від романтичного захоплення минувшиною до екзистенційного осмислення історичної
        травми в літературі ХХ століття
  - section: 'Діахронний аналіз: II — Діалог з попередниками'
    words: 500
    points:
      - 'Інтертекстуальність: як сучасні автори (О. Забужко, Ю. Андрухович) розкодовують
        тексти репресованих поколінь'
      - 'Літературна тяглість: феномен «перегукування» епох попри радянські спроби
        перервати традицію'
  - section: 'Деколонізаційна оптика: I — Стратегії інтелектуального опору'
    words: 500
    points:
      - 'Історичний антураж як камуфляж: езопівська мова української романістики 1960–1980-х
        років'
      - Осмислення феномену «яничарства» та втрати пам'яті на прикладі роману Р. Іваничука
        «Мальви»
  - section: 'Деколонізаційна оптика: II — Деконструкція імперського наративу'
    words: 500
    points:
      - Руйнування радянського міфу про «спільну колиску» та вічну підпорядкованість
        України
      - 'Археологія пам''яті в «Музеї покинутих секретів» О. Забужко: викриття тяглості
        репресивних практик від МДБ до сучасності'
  - section: 'Стилістичний калейдоскоп: I — Порівняльний аналіз технік'
    words: 500
    points:
      - 'Еволюція форми: від монументального епосу (П. Загребельний) до постмодерної
        поліфонії і колажу'
      - Поєднання документалістики, містики та психологічного аналізу в українському
        історичному наративі
  - section: 'Стилістичний калейдоскоп: II — Трансформація літературної мови'
    words: 500
    points:
      - 'Деколонізація синтаксису і лексики: повернення вилучених слів та автентичних
        мовних конструкцій'
      - 'Стилізація як засіб занурення в епоху: мовні експерименти Валерія Шевчука
        та Ліни Костенко'
  - section: 'Філософія ідентичності: I — Конструювання суб''єкта'
    words: 500
    points:
      - 'Подолання віктимного дискурсу: перехід від образу українця-жертви до образу
        активного суб''єкта історії'
      - Психологія поразки та національного воскресіння у романі у віршах Л. Костенко
        «Берестечко»
  - section: 'Філософія ідентичності: II — Національна етика'
    words: 500
    points:
      - Проблема зради, лояльності та морального вибору в умовах бездержавності
      - 'Формування етичного імперативу: пам''ять як обов''язок перед мертвими, живими
        і ненародженими'
  - section: 'Спадщина: I — Вплив на сучасний процес'
    words: 500
    points:
      - Історична проза як матриця для літератури українського спротиву після 2014
        року
      - '«Сталева нитка»: як досвід УПА та дисидентів резонує в текстах письменників-військових
        сьогодення'
  - section: 'Спадщина: II — Канон та інтелектуальна безпека'
    words: 500
    points:
      - Літературний канон як базова складова національної безпеки та захисту від
        інформаційно-психологічних операцій
      - Значення історичної романістики для формування стійкості (resilience) українського
        суспільства
