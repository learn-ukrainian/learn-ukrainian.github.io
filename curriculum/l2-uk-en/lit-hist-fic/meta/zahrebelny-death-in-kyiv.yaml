slug: zahrebelny-death-in-kyiv
title: "«Смерть у Києві»: Загребельний і Парсуна Давньоруського Правителя"
word_target: 5000
content_outline:
  - section: 'Вступ: Історичний контекст епохи'
    words: 400
    points:
      - Політична ситуація на Русі середини ХІІ століття та міжкнязівські усобиці.
      - Прибуття Юрія Довгорукого до Києва у 1155 році.
      - Вороже сприйняття чужинського князя київською громадою.
  - section: 'Вступ: Місце роману в циклі «Русь»'
    words: 400
    points:
      - Видання роману 1973 року в контексті творчості Павла Загребельного.
      - Зв'язок із творами «Диво» та «Первоміст».
      - Пошук національної ідентичності через історичну прозу 1970-х років.
  - section: 'Аналіз: Образ Юрія Довгорукого'
    words: 600
    points:
      - Деконструкція російського міфу про ідеалізованого 'збирача земель'.
      - 'Психологічний портрет Юрія: амбіції, самотність та відчуження.'
      - Трагедія володаря, який прагне підкорити місто, що його не приймає.
  - section: 'Аналіз: Київ проти Суздаля'
    words: 600
    points:
      - Зіткнення двох різних цивілізаційних векторів і політичних культур.
      - Київ як осередок вічової демократії, договірного права та європейських традицій.
      - Суздаль і Залісся (зокрема через постать Андрія Боголюбського) як колиска
        азійського авторитаризму.
  - section: 'Аналіз: Роль боярства та містян'
    words: 500
    points:
      - Кияни як потужний колективний суб'єкт історичного процесу.
      - 'Постать боярина Петрила: інтриги чи захист міської автономії?'
      - Отруєння князя у 1157 році як акт політичного опору тиранії.
  - section: 'Стилістика: Психологізм та монологи'
    words: 500
    points:
      - Глибоке проникнення у внутрішній світ історичних постатей.
      - Використання потоку свідомості для розкриття сумнівів правителя.
      - Психологічна напруга як рушій сюжету замість прямолінійного екшену.
  - section: 'Стилістика: Мова та колорит'
    words: 500
    points:
      - Майстерна стилізація оповіді під літописну традицію.
      - Використання архаїзмів та історизмів для занурення в епоху.
      - Створення автентичного звукового та культурного ландшафту давнього Києва.
  - section: 'Деколонізація: Руйнування імперського міфу'
    words: 550
    points:
      - Подолання концепції 'спільної колиски братніх народів'.
      - 'Езопова мова письменника: антиімперський підтекст в умовах радянської цензури.'
      - Демонстрація світоглядної прірви між Україною-Руссю та майбутньою Московією.
  - section: 'Деколонізація: Українська суб''єктність'
    words: 550
    points:
      - Ствердження прямої спадкоємності між Київською Руссю та Україною.
      - Захист київськими елітами своїх прав як прояв ранньої національної свідомості.
      - Смерть узурпатора як перемога київського вільнолюбного духу.
  - section: 'Підсумок: Спадщина та значення'
    words: 400
    points:
      - Вручення роману Шевченківської премії 1974 року.
      - Вплив твору на формування історичної свідомості українців.
      - Сучасне перепрочитання роману в умовах остаточного розриву з російським історичним
        наративом.
