slug: ivanychuk-scar
title: "«Шрами на скалі»: Роман Іваничук і Трагедія Карпатської Гуцульщини"
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Історичне тло'
    words: 400
    points:
      - Літературний і суспільний клімат України у 1980-х роках.
      - Роль історичного роману як форми збереження національної пам'яті (передумови
        виникнення твору).
  - section: 'Вступ та контекст: II — Історія написання роману'
    words: 400
    points:
      - Відвідини Романом Іваничуком Тустані як поштовх до створення тексту.
      - Публікація твору в 1987 році видавництвом «Каменяр».
  - section: 'Аналіз ключових творів: I — Сюжетні лінії та часові простори'
    words: 550
    points:
      - 'Триярусна композиція тексту: епоха Русі, початок ХХ століття та сучасність
        (1980-ті).'
      - Функція сучасного оповідача-археолога/дослідника.
  - section: 'Аналіз ключових творів: II — Образ Івана Франка та поема «Мойсей»'
    words: 600
    points:
      - Реконструкція 1913 року та святкування 40-річчя творчості Франка.
      - 'Осмислення Франком власного шляху через парадигму Мойсея: провідник і його
        народ.'
  - section: 'Аналіз ключових творів: III — Данило Галицький і Митуса'
    words: 600
    points:
      - 'Аналіз конфлікту ХІІІ століття: державницький прагматизм князя Данила проти
        свободи співця Митуси.'
      - Трагедія Болохівської землі та моральний вибір митця.
  - section: 'Стилістика та мова автора: I — Художній домисел і документалістика'
    words: 500
    points:
      - 'Методика Іваничука: органічне поєднання літописних згадок, епістолярію та
        художньої уяви.'
      - Оживлення архівних документів через літературну форму.
  - section: 'Стилістика та мова автора: II — Поліфонія і наративна структура'
    words: 500
    points:
      - Багатоголосся тексту та переплетення різних стилістичних регістрів (від літописного
        стилю до модерністської рефлексії).
      - Взаємодія історичних персонажів (Франко, Стефаник, Леся Українка) у тексті.
  - section: 'Деколонізаційна перспектива: I — Як цей автор руйнує імперські міфи'
    words: 550
    points:
      - Деконструкція радянського спрощеного образу Франка-«революціонера».
      - Повернення постаті Франка складності, трагізму та національно-духовної місії.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
    words: 500
    points:
      - Проблема взаємин влади і митця (Данило і Митуса) як проекція на український
        антитоталітарний спротив.
      - Ствердження права культури на незалежність від державних ідеологем.
  - section: Підсумок та спадщина
    words: 500
    points:
      - Символіка «шрамів на скалі» як метафори незнищенності історичної та культурної
        пам'яті.
      - Місце роману в українській історичній прозі ХХ століття та його вплив на покоління
        Незалежності.
