slug: shklyar-black-raven-2
title: Shklyar Black Raven 2
word_target: 5000
content_outline:
  - section: 'Вступ та контекст: I — Історичне тло Холодного Яру'
    words: 500
    points:
      - 'Огляд історичних реалій Центральної України 1919-1922 років: більшовицька
        окупація та політика «воєнного комунізму».'
      - Феномен Холодноярської республіки як центру організованого та масового партизанського
        спротиву.
      - Формування поняття «залишенець» — військового регулярної армії УНР, що переходить
        до партизанської тактики без надії на зовнішню допомогу.
  - section: 'Вступ та контекст: II — Історія написання та суспільний резонанс'
    words: 350
    points:
      - Багаторічна робота Василя Шкляра у розсекречених архівах СБУ, вивчення кримінальних
        справ чекістів.
      - Вихід бестселера у 2009 році та перелом у читацькій рецепції української історії.
      - Відмова Шкляра від Шевченківської премії у 2011 році на знак протесту проти
        політики Дмитра Табачника та феномен збору «народної премії».
  - section: 'Аналіз ключових творів: I — Архітектоніка роману «Чорний ворон»'
    words: 600
    points:
      - 'Аналіз сюжетної багатолінійності: переплетення динамічних мілітарних сцен
        із ретроспективними та ліричними відступами.'
      - 'Специфіка хронотопу роману: замкнений простір лісу, що стає сакральною фортецею.'
      - Функція містичних елементів, зокрема образу віщого ворона, як втілення фатуму
        та безсмертя повстанського духу.
  - section: 'Аналіз ключових творів: II — Психологічний портрет Залишенця'
    words: 500
    points:
      - Детальний аналіз архетипу незламного воїна на прикладі головного героя Чорновуса.
      - Дослідження внутрішнього конфлікту між екзистенційною тягою до життя (любовна
        лінія з Тіною) та жорстоким обов'язком.
      - Трансформація відчаю у «свободу перед лицем смерті», що робить героя непереможним.
  - section: 'Аналіз ключових творів: III — Система антагоністів'
    words: 350
    points:
      - Літературна деконструкція репресивного апарату на прикладі чекістів Птіцина
        та Євдокімова.
      - Дослідження фізіології імперського садизму, позбавленого карикатурності.
      - Аналіз психології зради та конформізму серед місцевого населення як інструменту
        окупаційної влади.
  - section: 'Стилістика та мова автора: I — Документалізм та художня вигадка'
    words: 500
    points:
      - 'Синтез жанрів: поєднання художньої фікції з суворим документалізмом.'
      - Ефект інкорпорації реальних текстів розстрільних вироків, допитів та рапортів
        ЧК у художню тканину роману.
      - Збереження справжніх прізвищ, позивних та агентурних псевдонімів історичних
        осіб для створення ефекту абсолютної достовірності.
  - section: 'Стилістика та мова автора: II — Лексичний колорит та мовна автентичність'
    words: 500
    points:
      - Реконструкція наддніпрянської говірки та військового сленгу українських повстанців
        1920-х років.
      - Майстерне використання соковитої лайки як інструменту психологічної розрядки
        в умовах екстремального стресу.
      - 'Контрастна стилістична диференціація: жива українська мова протиставляється
        канцелярському російському суржику карателів.'
  - section: 'Деколонізаційна перспектива: I — Руйнування імперських міфів'
    words: 500
    points:
      - Послідовне спростування радянського пропагандистського кліше про холодноярців
        як про «бандитів-головорізів».
      - Демонстрація військової дисципліни, присяги та регулярної армійської структури
        повстанських формувань УНР.
      - Розкриття підлої природи чекістських «амністій-пасток» та механізмів червоного
        терору на селі.
  - section: 'Деколонізаційна перспектива: II — Українська суб''єктність у тексті'
    words: 500
    points:
      - 'Переосмислення історичної поразки як духовної перемоги: повстанці є суб''єктами
        власної долі, а не жертвами обставин.'
      - Відкидання віктимного наративу української літератури на користь агресивного
        мілітарного міфу «народу-воїна».
      - Утвердження свідомого політичного вибору — здобуття незалежності або героїчної
        смерті в бою.
  - section: 'Підсумок та спадщина: I — Сучасна рецепція роману'
    words: 350
    points:
      - Значення «Чорного ворона» для формування нової історичної пам'яті покоління
        Незалежності.
      - Резонанс екранізації 2019 року та візуалізація літературного образу в масовій
        українській культурі.
      - Дискусії в академічному середовищі щодо меж допустимої жорстокості у зображенні
        збройного опору.
  - section: 'Підсумок та спадщина: II — Культурний та мілітарний вплив'
    words: 350
    points:
      - Актуалізація гасла «Воля України або смерть!» після початку російсько-української
        війни у 2014 році.
      - Ідейний зв'язок між повстанцями Холодного Яру та сучасними Збройними Силами
        України.
      - Роль Василя Шкляра як ключового творця мілітарного постколоніального роману
        в сучасній українській літературі.
