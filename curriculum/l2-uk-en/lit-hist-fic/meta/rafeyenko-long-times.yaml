content_outline:
- section: 'Вступ та контекст: Життєпис Володимира Рафєєнка'
  words: 350
  points:
  - Народження у Донецьку у 1969 році та формування письменника в російськомовному
    середовищі.
  - Успішна літературна кар'єра до 2014 року.
- section: 'Вступ та контекст: Переїзд з Донецька та мовний злам'
  words: 400
  points:
  - Вплив російської окупації 2014 року на життя автора та його вимушений переїзд
    на Київщину.
  - Свідома відмова від російської мови та процес інтеграції в україномовний культурний
    простір.
- section: 'Аналіз ключових творів: Структура та композиція роману «Довгі часи»'
