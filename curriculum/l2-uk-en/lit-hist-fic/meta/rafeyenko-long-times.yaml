  - Мовна гра та стилістичний ескапізм героїв роману.
- section: 'Стилістика та мова автора: Проблема перекладу та голос роману'
  words: 350
  points:
  - Значення перекладу Маріанни Кіяновської для інтеграції тексту в український літературний
    канон.
  - Як переклад підкреслює деколонізаційний вектор роману.
- section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
  words: 450
  points:
  - Спростування міфу про «русскую весну» та добровільне повернення в лоно імперії.
  - Деконструкція наративу про «громадянську війну».
- section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
  words: 350
  points:
  - Презентація Донбасу як невід'ємної частини українського тіла, що страждає від
