content_outline:
  - section: 'Вступ та контекст: Життєпис Володимира Рафєєнка'
    words: 450
    points:
      - Народження у Донецьку у 1969 році та формування письменника в російськомовному
        середовищі.
      - Успішна літературна кар'єра до 2014 року.
  - section: 'Вступ та контекст: Переїзд з Донецька та мовний злам'
    words: 500
    points:
      - Вплив російської окупації 2014 року на життя автора та його вимушений переїзд
        на Київщину.
      - Свідома відмова від російської мови та процес інтеграції в україномовний культурний
        простір.
  - section: 'Аналіз ключових творів: Структура та композиція роману «Довгі часи»'
    words: 550
    points:
      - 'Двочастинна архітектура тексту: поєднання містичної казки та реалістичних
        новел.'
      - Взаємодія фантастичного і буденного як спосіб розкриття травми.
  - section: 'Аналіз ключових творів: Місто Z як метафора окупованого Донецька'
    words: 550
    points:
      - Місто Z як простір некротичного абсурду, де час зупинився.
      - Аналіз центрального міфопоетичного образу роману — лазні «П'ятий Рим».
  - section: 'Аналіз ключових творів: Магічний реалізм та абсурд війни'
    words: 550
    points:
      - Магічний реалізм як єдиний адекватний інструмент для опису ірраціональної
        реальності окупації.
      - Інфернальні та хтонічні сили як уособлення ворога.
  - section: 'Стилістика та мова автора: Гротеск та іронія в тексті'
    words: 500
    points:
      - Чорний гумор та постмодерністський гротеск у деконструкції радянських та російських
        міфологем.
      - Мовна гра та стилістичний ескапізм героїв роману.
  - section: 'Стилістика та мова автора: Проблема перекладу та голос роману'
    words: 450
    points:
      - Значення перекладу Маріанни Кіяновської для інтеграції тексту в український
        літературний канон.
      - Як переклад підкреслює деколонізаційний вектор роману.
  - section: 'Деколонізаційна перспектива: Руйнування імперських міфів'
    words: 550
    points:
      - Спростування міфу про «русскую весну» та добровільне повернення в лоно імперії.
      - Деконструкція наративу про «громадянську війну».
  - section: 'Деколонізаційна перспектива: Українська суб''єктність у тексті'
    words: 450
    points:
      - Презентація Донбасу як невід'ємної частини українського тіла, що страждає
        від ампутації.
      - Способи спротиву героїв абсурдній системі окупації.
  - section: 'Підсумок та спадщина: Місце Рафєєнка в сучасній літературі'
    words: 450
    points:
      - Вплив роману «Довгі часи» на розуміння російсько-української війни у світі.
      - Фігура Володимира Рафєєнка як символ культурної свідомості та інтелектуальної
        деколонізації.
