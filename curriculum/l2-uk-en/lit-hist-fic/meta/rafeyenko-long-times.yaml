  - Способи спротиву героїв абсурдній системі окупації.
- section: 'Підсумок та спадщина: Місце Рафєєнка в сучасній літературі'
  words: 350
  points:
  - Вплив роману «Довгі часи» на розуміння російсько-української війни у світі.
  - Фігура Володимира Рафєєнка як символ культурної свідомості та інтелектуальної
