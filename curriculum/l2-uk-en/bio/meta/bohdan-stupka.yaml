slug: bohdan-stupka
title: 'Богдан Ступка: Гетьман сцени'
word_target: 5000
content_outline:
- section: 'Вступ — Актор №1: Патріарх української сцени'
  words: 400
  points:
  - Богдан Ступка як символ українського театру і кіно зламу епох.
  - 'Унікальний статус: народний артист, Герой України, лауреат Шевченківської премії.'
  - 'Акторський діапазон: від психологічної драми до історичного епосу.'
  - 'Значення постаті: людина, яка зробила українську культуру престижною.'
- section: 'Львівський період: Становлення у театрі Заньковецької'
  words: 500
  points:
  - Навчання у студії при театрі ім. М. Заньковецької (1961).
  - Вплив родини та мистецької атмосфери Львова.
  - Зустріч з режисером Сергієм Данченком як визначальний момент кар'єри.
  - 'Робота над технікою: поєднання музикальності, пластики та інтелекту.'
- section: 'Львівський період: Перші знакові ролі'
  words: 500
  points:
  - Микола Задорожний в 'Украденому щасті' (1976) — руйнування стереотипу 'забитого
    селянина'.
  - Психологічна глибина та екзистенційний вимір класичних образів.
  - Інші важливі ролі львівського періоду (Дон Хуан, Річард III).
  - Здобуття визнання та звання Народного артиста УРСР (1980).
- section: 'Київ і Театр Франка: Тандем з Данченком'
  words: 550
  points:
  - Переїзд до Києва у 1978 році разом із Сергієм Данченком.
  - Виклики столичної сцени та адаптація в колективі.
  - Спільне творення 'золотого віку' театру Франка.
  - 'Ключові вистави 80-90-х: ''Дядя Ваня'', ''Король Лір'', ''Енеїда''.'
- section: 'Київ і Театр Франка: Тев''є-Тевель як роль життя'
  words: 600
  points:
  - Прем'єра вистави 'Тев'є-Тевель' (1989) та її феноменальний успіх.
  - 'Образ Тев''є: філософія, гумор та розмова з Богом.'
  - 'Визнання Белл Кауфман: Ступка як ''найкращий Тев''є світу''.'
  - Довголіття вистави (понад 350 показів) та її значення для актора.
- section: 'Кінокар''єра: Дебют у ''Білому птасі'''
  words: 600
  points:
  - Дебют у фільмі Юрія Іллєнка 'Білий птах з чорною ознакою' (1971).
  - 'Роль Ореста Дзвонаря: воїн УПА як трагічний герой, а не карикатурний злодій.'
  - Феномен 'негативної чарівності' Ступки.
  - Значення фільму для українського поетичного кіно.
- section: 'Кінокар''єра: Історичні постаті та гетьмани'
  words: 650
  points:
  - 'Галерея історичних образів: Хмельницький, Мазепа, Брюховецький, Чингісхан.'
  - 'Богдан Хмельницький у ''Вогнем і мечем'' Єжи Гоффмана: політик і воїн.'
  - 'Іван Мазепа у ''Молитві...'' Юрія Іллєнка: спроба деколонізації образу.'
  - 'Суперечливість фільму ''Тарас Бульба'' (2009): геніальна гра в імперському контексті.'
- section: 'Міністр культури: ''Оборона культури'''
  words: 400
  points:
  - Робота на посаді Міністра культури і мистецтв (1999-2001) в уряді Ющенка.
  - Концепція 'міністерства оборони культури'.
  - Спроби реформ та просування українського мистецтва.
  - Розчарування в бюрократії та повернення до творчості.
- section: 'Останні роки: Філософія та прощання'
  words: 400
  points:
  - Діяльність на посаді художнього керівника театру Франка (2001-2012).
  - 'Філософські роздуми про життя: ''життя — це джаз''.'
  - Боротьба з хворобою та мужність останніх днів.
  - Смерть (2012) та всенародне прощання. Династія Ступок.
- section: 'Дискусія: Відповідальність митця'
  words: 400
  points:
  - Аналіз впливу актора на формування національної ідентичності.
  - Чи може талант виправдати участь у суперечливих проектах?
  - 'Спадщина Ступки: стандарти акторської майстерності.'
  - 'Мрія Ступки: щоб українська культура стала модною.'
