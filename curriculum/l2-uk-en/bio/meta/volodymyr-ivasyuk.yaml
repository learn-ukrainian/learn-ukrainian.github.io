slug: volodymyr-ivasyuk
title: 'Володимир Івасюк: Автор Червоної рути'
word_target: 5000
content_outline:
- section: Вступ — Пісня, яка стала гімном
  words: 400
  points:
  - Феномен «Червоної рути» як культурного вибуху та створення європейського саунду
    на національній основі
  - Івасюк як свідомий творець модерного музичного бренду України
  - Перетворення естрадної пісні на неофіційний гімн нації
- section: Буковинське дитинство
  words: 400
  points:
  - Народження в Кіцмані (1949) у родині репресованого письменника Михайла Івасюка
  - 'Багатокультурне середовище Буковини: поєднання українських, єврейських, румунських
    фольклорних мотивів'
  - 'Ранній музичний талант: клас скрипки з 5 років, абсолютний слух та родинна повага
    до слова'
- section: 'Студентські роки та перші пісні: I — Випробування системою'
  words: 450
  points:
  - Вступ до Чернівецького медичного інституту
  - Інцидент із поваленням бюста Леніна у 1966 році та виключення з інституту першого
    ж дня
  - Робота токарем на заводі «Легмаш» як покарання від радянської влади
- section: 'Студентські роки та перші пісні: II — Музичні експерименти'
  words: 450
  points:
  - Відновлення навчання та створення ансамблю «Буковина»
  - Написання пісні «Я піду в далекі гори»
  - 'Експерименти з ритмікою: використання карпатських синкоп у поєднанні з гітарними
    рифами'
- section: 'Тріумф Червоної рути: I — Народження хіта'
  words: 500
  points:
  - Пошуки легенди про червону руту у збірнику коломийок В. Гнатюка (1968)
  - Довга робота над текстом і мелодією, використання численних чернеток
  - Історична прем'єра 13 вересня 1970 року на Театральній площі Чернівців
- section: 'Тріумф Червоної рути: II — Всесоюзний успіх'
  words: 500
  points:
  - Прямий телеефір та миттєве перетворення пісень «Червона рута» і «Водограй» на
    хіти
  - 'Тріумф на всесоюзному фестивалі «Пісня-71» у Москві: тріо Івасюк, Зінкевич, Яремчук'
  - Виведення української мови в прайм-тайм центрального радянського телебачення;
    цитата Івасюка про таврування українців «націоналістами»
- section: 'Творча спадщина: I — Львівський період і співпраця'
  words: 450
  points:
  - 'Переїзд до Львова у 1972 році: навчання у медінституті та консерваторії'
  - Плідна співпраця з Софією Ротару, для якої він написав свої найкращі естрадні
    пісні
  - Робота над текстами з поетами Богданом Стельмахом та Ростиславом Братунем
- section: 'Творча спадщина: II — Класичні амбіції'
  words: 450
  points:
  - Навчання в класі композиції Анатолія Кос-Анатольського
  - Спростування міфу про Івасюка як автора виключно легких естрадних шлягерів
  - 'Еволюція до класики: Сюїта-варіації для камерного оркестру та амбіції стати професійним
    класичним композитором'
- section: 'Загадкова смерть: I — Переслідування та загибель'
  words: 500
  points:
  - Тотальне стеження КДБ та відмова Івасюка писати пісні до ювілею Переяславської
    ради
  - Зникнення 24 квітня 1979 року та знайдення тіла 18 травня у Брюховицькому лісі
  - Спростування офіційної версії про самогубство (сліди тортур, чистий одяг після
    дощів) та розбір методів КДБ з дискредитації
- section: 'Загадкова смерть: II — Похорон як протест'
  words: 450
  points:
  - Спроби влади зірвати процесію призначенням комсомольських зборів на 22 травня
  - Похорон на Личаківському цвинтарі за участю понад 10 тисяч осіб; спалення спецслужбами
    принесених квітів
  - Перетворення похорону на масову мовчазну акцію громадянської непокори системі;
    цитата Зінкевича про спробу системи «вбити національну радість»
- section: Дискусія — Мистецтво як опір
  words: 450
  points:
  - Популярність Івасюка (дисидента в музиці) як несумісна з планами Москви щодо тотальної
    русифікації
  - Тотальна заборона на його ім'я та знищення архівів у 1980-х роках, паралель з
    Розстріляним відродженням
  - Фестиваль «Червона рута» 1989 року як каталізатор відродження української ідентичності
    та розпаду СРСР
