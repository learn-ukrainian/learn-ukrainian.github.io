slug: hnat-khotkevych
title: 'Гнат Хоткевич: Бандурист, письменник, жертва Розстріляного відродження'
word_target: 5000
content_outline:
- section: 'Вступ: Феномен людини-оркестра'
  words: 450
  points:
  - 'Хоткевич як ренесансна особистість: письменник, бандурист, інженер та режисер'
  - Універсальність таланту та його трагічна доля в епоху сталінізму
  - Символ збереження національного духу та жертва Розстріляного відродження
- section: 'Харківська молодість: I — Походження та освіта'
  words: 450
  points:
  - Народження 1877 року в Харкові в незаможній родині ремісника
  - Здобуття фаху інженера в Харківському технологічному інституті
  - Роль самоосвіти та формування свідомої української позиції в русифікованому місті
- section: 'Харківська молодість: II — Театральні пошуки та захоплення бандурою'
  words: 450
  points:
  - Знайомство з харківськими кобзарями та самостійне опанування інструмента
  - Студентська театральна діяльність
  - Історичний виступ ансамблю кобзарів на Археологічному з'їзді 1902 року
- section: 'Революція та еміграція: I — Участь у революції 1905 року'
  words: 400
  points:
  - Соціальна активність та керівництво політичним страйком залізничників
  - Переслідування російською владою та небезпека арешту
  - Вимушена втеча до Галичини, яка перебувала під владою Австро-Угорщини
- section: 'Революція та еміграція: II — Гуцульський період і театр у Красноїллі'
  words: 500
  points:
  - Захоплення культурою Карпат та життя серед гуцулів
  - Заснування Гуцульського театру (1910) з неписьменними селянами-акторами
  - Етнографічні експедиції та дослідження автентичних традицій
- section: 'Бандура як місія: I — Відродження традиції та концерти'
  words: 450
  points:
  - Трансформація бандури з народного інструмента в академічний
  - Повернення до підросійської України, концерти та лекції
  - Бандура як потужний символ української національної ідентичності
- section: 'Бандура як місія: II — «Підручник гри на бандурі»'
  words: 500
  points:
  - 'Систематизація знань: вихід фундаментального «Підручника...» у 1928 році'
  - Заснування харківської школи гри на бандурі (гра обома руками)
  - Початок радянського ідеологічного тиску на кобзарське мистецтво
- section: 'Літературна спадщина: I — Гуцульська проза та «Камінна душа»'
  words: 450
  points:
  - Літературний дебют і розвиток таланту
  - Повість «Камінна душа» (1911) як класика модерної української прози
  - Паралелі з Михайлом Коцюбинським у розкритті гуцульської міфології
- section: 'Літературна спадщина: II — Етнографічні праці та драматургія'
  words: 450
  points:
  - Наукові та публіцистичні розвідки про український побут та архітектуру
  - 'Драматургічна творчість: історичні та побутові п''єси'
  - Значення перекладів світової класики для збагачення українського театру
- section: 'Спадщина: I — Розстріляний відродженець і репресії'
  words: 450
  points:
  - Наступ Великого терору та переслідування української інтелігенції
  - Безпідставний арешт 1938 року, фальсифікація справи про шпигунство
  - Розстріл Гната Хоткевича та масштабне знищення кобзарів в СРСР
- section: 'Спадщина: II — Деколонізація пам''яті та реабілітація'
  words: 450
  points:
  - Посмертна реабілітація (1956), але тривале замовчування його значення
  - Повернення постаті Хоткевича в український культурний простір після незалежності
  - Деколоніальний погляд на його спадщину як фундамент українського опору
