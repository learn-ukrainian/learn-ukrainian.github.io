slug: petro-veskliaov
title: 'Дід Панас: Казкар нації'
word_target: 5000
content_outline:
- section: Вступ — Дідусь усіх українських дітей
  words: 600
  points:
  - Петро Вескляров (Дід Панас) — постать-символ українського телебачення 1960–80-х
    років.
  - 'Програма «Вечірня казка» (1964–1988): ритуал вечірнього затишку для мільйонів
    дітей.'
  - 'Унікальний статус: україномовний ведучий у зросійщеному інформаційному просторі
    УРСР.'
  - 'Листи до Діда Панаса: феномен зворотного зв''язку та дитячої довіри.'
- section: 'Театральний шлях: Від Пінхаса до Петра'
  words: 800
  points:
  - 'Походження з Тального: єврейське коріння (Пінхас Вескляр) та українська ідентичність.'
  - 'Трагедія Другої світової: полон, втеча з фільтраційного табору та зміна імені
    задля виживання.'
  - 'Провінційна сцена: робота у театрах Черкас, Луцька та Рівного (1930–50-ті).'
  - 'Кінематограф: характерні ролі другого плану («Вій», «Іванна», «Забудьте слово
    смерть»).'
- section: 'Народження легенди: Шлях до ефіру'
  words: 800
  points:
  - Переїзд до Києва (1959) та пошук свого місця на столичному телебаченні.
  - 'Заміна попереднього «дідуся» (Габріеля Нелідова): як Вескляров виграв конкуренцію.'
  - 'Візуальний код: вишиванка, сиві вуса та «домашня» манера спілкування як антитеза
    офіціозу.'
  - 'Технічні умови: робота у прямому ефірі без суфлерів та запису.'
- section: 'Українська мова в ефірі: Тихий спротив'
  words: 800
  points:
  - 'Мовний ландшафт УРСР 1970-х: домінування російської мови та маргіналізація української.'
  - 'Дід Панас як мовний еталон: збереження питомої лексики, інтонацій та фразеологізмів.'
  - 'Імпровізація проти цензури: як Вескляров «олюднював» затверджені ідеологічні
    тексти.'
  - Казка як спосіб передачі національного культурного коду наступним поколінням.
- section: 'Легенди та міфи: «Отака... малята»'
  words: 600
  points:
  - 'Найвідоміша фраза, якої (ймовірно) не було: анатомія міфу.'
  - 'Версії походження легенди: технічний збій, помста звукорежисерів чи народна фантазія?'
  - 'Психологія міфу: чому українці прагнуть вірити в бунтарство улюбленого казкаря.'
  - 'Реальні конфлікти з керівництвом Держтелерадіо: за що насправді критикували Весклярова.'
- section: 'Самотність і пам''ять: Останні роки'
  words: 600
  points:
  - 'Звільнення у 1988 році: формальні причини та реальний контекст (закат епохи Щербицького).'
  - 'Життя після ефіру: забуття, побутові труднощі та спілкування з сусідами.'
  - 'Смерть 5 січня 1994 року: тихий відхід легенди.'
  - 'Посмертний ренесанс: Дід Панас у сучасній поп-культурі (музика, меми, YouTube).'
- section: Дискусія — Роль казки у вихованні
  words: 800
  points:
  - 'Архетип Діда-Наставника: психологічна потреба дитини у мудрому старшому другові.'
  - 'Живе слово проти цифрового контенту: що втрачають сучасні діти.'
  - 'Вплив особистості оповідача на сприйняття тексту: чому ми пам''ятаємо Діда Панаса,
    а не казки.'
  - 'Проблема національного героя для дітей: хто замінив Діда Панаса в незалежній
    Україні?'
