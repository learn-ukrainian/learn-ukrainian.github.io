slug: olha-basarab
title: 'Ольга Басараб: Розвідниця і мучениця'
word_target: 5000
content_outline:
- section: 'Вступ: Символ жіночого героїзму'
  words: 400
  points:
  - Ольга Басараб як ікона українського підпілля та жіночої незламності.
  - Трагічна загибель 1924 року як каталізатор національного спротиву.
  - Значення її фігури для формування етосу ОУН.
- section: 'Молодість: I — Родинне коріння та освіта'
  words: 500
  points:
  - Походження зі священничої родини Левицьких (с. Підгороддя).
  - 'Європейська освіта: Вайсвассер, Перемишль, Відень.'
  - 'Формування світогляду: поєднання традицій та модерної емансипації.'
- section: 'Молодість: II — Громадський активізм'
  words: 500
  points:
  - Участь у «Пласті», «Січі» та жіночих організаціях.
  - Шлюб з Дмитром Басарабом (1914) — союз однодумців.
  - Активна позиція в українському житті Львова перед війною.
- section: 'Війна: I — Благодійність та «Комітет допомоги»'
  words: 500
  points:
  - Початок Першої світової війни та мобілізація жіноцтва.
  - Робота в «Українському жіночому комітеті допомоги пораненим».
  - Загибель чоловіка на італійському фронті (1915) та особиста трагедія.
- section: 'Війна: II — Перші кроки у підпіллі'
  words: 500
  points:
  - Співпраця з Українськими Січовими Стрільцями (УСС).
  - Організація допомоги інтернованим та військовополоненим.
  - Формування перших навичок конспірації та агентурної роботи.
- section: 'Розвідка: I — Дипломатія та шпигунство'
  words: 600
  points:
  - Секретар українського посольства у Фінляндії — дипломатичне прикриття.
  - Розвідувальні місії до Німеччини, Данії, Норвегії.
  - Збір військово-стратегічної інформації для уряду УНР та УВО.
- section: 'Розвідка: II — Зв''язкова Коновальця'
  words: 600
  points:
  - Повернення до Львова (1923) та подвійне життя.
  - Роль особистої зв'язкової Євгена Коновальця.
  - Координація підпільної мережі та фінансових потоків УВО.
- section: 'Загибель: I — Арешт і слідство'
  words: 600
  points:
  - Провал та арешт 9 лютого 1924 року польською поліцією.
  - Обшук на квартирі та вилучення розвідувальних матеріалів.
  - 'Жорстокі допити у в''язниці «Бригідки»: психологічний та фізичний тиск.'
- section: 'Загибель: II — Мученицька смерть'
  words: 600
  points:
  - 'Загадкова смерть у ніч на 13 лютого: версія «самогубства».'
  - Сліди тортур (електрострум, побої) та фальсифікація поліції.
  - Ексгумація та похорон як масова політична демонстрація.
- section: 'Пам''ять: Культ та спадщина'
  words: 400
  points:
  - Ольга Басараб як «Свята Ольга» націоналістичного підпілля.
  - Вплив на творчість Олени Теліги та виховання молоді.
  - 'Вшанування в сучасній Україні: вулиці, пам''ятники, музеї.'
