id: volodymyr-vernadskyi
version: '1'
slug: volodymyr-vernadskyi
title: 'Володимир Вернадський: Батько української науки'
word_target: 5000
content_outline:
- section: Вступ — Вчений, який змінив науку
  words: 400
  points:
  - 'Вернадський як мислитель планетарного масштабу: поєднання геології та філософії'
  - Українське коріння та світовий контекст його ідей
  - Символ інтелектуальної потужності нації
- section: 'Життєпис: I — Від козацького роду до імперської науки'
  words: 700
  points:
  - Походження від козацького роду Верни та вплив батька-українофіла
  - Освіта в Санкт-Петербурзі та формування наукового світогляду (вплив Менделєєва)
  - Аристократичне виховання та ліберальні цінності
  - 'Початок наукової кар''єри: від кристалографії до геохімії'
- section: 'Життєпис: II — Засновник Академії та повернення'
  words: 800
  points:
  - '1918 рік: створення Української академії наук (УАН) як акт державотворення'
  - Роль першого президента УАН в умовах політичної нестабільності
  - Еміграція (Париж, Прага) та викладання в Сорбонні
  - 'Драматичне повернення до СРСР у 1926 році: наука понад політику'
  - 'Життя в умовах сталінського терору: статус «недоторканного» академіка'
- section: Історичний контекст
  words: 500
  points:
  - Українська революція 1917–1921 рр. як тло для наукової роботи
  - 'Стан світової науки на початку XX ст.: зміна парадигм'
  - Протистояння вільної наукової думки та тоталітарної ідеології
- section: 'Внесок: I — Вчення про біосферу'
  words: 700
  points:
  - Революційна концепція «живої речовини» як геологічної сили
  - 'Цілісність природи: взаємозв''язок космосу та земної кори'
  - Фундаментальна праця «Біосфера» (1926)
- section: 'Внесок: II — Ноосфера та нові горизонти'
  words: 700
  points:
  - Концепція ноосфери (сфери розуму) як еволюційного етапу біосфери
  - Наукова думка як планетарне явище
  - 'Заснування геохімії та радіогеології: передбачення атомної ери'
- section: Останні роки
  words: 600
  points:
  - Робота в евакуації під час Другої світової війни (Борове)
  - 'Філософські роздуми в щоденниках: без цензури'
  - Смерть у 1945 році та завершення епохи
- section: Спадщина
  words: 600
  points:
  - Національна бібліотека України імені В.І. Вернадського
  - Антарктична станція «Академік Вернадський»
  - 'Зображення на купюрі 1000 гривень: культурна пам''ять'
  - Боротьба за «українського Вернадського» в світовій історіографії
- section: Підсумок
  words: 300
  points:
  - Вернадський як архітектор майбутнього людства та екологічної свідомості
  - Зв'язок науки та етики в його житті
