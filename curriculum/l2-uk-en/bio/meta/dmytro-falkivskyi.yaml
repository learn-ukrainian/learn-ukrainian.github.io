slug: dmytro-falkivskyi
title: 'Дмитро Фальківський: <!-- Title -->'
word_target: 5000
content_outline:
- section: 'Вступ: Поет із тавром чекіста'
  words: 400
  points:
  - Дмитро Фальківський — одна з найтрагічніших постатей Розстріляного відродження.
  - 'Парадокс біографії: служба в каральних органах ЧК і тонка лірична душа.'
  - 'Співець Полісся: географічна приналежність як основа ідентичності.'
  - 'Стисла хронологія життя: від поліських боліт до розстрільної ями в Києві.'
- section: 'Ранні роки: Полісся, війна і «гріх молодості»'
  words: 800
  points:
  - 'Народження у с. Великі Лепеси (Берестейщина): етнічний український контекст.'
  - Навчання в гімназії та перервана війною юність.
  - 'Вступ до Червоної армії (1920) та служба в ЧК (1920-1923): фатальний вибір.'
  - 'Психологічний злам: усвідомлення жаху терору та спроба втечі через творчість.'
  - Демобілізація та переїзд до Києва як спроба почати життя з чистого аркуша.
- section: 'Літературне життя Києва: У колі «Ланки»'
  words: 900
  points:
  - 'Входження в літературний процес 1920-х: зміна прізвища Левчук на Фальківський.'
  - 'Угруповання «Ланка» (згодом МАРС): середовище інтелектуального спротиву.'
  - Творча дружба з Григорієм Косинкою, Валер'яном Підмогильним, Євгеном Плужником.
  - 'Естетична платформа: аполітичність, психологізм, увага до людини, а не мас.'
  - 'Перші публікації та реакція критики: звинувачення в песимізмі.'
- section: 'Поетичний світ: Від «Чабана» до «Полісся»'
  words: 1000
  points:
  - 'Аналіз збірки «Чабан» (1925): мотиви природи та сільського побуту.'
  - 'Збірка «Обрії» (1927) та «На пожарищі» (1928): поглиблення трагізму.'
  - 'Поема «Полісся» (1931): епічна спроба осмислити долю рідного краю.'
  - 'Тема розкаяння: ліричний герой, що намагається змити кров із рук.'
  - 'Стилістика Фальківського: імпресіонізм, музичність, фольклорні мотиви.'
- section: 'Феномен одного вірша: «Очерет мені був за колиску»'
  words: 700
  points:
  - 'Історія написання вірша (1927): туга за втраченим раєм дитинства.'
  - 'Трансформація у пісню: мелодика, що пішла в народ.'
  - 'Парадокс історії: як вірш радянського поета став гімном повстанців УПА («Поліська
    січ»).'
  - Текст як код ідентичності поліщуків та волинян.
- section: 'Грудень 1934-го: Хроніка вбивства'
  words: 800
  points:
  - Вбивство Кірова як привід для масового терору в Україні.
  - 'Арешт 14 грудня 1934 року: фабрикація справи «об''єднання українських націоналістів».'
  - 'Судовий процес над «групою 28-ми»: відсутність доказів, швидкість вироку.'
  - 'Розстріл 17 грудня 1934 року: знищення цвіту нації (Косинка, Влизько, Буревій,
    Фальківський).'
  - 'Символізм дати: початок системного винищення української інтелігенції.'
- section: 'Спадщина: Повернення із забуття'
  words: 400
  points:
  - Заборона імені та творів на десятиліття.
  - 'Реабілітація 1957 року: формальне повернення в літературу.'
  - Видання «Ранені дні» (1969) та повне зібрання творів (1989).
  - 'Сучасне переосмислення: Фальківський як жертва і свідок доби.'
  - 'Місце в каноні: не просто «поет-чекіст», а тонкий лірик європейського рівня.'
