slug: borys-paton
title: 'Борис Патон: Академік століття'
word_target: 5000
content_outline:
- section: Вступ — Найдовше президентство в історії науки
  words: 400
  points:
  - 'Феномен Бориса Патона: ровесник Академії та її незмінний лідер протягом 58 років.'
  - 'Символізм дати народження: 27 листопада 1918 року — день заснування УАН гетьманом
    Скоропадським.'
  - 'Унікальність постаті: міст між епохами, від індустріалізації до цифрової ери.'
- section: 'Молодість і становлення: Інженер у тіні титана'
  words: 600
  points:
  - 'Родина Патонів: вплив батька Євгена Оскаровича, відомого мостобудівника.'
  - Навчання в КПІ та початок кар'єри перед війною.
  - 'Евакуація до Нижнього Тагілу: «Танковий прорив» — розробка швидкісного зварювання
    для Т-34.'
  - 'Вихід з тіні: доведення власної інженерної геніальності в екстремальних умовах.'
- section: 'Наукові досягнення: Ера металу і вогню'
  words: 800
  points:
  - 'Директорство в Інституті електрозварювання (з 1953 року): перетворення НДІ на
    світовий центр.'
  - 'Електрошлакове зварювання: технологія, що змінила важку промисловість.'
  - 'Космічна одіссея Києва: експеримент на кораблі «Союз-6» (1969) та установка «Вулкан».'
  - Зварювання під водою та в екстремальних умовах.
- section: 'Медична інженерія: Шов без ниток'
  words: 500
  points:
  - 'Новий напрям у 1990-х: перехід від металу до живих тканин.'
  - 'Співпраця з хірургами: технологія високочастотного електрозвароювання тканин.'
  - 'Переваги методу: відсутність крововтрати, швидка реабілітація.'
  - Гуманістичний вимір технічного генія.
- section: 'Президент НАН України: Епоха стабільності і застою'
  words: 900
  points:
  - 'Обрання президентом 1962 року: наймолодший очільник академії в СРСР.'
  - 'Стиль керівництва: авторитарний технократ.'
  - 'Відмова очолити АН СРСР у Москві: вибір на користь Києва.'
  - 'Академія як «держава в державі»: збереження автономії та кадрів.'
  - 'Критика пізнього періоду: проблема геронтократії та відсутності реформ.'
- section: 'Державний діяч: Між наукою і владою'
  words: 800
  points:
  - 'Політична вага Патона: депутат Верховних Рад СРСР та УРСР.'
  - 'Лист 139 та дисиденти: складні компроміси з радянською системою.'
  - 'Перший Герой України (1998): символізм нагороди № 1.'
  - 'Позиція щодо ЧАЕС: попередження про небезпеку, яке не почули.'
- section: 'Спадщина столітнього академіка: Підсумки'
  words: 1000
  points:
  - 'Смерть на 102-му році життя: кінець цілої епохи.'
  - 'Інтелектуальний спадок: 400 патентів, тисячі учнів, збережена структура НАНУ.'
  - 'Вшанування пам''яті: Національна премія імені Бориса Патона.'
  - 'Філософський підсумок: роль особистості в історії української науки.'
