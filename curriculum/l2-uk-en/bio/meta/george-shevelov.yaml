slug: george-shevelov
title: 'Юрій Шевельов: Архітектор української лінгвістики'
word_target: 5000
content_outline:
- section: Вступ — Голос української мови у світі
  words: 400
  points:
  - Шевельов як найвидатніший українознавець діаспори, що поєднав холодний аналітичний
    розум лінгвіста та пристрасну натуру есеїста.
  - Його ключова роль у міжнародному визнанні української мови як самодостатньої системи
    з давньою історією, а не 'діалекту'.
  - Створення та використання псевдоніма Юрій Шерех для літературно-критичної діяльності.
- section: 'Молодість у Харкові: I — Походження та освіта'
  words: 600
  points:
  - Народження 1908 року в Ломжі в родині генерал-майора імператорської армії Володимира
    Шнейдера.
  - Таємниця походження та свідома зміна прізвища матір'ю на 'Шевельов' для уникнення
    репресій у радянському Харкові.
  - Навчання в Харківському інституті професійної освіти; вплив видатних наставників
    Леоніда Булаховського та Олександра Білецького.
  - Початок наукової кар'єри на тлі згортання українізації та початку терору 1930-х
    років; захист дисертації у 1939 році.
- section: 'Молодість у Харкові: II — Війна та еміграція'
  words: 600
  points:
  - Виживання в окупованому Харкові (1941–1943) через необхідність доглядати хвору
    матір; завідування кафедрою філології.
  - 'Співпраця з газетою ''Нова Україна'': спроба зберегти українське національне
    життя та створення нерадянських підручників.'
  - Радянські звинувачення в колабораціонізмі, які стали тавром на десятиліття.
  - Рішення про відступ на Захід (Львів — Відень — Німеччина) у 1943–1944 роках перед
    поверненням Червоної армії.
- section: 'Діаспорне життя: I — Табори переміщених осіб та МУР'
  words: 600
  points:
  - Перебування в таборах для переміщених осіб (Ді-Пі) у Німеччині як унікальний феномен
    інтелектуального спротиву.
  - Співзаснування Мистецького Українського Руху (МУР) у 1945 році; проголошення ідеї
    'Великої літератури' без власної держави.
  - Роль Юрія Шереха як провідного критика діаспори; гострі полеміки з Дмитром Донцовим
    щодо 'національно-органічного' стилю.
- section: 'Діаспорне життя: II — Академічна кар''єра в США'
  words: 600
  points:
  - Еміграція до США та викладання російської й української мов у Гарвардському університеті
    (1952–1954).
  - Складний шлях до визнання через академічні інтриги Романа Якобсона.
  - Здобуття професури в Колумбійському університеті (1954–1977); творення власної
    авторитетної наукової школи.
  - Глибока інтеграція в західну славістику, керівництво УВАН та багаторічне редагування
    журналу 'Сучасність'.
- section: '"Історична фонологія української мови" (1979)'
  words: 900
  points:
  - Публікація фундаментального Magnum Opus — 800-сторінкового дослідження еволюції
    української фонетики.
  - Наукове спростування імперської теорії Олексія Шахматова про єдину 'давньоруську
    мову' як спільну колиску трьох народів.
  - Доведення фактами, що українська мова формувалася безпосередньо з праслов'янських
    діалектів починаючи з VII століття.
  - Міжнародне визнання цієї праці як остаточного наукового вироку російській ідеології
    'триєдиної Русі'.
- section: 'Інші наукові праці: Есеїстика та критика'
  words: 600
  points:
  - Написання понад 500 наукових статей, книг із порівняльного слов'янознавства та
    блискучої есеїстики.
  - 'Історіософське есе ''Москва, Маросєйка'': формулювання концепції трьох страшних
    ворогів України (Москва, провінціалізм, комплекс Кочубеївщини).'
  - Переосмислення Переяславської ради не як 'возз'єднання', а як початку великої
    трагедії, що випробувала українську життєвість.
- section: Спадщина та повернення в Україну
  words: 700
  points:
  - Тріумфальний перший візит до незалежної України у 1990 році; обрання іноземним
    членом НАН України.
  - Здобуття Національної премії України імені Тараса Шевченка у 2000 році (за два
    роки до смерті в Нью-Йорку).
  - Значення спадщини Шевельова для сучасної деколонізованої української лінгвістики
    та гуманітаристики.
  - Вандальське знищення меморіальної дошки у Харкові у 2013 році як свідчення того,
    що його ідеї залишаються екзистенційною загрозою для російського імперіалізму.
