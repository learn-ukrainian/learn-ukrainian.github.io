slug: vasyl-sukhomlynskyi
title: 'Василь Сухомлинський: Педагог серця'
word_target: 5000
content_outline:
- section: Вступ — Найвидатніший педагог України
  words: 400
  points:
  - Феномен сільського вчителя з селища Павлиш, який став реформатором освіти світового
    рівня.
  - Метафора «педагога серця» в контексті української філософської традиції кордоцентризму.
  - Актуальність його філософії для сучасної реформи «Нової Української Школи» (НУШ).
- section: 'Молодість і війна: I — Ранні роки та освіта'
  words: 400
  points:
  - Народження 28 вересня 1918 року в селі Василівка в селянській родині.
  - Початок педагогічного шляху в 17 років як вчителя заочної школи.
  - Навчання у Полтавському педагогічному інституті (завершив у 1938 році).
- section: 'Молодість і війна: II — Фронт і поранення'
  words: 500
  points:
  - Добровільний відхід на фронт у 1941 році; служба політруком, битва під Москвою.
  - 'Тяжке поранення під Ржевом у лютому 1942 року: осколок ворожого снаряда зупинився
    в міліметрах від серця.'
  - Повернення до вчителювання попри постійний фізичний біль; біль як каталізатор
    філософії абсолютної любові до дітей.
- section: 'Павлиська школа: I — Директорство та експеримент'
  words: 600
  points:
  - Очолення Павлиської середньої школи у 1948 році (керував 22 роки).
  - Перетворення звичайної школи на експериментальний майданчик і створення колективу
    вчителів-однодумців.
  - Відмова від радянської казарменої системи освіти.
- section: 'Павлиська школа: II — Школа радості'
  words: 600
  points:
  - 'Створення унікального освітнього середовища: «Школа під блакитним небом».'
  - 'Революційний підхід до навчання шестирічок: виведення дітей з-за парт на природу.'
  - Навчання мислити через споглядання краси навколишнього світу та відчуття її ритмів.
- section: 'Педагогічна філософія: I — Емоційний розвиток і краса'
  words: 600
  points:
  - Переконання, що інтелект без емоцій є неповноцінним; краса як захист від зла.
  - 'Гуманізація оцінювання: відмова від двійок і покарань, оцінка як винагорода за
    докладені зусилля.'
  - Використання казок як інструменту впливу (автор понад 1500 казок).
- section: 'Педагогічна філософія: II — Мова та критика авторитаризму'
  words: 500
  points:
  - 'Сакральна роль української мови: опір русифікації та концепції «двох рідних мов».'
  - 'Знаменита цитата про дві мови: «це так само безглуздо, якби ми намагалися уявити,
    що одну дитину народили дві матері».'
  - Гуманізм проти ідеологізації та знеособлення дитини.
- section: 'Конфлікт із системою: I — Звинувачення в абстрактному гуманізмі'
  words: 500
  points:
  - Зміна ідеологічного клімату в СРСР у 1960-х роках («закручування гайок»).
  - 'Стаття теоретика Б. Ліхачова 1967 року: звинувачення Сухомлинського в «абстрактному
    гуманізмі» та антирадянщині.'
  - Суперечність його ідей радянській системі Макаренка, яка потребувала «гвинтиків»
    і ставила колектив вище за особистість.
- section: 'Конфлікт із системою: II — Захист принципів'
  words: 400
  points:
  - Відкритий лист Сухомлинського як відповідь догматикам і захист своїх переконань.
  - Жорстка московська цензура його праць, зокрема вирізання пасажів про національну
    свідомість з книги «Серце віддаю дітям».
  - Підтримка з боку однодумців та прихований спротив тоталітарній системі.
- section: Спадщина та вплив
  words: 500
  points:
  - Рання смерть 2 вересня 1970 року від наслідків фронтового поранення (у віці 51
    року).
  - Світове визнання (переклади 53 мовами, близько 15 млн примірників) та рух «педагогіки
    співробітництва» у 1980-х.
  - Повернення спадщини в незалежній Україні без ідеологічних купюр, Сухомлинський
    як символ людяної та національної освіти.
