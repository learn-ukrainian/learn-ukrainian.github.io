slug: heo-shkurupii
title: 'Гео Шкурупій: <!-- Title -->'
word_target: 5000
content_outline:
- section: 'Вступ: Король Футуропрерій'
  words: 600
  points:
  - Гео Шкурупій як одна з найяскравіших фігур українського авангарду.
  - Титул «Король Футуропрерій» та епатажна самопрезентація.
  - 'Панфутуризм: мистецтво як деструкція старого та творення нового.'
  - Дружба та творчий тандем з Михайлем Семенком.
- section: 'Ранні роки та «Психотези»: Народження футуриста'
  words: 800
  points:
  - 'Дитинство в Бендерах та юність на Поділлі: формування світогляду.'
  - 'Київський період: навчання та входження в літпроцес («Гроно»).'
  - 'Поетичний дебют: збірки «Психотези» (1922) та «Барабан» (1923).'
  - 'Естетика урбанізму: місто, машина та ритм проти рустикальної традиції.'
- section: 'Кіно та «Нова ґенерація»: Екранне мислення'
  words: 800
  points:
  - 'Робота у ВУФКУ: редактор та сценарист (Одеса, Київ).'
  - 'Сценарії фільмів «Синій пакет» та «Спартак»: втрачена спадщина.'
  - Вплив кінематографічного монтажу на літературний стиль Шкурупія.
  - 'Діяльність у журналі «Нова ґенерація» (1927–1930): платформа для дискусій.'
- section: 'Прозовий вибух: «Двері в день»'
  words: 1000
  points:
  - «Двері в день» (1929) як перший український експериментальний мета-роман.
  - 'Конструктивізм у прозі: поєднання художнього тексту, репортажу та документа.'
  - 'Сюжетна деконструкція: як автор грається з читачем та жанрами.'
  - 'Критика твору: нерозуміння з боку офіційної радянської критики.'
- section: '«Жанна-батальйонерка»: Жінка на війні'
  words: 800
  points:
  - 'Роман «Жанна-батальйонерка» (1930): історичний контекст Першої світової.'
  - 'Образ Жанни: гендерна інверсія та психологія жінки-воїна.'
  - 'Натуралізм війни: дегероїзація та зображення жорстокості («м''ясорубка»).'
  - 'Еволюція стилю: від футуристичного епатажу до глибокого психологізму.'
- section: 'Арешт і Сандармох: Знищення покоління'
  words: 600
  points:
  - 'Арешт 3 грудня 1934 року: початок Великого терору після вбивства Кірова.'
  - 'Сфабрикована справа: звинувачення в українському буржуазному націоналізмі та
    тероризмі.'
  - 'Соловецький етап: життя в таборі та спроби зберегти гідність.'
  - 'Розстріл 8 грудня 1937 року в урочищі Сандармох: капітан Матвєєв та масові страти.'
- section: 'Спадщина: Повернення авангарду'
  words: 400
  points:
  - 'Реабілітація 1957 року: «за відсутністю складу злочину».'
  - 'Довге повернення: перевидання творів лише в роки Незалежності.'
  - 'Значення для сучасної літератури: Шкурупій як предтеча постмодернізму.'
  - 'Пам''ять: меморіальні дошки та місце в каноні Розстріляного відродження.'
