slug: taras-shevchenko
title: 'Тарас Шевченко: Національний Пророк'
word_target: 5000
content_outline:
- section: Вступ — Більше ніж поет
  words: 500
  points:
  - Шевченко як духовний батько української нації та nation builder, який дав бездержавному
    народові ідеологічний фундамент.
  - 'Спростування імперського міфу про виключно «селянського поета-самоучку»: аналіз
    його статусу європейського інтелектуала.'
  - 'Актуальність його спадщини сьогодні: тексти як гасла ЗСУ («Борітеся — поборете!»)
    та символи українського спротиву з 2014 року.'
- section: 'Кріпацтво та ранні роки: I — Дитинство в Моринцях'
  words: 400
  points:
  - Народження в Моринцях (1814) у статусі кріпака.
  - 'Трагедія сирітського дитинства: смерть матері (1823) та батька (1825).'
  - Талант до малювання як єдиний порятунок від рабської реальності та форма внутрішнього
    спротиву.
- section: 'Кріпацтво та ранні роки: II — Служба та формування пам''яті'
  words: 400
  points:
  - 'Статус «козачка» у Павла Енгельгардта: подорожі до Відня, Вільна (під час Листопадового
    повстання 1830) та Петербурга.'
  - Вплив розповідей діда Івана про жахи Гайдамаччини на формування антиімперського
    фундаменту свідомості малого Тараса.
- section: 'Викуп та становлення митця: I — Знайомство з елітою та викуп'
  words: 450
  points:
  - Зустріч з Іваном Сошенком у Літньому саду (1836) та входження у коло петербурзької
    мистецької еліти.
  - Роль Карла Брюллова, Василя Жуковського та Євгена Гребінки в організації викупу
    геніального кріпака.
  - 'Деталі лотереї (22 квітня 1838): розіграш портрета Жуковського за 2500 рублів
    (еквівалент 45 кг срібла).'
- section: 'Викуп та становлення митця: II — Академія мистецтв'
  words: 400
  points:
  - 'Навчання в Академії мистецтв: улюблений студент Брюллова, здобуття трьох срібних
    медалей за успіхи в живописі.'
  - 'Формування як європейського митця-романтика: поєднання професійної художньої
    освіти з першими серйозними літературними спробами.'
- section: 'Кобзар та пробудження нації: I — Вихід «Кобзаря» (1840)'
  words: 500
  points:
  - Видання першої збірки «Кобзар» (1840) у Петербурзі як акт легітимізації української
    мови у високій літературі.
  - 150-річна історія російської імперської та радянської цензури «Кобзаря» і спроби
    приховати його пророчий заклик.
  - 'Революційний вплив на українську свідомість: історична поезія («Гайдамаки») як
    повернення вкраденої історії.'
- section: 'Кобзар та пробудження нації: II — Період «трьох літ»'
  words: 500
  points:
  - 'Подорожі Україною (1843-1845): шок від руїни, побаченої соціальної несправедливості
    та покріпачення колишніх козаків.'
  - Створення альбому «Три літа» як ідеологічної зброї.
  - 'Перехід до жорсткої політичної сатири: антиімперські поеми «Сон» та «Кавказ»
    («Борітеся — поборете!»).'
- section: 'Кирило-Мефодіївське братство та заслання: I — Діяльність у товаристві
    та арешт'
  words: 450
  points:
  - Участь у діяльності таємного Кирило-Мефодіївського братства (1846) разом з М.
    Костомаровим та П. Кулішем.
  - Підтримка ідей скасування кріпацтва та створення слов'янської федерації вільних
    республік.
  - 'Арешт (5 квітня 1847) у Києві: використання альбому «Три літа» з антицарською
    поемою «Сон» як головного доказу на слідстві.'
- section: 'Кирило-Мефодіївське братство та заслання: II — Голгофа заслання'
  words: 450
  points:
  - 'Вирок Миколи I: десятилітня солдатчина «із забороною писати й малювати» як спроба
    духовної страти митця.'
  - 'Боротьба за людську гідність на засланні: свідчення незламності («Караюсь, мучуся...
    але не каюсь!»).'
  - 'Аральська експедиція (1848-1849): Шевченко як художник-дослідник та створення
    понад 100 краєвидів всупереч царській забороні.'
- section: Останні роки та безсмертя
  words: 500
  points:
  - Повернення із заслання (1857) хворим, але незламним, та тріумфальна зустріч петербурзькою
    інтелігенцією.
  - Отримання звання Академіка гравюри Петербурзької академії мистецтв (1860) та видання
    «Букваря южнорусского» (1861).
  - 'Смерть 10 березня 1861 року та виконання «Заповіту»: масове перепоховання на
    Чернечій горі у Каневі як перша національна маніфестація.'
- section: Дискусія — Шевченко в деколонізаційному дискурсі
  words: 450
  points:
  - 'Деконструкція радянського міфу про «атеїста-революціонера»: релігійність Шевченка
    та глибока християнська етика його протесту («Я Богу помолюсь...»).'
  - Шевченко як свідомий антиколоніальний мислитель Східної Європи, що передбачив
    крах Російської імперії («тюрми народів»).
  - Творчість пророка як «паспорт» української нації, що гарантує її право на самостійне
    державне існування.
