slug: mykhailo-starytsky
title: 'Михайло Старицький: Корифей українського театру'
word_target: 5000
content_outline:
- section: Вступ — Архітектор національної сцени
  words: 400
  points:
  - Старицький як ключовий засновник українського професійного театру («Театру корифеїв»).
  - 'Багатогранність таланту: видатний драматург, поет, прозаїк, режисер та перекладач.'
  - Роль театру як єдиної публічної трибуни для збереження української ідентичності
    в умовах імперського тиску.
- section: 'Полтавщина та формування (1840-1860-ті): I — Походження'
  words: 400
  points:
  - Народження 14 грудня 1840 року в селі Кліщинці на Полтавщині у старовинній шляхетській
    родині.
  - 'Раннє сирітство та усиновлення: виховання в родині дядька, Віталія Лисенка.'
  - Глибокі родинні зв'язки та міцна юнацька дружба з троюрідним братом — майбутнім
    композитором Миколою Лисенком.
- section: 'Полтавщина та формування (1840-1860-ті): II — Освіта'
  words: 400
  points:
  - Навчання в Полтавській гімназії, де почали формуватися перші культурні інтереси.
  - Студентські роки у Харківському та згодом у Київському університетах.
  - Ранні літературні спроби та сильне захоплення творчістю Тараса Шевченка.
- section: 'Київський період та Стара Громада (1870-ті): I — Громадська діяльність'
  words: 450
  points:
  - Активна участь в інтелектуальному житті київської «Старої Громади» разом із провідними
    діячами епохи.
  - 'Творчий тандем з Миколою Лисенком: запис фольклору та організація аматорських
    театральних гуртків.'
  - Створення лібрето для перших українських опер («Різдвяна ніч», «Утоплена»).
- section: 'Київський період та Стара Громада (1870-ті): II — Репресії'
  words: 450
  points:
  - Нищівний удар Емського указу 1876 року, що заборонив українське слово, друк та
    театральні постановки.
  - Вимушена еміграція, поїздки за кордон та пошук нових форм збереження культури.
  - Продовження літературної роботи та перекладацької діяльності навіть у часи найжорсткішої
    цензури.
- section: 'Театральна революція (1882-1895): I — Заснування трупи'
  words: 550
  points:
  - 'Історичний 1882 рік: створення першої професійної української трупи за участі
    Марка Кропивницького.'
  - 'Очолення об''єднаної трупи у 1883 році та безпрецедентний крок: продаж власного
    родового маєтку на Поділлі для її фінансування.'
  - 'Організація театру за найвищими європейськими стандартами: якісні декорації,
    автентичні костюми, власний оркестр.'
- section: 'Театральна революція (1882-1895): II — Тріумф і тиск'
  words: 550
  points:
  - Феноменальний успіх гастролей по всій Російській імперії; зірковий акторський
    склад (Марія Заньковецька, Микола Садовський).
  - Постійне протистояння з російською цензурою, яка забороняла п'єси з історичного
    минулого та інтелігентного життя.
  - Принизливе правило обов'язкового виконання російської п'єси перед українською,
    як спосіб маргіналізації українського мистецтва.
- section: 'Літературна спадщина: I — Драматургія та поезія'
  words: 450
  points:
  - 'Драматургічний доробок: від геніальних комедійних переробок («За двома зайцями»)
    до власних серйозних драм («Талан», «Не судилось»).'
  - 'Поетична творчість: вірш «Виклик» (1870), який став культовою народною піснею
    «Ніч яка місячна».'
  - 'Унікальна мовотворчість: введення в обіг неологізмів, зокрема слів «мрія», «майбутнє»,
    «байдужість», «завзяття».'
- section: 'Літературна спадщина: II — Проза та переклади'
  words: 450
  points:
  - 'Новаторство в прозі: створення масштабних історичних романів («Богдан Хмельницький»,
    «Руїна», «Молодість Мазепи»).'
  - 'Деколонізація минулого: формування героїчного національного наративу замість
    імперських міфів про «малоросів».'
  - 'Перекладацька діяльність європейського рівня: переклади Гамлета Вільяма Шекспіра,
    поезій Джорджа Байрона та казок Ганса Крістіана Андерсена.'
- section: 'Спадщина — Батько української сцени: I — Останні роки'
  words: 450
  points:
  - Фінансове виснаження від постійного дотування театру та серйозне погіршення стану
    здоров'я.
  - Смерть Михайла Старицького у Києві у 1904 році; визнання його подвигу сучасниками.
  - Трагічна та велична доля його нащадків, зокрема доньки Людмили Старицької-Черняхівської,
    що продовжила інтелектуальну боротьбу.
- section: 'Спадщина — Батько української сцени: II — Деколонізація та вплив'
  words: 450
  points:
  - Трансформація театру з «етнографічно-розважального» до серйозного інституту національної
    свідомості.
  - 'Оцінка Івана Франка: Старицький як повноцінний «батько українського театру».'
  - 'Історичне значення корифея в сучасному українському культурному пантеоні: творець
    слова, театру та нації.'
