slug: pavlo-sheremet
title: 'Павло Шеремет: Журналістика як місія свободи'
word_target: 5000
content_outline:
- section: Вступ — Журналіст трьох країн
  words: 600
  points:
  - 'Феномен Павла Шеремета: білорус за походженням, росіянин за паспортом, українець
    за духом.'
  - 'Життєве кредо: неможливість компромісу з диктатурою (Лукашенко, Путін).'
  - Київ як останній бастіон свободи слова на пострадянському просторі.
- section: 'Життєпис: I — Білоруський фронт'
  words: 800
  points:
  - 'Мінський старт: від банківської справи до телебачення («Проспект»).'
  - Редакторство в «Білоруській діловій газеті» та конфлікт з режимом.
  - 'Арешт 1997 року: репортаж з кордону та три місяці в''язниці.'
  - Депортація та статус «особистого ворога Лукашенка».
- section: 'Життєпис: II — Московське розчарування'
  words: 800
  points:
  - 'Робота на ОРТ: ведучий програми «Время» та спецкор.'
  - Спроби зберегти об'єктивність в умовах наростаючої цензури Путіна.
  - Заснування опозиційного сайту «Білоруський партизан» (2005).
  - Остаточний розрив з російським державним телебаченням (2008).
- section: 'Життєпис: III — Український вибір'
  words: 800
  points:
  - 'Переїзд до Києва (2014): свідомий вибір сторони світла.'
  - Роль виконавчого директора «Української правди».
  - Вивчення української мови та культурна інтеграція.
  - 'Проєкти на «Радіо Вєсті» та телеканалі «24»: діалог з суспільством.'
- section: 'Історичний контекст: Свобода слова в лещатах війни'
  words: 600
  points:
  - 'Медіа-ландшафт України після Революції Гідності: виклики та загрози.'
  - 'Гібридна війна Росії: дезінформація та полювання на правду.'
  - 'Небезпека професії: паралелі між справами Гонгадзе та Шеремета.'
- section: 'Внесок та Останні роки: Місія правди'
  words: 800
  points:
  - 'Педагогічна діяльність: школа журналістики та менторство молоді.'
  - 'Останні розслідування: корупція, добробати, влада.'
  - 'Трагічний ранок 20 липня 2016 року: хроніка подій.'
  - Суспільний шок та реакція міжнародної спільноти.
- section: 'Спадщина: Вільне слово не вбити'
  words: 600
  points:
  - Премія імені Павла Шеремета та вшанування пам'яті.
  - Незавершеність розслідування як виклик для українського правосуддя.
  - Символ єднання демократичних сил Білорусі, України та вільної Росії.
