slug: volodymyr-samiilenko
title: 'Володимир Самійленко: Поет, сатирик і будівничий мови'
word_target: 5000
content_outline:
- section: Вступ — Голос, якого не почули
  words: 450
  points:
  - Самійленко як багатогранний поет-лірик, гострий сатирик і видатний перекладач
  - Трагедія незаслужено маловідомої постаті української літератури
  - Історична участь у Полтавському з'їзді 1903 року нарівні з Франком, Лесею Українкою
    та Коцюбинським
- section: 'Полтавщина та гімназійні роки: I — Родина і походження'
  words: 450
  points:
  - Народження у Сорочинцях Миргородського повіту 1864 року
  - 'Драматичне походження: батько-поміщик Іван Лисевич і мати-кріпачка Олександра
    Самійленко'
- section: 'Полтавщина та гімназійні роки: II — Гімназія і перші спроби'
  words: 450
  points:
  - Навчання у Полтавській гімназії та ранні літературні спроби пера
  - Вплив гоголівського духу Полтавщини та потужної традиції Шевченка
- section: 'Київський університет та літературні кола: I — Навчання і гуртки'
  words: 450
  points:
  - Вступ у 1884 році на фізико-математичний факультет Київського університету
  - Організаційна діяльність у гуртку 'Плеяда' та 'Братстві тарасівців'
- section: 'Київський університет та літературні кола: II — Дебют і репутація'
  words: 450
  points:
  - 'Перший серйозний успіх: збірка «З поезій Володимира Самійленка» (1890)'
  - Поява псевдоніма «Сивенький» та закріплення літературної репутації в інтелектуальних
    колах
- section: 'Перекладацький подвиг: I — Світова література'
  words: 450
  points:
  - Тихотанічна праця з перекладу творів Гомера, Данте, Мольєра та Байрона
  - Інтелектуальне доведення спроможності української мови транслювати найскладніші
    європейські тексти
- section: 'Перекладацький подвиг: II — Мовний спротив'
  words: 450
  points:
  - Переклад як свідомий виклик та протест проти Емського указу і Валуєвського циркуляру
  - Фундаментальне значення цих перекладів для розбудови українського літературного
    канону
- section: 'Сатира проти імперії: I — Поетична зброя'
  words: 450
  points:
  - Застосування гумору та сатиричних віршів як інструменту боротьби з русифікацією
  - Саркастичне висміювання імперської політики цензури та комплексу меншовартості
- section: 'Сатира проти імперії: II — Громадська діяльність'
  words: 450
  points:
  - Активна публіцистична і журнальна діяльність (співпраця з газетою «Рада»)
  - Безпосередня участь у розгортанні українського національно-визвольного руху
- section: 'Спадщина — Мовний архітектор: I — Доба УНР'
  words: 450
  points:
  - Державна та адміністративна діяльність в міністерствах Української Народної Республіки
  - Відступ з урядом УНР, еміграція та страшні родинні трагедії у Галичині
- section: 'Спадщина — Мовний архітектор: II — Повернення і пам''ять'
  words: 500
  points:
  - Останні роки після вимушеного повернення 1924 року та смерть у Боярці 1925 року
  - 'Деколонізаційний підсумок: неоціненна роль у формуванні літературної мови та
    національного спротиву'
