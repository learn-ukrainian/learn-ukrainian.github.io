slug: roman-ratushny
title: 'Роман Ратушний: Громадянин, активіст, воїн'
word_target: 5000
content_outline:
- section: 'Вступ: Голос Протасового Яру'
  words: 600
  points:
  - 'Роман Ратушний як символ покоління, народженого у незалежній Україні: від Євромайдану
    до фронту.'
  - 'Протасів Яр як мікрокосм українського спротиву: від локального екозахисту до
    національної оборони.'
  - Поєднання інтелектуальної глибини (стоїцизм, начитаність) та рішучої дії.
- section: 'Життєпис: Від барикад Майдану до боротьби за Київ'
  words: 1000
  points:
  - 'Родинне середовище: вплив матері Світлани Поваляєвої та батька Тараса Ратушного
    на формування цінностей.'
  - 'Євромайдан: участь у 16 років, ніч побиття студентів 30 листопада 2013 року як
    особиста точка неповернення.'
  - 'Еволюція активізму: від вуличних протестів до системної правозахисної діяльності
    (позов до ЄСПЛ).'
  - Справа Стерненка та участь у акціях солідарності проти поліцейської системи.
- section: 'Феномен Протасового Яру: Війна за міський простір'
  words: 1000
  points:
  - 'Хронологія конфлікту: протистояння з забудовником «Дайтона Груп» (зв''язки з
    Корбаном).'
  - 'Створення ГО «Захистимо Протасів Яр»: перехід від стихійного протесту до юридичної
    війни.'
  - 'Стратегія перемоги: поєднання фізичного захисту (барикади), юридичного тиску
    та медійної кампанії.'
  - 'Остаточна перемога: повернення статусу зеленої зони та створення ландшафтного
    заказника.'
- section: 'Філософія суб''єктності: Активізм як деколонізація'
  words: 800
  points:
  - 'Концепція громадянської суб''єктності: громадянин як власник держави, а не пасивний
    спостерігач.'
  - 'Зв''язок внутрішньої корупції з російським колоніальним впливом: «вата» у владі
    як п''ята колона.'
  - 'Стоїцизм Романа: позивний «Сенека», читання філософії в окопах, прийняття смертності.'
- section: 'Останні роки: Шлях Воїна (2022)'
  words: 800
  points:
  - '24 лютого: негайний вступ до лав добровольців, оборона Києва.'
  - 'Служба у розвідці 93-ї ОМБр «Холодний Яр»: звільнення Тростянця.'
  - 'Ізюмський напрямок: бої у «Шервудському лісі», специфіка розвідувальних дій.'
  - 'Обставини загибелі 8 червня 2022 року поблизу Сулигівки: бій із засідкою ворога.'
- section: 'Спадщина: «Роман не хотів би, щоб ми плакали»'
  words: 800
  points:
  - '«Чим більше росіян ми вб''ємо...»: заповіт поколінню та його історична вага.'
  - 'Інституціалізація пам''яті: фестиваль «Протасів Яр», стипендії, перейменування
    вулиці Волгоградської.'
  - 'Вплив на суспільство: трансформація образу активіста від «маргінала» до національного
    героя.'
  - 'Місія продовження: як громада продовжує справу Романа у захисті Києва та України.'
