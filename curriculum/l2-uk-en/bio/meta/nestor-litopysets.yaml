id: bio-nestor-litopysets
slug: nestor-litopysets
version: "1.0"
title: 'Нестор Літописець: Батько української історіографії'
word_target: 5000
content_outline:
- section: Вступ
  words: 400
  points:
  - 'Нестор Літописець як символ: інтелектуал-поліглот, а не просто переписувач.'
  - 'Інтелектуальний клімат Києва XI ст.: бібліотека Ярослава, візантійські впливи.'
  - Роль монастиря як центру політичної аналітики та теології історії.
- section: 'Життєпис: І — Шлях до Печерської обителі'
  words: 450
  points:
  - Народження бл. 1056 року (ймовірно Київ) та прихід до монастиря у 17 років (1073).
  - 'Постриг у ігумена Стефана: початок аскези та навчання.'
  - 'Матеріальний світ скрипторія: пергамент, чорнила, фізична важкість книгописання.'
  - Книга як сакральний об'єкт і інструмент спасіння («Велика-бо користь...»).
- section: 'Життєпис: ІІ — Духовне становлення'
  words: 450
  points:
  - 'Вплив Феодосія Печерського: поєднання аскетизму з активною громадянською позицією.'
  - 'Участь у відкритті мощей Феодосія (1091): свідчення очевидця та сакральний досвід.'
  - 'Дияконський сан: статус у монастирській ієрархії та доступ до архівів.'
  - Спілкування з інтелектуальною елітою (боярин Ян Вишатич).
- section: 'Внесок: І — Повість минулих літ'
  words: 600
  points:
  - 'Структура ПВЛ: поєднання хронологічних записів та літературних новел.'
  - 'Ключове питання: «Звідки пішла Руська земля» — локалізація центру в Києві.'
  - 'Світоглядна концепція: історія як арена боротьби добра і зла (провіденціалізм).'
  - Вписання історії Русі у світовий біблійний контекст (розселення синів Ноя).
- section: 'Внесок: ІІ — Агіографічна спадщина'
  words: 500
  points:
  - '«Читання про Бориса і Гліба»: концепція страстотерпства та ненасильницького спротиву.'
  - '«Житіє Феодосія Печерського»: побутовий реалізм та образ ідеального ченця-громадянина.'
  - 'Новаторство Нестора: увага до психології та деталей, відхід від сухих канонів.'
  - Вплив агіографії на формування морального кодексу епохи.
- section: 'Внесок: ІІІ — Методологія та джерела'
  words: 500
  points:
  - 'Синтез джерел: візантійські хроніки (Георгій Амартол) як зразок.'
  - 'Використання місцевого фольклору: легенди про Кия, помсту Ольги, Кожум''яку.'
  - 'Усна історія: свідчення старців та воїнів (Ян Вишатич) як джерело фактів.'
  - 'Критичний підхід до джерел: спроба узгодити різні версії подій.'
- section: 'Останні роки: І — Політичні бурі'
  words: 400
  points:
  - Робота над першою редакцією «Повісті» (бл. 1110-1113) на тлі політичної кризи.
  - Смерть Святополка Ізяславича та київське повстання 1113 року.
  - 'Прихід Володимира Мономаха: зміна політичного вектору та її вплив на літописання.'
  - Позиція Печерського монастиря у конфлікті князів.
- section: 'Останні роки: ІІ — Проблема редакцій'
  words: 400
  points:
  - Передача літописання у Видубицький монастир (ігумен Сильвестр, 1116).
  - 'Конфлікт редакцій: чому зникло ім''я Нестора з пізніших списків?'
  - Смерть Нестора (бл. 1113-1115) та поховання у Ближніх печерах.
  - 'Проблема збереження тексту: Лаврентіївський та Іпатіївський списки.'
- section: 'Спадщина: І — Від козаків до сучасності'
  words: 500
  points:
  - 'Канонізація Нестора: святий покровитель вчених і учнів.'
  - 'Рецепція у козацьких літописах (Самовидець, Граб''янка): тяглість традиції.'
  - Образ у літературі XIX-XX ст. (Іван Франко, Ліна Костенко).
  - День української писемності та мови (9 листопада/27 жовтня) — свято пам'яті Нестора.
- section: 'Спадщина: ІІ — Деколонізація пам''яті'
  words: 500
  points:
  - Спростування імперського міфу про «спільну колиску» трьох народів.
  - Чітка локалізація Русі в Середньому Подніпров'ї (етнонім «Русь» = поляни/кияни).
  - 'Мовні риси оригіналу: жива протоукраїнська лексика («соромитися», «яруга») та
    фонетика.'
  - Нестор як батько саме української, а не «загальноросійської» історіографії.
- section: Підсумок
  words: 300
  points:
  - Нестор як фундатор національної саморефлексії («Хто ми є?»).
  - Актуальність його етичних та політичних оцінок для сучасної України.
  - «Повість минулих літ» як паспорт української нації у середньовічному світі.
