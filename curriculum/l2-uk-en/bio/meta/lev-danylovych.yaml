slug: lev-danylovych
title: 'Лев Данилович: Будівничий Львова'
word_target: 5000
content_outline:
- section: Вступ — Князь, що дав місту своє ім'я
  words: 400
  points:
  - 'Львів як живий пам''ятник Леву Даниловичу: єдине місто Європи, назване на честь
    сина засновника, що зберегло цю назву'
  - 'Династична спадкоємність: Лев як легітимний продовжувач справи Данила Галицького
    та королівської традиції'
  - 'Символізм імені: «Лев» як відображення амбіцій, сили та нової епохи Русі в умовах
    Pax Mongolica'
- section: Молодість та прихід до влади
  words: 800
  points:
  - 'Бойове хрещення: участь у битві під Ярославом (1245) та розгром угорсько-польської
    коаліції'
  - 'Династичний шлюб: одруження з Констанцією Угорською (1247) як запорука західного
    вектора політики'
  - 'Боротьба за спадщину (1264-1269): розподіл земель після смерті Данила, конфлікт
    зі Шварном та Войшелком'
  - 'Інцидент з Войшелком (1267): вбивство литовського князя в монастирі як прояв
    жорстокої Realpolitik Лева'
- section: Львів — нова столиця
  words: 900
  points:
  - '1272 рік: стратегічне рішення про перенесення столиці з вразливого Холма до укріпленого
    Львова'
  - 'Географія безпеки: Високий Замок як неприступна цитадель, обрана з огляду на
    монгольську тактику облог'
  - 'Містобудування: розбудова Низького замку, княжого двору та формування перших
    ремісничих кварталів'
  - 'Економічний вузол: перетворення Львова на центр торгових шляхів Схід-Захід завдяки
    вигідному розташуванню на Розточчі'
- section: Територіальна експансія
  words: 800
  points:
  - 'Західні амбіції: боротьба за краківський стіл після смерті Болеслава Сором''язливого
    та похід 1280 року'
  - 'Тріумф 1292 року: приєднання Люблінської землі до Королівства Русі — пік територіальної
    могутності'
  - 'Карпатський вектор: встановлення контролю над Мукачівською домінією та вихід
    за Карпати'
  - 'Геополітичний парадокс: агресивне розширення кордонів держави в умовах формального
    васалітету'
- section: Відносини з Ордою
  words: 800
  points:
  - 'Дипломатія виживання: особистий союз Лева з темником Ногаєм як інструмент противаги
    Сараю'
  - 'Військовий прагматизм: використання татарських туменів для реалізації власних
    територіальних претензій (Польща, Угорщина)'
  - 'Ціна автономії: участь у монгольських походах як «податок кров''ю» за відсутність
    баскаків у Галичині'
  - 'Баланс сил: збереження повної адміністративної та церковної структури Русі під
    «парасолькою» Орди'
- section: Внутрішня політика
  words: 800
  points:
  - 'Централізація влади: жорстке приборкання боярської опозиції на відміну від компромісів
    батька'
  - 'Економічний розвиток: залучення німецьких колоністів та вірменських купців, початки
    міського самоврядування'
  - 'Культурний синтез: двір Лева та Констанції як місце зустрічі західних (католицьких)
    та східних (православних) традицій'
  - 'Релігійна політика: тверда підтримка православ''я попри католицький шлюб та тиск
    папи'
- section: Підсумок — Князь-будівничий
  words: 500
  points:
  - 'Історична реабілітація: Лев Данилович як прагматик-державотворець, а не «татарський
    васал» радянської історіографії'
  - 'Львівська епоха: перетворення міста з форпосту на вічну столицю Галичини та українського
    П''ємонту'
  - 'Спадщина Realpolitik: збереження суверенітету та територіальна цілісність у найтяжчих
    геополітичних умовах'
  - 'Кінець правління (бл. 1301): смерть у Спаському монастирі та передача стабільної
    держави сину Юрію'
