slug: kateryna-yushchenko
title: 'Катерина Ющенко: Піонерка кібернетики'
word_target: 5000
content_outline:
- section: Вступ — Мати мови програмування
  words: 400
  points:
  - Катерина Ющенко як архітекторка фундаментальних принципів програмування.
  - 'Історична паралель: українська Ада Лавлейс.'
  - Унікальність жінки-науковця в патріархальній радянській науці.
  - 'Основна теза модуля: повернення першості у винаході вказівників.'
- section: 'Юність та війна (1919-1945): I — Тінь репресій'
  words: 400
  points:
  - 'Народження в Чигирині: історичний дух козацької столиці.'
  - '1937 рік: арешт батька Логвина Ющенка за «націоналізм».'
  - 'Стигма «доньки ворога народу»: виключення з Київського університету.'
  - 'Моральний вибір: відмова зректися батьків.'
- section: 'Юність та війна (1919-1945): II — Евакуація та університет'
  words: 400
  points:
  - 'Втеча від війни в Узбекистан: Самарканд і Ташкент.'
  - Навчання в Середньоазіатському університеті.
  - 'Виживання в тилу: робота на військовому заводі.'
  - Формування математичного характеру через випробування.
- section: 'Шлях до кібернетики (1945-1955): I — Львівська школа'
  words: 400
  points:
  - Повернення в Україну після війни.
  - Робота у Львівському відділі Інституту математики АН УРСР.
  - 'Співпраця з Борисом Гнєденком: фундамент теорії ймовірностей.'
  - Захист кандидатської дисертації.
- section: 'Шлях до кібернетики (1945-1955): II — Перші ЕОМ'
  words: 400
  points:
  - 'Переїзд до Києва (Феофанія): колиска європейської кібернетики.'
  - Знайомство з МСЕМ Сергія Лебедєва.
  - 'Виклик машинного коду: складність програмування в нулях і одиницях.'
  - Пошук шляхів автоматизації мислення.
- section: 'Адресна мова (1955-1965): I — Народження ідеї'
  words: 500
  points:
  - '1954 рік: концептуальний прорив Катерини Ющенко.'
  - 'Суть ідеї: операції не над числами, а над їхніми адресами.'
  - 'Математична елегантність: використання теорії алгоритмів.'
  - Відмінність від підходу західних вчених (Fortran, Cobol).
- section: 'Адресна мова (1955-1965): II — Вказівники та революція'
  words: 500
  points:
  - Штрих-операція Ющенко як прообраз сучасних вказівників (pointers).
  - Реалізація мови на ЕОМ «Київ».
  - Створення перших бібліотек програм.
  - 'Переваги адресної мови: гнучкість та універсальність.'
- section: 'Адресна мова (1955-1965): III — Світовий контекст'
  words: 500
  points:
  - 'Порівняльний аналіз: Ющенко (1955) проти Лоусона (1964).'
  - Чому світ не дізнався вчасно? Бар'єри залізної завіси.
  - Підручник «Елементи програмування» (1961) та його переклади.
  - Вплив на розвиток алгебричного підходу в програмуванні.
- section: 'Пізній період (1965-2001): I — Педагог і наставник'
  words: 400
  points:
  - 'Захист докторської дисертації (1965): перша жінка в СРСР.'
  - Створення школи теоретичного програмування.
  - 'Викладання в КДУ: формування нового покоління кібернетиків.'
  - 'Материнський стиль керівництва: підтримка молодих талантів.'
- section: 'Пізній період (1965-2001): II — Визнання'
  words: 400
  points:
  - Член-кореспондент АН УРСР (1976).
  - Державні премії та нагороди (премія Глушкова).
  - Робота над новими серіями ЕОМ.
  - 'Останні роки: збереження наукової активності до кінця.'
- section: 'Спадщина — Забутий геній: I — Вплив на інформатику'
  words: 350
  points:
  - Адресна мова як предтеча сучасних мов високого рівня.
  - 'Непряма адресація: фундамент усіх сучасних ОС і програм.'
  - Внесок у розвиток баз даних та штучного інтелекту.
- section: 'Спадщина — Забутий геній: II — Повернення імені'
  words: 350
  points:
  - Відновлення історичної справедливості в XXI столітті.
  - Експозиції в Музеї Тюрінга та Музеї комп'ютерної історії (Каліфорнія).
  - Катерина Ющенко як рольова модель для жінок в українському IT.
  - 'Фінальний акорд: код, що змінив світ.'
