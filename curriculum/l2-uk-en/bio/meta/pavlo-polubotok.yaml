id: pavlo-polubotok
version: '2.0'
slug: pavlo-polubotok
title: 'Павло Полуботок: Мученик за автономію'
word_target: 4000
content_outline:
- section: Вступ — Символ нескореності
  words: 450
  points:
  - Полуботок як символ морального та правового опору (на противагу збройному шляху
    Мазепи)
  - Протистояння з імперською владою (один із перших українських політичних дисидентів-конституціоналістів)
  - Легендарний образ мученика у пам'яті народу
- section: 'Життєпис: I — Походження та шлях до влади'
  words: 450
  points:
  - Походження та інтелектуальне становлення (народився бл. 1660 р., випускник Києво-Могилянської
    академії)
  - Шлях магната і полковника чернігівського (16 років на посаді з 1706 р., власник
    промислових підприємств)
- section: 'Життєпис: II — Наказний гетьман і арешт'
  words: 450
  points:
  - Обрання наказним гетьманом у 1722 р. після смерті Скоропадського (без офіційного
    дозволу Петра I)
  - Консолідація старшини, наступний арешт і ув'язнення у Петропавлівці (листопад
    1723 р.)
- section: Історичний контекст
  words: 350
  points:
  - Наступ імперії після Північної війни (1721 р.) та брутальний демонтаж української
    автономії
  - Створення Малоросійської колегії (Степан Вельямінов) як інструменту колоніального
    управління та фіскального терору
- section: 'Внесок: I — Захист прав через закон'
  words: 400
  points:
  - Захист прав народу через закон (судова реформа, порядок апеляцій до Генерального
    суду)
  - Заборона російським офіцерам експлуатувати козаків та ініціювання Коломацьких
    чолобитних (1723 р.)
- section: 'Внесок: II — Меценатство та розбудова'
  words: 300
  points:
  - Меценатство та розбудова Чернігова (фінансування Вознесенського собору)
  - Модель відповідальної національної еліти доби українського бароко
- section: 'Останні роки: I — Ув''язнення і діалог з Петром I'
  words: 350
  points:
  - Ув'язнення в сирих казематах Петропавлівської фортеці та відмова просити помилування
  - 'Легендарний діалог з Петром I (за «Історією Русів»): звинувачення монарха в порушенні
    клятв і тиранії'
- section: 'Останні роки: II — Моральна перемога'
  words: 350
  points:
  - Моральна перемога над тираном (готовність померти за «Отчизну» як ідеологічний
    маніфест)
  - Смерть гетьмана 29 грудня 1724 р. та раптова смерть Петра I через 40 днів як підтвердження
    пророцтва
- section: 'Спадщина: I — Легенда про золото'
  words: 350
  points:
  - Легенда про золото Полуботка (міф про 200 тисяч золотих монет у Банку Англії)
  - Роль легенди у 1990-х роках як психологічного компенсатора та суспільної метафори
- section: 'Спадщина: II — Символ національної гідності'
  words: 350
  points:
  - Символ національної гідності та правового опору в сучасній Україні
  - Образ «царя волі» в поемі Т. Шевченка «Сон» на противагу імперському міфу про
    Полуботка-олігарха
- section: Підсумок
  words: 200
  points:
  - 'Значення постаті для сучасності: гармонійне поєднання аристократа-державника
    та мученика'
  - Закладення фундаментальної української традиції легального опору тиранії