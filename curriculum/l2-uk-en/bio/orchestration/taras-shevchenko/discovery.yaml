  text: "51\nПрактичне заняття\nМісце Т. Шевченка в  українському національному відродженні\n\
    Напрочуд цікава особистість тараса Шевченка (1814—1861) поєднувала в собі \nгеніального\
    \ поета, талановитого художника та, без перебільшення, творця нової \nукраїнської\
    \ ідеології, яка відіграла важливу роль у формуванні національної сві-\nдомості\
    \ українців. те, що саме він став людиною-символом доби пробудження \nсамосвідомості\
    \ українського народу, невипадково. Його особистість і поезія най-\nповніше втілили\
    \ риси, притама"
