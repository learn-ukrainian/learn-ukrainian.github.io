  text: 'Шевченкові належить виняткова роль у згуртуванні передових сил української
    нації, у розвитку й формуванні свідомості українського народу. "Кобзар" охоче
    співає минувшину, але спрямований він у майбутнє. З творчістю Шевченка пов''язане
    становлення нашої літературної мови; з виходом "Кобзаря" відкривається нова епоха
    в розвитку українського красного письменства, яке віднині незрівнянно розширювало
    свої тематичні й філософські обрії: Шевченко воїстину виводив рідну літературу
    на простори вселюдські.'
