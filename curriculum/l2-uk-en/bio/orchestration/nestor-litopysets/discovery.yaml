    Київської держави й козацтва. Автор був очевидцем подій або міг дізнатися

    про них із письмових джерел чи почути від когось. Розповідь у літописі,

    як правило, починалася словами: «У літо…» — саме від цих слів жанр

    і дістав свою назву. «Повість минулих літ» — це перший літопис, який дійшов до

    нас, його ще називають «Початковим літописом». Саме він розпові-

