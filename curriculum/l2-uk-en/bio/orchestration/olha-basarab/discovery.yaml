  text: "ЛюДиНА і ВійНА \n(«Поза межами болю»)\nісторичне та біографічне підґрунтя\n\
    Світові війни мають глобальний характер. Вони спричиняють численні людські жертви.\
    \ Перша світова війна спалахнула влітку 1914 року \nй обернулась для народів Європи\
    \ справжньою \nкатастрофою: забрала понад 10 мільйонів життів \nсолдатів та цивільного\
    \ населення. Вона не була \nукраїнською війною, однак сотні тисяч україн-\nців\
    \ брали в ній участь — воювали по різні боки \nфронту. І потрап ляли туди не з\
    \ власної волі, \nа були мобілізо"
