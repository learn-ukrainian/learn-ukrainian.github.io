  text: "Міст із Землі до космосу було перекинуто, дорога до зірок відкрита \nзавдяки\
    \ невтомній праці Сергія Павловича Корольова, що починав \nтрудову діяльність\
    \ із рознесення газет, а закінчив її творцем космічних \nкораблів, засновником\
    \ практичної космонавтики (За Л. Семакою). II. За самостійно складеним планом\
    \ усно перекажіть текст. III. Складіть невелике письмове продовження тексту з\
    \ власних міркувань \nпро значення досліджень космосу для людства. 205"
