  text: "104 \nСергій Корольов (1907 – 1966) \nУродженець міста Житомир свій перший\
    \ планер \nспроєктував 17-річним. Упродовж 1938–1944 років був \nрепресований.\
    \ Під час заслання влада залучала \nСергія Корольова до будівництва літаків і\
    \ ракетного \nприскорювача для бойових літаків. Як Головний \nконструктор СРСР\
    \ протягом 1948–1966 років удоско-\nналював висотні геофізичні ракети, керував\
    \ роз-\nробленням і запуском перших космічних кораблів, \nавтоматичних мiжпланетних\
    \ станцiй. Серед його до-\nсягнень  запуск першог"
