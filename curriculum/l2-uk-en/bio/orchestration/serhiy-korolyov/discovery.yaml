  text: "118\n332.\t 1.\t Прочитай текст. Яка мрія Сергія Корольова здійснилася?\n\
    Здавна людей притягувало небо. \nА що там — у темній безодні космосу? \nКрок за\
    \ кроком учені йшли до \nздійснення людської мрії. Український \nавіаконструктор\
    \ Сергій Корольов створив \nперший у світі космічний корабель. На \nньому людина\
    \ вперше піднялася в космос \nі облетіла Землю. \n2.\t Яка мета тексту? Який тип\
    \ цього \nтексту? Поясни свою думку.\n3.\t Використовуючи слова для довідки, \n\
    напиши переказ.\nСлова для довідки: притягувало неб"
