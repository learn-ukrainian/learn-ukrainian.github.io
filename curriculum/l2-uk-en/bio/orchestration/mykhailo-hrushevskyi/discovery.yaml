  chunk_id: 9-klas-ukrajinska-mova-voron-2017_s0115
  text: "українська історія та література. Після закінчення гімназії Михайло \nСергійович\
    \ вступив на історико-філологічний факультет Київського \nуніверситету. У студентські\
    \ роки Грушевський глибоко вивчає історію Середньої \nНаддніпрянщини доби Давньої\
    \ Русі, а також середньовічну історію \nУкраїни загалом. По закінченні університету\
    \ він захистив канди­\nдатську дисертацію «Нарис історії Київської землі від смерті\
    \ \nЯрослава до кінця XIV століття». З 1894 року, очоливши кафедру історії Львівського\
    \ університету"
  section_title: Сторінка 91
  grade: 9
  author: voron
  page: ''
  trust_tier: 2
- score: 0.3333333432674408
  chunk_id: 5-klas-istoriya-schupak-2022_s0103
  text: "Історична наука та історична пам’ять\n105\nшого президента незалежної України.\
    \ Варто зазначити, що слі-\nди цього міфу можна знайти навіть на сайтах наукових\
    \ установ. Факт чи фейк? Чи був Михайло Грушевський президентом? Коло інтересів\
    \ Михайла Грушевського було широким. У юні роки Ми-\nхайло Сергійович пробував\
    \ себе як письменник. Відомо, що свого часу він \nнадрукував оповідання «Бех-аль-Джугур»\
    \ та «Бідна дівчина». Протягом життя він написав близько двох тисяч праць з історії,\
    \ соціо-\nлогії, літерату"
  section_title: Сторінка 105
  grade: 5
  author: schupak
  page: ''
  trust_tier: 1
- score: 0.25
  chunk_id: 9-klas-ukrajinska-mova-voron-2017_s0114
  text: "Ми діти твої, У країно!\nІ. Попрацюйте в парах. Прочитайте текст мовчки,\
    \ зазначивши витра­\nчений на це час (він не повинен перебільшувати п’яти з половиною\
    \ \nхвилин).\nПЕРШИЙ ПРЕЗИДЕНТ УКРАЇНИ \nУ листопаді 1991 р. в Україні після десятиліть\
    \ мовчання відзна­\nчалося 125-річчя від дня народження видатного історика і політич­\n\
    ного діяча, першого Президента України Михайла Грушевського. \nЙого ім’я повернулося\
    \ українському народові, вітчизняній науці, \nвсьому світові. Сьогодні Михайло\
    \ Грушевський, велете"
