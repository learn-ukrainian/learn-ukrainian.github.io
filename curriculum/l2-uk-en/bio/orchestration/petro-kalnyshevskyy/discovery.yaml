  text: "Розділ 5 \nУКРАЇНСЬКІ ЗЕМЛІ у 20-90-х роках XVIII ст.\nЗапорожці Нової Січі\
    \ були втягнені у вир протистояння Російської \nімперії з Османською імперією\
    \ і Кримським ханством. Козаки несли \nохоронну сторожову прикордонну службу,\
    \ виконували розвідувальні за­\nвдання, їх залучали до участі в російсько-турецьких\
    \ війнах 1735-1739 \nрр. та 1768-1774 рр.\nРосійська імперія поступово затягувала\
    \ зашморг довкола Нової \nСічі. За адміністрацією Нової Січі здійснював нагляд\
    \ російський пол­\nковник. Після відновлення"
