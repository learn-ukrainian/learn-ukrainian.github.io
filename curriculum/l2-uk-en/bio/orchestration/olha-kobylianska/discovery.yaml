  text: "Ольга Кобилянська    157\nОльга Кобилянська і модернізм\nІдея оновлення\
    \ стала провідною рисою модернізму. Свого часу вона ві­\nдобразила об’єктивну\
    \ потребу, без задоволення якої су­спільство не могло по-\nвноцінно розвиватися.\
    \ Літератори замислювались над ідеалом нової людини. Вони зверталися до глибшого\
    \ пізнання особистості, її духовного життя. Осо-\nбливу увагу приділяли сфері\
    \ моралі, звичаїв, взаєминам між статями. Звідси \nінтерес багатьох модерністів\
    \ до питання фемінізму1 та жіночої емансипації2"
