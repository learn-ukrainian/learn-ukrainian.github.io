- type: reading
  id: reading-vovchok-quote
  title: 'Первинне джерело: Уривок про волю'
  source: Марко Вовчок, Інститутка (1860)
  text: 'Люди дивуються, що я весела: надійсь, горенько моє на виду в усіх. А я так
    собі міркую: чого мені журитися? Воля моя! Я тепер вільна і можу сама собою розпоряджати.
    Хоч би й найтяжча праця, та вона моя, а не панська. Що наша копійка? Кров''ю обкипіла!
    Але це моя копійка, зароблена вільною людиною, а не рабинею.

    '
  tasks:
  - Які почуття викликає в Устини здобуття волі згідно з уривком?
  - Як авторка протиставляє власну працю і панську?
- type: critical-analysis
  title: 'Критичний аналіз: Концепт волі'
  source_reading: reading-vovchok-quote
  target_text: Що наша копійка? Кров'ю обкипіла! Але це моя копійка, зароблена вільною
    людиною, а не рабинею.
  questions:
  - Яку функцію виконує метафора кров'ю обкипіла в цьому тексті?
  - Як цей уривок руйнує стереотип про безмовну і пасивну кріпачку?
  model_answers:
  - Метафора підкреслює нелюдські зусилля і страждання, яких вимагає виживання, але
    водночас надає цій праці екзистенційної ваги.
  - Героїня виступає не як об'єкт жалю, а як активний суб'єкт, що цінує особисту свободу
    вище за матеріальний комфорт і має власну гідність.
- type: essay-response
  title: 'Есе: Формування жіночого голосу'
  source_reading: reading-vovchok-quote
  prompt: Спираючись на уривок з повісті Інститутка та біографію Марка Вовчка, проаналізуйте,
    яким чином її творчість стала предтечею феміністичного дискурсу в українській
    літературі. Зверніть увагу на соціальну та гендерну експлуатацію її героїнь.
  min_words: 250
  model_answer: 'Марко Вовчок уперше в українській літературі наділила жінку-кріпачку
    власним, незалежним голосом. Її героїні, як-от Устина, не просто страждають від
    гноблення, а рефлексують над ним, усвідомлюють свою людську гідність і прагнуть
    звільнення. Цей голос протистоїть подвійній експлуатації: з боку панства та патріархального
    суспільства. Сама письменниця, обравши шлях фінансової незалежності та самостійної
    творчої кар''єри, стала живим втіленням емансипації, кинувши виклик суспільним
    умовностям.'
  rubric:
  - criteria: Аналіз феміністичного дискурсу
    description: Успішно розкрито роль Марка Вовчка як предтечі українського фемінізму.
    points: 10
  - criteria: Використання первинного джерела
    description: Наведено аргументи з уривка твору Інститутка.
    points: 10
- type: quiz
  title: 'Перевірте знання: Аналіз тексту'
  items:
  - question: Згідно з текстом модуля, що стало вирішальним фактором у феноменальному
      оволодінні українською мовою Марією Вілінською?
    explanation: Безпосередня комунікація з носіями мови під час етнографічних експедицій
      стала ключовою для її мовного становлення.
    options:
    - text: безпосередня польова робота і збирання фольклору серед селян
      correct: true
    - text: навчання в елітному приватному жіночому пансіоні в Харкові
      correct: false
    - text: читання академічних словників та граматик української мови
      correct: false
    - text: спілкування виключно з Тарасом Шевченком у Петербурзі
      correct: false
  - question: Яку новацію, на думку автора тексту, принесла збірка Народні оповідання
      в українську літературу того часу?
    explanation: Марко Вовчок відійшла від етнографічного романтизму і запровадила
      суворий, соціально загострений реалізм.
    options:
    - text: суворий соціальний реалізм і глибоку психологічну достовірність
      correct: true
    - text: бурлескний гумор і карикатурне зображення життя селянства
      correct: false
    - text: детальне описування розваг і побуту провінційного дворянства
      correct: false
    - text: перші спроби наукової фантастики та пригодницької прози
      correct: false
  - question: Який аргумент наводить автор тексту щодо того, як імперська критика
      намагалася применшити індивідуальний геній письменниці?
    explanation: Критики висували теорії, що справжнім автором її творів був чоловік
      Опанас Маркович або Пантелеймон Куліш.
    options:
    - text: критики приписували авторство її творів чоловікові або редактору
      correct: true
    - text: критики стверджували, що її твори є лише перекладами з французької
      correct: false
    - text: критики повністю ігнорували її українські тексти, аналізуючи лише російські
      correct: false
    - text: критики заявляли, що всі її оповідання були написані Тарасом Шевченком
      correct: false
  - question: Згідно з текстом, чому пізні масштабні російськомовні романи Марка Вовчка
      не здобули такого ж статусу в каноні, як її українські твори?
    explanation: Українська мова забезпечила синергію між авторкою і темою, тоді як
      російським текстам бракувало автентичності та емоційної правди.
    options:
    - text: їм бракувало емоційної правди та специфічної фольклорної глибини
      correct: true
    - text: вони були занадто радикальними для російської читаючої публіки
      correct: false
    - text: вони містили занадто багато українських діалектизмів і русизмів
      correct: false
    - text: вони були заборонені цензурою одразу після їх першої публікації
      correct: false
  - question: Як автор тексту пояснює, що успіх повісті Маруся у Франції слугував
      актом культурної дипломатії?
    explanation: Твір відкрив для європейської аудиторії українську історію та прагнення
      народу до незалежності.
    options:
    - text: він познайомив європейців з українською темою та волелюбним народом
      correct: true
    - text: він переконав французький уряд надати військову підтримку Україні
      correct: false
    - text: він довів, що українська література є кращою за французьку класику
      correct: false
    - text: він сприяв масовій еміграції французьких письменників до Києва
      correct: false
  - question: Згідно з текстом, яку стратегічну функцію виконував псевдонім Марко
      Вовчок у літературній кар'єрі авторки?
    explanation: Чоловічий псевдонім дозволяв уникати упередженості до жіночої прози,
      а народне коріння позиціювало її як національну авторку.
    options:
    - text: дозволяв уникати гендерних упереджень і підкреслював її народне коріння
      correct: true
    - text: був необхідний для уникнення політичних переслідувань з боку цензури
      correct: false
    - text: це була вимога Пантелеймона Куліша для публікації її перших творів
      correct: false
    - text: він приховував її аристократичне походження від радикальної молоді
      correct: false
  - question: У тексті модуля автор наголошує на специфічному підході Марка Вовчка
      до теми кріпацтва. У чому він полягав?
    explanation: Письменниця фокусувалася на психологічному рівні — як система руйнує
      особистість, а не лише на загальних політичних гаслах.
    options:
    - text: вона досліджувала мікрорівень трагедії та як рабство руйнує особистість
      correct: true
    - text: вона зосередилася виключно на економічних і статистичних аспектах системи
      correct: false
    - text: вона розглядала кріпацтво як необхідний етап історичного розвитку
      correct: false
    - text: вона описувала здебільшого успішні повстання селян над гнобителями
      correct: false
  - question: Як у тексті пояснюється феномен асиміляції у випадку Марії Вілінської?
    explanation: Замість того щоб підкоритися імперській русифікації, вона здійснила
      зворотний рух — добровільну українізацію.
    options:
    - text: це був безпрецедентний випадок перемоги індивідуального вибору над вихованням
      correct: true
    - text: це типовий приклад захоплення екзотикою підкорених народів
      correct: false
    - text: це була стратегія уникнення відповідальності за злочини імперії
      correct: false
    - text: це результат примусової українізації Кирило-Мефодіївським братством
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Аналіз біографії: Правда чи хиба'
  items:
  - statement: Згідно з текстом модуля, походження з етнічно російської дворянської
      родини унеможливило для Марії Вілінської глибоке розуміння українського селянства.
    correct: false
    explanation: Навпаки, її свідомий вибір і емпатія допомогли їй зламати імперську
      матрицю і стати голосом пригноблених.
  - statement: Повість Інститутка вважається інноваційною завдяки використанню прийому
      очуднення — показу панського життя через сприйняття кріпачки.
    correct: true
    explanation: Цей прийом зробив абсурдність і нелюдськість системи кріпацтва особливо
      очевидними.
  - statement: У тексті стверджується, що перебуваючи в еміграції у Парижі, Марко
      Вовчок заробляла на життя виключно завдяки фінансовій підтримці колишнього чоловіка.
    correct: false
    explanation: Вона заробляла самостійно, перекладаючи твори Жуля Верна та пишучи
      власні тексти, що було сміливим кроком для жінки.
  - statement: Літературний скандал у Петербурзі, пов'язаний зі звинуваченням у плагіаті,
      зруйнував репутацію Марка Вовчка та змусив її змінити стратегію.
    correct: true
    explanation: Скандал із перекладами казок Андерсена призвів до її остракізму та
      глибокої травми.
  - statement: Сучасні лінгвістичні дослідження чернеток письменниці підтверджують
      теорію про те, що Пантелеймон Куліш був справжнім автором її творів.
    correct: false
    explanation: Сучасний аналіз доводить самостійне авторство Марії Вілінської та
      її колосальну щоденну працю.
  - statement: Тарас Шевченко настільки високо оцінив талант Марка Вовчка, що присвятив
      їй вірш і назвав своїм кротким пророком.
    correct: true
    explanation: Шевченко бачив у ній свою духовну спадкоємицю, здатну чесно говорити
      від імені пригнобленого народу.
  instruction: Визначте, чи твердження правильне.
- type: comparative-study
  title: 'Порівняльний аналіз: Дві ідентичності'
  items_to_compare:
  - Україномовні твори (ранній період)
  - Російськомовні романи (пізній період)
  criteria:
  - Емоційна автентичність та фольклорна глибина
  - Роль у формуванні національного канону
  - Успіх у сучасників та історична спадщина
  instruction: 'Порівняйте ранню україномовну творчість Марка Вовчка та її пізні російськомовні романи згідно з наведеними критеріями.'