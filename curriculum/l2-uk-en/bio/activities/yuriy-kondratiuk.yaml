- type: reading
  id: reading-lor
  title: 'Уривок з тексту: Траса Кондратюка'
  source: 'Навчальний модуль: Юрій Кондратюк'
  text: 'Більшість ранніх проектів передбачали будівництво ракети колосальних розмірів,
    яка б доставила до Місяця і посадила на його поверхню цілий космічний корабель
    з повним запасом палива для зворотного шляху. Кондратюк довів, що це енергетичний
    абсурд. Його геніальна пропозиція виглядала так: важка ракета виводить до Місяця
    космічний комплекс, що складається з основного орбітального корабля та маленького
    посадкового модуля. Екіпаж переходить у посадковий модуль і здійснює посадку,
    тоді як важкий корабель залишається на навколомісячній орбіті.

    '
  tasks:
  - Яка головна проблема ранніх проектів польоту на Місяць?
  - Яке рішення запропонував Кондратюк для економії палива?
- type: critical-analysis
  title: 'Аналіз: Енергетична доцільність'
  source_reading: reading-lor
  target_text: 'Кондратюк довів, що це енергетичний абсурд. Його геніальна пропозиція
    виглядала так: важка ракета виводить до Місяця космічний комплекс, що складається
    з основного орбітального корабля та маленького посадкового модуля.

    '
  questions:
  - Який аргумент автор наводить для обґрунтування того, що посадка всього корабля
    на Місяць є енергетичним абсурдом?
  - Згідно з текстом, яку функцію виконує поділ комплексу на дві частини під час місії?
  model_answers:
  - Посадка всього корабля вимагає колосальних розмірів ракети та величезних запасів
    палива для зворотного шляху, що робить такий політ практично неможливим через
    масу.
  - Поділ дозволяє залишити важку частину на орбіті, а для посадки і зльоту з Місяця
    використовувати лише легкий модуль, що потребує мінімум енергії.
- type: essay-response
  title: 'Есе: Від теорії до практики'
  source_reading: reading-lor
  prompt: 'У тексті зазначається, що Кондратюк запропонував схему зустрічі на орбіті
    у 1920-х роках, і вона стала єдиним технічно можливим шляхом для місії Аполлон
    у 1960-х. Проаналізуйте, спираючись на текст модуля, як ідеї, розроблені в умовах
    абсолютної ізоляції та без практичного фінансування, змогли випередити свій час.
    Чому американські інженери згодом відмовилися від прямого сходження на користь
    траси Кондратюка?

    '
  min_words: 250
  model_answer: 'В есе слід зазначити, що Кондратюк працював в умовах інформаційної
    та наукової ізоляції, проте зміг розв''язати фундаментальну проблему космонавтики
    — енергетичні обмеження. Американські інженери в межах програми Аполлон зіткнулися
    з тією ж стіною: для прямого сходження потрібна була ракета Nova нереальних розмірів.
    Згідно з текстом, розрахунки Кондратюка довели математичну неефективність такого
    підходу. Використання легкого посадкового модуля та залишення масивного корабля
    на навколомісячній орбіті радикально зменшувало стартову масу. Його здатність
    мислити не лише теоретичними, а й інженерно-практичними категоріями дозволила
    створити концепцію, яка виявилася єдино можливою для реалізації висадки людини
    на Місяць.

    '
  rubric:
  - criteria: Розуміння концепції LOR
    description: Чітке пояснення того, чому схема Кондратюка енергетично вигідніша
      за пряме сходження.
    points: 10
  - criteria: Аналіз контексту
    description: Висвітлення феномену наукової ізоляції Кондратюка та паралелі з проблемами
      NASA.
    points: 10
- type: true-false
  title: 'Перевірка розуміння: Життєвий шлях'
  instruction: Визначте, чи є твердження правдивими згідно з текстом модуля.
  items:
  - statement: Юрій Кондратюк здобув освіту як інженер-самоучка, не маючи доступу
      до престижних навчальних закладів Російської імперії.
    correct: false
    explanation: Олександр Шаргей навчався у Петроградському політехнічному інституті
      та походив з родини інтелігентів.
  - statement: Справжнє ім'я видатного вченого — Олександр Гнатович Шаргей.
    correct: true
    explanation: Він був змушений прийняти ім'я Юрій Кондратюк, щоб приховати своє
      дворянське та офіцерське минуле.
  - statement: Дерев'яний елеватор Мастодонт був зруйнований радянською владою через
      звинувачення в шкідництві.
    correct: false
    explanation: Елеватор успішно функціонував понад шістдесят років і згорів у 1990-х
      роках.
  - statement: Кондратюк відмовився від співпраці з Сергієм Корольовим через небажання
      переїжджати до Москви.
    correct: false
    explanation: Він відмовився через страх перед перевіркою біографії співробітниками
      НКВС, що розкрило б його минуле.
  - statement: Ідея використання аеродинамічного гальмування при поверненні космічного
      корабля була вперше описана Кондратюком.
    correct: true
    explanation: Він запропонував гасити швидкість за рахунок тертя об атмосферу замість
      використання палива.
  - statement: Американський інженер Джон Хуболт публічно визнав, що розрахунки Кондратюка
      стали фундаментом місії Аполлон-11.
    correct: true
    explanation: Хуболт підтвердив, що NASA скористалася схемою зустрічі на орбіті,
      розробленою Кондратюком.
- type: quiz
  title: 'Перевірка знань: Науковий внесок та доля'
  items:
  - question: Згідно з текстом модуля, якою була головна причина відмови Олександра
      Шаргея від свого справжнього імені?
    explanation: Він змінив ім'я, щоб уникнути репресій через своє походження та службу
      в царській армії.
    options:
    - text: бажання уникнути фізичного знищення через офіцерське та дворянське минуле
      correct: true
    - text: намір розпочати нове життя після еміграції до іншої країни
      correct: false
    - text: вимога секретних оборонних підприємств для захисту його винаходів
      correct: false
    - text: бажання приховати своє походження від антисемітських рухів
      correct: false
  - question: Яку принципову інновацію застосував Кондратюк під час будівництва елеватора
      у Сибіру?
    explanation: Кондратюк спроєктував конструкцію, яка збиралася без металевих цвяхів
      через їхній тотальний дефіцит.
    options:
    - text: будівництво величезної дерев'яної споруди без використання жодного цвяха
      correct: true
    - text: використання армованого бетону та внутрішніх сталевих тросів
      correct: false
    - text: створення повністю автоматизованої системи завантаження зерна
      correct: false
    - text: застосування вітрової енергії для роботи внутрішніх конвеєрів
      correct: false
  - question: Який математичний принцип лежить в основі розробленої Кондратюком Траси
      равлика?
    explanation: Траса равлика передбачає використання гравітаційних полів планет
      для розгону або гальмування апарата.
    options:
    - text: використання гравітаційних маневрів для мінімізації витрат палива
      correct: true
    - text: політ по прямій лінії за допомогою постійної роботи двигунів
      correct: false
    - text: гальмування космічного корабля виключно за рахунок сонячного вітру
      correct: false
    - text: застосування аеродинамічного опору атмосфери для зміни орбіти
      correct: false
  - question: Як у тексті пояснюється феномен паралельного відкриття між Кондратюком
      та іншими науковцями?
    explanation: Кондратюк працював в умовах штучної ізоляції радянської науки і не
      мав доступу до праць своїх сучасників.
    options:
    - text: він розробляв теорії самостійно через штучну ізоляцію радянської науки
        від світу
      correct: true
    - text: він активно листувався з німецькими та американськими інженерами
      correct: false
    - text: він використовував розвідувальні дані для копіювання західних технологій
      correct: false
    - text: радянський уряд організовував таємні конференції для обміну досвідом
      correct: false
  - question: Що запропонував використати Кондратюк для захисту космонавтів від перевантажень
      під час польоту?
    explanation: Він розрахував, що напівлежаче положення дозволить людському організму
      легше переносити шалені прискорення.
    options:
    - text: спеціальне анатомічне крісло-ліжко для перебування у напівлежачому положенні
      correct: true
    - text: герметичну капсулу, яка наповнена спеціальною амортизаційною рідиною
      correct: false
    - text: багатошаровий скафандр із сучасною системою активного охолодження
      correct: false
    - text: систему штучної гравітації всередині основного орбітального корабля
      correct: false
  - question: У тексті автор характеризує смерть Кондратюка. Що відомо про обставини
      його загибелі на війні?
    explanation: Кондратюк зник безвісти під час боїв, і його точне місце поховання
      невідоме.
    options:
    - text: він зник безвісти під час кровопролитних фронтових боїв у лютому 1942
        року
      correct: true
    - text: він загинув під час випробувань нової ракетної зброї на полігоні в Москві
      correct: false
    - text: він помер від фізичного виснаження в одному з концентраційних таборів
      correct: false
    - text: його розстріляли співробітники каральних органів після викриття біографії
      correct: false
  instruction: Оберіть правильну відповідь.
