- type: reading
  id: reading-01
  title: 'Первинне джерело: Звернення Наталії Кобринської'
  source: Наталія Кобринська, програмна промова (1884)
  text: 'Ми, жінки, мусимо самі взятися за своє визволення. Наша мета — не руйнування
    родини, а її оздоровлення через здобуття жінкою економічної незалежності та рівного
    доступу до вищої освіти. Тільки тоді, коли жінка перестане бути покірною прислужницею,
    вона зможе стати справжньою громадянкою.

    '
  tasks:
  - Проаналізуйте головні вимоги авторки щодо прав жінок.
- type: critical-analysis
  title: 'Критичний аналіз: Економічна незалежність'
  source_reading: reading-01
  instruction: Проаналізуйте уривок тексту та дайте розгорнуті відповіді.
  target_text: Наша мета — не руйнування родини, а її оздоровлення через здобуття
    жінкою економічної незалежності...
  items:
  - prompt: У тексті модуля автор підкреслює, що Кобринська вважала економічну незалежність
      ключовою вимогою. Згідно з текстом промови, чому економічна емансипація є необхідною
      передумовою для оздоровлення родини та здобуття громадянства?
    model_answer: Кобринська стверджує, що економічна залежність робить жінку покірною
      прислужницею. Здобуття економічної незалежності дозволяє їй позбутися цього
      статусу, стати рівноправною партнеркою в родині та повноцінною громадянкою,
      здатною брати участь у суспільному житті.
- type: essay-response
  title: 'Есе: Ідеологічна полеміка з радикалами'
  instruction: Напишіть аргументативне есе на основі матеріалу модуля.
  prompt: У тексті модуля автор описує дискусію між Наталією Кобринською та Іваном
    Франком щодо пріоритетів суспільної боротьби. Згідно з текстом, який аргумент
    наводила Кобринська, відмовляючись підпорядкувати жіноче питання класовій боротьбі?
    Проаналізуйте, чому вона вважала патріархат давнішою формою гноблення.
  min_words: 250
  model_answer: 'Згідно з текстом, Кобринська аргументувала, що патріархат є набагато
    давнішою і глибшою формою гноблення, ніж капіталізм. Вона доводила, що жінки-робітниці
    страждають подвійно: як від експлуататорів-роботодавців, так і від власних чоловіків.
    На противагу радикалам, які вірили, що соціалістична революція автоматично вирішить
    гендерні проблеми, Кобринська наполягала на автономності феміністичного руху,
    оскільки скасування класової нерівності не гарантує зникнення патріархального
    примусу в родині та суспільстві.'
  rubric:
  - criteria: Розуміння аргументів
    description: Чітке пояснення позиції Кобринської щодо пріоритетності жіночого
      питання.
    points: 40
  - criteria: Критичний аналіз
    description: Глибокий аналіз концепції подвійного гноблення жінки.
    points: 40
  - criteria: Мовне оформлення
    description: Використання відповідної термінології та складної аргументації.
    points: 20
- type: true-false
  title: Аналіз фактів та концепцій
  instruction: Визначте, чи є твердження правильним, опираючись на текст модуля.
  items:
  - statement: Згідно з текстом, альманах Перший вінок був виданий виключно галицькими
      авторками і відображав суто регіональні проблеми.
    correct: false
    explanation: У тексті зазначено, що альманах об'єднав авторок з усієї України,
      ставши прикладом соборності та єднання Галичини і Наддніпрянщини.
  - statement: У тексті модуля автор стверджує, що Кобринська розглядала вищу освіту
      як необхідну передумову для свідомої участі жінки в житті нації.
    correct: true
    explanation: Кобринська аргументувала, що неможливо вимагати від жінки відповідальності
      за долю нації, відмовляючи їй у праві на інтелектуальний розвиток.
  - statement: Згідно з текстом, рання проза Кобринської, зокрема оповідання Задля
      кусника хліба, ідеалізувала традиційний шлюб як єдиний шлях до жіночого щастя.
    correct: false
    explanation: Навпаки, її проза деконструювала міф про шлюб, показуючи, що в умовах
      патріархату він часто стає легалізованою формою рабства заради фізичного виживання.
  - statement: У тексті зазначається, що після смерті чоловіка Кобринська відмовилася
      від традиційної ролі вдови, яка передбачала соціальну невидимість.
    correct: true
    explanation: Вона відкинула соціальні очікування (піти в монастир чи присвятити
      себе скорботі) і замість цього вирушила до Відня та розгорнула активну громадську
      діяльність.
  - statement: Згідно з текстом, Іван Франко повністю поділяв погляди Кобринської
      і вважав феміністичний рух важливішим за класову боротьбу.
    correct: false
    explanation: У тексті вказано, що між ними точилася гостра полеміка. Франко та
      радикали вважали жіноче питання вторинним, похідним від класової нерівності.
  - statement: Як свідчить текст модуля, пізня творчість Кобринської відзначалася
      переходом від прямолінійного реалізму до філософського символізму.
    correct: true
    explanation: Автор зазначає, що в пізній період вона звернулася до жанру філософської
      казки та символізму, відмовившись від соціальної конкретики.
- type: quiz
  title: Перевірка концептуального розуміння
  items:
  - question: Згідно з текстом, як автор характеризує головну відмінність між підходами
      Наталії Кобринської та сентиментальною літературою до зображення жіночої долі?
    explanation: Кобринська не зображала жінку як пасивну жертву, а фокусувалася на
      її економічній залежності як головній причині страждань.
    options:
    - text: Вона фокусувалася на економічній залежності як причині страждань.
      correct: true
    - text: Вона вважала, що жінка має присвятити себе виключно вихованню дітей.
      correct: false
    - text: Вона ідеалізувала життя сільської жінки на лоні природи.
      correct: false
    - text: Вона зосереджувалася виключно на нещасливому романтичному коханні.
      correct: false
  - question: Який аргумент автор наводить для пояснення того, чому родини галицьких
      священиків відігравали ключову роль у просвітництві?
    explanation: У Галичині через слабкість світської інтелігенції саме духовенство
      стало основним носієм національної ідеї.
    options:
    - text: Через відсутність власної національної аристократії та слабкість світської
        інтелігенції.
      correct: true
    - text: Тому що вони отримували щедре фінансування від австрійського уряду.
      correct: false
    - text: Через те, що вони мали монопольне право на друкування українських книжок.
      correct: false
    - text: Бо вони були єдиними, хто мав право подорожувати за межі Австро-Угорщини.
      correct: false
  - question: У тексті модуля автор згадує стратегічний союз з Оленою Пчілкою. Яку
      головну політичну ідею символізувала ця співпраця?
    explanation: Співпраця галичанки та наддніпрянки довела єдність українського національного
      організму всупереч імперським кордонам.
    options:
    - text: Соборність українських земель та єдність національного руху.
      correct: true
    - text: Необхідність збройного повстання проти Російської імперії.
      correct: false
    - text: Перевагу наддніпрянської літератури над галицькою традицією.
      correct: false
    - text: Відмову від європейських соціалістичних ідей на користь консерватизму.
      correct: false
  - question: Згідно з текстом, яку безпрецедентну для Галичини ідею запропонувала
      Кобринська під час установчих зборів Товариства руських жінок?
    explanation: Вона запропонувала створення громадських дитячих садків та спільних
      кухонь для вивільнення часу жінок.
    options:
    - text: Створення громадських дитячих садків та спільних кухонь.
      correct: true
    - text: Повну відмову від інституту шлюбу та створення жіночих комун.
      correct: false
    - text: Заснування жіночого військового підрозділу у складі армії.
      correct: false
    - text: Обов'язкову службу жінок у благодійних та релігійних установах.
      correct: false
  - question: Як автор пояснює справжню причину арешту Кобринської російською окупаційною
      владою у 1915 році?
    explanation: Арешт був пов'язаний не зі шпигунством, а з її багатолітньою проукраїнською
      діяльністю та авторитетом.
    options:
    - text: Її переслідували за багатолітню проукраїнську та суспільну діяльність.
      correct: true
    - text: Вона відкрито агітувала за вступ жінок до австрійського війська.
      correct: false
    - text: У неї знайшли секретні плани австрійських військових укріплень.
      correct: false
    - text: Вона відмовилася надати прихисток пораненим російським солдатам.
      correct: false
  - question: У тексті згадується альманах Наша доля. Яку критично важливу функцію
      виконувало це видання наприкінці дев'ятнадцятого століття?
    explanation: Альманахи слугували майданчиком для публікації молодих авторок, яким
      було важко пробитися в консервативні видання.
    options:
    - text: Він слугував майданчиком для публікації молодих і невідомих авторок.
      correct: true
    - text: Він був єдиним джерелом фінансування для радикальної партії.
      correct: false
    - text: Він містив виключно переклади європейських філософських трактатів.
      correct: false
    - text: Він став офіційним органом преси галицького крайового сейму.
      correct: false
  - question: Згідно з текстом, чому радянська влада намагалася привласнити спадщину
      Наталії Кобринської?
    explanation: Радянська влада вихолощувала національний та феміністичний зміст
      її праць, виставляючи її виключно як борчиню з класовою нерівністю.
    options:
    - text: Щоб виставити її виключно як революційну демократку та борчиню з класовою
        нерівністю.
      correct: true
    - text: Щоб довести, що український фемінізм виник раніше за російський.
      correct: false
    - text: Тому що вона у своїх пізніх творах відкрито підтримала більшовицьку ідеологію.
      correct: false
    - text: Щоб виправдати репресії проти консервативного галицького духовенства.
      correct: false
  - question: Як автор характеризує шлюб Наталії та Теофіла Кобринських у контексті
      патріархального суспільства Галичини?
    explanation: Шлюб став рідкісним винятком, справжнім інтелектуальним партнерством,
      де чоловік підтримував розвиток дружини.
    options:
    - text: Це було рідкісне інтелектуальне партнерство, засноване на рівноправності.
      correct: true
    - text: Це був типовий шлюб з розрахунку для об'єднання двох впливових родин.
      correct: false
    - text: Це був конфліктний союз, де чоловік постійно обмежував її свободу.
      correct: false
    - text: Це був шлюб, у якому жінка повністю підпорядкувала собі чоловіка.
      correct: false
  instruction: Оберіть правильну відповідь.
