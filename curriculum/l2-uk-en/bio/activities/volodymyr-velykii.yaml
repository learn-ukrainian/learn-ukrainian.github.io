- type: reading
  id: reading-choice-of-faith
  title: Літописна легенда про вибір віри
  source: Адаптовано за «Повістю минулих літ»
  text: 'У рік 986 прийшли болгари віри магометанської, кажучи: «Ти, княже, мудрий
    єси, а закону не знаєш. Увіруй у закон наш і поклонись Магомету». Спитав Володимир:
    «Яка ж віра ваша?». Вони ж сказали: «Віруємо Богу, а Магомет нас учить: не їсти
    свинини, не пити вина, а по смерті дасть Магомет кожному по сімдесят жінок красивих».
    Володимир слухав їх, бо сам любив жінок, але це йому було не до вподоби: не їсти
    свинини і не пити вина. Він сказав: «Русі єсть веселіє пити, не можемо без того
    бути». Потім прийшли німці від Риму, кажучи: «Прийшли ми від Папи». І сказали
    вони: «Піст у нас по силі: хто скільки може, той їсть і п''є, все во славу Божу,
    як учив нас учитель наш Павло». Володимир же сказав їм: «Ідіть назад, бо батьки
    наші сього не приймали». Потім прийшли хозари єврейської віри... Він же спитав:
    «А де земля ваша?». Вони ж сказали: «У Єрусалимі». Він спитав: «То чи там вона
    є нині?». Вони ж сказали: «Розгнівався Бог на батьків наших, і розсіяв нас по
    країнах за гріхи наші, а землю нашу віддав християнам». Володимир тоді мовив:
    «То як ви інших учите, коли самі відкинуті Богом? Якби Бог любив вас і закон ваш,
    то не були б ви розсіяні по чужих землях».'
  tasks:
  - Прочитайте текст та проаналізуйте аргументи князя.
- type: critical-analysis
  title: Аналіз літописної риторики
  source_reading: reading-choice-of-faith
  target_text: Діалоги Володимира з представниками різних конфесій.
  items:
  - prompt: Проаналізуйте відмову Володимира "німцям від Папи" з фразою "батьки наші
      сього не приймали". Який політичний, а не релігійний мотив приховано за цим
      посиланням на традицію?
    model_answer: 'Відмова з посиланням на "батьків" є дипломатичним прикриттям небажання
      підкорятися папському Риму. Політичний мотив полягає у прагненні суверенітету:
      прийняття західного християнства означало б визнання верховенства Папи над світською
      владою князя (інвеститура), що суперечило амбіціям Володимира щодо абсолютної
      влади. Крім того, згадка про "батьків" може натякати на невдалу місію єпископа
      Адальберта до княгині Ольги.'
  - prompt: Як аргумент Володимира до хозарів ("де земля ваша?") відображає середньовічне
      уявлення про легітимність влади?
    model_answer: Аргумент демонструє, що в середньовіччі істинність віри вимірювалася
      політичним і військовим успіхом. Втрата державності ("землі") сприймалася як
      прямий доказ того, що Бог відвернувся від народу. Для Володимира, який будував
      імперію, релігія "лузерів" (бездержавного народу) була неприйнятною, оскільки
      вона не гарантувала сакральної підтримки його власного права на володіння територією.
- type: essay-response
  title: 'Есе: Геополітика хрещення'
  prompt: 'Проаналізуйте тезу: "Вибір візантійського християнства був не духовним
    прозрінням, а геополітичним тендером". У своїй відповіді оцініть роль концепції
    цезаропапізму, економічні зв''язки з Константинополем та династичний шлюб з Анною
    Порфірородною як фактори цього вибору.'
  min_words: 250
  rubric:
  - criteria: Аргументація
    description: Чітке пояснення прагматичних причин вибору (політика, економіка,
      статус).
    points: 40
  - criteria: Використання термінів
    description: Коректне вживання понять "цезаропапізм", "порфірородна", "легітимація".
    points: 30
  - criteria: Історичний контекст
    description: Врахування кризи Візантії (повстання Варди Фоки) як каталізатора
      подій.
    points: 30
  model_answer: Вибір Володимира на користь Візантії був продиктований холодним політичним
    розрахунком. По-перше, модель цезаропапізму, де імператор стояв вище патріарха,
    ідеально пасувала для розбудови централізованої автократії на Русі, на відміну
    від західної моделі з сильним Папою. По-друге, Візантія була головним торговим
    партнером і джерелом високої культури (права, архітектури), що сприяло модернізації
    держави. По-третє, шлюб з Анною Порфірородною вводив київського князя в коло вищої
    європейської аристократії, легітимізуючи його статус "бастарда" і перетворюючи
    Русь на повноправного гравця міжнародної арени. Хрещення стало інструментом входження
    до "клубу імперій".
- type: quiz
  title: Реформи та державотворення
  items:
  - question: Яка основна стратегічна мета будівництва Змієвих валів?
    explanation: Змієві вали були збудовані для захисту від мобільної кінноти печенігів,
      унеможливлюючи їхні стрімкі набіги.
    options:
    - text: захист від набігів печенізької кінноти
      correct: true
    - text: демаркація кордону з Польщею
      correct: false
    - text: захист від повеней на Дніпрі
      correct: false
    - text: створення торгових шляхів
      correct: false
  - question: У чому полягав політичний сенс карбування власних златників і срібників?
    explanation: Випуск монети був декларацією суверенітету ("Володимир на столі"),
      оскільки право карбувати золото мали лише імператори.
    options:
    - text: декларація політичного суверенітету
      correct: true
    - text: заміна бартерної торгівлі
      correct: false
    - text: виплата боргу Візантії
      correct: false
    - text: благодійність для бідних
      correct: false
  - question: Що означав термін "робичич" стосовно Володимира?
    explanation: '"Робичич" означає син рабині (невільниці), що вказувало на його
      походження від ключниці Малуші.'
    options:
    - text: син рабині (ключниці)
      correct: true
    - text: син робітника
      correct: false
    - text: вихованець варягів
      correct: false
    - text: спадкоємець престолу
      correct: false
  - question: Яка подія стала безпосереднім приводом для облоги Корсуня?
    explanation: Володимир обложив Корсунь через зволікання візантійців з виконанням
      обіцянки видати за нього принцесу Анну.
    options:
    - text: відмова видати принцесу Анну
      correct: true
    - text: напад печенігів на Київ
      correct: false
    - text: бажання захопити Крим
      correct: false
    - text: релігійний фанатизм
      correct: false
  - question: Як називалася перша кам'яна церква Київської Русі?
    explanation: Десятинна церква (Церква Успіння Пресвятої Богородиці) була першим
      кам'яним храмом, збудованим у 989–996 роках.
    options:
    - text: Десятинна церква
      correct: true
    - text: Софійський собор
      correct: false
    - text: Михайлівський собор
      correct: false
    - text: Києво-Печерська лавра
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: Міфи та реальність
  items:
  - statement: Володимир Великий був першим правителем Русі, який прийняв християнство.
    correct: false
    explanation: Першою правителькою-християнкою була його бабуся, княгиня Ольга,
      яка хрестилася у Константинополі.
  - statement: Язичницька реформа 980 року з установленням пантеону богів зазнала
      краху.
    correct: true
    explanation: Спроба об'єднати племена навколо пантеону Перуна провалилася, що
      спонукало Володимира шукати монотеїстичну релігію.
  - statement: Пам'ятник Володимиру в Москві стоїть на місці, де він бував за життя.
    correct: false
    explanation: Володимир ніколи не був на території сучасної Москви; місто було
      засноване через 130+ років після його смерті.
  - statement: Десятина — це податок, який Володимир збирав з населення на користь
      армії.
    correct: false
    explanation: Десятина була відрахуванням десятої частини княжих доходів на утримання
      церкви, а не податком на армію.
  - statement: Володимир особисто застеріг брата Ярополка про свій воєнний похід на
      Київ.
    correct: true
    explanation: 'Володимир відкрито заявив послам брата: «Ідіть до брата мого і скажіть
      йому: "Володимир іде на тебе, готуйся з ним битися"».'
  - statement: Десятинна церква була збудована запрошеними візантійськими майстрами
      у 989–996 роках.
    correct: true
    explanation: Будівництво першого кам'яного храму Русі здійснювали грецькі зодчі
      на замовлення князя.
  - statement: Облога Корсуня завершилася успішним відкритим штурмом міських стін.
    correct: false
    explanation: Місто здалося лише після того, як варяги Володимира перекопали водогін,
      що живив Корсунь.
  - statement: Класичний Тризуб вперше з'явився на монетах князя Святослава Хороброго.
    correct: false
    explanation: Хоча Святослав мав двозуб, саме на монетах Володимира Тризуб набув
      своєї завершеної графічної форми.
  - statement: Запроваджене Володимиром «навчання книжне» було сприйняте тогочасною
      елітою з великим ентузіазмом.
    correct: false
    explanation: Літопис свідчить, що матері плакали за дітьми, яких віддавали на
      навчання, «як за мертвими».
  - statement: Карбування власних златників і срібників було зумовлене передусім економічним
      дефіцитом валюти.
    correct: false
    explanation: Це була передусім політична акція декларації суверенітету; ринок
      був насичений іноземною монетою.
  instruction: Визначте, чи твердження правильне.
- type: comparative-study
  title: 'Еволюція державного міфу: Від Перуна до Христа'
  items_to_compare:
  - Язичницька реформа 980 року
  - Християнізація 988 року
  criteria:
  - Сакралізація влади
  - Об'єднавчий потенціал
  - Геополітичний вектор
  prompt: Порівняйте дві спроби Володимира реформувати ідеологічний фундамент держави.
    Чому язичницький пантеон, попри свою "національну" основу, виявився нежиттєздатним
    для імперії, тоді як запозичене візантійське християнство забезпечило тисячолітній
    цивілізаційний успіх?
  model_answer: Язичницька реформа була спробою уніфікації "знизу", базуючись на місцевих
    культах, які за своєю природою були партикулярними і племінними. Пантеон Перуна
    лише підкреслював домінування Києва, але не пропонував універсальної етики чи
    визнаної світом легітимності. Крім того, криваві жертви ізолювали Русь від цивілізованих
    сусідів. Натомість християнство запропонувало універсальну, "надплемінну" ідеологію,
    де влада князя освячувалася Єдиним Богом (модель цезаропапізму), а держава входила
    в міжнародну правову систему (Pax Christiana). Успіх 988 року полягав у тому,
    що це був не просто релігійний, а технологічний трансфер (писемність, право, архітектура),
    який перетворив конгломерат племен на європейську монархію.
