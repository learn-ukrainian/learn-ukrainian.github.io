- type: reading
  id: reading-drahomanov-01
  title: 'Первинне джерело: Чудацькі думки про українську національну справу'
  source: Михайло Драгоманов (1891)
  text: 'Немає нічого гіршого для нашої літератури, як замикатися у вузькому етнографічному
    колі. Справжня культура мусить бути європейською за формою і змістом, навіть якщо
    вона звертається до простого люду. Література має бути зрозумілою і цікавою не
    лише хуторянам, але й найвибагливішим читачам у Парижі чи Лондоні. Тільки тоді
    ми перестанемо бути колонією і станемо повноправним суб''єктом європейської історії.

    '
  tasks:
  - Які вимоги Драгоманов висуває до української літератури?
  - Як автор визначає шлях подолання колоніального статусу?
- type: critical-analysis
  title: 'Критичний аналіз: Концепція європейської літератури'
  source_reading: reading-drahomanov-01
  instruction: Проаналізуйте уривок і дайте розгорнуті відповіді на запитання.
  target_text: Справжня культура мусить бути європейською за формою і змістом, навіть
    якщо вона звертається до простого люду.
  items:
  - prompt: Як Драгоманов протиставляє поняття хуторянство та європейська культура
      у своєму баченні розвитку нації?
    model_answer: Драгоманов вважає хуторянство небезпечною провінційністю, яка консервує
      націю в минулому. Європейська культура, натомість, означає універсальність,
      високий рівень освіченості та здатність до загальнолюдського діалогу. Він відкидає
      ідею, що література для народу має бути примітивною.
  - prompt: Яку роль відіграє красне письменство у процесі деколонізації, згідно з
      позицією автора в цьому тексті?
    model_answer: Література є ключовим інструментом деколонізації, оскільки вона
      створює інтелектуальний продукт європейського рівня. Коли письменство стає цікавим
      у світі, нація перестає сприйматися як колоніальний етнографічний додаток, здобуваючи
      повноцінну суб'єктність.
- type: essay-response
  title: 'Есе: Актуальність політичної філософії Драгоманова'
  source_reading: reading-drahomanov-01
  instruction: Напишіть аналітичне есе на запропоновану тему.
  prompt: Спираючись на текст модуля, поясніть, чому концепції децентралізації та
    етики чистих рук Михайла Драгоманова залишаються актуальними для сучасної демократичної
    держави. Наведіть аргументи щодо небезпеки імперського централізму.
  min_words: 300
  model_answer: "Політична філософія Михайла Драгоманова є глибоко актуальною для\
    \ сучасної держави з двох фундаментальних причин: це вимога децентралізації та\
    \ пріоритет прав людини. Аналізуючи імперську систему, мислитель чітко показав,\
    \ що надмірний централізм веде до безправ'я провінцій і знищення місцевої ініціативи.\
    \ Його концепція сильної самоврядної громади є основою успішних реформ у демократичному\
    \ світі. \nКрім того, його етичний імператив про чисті руки є потужним антидотом\
    \ проти політичного цинізму. Драгоманов аргументовано доводив, що використання\
    \ аморальних методів неминуче корумпує сам рух. Цей урок є критично важливим для\
    \ націй, адже він підкреслює, що демократична держава не може бути побудована\
    \ на зневазі до індивідуальних прав.\n"
  rubric:
  - criteria: Аргументація та аналіз
    description: Глибоке розкриття концепцій децентралізації та політичної етики на
      основі тексту модуля.
    points: 10
  - criteria: Структура есе
    description: Логічна побудова тексту з чітким вступом, аргументованою основною
      частиною та висновками.
    points: 5
  - criteria: Мовне оформлення
    description: Використання академічної лексики, відсутність граматичних і стилістичних
      помилок.
    points: 5
- type: quiz
  title: 'Перевірте знання: Погляди мислителя'
  items:
  - question: Згідно з текстом модуля, як автор характеризує ставлення Драгоманова
      до європейської цивілізації?
    explanation: У тексті зазначено, що Драгоманов вважав Україну невід'ємною частиною
      європейської цивілізації і закликав засвоювати базові західні цінності.
    options:
