      correct: false
    - text: як до системи, яку варто сліпо копіювати без змін
      correct: false
    - text: як до тимчасового союзника в боротьбі з імперією
      correct: false
  - question: Яку функцію автор тексту приписує Емському указу 1876 року?
    explanation: У тексті Емський указ характеризується як продуманий інструмент лінгвоциду,
      що забороняв публічне існування мови.
    options:
