- type: authorial-intent
  title: 'Авторський намір: Деконструкція колоніального наративу'
  source_reading: reading-drahomanov-01
  instruction: Проаналізуйте наміри автора щодо використання певних понять.
  text_excerpt: Немає нічого гіршого для нашої літератури, як замикатися у вузькому
    етнографічному колі.
  prompt: Якою була головна мета Драгоманова, коли він гостро критикував етнографічну
    спрямованість української літератури свого часу?
  techniques_to_identify:
  - іронія
  - деконструкція міфу
  - риторичне протиставлення
  model_answer: Головний намір Драгоманова полягав у тому, щоб зруйнувати провінційний
    комплекс меншовартості (хуторянство). Він використовував риторичне протиставлення
    етнографічного кола і європейської культури, щоб продемонструвати небезпеку культурної
    ізоляції. Його метою було спонукати еліту створювати високоінтелектуальний продукт,
    здатний конкурувати на міжнародному рівні, тим самим деконструюючи імперський
    міф про українців як виключно селянську націю без власної високої культури.
- type: comparative-study
  title: "Порівняльний аналіз: Концепції розвитку суспільства"
  instruction: "Порівняйте політичні моделі, описані в тексті модуля."
  items_to_compare:
    - "Імперський централізм"
    - "Модель децентралізації Драгоманова"
  criteria:
    - "Ставлення до місцевого самоврядування"
    - "Пріоритетність прав"
  prompt: "На основі тексту модуля проаналізуйте, як дві наведені моделі управління впливають на розвиток вільної особистості та рівень політичної свободи в суспільстві."
  model_answer: "В імперській моделі управління місцеве самоврядування повністю пригнічується на користь гіперцентралізації, а інтереси великої держави домінують над правами людини. Це призводить до стагнації та безправ'я. Натомість модель Драгоманова базується на широкій децентралізації, де самоврядна вільна громада є основою суспільства. Головною цінністю в цій моделі є недоторканні права людини, які мають абсолютний пріоритет над будь-якими колективними інтересами, що забезпечує реальну свободу та політичний прогрес."
