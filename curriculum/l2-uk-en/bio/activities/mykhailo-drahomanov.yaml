      correct: false
    - text: це була спроба реформувати систему освіти в імперії
      correct: false
    - text: це був дозвіл на друк певних фольклорних матеріалів
      correct: false
  - question: Який аргумент наводить автор тексту щодо ставлення мислителя до політичного
      терору?
    explanation: Текст підкреслює, що Драгоманов різко засудив політичний терор російських
      народників, оскільки вважав, що він посилює жорстоку реакцію.
    options:
    - text: мислитель вважав, що терор не вирішує проблем, а посилює жорстоку реакцію
      correct: true
    - text: мислитель підтримував терор як необхідний інструмент деколонізації
      correct: false
    - text: мислитель допускав використання терору лише в крайніх випадках
      correct: false
    - text: мислитель ігнорував питання методів боротьби у своїх працях
      correct: false
  - question: У тексті модуля автор пояснює поняття хуторянство. Яке визначення є
      найточнішим згідно з цим текстом?
    explanation: У тексті хуторянство визначається як небезпечна провінційність, тенденція
      до культурної замкнутості та ідеалізація селянського побуту.
    options:
    - text: це небезпечна тенденція до культурної замкнутості та провінційності
      correct: true
    - text: це прогресивний рух за збереження сільськогосподарських традицій
      correct: false
    - text: це прагнення до інтеграції в глобальний культурний простір
      correct: false
    - text: це економічна модель управління місцевими громадами
      correct: false
  - question: Згідно з текстом, чому Драгоманов вважав децентралізацію влади єдино
      можливою альтернативою?
    explanation: Він доводив, що гіперцентралізація імперії веде до безправ'я, тоді
      як децентралізація наближає владу до людини.
    options:
    - text: бо гіперцентралізація неминуче веде до стагнації суспільства та загального
        безправ'я
      correct: true
    - text: бо так було зручніше збирати податки з віддалених регіонів імперії
      correct: false
    - text: бо це дозволяло б посилити військовий потенціал окремих губерній
      correct: false
    - text: бо це була вимога європейських дипломатів на конгресах
      correct: false
  - question: Як у тексті пояснюється драгоманівський принцип пріоритету прав людини?
    explanation: Текст зазначає, що Драгоманов ставив права особистості вище за будь-які
      колективні чи державні інтереси.
    options:
    - text: права незалежної особистості є вищими за інтереси держави чи нації
      correct: true
    - text: права людини важливі лише тоді, коли вони не суперечать інтересам держави
      correct: false
    - text: колективні права нації завжди домінують над правами окремої людини
      correct: false
    - text: права людини гарантуються виключно через належність до певної партії
      correct: false
  - question: Яку причину наводить автор тексту для пояснення розриву Драгоманова
      з консервативним академічним середовищем?
    explanation: Згідно з текстом, його новаторські європейські концепції та енергійна
      діяльність викликали спротив старої професури.
    options:
    - text: його спроби швидкої модернізації програм та методів лякали старих професорів
      correct: true
    - text: він відмовився читати лекції російською мовою на знак протесту
      correct: false
    - text: він вимагав значного підвищення фінансування своїх етнографічних експедицій
      correct: false
    - text: його дослідження не мали достатньої наукової глибини для університету
      correct: false
  - question: Згідно з текстом, яку роль відіграв часопис Громада, заснований у Женеві?
    explanation: У тексті часопис названо першою безцензурною трибуною, яка відкрито
      формулювала політичні вимоги і руйнувала інформаційну блокаду.
    options:
    - text: він став потужною безцензурною трибуною для висловлення політичних вимог
      correct: true
    - text: він був виключно літературним альманахом для друку віршів в еміграції
      correct: false
    - text: він слугував внутрішнім вісником для невеликої групи студентів
      correct: false
    - text: він друкував офіційні розпорядження європейських урядів щодо мігрантів
      correct: false
  instruction: Оберіть правильну відповідь.
