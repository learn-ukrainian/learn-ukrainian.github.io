- type: reading
  id: reading-skovoroda
  title: 'Первинне джерело: Філософія свободи'
  source: Григорій Сковорода (концепція епітафії)
  text: '"Світ ловив мене, та не спіймав". "Світ" у розумінні Сковороди — це не природа
    і не люди. Це матриця соціальних умовностей, спокус, марнославства, жадоби до
    грошей, кар''єрних амбіцій та владних інтриг. Цей світ розставляв на нього безліч
    пасток: пропонував престижні посади в академії, сите життя при дворі імператриці,
    багатство і комфорт. Але мислитель щоразу вчасно розпізнавав ці пастки і обирав
    свободу. Світ намагався зробити його своїм рабом, але він пішов із життя абсолютно
    вільною людиною.

    '
  tasks:
  - Проаналізуйте, що саме автор розумів під поняттям 'світ'.
  - Які пастки, згідно з текстом, розставляв світ для мислителя?
- type: critical-analysis
  title: 'Критичний аналіз: Пастки світу'
  source_reading: reading-skovoroda
  target_text: Світ намагався зробити його своїм рабом, але він пішов із життя абсолютно
    вільною людиною.
  items:
  - prompt: Згідно з текстом, як саме світ намагався зробити філософа своїм рабом?
      Наведіть приклади 'пасток'.
    model_answer: У тексті автор підкреслює, що світ пропонував Сковороді престижні
      посади в академії, сите життя при дворі імператриці, багатство та комфорт. Це
      були інструменти соціальних умовностей та владних інтриг, які мали б підкорити
      його свободу.
  - prompt: Яку функцію виконує метафора 'ловив' у контексті соціального тиску?
    model_answer: Метафора 'ловив' підкреслює активну, хижу природу імперського та
      соціального середовища, яке намагається втягнути людину в матрицю марнославства
      і зробити її залежною від кар'єрних амбіцій.
- type: essay-response
  title: 'Есе: Внутрішня свобода як спротив'
  source_reading: reading-skovoroda
  prompt: У тексті автор характеризує 'світ' як матрицю соціальних умовностей та спокус.
    Спираючись на прочитаний уривок, напишіть коротке есе про те, чому відмова від
    цих спокус розглядається як найвища форма збереження людської свободи.
  min_words: 150
  model_answer: В уривку чітко зазначено, що світ діє через матрицю марнославства
    та жадоби, пропонуючи матеріальний комфорт в обмін на духовну залежність. Відмова
    від цих спокус стає єдиним шляхом до збереження внутрішньої незалежності. Якщо
    людина не прагне статусів чи багатства, вона стає невразливою до владних інтриг
    і маніпуляцій. Таким чином, свідоме маргінальне становище, яке обрав Сковорода,
    є не поразкою, а перемогою вільної особистості над системою. Філософ зберіг свою
    сутність, оскільки його щастя не залежало від зовнішніх соціальних атрибутів.
- type: quiz
  title: Лексичний аналіз тексту
  items:
  - question: Яке слово в тексті використовується для позначення праці, яка відповідає
      природним схильностям людини?
    explanation: Сковорода називав працю за покликанням 'сродною працею'.
    options:
    - text: сродна
      correct: true
    - text: важка
      correct: false
    - text: фізична
      correct: false
    - text: примусова
      correct: false
  - question: Яким терміном у тексті описується філософський підхід, де серце є осередком
      духовного життя?
    explanation: Кордоцентризм — це концепція, яка визнає серце віссю людського буття.
    options:
    - text: кордоцентризм
      correct: true
    - text: раціоналізм
      correct: false
    - text: емпіризм
      correct: false
    - text: агностицизм
      correct: false
  - question: Яке поняття означає добровільну відмову від зайвих матеріальних благ,
      яку практикував мислитель?
    explanation: Аскеза передбачає свідоме обмеження матеріальних потреб для духовного
      очищення.
    options:
    - text: аскеза
      correct: true
    - text: марнославство
      correct: false
    - text: жадоба
      correct: false
    - text: розкіш
      correct: false
  - question: Як автор модуля характеризує вплив імперії на залишки української автономії?
    explanation: У тексті зазначено, що імперія методично та жорстоко знищувала залишки
      автономії.
    options:
    - text: жорстоке знищення
      correct: true
    - text: поступове відновлення
      correct: false
    - text: культурне збагачення
      correct: false
    - text: мирна асиміляція
      correct: false
  - question: Що, згідно з текстом, є причиною всіх соціальних бід та несправедливості
      в суспільстві?
    explanation: Автор вказує, що саме 'несродна праця' руйнує особистість і є причиною
      бід.
    options:
    - text: несродна праця
      correct: true
    - text: надмірна освіченість
      correct: false
    - text: мандрівний спосіб життя
      correct: false
    - text: відсутність влади
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: Аналіз концепцій та метафор
  items:
  - statement: У тексті модуля стверджується, що ідеалом Сковороди було збройне повстання
      проти імперії.
    correct: false
    explanation: Текст чітко зазначає, що його свобода полягала не в політичній боротьбі
      чи збройному повстанні, а у внутрішній незалежності.
  - statement: Згідно з концепцією філософа, видима натура є тимчасовою та мінливою.
    correct: true
    explanation: У вченні про дві натури видима оболонка ('тварь') визнається підвладною
      руйнуванню.
  - statement: Автор зазначає, що Сковорода повністю ігнорував Біблію як джерело філософських
      роздумів.
    correct: false
    explanation: Навпаки, Біблія визначається як третій, символічний світ, що поєднує
      макрокосм і мікрокосм.
  - statement: За текстом, ідея 'нерівної всім рівності' ілюструється образом фонтану
      і різних посудин.
    correct: true
    explanation: Метафора фонтану показує, що люди мають різний об'єм (здібності),
      але можуть бути однаково наповнені (щасливі).
  - statement: У байці 'Бджола та Шершень' головна героїня цінує лише кінцевий результат
      — зібраний мед.
    correct: false
    explanation: Бджола відповідає, що процес збирання нектару (сродна праця) для
      неї важливіший за сам мед.
  instruction: Визначте, чи твердження правильне.
