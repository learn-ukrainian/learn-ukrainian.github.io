- type: reading
  id: reading-chronicle
  title: 'Уривок із Галицько-Волинського літопису'
  source: 'Галицько-Волинський літопис (адаптовано)'
  text: |
    Він бо кинувся був на поганих, як той лев, сердитий же був, як та рись, і губив їх, як той крокодил, і переходив землю їх, як той орел, а хоробрий був, як той тур, бо він ревно наслідував предка свого Мономаха.
  tasks:
    - 'Прочитайте літописний уривок про Романа Мстиславича.'
    - 'Зверніть увагу на використання анімалістичних порівнянь.'

- type: critical-analysis
  title: 'Аналіз літописного тексту'
  source_reading: reading-chronicle
  instruction: 'Проаналізуйте наведений уривок та дайте відповіді на запитання.'
  items:
    - prompt: 'З якою метою літописець використовує згадку про крокодила у своєму тексті?'
      model_answer: 'Згадка про крокодила свідчить про високий рівень освіченості книжників Русі, які були знайомі з візантійськими фізіологами (енциклопедіями про тваринний світ). Це підкреслює інтеграцію держави у європейський культурний простір.'
    - prompt: 'Чому автор порівнює Романа Мстиславича саме з Володимиром Мономахом?'
      model_answer: 'Порівняння з Мономахом виконує функцію політичної легітимізації. Воно демонструє, що Роман є законним продовжувачем традицій найвидатніших правителів Київської держави.'

- type: essay-response
  title: 'Стратегія централізації'
  instruction: 'Напишіть розгорнуту відповідь на основі матеріалу уроку.'
  items:
    - prompt: 'Проаналізуйте політичну стратегію Романа Мстиславича щодо галицького боярства. Які методи він використовував і чому?'
      model_answer: 'Роман Мстиславич використовував методи жорсткого державного терору проти олігархічного боярства (легенда про "мед і коріння"). Це була політично мотивована необхідність для збереження територіальної цілісності. Як альтернативу, він створив нову соціальну опору — інститут "служивих бояр" та міщанство, які були зацікавлені в сильній централізованій владі.'
  rubric:
    - criteria: 'Аргументація'
      description: 'Відповідь містить глибокий аналіз методів політичної боротьби.'
      points: 5
    - criteria: 'Використання термінів'
      description: 'Коректне використання понять "боярство", "олігархія", "служиві бояри".'
      points: 5

- type: true-false
  title: 'Історичні факти чи міфи'
  instruction: 'Визначте, чи є твердження правдивими.'
  items:
    - statement: 'Роман Мстиславич переніс свою столицю до Києва після його захоплення.'
      correct: false
      explanation: 'Він залишив у Києві намісника, а резиденцію зберіг на заході (у Галичині та Волині).'
    - statement: 'Об''єднання Галичини та Волині відбулося у 1199 році.'
      correct: true
      explanation: 'Це ключова дата створення Галицько-Волинської держави.'
    - statement: 'Князь погодився прийняти королівську корону від Папи Римського.'
      correct: false
      explanation: 'Він відмовився, щоб зберегти внутрішню стабільність і союз із Візантією.'
    - statement: 'Галицькі бояри були надійною опорою влади Романа Мстиславича.'
      correct: false
      explanation: 'Боярство було головним внутрішнім ворогом і опозицією до центральної влади.'
    - statement: 'Загибель князя під Завихостом призвела до сорокарічної громадянської війни.'
      correct: true
      explanation: 'Усобиця тривала до 1245 року, поки владу не відновив його син Данило.'

- type: quiz
  title: 'Перевірте знання історичного матеріалу'
  instruction: 'Оберіть одну правильну відповідь на кожне запитання.'
  items:
    - question: 'Який офіційний політичний титул використовує Галицько-Волинський літопис щодо Романа Мстиславича?'
      explanation: 'Літописець називає його самодержцем усієї Русі, що вказує на абсолютний політичний суверенітет.'
      options:
        - text: 'самодержець'
          correct: true
        - text: 'король'
          correct: false
        - text: 'імператор'
          correct: false
        - text: 'намісник'
          correct: false
    - question: 'У якому місті молодий Роман здобув свій перший жорсткий політичний досвід?'
      explanation: 'Він княжив у Великому Новгороді, де навчився протистояти норовливому боярству та вічу.'
      options:
        - text: 'Великий Новгород'
          correct: true
        - text: 'Володимир-Волинський'
          correct: false
        - text: 'Київ'
          correct: false
        - text: 'Краків'
          correct: false
    - question: 'Яку нову соціальну верству створив князь як противагу галицькій олігархії?'
      explanation: 'Він створив інститут служивих бояр, які залежали від милості монарха.'
      options:
        - text: 'служиві бояри'
          correct: true
        - text: 'міщанство'
          correct: false
        - text: 'чорні клобуки'
          correct: false
        - text: 'духовенство'
          correct: false
    - question: 'Який важливий економічний ресурс Галичини забезпечував колосальні фінансові можливості держави?'
      explanation: 'Контроль над коломийськими та дрогобицькими соляними копальнями наповнював казну.'
      options:
        - text: 'соляні промисли'
          correct: true
        - text: 'поклади золота'
          correct: false
        - text: 'лісові масиви'
          correct: false
        - text: 'пушнина'
          correct: false
    - question: 'Яку стратегію обрав Роман Мстиславич для боротьби з постійною половецькою загрозою?'
      explanation: 'Він використовував стратегію превентивних зимових і весняних ударів у глиб степу.'
      options:
        - text: 'превентивні удари'
          correct: true
        - text: 'пасивна оборона'
          correct: false
        - text: 'сплата данини'
          correct: false
        - text: 'будівництво мурів'
          correct: false
    - question: 'Який імператор Візантії був ключовим союзником українського монарха на початку тринадцятого століття?'
      explanation: 'Союзні відносини підтримувалися з візантійським імператором Олексієм III Ангелом.'
      options:
        - text: 'Олексій III Ангел'
          correct: true
        - text: 'Костянтин Багрянородний'
          correct: false
        - text: 'Юстиніан Великий'
          correct: false
        - text: 'Василій Болгаробійця'
          correct: false
    - question: 'Як звали папу Римського, який пропонував Роману Мстиславичу королівську корону?'
      explanation: 'Спеціальне посольство прибуло від могутнього Папи Інокентія III.'
      options:
        - text: 'Інокентій III'
          correct: true
        - text: 'Урбан II'
          correct: false
        - text: 'Григорій VII'
          correct: false
        - text: 'Іван Павло II'
          correct: false
    - question: 'Біля якого польського міста загинув володар під час несподіваної засідки противника?'
      explanation: 'Князь потрапив у засідку і загинув у битві під Завихостом у 1205 році.'
      options:
        - text: 'Завихост'
          correct: true
        - text: 'Люблін'
          correct: false
        - text: 'Краків'
          correct: false
        - text: 'Варшава'
          correct: false