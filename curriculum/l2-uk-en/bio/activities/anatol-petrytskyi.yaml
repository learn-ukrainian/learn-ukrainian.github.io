- type: reading
  id: reading-01
  title: 'Первинне джерело: Сценографія Петрицького'
  source: 'Аналіз стилю Анатоля Петрицького'
  text: |
    Декорації Петрицького більше не ілюстрували конкретне, географічне місце дії. Вони жорстко диктували акторам ритм рухів, створювали колосальну емоційну напругу та візуально підсилювали прихований психологічний підтекст п'єси. Світло почало масово використовуватися як самостійний, активний елемент, що безжально розрізав простір і формував нові, несподівані візуальні сенси. Художник створював не просто малюнок на величезному полотні, а будував монументальну багаторівневу конструкцію.
  tasks:
    - 'Проаналізуйте роль світла у просторових рішеннях Петрицького.'
    - 'Поясніть, як декорація впливала на гру актора згідно з текстом.'

- type: critical-analysis
  source_reading: reading-01
  title: 'Критичний аналіз простору'
  target_text: 'Вони жорстко диктували акторам ритм рухів, створювали колосальну емоційну напругу та візуально підсилювали прихований психологічний підтекст п'єси.'
  items:
    - prompt: 'Згідно з текстом, яку інноваційну функцію виконувала сценографія Петрицького порівняно з традиційним театром?'
      model_answer: 'Сценографія Петрицького перестала бути пасивним фоном. Вона активно керувала фізичними рухами акторів, задавала ритм їхньої гри та виступала психологічним інструментом, що розкривав глибинний зміст вистави.'
    - prompt: 'Як автор тексту характеризує взаємодію актора та декорації?'
      model_answer: 'Автор підкреслює, що декорація підкорювала собі актора, диктуючи йому механіку рухів і перетворюючи його на частину складної конструктивістської архітектури сцени.'
  focus_points:
    - 'Сценографія як активний агент'
    - 'Психологізм через простір'

- type: essay-response
  source_reading: reading-01
  title: 'Есей: Мистецтво в умовах тоталітаризму'
  prompt: 'У тексті модуля автор характеризує пізній період творчості Петрицького як своєрідну блискучу золоту клітку. Напишіть аргументований есей, спираючись на текст модуля, де проаналізуйте психологічні та творчі наслідки вимушеного переходу художника до соцреалізму. Чому офіційні нагороди не компенсували втрату свободи?'
  min_words: 300
  model_answer: 'Анатоль Петрицький був змушений прийняти правила гри тоталітарної системи заради фізичного виживання. Текст модуля чітко вказує, що його перехід до соцреалізму та оперної сценографії був не творчою еволюцією, а актом відчаю. Золота клітка символізує зовнішній успіх (нагороди, звання) при повній внутрішній несвободі. Художник втратив можливість до радикальних експериментів із формою, його мистецтво стало інструментом пропаганди, що глибоко травмувало його як творця європейського рівня.'
  rubric:
    - criteria: 'Аргументація'
      description: 'Наявність чіткої тези та глибокого аналізу проблеми конформізму.'
      points: 10
    - criteria: 'Робота з текстом'
      description: 'Використання аргументів і цитат безпосередньо з тексту модуля.'
      points: 10

- type: true-false
  title: 'Аналіз тексту: правда чи вигадка'
  instruction: 'Визначте, чи відповідають твердження змісту прочитаного тексту.'
  items:
    - statement: 'Згідно з текстом, Анатоль Петрицький категорично відкидав вплив традиційного українського мистецтва на користь чистого європейського кубізму.'
      correct: false
      explanation: 'У тексті вказано, що Петрицький віртуозно поєднував розуміння української візуальної традиції з європейськими течіями.'
    - statement: 'Автор тексту підкреслює, що портретна серія Петрицького мала на меті зафіксувати обличчя творців нової України до початку масового терору.'
      correct: true
      explanation: 'Петрицький прагнув створити візуальну енциклопедію нації, фіксуючи обличчя української інтелігенції кінця 1920-х років.'
    - statement: 'У тексті зазначається, що зміна стилю Петрицького у тридцятих роках була природним результатом його мистецької еволюції та дорослішання.'
      correct: false
      explanation: 'Текст чітко називає цей перехід вимушеним компромісом заради збереження життя, а не природною еволюцією.'
    - statement: 'Згідно з текстом модуля, європейські критики вважали український конструктивізм Петрицького ідентичним німецькому, без жодних відмінностей.'
      correct: false
      explanation: 'Український авангард відрізнявся більшою емоційністю, потужною народною енергією та сміливою роботою з відкритим кольором.'
    - statement: 'Автор наголошує, що театральні костюми Петрицького створювалися як інструмент, що диктує акторові механіку та пластику рухів.'
      correct: true
      explanation: 'Костюм працював як динамічна машина, підпорядкована законам біомеханіки, а не просто як ілюстрація епохи.'

- type: authorial-intent
  title: 'Аналіз авторського стилю та наміру'
  source_reading: reading-01
  text_excerpt: 'Художник створював не просто малюнок на величезному полотні, а будував монументальну багаторівневу конструкцію, яка жила власним життям.'
  prompt: 'Яку мету переслідує автор тексту, використовуючи метафору будував монументальну конструкцію, яка жила власним життям щодо сценографії Петрицького?'
  model_answer: 'Автор прагне підкреслити радикальний відхід Петрицького від традиційної площинної декорації. Використовуючи слова будував та конструкція, автор навмисно застосовує архітектурну термінологію, щоб показати, що Петрицький мислив просторово та інженерно, створюючи на сцені незалежний, самодостатній тривимірний світ.'
  techniques_to_identify:
    - 'Метафора'
    - 'Синтаксичний паралелізм'

- type: comparative-study
  title: 'Порівняльний аналіз підходів'
  instruction: 'Проаналізуйте відмінності між класичним театром та новаторством Петрицького.'
  items_to_compare:
    - 'Традиційний класичний підхід до сценографії'
    - 'Авангардний підхід Анатоля Петрицького'
  criteria:
    - 'Функція театрального костюма'
    - 'Роль декорації на сцені'
    - 'Використання простору та світла'
  prompt: 'Спираючись на текст модуля, порівняйте традиційний підхід до оформлення вистави з авангардними методами Анатоля Петрицького за наведеними критеріями.'
  model_answer: 'Традиційна декорація функціонувала як пласка статична ілюстрація місця дії, а костюм — як історична чи соціальна характеристика персонажа. Натомість Петрицький перетворив сценографію на динамічний архітектурний простір, що передавав психологізм твору. Його костюми стали біомеханічними конструкціями, які диктували акторам пластику, а світло — самостійним активним елементом, що формував зміст.'