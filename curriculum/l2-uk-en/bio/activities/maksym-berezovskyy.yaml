- type: reading
  id: reading-01
  title: 'Уривок: Трагедія невизнаного таланту'
  source: 'Текст модуля: Максим Березовський'
  text: 'Максим Березовський традиційно вважається першим українським автором, який
    створив оперу за західноєвропейськими стандартами. Його шлях від співака до видатного
    творця — це історія феноменального злету. Трагедія Березовського полягала не лише
    в матеріальних нестатках, а передусім у неможливості реалізувати свій колосальний
    творчий потенціал на батьківщині. Його спадщина була свідомо маргіналізована та
    інтегрована у наратив "російської музики".

    '
- type: critical-analysis
  source_reading: reading-01
  title: Критичний аналіз колоніального впливу
  target_text: Трагедія Березовського полягала не лише в матеріальних нестатках, а
    передусім у неможливості реалізувати свій колосальний творчий потенціал на батьківщині.
  questions:
  - Згідно з текстом, як колоніальна система вплинула на кар'єру композитора після
    його повернення з Італії?
  - Який механізм привласнення спадщини Березовського російською історіографією згадується
    у тексті?
  model_answers:
  - Згідно з текстом, система ізолювала його психологічно та створила дискримінаційні
    умови, надаючи преференції іноземцям.
  - Історіографія свідомо маргіналізувала його українське походження, інтегрувавши
    його спадщину в наратив "російської музики".
  focus_points:
  - колоніальна політика
  - культурна апропріація
- type: essay-response
  source_reading: reading-01
  title: 'Есе: Музика як спротив і сповідь'
  prompt: У тексті автор зазначає, що музика Березовського, зокрема хоровий концерт
    "Не отвержи мене во время старості", стала його особистою сповіддю. Спираючись
    на текст модуля, напишіть есе про те, як митець може використовувати свій талант
    для подолання психологічного тиску та збереження власної ідентичності.
  min_words: 150
  model_answer: Максим Березовський, опинившись у ворожому імперському середовищі,
    використав духовну музику як засіб збереження своєї суб'єктності. Згідно з текстом
    модуля, він синтезував західну традицію з українським мелосом, створивши унікальні
    твори, що відображали його внутрішній біль. Це свідчить про те, що навіть в умовах
    тотальної ізоляції мистецтво залишається простором свободи, де автор може висловити
    свій спротив системі та звернутися до вищих сенсів.
  rubric:
  - criteria: Аргументація з опорою на текст
    description: Есе містить посилання на конкретні факти з життя Березовського та
      його творчості.
    points: 10
  - criteria: Аналіз психологічного стану
    description: Розкрито вплив колоніального тиску на митця та роль музики як сповіді.
    points: 10
- type: quiz
  title: 'Перевірте знання: Життя та творчість Березовського'
  items:
  - question: Згідно з текстом модуля, як автор характеризує становище Максима Березовського
      після його повернення до Петербурга?
    explanation: Автор підкреслює його психологічну ізоляцію та дискримінацію на користь
      іноземців.
    options:
    - text: як стан глибокої психологічної ізоляції та дискримінації
      correct: true
    - text: як період найбільшого творчого розквіту та визнання
      correct: false
    - text: як час успішного створення нових музичних академій
      correct: false
    - text: як етап рівноправної конкуренції з італійськими маестро
      correct: false
  - question: Який аргумент наводить автор тексту, щоб спростувати міф про самогубство
      композитора?
    explanation: У тексті згадується відсутність архівних документів та факт поховання
      за християнським обрядом.
    options:
    - text: відсутність архівних підтверджень та поховання за християнським обрядом
      correct: true
    - text: наявність передсмертної записки, знайденої в європейських архівах
      correct: false
    - text: свідчення італійських музикантів, які працювали при дворі
      correct: false
    - text: офіційний звіт поліції Санкт-Петербурга про нещасний випадок
      correct: false
  - question: Яку функцію, за словами автора, виконував духовний хоровий концерт "Не
      отвержи мене во время старості" у житті митця?
    explanation: Концерт звучить як глибоко особиста музична сповідь та відображення
      власної трагічної долі.
    options:
    - text: він став особистою музичною сповіддю та криком душі
      correct: true
    - text: він був офіційним замовленням для імператорського богослужіння
      correct: false
    - text: він використовувався як навчальний матеріал для співаків
      correct: false
    - text: він був написаний спеціально для італійської публіки
      correct: false
  - question: У тексті автор підкреслює, що музичний стиль Березовського є синтезом.
      Які саме традиції він поєднав?
    explanation: Композитор поєднав складну західну поліфонію з інтонаціями українського
      кантового мелосу.
    options:
    - text: західну барокову поліфонію та глибинний український співочий мелос
      correct: true
    - text: російську народну пісню та німецьку класичну симфонію
      correct: false
    - text: італійське бельканто та французьку інструментальну традицію
      correct: false
    - text: григоріанський хорал та середньовічну світську музику
      correct: false
  - question: Згідно з текстом, чому паралель між долями Максима Березовського та
      Вольфганга Амадея Моцарта є надзвичайно показовою?
    explanation: Паралель ілюструє різницю між вільним розвитком у Європі та знищенням
      таланту в колоніальній імперії.
    options:
    - text: вона ілюструє руйнівний вплив колоніальної системи на кар'єру митця
      correct: true
    - text: вона доводить, що Моцарт запозичив музичні ідеї у Березовського
      correct: false
    - text: вона свідчить про їхню спільну роботу над оперою
      correct: false
    - text: вона показує, що обидва композитори померли у ранньому віці
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Правда чи хиба: Аналіз тексту'
  items:
  - statement: Згідно з текстом модуля, російська історіографія систематично привласнювала
      творчість Березовського, ігноруючи його українське походження.
    correct: true
    explanation: У тексті зазначено, що його спадщина була інтегрована у наратив російської
      музики.
  - statement: Автор стверджує, що Максим Березовський отримав посаду керівника Придворної
      співацької капели відразу після повернення з Італії.
    correct: false
    explanation: У тексті сказано, що йому запропонували принизливо низьку посаду
      артиста-співака.
  - statement: У тексті модуля Глухівська музична школа описується як головний центр
      постачання співочих кадрів для петербурзького двору.
    correct: true
    explanation: Автор вказує, що імперія систематично викачувала найкращі голоси
      з цієї школи.
  - statement: Згідно з текстом, іспит у Болонській академії передбачав створення
      вільної імпровізації без дотримання строгих поліфонічних правил.
    correct: false
    explanation: Текст підкреслює, що імпровізація чи відхилення від строгих правил
      на іспиті не допускалися.
  - statement: Автор зазначає, що духовні хорові концерти Березовського писалися виключно
      для виконання з великим інструментальним супроводом.
    correct: false
    explanation: У тексті вказано, що його найвизначніші духовні концерти були написані
      a cappella, тобто без супроводу.
  instruction: Визначте, чи твердження правильне.
