- type: reading
  id: reading-bilokur-letter
  title: 'Первинне джерело: Лист Катерини Білокур'
  source: Катерина Білокур (1954)
  text: 'На могилі не було нікого. І мені така вже воля була — скільки хотіла, скільки
    й плакала! Так, як живому, Шевченку розказувала, як я хочу стати художником, але
    на цих доріженьках як не терен, то колючки, то камінці...

    '
  tasks:
  - Яку роль у житті художниці відіграла поїздка до Канева?
  - Який сенс вкладено у метафору "терен, колючки, камінці"?
- type: true-false
  title: Інтерпретація фактів біографії
  instruction: Визначте, чи відповідають твердження змісту тексту.
  items:
  - statement: Згідно з текстом, родина Катерини Білокур підтримувала її захоплення
      малюванням, оскільки бачила в цьому перспективу заробітку.
    correct: false
    explanation: Навпаки, родина вважала малювання гріховною забавою та марною тратою
      часу, що призвело до жорсткого конфлікту.
  - statement: У статті стверджується, що Білокур свідомо відмовлялася малювати зірвані
      квіти, вважаючи це вбивством живого створіння.
    correct: true
    explanation: Вона ставилася до природи з анімістичним пієтетом і працювала безпосередньо
      біля рослин у полі чи на городі.
  - statement: Автор тексту підкреслює, що після отримання звання Народного художника
      Катерина Білокур змогла переїхати до Києва та отримати комфортні умови для творчості.
    correct: false
    explanation: Насправді вона не мала паспорта, залишалася прив'язаною до села і
      жила в страшних злиднях, попри офіційні регалії.
  - statement: Згідно з аналізом у тексті, відсутність академічної освіти допомогла
      Білокур створити абсолютно неповторний, самобутній стиль.
    correct: true
    explanation: Ізоляція від академічного світу дозволила їй не обмежуватися жорсткими
      правилами та виробити власну візуальну мову.
  - statement: Текст вказує на те, що першим адресатом, який допоміг художниці заявити
      про себе, був кінорежисер Олександр Довженко.
    correct: false
    explanation: Це популярний міф; насправді доленосний лист із малюнком калини отримала
      оперна співачка Оксана Петрусенко.
- type: comparative-study
  title: 'Порівняльний аналіз: Білокур та академічний живопис'
  instruction: Порівняйте творчий метод Катерини Білокур та класичний академічний
    підхід до живопису.
  items_to_compare:
  - Метод Катерини Білокур
  - Класичний академічний живопис кінця ХІХ століття
  criteria:
  - Побудова перспективи
  - Використання попередніх ескізів
  - Ставлення до композиції та пропорцій
  prompt: Опираючись на текст модуля, проаналізуйте, чим підхід Катерини Білокур (наївне
    мистецтво) кардинально відрізнявся від академічної школи за вказаними критеріями.
  model_answer: 'У той час як академічний живопис суворо дотримується лінійної перспективи,
    створюючи ілюзію глибини, роботи Білокур мають площинний характер: об''єкти ніби
    максимально наближені до глядача. Академісти починають роботу зі створення ретельних
    попередніх ескізів, вибудовуючи структуру всієї картини. Натомість Білокур працювала
    інтуїтивно, органічно розрощуючи композицію від однієї центральної чи крайньої
    квітки без жодних начерків. Щодо пропорцій, класична школа вимагає точного співвідношення
    розмірів об''єктів, тоді як українська мисткиня використовувала суб''єктивне масштабування:
    найбільш значущі для неї квіти малювалися непропорційно великими.'
- type: quiz
  title: Перевірка розуміння тексту
  instruction: Оберіть одну правильну відповідь на кожне запитання.
  items:
  - question: Який художній напрям найточніше характеризує творчість Катерини Білокур
      згідно з сучасним мистецтвознавством?
    explanation: Мистецтвознавці відносять її роботи до класичного наївного мистецтва,
      яке характеризується відсутністю формальної підготовки та інтуїтивним світосприйняттям.
    options:
    - text: наївне мистецтво
      correct: true
    - text: соціалістичний реалізм
      correct: false
    - text: академічний живопис
      correct: false
    - text: абстрактний експресіонізм
      correct: false
  - question: З якої причини художниця не змогла вступити до Миргородського художньо-керамічного
      технікуму у 1924 році?
    explanation: Відсутність документа про закінчення школи (семирічки) стала формальним
      бюрократичним бар'єром для приймальної комісії.
    options:
    - text: вона не мала свідоцтва про базову шкільну освіту
      correct: true
    - text: її малюнки визнали недостатньо професійними
      correct: false
    - text: вона не змогла оплатити своє проживання в місті
      correct: false
    - text: батьки заборонили їй залишати рідне село
      correct: false
  - question: Яким чином Катерина Білокур виготовляла свої унікальні пензлі для філігранного
      промальовування деталей?
    explanation: Вона робила пензлі-"котячки", зрізуючи кілька волосин із котячих
      хвостів і прив'язуючи їх до тонкої гілочки.
    options:
    - text: зрізала кілька волосин із котячих хвостів
      correct: true
    - text: використовувала жорстку щетину диких кабанів
      correct: false
    - text: розщеплювала тонкі кінчики вишневих гілочок
      correct: false
    - text: замовляла спеціальні інструменти поштою з Києва
      correct: false
  - question: Чому сучасні дослідники називають життя видатної мисткині формою інтелектуального
      ескапізму?
    explanation: Творчість була для неї способом втекти від виснажливої та сірої реальності
      сільського побуту в ідеальний світ духовної свободи.
    options:
    - text: вона свідомо тікала у творчість від жорстокої реальності
      correct: true
    - text: вона намагалася емігрувати за кордон для вільного життя
      correct: false
    - text: вона приховувала свої картини через страх репресій
      correct: false
    - text: вона відмовлялася спілкуватися з іншими художниками
      correct: false
  - question: Яка подія стала каталізатором психологічного зламу, після якого батько
      дозволив їй малювати?
    explanation: Спроба самогубства в крижаній річці від розпачу змусила батька змиритися
      з її долею і дозволити малювати.
    options:
    - text: спроба самогубства і подальша тяжка хвороба ніг
      correct: true
    - text: приїзд київських мистецтвознавців до їхнього села
      correct: false
    - text: отримання гонорару за першу продану картину
      correct: false
    - text: лист від відомої співачки Оксани Петрусенко
      correct: false
- type: essay-response
  title: 'Есе: Деколонізація спадщини'
  source_reading: reading-bilokur-letter
  instruction: Напишіть розгорнуте есе, спираючись на текст модуля.
  prompt: 'У тексті згадується необхідність "деколонізації образу" Катерини Білокур.
    Проаналізуйте, як радянська пропаганда використовувала постать художниці та чому
    зведення її таланту до рівня щасливої "колгоспної художниці" є імперським міфом.
    Як сучасне мистецтвознавство переосмислює її місце в європейському контексті?

    '
  min_words: 250
  model_answer: 'Радянська пропаганда цілеспрямовано конструювала образ Катерини Білокур
    як "щасливої селянки", чия творчість нібито розквітла завдяки турботі партії та
    соціалістичному ладу. Цей імперський наратив мав на меті маргіналізувати українське
    мистецтво, звести його до рівня фольклорної екзотики та народного ремесла, заперечуючи
    здатність українського ґрунту породжувати високий модернізм. З офіційних біографій
    старанно викреслювалися реальні факти її життя: жахливі злидні, відсутність паспорта,
    неможливість отримати медичну допомогу та її глибока духовна ізоляція.


    Сучасне мистецтвознавство здійснює деколонізацію її спадщини, руйнуючи цей міф.
    Білокур розглядається не як продукт радянської системи, а як геніальна самоука,
    чия творчість розвивалася всупереч системі. Вона постає як потужна візіонерка,
    яка своєю колористичною та композиційною складністю підняла наївне мистецтво на
    рівень світового авангарду. Визнання її рівною серед видатних європейських майстрів
    ХХ століття є актом відновлення української культурної суб''єктності та доказом
    того, що справжній талант має універсальний вимір, незалежний від метрополії.

    '
  rubric:
  - criteria: Розуміння колоніального контексту
    description: Автор чітко пояснює сутність радянського міфу про "щасливу колгоспницю".
    points: 10
  - criteria: Аналіз сучасного переосмислення
    description: Розкрито погляд на Білокур як на європейську модерністку та візіонерку.
    points: 10
