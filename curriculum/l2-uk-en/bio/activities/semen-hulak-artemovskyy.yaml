- type: reading
  id: reading-01
  title: 'Первинне джерело: Феномен опери в умовах цензури'
  source: Текст модуля
  text: 'Поява першої української національної опери у столиці Російської імперії
    є одним із найскладніших культурних феноменів дев''ятнадцятого століття. У 1863
    році, коли політичний тиск на український рух сягнув свого апогею, на сцені Маріїнського
    театру відбулася прем''єра твору, який відверто оспівував козацьку волю. Композитор
    зміг провести свій твір через усі бюрократичні перепони, скориставшись статусом
    визнаного соліста імператорської сцени. Він загорнув глибокий національний і політичний
    підтекст у форму легкої побутової комедії, що дозволило оминути підозри цензорів.

    '
  tasks:
  - Проаналізуйте, як статус соліста допоміг Гулаку-Артемовському обійти цензуру.
  - Визначте, який жанр було обрано як маскування для серйозного твору.
- type: critical-analysis
  source_reading: reading-01
  title: 'Критичний аналіз: Маскування та підтекст'
  instruction: Проаналізуйте стратегію композитора щодо просування українського твору.
  items:
  - prompt: У тексті автор характеризує жанровий вибір опери як 'захисний щит'. Як
      саме легка комедія дозволила пронести на сцену ідею козацької волі?
    model_answer: Використання жанру комічної опери з етнографічними елементами дозволило
      відвернути увагу цензорів від політичного підтексту. Для імперської влади це
      виглядало як безпечний побутовий водевіль про смішних малоросів, тоді як українська
      інтелігенція зчитувала трагедію втраченої Батьківщини та прагнення до свободи.
  - prompt: Яку функцію автор підкреслює у використанні статусу 'визнаного соліста
      імператорської сцени'?
    model_answer: Статус зірки імператорського театру надав композитору необхідний
      авторитет та протекцію для постановки твору. Його привілейоване становище дозволило
      легалізувати українське мистецтво на найвищому рівні в центрі імперії, що було
      б неможливо для звичайного митця в умовах посилення цензури.
- type: essay-response
  title: 'Есе-відповідь: Деколонізація спадщини'
  instruction: Напишіть розгорнуте есе на основі матеріалів модуля.
  prompt: Згідно з текстом модуля, як творчість та життєвий шлях Семена Гулака-Артемовського
    руйнують колоніальний міф про українську культуру як виключно селянську та провінційну?
    Наведіть аргументи, спираючись на його музичну освіту та кар'єру.
  model_answer: Життєвий шлях Гулака-Артемовського безпосередньо спростовує міф про
    провінційність української культури. По-перше, його освіта в Італії та опанування
    техніки бельканто доводять здатність українських митців інтегруватися у європейський
    контекст. По-друге, його успішна 22-річна кар'єра як провідного баритона на імператорській
    сцені демонструє високий професійний рівень. Найголовнішим аргументом є створення
    опери 'Запорожець за Дунаєм', яка стала синтезом європейської вокальної традиції
    та українського мелосу. Вивівши українських героїв на столичну сцену у форматі
    класичної опери, він довів, що українська мова та тематика цілком придатні для
    високого академічного мистецтва, знищивши стереотип про їхню виключно фольклорну
    природу.
  min_words: 150
  rubric:
  - criteria: Аргументація
    description: Чіткість та переконливість аргументів на користь європейського рівня
      творчості.
    points: 10
  - criteria: Використання тексту
    description: Ефективне посилання на факти з біографії (Італія, Маріїнський театр,
      прем'єра).
    points: 10
- type: quiz
  title: 'Перевірте знання: Життя та творчість композитора'
  items:
  - question: Згідно з текстом, який європейський досвід найбільше вплинув на формування
      вокального стилю Гулака-Артемовського?
    explanation: Навчання у Флоренції дозволило співаку опанувати техніку італійського
      бельканто.
    options:
    - text: Навчання італійського бельканто у Флоренції
      correct: true
    - text: Спів у хорі Паризької опери
      correct: false
    - text: Вивчення німецької романтичної пісні
      correct: false
    - text: Стажування у віденських композиторів
      correct: false
  - question: У тексті зазначається, що головною причиною зняття опери з репертуару
      став певний документ. Який саме?
    explanation: Після виходу Валуєвського циркуляра 1863 року влада почала жорстку
      цензуру всього українського.
    options:
    - text: Сумнозвісний Валуєвський циркуляр
      correct: true
    - text: Особистий наказ російського імператора
      correct: false
    - text: Емський указ про заборону театру
      correct: false
    - text: Розпорядження дирекції Маріїнського театру
      correct: false
  - question: Як автор модуля пояснює прихований сенс образу турецького султана в
      опері?
    explanation: Образ доброго султана був сатирою на деспотизм Російської імперії,
      яка знищила Січ.
    options:
    - text: Він виступає як контраст до російських царів-колонізаторів
      correct: true
    - text: Він символізує необхідність союзу з Османською імперією
      correct: false
    - text: Він додає екзотичного східного колориту для столичної публіки
      correct: false
    - text: Він підкреслює військовий талант і хитрість козаків
      correct: false
  - question: Яку функцію виконував гумор у лібрето опери 'Запорожець за Дунаєм' згідно
      з аналізом у тексті?
    explanation: Гумор слугував захисним щитом для приховування глибокого трагізму
      та політичних ідей.
    options:
    - text: Маскував політичний та національно-визвольний підтекст
      correct: true
    - text: Розважав неосвічену селянську публіку під час вистав
      correct: false
    - text: Демонстрував веселу вдачу українських козаків у вигнанні
      correct: false
    - text: Допомагав акторам легше запам'ятовувати складні арії
      correct: false
  - question: Згідно з текстом, який вплив мала дружба з Тарасом Шевченком на подальшу
      творчу мотивацію композитора?
    explanation: Дружба з поетом запалила патріотизм і змусила композитора задуматися
      про місію у мистецтві.
    options:
    - text: Пробудила потребу служити своєму народові через мистецтво
      correct: true
    - text: Змусила його повністю відмовитися від виступів у Росії
      correct: false
    - text: Надихнула на написання підручника з італійського вокалу
      correct: false
    - text: Спонукала переїхати до Москви для роботи у театрі
      correct: false
  - question: Який аспект раннього музичного досвіду в Києві, за словами автора, став
      базою для опанування італійської техніки?
    explanation: Спів у хорі розвинув дихання, необхідне для бельканто.
    options:
    - text: Здатність до тривалого дихання, набута в духовному хорі
      correct: true
    - text: Вивчення європейських мов у духовній семінарії
      correct: false
    - text: Виконання складних партій у світських театрах міста
      correct: false
    - text: Приватні уроки вокалу у мандрівних італійських музикантів
      correct: false
  - question: Що саме, згідно з текстом модуля, довів Гулак-Артемовський своєю творчістю
      на противагу імперським стереотипам?
    explanation: Його творчість зруйнувала міф про виключно селянську природу української
      культури.
    options:
    - text: Спроможність української культури творити високе європейське мистецтво
      correct: true
    - text: Неможливість виконання італійських опер українською мовою
      correct: false
    - text: Перевагу російської вокальної школи над італійською традицією
      correct: false
    - text: Необхідність повної ізоляції українського театру від європейського
      correct: false
  - question: Яку роль, на думку автора тексту, відіграли мандрівні трупи українських
      корифеїв наприкінці дев'ятнадцятого століття?
    explanation: Трупа Кропивницького та інші відродили виставу, зберігши її в умовах
      заборон.
    options:
    - text: Вони стали охоронцями спадщини та повернули оперу глядачеві
      correct: true
    - text: Вони повністю переписали лібрето опери під власні потреби
      correct: false
    - text: Вони домоглися офіційного скасування Емського указу
      correct: false
    - text: Вони перетворили трагічну оперу на звичайний побутовий водевіль
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Правда чи хиба: Аналіз фактів та концепцій'
  items:
  - statement: Навчаючись в Італії, Гулак-Артемовський повністю відмовився від української
      манери співу, перейнявши виключно флорентійську традицію.
    correct: false
    explanation: Співак створив унікальний синтез європейської вокальної традиції
      та питомо українського мелосу, а не відмовився від нього.
  - statement: У тексті стверджується, що опера 'Запорожець за Дунаєм' була знята
      з репертуару одразу після прем'єри через низьку відвідуваність.
    correct: false
    explanation: Опера мала феноменальний успіх та аншлаги, а знята була під надуманими
      приводами через політичні мотиви після виходу Валуєвського циркуляра.
  - statement: Автор наголошує, що арія Андрія вийшла за межі партитури і стала своєрідним
      духовним гімном українців.
    correct: true
    explanation: Інтонації цього твору передають тугу за свободою і виконувалися як
      духовний гімн борців за незалежність.
  - statement: Згідно з текстом, відродження опери Гулака-Артемовського наприкінці
      дев'ятнадцятого століття відбулося завдяки фінансовій підтримці імперської влади.
    correct: false
    explanation: Відродження здійснив Марко Кропивницький та інші українські театральні
      корифеї силами мандрівних труп в умовах цензури.
  - statement: У модулі зазначається, що досвід співу в духовному хорі допоміг співаку
      розвинути дихання, необхідне для італійського бельканто.
    correct: true
    explanation: Духовні піснеспіви вимагали витривалості та рівного звуковедення,
      що ідеально підготувало його до італійської вокальної школи.
  instruction: Визначте, чи твердження правильне.
