- type: reading
  id: reading-manifesto
  title: 'Первинне джерело: Маніфест Катерини II'
  source: Катерина II (1775)
  text: 'Січ Запорозька вкрай вже зруйнована, із винищенням на майбутній час і самої
    назви запорозьких козаків... за образу нашої імператорської величності.

    '
  tasks:
  - Чим імперія офіційно виправдовувала ліквідацію Січі?
  - Яка справжня мета ховалася за цим маніфестом?
  - Які емоції або реакцію мав викликати цей документ у тогочасного суспільства?
- type: critical-analysis
  title: 'Аналіз: Імперська пропаганда'
  source_reading: reading-manifesto
  target_text: '...із винищенням на майбутній час і самої назви запорозьких козаків...
    за образу нашої імператорської величності.

    '
  questions:
  - Яку функцію виконує заборона самої назви запорозьких козаків?
  - Як цей документ демонструє ставлення абсолютної монархії до будь-якої форми автономії?
  model_answers:
  - Заборона назви є інструментом повного стирання пам'яті про вільне козацтво та
    їхню державність, спробою знищити саму ідентичність.
  - Абсолютна монархія сприймає будь-яку незалежність як образу величності, що свідчить
    про повну несумісність демократичної Січі та деспотичної імперії.
  focus_points:
  - Імперська риторика
  - Знищення ідентичності
- type: essay-response
  title: 'Есе: Справжні причини ліквідації Січі'
  source_reading: reading-manifesto
  prompt: Проаналізуйте глибинні причини ліквідації Запорозької Січі Російською імперією.
    Чому економічно успішна автономія стала загрозою для абсолютної монархії? У своїй
    відповіді спирайтеся на текст модуля та історичний контекст.
  min_words: 250
  model_answer: Російська імперія зруйнувала Січ не через уявне розбійництво, як стверджувала
    пропаганда, а через цивілізаційну несумісність. Січ була демократичною республікою,
    економічно успішною завдяки вільній праці, що прямо загрожувало кріпосницькій
    імперії. Після перемоги над Туреччиною і виходу до Чорного моря Січ втратила статус
    буфера і стала перешкодою для імперської колонізації Півдня.
  rubric:
  - criteria: Аналіз причин
    description: Чітко визначені політичні та економічні мотиви імперії.
    points: 10
  - criteria: Аргументація
    description: Використання фактів із тексту для підтримки тези.
    points: 10
- type: comparative-study
  title: 'Порівняння: Два світи епохи Калнишевського'
  source_reading: reading-manifesto
  items_to_compare:
  - Вільна Запорозька Січ
  - Деспотична Російська імперія
  criteria:
  - Джерело влади та управління
  - Ставлення до праці та селян
  - Економічна модель
  model_answer: Запорозька Січ базувалася на виборній демократичній владі, відсутності
    кріпацтва та вільній праці в зимівниках, що створювало ефективну економіку. Натомість
    Російська імперія була абсолютною монархією з жорсткою централізацією, де економіка
    трималася на рабській праці кріпаків. Ця цивілізаційна прірва робила їхнє мирне
    співіснування неможливим.
- type: quiz
  title: 'Перевірте знання: Життя і діяльність Калнишевського'
  items:
  - question: Яку головну стратегію обрав Петро Калнишевський для захисту автономії
      Запорозької Січі?
    explanation: Він робив ставку на розвиток економіки, торгівлі та власного виробництва
      як основу незалежності.
    options:
    - text: Створення міцного економічного підґрунтя
      correct: true
    - text: Організація військового союзу з Туреччиною
      correct: false
    - text: Відкритий збройний бунт проти імператриці
      correct: false
    - text: Переселення всіх козаків за Дунай
      correct: false
  - question: Чому Російська імперія заарештувала і заслала Петра Калнишевського на
      Соловки?
    explanation: Це була помста за його ефективне управління незалежною демократичною
      республікою.
    options:
    - text: Це була свідома політична помста за його діяльність.
      correct: true
    - text: Він організував змову проти російського імператора.
      correct: false
    - text: Він категорично відмовився воювати проти османської армії.
      correct: false
    - text: Його засудили за привласнення військової скарбниці Січі.
      correct: false
  - question: Що змусило кошового отамана ухвалити рішення про капітуляцію Січі без бою?
    explanation: Калнишевський прагнув врятувати українців від тотального геноциду.
    options:
    - text: Бажання врятувати народ від гарантованого фізичного знищення.
      correct: true
    - text: Він отримав великий грошовий підкуп від генерала Текелія.
      correct: false
    - text: Всі козаки відмовилися виконувати його накази і розійшлися.
      correct: false
    - text: Він абсолютно не знав, як правильно використовувати січову артилерію.
      correct: false
  - question: Як Петро Калнишевський відреагував на указ про помилування від російського
      імператора?
    explanation: Сліпий старець відмовився покидати монастир і залишився там доживати
      віку.
    options:
    - text: Він відмовився скористатися свободою і залишився ченцем.
      correct: true
    - text: Він негайно повернувся в Україну і почав відбудовувати Січ.
      correct: false
    - text: Він швидко переїхав до столиці, щоб працювати в імперському уряді.
      correct: false
    - text: Він подав до міжнародного суду, вимагаючи компенсації за ув'язнення.
      correct: false
  - question: Яку надзвичайно важливу роль відігравали так звані зимівники в економіці
      Запорозької Січі?
    explanation: Зимівники були великими фермерськими господарствами, що виробляли
      продукцію для експорту.
    options:
    - text: Вони були головними центрами сільськогосподарського виробництва та експорту.
      correct: true
    - text: Вони слугували лише як приховані таємні військові бази взимку.
      correct: false
    - text: Там постійно проживали виключно літні козаки, які вже не могли воювати.
      correct: false
    - text: Це були нові російські поселення, спеціально створені на козацьких землях.
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Аналіз фактів: міфи та реальність'
  instruction: Визначте, чи є подані твердження історично правдивими.
  items:
  - statement: За часів мудрого правління Петра Калнишевського Запорозька Січ переживала
      період великого економічного розквіту і мала всі риси модерної республіки.
    correct: true
    explanation: Калнишевський перетворив Січ зі звичайного табору на економічно самодостатню
      державу в державі.
  - statement: Усі без винятку запорозькі козаки палко підтримали важке рішення кошового
      Калнишевського здати зброю російським військам без останнього бою.
    correct: false
    explanation: Значна частина козаків, особливо палка молодь, категорично вимагала
      дати збройний бій, але кошовий обрав шлях порятунку життів.
  - statement: Російська імперія вирішила назавжди ліквідувати Січ виключно через
      те, що козаки категорично відмовилися брати участь у складній війні з Туреччиною.
    correct: false
    explanation: Козаки брали активну і героїчність участь у війні, але Січ ліквідували
      через її демократичний устрій та втрату ролі прикордонного буфера.
  - statement: Могутній Петро Калнишевський бездумно витрачав свої величезні особисті
      статки на швидке будівництво розкішних палаців для власного комфортного проживання.
    correct: false
    explanation: Видатний кошовий був надзвичайно щедрим меценатом і витрачав власні
      колосальні кошти на розбудову церков та підтримку духовенства.
  - statement: Багаторічне жахливе ув'язнення сивого кошового в холодному казематі
      на Соловках мало на меті швидко зламати його залізну волю та максимально принизити
      гідність.
    correct: true
    explanation: Це була цілеспрямована і дуже жорстока політична помста імперії за
      його активну роль в успішному управлінні незалежною українською автономією.
