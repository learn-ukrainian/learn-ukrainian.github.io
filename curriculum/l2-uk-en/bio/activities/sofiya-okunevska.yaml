    - question: "З якою відомою діячкою Софія Окуневська активно співпрацювала у жіночому русі?"
      explanation: "Вона тісно співпрацювала з Наталією Кобринською, видатною діячкою феміністичного руху."
      options:
        - text: "з Наталією Кобринською"
