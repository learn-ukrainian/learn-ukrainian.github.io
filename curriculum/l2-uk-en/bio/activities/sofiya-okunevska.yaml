          correct: false
    - question: "Який головний принцип панував у патріархальному суспільстві Галичини щодо жінок?"
      explanation: "Суспільство керувалося принципом діти, кухня, церква, обмежуючи жінок."
      options:
        - text: "принцип трьох К"
          correct: true
        - text: "обов'язкова вища освіта"
          correct: false
        - text: "заборона на одруження"
          correct: false
        - text: "обов'язкова медична служба"
          correct: false
    - question: "Як сучасники сприйняли рішення Окуневської здобувати медичну освіту?"
      explanation: "У консервативній пресі це викликало справжній скандал та обурення."
      options:
        - text: "як нечуваний скандал"
          correct: true
        - text: "з повною байдужістю"
          correct: false
        - text: "з великим ентузіазмом"
          correct: false
        - text: "як звичайну подію"
          correct: false
    - question: "Яку роль у вихованні молодої Софії відіграло її родинне середовище?"
      explanation: "Священича родина створила інтелектуальне середовище, яке стимулювало її розвиток."
      options:
        - text: "сприяло інтелектуальному розвитку"
          correct: true
        - text: "забороняло будь-яке навчання"
          correct: false
        - text: "змушувало до раннього шлюбу"
          correct: false
        - text: "віддаляло від української культури"
          correct: false

- type: essay-response
  source_reading: reading-okunevska
  title: "Історичне есе"
  prompt: "Спираючись на історію Софії Окуневської, поясніть, чому жінкам було настільки важко здобути вищу освіту в XIX столітті. Які саме соціальні та інституційні бар'єри існували?"
  model_answer: "У XIX столітті жінки стикалися з комплексними бар'єрами на шляху до освіти. Інституційно, університети Австро-Угорщини були закриті для них на законодавчому рівні, що змушувало шукати можливості за кордоном, як це зробила Окуневська, вступивши до Цюрихського університету. Соціально, панували глибокі патріархальні упередження: вважалося, що роль жінки обмежується родиною і побутом, а її психіка не здатна витримати наукові навантаження. Навіть після отримання диплому жінки стикалися з бюрократичним спротивом при працевлаштуванні. Історія Окуневської демонструє, що здобуття освіти вимагало від жінки не лише видатних здібностей, але й колосальної мужності та готовності кинути виклик усій системі."
  min_words: 150
  rubric:
    - criteria: "Аналіз історичного контексту"
      description: "Студент чітко описує інституційні та соціальні обмеження XIX століття."
      points: 4
    - criteria: "Використання прикладу Окуневської"
      description: "Есе спирається на конкретні факти з життя Софії Окуневської."
      points: 3
    - criteria: "Логіка та аргументація"
      description: "Відповідь має чітку структуру та переконливі аргументи."
      points: 3
- type: comparative-study
  source_reading: reading-okunevska
  title: "Порівняльний аналіз: Жіноча освіта в різних імперіях"
  items_to_compare:
    - "Становище жінок в Австро-Угорській імперії"
    - "Становище жінок у Швейцарії"
  criteria:
    - "Доступ до університетської освіти"
    - "Суспільні упередження"
    - "Можливості професійної реалізації"
  prompt: "Порівняйте умови для здобуття вищої освіти та професійної реалізації жінок в Австро-Угорщині та Швейцарії наприкінці XIX століття, спираючись на досвід Софії Окуневської."
  model_answer: "В Австро-Угорщині жінки стикалися з жорсткими законодавчими та соціальними бар'єрами: університети були закритими для них, а панував принцип 'трьох К'. Натомість Швейцарія (зокрема Цюрихський університет) стала осередком жіночої емансипації, надаючи рівний доступ до медичної освіти. Проте навіть після здобуття освіти в прогресивній Швейцарії, жінки мусили долати бюрократичний спротив (нострифікація диплому) при спробі реалізувати себе в консервативній Австро-Угорщині."
