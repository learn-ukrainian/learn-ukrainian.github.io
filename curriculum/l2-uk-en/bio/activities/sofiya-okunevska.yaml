- type: reading
  id: reading-okunevska
  title: "Уривок про діяльність Софії Окуневської"
  source: "Історичні дослідження жіночого руху"
  text: |
    Софія Окуневська стала першою жінкою в Австро-Угорській імперії, яка здобула університетську медичну освіту. Її шлях був надзвичайно складним, адже в кінці дев'ятнадцятого століття галицьке суспільство було глибоко патріархальним, і двері університетів для жінок були щільно зачинені. Незважаючи на величезний тиск і численні упередження, вона вступила до Цюрихського університету, де успішно захистила докторську дисертацію. Після повернення до Львова Окуневська зіткнулася з новою бюрократичною стіною: нострифікація диплому вимагала неймовірних зусиль. Проте вона подолала й цей бар'єр, розпочавши приватну медичну практику. Її діяльність не обмежувалася лише медициною; вона активно долучалася до жіночого руху, співпрацювала з Наталією Кобринською та використовувала свою професію як потужний інструмент соціального та національного служіння.
  tasks:
    - "Які основні перешкоди довелося подолати Софії Окуневській на шляху до медичної освіти?"
    - "Як її діяльність вплинула на розвиток жіночого руху в Галичині?"

- type: true-false
  title: "Оцініть твердження про Софію Окуневську"
  instruction: "Визначте, чи є твердження істинним, спираючись на текст."
  items:
    - statement: "Софія Окуневська здобула медичну освіту у Львівському університеті."
      correct: false
      explanation: "Вона навчалася в Цюрихському університеті, оскільки в Австро-Угорщині жінкам було заборонено вступати до університетів."
    - statement: "Після повернення до Львова вона легко розпочала свою медичну практику."
      correct: false
      explanation: "Їй довелося зіткнутися з бюрократичною стіною та проблемами нострифікації диплому."
    - statement: "Окуневська використовувала медицину як інструмент соціального служіння."
      correct: true
      explanation: "Вона допомагала незаможним і вважала свою професію служінням суспільству."
    - statement: "Діяльність Окуневської була виключно медичною і не стосувалася інших сфер."
      correct: false
      explanation: "Вона також брала активну участь у жіночому русі та співпрацювала з видатними діячками."
    - statement: "Її успіх став символом руйнування патріархальних стереотипів у Галичині."
      correct: true
      explanation: "Вона довела, що жінки здатні опановувати складні науки нарівні з чоловіками."

- type: critical-analysis
  source_reading: reading-okunevska
  title: "Аналіз суспільного впливу"
  target_text: "Незважаючи на величезний тиск і численні упередження, вона вступила до Цюрихського університету..."
  items:
    - prompt: "Проаналізуйте, як здобуття медичного диплома Софією Окуневською вплинуло на руйнування гендерних упереджень у тодішньому суспільстві."
      model_answer: "Здобуття диплома Софією Окуневською стало прецедентом, який зруйнував міф про інтелектуальну неспроможність жінок. Це довело, що жінки можуть опановувати найскладніші дисципліни, і змусило суспільство переглянути патріархальні норми. Її приклад надихнув інших українок боротися за право на вищу освіту та емансипацію."
    - prompt: "У чому полягав зв'язок між медичною практикою Окуневської та її участю в жіночому русі?"
      model_answer: "Її медична практика була практичним втіленням ідей жіночої емансипації. Надаючи допомогу жінкам і дітям, вона не лише рятувала життя, а й підвищувала їхній соціальний статус. Співпраця з діячками жіночого руху дозволяла їй масштабувати свій вплив, перетворюючи медицину на інструмент боротьби за рівні права."

- type: quiz
  title: "Перевірте знання"
  instruction: "Оберіть одну правильну відповідь на кожне запитання."
  items:
    - question: "В якому європейському місті Софія Окуневська здобула вищу медичну освіту?"
      explanation: "Вона навчалася в Цюриху, оскільки Швейцарія була однією з небагатьох країн, відкритих для студенток."
      options:
        - text: "у Цюриху"
          correct: true
        - text: "у Відні"
          correct: false
        - text: "у Львові"
          correct: false
        - text: "у Кракові"
          correct: false
    - question: "З якою проблемою зіткнулася Окуневська при спробі легалізувати свій диплом у Галичині?"
      explanation: "Процес нострифікації був надзвичайно складним через бюрократичні перепони та сексизм."
      options:
        - text: "бюрократична стіна та нострифікація"
          correct: true
        - text: "відсутність медичної практики"
          correct: false
        - text: "незнання польської мови"
