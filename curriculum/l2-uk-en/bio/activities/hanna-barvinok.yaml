- type: reading
  id: reading-method
  title: 'Первинне джерело: Творчий метод'
  source: З тексту модуля
  text: 'Творчий метод Ганни Барвінок кардинально відрізнявся від підходів багатьох
    її сучасників. Вона ніколи не конструювала свої сюжети штучно, сидячи в кабінеті.
    Будучи надзвичайно спостережливою людиною, вона виступала як талановитий етнограф,
    який фіксує кожен порух народної душі. Вона не просто збирала сухі факти про народні
    звичаї чи пісні, а глибоко занурювалася в селянський світогляд, намагаючись зрозуміти
    першопричини людських вчинків. Її сторінки дихають справжнім життям: там можна
    знайти точні описи старовинного одягу, автентичні рецепти страв, детально відтворені
    сільські обряди та живу народну мову.

    '
  tasks:
  - Проаналізуйте відмінність між штучним конструюванням сюжету та етнографічним методом.
- type: critical-analysis
  title: Аналіз етнографічного підходу
  source_reading: reading-method
  items:
  - prompt: Як наведений текст пояснює зв'язок між літературою та етнографією у творчості
      Барвінок?
    model_answer: 'Текст вказує на те, що письменниця поєднала літературу з етнографією:
      вона не просто вигадувала історії, а базувала їх на глибокому знанні селянського
      світогляду, фіксуючи реальні обряди, мову та побут.'
- type: essay-response
  title: 'Есе: Вплив етнографії на автентичність прози'
  source_reading: reading-method
  prompt: Спираючись на прочитаний уривок та матеріал модуля, напишіть есе про те,
    чому занурення в селянський світогляд було критично важливим для творчого методу
    Ганни Барвінок. Як це відрізняло її від інших письменників того часу?
  min_words: 150
  model_answer: Для Ганни Барвінок етнографія не була просто збором фольклору; це
    був спосіб зрозуміти першопричини людських вчинків. Її занурення в селянський
    світогляд дозволило створювати твори, які стали документами епохи. На відміну
    від авторів, що конструювали сюжети в кабінетах, вона зберегла живу народну мову
    та психологічну правдивість, роблячи своїх героїнь реальними людьми, а не ідеалізованими
    романтичними символами.
  rubric:
  - criteria: Розуміння методу
    description: Студент чітко пояснює суть етнографічного підходу письменниці.
    points: 5
  - criteria: Порівняльний аспект
    description: Відповідь містить порівняння з іншими підходами до написання творів.
    points: 5
- type: quiz
  title: 'Перевірте знання: Життя та діяльність'
  items:
  - question: Згідно з текстом, як автор характеризує походження псевдоніма Барвінок?
    explanation: Барвінок є символом безсмертя душі та вірності, що відображало її
      життєву філософію.
    options:
    - text: Як символ незламної духовної стійкості та вірності.
      correct: true
    - text: Як випадкове ім'я, обране під час подорожі.
      correct: false
    - text: Як популярну моду серед петербурзьких письменниць.
      correct: false
    - text: Як обов'язкову вимогу таємного товариства.
      correct: false
  - question: Як у тексті пояснюється головна відмінність Барвінок від Марка Вовчка?
    explanation: Барвінок акцентувала увагу на морально-етичних аспектах, а не на
      соціальному протесті.
    options:
    - text: Вона зосереджувалася на етико-релігійному акценті та терпінні.
      correct: true
    - text: Вона відкрито закликала до збройної класової боротьби.
      correct: false
    - text: Вона писала свої твори виключно про життя міської шляхти.
      correct: false
    - text: Вона ніколи не використовувала українську народну говірку.
      correct: false
  - question: Який аргумент автор наводить щодо її ролі після смерті чоловіка?
    explanation: Письменниця розпродала свій маєток, щоб видати архів Пантелеймона
      Куліша.
    options:
    - text: Вона пожертвувала маєтком для фінансування видання його праць.
      correct: true
    - text: Вона спалила всі його рукописи через давні образи.
      correct: false
    - text: Вона одразу переїхала до Європи, залишивши Україну.
      correct: false
    - text: Вона привласнила всі його заслуги і видала їх під своїм іменем.
      correct: false
  - question: Що, згідно з текстом, було найважливішим у використанні нею чернігівської
      говірки?
    explanation: Її соковита мова була не просто фоном, а глибоко автентичним скарбом.
    options:
    - text: Мова була настільки багатою, що навіть Куліш вчився з її творів.
      correct: true
    - text: Вона використовувала її лише для створення комічних персонажів.
      correct: false
    - text: Говірка робила її тексти абсолютно незрозумілими для читачів.
      correct: false
    - text: Вона штучно спрощувала говірку до рівня столичної мови.
      correct: false
  - question: Як текст описує вплив радянської критики на сприйняття творчості Барвінок?
    explanation: Її таврували як консервативну через відсутність закликів до повалення
      ладу.
    options:
    - text: Її маргіналізували через відсутність соціального бунту в творах.
      correct: true
    - text: Її вважали головним ідеологом пролетарської літератури.
      correct: false
    - text: Її твори стали обов'язковими для вивчення в усіх школах.
      correct: false
    - text: Її нагородили премією за досягнення в етнографії.
      correct: false
  - question: Яку роль відіграло заслання в Тулі у формуванні особистості письменниці?
    explanation: Випробування допомогли їй еволюціонувати з ніжної дівчини в сильну
      жінку.
    options:
    - text: Воно загартувало її характер і зробило емоційною опорою родини.
      correct: true
    - text: Воно змусило її назавжди відмовитися від літературної праці.
      correct: false
    - text: Воно призвело до розлучення з чоловіком і повернення додому.
      correct: false
    - text: Воно перетворило її на палку прихильницю імперського режиму.
      correct: false
  - question: Як сучасний феміністичний дискурс розглядає творчість Ганни Барвінок?
    explanation: Вона дала право голосу селянкам, зробивши їх повноцінними суб'єктами.
    options:
    - text: Жінка в її творах постає суб'єктом власних рішень та переживань.
      correct: true
    - text: Її засуджують за підтримку патріархального гноблення жінок.
      correct: false
    - text: Вважається, що вона писала лише про ідеалізованих дворянок.
      correct: false
    - text: Її творчість визнано неактуальною для сучасних досліджень.
      correct: false
  - question: Згідно з текстом, чому її твори є цінними для сучасних фольклористів?
    explanation: Вона детально і без спотворень фіксувала весільні обряди та народну
      магію.
    options:
    - text: Вона зберегла точні описи старовинних обрядів і побуту.
      correct: true
    - text: Вона вигадала багато нових міфів, які стали популярними.
      correct: false
    - text: Вона переклала всі європейські казки на чернігівську говірку.
      correct: false
    - text: Вона першою почала записувати фольклор на аудіопристрої.
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Правда чи вигадка: Аналіз фактів із тексту'
  items:
  - statement: Текст стверджує, що Ганна Барвінок вигадувала свої сюжети штучно, не
      маючи контакту з селянами.
    correct: false
    explanation: Вона спиралася на власні етнографічні спостереження та спілкування
      з народом.
  - statement: Письменниця пожертвувала родовим маєтком, щоб видати архів свого покійного
      чоловіка.
    correct: true
    explanation: Вона розпродала Мотронівку задля збереження творчої спадщини Пантелеймона
      Куліша.
  - statement: У своїх творах Барвінок закликала селян до збройного протесту проти
      поміщиків.
    correct: false
    explanation: Її твори мали етико-релігійний акцент, зосереджуючись на моральній
      стійкості та внутрішніх драмах.
  - statement: Пантелеймон Куліш високо оцінював автентичну мову творів своєї дружини.
    correct: true
    explanation: Він визнавав, що сам часто вчився живої чернігівської говірки з її
      текстів.
  - statement: За радянських часів творчість письменниці активно популяризувалася
      в школах.
    correct: false
    explanation: Радянська критика маргіналізувала її, називаючи її погляди консервативними.
  - statement: Сучасні дослідники цінують письменницю за перетворення жінки-селянки
      на повноцінного суб'єкта історії.
    correct: true
    explanation: Це є важливим внеском у розвиток феміністичного дискурсу в літературі.
  instruction: Визначте, чи твердження правильне.
