- type: reading
  id: reading-vyhovskyi-manifesto
  title: 'Первинне джерело: Маніфест до європейських дворів'
  source: Канцелярія Івана Виговського (1658)
  text: 'Причина війни, що розгорілася, не в нас... Москва, зламавши присягу, хотіла
    нас у ярмо запрягти. Ми були змушені захищати свої природні права та свободи,
    адже договір був порушений сувереном. Наша мета — відновити гідність і зберегти
    незалежність, діючи у цивілізованому правовому полі.

    '
  tasks:
  - Проаналізуйте головний аргумент маніфесту щодо причин війни.
  - Як автор тексту виправдовує розрив відносин із Москвою?
- type: critical-analysis
  title: Аналіз дипломатичної риторики
  source_reading: reading-vyhovskyi-manifesto
  instruction: Проаналізуйте наведений фрагмент маніфесту.
  items:
  - prompt: Яку роль відіграє згадка про 'зламану присягу' у правовому контексті XVII
      століття?
    model_answer: Згадка про 'зламану присягу' є ключовим юридичним аргументом. У
      правовій традиції ранньомодерної Європи порушення монархом своїх зобов'язань
      автоматично звільняло підданих або васалів від обов'язку покори. Це перетворює
      дії Виговського зі 'зради' на легітимний захист природних прав.
  - prompt: Як використання метафори 'ярмо' контрастує із 'цивілізованим правовим
      полем'?
    model_answer: Метафора 'ярмо' підкреслює тиранічну, нецивілізовану сутність московської
      політики, яка прагне до абсолютного підкорення. Натомість посилання на 'цивілізоване
      правове поле' демонструє європейську ідентичність козацької держави, яка діє
      на основі договорів та законів.
- type: essay-response
  title: 'Есе: Альтернативна історія Гадяцької унії'
  instruction: Напишіть розгорнуте есе-відповідь.
  items:
  - prompt: Спираючись на текст модуля, оцініть концепцію Великого князівства Руського.
      Як би ця конфедерація могла змінити геополітичний ландшафт Східної Європи, якби
      проект не зазнав поразки через внутрішній розкол?
    model_answer: 'Гадяцький договір був інноваційним проектом перетворення двоєдиної
      Речі Посполитої на триєдину конфедерацію рівноправних націй. Якби Велике князівство
      Руське стало реальністю, Україна отримала б потужні інституційні гарантії: власну
      адміністрацію, військо, скарбницю та суд. Це забезпечило б їй статус рівноправного
      політичного суб''єкта на міжнародній арені. Успіх цього проекту міг би зупинити
      експансію Московського царства на захід, створюючи міцний бар''єр із союзних
      держав. Культурні та релігійні гарантії договору зняли б напругу між православними
      та католиками, сприяючи розвитку освіти, зокрема Києво-Могилянської колегії.
      Однак проект зазнав краху через соціальну прірву між елітою та рядовим козацтвом,
      яке повірило популістам. Ця втрата шансу на інтеграцію в європейський простір
      стала однією з причин початку періоду Руїни.'
  min_words: 250
  rubric:
  - criteria: Історична аргументація
    description: Наявність чітких посилань на Гадяцьку унію та концепцію Великого
      князівства Руського.
    points: 40
  - criteria: Аналітична глибина
    description: Вміння аналізувати вплив інституцій та причини внутрішнього розколу.
    points: 40
  - criteria: Мовне оформлення
    description: Використання складної академічної лексики та дипломатичної термінології.
    points: 20
- type: true-false
  title: Історичні факти та міфи
  instruction: Визначте, чи є твердження правдивим, чи хибним, згідно з текстом.
  items:
  - statement: Богдан Хмельницький викупив Івана Виговського з татарського полону
      через його видатну освіченість.
    correct: true
    explanation: Так, Хмельницький обміняв його на породистого коня, усвідомлюючи
      дефіцит освічених кадрів у державі.
  - statement: Гадяцька унія передбачала повне підпорядкування українських земель
      Короні Польській без права на автономію.
    correct: false
    explanation: Навпаки, унія передбачала створення Великого князівства Руського
      як третього рівноправного суб'єкта конфедерації.
  - statement: Під час Конотопської битви гетьман Виговський застосував пряму лобову
      атаку на табір московитів.
    correct: false
    explanation: Виговський використав удаваний відступ, заманивши елітну ворожу кінноту
      в болотисту пастку.
  - statement: Створення Генеральної військової канцелярії дозволило Україні вести
      міжнародні переговори на найвищому рівні.
    correct: true
    explanation: Ця установа під керівництвом Виговського стала повноцінним міністерством
      закордонних справ.
  - statement: Іван Виговський добровільно склав булаву під час Чорної ради, щоб уникнути
      братовбивчого кровопролиття.
    correct: true
    explanation: Бачачи небезпеку громадянської війни, він пожертвував владою заради
      збереження життів співвітчизників.
  - statement: Радянська історіографія об'єктивно оцінювала Виговського як видатного
      фундатора української державності.
    correct: false
    explanation: Радянська пропаганда демонізувала його, тавруючи як зрадника і прислужника.
- type: quiz
  title: Перевірка розуміння тексту
  instruction: Оберіть правильну відповідь на запитання.
  items:
  - question: Яку головну причину автор тексту називає серед тих, що призвели до стрімкого
      падіння гетьмана Виговського?
    explanation: Головною причиною була соціальна прірва між елітою та звичайним козацтвом.
    options:
    - text: величезна соціальна прірва між освіченою елітою та рядовим козацтвом
      correct: true
    - text: нищівна поразка українського війська під час Конотопської битви
      correct: false
    - text: відмова європейських монархів визнати легітимність українського уряду
      correct: false
    - text: нездатність гетьмана знайти спільну мову з кримськотатарським ханом
      correct: false
  - question: Як у тексті пояснюється юридичний статус Гадяцького договору в контексті
      тогочасної міжнародної політики?
    explanation: Договір був продуманим дипломатичним маневром для рівноправної інтеграції
      в європейський простір.
    options:
    - text: це був складний дипломатичний маневр для створення рівноправної конфедерації
      correct: true
    - text: документ був вимушеним актом повної та беззаперечної капітуляції
      correct: false
    - text: угода гарантувала повну інтеграцію Гетьманщини до складу Московського
        царства
      correct: false
    - text: це був тимчасовий військовий союз, який не мав жодних політичних наслідків
      correct: false
  - question: Що символізувало створення Великого князівства Руського відповідно до
      політичних амбіцій козацької еліти?
    explanation: Воно символізувало набуття Україною статусу третього рівноправного
      суб'єкта Речі Посполитої.
    options:
    - text: мирну трансформацію держави у триєдину конфедерацію рівних націй
      correct: true
    - text: остаточне скасування всіх привілеїв православного духовенства
      correct: false
    - text: повне підпорядкування судової системи місцевим польським урядникам
      correct: false
    - text: поступове повернення козацьких земель під контроль Османської імперії
      correct: false
  - question: Який військовий прийом дозволив союзній армії знищити елітну кавалерію
      ворога під час битви під Конотопом?
    explanation: Українське військо успішно застосувало удаваний відступ, заманивши
      ворога в болото.
    options:
    - text: ризикований удаваний відступ із подальшим заманюванням у пастку
      correct: true
    - text: довготривала жорстка облога ворожих позицій у степовій місцевості
      correct: false
    - text: стрімка та неочікувана лобова атака всіма наявними силами піхоти
      correct: false
    - text: таємне мінування основних шляхів пересування важкої артилерії
      correct: false
  - question: Згідно з текстом, чому розрив відносин із Москвою не вважався зрадою
      в правовому полі сімнадцятого століття?
    explanation: Порушення присяги з боку правителя автоматично скасовувало обов'язок
      підкорятися йому.
    options:
    - text: монарх першим порушив юридичні зобов'язання, що виправдовувало самозахист
      correct: true
    - text: уряд отримав спеціальний дозвіл від європейських дипломатів на зміну курсу
      correct: false
    - text: православне духовенство публічно благословило розірвання цього союзу
      correct: false
    - text: усі попередні договори були підписані під жорстким фізичним тиском
      correct: false
- type: comparative-study
  title: 'Порівняльний аналіз: Дипломатичні стратегії'
  instruction: Порівняйте підходи до державотворення.
  prompt: Порівняйте дипломатичні підходи Богдана Хмельницького та Івана Виговського.
  model_answer: Хмельницький укладав союзи з Москвою та Кримом для негайного військового
    виживання, тоді як Виговський зробив стратегічний європейський вибір. Його Гадяцький
    проект передбачав рівноправну конфедерацію з Польщею та Литвою, що концептуально
    відрізнялося від тимчасових військових альянсів попередника. Обидва гетьмани прагнули
    суб'єктності, але Виговський діяв як західноєвропейський інтелектуал-правник.
  items_to_compare:
  - Богдан Хмельницький
  - Іван Виговський
  criteria:
  - Дипломатичний вектор
  - Тип союзів
