- type: reading
  id: reading-tatarska-chest
  title: 'Первинне джерело: Лиха честь татарська'
  source: Галицько-Волинський літопис (ХІІІ ст.)
  text: 'О, лихіша лиха честь татарська! Данило Романович, що був князем великим,
    володів із братом своїм Руською землею, Києвом, і Володимиром, і Галичем, і іншими
    краями, нині сидить на колінах і холопом себе називає! А вони самі данини хотять,
    і погрози ідуть, і він життя не надіється! О, лиха ти, честь татарська!

    '
  tasks:
  - Який емоційний стан передає літописець у цьому уривку?
  - Які слова підкреслюють контраст між минулим і теперішнім статусом князя?
- type: critical-analysis
  title: 'Аналіз: Приниження і державність'
  source_reading: reading-tatarska-chest
  target_text: Данило Романович, що був князем великим... нині сидить на колінах і
    холопом себе називає!
  questions:
  - Чому літописець використовує слово холоп для опису стану князя Данила?
  - Яку функцію виконує перелік міст (Київ, Володимир, Галич) перед описом приниження
    князя?
  model_answers:
  - Слово холоп символізує абсолютну втрату політичної субєктності та особистої свободи
    в очах літописця, підкреслюючи варварську природу монгольської влади.
  - 'Перелік міст створює різкий контраст: він нагадує про велич і масштаб володінь
    Данила, роблячи його нинішнє становище на колінах ще більш трагічним.'
  focus_points:
  - Емоційний контраст
  - Політична легітимність
- type: comparative-study
  title: 'Порівняння: Два шляхи Русі'
  source_reading: reading-tatarska-chest
  items_to_compare:
  - Данило Галицький (Королівство Русь)
  - Олександр Невський (Залісся)
  criteria:
  - Ставлення до Монгольської імперії
  - Вектор цивілізаційного розвитку
  - Тип влади та внутрішня політика
  model_answer: Данило Галицький обрав шлях опору та інтеграції з Європою, зберігаючи
    феодальні інституції та шукаючи союзників на Заході (Папа Римський). Своє васальне
    становище він розглядав як тимчасове. Олександр Невський обрав повну покірність
    і колаборацію з Ордою, використовуючи її силу для придушення повстань та знищення
    віча, чим заклав основи деспотичної самодержавної моделі.
- type: essay-response
  title: 'Есе: Значення коронації'
  source_reading: reading-tatarska-chest
  prompt: Проаналізуйте політичне та ідеологічне значення прийняття Данилом Романовичем
    титулу Rex Russiae (Король Русі) у 1253 році. Як цей крок вплинув на міжнародний
    статус його держави?
  min_words: 250
  model_answer: Коронація Данила Галицького у Дорогочині мала епохальне значення.
    По-перше, вона забезпечила найвищу легітимацію влади в системі координат західноєвропейської
    політики, перетворивши князя на рівноправного європейського монарха. По-друге,
    це був акт підтвердження суверенітету та відкритий виклик Золотій Орді. Титул
    Rex Russiae закріпив за Галичиною та Волинню статус єдиного законного спадкоємця
    Київської держави, що мало величезні наслідки для збереження європейського вектору
    розвитку України.
  rubric:
  - criteria: Аргументація та аналіз
    description: Глибоке розкриття політичних мотивів та наслідків коронації.
    points: 10
  - criteria: Використання термінології
    description: Доречне використання термінів легітимність, суверенітет, васал.
    points: 5
- type: quiz
  title: 'Перевірте знання: Політика і дипломатія'
  items:
  - question: Згідно з текстом, чому Данило Галицький вирішив прийняти корону від
      Папи Римського?
    explanation: Данило прагнув залучити західних союзників для організації Хрестового
      походу проти монголів і підвищити статус своєї держави.
    options:
    - text: Щоб змінити релігію своїх підданих на католицизм
      correct: false
    - text: Щоб організувати коаліцію проти Монгольської імперії
      correct: true
    - text: Щоб отримати фінансову допомогу від Тевтонського ордену
      correct: false
    - text: Щоб закріпити союз із Новгородським князівством
      correct: false
  - question: У тексті модуля автор характеризує стратегічне рішення Данила щодо оборони
      міст. У чому воно полягало?
    explanation: Данило впровадив будівництво мурованих замків і веж-донжонів, що
      могли витримувати атаки важкої облогової техніки.
    options:
    - text: Будував виключно земляні вали з дерев’яними стінами
      correct: false
    - text: Переносив усі міста в низини річок для захисту
      correct: false
    - text: Почав зводити фортеці з каменю та цегли
      correct: true
    - text: Відмовився від будівництва міст на користь кочового табору
      correct: false
  - question: Згідно з текстом, що означав ультиматум темника Бурундая у 1259 році?
    explanation: Бурундай наказав розметати (зруйнувати) укріплення ключових міст,
      щоб зробити державу беззахисною.
    options:
    - text: Вимогу прийняти католицьку віру
      correct: false
    - text: Наказ власноруч знищити оборонні мури міст
      correct: true
    - text: Вимогу передати Холм під пряме управління Орди
      correct: false
    - text: Наказ виступити в похід проти Угорщини
      correct: false
  - question: Який аргумент автор наводить щодо економічної бази Королівства Русь?
    explanation: Сіль була стратегічним товаром Середньовіччя, монополія на який приносила
      колосальні прибутки державі Данила.
    options:
    - text: Головним доходом був видобуток золота та срібла
      correct: false
    - text: Основою був експорт лісу до Західної Європи
      correct: false
    - text: Держава встановила монополію на торгівлю сіллю
      correct: true
    - text: Головним доходом став продаж зброї кочовим племенам
      correct: false
  - question: Як автор характеризує політичну модель дуумвірату, створену Данилом
      і Васильком?
    explanation: Брати утворили дуумвірат — гармонійне співправління, де Данило був
      верховним правителем, а Василько забезпечував надійний тил.
    options:
    - text: Абсолютна деспотія з одним правителем
      correct: false
    - text: Гармонійне співправління та надійний тил
      correct: true
    - text: Боярська олігархія з виборним князем
      correct: false
    - text: Постійна міжусобна боротьба за престол
      correct: false
  instruction: Оберіть правильну відповідь.
