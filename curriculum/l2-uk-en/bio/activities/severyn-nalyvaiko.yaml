- type: reading
  id: reading-solonytsia
  title: 'Опис Солоницької трагедії'
  source: 'Історичний нарис'
  text: |
    Згідно з достовірними історичними документами, після чергового нищівного артилерійського обстрілу 7 червня 1596 року опір став остаточно неможливим. Деморалізована старшина ухвалила фатальне рішення. Угода з поляками передбачала гарантії життя для рядових учасників в обмін на видачу командирів. Сталася сумнозвісна зрада: Северина Наливайка та інших провідників було схоплено і видано Жолкевському. Попри обіцянки, коронні війська віроломно напали на беззахисний табір. Трагедія в урочищі Солониця мала колосальні наслідки, породивши травматичний міф про лядську зраду.
  instruction: 'Прочитайте текст для подальшого аналізу подій на Солониці.'
  tasks:
    - 'Проаналізуйте мотиви козацької старшини.'
    - 'Оцініть лексику, використану для опису наслідків події.'

- type: true-false
  title: 'Аналіз аргументації тексту'
  instruction: 'Визначте, чи відповідає твердження авторській позиції у тексті модуля.'
  items:
    - statement: 'Автор тексту використовує термін повстання замість бунт, щоб легітимізувати політичну боротьбу козацтва.'
      correct: true
      explanation: 'У тексті зазначено, що вибір слова повстання легітимізує рух, тоді як бунт зводить його до кримінального правопорушення.'
    - statement: 'Згідно з текстом, радянська історіографія об''єктивно висвітлювала шляхетське походження Наливайка.'
      correct: false
      explanation: 'Текст стверджує протилежне: радянська пропаганда свідомо замовчувала його шляхетське походження, формуючи міф про селянського ватажка.'
    - statement: 'Описуючи Солоницьку трагедію, автор наголошує, що внутрішній розкол був менш руйнівним, ніж ворожий обстріл.'
      correct: false
      explanation: 'Автор чітко зазначає: найбільшою трагедією Солониці став не ворожий обстріл, а внутрішній розкол.'
    - statement: 'У модулі наведено думку, що служба в магнатських арміях парадоксальним чином озброїла та навчила майбутніх повстанців.'
      correct: true
      explanation: 'Текст вказує на цей історичний парадокс: магнати самі навчили тих, хто згодом підняв проти них зброю.'
    - statement: 'Згідно з висновками автора, ідея територіальної автономії Наливайка була повністю забута наступними поколіннями.'
      correct: false
      explanation: 'Автор пише, що ця ідея глибоко вкоренилася у свідомості і стала прототипом майбутньої Гетьманщини.'

- type: critical-analysis
  title: 'Аналіз первинного джерела'
  source_reading: 'reading-solonytsia'
  instruction: 'Проаналізуйте наведений уривок тексту, спираючись на питання.'
  items:
    - prompt: 'Яку лексику автор використовує для характеристики дій коронних військ після складання зброї козаками, і якого ефекту це досягає?'
      model_answer: 'Автор використовує емоційно забарвлену лексику (сумнозвісна зрада, віроломно напали, беззахисний табір, різанина), щоб підкреслити нелюдську жорстокість і порушення лицарського кодексу з боку поляків. Це формує у читача розуміння глибини історичної травми.'
    - prompt: 'Як у наведеному абзаці пояснюється концепція мобілізаційного міфу?'
      model_answer: 'Автор показує причинно-наслідковий зв''язок: зрада поляків породила травматичний міф, який згодом змушував наступні покоління повстанців битися до останнього, не довіряючи жодним угодам. Тобто психологічна травма перетворилася на ідеологічну зброю.'

- type: essay-response
  title: 'Есе: Деколонізація історичного наративу'
  instruction: 'Напишіть аналітичне есе на основі матеріалів модуля.'
  prompt: 'Спираючись на аргументи, наведені в тексті модуля, поясніть, чому використання терміна козацька війна є більш коректним, ніж селянсько-козацьке повстання. Як автор тексту спростовує імперські міфи щодо постаті Северина Наливайка?'
  min_words: 300
  model_answer: 'У своєму есе слід спиратися на тезу автора про те, що термін селянсько-козацьке повстання був нав''язаний імперською традицією з метою маргіналізації руху та зведення його виключно до економічного невдоволення. Автор доводить, що це була справжня козацька війна, оскільки в ній брали участь різні верстви (шляхта, духовенство), а цілі були глибоко політичними (територіальна автономія). Крім того, текст спростовує міф про Наливайка як простого селянського ватажка, наголошуючи на його шляхетському походженні, військовій освіті в Острозі, дипломатичному листуванні з королем та стратегічному мисленні. Таким чином, автор здійснює деколонізацію образу, повертаючи йому статус професійного військового та політичного лідера раннього модерну.'
  rubric:
    - criteria: 'Лексична точність'
      description: 'Використання академічної лексики з тексту (деколонізація, маргіналізація, імперський наратив).'
      points: 10
    - criteria: 'Аналіз тексту'
      description: 'Опора на конкретні аргументи та термінологічні зауваження автора модуля.'
      points: 10

- type: comparative-study
  title: 'Аналіз еволюції козацьких вимог'
  instruction: 'Проаналізуйте текстові аргументи щодо еволюції козацького руху.'
  items_to_compare:
    - 'Опис виступу Косинського у тексті'
    - 'Опис повстання Наливайка у тексті'
  criteria:
    - 'Масштабність дій згідно з авторською оцінкою'
    - 'Різниця у політичних вимогах'
  prompt: 'Порівняйте, як автор тексту розмежовує виступи Косинського та Наливайка. Які текстові маркери вказують на якісний перехід козацтва до нових цілей?'
  model_answer: 'Автор протиставляє обидва рухи, використовуючи контрастні формулювання. Виступ Косинського описується як локальний конфлікт, спрямований на захист станових привілеїв конкретної групи. Натомість рух Наливайка характеризується термінами війна міжнародного масштабу та революційна вимога територіальної сегрегації. Текстовими маркерами переходу є згадки про вихід за межі традиційних територій (Білорусь, Молдова) та артикуляція ідеї створення окремої козацької землі. Таким чином, автор переконливо доводить еволюцію козацтва від захисту дрібних інтересів до глобальних політичних ультиматумів.'