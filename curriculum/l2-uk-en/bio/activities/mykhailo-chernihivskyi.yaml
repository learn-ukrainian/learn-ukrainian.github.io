- type: reading
  id: reading-mykhailo-trial
  title: 'Первинне джерело: Діалог у ставці хана'
  source: '''Сказання про вбивство в Орді'''
  text: 'Коли жерці передали князеві наказ хана виконати обряд очищення вогнем і поклоніння
    кущу, Михайло озвучив формулу, яка стала класичною в історії відносин між церквою
    та деспотичною державою. За літописом, він промовив: ''Тобі, царю, кланяюся, тому
    що бог доручив тобі царювати на цьому світі. А тому, чому велиш поклонитися, —
    не поклонюся''.

    '
  tasks:
  - Проаналізуйте аргументацію Михайла Чернігівського.
  - Визначте межу між політичною лояльністю та духовною зрадою у відповіді князя.
- type: critical-analysis
  id: analysis-01
  source_reading: reading-mykhailo-trial
  title: 'Критичний аналіз: Межі компромісу'
  items:
  - prompt: Як Михайло Чернігівський розмежовує політичну владу хана та духовну сферу?
      Чому він погоджується на перше, але відкидає друге?
    model_answer: Князь спирається на християнську концепцію, згідно з якою світська
      влада, навіть ворожа, походить від Бога як даність чи випробування. Тому він
      готовий виявити політичну повагу (вклонитися царю). Проте він відмовляється
      від ритуалу, оскільки поклоніння ідолу означає зречення Христа і перехід під
      духовну владу язичництва, що для нього є червоною лінією.
  - prompt: Який вплив мала ця відповідь на формування етичного стандарту української
      еліти?
    model_answer: Ця відповідь заклала фундамент для етосу непокори та духовного опору.
      Вона продемонструвала, що збереження ідентичності та вірність принципам є вищими
      за фізичне виживання, створивши архетип мученика, який надихав наступні покоління
      в умовах тоталітарного тиску.
- type: essay-response
  id: essay-01
  source_reading: reading-mykhailo-trial
  title: 'Есе-відповідь: Стратегії виживання XIII століття'
  prompt: 'Порівняйте три стратегії поведінки князів під час монгольської навали:
    колаборацію Олександра Невського, дипломатію Данила Галицького та мучеництво Михайла
    Чернігівського. Яка з них, на вашу думку, мала найбільший вплив на збереження
    національної ідентичності в довгостроковій перспективі? Обґрунтуйте свою позицію.'
  min_words: 300
  model_answer: Колаборація Невського забезпечила фізичне виживання його земель, але
    призвела до глибокої асиміляції з імперською системою та втрати суб'єктності.
    Дипломатія Данила Галицького була спробою зберегти державність через політичне
    маневрування і союз із Заходом, що дозволило Галицько-Волинській державі проіснувати
    ще століття. Проте мучеництво Михайла Чернігівського мало найбільший вплив на
    духовну площину. Його безкомпромісна відмова від ідолопоклонства стала моральним
    імперативом, який заклав основи етосу опору. У довгостроковій перспективі саме
    ця стратегія духовної незламності стала ключовим елементом збереження ідентичності,
    коли державні інститути були повністю знищені. Тому вибір Михайла перетворився
    на парадигму, що надихала український визвольний рух у наступні століття.
  rubric:
  - criteria: Аналіз стратегій
    description: Чітко визначені та проаналізовані три різні стратегії поведінки.
    points: 40
  - criteria: Аргументація та доказовість
    description: Логічно обґрунтована позиція щодо впливу кожної стратегії на ідентичність.
    points: 40
  - criteria: Стилістика та лексика
    description: Використання академічної лексики та термінології епохи.
    points: 20
- type: true-false
  title: Визначте правдивість тверджень
  instruction: Оцініть наведені твердження щодо історичних подій та їх інтерпретації.
  items:
  - statement: Михайло Чернігівський обрав шлях повної політичної колаборації з Монгольською
      імперією, щоб врятувати своє князівство.
    correct: false
    explanation: Князь обрав шлях відмови від духовної покори, що призвело до його
      мученицької смерті, на відміну від Олександра Невського.
  - statement: Убивство монгольських послів у 1239 році вважалося найтяжчим злочином
      згідно з монгольською Ясою.
    correct: true
    explanation: Особа посла була недоторканною, і таке вбивство перетворювало правителя
      на об'єкт тотального знищення.
  - statement: Європейські монархи, зокрема король Угорщини Бела IV, надали Михайлу
      потужну військову підтримку проти монголів.
    correct: false
    explanation: Спроби сформувати антимонгольську коаліцію розбилися об стіну європейської
      апатії, і Захід не надав допомоги.
  - statement: Боярин Федір був змушений померти разом з князем, оскільки монголи
      не пропонували йому помилування.
    correct: false
    explanation: Монголи пропонували Федору високі посади та збереження життя в обмін
      на зречення віри, але він свідомо відмовився.
  - statement: Вивезення мощей святого Михайла до Москви у 1572 році було актом сакральної
      легітимації концепції 'Москва — Третій Рим'.
    correct: true
    explanation: Це був акт крадіжки святині для штучного конструювання історичної
      тяглості та авторитету Московського царства.
  - statement: Джованні да Плано Карпіні у своїх працях заперечував факт жорстокої
      страти князя Михайла Чернігівського.
    correct: false
    explanation: Навпаки, Карпіні підтвердив факт страти, верифікуючи події, описані
      в руських літописах та доповнюючи їх.
- type: quiz
  title: 'Перевірте знання: Життєпис та спадщина князя'
  items:
  - question: До якої князівської династії належав Михайло Чернігівський?
    explanation: Він належав до могутньої гілки чернігівських князів — Ольговичів,
      які конкурували з Мономаховичами.
    options:
    - text: Ольговичів
      correct: true
    - text: Мономаховичів
      correct: false
    - text: Ростиславичів
      correct: false
    - text: Рюриковичів галицьких
      correct: false
  - question: Яка подія стала першим збройним зіткненням об'єднаного русько-половецького
      війська з монголами у 1223 році?
    explanation: Битва на Калці стала катастрофічним першим зіткненням з невідомим
      ворогом.
    options:
    - text: Битва на річці Калці
      correct: true
    - text: Битва на річці Альті
      correct: false
    - text: Облога Києва ханом Батиєм
      correct: false
    - text: Битва на Синіх Водах
      correct: false
  - question: Який титул здобув Михайло Всеволодович у 1238 році, ставши на чолі приреченої
      столиці?
    explanation: У 1238 році він здобув великокнязівський престол у Києві.
    options:
    - text: Великий князь Київський
      correct: true
    - text: Князь Галицько-Волинський
      correct: false
    - text: Король Русі
      correct: false
    - text: Князь Новгородський
      correct: false
  - question: Що вимагали від іноземців монголи перед аудієнцією у хана Батия згідно
      зі своїми традиціями?
    explanation: Монгольський ритуал вимагав проходження між розпаленими вогнищами
      та поклоніння зображенню Чингісхана.
    options:
    - text: Пройти очищення вогнем та вклонитися ідолу
      correct: true
    - text: Прийняти іслам та зрегтися своїх звичаїв
      correct: false
    - text: Скласти зброю біля входу до ханського шатра
      correct: false
    - text: Випити чашу кумису на знак поваги до хана
      correct: false
  - question: Хто супроводжував Михайла Чернігівського до ставки Сарай-Бату і прийняв
      разом з ним мученицьку смерть?
    explanation: Князя підтримував його вірний соратник — боярин Федір.
    options:
    - text: Боярин Федір
      correct: true
    - text: Син Ростислав
      correct: false
    - text: Єпископ Іоанн
      correct: false
    - text: Князь Данило Галицький
      correct: false
  - question: Який італійський францисканець і дипломат залишив унікальні свідчення
      про страту князя в Орді у своїй праці 'Історія монголів'?
    explanation: Джованні да Плано Карпіні у своїй праці згадав про долю руського
      князя.
    options:
    - text: Джованні да Плано Карпіні
      correct: true
    - text: Гільйом де Рубрук
      correct: false
    - text: Марко Поло
      correct: false
    - text: Папа Римський Іннокентій IV
      correct: false
  - question: Яку мету переслідував Іван Грозний, вивозячи мощі святих мучеників до
      Москви у 1572 році?
    explanation: Вивезення мощей було механізмом сакральної легітимації ідеології
      'Москва — Третій Рим'.
    options:
    - text: Сакральну легітимацію власної імперії
      correct: true
    - text: Захист святинь від наступу католицизму
      correct: false
    - text: Виконання заповіту чернігівських єпископів
      correct: false
    - text: Об'єднання всіх руських земель навколо Києва
      correct: false
  - question: Що, на думку сучасників та згідно зі 'Сказанням', сталося з тілами мучеників
      після того, як їх викинули на вулицю?
    explanation: За легендою, тіла залишалися нетлінними, і навіть здичавілі собаки
      їх не торкнулися.
    options:
    - text: Вони залишилися нетлінними і недоторканими
      correct: true
    - text: Їх таємно поховали християнські місіонери
      correct: false
    - text: Вони були негайно спалені ординцями
      correct: false
    - text: Їх викупили київські купці за велику ціну
      correct: false
  instruction: Оберіть правильну відповідь.
