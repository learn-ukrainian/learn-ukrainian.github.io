- type: reading
  id: "reading-constitution"
  title: "Конституція 1710 року"
  source: "Пилип Орлик (1710, адаптовано)"
  instruction: "Прочитайте уривок з першої української конституції."
  text: |
    Ми, Генеральна Старшина, кошовий отаман та все Військо Запорозьке, домовилися і постановили з ясновельможним гетьманом при його елекції, щоб у Вітчизні нашій першим і головним законом було дотримання і поширення православної віри... Якщо у ясновельможного гетьмана виникне потреба обговорити справи, що стосуються загального добра, то він має радитися з Генеральною Старшиною та полковниками, і без їхньої згоди нічого не розпочинати.
  tasks:
    - "Визначте головні гілки влади, згадані в тексті."
    - "Проаналізуйте роль Генеральної Старшини згідно з цим уривком."
    - "Поясніть, яким чином обмежувалася влада гетьмана."

- type: critical-analysis
  source_reading: "reading-constitution"
  title: "Аналіз обмеження влади"
  instruction: "Проаналізуйте наведений уривок з Конституції."
  questions:
    - "Згідно з текстом уривку, з ким гетьман зобов'язаний радитися у державних справах?"
    - "Який принцип управління закріплює цей уривок: абсолютизм чи колегіальність? Обґрунтуйте, спираючись на текст."

- type: essay-response
  title: "Значення політичної еміграції"
  instruction: "Напишіть коротке есе на задану тему."
  prompt: "Спираючись на текст модуля, поясніть, чому перша українська політична еміграція на чолі з Пилипом Орликом мала епохальне значення. Чому мазепинці не здалися після Полтавської поразки, і яких дипломатичних результатів вони намагалися досягти у Європі?"
  min_words: 150
  rubric:
    - criteria: "Аргументація"
      description: "Чітке пояснення мотивів еміграції"
      points: 5
    - criteria: "Дипломатія"
      description: "Згадка про антиросійську коаліцію та маніфести"
      points: 5

- type: true-false
  title: "Перевірте розуміння фактів"
  instruction: "Визначте, чи є наведені твердження правдивими згідно з текстом."
  items:
    - statement: "Конституція 1710 року повністю скасовувала посаду гетьмана, передаючи всю виконавчу владу Генеральній раді."
      correct: false
      explanation: "Влада гетьмана зберігалася як виконавча гілка, але суттєво обмежувалася Генеральною радою та судом."
    - statement: "Пилип Орлик походив зі старовинного шляхетського роду, який мав чеське коріння і був змушений переселитися через релігійні війни."
      correct: true
      explanation: "Його предки мали герб Новина і залишили Богемію під час гуситських воєн."
    - statement: "Російський цар Петро I радо підтримав обрання Пилипа Орлика гетьманом і запропонував йому рівноправний мирний договір."
      correct: false
      explanation: "Петро I був ворогом і пропонував амністію в обмін на зраду, яку вірний Орлик категорично відхилив."
    - statement: "Конституція Пилипа Орлика запроваджувала соціальний захист для бідних козацьких вдів та осиротілих дітей, звільняючи їх від податків."
      correct: true
      explanation: "Це був безпрецедентний вияв соціальної солідарності та відповідальності держави перед захисниками."
    - statement: "Прутський похід 1711 року завершився остаточною перемогою українців і повним звільненням всієї території Правобережжя."
      correct: false
      explanation: "Похід зазнав трагічного краху через сепаратний мир Османської імперії з Росією."
    - statement: "Маніфест під назвою Вивід прав України переконливо аргументував право української нації на власну державу мовою тогочасного права."
      correct: true
      explanation: "Це був один із найвидатніших дипломатичних документів вісімнадцятого століття."

- type: quiz
  title: "Інституції та поняття"
  instruction: "Оберіть правильну відповідь на кожне запитання."
  items:
    - question: "Яку гілку влади, згідно з текстом Конституції 1710 року, представляла Генеральна рада?"
      explanation: "Генеральна рада була наділена вищою законодавчою владою і контролювала гетьмана."
      options:
        - text: "законодавчу владу"
          correct: true
        - text: "судову владу"
          correct: false
        - text: "виконавчу владу"
          correct: false
        - text: "духовну владу"
          correct: false
    - question: "Яку високу посаду обіймав Пилип Орлик в уряді Івана Мазепи безпосередньо до свого обрання гетьманом?"
      explanation: "Орлик був Генеральним писарем, що відповідало сучасній посаді міністра закордонних справ."
      options:
        - text: "Генеральний писар"
          correct: true
        - text: "Кошовий отаман"
          correct: false
        - text: "Генеральний суддя"
          correct: false
        - text: "Київський митрополит"
          correct: false
    - question: "З якою ідеологічною метою у преамбулі Конституції активно використовувався популярний хозарський міф?"
      explanation: "Хозарський міф успішно використовувався для доведення історичної окремішності українців від московитів."
      options:
        - text: "для обґрунтування окремішності від Москви"
          correct: true
        - text: "для отримання військової допомоги від Хозарії"
          correct: false
        - text: "щоб довести своє споріднення з султаном"
          correct: false
        - text: "щоб виправдати відступ до молдавських Бендер"
          correct: false
    - question: "Де саме український гетьман Пилип Орлик провів дванадцять важких років у статусі почесного полону?"
      explanation: "З 1722 по 1734 рік Орлик був примусово інтернований у портовому місті Салоніки."
      options:
        - text: "у грецьких Салоніках"
          correct: true
        - text: "у французькому Парижі"
          correct: false
        - text: "у шведському Стокгольмі"
          correct: false
        - text: "у молдавських Яссах"
          correct: false
    - question: "Яка впливова українська політична сила несподівано і повністю підтримала кандидатуру Орлика на виборах?"
      explanation: "Запорозька Січ на чолі з кошовим отаманом Костем Гордієнком відкинула старі образи і об'єдналася з елітою."
      options:
        - text: "Запорозька Січ"
          correct: true
        - text: "Шведський парламент"
          correct: false
        - text: "Московська боярська дума"
          correct: false
        - text: "Києво-Могилянська академія"
          correct: false

- type: comparative-study
  id: "comparative-study-constitution"
  title: "Порівняльний аналіз конституцій"
  instruction: "Порівняйте політичні ідеї Пилипа Орлика з європейськими аналогами."
  items_to_compare:
    - "Конституція Пилипа Орлика (1710)"
    - "Конституція США (1787) або інший документ епохи Просвітництва"
  criteria:
    - "Принцип розподілу влади"
    - "Соціальні гарантії"
    - "Джерело легітимності влади"
  prompt: "Спираючись на матеріал модуля, проаналізуйте, у чому Конституція Орлика випередила свій час порівняно з пізнішими європейськими та американськими аналогами."
  model_answer: "Конституція 1710 року закріпила принцип розподілу влади на виконавчу (гетьман), законодавчу (Генеральна рада) та судову гілки задовго до Монтеск'є та Конституції США. Особливістю українського документа були безпрецедентні соціальні гарантії для вдів та сиріт, що робило його більш соціально орієнтованим, ніж більшість актів Просвітництва. Водночас обидві традиції ґрунтувалися на ідеї суспільного договору та обмеження абсолютизму."
