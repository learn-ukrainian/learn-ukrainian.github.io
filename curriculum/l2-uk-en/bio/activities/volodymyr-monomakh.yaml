- type: reading
  id: reading-pouchannia
  title: 'Первинне джерело: Повчання дітям'
  source: Володимир Мономах (бл. 1117)
  text: 'Лжі бережися, і п''янства, і блуду, бо в сьому душа погибає і тіло. А найбільше
    шануйте гостя... Вони бо, мимоходячи, прославлять чоловіка по всіх землях — або
    добрим, або лихим. Не забувати убогих... та вдову обороніть, не дайте більш дужим
    згубити людину. Що вмієте, того не забувайте, а чого не вмієте, того навчайтесь.

    '
  instruction: Прочитайте фрагменти з Повчання дітям Володимира Мономаха.
  tasks:
  - Визначте головні морально-етичні настанови автора.
- type: critical-analysis
  title: 'Аналіз тексту: Соціальна відповідальність володаря'
  source_reading: reading-pouchannia
  instruction: Проаналізуйте наведені цитати з джерела та дайте відповіді на запитання.
  items:
  - prompt: Згідно з текстом уривка, як автор обґрунтовує необхідність захисту слабких
      верств населення?
    model_answer: Автор закликає захищати вдів та убогих, наголошуючи на неприпустимості
      свавілля сильніших над слабшими. Це свідчить про формування концепції соціальної
      відповідальності влади.
  - prompt: Яку функцію автор Повчання підкреслює у ставленні до іноземних гостей?
    model_answer: Згідно з текстом, автор розглядає гостинність як інструмент дипломатії,
      підкреслюючи, що іноземні гості формують репутацію правителя у світі.
- type: essay-response
  title: 'Есе: Причини київського повстання 1113 року'
  instruction: Напишіть есе-роздум на основі тексту модуля.
  items:
  - prompt: Відповідно до тексту модуля, проаналізуйте соціально-економічні причини,
      що спровокували київське повстання 1113 року. Яку роль у врегулюванні конфлікту
      відіграв Устав Володимира Мономаха?
    model_answer: Згідно з текстом, повстання було спричинене економічною кризою та
      розшаруванням. Вакуум влади після смерті Святополка і невдоволення непомірними
      податками та високими лихварськими відсотками (різами) призвели до протесту
      низів. Устав Мономаха, прийнятий у відповідь, обмежив лихварські відсотки та
      захистив закупів від перетворення на холопів, що дозволило зняти соціальну напругу.
  min_words: 200
  rubric:
  - criteria: Аналіз причин
    description: Глибокий аналіз економічних передумов повстання на основі тексту.
    points: 5
  - criteria: Оцінка реформ
    description: Адекватна оцінка впливу Уставу на тогочасне суспільство.
    points: 5
- type: quiz
  title: 'Перевірте розуміння: Політична діяльність Мономаха'
  instruction: Оберіть правильну відповідь на основі тексту модуля.
  items:
  - question: Згідно з текстом модуля, який принцип управління територіями був легалізований
      на Любецькому з'їзді?
    explanation: У тексті зазначається, що на з'їзді було затверджено принцип кожен
      хай держить отчину свою, що легалізував закріплення територій за родинами.
    options:
    - text: перехід до системи закріплення вотчин за окремими князівськими родинами
      correct: true
    - text: повернення до старої системи ротації князів між великими містами
      correct: false
    - text: абсолютна монархія та жорстка централізація влади в самому Києві
      correct: false
    - text: передача всіх земель у спільну і неподільну власність київського віча
      correct: false
  - question: Як автор тексту характеризує зміну військової доктрини Володимира Мономаха
      у протистоянні з кочовиками?
    explanation: Автор підкреслює, що Мономах ініціював мобільні превентивні удари
      вглиб степу замість пасивного очікування набігів за мурами.
    options:
    - text: організація спільних превентивних походів далеко вглиб половецького степу
      correct: true
    - text: переховування за міцними мурами фортець і очікування добровільного відступу
        ворога
      correct: false
    - text: виплата кочовикам регулярної та великої данини золотом для збереження
        миру
      correct: false
    - text: наказ повністю покинути прикордонні землі та масово переселитися на північ
      correct: false
  - question: Який мотив відмови Мономаха від київського престолу у 1093 році наводиться
      в тексті модуля?
    explanation: Текст вказує, що князь добровільно поступився престолом, щоб уникнути
      кривавої міжусобної війни через порушення родового права.
    options:
    - text: бажання не провокувати міжусобну війну та дотриматися давнього родового
        права
      correct: true
    - text: цілковита відсутність підтримки серед киян і сильний страх перед містянами
      correct: false
    - text: намір зосередитися виключно на подальшому розвитку Чернігівського князівства
      correct: false
    - text: серйозний дипломатичний тиск візантійського імператора та його впливових
        послів
      correct: false
  - question: Яким чином, згідно з текстом, Устав Володимира Мономаха змінив правовий
      статус закупів?
    explanation: За текстом, статут суворо забороняв кредиторам безпідставно перетворювати
      напіввільних закупів на повних рабів (холопів).
    options:
    - text: заборона безпідставно перетворювати напіввільних закупів на безправних
        холопів
      correct: true
    - text: повне і безумовне скасування інституту рабства на території всієї Київської
        держави
      correct: false
    - text: введення жорсткої смертної кари за будь-які злочини проти фінансової еліти
      correct: false
    - text: остаточне звільнення всіх селян від сплати податків на користь державної
        скарбниці
      correct: false
  - question: Який аргумент автор модуля наводить для деконструкції міфу про Шапку
      Мономаха?
    explanation: Автор посилається на мистецтвознавчу експертизу, яка довела, що це
      золота тюбетейка чотирнадцятого століття, виготовлена в Золотій Орді.
    options:
    - text: артефакт є золотоординською тюбетейкою, виготовленою у чотирнадцятому
        столітті
      correct: true
    - text: це справжня візантійська реліквія, урочисто передана з Константинополя
        до Києва
      correct: false
    - text: це унікальна корона, виготовлена місцевими київськими майстрами-ювелірами
      correct: false
    - text: це щедрий дар від англосаксонського короля Гарольда, родича київського
        володаря
      correct: false
  - question: Як у тексті модуля пояснюється роль Юрія Долгорукого щодо збереження
      київської спадщини?
    explanation: У тексті зазначено, що лінія Долгорукого відзначилася відвертим сепаратизмом,
      заклавши основи кардинально іншої політичної культури.
    options:
    - text: він став засновником сепаратистської лінії, яка згодом ворожо ставилася
        до Києва
      correct: true
    - text: він доклав максимальних зусиль для збереження абсолютної єдності Київської
        держави
      correct: false
    - text: він добровільно передав усі свої північні землі під прямий контроль київського
        віча
      correct: false
    - text: він розгорнув широку дипломатію для інтеграції Русі з провідними країнами
        Європи
      correct: false
  - question: Яку причину називає автор тексту, пояснюючи рішення київського віча
      запросити Мономаха на престол?
    explanation: Автор вказує, що еліта шукала лідера з беззаперечним авторитетом,
      який міг би втихомирити заколотників і відновити порядок у столиці.
    options:
    - text: його беззаперечний військовий авторитет та здатність швидко відновити
        суспільний порядок
      correct: true
    - text: він залишався єдиним прямим і законним спадкоємцем київського князівського
        престолу
      correct: false
    - text: наявність у нього величезних особистих фінансів для швидкого погашення
        всіх боргів
      correct: false
    - text: його тверда обіцянка негайно перенести столицю держави до північних територій
      correct: false
  - question: Якою ключовою характеристикою автор наділяє Повчання дітям як літературний
      твір?
    explanation: У тексті підкреслюється, що це синкретичний жанр, який поєднує релігійну
      проповідь, автобіографію та звід етичних настанов.
    options:
    - text: це синкретичний твір, що поєднує автобіографію, проповідь та політичні
        настанови
      correct: true
    - text: це виключно сухий і формальний збірник кримінальних законів для місцевих
        суддів
      correct: false
    - text: це традиційний історичний літопис, створений групою анонімних придворних
        ченців
      correct: false
    - text: це витончений релігійний трактат, присвячений виключно богословським дискусіям
      correct: false
- type: true-false
  title: 'Правда чи хиба: Аналіз тексту'
  instruction: Визначте, чи відповідають наведені твердження тексту модуля.
  items:
  - statement: Згідно з текстом модуля, Любецький з'їзд відновив стару систему ротації
      князів між містами.
    correct: false
    explanation: 'Текст вказує протилежне: на Любецькому з''їзді була скасована ротація
      і проголошено принцип закріплення спадкових територій.'
  - statement: Автор стверджує, що у своєму Повчанні Мономах засуджує лінощі та закликає
      правителя до постійної активності.
    correct: true
    explanation: У тексті справді зазначається, що князь різко засуджував лінощі і
      вважав особисту участь запорукою успіху правителя.
  - statement: У тексті зазначається, що Устав Мономаха переважно регулював кримінальні
      злочини, такі як вбивства чи крадіжки.
    correct: false
    explanation: Автор підкреслює, що на відміну від попередніх законів, Устав був
      глибоко сфокусований на сфері економічних та соціальних відносин.
  - statement: Автор наводить результати мистецтвознавчої експертизи, щоб довести
      золотоординське походження Шапки Мономаха.
    correct: true
    explanation: У тексті дійсно стверджується, що експертиза підтвердила золотоординський
      генезис артефакту, спростувавши міф про Візантію.
  - statement: Згідно з текстом, київське віче не брало жодної участі у вирішенні
      соціальної кризи 1113 року.
    correct: false
    explanation: Текст стверджує, що бунт спирався на київське віче — легітимний інструмент
      демократії, яке і запросило Мономаха до столиці.
  - statement: Автор підкреслює, що шлюбна дипломатія використовувалася Мономахом
      як дієвий інструмент для гарантування безпеки кордонів.
    correct: true
    explanation: У тексті зазначається, що династичні шлюби з представниками різних
      правлячих домів були основою його стратегічної зовнішньої політики.
- type: comparative-study
  title: 'Порівняльне дослідження: Мономах і сучасники'
  instruction: Напишіть есе-порівняння, аналізуючи політику Мономаха.
  items_to_compare:
  - Підходи Володимира Мономаха
  - Підходи західноєвропейських монархів
  criteria:
  - Розв'язання соціальних конфліктів
  prompt: Порівняйте підходи Володимира Мономаха та західноєвропейських монархів до розв'язання соціальних конфліктів (наприклад, київське повстання 1113 року).
  model_answer: Мономах використовував компроміс та законодавчі реформи (Устав), тоді як західні монархи часто спиралися на жорстке військове придушення.
