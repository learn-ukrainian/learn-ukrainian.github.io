- type: reading
  id: reading-01
  title: 'Первинне джерело: Утворення Галицької митрополії'
  source: Візантійські хроніки (адаптовано)
  text: 'Оскільки єпископство Галицьке за благочестивого короля Юрія значно розширилося
    і збагатилося, Синод ухвалив піднести його до гідності митрополії, щоб воно пасло
    стадо Христове в землях Русі Малої. Митрополит Максим самовільно покинув свою
    паству, і це рішення відновило духовне управління.

    '
  tasks:
  - Чому переїзд митрополита Максима став загрозою для держави?
  - Яке значення мало використання терміна Русь Мала у цьому контексті?
- type: critical-analysis
  title: Церковний суверенітет як інструмент державної політики
  source_reading: reading-01
  items:
  - prompt: Проаналізуйте, чому Юрій I вважав за необхідне створення окремої Галицької
      митрополії замість підпорядкування існуючій церковній структурі.
    model_answer: Юрій I розумів, що підпорядкування митрополиту, який резидентував
      у Володимирі-на-Клязьмі, створювало загрозу духовної анексії та ідеологічного
      контролю з боку зовнішніх сил. Створення власної митрополії забезпечувало гармонію
      між світською та духовною владою.
- type: essay-response
  title: Символіка влади та європейський вибір
  prompt: У своїх офіційних документах Юрій I використовував титул Rex Russiae (Король
    Русі) та печатку із зображенням європейських королівських інсигній. Напишіть есе,
    у якому поясніть, як ці атрибути влади допомагали Юрію I у його дипломатичній
    діяльності та легітимізації держави на міжнародній арені.
  model_answer: Використання титулу Rex Russiae та латинської мови було чітким політичним
    сигналом для католицької Європи. Це виводило Королівство Русі з розряду удільних
    князівств на рівень повноцінних європейських монархій. Такі атрибути забезпечували
    дипломатичний захист, оскільки напад на законного короля вважався порушенням міжнародного
    права. Крім того, це дозволяло укладати рівноправні союзи з європейськими сусідами,
    як-от з Тевтонським орденом, демонструючи незалежність від Золотої Орди.
  min_words: 300
  rubric:
  - criteria: Аналіз титулатури
    description: Здобувач пояснює політичне значення титулу короля.
    points: 5
  - criteria: Міжнародний контекст
    description: Здобувач пов'язує використання інсигній з дипломатичними успіхами
      короля.
    points: 5
- type: comparative-study
  title: 'Порівняльний аналіз стратегій: Юрій I та Лев Данилович'
  items_to_compare:
  - Дипломатична політика Юрія I Львовича
  - Військова експансія Лева I Даниловича
  criteria:
  - Ставлення до Золотої Орди
  - Методи вирішення конфліктів із сусідами
  - Вплив на економічний розвиток держави
  prompt: Порівняйте політичні підходи Юрія I та його батька Лева Даниловича. Яка
    з цих стратегій виявилася більш ефективною для зміцнення Королівства Русі?
  model_answer: Лев I покладався переважно на військову силу та часті союзи з татарами,
    що призводило до руйнування власних земель та виснаження економіки. Натомість
    Юрій I обрав шлях дипломатії, системи стримувань (союз із Тевтонським орденом
    проти Литви) та політичного балансування. Він дистанціювався від Орди, платячи
    лише мирний відкуп. Ця зміна парадигми дозволила забезпечити тривалий мир, стимулювати
    урбанізацію та транзитну торгівлю, що зробило стратегію Юрія I значно ефективнішою
    для розбудови інституційної держави.
- type: quiz
  title: 'Перевірка фактичних знань: Епоха Юрія I'
  items:
  - question: Яке місто Юрій I Львович зробив головною резиденцією та адміністративним
      центром Королівства Русі?
    explanation: Юрій I переніс столицю до Володимира, який був географічним центром
      держави та мав лояльне боярство.
    options:
    - text: Володимир
      correct: true
    - text: Галич
      correct: false
    - text: Львів
      correct: false
    - text: Холм
      correct: false
  - question: Який міжнародний союз був укладений Юрієм I для протидії литовській
      військовій експансії?
    explanation: Юрій I уклав стратегічний союз із Тевтонським орденом, щоб змусити
      литовців воювати на два фронти.
    options:
    - text: союз із Тевтонським орденом
      correct: true
    - text: союз із Золотою Ордою
      correct: false
    - text: союз із Московським князівством
      correct: false
    - text: союз із Візантійською імперією
      correct: false
  - question: Яка подія стала безпосередньою причиною початку кампанії за створення
      окремої Галицької митрополії?
    explanation: Переїзд митрополита Максима до Владимира-на-Клязьмі у 1299 році змусив
      Юрія I діяти для захисту церкви.
    options:
    - text: переїзд митрополита до Владимира-на-Клязьмі
      correct: true
    - text: руйнування Києва монгольськими військами
      correct: false
    - text: конфлікт із Константинопольським патріархом
      correct: false
    - text: прийняття королівського титулу Юрієм I
      correct: false
  - question: Як у латиномовних документах того часу офіційно називалася держава під
      владою Юрія I Львовича?
    explanation: В офіційних документах та на печатці держава іменувалася як Королівство
      Русі (Regnum Russiae).
    options:
    - text: Королівство Русі
      correct: true
    - text: Галицько-Волинське князівство
      correct: false
    - text: Мала Русь
      correct: false
    - text: Південно-Західна Русь
      correct: false
  - question: Що було зображено на реверсі (зворотній стороні) великої печатки короля
      Юрія I Львовича?
    explanation: На реверсі був зображений озброєний вершник із щитом, на якому містилося
      найдавніше зображення галицького лева.
    options:
    - text: озброєний вершник із левом на щиті
      correct: true
    - text: король, який сидить на готичному троні
      correct: false
    - text: двоголовий орел візантійського зразка
      correct: false
    - text: Константинопольський патріарх Афанасій
      correct: false
  - question: У якому році була офіційно заснована незалежна Галицька митрополія за
      згодою Константинополя?
    explanation: Галицька митрополія була утворена у 1303 році, що стало великою дипломатичною
      перемогою Юрія I.
    options:
    - text: у тисяча триста третьому році
      correct: true
    - text: у тисяча двісті дев'яносто дев'ятому році
      correct: false
    - text: у тисяча триста п'ятнадцятому році
      correct: false
    - text: у тисяча двісті п'ятдесят третьому році
      correct: false
  - question: З якою європейською державою був пов'язаний Юрій I Львович через походження
      своєї матері Констанції?
    explanation: Мати Юрія I, Констанція, була донькою угорського короля Бели IV з
      династії Арпадів.
    options:
    - text: з Угорським королівством
      correct: true
    - text: з Польським королівством
      correct: false
    - text: з Чеським королівством
      correct: false
    - text: з Французьким королівством
      correct: false
  - question: Яка торговельна магістраль відігравала ключову роль в економічному розквіті
      держави за Юрія I?
    explanation: Балтійсько-Чорноморський шлях, що проходив через Володимир і Львів,
      приносив державі величезні митні прибутки.
    options:
    - text: Балтійсько-Чорноморський транзитний шлях
      correct: true
    - text: шлях із варягів у греки по Дніпру
      correct: false
    - text: Великий шовковий шлях зі Сходу
      correct: false
    - text: шлях Святого Якова до Іспанії
      correct: false
  instruction: Оберіть правильну відповідь.
