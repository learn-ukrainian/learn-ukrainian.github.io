- type: reading
  id: reading-vyshnevetsky-chronicle
  title: 'Первинне джерело: Свідчення про страту'
  source: Мартин Бєльський, Хроніка польська
  text: 'Вишневецький, знаменитий воїн... повішений на гаку, провисів три дні живий,
    і коли проклинав Магомета, убитий стрілами.

    '
  tasks:
  - Охарактеризуйте ставлення хроніста до Вишневецького на основі цієї цитати.
  - Чому османська влада обрала саме такий спосіб покарання?
- type: critical-analysis
  source_reading: reading-vyshnevetsky-chronicle
  title: Аналіз історичного джерела
  items:
  - prompt: Проаналізуйте наведену цитату Мартина Бєльського. Як контраст між фізичними
      муками та духовною непокорою формує міфологізований образ героя фронтиру?
    model_answer: Цитата фіксує момент переходу історичної особистості в міф. Фізичні
      страждання підкреслюють жорстокість протистояння на Великому Кордоні, тоді як
      незламність Вишневецького стає свідченням абсолютної зневаги до ворога. Цей
      контраст є проявом лицарського етосу, де духовна перемога над смертю важливіша
      за фізичне виживання.
- type: reading
  id: reading-myth-vs-reality
  title: Історіографічний парадокс Вишневецького
  text: 'З одного боку, ми маємо представника найвищої магнатської еліти, тобто того
    соціального класу, який у наступні століття стане головним антагоністом козацького
    руху. З іншого боку, саме цей князь-олігарх беззаперечно визнається батьком-засновником
    Запорозької Січі та абсолютним символом козацької демократії. Вишневецький зумів
    інтегрувати свою аристократичну харизму в егалітарну військову спільноту, ставши
    для козаків не паном, а ватажком.

    '
  tasks:
  - Як елітарне походження Вишневецького вплинуло на його роль у козацтві?
  - У чому полягає історіографічний парадокс його постаті?
- type: essay-response
  source_reading: reading-myth-vs-reality
  title: 'Есе: Від магната до козацького ідеалу'
  items:
  - prompt: Спираючись на текст і знання епохи Великого Кордону, поясніть, чому українське
      козацтво прийняло як свого лідера представника вищої магнатської еліти. Як це
      спростовує імперський міф про виключно селянське походження козацтва?
    model_answer: Прийняття Вишневецького козаками зумовлене специфікою Великого Кордону,
      де особиста доблесть та військовий досвід важили більше за соціальне походження.
      Вишневецький запропонував степовикам не феодальну залежність, а військове побратимство.
      Це доводить, що козацтво від початку формувалося за активної участі місцевої
      еліти, яка свідомо йшла в степ для захисту кордонів, що повністю руйнує міф
      про козацтво як про неорганізований бунт збіднілих селян.
  min_words: 300
  rubric:
  - criteria: Історична аргументація
    description: Наявність чітких аргументів щодо елітарного походження козацтва.
    points: 40
  - criteria: Аналіз парадоксу
    description: Глибоке розуміння того, як аристократ став ватажком егалітарної спільноти.
    points: 40
  - criteria: Стилістика та мова
    description: Використання академічної лексики.
    points: 20
- type: comparative-study
  title: 'Порівняльний аналіз: Вишневецький та Сагайдачний'
  items_to_compare:
  - Дмитро Вишневецький
  - Петро Конашевич-Сагайдачний
  criteria:
  - Тип лідерства та стратегія поведінки
  - Ставлення до імперій та державних структур
  - Головний історичний внесок
  prompt: Порівняйте дві парадигми козацького лідерства, які уособлюють Дмитро Вишневецький
    та Петро Сагайдачний. Проаналізуйте еволюцію стратегії Війська Запорозького.
  model_answer: Вишневецький уособлює парадигму лицаря-авантюриста, який діяв шляхом
    прямої конфронтації, заклавши фундамент козацької незалежності на Хортиці. Натомість
    Сагайдачний представляє модель політика-державника, орієнтованого на дипломатію
    та системну співпрацю з Річчю Посполитою. Він використовував військову потугу
    козацтва для отримання легальних поступок, що свідчить про еволюцію козацтва від
    розрізнених ватаг до потужного політичного інституту.
- type: quiz
  title: Перевірте розуміння біографії
  items:
  - question: До якого видатного магнатського роду належав Дмитро Вишневецький за
      своїм походженням?
    explanation: Він походив з роду Корібутовичів, які вели свій родовід від литовського
      князя Гедиміна.
    options:
    - text: до роду Корібутовичів
      correct: true
    - text: до роду Острозьких
      correct: false
    - text: до роду Заславських
      correct: false
    - text: до роду Сангушків
      correct: false
  - question: Яке з наведених значень найкраще розкриває етимологію народного прізвиська
      Байда?
    explanation: Байда походить від дієслова байдукувати (жити вільно) або означає
      вид дерев'яного човна.
    options:
    - text: вільна людина або швидкий човен
      correct: true
    - text: жорстокий та безжальний воїн
      correct: false
    - text: шляхетний та заможний лицар
      correct: false
    - text: мудрий та розважливий політик
      correct: false
  - question: Яку головну стратегічну функцію мала виконувати збудована на Малій Хортиці
      фортеця?
    explanation: Фортеця створювалася як передова наступальна база у глибокому тилу
      ворога.
    options:
    - text: бути передовою наступальною базою
      correct: true
    - text: захищати королівський двір у Кракові
      correct: false
    - text: контролювати збирання податків на Волині
      correct: false
    - text: забезпечувати безпечну торгівлю з турками
      correct: false
  - question: Якою була головна причина переходу Дмитра Вишневецького на службу до
      Івана IV?
    explanation: Це був прагматичний крок для отримання ресурсів, оскільки Литва не
      підтримувала війну з татарами.
    options:
    - text: потреба у ресурсах для боротьби з Ордою
      correct: true
    - text: щире бажання прийняти московське підданство
      correct: false
    - text: намагання сховатися від гніву польського короля
      correct: false
    - text: релігійний конфлікт із католицькою церквою
      correct: false
  - question: Чому князь Дмитро Вишневецький розірвав свій союз із московським царем
      Іваном Грозним?
    explanation: Москва змінила пріоритети, зосередившись на Лівонській війні, і припинила
      фінансування південного фронту.
    options:
    - text: через зміну геополітичних пріоритетів Москви
      correct: true
    - text: через нищівну поразку козаків під Азовом
      correct: false
    - text: через гострий конфлікт із донськими козаками
      correct: false
    - text: через таємну мирну угоду з турецьким султаном
      correct: false
  - question: Яка трагічна подія призвела до полону Дмитра Вишневецького у 1563 році?
    explanation: Його зрадили молдовські бояри під час походу на Сучаву і видали османському
      султану.
    options:
    - text: підступна зрада місцевих бояр у Молдові
      correct: true
    - text: поразка у відкритому бою з татарською ордою
      correct: false
    - text: бунт серед його власних козацьких загонів
      correct: false
    - text: раптовий напад яничарів на фортецю Хортиця
      correct: false
  - question: Яким саме жахливим способом було страчено князя Дмитра Вишневецького
      у місті Стамбулі?
    explanation: За наказом султана його скинули на залізний гак, де він висів три
      дні.
    options:
    - text: його скинули з башти на залізний гак
      correct: true
    - text: його публічно спалили на міській площі
      correct: false
    - text: його стратили через публічне відсікання голови
      correct: false
    - text: його таємно отруїли у в'язниці Едікуле
      correct: false
  - question: Кого з видатних гетьманів автор тексту протиставляє Вишневецькому як
      приклад політика-державника?
    explanation: Вишневецького порівнюють із Сагайдачним, який обрав шлях дипломатії
      та інституційної розбудови.
    options:
    - text: Петра Конашевича-Сагайдачного
      correct: true
    - text: Богдана Хмельницького
      correct: false
    - text: Івана Мазепу
      correct: false
    - text: Пилипа Орлика
      correct: false
  instruction: Оберіть правильну відповідь.
