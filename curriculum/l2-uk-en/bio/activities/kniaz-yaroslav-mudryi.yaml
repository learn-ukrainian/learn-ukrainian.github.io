- type: reading
  id: reading-yaroslav-testament
  title: Уривок із заповіту синам (1054 рік)
  source: Адаптовано за "Повістю врем'яних літ"
  text: Ось я відходжу зі світу сього. А ви, сини мої, майте межи собою любов, бо
    ви єсте брати від одного батька і однієї матері. І якщо будете жити в любові межи
    собою, Бог буде у вас і підкорить вам ворогів. А якщо будете жити в ненависті,
    у роздорах і сварках, то й самі загинете, і землю батьків своїх і дідів погубите,
    що її надбали вони трудом великим. Тож слухайтесь брат брата, живіть мирно. Тепер
    же поручаю я замість себе стіл свій найстаршому синові моєму Ізяславу. Слухайтесь
    його, як слухались мене, хай він буде вам замість мене. А Святославу даю Чернігів,
    а Всеволоду — Переяслав, а Ігорю — Володимир, а В'ячеславу — Смоленськ.
  tasks:
  - Прочитайте текст заповіту та проаналізуйте запропоновану модель влади.
- type: critical-analysis
  title: Аналіз політичного заповіту
  source_reading: reading-yaroslav-testament
  target_text: Інструкція Ярослава синам щодо престолонаслідування.
  items:
  - prompt: Проаналізуйте фразу "землю батьків своїх... що її надбали вони трудом
      великим". Як це характеризує ставлення Ярослава до держави?
    model_answer: 'Ця фраза свідчить про зміну сприйняття держави: від "території
      для збору данини" до "спільної спадщини", яку треба берегти. Ярослав апелює
      до відповідальності перед предками ("дідами"), перетворюючи владу з права сильного
      на священний обов''язок. Держава стає не просто ресурсом, а цінністю, інвестицією
      ("трудом великим"), яку легко втратити через внутрішні чвари.'
  - prompt: Ярослав наказує молодшим братам слухатися Ізяслава "як мене". У чому полягала
      системна помилка цього наказу в контексті середньовічної психології?
    model_answer: Системна помилка полягала в тому, що авторитет Ярослава був особистим
      і харизматичним ("батьківським"), а авторитет Ізяслава — лише формальним ("старший
      брат"). У середньовіччі влада трималася на особистій силі та повазі дружини.
      Брати, які мали свої власні дружини і ресурси (Чернігів, Переяслав), не відчували
      сакрального пієтету перед братом, рівним їм по крові. Спроба замінити батьківський
      авторитет братнім була приречена на провал без жорсткого механізму примусу.
- type: essay-response
  title: 'Есе: Європейський вектор'
  prompt: 'Історики часто називають Ярослава "тестем Європи". Напишіть есе, в якому
    доведіть або спростуйте тезу: "Шлюбна дипломатія Ярослава була ефективнішим інструментом
    безпеки, ніж будівництво Змієвих валів".'
  min_words: 250
  rubric:
  - criteria: Аналіз інструментів
    description: Порівняння "м'якої сили" (шлюби) та "жорсткої сили" (фортифікації).
    points: 40
  - criteria: Історичні приклади
    description: Згадка конкретних шлюбів (Анна, Єлизавета, Ізяслав) та їхніх наслідків.
    points: 30
  - criteria: Контекст
    description: Розуміння тогочасної геополітики (союз з Польщею, Францією).
    points: 30
  model_answer: Шлюбна дипломатія Ярослава ("м'яка сила") була стратегічно більш далекоглядною,
    ніж суто військові укріплення, хоча обидва інструменти працювали в комплексі.
    Змієві вали захищали лише від степовиків (печенігів), але були безсилі проти західних
    сусідів (Польщі, Угорщини). Натомість династичні шлюби (зокрема з польською принцесою
    Гертрудою) перетворили вчорашніх ворогів на союзників, гарантуючи мир на західному
    кордоні на десятиліття. Шлюб Анни з Генріхом I ввів Русь у "вищу лігу" європейської
    політики, легітимізуючи київську династію як рівну Капетингам. Це дало Русі статус
    суб'єкта, а не об'єкта міжнародних відносин. Вали могли стримати набіг, але лише
    династичні зв'язки могли запобігти великій війні коаліцій.
- type: comparative-study
  title: 'Батько і Син: Дві моделі влади'
  items_to_compare:
  - Володимир Великий (Хреститель)
  - Ярослав Мудрий (Будівничий)
  criteria:
  - Легітимація влади
  - Методи експансії
  - Культурна політика
  prompt: Порівняйте моделі правління Володимира та Ярослава. Як змінився вектор розвитку
    держави від "героїчного" періоду батька до "бюрократичного" періоду сина?
  model_answer: 'Володимир уособлював етап екстенсивного росту та "героїчної" експансії:
    він хрестив Русь вогнем і мечем, його влада трималася на харизмі завойовника і
    сакральному акті вибору віри. Ярослав же представляв етап інтенсивного розвитку
    та стабілізації ("бюрократичний"). Він замінив право сили писаним законом ("Руська
    Правда"), а усну традицію — книжковою культурою (бібліотека, скрипторій). Якщо
    Володимир будував державу "вшир" (приєднання земель), то Ярослав — "вглиб" (будівництво
    міст, храмів, кодифікація права). Володимир дав Русі нову форму (християнство),
    а Ярослав наповнив її змістом (освіта, закон, мистецтво).'
- type: quiz
  title: Епоха Ярослава
  items:
  - question: Яка основна мета укладання "Руської Правди"?
    explanation: '"Руська Правда" виникла як компроміс між князем і новгородцями,
      щоб врегулювати конфлікти між варягами та місцевим населенням і замінити кровну
      помсту штрафами.'
    options:
    - text: врегулювання конфліктів через штрафи
      correct: true
    - text: запровадження християнства
      correct: false
    - text: оголошення війни Візантії
      correct: false
    - text: поділ земель між синами
      correct: false
  - question: Що означав титул "каган", який вживали стосовно Ярослава?
    explanation: Титул "каган" був претензією на імперську гідність, рівну хозарським
      правителям, і підкреслював незалежність від Візантії.
    options:
    - text: претензія на імперський статус
      correct: true
    - text: залежність від Хазарії
      correct: false
    - text: прийняття іудаїзму
      correct: false
    - text: військове звання
      correct: false
  - question: Яка подія відбулася в 1036 році?
    explanation: У 1036 році Ярослав остаточно розгромив печенігів під Києвом, що
      поклало край їхнім набігам, і став єдиновладним правителем після смерті брата
      Мстислава.
    options:
    - text: розгром печенігів і об'єднання Русі
      correct: true
    - text: битва на Альті
      correct: false
    - text: смерть Володимира Великого
      correct: false
    - text: заснування Софії Київської
      correct: false
  - question: У чому суть принципу сеньйорату (лествичного права)?
    explanation: Влада передавалася старшому в роду (від брата до брата), а не від
      батька до сина, що мало б зберегти єдність династії.
    options:
    - text: передача влади від брата до брата
      correct: true
    - text: вибори князя на віче
      correct: false
    - text: передача влади старшому сину
      correct: false
    - text: призначення наступника церквою
      correct: false
  - question: Яку роль відіграла Анна Ярославна у Франції?
    explanation: Анна стала королевою Франції, матір'ю короля Філіппа I і регенткою,
      принісши високу культуру (грамотність) у французький двір.
    options:
    - text: королева Франції і регентка
      correct: true
    - text: засновниця Сорбонни
      correct: false
    - text: лікарка при дворі
      correct: false
    - text: настоятелька монастиря
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: Історичний детектив
  items:
  - statement: Ярослав Мудрий був кульгавим від народження або через поранення.
    correct: true
    explanation: Дослідження останків підтвердило хворобу Пертеса і перелом, що робило
      його "хромцем".
  - statement: Софійський собор був збудований виключно візантійськими майстрами за
      точним планом собору в Константинополі.
    correct: false
    explanation: Софія Київська має унікальні риси (багатоглав'я, галереї), нетипові
      для візантійської архітектури, хоча будували її греки.
  - statement: Руська Правда повністю скасувала смертну кару.
    correct: true
    explanation: Руська Правда не передбачала смертної кари, замінюючи її грошовими
      штрафами (вірою) або вигнанням ("поток і розграблення").
  - statement: Митрополит Іларіон був греком, надісланим з Константинополя.
    correct: false
    explanation: Іларіон був першим митрополитом-русином, обраним собором єпископів
      за наказом Ярослава без згоди Константинополя.
  - statement: Ярослав Мудрий особисто брав участь у битві під Лиственом проти Мстислава.
    correct: false
    explanation: У битві під Лиственом військом Ярослава керували варязькі найманці
      (Якун), а сам Ярослав спостерігав.
  - statement: Бібліотека Ярослава Мудрого була знайдена у 1934 році в Межигір'ї.
    correct: false
    explanation: Сліди бібліотеки досі не знайдені, це одна з найбільших загадок української
      археології.
  - statement: Саркофаг Ярослава в Софії Київській зараз порожній або містить чужі
      останки.
    correct: true
    explanation: Останнє відкриття саркофагу показало наявність лише жіночого кістяка;
      мощі Ярослава, ймовірно, вивезені до США.
  - statement: Ярослав запровадив карбування перших руських монет — златників і срібників.
    correct: false
    explanation: Першим почав карбувати монети Володимир Великий, хоча Ярослав продовжив
      цю практику (срібники Ярослава).
  - statement: Анна Ярославна підписувала документи кирилицею.
    correct: true
    explanation: Зберігся підпис "Aina Regina" (або кириличний аналог) на грамоті,
      що свідчить про її грамотність.
  - statement: Ярослав помер у Києві на престолі.
    correct: false
    explanation: Ярослав помер у своїй резиденції у Вишгороді, неподалік Києва.
  instruction: Визначте, чи твердження правильне.
