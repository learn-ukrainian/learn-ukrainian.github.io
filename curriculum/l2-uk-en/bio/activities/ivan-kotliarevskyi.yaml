- type: reading
  id: reading-eneida-excerpt
  title: "Первинне джерело: Енеїда (уривок)"
  source: "Іван Котляревський (1798)"
  text: |
    Еней був парубок моторний
    І хлопець хоть куди козак,
    Удавсь на всеє зле проворний,
    Завзятіший од всіх бурлак.
    Но греки, як спалили Трою,
    Зробили з неї скирту гною,
    Він, взявши торбу, тягу дав;
    Забравши деяких троянців,
    Осмалених, як гиря, ланців,
    П'ятами з Трої накивав.
  tasks:
    - "Як автор характеризує головного героя у перших рядках?"
    - "Якими постають троянці після падіння Трої?"

- type: critical-analysis
  title: "Аналіз: Троянці як алегорія козацтва"
  source_reading: reading-eneida-excerpt
  target_text: |
    Еней був парубок моторний
    І хлопець хоть куди козак...
    Він, взявши торбу, тягу дав...
  questions:
    - "Які соціальні та історичні конотації містить слово 'козак' у контексті античного міфу?"
    - "Яку функцію виконує знижена, бурлескна лексика в описі трагічних подій?"
  model_answers:
    - "Слово 'козак' одразу переносить античного героя в український історичний контекст, перетворюючи Енея на алегорію запорожця після зруйнування Січі."
    - "Бурлескна лексика знімає пафос класицистичної трагедії, перетворюючи втечу на життєствердний акт виживання, характерний для народного світогляду."
  focus_points:
    - "Алегорія та історичний контекст"
    - "Бурлеск та травестія як стилістичні прийоми"

- type: reading
  id: reading-shevchenko-elegy
  title: "Первинне джерело: На вічну пам'ять Котляревському"
  source: "Тарас Шевченко (1838)"
  text: |
    Будеш, батьку, панувати,
    Поки живуть люди;
    Поки сонце з неба сяє,
    Тебе не забудуть!
    Всюди слава прогриміла —
    Слава України,
    З тебе, батьку, почалася
    Скрізь по всій країні.
  tasks:
    - "Який статус надає Шевченко Котляревському у своєму вірші?"
    - "З чим асоціюється слава письменника в поезії?"

- type: essay-response
  title: "Есе: Формування літературного канону"
  source_reading: reading-shevchenko-elegy
  prompt: "Спираючись на текст модуля та уривок з вірша Тараса Шевченка, проаналізуйте, чому саме Іван Котляревський вважається 'батьком' нової української літератури. Розгляньте його мовний маніфест, демократизм творчості та легітимізацію народної мови."
  min_words: 250
  model_answer: "Іван Котляревський здійснив культурну революцію, легітимізувавши живу народну мову як інструмент великої літератури. Відійшовши від барокової книжної традиції, він створив поему, яка стала енциклопедією українського життя та своєрідним сейфом історичної пам'яті. Шевченко у своїй елегії закріплює за ним статус 'батька', визнаючи його фундатором нової парадигми, де література служить народові, зберігаючи його ідентичність в умовах імперського тиску."
  rubric:
    - criteria: "Аргументація та аналіз"
      description: "Глибоке розуміння ролі письменника у становленні нової літератури."
      points: 10
    - criteria: "Використання термінології"
      description: "Доречне використання понять: травестія, легітимізація, народна мова."
      points: 10

- type: quiz
  title: "Перевірте знання: Життя і творчість"
  instruction: "Оберіть правильну відповідь на основі тексту модуля."
  items:
    - question: "Згідно з текстом, чому 1798 рік вважається точкою відліку нової української літератури?"
      explanation: "У цьому році вийшли перші три частини Енеїди, написані живою народною мовою."
      options:
        - text: "Вийшли перші три частини Енеїди"
          correct: true
        - text: "Котляревський вступив до семінарії"
          correct: false
        - text: "Було відкрито Полтавський театр"
          correct: false
        - text: "Відбулася прем'єра Наталки Полтавки"
          correct: false
    - question: "Як автор модуля пояснює вибір полтавського говору для створення літературної мови?"
      explanation: "Полтавщина була осередком чистого українського мовлення, що не зазнало значного впливу сусідніх мов."
      options:
        - text: "Полтавщина була осередком чистого українського мовлення"
          correct: true
        - text: "Цей говір був найпоширенішим у всій імперії"
          correct: false
        - text: "Автор не знав жодного іншого українського діалекту"
          correct: false
        - text: "Так вимагала тодішня імперська цензура"
          correct: false
    - question: "Яку паралель, за текстом модуля, проводить письменник між троянцями та українською історією?"
      explanation: "Троянці, що втратили батьківщину, є алегорією запорозьких козаків після руйнування Січі."
      options:
        - text: "Троянці є алегорією запорозьких козаків"
          correct: true
        - text: "Троянці символізують античних філософів"
          correct: false
        - text: "Він порівнює їх із російськими чиновниками"
          correct: false
        - text: "Троянці відображають полтавських поміщиків"
          correct: false
    - question: "У тексті автор характеризує Возного Тетерваковського. Яку функцію виконує його мова?"
      explanation: "Суміш канцеляризмів і старослов'янізмів Возного є сатирою на неприродність імперської бюрократії."
      options:
        - text: "Підкреслює неприродність імперської бюрократії"
          correct: true
        - text: "Демонструє високу освіченість персонажа"
          correct: false
        - text: "Відображає справжню мову полтавських селян"
          correct: false
        - text: "Створює трагічний образ приреченого героя"
          correct: false
    - question: "Як військовий досвід письменника, згідно з текстом, вплинув на зміст Енеїди?"
      explanation: "Котляревський використав військову термінологію та тактику українських козаків для реалістичного опису батальних сцен."
      options:
        - text: "Забезпечив реалістичний опис батальних сцен і військової тактики"
          correct: true
        - text: "Змусив автора повністю відмовитися від гумору в поемі"
          correct: false
