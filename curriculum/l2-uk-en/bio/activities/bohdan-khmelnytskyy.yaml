- type: reading
  id: reading-kyiv-speech
  title: 'Первинне джерело: Програма національного визволення'
  source: Богдан Хмельницький, переговори в Києві (1648)
  text: 'Виб''ю з лядської неволі руський нарід увесь! Перше я за свою шкоду і кривду
    воював, тепер буду воювати за нашу православну віру! [...] Ставши над Віслою,
    скажу дальшим ляхам: сидіть і мовчіть, ляхи!

    '
  tasks:
  - Проаналізуйте зміну мотивації гетьмана порівняно з початком повстання.
  - Які географічні та етнічні межі нової держави окреслює Хмельницький у цій промові?
- type: critical-analysis
  source_reading: reading-kyiv-speech
  title: Аналіз еволюції політичної доктрини
  target_text: Перше я за свою шкоду і кривду воював, тепер буду воювати за нашу православну
    віру!
  questions:
  - Як ця фраза ілюструє перехід від станового мислення до національно-державного?
  - Чому релігійний фактор став ключовим ідеологічним інструментом мобілізації?
  model_answers:
  - Ця фраза фіксує переломний момент, коли приватна помста перетворюється на усвідомлену
    боротьбу за права всього народу, обєднаного релігійною та етнічною ідентичністю.
  - Православна віра була єдиним спільним знаменником для розрізнених станів (селян,
    козаків, міщан, шляхти) в умовах католицької експансії Речі Посполитої.
  focus_points:
  - Політична еволюція
  - Ідеологічна мобілізація
- type: reading
  id: reading-pereyaslav
  title: 'Історичний контекст: Зіткнення менталітетів у Переяславі'
  source: Реконструкція дипломатичного діалогу (1654)
  text: '— Ми, старшина Війська Запорозького, готові скласти присягу на вірність цареві,
    але вимагаємо, щоб і ви, боярине Василь Бутурлін, як посол, присягнули від імені
    царя зберігати наші вольності та права.

    — У Московській державі такого звичаю ніколи не було і не буде! Великий государ
    є самодержцем, він своїм підданим не присягає.

    '
  tasks:
  - У чому полягала принципова різниця в політичній культурі козаків і московитів?
- type: essay-response
  source_reading: reading-pereyaslav
  title: 'Есе: Сутність Переяславської ради'
  prompt: Спираючись на наведений діалог та матеріали модуля, проаналізуйте Переяславську
    угоду 1654 року. Як відрізнялося розуміння союзу козацькою елітою та московською
    стороною?
  min_words: 250
  model_answer: Козацька старшина розглядала угоду як контрактний військовий союз
    (протекторат), де обидві сторони мають зобовязання. Вимога взаємної присяги була
    нормою європейської політичної традиції. Натомість московські посли транслювали
    парадигму абсолютного самодержавства, де цар не має жодних юридичних зобовязань
    перед підданими. Цей ментальний розрив заклав фундамент для подальшого поглинання
    української автономії.
  rubric:
  - criteria: Аналіз менталітетів
    description: Розкриття різниці між контрактною традицією та самодержавством.
    points: 5
  - criteria: Історичні наслідки
    description: Оцінка впливу цієї різниці на подальшу долю Гетьманщини.
    points: 5
- type: comparative-study
  source_reading: reading-kyiv-speech
  title: 'Порівняльний аналіз: Хмельницький та Кромвель'
  items_to_compare:
  - Богдан Хмельницький (Українська революція)
  - Олівер Кромвель (Англійська революція)
  criteria:
  - Роль релігійного фактора в мобілізації армії
  - Форма правління створеної держави
  - Створення нової військової еліти
  prompt: Порівняйте діяльність Богдана Хмельницького та Олівера Кромвеля. Що спільного
    в їхніх методах досягнення політичної субєктності?
  model_answer: Обидва лідери очолили масштабні збройні повстання в середині XVII
    століття. Вони спиралися на глибоке релігійне почуття своїх прихильників (православні
    та пуритани) як на головний мобілізаційний ресурс. І Хмельницький, і Кромвель
    створили потужні, дисципліновані армії нового типу та республіканські інституції
    на руїнах старих систем (Речі Посполитої та Англійської монархії). Водночас обидва
    стикалися з проблемою легітимізації влади та передачі її у спадок.
- type: quiz
  title: Життя та політична спадщина Богдана Хмельницького
  items:
  - question: Який навчальний заклад забезпечив Богдану Хмельницькому елітну європейську
      освіту та знання латини?
    explanation: Богдан Хмельницький здобув освіту в одному з єзуїтських колегіумів
      (найімовірніше у Львові або Ярославі), де досконало опанував латину.
    options:
    - text: Єзуїтський колегіум
      correct: true
    - text: Києво-Могилянська академія
      correct: false
    - text: Краківський університет
      correct: false
    - text: Острозька академія
      correct: false
  - question: Яка подія стала особистим каталізатором, що підштовхнув Хмельницького
      до збройного повстання проти Речі Посполитої?
    explanation: Свавільний наїзд Данила Чаплинського на Суботів і неможливість знайти
      справедливість у судах стали іскрою для повстання.
    options:
    - text: Напад підстарости Чаплинського на родинний маєток
      correct: true
    - text: Полон під час трагічної Цецорської битви
      correct: false
    - text: Зрада кримського хана в битві під Берестечком
      correct: false
    - text: Відмова короля видати йому Золоту шаблю
      correct: false
  - question: Що передбачав полково-сотенний устрій, запроваджений Богданом Хмельницьким
      у Гетьманщині?
    explanation: Полково-сотенний устрій базувався на принципі, за яким полковник
      або сотник був одночасно і військовим командиром, і керівником території.
    options:
    - text: Повне злиття військової та цивільної адміністративної влади
      correct: true
    - text: Відокремлення судів від військового керівництва
      correct: false
    - text: Передачу всієї влади православним єпископам
      correct: false
    - text: Збереження польського адміністративного поділу на воєводства
      correct: false
  - question: Як сучасна українська історіографія трактує сутність Переяславської
      угоди 1654 року?
    explanation: З точки зору права XVII століття, це був договір про протекторат,
      що зберігав широку внутрішню автономію Гетьманщини.
    options:
    - text: Як тимчасовий військово-політичний союз та протекторат
      correct: true
    - text: Як акт добровільного і вічного воззєднання народів
      correct: false
    - text: Як повну капітуляцію Війська Запорозького перед Москвою
      correct: false
    - text: Як входження українських земель до складу Московського царства
      correct: false
  - question: Яка подія спонукала Хмельницького розпочати формування нової антипольської
      коаліції зі Швецією та Трансільванією?
    explanation: Віленське перемиря 1656 року, укладене без участі козаків, стало
      шоком для гетьмана і змусило його шукати нових союзників.
    options:
    - text: Сепаратне Віленське перемиря між Москвою та Річчю Посполитою
      correct: true
    - text: Підписання тяжкого Білоцерківського миру
      correct: false
    - text: Поразка козацького війська в битві під Берестечком
      correct: false
    - text: Смерть старшого сина Тимоша Хмельницького у Молдавії
      correct: false
  - question: Яку назву мав офіційний державний акт або маніфест, який видавався Богданом
      Хмельницьким?
    explanation: Головним інструментом політики гетьмана та формою державного акта
      був універсал.
    options:
    - text: універсал
      correct: true
    - text: конституція
      correct: false
    - text: супліка
      correct: false
    - text: декрет
      correct: false
  - question: Який грандіозний геополітичний проект передбачала Раднотська угода 1656
      року?
    explanation: Раднотська коаліція мала на меті ліквідацію Речі Посполитої, за якою
      Військо Запорозьке мало стати повністю незалежною державою.
    options:
    - text: Повний демонтаж Речі Посполитої та її поділ між союзниками
      correct: true
    - text: Створення спільної українсько-московської держави
      correct: false
    - text: Обєднання Гетьманщини з Османською імперією
      correct: false
    - text: Передачу Правобережної України під владу Швеції
      correct: false
  - question: Який титул Богдан Хмельницький остаточно закріпив за собою, надавши
      йому рис суверенного правителя?
    explanation: Хмельницький формалізував свою владу під титулом гетьмана Війська
      Запорозького, зосередивши в руках усю повноту державної влади.
    options:
    - text: Гетьман Війська Запорозького
      correct: true
    - text: Король Русі
      correct: false
    - text: Великий князь Литовський
      correct: false
    - text: Коронний гетьман
      correct: false
  instruction: Оберіть правильну відповідь.
