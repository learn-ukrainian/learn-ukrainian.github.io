- type: reading
  id: reading-vyshyvanyi-memory
  title: Мемуарні свідчення про Вільгельма Габсбурга
  source: Спогади сучасників
  text: 'Коли ерцгерцог вперше з''явився серед нас в українській вишиванці, це викликало
    справжній шок у багатьох офіцерів. Проте для солдатів це був потужний сигнал:
    він свій. Він не соромився сидіти з нами в шанцях і ділити солдатський хліб, відкинувши
    будь-яку зверхність. Вільгельм досконало опанував мову, і коли він говорив, у
    його словах не було фальші. Він щиро вірив у те, що український народ має право
    на власну державу, і саме ця віра робила його не просто командиром, а духовним
    побратимом.

    '
  tasks:
  - Проаналізуйте символізм носіння вишиванки австрійським ерцгерцогом.
- type: critical-analysis
  id: critical-analysis-vyshyvanyi
  title: Аналіз поведінки командира
  source_reading: reading-vyshyvanyi-memory
  instruction: Дайте розгорнуті відповіді на запитання щодо тексту.
  target_text: 'Проте для солдатів це був потужний сигнал: він свій.'
  items:
  - prompt: Як автор тексту характеризує вплив поведінки Вільгельма на моральний стан
      українських солдатів?
    model_answer: Автор зазначає, що подолання соціальної дистанції (сидіння в шанцях,
      носіння вишиванки) зробило ерцгерцога своїм для солдатів, викликавши глибоку
      довіру та відчуття побратимства.
  - prompt: Згідно з текстом, що саме надавало авторитету словам Вільгельма серед
      його підлеглих?
    model_answer: Його авторитет базувався на бездоганному володінні українською мовою
      та щирій вірі у право українського народу на власну незалежну державу, що виключало
      відчуття фальші.
- type: essay-response
  id: essay-identity-choice
  title: 'Філософський есей: Національний вибір'
  source_reading: reading-vyshyvanyi-memory
  instruction: Напишіть розгорнутий філософський есей.
  prompt: Чи може людина свідомо обрати свою національну ідентичність, відмовившись
    від привілеїв свого біологічного походження? Обґрунтуйте свою думку, спираючись
    на життєвий шлях Василя Вишиваного та концепцію перемоги ідентичності над походженням.
  min_words: 300
  model_answer: Життя Вільгельма Габсбурга яскраво ілюструє концепцію свідомого вибору
    нації. Національна ідентичність не є виключно біологічною даністю; вона конструюється
    через спільні цінності, культурну емпатію та вольові рішення. Відмовившись від
    імперських привілеїв, Вільгельм довів, що українцем можна стати шляхом занурення
    в мову і боротьби за свободу народу, що кидає виклик тоталітарним концепціям нації
    за кров'ю.
  rubric:
  - criteria: Глибина аргументації
    description: Есей демонструє глибоке розуміння концепції вибору ідентичності.
    points: 40
  - criteria: Використання фактів
    description: Доречне використання біографічних фактів Василя Вишиваного.
    points: 30
  - criteria: Стилістика та мова
    description: Використання багатої лексики та складних синтаксичних конструкцій.
    points: 30
- type: quiz
  title: Мовний та змістовий аналіз тексту
  items:
  - question: Яким терміном у тексті модуля описується процес відмови від імперського
      світогляду та усвідомлення власної суб'єктності українців?
    explanation: У тексті використовується термін деколонізація для опису подолання
      імперської спадщини.
    options:
    - text: деколонізація
      correct: true
    - text: маргіналізація
      correct: false
    - text: сублімація
      correct: false
    - text: асиміляція
      correct: false
  - question: Як автор тексту характеризує період життя Василя Вишиваного між двома
      світовими війнами?
    explanation: Автор описує цей період як одіссею, сповнену поневірянь та болісного
      пошуку свого місця.
    options:
    - text: як справжню одіссею, сповнену поневірянь
      correct: true
    - text: як час найвищого політичного тріумфу
      correct: false
    - text: як період спокійного академічного життя
      correct: false
    - text: як етап відновлення родинних статків
      correct: false
  - question: Який стилістичний засіб використовує автор, зазначаючи, що димні зали
      паризьких кав'ярень замінили йому блиск імператорських прийомів?
    explanation: Це антитеза, яка підкреслює різкий контраст між минулим розкішним
      життям та реаліями еміграції.
    options:
    - text: різке протиставлення умов життя
      correct: true
    - text: перебільшення його фінансових проблем
      correct: false
    - text: іронічне висміювання французької богеми
      correct: false
    - text: пряме цитування його поетичних творів
      correct: false
  - question: Що саме, згідно з текстом модуля, стало остаточним інтелектуальним фундаментом
      для зміни ідентичності молодого Габсбурга?
    explanation: Прочитання праці Михайла Грушевського забезпечило інтелектуальний
      злам у його свідомості.
    options:
    - text: знайомство з монументальною працею Грушевського
      correct: true
    - text: навчання у військовій академії Вінер-Нойштадта
      correct: false
    - text: вивчення польської культури у маєтку батька
      correct: false
    - text: видання власної поетичної збірки у Відні
      correct: false
  - question: Яку лексичну конструкцію використовує автор для опису поведінки Вишиваного
      під час допитів у Лук'янівській тюрмі?
    explanation: Автор підкреслює, що він тримався з неймовірною аристократичною гідністю.
    options:
    - text: тримався з неймовірною аристократичною гідністю
      correct: true
    - text: відповідав розгублено та непослідовно
      correct: false
    - text: намагався домовитися зі слідчими МДБ
      correct: false
    - text: проявляв надмірну агресію до конвоїрів
      correct: false
  - question: Згідно з текстом, чому відмова Вишиваного очолити путч проти Скоропадського
      спростовує міф про Австрійську інтригу?
    explanation: Його відмова доводить, що влада не була його самоціллю, а пріоритетом
      було збереження єдності нації.
    options:
    - text: бо він поставив національні інтереси вище за владу
      correct: true
    - text: бо він боявся втратити підтримку Відня
      correct: false
    - text: бо він не мав достатньої військової сили
      correct: false
    - text: бо він планував повернутися до Франції
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: Аналіз тверджень за текстом
  instruction: Визначте, чи відповідають наведені твердження змісту тексту.
  items:
  - statement: Згідно з текстом, родина Габсбургів повністю підтримувала українські
      симпатії Вільгельма та фінансувала його проекти.
    correct: false
    explanation: У тексті чітко зазначено, що родина була розлючена його проукраїнською
      позицією і відмовилася надавати суттєву допомогу.
  - statement: Автор зазначає, що поетична збірка Минають дні була способом сублімації
      бойового досвіду та туги за полеглими побратимами.
    correct: true
    explanation: Текст підтверджує, що збірка стала своєрідним літературним пам'ятником
      полеглим героям і вираженням його емоцій.
  - statement: У тексті стверджується, що принципове використання української мови
      на допитах у тюрмі було свідомою політичною маніфестацією.
    correct: true
    explanation: Автор описує його мовну позицію як останній акт опору та підкреслення
      своєї ідентичності перед катами.
  - statement: Згідно з аналізом у тексті, прізвисько Червоний князь виникло через
      його любов до традиційного українського одягу червоного кольору.
    correct: false
    explanation: Прізвисько виникло через його несподіване публічне загравання з лівими,
      соціалістичними ідеями в міжвоєнний період.
  - statement: Автор тексту наголошує, що діяльність Вишиваного легітимізувала українські
      прагнення в очах західної дипломатії.
    correct: true
    explanation: Текст вказує, що приєднання представника європейської еліти стало
      потужним сигналом і легітимізувало рух.
  - statement: За словами автора, радянські слідчі повністю ігнорували антинацистську
      діяльність Вишиваного під час Другої світової війни.
    correct: true
    explanation: У тексті зазначається, що слідчі свідомо ігнорували його боротьбу
      проти нацистів, щоб зліпити образ шпигуна.
