- type: reading
  id: reading-empire-appropriation
  title: "Первинне джерело: Імперський контекст"
  source: "Історичний огляд XVIII століття (адаптовано)"
  text: |
    Російська імперія цілеспрямовано та систематично викачувала найкращі таланти з поневолених територій для створення власного культурного фасаду. Це була типова імперська стратегія: метрополія привласнювала інтелектуальний та мистецький ресурс колоній, щоб потім презентувати його світу як власне досягнення. Українські музиканти, співаки та художники опинялися перед вибором: залишитися на батьківщині або вирушити до імперської столиці.
  tasks:
    - "Проаналізуйте механізм привласнення культурних ресурсів імперією."
    - "Які наслідки мала ця стратегія для української культури?"

- type: critical-analysis
  source_reading: reading-empire-appropriation
  title: "Критичний аналіз: Імперське привласнення талантів"
  instruction: "Прочитайте текст та проаналізуйте механізми імперського привласнення."
  items:
    - prompt: "Яким чином Російська імперія формувала свій культурний фасад, згідно з текстом?"
      model_answer: "Згідно з текстом, Російська імперія цілеспрямовано викачувала таланти з поневолених територій. Метрополія привласнювала інтелектуальний і мистецький ресурс колоній, щоб презентувати ці досягнення світові як власні, створюючи ілюзію великої імперської культури."
    - prompt: "Перед яким складним вибором опинялися українські митці того часу?"
      model_answer: "Українські митці мали вибирати між тим, щоб залишитися на батьківщині, яка втрачала автономію, або поїхати до столиці імперії заради блискучої кар'єри та визнання, але ціною асиміляції та праці на імперську державу."

- type: reading
  id: reading-bortnyanskyy-identity
  title: "Аналіз музичної ідентичності"
  source: "Сучасне музикознавче дослідження"
  text: |
    Твердження, що Бортнянський є російським композитором, базується виключно на його місці роботи. Але служба імператору не змінює генетику культури. Музика маестро має багате, тепле, ліричне звучання; вона спирається на гармонічну систему і мелодичні звороти, властиві українському партесному співу та народній пісні.
  tasks:
    - "Як автор тексту розмежовує місце роботи композитора та його культурну ідентичність?"
    - "Які музичні докази наводяться на користь українськості Бортнянського?"

- type: essay-response
  source_reading: reading-bortnyanskyy-identity
  title: "Есе: Культурна ідентичність митця"
  instruction: "Напишіть розгорнуте есе на основі запропонованого тексту."
  prompt: "У тексті автор розмежовує місце служби Бортнянського та його культурну ідентичність. Спираючись на прочитане, аргументуйте, чому Бортнянського слід вважати саме українським композитором. Проаналізуйте різницю між місцем роботи і генетикою культури в умовах імперії."
  min_words: 300
  model_answer: "У запропонованому тексті чітко артикулюється думка, що служба імператору не змінює національну генетику культури митця. Бортнянський був змушений працювати при дворі Російської імперії, проте його творчість формувалася в українському середовищі, зокрема у Глухівській школі. Музикознавчий аналіз доводить, що його музика кардинально відрізняється від російського знаменного розспіву. Твори Бортнянського базуються на українському партесному співі та інтонаціях української народної пісні. Вони відзначаються ліризмом та кордоцентризмом, що є питомими рисами українського мелосу. Отже, спроби імперії привласнити його спадщину є типовою колоніальною практикою, яка ігнорує реальний культурний фундамент композитора. Моцарт залишається австрійцем попри роботу у Відні, а Бортнянський є українським генієм, який приніс свої традиції у європейський та імперський контексти."
  rubric:
    - criteria: "Аргументація"
      description: "Наведено переконливі докази з тексту щодо української ідентичності митця."
      points: 40
    - criteria: "Аналіз понять"
      description: "Глибоко проаналізовано різницю між місцем роботи та культурною генетикою."
      points: 30
    - criteria: "Стилістика та мова"
      description: "Есе написано академічним стилем, використано відповідну термінологію."
      points: 30

- type: quiz
  title: "Розуміння тексту: Аналіз біографії"
  instruction: "Оберіть одну правильну відповідь на кожне запитання, спираючись виключно на текст модуля."
  items:
    - question: "Згідно з текстом, як Бортнянський поєднав різні музичні традиції у своїх хорових концертах?"
      explanation: "У тексті зазначено, що він поєднав європейські віяння з давніми традиціями українського багатоголосся."
      options:
        - text: "поєднав форми класицизму з українським багатоголоссям"
          correct: true
        - text: "відмовився від поліфонії на користь знаменного розспіву"
          correct: false
        - text: "скопіював італійське бельканто для церковних служб"
          correct: false
        - text: "використав інструментальний супровід у всіх концертах"
          correct: false
    - question: "Який аргумент автор наводить для спростування міфу про провінційність української культури?"
      explanation: "Автор використовує факт тріумфу Бортнянського в Італії як доказ його європейського рівня."
      options:
        - text: "успішна постановка опер Бортнянського в італійських театрах"
          correct: true
        - text: "відкриття консерваторії в Санкт-Петербурзі"
          correct: false
        - text: "запрошення німецьких маестро до Глухова"
          correct: false
        - text: "відсутність професійної освіти у композитора"
          correct: false
    - question: "У тексті автор характеризує посаду Бортнянського як внутрішню подвійність. Чому?"
      explanation: "Текст вказує, що він був лояльним чиновником імперії, але зберігав українську ментальність."
      options:
        - text: "він служив імперії, проте зберігав українську ідентичність"
          correct: true
        - text: "він писав опери двома різними мовами одночасно"
          correct: false
        - text: "він працював і диригентом, і співаком у капелі"
          correct: false
        - text: "він постійно подорожував між Петербургом та Італією"
          correct: false
    - question: "Як у тексті пояснюється поняття кордоцентризму в музиці маестро?"
      explanation: "Текст визначає кордоцентризм як схильність до щирого, ліричного і чуттєвого висловлювання."
      options:
        - text: "як схильність до щирого та емоційного висловлювання"
          correct: true
        - text: "як використання виключно міфологічних сюжетів"
          correct: false
        - text: "як сувору раціональність і математичний підхід"
          correct: false
        - text: "як відмову від використання народних мотивів"
          correct: false
    - question: "Яку соціальну функцію виконував Бортнянський на посаді директора капели, згідно з текстом?"
      explanation: "Він домігся пенсій та кращих умов для українських співаків, виступаючи їхнім захисником."
      options:
        - text: "захищав права співаків і запровадив систему пенсій"
          correct: true
        - text: "звільняв усіх іноземців з придворних посад"
          correct: false
        - text: "заборонив хористам виконувати світську музику"
          correct: false
        - text: "примушував хористів залишатися в капелі довічно"
          correct: false
    - question: "Згідно з текстом, чому російський імператорський двір масово залучав українських музикантів?"
      explanation: "Текст пояснює, що Петербург не мав власної традиції, а українці мали освіту і були ментально зрозумілими."
      options:
        - text: "вони мали глибоку освіту і традицію хорового співу"
          correct: true
        - text: "вони відмовлялися від оплати за свою роботу"
          correct: false
        - text: "вони краще знали французьку мову за італійців"
          correct: false
        - text: "вони погоджувалися виконувати російські народні пісні"
          correct: false
    - question: "Як автор оцінює вплив композитора на церковну музику свого часу?"
      explanation: "Автор зазначає, що Бортнянський очистив літургію від низькопробної музики завдяки цензурі."
      options:
        - text: "він очистив літургійний спів від низькопробних творів"
          correct: true
        - text: "він дозволив виконання оперних арій у храмах"
          correct: false
        - text: "він заборонив використання хорового співу акапела"
          correct: false
        - text: "він замінив усі православні гімни на католицькі"
          correct: false
    - question: "Яку головну причину забуття світської спадщини композитора називає текст?"
      explanation: "Текст вказує на зміну смаків та потребу імперії в Бортнянському лише як у символі православної традиції."
      options:
        - text: "імперія потребувала його лише як символу духовної традиції"
          correct: true
        - text: "усі рукописи світських творів були втрачені під час пожежі"
          correct: false
        - text: "його світські опери були заборонені церковною цензурою"
          correct: false
        - text: "він сам знищив свої італійські партитури перед смертю"
          correct: false

- type: true-false
  title: "Правда чи хиба: Аналіз аргументів"
  instruction: "Визначте, чи відповідають наведені твердження змісту тексту."
  items:
    - statement: "У тексті стверджується, що Бортнянський відмовився від посади в Петербурзі заради повернення до Глухова."
      correct: false
      explanation: "Текст зазначає, що він обійняв посаду в Петербурзі, але ментально залишався пов'язаним з Україною."
    - statement: "Згідно з текстом, музика Бортнянського базується на знаменному розспіві, характерному для російської традиції."
      correct: false
      explanation: "Текст підкреслює кардинальну відмінність його мелодики від знаменного розспіву та опору на український партесний спів."
    - statement: "Автор тексту наголошує, що Бортнянський використовував стиль класицизму для впорядкування стихії багатоголосся."
      correct: true
      explanation: "У тексті сказано, що він пропустив барокову традицію через фільтр класицизму, зробивши форму стрункішою."
    - statement: "Текст доводить, що Бортнянський був типовим російським чиновником, який повністю асимілювався в імперії."
      correct: false
      explanation: "Текст стверджує протилежне: він ніколи не ставав типовим чиновником і створив навколо себе українське земляцтво."
    - statement: "За словами автора, світські твори Бортнянського у стилі галант тривалий час залишалися невідомими через ідеологічні причини."
      correct: true
      explanation: "Текст підтверджує, що імперська ідеологія свідомо звужувала його образ до автора виключно церковних піснеспівів."