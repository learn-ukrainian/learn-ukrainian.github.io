- type: reading
  id: reading-kvitka-marusia
  title: Уривок із повісті Маруся
  source: Григорій Квітка-Основ'яненко
  text: 'А куди ж це ви, дядьку Науме, чимчикуєте з самого ранку? Та йду ж, синку,
    до міста, може, яку копійчину на ярмарку вторгую... Що Бог дасть, те і буде; а
    без Його святої волі і волос з голови не впаде.

    '
  tasks:
  - Який світогляд відображають слова Наума Дрота?
  - Як мова персонажів допомагає створити автентичний образ селянина?
- type: critical-analysis
  title: 'Аналіз: Християнський фаталізм та мовний колорит'
  source_reading: reading-kvitka-marusia
  target_text: Що Бог дасть, те і буде; а без Його святої волі і волос з голови не
    впаде.
  questions:
  - Яку функцію виконує християнський фаталізм у розкритті образу селянина?
  - Чому Квітка-Основ'яненко наділяє своїх героїв такою глибокою релігійністю?
  model_answers:
  - Християнський фаталізм підкреслює моральну чистоту та смирення селян, протиставляючи
    їх духовність міській цивілізації.
  - Це слугує доказом того, що найвища духовність існує в українському селі, і допомагає
    зруйнувати колоніальний міф про інтелектуальну обмеженість народу.
  focus_points:
  - Християнська етика
  - Сентименталізм
  - Деколонізаційний аспект
- type: essay-response
  title: 'Есе: Батько української прози'
  source_reading: reading-kvitka-marusia
  prompt: У чому полягає монументальний переворот, який здійснив Григорій Квітка-Основ'яненко
    в українській літературі? Проаналізуйте його рішення стати прозаїком та значення
    цього кроку для розвитку літературної мови і нації.
  min_words: 250
  model_answer: 'Григорій Квітка-Основ''яненко здійснив монументальний переворот,
    довівши здатність української мови до серйозної, глибоко психологічної прози.
    До нього домінувала бурлескна традиція (так звана котляревщина), що формувала
    стереотип про мову як інструмент лише для комічного ефекту. Квітка свідомо обрав
    прозу, щоб створити серйозний, академічний тон і довести, що мова простого люду
    здатна виражати найвищі почуття і філософське смирення. Це був акт деколонізації:
    створення національного епосу переводить етнографічну групу в статус модерної
    нації. Він самотужки розбудував синтаксичний апарат української мови, заклавши
    фундамент для подальшого реалізму і довівши критичній імперській еліті високу
    духовність та моральну вищість українського народу.'
  rubric:
  - criteria: Аргументація та аналіз
    description: Глибокий аналіз переходу від бурлеску до серйозної прози та ролі
      Квітки в цьому процесі.
    points: 10
  - criteria: Використання термінології
    description: Доречне використання термінів (деколонізація, сентименталізм, прозаїк).
    points: 5
- type: reading
  id: reading-kvitka-satire
  title: 'Сатира: Бюрократична мова'
  source: Конотопська відьма (Григорій Квітка-Основ'яненко)
  text: 'По розсужденію і многократному соображенію, числительність персон не конкордує
    з реєстром у силу фальшивої калькуляції...

    '
  tasks:
  - З якою метою писар Пістряк використовує таку складну суміш канцеляризмів та перекручених
    слів?
  - Як цей мовний портрет характеризує стан козацької старшини тієї епохи?
- type: comparative-study
  title: 'Порівняння: Сентименталізм Квітки та Європи'
  source_reading: reading-kvitka-marusia
  items_to_compare:
  - Європейський сентименталізм (Руссо, Річардсон)
  - Український сентименталізм (Квітка-Основ'яненко)
  criteria:
  - Соціальний статус героїв
  - Роль природи
  - Релігійний аспект
  - Фінал твору
  model_answer: Європейський сентименталізм зазвичай фокусувався на містянах або збіднілій
    аристократії в екзотичному чи пасторальному середовищі, часто з деїстичним або
    суто філософським релігійним відтінком. Його фінали нерідко викликали соціальний
    протест. Натомість українська адаптація Квітки-Основ'яненка зробила героями заможних
    селян — носіїв автентичної традиції, розмістивши їх в органічному середовищі щоденної
    праці. Релігійний аспект у його творах є глибоко православним та фаталістичним,
    а трагічний фінал викликає катарсис та християнське смирення, підкреслюючи вищу
    духовність сільського патріархального світу у порівнянні з деградованою імперською
    цивілізацією.
- type: quiz
  title: 'Перевірте знання: Розуміння тексту'
  items:
  - question: Згідно з текстом модуля, як автор характеризує перехід від бурлескної
      традиції до серйозної прози?
    explanation: У тексті зазначено, що літературі був потрібен серйозний тон, щоб
      подолати розважальний бар'єр котляревщини.
    options:
    - text: Як критичну необхідність створення серйозного тону замість суто розважального
      correct: true
    - text: Як відмову від української мови на користь імперського стандарту
      correct: false
    - text: Як бажання письменників заробляти більше грошей у столиці
      correct: false
    - text: Як природний і непомітний процес без значних зусиль авторів
      correct: false
  - question: У тексті модуля автор порівнює мову нормальну та мову писаря Пістряка.
      Яку функцію виконує ця мовна потворність?
    explanation: Згідно з текстом, мовна потворність геніально підкреслює його духовну
      порожнечу та відірваність від народу.
    options:
    - text: Підкреслює його духовну порожнечу та повну відірваність від звичайного
        народу
      correct: true
    - text: Демонструє його високий рівень європейської академічної освіти
      correct: false
    - text: Показує, як швидко українська мова розвивалася в містах
      correct: false
    - text: Доводить його здатність ефективно керувати містечком
      correct: false
  - question: Як у тексті пояснюється рішення Квітки-Основ'яненка взяти псевдонім
      Грицько Основ'яненко?
    explanation: Текст вказує, що це створювало маску доброго діда-оповідача, яка
      знімала соціальну дистанцію і формувала довіру.
    options:
    - text: Для встановлення максимальної довіри з читачем і зняття соціальної дистанції
      correct: true
    - text: Щоб приховати своє дворянське походження від імперської цензури
      correct: false
    - text: Бо він соромився своїх перших україномовних творів
      correct: false
    - text: Для того щоб видавці платили йому як двом різним авторам
      correct: false
  - question: Згідно з текстом, який аргумент наводить письменник у листі до видавця
      Петра Плетньова?
    explanation: У тексті згадується його намір довести критикам здатність української
      мови розчулити людину до сліз.
    options:
    - text: Він хотів довести здатність української мови розчулювати людину до сліз
      correct: true
    - text: Він просив збільшити фінансування для видання нових книг
      correct: false
    - text: Він аргументував необхідність переходу на російську мову
      correct: false
    - text: Він скаржився на відсутність професійних акторів у театрі
      correct: false
  - question: Як у тексті модуля пояснюється функція сліз у сентиментальних творах
      Квітки-Основ'яненка?
    explanation: Текст стверджує, що сльози виконують функцію духовного катарсису,
      очищуючи душу від егоїзму.
    options:
    - text: Сльози діють як духовний катарсис, який робить людину сприйнятливішою
        до чужого болю
      correct: true
    - text: Сльози є ознакою слабкості і соціальної поразки селянства
      correct: false
    - text: Сльози використовувалися лише для розваги міської публіки
      correct: false
    - text: Сльози були обов'язковим елементом імперської цензури
      correct: false
  instruction: Оберіть правильну відповідь.
- type: true-false
  title: 'Правда чи неправда: Аналіз тексту'
  items:
  - statement: Згідно з текстом, європейські сентименталісти описували сільське життя
      з такою ж фотографічною точністю до матеріальної культури, як і українські автори.
    correct: false
    explanation: У тексті сказано, що європейські автори створювали штучні пейзажі,
      тоді як український митець був прискіпливим до реальних деталей і цін.
  - statement: Автор зазначає, що в ранній українській літературі прозаїкам доводилося
      конструювати синтаксичний апарат самостійно, без допомоги поетичного ритму.
    correct: true
    explanation: Текст підтверджує, що проза вимагає іншого рівня лінгвістичної інженерії
      для формування довгих підрядних речень.
  - statement: У модулі стверджується, що родина Квіток належала до бідного селянського
      стану.
    correct: false
    explanation: Навпаки, текст підкреслює, що Квітки були заможною родиною з елітарним
      походженням, що спростовує радянський міф.
  - statement: Згідно з аналізом у тексті, сатира письменника ніколи не була легким
      розважальним сміхом, а гострим інструментом критики.
    correct: true
    explanation: Сатира мала на меті безжально розтинати пухлини соціальної несправедливості
      та корупції.
  - statement: Текст модуля вказує на те, що письменник завжди уникав використання
      релігійних мотивів у своїх творах.
    correct: false
    explanation: Навпаки, у тексті підкреслюється, що релігійність героїв — це основа
      їхнього щоденного життя і ключовий елемент світогляду автора.
  instruction: Визначте, чи твердження правильне.
