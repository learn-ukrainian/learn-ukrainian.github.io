- type: reading
  id: reading-military
  title: 'Джерело: Спогади про Урус-Шайтана'
  source: 'Літопис Самовидця (адаптовано)'
  text: |
    Іван Сірко був чоловік вельми хоробрий і до військових справ надзвичайно здібний. Татари називали його Урус-Шайтаном і дуже боялися, бо він завжди нападав несподівано. Козаки ж вірили, що він характерник, якого ні куля, ні шабля не бере. Своїми походами він не раз рятував християнських невільників з кримської неволі, завдаючи ворогу превентивних ударів.
  tasks:
    - 'Яке прізвисько дали Сірку вороги і чому?'
    - 'Які слова у тексті вказують на надприродні здібності отамана?'

- type: essay-response
  title: 'Есе: Феномен непереможності Сірка'
  source_reading: reading-military
  instruction: 'Напишіть есе обсягом від 250 слів.'
  prompt: 'Проаналізуйте феномен непереможності Івана Сірка. Як поєднання військового таланту та міфологізації (феномен характерництва) впливало на бойовий дух козаків та паніку серед ворогів? Обґрунтуйте свою думку, спираючись на наданий текст.'
  min_words: 250
  model_answer: 'Феномен непереможності Івана Сірка ґрунтується на кількох ключових факторах. По-перше, текст зазначає, що він був "до військових справ надзвичайно здібний", що свідчить про його видатний тактичний талант і здатність до превентивних ударів. По-друге, міфологізація його постаті відігравала колосальну роль: козаки вірили, що він "характерник", невразливий до зброї. Це формувало психологічний імунітет у його власного війська. Водночас для ворогів він був "Урус-Шайтаном", що виконувало функцію деморалізації та наводило паніку ще до початку бою. Отже, поєднання реального полководницького генію та створеного навколо нього інформаційного міфу зробило його найуспішнішим отаманом тієї епохи.'
  rubric:
    - criteria: 'Аналіз військового таланту'
      description: 'Оцінено роль тактики та стратегії отамана на основі тексту.'
      points: 4
    - criteria: 'Розкриття феномену міфологізації'
      description: 'Пояснено вплив чуток про характерництво на обидві сторони конфлікту.'
      points: 4
    - criteria: 'Мовне оформлення'
      description: 'Використано відповідну історичну термінологію.'
      points: 2

- type: reading
  id: reading-letter
  title: 'Джерело: Лист турецькому султану'
  source: 'Народний фольклор (адаптовано)'
  text: |
    Ти, султан, чорт турецький, і проклятого чорта брат і товариш, самого Люцифера секретар. Який ти в чорта лицар, коли ти не можеш чесно битися? Не будеш ти, сучий ти сину, синів християнських під собою мати, твого війська ми не боїмося, землею і водою будемо битися з тобою.
  tasks:
    - 'Якими стилістичними засобами автори листа десакралізують образ султана?'
    - 'Які слова у тексті демонструють політичну незалежність Запорозької Січі?'

- type: critical-analysis
  title: 'Аналіз: Сміхова культура та дипломатія'
  source_reading: reading-letter
  instruction: 'Дайте розгорнуті відповіді на запитання щодо тексту.'
  target_text: 'Який ти в чорта лицар... твого війська ми не боїмося, землею і водою будемо битися з тобою.'
  questions:
    - 'Яку функцію виконує грубий гумор та сарказм у цьому тексті?'
    - 'Як лексика цього листа відображає концепцію абсолютної автономії Запорозької Січі?'
  model_answers:
    - 'Грубий гумор та сарказм у листі виконують функцію десакралізації образу могутнього ворога. Називаючи султана "секретарем Люцифера", автори демонструють відсутність страху перед Османською імперією. Такий сміх є потужною психологічною зброєю, що піднімає бойовий дух козаків.'
    - 'Лексика листа яскраво демонструє, що Запорозька Січ позиціонувала себе як самостійний політичний субєкт. Фрази на кшталт "твого війська ми не боїмося" та категорична відмова підкоритися свідчать про безкомпромісне відстоювання козацьких вольностей та ігнорування імперських авторитетів.'
  focus_points:
    - 'Сміхова культура бароко'
    - 'Психологічна десакралізація'
    - 'Стилістичні маркери незалежності'

- type: quiz
  title: 'Перевірте знання: Аналіз життєпису Івана Сірка'
  instruction: 'Оберіть одну правильну відповідь для кожного запитання на основі матеріалу модуля.'
  items:
    - question: 'Згідно з текстом модуля, яке прізвисько вороги дали Івану Сірку для психологічного тиску?'
      explanation: 'У тексті зазначено, що османи та татари називали його Урус-Шайтан.'
      options:
        - text: 'Урус-Шайтан'
          correct: true
        - text: 'Степовий вовк'
          correct: false
        - text: 'Великий характерник'
          correct: false
        - text: 'Запорозький месник'
          correct: false
    - question: 'Яку характеристику текст дає феномену багаторазового переобрання Сірка кошовим отаманом?'
      explanation: 'Текст називає це унікальним і безпрецедентним випадком в історії Запорозької Січі.'
      options:
        - text: 'безпрецедентне досягнення довіри'
          correct: true
        - text: 'звичайна практика для старшини'
          correct: false
        - text: 'наслідок постійних підкупів'
          correct: false
        - text: 'вимога іноземних монархів'
          correct: false
    - question: 'Як автор описує мету визволення невільників під час регулярних походів Івана Сірка?'
      explanation: 'Автор тексту підкреслює, що це забезпечувало демографічний порятунок етносу.'
      options:
        - text: 'як демографічний порятунок українського етносу'
          correct: true
        - text: 'як спосіб збільшити кількість найманців'
          correct: false
        - text: 'як можливість отримати викуп'
          correct: false
        - text: 'як виконання умов мирного договору'
          correct: false
    - question: 'Як у модулі трактується відоме політичне кредо Сірка Нужда закон міняє?'
      explanation: 'Текст характеризує це кредо як вияв жорсткого політичного прагматизму заради виживання.'
      options:
        - text: 'як необхідний політичний прагматизм'
          correct: true
        - text: 'як прояв його загальної безпринципності'
          correct: false
        - text: 'як відмову від релігійних переконань'
          correct: false
        - text: 'як зраду давніх козацьких ідеалів'
          correct: false
    - question: 'Згідно з текстом, який художній твір візуально закріпив образ Сірка в національній свідомості?'
      explanation: 'Текст згадує монументальну картину Іллі Рєпіна про запорожців.'
      options:
        - text: 'картина Іллі Рєпіна про запорожців'
          correct: true
        - text: 'літопис історика Самійла Величка'
          correct: false
        - text: 'численні народні думи та перекази'
          correct: false
        - text: 'академічні праці Дмитра Яворницького'
          correct: false
    - question: 'Як автор тексту характеризує стратегію вовчих зграй, яку успішно застосовував отаман?'
      explanation: 'У тексті це описується як війна з використанням дрібних автономних мобільних загонів.'
      options:
        - text: 'блискавичні рейди дрібних мобільних загонів'
          correct: true
        - text: 'довготривала облога неприступних фортець'
          correct: false
        - text: 'використання важкої облогової артилерії'
          correct: false
        - text: 'масштабна позиційна війна у степу'
          correct: false
    - question: 'Згідно з текстом, яку роль відігравали легенди про характерництво Сірка під час війни?'
      explanation: 'Текст стверджує, що вони потужно зміцнювали бойовий дух козаків.'
      options:
        - text: 'зміцнювали бойовий дух власних воїнів'
          correct: true
        - text: 'допомагали отримувати фінансування від церкви'
          correct: false
        - text: 'викликали велику довіру у городового козацтва'
          correct: false
        - text: 'полегшували дипломатичні переговори з європейцями'
          correct: false
    - question: 'Як у тексті пояснюється категорична відмова Сірка присягати московському царю у 1654 році?'
      explanation: 'Автор називає це яскравим проявом далекоглядності та розуміння амбіцій сусідньої держави.'
      options:
        - text: 'як прояв його політичної далекоглядності'
          correct: true
        - text: 'як наслідок його емоційної впертості'
          correct: false
        - text: 'як пряме виконання наказу польського короля'
          correct: false
        - text: 'як бажання зберегти торговельні зв''язки'
          correct: false