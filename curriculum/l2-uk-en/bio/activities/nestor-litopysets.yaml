- type: reading
  id: reading-nestor-intro
  title: 'Ключове питання: Звідки пішла Руська земля'
  source: 'Нестор Літописець, Повість минулих літ (концепція)'
  text: |
    "Се повісті минулих літ, звідки пішла Руська земля, хто в Києві першим почав княжити і звідки Руська земля постала". 
    Для Нестора це було питання національної ідентичності та геополітичного походження його держави. Він геніально вписав історію свого народу у загальний контекст світової священної історії, використавши біблійний сюжет про розподіл світу між трьома синами Ноя після потопу. Нестор детально розписує географію цього розподілу і доводить, що слов'яни походять від Яфета, а отже, є рівноправними учасниками Божого плану з найдавніших часів.

- type: critical-analysis
  source_reading: reading-nestor-intro
  title: 'Критичний аналіз: Провіденціалізм та ідентичність'
  instruction: 'Проаналізуйте наведений текст та дайте відповідь на запитання.'
  items:
    - prompt: 'Як Нестор використовує біблійний сюжет про синів Ноя для легітимізації Русі?'
      model_answer: 'Нестор включає слов''ян до нащадків Яфета, тим самим доводячи їхню рівноправність з іншими європейськими та близькосхідними народами в рамках священної історії та Божого плану. Це долає комплекс "нового народу" перед давнішими цивіляціями, такими як Візантія.'
    - prompt: 'Чому питання "Звідки пішла Руська земля" мало не лише історичне, а й політичне значення?'
      model_answer: 'У період політичної роздробленості та князівських міжусобиць це питання допомагало нагадати еліті про спільне коріння та консолідувати суспільство навколо Києва як єдиного центру легітимної влади.'

- type: essay-response
  title: 'Есе: Деколонізація спадщини Нестора'
  instruction: 'Напишіть розгорнуте есе на запропоновану тему.'
  prompt: 'Спираючись на географічну строгість концепту "Русь" у текстах Нестора та лінгвістичні особливості літопису, спростуйте імперський міф про "спільну колиску" трьох народів.'
  min_words: 300
  model_answer: 'Нестор Літописець чітко локалізував "Русь" виключно в Середньому Подніпров''ї, ототожнюючи етнонім з полянами-киянами, тоді як північні племена розглядалися як підпорядковані, а не питомо руські. Крім того, наявність живої протоукраїнської стихії в лексиці, фонетиці та морфології літопису доводить, що мовною основою для праці Нестора була староукраїнська мова. Ці аргументи руйнують імперський конструкт про "Древню Русь" як пра-Росію та підтверджують, що Нестор є фундатором саме української історіографії.'
  rubric:
    - criteria: 'Аргументація'
      description: 'Наведено переконливі географічні та лінгвістичні докази з літопису.'
      points: 5
    - criteria: 'Структура та логіка'
      description: 'Есе має чітку структуру та логічний виклад думок.'
      points: 3
    - criteria: 'Мовне оформлення'
      description: 'Використано відповідну академічну лексику без русизмів.'
      points: 2

