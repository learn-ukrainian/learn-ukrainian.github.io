- type: reading
  id: reading-chykalenko
  title: 'Первинне джерело: Щоденники та афоризми'
  source: 'Євген Чикаленко'
  text: |
    Я з радістю віддав би своє життя, аби побачити Україну вільною та незалежною. 
    Легко любити Україну до глибини душі, а ви спробуйте любити її до глибини кишені. 
    Ми повинні будувати національну інфраструктуру, не сподіваючись на швидку подяку, бо без власної преси і науки нація приречена на асиміляцію.
  tasks:
    - 'Які дві найвідоміші цитати мецената наведено в уривку?'
    - 'У чому полягає головна загроза для нації без власної інфраструктури?'

- type: critical-analysis
  id: analysis-01
  source_reading: reading-chykalenko
  title: 'Аналіз: Прагматизм мецената'
  target_text: 'Легко любити Україну до глибини душі, а ви спробуйте любити її до глибини кишені.'
  questions:
    - 'Як ця фраза деконструює типове романтичне народництво початку ХХ століття?'
    - 'Який конкретний соціальний підтекст приховується за цією метафорою?'
  model_answers:
    - 'Ця фраза різко критикує поверхневий патріотизм, який обмежується лише емоціями, та вимагає реальних матеріальних жертв від еліти.'
    - 'Вона вказує на гостру потребу постійного фінансування інституцій та критикує заможну еліту, яка уникала системної підтримки руху.'
  focus_points:
    - 'Критика романтичного патріотизму'
    - 'Фінансовий вимір національної боротьби'

- type: essay-response
  id: essay-01
  source_reading: reading-chykalenko
  title: 'Есе: Гроші та національна ідея'
  prompt: 'У тексті стверджується, що Чикаленко фінансував українську пресу та культуру як свідомий акт опору. Проаналізуйте, спираючись на текст модуля, яку роль відіграє економічна незалежність у політичній боротьбі бездержавної нації. Чи можуть високі ідеї перемогти без матеріального фундаменту?'
  min_words: 300
  model_answer: 'Євген Чикаленко довів, що для успішної національно-визвольної боротьби самі лише романтичні ідеї є недостатніми. Економічна незалежність, якої він досяг завдяки успішному землеробству, дозволила йому фінансувати газету Рада, підтримувати письменників і політичні ініціативи. Без цієї інфраструктури поширення ідей в умовах репресій було б неможливим.'
  rubric:
    - criteria: 'Аргументація'
      description: 'Глибоке розкриття звʼязку між капіталом та національним рухом на прикладі Чикаленка.'
      points: 40
    - criteria: 'Використання тексту'
      description: 'Спирання на конкретні факти з біографії мецената (видання преси, підтримка словників).'
      points: 30
    - criteria: 'Мовне оформлення'
      description: 'Використання академічного стилю та відповідної складної термінології.'
      points: 30

- type: true-false
  title: 'Правда чи вигадка: Факти з біографії'
  instruction: 'Визначте, чи є наведені твердження правдивими згідно з текстом модуля.'
  items:
    - statement: 'Євген Чикаленко народився у бідній селянській родині на Галичині.'
      correct: false
      explanation: 'Він народився у дуже заможній землевласницькій родині на Півдні України.'
    - statement: 'Видання щоденної україномовної газети було вкрай збитковим проєктом.'
      correct: true
      explanation: 'Газета постійно зазнавала колосальних збитків, які він покривав з власної кишені.'
    - statement: 'Чикаленко із задоволенням прийняв пропозицію стати Гетьманом України.'
      correct: false
      explanation: 'Він принципово відмовився від цієї посади, не бажаючи спиратися на іноземні війська.'
    - statement: 'Свою економічну незалежність діяч здобув завдяки успішним агрономічним інноваціям.'
      correct: true
      explanation: 'Він був успішним аграрієм і запровадив систему чорного пару, яка приносила високі прибутки.'
    - statement: 'У радянський час постать мецената активно прославлялася як приклад боротьби за соціалізм.'
      correct: false
      explanation: 'Його імʼя було системно замовчуване, оскільки він як заможний землевласник не вписувався в ідеологію.'

- type: quiz
  title: 'Перевірка розуміння тексту'
  instruction: 'Оберіть одну правильну відповідь до кожного запитання.'
  items:
    - question: 'Що було головним джерелом статків Євгена Чикаленка, які він згодом витрачав на меценатство?'
      explanation: 'Він успадкував землі і надзвичайно успішно вів сільське господарство.'
      options:
        - text: 'Ефективне землеробство та сільське господарство'
          correct: true
        - text: 'Торгівля зброєю під час війни'
          correct: false
        - text: 'Отримання великих грантів від царського уряду'
          correct: false
        - text: 'Володіння кількома вугільними шахтами'
          correct: false
    - question: 'Яку саме ключову агрономічну інновацію масово впровадив господар у своїх маєтках?'
      explanation: 'Він масово використовував систему чорного пару для збереження вологи у посушливому ґрунті.'
      options:
        - text: 'Систему обробітку ґрунту під назвою чорний пар'
          correct: true
        - text: 'Вирощування виключно генетично модифікованих культур'
          correct: false
        - text: 'Завезення екзотичних видів худоби з Південної Америки'
          correct: false
        - text: 'Побудову велетенських скляних теплиць'
          correct: false
    - question: 'Як називалася перша щоденна україномовна політична газета, яку фінансував цей діяч?'
      explanation: 'Ця щоденна впливова газета називалася Рада.'
      options:
        - text: 'Зоря Галицька'
          correct: false
        - text: 'Рада'
          correct: true
        - text: 'Київська старовина'
          correct: false
        - text: 'Літературно-науковий вісник'
          correct: false
    - question: 'З якою практичною метою був виданий посібник Розмови про сільське хазяйство?'
      explanation: 'Він прагнув поділитися досвідом з селянами та розвинути українську термінологію.'
      options:
        - text: 'Щоб похизуватися своїми неймовірними статками'
          correct: false
        - text: 'Щоб навчити селян ефективному землеробству рідною мовою'
          correct: true
        - text: 'Щоб отримати престижну академічну ступінь'
          correct: false
        - text: 'Щоб заплутати царську цензуру незрозумілими термінами'
          correct: false
    - question: 'Який видатний словник вийшов друком завдяки безпосередній фінансовій підтримці мецената?'
      explanation: 'Чикаленко фінансував створення фундаментального Словаря української мови.'
      options:
        - text: 'Словарь української мови Бориса Грінченка'
          correct: true
        - text: 'Етимологічний словник української мови'
          correct: false
        - text: 'Словник староукраїнської мови'
          correct: false
        - text: 'Перший український тлумачний словник'
          correct: false
    - question: 'Чому постать Чикаленка так ретельно і панічно замовчувалася радянською ідеологією?'
      explanation: 'Він руйнував теорію класів, будучи багатим поміщиком, який служив національним інтересам.'
      options:
        - text: 'Бо він фінансував виключно російських письменників'
          correct: false
        - text: 'Бо його біографія руйнувала міф про відсутність українського капіталу'
          correct: true
        - text: 'Бо він був головним ідеологом російського царизму'
          correct: false
        - text: 'Бо він емігрував не до Європи, а до Сполучених Штатів'
          correct: false
    - question: 'Яку непублічну, але критично важливу роль меценат відігравав в Українській Центральній Раді?'
      explanation: 'Він був ініціатором її створення, але відмовлявся від офіційних владних посад.'
      options:
        - text: 'Він був її головним військовим командиром'
          correct: false
        - text: 'Він виступав там із найяскравішими промовами на мітингах'
          correct: false
        - text: 'Він ініціював її створення, але відмовився від державних посад'
          correct: true
        - text: 'Він постійно блокував усі її рішення заради інтересів'
          correct: false
    - question: 'Яким був найважливіший історичний та інтелектуальний здобуток діяча під час його еміграції?'
      explanation: 'В еміграції він написав безцінні щоденники та спогади про визвольні змагання.'
      options:
        - text: 'Написання багатотомних політичних мемуарів та щоденників'
          correct: true
        - text: 'Створення нової надсучасної агрономічної лабораторії'
          correct: false
        - text: 'Видання ще однієї масової щоденної газети у Празі'
          correct: false
        - text: 'Переклад усіх творів класиків іноземними мовами'
          correct: false

- type: authorial-intent
  id: authorial-01
  source_reading: reading-chykalenko
  title: 'Аналіз авторського наміру'
  prompt: 'Проаналізуйте, з якою метою в мемуарах використовується метафора чорнороба щодо власної політичної діяльності. Який образ намагається цим сконструювати діяч?'
  text_excerpt: 'Він завжди вважав і називав себе виключно чорноробом великої національної справи, скромною людиною, яка зобовʼязана будувати міцний невидимий фундамент.'
  techniques_to_identify:
    - 'Метафора'
    - 'Антитеза (тилова робота проти публічності)'
  model_answer: 'Використовуючи цю метафору, автор прагне підкреслити свідому відмову від політичного марнославства. Образ чорнороба символізує важку, непомітну, але фундаментальну роботу, що контрастує з гучними промовами публічних політиків.'