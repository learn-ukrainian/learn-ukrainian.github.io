warning: >-
  Direct-source packet. Власний текст Тютюнника подано як link-only
  джерело: скан не має текстового шару, тому дослівні цитати з локаторами
  не наводяться. Довідники розходяться щодо місця народження (ЕІУ — «нині
  село Звенигородського р-ну Київ. обл.»; IEU — Hlukhiv county, Chernihiv
  gubernia); розбіжність НЕ усунена й НЕ розв'язується перевагою: регіон
  народження не називати взагалі, писати «село Будище». Місце пізнішої
  діяльності (Вільне козацтво на Звенигородщині 1918 року) доказом місця
  народження не є. Ідентичність у статті про Перший Зимовий похід: «В.
  Тютюнник» там — Василь Никифорович Тютюнник (за покликанням самої
  статті), а не Володимир; ініціал розкривати лише за джерелом. Роки
  виходу фільмів «Звенигора» і «ПКП» ЕІУ НЕ подає — датування (зокрема
  «1928» і «1926») не стверджувати. Портрет не оголошено: використано
