  text: "Окремі князі були удостоєні церковної канонізації.\r\nЖитія таких князів,\
    \ подібно до житій інших святих, включалися у відповідні\r\nзбірники та мінеї.\
    \ Ці джерела були зібрані і досліджені М.Серебрянським (159),\r\nВ.Ключевським\
    \ (807) та М.Барсуковим (368). Більшість з них написані сучасниками\r\nабо за\
    \ свіжими переказами. Використання таких джерел (особливо першої частини,\r\n\
    яка містить життєпис святого) у співставленні з іншими матеріалами цілком\r\n\
    допустиме (1257)."
