  1948 року рішенням особливої наради МДБ УРСР, довідка Синоду — «У березні
  1948 р.»; строк в обох 8 років. Жодної з дат не обрано. (б) Чернечий шлях:
  ЕІУ подає 1911 (вступ), «28 серпня 1913» і «1915 став ієромонахом»; довідка
  Синоду подає 1913 як перший монаший постриг з новим іменем Климентій. Ролі
  подій названо мовою кожного джерела окремо, без зведення в один ряд.
  (в) Орган перехоплення листів / формальна причина арешту: [S2] «їх
  перехопило МГБ» (листи до кард. Тіссерана та о. Королевського); [S3]
  формальна причина арешту — листи архімандрита до Риму про переслідування
  УГКЦ, «які перехопило НКВС». Обидві формулювання збережено; жодного органу
  не обрано, не гармонізовано й не узагальнено. Вирок за [S1] — окремо:
  особлива нарада МДБ УРСР (не зливати з органом перехоплення листів).
  ВІДХИЛЕНО ОКРЕМО — НЕПІДТВЕРДЖЕНЕ ПОСИЛАННЯ НА СПРАВУ: попередній чернетковий
  матеріал містив посилання на кримінальну справу з посиланням на статтю
  Синоду. Повний вибір тексту адоптованої довідки [S2] показав, що жодного
  такого посилання на цій сторінці немає; жодне з чотирьох адоптованих
  джерел його не подає. Воно не «спростоване» — воно недоведене наявним
  набором, і це різні речі.
  ЛОКАЛІЗОВАНІ ЦИТАТИ (перевірено повним вибором тексту [S2] / [S3]
