  - Великий згін
  - Кримські походи
  - заслання
vocabulary:
  - генеральний суддя
  - переселення
  - митрополія
constraints:
  - Не називати примусовий згін добровільною міграцією.
  - Не зводити політику до напередвизначеного «возз'єднання».
